    to shifting priorities","Attention to detail in case documentation"]'
  hobbies: '["Hiking in Forest Park and Columbia River Gorge","Cycling around Beaverton and Portland","Exploring local craft breweries and microbreweries","Reading non‑fiction (psychology, technology, self‑improvement)","DIY
    home‑automation projects (smart lighting, thermostats)","Playing strategy video games","Cooking eclectic recipes with locally sourced ingredients","Volunteering at the community food bank","Participating
    in neighborhood block parties"]'
  career_goals: John aims to move from his current customer service representative position into a supervisory or training role within the next three to five years, leveraging his communication and problem‑solving
    strengths. He plans to complete the bachelor's degree he began in business administration, and obtain a professional certification in Customer Experience Management or Project Management. Seeking flexibility,
    he is interested in hybrid or remote work arrangements that support a balanced lifestyle. John also wants to lead initiatives that improve call‑center efficiency, mentor newer agents, and eventually
    contribute to shaping his organization’s overall customer experience strategy.
