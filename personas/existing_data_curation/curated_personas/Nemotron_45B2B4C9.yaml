  hobbies: '[''Model building (RC drones)'', ''Programming hobby projects'', ''Reading technical non-fiction and sci-fi'', ''Hiking in Cook County forest preserves'', ''Listening to instrumental jazz and
    classical music'', ''Solving mechanical puzzles'', ''Mentoring high-school students in STEM'']'
  career_goals: Henry aims to become a senior engineering technologist specializing in industrial automation within the next five years. He plans to earn a Professional Engineer (PE) license and obtain
    certifications such as Certified Manufacturing Technologist (CMfgT) to bolster his credibility. His competitive drive pushes him to lead high-impact projects that improve efficiency and reduce downtime
    for manufacturing clients in the Chicago area. Long-term, Henry envisions establishing his own consultancy that offers precision-engineered solutions for smart-city infrastructure and renewable-energy
    retrofits, positioning himself as a trusted expert who balances innovative ideas with reliable implementation.
