personas:
  professional: Henry Sherrer is a 23‑year‑old engineering technologist who leverages his AutoCAD, SolidWorks, and Allen‑Bradley PLC expertise to deliver precision automation solutions for Chicago manufacturers,
    balancing data‑driven curiosity with pragmatic standards while thriving in solitary, focused project environments.
  sports: Henry Sherrer enjoys early‑morning hikes in Cook County’s forest preserves and follows the Chicago White Sox and Chicago Bulls, occasionally joining a local running club for solo 5K runs while
    remaining wary of overly social team sports.
  arts: Henry Sherrer immerses himself in instrumental jazz by Miles Davis and classical pieces by Ludovico Einaudi while troubleshooting drones, frequently visiting the Art Institute of Chicago’s modern
    sculpture wing and appreciating the precision of abstract installations.
  travel: Henry Sherrer prefers meticulously planned solo trips, having explored the rugged shoreline of Michigan’s Upper Peninsula and the tech showcases of Tokyo, yet keeps travel budgets tight to fund
    his certifications and drone projects.
  culinary: Henry Sherrer favors nutrient‑dense meals such as grilled salmon with quinoa, sweet‑potato mash, and a strong cold brew, cooking at home with precise measurements while indulging occasionally
    in a slice of Chicago deep‑dish pizza as a reward after a successful project.
  core: Henry Sherrer is a disciplined, data‑obsessed engineer who thrives in quiet, solitary work, balances curiosity with practicality, and channels his competitive edge into precision‑driven automation
    and meticulous personal projects.
background:
  cultural: Henry grew up in a predominantly African-American neighborhood on Chicago’s South Side, where community churches and local cultural events shaped his early sense of identity. His parents, both
    first-generation college graduates, emphasized the importance of education and perseverance amid systemic challenges. He maintains strong ties to the city’s vibrant Black cultural scene, attending events
    such as the Chicago Black History Month celebrations and supporting local Black-owned tech startups. This background instilled in him a resilient work ethic and a keen awareness of representation in
    STEM, motivating him to both excel personally and subtly advocate for greater inclusion within his field.
attributes:
  skills: '[''AutoCAD'', ''SolidWorks'', ''PLC programming (Allen-Bradley)'', ''MATLAB'', ''Python'', ''Data analysis'', ''Electrical troubleshooting'', ''Process optimization'', ''Technical documentation'',
