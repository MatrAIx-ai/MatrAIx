  hobbies: '["Reading historical fiction", "Creative writing (short stories, poetry)", "Gardening", "Backyard vegetable gardening", "Hiking", "Cooking and recipe experimentation", "Food photography", "Puzzle
    solving (crosswords, escape rooms)", "Book club participation", "Tech meetups attendance"]'
  career_goals: Stephanie aims to advance from senior technical writer to documentation manager within the next five years, leading a cross-functional team to standardize documentation processes across
    her organization. She plans to earn the Certified Technical Communicator (CTC) credential and deepen her expertise in structured authoring and AI‑assisted documentation tools. She is also interested
    in becoming a subject‑matter expert in the aerospace or medical device sector, publishing articles at industry conferences, and mentoring junior writers. Long‑term, she envisions launching a boutique
    consultancy that helps small tech firms implement efficient documentation workflows while maintaining high content quality.
