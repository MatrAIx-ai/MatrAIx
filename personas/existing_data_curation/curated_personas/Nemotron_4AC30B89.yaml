personas:
  professional: Stephanie Goyal is a senior technical writer who blends a humanities foundation with analytical rigor, delivering clear user guides, API docs, and structured content via MadCap Flare, Adobe
    FrameMaker, and Markdown while applying methodical project coordination and mentoring junior writers on her path to a documentation manager role.
  sports: Stephanie Goyal tackles weekend hikes in Canaveral National Preserve as part of the ‘Coastal Trailblazers’ hiking club, follows the Orlando Magic and Tampa Bay Rays with competitive enthusiasm,
    and occasionally spikes a local co‑ed softball league for a dose of friendly rivalry.
  arts: Stephanie Goyal nurtures a creative outlet through short historical fiction pieces and poetry, draws inspiration from authors like Hilary Mantel and Ken Follett, captures culinary creations in photos
    reminiscent of Jamie Oliver’s styling, and participates in a book club where they discuss recent releases while listening to folk‑rock playlists featuring Sufjan Stevens.
  travel: Stephanie Goyal prefers carefully planned journeys that merge history and nature, having visited Savannah’s historic squares, explored Pompeii’s ancient ruins, trekked Utah’s Zion National Park,
    and now dreams of a solo retreat to Sri Lanka’s tea plantations to document the experience in a travelogue.
  culinary: Stephanie Goyal enjoys farm‑to‑table cooking, transforming heirloom tomatoes, kale, basil, and fresh turmeric from their backyard vegetable patch into dishes such as roasted tomato‑basil risotto
    and turmeric‑spiced chickpea stew, then meticulously plates and photographs each creation for their online portfolio.
  core: Stephanie Goyal balances relentless curiosity with pragmatic organization, competitive drive, and a healthy dose of skepticism, channeling these traits into precise technical writing, strategic
    finances, and a solitary yet creatively rich lifestyle.
background:
  cultural: Stephanie grew up in a middle‑class, predominantly white community in the Midwest before relocating to Palm Bay, Florida, for career opportunities. Her upbringing emphasized self‑reliance, punctuality,
    and a strong work ethic, values that continue to shape her professional demeanor. While she identifies with mainstream American cultural norms, her exposure to Florida’s coastal lifestyle has fostered
    an appreciation for outdoor activities, community festivals, and the region’s diverse natural environment. Her humanities education nurtured a broad literary and artistic appreciation, and her divorce
    has reinforced an independent, pragmatic outlook on life.
