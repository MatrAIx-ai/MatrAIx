persona_description: A medieval scholar who specializes in the study of Christian theology and the impact of the Edict of Thessalonica on the dietary habits of the Empire. This scholar is deeply interested
  in the dualistic nature of medieval Christian beliefs, the relationship between food and sin, and the role of ascetic fasting in medieval monasticism. They are also interested in the development of medieval
  cuisine and its influence on social structures, particularly in the context of the castle and its inhabitants. They are knowledgeable about the transition from Roman banquets to medieval banquets and
  the rise of the bourgeoisie, and how the pleasure of good food became a symbol of social and economic status.
