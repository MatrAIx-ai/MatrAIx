personas:
  professional: Kasandra Colonsantiago is a data scientist specializing in coastal environmental modeling, leveraging Python, R, and GIS tools while using bilingual communication skills to translate complex
    research into community-friendly reports, a blend that reflects their curiosity-driven approach balanced by practical, results‑oriented thinking.
  sports: Kasandra Colonsantiago enjoys early‑morning hikes along the Texas coastline, plays competitive beach volleyball with the Corpus Christi Beach Club, runs with the Coastal Run Club, and follows
    the Houston Astros and Dallas Cowboys, balancing a love for team spirit with a personal commitment to staying active year‑round.
  arts: Kasandra Colonsantiago is an avid salsa dancer who regularly attends cultural nights featuring the music of Carlos Santana and Celia Cruz, captures sunrise landscapes inspired by Ansel Adams with
    a DSLR, and finds artistic inspiration in the films of Pedro Almodóvar and the paintings of Frida Kahlo, a mix that fuels their creative expression and community outreach.
  travel: Kasandra Colonsantiago prefers immersive eco‑travel, having trekked the red‑rock canyons of Sedona, snorkeled in the crystal waters of Costa Rica’s Osa Peninsula, and explored the historic streets
    of Lisbon, while they plan future trips to the marine reserves of the Galápagos and the vibrant markets of Marrakech, often balancing travel costs with a disciplined savings plan.
  culinary: Kasandra Colonsantiago showcases culinary skill by mastering mole poblano, camarones al ajillo, and homemade tamales seasoned with fresh chilies, cilantro, and lime from their urban herb garden,
    yet they have a notorious habit of letting the salsa simmer a minute too long, resulting in a pleasantly smoky, if slightly over‑reduced, sauce.
  core: Kasandra Colonsantiago blends scientific rigor with a love for salsa dancing, beach clean‑ups, and experimental cooking, navigating life with a pragmatic curiosity, occasional impulsive online spending,
    and a habit of humming salsa tunes while debugging code.
background:
  cultural: Kasandra is a second‑generation Mexican‑American raised in Corpus Christi, where she grew up bilingual in English and Spanish. Her family’s roots in the local fishing community imbued her with
    a deep respect for the Gulf’s natural resources and coastal heritage. She celebrates Mexican traditions such as Día de los Muertos and Las Posadas, incorporating these cultural practices into her cooking
    and community involvement, while also embracing Texan customs, creating a vibrant, hybrid identity that informs her worldview and professional aspirations.
