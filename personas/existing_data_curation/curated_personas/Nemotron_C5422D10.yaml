  hobbies: '[''Salsa dancing'', ''Cooking traditional Mexican dishes'', ''Hiking coastal trails'', ''Birdwatching and nature photography'', ''Reading science‑fiction and environmental non‑fiction'', ''Volunteering
    for beach clean‑ups'', ''Urban herb gardening'', ''Exploring new data visualization techniques'']'
  career_goals: Kasandra aims to transition from her current hiatus into a role that leverages her environmental data science expertise to support coastal resilience initiatives in the Gulf region. Over
    the next three to five years she plans to complete professional certifications in GIS and environmental impact assessment, pursue a part‑time master’s program in environmental management, and secure
    a consulting position with a municipal agency or nonprofit where she can eventually lead community‑focused projects. Her long‑term ambition is to become a senior analyst or project manager who shapes
    sustainable policies while mentoring emerging professionals.
