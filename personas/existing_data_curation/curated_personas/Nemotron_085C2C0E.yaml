  hobbies: '[''Fishing'', ''Woodworking'', ''Reading non-fiction (local history, mechanics)'', ''Model train building'', ''Gardening'', ''Trail walking'', ''Listening to classic country music'', ''Crossword
    puzzles'', ''Sudoku'']'
  career_goals: Jon aims to transition from front‑line courier work to a supervisory role within his company, such as a senior dispatcher or logistics coordinator, where he can apply his organizational
    strengths to improve overall route efficiency. He is interested in obtaining a commercial driver’s license (CDL) and a forklift certification to expand his qualifications. Long‑term, Jon envisions starting
    a small, family‑run delivery service that offers reliable, predictable service to local businesses, allowing him to maintain a stable schedule that supports his preference for solitude and a quiet home
    environment.
