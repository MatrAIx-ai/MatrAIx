personas:
  professional: Kai Arrindell is an aspiring junior illustrator and LEGO architect, whose curiosity and love for unconventional ideas drive them to sketch vibrant characters and engineer intricate brick
    structures while balancing school responsibilities with a diligent work ethic.
  sports: Kai Arrindell darts across the neighborhood park every Saturday for a spirited game of soccer with friends, proudly wears a Manchester United jersey while playing for the Neighborhood Tigers U-8
    club, and cheers excitedly for the Seattle Sounders FC during televised matches, channeling their cooperative nature into team play.
  arts: Kai Arrindell immerses themselves in creative expression by sketching characters inspired by Pixar's Toy Story and Studio Ghibli's My Neighbor Totoro, dancing to the rhythmic beats of BTS and the
    upbeat tunes of Disney's Moana soundtrack, and eagerly attending community art workshops where they experiment with watercolors while idolizing the brushwork of illustrator Eric Carle.
  travel: Kai Arrindell loves planning adventures, having already explored the nearby Clearwater Beach and the bustling city museum in their hometown, while dreaming of a family trip to the Grand Canyon,
    a weekend at Disney World, and an eventual visit to the famous planetarium in Paris, France.
  culinary: Kai Arrindell enjoys helping bake soft chocolate chip cookies that blend butter, vanilla extract, and a pinch of sea salt, while also mastering simple lunches of peanut butter and jelly sandwiches
    with sliced apples, showcasing a growing confidence in the kitchen.
  core: Kai Arrindell is a curious, compassionate seven-year-old who channels boundless imagination into art, soccer, and meticulous saving, yet sometimes wrestles with worry and occasional forgetfulness.
background:
  cultural: Kai is a Black American growing up in Opa Locka, a historically African‑American neighborhood in Miami‑Dade County. His family celebrates traditions that blend Southern and Caribbean influences,
    such as gathering for Sunday church services, sharing soul food dishes like collard greens and sweet potato pie, and observing cultural holidays like Juneteenth and Kwanzaa. The multicultural environment
    of South Florida, with its vibrant Haitian, Jamaican, and Latin communities, enriches his exposure to diverse music, food, and languages. These cultural experiences shape his appreciation for rhythm,
    storytelling, and community togetherness, which he often reflects in his art and interactions with friends.
