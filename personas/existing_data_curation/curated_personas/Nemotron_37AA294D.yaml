  career_goals: Kai dreams of becoming an artist who can create images that make people feel happy and understood. He also imagines helping other kids as a teacher or youth mentor, because he loves giving
    support when friends feel sad or worried. He hopes one day to work in a community program where art and caring for others come together, such as a kids’ art workshop or a school art therapist.
