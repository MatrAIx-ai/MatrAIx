  hobbies: '[''Community Soccer'', ''Dance Classes'', ''Community Theater Set Design'', ''STEM Mentorship'', ''Gardening'', ''DIY Home Projects'', ''Tech Magazine Reading'', ''Hiking'']'
  career_goals: Marierose aims to advance to a senior lead engineer position where she can steer large‑scale projects that blend innovative technologies with proven, practical solutions. She aspires to
    become a project manager overseeing multidisciplinary teams, champion sustainable engineering practices, and eventually launch her own consulting firm focused on efficiency and reliability for mid‑size
    manufacturers. Mentoring younger engineers—especially women— and building a reputation as a go‑to expert for complex problem solving are also central to her long‑term ambitions.
