personas:
  professional: Marierose Harville, a hands‑on industrial engineer specializing in PLC programming, SolidWorks 3D modeling, and lean‑six sigma process optimization, channels their organized, methodical
    nature and healthy skepticism into leading cross‑functional maintenance teams that rigorously vet every solution before implementation, all while mentoring emerging engineers with a competitive edge.
  sports: Marierose Harville, a co‑ed soccer enthusiast playing for the River Valley Soccer Club and a regular participant in evening dance classes, stays fit through weekend hikes on the Illinois River
    Trail, roots for the Chicago Bears and Chicago Cubs, and follows the MLS team Chicago Fire with a mix of loyalty and competitive spirit.
  arts: Marierose Harville contributes to community theater set construction while enjoying performances of Lin-Manuel Miranda's 'Hamilton', attending Chicago Symphony Orchestra concerts featuring Gustavo
    Dudamel, and painting hobbyists’ evenings inspired by Monet's water lilies, weaving artistic appreciation into a socially active lifestyle.
  travel: Marierose Harville prefers meticulously planned weekend getaways, favoring Midwest destinations like Door County and the Starved Rock State Park for short hikes, while dreaming of a cross‑country
    road trip to Yellowstone and the Grand Canyon, balancing adventure with budget constraints and family commitments.
  culinary: Marierose Harville, an avid backyard gardener, enjoys cooking farm‑to‑table meals such as grilled rosemary‑marinated chicken with roasted zucchini, crafting homemade veggie stir‑fry with fresh
    bok choy and ginger, and occasionally indulging in deep‑dish pizza topped with locally sourced mozzarella and basil, showcasing solid culinary skills but an occasional habit of over‑seasoning.
  core: Marierose Harville blends competitive engineering rigor with a vibrant community spirit, obsessively tracking project metrics while never missing a soccer match, yet they sometimes over‑commit and
    forget to schedule their own health check‑ups.
background:
  cultural: Marierose grew up in a small Midwestern town near Ottawa, Illinois, in a family with deep roots in the region dating back several generations, primarily of Irish and English ancestry. Her upbringing
    emphasized self‑reliance, community involvement, and a pragmatic approach to life—values reflected in her work ethic and social activities. While she identifies with traditional Midwestern customs like
    attending local fairs and church picnics, she also embraces modern, diverse perspectives through her engineering career and community engagements.
