  stoicism, and sensation seeking. They are also interested in the potential use of deep brain stimulation, transcranial magnetic and electrical stimulation, and focused ultrasound as therapeutic interventions
  for suicidal individuals. The individual is likely to have a strong background in neuroscience, psychology, and the study of自杀行为。
