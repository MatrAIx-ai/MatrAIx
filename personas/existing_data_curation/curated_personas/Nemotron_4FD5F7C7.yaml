  hobbies: '[''Gardening (vegetable and native flowers)'', ''Cooking and recipe experimentation (particularly Colorado regional dishes)'', ''Crocheting and quilting'', ''Book club (mystery novels)'', ''Group
    hiking on local trails'', ''Line‑dancing classes'', ''Volunteering at the food bank'', ''Organizing community festivals'']'
  career_goals: Though she is not currently part of the formal workforce, Jacquelyn is driven by a desire to expand her impact within the Wellington community. She aims to launch a sustainable community
    garden that supplies fresh produce to the local food bank and provides educational workshops for seniors and youth. She also plans to formalize her hobby of crafting by establishing a small home‑based
    shop selling handmade items, using proceeds to support charitable causes. To deepen her gardening expertise, she intends to enroll in a horticulture certificate program at a nearby community college.
    Additionally, she hopes to become a certified peer‑support counselor, leveraging her compassionate yet assertive nature to mentor other seniors navigating life transitions. On the personal side, she
    dreams of traveling with her husband to national parks and taking a cooking class focused on Colorado’s regional cuisine.
