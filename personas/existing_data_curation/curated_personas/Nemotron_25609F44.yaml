  hobbies: '["Reading adventure books", "Drawing and sketching", "Lego building", "Playing soccer", "Listening to music (hip‑hop/R&B)", "Dancing", "Cooking with family (sweet tea, biscuits)", "Spending
    time with cousins"]'
  career_goals: Clara dreams of becoming a teacher because she enjoys explaining things to her younger cousins and wants to create a classroom where every child feels safe and understood. She also imagines
    herself as a veterinarian, caring for animals she loves, especially the family dog. Occasionally she talks about being an astronaut after watching space documentaries, intrigued by the idea of exploring
    new worlds. Her career aspirations are guided by her desire for stable, structured environments where she can help others and have clear routines.
