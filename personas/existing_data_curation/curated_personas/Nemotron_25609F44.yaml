personas:
  professional: Clara Hall, an aspiring junior architect, builds intricate Lego cities, turning their love for structure into creative blueprints while staying flexible enough to improvise when pieces don't
    fit, and they often add whimsical details to keep the designs playful.
  sports: Clara Hall dashes across the grass at the Eastside Kids Soccer Club every Saturday, channeling the teamwork they love while cheering for FC Barcelona and dreaming of dribbling like Lionel Messi,
    though they sometimes forget to stretch, leading to occasional sore knees.
  arts: Clara Hall fills sketchbooks with vibrant renditions of Magic Tree House heroes, humming along to Beyoncé and Kendrick Lamar while reenacting favorite scenes, and they eagerly share their drawings
    at family gatherings, though they sometimes lose focus when a new Lego set arrives.
  travel: Clara Hall prefers spontaneous weekend getaways, recalling their joyful family trip to Disney World in Florida and a short hike in Acadia National Park, while dreaming of exploring the historic
    castles of Edinburgh, though they often need reminders to pack their favorite sketchbook.
  culinary: Clara Hall loves whipping up Grandma’s sweet tea and buttery biscuits on Fridays, proudly sprinkling cinnamon on apple slices and experimenting with simple mac and cheese, and they sometimes
    over‑salt the pasta, prompting giggles from their siblings.
  core: Clara Hall is a structured‑yet‑flexible eight‑year‑old who builds Lego worlds, worries about missed details, bursts into spontaneous dance to R&B beats, and they habitually forget to tidy up their
    art supplies.
background:
  cultural: Clara is an African‑American girl growing up in Cypress, a suburban community in Harris County, Texas. Her family is deeply rooted in the local church, where she participates in Sunday school
    and community events. Family traditions blend Southern cuisine—like collard greens, fried chicken, and sweet tea—with stories of her grandparents’ migration from the South, preserving a sense of heritage.
    She often hears a mix of standard American English and gentle African‑American Vernacular English at home and school, shaping her linguistic identity. Community festivals, school celebrations of Black
    History Month, and neighborhood block parties expose Clara to a rich tapestry of cultural music, art, and storytelling, reinforcing her pride in her heritage while also embracing the multicultural environment
    of the Texas suburbs.
