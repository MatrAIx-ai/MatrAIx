  hobbies: '[''Gardening'', ''Cooking family recipes'', ''Listening to gospel and R&B music'', ''Knitting'', ''Attending church and community events'', ''Walking on coastal trails'', ''Reading personal
    development books'']'
  career_goals: Jamelya aspires to advance her career by obtaining certification in professional cleaning management and eventually becoming a lead housekeeper for a larger residential property or boutique
    hotel. She is also exploring the possibility of launching her own small cleaning business to serve the Brunswick County community, which would allow her to mentor new workers. Long‑term, she hopes to
    complete a GED and pursue studies in hospitality management, giving her broader career options and greater financial stability for her family.
