personas:
  professional: Jamelya Williams works as a professional housekeeper, excelling at deep‑cleaning, eco‑friendly techniques, and minor home repairs, while their curiosity‑driven yet practical nature leads
    them to experiment with new cleaning methods and maintain meticulous, flexible schedules for diverse clients.
  sports: Jamelya Williams enjoys evening walks along the coastal trail, participates in a local walking club, follows the Carolina Panthers, Charlotte Hornets, and occasional beach volleyball leagues,
    and keeps a relaxed fitness routine that balances activity with their busy schedule.
  arts: Jamelya Williams finds inspiration in gospel icons like Kirk Franklin, R&B legends such as Mary J. Blige, and contemporary soul artists like Leon Bridges, often knitting while listening to these
    musicians and attending the local church choir performances.
  travel: Jamelya Williams prefers short weekend getaways, having explored Charleston, Savannah, and the Outer Banks, while dreaming of a food‑centric trip to New Orleans and a relaxing Caribbean cruise,
    always planning trips around budget constraints and family responsibilities.
  culinary: Jamelya Williams blends soul‑food tradition with garden fresh ingredients, expertly preparing collard greens with smoked turkey, shrimp and grits seasoned with home‑grown basil and thyme, and
    occasionally experimenting with spicy rubs for chicken, though they sometimes over‑salt their dishes.
  core: Jamelya Williams is a community‑focused housekeeper who balances curiosity with practicality, nurtures a modest garden, and pursues personal growth while juggling financial goals, health monitoring,
    and a love for soulful music.
background:
  cultural: Jamelya is a Black American whose upbringing in the rural South has woven together African‑American traditions of faith, family, and community. She values church participation, celebrates cultural
    events such as Juneteenth, and maintains strong ties to her extended family and church network. Living in Brunswick County, she embraces local Southern customs while also engaging with the region's
    growing Hispanic community, often sharing meals and cooperating in neighborhood initiatives. Her cultural identity emphasizes humility, hospitality, and a deep appreciation for communal harmony.
attributes:
  skills: '[''Deep cleaning'', ''Laundry and fabric care'', ''Inventory management of supplies'', ''Safe handling of cleaning chemicals'', ''Basic home maintenance'', ''Time management'', ''Customer service
