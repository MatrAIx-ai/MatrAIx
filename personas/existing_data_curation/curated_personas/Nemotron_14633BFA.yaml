  career_goals: Patricia aims to complete her associate’s degree in Business Administration and transfer to a four‑year program to earn a bachelor's degree. She envisions a career in operations or project
    management within the logistics sector—an industry that thrives in Nebraska’s agricultural and transportation hub. Her long‑term ambition is to become an operations manager for a regional freight company,
    where she can apply her organizational skill set to streamline processes and improve efficiency. Concurrently, she is intrigued by entrepreneurship and hopes to launch a small consulting firm that helps
    local businesses implement data‑driven, practical strategies. Patricia also plans to cultivate resilience and stress‑management techniques, aspiring to mentor peers on balancing high performance with
    mental well‑being.
