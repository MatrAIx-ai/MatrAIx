personas:
  professional: Baron Perez, a 27‑year‑old full‑stack web developer, blends a human‑centered design mindset with rigorous agile practice, using Python, TypeScript, and Java to build responsive React and
    Angular interfaces; they excel at sprint planning, test‑driven development, and cross‑cultural code reviews, turning their organized, practical nature into reliable product deliveries while mentoring
    junior developers in both English and Spanish.
  sports: Baron Perez plays midfield for the Springfield Strikers in a regional soccer league, studies the tactical approaches of Manchester United, joins weekend hikes across the Flint Hills, and supplements
    training with CrossFit classes during the offseason, weaving teamwork and personal fitness into a structured routine.
  arts: Baron Perez volunteers in community theater productions, favoring plays by August Wilson, is an avid fan of indie musician Mitski and street photographer Vivian Maier, and regularly hosts Catan
    board‑game nights with friends, reflecting a deep appreciation for narrative, visual storytelling, and collaborative creativity.
  travel: Baron Perez prefers meticulously planned road trips and has already explored the Grand Canyon, Austin, and Oahu, while dreaming of a cultural immersion in Oaxaca City and a trekking adventure
    in Patagonia, balancing budget constraints with a thirst for diverse experiences.
  culinary: Baron Perez enjoys recreating authentic dishes such as cochinita pibil, chiles en nogada, and handmade corn tortillas, often sourcing fresh cilantro, chipotle peppers, and masa harina from local
    markets to impress friends at weekend dinner parties.
  core: Baron Perez is a meticulously organized, socially vibrant tech professional who channels worry into yoga, devotes evenings to communal cooking, and constantly seeks to embed cultural relevance into
    digital products.
background:
  cultural: Baron grew up in a Mexican‑American household where Spanish was spoken alongside English, giving him fluency in both languages and a deep appreciation for bicultural identity. Family gatherings
    centered around celebrations of Día de los Muertos, Cinco de Mayo, and traditional holidays, reinforcing values of familismo, community reciprocity, and respect for cultural narratives. Relocating to
    Emporia, Kansas, he blended his heritage with the close‑knit Midwestern community ethos, participating in local festivals while preserving Mexican culinary and musical traditions. His arts and humanities
    education further sharpened his awareness of cultural stories, enabling him to weave Mexican folklore and contemporary social themes into his software projects and community outreach. This dual cultural
    lens informs his collaborative approach, his commitment to inclusive technology, and his ongoing effort to bridge Mexican heritage with the broader American experience.
