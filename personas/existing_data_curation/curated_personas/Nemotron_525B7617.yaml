    and contemporary philosophy'', ''Practicing yoga for stress management'']'
  career_goals: Baron aims to advance to a senior engineering role within the next three years, focusing on leading cross‑functional product teams that embed cultural relevance into digital experiences.
    In the medium term, he aspires to become an engineering manager or technical lead, guiding project roadmaps, championing inclusive design, and fostering a supportive environment for diverse developers.
    Long‑term, he envisions launching a socially‑oriented tech startup that provides accessible technology education and cultural preservation tools for under‑served communities, especially Mexican‑American
    populations in the Midwest. To support these ambitions, he plans to obtain an AWS Solutions Architect certification and pursue a master’s degree in Human‑Computer Interaction, while continuing to contribute
    to open‑source projects that celebrate cultural heritage.
