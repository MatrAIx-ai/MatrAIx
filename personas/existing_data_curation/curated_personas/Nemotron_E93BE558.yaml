  hobbies: '[''Surfing'', ''Hiking'', ''Heirloom gardening'', ''Cooking'', ''Tai chi'', ''Reading agronomy literature'', ''Drone piloting'', ''Ukulele playing'', ''Volunteer community gardening'', ''Collecting
    vintage farm tools'']'
  career_goals: Jung aims to transform his farm into a model of climate‑resilient, organic, community‑supported agriculture on the island. He plans to diversify with high‑value specialty crops such as macadamia
    nuts, coffee, and cacao while deepening soil regeneration practices and integrating renewable energy like solar power. Over the next five years, he seeks USDA organic certification, a 20 % boost in
    overall productivity, and the launch of a farm‑to‑table brand that supplies local restaurants and food co‑ops. Long‑term, Jung envisions becoming an agricultural consultant and educator, helping other
    Hawaiian farms adopt sustainable practices and establishing a small training center that blends modern agronomy with Hawaiian cultural stewardship.
