personas:
  professional: Jung Liu, a 31‑year‑old agricultural manager on Oahu, blends deep agronomy expertise with cutting‑edge drone and IoT technology while honoring island planting traditions, leading a climate‑resilient
    farm that balances meticulous budgeting and flexible problem‑solving, and they communicate fluently in English, Mandarin, and conversational Hawaiian to unite diverse community partners.
  sports: Jung Liu, an avid surfer who rides the waves at Makaha Beach with the local Makaha Surf Club, hikes the coastal Kuliouou Ridge Trail each weekend, supports the Hawai‘i Rainbow Warriors basketball
    team, and participates in a community touch‑football league, balancing social competition with solitary outdoor reflection.
  arts: Jung Liu strums the ukulele at community gatherings, drawing inspiration from Jake Shimabukuro’s fingerstyle, Jack Johnson’s acoustic vibes, and local storyteller Mahi Taba’s plays, weaving music
    and performance into family meals and farm events while occasionally improvising verses about seasonal crops.
  travel: Jung Liu favors purposeful low‑key travel, planning weekend trips to Molokai and Kauai to study heirloom fruit orchards and dreaming of a horticultural research tour of the tea terraces in Uji,
    Japan, all while juggling family commitments and a modest travel budget that prioritizes experience over luxury.
  culinary: Jung Liu, an enthusiastic home cook, merges traditional island dishes like laulau and poke with Asian umami twists—misо‑marinated taro, ginger‑spiced kalua pork, pineapple‑coconut salsa, and
    heirloom tomato‑wiliwili leaf garnishes—displaying a skill level that ranges from confident sautéer to occasional over‑sauced reducer during family feasts.
  core: Jung Liu balances meticulous farm management with a spontaneous love for surf, often juggling drone flight plans on the beach while habitually forgetting to water the houseplants, a quirky reminder
    of the fine line between precision and lag.
background:
  cultural: Jung Liu is a second‑generation East Asian American; his parents emigrated from Taiwan to Hawaii in the late 1980s. Growing up in Ewa Beach, he was immersed in a multicultural environment where
    the values of hard work, respect for elders, and communal harmony from his Chinese heritage blended with the Hawaiian aloha spirit. He celebrates Lunar New Year with his family, maintains conversational
    Mandarin, and prepares traditional Asian dishes, while also participating in Hawaiian customs such as Makahiki celebrations and practicing the ethos of caring for ‘āina (land). This rich cultural tapestry
    informs his collaborative attitude, reverence for nature, and commitment to community, shaping both his personal life and professional approach to sustainable farming.
attributes:
  skills: '[''Crop production'', ''Livestock husbandry'', ''Sustainable irrigation'', ''Soil health management'', ''Precision agriculture (drones, sensors)'', ''Farm equipment operation'', ''Financial &
