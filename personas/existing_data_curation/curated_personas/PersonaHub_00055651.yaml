persona_description: A member of the Ontario legislature who fought for the rights of minorities and advocated for equal opportunities in education. He was a vocal critic of the Common Schools Act that
  allowed for segregated schools in Ontario and fought for the repeal of this provision. He was a major player in the decision to allow female pages in the legislature for the first time in 1971 and later
  earned the Order of Ontario. He died in 2012.
