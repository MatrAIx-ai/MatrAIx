  career_goals: Alexander aims to solidify his company's position as a market leader while championing corporate social responsibility and cultural representation. He is focused on scaling the business
    sustainably, expanding into Latin American markets, and building a legacy of mentorship by nurturing the next generation of executives, especially from underrepresented backgrounds. Additionally, he
    aspires to serve on industry boards and philanthropic boards that support arts education and community development, using his influence to create lasting societal impact.
