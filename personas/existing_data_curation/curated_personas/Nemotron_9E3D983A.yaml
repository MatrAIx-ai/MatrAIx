  hobbies: '[''Vegetable Gardening'', ''Model Train Building'', ''Bingo at the Senior Center'', ''Walking in Fall Creek Park'', ''Classic Rock Vinyl Collecting'', ''Vintage Radio Restoration'', ''Church
    Potluck Participation'']'
  career_goals: Travis aims to stay active and useful by offering his handyman skills on a part‑time basis to neighbors and the local senior center, while also formalizing his budgeting expertise by volunteering
    as a financial‑literacy mentor for other seniors. He plans to complete a GED program to solidify his credentials, and to adopt a regular mindfulness routine to lessen his worry and stress. Maintaining
    good health and a predictable schedule are top priorities, and he hopes to leave a small, well‑tended garden as a legacy for his grandchildren.
