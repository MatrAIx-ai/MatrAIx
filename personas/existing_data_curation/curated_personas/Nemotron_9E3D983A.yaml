personas:
  professional: Travis Harmon, a seasoned handyman with decades of maintenance and home‑care experience, leverages his carpentry, plumbing, and electrical know‑how to provide part‑time repair services for
    neighbors and the senior center while coordinating community budgeting workshops and pursuing a GED to formalize his expertise, and they find mindfulness exercises help temper their chronic worry.
  sports: Travis Harmon, a dedicated walker, completes a 2‑mile loop around Fall Creek Park each morning, participates in the senior center’s weekly bowling league, cheers for the Indianapolis Colts and
    the Indianapolis Indians, and occasionally joins a community gardening club’s weekend softball game.
  arts: Travis Harmon, a classic‑rock vinyl aficionado, spins records by The Rolling Stones, Led Zeppelin, and Creedence Clearwater Revival while restoring vintage radios, enjoys occasional gospel choir
    performances at church potlucks, and collects memorabilia from 1970s rock concerts.
  travel: Travis Harmon, a cautious traveler, prefers short road trips to nearby state parks like Brown County and Indiana Dunes, enjoys planned itineraries with rest stops for garden supply runs, dreams
    of a nostalgic visit to Nashville’s Country Music Hall of Fame, and limits long flights to annual family reunions in Florida.
  culinary: Travis Harmon, a garden‑to‑table cook, delights in preparing roasted zucchini, heirloom tomato salad with basil, and grilled chicken seasoned with rosemary harvested from his own plot, frequently
    pairs meals with a cold glass of locally brewed IPA, and occasionally treats himself to a slice of apple pie using Grandma’s secret cinnamon blend.
  core: Travis Harmon blends a love for orderly hands‑on projects, a worry‑prone mind, and a gentle social spirit into a life of gardening, vintage radios, and community service, all while quietly battling
    the urge to over‑budget every penny.
background:
  cultural: Travis grew up in a small Midwestern town in Indiana, raised in a working‑class white family with German and Irish roots. The community emphasized self‑reliance, modesty, neighborly help, and
    a strong work ethic. These values, combined with the region’s focus on family, church, and local civic involvement, have shaped his cooperative nature and his preference for structured, predictable
    routines.
