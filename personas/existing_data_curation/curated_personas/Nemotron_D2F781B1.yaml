  hobbies: '[''Reading (science‑fiction, non‑fiction)'', ''Journaling'', ''Hiking and nature walks'', ''Photography'', ''Gardening'', ''Home cooking'', ''Horseback riding'', ''Puzzle video games'', ''Small
    book club'']'
  career_goals: Zahra plans to enroll in a local community college within the next year to pursue an associate degree in information technology. She aims to earn industry certifications such as CompTIA
    A+ and Network+ and become a reliable IT support specialist for small businesses in her region. Over the next five years she hopes to launch her own freelance tech consulting service focused on helping
    rural enterprises adopt digital tools, and she is eager to contribute to community projects that bridge the digital divide and improve local quality of life.
