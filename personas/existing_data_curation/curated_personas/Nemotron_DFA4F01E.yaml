  hobbies: '[''Basketball'', ''Skateboarding'', ''Youth soccer'', ''Competitive video gaming (FPS & MOBA)'', ''Streaming on Twitch'', ''DIY car and bike repair'', ''Listening to rock/punk music'', ''Volunteering
    with church youth group'']'
  career_goals: Jacob plans to obtain his GED within the next year and secure an apprenticeship in automotive technology, aiming to become a certified automotive technician. He envisions eventually opening
    his own custom car shop where he can blend his mechanical expertise with his passion for design and performance upgrades. Parallel to this, he hopes to grow a side venture as a gaming content creator,
    using his competitive gaming skills to build an online streaming presence. His long‑term ambition is to achieve financial independence, develop a stable career that leverages both his hands‑on abilities
    and strategic mindset, and give back to his community through mentorship and local workshops.
