  hobbies: '["Playing soccer", "Building LEGO models", "Solving jigsaw puzzles", "Reading adventure books", "Piano practice", "Participating in Girl Scouts", "Science experiment club", "Baking cookies with
    family", "Organizing pretend events (e.g., tea parties)"]'
  career_goals: Amybeth’s current dream is to become an elementary science teacher because she enjoys explaining new ideas while using organized lesson plans. She also imagines helping animals as a future
    veterinarian, reflecting her love for caring and practical problem‑solving. In the meantime, she is determined to improve her soccer skills, hoping one day to play on a youth league team and possibly
    pursue a professional career if she continues to excel.
