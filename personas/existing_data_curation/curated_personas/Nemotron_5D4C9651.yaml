personas:
  professional: Amybeth Williams, a budding young organizer in their school’s science club and Girl Scouts troop, leverages their methodical planning, competitive spark, and sociable energy to lead group
    projects and coordinate community bake‑sale events with reliable precision, and they always make sure each detail is accounted for.
  sports: Amybeth Williams, an enthusiastic youth soccer player for the Newnan Lil’ Strikers, they idolize Atlanta United forward Josef Martínez, cheer for the Atlanta Braves during baseball season, and
    approach each practice with a competitive drive balanced by organized teamwork.
  arts: Amybeth Williams, a piano apprentice who delights in simple melodies from "The Nutcracker" and "Frozen," sings along to The Wiggles and Disney movie songs, admires actress Millie Bobby Brown’s performances,
    and they often reenact scenes during their backyard tea parties.
  travel: Amybeth Williams, an adventurous little explorer who loves weekend trips to historic Savannah, family outings to the Georgia Aquarium, school field trips to Callaway Gardens, and dreams of visiting
    Disney World’s Magic Kingdom and the beaches of Panama City, they eagerly plan each outing with a notebook full of sketches and checklists.
  culinary: Amybeth Williams, a budding baker who loves mixing flour, butter, and sugar to craft chocolate chip cookies and classic buttery biscuits, favors comfort foods like mac‑and‑cheese and chicken
    nuggets, and they proudly list cheddar cheese, honey, and fresh strawberries among their favorite ingredients.
  core: Amybeth Williams, a curious yet practical seven‑year‑old whose organized planning, competitive spirit, and love for soccer, LEGO, and tea‑party theatrics shape a lively, reliable, and occasionally
    bossy personality, they often lead group games with a blend of enthusiasm and meticulous detail.
background:
  cultural: Amybeth’s cultural background is rooted in the Southern traditions of small‑town Georgia. Growing up in Newnan, she experiences a close‑knit community where church attendance, family gatherings,
    and local events such as the Newnan historic‑square festivals are common. Her family emphasizes Southern hospitality, manners, and a strong sense of responsibility, which is reflected in her organized
    and reliable nature. She attends a public elementary school where community values and teamwork are highlighted, and she participates in activities like Girl Scouts that reinforce service and leadership.
    The region’s love for outdoor activities, soccer, and baking comfort foods also shapes her everyday experiences.
