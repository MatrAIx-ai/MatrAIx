persona_description: A biologist who specializes in studying primate communication and vocalizations, particularly the unique and complex vocalizations of tarsiers. His research interests include, but are
  not limited to, the evolution of communication systems in primate species, the importance of ultrasonic communication in avoiding predators, and the potential use of ultrasonic signals for social interactions
  and alarm calls. He is known for his detailed observations and analysis of the Philippine tarsier's vocalizations and their significance in the study of primate communication.
