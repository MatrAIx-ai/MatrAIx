  hobbies: '[''Fishing'', ''Hiking'', ''Woodworking'', ''Reading non‑fiction (history, biographies, business)'', ''Board‑game evenings with close friends'', ''Community garden volunteering'']'
  career_goals: William aims to advance to a senior supervisory or operations manager role within the defense‑support or logistics sector, where he can shape larger-scale processes and lead cross‑functional
    teams. He plans to obtain a Project Management Professional (PMP) certification to formalize his project‑leadership credentials. Over the next five years, he hopes to spearhead efficiency initiatives
    that reduce operational costs while maintaining high service standards, and eventually mentor emerging leaders in the organization.
