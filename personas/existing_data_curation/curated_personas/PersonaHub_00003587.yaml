persona_description: A religious scholar who specializes in the study of prophecy, particularly the Hebrew language and its use in predicting future events. He is also an expert in the interpretation of
  the Bible, particularly the Psalms and the Messianic Psalms, and has a deep understanding of the purpose and form of prophecy. His research interests include the historical and cultural context of prophecy,
  as well as its role in reinforcing religious messages and pointing to Christ. He is also a skilled communicator and has a passion for teaching and sharing his knowledge with others.
