  career_goals: Betty aims to become a leading advocate for preserving African American heritage in Pike County by organizing oral‑history workshops and serving as a local historical guide. She aspires
    to secure a seat on the Milford Township Board to champion senior resources and multicultural programming. Additionally, she hopes to mentor younger residents in public speaking and digital literacy,
    eventually publishing a community cookbook that blends her family recipes with personal stories, thereby leaving a lasting legacy of cultural pride and community connection.
