personas:
  professional: Betty Snowden, a 68‑year‑old community organizer and budding local historian in Pike County, leverages their talkative confidence, skeptical edge, and strong budgeting skills to orchestrate
    oral‑history workshops, senior storytelling sessions, and multicultural events while strategically campaigning for a seat on the Milford Township Board.
  sports: Betty Snowden stays active by walking the Delaware River trails with the Milford Senior Walking Club, cheering on the Philadelphia Eagles during the NFL season and supporting the local high school
    baseball team, while occasionally joining a community softball league as a scorekeeper, reflecting both a love for gentle exercise and competitive sports fandom.
  arts: Betty Snowden immerses themselves in the arts through choir rehearsals that feature Mahalia Jackson and Aretha Franklin classics, a lively book club dissecting Agatha Christie mysteries, and a quilting
    circle that crafts patchwork tributes to historic Southern songs, all of which fuel their storytelling passion and provide a creative outlet for their talkative spirit.
  travel: Betty Snowden prefers well‑planned road trips to historically rich destinations such as Charleston, South Carolina, Washington, D.C., and Savannah, Georgia, while dreaming of a future visit to
    New Orleans for its music and cuisine, balancing their love for cultural immersion with the budget constraints of a fixed retirement income.
  culinary: Betty Snowden’s kitchen showcases Southern comfort fare like fried catfish seasoned with smoked paprika, collard greens simmered with heirloom sweet peppers, sweet potato pie spiced with nutmeg,
    and fresh garden salads tossed with heirloom tomatoes, basil, and a splash of apple cider vinegar, reflecting both their seasoned palate and modest culinary experimentation.
  core: Betty Snowden blends relentless curiosity with a practical, sometimes skeptical, drive, turning garden harvests, choir harmonies, and community stories into a lifelong mission of cultural preservation,
    even as they wrestle with worry‑induced stress and a competitive streak.
background:
  cultural: Betty was born into an African American family that relocated from the Southern United States during the Great Migration, settling in Pennsylvania. Raised in a close‑knit church community, she
    grew up immersed in gospel music, communal meals, and the oral tradition of storytelling that reinforced her cultural identity. Over the decades, she has maintained strong ties to her heritage through
    food, music, and family history while also adapting to the predominantly white, rural setting of Pike County. Her experiences have fostered a deep appreciation for cross‑cultural connections, community
    resilience, and the preservation of African American narratives within her local environment.
