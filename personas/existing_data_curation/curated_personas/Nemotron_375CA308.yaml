    speculative fiction and philosophy'']'
  career_goals: Badri aims to move from a front‑line representative to a Customer Experience Manager within the next few years, where he can shape service policies, mentor a larger team, and foster a harmonious
    workplace culture. He envisions creating a community‑focused outreach program that partners his employer with local art institutions, blending his service expertise with his passion for the arts. In
    the longer term, Badri hopes to launch a small nonprofit art hub in Roswell that offers workshops, gallery space, and a podcast exploring Southwestern art, UFO folklore, and unconventional ideas, allowing
    him to merge his sociable energy with his love of creativity and community building.
