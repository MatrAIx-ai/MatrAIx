background:
  cultural: Alberto is a first‑generation American of Puerto Rican descent. Raised in a bilingual household, he is fluent in both Spanish and English, and his upbringing was steeped in the island’s rich
    traditions—celebrating festivals like San Juan, listening to bomba and plena, and savoring family meals centered around arroz con gandules and pasteles. The close‑knit community values of loyalty, hospitality,
    and collective support have shaped his cooperative yet assertive interpersonal style. Living in Broward County’s multicultural milieu, he blends his Caribbean roots with the diverse influences of South
    Florida, actively participating in Puerto Rican cultural events, supporting local Latin artists, and mentoring youth in tech to bridge the digital divide within his community.
