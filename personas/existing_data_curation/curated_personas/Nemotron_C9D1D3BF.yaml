  hobbies: '[''Strategy video gaming'', ''Scale model building'', ''Arduino electronics tinkering'', ''Science fiction reading'', ''Hiking'', ''Fishing'', ''Acoustic guitar practice'', ''Trading card collecting'']'
  career_goals: Michael aims to translate his practical and analytical strengths into a career that blends hands‑on work with systematic problem solving. In the short term, he wants to keep his grades strong
    in math and science, join the school’s robotics or engineering club, and secure a summer apprenticeship at a local auto shop or a tech repair shop. Over the longer term, he envisions becoming a mechanical
    engineer or an automotive technician, or possibly pursuing a professional e‑sports path where his strategic gaming skills can shine. He hopes to earn a scholarship for an engineering program after high
    school, while also keeping the flexibility to explore independent projects.
