personas:
  professional: Michael Kearns, an aspiring tech tinkerer, leverages their love of structure and detail to design Arduino LED displays and meticulously assemble scale aircraft and car models, and they channel
    their competitive streak into relentless mastery of strategy‑focused video games like StarCraft and Civilization.
  sports: Michael Kearns, who enjoys occasional trail hikes and weekend fishing trips with family, prefers low‑key fitness activities like bike rides and pick‑up basketball games at the neighborhood park,
    cheers for the New York Knicks in the NBA and the Los Angeles Dodgers in MLB, and they never adhere to a strict training schedule, reflecting a relaxed attitude toward organized sports.
  arts: Michael Kearns, who dabbles on acoustic guitar, often plays simplified finger‑style renditions of John Mayer’s 'Gravity' and Ed Sheeran’s 'Shape of You,' collects illustrated trading cards that
    fuel a casual appreciation for graphic art, and they occasionally binge‑watch sci‑fi series like 'The Expanse' for narrative inspiration.
  travel: Michael Kearns, who plans trips around a love of nature and technology, favors weekend camping at Yosemite National Park for hiking and fishing, dreams of a future excursion to Tokyo’s Akihabara
    district to explore the latest gadgets, and they carefully budget travel using their allowance, which sometimes limits spontaneous getaways.
  culinary: Michael Kearns, whose cooking skills peak at mastering spaghetti Bolognese and grilled cheese sandwiches, enjoys grilling fresh‑caught trout over a campfire on fishing trips, and they routinely
    snack on salty cheese‑filled pretzel bites and beef jerky after long gaming sessions.
  core: Michael Kearns, a detail‑obsessed teen with a competitive edge, balances structured hobbies like model‑building and strategy gaming with a laid‑back attitude toward obligations, and they quietly
    nurture a love for nature and simple acoustic tunes.
background:
  cultural: Michael grew up in Latonia, a suburban community on the western edge of the Louisville metropolitan area in Kenton County, Kentucky. His family is middle‑class, with a background of blue‑collar
    work—his father works in automotive repair and his mother part‑time in a local retail store. The local culture blends traditional Southern values of self‑reliance, modesty, and community involvement
    (including church gatherings and county fairs) with the modern influences of internet media, gaming, and technology. He attends a public middle school where school events often revolve around sports
    and community service. This regional backdrop, combined with exposure to country music, folk storytelling, and outdoor recreation like hunting and fishing, has shaped his practical outlook and appreciation
    for solitary, skill‑based activities.
attributes:
  skills: '[''Logical reasoning'', ''Strategic video gaming'', ''Basic computer troubleshooting'', ''Mechanical tinkering'', ''Model kit construction'', ''Woodworking basics'', ''Mathematical problem solving'',
