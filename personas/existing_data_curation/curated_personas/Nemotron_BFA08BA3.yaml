    music arrangement for worship", "cultural competency in Mexican-American traditions"]'
  hobbies: '["visiting art museums and galleries", "photography of urban art and architecture", "reading philosophy and theological literature", "maintaining a reflective journal", "daily meditation and
    contemplative prayer", "playing acoustic guitar quietly", "cooking traditional Mexican dishes", "exploring Chicago''s street‑art murals", "attending lectures on religious art", "studying religious art
    history"]'
  career_goals: Joshua aspires to complete his Master of Divinity and be fully ordained within the next three years, positioning himself for a senior pastoral role at a multicultural congregation in Chicago.
    He dreams of establishing a sanctuary space that blends contemplative prayer with visual arts, offering regular workshops on mindfulness, artistic expression, and spiritual resilience for young adults
    facing urban stress. Long‑term, he hopes to author a guidebook on integrating art into worship and to develop a citywide network of clergy who provide mental‑health‑informed pastoral care. He also seeks
    to deepen his theological education through a focus on liberation theology and Mexican folk spirituality, aiming to honor his heritage while serving a diverse flock.
