personas:
  professional: Amado Salazar is a meticulous leather shoe artisan in Orlando, whose mastery of pattern drafting, hand‑stitching, and CNC‑assisted cutting fuels his ambition to become a lead production
    artisan and eventually run a boutique workshop that fuses contemporary design with traditional craftsmanship.
  sports: Amado Salazar plays forward for the community‑run Orlando Soccer United league on Saturdays, jogs five miles around Lake Eola Park each morning to clear his mind, and faithfully supports Orlando
    City SC and the Orlando Magic, balancing competitive spirit with a laid‑back fitness routine.
  arts: Amado Salazar curates a vibrant soundtrack of Celía Cruz, Bad Bunny, and Arturo O’Farrill while crafting custom wooden stools, and frequently attends local jazz nights at the Orlando Museum of Art,
    finding that rhythmic beats inspire both his stitching patterns and his woodworking designs.
  travel: Amado Salazar meticulously plans weekend getaways, opting for budget‑friendly road trips to the Florida Keys and cultural immersion in Old San Juan, while dreaming of a summer workshop tour at
    the Barcelona Leather Fair, balancing the desire for new design inspiration with a careful eye on expenses and limited vacation days.
  culinary: Amado Salazar perfects the art of mofongo with crispy plantains, garlic‑infused sofrito, and pork chicharrón, while also mastering arroz con gandules seasoned with annatto and pigeon peas, and
    they enjoy experimenting with fresh herbs like cilantro and habanero in their handcrafted sauces, though they occasionally indulge in late‑night pizza as a guilty pleasure.
  core: Amado Salazar is a disciplined, detail‑oriented leather artisan who channels his anxiety into structured creativity—jogging, woodworking, and cooking traditional dishes—while juggling the dream
    of a boutique workshop with a habit of over‑planning and occasional late‑night pizza cravings.
background:
  cultural: Amado grew up in a bilingual Puerto Rican household, speaking both Spanish and English, and maintains close ties to the vibrant Latino community in Orlando. Family gatherings often feature traditional
    music, dance, and cuisine, reinforcing his appreciation for his heritage. He celebrates cultural holidays such as Nochebuena and Three Kings Day, and participates in local community festivals that showcase
    Puerto Rican art and food. His upbringing emphasizes hard work, respect for elders, and a collective sense of responsibility, values that shape his collaborative and considerate nature.
attributes:
  skills: '[''Pattern drafting'', ''Precision leather stitching'', ''Footwear assembly'', ''Quality inspection'', ''Inventory management'', ''Customer service'', ''Basic CNC operation'']'
  hobbies: '[''Playing recreational soccer'', ''Cooking Puerto Rican dishes'', ''Listening to salsa and reggaeton'', ''DIY woodworking projects'', ''Reading self-help books'', ''Jogging in Lake Eola Park'']'
  career_goals: Amado aims to advance from a skilled craftsman to a lead leather artisan, eventually supervising a production line in a larger footwear company. He plans to obtain a certified artisan credential
    and pursue a Bachelor’s degree in Industrial Technology to broaden his technical expertise. Long‑term, he dreams of opening his own boutique workshop in Orlando that blends contemporary designs with
    traditional Puerto Rican leather craftsmanship, while mentoring young apprentices from the local community.
