personas:
  professional: Mary Guidry, a 92‑year‑old master maintenance specialist, blends six decades of hands‑on repair expertise with meticulous record‑keeping and a methodical teaching style, offering seniors
    practical workshops while skeptically vetting new eco‑friendly technologies before sharing them, and often challenges younger apprentices to solve problems faster as a quiet form of competition.
  sports: Mary Guidry cheers for the Detroit Lions and Detroit Tigers while knitting a scarf during games, participates in a senior walking group at the Clinton Township senior center, attends weekly low‑impact
    water‑aerobics classes, and maintains a friendly rivalry with a neighbor over who can complete the most garden‑yard tasks before summer, all while keeping a modest collection of team memorabilia.
  arts: Mary Guidry frequents the Detroit Institute of Arts to study Diego Rivera's murals, takes weekend pottery and watercolor classes with a particular fondness for the works of local ceramicist Michael
    Zabel, reads biographies of innovators like Nikola Tesla, and curates a small home gallery of prints by Midwestern artists, often debating the merits of modernist versus realist styles with fellow club
    members.
  travel: Mary Guidry enjoys meticulously planned trips, having explored Mackinac Island by ferry, trekked the Pictured Rocks National Lakeshore, taken a weekend bus ride to Chicago's Art Institute, and
    dreamed of a guided tour of the historic French‑Canadian villages in Quebec, always packing a spare set of tools in case of travel‑related repairs.
  culinary: Mary Guidry favors hearty Michigan fare such as pasties, fresh‑caught whitefish fry, and cherry pie, cooks a signature chicken pot pie using garden‑grown thyme and rosemary, often burns the
    crust when her cataracts blur the oven timer, and delights in brewing strong coffee while solving crossword puzzles at the kitchen table.
  core: Mary Guidry is a diligent, curiosity‑driven elder who intertwines a lifetime of repair mastery, community mentorship, and modest artistic pursuits, all guided by methodical planning and a healthy
    dose of skeptical competitiveness.
background:
  cultural: Mary is a white Midwesterner with deep roots in the Great Lakes region. Her family traces back to French‑Canadian immigrants who settled in Michigan’s Upper Peninsula in the early 1900s, and
    she was raised in a Catholic household that emphasized community service, humility, and a strong work ethic. Growing up during the post‑World War II boom, she internalized the era’s values of self‑reliance,
    practicality, and appreciation for both industrial progress and cultural enrichment, which continue to shape her outlook and daily habits.
attributes:
  skills: '["Plumbing repair and installation", "Electrical wiring and fixture replacement", "HVAC system diagnostics and maintenance", "Carpentry and woodworking", "Building code compliance", "Preventive‑maintenance
