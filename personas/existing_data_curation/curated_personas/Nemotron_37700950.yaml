  hobbies: '["Art museum visits", "Pottery and watercolor painting", "Quilting", "Gardening with native perennials", "Crossword puzzles", "Senior book club", "Volunteer storytelling at the local library",
    "Mentoring at a community makerspace"]'
  career_goals: Even at 92, Mary aims to leave a lasting legacy of craftsmanship. She hopes to compile a handwritten guide of practical repair tips for senior homeowners in her community, mentor a small
    group of younger maintenance workers through monthly workshops, and volunteer to oversee the upkeep of the local senior center. Additionally, she aspires to continue learning about emerging eco‑friendly
    building technologies and share her insights with local historical societies, preserving the knowledge of mid‑20th‑century building practices.
