  career_goals: Herman aims to advance from a fabricator to a lead supervisor within the next three to five years, obtaining certifications such as AWS Certified Welder and CNC programming credentials.
    He hopes to combine his technical expertise with his calm, organized approach to improve workflow efficiency and mentor newer staff. Long‑term, he envisions opening a modest custom metal‑work shop that
    can accommodate flexible schedules for himself and a small crew, while still maintaining a stable income and a balanced lifestyle.
