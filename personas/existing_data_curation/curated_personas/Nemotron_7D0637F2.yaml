personas:
  professional: Herman Pratt, a seasoned metal fabricator at a regional manufacturing plant, leverages his CNC, MIG/TIG welding, and blueprint‑reading expertise while they apply a calm, cooperative demeanor
    to streamline production lines and mentor newer colleagues, often blending their love for structure with spontaneous workflow tweaks despite a relaxed attitude toward strict deadlines.
  sports: Herman Pratt, an avid outdoors enthusiast, spends weekends hiking Gallatin National Forest trails, mountain‑biking with the Bozeman Trailblazers MTB Club, fly‑fishing for the Madison River Anglers
    Association, and cheering on the Colorado Avalanche while they occasionally join pickup basketball games at the Bozeman Rec Center to keep their fitness routine balanced and socially engaging.
  arts: Herman Pratt, a nature‑photography aficionado and classic‑rock vinyl collector, spends evenings spinning The Rolling Stones, Led Zeppelin, and Pink Floyd while they curate a portfolio of Ansel Adams‑inspired
    landscape images and attend intimate performances by the local folk duo The Timberline Trio, allowing the precision of their craft to harmonize with artistic expression.
  travel: Herman Pratt, a methodical yet spontaneous traveler, has trekked the Canadian Rockies, camped in Yellowstone’s backcountry, biked Iceland’s Ring Road, and they meticulously map each route while
    reserving room for unplanned detours to hidden waterfalls, all while budgeting wisely to support their future custom metal‑work shop and dreaming of kayaking the fjords of New Zealand.
  culinary: Herman Pratt, a competent home‑brewer and grill master, favors rustic dishes such as smoked trout with dill, cinnamon‑spiced bourbon‑barrel stout, and hearty Montana huckleberry pie, sourcing
    fresh hops, barley, and local elk meat from farmers’ markets, and they experiment with CNC‑cut wooden serving boards to showcase their craft‑beer tastings, though they sometimes over‑brew to the point
    of excess.
  core: Herman Pratt blends disciplined craftsmanship with a laid‑back love for the outdoors, quietly turning metal, wood, and river currents into a balanced, low‑stress life peppered with occasional over‑indulgence
    in craft‑beer experiments and a relaxed approach to strict planning, and they maintain a calm, resilient outlook that guides every decision.
background:
  cultural: Herman grew up in a mid‑western, white American family with deep ties to the rural Montana lifestyle. His upbringing emphasized self‑reliance, respect for the outdoors, and a strong work ethic,
    reflecting the region’s ranching and mining heritage. Living in Bozeman, he participates in local traditions such as farmer’s markets, county fairs, and seasonal festivals, while also valuing the close‑knit
    community spirit that prioritizes harmony and mutual support.
