persona_description: A scholar or student who is interested in ancient Greek literature and drama, particularly those written during the Classical period. They are passionate about the study of tragedy
  and have a keen interest in the political, social, and cultural context in which these plays were written. They have a detailed knowledge of the meter and sound of Greek tragedy, and they are skilled
  in interpreting language and metrics in terms of each tragedian's dramatic goal. They are also interested in the broader implications of the plays, such as their themes, figures, and the role of the divine
  in society. They enjoy engaging with the works of scholars and experts in the field, and they are eager to expand their knowledge through reading and analysis of the plays.
