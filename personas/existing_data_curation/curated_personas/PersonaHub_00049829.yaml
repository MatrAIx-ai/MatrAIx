persona_description: A global governance expert who specializes in understanding the dynamics of international relations, particularly in the context of emerging market economies and their efforts to compete
  with Western powers in the modernity game. This individual is knowledgeable about the history, geography, and philosophical orientation of the game, as well as the ways in which the rules of the game
  are determined and the impact of these rules on the geopolitical significance of these countries. They are also aware of the potential consequences of accepting the rules of the game and the ways in which
  it can lead to the misdirection of money and the exacerbation of social divisions in "global cities".
