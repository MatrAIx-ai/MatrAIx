personas:
  professional: Shou Bohannon, a seasoned operations executive with 25 years of hands‑on management experience, leverages data‑driven insights, lean process improvement, and emerging IoT technologies to
    drive sustainable digital transformation, all while balancing a practical, curiosity‑fueled approach with a competitive edge that sometimes makes them wary of overly optimistic proposals.
  sports: Shou Bohannon embraces an active lifestyle by hiking the Sangre de Cristo foothills with the Santa Fe Hiking Club, playing a regular tee time at the Santa Fe Country Club for golf, and cheering
    on the New Mexico United soccer team, while they approach fitness with a competitive drive that pushes them to log at least three cardio sessions per week despite occasional fatigue from work pressures.
  arts: Shou Bohannon channels their creative energy through volunteer work with the Santa Fe Community Arts Council, curating festivals that spotlight Hispanic and Native American traditions, capturing
    the region’s vivid landscapes with a Nikon DSLR, and attending intimate jazz performances by Wynton Marsalis and folk gigs featuring Lucinda Williams, and they satisfy their sociable nature and insatiable
    curiosity.
  travel: Shou Bohannon prefers purpose‑driven travel that blends cultural immersion and outdoor adventure, having explored the historic streets of Santa Fe, the desert trails of Sedona, the culinary scene
    of Oaxaca, and the historic sites of Machu Picchu, while they meticulously plan trips months ahead using a spreadsheet to balance budget constraints and their desire for meaningful experiences before
    retirement.
  culinary: Shou Bohannon’s kitchen experiments often feature Southwestern staples—such as Hatch green chile enchiladas, carne adovada, and roasted cactus—prepared with pinon nuts and prickly pear glaze,
    reflecting a confident home‑cook who enjoys pairing these dishes with locally brewed craft beers while they occasionally over‑salting recipes in their quest for the perfect flavor balance.
  core: Shou Bohannon is a competitively curious 53‑year‑old operations leader who balances relentless professional ambition with a habit of over‑analyzing finances and health, channeling stress into yoga,
    hiking, and community arts while occasionally letting worry dictate their nightly routine.
background:
  cultural: Shou James Bohannon is a White American whose upbringing reflected a traditional Midwestern Protestant environment, emphasizing self‑reliance, hard work, and community involvement. After moving
    to Santa Fe, he has embraced the city’s rich multicultural tapestry, developing an appreciation for Hispanic and Native American customs. He participates in local celebrations such as the Santa Fe Indian
    Market and the Fiesta de Santa Fe, has learned conversational Spanish, and incorporates regional culinary techniques into his cooking. While he remains grounded in his own cultural heritage, his identity
    now reflects a blend of mainstream American values and the distinctive artistic, linguistic, and spiritual influences of the Southwestern Southwest.
