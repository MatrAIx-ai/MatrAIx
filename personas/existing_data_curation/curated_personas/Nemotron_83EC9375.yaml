  career_goals: Shou aims to transition into a senior executive role—such as Director of Operations or Chief Operating Officer—within the next five years, focusing on driving digital transformation and
    sustainability across the organization. He is passionate about embedding lean principles and emerging technologies (e.g., IoT and predictive analytics) to achieve measurable efficiency gains while reducing
    environmental impact. Parallel to his professional ascent, he seeks to mentor emerging managers, launch a consultancy that helps mid‑size enterprises adopt agile operational frameworks, and cultivate
    a healthier work‑life balance that mitigates his tendency toward stress and worry.
