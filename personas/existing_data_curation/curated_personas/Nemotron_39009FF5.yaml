personas:
  professional: Diana Carter, a seasoned financial advisor specializing in retirement and estate planning, blends analytical rigor with clear, relatable storytelling to guide retirees through budgeting,
    investment portfolios, tax‑efficient strategies, and insurance analysis, while championing empathy, long‑term trust, and community‑oriented service.
  sports: Diana Carter follows the Detroit Lions and the Saginaw Spirit junior hockey team, participates in a senior yoga class at the community center, and makes a habit of walking the River Rouge Trail
    three times a week, using the activity as both exercise and a chance to admire the changing seasons.
  arts: Diana Carter paints watercolors of the Saginaw River, attends the Saginaw Civic Theatre’s productions of classics such as Arthur Miller’s Death of a Salesman, discusses biographies by David McCullough
    in her book club, and delights in the folk stylings of the Detroit‑based duo Trampled by Turtles, weaving artistic appreciation into daily life.
  travel: Diana Carter’s travel itinerary balances historic curiosity and regional loyalty, featuring annual trips to Mackinac Island to wander its Victorian streets, weekend excursions to the Detroit Institute
    of Arts to see works by Diego Rivera, and a cherished yearly pilgrimage to Chicago’s Art Institute to view Grant Wood’s American Gothic.
  culinary: Diana Carter favors hearty, seasonal meals like a simmering heirloom tomato and sweet corn chowder seasoned with fresh rosemary from her garden, enjoys a slice of classic Detroit‑style pizza
    topped with pepperoni and a drizzle of ranch, and indulges in a slice of Michigan cherry pie after a long day of volunteering, though they grudgingly admit to a hidden weakness for extra‑sweet butter
    beans.
  core: Diana Carter, a pragmatic yet curious retirement planner, weaves Midwestern neighborliness, artistic passion, and disciplined financial stewardship into a life anchored by community service, garden‑grown
    meals, and a steady rhythm of yoga, books, and gentle humor.
background:
  cultural: Diana grew up in the heart of Michigan’s Saginaw Valley, raised in a middle‑class, Protestant family of Irish‑German ancestry. The Midwestern values of modesty, hard work, and community service
    shaped her worldview. She attended a public high school where she was exposed to a mix of cultural traditions reflective of the region’s immigrant roots, and she later pursued an arts and humanities
    degree at a state university, deepening her appreciation for literature, history, and cultural expression. Living her entire adult life in Saginaw, she identifies strongly with the local “Lake Effect”
    community spirit—valuing neighborly cooperation, seasonal festivals, and a pragmatic approach to life while maintaining an open curiosity about broader cultural ideas.
attributes:
  skills: '["Personal Financial Planning", "Retirement and Estate Planning", "Tax‑efficient Investment Strategies", "Risk Assessment", "Budgeting and Cash‑flow Management", "Insurance Analysis", "Client
