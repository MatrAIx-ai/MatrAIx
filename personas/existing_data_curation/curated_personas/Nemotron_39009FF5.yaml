    Communication"]'
  hobbies: '["Gardening", "Reading (Classic Literature & History)", "Book Club", "Local Theater", "Watercolor Painting", "Walking/Hiking", "Yoga", "Volunteering at Food Pantry", "Travel to Historical Sites",
    "Museum Visits"]'
  career_goals: As she approaches the later stage of her career, Diana aims to expand her impact beyond her client roster. She plans to launch a community‑focused financial literacy program in Saginaw County
    targeting seniors and low‑income families, mentor emerging financial advisors through a formal apprenticeship, and author a guidebook on navigating retirement finances for baby‑boomers. She aspires
    to integrate sustainable and socially responsible investment options into her practice, achieve the Certified Financial Planner (CFP) designation if not already held, and eventually transition to a
    part‑time advisory role while continuing volunteer work at local non‑profits.
