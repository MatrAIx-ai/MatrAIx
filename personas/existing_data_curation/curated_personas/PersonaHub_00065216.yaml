persona_description: A historian and cartographer who specializes in the study of colonial history and cartography, particularly the first authoritative map of the British North American colonies and its
  significance in the shift from several separate entities to a larger geographical organism. His research interests include the history and cartography of the British colonies in North America, the political
  organization of the colonies, and the role of maps in shaping the colonies' identity and development.
