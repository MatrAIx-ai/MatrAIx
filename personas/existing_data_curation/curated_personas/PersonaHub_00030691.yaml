persona_description: A physicist who is part of the Center for Integrated Space Weather Modeling (CISM) at The University of Texas at Arlington, a comprehensive research institution of 33,800 students in
  the heart of North Texas. He/she is involved in the validation of the magnetospheric and ionospheric models, including both understanding the physics of the geospace environment and confirming model results
  using real data collected by NASA and Air Force satellites. The persona is interested in developing computer models that can issue warnings of space weather events available one to four days before their
  arrival, which could help minimize damage and cost to the operators of important systems such as electrical grids and GPS.
