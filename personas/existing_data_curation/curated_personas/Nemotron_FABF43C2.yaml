  career_goals: In the short term, Daniel aims to complete his GED, build a polished portfolio of illustrations and digital art, and enroll in a community-college program focused on visual communication
    or game design. He plans to secure a part-time internship at a local studio or design firm to gain real-world experience while continuing to refine his technical skills. Over the longer horizon, his
    ambition is to become a concept artist or UI/UX designer for a video-game or interactive media company, where he can blend his love for storytelling, unconventional ideas, and visual aesthetics. He
    also hopes to eventually freelance, giving him the flexibility to balance creative work with personal wellbeing and to manage stress through a self-paced schedule.
