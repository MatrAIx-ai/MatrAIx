personas:
  professional: Daniel Feagin, a 16‑year‑old aspiring concept artist, leverages his strong foundation in traditional drawing, digital illustration on a tablet, and Photoshop layout skills to create surreal
    sci‑fi character designs while meticulously meeting school club deadlines and collaborating on community volunteer art projects.
  sports: Daniel Feagin finds release on the Cuyamaca trails, regularly hiking with a local outdoor club and occasionally joining weekend pick‑up soccer games, while cheering for the San Diego Padres and
    following the NBA’s Los Angeles Lakers for motivation during workouts.
  arts: Daniel Feagin immerses himself in speculative fiction and graphic novels like "Saga" and "Watchmen", draws inspiration from visual masters such as H.R. Giger and Moebius, strums acoustic renditions
    of Bob Dylan and Nick Drake, and spends evenings sketching surreal scenes while listening to synthwave playlists curated by the artist known as "Com Truise".
  travel: Daniel Feagin dreams of traveling to the neon‑lit streets of Tokyo for a Game Developers Conference, has already explored the desert landscapes of Joshua Tree and the coastal cliffs of Big Sur,
    and prefers backpacking itineraries that balance affordable hostels with opportunities to sketch local architecture.
  culinary: Daniel Feagin favors quick, nutritious meals like avocado toast with poached eggs, homemade ramen flavored with miso and sliced pork belly, and enjoys experimenting with a portable blender to
    create fruit‑spiced smoothies while listening to indie folk playlists.
  core: Daniel Feagin is a 16‑year‑old visual‑arts prodigy who balances intense creative ambition with chronic worry, channeling stress into sketchbooks, hikes, and meticulous budgeting for future art school
    dreams.
background:
  cultural: Daniel was raised in La Mesa, a suburban community in San Diego County, in a family of European descent that has lived in Southern California for several generations. The multicultural atmosphere
    of the region—rich with Mexican-American influences, a thriving street-art scene, and a proximity to the Pacific coast—has exposed him to a broad spectrum of artistic expressions and cultural festivals.
    His family values education, community involvement, and self-reliance, which have encouraged his independent learning habits. Growing up near the vibrant Balboa Park museums and local galleries, Daniel
    developed an early appreciation for visual art, while the laid-back Southern-California lifestyle fostered his love for outdoor activities like hiking and surf culture. This blend of Midwestern family
    roots and West-Coast cultural diversity shapes his worldview and artistic sensibilities.
