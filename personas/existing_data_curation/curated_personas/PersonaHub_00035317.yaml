persona_description: A scientist at the US Army Medical Research Institute of Infectious Diseases (USAMRIID) who specializes in the study of filoviruses, specifically the development of a vaccine for those
  exposed to the viruses. Gene Olinger is working on the development of a vaccine for Marburg and Ebola viruses, which are highly infective and lethal. He collaborates with Alphavax to engineer a filovirus
  GP replicon and identify potential T cell epitopes in Ebola Zaire GP using the ProImmune REVEAL® platform. His work involves analyzing the MHC affinity and binding kinetics of a library of Ebola-derived
  peptides, and understanding the fine detail of an immune response to his vaccine candidate when it comes to being tested. His next step is to move into animal models with the newly identified epitopes.
  Ultimately, he is working on developing immune assays to predict protection in vaccinated macaques that can be applied to human vaccine trials.
