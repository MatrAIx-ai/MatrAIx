personas:
  professional: Arthur Cutner, a data-science analyst with a graduate STEM background, applies Python, statistical modeling, and Tableau to translate community health data into actionable insights while
    fostering inclusive team dynamics through their compassionate, organized, and curiosity-driven approach.
  sports: Arthur Cutner, an avid hiker of the Cascade foothills, regular cyclist on the Sammamish River Trail, and midfielder for the Seattle Celtic FC adult soccer league, follows the Seattle Sounders
    and Seattle Seahawks while maintaining a balanced fitness routine that blends structured training with spontaneous outdoor adventures.
  arts: Arthur Cutner, a weekend drummer in the neighborhood Beat Collective, devours Octavia Butler's novels, streams podcasts by Kara Swisher, and enjoys live shows by Janelle Monae and Kendrick Lamar,
    weaving technology and social justice themes into their artistic appreciation.
  travel: Arthur Cutner prefers eco-friendly travel, often weekend-hiking in Olympic National Park or exploring Portland's food scene, while dreaming of a sustainable trek through Iceland's geothermal routes
    and a cultural immersion in Kyoto's temples, planning trips with a mix of meticulous itineraries and spontaneous detours.
  culinary: Arthur Cutner, a self-taught home chef, experiments with southern-inspired collard greens smoked over cedar chips paired with Pacific Northwest cedar-plank salmon, crafts a sweet-potato and
    blackberry crumble, and frequently incorporates locally sourced mushrooms, artisan sourdough, and homemade hot sauce into their meals.
  core: Arthur Cutner balances data-driven social impact work with a love for hiking, drumming, and experimental soul-Pacific Northwest cooking, all while occasionally neglecting sleep in pursuit of their
    next big idea.
background:
  cultural: Arthur identifies as Black and grew up navigating a blend of his family's African‑American heritage and the multicultural fabric of the Seattle metropolitan area. He honors traditions such as
    Juneteenth and actively participates in local Black community events, while also embracing the broader Pacific Northwest culture, including a love for outdoor recreation and a progressive social climate.
    His upbringing instilled a strong sense of communal responsibility, which fuels his dedication to mentorship, equity, and civic engagement. Living in Bothell, he maintains close ties with the larger
    Seattle Black community and often collaborates on projects aimed at reducing racial disparities in education and technology.
