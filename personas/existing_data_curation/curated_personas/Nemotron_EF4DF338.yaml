  career_goals: Arthur aims to channel his technical expertise and compassionate nature into a career that blends technology with social impact. In the short term, he seeks a data‑science or analytics position
    within a nonprofit, public‑sector agency, or socially‑responsible tech firm focused on health equity or environmental sustainability in the Pacific Northwest. Long‑term, he envisions creating community‑focused
    tech education programs that empower underrepresented youth in Seattle‑area neighborhoods and eventually launching a social‑impact startup that uses data‑driven solutions to address local challenges.
    To support these ambitions, he plans to earn certifications in data science, machine learning, and project management while continuing volunteering in community outreach initiatives.
