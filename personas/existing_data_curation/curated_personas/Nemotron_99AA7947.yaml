personas:
  professional: Minu Alicea is a teaching assistant who leverages bilingual fluency, tech‑savvy lesson planning, and an organized yet flexible demeanor to manage classrooms, mentor students one‑on‑one,
    and weave culturally responsive practices into everyday instruction, and they stay curious about new pedagogical tools.
  sports: Minu Alicea enjoys playing forward for the Baytown Soccer Club on weekends, uses salsa and cumbia dance routines as cardio on off‑days, follows the Houston Dynamo for professional soccer inspiration,
    and squeezes in early morning jogs along the Baytown waterfront when they need a quick energy boost.
  arts: Minu Alicea expresses creativity by strumming an acoustic guitar while singing folk‑rock covers by Natalia Lafourcade and Carlos Vives, attends the Baytown Art Festival and community theater productions,
    reads contemporary fiction like The Night Circus and Normal People, and they often incorporate spontaneous dance breaks into tutoring sessions to keep energy high.
  travel: Minu Alicea plans budget‑friendly trips that blend cultural immersion and outdoor adventure, having trekked the hills of Hill Country in Fredericksburg, explored the historic streets of San Antonio’s
    River Walk, and dreamed of a weekend getaway to Oaxaca to study street food markets, while they rely on a mix of last‑minute flight alerts and friends’ recommendations to shape itineraries.
  culinary: Minu Alicea cooks traditional dishes like tamales de elote and rich chicken mole for friends, prefers using dried chiles de árbol and toasted cacao nibs for depth, experiments with a slow‑cooker
    for mole, often adds extra hot sauce for spice, and they love swapping recipes at community potlucks while occasionally burning the edges of a tortilla when dancing too close to the kitchen.
  core: Minu Alicea, a 23‑year‑old bilingual teaching assistant, balances disciplined lesson planning with spontaneous salsa nights, whips up spicy mole for study groups, tracks finances in a spreadsheet,
    but habitually hits snooze on early alarms, leaving them rushing to class with a coffee in hand.
background:
  cultural: Minu grew up in Baytown, Texas, in a bilingual Mexican‑American household where Spanish was spoken at home and English at school. Her family maintains Mexican traditions such as Día de los Muertos,
    quinceañera celebrations, and weekend gatherings centered around homemade Mexican cuisine, while also participating in South Texas community events like the Baytown Waterway Festival. This bicultural
    upbringing instilled in her a strong sense of family, respect for elders, and a commitment to supporting her local Hispanic community. She often incorporates cultural references and bilingual materials
    into her tutoring sessions to create a more relatable and affirming learning experience for her students.
