  career_goals: Minu aims to earn a Bachelor of Science in Education within the next two years and become a certified teacher, preferably in bilingual or ESL education. She hopes to specialize in culturally
    responsive pedagogy, develop after‑school enrichment programs for Hispanic youth, and eventually pursue a master’s degree in educational leadership to move into curriculum development or school administration.
    Her long‑term ambition is to shape inclusive school policies that honor the diverse cultural backgrounds of her students while maintaining high academic standards.
