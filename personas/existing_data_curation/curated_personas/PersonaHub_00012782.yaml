persona_description: A person who is responsible for coordinating and managing the response and recovery efforts for environmental pollution events, particularly oil spills, for the National Oceanic and
  Atmospheric Administration (NOAA) Office of Response and Restoration. She has nearly 12 years of experience responding to and conducting damage assessments for various environmental pollution events and
  managing NOAA's Arctic policy portfolio. She has a unique understanding of the challenges and complexities involved in responding to oil spills and has expertise in developing and implementing effective
  response strategies.
