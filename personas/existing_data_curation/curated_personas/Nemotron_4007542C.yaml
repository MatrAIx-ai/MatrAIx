  career_goals: Anuj dreams of turning his love for art and technology into a future career, hoping to become an illustrator or video‑game designer who creates vibrant worlds for others. He is fascinated
    by how stories can be told through pictures and interactive media, and he aspires to study animation or computer science in high school. He also imagines exploring environmental science, motivated by
    his curiosity about nature during park walks.
