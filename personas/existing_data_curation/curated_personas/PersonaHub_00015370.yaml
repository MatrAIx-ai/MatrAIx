persona_description: A paleontologist specializing in the study of marine fossils, particularly those from the Cambrian period. Their research focuses on the analysis and interpretation of the morphology,
  stratigraphy, and biostratigraphy of marine invertebrates, particularly those that lived in shallow waters. They have a keen eye for detail and a deep understanding of the evolutionary history of marine
  life. They are particularly interested in the evolution of marine invertebrates and the impact of their fossils on our understanding of the past. They are also skilled in the use of computer software
  and have a strong interest in the use of new technologies in paleontology.
