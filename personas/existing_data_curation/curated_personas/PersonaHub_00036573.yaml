persona_description: A researcher who studies the effects of prenatal exposure to selective serotonin reuptake inhibitors (SSRIs) on adolescent depression and the potential risks of antidepressant use during
  pregnancy. They are interested in balancing the risks and benefits of antidepressant use and are aware of the potential for adverse effects on both mother and fetus. They are also interested in the impact
  of family history of mental disorders on the risk of developing mental illnesses in offspring and are looking for treatment options for youth at risk for bipolar disorder.
