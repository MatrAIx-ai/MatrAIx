personas:
  professional: Yaine Noyola, an eager budding game developer who builds interactive Scratch projects for friends, blends curiosity with practical problem‑solving and enjoys collaborating on class coding
    clubs, though they often leave their code folders a messy tangle and procrastinate on polishing documentation.
  sports: Yaine Noyola, a spirited midfielder on the San Antonio Youth Soccer League team, enjoys sprinting up the field with teammates and cheering for the local professional club San Antonio FC, while
    they skip formal strength drills in favor of spontaneous pick‑up games at the park.
  arts: Yaine Noyola, a graphic‑novel fanatic who devours titles like "Saga" and "Bone" and practices folkloric dance in vibrant regional costumes, finds inspiration in the rhythms of Los Lobos and the
    storytelling of author Neil Gaiman, yet they sometimes lose track of time sketching in the River Walk instead of finishing homework.
  travel: Yaine Noyola, an adventurous weekend explorer, loves strolling the San Antonio River Walk, camping under the stars in Hill Country, and dreaming of a future trip to the historic streets of San
    Miguel de Allende, often planning trips on a whim rather than with a rigid itinerary.
  culinary: Yaine Noyola, a budding home‑chef who helps prepare tamales and pozole with the family, delights in the aroma of freshly made corn tortillas, and experiments with simple salsa recipes using
    cilantro, jalapeño, and lime, though they occasionally over‑season dishes in an enthusiastic attempt to impress friends.
  core: Yaine Noyola blends curiosity, compassion, and a laid‑back vibe into a lively twelve‑year‑old who codes games, scores goals, dances folk steps, and dreams of future adventures while juggling a messy
    desk and spontaneous snack cravings.
background:
  cultural: Yaine is raised in a Mexican‑American household in San Antonio’s Westside, where Spanish and English flow interchangeably at home. Family gatherings are centered around traditional Mexican foods
    like tamales, pozole, and freshly made tortillas, and celebrations such as Día de los Muertos and Cinco de Mayo are observed with colorful altars, music, and dance. Her grandparents share stories of
    rural Mexico, instilling pride in her heritage and an appreciation for communal values like respeto (respect) and comunidad (community). She participates in local cultural events, including Fiesta San
    Antonio and a weekend folkloric dance class that teaches regional costumes and choreography. Catholic traditions and the emphasis on giving back to the neighborhood shape her worldview, reinforcing
    her desire to help others and maintain harmony.
