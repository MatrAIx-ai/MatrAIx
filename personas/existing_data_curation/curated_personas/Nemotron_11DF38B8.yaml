  career_goals: Yaine envisions a future where she can turn her love for science, animals, and helping people into a career that blends curiosity with service. She hopes to become a pediatric veterinarian,
    allowing her to care for children’s pets while using her calm demeanor to ease anxious families. At the same time, she dreams of participating in community health projects in San Antonio, such as organizing
    school‑based wellness workshops or a neighborhood garden that teaches kids about nutrition and ecology. She wants a flexible role that lets her stay creative, work with diverse groups, and make a tangible
    positive impact on her community.
