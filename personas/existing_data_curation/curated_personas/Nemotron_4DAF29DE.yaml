  career_goals: Samantha dreams of a future where she can combine her love of structure, problem solving, and caring for living things. She is fascinated by careers such as veterinarian, aerospace engineer,
    or research scientist, imagining herself leading science projects, competing in math contests, and eventually contributing to space exploration or animal health. Her competitive nature fuels an ambition
    to excel academically and earn recognition in science fairs and school competitions, laying a foundation for a career that blends practicality with discovery.
