  hobbies: '["Basketball","Ultimate Frisbee","Cooking Southern Soul Food","Attending Live Music Events","Exploring Atlanta Food Scene","Youth Financial‑Literacy Volunteering","Juneteenth & Black History
    Month Celebrations","Business Leadership Podcasts","Reading Contemporary Fiction"]'
  career_goals: Alberto aims to become an Operations Manager within the next three years, followed by a promotion to Director of Business Operations as he gains more strategic experience. He plans to earn
    a PMP certification and a Six Sigma Black Belt to deepen his expertise. Long‑term, he envisions leading a regional operations division for a mid‑size company or launching his own consulting firm that
    helps local Black‑owned businesses improve efficiency. He also hopes to mentor emerging talent from his community and champion diversity initiatives within his organization while maintaining a healthy
    work‑life balance with his spouse.
