personas:
  professional: Sylvester Lee, a 55-year-old community-oriented handyman, blends hands-on repair expertise with event-coordination experience, using their love of structure to run efficient volunteer projects
    while allowing enough flexibility for spontaneous neighborhood gatherings.
  sports: Sylvester Lee hits the local park for pickup basketball with the Miami Heat fan crew, follows the Orlando Magic season, enjoys weekend fishing trips on the Caloosahatchee River, and participates
    in a community softball league, balancing active play with occasional bouts of friendly rivalry.
  arts: Sylvester Lee's evenings are filled with classic R&B and gospel from Aretha Franklin, Marvin Gaye, and Sam Cooke, they often sing along during church choir rehearsals and keep a collection of vintage
    vinyl records that shape their soulful outlook.
  travel: Sylvester Lee prefers relaxed road trips, frequently driving to the Florida Keys or the historic streets of New Orleans, dreaming of a future visit to Memphis's blues museums while budgeting travel
    around community commitments and occasional family gatherings.
  culinary: Sylvester Lee delights in cooking soulful dishes like collard greens, fried catfish, cornbread, and sweet potato pie, using fresh tomatoes and okra from their backyard garden, though they sometimes
    over-indulge in butter-laden recipes during neighborhood potlucks.
  core: Sylvester Lee is a socially vibrant, structure-loving handyman who balances community devotion with a worry-prone mind, often juggling neighborhood events, soulful cooking, and an ever-growing garden
    while occasionally slipping into relaxed disorganization.
background:
  cultural: Sylvester is an African‑American born and raised in the South, whose identity is shaped by the church, family gatherings, and Southern Black cultural traditions. Growing up in a close‑knit Black
    community in Florida, he was immersed in gospel music, soul‑food cooking, and the tradition of mutual aid among neighbors. These cultural influences have informed his communication style, his love for
    communal events, and his emphasis on respect and hospitality. While he has navigated economic challenges, his cultural heritage remains a source of resilience, pride, and social connection.
attributes:
  skills: '[''interpersonal communication'', ''conflict mediation'', ''event planning and coordination'', ''basic carpentry and home repair'', ''vehicle maintenance'', ''budgeting and personal finance management'',
    ''computer literacy (Microsoft Office, email)'', ''team leadership and volunteer coordination'']'
  hobbies: '[''pickup basketball'', ''fishing'', ''gardening'', ''cooking soul-food'', ''listening to classic R&B and gospel music'', ''playing card games'', ''reading self-help books on stress management'',
    ''volunteering at community garden'']'
  career_goals: Sylvester is looking to re‑enter the workforce in a role that blends his practical skills with his love of community. He aims to obtain a certification in home‑maintenance or senior companion
    care so he can start a part‑time business providing affordable repairs and companionship to older residents in Lehigh Acres. He also hopes to volunteer as an event organizer for the local community
    center, eventually moving into a paid coordinator position. Achieving a stable, predictable schedule while retaining the flexibility to work with friends and family is a central ambition.
