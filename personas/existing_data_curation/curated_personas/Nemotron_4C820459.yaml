  hobbies: '[''Hiking'', ''Historical Site Exploration'', ''Reading (Non-fiction & Classics)'', ''Acoustic Guitar'', ''Jam Sessions'', ''Photography'', ''Volunteer Literacy Tutoring'', ''Micro-learning
    App Prototyping'', ''Traveling to New England Towns'']'
  career_goals: Daniel aims to advance into a senior learning strategy role where he can shape enterprise-wide development programs for a mid-size technology firm in the Boston area. He plans to earn the
    Certified Professional in Learning and Performance (CPLP) credential and later pursue a Master’s in Education to deepen his theoretical foundation. He is driven to create innovative blended learning
    solutions that marry his curiosity for new technologies with practical impact on business performance. Over the next five years, he envisions becoming a recognized thought leader in experiential training,
    speaking at regional conferences, publishing case studies, and potentially launching a boutique consultancy that helps small-to-medium businesses implement flexible, outcome-focused learning ecosystems.
