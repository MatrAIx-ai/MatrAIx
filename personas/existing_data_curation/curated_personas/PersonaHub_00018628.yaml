persona_description: A historian who specializes in the study of ancient Indian and Central Asian art, particularly the Gandharan School of sculpture. His research interests include the stylistic characteristics
  and artistic techniques of the Gandharan School, the cultural and historical context in which the school emerged, and the impact of external influences such as Buddhism and Roman art on the school's development.
  He is also interested in the role of Gandharan art in the spread of Buddhism and the influence of Gandharan art on subsequent art movements in India and beyond.
