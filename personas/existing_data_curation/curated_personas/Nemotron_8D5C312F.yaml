  hobbies: '[''Cooking Dominican cuisine'', ''Bachata and merengue dancing'', ''Community volunteering'', ''Gardening'', ''Walking in local parks'', ''Attending Dominican cultural festivals'', ''Reading
    romance novels'', ''Knitting'', ''Watching telenovelas'']'
  career_goals: Acela aims to strengthen her qualifications by completing a GED and pursuing a certificate in supply‑chain or warehouse management. She hopes to move into a shift‑lead or inventory‑supervisor
    role, where she can apply her organized, methodical strengths while mentoring younger, bilingual coworkers. A key ambition is to secure a schedule that offers more predictability and reduces physical
    strain, allowing her to maintain financial stability and continue supporting her community. She also plans to volunteer as a trainer for new hires at her store, sharing her expertise and fostering a
    supportive work environment.
