  hobbies: '[''reading literature and scientific biographies'', ''gardening (herbs and vegetables)'', ''cooking Mexican cuisine'', ''volunteering for STEM outreach'', ''senior‑center book club'', ''yoga
    and tai chi'', ''jigsaw puzzles'', ''crossword puzzles'']'
  career_goals: Although retired from formal employment, Ana remains committed to leveraging her STEM background to empower the next generation of Latina engineers and scientists. Her primary goal is to
    design and lead a community‑based mentorship program in Los Angeles that provides hands‑on STEM experiences for high‑school students. She also aims to author a series of practical guidebooks that translate
    scientific thinking into everyday problem solving, and to stay intellectually active by participating in senior research clubs and continuing‑education courses. On a personal level, she aspires to maintain
    her independence through regular low‑impact exercise, such as walking and gentle yoga, and to deepen her involvement with local cultural and educational nonprofits.
