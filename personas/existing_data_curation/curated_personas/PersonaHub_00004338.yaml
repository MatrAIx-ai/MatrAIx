persona_description: A researcher or policy maker interested in the education and economic development of young people, particularly in the context of skill formation and investment over the life-cycle.
  This individual is likely to have a background in economics, psychology, or education and is interested in understanding how noncognitive skills, such as self-efficacy and social skills, interact with
  cognitive skills in the development of skills in young people. They may be interested in the latest research on optimal timing of investment in young people's education and the impact of various interventions
  on skill formation.
