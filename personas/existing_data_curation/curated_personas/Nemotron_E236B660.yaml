personas:
  professional: Geetanjali Omar, a seasoned industrial engineer with two decades of occupational health and safety expertise, they blend systematic risk assessment with Lean Six Sigma, leveraging bilingual
    fluency to train culturally diverse workforces while eyeing a Director role within a multinational firm.
  sports: Geetanjali Omar, an energetic walker who logs daily loops around Prospect Park and practices yoga three times a week, they cheer for the Brooklyn Nets and the New York Knicks, and they belong
    to a local community garden’s fitness club that organizes weekend bowling socials.
  arts: Geetanjali Omar, a charismatic leader of a Bollywood dance troupe that stages monthly performances in Williamsburg, they enjoy listening to artists like Shreya Ghoshal and A.R. Rahman, attend contemporary
    fiction readings featuring Colson Whitehead, and find inspiration in the street art of Bushwick.
  travel: Geetanjali Omar, a reflective traveler who prefers culturally immersive trips, they have revisited family homelands in South Asia and explored Morocco’s souks, while planning a future pilgrimage
    to historic sites in Turkey and a weekend getaway to the Catskills with fellow dancers.
  culinary: Geetanjali Omar, a devoted home chef who expertly prepares biryani, paneer tikka, and samosa using fresh garam masala, cardamom, and chillies, they host monthly cooking circles where friends
    sample masoor dal and mango lassi, though they sometimes over‑salt dishes in their enthusiasm.
  core: Geetanjali Omar, a detail‑driven safety engineer who balances rigorous risk management with vibrant community dance, yoga, and cooking, while juggling anxiety‑driven worry and a generous spirit.
background:
  cultural: Geetanjali belongs to the South Asian diaspora, born to Indian Muslim parents who immigrated to the United States in the 1970s. She grew up bilingual, speaking Hindi/Urdu at home while mastering
    English in school, and she celebrates both Islamic festivals such as Eid and South Asian cultural celebrations like Diwali and Holi. Her upbringing in a close‑knit immigrant community in New York has
    instilled a strong sense of family, respect for tradition, and an appreciation for cultural diversity. Living in Brooklyn, she actively participates in local South Asian cultural organizations, bridging
    her heritage with the multicultural fabric of the city.
attributes:
  skills: '[''Industrial Safety Engineering'', ''Risk Assessment and Mitigation'', ''Ergonomic Design'', ''Lean and Six Sigma Process Optimization'', ''Regulatory Compliance (OSHA, EPA)'', ''Project Management'',
    ''Stakeholder Training and Communication'', ''Data Analysis (Excel, PowerBI)'', ''Emerging Safety Technologies (IoT sensors)'', ''Bilingual Communication (English, Hindi/Urdu)'']'
  hobbies: '[''Bollywood dance classes and troupe leadership'', ''Cooking Indian cuisine for gatherings'', ''Yoga and mindfulness meditation'', ''Walking in Prospect Park'', ''Community gardening in Brooklyn'',
    ''Volunteering at local health fairs'', ''Reading contemporary fiction'', ''Attending cultural festivals and community events'']'
  career_goals: Geetanjali aims to advance to a senior leadership role such as Director of Occupational Health and Safety within the next five years, overseeing enterprise-wide safety strategy for a multinational
    corporation. She plans to earn her Certified Safety Professional (CSP) credential and complete a bachelor’s degree in engineering to solidify her technical foundation. Concurrently, she hopes to develop
    a community-focused safety outreach program in Brooklyn that educates small-business owners and immigrant workers about workplace health standards. Her long-term ambition includes mentoring the next
    generation of safety engineers, particularly women and individuals from underrepresented backgrounds.
