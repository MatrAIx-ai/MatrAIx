personas:
  professional: Marco Garciarodriguez works as a seasoned construction laborer on Bronx sites, leveraging his concrete finishing and framing expertise while mentoring crews, and channels his curiosity and
    love for sustainable design into a push for eco‑friendly practices as they work toward a foreman role and OSHA trainer certification.
  sports: Marco Garciarodriguez plays in a local Bronx recreational soccer league on Saturdays, follows the New York City FC and the New York Knicks, and complements the high‑intensity matches with twice‑weekly
    yoga sessions to stay flexible and manage stress, which they credit for balancing the physical demands of construction work.
  arts: Marco Garciarodriguez spends weekends sketching murals in the Bronx, drawing inspiration from artists like Swoon, JR, and Banksy, and unwinds by playing acoustic renditions of Nick Dock’s folk songs
    and John Mayer’s bluesy chords on their battered guitar.
  travel: Marco Garciarodriguez prefers short, purpose‑driven trips that blend art and sustainability, such as a weekend workshop in Berlin’s street‑art district, a family visit to Quito to explore culinary
    roots, and an annual hike through the Catskills, always planning with a mix of spontaneity and a tight budget, which they find rejuvenating after hectic workweeks.
  culinary: Marco Garciarodriguez enjoys cooking traditional Ecuadorian ceviche with lime, cilantro, and fresh shrimp, as well as hearty encebollado with fish, yuca, and onions, and maintains a moderate
    cooking skill level that lets them host weekly dinner gatherings for friends, often pairing meals with a chilled bottle of Pilsner.
  core: Marco Garciarodriguez, a 38‑year‑old construction professional, fuses a love for street art, sustainable building, and community cooking while wrestling with chronic stress and a habit of over‑committing
    to volunteer projects, which they manage with a perpetual to‑do list.
background:
  cultural: Marco grew up in a Colombian‑Ecuadorian household in the Bronx, where Spanish was spoken at home and English dominated school and work. He maintains strong ties to his heritage through family
    gatherings that feature Andean music, folkloric dances, and cuisine. The vibrant Latino community of the Bronx shaped his collaborative spirit and his commitment to mutual aid, while his exposure to
    New York’s multicultural art scene cultivated his appreciation for unconventional ideas. Balancing traditional values of family, respect, and community with the fast‑paced urban environment has given
    him a flexible identity that informs both his personal life and professional aspirations.
attributes:
  skills: '[''Concrete finishing'', ''Framing and carpentry'', ''Power‑tool operation'', ''Blueprint reading'', ''Safety compliance (OSHA)'', ''Material inventory management'', ''Team coordination'', ''Problem
