  hobbies: '[''Street art exploration'', ''Urban sketching'', ''Playing acoustic guitar'', ''Cooking traditional Ecuadorian dishes'', ''Recreational soccer'', ''Volunteer construction projects'', ''Reading
    architectural magazines'', ''Yoga for stress relief'']'
  career_goals: Marco aims to transition from laborer to foreman within the next three years, earning an OSHA trainer certification and a construction‑management associate degree. He dreams of launching
    a small, community‑focused contracting firm that incorporates eco‑friendly techniques and offers affordable housing solutions for Bronx residents. Long‑term, he hopes to combine his love of art and
    building by overseeing projects that integrate public murals and green spaces, while also advocating for mental‑health resources for construction workers.
