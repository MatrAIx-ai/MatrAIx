persona_description: A paleontologist and researcher who specializes in the study of dinosaur embryos and their development, particularly focusing on sauropod dinosaurs and their growth patterns. His work
  involves comparing the skeletal bones of sauropodomorphs with those of modern birds and crocodiles, and through microscopy and synchrotron imaging of the bones. He has found a bone bed in China's southern
  Yunnan Province that contains the oldest collection of dinosaur embryos yet found, which helps explain why these dinosaur giants grew so big.
