personas:
  professional: Jerilyn Randall, a 20‑year‑old fast‑food associate, leverages meticulous organization, pragmatic curiosity, and a fiercely competitive streak to master cash handling, POS efficiency, inventory
    tracking, and staff training, positioning them for swift promotion to shift supervisor and, eventually, restaurant manager.
  sports: Jerilyn Randall channels their competitive edge into weekend hikes along the Gallatin River with the Gallatin Trail Runners, joins a seasonal indoor rock‑climbing league, and follows the Denver
    Broncos and Montana Grizzlies, treating each workout as a data‑driven challenge to be logged and optimized.
  arts: Jerilyn Randall captures wilderness moments with a DSLR inspired by Ansel Adams, curates a personal soundtrack of Bon Iver and The Lumineers while editing photos, and volunteers at a local art gallery
    to organize community photography exhibits, weaving visual and auditory art into their reflective routine.
  travel: Jerilyn Randall plans getaways with spreadsheet precision, favoring meticulously mapped weekend trips to Yellowstone and Glacier National Parks, while day‑dreaming about a future trek to Patagonia’s
    Torres del Paine once finances allow.
  culinary: Jerilyn Randall, an adept home cook, reinvents classic fast‑food dishes by swapping beef patties for quinoa‑lentil burgers, baking sweet‑potato fries with smoked paprika, and crafting cauliflower‑crust
    pizza topped with avocado and sriracha, all while savoring a strong cup of artisanal coffee.
  core: Jerilyn Randall is a 20‑year‑old organized go‑getter whose competitive fire is tempered by chronic over‑thinking, turning spreadsheets into life hacks from fast‑food counters to mountain trails.
background:
  cultural: Jerilyn is a white American raised in Livingston, Montana, a small town with deep ties to the American West. Her family values self‑reliance, hard work, and community involvement, reflecting
    the region's frontier heritage. She grew up attending a local public high school where community events, such as county fairs and volunteer clean‑up projects, reinforced a sense of collective responsibility.
    Though her upbringing is generally modest and pragmatic, she has been exposed to the natural beauty of the Rockies and the cultural traditions of nearby Native American communities, which she respects
    and occasionally explores through local art and festivals. Her cultural identity blends traditional rural Midwestern values with an openness to new ideas, shaped by her curiosity and practical outlook.
