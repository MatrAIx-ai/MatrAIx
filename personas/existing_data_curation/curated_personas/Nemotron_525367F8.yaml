  career_goals: Driven by her competitive nature and high standards, Jerilyn aims to be promoted to shift supervisor within the next year and then to restaurant manager within three years. She plans to
    enroll in a community college business program to gain formal management training and eventually acquire a franchise ownership in the fast‑casual sector. Her long‑term ambition includes opening a locally
    sourced café that blends her curiosity for new culinary ideas with practical, sustainable operations, while also mentoring other young workers from rural backgrounds.
