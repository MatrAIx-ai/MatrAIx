  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Reading technical and personal-development books'', ''Cooking Mexican cuisine'', ''Listening to norteño and classic rock music'', ''DIY home-improvement
    projects'']'
  career_goals: Alejandro aims to transition from first-line supervisor to construction manager within the next five years. He plans to earn a NCCER certification and complete an associate degree in construction
    management through a local community college, leveraging his practical experience. Long-term, he hopes to obtain a general contractor's license and launch his own small, family-owned construction firm
    that can serve the growing residential market in Catawba County while providing employment opportunities for bilingual workers. He also aspires to integrate sustainable building practices and become
    known for delivering high-quality, on-time projects.
