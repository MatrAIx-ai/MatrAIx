persona_description: A historian who specializes in the study of English history, particularly the period between the Reformation and the 19th century. His research interests include the history of English
  churches, the decline and fall of monasteries and cathedrals, the suppression of pilgrimages, the migration of populations, and the destruction of churches due to urbanization and the value of their site.
  He is particularly interested in the role of churches in the social and religious life of the English people during this period. He has a deep understanding of the history and architecture of English
  churches, and is knowledgeable about the social and cultural contexts in which they were built and used. He is also knowledgeable about the political and economic factors that influenced the decline and
  fall of monasteries and cathedrals, and the suppression of pilgrimages.
