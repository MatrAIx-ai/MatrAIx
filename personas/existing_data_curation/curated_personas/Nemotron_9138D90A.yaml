  career_goals: Samuel aims to transition into a sales leadership role within the next three years, targeting a regional sales manager position where he can shape strategy, mentor new reps, and drive growth
    across multiple territories. He is also considering earning a bachelor's degree in business administration to solidify his expertise and potentially pursue a director of sales position in the future.
    Samuel aspires to leverage his network and industry knowledge to develop a new line of sustainable product offerings, aligning with market demand for eco‑friendly solutions. In the longer term, he envisions
    launching his own wholesale distribution firm that emphasizes personalized service and community partnerships in the Lowcountry region.
