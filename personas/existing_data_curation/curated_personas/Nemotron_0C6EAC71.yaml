personas:
  professional: An ambitious BIM coordinator, Nida Nguyen, combines expert-level mastery of AutoCAD, Revit, and SolidWorks with a disciplined, methodical workflow to deliver precise construction documents
    while infusing each project with the creative flair inspired by the Bay Area’s vibrant art scene, and they consistently mentor junior drafters to bridge technical rigor with aesthetic sensitivity.
  sports: An outdoor enthusiast, Nida Nguyen, spends weekends hiking the coastal trails of Pacific‑a‑Mare, joins a local beach‑volleyball league with friends, follows the Golden State Warriors avidly, and
    practices yoga at a downtown studio to maintain flexibility and balance, which they view as the perfect complement to their active lifestyle.
  arts: A dedicated arts aficionado, Nida Nguyen, frequents gallery openings in the Mission district, collects limited‑edition prints by artists such as Shepard Fairey and Kehinde Wiley, curates a personal
    photography portfolio of urban architecture and coastal landscapes, and they regularly volunteer to teach drafting basics at community centers, weaving their technical eye into creative expression.
  travel: A curious traveler, Nida Nguyen, plans weekend getaways to coastal gems like Big Sur and Napa Valley, dreams of a cultural immersion trip to Hoi An to explore culinary roots, frequently uses Airbnb
    to stay in local neighborhoods, and balances their wanderlust with budgeting constraints by leveraging credit‑card travel rewards, which they meticulously track.
  culinary: A passionate home‑cook, Nida Nguyen, masterfully prepares pho, bun cha, and bánh mì with fusion twists that incorporate California avocado and smoked salmon, revels in sourcing fresh herbs from
    the Ferry Plaza market, enjoys experimenting with lemongrass‑infused sauces, and they often host dinner parties for friends at their Bay Area apartment, though they sometimes over‑spice dishes in the
    excitement of trying new flavors.
  core: Nida Nguyen is a meticulous, art‑driven BIM professional who balances disciplined project execution with spontaneous cultural indulgences, mentoring others while staying tethered to yoga, hiking,
    and a love for experimental cooking, even if occasional over‑spicing and gallery splurges reveal a playful, imperfect side.
background:
  cultural: Nida is a second‑generation Vietnamese‑American who grew up in the culturally diverse suburbs of the Bay Area. Her family retains strong ties to Vietnamese traditions—celebrating Tet, practicing
    communal meals, and valuing education and harmony. These values shape her collaborative work style and her dedication to community service. While fully integrated into American society, she actively
    participates in local Vietnamese cultural festivals, preserving her heritage while embracing the multicultural fabric of Fremont.
attributes:
  skills: '["AutoCAD", "Revit", "SolidWorks", "Bluebeam", "BIM coordination", "California Title 24 compliance", "Technical documentation", "3D modeling", "Detail drafting", "MS Project scheduling", "Bilingual
    communication (English/Vietnamese)"]'
  hobbies: '["Visiting art galleries and street art tours", "Cooking Vietnamese and fusion cuisine", "Hiking coastal and mountain trails", "Yoga and mindfulness practice", "Photography (architectural and
    nature)", "Community volunteering (drafting workshops for youth)"]'
  career_goals: Nida aims to transition from senior drafter to BIM Manager within the next three years, leading cross‑disciplinary teams on large‑scale commercial projects. She plans to earn a professional
    certification in BIM (e.g., Autodesk Certified Professional) and attend continuing‑education workshops on sustainable design. Long‑term, she aspires to leverage her technical foundation into a design‑lead
    role, contributing innovative, art‑inspired solutions while mentoring emerging drafters, especially those from underrepresented backgrounds.
