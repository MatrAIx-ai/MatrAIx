personas:
  professional: Minnie Montgomery, a veteran audiovisual technician turned senior consultant, blends three decades of hands‑on AV system installation with a knack for translating tech jargon into plain
    language, and they now mentor younger technicians while designing community‑focused AV projects that marry practical problem‑solving with artistic flair.
  sports: Minnie Montgomery enjoys staying active through weekly community bowling league sessions at Brookhaven Lanes, roots for the Atlanta Falcons, Atlanta Braves, and Atlanta Hawks, and they occasionally
    hike the Pine Mountain trail in the summer, balancing casual competition with low‑impact exercise.
  arts: Minnie Montgomery immerses herself in the arts by handling lighting rigs for Lawrenceville Community Theater, curating a personal collection of vintage speakers, painting watercolor pine‑forest
    scenes inspired by folk artists like Grandma Moses, and they attend quarterly exhibitions featuring outsider artists such as Howard Finster, all of which color their social gatherings and tech‑and‑tunes
    meet‑ups.
  travel: Minnie Montgomery prefers road‑trip adventures with a sprinkle of spontaneity, often revisiting the Georgia Peach Festival in Fort Valley, exploring Asheville’s Blue Ridge art scene, savoring
    Savannah’s historic squares, and they dream of a weekend in New Orleans’ French Quarter, while their limited budget and desire for family time steer them toward short, affordable getaways rather than
    extended overseas tours.
  culinary: Minnie Montgomery’s palate is anchored in Southern comfort foods—peach cobbler, fried chicken, and shrimp‑and‑grits—while their garden yields fresh tomatoes, basil, and thyme that they use to
    craft homemade tomato bisque and herb‑infused vinaigrette, and they occasionally experiment with a Cajun jambalaya or a simple caprese salad for variety.
  core: Minnie Montgomery blends a lifelong love for hands‑on tech with an artistic curiosity, juggling a penchant for spontaneous garage‑sale treasure hunts and a habit of over‑thinking every detail, and
    they often battle occasional worry‑induced insomnia.
background:
  cultural: Minnie grew up in a middle‑class, white, Anglo‑American family in suburban Atlanta during the 1960s and ’70s. Her upbringing was shaped by the Southern hospitality of Georgia’s small communities,
    with strong emphasis on church fellowship, family gatherings, and community service. She carries the traditions of Southern cuisine—her family’s famous peach cobbler and fried chicken—and enjoys seasonal
    festivals like the Georgia Peach Festival, where she often volunteers. Her cultural identity is rooted in the values of hard work, self‑reliance, and practical problem‑solving that are common in the
    region’s blue‑collar heritage, while also embracing the growing multicultural influences of Gwinnett County’s diverse population through her interactions at work and in community art events.
attributes:
  skills: '[''Audiovisual system installation and configuration'', ''Troubleshooting and repair of audio and video equipment'', ''Cable management and structured wiring'', ''Live event production setup
    (sound, lighting, video)'', ''Projector and display calibration'', ''Audio mixing and signal routing'', ''Basic networking and AV‑over‑IP integration'', ''Technical customer support and training'',
    ''Designing user‑friendly AV layouts for community events'', ''Equipment inventory management'']'
  hobbies: '[''Volunteer stagehand for community theater'', ''Visiting local art galleries and folk art fairs'', ''Watercolor painting of natural scenes'', ''Collecting vintage audio equipment'', ''Hosting
    “tech‑and‑tunes” meetups'', ''Gardening (vegetable and herb garden)'', ''Yoga and mindfulness practice'', ''Board game nights with friends'', ''Karaoke singing in local venues'', ''Exploring new AV
    technology trends'']'
  career_goals: At 55, Minnie aims to transition from day‑to‑day installation work to a senior consulting role where she can mentor younger technicians and lead larger community‑focused AV projects. She
    plans to earn an AVIXA Certified Technology Specialist (CTS) certification to formalize her extensive practical knowledge and to open doors to project management opportunities with local schools and
    churches. In the longer term, she hopes to launch a boutique consulting firm that offers bespoke audiovisual design services for folk art festivals and regional theater groups, allowing her to merge
    her technical skill set with her love of art and community engagement. She also seeks a more predictable schedule to reduce stress and improve work‑life balance, aiming for a role that balances hands‑on
    work with strategic planning.
