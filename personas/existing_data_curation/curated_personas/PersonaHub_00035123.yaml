persona_description: A medical professional who specializes in the field of urology, focusing on the evaluation, diagnosis, and treatment of urinary tract disorders. They are skilled in the removal of wastes
  from the body through the process of urination, and are knowledgeable in the breakdown of proteins and the elimination of urea, excess water, and other materials from the body. They are also familiar
  with the function of the kidneys, the formation of urine, and the role of the urinary bladder in storing urine before elimination from the body. They may also be involved in the management of urinary
  tract infections and other related conditions.
