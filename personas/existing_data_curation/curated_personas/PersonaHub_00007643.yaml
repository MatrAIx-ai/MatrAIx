persona_description: A historian who specializes in the study of the African-American experience during the Great Depression, World War II, and the early Cold War. She is particularly interested in the
  black left, including the Southern Negro Youth Council (SNYC) and the Council of African Affairs (COAA), and how they collaborated with anticommunist rhetoric to mobilize for decolonization efforts abroad
  and greater civil rights attention at home. Her work details the connections between segregation at home and colonization abroad, and how each perspective informed the other, with a focus on the role
  of anticommunist repression in stifling these organizations' success.
