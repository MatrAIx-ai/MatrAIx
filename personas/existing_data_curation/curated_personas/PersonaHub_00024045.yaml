persona_description: A teacher who is passionate about teaching children about science, technology, engineering, arts, and mathematics (STEAM) through fun and engaging activities suitable for preschool
  to 5th grade. The teacher is skilled in adapting STEAM lessons to various developmental levels of students, and is inspired by children's books such as "Iggy Peck Architect" and "Rosie Revere, Engineer!"
  to create innovative STEAM projects. The teacher is also interested in the study of biomimicry and how engineers can use nature-inspired designs to enhance their own designs. The teacher is dedicated
  to teaching children how to draw and read maps using symbols and legends, as well as observing their surroundings thoughtfully using their senses. The teacher is also interested in teaching children about
  solids dissolving in water, designing and building nests, and creating wet suits for animals to stay dry in water.
