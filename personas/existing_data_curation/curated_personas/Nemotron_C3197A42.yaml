personas:
  professional: Peter Tomajko, a seasoned electrician with three decades mastering NEC compliance, smart‑home automation, solar PV and EV‑charging installations, channels his structured, safety‑first mindset
    and compassionate mentorship into leading crews, mentoring apprentices, and steering his forthcoming niche firm toward reliable, community‑focused energy solutions.
  sports: Peter Tomajko follows the New York Yankees, cheers for the New England Patriots during football season, and is a member of the Fairfield County Senior Fishing Club, combining weekend fishing trips
    at Buckeye Lake with occasional low‑impact cardio walks to stay fit.
  arts: Peter Tomajko enjoys listening to Bob Dylan and Johnny Cash on his vintage phonograph, appreciates John Coltrane's jazz improvisations, and occasionally visits local art fairs featuring works by
    Mary Cassatt, finding these creative moments a soothing counterpoint to his technical career.
  travel: Peter Tomajko plans trips meticulously, having driven to the historic streets of Colonial Williamsburg and hiked Acadia National Park’s cliffs, while dreaming of strolling through Tuscany’s vineyards,
    always balancing budget constraints with a yearning for immersive historical experiences.
  culinary: Peter Tomajko prefers home‑cooked comfort meals like slow‑braised pot roast with carrots, potatoes, and rosemary, grills fresh lake trout seasoned with lemon and dill, and crafts garden salads
    with heirloom tomatoes and feta, boasting solid cooking skills but occasionally over‑salting due to his meticulous nature.
  core: Peter Tomajko, a meticulous 57‑year‑old electrician turned mentor, balances a structured work ethic with quiet woodworking, fishing, and community service, while wrestling with lingering worry and
    a habit of over‑checking every detail.
background:
  cultural: Peter grew up in a small town near Lancaster, Ohio, in a middle‑class white working‑family with roots tracing back to Polish immigrants who settled in the region. The Midwestern values of hard
    work, reliability, and community service shaped his upbringing. He attended a local Methodist church, which reinforced a spirit of compassion and cooperation. Throughout his life, he has maintained
    close ties to his neighborhood, participating in local festivals, supporting the town’s volunteer fire department, and embracing the practical, modest ethos typical of the Ohio heartland.
attributes:
  skills: '[''Residential electrical wiring'', ''Commercial electrical systems'', ''Electrical code compliance (NEC)'', ''Troubleshooting and diagnostics'', ''Blueprint and schematic interpretation'', ''Electrical
    safety and OSHA training'', ''Project management for small to medium projects'', ''Solar photovoltaic system installation'', ''Smart home automation'', ''Mentoring and training apprentices'']'
  hobbies: '[''Woodworking'', ''Fishing'', ''Volunteer electrical safety workshops'', ''Classic car restoration'', ''Gardening'', ''Reading historical nonfiction'', ''Attending community events'']'
  career_goals: Peter aims to obtain Master Electrician certification to solidify his credibility and expand his consulting services. He plans to transition gradually from physically demanding field work
    to a mentorship‑focused role, offering safety workshops and energy‑efficiency consultations for homeowners in Fairfield County. He also hopes to start a small niche contracting firm specializing in
    solar and EV‑charging installations, allowing him to balance predictable income with the flexibility to volunteer his time at local senior centers and community safety programs. Reducing workplace stress
    by delegating administrative tasks and fostering a supportive team environment is a core ambition.
