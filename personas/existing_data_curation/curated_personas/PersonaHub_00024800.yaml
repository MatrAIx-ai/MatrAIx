persona_description: A census worker or statistician who is responsible for collecting and organizing information about dwellings and their locations, as required by the Statistics Act 1975. They are likely
  to be highly detail-oriented and familiar with the classification of dwelling addresses, as well as the statistical methods and techniques used to analyze and compare census data across different regions.
  They may also have experience with geographic information systems (GIS) and other tools used in data collection and analysis.
