personas:
  professional: Marion Coppedge, a high‑school junior with a penchant for meticulous planning, is an aspiring nurse who leverages their organized research skills and volunteer experience at the local library
    to lay a foundation for compassionate, structured patient care.
  sports: Marion Coppedge hikes the nearby Pine Ridge Trail on weekends, runs with the school’s cross‑country team, and faithfully supports the local professional basketball team, the Panthers, while tracking
    their step count in a fitness app.
  arts: Marion Coppedge volunteers as a storytelling assistant at the library, knits patterned scarves while listening to Ed Sheeran’s acoustic tracks, and relaxes with mystery novels by Agatha Christie
    and historical fiction by Hilary Mantel.
  travel: Marion Coppedge enjoys day trips to the historic downtown of Savannah, keeps a travel spreadsheet for a planned summer visit to Acadia National Park, and dreams of exploring the Smithsonian museums
    in Washington, D.C., balancing school commitments with limited family funds.
  culinary: Marion Coppedge loves baking cinnamon rolls, mastering mushroom risotto, and meal‑prepping balanced lunches using fresh basil, rosemary, and seasonal vegetables, measuring ingredients to the
    gram with a digital scale.
  core: Marion Coppedge is a methodical teen who balances curiosity with intense anxiety, using meticulous planning as a stabilizing habit across school, volunteer work, and future nursing aspirations.
background:
  cultural: Marion was raised in Jackson, Tennessee, within a white, working‑class family that has long been part of the local Baptist community. Southern hospitality, church involvement, and close‑knit
    family ties emphasized values of kindness, cooperation, and respect for tradition. Community events such as the Madison County Fair, church potlucks, and volunteer drives at the public library were
    regular parts of her upbringing. The regional focus on practical skills, modest living, and strong community connections has reinforced Marion’s organized and methodical approach to life.
