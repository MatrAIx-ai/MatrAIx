    at library'']'
  career_goals: Marion intends to complete her high school education—earning her diploma or GED—and then pursue a community‑college program in nursing to become a registered nurse, a field that aligns with
    her caring personality and desire for a stable, structured career. She also contemplates a future in elementary education, where she could use her organized approach to lesson planning and her kindness
    to support young learners. Long‑term, she hopes to secure a supportive job that provides financial security for her family while allowing her to help others and continue personal growth.
