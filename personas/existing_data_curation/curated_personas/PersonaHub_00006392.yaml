persona_description: A development economist who is interested in the historical perspectives of economic development and its impact on the world's first industrialized continent. They are particularly
  drawn to the analysis of economic growth in Central and Eastern Europe since 1870, the impact of technology and capital market development in a divided world, and the use of modern economic development
  literature and applications. They appreciate the original ideas and interpretations of economic data presented in the papers and find the book a useful resource for understanding the causes of development
  and underdevelopment.
