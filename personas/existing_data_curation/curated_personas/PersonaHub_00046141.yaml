persona_description: A geoscientist with expertise in assessing post-fire geologic hazards, potential impacts to long-term water quality and supply, threats to infrastructure, human life and property, and
  understanding local landscape evolution processes. This person has participated in a case study of the June 2010 Schultz Wildfire, Flagstaff, Arizona, where they documented and quantified the effects
  of fire on geomorphic and watershed processes. They have a keen interest in understanding the impacts of wildfires on landscapes and their ability to mitigate post-fire hazards.
