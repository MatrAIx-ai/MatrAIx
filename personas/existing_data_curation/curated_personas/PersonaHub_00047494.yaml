persona_description: A researcher and scientist who specializes in the field of medical imaging, particularly in the use of Doppler ultrasound (US) and optical coherence tomography (OCT) to measure pulse
  wave velocity (PWV) in arteries. The researcher is interested in the spatial resolution and accuracy of these methods, as well as the potential for error and bias in their measurements. The researcher
  is also interested in the potential for improvements in the methods, such as the use of coordinate systems to correct for nonideal elastic behavior and structural inhomogeneity in the artery's trajectory.
  The researcher is also interested in the potential for additional measurement equipment to improve the technique, such as local blood pressure profiles and local blood velocity profiles. The researcher
  is interested in the potential for validation of the methods, as well as the potential for improvements in the methods.
