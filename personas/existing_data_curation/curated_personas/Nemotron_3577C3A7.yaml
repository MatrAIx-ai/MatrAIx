personas:
  professional: Sonia Cano, a budding digital creator, merges her love for soccer teamwork with a curiosity‑driven approach to coding and animation, using Scratch and beginner Python to build interactive
    stories while they balance school responsibilities through organized yet flexible planning.
  sports: Sonia Cano, a committed member of the Stockton Thunder Juniors soccer team, trains year‑round, follows the San Jose Earthquakes for tactical inspiration, complements on‑field practice with bike
    rides along the San Joaquin River trail and weekend strength sessions at the community gym, they approach fitness with disciplined consistency balanced by a love for playful competition.
  arts: Sonia Cano channels her creative energy into digital illustration inspired by the bold colors of Frida Kahlo and the fluid style of animator Loish, delights in performing folklorico dances that
    echo ancestral stories, they regularly watch Pixar films like 'Inside Out' and listen to Billie Eilish, letting these artistic influences shape her storytelling and visual design.
  travel: Sonia Cano favors weekend road trips that combine bike rides on the scenic San Joaquin River path with quick cultural stops, has explored Yosemite National Park and the historic streets of San
    Francisco, dreams of wandering the ancient ruins of Machu Picchu and the bustling souks of Marrakech, and they balance these ambitions with family budgeting by saving their allowance for one major vacation
    each summer.
  culinary: Sonia Cano loves cooking family recipes such as handmade corn tortillas, chipotle chicken stew, and sweet plantain quesadillas, skillfully chops cilantro, roasts tomatillos, and whisks masa,
    they often experiment with plating and occasionally sneak extra hot sauce between bites, while still learning to perfect timing and seasoning.
  core: Sonia Cano is a curious, organized teen who can spend hours perfecting a digital animation yet often forgets to finish her math homework, they balance a love for teamwork on the soccer field with
    a secret penchant for late‑night snack raids.
background:
  cultural: Sonia is a second‑generation Mexican American raised in Stockton’s vibrant Latino community. Her family maintains strong Mexican traditions, speaking Spanish at home, celebrating Día de los
    Muertos, quinceañeras, and other cultural holidays, and passing down recipes for tamales, salsas, and horchata. She attends a diverse public middle school where she participates in Hispanic Heritage
    Month activities and bilingual programs. This bicultural upbringing gives Sonia a deep appreciation for both her Mexican roots and her Californian environment, shaping her values of family cohesion,
    respect for elders, community support, and a commitment to bridging cultural gaps through education and service.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Organizational and time-management'', ''Practical problem solving (science and robotics)'', ''Basic coding (Scratch)'', ''Digital literacy (Google
    Workspace, Microsoft Office)'', ''Team collaboration and leadership'']'
  hobbies: '[''Soccer'', ''Folklorico dance'', ''Digital art and animation'', ''Coding with Scratch and Python'', ''Reading mystery novels and biographies'', ''Cooking Mexican cuisine'', ''Community gardening'',
    ''Biking along local trails'']'
  career_goals: Sonia aspires to study environmental engineering or sustainable agriculture in college, driven by her curiosity about how ecosystems work and her desire to develop practical solutions for
    water conservation and farming challenges in California’s Central Valley. She hopes to earn a scholarship that will enable her to attend a university with strong engineering and public‑service programs.
    Ultimately, she envisions returning to her community to mentor younger students, promote bilingual STEM education, and contribute to projects that improve local food security and environmental health.
