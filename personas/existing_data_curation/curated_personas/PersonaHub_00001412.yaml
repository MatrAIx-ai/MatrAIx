persona_description: A healthcare professional who is interested in preventive medicine and the detection and management of cardiovascular diseases, particularly abdominal aortic aneurysm. This person is
  likely to be a medical doctor, cardiologist, or a pulmonologist who is responsible for monitoring patients at risk of aneurysm rupture and providing them with regular check-ups. They should have knowledge
  of the symptoms of an abdominal aortic aneurysm, the causes of aneurysm, and the preventative measures that can be taken to reduce the risk of rupture. They should also be aware of the ultrasound screening
  procedure and the importance of it in the management of abdominal aortic aneurysm.
