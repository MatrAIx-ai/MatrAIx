  hobbies: '[''Reading fantasy novels'', ''Sketching urban cityscapes'', ''Playing chess with a friend'', ''Listening to R&B and hip‑hop music'', ''Volunteering at the community garden'', ''Watching educational
    videos on space and wildlife'']'
  career_goals: Sharika envisions a future where she can combine her love for science, art, and helping others. She aspires to become a wildlife veterinarian or an environmental researcher focused on urban
    ecology, and she also considers roles such as a community educator or youth mentor that allow her to support others in learning. In the near term, she aims to deepen her science knowledge through school
    projects, join a STEM or robotics club, and develop a portfolio of artwork to explore these possibilities.
