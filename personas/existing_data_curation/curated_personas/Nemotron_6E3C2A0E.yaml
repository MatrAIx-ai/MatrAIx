personas:
  professional: Sharika Cadet, an aspiring junior environmental storyteller, blends her curiosity for fantasy worlds and real‑world cityscapes with a practical eye for detail, using sketching and short‑form
    writing to document Detroit’s community garden projects, while their relaxed approach to deadlines and friendly, cooperative nature keep the effort low‑pressure yet heartfelt.
  sports: Sharika Cadet, a member of the Detroit Youth Soccer Club and a regular participant in after‑school basketball pickup games at the community center, cheers for the Detroit Lions in fall football
    and the Detroit Red Wings during winter hockey, preferring low‑key bike rides through neighborhood streets to intense training regimens, reflecting a relaxed, cooperative approach to staying active.
  arts: Sharika Cadet finds inspiration in sketching Detroit’s streets after listening to classic Motown legends like Stevie Wonder and Marvin Gaye alongside modern R&B stars such as H.E.R. and Anderson
    .Paak, while diving into fantasy realms penned by authors like J.K. Rowling and Sarah J. Maas, and admiring the bold colors of Jacob Lawrence’s paintings that fuel their own artistic experiments.
  travel: Sharika Cadet prefers short, family‑run weekend getaways like a day trip to Ann Arbor’s botanical gardens or a summer road‑trip to the Great Lakes’ Sleeping Bear Dunes, while dreaming of a future
    school‑organized excursion to the Kennedy Space Center in Florida, balancing a love for quiet exploration with the practical limits of a twelve‑year‑old’s school schedule and allowance.
  culinary: Sharika Cadet enjoys helping in the family kitchen, skillfully whipping up sweet‑potato and kale smoothies with a splash of honey, and crafting simple yet beloved comfort meals like mac and cheese
    topped with crispy bacon, while also savoring weekend treats of Detroit‑style pizza drizzled with olive oil and fresh oregano.
  core: Sharika Cadet is a quietly curious 12‑year‑old who stitches together fantasy adventures and Detroit’s real‑world rhythm, often losing track of school assignments while day‑dreaming about space and
    quietly rehearsing chess puzzles on the back of their notebook.
background:
  cultural: As a Black American raised in Detroit’s historic African‑American neighborhoods, Sharika’s cultural identity is shaped by the city’s legacy of Motown music, the resilience of families who migrated
    during the Great Migration, and strong community bonds. Family gatherings feature soulful music, shared home‑cooked meals, and stories of perseverance. She participates in local cultural events such
    as the Detroit Jazz Festival and neighborhood clean‑up initiatives, and she values the collective spirit, mutual support, and emphasis on education that are hallmarks of her cultural background.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Hands‑on science experimentation'', ''Basic computer literacy'', ''Sketching and visual storytelling'', ''Empathetic listening'', ''Collaborative
