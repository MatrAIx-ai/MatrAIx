  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Quilting'', ''Cooking and baking Southern dishes'', ''Reading historical fiction'', ''Genealogical research'', ''Church choir singing'', ''Birdwatching'',
    ''Playing bridge or cards with close friends'', ''Volunteer work at the senior center'']'
  career_goals: Although Jeanne is officially retired, she remains motivated by a desire to stay useful and maintain a sense of rhythm in her days. She hopes to keep her health stable enough to tend to
    her garden and to continue cooking for family gatherings on a regular, predictable schedule. A personal ambition is to compile a handwritten family cookbook that records her favorite recipes and the
    stories behind them, creating a tangible legacy for her grandchildren. Jeanne also aims to mentor younger members of her church choir and knitting circle, passing on her craft skills in a low-key, supportive
    setting. Finally, she wishes to remain an active voice in the local senior center, advocating for accessible services and fostering a harmonious, caring environment for her peers.
