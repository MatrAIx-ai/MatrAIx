personas:
  professional: Jeanne Medina is a retired community volunteer whose decades of home-cooking, gardening, and meticulous budgeting inform their role as a mentor in the local church choir and knitting circle,
    allowing their practical, structure-loving yet flexible nature to foster harmonious, low-key gatherings.
  sports: Jeanne Medina enjoys gentle sunrise walks with the "Golden Striders" senior walking club, follows the local minor-league baseball team, the River City Rattlers, and roots for the Alabama Crimson
    Tide football, preferring low-impact activities that fit their predictable routine and provide a sense of community.
  arts: Jeanne Medina discovers artistic fulfillment singing gospel hymns by Mahalia Jackson in their church choir, losing themselves in historical fiction by Philippa Gregory, and admiring the delicate
    brushstrokes of Claude Monet, which inspire the color palettes of their quilts and the rhythm of their knitting.
  travel: Jeanne Medina prefers relaxed trips, often driving to the nearby Blue Ridge Mountains for fall foliage, visiting grandchildren in Orlando during winter holidays, and they dream of a leisurely
    Caribbean cruise to St. Thomas to savor fresh mangoes, avoiding bustling airports and lengthy itineraries.
  culinary: Jeanne Medina excels at preparing classic Southern fare such as fried chicken, collard greens, and pecan pie, seasoning with fresh thyme, smoked paprika, and locally harvested sweet potatoes,
    while turning garden harvests into homemade pickles, preserves, and hearty vegetable soups that nourish both body and family memories, and they take pride in sharing these dishes at family gatherings.
  core: Jeanne Medina blends a love for structured garden routines with a gentle worry about forgetting chores, finding solace in predictable cooking and knitting sessions while quietly championing harmony
    among friends, and they often hum a hymn while threading a needle.
background:
  cultural: Jeanne grew up as a white Southern woman in Startex, a historic textile-mill town in Spartanburg County, South Carolina. Her upbringing was shaped by a working-class community where the mill
    and the local Baptist church were central to daily life. She was raised on Southern hospitality, family meals, and a strong sense of self-reliance, learning early on to bake, sew, and garden to support
    her household. The rhythm of church services, community picnics, and seasonal festivals reinforced values of cooperation, modesty, and respect for tradition. Over the decades she witnessed the decline
    of the mill industry, the civil-rights movement, and the gradual shift toward a service-oriented economy, all of which deepened her appreciation for stability and close-knit relationships. Her cultural
    identity blends conservative social values, devotion to family and faith, and a deep affection for Southern culinary and craft traditions.
attributes:
  skills: '[''Home cooking (Southern cuisine)'', ''Canning and food preservation'', ''Gardening (vegetable & flower)'', ''Sewing and quilting'', ''Household budgeting and simple bookkeeping'', ''Basic computer
