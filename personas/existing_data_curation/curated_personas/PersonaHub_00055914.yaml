persona_description: A female principal of a prestigious and innovative female university, dedicated to providing comprehensive and thorough training in various fields of endeavor and distinction. The principal
  is highly accomplished and knowledgeable in various subjects, including science, literature, and trades. They are interested in providing equal opportunities for all women, regardless of their financial
  status or religious beliefs, and are committed to educating the wealthy as well as the indigent, genius as well as mediocrity. The university is open to those seeking tuition at reduced rates for trades
  or reduced consideration for those seeking education at reduced rates. The principal is also interested in offering free instruction to all poor orphan daughters of Order in the State.
