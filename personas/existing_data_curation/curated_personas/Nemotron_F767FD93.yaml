  career_goals: Maurice plans to earn his GED within the next two years and then enroll in a community-college program focused on graphic design or visual communication. He envisions a career that blends
    his love for art and technology, such as working as a freelance digital illustrator, creating social-media content for local businesses, or producing graphic artwork for community arts organizations.
    He also hopes to contribute to the revitalization of Coatesville's downtown by designing murals and public art projects that reflect the town's industrial heritage. In the longer term, he would like
    to mentor at-risk youth, showing them how creative expression can serve as an outlet for stress and a pathway to employment.
