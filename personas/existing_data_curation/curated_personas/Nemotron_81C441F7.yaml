  hobbies: '[''Reading (educational psychology, historical fiction)'', ''Gardening'', ''Yoga and meditation'', ''Volunteering at community center'', ''Book club'', ''Pottery'', ''Hiking'', ''Cooking farm-to-table
    meals'']'
  career_goals: Patti aims to earn her Texas teaching certification within the next two years and eventually transition to a full-time classroom teacher, with a focus on special education or instructional
    technology. She envisions leading professional development workshops to share best practices that blend innovative methods with practical classroom realities. While pursuing a master's degree in education
    administration, she also plans to cultivate a healthier work-life balance by incorporating stress-management techniques she has learned. Ultimately, she hopes to become a mentor for new educators in
    her community, fostering a supportive and collaborative school culture.
