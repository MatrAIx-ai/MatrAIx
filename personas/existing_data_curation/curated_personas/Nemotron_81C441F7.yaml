personas:
  professional: Patti Flickinger is an educational support specialist who excels at lesson planning, differentiated instruction, and integrating tech tools like Google Classroom, balancing her curiosity
    for new pedagogies with a practical focus on real classroom needs, and they often mentor teachers while juggling tutoring duties.
  sports: Patti Flickinger enjoys hiking the Denton County trails, follows the Dallas Cowboys and Texas Rangers for football and baseball excitement, and participates in a local weekend running club, blending
    cardio with gentle yoga sessions to maintain flexibility and stress relief.
  arts: Patti Flickinger cultivates creativity through a weekly pottery class, devours historical fiction novels, attends performances of Lin‑Manuel Miranda’s "Hamilton," and regularly streams music by
    Brandi Carlile and the folk duo Iron & Wine, weaving artistic appreciation into both solitary and social moments.
  travel: Patti Flickinger prefers weekend escapes to Hill Country vineyards, occasional road trips to Santa Fe for its art festivals, and dreams of an immersive month‑long stay in Kyoto to study traditional
    tea ceremonies, balancing careful budgeting with a love for culturally rich experiences.
  culinary: Patti Flickinger delights in farm‑to‑table cooking that showcases Texas‑grown tomatoes, grilled heirloom zucchini, and fresh cilantro, often preparing dishes like chicken enchilada casserole,
    roasted root‑vegetable medley, and quinoa salads tossed with cold‑pressed olive oil and smoked paprika, while experimenting with seasonal produce from her garden.
  core: Patti Flickinger is a curiosity‑driven, detail‑oriented educator who steadies perpetual worry with yoga, garden‑fresh meals, and a quirky habit of perfecting pottery rims during late‑night brainstorming
    sessions.
background:
  cultural: Patti grew up in a close‑knit, predominantly white, small‑town environment in North Texas, where community ties, church gatherings, and country‑style hospitality were integral to daily life.
    The region’s emphasis on self‑reliance, respect for tradition, and a strong work ethic shaped her values of cooperation and responsibility. While she embraces these local customs—such as attending Sunday
    services, enjoying regional barbecue, and celebrating seasonal festivals—she also values the increasingly diverse perspectives she encounters through her work in education. This blend of Southern‑Texan
    roots and exposure to broader cultural influences informs her inclusive outlook and commitment to fostering harmony in the classroom.
