  career_goals: Cynthia dreams of combining her love for art, technology, and space exploration. She aspires to become an interdisciplinary creator—envisioning a future as a space‑inspired game designer
    or a scientific illustrator who brings complex concepts to life. In the short term she aims to win her school’s science fair, join a competitive coding club, and build a portfolio of artwork to support
    a potential scholarship for a STEM‑arts program. Ultimately, she hopes to study aerospace engineering or interactive media at university and lead projects that inspire other young explorers.
