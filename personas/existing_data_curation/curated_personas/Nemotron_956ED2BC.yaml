personas:
  professional: Cynthia Brown is a budding robotics engineer in the making, combining a love for LEGO construction with Scratch programming to design autonomous mini‑bots, and their critical, competitive
    nature drives them to perfect every circuit while still meeting school deadlines.
  sports: Cynthia Brown thrills to cheer on the Nebraska Cornhuskers football team and follows the Omaha Storm Chasers baseball games, while actively participating in the Lincoln Youth Soccer Club’s after‑school
    league and practices a weekly bike‑ride routine through the park to stay fit.
  arts: Cynthia Brown immerses themselves in fantastical worlds by sketching scenes inspired by Studio Ghibli films, rereading J.K. Rowling’s Harry Potter series, listening to Taylor Swift’s storytelling
    songs, and attending the Lincoln Community Playhouse’s productions of Peter Pan, all of which fuel their own micro‑fiction writing.
  travel: Cynthia Brown dreams of exploring the red cliffs of Sedona after cataloguing the night sky from the open fields near Lincoln, already cherishes family trips to the Henry Doorly Zoo in Omaha and
    a school‑organized field trip to Washington, D.C., while planning a future adventure to see the Northern Lights in Iceland.
  culinary: Cynthia Brown delights in building homemade pizza topped with pepperoni, mozzarella, and fresh basil, experiments with a simple chocolate‑chip pancake recipe using buttermilk and vanilla, and
    eagerly samples the seasonal corn succotash at county fairs, though they often forget to eat breakfast before soccer practice.
  core: Cynthia Brown is a fiercely curious ten‑year‑old whose imagination fuels LEGO inventions, interstellar daydreams, and a competitive streak that pushes them to master puzzles, even if they sometimes
    leave their socks scattered across the living room.
background:
  cultural: 'Cynthia grew up in Lincoln, Nebraska, within a family that identifies as white American with roots in the Midwest and the broader Anglo‑European tradition. Her upbringing reflects typical Midwestern
    values: a mix of self‑reliance, community involvement, and appreciation for the outdoors. She regularly visits the local public library and community center, participates in school events and county
    fairs, and celebrates seasonal holidays such as Thanksgiving and winter holidays with family traditions. The cultural environment emphasizes education, curiosity, and a balance of individual achievement
    with community participation, shaping her competitive yet collaborative outlook.'
