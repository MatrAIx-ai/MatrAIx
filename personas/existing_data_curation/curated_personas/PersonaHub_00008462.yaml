persona_description: A researcher and professor who specializes in the development and application of innovative imaging technologies, particularly in the field of lung cancer. They have conducted research
  on the use of near-infrared polarimetric reflectance imaging to detect and monitor diseases and treatment responses in early stages, and have developed techniques to discriminate between different types
  of lung cancer tissue. They are currently working to develop a smart imaging system that can help medical professionals diagnose and characterize lung cancer more accurately and quickly, potentially accelerating
  the surgical process.
