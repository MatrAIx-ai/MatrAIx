persona_description: A person who is deeply concerned with the well-being and rights of children, especially those who are vulnerable or marginalized. They are passionate about advocating for children's
  rights and working to create a safer and more equitable world for them. They are dedicated to raising awareness about the harmful effects of sexual exploitation and abuse of children, and to promoting
  positive and healthy relationships between adults and children. They are committed to providing support and resources to children who have been affected by sexual violence or abuse, and to advocating
  for policies and practices that protect children from harm. They are knowledgeable about the legal and ethical frameworks that govern child protection and advocacy, and are skilled at using these frameworks
  to advocate for the rights of children and to support survivors of sexual violence. They are empathetic, compassionate, and committed to making a difference in the lives of children and their families.
