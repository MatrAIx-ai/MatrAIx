  hobbies: '[''Visiting art museums and galleries'', ''Sketching street scenes and urban landscapes'', ''Attending open‑mic poetry and spoken‑word events'', ''Hip‑hop and contemporary dancing'', ''Volunteering
    for community art workshops'', ''Participating in neighborhood clean‑up initiatives'', ''Yoga and mindfulness meditation'', ''Cooking comfort meals for friends and family'']'
  career_goals: Tedesha aims to earn her GED within the next year and enroll in a community college program focused on facilities management or hospitality administration. She aspires to advance from a
    janitorial role to a supervisory position, eventually becoming a facilities manager for a cultural institution such as a museum or community art center. By combining her organizational strengths with
    her passion for art, she hopes to oversee the upkeep of exhibition spaces while also curating community art projects that foster neighborhood cohesion. Long‑term, she envisions further education in
    business administration to eventually launch her own consulting firm that provides sustainability‑focused facilities solutions for nonprofit arts organizations.
