personas:
  professional: Tedesha Hunter, an 18‑year‑old janitorial specialist working in New York high‑rise residential and commercial buildings, combines meticulous cleaning schedules, inventory management, and
    basic HVAC troubleshooting with a sociable, conflict‑de‑escalating approach that turns routine maintenance into an opportunity for resident engagement, all while nurturing a curiosity for art that informs
    their emerging goal of managing museum facilities.
  sports: Tedesha Hunter, a passionate supporter of the New York Knicks and the Brooklyn Nets, spends winter evenings joining local basketball pickup games at the Bryant Park gym, dedicates Saturdays to
    rigorous hip‑hop dance classes at the Brooklyn Movement Studio, and maintains a weekly yoga practice at the Manhattan Community Center to balance high‑energy movement with mindfulness.
  arts: Tedesha Hunter, an avid explorer of New York’s art scene, frequently visits free‑admission days at the Metropolitan Museum of Art to study works by Jean‑Michel Basquiat and Kehinde Wiley, attends
    spoken‑word open‑mic nights at the Bowery Poetry Club to perform their own poetry, sketches urban murals in Bushwick, and curates informal neighborhood art tours that blend their basic art‑history knowledge
    with a desire to foster community cohesion.
  travel: Tedesha Hunter, an adventure‑seeking yet budget‑conscious 18‑year‑old, often escapes the city for weekend trips to the Catskill Mountains to sketch fall foliage, enjoys cultural pilgrimages to
    Philadelphia’s Mural Arts program, and dreams of a future study‑abroad semester in Florence to immerse in Renaissance frescoes, always planning itineraries meticulously to stretch limited funds.
  culinary: Tedesha Hunter, a self‑taught comfort‑food chef, loves whipping up creamy mac and cheese with smoked Gouda, crafting sweet‑potato soul bowls seasoned with cumin and kale, and simmering hearty
    chicken and dumplings infused with fresh thyme, sourcing ingredients from nearby farmers’ markets and finishing dishes with a splash of hot sauce for an extra kick.
  core: Tedesha Hunter, an 18‑year‑old urban caretaker who blends a love of art, dance, and meticulous cleaning, channels stress into midnight sketching sessions, battles a coffee‑addiction and occasional
    over‑thinking, yet consistently transforms every hallway into a welcoming space that reflects community pride.
background:
  cultural: Tedesha is an African‑American woman raised in a close‑knit Black community in New York City, where church, family gatherings, and neighborhood festivals shaped her upbringing. She grew up listening
    to gospel, jazz, and the evolving sounds of hip‑hop, which fostered a deep appreciation for rhythmic expression and storytelling. Cultural traditions such as celebrating Juneteenth, participating in
    local block parties, and supporting community murals have reinforced her sense of identity and responsibility to give back. While navigating the challenges of a high‑cost urban environment, she draws
    strength from the resilience and solidarity that characterize her cultural heritage, and she seeks to celebrate and preserve Black artistic contributions through her personal interests and future career
    aspirations.
attributes:
  skills: '[''Facility cleaning and maintenance'', ''Safety and compliance awareness'', ''Inventory management of cleaning supplies'', ''Minor repairs and equipment upkeep'', ''Time management and scheduling'',
