persona_description: A scientist at the Hotchkiss Brain Institute, Alberta Children's Hospital Research Institute, and Owerko Centre at UCalgary's Cumming School of Medicine, who has made a breakthrough
  discovery in the treatment of Fragile X syndrome, a genetic cause of Autism Spectrum Disorder. The discovery involves studying ion channels in the brain, and the potential use of a fragment of FMRP to
  restore protein levels in the cerebellum and brain for up to one day after the injection, leading to reduced hyperactivity and improved cognitive function. The research could help develop treatments to
  offset behavioral symptoms associated with other Autism Spectrum Disorders.
