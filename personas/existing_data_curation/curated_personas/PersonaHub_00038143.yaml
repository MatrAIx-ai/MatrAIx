persona_description: A researcher or engineer who specializes in fluid mechanics and is interested in the behavior of deformable liquid drops in a circular cylindrical tube. They are likely to be familiar
  with the equations of motion for Newtonian fluids, the principles of surface tension, and the mathematical techniques used to solve problems involving viscous flow and deformation of liquid drops. They
  may also have experience with numerical methods for solving differential equations and may have a background in physics or engineering.
