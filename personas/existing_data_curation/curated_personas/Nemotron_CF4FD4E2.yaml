personas:
  professional: Jaime Huggins, a retired mechanical engineer and applied mathematician, leverages systematic problem‑solving and meticulous documentation to design adult math curricula, coordinate volunteer
    programs, and mentor emerging women in STEM, thriving on structured schedules while delighting in the lively discussions that arise at the Traverse City Public Library and senior‑center workshops.
  sports: Jaime Huggins follows the Detroit Tigers and Detroit Red Wings avidly on the senior‑center television, participates in the Traverse City Walking Club for shoreline strolls and bird‑watching, and
    treats bridge at the senior center as a competitive mental sport, while occasionally joining gentle yoga sessions for flexibility.
  arts: Jaime Huggins shines on stage in community‑theater productions such as Guys and Dolls, recites Mary Oliver poetry at book club meetings, delights in folk classics by Joan Baez and swing by Ella
    Fitzgerald during knitting circles, and draws creative inspiration from Grandma Moses’s folk paintings and Michigan artist Eric Fischl’s abstractions.
  travel: Jaime Huggins has road‑tripped to Mackinac Island, explored Sleeping Bear Dunes, attended the cherry blossom festival in Washington, D.C., and taken a Great Lakes cruise, and now dreams of strolling
    Provence’s lavender fields and soaking Icelandic hot springs while balancing limited mobility and a fixed travel budget.
  culinary: Jaime Huggins loves preparing garden‑inspired dishes—cherry‑preserved scones, heirloom tomato‑basil salads, rose‑petal jam, and chicken pot pie seasoned with garden thyme—while perfecting cherry
    canning for local festivals, though they sometimes over‑salt when caught up in conversation.
  core: Jaime Huggins, an 88‑year‑old former engineer turned community catalyst, blends meticulous organization with gregarious storytelling, nurturing a garden, book club, and scholarship, yet occasionally
    hoards coupons and forgets prescription refills.
background:
  cultural: Jaime was born in 1937 into a middle‑class white family in rural Michigan with German‑Irish ancestry. Raised during the Great Depression and World War II, she internalized Midwestern values
    of self‑reliance, community service, and modesty. Her upbringing emphasized church participation, neighborly support, and a strong work ethic—principles that guided her pursuit of a STEM degree at the
    University of Michigan at a time when few women entered the field. Over her life she witnessed the civil‑rights era, the women’s liberation movement, and the rise of digital technology, all of which
    shaped a progressive yet grounded worldview. Today, she remains deeply connected to local traditions such as the National Cherry Festival, the annual farmers’ market, and volunteer initiatives that
    strengthen the fabric of Traverse City.
