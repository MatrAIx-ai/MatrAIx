  hobbies: '[''Softball league participation'', ''Pick‑up basketball games'', ''Volunteer work at community garden'', ''Hiking in nearby foothills'', ''Fishing at local reservoirs'', ''Cooking and experimenting
    with garden recipes'', ''Organizing neighborhood block parties'', ''Attending local live music events'', ''DIY home improvement projects'', ''Playing acoustic guitar in informal jam sessions'']'
  career_goals: William aims to turn his practical skill set into a stable, paid position while further expanding his knowledge. Over the next few years he plans to earn his high‑school equivalency (GED)
    and enroll in a vocational program to obtain certification in landscaping or HVAC maintenance, fields that blend his mechanical aptitude with his love of outdoor work. He also hopes to launch a small
    neighborhood‑based handyman service that can provide affordable repairs and home‑improvement help to fellow residents, especially seniors and low‑income families. In parallel, he wants to increase his
    involvement in community outreach by becoming a volunteer coordinator at the local community center, using his organizational abilities to create programs that promote health, education, and neighborly
    support. Ultimately, his ambition is to achieve financial stability for his family while giving back to the Acampo community.
