personas:
  professional: Meighan Butler, a veteran payroll manager with three decades of experience overseeing timekeeping and wage calculations, leverages her meticulous analytical mind and creative problem‑solving
    to modernize payroll workflows through automation, mentor junior clerks toward CPP certification, and champion financial‑literacy workshops for seniors.
  sports: Meighan Butler, an avid foothills hiker, holds season tickets for the Denver Broncos, follows the Colorado Avalanche with enthusiasm, and participates in the Rocky Mountain Hiking Club’s weekly
    treks, balancing low‑impact cardio with occasional community softball games.
  arts: Meighan Butler, a watercolor enthusiast who captures Colorado’s alpine vistas and draws abstract inspiration from Georgia O’Keeffe, frequently visits the Denver Art Museum, reads speculative fiction
    by Octavia Butler and Neil Gaiman, and leads basic drawing workshops at the local community art center.
  travel: Meighan Butler, who prefers meticulously planned, small‑group journeys, has explored the Canadian Rockies, trekked the Inca Trail in Peru, and dreams of a serene tea‑ceremony retreat in Kyoto,
    always balancing artistic inspiration with budget constraints.
  culinary: Meighan Butler, a modest home cook, loves preparing grilled trout with fresh rosemary from her garden, savors a hearty Colorado lamb stew, and indulges in occasional evenings of fondue with
    Gruyère and sliced apples, while experimenting with lavender‑infused honey in desserts.
  core: Meighan Butler, a detail‑driven payroll veteran with a painter’s soul, merges analytical precision with boundless imagination, cherishing solitude, small‑group gatherings, and a disciplined yet
    adventurous approach to life.
background:
  cultural: Meighan was raised in the Denver metropolitan area in a middle‑class family that valued self‑reliance, education, and community involvement. Growing up during the cultural shifts of the 1960s
    and 70s, she was exposed to both the era’s artistic experimentation and the Western heritage of Colorado, fostering an appreciation for both modern art and the natural landscape. Her white American
    background includes a lineage of European immigrants who settled in the Rockies, and she respects the region’s diverse cultural tapestry, often incorporating Indigenous art motifs into her own watercolor
    work.
attributes:
  skills: '[''Payroll processing'', ''Timekeeping systems'', ''Advanced Excel (pivot tables, macros)'', ''QuickBooks Payroll'', ''Data entry accuracy'', ''Confidential record handling'', ''Colorado labor
