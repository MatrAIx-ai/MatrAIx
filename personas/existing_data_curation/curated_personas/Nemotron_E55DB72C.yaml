  hobbies: '[''Watercolor painting'', ''Digital illustration'', ''Speculative fiction reading'', ''Philosophy reading'', ''Hiking in the Rockies'', ''Gardening'', ''Crossword puzzles'', ''Sketch journaling'',
    ''Small book club participation'', ''Volunteering at community art center (teaching drawing)'']'
  career_goals: Although approaching retirement, Meighan aims to deepen her expertise by earning the Certified Payroll Professional (CPP) credential and leading a small team focused on modernizing payroll
    procedures with automation tools. She also hopes to transition part of her time to instructing junior clerks and offering workshops on financial literacy for seniors. Concurrently, she plans to expand
    her artistic pursuits by exhibiting her watercolor series at local galleries and possibly publishing a collection of poetry inspired by abstract concepts.
