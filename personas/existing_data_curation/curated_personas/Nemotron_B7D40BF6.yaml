personas:
  professional: A budding LEGO architect named Javier Fong treats each block construction like a professional design project, applying methodical planning, relentless organization, and a love for routine,
    hinting at a future career in architecture or engineering.
  sports: Javier Fong captains a neighborhood under‑8 soccer squad, sticks to the team's practice schedule like clockwork, cheers for the local club FC Riverside, and insists on wearing the same lucky jersey
    for every match, blending teamwork with routine.
  arts: Javier Fong delights in bilingual picture books by Dr. Seuss and Mo Willems, spends afternoons drawing detailed scenes from those stories, and looks up to illustrator Eric Carle for his bold colors
    and orderly patterns that echo Javier’s love for structure.
  travel: Javier Fong enjoys family trips that follow a detailed itinerary, favoring trips to Disneyland for its scheduled rides and a weekend beach stay in Santa Cruz, while dreaming of a future visit
    to the castles of Europe once they’re older.
  culinary: Javier Fong loves measuring flour for pancake batter, arranging spaghetti with marinara sauce and tofu cubes on plates, savoring mango slices for dessert, and rigorously sets the table, although
    they sometimes forget to wash their hands before cooking.
  core: Javier Fong is a meticulous six‑year‑old who builds LEGO masterpieces, saves every coin, monitors allergies with charts, and finds calm in routines, even as worry and perfectionism shadow their
    bright curiosity.
background:
  cultural: Javier grows up in a Puerto Rican household in Brick, New Jersey, where Spanish and English are spoken interchangeably. Family traditions include celebrating Fiesta de San Juan with music, dancing,
    and traditional dishes like arroz con gandules and empanaditas. He learns cultural stories and values from his grandparents, who emphasize community, respect, and hard work. While immersed in the local
    American school culture, he also participates in community events at the local Hispanic cultural center, fostering a strong sense of belonging to both his Puerto Rican heritage and his suburban New
    Jersey community.
