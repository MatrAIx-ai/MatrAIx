  career_goals: Brian aims to become a Certified Financial Planner (CFP) within the next two years and to lead a boutique advisory team that specializes in serving artists, performers, and other creative
    professionals in the Rochester region. He envisions building a niche practice that blends rigorous financial stewardship with an appreciation for the unique income patterns and valuation challenges
    of the art world. Long‑term, he hopes to author a series of guidebooks on financial planning for creative careers and to serve on the board of a local arts nonprofit, using his financial expertise to
    support cultural initiatives. He also aspires to mentor junior analysts, fostering a collaborative culture that balances analytical rigor with innovative thinking.
