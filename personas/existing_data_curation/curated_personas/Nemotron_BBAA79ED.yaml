personas:
  professional: Berta Nunez is a retired school secretary turned community volunteer who leverages bilingual fluency, meticulous record‑keeping, and calm conflict mediation to orchestrate senior‑center
    workshops, cultural festivals, and neighborhood outreach programs, combining a love for structure with an easygoing, people‑oriented energy.
  sports: Berta Nunez enjoys low‑impact fitness through regular salsa and bachata nights, participates in a senior walking club that meets at Prospect Park during spring, cheers for the New York Knicks
    basketball team and the New York Yankees baseball team, and occasionally follows the local Brooklyn Nets pick‑up basketball league for entertainment.
  arts: Berta Nunez immerses herself in Latin music, frequently playing the classics of Celía Cruz, Marc Anthony, and Carlos Vives while cooking, attends community theater productions featuring Lin‑Manuel
    Miranda's works, and draws inspiration from historical novels by Isabel Allende and Arturo Pérez‑Reverte, which shape her storytelling style for the memoir she plans to write.
  travel: Berta Nunez favors short trips to nearby coastal towns like Asbury Park and historic sites such as the Brooklyn Museum, cherishes annual family visits to San Juan, Puerto Rico, dreams of a cultural
    pilgrimage to Cartagena, Colombia, and enjoys organized senior group tours to European cities like Barcelona and Seville, balancing adventure with her modest travel budget.
  culinary: Berta Nunez is a seasoned home cook who perfects classic dishes like arroz con gandules, homemade empanadas stuffed with seasoned ground beef, and tamales wrapped in corn husks, often seasoning
    them with garden‑fresh herbs such as cilantro and oregano, and she loves pairing meals with plantain fritters and a splash of homemade salsa verde.
  core: Berta Nunez blends disciplined community leadership with spontaneous salsa steps, meticulous budgeting with occasional spice‑impulse buys, and a love for heritage recipes alongside a habit of misplacing
    keys on dance nights.
background:
  cultural: Berta is the daughter of Puerto Rican immigrants who settled in Brooklyn's Bushwick neighborhood in the 1960s. Growing up bilingual, she absorbed a blend of Caribbean and Northeastern U.S. cultures,
    celebrating both Catholic holidays like Christmas and cultural milestones such as the Puerto Rican Day Parade. Her family traditions—music, dance, family-style meals, and a strong sense of community
    solidarity—remain central to her identity. She maintains close ties with the local Latino community, often serving as a cultural liaison and mentor for younger generations.
