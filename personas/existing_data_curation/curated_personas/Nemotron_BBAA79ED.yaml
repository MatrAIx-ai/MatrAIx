  hobbies: '[''Salsa and bachata dancing'', ''Traditional Latino cooking'', ''Balcony gardening'', ''Community gardening club'', ''Church participation'', ''Reading historical fiction'', ''Listening to
    Latin music'', ''Volunteering at Puerto Rican Day Parade'']'
  career_goals: Although retired from formal employment, Berta aims to expand her volunteer leadership at the local senior center, developing a bilingual outreach program that helps older Spanish-speaking
    residents navigate city services and health resources. She also hopes to launch a weekly cooking class that preserves family recipes while teaching nutrition basics to younger neighbors. In the longer
    term, she envisions writing a memoir of her immigrant family's journey, contributing to the cultural archive of Brooklyn's Latino community.
