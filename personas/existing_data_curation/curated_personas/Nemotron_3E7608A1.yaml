  career_goals: Susan aims to move into a facility manager or senior maintenance supervisor role within the next three years, overseeing multiple sites in the Camden County area. She plans to obtain Certified
    Maintenance & Reliability Professional (CMRP) certification to validate her expertise and to implement data‑driven maintenance strategies that reduce downtime and improve cost efficiency. Long‑term,
    she envisions launching a small, locally‑focused contracting business that offers reliable residential and small‑commercial repair services, allowing her to mentor apprentices and maintain the structured,
    high‑quality standards she values.
