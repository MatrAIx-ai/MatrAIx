personas:
  professional: Susan Caputo, an experienced maintenance and repair specialist who excels at building systematic CMMS-driven schedules, documenting procedures, and training junior staff, leverages her methodical,
    detail‑oriented mindset and competitive edge to deliver zero‑downtime operations while eyeing a senior facility manager role within three years.
  sports: Susan Caputo enjoys weekly line‑dancing classes for cardio, competes in a women’s bowling league at the local senior center, and spends calm evenings fishing on the Pasquotank River with friends,
    while cheering on the Philadelphia Eagles and occasionally attending a Phillies game, embodying both competitive spirit and community camaraderie.
  arts: Susan Caputo, an active volunteer in her church choir and leader of a senior‑center book club, immerses herself in the vocal works of Andrea Bocelli, the classic crooning of Tony Bennett, and the
    contemporary folk tunes of local artist Sarah Jarosz, finding balance between structured rehearsal schedules and spontaneous literary discussions.
  travel: Susan Caputo plans each trip with a meticulous itinerary, favoring road‑side vineyard tours in California’s Napa Valley, historic walks through Sicily’s coastal towns to explore her Southern‑Italian
    culinary roots, and relaxed weekend getaways to Charleston, SC, while budgeting carefully to fit her retirement timeline and family obligations.
  culinary: Susan Caputo loves crafting Southern‑Italian fusion dishes such as shrimp‑and‑grits carbonara, eggplant parmigiana with collard greens, and lemon‑basil grilled branzino, skillfully blending
    fresh basil, pecorino, and roasted red peppers, often serving these at family potlucks where they experiment with new spice blends despite occasionally over‑salting in their enthusiasm.
  core: Susan Caputo blends a fiercely organized, data‑driven work ethic with a sociable, community‑focused lifestyle, balancing competitive ambition with a love for group activities, while occasionally
    getting lost in receipt hoarding and over‑seasoning her recipes.
background:
  cultural: Susan grew up in Elizabeth City, NC, in a family of Italian‑American heritage. The Caputo household blended Southern coastal traditions—such as a love of seafood and community festivals—with
    Italian customs, including Sunday family meals, Catholic practices, and holidays centered around homemade pasta and pastries. Raised in a modest, close‑knit neighborhood on the Outer Banks, she learned
    the value of hard work, self‑reliance, and communal support. This mix of Southern hospitality and disciplined, family‑oriented Italian values shapes her practical outlook, structured work style, and
    sociable personality.
