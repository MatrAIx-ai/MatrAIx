personas:
  professional: Simon Brown is a sophomore chemical engineering student who spends their lab time mastering Aspen Plus simulations and gas chromatography, while their natural curiosity and collaborative
    spirit drive them to prototype sustainable reactor designs and mentor peers in multidisciplinary projects.
  sports: Simon Brown is an avid hiker and kayaker who explores the Finger Lakes trails on weekends, occasionally joins a local Adirondack mountain club’s trail‑run meetups, and they cheer for the New York
    Mets while never missing a Buffalo Bills Sunday game with friends.
  arts: Simon Brown indulges in sci‑fi literature, favoring authors like Liu Cixin and Anne Leigh Gibson, captures the rolling hills of upstate New York through a Canon EOS R5, and they unwind listening
    to indie folk playlists featuring Fleet Foxes and Bon Iver while admiring Ansel Adams’ black‑and‑white landscapes.
  travel: Simon Brown favors spontaneous, low‑budget road trips across New York’s wine country and the Catskills, dreams of a geothermal tour of Iceland’s hot springs, and they usually book travel on a
    whim using student discounts and hostel stays to stretch their modest savings.
  culinary: Simon Brown experiments with home‑brew lagers and small‑batch sours, often pairing their creations with favorite dishes like spicy Sichuan dumplings and thick‑bodied New York‑style pizza, while
    they enjoy using malt extract, hops, and yeast in the kitchen and take pride in perfecting a consistently creamy caramel sauce.
  core: Simon Brown blends a pragmatic chemistry mind with a love for the outdoors, juggling lab work, home‑brewing, and board‑games, all while staying relaxed about schedules, fiercely compassionate, and
    occasionally forgetting to file a tax return on time.
background:
  cultural: Simon comes from a white, middle‑class American family with deep roots in the Northeastern United States. Growing up near Ithaca, he was immersed in an academic atmosphere influenced by Cornell
    University, which fostered a respect for both rigorous inquiry and community engagement. His cultural upbringing emphasizes practical problem‑solving, self‑reliance, and a strong sense of social responsibility,
    reflected in his compassionate approach to teamwork and his desire to contribute to sustainable initiatives.
attributes:
  skills: '["Process simulation (Aspen Plus)", "Analytical instrumentation (GC, HPLC, spectroscopy)", "Bench‑scale experimental design", "Data analysis (Python, R, Excel)", "Technical writing", "Team collaboration",
    "Conflict resolution", "Empathetic communication"]'
  hobbies: '["Hiking and kayaking in the Finger Lakes area", "Home brewing and culinary chemistry", "Board‑game evenings with friends", "Volunteer work at a community garden", "Science‑fiction reading",
    "Nature photography"]'
  career_goals: Simon aims to become a chemical engineer who designs sustainable, low‑impact manufacturing processes. He is particularly interested in developing greener solvents and energy‑efficient reactors
    for the pharmaceutical and materials sectors. While he is open to pursuing a graduate degree in environmental engineering, his immediate ambition is to secure a position at a clean‑tech startup or a
    research lab where he can apply his curiosity to real‑world challenges. He also hopes to mentor younger students and volunteer his expertise to community projects focused on water purification and waste
    reduction.
