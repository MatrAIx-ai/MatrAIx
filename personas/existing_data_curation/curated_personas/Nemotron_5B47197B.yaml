  career_goals: Although retired, Joel aims to stay intellectually active and socially contributing. He plans to volunteer regularly at local schools, leading intergenerational reading and tutoring programs,
    and to mentor younger teachers through informal workshops. Joel also hopes to compile his teaching experiences into a guidebook for novice educators, and to advocate for mental‑health resources for
    seniors in his community. Maintaining physical health through gardening and walking is an essential personal ambition that supports his broader goal of balanced, purposeful living.
