  hobbies: '[''gardening (cacti and desert flora)'', ''preparing traditional Mexican cuisine'', ''watching classic Mexican and American films'', ''reading historical biographies'', ''volunteering at the
    local community center'', ''listening to mariachi and norteño music'', ''playing chess'', ''walking desert trails with his wife'']'
  career_goals: Although officially retired, Erick aims to stay engaged by mentoring youth at the local community center, offering workshops on home maintenance and budgeting. He also aspires to launch
    a modest weekend food cart featuring traditional Mexican dishes, using it as a platform to share his heritage and support local charities. Long‑term, he hopes to compile a family recipe book and a memoir
    reflecting his life as a Mexican‑American in Arizona.
