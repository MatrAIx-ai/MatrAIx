  hobbies: '[''Cooking Puerto Rican cuisine'', ''Bomba and Plena dancing'', ''Gardening tropical fruits'', ''Hiking coastal trails'', ''Volunteering at community festivals'', ''Reading historical fiction'',
    ''Road trips along the island'', ''Crocheting'']'
  career_goals: Ambar aims to transition from driver‑sales worker to a supervisory role overseeing a small fleet of delivery trucks serving the north coast of Puerto Rico. She plans to obtain a certification
    in transportation management and eventually launch her own community‑focused logistics service that partners with local artisans and farmers. Improving her formal education with a GED completion and
    business courses is also on her agenda, as she wants to provide a stable, upward‑mobile future for her family while mentoring younger drivers from her hometown.
