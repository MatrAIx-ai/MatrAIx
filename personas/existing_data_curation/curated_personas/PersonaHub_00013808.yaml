persona_description: A genealogist or history enthusiast who is interested in researching the French Revolution and its impact on the French society. They are particularly interested in the French Republican
  Calendar and the guillotine, and are looking for information on the families of those who were executed during this period. They are also interested in learning about the lives of the people who were
  executed, including their occupation, education, and family background. They are looking for information on the causes of death, as well as any unusual causes of death that may have been reported in the
  newspapers or court records. They are also interested in finding out where the families of the executed individuals lived, and are using the information from the obituaries and death notices to piece
  together the details. They are looking for any additional information that may be available, such as newspaper articles or court documents.
