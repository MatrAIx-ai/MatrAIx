personas:
  professional: A meticulous LEGO builder named Marie Apostol who follows step‑by‑step instructions with the precision of an aspiring architect, turning each set into a mini‑cityscape while dreaming of
    designing real buildings someday.
  sports: An enthusiastic youth athlete named Marie Apostol plays in the River Falls Soccer Club and cheers for the local professional teams like the Green Bay Packers and Milwaukee Brewers, preferring
    structured practice drills over unorganized playground games.
  arts: A creative sketcher named Marie Apostol fills her notebook with line‑perfect coloring pages, loves reading the “Magic Tree House” series, and enjoys listening to the whimsical scores of Disney’s
    “Frozen” and the playful tunes of Sesame Street.
  travel: A curious explorer named Marie Apostol loves family road trips to the Kettle Moraine State Forest and the Wisconsin Dells water parks, dreams of visiting the historic monuments in Washington,
    D.C., and prefers itineraries that mix guided tours with hands‑on nature scavenger hunts.
  culinary: A budding gourmand named Marie Apostol delights in spaghetti with meatballs, grilled cheese with tomato soup, and the occasional festive meal of roasted lamb and a sweet braided bread served
    during a spring holiday, while she proudly helps stir batter for chocolate chip cookies.
  core: Marie Apostol is a detail‑oriented 7‑year‑old who balances a love for structure with bursts of imagination, often journaling her leaf finds while worrying about the next school test.
background:
  cultural: 'Marie comes from a white American family with roots in Greek and Romanian heritage, reflected in her surname Apostol. Her family observes a blend of cultural traditions: they celebrate Greek
    Easter with traditional foods like lamb and tsoureki, and honor Romanian customs during family gatherings. Living in River Falls, Wisconsin, the family participates in small‑town community events, such
    as the annual Fall Fest and church activities, reinforcing a sense of close‑knit community. The multicultural household exposes Marie to a mix of languages—occasionally hearing Greek phrases at dinner
    and Romanian lullabies before bedtime—while her primary cultural environment remains the Midwestern American lifestyle.'
