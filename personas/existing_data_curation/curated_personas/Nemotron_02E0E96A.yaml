  career_goals: Although still young, Marie envisions a future where she can help others in a structured environment. She often says she wants to become a teacher because she enjoys sharing knowledge and
    maintaining a calm classroom, or a veterinarian to care for animals like her cat. She also imagines working at the local library, where she could organize books and create orderly reading corners. Her
    ambitions reflect her love for order, responsibility, and compassion balanced with a desire for personal achievement.
