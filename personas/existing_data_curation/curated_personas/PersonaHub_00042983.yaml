persona_description: A media studies instructor who specializes in analyzing promotional materials, especially those related to film, television, and broadcasting. Their research interests include the construction
  of genre, the role of paratexts in genre negotiation, and the history of American broadcasting. They are skilled in using promotional materials to identify key generic elements, understand the web of
  genre's paratext, and discuss the industry's self-reflection and mythology. They are also knowledgeable about the discursive analysis of the television industry and how it shapes the stories it tells
  about itself.
