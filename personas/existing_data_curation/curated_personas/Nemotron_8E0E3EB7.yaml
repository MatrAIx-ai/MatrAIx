personas:
  professional: Maria Comeaux is a culinary professional in Salt Lake City who leverages their ServSafe certification, precise knife skills, and knack for cost‑effective menu design to lead prep teams,
    while their competitive spirit pushes them to streamline operations and mentor staff toward sous‑chef ambitions.
  sports: Maria Comeaux follows the Utah Jazz and Real Salt Lake avidly, participates in a local hiking club that tackles the Wasatch peaks each weekend, and joins a community adult softball league for
    recreation, balancing competitive camaraderie with a love for the outdoors.
  arts: Maria Comeaux frequents Salt Lake City galleries, draws artistic inspiration from the works of photographer Annie Leibovitz and painter Georgia O’Keeffe, and regularly attends live shows featuring
    The National and local theater productions like “The Curious Incident,” letting the blend of visual and musical arts shape their plating aesthetics.
  travel: Maria Comeaux enjoys weekend drives to Park City’s ski resorts in winter, annual culinary trips to Oaxaca for street‑food immersion, and a bucket‑list desire to explore the markets of Marrakech,
    all while balancing travel plans with the budget constraints of a budding food‑truck venture.
  culinary: Maria Comeaux is an advanced home cook who experiments with dishes like Moroccan lamb tagine with preserved lemons, Japanese ramen infused with miso‑black garlic broth, and Korean kimchi‑filled
    bao, often photographing the plated result for their Instagram feed and swapping spice blends with fellow food‑enthusiasts.
  core: Maria Comeaux blends a chef’s precision with an artist’s eye, a competitive edge with a community‑building spirit, and a habit of juggling multiple projects while sometimes neglecting their own
    rest.
background:
  cultural: Maria was raised in a middle‑class, predominantly white suburban community in Utah, where outdoor recreation and a growing appreciation for the arts coexisted. Her family emphasized self‑reliance
    and community involvement, values that inform her collaborative approach at work. While she completed high school through the 12th grade without a formal diploma, she pursued certifications and community
    college courses in culinary arts. Living in North Salt Lake, she benefits from proximity to Salt Lake City’s vibrant cultural scene while maintaining ties to the region’s traditions of hiking, local
    agriculture, and family‑centric values.
