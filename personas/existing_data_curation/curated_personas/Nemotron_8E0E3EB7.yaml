  hobbies: '[''Visiting art galleries'', ''Attending live music and theater'', ''Hiking in the Wasatch Range'', ''Experimenting with international recipes'', ''Food photography'', ''Social media sharing
    of culinary creations'', ''Community cooking classes'', ''Trivia nights'', ''Competitive board games'', ''Yoga and mindfulness practice'']'
  career_goals: Maria aims to advance from her current food preparation role to a supervisory position such as sous chef within the next two years, eventually becoming a head chef with the autonomy to design
    a menu that integrates local Utah ingredients and artistic presentation. She plans to enroll in a part‑time culinary program to earn an associate degree and acquire advanced pastry techniques. Long‑term,
    Maria dreams of launching a boutique food truck or small café that showcases her creative dishes and serves as a community hub for cooking workshops and art‑themed pop‑up events.
