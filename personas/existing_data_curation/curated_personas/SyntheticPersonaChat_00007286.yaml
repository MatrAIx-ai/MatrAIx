    Really? They are so good! I love their music.


    Me too! I''ve seen them in concert twice.


    That''s awesome! I''ve never seen them live.


    You should! They put on a great show.


    I definitely will. Thanks for the recommendation!


    No problem! What do you do for a living?


    I work as a cashier at two different stores.


    That must be busy! Do you like your job?


    It''s okay. I''m just saving up money for graduate school.


    Oh, that''s cool! What are you going to study?


    I''m not sure yet, but I''m thinking about psychology or social work.


    Those are both great choices! I''m sure you''ll be great at whatever you decide to do.


    Thank you! I hope so.


    I know you will! You seem like a smart and hard-working person.


    Thanks! You''re too kind.


    No, I''m not. I''m just being honest. You seem like a great person.


    Thank you! That means a lot to me.'
