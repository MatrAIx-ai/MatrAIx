  hobbies: '[''Watercolor Abstract Painting'', ''Reading Science Fiction and Mexican Literature'', ''Stargazing and Astrophotography'', ''Model Rocket Building'', ''Gardening (native Florida flora)'', ''Chess
    (solo play)'', ''Writing Poetry'', ''Listening to Classical and Mexican Instrumental Music'']'
  career_goals: Juan aims to continue mentoring younger entrepreneurs and small business owners, sharing his decades of experience to help them navigate financial and strategic challenges. He plans to author
    a memoir that weaves together his Mexican heritage, his journey in American business, and his reflections on art and space exploration, leaving a personal legacy for his family and community. He hopes
    to curate a small exhibition of his abstract watercolor works at the local community center and to donate select astrophotography prints to schools to spark interest in astronomy. Juan also seeks to
    stay mentally active by learning about sustainable business practices and to support a nonprofit focused on empowering Latino seniors in Florida.
