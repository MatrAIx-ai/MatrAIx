    ''Community Volunteer for Public Art Projects'', ''Attending Local Theater Performances'']'
  career_goals: Looking ahead, Robert aims to transition from full‑time site management to a consultancy role focused on green building and artistic‑focused construction projects in the Pacific Northwest.
    He wants to mentor the next generation of construction professionals, develop workshops on integrating art into built environments, and contribute to community revitalization efforts in Gig Harbor.
    A personal ambition is to author a memoir that captures his unconventional approaches to problem‑solving and his journey in the industry, while also building a small boutique firm that specializes in
    historic home restoration with a strong emphasis on sustainability and aesthetic innovation.
