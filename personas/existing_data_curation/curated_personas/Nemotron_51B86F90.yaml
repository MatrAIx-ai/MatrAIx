personas:
  professional: Steven Reeves, a 36‑year‑old police officer in Cushing, blends their law‑enforcement training with a business degree to deliver data‑driven community policing, using investigative interviewing,
    crisis de‑escalation, and creative tech‑integrated outreach while their relaxed, curious nature lets them experiment with unconventional strategies and their modest disorganization sometimes leads to
    rushed reports.
  sports: Steven Reeves follows the Oklahoma City Thunder and the Dallas Cowboys with steady devotion, plays pickup basketball and chess at the Cushing Community Center, and joins the local Cushing Anglers
    Club for weekend fishing trips, while their preference for small‑group activities keeps them from attending large stadium crowds unless it’s a hometown celebration.
  arts: Steven Reeves indulges their artistic curiosity by sketching prairie vistas, attending gallery openings featuring works by regional painter Jody Tipton, listening to classic detective‑themed scores
    by Ennio Morricone, and quoting lines from noir films starring Humphrey Bogart, all while they keep a modest collection of vintage photography books.
  travel: Steven Reeves enjoys low‑key road trips, having explored Santa Fe’s art markets, hiked the Grand Canyon’s South Rim, and plans a future visit to the Scottish Highlands to trace ancestral roots,
    while their family obligations keep most vacations within a three‑hour drive of Cushing and they often choose destinations that blend cultural curiosity with manageable travel time.
  culinary: Steven Reeves experiments with Oklahoma‑style barbecue, perfecting a rub of brown sugar, smoked paprika, cumin, and chipotle for brisket and pork ribs, while also savoring chili made with locally
    sourced beans, and they occasionally whip up a baked apple pie using Granny Smith apples and a flaky crust.
  core: Steven Reeves is a curious yet laid‑back community police officer who balances meticulous data analysis with a disorganized love for off‑beat art and weekend barbecues, and they navigate life with
    a blend of self‑reliance, modest compassion, and a habit of forgetting to file paperwork on time.
background:
  cultural: Steven grew up in a middle‑class, Protestant family on the outskirts of Tulsa, where values of self‑reliance, community service, and respect for law enforcement were emphasized. His heritage
    reflects typical Midwestern European roots (German and Irish ancestry) common among white Oklahomans. Living in Cushing, an oil‑rich small town, he is attuned to the region’s blend of cowboy culture,
    oil‑industry pragmatism, and a growing appreciation for local art and Native American history. He and his wife, both lifelong residents, are active members of their local church and regularly participate
    in town events that celebrate regional traditions.
