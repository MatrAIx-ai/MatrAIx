  hobbies: '[''Sketching'', ''Photography'', ''Visiting Art Galleries'', ''Reading Detective Novels'', ''Hiking'', ''Fishing'', ''Playing Chess'', ''Cooking Barbecue'', ''Volunteer at Historical Society'',
    ''Listening to Classic Rock'']'
  career_goals: Steven aims to advance to a supervisory role, such as lieutenant or captain, where he can lead a specialized community‑engagement unit that partners with local artists and cultural organizations.
    He plans to earn a master’s degree in public administration to deepen his strategic management skills and eventually seek the position of county sheriff, using his business background to improve departmental
    efficiency and foster collaborative policing models.
