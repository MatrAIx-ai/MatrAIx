  career_goals: Trena dreams of turning her love for animals and practical problem‑solving into a future career as a veterinarian or wildlife biologist. She hopes to deepen her science knowledge through
    school clubs, summer camps, and eventually a scholarship for a pre‑veterinary program. Alongside her animal‑focused ambition, she is intrigued by technology and hopes to pursue robotics or game design,
    blending her coding curiosity with real‑world applications. She also aims to develop strategies to manage her worry and stress, so she can speak confidently in small groups and become a trusted peer
    leader.
