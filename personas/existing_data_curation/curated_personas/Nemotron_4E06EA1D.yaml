personas:
  professional: Trena Baughman, an aspiring young coder and budding ornithology enthusiast, channels curiosity and practicality into building intricate Lego models and crafting Scratch games, and they often
    test new ideas on a small notebook before sharing them, while balancing a quiet disposition with a meticulous attention to detail that makes their small project groups run smoothly.
  sports: Trena Baughman enjoys weekend hikes in the nearby county park, plays on the school’s youth soccer team, the Oakwood Rangers, and they cheer for the Chicago Cubs during baseball season, preferring
    low‑key physical activity that aligns with their love for nature and need for solitary calm.
  arts: Trena Baughman draws inspiration from John James Audubon’s bird illustrations, practices piano pieces by Yiruma, and they admire the animated worlds of Studio Ghibli’s Hayao Miyazaki, often sketching
    scenes from her favorite books while listening to Taylor Swift’s acoustic tracks.
  travel: Trena Baughman spends summer vacations exploring local state parks such as Redwood National Park for birdwatching, and they dream of visiting the Ghibli Museum in Mitaka, Japan, planning trips
    with meticulous checklists to avoid stress, yet sometimes feels overwhelmed by the logistics of travel.
  culinary: Trena Baughman favors simple comfort foods like homemade macaroni and cheese with a sprinkle of cheddar, enjoys baking chocolate‑chip banana muffins using ripe bananas and walnuts, and they
    delight in discovering new fruits like dragon fruit at the farmer’s market, though they occasionally over‑indulge on sugary cereal.
  core: Trena Baughman is a quietly curious ten‑year‑old who blends imagination with methodical problem‑solving, yet they often worry about the smallest setbacks and hoard extra pencils as a quirky comfort.
background:
  cultural: 'Trena was raised in Dayton, Ohio, within a white, middle‑class Midwestern family that values modesty, community involvement, and education. Her upbringing reflects typical local customs: weekend
    family barbecues, attendance at the county fair, and participation in church‑related youth groups. The community emphasizes practical skills, teamwork in small groups, and a supportive environment for
    academic pursuits. These cultural influences shape her balanced outlook, blending curiosity with practicality and fostering a respect for both tradition and new ideas.'
