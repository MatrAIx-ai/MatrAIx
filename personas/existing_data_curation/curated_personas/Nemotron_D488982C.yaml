  career_goals: Looking ahead, Chun aims to transition from his current non‑working status into a role that leverages his organizational talent, such as a community center coordinator or logistics assistant
    for a local nonprofit. He plans to enroll in a vocational certificate program in project management within the next year, with the goal of securing a stable, full‑time position that provides a reliable
    income for his family. Long‑term, he aspires to open a small family‑run catering business that blends his culinary heritage with Texan flavors, allowing him to combine his love of cooking, entrepreneurship,
    and community service.
