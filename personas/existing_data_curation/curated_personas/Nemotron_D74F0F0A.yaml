  hobbies: '[''Gallery and museum visits'', ''Photography'', ''Creative writing (poetry and blogging)'', ''Volunteer docent work'', ''Trivia nights'', ''Recreational basketball'', ''Food exploration and
    restaurant hopping'', ''Travel to cultural festivals'', ''Improv comedy workshops'']'
  career_goals: Jose aims to secure a full-time position in arts administration or community outreach where he can combine his love for art with his organizational talents. He plans to complete a bachelor's
    degree in Arts Management or Public Administration within the next two years, while gaining professional experience through internships at local museums or cultural nonprofits. His long-term ambition
    is to become a program director who designs inclusive public art initiatives, builds partnerships with local businesses, and secures funding through grants and sponsorships. He also hopes to develop
    a side consultancy offering event-planning services for community organizations.
