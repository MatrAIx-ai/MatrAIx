personas:
  professional: An aspiring arts administrator, Jose Burkle, leverages their strong communication, event-organizing, and basic grant-writing skills to coordinate community exhibitions, while their methodical
    planning and occasional anxiety drive them to over-prepare every project.
  sports: A weekend basketball enthusiast, Jose Burkle, laces up for the Garden State Hoops community league while cheering for the New York Knicks and New York Giants, and fits in occasional 5 K runs and
    indoor rock-climbing sessions, though anxiety-driven fatigue sometimes leads them to skip a workout.
  arts: An engaged cultural participant, Jose Burkle, roams New Jersey galleries to admire works by Kehinde Wiley and Olafur Eliasson, writes short-form poetry inspired by Audre Lorde for a local blog,
    and devotes evenings to listening to Bon Iver and attending improv workshops that echo Lin-Manuel Miranda’s theatrical flair.
  travel: A culturally curious traveler, Jose Burkle, often escapes on budget-friendly weekend trips to New York City's MoMA PS1 and Philadelphia's Mural Arts Festival, while dreaming of a longer sojourn
    through Berlin's street-art districts and Parisian cafés.
  culinary: A food-curious gastronome, Jose Burkle, balances a modest home-cooking repertoire of Mediterranean mezze, truffle-infused mushroom risotto, and occasional ramen, while frequently indulging in
    New Jersey's food-truck scene for crab rolls, artisanal coffee, and craft beer paired with avocado toast.
  core: Jose Burkle blends relentless artistic curiosity with methodical event-planning, yet their intense emotional landscape drives both passionate community involvement and occasional bouts of overthinking
    and anxiety.
background:
  cultural: Jose grew up in a suburban environment in South Plainfield, New Jersey, in a family with mixed German and Irish ancestry. His upbringing was shaped by typical Northeastern American middle-class
    values, including a strong emphasis on education, community involvement, and a respect for cultural diversity. While his household celebrated traditional holidays such as Christmas and St. Patrick’s
    Day, he was also exposed to the rich multicultural tapestry of the New York‑New Jersey corridor, which fostered his curiosity about different artistic expressions and social perspectives.
