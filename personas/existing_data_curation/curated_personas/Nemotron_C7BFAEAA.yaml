  hobbies: '[''Yoga'', ''Meditation'', ''Hiking (Griffith Park, coastal trails)'', ''Bullet Journaling'', ''Reading contemporary fiction and memoirs'', ''Cooking (Mediterranean recipes)'', ''Indie music
    concerts'', ''Independent film screenings'', ''Volunteering at animal shelter'', ''Community workshops on mindfulness and sustainability'']'
  career_goals: She aims to transition from a receptionist role to an office manager or executive assistant position within a growing company or healthcare organization in Los Angeles. Amanda plans to complete
    her bachelor's degree in Business Administration, obtain a Certified Administrative Professional (CAP) credential, and develop leadership skills to supervise a front‑desk team. Long‑term, she envisions
    taking on project coordination responsibilities, contributing to process‑improvement initiatives, and achieving a stable, upward‑mobile career that balances professional growth with personal well‑being.
