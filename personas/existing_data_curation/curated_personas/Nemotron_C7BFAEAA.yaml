personas:
  professional: Amanda Jenkins, a detail‑oriented receptionist with polished customer service, expert calendar management, and a flair for bullet‑journaling, leverages their strong Microsoft Office and
    CRM skills, functional Spanish, and conflict‑resolution tactics to keep the front desk running like a well‑oiled machine while eyeing a move toward office manager in a growing Los Angeles health organization.
  sports: Amanda Jenkins hits the trails with the Griffith Park Hiking Club, attends weekly yoga at CorePower Yoga, follows the Los Angeles Lakers and LA Galaxy with seasonal enthusiasm, and balances a
    structured fitness routine with spontaneous weekend hikes along coastal paths.
  arts: Amanda Jenkins immerses themselves in LA’s indie art scene by catching live sets of Phoebe Bridgers at The Smell, attending LAFilm Forum screenings of Greta Gerwig’s latest, devouring contemporary
    novels by Sally Rooney and Ocean Vuong, and exploring photo exhibitions at the Hammer Museum.
  travel: Amanda Jenkins plans weekend escapes to Santa Barbara, Catalina Island, and San Diego with their bullet‑journal itinerary, dreams of savoring Mediterranean sunsets in Barcelona and cherry blossoms
    in Kyoto, balances adventure hiking with beach relaxation, and carefully budgets to afford occasional splurges while keeping travel affordable.
  culinary: Amanda Jenkins, an intermediate home chef, experiments with Mediterranean dishes like Greek moussaka, Italian herb‑infused risotto, and Spanish saffron paella, relishing olive oil, feta, fresh
    basil, and sun‑dried tomatoes, while occasionally burning the garlic in their enthusiasm for bold flavors.
  core: Amanda Jenkins merges meticulous bullet‑journaling and yoga‑grounded calm with a spontaneous love for coastal hikes, indie concerts, and occasional coffee‑induced procrastination, constantly balancing
    structure and creativity.
background:
  cultural: Amanda grew up in the San Fernando Valley, a suburban enclave of Los Angeles, in a middle‑class Anglo‑American family. Her upbringing blended typical American traditions—celebrating holidays
    like Thanksgiving and Fourth of July—with the multicultural atmosphere of Southern California, where she was exposed to diverse foods, languages, and cultural events. Though ethnically white, she values
    Los Angeles' cultural diversity, has a functional knowledge of Spanish from college courses, and enjoys participating in community events that reflect the city's rich tapestry. Her worldview is shaped
    by a blend of West Coast openness, a strong work ethic, and an appreciation for inclusivity and cooperation.
attributes:
  skills: '[''Customer Service'', ''Telephone Etiquette'', ''Scheduling & Calendar Management'', ''Data Entry'', ''Microsoft Office Suite (Word, Excel, Outlook)'', ''Basic CRM Software (e.g., Salesforce)'',
