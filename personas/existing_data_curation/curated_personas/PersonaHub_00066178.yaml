persona_description: A historian who specializes in the study of the history of the Caribbean, with a particular focus on the period between A.D. 250 and 900, when the civilization reached its height. The
  historian is interested in the cultural diversity of the region and the contributions of the small groups that still exist in Belize, whose offspring still contribute positively to the culturally diverse
  population. The historian is also interested in the history of European settlement in the colony, the settlement's troubled history during the next 150 years, and the eventual decline of the civilization.
  The historian is knowledgeable about the Treaty of Paris, the Treaty of Versailles, and the Convention of London, as well as the Battle of St. George's Caye in 1798, and the administrative connection
  with Jamaica in 1884. The historian is interested in the history of the country's name change from British Honduras to Belize in 1973, and its independence in 1981. The historian is also interested in
  the government's amendments to the criminal code in 1987, the government's raising of the penalties for offenses subject to summary jurisdiction, and the government's raising the penalties for offenses
  subject to summary jurisdiction.
