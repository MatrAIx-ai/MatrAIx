    basics'', ''Event organization'', ''Supply‑chain networking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Exploring Houston street art and murals'', ''Listening to live blues and jazz'', ''Playing guitar at open‑mic nights'', ''Cooking and grilling Texas
    BBQ'', ''Participating in a local bowling league'', ''Volunteering for neighborhood cleanup events'', ''Collecting vintage vinyl records'', ''Attending the Houston Livestock Show and Rodeo'', ''Homebrewing
    craft beer'']'
  career_goals: Daniel aims to move up to a supervisory role within warehouse operations, eventually becoming a logistics coordinator who can blend on‑site expertise with strategic planning. He plans to
    earn a professional certification in supply‑chain management to solidify his technical credibility. Over the next five years, he hopes to launch a small, flexible moving and storage business that emphasizes
    personalized service and community engagement. Parallel to his professional aspirations, he wants to curate pop‑up art showcases in industrial spaces, combining his love for art with his industry connections
    to give local artists exposure.
