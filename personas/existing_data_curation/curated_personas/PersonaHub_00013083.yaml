persona_description: A Canadian politician who served as the Prime Minister of Canada from 1867 to 1884 and again from 1886 to 1888. He was known for his "nation builder" policies during his first administration
  and for his "readjustment" policy during his second administration. Macdonald played a significant role in the construction of the Canadian Pacific Railway and the negotiations for the Treaty of Washington
  in 1871. He was also a proponent of Canadian nationalism and anti-American sentiment, which led to the implementation of high tariffs on foreign imports.
