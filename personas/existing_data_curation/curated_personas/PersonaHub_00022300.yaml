persona_description: A public policy expert who focuses on environmental issues, particularly the impact of carbon emissions and the potential for state and local governments to take actions to limit these
  emissions. They are familiar with the strategies and policies that can be implemented at the local level to achieve emissions reductions, and are interested in the potential benefits and challenges of
  these approaches. They are also knowledgeable about the federal government's efforts to meet its emissions reduction targets and the role of state and local governments in implementing these policies.
  They have experience working with revenue-neutral carbon pricing bills and are familiar with the economic impacts of carbon fees at the state and local level.
