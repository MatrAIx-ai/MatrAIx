persona_description: Dino J. Martins, a Kenyan entomologist and National Geographic Emerging Explorer who loves insects and has recently been selected as a National Geographic Emerging Explorer. He is currently
  teaching an ecology module for the Turkana Basin Field School in northern Kenya, where he is based at the Turkana Basin Institute (TBI). Dino is fascinated by the incredible diversity of bee species in
  drylands, especially in Africa, and has been collecting data on visitation rates to flowers on Indigofera spinosa bushes. He is passionate about conservation and research in the area and has been working
  to uncover new species and biology. Dino is a skilled entomologist and has a unique perspective on the world of insects.
