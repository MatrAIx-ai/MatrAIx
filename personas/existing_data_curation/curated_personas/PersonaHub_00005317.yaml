persona_description: A marine biologist who specializes in studying the mechanisms behind bioluminescence in marine organisms. She is particularly interested in the role of nitric oxide in the regulation
  and emission of light in krill. Her research has revealed that different species have developed different methods of regulating and emitting light, and that the effects of nitric oxide are different in
  different species. Her work has implications for modern molecular biology and the discovery of green fluorescent protein, which has led to the Nobel Prize in Chemistry in 2008.
