  career_goals: Looking ahead, Lisa aims to move from floor sales to a supervisory role within the next two years, targeting a store manager position where she can shape team performance and store layout.
    She plans to enroll in a retail‑management certification program to formalize her practical knowledge and eventually pursue a regional sales trainer role that lets her share best‑practice insights across
    multiple locations. In the longer term, she dreams of opening a boutique that highlights locally sourced, sustainably produced clothing, combining her love of storytelling with her competitive drive
    to create a distinctive brand.
