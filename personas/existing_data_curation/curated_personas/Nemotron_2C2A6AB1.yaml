personas:
  professional: Lisa Johnson, a 30‑year‑old retail associate turned aspiring manager, leverages her humanities‑shaped storytelling knack and sharp conflict‑resolution skills to turn product features into
    compelling narratives, while her competitive streak drives her to consistently exceed sales targets and push for a supervisory role.
  sports: Lisa Johnson thrives on the rugged outdoors of southeastern Idaho, regularly hiking the Sawtooth foothills, cycling with the Boise Cycling Club, cheering on the Idaho Vandals basketball team,
    and hitting the ski slopes at Sun Valley each winter as part of a balanced fitness routine.
  arts: Lisa Johnson is an avid reader of historical fiction—favoring authors like Hilary Mantel and Ken Follett—while also performing in community‑theater productions of classics such as 'Les Misérables'
    and attending live‑music shows featuring The Avett Brothers and local folk bands, weaving literature and performance into their personal creative outlet.
  travel: 'Lisa Johnson’s travel style blends adventure and relaxation: they’ve road‑tripped to Yellowstone National Park for epic hikes, kayak the pristine waters of Crater Lake, spent a weekend exploring
    Portland’s indie scene, and keep a bucket‑list spot for Patagonia’s Torres del Paine, always planning trips around work flexibility and budget constraints.'
  culinary: Lisa Johnson’s kitchen is a laboratory of seasonal flavors, where they master sourdough bread with rosemary, bake blueberry cheesecake and apple crumble using fresh Idaho potatoes and locally
    sourced honey, balancing an intermediate cooking skill with a love for sharing generous slices at neighborhood potlucks.
  core: Lisa Johnson, a 30‑year‑old retail dynamo with a rugged love for the outdoors, DIY upcycling, and storytelling, balances a competitive edge and a laid‑back, slightly chaotic lifestyle while constantly
    seeking the next narrative to sell.
background:
  cultural: Lisa identifies as a White American with roots in the Pacific Northwest and the Intermountain West. Raised in a modest, middle‑class family in Idaho, she grew up with a blend of rural sensibilities
    and a respect for community institutions such as the local library and volunteer fire department. Her family’s cultural heritage includes German and Scandinavian ancestors, which has given her an appreciation
    for seasonal traditions and a practical work ethic. Living in Pocatello has exposed her to a diverse array of outdoor lifestyles and a growing arts scene, shaping her values of self‑reliance, community
    involvement, and an openness to new ideas tempered by pragmatic judgment.
