personas:
  professional: Lynda Thomason, a 44‑year‑old drywall, ceiling tile, and joint taping specialist, leverages their meticulous blueprint reading, code compliance, and hands‑on finishing expertise to mentor
    apprentices and lead small renovation crews, while channeling their curiosity for sustainable materials into a budding plan to launch a boutique decorative plaster firm.
  sports: Lynda Thomason hikes the Appalachian Trail sections near the Lehigh Valley with the Bethlehem Hiking Club, roots for the Lehigh Valley IronPigs baseball team and the Philadelphia Eagles, and occasionally
    joins a local recreational softball league for social fitness.
  arts: Lynda Thomason channels their love of watercolor into paintings inspired by Georgia O'Keeffe’s botanical forms, captures the geometric shadows of historic Bethlehem buildings in photographs reminiscent
    of Ansel Adams, and refines their pottery skills under the guidance of local artist Susan Miller at the SteelStacks workshops.
  travel: Lynda Thomason enjoys weekend road trips to the Hudson Valley and historic Philadelphia for art tours, while dreaming of a spring pilgrimage to Rome and Florence to study Renaissance architecture,
    balancing meticulous itinerary planning with spontaneous detours to local farmers markets.
  culinary: Lynda Thomason, an adept home‑cook, often transforms garden harvests into roasted beet and goat‑cheese salads, crafts fresh sourdough loaves seasoned with rosemary, and whips up mushroom risotto
    flavored with thyme and Parmigiano‑Reggiano for weekend gatherings.
  core: Lynda Thomason blends meticulous drywall craftsmanship with a voracious artistic curiosity, managing lingering worries through garden solitude, community volunteering, and a steadfast plan to turn
    their hands‑on expertise into a sustainable finishing business.
background:
  cultural: Lynda grew up in Bethlehem, Pennsylvania, a city shaped by its steel‑industry roots and Moravian heritage. As a white, Anglo‑American woman from a modest middle‑class family, she was raised
    with values of hard work, reliability, and community responsibility. The region’s blend of industrial pragmatism and a vibrant arts scene—highlighted by venues like the SteelStacks—nurtured her dual
    appreciation for skilled craftsmanship and creative expression. Local traditions such as annual holiday festivals, community service events, and a strong sense of neighborhood solidarity have reinforced
    her cooperative and considerate disposition. While her formal education includes some college coursework—partly in art history and business fundamentals—her practical experience in construction reflects
    the Lehigh Valley’s longstanding emphasis on skilled trades. This cultural backdrop informs her balanced approach to organization and flexibility, her desire for both social connection and personal
    downtime, and her drive to integrate artistic interests into her professional life.
attributes:
  skills: '[''Drywall installation'', ''Ceiling tile installation'', ''Joint taping and finishing'', ''Blueprint reading'', ''Material estimation'', ''Safety compliance (OSHA)'', ''Use of hand and power
