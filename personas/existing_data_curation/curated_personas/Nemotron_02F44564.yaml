  hobbies: '[''Watercolor painting'', ''Architectural photography'', ''DIY home renovation'', ''Reading design and art books'', ''Hiking in the Pocono Mountains'', ''Community theater attendance'', ''Pottery
    classes'', ''Gardening'', ''Volunteering at local food bank'', ''Attending art workshops'']'
  career_goals: Lynda aims to transition from a skilled tradesperson to a small‑business owner, obtaining a contractor’s license within the next two years to launch her own specialized finishing company.
    She plans to pursue certification in sustainable building materials and decorative plaster to differentiate her services. In the longer term, she hopes to become a certified master installer, mentor
    a cadre of apprentices, and eventually take on project‑management roles for larger renovation projects, securing a stable income that will support her retirement and give her flexibility for personal
    pursuits.
