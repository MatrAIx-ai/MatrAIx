personas:
  professional: Yang Do, a 29‑year‑old warehouse operative with forklift certification and OSHA expertise, channels methodical efficiency and team leadership into streamlining inventory flow while championing
    workplace art displays to inspire colleagues.
  sports: Yang Do, an energetic member of a local basketball league who roots for the New York Knicks and participates in occasional community pick‑up soccer games, treats fitness as a social ritual that
    balances teamwork with personal resilience.
  arts: Yang Do, a volunteer curator for the Binghamton Arts Council, blends a love for street art legends like Banksy with a keen eye for nature photography captured on the Susquehanna River trail, and
    finds inspiration in the works of photographer Annie Leibovitz and local muralist Maya Hernandez.
  travel: Yang Do plans trips with the same organized precision they bring to inventory, favoring weekend road trips to the Adirondacks, a yearly subway‑haul to New York City’s art festivals, and a dream
    itinerary that includes exploring Seoul’s vibrant art districts and the historic temples of Kyoto.
  culinary: Yang Do enjoys experimenting in the kitchen, mastering dishes such as kimchi fried rice, bulgogi lettuce wraps, and ramen broth, while occasionally indulging in late‑night snack runs for spicy
    tteokbokki from a local food stall.
  core: Yang Do, a 29‑year‑old warehouse pro with a calm, curious nature, merges a love for systematic logistics, community basketball, and spontaneous art projects, all while never missing a chance to
    perfect a new recipe, even if it means a messy kitchen.
background:
  cultural: Yang is a second‑generation Korean‑American. His parents immigrated from South Korea in the early 1990s and instilled values of hard work, respect for elders, and education. Raised in a bilingual
    household, he speaks both English and Korean fluently and celebrates Korean holidays such as Chuseok and Seollal while also participating in American traditions. Growing up in upstate New York, he has
    blended his heritage with the local culture, often sharing Korean cuisine with friends and taking part in community events that highlight multicultural arts.
