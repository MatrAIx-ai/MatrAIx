  career_goals: Yang aims to advance from a material mover to a warehouse supervisor within the next three years, pursuing an associate degree in supply chain management and obtaining additional certifications
    such as a certified logistics associate. He envisions eventually overseeing a regional distribution center or launching his own small moving and logistics service that emphasizes sustainable practices.
    Additionally, he hopes to blend his passion for art with his professional life by organizing workplace art displays and community exhibitions, using his role to foster a more creative and engaging work
    environment.
