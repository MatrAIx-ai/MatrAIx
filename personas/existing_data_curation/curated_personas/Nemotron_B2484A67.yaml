  career_goals: Looking ahead, Maria aims to graduate high school with strong academic standing, using her bilingual abilities and technology skills to pursue a degree in communications or public health.
    She dreams of working as a community outreach coordinator for a nonprofit that supports Latino youth, blending her desire to help others with a practical career path that offers financial stability.
    In the shorter term, she plans to build a small YouTube channel that showcases Puerto Rican recipes and teen mental‑health tips, hoping both to develop a personal brand and to create a supportive space
    for her peers. Maria is also mindful of her stress levels, so she includes learning coping strategies and possibly studying counseling as part of her long‑term goals.
