personas:
  professional: Maria Aguero, a teen community‑center volunteer, channels her curiosity and practicality into coordinating after‑school activities while producing upbeat TikTok cooking‑and‑wellness clips
    that blend salsa beats with mental‑health tips, showcasing reliable organization tempered by flexible creativity.
  sports: Maria Aguero kicks a ball every weekend for the Riverside Rangers youth soccer squad, cheers on the city’s professional football team Metro United FC, and stays fit through high‑energy salsa and
    reggaeton dance sessions that double as cardio workouts, reflecting her outgoing, team‑oriented spirit.
  arts: Maria Aguero sketches gritty urban‑fantasy panels inspired by Junji Ito and reads graphic novels by Brian K. Vaughn, while vibing to reggaeton star Bad Bunny and practicing salsa moves from YouTube
    choreographer Alex Rizzo, weaving these influences into vibrant TikTok storytelling that mirrors her artistic curiosity.
  travel: Maria Aguero dreams of immersing herself in Barcelona’s salsa festivals and exploring the historic streets of Old San Juan, yet currently saves for a school‑approved field trip to Washington D.C.,
    balancing limited parental allowance with a yearning for cultural adventure.
  culinary: Maria Aguero whips up hearty mofongo with fried plantains, garlic, and chicharrón, and simmers arroz con gandules seasoned with sofrito, cilantro, and achiote, showcasing a beginner‑to‑intermediate
    cooking level on TikTok while occasionally over‑salting a dish when juggling a dance rehearsal.
  core: Maria Aguero is a high‑spirited teen who fuses salsa steps, soccer drills, and TikTok cooking‑and‑wellness clips into a nonstop quest for connection, even as she battles frequent worries, over‑caffeinated
    late‑night gaming sessions, and a tendency to over‑spend on trendy gear.
background:
  cultural: Maria is a second‑generation Puerto Rican living in Melbourne, Florida, a city with a vibrant Caribbean‑Latino community. At home, Spanish is spoken alongside English, and family gatherings
    often feature traditional dishes like pasteles, arroz con dulce, and lechón as well as music ranging from plena to contemporary reggaeton. She celebrates Puerto Rican holidays such as Día de la Constitución
    and the festive San Juan festivities with her extended family, preserving a strong sense of cultural identity. The local Latino community center provides a space for cultural events, language classes,
    and dance workshops, which Maria regularly attends. Growing up in a multicultural Floridian environment, she also navigates American school culture, blending mainstream teenage experiences with the
    values of family closeness, respect for elders, and a collective spirit rooted in her island heritage.
