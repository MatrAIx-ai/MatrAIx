  hobbies: '["abstract painting", "poetry writing", "reading philosophy and Latin American literature", "listening to and playing Afro-Cuban music", "traditional Cuban cooking", "visiting art galleries
    and museums", "gardening herbs", "walking on the beach", "volunteering art workshops for seniors"]'
  career_goals: Maykel aims to compile his reflections and poems into a memoir that weaves together personal history and Cuban diaspora themes, and to publish a limited‑edition book of his artwork and verses.
    He aspires to curate a traveling exhibition that showcases the evolution of Cuban-American artistic expression in South Florida. He is also working to establish a scholarship fund for Cuban‑American
    students pursuing visual arts, and to expand his volunteer role as a cultural ambassador for the Lake Worth Historical Society by organizing an annual "Cuban Heritage Days" festival. A long‑term ambition
    is to travel to Cuba for a research residency, documenting oral histories of elder immigrants and enriching his own creative practice.
