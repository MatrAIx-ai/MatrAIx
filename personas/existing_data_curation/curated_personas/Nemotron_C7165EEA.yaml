personas:
  professional: Maykel Gonzalez is a seasoned community visual artist and cultural program director who designs and leads workshops on heritage storytelling, curates traveling exhibitions that trace the
    evolution of Caribbean‑American art in South Florida, and mentors younger creators, drawing on a solid foundation in 20th‑century art theory and bilingual fluency; while they favor flexibility over
    rigid schedules and often improvise timelines, their calm resilience and collaborative spirit keep projects on track.
  sports: Maykel Gonzalez stays active through daily walks along Lake Worth Beach, participates in a senior yoga class at the community center, enjoys occasional friendly matches in a local seniors’ tennis
    league, and follows the Miami Heat with fervor, balancing a laid‑back approach to fitness with moments of competitive enthusiasm.
  arts: Maykel Gonzalez spends mornings in a sun‑filled studio creating abstract collages inspired by the gestural vigor of Willem de Kooning, the bold color fields of Frida Kahlo, and the improvisational
    rhythms of Afro‑Latin jazz legends like Chucho Valdés, while evenings are dedicated to attending Palm Beach gallery openings featuring contemporary Caribbean artists such as Carlos Almaraz and listening
    to live performances by the Latin jazz ensemble Los Pleneros, all of which feed their creative narrative.
  travel: Maykel Gonzalez has journeyed to New Orleans for Mardi Gras, explored Cartagena’s historic plazas, and taken scenic drives along Florida’s coast to Key West’s art fairs; their next ambition is
    a research residency on the Caribbean island of their ancestors, complemented by a cultural immersion week in Barcelona to study Gaudí’s mosaics, planning each trip with modest budgeting and a preference
    for relaxed itineraries that allow time for sketching and reflection.
  culinary: Maykel Gonzalez relishes cooking traditional Caribbean fare—slow‑braised ropa vieja, crisp tostones, and steaming café con leche—often harvesting fresh basil, cilantro, and oregano from their
    patio garden to season dishes, and while their cooking demos double as storytelling sessions for friends, they occasionally over‑caramelize the coffee when preoccupied with a new painting concept.
  core: Maykel Gonzalez fuses a lifelong passion for abstract mixed‑media art, bilingual cultural storytelling, and a relaxed yet resilient senior lifestyle into a distinctive creator who mentors, cooks,
    and strolls the beach while dreaming of a Caribbean research residency.
background:
  cultural: Maykel was born in Santiago de Cuba to parents who fled the island during the early 1960s. Growing up bilingual in a Cuban household, he absorbed the rhythms, folklore, and culinary traditions
    of his heritage while navigating the multicultural tapestry of South Florida. The vibrant Cuban community in Miami and the broader Latino neighborhoods of Palm Beach County shaped his identity, fostering
    a deep respect for collective memory and artistic expression. He maintains strong ties to Cuban celebrations such as Carnaval, religious syncretism like Santería influences, and the Spanish language.
    At the same time, he embraces the eclectic artistic scene of Lake Worth, blending coastal motifs with vivid colors and narratives drawn from his Cuban roots. This hybrid cultural background informs
    his aesthetic preferences, storytelling style, and commitment to preserving Cuban heritage within the diaspora.
attributes:
  skills: '["abstract mixed-media painting", "poetry composition", "bilingual Spanish-English translation", "art history (20th-century modernism)", "cultural program design", "community workshop facilitation",
