personas:
  professional: Shekiera Mack, a 21‑year‑old front‑line security guard specializing in casino surveillance, leverages a keen eye for visual patterns honed by sketching, combined with empathy and CPR certification,
    to de‑escalate conflicts, produce precise incident reports, and mentor peers while charting a path toward senior surveillance officer and eventually security operations manager.
  sports: Shekiera Mack supports the Atlanta Hawks and Atlanta Falcons, joins a local yoga studio for weekly flexibility sessions, participates in a recreational basketball league at the community center,
    and runs with the Atlanta Run Club every Saturday morning, balancing low‑impact cardio with occasional pick‑up basketball games.
  arts: Shekiera Mack frequents the MOCA and Ponce City Market galleries, sketches street scenes after listening to John Coltrane and Aretha Franklin on vinyl, attends monthly Jazz at the High Museum concerts,
    and draws inspiration from contemporary African‑American literature authors such as Ta‑Nehisi Coates and Chimamanda Ngozi Adichie to fuel their creative outlook.
  travel: Shekiera Mack, who prefers culturally rich yet affordable trips, has explored New Orleans’ French Quarter for live jazz, hiked the Blue Ridge Mountains near Asheville, plans a spring itinerary
    to Barcelona’s street art districts, and books train tickets or budget airlines to maximize travel time while keeping expenses within a modest student‑friendly budget.
  culinary: Shekiera Mack enjoys cooking shrimp and grits, sweet potato pie, and collard greens at home, experiments with craft coffee beans from local roasters, occasionally dabbles in vegan jackfruit
    tacos, and seeks out hidden‑gem soul food eateries like Fat Matt’s in Atlanta for authentic flavor experiences.
  core: Shekiera Mack blends a watchful security career with a restless artistic soul, channeling sketch‑book patterns into vigilant surveillance, all while balancing disciplined budgeting, yoga‑based stress
    relief, and a love for jazz‑filled nights out.
background:
  cultural: Shekiera is an African‑American from Atlanta, raised in a close‑knit family that values church, community, and the rich history of the civil‑rights movement. Her upbringing immersed her in Southern
    black culture—soul music, food traditions, storytelling, and a strong sense of collective responsibility. She draws inspiration from black artists and activists, and she actively participates in local
    cultural festivals and community service initiatives that celebrate her heritage.
attributes:
  skills: '[''CCTV monitoring'', ''Real-time threat assessment'', ''Incident reporting'', ''First aid/CPR'', ''Conflict de-escalation'', ''Empathy and active listening'', ''Self-defense'', ''Knowledge of
    gambling regulations'', ''Basic computer troubleshooting'', ''Art observation and pattern recognition'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Listening to jazz and soul music'', ''Reading African-American literature'', ''Yoga and mindfulness practice'', ''Volunteer
    tutoring at community youth center'', ''Street photography'', ''Playing chess'', ''Watching independent films'', ''Exploring local food markets'']'
  career_goals: She aims to advance from a front‑line security guard to a senior surveillance officer and eventually a security operations manager at a major entertainment venue. She plans to complete her
    bachelor's degree in criminal justice and earn professional certifications such as CPP or PSP, positioning herself for roles in risk assessment or private investigation. She also hopes to mentor new
    officers, develop community‑focused safety outreach programs, and integrate her passion for art into creative security initiatives.
