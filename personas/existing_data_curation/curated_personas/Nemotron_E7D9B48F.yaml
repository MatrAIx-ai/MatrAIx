personas:
  professional: Angel Valois, a high‑school junior leading the robotics club’s CAD and programming team, merges a methodical engineering mindset with a cooperative, detail‑oriented approach to group projects.
  sports: Angel Valois spends weekday evenings jogging at the local park, participates in the school’s varsity cross‑country team during fall, cheers for the New England Patriots and the Connecticut Huskies,
    and maintains a disciplined fitness routine that balances endurance training with weekly yoga sessions.
  arts: Angel Valois practices piano three times a week, honing works by Chopin, Beethoven, and Debussy, attends performances by the New York Philharmonic when possible, and curates a blog section where
    they analyze how classical compositions influence modern productivity techniques.
  travel: Angel Valois prefers meticulously planned trips, having explored Quebec’s historic town of Quebec City during a family summer visit, trekked the Appalachian Trail in Virginia, and dreams of a
    semester abroad in Paris to immerse themselves in French culinary and storytelling traditions, all while balancing school commitments.
  culinary: Angel Valois enjoys cooking French‑inspired dishes such as crêpes with Nutella, ratatouille, and coq au vin, experiments with precise measurements like a lab technician, and frequently pairs
    meals with a side of New England maple syrup or a glass of chilled Chardonnay.
  core: Angel Valois is a disciplined teen who blends a love for engineering precision, classical piano, and meticulous budgeting into a habit‑driven, community‑focused lifestyle.
background:
  cultural: Angel grew up in New Milford, Connecticut, within a middle‑class family that values education and civic involvement. Her surname, Valois, reflects French‑Canadian ancestry, and family traditions
    sometimes include celebrating winter holidays with French cuisine and storytelling. Raised in a New England suburb, she experiences typical American cultural practices such as Thanksgiving and Fourth
    of July celebrations, while also occasionally participating in regional French heritage events organized by a local cultural society. The community’s emphasis on academic achievement and community service
    has shaped Angel’s disciplined outlook and cooperative spirit.
