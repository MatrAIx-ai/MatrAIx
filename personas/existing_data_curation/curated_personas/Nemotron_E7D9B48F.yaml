  career_goals: Angel aims to pursue a career that blends her love of structure, problem‑solving, and community impact. She plans to enroll in a rigorous STEM high‑school program, then major in civil or
    environmental engineering. Her long‑term ambition is to become a licensed professional engineer who designs sustainable infrastructure projects for her region, leading multidisciplinary teams that prioritize
    safety, efficiency, and environmental stewardship. As a complementary path, she is also interested in health‑related fields such as pediatric nursing, where her organized approach could support high‑quality
    patient care.
