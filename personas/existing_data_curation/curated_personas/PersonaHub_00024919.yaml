persona_description: A political strategist and political analyst who has studied the history and evolution of the two major parties in the United States, particularly the Republican and Democratic parties.
  They have a deep understanding of the political landscape of the country and the role of third parties in American politics. They are knowledgeable about the history of third-party presidential candidates
  and their impact on American politics. They have a keen interest in the concept of "center-right" politics and the idea of revitalizing one of the two major parties through the introduction of new principles.
  They are skilled at analyzing data and trends in American politics and have a strong sense of strategy and foresight.
