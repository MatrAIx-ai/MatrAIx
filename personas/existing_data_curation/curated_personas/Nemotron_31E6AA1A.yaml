  career_goals: David aims to leverage his experience to transition into a supervisory or training role within the county’s administrative team, where he can mentor younger staff and help streamline front‑office
    procedures. He is also interested in completing a short certification in office management or customer‑service leadership to formalize his expertise. Over the next few years, he hopes to become a reliable
    point‑person for community outreach projects, possibly coordinating senior‑citizen programs or local tourism information initiatives. While keeping an eye on a comfortable retirement, he values staying
    active in the workplace and contributing to the improvement of public services.
