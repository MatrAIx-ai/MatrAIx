  hobbies: '[''building block towers'', ''solving picture puzzles'', ''coloring animal drawings'', ''reading picture books about nature'', ''collecting leaves, pinecones, and rocks'', ''listening to nursery
    rhymes'', ''solo pretend play with animal figurines'']'
  career_goals: Martha imagines a future where she works alone in nature, describing a dream of becoming a wildlife biologist who studies prairie animals and plants in the quiet fields of North Dakota.
    She also hopes to one day manage a small community library where she can arrange books and read peacefully. These ambitions reflect her love of curiosity, practicality, and a need for solitary, focused
    environments.
