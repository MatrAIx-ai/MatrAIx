personas:
  professional: Martha Jewell is a budding backyard engineer who spends hours constructing elaborate block towers, balancing a fierce curiosity about how things fit together with a practical insistence
    on sturdy foundations, while they often abandon a plan mid‑construction when a new idea pops up, preferring the flexibility to re‑arrange rather than follow a strict schedule, and they constantly challenge
    neighboring kids to see who can build the tallest structure.
  sports: Martha Jewell is a preschool gymnastics enthusiast who attends a Tuesday‑Thursday class at the community center, they cheer for the New York Yankees while watching family game nights, and they
    prefer solitary balance‑beam practice over group games, fiercely trying to out‑perform peers in every tumble.
  arts: Martha Jewell loves drawing whimsical cartoon animals after watching Pixar short films, they sing along to Raffi's 'Baby Beluga' and the songs from Disney's 'Frozen', and they retreat to a quiet
    corner with crayons, avoiding noisy group art sessions, while they competitively compare their sketches to those of friends.
  travel: Martha Jewell enjoys day trips to the local aquarium and has visited Disneyland in Anaheim, they dream of seeing the Eiffel Tower someday, yet they favor short car rides with familiar music over
    long flights, seeking quiet seats in the back of the vehicle to nap and observe passing scenery.
  culinary: Martha Jewell delights in cheesy macaroni, strawberry‑banana smoothies, and peanut butter‑jelly sandwiches, they are notoriously picky about broccoli, often having a mini‑tantrum when vegetables
    appear, and they love helping stir batter in the play kitchen while humming their favorite tune.
  core: Martha Jewell is a restless little explorer who balances boundless curiosity with a wary, solitary streak, often worrying about tiny changes, competing quietly with peers, and seeking quiet corners
    for solo play.
background:
  cultural: Martha is a white child raised in Bismarck, North Dakota, where Midwestern values of self‑reliance, community gatherings, and appreciation for the open prairie shape daily life. Her family participates
    in local traditions such as the county fair, holiday church services, and winter activities like ice skating. Growing up near the Missouri River, she often explores the gentle woods and fields, learning
    about the region's wildlife and seasonal cycles. These experiences nurture her quiet curiosity and love for solitary outdoor play.
attributes:
  skills: '[''letter recognition'', ''basic counting to 20'', ''color identification'', ''fine motor skills (block stacking and puzzle solving)'', ''basic household chores (toy organization)'', ''solo imaginative
