personas:
  professional: Yanelys Ng is an aspiring community outreach coordinator who leverages bilingual Spanish-English communication, meticulous event planning, and data-driven project management to design health-focused
    programs for youth, while their organized, sociable, and empathetic nature makes them the natural hub of collaborative initiatives.
  sports: Yanelys Ng stays active through salsa and Zumba classes at a downtown community studio, joins weekend hiking groups exploring the Santa Monica and Griffith Park trails, and supports local teams
    like the Los Angeles Dodgers and LA Galaxy, balancing structured cardio workouts with spontaneous beach walks.
  arts: Yanelys Ng regularly visits contemporary art exhibitions featuring vivid murals and kinetic installations, follows the work of street artist Banksy and photographer Vivian Maier, and attends film
    festivals showcasing directors such as Bong Joon-ho and Greta Gerwig, allowing the fusion of visual storytelling and cultural narratives to inspire their own content creation.
  travel: Yanelys Ng prefers thoughtfully planned trips that blend adventure with cultural immersion, having explored the historic neighborhoods of Barcelona, the coastal hikes of Big Sur, and weekend getaways
    to Santa Barbara's vineyards, while a future dream is to trek the Andean trails of Peru, balancing budget constraints with a love for shared experiences.
  culinary: Yanelys Ng delights in crafting hand-rolled corn-tortilla tacos with chipotle-marinated pork, pineapple, and fresh cilantro, often experimenting by swapping the tortilla for quinoa-based shells
    or adding a Korean gochujang glaze, showcasing a confident home-chef level that fuses tradition with bold, cross-cultural flavors.
  core: Yanelys Ng blends organized ambition, sociable energy, and a mindful approach to wellness, channeling their curiosity into community-focused projects while constantly juggling worries that fuel
    meticulous planning.
background:
  cultural: Yanelys was raised in Pasadena, California, in a Mexican‑American household where Spanish was spoken at home and English at school. Her family celebrates Mexican holidays such as Día de los
    Muertos, Cinco de Mayo, and family quinceañeras, emphasizing communal meals, music, and storytelling. She grew up participating in local cultural festivals at the Pasadena Civic Center and engaging
    with the vibrant Latino neighborhoods of Los Angeles. The blend of traditional Mexican values—emphasis on family, respect for elders, and collective well‑being—with the progressive, multicultural environment
    of Southern California has shaped her identity. This bicultural upbringing fuels her pride in Mexican heritage and motivates her to give back to the Hispanic community through outreach, cultural preservation,
    and empowerment initiatives.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Public speaking", "Event planning and coordination", "Social media content creation and management", "Community outreach and engagement", "Project
    management (timeline, budgeting)", "Customer service and interpersonal relations", "Conflict resolution and mediation", "Data analysis (Excel, Google Sheets)", "Research and information synthesis",
    "Time management and organization", "Stress‑management techniques (mindfulness, journaling)", "Cultural competency (Mexican‑American)"]'
  hobbies: '["Hosting weekly \"tapas and talk\" dinner gatherings", "Salsa and Zumba dancing", "Cooking traditional Mexican dishes (including fusion recipes)", "Lifestyle blogging/vlogging on Instagram",
    "Volunteering for after‑school tutoring", "Yoga and meditation", "Attending art exhibitions and film festivals (focus on Latino creators)", "Hiking and beach walks with friends"]'
  career_goals: Yanelys aims to enroll in a bachelor's program in Business Administration or Public Health within the next two years, building on her associate's degree. She aspires to secure an entry‑level
    position in community outreach or marketing at a nonprofit serving Latino communities, where she can apply her bilingual communication and event planning skills. Over the next five years, she hopes
    to advance to a community outreach coordinator or program manager role, focusing on health education and empowerment for Mexican‑American youth. Concurrently, she plans to develop a personal brand as
    a bilingual content creator, sharing Mexican culinary traditions, cultural stories, and mental‑wellness tips. To support these ambitions, Yanelys intends to earn certifications in project management
    (CAPM) and digital marketing, and eventually launch a social enterprise that provides job training and micro‑loan support for young Latina women in Southern California.
