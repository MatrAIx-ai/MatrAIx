  career_goals: Although retired, Tony aims to remain an active contributor to his community and his family. He plans to mentor younger volunteers at the local senior center, share his construction knowledge
    through workshops, and continue learning by taking occasional courses in local history and digital photography. He also hopes to complete a memoir that captures the lessons of his decades‑long career,
    travel with his grandchildren to national parks, and maintain his health through regular outdoor activity.
