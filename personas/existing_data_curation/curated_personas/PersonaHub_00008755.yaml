persona_description: Andrew Wetzler, a dedicated wildlife conservationist and advocate, who has worked tirelessly to protect endangered species and their habitats. He is passionate about the plight of the
  northern Rocky Mountain wolves and the government's decision to remove them from the endangered species list. Wetzler is known for his efforts to protect whales from lethal sonar, California condors from
  lead poisoning, and polar bears from global warming. He is also actively involved in the Save BioGems site and encourages others to take action to protect endangered species.
