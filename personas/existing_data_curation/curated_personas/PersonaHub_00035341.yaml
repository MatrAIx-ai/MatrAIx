persona_description: A woman who served as a Dean of Women at Middle Tennessee State University during World War II, and later returned to the classroom as a teacher. She was known for her work in the education
  field, particularly in the area of women's education. Her experiences include managing student housing, organizing weddings, and serving on committees related to library resources and college buildings.
  She also had a strong interest in race relations and worked with the Alpha Kappa Alpha Sorority.
