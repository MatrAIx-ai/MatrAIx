persona_description: An experienced radiation measurement specialist with a background in actinic radiation measurements. They have extensive knowledge and experience with the use of spectral radiometers
  and filter radiometers for measuring actinic radiation, as well as their calibration and comparison with other instruments. They have experience deploying these instruments for ground-based field measurements,
  experiments in the atmosphere simulation chamber SAPHIR, and mobile platforms like the Zeppelin-NT. They are also skilled in using these instruments as a reference for other institutions' instruments.
  They have a unique understanding of the actinic radiation measurement process and have a deep knowledge of the photolysis frequencies and their measurement. They are proficient in field conditions and
  can perform measurements to characterise photochemical laboratory reactors and simulation chambers.
