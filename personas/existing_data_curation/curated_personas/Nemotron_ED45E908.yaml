  hobbies: '[''Fishing at Lake Celina'', ''Woodworking'', ''Vintage pickup truck restoration'', ''Recreational golf'', ''Pistol shooting'', ''Reading construction trade magazines'', ''Home‑renovation TV
    shows'', ''Home gym workouts'']'
  career_goals: Dennis aims to transition from a field installer to a foreman‑level leader within the next two years, securing a formal trade certification in acoustic ceiling systems. Long‑term, he plans
    to launch his own small contracting firm focused on high‑quality interior finishes for residential clients throughout Mercer County and neighboring areas. He is driven to build a reputation as the most
    reliable and competitively priced specialist in the region, mentor apprentices, and eventually expand his business to include a modest crew of skilled tradespeople.
