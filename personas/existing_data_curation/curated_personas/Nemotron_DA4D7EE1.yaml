  hobbies: '[''Storytelling at senior center'', ''Weekly poker nights'', ''Fishing at Lake Erie'', ''DIY home‑security electronics'', ''Neighborhood watch volunteer'', ''Community gardening'', ''Community
    theater participation'']'
  career_goals: Nikolas aims to obtain an Advanced Security Management certification, transition into a part‑time security consultant role for local casinos and small businesses, and develop a community‑based
    safety education program. He also hopes to mentor the next generation of security personnel, sharing his practical knowledge and fostering a culture of teamwork and proactive risk management. In the
    longer term, he envisions establishing his own boutique consulting firm focused on integrating modern surveillance technology with human‑centered security practices.
