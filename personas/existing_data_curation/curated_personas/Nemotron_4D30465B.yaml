  hobbies: '[''LEGO Building'', ''Introductory Coding'', ''Reading Adventure/Science-Fiction Books'', ''Piano Practice'', ''Soccer'', ''Animal Shelter Volunteering'', ''Wildlife Sketching'']'
  career_goals: Marcus dreams of a future where he can combine his love for technology, animals, and helping others. He aspires to become a biomedical engineer or a veterinarian, aiming to design tools
    that improve the lives of children and pets. He also imagines working on community projects, such as creating educational robotics programs for younger students in Douglas County, reflecting his desire
    for practical impact and collaborative problem solving.
