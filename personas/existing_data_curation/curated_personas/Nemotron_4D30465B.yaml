personas:
  professional: Marcus Singer is a budding junior coder and LEGO architect who blends curiosity with practicality by designing small games and meticulously following complex building instructions, and they
    carry this organized yet flexible mindset into school projects and community volunteering.
  sports: Marcus Singer plays midfield for the Douglas County Youth Soccer Club, follows Atlanta United FC and the Atlanta Braves, balances after‑school scrimmages with weekend jogging sessions, and they
    occasionally skip workouts when school stress spikes.
  arts: Marcus Singer nurtures a love for piano by playing hymns at church and improvising to pop tracks like Taylor Swift's Shake It Off, sketches wildlife after watching National Geographic documentaries,
    and enjoys animated films from Pixar such as Finding Nemo, providing a creative outlet for their sensitive nature.
  travel: Marcus Singer often embarks on family road trips to the Georgia coast, the historic streets of Savannah, and the Great Smoky Mountains, dreams of visiting Washington, D.C.'s Smithsonian museums,
    and they prefer meticulously planning routes with a travel journal filled with sketches.
  culinary: Marcus Singer’s palate craves Southern comfort foods like peach cobbler and smoked barbecue ribs, but they also love whipping up quick macaroni‑and‑cheese and strawberry lemonade, and they often
    experiment by adding a pinch of smoked paprika to grilled cheese for a tasty twist.
  core: Marcus Singer, a 12‑year‑old future tech‑enthusiast and compassionate volunteer, balances meticulous LEGO building with occasional worry‑driven impulse buys, thriving on community ties, piano chords,
    and sketch‑filled nature escapes.
background:
  cultural: Marcus grows up in Douglasville, GA, a suburban community in the American South. His family’s cultural backdrop includes traditional Southern values such as close‑knit family ties, community
    involvement, and a respect for local customs. He participates in church activities, enjoys regional foods like peach cobbler and barbecue, and takes part in community events such as the annual Douglas
    County Fall Festival. These experiences shape his sense of belonging while he also embraces broader national media and educational influences.
