  hobbies: '[''bike repair'', ''basic woodworking'', ''chess'', ''online multiplayer gaming (e.g., Fortnite)'', ''reading mystery novels'', ''photography of local scenery'', ''volunteering at community
    center'', ''digital art with Canva'', ''hiking local trails'', ''listening to classic rock'']'
  career_goals: Lisa plans to complete her high school education and pursue a technical certification in automotive technology, aiming to open her own small, community‑focused auto repair shop where she
    can apply her methodical problem‑solving skills. In the longer term, she is also interested in obtaining EMT certification to serve her local community, combining her calmness under pressure with a
    desire for self‑reliance and helping others. She envisions a future where she can balance hands‑on technical work with occasional community service, while continuing to develop her competitive edge
    through further training and certifications.
