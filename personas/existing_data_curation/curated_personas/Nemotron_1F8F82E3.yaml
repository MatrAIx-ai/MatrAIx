personas:
  professional: Lisa Alderson is a budding teen mechanic and maker who spends afternoons disassembling and reassembling bicycles, soldering circuit boards, and crafting small wooden projects, channeling
    her practical mindset and love for competition into meticulous yet occasionally improvisational repairs that showcase her resilience and calm under pressure.
  sports: Lisa Alderson pedals her homemade mountain bike through the nearby Laurel Ridge trails, joins the Hookstown Youth Cycling Club on weekends, roots for the Pittsburgh Steelers during football season,
    and balances her competitive spirit with occasional pick-up basketball games at the community center, preferring high-intensity cardio that keeps her agile for tactical video games.
  arts: Lisa Alderson captures the misty silhouettes of Hookstown's rolling hills with her DSLR, sketches quick charcoal studies of bike gears, experiments with Canva to create bold digital posters inspired
    by classic-rock icons like Led Zeppelin and The Rolling Stones, and devours mystery novels by Agatha Christie, letting the suspenseful plots fuel her strategic thinking.
  travel: Lisa Alderson prefers spontaneous weekend escapades, often hitching a ride to the historic streets of Gettysburg or the rugged vistas of Ohiopyle State Park for day hikes, while saving her discretionary
    funds for a future road trip along the iconic Route 66, balancing her love of exploration with the reality of a tight teen budget and school commitments.
  culinary: Lisa Alderson enjoys building a custom burger with thick-cut bacon, cheddar, and homemade pickles after a long bike repair session, occasionally whips up a quick spaghetti carbonara using fresh
    garlic and Parmesan, and keeps a stash of trail-mix and protein bars for energy, though she admits to over-seasoning her dishes and leaving a trail of flour on the kitchen counter.
  core: Lisa Alderson, a 15-year-old tinkerer with a competitive edge, blends practical hands-on skills, a calm resilience, and a laid-back approach to planning into every hobby and decision.
background:
  cultural: Lisa is a white teenager growing up in Hookstown, a small, close‑knit community in Beaver County, Pennsylvania. The area reflects a blend of Mid‑Atlantic industrial heritage and rural Appalachian
    influences, where family traditions often revolve around community events such as county fairs, high school sports, and local church gatherings. Many families in the region have roots in early 20th‑century
    European immigration, particularly German and Polish, which is reflected in local customs and cuisine. Growing up in this environment, Lisa has internalized values of self‑reliance, modesty, and a strong
    work ethic, while also experiencing the tight social network of a small town that values personal responsibility and pragmatic problem‑solving.
attributes:
  skills: '[''troubleshooting computer hardware'', ''basic bicycle and lawn mower repair'', ''Microsoft Excel spreadsheet management'', ''strategic board game (chess) playing'', ''online multiplayer gaming
