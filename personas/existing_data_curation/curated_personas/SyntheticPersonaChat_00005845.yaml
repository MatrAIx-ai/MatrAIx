    User 1: Oh, that''s too bad. I have a cat named Mittens.

    User 2: I''m sure she''s a very sweet cat.

    User 1: She is! She''s very playful and loves to cuddle.

    User 2: I''m glad to hear that.

    User 1: What do you do for a living?

    User 2: I''m a member of the YMCA. I''m also a volunteer for a local community garden.

    User 1: That''s great! I''m active on my city council.

    User 2: Oh, that''s interesting! What''s your favorite part of being on the city council?

    User 1: I like being able to help make decisions that affect my community.

    User 2: That''s a great reason to be on the city council!

    User 1: Thanks! What''s your favorite scary movie?

    User 2: I really like The Conjuring.

    User 1: I''ve heard good things about that movie! I''ve never seen it before.

    User 2: You should definitely check it out. It''s really scary!

    User 1: I will! Thanks for the recommendation!'
