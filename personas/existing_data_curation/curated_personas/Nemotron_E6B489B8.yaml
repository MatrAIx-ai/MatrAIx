  career_goals: In the short term, Nathan plans to transfer his associate’s degree to a Bachelor’s program in Business Administration at a regional university, while securing an internship in logistics
    or operations at a local manufacturing or distribution company. He aims to gain hands‑on experience in supply‑chain management and project oversight. Long‑term, he envisions a stable, structured career
    as an Operations Manager or Supply Chain Analyst within a midsized firm, where he can leverage his organizational precision and collaborative style to improve efficiency. He also harbors an entrepreneurial
    ambition to eventually launch a small e‑commerce venture that sells locally produced goods, combining his business acumen with his desire to support his community.
