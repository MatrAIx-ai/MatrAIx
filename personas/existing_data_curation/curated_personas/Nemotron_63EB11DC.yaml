personas:
  professional: Stephen Hook is an aspiring digital artist and junior game developer who spends afternoons sketching desert wildlife with charcoal and colored pencils while coding simple games in Scratch,
    balancing a structured sketchbook routine with spontaneous creative experiments driven by an intense competitive streak.
  sports: Stephen Hook enjoys solo desert hikes along Red Rock Canyon, follows the Las Vegas Golden Knights and the Las Vegas Raiders for inspiration, and participates in a local youth cross‑country club
    where they competitively track personal bests on a Strava app while preferring solitary endurance over team ball games.
  arts: Stephen Hook immerses themselves in drawing with charcoal and colored pencils while listening to indie folk artists like Bon Iver and ambient composers such as Tycho, and they frequently cite favorite
    science‑fiction novels like Ender’s Game and The Hitchhiker’s Guide to the Galaxy as creative fuel for their artwork.
  travel: Stephen Hook loves family road trips to Great Basin and Zion national parks to photograph sunrise vistas, meticulously planning routes yet allowing spontaneous detours to hidden geological formations,
    and they dream of traveling to Kyoto to experience cherry‑blossom festivals and traditional tea ceremonies.
  culinary: Stephen Hook prefers quick, flavor‑rich meals such as avocado toast with lime zest, spicy tacos al pastor topped with cilantro and a squeeze of lime, and occasionally experiments with desert‑inspired
    cactus‑fruit salsa, though they often skip breakfast in favor of early gaming sessions.
  core: Stephen Hook is a curious, competitive 11‑year‑old who channels intense emotions into detailed desert art, strategic gaming, and solitary hikes, while battling anxiety and occasional impulsive spending.
background:
  cultural: Stephen grew up in a close‑knit, predominantly white community in Elko, Nevada, where the frontier spirit of self‑reliance and appreciation for the open desert is a daily reality. His family
    traces its roots to European immigrants, with a blend of German and Italian heritage that surfaces in family traditions like holiday cooking and storytelling. The region’s small‑town culture, combined
    with occasional exposure to Native American and ranching traditions, gives him a respect for the land and its history. This backdrop, along with a modest school arts program, has nurtured his curiosity
    about visual expression and the natural world while reinforcing values of independence, responsibility, and resilience.
attributes:
  skills: '["Sketching and watercolor illustration","Basic digital illustration (Procreate, Krita)","Introductory coding (Scratch, Python basics)","Strategic video‑game tactics","Project organization and
