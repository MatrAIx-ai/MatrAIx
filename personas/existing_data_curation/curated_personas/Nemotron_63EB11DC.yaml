  hobbies: '["Sketching wildlife and landscapes","Digital illustration","Nature photography","Hiking and desert exploration","Strategic video gaming","Creating games in Scratch","Reading science‑fiction","Listening
    to indie folk and ambient music"]'
  career_goals: Stephen dreams of turning his love for art and nature into a career that lets him create vivid visual stories. He hopes to become a concept artist for video games or a wildlife photographer
    who documents the desert ecosystems of Nevada. He is also intrigued by environmental science and imagines studying the impacts of climate change on the Great Basin, using his artistic skills to communicate
    scientific findings. In the short term, he plans to build a portfolio of drawings and small digital projects, enter local art contests, and deepen his coding knowledge to eventually design his own interactive
    art experiences.
