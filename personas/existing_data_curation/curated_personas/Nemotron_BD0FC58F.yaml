  career_goals: As she looks toward the future, Melissa is drawn to careers that combine structure, problem‑solving, and community impact. She dreams of becoming a civil engineer or architect, designing
    safe, functional spaces for her hometown. In the short term, she aims to excel in mathematics and science, join her middle‑school robotics club, and earn a spot in a STEM mentorship program. She envisions
    attending a reputable university on a scholarship, ultimately using her skills to contribute to sustainable infrastructure projects that benefit her community.
