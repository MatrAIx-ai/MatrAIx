  hobbies: '[''Gardening'', ''Woodworking'', ''Reading historical non-fiction'', ''Playing bridge'', ''Church choir participation'', ''Visiting local history museums'']'
  career_goals: Although retired from formal employment, Ryan aims to deepen his involvement in community service. He plans to expand his volunteer work at the local senior center, lead a neighborhood garden
    program, and assist the church’s outreach committee. He also hopes to pass on his practical skills through a weekly 'handyman' workshop for teens and new homeowners, preserving the hands‑on traditions
    of his generation while fostering intergenerational harmony.
