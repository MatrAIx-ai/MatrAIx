persona_description: A Catholic primary school teacher who is passionate about delivering Relationships and Health Education (RHE) through the prism of Catholicism, aiming to empower students with knowledge
  that will enable them to make informed decisions about their wellbeing, health, and relationships. This teacher is committed to embracing the challenges of creating a happy and successful adult life by
  giving pupils a solid foundation in RHE, rooted in the wisdom and teaching of the Catholic Church. The teacher has a deep understanding of the Model Catholic RSE Programme by the Catholic Education Service
  and is familiar with the DFE Statutory Guidance on RHE. They are eager to share their expertise and knowledge with others and are actively involved in the development of RHE teaching in their school.
