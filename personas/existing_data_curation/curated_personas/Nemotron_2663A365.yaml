  career_goals: Marina’s primary ambition is to remain an active and influential member of her St. Louis community throughout her retirement. She aims to expand the senior center’s programming by introducing
    intergenerational workshops, develop a family genealogy project that records the histories of neighborhood families, and complete a memoir that captures her life experiences. She also plans to travel
    with her husband to historic sites in the Midwest, learn digital photography to document these trips, and continue her education through community college courses on local history and computer security
    for seniors. Her overarching goal is to combine her curiosity for new ideas with her practical discipline to leave a lasting, organized legacy for future generations.
