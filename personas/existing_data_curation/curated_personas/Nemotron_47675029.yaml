  hobbies: '[''Reading speculative fiction'', ''Writing poetry'', ''Hiking'', ''Yoga'', ''Mindfulness meditation'', ''Visiting art galleries'', ''Listening to live jazz'', ''Cooking Southern cuisine'',
    ''Volunteering at community theater'', ''Mentoring youth filmmakers'', ''Book club on Black feminist literature'']'
  career_goals: Allysa aims to direct her first feature film that explores contemporary Black experiences in the American South, blending lyrical visual language with socially conscious narratives. She
    aspires to establish an independent production company that amplifies underrepresented voices, producing documentaries, narrative shorts, and series that spark dialogue. Over the next five years she
    hopes to secure mentorship with a renowned director, gain representation at a reputable agency, and launch a youth arts mentorship program in Macon County. Long‑term, she envisions her work being showcased
    at major festivals such as Sundance and TIFF, and using her platform to advocate for mental‑health awareness within creative communities.
