  hobbies: '[''Gardening'', ''Southern cooking'', ''Reading mystery novels'', ''Quilting'', ''Birdwatching'', ''Walking in nature'', ''Volunteer work at local food pantry'', ''Church choir participation'',
    ''Crafting'', ''Listening to gospel and classic country music'']'
  career_goals: Lora aims to progress to a shift supervisor or lead stocker role where she can formalize her process‑improvement ideas and mentor a larger team. She plans to earn a certification in supply‑chain
    fundamentals to deepen her practical knowledge. Beyond the workplace, Lora hopes to dedicate more time to community service, perhaps coordinating volunteer efforts at the local food pantry, while gradually
    transitioning to a part‑time schedule that lets her develop a small home‑based crafts business, such as quilting, to supplement her income and reduce stress.
