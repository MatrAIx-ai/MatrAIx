  hobbies: '[''Pick‑up basketball'', ''Ultimate frisbee'', ''Hiking'', ''Mountain biking'', ''DIY carpentry'', ''Acoustic guitar'', ''Watching NFL and UFC'', ''Amateur boxing'', ''Podcasts about construction
    and architecture'']'
  career_goals: Christopher aims to move from laborer to foreman within the next few years, earning certifications such as OSHA 30‑hour and a commercial heavy‑equipment operator license. He plans to enroll
    in a community‑college construction management program to gain formal knowledge of project scheduling, budgeting, and green building standards. Long‑term, he envisions launching his own general‑contracting
    firm that specializes in eco‑friendly residential projects in the Salt Lake area, integrating modern modular techniques while maintaining the reliable craftsmanship he values.
