personas:
  professional: Jane Lafortune, a retired community volunteer who leverages her gardening expertise, home‑cooking talent, and knack for organizing modest church potlucks, applies her practical curiosity
    to document local history and assist the Knoxville library’s oral‑history project, and they embrace a relaxed, flexible approach to obligations.
  sports: Jane Lafortune, an enthusiastic member of the local seniors’ walking club who treks the Great Smoky Mountains trails each spring and leisurely watches the Tennessee Volunteers football games on
    Saturdays, prefers low‑impact activity over vigorous exercise, and they enjoy occasional weekend hikes with friends from the Methodist congregation.
  arts: Jane Lafortune, a church choir singer who treasures the sounds of Appalachian folk fiddler Mark O'Connor and Emmylou Harris, weaves those melodies into the intricate patterns of her quilts and knitting
    projects, and they delight in biographies of Southern literary icons like William Faulkner.
  travel: Jane Lafortune, an adventurous yet budget‑conscious traveler who favors scenic road trips along the Blue Ridge Parkway and occasional weekend getaways to historic Asheville and to explore her
    family’s northern roots, they prefer small‑group tours and carefully plan each visit around the church calendar, yet enjoy the occasional spontaneous detour to a local farmers market.
  culinary: Jane Lafortune, a seasoned home cook whose repertoire includes fried chicken, collard greens simmered with smoked ham hocks, peach cobbler, and heirloom tomato salads seasoned with fresh basil
    from her garden, relishes baking classic pecan pie and sweet tea, and they often experiment with adding locally foraged wild herbs to traditional Southern dishes.
  core: Jane Lafortune, a gentle, curiosity‑driven retiree who balances meticulous gardening and quilt‑making with a delightfully chaotic kitchen clock that always runs five minutes fast, they embody a
    life of quiet generosity and practical optimism.
background:
  cultural: Jane is a lifelong resident of the Knoxville area in East Tennessee, raised in a white Southern family with deep roots in the Appalachian region. Her ancestry includes several generations of
    settlers from the Scots‑Irish and French‑Canadian migrations, reflected in her surname Lafortune. Growing up, she was immersed in the traditions of Southern hospitality, church life, and community solidarity.
    She values the modesty, respect for elders, and reverence for the natural landscape that characterize Appalachian culture. Her culinary tastes are shaped by classic Southern fare and the farm‑to‑table
    ethos of the region. Jane remains actively involved in her local Methodist congregation, participating in potlucks, choir, and outreach programs that emphasize neighborly care. Through her gardening
    and local history interests, she maintains a strong connection to the cultural heritage of East Tennessee.
