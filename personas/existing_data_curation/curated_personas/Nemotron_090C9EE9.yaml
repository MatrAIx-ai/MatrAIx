personas:
  professional: Ashly Roberts, a 42‑year‑old insurance sales specialist, leverages meticulous risk assessment, CRM precision, and a creative flair honed from her watercolor hobby to tailor property and
    casualty solutions while mentoring junior agents toward CPCU certification.
  sports: Ashly Roberts, an avid seasonal hiker and occasional trail‑run participant, keeps fit by tackling the Okanogan River Loop with the Okanogan Trail Club, roots for the Seattle Seahawks in football
    season, and attends the occasional Seattle Sounders match as a social reward after completing a weekend trek.
  arts: Ashly Roberts channels her love of the visual arts through watercolor landscapes inspired by Claude Monet and local Pacific Northwest painter Katherine Morrison, frequents exhibitions at the Wenatchee
    Valley Museum, enjoys theater productions starring Lin‑Manuel Miranda’s works at the community stage, and relaxes listening to folk guitarist Gregory Alan Isakov.
  travel: Ashly Roberts plans trips with a blend of meticulous itineraries and spontaneous day hikes, has explored Yellowstone and Glacier National Parks, dreams of wandering the art districts of Florence,
    Italy, and prefers weekend getaways to the Oregon coast where she books eco‑lodges via Airbnb.
  culinary: Ashly Roberts, a competent home cook, delights in preparing wild mushroom risotto with locally foraged chanterelles and goat cheese, savors pan‑seared salmon topped with blackberry‑mint glaze,
    and indulges in seasonal farmer’s‑market salads featuring serviceberries, while still treating herself to occasional sushi rolls at a downtown Seattle spot.
  core: Ashly Roberts blends analytical insurance acumen with a painter’s eye, obsessively tracks every renewal in a color‑coded spreadsheet, yet can’t resist buying an extra set of watercolor brushes whenever
    a new gallery opens, and occasionally forgets to water her native plant garden during busy sales weeks.
background:
  cultural: Ashly grew up in the rural communities of Okanogan County, Washington, where a strong sense of self‑reliance and close‑knit neighborliness shaped her values. Her family’s roots trace back to
    German and Scandinavian immigrants who settled in the Pacific Northwest in the early 20th century, imparting a heritage of hard work, appreciation for the outdoors, and modest cultural traditions. The
    region’s natural beauty and small‑town culture fostered her love for hiking and environmental stewardship, while the local arts scene nourished her curiosity for creative expression. Though she identifies
    as white American, she values diversity and embraces unconventional perspectives, reflecting the broader cultural mosaic of contemporary Washington state.
attributes:
  skills: '[''Insurance Sales'', ''Risk Assessment'', ''Policy Underwriting'', ''Client Relationship Management'', ''Negotiation'', ''Compliance & Documentation'', ''Data Analysis'', ''CRM Software Proficiency'',
