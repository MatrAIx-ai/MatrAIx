  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Theater Attendance'', ''Hiking'', ''Photography'', ''Reading Contemporary Fiction'', ''Volunteering at Community Arts Center'', ''Gardening'']'
  career_goals: Ashly aims to advance to a senior sales manager role within the next three years, leading a high‑performing team and driving the agency’s growth. She plans to earn the Chartered Property
    Casualty Underwriter (CPCU) designation to deepen her technical expertise, and eventually open her own boutique insurance agency that blends traditional risk management with innovative, art‑inspired
    marketing. She also aspires to mentor junior agents, contribute to community education programs on financial literacy, and complete her bachelor's degree in Business Administration.
