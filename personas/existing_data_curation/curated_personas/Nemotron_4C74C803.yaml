  career_goals: Although formally retired, Haiyan aims to channel her organized mindset into mentorship and community service. She plans to become a senior advisor for the local Vietnamese community center,
    assisting new immigrants with paperwork, housing, and financial planning. Additionally, she hopes to complete a personal memoir that documents her family's migration story and preserves cultural knowledge
    for future generations. She aspires to be recognized as a reliable resource and bridge‑builder within both the Vietnamese diaspora and the broader Las Vegas senior community.
