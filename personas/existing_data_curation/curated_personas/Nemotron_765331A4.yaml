personas:
  professional: John Hicks is an emerging field interviewer whose knack for rapid rapport building and improvisational questioning makes him excel at capturing artists’ stories, even as his spontaneous
    nature sometimes leads to disorganized data entry and missed survey deadlines.
  sports: John Hicks is a devoted pick‑up basketball player at the local community center who follows the Baltimore Ravens and Philadelphia 76ers, joins the Chesapeake Bay Trail Running Club for weekend
    hikes, and treats fitness as a social outlet rather than a regimented workout schedule.
  arts: John Hicks thrives in Baltimore’s vibrant arts scene, attending openings at the Baltimore Museum of Art, snapping street‑art murals by artists like BDN2.0 and D.C. Studio, and absorbing live performances
    from Flying Lotus to local spoken‑word poet George the Poet, all of which fuel his own experimental photography and sketching.
  travel: John Hicks prefers spontaneous weekend getaways, often hitchhiking to the historic town of St. Michaels, exploring the jazz clubs of New Orleans, and dreaming of a backpacking trip through Berlin’s
    street‑art districts, while balancing limited student‑budget constraints.
  culinary: John Hicks experiments with eclectic dishes ranging from Korean kimchi tteokbokki to Jamaican jerk chicken, mixing sumac and smoked paprika into a homemade saffron risotto, and despite being
    a self‑taught home cook, they sometimes over‑season and rely on friends to temper the heat.
  core: John Hicks is a curious, socially‑driven 20‑year‑old who turns spontaneous energy into vibrant art‑focused storytelling, but frequently battles disorganization and impulse‑spending.
background:
  cultural: John is a white American who grew up in the suburban community of Lutherville‑Timonium in Baltimore County, Maryland. His family’s middle‑class background provided access to both the suburban
    lifestyle and the culturally rich urban environment of Baltimore. Frequent visits to the Baltimore Museum of Art, the Walters Art Museum, and local community festivals exposed him to a wide range of
    artistic expressions and diverse communities. The Mid‑Atlantic region’s blend of historic heritage, waterfront recreation, and progressive arts scenes has shaped his open‑minded, curiosity‑driven outlook
    while grounding him in a familiar American suburban upbringing.
attributes:
