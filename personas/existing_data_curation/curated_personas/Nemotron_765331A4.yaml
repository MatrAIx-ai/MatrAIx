  hobbies: '[''Visiting art galleries and museum exhibitions'', ''Street photography and sketching'', ''Playing pick‑up basketball'', ''Improv theater workshops'', ''Hiking and nature walks in the Chesapeake
    Bay area'', ''Attending live‑music and indie‑music festivals'', ''Listening to podcasts on art, philosophy, and culture'', ''Cooking experimental meals with friends'', ''Exploring local coffee shops
    and cultural neighborhoods'', ''Traveling to nearby cities for cultural events'']'
  career_goals: John aims to complete his GED within the next year and enroll in a community‑college program in communications or media studies. He envisions moving from entry‑level interviewing to a senior
    field‑researcher role, eventually specializing in arts‑focused documentary projects that spotlight the Baltimore region’s creative communities. In the long term, he hopes to lead a cultural‑outreach
    department for a nonprofit museum or media organization, where he can combine his interviewing expertise, storytelling passion, and event‑production skills to engage diverse audiences.
