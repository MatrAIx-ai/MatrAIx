  career_goals: Zachary aims to move from his current analyst role into a senior systems architect position within the next five years. To support this transition he plans to earn industry certifications
    such as the Cisco CCNA, CompTIA Security+, and AWS Solutions Architect. He also seeks to lead a small team of analysts, driving process improvements and overseeing migration projects to cloud platforms.
    Long‑term, he envisions launching his own consulting firm that helps mid‑size businesses modernize their IT environments with cost‑effective, pragmatic solutions.
