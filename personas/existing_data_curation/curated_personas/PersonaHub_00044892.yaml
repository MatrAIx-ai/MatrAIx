persona_description: A virologist who specializes in the study of foot-and-mouth disease virus (FMDV) and its related viruses. They are particularly interested in the development of vaccines and the mechanisms
  by which FMDV infects and replicates within host cells. They are skilled in recombinant DNA technology, molecular biology, and immunology, and have experience with the use of adenovirus vectors for vaccine
  delivery. They are interested in the potential of this vector to generate strong immune responses in animals and to protect against FMDV challenge.
