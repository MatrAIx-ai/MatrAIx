personas:
  professional: Dr. Janelle Bishop is a primary‑care physician whose evidence‑driven diagnostic rigor, solitary research habits, and emerging‑tech enthusiasm converge as they design AI‑enhanced preventive
    cardiometabolic protocols while preserving calm, patient‑centered consultations.
  sports: Dr. Janelle Bishop favors low‑impact fitness, completing weekly solo hikes on the Catoctin Mountains and alternating with trail‑run sessions as part of the Washington D.C. Hikers Society, while
    casually following the Washington Capitals, Baltimore Ravens, and Washington Nationals for occasional social viewing.
  arts: Dr. Janelle Bishop finds artistic solace in playing nocturnes by Chopin on a well‑tuned upright piano, capturing sunrise‑lit forests in digital photographs inspired by Ansel Adams, and immersing
    themselves in classic novels by Jane Austen and contemporary medical‑ethics essays by Atul Gawande, weaving these influences into a quiet, reflective personal aesthetic.
  travel: Dr. Janelle Bishop prefers meticulously planned trips that blend solitary nature immersion with cultural enrichment, having trekked the Channel Islands and relaxed in the lavender fields of Provence,
    while eyeing future journeys to Iceland’s remote highlands and the Japanese countryside’s quiet ryokan stays.
  culinary: Dr. Janelle Bishop enjoys modest home cooking, frequently preparing herb‑infused dishes like basil‑pesto pasta and thyme‑scented roasted vegetables sourced from their balcony garden, favors
    herbal teas such as chamomile and spearmint, and occasionally indulges in precision‑crafted sushi rolls at upscale restaurants, reflecting a balanced palate toward healthful simplicity and occasional
    refined indulgence.
  core: Dr. Janelle Bishop is a methodical, solitude‑loving physician who channels curiosity into preventive cardiometabolic innovation, balances disciplined routines with occasional caffeine‑fuelled late‑night
    research, and approaches life with calm precision and a side of quiet stubbornness.
background:
  cultural: Janelle was raised in a middle‑class, suburban Maryland family with deep roots in the Mid‑Atlantic’s Anglo‑European heritage. Her upbringing emphasized self‑reliance, education, and community
    service, values that continue to shape her professional ethos. While she identifies with mainstream American cultural norms—celebrating holidays such as Thanksgiving, Fourth of July, and Christmas—her
    medical career has exposed her to the region’s diverse population, fostering a broad cultural competence and a respect for the varied backgrounds of her patients.
