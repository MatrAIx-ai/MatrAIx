  hobbies: '[''Reading classic literature'', ''Herb gardening'', ''Solo hiking'', ''Birdwatching'', ''Piano practice'', ''Nature photography'', ''Meditation'', ''Crossword puzzles'', ''Cooking experimental
    recipes'']'
  career_goals: She aims to become a leading voice in preventive cardiometabolic care, developing practice‑wide protocols that leverage AI‑driven risk stratification while preserving the patient‑centered,
    quiet consultation environment she values. Over the next five years she plans to earn a fellowship in primary‑care informatics, publish a series of guideline‑focused articles, and eventually assume
    a faculty leadership role that allows her to mentor residents and drive systemic quality‑improvement initiatives. She also envisions opening a boutique primary‑care practice that offers extended appointment
    times and a calm, private setting for patients.
