  skills: '[''drawing'', ''storytelling'', ''basic reading'', ''simple arithmetic'', ''LEGO construction'', ''toy organization'']'
  hobbies: '[''drawing'', ''LEGO building'', ''listening to music'', ''collecting shells'', ''reading picture books'', ''puzzle solving'', ''simple science experiments'']'
  career_goals: Scott dreams of becoming an artist who can bring his imaginative worlds to life, perhaps as a comic book creator or a painter. He is fascinated by the idea of exploring the ocean, so he
    imagines becoming a marine biologist or an underwater explorer. He also enjoys the concept of inventing new games or toys, hinting at ambitions to become an inventor or a designer of interactive experiences.
    He frequently talks about wanting to share his stories with others, indicating a future interest in writing or performing.
