personas:
  professional: Scott Bryan, a budding junior artist and LEGO architect, channels their vivid imagination and meticulous organization into creating colorful creature illustrations and intricate model structures,
    hinting at a future career in visual design or product prototyping.
  sports: Scott Bryan, a member of the local Little Stars Soccer team and a regular attendee of youth swimming lessons at the community pool, prefers the quiet rhythm of swimming laps over noisy stadium
    games, yet cheers enthusiastically for the New Orleans Pelicans when watching basketball with family.
  arts: Scott Bryan, an avid drawer of fantastical creatures, fills sketchbooks with bright dinosaurs and nebulae while dancing to the lively zydeco tunes of BeauSoleil and the smooth saxophone of Wynton
    Marsalis, often mimicking their rhythms on a small kitchen drum.
  travel: Scott Bryan dreams of exploring the Atchafalaya Basin’s moss‑covered cypress trees during family camping trips and imagines a future visit to the Kennedy Space Center, though current adventures
    are limited to backyard treasure hunts for shells and rocks along the nearby bayou’s muddy shore.
  culinary: Scott Bryan loves the creamy comfort of mac & cheese topped with crunchy peas, devours strawberry‑banana smoothies made with fresh berries, and delights in gathering seashell‑shaped crackers
    that remind them of the tides, yet they often sneak extra cookies before dinner.
  core: Scott Bryan is a six‑year‑old imagination powerhouse who blends vibrant art, LEGO engineering, and zydeco rhythms into a uniquely organized yet whimsical world, occasionally hoarding sweets and
    forgetting to moisturize dry elbows.
background:
  cultural: Scott is a Black child raised in Houma, Louisiana, a region where African-American and Cajun cultures intersect. His family celebrates community traditions such as Mardi Gras and local music
    festivals, and he regularly hears zydeco and gospel music at church and family gatherings. The cuisine, including gumbo and jambalaya, is a shared cultural touchstone. His upbringing reflects the values
    of close-knit extended family networks, storytelling, and a respect for both African heritage and the unique Creole influences of southern Louisiana.
