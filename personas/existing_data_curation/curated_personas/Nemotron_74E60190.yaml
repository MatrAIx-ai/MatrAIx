  hobbies: '[''Gardening (tomatoes, herbs)'', ''Reading (historical fiction, Minnesota history)'', ''Bridge'', ''Trivia nights'', ''Book club'', ''Quilting and knitting'', ''Walking dog'', ''Church participation'',
