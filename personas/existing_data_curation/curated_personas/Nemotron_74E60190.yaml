  career_goals: Lydia’s primary ambition is to remain active, healthy, and independent while continuing to give back to her community. She plans to complete a short online course in digital storytelling
    so she can document her family’s genealogy and the town’s oral histories. She hopes to mentor younger volunteers in event planning and become a regular contributor to the senior center’s newsletter.
    Publishing a small memoir that captures the traditions of South Saint Paul is another goal, as is staying competitive in her weekly bridge and trivia games and maintaining a leadership role in the local
    historical society.
