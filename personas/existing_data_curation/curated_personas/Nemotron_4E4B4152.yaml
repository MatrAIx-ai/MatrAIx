personas:
  professional: An aspiring game developer, Naree Dang fuses their love of drawing cartoons with coding simple interactive stories, meticulously planning each pixel and narrative thread while staying calm
    under their school’s tech-fair deadlines, and confidently presenting their projects to peers.
  sports: An energetic soccer enthusiast, Naree Dang plays midfield for the Gwinnett County youth club United Strikers, follows Atlanta United FC passionately, and joins weekend pick-up games with friends,
    approaching fitness with the same organized routine they apply to drawing.
  arts: An imaginative cartoonist, Naree Dang visits the regional art museum every month, draws inspiration from Studio Ghibli’s Hayao Miyazaki, the graphic novel My Hero Academia by Kohei Horikoshi, and
    local folk performances during Songkran celebrations, weaving these influences into their vibrant digital sketches and short animations.
  travel: A curious explorer, Naree Dang loves weekend trips to Savannah’s historic squares and family vacations to Bangkok where they experience the lantern-floating ceremony of Loy Krathong, and they
    dream of wandering Kyoto’s bamboo groves, always planning itineraries with a meticulous checklist and a modest budget.
  culinary: A budding home cook, Naree Dang helps their family prepare fragrant jasmine-scented coconut soup, spicy papaya salad, and delicate spring rolls, often experimenting by adding fresh basil and
    lime zest to traditional plates, and they enjoy sketching each dish’s colorful presentation before tasting.
  core: Naree Dang is a calm, organized 12-year-old who blends art, coding, and cultural storytelling into every hobby while managing a disciplined allowance budget and a relentless love for soccer.
background:
  cultural: Naree comes from a Thai‑American family that maintains strong ties to its Southeast Asian roots while embracing life in suburban Georgia. At home she speaks Thai with her parents and grandparents,
    celebrates Songkran and Loy Krathong, and helps prepare traditional meals. In Gwinnett County she participates in community events at the local cultural center, which expose her to a diverse Asian diaspora.
    Her bicultural upbringing influences her love for art, storytelling, and community collaboration.
