  career_goals: Naree dreams of becoming a multidisciplinary creator who blends visual art, technology, and cultural storytelling. She aims to study graphic design and interactive media, hoping to work
    as a visual artist or UX designer who brings Southeast Asian narratives into digital experiences. She also wants to start a youth art club at her school to foster creativity and cultural exchange among
    her peers.
