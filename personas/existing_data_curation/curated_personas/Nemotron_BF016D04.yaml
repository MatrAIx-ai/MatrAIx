personas:
  professional: Wesley Issa is a budding LEGO architect and young coder who merges hands‑on building with Scratch programming, using their curiosity and practical mindset to prototype miniature cityscapes
    that double as animated storytelling projects.
  sports: Wesley Issa is an enthusiastic midfielder on the North Seattle Youth Soccer Club, cheering for the Seattle Sounders FC during weekend matches, and spends Saturday mornings hiking the Burke‑Gilman
    Trail with family, treating fitness as a balanced mix of team play and nature exploration.
  arts: Wesley Issa discovers rhythm on the ukulele while strumming songs by Jack Johnson and The Beatles, immerses in adventure novels by Jules Verne and Rick Riordan, and channels that inspiration into
    intricate LEGO dioramas that pay homage to scenes from their favorite sci‑fi movies.
  travel: Wesley Issa loves weekend escapades to Discovery Park and a yearly family road trip to the towering redwoods of Muir Woods, and harbors a dream of visiting the interactive exhibits at the Museum
    of Flight in Seattle as well as exploring the futuristic streets of Tokyo’s Akihabara when older.
  culinary: Wesley Issa enjoys building their own pepperoni pizza with a generous sprinkling of mozzarella cheese, savors the simplicity of grilled cheese sandwiches with cheddar, and occasionally experiments
    with making sushi rolls for fun, though they often forget to wash their hands properly before cooking, a quirk their parents gently correct.
  core: Wesley Issa is a curious, organized ten‑year‑old who blends LEGO engineering, ukulele melodies, and strategic games into a habit of turning everyday challenges into creative projects, even if they
    sometimes procrastinate on homework to chase the next video‑game level.
background:
  cultural: Wesley was raised in a middle‑class white family in Seattle, a city known for its tech‑centric culture, love of the outdoors, and emphasis on sustainability. His household celebrates a mix of
    traditional American holidays and embraces the region’s coffee‑house culture, often visiting local cafés with his parents after school. Growing up near the Puget Sound, he has been encouraged to appreciate
    the natural environment, which influences his interest in science and community stewardship. The progressive school environment and diverse neighborhood have also exposed him to inclusive values and
    a collaborative spirit.
attributes:
  skills: '[''LEGO engineering'', ''basic Scratch programming'', ''reading comprehension'', ''responsibility for pet care'', ''team collaboration and conflict mediation'', ''organized task planning'']'
  hobbies: '[''LEGO building'', ''exploring nature parks'', ''reading adventure/science‑fiction'', ''Scratch coding'', ''soccer'', ''ukulele playing'', ''science club projects'']'
  career_goals: Wesley dreams of turning his love of building and coding into a future career in robotics or software engineering. He hopes to attend a summer tech camp, inspire others by creating simple
    educational games, and one day work at a Seattle tech company that focuses on sustainable technology. He also envisions himself contributing to his community, perhaps by designing user‑friendly tools
    that help local parks stay clean, and he plans to keep his grades strong to open those pathways.
