  hobbies: '[''gardening'', ''reading historical biographies'', ''local history research'', ''model railroading'', ''bird watching'', ''woodworking'', ''cooking Midwestern dishes'', ''walking in nearby
    wetlands'']'
  career_goals: Although retired from the workforce, Delayine aims to stay mentally and physically active by volunteering with the Romulus community center and the local historical society. He plans to
    mentor younger volunteers, expand his knowledge of Michigan's industrial heritage, maintain financial independence through prudent budgeting, and complete an online certificate in genealogy to trace
    his family's roots and share findings through a small blog.
