  hobbies: '[''Playing soccer'', ''Listening to norteña and banda music'', ''Dancing at community festivals'', ''Cooking traditional Mexican dishes'', ''Exploring and testing new technology/apps'', ''Teaching
    friends about tech'', ''Hiking in the Texas Hill Country'', ''Fishing on the Rio Grande'', ''Volunteering for neighborhood clean‑up events'']'
  career_goals: As he approaches his late thirties, Jonathan feels a growing urgency to secure a stable, reliable income that mitigates his financial worries. He aims to complete the remaining credits toward
    an associate degree in Business Administration, building on the college courses he started, so that he can qualify for managerial positions. In the short term, he is pursuing a commercial driver's license
    (CDL) to work as a truck driver or logistics coordinator, capitalizing on Laredo’s status as a major border freight hub. Simultaneously, he dreams of launching a small, family‑run food‑truck specializing
    in authentic Mexican street foods, leveraging his cooking skills and cultural heritage. Over the longer horizon, Jonathan hopes to transition into a community‑development role, perhaps as a bilingual
    liaison for a regional economic development agency, where he can use his networking abilities to connect local entrepreneurs with resources. These goals reflect his desire for professional advancement,
    financial security, and a meaningful contribution to his community.
