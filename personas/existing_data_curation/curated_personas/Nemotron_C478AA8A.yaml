  hobbies: '[''Playing soccer in a local league'', ''Hiking Utah’s red‑rock trails'', ''Dancing cumbia and salsa'', ''Cooking and sharing Mexican cuisine'', ''Volunteering at community health fairs'', ''Attending
    church/social gatherings'', ''Listening to regional Mexican music'', ''Road trips to national parks'', ''Participating in trivia nights'', ''Watching soccer matches (Liga MX, MLS)'']'
  career_goals: Julio aims to advance his clinical credentials by completing a Licensed Practical Nurse (LPN) program within the next two years, leveraging flexible online courses that accommodate his spontaneous
    schedule. He also plans to pursue a part‑time Bachelor of Science in Nursing (BSN) to position himself for a future RN role. In the short term, he seeks certification as a Certified Nursing Assistant
    Trainer so he can share his practical knowledge with new staff while fostering a bilingual learning environment. Long‑term, Julio envisions leading a community health outreach initiative that provides
    culturally sensitive health education to Spanish‑speaking residents in Utah County, combining his compassionate nature with his desire for meaningful impact.
