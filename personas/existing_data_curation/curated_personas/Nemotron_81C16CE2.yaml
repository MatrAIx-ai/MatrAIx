personas:
  professional: Marlen Siroit, a retired research engineer with a bachelor's in a STEM field, leverages their analytical problem‑solving, data analysis, and systematic project planning skills to mentor
    high‑school girls in STEM, curate community art exhibitions, and write technical yet accessible scientific papers, channeling their lifelong curiosity, organized nature, and occasional anxiety into
    meticulous yet compassionate leadership.
  sports: Marlen Siroit, a member of the Miami Senior Dance Club, participates in weekly Latin‑ballroom and salsa classes, follows the Miami Heat (NBA) and the Florida Panthers (NHL) avidly, enjoys early
    morning walks along South Beach, and joins a senior bowling league at the local community center each Thursday.
  arts: Marlen Siroit, a frequent visitor of the Pérez Art Museum Miami, devotes afternoons to watercolor painting of Andean vistas, drawing inspiration from artists like Frida Kahlo, Georgia O'Keeffe,
    and local contemporary Carlos Cruz‑Diez, and regularly attends lectures by curators such as Dr. Kymberly Smith to deepen their understanding of modern art.
  travel: Marlen Siroit, who favors low‑stress, well‑planned itineraries, recently explored Quito and the Galápagos Islands, dreams of trekking to Machu Picchu and cruising the Caribbean, and balances travel
    ambitions with a fixed income by seeking senior discounts and traveling with family members for support.
  culinary: Marlen Siroit, an accomplished home cook, prepares traditional Ecuadorian dishes—ceviche with fresh lime juice and cilantro, hearty encebollado infused with achiote, and festive fanesca featuring
    corn, beans, and cheese—while tending a balcony garden of basil, oregano, and chamomile, and occasionally over‑salts their sauces in a quest for bold flavor.
  core: Marlen Siroit, a centenarian scientist‑artist, blends disciplined curiosity with organized mentorship, vibrant watercolor painting, and mindful anxiety management, even if they sometimes misplace
    their glasses.
background:
  cultural: Marlen was born in Ecuador and migrated to the United States as a young adult, bringing with her the vibrant traditions of the Andean region. She retains fluency in Spanish and celebrates cultural
    holidays such as Carnaval de Guaranda, Día de los Muertos, and Ecuadorian Independence Day. Living in Miami’s multicultural landscape, she actively engages with Latinx community centers, shares Ecuadorian
    music, dance, and culinary practices, and contributes to cross‑cultural dialogues through art and education. Her heritage informs her worldview, fostering a deep respect for diversity and a commitment
    to preserving and sharing her cultural legacy with younger generations.
attributes:
  skills: '[''Scientific research'', ''Data analysis and statistics'', ''Technical writing'', ''Project management'', ''Mentorship and tutoring'', ''Bilingual communication (Spanish/English)'', ''Digital
