  hobbies: '[''Visiting art galleries'', ''Live jazz and R&B concerts'', ''Watercolor painting'', ''Street photography'', ''Cooking Southern/Caribbean cuisine'', ''Reading philosophy and graphic novels'',
    ''Writing poetry'', ''Mindfulness meditation'', ''Kayaking on Manatee River'', ''Youth mentorship in business and tech'']'
  career_goals: Arlester aims to advance to a senior management role where he can shape organizational strategy and drive large‑scale innovation initiatives. He plans to earn an MBA with a focus on analytics
    and leadership to broaden his strategic perspective. Over the next five years, he hopes to lead a cross‑functional analytics hub that integrates data insights with creative design, enhancing user experience
    across the company. He is also committed to championing diversity, equity, and inclusion by establishing mentorship programs for underrepresented employees and advocating for mental‑health resources
    within the workplace.
