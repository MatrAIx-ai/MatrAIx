  hobbies: '[''community potlucks'', ''youth soccer coaching'', ''playing drums in mariachi'', ''fishing on Lake Michigan'', ''cooking Mexican cuisine'', ''vegetable gardening'', ''adult literacy volunteering'',
    ''automotive restoration'', ''car shows'']'
  career_goals: Paulino aims to become a plant manager within the next five years, driving a culture of continuous improvement and zero‑incident safety. He plans to earn Six Sigma Black Belt and CPIM certifications,
    lead cross‑functional Kaizen teams, and implement advanced data‑driven production analytics. A long‑term ambition is to create a mentorship pipeline for Spanish‑speaking employees and transition into
    a regional operations trainer role, sharing best practices across multiple facilities.
