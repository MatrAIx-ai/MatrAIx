  hobbies: '["Reading (literature and Cuban history)", "Abstract painting", "Cuban cooking", "Balcony gardening", "Beach walking", "Listening to vintage Cuban music", "Puzzle solving", "Attending intimate
    art exhibitions", "Volunteering at community center"]'
  career_goals: Even though she is retired, Adelina’s ambition centers on giving back. She aims to mentor emerging Cuban‑American entrepreneurs, helping them launch socially conscious businesses. She plans
    to compile and publish a memoir that captures her family’s journey from Cuba to California, preserving cultural narratives for future generations. Adelina also aspires to serve on the board of a local
    arts center, supporting abstract artists and fostering small‑group cultural events, while maintaining her health and continuing lifelong learning through art workshops and digital storytelling.
