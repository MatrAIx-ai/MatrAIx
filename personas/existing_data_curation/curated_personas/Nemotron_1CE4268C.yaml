personas:
  professional: Adelina Corona, a retired small‑enterprise manager turned community volunteer, leverages their business degree, meticulous bookkeeping expertise, and methodical planning to orchestrate cultural
    festivals and mentor emerging entrepreneurs, all while infusing imaginative storytelling into event programming.
  sports: Adelina Corona enjoys low‑impact fitness through daily beach walks, weekly senior yoga at the Redondo Beach Community Center, quietly follows the Los Angeles Dodgers and Los Angeles Lakers, and
    participates in the local Redondo Beach Senior Bowls Club.
  arts: Adelina Corona expresses their imagination on abstract canvases inspired by the bold colors of Mark Rothko, while listening to vintage Latin jazz icons such as Benny Moré and Celia Cruz and attending
    intimate exhibitions featuring emerging abstract artists at the nearby arts center.
  travel: Adelina Corona prefers thoughtful, leisurely travel, planning day trips along California’s coast to Santa Barbara and Laguna Beach, reminiscing about the vibrant streets of their island birthplace,
    and dreaming of a future cultural tour of Andalusia’s historic towns.
  culinary: Adelina Corona delights in cooking traditional island recipes like black beans and white rice, mojo‑marinated pork, and sweet plantain fritters, skillfully blending citrus zest, oregano, and
    cumin, while occasionally treating themselves to a fine seafood bistro experience in Redondo Beach.
  core: Adelina Corona blends a lifetime of disciplined business acumen with a vibrant artistic spirit, channeling their love for community, abstract color, and quiet routines into mentorship, a balcony
    garden oasis, and the nostalgic melodies of vintage Latin jazz.
background:
  cultural: Adelina was born in Cuba and emigrated to the United States as a young adult, bringing with her a rich tapestry of Afro‑Cuban traditions, Catholic values, and a profound sense of community.
    Her upbringing emphasized family solidarity, hospitality, and respect for cultural rituals such as Día de la Cultura Cubana. In Redondo Beach, she remains deeply connected to the local Cuban‑American
    diaspora, participating in neighborhood celebrations, preserving Spanish language fluency, and sharing stories of her homeland’s resilience. Her cultural identity blends Cuban heritage with the coastal,
    multicultural milieu of Southern California, influencing her artistic tastes, culinary preferences, and communal engagements.
