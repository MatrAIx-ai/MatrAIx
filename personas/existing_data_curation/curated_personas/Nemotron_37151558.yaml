  career_goals: Although retired, David aims to stay active and independent by expanding his woodworking expertise, learning advanced joinery techniques, and creating functional pieces for his home and
    as gifts for family. He hopes to volunteer with the local community garden and the Cabot historical society, sharing his practical skills with younger volunteers while preserving local heritage through
    genealogical projects. Maintaining his health, managing finances carefully, and reducing stress are central to his long‑term goals, as is ensuring his modest home remains a quiet, comfortable sanctuary.
