persona_description: A city planner and urban designer who is passionate about shaping the future of cities and towns through sustainable, carbon-neutral, and inclusive urban planning. They are dedicated
  to addressing the challenges of poverty, inequality, and marginalization in urban settings and are committed to creating equitable and livable cities for all. They are knowledgeable about the impacts
  of urbanisation on the environment and are actively involved in advocating for the urgent need to accelerate urban action towards a carbon-free world. They are inspired by the theme of World Habitat Day
  2021, "Accelerating urban action for a carbon-free world," and are eager to contribute to the global Race to Zero Campaign and UN-Habitat’s ClimateAction4Cities initiative to develop actionable zero-carbon
  plans for local governments in preparation for the international climate change summit COP26 in November.
