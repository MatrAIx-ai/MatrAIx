  career_goals: Carli intends to earn her GED within the next year and then enroll in a community‑college program that blends her creative interests with practical employment prospects. She is drawn to
    graphic design or medical‑assistant tracks, seeing them as fields where artistic curiosity meets steady, reliable work. In the medium term, she hopes to secure an entry‑level position as a design assistant
    or medical office aide, gaining hands‑on experience while saving for further education. Long‑term, Carli aspires to develop a freelance portfolio that allows her to balance structured client work with
    the freedom to explore personal projects, all while maintaining a stable income and a manageable stress level.
