  hobbies: '[''Playing basketball'', ''Video gaming (strategy and multiplayer)'', ''Hiking and snow‑boarding'', ''Creating short videos for TikTok/YouTube'', ''School debate club'', ''Collecting sports/trading
    cards'']'
  career_goals: Frank aspires to combine his love for sports, communication, and technology. In the short term he aims to become the captain of his middle‑school basketball team and a leading member of
    the debate club, hoping to earn a scholarship that could launch a future in sports journalism or broadcasting. He also envisions developing his own video‑game mods and eventually pursuing a career in
    game design or software engineering. Ultimately, Frank wants a career that lets him be in the spotlight, influence others, and apply his strategic mindset, such as being a sports commentator, a digital
    content creator, or a technology entrepreneur.
