personas:
  professional: Frank Bowe, a 13‑year‑old aspiring strategist, channels his love of structured competition into leading his school debate team while mastering multiplayer game tactics, and they blend practical
    planning with a flair for commanding attention during presentations.
  sports: Frank Bowe, a dedicated member of the local community center’s youth basketball league, follows the Utah Jazz and BYU Cougars, carves out weekend snowboarding sessions in the Wasatch, and competes
    in pickup games with a competitive edge that sometimes overshadows teamwork.
  arts: Frank Bowe, an enthusiastic content creator, produces short, humorous TikTok and YouTube videos featuring gaming highlights and hiking escapades, drawing inspiration from creators like MrBeast and
    musicians such as Imagine Dragons, and they relish the spotlight of posting weekly.
  travel: Frank Bowe, who loves spontaneous weekend hikes in the Wasatch foothills and family snowboarding trips to Park City, also dreams of exploring the Grand Canyon and Kyoto, planning trips with a
    mix of structured itineraries and last‑minute detours, all while balancing parental budget constraints.
  culinary: Frank Bowe, a self‑declared snack connoisseur, favors pepperoni pizza, spicy chicken tacos, and a midnight habit of ramen bowls, and they often experiment by adding sriracha and cheese to trail‑mix,
    though cooking skills remain limited to microwaving and assembling ready‑made meals.
  core: Frank Bowe, a socially magnetic teen with a competitive edge, juggles debate, basketball, gaming, and video‑making while straddling structure and spontaneity, often staying up late for content and
    occasionally neglecting sleep.
background:
  cultural: Frank was raised in a middle‑class white family in Salt Lake City, Utah. His upbringing reflects the region’s blend of mainstream American teenage culture and distinctive Western influences.
    Family and community life emphasize a strong work ethic, outdoor recreation, and participation in local traditions such as summer hikes in the Wasatch Mountains, winter skiing outings, and attending
    Utah Jazz games. While many of his friends are involved in Church‑affiliated youth groups, Frank’s activities span both secular school clubs and community sports leagues, giving him a broad cultural
    exposure that values independence, competitiveness, and communal support.
attributes:
  skills: '[''Organizational and time‑management'', ''Public speaking'', ''Basic programming (Scratch)'', ''Video editing'', ''Basic woodworking'', ''Basketball strategy'', ''Strategic gaming'', ''Critical
