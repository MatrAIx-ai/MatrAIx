  career_goals: Although retired from formal employment, Cleo aims to deepen her impact on local civic life. She plans to take a board seat with the Jefferson County Community Garden, mentor younger volunteers,
    and help launch a neighborhood oral‑history project that records seniors’ stories. She also hopes to complete a series of workshops at the Denver Public Library on genealogy and digital archiving, and
    to travel with her husband to several national parks in the western United States. Her broader ambition is to leave a lasting, tangible contribution to the community she loves.
