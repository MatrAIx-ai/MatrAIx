  career_goals: Although retired, Maria Victoria aims to preserve her independence, stay mentally sharp, and continue contributing to her community. She aspires to compile a family cookbook that records
    authentic Cuban recipes for future generations, mentor younger members of the Cuban diaspora in practical budgeting and cultural traditions, and serve as a volunteer liaison at the local senior center
    to help Spanish‑speaking elders access healthcare and social services. Maintaining a healthy routine that supports her ability to be a reliable support for her extended family remains a central ambition.
