persona_description: A high-level official from a United Nations Member State who is responsible for coordinating efforts to combat the growing menace of noncommunicable diseases (NCDs) and ensuring that
  these diseases are addressed as a priority in the global development agenda. This individual is committed to taking bold measures to reduce the avoidable burden of NCDs, which includes heart disease,
  stroke, cancer, diabetes, and lung disease, and acknowledges that progress has been too slow and uneven since 2011 when the UN General Assembly adopted the Political Declaration. This individual is also
  aware of the importance of finding new ways to strengthen the ability of countries to adopt bolder measures and is looking for ways to collaborate with the private sector, civil society, and academia
  to address the issue of NCDs.
