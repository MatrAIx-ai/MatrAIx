  hobbies: '[''Soccer'', ''Listening to Mexican regional music'', ''Dancing at community fiestas'', ''Cooking traditional Mexican meals'', ''Attending cultural festivals'', ''Fishing at San Luis Reservoir'',
    ''Woodworking'', ''Experimenting with sewing techniques'', ''Watching sports'', ''Playing video games'', ''Socializing at taco trucks'']'
  career_goals: Jose aims to transition from line worker to a supervisory role within the next three years, pursuing a GED and a short vocational certification in apparel production management. He dreams
    of eventually opening a small workshop that produces Mexican-inspired embroidered shirts and woven blankets, blending traditional designs with contemporary styles. To support this ambition, he plans
    to learn digital design tools such as fashion CAD and to acquire certification on CNC embroidery equipment. A key part of his goal is achieving greater financial stability, reducing work-related stress,
    and creating a flexible schedule that allows him to stay connected to his community.
