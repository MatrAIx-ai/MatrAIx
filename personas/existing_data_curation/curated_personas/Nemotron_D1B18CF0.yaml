  hobbies: '["Gardening (vegetables and herbs)", "Hiking/Walking in local parks", "Bridge (card game)", "Reading (historical non‑fiction, business biographies)", "Cooking & Grilling", "Wine tasting (local
    and international)", "Volunteer work (Rockville Historical Society)", "Live jazz concerts", "Woodworking"]'
  career_goals: At this stage, Justin aims to transition into a senior advisory and mentorship role, offering strategic counsel to small‑to‑medium enterprises in the Mid‑Atlantic region. He plans to author
    a practical guide on the evolution of business processes, serve on the board of local nonprofit and chamber of commerce organizations, and continue consulting on operational efficiency for government‑contracting
    firms. Personal goals include maintaining health, staying intellectually active, and ensuring a smooth succession of his current responsibilities to the next generation of operations leaders.
