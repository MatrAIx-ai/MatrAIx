  hobbies: '[''Cooking traditional meals'', ''Home gardening'', ''Crocheting'', ''Listening to boleros and plena'', ''Church choir participation'', ''Coastal evening walks'', ''Watching classic telenovelas'',
    ''Journaling for emotional health'']'
  career_goals: Although retired from formal work, Ana’s ambitions focus on deepening her role as a matriarch and cultural steward. She aims to compile a small family recipe book that documents traditional
    dishes and the stories behind them, and to contribute her knowledge by volunteering at the local senior center, teaching cooking and sewing classes. She also wishes to support her husband by maintaining
    a stable, predictable household routine that eases his daily responsibilities. Finally, Ana hopes to improve her own emotional wellbeing by establishing a regular journaling practice and participating
    in a weekly support group at the church.
