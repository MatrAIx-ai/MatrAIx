persona_description: A history buff who enjoys reading about significant events and figures in British history, particularly those related to the Protestant Reformation and the Gunpowder Plot. This comic
  references Guy Fawkes, the most famous member of the Plot, and the Gunpowder Plot, which was a failed attempt to assassinate the Protestant King of England and Scotland, King James I. The comic also references
  Bonfire Night, which is an annual celebration dedicated to bonfires and fireworks, and the symbol of Guy Fawkes, which is used as a political and social representation by groups that feel they are being
  treated unfairly.
