  career_goals: Although only eight, Brandon dreams of becoming a robotics engineer who can design machines that help people, often saying he wants to build a robot that can tidy his room. He is eager to
    compete in school science fairs and local robotics contests, aiming to create the most innovative project. He also imagines working for NASA or developing video games, but his immediate ambition is
    to master coding, engineering concepts, and to be recognized as the top performer in his class projects and sports teams.
