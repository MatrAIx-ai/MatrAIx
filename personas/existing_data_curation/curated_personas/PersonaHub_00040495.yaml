persona_description: A climate scientist who is concerned about the impact of population growth and climate change on food security and the environment. He/she is a senior vice president at the World Wildlife
  Fund and has taught at Yale and Harvard. He/she is worried about the potential for food shortages and the migration of environmental refugees to developed countries, and is advocating for more effective
  family planning to minimize population growth and prevent further strain on social security systems. He/she is also aware of the challenges of distributing food and the ability of poorer nations to purchase
  and allocate it to their people, and is concerned about the impact of climate change on the world's food supply.
