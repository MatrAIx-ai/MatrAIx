persona_description: A federal agency employee responsible for coordinating and leading invasive species programs, including the development and implementation of the National Invasive Species Management
  Plan, and providing assistance to state, tribal, local, and private partners to prevent the introduction and control of invasive species. The individual is knowledgeable about the negative impacts of
  invasive species on the environment, economy, and human health, and has experience in conducting invasive species activities in partnership with other federal and state agencies and the general public.
  They are skilled in managing invasive species programs, including the identification, control, and prevention of invasive species.
