personas:
  professional: Cooper Restrepo, a budding mini-inventor who loves taking apart building blocks and reassembling them into whimsical contraptions, shows a vivid curiosity for how things work but often abandons
    a project mid-way because of their spontaneous, structure-averse nature.
  sports: Cooper Restrepo, a lively member of the Sunnyvale Tots Soccer Club, darts across the playground with boundless energy, idolizes the mascot of the nearby professional soccer team City United FC,
    and eagerly chants for the local baseball team River Raptors during family outings.
  arts: Cooper Restrepo, a budding artist who spends afternoons finger-painting kaleidoscopic scenes and humming along to The Wiggles and Dan Zanes, adores the whimsical illustrations of Dr. Seuss, and
    proudly displays their crayon masterpiece on the fridge.
  travel: Cooper Restrepo, an adventurous four-year-old who delights in weekend trips to the city zoo, a sunny beach day at Santa Monica, and a family vacation to Disneyland, while dreaming of exploring
    the Grand Canyon with a trusty backpack.
  culinary: Cooper Restrepo, a picky-but-curious eater who devours mac and cheese, chicken nuggets, and strawberry slices, loves sprinkling rainbow sprinkles on pancakes, and enjoys helping stir batter
    for cupcakes, though they often sneak extra cookies when no one is watching.
  core: Cooper Restrepo is a curious, sociable four-year-old whose love of art, spontaneous tinkering, and group play fuels a lively imagination, even as they resist routine and occasionally forget to tidy
    up.
background:
  cultural: Cooper is raised in a middle‑class family in Horseheads, a small city in Chemung County, upstate New York. His cultural environment blends typical White American suburban values with local community
    traditions, such as neighborhood fairs, school activities, and seasonal outdoor recreation like hiking and snow play. The family encourages curiosity through arts and nature, and while his surname hints
    at Hispanic heritage, his daily life is shaped by the broader cultural rhythms of a small‑town Northeastern U.S. community.
