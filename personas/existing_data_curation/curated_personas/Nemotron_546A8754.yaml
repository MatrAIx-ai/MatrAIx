personas:
  professional: Ellis Littlejohn, a seasoned bill and account collector, blends analytical rigor with imaginative problem‑solving to negotiate debt recoveries while preserving client relationships, and
    leverages their collaborative, harmony‑focused nature to mentor junior staff and champion humane collection policies.
  sports: Ellis Littlejohn enjoys weekend jogs along the Great Miami River, participates in the Dayton Cycling Club’s spring rides, plays in a casual intramural basketball league, and avidly follows the
    Dayton Flyers and Cincinnati Reds, balancing modest cardio routines with a love for community sports mentorship.
  arts: Ellis Littlejohn channels a love for abstraction into canvases inspired by Kandinsky and Rothko, captures city skylines with a vintage Leica, plays saxophone alongside a local jazz ensemble that
    riffs on Coltrane and Kamasi Washington, and fuels evening reading marathons with speculative fiction by Philip K. Dick and philosophical essays by Alain de Botton.
  travel: Ellis Littlejohn plans trips with a meticulous spreadsheet, prefers immersive cultural experiences over resort lounging, has explored the historic streets of Prague and the desert hues of Monument
    Valley, and dreams of a summer photography workshop in Kyoto and a road‑trip along the Pacific Coast Highway with the family.
  culinary: Ellis Littlejohn, an intermediate home chef, delights in farm‑to‑table meals such as roasted beet salad with goat cheese, sautéed kale with garlic, and a weekend‑only ratatouille featuring heirloom
    tomatoes from their garden, while also indulging in buttery croissants and espresso at the downtown café after gallery visits.
  core: Ellis Littlejohn balances a disciplined work ethic with a spontaneous streak, often sacrificing personal sleep to finish a painting or rehearsal, and can’t resist adding an extra espresso before
    a debt‑recovery call.
background:
  cultural: Ellis identifies as African‑American and was raised in Dayton, Ohio, where his family’s roots trace back to the Great Migration of his grandparents from the Deep South. Growing up in a close‑knit
    Black community, he was immersed in church traditions, gospel music, and the oral storytelling that celebrate resilience and collective progress. He regularly participates in local cultural events such
    as Juneteenth celebrations and the Dayton Black Film Festival, honoring his heritage while embracing the Midwestern work ethic. This blend of Black cultural values—emphasis on community, music, and
    perseverance—and the broader Ohio context informs his worldview, interpersonal style, and commitment to uplifting his neighborhood.
attributes:
  skills: '[''Negotiation'', ''Conflict Resolution'', ''Empathetic Communication'', ''Regulatory Compliance'', ''Financial Data Analysis'', ''Process Improvement'', ''Creative Problem Solving'', ''Microsoft
    Office Suite'', ''Data Management (Excel, SQL)'', ''Customer Service'']'
  hobbies: '[''Abstract painting'', ''Visiting art galleries'', ''Reading speculative fiction'', ''Philosophy'', ''Jazz saxophone'', ''Photography'', ''Gardening'', ''Community youth mentorship'']'
  career_goals: Ellis aspires to move into a senior supervisory role within the collections department, where he can mentor junior staff and shape policy. He plans to complete his bachelor's degree in finance
    or business administration, leveraging his curiosity for abstract financial concepts. Over the next five years, he hopes to launch a community-based financial literacy program in Dayton that combines
    his passion for education, art, and economic empowerment. Ultimately, he envisions establishing a consultancy that helps small businesses design humane debt-recovery practices and promote financial
    well‑being.
