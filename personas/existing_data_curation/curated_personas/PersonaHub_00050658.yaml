persona_description: A cosmologist who specializes in the study of the expansion of the universe, particularly the effects of redshift and the Hubble constant. Their research interests include the thermodynamics
  of the universe, the causes of the expansion, and the implications of these theories on the age and position of the universe. They have a deep understanding of the mathematics of cosmology, including
  the concepts of volume, radius, and expansion rate, and are skilled at using online cosmology calculators to accurately position events in the universe.
