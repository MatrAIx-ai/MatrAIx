personas:
  professional: Adam Filipiak, a 20‑year‑old mechanical engineering technology student, merges hands‑on precision woodworking and automotive repair with Python scripting and SolidWorks modeling, channeling
    his organized, methodical nature and competitive drive into meticulous project planning and a clear path toward a process‑improvement apprenticeship.
  sports: Adam Filipiak fuels his fitness routine with structured weight‑lifting sessions, weekend hikes in the nearby hills, and seasonal trout fishing, supports the Chicago Bears and Chicago Bulls, and
    trains at the local climbing gym as part of a small friends‑group pickup basketball crew.
  arts: Adam Filipiak immerses in speculative fiction by authors like Andy Weir, watches Christopher Nolan films, relaxes to progressive‑rock bands such as Porcupine Tree and piano pieces by Ludovico Einaudi,
    and sharpens strategic thinking by regularly playing the board game Terraform Terraform with his closest friends.
  travel: Adam Filipiak’s travel style blends meticulous trip planning with a love for solitary adventure, having hiked the Grand Canyon and explored the volcanic landscapes of Iceland, while dreaming of
    a precision‑engineered bike tour through Kyoto’s historic streets and a future trek across the Swiss Alps.
  culinary: Adam Filipiak enjoys cooking protein‑rich meals such as grilled salmon with lemon‑dill sauce and perfecting a homemade ramen broth with kombu and miso, favors bold flavors like Thai green curry
    and black coffee, and, though a beginner in the kitchen, often practices precision by using his woodworking skills to craft custom cutting boards.
  core: Adam Filipiak is a methodical, 20‑year‑old tinkerer whose competitive streak drives relentless skill‑building, yet a chronic worry often pulls them into late‑night journaling and occasional stress‑eating.
background:
  cultural: Adam comes from a Polish‑American family rooted in the small‑town culture of Scioto County, Ohio. His upbringing reflects typical Midwestern values of self‑reliance, hard work, and modesty,
    with a background of working‑class trades and a strong emphasis on practical skills. Family traditions include Catholic holidays and community gatherings, though his reserved nature leads him to prefer
    intimate settings over large events. The region's industrial history and recent economic shifts have reinforced his pragmatic mindset and competitive drive to secure stable, skill‑based employment.
attributes:
  skills: '[''Mechanical assembly and repair'', ''SolidWorks CAD modeling'', ''Python programming (data analysis and automation)'', ''Advanced Excel modeling'', ''Precision woodworking'', ''Project planning
