  hobbies: '[''Reading (science-fiction & tech non-fiction)'', ''RC car and model rocket building'', ''Python programming for personal projects'', ''Precision woodworking and furniture making'', ''Weightlifting'',
    ''Hiking and fishing'', ''Strategy board games (e.g., Settlers of Catan)'', ''Strategy video gaming (e.g., Civilization)'', ''Journaling'', ''Meditation'']'
  career_goals: Adam aims to finish his associate degree in Mechanical Engineering Technology within the next year and then transfer to a four‑year engineering program at a state university. He aspires
    to secure an apprenticeship in a manufacturing plant or automotive shop where he can apply his hands‑on skills, eventually moving into a process‑improvement engineer role. Additionally, he plans to
    launch a small side business offering custom furniture and small‑engine repairs, leveraging his competitive drive to become a recognized local provider.
