    mural basics)'', ''Site cleanup and material handling'', ''Conflict mediation and team harmony'']'
  hobbies: '[''Visiting art museums and street‑art festivals'', ''Sketching and planning mural designs'', ''Painting community murals'', ''Attending live salsa, cumbia, and Mexican concerts'', ''Dancing
    (especially folk and social dances)'', ''Playing soccer at local parks'', ''Cooking traditional Mexican dishes (mole, tamales)'', ''Playing video games (FIFA, etc.)'', ''Watching indie and foreign films'',
    ''Participating in community theater improv'', ''Reading about sustainable building and DIY projects'', ''Socializing at neighborhood gatherings'']'
  career_goals: Carlos aims to move from entry‑level labor to a supervisory role within the next three to five years. He plans to earn an OSHA 30‑hour certification and complete a carpentry apprenticeship,
    followed by an associate degree in construction management at a community college. His long‑term ambition is to launch his own modest contracting firm that specializes in residential renovations with
    a flair for artistic finishes—such as custom murals, reclaimed‑material accent walls, and eco‑friendly design. He also hopes to become a certified foreman, allowing him to lead crews while fostering
    a collaborative, low‑stress work environment. To support these goals, Carlos is learning basic project‑management software and working on improving his personal organization, recognizing that his relaxed,
    flexible style sometimes hampers efficiency.
