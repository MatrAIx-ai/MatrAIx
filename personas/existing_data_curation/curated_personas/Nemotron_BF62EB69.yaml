personas:
  professional: Krish Patel, a budding problem‑solver in the preschool sandbox, constructs intricate block towers with a practical eye for stability, channeling their curiosity into solitary play while
    displaying a relaxed approach to the tidy‑up schedule that often leaves scattered pieces behind.
  sports: Krish Patel, an enthusiastic little league soccer fan who dribbles a size‑3 ball at the community field while rooting for the San Diego Wave FC and spending Thursday afternoons at the Sunset Parks
    Tots Gymnastics Club, balances their competitive spirit with a preference for solo practice sessions over organized team drills.
  arts: Krish Patel, a tiny artist who loves sketching bright peacocks and humming along to Riya’s children’s songs and the classic tunes of The Wiggles, often recreates dance steps from popular Bollywood
    choreography in the living room, finding comfort in solitary creative expression.
  travel: Krish Patel, a curious explorer who delights in family road trips to the San Diego Zoo and sunny afternoons at La Jolla Cove, dreams of visiting the Grand Canyon’s towering cliffs and the magical
    lights of Disneyland Paris, preferring well‑planned itineraries over spontaneous wanderings.
  culinary: Krish Patel, a budding kitchen helper who proudly stirs mango lassi and sprinkles cumin on warm dal, savors the sweet tang of mango, the comforting aroma of steamed idli, and the crisp freshness
    of cucumber raita, though their eager spoon‑handling often results in milk spills and a mess‑filled high chair.
  core: Krish Patel, a solitary yet inquisitive three‑year‑old, balances a love for focused block building with a competitive spark, often leaving toys scattered and favoring predictable routines over chaotic
    play.
background:
  cultural: Krish comes from a South Asian family with roots in Gujarat, India. At home, his parents speak Gujarati and Hindi, and they celebrate festivals like Diwali and Holi with traditional foods and
    rituals. Living in San Diego, he blends these cultural practices with American childhood experiences, enjoying both mango lassi and local fruit smoothies, and taking part in multicultural community
    events.
