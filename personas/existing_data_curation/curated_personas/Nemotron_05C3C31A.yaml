personas:
  professional: A project management specialist, Joseph Mullins blends Agile‑Kanban hybrid frameworks with educational design expertise to steer cross‑functional tech initiatives, and they constantly question
    assumptions with a skeptical curiosity while their spontaneous nature drives frequent re‑prioritizations, sometimes at the cost of strict deadlines.
  sports: An outdoors‑oriented athlete, Joseph Mullins tackles the Appalachian Trail hikes in spring, scales local crags during summer, cycles the winding roads of Morgantown year‑round, and they cheer
    for the West Virginia Mountaineers football team and the Pittsburgh Steelers while occasionally joining a local climbing club that meets at Seneca Rocks.
  arts: An inventive craftsman, Joseph Mullins finds artistic fulfillment in woodworking custom walnut tables and brewing hop‑forward craft ales, while they enjoy listening to the folk‑rock storytelling
    of Mumford & Sons, the indie synth textures of Bon Iver, and the cinematic scores of Hans Zimmer, often playing vinyl at their home workshop.
  travel: A spontaneous explorer, Joseph Mullins prefers last‑minute road trips over elaborate itineraries, has road‑tripped through the Great Smoky Mountains and hiked the Canadian Rockies, dreams of trekking
    the Inca Trail to Machu Picchu, and they keep a bucket list that includes Iceland’s volcanic landscapes and Japan’s cherry blossom season.
  culinary: A brew‑centric food lover, Joseph Mullins relishes pairing their home‑brewed American IPA with spicy buffalo wings, enjoys cooking a slow‑roasted pork shoulder seasoned with smoked paprika and
    garlic, and they frequently experiment with ingredients like malted barley, coriander, and orange zest in their recipes.
  core: Joseph Mullins is a restless project strategist who balances relentless curiosity with chronic stress, trading late‑night spreadsheets for mountain climbs, home‑brewed ales, and occasional gaming
    victories, while they wrestle with a penchant for procrastination and an impatient streak.
background:
  cultural: Joseph grew up in a middle‑class family in West Virginia, steeped in Appalachian cultural traditions such as folk music, outdoor recreation, and a strong community ethic. His upbringing in the
    public‑school system sparked his interest in education, leading to a bachelor's degree in education and later a career bridging learning and project delivery. Living in Morgantown near West Virginia
    University exposes him to a more diverse, academic environment, which fuels his curiosity and openness to new ideas while his roots keep him grounded in practical, self‑reliant values. Though white
    and traditionally aligned with the regional demographic, he embraces a mix of conservative respect for heritage and progressive attitudes toward personal growth and innovative work practices.
