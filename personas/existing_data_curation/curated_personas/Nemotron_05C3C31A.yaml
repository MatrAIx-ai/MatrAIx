  career_goals: Joseph aims to transition from a specialist role to a senior project manager position where he can shape strategic initiatives in the education‑technology or community‑development sectors.
    He aspires to earn the PMP certification and eventually launch a boutique consultancy that offers flexible, outcome‑focused project frameworks for organizations that value innovation over strict process
    compliance. His long‑term ambition is to become a thought leader who publishes practical guides on adaptive project management, while also cultivating a work environment that allows him autonomy to
    explore new ideas without sacrificing deliverable quality. Recognizing his sensitivity to stress, he plans to integrate wellness practices into his leadership style to foster resilient, high‑performing
    teams.
