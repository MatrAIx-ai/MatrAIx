  hobbies: '[''Cooking and baking Southern recipes'', ''Gardening and vegetable cultivation'', ''Knitting, crocheting, and quilting'', ''Card games (bridge, canasta)'', ''Community bingo and game nights'',
    ''Church choir participation'', ''Local history research and oral storytelling'', ''Walking and birdwatching'', ''Crossword puzzles and Sudoku'']'
  career_goals: Even though she is retired, Carroll aims to deepen her impact in the Jennings community by leading cooking workshops and gardening classes at the senior center, hoping to earn recognition
    as the town’s go‑to culinary mentor. She dreams of winning the county’s annual seniors’ cooking competition, which would validate her practical expertise, and she plans to compile a small memoir of
    family recipes and stories for future generations. Volunteering as a mentor for younger volunteers and helping organize intergenerational activities are also central to her ambition, allowing her to
    stay socially engaged while sharing her knowledge.
