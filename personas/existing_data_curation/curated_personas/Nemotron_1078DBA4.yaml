personas:
  professional: Elaine Clisson, a retired school secretary turned volunteer coordinator, leverages meticulous record‑keeping and budget‑savvy planning to orchestrate community events, from bridge nights
    to the upcoming Spring Garden Festival, while maintaining a familiar routine that keeps the senior center humming smoothly.
  sports: Elaine Clisson joins a local senior walking group that circles the town’s historic park each morning, occasionally cheering on the River City Blues minor‑league baseball team, and participates
    in low‑impact garden‑themed fitness classes at the community center.
  arts: Elaine Clisson sings in the church choir, delights in vintage film classics like Casablanca and Sunset Boulevard, and frequents the downtown art museum where they admire works by Georgia O'Keeffe
    and Andy Warhol, weaving these cultural touchstones into their weekly knitting circle conversations.
  travel: Elaine Clisson prefers short, well‑planned trips, such as a weekend stay in the coastal town of Savannah to explore its historic squares, a day excursion to the Blue Ridge Mountains for berry
    picking, and an annual family pilgrimage to Washington, D.C.’s national museums, always balancing travel with their caregiving duties.
  culinary: Elaine Clisson excels at cooking classic Southern dishes—crispy fried chicken, collard greens simmered with smoked ham hocks, and buttery biscuits—while also nurturing a garden that yields fresh
    tomatoes and sweet corn, ingredients they proudly showcase at community potlucks.
  core: Elaine Clisson blends routine‑driven organization with a warm, community‑centric spirit, juggling gardening, choir rehearsals, and volunteer duties, all while worrying over forgotten tasks and hoarding
    handwritten receipts as treasured reminders.
background:
  cultural: Elaine grew up in a mid‑century white family in the American South, where traditional values, hospitality, and community involvement were emphasized. Raised in a Protestant church, she was taught
    the importance of family gatherings, modesty, and service to others. Her upbringing in Jacksonville, Florida, exposed her to Southern cuisine, outdoor activities like gardening and walking, and a close‑knit
    network of friends and neighbors. This cultural background reinforces her preference for routine, her practical outlook, and her enthusiasm for group activities that foster harmony and connection.
