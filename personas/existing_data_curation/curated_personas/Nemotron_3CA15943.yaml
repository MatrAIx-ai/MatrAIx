  career_goals: As she approaches the culmination of her executive career, Amy is focused on building a lasting legacy of creativity and social impact. She aims to steer her company toward becoming a benchmark
    for sustainable innovation, integrating eco‑friendly practices with artistic expression in product design and workplace culture. Amy plans to mentor the next generation of women leaders, establishing
    a formal mentorship program that pairs senior executives with emerging talent from underrepresented backgrounds. She also intends to transition to a board chair role at a regional art museum, using
    her network to secure funding for community arts education. Ultimately, her ambition is to fuse her business acumen with her love of the arts to create a model of purpose‑driven leadership that inspires
    both employees and the broader community.
