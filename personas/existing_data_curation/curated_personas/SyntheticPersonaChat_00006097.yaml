    User 2: But you seem to have a better idea of who you are.

    User 1: I don''t know. I''m still learning.

    User 2: But you know what you want.

    User 1: I think so.

    User 2: I don''t know what I want.

    User 1: You''ll figure it out. Just keep exploring and trying new things.

    User 2: I will.

    User 1: I know you will.'
