    User 2: I''m also unsure of who I''m attracted to. I''ve never been in a relationship, and I don''t know if I''m straight or gay.

    User 1: That''s okay. It can take time to figure out who you''re attracted to.

    User 2: I know, but it''s still hard. I feel like I''m not normal.

    User 1: You''re not alone. There are a lot of people who feel the same way.

    User 2: It''s just hard to feel like I fit in when I don''t know who I am.

    User 1: You will. Just give yourself time.

    User 2: Thanks. I''m trying.

