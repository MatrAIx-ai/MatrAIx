  hobbies: '[''Abstract Painting'', ''Reading Contemporary Philosophy'', ''Nature Photography'', ''Native Plant Gardening'', ''Sailing'', ''Volunteering at Local Art Gallery'', ''Small Book Club'', ''Coastal
    Restoration Volunteer Work'']'
  career_goals: Jenny aims to transition into a senior PMO leadership role where she can champion innovative, interdisciplinary projects that blend technology, sustainability, and the arts. She aspires
    to mentor emerging project managers, foster a culture of creative problem‑solving, and eventually oversee a regional initiative focused on coastal resilience and community arts integration in Southwest
    Florida. Her long‑term ambition includes establishing a nonprofit think‑tank that connects project management best practices with artistic expression to address complex social challenges.
