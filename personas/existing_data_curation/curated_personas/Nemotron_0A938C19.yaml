personas:
  professional: Jenny Ivester is a seasoned project management specialist who translates abstract philosophical ideas into meticulously planned, art‑inspired initiatives, leveraging two decades of corporate
    and nonprofit experience to champion interdisciplinary, sustainability‑focused projects across Southwest Florida.
  sports: Jenny Ivester enjoys quiet fitness through sailing with the Naples Yacht Club, weekend kayaking on the Gulf, and gentle yoga sessions, while cheering on the Florida Gulf Coast University Eagles
    and occasionally joining a local beach volleyball pickup game.
  arts: Jenny Ivester is an avid abstract painter inspired by Hilma af Klint and Mark Rothko, curates avant‑garde exhibitions at a downtown gallery, reads the works of Samuel Beckett and Arundhati Roy in
    a close‑knit book club, and finds solace in listening to Brian Eno’s ambient soundscapes while mixing pigments.
  travel: Jenny Ivester prefers reflective, slow‑travel itineraries, often exploring the secluded islands of the Florida Keys, the historic streets of St. Augustine, and the sunrise cliffs of Santorini,
    planning trips weeks in advance to balance budget constraints with a desire for artistic inspiration.
  culinary: Jenny Ivester delights in preparing Mediterranean‑style grilled grouper with fresh lime and basil harvested from their garden, complementing it with a side of saffron risotto, while occasionally
    snacking on artisanal crackers during painting sessions.
  core: Jenny Ivester blends disciplined project leadership with a boundless artistic imagination, navigating coastal resilience challenges while sailing, painting, and savoring the occasional gourmet cracker.
background:
  cultural: Jenny grew up in a middle‑class, predominantly white community in the American South before relocating to Naples, Florida, where she has lived for the past 20 years. Her upbringing emphasized
    self‑reliance, community involvement, and a respect for tradition, while her Florida residency introduced her to a coastal lifestyle rich in marine culture, outdoor recreation, and a growing appreciation
    for the arts. She blends these influences by valuing both personal independence and collaborative community projects, celebrating regional flavors like fresh seafood, and participating in local festivals
    that highlight the blend of Southern hospitality and Floridian coastal charm.
attributes:
  skills: '[''Project Planning'', ''Budget Management'', ''Risk Assessment'', ''Agile/Scrum Methodologies'', ''Stakeholder Communication'', ''Data Visualization'', ''Creative Problem Solving'', ''Design
