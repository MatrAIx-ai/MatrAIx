persona_description: A public health expert who specializes in infectious diseases, particularly Ebola. They have a deep understanding of the disease's symptoms, incubation period, and transmission dynamics.
  They are aware of the limitations of current quarantine measures and the potential for residual risk after the 21-day incubation period. They are aware of the scientific uncertainties and the need for
  a cautious approach in communicating the risk to the public. They are also aware of the potential for large-scale outbreaks and the need for robust surveillance and response strategies.
