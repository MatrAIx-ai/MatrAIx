personas:
  professional: Joselyn Mabien, a 29-year-old retail cashier, blends a practical, detail‑oriented mindset with an energetic, people‑focused style to streamline POS transactions, de‑escalate customer issues,
    and mentor coworkers while eyeing a shift‑manager promotion within two years.
  sports: Joselyn Mabien stays active through weekly hip‑hop and dance‑cardio classes at a local studio and plays recreational softball with coworkers, while cheering for the Cleveland Cavaliers and the
    Columbus Crew, and holds a membership at the Columbus Community Fitness Club.
  arts: Joselyn Mabien frequently visits Newport Music Hall to see hip‑hop and R&B acts such as J. Cole and H.E.R., while also championing emerging Columbus musicians like the indie band The Honkies, and
    often incorporates graffiti‑style sketching into her journal.
  travel: Joselyn Mabien prefers flexible, budget‑friendly travel, often planning last‑minute weekend road trips to music‑rich cities like Nashville and Austin, dreaming of a future getaway to Mexico City,
    and leverages a travel‑rewards credit card to maximize points.
  culinary: Joselyn Mabien delights in cooking Southern comfort dishes such as collard greens, cornbread, and sweet potato pie for family potlucks, seasoning with smoked paprika and hot sauce, while occasionally
    experimenting with global flavors like kimchi fried rice.
  core: Joselyn Mabien is a sociable, structure‑loving cashier who balances high‑energy dance nights with meticulous checkout skills, wrestles with stress‑induced worry, and dreams of launching a community‑focused
    boutique.
background:
  cultural: Joselyn identifies as African‑American and grew up immersed in the vibrant Black community of Columbus, Ohio. Family traditions, church gatherings, and local cultural festivals—such as Ohio
    Black History Month celebrations—have shaped her sense of identity and fostered a strong communal spirit. She values the rich culinary heritage of Southern soul food, often sharing meals with relatives
    and friends. This cultural grounding influences her love for music, dance, and community service, while also informing her aspirations to create a business that celebrates and sustains her cultural
    roots within the Midwest.
attributes:
  skills: '["Cash Handling", "POS System Operation", "Customer Service", "Conflict Resolution", "Inventory Stocking", "Basic Bookkeeping", "Team Collaboration", "Problem Solving Under Pressure", "Time Management"]'
  hobbies: '["Hip‑hop/Dance Classes", "Live Music Events", "Community Volunteering", "Yoga and Journaling", "Cooking Soul‑Food", "Group Sports (Recreational Volleyball)"]'
  career_goals: Joselyn aims to move from a cashier role into a supervisory position within the next two years, targeting a shift manager role where she can apply her organized workflow skills while still
    enjoying direct interaction with customers and staff. She plans to complete her associate degree in Business Administration, leveraging her some‑college experience, to qualify for store manager opportunities.
    Long‑term, she envisions running her own community‑focused boutique or coffee shop that reflects her cultural roots and offers flexible hours for herself and other local residents. She also wants to
    hone stress‑management techniques and possibly become a mentor for new employees, helping them navigate high‑traffic environments with confidence.
