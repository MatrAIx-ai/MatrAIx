  career_goals: Brittany's current ambitions focus on staying mentally and physically active, preserving her family's legacy, and giving back to her community. She hopes to finish an online genealogy project
    and write a memoir of her life on the farm. She plans to learn basic digital photography to document her garden and to master gentle senior-friendly yoga for improved flexibility. Volunteering remains
    important; she intends to lead a weekly knitting circle at the senior center and assist with small-scale event coordination. Managing stress and worry is also a priority, so she practices mindfulness
    techniques and seeks regular social connection in small, supportive groups.
