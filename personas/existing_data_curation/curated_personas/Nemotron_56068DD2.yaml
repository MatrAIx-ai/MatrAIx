personas:
  professional: An aspiring young coder and illustrator, Derrick Mitchell blends sketching, LEGO building, and Scratch programming to prototype animated stories, and they draw on their imaginative curiosity
    and organized work ethic to meet school project deadlines while collaborating with peers in the art club.
  sports: An avid basketball enthusiast, Derrick Mitchell spends afternoons shooting hoops at the neighborhood park with the Cleveland Junior Hoops Club, follows the Dallas Cowboys for football excitement,
    and they balance energetic play with weekly swim lessons to stay fit.
  arts: Passionate about visual and musical arts, Derrick Mitchell sketches beloved characters from Mo Willems books, composes catchy beats on a keyboard inspired by Kendrick Lamar, Beyoncé, and gospel
    legend Kirk Franklin, and they eagerly explore classic R&B tracks by Stevie Wonder during family road trips.
  travel: An adventurous road‑trip fan, Derrick Mitchell enjoys weekend family outings to nearby Waco’s Texas Ranger Museum and the sandy beaches of Galveston, while dreaming of exploring New York City’s
    Broadway lights and Paris’s Louvre on future school trips, and they often map out itineraries with a crayon‑drawn route planner.
  culinary: With a budding palate for comfort classics, Derrick Mitchell helps prepare fried chicken, creamy mac and cheese, collard greens, and sweet‑potato pie during family gatherings, confidently whisking
    batter and sprinkling seasoning despite occasional over‑salting that prompts a quick taste‑test, and they love sharing the final dishes with cousins over stories.
  core: Derrick Mitchell is a hyper‑creative ten‑year‑old who channels boundless imagination into sketching, coding, and basketball, while juggling a disciplined allowance routine and a lingering habit
    of misplacing tiny LEGO bricks, and they often surprise friends with spontaneous rap verses.
background:
  cultural: Derrick is an African‑American boy raised in Cleveland, a small community in Liberty County, Texas. His family maintains strong ties to church and extended relatives, celebrating holidays with
    lively music, soul food, and storytelling traditions. He grows up hearing a mix of contemporary hip‑hop, classic R&B, and gospel music that influence his artistic style. Community events like local
    parades, church youth groups, and neighborhood basketball games shape his social life. The values of resilience, mutual support, and pride in his heritage are central to his identity, guiding his compassionate
    nature and desire to uplift others.
