  career_goals: Although still young, Derrick envisions a future where he merges art and community service. He wants to become an illustrator or animator who creates stories that celebrate his neighborhood
    and inspire other kids to express themselves. He also dreams of designing educational games that teach science and creativity, hoping to work as a youth program mentor or community arts facilitator.
    Ultimately, he aims to use his talents to bring people together and make a positive impact in Liberty County.
