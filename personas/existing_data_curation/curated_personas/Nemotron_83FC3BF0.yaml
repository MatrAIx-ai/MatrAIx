personas:
  professional: David West, a 15-year-old high-school junior who runs the school's after-school gaming club, channels his sociable, routine-oriented nature into organizing weekly tournaments while flexibly
    adapting to spontaneous game-night requests, building early leadership and event-management skills.
  sports: David West darts between pickup basketball games at his high school gym, joins a local youth football league that feeds into the Biloxi Sea Dogs junior program, cheers on the New Orleans Saints
    on Sundays, and spends Sunday mornings fishing off the Gulf Coast with his dad, blending team competition with solitary outdoor sport.
  arts: David West is a devoted fan of country stars like Luke Combs and classic blues legends such as B.B. King, regularly attends Biloxi's summer blues festivals, and channels his creativity into building
    detailed model kits of vintage cars and wooden sailboats, often listening to playlists that mix twangy guitars with soulful harmonicas while he works.
  travel: David West favors spontaneous weekend road trips along the Gulf Coast, often heading to Destin's white-sand beaches or a quick drive to New Orleans for Mardi Gras vibes, but prefers staying in
    familiar fish-pier motels where he can wake early for dad's fishing excursions, balancing adventure with a love for routine.
  culinary: David West delights in the salty tang of Gulf shrimp po'boys, enjoys cooking freshly caught catfish with a Cajun spice rub, and can whip up a quick jambalaya using packaged Andouille sausage,
    though his cooking skill hovers at enthusiastic beginner level and he often over-salts the dish.
  core: David West is a routine-loving, social teen who balances marathon gaming sessions, weekend fishing trips, and community festivals, thriving on group energy while occasionally letting his laid-back
    nature cause missed deadlines.
background:
  cultural: David grew up in a white Southern family in Biloxi, Mississippi, where Southern hospitality, Christian faith, and Gulf Coast traditions shape daily life. He was raised with strong family ties,
    regular church attendance, and community involvement typical of the region. The local culture of fishing, beach activities, and a tourism economy driven by casinos and festivals has influenced his interests
    and practical skills. He celebrates regional holidays and enjoys Southern cuisine such as fried catfish, shrimp po'boys, and barbecue, reflecting the blend of coastal and traditional Southern cultural
    influences.
