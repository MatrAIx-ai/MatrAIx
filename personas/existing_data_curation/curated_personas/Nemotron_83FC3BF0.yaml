  hobbies: '[''multiplayer video gaming'', ''basketball'', ''football'', ''fishing trips'', ''attending local concerts'', ''listening to country and blues music'', ''building model kits'', ''volunteering
    at church youth group'', ''hanging out with friends'', ''exploring Gulf Coast beaches'']'
  career_goals: David aims to complete his high school education or earn a GED within the next two years, then pursue a trade or service‑oriented career that offers routine, hands‑on work, and regular interaction
    with people. He is interested in enrolling in a community‑college program for automotive technology or hospitality management, with long‑term goals of becoming a service mechanic, hotel front‑desk manager,
    or eventually a firefighter or police officer. He wants a stable job that allows him to stay close to his family and community, support his loved ones, and eventually mentor younger teens through local
    youth programs.
