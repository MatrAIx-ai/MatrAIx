    solving", "Time management"]'
  hobbies: '["Gardening", "Quilting", "Reading historical fiction", "Volunteer work at church food bank", "Cooking Southern recipes", "Woodworking and furniture restoration", "Hiking local trails", "Genealogy
    research"]'
  career_goals: Pamela aims to deepen her technical expertise by obtaining an advanced CNC programming certification and becoming a lead machinist within her current plant. She envisions taking on supervisory
    responsibilities, overseeing a small team, and formalizing a mentorship program for new hires. Long‑term, she hopes to contribute to the design of printable components by collaborating with engineering
    colleagues, and eventually launch a modest side business creating custom metal pieces that blend functional precision with aesthetic flair, reflecting her artistic sensibilities. Throughout her career
    progression, Pamela values stability, structured advancement, and opportunities to improve workplace safety and efficiency.
