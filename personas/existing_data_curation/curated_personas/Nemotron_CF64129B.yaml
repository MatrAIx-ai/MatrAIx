personas:
  professional: Angel Hruby is a hospitality professional with a knack for crafting visually striking cocktails, managing bar operations, and leading small teams in fast‑paced environments, leveraging their
    curiosity, sociability, and competitive drive to turn each shift into a performance while embracing a relaxed, slightly disorganized schedule that they navigate with improvisational flair.
  sports: Angel Hruby is a weekend hiker on the Appalachian Trail, a member of the Martinsburg Trailblazers hiking club, a loyal fan of the Washington Capitals and the Baltimore Orioles, and squeezes in
    weekly yoga classes that they view as essential balance to the long shifts behind the bar.
  arts: Angel Hruby immerses themselves in the local art scene by sketching murals, photographing historic brick façades, and attending gallery openings featuring artists such as Banksy, Kehinde Wiley,
    and Kerry James Marshall, while their karaoke nights echo the soulful twang of bluegrass legends like Alison Krauss.
  travel: Angel Hruby prefers spontaneous road trips that blend mountain hikes with urban art tours, having recently explored Asheville’s River Arts District, the historic streets of Prague, and dreaming
    of a future immersion in Berlin’s Kreuzberg street‑art scene, all while balancing a modest travel budget that prioritizes authentic experiences over luxury accommodations.
  culinary: Angel Hruby’s palate revels in experimental mixology—infusing gin with hibiscus syrup, Angostura bitters, and a splash of mezcal—while their home cooking remains at a beginner’s level, often
    whipping up quick shrimp and grits or a charcuterie board featuring smoked bratwurst, sharp cheddar, and pickled beets.
  core: Angel Hruby is a charismatic, art‑obsessed bartender whose love for spontaneous creativity is matched only by a habit of misplacing inventory sheets and a competitive streak that fuels midnight
    cocktail experiments they eagerly pursue.
background:
  cultural: Angel grew up in Martinsburg, West Virginia, a small‑town setting in the Appalachian region. Her family background reflects a blend of Mid‑Atlantic American culture with Eastern European roots
    hinted by her surname, giving her an appreciation for both local traditions—such as community fairs, bluegrass music, and craft breweries—and broader multicultural influences encountered at college
    and regional festivals. This mix of Appalachian community values and an openness to diverse artistic expressions shapes her worldview and social interactions.
