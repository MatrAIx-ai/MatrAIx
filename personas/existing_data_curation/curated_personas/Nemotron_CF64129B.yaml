  career_goals: Angel is aiming to transition from her current support role to a lead bartender position within the next two years, with a long‑term ambition of opening her own boutique bar that doubles
    as a community art space. She plans to earn a certified mixology credential, deepen her knowledge of spirits and craft cocktail techniques, and take courses in hospitality management. Angel also hopes
    to participate in regional mixology competitions to build her reputation, and eventually curate pop‑up events that blend live music, local art, and experimental drinks.
