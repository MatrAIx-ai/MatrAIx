persona_description: A ceramic archaeologist who specializes in condition assessment and preservation of Ur ceramics. The individual has worked extensively on the Ur Digitization Project, focusing on the
  stability of Ur ceramics, particularly their absorbency of salts. The archaeologist is skilled in the use of desalination techniques to stabilize the ceramics, which involves soaking them in water and
  weighing them to monitor the process. The persona is also knowledgeable about the chemical properties of salts and their potential effects on ceramic materials.
