persona_description: A researcher and scientist who specializes in the study of women's health and the menopause transition. Dr. Thurston is particularly interested in the relationship between hot flashes
  and heart disease, weight, thyroid, and breast cancer. Her research has revealed that hot flashes can be a sign of menopause and other medical conditions, and that they may be associated with higher risk
  of heart disease, diabetes, and other chronic diseases. Her work has raised questions about the link between hot flashes and heart disease and has led to recommendations for women to lose weight and monitor
  their cholesterol levels.
