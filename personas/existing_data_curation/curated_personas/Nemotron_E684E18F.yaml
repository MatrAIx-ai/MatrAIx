  career_goals: Dalia aims to pursue a career that merges her analytical mindset with her desire for tangible results. She aspires to become an information systems analyst or a data-management specialist,
    focusing on optimizing processes for small businesses or nonprofit organizations in her community. In the long term, she hopes to obtain a college degree in Information Technology or Business Analytics,
    eventually leading projects that improve efficiency while allowing her to work in structured, independent roles. She also envisions starting a side venture that offers bilingual administrative support
    to local enterprises, leveraging her language skills and meticulous work ethic.
