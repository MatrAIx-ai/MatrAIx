  hobbies: '[''Digital Illustration'', ''Video Editing'', ''Live Music Shows'', ''Improv Comedy'', ''Debate Club Participation'', ''Online Strategy Gaming'', ''Chess'', ''Running'', ''Journaling'', ''Mindfulness
    Practice'']'
  career_goals: Curtis aims to enroll in a community college program in communications or business administration, with the short‑term goal of securing an internship at a regional marketing or event‑management
    firm. He envisions a career in marketing, brand strategy, or event production where he can blend his disciplined project execution with his passion for art and public engagement. Ultimately, he aspires
    to launch his own creative agency that offers branding, digital content, and event planning services to small‑town businesses, leveraging his competitive drive to win contracts and establish a reputation
    for high‑quality, innovative work.
