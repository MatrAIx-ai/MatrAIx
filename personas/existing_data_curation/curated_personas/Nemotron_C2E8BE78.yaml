personas:
  professional: Curtis Jessen, an aspiring marketing strategist, leverages meticulous project planning, confident public speaking, and a competitive, skeptical mindset to design high‑impact brand campaigns
    for small‑town businesses, while thriving on the buzz of live events and the challenge of winning new contracts.
  sports: Curtis Jessen runs with the Midtown Runners club, follows the Chicago Bulls for basketball, roots for the St. Louis Cardinals in baseball, and spikes up a weekend pickup basketball game every
    summer to stay active.
  arts: Curtis Jessen thrives on the creative pulse of gallery openings featuring street artists like Banksy, riffs on digital illustration inspired by Beeple, and fills weekends at live shows by Kendrick
    Lamar and Björk, weaving these influences into their own visual content.
  travel: Curtis Jessen prefers budget‑friendly road trips to vibrant cultural hubs like Austin and Portland, while day‑dreaming about a future solo backpacking adventure through Berlin and Tokyo, always
    mapping itineraries on Google Flights and using student discounts.
  culinary: Curtis Jessen enjoys devouring spicy ramen bowls and tacos al pastor, experiments with making avocado toast topped with sriracha and lime, and can whip up a decent shrimp stir‑fry, while often
    treating themselves to craft coffee at the local espresso bar.
  core: Curtis Jessen is a hyper‑organized, curiosity‑driven extrovert whose relentless competitive streak fuels both their polished brand pitches and their nightly habit of replaying debate arguments in
    the bathroom mirror.
background:
  cultural: Curtis was raised in Bunker Hill, a small rural town in Macoupin County, Illinois, within a traditionally white, Midwestern family with German‑American farming roots. The community emphasizes
    self‑reliance, modesty, and a strong work ethic, values that underpin his disciplined approach to tasks. Exposure to his high school’s art programs and the vibrant local music scene sparked his appreciation
    for creative expression. This blend of Midwestern practicality and emerging artistic influences gives him a grounded yet exploratory worldview, balancing pragmatic problem‑solving with a curiosity for
    new ideas and experiences.
attributes:
  skills: '[''Project Management'', ''Public Speaking'', ''Graphic Design'', ''Video Editing'', ''Event Planning'', ''Strategic Analysis'', ''Competitive Debating'', ''Social Media Content Creation'', ''Time
