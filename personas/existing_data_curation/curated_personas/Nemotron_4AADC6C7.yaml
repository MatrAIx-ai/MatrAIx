personas:
  professional: Joseph Crosby, a self‑driven high‑school robotics enthusiast, channels their love of strategy games and meticulous model building into designing and programming autonomous bots for their
    club, and they approach every project with a methodical, data‑driven mindset that reflects their competitive edge and need for predictable outcomes.
  sports: Joseph Crosby, a member of the high‑school intramural basketball club who prefers low‑pressure shoot‑around sessions, follows the NBA’s Golden State Warriors for their strategic play, and they
    complement their sedentary hobbies with weekend cycling trips to the local park to maintain a measured fitness routine.
  arts: Joseph Crosby, an avid sci‑fi reader who draws inspiration from authors like Isaac Asimov and Liu Cixin, enjoys listening to Hans Zimmer’s cinematic scores and Daft Punk’s electronic beats while
    modeling, and they occasionally stream classic films such as Blade Runner to fuel their creative imagination.
  travel: Joseph Crosby, a budget‑conscious teen with a passion for engineering marvels, dreams of visiting NASA’s Kennedy Space Center and the robotics exhibition in Tokyo, while they’ve already taken
    day trips to nearby science museums and historic model‑building workshops to satisfy their curiosity.
  culinary: Joseph Crosby, a novice home cook who relishes the precision of following exact recipes, frequently prepares simple ramen bowls with miso broth, perfectly cooked rice, and sliced pork, and they
    treat themselves to crunchy granola bars and homemade pizza topped with mozzarella and pepperoni after long gaming marathons.
  core: Joseph Crosby, a meticulous 15‑year‑old strategist, balances structured hobbies and anxiety‑driven routines while they occasionally succumb to impulsive gaming purchases and over‑think social interactions.
background:
  cultural: Joseph is a white American raised in Lawton, Oklahoma, a city known for its strong military presence due to Fort Sill and a blend of small‑town Midwestern values. He grew up in a household that
    emphasizes hard work, punctuality, and community involvement. Local traditions such as county fairs, high‑school football Fridays, and Fourth of July celebrations shape his social experiences. While
    his family identifies primarily with European ancestry, the surrounding Southern Plains cultural landscape includes influences from nearby Native American communities. His community is predominantly
    Protestant, and church gatherings provide additional structured social settings. The disciplined ethos of the military community in Lawton influences his interest in a future service career and his
    appreciation for order and predictability.
