  career_goals: Joseph aspires to a stable, structured career that blends technical problem‑solving with clear advancement pathways. He is interested in fields such as civil engineering, logistics coordination,
    or a technical role in the military—particularly as an avionics or communications specialist. After high school he plans to attend a technical college or community college to earn an associate degree,
