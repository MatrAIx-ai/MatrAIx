personas:
  professional: Chung Ji, a meticulous auditor with a knack for blending data‑analytics rigor and creative problem‑solving, leverages advanced Excel modeling and Power BI to deliver precise US GAAP and
    IFRS reports while coordinating cross‑cultural teams and meeting tight deadlines.
  sports: Chung Ji, an avid hiker in the Angeles National Forest and member of the LA Ramblers running club, follows the Los Angeles Lakers in winter, the Dodgers in summer, and occasionally joins pickup
    basketball games at the community center, emphasizing a balanced routine of cardio, strength training, and yoga.
  arts: Chung Ji, a street‑photography enthusiast who captures LA’s multicultural tapestry à la Vivian Maier, devours works by Haruki Murakami and Slavoj Žižek, and unwinds to the indie sounds of Tame Impala
    and the soulful jazz of Kamasi Washington, weaving artistic curiosity into daily life.
  travel: Chung Ji, a methodical planner who maps trips in spreadsheets yet cherishes spontaneous detours, has trekked the cliffs of Big Sur, explored Kyoto’s historic temples while polishing Japanese,
    and dreams of a culinary road trip through Oaxaca, balancing limited vacation days with a desire for cultural immersion.
  culinary: Chung Ji, a self‑taught home chef who blends traditional kimchi and bulgogi with Californian staples like avocado and quinoa, often whips up kimchi‑topped fish tacos and bulgogi bowls flavored
    with gochujang and lime, and frequents the farmer’s market for fresh cilantro, kale, and heirloom tomatoes.
  core: Chung Ji, a data‑driven auditor with a wanderlust‑fuelled love for hiking, street photography, and cultural fusion cuisine, balances meticulous budgeting with occasional splurges on camera gear,
    and counters mild anxiety with daily meditation and chess evenings.
background:
  cultural: Chung Ji is a second‑generation Korean American raised in Southern California. His parents immigrated from South Korea in the early 1990s, instilling values of educational achievement, respect
    for community, and the importance of harmony in relationships. He grew up bilingual, speaking both Korean and English, and regularly participates in cultural celebrations such as Chuseok and Lunar New
    Year with his extended family. These cultural roots influence his collaborative work style, his balanced approach to curiosity and practicality, and his commitment to contributing positively to both
    his professional environment and the broader community.
attributes:
  skills: '[''Financial reporting'', ''Audit planning and execution'', ''GAAP and IFRS compliance'', ''Risk assessment'', ''Internal control evaluation'', ''Tax preparation'', ''Advanced Excel modeling'',
