  hobbies: '[''Hiking in Angeles National Forest'', ''Street photography'', ''Cooking fusion Korean‑Californian dishes'', ''Reading modern literature and philosophy'', ''Japanese language study'', ''Volunteer
    tax assistance'', ''Mindfulness meditation'', ''Chess'']'
  career_goals: Chung Ji aims to earn his Certified Public Accountant (CPA) license within the next two years and advance to a senior auditor role at his firm. He aspires to lead a specialized team focused
    on environmental, social, and governance (ESG) audit services, integrating data‑analytics tools and emerging AI technologies to enhance audit efficiency. In the longer term, he envisions moving into
    a finance manager or controller position, overseeing diversified financial operations while maintaining a balance between professional growth and personal well‑being. He also intends to mentor junior
    colleagues, fostering a collaborative and harmonious workplace culture.
