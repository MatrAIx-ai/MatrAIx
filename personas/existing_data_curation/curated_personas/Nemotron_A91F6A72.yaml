  career_goals: Joshua aims to re‑enter the workforce in a part‑time or volunteer‑lead role that leverages his compassion and organizational strengths. He seeks a position within a nonprofit or community‑service
    organization where he can lead outreach programs for seniors and low‑income families, and eventually obtain a certification in elder care or peer counseling to deepen his impact. He also hopes to develop
    a neighborhood mentorship program that pairs experienced volunteers with younger community members, fostering harmony and shared responsibility. While pursuing these goals, Joshua wants to maintain
    a balanced schedule that allows ample time for his family and personal growth.
