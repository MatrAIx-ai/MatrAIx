  career_goals: Lauren dreams of a future where she can combine her love for animals, nature, and helping others. In the short term, she aims to maintain high grades, win a regional science fair with a
    project on local wildlife, and take on a leadership role in her school's science club. Long-term, she hopes to study biology or veterinary medicine at a university, eventually becoming a veterinarian
    or a wildlife conservationist who works in rural Tennessee. She also envisions mentoring younger students and possibly opening a community garden or animal-care program that supports her neighbors.
