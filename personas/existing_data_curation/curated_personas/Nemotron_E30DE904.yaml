  career_goals: Julia aims to solidify her reputation as the go‑to expert for quality assurance within her plant, seeking a senior inspector or lead auditor role where she can oversee larger audit projects.
    She hopes to mentor younger technicians, passing on her systematic approach and emphasis on reliability. Over the next few years, she plans to collaborate with management to refine sampling protocols
    and reduce waste, ultimately positioning herself for a part‑time consulting role after retirement, focusing on compliance training for small‑scale manufacturers in the region.
