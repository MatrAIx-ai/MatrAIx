  hobbies: '[''Reading historical fiction and philosophy'', ''Visiting art museums and attending theater'', ''Cycling along the Huron River'', ''Running in Nichols Arboretum'', ''Meditation and yoga'',
    ''Cooking Mediterranean cuisine'', ''Volunteering at a literacy program'', ''Playing board games with friends'']'
  career_goals: Cameron aims to progress into senior leadership within organizational strategy, targeting roles such as Director of Business Analytics or Chief Strategy Officer. He aspires to lead cross‑functional
    initiatives that integrate data‑driven decision making with a human‑centered perspective, leveraging his humanities background to foster inclusive and innovative solutions. A personal ambition is to
    mentor emerging analysts, championing a culture of continuous learning while implementing stress‑reduction practices within his teams. Over the next five years, he also hopes to author a whitepaper
    on the intersection of cultural insights and business analytics, positioning himself as a thought leader who bridges quantitative rigor with qualitative nuance.
