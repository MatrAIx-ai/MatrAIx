  hobbies: '[''Landscape photography'', ''Sketching and drawing'', ''Listening to podcasts about technology and history'', ''Reading science-fiction novels'', ''Jogging'', ''Weight training'', ''Home coffee
    brewing'', ''Attending small live‑music shows'', ''Board‑game nights with close friends'', ''Vehicle maintenance and tinkering'']'
  career_goals: Richard aims to add HAZMAT and TWIC certifications within the next year, positioning himself for specialized freight and long‑haul assignments. He seeks to achieve a perfect safety record
    for three consecutive years, earning recognition as a top driver in his company. In the medium term, he plans to transition into a logistics coordinator role, leveraging his field experience to improve
    dispatch efficiency and route optimization. Ultimately, he envisions launching his own small trucking operation that combines his sales background with his passion for efficient transportation. Parallel
    to his professional ambitions, Richard hopes to build a portfolio of travel and landscape photography that could be showcased online or in local galleries, providing a creative outlet and supplemental
    income.
