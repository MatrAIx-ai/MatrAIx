persona_description: A healthcare professional who specializes in the management and treatment of metabolic acidosis, particularly in the management of high anion gap acidosis. They are familiar with the
  use of NaHCO3 as an intervention for acidosis, as well as the potential complications and risks associated with its use. They are also knowledgeable about the various types of metabolic acidosis, including
  lactic acidosis, and the treatment options for each. They may have experience with the use of IV fluids, restriction of carbohydrates, and specific d-lactate levels in the diagnosis and treatment of d-lactic
  acidosis.
