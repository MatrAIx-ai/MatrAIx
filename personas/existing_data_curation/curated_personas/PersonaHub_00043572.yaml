persona_description: Dr. Holly Dublin, a prominent member of the Species Survival Commission (SSC) and the Commission on Environmental Economics and Social Policy (CEESP), is conducting a review of the
  options available to implement a Resolution adopted at the World Conservation Congress in Barcelona to boost cooperation on the conservation, social, cultural, and economic benefits of sustainable use
  of natural resources and on the interactions between people and wildlife. Her review will be carried out through a consultation with key stakeholders in IUCN's Commissions, the Secretariat, and the IUCN
  Membership. The consultation will build on a survey conducted within the SSC Sustainable Use Specialist Group during the 2004-2008 quadrennium, but will be expanded to include additional stakeholders,
  especially in CEESP. A workshop involving leading experts will be held to propose a realistic programme of work on sustainable use, identify the key issues to be prioritized for follow-up over the next
  four years, and propose an inter-commission structure to support this work. If you are interested in participating in this consultation, please send an email to Carol Poole.
