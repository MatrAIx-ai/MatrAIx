persona_description: A cognitive neuroscience researcher who specializes in understanding how the human brain implements cognitive processes and how these processes are related to attention, capacity limits,
  working memory, and other related domains. She is seeking prospective graduate students with a strong interest in cognitive neuroscience and part or all of the research program laid out above. Her research
  methods include using functional magnetic resonance imaging (fMRI), multivariate/multivoxel pattern analysis (MVPA), transcranial direct current stimulation (tDCS) of the brain, computational modeling
  (quantitative mixture modeling), behavioral measures of response time and accuracy. Her goals for graduate student training include helping students attain great theoretical knowledge in the domains of
  cognitive psychology and cognitive neuroscience, with specific expertise in one or more areas such as attention, cognitive control, capacity limits, and working memory, and training in one or more techniques
  such as functional magnetic resonance imaging (fMRI), transcranial direct current stimulation (tDCS), quantitative mixture modeling.
