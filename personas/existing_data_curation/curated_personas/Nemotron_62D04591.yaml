personas:
  professional: Mary Hilton, a seasoned hostess at a bustling downtown eatery, blends their curiosity for innovative service ideas with practical reservation management and diplomatic conflict resolution,
    while their spontaneous, cooperative nature keeps the floor harmonious even during peak surges.
  sports: Mary Hilton enjoys scenic hikes along the Fox River with the River Runners walking club, attends Chicago Cubs games at Wrigley Field each summer, and joins a local cross-country ski group for
    winter snowshoe outings, balancing casual fitness with community sports enthusiasm.
  arts: Mary Hilton, an avid fan of historical fiction by authors like Philippa Gregory and Ken Follett, knits while listening to Bob Dylan and Joan Baez, and regularly attends the community theater’s productions
    of classics such as 'Our Town', drawing creative inspiration for their DIY home décor projects.
  travel: Mary Hilton favors flexible, budget-friendly road trips, having explored historic towns like Savannah, Georgia and Salem, Massachusetts, and they dream of visiting Bath, England and the Tuscan
    countryside to deepen their love of history, often planning itineraries on the fly and staying at charming B&Bs.
  culinary: Mary Hilton delights in brewing pour-over coffee with beans from a local roaster, cooks garden-fresh ratatouille and zucchini bread using home-grown tomatoes and basil, and enjoys seasonal dishes
    like grilled vegetable medley with herb-infused olive oil, while they occasionally indulge in county-fair treats like apple-cider-glazed pork ribs.
  core: Mary Hilton balances curiosity and practicality, turning a love for community hospitality into a spontaneous, harmonious life peppered with garden-fresh coffee, historical novels, and a penchant
    for last-minute DIY projects.
background:
  cultural: Mary was raised in a Midwestern white family with deep German‑Scandinavian roots, a heritage reflected in her appreciation for seasonal celebrations, hearty home‑cooked meals, and community
    fellowship. Growing up in rural Wisconsin instilled values of self‑reliance, modesty, and a strong sense of neighborly cooperation. She participates in local traditions such as Thanksgiving potlucks,
    Oktoberfest‑style events, and church‑based service projects, all of which reinforce her commitment to harmony and collective well‑being.
attributes:
  skills: '[''Warm greeting and guest orientation'', ''Reservation and waitlist management'', ''Dynamic seating and crowd flow coordination'', ''Conflict resolution and guest complaint handling'', ''Menu
    knowledge and food‑beverage recommendation'', ''POS operation and cash handling'', ''Team communication and coordination'', ''Local culinary scene familiarity'', ''Adaptability to spontaneous schedule
    changes'']'
  hobbies: '[''Vegetable gardening'', ''Exploring specialty coffee brewing'', ''Reading historical fiction'', ''Volunteer work at community kitchen'', ''Hiking local trails'', ''Knitting and craft projects'',
    ''DIY home décor'', ''Attending county fairs and local festivals'']'
  career_goals: Mary aspires to move from hostess duties to a floor‑manager role where she can mentor newer staff, design training modules that balance innovation with reliable service standards, and eventually
    help launch a small, community‑focused coffee shop that showcases locally sourced brews and fosters neighborhood gatherings. She also hopes to contribute to a regional hospitality association, sharing
    best practices for creating harmonious work environments.
