  career_goals: Mario imagines a future where he can combine his love for art, imagination, and helping others. He hopes to become a graphic novelist or an animator who creates stories that inspire and
    comfort. He is also interested in designing video‑game worlds that encourage teamwork and creativity. Because he cares about harmony in nature, he sometimes dreams of working as an environmental illustrator
    or conservation educator, using his art to raise awareness. Ultimately, his ambition is to pursue a career that lets him explore unconventional ideas while making a positive impact on people and the
    planet.
