personas:
  professional: Mario Rios is a budding comic artist who spends hours sketching cartoon panels and experimenting with digital illustration on a tablet, often battling self‑imposed deadlines due to a spontaneous,
    unstructured approach.
  sports: Mario Rios enjoys playing catch in the neighborhood baseball league, looks forward to weekend games with the New York Giants, and follows the New York Knicks for basketball inspiration, occasionally
    joining a community soccer clinic at the local park.
  arts: Mario Rios devotes after‑school hours to drawing comics influenced by Art Spiegelman and building intricate LEGO structures, while listening to indie folk musicians like Fleet Foxes and classical
    piano pieces by Ludovico Einaudi, which together fuel their imaginative storytelling.
  travel: Mario Rios loves weekend trips to the Liberty Science Center and the Jersey Shore’s sandy beaches, dreams of exploring dinosaur exhibits at the American Museum of Natural History, and hopes to
    one day hike the Grand Canyon’s trails with his family.
  culinary: Mario Rios prefers classic pepperoni pizza and chicken nuggets but delights in helping his mom roll sushi, enjoys carrot sticks with hummus while bird‑watching, and occasionally experiments
    with a simple no‑bake chocolate oatmeal cookie.
  core: Mario Rios is a quietly creative ten‑year‑old who transforms solitary nature walks into storyboard ideas, battles the urge to overspend on LEGO sets, and wrestles with a persistent worry that fuels
    meticulous art but also occasional meltdowns.
background:
  cultural: Mario was raised in Kearny, New Jersey, a suburban community in the Mid‑Atlantic United States. His family’s cultural background is primarily Anglo‑American, and he grew up immersed in mainstream
    American traditions such as celebrating national holidays and participating in local community events. Living in one of the most diverse counties in the state, Mario has been exposed to a variety of
    cultural influences through school programs, museum visits, and neighborhood diversity, which have broadened his appreciation for different artistic styles and perspectives while reinforcing values
    of individual expression, cooperation, and community harmony.
