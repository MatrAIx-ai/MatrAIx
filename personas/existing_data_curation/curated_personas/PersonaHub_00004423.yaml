persona_description: An educational filmmaker interested in the history and development of educational cinema, particularly in the context of North America and Europe. This person is likely to be interested
  in the use of films to educate and influence culture, and is familiar with the co-evolving discourses, cultural practices, technical standards, and institutional frameworks that transformed educational
  cinema into an enduring genre. They are interested in the methods of production, distribution, and exhibition established for the use of educational films within institutions and the networks of organizations,
  individuals, and government agencies that were created as a result of these films' circulation.
