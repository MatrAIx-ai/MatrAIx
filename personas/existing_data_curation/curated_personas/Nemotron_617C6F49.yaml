  career_goals: Bjay aims to transition into a senior executive role such as Chief Financial Officer or senior financial adviser within the next five years, leveraging his structured mindset to drive digital
    transformation of finance functions. He seeks to implement data‑centric strategies that improve profitability while maintaining compliance. Mentorship is a core ambition; he plans to formalize a mentorship
    program for emerging finance professionals in his organization and partner with local nonprofits to expand financial literacy in the Sandy community. Ultimately, he envisions a phased retirement that
    balances continued advisory influence with personal time for family and hobbies.
