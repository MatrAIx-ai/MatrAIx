personas:
  professional: Kiara Peavy, a budding preschool organizer, meticulously lines up her blocks by size before building towering structures, delighting in the systematic approach that satisfies her curiosity
    and practical mindset, and proudly earns gold stickers for meeting the daily achievement chart at her daycare.
  sports: Kiara Peavy, a budding soccer enthusiast who attends weekly practice with the Dallas Mini-Stars, cheers loudly for the Dallas Cowboys during family game nights, and insists on completing a mini
    backyard obstacle course before bedtime, reflecting her organized yet energetic approach to fitness.
  arts: Kiara Peavy, a tiny gospel choir enthusiast who belts out Oh Happy Day during Sunday services, sketches scenes inspired by Maya Angelou’s poems in her coloring books, and proudly collects glitter-filled
    crayons for artistic expression, while occasionally dancing to the beat of Beyoncé’s upbeat songs during playtime.
  travel: Kiara Peavy, an adventurous preschooler who loves family road trips to the Texas State History Museum for Juneteenth celebrations, dreams of strolling down Main Street at Disney World’s Magic
    Kingdom, and always packs her favorite plush giraffe in her tiny suitcase, balancing excitement with a meticulous checklist of snacks and stickers.
  culinary: Kiara Peavy, a tiny kitchen helper who mixes collard greens into mac and cheese, proudly identifies the sweet aroma of fried chicken, and can whistle while stirring gravy, though she often sneaks
    a bite of sugar-coated cornflakes before dinner, displaying her disciplined yet mischievous relationship with food.
  core: Kiara Peavy is a highly organized, curious four-year-old who balances structured play with spontaneous gospel singing, meticulously manages her piggy bank, and sprinkles her day with disciplined
    routines and occasional mischievous snacking.
background:
  cultural: Kiara is raised in a close‑knit African‑American family in Dallas, Texas. Her parents emphasize education, community, and faith, drawing on traditions from the church and cultural celebrations
    such as Juneteenth and Kwanzaa. Family gatherings feature soulful music, gospel choirs, and home‑cooked dishes that connect her to Southern Black culinary heritage. Her grandparents share stories of
    the Great Migration and the richness of Dallas’s Black neighborhoods, fostering a sense of pride and belonging that shapes Kiara’s values and aspirations.
attributes:
  skills: '["counting to 20", "alphabet recognition", "puzzle solving", "toy organization", "following daily routines", "reciting nursery rhymes", "basic phonics"]'
