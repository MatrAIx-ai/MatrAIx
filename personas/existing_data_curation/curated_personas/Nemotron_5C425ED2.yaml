  career_goals: Even at four, Kiara imagines a future where she can help others learn and keep things in order. She often says she wants to be a teacher or librarian when she grows up because she loves
    sharing stories and arranging books neatly. She also pictures herself as a community organizer who can plan neighborhood events, reflecting her early drive to achieve high standards and make a positive
    impact.
