personas:
  professional: Jerry Perrault, a 38‑year‑old licensed practical nurse with certifications in geriatric care and basic therapeutic art techniques, blends meticulous patient assessment with a painter’s eye
    for detail, using art‑based coping strategies to guide chronic‑disease patients while calmly steering emergency situations and mentoring junior staff.
  sports: Jerry Perrault, a 38‑year‑old outdoor enthusiast, spends weekend mornings tackling the Sierra foothills with a lightweight trekking pole, belongs to the local “Foothill Hikers” club, and when
    not on the trail follows the Sacramento Kings’ basketball season and the San Jose Earthquakes’ soccer matches, occasionally joining a co‑ed recreational volleyball league at the community center.
  arts: Jerry Perrault, a 38‑year‑old creative soul, paints impressionistic landscapes after scouting the hills, sketches in a pocket‑size Moleskine during café visits, captures sunrise over oak groves
    with a Nikon D5600, strums acoustic versions of Sufjan Stevens at open‑mic nights, and curates a personal film collection that includes Christopher Nolan’s “Inception” and the indie documentary “Jiro
    Dreams of Sushi,” drawing inspiration from Van Gogh’s brushwork and Ansel Adams’ stark contrast.
  travel: Jerry Perrault, a 38‑year‑old wanderer, prefers road‑trip itineraries that blend short hikes with cultural stops, having explored the red rocks of Sedona, the vineyards of Napa Valley, and the
    historic streets of Quebec City, while they dream of a spring retreat to Provence’s lavender fields where they could paint en plein air; they usually plan trips around long‑weekend windows to balance
    work, garden duties, and family obligations.
  culinary: Jerry Perrault, a 38‑year‑old farm‑to‑table experimenter, tends a modest vegetable garden of heirloom tomatoes, rainbow carrots, and rosemary, then concocts dishes like roasted beet and goat‑cheese
    salad with a hazelnut vinaigrette, quinoa‑stir‑fry with kale and citrus zest, and a slow‑cooked chicken braised in local sauvignon blanc, while they savor a pour‑over drip coffee from the seasonal beans
    of Riverside Roasters.
  core: Jerry Perrault, a 38‑year‑old LPN and avid artist, balances meticulous patient care with a weekend habit of painting, hiking, and brewing experimental coffee, all while quietly juggling an impulse‑driven
    art‑supply stash and a disciplined plan to become an RN.
background:
  cultural: Jerry grew up in a middle‑class family in the Central Valley of California. His ancestry includes French‑Canadian roots that settled in the West Coast during the early 20th century, giving him
    a subtle connection to French heritage while largely embracing the broader Anglo‑American culture of the region. Waterford's small‑town, agricultural environment fostered values of hard work, community
    involvement, and self‑reliance. As a nurse, Jerry interacts regularly with diverse populations—including Latino, Asian, and other cultural groups—shaping an inclusive worldview that blends his Western
    upbringing with a deep respect for cultural diversity and community cohesion.
