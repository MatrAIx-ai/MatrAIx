    in improv comedy workshops'']'
  career_goals: Jerry aims to advance his nursing career by completing an accelerated RN program and earning a BSN within the next three years. He aspires to specialize in geriatric and palliative care,
    integrating art therapy to improve patient quality of life. Long‑term, he hopes to lead a holistic wellness program at his clinic or a community health center, mentor new LPNs, and eventually take on
    a supervisory or nursing educator role. He also plans to obtain certification in therapeutic arts and participate in community outreach initiatives that blend healthcare with creative expression.
