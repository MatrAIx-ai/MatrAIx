personas:
  professional: Asianna Wilson is a methodical graphic designer who leverages their expertise in Adobe Creative Cloud, typographic composition, and structured project management to deliver brand identities
    and visual solutions, while their preference for predictability, reliability, and empathetic client communication ensures smooth, deadline‑driven collaborations.
  sports: Asianna Wilson enjoys low‑impact fitness through regular yoga sessions, occasional pick‑up basketball games at the local community center, follows the Tampa Bay Buccaneers, Tampa Bay Lightning,
    and Tampa Bay Rays, and they also participate in seasonal 5K runs organized by the city’s health department to stay active.
  arts: Asianna Wilson immerses themselves in the arts, they attend jazz performances featuring artists like John Coltrane, Kamasi Washington, and Miles Davis at local venues, frequent the Tampa Museum
    of Art and Hyde Park galleries, draw inspiration from graphic design legends such as Saul Bass and photographer Vivian Maier, and collect limited‑edition prints from contemporary street artists.
  travel: Asianna Wilson prefers thoughtfully planned trips that blend cultural immersion and creative inspiration, they have explored New Orleans for its music, Charleston for its historic architecture,
    and Barcelona for its design scene, while dreaming of future visits to Kyoto’s temples, the Dutch design capital of Rotterdam, and a design conference in San Francisco, always budgeting trips around
    a modest travel fund.
  culinary: Asianna Wilson enjoys precise baking, they master sourdough starter, croissants, and lemon drizzle cake using exact measurements of flour, butter, and citrus zest, complement these creations
    with carefully brewed pour‑over coffee from local roasters, and often experiment with Southern‑inspired dishes like shrimp and grits seasoned with fresh thyme and smoked paprika, all while maintaining
    a moderately skilled home‑cooking repertoire.
  core: Asianna Wilson balances a disciplined creative career and meticulous financial habits with a keen awareness of mental health, they channel anxiety into structured design work, yoga, and exacting
    baking, while occasionally succumbing to impulse coffee runs and late‑night Netflix binges.
background:
  cultural: As a Black woman raised in Tampa, Florida, Asianna’s identity is shaped by the city’s rich African‑American heritage and the close‑knit community networks of churches, local festivals, and cultural
    organizations. Her family traditions blend Southern soul food, gospel music, and occasional Caribbean influences from relatives who migrated from the Caribbean islands. These cultural touchstones inform
    her aesthetic sensibilities, leading her to incorporate Afrocentric patterns, bold yet warm color palettes, and themes of resilience into her design work. She is actively engaged with local Black art
    collectives, supports Black‑owned businesses, and participates in community events that celebrate Black history and creativity, using her design skills to amplify those narratives.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Brand Identity Development'', ''Print Layout Design'', ''Digital Layout Design'', ''Typography'', ''Color Theory'', ''HTML/CSS
    basics'', ''After Effects motion graphics'', ''Project Management (Asana, Trello)'', ''File Organization and Version Control'', ''Client Communication'', ''Empathetic Collaboration'', ''Time Management'']'
  hobbies: '[''Journaling'', ''Calligraphy'', ''Baking'', ''Yoga'', ''Guided Meditation'', ''Street Photography'', ''Attending Art Exhibitions'', ''Listening to Jazz'', ''Volunteer Graphic Design Teaching'',
    ''Scrapbooking'']'
  career_goals: Asianna aims to advance to a senior or lead designer role within a forward‑thinking agency that values clear processes and mental‑health support. She plans to obtain an Adobe Certified Expert
    credential and, if feasible, pursue a bachelor's degree in visual communication to formalize her expertise. Long‑term, she envisions founding a boutique design studio that specializes in culturally
    resonant branding for Black‑owned businesses, offering structured project pipelines that foster a balanced, supportive environment for collaborators. She also hopes to mentor emerging designers from
    underrepresented backgrounds, creating a pipeline of talent that shares her commitment to organized, harmonious design practice.
