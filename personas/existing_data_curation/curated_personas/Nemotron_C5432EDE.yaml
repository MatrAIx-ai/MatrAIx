  hobbies: '["block stacking and building", "shape‑sorting puzzles", "bird‑watching and leaf collecting", "listening to nursery rhymes and humming", "crayon drawing and coloring", "reading picture books
    about animals and construction", "quiet cooperative play with a small group of familiar children"]'
  career_goals: Even at this young age, Andrea expresses simple, yet heartfelt aspirations that hint at future ambitions. She often talks about "helping animals" after watching farm animals on a picture
    book, suggesting a budding interest in becoming a veterinarian. She also enjoys building tall block towers and imagines constructing houses, indicating a future curiosity about architecture or engineering.
    Andrea hopes to become more independent—walking confidently, reading picture books on her own, and mastering new skills without constant adult guidance. Her competitive streak surfaces when she tries
    to finish puzzles faster than her siblings, reflecting a desire to excel and be recognized for her abilities. Overall, her goals revolve around gaining mastery over her environment, caring for living
    things, and eventually contributing in ways that blend creativity with practical problem‑solving.
