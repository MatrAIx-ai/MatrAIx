personas:
  professional: Andrea Galimba is a budding caretaker of farm animals, spending playtime in the family barn feeding goats and sorting feed, showing early practical skills and a curiosity‑driven approach
    that hints at a future in agricultural work, even if they often misplace toys and resist strict schedules.
  sports: Andrea Galimba loves backyard tag and toddler gymnastics, cheering on the Iowa Hawkeyes football team during the Sunday game and occasionally joining the Blairstown Little Kickers soccer practice,
    preferring low‑key play over structured competition while still showing a competitive streak when racing friends.
  arts: Andrea Galimba delights in listening to folk classics like Johnny Cash and The Carter Family while flipping through picture books by Maurice Sendak, often dancing spontaneously to the fiddle tunes
    at church potlucks, and their tiny hand‑drawn crayon sketches reveal a shy yet vibrant artistic side.
  travel: Andrea Galimba enjoys short car rides to the county fair and annual trips to the Iowa State Fair in Des Moines, dreaming of the bright lights of Chicago’s Navy Pier while preferring familiar routes
    that let them stay close to family, and they hope one day to see the Grand Canyon's vast horizons.
  culinary: Andrea Galimba favors buttery mac and cheese, sweet apple pie slices, and crunchy corn on the cob, proudly helping stir batter for blueberry muffins with a plastic spoon, yet they can be picky,
    refusing foods with unfamiliar textures, reflecting a practical yet curious palate.
  core: A tiny farm‑yard explorer with a pragmatic streak, a love for simple comforts, and a quiet competitive edge that makes Andrea Galimba both a cautious worrier and a spirited toddler.
background:
  cultural: Andrea is raised in Blairstown, a small town in Iowa County, Iowa, embodying the Midwestern white cultural milieu. Her family lives in a rural setting, with close ties to farming life and community
    churches that emphasize modesty, self‑reliance, and neighborly support. Seasonal events like county fairs, harvest festivals, and community potlucks shape her social experiences, while the surrounding
    farmland offers frequent exposure to livestock and crop cycles, nurturing her early interest in animals and nature. The local values of practicality and simplicity reinforce her balanced curiosity and
    relaxed approach to obligations, while the close‑knit community nurtures a preference for small, familiar social circles. Although she is still very young, these cultural influences subtly steer her
    attitudes toward teamwork, competition, and the importance of routine.
attributes:
  skills: '["basic speech and vocabulary", "color and shape identification", "block stacking and tower building", "shape‑sorting puzzle solving", "early counting (1‑5)", "cause‑and‑effect exploration with
