  career_goals: Jacqueline aims to transition from full‑time maintenance work to a part‑time advisory role that lets her share her wealth of knowledge with younger technicians and community workshops. She
    plans to earn the Certified Maintenance Manager (CMM) credential and spearhead energy‑efficiency initiatives in her building, reducing utility costs and carbon footprint. Additionally, she hopes to
    mentor apprentices formally, develop a small consulting service for senior‑friendly home modifications, and allocate more time to her artistic pursuits while remaining a reliable, supportive team member.
