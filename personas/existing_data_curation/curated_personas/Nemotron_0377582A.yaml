  hobbies: '[''community basketball'', ''seasonal softball'', ''hiking'', ''camping'', ''fishing'', ''volunteering at local festivals'', ''organizing maple‑syrup harvest events'', ''board games'', ''home‑brewing'',
    ''DIY woodworking'']'
  career_goals: Mark aims to leverage his practical experience to advance into a team‑lead position within the next two years, focusing on developing leadership and coaching skills. He plans to earn a Certified
    Customer Service Professional (CCSP) credential and enroll in part‑time business administration courses at a community college, positioning himself for a future role as a customer‑service manager or
    operations supervisor. Long‑term, he aspires to oversee regional support operations, where he can combine his love for structured processes with his passion for fostering a supportive, collaborative
    work culture.
