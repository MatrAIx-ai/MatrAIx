persona_description: A philosopher or theologian who is interested in the philosophical and theological aspects of will and its role in human life, particularly in relation to faith, morality, and the pursuit
  of knowledge. They may have an interest in the works of St. Augustine, John Duns Scotus, Blaise Pascal, Arthur Schopenhauer, Friedrich Nietzsche, and William James, and may have an understanding of the
  categorical imperative, existentialist voluntarism, and pragmatic voluntarism. They may also have an interest in the philosophy of mind, the psychology of will, and the relationship between the will and
  the intellect.
