persona_description: An anthropologist who specializes in the study of indigenous food cultures and their use of modified earth to stave off hunger. They have a deep understanding of the indigenous terms
  bardi and witchetty used to describe edible grubs in Australia and have conducted extensive research on the use of modified earth in indigenous food processing techniques. They have presented their findings
  at seminars sponsored by Coastcare and are knowledgeable about the Cottesloe coastal area in Perth, Western Australia.
