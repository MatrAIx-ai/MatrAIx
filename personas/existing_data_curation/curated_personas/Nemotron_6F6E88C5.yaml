personas:
  professional: Robert Rogers is a diligent high‑school sophomore who channels his love for structure into midfield soccer, precise model‑airplane construction, and reliable animal‑shelter volunteering,
    and they view these activities as stepping stones toward a future in veterinary care.
  sports: Robert Rogers plays midfield for the Bartlesville Youth Soccer Club, hits the trails of Osage County for weekend hikes, and regularly cheers on the Oklahoma City Thunder and Tulsa Roughnecks while
    following a disciplined weekly training schedule that blends team practices with solo cardio runs, and they thrive on the balance of team strategy and personal endurance.
  arts: Robert Rogers spends his free evenings listening to The Avett Brothers and Mumford & Sons, devouring science‑fiction novels such as The Expanse series, and watching indie films by Greta Gerwig,
    which together fuel his imagination and inspire his meticulous model‑airplane designs, and they often share these passions with friends at school.
  travel: Robert Rogers prefers well‑planned road trips with his soccer teammates, having recently explored the Wichita Mountains Wildlife Refuge and the historic streets of Eureka Springs, while dreaming
    of a solo backpacking adventure through Iceland's glaciers and Japan's cherry‑blossom festivals, and they balance excitement with a careful budgeting approach to make each journey possible.
  culinary: Robert Rogers enjoys hearty Oklahoma BBQ, especially smoked brisket with a tangy apple‑cider glaze, cooks simple pasta carbonara and grilled chicken skewers at home, and often snacks on trail‑mix
    made of almonds, dried cranberries, and dark chocolate while savoring a freshly brewed iced tea with lemon, and they take pride in perfecting the balance of flavors just as they do with model‑airplane
    precision.
  core: Robert Rogers is a structure‑loving teen who balances soccer teamwork with solitary model‑airplane craftsmanship, volunteers compassionately at an animal shelter, yet occasionally forgets to charge
    their phone during long hikes.
background:
  cultural: Robert grows up in a white, working‑class family in Bartlesville, Oklahoma, where Midwestern values of hard work, community involvement, and modesty are emphasized. His family participates regularly
    in church activities and the annual Osage County fair, fostering a sense of local tradition. The region’s history tied to the oil industry and the close‑knit nature of small‑town life shape his outlook,
    encouraging reliability, cooperation, and a practical approach to everyday challenges.
attributes:
  skills: '["Basic computer troubleshooting", "Bike and small‑item repair", "Time management", "Peer mediation", "Team collaboration"]'
  hobbies: '["Soccer", "Model airplane building", "Volunteering at the animal shelter", "Reading science‑fiction novels", "Hiking in Osage County"]'
  career_goals: Robert aims to finish high school with a solid GPA and then attend a technical college to become an emergency medical technician (EMT) or firefighter. He is drawn to these fields because
    they let him help others directly and provide a clear, structured career path. He also dreams of one day leading community health outreach programs in Bartlesville, combining his practical skills with
    his desire to maintain harmony and support his neighbors.
