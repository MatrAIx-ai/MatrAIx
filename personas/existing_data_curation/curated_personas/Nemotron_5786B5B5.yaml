  career_goals: Jung Joon aims to deepen his software development skills with a focus on artificial intelligence and robotics, eventually pursuing a degree in computer science at a top university such as
    Stanford or UC Berkeley. He envisions a career as a software engineer or robotics engineer where he can apply his problem‑solving abilities to create reliable, structured solutions. He also hopes to
    participate in competitive programming contests and, if possible, work on video‑game design projects that blend his strategic gaming experience with technical expertise.
