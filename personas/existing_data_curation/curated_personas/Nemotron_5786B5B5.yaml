personas:
  professional: Jung Kim, a budding robotics enthusiast, leverages strategic thinking from StarCraft, Civilization, and chess to design and program competition‑ready robots, all while adhering to a meticulously
    structured schedule that satisfies their competitive drive.
  sports: Jung Kim follows the Seattle Kraken with avid enthusiasm, shoots hoops on the Northgate Middle School basketball team after school, and occasionally joins neighborhood pickup soccer games, yet
    prefers the strategic pacing of e‑sports like Overwatch over the physical exertion of traditional sports.
  arts: Jung Kim crafts 8‑bit pixel art inspired by classic titles like Super Mario Bros., streams K‑pop hits from BTS and BLACKPINK while sketching, and spends weekends dissecting the visual storytelling
    of Studio Ghibli’s My Neighbor Totoro, which fuels their creative outlet beyond the competitive realm of gaming.
  travel: Jung Kim enjoys meticulously planning family trips—having explored Tokyo’s Akihabara district and hiked the Grand Canyon—while dreaming of a solo adventure to the historic streets of Prague, balancing
    a love for discovery with the budget limits of a teenager’s allowance.
  culinary: Jung Kim whips up spicy pork bulgogi and kimchi fried rice with a dash of gochujang on weekends, skillfully chops vegetables for homemade pajeon, but often forgets to clean the kitchen promptly,
    leaving a lingering aroma of fried garlic that nudges their parents for a tidier workspace.
  core: Jung Kim is a strategy‑obsessed teen who thrives on structured game plans, wrestles with constant worry, channels competitive energy into robotics, and fuels creativity through pixel art and K‑pop.
background:
  cultural: Jung Joon is a second‑generation Korean‑American whose family maintains strong ties to Korean cultural traditions. At home, Korean is spoken alongside English, and he observes holidays such
    as Seollal and Chuseok with his family, including traditional foods and rituals. He participates in community events at the local Korean church and visits Korean grocery stores in the Bay Area for familiar
    ingredients. His upbringing emphasizes academic achievement and respect for elders, which influences his disciplined approach to studies and extracurricular activities. While he embraces American school
    life, he also takes pride in his heritage, often sharing Korean customs with friends.
