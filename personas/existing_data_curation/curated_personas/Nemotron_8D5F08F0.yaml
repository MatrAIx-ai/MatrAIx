  hobbies: '[''Reading historical fiction'', ''Balcony gardening'', ''Cooking Caribbean cuisine'', ''Hosting family and church gatherings'', ''Weekly book club participation'', ''Gospel choir singing'',
    ''Walking in local parks'', ''Yoga practice'', ''Jigsaw puzzles'']'
  career_goals: Approaching retirement, Joann aims to transition from full‑time clinical practice to a leadership role that amplifies her impact on community health. She plans to spearhead a neighborhood
    health‑promotion program in Corona that focuses on preventive screenings and chronic disease education for underserved Black and Caribbean residents. Additionally, she aspires to mentor the next generation
    of nurse practitioners through a formal preceptorship program, publish case studies on culturally tailored interventions, and serve on local health policy advisory boards to advocate for equitable access
    to care. Her competitive nature fuels a desire to be recognized as a champion for health equity within Queens County.
