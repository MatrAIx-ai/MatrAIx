personas:
  professional: Joann Pack, a board‑certified Nurse Practitioner with over three decades of primary and geriatric care experience, leverages meticulous organization, a competitive drive, and culturally
    resonant health education to streamline clinic workflow, mentor junior clinicians, and spearhead community health‑equity initiatives as they prepare for a leadership role in Corona.
  sports: Joann Pack stays active by walking the Queens Botanical Garden and the nearby parks with their husband, participating in weekly senior tennis sessions at the Queens Senior Fitness Club, and cheering
    for the New York Mets and New York Knicks during the baseball and basketball seasons.
  arts: Joann Pack immerses themselves in historical fiction by authors such as Maya Angelou and Colson Whitehead, performs in their church’s gospel choir covering legends like Nina Simone, and frequents
    community theater screenings of works by playwrights like August Wilson, allowing artistic storytelling to reinforce their commitment to cultural heritage and community resilience.
  travel: Joann Pack prefers meticulously planned trips that blend relaxation and cultural discovery, often visiting island destinations like Barbados and St. Lucia to revisit culinary roots, while they
    also explore nearby destinations such as the Hudson Valley’s vineyards and the historic streets of Philadelphia with their husband, balancing travel costs against family budgeting.
  culinary: Joann Pack, an adept home chef, regularly prepares jerk chicken marinated in scotch bonnet pepper, callaloo simmered with coconut milk, and plantain fufu, pairing these dishes with fresh mango
    salsa, and they enjoy hosting intimate dinner gatherings where they experiment with modern twists on traditional island flavors.
  core: Joann Pack blends razor‑sharp organization with a competitive spirit, a skeptical edge that drives their health‑equity advocacy, a penchant for solving crossword puzzles while tending their balcony
    garden, and an occasional indulgence in late‑night spice‑laden cooking.
background:
  cultural: Joann identifies as a Black American with deep roots in Caribbean culture, tracing her family lineage to Jamaica and Trinidad. Growing up in Queens, she was immersed in a vibrant multicultural
    environment that valued community solidarity, church involvement, and intergenerational storytelling. Her cultural heritage informs her clinical practice through a strong emphasis on holistic care,
    respect for familial decision‑making, and the use of culturally resonant health education materials. She is active in her local African‑American church, where she leads health‑awareness workshops and
    mentors youth. Joann's experiences navigating both the challenges of systemic healthcare disparities and the strengths of her tight‑knit community shape her commitment to health equity and cultural
    competence.
