personas:
  professional: Catherine Klein, a budding naturalist and LEGO architect, channels curiosity and practical organization into building detailed animal habitats with LEGO bricks, documenting each creation
    in a notebook and collaborating quietly with friends on class projects.
  sports: Catherine Klein, a member of the neighborhood's junior soccer clinic and a fan of the local minor‑league baseball team the River City Rockets, enjoys weekly bike rides in the park, occasional
    playground climbing, and balances active play with calm nature walks, showing a low‑pressure yet consistent approach to staying fit.
  arts: Catherine Klein, who spends afternoons drawing detailed animal sketches inspired by the works of illustrator Eric Carle and listening to cello pieces by Yo‑Yo Ma while humming tunes from the movie
    soundtrack of 'Moana', often shares homemade art with classmates and eagerly attends the local children's theater for performances of 'Peter Pan', illustrating a deep, gentle immersion in visual and
    musical arts.
  travel: Catherine Klein, who prefers short, family‑focused trips to nearby nature spots like Willow Creek State Park and occasional weekend visits to the city aquarium, enjoys planning scavenger‑hunt
    itineraries with a parent, dreams of exploring Yellowstone National Park’s geysers, yet finds long flights overwhelming, highlighting a cautious yet curious travel spirit.
  culinary: Catherine Klein, an enthusiastic junior chef who loves assembling peanut‑butter‑and‑jelly sandwiches, decorating sugar cookies with rainbow sprinkles and chocolate chips, and experimenting with
    crunchy carrot sticks and apple slices, often helps in the kitchen by measuring ingredients with a plastic scale and proudly presents her creations at family dinner, reflecting a playful yet methodical
    culinary curiosity.
  core: Catherine Klein is a quietly curious 8‑year‑old who balances meticulous LEGO building and garden care with a habit of losing socks in the backyard, always humming a tune while sorting rocks, embodying
    a sweet mix of organization, cooperation, and endearing absent‑mindedness.
background:
  cultural: 'Catherine is raised in a white, Texas‑American family in Manor, Bastrop County. Her upbringing reflects suburban Southern values: strong family ties, participation in her local church''s Sunday
    school, and community events like neighborhood picnics and holiday parades. She enjoys classic Texas traditions such as backyard barbecues (often helping with side dishes), visiting local farmers''
    markets, and spending weekends at nearby parks or lakes for fishing and nature hikes. Her family emphasizes kindness, cooperation, and respect for others, which aligns with her personal focus on harmony
    and helping those around her.'
