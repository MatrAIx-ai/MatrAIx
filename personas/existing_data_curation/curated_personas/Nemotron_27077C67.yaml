  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''LEGO building'', ''Simple science experiments'', ''Pet care'', ''Drawing and sketching'', ''Piano playing'', ''Organizational tasks'']'
  hobbies: '[''Reading picture books and early chapter novels'', ''Nature walks and bug/rock collecting'', ''LEGO building'', ''Sketching animals and landscapes'', ''Playing piano'', ''Gardening assistance'',
    ''Pet care'', ''Simple cooking/baking with family'', ''Small‑group board games'']'
  career_goals: Catherine dreams of a future where she can combine her love for animals, nature, and helping others. She often talks about becoming a veterinarian to care for sick pets, a wildlife biologist
    to explore the outdoors, or a teacher to share knowledge with younger children. She also imagines volunteering for community clean‑up projects and hopes to grow into a role that lets her use her practical
    skills while staying close to the small, supportive environment she values.
