  hobbies: '["Watercolor painting", "Landscape photography", "Reading contemporary fiction", "Journaling", "Birdwatching", "Hiking in Minnesota state parks", "Yoga and meditation", "Knitting", "DIY vintage
    furniture restoration", "Volunteer art teaching at community center"]'
  career_goals: Tracy aspires to achieve NATE Master Technician status within the next three years, positioning herself as a technical leader in her company. She hopes to guide a small team of apprentices,
    particularly encouraging more women to enter the trades. Long‑term, she envisions launching her own boutique HVAC business focused on sustainable, low‑carbon solutions for Minnesota homes, integrating
    solar‑assisted heating and advanced indoor‑air‑quality controls. She also aims to mentor local vocational students and contribute to community workshops on home energy conservation.
