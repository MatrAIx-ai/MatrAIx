  career_goals: Gwendolyn aims to earn her GED within the next year and then enroll in a certified nursing assistant (CNA) program at a nearby community college. She is drawn to the stability, structured
    training, and the opportunity to provide direct care to members of her community. Long‑term, she hopes to become a registered nurse and eventually a health educator, using her practical skills and compassionate
    nature to improve health outcomes in Shelbyville. She also plans to pursue scholarships for vocational training to reduce financial barriers for herself and her family.
