personas:
  professional: An experienced retired data scientist and community mentor, Lan Yu leverages their mastery of statistical modeling, Python, and MATLAB, and they channel this expertise into designing low‑cost
    coding workshops for seniors while flexibly juggling volunteer schedules, often preferring spontaneous brainstorming sessions over strict agendas.
  sports: An enthusiastic participant in senior dance classes and tai chi, Lan Yu also follows the local community basketball league and is an avid fan of the national women's soccer team, and they regularly
    walk the nearby river trail to stay active.
  arts: Capturing everyday moments with a vintage film camera, Lan Yu draws inspiration from photographers like Dorothea Lange and enjoys reading historical fiction by Hilary Mantel while attending local
    cultural festivals featuring traditional drumming performances, and they often experiment with watercolor sketches during quiet evenings.
  travel: Eager for group adventures, Lan Yu has explored the historic streets of Kyoto, the vineyards of Tuscany, and the scenic Canadian Rockies, and they are planning a future itinerary that includes
    the Scottish Highlands and the coastal towns of New Zealand, always budgeting for discounted senior travel packages.
  culinary: An avid learner in Asian cooking classes, Lan Yu delights in preparing dishes such as mapo tofu, ramen broth, and sushi rolls using fresh ginger, miso, and tofu, and they also enjoy baking an
    apple crumble for community potlucks, balancing experimental flavors with familiar comforts.
  core: Lan Yu blends a lifelong curiosity for data with an outgoing, flexible spirit, turning seasoned analytical skills into community‑focused mentorship while staying socially active, health‑conscious,
    and delightfully adventurous in food, art, and travel.
background:
  cultural: Lan Eunyoung Yu is a second‑generation Korean‑Chinese American who grew up in a bilingual household in Southern California. Her parents immigrated from South Korea and Taiwan, instilling a deep
    respect for family, education, and communal responsibility. She celebrated traditional holidays such as Chuseok, Lunar New Year, and Mid‑Autumn Festival while also embracing the multicultural vibrancy
    of Irvine's Asian diaspora. This dual heritage shapes her values—balancing the practical, disciplined approach of her East Asian upbringing with the openness and flexibility of her American environment—allowing
    her to navigate and bridge both cultural worlds with ease.
