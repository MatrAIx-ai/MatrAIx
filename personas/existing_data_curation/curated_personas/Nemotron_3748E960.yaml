  career_goals: Although retired from formal employment, Lan aims to channel her professional experience into community impact. She plans to mentor young women entering STEM fields, volunteer as a science‑outreach
    coordinator for nearby schools and museums, and serve on the advisory board of a nonprofit focused on tech education for under‑served groups. Additionally, she hopes to develop a low‑cost coding workshop
    series for seniors, author a reflective memoir about her journey as an East‑Asian female engineer, and continue learning through online courses that blend emerging technologies with tried‑and‑true problem‑solving
    methods.
