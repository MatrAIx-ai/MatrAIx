  career_goals: John aims to transition his current position into ownership of a boutique dental practice that emphasizes preventive care and uses tele‑dentistry to reach underserved residents of Howard
    County. He plans to earn board certification in prosthodontics within the next three years, expand his implant dentistry services, and develop a mentorship program for recent dental graduates. Reducing
    personal stress is a priority, so he intends to streamline office workflows through evidence‑based protocols and introduce staff wellness initiatives. Long‑term, he hopes to collaborate with local health
    agencies on community oral‑health outreach and oral‑cancer screening programs.
