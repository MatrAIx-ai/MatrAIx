personas:
  professional: John Parrilla, a 38-year-old dentist, blends precise restorative and implant expertise with a rigorously structured practice workflow, leveraging digital CAD/CAM and evidence‑based protocols
    while their cooperative nature fosters a harmonious team and their underlying worry drives meticulous quality checks on every case.
  sports: John Parrilla, a 38-year-old dentist, enjoys early‑morning fishing as low‑impact cardio, hikes the sandhills on weekends, runs with the Howard County Trail Runners club for 5K runs, practices
    yoga three times a week for flexibility, and avidly follows the Baltimore Ravens (NFL) and Baltimore Orioles (MLB) while occasionally joining a local recreational volleyball league.
  arts: John Parrilla, a 38-year-old dentist, channels creative energy into woodworking and regularly visits the local art museum to admire Andrew Wyeth’s realism, finds solace in listening to Led Zeppelin
    and Gillian Welch, and unwinds by watching indie films starring Frances McDormand.
  travel: John Parrilla, a 38-year-old dentist, prefers meticulously planned weekend road trips to historic sites like Gettysburg, PA, and the Shenandoah Valley for hiking, saves for an annual culinary
    tour of the Great Lakes region, and occasionally indulges in spontaneous getaways to the Caribbean, balancing a tight family budget with a desire for new experiences.
  culinary: John Parrilla, a 38-year-old dentist, delights in grilling seasonal produce such as heirloom tomatoes, sweet corn, and zucchini with rosemary and smoked paprika, often prepares Midwestern staples
    like chicken‑fried steak and baked macaroni‑and‑cheese, and has recently honed his skill at smoking trout on an outdoor smoker.
  core: John Parrilla, a 38-year-old dentist, balances a hyper‑organized professional life with solitary fishing, meticulous budgeting, occasional anxiety‑driven worry, and a relentless quest to perfect
    his handcrafted coffee tables.
background:
  cultural: John grew up in a small Midwestern town in Nebraska within a white, primarily European‑American family with German and Irish roots. The community emphasized self‑reliance, hard work, and neighborly
    support—values that continue to shape his professional ethic and his desire to give back through volunteer health services. He identifies with the straightforward, pragmatic culture of the rural Great
    Plains, where seasonal rhythms and community events create a balance of predictability and social connection.
