personas:
  professional: James Hansen is a budding aerospace enthusiast who spends his afternoons building and programming Arduino‑controlled model rockets, applying his meticulous curiosity and pragmatic problem‑solving
    to troubleshoot launch failures, while his organized yet flexible approach lets him juggle schoolwork and robotics club commitments.
  sports: James Hansen enjoys hiking the wooded trails around Star City with the local Youth Hiking Club and fishing at nearby ponds on weekends, cheering for the Seattle Seahawks and following the Seattle
    Sounders on TV, while occasionally joining the middle‑school cross‑country team to stay fit for their outdoor adventures.
  arts: James Hansen indulges in sketching mechanical designs inspired by H.R. Giger and sci‑fi illustrators, devouring novels by Isaac Asimov and listening to Hans Zimmer’s cinematic scores while drawing,
    and they regularly binge‑watch the series “The Expanse” and attend the community science‑fiction film night at the town library.
  travel: James Hansen prefers carefully planned weekend camping trips to places like Mount Rainier and the Pacific coast, loves exploring the interactive exhibits at the Seattle Museum of Flight, and dreams
    of a school‑organized field trip to the Kennedy Space Center, while keeping a scrapbook of postcards from a family vacation to Vancouver.
  culinary: James Hansen favors simple yet hearty meals such as grilled salmon they caught themselves, spaghetti with homemade tomato sauce, and cheesy pizza, enjoys experimenting with trail‑mix snacks
    featuring dried apricots and almonds, but often forgets to season the fish properly when distracted by tinkering with a new Arduino project.
  core: James Hansen is a curious, organized teen who balances rocket building with strategic gaming, saves diligently for tech gear, manages allergies with routine care, hikes with a quiet confidence,
    sketches sci‑fi art, plans modest outdoor trips, and cooks simple meals, all while occasionally staying up late to perfect a code.
background:
  cultural: 'James is a White American growing up in Star City, a small, close‑knit community in White County, Indiana. The town reflects classic Midwestern values: a strong emphasis on self‑reliance, modesty,
    and community involvement. His family likely works in local manufacturing or farming, reinforcing a practical work ethic and an appreciation for hands‑on skills. Community traditions such as county
    fairs, high‑school sports events, and church gatherings shape his social experiences, while the widespread availability of high‑speed internet gives him access to modern technology and a broader cultural
    landscape. This blend of rural practicality and contemporary connectivity supports James’s balanced curiosity and his desire to apply new ideas in tangible ways.'
