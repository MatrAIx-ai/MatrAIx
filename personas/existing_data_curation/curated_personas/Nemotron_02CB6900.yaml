personas:
  professional: Patricia Pascoli, an aspiring wildlife illustrator, merges her love for Appalachian landscapes with a disciplined sketching routine, channeling her curiosity and organization into detailed
    field studies that she hopes to turn into a future career illustrating nature books.
  sports: Patricia Pascoli embraces the outdoors through high‑school cross‑country runs and a youth hiking club on Appalachian trails, while cheering for the West Virginia Mountaineers football team and
    the Pittsburgh Steelers, blending personal fitness with regional sports fandom.
  arts: Patricia Pascoli immerses herself in folk and indie sounds from Bob Dylan, The Avett Brothers, and Bon Iver while sketching, and draws inspiration from graphic novels like Sandman and Saga, all
    of which shape her mixed‑media collages and journal crafts.
  travel: Patricia Pascoli prefers weekend escapes to Shenandoah National Park and the Great Smoky Mountains for sketching and wildlife photography, while dreaming of a future backpacking adventure through
    New Zealand's Fiordland and Iceland's volcanic landscapes.
  culinary: Patricia Pascoli enjoys cooking simple comfort foods such as apple‑cinnamon pancakes, corn chowder, and homemade berry jam, often experimenting with fresh Appalachian foraged herbs like sorrel
    and sage to flavor her dishes.
  core: Patricia Pascoli blends a boundless curiosity for nature with meticulous artistic habits, yet occasionally sacrifices sleep and meals for the perfect sketch, embodying a passionate yet imperfect
    teen artist.
background:
  cultural: Patricia grew up in Dunlow, a small community in Wayne County, West Virginia, where Appalachian values of community support, storytelling, and reverence for the natural environment are deeply
    embedded. Her family lineage includes Italian immigrant ancestors who arrived in the early 1900s to work in the coal mines; this heritage surfaces in family traditions such as cooking pasta dishes,
    celebrating Italian holidays, and sharing stories of the old country. The blend of Appalachian and Italian cultural influences has fostered a household that values hard work, close‑knit family ties,
    and a love for both folk music and the expressive arts. The local church and school serve as communal hubs, reinforcing a sense of belonging and mutual aid. Patricia’s exposure to the region’s scenic
    mountains and rivers nurtures her appreciation for nature, while her access to online art resources broadens her perspective, encouraging unconventional thinking and a curiosity that extends beyond
    the immediate community.
