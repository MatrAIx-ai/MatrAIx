  career_goals: Patricia aspires to finish high school and pursue a degree in art therapy or social work at a community college. She hopes to combine her love of visual arts with her drive to help others
    by becoming a community arts facilitator, creating programs that bring creative expression to youth in rural West Virginia. Long‑term, she envisions establishing a youth art and wellness center that
    offers classes, mentorship, and therapeutic workshops, and she is also interested in learning more about environmental education to integrate nature‑based art projects into her community work.
