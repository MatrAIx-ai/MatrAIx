persona_description: A historian who specializes in the study of American Indian conflicts, particularly the Seminole Wars. He or she is interested in the detailed accounts of military campaigns, tactics,
  and the impact of these conflicts on the Seminole people and the United States. The historian has a keen interest in understanding the duplicity of the U.S. government's tactics and how they affected
  Indian-white relations. The historian is also interested in the broader context of these conflicts, including the historical and cultural significance of the Seminole people and their role in American
  history.
