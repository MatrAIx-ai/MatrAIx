personas:
  professional: Nicholas Mcmullan, a retired carpenter and amateur art historian, leverages his woodworking mastery, deep knowledge of 20th‑century American art, and relaxed, adaptable nature to spearhead
    community legacy projects—curating traveling exhibitions, mentoring youth in art‑history discussions, and penning a memoir that weaves personal narrative with cultural reflection.
  sports: Nicholas Mcmullan stays fit through leisurely hikes on the nearby forest trails, participates in a senior walking club that meets on Saturday mornings, and occasionally cheers for the Portland
    Timbers at the stadium, preferring low‑impact activity over competitive sports.
  arts: Nicholas Mcmullan immerses himself in the visual arts by frequenting Portland galleries showcasing works by Edward Hopper, Georgia O'Keeffe, and local Oregon painter James H. Gifford, while his
    evenings occasionally feature live‑music sets by folk guitarist Laura Gibson, and his own watercolor landscapes and hand‑carved wooden sculptures reflect a reverence for both classic and contemporary
    expressions.
  travel: Nicholas Mcmullan favors thoughtfully planned road trips that blend serene nature stops—such as Crater Lake and the Columbia River Gorge—with visits to cultural sites like the Smithsonian American
    Art Museum in Washington, D.C., and while his budget and health limit overseas journeys, he dreams of exploring the historic gardens of the Scottish Highlands.
  culinary: Nicholas Mcmullan, a competent home cook, delights in preparing garden‑fresh dishes like rosemary‑infused roasted carrots, mushroom barley soup, and a classic Oregon hazelnut pie, often pairing
    meals with a cup of Earl Grey tea and occasionally experimenting with delicate watercolor‑inspired plating.
  core: Nicholas Mcmullan is a curious, solitary curator who transforms his backyard garden and workshop into a living museum, balancing a penchant for spontaneous art projects with a habit of misplacing
    receipts and a soft spot for late‑night crossword puzzles.
background:
  cultural: Nicholas was raised in a middle‑class white family in the Pacific Northwest, with roots tracing back to Irish and German immigrants who settled in Oregon in the early 20th century. The region’s
    emphasis on self‑reliance, appreciation for nature, and vibrant arts scene shaped his worldview. He values the community‑oriented culture of Sherwood, participates in local volunteer initiatives, and
    feels a strong connection to the outdoor lifestyle and eclectic artistic expressions characteristic of the Oregon coast and the Portland art community.
