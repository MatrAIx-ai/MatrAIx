  hobbies: '["Reading classic literature and poetry", "Backyard gardening", "Hiking forest trails", "Visiting galleries and museums", "Watercolor painting", "Wood carving", "Small book club", "Crossword
    puzzles", "Attending small live‑music performances"]'
  career_goals: Though retired, Nicholas aims to channel his lifelong curiosity into legacy projects. He aspires to compile and publish a memoir that weaves together his experiences with reflections on
    art and community, to mentor local youth through a weekly art‑history discussion group at the community center, and to curate a traveling exhibition of local artists' work for small towns across Oregon.
    He also hopes to complete a certification in museum studies to deepen his volunteer role at the Portland Art Museum.
