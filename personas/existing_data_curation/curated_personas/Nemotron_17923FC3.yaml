personas:
  professional: Wesley Duff, a veteran IT support specialist with three decades of hands‑on experience diagnosing and repairing PCs, laptops and network peripherals, excels at crafting step‑by‑step documentation,
    mentoring junior technicians, and translating technical jargon into layperson language; now approaching retirement, they aim to shift to a part‑time consultancy for small businesses and local nonprofits
    while earning a CompTIA Security+ certification and volunteering as a technical liaison for community art events, all grounded in their methodical, organized approach and curiosity for unconventional
    solutions.
  sports: Wesley Duff enjoys low‑key athletic pursuits such as weekend river fishing on the Cedar River, membership in a local senior walking club that meets thrice weekly, and playing pickleball at the
    community center, while they are an avid fan of the Chicago Cubs, Chicago Bears and Chicago Blackhawks, often watching games on the big screen at the Bradford Arte Center's community lounge.
  arts: Wesley Duff frequently visits the Bradford Arte Center and the Aurora Theatre Company, finding inspiration in unconventional plays like The Seagull and modern art installations; they practice black‑and‑white
    street and landscape photography using a Nikon D850, draw aesthetic cues from Ansel Adams and Edward Hopper, discuss science‑fiction classics such as Dune and Neuromancer in their community book club,
    and channel their design sensibility into handcrafted furniture that blends Scandinavian minimalism with functional practicality.
  travel: Wesley Duff prefers meticulously planned road trips that balance artistic enrichment with relaxed pacing, having explored the art districts of Santa Fe, the coastal cliffs of Big Sur, and the
    historic streets of Florence, Italy; they enjoy day trips to Starved Rock State Park for river photography, and they dream of attending the Kyoto International Manga Museum, all while traveling in a
    fuel‑efficient hybrid that accommodates their need for comfort and occasional health considerations.
  culinary: Wesley Duff’s culinary repertoire centers on garden‑fresh ingredients, often sautéing heirloom tomatoes and basil for a classic bruschetta, simmering a homemade marinara with oregano and garlic,
    and grilling river‑caught trout seasoned with lemon, dill and a pinch of smoked paprika; their cooking skill is intermediate, allowing them to experiment with dishes like ratatouille and coq au vin
    while still relying on simple, seasonal meals that soothe their worry‑prone mind.
  core: Wesley Duff blends a lifelong curiosity for art and technology with a methodical, slightly anxious personality, finding balance in photography, woodworking, gardening and a cautious approach to
    retirement and health.
background:
  cultural: Wesley grew up in the Midwest, rooted in a white American, small‑town upbringing in Illinois. His family emphasized hard work, self‑reliance, and community involvement, values reflected in the
    tight‑knit social fabric of Pekin, IL. He maintains a strong connection to local traditions such as county fairs, church gatherings, and volunteer initiatives that support neighborhood seniors and youth
    programs. While his cultural foundation is grounded in Midwestern modesty and practicality, his lifelong curiosity has opened him to broader artistic and intellectual pursuits, allowing him to blend
    traditional community values with a progressive, open‑minded outlook.
