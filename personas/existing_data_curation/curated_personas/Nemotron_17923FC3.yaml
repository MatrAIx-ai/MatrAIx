  career_goals: Approaching retirement, Wesley aims to transition from full‑time support to a part‑time consultancy role where he can share his expertise with small businesses and local nonprofits in the
    Pekin area. He hopes to earn a CompTIA Security+ certification to deepen his cybersecurity knowledge and to develop a structured mentorship program within his current organization, passing on his methodical
    troubleshooting approach to the next generation. Additionally, he envisions using his art appreciation to volunteer as a technical liaison for community art events, ensuring smooth digital presentations
    and live‑streaming services. Ultimately, his ambition is to balance meaningful work with reduced stress, securing a stable yet flexible schedule that allows more time for his personal interests.
