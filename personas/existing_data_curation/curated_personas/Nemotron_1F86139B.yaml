personas:
  professional: Wilfredo Santiago, an aspiring concept artist, fuses hand‑drawn sketches with digital tools like Krita and Procreate to craft sci‑fi heroes rooted in vivid storytelling, while they channel
    their relaxed, free‑form creative process into every commission and portfolio piece.
  sports: Wilfredo Santiago, a skateboarding enthusiast who practices ollies and kick‑flips at the local park, roots for the Los Angeles Lakers and Dodgers, and they join occasional weekend pickup basketball
    games, while keeping an eye on the city’s youth street‑ball league for fresh inspiration.
  arts: Wilfredo Santiago draws inspiration from the intricate geometry of M. C. Escher, the bold street‑art of Shepard Fairey, and the atmospheric world‑building of Yoji Shinkawa, and they frequently listen
    to lo‑fi beats by Nujabes and the psychedelic vibes of Tame Impala during late‑night drawing sessions.
  travel: Wilfredo Santiago favors spontaneous road trips to desert towns and coastal surf spots, has documented an overnight exploration of Joshua Tree’s abandoned ruins, and they dream of wandering the
    neon‑lit streets of Tokyo and the vibrant mural alleys of Valparaíso on future adventures.
  culinary: Wilfredo Santiago enjoys cooking tacos al pastor and tamales with their mother, mastering the balance of smoky chipotle, sweet pineapple, and masa dough, while they also experiment with ramen
    broth and avocado toast, often complementing meals with homemade horchata or fresh‑squeezed orange juice.
  core: Wilfredo Santiago is a restless dreamer who converts skate‑park energy into dynamic comic panels, swings between chaotic art bursts and disciplined study, and they occasionally let a half‑finished
    page linger while juggling school assignments and late‑night pizza cravings.
background:
  cultural: Wilfredo grew up in a bilingual Mexican-American household in Paramount, California, surrounded by a vibrant Latino community. His family celebrates traditions such as Día de los Muertos, quinceañeras,
    and Mexican Independence Day, and they speak both Spanish and English at home. The local street art scene, community festivals, and the fusion of Mexican heritage with Southern California urban culture
    heavily influence his artistic style and sense of identity. He feels a strong connection to his roots through family gatherings, traditional foods, and the shared cultural narratives of his neighborhood.
attributes:
  skills: '[''Digital illustration'', ''Hand drawing'', ''Basic graphic design'', ''Storytelling'', ''Creative writing'', ''Bilingual communication (Spanish/English)'', ''Video editing'', ''Street art techniques'',
    ''Skateboarding fundamentals'', ''Music composition'']'
  hobbies: '[''Drawing fantasy characters'', ''Digital comics'', ''Mixed-media collages'', ''Music listening and keyboard playing'', ''Skateboarding'', ''Urban exploration'', ''Cooking Mexican dishes'',
    ''Attending cultural festivals'']'
  career_goals: Wilfredo aims to transform his passion for visual storytelling into a career as a concept artist for video games or animated films. He plans to build a robust portfolio of digital illustrations
    and community murals that blend futuristic themes with Mexican cultural motifs. To achieve this, he hopes to enroll in a community-college art program or a specialized academy, secure mentorship with
    a local graffiti artist, and eventually freelance for indie game studios. He also dreams of launching a YouTube channel where he shares art tutorials, cultural art history, and behind-the-scenes looks
    at his mural projects, turning his creative output into a sustainable income.
