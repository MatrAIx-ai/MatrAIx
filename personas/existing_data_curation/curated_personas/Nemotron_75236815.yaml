  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical fiction'', ''Medical journal review'', ''Quilting'', ''Knitting'', ''Volunteering at food pantry'', ''Community health fair planning'', ''Photography
    of local landscapes'']'
  career_goals: Brandi aims to transition to a registered nurse role within the next two years by completing an RN‑to‑BSN program, leveraging her STEM background to specialize in community health nursing.
    She aspires to lead a rural health outreach program that improves chronic disease outcomes for older adults in Schuylkill County. Long‑term, she envisions a position as a clinical educator or patient‑safety
    officer, where she can blend her practical nursing experience with her passion for data‑driven care improvements, while maintaining a balanced work‑life schedule to support her family.
