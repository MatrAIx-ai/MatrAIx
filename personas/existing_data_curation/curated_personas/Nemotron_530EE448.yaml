personas:
  professional: Blanche Curtis, a budding young scientist, channels their curiosity and methodical nature into school science club experiments, where they love designing LEGO‑based prototypes and organizing
    data with the same reliable precision they bring to everyday tasks.
  sports: Blanche Curtis, a member of the neighborhood youth soccer team and an enthusiastic fan of the city’s professional baseball club, the Riverdale Rockets, splits weekends between organized drills
    at the community field, free‑play on the playground, and a weekly swimming lesson for cross‑training, balancing social interaction with their well‑planned schedule.
  arts: Blanche Curtis, an avid reader of adventure series like "The Magic Tree House" and a budding illustrator who sketches park landscapes after storytime, often draws inspiration from artists such as
    Mary Blair and delights in listening to John Williams’ orchestral scores while arranging their sticker collection, showcasing a kind and imaginative artistic spirit.
  travel: Blanche Curtis, who loves family road trips to nearby state parks like Pine Ridge and dreams of exploring the Grand Canyon someday, prefers journeys that blend adventure with structured itineraries,
    using colorful maps to plan each stop while balancing weekend visits to the city aquarium with quiet evenings journaling about the experience.
  culinary: Blanche Curtis, a kitchen helper who delights in assembling organized snack trays of apple slices, cheese cubes, and whole‑grain crackers, experiments with mini‑pizza toppings like pepperoni
    and pineapple, and proudly bakes blueberry muffins under parental supervision, showcasing a practical yet curious approach to food.
  core: Blanche Curtis is a meticulously curious seven‑year‑old whose love for organized LEGO creations, methodical science experiments, and gentle kindness makes every day a blend of adventure and careful
    planning, even though they sometimes get distracted by a messy art project or an unplanned splurge on stickers.
background:
  cultural: Blanche was raised in Grafton, Massachusetts, a small New England town with a strong sense of community and traditional American values. Her family celebrates holidays such as Thanksgiving,
    Fourth of July, and Christmas with communal gatherings and seasonal activities. She participates in local events like the town’s summer fair, library reading programs, and neighborhood clean‑up days,
    reflecting a cultural upbringing that emphasizes kindness, cooperation, and practical involvement in community life.
