  communication. This person is also interested in the development of new standards and technologies, such as IEEE 802.22 and the White Spaces Coalition. This person is likely to be interested in the potential
  for white space spectrum to provide unique mobile broadband coverage for all Americans and to promote the use of Android open source mobile platform.
