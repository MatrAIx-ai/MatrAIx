personas:
  professional: Theresa Lucenti, a seasoned carpenter with four decades of residential construction experience, excels at framing, finish carpentry, and historic home restoration while methodically pursuing
    Master Carpenter certification and drafting a guidebook that blends traditional Southern woodworking techniques with modern eco‑friendly practices.
  sports: Theresa Lucenti follows the Nashville Predators and the Tennessee Titans with loyal enthusiasm, participates in a local senior softball league, and maintains personal fitness through morning garden
    walks and weekly stretching routines that keep her agile for woodworking projects.
  arts: Theresa Lucenti enjoys the plaintive sounds of bluegrass legend Bill Monroe and classic country icons like Patsy Cline while knitting intricate quilts inspired by Appalachian patterns, reading historical
    fiction by authors such as William Faulkner, and finding artistic inspiration in the craftsmanship of local folk art festivals.
  travel: Theresa Lucenti favors road‑trip adventures to historic towns like Charleston, South Carolina, and the Blue Ridge Parkway for scenic inspiration, dreams of a guided tour of Florence’s Renaissance
    workshops, yet plans trips within a modest budget that balances her love of craftsmanship with her family responsibilities.
  culinary: Theresa Lucenti delights in preparing Southern comfort foods such as shrimp and grits, collard greens simmered with smoked ham hocks, and heirloom tomato salads, compliments her dishes with
    fresh basil from her garden, and occasionally crafts a simple pasta sauce that echoes a family recipe she inherited.
  core: Theresa Lucenti is a meticulous master carpenter with a green thumb and a quietly competitive spirit, channeling decades of hands‑on experience into historic preservation, eco‑friendly renovations,
    and a legacy of craftsmanship for future generations.
background:
  cultural: Theresa was born and raised in Shelbyville, Tennessee, growing up in a close‑knit white Southern community that values self‑reliance, family, and church participation. Her family’s surname reflects
    an Italian ancestry that appears in occasional family recipes, yet her cultural identity is rooted in Southern traditions—Sunday church, southern hospitality, and a deep respect for local craftsmanship.
    The regional Appalachian influence has shaped her appreciation for woodwork and preservation of historic homes, while her upbringing instilled a pragmatic work ethic and a competitive drive to excel
    in a traditionally male‑dominated trade.
attributes:
