  hobbies: '[''Gardening'',''Woodworking hobby projects'',''Reading historical fiction'',''Knitting and quilting'',''Listening to bluegrass music'',''Crossword puzzles'',''Church volunteer carpentry workshops'',''Birdwatching'']'
  career_goals: Theresa aims to earn the Master Carpenter certification from the Tennessee Builders Association within the next two years and to publish a guidebook on traditional Southern woodworking techniques
    for hobbyists. She hopes to expand her small business to offer eco‑friendly renovation services, mentor a new generation of carpenters—especially women—and be recognized by the local heritage preservation
    society for her work on historic homes. As retirement approaches, she plans to secure a modest legacy fund for her grandchildren while continuing selective custom projects that challenge her skills.
