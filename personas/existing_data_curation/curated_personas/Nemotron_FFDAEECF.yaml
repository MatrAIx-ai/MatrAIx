  career_goals: Although retired, Frank’s primary ambition is to stay self‑sufficient and mentally sharp. He aims to complete a series of custom wooden furniture pieces for his grandchildren, document the
    oral histories of longtime Sedalia residents in a memoir, and occasionally mentor a local “hands‑on” youth program on basic tool use. He also aspires to maintain a healthy lifestyle to avoid the health
    worries that often occupy his thoughts.
