persona_description: A veterinarian who specializes in the diagnosis and treatment of acute hemorrhagic diarrhea syndrome (AHDS) in dogs, particularly in small breed dogs and those with stress and hyperactivity
  as predisposing factors. The veterinarian is skilled in the use of the packed cell volume (PCV) test to diagnose AHDS and has a keen eye for the symptoms, including elevated PCV of 57% or more, relatively
  low total protein, and a watery, very bloody diarrhea that looks almost like pure blood. The veterinarian is also knowledgeable about the unknown factors that may cause AHDS, such as infection from an
  intestinal bacterium called Clostridium perfringens Type A, and has a thorough understanding of the treatment options for this condition.
