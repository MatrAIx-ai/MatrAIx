personas:
  professional: Ana Corderogomez, a veteran educational guidance counselor with over four decades of experience, blends meticulous program design, bilingual communication, and data-driven outcome analysis
    to construct mentorship pipelines that bridge students from immigrant backgrounds with higher‑education pathways, while navigating education policy and grant writing with a practical, organized yet
    energetic and cooperative demeanor.
  sports: Ana Corderogomez enjoys low‑impact fitness through daily walks along the National Mall, avidly follows the Washington Capitals in the winter and DC United during the soccer season, and participates
    in a senior fitness league for gentle aerobic classes at the local community center.
  arts: Ana Corderogomez’s artistic pursuits include dancing cumbia and salsa at community festivals, immersing themselves in the music of Celia Cruz, Juan Luis Guerra, and Marc Anthony, and savoring historical
    fiction by authors such as Isabel Allende and Arturo Pérez‑Reverte, all of which enrich their cultural appreciation and leisure time.
  travel: Ana Corderogomez’s travel style blends purposeful cultural exploration with comfortable pacing; they have toured historic sites in Washington DC, completed a scenic road trip through the Great
    Smoky Mountains, enjoyed a culinary retreat in Oaxaca, and plan a modest cruise along the Caribbean islands, favoring organized group travel that accommodates their structured outlook.
  culinary: Ana Corderogomez cooks with both precision and passion, preparing homemade pupusas stuffed with cheese and seasoned pork, hand‑rolled tamales wrapped in banana leaves, and hearty sopa de pata
    simmered with beef feet, fresh herbs, and hominy, then sharing generous bowls of these dishes at family gatherings and community events.
  core: Ana Corderogomez expertly merges structured, data‑driven advocacy for immigrant youth with a vibrant love of dance, cooking, and community, navigating retirement with disciplined budgeting and generous
    generosity.
background:
  cultural: Born in San Salvador, Ana immigrated to the United States in her early twenties and has lived in the Washington, DC area for decades. She maintains strong connections to her Salvadoran heritage
    through family traditions, cuisine, music, and religious observances rooted in Catholicism. Active in the local Salvadoran American community, she participates in cultural events, supports bilingual
    education initiatives, and helps preserve language and customs for her grandchildren. Her bicultural identity informs her counseling practice, allowing her to combine Salvadoran values of family solidarity,
    resilience, and respect for elders with the emphasis on individual achievement and civic engagement that she sees in American society.
