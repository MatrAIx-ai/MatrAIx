  hobbies: '[''Cooking Salvadoran cuisine'', ''Dancing (cumbia, salsa)'', ''Gardening (herbs and vegetables)'', ''Reading historical fiction and memoirs'', ''Volunteering at community centers'', ''Participating
    in Spanish-language book clubs'', ''Walking and exploring Washington, DC landmarks'', ''Attending cultural festivals and parades'', ''Knitting and crocheting for charity'']'
  career_goals: Ana aims to establish a comprehensive mentorship pipeline that connects Salvadoran and broader Latinx youth in Washington, DC with higher‑education opportunities, increasing college enrollment
    and completion rates. She aspires to earn a National Certified Counselor (NCC) credential and publish a guidebook on navigating the U.S. education system for immigrant families. Additionally, she seeks
    to influence local education policy to better support undocumented and low‑income students, and to transition gradually into a consulting and advocacy role while mentoring the next generation of counselors.
