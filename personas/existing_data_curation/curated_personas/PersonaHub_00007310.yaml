  government in shaping economic opportunities and challenges for African Americans, and may have a strong background in economic theory and the history of economic policy in the United States. This person
  may also be interested in the intersection of race and economic development, and may have a particular interest in the experiences of black workers and the challenges they faced in the post-Civil War
  era.
