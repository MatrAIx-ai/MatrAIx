persona_description: A researcher in the field of mental health nursing who is interested in understanding the impact of different inferential tests on the results of mental health research. They are looking
  for ways to improve the design and analysis of mental health research studies, with a focus on reducing the number of inferential tests carried out. They are interested in the statistical power of studies,
  the relationship between sample size, significance criterion, effect size, and statistical power, and the potential for reducing the number of inferential tests through better study design and analysis.
