  hobbies: '[''Gardening (citrus, roses, succulents)'', ''Book club participation'', ''Volunteer coordination for senior center'', ''Bingo nights'', ''Walking her dog'', ''Cooking regional Florida cuisine'',
    ''Genealogy research'', ''Attending community theater'', ''Neighborhood clean‑up events'', ''Exploring Florida state parks'']'
  career_goals: Although retired from formal employment, Amanda aims to leverage her organizational strengths to lead and expand senior‑center programs in Clermont, develop a mentorship network linking
    younger volunteers with seasoned seniors, secure a “Volunteer of the Year” award from the Lake County community services board, and eventually publish a practical guide for older adults on staying organized
    and socially engaged. She also hopes to serve on the board of a local nonprofit focused on senior health and to become a recognized advocate for age‑friendly policies in the county.
