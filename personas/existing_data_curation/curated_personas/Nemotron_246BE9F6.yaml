personas:
  professional: Melanie Harmon, a 48‑year‑old Chicago building cleaner renowned for meticulous sanitation and emerging expertise in preserving art installations, leverages a organized, methodical approach,
    a knack for customer service, and curiosity about sustainable practices to spearhead efficiency projects while pursuing an associate’s degree aimed at a supervisory role in facilities management.
  sports: Melanie Harmon, an avid Chicago sports enthusiast, roots for the Cubs and the Bulls, joins a weekly yoga class at a local studio for fitness, and participates in a community recreational softball
    league each summer, viewing these activities as both social outlets and stress‑relief rituals.
  arts: Melanie Harmon, a passionate patron of Chicago’s art scene, frequents the Art Institute’s special exhibitions, admires the mural work of artists like Mike Rubendall and the contemporary photography
    of Zanele Muholi, and channels their love of performance through a lively gospel choir where they often lead solos.
  travel: Melanie Harmon combines their love for art and soulful experiences by planning short, budget‑conscious trips to cultural hubs such as New Orleans’ French Quarter, Santa Fe’s Canyon Road, and the
    historic neighborhoods of Philadelphia, favoring immersive museum tours over luxury accommodations while balancing family commitments.
  culinary: Melanie Harmon’s culinary persona centers on cooking soulful Creole‑inspired dishes like cajun jambalaya, collard greens simmered with smoked turkey, and sweet potato pie, honing their skill
    by experimenting with Ethiopian spices and nurturing a balcony garden of basil, cilantro, and rosemary that flavors their family’s weekly gatherings.
  core: Melanie Harmon fuses obsessive organization, deep emotional currents, and a love for art into a life where eco‑friendly cleaning, gospel singing, and soul‑food cooking become both vocation and therapy.
background:
  cultural: Melanie is a Black woman who grew up in Chicago’s South Side, where the rhythms of gospel, blues, and hip‑hop formed the soundtrack of her childhood. Her family places great emphasis on community,
    church, and collective resilience, traditions she carries forward in her daily life. She celebrates African‑American cultural milestones such as Juneteenth and the African World Festival, and she actively
    supports Black artists by attending local exhibitions and purchasing artwork for her home. Her cultural identity informs her strong sense of solidarity, her appreciation for storytelling through visual
    media, and her commitment to lifting up the neighborhoods she serves through reliable, respectful work and community involvement.
