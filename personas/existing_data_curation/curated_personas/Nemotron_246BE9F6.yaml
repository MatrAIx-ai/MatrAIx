  career_goals: Melanie aims to move into a supervisory role within the facility‑services department, eventually becoming a shift coordinator or assistant facilities manager. She plans to complete her associate’s
    degree in facilities management or business administration to qualify for higher‑level positions. In the longer term, she aspires to launch her own eco‑friendly cleaning business that specializes in
    serving art galleries, community centers, and cultural institutions, allowing her to combine her passion for clean, safe spaces with her love of the arts and her commitment to sustainable practices.
