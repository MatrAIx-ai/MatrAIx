persona_description: A historian who specializes in the study of British history, particularly the history of the South Yorkshire region. His research interests include, but are not limited to, the history
  of the Oddfellows' society, the history of the British Legion, and the history of the Glassworks Dynasty of Barron. His expertise lies in transcribing and transcribing mediaeval script, and in the transcription
  of historical documents. He has a unique ability to research and discover the stories of the brave men who served in the 1st World War, and to uncover the fate of the men who were related to the Glassworks
  Dynasty of Barron.
