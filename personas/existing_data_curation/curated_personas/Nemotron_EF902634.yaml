  career_goals: Oscar aims to transition from hands‑on driving to a supervisory role within the next five years, such as a fleet manager or dispatcher, where he can leverage his experience to improve efficiency
    and safety. He is also exploring the possibility of starting a small, family‑run delivery service that caters to the growing Hispanic community in Wilson County, focusing on reliable, culturally aware
    service. In the long term, he hopes to secure a stable income that will allow him to retire comfortably while still staying involved in the industry as a mentor or consultant.
