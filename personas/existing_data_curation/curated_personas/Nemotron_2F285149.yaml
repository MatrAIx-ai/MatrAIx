  hobbies: '[''Gospel singing'', ''Dancing to R&B/hip‑hop'', ''Reading adventure books'', ''Drawing cartoons'', ''Cooking Southern dishes'', ''Playing educational games on tablet'', ''Chatting with friends
    online'', ''Debate club participation'']'
  career_goals: Kiya hopes to graduate high school with strong grades, then pursue a degree in education or community development so she can become a teacher or youth program coordinator in Thomasville.
    She also dreams of opening a small family‑run bakery that showcases Southern comfort foods and provides a welcoming gathering place for neighbors. Long‑term, she wants to create structured after‑school
    programs that blend learning with the cultural traditions she values.
