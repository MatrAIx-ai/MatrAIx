personas:
  professional: Kiya Corley is an aspiring gospel vocalist and performer who leads her church choir’s rehearsals, using her sociable, talkative nature to energize the group while relying on her love of
    routine to keep song selections familiar, though she often schedules performances in a relaxed, flexible manner that can appear disorganized.
  sports: Kiya Corley enjoys dancing to R&B and hip‑hop at school events, participates in the middle school dance squad and a community youth soccer club, and cheerfully roots for the Atlanta Braves, Atlanta
    Falcons, and Georgia Bulldogs, balancing a fun‑focused fitness routine with a preference for familiar, group‑oriented activities.
  arts: Kiya Corley expresses creativity through soulful gospel singing inspired by Mahalia Jackson, energetic R&B dance routines à la Beyoncé, sketching cartoons reminiscent of Jim Davis’s Garfield, and
    regularly attending local community theater productions featuring classic musicals.
  travel: Kiya Corley dreams of family trips to Disney World in Orlando and cultural excursions to New Orleans, while already having visited Savannah’s historic squares with her relatives, favoring itineraries
    packed with familiar landmarks and occasional spontaneous ice‑cream detours that fit within their limited allowance and school calendar.
  culinary: Kiya Corley loves helping her mother craft Southern comfort foods like crispy fried chicken bathed in buttermilk and golden peach cobbler with fresh sliced peaches, while also mastering easy‑going
    dishes such as mac and cheese and assembling personal pizza topped with pepperoni and mozzarella, reflecting a budding culinary confidence blended with a sweet tooth.
  core: Kiya Corley is a talkative, gospel‑loving 12‑year‑old who thrives on routine yet relaxes around obligations, juggling a lively social life, a penchant for drawing cartoons, and a nervous habit of
    worrying over every performance.
background:
  cultural: Kiya comes from a close‑knit African‑American family in rural Thomasville, Alabama. Her upbringing is steeped in Southern traditions—weekly church services, gospel music, communal cooking, and
    storytelling. Family gatherings often revolve around shared meals and lively conversation, reinforcing the value of community support. The local Black church serves as a cultural hub, shaping her sense
    of identity, resilience, and pride in her heritage.
