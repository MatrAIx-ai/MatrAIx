persona_description: A computer science professor who specializes in digital forensics, particularly in the areas of image reconstruction and text retrieval. He has developed and commercialized a new technique
  called SmartCarving, which can recover 90% of images and about 90% of text files. He is currently working on extending the technique to text retrieval and has co-founded a company to commercialize it.
  He is interested in improving the security and integration of Google's productivity tools in the enterprise market.
