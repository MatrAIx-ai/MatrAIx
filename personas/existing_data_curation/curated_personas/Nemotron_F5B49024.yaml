  hobbies: '[''Abstract painting'', ''Sketching'', ''Speculative fiction reading'', ''Journaling'', ''Nature walks'', ''Birdwatching'', ''Gardening'', ''Crossword puzzles'', ''Sudoku'', ''Online chess'',
    ''Creative cooking'', ''Jazz listening'', ''Virtual art workshops'']'
  career_goals: Rowen aspires to channel her artistic imagination and research skills into a visible legacy for her community. She aims to publish a collection of speculative short stories inspired by Mobile’s
    coastal landscapes and to author a memoir that weaves personal narratives with the city’s African‑American heritage. Professionally, she seeks a volunteer curator role at the Historic Mobile Museum
    where she can design exhibitions that highlight under‑represented Black artists. Additionally, Rowen plans to launch a modest online shop for her artwork and to develop a community art‑therapy program
    for seniors, hoping to earn recognition in local art competitions and to mentor emerging Black creators.
