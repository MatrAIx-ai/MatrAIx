personas:
  professional: Rowen Williams is an organized freelance visual storyteller who merges abstract painting, digital illustration, and archival research to curate community exhibits and craft speculative narratives
    that reflect Mobile's coastal heritage and underrepresented voices.
  sports: Rowen Williams enjoys leisurely nature walks along the Mobile Bay marshes with the Coastal Birdwatchers Club, follows the New Orleans Saints for football, participates in a seasonal local senior
    tennis league, and practices gentle yoga at home to maintain flexibility.
  arts: Rowen Williams spends evenings painting abstract canvases, sketches in a weathered journal, and indulges in the sounds of Miles Davis, John Coltrane, and Brian Eno while attending virtual workshops
    led by contemporary mixed‑media artists like Julie Mehretu and Mickalene Thomas.
  travel: Rowen Williams favors meticulously planned trips that blend cultural immersion and natural scenery, returning yearly to New Orleans for jazz festivals, exploring the historic streets of Savannah
    and Charleston, and dreaming of a future solo venture to Iceland to photograph volcanic landscapes.
  culinary: Rowen Williams loves to reinterpret Southern classics—crafting a smoked‑paprika shrimp po‑boy, an okra‑infused gumbo, and a bourbon‑glazed sweet potato pie—while experimenting with heirloom
    varieties of tomatoes and fresh Gulf oysters in a modestly equipped kitchen.
  core: Rowen Williams is a solitary, imagination‑driven architect of visual narratives who balances methodical planning with a competitive urge to leave a lasting cultural imprint, all while wrestling
    with worry‑fueled stress and occasional indulgences.
background:
  cultural: Rowen is an African‑American woman rooted in Mobile’s historic Black community. Raised in a close‑knit family that attended the African Methodist Episcopal church, she grew up surrounded by
    rich oral storytelling traditions, gospel music, and community gatherings like the Mardi Gras Indian parades. Her mother taught her quilting and soulful cooking, passing down recipes for gumbo, collard
    greens, and sweet potato pie. Rowen’s understanding of Southern Black resilience informs her skepticism toward institutions and fuels her competitive drive to achieve recognition for her work. She values
    the legacy of civil‑rights activism in Mobile, which shapes her commitment to preserving and celebrating Black cultural heritage through art and research.
