    User 1: So, what''s the best thing about being a zookeeper?

    User 2: The best thing about being a zookeeper is getting to work with animals every day. It''s so rewarding to see them grow and learn.

    User 1: I can imagine! It must be amazing to see them interact with each other and with you.

