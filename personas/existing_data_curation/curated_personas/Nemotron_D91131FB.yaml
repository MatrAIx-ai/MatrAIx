  career_goals: Ambrose aims to become a senior partner at his firm and eventually establish a community‑focused legal clinic in Rochester that offers affordable services to underserved families. He aspires
    to serve as a municipal judge, where he can apply his practical, fairness‑driven approach to uphold justice. Additionally, he seeks to mentor younger Black attorneys, promote diversity within the local
    bar association, and expand the firm’s pro bono program to address civil‑rights issues affecting the Black community.
