  career_goals: Her immediate goal is to obtain CISSP and CISM certifications and step into a senior security analyst role where she can lead complex investigations. Long‑term, Allison aspires to become
    a security architect, designing zero‑trust frameworks for midsize enterprises, and eventually launch a boutique consultancy that helps small businesses navigate privacy regulations. She also wishes
    to contribute original research to security journals and mentor junior analysts, all while preserving a flexible work schedule that supports her need for quiet, focused time.
