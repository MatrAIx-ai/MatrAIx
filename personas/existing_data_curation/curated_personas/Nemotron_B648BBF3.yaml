  career_goals: Her immediate goal is to advance to a store manager position within the next two years, overseeing operations, staff development, and visual merchandising initiatives. She aspires to become
    a district manager, leading multiple stores and implementing data-driven strategies to improve sales performance across the region. In the long term, she envisions transitioning into brand merchandising
    or product development for a lifestyle or fashion company, where she can fuse her business acumen with her love for art and novelty. To support these ambitions, she plans to pursue an MBA or a professional
    certification in visual merchandising, deepen her expertise in retail technology such as AI-driven personalization, and eventually launch her own boutique that showcases curated, art‑inspired apparel
    and home décor.
