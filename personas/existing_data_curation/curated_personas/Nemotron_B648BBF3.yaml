  hobbies: '["Visiting contemporary art galleries and museums", "Watercolor painting and sketching", "Attending live indie and jazz concerts", "Cooking global cuisines and hosting dinner parties", "Reading
    speculative fiction and book club participation", "Yoga and mindfulness practice", "Volunteering at community art festivals and neighborhood clean‑up projects", "Street photography", "Social media content
