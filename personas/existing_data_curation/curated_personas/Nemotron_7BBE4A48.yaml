  hobbies: '[''Hiking local trails'', ''Improv comedy workshops'', ''Volunteering for STEM outreach programs'', ''Playing acoustic guitar'', ''Exploring international cuisine'', ''Attending live music concerts'',
    ''Practicing yoga'', ''Participating in community dance classes'']'
  career_goals: Victoria aims to become a licensed school counselor and eventually a director of student services, focusing on integrating STEM pathways into career guidance programs. She plans to pursue
    a master's degree in counseling or educational psychology within the next three years, while developing a community-based mentorship initiative that connects high school students with university STEM
    majors. Long‑term, she envisions launching a regional conference that showcases emerging STEM careers and equips students with actionable planning tools.
