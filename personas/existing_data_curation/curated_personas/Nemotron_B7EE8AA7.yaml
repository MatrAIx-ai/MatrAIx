  hobbies: '["Traditional Chinese Calligraphy", "Organic Gardening", "Hiking Bay Area Trails", "Landscape Photography", "Classical Piano Playing", "Bridge (Card Game)", "Chinese Culinary Arts", "Attending
    Museum Lectures and Historical Society Events"]'
  career_goals: Hung aims to secure a department chair position within the next three years, leveraging his organizational strengths to streamline faculty processes and enhance program outcomes. He aspires
    to launch a new interdisciplinary minor that merges East Asian diaspora literature with digital archival methods, positioning the institution as a regional hub for innovative humanities scholarship.
    He also seeks a major research grant to publish a monograph on post‑colonial narratives among Asian American communities, and he is committed to mentoring emerging scholars to cultivate a collaborative
    yet competitively rigorous academic environment. Ultimately, he envisions transitioning to an emeritus role that still allows him to supervise research projects and advise on curriculum, maintaining
    an active intellectual presence without the full administrative burden.
