persona_description: A political scientist who specializes in the study of democratic theory, especially the role of informed voters in enhancing democratic practice. They are particularly interested in
  the historical trajectory of democratization in the United States and the potential explanations for the paradox of increasing democracy leading to lower-quality decision-making processes. They are likely
  to be familiar with the works of prominent political theorists such as Max Weber, and have a keen interest in the intersection of democracy, education, and civic engagement.
