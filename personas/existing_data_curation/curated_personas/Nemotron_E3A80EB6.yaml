personas:
  professional: Jarrot Smith, a budding mini builder, spends hours arranging colorful stacking blocks in perfectly straight towers, demonstrating an early love for structure and predictability, and they
    often refuse to let a wobbling block stay in place, gently nudging it back to alignment.
  sports: Jarrot Smith, a tiny soccer enthusiast who attends weekly parent‑child soccer circles at the community center, cheers for the local minor league team the River Rapids, and they love sprinting
    across the grass with a bright red ball, yet they shy away from large crowds, preferring the familiar faces of two other kids and a supportive coach.
  arts: Jarrot Smith, a little fan of animated storytelling, spends afternoons humming along to the playful tunes of Raffi and watching the gentle adventures of 'Bluey', and they proudly showcase their
    finger‑painted rainbows on the fridge, often insisting each swirl follows a neat, organized pattern.
  travel: Jarrot Smith, a curious explorer who has already toured the city zoo, splashed in the shallow waves at Sunny Beach, and taken a short flight to visit Grandma’s farm in the countryside, prefers
    traveling with a familiar stroller and a clear itinerary, and they become restless if plans change unexpectedly.
  culinary: Jarrot Smith, a picky but adventurous eater, delights in scooping creamy mac and cheese, dunking crisp apple slices into almond butter, and occasionally helps stir the batter for banana pancakes,
    yet they refuse broccoli unless it’s cut into tiny trees and lightly salted.
  core: Jarrot Smith, a structure‑loving three‑year‑old with a penchant for predictable routines, embraces tiny responsibilities, quietly worries about small changes, and finds comfort in orderly play,
    modest meals, and the steady rhythm of family life.
background:
  cultural: 'Jarrot is a Black child raised in a close-knit African-American family in Goldsboro, North Carolina. His family''s daily life blends Southern traditions with African-American cultural practices:
    they gather for Sunday services at a historically Black church, share soul-food meals like fried chicken, collard greens, and cornbread, and celebrate milestones such as Juneteenth with music, storytelling,
    and family reunions. Community ties are strong, with neighbors often participating in block parties, local festivals, and church picnics. These experiences instill in Jarrot an early sense of communal
    responsibility, respect for elders, and an appreciation for rhythm, oral storytelling, and expressive arts.'
attributes:
  skills: '["gross motor coordination", "fine motor control with building blocks", "advanced early language development", "recognizing colors, shapes, and numbers", "following multi-step routines", "basic
    navigation of educational tablet apps", "simple puzzle problem-solving", "rhythmic clapping and music appreciation", "self-care tasks such as brushing teeth", "cooperative play in small groups"]'
  hobbies: '["building Duplo block towers", "shape-sorting puzzles", "listening to rhythmic children''s music", "clapping along to beats", "reading picture books with parents", "library storytime sessions",
    "sandbox play in the backyard", "structured catch games with one or two peers", "educational tablet games focused on letters and numbers", "drawing with crayons on plain paper"]'
  career_goals: Even at three, Jarrot expresses clear, imaginative ambitions that echo his love of order and helping others. He often talks about wanting to become a firefighter because he admires the clear
    structure, teamwork, and safety role of the fire department in his community. He also mentions a fascination with building things, dreaming of someday being a construction worker or engineer, where
    he can see tangible results of his work. In the near term, his primary goal is to master reading simple books and counting higher numbers, laying a solid foundation for future academic and career success.
