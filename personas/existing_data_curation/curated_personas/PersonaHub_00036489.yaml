persona_description: An engineer and technologist with expertise in atmospheric Lidar remote sensing, particularly in the field of planetary boundary layer studies. They are interested in innovative solutions
  to address the challenges of climate change and are working on developing new technologies to improve weather and air quality forecasts. They are also interested in the integration and testing of small
  unmanned aerial vehicles (UAVs) for in-situ measurements of the low troposphere. They are currently working on the MetUAV brand, developing payloads for small UAVs to provide in-situ measurements of the
  low troposphere to retrieve weather parameters such as pressure, temperature, humidity, aerosols, volatile organic compounds (VOCs) and ozone. They are also offering software to enable improved data processing
  and visualization of the collected environmental sensing data.
