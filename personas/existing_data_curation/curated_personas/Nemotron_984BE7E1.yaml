personas:
  professional: Irene Waxman, a meticulous bookkeeper in Volusia County, leverages her expertise in QuickBooks, Sage 50, and advanced Excel to streamline month‑end closings, and they consistently mentor
    junior staff while piloting cloud‑based accounting solutions that balance innovative efficiency with strict regulatory compliance.
  sports: Irene Waxman enjoys kayaking on the St. Johns River and participates in a local adult soccer league, proudly cheering for the Tampa Bay Buccaneers and the Orlando Magic while they jog with the
    St. Johns River Runners club each Saturday morning.
  arts: Irene Waxman, an active member of a community theater troupe that recently staged Les Misérables, devotes evenings to rehearsals and devouring contemporary fiction by Sally Rooney and Chimamanda
    Ngozi Adichie, while they admire Meryl Streep’s performances and find inspiration in Lin‑Manuel Miranda’s lyrical storytelling.
  travel: Irene Waxman loves weekend trips to historic St. Augustine and annual road‑trips to the Florida Keys, while they nurture a bucket‑list dream of exploring Lisbon’s tiled alleys and the ancient
    ruins of Etruria, preferring spontaneous itineraries balanced with careful budgeting for modest family accommodations.
  culinary: Irene Waxman, an intermediate home chef, favors fresh garden herbs to craft dishes like grilled shrimp with key lime glaze, creamy quinoa paella, and an occasional experimental plant‑based jackfruit
    taco, though they habitually over‑salt their sauces while perfecting a perfect crust on sourdough bread.
  core: Irene Waxman blends meticulous organization with a zest for community, chasing order in ledgers and puzzles alike while occasionally succumbing to impulse kitchen gadget buys and fostering a stubborn
    habit of never delegating personal errands.
background:
  cultural: Irene identifies as a white American of mixed Anglo‑German ancestry, with family roots that trace back to the northeastern United States. Growing up in a suburban setting, she embraced traditional
    American customs while being exposed to the diverse cultural mosaic of Central Florida. Her married name, Waxman, reflects a Jewish heritage on one side of her family, which influences her appreciation
    for multicultural celebrations and community service. She values holidays such as Thanksgiving, Christmas, and Passover and actively participates in local cultural festivals, neighborhood block parties,
    and civic events in Deltona.
