  career_goals: Irene aims to translate her meticulous organizational skills and curiosity for new methods into a supervisory accounting role within the next three years. She plans to earn the Certified
    Bookkeeper credential and later pursue a CPA certification, positioning herself to lead a small‑business accounting team or launch her own boutique bookkeeping practice serving entrepreneurs in Volusia
    County. Her ambition includes integrating cloud‑based accounting solutions to boost efficiency and offering financial‑literacy workshops that empower local community members.
