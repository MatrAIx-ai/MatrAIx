  hobbies: '["Salsa Dancing", "Community Festival Planning", "Cooking Traditional Taiwanese Cuisine", "Cooking Potluck Gatherings", "Volunteering English Conversation Tutoring", "Walking in Pelham Bay Park",
    "Yoga", "Reading Contemporary Fiction (English & Mandarin)", "Attending Book Club Meetings"]'
  career_goals: Lan aims to transition from a front-line representative to a supervisory role within the next two years. She plans to enroll in a part-time certificate program in Business Management to
    sharpen her leadership and operational skills. Her short-term goal is to become a Team Lead, where she can design clearer workflow guidelines that blend structure with the flexibility her staff values.
    In the longer term, Lan envisions moving into a Customer Service Manager position, overseeing multiple call-center locations, and implementing mentorship programs that support employee growth while
    maintaining high service standards. She also hopes to leverage her community ties to launch a small weekend market stall featuring homemade Asian snacks, providing an additional source of income and
    cultural outreach.
