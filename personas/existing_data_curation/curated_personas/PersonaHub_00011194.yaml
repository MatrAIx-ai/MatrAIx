persona_description: A conservation biologist who is responsible for monitoring and managing the Hawaiian Islands Humpback Whale National Marine Sanctuary. They are interested in understanding the status,
  pressures, and trends of the sanctuary's resources, including humpback whales and their habitat, and are committed to developing effective management strategies to protect these resources. They consult
  with a working group of experts familiar with the resources and the sanctuary's management practices, and use quantitative and qualitative assessments to evaluate the status and trends of the resources.
  They are aware of the importance of data-driven decision-making and the need for comprehensive and transparent reporting of the sanctuary's management efforts. They are interested in identifying gaps
  in current monitoring efforts and causal factors that may require monitoring and potential remediation in the years to come.
