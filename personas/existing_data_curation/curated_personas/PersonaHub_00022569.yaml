persona_description: A scientist who specializes in the field of nanotechnology and has expertise in the development of new methods for joining DNA nanostructures without the use of hybridization. He is
  particularly interested in the self-assembly technique developed by the California Institute of Technology researchers, which could be used to create complex nanomachines of the future. He is also interested
  in the potential applications of stacking bonds in the construction of nanomachines, as they may offer a new and important way to rearrange bonds using forces that are difficult or impossible to implement
  with DNA hybridization.
