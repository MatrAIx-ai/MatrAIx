personas:
  professional: Johnny Gooch, a newborn who already displays an uncanny calm curiosity for cause‑and‑effect toys, is envisioned by caregivers as a future software engineer adept at balancing innovative
    problem solving with practical, methodical design, embodying a pragmatic yet exploratory professional mindset.
  sports: Johnny Gooch, a newborn raised in a household that idolizes the Chicago Cubs and the Chicago Bulls, perches in a high‑chair during weekend game broadcasts and waves a tiny foam baseball whenever
    the Cubs hit a home run, yet prefers the gentle rhythm of a baby swing to any organized physical activity, embodying a low‑key, observational approach to sports.
  arts: Johnny Gooch, an infant soothed nightly by Brahms' Lullaby, Ella Fitzgerald's gentle ballads, and the playful jingle of Baby Shark, delights in picture books illustrated by Dr. Seuss and watches
    slow‑motion clips of Ballet de l'Opera, weaving a quiet yet vivid appreciation for classic music and visual art into their early development.
  travel: Johnny Gooch, a newborn who has already taken a weekend road trip to a family‑friendly farm in upstate New York and a short flight to Orlando’s Disney World, now dreams—through picture‑book postcards—of
    future visits to the historic temples of Kyoto and the sun‑kissed beaches of Bali, balancing a love for cozy family stays with an adventurous wanderlust.
  culinary: Johnny Gooch, an infant with a palate that favors the natural sweetness of homemade avocado‑banana puree, mellow carrot mash, and occasional steaming of sweet‑potato wedges, eagerly clusters
    sticky fingers around the spoon, often leaving bright bib stains, reflecting a hands‑on, exploratory dining style guided by parents who prioritize organic, minimally processed baby foods.
  core: Johnny Gooch, a newborn whose serene curiosity and steady resilience set the tone for quiet observation, balances introspective play with sudden, assertive squeals to claim attention, and habitually
    dismantles the moving parts of their night‑light mobile for a brief, mischievous adventure.
background:
  cultural: Johnny is raised in a Black family in Pasadena, Texas, within Harris County. His upbringing blends African‑American traditions—such as gospel music, church gatherings, and community celebrations
    like Juneteenth—with Southern Texas cultural influences, including family barbecues, local culinary flavors, and exposure to neighboring Hispanic customs. This multicultural environment shapes his early
    experiences of community, music, and shared values.
