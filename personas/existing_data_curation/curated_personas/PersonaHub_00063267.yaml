persona_description: A retail manager who is interested in exploring the spatial characteristics of their customer base and the marketplace using in-store surveys, courtesy card programs, license plate
  surveys, credit card transactions, and raffles or business card collections. The manager is looking for new ways to analyze customer-level point-of-sale data to identify discrete pockets of customer/revenue
  strength and to compare demographic summaries using radial distance, drive time, gravity modeling, and radial filter analysis methods. The manager is looking for a tool that can provide an accurate and
  precise measure of the spatial distribution and characteristics of store trade areas and that can automatically account for the effects of logistical barriers. The manager is also interested in learning
  more about the radial filter analysis technique and how it can be used to analyze trade areas directly from customer level point-of-sale data.
