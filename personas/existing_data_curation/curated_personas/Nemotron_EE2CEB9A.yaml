personas:
  professional: Andrew Mccormack, a budding engineer‑in‑training, channels his love for LEGO Technic and Scratch programming into methodical projects, often drafting step‑by‑step plans and adding their
    own expansions to satisfy his need for structure and measurable progress.
  sports: Andrew Mccormack plays forward for the Yakima United U‑7 soccer team, looks up to the disciplined play of the Seattle Seahawks, and spends weekends practicing drills at the local park while also
    cheering for the Portland Timbers and riding their bike along orchard trails for extra cardio.
  arts: Andrew Mccormack dives into the Magic Tree House books for predictable adventure, builds detailed LEGO dioramas, watches animated favorites like Toy Story and Finding Nemo, and sings along to The
    Wiggles, often reenacting scenes with their LEGO characters for added fun.
  travel: Andrew Mccormack enjoys weekend trips to the Washington State Fair in Puyallup, annual family hikes through the Yakima vineyards and orchards, and dreams of exploring Yellowstone National Park
    and a future summer vacation at Disneyland, where they hope to experience new landscapes.
  culinary: Andrew Mccormack favors classic kid meals such as chicken nuggets, macaroni‑and‑cheese, and fresh apples from local orchards, loves helping their mother bake chocolate chip cookies, and often
    adds locally sourced grapes to their snack box for a sweet, crunchy treat.
  core: Andrew Mccormack is a meticulous, curiosity‑driven 7‑year‑old who balances structured LEGO creations with competitive soccer, yet often worries about small setbacks and clings to routine, a habit
    their parents encourage them to manage.
background:
  cultural: 'In Yakima, Washington, Andrew grows up in a predominantly White, middle‑class family that values self‑reliance, responsibility, and community involvement. The region’s blend of suburban neighborhoods
    and surrounding agricultural lands informs his everyday experiences: weekend trips to local farms, participation in the annual Washington State Fair, and school activities that emphasize American civic
    values. His family’s cultural practices reflect typical Pacific Northwest customs, such as weekly family meals featuring seasonal produce, holiday celebrations like Thanksgiving with an emphasis on
    gratitude, and community service events such as neighborhood clean‑ups. While the broader Yakima community is diverse, Andrew’s primary cultural influences remain grounded in the local traditions of
    family, school, and the natural environment of the Pacific Northwest.'
