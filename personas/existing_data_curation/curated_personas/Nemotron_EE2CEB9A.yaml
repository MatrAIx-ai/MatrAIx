  career_goals: In school projects and bedtime conversations, Andrew often dreams of a career that combines clear rules, teamwork, and an opportunity to help others. He expresses a strong interest in becoming
    a firefighter because he likes the structured training, the uniform, and the chance to protect his community. He is also fascinated by police work and occasionally talks about joining the police force
    to maintain order. His competitive spirit fuels a desire to excel as a soccer player, imagining himself on a professional team. More recently, his curiosity about technology has sparked an ambition
    to become an engineer or a robotics programmer, where he can apply his love for building and logical problem‑solving. Because he worries about making mistakes, he sets realistic short‑term goals, such
    as mastering a challenging LEGO set or scoring a goal in his soccer league, as stepping stones toward these larger aspirations.
