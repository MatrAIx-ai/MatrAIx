  hobbies: '[''Woodworking'', ''Hiking'', ''Snowshoeing'', ''Kayaking'', ''Reading science-fiction'', ''Reading technical non-fiction'', ''Personal programming projects'', ''Home-brewing'', ''Chess puzzles'',
    ''Nature photography'']'
  career_goals: He aims to become a principal engineer within the next five years, leading large-scale product development projects that push the boundaries of sustainable manufacturing. Johnnie is especially
    interested in securing patents for innovative solutions in energy-efficient systems and eventually transitioning to a technical leadership role where he can mentor junior engineers while still engaging
    in hands-on design. He also envisions contributing to industry standards committees to shape best practices, reflecting his competitive drive to set benchmarks in his field.
