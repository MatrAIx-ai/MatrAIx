personas:
  professional: Johnnie Stollings is a mechanical‑electrical engineer who leverages Python, MATLAB, and SolidWorks to design energy‑efficient systems, championing meticulous documentation and risk assessments
    while quietly outpacing peers through a blend of curiosity and disciplined pragmatism.
  sports: Johnnie Stollings is a weekend hiker who frequents the Boundary Waters and trails of the Superior National Forest, snowshoeing in January, rows a kayak on Lake Minnetonka, and cheers for the Minnesota
    Wild while holding a membership in the local hiking club.
  arts: Johnnie Stollings devotes evenings to sci‑fi novels by Neal Stephenson and classic works by Isaac Asimov, snaps high‑resolution nature photographs of Minnesota’s fall foliage, brews experimental
    IPAs to the soundtrack of progressive rock band Rush, and occasionally attends a regional woodworking exhibition featuring artisans like Jim Tolakas.
  travel: Johnnie Stollings prefers meticulously planned getaways, often embarking on solo road trips to the Canadian Shield’s Algonquin Park or international journeys to Reykjavik for geothermal marvels,
    yet budget constraints and a tendency to worry keep most vacations within the Upper Midwest’s lakes and historic small towns.
  culinary: Johnnie Stollings enjoys home‑brewing a German‑style lager using local honey and wheat malt, grilling fresh lake trout with dill and lemon, and occasionally attempts sous‑vide pork ribs, though
    their cooking skill hovers at competent level and they sometimes over‑ferment beers due to impatience.
  core: Johnnie Stollings blends disciplined engineering precision with solitary, competitive hobbies, channeling a worry‑driven quest for perfection into woodwork, brewcraft, and relentless self‑improvement.
background:
  cultural: Johnnie grew up in suburban Anoka County, a region characterized by a blend of Midwestern pragmatism and the cultural heritage of many Northern European immigrant families. His family background
    is primarily of German and Scandinavian descent, and his upbringing emphasized self-reliance, modesty, and community involvement typical of the Upper Midwest. Although he identifies as culturally secular,
    the values of hard work, punctuality, and a quiet respect for personal space have shaped his worldview. He enjoys regional traditions such as the State Fair, winter sports, and local craft breweries,
    all of which reflect his connection to the Minnesota cultural fabric.
