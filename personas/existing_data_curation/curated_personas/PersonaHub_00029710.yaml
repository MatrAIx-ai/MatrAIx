persona_description: A development professional who is interested in exploring innovative ways to address poverty and improve development outcomes through private sector investment and partnerships. This
  individual is likely to be familiar with the U.S. International Development Finance Corporation (USIDFC) and its mission to stimulate development through private sector investment and avoid the red tape
  and corruption associated with country-to-country loans. This person is likely to have expertise in international development, microfinance, and the use of private sector investment to achieve development
  goals. They may have a background in economics, finance, or a related field and may have experience working on development projects or initiatives.
