    bookkeeping'', ''Event styling for weddings and group bookings'']'
  hobbies: '[''Watercolor painting'', ''Sketching and doodling'', ''DIY home décor projects'', ''Gardening'', ''Hiking local trails'', ''Line dancing'', ''Reading mystery novels'', ''Exploring coffee shops'',
    ''Volunteering at community art fairs'', ''Creative nail art experimentation'', ''Attending regional art festivals'']'
  career_goals: Kay aims to transform her current workspace into a boutique nail studio that doubles as a small gallery for local artists, blending her love of art with her profession. She plans to obtain
    advanced certification in gel and 3‑D nail art to stay at the cutting edge of the industry. Within the next three years, she hopes to launch a weekend training program for aspiring manicurists, positioning
    herself as a mentor in the region. Competitive by nature, Kay also envisions entering statewide nail‑art competitions to gain recognition and to attract a broader clientele. Long‑term, she dreams of
    a mobile nail‑service unit that can attend community events, festivals, and weddings, bringing her flexible, social approach to a wider audience while showcasing the unique Midwestern aesthetic she
    cherishes.
