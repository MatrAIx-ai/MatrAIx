personas:
  professional: Carlos Cuesta, a 31‑year‑old senior assembler with expertise in CNC milling, robotic welding, and lean manufacturing, they leverage their methodical curiosity and bilingual communication
    skills to troubleshoot equipment, train teammates, and drive incremental process improvements while positioning themselves for a production supervisor role.
  sports: Carlos Cuesta, 31, competes on a local downtown Los Angeles recreational soccer team, they avidly follow LAFC in MLS and the Los Angeles Lakers in the NBA, and spend Saturday mornings hiking the
    Griffith Park trails, using a Strava account to log mileage and maintain their steady, methodical fitness regimen.
  arts: Carlos Cuesta, 31, channels creative impulse into building scale model aircraft from Guillow kits and crafting handmade furniture, they regularly attend LACMA exhibitions, local street‑art mural
    festivals, and live performances by folk‑rock singer Natalia Rivera, finding that these artistic experiences enrich their hands‑on engineering mindset.
  travel: Carlos Cuesta, 31, plans trips with a spreadsheet‑driven, reward‑points strategy, they favor weekend escapes to Yosemite and Joshua Tree for hiking, while dreaming of an overseas trek to the Andes
    in Cusco, Peru, and a culinary pilgrimage to Kyoto, Japan, balancing a love of nature with a craving for authentic regional flavors.
  culinary: Carlos Cuesta, 31, boasts an advanced cooking skill set, they regularly prepare slow‑braised pork carnitas with mango salsa, handmade corn tortillas using masa harina, chipotle‑infused salsa
    verde, and charred poblano peppers for friends, while occasionally experimenting with sous‑vide techniques and a hot‑stone grill to perfect dish textures.
  core: Carlos Cuesta, 31, blends methodical engineering precision with hands‑on creativity, they balance a calm, data‑driven work ethic with a love for model aircraft, weekend soccer, and cooking elaborate
    feasts, while meticulously budgeting tools and never missing a chance to volunteer safety expertise.
background:
  cultural: Carlos was born to Mexican immigrant parents who settled in Atlanta, and he grew up in a bilingual household steeped in the traditions of his family's home state of Jalisco. He celebrates Día
    de los Muertos and Mexican Independence Day with his extended family, and he keeps Mexican culinary customs alive by preparing mole, tamales, and fresh salsas. Living in Norcross, GA, he also embraces
    Southern hospitality, participates in local community events, and contributes to the growing Latino community in DeKalb County. His cultural identity informs his work ethic—valuing reliability, respect
    for elders, and a collaborative spirit—while his fluency in Spanish and English enables him to serve as a cultural liaison in the workplace.
attributes:
  skills: '["CNC programming", "Manual and robotic welding", "Blueprint reading and technical drawing interpretation", "Lean manufacturing & Kaizen process improvement", "Quality control and inspection",
    "Industrial safety compliance", "Bilingual communication (Spanish/English)", "Basic CAD drafting (SolidWorks/AutoCAD)", "Equipment maintenance and troubleshooting", "Team coordination and training"]'
  hobbies: '["Model aircraft construction", "Woodworking", "Traditional Mexican cooking", "Recreational soccer", "Attending cultural festivals", "Volunteering at youth tool‑safety workshops", "Hiking",
    "Reading industry journals and tech blogs", "DIY electronics projects"]'
  career_goals: Carlos aims to transition from a senior assembler role to a production supervisor or lead fabricator within the next three years, obtaining NIMS certifications in CNC programming and welding.
    He plans to complete an associate degree in Manufacturing Engineering to strengthen his theoretical background, and eventually spearhead a continuous‑improvement team that applies data‑driven lean strategies
    across the plant. In the longer term, his ambition includes opening a small custom metal‑work shop that serves local businesses and community projects, allowing him to blend his technical expertise
    with entrepreneurial aspirations while staying grounded in practical, hands‑on work.
