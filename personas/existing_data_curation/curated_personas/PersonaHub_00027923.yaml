persona_description: A well-respected and influential military officer, Dr. John Cochran, who played a significant role in the American Revolution, served as the Chief Physician and Surgeon General of the
  Middle Department during the War for American Independence and later served as the Commissioner of Loans in 1790 under President Washington. He is known for his contributions to the organization of the
  army medical department and his work on smallpox inoculations at Valley Forge. He also served as the president of the New Jersey Medical Society and was later appointed as the head of the entire Medical
  Department, working on changing problems there. He is remembered for his service to the United States and his legacy continues to be honored through his name.
