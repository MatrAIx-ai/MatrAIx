personas:
  professional: Catalina Polanco, a 30-year-old jewelry designer and metalworker, blends traditional filigree techniques with modern minimalism using CAD tools like Rhinoceros and Matrix, while their curiosity-driven
    experimentation and practical project management keep client deadlines realistic and the studio efficiently organized.
  sports: Catalina Polanco energizes their week with salsa and bachata nights at the community center, weekend hikes with the San Bernardino Trailblazers club, and cheering for the Los Angeles Dodgers,
    balancing high‑energy dance with restorative hiking to counterbalance work stress.
  arts: Catalina Polanco curates their creative inspiration at local art and jewelry fairs, follows the work of photographer Ansel Adams for desert lighting, admires contemporary jeweler Pamela Love for
    bold motifs, and listens to the salsa rhythms of Grupo Niche while sketching new designs.
  travel: Catalina Polanco prefers purposeful travel, having trekked the sandstone arches of Arches National Park, explored the bustling markets of a historic colonial town for culinary ideas, and plans
    a future retreat in Patagonia’s Torres del Paine to combine photography, hiking, and design brainstorming.
  culinary: Catalina Polanco masters the art of tamales and mole, experimenting with fusion flavors like cacao‑infused pork filling and a lavender‑spiked mole, favoring ingredients such as masa harina,
    dried chilies, dark chocolate, and fresh coriander, and enjoys hosting small dinner gatherings to test new recipes.
  core: Catalina Polanco channels boundless curiosity into a disciplined jewelry studio, worries about every detail, yet finds balance through dance, yoga, and the constant pursuit of sustainable, culturally
    resonant design.
background:
  cultural: Catalina is a second‑generation Mexican‑American; her parents emigrated from Jalisco and taught her a deep appreciation for Mexican craftsmanship, especially silver filigree and vivid color
    symbolism. Bilingual from childhood, she celebrates Día de los Muertos, Cinco de Mayo, and family gatherings centered on food and music. These traditions shape her aesthetic, leading her to incorporate
    indigenous motifs such as hummingbirds and agave into her jewelry. Living in Twin Peaks, she blends this heritage with Californian influences, participating in both local Mexican community festivals
    and broader artistic circles.
attributes:
  skills: '["gemstone setting", "metalwork fabrication", "hand engraving", "CAD jewelry design (Rhinoceros, Matrix)", "traditional Mexican filigree technique", "customer consultation", "inventory management",
