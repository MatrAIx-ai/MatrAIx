  hobbies: '["salsa dancing", "hiking", "photography", "cooking Mexican cuisine", "volunteering teaching jewelry", "yoga", "attending art and jewelry fairs", "reading design publications"]'
  career_goals: Catalina aims to open her own boutique studio in Twin Peaks that showcases a signature line merging Mexican cultural motifs with modern minimalism. She plans to earn a Certified Jeweler
    credential within two years, source responsibly mined gemstones, and become a regular exhibitor at the Los Angeles Jewelry Expo. She hopes to mentor two apprentices annually, foster a collaborative
    workshop culture, and eventually expand into an online brand focused on sustainable practices. Balancing ambition with practicality, she intends a measured growth strategy that avoids financial stress
    and preserves her work‑life balance.
