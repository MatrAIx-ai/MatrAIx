personas:
  professional: Hazel Negri, a 31‑year‑old advertising sales agent with eight years of experience, blends a calm, resilient demeanor with sharp visual storytelling, leveraging expertise in Google Ads, Meta
    Business Suite, Salesforce, and data‑driven ROI reporting to craft compelling, art‑centric campaigns and negotiate high‑pressure deals, and they thrive on turning client briefs into visual narratives.
  sports: Hazel Negri embraces low‑impact fitness by hiking the Appalachian Trail sections near Lancaster each weekend, joining the Lancaster Running Club for spring jogs, cheering the Philadelphia Eagles
    on game days, and occasionally playing recreational soccer with a small group of friends in the fall, and they prefer gentle, community‑oriented exercise over high‑intensity competition.
  arts: Hazel Negri immerses herself in visual arts by painting Pennsylvania countryside watercolors inspired by Claude Monet, curating vintage poster collections featuring Alphonse Mucha, attending poetry
    readings by Rupi Kaur, and regularly exploring contemporary exhibitions by Kehinde Wiley at the Lancaster Museum of Art, and they let each artistic encounter inform both personal creativity and professional
    storytelling.
  travel: Hazel Negri prefers meticulously planned weekend getaways that blend art and nature, such as a sunrise watercolor session in the Hudson Valley, a vineyard tour in Napa Valley, and a cultural immersion
    trip to Kyoto, Japan, while balancing a modest travel budget and a desire for low‑stress, solo experiences, and they savor each destination as a source of visual inspiration.
  culinary: Hazel Negri, an intermediate home chef, delights in garden‑to‑table cooking, often preparing herb‑crusted chicken with rosemary and lemon, roasted beet and goat cheese salads, and pairing them
    with a crisp Pinot Noir from a local vineyard, while also savoring cheese boards featuring aged cheddar and fig jam, and they love experimenting with seasonal produce to match their artistic palate.
  core: Hazel Negri navigates life like a well‑curated gallery—meticulously organized yet open to unexpected brushstrokes, quietly resilient, with a habit of collecting vintage postcards while occasionally
    procrastinating on dental appointments, and they channel this balance into both work and leisure.
background:
  cultural: Hazel is a White American raised in Lititz, Pennsylvania, with German and Irish ancestry. Growing up in Lancaster County, she was shaped by the region's strong community values, modest lifestyle,
    and subtle influences of Amish and Pennsylvania Dutch heritage. Her family emphasized education and cultural enrichment, which led her to pursue a BA in humanities and develop a deep appreciation for
    the arts. While she cherishes the small‑town, neighborly atmosphere of her hometown, her curiosity drives her to explore broader artistic and intellectual experiences, blending traditional Mid‑Atlantic
    sensibilities with a modern, globally aware perspective.
attributes:
  skills: '["Client relationship management", "Strategic media planning", "Copywriting & creative brief development", "Market research & trend analysis", "Digital advertising platforms (Google Ads, Meta
    Business Suite)", "CRM software (Salesforce, HubSpot)", "Negotiation and contract management", "Project coordination and timeline management", "Visual storytelling and brand aesthetics", "Data analysis
    and ROI reporting"]'
  hobbies: '["Watercolor painting", "Visiting art galleries and museums", "Street photography", "Hiking local trails", "Reading (contemporary fiction, art history, cultural essays)", "Garden-to-table cooking",
    "Wine tasting", "Attending poetry readings", "Collecting vintage posters and postcards"]'
  career_goals: Hazel aims to advance to a senior account manager role within the next two years, eventually stepping into an account director position where she can lead integrated, multi‑channel campaigns
    for arts‑focused and culturally driven brands. She is eager to pioneer the use of emerging media—such as AR experiences and interactive storytelling—to differentiate client offerings. Long‑term, Hazel
    envisions establishing her own boutique agency that marries her love of art with strategic advertising, while also mentoring junior sales professionals and fostering a collaborative, low‑stress work
    culture that honors work‑life balance.
