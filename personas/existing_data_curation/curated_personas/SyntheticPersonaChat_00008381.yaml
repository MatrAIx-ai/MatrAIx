    User 1: It''s not too hard. It just takes a lot of practice.

    User 2: Maybe I''ll try it out sometime.

    User 1: You should! It''s a lot of fun.

    User 2: So, do you enjoy working in the circus?

    User 1: I love it! It''s so much fun to perform for people and make them laugh.

    User 2: That''s great! I''m glad you enjoy it.

    User 1: Thanks.

    User 2: So, what''s your favorite thing to do in your free time?

    User 1: I love going to the movies. I also like to read and play video games.

    User 2: Oh, I love going to the movies too! What''s your favorite movie?

    User 1: I love the Lord of the Rings trilogy.

    User 2: Oh, me too! Those are some of my favorite movies.

    User 1: What''s your favorite video game?

    User 2: I like to play a lot of different video games, but my favorite is probably The Sims.

    User 1: Oh, I love The Sims too! I''ve been playing it for years.

    User 2: It''s so much fun!

    User 1: It is.

    User 2: Well, it was nice talking to you.

    User 1: You too.

    User 2: Maybe I''ll see you around sometime.

