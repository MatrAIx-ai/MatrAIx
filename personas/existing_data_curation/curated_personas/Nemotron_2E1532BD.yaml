personas:
  professional: Craig Woodall, a veteran automotive body repair specialist with over three decades of hands‑on experience, blends deep technical mastery of collision assessment, MIG/TIG welding, and custom
    metallic paint finishes with a curious, art‑inspired approach, running an impeccably organized workshop while mentoring apprentices and experimenting with eco‑friendly composites.
  sports: Craig Woodall cheers for the Tampa Bay Buccaneers and the Miami Heat, holds a seasonal membership in the Gulf Coast Anglers Association where they fish off the Gulf, and plays in a local senior
    softball league on Saturdays, maintaining a relaxed yet competitive athletic routine.
  arts: Craig Woodall immerses themselves in the arts through watercolor sessions of Florida coastlines inspired by Winslow Homer, frequents community art fairs where they discuss the works of David Hockney
    and Monet, and curates a personal photo collection of classic automobiles that reflects a meticulous eye for composition.
  travel: Craig Woodall favors carefully planned road trips that blend automotive culture and coastal scenery, having toured the Mercedes‑Benz Museum in Stuttgart, explored the classic car museums of Modena,
    Italy, and spent leisurely weekends in Key West and Sanibel Island, while budgeting trips around their boutique shop’s seasonal workload.
  culinary: Craig Woodall enjoys cooking fresh Gulf grouper seasoned with lemon, smoked paprika, and fresh herbs, often pairing the dish with a side of key lime pie, and they pride themselves on mastering
    the art of a perfectly seared steak while occasionally indulging in barbecued ribs at local fish‑fries.
  core: Craig Woodall is a meticulous, art‑driven auto body master who balances disciplined workshop precision with solitary watercolor painting, weekend fishing, and a gentle resistance to large‑scale
    social scenes, all while planning a boutique restoration legacy.
background:
  cultural: Craig grew up in a working-class, white family on the Gulf Coast of Florida during the 1960s and 1970s, absorbing the region’s blend of Southern hospitality and emerging coastal lifestyle. His
    upbringing emphasized self-reliance, modesty, and a strong work ethic typical of the post-war generation. Raised in a Baptist community, he retains the cultural rhythms of church gatherings and neighborhood
    barbecues, though his personal identity is now more secular. Living his adult life in Fort Myers, he has witnessed the rapid growth and cultural diversification of Southwest Florida, which has broadened
    his appreciation for varied experiences while still grounding him in the laid-back, outdoor-oriented traditions of the area.
