personas:
  professional: Felithia Felder, an administrative assistant turned aspiring office manager within nonprofit arts institutions, leverages her strong Microsoft Office expertise, event‑planning finesse, and
    a curious, flexible mindset to keep schedules humming while occasionally letting disorganization slip into last‑minute schedule shuffles.
  sports: Felithia Felder enjoys low‑impact fitness through weekend nature hikes on the nearby Appalachian Trail and participates in a local walking club, while cheering for the Atlanta Falcons, Atlanta
    Braves, and attending occasional community basketball games at the recreation center.
  arts: Felithia Felder frequents art galleries and community theater, delights in the jazz of Miles Davis, the blues of B.B. King, and gospel sounds of Kirk Franklin, and contributes to a quilting circle
    that recreates classic patterns inspired by historic textile exhibits.
  travel: Felithia Felder favors short cultural getaways, having toured the historic district of Savannah, savored the cuisine of New Orleans during Mardi Gras, explored the Blue Ridge Mountains near Asheville,
    and plans a future trip to the Smithsonian museums in Washington, D.C.
  culinary: Felithia Felder cooks Southern comfort staples such as shrimp and grits, collard greens, and peach‑sweet potato pie, often seasoning with fresh thyme, rosemary, and home‑grown okra from her
    herb garden, while experimenting with heirloom vegetable recipes.
  core: Felithia Felder blends meticulous office organization with a laid‑back love of arts, gardening, and community service, navigating life through curiosity, occasional disarray, and a deep sense of
    cultural stewardship.
background:
  cultural: Felithia is an African‑American woman raised in the South during a time of significant social change. Her upbringing in Georgia was shaped by the strong communal ties of the Black church, family
    storytelling, and Southern culinary traditions. She carries forward the legacy of resilience and community service passed down through generations, celebrating Juneteenth, soul‑food gatherings, and
    local cultural festivals. Her identity is informed by a blend of traditional Southern influences and contemporary Black artistic expression, which she embraces in her daily life and community involvement.
attributes:
  skills: '[''Office administration'', ''Calendar and travel coordination'', ''Data entry'', ''Record keeping'', ''Microsoft Office Suite (Word, Excel, Outlook, PowerPoint)'', ''Event planning'', ''Community
    outreach'', ''Interpersonal communication'', ''Problem solving'', ''Basic bookkeeping'', ''Document formatting'', ''Flexible scheduling'']'
  hobbies: '[''Visiting art galleries and museums'', ''Attending community theater productions'', ''Reading historical fiction'', ''Gardening'', ''Cooking Southern cuisine'', ''Volunteering at church outreach
    events'', ''Quilting and knitting'', ''Listening to jazz, gospel, and blues music'', ''Traveling to cultural festivals'', ''Walking nature trails'', ''Exploring genealogy and family history'']'
  career_goals: Felithia aims to advance from her current administrative assistant position to an office manager or senior coordinator role within a nonprofit or cultural institution, where she can blend
    her administrative strengths with her passion for the arts. She plans to earn a Microsoft Office Specialist certification and complete a short course in nonprofit management. Additionally, she hopes
    to mentor younger staff members, develop a community arts outreach program, and eventually assist in curating local exhibits that celebrate African‑American heritage.
