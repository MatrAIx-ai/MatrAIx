personas:
  professional: Kathy Brantly is a 23‑year‑old plumber‑pipefitter who blends meticulous blueprint reading, MIG/TIG welding, and a knack for sustainable fixtures with a curiosity for design, and they turn
    job sites into opportunities for artistic custom installations while staying competitively focused on efficiency and safety.
  sports: Kathy Brantly competes in a co‑ed community volleyball league in Rockland, attends weekly Orangetheory fitness classes, hikes with the Hudson Valley Hiking Club on weekends, they root for the
    New York Giants, Knicks, and Yankees, and they channel competitive energy into personal fitness goals.
  arts: Kathy Brantly immerses themselves in visual culture, attending gallery openings featuring Shepard Fairey and Kehinde Wiley, cataloguing street‑art murals by Banksy on weekends, they also catch live
    performances by indie folk duo The Milk Carton Kids and Broadway revivals of Lin‑Manuel Miranda’s Hamilton, letting those experiences inspire custom fixture designs.
  travel: Kathy Brantly prefers weekend road‑trips that blend hiking and sustainable tourism, having explored the Catskills, Portland’s vegan food scene, and the historic French Quarter in New Orleans,
    they dream of a summer eco‑tour of Iceland’s geothermal spas, and they always plan trips around work schedules and a modest travel budget.
  culinary: Kathy Brantly enjoys experimenting in the kitchen, mastering homemade gnocchi with ricotta, perfecting a spicy kimchi fried rice, seasoning grilled trout with fresh rosemary and lemon zest,
    they favor farm‑to‑table markets for heirloom tomatoes and bright peppers.
  core: Kathy Brantly is a creatively wired plumber who balances competitive drive with a love for art, often juggling DIY projects, stress‑induced midnight snack runs, they have a habit of over‑planning
    every pipe‑fit and paint‑stroke, and they sometimes stay up late scrolling design forums.
background:
  cultural: Kathy grew up in Spring Valley, a diverse suburb of Rockland County, in a middle‑class, white working‑class family that valued hard work, community, and practical skills. Her upbringing blended
    suburban American culture with the vibrant, multicultural influences of nearby New York City, fostering an openness to new ideas and artistic expression. Family traditions rooted in modest, perhaps
    Irish‑German heritage, emphasized reliability and self‑reliance, while her local community’s strong union presence shaped her respect for collective labor and teamwork.
