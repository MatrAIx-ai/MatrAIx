  career_goals: She aims to earn her journeyman plumber certification within the next two years and eventually become a master plumber, allowing her to lead larger projects and mentor apprentices. Long‑term,
    Kathy envisions opening a small, family‑owned plumbing and green‑technology contracting firm that emphasizes sustainable solutions and high‑quality craftsmanship. She also hopes to specialize in custom,
    artistic fixture installations, blending her technical expertise with her love of design, while building a reputation for reliability and safety in the Rockland County community.
