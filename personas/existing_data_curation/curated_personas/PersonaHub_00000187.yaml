persona_description: A glaciologist who specializes in studying the flow dynamics of ice shelves and the Antarctic ice sheet. He is currently conducting a research project called "Be:Wise" to investigate
  the connection between the flow dynamics of an ice shelf and its locally grounded counterparts, combining satellite remote sensing with on-site ground-penetrating radar and GPS measurements. The project
  is expected to provide important insights into the rapid fluctuations of historical ice discharges and improve capacity of ice-flow models. The ice shelf under study is the Roi Baudouin ice shelf, which
  is confined by two ice rises with a local flow regime and two pinning-points with a width of only a few kilometres. The project aims to investigate the connection between the flow-dynamics of the ice
  shelf with the locally grounded counterparts, by combining satellite remote sensing with on-site ground-penetrating radar and GPS measurements. The project also envisages geophysical parameters such as
  strain-rates, internal ice properties, surface velocities and characteristics of the bedrock interface. The Roi Baudouin ice shelf is expected to contribute to the overall understanding of the Antarctic
  mass balance.
