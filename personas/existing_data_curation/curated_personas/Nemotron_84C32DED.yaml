  career_goals: Corey dreams of merging his love for art and technology by becoming a multimedia storyteller or game designer. He envisions creating interactive comics or educational games that spark curiosity
    in other kids. In the longer term, he hopes to study graphic design and computer science, eventually working on projects that blend visual art with innovative technology. His goal is to use his creativity
    to inspire others while staying grounded in teamwork and community values.
