personas:
  professional: Corey Jefferson is an aspiring young game designer who translates their love for LEGO cityscapes and comic storytelling into interactive Scratch projects, and they leverage their curiosity
    and balanced organization to prototype playful worlds.
  sports: Corey Jefferson dribbles as a point guard for the Apple Valley Youth Basketball League, draws inspiration from the Los Angeles Lakers and Los Angeles Dodgers, and they spend weekend afternoons
    at the community swimming pool to stay active while balancing structured practice with playful pickup games.
  arts: Corey Jefferson channels the adventurous spirit of comic legends like Stan Lee and the rhythmic flow of musicians such as Kendrick Lamar and H.E.R., while they contribute to the school’s art club
    mural projects that celebrate community storytelling traditions, merging visual art with music‑infused creativity.
  travel: Corey Jefferson loves weekend desert hikes in the Mojave, has explored Yosemite Valley on a school field trip, and they dream of future adventures to the Grand Canyon and the ancient ruins of
    Machu Picchu, planning each journey with colorful scrapbook maps and a list of must‑see natural wonders.
  culinary: Corey Jefferson delights in the comforting flavors of mac and cheese, crispy fried chicken, and homemade tacos topped with fresh cilantro, mango salsa, and a splash of lime, and they often help
    to prepare simple meals like grilled cheese sandwiches and assemble taco bars for family movie nights.
  core: Corey Jefferson, a curious 9‑year‑old LEGO architect and Scratch coder, balances disciplined saving with occasional impulse splurges, sometimes forgets allergy meds before hikes, and they hum R&B
    beats while sketching comic panels.
background:
  cultural: Corey is an African-American boy raised in Apple Valley, California, a community where desert scenery meets a diverse suburban culture. His family places strong emphasis on storytelling, music,
    and community gatherings rooted in Black cultural traditions and gospel influences. He regularly takes part in church activities and school events that celebrate Black heritage, such as Black History
    Month presentations. The local mix of Hispanic and broader Californian cultures also shapes his experiences, from sharing meals of soul food and tacos to hearing Spanish phrases from classmates. These
    cultural threads, combined with the outdoor lifestyle of San Bernardino County, give Corey a rich sense of identity and pride in his heritage.
