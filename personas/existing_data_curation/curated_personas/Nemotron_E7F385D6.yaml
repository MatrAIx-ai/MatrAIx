personas:
  professional: Lynne Henry, a teenage aspiring automotive technician, blends her hands‑on DIY woodworking, clear team communication, and strategic thinking honed from basketball and competitive gaming
    into organized, detail‑oriented projects while maintaining a skeptical eye toward shortcuts, making her a reliable but demanding leader in school debate and church event planning.
  sports: Lynne Henry, a forward on the DeSoto County youth basketball league, trains five days a week to sharpen her competitive edge, follows the Memphis Grizzlies and the Tennessee Titans for inspiration,
    and spends weekends hiking the T.O. Fuller State Park trails with her hiking club, balancing high‑intensity drills with nature walks to keep her stress in check.
  arts: Lynne Henry, a TikTok DIY enthusiast who loves crafting wooden shelves and customizing her room, frequently quotes Agatha Christie while reading mystery novels, and puts on playlists featuring Billie
    Eilish and the indie folk band The Lumineers as background for her creative projects.
  travel: Lynne Henry, an adventurous weekend hiker on a modest budget, has road‑tripped to the Great Smoky Mountains and the historic music scene of Nashville, prefers self‑planned itineraries with a mix
    of hiking and cultural stops, and dreams of visiting the Petersen Automotive Museum in Los Angeles to fuel her future career.
  culinary: Lynne Henry, a budding Southern home cook, expertly fries crispy chicken using buttermilk marination and seasoned cornmeal, tosses collard greens with smoked turkey and garlic, and frequently
    adds hot sauce and a drizzle of honey butter to her mac and cheese, sharing quick recipe videos on TikTok for her friends.
  core: Lynne Henry is a competitive, curiosity‑driven teen who juggles basketball, gaming, and DIY projects, obsessively tracks her budget in a notebook, battles nightly anxiety with journaling, and never
    sleeps past midnight because the next TikTok idea always awaits.
background:
  cultural: Lynne was raised in Hernando, a small Southern town in DeSoto County, Mississippi, where family, church, and community are central pillars of daily life. Her family’s roots stretch back generations
    in the Mississippi Delta, and she grew up attending a local Baptist congregation, participating in potlucks, and cheering at high‑school football games. Southern hospitality, a strong work ethic, and
    an appreciation for country and blues music shape her worldview. Economic challenges typical of rural Mississippi have taught her resilience and practicality, prompting an early interest in hands‑on
    trades. While she embraces traditional values, Lynne also navigates modern influences through social media, blending local customs with a broader digital culture.
attributes:
  skills: '[''Effective team communication'', ''Basic computer troubleshooting'', ''Social media content creation'', ''Organizing group events'', ''Time management'', ''Basic landscaping and yard maintenance'',
    ''First aid certified'', ''Babysitting'', ''Public speaking (debate club)'', ''Basketball teamwork'', ''DIY woodworking basics'']'
  hobbies: '[''Basketball (team sport)'', ''Competitive video gaming'', ''DIY home projects'', ''Cooking Southern comfort food'', ''TikTok content creation'', ''Hiking and nature walks'', ''Journaling'',
    ''Reading mystery novels'', ''Volunteering at church youth events'']'
  career_goals: Lynne aims to earn her GED within the next two years and enroll in a community‑college trade program focused on automotive technology. She plans to achieve ASE certification and secure a
    position as a skilled automotive technician at a local garage, valuing the hands‑on, practical nature of the work. Long‑term, she hopes to launch her own mobile car‑repair service that caters to the
    rural community in DeSoto County, providing reliable, affordable transportation support. Alongside her technical aspirations, Lynne wants to mentor younger girls in her town, encouraging them to pursue
    trades and develop confidence in competitive environments.
