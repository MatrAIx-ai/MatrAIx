personas:
  professional: Ibrahim Ramirez is a senior IT operations leader with 25+ years overseeing network design, cloud migrations, and cybersecurity, who blends disciplined project management (PMP, ITIL) with
    an artistic, unconventional problem‑solving style, fostering innovative solutions while maintaining rigorous governance.
  sports: Ibrahim Ramirez enjoys fishing on Lake Michigan and hiking the Kettle Moraine trails, supports the Green Bay Packers and Milwaukee Bucks, and participates in a local senior cycling club that meets
    weekly for low‑impact rides.
  arts: Ibrahim Ramirez frequently visits the Green Bay Museum of Art to study contemporary painters such as Kehinde Wiley and Jacob Lawrence, practices black‑and‑white street photography inspired by Henri
    Cartier‑Bresson, and reads sci‑fi authors like William Gibson, which together shape their creative outlook and inform their innovative IT strategies.
  travel: Ibrahim Ramirez prefers thoughtfully planned road trips that blend nature and culture, having explored Door County’s shoreline, taken a weekend getaway to Chicago’s art districts, and dreaming
    of a weekend in Iceland to photograph northern lights, while balancing their travel schedule around family obligations and a modest retirement budget.
  culinary: Ibrahim Ramirez delights in cooking soul‑food classics such as fried catfish, collard greens seasoned with smoked turkey, cornbread, and sweet‑potato pie for family gatherings, and their modest
    kitchen skill shines when they experiment with spice blends like smoked paprika and cayenne, though they admit to over‑salting dishes when stressed.
  core: Ibrahim Ramirez is a methodical IT veteran who channels their love for art and solo pursuits into inventive tech solutions, yet they often procrastinate on regular exercise and tend to hoard vintage
    computer parts like treasured relics.
background:
  cultural: Ibrahim is an African American raised in the Midwest, blending the traditions of his family's Southern roots—church, storytelling, and soul food—with the cultural fabric of Wisconsin. He maintains
    strong ties to the local Black community, participating in church events, cultural festivals, and the regional Black Tech Professionals network. His upbringing emphasized resilience, cooperation, and
    respect for others, values that continue to shape his collaborative leadership style and his commitment to fostering inclusion in the workplace and the broader community.
attributes:
  skills: '[''Network Infrastructure Design'', ''Systems Integration'', ''Cloud Migration (AWS/Azure)'', ''Cybersecurity Risk Management'', ''Data Analytics'', ''IT Governance (ITIL)'', ''Project Management
    (PMP)'', ''Vendor Management'', ''Budget Planning'', ''Team Leadership and Mentoring'', ''Creative Problem Solving'']'
  hobbies: '[''Visiting Art Galleries'', ''Photography (Black‑and‑White)'', ''Reading Sci‑Fi and Tech Blogs'', ''Tinkering with Vintage Computers'', ''Fishing on Lake Michigan'', ''Hiking Kettle Moraine
    Trails'', ''Cooking Soul Food'', ''Volunteering: Digital Literacy for Seniors'']'
  career_goals: Ibrahim aims to lead a transformational digital modernization initiative for his organization, focusing on expanding cloud capabilities, strengthening cybersecurity posture, and integrating
    data‑driven decision‑making. Over the next five years he hopes to step into a senior director or CIO role where he can influence enterprise‑wide technology strategy, champion inclusive hiring practices,
    and expand mentorship programs for underrepresented talent in the tech field. He also aspires to contribute to community tech‑education projects that bridge the digital divide in Green Bay.
