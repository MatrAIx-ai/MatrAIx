  career_goals: Although retired, Joseph aims to leave a lasting educational legacy in Manawa. He plans to develop an intergenerational mentorship program that pairs seniors with elementary students for
    shared storytelling, gardening projects, and basic woodworking, fostering community harmony and lifelong learning. He also aspires to compile his teaching experiences and local histories into a memoir
    that captures mid‑century rural Wisconsin life, hoping it will become a resource for future educators and historians. Additionally, Joseph seeks to stay active by attending adult‑learning workshops
    on digital storytelling, ensuring his curiosity remains nurtured while applying practical skills that benefit his community.
