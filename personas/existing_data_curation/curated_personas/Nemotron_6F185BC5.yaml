  hobbies: '[''Fishing'', ''Community barbecues'', ''Tailgate parties'', ''Poker nights'', ''Live music (country & classic rock)'', ''Two-step dancing'', ''Volunteering at church food pantry'', ''Coaching
    youth baseball'', ''DIY home projects'', ''Attending local festivals (e.g., Texas Shrimp Fest)'']'
  career_goals: At 52, Robert aims to solidify his reputation as a trusted point person in his office and earn a promotion to senior clerk or office manager. He wants to lead a small team, introduce modest
    efficiency improvements, and be recognized for boosting workplace morale. He plans to obtain a Microsoft Office Specialist certification to formalize his computer skills. Over the longer term, he envisions
    a part‑time consulting role helping local small businesses set up their administrative processes, or eventually opening a modest family‑run convenience store near the port where he can stay connected
    to his community while maintaining flexibility for family and hobbies.
