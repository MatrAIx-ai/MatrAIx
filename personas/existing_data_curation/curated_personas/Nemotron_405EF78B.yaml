personas:
  professional: Xiomara Torena, a senior‑bound flight attendant, leverages her bilingual fluency, FAA safety expertise, and methodical mindset to ensure flawless cabin operations while mentoring crew members
    with a practical, results‑oriented approach.
  sports: Xiomara Torena hikes with the Blue Ridge Trailblazers club in spring, plays recreational volleyball with the Valdese Community League in summer, and follows the Carolina Panthers, Charlotte Hornets,
    and NC State Wolfpack, balancing structured workouts with spontaneous mountain treks.
  arts: Xiomara Torena expresses her creativity through landscape photography inspired by Ansel Adams and contemporary Mexican photographer Lola Álvarez, devours mystery novels by Agatha Christie and Tana French
    during layovers, and dances to salsa legends Marc Antonio and Celia Cruz at local socials, weaving the arts into both rest and work.
  travel: Xiomara Torena plans trips with meticulous checklists, favoring adventurous hikes in the Blue Ridge Mountains and culinary road‑trips to Oaxaca, while also cherishing weekend getaways to Asheville
    and future aspirations to explore Barcelona’s tapas scene, all balanced against her airline schedule and family commitments.
  culinary: Xiomara Torena, an accomplished home chef, masterfully prepares mole poblano, tlayudas, and pozole using chilies de árbol, epazote, and roasted tomatillos, often inviting friends to share the
    meals and experimenting with regional Mexican sauces while occasionally over‑seasoning to the point of mild regret.
  core: Xiomara Torena blends disciplined professionalism with a passion for solitary mountain hikes, meticulous cooking, and salsa rhythms, while juggling a near‑obsession with budgeting and a habit of
    over‑seasoning her dishes.
background:
  cultural: Xiomara grew up in a bilingual Mexican household where Spanish was spoken daily and family gatherings centered around food, music, and holiday traditions such as Día de los Muertos and Cinco
    de Mayo. These cultural roots instilled a strong sense of community, respect for elders, and pride in her heritage. Although she now lives in Valdese, North Carolina—a town known for its Swiss‑German
    roots—she actively participates in local cultural festivals while preserving Mexican customs through cooking, language, and occasional visits to extended family in Mexico. Her multicultural experience
    informs her empathetic yet structured approach to both work and personal life.
attributes:
  skills: '[''Customer service'', ''Safety & emergency procedures'', ''First aid and CPR certification'', ''Bilingual communication (Spanish/English)'', ''Conflict de‑escalation'', ''Time management and
