  hobbies: '[''Hiking the Blue Ridge Mountains'', ''Cooking traditional Mexican dishes'', ''Salsa dancing'', ''Reading mystery novels'', ''Travel photography'', ''Volunteering at the local food bank'',
    ''Practicing yoga'', ''Gardening'']'
  career_goals: Xiomara aims to advance to a senior purser role within the next three years, overseeing cabin crew operations and contributing to policy development. She plans to complete her bachelor's
    degree in aviation management, leveraging her practical experience to transition into airline operations or training management. Long‑term, she envisions establishing a consulting side‑business that
    helps airlines improve multilingual customer service and cultural sensitivity, while also creating a travel‑focused blog that shares Mexican culinary traditions with fellow travelers.
