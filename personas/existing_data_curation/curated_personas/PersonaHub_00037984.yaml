persona_description: A Queensland government official who is responsible for identifying and validating strategic cropping land, assessing impacts of development on strategic cropping land, and ensuring
  that permanent impacts on strategic cropping land are mitigated. This person is knowledgeable in environmental protection policies and regulations, and has experience in managing land resources for sustainable
  development. They are responsible for ensuring that the Act is applied fairly and equitably, and that the interests of landowners and developers are protected. This person may also have experience in
  conducting on-ground assessments and making validation decisions.
