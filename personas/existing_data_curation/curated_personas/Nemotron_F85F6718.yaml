  career_goals: 'Approaching retirement, Dorsey aims to transition from day‑to‑day operational oversight to a senior advisory role where she can shape the firm’s long‑term financial strategy and champion
    sustainable investing practices. She is pursuing the Certified Financial Planner (CFP) designation to deepen her expertise in personal finance, with the specific goal of launching a community‑focused
    financial literacy program for low‑income families in Vineland. Mentorship is a priority: she plans to formalize a succession‑planning initiative that pairs emerging financial analysts with seasoned
    mentors, ensuring organizational continuity. Additionally, she seeks to author a guide on stress‑resilient financial planning for senior professionals, blending her practical knowledge with her personal
    experience of managing high stakes and emotional pressure.'
