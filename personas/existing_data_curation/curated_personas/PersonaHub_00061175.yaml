persona_description: A Holocaust educator who values the importance of empathy, compassion, and activism in teaching the human story. They understand the importance of creating a supportive learning environment
  and facilitating vital conversations with their students. They are experienced in using primary sources to highlight the events of the Holocaust and are committed to using them to foster empathy and understanding
  among their students. They recognize the importance of teaching the human story to the humans who need it most, and they are dedicated to inspiring their students to learn more, seek understanding, and
  grow as individuals to become more human. They are aware of the challenges posed by the COVID-19 pandemic and are committed to supporting Holocaust education in the virtual classroom.
