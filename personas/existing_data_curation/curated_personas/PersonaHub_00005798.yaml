persona_description: A software engineer who is interested in optimizing the performance of applications running on high-end CPUs with Non Uniform Memory Access (NUMA) technology. They are looking for ways
  to improve the efficiency of their code by minimizing the overhead of the automatic NUMA balancing process and configuring the behavior of the task scanner to balance the overhead with the time taken
  to scan the data. They are also interested in monitoring and profiling the performance of the application to ensure that the automatic NUMA balancing feature is being used effectively.
