persona_description: A professional with a background in sustainable development and circular economy, specifically focused on the development and implementation of materials in the biobased economy (BBE).
  This individual has a strong understanding of the challenges facing the global community in terms of climate change, food security, and the end of oil reserves. They are experienced in creating regional
  economic growth and employment through the development of materials and have a deep passion for using the circular economy as a solution to these challenges. They are committed to promoting the use of
  BioComp as a tool for training VET teachers and trainers in the BBE, and are dedicated to developing a sustainable business plan for the exploitation and dissemination of BioComp after the project.
