    surveillance tools'']'
  career_goals: Grisel aims to advance from a frontline surveillance officer to a senior security manager overseeing multiple casino sites in the Greater Houston area. She plans to complete her bachelor's
    degree in criminal justice, obtain the Certified Protection Professional (CPP) credential, and pursue specialized training in cyber‑security for gambling operations. Long‑term, she envisions establishing
    her own security consulting firm that offers risk‑management services to gaming establishments and community venues, while also mentoring women entering the security field.
