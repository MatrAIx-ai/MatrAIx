  career_goals: As he approaches retirement, Joseph aims to transition into a senior advisory role where he can mentor the next generation of analysts and ensure a smooth knowledge transfer within his organization.
    He is focused on leading a flagship digital‑transformation or sustainability project that will leave a lasting strategic impact before stepping back. He also seeks opportunities to provide part‑time
    consulting to local non‑profits, applying his analytical expertise to community development initiatives. Balancing professional ambition with personal wellbeing, he plans to build a legacy of data‑driven
    decision‑making while maintaining a manageable workload to protect his health.
