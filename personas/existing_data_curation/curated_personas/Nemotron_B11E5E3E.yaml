  hobbies: '[''tai chi'', ''community gardening'', ''cooking traditional dishes'', ''mahjong'', ''walking nature trails'', ''reading historical biographies'', ''listening to music (jazz and Chinese classics)'',
    ''volunteering at senior meals program'', ''attending cultural festivals'']'
  career_goals: Albert aims to deepen his impact as a community mentor, fostering intergenerational connections and preserving cultural heritage. He plans to document his life story and family recipes in
    a personal memoir, share cooking workshops, and volunteer as a cultural liaison at local schools. Maintaining his health and supporting his spouse remain priorities, as does traveling to his ancestral
    hometown to reconnect with family roots.
