persona_description: A person who is interested in the history of law, particularly the history of coroners and their roles in investigating and determining the cause of deaths. They are knowledgeable about
  the establishment and development of the office of coroner in England, the different coroners who served in Richland County, and the changes in the qualifications and responsibilities of coroners over
  time. They are also interested in the historical context and the role of coroners in the development of the legal system in the United States.
