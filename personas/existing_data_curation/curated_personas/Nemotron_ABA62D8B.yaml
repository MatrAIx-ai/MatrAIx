personas:
  professional: Emily Koder, a registered nurse with advanced health‑informatics training, fuses rigorous patient assessment and medication management with whimsical art‑therapy handouts, allowing them
    to navigate the demands of a rural clinic through a blend of curiosity‑driven experimentation and a laid‑back, improvisational work style.
  sports: Emily Koder hikes the Blue Ridge Mountains year‑round with the local Blue Ridge Hiking Club, follows the Virginia Tech Hokies football team, and occasionally joins a community kayaking group that
    meets on the Smith River, embracing outdoor fitness as a moving meditation.
  arts: Emily Koder devotes weekends to sketching watercolors inspired by Monet and O'Keeffe, collects limited‑edition prints from folk artist Andy Goldsworthy, and regularly attends performances by local
    singer‑songwriter Lucy Dacus, letting these experiences fuel both personal creativity and patient education material.
  travel: Emily Koder has trekked the Shenandoah Skyline Trail, explored Asheville’s art districts, and dreams of a soulful retreat in Sedona, Arizona’s red‑rock landscape, preferring self‑guided itineraries
    that balance artistic inspiration with quiet solitude.
  culinary: Emily Koder experiments with seasonal dishes like roasted beet and goat‑cheese salad, heirloom tomato gazpacho, and herb‑infused quinoa pilaf, savoring the textures of locally sourced rosemary,
    sage, and wild mushrooms while occasionally over‑seasoning in their quest for bold flavors.
  core: Emily Koder, a 31‑year‑old nurse‑artist, blends curiosity, kindness, and a relaxed disorganization into a life where mindfulness, watercolor, and community care intersect, even as anxiety sometimes
    colors their decisions.
background:
  cultural: Emily was raised in a small, close‑knit community in rural Virginia, where Appalachian traditions and Southern hospitality blend with a growing appreciation for contemporary arts and progressive
    ideas. Her family has deep roots in the region’s farming and craft heritage, which instilled in her a respect for nature, self‑reliance, and community service. While she values the local customs of
    church gatherings, folk music, and seasonal festivals, she also embraces broader cultural experiences through travel, museum visits, and diverse artistic pursuits. This mixed cultural background fuels
    her desire to bridge traditional care with innovative, holistic approaches in her nursing practice.
attributes:
  skills: '["Patient assessment", "IV therapy and medication administration", "Wound care", "Electronic health record (EHR) data analysis", "Health informatics", "Evidence-based practice", "Patient education
