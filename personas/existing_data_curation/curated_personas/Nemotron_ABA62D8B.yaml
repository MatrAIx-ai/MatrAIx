  hobbies: '["Watercolor painting", "Sketching", "Hiking", "Yoga and mindfulness meditation", "Reading science and philosophy", "Journaling", "Gardening", "Cooking with local ingredients", "Volunteering
    at animal shelter", "Participating in community book club"]'
  career_goals: Emily aims to leverage her clinical experience and STEM training to become a Nurse Practitioner specializing in community health for rural populations. She aspires to develop a community-based
    program that combines traditional nursing care with art therapy and mindfulness to address mental health and chronic disease management. In the longer term, she hopes to earn a doctorate in nursing
    practice (DNP) with a focus on health informatics, allowing her to lead quality-improvement initiatives that reduce readmission rates and improve patient outcomes in Patrick County. She also wishes
    to mentor new nurses and champion flexible scheduling models that support work-life balance for healthcare providers.
