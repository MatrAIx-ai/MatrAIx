  career_goals: Billy aims to formalize his caregiving expertise by obtaining a Certified Nursing Assistant (CNA) credential within the next year. He aspires to transition into a supervisory role as a home‑health
    aide coordinator, where he can mentor junior aides and design care protocols that integrate creative activities. He plans to take a community‑college course in art therapy to develop structured art‑based
    programs for his clients. Recognizing his sensitivity to stress and tendency toward worry, he also intends to enroll in stress‑management and resilience workshops to support his own wellbeing. Long‑term,
    he envisions launching a small, locally‑owned home‑care agency that emphasizes holistic, culturally sensitive support for seniors while also fostering his own professional growth and financial independence.
