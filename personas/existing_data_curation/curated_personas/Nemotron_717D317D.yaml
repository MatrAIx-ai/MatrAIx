personas:
  professional: Katherine Cornell is an aspiring teen visual artist who blends sketching with basic robotics, channeling her curiosity into school art club projects while occasionally asserting herself
    in group coding challenges despite a relaxed approach to deadlines.
  sports: Katherine Cornell is a teen who spends weekends skateboarding at the neighborhood park and playing informal soccer matches with friends, while cheering on the Chicago Bulls during basketball season
    and the Chicago Cubs in the summer, keeping a laid‑back approach to fitness that favors fun over strict training regimens.
  arts: Katherine Cornell is a budding creative who fills sketchbooks with charcoal studies of the Wabash Arts Corridor murals, curates indie playlists featuring Arcade Fire and Phoebe Bridgers, devours
    Neil Gaiman’s fantasy novels, and volunteers backstage at the Chicago Shakespeare Theater, letting her curiosity and relaxed schedule nurture a rich, unconventional artistic identity.
  travel: Katherine Cornell is an adventure‑curious teen who has explored the Art Institute of Chicago and taken a weekend road trip to Milwaukee’s lakefront, now dreaming of a future school‑break tour
    of Paris’s Louvre and a summer exchange in Kyoto, balancing her travel aspirations with the practical limits of school responsibilities and a modest family budget.
  culinary: Katherine Cornell is a 13‑year‑old with a budding palate who favors Chicago‑style deep‑dish pizza and spicy ramen, experiments with making chocolate chip cookies for school bake‑sales, and enjoys
    photographing her culinary attempts, though she often forgets to clean the kitchen afterward.
  core: Katherine Cornell is a curiosity‑driven teen who blends art, technology, and indie culture into a laid‑back yet occasionally disorganized lifestyle that fuels a uniquely imaginative outlook.
background:
  cultural: Katherine was raised in a predominantly European‑American household in Oak Lawn, Illinois. Her family celebrates traditional American holidays such as Thanksgiving, Fourth of July, and Christmas,
    often incorporating stories of their German and Irish ancestry. They place a high value on education and community involvement, encouraging participation in school activities and local events. Proximity
    to Chicago provides frequent exposure to diverse cultural experiences, including museum visits, theater shows, and seasonal festivals, fostering her appreciation for varied artistic expressions.
