  career_goals: Katherine dreams of a future that combines her love for art and technology. She aspires to become a graphic designer or concept artist, possibly working in video game development or animation
    where she can create immersive visual experiences. She hopes to attend a high school with strong arts and STEM programs, then pursue a college degree that blends visual arts with computer science. Ultimately,
    she envisions a flexible career that allows her to work on innovative projects, freelance when desired, and continue exploring new creative mediums.
