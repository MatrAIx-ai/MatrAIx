persona_description: A renewable energy project developer who is interested in understanding the potential and performance of solar and wind energy systems, as well as the economic and cost considerations
  involved in their deployment. This persona is likely to be familiar with NREL's System Advisor Model and the reV model, and is seeking to analyze site-specific data to estimate the LCOE for a particular
  project. They may also be interested in the spatial optimization algorithm used to rank potential sites based on both LCOE and transmission access, as well as the cost and capacity modules in reV to calculate
  the grid interconnection costs for each site. Additionally, this persona is likely to be interested in the land access limitations that can be experienced by renewable energy project developers, and the
  various computational and research tools provided by the Resource Extraction Tool (rex) for accessing state-of-art resource data sets.
