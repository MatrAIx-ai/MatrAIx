personas:
  professional: Anthony Ergueta, a retired construction foreman turned apprenticeship mentor, leverages his decades‑long hands‑on trade expertise and meticulous budgeting skills to guide young builders,
    blending his curiosity for eco‑friendly methods with a practical, methodical approach that keeps projects on schedule and within budget.
  sports: Anthony Ergueta hikes the Temecula hills with the Senior Trailblazers club, follows the San Diego Padres and Los Angeles Lakers religiously, and joins a weekly pickleball match at the community
    center, approaching each activity with a competitive edge that pushes him to improve his game while still enjoying the social camaraderie.
  arts: Anthony Ergueta attends the Temecula Festival of Arts where he admires performances by Mariachi Sol de México, enjoys listening to Bob Dylan and the classical violin concertos of Antonio Vivaldi,
    and reads historical biographies by David McCullough and Doris Kearns Goodwin, finding that the stories of past leaders inform his mentorship style.
  travel: Anthony Ergueta prefers well‑planned road trips, having mapped out a pilgrimage to his hometown in Veracruz, Mexico for a family reunion while also cherishing weekend getaways to Napa Valley vineyards
    and the historic missions of San Juan Capistrano, balancing his love of adventure with a modest travel budget and a desire to stay fit for the hike back home.
  culinary: Anthony Ergueta cultivates heirloom tomatoes and citrus, using them in dishes like salsa verde, chicken tinga, and grilled fish topped with fresh cilantro, lime, and roasted poblano, demonstrating
    a seasoned home‑cook level that blends traditional family recipes with experimental twists such as adding smoked paprika to his classic pozole.
  core: Anthony Ergueta, a 68‑year‑old former foreman turned mentor, gardens, restores classic cars, and cooks with a competitive curiosity that keeps him organized, skeptical of shortcuts, and forever
    chasing the perfect heirloom tomato sauce.
background:
  cultural: Anthony is a second‑generation Mexican‑American who grew up in a bilingual household in Southern California. He celebrates Mexican traditions such as Día de los Muertos, quinceañeras, and family
    gatherings centered around food. His cultural identity blends the warmth and communal spirit of Mexican heritage with the suburban lifestyle of Temecula, influencing his values of family loyalty, respect
    for hard work, and appreciation for both modern and traditional practices.
