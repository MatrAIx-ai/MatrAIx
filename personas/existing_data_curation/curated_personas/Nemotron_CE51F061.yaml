  career_goals: Even though he is retired, Anthony aims to remain an active contributor by mentoring younger tradespeople through the local community college's apprenticeship program, documenting his family’s
    culinary heritage in a small cookbook, and adopting smart‑home technologies to improve his home’s energy efficiency. He also hopes to stay physically fit and travel to his hometown in Mexico to reconnect
    with extended family.
