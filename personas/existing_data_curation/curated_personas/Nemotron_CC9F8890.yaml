  career_goals: Tina aims to transition to a Registered Nurse role through an LPN-to-RN bridge program, ultimately earning her BSN. She hopes to become a charge nurse or unit manager within the next five
    years, leveraging her leadership and quality-improvement experience to elevate patient safety and staff morale. Long-term, she is interested in pursuing a Master’s in Nursing with a focus on Health
    Informatics, enabling her to integrate data-driven decision-making into the hospital’s workflow. She also aspires to lead a community education initiative that promotes preventive health practices among
    Buffalo’s underserved populations.
