  hobbies: '[''Landscape painting'', ''Reading (novels, poetry, art criticism)'', ''Hiking and birdwatching'', ''Quilting'', ''Attending theater productions'', ''Volunteering at the historical society'',
    ''Gardening'', ''Southern cooking'', ''Bridge'', ''Genealogy research'']'
  career_goals: Although retired, Jaime aims to establish a regional digital archive that preserves Appalachian art and oral histories, author and publish a memoir intertwining her personal journey with
    regional folklore, mentor emerging local artists through a weekly workshop series, and champion the integration of arts education within Sequatchie County schools. She also aspires to curate an annual
    Appalachian arts festival that draws visitors from across the state, and to travel to major art museums in New York, Chicago, and Washington, D.C., to deepen her artistic perspective.
