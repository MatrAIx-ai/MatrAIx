  hobbies: '[''Hiking'', ''Landscape photography'', ''Visiting art galleries'', ''Playing acoustic guitar'', ''Reading science fiction & fantasy'', ''Cooking new recipes'', ''DIY bike repair'', ''Mindfulness
    meditation'']'
  career_goals: Bobbie aspires to move into a supervisory or operations-coordinator role within RTD, where he can lead a team while shaping service policies that incorporate community-focused initiatives.
    He plans to earn an associate’s degree in logistics management and obtain certifications in transportation planning. Leveraging his appreciation for the arts, he hopes to develop a mobile art-exhibit
    program that travels on select bus routes, bringing local artists’ work to commuters. Long-term, he envisions a side venture offering freelance photography services and occasional bike-repair workshops,
    giving him a creative outlet and additional income while maintaining a stable career in transportation.
