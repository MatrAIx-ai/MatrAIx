personas:
  professional: Bobbie Fulton, a 37‑year‑old transportation service attendant with RTD, blends a decade of safety compliance, schedule mastery, and calm conflict de‑escalation with a photographer’s eye
    for detail, using creative problem‑solving from art and DIY projects to streamline operations and champion a mobile art‑exhibit program that they envision as a future supervisor.
  sports: Bobbie Fulton fuels a love of the outdoors by hiking the foothills around Littleton at sunrise, joins the Denver Biking Club for weekend rides, follows the Colorado Avalanche, Denver Broncos,
    and Colorado Rockies with enthusiastic fandom, and they balance a disciplined cardio routine with occasional yoga sessions to counter the rigidity of a desk‑adjacent job.
  arts: Bobbie Fulton immerses themselves in artistic life by curating pop‑up exhibitions in RTD stations, attending Denver Art Museum shows featuring contemporary muralist works, strumming acoustic guitar
    to the tunes of Sufjan Stevens, capturing landscape frames inspired by Ansel Adams, and collecting prints by Kehinde Wiley, and they use these experiences to color both their personal aesthetic and
    public service outlook.
  travel: Bobbie Fulton prefers low‑key, photography‑focused getaways, planning meticulous itineraries to capture sunrise over Rocky Mountain National Park, savoring the adobe architecture of Santa Fe during
    an annual art festival, dreaming of a future culinary tour of Kyoto’s tea houses, and they balance the desire for adventure with a modest budget that channels savings from their side hustle.
  culinary: Bobbie Fulton’s kitchen is a testing ground for international flavors, mastering paella with saffron and chorizo, crafting ramen broth with kombu and miso, and perfecting Ethiopian injera using
    teff flour, while they usually pair these dishes with fresh avocado and sumac‑spiced salads, yet they often leave dirty dishes piling up after late‑night cooking sessions.
  core: Bobbie Fulton, a sunrise‑chasing, detail‑driven RTD attendant, channels curiosity into art and photography ventures, and they often let over‑thinking delay paperwork, which spikes their stress levels.
background:
  cultural: Bobbie grew up in a middle-class Midwestern suburb where traditional American values such as hard work, community involvement, and self-reliance were emphasized. After moving to Colorado in
    his twenties, he embraced the state's outdoor lifestyle and its progressive arts scene. He identifies with a broadly White American cultural heritage, yet his experiences in Littleton have broadened
    his outlook, making him comfortable with diverse perspectives while maintaining the familial and community-oriented ethos of his upbringing.
attributes:
  skills: '[''Customer service'', ''Safety compliance'', ''Conflict resolution'', ''Route planning and logistics'', ''Time management'', ''Basic vehicle maintenance'', ''Public communication'', ''First
