personas:
  professional: Wendy Keene is an aspiring UX designer who leverages a knack for quick digital tool adoption, Python scripting, and analog photography to craft intuitive web mock‑ups for community projects
    while juggling high‑school coursework and a laid‑back approach to deadlines.
  sports: Wendy Keene is an outdoor‑seasoned teen who snowshoes the trails of the Adirondacks in January, hikes the High Peaks in summer, cheers on the Adirondack Thunder minor‑league hockey team and the
    Buffalo Bills on Sundays, and occasionally joins a local community‑run ultimate Frisbee league for social fitness.
  arts: Wendy Keene blends a love for indie video games with a passion for analog photography, frequently shoots street scenes with a vintage 35mm camera, cites photographer Ansel Adams and musician Sufjan
    Stevens as creative inspirations, writes original keyboard‑driven songs, and volunteers in community theater set design while admiring performances by the local high‑school drama club and the regional
    folk group The Band of the Lakes.
  travel: Wendy Keene plans spontaneous weekend getaways to the Adirondack peaks, dreams of a cross‑border road trip to Montreal to sample poutine and explore the historic Old Port, has a bucket‑list stop
    at Iceland’s Blue Lagoon for northern‑light photography, yet balances travel ambitions with the practical constraint of a part‑time job and school responsibilities.
  culinary: Wendy Keene enjoys whipping up maple‑glazed trout caught from Lake Champlain, perfects a cinnamon‑apple pancake breakfast while listening to Sufjan Stevens, experiments with DIY smoked cheese
    using a backyard smoker, and values the simple pleasure of a cheese curd from a local farmer’s market alongside a steaming mug of hot chocolate.
  core: Wendy Keene is a pragmatic creative who balances curiosity with a relaxed, flexible planning style, turning hobbyist tech projects, outdoor adventures, and indie arts into a coherent, community‑focused
    life.
background:
  cultural: Wendy grew up in a middle‑class, white family in Plattsburgh, NY, with a cultural mix of German and Irish ancestry that is common in upstate New York. Her family values self‑reliance, community
    involvement, and a love of the outdoors, which is reflected in frequent trips to the nearby Adirondack Mountains and Lake Champlain. The town’s small‑city vibe, seasonal festivals, and occasional cross‑border
    visits to Quebec have given her a modest appreciation for both American and Canadian regional customs, while she remains rooted in the pragmatic, friendly spirit of a northern New York community.
attributes:
  skills: '["Basic Python coding", "Social‑media graphic design", "DIY home repairs", "Analog photography (film development)", "Basic woodworking"]'
  hobbies: '["Hiking and snowshoeing", "Analog photography", "Keyboard playing and songwriting", "Indie video gaming", "Reading science‑fiction", "Community theatre (acting and set design)"]'
  career_goals: Wendy aims to complete her GED within the next year and enroll in a local technical college for an IT support certification (CompTIA A+). She envisions a career that blends her technical
    curiosity with her creative side, such as becoming a user‑experience (UX) designer or a freelance digital content creator. In the longer term, she hopes to launch an online shop selling handcrafted
    accessories and prints, while staying connected to her community through volunteer tech workshops.
