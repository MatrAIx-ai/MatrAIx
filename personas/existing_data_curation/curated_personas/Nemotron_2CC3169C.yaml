personas:
  professional: Marco Sosa, a one-year-old, is a full‑time explorer of his own surroundings, honing early fine‑motor coordination and pattern‑recognition skills; their deep love for routine and practical
    play ensures they master daily routines such as feeding and nap time with calm resilience.
  sports: Marco Sosa, a one‑year‑old, enjoys crawling across the soft grass at the neighborhood park and is a budding fan of the local baseball team, the Springfield Spiders, clapping with a pacifier in
    hand whenever the team hits a home run.
  arts: Marco Sosa, a one‑year‑old, is captivated by the soothing melodies of lullabies from artists like Raffi and the gentle piano compositions of Baby Einstein, and they love watching the animated performances
    of Disney's "Moana" and the colorful illustrations in Dr. Seuss books, which shape their early sense of wonder.
  travel: Marco Sosa, a one‑year‑old, has already taken a weekend road‑trip to the seaside town of Oceanview, where they delighted in feeling sand between their toes, and they dream of a future family vacation
    to the warm beaches of San Juan, Puerto Rico.
  culinary: Marco Sosa, a one‑year‑old, prefers pureed sweet potatoes and applesauce, enjoys the soft texture of avocado mash, but consistently refuses peas, and their parents often prepare homemade baby‑friendly
    meals using organic carrots, bananas, and a dash of cinnamon.
  core: Marco Sosa, a one‑year‑old, navigates life with a serene, routine‑loving calm, thriving in solitude while occasionally asserting themselves with a determined grasp on bright toys.
background:
  cultural: Marco is raised in a Mexican‑American household in Stockton, California. His family speaks both Spanish and English, and he is regularly immersed in Mexican cultural traditions, including family
