  career_goals: He aims to earn paramedic certification within the next two years and subsequently move into EMS operations management, where he can leverage his business acumen to streamline dispatch protocols
    and improve patient outcomes. Long‑term, he envisions launching a health‑tech startup focused on data‑driven emergency response optimization, while maintaining a structured, collaborative team environment
    that prioritizes harmony and reliable service.
