  hobbies: '[''Woodworking'', ''Church choir singing'', ''Community potluck organizing'', ''Vegetable gardening'', ''High‑school football game attendance'', ''Youth sports safety volunteering'', ''Classic
    car restoration'', ''Local history research'']'
  career_goals: Looking ahead, Emanuel aims to transition into a supervisory or safety coordinator role where he can leverage his experience to improve workplace safety and efficiency. He plans to obtain
    a journeyman certification in welding and a supervisory certification in industrial safety. He also hopes to mentor younger workers, possibly establishing a community apprenticeship program in Kern
    County. Ultimately, he envisions launching a small, family‑owned metal‑plastic fabrication workshop that can serve local contractors while providing steady employment for his peers.
