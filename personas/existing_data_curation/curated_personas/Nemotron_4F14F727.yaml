personas:
  professional: An aspiring handyman and future small-engine specialist, James Ruiz combines years of practical auto and carpentry know-how with a newly-minted GED and a drive to enroll in a vocational
    program, blending a love for structured learning with the occasional urge to dive into spontaneous projects that keep their toolbox overflowing.
  sports: An avid fan of college football, James Ruiz never misses a Georgia Bulldogs game and cheers on the Atlanta Falcons in the NFL, while spending weekends hunting deer with the Harrison Sporting Club,
    fishing at Lake Allatoona, and riding ATVs with the Harrison Off-Road Riders, using occasional gym sessions to stay limber for the next outdoor adventure.
  arts: James Ruiz unwinds after a long day by strumming acoustic renditions of classic country hits from artists like Chris Stapleton and Luke Bryan, while also keeping a playlist of Southern rock legends
    such as Lynyrd Skynyrd and classic rock riffs from the Eagles, and occasionally watches gospel choirs perform at the community church, letting the music shape their laid-back yet determined vibe.
  travel: James Ruiz prefers road-trip spontaneity over meticulous itineraries, often cruising the backroads of the Southeast to visit Cedar Hill, TN for a weekend music festival, the Blue Ridge Parkway
    for scenic drives, and the Gulf Coast for a quick shrimp boil, yet dreams of backpacking the Appalachian Trail to combine their love of nature with a low-budget adventure.
  culinary: In the backyard smoker, James Ruiz masters pulled pork shoulder with a caramelized peach glaze, pairs it with buttermilk biscuits, collard greens, and sweet tea, and relishes cooking traditional
    Southern dishes like chicken-and-waffles and shrimp boil, while also experimenting with dry rubs that blend paprika, brown sugar, and cayenne for that perfect heat.
  core: James Ruiz is a rugged, practice-oriented handyman who balances a structured work ethic with spontaneous outdoor thrills, a love for Southern comfort food, and a habit of delaying long-term planning
    until the next deadline looms, and they often find themselves juggling multiple DIY projects while the calendar ticks.
background:
  cultural: 'James grew up in a tight‑knit, rural Southern community in Harrison, Georgia. His upbringing reflects working‑class Southern values: self‑reliance, neighborly assistance, and regular church
    involvement. Although his surname hints at Hispanic ancestry, his cultural identity is predominantly Southern white American, shaped by local traditions such as county fairs, Fourth of July fireworks,
    and Southern cuisine (fried chicken, biscuits, barbecue). He embraces country and gospel music, respects the region’s emphasis on modesty and hospitality, and balances a traditional outlook with occasional
    multicultural influences from his family’s mixed heritage.'
attributes:
  skills: '["Basic auto mechanics", "General carpentry and DIY repairs", "Lawn and garden maintenance", "Basic residential electrical work", "Hunting and fishing knowledge", "ATV and small equipment operation",
    "Computer literacy (internet research, email)", "Interpersonal communication in casual settings", "Problem solving and improvisation"]'
  hobbies: '["Hunting (deer, small game)", "Fishing at local lakes", "ATV riding and off‑road trails", "Playing acoustic guitar", "Listening to country and classic rock music", "Barbecue cooking and grilling",
    "Watching college football (Georgia Bulldogs)", "Playing video games (first‑person shooters, sports)", "DIY home improvement projects", "Reading practical manuals and survival guides"]'
  career_goals: James aims to obtain his GED within the next year and enroll in a community‑college vocational program—preferably automotive technology or HVAC—to gain formal credentials. He plans to secure
    an apprenticeship with a local mechanic or contractor, where he can blend his love for structured learning with the flexibility he values. Long‑term, he hopes to launch his own handyman or small‑engine
    repair side business, providing a stable income while allowing spontaneous project work. He also wants to acquire a certification in small‑engine repair to better serve his rural community and increase
    his self‑reliance.
