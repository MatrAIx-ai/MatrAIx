  career_goals: Stephania aims to progress to a senior operations management role within her organization, such as Operations Manager or Director of Administrative Services. She seeks to lead larger teams,
    oversee enterprise-wide process improvement initiatives, and drive digital transformation through automation and data analytics. She plans to obtain a PMP certification and complete a Six Sigma Black
    Belt to strengthen her credentials. Additionally, she aspires to mentor emerging leaders, champion diversity and inclusion programs that reflect her Puerto Rican heritage, and contribute to community
    outreach projects focused on digital literacy.
