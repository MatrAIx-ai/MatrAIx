persona_description: A sociologist who studies the effects of loss on African Americans and the ways in which such losses can perpetuate disparities in health. She is interested in the broader implications
  of death for family networks and the lifelong cumulative disadvantage it can have on individuals and families. Her research focuses on the mental and physical health effects of loss, as well as the ways
  in which such losses can affect the formation and quality of relationships throughout a person's life. She is likely to be involved in policy discussions and advocacy efforts aimed at addressing racial
  disparities in health outcomes.
