  hobbies: '[''knitting and crocheting'', ''gardening'', ''bridge'', ''senior‑center volunteering'', ''church choir'', ''genealogy research'', ''cooking traditional recipes'', ''walking in parks'', ''reading
    mystery novels'', ''bird watching'']'
  career_goals: Although retired from the formal workforce, Ashley aims to stay actively involved in her community. Her primary goals are to continue volunteering at the local senior center, mentor newer
    volunteers, and organize intergenerational activities that foster social connection. She aspires to learn basic computer skills to document family histories digitally and share them online. Maintaining
    her health and independence so she can attend church services, community events, and support her grandchildren remains a central ambition.
