  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Reading historical fiction'', ''Book club participation'', ''Hiking'', ''Yoga'', ''Volunteering at animal shelter'', ''Community theater fundraising'']'
  career_goals: Catherine aims to advance to a senior leadership role such as Director of Development or Communications within a regional nonprofit or healthcare organization in the Mid‑South. She plans
    to obtain a Certified Fund Raising Executive (CFRE) credential and complete a master’s degree in nonprofit management to deepen her strategic expertise. Over the next five years, she intends to lead
    multi‑million‑dollar fundraising initiatives, expand the organization’s donor base by 30%, and build an integrated communication strategy that enhances community impact. She also aspires to mentor junior
    staff, develop a robust volunteer‑leadership pipeline, and share thought leadership through speaking engagements at industry conferences.
