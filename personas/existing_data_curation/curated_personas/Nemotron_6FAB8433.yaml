personas:
  professional: Shad Kimlinger is a senior sales representative in wholesale manufacturing who leverages their STEM background and polished commercial skill set to translate complex product specs into clear
    value propositions, using data‑driven pipeline forecasting, CRM mastery, and methodical territory planning while maintaining calm composure in high‑stakes negotiations.
  sports: Shad Kimlinger channels their energetic and competitive streak into a weekend amateur soccer league with the Cleveland Celtic Club while also organizing group hikes through the Cleveland Metroparks,
    cheering on the Browns and Cavaliers on game days, and maintains a disciplined fitness regimen that balances team drills with solo cardio to manage their soccer‑induced back strain.
  arts: Shad Kimlinger cultivates a deep appreciation for contemporary art by frequenting Cleveland's Museum of Art openings, guiding visitors as a docent, snapping urban photographs inspired by Henri Cartier‑Bresson,
    and collecting prints from artists such as Yayoi Kusama and James Turrell, which they discuss over dinner with their spouse.
  travel: Shad Kimlinger plans methodical long‑weekend escapes to emerging tech hubs like Austin, Seattle, and Boston’s biotech corridor—often using meticulous itineraries and budgeting tools—while also
    penciling in a future trip to Berlin’s startup scene, balancing their love for new experiences with the practical constraints of a growing career and a shared marital schedule.
  culinary: Shad Kimlinger’s palate constantly seeks novelty, from savoring authentic Korean bibimbap with gochujang to devouring Ethiopian injera with berbere‑spiced lentils, and while their cooking skill
    is modest, they often attempt to recreate ramen broth using kombu and miso, pairing meals with craft beers from Cleveland’s local breweries.
  core: Shad Kimlinger blends relentless curiosity and methodical planning with a calm, almost stoic demeanor, juggling a skeptical eye for hype, a habit of over‑organizing weekend activities, and an occasional
    neglect of proper warm‑ups before soccer matches.
background:
  cultural: Shad grew up in the Greater Cleveland area, raised in a middle‑class white family with Irish‑German roots. The region's strong work ethic, straightforward communication style, and community‑centric
    values shaped his reliability and organized approach. He was exposed early to the city's industrial heritage and vibrant arts scene, fostering his blend of practical competence and artistic curiosity.
    Local traditions—such as attending community festivals, supporting local sports, and participation in neighborhood volunteer initiatives—reinforce his sociable, outgoing disposition while his family
    emphasizes resilience and calm under pressure.
