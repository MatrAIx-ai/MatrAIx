  career_goals: Shad aims to progress from senior sales representative to regional sales manager within the next three years, eventually targeting a director‑level position overseeing national accounts
    for sustainable manufacturing solutions. He is driven to become a thought leader who integrates emerging technologies—such as IoT‑enabled equipment—into sales strategies, positioning his company at
    the forefront of industry innovation. Long‑term, he envisions launching his own consulting firm that advises manufacturers on data‑centric sales models while maintaining a balanced life that supports
    his marriage and community involvement.
