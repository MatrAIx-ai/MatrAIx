  hobbies: '["Reading (Mexican literature and educational research)","Gardening (desert‑native plants)","Hiking in the Sonoran Desert","Cooking traditional Mexican cuisine","Yoga and mindfulness meditation","Chess","Volunteer
    tutoring for ESL students","Participating in small cultural gatherings (e.g., Día de los Muertos, family celebrations)","Learning Nahuatl","Pottery and ceramics"]'
  career_goals: Carmen aims to advance to a district‑level curriculum coordinator role, where she can shape bilingual education policy across Maricopa County schools. She plans to earn an Ed.D. in Educational
    Leadership to strengthen her strategic impact. Over the next five years, she hopes to launch a pilot program that integrates culturally responsive pedagogy with technology, publish research on bilingual
    instructional outcomes, and earn recognition as a thought leader in multilingual education. Ultimately, she aspires to become an assistant principal, using her competitive drive to champion academic
    excellence and equity for Mexican‑American students.
