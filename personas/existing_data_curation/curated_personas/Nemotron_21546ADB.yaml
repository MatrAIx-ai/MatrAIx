personas:
  professional: Mario Smith applies twenty years of commercial janitorial mastery, specializing in green cleaning, HVAC upkeep, and precise inventory control, while their curiosity for preserving artwork
    fuels a reputation as a reliable partner for museums, and their organized, cooperative nature positions them for a forthcoming facility management supervisory role.
  sports: Mario Smith enjoys pick‑up basketball at the East Lake Community Center, follows the Birmingham Barons baseball team and the Alabama Crimson Tide football squad, and tracks the Miami Heat for
    NBA excitement, using weekly games as both social and fitness outlets.
  arts: Mario Smith immerses themselves in Birmingham’s vibrant art scene, sketching murals inspired by Kara Walker’s storytelling, listening to John Coltrane and B.B. King while curating community art
    projects, and regularly visiting galleries featuring contemporary Southern artists.
  travel: Mario Smith favors budget‑friendly road trips, having explored Asheville, Nashville, and the Great Smoky Mountains, while dreaming of cultural pilgrimages to Paris’s Musée d’Orsay and Florence’s
    Uffizi, planning each getaway around modest savings and occasional family gifting.
  culinary: Mario Smith enjoys cooking Southern soul food at an intermediate skill level, perfecting dishes like fried catfish with collard greens, shrimp and grits, and cornbread infused with fresh thyme
    and parsley from their backyard herb garden, often pairing meals with sweet tea and classic blues playlists.
  core: Mario Smith blends meticulous green‑cleaning expertise with an artistic curiosity and nightly journaling, navigating life’s stresses through guided meditation while occasionally over‑organizing
    both work schedules and herb patches.
background:
  cultural: Mario grew up in a close‑knit Black community in Birmingham, a city steeped in civil‑rights history. He was raised attending the 16th Street Baptist Church, where gospel music, preaching, and
    community service were central to family life. Family gatherings often featured soul food, storytelling, and discussions about local history, reinforcing a strong sense of Southern Black identity. The
    legacy of the Birmingham movements, the jazz clubs of the 1960s, and the city’s contemporary art resurgence have shaped his appreciation for cultural expression. Mario’s worldview balances the traditions
    of Southern hospitality, church fellowship, and the ongoing pursuit of progress and education, which fuels his curiosity and desire to contribute positively to his community.
attributes:
  skills: '["Commercial cleaning", "Facility maintenance", "Safe chemical handling", "Inventory management", "Time management", "Team collaboration", "Customer service", "Basic HVAC troubleshooting", "Green
    cleaning practices", "Documentation and reporting", "Problem solving", "Art handling awareness"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and mural painting", "Listening to jazz and blues music", "Reading non-fiction and philosophy", "Playing pick‑up basketball", "Cooking Southern
    soul food", "Gardening", "Volunteering at community art programs", "Meditation and journaling"]'
  career_goals: Mario aims to move into a supervisory role within facility management, ideally at a cultural institution such as the Birmingham Museum of Art or a community arts center. He plans to earn
    a Certified Professional Facility Manager (CPFM) credential and a Green Cleaning Specialist certification within the next two years. Completing his associate degree in facilities management is also
    a priority, so he can oversee larger properties, manage budgets, and train junior staff. In the longer term, Mario dreams of launching his own eco‑friendly cleaning business that serves schools, churches,
    and museums across the Black Belt, integrating sustainable practices and community‑based hiring.
