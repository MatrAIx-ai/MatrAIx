persona_description: A Greek politician who served as a former Minister, Lawyer, and Historian. He was involved in various military and political roles, including serving as an artillery officer during
  World War II and later in the Hellenic Army. He also held important positions in the Greek government, such as secretary general in the Ministry for Northern Greece and the Minister of Industry. He was
  a close aide to former Prime Minister Constantine Karamanlis and passed away in 2013 at the age of 98.
