  career_goals: Kevin aspires to transform his current massage studio into a community‑centered wellness hub that blends therapeutic touch with artistic expression. Over the next three years he plans to
    earn certifications in craniosacral therapy and wellness coaching, and to launch a series of art‑infused meditation workshops. He envisions partnering with local painters to create an ever‑changing
    mural space in his studio, and eventually offering a mobile massage service for corporate wellness events and outdoor festivals. His ultimate ambition is to be recognized as Fontana's go‑to practitioner
    for holistic health while preserving the flexible, low‑key schedule that suits his lifestyle.
