persona_description: A high-level official in the U.S. government, specifically within the National Nuclear Security Administration (NNSA), responsible for overseeing the implementation of President Obama's
  agenda to secure nuclear material around the world. This individual is knowledgeable about the agency's key programs, such as the Domestic Material Protection and Domestic Radiological Material Removal
  programs, which are part of the agency's broader efforts to secure vulnerable nuclear and radiological material. The individual has a deep understanding of the President's budget request for FY 2012 and
  the resources required to implement the agenda. This persona is also aware of the importance of the agency's role in promoting the responsible application of nuclear technology and science.
