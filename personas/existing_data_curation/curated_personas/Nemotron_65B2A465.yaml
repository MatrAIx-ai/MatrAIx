  career_goals: Kent aims to complete an associate’s degree in horticulture and obtain professional certifications such as the Landscape Industry Certified Technician and OSHA safety credentials within
    the next two years. He plans to advance from crew member to crew supervisor, gaining leadership experience while mentoring newer workers. Ultimately, he aspires to launch his own environmentally‑focused
    landscaping company that specializes in native‑plant installations, rain‑garden design, and low‑maintenance solutions for residential and small‑scale commercial clients in the Stark County region. He
    also hopes to incorporate emerging technologies like drone‑based site mapping and GIS‑driven design to differentiate his business and improve efficiency.
