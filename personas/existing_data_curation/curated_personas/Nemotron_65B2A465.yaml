personas:
  professional: Kent Hebert is a burgeoning horticulture professional who leverages their hands‑on landscaping experience, native‑plant expertise, and knack for integrating emerging drone‑mapping technology
    to design low‑maintenance, eco‑friendly outdoor spaces, while applying their organized yet adaptable project‑management style and persuasive communication to lead crews and delight clients.
  sports: Kent Hebert competes on a local intramural soccer team, follows the Cleveland Browns and Ohio State Buckeyes with fervor, and mixes cardio hikes in the rolling hills of Stark County with weekend
    fishing trips on the Tuscarawas River, exercising a competitive edge while they value teamwork and community camaraderie.
  arts: Kent Hebert spends evenings shredding on an electric guitar with a preference for classic rock icons like Jimi Hendrix and modern prog acts such as Tool, curates playlists featuring video‑game composers
    like Koji Kondo, and occasionally attends live performances by regional folk bands in downtown Massillon, letting music fuel their creative woodworking projects.
  travel: Kent Hebert plans trips with a blend of spontaneity and meticulous route mapping – they’ve hiked the limestone bluffs of Hocking Hills, camped under the stars in the Appalachian Trail’s southern
    terminus, dream of exploring New Zealand’s South Island for its pristine native flora, and prefer road‑trip adventures that keep travel costs low while satisfying their curiosity for rugged landscapes.
  culinary: Kent Hebert enjoys grilling freshly caught Tuscarawas River trout seasoned with rosemary, sage, and locally sourced corn on the cob, experiments with native edible herbs like wild garlic and
    lambs‑quarters in a modest kitchen, and uses a DIY smoker they built from reclaimed wood to infuse smoky flavors into bratwurst, showcasing a balance of rustic cooking skills and an adventurous palate.
  core: Kent Hebert blends relentless curiosity with practical calm, building eco‑friendly landscapes by day and riffing on guitar riffs by night, while they juggle a tight budget, a mild hay fever flare‑up,
    and an ever‑growing collection of DIY projects that never quite stay finished.
background:
  cultural: Kent grew up in Massillon, a small city in Stark County that carries a strong Midwestern work ethic and a tight‑knit sense of community. His family traces roots to German and Irish immigrants
    who settled in the region in the early 20th century, and they have passed down values of self‑reliance, modesty, and respect for the land. He attended the local public high school, where Friday night
    football games and community fairs were major social events, reinforcing his outgoing nature. Weekend activities often involved helping neighbors with yard work, participating in church youth groups,
    and attending the annual Stark County Fair, which fostered his appreciation for local agricultural traditions. This cultural environment blends practicality with a friendly openness, encouraging Kent
    to pursue hands‑on trades while staying connected to his community.
