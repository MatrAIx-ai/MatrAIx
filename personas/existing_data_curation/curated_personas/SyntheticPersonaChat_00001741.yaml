  Best Generated Conversation: 'User 1: I''m a veteran.

    User 2: Oh really? Me too. I got out a few years ago.

    User 1: Oh nice. What branch were you in?

    User 2: I was in the Army.

    User 1: Me too! What was your MOS?

    User 2: I was a combat medic.

    User 1: Oh nice. I was a combat engineer.

    User 2: Cool. We probably would have worked together if we were still in.

    User 1: Yeah, probably. So what are you up to now?

    User 2: I''m going to school to get my bachelor''s degree.

    User 1: Oh nice. What are you studying?

    User 2: I''m studying business.

    User 1: Cool. I''m sure you''ll do great.

    User 2: Thanks. I''m trying.

    User 1: So, what''s your favorite thing about being a veteran?

    User 2: I would say the camaraderie. The military is a special place, and the bond you make with the people you serve with is something that can''t be broken.

    User 1: I agree. The people I met in the military are still some of my best friends.

    User 2: Same here. So, what do you do for a living now?

    User 1: I work at a hotel.

    User 2: Oh cool. I''ve always thought about working in a hotel.

    User 1: It''s not bad. It can be a lot of work, but it''s also pretty fun.

    User 2: Yeah, I can imagine. So, what''s your favorite thing about working at a hotel?

    User 1: I would say the people. I get to meet all sorts of interesting people from all over the world.

    User 2: That sounds like it would be a lot of fun.

    User 1: It is. I love meeting new people and learning about their cultures.

    User 2: So, what are you doing this weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m going to visit my girlfriend''s family.

    User 1: Oh nice. I''m sure you''ll have a good time.

    User 2: Thanks. I hope so.

    User 1: So, what''s your girlfriend''s name?

    User 2: Her name is Sarah.

    User 1: Oh nice. What''s she like?

    User 2: She''s great. She''s smart, funny, and beautiful.

    User 1: She sounds like a catch.

    User 2: She is. I''m lucky to have her.

    User 1: I''m sure you are. So, when did you meet her?

    User 2: We met in college.

    User 1: Oh nice. How long have you been together?

    User 2: We''ve been together for about three years.

    User 1: Oh nice. Congratulations.

    User 2: Thanks. I appreciate it.

    User 1: So, what are your plans for the future?

    User 2: I''m not sure yet. I''m just enjoying the present moment.

    User 1: That''s a good attitude. I''m sure you''ll figure it out eventually.

    User 2: Thanks. I appreciate it.'
