personas:
  professional: Donald Bonsall is an emerging digital media creator who leverages Adobe Creative Suite, video editing, and project management tools to deliver polished freelance branding projects, channeling
    his competitive drive and meticulous organization into tight deadlines, while his skeptical edge fuels rigorous concept evaluation and his sociable nature shines in collaborative design club leadership.
  sports: Donald Bonsall is a devoted pick‑up basketball enthusiast who plays every Thursday at the Cleveland community center, avidly follows the Cleveland Cavaliers and keeps a casual membership with
    a local cycling club that rides the Lake Erie trail during summer, using sport as both social outlet and stress‑relief.
  arts: Donald Bonsall immerses himself in the Cleveland art scene, drawing surreal inspirations from Salvador Dali and contemporary digital artists like Mike Winkelmann (Beeple), while his playlist of
    indie favorites such as Phoebe Bridgers and experimental acts like Oneohtrix Point Never fuels his nightly sketching and experimental video projects.
  travel: Donald Bonsall prefers short, budget‑friendly trips that blend creative research with adventure, having documented street life in Detroit's Midtown and hiked Hocking Hills State Park, while dreaming
    of a semester abroad in Kyoto to study traditional ukiyo‑e prints and seeking a future art‑focused road trip along the Pacific Coast.
  culinary: Donald Bonsall experiments with fusion cuisine, frequently whipping up Korean‑Italian tacos topped with gochujang‑marinated short ribs and fresh basil, while his go‑to comfort dish is a miso‑infused
    carbonara, and he proudly markets his culinary experiments on Instagram alongside his digital illustrations.
  core: Donald Bonsall is a hyper‑organized, competitively driven 18‑year‑old digital artist who balances relentless creative output with chronic worry, turning his anxiety into daily bullet‑journal rituals
    and a drive to out‑perform peers while occasionally indulging in impulse art‑supply splurges.
background:
  cultural: Donald was raised in Bay Village, an affluent suburb on the shores of Lake Erie in Cuyahoga County, Ohio. His family is of primarily German and Irish descent, reflecting the broader Northern
    European heritage common among many white residents of the region. The Midwestern values of hard work, community involvement, and modesty are woven into his upbringing; his parents emphasized disciplined
    study habits and volunteering at local charitable events. Growing up close to Cleveland, he was exposed to the city’s rich cultural offerings—from the Rock and Roll Hall of Fame and the Cleveland Orchestra
    to the annual Cleveland International Film Festival—sparking his appreciation for diverse artistic expressions. While he identifies with mainstream American culture, he also cherishes the regional pride
    in the area’s sports teams (the Browns, Cavaliers, and Indians) and the lake‑side lifestyle that encourages outdoor activities. This blend of suburban stability, European heritage, and access to an
    urban arts scene shapes his worldview, blending traditional values with an openness to unconventional ideas.
attributes:
  skills: '["Graphic Design", "Digital Illustration", "Video Editing", "Project Management (Trello, Asana)", "Public Speaking", "Team Leadership", "Critical Thinking", "Market Research", "Basic Web Design
    (HTML/CSS)", "Stress Management (Journaling, Mindfulness)"]'
  hobbies: '["Visiting museums and art galleries", "Digital illustration and sketching", "Urban street photography", "Pick‑up basketball", "Improv theater", "Bullet journaling", "Listening to indie/experimental
    music", "Reading science‑fiction novels", "Cooking experimental/fusion dishes", "Participating in hackathons and design challenges", "Cycling along Lake Erie trails"]'
  career_goals: Donald aims to leverage his associate's degree in Digital Media to gain admission to a four‑year BFA program at a university known for its strong design faculty. In the short term, he plans
    to build a robust freelance portfolio, secure at least five paid clients, and have his work featured in a local gallery or the Cleveland Museum of Art's youth exhibition. He aspires to launch his own
    boutique creative studio within five years, offering integrated branding, video production, and web design services to small businesses in the Greater Cleveland area. His competitive nature drives him
    to pursue industry certifications in Google Analytics and CAPM, and he hopes to eventually become a creative director or strategic brand manager, shaping campaigns that blend artistic innovation with
    measurable results. Alongside career advancement, he is committed to maintaining mental well‑being and intends to mentor other young artists on stress coping strategies.
