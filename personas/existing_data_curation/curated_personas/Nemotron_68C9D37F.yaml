  hobbies: '[''Gardening (native Southern plants)'', ''Church choir (gospel singing)'', ''Reading historical fiction and local civil rights history'', ''Quilting'', ''Walking and biking on the Chattahoochee
    River trail'', ''Cooking Southern comfort food'', ''Volunteering at the senior center'', ''Attending community festivals'', ''DIY home improvement projects'']'
  career_goals: Tomesia aims to move into a senior administrative supervisory role where she can oversee office operations, mentor junior clerks, and lead efficiency‑boosting projects. She plans to earn
    a Certified Administrative Professional (CAP) credential to deepen her expertise in modern office technologies and best practices. Over the next five years she hopes to manage a small team, implement
    streamlined filing and digital workflow systems, and eventually transition to a part‑time home‑based bookkeeping consultancy that leverages her strong numerical and organizational skills while providing
    financial security for her retirement.
