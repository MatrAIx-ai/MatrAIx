personas:
  professional: Tomesia Laribo, a veteran office clerk with over 25 years of high‑volume data entry and records mastery, leverages her methodical, competitive nature to design Excel macro‑driven workflows,
    mentor junior staff, and champion office‑wide efficiency projects as she pursues a senior administrative supervisory role.
  sports: Tomesia Laribo maintains fitness by cycling with the Chattahoochee River Trail Cycling Club, walking the trail five times a week, and keeps a loyal fanhood for the Atlanta Braves and the Georgia
    Bulldogs football, treating her training regimen with the same measured precision she brings to office scheduling.
  arts: Tomesia Laribo finds artistic expression in her church choir, where she sings gospel classics by Mahalia Jackson and Mavis Staples, devotes evenings to quilting inspired by traditional Southern
    patterns, and immerses herself in historical fiction by Ken Follett, letting music and textile art enrich her community life.
  travel: Tomesia Laribo prefers meticulously planned road trips that blend Southern history and natural beauty, such as weekend getaways to Savannah’s historic squares, a pilgrimage to Selma’s civil‑rights
    landmarks, a summer hike through the Blue Ridge Mountains, and an occasional cultural escape to Edinburgh’s historic Old Town, while balancing travel costs with family responsibilities.
  culinary: Tomesia Laribo relishes cooking Southern comfort fare, expertly preparing fried chicken, buttery collard greens seasoned with fresh garden rosemary, and peach cobbler topped with a pinch of
    nutmeg, approaching each dish with a methodical, spreadsheet‑like precision that still leaves room for spontaneous herb‑infused twists.
  core: Tomesia Laribo, a detail‑driven office veteran who balances methodical efficiency with a love for gospel choirs, native gardens, and Southern comfort cooking, navigates life with pragmatic curiosity
    and a quietly competitive edge.
background:
  cultural: Tomesia is an African‑American woman who was born and raised in Columbus, Georgia. She grew up in a close‑knit, church‑centered community that emphasized family ties, mutual support, and cultural
    pride. Her upbringing instilled a respect for Southern culinary traditions blended with African‑American heritage, such as soul food staples and seasonal garden harvests. She participates in cultural
    celebrations like Juneteenth and local heritage festivals, and she values the legacy of resilience and collective advancement that defines the Black experience in the South. These cultural influences
    shape her sense of responsibility, community service, and appreciation for both tradition and progress.
attributes:
  skills: '[''High‑volume data entry'', ''Records management'', ''Scheduling and calendar coordination'', ''Microsoft Office Suite (Word, Excel, Outlook) proficiency'', ''Spreadsheet analysis and macro
