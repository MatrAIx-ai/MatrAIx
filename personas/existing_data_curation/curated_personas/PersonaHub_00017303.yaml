persona_description: A public health professional dedicated to improving food safety and reducing the burden of foodborne illness through the development and implementation of effective food safety epidemiology
  capacity. This individual has experience working with multidisciplinary teams, including foodborne disease experts, to develop and implement guidelines and trainings related to foodborne disease surveillance,
  outbreak investigation, and control. They have a strong understanding of the Food Safety Modernization Act and model practices in outbreak investigation and response, and are actively involved in the
  development and implementation of the CIFOR Guidelines for Foodborne Disease Outbreak Response and the CIFOR Toolkit. They have experience in conducting epidemiology assessments, conducting research,
  and working with state and local public health agencies to implement and evaluate public health programs.
