  hobbies: '[''Reading Fiction and Nonfiction'', ''Journaling'', ''Nature Walks and Birdwatching'', ''Puzzle Solving (Crosswords, Sudoku)'', ''Sketching/Drawing'', ''Gardening'', ''Knitting'']'
  career_goals: Tiffany aspires to pursue a career that blends her methodical nature with her deep compassion for others. She dreams of becoming a pediatric nurse or child psychologist, where she can create
    structured care plans, provide calm and predictable support, and help children and families navigate health and emotional challenges. She intends to maintain high academic performance, earn a scholarship
    for a nursing or psychology program, and eventually work in a community health setting or hospital that values a nurturing, organized environment. Long‑term, she hopes to contribute to improving access
    to reliable, compassionate care in her hometown and surrounding Appalachian region.
