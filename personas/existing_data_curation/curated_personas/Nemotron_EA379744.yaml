personas:
  professional: Tiffany Moore, a diligent middle-school student with a budding talent for natural‑science writing, channels their methodical planning, compassion, and love for solitary study to excel in
    science‑fair projects and lead their school's garden club.
  sports: Tiffany Moore enjoys gentle fitness activities such as weekend nature hikes with the local youth outdoor club and after‑school cross‑country runs, supports the New York Knicks and the New York
    Rangers, and they rarely participate in organized team sports, preferring the quiet rhythm of walking and solo jogging to the bustle of the gym.
  arts: Tiffany Moore expresses their creativity through sketching delicate wildflower studies and knitting cozy scarves, draws inspiration from the botanical illustrations of Maria Sibylla Merian, the
    watercolor serenity of Claude Monet, and the storytelling melodies of folk singer Sufjan Stevens, and they occasionally share their photographs of forest scenes on a private Instagram account.
  travel: Tiffany Moore dreams of exploring the misty trails of the Great Smoky Mountains and the serene lakes of Banff National Park, prefers meticulously planned itineraries with quiet cabin stays, and
    they have already visited the nearby state forest for weekend walks, while they avoid crowded amusement parks, favoring solitude over bustle.
  culinary: Tiffany Moore delights in cooking simple garden‑fresh meals like basil pesto pasta, roasted root vegetables, and herb‑infused lemon tea, enjoys the tactile process of kneading dough for homemade
    banana bread, but they often forget to set a timer, resulting in occasional over‑baked treats.
  core: Tiffany Moore is a meticulously organized, quiet 12‑year‑old who channels their relentless worry into journaling, garden‑care, and puzzle‑solving, all while gifting hand‑knit scarves to friends
    and secretly hoarding extra chocolate for rainy days.
background:
  cultural: Tiffany is raised in a white, Appalachian family in Smithers, West Virginia. The community emphasizes close family bonds, self‑reliance, and a strong sense of loyalty to neighbors. Local traditions
    such as church gatherings, folk music sessions, seasonal festivals, and seasonal cooking (e.g., corn‑bread, beans, and homemade preserves) have shaped her values of cooperation and humility. Growing
    up in a rural setting fosters a practical, modest outlook and a respect for quiet, respectful conduct, which aligns with her preference for solitude. The region’s emphasis on helping one another during
    hard times reinforces her compassionate and cooperative nature.
