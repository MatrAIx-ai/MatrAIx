  career_goals: Although retired from formal employment, Betty aims to stay intellectually active and to give back to her community. She aspires to mentor high‑school students interested in science through
    local STEM outreach, to co‑author a small oral‑history booklet documenting the experiences of West Mifflin’s older residents, and to complete an online certification in digital photography. She also
    hopes to maintain her health and independence by staying physically active and to travel with her close friends to historical sites in the northeastern United States.
