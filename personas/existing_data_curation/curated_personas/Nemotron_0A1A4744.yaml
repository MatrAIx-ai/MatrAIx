personas:
  professional: Andres Cruz, an 88-year-old artisan and community mentor, weaves his woodcarving expertise, storytelling talent, and cuatro improvisations into the yearly patron saint festivals while guiding
    younger locals in traditional craft and music.
  sports: Andres Cruz enjoys gentle morning walks along the shoreline, tends to his garden as a form of low‑impact exercise, and watches the local baseball team, the Cangrejeros de Santurce, from his porch
    while sipping a coffee.
  arts: Andres Cruz, a watercolor painter and cuatro player, creates abstract seascapes inspired by bioluminescent tides, improvises melodies echoing Bomba and Plena rhythms, reads and recites poetry by
    Alfonsina Storni, and frequently attends the town’s festival where he admires performances by singer Silvio Rodríguez.
  travel: Andres Cruz favors short, low‑stress trips to nearby villages and coastal spots like Vieques to experience bioluminescent bays, has long dreamed of exploring historic Cartagena, but now plans
    his travels around family gatherings and his pension’s limits.
  culinary: Andres Cruz, a culinary enthusiast, expertly prepares mofongo with garlic‑infused broth and arroz con gandules flavored with annatto, harvests fresh cilantro and culantro from his garden, and
    treats friends to a caramel‑drizzled flan with a splash of rum.
  core: Andres Cruz, an imaginative octogenarian, blends sketching, storytelling, and cuatro improvisation into each day while battling persistent worries and a habit of leaving many creative projects unfinished.
background:
  cultural: Andres was born and raised in Maunabo, a small coastal municipality steeped in Puerto Rican traditions. His cultural identity blends Spanish colonial influences, Taíno heritage, and Afro-Caribbean
    rhythms that define the island's music and folklore. He grew up participating in the town's patron saint festival, where Bomba drums, pastelillos, and communal meals forged strong family bonds. The
    Catholic faith, woven into daily life, shaped his respect for community and ritual. Maunabo's natural beauty—its beaches, the bioluminescent bay, and tropical flora—has inspired his artistic sensibilities.
    Throughout his life, Andres has navigated the challenges of limited formal education, relying on curiosity and imagination to become a cultural steward, preserving stories, crafts, and culinary practices
    for future generations.
