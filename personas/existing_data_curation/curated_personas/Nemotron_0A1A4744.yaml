  career_goals: Even at 88, Andres is driven by the ambition to leave a lasting cultural legacy. He plans to compile his stories and poems into a handwritten memoir for his grandchildren, preserving the
    oral history of Maunabo. He aspires to mentor younger community members in woodworking and music, fostering a new generation of artisans. Andres also hopes to spearhead a collaborative mural project
    that blends abstract art with local symbols, creating a visual narrative that celebrates the town's heritage. His ultimate goal is to ensure that the traditions he cherishes endure beyond his lifetime,
    while maintaining his mental sharpness through continuous learning and creative expression.
