    User 2: Oh, I like crime dramas too. What are some of your favorites?

    User 1: I like The Wire, The Sopranos, and Breaking Bad.

    User 2: I''ve never seen The Wire or Breaking Bad, but I''ve heard good things about them.

    User 1: You should check them out. They''re really good.

    User 2: I will. Thanks for the recommendation.

    User 1: No problem. So, what are you up to this weekend?

    User 2: I''m not sure yet. I might go to the movies or just stay home and relax.

    User 1: That sounds like a good plan. I''m going to go to the movies too. I''m excited to see the new Batman movie.

    User 2: Oh, that sounds good. I''ve heard good things about it.

