personas:
  professional: Dillon Funk, an aspiring UI/UX designer and multimedia artist, leverages their solid foundation in visual communication, Adobe Photoshop and Illustrator mastery, and budding Python automation
    skills to craft user‑centered digital experiences while meticulously planning each project timeline with their organized, methodical nature.
  sports: Dillon Funk enjoys hiking the Rocky Mountain trails, follows the Denver Broncos football team, roots for the Colorado Avalanche, and plays pickup soccer with friends at the local park during summer,
    combining personal outdoor activity with passionate fandom for Colorado’s professional sports clubs.
  arts: Dillon Funk, an avid sketcher and digital illustrator, frequently visits the Denver Art Museum to study works by Ansel Adams and Alex Ross, streams indie concerts featuring The Shins and Phoebe
    Bridgers, and draws inspiration from speculative fiction authors like N. K. Jemisin, weaving these influences into their own creative projects.
  travel: Dillon Funk favors thoughtfully planned adventures, often weekend‑camping at Rocky Mountain National Park, has a bucket‑list destination of Kyoto’s temples for its serene design aesthetic, and
    dreams of a road trip through Iceland’s volcanic landscapes, balancing budget constraints with a desire for immersive cultural experiences.
  culinary: Dillon Funk enjoys hearty Colorado green chili with local trout, experiments with homemade ramen broth featuring miso and sriracha, and crafts avocado toast topped with goat cheese, yet admits
    a habit of ordering takeout late at night after marathon design sessions, reflecting a blend of culinary curiosity and occasional indulgence.
  core: Dillon Funk merges a curiosity‑driven love of art and technology with disciplined organization, allowing them to design compelling digital experiences while still finding time for spontaneous hikes,
    coffee‑shop sketches, and late‑night ramen cravings.
background:
  cultural: Dillon grew up in Littleton, a suburban community in the Denver metropolitan area, where the blend of a Midwestern work ethic and Colorado’s outdoor, progressive culture shaped his values. His
    family’s European ancestry—primarily German and Irish—exposed him to a mix of traditions, but he identifies primarily with the local community’s emphasis on education, civic involvement, and appreciation
    for the natural environment. This background reinforces his organized, cooperative nature and his curiosity about art and new ideas.
