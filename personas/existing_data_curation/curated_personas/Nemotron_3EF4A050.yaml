  hobbies: '[''Sketching'', ''Digital illustration'', ''Photography'', ''Hiking in the Rocky Mountains'', ''Visiting art museums and galleries'', ''Playing acoustic guitar'', ''Reading speculative fiction'',
    ''Attending indie concerts'', ''Exploring coffee shops'']'
  career_goals: Dillon aims to complete a bachelor’s degree in visual communications or interactive design within the next three years, securing internships at design studios or creative agencies in the
    Denver area. He envisions a career as a UI/UX designer or multimedia artist, eventually leading a creative team that produces innovative, user‑centered experiences. His long‑term ambition is to blend
    his love for art and technology in a role that shapes digital storytelling while maintaining a balanced, purposeful lifestyle.
