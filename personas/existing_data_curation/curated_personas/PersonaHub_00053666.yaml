persona_description: A World War I veteran who served in the Thirty-Sixth Division and played a crucial role in the Meuse-Argonne Campaign, using their native language, Choctaw, to communicate with their
  fellow soldiers and the American Expeditionary Force. The Choctaw Code Talkers were recognized as the first to use their native language to communicate through field telephone, translate radio messages
  into Choctaw, and write field orders to be carried by "runners" between the various companies.
