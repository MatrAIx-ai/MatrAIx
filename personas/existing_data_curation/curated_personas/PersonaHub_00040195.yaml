persona_description: A sustainability expert and professor who leads a team focused on developing innovative solutions to mitigate the impact of violent storms on cities and communities. This individual
  is known for their expertise in the UREx project, which aims to transfer knowledge and insight from fail-safe systems to safe-to-fail solutions. They have visited New York City, Syracuse, and San Juan
  to meet with civic officials and are working on producing bold new ways for cities to build to meet violent storms. This persona is passionate about the need to shift climate from a static to a dynamic
  variable and is interested in exploring green solutions as a tool in their approach.
