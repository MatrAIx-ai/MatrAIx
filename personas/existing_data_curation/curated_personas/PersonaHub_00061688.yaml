persona_description: A dairy processing engineer who is interested in the complex world of milk powder processing, particularly in the aspects related to milk sugar or lactose, its properties, and its use
  in the manufacturing of milk powders. This persona is knowledgeable about the physical-chemical properties of lactose, its solubility in water, and its specific optical rotation, and is interested in
  the relationships between various forms of lactose as described in the text. This persona is also interested in the heat of crystallization of lactose, its importance in the manufacturing of milk powders,
  and the calculations related to it. This persona is interested in the Handbook of Milk Powder Manufacture as a valuable reference book for dairy processing engineers.
