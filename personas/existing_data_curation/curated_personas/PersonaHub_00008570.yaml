persona_description: A historian who specializes in the study of World War I and aviation during that era. Their interest lies in the development of aircraft, their use in the war, and the impact of aircraft
  on the course of the war. They are particularly interested in the development of fighter pilots, their role in the war, and the strategic roles of aircraft in future wars. They are also interested in
  the impact of aircraft on the development of military tactics and the role of high-ranking officers in directing air war efforts.
