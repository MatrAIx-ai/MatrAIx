  career_goals: William aims to move from front‑line customer service into a customer‑experience leadership role, such as a Customer Experience Manager or Training Coordinator, where he can design imaginative
    service programs that blend art and storytelling. He envisions creating a mentorship program for new hires that emphasizes empathy and creative problem‑solving. Long‑term, he hopes to publish a guide
    on "Storytelling in Customer Service" and perhaps curate community art events that highlight the intersection of hospitality and visual culture, while maintaining a flexible work style that respects
    his need for spontaneity and personal expression.
