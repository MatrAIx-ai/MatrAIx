persona_description: A wildlife biologist who specializes in studying the wild turkey population and its decline in the Southeastern United States. She has conducted research on the factors contributing
  to the population shift, including encroaching development, chemical herbicides, and natural predators. She has also been involved in tagging and tracking wild turkeys using radio transmitters to better
  understand their movements and distribution. Her research interests include the ecology and conservation of wild turkeys and the impacts of human activities on their populations.
