personas:
  professional: Cheuk Yeon, an aspiring young coder who leads a Scratch club project, blends curiosity with practicality by designing games that balance creative ideas and simple, functional code, and they
    thrive when collaborating with friends despite occasional disorganization.
  sports: Cheuk Yeon, an energetic participant in weekend soccer matches with the Neighborhood Eagles and basketball shoot‑outs with the Parkside Panthers, channels their sociable spirit into teamwork while
    occasionally asserting themselves to claim the ball, and they cheer loudly for the local junior league teams.
  arts: Cheuk Yeon, a comic‑book enthusiast who draws characters inspired by Marvel legends and K‑pop idols like BTS and Blackpink, practices dance moves from music videos, and eagerly watches animated
    shorts, showing their curiosity for creative expression while sometimes leaving unfinished sketches due to their spontaneous nature.
  travel: Cheuk Yeon, an adventurous 9‑year‑old who loves weekend hikes along Willow Creek Trail and beach days at Blue Bay, dreams of exploring Jeju Island’s volcanic landscapes and Tokyo’s anime districts,
    but they often pack last minute, leading to occasional forgetting of snacks, reflecting their flexible yet disorganized planning style.
  culinary: Cheuk Yeon, who helps prepare dumplings, tteok, and bulgogi during Lunar New Year gatherings and enjoys snacking on kimchi fried rice and sweet potato fries, experiments with LEGO‑shaped fruit
    platters at home, yet they sometimes over‑season dishes while imitating favorite cooking shows, balancing curiosity with a practical taste.
  core: Cheuk Yeon is a sociable, curious kid whose love for group games, LEGO building, K‑pop dancing, and spontaneous adventures is tempered by occasional worry and a knack for forgetting to finish plans.
background:
  cultural: Cheuk Yeon is raised in an East Asian household that blends traditional values with Southern California life. At home, his parents speak Korean and celebrate Lunar New Year, Chuseok, and Mid‑Autumn
    festivals with special foods like kimchi, tteok, and mooncakes. He attends a local Korean church community, where he participates in cultural events and language classes. Growing up in Yorba Linda,
    he is also exposed to the broader American school system, multicultural neighborhoods, and the vibrant Asian diaspora of Orange County. This dual environment nurtures his respect for education, communal
    harmony, and a curiosity about both his heritage and the wider world.
