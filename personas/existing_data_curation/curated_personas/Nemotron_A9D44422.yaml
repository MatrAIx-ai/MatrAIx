personas:
  professional: Tennille Thompson is a seasoned residential broker in Orange County who blends meticulous market analysis with empathic negotiation, leveraging MLS data, social‑media advertising, and a
    robust CRM while juggling late‑night property research and a habit of double‑checking contracts before bedtime.
  sports: Tennille Thompson is a regular attendee of Orlando Magic games, holds a season ticket for Orlando City SC, participates in a community pickleball league at the West Orange Trail Recreation Center,
    and completes a three‑mile walk on the trail each morning to clear her mind.
  arts: Tennille Thompson immerses herself in the local arts scene, frequenting jazz nights at the Social, gospel concerts at the historic First Baptist, and collects limited‑edition prints by contemporary
    photographer Lane Johnson, while curating a small home gallery of images from historic Orlando neighborhoods.
  travel: Tennille Thompson delights in weekend getaways to historic Savannah and Charleston, enjoys annual trips to Key West for sunset picnics, and dreams of exploring the music‑rich streets of New Orleans
    and the cultural tapestry of Dakar, Senegal, all while balancing travel costs with a modest travel fund.
  culinary: Tennille Thompson's kitchen is a fragrant blend of collard greens, smoked turkey, jambalaya, and sweet potato pie, seasoned with herbs from her backyard garden like basil and mint, and she loves
    experimenting with Creole roux while occasionally over‑salting dishes in her quest for bold flavor.
  core: Tennille Thompson is a community‑driven real‑estate broker who balances relentless ambition with daily mindfulness, a habit of late‑night market checks, and a love for soulful cooking, jazz, and
    garden herbs.
background:
  cultural: Tennille is a Black woman raised in the vibrant African‑American community of Orlando, where church, family, and neighborhood networks have shaped her values. Growing up, she participated in
    church choirs and community events that emphasized collective support and cultural pride. Her heritage informs her commitment to addressing historic housing disparities; she often mentors African‑American
    first‑time buyers and volunteers with organizations that promote equitable home ownership. Family gatherings feature storytelling, soul food, and music that celebrate her cultural roots, while her professional
    life reflects a desire to build wealth and stability for herself and the broader community.
attributes:
  skills: '[''Negotiation'', ''Client Relationship Management'', ''Market Research and Comparative Analysis'', ''Property Valuation'', ''Real Estate Law Knowledge'', ''Mortgage and Financing Basics'', ''Digital
