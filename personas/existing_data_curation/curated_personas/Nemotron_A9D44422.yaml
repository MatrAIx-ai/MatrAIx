  hobbies: '[''Gardening and urban farming'', ''Cooking traditional Southern and Creole dishes'', ''Walking the West Orange Trail'', ''Reading real estate market reports and personal growth books'', ''Attending
    local jazz and Gospel concerts'', ''Practicing yoga and mindfulness meditation'', ''Volunteering with Habitat for Humanity'', ''Photography of historic neighborhoods'', ''DIY home staging projects'',
    ''Hosting community block parties'']'
  career_goals: Tennille aims to become one of the top‑producing residential brokers in Orange County within the next three years, increasing her closed‑sale volume by at least 15% annually. She plans to
    earn the Certified Residential Specialist (CRS) and Accredited Buyer’s Representative (ABR) designations to deepen her expertise. In the longer term, she envisions launching a boutique boutique agency
    that emphasizes mentorship for women and agents of color, offering workshops on financial literacy and equitable home‑ownership. Balancing her ambition with her sensitivity to stress, she also seeks
    a more predictable schedule that allows regular personal time, ensuring her well‑being as she builds a sustainable, community‑focused business.
