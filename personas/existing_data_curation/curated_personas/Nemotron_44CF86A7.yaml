personas:
  professional: A budding junior coder, Maria Garcia spends weekends programming simple games in Scratch and tinkering with Python scripts, channeling their curiosity and competitive streak into mastering
    logical puzzles while balancing school responsibilities with a methodical, yet flexible, approach.
  sports: A member of the local youth swimming club, Maria Garcia prefers solitary lap training over team sports, cheering for the Miami Dolphins on TV while occasionally joining weekend runs at the nearby
    park to keep fit and clear their mind.
  arts: An avid manga sketcher, Maria Garcia draws detailed characters inspired by the works of Masashi Kishimoto and Studio Ghibli's 'Spirited Away', listening to the lo-fi beats of J-Dilla while doodling,
    and spends free moments re-watching anime series like 'My Hero Academia' for creative fuel, which they use as visual storytelling practice.
  travel: When not stargazing from the backyard, Maria Garcia dreams of visiting the Atacama Desert's night sky observatory in Chile and has already taken a school field trip to the local science museum
    and a weekend hike in the nearby national park to collect rocks, combining curiosity with a love for quiet, off-beat destinations that they cherish as personal retreats.
  culinary: In the kitchen, Maria Garcia assists with preparing tamales and fresh salsa, treating each ingredient—corn masa, roasted chilies, cilantro—as precise variables in a culinary experiment, and
    they meticulously measure each spice to achieve the perfect balance, while also perfecting a favorite snack of homemade trail mix with dried mango, pumpkin seeds, and dark chocolate chips.
  core: Maria Garcia balances a fierce curiosity and competitive drive with a solitary, anxiety-prone temperament, turning late-night reading, puzzle solving, and meticulous cooking into personal sanctuaries
    that they cherish.
background:
  cultural: 'Maria grows up in a Mexican‑American household where Spanish is spoken at the dinner table and many family traditions are preserved. Her parents emigrated from Jalisco and instilled in her
    a love for Mexican culinary arts, the vibrancy of Día de los Muertos celebrations, and the importance of community solidarity. Living in Pompton Lakes, New Jersey, she experiences a blend of suburban
    American life and strong ties to the local Hispanic community, participating in after‑school cultural programs and attending the town’s annual Hispanic Heritage Festival. This bicultural environment
    shapes her identity: she navigates the expectations of a mainstream U.S. school system while maintaining a deep respect for Mexican customs, music, and family values. Her bilingual ability and cultural
    pride also influence her aspirations, as she hopes to give back to both her Mexican roots and her American surroundings.'
attributes:
  skills: '["Bilingual Spanish-English", "Advanced mathematical problem solving", "Basic Python programming", "Scratch visual programming", "Rubik''s Cube solving", "Lego robotics construction and programming",
