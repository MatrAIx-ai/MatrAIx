  hobbies: '["Reading science-fiction and nonfiction about space", "Solving Rubik''s Cubes and other puzzles", "Programming in Scratch and basic Python", "Sketching manga-style drawings", "Cooking tamales
    and salsa with family", "Collecting rocks and minerals", "Stargazing and noting constellations", "Journaling for stress relief"]'
  career_goals: Maria dreams of becoming a biomedical engineer who designs affordable medical devices that can improve health outcomes in Mexican‑American neighborhoods. She is motivated by the practical
    impact of turning scientific ideas into real‑world tools and sees the field as a way to compete in national science competitions and earn scholarships for college. Over the next few years she plans
    to enter science fairs, deepen her coding and biology knowledge, and eventually attend a university with strong engineering programs, where she hopes to lead research projects that merge technology
    with community health. Her long‑term ambition includes mentoring other young students from her cultural background, helping them navigate the same competitive academic pathways she values.
