  hobbies: '[''Reading African American literature'', ''Documentary watching'', ''Book club participation'', ''Gardening'', ''Piano playing'', ''Jazz and gospel listening'', ''Local history tours'', ''Museum
    archival volunteering'', ''Church community events'', ''Daily dog walks'']'
  career_goals: James aims to transition from informal volunteering to a formal role as a community outreach coordinator for a local non‑profit or municipal agency, where he can leverage his organizational
    strengths to support neighborhood development projects. He is also considering pursuing a Master’s in Public Administration to deepen his understanding of policy implementation. Ultimately, he hopes
    to lead initiatives that preserve African American history in Fort Bend County and provide mentorship programs for at‑risk youth, blending his love for education with his commitment to cultural heritage.
