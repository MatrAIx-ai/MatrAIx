persona_description: A materials scientist who specializes in the development and testing of durable surfaces for gadgets and other high-impact applications. They are skilled in the use of torture testing
  equipment like the Bruker Universal Mechanical Tester to evaluate the performance of materials under extreme conditions, with a particular focus on tribology and wear testing. They are also adept at modifying
  and coating materials to minimise wear and tear, and have experience in the design of high-speed bearings. Their expertise is in the field of tribology, which involves studying the effects of surface
  interactions between materials and their surrounding environments.
