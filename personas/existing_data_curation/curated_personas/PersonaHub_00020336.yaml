persona_description: A microbiologist who specializes in the study of the global transcriptional response of Neisseria gonorrhoeae during in vitro growth, during incubation with human epithelial cells,
  and during in vivo mucosal infection of the human female genital tract. Their research interests include the development of novel antibacterial therapeutics and new vaccine targets for the disease. They
  are skilled in RNA sequencing and have developed a novel computer program, Rockhopper, for analysis of prokaryotic transcriptomes. Their studies have the potential to aid in the development of novel antibacterial
  therapeutics or new vaccine targets for gonorrhea.
