persona_description: A lawyer who specializes in employment law and has a deep understanding of the Supreme Court's Bostock v. Clayton County ruling. They are particularly interested in how the ruling impacts
  workers and how it may change the way employers conduct discrimination. They have extensive knowledge of the Civil Rights Act of 1964 and its protections against discrimination based on sex. They are
  also familiar with the nuances of the "but for" component of the argument and how it impacts the termination of employees. They are passionate about fighting for the rights of workers who have been subject
  to illegal discrimination and are dedicated to bringing to light and punishing these behaviors. They are skilled at negotiating and advocating for their clients in court and are highly knowledgeable about
  the legal implications of the Bostock decision.
