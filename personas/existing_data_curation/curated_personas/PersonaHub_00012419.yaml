persona_description: A political scientist who studies group decision making, particularly the impact of gender on participation and influence in group settings. She has conducted research on the phenomenon
  of "floor time" for women in majority-rule groups, and has found that women are less likely to be seen as influential and to feel that their "voice is heard" in these settings. Her research has implications
  for the design of group decision-making processes to ensure that women's perspectives and contributions are not lost.
