  hobbies: '[''Architectural photography'', ''Visiting art galleries'', ''Attending cultural festivals'', ''Playing basketball'', ''Hiking'', ''Cooking Vietnamese cuisine'', ''DIY home improvement'', ''Exploring
    sustainable design'']'
  career_goals: Nhu aims to earn the California Certified Building Official credential and become a senior inspection supervisor within the next three years. He aspires to lead a dedicated team that specializes
    in green building certifications and historic structure evaluations. Long‑term, he envisions launching his own consulting firm that offers compliance training for contractors and community workshops
    on safe, environmentally responsible construction.
