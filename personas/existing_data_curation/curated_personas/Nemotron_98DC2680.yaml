personas:
  professional: An experienced building inspector, Nhu Wang leverages laser measuring tools and deep knowledge of California construction codes to deliver meticulous digital reports, while their curiosity
    and art appreciation drive innovative solutions for historic preservation and green building projects, and their sociable, assertive communication style helps mediate contractor disputes.
  sports: Nhu Wang joins local pickup basketball games at the community center, follows the Los Angeles Lakers and LA Galaxy, hikes the Santa Monica Mountains on weekends, and belongs to a weekend trail‑running
    club that meets at Runyon Canyon.
  arts: Nhu Wang regularly roams LACMA and The Broad for contemporary installations, admires the work of Ansel Adams and James Turrell, and actively participates in the monthly downtown Los Angeles art
    walk, where their eye for light and form feeds their own urban photography.
  travel: Nhu Wang’s travel style blends urban architecture scouting with nature escapes, having explored Kyoto’s temples, Barcelona’s modernist facades, and taken weekend road trips to Big Sur, yet they
    plan a future pilgrimage to the sustainable housing expo in Copenhagen.
  culinary: Nhu Wang delights in cooking traditional family noodle soups with aromatic herbs for friends, experiments with seasonal farm‑to‑table ingredients like kale and quinoa, and hones their culinary
    skills through weekend cooking classes while occasionally over‑salting the broth.
  core: Nhu Wang is a curiosity‑driven building inspector who balances meticulous code enforcement with a passion for photography, spontaneous DIY projects, and a penchant for over‑indulging in camera gear.
background:
  cultural: Nhu grew up in a Vietnamese‑American household in Southern California. Raised bilingual, he celebrates Tet and Mid‑Autumn festivals with his family, preserving traditional customs while embracing
    the multicultural fabric of his community. His parents emphasized respect for elders, collective responsibility, and hard work, values that shape his reliable and cooperative professional demeanor.
    At the same time, living in Eastvale has exposed him to a diverse mix of cultures, influencing his open‑minded outlook and curiosity about art and unconventional ideas.
