personas:
  professional: Oi Chen blends frontline retail competence with bilingual fluency, and they use their eye for visual merchandising and social‑media savvy to boost store traffic, mentor new staff, and envision
    a future supervisory role that will eventually lead to brand‑management responsibilities in a national retailer.
  sports: Oi Chen fuels their love of movement with weekly Zumba and HIIT classes at the Durham Fitness Collective, cheers on the Durham Bulls during baseball season and the North Carolina Tar Heels in
    March Madness, and they join a casual summertime beach volleyball league whenever the weather permits.
  arts: Oi Chen curates an Instagram feed featuring lifestyle tips, travel snapshots, and fashion inspo inspired by the eclectic sounds of Tame Impala, the bold aesthetics of Virgil Abloh, and the cinematic
    flair of directors like Tim Burton, while they frequently attend Durham’s First Friday art walks and stream indie films on weekends.
  travel: Oi Chen prefers spur‑of‑the‑moment weekend getaways, often jet‑setting to vibrant cities like Seoul for street‑food adventures or hopping on a train to Charleston for historic tours, while they
    balance a modest student budget by staying in hostels and sharing rides with friends.
  culinary: Oi Chen enjoys experimenting in the kitchen, whipping up spicy Sichuan mapo tofu, aromatic lemongrass‑infused chicken pho, and buttery Banh Mi sandwiches using gochujang, Thai basil, and fresh
    chilies, all while they document the process for their Instagram followers.
  core: Oi Chen lives by a rhythm of spontaneous social gatherings and last‑minute plans, often forgetting to log daily expenses or keep a tidy calendar, yet they effortlessly turn each moment into a colorful
    Instagram story.
background:
  cultural: Oi Chen is the daughter of first‑generation immigrants from Guangdong, China, who settled in the Research Triangle area during the early 1990s. Raised in a bilingual household, she grew up speaking
    Mandarin at home while receiving her formal education in English, giving her a fluid navigation of both cultures. Family gatherings revolve around traditional customs—preparing dumplings for Lunar New
    Year, observing ancestral rites, and emphasizing respect for elders—while also embracing American holidays and the university culture of Durham. The strong collectivist values instilled by her parents
    shape her emphasis on group harmony, cooperation, and consideration for others. At the same time, her involvement in campus multicultural clubs and Durham’s growing Asian‑American community has broadened
    her outlook, fostering a blend of Eastern heritage and Western independence.
