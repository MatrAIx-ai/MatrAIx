  hobbies: '[''Karaoke with friends'', ''Cooking Asian dishes'', ''Exploring Durham’s coffee shops'', ''Group fitness classes (Zumba, HIIT)'', ''Attending cultural festivals'', ''Social media content creation'',
    ''Board game nights'', ''Volunteering at community centers'', ''Traveling and exploring new places'', ''Reading contemporary fiction and self‑improvement books'']'
  career_goals: Oi aims to complete her associate’s degree in Business Administration within the next twelve months and move into a supervisory role at her current retailer, where she can lead a team and
    shape merchandising strategies. In the longer term, she envisions transitioning into brand management or digital marketing for a national retailer or e‑commerce startup, blending her hands‑on retail
    insights with data‑driven decision making. Ultimately, she hopes to open her own boutique that fuses contemporary fashion with East‑Asian cultural motifs, creating a community space that celebrates
    heritage while offering a curated shopping experience.
