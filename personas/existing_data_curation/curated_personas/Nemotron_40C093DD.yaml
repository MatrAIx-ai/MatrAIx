  hobbies: '[''Visiting art museums and galleries'', ''Attending local theater performances'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Herb gardening'', ''Reading historical fiction'', ''Playing
    bridge'', ''Storytelling at senior center'', ''Traveling to historic sites'', ''Community volunteering'']'
  career_goals: Although approaching her mid‑seventies, Maria remains eager to continue her work in a way that balances her health and her passion for craftsmanship. She aims to transition from full‑time
    installation work to a mentorship role, training a small team of apprentices and passing on her expertise in precision flooring techniques. She hopes to launch a community‑focused project that restores
    historic homes in Salem’s historic district, integrating artistic tile mosaics that reflect her Puerto Rican heritage. Maria also aspires to document her career and family stories in a memoir, preserving
    the narratives of immigrant artisans in New England.
