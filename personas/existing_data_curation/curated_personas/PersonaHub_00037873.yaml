persona_description: A policy researcher and economist who specializes in the field of environmental economics, particularly focusing on the use of carbon taxes and their impact on developing countries'
  greenhouse gas emissions. They are knowledgeable about the estimation of production structures with many inputs, the demand for energy in Canadian manufacturing, the estimation of production structures
  with many inputs, and the impact of carbon taxes on reducing US carbon dioxide emissions. They have experience in using microeconometric models of rationing, imperfect markets, and non-negativity constraints
  to analyze the possibilities of interfuel substitution in manufacturing industries. They have also worked on the scope for fuel substitution in manufacturing industries and have a strong understanding
  of the effects of alternative policy approaches in cutting CO2 emissions.
