  hobbies: '[''Japanese cooking'', ''Gardening (vegetable and herb patches)'', ''Hiking in the Wasatch foothills'', ''Book club (contemporary fiction & travel memoirs)'', ''Cultural-exchange events at senior
    center'', ''Yoga (gentle)'', ''Knitting'', ''Genealogy research'', ''Volunteer translation for health fairs'', ''Craft making (origami, calligraphy)'']'
  career_goals: Although she is currently not in the formal workforce, Ying is motivated to turn her accumulated skills into lasting contributions. She aims to complete her GED within the next year, which
    will open up opportunities to lead a neighborhood garden initiative and to become a certified community health volunteer. She hopes to compile and self‑publish a cookbook that blends Japanese family
    recipes with Utah‑grown produce, and to organize a regular cultural‑exchange series at the local senior center. Long‑term, Ying envisions mentoring younger women in the Asian‑American community, helping
    them navigate education, employment, and family life while also maintaining her own health and well‑being.
