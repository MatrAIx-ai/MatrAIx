persona_description: A marine biologist who is interested in the adaptation and productivity of phytoplankton in pelagic environments. This person is knowledgeable about the fundamental requirements and
  sensitivities of photosynthetic production in plankton, as well as the molecular and submolecular aspects of photosynthetic chemistry. They are interested in the complex interactions between photosynthesis,
  metabolism, and the environment, and are dedicated to understanding the factors that constrain the adaptation and yield of phytoplankton in these environments. They are also interested in the regulatory
  role of ultrastructural and biochemical components that govern photosynthesis, and are interested in the issues of photon harvesting, internal electron transfer, carbon uptake, and the behavior of regulatory
  safeguards in phytoplankton.
