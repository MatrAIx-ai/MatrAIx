    Speaking & Presentation'']'
  hobbies: '[''Cooking Ecuadorian Cuisine'', ''Salsa and Andean Dancing'', ''Community Volunteering'', ''Gardening'', ''Hiking'', ''Tennis'', ''Yoga'', ''Reading Business & Leadership Books'', ''Listening
    to Music (Classic Rock, Latin American)'', ''Attending Cultural Festivals'']'
  career_goals: Sonia aims to advance to a Director of Operations role within the next five years, where she can spearhead sustainability initiatives and lead a digital transformation agenda for a mid‑size
    manufacturing firm. She plans to earn an Executive MBA to deepen her strategic expertise and expand her professional network. Long‑term, she envisions establishing a consultancy that helps U.S. companies
    expand into the Andean market, leveraging her cultural fluency and operational acumen. She is also committed to mentoring women and Latinx professionals, speaking at industry conferences, and publishing
    thought‑leadership articles on inclusive operational excellence.
