  hobbies: '["Quilting", "Crocheting", "Gardening (vegetables and flowers)", "Southern cooking and canning", "Church choir singing (country and bluegrass)", "Senior center bingo", "Reading historical fiction
    (Southern settings)", "Watching classic films", "Evening walks and birdwatching", "Video chatting with family", "Learning digital photography", "Attending local fairs and Appalachian heritage festivals"]'
  career_goals: Ann Joy's career goals are framed as ways to keep sharing her experience, stay socially engaged, and address her worry about losing connection. She hopes to launch a weekly storytelling
    circle at the local senior center, where she can mentor younger participants in the art of oral history and keep the town's heritage alive. She plans to compile a handwritten family cookbook featuring
    her beloved Southern recipes and local dishes, with the possibility of publishing a modest community edition. Although she prefers spontaneity, she recognizes the need for a flexible routine, so she
    aims to create a simple schedule that lets her attend church activities, volunteer with the Meals on Wheels program, and host occasional potlucks without feeling constrained. Ann also wants to become
    more proficient with digital tools—learning basic photography to document family gatherings and using video‑chat apps without frustration. To manage her tendency toward worry, she intends to join a
    gentle yoga class for seniors and practice brief mindfulness exercises each morning. Finally, she dreams of taking a short road trip through the Appalachian region to visit distant relatives and explore
    historic sites that connect her to her family's roots.
