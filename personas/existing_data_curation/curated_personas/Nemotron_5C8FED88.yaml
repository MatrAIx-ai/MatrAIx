  career_goals: Carmen aims to obtain her GED within the next year and enroll in a community college program for business administration. She aspires to advance from an entry-level clerk to an office manager,
    eventually overseeing a team and implementing efficient workflow processes. Her long-term ambition is to work in a supportive environment where she can mentor new employees and contribute to a positive
    workplace culture. She also envisions using her strong interpersonal skills to transition into a human resources or community outreach role that helps create inclusive programs for the local Hispanic
    community. Balancing career growth with personal well-being, she plans to attend professional development workshops and seek certifications in office administration.
