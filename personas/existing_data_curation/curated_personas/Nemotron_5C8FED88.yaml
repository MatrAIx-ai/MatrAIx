personas:
  professional: Carmen Arango, a 19‑year‑old office clerk, leverages meticulous data‑entry skills and a naturally sociable demeanor to keep office records flawless while cultivating strong coworker relationships,
    and they are actively pursuing a GED and business‑administration studies to eventually step into an office‑manager role that blends workflow efficiency with people‑focused HR initiatives.
  sports: Carmen Arango stays active through spirited salsa and cumbia dance nights at the community center, counts themselves as a casual fan of the Los Angeles Lakers and LA Galaxy, and volunteers as
    an assistant coach for a local youth soccer club, merging fitness with community involvement.
  arts: Carmen Arango unwinds by binge‑watching telenovelas like 'La Usurpadora', streaming contemporary pop hits from artists such as Bad Bunny and Christian Nodal, and attending live folk‑dance performances,
    all of which fuel their love for vibrant storytelling and rhythmic expression.
  travel: Carmen Arango enjoys weekend day trips to Santa Barbara’s beachside boardwalk, dreams of a music‑filled road trip to Austin for its live‑scene, and has a growing wish list that includes exploring
    the historic streets of New Orleans and the culinary markets of Oaxaca, balancing limited student‑budget travel with a thirst for cultural immersion.
  culinary: Carmen Arango delights in hand‑rolling tamales, simmering mole, and baking enchiladas, often seasoning with smoky chipotle and fresh cilantro while pairing dishes with homemade agua fresca,
    showcasing a knack for traditional comfort foods blended with modern twists.
  core: Carmen Arango is a detail‑obsessed yet gregarious young professional who balances a structured clerkship and vibrant social life with anxiety‑driven perfectionism and occasional late‑night snack
    indulgences.
background:
  cultural: Carmen was raised in a Mexican-American household in Cedar Park, Texas, where both Spanish and English are spoken at home. Her family maintains many Mexican traditions, such as celebrating Día
    de los Muertos, Cinco de Mayo, and family birthdays with festive meals and music. Catholic holidays and strong family ties influence her values of cooperation and harmony. Growing up in a vibrant Hispanic
    community has instilled in her a sense of pride in her cultural heritage, which she expresses through cooking, dancing, and participating in local cultural festivals.
