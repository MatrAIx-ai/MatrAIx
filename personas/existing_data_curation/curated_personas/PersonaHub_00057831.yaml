persona_description: A Kenyan scientist who is dedicated to advancing knowledge and understanding of the Turkana Basin through multidisciplinary research, fieldwork, and collaboration with international
  partners. He/she is passionate about paleontology, botany, fisheries, entomology, linguistics, and climatology, and is committed to training Kenyan scientists in fossil excavation and preparation to ensure
  that the field campuses can be used throughout the year. The persona is also interested in exploring the potential of Lake Turkana for new scientific studies and unexpected discoveries, and is open to
  collaborations with other institutions and organizations.
