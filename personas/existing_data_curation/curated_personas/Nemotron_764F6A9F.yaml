personas:
  professional: William Reavis, an aspiring junior game developer and digital illustrator, channels their curiosity into Python prototyping while they meticulously plan each step and rely on teammates for
    feedback, blending landscape sketching, story writing, and collaborative spirit into indie adventure games for the school tech club.
  sports: William Reavis, a midfielder on his middle school soccer team and a member of the Twin Cities Youth Soccer Club, trains diligently under Coach Martinez, enjoys watching Minnesota United FC matches
    on weekends, and they balance the season with occasional snowshoeing trips that keep fitness high despite a tendency to skip stretching after games.
  arts: William Reavis, an enthusiastic sketch artist and acoustic guitarist, finds inspiration in the atmospheric landscapes of Ansel Adams, the narrative depth of N.K. Jemisin’s sci‑fi novels, and the
    melodic storytelling of Taylor Swift, regularly curating mini‑exhibitions at the town library and uploading digital illustrations to DeviantArt, all while they sometimes stay up late to rewrite short
    stories that never quite meet their own high standards.
  travel: William Reavis, who prefers meticulously planned road trips with a handwritten itinerary, has explored the rolling dunes of Minnesota’s Lake Superior shoreline, photographed the fall colors of
    Voyageurs National Park, and dreams of backpacking through Norway’s fjords and hiking the Grand Canyon, yet they often negotiate travel dates around school exams and family commitments, resulting in
    a habit of packing more snacks than necessary.
  culinary: William Reavis, a budding home chef with a knack for mixing Midwestern comfort foods and global flavors, frequently cooks fluffy blueberry pancakes with maple syrup, experiments with homemade
    sushi rolls using fresh salmon and avocado, and occasionally attempts a daring lavender‑infused latte, though they sometimes forget to clean the kitchen before their next art project.
  core: William Reavis, the curious, organized teen who balances digital art, soccer, and volunteer work, is known for doodling in the margins of their school notebooks and sneaking extra guitar practice
    after the lights go out, and they often stay up late perfecting a sketch.
background:
  cultural: William grew up in Albert Lea, a small Midwestern town in Minnesota with a predominantly white, German‑Scandinavian heritage. The community values hard work, modesty, and neighborly support,
    reflected in local traditions such as county fairs, high school sports nights, and church gatherings. His family celebrates holidays with a blend of American and Northern European customs, emphasizing
    shared meals and community involvement. This background has fostered his appreciation for outdoor activities, collective endeavors, and a respectful, collaborative spirit.
