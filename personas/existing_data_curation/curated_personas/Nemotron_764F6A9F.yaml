    art events'']'
  career_goals: William aspires to combine his love for art and technology by pursuing a career in graphic design or video game development, envisioning himself creating immersive visual experiences. He
    is also interested in community-oriented roles, such as a youth arts program coordinator, where he can mentor peers and organize creative workshops. In the longer term, he hopes to attend a college
    with strong fine arts and computer science programs, ultimately becoming a multidisciplinary creator who blends storytelling, design, and social impact.
