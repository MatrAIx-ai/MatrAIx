personas:
  professional: Jennifer Lee, an 82‑year‑old veteran volunteer coordinator at their local church, blends decades of event planning, meticulous budgeting, and compassionate outreach to run the weekly food‑pantry
    and community potluck schedule, relying on their knack for calendars and check‑lists to keep everything running like clockwork.
  sports: Jennifer Lee, an 82‑year‑old enthusiastic walker, joins the church’s senior walking club for morning strolls in the park, cheers on the Carolina Panthers on Sundays, and follows the Clemson Tigers
    football season with the same disciplined schedule they apply to their garden and bridge games.
  arts: Jennifer Lee, an 82‑year‑old gospel choir singer, harmonizes classic Mahalia Jackson hymns and Ella Fitzgerald jazz standards while quilting intricate patterns inspired by the lyrical storytelling
    of their favorite singers, and they regularly attend the local Theatre on the Square’s community performances.
  travel: Jennifer Lee, an 82‑year‑old lover of structured trips, enjoys organized senior tours to Washington, D.C.’s civil‑rights landmarks and nostalgic weekends in historic Charleston, while dreaming
    of a leisurely river cruise to New Orleans to soak in live jazz.
  culinary: Jennifer Lee, an 82‑year‑old culinary matriarch, excels at crafting low‑fat soul food such as smoked‑turkey collard greens, sweet‑potato pie, and black‑eyed pea hoppin’ John, relishing the fresh
    herbs from their garden and the occasional pinch of smoked paprika that adds depth without excess grease.
  core: Jennifer Lee, an 82‑year‑old organized community pillar, balances meticulous planning with heartfelt gospel singing, garden stewardship, and a lingering worry that fuels their relentless dedication
    to family and neighbors.
background:
  cultural: Jennifer was born and raised in rural Lee County, South Carolina, as part of a close‑knit African‑American community where the church has long been the cultural and social hub. Her family’s
    roots trace back to the Great Migration era, with stories of ancestors who worked the fields and later built a life in the South. The traditions of Southern soul food, gospel music, and oral storytelling
    have shaped her identity. Community service, mutual aid, and respect for elders are core values passed down through generations. She grew up during the civil‑rights movement, which instilled a deep
    sense of perseverance and collective responsibility that continues to guide her actions today.
attributes:
