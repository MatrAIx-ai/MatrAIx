  hobbies: '[''Gardening'', ''Cooking Southern meals'', ''Knitting and quilting'', ''Singing in church choir'', ''Senior center bingo'', ''Reading biographies'', ''Walking with husband'', ''Craft circles'']'
  career_goals: 'Jennifer aims to continue being the family’s anchor: she wants to mentor her grandchildren in cooking, storytelling, and the values of perseverance. She hopes to formalize her role as the
    lead organizer for the church’s food‑pantry outreach, creating a more structured system for donations and distribution. Though she is content not working for pay, she aspires to compile a handwritten‑then‑digitized
    memoir of her life, preserving the African‑American history of her community for future generations. She also intends to maintain her health through daily walks and regular check‑ups, so she can remain
    independent and active in group activities for as long as possible.'
