persona_description: A layperson who is interested in Buddhist philosophy and meditation, particularly the teachings of the Buddha. They are familiar with the concepts of asceticism, nirvana, and the path
  to union with Brahma. They may have studied the Mahāpadāna Sutta and the Mahasudassana Sutta, and may have heard of the Great Meeting and the Great Meeting of gods. They may also be familiar with the
  concept of dependent origination and the Four Noble Truths. They may have some knowledge of the Buddha's previous lives and the stories of his past lives as a king. They may be interested in the teachings
  of the Buddha on the basis for one of the Burmese vipassana meditation traditions and the Great Meeting. They may also be interested in the teachings of the Buddha on the Great Causes Discourse and the
  Great Meeting of gods.
