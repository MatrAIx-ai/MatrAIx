personas:
  professional: Nestor Cruzrobles, a 60‑year‑old master automotive technician, blends three and a half decades of expertise in classic, hybrid, and electric vehicle systems with an artist’s eye for custom
    paint finishes and interior detailing, they mentor apprentices through clear communication while pursuing the dream of opening a boutique workshop that fuses heritage restoration with sustainable EV
    technology.
  sports: Nestor Cruzrobles enjoys weekend hikes along the trails of Sussex County with his wife as a member of the local Sussex Hiking Club, they follow the New York Giants football team and the New Jersey
    Devils hockey club enthusiastically, and volunteer as an assistant coach for a youth soccer league, balancing outdoor activity with occasional desk‑bound repair work.
  arts: Nestor Cruzrobles channels his imagination into abstract painting, drawing inspiration from vibrant palettes reminiscent of mountain vistas, they admire the bold strokes of Kandinsky and the drip
    techniques of Pollock, strum a guitar and sing folk songs passed down through their family, and devour design theory books such as 'The Design of Everyday Things' while attending regional art fairs
    to showcase mixed‑media creations.
  travel: Nestor Cruzrobles plans travel that blends cultural immersion with natural scenery, they frequently return to the historic coastal city where their extended family resides, dream of strolling
    through Lisbon’s cobblestone streets, take road trips to the Catskill Mountains for weekend hikes, and balance these adventures with the financial reality of their upcoming workshop launch.
  culinary: Nestor Cruzrobles delights in cooking aromatic coconut rice, hearty stew with root vegetables and yucca, and sweet plantain fritters, they season them with cumin, cilantro, and a splash of citrus,
    proudly feeding large family gatherings and occasionally experimenting with fusion twists while perfecting grill techniques.
  core: Nestor Cruzrobles, a charismatic 60‑year‑old technician‑artist, merges a love for classic cars and electric tech with vibrant abstract art, hikes, music, and family cooking, yet they often forget
    bill due dates and skip physiotherapy when the shop is swamped.
background:
  cultural: Born to Colombian parents, Nestor grew up speaking Spanish at home and was immersed in the rhythms of cumbia, vallenato, and the flavors of bandeja paisa. His family emigrated to the United
    States when he was a teenager, settling in the Northeast. He maintains strong ties to his Colombian roots through language, music, cuisine, and the celebration of holidays such as Día de la Independencia.
    In Belvidere, NJ, he actively participates in the local Hispanic community, helping organize cultural events and sharing his heritage with neighbors, while embracing the values of family, hospitality,
    and hard work that define both Colombian and American traditions.
attributes:
  skills: '["Engine diagnostics and repair", "Transmission rebuilding", "Hybrid and electric vehicle systems", "Electrical wiring and diagnostics", "Fuel injection systems", "Automotive HVAC maintenance",
    "Vehicle restoration and customization", "ASE Master Technician certification", "Diagnostic scan tool operation", "Customer service and communication", "Mentoring apprentices"]'
  hobbies: '["Abstract painting", "Playing guitar", "Singing folk music", "Attending car shows", "Volunteer teaching basic auto maintenance", "Reading modern art and technology literature", "Hiking", "Cooking
    Colombian dishes"]'
  career_goals: Nestor aims to transition from day‑to‑day shop work to opening a boutique auto workshop that specializes in classic car restoration and artistic vehicle customization, while integrating
    emerging electric‑vehicle technology. Over the next five years he plans to acquire an EV‑Specialist certification, develop a small apprenticeship program for local youth, and host community workshops
    on basic vehicle maintenance and sustainable auto practices. He also hopes to spend more time traveling to Colombia to reconnect with extended family and to share his cultural heritage through cooking
    and music at community events.
