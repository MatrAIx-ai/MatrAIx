  career_goals: Looking ahead, Celia aims to transition from day‑to‑day executive duties to an advisory and mentorship role, guiding the next generation of leaders within her organization and the broader
    regional business community. She plans to embed sustainability and social responsibility into the company’s core strategy, leveraging her love of the arts to create an internal culture of creativity
    and community partnership. Additionally, she hopes to establish a charitable foundation that supports arts education for underserved youth in Massachusetts, and to author a memoir reflecting on her
    unconventional rise from a high‑school education to chief executive, inspiring others to pursue lifelong learning.
