  hobbies: '[''Reading non-fiction'', ''Podcast listening'', ''Hiking'', ''Cooking'', ''Home‑improvement projects'', ''Single‑player video games'']'
  career_goals: Raymond aims to progress from cashier to shift supervisor within the next two years, eventually pursuing a store manager position. He plans to enroll in a part‑time associate program in
    business administration to build formal credentials. Long‑term, he hopes to leverage his retail experience and managerial skills to open his own small‑scale specialty shop—perhaps a boutique coffee
    or hobby‑goods store—where he can combine his practical knowledge with his curiosity for new products and community interaction.
