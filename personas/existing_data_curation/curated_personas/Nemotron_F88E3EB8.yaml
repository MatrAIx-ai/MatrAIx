  career_goals: Deborah’s long‑term ambition is to open her own family‑run bakery in Fort Wayne that becomes a community hub. In the next two years she plans to earn a ServSafe certification, take a part‑time
    pastry course at a local culinary school, and develop a signature line of cinnamon rolls and seasonal pies. She hopes to expand the bakery to include a modest catering side for local events and to mentor
    other aspiring bakers. While she values the stability of a steady income in her current role, she is willing to adapt her business model based on neighborhood demand.
