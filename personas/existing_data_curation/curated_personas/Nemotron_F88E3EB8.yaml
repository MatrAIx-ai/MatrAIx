personas:
  professional: A bakery professional, Deborah Powell—26 and deeply rooted in community—leverages her practical mindset and sociable nature to oversee dough preparation, cake finishing, inventory control,
    and a small team in a bustling commercial kitchen, all while embracing the occasional disorganization of peak‑hour chaos with a friendly smile.
  sports: A social fitness enthusiast, Deborah Powell plays on a local co‑ed softball league, roots for the Fort Wayne Mad Ants and the Indiana Pacers, attends weekly yoga classes at a community center,
    and saves her bakery earnings for a yearly hiking trip to the Hocking Hills, all while using a smartwatch to track steps and occasional cardio bursts.
  arts: A creative soul, Deborah Powell devours contemporary romance novels by Colleen Hoover, belts out Ariana Grande hits at karaoke, binge‑watches The Great British Bake Off and Chef’s Table for culinary
    inspiration, and occasionally attends shows at the Fort Wayne Civic Theatre featuring performances by the local jazz quartet The Ivory Rhythms.
  travel: A curious traveler, Deborah Powell has road‑tripped to New Orleans for the annual food festival, explored the historic bakeries of Charleston, dreams of a culinary tour of Italy’s Emilia‑Romagna
    region, and usually plans her trips over a weekend with a mix of spreadsheet budgeting and spontaneous detours inspired by Instagram food reels.
  culinary: A passionate baker, Deborah Powell experiments with herb‑infused doughs, perfecting rosemary‑olive oil focaccia, cinnamon‑sugar swirl rolls, and lemon‑lavender shortbread, while sourcing heirloom
    tomatoes and fresh basil from her backyard garden to incorporate into savory pastries and seasonal pies.
  core: Deborah Powell blends practical bakery expertise with an outgoing, slightly chaotic charm, using her love of community, spontaneous flavor experiments, and modest financial foresight to chase the
    dream of a neighborhood hub, all while juggling occasional back pain, a penchant for karaoke, and a habit of forgetting to stretch.
background:
  cultural: Deborah comes from a multi‑generational working‑class white family rooted in the Midwest, with ancestry traced to German and Irish immigrants who settled in Indiana during the early 1900s. Growing
    up in the suburbs of Fort Wayne, she was raised with Midwestern values of hospitality, community involvement, and a strong work ethic. Family gatherings often featured hearty, home‑cooked meals and
    baked goods, instilling in her a love for classic American pastries. Her married life reflects the region’s emphasis on family stability, and she remains active in her local church and neighborhood
    association, which further shape her cultural outlook.
