personas:
  professional: Enna Lehr is an aspiring arts‑management student who leverages their Photoshop and Canva expertise, strong copywriting, and natural empathy to organize campus cultural events, where meticulous
    planning meets a spontaneous flair for last‑minute creative tweaks.
  sports: Enna Lehr stays active by joining the Lubbock Trail Hikers club for weekly hikes across the rolling plains of Sherman County, cheering on the Texas Tech Red Raiders football team and the Dallas
    Mavericks basketball squad, and occasionally lacing up for intramural ultimate Frisbee matches, blending a love of outdoor adventure with a supportive fandom.
  arts: Enna Lehr cultivates a vibrant artistic life, sketching watercolors of Lubbock sunsets while drawing inspiration from Claude Monet’s impressionism, Frida Kahlo’s bold self‑portraits, and the haunting
    melodies of Phoebe Bridgers, and they regularly capture candid community moments through photography, all of which inform their role as a catalyst for inclusive creative gatherings.
  travel: Enna Lehr prefers spontaneous road trips that blend art and nature, having explored Austin’s street murals, the desert vistas of Marfa, and the historic plazas of Santa Fe, while dreaming of traveling
    to Oaxaca’s Day of the Dead festivals and the Louvre in Paris to deepen their cultural perspective, all on a shoestring student budget.
  culinary: Enna Lehr enjoys a lively palate, often preparing smoky brisket tacos seasoned with chipotle and cumin, whipping up fresh guacamole with ripe avocados and lime, and experimenting with homemade
    sourdough bread, though they sometimes skip meals when buried in event planning, leading to occasional snack‑driven coffee binges.
  core: Enna Lehr is an 18‑year‑old arts‑savvy community builder who balances endless curiosity with bouts of anxiety, turning sketchbook doodles into inclusive events while occasionally overspending on
    coffee.
background:
  cultural: Enna grew up in Stratford, a small, close‑knit farming community in Sherman County, Texas. Her family’s roots lie in the Midwestern United States, and their upbringing emphasized traditional
    Texan values such as hospitality, self‑reliance, and a strong sense of community. Church gatherings, neighborhood barbecues, and high‑school sports events were central to her social life, fostering
    an appreciation for collective celebration and support. While grounded in these rural, white American cultural norms, Enna’s exposure to college courses, online art forums, and traveling with friends
    has broadened her perspective, encouraging openness to diverse artistic expressions and unconventional ideas. This blend of small‑town solidarity and emerging cultural curiosity shapes her worldview
    and informs her desire to create inclusive, creative spaces for others.
attributes:
  skills: '["Graphic Design (Photoshop, Canva)", "Social Media Content Creation", "Copywriting & Newsletter Drafting", "Event Planning & Logistics", "Volunteer Coordination", "Public Speaking", "Facilitation
    & Mediation", "Basic Photography", "Time Management", "Emotional Intelligence & Journaling"]'
  hobbies: '["Watercolor Painting", "Photography", "Visiting Art Galleries", "Live‑Music Shows", "Improv Comedy Workshops", "Tabletop Role‑Playing Games", "Book Club (Contemporary Fiction & Poetry)", "Hiking",
    "Journaling & Mindfulness", "Volunteer Work (Food Bank, Community Festivals)"]'
  career_goals: Enna aims to channel her love of art and community into a career that blends creativity with social impact. She plans to finish her Bachelor’s degree in Arts Management or Communications,
    seeking internships with local museums, cultural nonprofits, or event firms. Her short‑term goal is to secure a part‑time role as a marketing assistant or community outreach coordinator where she can
    craft promotional materials, manage volunteer programs, and organize inclusive cultural events. Long‑term, she envisions leading an arts‑based community center that offers creative workshops and art‑therapy
    programs for mental‑health support, especially for youths facing anxiety. She is motivated to pursue professional development courses in nonprofit leadership and grant writing, and to find mentorship
    from seasoned arts administrators.
