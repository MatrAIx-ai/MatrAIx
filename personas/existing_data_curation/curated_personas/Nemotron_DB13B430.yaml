  career_goals: Olga aims to advance to a senior leadership role, such as Director of Analytics, where she can drive data‑centric transformation for regional public‑sector agencies and nonprofit organizations.
    She aspires to build a consultancy that integrates rigorous analytics with community‑focused arts initiatives, helping cultural institutions make evidence‑based decisions. Additionally, she plans to
    obtain a master's degree in Business Analytics, deepen her expertise in machine learning, and mentor the next generation of Latina professionals in STEM fields.
