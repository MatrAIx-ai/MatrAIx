personas:
  professional: Olga Gonzalez leverages twelve years as a management analyst and her STEM expertise in SQL, Python, and Tableau to craft storytelling-driven analytics dashboards, while her disciplined organization
    and love for art shape a collaborative, cross-cultural mentorship style aimed at elevating women in technology toward senior leadership.
  sports: Olga Gonzalez enjoys weekend hikes in the San Bernardino Mountains, practices yoga three times weekly for balance, follows the LA Dodgers and LA Galaxy, and participates in a senior walking club
    that meets at the local park on Tuesdays.
  arts: Olga Gonzalez spends afternoons watercoloring rolling hills, draws inspiration from artists like Frida Kahlo, David Hockney, and contemporary Latin American painter Jorge Méndez, and regularly attends
    Los Angeles Philharmonic concerts and gallery openings featuring emerging creators.
  travel: Olga Gonzalez plans trips with a detailed spreadsheet itinerary, prefers solo or small-group cultural immersion, has explored Sedona, Napa Valley, and the Oaxaca highlands, and dreams of strolling
    Barcelona’s Gothic Quarter and trekking Patagonia’s Torres del Paine.
  culinary: Olga Gonzalez cooks elaborate Oaxacan mole and tamales using heirloom tomatoes, dried chilies, and fresh herbs from their native-plant garden, displaying an advanced skill set that blends traditional
    techniques with experimental flavor pairings for friends and community volunteers.
  core: Olga Gonzalez fuses analytical rigor with artistic imagination, balancing a disciplined work ethic with a habit of collecting watercolor pigments long after the paint dries.
background:
  cultural: Olga was raised in a bilingual Mexican household, speaking Spanish at home and English in school, which gave her a deep appreciation for both cultures. Family gatherings, celebrations of Día
    de los Muertos, and traditional Mexican holidays remain central to her identity. She maintains close ties to the local Mexican community in San Bernardino County, participating in cultural festivals
    and supporting Mexican culinary traditions. Her heritage shapes her collaborative, kind nature, fostering a sense of harmony and respect for elders, and informs her commitment to mentoring young Latina
    professionals.
