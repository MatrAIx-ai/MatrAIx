  hobbies: '["Gardening", "Fishing", "Woodworking", "Listening to gospel and blues music", "Church participation", "Card games (bridge, poker)", "Reading local history", "Family gatherings"]'
  career_goals: Although retired, Tony’s ambitions focus on staying active, healthy, and useful to his family and community. He aims to maintain his independence while supporting his wife’s activities,
    and he hopes to expand the small community garden he tends, providing fresh produce for neighbors. He plans to volunteer as a mentor at the local church’s youth program, teaching basic trades and life
    skills. Additionally, Tony would like to serve on the Maumelle senior advisory council to advocate for better accessibility and resources for older residents, preserving the stories of the local African‑American
    community for future generations.
