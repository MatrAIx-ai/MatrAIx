  career_goals: Pedro is fascinated by how things work and loves drawing, so he imagines a future where he can combine science and art. He often talks about becoming an astronaut who sketches the stars
    he visits, or a marine biologist who draws the creatures he studies. He also enjoys creating stories for other kids, so he hopes one day to be a children's book author and illustrator who can write
    in both English and Spanish. These aspirations reflect his curiosity, his organized mindset, and his desire to share his culture and ideas with others.
