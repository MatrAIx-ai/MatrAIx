personas:
  professional: Pedro Guerra, an aspiring junior comic illustrator, merges their curious love for animals with the methodical planning they employ to create detailed, storyboard‑style sketches that reveal
    an early knack for visual storytelling and a reliable, organized approach to projects.
  sports: Pedro Guerra, a lively midfielder for the Riverside Kids Soccer Club, delights in weekend games where they balance teamwork with occasional solo dribbling drills, cheerfully watches the professional
    exploits of FC Barcelona’s youth academy players, and follows a nightly stretching routine to keep their flexibility sharp.
  arts: Pedro Guerra, an eager young illustrator, crafts comic‑style animal characters inspired by Jim Davis’s Garfield and the whimsical worlds of Studio Ghibli’s Totoro, dives into adventure books like
    The Hardy Boys, and hones rhythmic timing on a small drum after listening to the upbeat folk tunes of Los Trapitos.
  travel: Pedro Guerra, a budding explorer, spends weekends trekking Green Valley Park’s nature trail to collect shells and sketch hidden spots, dreams of a family vacation to Costa Rica’s rainforests,
    and enjoys planning adventures with colorful hand‑drawn maps—though they sometimes get distracted by a sudden craving for ice‑cream stops.
  culinary: Pedro Guerra, an enthusiastic kitchen helper, skillfully rolls out dough for cheesy empanadas seasoned with a pinch of cumin, loves sprinkling crunchy plantain chips onto salads, and despite
    occasional over‑salting, proudly displays their own illustrated recipe cards for family meals.
  core: Pedro Guerra’s boundless curiosity and methodical mind drive a love for drawing, LEGO building, and soccer, while their occasional tendency to forget sunscreen and splash oat‑milk on the floor adds
    a playful, imperfect charm to their childlike world.
background:
  cultural: Pedro’s family maintains strong ties to their Panamanian heritage while living in Saint Cloud, FL. Spanish is spoken at home, and he celebrates cultural traditions such as Carnaval, Semana Santa,
    and family gatherings featuring music like tamborito and foods such as sancocho and arroz con pollo. He participates in a local community center’s Central American cultural program, where he shares
    stories and crafts from Panama with his classmates. The blend of his Panamanian roots and the diverse, multicultural environment of Osceola County gives Pedro a rich perspective that influences his
    language, art, and everyday life.
