personas:
  professional: Sonia Chen is a veteran library and media collections manager with three decades of experience in digital archiving, reference services, and multicultural resource development; she leverages
    her bilingual fluency and deep knowledge of community traditions such as Día de los Muertos and quinceañera celebrations to design heritage collections, while her meticulous, methodical nature drives
    the rollout of a county‑wide digital transformation that balances innovative workflows with proven cataloging standards, even if she occasionally hoards printed copies of digital artifacts for "just
    in case" reassurance.
  sports: Sonia Chen is a regular participant in a neighborhood walking group, enjoys senior soft‑ball games at the community center, and avidly follows the Houston Astros, Houston Rockets, and Houston
    Dynamo, often attending games on weekends as a social outing; she complements cardio with low‑impact Pilates classes, values the camaraderie of team sports, yet sometimes skips a workout when work deadlines
    loom, balancing her energetic social streak with occasional self‑imposed rest days.
  arts: Sonia Chen is an active member of a local book club that delves into historical fiction and works by authors such as Isabel Allende and Gabriel García Márquez, and she nourishes her love for rhythm
    by dancing salsa to the sounds of Celia Cruz and classic boleros; she frequents the Houston Grand Opera for evening performances, curates a personal playlist of traditional folk ballads, and her curiosity
    drives her to collect limited‑edition prints of mural art that depict community celebrations, even if she sometimes stays up late reorganizing her book shelves.
  travel: Sonia Chen plans her travel with a blend of careful budgeting and a yearning for cultural immersion, favoring trips to towns known for vivid Day of the Dead festivities like Guanajuato and Puebla,
    while also enjoying weekend getaways to Austin, San Antonio, and the Gulf Coast for relaxed beach time; she uses reward points for flights, prefers mid‑range boutique hotels that host local music nights,
    and balances her adventurous spirit with a practical itinerary that leaves room for spontaneous family visits, though she occasionally overpacks her itinerary and feels slight anxiety over missing a
    planned activity.
  culinary: Sonia Chen delights in cooking dishes such as chile rellenos, pozole, and fresh salsa, drawing on home‑grown chilies, cilantro, epazote, and roasted corn from her vegetable patch; she possesses
    an intermediate skill level, enjoys experimenting with spice blends, and often prepares elaborate meals for community festivals, yet she sometimes forgets to turn off the stove when multitasking and
    has a habit of adding an extra pinch of chili powder for extra heat, which friends lovingly tease her about.
  core: Sonia Chen blends meticulous organization with vibrant community spirit, juggling a love of heritage traditions, thoughtful financial planning, and a persistent worry that fuels her drive toward
    continual growth.
background:
  cultural: Sonia was born and raised in the Greater Houston area to Mexican immigrant parents who settled in Fort Bend County. She grew up bilingual, speaking Spanish at home while attending English‑language
    schools, which fostered a deep appreciation for Mexican traditions such as Día de los Muertos, quinceañera celebrations, and family‑centered gatherings. Her heritage influences her professional focus
    on multicultural collections and community outreach. Though her surname reflects a family lineage that includes Chinese ancestors, Sonia identifies primarily with her Mexican roots, incorporating the
    values of community, respect for elders, and a love for shared meals into her daily life.
attributes:
  skills: '[''Cataloging (MARC, RDA)'', ''Digital preservation and archiving'', ''Metadata standards (Dublin Core, METS)'', ''Information literacy instruction'', ''Community outreach and programming'',
    ''Bilingual Spanish communication'', ''Grant writing and fundraising'', ''Staff training and supervision'', ''Collection development and policy'', ''Heritage and multicultural resource curation'']'
  hobbies: '[''Historical fiction reading'', ''Mexican literature'', ''Book club participation'', ''Adult literacy tutoring'', ''Gardening (herbs, chilies)'', ''Cooking Mexican and Tex‑Mex cuisine'', ''Attending
    cultural festivals (Día de los Muertos)'', ''Salsa dancing'', ''Yoga and mindfulness practice'', ''Weekly neighborhood walks'']'
  career_goals: Sonia aims to lead the digital transformation of the Richmond public library system, expanding online access to local heritage collections and integrating modern media platforms. She plans
    to develop a dedicated Mexican‑American history archive, secure grant funding for its preservation, and mentor emerging librarians in the region. Within the next five years she hopes to become branch
    manager or director of community services, and to earn a bachelor’s degree in library science to complement her associate’s credential. Additionally, she aspires to present at regional conferences on
    multicultural collection development and serve on the Texas Library Association’s diversity committee.
