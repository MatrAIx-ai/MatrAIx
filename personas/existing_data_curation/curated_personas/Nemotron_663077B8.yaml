  career_goals: Approaching retirement, Samuel’s goal is to leave a lasting, structured legacy within his organization. He plans to formalize a mentorship program that pairs senior security staff with newcomers,
    secure a Certified Protection Professional (CPP) credential to benchmark his expertise, and author a comprehensive security handbook that captures best‑practice procedures for Mobile’s unique climate
    and community needs. Additionally, he hopes to expand the firm’s community‑outreach initiatives, offering safety workshops at local churches and senior centers, and later transition to a part‑time advisory
    role that allows him to continue contributing while enjoying more personal time.
