personas:
  professional: Samuel Craig, a seasoned security director with 45 years of experience, leverages meticulous risk‑assessment expertise, budget‑driven staffing strategies, and a collaborative, diversity‑focused
    culture to keep the Mobile campus safe while they mentor the next generation of protectors.
  sports: Samuel Craig enjoys weekly bowling with the Mobile Senior League, follows the New Orleans Saints and Atlanta Braves avidly, participates in chess tournaments at the community center during winter,
    and they maintain a low‑impact fitness routine of gardening and short walks to stay active without risking injury.
  arts: Samuel Craig finds solace in the warm crackle of a vintage record player spinning B.B. King, Miles Davis, and Otis Redding, while they regularly perform gospel harmonies in the Baptist choir and
    craft small wooden tables that echo the craftsmanship celebrated in Southern folk art.
  travel: Samuel Craig favors carefully planned road trips to historic Southern landmarks such as Selma, Montgomery, and Charleston, relishes staying at family‑run bed‑and‑breakfasts, and they dream of
    a pilgrimage to Washington, D.C.’s National Museum of African American History, all while balancing travel costs with a modest retirement budget.
  culinary: Samuel Craig’s dinner table often features home‑grown tomatoes in a fresh garden‑salsa, slow‑cooked catfish with a side of collard greens, and the occasional slice of cornbread, reflecting a
    moderate cooking skill set that blends Southern comfort food with the ingredients they harvest themselves.
  core: Samuel Craig blends disciplined security leadership with a garden‑to‑record‑player rhythm, volunteering in community safety while they indulge in vintage blues and modest quirks like hoarding vinyl
    sleeves.
background:
  cultural: Samuel’s cultural identity is rooted in the African‑American heritage of Mobile, Alabama. Raised in the 1950s and 60s, he witnessed the city’s civil‑rights struggles and the eventual opening
    of opportunities for Black professionals, experiences that reinforced his commitment to cooperation and community harmony. His family traditions revolve around church gatherings, soul‑food meals featuring
    dishes like collard greens, fried catfish, and cornbread, and the annual Mobile Mardi Gras festivities that blend African, French, and Creole influences. He carries pride in the oral histories of the
    coastal Gullah‑Geechee peoples and maintains strong ties to the local Black community through mentorship, church leadership, and participation in neighborhood cultural events.
