persona_description: A scientist who specializes in the development of novel treatments for neurodegenerative diseases, particularly Alzheimer's. She is focused on the development of vaccines and dietary
  interventions that target the accumulation of beta-amyloid proteins in the brain. She is interested in the potential of nasal sprays and Indian food as potential therapies for Alzheimer's, and is eager
  to test these treatments in clinical trials. She is also interested in the potential of dietary interventions to prevent or slow the progression of Alzheimer's disease.
