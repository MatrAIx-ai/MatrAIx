    problem solving'']'
  hobbies: '[''Improv comedy'', ''Board‑game nights'', ''Road trips with friends'', ''Custom PC building'', ''Raspberry Pi tinkering'', ''Multiplayer video gaming'', ''Mentoring youth coding program'',
    ''Pickup basketball'', ''Hiking in state parks'']'
  career_goals: Richard aims to deepen his technical expertise while moving into leadership. In the next 12‑18 months he plans to earn certifications such as CompTIA Network+, Microsoft Modern Desktop Administrator,
    and an ITIL Foundation certificate, positioning himself for a senior support engineer role. Over the next five years he envisions stepping into a team‑lead or IT service manager position where he can
    shape support processes, mentor junior technicians, and expand the department’s knowledge‑base. Ultimately, Richard hopes to leverage his sociable nature and improvisational problem‑solving to run a
    regional consulting practice focused on small‑business IT health, offering on‑site workshops, rapid response services, and community tech‑training programs in the Flint area.
