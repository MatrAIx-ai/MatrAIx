  career_goals: France aims to transition into a supervisory or quality‑assurance role within the next three years, leveraging her mentorship talent to coach a team of representatives. She plans to earn
    a professional customer‑service certification (such as the Certified Customer Service Professional) to formalize her expertise. Long‑term, she hopes to combine her love of art and community engagement
    by moving into a liaison position at a local cultural center, where she can manage visitor services and develop outreach programs for seniors. Ultimately, she wants to secure a stable retirement while
    remaining actively involved in both customer experience improvement and the arts community of Rocky Mount.
