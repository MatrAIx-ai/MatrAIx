personas:
  professional: Suzette Hernandez is a budding culinary entrepreneur and community horticulturist who blends hands‑on gardening expertise with traditional cooking, leveraging bilingual communication to
    build a weekend catering service and farmer’s‑market stall while navigating her relaxed, often improvised planning style.
  sports: Suzette Hernandez enjoys low‑impact fitness, joining a weekend walking club that meets at the Fresno River Loop, cheering on the Fresno State Bulldogs basketball team, and casually attending Los
    Angeles Dodgers games when traveling, while avoiding regimented gym routines in favor of garden‑yard chores that keep her moving year‑round.
  arts: Suzette Hernandez expresses creativity through crocheting colorful blankets inspired by traditional patterns and by immersing herself in mariachi melodies from Los Tigres del Norte, streaming classic
    Mexican cinema such as "Like Water for Chocolate", and savoring mystery novels by Tana French and Paco Ignacio Taibo II.
  travel: Suzette Hernandez prefers short, purposeful trips that blend family gatherings with culinary exploration, frequently road‑tripping to Paso Robles for its vineyards and fresh herbs, planning future
    pilgrimages to Oaxaca’s markets to study regional chilies, while balancing travel costs with her modest income and parental responsibilities.
  culinary: Suzette Hernandez delights in crafting mole poblano with pasilla, guajillo, and epazote, preparing fresh salsa verde from heirloom tomatoes and serrano chilies harvested from her garden, and
    serving steaming tamales on Sundays, all while experimenting with modern plating techniques using locally sourced corn masa.
  core: Suzette Hernandez is a pragmatic garden‑to‑plate enthusiast who balances a love of tradition with spontaneous entrepreneurship, yet often misplaces her keys and lets deadlines slip in favor of a
    perfectly ripe tomato.
background:
  cultural: Suzette is a first‑generation Mexican‑American who grew up in Fresno’s Central Valley, an area shaped by agriculture and a vibrant Mexican community. Her parents emigrated from Jalisco and instilled
    in her the values of family, faith, and cultural celebration. She was raised bilingual, speaking Spanish at home and English at school, which gives her a deep connection to both cultures. Family traditions
    such as Día de los Muertos altars, quinceañeras, and weekly Sunday Mass are central to her life. The region’s agricultural heritage influenced her love of gardening and seasonal cooking, and she often
    participates in community events that honor Mexican heritage, like the annual Cinco de Mayo parade and local pow‑wows. This blended cultural identity informs her food, language, and community‑oriented
    outlook.
attributes:
  skills: '[''Mexican home cooking'', ''Bilingual Spanish-English communication'', ''Home gardening (heirloom vegetables)'', ''Household budgeting'', ''Basic computer use'', ''Community event coordination'',
    ''Crochet and textile crafts'']'
  hobbies: '[''Backyard gardening (heirloom tomatoes, chilies)'', ''Traditional Mexican cooking and recipe experimentation'', ''Attending local cultural festivals and mariachi concerts'', ''Reading mystery
    novels'', ''Crocheting blankets and amigurumi'', ''Volunteering as museum docent'']'
  career_goals: Suzette hopes to turn her culinary and gardening passions into a modest home‑based business. She plans to start a weekend catering service offering authentic Mexican dishes to local families
    and to sell fresh produce and herb bundles from her garden at the Fresno farmers market. To support these goals, she is interested in completing a GED and enrolling in a community‑college certificate
    program in culinary arts. She also wants to deepen her role as a community health educator by leading nutrition workshops at the local community center, focusing on affordable, culturally relevant meals.
    Although she values flexibility, she aims to create a sustainable income that allows her to remain independent while still caring for her elderly parents.
