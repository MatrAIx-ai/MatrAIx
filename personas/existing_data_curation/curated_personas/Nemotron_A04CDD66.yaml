  hobbies: '[''Visiting art galleries'', ''Painting with acrylics'', ''Wood carving'', ''Gardening'', ''Beach walking'', ''Salsa dancing'', ''Cooking Puerto Rican cuisine'', ''Reading historical biographies'',
