  career_goals: Although retired from full‑time work, Felipe aims to channel his organizational talents into volunteer leadership at local cultural institutions, such as serving on the board of a community
    art center in Fort Lauderdale. He aspires to mentor younger Puerto Rican artists, help them develop professional portfolios, and organize intergenerational art workshops. He also hopes to document his
    family’s migration story and publish a memoir that weaves together personal history, Puerto Rican heritage, and reflections on art. Travel remains a personal ambition—particularly a pilgrimage to his
    birthplace in Puerto Rico to reconnect with roots and explore regional artistic traditions.
