personas:
  professional: Tawanna Rogers is a dependable office clerk whose meticulous data entry, Excel wizardry, and people‑centric communication blend with a love for structure to make them the go‑to scheduler
    and conflict mediator, quietly steering the office toward smoother processes.
  sports: Tawanna Rogers is an enthusiastic member of the local Acworth Hiking Club, tackles the Monadnock Trail each spring, roots for the Boston Red Sox and New England Patriots, and plays on a mixed‑gender
    recreational softball league on weekends, preferring steady, low‑impact cardio over high‑intensity gyms.
  arts: Tawanna Rogers is a regular at the Acworth Community Theater where they applaud productions of Shakespeare and contemporary playwrights, discuss contemporary fiction by Sally Rooney and Colson Whitehead
    in the local book club, and unwind listening to folk singer Brandi Carlile and classic jazz pianist Bill Evans.
  travel: Tawanna Rogers is a planner‑oriented traveler who favours well‑mapped road trips, having explored the historic streets of Boston, the scenic White Mountains, a weekend getaway to Savannah, Georgia,
    and dreaming of a culinary tour through Tuscany, balancing adventure with family budget constraints.
  culinary: Tawanna Rogers is an avid backyard gardener who turns home‑grown tomatoes, zucchini, and fresh herbs into hearty ratatouille, and bakes seasonal pies such as spiced apple, cherry, and pumpkin,
    skillfully mixing butter, cinnamon, and nutmeg to delight neighbors at community potlucks.
  core: Tawanna Rogers blends meticulous organization with a loquacious charm, constantly juggling community events, spreadsheets, and pie recipes, yet often forgets to take lunch breaks, leaving a trail
    of post‑it reminders and a lingering scent of baked cinnamon.
background:
  cultural: Tawanna grew up in a small‑town, predominantly white New England community in Cheshire County, New Hampshire. Her family has deep roots in the region, embodying the values of modesty, hard work,
    and civic responsibility typical of rural New England. She was raised attending local church services and participating in town meetings, which reinforced a sense of community involvement and mutual
    support. The natural beauty of the area—forests, lakes, and seasonal change—has fostered her appreciation for outdoor activities and seasonal traditions such as town fairs, summer barbecues, and winter
    holiday gatherings.
attributes:
  skills: '["Data entry", "Record management", "Scheduling and calendar management", "Microsoft Office Suite proficiency", "Customer service", "Clear written and verbal communication", "Basic bookkeeping",
