  hobbies: '["Volunteering at the local food pantry", "Community event planning", "Book club participation", "Gardening", "Hiking", "Baking and cake decorating", "Knitting/crocheting", "Crossword and puzzle
    solving", "Attending community theater"]'
  career_goals: Tawanna aims to move into a supervisory role, such as office manager or senior administrative coordinator, within the next three years. She plans to earn a Certified Administrative Professional
    (CAP) credential and take community‑college courses in business administration to deepen her leadership and budgeting skills. Her long‑term ambition is to mentor new clerical staff, streamline office
    processes using modern software tools, and foster a supportive, harmonious workplace culture where every team member feels valued.
