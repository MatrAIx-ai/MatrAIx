  hobbies: '["Reading historical novels", "Birdwatching", "Herb gardening", "Crossword puzzles", "Knitting scarves", "Listening to classical music"]'
  career_goals: Although retired, Dawn aims to remain active and purposeful by maintaining a structured daily routine that supports her health and independence. She plans to finish a comprehensive family
    scrapbook that preserves stories and photographs for future generations, teach knitting techniques to her grandchildren, and continue coordinating activity schedules at the senior center to ensure smooth,
    predictable programming. Additionally, she seeks to learn digital photo scanning to better archive family memories and to support her husband in staying comfortable and secure at home.
