persona_description: A climate scientist who specializes in studying the impacts of climate change on ocean ecosystems, particularly on top predators. They have conducted research on the effects of temperature
  changes on marine habitats and are interested in how these changes will affect species such as blue whales and loggerhead turtles. They are also interested in how changes in temperature may affect highly
  mobile species such as tuna and seabirds, and are looking for ways to mitigate the impacts of climate change on these species. They are currently analyzing data from satellite measurements of sea surface
  temperature and chlorophyll-a, as well as migration patterns charted by the Tagging of Pacific Predators (TOPP) project. They are using U.N. Intergovernmental Panel on Climate Change projections to model
  how temperature changes will affect habitat, and are identifying key habitat areas by using satellite measurements of sea surface temperature and chlorophyll-a, as well as migration patterns charted by
  the TOPP project. They are also interested in the potential benefits of changes in temperature for highly mobile species such as tuna and seabirds.
