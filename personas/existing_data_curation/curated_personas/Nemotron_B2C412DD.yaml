  career_goals: As she grows, Isabel envisions a career where she can combine her love for order, compassion, and helping others. She dreams of becoming a teacher, so she can create a structured, supportive
    classroom where every child feels heard. She also admires nurses and thinks about studying nursing to provide care in a calm, organized way. Ultimately, she hopes to work in a role that promotes community
    well‑being, such as a school counselor or community health aide, where she can use her methodical nature and empathy to make a positive difference.
