  hobbies: '[''gardening'', ''nature walks'', ''reading (historical fiction, nature non-fiction)'', ''knitting'', ''quilting'', ''food preservation (canning, fermenting)'', ''folk music listening'', ''small-group
    book club'', ''yoga and meditation'']'
  career_goals: Ash aims to complete her undergraduate studies through an online program, focusing on psychology or environmental studies. She hopes to turn her passion for preserving food and handmade
    crafts into a modest home-based business that supports her family and local farmers. She also wants to deepen her involvement in community volunteering, particularly as a peer supporter for mental-health
    groups, and to develop a regular writing practice that could lead to a memoir or blog about sustainable living and personal resilience.
