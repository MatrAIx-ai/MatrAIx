  career_goals: Irving loves to imagine himself as a brave firefighter who rescues people, a curious explorer who discovers new places, or a caring veterinarian who helps animals. He often declares he wants
    to be the best at solving puzzles and leading his friends in games, showing an early desire to help his community and be recognized for his abilities.
