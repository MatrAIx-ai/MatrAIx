personas:
  professional: Irving Tomlin, a budding little architect, loves building towers with wooden blocks, balancing a vivid curiosity for new shapes with the practical habit of following step‑by‑step instructions,
    making them a reliably organized participant in preschool’s play‑center.
  sports: Irving Tomlin, a tiny park‑run enthusiast, belongs to the Tiny Tykes toddler soccer club, often dribbles a small orange ball while sporting a Cubs cap, and races to be the first on the slide,
    displaying a competitive spark that outweighs cooperative play.
  arts: Irving Tomlin, an energetic mini‑performer, sings along to Elmo’s songs, dances to "Baby Shark", paints vivid pictures with finger paints, and idolizes Pixar’s "Toy Story" characters, turning every
    play‑time into a stage.
  travel: Irving Tomlin, a curious family‑trip explorer, has visited the local zoo, the children’s museum, and Disneyland, and dreams of seeing the Eiffel Tower, preferring short car rides with frequent
    snack breaks and a familiar stuffed bear beside them.
  culinary: Irving Tomlin, a picky yet adventurous eater, adores cheesy macaroni, crispy chicken nuggets with ketchup, sliced bananas, and is learning to dip broccoli florets into ranch dressing, often
    smearing peanut butter on toast with a determined grin.
  core: Irving Tomlin, a spirited three‑year‑old who balances boundless curiosity with early organization, turns every playtime into a mini‑competition while still cherishing group games and occasional
    bouts of skepticism.
background:
  cultural: Irving is raised in a White Midwestern family in Camden, Indiana. His family values community involvement, modest self-reliance, and a love for the outdoors typical of rural Indiana. They attend
    a local church, participate in county fairs and seasonal community events, and celebrate holidays with family gatherings, backyard barbecues, and simple traditions. This environment nurtures his sociable
    nature, practical curiosity, and appreciation for both new ideas and established routines.
