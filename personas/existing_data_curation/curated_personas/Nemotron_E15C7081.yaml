  career_goals: Pamela aims to complete her GED within the next year and enroll in a community‑college program focused on communications or hospitality management. She wants to turn her love for organizing
    events and helping others into a career as an event coordinator or community outreach specialist. In the long term she hopes to combine her practical cooking skills and social‑media savvy to launch
    a lifestyle brand or a small catering venture that highlights local Midwestern flavors while fostering community connections.
