personas:
  professional: Pamela Frierson, a 17‑year‑old with a flair for organizing, blends her strong communication skills, choir experience, and Instagram food blogging into a budding event‑coordination vibe,
    using practical curiosity to iron out logistics while keeping the vibe fun and inclusive.
  sports: Pamela Frierson enjoys weekend runs with the local high school cross‑country club, attends Chicago Cubs games on a family road trip, practices yoga three times a week at the community center,
    and follows the University of Iowa women's volleyball team, blending low‑impact fitness with a love for Midwestern sports culture.
  arts: Pamela Frierson channels creativity through her guitar strums at school choir recitals, reads young‑adult novels like 'The Hate U Give' and 'Six of Crows,' watches comedy‑drama series such as 'Ted
    Lasso' and 'The Good Doctor,' and admires musicians Taylor Swift and Ed Sheeran, while crafting handmade jewelry inspired by vintage styles.
  travel: Pamela Frierson dreams of a road‑trip along Route 66, has visited Chicago’s Navy Pier and a weekend family camping at the Ozark National Forest, and plans to save for a spring break visit to New
    York City’s Broadway shows, preferring a mix of adventure and photogenic community events.
  culinary: Pamela Frierson experiments with Midwestern comfort foods like pork tenderloin with apple glaze, bakes decadent chocolate lava cakes, and whips up homemade avocado toast, showcasing a confident
    home‑cook skill set that fuels her Instagram food blog, while also loving fresh basil, smoked paprika, and honey.
  core: Pamela Frierson is a socially‑fuelled, organized teen who plans parties with meticulous zeal, over‑indexes on Instagram likes for her recipes, occasionally forgets to eat herself, and balances boundless
    curiosity with practical day‑to‑day routines.
background:
  cultural: Pamela was raised in Darien, a suburban community in DuPage County, Illinois, within a predominantly white, middle‑class, Midwestern American setting. Her family celebrates typical American
    holidays such as Thanksgiving and the Fourth of July with local traditions, and she grew up with values emphasizing community involvement, politeness, and a strong work ethic. The cultural atmosphere
    of the region, including school and community activities, has shaped her sociable nature and her desire to contribute positively to her neighborhood.
