persona_description: 'A U.K.-based consumer cooperative, The Co-operative, is launching an awareness campaign and a comprehensive plan of action to promote bee habitat. The campaign aims to empower people
  to understand the issue and think about ways they can contribute. The Co-operative is partnering with other organizations and individuals to establish long rows of bee-friendly habitats across the country.
  The campaign is promoting pollinator-friendly gardens in urban areas, distributing wildflower seeds, and supporting members of the Co-operative to become beekeepers. The campaign focuses on four key areas:
  strengthening the countryside, engaging customers and members, engaging with the research community, and banning the use of six neonicotinoid-based pesticides on the Co-operatives fresh and frozen produce.
  The Co-operative is confident that this ongoing program of activity will help resolve the problem with bees and promote bee habitat.'
