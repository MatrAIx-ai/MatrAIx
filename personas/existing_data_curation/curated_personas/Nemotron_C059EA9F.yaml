personas:
  professional: Jonathan Dominguez, a meticulous home‑maintenance consultant‑in‑training, channels their detail‑oriented problem‑solving skills, bilingual communication, and extensive volunteer event‑coordination
    experience to advise small local businesses on budgeting and operational efficiency while planning DIY workshops for senior homeowners.
  sports: Jonathan Dominguez follows the Washington Commanders and Washington Capitals avidly, participates in a local Fairfax County senior walking club along the Potomac, and plays weekly pickleball at
    the Alexandria Pickleball Club to keep fit without the intensity of team sports.
  arts: Jonathan Dominguez enriches their evenings with documentaries by Ken Burns, classic recordings of Andrés Segovia on the guitar, and occasional viewings of Meryl Streep’s films, while the quiet satisfaction
    of crafting furniture serves as their personal art practice.
  travel: Jonathan Dominguez prefers carefully planned, low‑stress trips that blend historical exploration and culinary curiosity, such as weekend visits to Colonial Williamsburg, a road‑trip through the
    Adirondacks, and an anticipated pilgrimage to the historic markets of Granada, Spain, always budgeting travel expenses in the same spreadsheet used for household finances.
  culinary: Jonathan Dominguez takes pride in perfecting hand‑pressed pupusas with cheese and savory pork, slow‑cooked tamales wrapped in corn husks, and a signature heirloom tomato salad, cooking nightly
    for themselves and occasionally hosting intimate dinner evenings where they showcase these dishes alongside fresh garden produce.
  core: Jonathan Dominguez is a disciplined, solitary craftsman who balances methodical planning with a relentless curiosity, turning every garden row, woodworking project, and budgeting spreadsheet into
    a quiet testament to order and personal legacy.
background:
  cultural: Jonathan is a Salvadoran‑American whose parents immigrated from El Salvador in the early 1970s. Raised in a bilingual household in the Washington, D.C. metro area, he grew up celebrating Salvadoran
    holidays such as Día de la Independencia with family gatherings, pupusa‑making parties, and traditional music. He remains connected to the local Salvadoran community in Fairfax County through the annual
    Fiesta Salvadorena, volunteer work at a community center offering language classes, and regular visits to relatives in El Salvador. His cultural identity blends the warmth of Salvadoran family traditions
    with the civic engagement of his American environment.
attributes:
  skills: '[''Home repair and DIY maintenance'', ''Budgeting and personal financial planning'', ''Basic computer troubleshooting (Windows OS)'', ''Bilingual Spanish‑English communication'', ''Community
    event coordination'', ''Woodworking and carpentry'', ''Document organization and archival research'', ''Mentoring and skill‑transfer tutoring'']'
  hobbies: '[''Reading historical non‑fiction'', ''Gardening (vegetables and herbs)'', ''Woodworking and furniture making'', ''Cooking Salvadoran cuisine (pupusas, tamales)'', ''Puzzle solving (jigsaw,
    logic puzzles)'', ''Watching documentaries on engineering and history'', ''Walking along the Potomac River'']'
  career_goals: Jonathan aims to channel his disciplined, achievement‑driven mindset into part‑time consulting and volunteer leadership. He plans to offer budgeting and operational advice to small local
    businesses, serve on the board of a Salvadoran cultural organization in Fairfax County, and launch a modest workshop series on DIY home projects for seniors. Additionally, he hopes to document his family’s
    migration story in a memoir, preserving cultural heritage for future generations.
