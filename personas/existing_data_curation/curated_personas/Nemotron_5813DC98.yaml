personas:
  professional: Casey Frangella, a 27‑year‑old data‑driven product enthusiast, blends Python, Tableau, and SolidWorks expertise to turn community‑focused insights into pragmatic roadmaps, while their competitive
    streak pushes them to meet aggressive milestones even as their laid‑back scheduling sometimes leaves the backlog a little messy.
  sports: Casey Frangella, a regular on the Clarksville co‑ed soccer league and a salsa‑dance enthusiast, follows the Tennessee Titans in the fall, cheers for the Nashville Predators during hockey season,
    and prefers weekend hikes on the Cumberland River trail over regimented gym sessions, often joining the local hiking club for group outings.
  arts: Casey Frangella, who hosts board‑game nights and experiments with Arduino light installations, draws creative inspiration from the folk group The Lost River Band, jazz pianist Robert Glasper, indie
    game composer Disasterpeace, and the improvisational sketches of The Second City, weaving those influences into both their DIY projects and social gatherings.
  travel: Casey Frangella, who plans travel on a whim, has road‑tripped to Asheville’s Blue Ridge Mountains, spent a music‑filled weekend in New Orleans, and dreams of backpacking through Patagonia’s Torres
    del Paine, yet often leaves lodging and transport details to the last minute, relying on spontaneous decisions and the occasional discount airline deal.
  culinary: Casey Frangella, an adventurous home cook, blends Southern smoked brisket with Korean gochujang‑glazed tofu, perfects a cauliflower‑crust pizza after hearing the Gastropod podcast, and frequently
    tosses fresh cilantro, lime, and mango into a revitalized shrimp étouffée, while still ordering delivery pizza on nights when a new project deadline looms.
  core: Casey Frangella, a curiosity‑driven tech tinkerer who can juggle a soccer ball, a Python script, and a salsa step, often forgets where they parked after a hike but never misses a chance to debate
    the best data visualization method over a board‑game night.
background:
  cultural: Casey grew up in a middle‑class family in the Clarksville area of Tennessee, an environment shaped by the nearby Fort Campbell military community and the broader Mid‑South cultural mix. Her
    upbringing emphasized Southern hospitality, community involvement, and a strong work ethic, while also encouraging curiosity and education. She celebrates regional traditions like local music festivals
    and barbecue gatherings, yet remains open to diverse perspectives and modern ideas, reflecting a blend of traditional Southern values and contemporary, technology‑driven outlooks.
attributes:
  skills: '[''Python programming'', ''Statistical analysis'', ''Data visualization (Tableau)'', ''CAD design (SolidWorks)'', ''Rapid prototyping'', ''DIY electronics'', ''Public speaking'', ''Team facilitation'',
    ''Project coordination'', ''Critical thinking'']'
  hobbies: '[''Soccer (recreational league)'', ''Salsa dancing'', ''Hiking the Cumberland River trail'', ''DIY electronics (Arduino, Raspberry Pi)'', ''3‑D printing projects'', ''Mentoring youth coding
    club'', ''Board game nights'', ''Experimenting with cooking recipes'', ''Listening to science & tech podcasts'', ''Attending local music festivals'']'
  career_goals: Casey aims to transition from academic preparation to a role where she can fuse technology with people‑focused impact. She is targeting product‑management or technical‑consulting positions
    at innovative firms that value flexible work arrangements and allow her to shape product roadmaps. Long‑term, she aspires to launch a boutique consultancy that helps midsize companies adopt data‑driven
    solutions for sustainability and community development, leveraging her competitive drive and knack for turning ideas into practical outcomes.
