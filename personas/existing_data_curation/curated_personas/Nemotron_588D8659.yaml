personas:
  professional: Phuong Vang, a budding marine‑science explorer, blends their love of structured beach experiments, meticulous LEGO building, and spontaneous cartoon sketching to envision a future designing
    interactive ocean‑themed exhibits for children.
  sports: Phuong Vang swims with the local tide‑pool club, cheers for the Honolulu Wave Warriors during the summer baseball season, and treats sand‑castle building as an informal fitness routine, preferring
    unstructured play over rigid training schedules, which they find soothing.
  arts: Phuong Vang draws vibrant cartoon characters inspired by classic animations, practices hula dancing with their mother to rhythmic chants, and sings family‑passed songs while listening to island
    ukulele tunes, finding creative release in mixing folklore with modern pop culture.
  travel: Phuong Vang dreams of snorkeling among Maui’s coral reefs, has already visited the nearby volcanic park on a family trip, and prefers short, parent‑planned getaways that balance beach time with
    interactive museum tours, though they sometimes wish for a spontaneous overnight campout.
  culinary: Phuong Vang helps roll fresh spring rolls with crisp herbs, experiments with pineapple‑glazed teriyaki chicken—a nod to their family’s island recipes—and masters arranging colorful fruit kebabs
    for school picnics, delighting in the hands‑on kitchen creativity.
  core: Phuong Vang, a 9‑year‑old beach‑loving LEGO builder, mixes meticulous curiosity with carefree spontaneity, navigating daily life through vibrant imagination, gentle anxiety, and a habit of turning
    routine chores into playful experiments that they adore.
background:
  cultural: Phuong is a first‑generation Vietnamese‑American raised in Honolulu, Hawaii. At home she speaks both English and Vietnamese, and her family celebrates Tet with traditional foods like phở and
    bánh mì. Growing up on the islands, she is immersed in Hawaiian culture, attending hula lessons, learning a few Hawaiian words, and taking part in local festivals such as the Honolulu Festival. This
    blend of Vietnamese family values—respect for elders, close‑knit community—and Hawaiian reverence for nature and the ocean shapes her worldview and daily life.
