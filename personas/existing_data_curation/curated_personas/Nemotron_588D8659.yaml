  hobbies: '[''Swimming'', ''Building sandcastles'', ''Collecting shells'', ''LEGO building'', ''Drawing'', ''Reading adventure books'', ''Playing Minecraft'', ''Hula dancing'', ''Learning Vietnamese songs'',
