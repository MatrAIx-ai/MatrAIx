  career_goals: Phuong dreams of becoming a marine biologist so she can explore the Pacific ocean and help protect sea turtles and coral reefs around Hawaii. She also imagines one day being a teacher, sharing
    her love for learning and kindness with younger children. As she grows, she hopes to build confidence, manage her worries, and develop the knowledge and skills needed to make a positive impact on both
    the environment and her community.
