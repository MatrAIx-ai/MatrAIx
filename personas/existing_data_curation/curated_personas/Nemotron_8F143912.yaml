  hobbies: '[''Soccer'', ''Hiking'', ''Guitar playing'', ''Sketching and digital illustration'', ''Avant‑garde film appreciation'', ''Speculative fiction reading'', ''Blender (3D modeling)'', ''Wine tasting'',
    ''Home brewing'', ''Tango dancing'', ''STEM mentorship'']'
  career_goals: Rafael aims to pivot into a senior innovation consultancy role where he can lead projects that fuse sustainable engineering solutions with artistic expression, such as interactive public
    installations that improve energy efficiency. He aspires to become a recognized thought leader at the intersection of technology and art, publishing articles, speaking at conferences like TEDx, and
    eventually founding a boutique consultancy focused on eco‑creative engineering for municipalities and private firms. Additionally, he is committed to mentoring the next generation, planning to establish
    a mentorship program with local schools and maker spaces.
