persona_description: A historian specializing in the study of Anglo-Saxon and Viking history, particularly focusing on the military strategies, civil defense measures, and contemporary Danish activities
  of the late Anglo-Saxon period. His/her research interests include the creation of an online database of evidence, the detailed analysis of place-name elements and archaeological features, the publication
  of articles in relevant, peer-reviewed journals, the creation of an ADS special collection database, the writing of a monograph, and the organizing of a conference. The persona has extensive knowledge
  and expertise in the field of Late Anglo-Saxon civil defense and contemporary Danish activities, and is proficient in the use of library and bibliographic resources, National Monuments Record (NMR) and
  county Sites and Monuments records (HERs), 'grey-literature' held by contracting archaeological units, and existing scholarly corpuses (e.g. the electronic thesaurus of the English Place-Name Society).
  The persona is also skilled in field-study involving the detailed analysis of place-name elements and archaeological features and their topographical context, e.g. intervisibility, access and spatial
  organization.
