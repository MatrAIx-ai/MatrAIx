  hobbies: '[''Playing dominoes'', ''Salsa and bomba dancing'', ''Cooking traditional dishes'', ''Community clean-up volunteering'', ''Gardening (plantains, herbs)'', ''Listening to Puerto Rican music'',
    ''Watching baseball'', ''Bike riding'']'
  career_goals: Federico aspires to transform his practical abilities into a small, community‑focused handyman business, providing affordable home repairs to neighbors. He also aims to complete his GED
    and acquire a vocational certificate in electrical work, which would enable him to expand his services. Additionally, he hopes to take a leadership role in the local community center, organizing educational
    workshops and cultural events that strengthen ties among residents.
