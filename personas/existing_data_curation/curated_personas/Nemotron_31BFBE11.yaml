personas:
  professional: Federico Fernandez, a 37‑year‑old community‑oriented handyman, combines his practical expertise in carpentry, basic electrical work, and plumbing with his calm, organized demeanor to efficiently
    coordinate neighborhood repair projects, mediate minor disputes, and plan the launch of an affordable, locally‑focused service while pursuing a GED and a vocational certificate in electrical work.
  sports: Federico Fernandez follows the local baseball team the Seagulls, enjoys cheering them on at weekend games, rides a mountain bike on scenic municipal trails, and plays informal soccer on Saturdays
    with the neighborhood’s community club, staying active and connected to his neighbors.
  arts: Federico Fernandez immerses himself in the rhythms of classic salsa legends like Celia Cruz and modern Latin pop star Ricky Martin, regularly dances bomba and salsa at community gatherings, and
    occasionally attends nightly performances by the local theater troupe "Los Artesanos" to keep his cultural roots alive.
  travel: Federico Fernandez favors low‑cost, self‑planned road trips, often cycling to nearby beaches such as Playa del Coral, has taken a weekend excursion to the historic walled city of San Juan, and
    dreams of exploring the colonial streets of Cartagena and the bustling markets of Oaxaca while balancing his modest savings.
  culinary: Federico Fernandez delights in preparing traditional dishes like arroz con gandules, mofongo stuffed with plantains, and suero relleno, seasoning them with fresh cilantro, garlic, and ripe plantains
    harvested from his garden, and enjoys sharing these meals at family gatherings and community festivals.
  core: Federico Fernandez blends hands‑on practicality with a sunny social spirit, juggling a budding handyman venture, a strict budget, and a love for salsa rhythms, all while never missing a weekend
    bike ride or a neighborhood clean‑up, even if they sometimes forget to floss.
background:
  cultural: Federico grew up in Comerio, a close‑knit town in the San Juan Municipio, deeply rooted in Puerto Rican culture. He was raised in a Spanish‑speaking, Catholic household where family gatherings,
    música típica, and culinary traditions such as arroz con gandules and lechón were central. The vibrant local festivals, the rhythms of plena and bomba, and the communal spirit of vecinos (neighbors)
    have shaped his values of cooperation, hospitality, and respect for heritage. He identifies strongly with the island’s blend of Taino, African, and Spanish influences, and he actively participates in
    community events that celebrate these cultural roots.
