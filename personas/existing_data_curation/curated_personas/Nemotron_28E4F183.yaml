  career_goals: As she grows, Dharini aspires to channel her curiosity and love for art into a future career that merges creativity with cultural storytelling. She dreams of becoming an artist, designer,
    or educator who can inspire others through visual and performing arts, while integrating her South Asian heritage and Midwestern experiences. Her long‑term ambition includes pursuing higher education
    in the arts and contributing to community cultural programs.
