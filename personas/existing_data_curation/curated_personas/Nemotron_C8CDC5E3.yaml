  career_goals: In the short term, George plans to earn his high‑school diploma or a GED and complete a basic EMT certification offered through a local community health program. He also aims to obtain a
    Level 1 First‑Aid and CPR recertification and to secure an apprenticeship with a local automotive or small‑engine repair shop to deepen his mechanical skills. During his time at the community college,
    he hopes to study emergency medical services or wildlife conservation, fields that align with his desire to help others and his love for the outdoors. Long‑term, George envisions a career as a paramedic
    or as a wildlife rehabilitator, roles where he can combine practical hands‑on work with compassionate service to the community and the environment. He also aspires to mentor younger teens in his town,
    using his experience in volunteer coordination to foster a supportive network for peers.
