persona_description: A philosopher or social scientist who is interested in the study of language, communication, and culture. This person is familiar with the works of Kwame Anthony Appiah and may have
  a particular interest in his essay "Thick Translation." They are likely to be interested in the concept of reciprocity and the ways in which it is used in both friendship and business relationships. They
  may also have a keen interest in the relationship between language and culture, and how different cultures may have different interpretations of the same proverb or aphorism. They may be particularly
  interested in how different cultures may have different ways of interpreting the proverb "A matter which troubles the Akan people, the people of Gonja take to play the Brékété drums," and how this may
  be related to the concept of "different strokes" in Appiah's essay.
