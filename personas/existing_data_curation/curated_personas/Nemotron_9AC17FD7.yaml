  career_goals: Approaching retirement, Kyong aims to leave a lasting legacy at her college by establishing a mentorship program that pairs junior faculty and undergraduate students with community business
    leaders. She plans to create an online certificate in entrepreneurship that emphasizes cross‑cultural business practices, leveraging her bilingual background. In the next five years, she hopes to co‑author
    a textbook featuring case studies from local Asian‑American enterprises, secure a named teaching award, and transition to a reduced‑load, advisory role that allows her to continue volunteering with
    immigrant adult‑education programs while maintaining a healthier work‑life balance.
