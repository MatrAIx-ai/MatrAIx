persona_description: A GIS manager for a county emergency management department, responsible for preparing for and managing emergency situations, particularly in relation to the Super Bowl and disaster
  relief efforts. She is skilled in using ArcGIS Server and Flex Viewer, as well as tracking data and creating maps and reports. She has experience with data organization in layers, including crime incidents,
  properties, and emergency services, and has a deep understanding of the county's infrastructure and population. She is also knowledgeable about the county's culture and the potential for mass migration
  due to political changes.
