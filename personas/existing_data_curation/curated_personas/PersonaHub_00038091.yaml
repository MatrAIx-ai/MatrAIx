persona_description: A historian who specializes in the study of Roman Britain and its coins, particularly focusing on the patterns of hoarding and the reasons behind the burial and non-recovery of coin
  hoards. His research interests include the landscape settings of coin hoards, the analysis of container types, and the comprehensive online database that supports the project. He is also interested in
  the GIS analysis of all the hoards and field surveys of a sample of them.
