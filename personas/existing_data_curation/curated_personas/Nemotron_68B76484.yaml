  hobbies: '[''visiting art galleries'', ''sketching'', ''photography'', ''hiking'', ''reading business and psychology books'', ''entrepreneurial meetups'', ''volunteering at fundraisers'', ''running'',
    ''yoga'', ''experimental cooking'', ''indie film screenings'']'
  career_goals: Anna aims to secure a product management position within a tech‑focused consumer goods company, where she can integrate her analytical strengths with her artistic sensibility to launch innovative
    products. Over the next five years, she intends to lead cross‑functional teams, oversee successful product launches, and progress to a senior strategy role such as Director of Brand Strategy. To deepen
    her strategic acumen, she plans to pursue an MBA. Long‑term, Anna envisions founding a boutique consultancy that helps startups develop sustainable, culturally resonant branding solutions.
