  career_goals: Katie dreams of becoming a professional illustrator or concept artist for fantasy novels, graphic novels, and video games, where she can blend visual art with storytelling. She hopes to
    attend a specialized art high school or a college with a strong visual arts program, eventually working freelance to preserve the flexibility she values. In the long term, she aims to publish her own
    graphic novel and use her artistic skills to support environmental and mental‑health awareness campaigns, creating visual media that inspires and informs.
