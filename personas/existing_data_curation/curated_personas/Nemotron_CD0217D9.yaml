personas:
  professional: An aspiring visual storyteller, Katie Dunning merges hand‑drawn sketches, delicate watercolors, and vibrant digital illustrations to create ethereal fantasy maps, thriving in solitary creative
    bursts while embracing a relaxed, sometimes disorganized work habit that fuels their imaginative output.
  sports: An enthusiastic nature hiker and occasional cross‑country runner, Katie Dunning follows the St. Louis Cardinals for spring baseball, participates in the local youth hiking club's weekend treks
    through the Ozark foothills, and prefers solitary trail runs over organized team sports.
  arts: Immersed in ambient soundscapes by Brian Eno, inspired by the brushwork of Claude Monet, and fascinated by Hayao Miyazaki’s mythic worlds, Katie Dunning fills sketchbooks with watercolor scenes,
    writes poetry echoing Sylvia Plath, and crafts intricate fantasy maps that blend mythology and astrophysics, with their imagination constantly sparking new artistic experiments.
  travel: Dreaming of wandering the misty cliffs of Iceland and the ancient forests of Germany’s Black Forest, Katie Dunning favors low‑key road trips with family that allow spontaneous detours for sketching
    sessions, yet their flexible planning sometimes results in missed reservations at popular attractions.
  culinary: Favoring fresh garden vegetables, wild mushrooms, and seasonal berries, Katie Dunning often whips up simple stir‑fries and berry compotes, while their kitchen skill hovers at an intermediate
    level where they experiment with watercolor‑inspired plating yet still rely on instant ramen for late‑night study meals.
  core: A 14‑year‑old solitary dreamer, Katie Dunning weaves art, poetry, and nature into an ever‑evolving imagination, juggling a relaxed approach to structure with a relentless curiosity about the cosmos.
background:
  cultural: 'Katie grew up in Poplar Bluff, a small Midwestern town in southeast Missouri. Her family reflects typical rural White American values: modesty, self‑reliance, community involvement, and a deep
    appreciation for the outdoors. The local culture includes evangelical Christian traditions, county fairs, and strong family ties. While her community is close‑knit, Katie often retreats to quiet spaces
    like her bedroom or the nearby woods, where she can indulge in solitary creative pursuits. The region’s slower pace, gentle natural landscapes, and supportive community provide a subtle backdrop that
    nurtures her imaginative and introspective nature.'
