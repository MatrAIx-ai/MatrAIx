personas:
  professional: Glen Willis is an aspiring lead technician who combines a systematic diagnostic method with hands‑on expertise in engine overhauls, brake and suspension work, and budding hybrid powertrain
    knowledge, all while keeping the shop meticulously organized and communicating clearly with customers, and they aim to earn ASE Master Technician certification within three years before opening a community‑focused
    garage in Ponca City.
  sports: Glen Willis is a regular at the Ponca City community center’s pickup basketball league, a devoted fan of the Oklahoma City Thunder and the Oklahoma Sooners, and a weekend hunter and fisherman
    who favors deer in the Wichita Mountains and bass on nearby lakes, and they keep fit through both court drills and early‑morning treks.
  arts: Glen Willis’s artistic side fuels a garage soundtrack of The Rolling Stones, Lynyrd Skynyrd, Johnny Cash, and Willie Nelson, while they also appreciate classic car show aesthetics, sporadically
    attend local live‑music bar gigs, and collect vintage concert posters for the walls of their workshop.
  travel: Glen Willis plans road trips with the precision of a service schedule—already cruising to Detroit’s Auto Show, Nashville for a country‑music festival, and dreaming of a future pit‑stop at Germany’s
    Nürburgring and Japan’s Toyota museum, but they balance these ambitions against a modest student‑loan budget and a need to be home for family gatherings.
  culinary: Glen Willis loves cooking over a backyard grill, perfecting a smoked brisket rub with brown sugar, paprika, and coffee grounds, whipping up chili con carne with beans, beef, and cumin, and pairing
    their meals with craft beers, and they admit to over‑seasoning dishes when the garage gets too noisy.
  core: Glen Willis is a methodical, sociable gearhead who balances grease‑stained hands with classic rock vibes, weekend hunts, and a relentless quest for perfect tool order—yet they often binge‑watch
    car videos late into the night, neglecting sleep.
background:
  cultural: Glen was raised in a close‑knit Midwestern family in Ponca City, Oklahoma. His upbringing emphasized hard work, community involvement, and respect for tradition. He grew up attending local church
    gatherings, participating in school sports, and helping out at family events like the annual county fair. The values of reliability, friendliness, and cooperation that characterize his community are
    reflected in his everyday interactions and his desire to give back through mentorship and service.
attributes:
  skills: '[''Automotive diagnostics'', ''Engine repair and rebuild'', ''Brake system maintenance'', ''Suspension and steering work'', ''Electrical system troubleshooting'', ''Hybrid and electric vehicle
    fundamentals'', ''Preventive maintenance planning'', ''Workshop organization'', ''Customer service and communication'']'
  hobbies: '[''Car club participation and meet‑ups'', ''Attending regional automotive shows'', ''Pickup basketball'', ''Volunteer work at county fair classic car exhibit'', ''Hunting and fishing trips'',
    ''Working on personal project vehicle'', ''Listening to classic rock and country music'']'
  career_goals: Glen aims to earn ASE Master Technician certification within the next three years and become a lead technician at his current shop. He aspires to specialize in electric and hybrid vehicle
    service, positioning himself at the forefront of the industry’s shift toward sustainable transportation. Long‑term, he dreams of opening his own community‑focused auto repair garage in Ponca City, where
    he can mentor apprentices and offer dependable service to local residents.
