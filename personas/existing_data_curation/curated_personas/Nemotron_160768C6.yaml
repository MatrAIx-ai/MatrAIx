personas:
  professional: Juan Millon, an experienced flooring installer with a flair for abstract art, merges their technical expertise in carpet, vinyl, laminate, and ceramic tile with a vivid imagination to craft
    custom mosaics and carpet patterns that echo traditional textile motifs, and is now channeling this blend into launching a specialty flooring studio that balances artistic expression with practical
    functionality.
  sports: Juan Millon embraces the Iowa countryside on weekly hikes with the Midwest Hikers club, follows the Iowa Hawkeyes football team and the Des Moines Menace soccer club for local sports thrills,
    joins the Iowa Cycling Club for weekend rides, and treats fitness as a meditative escape rather than a regimented gym routine, often swapping cross-country ski outings in winter for spontaneous trail
    runs when they seek mental clarity.
  arts: Juan Millon spends evenings sketching abstract designs inspired by geometric textile patterns, experiments with colored sand art reminiscent of ancient motifs, draws creative fuel from artists like
    Wassily Kandinsky and Bridget Riley, enjoys playing acoustic guitar to the tunes of Juanes during family gatherings, and regularly attends workshops led by local muralist Alejandro Cruz to broaden their
    technique, allowing them to merge traditional aesthetics with contemporary abstraction.
  travel: Juan Millon prefers flexible road trips that blend art pilgrimages with culinary stops, having driven the historic Route 66 to explore iconic diners, trekked the vibrant markets of Oaxaca to study
    textile crafts, lingered in Portland's food carts for their famed kimchi tacos, and now dreams of visiting Santa Fe's Georgia O'Keeffe Museum to soak in Southwest modernism, all while budgeting trips
    through a dedicated travel savings account that they top up quarterly.
  culinary: Juan Millon loves cooking tamales wrapped in corn masa with roasted red chilies, preparing chiles rellenos stuffed with cheese and diced potatoes, seasoning dishes with fresh cilantro, lime
    juice, and a pinch of cumin, while also enjoying Iowa farm-to-table vegetables like heirloom tomatoes and sweet corn, and their moderate cooking skill lets them experiment with fusion plates that blend
    traditional flavors with contemporary plating techniques, a practice they find both soothing and creatively rewarding.
  core: Juan Millon is a flooring craftsman-artist who navigates life with a relaxed, flexible mindset, channeling an inventive eye into custom floor designs while occasionally letting disorganization trip
    up their paperwork, a quirk they humorously blame on 'creative chaos.'
background:
  cultural: Juan was born in Guatemala and spent his early childhood immersed in the country's rich cultural tapestry of Mayan heritage and Spanish colonial influences. He grew up speaking Spanish at home,
    celebrating holidays such as Día de los Muertos and Semana Santa, and participating in traditional music and dance. After moving to the United States as a teenager, his family settled in the rural Midwest,
    where he adapted to American life while preserving Guatemalan customs—especially through food, storytelling, and community gatherings. This bicultural experience informs his appreciation for color,
    pattern, and communal cooperation, which he brings into both his work and personal life.
attributes:
  skills: '["Carpet and floor covering installation","Tile layout and pattern design","Subfloor preparation","Moisture barrier installation","Power tool operation","Technical drawing interpretation","Material
    selection","Client communication","Team coordination","Problem solving"]'
  hobbies: '["Sketching and abstract drawing","Sand art and mosaic experimentation","Hiking","Attending art workshops","Reading art history and architecture","Cooking Guatemalan cuisine","Playing guitar","Volunteer
    home repair projects"]'
  career_goals: Juan aims to transition from being an employee installer to owning a small specialty flooring business that emphasizes artistic tile mosaics and custom-designed carpet patterns inspired
    by Guatemalan motifs and contemporary abstract art. He wants to build a portfolio of unique floor designs that blend traditional craftsmanship with modern aesthetics, obtain advanced certifications
    in tile installation and eco-friendly flooring, and eventually mentor apprentices interested in the trade. He also hopes to expand his service area throughout rural Iowa while maintaining a flexible
    schedule that accommodates his creative pursuits.
