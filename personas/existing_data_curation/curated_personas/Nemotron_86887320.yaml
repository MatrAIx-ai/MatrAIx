  career_goals: In the next few years, Suong plans to complete a Bachelor's degree in Information Systems or Business Analytics, leveraging her curiosity for data-driven problem solving while maintaining
    a practical focus on marketable skills. She aims to secure a remote data analyst position that offers a structured environment and flexible hours, allowing her to manage her anxiety and emotional well‑being.
    Her competitive drive pushes her to become a recognized expert in translating complex data into strategic insights, with the long‑term ambition of advancing to a senior analyst or data science specialist
    role. She also seeks workplaces that prioritize mental‑health resources and foster collaborative yet accountable teams, aligning with her desire for reliability and personal growth.
