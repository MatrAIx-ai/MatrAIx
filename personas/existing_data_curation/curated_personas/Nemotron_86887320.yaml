personas:
  professional: Suong Tran, a 20‑year‑old budding data analyst, blends solid Python and JavaScript skills with a practical curiosity for turning raw Excel tables into clear Tableau dashboards, while their
    competitive drive pushes them to perfect every report and anticipate stakeholder questions before they arise.
  sports: Suong Tran enjoys solitary hikes on the Lake Elsinore Trail and occasional weekend runs with a close friend, while cheering for the Los Angeles Lakers during NBA season and following the San Diego
    State Aztecs soccer team for a dose of local sports spirit.
  arts: Suong Tran channels creative energy into digital illustration inspired by sci‑fi author N.K. Jemisin, captures sunrise over Lake Elsinore in photographs reminiscent of Ansel Adams, and unwinds with
    ambient playlists featuring Tycho and Ólafur Arnalds, often sharing their artwork on a modest Instagram feed.
  travel: Suong Tran prefers low‑key weekend getaways to nearby natural spots like Big Bear Lake and Joshua Tree, plans trips with meticulous spreadsheets to stay within a student budget, and harbors a
    quiet dream of visiting the lantern‑lit streets of Hoi An to photograph its historic charm.
  culinary: Suong Tran finds solace in cooking traditional Vietnamese dishes such as phở broth, bánh mì with pickled daikon, and fresh summer rolls, skillfully balancing fish sauce, star anise, and lime
    to recreate authentic flavors while documenting each step in a handwritten recipe journal.
  core: Suong Tran is a detail‑obsessed, anxiety‑prone 20‑year‑old who balances solitary creativity with a competitive streak, transforming data into insight by day and soothing their nerves with sketching,
    yoga, and strategic video‑game marathons by night.
background:
  cultural: Suong was raised in a Vietnamese immigrant household in Lake Elsinore, California. Her parents emigrated from Vietnam in the early 1990s, and the family preserves many traditions, including
    speaking Vietnamese at home, celebrating Tet, and preparing authentic dishes such as phở and bánh chưng. The local Vietnamese community center provides a cultural hub where Suong participates in language
    exchange sessions and community festivals, fostering a strong sense of belonging. Her upbringing emphasized academic achievement, respect for elders, and modesty, shaping her disciplined and organized
    approach to responsibilities. Navigating between Vietnamese cultural expectations and mainstream American society has cultivated both her competitive drive and a cautious stance toward external intentions,
    influencing her personal and professional aspirations. This bicultural experience informs her values, community involvement, and her ambition to integrate her heritage with modern career pathways.
