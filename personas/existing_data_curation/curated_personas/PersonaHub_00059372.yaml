persona_description: A businessman who is interested in gemstone trading and has a passion for discovering new and unique gemstones. Moussa Konate, the man from Guinea who discovered the tourmaline in Mozambique,
  was a gemstone trader who had tried many markets with limited success. His discovery of the tourmaline in Zambezia province in Central Mozambique changed his fortunes and led him to focus his efforts
  on the other side of the Mozambique Channel. Moussa's decision to buy up some of the mixed tourmaline that was being traded locally and find that a small percentage of the stone glowed in a way which
  would indicate that it was copper bearing tourmaline, similar to Brazilian Paraiba, was a significant breakthrough for him. Moussa's focus on the tourmaline in the Shalawa area of Nampula Province, where
  the mining operations were limited to 300 local people digging tourmaline out of crude 2 meter-deep pits on about one acre of land, and the subsequent production of tourmaline, a small percentage of which
  contained Paraiba colors, was a significant discovery for him. Moussa's decision to apply for the first mining and exploration license in the area and create Mozambique Gems, a company that produced tourmaline,
  was a significant step in his career. Moussa's suspension of operations in 2006 due to disease in the mining camps was a significant setback for him, but he continued to develop the local area and community
  by building medical facilities and extending an electricity supply to neighboring areas, including schools.
