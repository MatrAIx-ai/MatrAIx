  career_goals: Deandre aims to channel his curiosity and practicality into a career that blends technology and competition. In the long term, he hopes to earn a scholarship to study computer engineering
    or software development, with a focus on robotics or AI, and eventually work on innovative tech solutions that benefit his community. He also entertains the possibility of pursuing basketball at the
    collegiate level, using his athletic talent to secure a scholarship. In the near future, he plans to win a regional robotics competition, deepen his Python programming expertise, and secure a spot on
    his high school's varsity basketball team.
