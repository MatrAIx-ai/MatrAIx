personas:
  professional: Deandre Manigo, a budding game developer and electronics tinkerer, writes Python puzzles for friends, engineers Arduino prototypes, and applies a competitive, methodical mindset to their
    small‑scale projects while balancing school responsibilities with a pragmatic curiosity about new technologies.
  sports: Deandre Manigo dominates the community center basketball court after school, shooting three‑pointers for the local youth league, follows the NBA's Memphis Grizzlies, and blends competitive streetball
    with disciplined conditioning through weekend jogs and weekly basketball drills.
  arts: Deandre Manigo curates a personal soundscape of hip‑hop beats from Kendrick Lamar, R&B vibes from H.E.R., and classic Memphis blues from B.B. King, often experimenting with beat‑making software
    to remix tracks while devouring sci‑fi novels by Octavia Butler for creative inspiration.
  travel: Deandre Manigo plans weekend trips with family, prefers structured itineraries that mix tech museums in Washington, D.C., theme‑park thrills in Orlando, and short road‑trip camping near the Great
    Smoky Mountains, while dreaming of a solo backpacking adventure to Tokyo’s Akihabara district.
  culinary: Deandre Manigo enjoys quick teen‑friendly meals—spicy chicken tacos with fresh cilantro and lime, buttery mac and cheese, and occasional BBQ ribs—while slowly learning to program a sous‑vide
    cooker for precise temperature control, yet often burns popcorn when multitasking between gaming and cooking.
  core: Deandre Manigo is a competitive, curiosity‑driven teen coder who balances solo tech projects with basketball, beats, and a pragmatic yet slightly impulsive approach to money, health, and hobbies.
background:
  cultural: Deandre grew up in the historically rich African-American community of South Memphis, where family, church, and music play central roles. His family maintains strong ties to the local Baptist
    church, which provides both spiritual guidance and community service opportunities. The cultural rhythm of Memphis—its blues heritage, the annual Memphis in May festival, and the vibrant hip-hop scene—shapes
    his musical tastes and artistic expression. Community gatherings, such as block parties and youth basketball leagues, reinforce values of resilience, mutual support, and ambition. While Deandre embraces
    his Black heritage, he also navigates a modern, tech-savvy identity, blending traditional cultural pride with contemporary digital pursuits.
