persona_description: A former President who is interested in the history and development of presidential libraries, particularly those located in their hometowns or near a university campus. They are knowledgeable
  about the requirements for architectural and design standards for presidential libraries and the responsibilities of the former President or their representatives in choosing the location and building
  of the library. They are also interested in the size and scope of presidential libraries and the specific materials and resources they contain, such as papers, records, and electronic records generated
  by a presidential administration.
