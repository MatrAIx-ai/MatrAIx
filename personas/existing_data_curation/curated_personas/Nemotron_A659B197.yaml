  career_goals: Edward aims to advance from a housekeeper to a lead supervisor within a hospitality or healthcare setting, obtaining certifications in facilities management and sustainable cleaning practices.
    He hopes to enroll in a community college program for business administration to eventually launch his own cleaning service focused on eco-friendly solutions. His ambition is to achieve a stable income
    that supports independent living while continuing to refine his expertise and mentor new staff.
