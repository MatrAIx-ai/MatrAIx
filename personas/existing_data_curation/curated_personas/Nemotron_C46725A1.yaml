personas:
  professional: Katelyn Kares, a part‑time data‑driven consultant, leverages R, SPSS, and Python to help small nonprofits make evidence‑based decisions while embracing a relaxed, curiosity‑driven workflow
    that favors solitary research and compassionate mentorship over rigid deadlines, and they thrive on the flexibility of working from their garden‑filled home.
  sports: Katelyn Kares, who enjoys gentle morning walks with binoculars and occasional bird‑watching hikes, casually follows the Atlanta Braves in baseball and supports the local Nature Trail Walkers club,
    favoring low‑intensity fitness over competitive sports, and they find peace in the rhythm of a steady pace.
  arts: Katelyn Kares, an avid knitter and stargazer, finds inspiration in the photography of Ansel Adams, the folk storytelling of Bob Dylan, and the poetry of Maya Angelou, often listening to Nina Simone
    while sketching constellations, and they channel that creative energy into intricate knitting patterns.
  travel: Katelyn Kares favors low‑key, solo trips to quiet natural settings like the Great Smoky Mountains and the night‑dark skies of Bryce Canyon, planning itineraries loosely around garden‑inspired
    workshops and bird‑watching opportunities, while budgeting carefully to keep travel within a modest retirement fund, and they relish the chance to sketch local flora wherever they go.
  culinary: Katelyn Kares, a confident home cook, blends classic Southern comfort foods such as shrimp‑and‑grits, collard greens, and peach cobbler with fresh herbs from her garden—like thyme, basil, and
    rosemary—and occasionally experiments with smoked paprika and citrus glazes to reinvent family recipes, and they take pride in serving dishes that echo both tradition and scientific curiosity.
  core: Katelyn Kares is a quietly curious 47‑year‑old data enthusiast who balances scientific rigor with garden‑grown flavors, prefers solitude, occasionally misplaces keys amid knitting projects, and
    channels compassion into mentoring and community stewardship, and they navigate life with a calm, flexible rhythm.
background:
  cultural: Katelyn grew up in Greenwood, South Carolina, a small‑town setting steeped in Southern hospitality, Protestant church traditions, and a close‑knit community ethos. Her family's values emphasized
    humility, self‑reliance, and a strong work ethic, while encouraging education as a path to personal advancement. The regional culture’s appreciation for nature, gardening, and seasonal cooking is reflected
    in her daily routines. At the same time, her pursuit of a STEM degree and her independent outlook illustrate a blend of traditional Southern roots with a modern, progressive mindset that supports gender
    equity in science.
attributes:
