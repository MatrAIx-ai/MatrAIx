    maintenance'', ''Horticulture'', ''Conflict resolution'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading (science & nature)'', ''Knitting'', ''Journaling'', ''Cooking Southern cuisine'', ''DIY home projects'', ''Stargazing'', ''Volunteer tutoring'']'
  career_goals: Although currently out of the formal workforce, Katelyn aims to channel her analytical expertise into part‑time, remote consulting for small businesses and non‑profits in her region, helping
    them make data‑driven decisions. She is passionate about encouraging young women to pursue STEM and hopes to launch a mentorship program at the local high school. In the longer term, she envisions authoring
    a practical guide that blends scientific thinking with sustainable gardening for rural communities. Flexibility and the ability to work from her quiet home environment are central to her career aspirations.
