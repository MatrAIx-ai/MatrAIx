  career_goals: Though only ten, Philip already envisions a future where he can combine his love of the Gulf Coast’s natural world with his knack for solving problems. He hopes to study marine biology or
    environmental engineering so he can help protect the wetlands and coastal habitats near Gautier. He also dreams of becoming a community leader—perhaps a park ranger or a civil engineer—who designs safe,
    sustainable spaces for his town. His ambition is guided by curiosity about science and a practical desire to make a tangible difference.
