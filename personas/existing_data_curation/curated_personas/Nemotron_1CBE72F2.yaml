  career_goals: He aims to move from front-line sales to a leadership role, targeting a position as sales manager within the next two years and eventually regional director overseeing multiple territories.
    Robert wants to spearhead innovative sales strategies that integrate sustainability and emerging technologies, and eventually launch his own boutique consultancy helping manufacturers adopt eco-friendly
    sales approaches. He also seeks professional development in emotional resilience to better support his team.
