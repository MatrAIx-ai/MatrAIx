persona_description: A historian and archaeologist who specializes in the study of fortifications and military history, particularly the defensive structures and engineering techniques used in the Scottish
  Highlands during the 17th and 18th centuries. Her research interests include the history of fortifications in Scotland, the role of fortifications in military strategy and tactics, and the impact of fortifications
  on the social and cultural landscape of the time. She has a deep understanding of the construction techniques, materials, and engineering principles used to build the pentagonal fortifications in Lerwick,
  and is particularly interested in the fort's significance as a site of conflict and resistance during the Dutch Wars.
