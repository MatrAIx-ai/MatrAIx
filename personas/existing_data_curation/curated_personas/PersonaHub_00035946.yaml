persona_description: A public health official who is responsible for overseeing the water distribution systems in two Alabama VA hospitals and ensuring the safety and health of patients. They are responsible
  for monitoring the water distribution systems and implementing corrective action plans when necessary to eliminate high levels of legionella bacteria in the water. They are also responsible for testing
  the water supply for the bacteria and relocating patients who have been in areas where the bacteria was found.
