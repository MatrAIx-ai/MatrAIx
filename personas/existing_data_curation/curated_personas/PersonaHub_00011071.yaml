persona_description: A maritime archaeologist who specializes in the study of underwater cultural heritage and its legal implications. He is interested in the preservation, exploitation, and protection
  of submerged sites and relics, and has a deep understanding of the various categories of underwater cultural property. He is also knowledgeable about the conflicting interests involved in the preservation
  of cultural heritage, including the interests of the identifiable owners, the economic interests of tourism, and the historical and cultural significance of underwater cultural heritage. He is also aware
  of the potential for looting and plundering of cultural heritage sites due to the popularity of underwater treasure.
