  hobbies: '[''Exploring street murals'', ''Sketching outdoors'', ''Watercolor and acrylic painting'', ''Poetry writing'', ''Listening to indie folk/Americana'', ''Playing acoustic guitar at open‑mic nights'',
    ''Collecting vintage vinyl records'', ''Reading graphic novels'', ''Volunteering at community garden'']'
  career_goals: Bobby hopes to formalize his education by obtaining a GED within the next year and then enroll in a community‑college art program or workshops that focus on visual arts and digital media.
    His long‑term ambition is to become a financially independent independent artist, selling original paintings, prints, and small crafts on platforms like Etsy and at local art fairs. He also envisions
    part‑time work at a community art center or a local art supply shop, where he can share his knowledge and stay connected with the creative community, while preserving the flexible lifestyle he values.
