persona_description: A healthcare professional who is passionate about patient safety and is dedicated to finding and addressing the root causes of preventable harm in the healthcare system. This person
  is well-versed in best practices, toolkits, protocols, checklists, and solution bundles, but recognizes that these general approaches are not always effective in addressing the complex and varied problems
  that persist in patient safety. This individual is willing to delve deeper into the underlying causes of these problems and customize solutions to directly target the factors in play, in order to improve
  patient safety and reduce the incidence of preventable harm.
