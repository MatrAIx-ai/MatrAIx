personas:
  professional: Jeanette Badon, an analytical business intelligence specialist, translates complex data sets into sleek Power BI dashboards and Lean Six Sigma-optimized process maps, thriving on predictable
    structures while quietly out-maneuvering rivals in senior leadership meetings, and they relish the occasional freedom to improvise on the fly despite a habit of leaving spreadsheets open for days.
  sports: Jeanette Badon, a keen kayaker with the Gulf Coast Kayak Club, follows the Miami Heat, Tampa Bay Buccaneers, and Florida Gators with a competitive edge, fitting in weekend bird-watching walks
    and low-impact Pilates sessions to stay fit while they rarely hit the gym, preferring solitary, structured activity over team sports.
  arts: Jeanette Badon, an avid reader of contemporary authors like Margaret Atwood and Malcolm Gladwell, finds artistic solace in Ansel Adams-style nature photography, curates a playlist of Fleet Foxes
    and Sufjan Stevens while cooking, and occasionally attends intimate performances of the local theater troupe "Sunset Playhouse", reflecting a quiet yet discerning appreciation for narrative and visual
    art.
  travel: Jeanette Badon prefers meticulously planned solo road trips along Florida's Gulf Coast - such as a recent sunset drive to Sanibel Island and a bird-watching weekend in Everglades National Park
    - while dreaming of a structured cultural soak in Lisbon's Alfama district and a culinary exploration of Kyoto's fish markets, balancing a love for quiet immersion with a competitive urge to tick off
    unique destinations.
  culinary: Jeanette Badon, an adventurous home chef, regularly whips up citrus-marinated grouper with fresh thyme from her herb garden, shrimp-taco bowls crowned with cilantro and jalapeno, and a daring
    coconut-lime bisque, showcasing a medium-high cooking skill set while occasionally neglecting proper seasoning - a quirk they attribute to their relaxed approach to meal planning.
  core: Jeanette Badon blends analytical precision with a laid-back love for solitary kayaking, relentless data-driven competition, occasional spreadsheet clutter, and a habit of leaving coffee mugs perched
    on the edge of their desk.
background:
  cultural: Raised in a middle‑class family in the Gulf Coast region, Jeanette’s cultural background blends Southern hospitality with a practical, self‑reliant mindset. Living in Lynn Haven, Florida, she
    identifies with the area’s close connection to the ocean, valuing outdoor activities like fishing, boating, and coastal conservation. While she appreciates community traditions such as local seafood
    festivals and volunteer clean‑up events, she maintains a personal focus on independence and measured social interaction, reflecting the region’s balance between communal ties and individual privacy.
    Her upbringing emphasized diligence, respect for routine, and a measured skepticism toward authority, traits that continue to inform her professional demeanor.
attributes:
  skills: '[''Data Analysis'', ''Statistical Modeling'', ''Process Improvement'', ''Project Management'', ''Business Intelligence (Power BI)'', ''SQL'', ''Microsoft Excel Advanced'', ''Report Writing'',
