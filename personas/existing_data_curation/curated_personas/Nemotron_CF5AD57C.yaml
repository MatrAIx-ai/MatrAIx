  hobbies: '[''Reading (contemporary fiction and non‑fiction)'', ''Gardening (native plants and herb garden)'', ''Kayaking'', ''Bird watching'', ''Puzzle solving (crossword, Sudoku)'', ''Cooking (seafood
    recipes)'', ''Nature photography'', ''Small‑group book club'']'
  career_goals: In the next five years, Jeanette aims to advance to a senior management analyst role where she can lead cross‑functional analytics projects and mentor junior analysts. She plans to obtain
    a Project Management Professional (PMP) certification and enroll in a part‑time master’s program in Business Analytics to deepen her expertise in machine learning and advanced statistical methods. Ultimately,
    she aspires to become a Director of Business Intelligence, shaping data‑driven strategy for her organization while maintaining a degree of autonomy that aligns with her preference for flexible yet structured
    work environments. She also seeks to build a reputation for delivering high‑impact, competitive insights that position her company ahead of industry rivals.
