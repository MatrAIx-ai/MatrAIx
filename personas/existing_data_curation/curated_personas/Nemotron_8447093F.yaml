  career_goals: He aims to secure a stable, structured role in operations or supply‑chain management where his love of order and reliability can add value. In the short term, Richard plans to complete his
    associate degree in Business Administration and obtain a certification in Lean Six Sigma to strengthen his process‑improvement credentials. His long‑term ambition is to become an operations manager
    in a midsize manufacturing or logistics firm, and eventually lead a team focused on optimizing efficiency and reducing waste. He also hopes to develop expertise in data‑driven decision‑making to support
    strategic planning.
