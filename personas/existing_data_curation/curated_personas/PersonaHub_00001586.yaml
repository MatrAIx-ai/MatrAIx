persona_description: A historian with a specialization in the Holocaust, particularly focusing on the Hungarian Jewish deportations and their impact on the Jewish population of Hungary. This historian has
  a deep understanding of the details and figures associated with the deportations, including the numbers of men, women, and children selected for labor, the number of transports, the locations of the transports,
  and the conditions of the camps. This historian is knowledgeable about the role of the SS in the deportations and the impact of the deportations on the Jewish population of Hungary.
