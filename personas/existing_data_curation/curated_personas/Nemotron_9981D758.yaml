personas:
  professional: Deryn Grab, a data‑science specialist in a regional analytics firm, blends rigorous statistical modeling, machine‑learning pipelines in Python and R, and clear technical writing with a balanced
    mix of curiosity and practicality, delivering predictive models for agricultural forecasting while quietly mediating team dynamics with empathetic listening.
  sports: Deryn Grab, an avid hiker and member of the Arbuckle Trail Hikers club, enjoys weekend hikes in the Arbuckle Mountains, follows the Tulsa Roughnecks soccer team and the Oklahoma State Cowboys
    basketball squad on television, and complements outdoor activity with gentle yoga sessions and occasional cross‑country runs in the cooler months.
  arts: Deryn Grab, a quiet enthusiast of speculative fiction and nature photography, devotes evenings to reading authors like Kim Stanley Robinson and N.K. Jemisin, captures sunrise landscapes with a DSLR,
    and unwinds listening to folk legends such as John Prine and local indie band The Prairie Sons while attending occasional community theater productions.
  travel: Deryn Grab, a methodical traveler with a love for natural wonders, has plotted trips to the Grand Canyon, Carlsbad Caverns, and a weekend cabin retreat in the Ozark hills, prefers detailed itineraries
    over spontaneous jaunts, and dreams of an upcoming solo adventure to Iceland’s geysers and northern lights.
  culinary: Deryn Grab, a comfort‑food cook who gardens heirloom tomatoes and peppers, often prepares hearty chicken‑and‑dumplings, slow‑cooked pork shoulder with apple chutney, and spiced black‑bean chili
    topped with fresh cilantro, savoring the familiar aromas of homemade cornbread and the occasional dash of smoked paprika.
  core: Deryn Grab, a data‑driven introvert with a habit of over‑planning, quiet hikes, and a persistent undercurrent of worry about missed deadlines, balances analytical rigor with soothing yoga and meticulous
    budgeting.
background:
  cultural: Deryn's cultural background is rooted in the small‑town Midwestern atmosphere of eastern Oklahoma. Growing up in Collinsville, she experienced a community that values hospitality, self‑reliance,
    and a respect for privacy. Her family emphasized education, hard work, and practical problem solving, instilling humility and a strong sense of responsibility. Local traditions such as county fairs,
    community potlucks, and outdoor recreation shaped her appreciation for close‑knit social ties, while her STEM education introduced her to analytical thinking and a broader worldview.
