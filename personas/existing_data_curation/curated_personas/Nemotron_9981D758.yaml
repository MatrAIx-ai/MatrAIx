  career_goals: Deryn aims to advance to a senior data‑science or research‑leadership role where she can steer the development of predictive models that address regional challenges, such as agricultural
    forecasting and public‑health analytics in Tulsa County. She plans to deepen her expertise through a master's program or professional certifications while maintaining a balanced work schedule that safeguards
    her wellbeing. Long‑term, she hopes to mentor junior analysts, foster an inclusive and supportive team culture, and contribute scholarly articles or conference presentations that blend innovative methods
    with practical impact.
