  career_goals: Fatima aims to transition from her current hiatus into a sustainable freelance career as a visual artist and illustrator. She hopes to publish a series of illustrated children’s books that
    weave Mexican folklore with Alaskan natural themes, and to launch an online platform that showcases collaborative works between Mexican diaspora artists and Indigenous Alaskan creators. In the next
    five years, she plans to complete a part‑time Fine Arts certificate at the University of Alaska Anchorage, build a modest studio space in Anchorage, and secure regular commissions for editorial illustration,
    merchandise design, and community mural projects. Ultimately, she envisions her art serving as a bridge between cultures and a catalyst for dialogue about identity and environment.
