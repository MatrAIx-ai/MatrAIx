  hobbies: '[''Hiking the San Juan Mountains'', ''Fly fishing on the Animas River'', ''Woodworking'', ''Model railroad building'', ''Classic car restoration'', ''Gardening'', ''Volunteering at the La Plata
    County food bank'', ''Chess at the local senior center'', ''Attending community fairs'', ''DIY metal art projects'']'
  career_goals: As he approaches retirement age, Jason aims to transition into a supervisory or safety‑inspector role that leverages his deep technical knowledge while allowing him to mentor younger assemblers.
    He plans to earn a Certified Welding Inspector (CWI) credential and complete an OSHA 30‑hour safety certification within the next two years. Concurrently, he hopes to launch a modest side venture creating
    custom metal furniture and decorative pieces for local clients, providing a creative outlet and supplemental income. Ultimately, his goal is to secure a stable pension, maintain financial independence,
    and leave a legacy of practical skill and reliable work ethic in his community.
