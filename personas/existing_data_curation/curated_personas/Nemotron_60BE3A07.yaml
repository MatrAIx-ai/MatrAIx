  hobbies: '["Reading (fiction & nonfiction)", "Gardening (herbs & seasonal flowers)", "Cooking with fresh ingredients", "DIY home improvement projects", "Photography (spontaneous outings)", "Knitting and
    crocheting", "Nature walks and short hikes", "Spontaneous day trips to nearby towns", "Board game evenings with small groups"]'
  career_goals: Stephanie aims to transition from a general office clerk to an administrative coordinator or office manager within the next three to five years. She plans to enroll in a community college
    business administration program to gain formal credentials, while seeking roles that allow her to mentor junior staff and improve office workflows. Her long‑term ambition is to combine her practical
    skills with her curiosity by launching a small boutique or online shop that sells handcrafted home décor, giving her the flexibility to work on her own schedule and continue supporting her community
    through local markets and collaborative projects.
