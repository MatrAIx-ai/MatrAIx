  hobbies: '[''Sketching'', ''Watercolor painting'', ''Photography'', ''Cooking Polynesian cuisine'', ''Hiking'', ''Beach walking'', ''Book club'', ''Puzzle nights'', ''Community drumming circles'', ''Exploring
    health‑tech apps'', ''Volunteering at cultural festivals'']'
  career_goals: Jennifer aims to become a lead home health aide or case manager within the next three years, seeking certification as a Certified Nursing Assistant (CNA) and completing an associate degree
    in health sciences. She is motivated to develop a specialized program that integrates art‑based therapeutic activities into home care for elderly and post‑operative patients, positioning herself as
    an innovator in the field. Ultimately, she envisions opening a culturally sensitive in‑home care service that blends clinical excellence with holistic, creative approaches, while maintaining the work‑life
    balance she values.
