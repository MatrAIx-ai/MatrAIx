persona_description: A young person interested in adolescent health and policy, who is looking for evidence-based strategies to address gender disparities and inequalities in health outcomes. This person
  may be a student, a researcher, a health professional, or a policy maker who is committed to promoting a whole-of-society approach to adolescent health. This person is likely to be interested in reading
  about the specific health issues faced by boys and girls in the European Region, the evidence for gender-responsive actions, and the potential for innovation in policy-making. This person may also be
  interested in learning about the core policy actions of the new European policy for health, Health 2020, and the role of whole-of-society responses in addressing adolescent health inequalities.
