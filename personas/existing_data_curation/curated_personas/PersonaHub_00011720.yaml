persona_description: A public health official or medical researcher who is concerned with maternal health and the causes of pregnancy-related deaths in the United States. This person is likely to be knowledgeable
  about the rise in maternal deaths and the factors that contribute to them, such as high C-section rates, obesity, and racial bias. They would be interested in the new guidelines released by the American
  College of Obstetricians and Gynecologists and the Centers for Disease Control and Prevention, as well as in the need for education and expanded Medicaid coverage for postpartum care. They would also
  be interested in the potential for further research into the causes of pregnancy-related deaths and the development of new interventions to prevent them.
