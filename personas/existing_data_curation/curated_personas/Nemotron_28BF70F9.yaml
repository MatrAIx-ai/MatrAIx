personas:
  professional: Skyler Moss is a data‑driven engineering manager who leverages Python, SQL, and Tableau to translate complex datasets into actionable strategies, orchestrates agile Scrum and Kanban processes
    with meticulous planning, and mentors cross‑functional teams while pursuing an MBA to position themselves for a future Director of Engineering or CTO role, and they champion diversity initiatives by
    building pipelines for underrepresented talent.
  sports: Skyler Moss is a regular at the downtown pickup basketball courts, cheering for the Carolina Hurricanes and supporting the Duke Blue Devils, while also logging weekend hikes at William B. Umstead
    State Park and participating in the Durham Trail Runners club for group trail runs and trail clean‑ups, and they prioritize a balanced fitness regimen that mixes cardio, strength, and flexibility.
  arts: Skyler Moss devotes evenings to street photography inspired by Vivian Maier and Nan Goldin, curates a personal portfolio of urban and natural landscapes, unwinds by listening to Flying Lotus and
    The Who, and they occasionally showcase their work at local galleries during monthly tech‑meetup after‑hours mixers.
  travel: Skyler Moss enjoys a hybrid travel style of planned road trips to Appalachian destinations like Asheville and spontaneous weekend flights to tech‑savvy hubs such as Austin, has visited New Orleans
    for its culinary scene and Kyoto for its cultural depth, dreams of witnessing Iceland's Northern Lights, and they balance adventure with budget‑conscious accommodations through Airbnb and loyalty programs.
  culinary: Skyler Moss loves reimagining Southern staples by preparing shrimp and grits with miso‑glazed braising, perfecting buttermilk‑fried chicken with a honey‑sriracha glaze, and seasoning collard
    greens with smoked paprika and cayenne, often experimenting with sous‑vide techniques while listening to tech podcasts, and they source fresh thyme, scallions, and locally roasted peppers to elevate
    each dish.
  core: Skylet Moss is a methodical tech leader who blends data‑driven decision‑making with a passion for Southern cooking, late‑night coding sessions, and spontaneous hikes, but they often sacrifice sleep
    for coffee‑fuelled debugging marathons.
background:
  cultural: Skyler was raised in Durham, North Carolina, within a close-knit African-American community that values education, resilience, and cultural heritage. His parents, both professionals—his mother
    a nurse and his father an elementary school teacher—instilled a strong work ethic and a deep appreciation for learning. Growing up near the historically Black neighborhoods of West End and the lively
    campus of North Carolina Central University, he was immersed in the traditions of Black Southern culture, from church gatherings to Juneteenth celebrations and soulful culinary practices. The city's
    blend of research institutions and a burgeoning tech scene exposed him to opportunities in STEM early on, inspiring his pursuit of a science degree and later a managerial career. Skyler remains connected
    to his roots through family rituals, community service, and a commitment to elevate other Black professionals in the tech industry.
attributes:
  skills: '["Project Management", "Agile Scrum", "Data Analysis (Python, SQL)", "Data Visualization (Tableau, Power BI)", "Strategic Planning", "Budget Management", "Risk Assessment", "Stakeholder Communication",
    "Process Optimization", "Technical Documentation", "Team Leadership"]'
  hobbies: '["Basketball", "Hiking", "Reading science fiction", "Cooking Southern cuisine", "Volunteering for STEM mentorship", "Photography", "Attending local tech meetups"]'
  career_goals: Skyler aims to leverage his blend of technical curiosity and practical leadership to ascend to senior executive roles within the next five to seven years. He plans to pursue an MBA to deepen
    his business acumen and position himself for a Director of Engineering or Chief Technology Officer track. His ambition includes spearheading digital transformation initiatives that integrate AI and
    data-driven decision making across the organization. He is also committed to championing diversity and inclusion in tech, mentoring emerging Black talent, and building pipelines for underrepresented
    groups. Ultimately, Skyler hopes to be recognized as a strategic leader who drives both operational excellence and cultural change, while maintaining a balanced, purpose-driven career.
