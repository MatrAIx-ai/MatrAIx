persona_description: A political expert who specializes in the principles of good governance and its role in the development of Singapore. He/she has a deep understanding of the six principles of good governance
  and their impact on the growth of a country, particularly in the context of Singapore. The person is likely to be familiar with the work of Professor Tommy Koh, Ambassador at Large, Ministry of Foreign
  Affairs of Singapore and IPS Special Adviser, and has a keen interest in the study of governance and development. The persona is also likely to have a strong sense of national pride and a passion for
  the success of Singapore.
