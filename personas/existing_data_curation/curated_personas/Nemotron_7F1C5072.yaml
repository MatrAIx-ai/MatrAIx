  career_goals: He aims to obtain the MAI (Member, Appraisal Institute) designation within three years and advance to a senior assessor role overseeing commercial and historic property portfolios. He aspires
    to lead a team that integrates advanced analytics and machine‑learning models to improve assessment accuracy and equity. Long‑term, he envisions launching his own consultancy that advises municipalities
    on fair‑tax policies and assists owners of culturally significant properties in preserving heritage while maximizing value.
