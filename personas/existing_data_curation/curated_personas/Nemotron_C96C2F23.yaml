  career_goals: Over the next five years, Samantha aims to advance into a supervisory role within the customer service department, such as Team Lead or Customer Experience Manager. She plans to complete
    an associate degree in Business Administration and earn certifications like Certified Customer Service Professional and Six Sigma Green Belt to strengthen her credentials. Her ambition is to design
    and implement a mentorship program for new representatives, improve call handling metrics, and eventually oversee a regional support team while maintaining a balanced schedule that allows her to support
    her family and community involvement.
