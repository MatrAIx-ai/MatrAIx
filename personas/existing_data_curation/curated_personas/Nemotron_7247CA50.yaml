  hobbies: '[''Experimenting with new recipes at home'', ''Visiting art museums and local craft fairs'', ''Gardening herbs'', ''Food and landscape photography'', ''Reading culinary travel literature'',
    ''Listening to blues and folk music'', ''Nature walks along the Mississippi River'', ''Volunteering at community food bank'', ''Attending cooking workshops and tasting events'']'
  career_goals: Veronica aims to move from her current line‑cook position to a sous‑chef role within the next two years, ultimately becoming the head chef of a locally owned restaurant that emphasizes farm‑to‑table
    cuisine. She plans to earn a culinary certification to formalize her expertise and hopes to incorporate her love of art into the dining experience through visually striking dishes and occasional pop‑up
    art‑food events. Long‑term, she dreams of opening a small bistro in Caruthersville that showcases regional produce, fosters community gatherings, and offers cooking classes that blend culinary techniques
    with artistic expression. She seeks a work environment that balances responsibility with flexibility, reducing stress and supporting her emotional well‑being.
