  hobbies: '[''Intramural soccer'', ''Social dancing (salsa, swing)'', ''Volunteering at senior centers'', ''Organizing game and art workshops'', ''Hiking in state parks'', ''Photography'', ''Cooking and
    trying new recipes'', ''Listening to health and psychology podcasts'', ''Reading popular psychology books'', ''Mindfulness meditation'']'
  career_goals: Neil aims to build on his hands‑on experience by becoming a certified nursing assistant (CNA) within the next year, followed by completing a bachelor’s degree in nursing (BSN) to qualify
    as a registered nurse. He envisions transitioning into a care‑coordination role where he can design holistic wellness programs that blend medical support with community‑based social activities for seniors.
    In the longer term, he hopes to lead a home‑health agency or open a community wellness center in Orlando that emphasizes compassionate, flexible care and offers group classes, health education, and
    stress‑relief workshops.
