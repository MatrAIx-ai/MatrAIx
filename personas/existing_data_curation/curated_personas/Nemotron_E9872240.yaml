personas:
  professional: A dedicated caregiver and aspiring nursing professional, Neil Gega combines hands‑on senior‑care expertise with a curiosity for evidence‑based practices, leveraging their CPR certification
    and associate degree in health sciences to design group activities that boost mental well‑being, while their relaxed approach to scheduling sometimes leads to occasional missed documentation deadlines.
  sports: An enthusiastic intramural soccer player, Neil Gega also follows Orlando City SC and the Orlando Magic, participates in weekend pick‑up games at local parks, and keeps fit by joining community
    salsa and swing dance classes that double as cardio workouts, though they sometimes skip the post‑game stretch, leading to occasional knee soreness.
  arts: A culturally curious arts enthusiast, Neil Gega regularly attends salsa nights featuring live Latin bands like Los Amigos, enjoys swing dancing to the sounds of the Brian Setzer Orchestra, listens
    to Irish folk groups such as The Dubliners and modern artists like Ed Sheeran, and squeezes in occasional trips to see performances at the Dr. Phillips Center for the Performing Arts, while their habit
    of binge‑watching streaming dramas can cut into rehearsal time.
  travel: A nature‑loving explorer, Neil Gega spends weekends hiking the Ocala National Forest trails and photographing Orlando’s sunset skyline, dreams of traveling to the rugged coastlines of Ireland
    to trace family traditions, and prefers spontaneous road trips over meticulously planned vacations, though their tendency to overpack often results in a cluttered trunk.
  culinary: A budding home chef, Neil Gega delights in cooking hearty dishes like shepherd’s pie, corned beef with cabbage, and shrimp gumbo, experiments with ingredients like quinoa, kale, and sweet potatoes,
    and frequently blends Irish comfort food with Floridian seafood flavors, yet they occasionally burn the bottom of a casserole when multitasking between caring duties and a favorite true‑crime podcast.
  core: Neil Gega, a 30‑year‑old compassionate caregiver with a love for group sports, spontaneous cooking, and mindful meditation, balances curiosity with a relaxed, sometimes disorganized approach to
    life, often juggling social activities with lingering worries.
background:
  cultural: Neil was born and raised in the suburban neighborhoods of Orlando, Florida, to a family of Irish‑English descent. Growing up in a region known for its hospitality and tourism, he was exposed
    to a multicultural mix of visitors and residents, which cultivated his appreciation for cultural diversity and his collaborative spirit. His upbringing blended Midwestern work‑ethic values with Southern
    friendliness, and he attended a public high school that emphasized community service. He celebrates traditional holidays like St. Patrick’s Day with his extended family, often sharing a love of Irish
    music and food, while also participating in local community events such as charity runs and multicultural festivals. This blend of European heritage and Floridian multiculturalism informs his inclusive
    approach to caregiving and his desire to foster harmony among diverse client groups.
attributes:
  skills: '[''Personal hygiene assistance'', ''Safe client transfer and mobility support'', ''Basic vital sign monitoring'', ''Medication reminder and documentation'', ''Compassionate communication'', ''CPR
