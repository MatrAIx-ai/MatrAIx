personas:
  professional: Robert Marshall is a teenage maker‑artist who blends hand‑drawn sci‑fi landscapes with digital brushes, builds Arduino prototypes for interactive art, and composes quirky guitar melodies,
    channeling their curiosity and competitive streak into frequent hackathon‑style challenges at the local art club.
  sports: Robert Marshall prefers low‑key fitness, hiking the St. Louis County trail network on weekends, joining the St. Louis Mountain Bikers club for occasional rides, cheering the St. Louis Cardinals
    and St. Louis Blues, and playing pickup basketball with friends after school, balancing solitary endurance with brief team drills.
  arts: Robert Marshall immerses themselves in drawing comic‑style panels inspired by Alan Moore, curating playlists of Miles Davis, B.B. King, and modern indie bands while experimenting with digital tools
    like Procreate, and finds inspiration in indie games such as Hades and Celeste, weaving a tapestry of visual, musical, and interactive art.
  travel: Robert Marshall dreams of swapping the flatlands of St. Louis for the misty forests of the Pacific Northwest, has already visited Chicago’s Millennium Park and Kansas City’s jazz scene, and plans
    a future trek through Japan’s Kyoto temples and the Great Smoky Mountains, favoring self‑planned road trips over guided tours.
  culinary: Robert Marshall enjoys cooking simple yet daring dishes like spicy ramen with garlic‑infused broth, homemade toasted ravioli topped with marinara, and avocado‑lime tacos, but often raids the
    pantry for midnight pizza rolls during gaming marathons, reflecting a modest home‑chef skill set with occasional junk‑food cravings.
  core: Robert Marshall is a curious teen tinkerer who sketches alien worlds, strums jazzy riffs, hoards Arduino parts, skips chores, and fuels late‑night gaming sessions with pizza, embodying a blend of
    artistic drive and laid‑back disarray.
background:
  cultural: Robert was raised in Saint Ann, a suburban community in St. Louis County, Missouri, within a white, middle‑class family that values self‑reliance and community ties characteristic of the Midwest.
    His upbringing includes exposure to local traditions such as the St. Louis County Fair, regional music like blues, jazz, and ragtime, and a modest religious background (primarily Protestant) that stresses
    personal responsibility. The pragmatic Midwestern ethos and the area's support for public arts programs have nurtured his curiosity and appreciation for unconventional creative expression while reinforcing
    his preference for privacy and small‑group interaction.
attributes:
