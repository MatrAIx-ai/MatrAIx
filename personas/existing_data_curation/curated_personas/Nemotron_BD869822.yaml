  career_goals: Robert aims to turn his artistic and technical passions into a creative career. In the short term, he plans to earn his GED, build a robust portfolio of digital artwork, and take community‑college
    courses in graphic design and animation. Long‑term, he dreams of working as a freelance multimedia artist or joining an independent game studio where he can blend illustration, concept art, and interactive
    design. He also entertains the idea of launching an online shop to sell prints and custom merchandise, preferring a flexible schedule that lets him continue exploring new ideas and unconventional projects.
