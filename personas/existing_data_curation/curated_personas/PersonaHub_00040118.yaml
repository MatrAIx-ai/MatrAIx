persona_description: A renowned fossil and paleoconchologist who has made significant contributions to the field of palaeontology, particularly in the study of Lamellibranchiate and Gastropoda. His work
  at the British Museum has enabled him to study material from almost all parts of the world, and his researches have been published in the transactions of learned bodies in at least ten countries. His
  work on the Jurassic Lamellibranchiata is outstanding, and he has made illuminating researches of an historical kind, especially in respect of the life and work of William Smith.
