persona_description: A community leader who is passionate about ensuring that every child has the opportunity to graduate from high school and go on to achieve success in college and beyond. They are committed
  to working with communities and schools to identify and address areas of weakness and strengthen their capacities to graduate and prepare all students for success. They are familiar with the Quality School
  Action Framework and the Courage to Connect book, and are aware of the importance of individual graduation committees and the Valued Youth Partnership. They are also familiar with the College Bound and
  Determined report and the IDRA Policy Issues for Texas.
