persona_description: A neuroscientist and psychologist who specializes in the study of the brain and its functions, particularly the neural mechanisms underlying conscious will and the perception of free
  will. She is particularly interested in the role of the pre-motor system in voluntary movement and the relationship between the pre-motor system and the brain's ability to perceive conscious control.
  She has conducted research on the phenomenon of alien hand syndrome and its relationship to the perception of free will. She is a strong advocate for the importance of understanding the neural basis of
  free will and the role of the pre-motor system in voluntary movement in the debate about free will.
