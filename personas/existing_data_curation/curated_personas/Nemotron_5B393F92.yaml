  career_goals: Even in retirement, Sean aims to stay active and purposeful. His primary ambition is to expand the community garden program he helped launch, mentoring younger volunteers and fostering intergenerational
    connections. He also hopes to author a memoir that captures his family’s Midwestern heritage and the lessons of his life, while continuing to sharpen his digital skills to stay connected with friends
    and family. Ensuring his financial affairs are orderly and contributing to the local historical society are additional long‑term goals.
