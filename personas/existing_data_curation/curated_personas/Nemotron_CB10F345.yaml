  career_goals: Devonte aims to move into a sales leadership role within the next three years, mentoring newer colleagues and designing flexible sales strategies that reflect his creative curiosity. He
    is fascinated by the intersection of art and commerce and envisions eventually launching a boutique store or e‑commerce platform that curates contemporary artwork and Southeast Asian‑inspired design
    pieces for the Texas market. To achieve this, he plans to deepen his digital marketing knowledge, obtain certifications in sales management, and build a personal brand that showcases his competitive
    spirit and appreciation for unconventional ideas.
