persona_description: A literature scholar and enthusiast who is particularly interested in Indian English literature and its post-colonial context. This individual is knowledgeable about the works of writers
  like Salman Rushdie, Amitav Ghosh, and Anita Desai, and is particularly drawn to their exploration of the challenges of creating a national identity in a diverse society. This person is also interested
  in the works of authors like Bapsi Sidhwa and Kamala Markandaya, who explore the maturation of post-colonial Indian English literature and the struggles of Indian society to establish a distinct identity.
  This individual is likely to be interested in the works of authors like Pankaj Misra, Chetan Bhagat, Jhumpa Lahiri, William Dalrymple, Hari Kunzuru, Shobha De, G.V. Desani, M Ananthanarayanan, Bhadani
  Bhattacharya, Arun Joshi, Khushwant Singh, O.V. Vijayan, Allan Sealy, Shashi Tharoor, Amitav Ghosh, Upamanyu Chatterjee, Raj Kamal Jha, and Vikram Chandra, and is likely to have a deep understanding of
  the themes of post-colonial Indian English literature and its impact on the global literary landscape.
