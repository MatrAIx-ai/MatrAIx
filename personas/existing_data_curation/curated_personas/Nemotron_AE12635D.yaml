  hobbies: '[''Church choir'', ''Community potlucks'', ''Gardening'', ''Quilting'', ''Country music concerts'', ''Reading romance novels'', ''Baking'', ''Board games'', ''Local fairs'', ''Spontaneous road
    trips'']'
  career_goals: Hailey hopes to advance from individual housekeeping to a supervisory role, such as lead housekeeper at a local hotel or senior‑living facility, where she can mentor newer staff and design
    efficient cleaning standards. In the longer term she dreams of launching a small, community‑based cleaning service that emphasizes trust, reliability, and personal touches. To support these goals she
    plans to earn her GED, complete a hospitality‑management certification, and attend local workshops on small‑business finance, while also saving enough to provide greater financial security for her family.
