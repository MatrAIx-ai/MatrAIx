persona_description: A scholar or scholar of Chinese studies who is interested in the study of early Chinese texts, particularly those related to ethics, and has a special interest in the use of the term
  "zhèngmíng" in these texts. This person is likely to be familiar with the works of scholars such as Hong Kong University Press, Jane Geaney, and Chris Fraser, Dan Robins, and Timothy O'Leary, and has
  a deep understanding of the Chinese concept of "zhèngmíng" and its significance in early Chinese texts. This person is also likely to have a keen interest in the study of Chinese ethics and the use of
  rhetorical devices in early Chinese texts.
