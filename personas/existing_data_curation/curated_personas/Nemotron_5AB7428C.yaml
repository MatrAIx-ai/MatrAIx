  career_goals: Approaching retirement, Heriberto aims to transition into a supervisory role where he can mentor younger officers, share his practical knowledge, and influence policy improvements that balance
    safety with inmate rehabilitation. He hopes to become a shift supervisor or training coordinator, emphasizing flexible scheduling that respects his preference for a less rigid routine. Outside the correctional
    system, he aspires to develop a small community‑focused safety outreach program and, eventually, a modest family‑run catering venture featuring traditional Puerto Rican dishes, allowing him to stay
    connected to his cultural roots while enjoying a more relaxed pace.
