personas:
  professional: An experienced correctional facility supervisor, Heriberto Cordero leverages two decades of crisis de‑escalation, bilingual communication, and a practical curiosity to mentor younger officers
    while balancing a relaxed approach to scheduling and occasional disorganization; they aim to shape policies that blend safety with inmate rehabilitation.
  sports: Heriberto Cordero enjoys early‑morning coastal fishing off the San Juan shoreline, follows the Cangrejeros de Santurce baseball team with avid enthusiasm, occasionally attends San Juan Atléticos
    soccer matches, and participates in weekly dominoes gatherings that double as social exercise, while they sometimes join a community beach‑jogging circle during cooler evenings.
  arts: Heriberto Cordero immerses in the vibrant world of salsa and plena, dancing to icons such as Rubén Blades, Ismael Rivera, and contemporary performer Residente at local festivals, while they unwind
    by reading historical novels by Eduardo Lalo and occasionally attend neighborhood theater performances.
  travel: Heriberto Cordero prefers relaxed road trips to coastal towns like Ponce and Vieques, staying in modest beachside cabins, and dreams of a budget‑friendly cruise to Cartagena, Colombia; they plan
    journeys during the off‑season to stretch their savings while traveling with close family members.
  culinary: Heriberto Cordero loves preparing mofongo with plantains, garlic, chicharrón, and a splash of adobo, cooking arroz con gandules seasoned with sofrito, cilantro, and annatto, and often adds fresh
    shrimp or crab caught during fishing outings; they occasionally over‑season dishes because they forget to set timers.
  core: Heriberto Cordero is a seasoned correctional mentor who blends pragmatic curiosity with a relaxed, occasionally disorganized lifestyle, savoring salsa beats, coastal fishing, and home‑cooked island
    flavors while navigating a modest retirement plan and health quirks.
background:
  cultural: Heriberto is a native of San Juan, raised in a close‑knit barrio where Spanish is the primary language and Catholic traditions shape daily life. His heritage reflects the rich tapestry of Puerto
    Rican culture—Spanish colonial, African, and Taíno influences—that manifest in his music preferences, culinary tastes, and communal values. Family bonds are central; he regularly participates in neighborhood
    celebrations, supporting the collective spirit of "fiesta" while maintaining respect for the island's history and resilience. This cultural foundation informs his compassionate approach to his work,
    his love of community gatherings, and his desire to preserve Puerto Rican customs for future generations.
