personas:
  professional: Lea Lewis, a veteran painter and paperhanger with four decades of hands‑on mastery, combines a structured, low‑VOC eco‑friendly approach with a quietly reliable reputation, now transitioning
    to part‑time work while pursuing sustainable‑painting certification and mentoring a younger female apprentice.
  sports: Lea Lewis prefers low‑impact fitness, strolling the Palouse hills during spring, cheering for the Boise State Broncos football team, and volunteering as a timing official for the Palouse Trail
    Runners’ autumn 5K, while occasionally attending an Idaho Falls Chukars baseball game in summer as a relaxed spectator.
  arts: Lea Lewis expresses artistic sensibility through watercolor paintings of the Palouse hills reminiscent of Claude Monet, knitting woolen blankets inspired by traditional frontier crafts, devouring
    historical novels by Laura Ingalls Wilder, and listening to Bob Dylan folk ballads, using each pursuit as solitary meditation.
  travel: Lea Lewis favors methodical road trips that blend scenic solitude with modest adventure, such as sunrise drives through Yellowstone National Park, quiet evenings on the Oregon coast, and wine‑country
    strolls in Napa, always mapping routes with paper atlases yet leaving room for impromptu stops at local diners, all within a budget‑conscious, low‑key travel style.
  culinary: Lea Lewis enjoys simple, garden‑fresh cuisine, regularly preparing kale‑and‑bean soup seasoned with rosemary and thyme, roasting carrots and potatoes in a low‑VOC oven, baking sourdough bread
    with locally milled flour, and pairing meals with chamomile tea, while their knitting sessions often double as quiet dinner prep.
  core: Lea Lewis pairs a meticulous, hands‑on crafting career with a solitary, worry‑prone disposition, and they balance careful paint‑matching, thrifty budgeting, and low‑key hobbies that keep them grounded.
background:
  cultural: Lea grew up in a multi‑generational farming family in southeastern Idaho, where self‑reliance, hard work, and community interdependence were core values. Her ancestry traces back to German and
    English settlers who arrived in the Pacific Northwest in the late 19th century, bringing with them a tradition of practical craftsmanship and an appreciation for the land. The rural Idaho culture—marked
    by quiet towns, outdoor recreation, and a modest pace of life—has shaped her preference for solitude, her pragmatic approach to problems, and her comfort with manual trades. While she embraces the local
    customs of neighborly assistance and seasonal community events, she remains more comfortable in private, reflective settings, finding strength in the blend of frontier independence and the steady rhythm
    of small‑town life.
attributes:
  skills: '["Surface preparation (sanding, patching, priming)", "Application of latex, oil‑based, and low‑VOC paints", "Color theory and matching for interior spaces", "Paper‑hanging for drywall and specialty
    wallcoverings", "Basic carpentry and minor drywall repair", "Flooring installation (laminate, vinyl)", "Project estimating and material budgeting", "Problem‑solving under time constraints", "Worksite
    safety and compliance"]'
  hobbies: '["Bird‑watching", "Vegetable gardening", "Reading historical fiction and memoirs", "Knitting and crocheting", "Crossword and logic puzzles", "Watercolor painting of local landscapes"]'
  career_goals: 'Lea aims to transition gradually from full‑time contracting to a part‑time schedule that allows more time for personal pursuits while still providing a modest supplemental income. She hopes
    to obtain a certification in environmentally sustainable painting practices, which would let her market her services to homeowners seeking low‑impact renovations. In the longer term, she would like
    to mentor a younger apprentice—preferably another woman—through a structured, hands‑on learning program that emphasizes practical skills and resilience against workplace stress. She also dreams of compiling
    a small guidebook titled “Quiet Walls: Practical Painting and Paper‑Hanging for Homeowners,” drawing on her decades of experience to help others finish projects confidently without the need for extensive
    professional oversight.'
