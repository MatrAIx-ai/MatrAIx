  career_goals: Wilson aims to advance to a Chief Financial Officer role within the next five years, leading financial transformation initiatives that incorporate sustainable finance and emerging technologies.
    He plans to obtain a CFA certification to deepen his investment expertise and to mentor emerging Hispanic finance professionals in his community. Additionally, he envisions launching a boutique financial
    consulting firm that helps small businesses and nonprofit arts organizations achieve fiscal health while fostering cultural enrichment.
