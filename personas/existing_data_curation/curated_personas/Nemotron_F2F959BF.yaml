personas:
  professional: Edward Rhodes, a 32‑year‑old office clerk aspiring to become an office manager at a community arts nonprofit, blends meticulous data‑entry and record‑keeping skills with a calm, mindfulness‑driven
    adaptability and a curiosity for visual design, often using Canva to quickly produce eye‑catching flyers while they improvise solutions when procedures are unclear.
  sports: Edward Rhodes enjoys low‑key fitness activities, such as hiking the Great Smoky Mountains and joining the Nashville Runners club for early‑morning jogs, while fanaticizing over the Nashville Predators
    in hockey and the Tennessee Titans in football, blending personal health with local team loyalty.
  arts: Edward Rhodes actively participates in Nashville’s art life, scouting street murals inspired by city‑wide mural festivals, attending gallery talks featuring emerging visual artists, listening to
    Kamasi Washington’s jazz ensembles and The Roots’ hip‑hop grooves, and channeling these experiences into candid photography and short personal essays influenced by contemporary authors like Sally Rooney.
  travel: Edward Rhodes favors spur‑of‑the‑moment road trips, often driving to Asheville’s Blue Ridge Mountains for sketch‑filled hikes or exploring Santa Fe’s Pueblo‑style art districts, while keeping
    a bucket‑list that includes immersing themselves in Tokyo’s avant‑garde galleries and the coastal vibes of Portugal’s Algarve region.
  culinary: Edward Rhodes loves sampling food‑truck fare—including Korean BBQ tacos topped with kimchi slaw and wood‑fire pizza with smoked mozzarella—while at home they comfortably whip up a chickpea curry
    with cumin and coconut milk and occasionally tend a DIY macramé herb garden for fresh basil and mint to garnish their dishes.
  core: Edward Rhodes is a creatively curious office professional whose artistic passion, mindfulness practice, and occasional financial impulsivity drive a loosely organized yet deeply reflective life.
background:
  cultural: Edward was born and raised in the greater Nashville area, growing up in a close‑knit African‑American community where church, family gatherings, and music were central to daily life. He attended
    a historically Black church where gospel singing and community service shaped his values of compassion and cooperation. His family celebrates cultural milestones such as Juneteenth and honors Southern
    culinary traditions like collard greens, fried chicken, and barbecue, while also embracing the city’s diverse music scene—from blues and soul to country and contemporary indie. This blend of Southern
    heritage and African‑American cultural influences informs his appreciation for art, his community‑oriented outlook, and his desire to contribute to the cultural vitality of Antioch and Davidson County.
