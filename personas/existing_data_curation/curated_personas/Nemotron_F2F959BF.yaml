  hobbies: '[''visiting art galleries and murals'', ''photography'', ''reading contemporary fiction'', ''creative writing/journaling'', ''board‑game nights with friends'', ''exploring food trucks and new
    cuisine'', ''weekend hiking and sketching'', ''mindfulness meditation'', ''listening to jazz and hip‑hop'', ''DIY home décor projects'']'
  career_goals: Edward aims to formalize his administrative experience by completing an associate’s degree in business administration within the next two years. He hopes to transition from a general office
    clerk to an office manager role, ideally within a nonprofit or community arts organization where he can merge his love of art with his organizational skills. In the longer term, he envisions leading
    a small team, implementing efficient workflow systems, and possibly launching a consulting side‑business that helps local cultural nonprofits streamline their office operations while maintaining creative
    flexibility. He also wants to improve his time‑management habits and develop leadership competencies to become a trusted point of contact for both staff and community partners.
