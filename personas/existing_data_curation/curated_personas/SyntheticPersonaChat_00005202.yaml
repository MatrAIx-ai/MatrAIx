    User 1: That sounds like fun. I like to play video games too.

    User 2: What kind of games do you like to play?

    User 1: I like to play action games, racing games, and adventure games.

    User 2: I like to play racing games too. What''s your favorite racing game?

    User 1: My favorite racing game is Gran Turismo.

    User 2: I''ve heard good things about that game. I''ve never played it, though.

    User 1: You should try it. It''s a lot of fun.

    User 2: I might have to check it out.

    User 1: So, what do you do for work?

    User 2: I work on trucks. I''m a mechanic.

    User 1: Oh, that''s cool. I''ve always been interested in mechanics.

    User 2: It''s a good job. I like working with my hands.

    User 1: I can see why. What''s your favorite thing about working on trucks?

    User 2: I like fixing them up and getting them running again. It''s satisfying to see a broken truck come back to life.

    User 1: That makes sense. I can see how that would be satisfying.

    User 2: Yeah, it''s a good feeling.

    User 1: Well, it was nice talking to you, Matt.

    User 2: Nice talking to you too, James.'
