personas:
  professional: Luis Cruz is a budding youth organizer who leverages a practical mindset to plan and run mini‑tournaments for classmates, using detailed score sheets and tidy schedules that satisfy their
    love of structure while their outgoing nature energizes the whole group.
  sports: Luis Cruz is an energetic 10‑year‑old who dominates the neighborhood park’s after‑school soccer games with the Eastside Tigers youth league, cheers for the New York Red Bulls in MLS, leads the
    Cubby Park Raptors Jr. basketball crew during winter, and meticulously records player stats, reflecting their love for structure and teamwork.
  arts: Luis Cruz channels creativity into drawing comic strips inspired by Scott Pilgrim, animating short loops on a tablet with Pencil2D, dancing to reggaeton hits from Daddy Yankee and salsa classics
    by Marc Anthony, and practicing piano pieces by Beethoven for fun, showcasing a vibrant blend of visual, musical, and rhythmic expression.
  travel: Luis Cruz prefers family‑oriented trips that blend fun and learning, having visited the historic fortifications of Old San Juan with grandparents and a road‑trip to Washington D.C.'s Smithsonian
    museums, while daydreaming about a future adventure to Tokyo's DisneySea and a beach getaway in Cancun, balancing excitement with the comfort of familiar routines.
  culinary: Luis Cruz enjoys helping their parents simmer a hearty arroz con gandules—rice, pigeon peas, sofrito, annatto, and pork—while sprinkling a dash of cilantro, and they proudly bake chocolate‑chip
    cookies with a secret pinch of cinnamon, though they often forget to clean the kitchen afterward.
  core: Luis Cruz is a structured yet social ten‑year‑old who orchestrates playground tournaments, saves allowance in a piggy bank, and balances comic‑making with salsa dancing, though they sometimes forget
    homework in the hustle.
background:
  cultural: Luis comes from a proud Puerto Rican family that maintains strong cultural ties while living in Rochester, New York. At home, Spanish is spoken alongside English, and family meals often feature
    classic dishes such as arroz con gandules, pasteles, and flan. He participates in local Puerto Rican community events, including the annual Noche de San Juan celebration and the city’s Caribbean Festival,
    where he enjoys music, dance, and cultural storytelling. These experiences give Luis a deep appreciation for his heritage, a bilingual advantage in school, and a sense of responsibility to represent
    his community positively.
