  career_goals: Luis dreams of pursuing a career that blends his love for teamwork, structure, and helping others. He aspires to become a firefighter or a teacher, roles that provide clear responsibilities
    and a direct positive impact on his community. He also hopes to continue advancing in soccer, aiming for a high school varsity team and eventually a college scholarship that would allow him to support
    his family while staying connected to his heritage.
