  hobbies: '[''Reading (non‑fiction and literary fiction)'', ''Urban gardening'', ''Walking in parks and neighborhoods'', ''Neighborhood photography'', ''Knitting'', ''Crossword puzzles'', ''Cooking (experimenting
    with new recipes)'']'
  career_goals: Danielle aims to advance to a senior director role within a citywide social services agency, where she can shape policy and expand impact across multiple neighborhoods. She is focused on
    building sustainable funding streams, integrating evidence‑based practices, and launching pilot programs that address emerging community needs. To support these ambitions, she plans to complete her
    Master of Public Administration and mentor emerging leaders in the nonprofit sector, positioning herself as a competitive candidate for executive leadership while maintaining her commitment to pragmatic,
    results‑oriented service delivery.
