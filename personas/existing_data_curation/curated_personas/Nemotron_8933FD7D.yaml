personas:
  professional: Sarrah Fletcher, a meticulous medical billing clerk, leverages their advanced Excel wizardry, QuickBooks expertise, and systematic mindset to resolve claim discrepancies while infusing abstract
    problem-solving approaches that reflect their artistic imagination.
  sports: Sarrah Fletcher stays fit by attending early-morning yoga at the community center, joins the Hinesville Runners club for weekend half-marathons, and follows the Atlanta Falcons, Braves, and Hawks
    with a blend of casual fandom and disciplined habit of tracking team statistics as a mental exercise.
  arts: Sarrah Fletcher channels their love for abstraction into painting in the style of Kandinsky and Rothko, curates a personal playlist of Björk and Sufjan Stevens while photographing marshland vistas,
    and draws inspiration from speculative fiction authors like China Miéville and poet Anne Carson, integrating these influences into surreal short stories.
  travel: Sarrah Fletcher meticulously plans weekend getaways, has explored the historic streets of Charleston and the misty marshes of the Everglades, and dreams of wandering the narrow alleys of Kyoto
    and the pastel cliffs of the Amalfi Coast, balancing a modest travel budget with a craving for immersive cultural experiences.
  culinary: Sarrah Fletcher, a confident home cook, delights in preparing shrimp and grits with crisp catfish, whipping up miso ramen fortified with kombu and shiitake, and experimenting with beet-infused
    quinoa salads, always seasoning with fresh basil and smoked paprika.
  core: Sarrah Fletcher is an analytically creative 27-year-old who balances obsessive spreadsheet precision with midnight abstract painting sessions, often worrying over the smallest billing error while
    humming choir hymns in the kitchen.
background:
  cultural: Sarrah is a Black woman who grew up in Hinesville, Georgia, a community shaped by Southern traditions and the nearby military presence of Fort Stewart. Her family’s roots trace back to the Great
    Migration and later to the civil‑rights activism of the region, instilling a strong sense of resilience and community responsibility. The local African‑American church has been a cornerstone of her
    upbringing, fostering values of fellowship, gospel music, and service. She embraces Southern cuisine, especially soul‑food staples, and actively participates in Juneteenth celebrations and local cultural
    festivals that honor Black heritage. These experiences inform her artistic sensibilities, her commitment to mentoring youth, and her desire to blend professional expertise with community‑centered creativity.
attributes:
  skills: '[''Medical billing and coding'', ''Accounts receivable and posting'', ''Data entry with high accuracy'', ''Microsoft Excel (advanced formulas and pivot tables)'', ''QuickBooks and industry‑specific
    billing software'', ''Insurance claim processing'', ''Workflow analysis and process improvement'', ''Abstract problem solving'', ''Effective written and verbal communication'', ''Time management and
    scheduling'', ''Team collaboration and conflict resolution'']'
  hobbies: '[''Abstract painting'', ''Speculative fiction and poetry reading'', ''Photography of coastal landscapes'', ''Writing surreal short stories'', ''Volunteering as an art mentor for youth'', ''Yoga
    and mindfulness meditation'', ''Participating in church choir'', ''Attending local modern art exhibitions'', ''Exploring philosophy and psychology books'']'
  career_goals: Sarrah aims to earn the Certified Professional Biller (CPB) credential and complete an associate’s degree in accounting within the next two years. She envisions moving from her current clerk
    role into a billing supervisor position, eventually becoming a revenue‑cycle manager in a regional healthcare system. Long‑term, she hopes to transition into health informatics, leveraging her curiosity
    for abstract concepts to design data‑driven billing solutions. She also dreams of launching a boutique consulting practice that helps small clinics streamline their revenue processes while supporting
    local arts initiatives that reflect her creative passions.
