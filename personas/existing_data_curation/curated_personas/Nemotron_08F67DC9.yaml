personas:
  professional: Esther Asis, an aspiring junior mixed‑media artist and budding storyteller, channels their curiosity into elaborate school projects and online chess tournaments, and they blend competitive
    drive with a relaxed attitude toward deadlines.
  sports: Esther Asis, an avid hiker on the San Bernardino foothills trails and a member of a local junior climbing club, they prefer solitary runs over team sports, roots for the Los Angeles Lakers in
    basketball and follows the LA Dodgers during baseball season, but occasionally competes in school cross‑country meets.
  arts: Esther Asis, a mixed‑media enthusiast who collects vintage comic illustrations, draws inspiration from the surreal paintings of Remedios Varo, the folk sounds of Los Folkloristas, and the indie
    tones of Mitski, and they often curate personal mini‑exhibitions in their bedroom.
  travel: Esther Asis, a nature‑loving explorer, has trekked through Joshua Tree National Park, they plan a family trip to the historic streets of Oaxaca, dream of seeing the Northern Lights in Iceland,
    and enjoy weekend visits to the local science museum in Riverside.
  culinary: Esther Asis, a junior cook who loves preparing simple Mexican dishes such as tacos al pastor, fresh guacamole with cilantro and lime, and elote street corn, they experiment with adding quinoa
    for protein, and often journal the recipes alongside sketches of the ingredients.
  core: Esther Asis, an 11‑year‑old curiosity‑driven creator, balances solitary artistic pursuits and competitive puzzles with a relaxed, sometimes disorganized, approach to obligations, and they occasionally
    let skepticism and a love for quiet shape their daily decisions.
background:
  cultural: Esther is a first‑generation Mexican‑American raised in Loma Linda, where she lives in a bilingual household that celebrates Día de los Muertos, Mexican holidays, and family gatherings centered
    around traditional foods. Her Mexican heritage informs her artistic style, which often incorporates vibrant colors and motifs from Mexican folk art, while her upbringing in Southern California exposes
    her to a diverse, multicultural environment, fostering an openness to new ideas and a sense of pride in her dual cultural identity.
attributes:
  skills: '[''sketching'', ''watercolor painting'', ''digital illustration'', ''basic Scratch programming'', ''chess strategy'', ''logic puzzles'', ''bilingual English-Spanish'']'
  hobbies: '[''drawing'', ''mixed-media art'', ''reading sci‑fi'', ''nature hiking'', ''chess'', ''Sudoku'', ''puzzle solving'', ''listening to Mexican folk music'', ''cooking Mexican dishes'', ''journaling'']'
  career_goals: She aspires to become a concept artist or illustrator for video games or graphic novels, hoping to build a professional portfolio in high school, study graphic design or animation at a university,
    and eventually work freelance so she can create art on her own schedule. She also dreams of using her bilingual skills to create culturally inspired artwork and perhaps teach art workshops for other
    Mexican‑American kids.
