personas:
  professional: David Pereira, a 32‑year‑old full‑stack software developer with an MBA, merges disciplined engineering practice with strategic business insight to deliver cloud‑native solutions that balance
    scalability, cost efficiency, and user value while mentoring junior teammates and steering product direction toward measurable impact.
  sports: David Pereira cycles on the Florida Keys trail network as a member of the Southeast Florida Cycling Club, follows the Miami Heat in the NBA and the Miami Dolphins in the NFL, and complements his
    cardio routine with weekend 5‑k runs, though he tends to skip strength training sessions when project deadlines loom.
  arts: David Pereira's evenings often feature the smooth sounds of Cuban jazz icons like Chucho Valdés and the classic arrangements of Buena Vista Social Club, while his occasional visits to the Pérez
    Art Museum showcase contemporary Latin American installations that inspire his creative problem‑solving.
  travel: David Pereira prefers meticulously planned short getaways, having cycled the Alpine passes in Switzerland, explored historic Old Havana, and trekked the volcanic landscapes of Iceland, yet he
    balances his wanderlust with a tight budget, reserving longer trips for milestones like earning his AWS Solutions Architect Professional certification.
  culinary: David Pereira enjoys cooking elaborate Cuban dishes such as Ropa Vieja, Mojo‑marinated pork shoulder, and sweet plantain fritters, perfecting each recipe with a sous‑vide machine and fresh citrus,
    but admits to over‑seasoning when experimenting, leading to occasional flavor overload.
  core: David Pereira, the disciplined yet curious technologist who solves chess puzzles between coding IoT prototypes, cycles solo trails, meticulously budgets his finances, and occasionally over‑seasons
    his Ropa Vieja while neglecting sleep after marathon debugging sessions.
background:
  cultural: David is the son of Cuban immigrants and grew up bilingual, speaking Spanish and English at home. Family traditions emphasized hospitality, music, storytelling, and shared meals, fostering a
    strong sense of community. He maintains connections to the Cuban diaspora through occasional visits to relatives in Miami, participation in local Cuban cultural festivals, and preserving family recipes.
    While fully integrated into life in Thompson's Station, Tennessee, he blends his Hispanic heritage with Southern customs, embodying a multicultural identity that values both his roots and his adopted
    community.
