  hobbies: '[''Chess'', ''Personal coding projects (IoT experiments)'', ''Cycling'', ''Cooking Cuban cuisine'', ''Listening to Cuban jazz'', ''Reading tech and business books'', ''Small-group tech meetups'',
    ''Family game nights'']'
  career_goals: David aims to advance to a senior engineering leadership role where he can shape product strategy, mentor high-performing teams, and bridge business goals with technical execution. Over
    the next five years he plans to earn the AWS Solutions Architect Professional certification, lead initiatives that improve system scalability and cost efficiency, and eventually launch a tech venture
    that serves the Cuban-American community by providing culturally relevant digital services.
