personas:
  professional: Craig Saleh, a 53‑year‑old project‑management veteran turned freelance graphic designer, leverages his meticulous budgeting, spreadsheet modeling, and grant‑writing expertise to deliver
    polished watercolor‑inspired branding for local nonprofits while orchestrating community art workshops with the same disciplined, imaginative flair that defines his career.
  sports: Craig Saleh, a weekend hiker who logs miles on the Appalachian Trail with the Roanoke Valley Trail Club, plays pickleball at the Salem Racquet Club in summer, and follows the Washington Capitals,
    Washington Commanders, and Virginia Cavaliers basketball with strategic enthusiasm, all while balancing his love of novelty with a disciplined fitness schedule.
  arts: Craig Saleh channels the soft light of Claude Monet, the bold forms of Georgia O'Keeffe, and the narrative whimsy of Hayao Miyazaki into his watercolor and digital illustrations, draws lyrical inspiration
    from Joni Mitchell, and regularly attends exhibitions at the Taubman Museum of Art and Jefferson Fine Art Gallery to keep his creative imagination sharp.
  travel: Craig Saleh plans his trips like a curated photo series, favoring thoughtful road‑escapes to Shenandoah National Park and Monticello in Virginia, while also ticking off dream destinations such
    as Edinburgh’s festival scene, Kyoto’s zen gardens, and Venice’s canal alleys, always sketching each locale before returning home to organize the memories into his next art project.
  culinary: Craig Saleh enjoys medium‑level cooking that showcases his garden’s bounty—preparing dishes like shrimp and grits seasoned with smoked paprika, summer ratatouille brimming with zucchini and
    eggplant, and wild mushroom risotto finished with fresh thyme and a drizzle of local honey over sourdough toast.
  core: Craig Saleh balances a disciplined, spreadsheet‑driven routine with a vivid imagination that fuels his art, yet he can’t resist snapping up limited‑edition watercolor sets at the last minute, often
    leaving his calendar hilariously overbooked.
background:
  cultural: Craig was born and raised in Salem, Virginia, a small town nestled in the Appalachian foothills. His family traces its roots to English and Irish immigrants who settled in the region in the
    late 19th century. Growing up in a close‑knit, predominantly white community, he was immersed in Southern customs such as church gatherings, local harvest festivals, and a strong emphasis on self‑reliance.
    The cultural tapestry of Roanoke County—rich in folk music, handcrafted arts, and a tradition of community volunteering—has shaped his values of cooperation, modest ambition, and appreciation for regional
    heritage. While he identifies with mainstream American culture, Craig maintains a deep respect for the Appalachian storytelling tradition and the craftsmanship ethos that pervade his hometown.
