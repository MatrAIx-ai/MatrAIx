  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Digital Illustration'', ''Reading Speculative Fiction'', ''Philosophy'', ''Art History'', ''Photography (landscape and architecture)'', ''Gardening'',
    ''Board Gaming'', ''Volunteering at Historical Museum'', ''Leading Community Art Classes'']'
  career_goals: Craig aims to leverage his organizational talent and artistic passion to launch a part‑time freelance design studio that serves local nonprofits and small businesses, while also developing
    a community art workshop series in Salem. He plans to complete a bachelor’s degree in Fine Arts or Creative Writing within the next three years, enabling him to publish a collection of speculative short
    stories. Additionally, he hopes to secure a grant to establish a low‑cost art space for youth in Roanoke County, combining his grant‑writing experience with mentorship ambitions. Ultimately, he envisions
    a modest, sustainable career that balances creative fulfillment with community impact, without sacrificing the structured routine he values.
