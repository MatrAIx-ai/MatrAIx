persona_description: A philosopher who specializes in the study of the nature of being and existence, particularly the concepts and principles related to the unity of all things and the principles of nature.
  His research interests include, but are not limited to, the philosophy of nature, the concept of the universe as an all, and the principles of the three dimensions of nature. He is also interested in
  the role of the number three in the worship of the Gods and the use of the terms in practice.
