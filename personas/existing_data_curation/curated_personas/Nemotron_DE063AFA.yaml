    series'']'
  career_goals: Even in retirement, Byron aims to preserve the stories of his generation by completing a memoir and curating an oral‑history archive for the local historical society. He hopes to lead intergenerational
    workshops that teach youth how to conduct interviews and digitize recordings. Byron also plans to deepen his digital skills to create an online exhibit of Tallahassee’s Black heritage, while continuing
    to volunteer as a mentor and occasional event coordinator. Personal health goals include maintaining his garden and staying physically active through regular walks with his wife.
