persona_description: A healthcare professional with expertise in the diagnosis and treatment of headaches, particularly sinus headaches and migraine. They are familiar with the diagnostic criteria for sinus
  headaches and migraines, as well as the treatment options available for these conditions. They are also knowledgeable about the treatment of vertigo and tinnitus, and how they can be distinguished from
  other causes. They have experience with the otolaryngological evaluation of patients with vertigo and tinnitus, and are familiar with the diagnostic criteria for basilar-type migraine. They have a unique
  understanding of the relationship between headache and the inner ear, and how it can be used to differentiate between migraine-related vertigo and tinnitus and other causes of these symptoms. They have
  experience with the use of anticonvulsants for the treatment of vertigo and tinnitus that are suspected to be migrainous phenomena.
