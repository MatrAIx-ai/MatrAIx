personas:
  professional: Racheal Dao is a registered nurse on a busy Honolulu medical‑surgical unit who blends keen scientific curiosity with practical patient care, leveraging their strong informatics skills to
    streamline electronic health record workflows, mentor new staff, and spearhead quality‑improvement projects that honor the island’s communal values.
  sports: Racheal Dao enjoys a varied fitness routine that includes early‑morning hikes up Diamond Head, weekly surf sessions at Waikiki with the local Waikiki Wave Riders club, a Saturday yoga class at
    a community studio, and cheering for the University of Hawaii Rainbow Warriors while also running with the Honolulu Trail Runners group, which they find both grounding and invigorating.
  arts: Racheal Dao expresses creativity by painting vivid depictions of hibiscus and plumeria, strumming a ukulele during casual gatherings where they cover Israel Kamakawiwoʻole and Jack Johnson, and
    devouring science‑fiction novels by Ann Leckie and Neal Stephenson when they need an imaginative escape.
  travel: Racheal Dao alternates weekend island explorations of Maui’s Hana Road and Kauai’s Na Pali Coast with occasional overseas trips to Kyoto’s historic temples and New Zealand’s South Island, favoring
    itineraries that blend eco‑adventure with cultural immersion while carefully budgeting around their graduate‑school savings plan.
  culinary: Racheal Dao loves preparing poke bowls with ahi tuna, soy sauce, sesame oil, and fresh seaweed, enjoys cooking traditional loco moco with grass‑fed beef and homemade macadamia butter, and frequently
    experiments with taro‑based desserts, though they tend to over‑season their dishes with chili flakes when stressed.
  core: Racheal Dao is a tech‑savvy, nature‑driven nurse who balances a worry‑prone mind with an adventurous spirit, a love for ukuleles, and a habit of splurging on surf gear while meticulously planning
    their future.
background:
  cultural: Racheal is a White American who grew up on the mainland before moving to Honolulu for college and her nursing career. Immersed in the islands’ multicultural environment, she has embraced the
    Aloha spirit, local customs, and Hawaiian values of community and respect for nature. She has learned basic Hawaiian phrases, participates in community events like Lei Day, and incorporates cultural
    competence into her nursing practice by honoring patients’ diverse backgrounds, including indigenous health traditions. Her blend of mainland upbringing and island life informs a broad, inclusive worldview.
