  career_goals: Racheal aims to transition from bedside nursing to a role that blends clinical expertise with data‑driven leadership. In the next five years she plans to complete a Master of Science in
    Nursing with a focus on nursing informatics or administration, positioning herself for a nurse manager or clinical informatics specialist position at a Hawaiian health system. She is also interested
    in launching a research project on stress reduction strategies for healthcare workers, leveraging her personal experience with anxiety. Ultimately, she aspires to influence policy that promotes culturally
    sensitive, technology‑enhanced patient care across the islands.
