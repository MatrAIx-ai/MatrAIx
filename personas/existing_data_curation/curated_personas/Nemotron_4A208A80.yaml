  career_goals: Lisa aims to earn a Certified Maintenance & Reliability Technician (CMRT) credential and become a senior facilities manager for a mid‑size municipal or private organization in the Willamette
    Valley. She hopes to lead a larger maintenance team, oversee major renovation projects, and incorporate sustainable practices such as green building retrofits. In the longer term, she envisions starting
    her own independent maintenance consultancy that offers affordable, community‑focused services, while also mentoring women entering the trades.
