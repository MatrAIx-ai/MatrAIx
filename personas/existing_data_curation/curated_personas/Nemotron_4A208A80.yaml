personas:
  professional: Lisa Marazzani, a senior facilities technician in the Willamette Valley, leverages her meticulous planning, hands‑on expertise in HVAC, plumbing, and electrical systems, and her innate sociability
    to lead maintenance teams, train junior staff, and embed sustainable retrofits while keeping the community’s needs front‑and‑center.
  sports: Lisa Marazzani, an avid cyclist with the Willamette Valley Cyclists club, enjoys weekend hikes in the Columbia River Gorge, plays in a co‑ed recreational softball league, roots for the Portland
    Trail Blazers in the NBA and the Portland Timbers in MLS, and follows a disciplined but fun‑focused fitness routine that mixes cardio rides with strength training.
  arts: Lisa Marazzani, a regular at Portland’s maker fairs, finds artistic inspiration in the folk melodies of Bon Iver, the cinematic storytelling of Federico Fellini, and the vibrant murals of contemporary
    Pacific Northwest artist James C. Christensen, often integrating these influences into her DIY home automation projects and weekend cooking gatherings.
  travel: Lisa Marazzani, who plans her trips using detailed itineraries but leaves room for spontaneous detours, has hiked the Columbia River Gorge, biked the Oregon Coast Trail, explored the vineyards
    of Tuscany, and dreams of a sustainable eco‑retreat in the Japanese Alps, always balancing budget constraints with her love for community‑focused experiences.
  culinary: Lisa Marazzani, a confident home chef, frequently prepares homemade tagliatelle with a slow‑cooked ragù, rustic caprese salads featuring heirloom tomatoes, basil, and buffalo mozzarella, and
    experiments with seasonal ingredients like roasted figs and pistachio pesto, while occasionally burning the garlic when multitasking between a DIY workshop and dinner prep.
  core: Lisa Marazzani, the community‑driven maintenance guru who juggles DIY workshops, sustainable living reads, and spontaneous pasta nights, occasionally misplaces their wrench in the kitchen but always
    returns with a fresh idea.
background:
  cultural: Lisa’s family heritage is Italian, reflected in her surname Marazzani, and she grew up in a culturally mixed, predominantly white community in Oregon. She combines traditional Italian values
    of family, food, and hospitality with Pacific‑Northwest sensibilities such as environmental stewardship, self‑reliance, and an appreciation for the outdoors. Her cultural background influences her collaborative
    approach, her love of communal meals, and her commitment to community service.
