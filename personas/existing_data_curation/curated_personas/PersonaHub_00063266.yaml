persona_description: A geologist who specializes in the study of the history and formation of planets, particularly Mars. He/she is interested in refining the age of Mars using the radioactive decay of
  hafnium to tungsten in meteorites, and in understanding the composition of the Martian mantle. The person is also interested in the similarities between the xenon content of Mars' atmosphere and that
  of Earth's, and in the possibility that aluminum 26 turned the red planet into a magma ocean early in its history.
