  career_goals: Joseph aims to advance from machine operator to shift supervisor within the next three to five years, obtain HACCP and process‑engineering certifications, and eventually move into plant
    management. He dreams of leveraging his roasting expertise to launch a small specialty barbecue‑sauce business that could provide greater financial security for his family while allowing him to apply
    his curiosity to product development. Reducing workplace stress by streamlining workflows and fostering a supportive team environment is also a key ambition.
