persona_description: A medieval Spanish woman who lived in the 15th century and was the first feminist writer in Spain. She was deaf and wrote about her experiences and beliefs, which were revolutionary
  at the time. Her ideas about gender, God, and disability were highly influential and set a new standard for female writers in Medieval Europe.
