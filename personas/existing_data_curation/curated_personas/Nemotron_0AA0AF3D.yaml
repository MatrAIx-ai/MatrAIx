personas:
  professional: Wayne Procaccini, a 20‑year‑old aspiring visual artist and UI/UX designer, leverages their strong foundation in watercolor illustration, digital painting in Procreate, and photography to
    craft compelling concept art while applying their meticulous organization and calm resilience to meet freelance deadlines for indie game developers and local businesses.
  sports: Wayne Procaccini, a quiet fitness enthusiast, prefers solo runs along the Mahoning River trail and weekend rock‑climbing at Hocking Hills, while cheering on the Cleveland Browns and Cleveland
    Cavaliers from their modest living room, and they occasionally join the Warren Wolfpack intramural soccer club for light competitive play during the fall.
  arts: Wayne Procaccini, an avid participant in the Warren art scene, frequently attends openings at the Youngstown‑based Gallery 311 and hands‑on workshops at the Canvas Collective, draws inspiration
    from watercolor masters like Georgia O’Keeffe and digital innovators such as James White, and curates indie playlists featuring Radiohead, Sufjan Stevens, and experimental electronic duo Autechre while
    sketching in local cafés.
  travel: Wayne Procaccini favors low‑cost road trips that blend photography opportunities with quiet reflection, having captured sunrise over Niagara Falls and explored the street art of Detroit, while
    dreaming of a solo trek through Iceland’s waterfalls and a cultural immersion in Kyoto’s tea houses, always planning itineraries on Notion to maximize budget efficiency.
  culinary: Wayne Procaccini enjoys cooking simple regional dishes such as Ohio apple‑cinnamon skillet pancakes and a hearty sweet‑potato chili with locally sourced beans, experimenting with fresh herbs
    like rosemary and thyme, and they relish pairing meals with craft brews from local breweries like The Brewery at the Mall while occasionally treating friends to homemade lavender‑infused honey desserts.
  core: Wayne Procaccini, the contemplative 20‑year‑old artist, balances disciplined freelance work with spontaneous sketch‑sessions in coffee shops, an unshakable calm that masks a hidden habit of late‑night
    binge‑listening to experimental music and an occasional impulsive splurge on premium art supplies.
background:
  cultural: Wayne was raised in a working‑class family in Warren, Ohio, a town shaped by the Rust Belt’s industrial heritage. His grandparents immigrated from northern Italy and Germany, and his family
    has lived in the region for three generations. The community emphasizes modesty, self‑reliance, and neighborly support, which fostered his calm confidence and resilience. He identifies with Midwestern
    values such as sincere honesty and a strong work ethic, while his European ancestry nurtures an appreciation for art history and classical techniques. Local traditions—like seasonal festivals, high
    school football gatherings, and the annual Warren SummerFest—provide a sense of belonging, even as his curiosity drives him to explore global artistic movements.
attributes:
  skills: '["Digital illustration (Procreate, Adobe Photoshop)", "Photography (composition, Lightroom editing)", "Graphic design fundamentals (layout, typography, color theory)", "Basic web design (HTML,
    CSS) and UI wireframing (Figma)", "Research and visual reference gathering", "Project management using Trello/Notion", "Written communication (blogging, journaling)"]'
  hobbies: '["Sketching and watercolor painting", "Digital illustration and mixed‑media art", "Landscape photography", "Listening to indie and experimental music", "Reading speculative fiction and philosophy",
    "Visiting local galleries and art workshops", "Mindful breathing exercises", "Cooking simple regional dishes for friends"]'
  career_goals: Wayne aims to complete his remaining college credits to earn an associate degree in visual arts, then build a professional portfolio that showcases his illustration, concept art, and photography
    work. He plans to secure freelance commissions for indie game developers and local businesses, and eventually transition into a full‑time role as a concept artist or UI/UX designer at a boutique studio.
    Long‑term, he hopes to launch an online shop selling prints and original artwork, and to contribute his skills to community art projects and workshops in Warren and the broader southeastern Ohio region.
