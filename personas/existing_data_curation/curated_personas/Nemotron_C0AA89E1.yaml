personas:
  professional: Candace Myers, a 46‑year‑old office administrator with a flair for creative problem‑solving and community engagement, uses their expertise in records management, basic graphic design, and
    persuasive communication to streamline workflows and spearhead local arts‑focused events, all while preparing to transition into a community outreach coordinator role at a design nonprofit.
  sports: Candace Myers is an avid supporter of the Iowa Cubs baseball team, a regular participant in the Des Moines Adult Softball League, and a weekend jogger at Gray’s Lake, blending low‑key community
    sports with a fondness for catching the Chicago Bears' games on Sunday evenings.
  arts: Candace Myers blends a love for abstract watercolors with a reverence for Frida Kahlo’s bold narratives, regularly attends openings featuring local artist Sara Gardner at the Des Moines Art Center,
    performs improv at The Improv Center, and finds inspiration in the haunting soundscapes of Bon Iver while discussing contemporary fiction by Haruki Murakami in their weekly book club.
  travel: Candace Myers prefers impromptu road trips that whisk them from Des Moines to the historic Amana Colonies for Dutch pastries, the tranquil shores of Lake Okoboji for a sunset kayak, and occasionally
    jets off to Marrakech to soak in vibrant souks, all with a loosely planned itinerary that leaves room for spontaneous detours.
  culinary: Candace Myers delights in cooking beet‑salad with goat cheese and balsamic glaze using herbs from their eclectic garden while also savoring spicy kimchi fried rice at a new Korean bistro, and
    they never miss a chance to host potluck evenings featuring roasted Brussels sprouts, artisanal sourdough, and locally sourced pork tenderloin.
  core: Candace Myers, a 46‑year‑old creative firecracker, channels their boundless imagination into community art projects, sidesteps rigid schedules with a laid‑back approach, and occasionally over‑indulges
    in spontaneous splurges on supplies and travel.
background:
  cultural: Candace grew up in suburban Des Moines within a middle‑class family with deep Midwest roots, tracing her ancestry to German and Scandinavian immigrants who settled in Iowa in the early 20th century.
    The community emphasized self‑reliance, modesty, and close‑knit neighborhood ties, with frequent participation in church activities, county fairs, and local volunteer events. Exposure to Des Moines'
    vibrant arts scene—gallery walks, community theater, and the Des Moines Art Center—sparked her early fascination with creative expression, blending the region's pragmatic sensibility with an openness
    to novelty and artistic exploration.
