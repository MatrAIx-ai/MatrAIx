  career_goals: Candace aims to leverage her strong interpersonal and organizational talents to transition into a role that blends administrative expertise with creative community engagement. She envisions
    becoming a community outreach coordinator for a local arts nonprofit or an office manager at a design firm, where she can curate events, manage teams, and foster a collaborative culture. To achieve
    this, she plans to enroll in a part‑time certificate program in project management or arts administration, deepen her graphic design skills, and seek mentorship within the Des Moines arts scene. Long‑term,
    she hopes to supervise a team, lead larger community initiatives, and eventually open a small boutique studio that offers art classes, workshops, and community gatherings.
