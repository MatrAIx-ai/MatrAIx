persona_description: A public health expert working in the WHO South-East Asia Region, with a focus on reducing premature deaths from non-communicable diseases (NCDs) and promoting evidence-based, cost-effective
  interventions to prevent and control NCDs. This person is knowledgeable about the global burden of NCDs, the impact of NCDs on vulnerable populations, and the importance of addressing NCDs as a vital
  health and developmental imperative for countries in the Region. This individual is likely to be involved in developing and implementing strategies to reduce NCDs, including promoting healthy lifestyles,
  reducing salt and tobacco consumption, and eliminating trans-fat from the food supply chain.
