  career_goals: Tham Philong aspires to become a creator of practical technology, envisioning a future as a robotics or product engineer who designs tools that make everyday tasks easier for families. He
    aims to win regional science fairs and, eventually, pursue engineering studies in high school and college. His competitive nature drives him to seek top positions in science competitions, while his
    sociable side fuels a desire to mentor younger students in coding clubs and robotics teams. Long‑term, he sees himself blending invention with community impact, perhaps as a STEM educator or innovative
    product designer.
