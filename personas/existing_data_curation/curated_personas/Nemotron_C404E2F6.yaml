personas:
  professional: Tham Nguyen is a budding technologist who blends LEGO engineering, Scratch programming, and debate club experience into a methodical problem‑solving approach, reflecting a balance of curiosity,
    practicality, and organized reliability.
  sports: Tham Nguyen plays midfield for the community youth soccer team, trains twice a week at the local park, cheers for Liverpool FC in the Premier League, and incorporates strategic drills inspired
    by chess tactics, highlighting their competitive edge and love for teamwork.
  arts: Tham Nguyen expresses creativity through intricate LEGO builds, animated Scratch projects, and short video clips, while drawing inspiration from Studio Ghibli’s "My Neighbor Totoro", listening to
    the pop hits of Billie Eilish, and admiring the comedic timing of actor Tom Holland in the Spider‑Man movies.
  travel: Tham Nguyen has explored the Grand Canyon on a school field trip, visited the Smithsonian’s National Air and Space Museum, dreams of stargazing in Chile’s Atacama Desert and touring the historic
    temples of Angkor Wat, and prefers family‑planned itineraries that mix adventure with educational stops.
  culinary: Tham Nguyen loves helping prepare family dishes such as pho broth with star anise, ginger, rice noodles, and beef slices, enjoys assembling fried rice with soy sauce, peas, and scrambled eggs,
    and frequently experiments with banana‑pancake stacks topped with honey and sliced strawberries.
  core: Tham Nguyen’s ten‑year‑old world is a vibrant mix of LEGO architecture, coding adventures, soccer strategy, and debate flair, driven by a pragmatic curiosity, organized planning, and a competitive
    spark that sometimes fuels stubbornness.
background:
  cultural: Tham Philong comes from a Southeast Asian family that balances cultural traditions with life in Gilbert, Arizona. At home, Vietnamese is spoken alongside English, and the family celebrates holidays
    such as Lunar New Year with special meals, traditional games, and storytelling that emphasize respect for elders and the importance of education. Growing up in a multicultural suburban environment,
    he also engages with broader American customs—joining school sports, holiday parades, and local community service events. This dual exposure nurtures a flexible worldview, allowing him to blend the
    meticulous, family‑oriented values of his heritage with the collaborative, innovation‑driven spirit of his community.
