  career_goals: Jane aims to transition from day-to-day processing to a senior advisory role where she can lead a large-scale digitization project for Baltimore’s historic photograph collections, preserving
    the city’s visual heritage for future generations. She aspires to become a consultant for local museums and archives, offering expertise in conservation-grade processing and sustainable lab practices.
    Jane also plans to develop and teach a community-focused photography workshop series for seniors, fostering creative expression while imparting disciplined technical skills. Mentoring emerging technicians,
    advocating for eco-friendly chemicals, and contributing to professional societies such as the Photographic Society of America are key components of her long-term ambition. Ultimately, she seeks a balanced
    part-time position that allows her to continue making an impact while enjoying more time for volunteer work and personal artistic projects.
