  career_goals: As he approaches retirement age, Ramsey aims to secure a district‑manager role within the next two years, allowing him to influence multiple stores while mentoring emerging leaders. He also
    hopes to transition into a part‑time consulting capacity, helping small independent retailers adopt modern technology without overwhelming them. Additionally, he plans to complete a short certification
    in retail analytics to solidify his expertise and stay relevant in a rapidly changing industry.
