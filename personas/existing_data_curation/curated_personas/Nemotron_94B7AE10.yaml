  career_goals: Sergio aims to channel his curiosity for technology into a stable career as an IT support specialist or network systems technician. He plans to complete an associate degree in Computer Information
    Systems and earn CompTIA A+ and Network+ certifications within the next two years. Securing a full‑time technical role would enable him to support his family financially and reduce the stress he often
    feels about financial uncertainty. Beyond the tech field, Sergio dreams of eventually launching a small catering business that offers modern twists on classic Mexican street foods, combining his culinary
    passion with entrepreneurial ambition. He is also committed to personal growth, seeking stress‑management techniques and mentorship to build confidence in his professional path.
