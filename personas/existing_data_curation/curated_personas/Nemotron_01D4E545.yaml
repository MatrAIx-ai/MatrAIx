  hobbies: '[''drawing and illustration'', ''soccer'', ''Minecraft world building'', ''visiting art museums'', ''beginner Scratch coding club'', ''reading graphic novels'', ''family cooking and cultural
    celebrations'']'
  career_goals: While still young, Tuyet dreams of turning her love for art and technology into a future career. She imagines becoming a visual artist or game‑designer who can craft immersive worlds that
    blend cultural stories with interactive play. She also hopes to lead community art workshops in Chicago’s Vietnamese neighborhoods, using her bilingual skills to mentor other kids. Her competitive streak
    pushes her to aim for recognition in youth art contests and coding challenges, seeing each achievement as a step toward a creative profession that values both imagination and strategic thinking.
