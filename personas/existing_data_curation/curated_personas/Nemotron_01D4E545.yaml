personas:
  professional: Tuyet Tran is an aspiring game designer who spends afternoons sketching cartoon heroes and building Minecraft worlds, while also coding simple Scratch games at a community club, channeling
    their curiosity into digital storytelling even though they often forget to tidy up their workstation.
  sports: Tuyet Tran loves soccer, playing in the local park league and cheering for the Chicago Fire, and they train with friends every weekend, but their competitive streak sometimes overshadows teamwork,
    leading to occasional friction on the field.
  arts: Tuyet Tran is a budding illustrator who devours graphic novels like "Smile" by Raina Telgemeier and studies modern Asian art at the Art Institute, often humming pop hits from BTS and Ariana Grande
    while drawing, and they admire the street art of Banksy and the animation of Hayao Miyazaki.
  travel: Tuyet Tran enjoys family trips that mix cultural immersion, such as attending Tet celebrations with relatives abroad and weekend outings to Chicago's Millennium Park and the Field Museum, dreaming
    of future adventures to Japan's anime museums while balancing school and a modest travel budget.
  culinary: Tuyet Tran helps grandparents prepare fragrant pho broth and crispy spring rolls during holidays, enjoys experimenting with pineapple pizza at home, but their cooking skills are still beginner-level,
    often resulting in over‑salty soups and a mischievous habit of stealing bites from the kitchen counter.
  core: Tuyet Tran is a curious, art‑driven 10‑year‑old who blends sketching, soccer, and Scratch coding into a vibrant, slightly chaotic routine, often letting competition spark over teamwork while chasing
    the next creative spark.
background:
  cultural: Tuyet is a Vietnamese‑American growing up in Chicago’s diverse neighborhoods. At home, Vietnamese language, cuisine, and customs like celebrating Tet are woven into daily life, giving her a
    strong sense of heritage. The city’s vibrant multicultural scene offers her exposure to both American school culture and Southeast Asian community events, fostering an appreciation for a blend of traditions.
    Her family emphasizes respect for elders and communal support, while encouraging curiosity and education, which shapes her bilingual communication and openness to new ideas.
