personas:
  professional: Maryevelyn Hughes, an 11‑year‑old aspiring graphic novelist, blends her curiosity for fantasy worlds with disciplined organization as she drafts illustrated storyboards in both traditional
    sketchbooks and Scratch‑based interactive narratives, often challenging herself with competitive chess tactics to refine plot twists, while they maintain a skeptical eye toward collaborative feedback.
  sports: Maryevelyn Hughes, an 11‑year‑old who prefers low‑key physical activity, is a member of the local Kids Hiking Club that explores nearby woods on weekend outings, occasionally joins after‑school
    basketball drills with the Midvale Ravens junior team, and enthusiastically cheers for the Midvale Hawks minor‑league baseball squad, balancing a love for nature with a quiet competitive spirit, while
    they keep a secret stash of glittery wristbands as a personal trophy.
  arts: Maryevelyn Hughes, an 11‑year‑old with a flourishing imagination, spends afternoons in an after‑school art circle studying the whimsical line work of Hayao Miyazaki, the surreal textures of James
    Jean, and drawing inspiration from indie musicians like Phoebe Bridgers and The Paper Kites while filling sketchbooks with fantasy landscapes and crafting friendship bracelets for close friends, and
    they often revisit their favorite scenes by coloring in intricate mindfulness pages to soothe anxiety.
  travel: Maryevelyn Hughes, an 11‑year‑old who prefers meticulously planned weekend getaways, often researches nearby natural spots like Shenandoah National Park and the Appalachian Trail for quiet sketching
    sessions, while dreaming of exploring the historic libraries of Prague and the whimsical streets of Kyoto during future family vacations, balancing a desire for relaxation with an insatiable curiosity
    for new stories, and they keep a scrapbook of collected leaf prints as travel mementos.
  culinary: Maryevelyn Hughes, an 11‑year‑old budding cook, favors making fresh cucumber‑mint water, whisking up blueberry muffins with whole‑wheat flour, experimenting with simple veggie stir‑fry using
    bell peppers and tofu, treats herself to limited indulgences like gummy bears after late‑night drawing marathons, and they often forget to clean the kitchen promptly, leaving a trail of colorful crumbs
    on the counter.
  core: Maryevelyn Hughes, an introspective 11‑year‑old artist who channels intense emotions into vibrant fantasy sketches, savors quiet nature walks, and oscillates between meticulous saving and spontaneous
    art‑supply splurges, all while navigating the highs and lows of anxiety with a skeptical eye toward adult intentions, and they sometimes retreat into solitary doodling sessions when overwhelmed.
background:
  cultural: Maryevelyn was raised in Ovid, a small town in Clinton County, Michigan, within a predominantly white, Midwestern community. Her upbringing reflects typical Midwestern values of self‑reliance,
    modesty, and close‑knit family ties. Community events such as county fairs, local church gatherings, and school art programs have shaped her appreciation for both tradition and creativity. The rural
    landscape offers frequent exposure to nature, fostering her interest in outdoor journaling and birdwatching, while the town’s modest public library and school clubs provide avenues for artistic and
    intellectual exploration.
