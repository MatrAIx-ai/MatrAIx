  career_goals: She envisions a future where she can blend her curiosity with her love of art, aiming to attend a specialized art high school and eventually become a children's‑book illustrator or a museum
    curator. Maryevelyn also hopes to win regional art competitions and use her work to highlight topics that matter to her, such as mental‑health awareness for kids. Her long‑term ambition is to turn her
    creative talents into a career that inspires and educates others.
