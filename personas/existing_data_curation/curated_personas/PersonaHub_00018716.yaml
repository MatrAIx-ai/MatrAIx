persona_description: A Linux network administrator who is familiar with the concepts and terminology related to traffic control, including concepts like tokens, buckets, and the Hierarchical Token Bucket
  (HTB) class. They are comfortable with the tcng project and its features, and are skilled in configuring and maintaining traffic control structures in Linux systems. They have a strong understanding of
  network architecture and the impact of traffic shaping on network performance, and are able to choose the appropriate bandwidth for their top-level class based on their network environment and the bottleneck
  between their LAN and the Internet.
