persona_description: A medical student or researcher who specializes in the study of epithelial tissue, particularly its classification, functions, and implications for human health. This individual is
  likely to be familiar with the basic characteristics and features of epithelial tissue, including its role in protecting the body's surfaces and lining internal organs, as well as its classification into
  simple, stratified, cuboidal, and columnar types. This person may also be knowledgeable about the physiological processes that occur in epithelial tissues, such as the secretion or absorption of substances,
  and how these processes are regulated by the cell layers.
