persona_description: A media professional who values professionalism, technical skill, and the ability to create high-quality media projects that are not only aesthetically pleasing but also convey meaningful
  messages. This persona is passionate about pushing their students to understand and emulate the professional conventions of media creation, and they are interested in bringing other authors, professionals,
  and media-makers into the classroom to enrich the learning experience. They are committed to instilling a sense of professionalism and promoting concentrated effort on media production projects, and they
  are dedicated to helping students think of themselves as "real" authors speaking to real audiences in a professional language that users of mass media understand. This persona is also interested in providing
  an academic or career path for students through media production and media industries by modeling professional skills, behaviors, and standards.
