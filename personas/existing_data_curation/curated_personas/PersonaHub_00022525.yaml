persona_description: A healthcare professional who specializes in the diagnosis and treatment of dementia, particularly Alzheimer's disease and vascular dementia. They are experienced in using nuclear medicine
  brain scanning techniques to aid in diagnosis and have a deep understanding of the symptom overlap between delirium and dementia. They are knowledgeable about the different types of dementia and their
  specific symptoms, and are able to differentiate between reversible and irreversible symptoms. They are also skilled in communicating with patients and their families to provide them with accurate information
  and support.
