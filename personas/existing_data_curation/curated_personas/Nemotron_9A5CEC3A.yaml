personas:
  professional: Austin Little, a 17-year-old aspiring automotive technician, uses his natural knack for organizing group activities, dependable punctuality, and practical hands-on skills - fixing bicycles,
    basic car maintenance, and coordinating boardwalk clean-ups - to informally lead peers while pursuing a GED and a trade program that will position him for an apprenticeship with Atlantic City's hotel-maintenance
    crews.
  sports: Austin Little, an avid 17-year-old boardwalk basketball player and skateboarder, organizes weekend pickup games for friends, follows the New Jersey Devils in the NHL and the Philadelphia Eagles
    in the NFL, and maintains a regular fitness routine that blends street-style skate sessions at the boardwalk park with after-school gym workouts, though they sometimes skip a week when school stress
    peaks.
  arts: Austin Little, a 17-year-old visual storyteller, captures Atlantic City's neon-lit boardwalk through phone photography and short TikTok clips, jams acoustic guitar at informal gatherings covering
    songs by John Mayer and local indie singer Brianna Michaels, and streams The Strokes, Post Malone, and classic movie soundtracks, which shape both their aesthetic sensibility and social media presence.
  travel: Austin Little, a 17-year-old who loves quick getaways, frequently spends weekends strolling the Atlantic City boardwalk, takes day trips to Cape May and Philadelphia to explore historic sites
    and street food, and dreams of a summer road trip to Miami Beach and a future backpacking adventure through the Pacific Northwest, though family finances limit them to nearby destinations for now.
  culinary: Austin Little, a 17-year-old fan of boardwalk cuisine, enjoys greasy staples like pepperoni pizza, salt-water taffy, and lobster rolls from local shacks, while also cooking simple pasta carbonara
    and lemon-garlic shrimp at home, experimenting with fresh herbs and the occasional spicy Sriracha drizzle, and has a guilty habit of snacking on sugary soda after late-night gaming sessions.
  core: Austin Little, a structured yet socially energetic 17-year-old, balances group leadership on the boardwalk, anxiety-driven planning, and late-night gaming with a pragmatic drive toward an automotive
    trade career.
background:
  cultural: Austin grew up in a predominantly white, middle‑class neighborhood on the edge of Atlantic City, New Jersey. His family’s daily life blends the rhythm of a coastal tourist town—boardwalk strolls,
    summer fireworks over the Atlantic, and seasonal spikes in activity at nearby casinos—with the steadier cadence of suburban life. He celebrates mainstream American holidays and has been involved in
    community church gatherings and local youth programs. The city’s mix of service‑industry workers, boardwalk vendors, and a strong emphasis on community events has shaped his practical work ethic and
    his appreciation for organized, group‑focused activities.
attributes:
  skills: '["Event coordination", "Team leadership", "Basic automotive maintenance", "Social media content creation", "Time management", "Conflict resolution", "Computer troubleshooting"]'
  hobbies: '["Basketball", "Skateboarding", "Multiplayer video gaming", "Street photography", "TikTok content creation", "Beach clean‑ups", "Acoustic guitar"]'
  career_goals: Austin plans to earn his GED within the next year and then enroll in a community‑college trade program, focusing on automotive technology or electrical systems. He hopes to secure an apprenticeship
    with a local service firm that supports Atlantic City's hotels and boardwalk attractions, eventually becoming a certified technician who can lead maintenance crews. He values a career that offers clear
    schedules, tangible results, teamwork, and a reliable income that will let him support his family and maintain his independence.
