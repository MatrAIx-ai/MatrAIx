    Meditation'', ''Vintage Car Restoration'', ''Cooking (Grilling and Baking)'', ''Technology Tinkering (Arduino, Raspberry Pi)'', ''Attending Anaheim Ducks and LA Angels Games'']'
  career_goals: At 57, Jimmy aims to transition into a senior director or chief operating officer role where he can shape enterprise-wide efficiency strategies and mentor the next generation of managers.
    He plans to obtain a Six Sigma Black Belt and lead a company-wide digital transformation that embeds predictive analytics and robust contingency planning, reducing operational uncertainty for both staff
    and customers. Over the next five years he also intends to build a consultancy focused on operational resilience and workplace mental-health practices, author a guide on stress-aware management, and
    establish a formal succession plan for his current organization to ensure continuity after his eventual retirement.
