  career_goals: Scarlett aims to advance to a regional management role, overseeing multiple stores to apply her strategic thinking on a broader scale. She wishes to develop a comprehensive training curriculum
    that combines practical retail techniques with educational best practices, mentoring emerging supervisors. Long‑term, she envisions transitioning into a consulting capacity or part‑time teaching position
    at a community college, focusing on sustainable retail operations and employee well‑being, while balancing her desire for reduced stress and more family time.
