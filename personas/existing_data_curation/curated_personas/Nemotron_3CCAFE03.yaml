personas:
  professional: An interdisciplinary humanities educator, Bessie Peelen leverages three decades of experience designing flexible literature courses and guiding community-college collaborations, while they
    bring a spontaneous, people-oriented style that fuels lively discussions but also leads to occasional missed deadlines and a competitive drive for teaching awards.
  sports: Bessie Peelen follows the Carolina Hurricanes and the UNC Tar Heels with avid enthusiasm, participates in a local walking club that trails the coastal dunes, and they compete in community trivia
    nights that satisfy their competitive streak more than traditional athletic pursuits.
  arts: Bessie Peelen thrives in New Bern's community theater as an actress and backstage director, regularly attends folk music festivals featuring Old Crow Medicine Show and Rhiannon Giddens, and they
    draw creative inspiration from classic playwrights like August Wilson while also curating local art exhibits.
  travel: Bessie Peelen prefers spontaneous weekend getaways to historic coastal towns such as Charleston, Savannah, and the Outer Banks, often planning trips around genealogical research at archives in
    Virginia and enjoying relaxed cruises on the Pamlico River when budget allows, and they relish the blend of adventure and cultural immersion.
  culinary: Bessie Peelen enjoys cooking Southern comfort dishes like shrimp and grits, pimento cheese biscuits, and peach cobbler, skillfully blending family recipes with contemporary twists using fresh
    okra and collard greens from the farmers market, though they sometimes forget to clean the kitchen promptly after cooking.
  core: Bessie Peelen is a curious, sociable 62-year-old who blends academic rigor with community arts, competes fiercely in trivia, and balances a pragmatic approach to finances with occasional impulsive
    splurges, all while they navigate stress-induced worry and a penchant for last-minute organization.
background:
  cultural: Bessie grew up in a middle‑class family in coastal North Carolina, where Southern hospitality and a strong sense of community were central values. Her upbringing combined church gatherings,
    local festivals, and a deep appreciation for the region’s maritime history. Her white Southern heritage includes multigenerational ties to the area, with family stories rooted in agricultural and fishing
    traditions. These cultural influences, coupled with her formal education in the arts and humanities, have shaped a worldview that respects tradition while remaining curious about new ideas. Bessie’s
    cultural identity is reflected in her commitment to preserving local heritage, her love of Southern storytelling, and her active participation in community events that celebrate the diverse histories
    of New Bern and Pamlico County.
