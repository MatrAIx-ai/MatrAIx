personas:
  professional: Vishnu Costa, a retired humanities scholar turned community curator, leverages meticulous planning and inventive flexibility to lead senior‑center art workshops and spearhead a traveling
    exhibition of diaspora artists, while assertively mediating between artists and institutions.
  sports: Vishnu Costa enjoys leisurely walks along the historic waterfront park, supports the Baltimore Orioles, and rows with a weekly senior rowing club, though they often skip the community bingo night
    when feeling stressed.
  arts: Vishnu Costa immerses in avant‑garde cinema, regularly attends contemporary galleries featuring artists such as Kerry James Marshall and Anish Kapoor, sketches coastal landscapes, and records informal
    podcasts on art discoveries, all while pairing the experience with classical ragas and jazz.
  travel: Vishnu Costa favors purposeful travel, recently explored Lisbon’s Alfama museums to research diaspora art, dreams of a curated road trip along the East Coast to meet senior art collectives, and
    meticulously plans itineraries to accommodate health stamina constraints.
  culinary: Vishnu Costa experiments with spiced pork vindaloo and layered coconut‑milk bebinca, using fresh tamarind and local pumpkins while playing ragas and jazz, but sometimes over‑salts the dishes
    in excitement over new flavor combinations.
  core: Vishnu Costa is a curious, worry‑prone retiree who blends meticulous curatorial ambition with a habit of over‑seasoning dishes and occasionally forgets medication when an artistic project ignites
    enthusiasm.
background:
  cultural: Vishnu is a first‑generation American of Goan Catholic descent, a South Asian community with a blend of Portuguese colonial heritage and Indian traditions. Raised in a household where Konkani
    language, Christian liturgy, and vibrant Kathak dance coexisted, he carries a strong appreciation for cultural hybridity. Living in Pikesville, Maryland, he has integrated into a multicultural suburban
    environment, participating in both local Irish Catholic parishes and Asian cultural festivals. His identity is shaped by a respect for Indian classical arts, a love for Western literature, and a commitment
    to fostering cross‑cultural understanding among his peers.
