  career_goals: Although retired from formal employment, Vishnu aspires to create a lasting cultural legacy in his community. He aims to curate a traveling exhibition that showcases the artistic contributions
    of South Asian immigrants in Maryland, collaborate with the Baltimore Museum of Art on a senior‑friendly art program, and publish a memoir blending personal reflections with art criticism. He also hopes
    to develop a small online archive of oral histories and artworks from the local diaspora, providing a platform for intergenerational dialogue. These pursuits are motivated by his curiosity, desire for
    meaningful impact, and a need to channel his worries into purposeful creativity.
