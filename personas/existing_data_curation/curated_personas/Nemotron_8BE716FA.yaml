  career_goals: Teresa aims to transition into a senior executive role—such as Vice President of Operations or Director of Community Partnerships—where she can scale her managerial expertise across multiple
    locations in Central Florida. She is passionate about launching a regional arts‑and‑culture initiative that links tourism, local businesses, and nonprofit museums, positioning herself as a thought leader
    in culturally‑focused organizational development. Additionally, she intends to mentor emerging women leaders and eventually author a guide on balancing creative curiosity with operational rigor in the
    nonprofit sector.
