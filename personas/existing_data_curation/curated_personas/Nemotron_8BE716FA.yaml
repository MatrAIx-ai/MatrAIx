personas:
  professional: Teresa Petsos, a senior operations strategist in Central Florida’s nonprofit sector, channels their curiosity‑driven planning and agile project management into data‑backed decision making
    while leveraging a talkative, network‑centric style and competitive edge to steer cross‑functional teams through change and crisis with calm confidence, and they excel at turning complex problems into
    actionable roadmaps.
  sports: Teresa Petsos competes in weekly tennis matches at their local club, practices sunrise yoga for flexibility, hikes the Ocala National Forest trails, and avidly follows the Orlando Magic and Tampa
    Bay Lightning, treating each workout as a strategic game where their competitive mindset drives performance, and they set personal bests each season.
  arts: Teresa Petsos immerses themselves in the performing arts by attending Broadway‑level productions like "Hamilton", listening to chamber concerts featuring Yo‑Yo Ma, curating gallery openings, and
    volunteering as a museum docent, where their sociable flair and critical eye shape insightful discussions with fellow patrons, and they often lead the post‑show conversations.
  travel: Teresa Petsos plans culturally rich trips to destinations such as Rome’s historic sites, the Egyptian pyramids, and Japan’s Kyoto temples, balancing meticulously organized itineraries with spontaneous
    culinary detours, all while budgeting wisely to accommodate their family commitments and a penchant for luxury boutique hotels, and they savor each journey as a living lesson in history.
  culinary: Teresa Petsos delights in hosting elaborate dinner parties featuring dishes like moussaka, grilled octopus, and baklava, paired with curated Assyrtiko and Malbec wines, showcasing their adept
    kitchen skills and occasional over‑indulgence in wine selection that sometimes leaves the pantry half‑emptied, and they often experiment with new spice blends to surprise guests.
  core: Teresa Petsos blends a curiosity‑driven strategic mind with a sociable, talkative presence, channeling their competitive edge into both executive leadership and cultured social gatherings, all while
    maintaining emotional stability amid high‑pressure situations, and they never shy away from a spirited debate.
background:
  cultural: Teresa comes from a Greek‑American family; the surname Petsos reflects her heritage, and she grew up celebrating Greek Orthodox traditions, including Easter feasts, name days, and regular visits
    to the local parish. Bilingual in English and conversational Greek, she incorporates the Greek values of hospitality (philoxenia) and communal solidarity into her personal and professional life. Living
    in Orlando, she has blended her Mediterranean roots with Floridian culture—enjoying the region’s diversity, theme‑park tourism, and outdoor lifestyle—while maintaining strong ties to the Greek community
    through cultural festivals and cuisine.
