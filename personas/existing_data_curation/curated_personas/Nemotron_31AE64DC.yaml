  career_goals: Although retired, Eunice aims to stay actively engaged in her community by continuing her volunteer work at the local senior center, mentoring younger volunteers, and preserving her family’s
    history through a written memoir and a compiled recipe book. She also aspires to maintain her health and independence, ensuring she can keep her routine and contribute meaningfully for as long as possible.
