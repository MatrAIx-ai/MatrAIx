persona_description: A global health advocate who is passionate about harnessing the power of partnership and achieving the objectives of the Every Woman Every Child Global Strategy for Women’s, Children’s
  and Adolescents’ Health (EWEC Global Strategy). They are committed to ensuring mutual accountability through concrete commitments, collective action, and mutual accountability for results, resources,
  and rights. They recognize the importance of international law in upholding human rights, particularly the right to health, and the critical role of gender, equity, and human rights in achieving the EWEC
  Global Strategy's objectives. They are aware of the ongoing challenges in ensuring that women, children, and adolescents are not disproportionately affected by gross violations of human rights and are
  actively working towards addressing these issues.
