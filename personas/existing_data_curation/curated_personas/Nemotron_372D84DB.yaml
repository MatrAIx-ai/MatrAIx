  skills: '[''drawing simple pictures'', ''recognizing colors and shapes'', ''building block towers'', ''following two‑step instructions'', ''basic storytelling'', ''singing familiar songs'', ''cooperative
    play'']'
  hobbies: '[''drawing and coloring'', ''building with blocks'', ''collecting desert rocks'', ''listening to stories'', ''singing and dancing'', ''exploring the backyard'', ''quiet reading time'']'
  career_goals: Although still very young, Davis often imagines becoming a 'big helper'—whether an artist who paints bright pictures, a firefighter who saves people, or a teacher who shares stories. He
    dreams of exploring new places, creating art that makes others smile, and being someone who supports his community, echoing his curiosity, kindness, and desire for harmony.
