personas:
  professional: Davis Favorite, a budding preschool explorer who delights in building block towers and pretend‑doctor role‑plays, channels their organized‑yet‑flexible nature into meticulously arranging
    toys while staying open to spontaneous storytelling.
  sports: Davis Favorite attends the Tiny Tots Soccer Club, cheers enthusiastically for the hometown baseball team the River City Rangers, and loves to watch the Metro Hawks basketball games with family
    on weekends.
  arts: Davis Favorite enjoys the whimsical songs of The Wiggles, the vibrant soundtrack of Disney’s "Frozen," and expresses creativity through finger‑painting while listening to Raffi’s "Baby Beluga."
  travel: Davis Favorite has explored the nearby children’s museum and taken a weekend trip to the beach, and dreams of a grand adventure to Disney World in Orlando where they imagine meeting their favorite
    cartoon heroes.
  culinary: Davis Favorite prefers cheesy macaroni, chicken nuggets, and banana slices, can spread peanut butter on toast with surprising dexterity, and eagerly helps stir the batter for blueberry pancakes
    on Saturday mornings.
  core: Davis Favorite is a curious three‑year‑old who balances meticulous toy organization with spontaneous imagination, hoards stickers in a secret stash, and never turns down a chance to sing loudly
    at bedtime.
background:
  cultural: Davis is raised in a white, middle‑class family in Deming, New Mexico. The wide desert landscape, occasional community art fairs, and family traditions such as weekend trips to local museums
    shape his world. Celebrations like Thanksgiving, Christmas, and local holiday parades expose him to a blend of Southwestern scenery and community spirit, fostering his appreciation for nature, art,
    and cooperative values.
