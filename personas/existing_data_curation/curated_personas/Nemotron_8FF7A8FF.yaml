  career_goals: As she approaches retirement age, Regan aims to leverage her extensive practical knowledge by moving into a supervisory or training role within her current plant, eventually serving as a
    lead trainer for the company’s apprenticeship program. She also aspires to launch a community‑based sewing co‑op in Salem where local artisans can collaborate on sustainable, made‑to‑order garments,
    and where she can teach workshops on advanced sewing techniques and garment construction. Long‑term, Regan hopes to develop a small line of eco‑friendly clothing that integrates traditional craftsmanship
    with modern design, and to be recognized as a “Master Sewing Operator” by the regional textile guild. She remains committed to mentoring younger workers and preserving the skilled trade for future generations.
