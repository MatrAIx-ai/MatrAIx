  career_goals: Jolita aspires to move into a district or regional sales management position where she can shape larger sales strategies and mentor a broader team. She aims to launch a community‑focused
    sales training program for local youth, using her love of art and unconventional thinking to design innovative curricula. Over the next five years she also plans to pursue a GED and professional development
    courses to formalize her expertise, positioning herself for a senior leadership role that blends sales performance with community empowerment.
