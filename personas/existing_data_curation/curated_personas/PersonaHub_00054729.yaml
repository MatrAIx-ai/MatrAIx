persona_description: A researcher in the field of soft robotics, particularly in the simulation and modeling of soft robots, with a focus on the dynamics and control of highly deformable robots operating
  in confined spaces with complex contacts and constantly changing environments. This researcher has expertise in using computer graphics software to simulate soft robots and has successfully developed
  a new simulation tool that can significantly reduce the time it takes to bring a soft robot from drawing board to application. This researcher is currently working on applying this technology to other
  kinds of soft robots, such as ones inspired by the movements of bacteria and starfish, and is interested in developing swimming robots that can be fully untethered and used in oceanography to monitor
  seawater conditions or inspect the status of fragile marine life.
