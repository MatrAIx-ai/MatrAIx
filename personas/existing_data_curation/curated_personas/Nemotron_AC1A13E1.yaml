  career_goals: Although retired, David aims to continue contributing to his community and personal growth. He plans to compile a memoir of his life intertwined with the history of Rio Grande, preserving
    oral stories for future generations. He hopes to curate a small, rotating exhibit at the local community center featuring works by emerging local artists, emphasizing unconventional and experimental
    art forms. David also wishes to volunteer as a docent at the nearby Historic Cold Spring Village museum, sharing his knowledge of regional history. He aspires to learn pottery at a community art studio
    and eventually lead a casual workshop for seniors interested in tactile arts. Finally, he dreams of making modest trips to major art museums in New York and Philadelphia to experience world-class collections
    in person.
