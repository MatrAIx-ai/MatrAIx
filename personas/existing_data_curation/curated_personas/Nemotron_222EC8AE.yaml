personas:
  professional: Tosha Lewis, a 70‑year‑old independent humanities tutor, blends her deep knowledge of adult learning theory with a penchant for abstract art, designing fluid, student‑centered curricula
    that weave literature, poetry, and oil‑painting projects, thriving in the quiet of her home studio while mentoring emerging tutors on a flexible, improvisational schedule.
  sports: Tosha Lewis enjoys leisurely morning birdwatching walks in the Lincoln park system and attends weekly senior yoga classes at the community center, while cheering on the Nebraska Cornhuskers football
    team in the fall and following the Lincoln Saltdogs baseball club during summer, preferring low‑impact activities that complement her solitary rhythm.
  arts: Tosha Lewis spends her afternoons immersed in abstract oil painting while listening to Miles Davis’s “Kind of Blue” and Claude Debussy’s “Clair de Lune,” collects vintage postcards featuring artworks
    by Alphonse Mucha, visits the Sheldon Museum of Art to admire pieces by Frida Kahlo and Jackson Pollock, and writes poetry inspired by the verses of Emily Dickinson and Langston Hughes.
  travel: Tosha Lewis prefers slow, contemplative travel, planning off‑season trips by train to destinations like the coastal towns of Maine for lighthouse sketches, the lavender fields of Provence for
    herb‑inspired painting, and Sedona, Arizona for sunrise landscape sessions, all while keeping a modest budget that allows occasional cruises to the Caribbean during her sabbatical years.
  culinary: Tosha Lewis delights in cooking simple, herb‑forward dishes from her garden, frequently preparing rosemary‑infused grilled salmon, thyme‑scented vegetable ratatouille, and lavender shortbread
    cookies, while savoring a cup of Earl Grey tea with a hint of bergamot after reviewing a vintage postcard collection.
  core: Tosha Lewis, the 70‑year‑old solitary artist‑tutor who trades tidy schedules for spontaneous brushstrokes, uses vintage postcards as inspiration, forgets to pay bills on time, yet remains emotionally
    steady and fiercely devoted to nurturing creativity in her community.
background:
  cultural: Tosha grew up as a Black woman in the Midwest during the civil‑rights era, an experience that instilled a deep respect for education as a pathway to empowerment. She draws on African‑American
    oral‑storytelling traditions and the rich musical heritage of her community, often weaving those narratives into her tutoring sessions. Active in her local church and community center, she has long
    championed literacy programs for adults, honoring a family legacy of service and resilience while celebrating the cultural contributions of Black artists and scholars.
attributes:
  skills: '[''Individualized Tutoring'', ''Curriculum Design'', ''Creative Writing Instruction'', ''Integrative Art Pedagogy'', ''Adult Learning Theory'', ''Differentiated Instruction'', ''Mentoring'',
    ''Digital Literacy'', ''Interdisciplinary Curriculum Development'']'
  hobbies: '[''Reading historical fiction'', ''Oil painting'', ''Herb gardening'', ''Birdwatching'', ''Listening to jazz'', ''Writing poetry and short stories'', ''Collecting vintage postcards'', ''Visiting
    art galleries'']'
  career_goals: Tosha aims to leave a lasting legacy in her community by publishing a memoir‑style guide that captures her philosophy of blending art with education. She plans to launch a free, quarterly
    creative writing workshop series for seniors and lifelong learners in Lincoln, emphasizing solitude‑friendly, reflective practices. Additionally, she hopes to mentor emerging tutors, develop a modest
    scholarship for underserved students pursuing the arts, and contribute occasional guest lectures to local adult‑education programs.
