  hobbies: '[''Community soccer'', ''Hiking and kayaking'', ''Habitat for Humanity volunteering'', ''Personal woodworking projects'', ''Live music events'', ''Craft‑beer tasting'', ''Home brewing'', ''Electronics
    tinkering'']'
  career_goals: In the next five years, Richard aims to achieve journeyman status and then qualify as a master carpenter, allowing him to take on larger residential and small commercial projects. He plans
    to pursue a certificate in construction management at a local community college to deepen his understanding of budgeting, scheduling, and client relations. His long‑term ambition is to open his own
    custom‑furniture workshop that also offers eco‑friendly renovation services, integrating sustainable materials and modern design software. He also hopes to mentor younger apprentices, building a collaborative
    team that values both traditional craftsmanship and innovative techniques.
