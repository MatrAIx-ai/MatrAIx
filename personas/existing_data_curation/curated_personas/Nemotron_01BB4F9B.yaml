  hobbies: '[''Reading science fiction and popular science'', ''Building and programming robotics kits'', ''Indoor herb gardening'', ''Journaling and scientific sketching'', ''Volunteering for after‑school
    tutoring'', ''Participating in community clean‑up events'']'
  career_goals: Although still in middle school, Patricia is already thinking about a future that blends her love for science with concrete outcomes. She aspires to become a biomedical engineer or a research
    scientist, focusing on developing affordable medical devices that address real‑world health challenges. She aims to earn a scholarship to a top university, pursue a degree in engineering or applied
    sciences, and eventually work in a collaborative research team where she can contribute disciplined project leadership. In the shorter term, she plans to compete in science fairs, gain mentorship through
    school STEM programs, and secure internships or volunteer positions that give her hands‑on experience.
