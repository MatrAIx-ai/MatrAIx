  career_goals: Arthur aims to land an entry‑level data analyst or software engineering position at a company that emphasizes clear processes and predictable project timelines, such as a public‑sector research
    lab or a midsized tech firm. He wants to deepen his expertise in machine learning and predictive analytics while maintaining a structured work environment that reduces uncertainty. In the next 3–5 years
    he plans to earn a Master’s degree in Data Science or Applied Engineering, move into a senior analyst role, and eventually lead small project teams where he can blend his methodical problem‑solving
    style with the flexibility to iterate on solutions. He is also motivated to mentor other Black students interested in STEM, using his own experience to promote greater representation in technical fields.
