  hobbies: '["traditional beadwork", "hand‑stitched clothing", "hiking", "dog sledding", "snowshoeing", "summer fishing", "community storytelling events", "participating in dance and potluck gatherings",
    "karaoke singing", "volunteering at local food pantry", "reading mystery novels"]'
  career_goals: Aida aims to move into a supervisory role, such as shift lead or warehouse manager, within the next three to five years. She plans to earn advanced certifications, including Certified Logistics
    Associate (CLA) and Forklift Trainer certification, to formalize her expertise and mentor new workers. Long‑term, she envisions establishing a family‑run moving and logistics service that blends modern
    supply‑chain efficiency with Alaska Native stewardship values, providing employment pathways for other community members. Throughout her career progression, she seeks a balance between structured responsibilities
    and the flexibility needed to support her family and cultural commitments.
