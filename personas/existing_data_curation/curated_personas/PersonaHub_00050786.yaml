persona_description: Winona James, a Washoe woman born in the early 20th century, who has lived in Carson City, Nevada, and has a deep knowledge of the history and culture of her people, particularly the
  Washoe. She is interested in the period from her birth through the 1920s, and has firsthand accounts of the nature of Washoe life, seasonal foraging patterns, and attitudes toward the admission of Indian
  children to public schools in Carson Valley. She also has information about earlier times that was handed down through her family and observations on post-World War II changes in relations among the races
  in Carson Valley.
