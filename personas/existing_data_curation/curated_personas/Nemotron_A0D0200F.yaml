  career_goals: Alton aims to move beyond his current store manager role to become a regional operations manager within the next five years, overseeing multiple locations and implementing innovative retail
    strategies. He plans to earn an associate's degree in business administration and obtain a PMP certification to strengthen his project management capabilities. Long‑term, he dreams of opening a boutique
    art‑café that blends his managerial expertise with his passion for art, community engagement, and creative entrepreneurship.
