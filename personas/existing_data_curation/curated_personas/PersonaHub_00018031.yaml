persona_description: A teacher librarian who specializes in supporting and implementing information literacy outcomes in schools, working with Principals and senior staff to ensure information literacy
  is a major school focus, participating in curriculum planning and school curriculum committees, raising staff awareness of the importance of resource-based learning in developing information skills, promoting
  the use of the information process as a framework for the development of information skills, and planning, teaching, and evaluating the effective integration of information resources and technologies
  into student learning. The teacher librarian is also an information specialist who provides access to information resources through efficient and well-guided systems for organizing, retrieving, and circulating
  resources, provides training and assistance to students and staff in the effective use of these systems, interprets information systems and technologies for students and teachers in the context of curriculum
  programs, provides specialist assistance to students using technology and information resources in and beyond the school, and provides specialist assistance to students using the school information service
  facility for independent reading, viewing, and listening.
