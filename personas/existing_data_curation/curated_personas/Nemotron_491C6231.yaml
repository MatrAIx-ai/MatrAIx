personas:
  professional: Katherine Frank, a two-year-old who loves mimicking household chores at daycare, practices early organizational skills by arranging toy blocks into neat rows, and shows budding cooperativeness
    by sharing with peers while occasionally asserting their own preferences.
  sports: Katherine Frank, a two-year-old who enjoys toddler gymnastics classes at the local community center, splashes in a parent-co-guided swimming pool, cheers for the local community softball team
    at the park during family outings, and loves to chase bubbles in the backyard where they giggle loudly.
  arts: Katherine Frank, a two-year-old who adores watching Sesame Street and Disney’s Moana, imitates characters by drawing crayon pictures of sea turtles, sings the If You’re Happy and You Know It tune
    while clapping, and treasures their collection of Peppa Pig plushies.
  travel: Katherine Frank, a two-year-old who loves family road trips to Grandma’s house in the countryside, has visited the aquarium in San Diego, enjoys building sand castles on the beach at Myrtle Beach,
    and prefers short, stroller-friendly outings over long flights, where they often nap in the carrier.
  culinary: Katherine Frank, a two-year-old who prefers soft foods like mac-and-cheese, banana slices, and peanut-butter-and-jelly sandwiches, enjoys sprinkling shredded cheddar on everything, occasionally
    throws peas on the floor, and shows early interest in helping to butter toast under supervision, where they carefully spread butter with a small butter knife.
  core: Katherine Frank is a structured yet flexible two-year-old who thrives on routine, focuses on immediate play realities, enjoys solitary moments, asserts themselves when needed, and worries about
    new experiences.
background:
  cultural: 'Katherine’s family lives in Lorain, Ohio, a Midwestern city along Lake Erie with a historic working‑class heritage. Her upbringing reflects typical Midwestern values: close‑knit family ties,
    emphasis on routine and modest living, participation in community gatherings such as local fairs and church events, and a love of seasonal activities like lake‑shore walks in summer and snow play in
    winter. The household follows mainstream Anglo‑American customs, including Sunday family meals with familiar home‑cooked foods, and incorporates a sense of community hospitality and the comfort of predictable,
    structured daily life.'
