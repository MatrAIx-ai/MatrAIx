  career_goals: Marianne aims to elevate her role from a bookkeeping clerk to a senior accounting specialist within the next three years. She plans to earn the Certified Bookkeeper (CB) credential and complete
    an associate’s degree in accounting through night classes at a community college. By mastering cloud‑based accounting platforms and automation tools, she hopes to lead a small team that streamlines
    the company’s financial processes. Ultimately, she dreams of launching her own freelance bookkeeping practice, serving local family‑owned businesses, which would give her greater control over her schedule
    and the flexibility to balance work with family commitments.
