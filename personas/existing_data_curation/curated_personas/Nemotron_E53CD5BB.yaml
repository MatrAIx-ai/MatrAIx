  hobbies: '[''Street mural painting'', ''DIY Arduino electronics'', ''3D‑printed sculpture creation'', ''Skateboard and bicycle customization'', ''Community soccer league'', ''Salsa dancing'', ''Día de
    los Muertos altar building'', ''Experimental Mexican‑Californian cooking'', ''Acoustic guitar jam sessions'']'
  career_goals: Wilfredo aims to advance from floor-level fabrication to a supervisory and design‑lead role within the next five years, eventually launching his own boutique studio that merges industrial
    manufacturing with kinetic art installations. He plans to pursue an associate’s degree in manufacturing technology to deepen his CNC programming expertise, and he is exploring sustainable material initiatives,
    such as recycled‑plastic composites, to differentiate his future business. His long‑term ambition includes mentoring apprentices and contributing to community maker‑spaces in Orange County.
