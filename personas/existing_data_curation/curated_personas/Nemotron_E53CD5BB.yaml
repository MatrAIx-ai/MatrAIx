personas:
  professional: Wilfredo Suastegui, a 27‑year‑old fabrication specialist in Southern California, blends precision CNC milling, MIG/TIG welding, and SolidWorks design with vibrant street‑art sensibilities
    to prototype functional components and decorative kinetic sculptures, while they foster collaborative problem‑solving and community‑driven workshops.
  sports: Wilfredo Suastegui, a 27‑year‑old member of the Anaheim Aces soccer league, plays forward with a flair for quick passes, they follow the LA Galaxy and Los Angeles Chargers, they hit the beach
    volleyball courts in summer, and they cycle on their custom‑painted BMX bike through Orange County’s trails on weekends.
  arts: Wilfredo Suastegui channels his imagination into large‑scale murals that blend Día de los Muertos symbolism with multicultural street scenes, they strum acoustic guitar at after‑hours jam sessions
    inspired by Celia Cruz and Los Lobos, and they create kinetic sculptures using 3D‑printed parts, drawing influence from artists like Banksy and JR.
  travel: Wilfredo Suastegui loves road‑tripping the Pacific Coast Highway, they backpacked through Oaxaca’s colonial towns for artistic inspiration, they dream of wandering Lisbon’s tiled alleys and Tokyo’s
    neon districts, and they meticulously plan trips months ahead using a modest travel fund and Google Flights alerts.
  culinary: Wilfredo Suastegui reinvents classic tacos al pastor with avocado‑lime salsa and smoked paprika, they craft quinoa‑infused ceviche with cilantro and lime, they cook on a DIY outdoor grill they
    engineered themselves, they experiment with mole sauces featuring roasted almonds and ancho chilies, and they pair their dishes with locally brewed IPAs.
  core: Wilfredo Suastegui is a 27‑year‑old fabrication wizard who paints vibrant city walls, rides custom bikes, balances relentless creative hustle with occasional late‑night budgeting oversights, and
    they stay cool under pressure.
background:
  cultural: Wilfredo comes from a Mexican family that maintains strong ties to its roots while thriving in Southern California's vibrant Latino community. Bilingual in Spanish and English, he grew up celebrating
    traditional festivals like Día de los Muertos and Cinco de Mayo, incorporating their symbolism into his artistic pursuits. His upbringing emphasized the value of hard work, family cohesion, and communal
    gatherings, which influence his collaborative spirit at work and his commitment to community events in Orange County. He blends the craftsmanship traditions of Mexican artisans—such as metalwork and
    folk art—with contemporary American design, creating a unique cultural synthesis that informs both his professional and personal life.
