persona_description: A researcher who is interested in studying earthquake activity and monitoring seismic hazards in the Arctic region, specifically in the Fram Strait. This person is likely to be involved
  in the deployment of broadband Ocean Bottom Seismometers (OBS) in the area, and is looking for more knowledge on seismic hazards and temporal variation in earthquake activity that may be associated with
  long-term climatic changes. They are also interested in the experience gained from deploying OBS instruments in High Arctic areas and improving future OBS expeditions to the region that aim to improve
  the monitoring coverage and thereby allow for detecting smaller earthquakes.
