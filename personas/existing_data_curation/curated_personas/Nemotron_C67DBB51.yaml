personas:
  professional: An aspiring eSports competitor, Hunter Bosso channels their love of first‑person shooters and strategic planning into weekly streaming sessions, where their quick reflexes, methodical buildup
    of in‑game tactics, and competitive drive blend with a laid‑back attitude toward strict schedules.
  sports: An avid basketball player, Hunter Bosso spends afternoons at the Dalton Community Gym honing their jump shot while cheering for the Philadelphia 76ers and the local high‑school Eagles, and they
    also ride the skate park rails with friends on weekends, balancing structured practice with spontaneous street sessions.
  arts: A dedicated fan of classic rock and alternative music, Hunter Bosso fills their playlists with Led Zeppelin, The Rolling Stones, Arctic Monkeys, and Muse, often head‑banging while building redstone
    contraptions in Minecraft, and they occasionally attend the Scranton County Fair’s live band stage where local folk groups perform, intertwining music with their gaming world.
  travel: When planning a weekend getaway, Hunter Bosso prefers short road trips to nearby attractions—like the bustling streets of New York City for a gaming convention, the historic coal‑museum town of
    Scranton for a family reunion, or the dive bars of Pittsburgh for live rock shows—yet they dream of a future visit to Tokyo’s Akihabara district, balancing budget constraints with a thirst for immersive
    experiences.
  culinary: A self‑taught kitchen tinkerer, Hunter Bosso loves whipping up loaded pepperoni pizza slices, buttery garlic fries, and chicken wings tossed in a spicy buffalo sauce, often experimenting with
    extra jalapeños and smoked paprika while swapping stories over a classic cheeseburger and sweet potato fries at the local diner.
  core: Hunter Bosso is a competitive teen who treats every game, workout, and even grocery run as a strategic mission, balancing a pragmatic work ethic with a habit of leaving their room a chaotic battlefield
    of cables and unfinished projects.
background:
  cultural: Hunter was raised in Dalton, a small borough in Lackawanna County, Pennsylvania, within a working‑class, family‑oriented community that blends rural and suburban influences. His family background
    includes Irish and German ancestry, and modest religious traditions are observed during holidays. The region's legacy of coal mining and manufacturing has fostered a pragmatic, self‑reliant ethos, reflected
    in Hunter's preference for structure, hands‑on problem solving, and competitive pursuits.
