  career_goals: Hunter aspires to turn his mechanical curiosity into a career as an automotive technician or a skilled tradesperson, ideally working at a local garage or apprenticeship program in the Scranton‑Lackawanna
    area. He is also intrigued by the possibility of pursuing a future in competitive gaming or game design, aiming to combine his strategic thinking with his love for digital entertainment. In the short
    term, he plans to earn relevant certifications (such as a basic automotive repair certificate) while continuing to improve his gaming rankings.
