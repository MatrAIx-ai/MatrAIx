personas:
  professional: Darlene Norwood is a retired homemaker turned community food‑bank volunteer who leverages her meticulous budgeting, caregiving experience, and knack for organizing quilting contests, while
    her competitive edge and relaxed attitude toward formal obligations make her both a reliable planner and a happy‑go‑lucky problem‑solver.
  sports: Darlene Norwood enjoys cheering on the St. Louis Cardinals during baseball season, participates in weekly bridge games at the senior center that double as mental cardio, and maintains fitness
    through daily garden chores, showing a low‑key but loyal sports enthusiasm.
  arts: Darlene Norwood immerses herself in historic novels by Philippa Gregory, sings hymns by Mahalia Jackson in her church choir, and watches classic films starring Cary Grant and Greta Garbo, while
    her quilting patterns often draw inspiration from the geometric designs of Piet Mondrian.
  travel: Darlene Norwood prefers short, manageable trips, such as a yearly weekend getaway to Savannah’s historic district, a day trip to the Carolinas’ Blue Ridge Parkway, and a cherished family vacation
    to the Grand Canyon that combined sightseeing with quilting workshops, reflecting her love of structure, modest adventure, and family connection.
  culinary: Darlene Norwood specializes in Southern comfort dishes like fried chicken, collard greens, cornbread, and peach cobbler, but also experiments with quinoa‑based salads and rosemary‑infused roasted
    carrots sourced from her own garden, balancing tradition with a curiosity for new flavors.
  core: Darlene Norwood is a competitive, garden‑loving quilt‑enthusiast who blends pragmatic budgeting, modest health routines, and a love of classic arts into a structured yet flexible senior lifestyle.
background:
  cultural: Darlene grew up as part of the African‑American community in Shelbyville, a town shaped by the Great Migration and a strong church tradition. Her family’s roots trace back to the South, influencing
    her love of soul‑food cooking, storytelling, and handmade crafts like quilting, which have been passed down through generations. The local church has been a cultural hub, providing support, fellowship,
    and a venue for celebrating milestones. Throughout her life, the civil‑rights era and subsequent community activism have instilled in her a sense of resilience, self‑reliance, and a healthy skepticism
    that she carries into her daily interactions.
