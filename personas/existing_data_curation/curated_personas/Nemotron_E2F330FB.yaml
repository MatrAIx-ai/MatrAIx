  hobbies: '[''gardening'', ''quilting and knitting'', ''cooking soul‑food meals'', ''reading historical fiction'', ''church choir singing'', ''bridge with a small group'', ''birdwatching'', ''crossword
    puzzles'']'
  career_goals: Even though she’s no longer in the formal workforce, Darlene aims to finish her GED to set an example for her grandchildren, document her family history in a memoir, and win the annual Shelby
    County quilting contest, a friendly rivalry she enjoys. She also wants to stay physically active by expanding her garden plot, maintain independence by mastering video‑calling and email on her tablet,
    and continue volunteering in her church’s food‑bank program, where she can apply her cooking and budgeting expertise to help others.
