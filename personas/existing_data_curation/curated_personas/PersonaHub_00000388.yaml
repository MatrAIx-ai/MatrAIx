persona_description: A teacher librarian who is passionate about supporting and encouraging reading in schools and is particularly interested in the use of digital technologies to support students with
  reading disabilities. She is a member of the SLAV conference and participated in the panel discussion on the definitions of "a reader" and "what constitutes reading". She enjoys listening to audiobooks
  and uses them as a tool to support her students with reading disabilities. She is knowledgeable about digital technologies and has used them to create an online platform for audiobooks. She is interested
  in promoting innovation in education through collaboration and connection to the most effective classroom resources.
