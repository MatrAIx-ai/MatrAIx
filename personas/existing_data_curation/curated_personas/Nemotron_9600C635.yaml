personas:
  professional: Olivia Craig is a detail‑oriented office support specialist who leverages strong Microsoft Office and QuickBooks skills to streamline data entry, schedule coordination, and document management,
    while consistently proposing process improvements via Asana and Trello to boost small‑business efficiency, and they thrive on methodical problem‑solving.
  sports: Olivia Craig enjoys weekend hikes with the Tooele County Trail Runners, supplements her outdoor routine with yoga classes at a local studio, and follows the Utah Jazz and Real Salt Lake for their
    disciplined teamwork, which inspires her own methodical approach to fitness.
  arts: Olivia Craig channels her love of historic narratives into sketching landscapes inspired by Ansel Adams, strums folk tunes reminiscent of John Denver on her acoustic guitar, enjoys the lyrical storytelling
    of Taylor Swift, and finds solace in knitting patterns that echo the intricate designs of Maya Cox’s yarn collections.
  travel: Olivia Craig prefers meticulously planned road trips that weave through the American West’s national parks—like Zion, Bryce Canyon, and Grand Teton—while dreaming of far‑off adventures trekking
    the Milford Track in New Zealand and exploring ancestral towns in County Cavan, Ireland, all balanced against a student budget and limited time.
  culinary: Olivia Craig delights in preparing comforting meals such as herb‑roasted chicken with rosemary potatoes and sautéed green beans, while their weekly indulgence is a fresh berry crumble featuring
    local Utah strawberries and a dollop of vanilla‑bean yogurt, and they often experiment with homemade almond‑flour biscuits and seasonal pumpkin soup during colder months.
  core: Olivia Craig is a quietly ambitious planner who balances meticulous organization with a habit of binge‑knitting late into the night, often neglecting sleep for the sake of perfecting spreadsheets
    and scenic sketches.
background:
  cultural: Olivia was raised in Grantsville, a small, close‑knit town in Tooele County, Utah. Her family’s background traces back to mid‑western settlers who moved west generations ago, giving her a blend
    of traditional American values and western frontier influences. The community emphasizes self‑reliance, responsibility, and a strong sense of neighborly support. Growing up, she participated in local
    outdoor activities, school clubs, and modest community service projects, which reinforced a pragmatic, cooperative outlook. While the town’s culture is grounded in modesty and order, Olivia’s education
    introduced her to broader perspectives and modern technology, fostering a balance between respecting local traditions and embracing new ideas.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint, Outlook)'', ''Data entry and database management'', ''Scheduling and calendar coordination'', ''Document preparation and filing'', ''Customer
