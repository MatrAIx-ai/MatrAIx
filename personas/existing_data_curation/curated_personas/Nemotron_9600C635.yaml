    improvement'', ''Project management tools (Asana, Trello)'']'
  hobbies: '[''Reading (historical biographies, self-improvement)'', ''Hiking and nature photography'', ''Journaling and reflective writing'', ''Knitting and crocheting'', ''Puzzle solving (crosswords,
    Sudoku)'', ''Acoustic guitar'', ''Volunteer work at local library'', ''Genealogy research'', ''Organizing small community events'']'
  career_goals: Olivia aims to build on her associate degree by completing a bachelor’s program in business administration while working full‑time in an office support role. She plans to earn a Certified
    Administrative Professional (CAP) credential and eventually move into an office‑manager or administrative‑team‑lead position within the next three to five years. In this role, she hopes to lead a small
    team, implement efficiency initiatives, and mentor new staff. Long‑term, Olivia is interested in developing expertise in process optimization for small businesses and may launch a consulting service
    that helps local enterprises improve their administrative operations. While she values staying close to her community in Tooele County, she is open to relocating for opportunities that align with her
    professional growth.
