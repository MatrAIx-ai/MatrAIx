  hobbies: '[''Painting (acrylic)'',''Sketching'',''Visiting art galleries'',''Attending Ocala Arts Festival'',''Reading art history and philosophy books'',''Gardening'',''Birdwatching'',''Participating
    in a small book club'',''Volunteering at community art center'',''Exploring new creative workshops'']'
  career_goals: Looking ahead, Josephine aims to build on her caregiving foundation by earning a Licensed Practical Nurse (LPN) credential within the next two years, followed by a Bachelor of Science in
    Nursing (BSN) to become a registered nurse. She is particularly interested in geriatric nursing and hopes to specialize in holistic care that integrates art therapy and creative expression. In the medium
    term, she envisions taking on a supervisory role as a lead care coordinator at a home‑health agency, where she can mentor new aides and develop training modules that emphasize both clinical competence
    and patient‑centered creativity. Long‑term, she aspires to launch her own community‑focused home‑care service that partners with local art centers to provide enrichment programs for seniors, thereby
    combining her clinical expertise with her passion for the arts.
