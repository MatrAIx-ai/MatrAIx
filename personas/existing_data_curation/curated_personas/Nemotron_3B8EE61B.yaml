  hobbies: '["Reading picture books about nature, dinosaurs, and space", "Drawing and coloring cartoons and landscapes", "Building LEGO cities and simple block creations", "Exploring backyard and local
    parks to watch birds, collect leaves, and observe insects", "Playing educational tablet puzzles and introductory coding games", "Participating in small‑group classroom games like \"Simon Says\"", "Riding
    a bike with a parent", "Helping with simple cooking projects"]'
  career_goals: Christian dreams of becoming a young scientist‑inventor who explores the natural world and creates simple solutions to everyday problems. He is fascinated by the rivers and forests around
    Hastings and imagines one day working as a wildlife biologist or environmental engineer, designing experiments that protect local ecosystems. At the same time, his love for building with LEGO and using
    educational apps fuels an ambition to learn computer programming and perhaps design games that teach other kids about nature and science. His career vision blends curiosity, practicality, and a desire
    to contribute calmly and responsibly to his community.
