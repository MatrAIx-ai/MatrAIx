personas:
  professional: A budding teen developer, Hannah Williams channels their love for structure and problem‑solving into simple coding projects, using Python to create interactive stories while balancing school
    responsibilities with meticulous journal‑keeping.
  sports: Hannah Williams enjoys low‑key outdoor activity, joining a small hiking club that tackles the Cascades on weekends and occasionally runs with their high school’s cross‑country team, cheering quietly
    for the Seattle Sounders FC while preferring the solitude of nature over bustling stadiums.
  arts: An introspective digital artist, Hannah Williams crafts whimsical Canva collages inspired by the ethereal brushwork of Yayoi Kusama and the lyrical storytelling of contemporary author Sarah J. Maas,
    while they sketch fantasy scenes in a pocket notebook during library volunteer shifts.
  travel: Hannah Williams prefers tranquil escapes, spending school breaks exploring the misty trails of Olympic National Park and dreaming of a solo trip to Kyoto’s zen gardens, where they can combine
    their love of nature with quiet cultural immersion while staying within a modest teen travel budget.
  culinary: A minimalist home chef, Hannah Williams delights in preparing avocado toast with toasted sourdough, cherry tomatoes, and a drizzle of olive oil, occasionally experimenting with homemade ramen
    broth seasoned with miso and ginger, and they relish sipping chamomile tea while journaling their culinary experiments.
  core: Hannah Williams is a structured, solitary teen who balances quiet creativity with a penchant for careful planning, yet wrestles with lingering worry that fuels both their meticulous habits and occasional
    over‑thinking.
background:
  cultural: Hannah comes from a White, European‑American family that has lived in the suburbs of Issaquah, Washington for several generations. Her upbringing reflects typical Pacific Northwest values, emphasizing
    outdoor recreation, environmental awareness, and a pragmatic work ethic. The family celebrates common American holidays such as Thanksgiving, Christmas, and Independence Day, often incorporating local
    traditions like autumn hikes and community potlucks. Growing up near Seattle, Hannah is exposed to both the tech‑driven culture of the region and a community that values education and civic involvement,
    shaping her balanced outlook of practical ambition and personal compassion.
attributes:
  skills: '[''Organizational & time‑management'', ''Middle‑school math and science proficiency'', ''Digital productivity tools (Google Workspace, Microsoft Office)'', ''Basic programming (Python, Scratch)'',
