  hobbies: '[''Journaling'', ''Reading contemporary fiction and fantasy'', ''Sketching and digital illustration'', ''Hiking in small groups'', ''Basic coding projects (Python, Scratch)'', ''Puzzle video
    games'', ''Volunteering at the community library'']'
  career_goals: Hannah aims to graduate high school with honors and earn a scholarship to study psychology and computer science at a university such as the University of Washington. She wants to combine
    her interest in mental health—driven by her own experiences with worry and stress—with her technical skills to develop user‑friendly digital tools that support emotional well‑being. In the long term,
    she aspires to become a licensed mental‑health therapist or a UX designer for mental‑health applications, blending compassion with structured, evidence‑based practice.
