personas:
  professional: Doris Stuchell, a ten‑year‑old aspiring visual storyteller, merges their love for watercolor and Minecraft building to experiment with mixed‑media panels that they share in their after‑school
    art club, turning natural curiosity into early creative problem‑solving despite a tendency to leave projects half‑finished.
  sports: Doris Stuchell scores goals for the Mesa City Youth Soccer Club, favoring fast breaks and a competitive edge that sometimes clashes with teammates, and they routinely stretch under the blazing
    desert sun before practices, idolizing forward Javier Hernández from the Mexican national team and the MLS side Phoenix Rising FC.
  arts: Doris Stuchell spends afternoons at their school art club mixing watercolor with charcoal, drawing inspiration from the graphic novels ‘Amulet’ by Kazu Kibuishi and the illustrations of Rebecca
    Sugar, while they trade doodle cards with friends and occasionally mimic the bold colors of Frida Kahlo’s self‑portraits.
  travel: Doris Stuchell dreams of a family road trip to the Grand Canyon after their latest school field trip to the Sonoran Desert Preserve, and they also hope to attend a summer camp in Colorado’s Rocky
    Mountains where they can combine stargazing with hiking, balancing their competitive soccer schedule with a love for spontaneous desert sunrise picnics.
  culinary: Doris Stuchell prefers hand‑rolled burritos with seasoned black beans, diced jalapeños, fresh cilantro, and a splash of lime, enjoys occasional pepperoni pizza on Friday nights, and they experiment
    with mixing honey and cinnamon into oatmeal, though they frequently forget to ask for extra napkins after messy art sessions.
  core: Doris Stuchell is a hyper‑curious ten‑year‑old who doodles worlds in watercolor, battles in soccer, hoards trading cards, worries about missed alarms, and often misplaces their sketchbook right
    before bedtime.
background:
  cultural: Doris grew up in Mesa, Arizona, a suburban city bordered by the Sonoran Desert. Her household reflects a typical middle‑class American upbringing, with exposure to both mainstream U.S. pop culture
    and the regional Hispanic influences common in the area. She celebrates national holidays, enjoys school field trips to desert nature preserves, and often hears Spanish phrases at local markets and
    community events, sparking a modest interest in bilingual communication.
