  career_goals: She envisions a future where she can blend art and problem solving—maybe as an illustrator for science books, a video‑game designer, or an architect who creates playful spaces. Her love
    of animals also hints at a possible path as a wildlife veterinarian or a conservation educator. She aspires to be recognized for creative solutions while enjoying a flexible, supportive work environment.
