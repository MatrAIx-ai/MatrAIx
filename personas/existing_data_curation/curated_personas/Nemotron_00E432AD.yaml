  career_goals: Diego aims to double the market share of his company across the southern region of Puerto Rico within the next five years while integrating digital tools such as ERP systems to streamline
    operations and improve data visibility. He is committed to embedding sustainability into the business model, reducing waste, and sourcing locally produced materials. A key ambition is to mentor emerging
    entrepreneurs from Juana Díaz, establishing a formal apprenticeship program that pairs experienced staff with local youth. He also plans to pursue an executive certification, such as an MBA or a certificate
    in Business Leadership, to complement his practical expertise. Long‑term, Diego envisions a smooth succession plan that positions his spouse or a trusted senior manager to lead, ensuring the business
    remains a pillar of the community.
