personas:
  professional: An aspiring junior robotics engineer, Paul Daniel channels their sci‑fi‑infused imagination and hands‑on practicality into the school robotics club, crafting intricate LEGO‑based prototypes
    while they often neglect meticulous documentation in favor of spontaneous experimentation.
  sports: A low‑key participant in the neighborhood youth soccer league, Paul Daniel plays as a defender for the Midtown Strikers U11 during the spring season, yet they find more joy in solo bike rides
    along the river trail and weekend hikes for rock‑collecting that double as informal fitness sessions.
  arts: A budding visual storyteller, Paul Daniel fills sketchbooks with delicate nature studies inspired by Winslow Homer's watercolors and they listen to the orchestral scores of John Williams while building
    LEGO, often losing themselves in the imaginative worlds of Isaac Asimov and Hayao Miyazaki on family movie nights.
  travel: A curiosity‑driven explorer, Paul Daniel frequently plans weekend trips to Greenwood State Park for rock‑hunting and bug‑watching, while they daydream about future adventures to the Grand Canyon
    and a science‑focused museum tour in Washington, D.C., balancing school commitments and a modest family travel budget.
  culinary: A budding but sometimes picky eater, Paul Daniel loves crafting homemade macaroni‑and‑cheese with sharp cheddar, paprika, and a sprinkle of breadcrumbs, and they occasionally whisk chocolate
    chip cookies using butter, brown sugar, and vanilla, yet they often push broccoli off their plate in favor of plain apple slices.
  core: Paul Daniel is an introspective 11‑year‑old who blends a love for solitary LEGO inventions and nature sketches with a compassionate heart for shelter animals, all while wrestling with bouts of worry
    and a habit of misplacing their tools, and they often turn to journaling for calm.
background:
  cultural: Paul was raised in a middle‑class white family in Omaha, Nebraska, where Midwestern values of modesty, community responsibility, and practicality are prominent. His parents emphasize kindness,
    cooperation, and a strong work ethic, encouraging involvement in local activities like the Omaha Children’s Museum programs and the 4‑H club. The city’s blend of urban and prairie environments exposes
    him to a mix of cultural events and outdoor recreation, shaping his appreciation for both established traditions and new ideas.
