  hobbies: '[''Reading sci‑fi and adventure novels'', ''Building LEGO sets'', ''Exploring local parks and nature trails'', ''Sketching and drawing'', ''Playing strategy board games with a few friends'',
    ''Participating in school robotics club'', ''Journaling to manage stress'', ''Volunteering at an animal shelter'']'
  career_goals: He dreams of a future where he can turn his curiosity into practical inventions, hoping to become a mechanical or civil engineer who designs safe, user‑friendly structures for his community.
    He also envisions leading a school robotics club and eventually creating simple tech tools that help fellow students stay organized, balancing his love for innovation with his wish to support others.
    In the long term, he wants a career that lets him solve real‑world problems while staying connected to people and the environment.
