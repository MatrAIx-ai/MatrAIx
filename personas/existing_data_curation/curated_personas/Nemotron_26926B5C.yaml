  career_goals: Dianelys aims to advance to a senior operations research analyst role where she can lead a team that designs data‑driven solutions for community health and social service agencies, especially
    those serving Mexican‑American populations. She aspires to earn a professional certification in analytics (e.g., INFORMS Certified Analytics Professional) and eventually complete a bachelor’s degree
    in operations research or applied mathematics. Her long‑term ambition is to mentor individuals from under‑represented backgrounds who have limited formal education, helping them develop technical skills
    and achieve stable, rewarding careers. She also hopes to publish case studies that demonstrate how OR can create tangible social impact while maintaining a healthy work‑life balance.
