  hobbies: '[''Visiting local art galleries and museums'', ''Reading historical fiction and poetry'', ''Watercolor painting'', ''Cooking traditional New Mexican cuisine'', ''Gardening'', ''Collecting folk
    art and ceramics'', ''Participating in a small book circle'', ''Genealogy research'', ''Walking nature trails in Santa Fe'']'
  career_goals: Although retired, Blanca aspires to continue contributing to her community by documenting the oral histories of Santa Fe's older Hispanic residents and publishing a collection of those narratives.
    She hopes to lead a small, informal art appreciation workshop at the local senior center, sharing her curiosity for unconventional artistic perspectives with a close-knit group. Additionally, she aims
    to finish a memoir that reflects on her life’s experiences, blending personal reflections with cultural observations, and to secure a modest grant that supports intergenerational art projects in Santa
    Fe.
