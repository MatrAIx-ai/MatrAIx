persona_description: A civic educator and advocate for public education, Sharon Iorio is a professor and dean emerita at Wichita State University College of Education. She is known for her expertise in
  civic education and has developed programs such as "iCivics" to teach citizenship skills to students. Iorio emphasizes the importance of civic responsibility and the development of responsible citizens
  in public schools, and advocates for the expansion of civic education in schools. She is a vocal advocate for public education and the need for schools to play a significant role in shaping the future
  of the nation.
