  hobbies: '["abstract watercolor painting","reading philosophy and poetry","birdwatching","organic gardening","knitting and quilting","attending local craft fairs","crossword puzzles"]'
  career_goals: Although retired from formal employment, Janie is driven to share her lifelong passions with her community. She aims to compile a memoir that intertwines her personal history with the heritage
    of Albion, create a modest exhibition of her abstract works at the local historical society, mentor a small group of teenagers in a seasonal art workshop, and deepen her competence in digital archiving
    to preserve family and community records for future generations.
