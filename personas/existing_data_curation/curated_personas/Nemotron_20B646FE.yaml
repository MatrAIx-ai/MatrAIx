personas:
  professional: Jarelis Garcia is a methodical industrial machinery mechanic who excels at preventive maintenance, CNC programming, and precision welding, bringing an organized, reliable approach to keeping
    production lines humming while mentoring colleagues through clear, step‑by‑step troubleshooting.
  sports: Jarelis Garcia plays for the San Juan Eagles basketball league at the community center, tunes remote‑control race cars with the local RC Club, and hikes the trails of El Yunque rainforest on weekends
    for solo endurance.
  arts: Jarelis Garcia enjoys listening to salsa legends like Héctor Lavoe, streaming reggaeton hits from Bad Bunny, and attending live performances at the San Juan Cultural Center, finding rhythm in both
    music and the hum of machinery.
  travel: Jarelis Garcia prefers road trips along the island’s scenic coastal highways, has explored the historic streets of Old San Juan, dreams of a hiking expedition in Costa Rica’s rainforests, and
    occasionally joins group tours to neighboring Caribbean islands.
  culinary: Jarelis Garcia cooks traditional island dishes such as mofongo and arroz con gandules, fine‑tuning recipes with plantains, pork rinds, and sofrito, while also grilling fresh fish caught on weekend
    trips and experimenting with adobo‑marinated vegetables.
  core: Jarelis Garcia blends a meticulous, structured work ethic with a hands‑on hobbyist spirit, balancing community workshops, solo tinkering, and family‑rooted cooking while keeping a tight budget and
    a pragmatic outlook on health.
background:
  cultural: 'Jarelis was born and raised in Bayamón, a vibrant municipality in Puerto Rico known for its close‑knit neighborhoods and strong family values. Growing up in a bilingual Spanish‑English household,
    he absorbed the island''s rich cultural tapestry: the rhythms of salsa, plena, and reggaetón; the flavors of island cuisine; and the communal spirit of local festivals such as the Fiestas de San Juan
    Bautista. His upbringing emphasized respect for elders, hard work, and cooperation, shaping his dependable and considerate nature. While his career has taken him into the industrial sector, he remains
    deeply connected to Puerto Rican traditions, regularly attending family gatherings, participating in community events, and maintaining a strong sense of cultural pride.'
attributes:
  skills: '["Preventive maintenance", "Hydraulic system repair", "Pneumatic system troubleshooting", "MIG/TIG welding", "CNC machine operation and programming", "Blueprint reading", "Refractory furnace
    maintenance", "Electrical diagnostics", "OSHA safety compliance", "Inventory management"]'
  hobbies: '["RC car building and racing", "Motorcycle restoration", "Basketball", "Cooking Puerto Rican cuisine", "Hiking in El Yunque", "Fishing", "Community volunteering (mechanics workshops)", "Documentary
    watching (engineering topics)", "Collecting vintage tools"]'
  career_goals: Jarelis aims to become a senior maintenance supervisor within the next five years, overseeing a team of mechanics at a major manufacturing plant in the San Juan metropolitan area. He plans
    to earn certifications such as the Certified Maintenance & Reliability Technician (CMRT) and an advanced welding credential, and to enroll in an associate's degree program in industrial technology to
    supplement his hands‑on experience. Long‑term, he is interested in spearheading predictive maintenance initiatives using IoT sensors, and eventually establishing his own consultancy that helps small
    Puerto Rican factories improve equipment reliability while mentoring younger apprentices.
