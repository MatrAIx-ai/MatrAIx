  hobbies: '["Photography", "Watercolor painting", "Visiting art galleries", "Listening to jazz and Latin music", "Cooking Salvadoran cuisine", "Reading historical fiction", "Travel memoirs", "Hiking coastal
    trails", "Gardening native plants", "Volunteering at community cultural events"]'
  career_goals: Julio aims to transform his guide service into a boutique cultural‑heritage company that offers senior‑friendly and Salvadoran‑focused tours of Los Angeles, blending art walks, culinary
    experiences, and personal narratives. Over the next five years, he plans to write and publish a guidebook highlighting the contributions of the Salvadoran diaspora to the Southern California landscape.
    He also intends to train a small team of guides, develop community workshops on cultural storytelling for schools, and eventually shift into a consulting role for tourism boards, allowing him more flexibility
    to pursue personal passions while continuing to share his love of art and new ideas.
