personas:
  professional: Julio Mijares, a seasoned tour and travel guide with over three decades of experience in the Long Beach and greater Los Angeles area, blends a business degree with encyclopedic knowledge
    of Southern California history, art, and architecture, and their relaxed yet adaptable planning style lets them craft fluid itineraries that showcase hidden community gems while mentoring junior guides
    and handling logistics with a storyteller’s flair.
  sports: Julio Mijares enjoys hiking coastal trails such as the El Matador State Beach path and attends Los Angeles Dodgers games at Dodger Stadium, while they occasionally join a senior walking club that
    meets twice a week and dabble in light beach volleyball on sunny afternoons.
  arts: Julio Mijares regularly visits the Museum of Contemporary Art and the Watts Towers, captures street murals by artists like Shepard Fairey on camera, and they indulge in live jazz performances featuring
    John Coltrane tributes and vibrant Latin jazz ensembles at local clubs.
  travel: Julio Mijares prefers relaxed, self-guided road trips along the Pacific Coast Highway, has explored Santa Barbara’s historic mission, dreamt of strolling the cobblestone streets of San Miguel
    de Allende, and they plan itineraries with loose structures that allow spontaneous detours to off-beat galleries and coastal lookouts.
  culinary: Julio Mijares delights in hand-making pupusas filled with cheese and refried beans, frying crisp yuca frita, seasoning dishes with fresh cilantro and achiote, and they often experiment with
    fish tacos topped with mango salsa at home while occasionally treating friends to a sunset dinner of grilled corn and avocado.
  core: Julio Mijares blends a curious, arts-focused spirit with a relaxed, sometimes disorganized approach, turning history into stories, cooking traditional dishes, and mentoring others while juggling
    modest finances and occasional health aches.
background:
  cultural: Born in San Salvador, Julio moved to the United States with his family at age 12 and grew up in a vibrant Salvadoran community in Los Angeles County. Family gatherings, religious celebrations
    such as Las Posadas, and traditional music like cumbia and marimba shaped his early years. The Salvadoran values of hospitality, collectivism, respect for elders, and strong family ties remain central
    to his identity. He maintains fluency in Spanish, close connections with relatives in El Salvador, and regularly incorporates Salvadoran folklore, cuisine, and rhythms into his tours, bridging his heritage
    with the multicultural tapestry of Southern California.
attributes:
  skills: '["Spanish language fluency", "English language proficiency", "In-depth knowledge of Southern California history and art", "Storytelling and public speaking", "Customer service", "Flexible tour
