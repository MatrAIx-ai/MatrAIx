persona_description: A PCB layout designer who specializes in the optimization of PCB ground plane layouts for RF and power amplifiers. They have extensive experience with WLAN board design and understand
  the importance of avoiding cross-interference and providing real grounding for RF signals. They are skilled at routing signal ground returns to the solid ground plane in the shortest path possible and
  have a keen understanding of the effects of vias on ground plane layout and decoupling capacitors. They are also aware of the challenges of PLL implementation and the importance of good grounding separation
  for satisfactory spur level performance.
