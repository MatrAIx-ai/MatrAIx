persona_description: A healthcare professional with expertise in diagnosing and managing intellectual disability. This person is likely to be a psychologist or a physician who has specialized knowledge
  in the field of psychology and psychiatry. They have a deep understanding of the causes of intellectual disability, including the types of risk factors and the timing of exposure to those factors. They
  are skilled in using measures of intellectual functioning and adaptive behavior to diagnose intellectual disability and have a comprehensive understanding of the sources of information and support for
  people with intellectual disability and their families.
