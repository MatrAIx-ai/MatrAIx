personas:
  professional: Betty Norris, they are a retired elementary educator with over four decades of curriculum development and classroom management expertise, using their methodical, storytelling approach to
    mentor new teachers, coordinate community oral‑history projects, and launch an intergenerational art workshop at the local senior center.
  sports: Betty Norris, they enjoy gentle morning walks in the city park, cheer for the Richmond Kickers soccer team, attend high school football games with grandchildren, and keep mentally sharp through
    a weekly bridge game and a seasonal bocce league.
  arts: Betty Norris, they frequent the Virginia Museum of Fine Arts to study works by Winslow Homer and contemporary photographer Amy Sherald, listen to Miles Davis and Mahalia Jackson, read poetry by
    Langston Hughes and Maya Angelou, and channel creative energy into knitting and vintage quilting patterns discovered in old magazines.
  travel: Betty Norris, they travel by train to Washington, D.C., for museum days, enjoy annual jazz festivals in New Orleans, take weekend road trips to historic Savannah, and dream of a guided tour of
    civil‑rights landmarks in Birmingham, though mobility limits longer voyages.
  culinary: Betty Norris, they savor home‑cooked collard greens flavored with smoked turkey, crisp fried chicken for Sunday gatherings, and their signature peach cobbler baked with a hint of cinnamon, while
    perfecting a sweet tea that includes a splash of bourbon for special occasions.
  core: Betty Norris, they blend a lifetime of quiet curiosity, disciplined organization, and a love for storytelling into a gentle yet assertive presence, occasionally indulging in nostalgic sweets and
    forgetting to take a daily vitamin.
background:
  cultural: Betty was born in 1931 in Richmond, Virginia, to a family rooted in the African‑American community of Church Hill. Growing up during segregation, she witnessed the civil‑rights movement first‑hand
    and participated in local voter‑registration drives in the 1960s. Her family traditions blend Southern hospitality with the rich oral storytelling and musical heritage of black Virginia, including church
    gospel choirs, family cookouts featuring dishes like collard greens and fried chicken, and annual celebrations of Juneteenth. She attended a historically black college for her teaching degree, which
    reinforced her commitment to education as a tool for empowerment. Throughout her life, Betty has remained connected to her church, local cultural festivals, and community organizations that preserve
    African‑American history in Richmond.
