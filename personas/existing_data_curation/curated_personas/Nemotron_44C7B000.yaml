  career_goals: Although retired, Betty aims to preserve her personal and community legacy. She plans to document her family's and Richmond’s African‑American history through a series of oral‑history recordings,
    mentor at least two emerging teachers through a local partnership with the public schools, help launch an intergenerational art workshop at the senior center, and compile her memoir for the Richmond
    Historical Society. She also aspires to maintain her health and independence while staying intellectually active and engaged with the community.
