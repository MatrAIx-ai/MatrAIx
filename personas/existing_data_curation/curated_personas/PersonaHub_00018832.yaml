persona_description: A neuroscientist and researcher who specializes in understanding the complex neurologic underpinnings of dyslexia and the brain pathways involved in reading. Her research focuses on
  noninvasive scanning techniques to map the brain activity during reading attempts, particularly in dyslexic children. Her studies aim to validate theories about the normal development of reading skills
  and to determine the effectiveness of various reading interventions on dyslexic children.
