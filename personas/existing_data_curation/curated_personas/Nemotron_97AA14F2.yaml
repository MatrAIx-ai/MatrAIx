personas:
  professional: Hazel Eaton, a retired home manager turned senior‑center craft coordinator, leverages their decades‑long budgeting, meal‑planning, and textile‑craft expertise to design orderly quilting
    workshops that run like well‑kept kitchen schedules, while they ensure participants feel comfortable in the small, familiar groups.
  sports: Hazel Eaton enjoys low‑impact fitness through daily garden walks and a weekly stroll with the Golden Years Walking Club while cheering on the Cincinnati Reds in spring and the Bengals in fall,
    and they also indulge in occasional shuffleboard games at the senior center.
  arts: Hazel Eaton spends quiet evenings listening to Dolly Parton's storytelling lyrics, Frank Sinatra's crooning standards, and watching classic films starring John Wayne, letting those melodic and visual
    cues shape the color palettes of their quilting and knitting projects.
  travel: Hazel Eaton plans low‑stress road trips with a detailed itinerary, favoring familiar comforts like the Bed & Breakfast inn in Asheville, the scenic drives through Shenandoah National Park, and
    an annual pilgrimage to Nashville’s Country Music Hall of Fame, while they dream of a gentle river cruise down the Mississippi.
  culinary: Hazel Eaton delights in cooking classic Southern‑Midwest meals such as chicken‑and‑dumplings, cornbread, and homemade apple pie, using garden‑grown tomatoes, fresh basil, and heirloom beans,
    while their modest kitchen rituals balance precise measurement with a pinch of nostalgic improvisation.
  core: Hazel Eaton is a routine‑loving, quietly generous senior who meticulously plans every stitch and meal, yet habitually forgets to water the garden during sudden rainstorms, a quirk that adds spontaneous
    delight to their otherwise orderly life.
background:
  cultural: Hazel grew up in a middle‑class white family in the Midwest before moving to Northern Kentucky, where she has lived most of her adult life. She was raised in a Protestant tradition, attending
    a Southern Baptist congregation that emphasizes community, service, and modest living. The cultural blend of Appalachian hospitality and Midwestern practicality in Kenton County has reinforced her values
    of routine, self‑reliance, and neighborly support. Local customs such as church potlucks, county fairs, and seasonal gardening shape her lifestyle, and she cherishes the heritage of home‑cooked meals,
    hand‑crafts, and strong family ties.
attributes:
  skills: '[''Home management'', ''Budgeting and bookkeeping'', ''Meal planning and cooking'', ''Knitting and quilting'', ''Gardening'', ''Volunteer coordination'', ''Basic computer skills (email, online
