  hobbies: '[''Knitting'', ''Quilting'', ''Gardening'', ''Cooking traditional Southern recipes'', ''Reading historical fiction'', ''Church attendance and small group bible study'', ''Bridge (card game)
    at senior center'', ''Birdwatching'', ''Nature walks'', ''Listening to classic country and oldies music'']'
  career_goals: Although retired, Hazel aims to deepen her involvement in community service by leading a senior‑center craft program and supporting her church’s outreach efforts. She wants to preserve family
    recipes and pass her knitting and quilting techniques to younger relatives. Hazel also hopes to stay physically active through regular walks and gardening, and she plans to learn digital photography
    to document family gatherings. Her ambitions are centered on maintaining a stable, harmonious home life, fostering strong family bonds, and contributing modestly to her neighborhood.
