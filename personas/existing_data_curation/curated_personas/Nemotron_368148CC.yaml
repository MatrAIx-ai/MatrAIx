  career_goals: Kevin aims to move up from first-line supervisor to production manager within the next three to five years, eventually targeting a plant manager role. He plans to earn a Six Sigma Green
    Belt and pursue an associate’s degree in industrial technology to deepen his technical knowledge. His long-term ambition is to lead continuous-improvement projects that boost efficiency, reduce waste,
    and improve worker safety. He also hopes to develop stronger organizational habits to better manage stress and to one day mentor other supervisors. In the longer term, Kevin is interested in exploring
    entrepreneurship in small-scale manufacturing or a consulting practice focused on lean operations.
