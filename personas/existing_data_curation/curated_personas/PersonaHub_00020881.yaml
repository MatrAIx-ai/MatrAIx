persona_description: A veterinarian who specializes in the diagnosis and management of genetic diseases in dogs, particularly in understanding and treating congenital defects. They are knowledgeable in
  genetic testing, mating based on phenotype, and the identification of genetic diseases in dogs. They are interested in understanding the underlying genetic mechanisms of these diseases and developing
  effective treatment plans for their patients. They are also interested in studying the impact of these diseases on the breed and the potential for breeding practices to be modified to reduce the incidence
  of these defects.
