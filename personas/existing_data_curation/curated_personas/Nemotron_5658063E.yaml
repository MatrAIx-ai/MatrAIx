  career_goals: Armando imagines a future where he can explore both the skies and the earth. He dreams of becoming an astronaut who studies space while also helping protect wildlife as a researcher. He
    is fascinated by how things work, so designing simple machines or gadgets that assist his community appeals to his practical side. He also enjoys cooking with his family and can envision sharing traditional
    Mexican recipes as a chef, blending his curiosity for discovery with a love for cultural heritage.
