personas:
  professional: Armando Roldanrodriguez, a budding junior explorer who channels his curiosity about space and practical problem‑solving into leading after‑school LEGO rocket builds and sketching expedition
    maps for his friends, exemplifies a balance of organization and flexibility while being cooperative yet assertively guiding group play.
  sports: Armando Roldanrodriguez, a lively member of the Little Strikers Soccer Club, spends afternoons dribbling and scoring goals on the community field while idolizing FC Barcelona’s attacking style
    and cheering for the local professional team the River City Rangers during weekend matches.
  arts: Armando Roldanrodriguez, a budding cartoonist who sketches whimsical rockets and jungle animals between homework, spends evenings dancing to the upbeat traditional folk rhythms of the duo The River
    Songwrights and enjoys listening to storytelling songs by folk legend Sara Moon, letting music inspire his vivid drawings.
  travel: Armando Roldanrodriguez, who loves weekend adventures, frequently explores the nearby Riverside Park to hunt insects and collect leaves, dreams of a school field trip to the Kennedy Space Center
    to see real rockets, and hopes to someday visit the grand canyons of Patagonia with his family, balancing his excitement with the reality of modest family travel budgets.
  culinary: Armando Roldanrodriguez, an enthusiastic kitchen helper, eagerly assists his grandmother in preparing crispy fish tacos with corn tortillas, fresh cilantro, and lime, while experimenting with
    bright mango salsa and homemade guacamole seasoned with jalapeño and garlic, often tasting the sauce with a playful grin before it’s served.
  core: Armando Roldanrodriguez, a curious seven‑year‑old who balances meticulous LEGO engineering with spontaneous soccer play, daydreams of rockets while dancing to folk beats, and occasionally forgets
    his homework in a burst of insect‑collecting excitement.
background:
  cultural: Armando is raised in a Mexican‑American household in Greenwood, Indiana. At home, Spanish is spoken alongside English, and family gatherings often feature traditional dishes like pozole and
    tamales. He participates in cultural celebrations such as Día de los Muertos and Cinco de Mayo, and his family values respect for elders, communal support, and a strong sense of identity. The local
    Hispanic cultural center provides a space for language classes and community events, reinforcing his connection to Mexican heritage while he grows up in the Midwestern United States.
