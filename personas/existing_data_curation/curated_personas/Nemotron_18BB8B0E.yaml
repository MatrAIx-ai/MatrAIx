  career_goals: As he approaches traditional retirement age, Dylan aims to transition into a senior advisory role that allows him to continue serving high‑net‑worth clients while reducing the day‑to‑day
    sales pressure. He plans to develop a boutique wealth‑management practice focused on retirement planning for the Woodridge community, leveraging his deep market knowledge to provide personalized strategies.
    Additionally, he aspires to lead a compliance and mentorship program within his firm, sharing his structured, process‑driven expertise with the next generation of sales agents.
