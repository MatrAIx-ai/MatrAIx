personas:
  professional: Dylan Devries, a seasoned securities and commodities sales specialist with over three decades of experience, leverages a methodical, compliance‑focused approach to design tailored investment
    solutions for high‑net‑worth clients while mentoring junior agents and preparing to launch a boutique wealth‑management practice emphasizing retirement planning for the Woodridge community, they aim
    to reduce day‑to‑day sales pressure while maintaining personal balance.
  sports: Dylan Devries, an avid golfer at Woodridge Golf Club who plays four‑ball matches every Saturday, enjoys early‑morning fishing trips on Lake Erie for walleye, and roots for the Chicago Cubs and
    Detroit Red Wings while also participating in a local senior softball league that meets monthly, they find the blend of solitary and team sports aligns with their balanced social preferences.
  arts: Dylan Devries, a dedicated hobbyist photographer capturing the shifting light over the Great Lakes shoreline and rust‑colored Midwestern fields, draws inspiration from Ansel Adams and Edward Burtynsky,
    and unwinds with readings of Jane Austen, Herman Melville, and contemporary finance titles by Michael Lewis, adding occasional evenings at the Chicago Symphony Orchestra to their cultural repertoire,
    they often share their photographs in community art exhibits.
  travel: Dylan Devries, a planner of historical tours, prefers structured itineraries that explore Great Lakes heritage sites like Mackinac Island, the Henry Ford Museum, and Lake Superior lighthouses,
    travels by rental car with a printed map and checklist, and occasionally dreams of a guided trip to the Scottish Highlands to trace Celtic trade routes, they relish the sense of stepping through history
    as they walk the cobblestones.
  culinary: Dylan Devries, a competent home cook who favors Midwestern comfort foods such as smoked trout with dill, Michigan cherry pie, and seared filet mignon, enjoys grilling freshly caught fish on
    weekend evenings, seasons dishes with fresh herbs from their garden, and occasionally indulges in a rich espresso made with locally roasted beans.
  core: Dylan Devries is a disciplined, community‑focused wealth advisor whose methodical mindset coexists with a laid‑back love for golf, photography, and classic literature, punctuated by a habit of checking
    their portfolio after every round.
background:
  cultural: Dylan was raised in the American Midwest and embodies the region’s pragmatic, family‑centered values. Growing up in a modest, middle‑class white household in the suburbs of Chicago, he internalized
    a strong work ethic, punctuality, and a sense of community responsibility. His upbringing included regular participation in local church activities and high‑school sports events, fostering a cooperative
    spirit balanced with personal assertiveness. Living in Woodridge for most of his adult life, he remains connected to Midwestern traditions such as volunteerism, support for local schools, and a preference
    for modest, practical living.
