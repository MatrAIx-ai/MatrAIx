  hobbies: '[''Visiting art galleries and museums'', ''Painting (acrylic abstracts)'', ''Urban photography'', ''Playing soccer in community league'', ''Cooking Guatemalan cuisine'', ''Hosting family gatherings
    and cultural events'', ''Volunteering at Guatemalan Independence Day festival'', ''Mindfulness meditation'', ''Reflective journaling'', ''Strategy board games'', ''Online e‑sports gaming'']'
  career_goals: Erick’s immediate goal is to complete the remaining credits toward a bachelor’s degree in Communications or Visual Arts within the next two years, balancing part‑time coursework with his
    personal responsibilities. He aims to secure a full‑time junior graphic designer or digital marketing coordinator role at a company that values cultural diversity and innovative storytelling, where
    he can apply his design expertise and bilingual communication skills. Over the longer term, his ambition is to launch a boutique creative agency that offers branding, multimedia production, and culturally‑responsive
    event services for Latino community organizations and small businesses throughout the Mid‑Atlantic. He is driven to become a recognized thought‑leader in multicultural design, publishing articles and
    speaking at industry conferences. Aware of his tendency toward stress, Erick plans to integrate mentorship, regular professional development, and mindfulness practices into his career path to maintain
    resilience and work‑life balance.
