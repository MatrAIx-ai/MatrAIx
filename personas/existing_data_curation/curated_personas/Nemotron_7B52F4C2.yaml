personas:
  professional: Erick Nunez is a methodical junior graphic designer who blends bilingual storytelling with a love for abstract acrylics, using Photoshop, Illustrator, and Premiere Pro to craft culturally
    resonant visual campaigns while managing tight timelines with Trello, and they channel a competitive drive to out‑perform client expectations.
  sports: Erick Nunez channels energetic sociability into a community soccer league and weekend pick‑up matches with the Stafford Strikers, while cheering for the Washington Wizards and DC United, and they
    stay fit through interval training, occasional mountain hikes in Shenandoah, and a disciplined stretching routine.
  arts: Erick Nunez immerses themselves in the local art scene, sketching concepts in downtown galleries, drawing inspiration from the bold colors of Basquiat, the social commentary of Banksy, and the emotive
    brushwork of Frida Kahlo, while they curate playlists that blend cumbia rhythms with contemporary indie tracks to fuel creative flow.
  travel: Erick Nunez prefers meticulously planned trips that mix cultural immersion and street‑art hunting, having explored the murals of Berlin, a highland town with colonial architecture reminiscent
    of his family roots, the vibrant food markets of Oaxaca, and weekend getaways to the Chesapeake Bay for relaxation, and they often document each journey with urban photography.
  culinary: Erick Nunez is an adventurous home chef who masters the complex layers of pepian, the slow‑cooked richness of tamales, and the aromatic broth of kak’ik, often hosting lively family dinners where
    marimba music and spontaneous dancing accompany the feast, and they love experimenting with new spice blends to keep the menu fresh.
  core: Erick Nunez is a competitively curious visual storyteller who balances a relentless drive for flawless designs with a habit of binge‑watching design tutorials late into the night, fuelled by endless
    cups of coffee, and they often find themselves sketching concepts on napkins during coffee breaks.
background:
  cultural: Erick was born to Guatemalan immigrant parents who settled in the Washington, D.C. metropolitan area before moving to Stafford, Virginia. Raised in a bilingual household, he learned Spanish
    at home and English at school, giving him fluency in both languages and a deep appreciation for Guatemalan traditions. Family gatherings are central to his life, featuring music such as marimba and
    cumbia, and dishes like kak’ik and tamales, reflecting the rich culinary heritage of the highlands. He celebrates major Guatemalan holidays—Día de la Independencia (September 15) and Día de los Muertos—often
    participating in community parades and cultural fairs that showcase traditional dances, textiles, and folklore. This bicultural upbringing instilled in him a strong sense of community responsibility,
    prompting his involvement in local Latino organizations that aim to preserve cultural identity while navigating life in the United States. Erick’s experience bridging two cultures fuels his interest
    in promoting multicultural perspectives through art and communication.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Premiere Pro (video editing)'', ''Graphic design'', ''Digital media production'', ''Bilingual Spanish-English translation'',
