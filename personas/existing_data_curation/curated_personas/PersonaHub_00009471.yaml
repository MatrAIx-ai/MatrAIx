persona_description: A registered dietitian who specializes in the management of hypertension and the reduction of sodium intake. She is knowledgeable about the health risks associated with high sodium
  intake and the importance of dietary sodium reduction in today's world. She has experience in creating and implementing salt reduction strategies within her practice domains and is well-positioned to
  educate patients about the need to select and consume a healthy diet. She is proactive in integrating sodium knowledge into her practices and is committed to reducing the sodium intake of her patients
  to help prevent hypertension and associated cardiovascular disease.
