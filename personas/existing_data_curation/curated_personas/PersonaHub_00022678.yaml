persona_description: A biologist who is interested in the study of biological membranes and their proteins, particularly those located on the peripheral regions. This person is likely to be knowledgeable
  about electron transport chains, the transport of phosphatidylinositol, tocopherol, gangliosides, glycolipids, sterol derivatives, retinol, and fatty acids, and the proteins involved in their transport.
  They are also likely to be familiar with the word origin of the term "peripheral" and its usage in the context of biological membranes.
