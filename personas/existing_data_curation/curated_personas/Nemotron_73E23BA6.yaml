personas:
  professional: Autumn Ekstrom, a tiny aspiring librarian, meticulously lines up storybooks on low shelves, practices greeting each visitor with bubbly chatter, and quietly frets over misplaced pages, showing
    how they blend their love of structure, sociability, and a gentle worry.
  sports: Autumn Ekstrom, a lively three‑year‑old, participates in a parent‑led toddler soccer group called the Little Cubs, loves cheerfully narrating each play, prefers the structured routine of weekly
    practice, and occasionally worries about missing a session, reflecting how they combine sociable energy, love of predictable schedules, and mild anxiety.
  arts: Autumn Ekstrom, a three‑year‑old who adores drawing bright rainbows with Crayola markers while singing the Sesame Street theme, regularly attends storytime at the local library, and often insists
    on leading group sing‑alongs, showcasing their talkative, sociable charm and they love organized creative play.
  travel: Autumn Ekstrom, a curious three‑year‑old, loves family trips to the local zoo where the day is planned down to snack times, dreams of visiting Disneyland for its bright maps and predictable rides,
    yet they sometimes fret over unfamiliar sounds, blending their love of structure, sociability, and a touch of worry.
  culinary: Autumn Ekstrom, a three‑year‑old with a penchant for perfectly shaped cheese‑tortellini and a ritual of sprinkling extra parmesan, can spend minutes arranging fruit slices on the plate, prefers
    meals that are predictable in flavor, and occasionally worries when a new vegetable appears, highlighting how they maintain an organized palate and mild food anxiety.
  core: Autumn Ekstrom, a talkative three‑year‑old who thrives on routine, delights in leading play, cares deeply for others, yet often worries about small disruptions, and they turn this anxiety into careful
    planning, making them an endearingly organized yet anxious little dynamo.
background:
  cultural: Autumn lives in Conneaut, a small lakeside community in Ashtabula County, Ohio, and is raised in a white, predominantly Midwestern American household with Swedish ancestry reflected in her family
    name, Ekstrom. Her cultural upbringing blends typical Midwestern values—emphasis on community, family gatherings, and modesty—with occasional nods to her Scandinavian roots, such as celebrating traditional
    holidays like Midsummer and enjoying Swedish pastries during special occasions. The local environment, with its close‑knit neighborhoods, lake‑front recreation, and seasonal festivals, shapes her worldview,
    fostering a sense of belonging and a love for structured community events.
