  hobbies: '[''Church choir singing'', ''Bridge and card games'', ''Community garden'', ''Soul‑food cooking'', ''Walking club'', ''Jazz and blues listening'', ''Classic movie watching'', ''Volunteer literacy
    tutoring'', ''Community theater participation'']'
  career_goals: Although retired, Kruz is focused on leaving a lasting legacy through mentorship and community service. He aims to formally mentor at least two emerging teachers each year, serve on the
    board of a local nonprofit that supports youth literacy, and author a memoir that weaves his personal history with reflections on 20th‑century African‑American education. He also hopes to organize an
    annual cultural‑heritage workshop in Lebanon that celebrates African‑American history, music, and cuisine. Staying physically active, he plans to walk with his wife on the nearby river trail weekly
    and travel to key civil‑rights sites with his grandchildren.
