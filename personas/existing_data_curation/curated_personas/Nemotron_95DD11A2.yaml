personas:
  professional: Dylan Daigrepont works as a senior metal fabricator in a mid-sized manufacturing plant, where their expertise in TIG/MIG welding, CNC plasma cutting, and lean‑manufacturing merges with a
    methodical, organized approach to meet tight schedules while mentoring new hires and mediating shop‑floor conflicts, and their curiosity drives them to experiment with new welding techniques while maintaining
    practical quality standards.
  sports: Dylan Daigrepont spends weekends playing pickup soccer for the Lake Washington Soccer Club and competing in the Seattle Adult Basketball Association, cheering on the Seattle Seahawks, Seattle
    Mariners, and Seattle Sounders FC, while they maintain fitness through early‑morning jogs along the waterfront and occasional summer mountain biking.
  arts: Dylan Daigrepont frequents intimate live‑music venues like The Crocodile, where they enjoy energetic sets by The Head and the Heart and occasional performances by local blues guitarist Jason Ricci,
    while they also attend Seattle Repertory Theatre productions of contemporary dramas, allowing the creative energy to balance the rigors of their hands‑on work.
  travel: Dylan Daigrepont prefers spontaneous weekend getaways to nearby marine havens such as the San Juan Islands and coastal towns of British Columbia, while they also dream of a summer sailing expedition
    through Norway’s fjords, balancing a modest travel budget with a love for waterfront adventures and the occasional planning of a DIY boat‑building workshop abroad.
  culinary: Dylan Daigrepont relishes cooking fresh catches of salmon and halibut on a portable grill, seasoning them with cedar planks, lemon‑dill butter, and cracked black pepper, and they consider themselves
    an adept home‑cook comfortable preparing classic seafood chowder, kraken‑style fish tacos, and smoked trout pâté for friends after a day on the water.
  core: Dylan Daigrepont blends hands‑on metal craftsmanship with an outdoorsy, community‑focused spirit, channeling curiosity into practical projects while wrestling with a streak of worry‑driven perfectionism.
background:
  cultural: Dylan grew up in a working‑class white family in the Pacific Northwest, where maritime and outdoor traditions shape daily life. The region’s emphasis on self‑reliance, practicality, and community
    involvement influenced his pragmatic outlook. Proximity to the Naval Base Bremerton and a strong local manufacturing sector reinforced a culture of hard work and technical skill. He identifies with
    the broader West Coast ethos of environmental appreciation—fishing, hiking, and preserving the Sound—while also valuing the steady, cooperative spirit of his neighborhood in Port Orchard.
