  career_goals: Dylan aims to earn a GED within the next year and complete an associate’s program in welding technology to obtain a Certified Welder credential. He is targeting a lead‑fabricator or shift‑supervisor
    role within his current plant, where he can apply his process‑improvement ideas and lead a small team. In the longer term, he hopes to open a modest custom metal‑fabrication shop that serves local marine
    and recreational markets, leveraging his knowledge of boat‑building and outdoor equipment. He also plans to develop formal leadership skills through community college courses and a mentorship program,
    seeking a stable career path that reduces his financial worries and provides a foundation for future home ownership.
