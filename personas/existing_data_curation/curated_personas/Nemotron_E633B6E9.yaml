personas:
  professional: Menelik King is a seasoned bookkeeping clerk with three decades of experience in small‑business finance, and they are known for blending meticulous ledger work with an open‑door mentorship
    style that turns audit sessions into lively learning moments, leveraging both traditional spreadsheets and cloud‑based tools while eyeing a part‑time consulting shift and the Certified Bookkeeper credential.
  sports: Menelik King follows the Columbus Crew with seasonal devotion, roots for the Columbus Blue Jackets in the winter, occasionally attends Columbus Clippers games, and they play weekly bridge at the
    senior center and engage in casual chess matches to keep their mind sharp, preferring low‑impact walks through the community garden over high‑intensity workouts.
  arts: Menelik King spins classic R&B vinyl such as Marvin Gaye’s 'What’s Going On' and Aretha Franklin’s 'Respect' at family gatherings, leads gospel sing‑alongs at church, and they frequently quote spoken‑word
    poetry from local community events, letting music and rhythm shape their storytelling flair.
  travel: Menelik King organizes annual pilgrimages to civil‑rights landmarks like Selma and Birmingham, relishes weekend drives to historic Ohio River towns, and they dream of a relaxed river cruise through
    New Orleans’ French Quarter to taste the jazz that inspired their vinyl collections, all while budgeting modestly and traveling with close family.
  culinary: Menelik King enjoys cooking soul‑food staples like collard greens simmered with smoked turkey, sweet‑potato pie, and okra gumbo, often harvesting tomatoes, kale, and hot peppers from their home
    garden to freshen the dishes, and they boast a modest but confident kitchen skill that pairs a well‑seasoned cast‑iron skillet with a vinyl‑powered rhythm.
  core: Menelik King is a talkative, gospel‑singing financial veteran whose competitive streak fuels community mentorship, garden‑to‑table cooking, and a habit of collecting vintage R&B records while they
    occasionally forget to water the tomatoes.
background:
  cultural: Menelik was born in 1960 to parents who were part of the Great Migration, moving from the rural South to Columbus in search of better opportunities. Growing up in a tight‑knit African‑American
    neighborhood, he was immersed in church life, gospel music, and community solidarity that emphasized self‑reliance and mutual support. The civil‑rights movement of the 1960s shaped his awareness of
    social justice, fostering a lifelong commitment to uplift his community through education and service. His cultural identity blends Southern culinary traditions—soul food and seasonal produce cooking—with
    Midwestern influences, and his family gatherings often feature storytelling, spoken‑word poetry, and the sharing of ancestral history. Menelik’s marriage and long‑standing ties to the local African‑American
    church have reinforced values of perseverance, respect for elders, and a collective responsibility to mentor the next generation.
attributes:
  skills: '["Double-entry bookkeeping", "Accounts payable", "Accounts receivable", "General ledger management", "Financial statement preparation", "Payroll processing", "Tax filing assistance", "Audit support",
