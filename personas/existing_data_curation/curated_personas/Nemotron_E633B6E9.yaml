  hobbies: '["Leading church finance‑literacy circle", "Attending neighborhood block parties", "Listening to classic R&B and soul music", "Spinning vinyl records", "Gardening (vegetable garden)", "Playing
    bridge at senior center", "Playing chess at community center", "Volunteering for free tax‑filing assistance", "Traveling to historic civil‑rights sites", "Storytelling and family oral history sharing",
    "Participating in local public‑speaking groups"]'
  career_goals: Even as he approaches traditional retirement age, Menelik aims to transition from a full‑time bookkeeping clerk to a part‑time financial‑consulting role focused on helping local minority‑owned
    small businesses navigate modern accounting tools and compliance requirements. He plans to earn the Certified Bookkeeper designation to formalize his expertise and to develop a series of community workshops
    on budgeting, tax readiness, and digital bookkeeping. Leveraging his competitive drive, Menelik aspires to be recognized as a leading mentor within his firm and the broader Columbus African‑American
    business network, leaving a legacy of financial literacy for his grandchildren and the next generation of accountants.
