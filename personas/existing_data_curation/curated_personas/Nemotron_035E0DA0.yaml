  career_goals: At 61, Sienna aims to become a certified driver trainer and safety coordinator for the Navajo Nation school system, developing a culturally integrated driver‑training curriculum that weaves
    traditional storytelling about road safety into lessons. She plans to transition to a part‑time role as a community arts facilitator, leading workshops that blend transportation safety with Navajo weaving
    motifs for children. Additionally, she intends to earn a certificate in geriatric driver safety to support older adults in her community and continue mentoring new drivers while preserving tribal cultural
    practices.
