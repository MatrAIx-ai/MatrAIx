  hobbies: '["Model kit building (classic cars)", "Woodworking", "Chess", "Complex puzzles (Sudoku, crosswords)", "Reading non‑fiction (engineering, self‑help)", "Greek cultural club participation", "Cooking
    Greek cuisine", "Journaling", "Mindfulness meditation"]'
  career_goals: Paul aims to translate his extensive technical background into a part‑time consulting role that leverages his expertise in data analysis and CAD design, preferably focusing on the automotive
    or manufacturing sectors prominent in Detroit. He plans to obtain a Project Management Professional (PMP) certification within the next year to formalize his project coordination skills. Additionally,
    Paul is passionate about giving back to the community; he hopes to develop a local STEM mentorship program for high‑school students, combining his technical knowledge with his cooperative yet assertive
    communication style. Long‑term, he aspires to achieve a balanced lifestyle that supports his mental well‑being, allowing him to sustain meaningful work without succumbing to stress.
