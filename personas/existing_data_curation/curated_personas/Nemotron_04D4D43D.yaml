personas:
  professional: Maryjane Tolliver, a seasoned community events coordinator in Indianapolis, leverages meticulous budgeting, skeptical vendor vetting, and a deep curiosity for visual arts to design interdisciplinary
    programs that exceed expectations while fostering intergenerational mentorship.
  sports: Maryjane Tolliver stays active by participating in the Indianapolis YMCA’s weekly senior tennis league, cheering on the Colts and Pacers, and incorporating gentle yoga at the community center,
    balancing competitive spirit with low-impact exercise.
  arts: Maryjane Tolliver deepens her artistic practice by studying watercolor techniques inspired by Monet and Cassatt, curating exhibitions at the Indianapolis Museum of Art, and leading quilting workshops
    that blend classic patterns with contemporary themes.
  travel: Maryjane Tolliver prefers thoughtfully planned road trips, often visiting the historic streets of Savannah, the vineyards of Napa Valley, and the lively markets of Marrakech, while balancing travel
    costs with her retirement budget.
  culinary: Maryjane Tolliver enjoys medium-level cooking, crafting seasonal dishes such as roasted beet and goat cheese salad, heirloom tomato bruschetta, and a slow‑cooker kale stew, favoring fresh produce,
    herbs like basil, and earthy spices such as smoked paprika.
  core: Maryjane Tolliver is a detail‑driven arts advocate who balances competitive ambition with a quiet love of gardening, yet often wrestles with worry that fuels both meticulous planning and occasional
    overthinking.
background:
  cultural: Maryjane was born and raised in Indianapolis, Indiana, the daughter of parents who migrated from the rural South during the Great Migration. Her upbringing was rooted in the traditions of the
    Black church, strong community ties, and a reverence for African‑American artistic expression. She grew up attending local cultural celebrations such as the Indiana Black Expo and the Indy Jazz Festival,
    experiences that reinforced her connection to her heritage. Her family emphasized education, self‑reliance, and civic involvement, values that have guided her throughout life. As a Black woman in the
    Midwest, Maryjane’s perspective is shaped by both the challenges and the resilience of her community, informing her commitment to cultural preservation, mentorship, and community empowerment.
