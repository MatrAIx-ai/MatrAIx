  career_goals: Maryjane aims to leverage her organizational talent and artistic curiosity to assume a leadership role at a local community arts center, designing interdisciplinary programs that combine
    visual art, wellness, and intergenerational learning. She seeks to formalize her nonprofit expertise through a certificate in non‑profit management and to establish a mentorship network for young Black
    women in Indianapolis, helping them develop professional and creative competencies. Driven by a competitive spirit, she wants her programs to set a new standard for community engagement. In the longer
    term, she aspires to author a memoir that chronicles her family’s Great Migration story and the cultural evolution of her neighborhood, contributing to the preservation of Black heritage in Indiana.
