personas:
  professional: Curtis Burks, a 19‑year‑old aspiring IT professional, blends their solid grounding in information technology and hands‑on problem‑solving with a meticulous yet adaptable work style, delivering
    reliable help‑desk support while nurturing community ties through their courteous, patient approach.
  sports: Curtis Burks stays active by shooting hoops at the neighborhood park with their friends, cheering on the Dallas Mavericks while also following the Houston Rockets during the offseason, and occasionally
    joining a local amateur basketball league that emphasizes camaraderie over competition.
  arts: Curtis Burks immerses themselves in music, looping tracks by Kendrick Lamar, H.E.R., and gospel legend Kirk Franklin while experimenting with street‑style photography inspired by Henri Cartier‑Bresson,
    and occasionally edits short video tributes to their favorite sci‑fi authors like N.K. Jemisin.
  travel: Curtis Burks prefers low‑cost weekend getaways, often road‑tripping to the Texas Hill Country or camping at Lake Conroe, while dreaming of a spring backpack adventure through the Pacific Northwest’s
    Seattle and Portland to explore the tech scene and lush landscapes.
  culinary: Curtis Burks enjoys hearty Texas‑style brisket and classic chicken‑fried steak, but also whips up simple weeknight meals like shrimp tacos with lime‑marinated cilantro salsa, and relishes trying
    new PC‑related snack combos such as spicy jalapeño‑cheese popcorn while streaming gaming sessions.
  core: Curtis Burks merges a relentless curiosity for tech with a community‑first mindset, balancing late‑night PC builds and anxiety‑fighting self‑help reads against a steady habit of splurging on new
    gaming hardware that sometimes pins their savings.
background:
  cultural: Curtis is an African‑American who grew up in Palmer, a small town in Ellis County, Texas. His family roots trace back to the Deep South, and his parents emphasized the importance of education,
    church, and community support. He attended a historically Black church where gospel music, fellowship, and community service were central, shaping his cooperative and kind nature. The blend of Southern
    Black cultural traditions—such as Southern cuisine, storytelling, and respect for elders—combined with the rural Texan environment has given him a strong sense of resilience and a desire to give back.
    Curtis is proud of his heritage, participates in local Black History Month events, and stays connected with extended family gatherings that celebrate both cultural pride and the values of hard work
    and mutual aid.
