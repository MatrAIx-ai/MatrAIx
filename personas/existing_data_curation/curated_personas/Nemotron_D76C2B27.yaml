  hobbies: '[''Basketball'', ''Video gaming and PC building'', ''Listening to hip‑hop, R&B, and gospel music'', ''Reading sci‑fi and self‑help books'', ''Volunteering at the community center'', ''Fishing'',
    ''Hiking'', ''Photography'']'
  career_goals: Curtis aims to build a stable career that blends his technical curiosity with his desire to serve his community. He plans to transfer to a four‑year university to earn a bachelor's degree
    in Information Systems while working part‑time in a help‑desk or technical support role. In the next five years, he hopes to become a system administrator for a local government agency or a school district,
    where he can maintain reliable IT infrastructure while collaborating with a supportive team. Long‑term, he dreams of launching a small consulting business that provides affordable tech services and
    digital training to small businesses and nonprofit groups in Ellis County, allowing him to stay close to home and keep a balanced work‑life schedule that helps him manage stress.
