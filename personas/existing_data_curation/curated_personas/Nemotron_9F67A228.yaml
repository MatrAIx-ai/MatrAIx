    in the Texas Hill Country'', ''Volunteer Spanish tutoring'', ''Collecting vintage railroad memorabilia'']'
  career_goals: Emanuel aims to advance to a senior yardmaster position where he can influence safety protocols and integrate emerging technologies such as Positive Train Control into daily operations.
    He plans to obtain the Certified Railway Yardmaster credential and to develop a mentorship program for younger rail employees that blends technical training with creative expression, encouraging workers
    to explore art as a stress‑relief outlet. Long‑term, he envisions transitioning into a safety consulting role that leverages his extensive field experience while also organizing community art workshops
    for retirees and active rail staff, merging his professional expertise with his passion for the arts.
