personas:
  professional: Angel Murillo, a veteran educator with three decades of classroom experience, merges their expertise in bilingual curriculum design, grant writing, and technology integration to craft flexible,
    inquiry-based lessons, while they adapt spontaneously and apply business-savvy budgeting to foster collaborative partnerships and resource-rich learning environments.
  sports: Angel Murillo, a devoted member of the Shenandoah Hiking Club who spends weekends trekking the Blue Ridge trails, roots for the Washington Capitals, the Washington Wizards, and the Virginia Cavaliers,
    and joins a local walking group to stay active during milder months, and they prefer low-impact activities that fit their flexible schedule.
  arts: Angel Murillo, an avid photographer inspired by Ansel Adams and a regular at the local book club discussing works by Hilary Mantel and Ken Follett, also enjoys the vibrant sounds of Carlos Vives
    and the timeless cinema of Pedro Almodóvar, weaving these artistic influences into the community cultural workshops they organize.
  travel: Angel Murillo, who alternates between meticulously planning weekend road trips to historic towns like Savannah and spontaneous getaways to the peaks of Shenandoah, dreams of exploring the ruins
    of Machu Picchu and the colonial streets of Antigua, and they balance a modest travel budget with family responsibilities.
  culinary: Angel Murillo, a skilled home cook who delights in preparing fragrant black-bean stew, homemade corn tortillas, and sweet plantain fritters using herbs and vegetables from their garden, often
    hosts lively dinner gatherings where friends sample a blend of traditional family recipes and creative culinary twists, and they enjoy sharing the stories behind each dish.
  core: Angel Murillo, the adaptable educator-tutor who fuses spontaneous lesson design with diligent grant writing, fuels their days with garden-fresh meals, rugged hikes, and they often misplace lesson
    plans in the garden shed.
background:
  cultural: Angel was born and raised in Honduras, where family, community, and celebration of traditions shaped her identity. She immigrated to the United States in her early twenties and has kept her
    Spanish fluency and cultural customs alive through holiday observances, culinary traditions, and active participation in the Honduran‑American community of Leesian, VA. Her bicultural perspective informs
    her teaching philosophy, emphasizing respect for diverse backgrounds while fostering practical, inclusive learning experiences. As a widowed mother, she draws resilience from both her Honduran roots
    and the supportive networks she has built in her local community.
attributes:
  skills: '["Lesson planning", "Differentiated instruction", "Bilingual education (Spanish‑English)", "Classroom management", "Student assessment", "Project‑based learning", "Educational technology integration
    (Google Classroom, SMART Board)", "Budget management", "Grant writing", "Community partnership development", "Conflict mediation", "Public speaking"]'
  hobbies: '["Cooking Honduran cuisine", "Gardening", "Hiking in Shenandoah trails", "Reading historical fiction", "Photography", "Volunteer tutoring", "Attending community cultural events", "Knitting",
    "Book club participation"]'
  career_goals: Angel aims to become a curriculum coordinator for bilingual and multicultural programs within Loudoun County Public Schools, leveraging her business acumen to secure grants and allocate
    resources effectively. She also wants to mentor newer teachers, lead professional‑development workshops on flexible, inquiry‑based teaching, and eventually pursue a master’s degree in educational leadership.
    Long‑term, she hopes to launch an after‑school enrichment program that supports immigrant families and celebrates Honduran cultural heritage.
