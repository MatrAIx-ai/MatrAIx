personas:
  professional: Louise Cruz is a seasoned facility maintenance specialist in Des Moines, leveraging two decades of hands‑on expertise in electrical, plumbing, HVAC, and carpentry to design methodical preventive‑maintenance
    programs, while her preference for routine and meticulous planning translates into minimal downtime and reliable service delivery.
  sports: Louise Cruz enjoys low‑impact fitness, playing weekly pickleball at the Des Moines YMCA, attending Iowa Hawkeyes football games and cheering for the Des Moines Men’s basketball team, and participating
    in the senior center’s twice‑weekly water‑aerobics class as part of her methodical exercise routine.
  arts: Louise Cruz immerses herself in classic mystery novels by Agatha Christie and Dorothy L. Sayers, attends quilting exhibitions at the Des Moines Art Center, appreciates folk paintings by Grandma
    Moses, and listens to John Denver’s folk ballads while working on her garden, letting these artistic touches color her practical life.
  travel: Louise Cruz prefers organized road trips with detailed itineraries, revisiting charming Midwestern towns such as Galena, Illinois and Mackinac Island, Michigan, while dreaming of a future cultural
    tour of New Orleans, and she typically stays in AirBnB rentals that offer garden spaces for her to relax.
  culinary: Louise Cruz delights in Midwestern comfort cooking, regularly preparing pot roast with rosemary and carrots, apple pie with a flaky crust and cinnamon, and corn casserole, using fresh vegetables
    from her garden and showcasing a moderate but confident skill level that shines during family gatherings.
  core: Louise Cruz blends a methodical, routine‑driven work style with a love for hands‑on hobbies, managing a disciplined budget while juggling hypertension, and she occasionally lets stress‑induced worries
    slip into her otherwise organized life.
background:
  cultural: 'Louise grew up in a white, Irish‑Portuguese Catholic family in the heartland of Iowa. Her paternal ancestors emigrated from the Azores in the early 20th century, and the family kept modest
    cultural traditions such as celebrating the Feast of the Holy Cross and enjoying Portuguese pastries during holidays. Raised in Des Moines, she absorbed typical Midwest values: hard work, self‑reliance,
    and community responsibility. Her cultural identity blends the modest, family‑oriented customs of her Portuguese heritage with the practical, down‑to‑earth sensibilities of Iowa’s small‑town culture,
    shaping her preference for routine, reliability, and a strong sense of duty to her neighbors.'
attributes:
  skills: '["Preventive maintenance scheduling and execution", "Electrical system troubleshooting", "Plumbing repair and pipe replacement", "HVAC servicing and filter maintenance", "Carpentry and fixture
    installation", "Facility safety inspections and OSHA compliance", "Inventory management and parts ordering", "Technical documentation and record‑keeping", "Use of hand and power tools", "Mentoring junior
    maintenance staff"]'
  hobbies: '["Vegetable gardening", "Flower bed upkeep", "Quilting and sewing", "Reading DIY guides and mystery novels", "Cooking traditional Midwestern meals", "Church volunteer work", "Weekly bingo at
    the senior center"]'
  career_goals: Louise aims to transition from front‑line repair work to a supervisory role where she can design and oversee preventive‑maintenance programs for a large property management company. She
    is pursuing Certified Facility Manager (CFM) certification and hopes to become a maintenance superintendent within the next three years, leveraging her organizational strength to improve workflow efficiency
    and reduce emergency repairs. Long‑term, she hopes to open a small, family‑run maintenance contracting business that provides reliable, routine services to small‑business owners in the Des Moines area,
    giving her greater control over her schedule and stress levels while mentoring other women in trades.
