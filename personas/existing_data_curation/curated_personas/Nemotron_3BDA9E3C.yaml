  hobbies: '[''woodworking'', ''xeriscaping and desert gardening'', ''digital photography (desert landscapes)'', ''visiting art galleries (Southwestern art)'', ''reading historical non-fiction'', ''playing
    chess'', ''listening to classic jazz'', ''participating in a senior reading circle'']'
  career_goals: David aims to preserve and share the cultural heritage of his hometown by volunteering as a docent for the local historical museum, documenting stories of longtime residents, and curating
    a small collection of Southwestern art for community display. He also aspires to mentor younger family members and neighbors in practical skills such as woodworking and xeriscaping. On a personal level,
    he seeks to stay intellectually active by completing a series of online courses in art history and digital photography, and hopes to compile his memoirs and family history into a self‑published book.
    Though retired, his ambition is to remain a trusted resource in his community, fostering intergenerational connections while managing his own wellbeing.
