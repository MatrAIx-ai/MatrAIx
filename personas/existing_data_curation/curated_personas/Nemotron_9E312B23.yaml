personas:
  professional: Evelyn Green, a curious one‑year‑old who delights in exploring cause‑and‑effect with building blocks, blends their practical knack for sorting colors with a budding sense of organization,
    and they already demonstrate the disciplined focus that hints at a future meticulous engineer.
  sports: Evelyn Green, a one‑year‑old who loves splashy water play, attends a toddler swim class at the local community center, cheers enthusiastically during family viewings of the Boston Red Sox and
    the New England Patriots, and they keep a miniature baseball glove in the stroller for future play.
  arts: Evelyn Green, a bright infant who spends afternoons listening to classic children’s tunes by Raffi and the melodic lullaby "Here Comes the Sun" by The Beatles, enjoys tactile storybooks featuring
    New England folk tales, and they love dancing to Sesame Street numbers while clutching a soft teddy bear.
  travel: Evelyn Green, a one‑year‑old who has already taken weekend ferry rides to nearby Mystic Island and a family road trip to the historic town of Salem, prefers relaxed, stroller‑friendly itineraries
    with gentle sea breezes, and they dream of someday exploring the rocky coasts of Maine.
  culinary: Evelyn Green, a growing foodie at one, favors the sweet smoothness of apple‑cinnamon purée and mashed sweet potatoes, can pick up soft banana slices with chubby fingers, and they delight in
    occasional family‑cooked baked apple crumble seasoned with nutmeg.
  core: Evelyn Green, a one‑year‑old explorer with a practical curiosity, gentle harmony‑seeking nature, and a penchant for tidy toy collections, balances tiny independence with family‑guided routines.
background:
  cultural: Evelyn is raised in Waterford, Connecticut, a coastal New England community with a heritage rooted in European (primarily Anglo‑American) traditions. Her family emphasizes modesty, community
    involvement, and respect for nature, often partaking in local customs such as seasonal apple picking, attending town fairs, and valuing early childhood education. The cultural setting blends a love
    for the sea, historic preservation, and a supportive neighborhood environment.
