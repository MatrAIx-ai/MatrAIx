persona_description: A public health professional who is interested in improving the surveillance and management of dental caries, periodontal diseases, and oral and pharyngeal cancers. This person is likely
  to be involved in developing and implementing evidence-based health promotion programs, conducting surveillance studies, and collaborating with experts to improve the understanding and control of these
  diseases in the United States. They may also have experience working with state and local surveillance systems and have a strong interest in using self-reported measures of periodontal infections and
  oral and pharyngeal cancer risk factors in the surveillance process.
