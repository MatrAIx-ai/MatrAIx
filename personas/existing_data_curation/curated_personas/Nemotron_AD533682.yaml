personas:
  professional: Brett Guzman, a seasoned full‑stack web developer with over three decades of experience, blends their love for art and community into user‑centric, accessible digital experiences, championing
    progressive web apps and mentoring junior coders while juggling a relaxed, sometimes chaotic workflow that favors flexibility over rigid processes.
  sports: Brett Guzman, an avid member of the Angier Trails Hiking Club, spends weekends trekking the Blue Ridge foothills, follows the Carolina Panthers and the Durham Bulls for Saturday games, and squeezes
    in occasional pickup basketball at the local community center despite occasionally forgetting to stretch after hikes.
  arts: Brett Guzman, a passionate amateur photographer and acrylic painter, frequents live jazz nights at Raleigh's Crankshaft, showcases their own landscape series at the Angier Arts Festival, and draws
    inspiration from the soulful sounds of B.B. King and the brushwork of Andrew Wyeth, often juggling both lenses and palettes in the same evening.
  travel: Brett Guzman, a curious traveler who mixes road trips to Asheville’s waterfalls with occasional flights to Barcelona for its Gaudí architecture, prefers planning loosely to leave room for spontaneous
    gallery visits, yet they balance trips with budget constraints by staying in family‑run B&Bs and using frequent‑flyer miles.
  culinary: Brett Guzman, a confident home chef specializing in Southern comfort, loves slow‑cooked pulled pork with apple‑cider glaze, skillet‑seared catfish with cornmeal crust, and pairing dishes with
    fresh collard greens, and often experiments with smoked paprika, okra, and sweet‑potato mash while occasionally over‑salting dishes in enthusiastic cooking sessions.
  core: Brett Guzman, a creatively restless 56‑year‑old who blends code, canvas, and community, worries about perfect balance yet thrives on spontaneous art‑tech projects, informal mentorship, and late‑night
    jazz sessions, and they occasionally forget to file taxes on time.
background:
  cultural: Brett was raised in the small‑town milieu of central North Carolina, where Southern hospitality and a strong sense of community shaped his values. His family's roots trace back to English and
    Irish immigrants, and his surname reflects a Hispanic lineage from a great‑grandparent who married into the family, giving him an appreciation for multicultural perspectives. He identifies as a white
    American but embraces the region's traditions—church gatherings, local crafts, and regional cuisine—while also seeking diverse artistic expressions through travel and community events.
