  skills: '[''Full-stack web development'', ''JavaScript (React, Angular, Vue)'', ''Node.js & Express'', ''Python/Django'', ''Database design (MySQL, PostgreSQL)'', ''Responsive UI/UX design'', ''Accessibility
    compliance (WCAG)'', ''SEO and performance optimization'', ''Version control (Git, GitHub)'', ''Mentoring and code review'']'
  hobbies: '[''Landscape photography'', ''Acrylic painting'', ''Live jazz and blues concerts'', ''Hiking and nature walks'', ''Community gardening'', ''Cooking and hosting dinner parties'', ''Tech meetups
    and hackathons'', ''Volunteer digital literacy tutoring'', ''Board games and trivia nights'', ''Traveling to historic sites'']'
  career_goals: Brett aims to transition his freelance practice into a small boutique agency that partners with community organizations, schools, and local businesses in Harnett County. He wants to lead
    a loosely structured team where creativity and flexibility are prized, and to spearhead projects that blend technology with art—such as interactive museum exhibits or online cultural archives. He also
    aspires to deepen his expertise in progressive web apps and emerging front‑end paradigms, contribute to open‑source libraries, and eventually mentor a new generation of developers while maintaining
    a balanced, low‑stress lifestyle.
