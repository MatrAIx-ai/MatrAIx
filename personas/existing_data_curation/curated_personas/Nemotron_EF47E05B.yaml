  hobbies: '[''Organic Balcony Gardening'', ''Traditional Mexican Cooking'', ''Reading Mexican History and Literature'', ''Sudoku and Chess'', ''Bridge (with close friends)'', ''Walking in Prospect Park'',
    ''Classic Film Watching'', ''Mariachi Music Listening'', ''Journaling'']'
  career_goals: Although retired, Francisco aims to remain active in his community by mentoring younger Mexican‑American youth, teaching them practical life skills such as basic repairs, budgeting, and
    garden stewardship. He plans to document his family’s oral history and preserve cultural stories for future generations. He also hopes to expand the small community garden he tends, entering local senior
    horticulture contests to challenge himself competitively. On a personal level, he aspires to master a new digital skill—like video editing—to record his cooking tutorials and keep his independence intact.
