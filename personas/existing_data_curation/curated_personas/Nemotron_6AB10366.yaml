personas:
  professional: Lillian Velis, a 34-year-old internal audit specialist, blends rigorous GAAP expertise, forensic accounting, and advanced data‑analytics tools such as Python, SQL, and Power BI to uncover
    hidden risks, while channeling a competitive drive and boundless curiosity into pioneering sustainability reporting and mentoring junior staff.
  sports: Lillian Velis routinely hikes the Palos Trail System, cycles with the Chicago Lakefront Cyclists club, and supports the Chicago Bears and Chicago Cubs, balancing outdoor stamina with seasonal
    fandom and a competitive spirit that pushes them to set personal mileage goals each year.
  arts: Lillian Velis frequents the Art Institute of Chicago, sketching impressions of works by Grant Wood and Yayoi Kusama, captures street scenes and vibrant Mexican cultural festivals in analog film
    inspired by Dorothea Lange, and collects limited‑edition prints by Frida Kahlo for creative inspiration.
  travel: Lillian Velis enjoys weekend getaways along Lake Michigan’s shoreline, has trekked the dunes of Michigan’s Upper Peninsula, dreams of strolling the historic alleys of Oaxaca, and is planning a
    study tour of sustainable museum practices in Copenhagen, always crafting detailed itineraries that blend cultural immersion with outdoor adventure.
  culinary: Lillian Velis delights in preparing traditional tacos al pastor with pineapple and adobo, experiments with mole‑infused quinoa bowls, and regularly sources fresh nopal, chilies, and avocado
    at Chicago’s Maxwell Street Market, while occasionally adding an unconventional dash of smoked paprika to reinvent classic flavors.
  core: Lillian Velis is a data‑driven auditor with an insatiable appetite for art and adventure, whose competitive edge fuels a relentless pursuit of sustainable finance, even as they juggle caffeine‑fueled
    work marathons with mindful yoga breaks.
background:
  cultural: Lillian is a first‑generation Mexican‑American raised in Chicago’s vibrant Pilsen neighborhood, where Mexican traditions intermingle with the city’s multicultural fabric. She grew up bilingual,
    celebrating Día de los Muertos and Semana Santa with family gatherings that emphasized storytelling, music, and traditional foods. These experiences instilled a deep appreciation for community, resilience,
    and cultural expression. While she embraces her Mexican heritage—through language, cuisine, and participation in local festivals—she also identifies strongly with the broader Chicago identity, drawing
    inspiration from the city’s art, architecture, and diverse neighborhoods. This dual cultural lens fuels her curiosity, informs her collaborative yet competitive work style, and shapes her ambition to
    give back to both the professional and local communities.
attributes:
  skills: '[''Financial Auditing'', ''GAAP compliance'', ''Tax preparation'', ''Data analytics (Python, SQL)'', ''Advanced Excel (pivot tables, macros)'', ''ERP systems (SAP, Oracle)'', ''Risk assessment'',
