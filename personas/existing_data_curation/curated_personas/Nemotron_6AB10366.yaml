  hobbies: '[''Visiting art museums'', ''Photography'', ''Cooking Mexican cuisine'', ''Hiking in forest preserves'', ''Reading sci-fi novels'', ''Playing chess'', ''Cycling'', ''Yoga'', ''Volunteering for
    financial literacy workshops'', ''Learning Python for data analysis'']'
  career_goals: Lillian aims to earn her CPA designation within the next year and transition into a senior audit manager role at a Big‑Four firm. She is particularly interested in developing expertise in
    sustainability accounting and ESG disclosures, hoping to become a thought leader who integrates environmental metrics into traditional audit frameworks. Long‑term, she envisions moving into a chief
    financial officer position for a cultural institution—such as a museum or arts nonprofit—where she can merge her financial acumen with her love of art. Along the way, she wants to mentor younger women
    of Hispanic heritage in accounting, championing diversity and inclusion within the profession.
