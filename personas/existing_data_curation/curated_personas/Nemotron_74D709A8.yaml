  career_goals: Although retired from the paid workforce, Alison aims to deepen her impact in the Houston community. She plans to lead the senior center’s seasonal garden program, mentor new volunteers,
    and develop a series of workshops on nutritious cooking for low‑income families. Over the next few years she hopes to compile her life stories and local history observations into a memoir that will
    preserve the neighborhood’s heritage. Maintaining her health and independence remains a personal ambition, so she also commits to regular walking groups and a balanced lifestyle.
