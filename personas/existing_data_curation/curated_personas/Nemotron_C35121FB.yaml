personas:
  professional: Kami Austin, a veteran flight attendant with over twenty years of in‑flight service, leverages their safety certifications, conflict‑de‑escalation training, and conversational Spanish to
    keep diverse cabins calm, while their curiosity and relaxed approach to scheduling make them a mentor who encourages practical problem‑solving and flexible teamwork.
  sports: Kami Austin stays active through weekend hikes with the Lake Erie Hiking Club and cycling with the Lake Erie Cycling Club, follows the Wisconsin Badgers football season and the Milwaukee Brewers
    with enthusiastic game‑day gatherings, yet prefers low‑impact cardio over competitive leagues, balancing fitness with social camaraderie.
  arts: Kami Austin lights up the local community theater stage as a versatile performer—recently starring in a production of 'Our Town'—while savoring live jazz by the Chicago Jazz Ensemble, the paintings
    of Monet at the Madison Museum of Contemporary Art, and the films of Wes Anderson, weaving these artistic experiences into their themed dinner parties.
  travel: Kami Austin curates flexible, senior‑friendly itineraries on their travel blog, favoring immersive cultural stops over rigid schedules, having recently documented a photo‑journal of a road trip
    through the New England leaf‑peeping route, a culinary tour of Oaxaca, Mexico, and a relaxing cruise through the Greek Cyclades, while dreaming of guiding a group to the historic vineyards of the Lake
    Erie region.
  culinary: Kami Austin, an enthusiastic home chef, mixes confidence with occasional trial‑and‑error, delighting friends with homemade paella featuring saffron and chorizo, Thai green curry brimming with
    lemongrass and coconut milk, and rustic pierogi stuffed with potatoes and caramelized onions, while their love for spice blends like harissa and smoked paprika fuels their weekly international dinner
    parties.
  core: Kami Austin blends seasoned aviation expertise with a restless curiosity, weaving together spontaneous travel, community theater flair, and a penchant for last‑minute planning that keeps life lively,
    even if their calendar sometimes resembles a delightful mess.
background:
  cultural: Kami grew up in a small, close‑knit Midwestern town in Ashtabula County, Ohio, within a predominantly White, German‑American heritage community. Her upbringing emphasized hard work, modesty,
    and a strong sense of community, values that still shape her daily interactions. While her cultural roots are grounded in Midwestern traditions—such as seasonal festivals, family reunions, and an appreciation
    for simple, home‑cooked meals—her career as a flight attendant has exposed her to a wide array of global cultures, fostering an open‑minded, curious outlook that she blends with her practical, down‑to‑earth
    Midwestern sensibility.
