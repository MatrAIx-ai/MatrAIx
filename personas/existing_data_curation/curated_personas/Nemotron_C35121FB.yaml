  career_goals: Kami aspires to advance to a senior cabin leadership role, such as Purser or Cabin Manager, where she can oversee crew operations, conduct safety briefings, and mentor new flight attendants.
    She plans to complete a bachelor’s degree in Hospitality or Business Administration to broaden her qualifications for a future transition into airline training, safety management, or ground‑operations
    leadership. Parallel to her airline career, she dreams of launching a boutique travel‑consulting service that curates trips for seniors and small groups, allowing her to share her love of travel while
    maintaining the flexible schedule she values.
