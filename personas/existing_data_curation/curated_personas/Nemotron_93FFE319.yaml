    (English tutoring for immigrants)'']'
  career_goals: Jacqueline aims to transition from her current clerk role to a supply chain analyst position within the next two years, leveraging her hands‑on experience with production planning. She plans
    to obtain the APICS Certified Supply Chain Professional (CSCP) credential and enroll in an associate‑degree program in logistics or business administration. Long‑term, she aspires to become an operations
    manager overseeing a multi‑site manufacturing network, where she can lead lean initiatives, mentor junior staff, and use data‑driven strategies to improve overall efficiency. Her ambition includes fostering
    a culturally inclusive workplace that values clear communication and collaborative problem solving.
