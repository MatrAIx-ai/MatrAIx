persona_description: A non-profit organization dedicated to open access publishing in the fields of science, technology, and medicine. The organization, the Public Library of Science (PLOS), was founded
  in 2000 by Nobel Prize winner Harold Varmus, biochemist Patrick O. Brown, and computational biologist Michael Eisen, who pledged to discontinue submission of papers to journals that did not make the full
  text of their papers available to all, free and unfettered, either immediately or after a delay of no more than 6 months. PLOS has since launched seven journals, including PLOS Biology, PLOS ONE, PLOS
  Medicine, and PLOS Computational Biology, and has a European editorial office in Cambridge, England. The organization is based in San Francisco, California, and has a global reach through its open access
  journals and other scientific literature. PLOS is committed to publishing open access content under the Creative Commons "attribution" license and has raised funds from institutions such as the National
  Institutes of Health and the Howard Hughes Medical Institute to cover author charges.
