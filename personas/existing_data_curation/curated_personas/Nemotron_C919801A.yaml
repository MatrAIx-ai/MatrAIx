personas:
  professional: An aspiring community arts facilitator, Raymundo Acosta blends their fluency in Spanish and English, basic graphic‑design skills on Canva and Photoshop, and compassionate peer‑counseling
    experience to design flexible, culturally resonant programs, while their spontaneous nature often leaves project timelines a bit chaotic.
  sports: A social pick‑up soccer enthusiast, Raymundo Acosta joins weekly games at the Harrisonburg Community Park, follows the James Madison University Dukes basketball team and cheers for the Washington
    Capitals during hockey season, and prefers spontaneous hikes on the Blue Ridge Trail over regimented gym routines, reflecting their love of community and flexible approach to fitness.
  arts: A vibrant street‑art aficionado, Raymundo Acosta spends weekends sketching downtown murals inspired by the bold colors of artists like Banksy and local painter Maya Blue, attends live shows featuring
    salsa rhythms and indie folk acts such as Bon Iver, and volunteers at community art fairs, letting their improvisational comedy background infuse a playful edge into their own creations.
  travel: An adventurous yet budget‑conscious explorer, Raymundo Acosta has hiked Shenandoah National Park’s Old Rag Trail, dreams of documenting traditional art in Havana, and plans a spring trip to Mexico
    City’s vibrant murals while balancing student loans and family expectations, illustrating their blend of curiosity and cautious planning.
  culinary: A home‑cooking enthusiast, Raymundo Acosta regularly prepares arroz con pollo seasoned with saffron and achiote, bakes pastelitos filled with guava paste, and serves crispy plantain chips, though
    they often forget to clean the kitchen promptly after cooking, a quirk that mirrors their laid‑back attitude toward chores.
  core: Raymundo Acosta is a compassionate, arts‑driven 18‑year‑old who juggles spontaneous creativity, mild anxiety, and a habit of leaving dishes piled up while dreaming of building a multicultural arts
    hub.
background:
  cultural: Raymundo is a second‑generation Cuban‑American; his parents emigrated from Cuba in the 1990s. He grew up bilingual, celebrating Cuban traditions such as Noche de San Juan and enjoying pastelitos
    with family. In Harrisonburg, he participates in the local Cuban diaspora community, attending cultural festivals and occasionally teaching basic Spanish to younger children. His heritage informs his
    love for music, rhythm, and communal gatherings, and he sees his cultural identity as a bridge between his family's Cuban roots and his American environment.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Basic graphic design (Canva, Photoshop)'', ''Community outreach and volunteer coordination'', ''Peer counseling and active listening'', ''Social
    media content creation'', ''Event planning and facilitation'', ''Knowledge of contemporary visual arts'']'
  hobbies: '[''Visiting art galleries and street murals'', ''Sketching and digital illustration'', ''Salsa dancing'', ''Cooking Cuban dishes (e.g., arroz con pollo)'', ''Playing pick‑up soccer'', ''Volunteering
    at local shelters and community kitchens'', ''Reading contemporary fiction and philosophy'', ''Hiking in Shenandoah National Park'', ''Participating in improv comedy groups'', ''Journaling and mindfulness
    exercises'']'
  career_goals: Raymundo aims to complete a bachelor’s degree in art therapy or social work with a focus on community arts, and eventually work as a community arts facilitator at a cultural center in Harrisonburg.
    He wants to develop programs that integrate visual art, mental‑health support, and cultural heritage for underserved youth, especially within the Latino community. Long‑term, he envisions creating a
    multicultural arts space that showcases Cuban and other underrepresented cultures, and hopes to travel to Cuba to document traditional art forms and bring those experiences back to his hometown. He
    also aspires to lead a nonprofit that combines artistic expression with social services.
