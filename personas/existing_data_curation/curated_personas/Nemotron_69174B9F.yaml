personas:
  professional: Jeanette Serra, a seasoned salon professional with deep expertise in classic and contemporary hair techniques, runs her boutique with meticulous scheduling, mentors junior stylists, and
    infuses historical fashion insights into client consultations, all while upholding a calm, routine‑focused atmosphere.
  sports: Jeanette Serra enjoys gentle desert hikes on weekends, participates in the Scottsdale Senior Walking Club, practices low‑impact yoga at the community center, and is an avid fan of the Arizona
    Cardinals and the Phoenix Suns, following both teams closely during the football and basketball seasons.
  arts: Jeanette Serra indulges in historical fiction by Hilary Mantel, classic literature by Jane Austen, and knits while listening to Yo‑Yo Ma’s cello suites, frequently attends intimate book‑club meetings,
    and admires the pottery of Maria Martinez at local artisan fairs, letting these artistic pursuits inform their creative approach to styling.
  travel: Jeanette Serra prefers carefully planned, low‑key trips such as a week‑long road tour of the Grand Canyon, a weekend retreat to Sedona’s red‑rock vistas, and envisions a future cultural pilgrimage
    to Florence’s Renaissance museums, always selecting quiet boutique inns and itineraries that allow ample reading time.
  culinary: Jeanette Serra favors Southwest flavors, often preparing prickly pear‑glazed chicken, roasted chiles rellenos, and herb‑infused quinoa salads, enjoys using fresh cilantro, lime, and pomegranate
    seeds, and delights in sharing homemade lavender shortbread with friends during tea hour.
  core: Jeanette Serra is a routine‑loving, kind‑hearted salon veteran who balances meticulous organization with gentle flexibility, finding solace in solitary crafts, desert walks, and quiet community
    service.
background:
  cultural: Jeanette grew up in a middle‑class suburban family of primarily German‑Irish descent in the Midwest, where traditional values of hard work, modesty, and community service were emphasized. Relocating
    to Scottsdale, she has integrated aspects of Southwestern hospitality and the local appreciation for outdoor life while preserving her conventional, routine‑oriented upbringing. Her cultural identity
    blends classic American white heritage with an appreciation for the relaxed, warm climate of Arizona.
attributes:
  skills: '[''Precision haircutting'', ''Foil and balayage coloring'', ''Special‑occasion up‑dos'', ''Scalp health assessment'', ''Color theory application'', ''Client consultation and relationship building'',
    ''Salon scheduling and inventory management'', ''Mentoring junior stylists'', ''Product recommendation and retail'']'
  hobbies: '[''Historical fiction reading'', ''Classic literature'', ''Desert gardening'', ''Crochet and knitting'', ''Gentle desert hikes'', ''Small‑group book club'', ''Volunteer haircuts for seniors'']'
  career_goals: Jeanette aims to transition from being a senior stylist to owning a boutique salon in Scottsdale that offers a calm, routine‑focused environment for regular clients. She envisions the salon
    as a community hub where she can mentor aspiring stylists, host small‑group workshops on classic hair techniques, and collaborate with local artisans for curated product lines. Maintaining a stable,
    high‑quality service standard is paramount, and she plans to achieve professional certification as a master educator within the next two years.
