  hobbies: '[''Soccer'', ''Robotics club'', ''Model kit building (LEGO Technic, model airplanes)'', ''Bicycle maintenance and riding'', ''Multiplayer video gaming'', ''Community volunteer clean‑up events'',
    ''Attending local fairs and festivals'']'
  career_goals: Kevin aims to pursue a career that blends his love for structure, hands‑on work, and teamwork. In the near term, he plans to enroll in his high school's STEM pathway, focusing on robotics
    and automotive technology. He envisions becoming an engineer—either civil or mechanical—so he can contribute to building projects or designing functional systems that benefit his community. Additionally,
    he is intrigued by the idea of volunteering as a firefighter or emergency responder, combining his practical skills with a service‑oriented role.
