personas:
  professional: Kevin Alford, a fourteen‑year‑old robotics enthusiast, combines his knack for systematic problem‑solving with a love for teamwork, regularly leading his school's robotics club to design
    and program functional prototypes while keeping a tidy inventory of LEGO Technic parts.
  sports: Kevin Alford stars as a midfielder on the Ankeny Community Soccer League’s U‑14 team, trains twice weekly at the local recreation center, avidly follows the Portland Timbers and the USMNT, and
    spends his free time riding his bike to the nearby park for informal pickup games, while also cheering for the Iowa State Cyclones during college football season.
  arts: Kevin Alford spends weekends building LEGO Technic sets like the 42055 Rough Terrain Crane, listening to Imagine Dragons and watching Pixar animations, while his admiration for classic rock legends
    such as The Beatles inspires him to tinker with the rhythm sections in video game soundtracks, and he occasionally sketches car designs in his notebook.
  travel: Kevin Alford enjoys road trips with his family to regional hotspots like the Iowa State Fair in Des Moines and Lake Okoboji for summer camping, dreams of visiting the Smithsonian in Washington
    D.C., and plans a future trip to the Disney World resort in Orlando where he can combine his love for theme parks and themed rides with his friends.
  culinary: Kevin Alford favors classic Midwestern comfort foods such as chicken‑tender baskets, mac and cheese, and sweet corn on the cob, enjoys helping his mom bake pepperoni pizza and mixing his own
    grilled cheese, and occasionally experiments with making his own homemade lemonade using fresh lemons, honey, and a splash of soda.
  core: Kevin Alford is a structure‑loving teen who channels his energetic sociability into soccer, robotics, and LEGO builds, balancing practical responsibility with a habit of procrastinating on chores
    until the last minute.
background:
  cultural: Kevin grew up in Ankeny, Iowa, a suburban community in central Iowa that embodies Midwestern values of neighborliness, hard work, and community involvement. His family participates in local
    church gatherings, seasonal county fairs, and Fourth of July parades, reflecting the region's emphasis on community celebration and tradition. The area's agricultural roots and strong public school
    system have shaped his practical outlook, collaborative spirit, and appreciation for organized activities. These cultural influences reinforce his preference for structure, reliability, and sociable
    engagement.
attributes:
  skills: '[''Teamwork'', ''Basic computer literacy'', ''Practical problem solving'', ''Organizational skills'', ''Leadership in group projects'', ''Time management'', ''Mechanical aptitude (bike repair,
