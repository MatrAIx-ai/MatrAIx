  career_goals: While no longer seeking formal employment, Elba aims to remain an active contributor to her community by volunteering as a docent at a local art museum, leading informal art‑talks for senior
    groups, and mentoring younger neighbors interested in creative pursuits. She hopes to curate a small traveling exhibition of senior‑created artworks that highlights unconventional perspectives, and
    she wishes to have her family’s oral histories archived at the Los Angeles Public Library.
