  hobbies: '[''Visiting art galleries'', ''Watercolor painting'', ''Community theater'', ''Book club'', ''Improv comedy classes'', ''Volunteering arts & crafts workshops'', ''Gardening'', ''Cooking and
    hosting potluck dinners'', ''Hiking'', ''Singing in a local choir'', ''Traveling to cultural festivals'']'
  career_goals: Sarah aims to advance into a supervisory or managerial position within her call center, where she can shape customer experience strategies and mentor staff. She wants to develop training
    programs that blend conventional service techniques with creative problem‑solving inspired by her artistic interests. A key ambition is to introduce flexible scheduling options that support work‑life
    balance for her team. Over the longer term, Sarah envisions transitioning to a community outreach coordinator role, leveraging her communication strengths to promote arts education, local cultural festivals,
    and volunteer initiatives throughout Morgan County.
