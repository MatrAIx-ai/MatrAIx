  career_goals: Giovanni aims to transition into a senior executive role where he can integrate his business expertise with his passion for social impact. He envisions leading a division focused on corporate
    social responsibility and employee well-being, championing mental health initiatives, and launching a regional small-business incubator that supports local entrepreneurs in Maine. Over the next five
    years, he also plans to develop a mentorship program that helps emerging leaders balance professional growth with personal resilience.
