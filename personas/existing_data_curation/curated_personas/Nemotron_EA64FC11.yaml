  career_goals: Rodney dreams of a career that lets him design and build practical solutions for people. He is attracted to mechanical engineering because it blends his enjoyment of constructing things
    with his interest in mathematics, and he also wants to deepen his computer programming skills to someday create his own video games or apps. In the short term he plans to join his middle school’s robotics
    club, raise his grades in science and math, and attend a summer coding camp. He hopes these steps will eventually lead to work as an engineer or software developer, and he also imagines giving back
    to his community through STEM outreach or volunteering as a future first responder.
