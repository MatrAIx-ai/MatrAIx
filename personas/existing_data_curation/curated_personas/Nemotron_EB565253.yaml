  career_goals: Carolyn aspires to obtain her GED and eventually work as a community outreach coordinator for a local non-profit, focusing on youth mentorship and neighborhood improvement. She dreams of
    opening a small catering business that specializes in Creole and Southern dishes, leveraging her cooking skills and her ability to engage customers. A long-term ambition is to become a respected leader
    in Metairie’s community development initiatives, using her competitive drive to secure grants and recognition for her projects.
