  hobbies: '[''Gardening'', ''Birdwatching'', ''Quilting'', ''Reading historical novels'', ''Participating in senior center dance nights'', ''Walking with friends'', ''Cooking family recipes'', ''Exploring
    local history museums'']'
  career_goals: Although officially retired, Maria seeks to expand her impact within the community. She aims to mentor younger volunteers at the senior center, develop a intergenerational garden that pairs
    seniors with schoolchildren, and document local history through oral‑history projects. She also hopes to author a memoir that weaves together family culinary traditions and community stories, preserving
    them for future generations. Learning new digital tools, such as video editing, is a personal ambition that supports these goals.
