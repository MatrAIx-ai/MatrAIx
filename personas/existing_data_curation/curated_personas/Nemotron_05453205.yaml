  hobbies: '[''Playing soccer with friends'', ''Drawing and coloring'', ''Reading wildlife and science picture books'', ''Building LEGO structures'', ''Nature walks and collecting rocks/leaves'', ''Weekly
    dance class'', ''Participating in school group projects'', ''Attending community events like the Ellis County Fair'']'
  career_goals: Diana’s emerging ambitions reflect her blend of curiosity, practicality, and competitive spirit. She frequently talks about wanting to become a veterinarian because she loves learning about
    animals and enjoys caring for her family’s pet dog, seeing the role as a practical way to help her community. She also expresses a desire to be a teacher, inspired by her love of sharing interesting
    facts with friends and her enjoyment of leading group activities. In the near future, she aims to be the captain of her school's soccer team, where she can channel her competitive drive and leadership.
    Diana dreams of one day opening a small kid‑science club to combine her curiosity with teaching others, showing a long‑term ambition to blend hands‑on learning with community service.
