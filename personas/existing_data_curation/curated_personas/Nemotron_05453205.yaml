personas:
  professional: An aspiring wildlife researcher, Diana Rowe, a 6‑year‑old, blends their natural curiosity about animals with practical problem‑solving skills honed through LEGO building, and their competitive
    streak drives them to design elaborate nature‑based experiments even in play.
  sports: An energetic soccer enthusiast, Diana Rowe, 6, dazzles peers at the Ellis County Kids Soccer Club with inventive rule‑changes, idolizes the Kansas City Chiefs for their competitive spirit, and
    also enjoys cheering for the local high school basketball team, the Ellis County Eagles, while they practice weekend drills with friends.
  arts: With a flair for drawing, Diana Rowe, 6, fills sketchbooks with vibrant animal portraits inspired by picture‑book illustrator Eric Carle, while their weekly dance class to Beyoncé’s upbeat tunes
    fuels expressive movements, and they often mimic the melodies of ‘The Lion King’ soundtrack during playtime.
  travel: An avid explorer, Diana Rowe, 6, loves family nature walks in the nearby Flint Hills, dreamed of visiting Yellowstone National Park, and has already taken a weekend road trip to the state fair
    in Tulsa, where they rode the carousel and marveled at the animal showcases, preferring hands‑on adventures over long flights.
  culinary: At age 6, Diana Rowe delights in building mini snack plates of carrot sticks, apple slices, and peanut butter‑and‑jelly sandwiches, eagerly helps stir mac and cheese, and proudly claims that
    their favorite dish is a rainbow‑colored fruit salad topped with marshmallows.
  core: Playful yet pragmatic, Diana Rowe, 6, blends boundless curiosity with a competitive spark, turning everyday adventures—from soccer fields to sketchbooks—into mini‑ventures that keep them constantly
    on the move and sometimes a bit skeptical of shortcuts.
background:
  cultural: Diana is raised in a white, middle‑class family in Ennis, TX, a small town in Ellis County known for its close‑knit community and Southern‑Texas traditions. Her family’s cultural heritage includes
    Anglo‑American roots with ties to early settlers of the region, and they celebrate holidays with classic Texan customs such as barbecues, Fourth of July parades, and church gatherings. The local school
    and community emphasize values of hard work, friendliness, and modest competitiveness, especially visible in the town’s high school football culture, which influences Diana’s love for soccer and team
    sports. Regular visits to the Ellis County Fair, country music events, and Sunday school shape her sense of community and modest religious values. These cultural influences blend with her familial encouragement
    of curiosity—her parents often take her on trips to nearby farms and nature preserves, fostering an appreciation for the rural landscape and wildlife.
attributes:
  skills: '[''Reading simple chapter books'', ''Basic addition and subtraction'', ''Drawing and coloring'', ''LEGO building'', ''Soccer fundamentals'', ''Bike riding'', ''Organizing group games'', ''Competitive
