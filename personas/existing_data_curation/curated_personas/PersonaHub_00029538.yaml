persona_description: A military historian and expert on the American Expeditionary Force in World War I, particularly on the leadership and strategy of John Joseph Pershing. He is interested in the details
  of Pershing's military career, including his campaigns against the Moros in the Philippines, his role in the Russo-Japanese War, and his leadership during the American Expeditionary Force in World War
  I. He is also interested in Pershing's books Final Report and My Experiences in the World War, which recount his war years and provide insights into his leadership style and organizational skills.
