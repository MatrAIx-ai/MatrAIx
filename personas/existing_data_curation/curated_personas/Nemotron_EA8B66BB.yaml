personas:
  professional: Delia Bradley, a two-year-old, already thrives on the predictable snack‑time and nap‑time schedule of their preschool, foreshadowing a future as an early‑childhood educator who will blend
    practical organization, sociable energy, and calm resilience into a nurturing classroom environment.
  sports: Delia Bradley, a two-year-old, dashes around the community's 'Tiny Tigers' toddler soccer program each spring, occasionally attempts to copy the celebratory dance of their favorite professional
    NBA team, the Atlanta Hawks, while also joining a weekly parent‑guided baby swim class at the local aquatic club.
  arts: Delia Bradley, a two-year-old, splashes finger paint on paper while humming the classic 'Twist and Shout' by The Beatles, thrills to the animated antics of 'Paw Patrol' and the lively rhythms of
    children's musician Laurie Berkner, and eagerly insists on watching the ballet show of 'The Nutcracker' during holiday family outings.
  travel: Delia Bradley, a two-year-old, enjoys the predictable routine of short, stroller‑friendly road trips, having already visited the San Diego Zoo and the bright aquarium of Monterey Bay, and dreams
    (as whispered through bedtime stories) of a future family vacation to Disney World in Florida, where they can explore theme‑park magic in a carefully planned itinerary.
  culinary: Delia Bradley, a two-year-old, prefers smooth, comforting textures like cheddar mac and cheese and banana‑softened oatmeal, often insisting on a spoonful of finely diced avocado on the side,
    and although their tiny hands are too small to truly cook, they proudly help their mother spread peanut butter on whole‑grain toast, while firmly rejecting anything too crunchy or spicy.
  core: Delia Bradley, a two‑year‑old who thrives on tidy routines yet bursts with sociable energy, blends calm resilience with a habit of meticulously lining up their toys, making them both a comforting
    presence and a tiny, organized whirlwind.
