personas:
  professional: Joel Martineznieves, a retired building superintendent turned senior-center arts coordinator, leverages decades of plumbing and electrical repair expertise, meticulous budgeting, and his
    outgoing curiosity to curate community art shows, mentor apprentices, and organize DIY workshops that blend practical skill with cultural storytelling.
  sports: Joel Martineznieves, a devoted fan of the LA Dodgers and the Los Angeles Lakers, participates in senior exercise classes at the community center, joins a weekly walking club that explores the
    local river trail, and plays light tennis in the spring with the Silver Lake Seniors' Tennis League, balancing his love for team spirit with low-impact fitness.
  arts: Joel Martineznieves, who frequents the Getty Center and the LACMA, finds inspiration in the murals of Diego Rivera and the vibrant canvases of Frida Kahlo while also admiring the modern abstractions
    of Lita Albuquerque, and he spends his afternoons painting watercolors of local street scenes, often humming classic songs by Carlos Santana.
  travel: Joel Martineznieves, a meticulous planner who prefers organized group trips, enjoys annual visits to the historic town of Oaxaca to honor family traditions, dreams of a cultural pilgrimage to
    the art districts of Berlin and Kyoto, and balances these aspirations with weekend excursions to Catalina Island and the hiking trails of Big Bear.
  culinary: Joel Martineznieves, an adept home cook, delights in preparing mole poblano with roasted chiles, chocolate, and panela, hand‑making corn tortillas for tacos al pastor, experiments with chiles
    en nogada using fresh pomegranate seeds, and occasionally over‑salts his pozole when anxiety makes him rush through the simmering process.
  core: Joel Martineznieves blends a methodical handyman’s precision with a vibrant artist’s curiosity, turning community gatherings into cultural showcases while wrestling with bouts of anxiety that both
    fuel his creativity and occasionally derail his routines.
background:
  cultural: Joel was born to Mexican immigrant parents and grew up in a bilingual household in Los Angeles County. He celebrates Día de los Muertos, quinceañeras, and other Mexican traditions, and maintains
    close ties with the local Mexican‑American community. Spanish is his first language, though he is fluent in English. He embodies the values of familismo, respeto, and community solidarity, regularly
    sharing traditional songs, stories, and recipes with neighbors. His working‑class upbringing shaped his practical skillset and deep appreciation for cultural heritage, which he expresses through art,
    food, and community involvement.
