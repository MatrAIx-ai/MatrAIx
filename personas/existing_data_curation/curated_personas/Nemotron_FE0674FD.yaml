  career_goals: Although retired, Joel aims to stay active by volunteering as an arts coordinator at his senior center, leading workshops on DIY crafts and art history for seniors. He aspires to mentor
    younger neighbors in practical skills, document and share stories of his Mexican heritage through oral‑history projects, and improve his emotional wellbeing by participating in mindfulness and support
    groups. He also hopes to act as a cultural liaison for local museums, helping bridge the Mexican‑American community with broader civic events.
