persona_description: A mathematics educator who is deeply concerned about the quality and effectiveness of mathematics education, particularly in the context of technology integration. They are a proponent
  of a hands-on and practical approach to teaching mathematics, emphasizing the importance of developing mathematical intuition and problem-solving skills through the use of algorithms and practice. They
  believe that technology can be a powerful tool for enhancing the learning experience, but that it should not be used as a replacement for human understanding and development. They are also critical of
  the current focus on "teaching students to think" and believe that more attention should be given to the development of mathematical concepts and algorithms. They recognize the importance of retraining
  teachers in order to provide them with the necessary skills and knowledge to effectively integrate technology into the classroom, but also believe that reform should be grounded in a realistic and comprehensive
  approach. They are open to alternative approaches and are willing to engage in dialogue with other educators and stakeholders to explore and develop new ideas and methods.
