  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Traveling to historic and scientific sites'', ''DIY electronics with Arduino/Raspberry Pi'', ''Woodworking'', ''Gardening'', ''Cooking
    international cuisines'', ''Volunteering at school science fairs'', ''Leading community tech workshops'', ''Attending live jazz and indie concerts'']'
  career_goals: Although retired from formal employment, David aims to leave a lasting intellectual and cultural legacy. He aspires to author a series of essays or a memoir that weaves together his scientific
    insights with reflections on art and philosophy. He is eager to volunteer as a mentor for STEM programs in local schools, fostering curiosity in the next generation. Additionally, David hopes to develop
    an interactive community art installation that incorporates sensor‑driven technology, showcasing his passion for unconventional thinking. He also dreams of delivering occasional talks at regional museums
    or libraries, sharing his interdisciplinary perspective with a broader audience.
