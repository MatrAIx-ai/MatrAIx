personas:
  professional: An aspiring coder, Celso Silva leverages Scratch to build interactive games, merges their love for LEGO engineering with algorithmic thinking, and channels a cooperative nature into group
    projects at school while staying organized enough to meet deadlines for class assignments.
  sports: A soccer enthusiast, Celso Silva plays midfield for their neighborhood park team, idolizes San Antonio FC’s attacking midfielders, watches local high‑school matches for tactics, and balances weekly
    practice with occasional pickup basketball games at the community center.
  arts: A budding comic‑artist, Celso Silva sketches superhero‑style characters inspired by Stan Lee and Alex Ross, reads graphic novels like "Maus" and "Bone" in both English and Spanish, and participates
    in the monthly after‑school art club where they exchange feedback with peers.
  travel: An inquisitive traveler, Celso Silva has visited the historic Alamo and the River Walk during family outings, dreams of a road trip to the Grand Canyon during summer break, and prefers to plan
    trips with a mix of online research and crunchy checklist apps, though their allowance limits spontaneous weekend getaways.
  culinary: A kitchen helper, Celso Silva enjoys preparing chicken al pastor tacos and homemade corn masa tamales with chipotle sauce on weekends, experiments with salsa verde made from fresh tomatillos,
    and can assemble a perfect guacamole after watching a short video tutorial, though they sometimes over‑season and need a palate break.
  core: Celso Silva blends curiosity in coding and LEGO building with a cooperative spirit on the soccer field, juggling a modest allowance, seasonal allergies, and a love for comic art while occasionally
    over‑seasoning their tacos.
background:
  cultural: Celso grows up in a Mexican‑American household in San Antonio, where Spanish is spoken at home and English at school. His family celebrates Mexican holidays such as Día de los Muertos and Cinco
    de Mayo, while also embracing Texan traditions like the Fiesta San Antonio. He’s influenced by the vibrant blend of Mexican cuisine, music (banda, corridos) and community values of hospitality and family
    cohesion. The bilingual environment shapes his identity, fostering pride in his heritage while navigating the multicultural fabric of Texas.
attributes:
  skills: '[''bilingual communication (Spanish/English)'', ''basic coding (Scratch)'', ''soccer teamwork'', ''video gaming strategy'', ''drawing and illustration'', ''LEGO building'', ''basic cooking'']'
  hobbies: '[''soccer'', ''Scratch coding'', ''LEGO building'', ''drawing/comic illustration'', ''cooking Mexican dishes with family'', ''watching science documentaries'', ''reading bilingual graphic novels'',
    ''attending local cultural festivals'']'
  career_goals: Celso dreams of a career where he can combine his curiosity about how things work with real‑world impact. He is interested in becoming a civil engineer to design safe bridges and playgrounds
    for his community, or a culinary chef to create modern twists on traditional Mexican cuisine. He also thinks about working in technology, perhaps as a game developer, to merge his love for gaming and
    creativity. He aims to graduate high school, attend a technical college, and eventually give back to his neighborhood.
