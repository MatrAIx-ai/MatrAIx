  career_goals: 'Although retired, Darryl aims to channel his lifelong curiosity into a series of personal projects: he plans to write and self‑publish a memoir that weaves his family history with reflections
    on art and technology; curate a small community art exhibition showcasing local talent; mentor younger artists through weekly workshops at the Poynette public library; acquire advanced digital art skills
    (e.g., Adobe Illustrator) to expand his creative repertoire; and serve on the board of the local historical society to preserve regional heritage.'
