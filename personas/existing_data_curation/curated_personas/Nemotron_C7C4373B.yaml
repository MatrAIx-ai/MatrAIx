personas:
  professional: Michael Deleon, a seasoned food‑service manager with a STEM graduate background, leverages analytical rigor and structured SOPs while flexibly adapting daily kitchen challenges to drive
    efficiency, staff cohesion, and data‑driven menu optimization.
  sports: Michael Deleon enjoys early‑morning kayak paddles on the bayou, follows the Houston Astros in baseball and the New Orleans Saints in football, and joins a local senior softball league each spring,
    keeping his fitness modest but consistent.
  arts: Michael Deleon immerses himself in the blues of B.B. King, the saxophone of John Coltrane, and the historical biographies of Ulysses S. Grant, while his woodworking projects echo a reverence for
    early American craftsmanship and occasional visits to regional art galleries.
  travel: Michael Deleon prefers low‑key road trips to Gulf Coast gems such as Charleston, South Carolina, and the Florida Keys, often booking modest B&Bs on a whim, and dreams of a quiet fishing charter
    on Alaska’s Kenai Peninsula as his next big getaway.
  culinary: Michael Deleon delights in preparing blackened red snapper, shrimp étouffée, and she‑crab soup, seasoning them with fresh thyme, dill, and bay leaves from his herb garden, though he sometimes
    over‑salts when juggling multiple pots during busy family meals.
  core: Michael Deleon is a data‑driven, solitary chef‑manager who combats chronic worry with early‑morning fishing trips, an obsessive inventory spreadsheet habit, and a stubborn reluctance to plan beyond
    the next fishing season.
background:
  cultural: Raised in the Gulf Coast region of Mississippi, Michael grew up immersed in Southern hospitality, a strong sense of community, and a deep appreciation for the sea. His family emphasized practical
    work ethic, self‑reliance, and the importance of shared meals centered around fresh seafood and Southern comfort food. While his education in a STEM field gave him an analytical mindset, his career
    in food‑service reflects the local culinary culture. He participates in regional traditions such as the Pelican Festival and celebrates holidays with large family gatherings that blend church traditions
    with coastal cuisine. This blend of Southern values and coastal lifestyle shapes his worldview and daily habits.
attributes:
  skills: '[''Food safety compliance'', ''Team leadership'', ''Inventory management'', ''Budgeting and cost control'', ''Menu development'', ''Process optimization'', ''Data analysis'', ''POS system operation'',
