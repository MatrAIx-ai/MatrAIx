  hobbies: '[''Saltwater fishing'', ''Kayaking'', ''Reading historical non-fiction'', ''Woodworking'', ''Herb gardening'', ''Cooking Southern seafood dishes'', ''Birdwatching'', ''Community garden volunteering'']'
  career_goals: He aims to transition into a regional operations director role within the next five years, overseeing multiple dining facilities while introducing data‑driven performance metrics that reduce
    waste and improve profitability. Long‑term, Michael hopes to open a small, sustainably sourced seafood restaurant that reflects Gulf Coast culinary traditions, allowing him to mentor emerging chefs
    and managers. Securing ServSafe Expert certification, building a reliable second‑tier management team, and achieving a better work‑life balance to reduce his chronic stress are also top priorities.
