persona_description: A marine geologist and oceanographer who specializes in seafloor mapping and the development of autonomous underwater vehicles (AUVs). They have expertise in high-resolution seafloor
  mapping, geohazard mapping, and the use of AUVs for environmental monitoring and research. They have worked with the MBARI Mapping AUV project and have published research articles on their work using
  the AUV. They are interested in the application of AUVs for mapping geohazards, characterizing benthic habitats, assessing canyon transport, discovering methane hydrates, and understanding seismic and
  volcanic processes.
