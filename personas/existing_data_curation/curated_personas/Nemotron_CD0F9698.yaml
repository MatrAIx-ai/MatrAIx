  career_goals: Cindy aspires to merge her love for art with her strong organizational talent by pursuing a career as a museum curator or community arts program coordinator. She hopes to attend a college
    or community college in Washington, majoring in Art History or Graphic Design while earning scholarships to bridge her current academic gaps. Long‑term, she envisions creating inclusive art exhibitions
    and educational workshops that inspire curiosity and foster well‑being in her community, and she dreams of one day leading a regional arts festival that highlights both local talent and innovative,
    unconventional art forms.
