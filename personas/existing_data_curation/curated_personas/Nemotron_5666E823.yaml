  hobbies: '[''gardening'', ''quilting'', ''reading historical novels'', ''walking in parks'', ''church socials'', ''volunteering at food bank'', ''cooking comfort foods'', ''birdwatching'']'
  career_goals: As she approaches retirement, Brooke aims to transition into a part‑time mentor or trainer role where she can share her customer‑service expertise with newer employees. She hopes to complete
    the remaining credits toward an associate degree in business administration, obtain a certification in customer‑service leadership, and reduce workplace stress by advocating for more flexible scheduling.
    Outside of work, she plans to volunteer at the local senior center and possibly start a small community garden project that combines her love of nature with outreach.
