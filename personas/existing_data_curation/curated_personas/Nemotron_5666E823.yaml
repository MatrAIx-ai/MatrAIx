personas:
  professional: Brooke Garrett is a veteran customer-service specialist transitioning toward part-time mentorship, leveraging decades of active listening, conflict de-escalation, and CRM expertise while
    their natural curiosity and flexible, sometimes disorganized, approach enables them to adapt training sessions on the fly and nurture a supportive learning environment.
  sports: Brooke Garrett enjoys low-impact fitness through daily walks across the Bob Kerrey Pedestrian Bridge, participates in a senior aqua-aerobics class at the Omaha Community Center, and roots for
    the Nebraska Cornhuskers football team and the Omaha Storm Chasers baseball club during the respective seasons.
  arts: Brooke Garrett channels their love of storytelling into quilting circles, drawing pattern inspiration from Kaffe Fassett while listening to Joan Baez and re-watching classic films starring Meryl
    Streep, and they regularly attend the Orpheum Theater’s productions of historical dramas.
  travel: Brooke Garrett prefers relaxed, moderately planned road trips—like the yearly visits to Yellowstone and a recent weekend getaway to Chicago’s Art Institute—while dreaming of a low-key pilgrimage
    to the Scottish Highlands, balancing travel costs with their fixed retirement income.
  culinary: Brooke Garrett savors comfort cooking, skillfully preparing heirloom tomato sauces, classic chicken-and-dumplings, and a family-style German potato salad seasoned with fresh dill, while occasionally
    experimenting with quinoa-stuffed peppers to blend tradition with curiosity.
  core: Brooke Garrett is a warm-hearted, curiosity-driven mentor who balances a love of garden-fresh tomatoes with occasional forgetfulness about medications, finding solace in quilts and quiet walks while
    quietly fretting over unfinished tasks.
background:
  cultural: Brooke’s cultural background is rooted in the Midwestern tradition of Omaha, Nebraska. She comes from a family with German‑Scandinavian ancestry common among many white Nebraskans, which influences
    her appreciation for hearty home‑cooked meals and community gatherings. Growing up in a modest, religious (Methodist) household, she values modesty, cooperation, and civic responsibility. Her long‑standing
    ties to the Douglas County area have fostered a strong sense of local identity, reflected in her participation in neighborhood events, volunteer work, and the preservation of regional customs.
