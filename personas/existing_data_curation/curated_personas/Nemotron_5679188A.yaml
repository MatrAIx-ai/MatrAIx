  career_goals: Although no longer part of the formal workforce, Ana remains driven by personal aspirations that honor her heritage and creative spirit. She aims to compile a memoir of oral histories from
    older Mexican‑American neighbors in Fresno, preserving their stories for future generations. She hopes to publish a small collection of her poems and paintings that blend traditional motifs with modern
    abstraction. Ana also wants to establish a monthly art circle for seniors, fostering connection and creative expression, and she plans to learn digital art tools on a tablet to expand her medium. Finally,
    she is committed to practicing mindfulness and gentle yoga to manage her anxiety and maintain emotional well‑being.
