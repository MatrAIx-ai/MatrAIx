  career_goals: 'Melissa aims to transition into a senior engineering leadership role where she can shape product strategy while fostering inclusive, high‑performing teams. She envisions leading AI‑enhanced
    applications that address the unique needs of the Mexican‑American community, such as bilingual health tech platforms. Mentorship is a core ambition: she wants to launch a mentorship program for underrepresented
    women in tech and partner with local schools to provide coding workshops. Over the next five years, she plans to earn a professional certification in cloud architecture (AWS Solutions Architect) and
    to build a reputation as a thought leader who balances innovative experimentation with disciplined delivery, ultimately achieving a work‑life rhythm that mitigates her stress sensitivity.'
