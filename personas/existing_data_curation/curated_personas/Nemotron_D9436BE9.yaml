personas:
  professional: Nancy Brown, a retired business administrator with a knack for strategic budgeting, now channels her practical curiosity into pro bono consulting for local nonprofits, leveraging her conflict‑resolution
    flair to mentor young entrepreneurs while juggling a love of community events with a habit of misplacing her planner.
  sports: Nancy Brown follows the Mississippi Braves baseball team and the New Orleans Saints, participates in a local beach‑walking club each morning, and enjoys seasonal senior softball leagues, combining
    casual exercise with spectatorship of Southern sports.
  arts: Nancy Brown finds solace in painting seascapes reminiscent of Winslow Homer, devotes evenings to knitting detailed blankets for charity inspired by the timeless blues performances of B.B. King tributes,
    and regularly attends local blues festivals, letting the soulful music shape her creative rhythm.
  travel: Nancy Brown favors road trips to historic Gulf‑Coast towns such as Mobile, Charleston, and Savannah, planning itineraries on a whim to explore colonial architecture and local markets, while balancing
    her love for spontaneous discovery with a modest travel budget.
  culinary: Nancy Brown delights in Southern cooking, frequently preparing shrimp‑and‑grits with fresh garden thyme, collard greens seasoned with smoked turkey, and pecan pie, while her cooking‑workshop
    experiment incorporates heirloom vegetables like purple carrots and heirloom tomatoes.
  core: Nancy Brown blends a practical, curious mind with a love of garden‑to‑table Southern cuisine, blues music, and community mentoring, yet her relaxed approach often leads to forgotten appointments
    and slightly chaotic creativity.
background:
  cultural: Nancy grew up in the Gulf Coast region of Mississippi, absorbing the warm hospitality and close‑knit community values characteristic of Southern culture. Her upbringing was shaped by Mid‑South
    traditions—family gatherings centered around seafood and fried chicken, a love for blues and gospel music, and an appreciation for local storytelling. She attended a regional university for her business
    degree, exposing her to broader perspectives while retaining a strong sense of place. As a white Mississippian who lived through the social changes of the 1960s and 1970s, she blends reverence for tradition
    with an open curiosity toward new ideas, a balance that informs both her personal and civic engagements.
