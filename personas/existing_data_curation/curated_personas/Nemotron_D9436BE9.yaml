    ''Community potlucks'']'
  career_goals: Though officially retired, Nancy is eager to stay intellectually active and socially valuable. She aims to offer pro bono business consulting to small nonprofit organizations in Ocean Springs,
    volunteer as a mentor for young entrepreneurs, and write a memoir chronicling her life on the Gulf Coast. Her flexible nature also drives a desire to develop a modest garden‑to‑table produce venture
    that could support occasional cooking workshops, while occasional road trips to historic coastal towns satisfy her curiosity about new ideas and places.
