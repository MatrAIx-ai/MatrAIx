personas:
  professional: Jorge Hidalgo, an aspiring community outreach coordinator, channels his methodical project‑planning talent and bilingual public speaking into designing well‑structured bilingual festivals
    for local nonprofits, thriving as the charismatic hub of collaboration while keeping meticulous timelines and contingency plans.
  sports: Jorge Hidalgo plays forward for the Woodland Wolves amateur soccer league, proudly supports the Los Angeles FC and Los Angeles Dodgers, joins the Sierra Foothills Hiking Club for weekend treks,
    and balances his love for team competition with solo cardio runs to manage stress.
  arts: Jorge Hidalgo creates eye‑catching event flyers using Adobe Illustrator, drawing visual inspiration from the street‑art mystique of Banksy, the vivid storytelling of director Guillermo del Toro,
    and the melodic pop sensibilities of Taylor Swift and Ed Sheeran, while also leading a local folk‑dance troupe that showcases traditional choreographies at community festivals.
  travel: Jorge Hidalgo dreams of exploring the colorful festivals of Oaxaca and the historic streets of Guanajuato, has already hiked the Sierra Nevada trails, visited Lake Tahoe and San Diego, and plans
    a budget‑friendly backpacking trip through Patagonia, favoring itineraries that blend cultural immersion with opportunities for community outreach.
  culinary: Jorge Hidalgo enjoys perfecting mole with roasted pasilla chilies and chocolate, mastering tamales wrapped in corn husks, whipping up chilaquiles with fresh cilantro and cotija cheese, and posts
    his aromatic creations—often featuring masa harina, tomatillos, and avocado—on Instagram, where he engages followers with cooking tips and family‑recipe stories.
  core: Jorge Hidalgo is an organized social butterfly who blends meticulous event planning with a love for communal celebration, battles chronic worry through journaling, and occasionally overcommits,
    spending impulsively on vibrant festival supplies while dreaming of bridging tradition and modern outreach.
background:
  cultural: Jorge grew up in a Mexican‑American household in Woodland, where family gatherings revolve around shared meals, music, and traditions such as Día de los Muertos and Cinco de Mayo celebrations.
    His parents instilled a strong sense of pride in his Mexican heritage while encouraging bilingual education and integration into the broader Californian community. He regularly attends the local Mexican
    cultural festival and participates in the church’s youth group, which blends Catholic rituals with community service. This cultural foundation shapes his values of family loyalty, respect for elders,
    and a desire to give back to the Latino community through organized events and advocacy.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Public speaking'', ''Event planning and coordination'', ''Leadership'', ''Time management'', ''Project organization'', ''Social media management'',
