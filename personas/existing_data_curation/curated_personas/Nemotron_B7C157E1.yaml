  hobbies: '[''Soccer'', ''Mexican folk dancing (ballet folklórico)'', ''Community volunteering'', ''Cooking traditional Mexican dishes'', ''Social media content creation'', ''Mindfulness journaling'',
    ''Hiking'', ''Graphic design for event promotion'']'
  career_goals: Jorge aims to complete his associate’s degree in Business Administration and transfer to a four‑year university to study Marketing or Public Relations. He envisions a career as a project
    manager or community outreach coordinator, ideally within a nonprofit or cultural organization that serves the Mexican‑American community in California. He plans to earn a Project Management Professional
    (PMP) certification within the next five years and ultimately hopes to launch his own events company that organizes bilingual festivals, career fairs, and youth mentorship programs, providing structured,
    predictable opportunities for community growth.
