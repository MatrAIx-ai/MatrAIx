personas:
  professional: Jorge Marquez, a retired handyman and community mentor, uses his decades‑long carpentry, small‑engine repair, and gardening expertise to teach seniors practical skills at the local senior
    center, combining his critical, no‑nonsense approach with a love for routine and storytelling.
  sports: Jorge Marquez, a staunch supporter of the Criollos de Caguas baseball team, watches games at the town plaza with a group of friends while sipping cafecito, enjoys casual fishing trips to the nearby
    Río Grande, and plays competitive dominoes at the community center, which he treats as his own sport.
  arts: Jorge Marquez, a devoted aficionado of bomba and plena, fills his home with recordings by El Gran Combo de Puerto Rico, Willie Colón, and local bomba ensemble Bomba Libre, and often joins spontaneous
    dance circles at the annual fiesta patronal, letting the rhythms reinforce his connection to community heritage.
  travel: Jorge Marquez, whose travel style favors short, purposeful trips, frequently takes a bus to explore San Juan’s historic Old Town and the lush El Yunque rainforest, while dreaming of a pilgrimage
    to Santiago de Cuba to sample its renowned coffee, yet his age limits him to island excursions and occasional family cruises.
  culinary: Jorge Marquez, a meticulous home chef, prepares traditional dishes such as arroz con gandules, pasteles wrapped in banana leaves, and mofongo made with freshly fried plantains and local chicharrón,
    seasoning everything with adobo and sofrito while proudly harvesting guava, mango, and coffee beans from his garden, though he occasionally forgets to drain excess oil, leaving his mofongo a bit greasier
    than intended.
  core: Jorge Marquez, an 85‑year‑old gardener, handyman, and storyteller, clings to daily routines, fiercely competes at dominoes, cooks with passion, and balances skeptical pragmatism with a deep love
    for his community’s traditions.
background:
  cultural: Jorge was raised in a traditional Puerto Rican household in Comerio, where family, Catholic faith, and community festivals shaped his identity. He grew up speaking Spanish and deeply respects
    the island’s agricultural heritage, participating in seasonal planting and harvest rituals. His life is intertwined with local customs such as the annual fiesta patronal, communal meals, and the strong
    emphasis on hospitality. He values the close‑knit family structure, often gathering relatives for Sunday lunches, and he upholds the island’s reverence for music and dance, especially bomba and plena,
    as expressions of cultural pride.
