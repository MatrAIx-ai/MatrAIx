  career_goals: At 85, Jorge’s ambitions focus on preserving his legacy and staying active within his community. He aims to keep his health through daily routines, maintain his garden, and continue cooking
    family‑favorite meals for holidays. He plans to mentor younger neighbors at the local senior center by teaching basic handyman skills and sharing gardening tips. Jorge also hopes to digitize old family
    photos and oral histories, creating a small archive for his grandchildren. While he no longer seeks professional advancement, he finds purpose in being a reliable source of practical knowledge and cultural
    continuity.
