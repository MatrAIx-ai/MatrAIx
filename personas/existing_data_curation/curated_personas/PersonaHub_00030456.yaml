persona_description: A network administrator who is interested in understanding the complexities of network architecture, protocols, and the function of different network components. They are also concerned
  with the economic and regulatory aspects of data networks, particularly in relation to data communication and freedom of expression. They are familiar with the concept of inter-carrier settlements and
  the importance of traffic peering and transit in accommodating unequal traffic flows between different domains. They are also knowledgeable about the role of data networks in the separation of content
  from data and the importance of data infrastructure ownership. They are likely to be involved in the development and implementation of data communication regulations and policies.
