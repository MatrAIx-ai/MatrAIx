  hobbies: '["Watercolor Painting", "Photography", "Community Theater Attendance", "Visiting Art Museums and Galleries", "Community Gardening", "Cooking and Experimenting with New Recipes", "Reading Historical
    Fiction and Travel Memoirs", "Knitting", "Volunteering as a Historic District Docent", "Walking and Exploring Local Neighborhoods"]'
  career_goals: Emily aims to progress within the district’s transportation department, seeking a supervisory or coordinator role where she can influence route design, safety training, and community outreach.
    She intends to obtain a commercial driver’s license with a passenger endorsement and a certification in transportation management to broaden her qualifications. She is also interested in creating partnerships
    between the school system and local arts organizations, facilitating curriculum‑aligned field trips that enrich students’ cultural experiences. Long‑term, Emily hopes to mentor a new generation of drivers
    and perhaps serve on the school board’s transportation committee to advocate for safer, more inclusive student travel.
