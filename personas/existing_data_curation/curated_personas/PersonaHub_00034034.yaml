persona_description: A neuroscientist who specializes in the study of the neural code, specifically the ability to observe and control the spiking activity of neurons in response to outside stimuli and
  artificial activity. He has been developing approaches to better understand and control the neural code since 1997 and has published about 40 journal articles in this area. He is interested in the challenges
  that remain to read and write the neural code and suggests that the specific timing of electrical pulses is crucial to interpreting the code. His research has the potential to benefit individuals with
  epilepsy and Parkinson's disease, restore lost function following a brain injury, and supply artificial brain signals that provide tactile sensation to amputees wearing a prosthetic device.
