data:
  user 1 personas: 'To free my mind from feeling depressed i look up at the stars at night.

    I cannot choose between lollipops and rainbows.

    I hate cleaning up after my husband and children.

    I believe in aliens.

    I would love to be a professional eater and not get fat.'
  user 2 personas: 'I am a widow.

    My parents were divorced.

    I grew up with 6 siblings.

    I ve broken my arm twice.'
  Best Generated Conversation: 'User 1: Hi! I''m feeling a little down today, so I''m looking up at the stars to clear my mind. What do you do to de-stress?

    User 2: Hi! I''m sorry to hear that you''re feeling down. I usually like to go for a walk, or read a book, or watch a movie to de-stress.

    User 1: I''ve never been much of a reader, but I do like to watch movies. What''s your favorite movie?

    User 2: It''s hard to choose just one, but I''d have to say The Shawshank Redemption is my favorite movie of all time.

    User 1: I''ve heard great things about that movie! I''ve been meaning to watch it, but I haven''t gotten around to it yet.

    User 2: You should definitely watch it! It''s a really good movie.

    User 1: I will! Thanks for the recommendation.

    User 2: You''re welcome! So, what do you do for fun?

    User 1: I like to spend time with my family and friends, go for walks, and read books.

    User 2: That sounds like fun! I like to spend time with my family and friends too. We go on a lot of trips together.

    User 1: That sounds like a lot of fun! I''ve always wanted to go on a trip with my family, but we''ve never had the time.

    User 2: You should definitely make time for it! It''s a lot of fun and you get to spend quality time with your family.

    User 1: I will! Thanks for the suggestion.

    User 2: You''re welcome!'
