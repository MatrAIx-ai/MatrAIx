persona_description: A political historian who specializes in the study of women's political activism in the United States, particularly during the 1960s and 1970s. Her research interests include the experiences
  of women political candidates, the role of religion in political campaigns, and the impact of regional and local political elections on national politics. She is particularly interested in the experiences
  of women political candidates who are Mormons and how their experiences compare to those of women political candidates who are not Mormons. She is also interested in the larger historical trends within
  the Mormon women's political activism movement, such as the passage of the Equal Rights Amendment and the role of women in the home.
