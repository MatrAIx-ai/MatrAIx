personas:
  professional: An accomplished community treasurer, Samantha Garcia draws on their decades of small-business bookkeeping and meticulous budgeting to keep the condominium association’s finances orderly,
    while their routine-driven nature and gentle, detail-focused communication style ensure volunteers feel supported and deadlines are never missed.
  sports: A dedicated walker who enjoys the crisp trails of Morton Arboretum, Samantha Garcia participates in a senior walking club, supports the Chicago Cubs and Chicago Bears with weekly game viewings,
    and occasionally joins a gentle yoga class at the local community center to stretch their hands after crocheting.
  arts: A literary enthusiast, Samantha Garcia leads a close‑knit book club where they discuss works by Jane Austen, Leo Tolstoy, and historian David McCullough, while also finding solace in the organ hymns
    of their church choir and occasional evenings listening to Vivaldi’s Four Seasons on their old record player.
  travel: A methodical planner, Samantha Garcia prefers short, well-organized trips such as a weekend stay in Colonial Williamsburg for historic tours, a train journey to Chicago’s Museum of Science and
    Industry, and a family reunion vacation in San Miguel de Allende, always packing detailed itineraries and a spare set of prescription glasses.
  culinary: A seasoned home baker, Samantha Garcia perfects their apple pie with Granny Smith apples, a hint of cinnamon and nutmeg, and uses fresh rosemary from their garden to garnish savory dishes like
    rosemary-infused roasted potatoes, yet often forgets to set the timer and ends up checking the oven every few minutes.
  core: Samantha Garcia blends a love for routine garden care, meticulous bookkeeping, and community service with a gentle, worry‑prone heart that cherishes quiet comforts and small, purposeful variations
    in daily life.
background:
  cultural: Samantha was raised in post‑war suburban Chicago, embodying classic Midwestern American values of diligence, modesty, and community involvement. Her family’s heritage is rooted in European American
    traditions, and she grew up in a predominantly white, middle‑class neighborhood where church and neighborhood events were central to social life. Living in Westmont, DuPage County, she has been shaped
    by the region’s emphasis on neighborhood cohesion, local parish activities, and seasonal community celebrations. These cultural influences have reinforced her preference for routine, practicality, and
    a focus on harmony within small groups. Her worldview reflects a traditional, pragmatic outlook typical of many long‑time Midwestern residents.
