  career_goals: Samantha aims to remain actively engaged in her community and maintain her personal well‑being. She plans to continue serving as treasurer for her homeowners association and to expand her
    role as a volunteer fundraiser for the local church, mentoring younger volunteers in basic bookkeeping and event planning. She also seeks to preserve her family’s history by organizing photographs,
    documents, and genealogical records for future generations. Additionally, she is focused on managing her retirement savings prudently to ensure financial security and to provide support for her adult
    children and grandchildren. A long‑term personal ambition is to cultivate a balanced lifestyle that honors routine while allowing small, meaningful variations that keep her mind active.
