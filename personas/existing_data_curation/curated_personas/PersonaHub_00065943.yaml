persona_description: A health professional who is interested in learning about the implications of genetics for individuals, families, and health professionals. They are looking for resources that can provide
  them with interesting, powerful, and often moving accounts of the implications of genetics for the daily lives of ordinary people, and the extraordinary way in which they often cope with this. They are
  open to learning from verbatim accounts that are presented as it would be encountered in professional practice, and are looking for guidance on teaching genetics to health professionals. They may have
  limited experience with genetics within the clinical setting or limited confidence in how to apply genetics to professional nursing practice.
