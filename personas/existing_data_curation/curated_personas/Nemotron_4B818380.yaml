personas:
  professional: Gloria Calixte is a budding LEGO architect who, with meticulous planning and a love for hands‑on creation, turns block designs into mini‑projects that showcase their curiosity for engineering
    while eagerly sharing their builds with classmates, embodying their organized and compassionate nature.
  sports: Gloria Calixte enjoys kicking a soccer ball with the neighborhood after‑school club, cheers on the New York Yankees on television, and stretches with yoga videos to stay flexible, and they balance
    playful activity with a calm, methodical routine.
  arts: Gloria Calixte paints vibrant murals inspired by the bold patterns of artist Yayoi Kusama and the rhythms of Beyoncé and Stevie Wonder, while their art club explorations include copying sketches
    from Dr. Seuss books and they dance to compas beats that let them express their lively imagination.
  travel: Gloria Calixte daydreams about flying to the Grand Canyon’s rim after a school field trip to the nearby state park, and they hope to explore the colorful streets of Barcelona someday, preferring
    trips that blend hands‑on learning at museums with plenty of time to sketch nature scenes.
  culinary: Gloria Calixte loves helping prepare rice and beans with black pepper and cilantro, eagerly mixes pancake batter with blueberries, and they can whip up a simple quesadilla using cheese and corn
    tortillas, showing a budding comfort‑food palate and a keen willingness to experiment in the kitchen despite occasional messes.
  core: Gloria Calixte is a meticulous, curiosity‑driven seven‑year‑old who balances heartfelt compassion with an anxious streak, channeling energy into building LEGO worlds, vibrant murals, and community
    clean‑ups, all while keeping a careful eye on their allowance and health.
background:
  cultural: Gloria comes from a Black family with Haitian roots living in Laurel, Maryland. Her household blends Haitian Creole language and traditions—such as celebrating Haitian Independence Day and enjoying
    dishes like griot and plantains—with the broader African‑American culture of Prince George’s County. She attends a local public school with a diverse student body and her family participates in community
    events at the local church and cultural festivals, reinforcing values of solidarity, respect, and collective well‑being.
