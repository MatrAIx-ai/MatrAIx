  career_goals: Gloria dreams of becoming a teacher or a community health worker who can nurture and support other children. She also imagines caring for animals as a future veterinarian. Ultimately, she
    hopes to create safe, harmonious environments where everyone feels cared for, using her natural compassion and organizational skills to lead community projects and promote kindness.
