personas:
  professional: Tita Rivas, a meticulous animal care technician-in-training, blends a curiosity about wildlife with disciplined organization to excel at animal handling, health assessments, evidence‑based
    enrichment design, rigorous sanitation, precise record‑keeping, and bilingual coordination with staff and the local community.
  sports: Tita Rivas enjoys prairie hiking and bird‑watching with the local Kansas Trail Club, follows the Wichita Thunder hockey team and the Kansas City Chiefs football squad, and fits weekly runs into
    their schedule to maintain endurance for fieldwork.
  arts: Tita Rivas channels creativity into wildlife photography, crafting DIY enrichment toys inspired by ethology research, while listening to folk‑rock artists like John Denver and contemporary author
    Temple Grandin, allowing artistic expression to inform their animal‑care perspective.
  travel: Tita Rivas dreams of road‑tripping across the Great Plains to explore tallgrass prairies, has already camped in Tallgrass Prairie National Preserve, plans future trips to Patagonia’s wildlife
    reserves, and balances travel ambitions with a student budget by booking off‑season stays.
  culinary: Tita Rivas cooks traditional family heritage dishes such as corn‑based tacos, mole sauce, and homemade salsa, favoring ingredients like chilies, masa harina, cilantro, and cumin, and enjoys
    experimenting with fusion twists while maintaining an intermediate cooking skill level.
  core: Tita Rivas is a disciplined, curious 21‑year‑old animal‑care enthusiast who blends scientific rigor with creative flair, balances tight budgeting with occasional splurges, and pursues prairie hikes,
    photography, and heritage cooking with organized passion.
background:
  cultural: Tita is a second‑generation Mexican‑American who grew up in a bilingual household in Wichita. Her family places great value on hard work, community, and family ties, traditions that shape her
    compassionate yet self‑disciplined outlook. She celebrates Mexican holidays such as Día de los Muertos and Cinco de Mayo, maintains fluency in Spanish, and actively participates in local cultural events
    and Mexican community groups. These cultural influences inform her respectful, community‑oriented approach to animal care and her desire to bridge cultural gaps by offering bilingual education and support
    to Spanish‑speaking pet owners.
attributes:
  skills: '[''Animal Handling and Restraint'', ''Animal Health Assessment'', ''Veterinary First Aid'', ''Nutrition Planning'', ''Enrichment Design'', ''Sanitation and Biosecurity'', ''Record Keeping and
    Data Entry'', ''Inventory Management'', ''Bilingual Communication (Spanish/English)'', ''Team Coordination'', ''Customer Service'']'
  hobbies: '[''Hiking and Bird Watching'', ''DIY Animal Enrichment Crafting'', ''Cooking Mexican Cuisine'', ''Folklorico Dancing'', ''Volunteer Animal Rescue'', ''Photography'', ''Reading Animal Behavior
    Literature'', ''Gardening Native Plants'']'
  career_goals: Tita aims to augment her high school background with an Associate's degree in Animal Science and become a Certified Veterinary Technician. She aspires to advance to a Lead Animal Caretaker
    position at the Wichita Zoo, where she can implement and refine standard operating procedures that raise animal welfare standards. Long‑term, she envisions launching a bilingual community outreach program
    that educates Spanish‑speaking pet owners on responsible care and eventually establishing a small animal rescue sanctuary that reflects her commitment to both practicality and innovative, compassionate
    stewardship.
