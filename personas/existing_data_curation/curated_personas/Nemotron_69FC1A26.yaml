personas:
  professional: Rafaela Ibarra, a veteran educator with a bachelor's in education and over twenty years of classroom experience, leverages bilingual fluency, methodical project coordination, and a lifelong
    love of the arts to design age‑appropriate curricula, mentor newly hired teachers, and lead community art‑focused festivals and a senior storytelling program.
  sports: Rafaela Ibarra, a lively participant in community dance nights, pairs her salsa and folk dance sessions with weekly walks along the Illinois River Trail, cheers on the Chicago Cubs and Chicago
    Bulls, and plays gentle pickleball matches at the senior center’s recreation hall.
  arts: Rafaela Ibarra channels her artistic spirit into watercolor paintings of the prairie, crocheting detailed blankets for neighbors, and finds inspiration in the works of Georgia O'Keeffe, Claude Monet,
    and the music of John Legend, which she weaves into her community workshops.
  travel: Rafaela Ibarra enjoys well‑planned road trips to regional attractions like Starved Rock State Park and Galena, dreams of cultural journeys to Seville and Barcelona, but balances these aspirations
    with a modest vacation fund and family commitments, often opting for short weekend getaways.
  culinary: Rafaela Ibarra loves to craft traditional dishes such as mole rich with chocolate and dried chilies, tamales wrapped in corn husks, and hearty pozole brimming with hominy, using garden‑fresh
    cilantro, chilies, and tomatoes, and has progressed from home cooking to occasionally catering neighborhood gatherings.
  core: Rafaela Ibarra is a methodical, art‑driven community pillar who blends teaching, festival planning, and vibrant cooking, yet often worries about overextension and forgets to pause for self‑care.
background:
  cultural: Rafaela was born to Mexican parents who immigrated to the United States in the early 1970s. Growing up, her household blended Mexican customs—such as celebrating Día de los Muertos, preparing
    tamales during the holidays, and listening to mariachi music—with Midwestern values of modesty and community involvement. She is fluent in Spanish and maintains strong ties to her extended family in
    Veracruz, visiting frequently and keeping the language alive through daily conversation. In Hinckley, Rafaela has become a cultural bridge, introducing Mexican culinary workshops at the local community
    center and advocating for the inclusion of Mexican‑American history in school curricula. Her Mexican heritage influences her worldview, emphasizing family cohesion, respect for elders, and a vibrant
    appreciation for color, music, and storytelling.
attributes:
  skills: '[''Curriculum Design'', ''Classroom Management'', ''Bilingual Instruction (English‑Spanish)'', ''Educational Technology Integration'', ''Workshop Facilitation'', ''Public Speaking'', ''Event
