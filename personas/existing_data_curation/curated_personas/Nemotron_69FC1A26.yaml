  hobbies: '[''Watercolor painting'', ''Traditional Mexican cooking'', ''Crocheting'', ''Gardening'', ''Book club (historical fiction & memoirs)'', ''Reading mentorship for elementary students'', ''Salsa
    and folk dancing'', ''Volunteer event organization'', ''Community art fair participation'', ''Genealogy research'', ''Journaling for emotional processing'', ''Yoga and mindfulness practice'']'
  career_goals: Looking ahead, Rafaela wants to channel her expertise into volunteer and community‑focused roles rather than re‑entering the formal workforce. She aims to establish a weekly art‑and‑storytelling
    program for senior residents in Hinckley, creating a space where participants can share memories and create collaborative artworks. She also hopes to develop a bilingual mentorship scheme that pairs
    retired teachers with new educators in the DeKalb County school district, offering guidance on classroom strategies and cultural sensitivity. Writing a bilingual children’s book that celebrates Mexican
    folklore and Midwestern life is another personal ambition. To deepen her ability to support mental well‑being, Rafaela plans to complete a certificate in art therapy. Ultimately, she envisions herself
    as a cultural liaison who helps bridge Mexican‑American traditions with the broader community, fostering inclusive celebrations such as a local Día de los Muertos event.
