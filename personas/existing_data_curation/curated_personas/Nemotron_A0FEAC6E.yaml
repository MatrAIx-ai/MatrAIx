  career_goals: She aims for a career that combines clear structure with a service mindset, such as civil engineering, environmental planning, or school librarianship. Danei wants to design safe, functional
    community spaces or manage an organized library where she can help others find information efficiently. She plans to strengthen her analytical and organizational skills throughout high school and pursue
    related studies in college.
