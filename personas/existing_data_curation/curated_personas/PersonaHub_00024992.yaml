persona_description: A professor of sociology and women's and gender studies, Emily Kazyak and Kelsy Burke, who have studied religious freedom laws and LGBTQ rights for years and have published multiple
  studies on the subject. They are working under a grant from the National Science Foundation to research the civil rights of minorities and whether individuals may be exempt from adhering to nondiscrimination
  laws because of religious belief.
