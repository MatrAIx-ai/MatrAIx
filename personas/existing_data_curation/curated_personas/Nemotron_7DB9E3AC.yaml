personas:
  professional: Timothy Sprayberry is a budding LEGO architect whose methodical, organized mind turns each set into a miniature city, applying the same structured planning they use for school projects while
    channeling their emotional intensity into perfecting every tiny connection.
  sports: Timothy Sprayberry plays organized soccer with the Little Lions youth league, follows the Seattle Sounders on TV for tactical inspiration, and practices drills on a schedule that satisfies their
    love of structure while balancing the occasional solo jog through the neighborhood trails to explore bugs and rocks.
  arts: Timothy Sprayberry spends afternoons drawing detailed neighborhood scenes inspired by the animated series ‘Adventure Time’ and the illustrative style of Art Spiegel, while listening to the upbeat
    tunes of ‘They Might Be Giants’ and the kid‑friendly covers of ‘Kidz Bop’ as background music for their creations.
  travel: Timothy Sprayberry enjoys weekend hikes to the nearby state park where they collect rocks, has visited the local aquarium on a family trip, and dreams of exploring the Grand Canyon’s vast cliffs
    and the Great Barrier Reef, planning each outing with a checklist that includes snacks, a sketchbook, and a bug‑catching net.
  culinary: Timothy Sprayberry loves homemade pizza topped with pepperoni, mushrooms, and olives, enjoys a bowl of buttery macaroni and cheese, can whisk together a simple garden salad with carrot sticks
    and cherry tomatoes, and prefers the sweet crunch of apple slices dipped in peanut butter for snack time.
  core: Timothy Sprayberry is a methodical, anxiety‑prone 7‑year‑old who finds comfort in structured play, meticulous saving, and detailed drawing, yet often wrestles with over‑thinking everyday choices.
background:
  cultural: Timothy is raised in a Midwestern white family in Elizabeth, Indiana, where community involvement, modesty, and a strong work ethic are valued. Family life includes regular Sunday gatherings,
    participation in school and town events, seasonal fairs, and a focus on practical skills and mutual support, reflecting the cultural norms of rural Indiana.
