persona_description: A paleontologist who specializes in the study of Ediacaran fossils and the Cambrian explosion. They are particularly interested in the similarities between the Ediacaran organisms and
  the complex body plans that appeared suddenly in the Cambrian explosion. They are aware of the controversy surrounding the discovery of the Ediacaran organism known as Plexus ricei and are skeptical of
  the claims made by the researchers. They are also aware of the potential implications of this discovery for the theory of evolution.
