persona_description: A scientist or researcher who is passionate about the chemical and environmental impacts of plastics and is interested in developing sustainable alternatives. They are knowledgeable
  about the production of carboxylic acids from renewable sources, their applications in the synthesis of polyesters and polyamides, and the challenges and opportunities in the chemocatalytic process for
  producing biomass-derived carboxylic acids. They are also interested in the technology status, advantages and drawbacks of different routes in terms of feedstock, reaction pathways, catalysts, and economic
  and environmental evaluation. They are looking for new research and advancements to overcome the main problems threatening the economic viability of the process or the weaknesses that prevent its commercial
  implementation.
