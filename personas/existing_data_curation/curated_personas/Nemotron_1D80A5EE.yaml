  career_goals: Sharlyne aims to steer her company toward sustainable growth by entering emerging markets that align with her values of environmental stewardship and social responsibility. She intends to
    embed a culture of continuous innovation, encouraging employees to explore novel ideas and artistic collaborations. Long‑term, she aspires to mentor the next generation of women executives, establish
    a charitable foundation that supports arts education in rural Idaho, and eventually transition to a board‑level advisory role that allows her to devote more time to personal well‑being and community
    projects.
