personas:
  professional: An executive leader with a strategic eye and artistic sensibility, Sharlyne Duryea leverages data‑driven decision‑making, corporate governance expertise, and design‑thinking workshops to
    steer her company toward sustainable growth while nurturing a culture that balances analytical rigor with creative exploration.
  sports: Sharlyne Duryea favors low‑impact endurance activities, joining the Lewiston Foothill Hiking Club to explore local trails in spring, cheering on the Boise State Broncos football team in the fall,
    and attending weekend yoga classes at the Idaho Vandals recreation center to maintain flexibility.
  arts: Sharlyne Duryea curates a personal gallery of works by regional painters like Jim Stark, experiments with watercolor abstractions inspired by Monet and Kusama, and regularly attends performances
    of pianist Philip Glass and theatrical readings of Margaret Atwood’s novels at the Lewiston community theater.
  travel: Sharlyne Duryea plans her trips meticulously, favoring slow‑paced itineraries that combine meditative hikes in New Zealand’s Fiordland, weekend visits to Craters of the Moon State Park in Idaho,
    and cultural immersion in Kyoto’s historic temples, always booking boutique B&Bs that allow quiet reflection.
  culinary: Sharlyne Duryea enjoys farm‑to‑table cooking, often preparing herb‑infused roasted beet salad, wild mushroom risotto with fresh sage from her garden, and grilled salmon with dill, while occasionally
    treating herself to a fine‑dining tasting menu at Portland’s Le Pigeon.
  core: Sharlyne Duryea is a methodical yet imaginative executive who balances boardroom rigor with watercolor serenity, routinely over‑analyzes risk, and channels anxiety into disciplined journaling and
    piano improvisations.
background:
  cultural: Sharlyne identifies as a white American with deep roots in the Pacific Northwest, having grown up in a modest, middle‑class family that valued self‑reliance and community involvement. Living
    in Lewiston, ID—a region steeped in Nez Perce heritage—has fostered her respect for indigenous history, the natural environment, and local traditions. Her upbringing during the late 20th century combined
    traditional work ethic with gradual exposure to progressive ideas, shaping a worldview that balances practicality with an openness to artistic and abstract thinking. This blend informs both her professional
    ethos and personal pursuits.
