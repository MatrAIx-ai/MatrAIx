persona_description: A researcher who is interested in the study of parasitic worms and their effects on the host immune system. He/she is particularly interested in the role of hookworms in coeliac disease
  and the potential for hookworms to suppress gluten sensitivity. The researcher is also interested in the interactions between parasitic worms and the human immune system, and is exploring the use of helminth-derived
  products or their derivatives to design new drugs that are more effective and safer than current medications. The researcher is looking for unique and specialized knowledge, talents and skills in parasitology
  and immunology.
