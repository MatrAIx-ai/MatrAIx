persona_description: A healthcare worker or occupational therapist who specializes in the diagnosis and treatment of contact dermatitis, particularly in the cleaning, healthcare, food handling, catering,
  hairdressing, and computer use industries. They have experience in identifying the various forms of contact dermatitis and in treating them with appropriate measures to prevent further dermatitis. They
  are knowledgeable in the use of pH-balanced cleansers, appropriate gloves, and emollients to protect against irritants. They also understand the importance of avoiding direct contact with irritants and
  the role of systemic corticosteroids in treating severe contact dermatitis.
