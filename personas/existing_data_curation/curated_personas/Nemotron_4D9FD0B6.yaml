  career_goals: Nataki aims to document her life story and family history in a memoir, ensuring her experiences as an African‑American educator are preserved for future generations. She hopes to launch
    a small oral‑history project at the local library, training seniors to record their stories. Additionally, she seeks to expand the community garden she started, creating a mentorship program where she
    teaches younger volunteers sustainable gardening practices. Although retired, she remains eager to contribute as a guest lecturer on literature and African‑American cultural topics at the nearby community
    college.
