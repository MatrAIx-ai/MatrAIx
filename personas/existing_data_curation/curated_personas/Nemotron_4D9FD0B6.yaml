  hobbies: '[''Reading historical fiction'', ''Biographies'', ''Gardening'', ''Native Florida plants'', ''Knitting'', ''Charity blanket making'', ''Bird-watching'', ''Poetry writing'', ''Journaling'', ''Gospel
