  career_goals: Dawn aims to advance to a senior sales consultant role within the next two years, eventually stepping into a branch manager position that will allow her to oversee a small team of agents.
    She plans to deepen her credentials by completing the Certified Financial Planner (CFP) designation and pursuing advanced FINRA certifications, which will broaden her advisory capabilities. Her primary
    ambition is to build a stable, repeatable client base in Lake Worth, focusing on retirement and wealth-preservation solutions for middle‑aged families, thereby generating predictable revenue while preserving
    a manageable workload. Dawn also hopes to mentor junior sales staff, fostering a collaborative, supportive environment that reflects her cooperative values. To protect her well‑being, she intends to
    negotiate a schedule that includes regular breaks and a modest sales target that balances earnings with reduced stress.
