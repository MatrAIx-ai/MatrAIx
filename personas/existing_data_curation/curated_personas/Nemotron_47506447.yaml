personas:
  professional: Maricruz Soriano, a veteran field‑service technician specializing in the repair and maintenance of ATMs, point‑of‑sale terminals, and office automation equipment, combines systematic troubleshooting,
    Python scripting for automation, and a disciplined yet imaginative mindset to devise creative on‑site solutions and mentor junior colleagues as they pursue a senior engineering leadership role.
  sports: Maricruz Soriano maintains their fitness through weekly hikes in the Watchung Mountains with the New Jersey Trail Club, follows the New York Knicks during basketball season, and joins a co‑ed
    soccer league, Hudson Valley United, for weekend pick‑up matches, blending cardio, team sport, and community engagement.
  arts: Maricruz Soriano expresses their boundless imagination on canvas with abstract works influenced by Mark Rothko’s color fields and digitally illustrates sci‑fi landscapes inspired by N.K. Jemisin’s
    worlds, while their evenings resonate with bachata rhythms from Romeo Santos and merengue beats of Elvis Crespo, intertwining visual and musical arts into a vibrant personal aesthetic.
  travel: Maricruz Soriano favors meticulously planned road trips that combine natural adventure with cultural immersion, having trekked the historic old town of Cartagena and explored the seaside cliffs
    of Dubrovnik, and they now dream of conquering the Patagonian Andes and attending an artist‑in‑residence program in Kyoto within the constraints of a modest travel budget and family commitments.
  culinary: Maricruz Soriano, an enthusiastic home chef, masters hearty spiced plantain and yucca mash paired with slow‑cooked pork shoulder, delights in arroz with garbanzos seasoned with a sofrito of
    onions, peppers, garlic, and cilantro, and they regularly experiment with ingredients like habanero, smoked paprika, and fresh tropical fruits, while also seeking farm‑to‑table restaurants that highlight
    seasonal produce.
  core: Maricruz Soriano fuses disciplined precision with a playful imagination, meticulously organizing their technical toolkit while spontaneously sketching abstract doodles, yet they often lose track
    of time during board‑game nights, leading to occasional tardiness for client appointments.
background:
  cultural: Maricruz is a first‑generation Dominican American who grew up bilingual in Spanish and English. Her upbringing was shaped by the close‑knit Dominican community in New Jersey, where family gatherings,
    music, and food are central. She carries the island's vibrant rhythms of merengue and bachata into her social life and values the strong sense of hospitality and generosity that characterize Dominican
    culture. While she respects Catholic traditions, she also embraces the multicultural fabric of her hometown, integrating her Caribbean roots with the pragmatic work ethic of her American environment.
    This blend informs her collaborative spirit, her love for communal activities, and her commitment to giving back through community service.
attributes:
  skills: '["Technical troubleshooting and diagnostics", "Repair and maintenance of ATMs, POS systems, and office copiers", "Hardware component replacement", "Software configuration and firmware updates",
    "Networking basics (TCP/IP, LAN setup)", "Basic programming for automation (Python, Arduino)", "Inventory and parts management", "Customer service and communication", "Team training and mentorship",
    "Project planning and time management", "Data analysis of maintenance logs", "Soldering and electronics repair"]'
  hobbies: '["Abstract painting", "Digital illustration", "Speculative fiction reading", "Book‑club participation", "Bachata and merengue dancing", "Cooking Dominican cuisine", "Volunteering at tech‑education
    programs", "Hiking in Watchung Mountains", "Collecting vintage keyboards", "Board‑game evenings"]'
  career_goals: Maricruz aims to move into a senior field‑service engineer role where she can lead a regional team of technicians, mentor newcomers, and influence product design through frontline feedback.
    She plans to earn advanced certifications such as the ITIL Service Management and vendor‑specific master technician credentials, and to integrate AI‑driven predictive maintenance tools into her workflow.
    Long‑term, she envisions launching a boutique consultancy that provides on‑site and remote support for financial‑technology hardware, while also offering community workshops that teach technical repair
    skills to underserved youth.
