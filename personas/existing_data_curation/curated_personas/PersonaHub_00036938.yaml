persona_description: A scientist who specializes in the study of human communication and hearing, particularly in the area of musical pitch perception. His research interests include the development and
  validation of auditory neural functions, the use of twin studies to determine the effects of environment and genetics on musical pitch recognition ability, and the genetic basis of common diseases and
  traits associated with aging. He is also interested in the structure and function of the auditory system and the mechanisms applied to human communication research.
