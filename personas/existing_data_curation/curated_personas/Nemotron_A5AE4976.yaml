personas:
  professional: James Comiskey, a 28‑year‑old sustainable architect, merges a curiosity for parametric form‑finding with a practical command of Revit, Grasshopper, and Python to design fire‑resistant, net‑zero
    homes for high‑altitude communities, all while navigating project deadlines with a relaxed, sometimes disorganized flexibility that can flip to assertive leadership when the design stakes rise.
  sports: James Comiskey hits the San Francisco Peaks with the Flagstaff Rock Club for weekend climbs, swaps ski‑season snowshoe treks for spring trail runs, and roots for the Arizona Cardinals, Phoenix
    Suns, and Arizona Diamondbacks whenever game day aligns with a post‑hike brew.
  arts: James Comiskey captures long‑exposure night skies in the spirit of Ansel Adams, strings acoustic renditions of Joni Mitchell at informal gatherings, and fuels their creative curiosity by joining
    Flagstaff’s monthly art walks while devouring Ted Chiang’s speculative short stories.
  travel: James Comiskey favors spontaneous, nature‑driven trips, having already photographed the Milky Way over Bryce Canyon, trekked the high desert of Patagonia, and camped under Iceland’s volcanic sky,
    all while balancing a modest travel budget that still leaves room for a future solo backpacking adventure across the Swiss Alps.
  culinary: James Comiskey, a self‑taught home brewer, crafts pine‑smoked amber ales with locally sourced hops and pairs them with pine‑nut pesto pasta, grilled elk burgers, and a weekend specialty of smoked
    trout wrapped in cedar planks, reflecting a hands‑on, experimental kitchen style that mirrors their woodworking hobby.
  core: James Comiskey is a high‑altitude architect whose worry‑driven perfectionism coexists with a laid‑back, sometimes chaotic lifestyle that fuels spontaneous hikes, craft brewing, and a relentless
    quest to blend sustainable design with the rhythm of the wild.
background:
  cultural: James identifies as a White American raised in a middle‑class family in the Pacific Northwest before moving to Flagstaff for graduate school. His upbringing emphasized independent thinking and
    a respect for nature, which aligns with the region’s outdoor‑oriented culture. Living in northern Arizona has exposed him to Southwest architectural traditions and the cultural heritage of the Hopi
    and Navajo peoples, influencing his appreciation for earth‑tone palettes, natural material use, and spatial concepts that honor the landscape. He values the blend of contemporary Western design education
    with local indigenous perspectives, integrating this cultural sensitivity into his work.
attributes:
  skills: '["Architectural Design", "Sustainable Building Design", "Revit", "AutoCAD", "SketchUp", "Building Information Modeling (BIM)", "Structural Analysis", "Energy Modeling", "Daylight Simulation",
