  hobbies: '["Hiking", "Rock Climbing", "Landscape Photography", "Woodworking", "Craft Beer Brewing", "Reading (Science‑Fiction and Architecture Non‑Fiction)", "Mindfulness Meditation", "Attending Architecture
    Meetups", "Community Art Walks", "Acoustic Guitar Playing"]'
  career_goals: He aims to achieve licensure as a registered architect within the next two years, then progress to leading design teams on community‑scale projects that emphasize resilience to wildfire
    and snow loads. In five to ten years he hopes to open his own boutique firm focused on low‑impact, net‑zero homes for mountain towns, while collaborating with local tribes to incorporate indigenous
    spatial concepts. He also wants to contribute to city planning initiatives in Flagstaff, publish research on performance‑based design, and mentor junior designers to balance creative curiosity with
    practical delivery.
