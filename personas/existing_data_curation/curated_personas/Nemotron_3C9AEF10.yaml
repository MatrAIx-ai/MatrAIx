  career_goals: Rita aims to transition from working as a subcontractor to owning a boutique painting and decorative‑finishes business that specializes in high‑end residential projects and custom murals.
    She plans to obtain certification in historic restoration, build a portfolio of artistic wall treatments, and mentor younger tradespeople, particularly women. In the long term, she hopes to merge her
    professional trade with her personal art by offering commissioned murals for local businesses and community spaces.
