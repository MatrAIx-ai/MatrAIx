  hobbies: '["Abstract painting", "Salsa dancing", "Latin jazz listening", "Culinary exploration of Colombian cuisine", "Traveling to cultural festivals", "Reading science fiction & philosophy", "Photography
    of urban Miami street scenes", "Volunteering at local Hispanic community centers", "Hosting weekly dinner gatherings"]'
  career_goals: Hernan aims to transition from day‑to‑day supervision into a senior advisory role where he can shape digital transformation strategies for B2B sales across the Latin American market. He
    aspires to mentor the next generation of sales leaders within his organization, establishing a formal development program. Long‑term, he envisions launching a boutique consulting firm that leverages
    his bicultural expertise to help U.S. companies expand into Colombia and broader Latin America, while also contributing to community initiatives that celebrate Colombian culture in Miami.
