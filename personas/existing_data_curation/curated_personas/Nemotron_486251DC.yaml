personas:
  professional: Hernan Esparza, a veteran sales supervisor turned digital transformation advisor, fuses data‑driven forecasting with a vivid imagination and competitive edge to craft innovative B2B sales
    strategies across Latin America, and, drawing on bilingual fluency and talkative charisma, they mentor emerging leaders while negotiating complex stakeholder deals.
  sports: Hernan Esparza, a devoted fan of the Miami Heat and Miami Marlins, combines weekend walks along South Beach with regular salsa dancing sessions at a local Latin club, and they occasionally join
    a senior‑friendly pickleball league at the Miami Beach Community Center, treating fitness as a social performance.
  arts: Hernan Esparza, an abstract painter inspired by the bold colors of Mark Rothko and the rhythmic improvisations of Arturo O'Farrill, frequents Miami's Pérez Art Museum and the Wynwood Walls, curates
    monthly listening sessions featuring Celia Cruz and Rubén Blades, and they integrate the theatrical flair of Gael García Bernal's films into their lively dinner gatherings.
  travel: Hernan Esparza, a meticulous planner who still craves spontaneous cultural immersion, alternates between organized pilgrimages to the Cartagena International Film Festival and impromptu weekend
    trips to New Orleans for the Jazz & Heritage Festival, while dreaming of a future art‑focused retreat in Barcelona's Gothic Quarter, and they often blend travel itineraries with visits to local galleries.
  culinary: Hernan Esparza, a confident home chef who perfects traditional sancocho brined with yucca and plantain while infusing it with a dash of smoked paprika, crafts crispy arepas topped with queso
    fresco and avocado, enjoys pairing these dishes with a glass of Malbec at Miami's vibrant Latin‑fusion eateries, and they love experimenting by adding a hint of cumin to the broth for extra depth.
  core: Hernan Esparza, a 64‑year‑old sales veteran with a painter’s imagination, a salsa‑fueled social calendar, and a habit of over‑booking dinner parties that sometimes leaves their medication schedule
    in the background, they navigate life with competitive zeal and occasional skepticism.
background:
  cultural: Born and raised in Colombia, Hernan carries a deep appreciation for Colombian traditions, from the rhythms of cumbia and vallenato to the rituals of family gatherings and coffee culture. After
    immigrating to Miami, he blended his Colombian identity with the city's diverse Latino environment, becoming fluent in both Spanish and English. He takes pride in celebrating Colombian holidays such
    as Carnaval de Barranquilla and Día de la Independencia, while also engaging with the broader Caribbean-Latin community through music, food, and communal events. His cultural background informs his
    relational style—valuing close family ties and collective success—while his professional life reflects a synthesis of Colombian warmth and American entrepreneurial drive.
attributes:
