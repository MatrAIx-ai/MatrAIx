persona_description: Robert Moog was an American pioneer of electronic music, best known as the inventor of the Moog synthesizer. He was diagnosed with inoperable brain cancer in 2005 and died in 2005.
  His life's work of developing electronic music was continued through the creation of the Bob Moog Foundation. Moog synthesizers enjoyed a resurgence of popularity in the 1980s and 1990s due to their warmer
  sound over less expensive brands. He was born in Queens, New York, and died in Asheville, North Carolina.
