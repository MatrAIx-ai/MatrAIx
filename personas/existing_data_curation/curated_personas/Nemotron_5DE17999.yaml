personas:
  professional: Joyce Belmont, a budding junior naturalist, combines a love of birdwatching, precise journal logging, and methodical LEGO building with a disciplined, routine-driven approach that makes
    them a meticulous observer and a self-motivated learner.
  sports: Joyce Belmont runs with the Ridgeview Track Club's U-9 team, enjoys solitary laps at the local pool, and cheerfully roots for the San Francisco Giants, maintaining a disciplined training schedule
    that mirrors their love of routine.
  arts: Joyce Belmont expresses creativity through detailed LEGO constructions, serene landscape sketches inspired by Claude Monet, and simple Scratch animations set to Taylor Swift melodies, while occasionally
    knitting patterned scarves after following tutorials from the YouTube channel 'Knit Simple'.
  travel: Joyce Belmont prefers meticulously planned family road trips, having explored Yellowstone National Park's geysers and the tranquil shores of Acadia National Park, and dreams of birdwatching in
    the Everglades wetlands and trekking the Scottish Highlands, always mapping each stop in a notebook before departure.
  culinary: Joyce Belmont enjoys helping in the kitchen by chopping garden-fresh carrots and zucchini for a simple vegetable stir-fry, baking apple crumble with cinnamon, and crafting peanut-butter granola
    bars, yet often forgets to set a timer, resulting in occasional burnt toast.
  core: Joyce Belmont is a detail-obsessed, solitary 9-year-old whose love of routine, nature, and methodical creativity turns everyday hobbies into disciplined mini-projects, even if it sometimes makes
    them overly competitive with peers.
background:
  cultural: Joyce grows up in a middle‑class white family in Carey, Idaho, a small rural community with strong ties to farming and the outdoors. Her family values hard work, self‑reliance, and traditional
    community principles, often expressed through involvement in local church activities and the 4‑H club, where she focuses on animal husbandry projects. The cultural environment emphasizes privacy, practicality,
    and a close connection to the land, influencing her preference for routine, solitude, and hands‑on interaction with nature. While the broader community is socially close‑knit, Joyce’s personality leads
    her to find comfort in quiet, structured pursuits.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Logic puzzle solving'', ''Reading comprehension'', ''Basic arithmetic'', ''Pet care (hamster)'', ''Gardening basics'', ''Scratch programming'',
    ''Nature sketching'']'
  hobbies: '[''Reading'', ''Building LEGO'', ''Jigsaw puzzles'', ''Birdwatching'', ''Journaling'', ''Gardening'', ''Nature sketching'', ''Scratch programming'', ''Rock collecting'']'
  career_goals: Joyce dreams of becoming a veterinarian or wildlife caretaker, where she can combine her love for animals with her methodical nature. She is determined to excel in school science fairs and
    hopes to win a regional award in biology. In the longer term, she aims to earn a scholarship for a pre‑veterinary program and eventually work at a ranch or a wildlife sanctuary, providing compassionate
    and precise care to animals. She also aspires to be recognized as the most reliable and organized student in her class, setting a foundation for future academic success.
