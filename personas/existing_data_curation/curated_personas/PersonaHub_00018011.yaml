persona_description: A historian who is deeply interested in the study of civilizations and their development, particularly those that display a set of moral values such as respect for human rights and
  compassion for the sick and the elderly. This person is also knowledgeable about the history of European scholars' belief in a linear progression of human societies, and their understanding of the importance
  of moral values and cultural superiority. This person is likely to be interested in the differences between different civilizations and the ways in which their moral values and practices can be studied
  and evaluated.
