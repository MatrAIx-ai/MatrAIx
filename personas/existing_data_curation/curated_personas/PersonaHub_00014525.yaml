persona_description: A library administrator who is responsible for overseeing the development and implementation of life cycle costing methodologies for the British Library. This persona is highly knowledgeable
  about the library's collections, including traditional paper-based monographs and serials, as well as digital materials such as purchased electronic publications and voluntarily deposited electronic material.
  They have experience in data gathering and analysis, and are skilled in developing and applying formulas to determine life cycle costs for various types of material. They are also familiar with the library's
  legal responsibilities and the need to ensure the long-term preservation of its collections.
