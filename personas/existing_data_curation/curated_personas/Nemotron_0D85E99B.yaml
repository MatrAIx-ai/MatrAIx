personas:
  professional: Hyang Jiang, a HAZWOPER‑certified hazardous‑materials specialist, blends meticulous risk‑assessment skills with a pragmatic curiosity for new remediation technologies, channeling their competitive
    drive into top‑tier safety performance while navigating a relaxed, sometimes disorganized, work style.
  sports: Hyang Jiang hikes the Hempstead Plains with a local outdoor club and follows the New York Mets, New York Knicks, and Long Island Rough Riders, preferring solitary weekend runs and occasional intramural
    soccer while maintaining a minimalist home‑gym routine.
  arts: Hyang Jiang practices DSLR street photography inspired by Hiroshi Sugimoto’s muted tones, attends local calligraphy workshops, devours science‑fiction novels by Liu Cixin and N. K. Jemisin, and
    finds solace in the melancholic indie rock of Mitski and the ambient soundscapes of Tycho.
  travel: Hyang Jiang enjoys flexible, budget‑conscious travel, spending most summers exploring nearby sites like the Adirondack High Peaks or the historic streets of Philadelphia, while dreaming of a solo
    autumn backpacking trip through Kyoto’s temples and the Swiss Alps, planning itineraries only a week in advance.
  culinary: Hyang Jiang frequently prepares handmade dumplings and kimchi with a splash of rice vinegar, perfects mooncakes for Lunar New Year, and experiments with ginger‑infused stir‑fries, yet often
    forgets to set timers, leading to occasional over‑roasted vegetables.
  core: Hyang Jiang is an ambitious yet laid‑back hazard‑remediation specialist who balances a competitive drive for safety excellence with a love for solitary photography, calligraphy, and midnight anxiety
    journaling, all while navigating a habitually disorganized schedule.
background:
  cultural: Hyang Lien Jiang is a first‑generation American of East Asian descent, with her parents having emigrated from Taiwan in the early 2000s. Raised in Levittown, New York, she grew up in a bilingual
    household where Mandarin and English were spoken interchangeably, and she attended a public high school with a modest Asian community. Her family maintains cultural traditions such as celebrating Lunar
    New Year, sharing mooncakes, and preserving the practice of filial respect. She enjoys cooking family recipes, participates in the local Chinese cultural association’s annual festivals, and occasionally
    visits her grandparents in Queens. While she values the discipline and emphasis on education typical of her heritage, she blends it with the independent, flexible mindset nurtured by her suburban upbringing.
    These dual influences shape her pragmatic curiosity, her reservation in large social settings, and her willingness to bridge traditional values with modern, technical pursuits.
attributes:
  skills: '["Certified HAZWOPER Technician", "Hazardous Materials Identification", "Personal Protective Equipment (PPE) Usage", "Site Decontamination Procedures", "Regulatory Compliance (OSHA, EPA)", "Environmental
    Sampling and Analysis", "Risk Assessment and Mitigation", "Specialized Equipment Maintenance", "Small-Team Coordination", "Emergency Response Planning", "Technical Documentation and Reporting", "Emerging
    Remediation Technologies (e.g., Bioremediation, Robotics)"]'
  hobbies: '["Urban-Industrial Photography", "Hiking on Long Island Trails", "Puzzle Solving (Sudoku, Crossword)", "Science-Fiction Reading", "Single-Player RPG Gaming", "Chinese Brush Calligraphy", "Traditional
    Cooking (Dumplings, Kimchi)", "DIY Electronics and Sensor Projects", "Journaling and Mindfulness"]'
  career_goals: Ambitious yet pragmatic, Hyang aims to deepen her expertise by completing an associate degree in Environmental Health and later transferring to a bachelor's program in Occupational Safety.
    She plans to earn advanced certifications such as NIOSH's Advanced HAZWOPER and EPA Lead‑Based Paint Certification, positioning herself for a crew‑lead role within the next two years. Long‑term, she
    envisions becoming a safety manager overseeing multiple project sites, and eventually launching her own boutique remediation consultancy that focuses on residential and small‑commercial jobs in Long
    Island. Her competitive drive fuels a desire to be recognized as the top performer on safety metrics, and she hopes to mentor other young women entering the field.
