persona_description: A nurse who works in a hospital or a medical facility, specifically focusing on the management and treatment of sexually transmitted infections during pregnancy and birth. They have
  a thorough understanding of the transmission and diagnosis of herpes simplex virus, including the challenges of obtaining accurate results and the management of pregnant women with genital herpes. They
  are aware of the complex management situation during pregnancy and birth due to the potential for fetal exposure to the virus, and they are equipped with the knowledge and skills to provide appropriate
  physical, psychological, and educational management of seropositive and/or symptomatic women. They are also aware of the importance of prompt diagnosis and treatment of infected newborns to minimize morbidity
  and mortality rates.
