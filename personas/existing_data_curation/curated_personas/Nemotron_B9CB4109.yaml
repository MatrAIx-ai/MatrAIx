    to jazz and hip‑hop'', ''Volunteering as a reading buddy'']'
  career_goals: He aspires to merge his love for art and technology by becoming an interactive media designer or a scientific illustrator. He aims to attend a STEM-focused high school in Greenville County,
    then pursue a degree in graphic design, animation, or biomedical engineering. Long-term, he hopes to create educational tools that make abstract scientific concepts accessible to children, and eventually
    lead community workshops that combine storytelling, coding, and hands‑on building.
