personas:
  professional: William Wiggins is a budding robotics and game‑design enthusiast whose love of science‑fiction fuels meticulous LEGO builds, Scratch coding sessions, and detailed digital paintings, and
    they channel their highly organized, disciplined nature into early prototypes that hint at a future career in interactive entertainment.
  sports: William Wiggins plays point guard for the community’s junior Hawks basketball team, practices three times a week, and they also enjoy strategic chess matches at the local center while cheering
    for the Chicago Bulls during NBA season.
  arts: William Wiggins devotes weekends to sketching elaborate fantasy characters inspired by artists like Jim Lee and Frank Frazetta, while their eclectic music taste ranges from Miles Davis’s jazz to
    A Tribe Called Quest’s hip‑hop and Aretha Franklin’s soul, influencing their digital paintings with vibrant, rhythmic color palettes.
  travel: William Wiggins’s travel ambitions blend educational trips to places like the Smithsonian in Washington D.C. and the Grand Canyon with a dream to explore Tokyo’s anime districts, and they typically
    plan itineraries with the help of a family‑wide spreadsheet, preferring a mix of museum tours and theme‑park excitement.
  culinary: William Wiggins enjoys experimenting with simple recipes such as homemade Margherita pizza, ramen bowls with miso broth, and spicy chicken tacos, and they often grin while mastering the perfect
    cheese stretch, though they occasionally forget to turn off the oven after a baking marathon.
  core: William Wiggins is a hyper‑organized, imagination‑driven twelve‑year‑old who meticulously balances robotics, epic storytelling, and a disciplined routine, even if they sometimes hoard glitter for
    future art projects.
background:
  cultural: William is part of a close‑knit African-American family in Fountain Inn, a small town in Greenville County, South Carolina. His cultural background blends the rich traditions of Southern black
    heritage—church gatherings, gospel music, storytelling, and community festivals like Juneteenth—with the everyday life of a suburban town. Family members often share oral histories of the civil‑rights
    movement in South Carolina, fostering a strong sense of resilience and pride. The local black community's emphasis on education, mentorship, and mutual support has shaped his outlook, encouraging him
    to excel academically and give back through volunteering. He also enjoys regional cuisine such as collard greens and sweet tea, and celebrates holidays with family reunions that combine Southern hospitality
    and African-American cultural customs.
