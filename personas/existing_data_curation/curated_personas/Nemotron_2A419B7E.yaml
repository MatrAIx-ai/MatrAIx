    ''AI‑driven defect detection'', ''Project management'', ''Stakeholder communication'', ''Training and mentoring'', ''Public speaking'', ''Conflict resolution'']'
  hobbies: '[''Watercolor painting'', ''Photography'', ''Visiting art galleries'', ''Organizing community art fairs'', ''Reading non‑fiction on science and design thinking'', ''Hiking'', ''Cooking international
    dishes'', ''Hosting dinner parties'', ''Traveling'']'
  career_goals: Margo aims to advance into a senior quality assurance management role where she can lead a department, shape company‑wide quality strategies, and mentor a larger team of inspectors. She
    plans to earn a Certified Quality Engineer (CQE) credential and complete a bachelor’s degree in Industrial Engineering within the next three years. She is also interested in becoming a recognized industry
    speaker on integrating creative thinking and emerging technologies into traditional quality processes. Locally, she hopes to launch a community outreach program that connects manufacturing professionals
    with local art schools to foster creativity in the workforce.
