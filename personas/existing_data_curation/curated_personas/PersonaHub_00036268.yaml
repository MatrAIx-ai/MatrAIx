persona_description: A healthcare professional with expertise in addiction medicine, specifically in the management of opioid dependence and the identification and treatment of withdrawal symptoms. They
  are well-versed in the mechanisms of opioid metabolism and have experience with the use of codeine in the context of opioid addiction. They are aware of the potential for codeine to be misinterpreted
  as an effective treatment for pain and have experience with the use of Suboxone, a medication used to treat opioid dependence. They are familiar with the FDA's recent Drug Safety Announcement regarding
  the use of codeine in young children and the potential for codeine to be misinterpreted as ineffective in treating pain. They have experience with the identification and treatment of withdrawal symptoms
  and have a deep understanding of the factors that contribute to the development of a strong fear of withdrawal.
