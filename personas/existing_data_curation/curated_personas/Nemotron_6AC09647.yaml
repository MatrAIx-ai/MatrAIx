  career_goals: She aims to advance to a senior executive role, such as Director of Operations or Chief Operating Officer, within a multi‑site health system, where she can champion innovative, compassionate
    care models and improve staff well‑being. Frances plans to obtain Certified Medical Manager (CMM) certification and pursue an MBA to deepen her leadership expertise. Long‑term, she envisions founding
    a consulting practice that helps healthcare organizations embed empathy and resilience into their operational frameworks.
