personas:
  professional: A healthcare operations strategist, Frances Benoit leverages a blend of business acumen and compassionate leadership to optimize multi‑site medical facilities, steering strategic planning,
    financial oversight, and quality‑improvement initiatives while mediating staff conflicts with a calming, collaborative touch; they also mentor junior staff to embed empathy into daily routines.
  sports: A group‑fitness enthusiast, Frances Benoit attends thrice‑weekly Zumba classes at a Brooklyn studio, leads a weekend yoga circle in Central Park, plays recreational soccer in a co‑ed league, and
    they cheer for the New York Knicks and New York City FC during the NBA and MLS seasons.
  arts: An avid cultural explorer, Frances Benoit spends Saturday nights at MoMA, catches live shows by The National and Mitski, curates a personal collection of street‑photography prints by Andreas Gursky,
    and they organize monthly 'photo walk' meetups inspired by Ansel Adams and Brandon Stanton.
  travel: A culturally curious traveler, Frances Benoit has trekked the Gothic Quarter of Barcelona, wandered Kyoto’s Arashiyama bamboo forest, and bargained in Marrakech’s souks; they favor short, immersive
    trips with close friends, are currently budgeting for a Patagonia trek to Torres del Paine while planning a culinary‑class splurge in Oaxaca.
  culinary: A health‑focused home chef, Frances Benoit delights in assembling quinoa bowls with roasted chickpeas, avocado, and tahini drizzle, perfecting miso‑glazed salmon, and fermenting kimchi from
    scratch; they often shop at local farmers’ markets for fresh organic produce but occasionally rely on specialty stores for rare spices.
  core: Frances Benoit, a 25‑year‑old compassionate operations leader, balances data‑driven healthcare innovation with a love for group fitness, vibrant art scenes, and they habitually turn anxiety into
    purposeful growth.
background:
  cultural: Frances grew up in the diverse, suburban‑urban mix of Port Chester, New York, within a middle‑class white family of European (German and Irish) ancestry. The region’s proximity to New York City
    exposed her to a multicultural environment, fostering an appreciation for cultural diversity while grounding her in mainstream American values of education, hard work, and community service. Her upbringing
    emphasized compassion and active civic engagement, shaping her inclusive and service‑oriented outlook.
