persona_description: A historian who specializes in the history of the town of Medway, Massachusetts, and its development from a farming community to a thriving town that grew alongside the Charles River
  and Chicken Brook. The historian is knowledgeable about the town's founding in 1657, its incorporation in 1713, its growth and development over the centuries, and its natural separation from Millis in
  the 1880s. The historian is also interested in the town's unique history, such as the formation of the Great Black Swamp, and its impact on the town's development.
