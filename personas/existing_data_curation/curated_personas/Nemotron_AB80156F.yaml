personas:
  professional: Ava Brown is an aspiring digital artist and junior Python coder who channels their meticulous organization and competitive edge into daily sketch journals and interactive art scripts, consistently
    meeting self‑imposed deadlines while experimenting with unconventional visual narratives.
  sports: Ava Brown is a strategic mind on the chess club’s varsity team, follows the Boston Celtics for basketball inspiration, and plays intramural soccer on the school’s fall league, balancing competitive
    drive with a preference for solo workout routines like home‑based HIIT circuits.
  arts: Ava Brown draws daily inspiration from the surreal landscapes of Hayao Miyazaki, the bold street art of Banksy, and the avant‑garde installations at the local contemporary museum, regularly curating
    mini‑exhibits for school art fairs while experimenting with digital layering techniques in Procreate.
  travel: Ava Brown’s travel style mixes meticulous planning with spontaneous discovery, having documented a family road trip through the Grand Canyon, a weekend cultural immersion in Kyoto’s Fushimi Inari
    Shrine, and a longing to attend the Dragon Con convention in Atlanta next summer.
  culinary: Ava Brown enjoys crafting avocado toast with chili flakes, perfecting homemade ramen broth with miso and pork belly, and often experiments with vegan chocolate truffles for school bake sales,
    though they admit to over‑indulging in sugary energy drinks during late‑night coding sessions.
  core: Ava Brown is a fiercely curious teen who blends methodical art creation with competitive tech tinkering, budget‑savvy yet prone to occasional splurges, and balances a disciplined routine with moments
    of playful indulgence.
background:
  cultural: Ava comes from a white, middle‑class family in Washington, a small city within Macomb County, Michigan. The Midwestern setting emphasizes community involvement, self‑reliance, and a pragmatic
    approach to life. Her upbringing includes participation in church youth groups, library workshops, and school‑based extracurricular activities. Seasonal changes and the region’s natural scenery inspire
    her outdoor sketching and appreciation for nature. Though the local art scene is modest, community art fairs, museum programs, and school art clubs provide her with creative outlets. Family values of
    hard work, education, and modesty reinforce her organized, reliable, and emotionally stable personality.
