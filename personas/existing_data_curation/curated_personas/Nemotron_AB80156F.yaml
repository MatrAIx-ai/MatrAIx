  career_goals: Ava aspires to a career that fuses her artistic passion with her systematic mindset. She aims to pursue higher education in industrial design or UI/UX design, with the long‑term goal of
    creating innovative products or digital experiences for technology companies. She also envisions a possible path in scientific research where she can communicate complex ideas visually, such as a science
    communicator or museum curator. Determined and competitive, she plans to earn scholarships, win design competitions, and build a portfolio that showcases both creative flair and analytical rigor.
