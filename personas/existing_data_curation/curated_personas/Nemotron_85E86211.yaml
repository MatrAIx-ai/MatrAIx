  hobbies: '[''Abstract painting'', ''Digital photography'', ''Community theater improv'', ''Board games and tabletop RPGs'', ''Volunteer tech tutoring for seniors'', ''Live music concerts'', ''Hiking and
    nature walks'', ''Speculative fiction reading'', ''Gardening'', ''Restoring vintage computers'']'
  career_goals: Looking ahead, Gilbert aims to transition from day‑to‑day administration toward a senior consulting role that lets him shape technology strategy for small nonprofits and community organizations
    in the Atlanta metro area. He hopes to launch a boutique IT services practice focused on digital inclusion, offering affordable network upgrades, cybersecurity workshops, and mentorship programs for
    emerging technicians. Parallel to his professional goals, he envisions authoring a guide on merging artistic thinking with IT problem‑solving, and eventually teaching part‑time courses in network fundamentals
    and digital media at a local community college. Flexibility and the chance to nurture others remain central to his ambition.
