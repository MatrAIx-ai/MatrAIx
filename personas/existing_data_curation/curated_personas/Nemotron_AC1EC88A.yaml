personas:
  professional: Annette Doggette, a seasoned electrical technician renowned for diagnosing motor failures and reading schematics with surgical precision, channels their natural sociability and talkative
    flair into clear customer explanations, mentorship of junior staff, and a flexible yet structured approach to on‑site tool repairs, all while eyeing the Certified Electrical Technician credential to
    lead a small repair team.
  sports: Annette Doggette cycles the Perkiomen Trail with the Bucks County Cyclists club each weekend, roots for the Philadelphia Eagles and the Philadelphia Flyers, and joins a community volleyball league
    in the summer, merging cardio fitness with social camaraderie.
  arts: Annette Doggette immerses themselves in mystery novels by Agatha Christie, performs in the local community theater’s quarterly productions, and revels at Bucks County music festivals where they
    enjoy folk tunes from Gillian Welch and The Lumineers, letting storytelling and melody shape their leisure time.
  travel: Annette Doggette favors spontaneous weekend road trips to Shenandoah National Park or a cabin in the Poconos, has explored New York City’s art districts, and dreams of a culinary tour of Tuscany
    that fits their modest budget and garden‑to‑table cooking passion.
  culinary: Annette Doggette delights in hosting potluck nights featuring rosemary‑infused roasted chicken, garden zucchini fritters, and homemade sourdough, often seasoning dishes with fresh basil, thyme,
    and cilantro, though they sometimes leave the kitchen in a delightful mess after lively game nights.
  core: Annette Doggette blends hands‑on electrical expertise with a vibrant community spirit, balancing structured repair protocols and spontaneous creativity while occasionally letting disorganization
    and tool‑obsession slip into their routine.
background:
  cultural: Annette was raised in a middle‑class, suburban environment in Bucks County, Pennsylvania, a region known for its blend of historic Pennsylvania Dutch roots and diverse European immigrant heritage.
    Growing up, she experienced community traditions such as county fairs, local farmers' markets, and family gatherings that emphasized self‑reliance, practical problem‑solving, and strong neighborhood
    ties. Her family encouraged a progressive view of gender roles, supporting her pursuit of a technical career in a traditionally male‑dominated trade. These cultural influences have shaped her work ethic,
    appreciation for hands‑on craftsmanship, and commitment to community involvement.
attributes:
  skills: '["Electric motor diagnosis and repair", "Power tool maintenance", "Electrical schematic interpretation", "Systematic troubleshooting", "OSHA safety compliance", "Customer communication and service
    estimates", "Inventory and parts management", "Basic welding and metal fabrication", "Technical mentorship", "Adaptable problem‑solving"]'
  hobbies: '["Hosting potluck dinners and game nights", "DIY home‑improvement projects", "Woodworking", "Gardening", "Cycling on local trails", "Attending music and food festivals", "Volunteering at a community
    makerspace", "Reading mystery novels", "Participating in community theater"]'
  career_goals: Annette aims to earn the Certified Electrical Technician (CET) credential and advance to a senior technician role within her current service company. She envisions leading a small team of
    repair specialists, implementing a streamlined workflow that balances structure with flexibility for work‑life harmony. Long‑term, she hopes to launch her own mobile repair service that offers on‑site
    maintenance for power tools and small electric equipment, while also providing community workshops on DIY repairs and sustainable tool use. She is motivated to become a recognized mentor in her field
    and to advocate for greater representation of women in trade occupations.
