personas:
  professional: Susan Nissen is a seasoned K‑12 teaching assistant who blends her curious, art‑infused mindset with a talent for crafting differentiated, tactile lesson materials and one‑on‑one tutoring,
    while her relaxed attitude toward rigid schedules sometimes leaves her lesson plans scattered, driving her competitive push toward certification and curriculum leadership.
  sports: Susan Nissen stays active with sunrise beach yoga, occasional summer beach volleyball, and a weekly jog as part of the local Coastline Running Club, while cheering on the Portland Trail Blazers
    and Portland Timbers from her modest living room.
  arts: Susan Nissen channels her love of aesthetics by sketching watercolor seascapes inspired by Claude Monet, attending intimate gallery shows featuring emerging artist Lena Ortiz, devouring poetry by
    Ocean Vuong, and unwinding to the ambient sounds of Sigur Rós during her reflective evenings.
  travel: Susan Nissen favors low‑key, contemplative travel, often planning loosely to spend mornings beachcombing for shells in places like the Outer Banks and the Amalfi Coast, while dreaming of a quiet
    retreat on New Zealand’s South Island where she can sketch untouched tides.
  culinary: Susan Nissen enjoys cooking at an intermediate level, frequently preparing grilled salmon drizzled with lemon‑zest olive oil, fresh cucumber‑mint salad with feta, and a weekend ritual of shrimp
    ceviche seasoned with lime, cilantro, and a pinch of sea salt, while occasionally savoring a matcha latte at her favorite coffee shop.
  core: Susan Nissen is a quietly ambitious, art‑obsessed educator who balances solitary sketching and gentle yoga with a habit of misplacing lesson plans and a persistent worry about future career security.
background:
  cultural: Susan grew up in a middle‑class, white Southern family in the coastal region of South Carolina, absorbing the relaxed, community‑oriented lifestyle of Myrtle Beach. The local culture blends
    beach tourism, Southern hospitality, and a growing appreciation for the arts, which has shaped her worldview. Family gatherings often featured barbecues and storytelling, fostering an appreciation for
    tradition while her schooling exposed her to a diverse student body, encouraging open‑mindedness toward new ideas. Though she identifies with the region's modest, polite demeanor, Susan's introverted
    nature leads her to favor smaller, intimate gatherings over larger social events. She values the region's natural beauty, its seasonal festivals, and the strong emphasis on education as a pathway to
    personal advancement.
attributes:
  skills: '[''Lesson planning assistance'', ''Classroom management support'', ''One-on-one tutoring'', ''Differentiated instruction'', ''Educational technology integration'', ''Art integration in curriculum'',
