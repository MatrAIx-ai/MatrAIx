  hobbies: '[''Painting and sketching'', ''Visiting art galleries and museums'', ''Beachcombing and nature walks'', ''Reading contemporary fiction and poetry'', ''Photography'', ''Gardening'', ''Journaling
    and reflective writing'', ''Small‑group book club'', ''Yoga and mindfulness exercises'']'
  career_goals: Susan aims to transition from a teaching assistant to a full‑time certified classroom teacher within the next two years, with a focus on elementary art education. She plans to pursue a Master
    of Education in Curriculum and Instruction, emphasizing interdisciplinary and arts‑based learning. Long‑term, she hopes to become a curriculum specialist or lead an arts integration program for her
    district, designing flexible, student‑centered units that can adapt to varied schedules. Her competitive drive fuels a desire to earn recognition for innovative teaching practices, while her cautious
    nature leads her to seek additional certifications and professional development to reduce uncertainty about job security.
