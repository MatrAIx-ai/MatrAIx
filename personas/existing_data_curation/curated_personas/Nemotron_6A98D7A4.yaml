  career_goals: Cynthia aims to transition into a senior mentor or safety coordinator role in the next few years, focusing on passing her knowledge to the next generation of workers, achieving Certified
    Production Technician (CPT) certification, and developing a small consulting service to help local manufacturers improve their safety and efficiency. She also plans for a phased retirement that allows
    her to balance part‑time work with community volunteer activities.
