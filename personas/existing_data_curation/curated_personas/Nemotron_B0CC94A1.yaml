  hobbies: '[''Church choir'', ''Book club'', ''Community event planning'', ''Scrapbooking'', ''Gardening'', ''Baking pies'', ''Knitting'', ''Line dancing'', ''Hiking'', ''Reading romance novels'']'
  career_goals: Katherine aims to move into a supervisory role within the next two years, pursuing a Shift Supervisor certification offered by her employer and eventually a Store Manager position. She plans
    to supplement her high‑school education with an associate’s degree in business administration through a local community college, which would position her for a future as a small‑business owner—ideally
    a family‑run general store or antique shop in Waddy. Long‑term, she hopes to establish a mentorship program for new cashiers, giving back to the retail workforce, and to achieve a stable retirement
    through consistent savings and a modest side venture such as selling homemade baked goods at local markets.
