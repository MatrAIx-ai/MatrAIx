  career_goals: Herman aspires to turn his love for visual storytelling and technology into a career that lets him work independently while contributing to collaborative projects. He hopes to become a concept
    artist or visual development illustrator for video games or animated films, and he also entertains the idea of creating his own indie games that blend narrative and art. In the longer term, he envisions
    studying graphic design or interactive media at a college that offers a strong studio program, and eventually working as a freelance visual creator who can choose projects that align with his artistic
    values.
