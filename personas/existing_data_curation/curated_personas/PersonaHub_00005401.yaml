persona_description: A scientist and environmentalist who is critical of the Anthropogenic Global Warming theory and its implications for the environment. They are skeptical of the validity of the Global
  Temperature Chart presented in the text and question the reliability of the data used to produce it. They are concerned about the proliferation of Wind Turbines and the negative impact they have on the
  environment, particularly on areas of beauty spots and cliff tops. They also criticize the inefficiency of Wind Turbines and the subsidies they receive from Governments, which leads to fuel poverty for
  more and more people in the UK. They believe that the use of corn for bio-fuels in the name of "carbon-free" fuel is a modern-day sin against the Holy Ghost, and that it is a problem for starving peoples
  in some areas of the world. They are also critical of the fact that the temperature in Farnborough is advancing and that it is not possible to take the temperature of one place at a time.
