personas:
  professional: Kary Silva is an aspiring junior coder and LEGO architect who channels their keen curiosity and practicality into building interactive Scratch games and customizing robotics projects, balancing
    meticulous planning with spontaneous creativity in every build they undertake.
  sports: Kary Silva darts between the River Rapids U-11 soccer squad and the Aqua Stars community swim club, routinely sprinting on the field and cutting laps at the local pool while cheering on the United
    States Men's National Soccer Team, embodying a disciplined yet fun-loving approach to fitness they maintain throughout the school year.
  arts: Kary Silva immerses themselves in marine illustration, often sketching sea creatures inspired by David Doubilet’s underwater photography, while devouring sci-fi graphic novels illustrated by Jim
    Lee and humming along to catchy tunes by OneRepublic, allowing vibrant visual and musical influences to shape the creative downtime they cherish.
  travel: Kary Silva loves family road trips that blend adventure and education, having explored Redwood State Park’s trail network and the Pacific Aquarium’s marine exhibits, while dreaming of a future
    visit to Japan’s Tsukiji Fish Market and the Great Barrier Reef to fuel the marine fascination they nurture.
  culinary: Kary Silva enjoys whipping up chocolate chip cookies and vanilla sugar snickerdoodles with their parents on weekend afternoons, proudly adds a pinch of sea-salt to their homemade pizza, and
    often snacks on apple slices with peanut butter, reflecting a budding kitchen confidence mixed with classic kid-friendly flavors they adore.
  core: Kary Silva masterfully balances curiosity and practicality, channeling boundless energy into LEGO designs and Scratch games while occasionally forgetting to finish a homework assignment after a
    thrilling soccer match, a blend of organized creativity and youthful spontaneity they embody daily.
background:
  cultural: Kary was raised in a suburban American family in Melbourne, Florida, a community strongly tied to the Space Coast and STEM education. Her household celebrates traditional American holidays such
    as Thanksgiving and Christmas, and they often participate in local events like beach clean‑ups and the Melbourne Arts Festival. The blend of beach culture, a focus on science and technology, and a supportive
    neighborhood has shaped her values of curiosity, practicality, and community involvement.
