  hobbies: '[''Vegetable gardening'', ''Acoustic guitar playing (Mexican folk music)'', ''Cooking traditional Mexican dishes'', ''Reading true‑crime literature'', ''Hiking coastal trails'', ''Volunteering
    at senior center (safety workshops)'', ''Participating in Día de los Muertos celebrations'', ''Urban landscape photography'', ''Watching classic film noir'', ''Woodworking small projects'']'
  career_goals: Gabriel aims to earn a promotion to police captain within the next three years, using the role to institutionalize a comprehensive mental‑health support program for officers—a response to
    his own experiences with intense anxiety and emotional reactivity. He also hopes to spearhead the integration of predictive analytics and newer forensic technologies into his precinct, balancing his
    curiosity for innovation with the proven methods that have kept his team effective. Long‑term, he envisions a transition to a consulting position where he can train agencies on resilient leadership,
    community‑focused policing, and culturally competent practices, ensuring his legacy benefits both the force and the diverse communities they serve.
