  hobbies: '[''Sketching landscapes'', ''Visiting art galleries and murals'', ''Listening to indie/experimental music'', ''Reading philosophy and existential literature'', ''Journaling'', ''Hiking in the
    Sonoran Desert'', ''Experimenting with cooking'', ''Learning conversational Spanish'', ''Playing acoustic guitar (self‑taught)'']'
  career_goals: Odell aims to turn his artistic passions into a sustainable freelance career that allows for flexible hours and a low‑stress environment. He plans to enroll in a community college program
    in Fine Arts or Graphic Design, build a modest online portfolio, and take on commission work for local businesses and community murals. Long‑term, he hopes to establish a small studio in Tucson where
    he can host intimate art workshops, collaborate on community projects, and possibly open a pop‑up gallery that showcases emerging desert‑inspired artists.
