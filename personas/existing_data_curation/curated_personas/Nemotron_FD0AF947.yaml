  career_goals: Ngan envisions a future where he can marry his love for technology and art. He aims to attend a high‑school program that offers advanced computer‑science and visual‑arts courses, then study
    computer science or interactive media design in college. He hopes to create visually striking, user‑centric video games or interactive installations that challenge conventional narratives, and he plans
    to compete in coding hackathons and design contests to sharpen his competitive edge. Ultimately, Ngan dreams of one day founding a startup that blends AI‑driven tools with digital storytelling, allowing
    him to continually explore unconventional ideas while leading a team that values both precision and creativity.
