personas:
  professional: Ngan Chu, a 12‑year‑old robotics and digital storytelling enthusiast, programs LEGO Mindstorms creations and crafts interactive Scratch games while meticulously organizing project files
    and simultaneously embracing spontaneous creative tweaks.
  sports: Ngan Chu plays midfield for the Greenefield Dragons middle‑school soccer team, practices badminton at the community center, and avidly follows the NBA’s Golden State Warriors.
  arts: Ngan Chu draws vivid digital comics inspired by Hayao Miyazaki, Osamu Tezuka, and the graphic novel 'Saga', practices piano basics by learning Bach’s Minuet, and refines Vietnamese calligraphy strokes
    during quiet evenings, weaving tradition and modern pop culture into a unique artistic voice.
  travel: Ngan Chu enjoys family trips that blend cultural immersion and tech curiosity, having explored the Tet lantern markets of Hoi An, attended a manga expo in Tokyo, and is planning a future visit
    to Singapore’s Youth STEM Expo, all while balancing school deadlines and a modest travel budget.
  culinary: Ngan Chu favors flavorful pho broth, crispy bánh mì, sushi rolls, and comforting ramen, can skillfully assemble simple spring rolls and rice bowls at home, and often pairs coding marathons with
    quick snack breaks of mango slices and crushed peanuts.
  core: Ngan Chu is a fiercely curious 12‑year‑old who oscillates between building robots, sketching comics, and mastering game mechanics, often staying up late to perfect a new Scratch level while occasionally
    forgetting to tidy their desk.
background:
  cultural: Ngan is a second‑generation Vietnamese‑American raised in San Jose’s vibrant Silicon Valley community. At home he speaks both English and Vietnamese, helps his family prepare traditional dishes
    like pho and bánh xèo, and celebrates cultural holidays such as Tet with lanterns, family gatherings, and folk music. The blend of his parents’ emphasis on academic achievement and the multicultural
    environment of the Bay Area has instilled in him respect for both his heritage and the broader American culture. He participates in local Vietnamese community events, attends a weekend cultural class
    where he learns calligraphy and folk stories, and enjoys contemporary Asian pop culture, from K‑pop to anime, which further shapes his artistic sensibilities.
