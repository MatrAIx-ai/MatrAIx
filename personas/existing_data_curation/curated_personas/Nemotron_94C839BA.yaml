  career_goals: John dreams of growing up to be someone who mixes creativity with helping others. He imagines becoming an artist‑teacher who designs imaginative lessons, a pediatric doctor who cares for
    kids, or a community organizer who creates fun, inclusive events for his neighborhood. His current ambition is to be the “captain” of his school’s art club, leading projects that bring classmates together
    and spark curiosity.
