persona_description: A medical professional who specializes in the field of reanimation, having expertise in the treatment of terminal states and clinical syndromes, as well as the management of acute metabolic
  disturbances, circulatory, pulmonary, hepatic, and renal insufficiency, and the restoration of impaired functions following surgery. They are also familiar with various types of equipment used in reanimation,
  including electronic monitors, defibrillators, and electrostimulators, as well as drugs and surgical techniques. They are likely to be found in specialized departments and centers, treating patients whose
  vital functions are impaired or are likely to be impaired due to brain injury, poisoning, severe burns, myocardial infarction, acute renal failure, or tetanus, as well as in intensive care units treating
  patients with cardiac arrest, poisoning, burns, myocardial infarction, acute renal failure, or other complications.
