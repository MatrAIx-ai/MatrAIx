personas:
  professional: Linda Dalena, a retired applied mathematician with expertise in statistical modeling, Python, R, and technical writing, leverages her methodical project‑management style and curiosity to
    produce data‑driven evaluations for nonprofit programs while pioneering an interdisciplinary Smithsonian fellowship that unites senior scientists and emerging artists.
  sports: Linda Dalena stays active by strolling the trails of Rock Creek Park three times a week, joining the DC Senior Cycling Club’s weekend rides, and cheering on the Washington Capitals during hockey
    season, while balancing her disciplined routine with occasional yoga classes at the community center.
  arts: Linda Dalena regularly sketches the luminous colors of Monet’s Water Lilies at the National Gallery, photographs contemporary installations by Kehinde Wiley, and unwinds listening to Yo‑Yo Ma’s
    cello suites while attending Washington National Opera’s productions of Puccini.
  travel: Linda Dalena favors meticulously planned cultural trips, having toured the Louvre in Paris, the Uffizi in Florence, and the gardens of Kyoto, while recent budget constraints steer her toward weekend
    getaways to historic Annapolis and day trips to Shenandoah National Park for birdwatching.
  culinary: Linda Dalena, an avid home chef, often whips up a vibrant ratatouille using fresh tomatoes, zucchini, and basil from her balcony garden, experiments with Thai green curry infused with lemongrass
    and galangal, and celebrates her love of spice by perfecting a Moroccan tagine with apricots and preserved lemons.
  core: Linda Dalena, a 73‑year‑old retired mathematician, blends analytical rigor with an insatiable love for art and garden‑to‑table cooking, yet habitually hoards receipts and can’t resist a good chess
    puzzle late into the night.
background:
  cultural: Linda was born and raised in Washington, DC, to a middle‑class family of European descent. Her parents, both public‑school teachers, emphasized the value of education, civic responsibility,
    and cultural enrichment. Growing up near the National Mall, she was exposed early to the Smithsonian museums, theater performances, and public debates that defined the capital’s intellectual atmosphere.
    This environment fostered her appreciation for both the rigor of scientific inquiry and the transformative power of the arts. As a white American, she identifies with mainstream cultural traditions
    while also embracing the city’s progressive, multicultural ethos, which has shaped her lifelong commitment to community service, lifelong learning, and advocacy for greater inclusion in STEM.
