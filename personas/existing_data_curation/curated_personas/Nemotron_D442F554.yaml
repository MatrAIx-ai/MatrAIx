  hobbies: '[''Visiting art museums and galleries'', ''Sketching and photographing artwork'', ''Adult education courses in art history and philosophy'', ''Sustainable balcony gardening'', ''Playing chess'',
    ''Volunteering as a STEM mentor'', ''Attending public lectures and symposia'', ''Birdwatching in Rock Creek Park'', ''Cooking experimental international recipes'']'
  career_goals: Although retired from full‑time employment, Linda remains driven by a desire to bridge science and the arts. She aspires to launch an interdisciplinary fellowship at the Smithsonian that
    pairs emerging artists with senior scientists to create visual narratives of scientific research. She also aims to mentor graduate students—especially women and underrepresented minorities—through one‑on‑one
    advisory sessions and workshops on grant writing. Additionally, Linda hopes to complete a memoir that chronicles her experiences as a woman in STEM during the civil‑rights era and to contribute a regular
    column on the intersection of art, science, and aging to a local newsletter.
