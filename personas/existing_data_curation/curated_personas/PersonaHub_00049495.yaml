persona_description: A historian who is interested in the study of the Reconstruction Era in the United States, particularly in the context of the role of various movements and groups such as the Union
  Leagues, the Ku Klux Klan, and the Fenians. They are likely to be interested in the political and social dynamics of the time, the effects of the Civil War on the South, and the ways in which different
  groups sought to advance their interests during this period. They may also be interested in the broader themes of nationalism and the contestation of categories such as race, class, and gender during
  this time.
