  hobbies: '["Cricket (community league)","Attending cultural festivals (Diwali, Navratri)","Car and tractor shows","Cooking Gujarati and fusion cuisine","Hiking in local parks","Restoring vintage motorcycles","Volunteering
    at temple youth program","DIY woodworking projects"]'
  career_goals: Rajesh aims to become a certified senior service technician (ASE Heavy‑Equipment certification) within the next two years, eventually moving into a service manager role at his current shop.
    He aspires to open his own mobile equipment repair business focused on eco‑friendly retrofits, and to mentor apprentices from underrepresented backgrounds. He also plans to complete an associate degree
    in automotive technology to solidify his credentials.
