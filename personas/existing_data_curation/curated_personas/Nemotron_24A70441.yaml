personas:
  professional: Rajesh Lalani, a seasoned heavy‑duty diesel technician with deep expertise in hydraulic diagnostics, welding, and OSHA compliance, they leverage their curiosity and practical mindset to
    lead junior staff, schedule preventative maintenance, and pursue ASE Heavy‑Equipment certification as a stepping stone toward managing a service department and launching an eco‑friendly mobile repair
    enterprise.
  sports: Rajesh Lalani, an avid cricketer in the local Indian community league who idolizes the Kolkata Knight Riders and follows the Mumbai Indians' seasonal matches, they also join weekend hiking groups
    at nearby state parks, and proudly support the local football club, Metro FC, as a regular spectator.
  arts: Rajesh Lalani, a creative enthusiast whose hands bring vintage motorcycles back to life and whose palate invents Gujarati–Mexican fusion dishes, they find artistic inspiration in A. R. Rahman's
    soundtracks, classic Bollywood films starring Shah Rukh Khan, and the energetic folk performances of a Dhol group at cultural festivals.
  travel: Rajesh Lalani, a travel‑savvy planner who prefers combining short weekend hikes in the nearby Rocky Canyon Wilderness with occasional road trips to the annual Goodwood Motor Show in the UK, they
    have already trekked the Annapurna base camp in Nepal and dream of exploring the vineyards of Tuscany while balancing family commitments and the need to invest in their growing mobile repair business.
  culinary: Rajesh Lalani, an enthusiastic home cook who masters traditional Gujarati staples like dhokla, undhiyu, and khandvi while experimenting with fusion creations such as spiced mango chutney tacos,
    they delight in using mustard seeds, fenugreek leaves, and coconut milk, and frequently showcase their culinary experiments at family gatherings and community festivals.
  core: Rajesh Lalani blends rugged diesel expertise with vibrant cultural traditions, they manage to juggle a demanding tech career, weekly cricket matches, and a relentless quest for the perfect fusion
    dish, all while occasionally forgetting to schedule dentist appointments.
background:
  cultural: Rajesh was born to Gujarati Indian parents who emigrated to the United States in the 1970s. Raised in a bilingual household, he grew up speaking Gujarati and English, observing Hindu traditions
    and community values. He celebrates festivals such as Diwali, Navratri, and Ugadi, and maintains close ties with his extended family in India. The Gujarati emphasis on entrepreneurship, hospitality,
    and respect for elders shapes his work ethic and his commitment to community service.
attributes:
  skills: '["Heavy‑duty diesel engine repair","Hydraulic system troubleshooting","Mobile equipment diagnostics","Preventative maintenance scheduling","Welding and metal fabrication","Equipment retrofitting
