persona_description: A periodontist who specializes in the treatment and prevention of periodontal disease, particularly in patients with heart disease, diabetes, osteopenia, and osteoporosis. He/she is
  highly skilled in identifying the signs and symptoms of periodontal disease and providing comprehensive care to patients with periodontal disease. The periodontist is also knowledgeable about the link
  between periodontal disease and other health concerns, such as heart disease, diabetes, and osteoporosis. The periodontist is committed to providing information and treatment necessary to control/ or
  arrest the active infection and help keep the disease in an inactive or controlled state.
