personas:
  professional: David Bice, an aspiring IT support technician, blends a hands‑on knack for hardware—building custom PCs and diagnosing car engines—with a solid grounding in Microsoft Office and Python scripting,
    bringing a practical curiosity and community‑focused reliability to his part‑time retail job and upcoming associate degree in Information Technology.
  sports: David Bice enjoys weekends angling at Lake Houston, hunting whitetail in the woods, and shooting hoops with the Hempstead Community Center's pickup basketball crew, while cheering loyally for
    the Houston Astros, Dallas Cowboys, and Texas Rangers, and balances his fitness routine between outdoor hikes and occasional gym cardio.
  arts: David Bice finds creative balance strumming an acoustic guitar to the sounds of George Strait and Lynyrd Skynyrd after a day of tech troubleshooting, while also immersing himself in strategy‑heavy
    video games like Civilization VI and reading sci‑fi authors such as Neal Stephenson, letting both music and virtual worlds shape his downtime.
  travel: David Bice prefers low‑key road trips that mix rugged adventure and hometown hospitality, having driven to the Texas Hill Country for a weekend of wineries, trekked the trails of Big Bend National
    Park, and dreaming of a summer pilgrimage to Nashville’s live‑music scene, all while planning routes on Google Maps and budgeting his mileage in a spreadsheet.
  culinary: David Bice’s palate gravitates toward smoky Texas barbecue—ribs, brisket, and jalapeño‑infused chili—while his modest cooking skill lets him grill fresh catfish caught on the lake, experiment
    with homemade dry rubs, and occasionally indulge in a late‑night slice of pepperoni pizza after a gaming marathon.
  core: David Bice fuses a small‑town work ethic with a digital tinkerer’s curiosity, juggling PC builds, guitar chords, and community service while pragmatically budgeting for a future tech‑auto shop,
    though they sometimes skip flossing and lose track of time in late‑night games.
background:
  cultural: David was raised in Hempstead, Texas, a small town in Waller County steeped in Southern and rural Texan traditions. His upbringing reflects the values of hard work, self‑reliance, and hospitality
    common to the region. Family gatherings, church community events, and local BBQs have shaped his sense of community and responsibility. While he embraces the classic country‑music and outdoor lifestyle
    of his environment, he also stays connected to broader American youth culture through technology, video games, and contemporary music. This blend of traditional Texan roots and modern digital interests
    informs his outlook, balancing respect for established methods with a genuine curiosity for new ideas.
attributes:
  skills: '[''Computer literacy (Microsoft Office, Windows)'', ''Python scripting (basic automation)'', ''Automotive maintenance'', ''Basic home repair (carpentry, electrical)'', ''Customer service and
