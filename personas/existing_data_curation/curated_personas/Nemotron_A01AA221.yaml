  hobbies: '[''Fishing'', ''Hunting'', ''Hiking'', ''Custom PC building'', ''Playing guitar'', ''Strategy video games'', ''Reading science fiction'', ''Community volunteer work'', ''Live music events'',
    ''Pickup basketball'']'
  career_goals: David aims to complete his associate degree in Information Technology within the next two years and earn industry certifications such as CompTIA A+ and Network+. His short‑term goal is to
    secure an entry‑level IT support or help‑desk position with a local firm, where he can apply his troubleshooting skills and continue learning about networking and system administration. Over the longer
    term, he envisions combining his technical expertise with his mechanical know‑how to open a boutique tech‑and‑auto repair shop that services both computers and vehicles, especially focusing on emerging
    electric‑vehicle technology. He is driven by a desire for stable, well‑compensated employment that also allows him to serve his community and eventually become an entrepreneur.
