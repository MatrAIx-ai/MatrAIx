  career_goals: Abbye hopes to transform her artistic passion into a modest community studio that offers free workshops for residents and a small gallery for local artisans. She also dreams of becoming
    a freelance contributor to regional publications, sharing stories that highlight the cultural richness of Fort Washakie and the surrounding plains. A longer‑term ambition is to help establish an oral‑history
    project that records the memories of Shoshone‑Bannock elders, blending her love of storytelling with a desire to preserve cultural heritage.
