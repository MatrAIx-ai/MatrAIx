personas:
  professional: Michael Baker is a budding mini‑architect who spends hours stacking bright wooden blocks, balancing a lively curiosity about how shapes fit together with a practical desire for sturdy foundations,
    and their energetic, sociable nature turns the playroom into a bustling construction site, though they often leave the blocks scattered, valuing flexibility over strict tidiness.
  sports: Michael Baker is a spirited member of the Little Kickers Soccer Club, eagerly dribbling a miniature ball while cheering for the New York Yankees on TV, and their competitive streak drives them
    to sprint ahead in games, though they sometimes forget to pass to teammates, preferring flexible solo play, and they display a healthy skepticism toward overly structured drills.
  arts: Michael Baker is an enthusiastic fan of Sesame Street and Paw Patrol, often dancing to the catchy tunes of The Wiggles and drawing vibrant pictures of Mickey Mouse, their outgoing nature turning
    every art session into a group performance, while a touch of skepticism emerges when they question why certain characters behave the way they do, and their competitive spirit pushes them to perfect
    every doodle.
  travel: Michael Baker is an adventurous little explorer who loves weekend trips to the nearby zoo and eagerly anticipates family vacations to Orlando’s Magic Kingdom and the Grand Canyon, preferring spontaneous
    road trips over rigid itineraries, though they sometimes show reluctance during long car rides, balancing boundless curiosity with a desire for flexible, joy‑filled travel experiences.
  culinary: Michael Baker is a developing foodie who delights in creamy mac and cheese, crunchy chicken nuggets, and sweet banana slices, often helping stir batter with a plastic spoon, yet they can be
    picky, demanding extra cheese and occasionally refusing broccoli, reflecting their competitive taste buds and relaxed approach to mealtime rules.
  core: Michael Baker is a curious, energetic three‑year‑old who mixes playful competitiveness with a love for spontaneous group fun, often leaving toys scattered in the pursuit of flexible, joy‑filled
    adventures, while occasionally questioning routines and indulging in sweet snack cravings.
background:
  cultural: Michael is raised in a typical small‑town, white, Midwestern family in Okemah, Oklahoma. His household values community gatherings, church attendance, and local traditions such as county fairs,
    high school football games, and seasonal festivals like the annual Okemah Watermelon Festival. The rural setting provides frequent exposure to nature walks, gardening, and stories about the region's
    agricultural heritage, while the local library and community center offer structured activities that nurture his curiosity and social interactions.
