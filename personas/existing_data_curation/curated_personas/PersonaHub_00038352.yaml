persona_description: A wildlife manager responsible for the management and conservation of freshwater marshes, particularly those located on the refuge. They have a deep understanding of invasive species,
  their impacts on the refuge, and the potential for controlling and eradicating them. They are also knowledgeable about the historical and cultural resources on the refuge, including the El Nuevo Constante
  shipwreck and its potential impact on the shoreline. They are responsible for the responsible production of new wells on the refuge, which will generate important revenues for conservation efforts.
