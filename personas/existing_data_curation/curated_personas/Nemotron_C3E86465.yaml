  hobbies: '[''drawing'', ''painting'', ''digital art'', ''Minecraft world-building'', ''reading fantasy novels'', ''dancing'', ''surfing lessons'', ''beachcombing and shell crafting'', ''participating
    in cultural festivals'', ''playing Scratch programming games'']'
  career_goals: She envisions a future where she can turn her imagination into visual worlds, aspiring to study concept art and animation so she can design characters and settings for movies or video games
    that celebrate both her Mexican heritage and the vibrant ecosystems of Hawaii. At the same time, she is fascinated by marine life and hopes to study marine biology, eventually merging the two paths
    as a marine illustrator who documents ocean creatures with artistic flair. Her long‑term ambition is to lead workshops for kids that teach creative expression, believing that art can be a calming outlet
    for emotions like the anxiety she sometimes feels.
