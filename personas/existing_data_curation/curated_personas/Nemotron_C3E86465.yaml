personas:
  professional: Estrella Munoz, an aspiring young game designer and visual storyteller, blends vibrant hand‑drawn creatures with blocky Minecraft constructs, using Scratch to prototype interactive narratives
    that they share with friends, reflecting their boundless imagination and love of collaborative play.
  sports: Estrella Munoz, an enthusiastic beach‑surfing devotee and hula‑dance participant, rides the waves with the Island Breeze Surf Club’s junior team on weekends, practices hula at the community cultural
    center, and cheers for the local youth soccer squad, the Coastal Waves, blending rhythmic movement with seawater energy.
  arts: Estrella Munoz, a prolific young artist, decorates school walls with vivid murals of mythical beasts, creates collages from shells, leaves, and colorful paper, and draws inspiration from the whimsical
    storytelling of Studio Ghibli and the vibrant murals of local street artists, while translating their Scratch adventures into illustrated storyboards.
  travel: Estrella Munoz, who loves salty sea breezes, spends summer vacations exploring the tide‑pools of the nearby Pacific coast, has visited the historic colonial town of San Miguel for its festivals,
    and dreams of snorkeling the coral reefs of Hawai‘i and wandering the ancient stone streets of Machu Picchu with friends, balancing adventurous trips with school commitments.
  culinary: Estrella Munoz, an adventurous young palate, delights in building crunchy taco shells topped with fresh salsa verde, savoring sweet mango‑lime smoothies, crafting colorful fruit salads with
    pineapple, kiwi, and shredded coconut, and experimenting with simple recipes like grilled fish tacos infused with citrus, all while proudly presenting the dishes on hand‑painted plates.
  core: Estrella Munoz navigates the world with a kaleidoscope mind, turning every surf splash, sketch, and song into a vivid story, even as occasional anxiety paints a shadow that they must gently brush
    away.
background:
  cultural: Estrella comes from a Mexican family that maintains strong ties to its cultural roots while living in the multicultural community of Ewa Beach, Hawaii. At home, Spanish is spoken alongside English,
    and family gatherings feature Mexican dishes such as tacos, tamales, and pozole, as well as the occasional Hawaiian poke bowl. She celebrates Día de los Muertos with handmade altars and papel picado,
    and also participates in Hawaiian traditions like lei making, hula, and beach clean‑ups. This blend of Mexican and Hawaiian influences shapes her worldview, fostering a respect for both the vivid storytelling
    traditions of her ancestors and the natural beauty of the islands she calls home.
