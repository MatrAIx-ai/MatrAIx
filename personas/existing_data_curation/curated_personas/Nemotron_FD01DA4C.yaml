  career_goals: Although still in early childhood, Jeanine’s caregivers nurture a growing desire to become an independent, confident learner. She shows a budding interest in caring for others and in structured
    activities, which hints at a future aspiration to pursue a caring profession such as early‑childhood teaching or community service, where her kindness, reliability, and love of routine can be assets.
    In the short term, her main goal is to master age‑appropriate milestones such as potty training, dressing herself, and expressing her needs clearly.
