personas:
  professional: Jeanine Haney, a budding architect of block towers, organizes colorful blocks into precise structures, delights in the predictability of repeating patterns, and gently corrects peers' mistakes
    with a kind, cooperative spirit, and they proudly showcase each tower to their caregivers.
  sports: Jeanine Haney loves toddling to the local park’s mini‑soccer field for weekly parent‑guided sessions with the Little Strikers toddler soccer club, enjoys rhythmic movement in a beginner gymnastics
    class, and on rainy days watches the St. Louis Cardinals with her family, and they always prefer scheduled playtimes that fit their need for structure.
  arts: Jeanine Haney delights in finger‑painting with bright watercolors, sings along to The Wiggles and Raffi, watches Sesame Street episodes starring Elmo, and finds comfort in the soothing lullabies
    of Jewel, and they cherish the predictable rhythms that calm them during nap time.
  travel: Jeanine Haney’s travel highlights include a weekend stay at Grandma’s farm for hay rides, a sunny day at Santa Monica Beach, a family vacation to Disneyland where she rode ‘It’s a Small World,’
    and a short flight to Vancouver, each trip carefully planned around their nap schedule to preserve their beloved routine, and they eagerly share souvenirs with friends.
  culinary: Jeanine Haney prefers soft, mildly seasoned foods such as banana pancakes, macaroni and cheese, and avocado toast, can independently spread peanut butter on crackers, and often requests the
    familiar taste of sweet potato puree while occasionally begging for an extra cookie, reflecting their structured snack limits and occasional indulgent cravings, and they proudly help set the table for
    family meals.
  core: Jeanine Haney is a methodical toddler who thrives on routine, delights in organized play, worries about losing her favorite stickers, and balances kindness with occasional meltdowns over predictable
    expectations, and they often seek reassurance from caregivers when faced with new situations.
background:
  cultural: Jeanine is raised in a white, middle‑class family in Chesapeake, Virginia. Her family’s cultural life blends Southern hospitality with a contemporary suburban lifestyle. Weekly visits to local
    parks, participation in community events such as the Chesapeake Seafood Festival, and regular attendance at a nearby Methodist church shape her sense of community. The proximity to the Atlantic coast
    exposes her to marine themes, and her family places a strong emphasis on routine, politeness, and caring for neighbors, reflecting the region’s blend of coastal and Southern cultural values.
