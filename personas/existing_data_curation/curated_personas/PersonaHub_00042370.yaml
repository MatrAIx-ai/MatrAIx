persona_description: An American political scientist with expertise in the field of immigration policy and its effects on American society, particularly in the context of Mexican immigration. This individual
  is interested in the complex political and cultural implications of large-scale Mexican immigration, including its impact on American citizenship, the culture that binds America together as a community
  of citizens, and the political future of the United States. They are also aware of the political agitation by specific Mexican immigrant organizations aimed at the Reconquista (reconquest) of Southwest
  United States and their proposals to eliminate the U.S. border with Mexico, as well as the statements by various prominent officials in the Mexican government. This persona is likely to be interested
  in the broader implications of continued high levels of Mexican immigration on the cultural and political landscape of the American Southwest and the entire United States.
