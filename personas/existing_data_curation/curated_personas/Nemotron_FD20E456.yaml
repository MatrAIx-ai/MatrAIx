  hobbies: '[''building block towers'', ''singing and dancing to nursery rhymes'', ''playing in the park with other children'', ''pretend play with toy fire trucks and construction vehicles'', ''simple
    arts and crafts (finger painting, crayons)'', ''listening to bedtime stories'', ''watching educational cartoons (fire truck shows)'', ''participating in group games at daycare'']'
  career_goals: Even at his young age, James displays budding ambitions through his play. He is fascinated by fire trucks and often pretends to rescue people, expressing a desire to become a firefighter
    who follows clear, predictable routines and helps the community. He also loves building with large blocks and watching construction vehicles, hinting at future interests in construction or engineering.
    These aspirations combine his need for structure with his enjoyment of hands‑on, flexible activities, and he frequently declares "I want to help" when playing with his toys.
