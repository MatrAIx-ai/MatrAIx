persona_description: A historian who specializes in the study of prehistoric cultures in the American Midwest, particularly the Mississippian culture. His research interests include the distribution and
  patterns of prehistoric settlements, the impact of cultural transformation on social organization, and the role of ritual and ideology in the social structures of prehistoric societies. He is an expert
  in the Cahokia culture and the Cahokia-Mississippian World, and has written extensively on the topics of Cahokia, the Hinterlands, and the Mississippian World. He has conducted archaeological investigations
  in the Illinois region and has published numerous articles and books on the subject.
