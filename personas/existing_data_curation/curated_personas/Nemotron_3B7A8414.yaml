personas:
  professional: Francis Raheja is a diligent aspiring HVAC and electrical technician, leveraging their mechanical aptitude, OSHA safety training, and systematic approach to master apprenticeship tasks while
    eyeing a future as a lead technician and owner of a small handyman business that serves both home‑repair and marine‑maintenance clients on the Gulf Coast.
  sports: Francis Raheja is a devoted fan of the Tampa Bay Buccaneers and the Florida State Seminoles, watches Sunday night football with friends while grilling smoked shrimp, participates in local beach
    volleyball through the Fort Walton Beach Boating Club, and competes in seasonal Gulf fishing tournaments that satisfy their love for structured competition.
  arts: Francis Raheja nurtures a creative side through meticulous scale model ship building, enjoys the nautical storytelling of author Bernard Cornwell, playlists featuring Jimmy Buffett, Lynyrd Skynyrd,
    and local folk singer Bethany Joyce, and frequently visits the Gulf Coast Maritime Museum to draw inspiration.
  travel: Francis Raheja prefers low‑key Gulf‑coast road trips, having taken weekend getaways to Destin, the Florida Keys, and a fishing charter in the Bahamas, while dreaming of a cultural immersion in
    New Orleans and a future cruise to the Caribbean once their handyman business stabilizes.
  culinary: Francis Raheja delights in smoking Gulf grouper over hickory chips, cooking shrimp étouffée with fresh okra and cajun spices, grilling oysters with lemon‑butter glaze, and often seasons dishes
    a touch too salty, a quirk they humorously blame on a love for bold flavors.
  core: Francis Raheja is a methodical 34‑year‑old Gulf‑coast handyman‑in‑training who balances a passion for boats, model ships, and smoked seafood with disciplined budgeting, occasional impulsive tool
    purchases, and a habit of chewing on the ends of wires while scheming their next repair.
background:
  cultural: Francis grew up in a middle‑class family in Fort Walton Beach, a coastal city steeped in Gulf‑Coast Southern culture. The region’s close ties to the nearby Naval Air Station Pensacola introduced
    him early to a disciplined, community‑oriented atmosphere. He was raised with traditional American values—emphasizing hard work, personal responsibility, and community involvement—while also experiencing
    the laid‑back, beach‑centric lifestyle typical of the area. Local customs like Fourth of July fireworks over the Gulf, the Boggy Bayou Mullet Festival, and Sunday barbecues with fresh seafood shaped
    his social rituals. Though his background is predominantly white, the tourist influx and proximity to diverse populations gave him modest exposure to multicultural interactions, prompting him to learn
    basic Spanish phrases. Church attendance during his youth reinforced a sense of fellowship, and the strong emphasis on Southern hospitality cultivated his cooperative yet assertive interpersonal style.
attributes:
  skills: '["Mechanical troubleshooting", "Basic automotive repair", "Home maintenance and repairs", "Computer literacy (MS Office, email)", "Organizational and scheduling", "Customer service", "Safety
    compliance (OSHA 10)", "Basic Spanish communication", "Boating and marine equipment maintenance", "First aid and CPR"]'
  hobbies: '["Fishing", "Boating", "Beach clean‑ups (volunteer)", "DIY home improvement projects", "Model ship building", "Grilling & smoking seafood", "Watching football", "Strategy board games (e.g.,
    Settlers of Catan)", "Simulation video games", "Reading personal finance and self‑help books"]'
  career_goals: Francis aims to transition from intermittent odd jobs to a stable, skilled trade career. His short‑term goal is to enroll in a community‑college HVAC or electrical certification program
    and secure an apprenticeship with a local utility or maintenance firm. In the medium term, he envisions obtaining journeyman status and leveraging his reliability and organizational strengths to become
    a lead technician. Ultimately, Francis hopes to launch his own small‑scale handyman business, offering home‑repair and marine‑maintenance services to fellow Gulf Coast residents, allowing him to achieve
    financial independence and purchase a modest beachfront property. He also aspires to take on a mentorship role within his community, guiding other adults who are pursuing trade certifications later
    in life.
