persona_description: A scientist who specializes in the field of photosynthesis and the design of artificial systems for photochemical storage. They are experienced in exploring the thermodynamic constraints
  on the photovoltaic or photochemical solar energy conversion and applying these principles to the design of efficient conversion processes for artificial photosynthesis. They have a deep understanding
  of the molecular mechanisms of multi-electron catalysis in photosystem II and hydrogenases, and are known for their contributions to the scientific underpinning of the principles of photosynthetic energy
  conversion.
