personas:
  professional: Stephen Dixon, a budding digital artist and novice Python developer, merges his love for South Carolina landscapes with methodical coding, creating interactive sketch apps and teaching fellow
    students in the art club while reliably meeting project deadlines.
  sports: Stephen Dixon follows the Carolina Panthers and the Greenville Swamp Rabbits, plays on his middle school cross‑country team, hikes the Table Rock trail on weekends, and enjoys occasional pickup
    soccer matches with friends at the local park.
  arts: Stephen Dixon, an avid fan of modern visual artists like Beeple and classic painters such as Monet, spends evenings strumming John Mayer riffs on acoustic guitar while absorbing sci‑fi novels by
    Isaac Asimov and drawing inspiration from the Savannah River's hues for his digital collages.
  travel: Stephen Dixon prefers weekend road trips to nearby Charleston and Asheville, planning routes with his tablet and saving allowance for a future family trip to Japan's Kyoto to explore traditional
    temples and anime culture, while dreaming of camping in the Great Smoky Mountains.
  culinary: Stephen Dixon enjoys whipping up quick pesto pasta, avocado toast, and chocolate chip pancakes, experimenting with fresh basil from his backyard garden, but is prone to snacking on chips and
    sugary soda while gaming.
  core: Stephen Dixon is a curious, organized teen who balances digital art, guitar practice, and coding with community volunteering, all while navigating typical adolescent quirks like gaming splurges
    and occasional skin flare‑ups.
background:
  cultural: Stephen grew up in North Augusta, a small city in Aiken County, South Carolina, where Southern hospitality and community cohesion are central to daily life. His family has deep roots in the
    region, tracing back to English and Scots‑Irish ancestors who settled in the Lowcountry, and they celebrate traditional Southern holidays with dishes like fried chicken, collard greens, and peach cobbler.
    The local culture emphasizes respect for elders, church involvement, and a strong sense of neighborly support. While he enjoys regional customs such as high‑school football games and county fairs, Stephen
    also embraces broader American and digital cultures, staying connected to global art trends and technology through online platforms. This blend of Southern values and contemporary influences shapes
    his worldview and personal aspirations.
