  career_goals: Stephen envisions a future where he can fuse his love for art and technology. He aims to pursue a high‑school program focused on visual arts and computer science, eventually earning a degree
    in multimedia design, animation, or game development. He hopes to work as a digital artist or UI/UX designer, creating immersive experiences that communicate ideas in innovative ways. Stephen also aspires
    to lead community art workshops, sharing his skills with younger students and fostering creativity in his hometown. His organized nature fuels his ambition to become a project manager for creative teams,
    ensuring artistic visions are realized on schedule.
