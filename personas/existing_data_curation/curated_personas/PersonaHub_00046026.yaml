persona_description: A patient who is undergoing a stem cell transplant and is eligible to receive special T cells transduced with the inducible Caspase-9 suicide gene. This patient is interested in understanding
  the potential clinical and immunological effects of the treatment, as well as the immune reconstitution and relative contribution of endogenous T cell recovery and infused gene-modified T cells. They
  are also interested in learning about the overall and disease-free survival of recipients of iCaspase9 T cells at 100 days and at 1 year post-transplant.
