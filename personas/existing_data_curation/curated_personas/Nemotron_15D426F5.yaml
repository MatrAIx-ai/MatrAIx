  hobbies: '[''Hiking in the Wasatch Mountains'', ''Yoga and mindfulness practice'', ''Reading classic literature and poetry'', ''Photography (landscape and portrait)'', ''Volunteering at local arts festivals'',
    ''Community gardening and culinary experimentation'']'
  career_goals: Christine aims to record a concept album that blends her love for classic folk storytelling with modern indie production, targeting release within the next two years. She plans to launch
    a community music mentorship program in Salt Lake City, offering weekly workshops for adult learners and emerging teenagers. Long‑term, she envisions establishing a small, cooperative performance space
    that showcases local musicians while providing reliable income streams for herself through teaching, occasional touring in the Intermountain region, and licensing her original songs for film and television.
    Her goals balance a structured production timeline with the flexibility to respond to creative inspiration and community needs.
