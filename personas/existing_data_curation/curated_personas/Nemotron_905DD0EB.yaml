  career_goals: Gentry dreams of becoming a civil engineer or robotics inventor who creates practical, real‑world solutions. He also imagines working as a wildlife researcher in the Appalachian foothills,
    combining his love of nature with scientific inquiry. He aspires to design and build functional projects—like a model bridge for his school science fair—while earning recognition in competitions that
    satisfy his competitive spirit.
