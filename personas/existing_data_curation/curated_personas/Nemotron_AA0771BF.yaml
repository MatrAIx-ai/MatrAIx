  career_goals: Priscilla aims to earn a vocational certificate in early childhood education or become a community health aide, allowing her to work in local schools or community centers. In the longer
    term she hopes to become a community outreach coordinator, organizing youth programs and health‑awareness events in Worland. She is also considering a career in hospitality management at a local hotel
    or restaurant, where she can combine her sociable nature with her organizational strengths.
