personas:
  professional: Priscilla Clamp, an 18‑year‑old aspiring community health aide and theater production manager, leverages their reliable, talkative nature and meticulous planning skills to orchestrate youth
    health workshops and stage events with a practical, hands‑on approach.
  sports: Priscilla Clamp, a member of the local Worland Hiking Club and fan of the University of Wyoming Cowboys football team, spends weekends hiking the Bighorn Mountains, enjoys seasonal snowshoeing
    in winter, and follows the Denver Broncos and Colorado Rockies for NFL and MLB action.
  arts: Priscilla Clamp, a vibrant participant in Worland’s community theater and karaoke scene, channels their love for performance into starring roles and backstage design while drawing inspiration from
    Broadway productions, Taylor Swift’s pop anthems, and classic John Hughes films.
  travel: Priscilla Clamp prefers short, budget‑friendly road trips that blend outdoor adventure with cultural stops, having explored Yellowstone National Park, the historic town of Cody, and planning a
    future visit to Austin, Texas for its live‑music festivals, all while balancing school commitments.
  culinary: Priscilla Clamp enjoys experimenting in the kitchen, perfecting dishes like braised short‑rib stew with rosemary, homemade pepper‑jack mac and cheese, and hearty beet salad, often sourcing fresh
    ingredients from the local farmers’ market and cooking for large gatherings.
  core: Priscilla Clamp is a talkative, detail‑oriented 18‑year‑old who thrives on community engagement, meticulously plans events and budgets while occasionally procrastinating on college‑aid paperwork.
background:
  cultural: Priscilla is a white American raised in Worland, a small town in Big Horn County, Wyoming. Her family traces its roots to German and Scandinavian immigrants who settled in the region during
    the early 20th century. Growing up in a close‑knit rural community, she was exposed to values of self‑reliance, neighborly support, and a strong work ethic. Local traditions such as county fairs, rodeos,
    church gatherings, and family barbecues have shaped her sense of community. While she embraces the practical, down‑to‑earth lifestyle of a Wyoming small‑town resident, she also draws inspiration from
    broader American popular culture through music, social media, and national television.
