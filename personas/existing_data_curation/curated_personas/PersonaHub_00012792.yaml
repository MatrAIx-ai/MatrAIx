persona_description: A researcher or biologist interested in the study of migratory and resident blue tits, particularly in their physiological adaptations to migration and wintering at high latitudes.
  They are interested in measuring and comparing their metabolic rates and cost of thermoregulation, and how these adaptations may differ between migratory and resident blue tits. They may also be interested
  in the role of social dominance and molting in these adaptations.
