personas:
  professional: Stephanie Scurry, a 26‑year‑old textile machine operator, leverages their hands‑on expertise with looms and knitting machines to slash downtime, yet they often push back against overly rigid
    SOPs, applying lean‑manufacturing tweaks while training newcomers with a no‑nonsense, results‑driven style.
  sports: Stephanie Scurry, an avid hiker of the Patuxent River trails and regular rider with the St. Mary’s County Cycling Club, follows the Baltimore Ravens in the fall and the Washington Capitals in
    the winter, preferring solo cardio sessions and yoga over team sports while using a Strava log to track progress and set personal performance goals.
  arts: Stephanie Scurry channels their creative energy into knitting complex cable patterns inspired by Kaffe Fassett and Anni Albers, while winding down with Bon Iver’s acoustic albums and solving Sunday‑day
    crosswords, using these solitary arts to balance their competitive work mindset.
  travel: Stephanie Scurry favors low‑key, nature‑focused travel, having road‑tripped through Shenandoah National Park and camped along the Oregon Coast, while they dream of a solo hiking adventure in Iceland’s
    volcanic landscapes and a cultural immersion in Kyoto’s zen gardens, always planning trips with meticulous itineraries but leaving room for spontaneous trail discoveries.
  culinary: Stephanie Scurry enjoys a modest yet adventurous palate, expertly crocheting homemade granola and whipping up a comforting miso‑ramen bowl with shiitake mushrooms, while their go‑to comfort
    dish remains a lemon‑dill baked salmon paired with quinoa, and they often experiment with lavender honey drizzle on oat‑based cookies.
  core: Stephanie Scurry is a meticulous, quietly competitive textile technician who channels their stress‑prone, solitary nature into efficient machinery upkeep, disciplined budgeting, solo fitness, and
    a penchant for intricate knitting, all while occasionally succumbing to impulsive splurges and chronic worry.
background:
  cultural: Stephanie was raised in a middle‑class, white family in Maryland with deep roots in the Mid‑Atlantic region, tracing ancestry to English and German immigrants. Her upbringing emphasized a practical
    work ethic, self‑reliance, and community responsibility. While she identifies with mainstream American cultural norms, she also appreciates the local heritage of St. Mary's County, including its maritime
    history and regional traditions, which have shaped her appreciation for hands‑on craftsmanship and outdoor recreation.
attributes:
  skills: '[''textile machine operation'', ''machine setup and calibration'', ''mechanical troubleshooting'', ''preventive maintenance'', ''technical schematics interpretation'', ''quality control inspection'',
