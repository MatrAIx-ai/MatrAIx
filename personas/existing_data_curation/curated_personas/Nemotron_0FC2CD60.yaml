  hobbies: '[''knitting'', ''puzzle solving (sudoku, crosswords)'', ''hiking local trails'', ''cycling'', ''yoga'', ''journaling'', ''DIY electronics projects'', ''photography'']'
  career_goals: Stephanie aims to move from a machine setter/operator role to a senior lead technician or maintenance engineer position within the textile manufacturing sector. She plans to obtain a Certified
    Manufacturing Technologist credential and lead process‑improvement projects that boost efficiency and reduce downtime. In the longer term, she seeks a supervisory role where she can shape production
    workflows, mentor a small team, and negotiate greater responsibility while preserving the autonomy she values.
