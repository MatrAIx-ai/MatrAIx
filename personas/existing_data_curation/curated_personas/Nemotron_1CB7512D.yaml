personas:
  professional: Meghan Webb, a retired community organizer turned senior arts curator, leverages her public speaking flair, event‑planning acumen, and knack for weaving genealogy stories into exhibitions,
    while balancing meticulous planning with a spontaneous, talk‑heavy charm.
  sports: Meghan Webb, an avid supporter of the Laurens County High School Wildcats football team and the Atlanta Braves, stays fit through daily garden walks, weekly square‑dancing socials, and occasional
    gentle yoga classes at the senior center, while acknowledging a lingering reluctance to tackle high‑impact activities.
  arts: Meghan Webb, a watercolor enthusiast who sketches the rolling hills surrounding Laurens, regularly attends folk‑music gatherings featuring artists like Gillian Welch and Doc Watson, and volunteers
    as an art‑therapy facilitator, drawing inspiration from classic jazz records by Miles Davis and the visual boldness of folk art.
  travel: Meghan Webb, who loves relaxed road trips, has explored Savannah’s historic squares, savored Asheville’s Blue Ridge vistas, dreams of a pilgrimage to the art museums of Paris, and prefers planning
    trips around senior‑friendly transportation options and modest travel budgets.
  culinary: Meghan Webb, an adept home cook, delights in preparing shrimp‑and‑grits with fresh garden thyme, simmered collard greens seasoned with smoked ham, and peach cobbler topped with crunchy oat crumble,
    while occasionally experimenting with low‑country seafood boils for community potlucks.
  core: Meghan Webb, a talkative, curiosity‑driven senior, blends Southern hospitality with relentless artistic zeal, yet often worries about overcommitting and occasionally misplaces her reading glasses.
background:
  cultural: Meghan was born and raised in a small farming community near Laurens, South Carolina, in a traditionally Southern, white family with deep roots in the region. Her upbringing emphasized church
    participation, Southern hospitality, and community involvement, while her parents encouraged curiosity and appreciation for the arts. Growing up during the civil‑rights era, she witnessed profound social
    change, which nurtured her openness to unconventional ideas. Her college studies in literature and art history, though not completed, reinforced a lifelong love of storytelling, folk traditions, and
    visual culture. Today, she blends her Southern heritage—such as an affinity for quilting, folk music, and seasonal festivals—with a broad, exploratory mindset that embraces new artistic experiences.
