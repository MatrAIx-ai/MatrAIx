persona_description: A clinician who specializes in the management of chronic wounds, particularly those associated with pain. They are well-versed in the interrelationships between pain, stress, and wound
  healing, and are committed to developing a systematic approach to address the key determinants of pain and their interrelationships. They are interested in the relationship between pain and anxiety, and
  how anticipation and expectation of pain can evoke significant emotional responses. They are also interested in the nocebo effect, the phenomenon of pain being perceived even when there is no actual pain.
