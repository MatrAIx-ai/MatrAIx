personas:
  professional: Lester Martinez, a 6‑year‑old aspiring engineer, channels their curiosity and practicality into building intricate LEGO creations, experimenting with simple science kits, and solving puzzle
    games, and they display early problem‑solving skills and a competitive streak that fuels a desire to master every challenge.
  sports: Lester Martinez enjoys watching the Seattle Seahawks and the Los Angeles Lakers on TV and they attend a weekly community swimming class at the local pool, preferring quiet solo laps over team
    sports and occasionally dribbling a basketball alone in the backyard.
  arts: Lester Martinez channels their love of space travel into drawing comic‑strip characters inspired by Stan Lee and Jeff Smith, they eagerly devour the animated adventures of Hayao Miyazaki, and they
    listen to the ethereal soundtrack of the game Journey while arranging dinosaur figurines on a shelf, revealing a solitary yet vivid artistic imagination.
  travel: Lester Martinez loves spontaneous weekend trips to the beach in Santa Monica and occasional family outings to the National Museum of Natural History in Washington D.C., they dream of an astronaut‑like
    virtual tour of the International Space Station and a future hike through the Grand Canyon, reflecting a curiosity‑driven yet flexible travel style.
  culinary: Lester Martinez prefers pepperoni pizza, dinosaur‑shaped chicken nuggets, and spaghetti with marinara, can proudly make a peanut butter‑jelly sandwich using grape jam and creamy butter, and
    they often add a sprinkle of shredded cheese as a personal touch, while occasionally indulging in sweet cereal with honey‑kissed raisins.
  core: Lester Martinez is a solitary, curiosity‑driven 6‑year‑old who builds worlds with LEGO, battles puzzles, and worries about the smallest details, and they balance practical skepticism with a vivid
    imagination and occasional disorganized habits.
background:
  cultural: Lester grows up in a bilingual Ecuadorian household in New Brunswick, New Jersey. At home, Spanish is spoken alongside English, and his family celebrates Ecuadorian traditions such as Carnaval,
    Día de los Difuntos, and the preparation of dishes like ceviche, empanadas, and arroz con pollo. He often helps his parents in the kitchen, learning to identify flavors and aromas from his heritage.
    While integrating into the diverse community of Middlesex County, he attends a local elementary school where he participates in a Spanish language program. His cultural background gives him a strong
    sense of family connection, a love for storytelling, and an appreciation for both his Latin American roots and his American environment.
