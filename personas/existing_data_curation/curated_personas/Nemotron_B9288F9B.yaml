  hobbies: '[''reading adventure/science‑fiction books'', ''LEGO building'', ''Minecraft (solo sandbox play)'', ''jigsaw puzzles'', ''single‑player puzzle video games'', ''simple science experiment kits'',
    ''drawing comic strips'', ''collecting dinosaur figurines'']'
  career_goals: Lester dreams of building things that reach the stars. He often talks about becoming an astronaut‑engineer who can design rockets, but he also imagines creating his own video games where
    he controls every character. He hopes to study robotics and space science when he grows older, valuing a career that lets him blend his love for new ideas with practical, hands‑on creation. While his
    competitive streak pushes him to be the best at any challenge, his desire for independence means he wants a future where he can work alone on projects he chooses.
