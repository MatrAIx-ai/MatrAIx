  career_goals: Loc aims to transition into a leadership role within his school district, such as a Grade-Level Team Leader or Curriculum Coordinator, within the next three to five years. To support this,
    he plans to earn a master's degree in Educational Leadership while continuing to refine his data-informed instructional practices. He is passionate about creating an after-school entrepreneurship club
    that integrates real-world business concepts for middle-school students, and he hopes to expand bilingual support services for families of East Asian heritage. Ultimately, he envisions a career path
    that balances his love of routine classroom work with the ability to influence school-wide policy and community partnerships.
