personas:
  professional: Harry Ventura is a meticulous business analyst who leverages advanced Excel, Power BI, Tableau, and SQL skills to design data‑driven strategic plans, applying Lean Six Sigma and Agile frameworks
    to streamline processes while fostering a collaborative, high‑performance team culture that mirrors their disciplined, compassionate nature.
  sports: Harry Ventura enjoys weekend hikes along the Torrey Pines coastal trail, follows the San Diego Padres and the San Diego Wave FC with enthusiastic but measured fandom, and participates in a local
    adult soccer league to stay active while appreciating the structured teamwork it offers.
  arts: Harry Ventura finds creative release strumming acoustic guitar to the folk melodies of José González and the soulful pop of John Mayer, unwinds with classic albums by Miles Davis, and regularly
    attends performances at San Diego’s Old Globe Theatre, especially productions of contemporary playwrights like Lin‑Manuel Miranda.
  travel: Harry Ventura favors meticulously planned short trips, having explored the historic streets of Mexico City and trekked in Yosemite National Park, and dreams of a two‑week itinerary that blends
    Patagonia’s rugged glaciers with Japan’s culinary districts, all balanced against a disciplined budget.
  culinary: Harry Ventura, a confident home cook, dedicates weekends to perfecting mole poblano, pork tamales, and hearty pozole, sourcing dried pasilla and ancho chiles, masa harina, and fresh cilantro
    from the neighborhood market, while occasionally treating themselves to sushi nights to broaden their palate.
  core: Harry Ventura merges structured analytical ambition with a quiet love for solitary puzzles, a habit of late‑night crossword challenges that sometimes cut into sleep, and an earnest drive to mentor
    others despite persistent worries about meeting personal standards.
background:
  cultural: Harry is a first‑generation Mexican‑American born and raised in Chula Vista, a community with a strong Latinx presence. He grew up bilingual, speaking Spanish at home while navigating American
    culture at school and work. Family gatherings centered around Mexican traditions—celebrating Día de los Muertos, quinceañeras, and Christmas posadas—instilled a deep respect for cultural heritage and
    community. His Catholic upbringing and the emphasis on familial loyalty shape his sense of responsibility and compassion. Harry blends Mexican values of collectivism and hospitality with the pragmatic,
    achievement‑oriented mindset of his business education, creating a balanced perspective that informs both his professional discipline and his desire to give back to the community.
attributes:
  skills: '[''Strategic Business Analysis'', ''Financial Modeling'', ''Data Visualization (Power BI, Tableau)'', ''Process Improvement (Lean Six Sigma)'', ''Project Management (Agile/Scrum)'', ''Budgeting
