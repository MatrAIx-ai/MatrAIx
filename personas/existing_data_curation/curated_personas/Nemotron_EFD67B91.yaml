  hobbies: '[''Cooking traditional Mexican cuisine'', ''Reading business and self-help books'', ''Hiking coastal trails'', ''Playing acoustic guitar'', ''Volunteer tutoring at local after‑school program'',
    ''Gardening'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Harry aims to progress to senior management analyst and eventually assume a director of strategic planning role, positioning himself for a future senior operations leadership position such
    as Vice President of Operations or COO. He plans to deepen his analytical toolkit by earning certifications in data science and an MBA in Business Analytics. He is motivated to lead a small, high-performing
    team that drives process efficiencies and cultivates a culture of collaboration. Additionally, he seeks to develop a mentorship program for junior analysts and to volunteer his expertise with local
    non-profits that support the Mexican-American community, aligning his career growth with his compassionate drive to help others.
