persona_description: A public health official responsible for monitoring and managing the incidence of tuberculosis (TB) in cattle in Great Britain through the Animal and Plant Health Agency (APHA). They
  are interested in the latest epidemiological surveillance data collected through their administrative system (SAM) and are looking for detailed information on the number of new and open incidents, herd
  prevalence and recurrence, and animal level risk. They are also interested in the breakdown of recurrence rate and the percentage of Officially TB-Free herds. They may be interested in the PDF dashboard
  which gives a snapshot of the disease picture for the quarter, in a printable format. They are aware of the limitations of the data and may be looking for ways to improve the accuracy and reliability
  of the surveillance data.
