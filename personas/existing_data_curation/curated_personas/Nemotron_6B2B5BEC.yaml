  career_goals: Brendan aims to build on his front‑desk experience by earning a hospitality certification and moving into a supervisory role within the next two years. He envisions becoming a front‑desk
    manager, overseeing staff schedules, training new employees, and improving guest‑experience procedures. In the longer term, he hopes to take on a general manager position at a larger resort, where he
    can apply his practical, organized approach to larger‑scale operations while providing a stable income for his family. He also plans to develop strategies for managing his anxiety, such as stress‑reduction
    workshops offered by his employer, to ensure his career growth does not compromise his wellbeing.
