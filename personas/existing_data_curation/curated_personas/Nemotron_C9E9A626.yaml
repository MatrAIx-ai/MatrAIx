  hobbies: '["Knitting and crocheting", "Rose gardening", "Reading romance and mystery novels", "Cooking traditional Texan meals", "Attending church services and choir", "Watching classic country music
    shows", "Nature walks in local parks", "Participating in community fairs", "Journaling", "Volunteering at the senior center"]'
  career_goals: At 65, Ligaya aims to stay active and emotionally balanced while deepening her contributions to the Odessa community. She plans to expand her volunteer role at the senior center, eventually
    serving as a peer‑support liaison for newcomers dealing with anxiety or grief. She also hopes to improve her digital literacy through a local library class so she can keep in touch with distant family
    and share her homemade recipes online. Maintaining a steady routine of health‑focused activities—daily walks, gentle stretching, and regular medical check‑ups—is a priority, yet she welcomes occasional
    spontaneous weekend trips with her husband to nearby lakes or local fairs. Ultimately, she wishes to be a supportive grandmother, help her grandchildren with school projects, and preserve the cultural
    heritage of West Texas through storytelling and participation in community festivals.
