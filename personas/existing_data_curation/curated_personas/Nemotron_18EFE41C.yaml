personas:
  professional: Francisca Garcia is a budding cartoonist who channels a relentless curiosity and love for unconventional styles into daily sketchbooks and digital paintings, often surprising teachers with
    daring compositions while they battle a spontaneous aversion to rigid deadlines.
  sports: Francisca Garcia powers through competitive U‑12 matches with South Gate United, idolizes LA Galaxy’s youth academy, and fuels off‑season fitness with solitary bike rides along South Gate parks,
    all while they prefer the intensity of small‑team drills over large‑crowd spectacles.
  arts: Francisca Garcia devotes afternoons to sketching cartoon characters inspired by Stan Lee and Hayao Miyazaki, digitally paints experimental panels that echo the bold colors of mariachi and corridos,
    and they craft intricate papel picado banners that blend traditional motifs with a modern graphic‑novel flair.
  travel: Francisca Garcia favors spontaneous day trips, cycling to Griffith Park for sunrise studies, dreaming of a weekend surf in Santa Barbara, and they eagerly await a family vacation to the historic
    streets of Mexico City, all planned on a whim rather than a strict itinerary.
  culinary: Francisca Garcia loves the zesty snap of tacos al pastor, the buttery melt of homemade quesadillas, and the smoky crunch of elote, often attempting to whip up guacamole with ripe avocados, lime,
    cilantro, and a pinch of chili powder, while their culinary confidence is still budding at the kitchen counter.
  core: Francisca Garcia is a ten‑year‑old art‑obsessed explorer who sketches outside the box, hoards LEGO pieces, skates through soccer fields, and occasionally blows through their allowance on glitter
    pens while battling a chronic need for organization.
background:
  cultural: Francisca grew up in a bilingual Mexican‑American household in South Gate, California, where family gatherings and community celebrations are central. He participates in traditional festivities
    such as Día de los Muertos and Cinco de Mayo, often helping to create decorative papel picado and preparing homemade tamales. His upbringing emphasizes familismo, respect for elders, and a strong sense
    of community, which informs his artistic sensibilities and his occasional skepticism toward unfamiliar intentions. The vibrant Latino neighborhood, rich with murals and street art, continually fuels
    his curiosity and appreciation for varied cultural expressions.
