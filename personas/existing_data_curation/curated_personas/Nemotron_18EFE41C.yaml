  career_goals: Inspired by his love of art and new ideas, Francisca aspires to become a multimedia artist who can merge traditional Mexican folk motifs with modern digital media. He dreams of working as
    a concept artist or animator for video games or animated films, creating characters and worlds that reflect his cultural heritage. In the short term, he aims to win his school's art competition, develop
    a Scratch project that showcases interactive storytelling, and build a portfolio of illustrated comics that he can share with a small, supportive audience.
