persona_description: A nuclear power plant operator with extensive experience in the maintenance and operation of nuclear power plants. This individual is highly skilled in troubleshooting, testing, and
  inspecting highly complex electrical/electronic equipment, and is responsible for developing complex troubleshooting plans to support plant operations. They are also responsible for monitoring, assessing,
  and improving the performance and reliability of plant systems and components, and acting as a technical specialist for a specific engineering field. They have a deep understanding of radiation protection
  and have a proven track record of ensuring the safety of employees working in radiation areas, as well as the facility's compliance with radiation requirements.
