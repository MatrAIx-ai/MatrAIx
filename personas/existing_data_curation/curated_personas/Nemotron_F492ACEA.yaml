  career_goals: Jenny aspires to transition from an attendant role to a full‑time bartender and eventually a bar manager in a venue that blends culinary craft with artistic ambiance. She aims to complete
    a bachelor’s degree in hospitality or culinary arts, focusing on beverage program development. Her long‑term ambition is to open a small, community‑oriented café or taco bar that showcases Mexican street
    food with a contemporary artistic twist—featuring mural walls, rotating art exhibits, and curated music nights. She also wants to develop her own signature cocktails that incorporate traditional Mexican
    flavors, positioning herself as a creative professional in the hospitality scene. To achieve this, she plans to obtain a certified mixology credential, network with local chefs and artists, and save
    capital for a modest startup.
