personas:
  professional: Jenny Santeliz, a 24‑year‑old front‑of‑house professional, leverages their curiosity and relaxed, flexible mindset to blend meticulous table service with a flair for visual plating, while
    experimenting with simple cocktail recipes during quiet shifts and navigating busy rushes with a calm, improvisational style.
  sports: Jenny Santeliz, an avid weekend hiker who explores the Kern County trail system with the Kern Trails Outdoor Club and supports the Los Angeles Dodgers and Bakersfield Condors, they maintain fitness
    through brisk hill walks and occasional pickup soccer games at the community field, favoring spontaneous activity over regimented workouts.
  arts: Jenny Santeliz, whose creative outlet spans sketching vibrant urban murals, experimenting with watercolor inspired by local gallery exhibits, and strumming acoustic guitar while mixing the soulful
    sounds of Lila Downs with indie rock staples like Arctic Monkeys, they infuse these eclectic influences into the atmospheric playlists they curate for each shift.
  travel: Jenny Santeliz, a 24‑year‑old keen on spontaneous getaways, regularly plans weekend drives to nearby spots like Santa Barbara and Yosemite, while dreaming of future cultural immersion trips to
    Oaxaca’s bustling food markets and the historic plazas of Seville, they balance wanderlust with a modest travel budget and occasional work‑schedule constraints.
  culinary: Jenny Santeliz, a passionate home‑cook, masterfully blends traditional flavors by preparing mole‑infused carnitas tacos, crafting mezcal‑chocolate mousse desserts, and experimenting with smoked
    chipotle and fresh cilantro in classic dishes such as chiles en nogada, and they love the aromatic interplay of cumin, cacao, and lime.
  core: Jenny Santeliz, a 24‑year‑old hospitality enthusiast, merges a relentless curiosity for art and flavors with a laid‑back, occasionally disorganized lifestyle, and they channel anxiety into daily
    meditation while indulging in spontaneous mural sketch‑sessions and late‑night cocktail‑mixing contests.
background:
  cultural: Jenny was raised in a bicultural Mexican‑American household in Shafter, California. Her family maintains traditions such as celebrating Día de los Muertos, cooking and sharing homemade tamales,
    and speaking Spanish at home, which has given her fluency in both languages. The agricultural setting of Kern County exposed her to the rhythms of farm work and community gatherings, fostering a deep
    respect for hard work and seasonal cycles. Her Mexican heritage informs her taste for bold, savory flavors and vibrant colors, which she brings into her culinary experiments and aesthetic sensibility.
    While she feels a strong connection to her cultural roots, Jenny also embraces the diverse influences of broader Californian culture, often blending traditional Mexican elements with contemporary artistic
    trends.
