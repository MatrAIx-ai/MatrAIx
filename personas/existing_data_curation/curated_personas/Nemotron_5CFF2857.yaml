personas:
  professional: James Hague is a 23‑year‑old chief executive of a community‑focused retail shop in Oshkosh, leveraging strong leadership, data‑driven decision‑making, and clear communication to keep operations
    predictable while fostering a friendly, team‑oriented culture, and they consistently emphasize structured processes.
  sports: James Hague is a regular in Oshkosh’s community basketball league and a weekend participant in a co‑ed recreational soccer team, while cheering on the Green Bay Packers, Milwaukee Bucks, and Milwaukee
    Brewers for seasonal excitement, and they keep fit through gym sessions and kayaking trips on Lake Winnebago.
  arts: James Hague unwinds by attending live performances at the Oshkosh Public Market featuring local folk bands, streaming classic rock icons like Bruce Springsteen and modern indie stars such as Sufjan
    Stevens, and watching indie films starring Frances McDormand, and they occasionally sketch promotional flyers for their business.
  travel: James Hague prefers well‑planned road trips that balance adventure and relaxation, having explored Door County’s wineries, biked the Milwaukee Lakeshore Trail, taken a solo weekend to Denver’s
    Rockies, and dreaming of a summer camp at Yellowstone, and they usually budget travel through a mix of savings and occasional credit‑card rewards points.
  culinary: James Hague enjoys home‑brewing craft lagers and grilling hickory‑smoked bratwurst, marinated chicken thighs, and classic Wisconsin‑style cheese curds with a side of house‑made coleslaw, and
    they consider themselves an intermediate cook who loves experimenting with stout‑marinated ribs and seasonal farm‑to‑table vegetables.
  core: James Hague is a practical, socially‑driven 23‑year‑old entrepreneur who blends structured business acumen with a love for team sports, outdoor adventures, and community gatherings, often juggling
    ambitious goals with a habit of over‑committing to social events.
background:
  cultural: James grew up in the Midwestern heartland of Oshkosh, Wisconsin, in a family with deep roots in the region’s Dutch‑German farming and manufacturing heritage. The community’s emphasis on modesty,
    hard work, and neighborly cooperation shaped his values. He participates in local traditions such as the Winnebago County Fair, church gatherings at a Lutheran congregation, and seasonal lake activities.
    The regional culture of straightforward communication, collective responsibility, and a strong sense of place informs his pragmatic approach to both work and personal life.
attributes:
