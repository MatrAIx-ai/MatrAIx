  hobbies: '[''Basketball'', ''Recreational Soccer'', ''Fishing'', ''Kayaking'', ''AirVenture Air Show'', ''Volunteering'', ''Grilling'', ''Home‑Brewing'', ''Gym Workouts'', ''Socializing'']'
  career_goals: James aims to scale his current business to serve multiple locations across Winnebago County while maintaining a personal touch. He plans to complete a bachelor's degree in Business Administration
    part‑time to deepen his strategic skill set. He seeks to build a sustainable, employee‑centric culture, introduce eco‑friendly practices, and become a recognized community leader who mentors young entrepreneurs.
    Long‑term, he envisions launching a regional franchise that leverages his practical operational expertise and strong local networks.
