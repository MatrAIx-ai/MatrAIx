  career_goals: Claire aims to solidify her legacy as a national authority on chronic disease management. She intends to secure a multi‑year grant to study hypertension treatment algorithms and publish
    the results in top journals. Over the next five years, she hopes to lead the hospital's quality improvement program, implement system‑wide protocols that reduce cardiovascular events, and mentor a new
    cohort of physician‑scientists. Ultimately, she envisions stepping into a senior leadership role—such as department chair or medical director—while authoring a textbook on evidence‑based internal medicine.
    Her competitive drive pushes her toward recognized awards and speaking engagements at major conferences.
