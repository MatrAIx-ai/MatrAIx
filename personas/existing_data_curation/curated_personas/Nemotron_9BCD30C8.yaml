    writing and peer review'']'
  hobbies: '[''Reading classic literature'', ''Medical journal review'', ''Historical biographies'', ''Herb gardening'', ''Birdwatching'', ''Puzzle solving (crosswords, Sudoku)'', ''Chess (online and club)'',
