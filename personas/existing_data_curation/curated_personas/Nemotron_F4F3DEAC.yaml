personas:
  professional: Miguel Perez, a 22‑year‑old aspiring automotive technician, leverages his hands‑on knack for vehicle maintenance and DIY home repairs to excel in a part‑time apprenticeship, balancing practical
    problem‑solving with a laid‑back, slightly disorganized work style that thrives on predictable tasks and immediate results.
  sports: Miguel Perez enjoys pick‑up soccer matches at the neighborhood park with a close circle of friends, cheers for the local MLS side LAFC and follows the Mexican national team’s World Cup qualifiers,
    preferring informal play over structured league commitments.
  arts: Miguel Perez immerses themselves in regional banda and norteña music, often listening to Los Tigres del Norte and Banda El Recodo while reading graphic novels like Saga and Monstress, and occasionally
    attends small community art fairs featuring local muralists.
  travel: Miguel Perez favors low‑key road trips and weekend getaways, having explored nearby desert towns like Sedona and desert parks, dreaming of a culturally rich visit to Oaxaca and a practical family
    reunion in Texas, all planned on a shoestring budget with a flexible itinerary.
  culinary: Miguel Perez cooks traditional tacos al pastor, salsa verde, and tamales in a modest kitchen, experimenting with fusion twists such as chipotle‑marinated shrimp tacos with cilantro‑lime slaw,
    and delights in sourcing fresh herbs like epazote and coriander from an urban garden.
  core: Miguel Perez is a practical, hands‑on 22‑year‑old who blends a love for DIY car projects, modest culinary experiments, and community mentorship with a relaxed, slightly disorganized approach to
    life.
background:
  cultural: Miguel is a second‑generation Mexican American raised in the Oak Cliff area of Dallas, Texas. His parents emigrated from Jalisco, and Spanish was spoken at home, preserving strong ties to Mexican
    traditions. He grew up celebrating Día de los Muertos, Las Posadas, and Mexican Independence Day with close family, and Mexican cuisine—especially tamales, pozole, and homemade salsas—remains central
    to his identity. While he is fluent in Spanish, his English is conversational, shaped by school experiences and interactions in a diverse urban neighborhood. Miguel feels a hybrid blend of Mexican heritage
    and Texan culture, which informs his values of family cohesion, a steady work ethic, and community involvement.
