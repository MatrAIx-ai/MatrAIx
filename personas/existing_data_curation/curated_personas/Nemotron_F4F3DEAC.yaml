  career_goals: Miguel plans to earn his GED within the next year and then enroll in a vocational apprenticeship program, preferably in automotive technology or construction trades. He aims to become a
    certified automotive technician (ASE certified) and eventually launch a modest mobile car‑detailing service that lets him work independently while serving his neighborhood. Improving his English proficiency
    and gaining a professional certification are key steps toward securing stable, well‑paid employment. Long‑term, he hopes to save enough to purchase his own home, support his family financially, and
    perhaps mentor younger community members about practical skills.
