  career_goals: Nga often talks about growing up to become someone who can share stories and pictures with other children. She imagines herself as a teacher who paints bright murals in a classroom, a community
    artist who creates murals that celebrate diverse cultures, or a caregiver who helps friends feel safe when they are scared. Her love of new ideas and curiosity fuels a wish to explore different places,
    maybe travel to Vietnam to see her family's hometown, and later study art or early childhood education. Ultimately, she hopes her work will let her combine creativity, kindness, and organization to
    make the world a friendlier place for kids.
