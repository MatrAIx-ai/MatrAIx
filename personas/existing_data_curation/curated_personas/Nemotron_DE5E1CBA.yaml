personas:
  professional: A budding mini architect, Nga Dinh loves arranging building blocks with meticulous order, turning playtime into a methodical design session where they channel their curiosity into creative
    structures and their organized nature ensures every tower stands tall.
  sports: A kinetic preschooler, Nga Dinh dashes around the Mini Mariners soccer practice each Saturday, eagerly shouts support for the Seattle Seahawks on game days, and they love the feel of the playground’s
    climbing wall, turning every recess into a mini‑workout.
  arts: A budding little artist, Nga Dinh spends afternoons finger‑painting alongside the vivid illustrations of Eric Carle, sings enthusiastically to Raffi’s ‘Baby Beluga’, and they mimic dance moves from
    Disney’s ‘Frozen’ soundtrack, weaving these colorful influences into daily pretend‑play performances.
  travel: An adventurous yet routine‑loving explorer, Nga Dinh enjoys short family road trips to the nearby lake cabin and a sunny weekend at the local beach resort in Myrtle Beach, while they day‑dream
    about a future visit to Paris’s Eiffel Tower after watching a picture book about France.
  culinary: A picky but enthusiastic eater, Nga Dinh delights in creamy mac and cheese with cheddar, loves crunchy carrot sticks dipped in ranch when persuaded, and they insist on a honey‑drizzled yogurt
    parfait with strawberries for breakfast, while proudly pretending to stir the pot in the kitchen with a wooden spoon.
  core: Curiously organized and socially vibrant, Nga Dinh can spend hours meticulously building block towers, yet a sudden loud noise can send them into a brief, intense bout of anxiety.
background:
  cultural: Ngà’s family originates from Vietnam, and her household in Pawtucket blends Vietnamese traditions with the rhythms of everyday American life. She hears both Vietnamese and English spoken at
    home, learning simple greetings, numbers, and family terms in each language. The family celebrates Tet, the Lunar New Year, with special dishes like bánh chưng, red envelopes, and a dragon dance performed
    at a local cultural center. On Sundays, they often visit a Vietnamese Buddhist temple in nearby Providence, where Ngà joins other children in prayer and community activities. At the same time, she participates
    in a diverse preschool that includes friends from many backgrounds, exposing her to holidays such as Thanksgiving and Halloween. Local community events such as the Pawtucket River Festival introduce
    her to arts and crafts from different cultures, helping her develop an appreciation for both her heritage and the broader multicultural environment of Rhode Island.
