  career_goals: Gary often talks about becoming an astronaut because he is fascinated by space, rockets, and the idea of exploring new frontiers. He also dreams of being a professional artist, hoping to
    create comic books that tell adventurous stories. Occasionally, he mentions wanting to help animals as a veterinarian, inspired by his visits to a local farm. These ambitions reflect his curiosity about
    the world, his desire to create, and his compassionate side, even though he sometimes worries about the challenges such careers might bring.
