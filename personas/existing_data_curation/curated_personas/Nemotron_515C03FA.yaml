personas:
  professional: Gary Cooper is a budding junior architect, channeling curiosity and methodical planning into elaborate LEGO castles and space stations while their sociable energy fuels collaborative building
    projects at school.
  sports: Gary Cooper kicks off as a forward for the local youth soccer team, cheering enthusiastically for the New York Red Bulls, and spends weekends playing tag, capture the flag, and exploring the woods
    around Mooers, often collecting interesting rocks as a post-game prize.
  arts: Gary Cooper spends afternoons drawing fantastical creatures, painting watercolors of birds, listening to upbeat songs by Imagine Dragons while dabbling on a small keyboard, and looks up to illustrators
    like Chris Van Allsburg and the whimsical animations of Studio Ghibli.
  travel: Gary Cooper’s travel log includes a family trip to Washington D.C.’s National Air and Space Museum, a weekend hike in the Adirondack Mountains, and a summer camp adventure at Lake Placid, where
    they love mapping out each day's itinerary with crayons and dreaming of future space trips.
  culinary: Gary Cooper loves homemade mac and cheese with extra cheddar, builds peanut-butter-and-jelly sandwiches into dinosaur shapes, enjoys sliced apples sprinkled with cinnamon, and can whip up a
    simple fruit salad of strawberries, bananas, and grapes, though they sometimes sneak a chocolate chip cookie before dinner.
  core: Gary Cooper is a vivid, organized dreamer who builds worlds from LEGO, navigates anxiety with deep breaths, and channels boundless curiosity into art, sport, and occasional cookie mischief.
background:
  cultural: Gary is raised in a predominantly white, middle‑class family in Mooers, a small town in Clinton County, upstate New York. The community values close family ties, outdoor recreation, and traditional
    American holidays such as Thanksgiving, Christmas, and the Fourth of July, often celebrated with local fairs and community potlucks. His family follows mainstream cultural customs, enjoys seasonal activities
    like apple picking in the fall and sledding in the winter, and participates in the Clinton County Fair, where agriculture and local crafts are highlighted. The rural setting fosters an appreciation
    for nature and self‑reliance, while the school and town provide a supportive environment for group activities and community involvement.
