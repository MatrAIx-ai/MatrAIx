  hobbies: '[''Swing dancing'', ''Volleyball'', ''Hiking'', ''Cooking Southern cuisine'', ''Escape rooms'', ''Volunteering at the food pantry'', ''Live music events'', ''Binge‑watching TV series'', ''DIY
    home‑decor projects'']'
  career_goals: Alejandra plans to enroll in a community college to pursue an associate degree in Business Administration, with a focus on project management and event coordination. Her short‑term goal
    is to secure an internship with a local event‑planning firm or a municipal department that organizes community festivals, where she can apply her organizational talents and develop professional networks.
    In the long term, she aims to become an operations manager for a regional events company or launch her own boutique event‑planning business that emphasizes community engagement and sustainable practices.
    She is ambitious about building leadership skills, earning certifications in project management, and eventually progressing to a senior managerial role within five to seven years.
