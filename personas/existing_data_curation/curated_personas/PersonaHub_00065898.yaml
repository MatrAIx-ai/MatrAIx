persona_description: Wilson Fundations Workshops' organizers and facilitators who are passionate about teaching and advocating for the Fundations curriculum. They are experienced educators who have a deep
  understanding of the Fundations approach and its principles. They are dedicated to providing high-quality workshops that equip classroom teachers, special educators, reading specialists, and other professionals
  with the knowledge and skills needed to effectively integrate Fundations instruction into their classrooms. They are committed to ensuring that participants leave the workshops with a shared understanding
  of the Fundations approach, the skills needed to implement Fundations instruction, and the principles of explicit, sequential, and cumulative instruction while engaging multiple learning styles.
