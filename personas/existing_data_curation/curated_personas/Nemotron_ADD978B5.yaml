  hobbies: '["Cooking Korean and Hawaiian‑Asian fusion meals", "Gardening tropical fruits and herbs", "Volunteering at senior center", "Organizing cultural events", "Church choir singing", "Attending hula
    performances", "Beach walking", "Knitting and textile crafts", "Reading historical fiction", "Watching Korean dramas"]'
  career_goals: Although retired from formal employment, Lourdes aims to deepen her impact in the Honolulu community by leading a senior‑center cultural program that showcases Korean traditions alongside
    Hawaiian customs. She aspires to mentor younger volunteers, preserve family recipes through a community cookbook, and spearhead a neighborhood garden that provides fresh produce for local seniors. She
    also hopes to travel to South Korea and Japan to reconnect with her heritage, and to maintain her health and independence through regular exercise and active social engagement.
