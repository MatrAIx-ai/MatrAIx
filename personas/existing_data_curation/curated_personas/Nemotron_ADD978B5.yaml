personas:
  professional: Lourdes Kim, a retired senior‑center volunteer and community program leader, blends meticulous event planning with a warm, outgoing presence, using their budgeting acumen and keen eye for
    group dynamics to orchestrate cultural gatherings that balance structure with spontaneous island flair, and they always double‑check every detail to calm their own nerves.
  sports: Lourdes Kim, a daily beach walker who also enjoys low‑impact aqua aerobics and weekly pickleball at the community center, they cheer for the Los Angeles Lakers and the University of Hawaii Rainbow
    Warriors, and occasionally join the senior rowing club for a splash of competition.
  arts: Lourdes Kim, an active choir member and avid patron of hula performances, finds inspiration in the guitar work of Tommy Emmanuel, the storytelling of Meryl Streep, and the animated worlds of Hayao
    Miyazaki, they often weave these artistic influences into their knitting designs because they believe creativity fuels community.
  travel: Lourdes Kim, a meticulous planner who balances a modest travel budget with a longing for cultural roots, they have mapped out a two‑week itinerary to Seoul and Tokyo, favoring guided historical
    tours, local market food stalls, and quiet garden retreats.
  culinary: Lourdes Kim, a seasoned home chef, perfects island‑infused fusion dishes such as pineapple‑glazed bulgogi tacos, fermented cabbage‑style kalua pork, and herb‑marinated papaya salad, always sourcing
    fresh herbs from their backyard garden and tweaking recipes until the balance of spice and sweetness hits their exacting palate, and they often experiment with new flavor pairings to keep their cooking
    fresh.
  core: Lourdes Kim blends disciplined organization with vibrant community spirit, and they channel their competitive edge into meticulously curated cultural events while silently wrestling with worry‑driven
    perfectionism.
background:
  cultural: Lourdes is a second‑generation Korean American raised in Honolulu. She grew up bilingual, speaking Korean at home while attending local schools where Hawaiian and Pacific Islander cultures were
    celebrated. Her family maintains traditional Korean customs—such as lunar New Year celebrations and respect for elders—while also embracing Hawaiian values of 'ohana' (family) and community participation.
    As a Catholic, she incorporates the saintly name Lourdes into her identity, reflecting a blend of Korean heritage, Hawaiian lifestyle, and broader American influences.
attributes:
  skills: '["Hawaiian‑Asian fusion cooking", "Household budgeting", "Event planning and coordination", "Community volunteer leadership", "Elder caregiving and first aid", "Basic Korean and Japanese conversational
