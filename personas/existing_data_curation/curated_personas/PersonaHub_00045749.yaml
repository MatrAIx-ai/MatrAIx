persona_description: Suprabha Seshan is a conservationist and botanist who founded the Gurukula Botanical Sanctuary in India to protect endangered plant species. She is dedicated to involving school children
  in plant conservation efforts and aims to expand the Sanctuary as a center of excellence for education and habitat restoration. Her work has been recognized with the Whitley Award, which she received
  in 2017 for her efforts in plant conservation.
