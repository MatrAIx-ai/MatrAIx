personas:
  professional: Whitney Rama is a budding community health advocate who leverages their strong organizational skills, basic computer proficiency, and compassionate nature to coordinate volunteer events
    and manage social media for local nonprofits, all while maintaining a methodical, reliable approach to schoolwork and future nursing aspirations.
  sports: Whitney Rama embraces outdoor fitness by hiking the Rattlesnake trails and jogging with the Missoula Trail Runners Club during spring, supports the Montana Grizzlies football team in the fall
    and the Missoula Osprey baseball club in summer, and maintains a disciplined yet enjoyable weekly routine of cardio and strength workouts.
  arts: Whitney Rama channels their creative side through acoustic guitar sessions inspired by Joni Mitchell and John Denver, writes simple folk‑style songs, curates a bird‑photography Instagram feed that
    showcases images reminiscent of Audubon Society aesthetics, and finds literary inspiration in popular science authors like Carl Sagan and Mary Roach.
  travel: Whitney Rama prefers self‑planned, eco‑conscious road trips that blend adventure and study, often pausing at Yellowstone National Park for wildlife observation, dreaming of a future backpacking
    trek through the Canadian Rockies in Banff, while balancing a limited teen budget and school obligations.
  culinary: Whitney Rama enjoys cooking simple, wholesome meals like chickpea stir‑fry with fresh basil and garlic, hearty lentil soup, and occasional chili con carne for friends, relying on basic kitchen
    skills and a love for seasonal produce, and they savor occasional dining out at local farm‑to‑table spots like the Catalyst Kitchen.
  core: Whitney Rama is a methodical, compassion‑driven teen who balances curiosity with practicality, turning organized volunteer work, gentle activism, and modest creative pursuits into a purposeful life,
    all while occasionally indulging in late‑night guitar strums and impulsive gear purchases.
background:
  cultural: Whitney comes from a white, European‑American family with deep roots in the Missoula, Montana region. Growing up in a small‑town environment, she was shaped by a culture that values self‑reliance,
    stewardship of the outdoors, and community participation. Family traditions include celebrating seasonal holidays such as Thanksgiving, Fourth of July fireworks, and local cultural festivals that emphasize
    togetherness and service. Her upbringing has blended a respect for nature, practical work ethic, and a supportive community network, all of which inform her compassionate and cooperative personality.
attributes:
  skills: '["Organizational and time‑management skills","Basic computer literacy (word processing, spreadsheets, social media management)","Interpersonal mediation and teamwork","Red Cross First Aid/CPR
    certification","Animal care volunteering","Basic cooking, meal planning, and budgeting"]'
  hobbies: '["Hiking and trail exploration","Birdwatching and wildlife photography","Reading popular science","Journaling","Acoustic guitar playing and songwriting","Volunteering at food pantry and animal
    shelter","Cooking simple meals for friends","Knitting","Community clean‑up participation"]'
  career_goals: Whitney aims to earn her GED within the next year and enroll in a community college program focused on health sciences or environmental studies. She aspires to become a certified nursing
    assistant or a community health worker, with a long‑term goal of working at a local clinic or in public health outreach that serves the Missoula area. Her curiosity drives her to keep learning, while
    her practicality pushes her to pursue a stable, service‑oriented career that lets her make a tangible difference in people's lives and the environment.
