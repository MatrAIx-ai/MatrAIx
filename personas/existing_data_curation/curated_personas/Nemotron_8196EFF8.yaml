personas:
  professional: A budding architect, Aurelio Santiago, channels their vivid imagination into drawing fantastical cityscapes and constructs elaborate LEGO towers, balancing meticulous organization with boundless
    creativity while eagerly sharing ideas with friends.
  sports: A spirited player, Aurelio Santiago, loves tag, joins the local U‑6 soccer squad—the River Valley Tigers—cheers for the hometown baseball team the Mountain Bears, and they eagerly explore hiking
    trails in the nearby hills each weekend.
  arts: A creative enthusiast, Aurelio Santiago, spends afternoons sketching dragons and rockets inspired by Studio Ghibli’s Miyazaki, builds LEGO castles while they hum John Denver’s folk melodies, and
    they dance to the lively tunes of the folk duo The Avett Brothers during family gatherings.
  travel: An eager explorer, Aurelio Santiago, dreams of camping under the stars at the nearby Sierra foothills, has already trekked the local river canyon, and they hope to visit Niagara Falls and Disneyland
    next summer, always preferring hands‑on adventures over long flights.
  culinary: A budding kitchen helper, Aurelio Santiago, assists with assembling soft tacos using corn tortillas, shredded chicken, beans, avocado, and a sprinkle of cheese, enjoys fresh mango slices, and
    they can confidently whisk together a simple guacamole, though they often get distracted by drawing while the sauce simmers.
  core: Aurelio Santiago, a six‑year‑old imagination engine, blends fearless creativity with quiet resilience, turning every LEGO brick and mountain trail into a canvas for boundless stories, and they share
    these adventures with anyone who will listen.
background:
  cultural: Aurelio grows up in a Mexican-American household in Montrose, Colorado, where Spanish is spoken daily and Mexican traditions like Día de los Muertos, Cinco de Mayo, and family gatherings around
    shared meals are celebrated. He enjoys abuelita's stories of Mexican folklore, the flavors of homemade salsa and tamales, and the vibrant colors of Mexican art that inspire his own drawings. The surrounding
    Colorado landscape adds a love for outdoors, wildlife, and seasonal activities, creating a blend of cultural and regional influences in his upbringing.
