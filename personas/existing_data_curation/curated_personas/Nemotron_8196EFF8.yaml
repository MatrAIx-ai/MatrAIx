  career_goals: Aurelio dreams of becoming an astronaut who can explore faraway planets, an artist who creates vibrant murals, or a storyteller who shares imaginative tales. He aspires to combine his love
    of space, art, and language by perhaps designing illustrated books about the cosmos or creating visual art inspired by the stars.
