  career_goals: Larry dreams of becoming a firefighter or a veterinarian because he wants to protect people and care for animals. In the short term, he aims to improve his reading fluency, earn a "Safety
    Patrol" badge at school, and help feed the classroom pet. Over the longer term, he envisions a role that combines his love of building and problem‑solving with his desire to help others, such as a community
    safety officer or an animal‑care specialist who designs safe habitats for pets.
