persona_description: A visual artist who specializes in site-specific installations and uses technology, such as LED lighting and video cameras, to create immersive and interactive works that explore the
  relationship between the present, past, and future. They are interested in using the physical space and its surroundings to create a dialogue between the viewer and the artwork, encouraging participation
  and engagement. The work is likely to be site-specific, meaning it is created for a particular location and environment, and is often intended to be experienced in person. The artist may have a background
  in architecture, engineering, or art history, and may have experience working with materials such as reclaimed barn lumber and LED lighting. They may also have experience with video editing and post-production.
