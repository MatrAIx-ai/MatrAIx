  career_goals: Paola aims to move from a first‑line supervisory role to a district manager position within the next three to five years, overseeing multiple stores and shaping regional sales strategy.
    She plans to complete her bachelor’s degree in business administration, leveraging her practical experience to excel in higher‑level management. Paola also hopes to launch a mentorship program for entry‑level
    retail workers, focusing on building confidence and coping skills for high‑stress environments. Long‑term, she envisions opening a family‑run grocery store that blends Mexican culinary traditions with
    the convenience of a modern retail concept, providing a community hub for South Elgin and surrounding neighborhoods.
