  hobbies: '["Gardening", "Nature walking", "Yoga and meditation", "Knitting", "Reading historical fiction", "Listening to wellness podcasts", "Photography of local architecture", "Volunteer knitting for
    charity"]'
  career_goals: Carol aims to transition from primarily in‑person group classes to a hybrid model that includes small‑group and one‑on‑one sessions tailored for older adults in the Northampton County area.
    Over the next three years she plans to earn a Certified Senior Fitness Specialist credential and a Mental Health First Aid certification, enabling her to address both physical and emotional wellbeing.
    She dreams of opening a modest boutique studio that offers quiet, low‑stimulus workout spaces and a curated library of wellness resources, allowing her to work in environments that suit her preference
    for solitude. Additionally, she hopes to develop an online series of video‑guided sessions focused on stress‑relief and gentle strength training, which would let her share her curiosity about emerging
    fitness modalities while maintaining a flexible schedule that reduces administrative pressure.
