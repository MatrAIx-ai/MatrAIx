  hobbies: '[''Building Duplo towers'', ''Solving simple jigsaw puzzles'', ''Coloring books'', ''Organizing toy cars'', ''Singing Salvadoran lullabies'', ''Dancing to cumbia music'', ''Helping in the kitchen
    (making pupusas)'', ''Playing at the playground'']'
  career_goals: Although still young, Cesar often talks about wanting to help people and keep things organized. He dreams of becoming a teacher or a community helper such as a firefighter or police officer,
    where he can maintain safety, order, and support others. In the coming years he looks forward to starting kindergarten, learning to read and write, and eventually working in a role that combines teamwork,
    structure, and service to his community.
