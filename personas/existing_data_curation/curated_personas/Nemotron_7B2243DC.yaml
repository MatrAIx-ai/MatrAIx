personas:
  professional: Cesar Ramos is a budding mini‑architect who spends hours arranging building blocks into precise towers and roads, and they showcase early organizational talent, a love for structure, and
    a cooperative spirit that delights peers and teachers alike.
  sports: Cesar Ramos is a budding athlete who practices with the 'Kiddie Kickers' soccer club on Saturday mornings, cheers for the hometown professional team the 'Metro United' during televised matches,
    and they follow a strict routine of warm‑ups, water breaks, and snack time that satisfies their need for predictability.
  arts: Cesar Ramos is an imaginative child who loves coloring scenes from Eric Carle's books, singing along to Raffi's 'Baby Beluga', and reenacting favorite characters from Disney's 'Frozen', which fuels
    their daily play and nurtures their cooperative nature, and they often share their creations with friends during circle time.
  travel: Cesar Ramos is an adventurous youngster who enjoys family road trips to the Grand Canyon, weekend stays at their grandparents' farm, and short flights to Walt Disney World in Orlando, and they
    always travel with a carefully planned itinerary that includes nap times and snack breaks.
  culinary: Cesar Ramos is a picky eater who delights in cheesy macaroni, crispy chicken nuggets with ketchup, banana‑strawberry smoothies, and helps their mom stir the pot, yet they refuse broccoli unless
    it’s cut into fun dinosaur shapes.
  core: Cesar Ramos is a methodical four‑year‑old who lines up their toys by color, saves every spare penny, insists on bedtime routines, and they occasionally misplace their shoes on the wrong feet.
background:
  cultural: Cesar was born to Salvadoran parents who immigrated to the United States and now live in Silver Spring, Maryland. At home, Spanish is spoken alongside English, and the family celebrates Salvadoran
    traditions such as Día de los Muertos, Las Posadas, and festive meals featuring pupusas, tamales, and yuca. He participates in community events at a local Latin American cultural center and learns about
    his heritage through music, dance, and family stories, while also being exposed to the diverse multicultural environment of Montgomery County.
attributes:
  skills: '[''Counting to ten'', ''Identifying colors and shapes'', ''Recognizing letters'', ''Following simple multi-step instructions'', ''Fine motor skills (cutting with safety scissors, drawing)'',
