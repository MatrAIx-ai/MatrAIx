personas:
  professional: Oceana Hanford, a seasoned meeting and convention planner with deep expertise in end‑to‑end event logistics, budget development, and risk mitigation, uses Cvent, Eventbrite, and Social Tables
    to build detailed timelines, vendor contracts, and contingency plans while assertively negotiating with suppliers and cooperatively guiding stakeholder teams, all in pursuit of a senior director role
    and a future boutique firm that celebrates culturally inclusive events.
  sports: Oceana Hanford regularly participates in the Crofton Park walking club with their husband, attends Baltimore Ravens games at M&T Bank Stadium each fall, plays on a local adult softball league
    in spring, and schedules strength‑training sessions at the community center on Tuesdays and Thursdays, following a structured fitness routine that balances cardio, team sport camaraderie, and personal
    health goals.
  arts: Oceana Hanford enjoys attending productions at the Crofton Theatre, especially recent shows like "A Raisin in the Sun", listens to gospel legends such as Kirk Franklin and soul artists like Jill
    Scott while cooking, contributes their voice to the church choir, and collects biographies of civil‑rights figures that inspire both their personal and professional life.
  travel: Oceana Hanford prefers meticulously planned trips, having organized family visits to Charleston, Savannah, and New Orleans to explore Southern culinary roots, a cultural heritage tour in Ghana,
    and weekend getaways to Washington, D.C., balancing a modest travel budget with a desire for both relaxation and purposeful discovery, often using a detailed spreadsheet itinerary and pre‑booked accommodations.
  culinary: Oceana Hanford, an adept home cook, specializes in soul‑food classics such as smoked turkey collard greens, seasoned fried catfish, sweet potato casserole, and peach cobbler, sourced from their
    backyard vegetable garden and local farmer’s market, and approaches each meal with methodical recipe testing, yet occasionally orders takeout when event planning deadlines loom.
  core: Oceana Hanford is a methodical event planner who blends a love for Southern cooking, gardening, and church choir with a habit of over‑scheduling and a constant undercurrent of worry, often juggling
    spreadsheets while humming gospel hymns.
background:
  cultural: Oceana is an African-American woman who grew up in a close-knit Black community in the Mid-Atlantic region and earned her BA in Arts and Humanities from an HBCU. Her cultural identity is shaped
    by traditions of resilience, family solidarity, and active church involvement, which continue to influence her professional ethos and community engagement. Living in Crofton, Anne Arundel County, she
    navigates a predominantly white suburban environment while maintaining strong ties to African-American cultural networks, celebrating holidays such as Juneteenth, and supporting local Black business
    initiatives.
attributes:
  skills: '[''Event planning and logistics'', ''Budget development and cost control'', ''Vendor negotiation and contract management'', ''Timeline creation and milestone tracking'', ''Risk assessment and
    contingency planning'', ''Stakeholder communication and client liaison'', ''Venue selection and compliance coordination'', ''Use of event management software (Cvent, Eventbrite, Social Tables)'', ''Team
    leadership and staff coordination'', ''Culturally inclusive programming'']'
  hobbies: '[''Cooking Southern and soul-food recipes'', ''Gardening (vegetables and herbs)'', ''Reading biographies of African-American leaders'', ''Church choir participation and volunteer work'', ''Knitting
    and quilting'', ''Walking in local parks with family'', ''Weekly journaling for stress management'', ''Genealogy research'', ''Attending community theatre performances'']'
  career_goals: Oceana aims to move into a senior director position overseeing large-scale conventions for a regional convention center or hospitality group, where she can shape strategic event portfolios
    while maintaining the structured environment she thrives in. She is working toward earning the Certified Meeting Professional (CMP) credential and hopes to mentor emerging planners, especially women
    of color, within her industry. Long-term, she envisions launching a boutique firm that specializes in culturally inclusive corporate and community events, allowing her to blend her expertise with her
    passion for African-American heritage celebrations.
