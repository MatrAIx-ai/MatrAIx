persona_description: A researcher and preservationist who is interested in the history and cultural significance of St. Michael's Cemetery in Pensacola, Florida. They are passionate about uncovering the
  stories and identities of the individuals buried there and the community that served them. The persona is knowledgeable about historical research, archaeology, and cemetery preservation. They are interested
  in understanding the physical and cultural landscape of the cemetery, the impact of natural disasters and neglect on the site, and the potential for the site as an open-air museum in the urban environment.
  They are committed to preserving the site for future generations and are willing to collaborate with other stakeholders to achieve this goal.
