  career_goals: George aims to transition from a line worker to a supervisory or lead technician role within the next few years. He plans to earn certifications in industrial safety and CNC programming,
    and is considering enrolling in a community college technical program to obtain an associate degree in manufacturing technology. Long‑term, he hopes to oversee a production line or start his own small
    metal‑finishing business that combines his practical skills with his interest in innovative processes.
