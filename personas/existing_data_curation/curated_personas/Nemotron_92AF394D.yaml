personas:
  professional: George Overton, a seasoned industrial equipment technician in a metal‑finishing plant, leverages their hands‑on expertise with heavy machinery, meticulous schematics reading, and OSHA safety
    know‑how while balancing a curiosity for new machining methods with a relaxed, flexible work style that sometimes borders on disorganization.
  sports: George Overton enjoys seasonal hunting trips in the fall, weekend fishing on local lakes, and follows the St. Louis Cardinals and Kansas City Chiefs while they play pickup basketball at the community
    center’s court during the summer months.
  arts: George Overton regularly attends live country music concerts featuring artists like Luke Bryan and Maren Morris, indulges in strategy board games such as Twilight Imperium with friends, and they
    appreciate classic western films starring John Wayne during quiet evenings.
  travel: George Overton prefers rugged road trips that combine camping under the stars with fishing excursions, having explored the Ozarks, the Gulf Coast’s surf‑fishing spots, and they dream of a future
    trek through Yellowstone’s geysers.
  culinary: George Overton mixes a love for outdoor cooking with home‑brewing, often preparing smoked elk stew seasoned with juniper berries and hickory chips, while they perfect an amber ale that blends
    Cascade hops and caramel malt.
  core: George Overton blends a practical, hands‑on knack for heavy‑industry tech with a laid‑back DIY spirit, occasional disorganization, and they have a steady pull toward nature‑centered relaxation.
background:
  cultural: George was raised in a working‑class family in the rural parts of Greene County, Arkansas, where Southern hospitality and community ties are central. His upbringing emphasized self‑reliance,
    respect for tradition, and a strong work ethic, shaped by local church gatherings, high school football culture, and family barbecues. The region’s close connection to the outdoors and the manufacturing
    sector has influenced his practical outlook, love of hunting and fishing, and his appreciation for teamwork and mutual support.
