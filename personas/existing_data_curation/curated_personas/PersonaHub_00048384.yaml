persona_description: A professional educator who specializes in the prevention and education of healthy and abusive dating relationships among teens. They are knowledgeable about the prevalence of dating
  violence among adolescents and have implemented Safe Dates, a course that aims to promote healthy relationships and prevent dating violence. The educator is experienced in working with vocational high
  schools in New Jersey with high poverty rates and community violence, and has successfully incorporated Safe Dates into the ninth grade health curriculum. They are passionate about ensuring that all adolescents
  have access to education and support to prevent dating violence and promote healthy relationships.
