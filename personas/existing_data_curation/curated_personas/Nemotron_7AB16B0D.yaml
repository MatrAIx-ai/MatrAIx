personas:
  professional: Leonor Segui, an aspiring community college educator, they channel their curiosity and practicality into designing interactive curricula that demystify complex topics for adult learners,
    and their outgoing, competitive spirit fuels lively classroom debates, even as their preference for flexibility over strict planning occasionally produces a charmingly disordered syllabus.
  sports: Leonor Segui, a dedicated intramural volleyball player with the East Providence Volleyball Club and an avid hiker of Rhode Island’s coastal trails, they blend a competitive edge into weekly HIIT
    sessions while cheering on the Providence Bruins, the New England Patriots, and the Boston Red Sox, and they cap their fitness routine with evening yoga classes to balance stress from academic pursuits.
  arts: Leonor Segui, a regular on a Providence‑area improv comedy troupe and a self‑proclaimed fan of John Mulaney, Tina Fey, and The Avett Brothers, they spend free nights at Trinity Rep watching productions
    like "Our Town" while rotating through playlists of indie folk and local jazz acts, using the creative energy to counterbalance a competitive nature and occasional anxiety.
  travel: Leonor Segui, who prefers last‑minute weekend getaways over meticulously planned vacations, they often escape to nearby Cape Cod or Martha’s Vineyard for beach relaxation, dream of exploring Barcelona’s
    tapas scene and Lisbon’s historic Alfama district, and balance wanderlust with a modest student budget that forces them to hunt for discount flights and stay in boutique hostels.
  culinary: Leonor Segui, an enthusiastic home‑cook who frequently whips up clam chowder, seafood paella with saffron, homemade gnocchi, and pastel de nata for themed dinner parties, they balance culinary
    curiosity with a practical knack for sourcing fresh clams and basil at the local fish market, yet they occasionally splurge on upscale seafood restaurants when celebrating a trivia night victory.
  core: Leonor Segui, a sociable yet sometimes disorganized educator, they channel competitive energy into every lesson while battling anxiety and an occasional habit of postponing bills.
background:
  cultural: Leonor grew up in East Providence in a middle‑class family of Portuguese‑Italian descent. Her household blended New England coastal traditions—such as clam bakes and Friday fish fries—with celebrations
    of São João and Italian holidays, fostering an appreciation for both practicality and cultural curiosity. The city’s diverse population and proximity to Providence’s academic and artistic scene shaped
    her outlook, encouraging her to value community engagement, lifelong learning, and a balance between preserving heritage and embracing new ideas.
