  career_goals: Leonor aims to complete her bachelor's degree in education within the next two years to qualify for a tenure‑track position at a community college. She aspires to become a department chair,
    where she can champion interdisciplinary courses that blend liberal arts with practical life skills. In the longer term, she hopes to launch a community‑based learning center offering free workshops
    on financial literacy, entrepreneurship, and cultural arts, expanding educational access throughout Providence County.
