personas:
  professional: A budding esports strategist and aspiring robotics hobbyist, Mario Valdes leverages their knack for tactical gameplay, chess, and LEGO Technic construction to develop systematic problem‑solving
    skills that they apply to school projects and team‑based competitions.
  sports: A dedicated track athlete and esports enthusiast, Mario Valdes runs 400‑meter intervals three times weekly for the Bloomington High cross‑country team, they cheer for the Los Angeles Lakers and
    Dodgers, and competes in local League of Legends tournaments with the club Strategic Aces.
  arts: An avid sci‑fi reader and documentary fan, Mario Valdes devours novels by Isaac Asimov and watches engineering series featuring Elon Musk, while drawing inspiration from composer Hans Zimmer and
    visual artist Syd Mead in their LEGO designs.
  travel: A planning‑oriented traveler, Mario Valdes has road‑tripped to Joshua Tree and Disney World with family, they dream of a solo cultural tour of Kyoto to explore robotics museums, and prefer detailed
    itineraries crafted on Google Maps to balance school responsibilities and budget constraints.
  culinary: A budding home chef, Mario Valdes enjoys crafting loaded nachos with pepperoni, avocado, and jalapeños, perfecting a simple spaghetti Bolognese on weekends, and occasionally experimenting with
    Korean BBQ tacos, though they often rely on quick microwave meals during exam weeks.
  core: Mario Valdes is a hyper‑organized teen who blends competitive gaming, disciplined track training, and meticulous budgeting into a structured pursuit of excellence, and they occasionally sacrifice
    sleep for high scores.
background:
  cultural: 'Mario was raised in Bloomington, a small community in San Bernardino County, California, within a middle‑class white family whose heritage includes German and Irish ancestry. His upbringing
    reflects mainstream American suburban values: emphasis on education, self‑reliance, and community involvement. Though his family celebrates a mix of cultural traditions such as holiday gatherings and
    local events, Mario’s daily life is shaped largely by the broader Southern Californian culture, which blends outdoor recreation, tech‑oriented hobbies, and a strong focus on personal achievement.'
