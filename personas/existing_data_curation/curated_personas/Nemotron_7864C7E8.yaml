  career_goals: Mario aspires to graduate high school with honors and earn a scholarship to a top engineering program, ideally in robotics or aerospace. He wants to design autonomous systems that can operate
    in rugged environments like the deserts surrounding his hometown. In the longer term, he envisions becoming a lead engineer at a technology firm or starting his own venture that creates sustainable
    engineering solutions. He also hopes to compete in national robotics competitions and possibly pursue an apprenticeship in a local engineering firm during college.
