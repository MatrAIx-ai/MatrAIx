persona_description: A biologist who specializes in the study of termite taxonomy, particularly the genus Hospitalitermes. Her research interests include, but are not limited to, the systematic revision
  of the genus, the identification of new species, and the comparison of the morphology and genetics of different species. She is particularly interested in the molecular evidence supporting the evolutionary
  relationship between termites and the social cockroach Cryptocercus, and the proposed loss of the name Isoptera and the downgrading of termites from order to epifamily.
