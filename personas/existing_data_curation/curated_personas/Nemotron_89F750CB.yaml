personas:
  professional: Jose Maldonadorivera is an aspiring junior game designer and digital illustrator who channels a love for strategic video games and sci‑fi graphic novels into creating intricate level sketches
    and concept art, relying on meticulous organization and solitary focus to produce detailed mock‑ups, and they often spend hours fine‑tuning their creations.
  sports: Jose Maldonadorivera follows the Los Angeles Dodgers and the UCLA Bruins basketball team, participates in a local youth soccer club called Kern County Strikers, and enjoys weekend hikes with their
    family in the Sierra Nevada, balancing a love for team spirit with a personal preference for solo outdoor activity, and they often keep a tally of personal best times on hiking trails.
  arts: Jose Maldonadorivera immerses themselves in sketching heroic characters, digital painting inspired by Hayao Miyazaki and Alex Ross, reads sci‑fi graphic novels like ‘Saga’, enjoys listening to mariachi
    brass ensembles and indie band Tame Impala, and recites Spanish poetry, using these artistic influences to fuel creative storytelling, and they frequently experiment with new mediums to expand their
    repertoire.
  travel: Jose Maldonadorivera loves family road trips to scenic spots such as Yosemite National Park, the Pacific Coast Highway, and the nearby Sequoia forests, while dreaming of a future visit to Tokyo’s
    Akihabara district to explore anime culture, preferring meticulously planned itineraries that balance adventure with their need for quiet downtime, and they keep a scrapbook of collected maps and tickets.
  culinary: Jose Maldonadorivera delights in building their own tacos with soft corn tortillas, seasoned carne asada, fresh cilantro, lime, and salsa verde, while also craving pepperoni pizza and homemade
    chocolate chip cookies, and they’re modestly skilled at sautéing vegetables for a quick stir‑fry after gaming sessions, often experimenting with the perfect balance of spice and garnish.
  core: Jose Maldonadorivera is a solitary, curiosity‑driven 10‑year‑old who blends strategic gaming, intricate art creation, and a competitive edge while navigating a world of disciplined savings, mild
    allergies, and a quiet love for nature, and they thrive in quiet corners where imagination runs free.
background:
  cultural: Jose is a first‑generation Mexican‑American raised in Bakersfield, California. At home, his family speaks Spanish and observes Mexican traditions such as Día de los Muertos, quinceañera celebrations,
    and cooking dishes like tamales and pozole. The vibrant Hispanic community in Kern County, local murals celebrating Chicano art, and school programs that highlight Latin American history shape his cultural
    identity. He balances the warmth of his Mexican heritage with the everyday life of a Californian suburb, often finding inspiration for his art in both the desert landscapes of the region and the stories
    passed down by his grandparents.
