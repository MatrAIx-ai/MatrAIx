  hobbies: '["Gardening", "Reading historical fiction", "Knitting", "Birdwatching", "Book club", "Genealogy", "Cooking", "Nature walks"]'
  career_goals: Although retired from formal employment, Judita aims to deepen her contributions to her local community through volunteer leadership, especially within her church and senior center. She
    aspires to document her family’s history in a written memoir, preserving stories for future generations. Maintaining her health and independence remains a priority, as does expanding her gardening knowledge
    and learning new crafts. She also hopes to mentor her grandchildren, sharing practical skills and family traditions.
