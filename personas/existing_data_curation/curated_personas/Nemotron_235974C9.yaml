personas:
  professional: Carmen Garciadonis, a 41‑year‑old network systems specialist with fifteen years of hands‑on experience, leverages her CCNA, Network+ and MCSA certifications to design rock‑solid LAN/WAN
    infrastructures, automates repetitive tasks with PowerShell and Bash, and channels her naturally competitive yet calm demeanor into swift, accurate troubleshooting that consistently delivers 99.9 %
    uptime while mentoring junior staff and eyeing a senior network architect role.
  sports: Carmen Garciadonis is a devoted fan of the Dallas Cowboys and the Texas Rangers, regularly attends community barbecues that double as high‑school football tailgates, participates in a local adult
    soccer league, and maintains personal fitness through weekly hikes on Lake Arlington trails and occasional 5‑K runs with friends.
  arts: Carmen Garciadonis enjoys folk dancing at regional cultural festivals, nods to classic folk music while listening to contemporary performers like Selena and Los Tigres del Norte, frequently attends
    productions at the Dallas Theater Center, and admires the vibrant murals of local street artist JR, balancing her love for tradition with a curiosity for modern visual storytelling.
  travel: Carmen Garciadonis plans trips with a blend of meticulous itineraries and spontaneous detours, regularly visits family in Oaxaca to partake in Dia de los Muertos celebrations, spends weekends
    exploring the Texas Hill Country wine trail and Austin’s live‑music scene, and has a bucket‑list desire to wander the historic streets of Barcelona and the tranquil gardens of Kyoto.
  culinary: Carmen Garciadonis is an enthusiastic home chef who perfects tamales, mole, and pozole for family gatherings, cultivates cilantro, oregano, and jalapeños on her patio to freshen her salsas,
    delights in layering flavors with ancho chilies and epazote, yet sometimes over‑spices a batch, prompting a quick rescue with a splash of lime.
  core: Carmen Garciadonis merges a competitive, structure‑driven mindset with a calm resilience, balancing rigorous network architecture work, disciplined finance, and joyful cultural traditions, all while
    occasionally indulging in over‑spiced salsa and skipping a yoga class when deadlines loom.
background:
  cultural: Carmen is a first-generation Mexican American raised in the Dallas-Fort Worth metroplex. She grew up in a bilingual household where Spanish was spoken daily, and she maintains fluency in both
    Spanish and English. Her family upholds Mexican traditions such as Dia de los Muertos, quinceaneras, and weekly family meals centered on home-cooked cuisine, while also embracing Texan customs like
    community barbecues and high-school football gatherings. Carmen's strong sense of family loyalty, work ethic, and resilience - values rooted in her cultural heritage - are reflected in her calm, competitive
    professional demeanor. She actively participates in local Hispanic community organizations, mentors young people from similar backgrounds, and frequently visits relatives in Mexico, ensuring that her
    cultural roots remain a vibrant part of her identity.
attributes:
  skills: '[''LAN/WAN design and implementation'', ''Cisco IOS and Juniper Junos configuration'', ''Firewall policy management (Palo Alto, FortiGate)'', ''Server virtualization (VMware, Hyper-V)'', ''Windows
    Server administration'', ''Linux system administration'', ''PowerShell and Bash scripting for automation'', ''Network monitoring (SolarWinds, PRTG, Wireshark)'', ''IT security fundamentals and compliance'',
    ''Documentation and SOP development'', ''Troubleshooting and incident response'', ''Project coordination and ticketing system management'']'
  hobbies: '[''Home lab networking experiments'', ''Cooking Mexican dishes'', ''Herb gardening'', ''Crossword puzzles and logic brainteasers'', ''Attending Hispanic cultural festivals and folk dancing'',
    ''Hiking local Texas trails'', ''Volunteering to teach basic computer skills'']'
  career_goals: Carmen's primary career goal is to evolve from a hands-on network administrator into a senior network architect who designs resilient, secure infrastructures for regional enterprises. To
    achieve this, she is pursuing Cisco CCNP and eventually CCIE certifications, along with a CISSP to strengthen her security expertise. She aims to lead small project teams, mentor junior technicians
    - especially women and members of the Latino community - and establish a reputation for delivering reliable, cost-effective solutions. In the longer term, Carmen envisions launching her own IT consulting
    firm focused on serving small businesses and Hispanic-owned enterprises in the Dallas-Fort Worth area, allowing her to blend technical leadership with entrepreneurial ambition while maintaining a balanced
    family life.
