  hobbies: '[''Sketching and watercolor painting'', ''Visiting contemporary art galleries'', ''Urban photography'', ''3D printing personal art projects'', ''Amateur calligraphy'', ''Reading speculative
    fiction'', ''Yoga and mindfulness meditation'', ''Cooking traditional East Asian dishes'', ''Volunteering at a local makerspace'', ''Participating in small literary discussion groups'']'
  career_goals: Chi aims to advance to a senior engineering technologist role where she can lead small interdisciplinary teams that blend functional engineering with artistic expression, such as developing
    kinetic installations or sustainable product designs. She plans to earn a Lean Six Sigma Black Belt certification and pursue a master's degree in Engineering Management to strengthen her strategic planning
    abilities. Long‑term, she envisions launching a community outreach program in Philadelphia that introduces youth to the intersection of STEM and the arts, while also cultivating a personal project portfolio
    of interactive sculptures that serve as therapeutic spaces for herself and others coping with anxiety.
