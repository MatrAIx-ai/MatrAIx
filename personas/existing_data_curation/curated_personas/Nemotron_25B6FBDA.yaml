personas:
  professional: Julian Garris blends data‑driven operational expertise with an artist’s eye, leveraging Lean Six Sigma, advanced analytics, and rapid‑learning of new ERP tools to streamline processes, while
    their improvisational problem‑solving and outgoing networking style fuels cross‑functional collaborations in tech‑driven and cultural organizations.
  sports: Julian Garris hits Tuesday night pick‑up basketball at the Cleveland YMCA, dominates the weekend ultimate frisbee league with the Cuyahoga Rapids, cheers loudly for the Cleveland Cavaliers and
    Browns, and squeezes in sprint intervals after work to keep the desk‑bound fatigue at bay.
  arts: Julian Garris roams Cleveland’s contemporary galleries and vibrant street‑art corridors, sketches scenes on a Procreate tablet while drawing inspiration from Basquiat, John Coltrane, and Kendrick Lamar,
    spends Friday nights at The Blue Room jazz club, and tests improv jokes at The Funny Bone comedy venue.
  travel: Julian Garris favors spontaneous two‑day road trips, mapping routes on a phone to discover hidden murals in Akron, vintage record shops in Detroit, and the bustling food market of New Orleans,
    while funding each getaway through a dedicated travel stash that rolls over monthly.
  culinary: Julian Garris whips up soul‑food fusions such as gochujang‑glazed fried chicken over buttery grits, harissa‑spiced shrimp tacos with collard‑green slaw, and sweet‑potato mac and cheese infused
    with miso, proudly boasting a flawless sous‑vide egg as their secret weapon.
  core: Julian Garris is a data‑savvy operational leader who trades spreadsheets for sketchpads at midnight, fuels competitive ambition with improv comedy, and can’t resist a last‑minute concert ticket
    even when the budget screams otherwise.
background:
  cultural: Julian grew up in Cleveland’s east side, a neighborhood with a vibrant African‑American community that celebrates music, art, and civic engagement. His family, part of the post‑World‑War‑II
    Great Migration wave, instilled a strong work ethic and a deep respect for education, encouraging his pursuit of a STEM degree despite being under‑represented in the field. He regularly participates
    in local cultural events such as the Cleveland Museum of Art’s African American art exhibitions, the annual Juneteenth parade, and community‑based hip‑hop workshops. Julian’s identity as a Black professional
    informs his commitment to diversity and inclusion; he is active in the Cleveland chapter of the National Society of Black Engineers and mentors youth from similar backgrounds. He draws inspiration from
    the city’s musical heritage—soul, R&B, and jazz—which shapes his creative outlook and his appreciation for collaborative, rhythmic teamwork.
attributes:
  skills: '[''Operations Management'', ''Process Optimization (Lean Six Sigma)'', ''Data Analysis & Visualization (Excel, Power BI, Tableau)'', ''ERP & Inventory Management Systems (SAP, NetSuite)'', ''Project
    Coordination (Agile, Scrum basics)'', ''Cross-Functional Team Leadership'', ''Stakeholder Communication & Negotiation'', ''Rapid Technology Adoption & Integration'', ''Performance Benchmarking & KPI
    Development'', ''Crisis Management & Adaptive Problem Solving'', ''Networking & Relationship Building'', ''Creative Problem Solving & Design Thinking'']'
  hobbies: '[''Visiting art galleries & street art tours'', ''Sketching/digital illustration'', ''Pick-up basketball & ultimate frisbee'', ''Cooking fusion dishes (Southern soul food + global flavors)'',
    ''Attending live music (jazz, hip‑hop, concerts)'', ''Improv comedy & open‑mic sessions'', ''Strategy board games (e.g., Settlers of Catan, Risk)'', ''Hackathons & AI side projects'', ''Spontaneous
    road trips & city explorations'', ''Mentoring with NSBE (National Society of Black Engineers)'']'
  career_goals: Julian aims to accelerate his trajectory toward senior operational leadership, targeting a Director of Operations role within the next three to five years at a technology‑driven or creative‑industry
    firm. He plans to deepen his expertise in digital transformation, earn a professional certification in Lean Six Sigma Black Belt, and eventually pursue an MBA focused on innovation management. His long‑term
    ambition is to become a Chief Operating Officer where he can blend his data‑driven efficiency mindset with his passion for arts and culture, perhaps leading operations for a museum, cultural institution,
    or a startup that merges tech with creative experiences. He also aspires to speak at industry conferences, publish case studies on agile operational models, and mentor other young Black professionals
    entering STEM and management fields.
