  hobbies: '[''Sketching and Painting'', ''Listening to Music (Eclectic Genres)'', ''Reading Science Fiction and Philosophy'', ''Hiking and Exploring Nature'', ''Cooking Mexican Cuisine'', ''Salsa Dancing'',
    ''Creating Short Videos'', ''Collecting Vintage Postcards'']'
  career_goals: Jefferson aims to earn his GED within the next year, enroll in a community college program in graphic design or visual arts, and eventually work as a community muralist or arts facilitator
    in Bloomfield. He hopes to combine his love for art with his desire to foster cultural harmony, perhaps opening a small studio offering workshops on Mexican folk art and digital design for youth. In
    the longer term, he dreams of contributing to public art projects that celebrate the town’s diverse heritage.
