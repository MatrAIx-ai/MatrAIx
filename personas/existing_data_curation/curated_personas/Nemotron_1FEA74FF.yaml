  career_goals: Patricia envisions a future where she can work independently in a structured, detail‑oriented field. She is drawn to computer programming and hopes to become a software engineer or data
    analyst, roles that allow her to solve logical problems and enjoy solitary focus. She also contemplates careers in forensic science or veterinary medicine, which combine practical investigation with
    controlled environments. In the short term, she aims to deepen her coding skills, earn online certifications, and build a portfolio of small projects to boost confidence and open pathways to university
    programs.
