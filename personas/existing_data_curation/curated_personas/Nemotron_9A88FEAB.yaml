  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Salsa and Latin dance'', ''Community gardening'', ''Participating in trivia and bridge clubs'', ''Volunteering at the local senior center'', ''Reading
    mystery and historical novels'', ''Thrift‑store treasure hunting'']'
  career_goals: Although currently not in the formal workforce, Carmen aims to deepen her impact in the community. She plans to launch a small home‑based catering service focused on Puerto Rican cuisine
    for local events and family gatherings. Simultaneously, she hopes to mentor younger Puerto Rican women through workshops that blend cooking, budgeting, and digital skills. Carmen is also pursuing a
    certification in nutrition for seniors to better support the elderly at her local senior center, where she envisions taking on a leadership role on the board of directors. Long‑term, she dreams of organizing
    an annual cultural festival that celebrates island heritage and brings together the diverse residents of Suffolk County.
