persona_description: A historian and archaeologist who specializes in the study of maritime history and shipbuilding, particularly the Oseberg ship. He is interested in the reconstruction and reevaluation
  of the hull form of the ship based on new methods of documentation and a reassessment of the individual ship parts. He is skilled in photo and laser scanning, as well as in the use of new techniques and
  expertise to find new answers to the original ship's problems. He has a deep understanding of the Oseberg ship's history and is dedicated to preserving its legacy.
