  career_goals: Ricky aims to move from a clerk role into a supervisory position within the supply‑chain field, targeting a role as an inventory control manager or logistics coordinator for a regional distribution
    center. He plans to earn a bachelor’s degree in logistics or supply‑chain management and obtain a certification such as the APICS Certified in Production and Inventory Management (CPIM). Over the next
    five years he hopes to lead process‑improvement projects that increase order‑fulfillment speed while preserving the predictable, structured environment he prefers. He also entertains the long‑term idea
    of starting a small e‑commerce fulfillment service that he could manage from home, allowing him to maintain a quiet work setting.
