personas:
  professional: Esteban Barrios is a budding junior engineer who spends afternoons constructing intricate LEGO mechanisms, wiring simple circuits with LED lights, and coding interactive games in Scratch,
    channeling their curiosity and pragmatic problem‑solving into projects that blend imagination with functional design, while their spontaneous nature means they often abandon a plan mid‑build to experiment
    with a new idea.
  sports: Esteban Barrios competes on the Eagle Valley youth soccer team and the Cedar Hill Little League baseball squad, cheering for the New England Revolution and the Boston Red Sox on weekends, and
    they relish the competitive edge of each match—often focusing on scoring goals or home runs—while sometimes neglecting warm‑up stretches in their rush to join the game.
  arts: Esteban Barrios blends their love of visual storytelling and rhythm by sketching goofy cartoon characters inspired by classic adventure comics from Jack Kirby and Stan Lee, jamming to merengue hits
    by Juan Luis Guerra and bachata classics from Prince Royce while their family cooks, and they frequently re‑create their favorite comic panels with LEGO bricks, turning their playtime into an artistic
    experiment.
  travel: Esteban Barrios prefers spontaneous day trips, often grabbing a snack and heading to the White Mountains for a hike or paddling a nearby pond in New Hampshire, while dreaming of a future family
    vacation to the LEGO House in Billund, Denmark, and a summer break at Universal Studios Orlando, yet their travel plans are usually limited by school schedules and a modest family budget.
  culinary: Esteban Barrios is an eager junior cook who helps stir rice and beans, mash plantains, and season a modest pot of sancocho during family meals, enjoys assembling their own pepperoni pizza with
    extra cheese, and loves snacking on mango slices and homemade hummus, though their cooking skill level remains at the beginner stage, leading to occasional burnt edges on their toast.
  core: Esteban Barrios fuses relentless curiosity with a competitive spirit, building and breaking rules in LEGO, games, and sports, while staying remarkably calm and resilient, even when their spontaneous
    habits clash with structure.
background:
  cultural: Esteban is a first‑generation Dominican‑American raised in Bedford, New Hampshire. At home he speaks Spanish and celebrates Dominican holidays such as Día de la Independencia with family gatherings,
    traditional foods like mangú and sancocho, and lively music. In school and the broader community he navigates English‑language life, enjoying New England's seasonal changes and outdoor activities. His
    upbringing blends the close‑knit family values, respect for elders, and love of Caribbean rhythms from his Dominican heritage with the outdoor, community‑oriented culture of New Hampshire.
attributes:
  skills: '["LEGO building", "basic electronics assembly", "Scratch programming", "bilingual Spanish‑English communication", "strategic gaming", "basic mathematics and geometry", "creative problem solving"]'
  hobbies: '["LEGO building", "soccer", "baseball", "nature exploring", "basic electronics projects", "Scratch game development", "listening to merengue and bachata", "cooking with family", "reading comic
    books", "competitive video gaming", "puzzle solving", "drawing cartoons"]'
  career_goals: He dreams of becoming an engineer who designs robots to help people, or a video game developer who creates immersive interactive worlds. He also imagines playing professional baseball for
    a Dominican team, blending his love of technology with his competitive spirit. Esteban hopes to start a small tech club at school or a community makerspace, where he can teach peers and apply his skills
    to real‑world challenges while continuing to learn new tools and techniques.
