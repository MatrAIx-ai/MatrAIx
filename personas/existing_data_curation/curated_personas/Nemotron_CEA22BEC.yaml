  career_goals: Eusebio aims to move beyond the floor associate role within the next two years by earning his GED and completing a short business-management certificate at a local community college. He
    hopes to be promoted to shift supervisor and eventually store manager, where he can implement new retail technologies such as mobile checkout and online ordering that satisfy his curiosity for innovation
    while keeping the store efficient. His competitive nature pushes him to become the top salesperson in his district, earning recognition and performance bonuses. In the longer term, he dreams of opening
    a small Mexican-style grocery or taco stand that serves the Clearwater Hispanic community, giving him a platform to blend his cultural heritage with entrepreneurial ambition and to provide financial
    stability for his family back in Mexico.
