persona_description: 'A young urban planner who is passionate about making cities more walkable, livable, and equitable. Speck''s book, Walkable City Rules: 101 Steps to Making Better Places, is a collection
  of practical and actionable recommendations for improving urban design and street infrastructure. The book is designed to be accessible to regular citizens who want to advocate for better streets and
  communities. Speck''s work has a strong focus on the importance of walking and biking as forms of transportation and how they can improve the overall well-being of urban residents. Speck is known for
  his previous work in urban planning and transportation, and his book aims to build on that legacy by providing concrete steps for people to take in their own communities.'
