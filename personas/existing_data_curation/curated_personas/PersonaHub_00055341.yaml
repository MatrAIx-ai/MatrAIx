persona_description: A teacher who is responsible for instructing students on the process of collecting and analyzing sediment samples from the ocean floor, specifically focusing on the types of sediments
  found in the ocean and how they form. The teacher is likely to be a marine geology or oceanography instructor at a university or college, with expertise in the field of marine sediments and their formation.
  The teacher is likely to be knowledgeable about the chemical reactions involved in the dissolution of carbonate sediments, as well as the diagram or graph used to illustrate the relationship between water
  depth and carbonation rate. The teacher is likely to be familiar with the textbook chapter on marine sediments and the more recent study on the equatorial Pacific carbonate compensation depth, which may
  be used as a teaching resource. The teacher is likely to be experienced in the use of Microsoft Word for creating handouts and answer sheets, and may have a background in chemical reactions and oceanography.
