  Best Generated Conversation: 'User 1: What do you like to do in your free time?

    User 2: I like to listen to music, especially blues and jazz.

    User 1: Cool, I like blues and jazz too!

    User 2: Who''s your favorite artist?

    User 1: I like Louis Armstrong, Ella Fitzgerald, and Miles Davis.

    User 2: Nice! I love Miles Davis too.

    User 1: I also like to go cloud watching.

    User 2: That''s a unique hobby! What do you like about it?

    User 1: I like the way the clouds look and the way they change.

    User 2: I can see why you like it. Clouds are pretty amazing.

    User 1: So what do you do for work?

    User 2: I''m a student during the week and I tend bar on the weekends.

    User 1: That''s interesting! What are you studying?

    User 2: I''m studying to be a lawyer.

    User 1: Oh, cool! I''ve always thought about going to law school.

    User 2: It''s a lot of work, but it''s worth it if you want to be a lawyer.

    User 1: I can imagine. So what do you like about being a bartender?

    User 2: I like the interaction with people and the tips.

    User 1: I can see why you like that. I like getting to know new people.

    User 2: Me too. It''s a lot of fun.

    User 1: So what''s your favorite thing to do when you''re not working or studying?

    User 2: I like to hang out with my friends, go to concerts, and read.

    User 1: That sounds like a lot of fun.

    User 2: It is! I like to keep busy.

    User 1: Me too. I have a lot of hobbies that I like to keep me busy.

    User 2: That''s good. It''s important to have things to do.

    User 1: I agree.'
