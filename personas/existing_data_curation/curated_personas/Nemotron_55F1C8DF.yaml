personas:
  professional: A seasoned humanities professor and interdisciplinary curriculum developer, Liliana Balseiro combines methodical organization, bilingual instruction expertise, and practical leadership to
    design structured programs, secure grant funding, and mentor junior faculty, and they consistently apply a data-driven approach to curriculum assessment.
  sports: A dedicated outdoor enthusiast, Liliana Balseiro joins the Bethesda Trail Runners for weekly hikes, practices yoga twice a week, supports the Washington Capitals and the Washington Nationals,
    balances her fitness routine with occasional weekend volleyball matches at the community center, and they enjoy tracking their steps with a fitness watch.
  arts: An avid lover of literature and performance, Liliana Balseiro reads works by García Márquez and Toni Morrison, writes poetry, performs in community theater, enjoys concerts by Lila Downs and listens
    to Beethoven symphonies, weaving these artistic experiences into her teaching, and they often incorporate themes from these works into classroom discussions.
  travel: A meticulous planner, Liliana Balseiro prefers cultural immersion trips, has visited Oaxaca for Día de los Muertos festivities and Granada for its Moorish architecture, but often balances travel
    with budget constraints by taking weekend road trips to Shenandoah National Park, and they meticulously document each journey in a travel journal.
  culinary: A passionate home chef, Liliana Balseiro excels at cooking traditional dishes like mole poblano, pozole, and tamales, cultivates cilantro, epazote, and chilies in her herb garden, and enjoys
    experimenting with regional spice blends, though they sometimes over-salt their soups in the pursuit of flavor.
  core: Liliana Balseiro blends disciplined organization with a heartfelt devotion to cultural storytelling, making meticulous spreadsheets for everything—from grant budgets to holiday menus—while never
    missing a chance to celebrate family traditions, and they find balance through routine yoga and weekend hikes.
background:
  cultural: Liliana identifies as a Mexican‑American Latina who grew up in a bilingual household where storytelling and family gatherings were central. Her upbringing blended Catholic traditions with vibrant
    cultural celebrations such as Día de los Muertos and quinceañeras. She maintains strong ties to her heritage through language, cuisine, and community involvement, often integrating cultural perspectives
    into her teaching. Living in Bethesda, she actively participates in local Hispanic cultural events and serves as a bridge between the university and the surrounding Latino community.
attributes:
  skills: '["Interdisciplinary curriculum development", "Bilingual (English-Spanish) instruction", "Academic research and scholarly publishing", "Grant writing and fundraising", "Course planning and assessment
    design", "Departmental committee leadership", "Digital pedagogy and online instruction", "Public speaking and lecturing", "Academic advising and mentorship", "Community outreach and cultural program
    coordination"]'
  hobbies: '["Reading classic and contemporary literature", "Writing essays and poetry", "Cooking traditional Latin American cuisine", "Herb gardening", "Practicing yoga", "Hiking in Great Falls Park",
    "Attending theater performances", "Participating in cultural festivals", "Volunteering to teach Spanish at community centers"]'
  career_goals: Liliana aims to secure tenure and eventually assume the role of department chair, using her structured leadership style to guide curriculum innovation. She aspires to develop a cross‑cultural
    humanities program that integrates Latin American literature and contemporary social issues. Securing a major research grant to support a monograph on 20th‑century Mexican poetry is a key ambition,
    as is publishing the book within the next five years. Additionally, she is committed to mentoring junior faculty, expanding community engagement initiatives, and fostering partnerships between the university
    and local Hispanic organizations.
