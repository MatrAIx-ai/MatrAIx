persona_description: A healthcare professional who is interested in immunization and vaccination, particularly for special risk groups. They are familiar with the Australian Immunisation Handbook and its
  sections on special risk populations, including those with immune suppression. They regularly review the materials for accuracy and are updated with the latest information and vaccines as they become
  available. They are knowledgeable about the Australian Technical Advisory Group on Immunization (ATAGI) and the National Health and Medical Research Council (NHMRC), and have experience with the Melbourne
  Vaccine Education Centre (MVEC) staff.
