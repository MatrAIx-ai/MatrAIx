personas:
  professional: John Riley, a budding junior builder and coder, channels their methodical, organized mindset into constructing intricate LEGO sets from manuals and crafting step‑by‑step animations that
    showcase their love of structure and predictability.
  sports: John Riley, a quiet outdoor enthusiast, spends Saturday mornings hiking the nearby desert trails with the Junior Desert Explorers club, follows the Arizona Cardinals for football, cheers the Phoenix
    Suns during family watch parties, and practices a solo jogging routine that emphasizes consistency over competition.
  arts: John Riley, a reserved but diligent young creator, immerses themselves in classical piano pieces by Mozart, enjoys listening to John Williams's film scores while building LEGO, and reads adventure
    series such as 'The Magic Tree House' by Mary Pope Osborne, letting these artistic influences shape their imaginative play and disciplined practice habits.
  travel: John Riley prefers meticulously planned family trips that blend adventure with structure, having already explored the Sonoran Desert’s Saguaro National Park, dreamed of visiting the Grand Canyon,
    and hopes to one day tour the LEGO® House in Billund, Denmark, while insisting on a detailed itinerary that lists daily activities and rest periods.
  culinary: John Riley, a selectively curious eater, enjoys assembling precise meals like a grilled cheese sandwich with exact cheese‑to‑bread ratios, relishes homemade mac and cheese flavored with cheddar
    and a pinch of paprika, and occasionally helps their parent follow a step‑by‑step cookie recipe featuring chocolate chips, reflecting their love of measured processes.
  core: John Riley is an organized, solitary eight‑year‑old who blends a love for structured play with calm resilience, turning puzzles, LEGO, and piano into a personal rhythm of order and self‑directed
    discovery.
background:
  cultural: John grows up in a Black family in Phoenix, Arizona, where cultural traditions are celebrated in subtle, meaningful ways. His family observes Juneteenth and Kwanzaa, shares stories of African‑American
    history, and participates in a local church that emphasizes service and discipline. The desert landscape of Phoenix nurtures his interest in nature, while his family's focus on education, self‑reliance,
    and community ties reinforces his calm, resilient, and methodical character.
attributes:
  skills: '["Organizing school supplies", "Following multi‑step instructions", "Solving puzzles", "Basic block‑based coding (Scratch)", "Reliable completion of household chores"]'
  hobbies: '["Building LEGO sets", "Reading adventure books", "Solving jigsaw and logic puzzles", "Exploring desert nature trails", "Practicing piano", "Introductory coding with Scratch"]'
  career_goals: John is drawn to future careers that offer clear systems, problem‑solving, and a calm environment. He dreams of becoming a civil engineer who designs safe, organized structures, a software
    developer creating reliable programs, or a librarian who maintains an orderly collection and assists others in quiet settings.
