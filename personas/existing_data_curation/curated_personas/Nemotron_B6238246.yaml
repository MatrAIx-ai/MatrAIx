personas:
  professional: Lan Yeon, an aspiring LEGO architect, channels a love for step‑by‑step construction, meticulous organization of trading‑card collections, and strategic thinking from chess into a budding
    passion for design and problem‑solving, all while balancing a laid‑back attitude toward obligations and a competitive edge that fuels their desire to perfect each model.
  sports: Lan Yeon, an energetic cyclist around Green Lake who proudly dons a Seattle Seahawks cap, cheers for the Seattle Mariners during weekend games, belongs to the Green Lake Kids Bike Club, participates
    in the local swimming program at the community center, and they channel a competitive drive into weekly chess matches with friends.
  arts: Lan Yeon, a budding pianist who enjoys diligently practicing Beethoven’s 'Für Elise' alongside Korean lullabies learned in class, idolizes the energetic soundtrack of 'The LEGO Movie', and they
    often hum the tunes during free play, while also delighting in Disney’s 'Frozen' — especially the anthemic 'Let It Go' — which shape their creative play and personal soundtrack.
  travel: Lan Yeon, an inquisitive traveler who favors family‑planned road trips over spontaneous getaways, has already explored Disneyland in Anaheim, marveled at the LEGO House in Billund, Denmark, dreams
    of kayaking among the San Juan Islands, and they hope to visit the towering cliffs of Grand Canyon National Park.
  culinary: Lan Yeon, a budding chef who loves assembling a pepperoni pizza with extra mozzarella, enjoys sweet strawberry‑yogurt parfaits, whips up simple cheese quesadillas using shredded cheddar and
    flour tortillas, and they often forget to finish their broccoli side, reflecting a selective palate that embraces comfort foods while occasionally venturing into new flavors like sushi rolls.
  core: Lan Yeon, an eight‑year‑old who blends a love for structured LEGO building, competitive chess, and soothing piano practice with a relaxed attitude toward chores and a quirky habit of misplacing
    trading cards, and they embody a routine‑driven yet spontaneously curious outlook on life.
background:
  cultural: Lan Yeon comes from a Korean immigrant family living in Santa Clara, California. At home she speaks both English and Korean, celebrates Lunar New Year with traditional foods like tteokguk, and
    takes part in cultural festivals organized by the local Korean community. Her parents emphasize hard work, respect for elders, and the importance of education, shaping her practical outlook and competitive
    nature. Growing up in Silicon Valley, she is also exposed to a tech‑centric environment, which fuels her interest in coding and robotics.
attributes:
  skills: '[''Reading fluency (English)'', ''Basic Hangul character recognition'', ''Basic arithmetic (addition, subtraction, multiplication)'', ''Scratch Jr. block coding'', ''Piano (beginner)'', ''Drawing
    and coloring'', ''Swimming (freestyle basics)'', ''Taekwondo (yellow belt)'']'
  hobbies: '[''LEGO building'', ''Trading card collection'', ''Piano practice'', ''Chess'', ''Bicycle riding'', ''Feeding ducks at the lake'', ''Korean language class'', ''Swimming lessons'']'
  career_goals: Lan Yeon dreams of becoming a veterinarian because she loves caring for animals and appreciates the clear, practical steps involved in diagnosing and treating pets. She hopes to develop
    a science‑fair project on animal health, channeling her competitive streak into academic excellence. While she envisions herself in a lab coat one day, she also wants to give back to her community by
    volunteering at local animal shelters and participating in outreach programs that teach children about responsible pet care.
