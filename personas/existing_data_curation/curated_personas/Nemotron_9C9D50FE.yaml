personas:
  professional: Stacey Galindo, a seasoned correctional officer in Washington DC, leverages frontline security competence and a humanistic arts background to excel in inmate supervision, conflict de-escalation,
    and meticulous report writing, while using structured checklists to counter their natural tendency toward disorganization and anxiety-driven overthinking.
  sports: Stacey Galindo enjoys low‑impact fitness by practicing gentle yoga three times a week, joining a local walking club for weekend strolls through the National Mall, and cheering on the Washington
    Nationals and DC United, while occasionally participating in community pickleball sessions.
  arts: Stacey Galindo immerses themselves in historical fiction by Hilary Mantel, philosophical works by Simone de Beauvoir, and urban photography inspired by Ansel Adams, while volunteering at the local
    historical museum and curating a small Instagram feed of DC monuments.
  travel: Stacey Galindo favors historically rich getaways, having explored Boston's Freedom Trail, the cobblestones of Edinburgh, and the serene gardens of Kyoto, planning trips with flexible itineraries
    that allow spontaneous photo walks and occasional museum volunteering.
  culinary: Stacey Galindo experiments in the kitchen with dishes like miso‑glazed salmon, saffron‑infused paella, and kimchi‑fried rice, favoring bold ingredients such as fermented bean paste, smoked paprika,
    and fresh herbs, while sometimes forgetting to label leftovers, leading to occasional culinary improvisation during busy weeks.
  core: Stacey Galindo melds disciplined correctional expertise with a curious, reflective soul, navigating anxiety through structured routines, creative pursuits, and a relentless quest for humane reform.
background:
  cultural: Stacey grew up in a middle‑class, predominantly white suburb of the Mid‑Atlantic region, raised in a Protestant household that emphasized civic duty and personal responsibility. Her parents
    encouraged higher education, leading her to pursue a bachelor's degree in the humanities, which fostered an appreciation for literature, history, and the arts. Moving to Washington, D.C., for her correctional
    officer career exposed her to a richly diverse urban environment, reinforcing a respect for multicultural perspectives and the complexities of the American justice system. Her generational experiences—coming
    of age during the social reforms of the 1970s—have shaped a worldview that values both individual rights and communal accountability.
