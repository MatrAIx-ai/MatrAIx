  career_goals: Stacey aims to transition from day‑to‑day lock‑up duties to a supervisory and training role where she can shape correctional policy and inmate rehabilitation. She envisions becoming a shift
    supervisor or training coordinator for the DC Department of Corrections, designing workshops that integrate arts‑based therapy and psychosocial support for inmates. A secondary ambition is to earn a
    certification in correctional counseling, allowing her to mentor new officers and advocate for humane, evidence‑based practices within the system. Her long‑term goal includes contributing to policy
    reform that balances public safety with restorative justice, while also securing a schedule that mitigates her stress levels and preserves personal well‑being.
