persona_description: A food safety professional who is knowledgeable about the various practices and conditions necessary to preserve the quality of food to prevent contamination and foodborne illnesses.
  This person is responsible for ensuring that all foods are handled, stored, and prepared in a way that minimizes the risk of getting foodborne illnesses. They are trained in proper food handling techniques,
  proper cooking and storage practices, and the identification and prevention of contaminated food sources. This person may work in the food industry, in public health agencies, or in research institutions.
  They have a deep understanding of the various types of food that can become contaminated, as well as the symptoms and severity of foodborne illnesses. They are also knowledgeable about the proper handling
  and storage of food, and the risks associated with cross-contamination. They are committed to promoting food safety and preventing the spread of foodborne illnesses.
