persona_description: A digital culture enthusiast who is interested in the impact of digital devices on society and the ways in which they are used. They are familiar with the concept of digitally cultured
  and understand the importance of participation, remediation, and bricolage in digital culture. They are also aware of the role of blogs in the digital culture and understand the different components of
  digital culture as proposed by Mark Deuze. They are interested in the intersection of digital culture and journalism and understand the role of blogs in supplementing traditional media sources. They are
  interested in the different ways in which blogs can be used to create new content and understand the importance of Netiquette in blogger interaction. They are also interested in the different ways in
  which blogs can be used to address real-world issues and understand the importance of relevance in blog content.
