personas:
  professional: Sharon Hansen, a 40‑year‑old industrial cutting technician with over twenty years of hands‑on experience, channels their love of routine, precise calibration, and assertive safety leadership
    into consistently high‑quality production while mentoring new operators and pursuing CNC‑cutting certification to step into a supervisory role.
  sports: Sharon Hansen stays active by walking the Boone County trail system and playing on the local Boone County Belles softball team, while they root for the Kentucky Wildcats during March Madness and
    catch occasional Louisville Cardinals football games on TV.
  arts: Sharon Hansen weaves their creative impulses into daily quilting projects inspired by the geometric patterns of Jo Ann Jones, fills evenings with the classic country sounds of Dolly Parton and the
    folk storytelling of Bob Dylan, and they unwind with mystery novels by Agatha Christie that satisfy their craving for structured resolution.
  travel: Sharon Hansen plans vacations with a spreadsheet, preferring relaxed road trips to garden‑rich destinations like Asheville’s Biltmore Estate and the historic streets of Savannah, while they dream
    of a summer pilgrimage to England’s Cotswolds to study traditional herb gardens.
  culinary: Sharon Hansen prepares hearty Southern comfort meals—such as country‑style fried chicken, buttery cornbread, and simmered collard greens seasoned with smoked ham hocks—using fresh vegetables
    from their garden and family recipes, yet they occasionally indulge in a slice of peach cobbler at church potlucks.
  core: Sharon Hansen blends a methodical, routine‑driven work ethic with a hands‑on love for gardening, quilting, and mystery novels, finding solace in predictable cycles while occasionally succumbing
    to late‑night page‑turning that keeps them up past bedtime.
background:
  cultural: Sharon was raised in a working‑class, white community in Kentucky, where values such as self‑reliance, practicality, and family ties are deeply rooted. Growing up in Boone County, she was influenced
    by the region’s Southern hospitality, Protestant church traditions, and a strong sense of community involvement. Her upbringing emphasized steady work, routine, and respect for established customs,
    shaping her pragmatic outlook and dedication to reliable, hands‑on occupations. As a widowed woman, she draws on the support networks of her local church and neighborhood, reflecting the communal spirit
    common to many small‑town Kentuckians.
attributes:
  skills: '[''Industrial cutting machine operation'', ''Quality control and inspection'', ''Safety compliance and inspections'', ''Basic technical diagram reading'', ''Inventory tracking and shift reporting'',
