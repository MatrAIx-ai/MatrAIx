  hobbies: '[''Gardening'', ''Quilting'', ''Crochet'', ''Cooking traditional Southern dishes'', ''Church potluck gatherings'', ''Walking local trails'', ''Listening to classic country and folk music'',
    ''Reading mystery novels'']'
  career_goals: Sharon aims to advance within her plant by obtaining a CNC‑cutting certification and moving into a supervisory role where she can oversee a shift crew. She is interested in further developing
    her leadership skills, possibly becoming a safety officer or process coordinator to ensure the plant maintains high standards of efficiency and worker well‑being. Long‑term, she hopes to secure a stable,
    higher‑pay position that offers benefits for her and any dependents, and she is exploring part‑time coursework at a community college to broaden her technical knowledge.
