persona_description: A marine ecologist or environmental scientist who is interested in using acoustic Doppler current profilers (ADCPs) for habitat mapping and has a background in understanding the mechanisms
  behind instrument movement errors and their impact on mapping applications. This person is likely to be familiar with the complexities of underwater environments and the need for accurate and reliable
  data in ecological research. They are also likely to be knowledgeable about the specific applications of ADCPs in habitat mapping, including mapping of fluid shear, turbulence, vorticity, and near-bed
  sediment transport. Additionally, they may have experience with numerical analyses and have a keen interest in quantifying the magnitude of velocity errors caused by compass mis-alignment and heterogeneities
  in the flow velocity field.
