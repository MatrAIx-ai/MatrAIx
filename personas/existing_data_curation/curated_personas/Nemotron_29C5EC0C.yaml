personas:
  professional: Alba Garciavelez, a diligent middle school student with a knack for logical reasoning, channels their love of mystery novels, Sudoku, and online chess into an emerging talent for designing
    intricate puzzle games and aspires to create a bestselling escape-room experience by the time they finish high school.
  sports: Alba Garciavelez, a chess enthusiast and occasional member of the school's strategic-games club, follows the local basketball team—the Metro City Thunder—with fervor, plays pickup tennis on weekends
    for physical balance, and prefers structured training sessions over chaotic team sports, reflecting their competitive yet solitary nature.
  arts: Alba Garciavelez, an avid comic-strip creator, draws inspiration from the narrative twists of Agatha Christie, the visual style of Osamu Tezuka, and the dark humor of Alan Moore, often sketching
    panels late at night while listening to the ambient scores of Hans Zimmer.
  travel: Alba Garciavelez, who dreams of exploring the historic streets of Barcelona for its comic-con conventions and the bustling fish markets of Tokyo to study culinary storytelling, usually plans trips
    months in advance, saving allowance money for a single international adventure after high school graduation.
  culinary: Alba Garciavelez, a meticulous junior chef, enjoys assisting their mother in preparing traditional Caribbean dishes like arroz con gandules, mofongo, and pastelón, and experiments by adding
    precise spice measurements while still preferring quick, single-serve microwave meals for their own midnight study sessions.
  core: Alba Garciavelez, a structured teenage puzzle-solver with a secret stash of comic-strip sketches, precise budgeting habits, and a habit of journaling every migraine, balances solitary intellectual
    pursuits with occasional bursts of competitive sports and culinary tradition.
background:
  cultural: Alba grew up in a bilingual Puerto Rican household in New Brunswick, New Jersey. Spanish is spoken at home, and family gatherings feature traditional foods such as arroz con gandules, pasteles,
    and lechón, accompanied by salsa and reggaetón music. Her parents emphasize the importance of education, hard work, and community involvement, instilling values of resilience and pride in her heritage.
    She celebrates cultural holidays like Three Kings Day and participates in local Puerto Rican festivals, navigating both her Puerto Rican identity and the broader American culture within a diverse community.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Bilingual communication (Spanish/English)'', ''Basic coding in Scratch'', ''Detail-oriented note taking'', ''Personal budgeting'', ''Analytical
