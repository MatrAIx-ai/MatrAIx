  hobbies: '[''Reading mystery novels'', ''Playing chess'', ''Solving Sudoku puzzles'', ''Journaling'', ''Drawing comic strips'', ''Cooking traditional Puerto Rican dishes'']'
  career_goals: Alba aims to finish high school with a strong academic record and then enroll in a community college to study Business Administration or Accounting. She aspires to become a financial analyst
    or operations manager, roles that value structured processes, data accuracy, and clear objectives. In the long term, she hopes to achieve financial stability for her family and eventually contribute
    to community outreach programs that support the Puerto Rican diaspora in New Jersey.
