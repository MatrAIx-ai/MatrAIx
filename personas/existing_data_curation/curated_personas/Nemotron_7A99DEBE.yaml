personas:
  professional: Harry Kostrzewa is an aspiring operations manager who leverages his strong Excel and project‑management skills, honed through part‑time retail work and campus club leadership, to streamline
    group projects and plans to launch his logistics career at a regional Indiana manufacturer while pursuing APICS CPIM certification.
  sports: Harry Kostrzewa plays in Greenwood’s winter basketball league, assists as a youth soccer coach in the spring, hikes the trails of Brown County in the summer, and roots for the Indiana Pacers and
    Indianapolis Colts, while also following the Chicago Fire on the MLS schedule.
  arts: Harry Kostrzewa enjoys live music, regularly attending classic‑rock shows by The Black Keys and indie gigs featuring Tame Impala at local venues, and looks forward each summer to Greenwood’s outdoor
    festival where folk bands and regional theater performances showcase community talent.
  travel: Harry Kostrzewa prefers budget‑friendly road trips, weekending at the Indiana Dunes and exploring Chicago’s blues clubs, while dreaming of a spring pilgrimage to Kraków to celebrate Polish Independence
    Day with family and sample authentic pierogi.
  culinary: Harry Kostrzewa, a modest home cook, often prepares pierogi stuffed with potatoes and cheese for family gatherings, grows tomatoes and herbs in his garden to toss into fresh salads, and enjoys
    hearty chicken noodle soup on chilly evenings, though he sometimes burns the crust of his homemade pizza.
  core: Harry Kostrzewa blends Midwestern pragmatism with a love for organized group activities, obsessively tracks spreadsheets, juggle community coaching, and secretly binge‑plays strategy video games
    late into the night.
background:
  cultural: Harry comes from a Midwestern white family with Polish ancestry, reflected in his surname Kostrzewa. Raised in Greenwood, Indiana, he inherited the region's values of hard work, reliability,
    and strong community ties. Family traditions include celebrating Polish holidays such as Polish Independence Day and sharing dishes like pierogi at gatherings. He attends a local Lutheran church, where
    community events and service projects are a central part of life. This blend of Midwestern pragmatism and Polish cultural heritage has shaped his practical outlook, appreciation for organized group
    activities, and commitment to civic involvement.
attributes:
  skills: '[''Organizational planning'', ''Project coordination'', ''Microsoft Office (Excel, Word, PowerPoint)'', ''Data analysis with spreadsheets'', ''Customer service'', ''Cash handling'', ''Inventory
