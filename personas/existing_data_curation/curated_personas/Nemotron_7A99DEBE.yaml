  hobbies: '[''Community basketball league'', ''Intramural soccer'', ''Hiking with friends'', ''Assistant youth soccer coach'', ''Live music concerts (classic rock, indie)'', ''Attending Greenwood summer
    festivals'', ''Strategy video gaming'', ''Reading non-fiction (productivity, leadership)'', ''Gardening (vegetable garden)'']'
  career_goals: Harry plans to finish his bachelor's degree in Business Administration with a focus on Operations Management within the next three years. He aims to secure an entry‑level role in supply
    chain or logistics at a regional manufacturing firm in Indiana, where he can apply his organizational strengths to streamline processes. Over the longer term, he aspires to move into a managerial position,
    leading a team that implements lean and efficient operational strategies, and hopes to earn professional certifications such as the APICS CPIM. Alongside his career, he wants to stay engaged in community
    mentoring programs, helping younger students navigate education and work pathways.
