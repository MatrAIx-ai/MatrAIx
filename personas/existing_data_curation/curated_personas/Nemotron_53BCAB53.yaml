  career_goals: Lisbet aims to complete her GED within the next year and enroll in a community‑college culinary program that offers hands‑on training in pastry and traditional Mexican cuisine. In the short
    term, she plans to secure a part‑time apprenticeship at a local bakery where she can apply her cooking skills and learn professional kitchen operations. Long‑term, she dreams of opening a small family‑run
    bakery in Cypress that blends authentic Mexican pastries with contemporary flavors, providing a welcoming space for her community. She also hopes to mentor other young people, especially those from
    bilingual backgrounds, offering them guidance on balancing education, work, and cultural heritage.
