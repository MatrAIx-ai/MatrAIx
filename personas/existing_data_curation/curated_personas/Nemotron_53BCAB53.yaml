personas:
  professional: Lisbet Nunez, a 17‑year‑old aspiring baker, combines self‑taught culinary skills and bilingual communication to volunteer at a local cultural center while juggling GED studies, showing a
    methodical yet adaptable approach to small‑scale kitchen projects and peer mediation, and they excel at organizing recipe experiments.
  sports: Lisbet Nunez enjoys low‑key fitness routines like early‑morning jogs at Cypress Creek Park, roots for the Houston Astros and Houston Dynamo, and participates in a weekend community garden club
    that incorporates light strength training, and they prefer solitary activity over team sports.
  arts: Lisbet Nunez channels introspection into sketching quiet park scenes, strumming simple folk chords on an acoustic guitar, and curating a personal collection of vintage recipe cards, often drawing
    inspiration from artists like Frida Kahlo and singer‑songwriter José González, and they find solace in these creative outlets.
  travel: Lisbet Nunez dreams of a food‑focused road trip to Oaxaca to study regional pastries, but currently opts for weekend trips to nearby Waco for its historic riverwalk and occasional family visits
    to the coast of Galveston, balancing a tight student budget with a love for scenic drives and cultural immersion, and they savor each new landscape.
  culinary: Lisbet Nunez thrives on blending traditional corn‑based pastries like pan de muerto with modern flavors such as matcha and lavender, often practicing late‑night baking sessions using fresh herbs
    from their garden and occasionally forgetting to clean the kitchen before bedtime, and they constantly seek the next flavor experiment.
  core: Lisbet Nunez is a quiet, organized teen baker who fuses heritage recipes with experimental twists, manages money prudently, tends a garden, and habitually sketches while occasionally losing track
    of time in the kitchen, and they embody a calm yet curious spirit.
background:
  cultural: Lisbet comes from a Mexican‑American family that maintains strong ties to its cultural roots while living in Cypress, Texas. Spanish is spoken at home, and she participates in family traditions
    such as Día de los Muertos altars, celebrating Mexican holidays, and preparing traditional foods with her grandparents. Her upbringing blends the close‑knit family values typical of Mexican culture
    with the multicultural environment of the Houston metropolitan area. She is active in local community events hosted by a nearby Hispanic cultural center, where she volunteers to help organize youth
    activities. This bicultural experience shapes her identity, giving her a deep appreciation for both her Mexican heritage and the broader Texan community.
