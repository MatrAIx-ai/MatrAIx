personas:
  professional: Victor Rodriguez is a retired electrical engineer who now channels decades of PLC programming, circuit design, and CAD expertise into creating low‑power kinetic sculptures, mentoring high‑school
    STEM teams, and translating complex renewable‑energy concepts into accessible community workshops, driven by relentless curiosity and a gentle, collaborative spirit.
  sports: Victor Rodriguez follows the Seattle Mariners, paddles with a senior kayaking club on the Columbia River each summer, participates in weekly Tai Chi sessions at the community center to preserve
    flexibility, and enjoys occasional trout fishing trips to the Skagit River that blend leisurely sport with his love of nature.
  arts: Victor Rodriguez draws inspiration from traditional folk textile patterns, spends evenings interpreting Andrés Segovia’s classical guitar recordings, studies Ansel Adams’ black‑and‑white landscapes
    for photographic technique, creates watercolors echoing Diego Rivera’s vibrant storytelling, and regularly volunteers at the local museum’s art‑education programs.
  travel: Victor Rodriguez prefers low‑key, unstructured road trips along the Pacific Coast Highway, exploring places like Cannon Beach, the Columbia River Gorge, and the lavender fields of Skagit Valley,
    while maintaining a scrapbook of river‑bank sketches and occasionally pilgrimage‑style visits to historic mission sites that blend cultural curiosity with natural scenery.
  culinary: Victor Rodriguez delights in blending smoky Douglas‑fir salmon with a spicy chile de árbol mole glaze, hand‑crafts corn tortillas seasoned with cedar smoke, experiments with seasonal rocha beet
    salads topped with queso fresco, and frequently pairs these dishes with locally foraged mushrooms and heirloom tomatoes from his organic garden.
  core: Victor Rodriguez, a 75‑year‑old kinetic‑art‑loving retired engineer, merges relentless curiosity with a habit of hoarding stray circuit boards, often sidesteps strict deadlines, and finds serenity
    in solitary river walks and late‑night guitar sessions.
background:
  cultural: Victor was born in central Mexico and moved to the United States in his early twenties, eventually settling in East Wenatchee, Washington, where he pursued a career in engineering. He grew up
    immersed in Mexican traditions—celebrating Día de los Muertos, preparing mole and tamales, and listening to mariachi music—while adopting the outdoors‑oriented lifestyle of the Pacific Northwest. Bilingual
    in Spanish and English, he bridges both cultures through community involvement, sharing Mexican recipes at local gatherings, participating in regional harvest festivals, and mentoring immigrant youth
    interested in STEM. His cultural identity informs his artistic sensibilities, from the vivid colors in his paintings to the rhythmic patterns in his guitar playing, creating a harmonious blend of heritage
    and adopted home.
