persona_description: A chemist who specializes in the study of antibiotics and their mechanisms of action, particularly how they disrupt the process of bacterial cell wall assembly. His research has led
  to the development of new antibiotics and a deeper understanding of the biological functions of antibiotics. His recent research has focused on the mechanism of action of penicillin and other antibiotics,
  and his work has shed light on the physiological function of enzymes that are inhibited by antibiotics. His research is funded by the National Institutes of Health and is ongoing in his laboratory.
