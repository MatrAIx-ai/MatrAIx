personas:
  professional: Karla Hiles, a seasoned accountant and auditor with a graduate degree in business, blends rigorous GAAP and IFRS expertise with a flair for visual storytelling, turning dense financial reports
    into clear, aesthetically‑pleasing dashboards while they foster collaborative client relationships and juggle a habit of misplacing the occasional spreadsheet due to a relaxed, sometimes disorganized
    work style.
  sports: Karla Hiles enjoys playing in a co‑ed softball league, cheering on the St. Louis Cardinals and the St. Louis Blues on game days, and tackling the Ozark Trail’s rugged paths on weekends with a
    local hiking club, often swapping post‑game smoothies with teammates while they occasionally forget to stretch afterward.
  arts: Karla Hiles frequents downtown art galleries, leads community painting workshops inspired by the vivid color palettes of contemporary artists like Kehinde Wiley and explores literary worlds through
    fiction by Zadie Smith and nonfiction by Michael Pollan, while their participation in a community theater troupe showcases a love for improvisational comedy and an occasional habit of rehearsing lines
    at odd hours.
  travel: Karla Hiles prefers spontaneous weekend road trips to cultural hotspots such as Santa Fe’s art market, New Orleans’ jazz festivals, and Austin’s indie film screenings, planning itineraries on
    the fly with a trusty podcast playlist for navigation, yet they often overpack a random assortment of sketchbooks and gardening tools that end up cluttering the car trunk.
  culinary: Karla Hiles, an enthusiastic home cook, experiments with dishes like mushroom risotto, farm‑to‑table beet salad with goat cheese, and homemade chicken enchiladas, relishing fresh herbs such
    as basil and cilantro and the smoky depth of smoked paprika, while they occasionally burn the bottom of a pan due to multitasking between recipe videos and phone calls.
  core: Karla Hiles is a curiosity‑driven, spreadsheet‑savvy accountant who swaps tax codes for paintbrushes, often misplaces their keys while balancing artistic projects and financial statements in equal
    measure.
background:
  cultural: Karla is a white Midwestern American who grew up in the small‑town environment of Licking, Missouri, within Dent County's rural landscape. Her upbringing instilled a strong sense of community,
    modesty, and hospitality characteristic of the Midwest, alongside an appreciation for the agricultural heritage surrounding her. While grounded in these traditional values, her graduate education and
    professional experiences have exposed her to diverse cultural ideas, fostering an openness to art, travel, and unconventional thinking. This blend of local roots and broader cultural curiosity shapes
    her outlook, making her both pragmatic and adaptable, with a deep respect for harmony and cooperative relationships.
