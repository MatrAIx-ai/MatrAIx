  career_goals: Karla aims to secure CPA certification (if not already achieved) and advance to a senior manager or director of finance role within a regional accounting firm. She is interested in developing
    expertise in sustainability and nonprofit financial reporting, with a long‑term ambition to become a CFO or launch her own consulting practice focused on arts and cultural organizations. Mentoring junior
    accountants and fostering a collaborative, flexible work environment are central to her career vision, as she seeks a balance between professional growth and personal well‑being.
