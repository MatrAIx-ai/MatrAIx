  career_goals: Charles aims to advance to a senior surveillance or security management role within the next five years. He plans to complete a bachelor’s degree in criminal justice or security management,
    obtain certifications such as Certified Protection Professional (CPP) and Advanced Video Surveillance Specialist, and leverage his interest in emerging AI‑driven monitoring tools to modernize casino
    security operations. Ultimately, he aspires to lead a multidisciplinary security team, develop proactive risk‑assessment protocols, and potentially transition into a law‑enforcement investigative career
    where he can apply his analytical mindset to complex cases.
