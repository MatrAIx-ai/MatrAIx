persona_description: A geologist who specializes in the study of mountain ranges, specifically the Great Smoky Mountains located in the southeastern United States. He has a deep understanding of the geological
  history and processes that have shaped the mountains over millions of years, including the Alleghanian orogeny, Pangea's breakup, and the subsequent weathering and erosion that have worn down the mountains
  to their current shapes. He is particularly interested in the types of igneous rocks and metamorphic rocks found within the range, as well as the biological diversity and ecosystems found within the Great
  Smoky Mountains. He is also knowledgeable about the forest types and the wildlife that inhabit the range, including the black bears, elk, bobcats, coyotes, and wild boar.
