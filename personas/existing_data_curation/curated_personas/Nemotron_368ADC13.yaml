  career_goals: Approaching retirement, Rachel aims to transition to a part‑time or mentorship role that lets her share her institutional knowledge while reducing daily stress. She hopes to formalize her
    expertise by earning a short certification in modern office software to support the office’s digitization efforts. Additionally, she plans to document best practices for future clerks, seek a modest
    raise that secures her retirement benefits, and increase her involvement in community volunteer projects where her organizational strengths can be leveraged.
