personas:
  professional: Andy Parandi, a seasoned metal‑fabrication specialist with two decades of industrial assembly experience, blends expertise in CNC routing, MIG/TIG welding, GD&T, and lean manufacturing to
    mentor junior crews, mediate workflow conflicts, and they are actively pursuing advanced welding certification and a Six Sigma Green Belt to transition into a lead fabricator role and eventually launch
    a community‑focused custom‑metal studio.
  sports: Andy Parandi stays active by playing in a local adult soccer league where they support the colors of their favorite Central American clubs such as Alianza FC and Isidro Metapan, tunes into televised
    matches of the hometown baseball team, and maintains a modest fitness routine of weight‑training at the makerspace gym, balancing community camaraderie with personal health.
  arts: Andy Parandi channels their curiosity into sketching on the fly while roaming Orange’s vibrant mural districts, drawing inspiration from street artists like the enigmatic ‘Grafito’ and classic creators
    such as Jean‑Michel Basquiat, and unwinds after work listening to the soulful rhythms of the Latin rock band Maná and attending occasional performances at the downtown Gallery 101, letting the arts
    rhythmically shape both their metal‑fabrication designs and weekend leisure.
  travel: Andy Parandi prefers meticulously planned road trips that blend cultural immersion with creative inspiration, having driven along the Pacific Coast Highway to explore Santa Monica’s street art,
    ventured to San Salvador for a family celebration and local crafts, and now dreams of a workshop‑focused pilgrimage to Tokyo’s industrial design expo and a tranquil getaway to the vineyards of Mendoza,
    balancing family obligations with a thirst for artistic discovery.
  culinary: Andy Parandi, an avid home chef, skillfully prepares hand‑pressed corn‑tortilla pupusas filled with cheese and chicharrón and simmers aromatic caldo de gallina using fresh cilantro, garlic,
    and locally sourced chicken, while also experimenting with wood‑fire grilling at family gatherings, yet occasionally over‑spices dishes in pursuit of bold flavor, and relishes occasional evenings at
    the neighborhood taco joint for a taste of authentic street fare.
  core: Andy Parandi navigates life with a blend of meticulous metal‑craft precision and spontaneous artistic flair, often losing track of time sketching murals while juggling welding projects, and habitually
    forgets to water houseplants amid weekend furniture‑building marathons.
background:
  cultural: Andy was raised in a close‑knit Salvadoran household in Orange, California, where Spanish was spoken at home and Catholic traditions were observed. His parents immigrated from San Salvador in
    the 1980s, instilling in him a deep respect for family, community, and hard work. He celebrates Salvadoran holidays such as Día de la Independencia (September 15) and the feast of the Virgin of Guadalupe,
    often organizing potluck gatherings that blend traditional foods with his American upbringing. This bicultural identity informs his collaborative spirit, his appreciation for vibrant visual culture,
    and his desire to give back through mentorship and community art initiatives.
attributes:
  skills: '[''CNC machining'', ''MIG/TIG welding'', ''Sheet‑metal fabrication'', ''Interpretation of technical drawings'', ''Lean manufacturing'', ''Quality control (ISO 9001)'', ''Basic CAD/CAM design'',
    ''Equipment troubleshooting'', ''Team mentorship'', ''Process improvement'']'
  hobbies: '[''Mural and gallery visiting'', ''Sketching and design'', ''Cooking Salvadoran cuisine'', ''Family weekend gatherings'', ''Makerspace projects (woodworking, car restoration, 3D printing)'',
    ''Community art workshops'', ''Soccer fandom'', ''Traveling to visit relatives in El Salvador'']'
  career_goals: Andy aims to transition from a skilled assembler to a lead fabricator or shop supervisor within the next three years, earning a certification in advanced welding and a Six Sigma Green Belt
    to formalize his process‑optimization ideas. He dreams of eventually opening a small custom‑metal studio where he can merge his fabrication expertise with artistic commissions—creating decorative railings,
    public‑art sculptures, and bespoke furniture for local businesses and community spaces. He also hopes to mentor at‑risk youth in the neighborhood through a makerspace program, blending his technical
    know‑how with his commitment to community harmony.
