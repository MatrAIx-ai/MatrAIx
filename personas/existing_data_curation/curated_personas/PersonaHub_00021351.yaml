persona_description: Tanya King is an anthropologist with a special interest in natural resource management and the environment. Her research has focused on the lives of individuals involved in small-scale
  fisheries, including commercial fishermen, dairy farmers, rural women farmers, members of the Metropolitan Fire Brigade, and professional rodeo riders. Her work has also included looking at the cultural
  aspects of water use, water governance, and the implementation of desalination plants in coastal regions. King's research is notable for its focus on the underappreciation of small-scale fisheries and
  the need for more detailed information about these communities in order to address global crises such as food security, poverty, and biodiversity loss.
