personas:
  professional: Randy Park, a budding robotics enthusiast and self‑taught model‑builder, channels his organized, methodical nature into designing precise LEGO Technic machines and leading his after‑school
    robotics club’s small team with quiet confidence.
  sports: Randy Park follows the Detroit Red Wings and Michigan State Spartans with loyal enthusiasm, enjoys playing in the local youth soccer league on Saturdays, and spends weekend hikes on the Clinton
    River Trail as a low‑key way to stay active while observing nature's systems.
  arts: Randy Park immerses himself in the world of imaginative craft, often listening to John Williams’ space‑themed scores while assembling detailed model rockets, and occasionally sketches scenes inspired
    by Carl Sagan’s Cosmos, which he proudly displays on his bedroom wall.
  travel: Randy Park prefers meticulously planned trips, having documented day‑by‑day itineraries for family road trips to the Henry Ford Museum and for a school field trip to Yellowstone, while dreaming
    of a future visit to the Kennedy Space Center to see launch pads up close.
  culinary: Randy Park favors simple, hearty meals like spaghetti with meatballs and a side of garlic bread, loves adding extra mozzarella cheese to every slice of pepperoni pizza, and occasionally experiments
    with arranging fruit slices in geometric patterns on his plate.
  core: Randy Park is a methodical ten‑year‑old who balances quiet curiosity about engineering with a disciplined approach to saving allowance, health, and hobbies, yet still can’t resist the occasional
    extra slice of pizza.
background:
  cultural: Randy grows up in a middle‑class suburban family in Sterling Heights, Michigan. His upbringing reflects typical Midwestern American values, including a focus on community responsibility, punctuality,
    and modesty. Family traditions involve seasonal holidays, weekend outings to local parks, and participation in community events such as the annual Memorial Day parade and local library reading programs.
    These experiences shape his respect for order, cooperation, and personal resilience.
attributes:
  skills: '[''Mathematics (grade‑level proficiency)'', ''Logical reasoning'', ''Model building (LEGO, K’NEX)'', ''Basic Scratch programming'', ''Organizational planning'', ''Classroom coordination'']'
  hobbies: '[''Model kit building'', ''Reading engineering/non‑fiction books'', ''Playing chess'', ''Nature hiking'', ''Robotics club (after‑school)'']'
  career_goals: Randy dreams of a future career that offers clear structure and tangible results. He aspires to become a civil engineer, designing bridges and roads that serve his community, and later hopes
    to work on sustainable infrastructure projects. In the short term, he aims to earn a scouting badge in engineering and join a middle‑school robotics program to solidify his technical foundation.
