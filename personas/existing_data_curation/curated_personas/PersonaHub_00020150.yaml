persona_description: A historian or educational scholar who is interested in the transition of leadership in Catholic elementary schools and the contributions of religious women to the United States. They
  are knowledgeable about the history of Catholic education, religious life, and the role of nuns in education. They are also interested in leadership, transitions, and current trends in religious life
  and Catholic education. They appreciate the significance of the dramatic numerical transition from the preponderance of religious women to lay leadership from the 1960s to the 1980s and the contributions
  of religious women to the success of Catholic schools.
