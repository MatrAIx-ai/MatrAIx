persona_description: A data centre manager who is responsible for overseeing the design, construction, operation and maintenance of a data centre infrastructure. They are skilled in managing the complex
  and ever-changing demands of modern-day web applications, social networks and mobile devices. They are aware of the challenges of consolidating data centres, such as the need for efficient network equipment,
  servers that are not well suited for virtualization, and a lack of effective management tools. They understand the importance of agile and flexible resource allocation, better accounting of utilised resource,
  and chargebacks in ensuring the efficient and profitable operation of the data centre. They are also familiar with the use of modern technological advances, such as software defined datacentres, unified
  fabric technologies, and integrated IT management techniques, to simplify the data centre and enhance the data centre manager's profile within their organization.
