  hobbies: '[''Photography'', ''Model train building'', ''Acoustic guitar'', ''Reading speculative fiction'', ''Hiking'', ''Community theater stage crew'', ''Astronomy club'', ''Jazz listening'', ''Creative
    writing'']'
  career_goals: Zachary aims to leverage his extensive experience to transition into a managerial role within the transportation industry. Over the next five years, he plans to obtain a Certified Transportation
    Manager (CTM) credential and pursue an associate degree in logistics, despite his limited formal schooling. His ultimate ambition is to launch his own niche logistics company that specializes in transporting
    artistic and fragile items, combining his love for art with his logistical expertise. He also hopes to mentor younger drivers in Greeley, establishing a community apprenticeship program.
