personas:
  professional: Ellen Berg, a veteran special‑education teacher in a rural Wisconsin district, translates structured IEP frameworks into adaptable tech‑enhanced lessons, leads data‑driven professional development,
    and they channel their competitive edge into championing district‑wide inclusion initiatives while occasionally misplacing lesson plans in their rush to meet community commitments.
  sports: Ellen Berg, a dedicated member of the River Falls recreational volleyball league and an avid follower of the Green Bay Packers, powers through weekday practices, joins weekend hikes along the
    bluffs, and they zealously track player statistics, yet they occasionally skip cross‑training sessions to lead trivia nights at the local pub.
  arts: Ellen Berg, an enthusiastic participant in the town’s community theater and improv workshops, has starred in productions of Our Town and The Odd Couple, curates weekly trivia nights, and they frequently
    quote contemporary authors like Sally Rooney while incorporating melodic folk tunes from Sufjan Stevens into performances.
  travel: Ellen Berg, a spontaneous road‑tripper who loves exploring the North Shore of Lake Superior, the orchards of Door County, and dreams of Icelandic fjords, plans trips loosely around community festivals,
    keeps an eye on a modest travel fund, and they often book last‑minute cabins to stay flexible for impromptu gatherings.
  culinary: Ellen Berg, a proficient home cook who harvests heirloom tomatoes, sweet corn, and kale from their garden, prepares rustic vegetable stew, smoked bratwurst with apple compote, and they host
    lively dinner parties where cheese curds and fresh berry cobbler are staples, though they sometimes over‑salt dishes while juggling trivia night preparations.
  core: Ellen Berg, a 54‑year‑old Midwestern educator who blends data‑driven precision with a love for spontaneous community fun, balances a competitive drive with loyal group spirit, and they habitually
    over‑commit to trivia nights while forgetting to water the garden on time.
background:
  cultural: Raised in the Upper Midwest, Ellen’s family roots trace back to German and Scandinavian settlers common to Wisconsin’s rural communities. The region’s emphasis on self-reliance, practicality,
    and close-knit community life shaped her values. She participates in her Lutheran congregation’s outreach programs, volunteers at local schools, and celebrates regional traditions such as county fairs
    and prairie festivals.
attributes:
  skills: '[''Developing and implementing Individualized Education Programs (IEPs)'', ''Conducting functional behavior assessments and designing interventions'', ''Differentiated instruction and curriculum
    adaptation'', ''Integrating assistive technology (e.g., AAC devices, speech-to-text software)'', ''Data collection, analysis, and progress monitoring'', ''Collaborative team teaching and co-planning
    with general educators'', ''Family liaison and effective parent communication'', ''Crisis de-escalation and classroom safety management'', ''Compliance with IDEA, Section 504, and state special education
    regulations'', ''Professional development facilitation for staff'', ''Mentoring and coaching new special education teachers'', ''Flexible scheduling and individualized classroom organization'']'
  hobbies: '[''Community theater acting and stage production'', ''Improvisational comedy workshops'', ''Recreational volleyball league'', ''Trivia nights at local pubs'', ''Gardening in the backyard vegetable
    plot'', ''Hiking the bluffs and nature trails around River Falls'', ''Hosting dinner parties for friends and family'', ''Participating in a local book club focused on contemporary fiction'']'
  career_goals: Ellen aims to transition into a district-wide Special Education Coordinator role, where she can shape inclusive policies, design technology-enhanced curricula, and launch a mentorship program
    for novice special-education teachers. She also plans to pursue an Ed.D. focused on evidence-based inclusion strategies and to serve on state advisory panels that set special-education standards.
