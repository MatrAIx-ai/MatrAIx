personas:
  professional: Ethan Mull, a veteran citrus orchard caretaker and community organizer, blends decades of horticultural expertise with a pragmatic curiosity, leading senior-center workshops, orchestrating
    volunteer events, and troubleshooting orchard challenges with a calm, competitive edge.
  sports: Ethan Mull spends early mornings walking the citrus rows, afternoons casting a line at Lake Tarpon for largemouth bass, evenings cheering the Tampa Bay Buccaneers on Sundays, and they are an active
    member of the local senior pickleball league, favoring low-impact exercise that respects their arthritis.
  arts: Ethan Mull regularly listens to classic radio dramas like The Shadow, collects vintage wooden radios, enjoys the folk storytelling of Johnny Cash and the western films of John Wayne, and they volunteer
    as a narrator for the Citrus County Historical Society’s summer evenings, blending nostalgia with community performance.
  travel: Ethan Mull prefers leisurely road trips to nearby historic towns such as St. Augustine and Savannah, has visited the Everglades on a guided airboat tour, dreams of a cruise to the Bahamas, and
    they occasionally join senior group tours to New Orleans for its jazz heritage, balancing travel excitement with a modest budget and limited mobility.
  culinary: Ethan Mull delights in preparing fresh orange marmalade, grilling grouper with lime-butter glaze, and baking key lime pie using home-grown citrus, boasts a competent kitchen skill level, and
    they relish the occasional shot of homemade sweet tea with a splash of bourbon.
  core: Ethan Mull is a calm, competitively spirited octogenarian who stitches community, citrus, and stories together while keeping a watchful eye on health, finances, and a love for classic Americana.
background:
  cultural: Ethan was born in the early 1930s to a modest white, middle‑class family in the American South. Growing up during the Great Depression and World War II instilled a strong work ethic, self‑reliance,
    and a deep respect for community cohesion. After graduating from a public high school, he served a stint in the military during the post‑war period before building a career in the citrus industry of
    central Florida. His cultural identity blends Southern hospitality, Midwestern pragmatism, and the relaxed retiree lifestyle of modern Citrus County, where church, volunteerism, and neighborly ties
    remain central to everyday life.
