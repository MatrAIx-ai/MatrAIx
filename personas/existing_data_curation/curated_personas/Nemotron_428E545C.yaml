personas:
  professional: Ladonna Nelson is a budding storytime assistant at the local library, where they methodically arrange picture books, enthusiastically point out illustrations to curious peers, and proudly
    mimic the librarian's voice while eagerly participating in community storytimes.
  sports: Ladonna Nelson is an enthusiastic member of a local toddler gymnastics class, loves swinging on the park’s wooden swings, proudly wears a Cleveland Browns cap during warm‑up drills, and eagerly
    cheers on the family’s Sunday football viewing with a tiny foam finger.
  arts: Ladonna Nelson is a tiny art enthusiast who spends rainy afternoons finger‑painting scenes from the local museum’s carousel exhibit, is fascinated by the bright colors of Eric Carle’s The Very Hungry
    Caterpillar, and can’t resist humming the theme from Sesame Street while dancing to the songs of Laurie Berkner.
  travel: Ladonna Nelson is a small‑scale explorer who loves family road trips to the Ohio State Fair, where they clutch a stuffed cow mascot, dreams of visiting Disney’s Magic Kingdom someday, and prefers
    traveling with a familiar diaper bag and a portable lullaby CD to keep comfort high.
  culinary: Ladonna Nelson is a picky‑but‑curious eater who adores buttery mac and cheese, reaches for sliced apples with a dimpled smile, avoids peas like the plague, and enjoys helping stir the batter
    for banana muffins alongside their parent.
  core: Ladonna Nelson is a curious, methodical two‑year‑old who balances vibrant imagination with a disciplined penchant for collecting shiny coins and perfectly aligning picture books.
background:
  cultural: Ladonna is raised in a middle‑class White family in the suburban Midwestern town of Delaware, Ohio. Her family participates in community events such as county fairs, church gatherings, and local
    library storytimes. They value education, modest religious traditions (often Protestant), and encourage exposure to the arts through visits to regional museums, concerts, and family art projects. This
    environment nurtures her curiosity, appreciation of art, and organized play habits.
