personas:
  professional: Luis Hernandez, a diligent middle school student with a budding passion for engineering and robotics, channels their methodical planning and love for building in Minecraft into leading the
    school's LEGO robotics club, where they meticulously organize parts, schedule practice sessions, and ensure every teammate feels supported.
  sports: Luis Hernandez, an energetic forward on the school’s varsity soccer team who also enjoys playing pickup matches at the community field, follows the strategies of LA Galaxy and the local Central
    Valley Fuego FC, and approaches fitness with a disciplined schedule of weekend runs and weekly strength drills at the YMCA.
  arts: Luis Hernandez, a keen fan of Latin rhythms, dances to reggaeton hits by Bad Bunny and cumbia classics by Los Ángeles Azules while immersing themselves in graphic novels like 'Ms. Marvel' and 'Nimona,'
    and often sketches comic panels inspired by the beats they hear.
  travel: Luis Hernandez, who loves family road trips to the agricultural fields of the Central Valley and occasional visits to relatives in Central America during the holidays, prefers meticulously planned
    itineraries that balance cultural festivals with outdoor adventures, and dreams of exploring the historic streets of Granada and the national parks of Utah.
  culinary: Luis Hernandez, a budding home cook who assists in preparing pupusas stuffed with loroco and chicharrón and tamales de elote, enjoys experimenting with homemade salsa roja using fresh tomatillos,
    and also loves pizza night with pepperoni and pineapple, demonstrating a moderate skill level and a clear preference for bold, savory flavors.
  core: Luis Hernandez blends a love for structured teamwork, community service, and vibrant Latin beats into a reliable yet lively teenage life, all while juggling school projects, soccer practice, and
    a secret obsession with collecting rare LEGO minifigures.
background:
  cultural: Luis was born and raised in Parlier, California, within a close‑knit Salvadoran immigrant family. Spanish is spoken at home, and he maintains strong ties with extended relatives in El Salvador,
    visiting during holidays and sharing family stories. Family traditions such as celebrating Día de los Reyes, preparing pupusas, and attending community festivals at the local Salvadoran cultural center
    are central to his identity. He actively participates in a Catholic parish, where cultural events and mutual‑aid gatherings reinforce values of solidarity and compassion. Growing up in the Central Valley's
    agricultural environment, he has developed an appreciation for farm work, sustainability, and the challenges faced by farmworker families. Luis proudly bridges his Salvadoran heritage with his American
    surroundings, often serving as a cultural ambassador among his peers.
attributes:
  skills: '[''Bilingual Spanish–English communication'', ''Organizational planning and time management'', ''Team coordination and group project leadership'', ''Basic computer literacy (Google Workspace,
    Scratch)'', ''Peer mediation and conflict resolution'', ''Community gardening and agricultural assistance'']'
  hobbies: '[''Soccer'', ''Listening to Latin music and dancing'', ''Minecraft building'', ''Reading graphic novels and comics'', ''Cooking traditional Salvadoran dishes (pupusas, tamales)'', ''Participating
    in church youth service projects'', ''LEGO robotics and simple programming'']'
  career_goals: Luis aims to pursue a career in civil engineering with a focus on sustainable infrastructure for agricultural communities in California's Central Valley. He plans to attend a California
    state university, studying engineering and urban planning to design efficient irrigation systems and affordable housing for farmworker families. In parallel, he hopes to earn a certification as a bilingual
    community health worker so he can directly support the health and well‑being of his neighborhood. Short‑term, he intends to join his high school’s robotics club, volunteer as a peer mentor, and lead
    local service projects that blend his technical interests with his desire to help others. Ultimately, he wants to become a trusted community leader who creates tangible, organized solutions that improve
    lives.
