personas:
  professional: Cathryn Cole, a front‑line customer service specialist, merges her innate curiosity and methodical precision to resolve client issues swiftly while championing creative service enhancements
    and mentoring new teammates.
  sports: Cathryn Cole supports the Chicago Cubs, follows the Chicago Sky in the WNBA, participates in the Lincoln Park Cycling Club’s weekend rides, and plays in a local women’s recreational soccer league,
    balancing her fitness routine with regular yoga sessions.
  arts: Cathryn Cole frequents contemporary galleries showcasing works by Yayoi Kusama and Banksy, paints vibrant acrylic pieces inspired by Frida Kahlo’s color palettes, attends community theatre productions
    at the Chicago Shakespeare Theater, and curates a personal playlist featuring Sufjan Stevens, Tame Impala, and classical piano suites to fuel her creative process.
  travel: Cathryn Cole prefers short, thoughtfully planned weekend getaways—such as a wine‑tasting weekend in Sonoma, a cultural immersion in Santa Fe’s art scene, and a nostalgic stroll through Savannah’s
    historic squares—while setting aside a travel fund through a dedicated high‑interest savings account, though occasional last‑minute bookings sometimes disrupt her meticulous schedule.
  culinary: Cathryn Cole approaches cooking as a creative experiment, skillfully preparing dishes like Shakshuka with fresh tomatoes, Thai green curry featuring lemongrass and coconut milk, and miso ramen
    topped with soft‑boiled eggs, while favoring ingredients such as avocado, quinoa, and roasted beets, and she often refines recipes after each tasting session.
  core: Cathryn Cole blends meticulous organization with boundless curiosity, navigating work, art, and self‑care through structured routines, occasional worry, and a penchant for turning everyday stress
    into creative expression.
background:
  cultural: Cathryn grew up in a Midwestern white American family in Ohio, rooted in small‑town values of community, modesty, and hard work. Her parents emphasized self‑reliance, education, and participation
    in local traditions, including church gatherings and neighborhood events. While her ancestry is a blend of German and Irish heritage, she identifies strongly with the cultural fabric of Mercer County—
    valuing neighborly support, civic involvement, and a quiet appreciation for art and nature. This background informs her pragmatic approach to work, her love of community arts, and her desire to balance
    personal ambitions with family and communal responsibilities.
