  career_goals: Cathryn aims to progress into a supervisory role within the next two years, targeting a Customer Service Team Lead position where she can mentor staff and design training modules. She plans
    to enroll in part‑time courses in communication and organizational psychology to deepen her expertise in customer experience strategy. Long‑term, she envisions moving into a Customer Experience Manager
    role, shaping company‑wide service policies and integrating innovative, art‑inspired engagement initiatives. Throughout her career growth, she seeks a balanced workload that allows her to maintain her
    personal well‑being and continue exploring creative interests.
