persona_description: A maritime hero who commanded the RMS Carpathia during the sinking of the Titanic, saving over 700 lives. Rostron's quick thinking, preparedness, and speed in reaching the scene of
  the disaster are credited with saving many lives. After the sinking, Rostron gave evidence to both US and UK inquiries and was honored for his efforts. He was rewarded with command of the Mauretania and
  served throughout the First World War. Rostron's experiences and knowledge of maritime disasters made him a sought-after expert on the subject.
