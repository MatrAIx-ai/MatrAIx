personas:
  professional: Stephanie Larios, a seasoned field technician specializing in ATMs, office copiers, and self‑service kiosks, combines their deep circuitry and networking expertise with a relaxed, solution‑focused
    demeanor to devise quick‑fix workarounds, while their competitive streak drives them toward senior service engineer certification, IoT kiosk expertise, and eventually a boutique repair consultancy.
  sports: Stephanie Larios, a casual competitor in Miami’s board‑game tournaments and a regular participant in weekend pickup basketball games at the Fort Lauderdale community center, supports the Miami
    Heat and follows the Florida Atlantic Owls, while they occasionally join beach volleyball matches that satisfy their need for high‑energy, short‑burst exercise and provide a social outlet beyond their
    technical work.
  arts: Stephanie Larios immerses themselves in the vibrant street‑art corridors of Wynwood and contemporary galleries of Brickell, drawing inspiration from artists like Banksy, Kehinde Wiley, and Ai Weiwei
    for their own oil paintings and urban photography, while evenings often find them sketching neon‑lit Miami skylines and listening to Tame Impala to fuel their creative process.
  travel: Stephanie Larios prefers experiential travel that sparks both artistic and technical curiosity, such as a spontaneous road‑trip along the Florida Keys to capture sunrise over the water, a two‑week
    workshop in Berlin’s street‑art districts, and a culinary pilgrimage to Buenos Aires to study South‑American flavors; they plan most itineraries on the fly yet ensure a modest budget by staying in boutique
    hostels and using local transit.
  culinary: Stephanie Larios blends traditional Paraguayan dishes like chipa guasu, sopa paraguaya, and mbeju with global flavors, regularly experimenting with Japanese ramen broth, Ethiopian injera, and
    Mediterranean mezze, while they showcase moderate kitchen skills and a penchant for improvising LED lighting to highlight plating, often featuring cornmeal, cheese, and fresh citrus in their creations.
  core: Stephanie Larios is a curious, art‑driven ATM technician who balances a competitive, slightly disorganized streak with a love for DIY electronics, street‑photography, and eclectic cooking while
    they plot a future boutique repair consultancy.
background:
  cultural: Stephanie’s Paraguayan heritage is a cornerstone of her identity. Raised in a bilingual household, she speaks fluent Spanish and understands basic Guaraní, which informs her appreciation for
    the rhythmic patterns of Paraguayan folk music and the communal spirit of traditional celebrations like Día de la Independencia. Family gatherings often revolve around sharing dishes such as sopa paraguaya,
    chipa, and mbeju, and these culinary customs have sparked her interest in cooking and food culture. While living in Fort Lauderdale, she stays connected to the Paraguayan diaspora through local cultural
    festivals, language meet‑ups, and occasional trips to visit relatives back home, blending her South American roots with the diverse, coastal lifestyle of South Florida.
attributes:
  skills: '[''ATM hardware troubleshooting'', ''Electronic circuit analysis'', ''Mechanical repair of office machines'', ''Basic network configuration'', ''POS system maintenance'', ''Customer service and
    conflict resolution'', ''Technical documentation'', ''Scripting for device automation'', ''Safety and compliance procedures'', ''Inventory and parts management'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Oil painting and sketching'', ''Street photography'', ''DIY electronics projects'', ''Cooking Paraguayan and international dishes'', ''Exploring new
    restaurants'', ''Board‑game tournaments'', ''Mentoring youth in technology'', ''Yoga and meditation'']'
  career_goals: Stephanie aims to transition from field technician to senior service engineer, eventually leading a small team of specialists while maintaining the flexibility she values. She plans to earn
    advanced certifications such as CompTIA Network+ and manufacturer‑specific ATM service credentials, and she hopes to leverage her curiosity for emerging technologies by branching into IoT‑enabled kiosks
    and robotics maintenance. Long‑term, she envisions launching her own boutique repair consultancy that blends technical expertise with a creative problem‑solving ethos, allowing her to set her own schedule
    and explore unconventional service models.
