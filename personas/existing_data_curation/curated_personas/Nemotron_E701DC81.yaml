personas:
  professional: Nicole Orgnon merges her full‑stack development mastery in React, Node.js, and Python with an eye for UI/UX, leading agile teams, championing code reviews, and driving innovative product
    strategy while they mentor junior developers toward inclusive tech culture, all while they explore generative digital art and AR/VR prototypes that blend technology and visual storytelling.
  sports: Nicole Orgnon fuels her love of the outdoors by joining the Kansas Prairie Hiking Club for weekend treks, cheering on the Kansas City Chiefs and Royals, and playing informal basketball leagues
    at the local community center, always balancing vigorous trail runs with occasional yoga sessions while they prioritize community fitness.
  arts: Nicole Orgnon immerses herself in the arts by strolling through Wichita’s Modern Art Museum to study Monet’s watercolors, experimenting with generative pieces inspired by Refik Anadol’s data‑driven
    installations, attending live shows by Tame Impala and local folk ensemble The Prairie Harmonies, and participating in improv nights with the Second City Kansas City troupe, all while they seek fresh
    creative sparks in every brushstroke and line of code.
  travel: Nicole Orgnon prefers spontaneous weekend road trips that blend hiking in the Ozarks and gallery hops in Austin, while dreaming of a spring immersion in Kyoto’s cherry‑blossom gardens and digital
    art labs, often booking flights with points to keep travel affordable despite a busy software schedule, and they always pack a sketchbook for on‑the‑go inspiration.
  culinary: Nicole Orgnon enjoys cooking farm‑fresh salads topped with heirloom tomatoes, basil, and toasted pepitas, experimenting with Pacific‑rim ramen bowls featuring miso broth and sliced pork belly,
    and occasionally treating friends to Kansas‑style BBQ brisket seasoned with smoked paprika and brown sugar, while they relish discovering new spice blends at farmer’s markets.
  core: Nicole Orgnon is a curiosity‑driven full‑stack developer who seamlessly fuses code with watercolor, thrives on group energy, but they habitually misplace laptop chargers while juggling spontaneous
    art projects.
background:
  cultural: Nicole was raised in a suburban Midwestern community in Shawnee, Kansas, within a predominantly white demographic. Her family traces its roots to French‑Canadian ancestors, reflected in the
    surname Orgnon, and carries values of modesty, self‑reliance, and strong community ties. Growing up she participated in high school robotics clubs and theater productions, experiences that blended her
    technical curiosity with artistic appreciation. The regional culture emphasizes collaboration, practicality, and a relaxed approach to planning, which aligns with Nicole's flexible, sociable personality.
    She celebrates traditional Midwest holidays with family gatherings featuring classic comfort foods while also seeking diverse cultural experiences through travel and the arts.
