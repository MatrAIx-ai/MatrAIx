persona_description: A researcher studying the rare Wyburn-Mason syndrome, which is a developmental abnormality characterized by the presence of abnormal blood vessels in the central nervous system and
  the eyes. The syndrome is thought to result from abnormalities of blood vessel development during embryonic or fetal growth. The researcher aims to understand the underlying mechanisms that cause AVMs
  in Wyburn-Mason syndrome and develop treatment options for the rare disorder.
