personas:
  professional: Carlos Roque, a retired business administrator turned community volunteer, they apply their hands‑on repair expertise, bilingual fluency, and meticulous budgeting skills to coordinate senior‑center
    events and mentor younger relatives with a calm, problem‑solving mindset.
  sports: Carlos Roque, a regular participant in the neighborhood walking club and an avid fan of the local minor‑league baseball team, they enjoy gentle morning strolls along the park trail and join a
    senior softball league for weekend recreation.
  arts: Carlos Roque, an avid listener of boleros by José José, mariachi classics by Antonio Aguilar, and Latin ballads from Luis Miguel, they spend quiet evenings watching Golden Age cinema starring Pedro Infante
    and occasionally attend community theater productions featuring classic playwrights.
  travel: Carlos Roque, who prefers relaxed, small‑group trips, they plan journeys through a travel agency that handles logistics, dream of revisiting their hometown in Jalisco for a traditional holiday
    celebration, and have recently explored the historic streets of Oaxaca and the coastal town of Puerto Vallarta.
  culinary: Carlos Roque, an experienced home cook, they delight in preparing enchiladas verdes with roasted chilies, fresh cilantro, and garden tomatoes, craft homemade salsa verde, and occasionally experiment
    with tamale fillings while proudly documenting each recipe in a handwritten journal.
  core: Carlos Roque, a structured yet easy‑going 75‑year‑old, they blend garden‑to‑table cooking, community mentorship, and low‑risk investing into a steady rhythm of purposeful solitude punctuated by
    warm gatherings.
background:
  cultural: Carlos was born to Mexican immigrant parents who settled in Los Angeles in the 1950s. Raised bilingual, he was immersed in both American and Mexican customs, celebrating Día de los Muertos,
    Las Posadas, and Mexican Independence Day with vibrant family rituals. His Catholic upbringing instilled a sense of community service and respect for tradition. He maintains strong ties to his roots
    through regular visits to his extended family in Jalisco, preserving regional recipes, and participating in local Mexican cultural events. The values of familismo, respeto, and a collective sense of
    harmony shape his worldview and daily interactions.
