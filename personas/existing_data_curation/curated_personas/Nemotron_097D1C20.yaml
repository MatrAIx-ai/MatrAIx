personas:
  professional: Gabriel Domingue, a 39‑year‑old attorney specializing in technology, intellectual property, and environmental law, blends rigorous legal research with an uncanny ability to demystify complex
    technical concepts; they are a naturally talkative mediator and workshop leader whose compassion and sociability drive their ambition to become a senior partner and launch a nonprofit legal‑aid clinic.
  sports: Gabriel Domingue devotes weekends to hiking the Cascades and kayaking the San Juan Islands, rows with the Bellingham Rowing Club, follows the Seattle Seahawks and Seattle Sounders, and participates
    in the monthly Whatcom County Trail Run; they use each activity to recharge their sociable, talk‑filled energy.
  arts: Gabriel Domingue frequents contemporary art exhibitions at the Whatcom Museum, plays acoustic guitar in the Bellingham Jam Circle, improvises with the local improv troupe, and draws creative inspiration
    from musicians like St. Vincent and visual artists such as Yayoi Kusama; they often capture performances and installations with their DSLR.
  travel: Gabriel Domingue plans trips that blend adventure and cultural immersion, having trekked Iceland’s volcanic terrain, explored Japan’s art island of Naoshima, and road‑tripped along the Pacific
    Coast, while they budget for sustainable travel and maintain a photo‑journal of each destination.
  culinary: Gabriel Domingue, an enthusiastic home‑cook, fuses global flavors like Korean gochujang, Moroccan harissa, and Peruvian aji amarillo into dishes such as bibimbap with roasted chickpeas and tagine‑style
    lamb with quinoa, yet they admit a habit of over‑spicing when experimenting with new recipes.
  core: Gabriel Domingue melds a talkative, compassionate legal mind with a restless curiosity for art, nature, and eclectic cuisine, often juggling multiple projects and occasionally forgetting to turn
    off the coffee maker after late‑night jam sessions.
background:
  cultural: Raised in a multicultural household with French‑Canadian roots (Domingue) and a Korean/Chinese middle name (Lee), Gabriel grew up in the Pacific Northwest, absorbing its progressive, environmentally
    conscious ethos. While identifying as a white American, he values the region’s diverse artistic scene and the indigenous heritage of Whatcom County. This blend of cultural influences informs his appreciation
    for varied experiences, his commitment to community harmony, and his openness to unconventional ideas.
attributes:
  skills: '["Intellectual property law", "Environmental and sustainability law", "Technology and data privacy law", "Legal research and writing", "Mediation and conflict resolution", "Public speaking and
