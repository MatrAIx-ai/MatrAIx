  hobbies: '["Hiking in the Cascades and San Juan Islands", "Contemporary art appreciation", "Live music attendance and acoustic guitar playing", "Photography (urban and nature)", "Community mediation volunteering",
    "Improv theater participation", "Reading science-fiction and technology policy", "Experimental cooking with global influences"]'
  career_goals: Gabriel aims to become a senior partner at his firm, shaping its strategic focus on emerging technology and climate‑related legal issues. He envisions establishing a nonprofit legal‑aid
    clinic to provide pro bono services to underserved communities in Whatcom County and the broader Pacific Northwest. He also aspires to serve as an adjunct professor at Western Washington University,
    teaching courses on law and technology, and to author a book exploring the intersection of legal frameworks, artistic expression, and environmental stewardship. Participation in professional associations
    and influencing public policy on tech regulation and sustainability are also key milestones in his long‑term career plan.
