    of new software tools'', ''Data privacy awareness (GDPR, HIPAA basics)'']'
  hobbies: '[''Karaoke singing at local venues'', ''Improv comedy workshops'', ''Volunteering at Somerville Food Bank'', ''Organizing neighborhood clean‑up events'', ''Bike riding on the Charles River Path'',
    ''Community gardening'', ''Playing board games and trivia nights'', ''Listening to classic rock music'', ''Reading mystery and crime novels'', ''Visiting museums and cultural festivals in Boston'']'
  career_goals: Nicholas aims to leverage his extensive data‑entry experience into a supervisory or data‑quality specialist role within the next three years, seeking a position where he can mentor a small
    team and design efficient data‑management processes. He plans to earn a Microsoft Office Specialist certification and complete an online data‑analytics course to broaden his analytical skill set. Long‑term,
    he hopes to transition into a nonprofit or community‑outreach organization where he can combine his technical abilities with his compassionate nature, using data to support social‑service programs and
    improve resource allocation. He also envisions occasionally offering freelance transcription and data‑cleaning services to local small businesses, giving him flexibility while staying connected to his
    community.
