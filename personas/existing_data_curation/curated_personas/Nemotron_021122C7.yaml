personas:
  professional: Roberto Aranda is a senior business analytics leader with a Lean Six Sigma Green Belt who translates complex data into strategic recommendations for executive teams, leveraging expertise
    in SQL, Python, Tableau and risk assessment, while their preference for well‑structured roadmaps is periodically derailed by spontaneous curiosity that leads them to abandon detailed plans in favor
    of rapid prototyping.
  sports: Roberto Aranda follows soccer passionately, joining small gatherings to stream matches of the national soccer team from their country of origin, supports the Iowa Hawkeyes football program and
    the Kansas City Chiefs, hikes the Des Moines River trails each weekend, and holds a modest membership at a local gym for occasional strength training.
  arts: Roberto Aranda enjoys traditional folk music, often listening to cumbia and marimba rhythms while cooking, admires artists such as Carlos Santana and Frida Kahlo, reads historical biographies and
    business strategy classics, and visits the Des Moines Art Center for contemporary exhibitions that spark their analytical imagination.
  travel: Roberto Aranda prefers meticulously planned road trips that blend cultural immersion with budget awareness, having explored Oaxaca, Mexico, and Lake Atitlán, Guatemala, while dreaming of wandering
    the colonial streets of Granada, Nicaragua, and savoring the vineyards of Napa Valley, though they sometimes delay bookings due to a last‑minute work surge.
  culinary: Roberto Aranda loves crafting authentic pupusas with loroco, mozzarella, and masa harina, experimenting with tamales de elote and garden‑fresh tomato salsas, following precise recipes yet occasionally
    improvising with unexpected spices, and relishes sourcing ingredients from local markets and their own herb garden.
  core: Roberto Aranda is a data‑focused strategist who balances disciplined analytics with spontaneous tinkering, turning solitary hobbies like chess, woodworking, and home automation into creative outlets
    that keep their life both orderly and unpredictably vibrant.
background:
  cultural: Roberto was born in San Miguel, El Salvador, and migrated to the United States with his family at age 12, eventually settling in Des Moines, Iowa. He grew up speaking Spanish at home, maintaining
    a strong connection to Salvadoran culture through music, food, and community celebrations. He observes traditional holidays such as Las Posadas, Día de los Muertos, and the feast of the Virgin of Guadalupe,
    often joining local diaspora events like the annual Salvadoran Festival at the Des Moines Farmer's Market. While he has embraced Midwestern values—practicality, self‑reliance, and punctuality—he continues
    to identify as a Salvadoran‑American, blending both cultural perspectives in his personal life and professional outlook.
attributes:
  skills: '[''Data analysis (SQL, Python, Excel)'', ''Statistical modeling'', ''Forecasting and predictive analytics'', ''Process optimization (Lean Six Sigma)'', ''Cost‑benefit analysis'', ''Risk assessment'',
    ''Business intelligence (Tableau, PowerBI)'', ''Project management'', ''Strategic planning'', ''Technical writing and reporting'', ''Presentation and stakeholder communication'', ''Change management'']'
  hobbies: '[''Cooking traditional Salvadoran dishes (pupusas, tamales)'', ''Reading historical biographies and business strategy books'', ''Playing chess'', ''Woodworking (building furniture)'', ''Gardening
    (vegetables and herbs)'', ''Hiking local trails along the Des Moines River'', ''Watching soccer matches with a small group of Salvadoran friends'', ''Tinkering with Raspberry Pi home automation projects'']'
  career_goals: Roberto aims to transition to a senior strategic role—such as Director of Business Analytics or Chief Data Officer—where he can shape organization‑wide data‑driven decision making. In the
    next five years, he plans to earn a Six Sigma Black Belt, complete a Certified Analytics Professional (CAP) credential, and build a portfolio of successful transformation projects. He also seeks to
    mentor emerging analysts and be recognized for delivering measurable operational improvements. Ultimately, he envisions launching his own boutique consulting practice focused on operational efficiency
    for mid‑size manufacturers and service firms in the Midwest, leveraging his analytical rigor and competitive drive to deliver high‑impact results.
