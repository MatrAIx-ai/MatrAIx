personas:
  professional: Tomas Torres is a seasoned medical scientist who combines rigorous molecular biology expertise with structured project management, leading translational research teams to tackle diabetes
    and hypertension disparities in underserved populations while mentoring junior researchers with a compassionate, collaborative style.
  sports: Tomas Torres plays midfield for the Oakland County Strikers adult soccer league, joins community basketball tournaments and loyally supports the Detroit Lions, Detroit Pistons, and the local university’s
    varsity rowing crew, while also maintaining a weekend hiking ritual at Michigan’s Sleeping Bear Dunes.
  arts: Tomas Torres enjoys attending mariachi concerts featuring Los Amigos del Sonido, dances to Lila Downs and Vicente Fernández at local festivals, and unwinds by streaming classic Mexican cinema starring
    María Félix and listening to contemporary indie band Café Tacvba.
  travel: Tomas Torres prefers meticulously planned trips that blend adventure and family, having hiked the Grand Canyon, explored Oaxaca’s culinary scene, and visited the historic plazas of San Miguel
    de Allende, while dreaming of a summer road trip along the Pacific Coast to enjoy surf towns and coastal markets.
  culinary: Tomas Torres, an avid home cook, masters tamales, pozole, chiles en nogada, and fresh salsa verde, often layering complex flavors with dried chilies, tomatillos, and masa, while occasionally
    over‑seasoning on impulse, and loves pairing dishes with a cold cerveza or a glass of mezcal.
  core: Tomas Torres blends scientific rigor, structured finances, and a vibrant social life, staying grounded in family traditions, health advocacy, and occasional over‑caffeinated late‑night lab work.
background:
  cultural: Tomas grew up in a Mexican‑American household that emphasized family, respect, and cultural traditions. He is fluent in Spanish and English, which he uses both at home and in professional settings
    to communicate health information to diverse populations. Celebrating events such as Día de los Muertos and Mexican Independence Day, he often shares these traditions with his friends and colleagues
    in Michigan. His cultural heritage informs his compassionate approach to science, driving his commitment to improve health outcomes for Hispanic communities while maintaining strong ties to his family's
    roots.
attributes:
  skills: '["Molecular biology techniques (PCR, qPCR, CRISPR)", "Cell culture and primary cell handling", "Immunoassays (ELISA, flow cytometry)", "Data analysis with R, Python, SPSS", "Statistical modeling
    and bioinformatics", "Regulatory compliance (GLP, FDA, IRB)", "Scientific writing and grant preparation", "Technical presentation and communication", "Project management and SOP development", "Mentorship
    and team leadership", "Bilingual scientific communication (English/Spanish)"]'
  hobbies: '["Soccer in a community league", "Basketball tournaments", "Cooking traditional Mexican cuisine", "Hiking state parks", "Cycling around Oakland County", "Fishing on local lakes", "Volunteering
    at health fairs and STEM outreach events", "Attending mariachi concerts and dancing at cultural festivals"]'
  career_goals: Tomas aims to become a principal investigator leading a multidisciplinary team focused on translational research that addresses health disparities in Hispanic communities, particularly chronic
    diseases such as type 2 diabetes and hypertension. He intends to secure a major NIH or private foundation grant to establish a dedicated research program that bridges laboratory discoveries with community‑based
    interventions. Over the next five years, he aspires to publish high‑impact papers, mentor the next generation of scientists, and take on a leadership role within his institution’s research division,
    while maintaining a balanced life that supports his family and cultural commitments.
