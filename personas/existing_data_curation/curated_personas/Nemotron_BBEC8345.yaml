  career_goals: Virginia aims to deepen her technical credentials by earning advanced welding and CNC certification within the next two years. She hopes to step into a supervisory role, such as shift lead
    or production foreperson, where she can combine her methodical planning with her natural ability to rally colleagues. Over the longer term, she envisions launching a small custom metalwork shop that
    creates handcrafted furniture and decorative pieces for her Portsmouth community, using the relationships she has built through her sociable personality. Additionally, she wants to chair the plant’s
    safety committee to embed a culture of proactive safety and continuous improvement.
