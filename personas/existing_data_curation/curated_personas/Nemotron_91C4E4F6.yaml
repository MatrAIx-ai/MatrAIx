personas:
  professional: Tony Harris, a surveillance officer at a bustling Gulf‑side casino, blends razor‑sharp observational skills with hands‑on security expertise—mastering CCTV analytics, rapid incident documentation,
    and conflict de‑escalation—while their competitive streak drives them to pursue CPP and CSO certifications and eventually lead a senior security management team.
  sports: Tony Harris channels their competitive drive into weightlifting, early‑morning stand‑up paddleboarding along the dunes, and five‑on‑five beach volleyball with the Destin Shoreline Club, while
    cheering on the Tampa Bay Buccaneers (NFL) and Miami Heat (NBA) on game nights.
  arts: Tony Harris unwinds by devouring crime thrillers from Gillian Flynn and Lee Child, binge‑watching Christopher Nolan’s films, and blasting the surf‑rock vibes of The Beach Boys alongside the southern
    blues of B.B. King, which inspire their own drone footage editing style.
  travel: Tony Harris prefers low‑key, solo coastal escapades, having mapped the Gulf’s hidden fishing spots in Key West, kayaked through the mangroves of the Everglades, and dreamed of a drone‑captured
    sunrise over Iceland’s black‑sand beaches, while budgeting to keep occasional weekend trips to New Orleans for jazz and gumbo within reach.
  culinary: Tony Harris, a competent home chef, often spices Gulf shrimp with cayenne, garlic, and smoked paprika to create blackened shrimp tacos, perfects a silky shrimp‑and‑grits with tasso ham, and
    experiments with bourbon‑glazed oysters, while their grill‑master skill level hovers between confident and occasional over‑char.
  core: Tony Harris, a solitary‑minded security analyst who can’t resist a late‑night replay of CCTV footage, balances meticulous risk assessment with a habit of over‑packing their tackle box and a stubborn
    reluctance to delegate.
background:
  cultural: Tony identifies as African-American and grew up within the Gulf Coast Black community of the Florida Panhandle, where church gatherings, family reunions, and local festivals shaped his upbringing.
    He draws on the cultural richness of Southern cuisine, music ranging from soul to hip-hop, and a strong sense of resilience rooted in the region's civil-rights history. Living in Destin, he balances
    the coastal, tourism-driven environment with ties to the nearby military community, valuing community solidarity and the blend of traditions that influence his worldview.
