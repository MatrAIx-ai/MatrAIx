  hobbies: '[''Fishing'', ''Target shooting'', ''Stand-up paddleboarding'', ''Reading crime and thriller novels'', ''Playing chess'', ''First-person shooter video games'', ''Weightlifting'', ''Beach volleyball
    (small groups)'', ''Drone piloting and aerial photography'', ''Cooking Southern-inspired seafood dishes'']'
  career_goals: Tony aims to advance from his current surveillance officer position to a senior security management role within the casino industry, eventually overseeing a team and shaping security policies.
    He plans to complete his associate degree in criminal justice, earn certifications such as the Certified Protection Professional (CPP) and Certified Surveillance Officer (CSO), and develop expertise
    in advanced video-analytics and cyber-security integration. Long-term, he envisions founding his own consulting firm that advises casinos and high-traffic venues on risk mitigation and fraud prevention,
    while also achieving personal milestones like homeownership in Destin.
