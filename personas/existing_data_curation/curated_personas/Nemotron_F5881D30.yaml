  career_goals: Hai aims to transition into a senior leadership role, such as Audit Manager or Director of Finance, with the long‑term ambition of becoming a CFO in a technology‑driven company. He plans
    to obtain his CPA and CIA certifications within the next two years to solidify his credentials. Passionate about integrating emerging technologies into finance, he seeks to lead initiatives that incorporate
    AI and blockchain for audit automation. Additionally, Hai is committed to mentoring the next generation of accountants, especially those from diverse backgrounds, and hopes to contribute to industry
    best‑practice publications and speaking engagements.
