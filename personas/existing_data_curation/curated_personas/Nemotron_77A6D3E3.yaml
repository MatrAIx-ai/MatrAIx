  career_goals: Sabrena aims to advance to a regional sales manager role where she can shape broader sales strategies while still fostering team cohesion. She plans to complete a bachelor’s degree in Business
    Administration and earn the Certified Professional Sales Leader (CPSL) credential to strengthen her strategic skill set. Additionally, she hopes to launch a mentorship program for women in sales within
    her company and become an active board member of the Jamestown Chamber of Commerce, helping local businesses thrive. Balancing professional growth with personal well‑being, she seeks more structured
    time‑management tools to reduce stress and meet deadlines more comfortably.
