personas:
  professional: Sabrena Heflin, a seasoned sales supervisor with over twenty years of frontline experience, leverages her interpersonal coaching, conflict‑resolution savvy, and hands‑on expertise in Salesforce
    and Microsoft Dynamics to energize teams, deliver on‑the‑fly training, and translate emerging sales strategies into pragmatic tactics while balancing a spontaneous, people‑first approach with a relentless
    drive toward meeting targets.
  sports: Sabrena Heflin hikes the prairie trails in summer, thrills on a snowmobile through winter’s frost, cheers for the Jamestown Jaguars minor‑league baseball team and the North Dakota State Bison
    football squad, and enjoys bridge nights at the senior center as part of her community‑focused recreation.
  arts: Sabrena Heflin’s artistic side shines on the community theatre stage where she thrives in improv performances, spends evenings buried in Agatha Christie mysteries, attends cooking classes that explore
    Julia Child’s culinary legacy, and curates a playlist featuring folk legends like Bob Dylan and contemporary singer‑songwriter Brandi Carlile.
  travel: Sabrena Heflin prefers spontaneous road trips that blend adventure with relaxation, having recently explored the fall colors of Asheville, North Carolina, trekked a guided hike in the Swiss Alps,
    and often escapes to nearby prairie lakes for weekend getaways, all while balancing travel costs with her modest budget.
  culinary: Sabrena Heflin enjoys farm‑to‑table cooking, often turning her garden’s heirloom tomatoes, zucchini, and sweet potatoes into a rustic ratatouille or a roasted beet and goat‑cheese salad, while
    her favorite comfort dish is a slow‑cooked chicken pot pie with a flaky crust, and she frequently experiments with spice blends like smoked paprika and fresh rosemary.
  core: Sabrena Heflin is a spontaneous, people‑centric sales leader who balances endless curiosity with practical results, yet wrestles with organization and occasional stress‑driven worry.
background:
  cultural: 'Sabrena grew up in the Upper Midwest, steeped in the values of small‑town North Dakota: hard work, self‑reliance, and a deep sense of community. Her family’s German‑Russian heritage is reflected
    in traditional holiday foods and a respect for agricultural roots. A lifelong member of a local Methodist congregation, she finds fellowship in church events and town celebrations. The rhythms of the
    plains—long, cold winters and wide‑open summers—have fostered her resilience and love for outdoor recreation. These cultural influences shape her collaborative, considerate nature and her commitment
    to supporting neighbors and local businesses.'
