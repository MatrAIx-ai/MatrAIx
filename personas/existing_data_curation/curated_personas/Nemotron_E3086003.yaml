personas:
  professional: Alexis Mckeithan, a property and community association manager in Dallas, leverages meticulous budgeting, vendor coordination, and compliance expertise—while flexibly handling emergency
    maintenance—to foster resident engagement and streamline operations with AppFolio and Buildium, reflecting a practical yet adaptable professional demeanor that they bring to every property.
  sports: Alexis Mckeithan, a regular jogger along the Trinity River Trail and a participant in a city‑run yoga class, follows the Dallas Cowboys and Dallas Mavericks, occasionally joining a local running
    club for weekend 5K races and using a wearable fitness tracker to log miles and heart‑rate, showing a structured yet flexible approach to staying active that they enjoy.
  arts: Alexis Mckeithan, an avid photographer of Dallas’s historic neighborhoods, draws creative inspiration from the works of Ansel Adams and the poetic storytelling of author Ta‑Nehisi Coates, enjoys
    attending the Dallas Museum of Art’s African‑American History exhibition, and relaxes by reading historical fiction by Philippa Gregory, weaving visual and literary arts into her personal narrative
    in a way that they find grounding.
  travel: Alexis Mckeithan, who prefers thoughtfully planned trips with a balance of cultural immersion and relaxation, enjoys revisiting New Orleans for its music and cuisine, dreams of exploring the historic
    streets of Savannah, and has mapped out a future solo adventure to Barcelona’s architectural marvels, all while budgeting travel costs within her disciplined financial plan that they meticulously maintain.
  culinary: Alexis Mckeithan, a confident home cook, transforms classic Southern comfort dishes like collard greens, smoked turkey, and sweet potato casserole into healthier versions by incorporating fresh
    herbs from her urban garden, using quinoa, kale, and olive oil, and frequently experiments with spice blends such as smoked paprika and cumin to elevate flavor while maintaining nutritional balance,
    a practice they treat as both a creative outlet and a health strategy.
  core: Alexis Mckeithan blends disciplined organization with a love for urban gardening, community mentorship, and quiet creativity, navigating career ambitions and personal passions with steady pragmatism
    and occasional indulgent splurges on garden tools that they justify as self‑care.
background:
  cultural: Alexis is a Black woman raised in Dallas, Texas, whose family has deep roots in the city's historically Black neighborhoods. Growing up, she was immersed in a culture that values community solidarity,
    church fellowship, and the rich culinary traditions of Southern cooking. These influences shaped her appreciation for neighborhood cohesion and her commitment to fostering inclusive, well‑maintained
    living environments. Her cultural identity informs her professional dedication to equitable housing practices and her personal passion for mentoring other Black professionals in the real‑estate sector.
attributes:
  skills: '[''Property Management'', ''Lease Administration'', ''Financial Reporting'', ''Budget Development'', ''Vendor Coordination'', ''Regulatory Compliance (Fair Housing, Texas Property Code)'', ''Community
    Engagement'', ''Conflict Resolution'', ''Facility Maintenance Oversight'', ''Property Management Software (AppFolio, Buildium)'', ''Negotiation'', ''Team Leadership'', ''Emergency Response Planning'']'
  hobbies: '[''Urban Gardening'', ''Cooking (Soul Food with Healthy Twists)'', ''Reading Historical Fiction and Biographies'', ''Yoga'', ''Running (Trinity River Trail)'', ''Volunteer Teaching (Budgeting)'',
    ''Photography (Dallas Architecture)'']'
  career_goals: Alexis aims to become a senior community association manager overseeing a portfolio of over 300 residential units in the Dallas metro area within the next three years. She plans to obtain
    the Certified Manager of Community Associations (CMCA) credential and eventually transition into property development, launching a boutique real‑estate venture that prioritizes affordable housing for
    underserved neighborhoods. Additionally, she hopes to mentor emerging Black women in the real‑estate industry through a local networking group and to be recognized as a thought leader in sustainable
    community‑management practices.
