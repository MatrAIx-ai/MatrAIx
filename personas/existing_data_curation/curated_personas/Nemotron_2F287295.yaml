personas:
  professional: Jodie Ravi, an aspiring nail artist and future salon owner, blends precise manicure techniques, a sharp eye for color theory, and savvy social‑media marketing into avant‑garde nail designs
    while they balance meticulous organization with spontaneous artistic flexibility.
  sports: Jodie Ravi, an avid hiker and yoga practitioner, tackles weekend treks through the Wasatch foothills with the Wasatch Ridge Hiking Club, follows the Utah Jazz during the NBA season, and occasionally
    attends Real Salt Lake matches, maintaining a fitness routine that mixes cardio climbs with restorative yoga flow, and they often log each hike in a personal journal to track progress.
  arts: Jodie Ravi, a sketch‑and‑paint hobbyist, draws inspiration from surrealist master Salvador Dalí and contemporary abstract visionary Yayoi Kusama, visits local galleries like the Utah Museum of Fine
    Arts and downtown Salt Lake City pop‑up shows, and fuels creative sessions with the ambient sounds of Bon Iver and cinematic scores by Hildur Guðnadóttir, while they experiment with translating gallery
    motifs into nail‑art masterpieces.
  travel: Jodie Ravi, who favors spontaneous weekend road trips to nearby national parks such as Zion and Arches, dreams of a solo backpacking adventure through the art‑rich streets of Paris and the cherry‑blossom
    avenues of Kyoto, yet balances travel ambitions with a modest student budget and school commitments, and they often use travel blogs to plan low‑cost itineraries.
  culinary: Jodie Ravi, a health‑conscious food lover, whips up quinoa‑avocado salads with fresh lime and feta, indulges in sushi rolls topped with salmon and wasabi, and treats themselves to vintage‑style
    milkshakes flavored with matcha or salted caramel after a long day at the studio, while they experiment with incorporating edible flower garnishes to echo their nail‑design palette.
  core: Jodie Ravi merges meticulous nail‑art craftsmanship with an adventurous spirit, balancing a budding boutique dream with weekend mountain hikes, hoarding limited‑edition polish like a treasure hunter,
    and never skipping sunrise yoga despite a competitive drive that fuels both their art and their ambition, and they occasionally stay up late scrolling Instagram for inspiration.
background:
  cultural: Jodie was raised in Kaysville, Utah, a small city with strong community ties and a predominantly white, Western‑American cultural environment. Her upbringing reflects the values of the local
    Utah culture—emphasis on family, volunteerism, and a blend of conservative and progressive attitudes. While rooted in this setting, she also draws on broader American pop culture, especially contemporary
    art and digital media, which influence her aesthetic sensibilities and professional aspirations.
attributes:
  skills: '["precision manicure", "pedicure techniques", "gel polish application", "freehand nail art", "color theory", "client consultation", "sanitation and hygiene protocols", "appointment scheduling",
    "basic salon bookkeeping", "social media marketing for nail services"]'
  hobbies: '["sketching and painting", "hiking in the Wasatch foothills", "landscape photography", "visiting art galleries", "yoga", "vintage clothing and DIY crafts", "reading contemporary fiction", "journaling"]'
  career_goals: Jodie aims to obtain a certified cosmetology license within the next two years, enroll in advanced nail art workshops, and eventually open her own boutique nail studio in Kaysville that
    blends high‑end services with a creative, art‑focused atmosphere. She aspires to build a personal brand on platforms like Instagram and TikTok, become recognized for innovative designs, and possibly
    create a line of custom nail polish colors. Long‑term, she envisions mentoring younger nail technicians and expanding her business to include a small training academy.
