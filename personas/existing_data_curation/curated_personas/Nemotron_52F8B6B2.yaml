personas:
  professional: Altagracia Osorio, a seasoned outpatient clinic manager with three decades of experience coordinating staff schedules, budgets, and compliance, blends her methodical routine, calm resilience,
    and bilingual communication to lead quality‑improvement projects and mentor emerging health managers as she transitions toward retirement.
  sports: Altagracia Osorio, an avid walker who trails the paths around Lake Perris each morning, supports the Los Angeles Lakers in basketball, the Los Angeles Dodgers in baseball, and participates in
    a senior walking club that meets for gentle hikes in the local hills.
  arts: Altagracia Osorio, a devoted choir member who enjoys listening to merengue and bachata legends such as Juan Luis Guerra and Aventura, attends monthly community theatre performances featuring classic
    plays, and collects historical novels about Caribbean history that inspire her appreciation for storytelling.
  travel: Altagracia Osorio, who prefers well‑planned road trips and organized tours, spends her vacations exploring nearby coastal towns like Santa Barbara, dreams of visiting historic Seville in Spain,
    and balances travel with a modest budget that prioritizes family visits and cultural heritage sites.
  culinary: Altagracia Osorio, an experienced home cook, prepares classic island dishes such as arroz con pollo, plantain fritters, and bean stew using fresh herbs like cilantro and oregano from her garden,
    and enjoys occasional dining at family‑run eateries that serve authentic Caribbean flavors.
  core: Altagracia Osorio, a 70‑year‑old health‑care veteran with a green thumb, a habit of checking the news twice each morning, and a steadfast love for routine, blends calm resilience with occasional
    stubbornness about trying new technology.
background:
  cultural: Altagracia was born into a Dominican family that placed great emphasis on Catholic faith, family solidarity, and communal gatherings. Raised with the rhythms of merengue, the flavors of plantains
    and mangú, and the values of hospitality and respect for elders, she carries these traditions into her daily life in Perris, California. Fluent in both Spanish and English, she celebrates Dominican
    holidays such as Día de la Independencia and Carnaval, and actively participates in the local Dominican diaspora network. Her heritage informs her professional dedication to serving Spanish‑speaking
    seniors, and she blends Caribbean warmth with the pragmatism of American suburban life.
attributes:
  skills: '[''Healthcare administration'', ''Staff scheduling'', ''Budget management'', ''Regulatory compliance (HIPAA, Medicare)'', ''Patient flow optimization'', ''Bilingual communication (Spanish-English)'',
