  hobbies: '[''Gardening'', ''Cooking traditional Dominican cuisine'', ''Reading historical fiction'', ''Listening to merengue and bachata'', ''Walking in local parks'', ''Knitting'', ''Church choir participation'',
    ''Volunteering at senior centers'', ''Family scrapbook and genealogy research'']'
  career_goals: Now approaching retirement, Altagracia aims to leave a lasting imprint on the local health system by establishing a mentorship program for emerging health managers, advocating for culturally
    competent services for Dominican elders, and volunteering her expertise to a community health clinic. She also hopes to document her experiences in a guidebook on senior care management and to serve
    on the advisory board of a nonprofit that provides health education to Spanish‑speaking residents.
