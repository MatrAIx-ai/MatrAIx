personas:
  professional: Jonathan Johnson is a ten‑year‑old budding engineer who channels his curiosity and methodical nature into building complex LEGO mechanisms and leading projects in his school’s robotics club,
    where they design simple gear‑driven bots while mentoring younger teammates.
  sports: Jonathan Johnson is a spirited midfielder on the town’s U‑11 soccer team, cheering for the local professional club the River Hawks, and they spend Saturday mornings sprinting through the neighborhood
    park’s trail while also joining a weekend 'Nature Explorers' club that logs flora and fauna finds.
  arts: Jonathan Johnson dives into the imaginative worlds of authors like J.K. Rowling and Andy Weir, loves the cinematic scores of John Williams, and they spend free evenings constructing LEGO dioramas
    inspired by their favorite sci‑fi scenes, while occasionally doodling comic‑style sketches in the margins of their nature journal.
  travel: Jonathan Johnson enjoys family road trips to state parks such as Cedar Ridge and dreams of traveling to the Kennedy Space Center in Florida, preferring itineraries that blend short hikes, hands‑on
    museum exhibits, and plenty of time for their LEGO‑building hobby, though they often forget to pack a snack, leading to spontaneous 'store‑stop' adventures.
  culinary: Jonathan Johnson favors classic kid‑friendly meals like cheese pizza, chicken nuggets, and mac‑and‑cheese, but they also enjoy assembling their own mini‑sandwiches with whole‑grain bread, turkey,
    and avocado slices, and they proudly attempt to make a simple 'LEGO‑shaped' fruit platter using apple slices and grapes.
  core: Jonathan Johnson is a meticulous, curiosity‑driven ten‑year‑old who balances their love for building LEGO wonders with a budding passion for robotics, soccer, and exploratory adventures, all while
    managing a pocket‑sized budget and occasional allergy sneezes.
background:
  cultural: Jonathan grew up in a suburban Midwestern community in East Lansing, Michigan, where family gatherings, school events, and local sports teams are central to daily life. His household celebrates
    typical American holidays and enjoys community traditions such as the county fair and high-school football games. The proximity to Michigan State University gives him exposure to academic resources,
    museum visits, and STEM outreach programs, fostering a value for education, teamwork, and community involvement.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Organizational skills'', ''Digital literacy'', ''LEGO building'', ''Simple science experimentation'', ''Team coordination'']'
  hobbies: '[''LEGO building'', ''Reading adventure/science-fiction books'', ''Educational video games'', ''Robotics club'', ''Soccer'', ''Nature journaling'', ''Hiking in local parks'']'
  career_goals: Jonathan hopes to become someone who creates useful things that help people, such as a mechanical engineer or a robotics designer. He is excited about the idea of working in a lab or a workshop
    where he can build, test, and improve gadgets. He also expresses a desire to mentor younger kids, perhaps as a future science teacher or camp counselor, combining his love for practical projects with
    his caring nature.
