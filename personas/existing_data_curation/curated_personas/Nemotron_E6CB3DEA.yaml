  hobbies: '[''Sketching and painting'', ''Creative writing (poetry, short stories)'', ''Reading speculative fiction and philosophy'', ''Attending small gallery openings and poetry readings'', ''Exploring
    vintage thrift stores'', ''Listening to experimental music and podcasts'', ''Urban photography'', ''Travel journaling'', ''Yoga and mindfulness practice'', ''Volunteering at community art workshops'']'
  career_goals: Susan aims to forge a career that merges her love for art, ideas, and community engagement. She envisions working as a museum curator or cultural programmer who highlights contemporary and
    experimental artists, or as an independent art writer and critic publishing essays and reviews. To deepen her expertise, she plans to pursue graduate studies in museum studies or creative writing while
    building a robust portfolio of visual and written works. Long‑term, she hopes to develop freelance opportunities that enable her to contribute to inclusive cultural projects and mentorship programs
    for emerging artists.
