personas:
  professional: Susan Lee, a 19‑year‑old aspiring museum curator and cultural programmer, leverages their deft visual illustration, poetic storytelling, and empathetic collaboration to craft immersive exhibition
    concepts that foreground experimental artists and community engagement, yet they often wrestle with deadline pressure due to a spontaneous work style.
  sports: Susan Lee, who enjoys the calm of sunrise yoga sessions at the local community center, occasionally joins a casual pick‑up basketball league that supports the New York Knicks fan club, follows
    the New York Giants during football season, and uses a cycling app to track weekend rides, though they often procrastinate on scheduled gym visits.
  arts: Susan Lee, an avid sketcher and digital illustrator, frequently attends gallery openings featuring artists like Banksy and Zaria Forman, writes poetry inspired by Ocean Vuong and the experimental
    soundscapes of Mitski, and finds deep resonance in the theatrical works of Lin‑Manuel Miranda, all of which shape their eclectic creative identity.
  travel: Susan Lee loves weekend wanderings to New York City museums, a spontaneous road‑trip to Philadelphia’s historic district, and dream‑filled plans to explore the lantern‑lit streets of Kyoto and
    the bohemian cafés of Paris, yet they budget travel through student discounts and a meticulous travel‑journal checklist.
  culinary: Susan Lee, a modest home‑cook, often whips up avocado toast on toasted sourdough, crafts quinoa bowls flavored with roasted chickpeas, miso soup, and fresh cilantro, while indulging in sushi
    rolls and matcha lattes at eclectic downtown cafés, though they sometimes neglect proper food storage, leading to occasional leftovers in the fridge.
  core: Susan Lee balances an insatiable curiosity for avant‑garde art with a chaotic habit of letting deadlines slip, a calm demeanor that rarely surrenders to anxiety, and a love for thrift‑store treasures
    that sometimes turns into impulsive spending, all while they remain quietly resilient.
background:
  cultural: Susan grew up in a middle‑class family in Closter, New Jersey, a suburban community with easy access to the cultural resources of nearby New York City. Her household emphasized education, self‑expression,
    and community involvement, often taking family trips to museums, theaters, and historic sites. While her ancestry is primarily of Western European descent, she has been exposed to a variety of cultural
    influences through school curricula, local festivals, and friendships with peers from diverse backgrounds. This environment fostered an appreciation for inclusive artistic dialogue and a worldview that
    values both individuality and collective harmony.
