  hobbies: '[''Gardening'', ''Beach walks'', ''Reading historical biographies'', ''Crossword puzzles'', ''Listening to big‑band jazz'', ''Birdwatching'', ''Jigsaw puzzles'', ''Light woodworking'', ''Cooking
