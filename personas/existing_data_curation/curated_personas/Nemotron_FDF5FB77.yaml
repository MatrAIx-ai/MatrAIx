  hobbies: '[''Cooking Salvadoran cuisine'', ''Kayaking in Charleston harbor'', ''Hiking in Francis Marion National Forest'', ''Playing acoustic guitar'', ''Reading economic and technology publications'',
    ''Volunteering for financial‑education non‑profits'', ''Gardening'', ''Traveling to El Salvador to visit family'']'
  career_goals: Carlos aims to transition into a senior leadership role, such as Portfolio Manager or Chief Investment Officer, where he can shape investment strategy for a regional firm while championing
    sustainable and community‑focused investing. He wishes to mentor junior analysts, integrate advanced analytics and AI tools into the investment process, and eventually launch a financial‑literacy nonprofit
    that serves the Salvadoran diaspora in the Southeast. Balancing his ambition with family stability, he also plans to secure his family's financial future through diversified personal investments and
    real‑estate acquisition in Charleston.
