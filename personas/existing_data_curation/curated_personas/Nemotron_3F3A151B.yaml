personas:
  professional: Ana Prakash, a 13‑year‑old aspiring science communicator and teen performer, blends curiosity‑driven experiments with practical storytelling in TikTok videos while thriving on stage in their
    school drama club, and they use their talkative, sociable nature to captivate peers and their compassionate outlook to make complex concepts feel accessible.
  sports: Ana Prakash enjoys casual soccer matches with friends in the spring, hikes the trails of Kensington Metropark for cardio, and cheers passionately for the Detroit Lions and Detroit Red Wings, while
    they occasionally join the local youth swim club to stay active despite a laid‑back attitude toward structured training.
  arts: Ana Prakash channels their vibrant imagination into drama club improv, TikTok science sketches, and hand‑drawn comic strips inspired by the whimsical worlds of J.K. Rowling and the dynamic panels
    of Marvel’s Spider‑Man, and they find inspiration in the music of Taylor Swift and the theatrical flair of Lin‑Manuel Miranda.
  travel: Ana Prakash prefers spontaneous weekend road trips to nearby Chicago for museum outings and a yearly family pilgrimage to their hometown during Diwali, while dreaming of a future adventure to
    Kyoto’s cherry‑blossom festivals, and they balance a modest budget with a curiosity‑driven desire to explore diverse cultures.
  culinary: Ana Prakash loves to blend cultural flavors, expertly baking chocolate‑chip cookies with a pinch of cardamom on family weekends, savoring spicy vegetable samosas at temple gatherings, and enjoying
    classic American pizza topped with extra mozzarella, and they reflect a playful palate that mixes sweet, savory, and experimental tastes.
  core: Ana Prakash is a chatty, curiosity‑fueled teen who juggles science TikToks, drama rehearsals, and cookie‑baking marathons, and they thrive on social energy yet often misplace homework in the chaos
    of their creative clutter.
background:
  cultural: Ana comes from an Indian‑American family that settled in Novi, Michigan. Her parents immigrated from Gujarat, India, and she grew up speaking both English and Gujarati at home. The household
    celebrates Diwali, Holi, and other Indian festivals while also observing American holidays like Thanksgiving and the Fourth of July. Her cultural roots influence her values of community, hospitality,
    and education, and she participates in activities at the local Hindu temple and multicultural student organizations at school.
