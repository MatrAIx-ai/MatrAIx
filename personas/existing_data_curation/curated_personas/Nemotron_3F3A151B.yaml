  career_goals: Ana envisions a future that blends her love for people with her curiosity about how things work. She is drawn to helping children stay healthy and happy, considering careers such as pediatric
    nursing or child psychology. She also dreams of becoming a middle‑school science teacher or a community outreach coordinator, roles that would let her share knowledge, organize inclusive events, and
    support her peers. In the short term, she hopes to start a youth mentorship group at her school and earn a first‑aid certification, building a foundation for her long‑term goal of working in child health
    or education.
