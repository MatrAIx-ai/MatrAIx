  career_goals: Although only two years old, Claudia expresses simple future‑oriented wishes. She often says she wants to "help the teachers" at preschool, enjoys watching older children read and imitates
    them, indicating a budding desire to become a storyteller or teacher. She also mentions wanting to "dance like the people on TV," showing an ambition toward performance. Her competitive nature leads
    her to set small personal goals, such as building the tallest block tower she can.
