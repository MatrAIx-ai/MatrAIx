persona_description: A scientist or educational researcher interested in the development and implementation of constructivist teaching practices in educational reform. This individual is likely to have
  a strong background in education and has a deep understanding of the theory of constructivism and its implications for teaching and learning. They are likely to be familiar with the work of Ernst von
  Glaserfeld and have read his book "Questions and Answers about Radical Constructivism." They are interested in the practical application of constructivist theory in educational settings and are looking
  for resources and information to support their research or teaching.
