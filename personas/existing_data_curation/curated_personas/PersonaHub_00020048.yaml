persona_description: A music therapist who specializes in using music to promote wellness, improve communication, enhance memory, and provide unique opportunities for interaction. They must be observant,
  empathetic, and excellent listeners and communicators, with extensive knowledge of music performance and theory. They work in a variety of settings, from addiction recovery centers and special education
  programs to adult schools and private practice, and are required to have a bachelor’s degree in music therapy as well as a certification from the Certification Board for Music Therapists. They are expected
  to have job growth in the field of recreational therapy.
