    User 1: So, what do you like to do for fun?

    User 2: I like to draw. I''m not very good at it, but it''s fun.

    User 1: I like to draw too. I''m not very good at it either, but it''s relaxing.

    User 2: That''s right. It''s a good way to de-stress.

