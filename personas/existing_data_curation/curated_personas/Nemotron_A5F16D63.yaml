  hobbies: '[''Sketching'', ''Photography'', ''Hiking'', ''Reading speculative fiction'', ''Journaling'', ''Volunteering at animal shelter'', ''Listening to indie folk music'', ''Visiting local museums'',
    ''Creative writing'', ''Exploring antique shops'']'
  career_goals: Marilyn plans to complete her high‑school education and then enroll in a community college program that blends psychology and visual arts. Her long‑term ambition is to earn a degree in art
    therapy or counseling so she can merge her artistic abilities with her compassion for helping others. She envisions creating a community art‑therapy studio in Essex County, offering workshops, counseling
    sessions, and collaborative projects that promote emotional well‑being and social harmony among teens and adults alike.
