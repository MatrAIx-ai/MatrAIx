  hobbies: '[''Gardening'', ''Knitting'', ''Quilting'', ''Reading Historical Fiction'', ''Book Club Participation'', ''Dog Walking'', ''Volunteer Work at Community Center'', ''Crossword Puzzles'', ''Gentle
    Yoga'']'
  career_goals: Nell aims to transition from a sales associate to a supervisory role, such as assistant manager or store manager, within the next two years. She seeks to leverage her organizational strengths
    to streamline store operations, mentor younger colleagues, and maintain a harmonious work environment. To support this, she plans to enroll in a part‑time Retail Management certification program and
    earn a certificate in Business Administration. Long‑term, she envisions a phased move toward part‑time consulting for local boutiques as she approaches retirement, allowing her to share her expertise
    while preserving a stable routine.
