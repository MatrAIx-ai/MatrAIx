personas:
  professional: Corey Nelson, a retired mechanical engineer turned community maker‑space facilitator, blends decades of equipment maintenance and data‑analysis expertise with a gentle, cooperative mentoring
    style, applying his practical, structured mindset to guide small groups of hobbyists while allowing enough flexibility to keep projects relaxed and enjoyable.
  sports: Corey Nelson, an avid fisherman who spends mornings on Trillium Lake and a casual participant in the Portland Senior Pickleball Club, roots for the Portland Timbers in soccer and the Trail Blazers
    in basketball, and prefers low‑impact exercise like gardening and short hikes over rigorous gym routines.
  arts: Corey Nelson, a quiet lover of classic Americana music and regional history, enjoys listening to Johnny Cash and Bob Dylan while perusing the works of painter Albert Bierstadt, regularly attends
    performances at the Oregon Shakespeare Festival, and appreciates the craftsmanship of local pottery exhibited at the Portland Art Museum.
  travel: Corey Nelson, a retired engineer who favors loosely planned road trips over rigid itineraries, has explored Yellowstone National Park and the Texas Hill Country on weekend getaways, and hopes
    to one day trek the Scottish Highlands and witness the northern lights in Iceland, all while balancing travel costs with his modest pension and family time.
  culinary: Corey Nelson, a competent home cook who relishes farm‑to‑table meals, often prepares cedar‑plank grilled trout from his lake catches with fresh dill and lemon, pairs it with a hearty Texas‑style
    brisket rub featuring paprika, brown sugar, and cumin, and enjoys baking sourdough bread using the flour he mills from his own wheat garden.
  core: Corey Nelson, a methodical yet easy‑going retiree, blends a love for hands‑on tinkering with a gentle, community‑focused spirit, balancing structured problem‑solving with spontaneous bursts of creative
    hobbies, all while occasionally forgetting to water his garden on rainy days.
background:
  cultural: Corey is a lifelong resident of Portland, Texas, a small town in San Patricio County with deep Anglo‑American and German settler roots. Raised in a mid‑20th‑century Protestant (Baptist) household,
    he grew up valuing self‑reliance, modest hospitality, and a strong sense of community service. The regional culture of rural Texas—its emphasis on land stewardship, practical craftsmanship, and neighborhood
    cooperation—has shaped his worldview. Exposure to the space race and early computer revolution during his formative years sparked his interest in engineering, while local traditions like church gatherings,
    county fairs, and family reunions reinforced his preference for small, harmonious groups. These cultural influences are reflected in his modest, cooperative nature and his dedication to preserving local
    history and supporting his neighbors.
attributes:
  skills: '["Mechanical engineering troubleshooting", "Electrical systems maintenance", "Data analysis and reporting", "Technical writing", "Woodworking and carpentry", "Garden and small‑scale agricultural
    technology", "Computer literacy (Microsoft Office, basic programming)", "Mentoring and collaborative problem solving"]'
  hobbies: '["Woodworking", "Gardening", "Fishing", "Reading (science and Texas history)", "Model train building", "Amateur radio (ham)", "Genealogy research", "Community STEM volunteering"]'
  career_goals: Now retired, Corey aims to stay intellectually active and socially valuable by volunteering as a STEM mentor at the local community college, sharing his engineering insights with high‑school
    and adult learners. He plans to expand his home workshop into a small community maker space where he can teach woodworking and basic electronics to neighbors and grandchildren. He also hopes to complete
    a long‑standing personal project—a custom-built wooden gazebo for his backyard—and to document his family’s genealogy and the oral histories of Portland’s early settlers, preserving them for future
    generations. Maintaining his health, supporting his wife’s well‑being, and nurturing close family ties remain central to his ambitions.
