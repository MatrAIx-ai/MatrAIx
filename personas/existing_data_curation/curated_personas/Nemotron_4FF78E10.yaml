  hobbies: '[''Cooking'', ''Herb gardening'', ''Beach walking'', ''Reading self‑help and memoir books'', ''Journaling'', ''Attending cultural festivals'', ''Playing chess and Mahjong'', ''Knitting and crocheting'']'
  career_goals: Kateri aims to formalize her knowledge by earning a high school equivalence credential (GED) within the next year. She plans to enroll in a short‑term culinary certification program at a
    local community college, with the long‑term ambition of launching a home‑based catering service that offers authentic Vietnamese family recipes for local events. She also aspires to become a certified
    home health aide to provide professional care for elderly relatives, merging her practical caregiving experience with a recognized credential. These goals reflect her desire for personal independence,
    financial stability, and the ability to contribute more effectively to her family and community.
