personas:
  professional: Kateri Tran, a 44‑year‑old family caretaker and community event organizer, leverages meticulous budgeting, bilingual communication, and hands‑on DIY skills while pursuing a GED and a culinary
    certification, aiming to launch a home‑based catering service and become a certified home health aide.
  sports: Kateri Tran enjoys regular walks along the Pacific shoreline, joins a local senior walking group monthly, follows the San Diego Padres and the San Diego Wave with modest enthusiasm, and occasionally
    plays casual beach volleyball with neighbors.
  arts: Kateri Tran’s artistic side shines through strategic board games like chess and Mahjong, a fondness for the music of Anoushka Shankar, the films of Wong Kar‑wai, and occasional knitting of practical
    scarves for family, all of which satisfy a quietly discerning aesthetic.
  travel: Kateri Tran favors low‑cost, food‑centric trips, has explored the Pacific Northwest’s coastal towns, visited the historic old quarter of Hoi An, and dreams of hiking New Zealand’s South Island
    while balancing budget constraints and family responsibilities.
  culinary: Kateri Tran’s kitchen is a laboratory where classic dishes such as pho, bánh mì, and fresh spring rolls receive inventive twists—like quinoa‑infused broth or plant‑based pâté—while fresh basil,
    cilantro, and mint from her balcony herb garden provide the aromatic backbone of every meal.
  core: Kateri Tran is a methodical, community‑driven 44‑year‑old who channels her love for structured budgeting, heritage cooking, and compassionate caregiving into a quietly competitive, habit‑filled
    life.
background:
  cultural: Kateri is a first‑generation Vietnamese‑American whose parents immigrated to the United States from Vietnam in the early 1980s. Raised in National City’s vibrant Little Saigon community, she
    grew up immersed in both Vietnamese traditions—such as celebrating Tet, practicing filial piety, and speaking Vietnamese at home—and mainstream American culture. The blend of these influences instilled
    a strong sense of family responsibility, respect for elders, and a practical work ethic. While she did not complete a formal high school diploma, her upbringing emphasized hands‑on learning, community
    solidarity, and adaptation to the challenges of immigrant life. This bicultural heritage shapes her daily routines, culinary preferences, and her commitment to supporting both her immediate family and
    the broader Southeast Asian community in San Diego County.
attributes:
  skills: '[''Household budgeting'', ''Financial planning'', ''Vietnamese cooking'', ''Bilingual communication (English/Vietnamese)'', ''Basic computer literacy'', ''DIY home repair'', ''Herb gardening'',
