persona_description: A wildlife biologist and manager of the Mattamuskeet National Wildlife Refuge in Swan Quarter, NC. He is responsible for the administration and management of the refuge, which includes
  the protection and preservation of various species of wildlife, including waterfowl, birds, and other migratory animals. The refuge is located on 50,000 acres of marshes, woods, and water, and is administered
  by the U.S. Department of the Interior's Fish and Wildlife Service. The refuge is home to over 800 species of wildlife and birds, and is known for its diverse array of wildlife, including Tundra Swans,
  Canada and Snow Geese, pintails, black ducks, and mallards.
