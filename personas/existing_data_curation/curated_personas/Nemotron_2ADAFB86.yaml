  hobbies: '[''Surfing'', ''Hiking Oahu trails'', ''Playing the ukulele'', ''Cooking Hawaiian cuisine'', ''Volunteer tutoring'', ''Beach volleyball'', ''Attending local cultural festivals'', ''Gardening
    tropical fruits'', ''Reading educational research'', ''Running (e.g., Honolulu Marathon)'']'
  career_goals: Tristan aims to move into a district‑wide curriculum coordinator position where he can design and implement culturally responsive units across multiple schools. He is pursuing National Board
    Certification to deepen his instructional expertise and plans to publish a guide for teachers on integrating Hawaiian cultural practices into secondary curricula. Over the next five years, he hopes
    to assume an assistant principal role, championing data‑informed teacher evaluation and expanding service‑learning opportunities that connect students with the local community. Balancing career advancement
    with family life, Tristan also seeks to mentor a cohort of emerging educators and to contribute regularly to regional education conferences.
