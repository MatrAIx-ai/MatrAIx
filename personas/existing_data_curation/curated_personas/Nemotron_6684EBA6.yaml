  career_goals: Fernando aims to become a senior operations manager within the next three years, leading cross‑functional teams to drive efficiency and cost savings. He plans to earn a PMP certification
    and pursue a Six Sigma Black Belt to deepen his expertise in continuous improvement. Long‑term, he envisions a director‑level role overseeing strategic operations or launching his own operations‑consulting
    boutique focused on technology‑enabled process transformation for mid‑size firms.
