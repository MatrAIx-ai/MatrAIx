personas:
  professional: Fernando Sellars, a data-driven operations analyst in a fast-paced New York fintech firm, builds streamlined workflows with Excel macros, SQL queries, and Tableau dashboards, and they apply
    Lean Six Sigma Yellow Belt rigor to every project, reflecting a lifelong habit of punctuality and methodical planning.
  sports: Fernando Sellars, a dedicated half-marathon trainee with the NYC Road Runners club, follows a disciplined training schedule, cheers for the New York Knicks during off-season games, and they occasionally
    join recreational chess-themed fitness challenges, balancing competitive drive with strategic thinking.
  arts: Fernando Sellars regularly attends Off-Broadway productions such as 'The Play That Goes Wrong', devours contemporary novels by authors like Sally Rooney and Haruki Murakami, and they keep a curated
    playlist of Beethoven's late string quartets, using these artistic pursuits to temper their analytical mind.
  travel: Fernando Sellars prefers meticulously planned trips, having explored the historic streets of Dublin during a heritage weekend and savored Mediterranean flavors in Barcelona, while they dream of
    a structured itinerary through Kyoto's temples, reflecting a love for cultural immersion that honors their family's tradition of punctual vacations.
  culinary: Fernando Sellars approaches Mediterranean cooking like a precision experiment, perfecting dishes such as Greek moussaka and Spanish paella with exact measurements of olive oil, oregano, and
    saffron, and they often rehearse these recipes on Sunday evenings, a ritual echoing the family's weekly communal meals.
  core: Fernando Sellars blends a relentless love for order—evident in daily spreadsheet audits and regimented running routes—with a quiet rebellious streak that surfaces in spontaneous theater outings
    and experimental cooking, a paradox that defines their uniquely structured yet creatively curious outlook.
background:
  cultural: Fernando grew up in a middle‑class suburban neighborhood in New Jersey, raised by parents of Irish and German descent. His family emphasized education, punctuality, and a strong work ethic,
    values that align with his structured personality. Moving to New York City for his career exposed him to a melting pot of cultures, prompting an appreciation for diverse artistic expressions and global
    perspectives. His humanities degree reinforced his interest in literature, philosophy, and cultural studies, making him comfortable navigating both traditional American norms and the cosmopolitan environment
    of New York.
