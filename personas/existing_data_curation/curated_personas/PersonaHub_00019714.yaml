persona_description: A historian who specializes in the study of population movements, particularly those related to the 20th century. His research interests include, but are not limited to, the causes
  and effects of forced migration, the history of population exchanges, and the impact of population movements on ethnic relations. He is also interested in the personal narratives of those who have been
  displaced and the experiences of the Hungarians, Slovaks, and Germans who lost their homeland, homes, and places where they had lived during the events of the Czechoslovak-Hungarian population exchange
  between 1947 and 1949.
