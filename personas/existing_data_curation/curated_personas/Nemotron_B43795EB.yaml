  hobbies: '[''Reading (business, psychology, history)'', ''Gardening'', ''Solo Hiking'', ''Yoga'', ''Vintage Postcard Collecting'', ''Knitting'', ''Cooking (farm-to-table)'', ''Podcast Listening (true‑crime,
    science)'', ''Journaling'']'
  career_goals: Helen aims to move from first‑line supervision to a store manager position within the next two to three years, focusing on building a high‑performing, cohesive team and streamlining operational
    workflows. She is interested in mastering omni‑channel retail strategies and hopes to advance to a district‑level role, overseeing multiple locations. In the longer term, Helen envisions launching her
    own boutique that blends her business expertise with a curated, community‑focused shopping experience. To support these ambitions, she plans to pursue a part‑time MBA to deepen her strategic planning
    and financial management skills.
