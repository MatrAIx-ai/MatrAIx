    User 1: So, what else do you like to do for fun?

    User 2: I love to go shopping. I also like to go to the movies and out to dinner.

    User 1: I love shopping too! What are some of your favorite stores?

    User 2: I love Anthropologie, Zara, and Madewell.

    User 1: I love those stores too!

    User 2: Me too!

    User 1: So, what do you like to do for work?

    User 2: I''m a teacher.

    User 1: Oh, that''s cool! I''ve always wanted to be a teacher.

    User 2: It''s a great job! I love working with kids.

    User 1: I bet it is.

    User 2: So, what do you do for work?

    User 1: I''m a software engineer.

    User 2: Oh, that''s cool! What do you like about it?

    User 1: I love the challenge of solving problems and building new things.

    User 2: I can imagine.

    User 1: So, what do you do for fun besides shopping and going to the movies?

    User 2: I like to spend time with my family and friends. I also like to read and play video games.

    User 1: I like to spend time with my family and friends too. I also like to go to the gym and watch football.

    User 2: I love football!

    User 1: Me too! So, what are you looking for in a friend?

    User 2: I''m looking for someone who is kind, funny, and supportive.

    User 1: I think I fit that description.

    User 2: I think so too!

    User 1: So, what do you say we be friends?

    User 2: I''d love that!'
