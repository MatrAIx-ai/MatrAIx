  career_goals: James aims to finish high school and enroll in a vocational program that blends his love of mechanics with his outgoing personality. He dreams of owning a small automotive repair shop where
    he can interact with customers daily, while also launching a local‑radio or online streaming show that spotlights community events, local music, and gaming culture. In the long term, he hopes to become
    a recognized media personality in his region, using his communication skills to connect people and promote small‑town pride. He values a career path that offers clear milestones yet allows flexibility
    to explore creative side projects.
