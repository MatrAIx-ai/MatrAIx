  career_goals: Rebecca dreams of a future where she can work with animals in a calm, predictable environment, such as becoming a veterinarian or a wildlife rehabilitation assistant. She also imagines herself
    as a librarian, drawn to the quiet order of bookshelves and the opportunity to help others find information. In the near term, she aims to improve her grades, especially in science and reading, to feel
    less anxious about school performance and to earn a spot on the honor roll. She hopes her careful study habits will reduce her worries and give her a sense of control over her future.
