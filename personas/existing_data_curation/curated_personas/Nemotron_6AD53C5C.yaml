personas:
  professional: Rebecca Smith is an aspiring junior architect who transforms her love for intricate LEGO constructions into detailed design sketches, and they meticulously document each building step in
    a personal journal as early practice for future building projects.
  sports: Rebecca Smith enjoys low‑key fitness through weekend bird‑watching hikes on Cedar River Trail and cheering on the local high school soccer team, the Cedar Rapids Raiders, while they occasionally
    join a junior swimming club for structured workouts, even though large crowds at stadiums make them uneasy.
  arts: Rebecca Smith finds creative solace in practicing piano pieces by Ludovico Einaudi that feature clear patterns, listening to the soundtrack of "Harry Potter" while building LEGO, and they often
    sketch scenes from the mystery books they devour, drawing inspiration from illustrators like Chris Riddell.
  travel: Rebecca Smith prefers short, well‑planned trips that balance adventure with safety, such as family weekend getaways to the nearby Great Lakes State Park and annual visits to Washington, D.C.’s
    National Museum of Natural History, while they dream of exploring the castles of Scotland once they’re older.
  culinary: Rebecca Smith delights in simple comforts like homemade mac and cheese with a sprinkle of broccoli and chocolate chip cookies baked with flaky butter, and they experiment by baking rock‑shaped
    shortbread cookies that echo their rock‑collecting hobby, though they sometimes forget to eat a balanced lunch before school.
  core: Rebecca Smith is a meticulous, puzzle‑loving ten‑year‑old who channels anxiety into structured LEGO builds and journal entries, yet occasionally lets disorganization slip into their allowance tracking
    and skips meals when absorbed in mysteries.
background:
  cultural: Rebecca grew up in Cedar Rapids, Iowa, a Midwestern town with deep Dutch and German roots and a strong agricultural heritage. Her family participates in community events such as the Cedar Rapids
    Freedom Festival and the local county fair, where she enjoys watching the livestock shows and tasting homemade foods. She attends a public elementary school where school assemblies emphasize community
    values, respect, and modesty. Her household celebrates traditional American holidays—Thanksgiving, Christmas, and Halloween—with a blend of church‑based customs (her family attends a Methodist congregation)
    and local Cedar Rapids customs, like the annual Tulip Festival. These influences foster a modest, practical outlook and a love for orderly, community‑oriented activities.
attributes:
