personas:
  professional: Ariel Reeves, a retired family archivist and museum docent, blends meticulous organization with an insatiable curiosity for art history to design engaging tours, preserve generational stories,
    and diligently plan community exhibitions and a forthcoming memoir, while they methodically ensure every detail—from budget sheets to interview transcripts—is carefully documented.
  sports: Ariel Reeves enjoys low‑impact fitness activities such as daily neighborhood walks and bi‑weekly water aerobics at the senior center, quietly roots for the local baseball team, the River City
    Mariners, and follows the seasonal rhythm of senior pickleball leagues, while rarely joining large crowd events and preferring intimate, friendly matches.
  arts: Ariel Reeves, an avid reader of art history and biography, frequently attends gallery openings and museum tours, cherishes the sounds of Miles Davis, Ella Fitzgerald, and Billie Holiday on their
    vintage record player, and finds inspiration in the paintings of Claude Monet and Jacob Lawrence, allowing these creative influences to shape their quilting designs and journal reflections.
  travel: Ariel Reeves prefers deliberate, slow‑paced travel, planning weekend train trips to historic towns like Savannah, a day trip to the coastal gardens of Charleston, and a coveted dream pilgrimage
    to the art museums of Florence, often balancing these outings with careful budgeting and the need to maintain health stability.
  culinary: Ariel Reeves masterfully prepares traditional Southern dishes such as collard greens simmered with smoked turkey, buttery cornbread, and peach cobbler, while embellishing meals with fresh herbs—basil,
    thyme, and rosemary—from their modest garden, and they savor occasional dining experiences at upscale Southern‑style eateries that remind them of cherished family meals.
  core: Ariel Reeves is a diligent, curiosity‑driven centenarian who blends meticulous organization with a love for art and quilting, combats frequent worries through journaling, and occasionally yields
    to indulgent splurges on rare books and yarns—all while navigating the challenges of aging with graceful persistence.
background:
  cultural: Ariel was born in 1935 in the segregated South and moved with her family to Cincinnati during the Great Migration, joining a vibrant African‑American community anchored by church, music, and
    family networks. Growing up under Jim Crow, she experienced both overt discrimination and the strength of collective resilience. Her cultural identity is shaped by traditions of soul‑food cooking, gospel
    and jazz music, storytelling, and a deep commitment to church fellowship. Although formal schooling ended before ninth grade, she pursued lifelong learning through reading, community involvement, and
    preserving oral histories. These experiences have instilled in her a strong sense of heritage, a respect for artistic expression, and a dedication to passing down cultural knowledge to younger generations.
attributes:
  skills: '["Traditional soul‑food cooking", "Quilting and textile crafts", "Family genealogy research and oral history preservation", "Volunteer event coordination for church and community groups", "Household
    budgeting and financial management", "Elder caregiving and support", "Art interpretation and museum docent work", "Journaling and stress‑management techniques"]'
  hobbies: '["Reading art books and biographies", "Visiting local museums and gallery openings", "Listening to jazz, gospel, and soul music", "Knitting and quilting", "Gardening herbs and flowers", "Journaling",
    "Crossword puzzles", "Participating in a small book club", "Volunteer storytelling at the library"]'
  career_goals: Although retired, Ariel remains focused on leaving a lasting legacy. She aims to complete a memoir that weaves together her personal journey, family history, and reflections on the Black
    experience throughout the 20th century. She hopes to digitize the family archive so future generations can easily access it, and she wants to mentor her grandchildren and great‑grandchildren, especially
    encouraging them to appreciate the arts and pursue education. Ariel also aspires to help a local community center establish a small exhibition space for African‑American artists, and she is determined
    to maintain her health and independence so she can continue these contributions for as long as possible.
