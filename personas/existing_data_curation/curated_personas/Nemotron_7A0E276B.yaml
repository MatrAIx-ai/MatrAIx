personas:
  professional: Aaron Hollis, a 64‑year‑old retired visual artist and self‑taught craftsman, channels their love of abstract oil painting, woodworking, and emerging 3D‑printing techniques into an ambitious
    plan to curate a solo exhibition at a Derry gallery, launch a community art workshop that prizes independent experimentation, and dominate regional art contests with innovative hybrid pieces, all while
    maintaining a relaxed, improvisational approach to deadlines.
  sports: Aaron Hollis, a 64‑year‑old hobbyist athlete, pedals his vintage road bike on the Appalachian Trail loops with the Derry Cycle Collective, hikes the White Mountain peaks in the fall, and roots
    for the Boston Bruins and the New Hampshire Wildcats, while occasionally joining a Sunday morning pickleball league at the community center to stay limber.
  arts: Aaron Hollis, a 64‑year‑old self‑taught visual artist, merges the gestural vigor of Jackson Pollock and the serene light of Ansel Adams in his abstract oils and seasonal photographs, carves wooden
    furniture inspired by Shaker simplicity, writes speculative fiction echoing the world‑building of Philip K. Dick, and improvises jazz guitar lines influenced by Miles Davis and John Coltrane during
    weekend jam sessions.
  travel: Aaron Hollis, a 64‑year‑old wanderer, plans his trips with a loose itinerary that blends spontaneous detours to New England’s leaf‑crisped byways—like the Kancamagus Highway—and occasional pilgrimages
    to Paris’s Musée d’Orsay and Florence’s Uffizi, favoring modest B&Bs, local farmers’ markets, and sunrise hikes over lavish resorts.
  culinary: Aaron Hollis, a 64‑year‑old food enthusiast, whips up hearty New England clam chowder with locally sourced clams, seasons a perfect lobster roll with fresh dill and butter, bakes apple‑cinnamon
    crumble using orchard apples, and pairs his meals with craft beers from regional breweries, though they often burn the edges of experimental skillet dishes when lost in thought.
  core: Aaron Hollis, a 64‑year‑old retired artist whose imagination fuels a perpetual studio experiment, balances a relaxed, slightly disorganized lifestyle with a fierce competitive streak in regional
    art contests, and spends evenings alternating between jazz improvisation, speculative storytelling, and meticulous woodworking.
background:
  cultural: Aaron is a white American with deep New England roots, raised in a modest family in New Hampshire. The region's historic emphasis on independence, self‑reliance, and community engagement shaped
    his values and his appreciation for local folk traditions. He participates in Derry’s seasonal festivals and values the region's blend of rugged natural beauty and cultural heritage. His upbringing
    in a small‑town environment fostered a pragmatic mindset, while the New England emphasis on education and intellectual discourse nurtured his lifelong curiosity.
