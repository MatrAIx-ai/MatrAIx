  hobbies: '["Abstract painting", "Woodworking", "Jazz guitar improvisation", "Creative writing (speculative fiction)", "Nature photography", "Reading science‑fiction and philosophy", "Hiking on local trails",
    "Attending art exhibitions and fairs", "Participating in philosophy discussion groups"]'
  career_goals: Even though he is retired, Aaron aspires to curate a solo exhibition of his abstract artwork at a local New Hampshire gallery and to publish a collection of his speculative short stories.
    He aims to launch a community art workshop in Derry that encourages independent thinking and experimental techniques, positioning himself as a mentor for younger artists. Driven by his competitive streak,
    he plans to enter regional art contests and seek recognition for innovative projects, while also exploring emerging mediums like 3D printing to merge his craftsmanship with cutting‑edge technology.
