persona_description: A developer who is familiar with Java and web technologies, particularly with Apache FreeMarker™. They are looking for information about the features and capabilities of Apache FreeMarker™,
  how it can be used in non-web application environments, and how it can be integrated with other technologies like Java objects and XML processing. They are interested in learning how to use the template
  engine to generate text output based on templates and changing data, and how it can be used to separate web page designers from developers. They may also be interested in learning about the project's
  history and licensing, and how to obtain the Apache License, Version 2.0.
