  hobbies: '[''Building LEGO structures'', ''Drawing animals and simple machines'', ''Exploring the backyard and nearby woods'', ''Collecting rocks and insects'', ''Playing soccer with neighborhood friends'',
    ''Solving puzzles and age‑appropriate brain teasers'', ''Listening to country and folk music'', ''Watching educational cartoons'', ''Using educational tablet games'']'
  career_goals: Roy dreams of becoming someone who can combine his curiosity about how things work with a practical impact on his community. He imagines being an inventor of helpful gadgets, a wildlife
    biologist exploring the forests near Eatonton, or a firefighter who helps people. He is eager to learn science and engineering concepts that will enable him to create real solutions, and he aspires
    to be respected for his clever ideas and to compete in school science fairs.
