  career_goals: Even at this young age, Martin expresses a budding desire to help others and contribute to his community. He often says he wants to "fix things" or "take care of people," hinting at future
    aspirations such as becoming a teacher, a pediatric nurse, or another community‑focused role. His organized and reliable disposition suggests he will gravitate toward careers that require planning,
    attention to detail, and compassionate interaction. In the coming years, Martin aims to learn to read, explore new subjects, and develop the skills needed for a profession where he can blend his curiosity
    with practicality to support others.
