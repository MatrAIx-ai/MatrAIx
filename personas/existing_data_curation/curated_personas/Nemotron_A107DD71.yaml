personas:
  professional: Martin Rodriguez, a two‑year‑old who delights in building intricate block towers, showing early spatial reasoning and methodical planning, balances curiosity about new shapes with a pragmatic
    preference for sturdy foundations, and already demonstrates the organized, reliable traits that will one day serve a career in engineering.
  sports: Martin Rodriguez, a two‑year‑old who participates in a preschool soccer program with the Little Lions and a tiny gymnastics class at the community center, eagerly imitates professional moves,
    chants for the local baseball team the City Owls, yet prefers organized sandbox play over chaotic tag sessions.
  arts: Martin Rodriguez, a two‑year‑old who can spend hours coloring in Eric Carle’s 'The Very Hungry Caterpillar', humming Raffi’s 'Baby Beluga', and reciting lines from Sesame Street, finds creative
    expression a soothing bridge between his compassionate nature and his methodical desire to finish each drawing neatly.
  travel: Martin Rodriguez, a two‑year‑old whose travel style blends structured itineraries with spontaneous playground stops, has explored the city zoo, delighted in a family beach getaway to Florida’s
    Gulf Coast, and dreams of the bright lights of Disneyland Paris, all while insisting on familiar bedtime routines over long flights.
  culinary: Martin Rodriguez, a two‑year‑old who swears by buttery mac and cheese, loves dipping crunchy apple slices in peanut butter, proudly assists in stirring his banana pancake batter with a wooden
    spoon, yet stubbornly refuses peas, earning the nickname 'the picky chef' at mealtime.
  core: Martin Rodriguez, a two‑year‑old who blends relentless curiosity with a toddler‑level penchant for order, arranges his stuffed animals by size, shares stickers compulsively, yet can’t resist a sudden
    tantrum over a missing crayon.
background:
  cultural: Martin’s family is white and rooted in the New England cultural milieu of Prospect, Connecticut. They embrace typical suburban New England traditions such as celebrating Thanksgiving with a
    community potluck, attending seasonal festivals, and visiting local farms for apple picking in the fall. The family values community involvement, punctuality, and a balanced lifestyle—reflecting the
    region’s emphasis on reliability and modesty. Exposure to the town’s public library, nearby nature reserves, and a close‑knit neighborhood fosters Martin’s curiosity about the natural world and his
    cooperative, compassionate outlook.
