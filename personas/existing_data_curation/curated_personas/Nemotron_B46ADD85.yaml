    "Art historical research", "Community event planning", "Cultural heritage documentation"]'
  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Playing piano/singing in church choir", "Listening to jazz and blues", "Reading African-American literature", "Participating in
    a community book club", "Gardening", "Cooking Creole and soul food", "Volunteer legal-aid work", "Photography of historic neighborhoods", "Genealogy research", "Quilting with friends"]'
  career_goals: Rosalyn aims to become a senior paralegal team lead within the next three years, focusing on civil‑rights and family‑law practice. She plans to earn the Certified Paralegal (CP) credential
    and enroll in a part‑time graduate certificate in legal studies to deepen her expertise. Beyond the office, she envisions launching a community legal‑arts initiative that pairs local artists with a
    pro‑bono legal clinic, helping residents navigate probate and tenant‑rights issues while celebrating cultural heritage. She also hopes to mentor emerging Black paralegals through a regional apprenticeship
    program and eventually author a practical guide on Louisiana probate law tailored for African‑American families.
