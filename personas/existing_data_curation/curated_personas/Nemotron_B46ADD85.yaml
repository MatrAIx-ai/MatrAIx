personas:
  professional: Rosalyn Minott is a seasoned paralegal specializing in Louisiana civil and family law, who combines meticulous legal research on LexisNexis and Westlaw, empathetic client communication,
    and a creative problem‑solving mindset honed by watercolor painting to streamline trial preparation and nurture collaborative office dynamics.
  sports: Rosalyn Minott enjoys low‑impact fitness by walking with the New Orleans Walking Club, participates in seasonal water‑aerobics at the community center, plays paddle‑tennis at the local YMCA, proudly
    supports the New Orleans Saints and Pelicans, and finds spring kayaking on the Mississippi both a workout and an artistic muse.
  arts: Rosalyn Minott spends evenings painting watercolors of river landscapes inspired by Claude Monet and Winslow Homer, performs piano in her church choir, immerses in live jazz at venues showcasing
    Wynton Marsalis and John Coltrane, reads classic Southern literature and contemporary poetry, and curates community art events that blend legal advocacy with cultural heritage.
  travel: Rosalyn Minott favors thoughtfully planned trips that combine historic immersion and culinary discovery, having explored New Orleans’ French Quarter, Savannah’s ante‑bellum streets, river towns
    along the Mississippi, and a week‑long art pilgrimage to Paris, while dreaming of a Danube river cruise and a family hike through the Blue Ridge Mountains of Asheville.
  culinary: Rosalyn Minott cooks Creole‑inspired soul food with confidence, regularly preparing gumbo brimming with okra, smoked Andouille sausage, and shrimp, jambalaya seasoned with cayenne and thyme,
    sweet peach cobbler topped with crunchy pecans, and blackened catfish served alongside collard greens and red beans and rice.
  core: Rosalyn Minott blends a meticulous legal mind with a vivid artistic spirit, balancing community service, soulful cooking, and a habit of late‑night research marathons, while occasionally forgetting
    to water their garden.
background:
  cultural: Rosalyn is a Black American born and raised in Monroe, Louisiana, where the legacy of the civil‑rights movement and rich Creole heritage shape daily life. Her family traditions incorporate church
    fellowship, gospel music, and storytelling that celebrate resilience and community. She grew up attending local festivals, Juneteenth celebrations, and the historic River Fest, absorbing the rhythms
    of jazz, zydeco, and southern cuisine. These cultural threads inform her appreciation for African‑American art, history, and social justice. Rosalyn’s education in the humanities deepened her connection
    to Black literary and visual traditions, while her professional role allows her to translate that cultural awareness into advocacy for underserved residents of Ouachita Parish.
attributes:
  skills: '["Legal research", "Drafting legal correspondence", "Case file organization", "Trial preparation assistance", "Discovery management", "Client interviewing", "Legal document management software
