personas:
  professional: Stephanie Gannon, an aspiring robotics enthusiast and budding game developer, blends their knack for building intricate LEGO structures with practical coding skills to contribute inventive
    solutions in their middle school robotics club, all while applying a methodical yet flexible approach that balances curiosity with reliability.
  sports: Stephanie Gannon plays forward for the Hillsboro Youth Soccer Club, idolizes the Portland Timbers, thrills to watch the Seattle Seahawks on weekends, and fuels their love of the outdoors by taking
    weekend hikes on the Tualatin River Greenway while maintaining a competitive edge on the soccer field.
  arts: Stephanie Gannon immerses themselves in the worlds of mystery and sci‑fi, devouring novels by Neil Gaiman and Becky Chambers while drawing inspiration from the cinematic scores of Hans Zimmer and
    the pop anthems of Taylor Swift, and they channel this creative energy into crafting stop‑motion LEGO films and mastering strategy board games like Catan.
  travel: Stephanie Gannon has trekked the misty slopes of Mount St. Helens, explored the tide‑pools of Cannon Beach, and visited the Seattle Space Needle on family road trips, and they dream of future
    adventures to Banff National Park and Japan’s cherry‑blossom festivals, preferring itineraries that blend hiking challenges with cultural museum stops.
  culinary: Stephanie Gannon favors vibrant veggie‑packed burritos and spicy avocado toast for lunch, loves to grind their own homemade trail mix with almonds, dried cranberries, and dark chocolate chips
    for hikes, and they can skillfully whip up a quick mac and cheese using sharp cheddar, balancing a budding cooking confidence with a habit of over‑salting their soups when experimenting.
  core: Stephanie Gannon is a curious, competitively‑leaning 12‑year‑old who channels a blend of practical ingenuity and skeptical curiosity into robotics, soccer, and eco‑friendly pursuits, while occasionally
    stumbling over typical teen quirks like late‑night snack cravings and procrastination.
background:
  cultural: Stephanie grew up in a white, middle‑class family in Hillsboro, Oregon, a suburban community known for its blend of tech industry influence and strong environmental values. Her family emphasizes
    education, self‑reliance, and community involvement, often attending local events like the Hillsboro Summer Festival and volunteering for neighborhood cleanup drives. The Pacific Northwest culture,
    with its appreciation for outdoor recreation and sustainability, shapes her love for hiking and interest in environmentally focused technology. While she shares typical American suburban experiences—school
    sports, after‑school clubs, and family road trips—she also absorbs the region’s progressive outlook on science, innovation, and civic responsibility.
