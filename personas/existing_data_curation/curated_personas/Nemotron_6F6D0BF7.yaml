  career_goals: Stephanie aspires to pursue a career that merges her love for technology with tangible outcomes. She aims to attend a STEM‑focused high school, earn a scholarship, and eventually study computer
    engineering or robotics at a university. Her long‑term ambition is to design innovative robotic systems that solve real‑world problems, such as environmental monitoring tools. She is driven to become
    a leader in her field, competing in national competitions and contributing to community tech initiatives, while maintaining a balanced, practical approach to achieving her goals.
