persona_description: An engineer or scientist with expertise in material analysis and characterization using Fourier transform infrared microscopy (FTIR). They are interested in identifying the pigments
  and binding mediums in paint samples, as well as understanding the molecular structure of various materials. They are likely to have knowledge of the specific wavelengths of infrared radiation that each
  type of material absorbs and the resulting characteristic 'fingerprint' for each class of material. They may also have an interest in the broader field of materials science and the applications of FTIR
  in various industries.
