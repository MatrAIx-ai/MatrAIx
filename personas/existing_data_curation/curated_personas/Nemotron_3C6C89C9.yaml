  hobbies: '[''Tai chi'', ''Community cooking'', ''Mahjong'', ''Urban gardening'', ''Walking tours of Queens'', ''Classic Chinese cinema'', ''Family storytelling'', ''Smartphone photography'']'
  career_goals: Although retired, Xiaofeng aims to remain an active pillar of his community. He intends to expand his volunteer work at the local senior center, offering language lessons and cultural workshops.
    He plans to compile a family recipe book and record oral histories to preserve his heritage for grandchildren. Embracing his curiosity, he wants to become more proficient with digital tools, including
    video calling and social media, to maintain close ties with family abroad. A personal ambition is to travel back to his ancestral village in China for a reunion and to bring back stories and traditions
    that he can share with his local community. Additionally, he hopes to organize a regular multicultural potluck in Corona that showcases the diverse foods and traditions of Queens' neighborhoods.
