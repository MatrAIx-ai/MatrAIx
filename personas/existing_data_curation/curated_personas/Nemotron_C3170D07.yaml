personas:
  professional: Patrick Mckinney, a three‑year‑old master of tidy toy stacks, channels their love of routine into meticulously arranging blocks, and they pretend to be a miniature project manager, always
    ensuring each piece is assigned its proper place before play begins.
  sports: Patrick Mckinney, who cheers for the Los Angeles Dodgers and joins the preschool’s weekly mini‑soccer club, enjoys solitary practice of kicking a soft rubber ball in the backyard, and they follow
    a strict, routine‑based fitness schedule that aligns with their calm disposition.
  arts: Patrick Mckinney, an avid admirer of the whimsical art of Eric Carle and the catchy tunes of The Wiggles, spends quiet afternoons drawing with Crayola markers and watching Sesame Street episodes,
    and they allow these familiar artistic experiences to shape their gentle, orderly playtime.
  travel: Patrick Mckinney, who prefers short, predictable family trips to nearby locales such as the children's museum in the city and the Monterey Bay Aquarium, fantasizes about a serene sunrise at the
    Grand Canyon, and they avoid long flights in favor of familiar travel routines.
  culinary: Patrick Mckinney, a picky eater who relishes buttery mac and cheese, crunchy chicken nuggets, and sliced bananas, enjoys quietly helping butter toast with a plastic spreader, and they insist
    on a familiar routine of eating the same three foods for lunch each day.
  core: Patrick Mckinney, a calm and routine‑loving three‑year‑old, organizes toys with surgical precision, saves pennies in a disciplined piggy bank, and they meet the world with gentle, quiet determination.
background:
  cultural: Patrick comes from a white family rooted in the Columbia, South Carolina area. His upbringing reflects Southern values such as politeness, community involvement, and an appreciation for routine,
    with family traditions that include weekend barbecues, church gatherings, and seasonal celebrations. He is exposed to the local climate and outdoor activities common to the region, such as walks in
    Riverbanks Zoo & Garden and community festivals.
