persona_description: A small business owner who specializes in the development and production of innovative electrochemical detection devices for environmental analysis. The business, Mercury Science Inc.,
  is based in Durham, NC and employs a team of experts in the field of electrochemistry. The company's primary focus is on producing conductive, porous membranes with a layer of antibody attached to the
  conductive surface, which will be used in a portable, low-cost, automated potentiostat for electrochemical detection of domoic acid. The company is seeking to adapt colorimetric immunoassays on these
  porous, flow-through electrodes for rapid, low-cost, portable quantitative environmental analysis.
