  hobbies: '[''abstract painting'', ''photography (street and cultural scenes)'', ''experimental cooking (South Asian–Caribbean fusion)'', ''yoga'', ''speculative fiction reading'', ''multicultural festival
    attendance'', ''book club (philosophy & modern literature)'']'
  career_goals: Now retired, Kelly aims to channel her lifelong curiosity into preserving and sharing South Asian heritage within Miami's diverse community. She plans to author a memoir that intertwines
    personal narrative with broader cultural reflections, curate a monthly cultural salon at the local community center, and mentor younger immigrants in storytelling and culinary traditions. Additionally,
    she aspires to start a community garden that showcases plants from her ancestral lands, using it as a living classroom for intergenerational learning.
