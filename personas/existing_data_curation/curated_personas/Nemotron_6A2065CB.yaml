personas:
  professional: An innovative community cultural organizer, Kelly Majumdar blends self‑taught storytelling, multilingual communication, and artistic curation to design intergenerational salons and festivals
    that celebrate shared heritage while fostering Miami’s multicultural dialogue, balancing meticulous planning with spontaneous creative flair.
  sports: Kelly Majumdar cheers for the Miami Heat basketball team, plays weekly pickleball at the community center, follows the local U.S. Open tennis tournament on TV, and incorporates gentle beach walks
    into their fitness routine, preferring low‑impact activities that complement their love of sunrise photography.
  arts: Kelly Majumdar immerses themselves in abstract painting using layered acrylics, frequents the Pérez Art Museum and Wynwood Walls for inspiration, captures street scenes with a vintage Leica, participates
    in a speculative‑fiction book club that discusses authors like N.K. Jemisin and Ted Chiang, and occasionally attends performances by the New World Symphony.
  travel: Kelly Majumdar plans trips with a balance of itineraries and spontaneous detours, favoring the Florida Keys for sunrise snorkeling, Caribbean islands such as Jamaica for spice‑market explorations,
    and has a dream to visit Lisbon’s tile‑laden neighborhoods, often traveling with adult children to share cultural stories while respecting a modest retirement budget.
  culinary: Kelly Majumdar experiments with fusion dishes like turmeric‑infused coconut biryani paired with plantain chips, Jerk‑spiced paneer tacos topped with mango chutney, and lentil stew seasoned with
    allspice and scotch bonnet pepper, demonstrating advanced cooking skills, a love for fresh cilantro, mint, and cardamom, and a penchant for hosting intimate tasting evenings.
  core: Kelly Majumdar is a retired, multilingual cultural curator whose imaginative zest fuels artistic workshops, spice‑laden kitchens, and community gardens, all while juggling a disciplined budget,
    health routines, and a playful habit of late‑night sketching.
background:
  cultural: Kelly was born into a South Asian family with roots in Bangladesh and raised with rich traditions of language, music, and cuisine. Though she completed only a high school education, her culturally
    infused upbringing fostered a deep respect for storytelling, communal gatherings, and culinary arts. After moving to Miami, she has blended her heritage with the vibrant, multicultural tapestry of South
    Florida, embracing both Caribbean influences and the city's artistic scene. Her identity as a South Asian immigrant woman informs her values of family, hospitality, and the importance of preserving
    cultural memory while fostering cross-cultural dialogue.
attributes:
