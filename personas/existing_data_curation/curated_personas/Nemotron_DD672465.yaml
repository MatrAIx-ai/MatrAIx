personas:
  professional: Rosa Rhoads, a sixteen‑year‑old aspiring library technician, leverages meticulous organization and routine‑driven work habits honed through cataloguing at the local public library to excel
    in data entry and shelving, while using basic spreadsheet skills to streamline inventory and budget tasks, positioning themselves for a future as a records clerk or archival manager.
  sports: Rosa Rhoads, a quiet fitness enthusiast, spends Saturday mornings jogging along the Tennessee River Trail, attends a community yoga class for flexibility, and follows the Chattanooga Lookouts
    baseball team on TV while rooting for the Tennessee Titans during football season, preferring low‑key, individual activity over team sports.
  arts: Rosa Rhoads, whose evenings are soundtracked by classic country legends like Johnny Cash and folk icons such as Woody Guthrie, immerses themselves in historical fiction by Ken Follett and biographies
    of Eleanor Roosevelt, and finds creative release in knitting scarves while listening to the dulcimer tones of Alison Krauss, reflecting a deep appreciation for storytelling and traditional American
    music.
  travel: Rosa Rhoads, who meticulously plans trips using spreadsheet itineraries, dreams of exploring colonial Williamsburg and the Gettysburg battlefield for their historical relevance, has already visited
    Savannah, Georgia’s historic district, and hopes to someday tour the libraries of Oxford, England, balancing a love of learning with a modest budget and parental permission.
  culinary: Rosa Rhoads, a methodical baker, perfects chocolate chip cookies and apple‑cinnamon pie using fresh tomatoes from their garden in savory sauces, enjoys simple meals like herb‑infused grilled
    cheese, and follows recipes step‑by‑step, often improvising with rosemary or thyme while keeping a kitchen notebook to record tweaks.
  core: Rosa Rhoads, a routine‑loving sixteen‑year‑old with a penchant for solitary organization, balances meticulous budgeting, methodical gardening, and quiet hobbyist pursuits while quietly charting
    a path toward a stable library career.
background:
  cultural: Rosa comes from a white, Southern family rooted in Chattanooga, Tennessee. Her upbringing reflects traditional Southern values, including strong family ties, regular church involvement (Baptist),
    and a practical, down-to-earth worldview. The community places emphasis on hospitality, modesty, and self-reliance, which have shaped Rosa’s preference for routine and practicality. She grew up in a
    suburban neighborhood where local customs, such as enjoying home-cooked meals, church picnics, and seasonal festivals, play a role in her cultural identity.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Basic budgeting and bookkeeping'', ''Meal preparation'', ''Simple sewing and textile repair'', ''Gardening (vegetable and herb care)'', ''Data
