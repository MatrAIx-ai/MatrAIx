  hobbies: '[''Reading historical fiction'', ''Journaling'', ''Knitting'', ''Gardening (vegetables and herbs)'', ''Puzzle solving (crosswords, jigsaw)'', ''Baking cookies and pies'', ''Listening to classic
    country and folk music'', ''Organizing personal book collection'']'
  career_goals: Rosa aims to obtain her GED within the next year and then enroll in a community college program focused on office administration or library science. She envisions a stable career that allows
    her to use her organizational strengths, such as a records clerk, administrative assistant, or library technician. She also hopes to eventually manage the archival collections of a local historical
    society, preserving the heritage of Chattanooga.
