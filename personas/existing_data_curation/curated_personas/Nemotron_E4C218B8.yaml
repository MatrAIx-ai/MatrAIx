personas:
  professional: Ashton Irvin, a seasoned insurance sales specialist with a STEM background, leverages analytical rigor and persuasive communication to turn actuarial data into compelling client narratives,
    while their curiosity and talkative nature fuel inventive outreach campaigns and energize team meetings.
  sports: Ashton Irvin, an avid golfer who plays every Thursday at Bellerive Golf Club and spends Saturdays hiking the Ozark foothills with their family, also roots for the St. Louis Cardinals and St. Louis
    Blues, balancing structured practice with spontaneous weekend trail runs to stay fit.
  arts: Ashton Irvin, a regular at the St. Louis Art Museum and participant in community theater, draws inspiration from contemporary installations by Ai Weiwei and the kinetic works of Yayoi Kusama, often
    quoting favorite lines from Meryl Streep performances at dinner parties.
  travel: Ashton Irvin plans trips with a blend of careful budgeting and spur‑of‑the‑moment adventures, having trekked the Great Smoky Mountains, explored the culinary scene of New Orleans, and dreaming
    of seeing the Northern Lights over Iceland while balancing family commitments.
  culinary: Ashton Irvin, a home‑brew enthusiast, enjoys crafting IPAs with citrus hops and pairing them with smoky Kansas City‑style ribs, grilled salmon seasoned with rosemary and smoked paprika, and
    a occasional slice of St. Louis‑style pizza topped with Provel cheese.
  core: Ashton Irvin is a curiosity‑driven, talkative competitor who blends insurance expertise, artistic flair, and a love for golf into a vibrant, sometimes cheeky, approach to life.
background:
  cultural: 'Ashton grew up in a middle‑class, predominantly white suburb of St. Louis and remains rooted in Midwest cultural values: community involvement, modesty, and a strong work ethic. His family
    traditions combine typical American holidays with regional customs, such as attending the annual St. Louis Fair and supporting the Cardinals. He and his wife maintain close ties to extended family,
    frequently hosting gatherings that blend Southern‑influenced barbecues with Midwestern comfort food. While his upbringing emphasized self‑reliance, his adult life reflects an openness to diverse viewpoints,
    cultivated through travel and exposure to the arts, which informs his progressive, yet grounded, worldview.'
