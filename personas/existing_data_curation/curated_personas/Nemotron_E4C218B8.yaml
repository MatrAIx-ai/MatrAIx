  career_goals: He aims to move from high‑volume personal lines sales into a regional leadership role, overseeing a team of agents and shaping the agency’s strategic growth in the Midwest. Over the next
    five years he plans to earn a professional insurance designation (e.g., CPCU) and to spearhead an integrated digital‑sales platform that leverages data analytics for personalized policy recommendations.
    Driven by a competitive streak, he targets becoming the top‑ranked agent in his market, while ultimately aspiring to a senior management position where he can mentor younger agents, influence product
    development, and contribute to the company’s expansion with an emphasis on ethical, results‑focused selling.
