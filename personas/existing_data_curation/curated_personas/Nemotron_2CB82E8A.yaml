  career_goals: Although retired from formal employment, Kayla aims to deepen her impact on the Victorville community. She plans to develop a locally focused historical blog that documents high‑desert heritage,
    leveraging her research and writing skills to publish articles in the regional newspaper. Kayla also aspires to mentor younger volunteers, teaching them practical event‑planning and budgeting techniques
    while encouraging critical, evidence‑based thinking. She intends to expand her digital fluency by learning basic web‑design and social‑media management, enabling her to create an online resource hub
    for senior residents. Additionally, Kayla hopes to author a memoir that weaves together her family’s genealogy with broader mid‑century American cultural shifts, preserving personal and communal stories
    for future generations.
