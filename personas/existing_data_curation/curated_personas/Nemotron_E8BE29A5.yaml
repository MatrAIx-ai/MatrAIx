personas:
  professional: Norman Davis is a veteran humanities professor who designs interdisciplinary curricula that blend literature and visual culture of the African diaspora with digital‑humanities platforms
    like Omeka and Voyant; their flexible, improvisational lecture style reflects a relaxed attitude toward rigid planning, while a competitive drive fuels their pursuit of research grants, a distinguished
    chair position, and the Outstanding Teacher award; they also curate community art exhibitions and mentor emerging faculty with a one‑on‑one, discussion‑focused approach.
  sports: Norman Davis stays fit through low‑impact activities, regularly walking sections of the Natchez Trace in the cooler months and playing doubles tennis at the Covington Senior Club, which competes
    in the local recreation league; they are an avid fan of the Nashville Predators and the University of Tennessee Volunteers football, preferring to watch games in intimate gatherings at a neighborhood
    bar rather than large stadium crowds.
  arts: Norman Davis immerses themselves in the arts by listening to John Coltrane and Miles Davis on their cherished vintage vinyl collection, improvising on a well‑worn saxophone in a home studio, sketching
    urban and rural landscapes inspired by Edward Hopper, experimenting with analog photography of Natchez Trace foliage, and curating community art shows that showcase regional painters such as Sarah Collins;
    they also frequently read contemporary poets and novelists exploring the African diaspora, finding inspiration for their own short stories.
  travel: Norman Davis prefers thoughtfully planned, culturally rich trips that balance solitary research with small‑group experiences, having journeyed to New Orleans to explore its historic jazz scene,
    Boston’s Beacon Hill to visit literary cafés, and Memphis to tour the Civil Rights Museum; they dream of a research pilgrimage to the Schomburg Center in Harlem and a photography expedition to the Scottish
    Highlands, always arranging itineraries that include quiet reading spots and local culinary highlights.
  culinary: Norman Davis enjoys cultivating heirloom tomatoes and basil in a modest garden, which they often turn into a slow‑roasted tomato bisque seasoned with oregano and garlic, and they excel at preparing
    herb‑crusted chicken using rosemary, thyme, and lemon zest; their palate also favors classic Southern comfort dishes like shrimp and grits, albeit with experimental spice rubs, though occasional distraction
    leads to a slightly overcooked rice grain or a burnt edge on a skillet.
  core: Norman Davis is a quietly competitive, curiosity‑driven humanities scholar who balances rigorous interdisciplinary teaching with improvisational jazz, solitary hikes, and a penchant for vintage
    vinyl collecting.
background:
  cultural: Norman was born in the Memphis metropolitan area of Tennessee and raised in a tight‑knit Southern Black community. His parents were active participants in the civil‑rights movement of the 1960s,
    and the family’s life centered around the church, gospel music, and a rich oral‑storytelling tradition. Growing up, he absorbed the rhythms of blues and jazz from local radio and community festivals
    that celebrated African‑American heritage. These formative experiences fostered a lifelong appreciation for Black literary and visual arts, a perspective he brings to his teaching and research. In Covington,
    he remains engaged with local cultural institutions, serving as a mentor for Black youth, collaborating with the Tipton County Historical Society on exhibitions of African‑American folk art, and participating
    in the town’s Black History commemorations.
attributes:
  skills: '[''Curriculum Development'', ''Interdisciplinary Course Design'', ''Seminar Facilitation'', ''Critical Literary Analysis'', ''African American Cultural Studies'', ''Archival Research'', ''Oral
    History Methodology'', ''Digital Humanities (Omeka, Voyant)'', ''Art Curation'', ''Grant Writing'', ''Student Mentorship'', ''Public Speaking'', ''Community Outreach'', ''Collaborative Project Management'']'
  hobbies: '[''Reading (African‑American literature, poetry)'', ''Jazz and blues listening'', ''Saxophone improvisation'', ''Sketching and drawing'', ''Photography'', ''Gardening (heirloom tomatoes and
    herbs)'', ''Walking/hiking on Natchez Trace'', ''Chess'', ''Puzzle games'', ''Writing short stories'', ''Collecting vintage vinyl records'', ''Volunteering as a reading mentor (small‑group literacy
    program)'']'
  career_goals: Looking ahead, Norman aims to leverage his competitive drive and scholarly curiosity to secure a distinguished professorship or a named chair in the humanities at his college. He plans to
    launch a community‑engaged interdisciplinary program that pairs classroom study of Black literature and visual culture with hands‑on collaborations with local museums and arts nonprofits. Securing a
    major research grant to document the folk‑art traditions of African‑American families in Tipton County is a top priority, as is publishing a monograph on Southern Black literary voices. He also aspires
    to earn the college’s Outstanding Teacher award, mentor emerging faculty, and, when he eventually transitions to part‑time, devote more time to curating an annual local art exhibition and writing a
    memoir that reflects on his experiences as a Black educator in the South. Throughout, he prefers to shape these initiatives with minimal administrative constraints, allowing him to adapt quickly to
    new ideas.
