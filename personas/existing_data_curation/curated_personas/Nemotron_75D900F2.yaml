personas:
  professional: David Snedaker, a 20‑year‑old construction laborer in the Jacksonville‑Onslow area, blends hands‑on expertise in concrete mixing, framing, and equipment operation with an artist’s eye for
    design, letting their curiosity and competitive streak drive them to suggest aesthetic upgrades on site while their relaxed, disorganized work habits are balanced by raw physical stamina and a willingness
    to learn on the fly.
  sports: David Snedaker fuels their competitive spirit by playing pickup basketball at the local YMCA, cheering for the Jacksonville Jaguars and UNC Tar Heels during the football and college basketball
    seasons, and joining a seasonal beach volleyball league in the summer, balancing solo jogs along Onslow County creeks with team‑oriented drills.
  arts: David Snedaker channels their love for indie rock (such as Arctic Monkeys) and lo‑fi beats (like Nujabes) into sketching street scenes at Marine Corps Base festivals, drawing inspiration from local
    muralist crews and the vibrant works of Banksy, while they regularly attend community art fairs, where they swap ideas with fellow creators and collect limited‑edition prints.
  travel: David Snedaker prefers low‑budget road trips that mix art and nature, having explored the historic streets of Savannah, the mountain trails of Asheville, and the coastal creeks of Onslow County,
    while dreaming of a future visit to Copenhagen to study its green‑architecture model and a road‑trip across the Pacific Northwest’s indie‑music festivals.
  culinary: David Snedaker enjoys cooking low‑key comfort meals like shrimp‑and‑grits with smoked paprika, fish tacos topped with fresh cilantro and lime, and wood‑fired pizza topped with basil and mozzarella,
    using fresh local catch from Onslow creeks and often pairing the dishes with a cold craft IPA, though they admit they rarely follow recipes strictly, preferring to wing it with a sketch‑like spontaneity.
  core: David Snedaker is a hands‑on construction worker with a sketchbook‑filled mind, whose competitive drive and artistic curiosity clash with a laid‑back, sometimes disorganized lifestyle, leading them
    to hustle for a future green‑home business while constantly worrying about stability.
background:
  cultural: David grew up in Hubert, a small, close‑knit town in Onslow County, North Carolina. The region blends traditional southern rural culture—home‑cooked BBQs, church gatherings, and high school
    sports—with the unique influence of the nearby Marine Corps Base Camp Lejeune, which brings a transient military presence and a respect for discipline. As a white Southern male, he was raised with a
    strong work ethic, a love for the outdoors, and an appreciation for community events like county fairs and local concerts. At the same time, his exposure to the diverse families stationed at the base
    sparked an early curiosity about different artistic expressions and unconventional ideas, shaping his blend of practical Southern values and an open‑minded, exploratory outlook.
attributes:
  skills: '["concrete mixing and pouring", "framing and carpentry", "drywall installation", "basic roof shingle work", "blueprint interpretation", "OSHA safety compliance", "skid‑steer loader operation",
    "equipment maintenance", "DIY home repair", "hand sketching for design concepts"]'
  hobbies: '["sketching and drawing", "visiting art fairs and installations", "DIY woodworking projects", "fishing in Onslow County", "playing pickup basketball", "online multiplayer gaming", "listening
    to indie and lo‑fi music"]'
  career_goals: David aims to turn his on‑the‑job experience into a formal trade credential within the next two years, targeting an apprenticeship in carpentry or a journeyman certification in concrete
    finishing. He is competitive and wants to become a foreman on a regional construction crew, eventually launching his own small‑scale custom‑home building firm that blends functional construction with
    artistic design elements. His curiosity drives him to experiment with sustainable building materials, and he hopes to one day design a “green‑art‑home” that reflects his love for aesthetics while providing
    high performance. While he worries about job stability, he plans to build a portfolio of completed projects to attract private clients and secure a steady income.
