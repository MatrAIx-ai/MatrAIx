  hobbies: '[''Visiting Art Galleries'', ''Bachata and Merengue Dancing'', ''Cooking Dominican Cuisine'', ''Reading Contemporary Fiction and Diaspora Literature'', ''Hiking'', ''Yoga'', ''Gardening'', ''Community
    Theater Participation'']'
  career_goals: Vilma aims to earn an educational leadership certification and move into a principal role within Cobb County schools, where she can expand multilingual instruction and forge sustainable
    partnerships with local arts organizations. She plans to develop a district‑wide bilingual curriculum modeled on her classroom successes, secure ongoing funding for community‑based arts initiatives,
    and mentor emerging teachers in culturally responsive practice. Over the long term, she hopes to contribute research on the impact of arts integration on student resilience and become a champion for
    equity and inclusive education at the policy level.
