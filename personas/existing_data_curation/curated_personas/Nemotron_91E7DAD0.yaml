personas:
  professional: Vilma Riverarivera, a bilingual elementary and middle‑school educator and curriculum designer, blends data‑driven decision‑making with arts‑integrated, culturally responsive pedagogy, leveraging
    grant‑writing expertise and a collaborative spirit to build community partnerships and champion equity in Cobb County schools, and they are known for their curiosity and compassionate leadership.
  sports: Vilma Riverarivera enjoys weekend hikes in the Appalachian foothills with the Smyrna Trailblazers club, follows the Atlanta Braves, Falcons, and Hawks for baseball, football, and basketball, and
    participates in a local adult recreational soccer league, blending competitive spirit with a love for outdoor endurance, and they relish the social camaraderie these activities provide.
  arts: Vilma Riverarivera frequents the Fox Theatre for live performances, draws inspiration from contemporary playwrights like Alice Birch and visual artists such as Kehinde Wiley, and incorporates bachata
    and merengue rhythms into classroom projects, using these artistic experiences to foster cultural pride and creative confidence among her students, and they often share insights from recent exhibitions
    during staff meetings.
  travel: Vilma Riverarivera, an avid planner who balances school responsibilities with family visits, has trekked the historic streets of Old San Juan, explored the art districts of Barcelona, and dreams
    of hiking the Inca Trail in Peru, preferring culturally immersive trips that blend culinary discovery with community exchange, and they meticulously craft itineraries that allow for both structured
    learning and spontaneous adventure.
  culinary: Vilma Riverarivera, a confident home chef, perfects island staples like sancocho, mangú, and pastelitos using fresh cilantro, plantains, and yucca from their vegetable garden, while also experimenting
    with Mediterranean dishes such as ratatouille, reflecting a love for both tradition and culinary innovation, and they often host neighborhood potlucks where recipes are exchanged and stories shared.
  core: Vilma Riverarivera merges a teacher’s analytical mindset with a dancer’s vibrant energy, constantly juggling grant proposals, garden chores, and spontaneous salsa evenings, all while occasionally
    forgetting to water the indoor succulents, and they laugh it off as part of their busy rhythm.
background:
  cultural: Raised by Dominican immigrants, Vilma grew up bilingual and immersed in the island’s music, dance, food, and strong communal values. She celebrates traditions such as Carnaval, merengue, and
    bachata, and she carries forward the Dominican emphasis on family solidarity and community support. In her teaching, she weaves Dominican stories, proverbs, and rhythms into lessons to foster multicultural
    awareness and give Dominican‑American students a sense of belonging. She actively volunteers at local Dominican festivals, serves as a liaison between the school and immigrant families, and promotes
    cultural exchange initiatives that bridge her heritage with her role as an educator.
attributes:
  skills: '[''Curriculum Design'', ''Differentiated Instruction'', ''Bilingual Education (Spanish-English)'', ''Classroom Management'', ''Formative Assessment'', ''Summative Assessment'', ''Data‑Driven
