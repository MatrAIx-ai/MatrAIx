persona_description: A journalist or historian who is interested in the history of the British film industry, particularly the events surrounding the Diamond Jubilee of Queen Victoria in 1897. The person
  is knowledgeable about the various film companies that were present during the procession, their positions, and the films they produced. They are also interested in the development of scientific photography
  and the preservation of historical events through motion picture film. They are likely to be familiar with the work of John Barnes and other historians who specialize in this area.
