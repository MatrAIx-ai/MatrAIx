persona_description: A historical archaeologist interested in the ancient practices and traditions of the Yoruba people, particularly their migration patterns and cultural significance. This person is fascinated
  by the story of Olofin and his followers' journey from Ile-Ife to present-day Lagos, Nigeria, and the name Awori that was given to their clan. They are intrigued by the cultural significance of the mud
  plate and its journey, and how it relates to the Yoruba people's history and traditions. This persona is likely to be interested in studying the Yoruba people's history, their cultural practices, and
  their migration patterns, and how they have influenced the present-day Lagos State.
