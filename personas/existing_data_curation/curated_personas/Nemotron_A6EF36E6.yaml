    apps'', ''Data logging and performance analysis'']'
  hobbies: '[''Street photography'', ''Visiting local art galleries and street murals'', ''Reading contemporary Vietnamese literature'', ''Cooking traditional Vietnamese dishes'', ''Listening to podcasts
    on art, design, and technology'', ''Yoga and mindfulness meditation'', ''Participating in small board‑game gatherings'']'
  career_goals: Minh aims to transition from solo taxi driving to a leadership role in transportation. Within two years he plans to obtain a commercial driver’s license (CDL) and become a certified driver
    trainer, using his organized approach to teach safety and customer‑service standards. He also envisions launching a boutique ride‑share service that highlights San Jose’s multicultural art scene, offering
    curated playlists and information about local galleries to passengers. Long‑term, he hopes to open a modest coffee‑and‑gallery space that fuses his love for art, cooking, and community networking with
    other Vietnamese‑American entrepreneurs. To support these ambitions, he is taking evening courses in small‑business management and attending mindfulness workshops to better manage stress and improve
    decision‑making under pressure.
