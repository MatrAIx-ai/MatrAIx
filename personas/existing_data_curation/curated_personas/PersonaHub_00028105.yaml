persona_description: An economics professor and department head at Virginia Tech who has conducted extensive research on the relationship between women's representation in government and corruption. Her
  research is particularly focused on the presence of women in other occupations, including the shares of women in the labor force, clerical positions, and decision-making positions such as CEOs and other
  managerial positions. Her findings suggest that women's presence in these positions is not significantly associated with corruption, indicating that it is the policymaking role through which women are
  able to have an impact on corruption.
