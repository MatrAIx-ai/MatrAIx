persona_description: Tommie Shelby is a scholar and social activist who specializes in the study of social justice and urban poverty. He is a liberal-egalitarian philosopher who draws on leading social
  science research to examine the thorny questions of political morality raised by ghettos. Shelby's work challenges the traditional approach to addressing urban poverty by focusing on the fundamental questions
  of justice and the role of government in fostering integrated neighborhoods. He views the oppressed as allies in the fight for a society that warrants everyone's allegiance and advocates for the abolition
  of ghettos as evidence of structural injustices that demand immediate rectification.
