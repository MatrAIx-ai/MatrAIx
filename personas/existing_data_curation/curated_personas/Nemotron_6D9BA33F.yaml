  arts: Jess Large, a one-year-old infant, loves brightly illustrated picture books and classic lullabies such as Brahms' Lullaby, and they frequently sway to Sesame Street melodies and soft acoustic versions
    of Taylor Swift songs that parents play during cuddle time.
  travel: Jess Large, a one-year-old infant, has visited the local zoo, enjoyed a beach day at Santa Monica, and stayed in a nearby cabin for a weekend getaway, and they look forward to a future family
    trip to Disney World's Magic Kingdom once they're old enough to experience the rides.
  culinary: Jess Large, a one-year-old infant, favors smooth, naturally sweet foods like avocado puree, banana mash, and apple sauce, and they eagerly self-feed with a tiny spoon despite the inevitable
    mess, while occasional oatmeal cereal with a dash of cinnamon adds a warm comfort to their meals.
  core: Jess Large, a one-year-old infant, embodies serene confidence through a love of routine, balancing a calm temperament with surprising assertiveness when a favorite toy is out of reach, and they
    delight in predictable patterns that shape their daily world.
