  career_goals: Christina dreams of a career that blends her curiosity about the natural world with her practical mindset. She aspires to become a wildlife biologist or environmental scientist, hoping to
    conduct field research and develop conservation solutions. She also imagines working as a STEM educator, sharing her love of organized learning and hands‑on experiments with younger students. In the
    short term, she aims to earn top grades, win a school science fair, and earn a scholarship for a summer robotics camp.
