  career_goals: As he grows, Sean aspires to a career that blends his practical mindset with his strong desire to help others. He dreams of becoming a teacher or a pediatric health aide, roles where he
    can provide steady support to children and maintain a predictable, organized environment. He is also curious about veterinary work because of his love for his dog and the idea of caring for animals.
    Ultimately, he wants a profession that offers clear routines, a supportive community, and the chance to make a positive difference.
