personas:
  professional: Sean Truong is a diligent young builder, budding Scratch coder, and piano apprentice who channels his love for step‑by‑step problem solving into assembling complex LEGO sets and collaborating
    on school robotics projects, all while keeping a tidy schedule that balances creativity with responsibility.
  sports: Sean Truong enthusiastically plays for the neighborhood Tigers Youth Soccer Club, roots for the Seattle Seahawks, and spends weekends jogging the dog in the local park, using the routine of warm‑ups
    and team drills to channel their competitive spirit while staying grounded.
  arts: Sean Truong delights in diving into graphic novels like 'Amulet' and 'Dog Man', practicing piano pieces by Yiruma and The Piano Guys, and drawing inspiration from the whimsical art of Studio Ghibli,
    which fuels both their storytelling imagination and their orderly approach to creative projects.
  travel: Sean Truong prefers meticulously planned family trips, such as the structured day‑by‑day itinerary of a recent Yellowstone National Park adventure and a culturally rich weekend in a nearby city
    where they helped roll spring rolls with relatives, while dreaming of a future organized tour of the castles along the Rhine River.
  culinary: Sean Truong enjoys mastering family‑style spring rolls with rice paper, vermicelli, shrimp, and fresh mint, experiments with simple spaghetti carbonara using pancetta and Parmesan, and values
    the satisfaction of following exact recipes, though they occasionally forget to rinse the lettuce and end up with soggy rolls.
  core: Sean Truong is a detail‑obsessed 11‑year‑old who blends a love for routines and teamwork with a quiet worry that fuels both meticulous LEGO builds and compassionate friendship, all while juggling
    piano practice, garden pauses, and a penchant for double‑checking every step.
background:
  cultural: Sean’s family comes from a Southeast Asian background, most likely Vietnamese, and they maintain bilingual communication at home, speaking Vietnamese alongside English. Their household values
    respect for elders, family cohesion, and the celebration of cultural festivals such as Tet, where Sean helps prepare food and decorate the home. Living in Glendale, Arizona, Sean navigates a multicultural
    environment, attending a diverse public school and participating in community events that blend American and Southeast Asian traditions. This blend of heritage and local culture shapes his worldview,
    giving him a strong sense of identity while fostering adaptability and openness.
