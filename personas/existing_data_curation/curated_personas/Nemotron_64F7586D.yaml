personas:
  professional: Raven Young, an aspiring wildlife biologist, channels curiosity and practicality into school science club projects and volunteer work at the county animal shelter, meticulously recording
    observations and organizing data while balancing creativity with methodical planning.
  sports: Raven Young, an enthusiastic junior hiker and member of the Jackson Trailblazers youth outdoor club, enjoys weekend treks in the nearby state forest, follows the Jackson Generals baseball team
    for community spirit, and practices basic calisthenics at home to stay fit.
  arts: Raven Young, a budding ukulele player and wildlife sketcher, draws inspiration from the soothing folk tunes of Jack Johnson and the detailed bird illustrations of John James Audubon, while crafting
    friendship bracelets that reflect their love for gentle creativity.
  travel: Raven Young, a nature‑focused traveler, delights in family road trips to the Great Smoky Mountains and weekend camping at Natchez Trace, while dreaming of future adventures to Yellowstone’s geysers
    and the coastal cliffs of Acadia.
  culinary: Raven Young, a modest home‑chef, favors wholesome snacks like trail mix with dried berries, almonds and granola, enjoys helping prepare fresh strawberry crumbles, and loves the occasional cheesy
    pizza after a long hike.
  core: Raven Young blends quiet curiosity with practical organization, turning solitary woodland explorations and ukulele melodies into a balanced life of learning, kindness, and modest habits.
background:
  cultural: Raven grew up in a rural part of Lee County, Kentucky, within a close‑knit white Appalachian community. Family gatherings, church socials, and seasonal festivals are central to her social life,
    emphasizing cooperation, modesty, and a strong work ethic. The region’s natural landscape—forests, streams, and rolling hills—has shaped her love for outdoor activities and respect for the environment.
    Local traditions of storytelling, folk music, and hands‑on craftwork are part of her upbringing, while the community’s emphasis on self‑reliance and helping neighbours reinforces her considerate and
    reliable nature.
