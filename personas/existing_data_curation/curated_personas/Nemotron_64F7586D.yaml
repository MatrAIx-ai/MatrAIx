  career_goals: Raven aspires to work with animals and the environment in a hands-on capacity. She dreams of becoming a wildlife rehabilitator or a park ranger, roles that let her combine her curiosity
    about nature with practical problem-solving. She also envisions studying environmental science in high school and later pursuing a degree that enables her to protect habitats while educating her community
    about conservation. Her long-term ambition is to create programs that help local youth connect with nature in safe, organized ways.
