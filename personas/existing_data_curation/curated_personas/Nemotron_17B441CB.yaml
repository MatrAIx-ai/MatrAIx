  career_goals: Alex aims to earn his GED within the next year and enroll in a community‑college associate program in information technology or automotive technology. He aspires to become a certified IT
    support specialist while simultaneously growing a freelance digital‑content business that produces promotional videos for local small businesses. In the longer term, he envisions launching a community‑event
    planning firm that organizes local festivals, school functions, and charity drives, combining his love for social interaction, organization, and practical problem‑solving. He also hopes to give back
    by mentoring younger teens in his hometown through technology workshops and community service projects.
