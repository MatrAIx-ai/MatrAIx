  career_goals: He aims to advance into a senior technologist or supervisory role within the manufacturing sector, leading process‑improvement initiatives and adopting Industry 4.0 technologies. Over the
    next five years he plans to earn certifications such as Certified Engineering Technician (CET) and Six Sigma Green Belt, and to complete an engineering management certificate program to qualify for
    a plant manager track. He also envisions leveraging his communication strengths to become a liaison between engineering and operations, and eventually to start a consultancy focused on optimizing small‑to‑mid‑size
    manufacturing firms in Central Texas.
