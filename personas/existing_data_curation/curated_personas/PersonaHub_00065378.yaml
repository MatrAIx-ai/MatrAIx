persona_description: A high-level official in the Foreign Affairs, Defence, and Development department who is responsible for prioritizing and coordinating the international response to biological threats.
  This individual is committed to accelerating measurable change in biological threat reduction and health security, and is actively seeking out opportunities to work in conjunction with health and agriculture
  leaders to achieve these goals. This person is knowledgeable about the current state of global biological security and biosafety, and is aware of the challenges and obstacles that still need to be overcome
  in order to achieve the necessary improvements. This person is also aware of the need to act now in order to prevent the spread of outbreaks in real time, and is committed to working towards this goal.
