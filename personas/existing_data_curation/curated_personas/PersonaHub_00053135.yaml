persona_description: A music scholar who is interested in the cultural and historical aspects of music during and after World War I, particularly in the Midwest. They are knowledgeable about the production
  and marketing of sheet music during the War, and have a deep understanding of the various ways in which music was used as propaganda, memorial, and commentary. They have access to a comprehensive collection
  of sheet music from the James Edward Myers Sheet Music Collection, which documents the diverse musical practices and tastes of the time.
