  hobbies: '[''Visiting art galleries and museums'', ''Attending art lectures'', ''Gardening'', ''Woodworking'', ''Knitting'', ''Reading historical biographies'', ''Community theater involvement'', ''Journaling'',
    ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Although retired, Janet aims to continue lifelong learning by enrolling in University of Indiana continuing‑education courses on art history and digital archiving, serve as a docent at the
    Indiana University Art Museum, mentor younger volunteers in local historical societies, and eventually compile a memoir that intertwines her personal history with the cultural evolution of Bloomington.
