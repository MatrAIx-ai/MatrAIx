personas:
  professional: Janet Ratton, a retired archival manager turned community docent, they leverage their meticulous organizational skills, budgeting acumen, and deep art‑history knowledge to design seamless
    museum tours and volunteer workshops, while their curiosity and disciplined nature ensure every exhibit narrative meets exacting scholarly standards.
  sports: Janet Ratton, an avid supporter of local sports, they follow the Indiana Hoosiers basketball season with spirited devotion, tune in to the Chicago Bears each fall, and stay active by walking three
    miles daily with the Bloomington Senior Stroll Club, while favoring low‑impact yoga classes at the community center for fitness.
  arts: Janet Ratton, a lifelong art enthusiast, they immerse themselves in galleries featuring Monet and Georgia O'Keeffe, attend lectures on Ai Weiwei’s installations, cherish Beethoven symphonies on
    vinyl, and coordinate lighting backstage for community theater productions of Arthur Miller’s plays, shaping their identity through a blend of classic and contemporary cultural experiences.
  travel: Janet Ratton, a traveler who values careful planning and comfort, they enjoy leisurely, culturally immersive trips such as a spring weekend at Chicago’s Art Institute and a summer visit to the
    French Loire Valley’s châteaux, while dreaming of a slow‑paced pilgrimage to Kyoto’s historic temples during the autumn foliage.
  culinary: Janet Ratton, a confident home cook, they delight in preparing rosemary‑infused roast chicken, homemade apple‑cinnamon pie, and creamy beet soup, and regularly savor farm‑to‑table meals at Bloomington’s
    Harvest Café, where seasonal dishes showcase locally sourced corn, heirloom tomatoes, and fresh farm cheeses.
  core: Janet Ratton balances a disciplined archivist’s mind with a playful curiosity for art, they often lose hours to crossword puzzles while occasionally forgetting to water their begonias.
background:
  cultural: Janet is a second‑generation Midwestern American of Anglo‑German heritage. Raised in a small town near Bloomington, she grew up with strong community values, a respect for self‑reliance, and
    an affection for local traditions such as county fairs, church gatherings, and historic preservation efforts. Her Indiana upbringing, combined with a lifelong curiosity about the arts, informs her balanced
    perspective that honors tradition while remaining open to unconventional ideas.
attributes:
  skills: '[''Administrative organization'', ''Archival management'', ''Event planning'', ''Community outreach'', ''Art history knowledge'', ''Budgeting and finance'', ''Volunteer coordination'', ''Workshop
