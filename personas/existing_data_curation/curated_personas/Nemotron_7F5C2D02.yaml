  hobbies: '[''Heirloom Gardening'', ''Quilting'', ''Book Club Leadership'', ''Crossword Puzzles'', ''Bird Watching'', ''Digital Photography'', ''Genealogy Research'', ''Senior Dance Nights'', ''Cooking
    International Cuisine'', ''Learning New Technology'', ''Volunteering at the Local Library'', ''Participating in Community History Tours'']'
  career_goals: Kim’s current ambition is to leave a lasting impact on her community by establishing an intergenerational STEM mentorship program that pairs high‑school students with senior volunteers.
    She also hopes to document her life story and the lessons learned from a career in engineering, publishing a memoir for her grandchildren. Continuing to support local charities, she aims to expand the
    seniors’ activity center, promote lifelong learning, and stay physically active for the years ahead.
