personas:
  professional: Mike Walser, a 34‑year‑old aspiring freelance event curator, leverages their curiosity, improvisational problem‑solving, and natural talent for rallying groups to design low‑budget pop‑up
    art spaces and community installations, while battling a penchant for last‑minute deadlines and chaotic organization.
  sports: Mike Walser, a 34‑year‑old Pittsburgh enthusiast, roots for the Steelers and Penguins, attends weekly watch parties at the local bar, participates in adult kayaking tournaments on the three rivers,
    and occasionally joins a recreational basketball league, yet their competitive streak makes them more of a fervent fan than a teammate.
  arts: Mike Walser, 34, immerses themselves in the city’s cultural pulse by roaming the Carnegie Museum of Art, catching live shows by The Clarks, honing improv at the Pittsburgh Playhouse, snapping urban
    photographs inspired by street‑artist Banksy and photographer Vivian Maier, and curating pop‑up installations that blend woodworking with community art.
  travel: Mike Walser, at 34, prefers weekend road trips that mix adventure and food, having kayaked the Allegheny River, explored the historic steel towns of Youngstown, day‑tripped to Niagara Falls, and
    dreaming of a summer stint in New Orleans to soak up jazz and Cajun cuisine, all while budgeting travel around bar‑trivia cash prizes.
  culinary: Mike Walser, 34, experiments in the kitchen with pierogies stuffed with sautéed spinach and feta, crafts signature Primanti‑style sandwiches using house‑made coleslaw and locally sourced steak,
    brews craft IPAs with hints of orange peel, and frequently hosts potluck game nights where their culinary improvisations are both praised and occasionally over‑spiced.
  core: Mike Walser, a 34‑year‑old curiosity‑driven social catalyst, channels competitive energy into spontaneous art events while juggling anxiety, impulsive spending, and a perpetual battle against disorganization.
background:
  cultural: Mike grew up in a modest, working‑class neighborhood on Pittsburgh’s South Side. His family’s roots trace back to Polish‑American and Irish immigrants who worked in the steel mills, giving him
    a strong blue‑collar work ethic and a straightforward sense of humor. He internalized the city’s "steel‑town" ethos of perseverance, community solidarity, and the familiar Pittsburgh lilt (including
    the use of "yinz"). At the same time, he was drawn to the city’s vibrant arts resurgence—especially the Three Rivers Arts Festival, local murals, and the thriving music scene. He proudly enjoys regional
    staples like pierogies, Primanti sandwiches, and cheering on the Steelers, while also embracing the city’s growing reputation for creative experimentation and unconventional expression.
