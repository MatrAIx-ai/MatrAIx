  career_goals: Mike aims to turn his curiosity and community spirit into a career by launching a pop‑up art space that showcases local talent and hosts spontaneous interactive events. He aspires to become
    a freelance event curator for Pittsburgh’s festivals, building a reputation for inventive, low‑budget installations. Parallel to that, he wants to develop a small business that blends custom woodworking
    with art commissions for cafés and boutique venues. Over the next few years he plans to build a strong portfolio of urban photography and seek part‑time work at a museum or cultural institution, leveraging
    his informal expertise while gaining more stability. He also hopes to complete a few community‑college courses in arts management to formalize his skills.
