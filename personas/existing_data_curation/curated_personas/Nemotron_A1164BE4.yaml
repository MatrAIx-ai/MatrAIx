  career_goals: Allice dreams of growing up to become a teacher or a youth soccer coach, roles where he can plan lessons, organize activities, and motivate other children. He also imagines one day serving
    his community as a mayor or community organizer, using his love for structure and talking to bring people together and create fun, well‑planned events.
