personas:
  professional: Allice Depagnier is an aspiring junior soccer captain and LEGO architect whose methodical planning, love of structure, and talkative confidence turn playground games into organized mini‑projects,
    making them the go‑to leader in group activities, and they thrive on being the focal point.
  sports: Allice Depagnier plays forward for the Little Eagles youth soccer club and idolizes FC Barcelona; they approach each practice with a meticulous warm‑up routine and a competitive drive that makes
    them eager to score and lead the team.
  arts: Allice Depagnier delights in drawing colorful scenes inspired by Disney’s Frozen and Pixar’s Toy Story; they perform in school plays and karaoke with energetic renditions of Let It Go, and swap
    bilingual picture books that blend simple Spanish and English text.
  travel: Allice Depagnier enjoys family trips to the local zoo and the beach at Ocean City, and dreams of visiting Disneyland; they favor itineraries with scheduled activity blocks that keep the adventure
    organized and predictable.
  culinary: Allice Depagnier loves cheesy macaroni, pepperoni pizza topped with mozzarella, and banana‑strawberry smoothies; they often help stir the batter and proudly add sprinkles to cupcakes.
  core: Allice Depagnier is a talkative, structure‑loving six‑year‑old who blends competitive energy with a friendly flair, turning every game, craft, or song into a meticulously organized, socially vibrant
    performance; they thrive on clear rules and the excitement of being the center of attention.
background:
  cultural: Allice is raised in a Honduran‑American household in Roswell, Georgia. At home, Spanish is spoken alongside English, and the family celebrates Honduran traditions such as Día de la Independencia
    with music, dance, and homemade baleadas. He enjoys Honduran holidays, visits a local cultural center for community events, and helps prepare traditional foods like plátanos. At the same time, Allice
    participates in Southern U.S. customs, including Thanksgiving and local school activities, giving him a blended cultural identity that values family, community, and both Spanish‑ and English‑language
    experiences.
