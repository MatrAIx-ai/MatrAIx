  career_goals: Ernesto dreams of a future where he can combine his love for art and helping others. He imagines becoming an artist who creates bright, uplifting illustrations for children's books, or a
    teacher who inspires curiosity in a classroom. He is also fascinated by space and science, hoping one day to be an astronaut who draws planets and shares stories about the universe. Above all, he wants
    to grow into someone who can comfort friends when they feel sad, perhaps as a community mentor or counselor.
