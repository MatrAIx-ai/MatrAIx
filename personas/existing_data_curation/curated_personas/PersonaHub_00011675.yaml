persona_description: A tax lawyer or a tax consultant who specializes in international tax disputes and is familiar with tax conventions, particularly those related to the Mutual Agreement Procedure (MAP).
  They have experience in interpreting and applying tax conventions and are skilled in resolving disputes involving double taxation and inconsistencies in the interpretation and application of a convention.
  They are familiar with the use of arbitration clauses in the MAP article and are aware of the current limitations and challenges in their use. They are also aware of the potential for changes in the future,
  such as the OECD considering changes to the OECD Model Tax Convention to update guidance on supplementary dispute resolution mechanisms for MAP.
