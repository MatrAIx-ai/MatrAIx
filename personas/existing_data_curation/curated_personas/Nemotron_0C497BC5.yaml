  career_goals: Molly aspires to blend her love of structure, helping others, and competitive challenge. She dreams of becoming a teacher or elementary school librarian, roles that allow her to organize
    learning environments and support peers. She also imagines herself as an engineer or scientist who solves practical problems, motivated by seeing tangible results. In the short term, she aims to win
    the school spelling bee, earn the role of class monitor, and develop confidence to manage her anxiety through leadership and clear responsibilities.
