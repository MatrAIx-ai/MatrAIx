personas:
  professional: An aspiring young robotics engineer, Molly Clark channels their love for structured challenges and teamwork into designing programmable LEGO robots, leveraging their practical mindset, meticulous
    checklist habit, and competitive drive to excel in the school robotics club.
  sports: Molly Clark is a forward on the Brookside Youth Soccer Club, training three times a week with a competitive edge, cheering for the professional team City United FC, and treating each practice
    as a chance to apply their checklist‑driven focus on technique.
  arts: Molly Clark channels their love for structure into after‑school hip‑hop dance classes, draws cartoons inspired by Matt Groening’s style, devours adventure novels by Rick Riordan, and sings along
    to Taylor Swift’s pop hits while building LEGO scenes that mirror scenes from the movies they admire.
  travel: Molly Clark plans trips using a colorful travel checklist, enjoys day trips to the local aquarium and weekend family visits to Disney World, and dreams of exploring the castles of Scotland while
    their parents keep the travel budget modest.
  culinary: Molly Clark loves pepperoni pizza, chicken nuggets, and raw carrots, enjoys making simple snack plates with hummus, can bake chocolate chip cookies with help, and prefers meals that can be broken
    into bite‑sized portions for quick eating between soccer practices.
  core: Molly Clark is a competitively spirited, checklist‑driven ten‑year‑old whose structured enthusiasm fuels their love for robotics, soccer, and creative arts, even as they wrestle with anxiety that
    colors every triumph.
background:
  cultural: Molly was born and raised in Milwaukee, Wisconsin, in a middle‑class family with deep Midwestern roots. Her household reflects the region’s emphasis on community involvement, punctuality, and
    a strong work ethic. She attends a public elementary school that celebrates local traditions such as Summerfest and participates in the city’s library reading program. While her family’s heritage includes
    German and Polish ancestry, the cultural influences in her daily life are shaped by broader Midwest values of practicality, organization, friendly competition, and supportive community networks.
