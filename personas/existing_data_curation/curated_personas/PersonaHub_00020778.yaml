persona_description: A film, radio, and drama teacher who is passionate about using art, technology, and physical drama to explore the unique qualities of individuals and their experiences. They are skilled
  in creating photo montages, class radio shows, and films in a day or over several days, and are available for anyone to make a film or radio show using their equipment or their own IT kit. They offer
  a curriculum-linked poetry programme called Rhyme Time for early years and KS1, and can provide actors in role for events run by RHS, National Trust, and museums. They have workshops and interactive poetry
  performances designed to make learning fun for KS2 Shakespeare Play-in-a-Day and KS1 Shakespeare Imaginative Journey, and can provide a full range of training options from drama to media to roleplay &
  Forum theatre for school and staff issues. They offer production services, mentoring, and training in every aspect of school drama and events management. They have more history, art, music, and drama
  workshops than they could possibly fit on one page, and can create full-scale productions that tour to theatres but cannot always get to those venues. They are interested in working with as many classes
  as possible in a half day or longer, and can create a mix of workshops that can be taken almost anywhere.
