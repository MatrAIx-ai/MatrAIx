  career_goals: James dreams of a future where he can help his community in a hands‑on way. He is drawn to roles such as a firefighter, EMT, or park ranger because they combine routine, practical problem‑solving,
    and the chance to support others. He also hopes to become a team captain in soccer or a leader in his Boy Scouts troop, seeing leadership as a way to keep his group organized while still allowing spontaneous,
    fun experiences.
