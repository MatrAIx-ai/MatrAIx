personas:
  professional: James Chandler is an aspiring young engineer who builds LEGO robotics and modifies Minecraft worlds, channeling a practical mindset into tangible creations while their spontaneous streak
    makes them reluctant to stick to project timelines, often resulting in last‑minute tinkering.
  sports: James Chandler plays forward for the River Valley Soccer Club U12 team and point guard for the Midtown Middle School basketball squad, they cheer for the local professional River City FC and the
    Metro Bulls, frequently improvising new pickup drills after practice while sometimes skipping warm‑ups, which leads to occasional ankle sprains.
  arts: James Chandler is a budding guitarist in the school band who practices classic rock songs by The Beatles and paints LEGO‑inspired artwork, they enjoy listening to Billie Eilish while sketching but
    often lose focus when friends call, balancing a love of routine practice with spontaneous creative bursts.
  travel: James Chandler loves weekend camping trips to Evergreen National Park with the scouting group and dreams of trekking to Machu Picchu, they meticulously map out routes in a scrapbook yet sometimes
    overpack snacks, reflecting a preference for familiar outdoor routines mixed with spontaneous wanderlust.
  culinary: James Chandler favors homemade pizza topped with garden‑fresh basil, sliders with cheddar and tomato, and a secret family chili recipe, they enjoy helping in the kitchen on weekends but often
    sneak a cookie before dinner, showing a blend of routine cooking skills and impulsive snacking.
  core: James Chandler is a sociable, routine‑loving 12‑year‑old who blends practical creativity with spontaneous bursts, worries about unfinished tasks, and finds comfort in group activities, music, and
    building things.
background:
  cultural: 'James was raised in Cottekill, a small hamlet in Ulster County, New York, surrounded by the Catskill hills and a close‑knit, predominantly white community. His family values practicality, seasonal
    traditions, and community involvement: they celebrate holidays like Thanksgiving and Christmas, attend a nearby church, and often take part in local events such as farmers’ markets and town fairs. The
    region’s outdoor culture—hiking, camping, and gardening—has shaped James’s appreciation for nature and hands‑on activities.'
