personas:
  professional: Caitlin Smith is a seasoned insulation specialist with over two decades of hands‑on experience in fiberglass batts, blown‑in cellulose, and spray‑foam systems, who blends practical problem‑solving
    with a curiosity for emerging green technologies, and they leverage their cooperative communication style to mentor crews while navigating occasional disorganization in project paperwork.
  sports: Caitlin Smith hikes the trails of Uwharrie National Forest on a weekly basis, cheers on the Carolina Panthers and Charlotte Hornets, and plays in a local women's recreational softball league,
    balancing a love of nature with community‑spirit team sports.
  arts: Caitlin Smith enjoys classic country legends like Johnny Cash and folk storytellers such as Gillian Welch while watching home‑renovation series like "Fixer Upper" and "This Old House," and they
    occasionally volunteer in their church choir, letting music soften the pressures of their work.
  travel: Caitlin Smith prefers low‑key road trips, having explored Asheville’s Blue Ridge Parkway and Savannah’s historic squares, savoring weekend getaways that blend scenic drives with gardening workshops,
    while they dream of a sustainable‑farm tour in New Zealand once their business gains financial stability.
  culinary: Caitlin Smith loves cooking with garden bounty, frequently preparing tomato‑basil bruschetta, sweet‑potato hash with rosemary, and a kale‑lemon vinaigrette, and they enjoy grilling fresh vegetables
    at neighborhood barbecues, often adding a dash of smoked paprika for extra flavor.
  core: Caitlin Smith blends hands‑on green‑building expertise with a garden‑centered, slightly scatter‑brained lifestyle, turning worry into careful care for the environment and community while juggling
    the chaos of daily life.
background:
  cultural: Caitlin grew up in a multi‑generational, working‑class family in rural North Carolina, where Southern hospitality, church involvement, and a strong work ethic are central values. Her community
    places high regard on self‑reliance, practicality, and mutual support, which shaped her cooperative and caring nature. Though she identifies as white, she embraces the regional traditions of storytelling,
    seasonal festivals, and a respect for the land’s agricultural heritage. Her associate’s degree from a nearby community college reflects a commitment to practical education, and her career in insulation
    ties her to the region’s growing focus on energy efficiency and home improvement. These cultural influences blend with her personal curiosity and desire for stability, informing both her professional
    choices and everyday life.
attributes:
  skills: '["Insulation installation (fiberglass, cellulose, spray foam)", "Reading and interpreting blueprints and construction plans", "North Carolina building codes compliance", "OSHA safety standards
    and protocols", "Use of power tools and spray equipment", "Material estimation and cost calculation", "Basic carpentry and framing adjustments", "Problem solving in constrained spaces", "Team coordination
    and communication", "Customer service and client interaction", "Continuous learning of sustainable insulation technologies"]'
  hobbies: '["Vegetable gardening", "Hiking in Uwharrie National Forest", "Listening to classic country and folk music", "Volunteering at church food pantry", "DIY home‑improvement and upcycling projects",
    "Reading gardening magazines", "Watching home‑renovation TV shows", "Hosting casual barbecues with friends"]'
  career_goals: Caitlin aims to move into a supervisory role within the next few years, mentoring apprentices—especially women interested in trades—and eventually obtaining her EPA Lead‑Safe certification
    and a Green Building Specialist credential. She hopes to lead a small crew focused on energy‑efficient retrofits for older homes in Stanly County, positioning herself as a go‑to expert for sustainable
    insulation solutions. Over the longer term, she envisions starting her own insulation contracting business that emphasizes fair wages, safety, and environmentally friendly practices, while providing
    a stable income that reduces financial stress for her family.
