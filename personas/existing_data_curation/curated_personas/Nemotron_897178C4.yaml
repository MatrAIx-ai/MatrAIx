personas:
  professional: Corneilus Spivey, a mechanically‑focused engineer at an Ohio manufacturing firm, applies SolidWorks, CFD, and Lean Six Sigma to transform curiosity‑driven concepts into rigorously documented,
    sustainable product designs, and they keep cross‑functional teams on schedule with a disciplined, organized leadership style while fostering a collaborative, sociable work environment.
  sports: Corneilus Spivey competes in the Blacklick community basketball league, runs the Columbus Marathon’s 5K feeder races, lifts at Genesis Gym, follows the Columbus Crew SC and the Blue Jackets with
    fervor, and they integrate the same disciplined training ethos into personal fitness, often scheduling workouts around team game days.
  arts: Corneilus Spivey immerses themselves in the local jazz scene at the Blue Wren, drawing creative inspiration from artists like Kamasi Washington, Robert Glasper, and Erykah Badu, while they channel
    the improvisational flair of such musicians into modern soul‑food cooking and community mentorship.
  travel: Corneilus Spivey meticulously plans family road trips with detailed itineraries, having explored Hocking Hills State Park, the Great Smoky Mountains, and a weekend getaway to Chicago, while they
    dream of a cultural tech pilgrimage to Kyoto and a hiking adventure in Patagonia, balancing budget constraints with a desire for enriching experiences.
  culinary: Corneilus Spivey, an adept home chef, crafts modern soul‑food dishes such as smoked paprika shrimp and grits, kale‑infused collard greens with smoked turkey, and sweet‑potato pie spiced with
    ginger and nutmeg, often experimenting with homemade hot‑sauce blends and sourcing fresh thyme and heritage grains, and they love sharing these meals at family gatherings accompanied by live R&B playlists.
  core: Corneilus Spivey is a disciplined, curiosity‑driven engineer who channels stress into basketball, drone‑building, and jazz nights, yet they hoard coffee mugs, obsess over spreadsheet errors, and
    constantly worry about meeting their own high standards.
background:
  cultural: Corneilus grew up in an African‑American family in Ohio, rooted in the traditions of resilience, community service, and celebration of Black heritage. Family gatherings often feature gospel
    music, storytelling, and dishes that blend Southern comfort food with contemporary twists. He actively participates in the local African‑American church, commemorates Juneteenth, and is a member of
    the Society of Black Mechanical Engineers, where he networks with peers to promote representation in STEM. His cultural identity informs his collaborative and considerate approach at work, his dedication
    to mentoring the next generation, and his commitment to using engineering as a tool for community uplift.
attributes:
  skills: '["SolidWorks", "CATIA", "ANSYS", "Finite Element Analysis", "Computational Fluid Dynamics", "Lean Six Sigma (Green Belt)", "Project Management", "CNC Machining", "Additive Manufacturing (3D Printing)",
    "Robotics Integration", "Data Analysis (Python, MATLAB)", "Design for Manufacturability", "Technical Documentation", "Team Leadership", "Mentoring"]'
  hobbies: '["Community basketball league", "Running (5K)", "Weightlifting", "Maker space projects", "RC drone building", "STEM mentorship volunteering", "Cooking modern soul‑food", "Jazz and R&B concerts",
    "Reading science‑fiction", "Family road trips", "Hiking"]'
  career_goals: Corneilus aims to become a senior engineering manager or director of R&D within the next five to seven years, steering large‑scale projects that embed sustainable manufacturing practices
    and reduce carbon footprints at Ohio‑based firms. He plans to attain his Professional Engineer (PE) license, lead a cross‑functional team focused on renewable‑energy‑compatible product lines, and champion
    diversity and inclusion initiatives that increase representation of Black engineers. Long‑term, he envisions establishing a community‑focused STEM outreach program that provides mentorship and hands‑on
    experience to youth in Franklin County, while also contributing technical papers to industry journals and speaking at conferences on the practical integration of emerging technologies.
