personas:
  professional: Charles Badias, a 34-year-old CNC machining specialist, blends precise material knowledge and safety‑first protocols with a flair for artistic design, channeling their curiosity and competitive
    drive into leading process‑optimization projects while they mentor junior staff.
  sports: Charles Badias, an avid outdoorsman, joins a regional hunting club for fall deer trips, fishes the nearby river during summer, and roots for the local minor‑league baseball team while they fit
    occasional weight‑training sessions into their week to offset the sedentary nature of shop work.
  arts: Charles Badias, a sketcher and watercolor enthusiast, frequents gallery openings featuring contemporary artists like Kehinde Wiley and is inspired by the folk sounds of Bob Dylan and the classic
    rock riffs of The Eagles, which often echo as they practice acoustic guitar in their studio.
  travel: Charles Badias, who favors hands‑on experiences, plans trips that combine their love of nature and art, such as a fishing expedition to Alaska’s Kenai River and a weekend art tour of Florence’s
    Uffizi Gallery, yet they balance these getaways with limited vacation days and a modest travel budget.
  culinary: Charles Badias, an enthusiastic home cook, enjoys preparing wood‑smoked trout with fresh dill and lemon, experimenting with spice blends like smoked paprika and cumin, while they rely on simple,
    hearty dishes like beef stew during busy work weeks.
  core: Charles Badias, a 34‑year‑old CNC expert with a creative streak, melds precision engineering with artistic DIY projects, balancing a competitive work ethic with a love for solitary fishing trips
    and occasional splurges on art supplies, and they often juggle multiple projects at once.
background:
  cultural: Charles grew up in a white, Midwestern family in rural Missouri, where values of hard work, self-reliance, and community involvement are deeply ingrained. His ancestry includes German and Irish
    roots, common in the region, which have contributed to a cultural emphasis on practicality, modesty, and a "do-it-yourself" ethic. The local culture of county fairs, high school sports, and church gatherings
    shaped his social outlook, fostering a balance between social engagement and a need for personal downtime. These Midwestern influences, combined with his curiosity for art and new ideas, give him a
    grounded yet open-minded perspective on both his work and personal life.
attributes:
  skills: '[''CNC machine operation'', ''Manual cutting equipment handling'', ''Technical drawing interpretation'', ''Precision measurement (calipers, micrometers)'', ''Material selection (metal, wood,
