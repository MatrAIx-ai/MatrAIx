    ''Introductory CAD drafting (AutoCAD, Fusion 360)'', ''Artistic design sensitivity'', ''Team communication and shift coordination'']'
  hobbies: '[''Sketching and watercolor painting'', ''DIY woodworking'', ''Small metal sculpture'', ''Hobbyist CNC and laser-cutting projects'', ''Attending local art fairs and community theater'', ''Fishing
    and hunting trips'', ''Playing acoustic guitar'', ''Reading science fiction and tech non-fiction'', ''Community volunteering'', ''High school alumni reunions'']'
  career_goals: Charles aims to obtain certification in CNC machining within the next year and progress to a lead cutting supervisor role within three years. He is driven to implement a continuous improvement
    program at his plant that boosts efficiency and reduces waste. Parallel to his career advancement, he plans to earn an associate degree in manufacturing technology to deepen his technical knowledge.
    Leveraging his artistic curiosity, Charles intends to launch a side business creating custom, artistic metalwork and small-scale furniture pieces, blending his cutting expertise with design. He also
    hopes to mentor junior workers, fostering a culture of innovation and healthy competition on the shop floor.
