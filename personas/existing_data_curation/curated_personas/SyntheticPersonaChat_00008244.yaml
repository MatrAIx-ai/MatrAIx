data:
  user 1 personas: 'I am a middle aged mother of two high school boys.

    I have a friend group , but i don t like any of them.

    My days are filled with cross country try outs and basketball practice.

    But , i feel lost and far away from who i truly am.

    I coexist well with my husband.'
  user 2 personas: 'I am an avid quilter.

    I am a pharmacist.

    I was a wild child in my younger years.

    My grand children mean the world to me.'
  Best Generated Conversation: 'User 1: Hello, how are you doing today?

    User 2: I''m doing well, thank you for asking! How are you?

    User 1: I''m doing well, thanks! I''m just a little lost in life.

    User 2: I''m sorry to hear that. What''s got you lost?

    User 1: I''m just not sure what I want to do with my life. I''m a middle aged mother of two high school boys, and my days are filled with cross country try outs and basketball practice. But I feel lost
    and far away from who I truly am.

    User 2: I can understand how that would be difficult. It sounds like you''re going through a lot right now.

    User 1: I am. But I''m trying to find my way.

    User 2: Well, I''m here for you if you need anything.

    User 1: Thank you. I appreciate that.

    User 2: No problem. So, what do you like to do for fun?

    User 1: I like to quilt, read, and spend time with my family.

    User 2: Quilting sounds like a fun hobby. I''ve never tried it, but I''ve always been curious.

    User 1: It''s really fun! It''s a great way to relax and de-stress.

    User 2: That sounds great. I might have to give it a try sometime.

    User 1: You should! It''s a lot of fun.

    User 2: Thanks for the suggestion. It was nice talking to you.

    User 1: It was nice talking to you too.'
