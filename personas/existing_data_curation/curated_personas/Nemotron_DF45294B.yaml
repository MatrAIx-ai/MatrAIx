personas:
  professional: Jani Garza is a diligent dental and ophthalmic laboratory technician who merges meticulous prosthetic fabrication with a keen artistic eye, leveraging both hand‑wax techniques and cutting‑edge
    CAD/CAM software to create patient‑specific crowns, bridges, dentures, and ocular prostheses while maintaining rigorous quality control, precise inventory management, and clear communication with clinicians.
  sports: Jani Garza hikes with the Upper Midwest Hiking Club through the Northwoods each weekend, follows the Milwaukee Brewers and Green Bay Packers loyally, participates in a local salsa dancing group
    that doubles as cardio, and balances adventurous trail runs with occasional yoga to counteract desk‑bound lab work.
  arts: Jani Garza spends evenings watercolor‑painting inspired by Claude Monet’s palette, photographing wildlife in the spirit of Ansel Adams, crafting DIY jewelry while listening to the rhythmic guitar
    of Buena Vista Social Club, and volunteering at the local art museum where they admire modern installations by Yayoi Kusama.
  travel: Jani Garza prefers spontaneous weekend road trips to nearby natural gems like Apostle Islands National Lakeshore and Door County, while saving for a dream summer trek to Iceland’s volcanic landscapes,
    often using travel‑planning apps to map hiking routes and budget‑friendly lodging.
  culinary: Jani Garza enjoys cooking rustic wild‑rice and smoked trout casserole, perfecting blueberry‑laden almond scones, and experimenting with foraged mushroom risotto, all while favoring fresh Northwoods
    herbs like pine needles and dill and occasionally treating themselves to a sushi roll at the downtown bistro.
  core: Jani Garza blends a scientist’s precision with an artist’s imagination, obsessively aligning paint swatches with dental shade guides, yet they often stare at their inbox for hours, letting anxiety
    fuel midnight snack binges of salty chips.
background:
  cultural: Jani grew up in a small-town, middle-class family in Rhinelander, Wisconsin, where Midwestern values of hard work, community involvement, and modesty are emphasized. Her family’s heritage is
    primarily German and Polish, typical of the region, giving her a cultural connection to traditional celebrations, folk music, and a love of local outdoor recreation. Although she identifies as white,
    the surname Garza hints at a multicultural lineage, fostering an appreciation for diverse perspectives. This blend of Midwestern pragmatism and an openness to varied cultural experiences shapes her
    disciplined yet curious approach to both work and leisure.
attributes:
  skills: '[''Dental prosthetic fabrication'', ''Ophthalmic prosthetic design'', ''CAD/CAM dentistry'', ''3D printing of medical appliances'', ''Material science (porcelain, acrylic, titanium)'', ''Precision
    equipment operation and maintenance'', ''Quality control and inspection'', ''Inventory management'', ''Patient communication and case documentation'', ''Color matching and artistic detailing'']'
  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Weekend hiking in the Northwoods'', ''Salsa dancing'', ''Book club (speculative fiction)'', ''DIY jewelry crafting'', ''Volunteering at the
    Rhinelander Art Museum'', ''Maker-space 3D-printing meet-ups'']'
  career_goals: Jani aims to become a certified specialist in maxillofacial and ocular prosthetics, pursuing the Certified Dental Technician (CDT) and the American Society of Ocularists certification within
    the next five years. She envisions leading a state-of-the-art laboratory in the Upper Midwest, integrating cutting-edge 3D-printing technology with artistic design to create bespoke, patient-centered
    appliances. Long-term, she hopes to mentor junior technicians, develop continuing-education workshops for her community, and perhaps launch her own boutique lab that blends clinical precision with artistic
    craftsmanship. Balancing her ambition, she also plans to cultivate resilience strategies to manage her high anxiety and maintain a healthy work-life balance with her spouse.
