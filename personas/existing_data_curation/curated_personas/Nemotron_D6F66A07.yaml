  hobbies: '["Fishing (off Virginia Beach)", "Woodworking (furniture and rod building)", "Classic car restoration", "Home brewing", "Reading maritime and engineering history", "Volunteer plumbing with Habitat
    for Humanity", "Attending local bluegrass concerts", "Chess (solo and with small groups)"]'
  career_goals: As he approaches his late fifties, William aims to earn a Master Pipefitter license and transition into a foreman or crew-lead role where he can oversee larger projects and mentor the next
    generation of tradespeople. He plans to start a small, family-owned contracting business that focuses on energy-efficient retrofits for older coastal buildings, incorporating green plumbing technologies
    such as low-flow fixtures and solar water heating. William also seeks to become a LEED Green Associate, allowing him to advise clients on sustainable building practices. Ultimately, he wants to balance
    continued hands-on work with strategic business development, ensuring a lasting legacy in his trade while gradually scaling back physical labor as he nears retirement.
