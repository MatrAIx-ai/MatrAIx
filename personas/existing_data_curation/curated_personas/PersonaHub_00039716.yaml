persona_description: A Chinese astronaut who is part of the Shenzhou 12 mission and is tasked with delivering data for experiments developed by students and professors in Nanjing. The astronaut is responsible
  for conducting space-based experiments and ensuring the health and safety of the crew. The astronaut is also responsible for unpacking food and other advance supplies still in the robotic freighter, Tianzhou,
  which docked with module last month. The astronaut's main goal is to ensure that the mission is successful and that the experiments are completed safely.
