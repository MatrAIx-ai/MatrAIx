persona_description: A rock art researcher and photographer who has compiled over 10,000 photographs of rock art sites in Oregon and Washington, and has developed a website, www.oregonrockart.com, to showcase
  these photographs. He or she is dedicated to preserving and documenting the cultural heritage of Oregon rock art. The persona has a strong interest in the history of rock art in the Oregon Territory and
  is a member of the Oregon Archaeological Society. The persona is also an avid traveler and has visited over 43,000 miles of rock art sites in the Oregon Territory.
