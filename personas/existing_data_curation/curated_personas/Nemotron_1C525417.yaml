personas:
  professional: Jose Bedoya, a 36‑year‑old janitorial specialist with a knack for eco‑friendly methods and bilingual communication, leverages their curiosity‑driven troubleshooting to keep facilities spotless
    while eyeing a supervisory role within two years.
  sports: Jose Bedoya, who enjoys weekend hikes along James River Park, casual pickup basketball, and cheering for the Washington Nationals and San Juan Mets, tracks personal steps with a smartwatch while
    belonging to the Richmond Hiking Association.
  arts: Jose Bedoya, a salsa‑enthusiast who spins reggaetón tracks by Bad Bunny, Marc Anthony, and local folk band Plena Libre while dancing around the kitchen, uses music as a daily creative outlet and
    frequently attends the Richmond Folk Festival.
  travel: Jose Bedoya, who prefers spontaneous road trips over rigid itineraries, frequently escapes to the coastal town of Virginia Beach and has long‑dreamed of exploring San Juan’s historic Old City
    and the vibrant streets of Medellín, balancing travel with a modest savings plan.
  culinary: Jose Bedoya, a competent home cook with a love for arroz con gandules, pernil, and caramel flan, uses fresh herbs like cilantro and Sofrito in their dishes and enjoys experimenting with low‑sodium
    recipes that align with their green‑cleaning ethos.
  core: Jose Bedoya, a 36‑year‑old facilities caretaker with a competitive, curious mind and a love for salsa rhythms, balances DIY projects, community dominoes, and a dream of launching a green cleaning
    business while sometimes letting disorganization hijack their plans.
background:
  cultural: Jose was born to Puerto Rican parents who immigrated to the United States in the 1980s. He grew up bilingual, with Spanish as his first language and English learned in school. Family traditions—celebrating
    Día de San Juan, preparing pasteles, and attending the annual Noche de San Juan festival—remain central to his identity. Though he lives in Richmond, Virginia, his Puerto Rican heritage shapes his worldview,
    from the cuisine he cooks to the music he listens to and the strong sense of community he maintains with other Caribbean‑American families in the city. He blends this cultural pride with the Southern
    hospitality he has adopted, creating a bicultural life that values hard work, family, and personal resilience.
attributes:
  skills: '["Routine cleaning","Deep sanitation with eco‑friendly products","Minor repairs (light fixtures, faucets)","Floor‑care equipment operation (buffers, pressure washers)","Inventory management","OSHA
