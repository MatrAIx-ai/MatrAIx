  hobbies: '["Playing dominoes with friends","Listening to salsa and reggaetón","Cooking Puerto Rican dishes","Walking along the James River Park","DIY home improvement projects","Watching baseball (San
    Juan Mets, Washington Nationals)","Listening to true‑crime podcasts"]'
  career_goals: Jose's competitive drive pushes him to climb the facilities‑management ladder. Within the next two years he aims to be promoted to lead janitor or facilities supervisor at his current complex,
    overseeing a small team and implementing performance metrics. He plans to obtain the ISSA Cleaning Management Institute certification and take community‑college courses in facilities management. Long‑term,
    he dreams of launching his own boutique cleaning business that focuses on green practices and serves both commercial clients in Richmond and the Puerto Rican community there. He also hopes to use his
    practical insights to mentor younger workers from similar backgrounds.
