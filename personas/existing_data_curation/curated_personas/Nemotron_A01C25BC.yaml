  hobbies: '[''Single-player role-playing video games'', ''Reading science-fiction'', ''Reading historical non-fiction'', ''Electronics repair and hobbyist tinkering'', ''Solo nature walks'']'
  career_goals: Juan aims to transition from the front‑line sales floor to a supervisory or inventory‑management role within the next three years. He plans to complete his GED and pursue an associate degree
    in business administration or supply‑chain logistics, with the long‑term ambition of becoming a store manager or opening a small, online niche‑product shop that lets him control operations in a structured
    yet autonomous environment.
