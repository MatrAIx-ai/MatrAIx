personas:
  professional: Juan Mole is a department‑store sales associate who has mastered POS systems, precise inventory tracking, and eye‑catching visual merchandising, thriving during quiet shifts and already
    positioning themselves for a supervisory role that leverages their competitive yet solitary work style.
  sports: Juan Mole follows the Boston Red Sox and New England Patriots, enjoys watching the Boston Celtics during the winter, and spends weekends hiking the Blackstone River trails with the local Trailblazers
    Club, occasionally playing solitary jogs along the river while listening to sports podcasts.
  arts: Juan Mole immerses themselves in sci‑fi and fantasy soundtracks, frequently listening to the scores of The Witcher 3 by Marcin Monaco, the electronic beats of Daft Punk, and the ambient compositions
    of Jeremy Soule, while also binge‑watching series like The Expanse and reading authors such as Isaac Asimov and Ken Liu for inspiration.
  travel: Juan Mole prefers low‑key, self‑planned trips, having taken solitary weekend getaways to Boston, a road‑trip through the White Mountains, and a solo backpacking stint in Montreal, while dreaming
    of exploring Kyoto’s temples, Iceland’s geothermal landscapes, and the Scottish Highlands.
  culinary: Juan Mole’s culinary repertoire centers on easy, flavorful meals like grilled cheese with tomato soup, homemade ramen with soft‑boiled eggs and sliced pork, and bean burritos with cilantro and
    lime, cooking at a modest skill level while occasionally experimenting with homemade spice mixes and preferring ingredients like cheddar, soy sauce, and fresh herbs.
  core: Juan Mole is a meticulous, introverted 20‑year‑old who balances a retail career ambition with solitary gaming, DIY electronics, and frugal living, yet often lets spontaneity override their structural
    instincts, resulting in missed deadlines and disorganized plans.
background:
  cultural: Juan grew up in Worcester, Massachusetts, in a working‑class family of European descent—his grandparents emigrated from Ireland and Germany. The city's mix of industrial heritage and New England
    cultural traditions shaped his practical outlook. While culturally identifying as white American, he was raised with a modest, self‑reliant ethic that values hard work, punctuality, and independence.
attributes:
  skills: '[''POS system operation'', ''Cash handling'', ''Inventory tracking'', ''Visual merchandising'', ''Customer service (low-interaction)'', ''Independent task management'', ''Practical problem solving'',
