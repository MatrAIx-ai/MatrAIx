  hobbies: '[''Journaling'', ''Cooking family recipes'', ''Gardening (herbs and veggies)'', ''Listening to Gospel and R&B music'', ''Board games (Scrabble, Settlers of Catan)'', ''Volunteering at the community
    center'', ''Photography of local nature'', ''Reading contemporary YA fiction'']'
  career_goals: Sherrita aims to first complete her GED within the next year and then enroll in a Certified Nursing Assistant program at the local community college. She sees healthcare as a stable, structured
    field where she can use her caring nature and organizational strengths. Long‑term, she plans to become a Licensed Practical Nurse and eventually specialize in community health. Parallel to this, she
    dreams of launching a small catering service that offers healthy soul‑food options for local events, merging her love for cooking with her talent for planning and coordination.
