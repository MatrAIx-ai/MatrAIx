personas:
  professional: Sherrita Tippit is an aspiring Certified Nursing Assistant who applies their meticulous time‑management and budgeting skills to volunteer event planning, combining a caring bedside manner
    with a methodical, structured approach to patient care that reduces their own anxiety by relying on clear protocols.
  sports: Sherrita Tippit enjoys jogging through the local park three times a week, participates in a community soccer league with the Delmar United FC, and follows the New York Knicks, New York Mets, and
    New York Giants, cheering especially during basketball season when they can blend the structured rhythm of the game with their own methodical training routine.
  arts: Sherrita Tippit often immerses themselves in gospel and soul classics—singing along to Aretha Franklin, Marvin Gaye, and Kirk Franklin—while capturing sunrise shots of the Delmar fields with a Nikon
    D3500, and they also unwind by playing Scrabble and Settlers of Catan, activities that satisfy both their love for strategic thinking and auditory nostalgia.
  travel: Sherrita Tippit prefers low‑key, budget‑friendly trips that combine purposeful learning with relaxation, having explored historic Savannah, Georgia and the Smithsonian museums in Washington, D.C.,
    and they dream of a future solo retreat to the lavender fields of Provence, France, scheduled around their CNA program’s breaks to avoid academic stress.
  culinary: Sherrita Tippit embraces classic Southern comfort dishes like skillet‑fried chicken, creamy macaroni‑and‑cheese, collard greens cooked with smoked turkey, and sweet cornbread, confidently preparing
    them from scratch in their modest kitchen, though they often get distracted by Instagram food videos, leading to occasional over‑seasoning.
  core: Sherrita Tippit is the organized, slightly anxious teen who juggles caregiving ambitions, a budding catering dream, and a love for gospel music while constantly wrestling with the need for structure
    and the urge to over‑schedule every spare moment.
background:
  cultural: Sherrita identifies as African American and was raised in a close‑knit black family in Delmar, Delaware. Her upbringing is steeped in Southern‑influenced traditions, church involvement, and
    community solidarity. Celebrations of Juneteenth, Kwanzaa, and church gatherings have shaped her values of resilience, collective responsibility, and respect for elders. Family recipes and oral histories
    are central to her cultural identity, influencing her cooking interests and her desire to give back to her community through service and mentorship.
