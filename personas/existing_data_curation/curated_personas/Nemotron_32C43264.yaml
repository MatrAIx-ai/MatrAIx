personas:
  professional: Mamie Council, a seasoned telecommunications equipment installer and repair technician, blends meticulous RF and fiber‑optic expertise with a critical, skeptical mindset, and leverages their
    sociable energy to mentor emerging installers while steering her company toward precision‑focused protocols as they pursue CTT+ and fiber‑optic certifications.
  sports: Mamie Council enjoys early‑morning walks with the Augusta Running Club, attends Atlanta Braves games at Truist Park, participates in a local senior volleyball league, and integrates gardening
    as functional fitness while favoring low‑impact cardio over high‑intensity workouts.
  arts: Mamie Council, a devoted jazz and blues aficionado, plays tambourine in a community gospel choir, curates vintage vinyl collections featuring Miles Davis, B.B. King, and Nina Simone, and regularly
    engages with the Morris Museum of Art through guided tours and hands‑on workshops that inspire their own mixed‑media collages.
  travel: Mamie Council prefers road‑trip itineraries that blend cultural immersion and historic sites, having revisited New Orleans for its jazz festivals, explored Savannah’s historic district, and dreaming
    of a future Caribbean cruise to explore colonial architecture in Cartagena, while balancing travel with family responsibilities.
  culinary: Mamie Council loves cooking hearty Southern dishes such as collard greens simmered with smoked turkey, heirloom tomato gazpacho, and peach cobbler, often sourcing fresh produce at the Augusta
    farmers market and pairing meals with their vinyl soundtrack, though they occasionally over‑spice in enthusiasm.
  core: Mamie Council melds a precise telecommunications skill set with a vibrant community‑centered life, championing both technical excellence and cultural enrichment while navigating the occasional overcommitment
    and vinyl‑induced spending sprees.
background:
  cultural: Mamie grew up in a close‑knit African‑American community in the South, where church, family, and neighborhood ties shaped her identity. Her parents, both educators, emphasized the importance
    of resilience, self‑advocacy, and cultural pride. Throughout her life, she has been active in local civil‑rights commemorations, the Augusta Black Women’s Network, and church outreach programs. These
    experiences fostered a deep appreciation for Southern Black traditions—such as gospel music, soul food, and storytelling—while also inspiring her to pursue a technical career traditionally dominated
    by men. Mamie’s cultural heritage informs her commitment to mentoring the next generation of Black technicians and preserving the rich artistic legacy of her community.
attributes:
  skills: '[''RF signal testing'', ''Fiber optic splicing'', ''Coaxial cable installation'', ''Network hardware configuration'', ''Technical schematics interpretation'', ''FCC and safety compliance'', ''Troubleshooting
    analog and digital communication systems'', ''Project coordination'', ''Customer service communication'', ''Continuous learning of emerging telecom technologies'']'
  hobbies: '[''Volunteering at the Black History Museum'', ''Attending jazz and blues concerts'', ''Singing in a gospel choir'', ''Collecting vintage vinyl records'', ''Visiting art museums and participating
    in art workshops'', ''Gardening (heirloom tomatoes and collard greens)'', ''Hosting community potlucks'']'
  career_goals: Mamie aims to earn advanced certifications such as the Certified Telecommunications Technician (CTT+) and a specialized fiber‑optic certification within the next two years. She envisions
    moving into a lead technician or supervisory role at her current company, where she can mentor younger installers—especially women and people of color—while shaping best‑practice protocols that blend
    rigorous organization with flexible problem‑solving. Long‑term, she aspires to launch her own boutique telecom‑installation business in Augusta, focusing on high‑precision installations for small businesses
    and community centers, and to become an influential voice in local trade associations advocating for diversity in the tech trades.
