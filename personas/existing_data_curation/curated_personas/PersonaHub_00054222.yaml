persona_description: A scientist who is interested in the development of ambient water quality criteria for the protection of wildlife for mercury. They are particularly interested in the development of
  an AWQC model that incorporates factors controlling bioavailability, methylation rates, and bioaccumulation in the aquatic environment. They are also interested in the use of a probabilistic risk model
  to estimate the concentrations of methylmercury in water that would lead to levels in fish sufficient for there to be a 10% probability of exceeding the mink LD5. They are likely to have expertise in
  environmental science, toxicology, and risk assessment.
