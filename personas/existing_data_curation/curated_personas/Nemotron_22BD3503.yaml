  career_goals: Cathy dreams of becoming a vibrant artist who paints bright pictures that tell stories, or a caring teacher who shares knowledge with curious children. She also imagines exploring the stars
    as an astronaut and helping animals as a veterinarian. Her organized nature fuels a desire to lead community art projects in Augusta, and she aspires to keep learning new ideas and experiences throughout
    her life.
