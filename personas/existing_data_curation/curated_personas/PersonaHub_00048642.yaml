persona_description: An individual who is responsible for overseeing the recruitment and selection processes in schools and other education services, ensuring that they are conducted in a manner that promotes
  the safety and well-being of children. This person has experience in the field and is knowledgeable about the principles and practices of safer recruitment and selection, as well as the legal and regulatory
  requirements that govern these processes. They are committed to creating safe environments for children and are dedicated to ensuring that only suitable and trustworthy individuals are hired to work with
  them.
