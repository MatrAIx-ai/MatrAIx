  career_goals: Louis dreams of becoming an astronaut or marine biologist, inspired by his love for space and the ocean. He also envisions a future as an illustrator or video game designer, where he can
    blend his artistic talent and coding skills to create immersive worlds. He hopes to use his collaborative nature to lead projects that bring people together, perhaps as a community organizer or teacher,
    fostering harmony and creativity.
