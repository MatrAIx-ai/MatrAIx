personas:
  professional: Ariel Garcia, a seasoned household manager turned community artisan, leverages bilingual communication, practical budgeting, and a knack for creative problem‑solving to design and market
    handcrafted decor and specialty foods while balancing family duties and a flexible schedule.
  sports: Ariel Garcia, a casual fitness enthusiast, tends a small succulent garden and practices gentle yoga, while cheerfully following the Phoenix Suns for basketball, the Arizona Diamondbacks for baseball,
    and occasionally joining a community adult volleyball league for social interaction.
  arts: Ariel Garcia immerses themselves in the arts by frequenting local galleries showcasing Frida Kahlo, Georgia O'Keeffe, and Banksy, crafting intricate embroidery and papel picado inspired by bold
    colors and patterns, and hosting intimate storytelling evenings that blend music, documentary screenings, and personal artistic showcases.
  travel: Ariel Garcia prefers low‑key, culturally rich travel, often planning weekend escapes to Santa Fe’s art markets and nearby desert hikes, while dreaming of a longer culinary pilgrimage to Oaxaca
    to explore regional food festivals, all while balancing family responsibilities and a modest travel budget.
  culinary: Ariel Garcia’s culinary passion centers on authentic Mexican dishes such as mole, chiles en nogada, and handmade tamales, expertly blending chilies, cacao, and roasted corn, and they experiment
    with seasonal ingredients like local prickly pears, while honing their craft through community‑college culinary classes and occasional pop‑up market stalls.
  core: Ariel Garcia is a curious, slightly disorganized artisan who balances a love for Mexican cooking, handcrafted decor, and quiet introspection with a competitive streak and a chronic worry about stress.
background:
  cultural: Ariel is a Mexican‑American who grew up in the culturally rich border city of McAllen, Texas, where Mexican traditions blend seamlessly with everyday Texan life. Her family maintains strong
    ties to Mexican heritage through language, cuisine, and religious festivities such as Día de los Muertos, Christmas posadas, and quinceañeras. She shares a deep appreciation for Mexican folk art, including
    Talavera pottery, papel picado, and traditional embroidery, which influence both her personal style and creative projects. Fully integrated into the local community and fluent in both Spanish and English,
    Ariel retains a distinct Mexican cultural identity that shapes her values, celebrations, and artistic sensibilities.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Traditional Mexican cooking'', ''Handmade crafts (embroidery, papel picado)'', ''Household budgeting and scheduling'', ''Basic computer and social
