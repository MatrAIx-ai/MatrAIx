  hobbies: '[''Visiting art galleries and museums'', ''Embroidery and papel picado craft'', ''Traditional Mexican cooking and recipe experimentation'', ''Reading mystery and thriller novels'', ''Solving
    puzzles and crosswords'', ''Listening to Mexican folk music'', ''Gardening succulents and native plants'', ''Practicing yoga and meditation'', ''Hosting small, intimate gatherings'']'
  career_goals: Ariel aims to turn her lifelong curiosity and love of art into a modest entrepreneurial venture, such as selling handcrafted home décor and specialty Mexican foods at local markets and through
    an online shop. She is planning to enroll in a community‑college program focused on culinary arts or visual crafts to formalize her skills, and later hopes to offer small workshops for intimate groups.
    In the long term, she aspires to become a respected community resource for cultural art projects while maintaining a flexible schedule that accommodates her family responsibilities and minimizes stress.
