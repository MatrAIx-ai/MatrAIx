persona_description: A teacher who is passionate about teaching reading and has a deep understanding of the various approaches to teaching reading. They are experienced in reading assessment and group management,
  and are skilled in using a variety of reading activities to engage children and help them learn reading and writing conventions. They are committed to providing a wide variety of reading material and
  focusing on focused reading as a critical part of their curriculum. They are interested in supporting discussion and using reader's notebooks, posters, 'ads', and more conventional reports to help children
  become engaged with the book being read and to aid comprehension.
