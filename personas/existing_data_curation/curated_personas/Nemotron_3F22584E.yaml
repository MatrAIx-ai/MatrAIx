    "Data logging and reporting"]'
  hobbies: '["DIY electronics projects", "Woodworking", "Hunting", "Fly fishing", "Hiking", "Competitive shooting", "Vintage pickup truck restoration", "Reading engineering and technology non-fiction",
    "Strategy board games", "Listening to classic rock"]'
  career_goals: Ryan aims to transition from a hands‑on operator role to a supervisory position, eventually becoming a shift lead or plant supervisor where he can implement larger‑scale efficiency projects.
    He plans to earn a Certified Packaging Professional credential and complete an associate’s degree in industrial technology to deepen his automation expertise. Long‑term, he is interested in consulting
    for small‑to‑mid‑size manufacturers, helping them adopt cost‑effective automation solutions while maintaining the practical, reliable methods he values.
