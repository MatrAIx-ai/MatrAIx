personas:
  professional: Ryan Campoamor is a veteran packaging and filling machine operator who combines deep mechanical aptitude, basic PLC troubleshooting, and lean‑manufacturing expertise to boost line efficiency,
    while their relaxed approach to obligations fuels a flexible, hands‑on management style as they pursue supervisory roles and a Certified Packaging Professional credential.
  sports: Ryan Campoamor spends weekends hunting deer, fly‑fishing the streams of Garrett County, and competing in precision shooting events at the local range, while cheering for the Baltimore Ravens and
    holding a membership in the Garrett County Sportsmen’s Association.
  arts: Ryan Campoamor channels creative energy into woodworking projects and vintage pickup restoration, unwinds to classic rock legends like Led Zeppelin and The Rolling Stones, and sharpens strategic
    thinking by playing Settlers of Catan with friends after reading non‑fiction engineering titles.
  travel: Ryan Campoamor favors rugged road trips in their restored pickup, having explored Shenandoah National Park and the Appalachian Trail, while dreaming of an Alaskan fishing expedition that remains
    on hold due to family and budget constraints.
  culinary: Ryan Campoamor enjoys mastering hearty fare such as smoked brisket, Maryland crab cakes, and cedar‑plank salmon, often season­ing with hickory chips and pairing meals with craft beers brewed
    from locally sourced hops.
  core: Ryan Campoamor blends seasoned mechanical expertise with a love for hands‑on tinkering, rugged outdoor pursuits, and classic rock, all while navigating a relaxed yet sometimes disorganized lifestyle
    that fuels both productivity and occasional overspenditure.
background:
  cultural: Ryan grew up in a working‑class family in western Maryland, where Appalachian influences blend with broader Mid‑Atlantic culture. His heritage includes Irish and German ancestry, though his
    family traditions are modest and centered around community gatherings, county fairs, and outdoor activities. The rural setting fostered a strong sense of self‑reliance, appreciation for nature, and
    a pragmatic work ethic. While he celebrates typical American holidays, his cultural identity is shaped more by the values of independence, hands‑on problem solving, and the close‑knit community spirit
    of Garrett County.
attributes:
  skills: '["Operation of packaging and filling machinery", "Mechanical troubleshooting and repair", "Basic PLC programming and troubleshooting", "Preventive maintenance scheduling", "Quality control and
