persona_description: A researcher or scientist working in the field of neuroscience or psychology, particularly focused on understanding the neurological and cognitive mechanisms underlying sensorimotor
  control in individuals with Autism Spectrum Disorder (ASD). The individual is skilled in using virtual reality technology to study and manipulate environmental conditions within a task, allowing for the
  precise isolation and measurement of sensorimotor mechanisms linked with movement. This research is part of a larger study funded by the South West Doctoral Training Partnership through the Economic and
  Social Research Council, and the findings are expected to contribute to a better understanding of the aetiology of sensorimotor difficulties in ASD, and to develop future coaching and management strategies.
