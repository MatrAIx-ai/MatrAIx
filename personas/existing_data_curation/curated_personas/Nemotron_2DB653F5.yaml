  hobbies: '[''Community potluck volunteering'', ''Church outreach'', ''Gardening'', ''Bowling league'', ''Quilting circle'', ''County fair attendance'', ''Classic car restoration'', ''Listening to classic
    rock and country music'', ''DIY home improvement projects'', ''Book club for mystery novels'']'
  career_goals: Marilyn aims to advance to a shift supervisor role within the next two years, taking on greater responsibility for safety oversight, workflow optimization, and mentorship of younger staff.
    She plans to complete a certified safety trainer course offered by her employer and to deepen her understanding of CNC machining to broaden her technical expertise. Ultimately, she hopes to secure a
    stable retirement package while remaining connected to the plant as a part‑time consultant or mentor for apprentices in her community.
