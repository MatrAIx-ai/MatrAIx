personas:
  professional: Hector Santos, a 43‑year‑old line cook at a bustling Bay Area eatery, channels his preference for routine and hands‑on Mexican cooking into leading a kitchen crew with clear, straightforward
    guidance, while they casually integrate seasonal local produce, all as a stepping stone toward his dream of becoming head chef and eventually opening a family‑style taquería.
  sports: Hector Santos stays active by playing forward for the Mission Community Soccer Club in the spring league and cheering on the San Francisco Giants at AT&T Park, while their salsa dancing twice
    a week serves as their primary cardio workout.
  arts: Hector Santos unwinds by streaming classic Mexican films such as ‘Los Olvidados’ and ‘El Mariachi’ while their playlists rotate between Carlos Santana’s guitar‑driven Latin rock and Lila Downs’
    contemporary folk, and they occasionally attend live performances at the historic Castro Theatre.
  travel: Hector Santos prefers weekend getaways that blend culinary exploration and cultural immersion, having sampled street tacos in Oaxaca and trekked the vineyards of Napa Valley, while their next
    dream trip involves a road‑trip along California’s Pacific Coast Highway to savor fresh seafood in Monterey.
  culinary: Hector Santos excels at large‑batch preparations of traditional dishes like carnitas, pozole, and chiles en nogada, skillfully incorporating fresh cilantro, epazote, and locally sourced heirloom
    tomatoes from the farmer’s market into their home‑cooked meals and informal dinner parties.
  core: Hector Santos is a routine‑loving yet sociable kitchen veteran who balances meticulous batch cooking with a spontaneous love for salsa nights, fresh herbs, and mentoring fledgling cooks, all while
    they occasionally misplace a grocery list.
background:
  cultural: Born to Mexican immigrant parents, Hector grew up immersed in the flavors, celebrations, and family values of Mexican culture. His upbringing emphasized home‑cooked meals, festive gatherings,
    and respect for tradition. Living in San Francisco's vibrant Mission District, he blends these heritage elements with the city's diverse culinary landscape, staying active in bilingual community events
    and cultural festivals. This dual exposure informs his cooking style, which fuses authentic Mexican techniques with locally sourced ingredients, and fuels his commitment to preserving cultural traditions
    while engaging with a broader audience.
attributes:
  skills: '["Mexican cuisine", "Latin American fusion cooking", "Food safety and sanitation", "Consistent recipe execution", "Large-batch cooking", "Menu planning", "Team leadership", "Bilingual communication
    (Spanish/English)", "Customer interaction", "Improvisational recipe adaptation"]'
  hobbies: '["Salsa dancing", "Community soccer league", "Herb gardening", "Exploring farmers markets", "Attending food festivals", "Watching classic Mexican movies", "Hosting dinner gatherings", "Volunteering
    at community kitchen"]'
  career_goals: Hector aims to become head chef at a well‑established Mexican eatery in San Francisco, where he can embed his routine‑driven approach into a respected kitchen. Long‑term, he dreams of opening
    a modest, family‑style taquería that serves traditional recipes passed down from his parents, while integrating fresh, local ingredients. He also plans to obtain a professional culinary certification
    to formalize his skills and hopes to mentor younger cooks from the local Mexican community, offering them practical, hands‑on training.
