    hikes and wildlife photography'', ''Personal coding practice (Python, JavaScript)'', ''Journaling'', ''Small‑group technology workshops at the local library'']'
  career_goals: Jennifer plans to complete her high‑school equivalency and enroll in a community college program focused on computer information systems. She intends to earn industry certifications such
    as CompTIA A+, Network+, and Security+ and ultimately become a cybersecurity analyst protecting small businesses. Her long‑term ambition is to lead a security team, develop expertise in threat detection,
    and mentor peers who share her drive for practical problem solving.
