persona_description: A physician or intensivist who specializes in the use of balloon catheters in critical care settings. They have experience with the modification of balloon catheters, including the
  addition of thermistors, and are skilled in the use of thermodilution techniques. They are familiar with the risks and benefits of using balloon catheters in critical care settings, and have developed
  a comprehensive understanding of how to use the technology to optimize patient outcomes. They are also skilled in the use of computerized tools to record and analyze patient data, and have experience
  with the use of inotropes and other drugs to adjust patient flow and pressure. They are aware of the potential for complications and are skilled in managing these risks.
