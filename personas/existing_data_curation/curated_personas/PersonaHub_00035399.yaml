persona_description: A scientist or researcher who specializes in the study of birds, particularly shorebirds, and their responses to environmental changes such as sea-level rise and human development.
  They are interested in developing predictive models to understand how these changes affect the survival and distribution of shorebird species, and are looking for innovative methods to link specific physical
  features to nest presence. They are likely to be interested in using a Bayesian network framework to develop models that can predict the presence or absence of piping plover nests based on the physical
  conditions of their nesting habitat, and are looking for ways to improve the accuracy and reliability of these predictions.
