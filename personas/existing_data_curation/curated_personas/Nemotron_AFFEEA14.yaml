personas:
  professional: A 43‑year‑old aspiring community health liaison and home‑based caterer, Guadalupe Dominguez blends practical budgeting, bilingual communication, and a meticulous yet flexible approach to
    event coordination, balancing the desire to help neighbors with her own tendency to over‑worry about logistics.
  sports: Guadalupe Dominguez attends weekly yoga sessions at the community center, joins the mixed‑gender adult soccer league with the Upland United club, and avidly follows the Kansas City Chiefs and
    Royals, using these activities as structured outlets for stress relief and occasional social bonding.
  arts: Guadalupe Dominguez finds cultural resonance in the melodies of Inti‑Illimani and Los Kjarkas, often dancing to their rhythms with her church’s folk‑dance troupe, while also enjoying the paintings
    of Frida Kahlo and the poetry of Pablo Neruda during quiet evenings, which feed her creative soul and inspire new twists in her cooking.
  travel: Guadalupe Dominguez prefers meticulously planned weekend getaways to nearby natural wonders such as Arches National Park and the historic streets of Santa Fe, while dreaming of a future cultural
    immersion trip to Cusco, Peru, balancing limited vacation days and a modest travel budget with her desire to explore her family's ancestral lands.
  culinary: Guadalupe Dominguez excels at preparing traditional Andean dishes such as salteñas, charquekan, and grilled trout with quinoa‑corn salsa, skillfully merging generations‑old family recipes with
    contemporary plating and flavor experiments, often sourcing fresh chilies, ají amarillo, and panela from her own garden to elevate each potluck spread.
  core: Guadalupe Dominguez is a nurturing community chef who battles chronic worry, occasionally over‑budgeting for specialty ingredients while juggling a packed schedule of yoga, volunteer work, and garden
    chores.
background:
  cultural: Guadalupe was born in Cochabamba, Bolivia, and moved to the United States as a teenager. She maintains strong ties to her Bolivian roots, speaking Spanish at home and celebrating festivals like
    Carnaval de Oruro and Día de los Muertos with family. Her household incorporates Bolivian customs such as sharing meals made with ingredients like quinoa, corn, and fresh herbs, and preserving traditions
    through storytelling and music. While adapting to life in Upland, CA, she blends her heritage with local Californian influences, participating in community events, supporting her children's bilingual
    education, and fostering connections between Bolivian and broader multicultural groups in the San Bernardino County area.
attributes:
  skills: '["Bilingual Spanish-English communication", "Traditional Bolivian cooking", "Household budgeting and finance management", "Schedule coordination and caregiving", "Basic computer and spreadsheet
    usage", "Minor home repairs and gardening", "Event planning and community volunteering", "Conflict mediation", "Sewing and crafts"]'
  hobbies: '["Traditional cooking and recipe experimentation", "Gardening and urban farming", "Reading self-help and personal development books", "Yoga and mindfulness practice", "Andean music listening
    and cultural dance participation", "Walking and nature outings", "Community center volunteering"]'
  career_goals: Guadalupe aims to obtain her GED within the next year to broaden her employment options and gain confidence in formal education. She aspires to launch a modest home-based catering service
    focusing on authentic Bolivian cuisine, leveraging her cooking expertise while balancing family responsibilities. She also hopes to take a certificate program in community health outreach, allowing
    her to support neighbors with health resources and stress-management workshops—areas that resonate with her own sensitivity to worry and stress. Long-term, she envisions becoming a cultural liaison
    for Bolivian traditions in the Upland area, organizing festivals and workshops that foster community pride and connection.
