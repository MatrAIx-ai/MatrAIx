  arts: Fernanda Gonzalezmiranda, who delights in listening to Beethoven’s Ninth Symphony and reading the poetry of Pablo Neruda, regularly attends intimate concerts by the Orlando Philharmonic Orchestra,
    joins a small multilingual poetry circle, collects vintage heritage‑inspired pottery for her garden patio, and they find these artistic pursuits soothing to her often‑intense emotions.
