background:
  cultural: Fernanda was born in Mexico and moved to the United States in her early twenties. She grew up in a close‑knit family that celebrated Mexican traditions such as Día de los Muertos, quinceañeras,
    and vibrant culinary customs. Fluent in both Spanish and English, she weaves Mexican cultural values—familismo, respeto, and collectivismo—into her daily life. In Sebastian, Florida, she participates
    in local Hispanic community events, maintains strong ties with her extended family, and incorporates Mexican flavors, stories, and rituals into her cooking and social interactions. Her heritage shapes
    her emphasis on harmony, caring for others, and preserving shared narratives, providing both comfort and a sense of identity, especially during moments of emotional distress.
