  career_goals: Although retired from formal employment, Fernanda aims to remain actively engaged in her community by mentoring underrepresented high‑school students in STEM, developing a small neighborhood
    garden that blends scientific concepts with traditional Mexican horticultural practices, and creating bilingual educational resources that celebrate both her cultural heritage and modern science. She
    also hopes to travel to her hometown in Mexico to document family stories, write a memoir reflecting on her lifelong learning journey, and continue cultivating her intellectual curiosity while managing
    her anxiety through mindfulness and purposeful involvement.
