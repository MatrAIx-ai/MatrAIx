  professional: Fernanda Gonzalezmiranda, a retired high‑school math teacher turned community STEM mentor, blends her strong foundation in mathematics and physics with bilingual communication to develop
    hands‑on garden‑based curricula, volunteer projects, and Python‑enhanced lesson plans, and they maintain a balance of proven teaching methods and innovative, practical solutions.
