    modeling'', ''Machine learning basics'', ''Data cleaning and preprocessing'', ''Statistical reporting'', ''Community outreach'', ''Cross‑functional collaboration'', ''Public speaking'', ''Mentorship'']'
  hobbies: '[''Cooking Vietnamese cuisine'', ''Hiking nature trails'', ''Playing recreational volleyball'', ''Attending live music and cultural festivals'', ''Volunteering at community health fairs and
    food banks'', ''Photography'', ''Exploring new cafés'', ''Language exchange meetups'', ''Traveling to explore new cities'', ''Board games with friends'']'
  career_goals: She aspires to become a senior statistician or data analytics manager within a public‑health organization or nonprofit focused on community wellbeing. Over the next five years, she plans
    to deepen her expertise in biostatistics and epidemiology through a master’s degree in public health while gaining experience leading interdisciplinary research projects that inform health policy. Ultimately,
    she aims to head a data‑driven program that evaluates and improves health services for underserved Southeast Asian communities in the Chicago area and to mentor junior analysts in applying compassionate,
    user‑centered analytics.
