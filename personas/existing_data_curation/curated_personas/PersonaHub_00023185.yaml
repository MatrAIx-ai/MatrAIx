persona_description: A historian of the Theosophical Society, particularly interested in the works of Helena Blavatsky and the impact of her ideas on the development of the movement. She is knowledgeable
  about the correspondence between Blavatsky and the Mahatmas, the establishment of the Theosophical Society in Adyar, and the controversies surrounding Blavatsky's work. She is also interested in Blavatsky's
  ideas about race and her views on the relationship between theosophy and other spiritual movements.
