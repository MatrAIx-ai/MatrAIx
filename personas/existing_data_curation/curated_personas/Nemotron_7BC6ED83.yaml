personas:
  professional: Chrissy Sims, a pint‑sized entrepreneur who runs a sticker‑exchange stand at preschool, showcases meticulous organization, a practical approach to pricing, and a competitive spark that drives
    them to out‑sell classmates.
  sports: Chrissy Sims, an enthusiastic participant in preschool soccer and toddler gymnastics, trains with the Tiny Tigers Soccer Club, idolizes the Chicago Cubs, and approaches each practice with disciplined
    drills, yet sometimes worries about not being the fastest on the field.
  arts: Chrissy Sims, a budding illustrator who spends afternoons drawing vibrant scenes from Disney's Frozen and singing along to The Wiggles' Hot Potato, finds comfort in rhythmic repetition and channels
    their organized mind into neatly lined sketchbooks.
  travel: Chrissy Sims, an adventure‑oriented preschooler who prefers carefully planned trips to Disneyland and the local aquarium over spontaneous road outings, loves packing their own small suitcase with
    favorite stickers, and eagerly anticipates a future family vacation to the Grand Canyon.
  culinary: Chrissy Sims, a picky yet curious eater who adores creamy mac and cheese, crunchy carrot sticks with hummus, and peanut butter‑jelly sandwiches, can expertly spread peanut butter on toast with
    a child‑size butter knife, but often balks at broccoli and sugary desserts unless paired with a favorite cartoon.
  core: Chrissy Sims, a hyper‑organized four‑year‑old with a competitive streak, worries over every detail, yet lights up group play with boundless energy and a love for counting stickers.
background:
  cultural: Chrissy grows up in a middle‑class white family in Waco, Texas. Her household values community involvement, hospitality, and modest religious traditions common in the region. She attends a local
    preschool where Texas‑style celebrations, such as birthday parties with mild cowboy‑themed decorations, are common. Family outings often include trips to the county fair, community swimming pools, and
    church‑related events, giving her a blend of Southern hospitality, rural‑suburban Texan culture, and an emphasis on polite behavior and group participation.
attributes:
