  career_goals: Although only four, Chrissy already imagines herself in roles where she can guide others and meet high standards. She often says she wants to be a teacher who keeps the classroom neat, a
    nurse who helps people feel better, or a firefighter who saves the day. She sometimes worries that she might not meet her own high standards, which fuels her determination to earn gold‑star stickers
    for completing tasks on time. Her competitive spirit makes her aim to be the class monitor or the leader in any group game.
