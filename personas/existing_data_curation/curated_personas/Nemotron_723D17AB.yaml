  hobbies: '[''Woodworking'', ''Model kit building'', ''Fishing'', ''Soccer (community league)'', ''Cooking Salvadoran cuisine'', ''Reading engineering magazines'', ''DIY video tutorials'', ''Volunteer
    tool‑safety workshops'']'
  career_goals: Arjay aims to advance from shop‑floor assembler to lead fabricator and eventually production supervisor within the next five years. He plans to earn certifications such as Certified Welder
    (CW) and CNC Programming Technician, and to complete an associate degree in Manufacturing Technology at a community college. Long‑term, he envisions opening a small specialty metal‑work shop that serves
    local boat builders and agricultural equipment makers on the Eastern Shore, allowing him to blend his technical expertise with entrepreneurial ambitions while maintaining a balanced lifestyle.
