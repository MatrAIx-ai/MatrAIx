personas:
  professional: William Sequeira is a retired handyman‑turn‑mentor who leverages decades of DIY expertise—from plumbing and carpentry to small‑engine repair—to teach neighborhood youth practical skills,
    organize community events, and preserve oral histories, and they apply a methodical yet flexible mindset that balances curiosity with reliability.
  sports: William Sequeira enjoys leisurely walks along the nearby Trinity Trail, occasional bass fishing trips on the Pecos River, and follows the Dallas Cowboys and Houston Astros on television, while
    they belong to the Odessa Senior Hiking Club and occasionally join a community softball game for seniors.
  arts: William Sequeira regularly tunes in to classic regional folk songs by artists like José García and Lila Mendoza on his vintage radio, attends performances by the Odessa Community Theatre, and they
    cherish the storytelling traditions of folk ballads, which shape their identity and leisure.
  travel: William Sequeira prefers low‑key road trips that blend gentle adventure with relaxation, often visiting nearby landmarks such as Big Bend National Park and the historic town of Marfa, and they
    dream of a pilgrimage to Santa Fe to explore its Pueblo architecture and culinary markets.
  culinary: William Sequeira delights in preparing traditional dishes like tamales stuffed with pork and masa, smoky pozole with hominy and chilies, and sweet empanadas filled with pineapple, skillfully
    balancing heirloom tomatoes and roasted peppers from their garden, and they experiment with spices like cumin, oregano, and hoja de lona while hosting intimate dinner gatherings.
  core: William Sequeira is a curious, garden‑loving elder who blends hands‑on practicality with gentle storytelling, spends mornings coaxing heirloom tomatoes, occasionally forgets to water the plants
    when lost in a folk melody, and they persistently juggle vintage radios and modern smartphones in pursuit of preserving community memory.
background:
  cultural: William is a third‑generation Hispanic Texan whose family traces its roots to a small town in northern Mexico. Growing up in Odessa, he was raised in a bilingual household where Spanish was
    spoken at home and English in school and the wider community. He celebrates traditional holidays such as Día de los Muertos and Mexican Independence Day, often incorporating the customs into his cooking
    and storytelling. His Catholic upbringing combined with the secular, frontier spirit of West Texas has shaped a pragmatic yet warm outlook on life, emphasizing family ties, community service, and respect
    for cultural heritage.
