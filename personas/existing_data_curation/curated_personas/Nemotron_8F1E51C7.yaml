  career_goals: Although retired from formal employment, William aims to leave a lasting contribution to his community. He plans to mentor younger neighbors in practical skills such as gardening, basic
    repairs, and cultural cooking. He wishes to compile a small oral‑history booklet documenting the experiences of older Latino residents in Odessa, preserving their stories for future generations. He
    also hopes to become more comfortable with digital tools, learning to use a smartphone and social media so he can share his recipes and stories online. Ultimately, he hopes his modest projects will
    foster inter‑generational connections and keep local traditions alive.
