personas:
  professional: Manuela Collado, a veteran registered nurse with over thirty years in acute and community care, leverages her methodical precision, bilingual fluency, and nurturing curiosity to lead evidence‑based
    patient‑safety training and chronic disease education, while meticulously documenting care and championing culturally responsive practices.
  sports: Manuela Collado energizes her week with sunrise walks in the neighborhood park and a membership in the Fort Worth Senior Tennis Club, while cheering on the Dallas Cowboys on fall weekends and
    the Dallas Mavericks during the basketball season, balancing low‑impact cardio with occasional friendly tennis matches.
  arts: Manuela Collado finds artistic fulfillment in weekly folkloric dance classes where she spins to traditional rhythms, salsa evenings at the community center set to the smooth jazz of Diana Krall,
    and evenings spent reading bilingual poetry by Pablo Neruda and listening to the folk‑rock of Lila Downs, while occasionally attending a play at the local Fort Worth Repertory Theatre.
  travel: Manuela Collado prefers well‑planned, leisurely trips that blend garden tours and cultural immersion—she recently explored the historic plazas and markets of Oaxaca, dreams of strolling through
    the Alhambra in Granada, and regularly visits the Hill Country vineyards of Texas for weekend getaways.
  culinary: Manuela Collado, an adept home chef, regularly crafts modern‑twisted mole‑poblano with fresh chilies from her backyard garden, whips up avocado‑lime quinoa salads and roasted corn esquites,
    and treats herself to occasional authentic street‑style tacos al pastor using pineapple‑marinated pork, all while mastering the perfect balance of cumin, oregano, and fresh cilantro.
  core: Manuela Collado blends meticulous nursing expertise with a vibrant community spirit, juggling a love for gardening, folk dance, and health advocacy while battling a perpetual worry habit that fuels
    her relentless preparation for every aspect of life.
background:
  cultural: Manuela was raised in a close‑knit Mexican family that emphasized collectivism, respect for elders, and hospitality. Fluent in both Spanish and English, she seamlessly integrates Mexican traditions—such
    as celebrating Día de los Muertos, preparing tamales during holidays, and participating in local Mexican‑American festivals—into her daily life in Aledo, Texas. Her Catholic upbringing influences her
    active involvement in church activities and community service. Living in a bicultural environment, she balances Mexican heritage values of family cohesion and reverence for tradition with the broader
    Texan community's customs, shaping her compassionate nursing approach and commitment to addressing health disparities within the Hispanic population.
attributes:
  skills: '[''Patient assessment'', ''Medication administration'', ''Wound care'', ''Chronic disease education'', ''Bilingual Spanish-English communication'', ''Community health outreach'', ''Electronic
    health record management'', ''Team coordination'', ''Patient advocacy'', ''Health promotion workshops'']'
  hobbies: '[''Traditional Mexican cooking'', ''Folkloric dance (baile folklórico)'', ''Salsa dancing'', ''Gardening'', ''Reading (historical novels, health literature, poetry)'', ''Volunteer health outreach'',
    ''Church community events'', ''Yoga and mindfulness'', ''Traveling to visit family in Mexico'', ''Book club participation'']'
  career_goals: Manuela aims to complete a Bachelor of Science in Nursing and earn certification as a Gerontological Nurse Specialist, positioning herself for a leadership role such as nurse manager or
    patient safety coordinator. She wants to mentor younger nurses, champion culturally responsive care, and develop a bilingual community health program in Parker County that offers preventive screenings,
    health literacy workshops, and support groups for older Mexican‑American residents. Long‑term, she envisions partnering with local churches to host outreach clinics and educational events that reduce
    chronic disease burden and improve health equity in her community.
