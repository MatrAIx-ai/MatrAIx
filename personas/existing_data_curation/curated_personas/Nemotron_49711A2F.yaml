  hobbies: '[''Watercolor painting'', ''Sketching'', ''Heirloom gardening'', ''Reading historical fiction'', ''Community theater attendance'', ''Birdwatching'', ''Cycling'', ''Volunteer literacy tutoring'']'
  career_goals: Although retired from formal employment, Alexandra aims to deepen her impact on her community by establishing a volunteer science mentorship program for middle-school students in Bowling
    Green, and by curating a monthly interdisciplinary art-science showcase at the local library. She also aspires to complete a memoir that interweaves her professional journey in STEM with reflections
    on her lifelong love of art, and plans a cross-country road trip to visit national parks and regional art museums.
