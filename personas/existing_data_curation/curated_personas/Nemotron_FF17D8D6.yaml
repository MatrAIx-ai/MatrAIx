  hobbies: '[''desert gardening'', ''reading mystery novels'', ''quilting'', ''birdwatching'', ''local history research'', ''volunteering at the community library'', ''cooking southwestern cuisine'']'
  career_goals: Even in retirement, Morgan is driven by a desire to stay useful and to nurture her own growth. Her primary ambition is to serve as a volunteer coordinator at the Salome community center,
    where she can train younger volunteers and oversee senior‑friendly programs. She plans to compile an oral‑history project that captures the stories of longtime residents, culminating in a small memoir
    of her own life. Maintaining her health is a personal goal, so she has set a routine of daily walks and regular wellness check‑ups. Morgan also hopes to expand her desert garden into an educational
    plot that school children can visit, and she wants to deepen her coping skills for anxiety through mindfulness journaling.
