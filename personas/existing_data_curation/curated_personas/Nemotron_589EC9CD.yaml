personas:
  professional: Fortunato Dunham is a budding automotive technician who leverages a solid hands‑on foundation from vocational training and garage work to diagnose engines, tune suspensions, and experiment
    with electric‑vehicle conversions, all while they balance a curiosity for new tech with a relaxed, sometimes disorganized approach to scheduling and customer communication.
  sports: Fortunato Dunham powers through weightlifting sessions at Iron Forge Gym, casts a line on the Atchafalaya River on weekends, roots for the LSU Tigers football team and the New Orleans Pelicans
    basketball squad, and participates in the Baton Rouge Car Club’s monthly autocross meet, where they channel competitive energy into both the gym and the track.
  arts: Fortunato Dunham unwinds by shredding classic rock riffs on an electric guitar, drawing inspiration from Led Zeppelin, Stevie Ray Vaughan, and Cajun legend Clifton Chenier, while also attending
    Baton Rouge’s Cajun‑style music festivals and binge‑watching Quentin Tarantino films for a dose of cinematic flair, and they often discuss the music’s technical nuances with fellow festival‑goers.
  travel: Fortunato Dunham favors low‑cost road trips that blend fishing on the Atchafalaya with pit‑stops at regional car shows in Austin and Detroit, dreams of a tech‑obsessed tour of Tokyo’s tuning scene,
    and they generally plan on a whim due to a tight student budget and a preference for spontaneous adventure.
  culinary: Fortunato Dunham relishes cooking hearty gumbo and jambalaya with andouille sausage and crawfish at home, experiments with a DIY smoked brisket rub, enjoys the occasional greasy cheeseburger
    after a long garage shift, and they rate the spice blend of paprika, cayenne, and thyme as essential to their flavor palate.
  core: Fortunato Dunham blends grease‑stained hands, electrifying guitar solos, an anxious mind, and a knack for last‑minute plans into a restless yet inventive young mechanic, and they constantly juggle
    the roar of engines with the hum of inner turmoil.
background:
  cultural: Fortunato grew up in a working‑class, white Southern family in Baton Rouge, where his father worked as a mechanic and his mother was a school cafeteria manager. The household reflected the pragmatic,
    self‑reliant values typical of the region, combined with a strong sense of Southern hospitality. While his family is largely Anglo‑American, the local cultural fabric—Cajun and Creole food, zydeco music,
    Mardi Gras celebrations, and a love for outdoor activities like fishing—has shaped his tastes and social life. He was raised in a Baptist congregation, which emphasized community service and personal
    responsibility. These cultural influences blend with his curiosity about new technology, giving him a practical yet open‑minded outlook on both his career and leisure pursuits.
attributes:
  skills: '[''Engine diagnostics (OBD‑II)'', ''Brake system repair and bleed'', ''Suspension and steering overhaul'', ''Fuel‑injection and ignition troubleshooting'', ''Diesel and gasoline powertrain servicing'',
