    writing'']'
  hobbies: '[''Car restoration (1998 Chevrolet Camaro)'', ''Performance tuning and custom builds'', ''Watching automotive YouTube channels and car shows'', ''Playing electric guitar (classic rock, Southern
    blues)'', ''Weightlifting and gym workouts'', ''Fishing on the Atchafalaya River'', ''Attending Cajun music festivals and trying local cuisine'', ''Racing simulation games (iRacing, Forza)'', ''Arduino
    electronics tinkering'', ''Volunteering to teach car maintenance to high‑school students'']'
  career_goals: Fortunato aims to become an ASE Certified Master Technician within the next three years, adding specialty certifications in performance tuning and electric‑vehicle conversions. He plans
    to leverage his curiosity for emerging automotive technology to become a go‑to expert for local car‑enthusiast clubs. In the longer term, he hopes to open a small independent garage in Baton Rouge that
    emphasizes personalized service, flexible scheduling, and a space for hobbyist projects like custom builds and track‑day prep. He also wants to enroll part‑time in an automotive technology associate
    program to deepen his theoretical knowledge while maintaining a hands‑on focus. Competitive drive pushes him to enter regional tuning contests and to build a reputation as the most reliable and innovative
    mechanic among his peers.
