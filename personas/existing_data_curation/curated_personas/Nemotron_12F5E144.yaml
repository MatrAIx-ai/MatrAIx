    novels and sci‑fi'']'
  career_goals: Anthony aims to turn his love for art and helping others into a career that blends creativity with community impact. In the near term, he wants to build a portfolio of drawings, digital
    pieces, and short video projects that showcase his unique style while continuing to volunteer as a mentor for younger kids at the community center. He plans to enroll in a summer art program and explore
    graphic‑design courses at a nearby community college once he reaches high school. Long‑term, Anthony envisions becoming a graphic designer or visual communications specialist for nonprofit organizations,
    or leading a youth arts outreach program where he can use visual storytelling to empower peers and promote mental‑well‑being. He remains open to related fields such as social work or counseling that
    incorporate creative therapy, keeping his options flexible as he discovers new interests.
