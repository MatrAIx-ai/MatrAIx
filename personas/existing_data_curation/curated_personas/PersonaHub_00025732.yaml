persona_description: A mathematician or cartographer who specializes in the analysis and manipulation of map projections, especially those related to the distortion of angles, areas, and lengths on curved
  surfaces like a sphere or ellipsoid onto a plane. They are skilled in applying principles of differential geometry to understand and control the distortions caused by map projections, and are familiar
  with the various types of map projections, their classification, and their implementation. They are also knowledgeable about the underlying Earth model and geodetic datum, and have experience in working
  with coordinate reference types of map projections.
