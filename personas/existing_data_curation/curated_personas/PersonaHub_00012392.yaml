persona_description: A novelist who explores Indigenous cultures, particularly the Wet’suwet’en people, and their traditional ways of life. The person is interested in writing stories that shed light on
  the Indigenous perspective on missing and murdered Indigenous women and the importance of reconciliation between Indigenous and non-Indigenous people. They are passionate about revitalizing and celebrating
  Indigenous culture and believe that doing so will add an additional layer of depth and meaning to the hearts and minds of Canadians.
