personas:
  professional: Matthew Boswell is a data‑driven wholesale sales associate who leverages their methodical organization, persuasive presentation skills, and competitive drive to consistently exceed industrial
    manufacturing targets while maintaining meticulous CRM reports.
  sports: Matthew Boswell plays forward for a Eugene recreational soccer league, hikes the Cascade foothills every weekend, follows the Portland Timbers in MLS and the Oregon State Beavers football team,
    and follows a bi‑weekly strength‑training schedule at the local gym to stay agile for bike rides.
  arts: Matthew Boswell frequents live music nights at the Hult Center, where they enjoy sets by The Decemberists, Fleet Foxes, and home‑grown indie folk group The Morning Song, while also capturing sunrise
    shots of the Willamette River with a DSLR inspired by Ansel Adams.
  travel: Matthew Boswell prefers eco‑friendly road trips that combine hiking and community service, having backpacked a section of the Pacific Crest Trail in Oregon, spent a weekend exploring the craft‑beer
    scene in Vancouver, and now saving for a cycling tour of the Swiss Alps.
  culinary: Matthew Boswell’s palate is dominated by craft‑beer experimentation, especially citrus‑laden IPAs, paired with Pacific Northwest staples like cedar‑plank salmon and mushroom risotto, and they
    boast a reliable sourdough starter, though they frequently forget to let the dough fully proof.
  core: Matthew Boswell is a competitively driven, hyper‑organized 20‑year‑old who balances aggressive sales goals with a passion for craft brewing, mountain‑bike adventures, and sustainable community projects,
    all while maintaining a calm, resilient demeanor.
background:
  cultural: Matthew grew up in a middle‑class, white American family in Eugene, Oregon. His parents, both former teachers, emphasized practical education, self‑discipline, and community involvement. The
    Pacific Northwest’s culture of environmental stewardship, outdoor recreation, and progressive community values shaped his worldview, fostering a respect for sustainability and local initiatives. While
    he maintains a pragmatic, organized outlook typical of a Midwestern upbringing, his exposure to the university environment at the University of Oregon broadened his social circle, encouraging openness
    to diverse ideas yet preserving his competitive drive and calm resilience.
attributes:
  skills: '[''Wholesale sales prospecting'', ''Consultative selling'', ''Negotiation'', ''CRM (Salesforce) administration'', ''Data analysis and sales forecasting'', ''Inventory and supply-chain coordination'',
    ''Presentation and public speaking'', ''Time management'', ''Microsoft Excel advanced'', ''Customer relationship management'']'
  hobbies: '[''Recreational soccer'', ''Hiking and mountain biking in the Cascades'', ''Board game nights'', ''Home-brewing craft beer'', ''Live music festivals'', ''Volunteering with Habitat for Humanity'',
    ''Nature photography'', ''Strength training at the gym'']'
  career_goals: Matthew aims to become a top‑performing sales professional within the next three years, targeting a senior sales representative role and eventually a territory manager position for a regional
    manufacturing distributor. He plans to complete his Bachelor’s degree in Business Administration while obtaining sales certifications such as the Certified Professional Sales Person (CPSP). Long‑term,
    he envisions leading a sales team as a regional director or launching his own sustainable‑focused wholesale venture that supplies eco‑friendly manufacturing components across the Pacific Northwest.
    He is motivated by measurable performance targets, leadership development, and the opportunity to shape sales strategy in a growing, environmentally conscious market.
