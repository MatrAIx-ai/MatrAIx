  hobbies: '[''Visiting art museums and galleries'', ''Watercolor painting'', ''Reading classic literature and contemporary poetry'', ''Genealogy research'', ''Gardening (heirloom vegetables)'', ''Walking
    historic district tours'', ''Attending university lectures'', ''Knitting for charity'', ''Playing bridge'', ''Listening to classical music concerts'']'
  career_goals: Although retired, Tina focuses on leaving a cultural legacy in Wethersfield. She aims to establish a small archive of oral histories from longtime residents, author a memoir that intertwines
    her personal journey with the town’s artistic evolution, and become a regular docent at the nearby Wethersfield Historical Society museum. Additionally, she hopes to launch a quarterly intergenerational
    art series that pairs seniors with local high‑school students, and to travel to a few key European museums that have long inspired her curiosity.
