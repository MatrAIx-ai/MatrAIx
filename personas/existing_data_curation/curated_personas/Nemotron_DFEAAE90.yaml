personas:
  professional: Yadriel Barroso, a two‑year‑old tinkerer who loves to line up toy blocks by shape and color, frequently narrates imaginative building stories and they often propose new stacking methods,
    showing early signs of engineering curiosity and organized creativity.
  sports: Yadriel Barroso loves the splash pad at Riverview Community Park, participates in a toddler soccer program with the ‘Riverview Cubs’, eagerly cheers for the Detroit Tigers on game night, and they
    often practice a wobbling kick with a soft foam ball, balancing energetic play with brief moments of quiet observation.
  arts: Yadriel Barroso frequently hums along to lively mariachi tunes heard at the local cultural center, enjoys finger‑painting bright sunflowers, can recite simple verses from picture books about Frida
    Kahlo, and they adore listening to the soundtrack of ‘Coco’ while dancing to ‘La Bamba’, reflecting a deep appreciation for colorful artistic expression.
  travel: Yadriel Barroso has explored the Michigan Zoo in Lansing, marveled at the sand dunes of Sleeping Bear, and taken a family road trip to San Antonio’s River Walk, where they were fascinated by lanterns
    and riverboats; they prefer the security of the car seat during travel but love short stroller walks in new parks, and they dream of visiting the historic streets of Mexico City seen in storybooks.
  culinary: Yadriel Barroso delights in warm corn tortillas, soft chicken tamales, and avocado cubes, loves smearing guacamole on their cheek as a tasty game, eagerly helps stir a pot of mild salsa while
    they sometimes protest peas, and they can name the difference between a mild pico de gallo and a spicy salsa roja.
  core: Yadriel Barroso is a curious two‑year‑old who balances organized block‑building with spontaneous dance, hoards coins in a painted piggy bank, keeps mild eczema under control with diligent care,
    revels in vibrant cultural music, and insists on one extra nap before bedtime.
background:
  cultural: Yadriel is raised in a Mexican-American family in Riverview, Michigan. At home, Spanish and English are spoken interchangeably, and family gatherings feature traditional Mexican foods like tacos
    and tamales, as well as celebrations of Día de los Muertos and Cinco de Mayo. He participates in community events at the local Hispanic cultural center, where he is exposed to mariachi music, folk dances,
    and stories from Mexican heritage. These cultural experiences nurture his appreciation for art, music, and social harmony.
