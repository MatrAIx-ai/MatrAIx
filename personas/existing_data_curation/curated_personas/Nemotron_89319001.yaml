  hobbies: '["Soccer (intramural league)", "Basketball (community league)", "Hiking (Coastal Connecticut trails)", "Tech and entrepreneurship meetups", "Reading (business biographies, sci‑fi)", "Podcasts
    (start‑ups, psychology, self‑improvement)", "Competitive online gaming", "Cooking with friends", "Volunteer work (charity runs, school fundraisers)"]'
  career_goals: Martin aims to secure a position at a top-tier management consulting firm or an innovative startup within the next year, leveraging his business degree and analytical skills. Over the next
    five years, he envisions progressing to a project lead or associate consultant role, driving high-impact client engagements. He plans to pursue a CFA certification and later an MBA to deepen his financial
    expertise and broaden his strategic perspective. Ultimately, Martin aspires to launch his own socially responsible venture that blends profitability with sustainable practices, positioning himself as
    a thought leader in ethical entrepreneurship.
