  hobbies: '[''Recreational Softball'', ''Food Pantry Volunteering'', ''Community Theater (Backstage)'', ''Hiking in Cuyahoga Valley'', ''Gardening'', ''Cooking New Recipes'', ''Attending Local Festivals'',
