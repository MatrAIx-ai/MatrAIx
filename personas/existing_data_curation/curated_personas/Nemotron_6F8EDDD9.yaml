  career_goals: Cana aims to progress to a senior HR leadership role, such as HR Director, where he can shape strategic workforce initiatives and mentor the next generation of HR professionals. He is pursuing
    the SHRM‑Senior Certified Professional (SHRM‑SCP) credential to deepen his strategic expertise. Over the next five years, he plans to lead a company‑wide diversity and inclusion program, expand his
    organization’s use of data‑driven talent analytics, and eventually transition into a consulting capacity that allows him to share best practices across multiple businesses while maintaining a balanced,
    people‑first approach.
