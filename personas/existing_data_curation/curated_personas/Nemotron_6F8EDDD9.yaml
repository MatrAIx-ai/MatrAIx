personas:
  professional: Cana Garmany has spent over thirty years mastering human‑resources functions—from employee relations and talent acquisition to labor‑law compliance—combining a practical grasp of established
    policies with a curiosity for emerging people‑analytics tools, and now channels that blend into a strategic push toward an HR Director role while they mentor the next generation of HR professionals.
  sports: Cana Garmany anchors the Bay Village Recreational Softball League as a third‑base player, hikes the rolling trails of Cuyahoga Valley National Park each spring, proudly cheers for the Cleveland
    Guardians and Cleveland Browns, and leads a weekend walking club for senior neighbors, embodying energetic, community‑focused fitness.
  arts: Cana Garmany works behind the curtain with a local community theater crew, revels in the electrifying sound of classic‑rock legends like Led Zeppelin, The Rolling Stones, and Pink Floyd at live
    concerts, and regularly attends performances at Playhouse Square, weaving artistic appreciation into their social calendar.
  travel: Cana Garmany prefers semi‑planned road trips with their spouse, having recently explored the vineyards of Napa Valley, revisited the historic streets of Savannah, and attended the Kent Fall Festival,
    balancing adventure with the comfort of familiar, accessible destinations.
  culinary: Cana Garmany enjoys farm‑to‑table cooking, turning garden‑grown heirloom tomatoes, sweet basil, and crisp zucchini into a signature roasted vegetable lasagna, while they sometimes forget to
    preheat the oven in their enthusiasm for experimenting with new recipes.
  core: Cana Garmany is an outgoing, organized HR veteran who fuses curiosity with practicality, fuels community life through sports, theater and classic rock, and balances disciplined finances with occasional
    indulgences.
background:
  cultural: Cana was raised in the Greater Cleveland area and embodies the Midwestern values of politeness, reliability, and community involvement. His family’s roots trace back several generations to European
    immigrants, primarily of German and Irish descent, who settled in Ohio during the early 20th century. Growing up in a suburban environment, he absorbed a strong work ethic, an appreciation for collective
    harmony, and a pragmatic approach to problem‑solving. These cultural influences shape his collaborative leadership style in HR and his commitment to fostering inclusive, supportive workplaces.
