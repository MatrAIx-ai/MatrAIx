persona_description: 'A developmental psychologist who specializes in the theory and application of Josselson''s (1996) theory of identity formation, particularly in the context of student development.
  The person is knowledgeable about the four categories of identity formation: Guardians, Pathmakers, Searchers, and Drifters. They are familiar with Josselson''s (1996) theory and its application in working
  with students. The person is also familiar with Belenky, Clinchy, Goldberger, and Tarule''s (1997) theory of women''s ways of knowing and how it can be applied to student development. The person has experience
  with both Krumboltz (2009) and Astin (1988) and is skilled in using the theories in a practical way. The person is likely to be a professor or counselor who works with students in developing their identity
  and understanding their ways of knowing.'
