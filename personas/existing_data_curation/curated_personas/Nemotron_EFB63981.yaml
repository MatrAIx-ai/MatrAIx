  career_goals: Brianna dreams of becoming a veterinarian, motivated by her love for animals and her desire to help them stay healthy. She also imagines herself as a future scientist who creates practical
    solutions to everyday problems, such as designing better recycling systems for her community. In the longer term, she hopes to lead school clubs and community projects, using her organizational talent
    and sociability to bring people together.
