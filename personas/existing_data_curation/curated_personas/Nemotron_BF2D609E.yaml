personas:
  professional: Michele Core, a seasoned maintenance consultant with four decades of hands‑on repair experience, leverages quick diagnostic instincts and a collaborative spirit, even as their spontaneous
    nature leads them to improvise solutions on the fly rather than follow rigid schedules, and they proudly mentor a younger apprentice while pursuing EPA Section 608 certification.
  sports: Michele Core, a member of the Aneta Senior Walking Club, spends mornings birdwatching along the Red River while staying fit, supports the Bismarck State University Bison football team and the
    Minnesota Vikings, enjoys casual pickleball at the community center each summer, and they find walking the most practical form of exercise.
  arts: Michele Core, who delights in the historical novels of Philippa Gregory, the folk melodies of Woody Guthrie, and the classic westerns of John Wayne, often spins vinyl records while restoring radios
    and attends the North Dakota State Fair's arts showcase each year, and they use these cultural experiences to fuel their creative problem‑solving.
  travel: Michele Core, whose travel style blends meticulous planning with spontaneous detours, has explored Theodore Roosevelt National Park, taken a road trip to Manitoba’s prairie lakes, dreams of retiring
    to a cabin on Lake of the Woods, and they usually keep vacations within the Upper Midwest due to budget constraints.
  culinary: Michele Core, a confident home cook, regularly prepares hearty bean stew with smoked paprika, fresh garden tomatoes, and cornbread, delights in a buttery apple crumble from a local bakery, and
    they often over‑salt dishes in enthusiasm while teaching apprentices to build wooden kitchen shelves.
  core: Michele Core blends restless curiosity for tinkering with a steady, community‑first mindset, often improvises practical fixes while sneaking extra time for vintage radios, garden rows, and a well‑worn
    pair of binoculars, yet they frequently leave paperwork unfinished due to a spontaneous streak.
background:
  cultural: Michele was raised on a family farm near Grand Forks County, steeped in Midwestern values of self‑reliance, hard work, and neighborly support. Her ancestry traces back to German and Scandinavian
    immigrants who settled the Red River Valley in the early 1900s, influencing her appreciation for practicality, seasonal cycles, and community gatherings. Growing up in Aneta, she internalized the region’s
    modest, cooperative ethos, which continues to shape her approach to work, family, and community involvement.
attributes:
  skills: '["HVAC system maintenance", "Plumbing repairs", "Electrical wiring and troubleshooting", "Small engine repair (tractors, generators, lawn mowers)", "Carpentry and woodworking", "Basic welding",
    "DIY home renovation", "Tool and equipment maintenance", "Energy‑efficiency upgrades (insulation, LED retrofits)"]'
  hobbies: '["Restoring vintage radios", "Woodworking", "Gardening", "Birdwatching", "Historical fiction reading", "Cross‑stitching", "Attending state fairs", "Volunteering at local fire department", "Community
    potluck planning"]'
  career_goals: Approaching retirement, Michele aims to shift from full‑time employment to a part‑time consultancy role, offering her maintenance expertise to local farms and households. She hopes to mentor
    a younger apprentice—potentially a family member—and obtain an EPA Section 608 certification to safely handle refrigerants. Additionally, she plans to lead community workshops on home repair and sustainable
    retrofitting, preserving her practical knowledge for future generations in Aneta.
