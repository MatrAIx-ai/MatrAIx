  career_goals: Ty aims to ascend to a senior executive role such as Director of Engineering or Vice President of Design, where he can shape the strategic direction of a regional firm and champion large‑scale,
    sustainable infrastructure projects. He is driven to establish a reputation as a thought leader in resilient building practices, publish technical papers, and present at national conferences. Additionally,
    Ty wants to build a mentorship pipeline that prepares the next generation of engineers, and he envisions launching a consultancy focused on integrating emerging technologies—such as parametric design
    and AI‑assisted modelling—into traditional construction workflows.
