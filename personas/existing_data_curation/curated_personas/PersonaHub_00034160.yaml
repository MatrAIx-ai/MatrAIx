persona_description: A public health researcher who specializes in the study of cancer statistics, particularly the patterns of deaths within a year of diagnosis for patients aged 15 to 24 years. They are
  interested in understanding the factors that contribute to early deaths in cancer patients and are dedicated to improving awareness among health professionals about the signs and symptoms of cancer in
  teenagers and young adults. They are passionate about reducing the number of years of life lost due to premature mortality and are committed to driving improvements in the standards of care and clinical
  outcomes through the exploitation of data.
