personas:
  professional: Richard Flor, a seasoned industrial welder with 25+ years of experience, blends mastery of MIG, TIG, and stick welding with a creative flair for kinetic metal art, leading small shop teams
    while championing safety compliance and mentoring apprentices, all while embracing a relaxed, sometimes disorganized work style that favors flexibility over strict planning.
  sports: Richard Flor hikes the Columbia River Gorge trails with a local outdoor club, fishes the Willamette River for trout on weekends, supports the Seattle Seahawks and Portland Timbers, and attends
    community pick‑up basketball games, balancing rugged outdoor pursuits with casual fandom.
  arts: Richard Flor immerses themselves in Pacific Northwest culture, playing drums in a blues band that covers B.B. King and Muddy Waters, frequenting galleries showcasing artists like Mary Iverson, and
    collaborating at a makerspace on metal sculptures inspired by indigenous totemic forms, letting rhythm and visual art shape their identity.
  travel: Richard Flor prefers road trips that blend adventure and craftsmanship, having explored the San Juan Islands, hiked Alaska's Denali National Park, and dreaming of a workshop retreat in Tuscany,
    yet they keep travel plans loose to accommodate spontaneous local festivals.
  culinary: Richard Flor favors grilled salmon on cedar planks, smoked brisket with a rub of smoked paprika and brown sugar, enjoys crafting craft beer‑paired barbecues, and boasts a competent yet improvisational
    cooking style that often subsumes recipes into experimental flavor experiments.
  core: Richard Flor is a charismatic, restless metal artisan who mixes a love of welding, drumming, and DIY projects with a laid‑back, sometimes chaotic approach to life that fuels both creative breakthroughs
    and occasional disarray.
background:
  cultural: Richard is a Euro‑American raised in Vancouver, Washington, with deep roots in the Pacific Northwest working‑class culture. His family tradition of hands‑on trades and self‑reliance shaped his
    respect for craftsmanship. He grew up amid the region’s blend of industrial manufacturing and a thriving indie arts scene, which fostered his appreciation for both practical engineering and creative
    expression. Local outdoor recreation, community events, and the multicultural influences of nearby Indigenous art have also informed his worldview and artistic sensibilities.
attributes:
  skills: '[''MIG Welding'', ''TIG Welding'', ''Stick Welding'', ''Brazing'', ''Precision Soldering'', ''Metal Fabrication'', ''Blueprint & CAD Interpretation'', ''Equipment Maintenance'', ''OSHA Safety
    Compliance'', ''Problem Solving'', ''Team Leadership'', ''Mentoring Apprentices'', ''Creative Metal Art'']'
  hobbies: '[''Visiting Art Galleries'', ''Attending Craft Fairs'', ''Playing Drums in a Blues Band'', ''Hiking'', ''Fishing'', ''Barbecuing'', ''DIY Home Renovations'', ''Vintage Car Restoration'', ''Building
    Custom Furniture'', ''Volunteering at a Makerspace'']'
  career_goals: Richard aims to transition from full‑time shop work to running a boutique metal‑art studio that serves both private commissions and local architectural projects. He plans to earn an American
    Welding Society Certified Welder credential, expand his portfolio of kinetic sculptures, and secure partnerships with interior designers and municipal art programs. Over the next five years he hopes
    to mentor a small group of apprentices, achieve a flexible schedule that balances family time, and eventually take on consulting roles for manufacturing firms seeking process improvements.
