persona_description: A farmer who manages a dairy farm in New Zealand, specifically focusing on managing the impact of unpredictable and variable summer conditions on milk production and farm profit. The
  farmer is proactive in implementing proven strategies to minimise the impact of dry summers and irrigation restrictions, and prioritizes early planning and decision-making based on the best available
  information. The farmer recognizes the importance of fully and efficiently using spring pasture before dry and hot conditions reduce the growth and quality of pasture, and seeks to minimize the stress
  and lower profit associated with these events.
