  hobbies: '[''Landscape Painting'', ''Hiking'', ''Sketching'', ''Attending Gallery Openings'', ''Theater'', ''Collecting Vintage Postcards'', ''Chess'', ''Puzzles'', ''Gardening'', ''Book Club'', ''Photography
    Outings'']'
  career_goals: John's primary ambition is to remain mentally and physically active while leaving a lasting positive impact on his community. He aims to mentor younger artists and volunteers by offering
    workshops in woodworking and photography, to compile a memoir that intertwines his personal history with the cultural heritage of Travelers Rest, and to curate a small local exhibition featuring his
    own artwork and the creations of fellow seniors. He also hopes to expand his knowledge of digital media, complete a series of landscape paintings of the Blue Ridge, and maintain his health through regular
    walking and gardening so he can continue contributing for years to come.
