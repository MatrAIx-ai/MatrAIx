personas:
  professional: John Waldon is a retired manufacturing worker turned community arts coordinator who leverages their woodworking, photography, and event‑planning expertise to mentor senior volunteers, while
    their relaxed approach sometimes leaves projects half‑finished.
  sports: John Waldon enjoys moderate hikes on the Blue Ridge trails and follows the Greenville Drive baseball team, while they also participate in senior‑center chess tournaments that satisfy their competitive
    streak, preferring low‑impact activities that align with their age and love of nature.
  arts: John Waldon is an avid watercolorist who captures sunrise over the mountains, attends gallery openings featuring artists such as Andrew Lane, collects vintage postcards, and engages in lively post‑show
    discussions, allowing their curiosity and appreciation for history to shape their creative expression.
  travel: John Waldon prefers leisurely road trips along the Blue Ridge Parkway and weekend getaways to Asheville, occasionally joining group tours to historic Charleston, yet they dream of exploring the
    Grand Canyon, balancing careful budgeting with a love for spontaneous, nature‑centric travel.
  culinary: John Waldon delights in cooking simple Southern dishes like shrimp and grits and fresh garden tomato salads, occasionally experimenting with edible wildflowers from their garden, but they often
    over‑season meals and rely on ready‑made side dishes when energy wanes.
  core: John Waldon is a curious, relaxed octogenarian whose love of art and community is tempered by occasional forgetfulness, a tendency to leave digital projects unfinished, and a competitive edge that
    shines in chess and gardening.
background:
  cultural: John grew up in a small town in upstate South Carolina during the 1940s and 1950s, steeped in the traditions of Southern Appalachia. His family valued hard work, self-reliance, and community
    ties, with a strong emphasis on church gatherings and local festivals. The region's storytelling heritage and appreciation for handcrafted objects shaped his early interests in woodwork and oral history.
    Although his upbringing was framed by the social changes of the civil-rights era, he developed a cautious optimism and a respect for diverse perspectives, which later manifested in his curiosity about
    new ideas and art forms. The proximity to the Blue Ridge Mountains fostered a lifelong love of nature, influencing both his recreational pursuits and his artistic subjects. Today, he identifies with
    the blend of Southern hospitality, modest pragmatism, and a quietly progressive outlook that reflects the evolving culture of Travelers Rest.
