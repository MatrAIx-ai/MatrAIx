personas:
  professional: Joseph Mendoza, a budding robotics enthusiast who spends weekends building LEGO Technic models and programming autonomous robots in the school club, channels a love for structure into meticulous
    project planning, and they often volunteer to lead the team’s schedule, balancing practicality with a flair for creative problem‑solving.
  sports: Joseph Mendoza, a point‑guard on the Eastside Middle School basketball squad, thrives on the clear playbook and rulebook of the game, idolizes the strategic court vision of Stephen Curry, and
    they maintain a disciplined practice schedule that balances schoolwork and team drills while spending Friday evenings shooting hoops at the community gym's youth league.
  arts: Joseph Mendoza, an avid sci‑fi reader who devours Asimov’s Foundation series and Liu Cixin’s Three‑Body Problem, draws weekly comic strips starring a robot detective inspired by classic engineers,
    and they unwind to the synth‑laden scores of Daft Punk and the orchestral soundtracks of Studio Ghibli, especially the works of composer Joe Hisaishi.
  travel: Joseph Mendoza, whose family road‑trip to Washington, D.C. sparked a fascination with the National Air and Space Museum and whose summer visit to Orlando’s theme parks fueled a love for immersive
    experiences, now dreams of attending the Tokyo Robot Expo and exploring Barcelona’s Gaudí‑filled streets, and they prefer itineraries that blend hands‑on tech museums with a few days of relaxed sightseeing.
  culinary: Joseph Mendoza, a budding home‑chef who can whip up a reliable pepperoni pizza using pre‑made dough, mozzarella, and a rich tomato sauce, and proudly prepares their favorite spaghetti carbonara
    with pancetta, grated Pecorino, and a velvety egg‑yolk sauce, and they often experiment with taco bowls loaded with seasoned ground beef, black beans, corn, and fresh cilantro during weekend cooking
    sessions.
  core: Joseph Mendoza, a 13‑year‑old structure‑loving tinkerer, balances disciplined LEGO builds, strategic gaming, and basketball teamwork while they navigate teen life with a blend of methodical planning,
    occasional impulsive splurges, and a quiet determination to turn ideas into tangible creations.
background:
  cultural: Joseph comes from a white, middle-class family in suburban Canton, Michigan. His parents are of mixed European ancestry, with his father tracing roots to Irish and German immigrants and his
    mother having Spanish-European heritage; they identify as American while maintaining an appreciation for a few cultural traditions from their ancestral homelands. Growing up in the Detroit-area suburbs,
    Joseph attends the local public middle school, participates in community events like the annual Fourth of July parade, and celebrates typical American holidays such as Thanksgiving and Halloween. The
    family's emphasis on education, responsibility, and community service reflects the broader Midwestern values of reliability and practicality.
