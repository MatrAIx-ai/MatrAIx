  career_goals: Joseph aspires to attend a high-school program that emphasizes STEM subjects, with the long-term goal of becoming a civil engineer or a software developer. He values a career that offers
    clear pathways, stable employment, and opportunities to solve concrete problems, such as designing infrastructure or creating useful applications. Over the next few years, he plans to deepen his coding
    knowledge, participate in the school's robotics team, and maintain strong academic performance to secure scholarships for college. Ultimately, he hopes to contribute to his community by working on projects
    that improve local neighborhoods while following a structured, predictable career trajectory.
