personas:
  professional: Regie Horton, a budding robotics enthusiast and middle‑school strategist, merges a love for cutting‑edge Arduino projects with a pragmatic reliance on proven mechanical designs, while channeling
    their competitive edge from multiplayer gaming into leading the school’s robotics club.
  sports: Regie Horton dominates the local youth basketball court, cheers for the New Mexico State Aggies, shreds at the community skate park, and tackles the Sandia Mountains on weekends, all while staying
    a devoted fan of the Albuquerque Isotopes baseball team.
  arts: Regie Horton crafts fast‑paced highlight reels of multiplayer battles set to Billie Eilish’s latest tracks, admires the graphic art of indie game studios like Supergiant Games, and spends quiet
    evenings listening to the classic guitar riffs of Carlos Santana while sketching model‑airplane designs.
  travel: Regie Horton’s travel style blends spontaneous road trips to the nearby Sandia Mountains with dreams of attending the Tokyo Game Show, and they keep a mental list of must‑see spots like the Grand
    Canyon, the Albuquerque International Balloon Fiesta’s night glow, and a family road‑trip to the Utah national parks.
  culinary: Regie Horton’s palate favors southwestern staples such as carne adovada enchiladas and green chile stew, but they also love quick pizza slices and can whip up a decent batch of homemade salsa
    verde, though their cooking skills hover at the novice level, mostly relying on YouTube tutorials.
  core: Regie Horton is a curious, competitive teen who juggles robotics, basketball, and gaming while navigating a laid‑back approach to money and health, often forgetting plans but always ready for the
    next challenge.
background:
  cultural: Regie grew up in a suburban neighborhood of Albuquerque, where the desert landscape and Southwestern heritage shape daily life. Though his family identifies as white, they’ve lived in New Mexico
    for generations and have adopted regional customs such as celebrating with New Mexican green chile at family gatherings, attending the annual Balloon Fiesta, and appreciating Pueblo art. Exposure to
    Spanish through school and community events has given Regie a modest familiarity with the language. Seasonal trips to the Sandia Mountains and participation in local youth sports leagues reinforce a
    blend of Anglo‑American upbringing with the unique cultural mosaic of the Southwest.
attributes:
