  hobbies: '[''Playing basketball'', ''Skateboarding'', ''Robotics club'', ''Multiplayer video gaming'', ''Video editing'', ''Hiking in Sandia Mountains'', ''Building model airplanes'', ''Attending Albuquerque
    International Balloon Fiesta'', ''Learning basic Spanish'']'
  career_goals: Regie dreams of turning his love for building things into a career as a robotics engineer, ideally one who designs equipment for sports or outdoor recreation. He hopes to win state‑level
    robotics competitions while keeping the option open for a scholarship that could let him play college basketball. Ultimately, he wants a flexible path that blends technical innovation with the thrill
    of competition.
