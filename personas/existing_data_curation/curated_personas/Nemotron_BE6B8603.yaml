  career_goals: Montoya aims to become a lead software architect within the next five years, guiding large‑scale, cloud‑native systems while maintaining high standards of security and performance. He plans
    to earn the AWS Solutions Architect Professional certification, deepen his expertise in micro‑services and distributed systems, and eventually transition into a technical leadership role that allows
    him to mentor junior engineers remotely, aligning with his preference for focused, solitary work. Long‑term, he aspires to launch his own SaaS platform that addresses productivity challenges for remote
    developers, channeling his curiosity for new ideas into pragmatic, scalable solutions.
