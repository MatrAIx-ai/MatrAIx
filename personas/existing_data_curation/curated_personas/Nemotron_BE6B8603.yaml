personas:
  professional: Montoya Woods, a 28-year-old full-stack developer and cloud infrastructure specialist, leverages a disciplined, security-first mindset and a love for algorithmic efficiency to design high-performance,
    scalable systems while meticulously documenting code, and they are pushing toward a lead software architect role.
  sports: Montoya Woods maintains fitness through solo weekend hikes with the Trailblazers Hiking Club, occasionally joins a weekend cycling group, follows the strategic plays of the Dallas Mavericks (NBA)
    and the Houston Astros (MLB), and they prefer low-impact, disciplined workouts over competitive team sports.
  arts: Montoya Woods's artistic life revolves around listening to Miles Davis's modal jazz, vibing to Kendrick Lamar's introspective hip-hop, and taking inspiration from Ansel Adams's black-and-white landscape
    photography, which fuels both their keyboard-building aesthetic and weekend photography outings, and they often curate playlists that blend improvisational jazz solos with lyrical hip‑hop verses while
    coding.
  travel: Montoya Woods adopts a meticulously planned, budget-conscious travel style, favoring solo trips to photography-rich destinations like Iceland's glaciers, Japan's tech districts, and the Appalachian
    Trail, while they rely on precision itineraries and lightweight gear to maximize exploration between remote work sprints.
  culinary: Montoya Woods experiments with Southern-style cooking, mastering dishes such as shrimp and grits, smoked brisket, and collard greens, and they treat each recipe like a programmable algorithm,
    meticulously measuring spices like smoked paprika and cayenne to achieve reproducible flavor profiles.
  core: Montoya Woods is a solitary, curiosity-driven tech architect who balances obsessive organization with competitive gaming, occasionally neglects social calls, and rewards themselves with rare keyboard
    switches and smoky Southern cuisine.
background:
  cultural: Montoya is a Black American who grew up in the Washington‑DC metropolitan area before moving to Stafford, Virginia. His family’s roots trace back to the Great Migration, and cultural traditions
    such as church gatherings, soulful music, and Southern comfort food have shaped his identity. He draws strength from the resilience of his ancestors and the close‑knit support of the Black community
    in Northern Virginia, which has inspired his disciplined work ethic and competitive drive. Montoya stays connected to his heritage through participation in local Black tech meet‑ups, mentorship programs
    for underrepresented youth, and celebrating holidays like Juneteenth and Kwanzaa with his family.
