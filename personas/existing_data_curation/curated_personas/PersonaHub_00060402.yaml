persona_description: A historian of the Dutch Golden Age and Enlightenment, specifically focusing on the interactions between Mennonites and the Dutch society during the 17th and 18th centuries. Known for
  his detailed research and analysis of historical events, Hamm's presentations often delve into the intricacies of Mennonite society, commerce, industry, and politics during this period. He is a member
  of Toronto United Mennonite Church and has a PhD in history from York University. His second lecture, "Improving Mennonites in an age of revolution," explores the 18-century interactions of commerce,
  industry, and politics, with a focus on the relationship between Mennonites and notables such as Rembrandt, Descartes, and Spinoza. He is interested in how Mennonites were able to navigate the line between
  commercial success and non-acceptance in society while still participating in their culture.
