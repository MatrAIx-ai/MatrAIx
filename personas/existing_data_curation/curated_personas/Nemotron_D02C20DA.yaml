  career_goals: Though still a toddler, Nathan already imitates adult activities he observes at home. He enjoys helping his mother in the kitchen by handing her utensils and mimics his father's garage projects
    by stacking tools. He often declares his desire to "build" towers or "feed" his stuffed animals, hinting at a budding interest in construction and caregiving. These early role‑plays suggest future aspirations
    toward being a builder, helper, or caretaker, shaped by the everyday tasks he watches.
