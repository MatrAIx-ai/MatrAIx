personas:
  professional: Caleb Feldman is an aspiring young digital creator who blends sketching, LEGO engineering, and Scratch coding to prototype imaginative worlds, channeling a competitive drive and meticulous
    organization into every project.
  sports: Caleb Feldman plays forward for the local youth soccer club, the Riverdale Rovers, idolizes the playing style of Lionel Messi, watches Premier League matches of Manchester City on weekends, and
    mixes competitive drills with strategic board-game tactics learned from Settlers of Catan.
  arts: Caleb Feldman frequents the city art museum to study the surreal canvases of Salvador Dalí and the vibrant animations of Studio Ghibli, incorporates those influences into hand-drawn character designs,
    and enjoys listening to the synth-rich soundtracks of Daft Punk while experimenting with digital brushes.
  travel: Caleb Feldman has taken a family road trip to the Grand Canyon, dreams of visiting the interactive exhibits at Tokyo’s teamLab Borderless museum, and plans a future summer camping adventure in
    the nearby national forest, balancing curiosity for new landscapes with the practical need for school-year budgeting.
  culinary: Caleb Feldman likes whipping up quick recipes like cheesy quesadillas and banana-pancake muffins, experiments with fresh basil and cherry tomatoes for a simple caprese snack, and proudly shows
    off their signature mango-smoothie, though they often forget to clean the kitchen afterward.
  core: Caleb Feldman is a fiercely curious 12-year-old who mixes artistic ambition with competitive spirit, juggling LEGO inventions, soccer drills, and a knack for stretching a modest allowance into creative
    projects while occasionally leaving a mess behind.
background:
  cultural: Caleb is a white, Midwestern American raised in Warrensburg, Missouri. His family’s roots trace back to German and Anglo‑American ancestors, and his upbringing reflects the region’s emphasis
    on community, self‑reliance, and support for local schools and extracurricular programs. He participates in community events such as the Johnson County fair and the town’s summer art workshop series,
    which have broadened his exposure to both traditional Midwestern values and contemporary creative influences. This blend of small‑town stability and openness to new ideas informs his balanced, curious,
    and competitive personality.
