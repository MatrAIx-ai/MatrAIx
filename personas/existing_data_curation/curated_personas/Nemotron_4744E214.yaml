  career_goals: Caleb dreams of turning his love for technology and art into a career as a video game designer or interactive media developer. He aims to attend a specialized STEM high school, join a competitive
    robotics team, and win a regional science fair with a project that blends programming and visual design. In the long term, he hopes to study computer science and graphic design at a university, eventually
    creating indie games that challenge conventional narratives. He is also open to exploring a future as a digital illustrator for comics or animation, motivated by his competitive nature to produce award‑winning
    work.
