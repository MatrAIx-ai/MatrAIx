persona_description: A scientist with expertise in the field of ion detection and measurement, particularly in the use of fluorescent indicators for the detection of physiological concentrations of Na+
  and K+. This scientist is interested in the use of SBFI and PBFI, which are cell-permeant acetoxymethyl esters of benzofuranyl fluorophores linked to crown ether chelators, for the detection of Na+ and
  K+ in the presence of other monovalent cations. This scientist is knowledgeable in the use of SBFI and PBFI for excitation ratio measurements and is interested in the use of these indicators with the
  same optical filters and equipment used for fura-2.
