personas:
  professional: Michael Snodgrass, a 64‑year‑old veteran insulation specialist, leverages four decades of hands‑on expertise in thermal and acoustic systems to transition into a BPI‑certified energy auditor
    while mentoring apprentices and documenting projects with his signature black‑and‑white landscape photography, reflecting they are methodical and curious.
  sports: Michael Snodgrass channels a competitive streak by joining local skeet shooting tournaments with the Yellowstone Sportsmen Club and seasonal fly‑fishing on the Yellowstone River, they stay fit
    through weekly hikes in Gallatin National Forest, and they regularly cheer on the Billings Mustangs baseball team and the Denver Nuggets NBA squad.
  arts: Michael Snodgrass draws artistic inspiration from the monochrome compositions of Ansel Adams and the delicate watercolors of John Singer Sargent, they spend evenings listening to Bob Dylan’s folk
    ballads and watching classic Westerns starring John Wayne, which enrich their own black‑and‑white landscape photography and watercolor paintings.
  travel: Michael Snodgrass prefers meticulously planned journeys that blend artistic pilgrimage with nature, they have already explored Yellowstone and Glacier National Parks on photography outings and
    now eye a week‑long visit to New York City’s Metropolitan Museum of Art and the Guggenheim, with a future dream of a solo road trip along the Pacific Coast Highway.
  culinary: Michael Snodgrass enjoys a modest yet competent kitchen routine, they often grill fresh Yellowstone trout with a lemon‑herb glaze or simmer a hearty bison stew seasoned with juniper berries,
    while their favorite side dish remains a rustic huckleberry jam paired with homemade sourdough bread.
  core: Michael Snodgrass, a methodical yet creatively curious 64‑year‑old insulation veteran, balances a solitary love for black‑and‑white photography and watercolor painting with a competitive edge for
    skeet shooting, they quietly mentor the next generation and plot a legacy of energy‑efficiency expertise.
background:
  cultural: Michael grew up in a multigenerational farming family in southeastern Montana, a region shaped by the legacy of the American West, rugged self‑reliance, and close‑knit rural communities. His
    upbringing emphasized a strong work ethic, respect for the land, and a practical, no‑nonsense approach to problem‑solving. The local culture placed high value on craftsmanship, community service, and
    an appreciation for the natural environment, reflected in his love for outdoor activities and preservation of regional heritage. Although he identifies as white American, he acknowledges the diverse
    cultural tapestry of the Yellowstone area, including the histories of the Crow and Northern Cheyenne peoples, and he participates in community events that celebrate the broader Montana heritage. His
    sensibilities are shaped by a mix of Midwestern modesty and frontier independence, tempered by exposure to the arts through visits to Billings’ Museum of the Rockies and occasional trips to larger metropolitan
    art venues. This background informs his grounded yet curious outlook, his methodical approach to work, and his appreciation for both tradition and new ideas.
attributes:
  skills: '[''Thermal insulation installation'', ''Acoustic insulation installation'', ''Fiberglass batts and rolls'', ''Cellulose loose‑fill'', ''Spray‑foam application'', ''Reflective foil installation'',
    ''Blueprint and construction drawing interpretation'', ''Building code compliance'', ''R‑value calculation and energy‑efficiency assessment'', ''Job‑site safety management'', ''Power‑tool operation
    and maintenance'', ''Apprentice training and mentorship'']'
  hobbies: '[''Black‑and‑white landscape photography'', ''Watercolor painting'', ''Regional history reading and archival volunteering'', ''Woodworking club craft projects'', ''Fly‑fishing on the Yellowstone
    River'', ''Hiking in Gallatin National Forest'', ''Skeet shooting competitions'']'
  career_goals: At 64, Michael is not seeking retirement in the conventional sense. He aims to solidify his legacy by becoming a certified energy auditor, obtaining the Building Performance Institute (BPI)
    certification within the next two years. He wants to expand his role from hands‑on installation to consulting on energy‑efficiency retrofits for older homes in the Billings area, helping clients reduce
    heating costs while preserving historic character. He also aspires to mentor a new generation of insulation technicians through a structured apprenticeship program within his current employer, emphasizing
    meticulous workmanship and ethical practices. Additionally, Michael hopes to compile a field guide of practical insulation techniques combined with his observations on Montana’s climate, intending to
    self‑publish it for regional tradespeople. On a personal level, he wishes to travel to a few major art museums—such as the Metropolitan Museum of Art and the Guggenheim—to satisfy his artistic curiosity,
    integrating those experiences into his planned guide.
