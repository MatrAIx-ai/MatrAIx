personas:
  professional: Duc Thao is a production planning associate who leverages SAP Business One and Oracle NetSuite expertise, lean manufacturing knowledge, and a curiosity for unconventional solutions to streamline
    schedules, resolve bottlenecks, and mentor cross‑functional teams, all while maintaining meticulous spreadsheets and assertively championing process improvements.
  sports: Duc Thao enjoys hiking the Cook County forest preserves on weekends, is a casual member of a local intramural soccer league, and roots for the Chicago Cubs, Chicago Bears, and Chicago Fire FC,
    and they balance team spirit with solitary trail runs.
  arts: Duc Thao spends free time exploring the Art Institute of Chicago and the Museum of Contemporary Art, sketching Chicago’s skyline, creating digital illustrations in Procreate inspired by Yayoi Kusama
    and Banksy, and they unwind listening to the indie folk sounds of Sufjan Stevens.
  travel: Duc Thao plans trips with a mix of careful budgeting and spontaneous curiosity, having recently backpacked through Hanoi to sample family recipes, dreaming of a springtime visit to Kyoto’s temples,
    while also enjoying weekend getaways to the Wisconsin Dells for lake kayaking, and they always jot down travel ideas in a well‑organized sketchbook.
  culinary: Duc Thao cooks beloved Vietnamese dishes like phở, bánh mì, and gỏi cuốn, often adding a modern twist such as miso‑infused broth or smoked tofu, and they relish experimenting with fresh herbs
    like lemongrass, Thai basil, and cilantro in their kitchen.
  core: Duc Thao fuses a methodical production planning mindset with an inquisitive love for art and culture, navigating life through organized creativity, strategic gaming marathons, and a habit of late‑night
    sketching sessions, and they never miss a chance to refine a process.
background:
  cultural: Duc is a second‑generation Vietnamese‑American raised in Skokie, Illinois, a community known for its vibrant Southeast Asian diaspora. He grew up speaking both Vietnamese and English, celebrating
    traditions such as Tet and Mid‑Autumn Festival with his family. His parents emphasized the importance of education, respect for elders, and communal responsibility, values that continue to shape his
    work ethic and interpersonal approach. While rooted in Vietnamese cultural practices—like preparing pho and visiting local Buddhist temples—he also embraces the multicultural environment of the Chicago
    suburbs, participating in diverse artistic and community activities.
attributes:
  skills: '[''Production scheduling'', ''ERP systems (SAP, Oracle NetSuite)'', ''Advanced Excel (pivot tables, macros)'', ''Inventory management'', ''Lean manufacturing fundamentals'', ''Six Sigma Yellow
    Belt tools'', ''Data analysis'', ''Cross‑functional communication'', ''Problem solving'', ''Quality control basics'']'
  hobbies: '[''Visiting museums and galleries'', ''Sketching and digital illustration'', ''Reading design thinking and cultural history books'', ''Cooking Vietnamese cuisine'', ''Playing strategic video
    games'', ''Hiking in local nature preserves'', ''Volunteering at community cultural events'']'
  career_goals: Duc aims to become a senior production planner or supply chain analyst within the next five years. He plans to pursue an associate’s degree in logistics and supply chain management, followed
    by certifications such as APICS CPIM and Six Sigma Green Belt. In the long term, he envisions leading process‑improvement projects that integrate technology and creative problem‑solving, potentially
    moving into a managerial role overseeing a regional production network. He is also interested in leveraging his Southeast Asian heritage to work with multinational suppliers, bridging cultural gaps
    to optimize global sourcing.
