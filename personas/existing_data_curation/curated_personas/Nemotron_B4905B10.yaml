  career_goals: Luis aims to translate his strong organizational discipline into a stable, routine‑oriented career. He plans to enroll in a community college program to earn an associate degree in Business
    Administration with a focus on operations management. His short‑term goal is to secure a certification as an HVAC technician, a field that offers structured work schedules and clear performance metrics,
    aligning with his competitive drive. In the longer term, Luis aspires to manage a small family‑owned service business—such as a local auto‑repair shop or a Mexican‑style food stand in Branson—where
    he can apply his practical expertise, maintain high standards, and eventually mentor future employees.
