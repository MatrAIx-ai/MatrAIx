  career_goals: John aims to earn his GED within the next year and then pursue an associate’s degree in social work or community health. His long‑term ambition is to become a certified mental health counselor
    or substance‑abuse prevention specialist who works directly with teenagers, offering both guidance and crisis intervention. He also envisions a leadership role as a program coordinator for a local nonprofit
    that blends after‑school tutoring with outdoor education, reflecting his love of the Pacific Northwest environment. As an alternative pathway, he is considering certification as an EMT, leveraging his
    first‑aid expertise to provide immediate assistance in emergencies. Across all options, John’s goal is to create structured, evidence‑based programs that empower youth, promote mental well‑being, and
    foster community resilience, while maintaining the high standards he sets for himself.
