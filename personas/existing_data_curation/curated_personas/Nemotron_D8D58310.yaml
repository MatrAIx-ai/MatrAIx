    cultural illustrations'']'
  career_goals: Although still young, Carolina dreams of becoming a teacher who can organize fun, structured learning experiences for children. She also imagines herself as a professional dancer, showcasing
    Dominican rhythms on stage, and occasionally mentions wanting to be a veterinarian because she loves caring for animals. Her competitive nature fuels a desire to win school contests and be recognized
    for her leadership in group activities.
