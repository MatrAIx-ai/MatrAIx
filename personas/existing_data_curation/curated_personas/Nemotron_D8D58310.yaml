personas:
  professional: Carolina Reyes, a budding builder‑engineer, channels their love of structure into elaborate LEGO constructions and leads neighborhood board‑game tournaments, where their knack for clear
    rules and charismatic leadership shine.
  sports: Carolina Reyes excels in organized playground games, captaining the Little Lions soccer team in the local youth league, cheering for the Los Angeles Dodgers during family movie nights, and they
    participate in weekend swim lessons at the community pool.
  arts: Carolina Reyes dances to upbeat merengue and bachata beats at after‑school dance class, they belt out bilingual children’s songs by The Wiggles and Disney’s ‘Let It Go,’ and they spend afternoons
    drawing vivid scenes of family gatherings with bright crayons and markers.
  travel: Carolina Reyes dreams of visiting the seaside boardwalk in Santa Monica, touring the interactive science exhibits at the local children’s museum, and they hope one day to explore the Grand Canyon,
    though most trips stay within weekend road‑trips to nearby parks due to family budget limits.
  culinary: Carolina Reyes loves crafting rainbow fruit salads with mango, pineapple, and strawberries, they help whisk pancake batter for weekend breakfast, and they enjoy savoring homemade chicken empanadas
    stuffed with cheese and herbs, often insisting on a sprinkle of cinnamon on their desserts.
  core: Carolina Reyes is a competitive, rule‑loving leader who balances a vibrant love for structured play and expressive dance, and they have a tendency toward worry and meticulous saving.
background:
  cultural: Carolina grew up in a Dominican household in Corona, Queens, where Spanish is spoken at home and English at school. Family gatherings often feature traditional dishes like mangú, plantains,
    and sancocho, and celebrations include music and dance from the Dominican Republic. She participates in community events such as local Dominican festivals, where she learns traditional dances and hears
    stories about the island's heritage. Her Catholic upbringing influences her participation in holiday traditions and community service activities. This rich cultural environment shapes her language skills,
    love for music and dance, and the values of family and community.
