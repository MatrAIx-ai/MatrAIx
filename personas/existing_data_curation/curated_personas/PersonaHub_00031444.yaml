persona_description: A photographer who is interested in capturing the moodiness and mystery of silhouettes in their images, and is willing to experiment with different lighting techniques to achieve the
  desired effect. They are aware of the importance of metering off the bright area of the background to make the subject underexposed, and they are comfortable adjusting their editing software to bring
  out the details in the silhouette. They are also aware of the shapes and patterns that can be created by silhouettes, and they pay close attention to how these shapes interact with each other in the foreground.
