personas:
  professional: Mario Pittman is a 29‑year‑old warehouse stocker who applies his methodical inventory control skills, strong communication, and curiosity‑driven process improvements to streamline operations
    and mentor teammates, and they aim to secure a supervisory position within two years.
  sports: Mario Pittman is a regular participant in pick‑up basketball at the local community center, a devoted fan of the Carolina Panthers and the Asheville Tourists, and they stay fit by hiking the Blue
    Ridge foothills and weekend fishing trips.
  arts: Mario Pittman curates soulful playlists that blend classic soul legends like Otis Redding and modern hip‑hop artists such as Kendrick Lamar for family gatherings, while they channel creative energy
    into woodworking projects and occasionally attend blues nights at the Asheville Symphony.
  travel: Mario Pittman favors low‑key weekend getaways that combine hiking and fishing, often planning modest trips to the Great Smoky Mountains or Shenandoah Valley, while dreaming of an ambitious cross‑country
    road trip through New Zealand's fjord landscapes.
  culinary: Mario Pittman is an enthusiastic home chef who perfects smoky barbecue ribs, collard greens seasoned with smoked paprika, and sweet potato pie topped with pecan streusel, while they experiment
    with keto‑friendly cauliflower mash to keep family meals healthier.
  core: Mario Pittman balances a methodical warehouse mindset with a soulful love for classic tunes, an over‑seasoned barbecue habit, and a restless urge to tinker, making them a reliable yet creatively
    restless 29‑year‑old.
background:
  cultural: Mario grew up in a close‑knit African‑American family in the Charlottesville‑Christiansburg area of Virginia. His upbringing blended the rich traditions of Southern Black culture—church gospel
    music, family potlucks, storytelling, and respect for elders—with the progressive spirit of the New River Valley. His parents emphasized education, community service, and pride in their heritage, instilling
    in him a strong sense of identity and responsibility. He celebrates Juneteenth and participates in local cultural events that honor African‑American history. The community’s emphasis on mutual support
    and resilience has shaped his compassionate, cooperative outlook and his commitment to contributing positively to his neighborhood.
attributes:
  skills: '["Inventory Management", "Order Picking & Fulfillment", "Warehouse Management System (WMS) Operation", "Barcode Scanning", "Cycle Counting", "Safety Compliance", "Process Improvement (Lean)",
