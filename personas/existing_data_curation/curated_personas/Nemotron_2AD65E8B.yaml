  hobbies: '["Pick‑up Basketball", "Listening to Soul & Hip‑hop Music", "Cooking Southern Cuisine", "Woodworking", "Fishing", "Hiking", "Volunteer Work at Food Pantry"]'
  career_goals: Mario aspires to advance from his current stocker role to a supervisory position within the next two years, aiming to lead a shift and mentor a larger team. He plans to obtain a Certified
    Logistics Associate credential and eventually complete a certification in Supply Chain Management to qualify for a warehouse manager role. Long‑term, he dreams of opening a community‑focused grocery
    or convenience store that sources locally grown produce and provides affordable options for his neighborhood, combining his operational expertise with his desire to give back. He also hopes to participate
    in safety committees and champion sustainability initiatives, such as reducing packaging waste.
