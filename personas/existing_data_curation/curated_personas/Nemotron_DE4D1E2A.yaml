  hobbies: '[''Gardening'', ''Vietnamese cooking'', ''Fishing'', ''Reading historical fiction'', ''Walking nature trails'', ''Attending local art festivals'', ''Puzzles (jigsaw, crosswords)'', ''Watching
    technology documentaries'', ''Learning sustainable living practices'', ''Volunteer work at community center'']'
  career_goals: Although retired from formal employment, Regino aims to channel his technical background into community service. He aspires to become the lead volunteer coordinator for Gainesville’s community
    garden, integrating sustainable practices and intergenerational learning. He also plans to expand his cooking workshops, offering classes that celebrate Vietnamese culinary heritage while exploring
    fusion possibilities. In the longer term, Regino hopes to compile a family cookbook and launch a modest home‑based catering venture for cultural festivals, all while mentoring local seniors in basic
    technology and DIY home maintenance.
