  hobbies: '[''Soccer'', ''Robotics Club (VEX competitions)'', ''Digital art (Procreate)'', ''Competitive video gaming (esports)'', ''Bachata and Salsa dancing'', ''Journaling and mindfulness'']'
  career_goals: Maria aspires to attend a STEM‑focused high school and eventually earn a degree in computer science, aiming to become a software engineer who designs educational apps that help students
    manage stress and stay organized. She is motivated by a personal desire to combine her love of technology with her experience of anxiety, hoping to create tools that empower bilingual Latino youth.
    In the longer term, she dreams of launching a tech startup that offers culturally relevant digital resources for mental‑wellness and academic support, while also seeking opportunities to mentor younger
    students in her community.
