  career_goals: Higinio aims to move into a senior or supervisory psychiatric technician role within the next two years, where he can mentor newer staff and influence unit policies that prioritize patient
    dignity and emotional safety. He is pursuing Certified Psychiatric Technician (CPT) certification and plans to enroll in an associate degree program in mental‑health counseling at a nearby community
    college to broaden his therapeutic toolkit. Long‑term, he hopes to establish a small community‑based support group in Baileys Harbor that blends nature‑based activities—such as therapeutic gardening,
    lake walks, and woodworking sessions—with evidence‑based anxiety‑reduction techniques. He also wants to complete training in stress‑management and self‑care strategies to better manage his own emotional
    reactivity while continuing to provide compassionate care.
