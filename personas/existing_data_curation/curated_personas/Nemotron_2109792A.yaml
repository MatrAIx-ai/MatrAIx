personas:
  professional: Emily Haddad, a senior paramedic with an MBA, merges lightning‑fast patient triage and advanced life‑support expertise with rigorous budgeting and data‑driven shift management, channeling
    their competitive drive to cut response times while balancing a natural preference for structured protocols with an occasional need to improvise under pressure.
  sports: Emily Haddad fuels their competitive spirit by cheering the Atlanta Falcons on Sundays and the Atlanta Braves in the spring, while they lace up for weekly hikes with the Appalachian Hiking Club
    and attend sunrise yoga sessions at a downtown studio to stay agile for emergency calls.
  arts: Emily Haddad unwinds by immersing themselves in the crisp logic of Agatha Christie mysteries, snapping black‑and‑white landscape photos inspired by Ansel Adams on hikes, and winding down to the
    warm cello of Yo‑Yo Ma or the soulful twang of Dolly Parton, a blend of classic and Southern‑rooted artistry that fuels their love of structure and subtle spontaneity.
  travel: Emily Haddad prefers meticulously planned weekend getaways that still leave room for off‑trail discoveries, frequenting nearby Asheville’s Blue Ridge hikes and the historic town of Savannah, while
    dreaming of a summer trek through the Scottish Highlands and a wildlife photography expedition in Costa Rica, always balancing budget constraints with a yearning for fresh perspectives.
  culinary: Emily Haddad enjoys crafting wholesome farm‑to‑table dishes such as quinoa‑and‑roasted‑beet salad tossed with fresh arugula, grilled trout seasoned with thyme and lemon zest, and soothing herbal
    teas blending chamomile, rose hips, and mint, a culinary skill set that sits comfortably between confident home‑cook and experimental artisan.
  core: Emily Haddad navigates life like a high‑stakes EMS call—meticulously prepared yet ready to improvise—balancing a love for structured routines with a secret habit of hoarding stray receipts and an
    occasional binge on true‑crime podcasts that keep their competitive edge humming.
background:
  cultural: Emily grew up in a middle‑class, Southern white family in the Atlanta suburbs. Her upbringing emphasized Southern hospitality, community involvement, and a respect for self‑reliance. Though
    she identifies with her Anglo‑Irish heritage, years of serving a diverse urban population have broadened her cultural awareness, making her attuned to the varied traditions and languages of the patients
    she treats. She maintains ties to her local church and participates in community service events, reflecting a blend of traditional Southern values and the inclusive perspective gained through her EMS
    work.
attributes:
  skills: '[''Advanced Cardiac Life Support (ACLS)'', ''Pediatric Advanced Life Support (PALS)'', ''Trauma assessment and stabilization'', ''Pre-hospital medication administration'', ''Emergency vehicle
