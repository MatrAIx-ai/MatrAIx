  hobbies: '[''Cooking traditional Mexican dishes'', ''Organic gardening'', ''Reading historical nonfiction'', ''Quilting and textile crafts'', ''Daily walks in local parks'', ''Bridge/card games'', ''Volunteer
    work at community garden'', ''Genealogy research'']'
  career_goals: Although retired, Lesly aims to continue contributing to her community and personal growth. She plans to document her family’s recipes and life stories in a handwritten memoir that could
    be shared with grandchildren. She intends to enroll in a local community‑college course on digital storytelling to learn how to preserve her memories and present them online. Lesly also aspires to lead
    a cooking workshop at the senior center, teaching both Mexican culinary techniques and practical nutrition for older adults. Additionally, she hopes to mentor younger volunteers on budgeting and critical
    evaluation of information, and to advocate for better health‑information resources for seniors in Clackamas County.
