  hobbies: '["Watercolor painting", "Knitting and quilting", "Floral arranging", "Community choir singing", "Storytelling at local events", "Gardening (herbs, tomatoes)", "Attending art fairs and craft
    markets", "Volunteering at senior centers", "Hosting potluck gatherings", "Listening to folk and classic rock music"]'
  career_goals: Cynthia aims to transition from front‑line housekeeping to a supervisory role as a senior household manager, overseeing a team of cleaners and coordinating home‑care services for multiple
    families. She plans to obtain certification in eco‑friendly cleaning and home organization, which will allow her to launch a boutique consulting business that blends cleaning expertise with interior
    styling and personalized décor advice. In the longer term, she hopes to mentor younger workers in the industry and run community workshops on sustainable home‑care and creative crafts, combining her
    love for learning, creativity, and social interaction.
