  career_goals: Kaylie loves learning about people and animals, and often imagines becoming a teacher who helps classmates understand new things, or a veterinarian who cares for pets. She also enjoys drawing
    and sometimes says she wants to be an artist who creates beautiful pictures. Her curiosity about how things work makes her occasionally dream of being an engineer or astronaut, though she expresses
    these aspirations in a playful, story‑like manner. Overall, her ambitions revolve around helping others, exploring the world, and creating.
