personas:
  professional: Kaylie Lewis, a five‑year‑old budding storyteller, channels curiosity and practicality into building imaginative narratives with LEGO bricks, showcasing early problem‑solving and collaborative
    skills while they favor flexible, open‑ended play over rigid structures.
  sports: Kaylie Lewis, a member of the local community center's mini soccer team called the Tigers, enjoys weekly soccer practices, loves splashing in the community pool with the Dolphin Swim Club, and
    they prefer playful, low‑pressure games over competitive leagues.
  arts: Kaylie Lewis, an enthusiastic fan of Dr. Seuss books and Pixar’s Toy Story, spends afternoons drawing colorful animals with Crayola crayons and dancing to songs by Raffi, and they let these creative
    moments shape a vivid inner world.
  travel: Kaylie Lewis, who has taken short road trips to Grandma’s country farm and a weekend beach getaway in Myrtle Beach, favors brief car rides with plenty of snacks and dreams of a magical visit to
    Disney World’s Fantasyland, and they often pack a favorite stuffed animal for comfort.
  culinary: Kaylie Lewis, who loves peanut butter and jelly sandwiches, chicken nuggets, and mac & cheese with extra cheddar, enjoys stirring pancake batter with a wooden spoon and delights in trying fruit
    salads featuring apple slices and blueberries, and they sometimes sneak a bite of chocolate pudding when no one is looking.
  core: Kaylie Lewis, a five‑year‑old whose boundless curiosity and love for flexible play make them a kind, talkative companion who occasionally misplaces toys and snack wrappers.
background:
  cultural: Kaylie was born and raised in Madison, a small town in Madison County, Alabama. She grows up in a close‑knit Southern community where family, church, and school play central roles. Her family
    celebrates typical Southern traditions such as holiday gatherings with barbecue, sweet tea, and homemade pies, and attends a local Baptist church where she participates in Sunday school and community
    events. The warm, hospitality‑oriented culture of the region encourages politeness, respect for elders, and a love of outdoor activities like playing in neighborhood parks and exploring nature. Growing
    up as a white child in this environment, Kaylie’s upbringing reflects a blend of Southern values, community involvement, and an appreciation for local customs and simple pleasures.
