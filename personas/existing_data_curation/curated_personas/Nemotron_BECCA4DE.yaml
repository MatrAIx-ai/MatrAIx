  career_goals: Dianthe aims to transform her passion for art and community engagement into a part‑time role as a local arts facilitator, where she can design and lead workshops for adults and children.
    She envisions launching a community art space that doubles as a gathering hub, offering classes, exhibitions, and collaborative projects. Additionally, she hopes to develop a modest online presence—perhaps
    a blog or Instagram channel—highlighting Midwestern art, DIY crafts, and stories from Caro, thereby expanding cultural appreciation beyond her town while maintaining a balanced lifestyle that supports
    her family.
