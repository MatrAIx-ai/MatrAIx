persona_description: A researcher and public health expert from the University of Washington School of Public Health who specializes in the health impacts of climate change in Pacific island countries.
  She is an author of a report published in Environmental Health Perspectives, summarizing the health risks of climate change and proposing adaptation strategies that may minimize future threats. Her work
  focuses on the vulnerability of Pacific island countries to the unique geographic, demographic, and socioeconomic characteristics of the islands, and the potential for climate change to amplify the burden
  of non-communicable diseases in these countries. She collaborates with public health researchers from various universities and institutions in the Pacific region, and her work is aimed at improving health
  care and building health systems resilience to climate change.
