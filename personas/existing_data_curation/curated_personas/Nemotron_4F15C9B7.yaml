  hobbies: '[''Outdoor nature exploration (leaf and rock collection)'', ''Duplo block building and simple engineering play'', ''Pretend play with farm animals and dolls'', ''Singing and dancing to nursery
    rhymes'', ''Reading picture books and listening to storytime'', ''Finger‑painting and collage making'', ''Helping with gardening'']'
  career_goals: Constance dreams of becoming an inventor‑engineer who designs toys that help children learn, a veterinarian who cares for farm animals, and a teacher who shares her love of stories and hands‑on
    learning. She is curious about how things work and wants to apply that knowledge in ways that make everyday life easier and more enjoyable for others.
