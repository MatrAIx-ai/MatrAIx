personas:
  professional: Constance Kunka, a budding junior architect in the sandbox, builds elaborate block structures that blend imaginative designs with practical stability, showing a curious yet pragmatic mind
    while happily ignoring the occasional mess left behind.
  sports: Constance Kunka enjoys weekend tumble time at the Little Tigers Soccer Club, where they enthusiastically chase the ball, occasionally assert themselves in team drills, and are a devoted fan of
    the local baseball team, the River City Rookies, cheering loudly from the bleachers.
  arts: Constance Kunka delights in drawing vibrant pictures of dinosaurs and listening to the catchy tunes of The Wiggles and Disney’s Frozen soundtrack, often performing spontaneous dance recitals in
    the living room while also appreciating the soothing lullabies of Tchaikovsky’s “Dance of the Sugar Plum Fairy”.
  travel: Constance Kunka loves family road trips to the nearby aquarium and occasional flights to Disney World, preferring a mix of structured sightseeing with the freedom to explore playgrounds, and keeps
    a scrapbook of ticket stubs from places like the Grand Canyon and the local zoo.
  culinary: Constance Kunka favors creamy mac and cheese, crunchy apple slices, and peanut butter and jelly sandwiches, proudly helping stir batter for banana pancakes while stubbornly refusing to eat green
    beans, and enjoys the occasional treat of chocolate chip cookies from the family bakery.
  core: Constance Kunka is a curious, practical four‑year‑old who balances imaginative play with everyday routines, embraces flexibility over strict schedules, and navigates social moments with a blend
    of cooperation and spirited assertiveness.
background:
  cultural: Constance is raised in a white Midwestern family in Goshen, Indiana, a community rooted in agricultural traditions and close‑knit neighborly support. Her household reflects the region’s values
    of modesty, hard work, and family cohesion common in Elkhart County. She participates in local preschool activities, community fairs, and church‑based children’s programs where she learns the importance
    of respect for elders, seasonal celebrations tied to the farming calendar, and community service. The area’s German‑Swiss heritage influences family customs such as holiday baking, folk music, and storytelling,
    adding cultural richness to her upbringing.
attributes:
  skills: '[''Alphabet recognition and phonemic awareness'', ''Counting to ten'', ''Fine‑motor activities (drawing, cutting, building blocks)'', ''Gross‑motor coordination (running, climbing, jumping)'',
