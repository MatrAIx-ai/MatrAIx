persona_description: A historian or social scientist interested in the study of the transformation of women's status and economic importance across the later Middle Ages in London, particularly focusing
  on the period 1320-1430 and 1420-1430. This persona is likely to be interested in the quantitative analysis of litigation in city and royal courts, as well as qualitative examination of the roles and
  status of women in the society and economy of London. They would be familiar with the work of Matthew Stevens, a historian and social scientist who specializes in the study of the transformation of women's
  status and economic importance across the later Middle Ages in London, particularly focusing on the period 1320-1430 and 1420-1430. They would also be interested in the dataset created by an earlier AHRC-funded
  project, 'Londoners and the Law', which contains approximately 6,300 pleaded cases involving London litigants or disputed events supposed to have taken place at London, heard before the Court of Common
  Pleas in the years 1399–1409, 1420–1429, 1445–1450, 1460–1468, 1480 and 1500 (all dates inclusive).
