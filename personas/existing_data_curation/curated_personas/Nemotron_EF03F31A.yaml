  hobbies: '[''Beach walks'', ''Birdwatching'', ''Coastal gardening'', ''Reading mystery novels'', ''Knitting'', ''Cooking seafood'', ''Bridge'', ''Local history talks'', ''Mindfulness breathing exercises'',
