personas:
  professional: Sharon Trevison, a veteran insurance sales agent with three decades of experience in home, auto, and renters coverage for coastal communities, blends meticulous organization and practical
    curiosity to guide clients through risk assessments, while their empathetic yet assertive communication style helps calm emotionally charged situations, and they are now transitioning to a part‑time
    advisory role to mentor younger agents.
  sports: Sharon Trevison, who enjoys early‑morning birdwatching walks along Gold Beach, follows the Portland Timbers and Oregon Ducks with a loyal fan’s enthusiasm, participates in a weekly bridge club
    that doubles as a low‑impact mental sport, and they occasionally join a senior kayaking group for gentle fitness on the Pacific coastline.
  arts: Sharon Trevison, an avid reader of cozy mystery novels by authors like Agatha Christie and Louise Penny, attends local museum history talks and enjoys the folk music of artists such as Utah Phillips
    and the subtle melodies of Pacific Northwest acoustic guitarists, while they knit scarves adorned with sea‑foam colors that double as wearable art.
  travel: Sharon Trevison prefers relaxed, nature‑focused travel, often planning weekend trips to nearby Cannon Beach, the historic town of Astoria, or the coastal trails of Olympic National Park, and they
    dream of a modest cruise to the San Juan Islands, balancing limited mobility with a love for sunrise vistas.
  culinary: Sharon Trevison loves preparing fresh seafood dishes such as grilled halibut with lemon‑dill butter and cedar‑plank salmon, incorporates local ingredients like Dungeness crab and wild fennel
    into family meals, and they enjoy pairing meals with crisp Pinot Gris while occasionally over‑salting dishes when anxious.
  core: Sharon Trevison blends a lifetime of coastal insurance expertise with a love for solitary sunrise walks, meticulous organization, and a vivid curiosity that keeps them both calm and occasionally
    anxious, especially when they juggle community volunteer work and personal health.
background:
  cultural: Sharon grew up in a mid‑midwestern white family during the post‑war era and moved to the Pacific Northwest as a young adult. Her cultural identity reflects mainstream American middle‑class values
    emphasizing practicality, self‑reliance, and a strong work ethic. Living in Gold Beach, Oregon, she has embraced the small‑town coastal lifestyle, which values close community ties, appreciation for
    the natural environment, and modest, service‑oriented living. She is married and participates regularly in a local Protestant church, where she engages in holiday potlucks, community service projects,
    and civic volunteerism. Her heritage includes a respect for the region’s maritime history and the Indigenous histories of the area, though her personal practices are rooted in the broader cultural traditions
    of the American West.
