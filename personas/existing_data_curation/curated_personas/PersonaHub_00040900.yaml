persona_description: A fisheries expert and aquaculture practitioner with expertise in shrimp farming, particularly in the management practices that promote the sustainable use of mangroves. This person
  is knowledgeable about the use of biomanipulators, greenwater systems, settling ponds with baffles and biofilters, and sludge collectors in shrimp farming, and has field-tested these practices in Thailand,
  the Philippines, Myanmar, and Vietnam. They are also familiar with mangrove ecosystems, brackishwater environments, ecosystem management, water pollution, and waste management.
