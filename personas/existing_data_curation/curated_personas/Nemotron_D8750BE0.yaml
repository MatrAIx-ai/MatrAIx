personas:
  professional: Jose Dioneda, a 69‑year‑old former coffee plantation manager turned mentor, leverages decades of bookkeeping, inventory control, and strategic planning expertise to guide emerging Kona entrepreneurs,
    delivering concise Excel‑driven reports while balancing the predictable routine of his advisory sessions with the occasional market surprise.
  sports: Jose Dioneda enjoys morning walks along the Kona shoreline, participates in weekly senior‑center chess tournaments, and fishes in the annual Kona offshore tournament, while cheering for the local
    Hawaii Rainbow Warriors basketball team and the Hilo baseball club.
  arts: Jose Dioneda, a ukulele enthusiast, regularly performs at community luau gatherings, drawing inspiration from Jake Shimabukuro and Israel Kamakawiwo‘ole, and he also curates genealogical exhibits
    at the local cultural museum during festivals.
  travel: Jose Dioneda favors low‑key road trips within the islands, having explored Mauna Kea’s summit, the historic town of Lahaina, and a weekend getaway to the coffee farms of Costa Rica, while dreaming
    of a relaxed cruise to Japan’s Okinawa once his wife’s health permits.
  culinary: Jose Dioneda delights in cooking traditional island dishes such as laulau wrapped in taro leaves and poi made from fresh kalo, often seasoning with local sea salt, sweet papaya, and coffee‑infused
    sauces, though his kitchen skills hover at ‘confident home‑cook’ level and he occasionally overcooks the poi.
  core: Jose Dioneda blends analytical pragmatism with a love for routine coastal walks, ukulele chords, and modest coffee‑farm investments, all while habitually checking his blood pressure and occasionally
    forgetting his glasses.
background:
  cultural: Jose is of Polynesian descent, rooted in Hawaiian heritage with family ties stretching back several generations on the Big Island. He grew up speaking some Hawaiian language, observing the values
    of ʻohana and respect for the land (malama ʻāina). His cultural identity is reinforced by participation in local celebrations such as the Kona Coffee Cultural Festival and the annual Ho‘olaule‘a. While
    he embraces modern business practices, he maintains a strong connection to traditional customs, including storytelling, hula, and communal feasting, which shape his worldview and community involvement.
