    workshops'', ''volunteering at animal shelter'', ''curating personal music playlists'']'
  career_goals: Perri dreams of turning her love for art and her sensitivity to others' emotions into a career that bridges creativity and healing. She hopes to study visual arts or graphic design while
    exploring psychology, aiming eventually to become an art therapist or a community arts coordinator. In the meantime, she plans to build a portfolio of illustrations, contribute to school art projects,
    and volunteer with youth programs that use creative expression to support mental well‑being. Her long‑term ambition is to create inclusive art spaces that encourage unconventional thinking while fostering
    emotional resilience.
