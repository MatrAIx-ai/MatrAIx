personas:
  professional: Perri Darling is a teenage aspiring fantasy illustrator and budding game developer who channels their love for speculative fiction into detailed character sketches and simple Scratch prototypes,
    often juggling school assignments with art club projects, yet sometimes missing deadlines because they value flexibility over strict planning.
  sports: Perri Darling follows the Seattle Seahawks and the Portland Trail Blazers, participates in the school’s cross‑country team for seasonal forest runs, enjoys low‑key weekend hikes in the nearby
    woods, and occasionally joins pick‑up basketball games at the community center, preferring relaxed fitness over rigid training schedules.
  arts: Perri Darling immerses themselves in the whimsical worlds of Hayao Miyazaki, the dark fantasies of Neil Gaiman, and the soothing piano melodies of Yiruma, while sketching characters in a Studio
    Ghibli‑inspired style, attending community theater workshops that explore Shakespearean monologues, and curating mood‑matching playlists featuring Tame Impala, Aurora, and the ambient scores of the
    Legend of Zelda series.
  travel: Perri Darling dreams of wandering through the misty redwood forests of California’s Redwood National Park, exploring the glowworm caves of Waitomo in New Zealand, and has taken weekend trips to
    the historic cobblestone streets of Charleston, balancing a teen’s limited budget with family‑approved school field trips and occasional summer camps.
  culinary: Perri Darling enjoys crafting simple yet vibrant meals like avocado toast sprinkled with smoked paprika, whipping strawberry‑banana smoothies with a dash of honey, experimenting with herbal
    teas such as chamomile and mint, while indulging in comfort foods like cheesy pizza and matcha green tea ice cream as rewards after long art sessions.
  core: Perri Darling blends a vivid imagination with a gentle heart, navigating teenage worries through sketchbooks, playlists, and a forgiving attitude toward life’s messes.
background:
  cultural: Perri grew up in Union, a close‑knit town in Franklin County, Missouri, where Midwestern values of hospitality, modesty, and community involvement shape daily life. Her family traces its roots
    to German and Irish immigrants, and Sunday mornings often include attendance at a local Protestant church that emphasizes service and cooperation. Community events such as the Union Fall Festival, high‑school
    sports games, and church potlucks have reinforced her sense of belonging. While grounded in these small‑town traditions, the internet and streaming platforms expose her to a broader spectrum of art,
    music, and ideas, allowing her to blend local heritage with contemporary creative influences.
