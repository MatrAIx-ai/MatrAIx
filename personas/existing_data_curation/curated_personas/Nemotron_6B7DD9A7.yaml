  hobbies: '[''Metal sculpture'', ''Woodworking'', ''Photography'', ''Hiking'', ''Acoustic guitar'', ''Science-fiction reading'', ''Electronics tinkering'', ''Makerspace volunteering'', ''Cooking BBQ'',
    ''Italian cooking'']'
  career_goals: Michael aims to become a certified AWS Advanced Welder within the next two years and to acquire a specialty certification in artistic metal fabrication. In the medium term, he plans to transition
    into a supervisory role, overseeing a small team in a production shop while spearheading custom metal art projects for local businesses and public spaces. His long-term ambition is to open his own boutique
    studio that merges industrial welding with sculptural design, offering apprenticeships and community workshops that blend technical skill with creative expression. He also hopes to complete a bachelor's
    degree in industrial technology to broaden his managerial competencies.
