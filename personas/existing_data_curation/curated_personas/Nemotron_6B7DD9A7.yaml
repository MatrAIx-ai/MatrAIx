personas:
  professional: Michael Mamone is a proficient industrial welder and metal fabricator whose expertise in MIG, TIG, stick welding and precision brazing merges with an artistic curiosity to produce abstract
    sculptures, and they balance meticulous blueprint interpretation with flexible workshop mentoring while assertively pursuing AWS Advanced Welder certification and future supervisory leadership.
  sports: Michael Mamone hikes the Blue Ridge foothills weekly with the Asheville Trail Club, follows the Atlanta Braves and Charlotte Hornets, and incorporates strength training at a community gym, though
    they occasionally skip cross‑training when a new welding commission demands late‑night work.
  arts: Michael Mamone sculpts abstract metal pieces inspired by the stark contrasts of Ansel Adams, captures sunrise over the Blue Ridge with a Canon EOS R, strums acoustic renditions of Sufjan Stevens
    and Bill Evans on quiet evenings, and they regularly attend River Arts District exhibitions, finding solace in indie folk and modern jazz.
  travel: Michael Mamone prefers self‑planned, low‑key trips that blend art exploration and outdoor adventure, having trekked the Scottish Highlands, toured metal‑working studios in Milan, camped in Shenandoah,
    and they budget modestly for future visits to Kyoto’s craft districts.
  culinary: Michael Mamone delights in slow‑smoking Memphis‑style ribs with hickory chips and crafting hand‑rolled fresh pasta with San Marzano tomatoes and basil, and they often host intimate dinner parties
    where guests sample a bourbon‑infused BBQ glaze alongside a classic tiramisu.
  core: Michael Mamone fuses a meticulous welder’s precision with a restless artistic curiosity, balancing disciplined work habits with spontaneous midnight metal‑craft sessions, even if they occasionally
    neglect sleep for a new sculpture.
background:
  cultural: Michael is a second-generation Italian-American raised in Charlotte, North Carolina. His family maintains Italian traditions such as Sunday pasta meals, a strong emphasis on family cohesion,
    and participation in Catholic holidays, while also embracing Southern customs like barbecue gatherings, community festivals, and a warm, hospitality-driven social life. Growing up in a diverse urban
    neighborhood, he was exposed to both the craftsmanship values of his heritage and the entrepreneurial spirit of the Appalachian foothill region. This blended cultural backdrop fuels his appreciation
    for both precision engineering and expressive art, shaping his work ethic and creative outlook.
