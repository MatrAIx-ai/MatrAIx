personas:
  professional: Nicholle Thoburn, a budding junior coder and LEGO architect, blends curiosity with practicality by designing simple Scratch programs and meticulously constructing modular builds, while their
    competitive edge drives them to solve puzzles faster than peers and they skeptically test each line of code before sharing.
  sports: Nicholle Thoburn, a fierce midfielder on the local Riverside Youth Soccer Club, thrives on competition, often challenging friends to skill drills, they cheer for the U.S. Women's National Soccer
    Team and Manchester United, and they balance structured practice with spontaneous backyard games whenever the weather allows.
  arts: Nicholle Thoburn paints serene forest glades inspired by the brushwork of Beatrix Potter, loses themselves in the mystery adventures of author Rick Riordan, and they sing along to the soaring scores
    of Hans Zimmer while occasionally sketching characters from the animated film Moana during quiet afternoons.
  travel: Nicholle Thoburn has explored the nearby Pine Grove State Park, visited the regional planetarium, dreams of hiking the Grand Canyon’s rim, and they hope to wander Kyoto’s bamboo forest, planning
    each adventure with school notebooks and a sprinkle of spontaneous curiosity balanced by parental budget limits.
  culinary: Nicholle Thoburn enjoys assembling homemade pizza topped with mozzarella, pepperoni, and fresh basil, loves whipping up strawberry‑banana smoothies with spinach for extra greens, and they often
    help in the garden harvesting carrots and zucchini to add to simple family meals, though they sometimes leave the oven door ajar forgetting to set a timer.
  core: Nicholle Thoburn is a curious, competitively minded nine‑year‑old who balances puzzles, soccer, and artistic sketches with a pragmatic streak that fuels both meticulous LEGO builds and playful impulse
    spending, and they constantly evaluate each new challenge through both skeptical and adventurous lenses.
background:
  cultural: Nicholle was raised in a middle‑class suburban neighborhood of Dallas, Texas, in a family that celebrates typical Texan traditions such as Fourth of July fireworks, rodeo visits, and local BBQ
    gatherings. Her family’s Anglo‑American heritage, combined with exposure to Dallas’s diverse community, has given her a blend of Southern hospitality and an appreciation for multicultural perspectives.
    She attends a public elementary school where she participates in community events and enjoys regional music and sports culture.
