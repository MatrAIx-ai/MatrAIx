persona_description: A political scientist and author who advocates for a change in the timing of the U.S. presidential election from the first Tuesday after the first Monday in November to a weekend or
  a federal holiday. They believe that the current Election Day is an outmoded holdover from an age in which the country was very different from today and that a new approach would be more convenient for
  modern-day Americans. They also propose the use of communications advances to set up remote voting stations and hold early voting days.
