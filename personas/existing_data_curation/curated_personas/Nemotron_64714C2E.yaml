personas:
  professional: Wann Chung leverages their practical mindset, competitive drive, and sociable charm as a detailer, mastering vehicle and equipment cleaning while troubleshooting minor mechanical issues,
    and aims to earn IDA certification and eventually run a mobile detailing business in Shasta County.
  sports: Wann Chung powers through pick‑up basketball at the community gym three times a week, roots for the Sacramento Kings, occasionally joins a recreational 3‑on‑3 league, and they enjoy weekend hikes
    around Shasta Lake to stay limber.
  arts: Wann Chung immerses in K‑pop and hip‑hop, blasting BTS, Blackpink, and Travis Scott on repeat, belts out karaoke hits like "Dynamite" by BTS and "Uptown Funk" with friends, and they follow Korean
    variety shows, shaping their social confidence.
  travel: Wann Chung spends weekends exploring Shasta Lake, hiking the Siskiyou Trail, and dreaming of a spring trip to Kyoto, Japan for its temples and street food, while they also plan a future road trip
    along the Pacific Coast Highway.
  culinary: Wann Chung dabbles in cooking, perfecting family‑style beef bulgogi, kimchi fried rice, and grilled salmon with lemon, using gochujang and garlic, and they occasionally experiment with homemade
    cinnamon rolls after karaoke nights.
  core: Wann Chung is a sociable, competitive 19‑year‑old auto‑detailing enthusiast who balances a relentless work ethic with spontaneous karaoke sessions, occasional financial impulsiveness, and a knack
    for turning every challenge into a chance to shine.
background:
  cultural: Coming from an East Asian (Chinese) family, Wann grew up bilingual in English and Mandarin, with his parents emphasizing hard work, respect for elders, and community responsibility. He celebrates
    traditional holidays such as Lunar New Year and Mid‑Autumn Festival, often preparing festive dishes with his family. While adapting to life in Redding, California, he balances his cultural heritage
    with mainstream American influences, maintaining connections with the local Asian community through cultural gatherings at the Shasta County Community Center.
attributes:
  skills: '["Vehicle detailing", "Industrial equipment cleaning", "Chemical safety handling", "Customer service", "Efficient workflow management", "Basic mechanical troubleshooting", "Effective communication",
    "Performance tracking"]'
  hobbies: '["Pick‑up basketball", "Multiplayer video gaming", "Karaoke", "Hiking around Shasta Lake", "Attending community events", "Listening to K‑pop and hip‑hop music", "Cooking family recipes"]'
  career_goals: Wann aims to become a certified automotive detailer, earning professional credentials such as the International Detailing Association (IDA) certification. Over the next few years, he plans
    to secure a supervisory role in a reputable auto service center, leading a team of technicians and optimizing cleaning processes. His long‑term ambition is to open his own mobile detailing and equipment‑maintenance
    business in the Shasta County region, leveraging his network and reputation to serve local businesses and individual customers.
