  career_goals: Michael aims to earn a promotion to sergeant within the next three years, positioning himself for a future transition into detective work focused on community outreach and preventative strategies.
    He plans to pursue advanced training in crisis intervention and consider a master's degree in criminal justice to deepen his expertise. Long‑term, he hopes to lead a specialized unit that integrates
    emerging technologies with neighborhood policing, mentor junior officers, and eventually shift to a civilian role in public safety education or security consulting after retirement.
