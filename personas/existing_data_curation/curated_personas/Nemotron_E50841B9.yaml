personas:
  professional: Michael Sibbett, a 37‑year‑old police officer in St. Charles, blends curiosity about new policing tech with a practical, results‑driven mindset, leveraging strong community‑engagement skills,
    clear report writing, and calm crisis negotiation while tolerating a relaxed attitude toward rigid planning.
  sports: Michael Sibbett plays guard on a local amateur basketball league, cheered on by fans of the St. Louis Cardinals and St. Louis Blues, and spends weekends fishing on the Missouri River and hiking
    the River Trail, preferring group workouts over solitary gym sessions.
  arts: Michael Sibbett volunteers at the St. Charles Museum, curating genealogy tours that connect their family’s historic roots, strums acoustic guitar at family gatherings, and attends live shows featuring
    John Mayer and The Avett Brothers at local venues like The White Eagle.
  travel: Michael Sibbett favors spontaneous road trips that blend outdoor adventure and heritage exploration, having recently explored the Ozark National Forest, taken a weekend cruise along Lake of the
    Ozarks, and is planning a future visit to Banff National Park to trace family migration paths.
  culinary: Michael Sibbett enjoys experimenting with barbecue rubs, often grilling smoked trout seasoned with fresh dill and garlic, crafting hearty beef brisket with maple‑glazed carrots, and pairing
    meals with craft IPAs that feature hops like Citra and Mosaic.
  core: Michael Sibbett is a community‑oriented police officer who balances a love for outdoor camaraderie and guitar music with a laid‑back approach to planning, occasionally letting their relaxed side
    cause minor disorganization.
background:
  cultural: Michael grew up in a middle‑class Midwest family in St. Charles, Missouri, an area steeped in French colonial heritage. Raised in a culturally blended environment that includes Protestant and
    Catholic traditions, he embraces the values of community, hard work, and respect for local history. His family background includes French‑Canadian roots, giving him an appreciation for the region's
    bilingual history and occasional use of French phrases. This cultural mix influences his strong community ties, love of regional cuisine, and participation in local historical preservation efforts.
