  career_goals: Ann aims to transition her technical background into a leadership role within a local nonprofit that focuses on STEM education for underrepresented youth. She intends to develop hands‑on
    workshops, secure funding through grant writing, and mentor high‑school students in Baltimore. Over the next five years she hopes to become a program director, creating sustainable pathways that link
    academic learning with community development, and ultimately be recognized as a catalyst for equity in local education.
