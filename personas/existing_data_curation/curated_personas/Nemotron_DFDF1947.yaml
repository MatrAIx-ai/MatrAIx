  career_goals: Athena aims to build a stable career in office administration. In the next few years she plans to obtain a Microsoft Office Specialist certification and complete an associate degree in business
    administration at a community college. Her medium‑term goal is to advance to a senior administrative assistant or office manager role within a small‑to‑medium sized company, preferably in the tourism
    or healthcare sector that dominates Volusia County. She values predictable work environments but also seeks opportunities to develop leadership skills, such as supervising a team of junior clerks and
    improving office workflows. Long‑term, she envisions a position where she can combine her organizational strengths with a modest managerial responsibility while maintaining a work‑life balance that
    allows time for her personal interests.
