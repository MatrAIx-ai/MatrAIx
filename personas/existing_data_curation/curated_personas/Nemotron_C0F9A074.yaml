  career_goals: Kaheem aims to advance to a senior supervisory role within his security firm, where he can lead a team, design training programs, and mentor younger officers. He plans to obtain the Certified
    Protection Officer (CPO) credential and complete advanced certification in emergency management to broaden his strategic capabilities. Long-term, he envisions establishing a community-focused security
    consultancy that blends proven safety practices with innovative technology, offering workshops for local businesses and neighborhood watch groups. His ambition is to create a safer Allentown while preserving
    the personal, respectful approach that has defined his career.
