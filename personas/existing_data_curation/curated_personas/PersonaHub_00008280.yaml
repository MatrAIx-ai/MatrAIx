persona_description: A scientist from Swinburne University of Technology in Australia who specializes in the field of ultrasonic separation technology, particularly in its application to the separation
  of milk fat globules from natural whole milk in batch and continuous systems. His research interests include the design and effective operating parameters for milk fat separation in ultrasonic liter-scale
  systems, the establishment of operating conditions and design limitations for the separation of fat from natural whole milk in an ultrasonic liter-scale system, and the development of novel dairy products
  with enhanced properties through the use of milk with higher portions of small fat globules.
