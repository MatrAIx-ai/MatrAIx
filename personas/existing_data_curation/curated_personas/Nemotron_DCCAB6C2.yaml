  hobbies: '[''Playing soccer'', ''Tag'', ''Dance class'', ''Drawing'', ''Storytime at library'', ''Singing'', ''Educational tablet games'']'
  career_goals: Levita dreams of becoming a teacher who creates a warm, supportive classroom where children learn through fun, hands‑on activities. She also imagines herself as a community performer—perhaps
    a dancer or singer—who brings people together and spreads joy through music and movement.
