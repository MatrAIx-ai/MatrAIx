personas:
  professional: Levita Hood, a budding playground mentor who organizes tag games and demonstrates early leadership, leverages their love for routine to set clear game rules while their spontaneous energy
    keeps the fun flowing.
  sports: Levita Hood, an enthusiastic forward for the Tiny Tigers U-7 soccer club who idolizes the Los Angeles Galaxy and cheers loudly for them on weekends, also dominates tag at the neighborhood park,
    loves the seasonal joy of schoolyard relay races, and embraces fitness by sprinting after the playground ball with unbridled energy.
  arts: Levita Hood, a budding artist who fills sketchbooks with vivid crayons, attends weekly ballet at Creative Kids Studio, sings along to 'Let It Go' and 'Shake It Off' during car rides, and adores
    the colorful works of Henri Matisse and the animated movies of Disney, weaving these influences into their daily drawings.
  travel: Levita Hood, a curious explorer who loves family trips to the local aquarium and dreams of visiting Disneyland, prefers well-planned Sunday outings with a packed snack bag but occasionally rebels
    with spontaneous ice-cream stops, and keeps a scrapbook of stickers from each destination.
  culinary: Levita Hood, a budding cook who can whip up a perfect peanut butter and jelly sandwich, delights in macaroni and cheese topped with extra cheddar, loves carrot sticks with ranch dip, and often
    asks for strawberry-banana smoothies made with fresh fruit and a splash of honey.
  core: Levita Hood, a routine-loving yet spontaneous six-year-old who blends energetic playground leadership with gentle kindness, balancing structured game rules with impromptu bursts of fun and occasional
    snack cravings.
background:
  cultural: Levita is part of an African‑American family in Jacksonville. Her upbringing is shaped by community churches, family gatherings, and local cultural events such as Juneteenth celebrations. She
    grows up listening to gospel, soulful R&B, and hip‑hop, enjoys Southern comfort foods like collard greens and cornbread, and learns the values of resilience, mutual support, and pride in her heritage
    through stories shared by relatives and community mentors.
