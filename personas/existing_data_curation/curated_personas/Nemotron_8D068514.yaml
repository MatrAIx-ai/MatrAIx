  career_goals: Marwan aspires to complete his high school education with a focus on math and science, then pursue a degree in computer science or civil engineering at a community college or university.
    He envisions a career where he can apply his practical problem‑solving skills to design tools or infrastructure that benefit his local community. Long‑term, he hopes to become a software developer creating
    educational technology or an engineer working on safe, sustainable public projects, while continuing to mentor younger peers and promote collaborative environments.
