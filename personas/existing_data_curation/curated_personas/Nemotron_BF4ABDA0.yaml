  career_goals: Susan aspires to transform her lifelong passion for crafts and community service into a sustainable home‑based business. She aims to launch an online boutique selling handmade quilts, knitted
    goods, and locally sourced home décor, leveraging her organizational talents and newly acquired digital‑marketing skills. In parallel, she plans to lead a series of community art‑workshop sessions at
    the local library, mentoring younger artisans and fostering creative expression in Cherokee. To support these ambitions, Susan intends to enroll in a regional community‑college class in digital marketing
    and attend weekend pottery workshops, while also pursuing caregiver certification to broaden her volunteer impact. Long‑term, she envisions becoming a recognized facilitator of cultural events in her
    town, enhancing its artistic life while maintaining a balanced, low‑stress personal routine.
