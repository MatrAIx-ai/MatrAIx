personas:
  professional: Susan Valls, a 43‑year‑old household manager turned aspiring craft entrepreneur, blends meticulous budgeting, community‑event coordination, and newly acquired digital‑marketing skills to
    launch an online boutique of handmade quilts, knitted goods, and locally sourced décor while they mentor emerging artisans through library workshops.
  sports: Susan Valls enjoys low‑impact fitness through weekly hikes with the Cherokee Hikers Club, occasional casual runs supporting the Iowa Hawkeyes during football season, and volunteers as an umpire
    for local youth baseball, while they cherish the quiet of the trails over high‑intensity gym workouts.
  arts: Susan Valls, an avid acrylic painter, finds inspiration in the pastoral scenes of Grandma Moses and the vibrant colors of Iowa folk art, regularly visits the Des Moines Art Center to study works
    by Georgia O’Keeffe, and while they unwind evenings listening to John Coltrane’s jazz and the folk harmonies of Gillian Welch, they also knit.
  travel: Susan Valls plans trips with a detailed spreadsheet, often opting for weekend getaways to the scenic bluffs of Door County or a family road‑trip to Yellowstone, while they save for a once‑in‑a‑lifetime
    cultural tour of Ireland to trace ancestral roots and a culinary pilgrimage to Tuscany, balancing limited budget with a yearning for purposeful exploration.
  culinary: Susan Valls, an intermediate home cook, delights in blending Midwestern produce—heirloom tomatoes, sweet corn, and farm‑fresh eggs—into dishes like a spiced tomato bruschetta, while they also
    master international recipes such as Irish lamb stew, Thai green curry with lemongrass, and pastry‑perfect croissants, often sourcing specialty ingredients like saffron and fresh mozzarella from local
    farmers’ markets.
  core: Susan Valls, a 43‑year‑old organized craft enthusiast, balances their love for community service, meticulous budgeting, and creative pursuits with a watchful eye on health, and they channel an undercurrent
    of worry into a drive to turn hobby into a sustainable home‑based business.
background:
  cultural: Raised in a Midwestern white family of German and Irish descent in a small farming community near Cherokee, Iowa, Susan’s upbringing reflects the values of self‑reliance, modesty, and neighborly
    support common to the region. Her family’s traditions include seasonal celebrations such as county fairs, church potlucks, and harvest festivals, fostering a strong sense of community involvement. The
    local culture’s pragmatic approach to life, appreciation for folk art, and emphasis on family cohesion have shaped her worldview, while the rural landscape nurtured her love for gardening and outdoor
    recreation.
