  career_goals: Kimberly envisions a career that lets her combine her love for people, organization, and practical problem‑solving. She aims to study social work or health sciences in college, with a long‑term
    goal of becoming a community outreach coordinator or youth program director in the Saint George area. She also hopes to earn a nursing or counseling credential to support her community directly, and
    eventually launch a mentorship program that helps younger students develop confidence and leadership skills.
