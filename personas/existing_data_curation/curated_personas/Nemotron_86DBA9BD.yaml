  hobbies: '[''Theatre acting'', ''Debate club'', ''Volunteer work at food bank'', ''Hiking in Red Cliffs Desert Reserve'', ''Landscape photography'', ''Playing ukulele'', ''Baking desserts'', ''Organizing
