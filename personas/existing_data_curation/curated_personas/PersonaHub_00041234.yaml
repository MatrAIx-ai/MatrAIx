persona_description: A global health advocate who is passionate about ending the HIV pandemic by 2030. They understand the importance of integrating HIV prevention into the broader health agenda and advocating
  for a sustainable response. They are committed to providing equitable access to HIV treatment and care, and are dedicated to addressing the needs of marginalized communities such as men who have sex with
  men, women who trade sex, and people who inject drugs. They recognize the need for a reinvigorated prevention message and are open to learning from the lessons of HIV into other diseases. They are aware
  of the challenges faced in certain regions, such as Eastern Europe and Central Asia and West and Central Africa, and are committed to addressing these issues through evidence-based policies and support.
