personas:
  professional: Betty Desai, a high‑school junior who channels her curiosity‑practicality blend into self‑directed coding projects and digital sketches, tackles each Arduino build with meticulous planning
    yet leaves room for spontaneous tweaks, enters regional coding competitions to test her competitive edge, and treats school assignments as data‑driven puzzles, balancing reliability with a healthy dose
    of creative flexibility.
  sports: Betty Desai, who prefers solitary walks along the prairie outskirts and occasional jogs on the local trail, follows the Dallas Cowboys (NFL), Dallas Mavericks (NBA), and Texas Rangers (MLB) with
    a competitive eye, cheers on the Wichita Falls High School Cross Country team during the fall season, practices yoga at the community center to keep a balanced routine, and quietly tracks personal bests
    in a notebook.
  arts: Betty Desai, who spends evenings sketching digital sci‑fi cityscapes inspired by the works of Chris Foss and Syd Mead, loses herself in the ethereal piano compositions of Ludovico Einaudi and the
    synth waves of Com Truise, and binge‑watches documentaries on contemporary art while occasionally posting her own creations on DeviantArt, revealing a quiet yet competitive drive to refine her craft.
  travel: Betty Desai, who plans trips with meticulous spreadsheets and prefers solo exploration, has spent weekend getaways in Dallas and a road‑trip to the Grand Canyon, dreams of attending a tech expo
    in Tokyo and hiking the fjords of Iceland, and balances these aspirations with a modest allowance that limits long‑haul flights, often opting for budget airlines and staying in hostels.
  culinary: Betty Desai, whose modest cooking skills enable her to whip up avocado toast with cherry tomatoes, craft homemade ramen bowls with miso broth, and bake chocolate chip cookies using dark chocolate
    chunks, delights in experimenting with herbs like cilantro and basil, and occasionally adds a DIY Arduino temperature sensor to her kitchen experiments, revealing a practical yet creative palate.
  core: Betty Desai, a quietly competitive teen who blends solitary curiosity with pragmatic tinkering, thrives on puzzles, tech projects, and solo creative pursuits while battling a habit of late‑night
    screen marathons and occasional skepticism toward others’ motives.
background:
  cultural: Betty is a white teenager raised in Wichita Falls, Texas, a region that blends Southern hospitality with West-Texas independence. Her family values self-reliance, modesty, and a strong work
    ethic, traits common in the local community. While the town’s cultural staples—country music, high-school football Friday nights, and church gatherings—form part of her environment, Betty’s preference
    for solitude leads her to engage more with online learning communities than with local social scenes. Her upbringing also reflects typical Midwestern‑Southern values of personal responsibility, respect
    for quiet spaces, and an appreciation for the open plains and prairie landscapes surrounding her home.
attributes:
  skills: '[''self-taught Python programming'', ''basic HTML/CSS'', ''logical puzzle solving'', ''research and information synthesis'', ''Arduino electronics tinkering'', ''digital illustration'', ''personal
