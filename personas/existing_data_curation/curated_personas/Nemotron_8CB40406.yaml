  hobbies: '[''reading science-fiction and popular science books'', ''online coding tutorials and small projects'', ''solving Sudoku and logic puzzles'', ''digital illustration'', ''Arduino electronics
    tinkering'', ''quiet nature walks'', ''piano practice'', ''watching educational documentaries'', ''writing short stories and blog posts'']'
  career_goals: Betty aspires to turn her curiosity for technology into a career as a software developer or data scientist. She aims to earn a place in a specialized STEM high-school program or a coding
    boot camp, then pursue a computer engineering degree on a scholarship. Competitive by nature, she plans to participate in state-level coding competitions and hackathons to benchmark her skills. Long-term,
    she envisions creating her own tech solution that helps solitary learners organize their study habits, and possibly launching a small startup after college.
