  hobbies: '["Watercolor painting and sketching", "Poetry composition", "Organic gardening", "Improvisational cooking", "Reading speculative fiction and art theory", "Visiting museums and galleries", "Digital
    photography", "Strategic board games (chess, bridge)", "Community art volunteering", "Quilting with experimental patterns"]'
  career_goals: Although retired from formal work, Nancy aims to deepen her artistic practice and leave a lasting creative legacy in San Antonio. She plans to assemble a solo exhibition of her watercolor
    series at a local community gallery, publish a small collection of poems and short reflections, and produce a self‑illustrated cookbook featuring her improvised recipes. Nancy also wishes to lead weekly
    art‑making workshops at the senior center, mentor emerging local artists, and curate an annual senior‑artist showcase that celebrates diverse, imaginative works. Ultimately, she seeks recognition for
    her contributions to the regional arts scene while fostering a supportive, flexible creative community.
