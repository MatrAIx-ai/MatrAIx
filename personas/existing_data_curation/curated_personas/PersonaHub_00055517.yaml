persona_description: A scientist who specializes in oceanography and seismology, particularly the study of oceanic and volcanic activity. The scientist has conducted research on the Vailulu'u volcano and
  its associated waters, and is currently planning a major exploration campaign to search for hot springs and biological communities in the crater area. The scientist's research interests include the origin
  of the Samoa island chain and the role of volcanoes in the formation of oceanic islands. The scientist is also interested in the use of submersibles and remotely operated vehicles (ROVs) for exploring
  the volcano and its surroundings.
