persona_description: Helen Frankenthaler, an American painter born in 1928, is widely recognized as a second-generation abstract expressionist. She is considered the country's most prominent living female
  artist and is known for her innovative techniques in painting, such as stained canvases and color field paintings. Frankenthaler's work has been influential in the development of the color field movement
  and earned her impressive reviews from 1953 onwards. She has been awarded numerous awards and has had numerous one-woman exhibitions of her work, including retrospectives at the Whitney Museum of American
  Art in 1969 and New York's Museum of Modern Art in 1989. Frankenthaler's work has also inspired other artists, including the color field painters.
