personas:
  professional: Chantel Ortega, an aspiring junior game strategist, channels their curiosity for complex tactics into designing custom maps and characters in strategy video games, sketching concepts in
    a well‑worn notebook, and dreaming of a future role as a game‑design intern, where their practical eye for balance meets a relaxed approach to deadlines that sometimes leads to last‑minute bursts of
    creativity.
  sports: Chantel Ortega, a member of the neighborhood's LA Stars Youth Soccer Club, enjoys kicking the ball with a tight circle of friends after school, cheering for the Los Angeles Football Club (L.A. FC)
    on weekends, and prefers informal pick‑up matches in the local park over crowded stadium events, all while staying competitive and constantly challenging themselves to improve their footwork.
  arts: Chantel Ortega is a budding storyteller who devours fantasy novels like the "Percy Jackson" series and sketches vivid heroes and monsters in a spiral‑bound sketchbook, drawing inspiration from classic
    illustrators such as Hayao Miyazaki and contemporary muralists, and they spend Friday evenings listening to a mix of pop‑cultural soundtracks from artists like Selena and indie bands, which fuels their
    own creative projects.
  travel: Chantel Ortega loves exploring Southern California's green spaces, having spent summer weekends hiking in Griffith Park and strolling through the botanical gardens of the Los Angeles County Arboretum,
    and they dream of a future road trip to the historic streets of Mexico City and the ancient pyramids of Teotihuacan, where they hope to taste street foods and capture the bustling markets with their
    sketchbook.
  culinary: Chantel Ortega embraces the kitchen as a creative lab, skillfully rolling masa for homemade tamales, whisking rich mole sauce with chipotle and chocolate, and sprinkling fresh cilantro over
    guacamole, often collaborating with family members to perfect recipes while experimenting with fusion twists like adding avocado salsa to classic quesadillas.
  core: Chantel Ortega is a curious, competitive 12‑year‑old who balances solitary imagination with tight‑knit friendships, spins strategy games into creative sketches, and navigates life with a laid‑back
    but occasionally disorganized flair.
background:
  cultural: Chantel’s family is of Mexican descent, and Spanish is spoken at home alongside English. She participates in cultural traditions such as Día de los Muertos, Cinco de Mayo celebrations, and family
    gatherings centered on Mexican cuisine and music. Growing up in Reseda, a diverse Latino neighborhood in Los Angeles County, she experiences a blend of Mexican customs and broader Southern California
    influences, shaping a bicultural identity that emphasizes family loyalty, community festivals, and a love for sharing her heritage through cooking and storytelling.
