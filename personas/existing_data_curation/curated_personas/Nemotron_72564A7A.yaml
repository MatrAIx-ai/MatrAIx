  hobbies: '[''Reading fantasy novels'', ''Sketching and digital illustration'', ''Playing strategy video games'', ''Cooking Mexican recipes with family'', ''Exploring local parks and community gardens'',
    ''Small‑group soccer and board game sessions'']'
  career_goals: Chantel dreams of a career that blends curiosity and practicality, aiming to become an engineer—preferably in environmental or robotics fields—so she can design real‑world solutions. She
    seeks to excel in science fairs, attend a STEM‑focused high school, and eventually study engineering at a top university. Her competitive nature drives her to set high academic standards, while her
    flexible mindset allows her to adjust her plans as new interests emerge.
