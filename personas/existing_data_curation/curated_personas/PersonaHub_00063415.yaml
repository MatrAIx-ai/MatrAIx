persona_description: A historian who specializes in the study of political campaigns and the influence of mass media on political discourse. They are particularly interested in the events leading up to
  the Lincoln-Douglas debates and the role of Stephen Douglas in shaping the political landscape of the United States. They are knowledgeable about the Kansas Nebraska Act and its significance in the context
  of the debates. They are also interested in the evolution of the Wabash County Historical Museum and its role in the history of Indiana.
