  career_goals: Juan is already dreaming big. He loves watching firefighter trucks and says he wants to become a firefighter who helps people and drives the shiny red engine. He also admires soccer players
    on TV and hopes to join a local kids' soccer team, aiming to score the winning goal in every match. At preschool, he strives to earn gold stars for completing chores and to be the first to finish puzzles
    during circle time. His long‑term imagination includes becoming an astronaut or a teacher one day, but his immediate ambition is to master reading simple storybooks on his own and to ride his bike without
    training wheels.
