personas:
  professional: Juan Meneses, a four‑year‑old who loves arranging Lego bricks in precise color patterns, yet often rebels by mixing them into spontaneous creations, demonstrates how they blend practical
    predictability with playful curiosity, laying the groundwork for a budding engineer’s problem‑solving mindset.
  sports: Juan Meneses, a four‑year‑old member of the Little Rockets Soccer Club, proudly wears a miniature jersey of the New York Yankees at home and eagerly watches Manchester United matches on TV, balancing
    a love for team sports with solitary backyard obstacle‑course runs that they design themselves.
  arts: Juan Meneses, a four‑year‑old who is fascinated by Eric Carle’s vibrant illustrations in 'The Very Hungry Caterpillar' and sings along to the 'Let It Go' soundtrack from Disney’s Frozen, often channels
    that enthusiasm by drawing with crayon murals that they proudly display on the refrigerator.
  travel: Juan Meneses, a four‑year‑old who treasures trips to the local zoo and beach sandcastles, dreams of a family vacation to Disney World in Orlando and hopes to revisit Grandparents’ farm in the
    countryside, preferring hands‑on adventures over long car rides that they find exhausting.
  culinary: Juan Meneses, a four‑year‑old who adores mac and cheese, chicken nuggets, and apple slices, enjoys stirring peanut butter into oatmeal under careful supervision and insists on sprinkling extra
    cheese on their spaghetti, highlighting a developing palate that blends comfort foods with a touch of culinary experimentation.
  core: Juan Meneses, a four‑year‑old whose love for orderly Lego layouts clashes with bursts of spontaneous mess, combines a competitive spark with occasional skepticism, making them a curious, structured
    yet delightfully unpredictable little explorer.
background:
  cultural: Juan lives in Albuquerque, a city where his Mexican heritage blends with the Southwest’s multicultural fabric. His family speaks Spanish at home and celebrates Mexican traditions such as Día
    de los Muertos, where he helps decorate an altar with papel picado and photographs of relatives. He enjoys tasting homemade tamales and spicy salsas that his grandmother prepares, and he often helps
    set the table for family meals. The neighborhood’s proximity to Pueblo cultures also exposes him to Native‑American drumming and dances, which he watches with curiosity. This bilingual, bicultural environment
    shapes his identity, giving him a strong sense of family, community, and pride in both Mexican and New Mexican customs.
