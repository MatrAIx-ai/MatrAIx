  hobbies: '[''Community softball league'', ''Gardening (heirloom tomatoes, peppers)'', ''Attending regional food festivals'', ''Listening to classic rock and jazz'', ''Playing the harmonica'', ''Leading
    neighborhood potluck gatherings'', ''Volunteer work at the local community garden'', ''Reading travel and food literature'', ''Exploring new culinary trends through cooking classes'', ''Solving jigsaw
    puzzles'']'
  career_goals: Thomas aims to channel his organizational talent and culinary vision into opening a modest farm‑to‑table bistro in Porterville that highlights locally sourced produce and his signature blend
    of comfort and creativity. He aspires to win a statewide culinary award within the next five years, to become a mentor for at least ten aspiring chefs through apprenticeships or community‑college programs,
    and eventually to publish a cookbook that chronicles his life‑long recipes and the flavors of the Central Valley. In the longer term, he hopes to serve as a consultant helping other small restaurants
    streamline operations and elevate food quality.
