    mentorship and training'']'
  hobbies: '[''Zumba and community dance classes'', ''Volunteer work with neighborhood watch'', ''Book club (contemporary fiction & historical non‑fiction)'', ''Southern cooking and recipe experimentation'',
    ''Home automation and personal security gadget tinkering'', ''Gardening (tomatoes, herbs, peppers)'', ''Fishing trips on Lake Murray'', ''Social potluck gatherings'']'
  career_goals: Angie aims to advance to a shift supervisor position within the next two years and obtain Certified Protection Officer (CPO) certification to solidify her credentials. She intends to move
    into a security management role overseeing a team of surveillance officers at the local casino, where she can develop training programs and mentor newer staff. Long‑term, she envisions transitioning
    to a security consultancy focused on designing affordable surveillance and access‑control solutions for small businesses in South Carolina. Throughout her career progression, she seeks a stable retirement
    plan and hopes to leverage her expertise into a side venture offering home‑security system installations for neighbors and friends.
