personas:
  professional: Angie Tallman, a seasoned casino security officer with expert knowledge of CCTV, video analytics, and loss‑prevention protocols, blends curiosity‑driven tech tinkering with practical risk
    assessment, using their outgoing, assertive style to mentor teammates and drive toward a shift‑supervisor role.
  sports: Angie Tallman, a devoted fan of the Carolina Panthers, the Atlanta Braves, and the Clemson Tigers, participates in a senior walking club at the Lake Murray trail, occasionally joins a community
    softball league, and they enjoy fishing excursions on Lake Murray during the summer.
  arts: Angie Tallman, who reads contemporary fiction by Celeste Ng and historical non‑fiction by David McCullough, enjoys listening to Alison Krauss, attending the Columbia Marionette Theatre’s productions,
    and they curate a small collection of Southern gospel records, allowing music and literature to shape their social gatherings.
  travel: Angie Tallman, preferring road‑trip planning with detailed itineraries, revisits Charleston’s historic district, explores Asheville’s craft breweries, and they dream of a culinary tour of Tuscany,
    balancing family‑friendly dates with occasional solo adventure while staying within a modest travel budget.
  culinary: Angie Tallman, an enthusiastic home cook, crafts classic Southern dishes like shrimp and grits, collard greens, and pecan pie while integrating garden‑fresh tomatoes, basil, and chilies into
    experimental Cajun jambalaya and occasional Korean BBQ recipes, and they proudly host weekly potluck nights.
  core: Angie Tallman blends a security‑savvy mind, Southern hospitality, and a zest for community dance, yet they can't resist the latest smart‑home gadget, even if it means a late‑night online checkout.
background:
  cultural: Angie was raised in Lexington County, South Carolina, in a middle‑class white family that valued Southern hospitality, community involvement, and a strong work ethic. Her upbringing emphasized
    church attendance, family gatherings, and a love for Southern cuisine and traditions. Growing up in the Upstate region, she developed deep ties to the local community and embraces the area’s blend of
    historic charm and modern growth. The cultural norms of the South—politeness, respect for elders, and a preference for face‑to‑face interaction—continue to shape her social style and professional demeanor.
attributes:
  skills: '[''CCTV operation and video analytics'', ''Surveillance monitoring and fraud detection'', ''Loss prevention and risk assessment'', ''Emergency response and conflict de‑escalation'', ''Incident
