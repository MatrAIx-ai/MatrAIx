  career_goals: While Beatriz enjoys the independence of driving her own taxi, she is looking to expand her role in the local transportation ecosystem. She plans to complete the remaining coursework toward
    an associate’s degree in Business Administration, which will enable her to transition into managing a small fleet of driver‑owned taxis. Her longer‑term ambition is to launch a cooperative service focused
    on senior‑citizen mobility and weekend heritage tours that showcase Cass County’s historic sites. She also hopes to mentor new drivers, contribute to city discussions on public transit improvements,
    and eventually secure a commercial driver’s license for larger vehicles.
