personas:
  professional: Luis Hernandez, a meticulous proofreader and copy editor fluent in English and Spanish, channels their curiosity and exacting organizational habits into delivering flawlessly edited, SEO‑optimized
    content for both print and digital platforms, while they eye a senior editorial role that will let them lead multilingual projects and eventually launch a boutique consultancy.
  sports: Luis Hernandez, an active member of the Worcester Wanderers co‑ed soccer league and a regular at the local salsa‑dance studio, fuels their competitive streak by cheering for the Boston Celtics
    and Boston Red Sox while they also enjoy brisk runs along the Charles River during the spring.
  arts: Luis Hernandez, a frequent visitor to Boston’s Museum of Fine Arts and the ICA, captures street life through a Leica M camera inspired by Henri Cartier‑Bresson, sketches museum exhibits on the back
    of notebooks, and they unwind to the improvisations of Miles Davis and Kamasi Washington at local jazz clubs.
  travel: Luis Hernandez plans trips with the same precision they apply to editing, using spreadsheets to budget and itinerary apps to map out cultural hotspots, has already explored Barcelona’s Gothic
    Quarter, the historic streets of Montreal, and the coastal charm of Cape Cod, and they dream of wandering the temples of Kyoto and the glaciers of Patagonia while balancing work commitments.
  culinary: Luis Hernandez, an intermediate home chef, delights in preparing plantain‑based mofongo with garlic‑infused sofrito and shredded pork shoulder, pairs it with arroz con gandules seasoned with
    annatto and cilantro, and they often experiment with fresh seafood paellas to blend island flavors with New England seafood.
  core: Luis Hernandez, a detail‑obsessed editor who dances through life’s rhythms, can spend hours perfecting a comma but occasionally forgets to eat lunch, and they balance a competitive edge with a love
    for community salsa nights and weekend soccer.
background:
  cultural: Luis is a first‑generation Puerto Rican American raised in Gardner, Massachusetts. He grew up in a bilingual household where Spanish and English were spoken interchangeably, fostering a deep
    respect for his Caribbean heritage and its storytelling traditions. Family gatherings feature traditional music, dance, and food, reinforcing cultural pride. While he embraces the disciplined, achievement‑oriented
    values common in New England, Luis also carries forward the communal spirit of Puerto Rico through his participation in local Latino festivals and his commitment to preserving bilingual narratives in
    his professional work. This blend of cultures shapes his identity, informs his worldview, and enriches his contributions both socially and professionally.
attributes:
  skills: '[''Proofreading'', ''Copyediting'', ''Grammar and Punctuation Mastery'', ''APA Style Guide'', ''Chicago Manual of Style'', ''MLA Style Guide'', ''Digital Publishing Platforms (WordPress, Drupal)'',
    ''Adobe InCopy'', ''SEO-friendly Copywriting'', ''Project Time Management'', ''Bilingual Editing (English–Spanish)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Street and documentary photography'', ''Salsa dancing'', ''Amateur soccer league'', ''Trivia night participation'', ''Live jazz and music concerts'',
    ''Cooking Puerto Rican cuisine'', ''Volunteer work at Fiesta Puertorriquena'', ''Reading contemporary literature'', ''Hiking in Worcester County'']'
  career_goals: Luis aims to progress from his current proofreader role to a senior editorial position within a reputable publishing house or media organization, eventually becoming a managing editor overseeing
    a team of writers and editors. He is interested in obtaining professional certification from the Editorial Freelancers Association and completing a specialized course in digital content strategy. In
    the longer term, Luis envisions launching his own freelance editorial consultancy focused on bilingual content for Latino and multicultural audiences, while contributing thought leadership articles
    on the intersection of language, culture, and technology.
