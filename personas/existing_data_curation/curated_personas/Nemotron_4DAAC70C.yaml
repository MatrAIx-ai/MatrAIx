  hobbies: '[''Amateur soccer'',''Cooking Mexican cuisine'',''Volunteering as English tutor'',''Mindfulness meditation'',''Attending Latin music concerts'',''Reading self-help and productivity books'']'
  career_goals: Alberto aspires to advance within the customer experience field by obtaining a bachelor's degree in Business Administration or Communications, ultimately moving into a team lead or customer
    success manager role. He aims to leverage his organizational strengths and compassionate approach to design customer support strategies that improve satisfaction scores and reduce churn. In the longer
    term, he hopes to combine his technical knowledge and cultural insight to lead a multicultural support team or develop training programs for new representatives, while also pursuing certifications in
    project management to broaden his leadership capabilities.
