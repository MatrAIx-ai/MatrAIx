    and report writing'', ''Creative problem-solving'']'
  hobbies: '[''Abstract watercolor painting'', ''Photography of industrial and architectural subjects'', ''Model railway building'', ''Vintage radio restoration'', ''Science-fiction book club'', ''Community
    trivia night organization'', ''Gardening'', ''Attending local art exhibitions'', ''Listening to classic rock'', ''Volunteer work with senior heating assistance program'']'
  career_goals: Approaching retirement, John aims to transition into a consulting role and eventually launch a boutique firm that advises homeowners and small businesses on greener, energy‑efficient HVAC
    solutions. He seeks to become a recognized local authority on retrofitting older homes, author a practical guidebook, and speak at community workshops about sustainable climate‑control practices. Mentoring
    the next generation of technicians remains a priority, and he hopes to volunteer his expertise to assist low‑income seniors with heating and cooling needs in his community.
