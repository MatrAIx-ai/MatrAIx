  hobbies: '["Visiting art galleries", "Community theater attendance", "Adult soccer league", "Fishing on Puget Sound", "DIY woodworking", "Experimental cooking", "Podcasts on art and technology", "Volunteering
    for community recycling programs"]'
  career_goals: David aims to advance to a shift-lead or warehouse-supervisor role within the next two years, obtaining a forklift certification and a logistics coordinator credential through community-college
    night classes. He hopes to eventually move into a warehouse-manager position that combines his organizational strengths with strategic planning. Beyond his current job, he dreams of launching a small
    community-focused arts shop or cafe with his wife, merging his passion for art, local culture, and entrepreneurship while securing a stable financial future for his family.
