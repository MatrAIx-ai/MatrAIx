personas:
  professional: An aspiring junior artist and neighborhood event coordinator, Kiara Watkins channels their boundless curiosity and methodical organization into creating vibrant murals for school projects
    and leading tidy community clean‑up initiatives, always balancing lively teamwork with quiet planning sessions.
  sports: A budding soccer enthusiast, Kiara Watkins cheers for the local youth soccer club the Greenfield Tigers, occasionally watches the River City Bears, the hometown baseball team, practices at the
    community rec center every Saturday, and enjoys brisk nature walks that double as treasure hunts for pinecones—a playful way to stay active.
  arts: A dedicated little painter, Kiara Watkins spends hours emulating the bold colors of Van Gogh’s Sunflowers and the whimsical characters of Dr. Seuss, often recreating them on LEGO‑built easels, and
    revels in Saturday trips to the metropolitan art museum where they eagerly discuss the works of Monet and Banksy with their parents.
  travel: An adventurous explorer, Kiara Watkins loves weekend trips to the nearby botanical garden and dreams of traveling to the Eiffel Tower and the Great Barrier Reef, usually planning their itineraries
    with colorful stickers on a homemade map while insisting on bringing a sketchbook for every journey.
  culinary: A budding junior chef, Kiara Watkins delights in whipping up strawberry‑banana smoothies, assembling cheesy macaroni casseroles, and meticulously arranging fruit kebabs with grapes, carrots,
    and pineapple chunks, yet often forgets to wash their hands before cooking—a habit their mother gently corrects.
  core: Kiara Watkins is a curious, organized, and compassionate seven‑year‑old who balances creative art projects, community care, and a love for nature, all while occasionally misplacing their crayons
    and snack wrappers.
background:
  cultural: Kiara is a White American raised in North Chicago, Illinois. Her upbringing reflects typical Midwestern values of community, politeness, and a strong work ethic, while also exposing her to the
    cultural diversity of the Chicago metropolitan area. She participates in local school programs, library story hours, and community arts festivals, fostering an appreciation for varied perspectives and
    collaborative experiences.
