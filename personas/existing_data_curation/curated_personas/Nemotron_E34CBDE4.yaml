  career_goals: Charles aims to transition into a senior engineering or lead architect role where he can shape product strategy while preserving a harmonious team environment. He aspires to mentor junior
    developers, champion inclusive design practices, and integrate emerging technologies such as AI‑driven personalization into web experiences. Over the next five years, he plans to launch a side venture
    that produces art‑focused, community‑oriented websites for local cultural institutions in Long Island, blending his love for technology and visual arts. He also seeks to achieve a balanced work‑life
    rhythm that reduces stress, possibly by negotiating a flexible remote schedule that allows more quality time with his spouse and family.
