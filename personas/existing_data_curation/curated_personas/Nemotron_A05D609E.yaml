personas:
  professional: Petronilo, a budding technologist, builds intricate LEGO architectures and crafts simple Scratch games, channeling a love for structure into early engineering curiosity.
  sports: Petronilo joins the Little Rockets youth soccer team, preferring small‑group practices on Saturday mornings and often strategizing plays like a chess player, though they sometimes favor solitary
    puzzles over intense drills.
  arts: Petronilo sketches detailed spacecraft and model car designs, enjoys listening to The Piano Guys and watching the Cosmos series, and often incorporates LEGO colors into artwork, turning creative
    expression into a structured, competitive hobby.
  travel: Petronilo loves meticulously planned trips to science museums, such as the local planetarium and a recent visit to the Houston Space Center, dreaming of a future family vacation to the Smithsonian’s
    Air and Space Museum.
  culinary: Petronilo prefers familiar foods like cheese pizza and chicken nuggets but delights in assembling fruit kebabs shaped like rockets, and they often request extra sauce to "glue" their creations
    together, revealing a playful, structured approach to meals.
  core: Petronilo is a detail‑oriented 7‑year‑old who blends a love of structured play and competitive puzzles with a preference for small group interactions, often turning everyday activities into mini‑engineering
    challenges.
background:
  cultural: Petronilo is raised in a Vietnamese‑American household within Houston's lively Little Saigon community. At home, he hears both English and Vietnamese, celebrates Tet with traditional foods such
    as bánh chưng and pho, and occasionally attends Vietnamese language school. His family places a strong emphasis on education, respect for elders, and community involvement, shaping his disciplined and
    structured outlook. Outside the home, he experiences the multicultural fabric of Houston, enjoying local festivals, Texas BBQ, and the city's diverse sports culture, blending Southeast Asian heritage
    with Southern American influences.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Puzzle solving", "LEGO construction", "Scratch programming", "Organizational skills", "Conversational Vietnamese"]'
