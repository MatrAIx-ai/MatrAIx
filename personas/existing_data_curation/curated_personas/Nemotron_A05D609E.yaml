  career_goals: Petronilo dreams of becoming a civil or robotics engineer, motivated by his love for building, structured problem‑solving, and his competitive spirit. In the short term, he aims to win his
    school's science fair and join a local robotics club. Long‑term, he hopes to design safe, efficient infrastructure for Houston and lead a team in national robotics competitions, using his skills to
    give back to his community.
