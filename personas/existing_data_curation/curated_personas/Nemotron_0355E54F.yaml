    ''basic Excel data analysis'', ''equipment calibration'', ''new hire training'']'
  hobbies: '[''community basketball league'', ''hunting and fishing trips'', ''classic car restoration'', ''DIY woodworking projects'', ''watching Arkansas Razorbacks football'', ''barbecue cooking competitions'',
    ''pool tournaments'', ''volunteering at church youth group'', ''attending local music festivals'', ''participating in 4-H fairs'']'
  career_goals: Robert aims to move up to a production supervisor role within the next three to five years, where he can lead a shift, implement efficiency improvements, and mentor younger workers. He plans
    to obtain a Certified Production Technician (CPT) credential and a forklift‑supervisor endorsement. Long‑term, he dreams of opening a small custom metal‑work shop that blends his practical skills with
    his curiosity for new technologies, allowing him to stay active in his field while reducing the physical strain of floor work as he ages.
