    record keeping'',''Mentoring and training new drivers'']'
  hobbies: '[''Listening to classic soul, gospel, and R&B'',''Community basketball league participation'',''Fishing at Lake Spalding'',''Vegetable gardening'',''Vintage automobile restoration'',''Crossword
    puzzles and Sudoku'',''Reading biographies of African‑American leaders'',''Volunteer math tutoring at the community center'']'
  career_goals: Phillip aims to leverage his extensive on‑the‑road experience into a supervisory role within the transit authority, such as senior fleet supervisor or operations manager. He plans to enroll
    in a bachelor’s program in transportation management to deepen his logistical expertise and qualify for leadership positions. Long‑term, he aspires to develop a small charter service focused on community
    events and senior transportation, providing reliable mobility for underserved populations while securing financial stability for his retirement. He is also motivated to become a mentor and trainer,
    helping younger drivers achieve the same level of professionalism and safety he embodies.
