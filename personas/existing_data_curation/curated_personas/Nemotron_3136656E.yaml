  career_goals: Brigitte aspires to become a program director for a regional nonprofit that merges community development with arts‑based mental health initiatives. She dreams of leading projects that empower
    marginalized populations through creative expression and technology‑enhanced services. To strengthen her impact, she plans to pursue a master’s degree in Public Administration or Social Work while maintaining
    a healthy work‑life balance amid her sensitivity to stress. Long‑term, she hopes to launch her own community‑focused organization that champions holistic wellbeing, influences local policy on arts funding,
    and mentors emerging social‑service professionals.
