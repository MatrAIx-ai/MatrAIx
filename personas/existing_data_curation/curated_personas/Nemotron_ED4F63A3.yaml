  career_goals: Vrinda aims to re‑enter the workforce in a role that respects her need for solitude and routine. She plans to obtain a certification in adult education or TESOL so she can offer remote,
    one‑on‑one tutoring to middle‑school students from immigrant backgrounds. Over the next five years, she hopes to publish a series of practical, culturally‑responsive teaching guides for parents supporting
    bilingual children, and eventually build a modest freelance consultancy that creates curriculum modules for community learning centers in Forsyth County.
