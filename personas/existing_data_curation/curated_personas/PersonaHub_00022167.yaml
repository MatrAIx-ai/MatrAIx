persona_description: A historian who specializes in the study of mental health and its history, particularly in ancient civilizations. She is interested in the development of psychiatric theories, treatments,
  and institutions, and the role of religion and spirituality in mental health. Her research interests include the history of the first known psychiatric texts, the first known mental hospitals, and the
  first known mental physicians. She is also interested in the impact of monotheism on mental health and the role of mental healthcare as a major priority in society.
