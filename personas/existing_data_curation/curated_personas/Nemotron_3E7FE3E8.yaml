personas:
  professional: Tyler Munoz is an aspiring junior architect who fuses a love for building intricate LEGO cities with early Scratch programming, channeling their critical, competitive nature into perfecting
    every model.
  sports: Tyler Munoz is a member of a local youth soccer league, cheers for Manchester United’s junior academy team, and spends Saturday mornings kicking a ball with friends while also keeping an eye on
    the NBA’s Los Angeles Lakers for high‑flyers that inspire their own game strategy.
  arts: Tyler Munoz draws comic panels in the style of Jack Kirby, studies the vibrant color palettes of Hayao Miyazaki’s films, and translates those inspirations into LEGO dioramas populated by fantastical
    creatures, often humming the respective soundtracks while they work.
  travel: Tyler Munoz has explored the Natural History Museum in Washington, D.C., dreams of a future family trek to Iceland’s volcanic landscapes to collect rocks for stories, and hopes to visit the Kennedy
    Space Center to see real rockets up close.
  culinary: Tyler Munoz favors pizza with pepperoni arranged like city blocks, loves building snack towers from pretzel sticks, cheese cubes, and sliced grapes, and treats their favorite cookie‑dough ice
    cream as a fuel source for marathon LEGO sessions.
  core: Tyler Munoz is a seven‑year‑old imagination engine who constructs futuristic LEGO metropolises, sketches space‑faring heroes, saves zealously for new sets, and battles seasonal allergies with the
    same competitive grit they apply to every creative quest.
background:
  cultural: Tyler was raised in North Highlands, a multicultural suburb of Sacramento County, where his family's white heritage blends with the diverse cultural fabric of the neighborhood. He celebrates
    traditional American holidays such as Thanksgiving and Christmas, while also participating in community events like the annual Summerfest that showcase foods, music, and traditions from the many cultures
    around him. This environment provides him with exposure to a variety of languages and perspectives, nurturing his curiosity about the wider world.
attributes:
  skills: '[''Imaginative storytelling'', ''Early reading comprehension'', ''Block‑based coding (Scratch)'', ''LEGO construction'', ''Pattern recognition and puzzle solving'', ''Sketching and drawing'',
    ''Toy deconstruction and critical analysis'']'
  hobbies: '[''LEGO building (futuristic and sci‑fi themes)'', ''Sketching and comic creation'', ''Reading sci‑fi/fantasy books'', ''Exploring nature in local parks'', ''Playing Minecraft and Scratch coding
    projects'']'
  career_goals: Tyler dreams of becoming an astronaut who can design his own spacecraft, a video‑game designer who creates worlds that blend art and science, or an inventor who builds gadgets that solve
    everyday problems. He is eager to enter school science fairs and coding competitions, hoping to win awards that recognize his inventive ideas. His competitive streak pushes him to set ambitious milestones,
    like mastering more advanced coding concepts by middle school and creating a comic series about space explorers.
