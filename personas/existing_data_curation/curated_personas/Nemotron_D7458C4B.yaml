  hobbies: '[''Backyard vegetable gardening'', ''Preparing traditional Mexican cuisine'', ''Knitting and crocheting'', ''Jigsaw and crossword puzzles'', ''Attending small church gatherings'', ''Listening
    to mariachi and regional Mexican music during walks'', ''Reading mystery novels'']'
  career_goals: Rosell aims to advance from independent housekeeping work to a supervisory role within a larger residential or hospitality setting, such as becoming a senior housekeeper at a boutique hotel
    or a team lead for a regional cleaning service. She plans to obtain a professional certification in housekeeping management and to master emerging cleaning technologies, including steam‑cleaning and
    low‑VOC chemical applications. In the longer term, Rosell aspires to launch her own small cleaning company that emphasizes reliability, eco‑conscious methods, and meticulous service standards, providing
    stable employment for other women in her community. Financially, she seeks to secure enough income to support her children's education and to invest in a modest property for her family’s future.
