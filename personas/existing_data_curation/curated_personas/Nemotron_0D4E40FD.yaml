  career_goals: Although retired, Verena aims to stay physically active through gardening and regular walks, maintain mental sharpness by completing a memoir and deepening her genealogy work, and expand
    her digital literacy by learning digital photography. She hopes to mentor newcomers at her church’s outreach program, lead a small gardening group for seniors, and ensure her grandchildren retain knowledge
    of the family’s cultural heritage.
