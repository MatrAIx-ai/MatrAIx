  hobbies: '["Visiting art exhibits and museums", "Reading historical fiction and poetry", "Watercolor painting", "Gardening (heirloom tomatoes, native flowers)", "Craft circle (knitting, crochet, scrapbooking)",
    "Playing bridge and bingo", "Volunteering at the Jasper Historical Society", "Listening to jazz and folk music", "Attending online lectures and podcasts on art and history"]'
  career_goals: Mary Ann aims to keep contributing to her community by documenting and preserving Jasper's local history, compiling a memoir that intertwines her family's story with the town's evolution,
    and mentoring younger volunteers in oral history techniques. She aspires to curate a traveling exhibition of artworks created by senior residents, fostering intergenerational appreciation of the arts.
    Additionally, she hopes to deepen her knowledge of contemporary art trends through online courses, maintain her physical well‑being so she can continue leading group activities, and make occasional
    trips to nearby cultural centers such as the Indianapolis Museum of Art.
