personas:
  professional: Alvaro Quintana, a veteran production planner with over two decades of hands‑on experience, leverages advanced Excel, SAP S/4HANA, and a Yellow Belt in Lean Six Sigma to craft resilient
    schedules while infusing design‑thinking and mindfulness‑inspired stress‑reduction into cross‑functional problem‑solving.
  sports: Alvaro Quintana fuels fitness by weekly hikes with the Santa Rosa Plateau Hiking Club, joins a local over‑40 soccer league, and never skips a weekend match of Club América that they watch with
    family while also cheering on the Los Angeles Dodgers during baseball season.
  arts: Alvaro Quintana channels artistic curiosity through sketching Santa Rosa Plateau vistas, collecting Frida Kahlo‑inspired talavera tiles, and strumming acoustic renditions of Lila Downs and José
    Alvarez folk ballads, while regularly attending rotating exhibitions at the Temecula Valley Museum featuring contemporary Mexican painters such as Carlos Merida.
  travel: Alvaro Quintana plans trips with meticulous itineraries that balance cultural immersion and outdoor adventure, having explored Oaxaca’s vibrant markets and Napa Valley’s vineyards, and now dreaming
    of trekking the tea‑planting hills of Uji, Japan, while still favoring weekend getaways to Big Sur’s coastal trails.
  culinary: Alvaro Quintana blends solid home‑cooking chops with a love for fusion, regularly preparing fish tacos with avocado‑cilantro salsa, grilled corn esquites spiced with chipotle, and ceviche featuring
    Monterey Bay shrimp, all while experimenting with heirloom tomatillos and hand‑picked cilantro from their garden.
  core: Alvaro Quintana is a methodical production planner whose restless curiosity fuels nightly guitar sessions and meticulous budgeting, yet a penchant for worry often leads them to over‑schedule both
    work and leisure, making them a slightly anxious perfectionist with a generous heart for art and family.
background:
  cultural: Alvaro grew up in a bicultural Mexican‑American household, where Spanish was spoken at home and family gatherings centered around food, music, and traditional celebrations such as Día de los
    Muertos and Cinco de Mayo. This heritage instilled in him a strong sense of familial responsibility and community solidarity, values he carries into his marriage and workplace relationships. He maintains
    ties to his roots by preserving Mexican culinary traditions, dancing to regional music, and supporting local cultural festivals in Riverside County. Living in Murrieta, he blends his heritage with the
    eclectic Californian lifestyle, embracing diversity while holding onto the warmth, humility, and resilience characteristic of his Mexican ancestry.
attributes:
  skills: '[''Production scheduling'', ''Inventory management'', ''ERP (SAP) operation'', ''Microsoft Dynamics NAV'', ''Advanced Excel (pivot tables, VBA)'', ''Basic SQL querying'', ''Lean Six Sigma Yellow
