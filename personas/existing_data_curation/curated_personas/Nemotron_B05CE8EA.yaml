  hobbies: '[''Visiting art exhibits and museums'', ''Sketching and watercolor painting'', ''Playing acoustic guitar'', ''Cooking Mexican‑Californian fusion dishes'', ''Hiking in the Santa Rosa Plateau'',
    ''Listening to lean manufacturing podcasts'', ''Practicing mindfulness meditation'', ''Watching soccer matches (Liga MX)'']'
  career_goals: Alvaro aims to move into a supervisory role such as Production Planning Lead within the next three years, pursuing APICS Certified Production and Inventory Management (CPIM) certification
    to deepen his supply chain knowledge. He also hopes to spearhead a continuous‑improvement program that incorporates employee well‑being and stress‑reduction practices, reflecting his personal experience
    with stress. Long‑term, he envisions transitioning to a plant operations manager role where he can blend his organizational expertise with his passion for fostering a supportive, innovative workplace
    culture. Additionally, he is interested in completing an associate degree in Business Administration at a local community college to broaden his management credentials.
