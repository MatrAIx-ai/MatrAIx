  career_goals: 'As a nine‑year‑old, Osvaldo dreams of a future where he can combine his love of building things with helping people and the environment. He often mentions wanting to become an engineer
    who designs eco‑friendly machines or a marine biologist who protects sea life along Florida’s coast. He also imagines playing soccer professionally for his community and later coaching younger kids,
    reflecting his Colombian love for the sport. His goals are framed by a practical mindset: he wants to master school subjects, learn advanced coding, and acquire the skills needed to turn his ideas into
    real projects that make life easier for his family and friends.'
