personas:
  professional: Osvaldo Galindo is a budding junior engineer who merges the collaborative spirit of the neighborhood soccer team with the systematic creativity of LEGO robotics and Scratch animation, demonstrating
    a practical curiosity that drives their early ambition to design moving models and simple games.
  sports: Osvaldo Galindo plays midfield for the Greenfield Strikers youth soccer team, idolizes the local pro side Metro United, and they spend Saturday mornings sprinting across the park while secretly
    dreaming of earning a spot on the national under‑15 squad.
  arts: Osvaldo Galindo crafts kinetic LEGO creations, codes whimsical Scratch cartoons starring dinosaurs, devours adventure novels by authors like Steve Jackson, and they tune into a mix of cumbia beats
    and contemporary pop artists such as Bad Bunny, weaving these influences into a vibrant personal soundtrack.
  travel: Osvaldo Galindo loves weekend family hikes in the nearby Riverfront Nature Reserve, is fascinated by the dinosaur fossils at the Utah Dinosaur Museum, and they hope to someday trek the rain‑soaked
    trails of the Amazon basin while balancing school commitments and a limited travel budget.
  culinary: Osvaldo Galindo helps their mother roll dough for empanadas filled with cheese and meat and shape golden arepas with a sprinkle of shredded cheese, and they proudly master the art of buttery
    crusts while still sneaking a few extra cookies when no one is watching.
  core: Osvaldo Galindo is an inquisitive nine‑year‑old who blends soccer teamwork, LEGO engineering, and a love for dinosaur adventures into meticulous planning, and they occasionally punctuate their routine
    with sneaky cookie raids.
background:
  cultural: Osvaldo lives in Riverview, Florida, but his household is deeply rooted in Colombian culture. His parents speak Spanish at home, and he celebrates traditional holidays such as Día de los Reyes,
    Carnaval de Barranquilla-inspired parties, and Christmas with Colombian customs like exchanging 'novenas' and sharing 'tamales'. Family meals often feature staples such as arroz con pollo, arepas, and
    fresh fruit, reinforcing a strong sense of culinary heritage. He attends a local elementary school that offers Spanish language support, allowing him to navigate both English and Spanish environments
    fluidly. The blend of Colombian values—family closeness, hospitality, and a love for music and dance—with the multicultural atmosphere of Hillsborough County gives Osvaldo a bicultural identity that
    shapes his worldview, friendships, and aspirations.
