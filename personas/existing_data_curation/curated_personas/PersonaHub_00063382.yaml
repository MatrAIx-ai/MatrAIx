persona_description: A historian who specializes in the study of ancient civilizations, particularly the civilizations of the ancient Near East, such as the Sumerians, Babylonians, and Assyrians. He is
  known for his extensive research on the development of writing systems, including cuneiform, and his work on the history of the region from the earliest times to the end of the second millennium BCE.
  His publications include several books on the subject, as well as articles and essays on various aspects of ancient Near Eastern civilization.
