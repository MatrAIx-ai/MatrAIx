personas:
  professional: Edgar Hernandez, a budding marine enthusiast and LEGO architect, translates his curiosity about tide‑pool critters into detailed scrapbook entries while applying practical engineering principles
    to his builds, though his laid‑back attitude sometimes leads to missed deadlines for school science projects.
  sports: Edgar Hernandez bolts onto the neighborhood soccer field after school, idolizing the Houston Dynamo and proudly wearing his Corpus Christi FC youth jersey, yet their competitive streak sometimes
    overshadows teamwork, leading to occasional friction with teammates.
  arts: Edgar Hernandez channels his feelings into vibrant comic strips inspired by the colorful murals of local festivals, while humming along to J Balvin and listening to classic Latin ballads, and they
    eagerly collect limited‑edition Pokémon cards that double as artistic collectibles.
  travel: Edgar Hernandez dreams of snorkeling along the Belize Barrier Reef after their family’s annual trip to the Gulf Coast and hopes to explore the historic Alamo in San Antonio, preferring spontaneous
    road trips over meticulously planned itineraries, though a tight allowance sometimes limits the distance they can travel.
  culinary: Edgar Hernandez loves fish tacos with fresh lime and cabbage slaw, can whip up a simple avocado‑lime guacamole after watching cooking videos, yet their cooking experiments often end in a messy
    kitchen and a tendency to over‑salt the salsa.
  core: Edgar Hernandez is a curiously competitive 9‑year‑old who balances marine‑life fascination with LEGO engineering, yet their anxiety spikes during crowded events and a habit of forgetting chores
    keeps them perpetually juggling excitement and distress.
background:
  cultural: Edgar comes from a Mexican‑American family in Corpus Christi, Texas. Spanish is spoken at home, and he celebrates traditions such as Día de los Muertos, Mexican Independence Day, and local festivals
    that blend Texan and Latino customs. Family meals often feature fish tacos and other Gulf‑inspired dishes, reflecting the coastal environment that also fuels his interest in marine life. The close‑knit
    community and bilingual upbringing give him a strong sense of cultural identity while encouraging curiosity about the world beyond his neighborhood.
attributes:
  skills: '[''Fluent bilingual communication (English–Spanish)'', ''Reading comprehension (grade‑4 level)'', ''LEGO construction and spatial reasoning'', ''Basic coding with Scratch'', ''Sketching and comic
    illustration'', ''Observational skills in marine biology'', ''Practical problem solving (repairs, organizing)'', ''Pattern recognition in puzzles'']'
  hobbies: '[''Exploring tide pools and marine life'', ''LEGO building and engineering challenges'', ''Playing soccer with neighborhood friends'', ''Creating Scratch games'', ''Sketching comics and doodles'',
    ''Reading adventure and sci‑fi books'', ''Listening to Spanish music and family storytelling'', ''Competing in video games (e.g., Mario Kart)'']'
  career_goals: Edgar dreams of exploring the Gulf of Mexico’s ecosystems and eventually working as a marine scientist who can protect local wildlife. He also imagines designing interactive video games
    that teach players about the ocean. His competitive streak drives him to excel in school science fairs, and he hopes his future career will combine the excitement of discovery with a stable, respected
    role that lets him contribute to his community.
