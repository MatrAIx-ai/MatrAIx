personas:
  professional: Mireya Gutierrez, a data‑analysis specialist with a STEM bachelor’s degree, leverages Python, R, and SQL to craft precise visualizations and statistical models for healthcare research, applying
    her disciplined project‑management style, competitive drive, and healthy skepticism toward unproven methods to meet rigorous deadlines.
  sports: Mireya Gutierrez, a regular at the community center’s yoga classes and a weekend member of the Bergenfield running club, follows the New York Knicks and New York Yankees, and balances her competitive
    spirit with a disciplined fitness regimen that mixes weekly cardio intervals, chess‑style mental drills, and occasional recreational soccer matches.
  arts: Mireya Gutierrez, who spends evenings immersed in salsa rhythms by Marc Anthony and Celia Cruz, curates a modest collection of Frida Kahlo prints, and binge‑watches Guillermo del Toro’s films, finds
    that these artistic experiences sharpen her analytical mind and provide a creative outlet for her competitive energy.
  travel: Mireya Gutierrez, an avid planner who prefers meticulously scheduled itineraries, has explored San Juan, Puerto Rico and Barcelona on short study‑trip breaks, and now aspires to hike the Inca
    Trail to Machu Picchu, balancing her love for cultural immersion with a tight student‑budget.
  culinary: Mireya Gutierrez, a confident home cook who perfects arroz con gandules with sofrito, garlic, and recao and masters mofongo using crispy plantains and chicharrón, often experiments with the
    balance of spices while occasionally ordering sushi for a break from the kitchen.
  core: Mireya Gutierrez combines a fiercely competitive, hyper‑organized mindset with a chronic worry habit, channeling stress into chess victories, data visualizations, and nightly salsa sessions.
background:
  cultural: Mireya grew up in a bilingual Puerto Rican household in Bergenfield, New Jersey, where Spanish and English were spoken interchangeably. Her family emphasized values of collectivism, respect
    for elders, and pride in Puerto Rican heritage, celebrating traditions such as Noche de San Juan and maintaining strong ties to the island’s music, dance, and cuisine. The close‑knit diaspora community
    in Bergen County provides her with a supportive network, shaping her commitment to community outreach and mentorship. This cultural grounding informs her pragmatic approach to education and career,
    as well as her desire to elevate other Latino youths in STEM fields.
