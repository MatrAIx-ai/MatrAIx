  career_goals: Mireya aims to secure an entry‑level data analyst or research associate position within a healthcare or environmental organization where she can apply her analytical expertise to real‑world
    problems. Over the next three to five years she plans to pursue a Master’s in Data Science, develop interdisciplinary projects that integrate AI insights with practical interventions, and eventually
    move into a senior analytics or team‑lead role. A core ambition is to create mentorship programs for underrepresented Latino youth in STEM, combining her competitive drive with a desire to give back
    to her community while maintaining a stable, supportive work environment that helps mitigate her stress‑prone disposition.
