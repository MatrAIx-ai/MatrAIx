  hobbies: '[''Gardening'', ''Yoga and mindfulness'', ''Reading historical fiction'', ''Reading medical nonfiction'', ''Baking artisan breads'', ''Puzzle solving (crosswords, sudoku)'', ''Volunteering at
    community health fairs'']'
  career_goals: Joyce aims to move into a nurse manager or clinical educator role within the next three to five years, focusing on staff retention and patient outcomes. She plans to pursue a Master of Science
    in Nursing with a concentration in nursing informatics to integrate her data‑driven mindset with clinical practice. She also seeks certification as a Certified Nurse Educator, lead quality‑improvement
    projects, and mentor new nurses at her community hospital. Ultimately, she hopes to shape policies that reduce workplace stress and enhance predictability, aligning with her preference for structured,
    supportive environments.
