  career_goals: David aims to position his company as a benchmark for sustainable growth and innovation in the Bay Area and beyond. He is focused on expanding market share through digital transformation,
    forging strategic alliances with cultural institutions, and embedding environmentally responsible practices. Over the next five years, he aspires to secure a spot on the board of a major museum or arts
    organization, mentor emerging leaders within his firm, and establish a charitable foundation that supports arts education in underserved Sacramento neighborhoods. He also seeks to refine his work‑life
    balance to better manage his tendency toward stress and worry.
