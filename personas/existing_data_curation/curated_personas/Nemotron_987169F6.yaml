  hobbies: '[''Contemporary Art Collecting'', ''Wine Tasting'', ''Tennis'', ''Hiking'', ''Traveling'', ''Jazz Music'', ''Reading (Philosophy & Business)'', ''Improv Comedy'', ''Mindfulness Meditation'',
