  career_goals: Lakera envisions a future where she can combine her love for animals and science with her competitive spirit. She aspires to become a veterinarian, motivated by the practical way the profession
    helps communities and offers clear steps for achievement. She also dreams of working with technology—perhaps developing educational games that teach scientific concepts—so she plans to pursue advanced
    STEM courses in high school and seek mentorship in both biology and computer science. Although she sometimes worries about the difficulty of such paths, her determination and structured study habits
    keep her focused on achieving those goals.
