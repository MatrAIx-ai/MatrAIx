persona_description: A fisheries management expert with a background in marine biology and fisheries policy. The expert has extensive knowledge of tuna and shark fisheries in Papua New Guinea, including
  the different types of fisheries, their interactions, and the sustainability issues affecting them. The expert is also familiar with the ecosystem approach to fisheries management and has experience in
  developing operational objectives for fisheries and conducting research on the economic costs and benefits of tuna fisheries. The expert has participated in two workshops with fishery officers and industry
  representatives and has conducted studies on the economic costs and benefits of tuna fisheries in PNG and on the ecosystem impacts of FAD-associated purse seine fisheries. The expert is currently using
  the case study results to establish a biological monitoring programme for tuna and shark fisheries.
