    and baking family recipes'']'
  career_goals: Even in retirement Lois remains eager to grow and give back. She plans to deepen her artistic practice by enrolling in advanced watercolor workshops and learning digital photography to capture
    the North Dakota landscape. Lois hopes to compile a memoir that weaves together her family's experiences through the region's agricultural and oil-boom eras, preserving these stories for future generations.
    She aspires to mentor younger members of the senior center in quilting and storytelling, fostering inter-generational connections. Additionally, Lois wants to lead a community heritage project that
    creates a small exhibition of local history at the town library. On a personal level, she dreams of traveling to a few Midwest art museums and, together with her husband, taking a short cruise to celebrate
    their 50-year marriage.
