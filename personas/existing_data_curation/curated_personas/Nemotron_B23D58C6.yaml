personas:
  professional: Lois Walls, a retired rural North Dakota homemaker turned community storyteller and arts facilitator, blends her practical DIY know‑how with a natural flair for organizing senior‑center
    workshops, watercolor classes, and local heritage projects, using a tablet to share stories and mentor younger volunteers.
  sports: Lois Walls enjoys cheering on the Minnesota Vikings and the North Dakota State Bison on football Saturdays, participates in the senior‑center’s weekly walking club that explores prairie trails
    in summer, and joins a local bridge league that doubles as a mental‑sharpness exercise, while occasionally attending community ice‑skating sessions in winter.
  arts: Lois Walls channels her love of folk music—from Bob Dylan to Emmylou Harris—into soulful choir performances, while her watercolor landscapes echo the subtle tones of Georgia O’Keeffe’s prairie scenes,
    and she contributes to community theater productions, often citing the works of playwright Lanford Wilson as inspiration.
  travel: Lois Walls prefers spontaneous short road trips to regional art fairs and museums—such as the Minneapolis Institute of Art, the Art Institute of Chicago, and the National Cowboy & Western Heritage
    Museum—while dreaming of a celebratory cruise on the Great Lakes with her husband, balancing her modest travel fund with the occasional splurge for a memorable family gathering.
  culinary: Lois Walls, an enthusiastic home cook, whips up hearty chicken and dumpling stew seasoned with garden rosemary, bakes classic apple‑cinnamon pie and rhubarb crisp using fresh berries from her
    wildflower patch, and delights relatives by experimenting with global dishes like Korean bibimbap, always ensuring a generous side of buttered corn rolls.
  core: Lois Walls, a curious and sociable 73‑year‑old prairie artist, balances her disorganized habit of misplacing garden tools with a relentless drive to mentor seniors, paint sunsets, and plan spontaneous
    trips, all while humming folk tunes in the church choir.
background:
  cultural: Lois comes from a multi-generational white, Northern-European (primarily German and Scandinavian) heritage that has deep roots in the Great Plains. She grew up on a family farm near Watford
    City, where self-reliance, hard work, and a close-knit community ethos were central to daily life. The Lutheran church played a pivotal role in her upbringing, instilling values of service, fellowship,
    and modesty. Over the decades she witnessed the region's shift from pure agriculture to a boom in oil production, broadening her perspective and sparking her curiosity about new ideas and unconventional
    paths. Her cultural identity blends prairie pragmatism with an appreciation for the arts and storytelling, reflecting both traditional values and an openness to varied experiences.
