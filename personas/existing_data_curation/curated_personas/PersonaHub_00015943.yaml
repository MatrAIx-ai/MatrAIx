persona_description: A radiologist who specializes in the use of magnetic resonance imaging (MRI) to study the structure and function of the brain, particularly in relation to vascular disease. They are
  interested in evaluating the relationship between aortic arch pulse wave velocity and subsequent cerebral microvascular disease, and are seeking to identify other cardiovascular risk factors that may
  contribute to the development of cerebrovascular disease. They are also interested in studying the relationship between aortic arch pulse wave velocity and other demographic and cardiovascular risk factors,
  and in estimating the impact of aortic arch pulse wave velocity on white matter hyperintensity volume.
