  career_goals: Elaine aims to transition into a senior technical leadership role where she can shape the strategic direction of sustainable mobility solutions. Over the next five years she plans to become
    a Principal Engineer or Engineering Manager, guiding interdisciplinary teams in developing autonomous vehicle safety platforms and low‑carbon powertrains. She also aspires to champion diversity in engineering
    by expanding mentorship programs for women and underrepresented groups at her company and in the Ann Arbor community. Long‑term, she envisions launching a spin‑off venture that commercializes an eco‑friendly
    battery‑cooling technology, balancing her desire for impactful innovation with flexible work‑life integration.
