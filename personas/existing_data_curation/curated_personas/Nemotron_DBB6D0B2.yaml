personas:
  professional: Elaine Burns is a mechanical and systems engineer who leverages finite‑element analysis, CAD modeling, and Python‑driven data pipelines to deliver sustainable mobility solutions, while also
    thriving as a charismatic cross‑functional facilitator who translates technical jargon into actionable plans for interdisciplinary teams, despite a occasionally disorganized schedule that they balance
    with curiosity‑driven continuous learning.
  sports: Elaine Burns plays co‑ed recreational volleyball on Thursday nights, hikes the Washtenaw County trail network each weekend, follows the Michigan Wolverines football and Detroit Red Wings hockey
    teams, and occasionally volunteers as a coach for a local youth soccer league, reflecting an energetic, socially‑driven approach to fitness.
  arts: Elaine Burns frequently visits Ann Arbor’s intimate music venues to catch indie acts such as The Woodshots and the local jazz trio The Velvet Orchestra, immerses themselves in science‑fiction novels
    by authors like Ann Leckie and N.K. Jemisin, and participates in the annual Ann Arbor Art Fair, letting these creative sparks fuel both their engineering innovation and themed dinner party menus.
  travel: Elaine Burns enjoys planning spontaneous weekend road trips to Michigan’s Upper Peninsula and returning from immersive travel abroad in Iceland and Kyoto, balancing a love for outdoor adventure
    with the need to budget for family‑friendly getaways and often combining group hikes with themed culinary experiences, while they keep a growing wish list that includes Patagonia’s Torres del Paine
    and New Zealand’s South Island.
  culinary: Elaine Burns hosts themed dinner parties that showcase sustainable cuisine, often preparing mushroom risotto, vegan lentil tacos, and homemade kombucha using fresh produce from their community
    garden, and while their cooking skill is solidly intermediate, they sometimes over‑season dishes in the excitement of entertaining a lively crowd.
  core: Elaine Burns is a curiosity‑driven, socially energized engineer who blends practical sustainability work with group activities, creative cooking, and a delightfully disorganized yet compassionate
    approach to life.
background:
  cultural: Elaine grew up in a middle‑class Midwestern suburb with roots in northern‑European ancestry, and she now lives in Ann Arbor, a vibrant college town that blends engineering heritage with progressive
    cultural life. Her upbringing emphasized practicality, teamwork, and a strong work ethic, while her adult life in Michigan’s academic hub has exposed her to a diverse community of students, researchers,
    and artists. She values the region’s legacy in automotive manufacturing and its growing focus on sustainability, and she actively participates in local events that celebrate both the historic and the
    evolving cultural landscape.
