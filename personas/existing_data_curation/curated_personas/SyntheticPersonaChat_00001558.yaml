data:
  user 1 personas: 'I am in 3rd grade.

    I don t have too many friends in the us yet , but i am going to summer camp and i hope to make friends then ! i also think that i may make friends as soccer in the fall.

    I live with my parents and my little brother.

    I like to play soccer , draw and read asterix.'
  user 2 personas: 'I am a business man.

    I love to sing.

    My wife has terminal cancer.

    I have 3 children.

    I am a karate black belt.'
  Best Generated Conversation: 'User 1: Hi! My name is [user 1 name].

    User 2: Nice to meet you, [user 1 name]. My name is [user 2 name].

    User 1: What do you do for a living?

    User 2: I''m a business man.

    User 1: That sounds interesting. What kind of business do you own?

    User 2: I own a chain of karate schools.

    User 1: Oh, that''s cool! I''ve always wanted to learn karate.

    User 2: You should! It''s a great way to get in shape and learn self-defense.

    User 1: I know, right? I''ve been thinking about it for a while.

    User 2: If you ever decide to take a class, let me know. I''ll give you a free trial lesson.

    User 1: Thanks, I appreciate that!

    User 2: No problem! So, what else do you like to do for fun?

    User 1: I like to play soccer, draw, and read Asterix.

    User 2: Oh, I love soccer! I used to play in high school.

    User 1: That''s cool! I''ve been playing since I was 5 years old.

    User 2: I''m impressed! You must be really good.

    User 1: I''m not too bad. I''ve been on my school''s soccer team since I was in 6th grade.

    User 2: That''s awesome! I wish I could still play, but my knees are too old.

    User 1: I''m sorry to hear that.

    User 2: It''s okay. I still get to watch my kids play.

    User 1: That''s good! I''m sure they''re really good.

    User 2: They''re not bad. They''re both on the varsity team at their school.

    User 1: That''s awesome! I''m sure they''re really proud of you.

    User 2: They are. They know how much I love soccer.

    User 1: I''m glad to hear that.

    User 2: So, what else do you like to draw?

    User 1: I like to draw all kinds of things, but I mostly draw people.

    User 2: Oh, that''s cool! I can''t draw a stick figure.

    User 1: I''ve been drawing since I was a little kid.

    User 2: I wish I had that kind of talent.

    User 1: It''s not really talent. It''s just practice.

    User 2: I guess I need to practice more.

    User 1: It never hurts to practice!

    User 2: I know! So, what are you reading these days?

    User 1: I''m reading the Asterix series.

    User 2: Oh, I''ve heard of those. They''re really popular.

    User 1: They are! I''m really enjoying them.

    User 2: I''m glad to hear that.

    User 1: So, what''s your favorite book?

    User 2: I don''t really have a favorite book. I like a lot of different books.

    User 1: That''s fair. I like a lot of different books too.

    User 2: So, what are you doing this summer?

    User 1: I''m going to summer camp and I''m also playing soccer in the fall.

    User 2: Oh, that sounds fun! I wish I could still go to summer camp.

    User 1: I know, right? It''s so much fun.

    User 2: So, what are you looking forward to most in the fall?

    User 1: I''m looking forward to playing soccer. I''m also looking forward to making new friends at school.

    User 2: I''m sure you''re going to have a great time!'
