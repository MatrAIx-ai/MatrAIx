  hobbies: '[''Watercolor Painting'', ''Visiting Art Museums'', ''Gardening'', ''Reading Historical Fiction'', ''Playing Bridge'', ''Birdwatching'', ''Genealogy Research'', ''Attending Farmers Markets'',
    ''Weekend Lake Trips'', ''Community Book Clubs'']'
  career_goals: Although retired, Heidi aims to continue contributing to her community by expanding intergenerational educational programs at the local library and senior center, fostering connections between
    students and older adults through shared art projects and storytelling. She hopes to mentor new volunteers, develop a legacy oral history archive documenting Madison’s cultural evolution, and collaborate
    with the Madison Museum of Contemporary Art to curate accessible exhibitions for seniors. Long‑term, she aspires to author a memoir reflecting on her teaching career and the transformative power of
    lifelong learning.
