  development and implementation of strategies for controlling these weeds, and may have expertise in the use of herbicides and other management practices. This person is likely to be knowledgeable about
  the cultural and economic impacts of these weeds in Arizona, and may have experience in communicating this information to policymakers and stakeholders.
