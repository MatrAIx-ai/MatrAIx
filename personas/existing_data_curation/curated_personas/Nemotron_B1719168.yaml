  career_goals: Approaching retirement, Roosevelt aims to transition into a mentorship and consulting role within the retail sector, leveraging his extensive supervisory experience to guide emerging managers.
    He plans to obtain a retail leadership certification such as the Certified Retail Operations Professional and to be recognized as a top‑performing lead for his store’s consistent achievement of sales
    targets and employee retention rates. Long‑term, he envisions opening a small boutique that showcases local artisans while creating a youth apprenticeship program to teach job‑readiness and retail skills.
    He also hopes to serve on the West Haven Chamber of Commerce board and participate in initiatives that support economic development and entrepreneurship in the Black community.
