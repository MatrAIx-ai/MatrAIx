  Best Generated Conversation: 'User 1: Hi, my name is Sarah and I work in TV. What about you?

    User 2: Hello! I''m Sarah too, and I''m a yoga instructor. It''s nice to meet you!

    User 1: It''s nice to meet you too! What do you like about yoga?

