personas:
  professional: Randy Coar is a disciplined, self‑directed UI/UX design student who channels their strong analytical skills in Python, Photoshop, and Figma into data‑driven interface prototypes, while their
    solitary and competitive nature drives them to relentlessly self‑critique and pursue perfection in every project.
  sports: Randy Coar prefers solo fitness routines, such as early‑morning runs along the Three Rivers Heritage Trail and weekly climbing sessions at Steel City Climbing Gym, and they quietly root for the
    Pittsburgh Steelers in the fall and the Pittsburgh Penguins during the hockey season.
  arts: Randy Coar curates immersive playlists featuring Brian Eno’s ambient textures, Flying Lotus’s experimental beats, and Miles Davis’s modal jazz, while their sketchbook frequently references the bold
    compositions of Kehinde Wiley and Kerry James Marshall, and they regularly publish reflective blog essays exploring how digital tools can reinterpret these contemporary visual languages.
  travel: Randy Coar plans low‑cost solo trips with meticulous itineraries, has already visited New York’s MoMA and Berlin’s Kreuzberg art district, and dreams of a future immersive stay in Kyoto to study
    traditional crafts, all while balancing travel expenses against their freelance studio budget.
  culinary: Randy Coar enjoys a minimalist palate that favors homemade ramen with miso broth, avocado toast sprinkled with turmeric, and occasional vegan jackfruit tacos, cooking with a modest skill set
    centered on batch‑prepping and experimenting with spice blends, while they often opt for quiet cafés where ambient music plays in the background.
  core: Randy Coar is a hyper‑organized, introverted creator who merges art and analytics, obsessively tracks every detail, yet they occasionally binge‑watch Netflix series late into the night, breaking
    their strict schedule.
background:
  cultural: Randy is an African‑American raised in the Homewood neighborhood of Pittsburgh. His family emphasizes education, self‑reliance, and a deep appreciation for Black cultural heritage, including
    church gospel music, hip‑hop, and the city's rich history of jazz and visual arts. He grew up attending community festivals such as the Pittsburgh Black Film Festival and visiting the Carnegie Museum
    of Art, where exposure to African‑American painters sparked his interest in visual storytelling. While he navigates predominantly white academic and tech spaces, he draws inspiration from the resilience
    of the local Black community and incorporates subtle African motifs into his digital artwork, reflecting a blend of contemporary design and cultural identity.
attributes:
  skills: '["Digital illustration", "Graphic design", "UI/UX prototyping", "Python programming", "Data analysis", "Advanced Excel", "Research methodology", "Critical analysis", "Project planning", "Self‑directed
    learning", "Academic writing", "Audio mixing"]'
  hobbies: '["Painting", "Digital illustration", "Reading philosophy", "Listening to experimental music", "Solo puzzle video gaming", "Creative coding", "Blog writing", "Audio mixing"]'
  career_goals: Randy aims to complete his undergraduate degree—either a BFA in Graphic Design or a BS in Computer Science—within the next two years. He aspires to secure a junior UI/UX designer role at
    a tech‑focused firm in the Pittsburgh area, where he can blend his artistic sensibility with data‑driven design. Simultaneously, he plans to launch a freelance digital art studio that offers prints,
    custom illustrations, and design services, eventually scaling it into a boutique brand recognized for integrating African‑American cultural motifs with modern digital aesthetics. Long‑term, Randy hopes
    to develop a user‑centric app that helps independent creators manage portfolios and analytics, positioning himself as a thought‑leader at the intersection of art, technology, and entrepreneurship.
