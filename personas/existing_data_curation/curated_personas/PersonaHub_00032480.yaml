persona_description: A scientist or environmentalist who is closely monitoring and tracking the spread of desert locusts in Africa. They are particularly interested in the impact of the outbreak on crop
  yields and the effectiveness of the measures being taken to control the locusts. They are also interested in the long-term effects of the outbreak on the ecosystem and the potential for future locust
  outbreaks. They rely on satellite imagery and data from the Food and Agriculture Organization of the United Nations to stay updated on the situation.
