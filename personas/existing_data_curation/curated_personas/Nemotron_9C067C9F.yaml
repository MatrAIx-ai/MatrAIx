personas:
  professional: Iraida Valenzuela, an aspiring digital artist and junior game developer, blends bright, festival‑inspired palettes with Scratch coding to craft whimsical Minecraft‑themed mini‑games, showcasing
    a curious mind that balances careful planning with spontaneous creativity, and they often share their creations with classmates.
  sports: Iraida Valenzuela, a member of the Waskom Youth Soccer Club, follows the Dallas Cowboys and the Houston Astros with enthusiasm, practices soccer after school, enjoys weekend hikes in Big Bend
    National Park, and balances competitive spirit with a habit of doodling game strategies during cooldowns, and they often sketch future plays in a notebook.
  arts: Iraida Valenzuela, a passionate sketcher and digital painter, draws inspiration from vibrant cumbia rhythms, studies Frida Kahlo’s bold colors, playlists Shakira and J Balvin while creating, and
    volunteers at community cultural fairs where they showcase mixed‑media pieces celebrating local folklore.
  travel: Iraida Valenzuela, an inquisitive traveler, loves planning family trips to the historic streets of Cartagena and the art‑filled neighborhoods of Austin, collects leaf‑pressed postcards from each
    destination, balances excitement for adventure with a protective budget that prioritizes school supplies, and they keep a travel journal filled with sketches.
  culinary: Iraida Valenzuela, an enthusiastic kitchen helper, loves shaping dough for arepas and folding empanadas stuffed with seasoned cheese and plantains, experiments with avocado‑lime salsa, and they
    love to taste new toppings while occasionally sneaking extra chocolate chips into the batter.
  core: Iraida Valenzuela, a bright‑eyed 11‑year‑old who merges festival colors into digital games, saves pennies for art supplies, battles occasional pollen sneezes, scores goals on the soccer field, and
    never misses a cumbia beat—though they sometimes forget to clean their sketch desk.
background:
  cultural: Iraida's cultural background is rooted in Colombian heritage while growing up in Waskom, Texas. Her family preserves Colombian customs such as celebrating Carnaval, preparing traditional meals
    like arepas and empanadas, and speaking Spanish at home. She is raised bilingually, which shapes her communication style and appreciation for both Colombian and American cultural expressions. Catholic
    traditions, frequent family gatherings, and storytelling about Colombia's geography, folklore, and music are integral to her upbringing. The blend of Colombian warmth and the close-knit community values
    of rural Texas fosters her respect for diversity, love of music and dance, and desire to share her culture with peers.
