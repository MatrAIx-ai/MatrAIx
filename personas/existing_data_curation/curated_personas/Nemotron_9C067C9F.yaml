    cultural events'']'
  career_goals: Iraida dreams of turning her love for art and storytelling into a career that bridges cultures. She envisions becoming a children's book illustrator and author, creating vibrant stories
    that celebrate Colombian heritage and the natural world of Texas. She also hopes to study environmental science and use her artistic talents to raise awareness about wildlife conservation in both countries.
    In the short term, she aims to build a portfolio of digital illustrations, improve her coding skills to develop interactive story apps, and participate in local art competitions and community service
    projects that promote bilingual education.
