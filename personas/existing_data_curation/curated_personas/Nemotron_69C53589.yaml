  career_goals: Olga aims to become a senior manager or partner at a regional CPA firm where she can champion innovative accounting practices that blend rigorous analysis with creative reporting. She plans
    to earn her CPA designation within the next year and then pursue an executive MBA focused on business analytics. Her long‑term ambition is to lead a transformation initiative that integrates sustainable
    reporting and data‑driven decision‑making across the firm, while also establishing a mentorship program that supports the mental‑health and work‑life balance of junior accountants. Ultimately, she envisions
    launching her own boutique consultancy that offers creative financial storytelling services to nonprofit and artistic organizations.
