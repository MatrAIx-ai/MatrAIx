  career_goals: Though retired, Geana’s personal ambition is to keep learning and giving back to Catawissa. She plans to complete an online course on local history documentation so she can contribute a
    chapter to the town’s centennial book. She aims to master digital storytelling to create short video memoirs for her grandchildren. Geana also hopes to expand the senior‑center garden into an intergenerational
    learning space where younger students can learn sustainable planting. Finally, she wants to continue leading the annual Fall Fest fundraiser, ensuring the tradition remains vibrant and inclusive.
