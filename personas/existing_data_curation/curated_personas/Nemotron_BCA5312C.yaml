  hobbies: '[''Digital illustration'', ''Concept art'', ''Speculative fiction reading'', ''Creative writing'', ''Model kit building'', ''Mechanical puzzles'', ''Board games with small groups'', ''Local
    art gallery visits'', ''Urban photography'', ''Open‑mic nights'']'
  career_goals: Wilson aims to progress within the metal‑processing industry, targeting roles such as senior furnace supervisor, shift manager, and eventually plant manager. He plans to earn certifications
    like OSHA 30‑hour, Certified Maintenance & Reliability Technician, and pursue an associate degree in industrial technology to strengthen his technical leadership. Parallel to his industrial trajectory,
    Wilson aspires to develop a freelance digital illustration portfolio that blends his technical knowledge with visual storytelling, eventually creating a niche where process optimization meets creative
    design. Long‑term, he envisions leading a multidisciplinary team that drives sustainable manufacturing innovations while maintaining an active artistic practice.
