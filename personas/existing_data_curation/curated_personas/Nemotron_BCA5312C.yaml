personas:
  professional: Wilson Pitre works as a furnace and kiln tender at a Detroit metal-processing plant, where their methodical attention to heat-treatment cycles, safety protocols, and basic PLC programming
    blends with an imaginative mindset that constantly sketches process optimizations on a digital tablet.
  sports: Wilson Pitre enjoys occasional pick-up basketball at the community center, follows the Detroit Red Wings fervently—buying season tickets for the playoffs—while also cycling on weekend rides through
    the eastern suburbs and rarely participates in organized sports beyond these low-key activities.
  arts: Wilson Pitre channels a love for speculative fiction by devouring Philip K. Dick and Ted Chiang, creates digital illustrations that echo the moody aesthetics of H.R. Giger and the synth-driven soundtracks
    of Vangelis, and regularly visits the Heidelberg Project and the Museum of Contemporary Art Detroit for fresh visual inspiration.
  travel: Wilson Pitre prefers low-cost, self-planned road trips that blend artistic scouting with solitude, having explored the Upper Peninsula's dramatic shoreline, taken a weekend art-focused getaway
    to Chicago's Museum Campus, and dreaming of a future solo trip to Tokyo's Akihabara to study cyber-punk visual culture.
  culinary: Wilson Pitre enjoys cooking minimalist, tech-themed meals such as miso-glazed salmon with smoked paprika and quinoa, frequently indulges in Detroit-style pizza topped with pepperoni and pickled
    jalapeños, and keeps a well-stocked pantry of soy sauce, sriracha, and artisanal coffee beans for late-night sketching sessions.
  core: Wilson Pitre is a methodical furnace operator who fuses industrial precision with sci-fi imagination, balancing disciplined budgeting with occasional art-splurges, and habitually sketches process
    upgrades on napkins while humming Vangelis.
background:
  cultural: Wilson grew up in Detroit, Michigan, within a working‑class neighborhood shaped by the city’s automotive and manufacturing legacy. His family background reflects the European ancestry common
    to the region—such as German, Irish, and Polish roots—and his upbringing emphasizes Midwestern values of hard work, reliability, and modesty. The multicultural fabric of Detroit exposed him to diverse
    musical traditions, notably Motown, and a vibrant street‑art scene, fostering an appreciation for both industrial heritage and contemporary creativity. While he aligns with the practical, community‑oriented
    culture of the local labor force, Wilson also embraces the independent, artistic spirit nurtured by the city’s evolving arts community.
