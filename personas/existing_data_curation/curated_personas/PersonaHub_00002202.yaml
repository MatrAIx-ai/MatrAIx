persona_description: A researcher or scientist who specializes in the field of epidemiology and disease modeling, with a focus on African swine fever (ASF) and its potential spread in Europe. They are interested
  in developing and applying advanced modeling techniques to predict and prepare for the spread of exotic diseases, particularly those affecting livestock. They have experience in collaborating with international
  partners, including those from Denmark, Poland, Germany, and France, and have a strong background in epidemiological modeling, data analysis, and scientific writing. They are open to adapting and modifying
  the DTU DADS model to meet the specific needs of their project, and are willing to share their knowledge and expertise with other researchers and scientists.
