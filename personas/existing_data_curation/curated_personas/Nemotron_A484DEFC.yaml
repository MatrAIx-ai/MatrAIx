  career_goals: Tommy aims to pursue a technical education path that leads to a career in mechanical engineering or robotics. He plans to enroll in a regional technical high school where he can deepen his
    knowledge of engineering principles, CAD design, and mechatronics. After earning his diploma, he intends to study engineering at a university, focusing on sustainable technology and renewable energy
    systems. His long‑term ambition is to become a lead engineer on projects that design efficient, eco‑friendly machines—perhaps in the aerospace or clean‑energy sectors—where he can apply his disciplined
    approach and curiosity to solve complex real‑world problems.
