personas:
  professional: Luis Castillo, an aspiring architect who devotes hours to constructing detailed LEGO sets, channels their organized, methodical mindset into school science projects and, when unexpected
    changes arise, they experience brief spikes of anxiety.
  sports: Luis Castillo plays midfield for the Carlsbad Knights youth soccer team, thrives on clear positional roles and teamwork, follows the LA Galaxy for inspiration, and they balance weekend matches
    with structured practice drills while their competitive spirit sometimes leads to frustration when games deviate from the plan.
  arts: Luis Castillo devotes spare time to reading adventure series like Percy Jackson and mystery novels such as The Mysterious Benedict Society, listens to ranchera legends like Vicente Fernández while
    sketching desert vistas inspired by Ansel Adams, and they build LEGO models that double as creative storytelling sets, all of which satisfy their love for structured imagination.
  travel: Luis Castillo enjoys weekend expeditions to the nearby Carlsbad Caverns, dreams of hiking the Grand Canyon and exploring the volcanic landscapes of Iceland, prefers itineraries that are carefully
    mapped out with family‑friendly lodging and plenty of downtime, and they sometimes feel anxious about unfamiliar places, relying on detailed guides and familiar photo albums to feel secure.
  culinary: Luis Castillo loves helping their mother prepare tacos with corn tortillas, seasoned pork, fresh cilantro, lime, and also rolling tamales filled with chicken and chilies, meticulously measures
    each ingredient, enjoys the aroma of cumin and smoked paprika, and they often experiment by adding a pinch of cheese to the taco filling while mastering the art of cooking with structure.
  core: Luis Castillo is a detail‑driven 11‑year‑old who melds LEGO engineering, soccer teamwork, and family culinary traditions into a structured daily rhythm, and they battle intense anxiety that surfaces
    in unplanned moments.
background:
  cultural: Luis lives in a bilingual Mexican-American household in Carlsbad, NM. At home he speaks Spanish with his parents and grandparents, while school and the broader community use English. His family
    celebrates Mexican holidays such as Día de los Muertos, Mexican Independence Day, and Cinco de Mayo with traditional foods, music, and altar making, strengthening his sense of cultural identity. He
    also participates in local New Mexico traditions like desert hikes and community festivals, blending Mexican heritage with the Southwest’s desert culture. Respect for family, community harmony, and
    Catholic customs are central to his upbringing, influencing his cooperative nature and desire to contribute positively to his surroundings.
