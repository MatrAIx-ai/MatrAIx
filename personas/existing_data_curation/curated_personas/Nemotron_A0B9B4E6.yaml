  career_goals: Luis dreams of a career that combines his love of order, helping others, and building things. He is fascinated by the idea of becoming a civil engineer so he can design safe roads and community
    infrastructure for Carlsbad and beyond. He also imagines teaching math one day to share his methodical approach with younger students. In the short term, he hopes to earn good grades, join a school
    robotics club, and eventually attend a university in New Mexico to study engineering or education.
