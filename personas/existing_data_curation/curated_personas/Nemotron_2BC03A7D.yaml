  hobbies: '[''Afro‑Latin dance/Zumba classes'', ''Book club (African‑American literature)'', ''Community garden volunteering'', ''Cooking and hosting potlucks'', ''Mindfulness meditation'', ''Journaling'',
    ''Yoga'', ''Historical site tours in Virginia'', ''Nature walks in local parks'', ''Participating in church social events'']'
  career_goals: Shaquese aims to transition from full‑time caregiving to a part‑time role in community outreach or nonprofit program coordination, leveraging her organizational talents and passion for supporting
    families. She plans to enroll in a bachelor's program in Social Work or Public Administration within the next two years, while gaining certification as a peer support specialist to address mental‑health
    needs—a personal priority given her own experiences with anxiety. Long‑term, she envisions launching a small home‑based catering and wellness‑cooking business that offers healthy meals and workshops
    for busy parents in Loudoun County.
