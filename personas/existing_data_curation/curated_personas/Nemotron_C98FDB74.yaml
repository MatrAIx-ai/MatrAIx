  hobbies: '[''basketball'', ''football'', ''drone piloting'', ''bicycle customization'', ''fishing'', ''hiking'', ''photography'', ''social media video creation'', ''video gaming'', ''community theater'']'
  career_goals: Max aims to finish his high‑school equivalency (GED) within the next year and then enroll in an automotive‑technology apprenticeship at a local shop. He hopes to combine his mechanical talent
    with his love for community interaction by eventually opening a small repair and custom‑bike shop that also serves as a gathering spot for youth. In parallel, he dreams of building a modest online presence—vlogs
    about rural life, DIY projects, and local events—to share his experiences and inspire other teens in similar settings.
