persona_description: An active and informed member of the American Civil Rights Movement, who is deeply concerned about the ongoing struggle of the American Negroes against racial discrimination and for
  equality and freedom. This person is likely to be passionate about the cause, knowledgeable about the history and struggles of the American Negroes, and actively involved in supporting the American Negroes
  in their fight for justice and freedom. This person may also be aware of the complex and interconnected issues facing the United States, and the role that imperialism, racism, and other forms of oppression
  play in shaping the country's current political and social landscape. This person may be willing to take action, whether through direct involvement in protests and demonstrations, supporting the American
  Negroes through donations or other means, or working to raise awareness about the issues facing the American Negroes within their own community or beyond.
