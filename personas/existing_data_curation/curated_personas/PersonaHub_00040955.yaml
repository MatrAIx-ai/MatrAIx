persona_description: A geoscientist who specializes in the study of crustal evolution, metallogenesis, environmental and analytical geochemistry, geotechnologies applied to the study of natural resources,
  and natural resources policy and management. This person is interested in understanding the geological controls that determine the situation, location, and economic value of mineral resources, and how
  these resources can be extracted and managed sustainably. They are likely to have a strong background in geology, mineralogy, and environmental science, and may have experience working in the mineral
  and oil/gas industries, as well as in urban and territorial management.
