  hobbies: '[''Watercolor painting'', ''Pottery'', ''Sketching'', ''Reading (book club)'', ''Attending community theater'', ''Square dancing'', ''Gardening'', ''Volunteer craft workshops at senior center'',
    ''Cooking and trying new recipes'', ''Visiting art galleries in St. Louis and Carbondale'', ''Traveling to historic towns and folk festivals'', ''Amateur photography'']'
  career_goals: Tonya aims to leave a lasting legacy by establishing a sustainable community arts initiative that connects her school with local senior centers and cultural groups. She plans to mentor younger
    teachers, sharing her flexible, student‑centered teaching approaches, and to transition into a part‑time advisory role that lets her focus on curriculum development and after‑school art workshops. Additionally,
    she hopes to secure a small grant to fund an interdisciplinary arts integration program that will enrich the district’s curriculum before she retires.
