personas:
  professional: Tonya Svatek is a veteran elementary and middle‑school teacher who weaves watercolor, pottery and theater into core lessons, using storytelling and flexible project‑based learning to keep
    her classroom lively while mentoring new teachers and championing community arts partnerships.
  sports: Tonya Svatek roots for the St. Louis Cardinals, the Southern Illinois Salukis, and the local Du Quoin high‑school basketball team, joins a community walking club that meets after church services,
    and enjoys casual shuffleboard at the senior center’s recreation room.
  arts: Tonya Svatek immerses herself in the arts by painting watercolors of Midwestern prairie sunsets, attending pottery workshops at the Carbondale Art Center, visiting exhibitions of Monet and Georgia
    O’Keeffe, cheering on community theater productions like Our Town, and collecting folk recordings by Gillian Welch and Johnny Cash.
  travel: Tonya Svatek favors spontaneous road trips to historic small towns such as Galena, Illinois, and Woodstock, New York, relishes attending folk festivals like the National Folk Festival in Memphis,
    and keeps a notebook of photo ideas for future visits to European market towns, although she usually books travel last minute to stay within her modest retirement budget.
  culinary: Tonya Svatek delights in cooking pierogi stuffed with potato and cheese for potluck gatherings, perfecting her grandmother’s apple‑cinnamon strudel, experimenting with fresh basil pesto pasta,
    and often improvises rustic ratatouille in her garden‑grown vegetable patch, while occasionally misplacing labeled leftovers in the fridge.
  core: Tonya Svatek blends a lifelong love of community art, flexible teaching, and modest, habit‑driven finances into a warm, sociable life marked by garden‑inspired sketches, spontaneous road trips,
    and an occasional forgetfulness about paperwork.
background:
  cultural: Tonya was raised in Du Quoin, a close‑knit town in Perry County, Illinois, within a family of Polish‑American descent. Her grandparents emigrated from southern Poland in the early 20th century,
    and she grew up attending a parochial school and actively participating in the local Catholic parish. The values of Midwestern hospitality, community service, and modesty shaped her worldview, while
    regional folk traditions—county fairs, high‑school sports, and local music—provided a rich cultural backdrop. Her Polish roots are reflected in family celebrations of holidays such as Święto Bożego
    Narodzenia (Christmas) and the sharing of pierogi recipes, contributing to a blended cultural identity that merges traditional Polish customs with the everyday rhythms of small‑town Illinois.
attributes:
