  career_goals: Trang aims to cement her legacy as a stable, high‑performing leader in her store before transitioning to a part‑time advisory role. In the next two years she hopes to be promoted to store
    manager, a role that will allow her to shape broader operational policies and champion employee‑well‑being initiatives such as predictable scheduling and stress‑management workshops. Simultaneously,
    she plans to formalize a mentorship pipeline for entry‑level staff, passing on her systematic approach to inventory control and customer service. As retirement approaches, she envisions scaling back
    to a consulting capacity, helping nearby small retailers adopt the same disciplined processes that have kept her store profitable. Throughout, she wants to ensure a smooth handover that protects the
    store’s performance metrics and maintains the harmonious work environment she values.
