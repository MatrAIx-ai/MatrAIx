persona_description: A pediatric dentist who specializes in the treatment of dental problems in children and their families. She is passionate about promoting oral health and education, and believes in
  the importance of integrating health care, educational and school programs to improve academic performance and close the gap in dental care. She has conducted research on the link between poor oral health
  and lower grades, dental problems and school absences, and the factors that contribute to this epidemic. Her research has been published in the American Journal of Public Health.
