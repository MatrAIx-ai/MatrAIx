  hobbies: '[''Reading fantasy novels'', ''Journaling'', ''Sketching/drawing'', ''Cooking Vietnamese dishes'', ''Small book‑club participation'', ''Beginner violin lessons'', ''Nature photography'', ''Walking
    in parks'']'
  career_goals: Renalyn hopes to pursue a career in nursing or allied health, drawn by the practical, structured environment of patient care and her desire to help others. She plans to attend a community
    college after high school, earn an associate degree in nursing, and eventually work in a clinic that serves a diverse population, including the local Vietnamese community. Alongside her professional
    goals, she wants to stay connected to her heritage by volunteering as a translator or health educator for community events.
