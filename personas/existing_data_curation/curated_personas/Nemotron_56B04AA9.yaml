personas:
  professional: Colby Hall, an 11‑year‑old aspiring junior robotics engineer, channels a love for LEGO Technic and Scratch coding into designing functional prototypes for the school robotics club, thriving
    on the routine of step‑by‑step problem solving while they keep a competitive edge over peers.
  sports: Colby Hall, a member of the local youth soccer league and occasional swimmer at the community pool, follows the Seattle Seahawks and the local junior basketball team, but prefers structured solo
    workouts like weekend bike rides to stay fit while they maintain a competitive mindset.
  arts: Colby Hall, an avid piano player who enjoys practicing Chopin nocturnes and jamming to The Beatles, also binge‑watches documentaries about space and idolizes composer Hans Zimmer, letting the rhythmic
    patterns of music guide their creative coding narratives.
  travel: Colby Hall, whose family vacations have included a road trip to the Kennedy Space Center and a weekend camping adventure in the Rockies, prefers meticulously planned itineraries with clear schedules,
    yet dreams of backpacking through Japan’s robotics museums when they can save enough allowance.
  culinary: Colby Hall, who loves building and eating pizza with extra mozzarella and pepperoni, also enjoys crafting strawberry‑banana smoothies with Greek yogurt and occasionally tries simple spaghetti
    carbonara with pancetta, though they often skip vegetables when focused on a new LEGO set.
  core: Colby Hall, an 11‑year‑old tech‑savvy builder, balances a love for routine and competition with a habit of worrying over perfection, often overindulging in gadgets while neglecting rest.
background:
  cultural: Colby grows up in an affluent, predominantly white suburban community in La Cañada Flintridge, California. His family values routine, academic achievement, and practical skills, which shape
    his traditional, goal‑oriented outlook. Although largely influenced by mainstream American customs—celebrating holidays such as Thanksgiving and participating in local community events—he also benefits
    from the region’s strong emphasis on education and extracurricular STEM opportunities, reinforcing his competitive nature and focus on tangible accomplishment.
