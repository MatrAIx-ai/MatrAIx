  hobbies: '[''Abstract Painting'', ''Sketching'', ''Speculative Fiction Reading'', ''Philosophy'', ''Chess'', ''Advanced Crossword Puzzles'', ''LEGO Architecture Modeling'', ''Woodworking'', ''Electronics
    Tinkering'', ''Nature Walks'']'
  career_goals: Bong aims to advance to senior cost estimator within the next two years, positioning himself to lead a multidisciplinary estimating team for large‑scale infrastructure projects in the Detroit
    metropolitan area. He is pursuing AACE certification and plans to integrate predictive analytics and AI‑driven cost models into his workflow. Longer‑term, he envisions establishing his own consulting
    firm that specializes in sustainable construction cost strategies, mentoring emerging estimators, and influencing industry standards for cost transparency and innovation.
