personas:
  professional: Bong Mayer is a senior cost estimator in the Detroit metropolitan construction sector, combining razor‑sharp Excel modeling and BIM‑based tools like ProEst with a painter’s eye for abstract
    patterns to devise cost‑saving strategies for sustainable infrastructure, while their competitive, skeptical edge fuels rigorous risk assessment and relentless negotiation, positioning them for a team‑lead
    role within two years.
  sports: Bong Mayer follows the Detroit Lions and Red Wings avidly, participates in a local adult swimming club at Lake Erie Aquatics, and plays weekly pickup tennis on the community courts, but their
    primary athletic pursuit is leisurely strolling the shoreline, where they blend competitive mental training—solving chess puzzles during rests—with a disciplined, solitary fitness regimen.
  arts: Bong Mayer immerses themselves in the Detroit art scene by visiting the Museum of Contemporary Art Detroit to study works by Gerhard Richter and local muralist Kara Walker, while their own creative
    outlet involves sketching abstract cityscapes and painting watercolors inspired by urban decay, and they unwind with speculative fiction novels by Neal Stephenson and the minimalist compositions of
    Philip Glass.
  travel: Bong Mayer favours low‑key, contemplative travel, having spent weekend trips exploring the rugged cliffs of Pictured Rocks National Lakeshore, a solo sojourn to Kyoto’s tranquil gardens to study
    Japanese architecture, and a yearly pilgrimage to the World Fantasy Convention in Austin, always planning itineraries around quiet evenings and modest budgeting.
  culinary: Bong Mayer’s palate leans toward hearty Midwestern fare, expertly preparing lake‑trout pan‑seared with lemon‑dill butter, crafting cherry‑infused pork tenderloin, and mastering a perfect rye‑bread
    sourdough, while their kitchen skill is intermediate, supplemented by a love for fresh Michigan cherries and seasonal root vegetables for rustic stews.
  core: Bong Mayer, a 42‑year‑old cost estimator with a competitive streak and a solitary creative soul, balances meticulous spreadsheets with watercolor cityscapes, constantly wrestles with self‑doubt,
    and channels that tension into innovative, sustainable construction solutions.
background:
  cultural: Bong was raised in the suburban Detroit area of Livonia, Michigan, in a family of German‑Polish descent. The Midwestern emphasis on self‑reliance, punctuality, and community service shaped his
    work ethic and pragmatic outlook. While he identifies with the region’s automotive heritage and enjoys attending local events such as the annual German‑American Oktoberfest, his introverted nature leads
    him to favor small, close‑knit gatherings over large celebrations. He grew up attending a Lutheran church but now participates more for cultural tradition than religious practice, maintaining a moderate,
    solution‑oriented worldview.
attributes:
  skills: '[''Cost Estimation'', ''Construction Materials Knowledge'', ''Advanced Excel Modeling'', ''BIM Estimating (ProEst, Sage Estimating)'', ''Statistical Analysis'', ''Risk Assessment'', ''Data Visualization'',
