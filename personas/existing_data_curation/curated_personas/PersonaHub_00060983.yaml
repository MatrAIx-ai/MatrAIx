persona_description: A scientist who specializes in the study of planet formation and its early stages, particularly the development of protoplanetary discs and the role of water in this process. They are
  interested in the latest observations from the Spitzer Space Telescope and the implications they have for the theories of planet formation, including the core accretion model and the disc instability
  theory. They are also interested in the potential for future observations to provide new insights into the conditions required for disc instability and the early stages of planetary system formation.
