  career_goals: Michael aims to advance to a senior director or vice‑presidential role overseeing regional operations within the next five to seven years, focusing on digital transformation and sustainable
    logistics. He intends to mentor emerging managers, champion data‑centric cultures, and spearhead initiatives that align corporate growth with community and environmental stewardship, while preserving
    a healthy work‑life balance for his family.
