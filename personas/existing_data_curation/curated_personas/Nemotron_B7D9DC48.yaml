  career_goals: Although retired from full-time work, Haris aims to leverage his business expertise to mentor emerging entrepreneurs in the Bayonne area, serve on the board of a local non-profit focused
    on economic empowerment, and offer occasional consulting to family-owned businesses. He also wishes to document his family's migration story, travel to his native country to reconnect with relatives,
    and maintain an active, healthy lifestyle through regular exercise and community involvement.
