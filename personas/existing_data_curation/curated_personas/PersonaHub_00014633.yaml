  relations. They are likely to be interested in the issue of carbon space and its allocation, and may have a particular focus on the needs of developing countries in dealing with the impacts of climate
  change. They may also have a strong interest in the role of developed countries in addressing climate change and the importance of equitable carbon space allocation in achieving a stable and effective
  climate deal.
