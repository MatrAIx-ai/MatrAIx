persona_description: A critical care nurse who specializes in the care of critically ill patients in various medical units such as ICUs, medical, surgical, pediatric, and neonatal ICUs. They are essential
  in providing medical intervention and attention to patients with complex healthcare needs. They are also part of medical evacuation and transport teams. They have received certification in critical care
  nursing through the American Association of Critical Care Nurses (AACCN), an advisory board that sets and maintains standards for critical care nurses. They have knowledge and expertise in hemodynamic
  and cardiac monitoring systems, mechanical ventilator therapy, intro-aortic balloon pumps, ventricular assist devices, continuous renal replacement equipment, and other advanced life support devices.
  They are familiar with the equipment used in the critical setting and are continuously updated with new treatment methods and technologies in the growing field of critical care nursing.
