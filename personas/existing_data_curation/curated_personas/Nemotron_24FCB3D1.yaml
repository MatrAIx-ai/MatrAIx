personas:
  professional: Robert Sutton is a seasoned automotive technician whose ASE‑level mastery of engine diagnostics, hybrid systems, and workshop logistics is complemented by a creative flair for classic car
    restoration, and they leverage their conversational Spanish and assertive mentorship style to lead a diverse Miami service team while pursuing senior manager responsibilities.
  sports: Robert Sutton fuels fitness through regular sailing with the Miami Yacht Club, weekend fishing trips along the Atlantic, and seasonal attendance at Miami Heat basketball games and Miami Marlins
    baseball outings, while they also join a local senior soft‑ball league each spring.
  arts: Robert Sutton immerses in Miami’s vibrant art scene by attending Art Basel, touring street‑art installations by Shepard Fairey and local muralist Jeremy Kline, and they channel that aesthetic curiosity
    into guitar jam sessions at The Fillmore, where they riff to Jimi Hendrix and Latin jazz legends like Tito Puente.
  travel: Robert Sutton plans itineraries with the precision of a diagnostic scan, balancing weekend sailing trips to the Florida Keys and fishing in the Bahamas with longer voyages to Europe’s automotive
    museums in Stuttgart and the Amalfi Coast, yet they prioritize family time and budget constraints, opting for occasional road trips to the Blue Ridge Mountains.
  culinary: Robert Sutton enjoys cooking fresh stone‑crab claws, grilled snapper with cilantro‑lime drizzle, and classic Cuban sandwiches, and they showcase solid home‑cooking skills on their boat’s galley
    while taking pleasure in tasting artisanal espresso at Miami’s Wynwood coffee roasters.
  core: Robert Sutton, a 53‑year‑old automotive maestro who blends meticulous engine expertise with a love for art, music, and community, navigates life with disciplined curiosity, occasional over‑commitment
    to car projects, and a steady, relaxed demeanor.
background:
  cultural: Robert is a white American whose family ancestry includes Irish and German roots. He grew up in the suburban neighborhoods of South Florida, where the multicultural tapestry of Miami—especially
    its strong Latin American influence—shaped his worldview. While his upbringing emphasized a solid work ethic and practical skills typical of the region’s working‑class communities, his exposure to the
    city’s dynamic art festivals and bilingual environment fostered an appreciation for diverse cultural expressions. He identifies as a pragmatic yet open‑minded individual who values both the tradition
    of hands‑on craftsmanship and the innovative spirit of contemporary art.
attributes:
