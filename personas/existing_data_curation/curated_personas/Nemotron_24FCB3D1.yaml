  hobbies: '[''Art gallery visits'', ''Classic car restoration'', ''Playing guitar'', ''Sailing and fishing'', ''Reading about automotive technology'', ''Attending maker meet‑ups'', ''Volunteering for youth
    automotive workshops'', ''Exploring Miami’s street art'']'
  career_goals: Robert aims to obtain ASE Master Technician certification within the next year and pursue advanced training in electric‑vehicle technology. He envisions moving into a senior service manager
    role where he can mentor younger technicians while shaping workshop processes. In parallel, he is considering launching a boutique auto shop that focuses on classic car restoration and high‑performance
    modifications, merging his technical skill with his appreciation for automotive aesthetics. Long‑term, he hopes to lead community education initiatives, offering workshops on sustainable vehicle maintenance,
    and to be recognized as a thought leader in South Florida’s evolving automotive landscape.
