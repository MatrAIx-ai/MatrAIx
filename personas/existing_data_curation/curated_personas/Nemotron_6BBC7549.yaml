  hobbies: '[''Gardening'', ''Traditional cooking'', ''Knitting and crocheting'', ''Volunteering at food banks'', ''Attending church and cultural events'', ''Reading historical fiction and poetry'', ''Yoga
    and meditation'', ''Listening to Latin American folk music'']'
  career_goals: Although not currently in the paid workforce, Maria aims to deepen her impact on the Louisville community. She aspires to lead a support group for widowed seniors, offering peer counseling
    and social activities. She hopes to organize a weekly cooking class that teaches Guatemalan recipes to both the diaspora and curious locals, eventually turning it into a small home‑based catering venture
    focused on cultural cuisine. Additionally, she wants to become a liaison between the local Guatemalan community and social service agencies, ensuring that her neighbors receive the assistance they need
    while preserving their cultural heritage. Personal growth goals include continuing mindfulness and yoga practice to better manage her anxiety and emotional reactivity.
