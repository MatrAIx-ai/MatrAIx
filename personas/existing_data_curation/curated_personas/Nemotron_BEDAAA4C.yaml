  career_goals: In the next five years, Brandace aims to secure a tenure‑track position at a four‑year university, leading a curriculum revamp that integrates industry‑relevant tools with active‑learning
    strategies. She intends to publish research on STEM education, obtain external grant funding for interdisciplinary projects, and expand mentorship programs for underrepresented students. Long‑term,
    she aspires to become a tenured associate professor, head an interdisciplinary STEM outreach initiative, and eventually serve as department chair while maintaining a balanced personal life with her
    spouse.
