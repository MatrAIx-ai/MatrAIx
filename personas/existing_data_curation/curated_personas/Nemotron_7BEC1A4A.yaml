    hospitality regulations'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Folklorico dancing'', ''Community volunteering (food pantry)'', ''Hiking in the Sierra foothills'', ''Recreational soccer'', ''Yoga and mindfulness practice'',
    ''Listening to regional Mexican music'', ''Road trips to explore California'', ''Reading self-help books'', ''Attending cultural festivals'']'
  career_goals: She aspires to move from desk clerk to front office supervisor within the next two years, then pursue a bachelor's degree in hospitality management, aiming eventually to become a hotel manager
    or regional operations director. Maria also hopes to obtain a Certified Hospitality Administrator (CHA) credential and use her leadership skills to mentor new staff, especially fellow Spanish-speaking
    employees. Long-term, she dreams of opening a boutique inn that highlights Mexican cultural heritage and offers community workshops, while maintaining a healthy work-life balance to manage stress.
