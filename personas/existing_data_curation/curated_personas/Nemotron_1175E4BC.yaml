  career_goals: Yvette aims to deepen her engagement with local arts and heritage by volunteering as a docent at the Coal Township historical museum and curating a modest online archive of photographs,
    recipes, and oral histories from her community. She plans to sharpen her photography skills to create limited‑edition prints that capture everyday life in the area, with the possibility of selling them
    at craft fairs. Additionally, she hopes to mentor younger volunteers in gardening, quilting, and storytelling, ensuring that the town’s cultural memory is passed to future generations. Her overarching
    ambition is to stay active, contribute meaningfully to her community, and continue lifelong learning.
