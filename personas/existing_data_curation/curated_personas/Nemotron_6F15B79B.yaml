personas:
  professional: Liliam Eraso, a seasoned postsecondary educator, merges methodical curriculum design, data‑driven instructional technology, and a passion for bilingual, culturally responsive learning to
    become a reliable mentor and catalyst for policy change within her institution.
  sports: Liliam Eraso enjoys weekend hikes with the Franklin Mountain Hiking Club, practices yoga three times a week at a local studio, follows the El Paso Chihuahuas baseball team, and occasionally joins
    a recreational soccer league alongside El Paso Locomotive FC fans.
  arts: Liliam Eraso immerses herself in literary circles, devouring historical novels by Isabel Allende and Gabriel García Márquez, while frequently attending local art exhibitions featuring works by Frida
    Kahlo and listening to the soulful ballads of Luis Miguel.
  travel: Liliam Eraso prefers meticulously planned, low‑key trips that blend cultural immersion and personal reflection, having explored historic sites in San Miguel de Allende, the ruins of Chichén Itzá,
    the colonial streets of Antigua, Guatemala, and the vibrant street‑art scene of Austin, Texas, while dreaming of trekking the Andes near Cusco.
  culinary: Liliam Eraso, an enthusiastic home cook, skillfully prepares traditional dishes such as mole poblano with chilhuacle peppers, tamales de elote, and pozole verde, while experimenting with sous‑vide
    techniques and contemporary plating inspired by modern Mexican chefs.
  core: Liliam Eraso blends quiet curiosity with rigorous practicality, channeling a love for bilingual education, disciplined budgeting, proactive health rituals, and solitary creative pursuits into a
    life marked by methodical planning, occasional indulgent splurges, and a habit of rescuing stray ideas from the margins of her schedule.
background:
  cultural: Liliam was raised in a bicultural Mexican‑American household on the U.S.–Mexico border, giving her fluency in both Spanish and English and a deep appreciation for Mexican traditions such as
    Día de los Muertos, family-oriented celebrations, and community solidarity. Her Mexican heritage informs her teaching philosophy, emphasizing respect for cultural identity, the value of family support
    networks, and the importance of inclusive, multilingual learning environments. While she identifies with Catholic customs and regional folklore, she also navigates the dynamic cross‑border cultural
    exchange that shapes her worldview and professional focus.
attributes:
  skills: '["Curriculum design and development", "Bilingual instruction and pedagogy", "Instructional technology integration", "Assessment design and analytics", "Student advising and mentorship", "Grant
    writing and fundraising", "Project management", "Data‑driven educational research", "Conflict resolution", "Collaborative program planning"]'
  hobbies: '["Reading historical fiction", "Cooking traditional Mexican dishes", "Hiking in the Franklin Mountains", "Practicing yoga", "Participating in small cultural gatherings", "Volunteering as a tutor
    for bilingual youth", "Attending literary circles"]'
  career_goals: Liliam aims to become a department chair or program coordinator for bilingual education at her college, where she can shape policies that support Mexican‑American students. She plans to
    publish research on the effectiveness of culturally responsive teaching methods in community college settings and to secure external funding for community‑college partnership programs that bridge the
    U.S.–Mexico border. Additionally, she aspires to develop a suite of hybrid courses that blend her curiosity for emerging educational technologies with pragmatic, student‑centered design, and to mentor
    junior faculty in evidence‑based teaching practices.
