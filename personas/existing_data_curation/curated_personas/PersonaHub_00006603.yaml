persona_description: A researcher and educator in the field of substance abuse prevention, particularly in the context of college campuses. With expertise in the social norms approach to substance abuse
  prevention, Perkins has conducted research and developed campaigns to reduce alcohol and drug abuse among students. He has received national awards for his work and is a graduate of Purdue University
  and Yale University. He is currently the director of the Alcohol Education Project at Hobart and William Smith Colleges and is conducting a social norms project to reduce alcohol abuse among young Airmen
  at selected bases in the U.S. and abroad.
