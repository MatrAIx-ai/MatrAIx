  hobbies: '[''Painting (acrylic, watercolor)'', ''Digital illustration'', ''Reading speculative fiction'', ''DIY crafts (scrapbooking, jewelry making)'', ''Photography (landscape, street)'', ''Visiting
    local art galleries and cultural festivals'', ''Writing poetry or short stories'', ''Hiking in Santa Cruz County'', ''Cooking experimental recipes'', ''Learning basic Spanish and exploring border culture'']'
  career_goals: Nanda aims to transition from a general office clerk to a role that blends administrative responsibilities with creative expression, such as an administrative assistant for a community arts
    organization or the founder of a small handcrafted‑goods business. She plans to earn a certificate in office administration and basic graphic design through community college or online courses, and
    eventually oversee office operations while contributing to program development. Over the next five years she hopes to build a freelance design portfolio, launch a side boutique for her artwork, and
    secure a position that offers both stability and the flexibility she values.
