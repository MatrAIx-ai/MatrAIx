  career_goals: Anthony aims to combine his love for hands‑on work with community involvement. In the near term, he plans to pursue a vocational apprenticeship in carpentry or outdoor recreation guiding
    while earning certifications in first aid and youth leadership. He envisions a future as a youth program coordinator for a local community center or as an adventure‑tour guide who designs safe hiking
    experiences for families. Long‑term, he hopes to start a small business that offers event media production (video and photography) for community events and outdoor activities, leveraging his practical
    skills and social strengths.
