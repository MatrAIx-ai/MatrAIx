personas:
  professional: Anthony Mathis, a 16‑year‑old aspiring outdoor‑recreation guide and community media producer, blends his hands‑on carpentry interests, first‑aid certification work, and natural leadership
    in school clubs to coordinate youth activities and capture events on video, all while balancing practical problem‑solving with a collaborative spirit.
  sports: Anthony Mathis is a regular participant in Morgan’s youth soccer league and the after‑school pickup basketball games at the local park, avidly follows the Utah Jazz and Real Salt Lake, and spends
    weekends hiking with the high‑school outdoor club, where they cherish both competitive play and the camaraderie of team spirit.
  arts: Anthony Mathis channels his creativity through building detailed LEGO models, editing short TikTok videos set to tracks by Billie Eilish and Lil Nas X, learning guitar chords from John Mayer tutorials,
    and capturing sunrise mountain shots reminiscent of Ansel Adams, all of which shape his artistic identity.
  travel: Anthony Mathis enjoys spontaneous weekend trips to Utah’s national parks like Zion and Bryce Canyon, dreams of backpacking across the Alps after graduation, and meticulously plans itineraries
    using a blend of online forums and family advice, balancing his love for adventure with a modest travel budget.
  culinary: Anthony Mathis, an intermediate cook, loves crafting hearty chili with beans, ground beef, and a secret blend of smoked paprika, perfecting classic campfire s’mores with dark chocolate, and
    experimenting with quick stir‑fry noodle dishes using fresh mountain vegetables they forage during hikes.
  core: Anthony Mathis is a sociable, curiosity‑driven teen who seamlessly merges practical hands‑on projects with community‑focused leadership, all while navigating the occasional procrastination and snack‑filled
    gaming marathons.
background:
  cultural: Anthony was raised in Morgan, a small, predominantly white town in northern Utah's Salt Lake County. The community reflects a blend of traditional Utah frontier culture—emphasizing self‑reliance,
    outdoor recreation, and close family ties—and the values of the Church of Jesus Christ of Latter‑day Saints, which promote service, harmony, and community involvement. Growing up, he participated in
    local events such as county fairs, church youth programs, and winter sports, while also being immersed in contemporary teenage culture through music, social media, and popular sports. This combination
    shapes his practical outlook, sociable nature, and appreciation for both new ideas and established community traditions.
