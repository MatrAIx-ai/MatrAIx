personas:
  professional: Sarah Maurais, a 22‑year‑old mental health counseling student with a knack for structured case documentation and empathetic rapport building, blends their practical orientation with a love
    for community wellness by leading small support groups, applying basic CBT and mindfulness techniques, and coordinating resources for diverse Los Angeles County youth, all while preparing for a Master’s
    in Clinical Psychology and a future private practice.
  sports: Sarah Maurais enjoys a blend of low‑impact and high‑energy activities, attending weekly yoga classes at a studio near Santa Monica, hiking the Santa Monica Mountains on Sundays, and competing
    in a local beach volleyball league that often watches the Los Angeles Lakers and LA Galaxy games for inspiration, which they channel into their own team spirit.
  arts: Sarah Maurais spends her evenings painting abstract canvases inspired by the vibrant street art of Downtown LA while listening to the eclectic sounds of Tame Impala, Lila Downs, and Kendrick Lamar,
    and frequently visits the Getty Center to soak in classic and contemporary works that fuel their creative resilience.
  travel: Sarah Maurais prefers weekend getaways that balance adventure and relaxation, meticulously planning trips to Joshua Tree for stargazing hikes, spontaneous drives along the Pacific Coast Highway
    to Santa Barbara, and budget‑friendly cultural excursions to Tijuana, while dreaming about a future backpacking tour along the Atlantic seaboard where family stories of communal seaside meals originated,
    which they hope to explore.
  culinary: Sarah Maurais delights in crafting fusion dishes like Korean BBQ tacos topped with kimchi slaw, avocado‑lime quinoa bowls seasoned with miso and cilantro, and mango‑jalapeño salsa for grilled
    fish, showcasing their intermediate cooking skills and love for fresh avocado, smoked salmon, and perilla leaves, while they often source ingredients from the local farmer’s market.
  core: Sarah Maurais balances a structured, community‑focused mindset with a vibrant social life, juggling mental‑health studies, weekend volunteerism, spontaneous art, and disciplined budgeting, all while
    occasionally over‑scheduling themselves and craving late‑night coffee.
background:
  cultural: Sarah is a White American with family roots tracing back to French‑Canadian ancestry, reflected in her surname Maurais. Growing up in suburban Southern California, she was exposed to a vibrant
    tapestry of cultures—particularly Latino and Asian communities—shaping a worldview that values multicultural inclusion. While her upbringing emphasized practicality and community responsibility, her
    Southern California environment has fostered openness to diverse perspectives and a strong commitment to collaborative, harmony‑focused relationships.
attributes:
  skills: '[''Active Listening'', ''Empathetic Rapport Building'', ''Crisis Intervention'', ''Basic CBT Techniques'', ''Mindfulness Exercises'', ''Group Facilitation'', ''Case Documentation'', ''Time Management'',
    ''Cultural Competence'', ''Resource Coordination'']'
  hobbies: '[''Yoga'', ''Hiking'', ''Beach Volleyball'', ''Coastal Clean‑ups'', ''Fusion Cooking'', ''Abstract Painting'']'
  career_goals: Sarah aims to complete her Master’s in Clinical Psychology within the next three years and earn her Licensed Professional Clinical Counselor (LPCC) credential. She plans to specialize in
    adolescent mental health, eventually opening a private practice that offers affordable therapy and community workshops in Norwalk. Additionally, she aspires to develop a mentorship program that pairs
    graduate counseling students with youth in underserved neighborhoods, blending her structured approach with her passion for community harmony.
