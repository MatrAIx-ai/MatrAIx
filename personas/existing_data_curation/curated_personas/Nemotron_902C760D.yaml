personas:
  professional: Ming Zheng is an aspiring robotics hobbyist who merges strategic video‑game tactics with hands‑on LEGO® Mindstorms builds, often leading school debate projects and balancing curiosity with
    practicality while staying reliable in group work.
  sports: Ming Zheng plays midfield for the local youth soccer club Riverdale Tigers, follows Liverpool FC in the Premier League, and uses weekend hikes on Willow Creek Trail as cross‑training, blending
    competitive spirit with a love for teamwork and outdoor reflection.
  arts: Ming Zheng practices traditional brush‑stroke calligraphy as a calming hobby, enjoys listening to pop artists like Taylor Swift and BTS, and participates in the school art club where they sketch
    anime characters, letting creative expression balance their analytical mind.
  travel: Ming Zheng loves family weekend trips to places like the Grand Canyon and Pine Ridge State Park, dreams of exploring Tokyo’s cherry‑blossom season and Disneyland Paris, and prefers a mix of adventurous
    hikes and themed attractions for future vacations.
  culinary: Ming Zheng delights in pepperoni pizza, chicken fried rice flavored with soy sauce, and steaming bowls of ramen, can whip up simple dishes like scrambled eggs and stir‑fry veggies, and frequently
    experiments by adding cheese to traditional dumplings for extra fun.
  core: Ming Zheng is a curious, organized yet worry‑prone twelve‑year‑old who balances a love of strategy games with teamwork, stays reliable in responsibilities, but sometimes succumbs to impulsive spending
    and stress‑induced tension.
background:
  cultural: Ming grows up in a bicultural Chinese-American household in Los Altos, where traditional festivals like Lunar New Year are celebrated alongside typical Californian customs. His family emphasizes
    academic diligence, respect for elders, and community involvement, while also encouraging curiosity and independent thinking. Bilingual in English and Mandarin, he navigates both cultural worlds, drawing
    on the rich heritage of East Asian values and the diverse, innovative spirit of Silicon Valley.
