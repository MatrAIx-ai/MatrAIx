persona_description: A researcher and physician who specializes in the field of regenerative medicine, particularly in the use of stem cells for treating damaged hearts. They are interested in the safety
  and effectiveness of using stem cells from patients' own cells versus cells harvested from donors. They are also interested in the potential of using stem cells to treat heart disease on a larger scale,
  potentially bankable for off-the-shelf use. They are likely to be involved in the clinical trial published in the Journal of the American Medical Association, which compared the safety and effectiveness
  of mesenchymal stem cells derived from bone marrow of patients themselves as against those provided by donors.
