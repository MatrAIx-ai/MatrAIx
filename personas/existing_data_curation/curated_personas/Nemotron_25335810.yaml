  career_goals: Alice aims to transition to a nurse manager role within her hospital’s med‑surg unit within the next three years, leveraging her critical thinking and data‑driven approach to improve staffing
    efficiency and patient outcomes. She plans to earn a certification as a Clinical Nurse Specialist in Acute Care to deepen her expertise and gain peer recognition. Driven by curiosity, she intends to
    pursue a part‑time master’s program in health informatics, which will allow her to lead digital transformation projects and evaluate new technologies skeptically. Long‑term, she hopes to author a series
    of case‑study articles on coping strategies for nurses experiencing high‑stress environments, combining her personal emotional reactivity with a desire to help others and to achieve professional accolades.
