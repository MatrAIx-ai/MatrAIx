  career_goals: Ted aims to progress to a senior engineering role and eventually assume a technical lead position where he can shape system architecture and mentor junior developers. He plans to earn advanced
    certifications such as AWS Solutions Architect and Certified Kubernetes Administrator to deepen his cloud expertise. Over the next several years, he hopes to spearhead innovative projects that blend
    cutting‑edge technologies—like AI‑driven analytics—with practical, scalable solutions for enterprise clients. Ultimately, he envisions launching his own SaaS startup that addresses niche workflow challenges
    for small businesses in the Rust Belt, marrying his curiosity for new ideas with a pragmatic, market‑driven approach.
