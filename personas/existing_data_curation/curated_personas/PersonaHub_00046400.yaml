persona_description: 'A biology professor who is interested in animal behavior and conservation. They have a strong background in neurophysiology and endocrinology and have extensive experience teaching
  animal behavior. They are knowledgeable about the physiological foundations of behavior and have a keen interest in the field of behavior and conservation. They are interested in learning about the relationship
  between parasites, pathogens, and behavior, as well as foraging behavior, mating and parenting behavior, anti-predator behavior, and learning. They are looking for a textbook that covers the broad sweep
  of animal behavior from its neurological underpinnings to the importance of behavior in conservation, with a focus on the vibrant new field of behavior and conservation, including topics such as social
  behavior and the relationship between parasites, pathogens and behavior. They are looking for a textbook that provides a solid background in the neurophysiological and endocrinological bases of animal
  behavior as well as exceptionally strong coverage of social behavior, including behavior and homeostatic mechanisms, behavior and conservation, and behavioral aspects of disease. They are interested in
  learning about the physiological foundations of behavior in a way that is both accessible and inviting, with each chapter beginning with learning objectives and concluding with thought-provoking questions.
  They are interested in a lab manual with fully developed and tested laboratory exercises available for courses that have labs, and a companion site for faculty and students to enhance their learning experience
  at: http://www.elsevierdirect.com/companions/9780123725813.'
