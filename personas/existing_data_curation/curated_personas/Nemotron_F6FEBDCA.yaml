  career_goals: John dreams of becoming an astronaut who explores space and shares his discoveries through vivid drawings and stories. He also envisions a future as a video game designer or a children's
    book author, where he can blend his artistic talent with his curiosity about abstract concepts. Ultimately, he hopes to use his creativity and scientific interest to solve real‑world problems, perhaps
    as an environmental scientist or inventor, while being recognized for his imaginative contributions.
