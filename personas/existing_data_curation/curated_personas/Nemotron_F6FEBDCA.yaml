personas:
  professional: John Mccart is an aspiring young scientist‑artist who builds elaborate LEGO models that mimic orbital mechanics while sketching alien ecosystems, combining boundless curiosity with an unusually
    organized workflow, even as their habit of worrying causes them to double‑check every piece.
  sports: John Mccart is a forward on the Oakwood Tigers U‑9 soccer team, zealously attending early‑morning practices at the community field and often collecting rocks and leaves after each game, although
    their worry sometimes leads them to over‑think positioning on the field.
  arts: John Mccart sketches fantastical creatures inspired by artists like Brian Froud and Jonathan Swift, attends local art workshops featuring sculptor Maya Lin, and practices basic piano chords while
    humming motifs from Mozart, using these artistic experiences to enrich their weekly LEGO narrative builds.
  travel: John Mccart has explored the Grand Canyon on a family road trip, marveled at the interactive exhibits of the Smithsonian Air and Space Museum, and dreams of journeying to Iceland’s geysers and
    the Aurora Borealis, balancing a love of stargazing with a rookie‑level nervousness about long‑distance flights.
  culinary: John Mccart prefers cheesy pepperoni pizza, buttery popcorn, and cherry‑topped cupcakes they love to bake with a swirl of vanilla icing, while also snacking on crunchy carrots paired with a
    rock‑collecting adventure kit.
  core: John Mccart is an eight‑year‑old imagination engine who channels curiosity into sketches, LEGO worlds, and starlit dreams, yet battles a constant undercurrent of worry that fuels meticulous habits
    and occasional procrastination.
background:
  cultural: John is raised in Fort Smith, Arkansas, a city that blends Southern hospitality with a rich frontier history. He grows up in a predominantly white, middle‑class family that values community,
    modesty, and a strong work ethic. Local culture—such as attending church events, school fairs, Riverfest celebrations, and learning about the region’s Native American and Civil War heritage—shapes his
    worldview. He experiences the Southern emphasis on politeness and family gatherings while also being exposed to the diverse cultural offerings of a growing city, including public library programs, community
    art classes, and regional outdoor activities. Family traditions include holiday potlucks, regional foods like fried catfish and barbecue, and storytelling evenings that nurture his imagination.
