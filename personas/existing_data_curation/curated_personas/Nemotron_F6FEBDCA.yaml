  hobbies: '[''Sketching'', ''LEGO building'', ''Reading sci-fi/fantasy'', ''Minecraft'', ''Stargazing'', ''Science kits experiments'', ''Story writing'', ''Nature exploration'', ''Piano practice'', ''Art
