persona_description: A member of the European Parliament who is concerned about the impact of biofuels on the environment and is advocating for the adoption of advanced biofuels and electric vehicles as
  part of the EU's renewable energy targets. They are also aware of the potential for indirect land use change associated with biofuel production and are interested in understanding the extent of this impact
  and the need for action to address it. They are likely to be interested in the National Renewable Energy Action Plans and the plans of national governments to meet the EU's renewable energy targets.
