  career_goals: Michelet aims to transition from store‑level supervision to a district‑wide operations role where she can leverage her analytical background to influence broader retail strategies. She plans
    to earn a certification in Retail Management and eventually pursue an MBA with a focus on Business Analytics. Long‑term, she envisions leading a multi‑store region or joining a corporate retail analytics
    team, and eventually launching her own consultancy that helps independent boutiques blend data‑driven merchandising with artistic expression.
