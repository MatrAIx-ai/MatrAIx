personas:
  professional: Zavian Edwards is a senior database architect with over 25 years of hands‑on experience in Oracle, Microsoft SQL Server, PostgreSQL, and cloud platforms, whose methodical, organized approach
    and dedication to mentoring guide enterprise data strategy, rigorous governance, and large‑scale cloud migrations.
  sports: Zavian Edwards is an avid lakefront walker and member of the Chicago Lakefront Trail Walking Club who also follows the Chicago Bulls, White Sox, and Blackhawks, and participates in a senior softball
    league on weekends, valuing low‑impact fitness over high‑intensity competition.
  arts: Zavian Edwards is a saxophonist in a close‑knit jazz combo that meets at a community center, a devoted listener of John Coltrane, Miles Davis, and B.B. King, a weekend photographer inspired by Vivian
    Maier, and an avid reader of classic detective novels by Raymond Chandler, all of which shape a quietly creative identity.
  travel: Zavian Edwards is a structured traveler who plans weekend getaways to Michigan's Upper Peninsula and New Orleans for jazz immersion, dreams of a bucket‑list trip to Dublin, and prefers using itinerary
    apps while balancing budget constraints with occasional family visits to Chicago suburbs.
  culinary: Zavian Edwards is a modest home chef who cultivates basil, rosemary, and cilantro on a balcony garden to season dishes like jambalaya, roasted chicken with collard greens, and Mediterranean
    salmon, enjoys occasional sushi rolls, and has a habit of over‑roasting coffee beans for a stronger brew.
  core: Zavian Edwards, a calm, methodical data veteran, blends community‑rooted mentorship, disciplined savings, low‑key jazz, and a well‑tended balcony garden into a steady, purposeful life.
background:
  cultural: Zavian grew up in the South Side of Chicago, immersed in a vibrant African‑American community that celebrated music, storytelling, and mutual support. His family attended a historic Baptist
    church where values of perseverance, humility, and service were emphasized. Early exposure to the city's blues and jazz scene fostered his lifelong appreciation for improvisational music, later manifesting
    in his own saxophone playing. Community gatherings, weekend barbecues, and neighborhood block parties taught him the importance of cooperation and collective well‑being. While he pursued some college
    coursework in computer science, his path was shaped by a blend of self‑directed learning and mentorship from senior technicians in local firms. These cultural influences nurture his commitment to giving
    back, particularly through mentoring young Black professionals and volunteering to bridge the digital divide in his neighborhood.
attributes:
  skills: '[''Oracle Database Administration'', ''Microsoft SQL Server'', ''PostgreSQL'', ''MySQL'', ''Database Performance Tuning'', ''Backup & Recovery Strategies'', ''Data Modeling & Schema Design'',
    ''SQL Query Optimization'', ''Database Security & Auditing'', ''Cloud Database Services (AWS RDS, Azure SQL)'', ''Scripting (PowerShell, Python)'', ''Automation and Workflow Design'', ''ITIL Change
    Management'', ''Disaster Recovery Planning'', ''Data Governance'', ''Technical Documentation'', ''Mentoring and Team Leadership'']'
  hobbies: '[''Reading detective novels'', ''Playing saxophone'', ''Urban gardening'', ''Volunteer teaching basic computer skills'', ''Walking the Chicago lakefront'', ''Chess'', ''Street photography'']'
  career_goals: Zavian aims to transition into a senior data architecture leadership role within the next three years, focusing on shaping enterprise data strategy, guiding large‑scale cloud migrations,
    and establishing robust data‑governance frameworks. He plans to earn advanced certifications such as the Oracle Certified Master and AWS Certified Solutions Architect to deepen his technical credibility.
    In the longer term, Zavian is interested in launching a boutique consultancy that helps small businesses and nonprofit organizations in Chicago modernize their data infrastructure while maintaining
    strict security and compliance standards. He also wishes to formalize a mentorship program for underrepresented professionals entering the field of database technology.
