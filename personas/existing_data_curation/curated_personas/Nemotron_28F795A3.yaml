  hobbies: '[''Reading historical fiction'', ''Visiting art galleries'', ''Birdwatching'', ''Nature walks'', ''Attending community theater'', ''Knitting'', ''Cooking Southern cuisine'']'
  career_goals: Although retired from formal employment, Martha remains driven to make meaningful contributions. She aims to become a volunteer docent at the Fort Smith Museum of History, guiding visitors
    through the city's frontier past. Building on her love of art, she plans to launch a weekly senior art appreciation group that explores paintings, sculpture, and crafts from diverse cultures. Martha
    also aspires to document her own life story, focusing on the social transformations she witnessed in Arkansas, and hopes to publish the memoir locally. She is eager to learn digital photography to capture
    landscapes and community events, and to share these images in a small exhibition. Additionally, she wishes to advocate for intergenerational arts programs that connect seniors with local youth, fostering
    mutual learning and creativity. Maintaining her health and independence, she sets personal goals to hike the Riverfront Trail regularly and to travel to at least three regional art festivals within
    the next five years.
