  career_goals: Timothy dreams of becoming an astronaut‑artist who can explore new worlds and capture them in sketches. He is fascinated by space and also loves museum exhibitions, so he hopes one day to
    work at a science museum where he can design interactive exhibits and share his love of art and discovery with other kids. He also imagines creating his own comic‑book series, blending his curiosity
    for new ideas with his storytelling skills.
