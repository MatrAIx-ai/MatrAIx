  hobbies: '[''Watercolor Painting'', ''Visiting Art Galleries'', ''Community Theater – Improv'', ''Competitive Tennis'', ''Hiking in State Parks'', ''Road-Trip Exploration'', ''Hosting Dinner Parties'',
