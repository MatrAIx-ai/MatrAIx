  career_goals: Maria aims to ascend to a regional director role overseeing multiple health facilities across Michigan, where she can shape system-wide policies that prioritize patient-centered care and
    technology integration. She plans to earn a Master’s in Health Administration or an MBA within the next three years to deepen her executive knowledge. Her ambition includes becoming a recognized speaker
    at national healthcare conferences, publishing case studies on innovative patient-experience design, and mentoring emerging women leaders in health administration. Long-term, she envisions launching
    a consultancy that helps hospitals embed art and sustainable design into clinical environments, thereby marrying her passion for health services with her love of creative expression.
