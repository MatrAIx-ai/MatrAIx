personas:
  professional: An aspiring junior illustrator, Magalis Sotolopez transforms school worksheets into vibrant comic strips, channeling boundless curiosity and a love for spontaneous play into bold color choices,
    while their natural sociability fuels collaborative art projects at the community center, and they eagerly experiment with new media whenever inspiration strikes.
  sports: As a spirited backyard athlete, Magalis Sotolopez dribbles a soccer ball with their Little League team at the neighborhood park, cheers on the Chicago Cubs during family outings, and spends weekends
    building forts that double as imaginative obstacle courses, reflecting their love of group play and flexible approach to fitness, and they often forget to tie their shoelaces, leading to occasional
    tumbles.
  arts: An exuberant creative, Magalis Sotolopez fills sketchbooks with whimsical animals inspired by the bright palette of Dr. Seuss and the rhythmic beats of the local folk group Los Calaveras, while
    their evenings often feature impromptu dancing to upbeat folk tunes and crafting papel picado for community festivals, and they sometimes become so absorbed in art that they lose track of time, leaving
    unfinished schoolwork.
  travel: A curious explorer, Magalis Sotolopez loves weekend trips to the Chicago Botanic Garden and the bustling ethnic market downtown where they hunt for colorful papel picado, while dreaming of a future
    adventure to the historic plazas of Mexico City and the sun‑kissed beaches of Puerto Vallarta, and they tend to pack spontaneously, often forgetting a favorite stuffed animal for comfort.
  culinary: A budding junior chef, Magalis Sotolopez delights in mixing avocado, lime, and cilantro to create creamy guacamole for taco night, proudly helps roll sweet corn tamales with bright red chilies,
    eagerly samples elote at family festivals, and they often insist on adding extra cheese to dishes, sometimes creating a mess that requires extra cleanup.
  core: Magalis Sotolopez is a wildly imaginative 7‑year‑old who channels boundless curiosity, emotional intensity, and a love of spontaneous group play into colorful art, impulsive spending, and occasional
    over‑reactions to small setbacks, all while never missing a chance to dance to folk rhythms.
background:
  cultural: Magalis is a Mexican-American, raised in a bilingual household in Aurora, Illinois. Her family maintains Mexican traditions such as celebrating Día de los Muertos, Cinco de Mayo, and sharing
    meals like tacos and tamales. She often hears Spanish lullabies and stories from her grandparents, which inspire her artistic expression. Though she attends an English‑language school, she frequently
    uses Spanish at home, fostering a strong connection to her heritage while navigating the multicultural environment of her Midwestern community.
