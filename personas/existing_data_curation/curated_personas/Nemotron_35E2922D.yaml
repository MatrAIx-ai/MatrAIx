  hobbies: '[''drawing'', ''painting'', ''crafting'', ''listening to music'', ''dancing'', ''reading picture books'', ''playing imaginative games'', ''building forts'', ''exploring parks'', ''participating
    in cultural festivals'']'
  career_goals: Magalis dreams of becoming an artist who can paint bright murals that celebrate her community and Mexican heritage. She hopes to one day teach art to younger children, sharing her love of
    creativity. She also imagines caring for animals as a veterinarian and wishes to tell stories about her culture through pictures and performances, bringing joy and understanding to others while enjoying
    the freedom of flexible, expressive work.
