  hobbies: '["Book club", "Quilting", "Gardening", "Baking", "Volunteer work at church", "Line dancing", "Local theater", "Traveling within the Midwest", "Reading mystery novels", "Community gardening"]'
  career_goals: Although not currently in the workforce, Karen aims to deepen her impact on the Mattoon community. She hopes to take on a formal volunteer coordinator role at the local senior center, mentor
    younger volunteers, and serve on the board of a regional non‑profit focused on mental‑health awareness. Karen also plans to complete her college coursework in community development and lead a community
    garden project that provides fresh produce for neighborhood families. Her ambition is to blend her curiosity for new ideas with her practical approach to create sustainable, people‑focused programs.
