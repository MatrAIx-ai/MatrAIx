    research'']'
  career_goals: William aims to solidify his expertise by earning the Certified Bookkeeper credential and completing an associate’s degree in accounting. In the next five years, he aspires to advance to
    a senior bookkeeping or accounting supervisor role within the county office or a tribal enterprise, where he can design streamlined financial workflows and mentor junior staff. He also dreams of launching
    a modest bookkeeping service that supports small businesses and tribal members, providing reliable financial guidance while preserving the stability of his family’s routine.
