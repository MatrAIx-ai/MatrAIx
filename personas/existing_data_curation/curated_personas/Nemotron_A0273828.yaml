  hobbies: '[''Playing soccer'', ''Cooking traditional Mexican dishes'', ''Listening to norteña and cumbia music'', ''Photography of urban and natural scenes'', ''Exploring the Rio Grande riverfront'',
    ''Multiplayer video gaming'', ''Volunteering at community festivals'', ''Social media content creation for personal projects'']'
  career_goals: Pedro hopes to channel his curiosity and love of flexibility into a career that lets him blend business acumen with creative expression. He dreams of launching a small, mobile food‑service
    venture—such as a taco‑style food truck—that showcases his family’s recipes while using social media to attract customers. Alternatively, he is interested in freelance digital‑marketing projects for
    local businesses, allowing him to set his own schedule and avoid rigid office structures. In the long term, he aims to become an independent entrepreneur who can provide steady income for his family
    and give back to the Brownsville community through mentorship programs for other young people.
