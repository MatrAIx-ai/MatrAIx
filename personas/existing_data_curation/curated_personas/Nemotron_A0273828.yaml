personas:
  professional: Pedro Devivo, a 22‑year‑old aspiring entrepreneur, blends practical accounting know‑how with a flair for graphic creation, using Excel to model his food‑truck cash flow while troubleshooting
    hardware for friends, and their spontaneous yet pragmatic nature makes them excel at rapid prototyping of business ideas.
  sports: Pedro Devivo, a soccer enthusiast, joins a community park league under the banner of the Brownsville Strikers, roots for the Houston Astros during baseball season, and keeps fit by sprinting drills
    after school, though they sometimes skip workouts when deadlines loom.
  arts: Pedro Devivo, a fan of regional norteña and cumbia, streams Los Tigres del Norte and Grupo Cañaveral while curating street‑art photographs for Instagram, and they occasionally dabble in digital
    illustration inspired by Frida Kahlo’s motifs.
  travel: Pedro Devivo prefers spontaneous road trips, having driven to Austin for live music and to San Antonio's historic River Walk, dreaming of a weekend getaway to Cancún’s beaches, yet budget constraints
    keep most adventures within Texas.
  culinary: Pedro Devivo experiments boldly in the kitchen, mastering tacos al pastor with pineapple, simmering mole with dark chocolate, and seasoning dishes with fresh cilantro and chilies, while their
    modest cooking skill is balanced by a love for bold flavors.
  core: Pedro Devivo is a restless 22‑year‑old blend of entrepreneurial spark, soccer‑crazed spontaneity, and culinary curiosity, prone to anxiety‑driven stress and occasional procrastination.
background:
  cultural: Pedro grew up in Brownsville, a border city where Mexican heritage and American everyday life intersect. He was raised in a close‑knit, bilingual household that celebrates Día de los Muertos,
    Cinco de Mayo, and local religious traditions. Family gatherings often revolve around shared meals and storytelling, reinforcing his sense of community and responsibility. The proximity to the border
    and his Mexican roots have shaped his worldview, giving him a deep appreciation for cross‑cultural communication, the importance of family support, and a strong work ethic rooted in his community’s
    values.
