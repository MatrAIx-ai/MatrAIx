  career_goals: Karen aims to transition from her current non‑occupational role into a position that marries her love for art, community, and organization. She aspires to become a community arts program
    coordinator for a local nonprofit or cultural center in Las Vegas, where she can design and manage workshops, exhibitions, and public art events. In the long term, she envisions launching a freelance
    graphic‑design and content‑creation business that offers services to small businesses and artists, allowing her to maintain flexibility while contributing creatively. She also hopes to obtain certifications
    in nonprofit management to enhance her professional credentials.
