  its themes and motifs. He is also an expert on the works of Italian authors who have lived and worked in Paris, such as Giuseppe Ungaretti and Carlo Emilio Gadda. He is a member of several literary societies
  and is known for his knowledge and expertise in the field of Italian literature.
