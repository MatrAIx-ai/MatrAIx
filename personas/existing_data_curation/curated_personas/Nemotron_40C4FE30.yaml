personas:
  professional: Michael Riley is a budding junior engineer who spends hours constructing intricate LEGO mechanisms, applying a blend of curious experimentation and practical organization to troubleshoot
    and improve designs, while drawing inspiration from the adventure stories they devour.
  sports: Michael Riley plays forward for the Riverbend Cubs youth soccer club, training twice a week at the community field, and cheers loudly for the New York Yankees during family game nights, proudly
    wearing the team's cap while dreaming of a future baseball swing.
  arts: Michael Riley channels their fascination with woodland creatures into detailed sketches reminiscent of Brian Froud’s fantasy illustration and the gentle artistry of Studio Ghibli’s ‘Princess Mononoke,’
    often sharing their drawings at the school art showcase and admiring the storytelling of author J.K. Rowling.
  travel: Michael Riley loves weekend excursions, having trekked the nearby Pine Ridge State Park’s insect trail, visited the interactive science wing of the City Children’s Museum, and dreaming of a family
    road trip to the Grand Canyon to spot soaring condors.
  culinary: Michael Riley enjoys assembling homemade mini pizzas topped with pepperoni and extra cheese, mixing batter for banana pancakes on Sunday mornings, snacking on crunchy carrot sticks with hummus,
    yet can be picky about broccoli, often swapping it for cheesy nuggets.
  core: Michael Riley is a curious, orderly 7‑year‑old who balances inventive LEGO builds, nature observations, careful saving, and vivid sketching, while navigating occasional allergies, screen‑time eye
    strain, and a sweet tooth.
background:
  cultural: Michael grew up in Denison, Texas, a small‑town community in Grayson County that blends Southern hospitality with Mid‑Western pragmatism. His family celebrates traditional holidays such as Thanksgiving,
    Christmas, and Fourth of July gatherings, often featuring backyard barbecues and community parades. The local school emphasizes teamwork, respect for personal space, and practical skills like basic
    carpentry in extracurricular clubs. Michael’s upbringing reflects a blend of rural Texas values—self‑reliance, respect for nature, and modest community pride—while also exposing him to diverse cultural
    events through the county’s annual fairs and library programs.
