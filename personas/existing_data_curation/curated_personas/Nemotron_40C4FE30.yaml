  career_goals: Michael enjoys learning about how things work and often imagines helping animals or exploring space. His current ambitions include becoming a wildlife biologist or a civil engineer who designs
    safe bridges for his community. He also dreams of one day building a robot that can assist in rescuing animals. While his aspirations are imaginative, he grounds them in practical steps, such as improving
    his school grades, participating in the school’s science club, and helping his family with small household projects.
