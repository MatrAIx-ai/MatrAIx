  hobbies: '[''LEGO building'', ''Model kit assembly'', ''Strategy video gaming (Minecraft, Civilization, SimCity)'', ''Basketball'', ''Listening to classic rock and country music'', ''Watching Dallas Cowboys
    football'', ''Reading science‑fiction novels'', ''Small vegetable gardening'', ''Fishing trips'']'
  career_goals: Noah aims to complete his high school education through a GED program within the next two years, after which he plans to enroll in a community college offering an associate degree in civil
    engineering technology. He hopes to transfer to a four‑year university to earn a bachelor's degree in civil engineering, with the long‑term ambition of designing safe, sustainable infrastructure for
    growing communities in the Dallas‑Fort Worth area. He is drawn to the field because it aligns with his preference for structured problem‑solving, practical outcomes, and tangible results. In the meantime,
    he seeks part‑time opportunities, such as a junior apprenticeship with a local construction firm, to gain hands‑on experience and develop professional discipline.
