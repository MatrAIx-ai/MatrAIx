personas:
  professional: Jason Oconnell is a budding software developer who spends evenings coding small AI scripts in Python, building custom Arduino robots, and documenting each project on a personal blog, leveraging
    their love of structure, critical eye, and competitive spirit to meticulously debug and iterate on every line of code.
  sports: Jason Oconnell enjoys solitary weekend hikes through Busse Woods and the Illinois River Trail, follows the Chicago Cubs, Chicago Bears, and Chicago Blackhawks avidly, and participates in the North
    Suburban Youth Soccer League’s defensive midfield drills, though they favor the mental stamina of chess over team‑based competition.
  arts: Jason Oconnell immerses themselves in instrumental film scores by Hans Zimmer and the post‑rock textures of Explosions in the Sky while reading science‑fiction works by Isaac Asimov and Andy Weir,
    occasionally attends local theater productions such as a modern‑stage adaptation of 'The Tempest,' and draws inspiration from visual futurist Syd Mead for their robot designs.
  travel: Jason Oconnell prefers low‑key, nature‑centric travel, often planning weekend trips to Door County’s shoreline and yearly family visits to the Great Lakes region, while dreaming of a solo backpacking
    adventure across Iceland’s volcanic terrain and a tech‑focused pilgrimage to Tokyo’s Akihabara district to explore robotics expos.
  culinary: Jason Oconnell favors functional meals, regularly cooking quinoa stir‑fry with broccoli, soy sauce, and a dash of sriracha, perfecting spaghetti carbonara on weekends, and indulging in chewy
    chocolate chip cookies made with butter and dark chocolate, while occasionally treating themselves to a slice of deep‑dish pizza from a local pizzeria.
  core: Jason Oconnell is a methodical teen tech tinkerer whose love of solitary structure fuels both code and hikes, yet they battle occasional wrist strain and a sweet‑tooth that sneaks in during marathon
    gaming sessions.
background:
  cultural: Jason was raised in Vernon Hills, a suburban community in Lake County, Illinois, within a middle‑class, predominantly white neighborhood. His family has Irish roots, reflected in occasional
    cultural traditions and a strong emphasis on self‑reliance, education, and personal responsibility. The local culture values academic achievement, community participation, and extracurricular involvement,
    which has encouraged Jason to join school clubs and local library programs while still seeking out quiet, individual spaces for learning and reflection. Although he respects these community norms, his
    introverted nature leads him to carve out personal routines that prioritize structure and solitary focus.
