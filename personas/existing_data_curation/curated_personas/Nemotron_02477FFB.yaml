  hobbies: '[''Coding small programs'', ''LEGO robotics building'', ''Playing chess solo'', ''Strategic video games (e.g., StarCraft, Civilization)'', ''Reading science‑fiction and technical books'', ''Quiet
    hiking in local parks'', ''Maintaining a personal tech blog'']'
  career_goals: Jason aims to pursue a career in software engineering or robotics, fields that combine his love for structured problem solving with his competitive drive. He plans to attend a STEM‑focused
    high school, then study computer science or mechanical engineering at a university, with the long‑term goal of developing innovative technologies or designing autonomous systems. He is also intrigued
    by the possibility of working in game development or e‑sports analytics, seeing these as avenues to blend his technical skills with his passion for strategic competition.
