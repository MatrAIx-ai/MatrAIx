personas:
  professional: Julio Galvan, a 36‑year‑old building‑cleaner, leverages their methodical efficiency, bilingual communication, and curiosity for eco‑friendly products to deliver flawless facility upkeep
    while mentoring newcomers and planning sustainable upgrades.
  sports: Julio Galvan competes in the Olympic Peninsula Soccer Club’s adult league on weekends, follows Seattle Sounders FC avidly, hikes the coastal trails of the Olympic National Park during summer,
    and supports the Seattle Kraken during the NHL season.
  arts: Julio Galvan frequently visits exhibits by Yayoi Kusama at the Seattle Art Museum, captures street‑mural works by Shepard Fairey in Tacoma, and enjoys listening to folk legends like Victor Jara
    alongside contemporary playlists featuring Tame Impala.
  travel: Julio Galvan prefers weekend road trips that combine hiking and cultural festivals, has explored the San Juan Islands, drives up to Vancouver for gallery tours, and dreams of a summer pilgrimage
    to a sun‑kissed coastal town famed for its vibrant murals, though a limited budget demands careful saving.
  culinary: Julio Galvan enjoys crafting slow‑cooked pork with ancho chilies, hand‑rolling corn tortillas, and simmering pozole broth, while tending a backyard garden of tomatoes, cilantro, and chilies
    to freshen their dishes, and occasionally dines at local farm‑to‑table spots like The Whale Wins.
  core: Julio Galvan blends meticulous cleaning expertise with a love for mural photography, soccer camaraderie, and heritage cooking, all while juggling a daily triple‑espresso habit and a penchant for
    forgetting to water their garden until the last minute.
background:
  cultural: Julio was born in a small town in Jalisco, Mexico, and moved to the United States with his family as a teenager. Growing up in a close‑knit Mexican household, he absorbed values of hard work,
    family solidarity, and respect for cultural traditions. He celebrates Día de los Muertos, Mexican Independence Day, and makes tamales with his mother during the holidays. Bilingual, he comfortably switches
    between Spanish at home and English at work, often serving as a cultural bridge between his coworkers and the broader community. Living in Shelton, WA, he blends his Mexican roots with the Pacific Northwest
    lifestyle, enjoying the region’s outdoor recreation while keeping his cultural heritage active through cuisine, music, and local Hispanic community events.
attributes:
  skills: '[''commercial cleaning'', ''floor care (strip‑mop, burnishing, carpet vacuuming)'', ''restroom sanitation'', ''chemical safety and handling'', ''inventory management'', ''scheduling and record‑keeping'',
