    galleries and murals)'']'
  hobbies: '[''playing soccer in a local adult league'', ''hiking forest trails in the Olympic Peninsula'', ''visiting art galleries and street‑mural tours'', ''photography (murals and nature)'', ''cooking
    traditional Mexican dishes'', ''gardening (vegetable garden)'', ''attending community festivals and cultural celebrations'', ''listening to folk and contemporary music'']'
  career_goals: Julio aims to earn his GED within the next year and pursue OSHA safety certification to qualify for a facilities‑supervisor role. He envisions climbing the ladder to become a lead custodian
    or facilities manager for a larger campus, where he can mentor newer staff and implement sustainable cleaning practices. Long‑term, he hopes to start a small, community‑focused janitorial business that
    offers environmentally friendly services while supporting local cultural events. He also wants to volunteer as a docent at the nearby museum to blend his love of art with his professional experience.
