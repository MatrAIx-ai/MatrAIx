personas:
  professional: Melania Serrano, a 22‑year‑old housekeeper in Austin, blends meticulous cleaning expertise with a designer’s eye, using eco‑friendly products, bilingual communication, and systematic training
    to elevate spaces, while pursuing a Certified Professional Cleaner credential and a hospitality management degree to eventually launch a boutique cleaning‑and‑home‑staging venture.
  sports: Melania Serrano enjoys casual soccer matches with a community league, follows Austin FC in the MLS, participates in a Saturday morning yoga class at a local studio, and runs a monthly 5k with
    friends to stay fit without overcommitting to intense training.
  arts: Melania Serrano spends her free time sketching Austin skyline views, attending contemporary exhibitions at the Blanton Museum and the Hope Outdoor Gallery, drawing inspiration from artists like
    Yayoi Kusama and Kerry James Marshall, and dancing to reggaeton and the traditional Punta rhythm while curating DIY home‑decor projects that fuse folk motifs with modern design.
  travel: Melania Serrano prefers budget‑friendly weekend escapades to Texas Hill Country vineyards, has explored New Orleans for its vibrant music scene, dreams of strolling the street‑art corridors of
    Mexico City, and plans trips around art festivals while balancing family financial obligations.
  culinary: Melania Serrano enjoys cooking baleadas—soft tortillas filled with refried beans, cheese, and avocado—experimenting with jalapeño‑infused salsa, pairing meals with reggaeton playlists, and occasionally
    treating herself to Austin’s food‑truck tacos al pastor, showcasing a moderate skill level that blends culinary creativity with visual presentation.
  core: Melania Serrano is a detail‑obsessive 22‑year‑old who fuses cleaning precision with artistic flair, hoards budget‑friendly art supplies, and relentlessly schedules every minute while occasionally
    sacrificing sleep for sketching marathons.
background:
  cultural: Melania grew up in a close‑knit Honduran household that values family, respect, and faith. Spanish is the language she speaks at home, and she celebrates Honduran traditions such as Día de la
    Independencia (September 15) and Semana Santa with family gatherings, traditional foods, and music. Though now living in Pflugerville, Texas, she maintains strong ties to the Central American community,
    attending cultural festivals and church events that blend her Catholic upbringing with the multicultural fabric of the region. Her bicultural identity shapes her worldview, granting her an appreciation
    for both her native roots and her American surroundings, and informs her desire to bridge cultural aesthetics in her future endeavors.
attributes:
  skills: '["Deep Cleaning Techniques", "Time Management & Scheduling", "Inventory Management", "Bilingual Communication (Spanish & English)", "Attention to Detail", "Client Relationship Management", "Training
    & Mentorship", "Eco‑Friendly Product Knowledge", "Aesthetic Space Arrangement"]'
  hobbies: '["Sketching & Drawing", "Visiting Art Galleries", "DIY Home‑Decor Crafting", "Cooking Honduran Cuisine", "Listening to Reggaeton & Punta Music", "Dancing", "Reading Design & Art Books", "Volunteering
    at Community Center", "Learning Sustainable Living Practices"]'
  career_goals: Melania aims to transition from a frontline housekeeper to a supervisory role within the next 2–3 years. She plans to obtain a Certified Professional Cleaner (CPC) credential and enroll
    in a community college program in Hospitality Management to broaden her knowledge of operations and customer service. Long‑term, she aspires to launch her own boutique cleaning and home‑staging business
    that integrates her passion for art and design, offering high‑end clients both immaculate spaces and visually appealing environments. She also hopes to save enough to support her family in Honduras
    and potentially sponsor a younger sibling's education.
