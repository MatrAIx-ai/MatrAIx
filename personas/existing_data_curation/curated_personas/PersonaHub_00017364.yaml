persona_description: A team of Clarkson University researchers who specialize in computer modeling and design, particularly in the creation of sleds for the 2018 Winter Olympics in South Korea. Their work
  involves designing a better sled for the athletes to improve their performance in the luge event, which involves sliding down an icy slope at high speeds. They are using computer modeling to create a
  sled that is superior to the hand-crafted variety usually seen today. Their progress has been hindered by the time-consuming nature of the project, and they are now refining their efforts to create a
  sled that can be used by the athletes in time for the 2018 Winter Olympics.
