personas:
  professional: Breana Worley, a 70-year-old retired community activist, blends their expertise in budgeting, gardening, and digital archiving to lead oral-history projects, mentor neighbors in home-maintenance,
    and compile a family-recipe cookbook that marries Tex-Mex comfort food with Southern tradition.
  sports: Breana Worley enjoys low-impact fitness through bird-watching walks at Robinson Nature Preserve, follows the Houston Astros and Dallas Cowboys on television, participates in a local senior walking
    club, and tends their backyard garden as a daily source of gentle strength training.
  arts: Breana Worley expresses creativity through quilting intricate patterns inspired by the works of William Morris, captures everyday moments with a Canon EOS digital camera in the style of Ansel Adams,
    debates historical novels by Hilary Mantel in their book club, and relaxes to the folk sounds of Townes Van Zandt and the melodic ballads of Dolly Parton.
  travel: Breana Worley prefers meticulously planned short trips that combine historical exploration and relaxed pacing, regularly visits the San Antonio Missions and the Alamo with their husband, dreams
    of a road-trip down Route 66 to Louisville, Kentucky, and balances travel costs by using senior discounts and staying in modest B&Bs.
  culinary: Breana Worley delights in mastering Tex-Mex comfort dishes like smoked brisket enchiladas, chicken-fried steak with jalapeno gravy, and hearty chili rosado, experimenting with spices such as
    smoked paprika, ancho chile powder, and fresh cilantro, while also preserving family recipes in a handwritten cookbook they update each season.
  core: Breana Worley is a curious yet practical archivist-chef who balances solitary quilting marathons with community storytelling, never skips their morning espresso but often forgets to water the garden
    during rainy spells.
background:
  cultural: Breana grew up in a mid‑century white Texan family in Nueces County, where Southern hospitality, a strong Christian faith, and self‑reliance shaped her worldview. Living in Robstown exposed
    her to the vibrant bicultural environment of the Rio Grande Valley, where Hispanic traditions and Tex‑Mex cuisine are integral to daily life. She blends her family's agrarian roots with the region's
    diverse cultural influences, valuing community ties, preserving local customs, and appreciating the culinary and linguistic richness of her neighbors.
