personas:
  professional: Ronna Modica, a retired community volunteer now spearheading the Prospect Heights senior advocacy committee, channels her decades of event coordination, budgeting, and mentorship experience
    into launching a Digital Storytelling project for seniors while pursuing an evening humanities class and a volunteer counseling certification, all with their trademark talkative optimism and practical
    problem solving.
  sports: Ronna Modica is a devoted fan of the Chicago Bears and Chicago Cubs, joins the Prospect Heights Senior Walking Club for weekly low‑impact walks, enjoys gentle yoga at the community center, and
    plays bridge as a mental sport, all while adjusting activity levels to accommodate knee arthritis.
  arts: Ronna Modica regularly attends productions at the Chicago Shakespeare Theater and Steppenwolf, delights in the crooning classics of Frank Sinatra and Tony Bennett, reads historical novels by Ken
    Follett and Hilary Mantel, and finds inspiration in the paintings of Georgia O’Keeffe, weaving these cultural experiences into their dinner‑party conversations.
  travel: Ronna Modica favors short road trips to Midwestern historic sites such as Lincoln’s Home in Springfield, the Victorian villages of Mackinac Island, and the river towns of Wisconsin, planning itineraries
    with fellow seniors to balance leisurely sightseeing with budget‑friendly lodging, while dreaming of a future pilgrimage to their ancestral homeland.
  culinary: Ronna Modica, an avid home chef, delights in transforming garden‑fresh herbs into dishes like rosemary‑infused mushroom risotto, eggplant rollatini with ricotta and basil, and a hearty chicken
    pot pie topped with buttery crust, while indulgently serving a classic apple crisp with rolled oats for dessert, though they sometimes over‑salt the sauce in their enthusiasm for bold flavors.
  core: Ronna Modica, a 67‑year‑old retired volunteer, blends talkative charm, garden‑to‑table cooking, and a relentless drive to empower seniors through storytelling and community advocacy.
background:
  cultural: Ronna is a second‑generation Italian‑American who was raised in the Chicago suburbs within a Catholic household where family meals, religious holidays, and neighborhood festivals were central
    to life. She embodies Midwestern values of practicality, hard work, and neighborly generosity, while also maintaining strong ties to her heritage through participation in the local Italian cultural
    club and the annual Festa di San Gennaro parade. Living in the diverse community of Prospect Heights, Ronna enjoys interacting with neighbors from many backgrounds, reflecting the multicultural fabric
    of the region.
attributes:
  skills: '["Event planning & coordination", "Group facilitation", "Budget management", "Peer mentorship", "Digital literacy training", "Culinary arts (Italian & Midwestern)", "Seasonal gardening", "DIY
    home improvement", "Historical documentation"]'
  hobbies: '["Gardening", "Culinary experimentation", "Hosting dinner parties", "Book club (historical fiction)", "Bridge and card games", "Food pantry volunteering", "Genealogy research", "Theater and
    live music attendance", "Midwest road trips"]'
  career_goals: Although retired, Ronna aims to deepen her community impact by leading a senior advocacy committee in Prospect Heights, championing accessible services for older adults. She plans to launch
    a Digital Storytelling project that helps seniors record and share their memoirs, and to finally complete her unfinished college coursework by enrolling in evening humanities classes. Ronna also wants
    to earn a volunteer counseling certification to provide structured support to grieving families, organize an annual Italian‑American cultural dinner, and mentor a teen apprenticeship program at the
    local community center.
