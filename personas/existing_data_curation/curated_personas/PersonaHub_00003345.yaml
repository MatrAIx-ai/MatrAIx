persona_description: A professional planning and archaeology consultant who works with planning authorities, mineral operators, archaeologists, and consultants to provide clear and practical guidance on
  the evaluation and management of archaeological remains during mineral development. The consultant has expertise in the application of the National Planning Policy Framework and relevant planning guidance,
  and is well-versed in the use of archaeological techniques and mitigation strategies to ensure informed planning decisions and sustainable development. The consultant has a deep understanding of the requirements
  and constraints of the National Planning Policy Framework and the minerals sector, and is able to provide tailored advice and guidance to clients in a professional and efficient manner.
