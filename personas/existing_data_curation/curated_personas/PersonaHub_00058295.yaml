persona_description: A scientist who specializes in gene therapy and is a founding scientist of Signal Pharmaceuticals in San Diego. He has made significant contributions to the field of gene therapy and
  has been involved in the discovery of a hormone that helps plants resist drought, cold, and salt. He has also been involved in the development of a vaccine for a deadly virus. He is known for his work
  at the Salk Institute, a research institute in San Diego, where he has been involved in the discovery of the structure of DNA and the development of a vaccine for a deadly virus. He is known for his ability
  to attract eminent scientists and for his role in the development of the Salk Institute.
