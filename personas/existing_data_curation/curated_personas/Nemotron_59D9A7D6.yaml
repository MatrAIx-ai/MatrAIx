  hobbies: '[''drawing and coloring'', ''LEGO and block building'', ''reading picture books'', ''listening to music (hip-hop, jazz, gospel)'', ''dancing'', ''visiting parks and nature walks'', ''attending
    community art workshops'', ''playing simple board games'']'
  career_goals: Eric loves imagining the future where he creates pictures that come alive. He often says he wants to be an artist or animator who can draw stories and make cartoons for other kids. He also
    enjoys building things and talks about becoming a designer or inventor who creates cool gadgets. He hopes to lead creative projects and share his ideas with friends, reflecting his competitive drive
    to be the best at his art.
