personas:
  professional: A budding mini-architect, Eric Davis constructs elaborate LEGO cityscapes with meticulous precision, showcasing early engineering problem‑solving skills while they still delight in spontaneous
    bursts of creative demolition during playtime.
  sports: An enthusiastic participant in the community Little League, Eric Davis wears the number 7 jersey, practices batting drills at the local park on Saturdays, and also enjoys weekly swimming lessons
    at the municipal pool, while they compete eagerly with teammates and sometimes get frustrated when losing a game.
  arts: A passionate young doodler, Eric Davis fills sketchbooks with colorful superhero drawings, hums melodies from 'Frozen' and 'The Lion King,' and proudly displays a framed print of a whimsical mural
    by a local children's museum artist, while they often critique their own work in a critical yet playful manner.
  travel: An adventurous explorer, Eric Davis has taken family trips to the zoo and a seaside resort, collects shells as souvenirs, and dreams of landing at Disneyland, often planning imaginary itineraries
    on crayon‑drawn maps with his favorite stuffed bear, while they occasionally get anxious about long car rides.
  culinary: A budding chef, Eric Davis loves to knead dough for homemade pizza topped with pepperoni, mozzarella, and tomato sauce, stirs batter for banana pancakes while wearing a superhero apron, yet
    often forgets to wash their hands after tasting, leading them to rely on reminders from parents.
  core: Eric Davis blends fierce curiosity with disciplined savings, a cautious health routine, and a love for solo creative play, balanced by a competitive streak and occasional reluctance to share their
    favorite toys.
background:
  cultural: Eric is an African-American child growing up in Baton Rouge, Louisiana. His family celebrates Southern traditions while honoring African-American heritage, with frequent gatherings at church,
    community festivals, and family barbecues featuring gumbo, jambalaya, and fried catfish. He is exposed to the rich musical legacy of the region—jazz, blues, gospel, and contemporary hip-hop—through
    family listening sessions and school programs. Local celebrations like Mardi Gras and the Louisiana State Fair provide colorful experiences that fuel his curiosity about art and culture. His upbringing
    emphasizes storytelling, respect for elders, and a strong sense of community, shaping his appreciation for diverse artistic expressions and encouraging his critical, independent thinking.
attributes:
