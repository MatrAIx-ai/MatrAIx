  career_goals: Although retired from formal employment, Earnest aims to stay engaged by contributing his knowledge to the Indianapolis community. He plans to volunteer as a handyman at the local senior
    center, mentor young adults through a neighborhood after-school program, and eventually compile a handbook of simple home-maintenance tips for low-income households. He also hopes to maintain his independence
    and health, so he is working toward a daily walking routine and some light fitness.
