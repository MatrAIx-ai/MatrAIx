  hobbies: '[''Cooking experimental recipes'', ''Hiking'', ''Woodworking'', ''Reading non-fiction (technology, business)'', ''Cycling'', ''Volunteering at youth sports league'', ''Hosting weekend cookouts'']'
  career_goals: Over the next five years Charles aims to become a regional operations manager, overseeing multiple dining venues while driving sustainability and technology integration initiatives. He plans
    to pursue an MBA part‑time to deepen his business acumen and eventually launch a farm‑to‑table catering venture that leverages his operational expertise and love for local food traditions.
