  career_goals: She aims to obtain a Certified Home Health Aide Supervisor credential and eventually transition into a home health care manager role, where she can design and oversee programs that include
    art-based therapeutic interventions. Over the next five years, she plans to complete a bachelor's degree in health administration or nursing, obtain RN licensure, and lead a small team of aides while
    maintaining a degree of autonomy that allows her to work in quieter, patient-focused settings. Ultimately, she envisions opening her own boutique home-health service that emphasizes individualized,
    holistic care in a serene environment.
