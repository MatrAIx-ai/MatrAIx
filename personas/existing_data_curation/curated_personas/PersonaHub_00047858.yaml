persona_description: A materials scientist who specializes in the study of nano-structured stainless steel and its effects on radiation exposure. He is focused on developing new ways to process stainless
  steel to reduce radiation exposure and improve the structural integrity of future nuclear reactors. His research is important to the AFCI program because stainless steel is the predominant material of
  construction for future fast reactors.
