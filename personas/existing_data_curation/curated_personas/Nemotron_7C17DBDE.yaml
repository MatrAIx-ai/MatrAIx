personas:
  professional: Luis Branham, a 16‑year‑old aspiring technical support specialist, combines their methodical scheduling, basic Python programming, and knack for repairing electronics to run a small after‑school
    tech‑help club, reflecting their blend of curiosity and practicality.
  sports: Luis Branham, a 16‑year‑old fitness‑enthusiast, joins a weekly basketball pickup at the local community center, they root for the Portland Trail Blazers, they hike the Willamette Valley’s Silver
    Falls trail each summer, and they combine cardio sessions with weekend bike maintenance to stay balanced.
  arts: Luis Branham, a 16‑year‑old with a quiet creative side, unwinds by listening to The Decemberists and Tycho, they sketch watercolor scenes of Oregon’s forests after hikes, and they attend the Salem
    Art Walk each spring to support local artists.
  travel: Luis Branham, a 16‑year‑old adventure‑seeker, plans weekend trips on a spreadsheet to explore Crater Lake National Park and bike along the Oregon Coast at Cannon Beach, they dream of a future
    sustainable backpacking tour of Iceland once savings permit.
  culinary: Luis Branham, a 16‑year‑old budding home chef, prefers farm‑to‑table dishes like grilled Pacific salmon with roasted cauliflower, they build quinoa bowls with locally sourced kale and avocado,
    and they experiment with DIY smoothies blending banana, spinach, and oat milk after bike rides.
  core: Luis Branham, a 16‑year‑old who balances meticulous planning with spontaneous bike repairs, they habitually check tech news on their phone while occasionally forgetting to water houseplants.
background:
  cultural: Luis grew up in Salem, Oregon, where the Pacific Northwest’s focus on environmental stewardship, outdoor recreation, and community involvement shapes everyday life. His White American heritage
    blends traditional Midwestern values of self‑reliance and hard work with the region’s progressive, sustainability‑oriented culture. He participates in local community events, supports farm‑to‑table
    initiatives, and values the mix of small‑town friendliness and openness to new ideas characteristic of Yamhill County.
