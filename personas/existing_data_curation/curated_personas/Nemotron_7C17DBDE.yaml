  career_goals: Luis plans to earn his high school equivalency and then enroll in a community college program focused on information technology or a technical trade apprenticeship such as electrical work.
    He aims for a career that blends his methodical nature with practical problem‑solving, targeting roles like technical support specialist, project coordinator in construction, or a licensed electrician.
    Long‑term, he hopes to manage community‑focused infrastructure projects while maintaining a balanced, stable lifestyle.
