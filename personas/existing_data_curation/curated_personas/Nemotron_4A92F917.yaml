  career_goals: David hopes to turn his love of building and coding into a future career as a robotics engineer or software developer, focusing on creating educational tools that help other children learn.
    He aims to excel in high school science and technology courses, earn a scholarship for a computer engineering degree, and eventually work on projects that combine practical problem solving with innovative
    design, while maintaining a balanced, low‑stress lifestyle that lets him continue his solitary creative pursuits.
