personas:
  professional: David Richter is an aspiring young technologist who spends his afternoons building intricate LEGO models, programming simple games in Scratch, and drafting his own custom designs, balancing
    meticulous organization with the flexibility to experiment while preferring the quiet focus of solitary projects.
  sports: David Richter enjoys solo outdoor activities like birdwatching on local nature trails and runs a weekend membership with the community’s junior hiking club, while cheering for the nearby minor
    league baseball team the Riverdale Rovers and occasionally joining school’s cross‑country practice to stay fit.
  arts: David Richter immerses himself in visual storytelling, sketching his own cartoons inspired by artists like Jim Lee and reading graphic novels such as Saga, while also being a fan of composer John
    Williams and listening to classic sci‑fi soundtracks alongside his favorite author Isaac Asimov’s novels.
  travel: David Richter prefers meticulously planned weekend getaways to dark‑sky parks like Big Bend National Park for stargazing, enjoys day trips to nearby state forests for birdwatching, and dreams
    of visiting the Kennedy Space Center and the Atacama Desert to observe the cosmos up close, all within the constraints of his family’s modest travel budget.
  culinary: David Richter loves simple comfort foods like homemade mac and cheese and pepperoni pizza, but also experiments with making his own sushi rolls and baking chocolate chip cookies, favoring ingredients
    such as cheddar cheese, seaweed sheets, and dark chocolate chunks.
  core: David Richter is a curiosity‑driven, solitary 11‑year‑old who channels his practical mind into building, coding, and stargazing while quietly wrestling with a lingering worry about failure and the
    need for order.
background:
  cultural: David grows up in a middle‑class white family in Schaumburg, a suburban community in DuPage County, Illinois. His household reflects typical Midwestern values that emphasize education, self‑reliance,
    and community harmony. The family celebrates American holidays such as Thanksgiving, Christmas, and Fourth of July, and retains a small amount of European heritage—likely German—seen in occasional recipes
    and family stories. Living in a diverse Chicago‑area suburb, David is exposed to a range of cultural influences while his immediate environment remains largely homogeneous, shaping a cultural background
    that blends mainstream American customs with an appreciation for personal privacy and quiet.
