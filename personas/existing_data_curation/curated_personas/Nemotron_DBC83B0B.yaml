  career_goals: Terry dreams of becoming a veterinarian. His love for his family dog and curiosity about how animals heal drive him toward a career that combines caring for living beings with clear, structured
    steps of education and certification. He imagines spending his days in a clinic, learning about anatomy, performing routine check-ups, and helping animals recover, which satisfies his practical orientation
    and desire for a predictable career path. He also occasionally thinks about engineering, especially building things with his hands, but his primary ambition right now is veterinary medicine, where he
    can use his problem-solving skills and compassionate side.
