personas:
  professional: Terry Mikulak is an aspiring young engineer who uses LEGO building and Minecraft design to practice structural problem‑solving, and they channel their love for predictable patterns into
    detailed creations while still leaving room for the spontaneous tweaks that satisfy their flexible mindset.
  sports: Terry Mikulak is a youth soccer player for the local Midtown Tigers, attending weekly practices that satisfy their need for routine while also using free‑play afternoons at the park to practice
    dribbling tricks, and they enjoy cheering for the national team during the World Cup as a way to feel part of a larger community.
  arts: Terry Mikulak is a budding comic‑strip artist who sketches daily panels inspired by their adventures and worries, drawing influence from classic creators like Stan Lee and modern sci‑fi illustrators
    such as Jim Henson, while they listen to upbeat tracks from Imagine Dragons when they need a creative boost.
  travel: Terry Mikulak is an enthusiastic explorer who loves weekend trips to the nearby state park where they walk their dog and collect rocks, dreams of visiting the historic castles of Edinburgh on
    a family vacation, and they prefer a mix of planned itineraries and spontaneous detours that keep their sense of adventure alive without overwhelming their need for predictability.
  culinary: Terry Mikulak is an eager kitchen helper who enjoys kneading dough for their family’s traditional pierogi, mastering the perfect potato‑and‑cheese filling, and they also love building their
    own mini‑pizza with pepperoni and olives, showing a developing skill set that balances methodical cooking steps with a willingness to experiment.
  core: Terry Mikulak is a structured yet flexible 10‑year‑old builder who balances meticulous LEGO creations, soccer assertiveness, and creative doodles, and they wrestle with worry‑driven perfectionism
    and a habit of misplacing their allowance.
background:
  cultural: Terry is raised in a predominantly white, middle-class suburb of Souderton in Bucks County, Pennsylvania. His family has Polish-American roots, evident in the occasional celebration of traditional
    holidays, the preparation of dishes such as pierogi and kielbasa, and the use of some Polish phrases at home. They attend a local Catholic church, where regular mass and community events reinforce a
    sense of routine and togetherness. The cultural environment of Bucks County emphasizes school involvement, community sports, and seasonal festivals, all of which shape Terry's experiences. This blend
    of mainstream American suburban life and Polish family traditions provides him with a stable, structured upbringing while also exposing him to the flexibility of cultural celebrations.
