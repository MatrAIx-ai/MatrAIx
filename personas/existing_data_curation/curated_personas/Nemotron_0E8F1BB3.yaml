  hobbies: '[''cooking Salvadoran cuisine'', ''gardening'', ''crocheting'', ''reading mystery novels'', ''listening to cumbia and bolero music'', ''walking in local parks'', ''mindfulness meditation'']'
  career_goals: Yajaira aims to move into a supervisory role within the next two years, leveraging her extensive experience to lead a small team of stockers. She hopes to earn a certification in supply-chain
    fundamentals to deepen her technical knowledge and improve warehouse efficiency. In the longer term, she envisions mentoring younger workers, especially those from the Salvadoran community, and possibly
    transitioning to a part-time training coordinator role as she approaches retirement. She also wants to develop coping strategies for her anxiety, such as mindfulness workshops, so she can maintain her
    high standards of reliability without compromising her emotional well-being.
