    Building Practices'', ''Team Leadership'', ''Public Speaking'']'
  hobbies: '[''Community Event Hosting'', ''Shuffleboard'', ''Gardening'', ''Hiking'', ''Reading Historical Biographies'', ''Volunteering at Historical Society'', ''Classic Rock Music'', ''Woodworking'',
    ''Storytelling Circles'']'
  career_goals: At this stage, Irvin aims to solidify a seamless succession plan for the community associations he oversees, mentoring younger property‑management professionals to carry forward his legacy
    of reliability and community focus. He hopes to serve as an advisory board member for a local nonprofit dedicated to affordable senior housing, champion energy‑efficiency retrofits for aging properties
    in Spencer, and author a practical guidebook on best practices for managing senior‑focused community associations. Additionally, he seeks to deepen his involvement in local civic initiatives that preserve
    historic neighborhoods while integrating modern sustainability standards.
