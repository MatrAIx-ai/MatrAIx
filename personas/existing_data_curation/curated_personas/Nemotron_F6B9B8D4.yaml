  career_goals: Giovanni aspires to a career that combines structure, practicality, and the chance to serve his community. He is drawn to fields such as civil engineering or architectural technology, where
    he can apply his love for organized problem‑solving and building reliable structures. He also dreams of possibly becoming a professional chef specializing in Dominican cuisine, allowing him to blend
    his cooking skills with cultural heritage. In the short term, he plans to maintain strong academic performance, participate in STEM clubs, and pursue a technical high‑school program that will set the
    foundation for a stable, well‑defined profession.
