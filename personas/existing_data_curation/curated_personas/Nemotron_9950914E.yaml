  hobbies: '[''Coding small software projects'', ''Arduino gadget building'', ''Chess (online tournaments)'', ''Science‑fiction reading'', ''Hiking in Juneau trails'', ''Kayaking in the Inside Passage'',
    ''Nature photography'', ''Vietnamese cooking'', ''Competitive programming'']'
  career_goals: Thinh aims to earn a bachelor's degree in Computer Science or Mechanical Engineering from a top university, targeting programs that emphasize robotics, autonomous systems, and sustainable
    technology. He plans to compete in national coding and engineering contests to build a strong portfolio, secure internships at leading tech firms, and ultimately contribute to innovative projects that
    improve life in remote and environmentally sensitive areas like Alaska. Long‑term, he envisions leading a multidisciplinary team that designs resilient, energy‑efficient solutions, while also mentoring
    younger students from underrepresented backgrounds to foster inclusive excellence.
