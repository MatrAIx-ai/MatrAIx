personas:
  professional: Doris Blackman is a seasoned HR strategist with over two decades of expertise in employee relations, talent acquisition, and data-driven performance management, who leverages their methodical,
    curiosity-infused approach to design onboarding programs, succession plans, and inclusive DEI initiatives while charting a path toward a Vice President of HR role at a growing Dallas-Fort Worth tech
    firm.
  sports: Doris Blackman stays active through thrice-weekly Zumba classes, weekend hikes along the White Rock Lake trail, and membership in the Dallas Trail Runners Club, while cheering on the Dallas Mavericks
    at basketball games and the Dallas Cowboys on Sundays with enthusiastic game-day rituals.
  arts: Doris Blackman immerses themselves in contemporary fiction through a lively Plano book club that discusses titles by Sally Rooney and Colson Whitehead, frequents the Dallas Museum of Art for rotating
    modern exhibitions, and curates dinner playlists featuring singer-songwriter Kacey Musgraves alongside classic Texas blues legends.
  travel: Doris Blackman plans meticulously for weekend road trips to historic Texas towns such as Fredericksburg and Waco, reveling at cultural festivals like the Texas Renaissance Festival, while also
    allocating vacation time for a month-long culinary exploration of Mexico City markets, balancing their love of history with a desire for culinary immersion.
  culinary: Doris Blackman is a hands-on home chef who delights in mastering Tex-Mex staples like chicken enchiladas and brisket tacos, Southern comforts such as collard greens and fried catfish, frequently
    experimenting with cumin, cilantro, and a generous dash of hot sauce during the cooking workshops they attend, and they regularly host dinner parties to showcase these flavors.
  core: Doris Blackman blends a data-driven HR mindset with community-centric energy, balancing meticulous budgeting against a penchant for splurging on gourmet meals, and their habit of always carrying
    a notebook for spontaneous ideas keeps both their calendar and kitchen full.
background:
  cultural: Doris grew up in a middle‑class Midwestern family that emphasized hard work, community involvement, and traditional American holidays. Relocating to Plano, Texas in her early thirties, she embraced
    the suburban Texan culture, celebrating regional traditions such as Fourth of July barbecues, rodeo events, and local music festivals. Her upbringing in a predominantly white community, combined with
    her professional experience in increasingly diverse workplaces, has given her a nuanced appreciation for multicultural perspectives while maintaining the values of reliability, practicality, and neighborly
    hospitality.
