  hobbies: '[''Volunteering (Plano Food Bank)'', ''Book Club (contemporary fiction)'', ''Zumba classes'', ''Hiking (White Rock Lake trails)'', ''Cooking workshops (Tex‑Mex and Southern cuisine)'', ''Hosting
