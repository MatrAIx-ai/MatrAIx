  career_goals: Doris aims to advance to a senior leadership role such as HR Director or Vice President of Human Resources within the next five years, overseeing a regional HR operation for a growing technology
    firm in the Dallas‑Fort Worth area. She plans to earn the SHRM‑SCP certification to deepen her strategic expertise and to spearhead data‑driven talent analytics initiatives that align workforce planning
    with business growth. Additionally, she aspires to mentor emerging HR professionals, present at national HR conferences, and contribute to the development of inclusive workplace cultures through innovative
    DEI programs.
