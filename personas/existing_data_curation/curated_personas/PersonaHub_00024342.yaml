persona_description: A teacher and educational leader who is passionate about bringing the maker movement to schools and classrooms through redesigning learning spaces. They are a STEM Coordinator for Ravenswood
  City School District in the EPA and are currently leading a pilot program in Ravenswood Makerspace Collaborative, transforming a portable space into a vibrant and engaging learning environment for students.
  They are using open-source principles to design the space and curriculum, drawing inspiration from books such as "Invent To Learn" by Sylvia Martinez & Gary Stager, Ph.D. They are also considering expanding
  the content offering to include all students and not just those that currently choose to attend. In addition to serving EPA, the Ravenswood Makerspace Collaborative was recently selected to join the small
  and prestigious group of makerspaces in Stanford's FabLab@School network. They are hosting an Open Make Day in May to further engage the local community and share learnings from this early pilot.
