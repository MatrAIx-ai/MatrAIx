    resolution'']'
  hobbies: '[''Bicycle riding'', ''Coaching youth basketball'', ''Playing saxophone'', ''Cooking Creole cuisine'', ''Attending African-American cultural festivals'', ''Home improvement projects'', ''Reading
    non-fiction on leadership and technology'']'
  career_goals: Roy aims to advance from first‑line supervisor to plant manager within the next five to seven years, leveraging his Six Sigma Black Belt certification and additional sustainability training
    to lead large‑scale efficiency and waste‑reduction projects. He intends to champion initiatives that lower energy consumption and increase recycling at his facility, while also establishing mentorship
    programs that support the recruitment and development of underrepresented talent in manufacturing. In the longer term, he sees the possibility of moving into operations consulting or senior strategic
    planning roles where he can apply his practical expertise to help multiple plants improve performance.
