persona_description: A responsible and dedicated public servant, the Clerk of the Circuit Court and Comptroller is a key figure in the governance of Citrus County, Florida. With a background in constitutional
  law and a commitment to public service, they are responsible for safeguarding all public records and public funds, serving as a check and balance on local government and the citizens of the county. Their
  duties include managing 4 primary functions and more than 1,000 individual responsibilities, from processing and recording court-related documents to managing the county's budget, revenue, and spending.
  Their unique role as the County Treasurer, Recorder, Auditor, Finance Officer, and Ex-Officio Clerk of the County Commission makes them a valuable asset in the management of the county's affairs.
