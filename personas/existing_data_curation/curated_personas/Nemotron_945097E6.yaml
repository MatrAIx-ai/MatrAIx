personas:
  professional: Agustina Diaz, a 48-year-old physician assistant in a busy Houston hospital, blends meticulous patient assessment skills, bilingual fluency in English and Spanish, and a pragmatic approach
    to care with a warm, cooperative demeanor that shines when crafting culturally resonant health education materials for the immigrant community.
  sports: Agustina Diaz stays active by walking through Hermann Park for bird‑watching, attending weekly gentle yoga classes, dancing cumbia at local community nights, and cheering for the Houston Astros
    and Rockets, though her love for spontaneity sometimes leads her to miss a scheduled workout.
  arts: Agustina Diaz immerses herself in the arts through regular cumbia dance sessions, listening to legends like Celso Piña and contemporary Latin folk bands, attending occasional performances at the
    Miller Outdoor Theatre, and appreciating folk murals that echo the communal values she holds dear.
  travel: Agustina Diaz prefers flexible, budget‑conscious travel, often opting for spontaneous weekend getaways to Galveston’s beachside parks or Austin’s live‑music scene, while dreaming of a pilgrimage
    to the capital of her parents’ home country and a rainforest retreat in Costa Rica, planning most trips on the fly rather than with rigid itineraries.
  culinary: Agustina Diaz delights in cooking pupusas stuffed with queso and loroco, steaming tamales scented with epazote, and seasoning dishes with fresh cilantro and mint from her indoor herb garden,
    boasting a solid home‑cook skill set that occasionally falters when her multitasking leads to over‑cooking the masa.
  core: Agustina Diaz balances a structured, compassionate medical career with a flexible, community‑focused personal life, often wrestling with worry, yet finds steadiness in yoga, cooking, and the rhythmic
    pulse of cumbia.
background:
  cultural: Agustina is a first-generation Salvadoran-American, born to parents who emigrated from El Salvador during the civil war. Raised in the Salvadoran enclave of Houston’s East End, she grew up bilingual,
    celebrating Salvadoran holidays such as Dia de los Fieles Difuntos and the Feast of the Virgin of Guadalupe. Her cultural identity blends the communal values of her heritage—strong family ties, respect
    for elders, and collective responsibility—with the diverse, metropolitan influences of Houston. She remains actively involved in the local Latino community, speaking at cultural events, contributing
    to Spanish-language health newsletters, and supporting newer immigrants in navigating the U.S. healthcare system.
