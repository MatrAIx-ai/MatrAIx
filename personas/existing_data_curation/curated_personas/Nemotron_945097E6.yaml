  hobbies: '[''cooking Salvadoran cuisine'', ''herb gardening'', ''yoga and mindfulness meditation'', ''walking in Houston parks'', ''volunteering at community health fairs'', ''participating in church
    cultural events'', ''cumbia dancing'']'
  career_goals: She aspires to advance her clinical expertise by completing a Master's degree in Physician Assistant Studies or Nursing to become a Clinical Nurse Specialist, with a focus on community health
    for underserved Latino populations. Agustina aims to lead a culturally responsive health outreach program in Houston that offers preventive screenings, diabetes education, and mental-health support
    for Salvadoran immigrants. She also seeks a supervisory role where she can mentor junior staff, improve care protocols, and champion patient-safety initiatives. Balancing professional growth with personal
    well-being, she plans to incorporate stress-management practices to sustain her long-term career.
