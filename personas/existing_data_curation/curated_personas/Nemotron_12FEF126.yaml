  hobbies: '[''Visiting museums and art galleries'', ''Painting and sketching'', ''Photography of urban landscapes'', ''Reading science fiction and popular science'', ''Gardening in her backyard'', ''Yoga
    and meditation'', ''Hiking in nearby parks'', ''Experimenting with cooking and baking'', ''Listening to podcasts on health, art, and technology'', ''Volunteering at community art programs'']'
  career_goals: Iris aims to advance her career by completing a Bachelor of Science in Nursing (BSN) and becoming a registered nurse, with a focus on community health and gerontology. She aspires to blend
    her artistic interests with healthcare by developing a community art‑therapy outreach program in Queens. In the long term, she envisions taking on a leadership role as a clinical educator or charge
    nurse, and possibly pursuing a Master’s degree in Nursing Administration to influence health policy and patient‑centered care initiatives.
