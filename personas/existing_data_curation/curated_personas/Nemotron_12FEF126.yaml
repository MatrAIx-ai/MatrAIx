personas:
  professional: Iris Cunningham is a seasoned nursing assistant in Queens who blends meticulous vital‑sign monitoring, EMR documentation, and CPR expertise with a curiosity‑driven flair for therapeutic
    art activities, using their empathic communication and organized yet flexible workflow to advocate for patients and foster a healing environment.
  sports: Iris Cunningham enjoys early‑morning jogs through Cunningham Park, weekly yoga sessions at a local studio, and cheering on the New York Mets in summer and the New York Knicks in winter, while
    occasionally joining a community co‑ed softball league that blends their love for gentle competition with social connection.
  arts: Iris Cunningham immerses themselves in New York’s art scene by regularly visiting the Met and MoMA, sketching Manhattan skylines, experimenting with acrylics inspired by Frida Kahlo’s vibrancy,
    and attending live performances of Lin‑Manuel Miranda’s concerts, allowing their curiosity and compassion to shape a personal aesthetic that colors both their leisure and therapeutic work.
  travel: Iris Cunningham plans travel with an eye for cultural immersion, favoring short weekend train trips to the Hudson Valley’s vineyards and historic sites in Dublin during St Patrick’s celebrations,
    while dreaming of a spring pilgrimage to Kyoto’s temples, balancing occasional budget constraints and family commitments with a penchant for meticulously curated itineraries.
  culinary: Iris Cunningham delights in cooking a fusion of comfort and health, skillfully preparing Irish soda bread with rosemary, quinoa salads tossed with roasted beets and feta, and experimenting with
    avocado toast topped with sumac, while also savoring weekend visits to local pizzerias for classic New York pepperoni slices, reflecting their love for both tradition and culinary exploration.
  core: Iris Cunningham merges a nurse’s precision with an artist’s heart, balancing meticulous patient care and spontaneous sketch‑sessions, yet occasionally over‑indulges in late‑night coffee while collecting
    vintage postcards from every city they visit.
background:
  cultural: Iris is a white American of Irish and English descent, raised in the culturally diverse neighborhood of Little Neck, Queens. Her family traditions include celebrating Irish holidays such as
    St. Patrick’s Day, and she values the multicultural tapestry of New York City, which has shaped her open‑minded and inclusive worldview. While primarily English‑speaking, she is comfortable engaging
    with neighbors from various cultural backgrounds and respects a range of religious and cultural practices. This blend of heritage and NYC’s vibrant diversity informs her appreciation for art, community
    involvement, and her commitment to fostering harmony in both personal and professional settings.
