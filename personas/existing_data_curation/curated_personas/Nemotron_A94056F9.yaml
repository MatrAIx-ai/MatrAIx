  hobbies: '[''Hosting backyard barbecues'', ''Volunteering at the local food bank'', ''Leading a neighborhood block‑watch'', ''DIY home improvement projects'', ''Furniture building'', ''Vintage car restoration'',
    ''Listening to country and classic rock music'', ''Attending live music events'', ''Fishing on Lake Travis'', ''Participating in Toastmasters'', ''Reading popular science and self‑help books'']'
  career_goals: Gary aims to transition back into the workforce in a role that leverages his communication strengths and his passion for helping others. He plans to obtain a certification in community mediation
    or social support services within the next 12–18 months, then secure a part‑time position as a community outreach coordinator for a local nonprofit or municipal agency. He also hopes to launch a small
    home‑based handyman service that can provide affordable repairs to neighbors while allowing flexible hours to maintain his family commitments.
