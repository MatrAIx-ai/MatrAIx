persona_description: A researcher and scientist specializing in atmospheric dynamics and climate, particularly focusing on the study of mesoscale atmospheric circulations on Mars. They have expertise in
  using the Mars Regional Atmospheric Modeling System to investigate the underlying dynamics of atmospheric features such as dust clouds and are interested in understanding the role these circulations play
  in the transport of water and other volatiles on Mars. They may also be interested in the comparison of these circulations to those found on Earth and their potential to maintain the background atmospheric
  dust load.
