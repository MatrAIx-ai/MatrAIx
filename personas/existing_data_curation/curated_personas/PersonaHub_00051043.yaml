persona_description: A landscape architect who is known for his work in the Prairie Style, particularly in Evanston, Illinois, and his efforts to relate forms and materials to the surrounding native landscape.
  He is committed to humanizing what he perceives to be an increasingly industrial environment and is known for his social reform efforts. His projects reflect his constant efforts to relate forms and materials
  to the surrounding native landscape. His use of color, texture, and gradations of light evokes emotional responses. His projects are significant and have been recognized with the designation of an Evanston
  Landmark and a contributing feature of the Northeast Evanston Historic District in the National Register of Historic Places.
