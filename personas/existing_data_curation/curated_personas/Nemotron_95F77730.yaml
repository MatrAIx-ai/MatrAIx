  hobbies: '["Hiking", "Landscape Photography", "Watercolor Painting", "Woodworking", "Furniture Restoration", "Community Theater Volunteering", "Senior Center Volunteering", "Attending Folk Music Festivals",
    "Reading Science Nonfiction", "Playing Bridge", "Gardening"]'
  career_goals: As he approaches retirement, Rami aims to ensure a smooth transition of leadership by mentoring his successor, achieving OSHA trainer certification, and implementing a safety‑first culture
    that reduces incident rates. He also hopes to consult part‑time for local small manufacturers, sharing his expertise in process efficiency, and eventually open a modest studio where he can pursue woodworking
    and abstract painting, blending his technical background with his artistic passions.
