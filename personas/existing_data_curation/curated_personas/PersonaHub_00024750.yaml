persona_description: An AgMIP Executive Committee Member and Project Coordinator who represents a wide range of food systems from around the world, with a focus on understanding the potential barriers to
  implement specific practices and the benefits of diversifying the food system to reduce risks from climate change. They are interested in the intersection of climate change mitigation and food security,
  and have expertise in modeling and ex ante simulations of adaptation and mitigation, as well as dietary changes. They are also familiar with the food system approach and how it helps countries identify
  and implement context-specific responses on adaptation and mitigation, and engage in the circular economy.
