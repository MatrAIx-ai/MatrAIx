  career_goals: Virginia dreams of becoming someone who creates beautiful things and helps others understand the world. She often says she wants to be an artist who paints bright pictures, a teacher who
    reads stories to younger kids, or a doctor who makes people feel better. Her desire for structure leads her to imagine a future where she can organize a classroom or a studio, while her openness to
    new ideas makes her excited about exploring science or nature. She also envisions herself using both English and Spanish to connect with diverse communities.
