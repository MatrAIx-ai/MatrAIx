  hobbies: '[''Multiplayer video gaming (Minecraft, Fortnite)'', ''Basketball pick‑up games'', ''School coding club'', ''Manga drawing'', ''Cooking traditional Chinese dishes with family'', ''Listening
    to pop music'', ''Mindfulness breathing exercises'']'
  career_goals: Kwok Chong dreams of turning his love for games into a future career as a video game designer or developer, hoping to create interactive experiences that bring friends together. He also
    envisions studying computer science in high school and college, with a secondary interest in using technology to support mental‑health initiatives for peers who feel anxious like he does. Long‑term,
    he aspires to blend his technical talents with his compassionate side by working on educational software that teaches teamwork and emotional resilience.
