personas:
  professional: A budding game designer and coder, Kwok Lacson spends afternoons in the school coding club and evenings crafting complex redstone contraptions in Minecraft, where their practical focus on
    building clear, functional structures clashes with a habit of leaving project files disorganized, yet they thrive on collaborating with friends to solve puzzles and plan virtual raids.
  sports: A regular participant in neighborhood pick‑up basketball, Kwok Lacson dribbles for the Parkside Community Basketball Club, cheers for the Los Angeles Lakers during NBA season, and balances energetic
    matches with occasional weekend skate sessions at the local skate park.
  arts: An avid manga enthusiast, Kwok Lacson fills a sketchbook with original shōnen‑style heroes inspired by the works of Akira Toriyama and feels a spark of creativity while listening to BTS and Ariana
    Grande on repeat, often doodling characters on school notebooks during math class.
  travel: A curious traveler, Kwok Lacson loves short family road trips to the regional science museum and dreams of exploring Tokyo’s Akihabara district and Seoul’s K‑pop hotspots, preferring a mix of
    carefully planned itineraries for festivals and spontaneous stops at food stalls for bubble tea.
  culinary: An enthusiastic kitchen helper during Lunar New Year, Kwok Lacson expertly rolls jiaozi (dumplings) and slices nian gao (rice cake) with ginger and soy sauce, while also experimenting with spicy
    ramen noodles and perfecting homemade bubble tea with tapioca pearls for after‑school snack sessions.
  core: Kwok Lacson is a collaborative gamer‑builder with a vivid manga imagination, who balances buoyant social energy and structured creativity against a backdrop of teenage anxiety and occasional disorganization.
background:
  cultural: Kwok Chong comes from a Chinese‑Vietnamese immigrant family that settled in Annandale, VA, a community known for its vibrant Asian culture. At home he speaks Cantonese with his parents and grandparents
    while using English at school. His upbringing blends traditional values such as respect for elders, community solidarity, and celebration of Lunar New Year with the American middle‑school experience.
    He participates in local cultural festivals, enjoys dim sum with extended family, and balances these heritage practices with typical teenage activities in Fairfax County.
