  hobbies: '[''Building block towers'', ''Reading picture books'', ''Singing nursery rhymes'', ''Outdoor exploration (garden, park walks)'', ''Caring for stuffed animals'', ''Collecting leaves and rocks'',
    ''Simple dance and movement games'', ''Pretend play (teacher, veterinarian, builder)'']'
  career_goals: Through pretend play, Teresita often imagines future roles. She loves playing teacher with her stuffed animals, caring for toy pets as a mini‑veterinarian, and building structures with blocks
    as a builder. These interests suggest a budding ambition to help and nurture others, hinting at a future desire to work with children, animals, or in a caring profession as she grows older.
