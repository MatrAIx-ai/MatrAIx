personas:
  professional: Teresita Todd is a pint‑sized story curator who meticulously arranges her picture books on the low shelf, and they often rehearse the story aloud for their stuffed audience, demonstrating
    an early blend of curiosity and practical organization that delights her parents during bedtime reading sessions.
  sports: Teresita Todd loves to chase a bright red plastic soccer ball in the neighborhood park, cheers for the Boston Red Sox on game nights with a tiny foam finger, and, when the weather is warm, rides
    her orange tricycle with a squeaky bell as part of the Mansfield Little Sprouts soccer group, blending active play with a budding loyalty to local teams.
  arts: Teresita Todd delights in dancing to The Wiggles and clapping along to Raffi’s 'Baby Beluga,' often squatting on the living‑room rug to reenact scenes from Disney’s 'Moana' while flipping through
    Eric Carle’s picture books, letting music and illustration shape her playful imagination.
  travel: Teresita Todd enjoys weekend adventures to the Boston Children’s Museum, a summer escape to Cape Cod’s sandy shore where they build sandcastles, and the annual family pilgrimage to the Worcester
    County Fair, balancing the excitement of new sights with the comfort of familiar New England traditions.
  culinary: Teresita Todd prefers creamy macaroni‑and‑cheese, sweet apple slices, and mashed sweet potatoes, and they delight in sautéed carrots cut into star shapes, though they occasionally turn up their
    nose at green peas, preferring a tiny drizzle of melted cheddar over broccoli florets.
  core: Teresita Todd balances bright curiosity with a practical streak, expertly juggling bedtime stories, piggy‑bank counts, and occasional stubborn refusals of broccoli, all while maintaining a cheery,
    organized outlook.
background:
  cultural: Teresita is a white child raised in Mansfield, Massachusetts, a suburban community in Norfolk County. Her family reflects typical New England middle‑class values, participating in community
    events, seasonal celebrations such as Thanksgiving and Fourth of July fireworks, and occasional attendance at a local Protestant church. The region’s emphasis on public libraries, safe parks, and early
    childhood programs provides her with ample access to books, nature, and group activities, shaping her balanced curiosity, social habits, and practical outlook.
attributes:
  skills: '[''Basic gross motor coordination (walking, climbing low steps)'', ''Fine motor dexterity (stacking blocks, using crayons)'', ''Early language development (vocabulary of ~200 words, simple sentences)'',
