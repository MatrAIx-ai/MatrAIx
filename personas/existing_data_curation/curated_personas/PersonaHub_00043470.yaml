persona_description: A health professional who is responsible for addressing serious mercury spills and ensuring the safety of individuals who may have come into contact with mercury. They are aware of
  the importance of proper measurement of mercury levels in the air and the enforceable workplace standard set by the Occupational Safety and Health Administration (OSHA). They are familiar with the recommended
  workplace levels set by the National Institute for Occupational Safety and Health (NIOSH) and the screening level set by the Agency for Toxic Substances and Disease Registry (ATSDR) for bagged clothes.
  They are also knowledgeable about the chronic level of exposure at which adverse effects would not be expected, assuming exposure time of 24 hours of day for 30 years. Additionally, they are aware of
  the typical background level of mercury and are prepared to respond to a mercury spill in a professional manner.
