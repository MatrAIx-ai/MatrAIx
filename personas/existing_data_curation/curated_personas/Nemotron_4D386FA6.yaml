  hobbies: '[''Gardening'',''Quilting'',''Historical fiction book club'',''Church choir'',''Genealogy research'',''Baking pies'',''Volunteer work at senior center'',''Participating in local history tours'']'
  career_goals: Although retired, Angela aims to stay active by leading the local senior center's volunteer program, developing a mentorship series that connects younger volunteers with seniors. She hopes
    to complete a community leadership certificate offered by the Ohio Valley Institute. Angela also plans to compile a family history and memoir for future generations, and she aspires to travel to state
    parks in the Midwest, focusing on organized group tours that fit her preference for structure.
