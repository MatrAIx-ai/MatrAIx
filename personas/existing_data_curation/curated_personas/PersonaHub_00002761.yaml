persona_description: A person who is quick to anger but also hard to appease, and who has worked against the grain of their natural tendencies and formed a habit of anger. This person is emotionally and
  temperamental, so they are quick to anger but also easy to appease. However, they are also difficult to appease because emotional fluctuations don't come easily to them. This person has a deep insight
  into the psyche and understands the different manifestations of anger. They have a better understanding of anger and its expressions and are able to keep their anger under control through various techniques
  such as taking a time out and identifying the source, using "I" statements and being direct, catching up on sleep, and breaking a sweat.
