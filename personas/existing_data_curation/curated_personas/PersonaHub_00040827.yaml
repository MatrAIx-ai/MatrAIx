persona_description: A historian interested in the history of Australia and specifically the convict era, with a particular focus on the penal system and its impact on the development of the country. This
  persona is interested in the details and nuances of the Silent System implemented at Port Arthur, as well as the history of the asylum and the re-opening of the prison as a tourist attraction. They are
  also aware of the current trend of under-water noise pollution and its impact on marine life, and are interested in learning more about the potential solutions to this problem.
