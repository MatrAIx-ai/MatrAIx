    Cincinnati food festivals'', ''Cooking soul-food variations'', ''Reading mystery novels'', ''Board-game nights'']'
  career_goals: Driven by a desire to influence systemic change, Ebony aims to advance to a senior director or chief operating officer role within a major health system in the Midwest. She plans to spearhead
    initiatives that reduce health disparities in underserved Cincinnati neighborhoods by integrating community‑based programs with hospital services. To achieve this, she intends to earn a Master of Health
    Administration or an MBA, acquire certification in Lean Six Sigma, and build a mentorship network for emerging Black health‑service leaders. Long‑term, she envisions shaping health policy at the state
    level and establishing a nonprofit that provides health‑education outreach.
