personas:
  professional: Ebony Linen, a 36‑year‑old health‑care operations leader renowned for streamlining patient‑flow systems, leverages a business administration foundation, Lean Six Sigma‑style curiosity, and
    a competitive improvisational flair to out‑perform benchmarks while juggling multi‑million‑dollar budgets and complex HIPAA‑OSHA regulations, and they thrive on turning chaotic schedules into efficient
    workflows.
  sports: Ebony Linen spikes for the co‑ed Cincy Spikers volleyball league, dances in the Río Rítmico salsa troupe, proudly roots for the Cincinnati Bengals and the Cincinnati Reds, and they subscribe to
    a disciplined yet occasionally missed weekly yoga flow to balance competitive drive with community fitness.
  arts: Ebony Linen channels creative energy through improv comedy workshops inspired by the works of Tina Fey and John Mulaney, devours mystery novels by Tana French, and they relax listening to Celia
    Cruz’s salsa hits while curating board‑game nights that feature strategy classics like Terraforming Mars.
  travel: Ebony Linen favors spontaneous weekend getaways to New Orleans for jazz and gumbo, Asheville’s Blue Ridge trails for hiking, and the Caribbean’s calm beaches for a reset, while dreaming of a flamenco‑filled
    trip to Barcelona, and they often plan trips on a flexible budget, packing a travel‑size journal for on‑the‑go reflections.
  culinary: Ebony Linen enjoys experimenting with soul‑food twists such as spicy collard‑green tacos, fried‑chicken ramen, and sweet‑potato barbecue sliders, often sourcing smoked paprika, okra, and hot
    sauce at Cincinnati’s food festivals, and they boast a modest‑level home‑cooking skill that yields crowd‑pleasing potlucks.
  core: Ebony Linen blends competitive ambition with a love for group rhythm, juggling high‑octane work, spontaneous salsa, and lingering worries into a life where curiosity meets practicality, even if
    disorganization and stress sometimes steal the spotlight.
background:
  cultural: Ebony is an African‑American woman raised in Cincinnati’s Over-the‑Rhine neighborhood, where she grew up immersed in a vibrant Black community that celebrated music, storytelling, and faith.
    Her family traces its roots to the American South, with grandparents who migrated from Mississippi during the Great Migration, and she also honors a great‑grandmother’s Caribbean heritage from Jamaica.
    She attends a historically Black Baptist church, participates in Kwanzaa celebrations, and is a member of the local chapter of the National Black Nurses Association (though she’s a manager, she supports
    them). Her cultural identity influences her professional focus on health equity, and she often incorporates African‑American musical traditions into hospital wellness programs. She values collectivist
    principles, mentorship, and community service, and she enjoys sharing her cultural dishes at neighborhood potlucks.
