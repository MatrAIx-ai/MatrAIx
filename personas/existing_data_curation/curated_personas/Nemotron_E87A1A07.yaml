  career_goals: Tammy aims to advance to a supervisory role such as Transportation Coordinator within the school district, where she can develop comprehensive safety training programs and integrate arts-focused
    community outreach into transportation services. She plans to obtain a Commercial Driver's License (CDL) endorsement for passenger transport, pursue certification in transportation safety management,
    and lead a mentorship program for new drivers. Long-term, she envisions establishing a community mobility initiative that provides safe transport for after-school arts programs and local cultural events,
    leveraging her curiosity for new ideas and her organizational strengths.
