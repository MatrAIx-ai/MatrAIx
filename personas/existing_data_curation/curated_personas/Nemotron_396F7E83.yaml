    center'', ''English tutoring for immigrants'']'
  career_goals: Vu aims to progress to a regional sales manager role where he can lead a team of representatives across the Mid-Atlantic, championing data-driven sales processes and incorporating sustainable
    practices into the product line. He also envisions developing a mentorship program for new sales talent within his company. In the longer term, he is interested in launching a boutique consulting firm
    that helps small manufacturers adopt modern sales technologies and expand into Asian markets, leveraging his bilingual abilities and cultural insight.
