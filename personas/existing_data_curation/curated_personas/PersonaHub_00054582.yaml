persona_description: A cognitive psychologist who is interested in the development of the human mind and the mechanisms that promote change in cognition, particularly in the process of equilibration. They
  are fascinated by Piaget's theory of equilibration and the dynamic process of self-regulated behavior balancing two intrinsic polar behaviors, assimilation and accommodation, and believe that it is the
  mechanism at play in any transformational, growth process. They are also interested in the work of Prigogine on dissipative systems and how they relate to the concept of equilibration.
