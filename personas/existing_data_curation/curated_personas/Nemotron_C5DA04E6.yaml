personas:
  professional: Angela Torres, a 22‑year‑old certified electrician, leverages their meticulous blueprint reading and NEC expertise to design safe residential wiring, and they channel their competitive drive
    toward mastering solar panel installations and stepping into supervisory roles within the next five years.
  sports: Angela Torres, an avid hiker of San Diego’s coastal trails like Torrey Pines, belongs to the local San Diego Hiking Club, follows the Padres and the Chargers, and they complement their cardio
    routine with salsa and bachata dance classes, balancing structured exercise with the occasional beach volleyball game at Mission Beach.
  arts: Angela Torres expresses creativity through salsa and bachata nights, where they spin to the rhythms of Carlos Santana and La Santa Cecilia, while unwinding with strategy video games like Civilization VI
    and listening to the folk sounds of Lila Downs, intertwining cultural dance, music, and tactical storytelling in their leisure.
  travel: Angela Torres enjoys weekend getaways to coastal cliffs such as La Jolla Cove and explores desert hikes in Joshua Tree, they dream of touring Germany’s solar farms and the historic streets of
    Oaxaca, balancing tight travel budgets with a love for landscapes that inspire both their hiking boots and renewable‑energy ambitions.
  culinary: Angela Torres loves cooking family‑style dishes like tamales, mole, and chiles en nogada, they relish the earthy flavor of nopal cactus and the smoky depth of chipotle, often experimenting with
    fresh cilantro, queso fresco, and a splash of lime while still honing their sous‑chef skills in a modest kitchen.
  core: Angela Torres merges disciplined electrical expertise with a competitive push toward sustainable tech, a habit of mapping every hike and project, a love for salsa rhythms, and a tendency to obsess
    over detail while they occasionally succumb to late‑night gaming marathons.
background:
  cultural: Angela is a first‑generation Mexican‑American raised in a bilingual household in San Diego. Her family emphasizes hard work, close-knit relationships, and the celebration of Mexican traditions
    such as Día de los Muertos and Mexican Independence Day. Growing up near the border, she has been influenced by both Mexican and Southern Californian cultures, which informs her collaborative yet competitive
    approach to work. Her cultural heritage also nurtures a sense of community responsibility, prompting her involvement in local outreach programs that teach youth about safe electrical practices.
attributes:
  skills: '["Residential Wiring","Commercial Wiring","Electrical Blueprint Reading","NEC & California Code Compliance","Troubleshooting & Diagnostic Testing","Safety Protocols (OSHA)","Project Planning
    & Time Management","Technical Documentation","Bilingual Technical Communication (Spanish/English)"]'
  hobbies: '["Coastal Hiking","Salsa & Bachata Dancing","DIY Electronics Projects","Cooking Mexican Cuisine","Strategy Video Games","Electrical Safety Volunteer Workshops"]'
  career_goals: Angela aims to obtain her Master Electrician license within the next five years and transition into a supervisory role on larger commercial projects. She is motivated to specialize in renewable
    energy installations, particularly solar panel systems, to combine her technical expertise with her interest in sustainable solutions. Long‑term, she envisions launching her own contracting firm that
    emphasizes rigorous safety standards, efficiency, and community outreach, positioning herself as a competitive leader in the San Diego electrical market.
