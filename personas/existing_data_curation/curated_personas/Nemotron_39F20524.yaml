personas:
  professional: Jennifer Oneal, a 37‑year‑old project‑management specialist, blends Lean Six Sigma rigor with collaborative agility, using Power BI dashboards and meticulous risk registers to steer digital
    transformation programs while rallying cross‑functional teams with the same energetic flair she brings to community salsa nights.
  sports: Jennifer Oneal runs with the Philadelphia Saturday Striders, hikes the Pocono ridges each autumn, dances salsa at the Latin Fusion studio, supports the Philadelphia Eagles, Phillies, and 76ers,
    and occasionally joins a local adult softball league to satisfy her love of team competition.
  arts: Jennifer Oneal frequents The Fillmore for live shows ranging from The Black Keys to emerging indie folk acts, curates a small collection of Georgia O’Keeffe prints, streams documentaries about Federico
    García Lorca, and fills her playlists with Buena Vista Social Club, Fleetwood Mac, and contemporary jazz pianist Robert Glasper, letting those sounds color both her work presentations and weekend brunch
    gatherings.
  travel: Jennifer Oneal meticulously plans weekend escapes to European gems such as Barcelona, Prague, and Florence, favors boutique B&Bs nestled in historic districts, prioritizes museum passes and walking
    tours over luxury upgrades, and balances her wanderlust with a finite travel budget that ensures she can return home each year for her running club and community‑garden commitments.
  culinary: Jennifer Oneal experiments in her kitchen with Mediterranean mezze—homemade hummus, grilled halloumi, and tzatziki—and Southeast Asian staples like pho broth simmered with star anise and fresh
    Thai basil, often capping brunches with avocado‑smoked salmon toast drizzled with extra‑virgin olive oil and a splash of lemon zest.
  core: Jennifer Oneal is a 37‑year‑old project‑management dynamo who fuses agile precision with salsa‑driven spontaneity, balancing data‑driven leadership, disciplined finances, and a zest for travel,
    food, and community.
background:
  cultural: Jennifer was raised in the suburbs of Philadelphia in a middle‑class Irish‑American family that emphasized education, hard work, and community service. She attended a Catholic school and grew
    up celebrating both traditional holidays and the eclectic cultural life of the city, from cheering on the Eagles to enjoying the city’s vibrant arts scene. Her upbringing instilled a pragmatic American
    work ethic combined with a curiosity about diverse perspectives, shaping her inclusive outlook. While she identifies with mainstream American cultural norms, she also embraces Philadelphia’s unique
    traditions—such as savoring cheesesteaks, participating in neighborhood block parties, and supporting local nonprofit initiatives—reflecting a blend of heritage and urban contemporary culture.
attributes:
  skills: '["Project lifecycle management", "Agile & Scrum", "Waterfall methodology", "Stakeholder analysis & communication", "Budgeting & cost control", "Risk assessment & mitigation", "Resource scheduling
    (MS Project, Smartsheet)", "Data analysis & visualization (Excel, Power BI)", "Team facilitation & conflict resolution", "Process improvement (Lean Six Sigma basics)", "Change management", "Cross‑functional
    collaboration", "Creative problem‑solving", "Adaptability to evolving scopes"]'
  hobbies: '["Live music concerts", "Salsa dancing", "Running club", "Hiking", "Cooking international cuisines", "Hosting brunches", "Volunteering at food bank", "Community gardening", "Exploring historic
    districts & museums", "Travel to Europe"]'
  career_goals: Jennifer aims to transition from a specialist role to senior project leadership within the next three years. She plans to earn the PMP certification and deepen her Agile expertise by obtaining
    a Certified Scrum Professional credential. Her ambition is to lead high‑impact, multi‑departmental programs—particularly in digital transformation and sustainability initiatives—that deliver measurable
    value to Philadelphia’s public and private sectors. Long‑term, she envisions stepping into a program director or portfolio manager position where she can shape strategic direction, mentor emerging project
    managers, and eventually launch her own consulting practice to help nonprofit organizations improve operational efficiency.
