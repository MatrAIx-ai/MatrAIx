personas:
  professional: James Sobel, a 38‑year‑old automotive service technician, leverages their meticulous diagnostic skills, hybrid‑vehicle expertise, and shop‑organizing talent to deliver precise repairs while
    mentoring junior staff in a structured, reliability‑focused environment, and they consistently document each service step to ensure accountability.
  sports: James Sobel hikes the Cascade trails and fishes the Cedar River for recreation, participates in a local adult soccer league, follows the Seattle Seahawks and Seattle Sounders FC, and they maintain
    weekly trail runs and weight‑training sessions to stay fit.
  arts: James Sobel finds artistic fulfillment in crafting custom furniture inspired by the clean lines of Dieter Rams, listening to classic rock legends like Led Zeppelin and The Rolling Stones while brewing
    seasonal IPAs, and they attend vintage car shows that double as living history exhibits.
  travel: James Sobel prefers meticulously planned road trips, using detailed spreadsheets to chart routes to the Oregon Coast, Yellowstone National Park, and their dream destination of Iceland’s volcanic
    landscapes, balancing their love for nature with a need for predictable itineraries.
  culinary: James Sobel, an intermediate home brewer and grillmaster, enjoys perfecting a citrus‑hopped IPA, smoking cedar‑plank salmon, and assembling a classic meatloaf seasoned with oregano and garlic,
    and they often pair their meals with local craft beers.
  core: James Sobel is a detail‑obsessed automotive wizard who channels their competitive edge into precise repairs, obsessively budgets every dollar, and they battle chronic worry by mapping out every
    hike, brew, and car restoration down to the last bolt.
background:
  cultural: James comes from a White American background rooted in the small‑town culture of Oregon's Marion County. Raised in a middle‑class family where hands‑on trades were valued, he learned early the
    importance of reliability, self‑reliance, and a strong work ethic. The Pacific Northwest lifestyle—appreciation for the outdoors, community involvement, and a pragmatic approach to daily life—has shaped
    his worldview. He identifies with the region's blend of rural traditions and emerging tech focus, reflected in his interest in hybrid vehicle repair and local craft brewing. His cultural upbringing
    emphasizes practicality, structured routines, and a commitment to supporting his family and community.
attributes:
  skills: '["Automotive diagnostics", "Engine rebuilding", "Electrical system repair", "Hybrid/electric vehicle maintenance", "Preventive maintenance", "Customer service", "Shop floor organization", "Inventory
    management", "Safety compliance", "Team training and mentoring"]'
  hobbies: '["Hiking in the Pacific Northwest", "Fishing in local rivers", "Woodworking", "Classic car restoration", "Homebrewing craft beer", "Attending car shows", "Volunteering as a mentor for youth
    automotive clubs"]'
  career_goals: James aims to advance to a shop manager position within the next few years, leveraging his organizational strengths to improve workflow efficiency. He plans to earn ASE Master Technician
    certification and complete a business management course to prepare for opening his own independent garage focused on hybrid and electric vehicle services. His long‑term ambition is to create a stable,
    family‑friendly business that offers high‑quality, predictable service while allowing him to mentor the next generation of technicians.
