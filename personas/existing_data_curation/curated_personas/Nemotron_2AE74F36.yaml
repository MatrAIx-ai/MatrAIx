  hobbies: '["Reading Literature", "Jazz Concerts", "Theater Performances", "Urban Photography", "Lakefront Running", "Kayaking", "Cooking", "Chess Club"]'
  career_goals: James aims to secure a tenure-track position within a four-year university where he can develop an interdisciplinary humanities program that bridges literature, social history, and digital
    media. He plans to complete a Ph.D. in Modern American Studies within the next three years, publish a monograph on urban cultural narratives, and eventually take on departmental leadership to advocate
    for inclusive, community‑engaged scholarship.
