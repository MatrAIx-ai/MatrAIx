  career_goals: Mildred aspires to become a biomedical engineer who designs medical devices that improve people's lives, reflecting her curiosity about how things work and her practical desire to help others.
    She also envisions a future in environmental science, aiming to develop sustainable solutions for her community. To achieve these goals, she plans to excel in STEM subjects, join advanced robotics and
