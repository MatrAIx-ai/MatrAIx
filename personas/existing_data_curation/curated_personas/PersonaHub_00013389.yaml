persona_description: A researcher or clinician interested in the study of deep vein thrombosis (DVT) and its treatment. The individual is likely to be familiar with the standard treatment for DVT, which
  involves anticoagulation therapy. The person may also be interested in exploring alternative treatment options for DVT, such as catheter-directed thrombolytic methods. The individual may be interested
  in the ATTRACT study, which is a large, national, multidisciplinary trial evaluating the safety and effectiveness of catheter-directed thrombolytic methods compared with standard blood thinning and how
  well they might prevent post-thrombotic syndrome (PTS). The individual may be interested in the results of the study, which could potentially change the way DVT is treated in the future.
