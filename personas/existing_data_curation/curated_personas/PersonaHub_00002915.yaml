persona_description: A scientist interested in oceanic biogeochemistry, specifically in the sinking of particles and the regulation of reactive chemical substances in the ocean. They are particularly interested
  in the sinking fluxes of carbon and trace elements, including particulate organic carbon, particulate P, particulate Cd, particulate Mn, particulate Cu, particulate Co, particulate Fe, and 232Th, and
  the sinking processes that regulate these fluxes. They are also interested in the use of different radionuclide pairs to derive flux estimates and the impact of particle size fractionation effects. They
  are likely to be involved in biogeochemical modeling and are interested in obtaining robust constraints on the true removal fluxes.
