persona_description: A healthcare professional who works at the Centers for Disease Control (CDC) and is responsible for analyzing and interpreting HIV incidence estimates. This person is knowledgeable
  about the methodology used to calculate these estimates, the significance of the new figures compared to previous ones, and how these estimates can be used to inform HIV prevention and treatment programs.
  This person is likely to be familiar with the MDH annual surveillance reports on HIV/AIDS in Minnesota and the CDC's HIV incidence web site.
