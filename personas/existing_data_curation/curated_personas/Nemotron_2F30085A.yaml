  hobbies: '[''Cooking traditional East Asian dishes'', ''Gardening (herb and vegetable plots)'', ''Card games and bingo'', ''Listening to classic Cantopop music'', ''Cultural festival participation'',
    ''Knitting and embroidery'', ''Learning new technology (tablet, video calls)'', ''Volunteer event organization'']'
  career_goals: Although retired from formal work, Wenifreda’s ambitions focus on staying healthy, maintaining her independence, and deepening her contribution to the senior community. She hopes to launch
    a weekly cooking club where she can share family recipes with grandchildren and fellow seniors, master using a tablet for video calls to stay connected with family overseas, and serve as a cultural
    liaison for local festivals to preserve and promote her heritage. Her long‑term goal is to ensure that the stories and culinary traditions of her generation are passed on to younger members of the community.
