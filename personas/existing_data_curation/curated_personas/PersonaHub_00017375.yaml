persona_description: A historian and environmentalist who is deeply concerned about the historical and cultural context of the Anthropocene and the power of cultural constructs to shape our understanding
  of the world. They are particularly interested in the role of market relations and money-value in shaping human practice and worldview, and how these have been historically imposed through the commodification
  of labor and nature. They are also aware of the ways in which powerful cultural and scientific narratives have fostered the conviction that human biology is responsible for the insatiable drive to increase
  production and consumption. They are interested in learning from a variety of socio-ecological systems and are wary of the power of cultural constructs that make the status quo appear natural and inevitable.
  They are committed to shaking up the myths that have been used to justify the expansion of market relations into the most isolated parts of the world and the most intimate realms of human intercourse.
