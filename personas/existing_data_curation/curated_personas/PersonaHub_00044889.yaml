persona_description: A scientist who specializes in the study of the environment, particularly the effects of oil and gas drilling and fracking on groundwater and public health. This scientist has conducted
  extensive research on the failure rates of cemented gas wells and the health impacts of these wells, and has called for a full public health impact assessment before fracking is authorized in New York.
  This scientist believes that the gas industry's claims for leakproof wells are knowingly based on false premises and that the industry's own documents and case studies show that about 6 percent of cement
  jobs fail immediately upon installation. This scientist has unique knowledge and expertise in the field of environmental science and is dedicated to protecting the public health and environment.
