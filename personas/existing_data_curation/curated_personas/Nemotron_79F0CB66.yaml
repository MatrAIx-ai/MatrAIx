personas:
  professional: Booker Prunty, a property and casualty claims investigator with advanced expertise in loss estimation and forensic appraisal, leverages Xactimate, PowerBI, and GIS mapping to turn complex
    claim data into visually striking narratives, while their imaginative, spontaneous nature fuels creative problem‑solving and sometimes leads to missed deadlines.
  sports: Booker Prunty, a dedicated weekend basketball player for the Stone Mountain Hoopers, fuels their competitive streak by following the Atlanta Hawks and Atlanta Falcons, while hitting the trails
    surrounding Stone Mountain for early‑morning runs that double as meditation, and they use the rhythm of the game to channel workplace stress into physical endurance.
  arts: Booker Prunty, an avid abstract painter and spoken‑word poet, channels the gritty aesthetic of Banksy and the lyrical intensity of Kendrick Lamar into open‑mic performances at the local Wordsmith
    Café, while their digital photography draws inspiration from the surreal landscapes of H.R. Giger, and they often blend visual and verbal storytelling to explore themes of decay and renewal.
  travel: Booker Prunty, a spontaneous road‑trip enthusiast, plans impromptu escapes to places like the neon‑lit streets of Tokyo, the desert murals of Sedona, and the historic alleys of New Orleans, balancing
    a limited travel budget with an insatiable craving for unique urban backdrops to photograph, and they relish the unpredictability of each detour as a source of creative fuel.
  culinary: Booker Prunty, a modest home chef, loves crafting smoky barbecue ribs, spicy ramen bowls, and sourdough toast topped with avocado and chipotle, favoring ingredients such as smoked paprika, miso
    paste, and fresh herbs to echo the bold flavors they capture in their visual art, and they often experiment with plating that resembles a painter’s canvas.
  core: Booker Prunty, a 31‑year‑old claims analyst who threads forensic data, avant‑garde art, and midnight basketball into a restless, curiosity‑driven life, juggling meticulous spreadsheets with spontaneous
    street‑photography expeditions, all while battling a chronic worry habit and an unhealthy penchant for late‑night caffeine, and they constantly seek the next novel challenge to feed their imagination.
background:
  cultural: Booker is a second‑generation African‑American raised in DeKalb County, where the legacy of the civil‑rights movement and the vibrant Atlanta cultural scene intersect. He grew up immersed in
    Black Southern traditions—family gatherings featuring soul food, gospel music at church, and community storytelling—while also being exposed to the city’s flourishing hip‑hop and neo‑soul landscapes.
    His parents emphasized education and entrepreneurship, encouraging him to pursue a business degree and a career in the insurance field. The multicultural tapestry of Stone Mountain’s neighborhoods,
    combined with the historical weight of the area, informs his identity and fuels his desire to give back through mentorship, volunteer work, and community advocacy.
