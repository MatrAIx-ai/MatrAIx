  career_goals: Logan aims to first obtain a GED within the next year, then enroll in a vocational program at a community college to become a certified HVAC technician or electrician. He seeks a stable,
    full‑time position in a property management or facilities maintenance team where his organized approach can add value. Over the next five years, he hopes to accumulate enough experience and certifications
    to launch his own small handyman business, offering reliable home‑repair services to residents of Loudoun County. Throughout this progression, he prioritizes consistent work hours and clear procedures
    to align with his preference for structure and predictability.
