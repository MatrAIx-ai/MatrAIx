    music'']'
  career_goals: Paxton dreams of one day becoming an astronaut or a space scientist, motivated by his fascination with the stars and the quiet focus required for research. He also imagines working as a
    museum curator or art conservator, where he could preserve and study artworks in a calm environment. In the short term, he aims to attend a summer science camp, win a local art contest, and develop
    a more advanced Scratch project that explores planetary motion. His long‑term ambition is to combine his love of art and science by creating visualizations that help people understand complex scientific
    concepts.
