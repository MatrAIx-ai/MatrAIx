personas:
  professional: Paxton Johnson, a budding junior coder and imaginative illustrator, merges their love for outer‑space landscapes with methodical Scratch programming, using quiet evenings to craft interactive
    stories while they quietly worry about perfecting every pixel.
  sports: Paxton Johnson, who enjoys solitary early‑morning jogs through the nearby woods and plays on the Birmingham Lions youth soccer club, follows the Birmingham Barons during baseball season and the
    Alabama Crimson Tide men's basketball team, yet they prefer the quiet of personal fitness over crowded team play.
  arts: Paxton Johnson, who spends weekends sketching futuristic cityscapes and fills a scrapbook with prints from the Birmingham Museum of Art, draws inspiration from the bold colors of Jacob Lawrence
    and the improvisational spirit of Miles Davis and Aretha Franklin, and they often share their drawings while classic vinyl records spin in the living room.
  travel: Paxton Johnson, who plans trips on colorful maps and prefers small, adventure‑filled getaways, has explored the U.S. Space & Rocket Center in Huntsville, visited the Smithsonian museums in Washington,
    D.C., and dreams of hiking the Grand Canyon, yet family budget constraints keep most vacations limited to weekend road trips to nearby state parks.
  culinary: Paxton Johnson, who loves the comforting aromas of fried chicken, mac and cheese, and collard greens at family dinners, enjoys helping stir cornbread batter and sprinkling honey on sweet potato
    pie, and they eagerly experiment with ingredients like okra and smoked paprika when crafting their own snack recipes.
  core: Paxton Johnson, a quietly intense eight‑year‑old with a boundless imagination for space, a meticulous habit of journaling every leaf, and a tendency to over‑worry about perfection, often retreats
    into solitary creativity while they methodically plan their next adventure.
background:
  cultural: Paxton is raised in an African‑American family in Birmingham, Alabama, a city rich in civil‑rights history and Southern cultural traditions. His parents emphasize education, community values,
    and appreciation for the arts, often taking him to local museums like the Birmingham Civil Rights Institute and the Birmingham Museum of Art. He celebrates cultural events such as Juneteenth and participates
    in church gatherings where gospel and soul music are integral. Family meals feature Southern comfort foods while stories of the local black community’s resilience are shared, fostering a strong sense
    of identity. This cultural backdrop, combined with the supportive neighborhood and school environment, shapes Paxton’s worldview, curiosity, and respect for both his heritage and the broader world.
