personas:
  professional: Debbie Wade, a five-year-old imaginative play leader, runs her own 'pretend school' in the living room where she orchestrates story-time lessons, manages a tiny classroom schedule, and uses
    her curiosity and organization to keep playtime both structured and flexible while gently directing her peers with a competitive spark.
  sports: Debbie Wade eagerly joins the 'Tiny Tots Soccer' team at the community center, cheers for the New York Yankees on game days, dribbles a mini basketball in the backyard, and balances her energetic
    love of group games with a competitive drive to score the most goals.
  arts: Debbie Wade delights in finger-painting bright abstracts, sings along to Disney soundtracks and the whimsical tunes of Jack Johnson, collects stickers of favorite characters like Mickey Mouse, and
    spends weekend afternoons at the local children's museum where she engages with interactive art installations and storytelling sessions.
  travel: Debbie Wade enjoys weekend trips to the nearby zoo where she marvels at the giraffes, has recorded a magical visit to Walt Disney World in Florida as her favorite vacation, and approaches new
    destinations with a mix of excitement and a tiny tote of comfort snacks to soothe any travel-related anxiety.
  culinary: Debbie Wade prefers bite-size chicken nuggets, mac and cheese, and fresh strawberry slices, takes pride in using a child-safe mixer to stir pancake batter, and enthusiastically orders pizza
    with extra cheese and pepperoni at family outings, while occasionally sneaking a spoonful of honey straight from the jar.
  core: Debbie Wade is a curious, energetic five-year-old who balances a love for organized play and spontaneous creativity, yet sometimes wrestles with sharp anxiety and a competitive edge that drives
    her to excel in group activities.
background:
  cultural: Debbie is a Black American child raised in the vibrant, diverse community of Silver Spring, Maryland. Her family celebrates African-American traditions, including attending a historically Black
    church where gospel music and storytelling are part of Sunday services. She participates in local cultural festivals like Juneteenth celebrations and the DC Black Film Festival’s family screenings,
    which expose her to African-American art, music, and history. Her grandparents share folktales from the American South, and occasional family meals feature soul food dishes that connect her to her heritage.
    The multicultural environment of Montgomery County, with its public libraries, community centers, and museums, reinforces her curiosity for varied experiences while grounding her in a strong sense of
    Black identity.
