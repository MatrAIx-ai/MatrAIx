  career_goals: She often says she wants to be an artist who makes big paintings for everybody and dreams of opening her own art show one day. She also imagines becoming a storyteller who creates picture
    books, and occasionally mentions wanting to be a superhero teacher who helps other kids learn and win at games. These ambitions reflect her love of art, curiosity for new ideas, and competitive streak.
