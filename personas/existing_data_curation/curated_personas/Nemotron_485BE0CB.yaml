personas:
  professional: Eugene Alford is an aspiring junior robotics designer and digital illustrator who blends their love for sketching characters with tinkering on kit-built robots, channeling curiosity into
    school art club projects while they maintain a disciplined schedule to meet both deadlines and creative spurts.
  sports: Eugene Alford enjoys weekend hikes around the local woods and paddling on the nearby lake, they support the regional minor-league baseball team the River Valley Bears, and they play on the middle
    school soccer team while they also cheer for the high school basketball squad, the County Hawks.
  arts: Eugene Alford immerses themselves in graphic novels like Neil Gaiman's 'Sandman' and manga by Akira Toriyama, they compose original songs on their acoustic guitar inspired by John Mayer, and they
    experiment with digital painting using Procreate while drawing inspiration from artists such as Ross Tran and Studio Ghibli's Hayao Miyazaki.
  travel: Eugene Alford prefers spontaneous road trips to nearby state parks like Cedar Ridge, where they can sketch lakeside scenery, they dream of visiting the historic castles of Scotland and the bustling
    streets of Tokyo, balancing school schedules with family budgeting constraints.
  culinary: Eugene Alford favors homemade pizza topped with pepperoni and fresh basil, can whip up a decent chicken teriyaki stir-fry using soy sauce and sesame oil, and they enjoy experimenting with smoothies
    blended with frozen berries, though they often snack on sugary cereal while gaming.
  core: Eugene Alford is a curiosity-driven teen who alternates between sketching fantastical characters and building quirky robots, they habitually forget chores while hoarding sketchbooks and dreaming
    of big adventures.
background:
  cultural: Eugene grew up in Otisville, a small, close‑knit community in Lapeer County, Michigan. His family’s cultural roots are primarily Midwestern white American, with traditions that emphasize community
    involvement, seasonal celebrations like the county fair, and a strong work ethic. He attends a public middle school where local values of modesty, reliability, and mutual support are reinforced. The
    region’s agricultural backdrop and nearby automotive industry give him an appreciation for both hands‑on craftsmanship and modern technology, shaping his balanced outlook on creative and practical pursuits.
attributes:
  skills: '[''Digital illustration'', ''Basic coding (Scratch, Python)'', ''Acoustic guitar'', ''Creative writing'', ''Project organization'', ''Collaborative teamwork'', ''Public speaking (class presentations)'']'
  hobbies: '[''Sketching and digital painting'', ''Playing acoustic guitar'', ''Creative writing (stories and song lyrics)'', ''Robotics kits (building and programming)'', ''Narrative video games'', ''Reading
    graphic novels and fantasy books'', ''Exploring nature (local trails and lakes)'', ''School art club'', ''Volunteering at the library'']'
  career_goals: Eugene dreams of combining his love for art and technology into a career as a video‑game designer or interactive media artist. He hopes to attend a high school with a strong STEM and arts
    program, eventually study graphic design and computer science in college, and create games that tell compelling stories and explore unconventional ideas. He also imagines working on community art projects
    in his hometown and maybe teaching younger kids how to code and draw.
