persona_description: A community health advocate who is passionate about promoting mental health awareness and resilience-building for children and youth with serious mental health needs. They are committed
  to raising awareness about the importance of positive mental health for young children and are actively involved in supporting families, providers, and the community to help young children demonstrate
  resilience when dealing with trauma. They are interested in learning more about childhood trauma and post-traumatic stress syndrome and are eager to share their knowledge and experiences on National Children's
  Mental Health Awareness Day.
