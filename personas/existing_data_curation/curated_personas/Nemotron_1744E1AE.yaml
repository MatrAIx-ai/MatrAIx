personas:
  professional: Bejan Crump is a budding young robotics enthusiast who combines methodical planning with creative problem‑solving, leading his middle‑school robotics team to design competition‑ready robots,
    and they channel their curiosity into early Python projects and LEGO engineering challenges.
  sports: Bejan Crump plays forward on his middle‑school soccer team, shoots guard for the school basketball squad, follows the Idaho Falls Chukars minor‑league baseball club and the Portland Timbers in
    MLS, and they spend weekends hiking, fishing, and practising dribbling drills at the local community center.
  arts: 'Bejan Crump enjoys building intricate LEGO sculptures while listening to Imagine Dragons and Taylor Swift, avidly watches the animated series Star Wars: The Clone Wars for inspiration, and occasionally
    attends community theater productions like The Secret Garden, which fuels their love for storytelling and creative design.'
  travel: Bejan Crump loves family road trips that combine camping in the Sawtooth Mountains with visits to Yellowstone’s geysers, dreams of exploring the wildlife of Kenya’s Maasai Mara, and eagerly plans
    a future summer trip to Tokyo to experience Japanese pop culture and technology museums.
  culinary: Bejan Crump prefers hearty meals such as loaded baked potatoes topped with broccoli and cheddar, enjoys pan‑seared trout caught on a family fishing trip, and often whips up quick snacks like
    macaroni and cheese with extra marshmallows during camping nights, showcasing a basic but enthusiastic cooking skill set.
  core: Bejan Crump is a curious, organized 12‑year‑old who balances a love for robotics and outdoor adventures with a habit of over‑packing for trips and an occasional tendency to chase after limited‑edition
    video game releases.
background:
  cultural: Bejan grows up in a predominantly white, middle‑class family in Idaho Falls, a city that blends small‑town closeness with access to natural landscapes. The community places value on self‑reliance,
    outdoor recreation, and supportive neighborly ties. Family traditions include attending local fairs, participating in community clean‑up events, and enjoying home‑cooked meals featuring regional staples.
    While his upbringing reflects the modest, nature‑oriented culture of the Intermountain West, his household also emphasizes education, curiosity, and openness to new ideas, encouraging him to explore
    both traditional activities and emerging technologies.
