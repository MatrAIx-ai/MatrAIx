  career_goals: Bejan aspires to a career that blends his love for practical problem‑solving, teamwork, and tangible community impact. He envisions studying engineering—particularly civil or environmental
    engineering—to design sustainable infrastructure and improve public spaces in Idaho Falls. He also imagines a future role in science education, hoping to inspire curiosity in younger students through
    hands‑on STEM projects. To reach these goals, he plans to deepen his involvement in robotics, STEM clubs, and volunteer initiatives during high school and college.
