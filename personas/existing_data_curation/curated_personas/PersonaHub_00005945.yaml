persona_description: A design engineer who is a professional in the field of engineering design, particularly in the context of product development and innovation. They are skilled in the use of design
  briefs and the development of ideas through iterative modelling and testing. They are familiar with the concepts and methodologies of conceptual design and have experience in working with incomplete information,
  making quick estimates, and being ready to change course. They are adept at drawing on professional knowledge, diversifying inputs by invoking outside interests, and stimulating new connections. They
  are able to work with the client to resolve any paradoxes in the brief and develop ideas that are responsive to the design criteria and tests.
