  hobbies: '[''Fishing'', ''Gardening'', ''Birdwatching'', ''Reading historical biographies'', ''Bridge (card game)'', ''Woodworking'', ''Attending church services'', ''Cooking'', ''Beach walks'']'
  career_goals: Although retired, William aims to stay actively engaged by mentoring younger volunteers at the senior center, documenting his life stories for a community oral history project, and expanding
    the local volunteer network to provide more assistance to isolated seniors. He also hopes to maintain his health to continue fishing and gardening, and to be a reliable sounding board for his family
    and friends.
