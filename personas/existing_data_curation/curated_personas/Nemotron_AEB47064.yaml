  hobbies: '[''Custom furniture making'', ''Hiking'', ''Reading construction manuals'', ''Cooking Mexican cuisine'', ''Sketching design concepts'', ''Playing strategy video games'', ''Listening to folk
    music'']'
  career_goals: Daphne aims to obtain her GED and achieve journeyman certification within the next two years, positioning herself for a licensed contractor’s license. She aspires to open a boutique workshop
    that specializes in eco‑friendly custom furniture and small sustainable housing projects, leveraging her Mexican design heritage. Long‑term, she hopes to lead a small crew, mentor future apprentices,
    and establish a reputation for high‑quality, innovative carpentry in the Pacific Northwest.
