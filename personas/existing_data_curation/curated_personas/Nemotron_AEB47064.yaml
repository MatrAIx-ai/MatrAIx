personas:
  professional: Daphne Cabret, a 20‑year‑old apprentice carpenter in Eugene, blends practical framing expertise with a curiosity for sustainable materials, managing solo projects from blueprint reading
    to finish while competitively maintaining flawless tool safety records.
  sports: Daphne Cabret hikes the Willamette Valley’s forest trails every weekend, follows the Oregon Ducks football team and cheers for the Portland Timbers, and belongs to a local climbing gym where they
    compete in bouldering circuits.
  arts: Daphne Cabret sketches detailed furniture designs, draws inspiration from Frank Lloyd Wright’s organic architecture, and unwinds with strategy video games like Civilization VI, admiring the work
    of game designer Sid Meier.
  travel: Daphne Cabret prefers low‑key road trips to Oregon’s coast, has visited the historic timber town of Astoria, dreams of exploring sustainable housing exhibitions in Copenhagen, and plans trips
    around long weekends to avoid taking time off work.
  culinary: Daphne Cabret regularly prepares tamales, pozole, and chiles rellenos, then experiments by swapping traditional chilies with locally sourced Oregon mushrooms or smoked trout for a fusion twist,
    and enjoys sourcing fresh herbs from the farmers’ market.
  core: Daphne Cabret is a solitary‑minded, eco‑driven carpenter who balances relentless tool perfectionism with a love for fusion cooking, hiking, and competitive strategy gaming.
background:
  cultural: Daphne was raised in a bilingual Mexican household in Eugene, where Spanish and English blended seamlessly at home. Family gatherings revolve around traditional celebrations such as Día de los
    Muertos and Cinco de Mayo, preserving cultural rituals and cuisine. Her heritage influences her design sensibility; she often incorporates Mexican motifs, like geometric tile patterns and vivid color
    accents, into her woodworking. Being part of the local Mexican community provides a network of support and a shared work ethic, while her Oregon upbringing adds a love for the outdoors and a commitment
    to sustainable living.
