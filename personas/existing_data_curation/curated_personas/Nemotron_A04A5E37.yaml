    Book Club","Gardening"]'
  career_goals: Sonia aims to step into a store manager position within the next two years, using her organizational strengths and people‑focused leadership to improve staff morale and store performance.
    She plans to enroll part‑time in a Business Administration program to deepen her managerial expertise and eventually launch a boutique that highlights Mexican art, crafts, and culinary products. Long‑term,
    she envisions a career in visual merchandising or retail consulting where she can blend her curiosity for design, appreciation of diverse ideas, and experience in sales to help brands create culturally
    resonant shopping experiences.
