personas:
  professional: Sonia Karim, a 42‑year‑old retail specialist, blends bilingual charm with meticulous inventory oversight and a flair for visual merchandising, turning store aisles into gallery‑like experiences
    while they coach their team through weekly sales challenges.
  sports: Sonia Karim hikes the scenic trails of Redrock State Park every other weekend, joins the local Trailblazers Hiking Club, and supports the Riverside Runners minor‑league baseball team, while their
    weekly salsa and folkloric dance classes double as cardio workouts.
  arts: Sonia Karim frequents the City Art Museum’s Mexican folk art exhibit, sketches watercolors inspired by Diego Rivera’s murals and Frida Kahlo’s self‑portraits, and enjoys live performances by folk
    singer Lila Downs, using these experiences to fuel their own creative projects.
  travel: Sonia Karim plans indie‑art pilgrimages that blend adventure and culture, having explored the historic streets of Guanajuato, the vibrant murals of Valparaíso, Chile, and the hiking paths of Utah’s
    Zion National Park, while budgeting each trip around their boutique savings timeline.
  culinary: Sonia Karim cooks up traditional tacos al pastor and mole poblano, then experiments with quinoa‑chipotle bowls and churro‑infused desserts, boasting a well‑stocked pantry of corn masa, ancho
    chilies, and fresh epazote, though they sometimes over‑season dishes in pursuit of bold flavors.
  core: Sonia Karim, a methodical retail leader with a zest for Mexican‑inspired art and cuisine, channels creativity into store displays while battling occasional worry‑driven insomnia and a penchant for
    midnight sketch sessions.
background:
  cultural: Sonia grew up in a bilingual Mexican household, where Spanish was spoken at home and English at school, fostering a rich bicultural identity. Family traditions such as Día de los Muertos celebrations,
    cooking mole and tamales, and crafting papel picado have shaped her appreciation for art and community. Living in Siler City, North Carolina, she navigates a predominantly non‑Hispanic environment while
    staying connected to a close‑knit Hispanic community through church events, cultural festivals, and local Spanish‑language meetups. This blend of Mexican heritage and Southern small‑town life informs
    her values of family, hospitality, and collaborative harmony.
attributes:
