  career_goals: When asked about her future, Song often says she wants to be a teacher because she loves helping friends learn new things, and a veterinarian because she enjoys caring for animals. She also
    imagines herself as a storyteller who can share fun stories with other children. These aspirations reflect her compassionate nature and desire to create harmonious, supportive environments for others.
