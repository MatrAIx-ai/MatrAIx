personas:
  professional: Song Kam is a budding community organizer who, after a week of alphabet and folk song lessons at a neighborhood language school, eagerly sets up tidy playstations for friends, using their
    love of order to line up blocks while staying flexible enough to incorporate new ideas when play gets lively; they marvel at how everyone smiles when the toys are arranged just right.
  sports: Song Kam dashes across the community park field in the blue jersey of the local youth soccer club, cheering for the nearby professional soccer team on TV, and splashes joyfully in the community
    pool’s beginner swim class on sunny Saturdays; they grin proudly whenever they complete a new swimming stroke.
  arts: Song Kam fills sketchbooks with vibrant crayon drawings of lanterns and rockets, sings along to catchy children’s tunes like Baby Shark during language school, and watches animated classics such
    as Moana and Toy Story, absorbing storytelling techniques from local folk dance performances; they often mimic the dance moves in the backyard, twirling with delight.
  travel: Song Kam looks forward to weekend picnics among the towering redwoods of a nearby state park, annual family visits to a garden for the harvest celebration, and daydreams about a future trip to
    Disneyland Paris once they graduate preschool; they love packing their tiny backpack with stickers and counting the car rides with a sense of adventure.
  culinary: Song Kam delights in rolling soft rice balls stuffed with sweet red bean paste, enjoys the tangy crunch of fermented cabbage beside grilled sweet soy‑glazed beef strips, and proudly stirs batter
    for homemade scallion pancakes during Saturday kitchen adventures; they often splash a few droplets of batter on the counter, laughing at the mess.
  core: Song Kam is an energetic, compassionate five‑year‑old who blends a love for structured play with spontaneous fun, thrives on community connections, and navigates daily life with curiosity, occasional
    forgetfulness, and an ever‑present smile.
background:
  cultural: Song is a second‑generation Korean‑American raised in Fremont, California, a city with a vibrant Korean community. Her household is bilingual, speaking both Korean and English, and celebrates
    cultural traditions such as Seollal (Lunar New Year) and Chuseok (harvest festival) with family gatherings and customary foods. On weekends, she attends a local Korean language school where she learns
    Hangul basics, traditional songs, and cultural stories. Her family values education, community harmony, and respect for elders, and these values shape her compassionate and cooperative outlook. The
    multicultural environment of Fremont also exposes her to diverse friends and activities, enriching her social experiences.
