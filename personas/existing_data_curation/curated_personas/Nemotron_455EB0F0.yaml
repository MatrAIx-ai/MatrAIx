    parks'', ''Playing acoustic guitar'', ''Watching classic movies'', ''Gardening'', ''Attending multicultural festivals'']'
  career_goals: Chad aims to publish his first full-length novel, leveraging his structured writing style to produce a compelling memoir that resonates with diverse Houston readers. He also wants to establish
    a regular column in a local newspaper or online platform focusing on community stories and social harmony. In the longer term, he hopes to become a communications director for a nonprofit organization,
    using his writing expertise and compassionate outreach skills to amplify advocacy campaigns. Additionally, he wishes to build a sustainable income from freelance writing, workshops, and speaking engagements
    that combine his love of storytelling with his desire to help others.
