personas:
  professional: Raul Chang, a budding architect of block towers and puzzle master, approaches playtime with a practical, structured mindset, favoring solitary construction projects over noisy group activities
    and demonstrating early signs of reliability and responsibility.
  sports: Raul Chang, a member of the local kids' soccer club's 'Little Lions' team, thrives on structured drills, prefers small-sided games that allow focused participation, and displays a competitive
    edge when racing to the goal line, while also enjoying weekly beginner gymnastics sessions.
  arts: Raul Chang, an avid collector of picture books and a devoted fan of the animated series 'Octonauts', spends leisure time drawing precise dinosaur outlines, listening to calming children's classical
    music like 'Baby Mozart', and attending local puppet shows starring a friendly bear.
  travel: Raul Chang, a weekend explorer with family, delights in short trips to the nearby city zoo and the local splash park, follows a predictable travel routine that includes a midday snack and an early
    bedtime, and dreams of someday building sandcastles on a seaside beach.
  culinary: Raul Chang, a selective eater who loves the crunchy bite of chicken nuggets, the creamy comfort of macaroni and cheese, and the sweet snap of apple slices, meticulously assembles a simple snack
    of peanut butter on whole-grain toast, yet stubbornly refuses broccoli and other unfamiliar vegetables.
  core: Raul Chang is a quietly competitive four-year-old who thrives on structure, prefers solitary play, saves meticulously for specific toys, and balances routine health habits with occasional allergy
    setbacks, and they approach each new challenge with measured curiosity.
background:
  cultural: Raul is raised in a Mexican‑American household in Phoenix, Arizona. Both Spanish and English are spoken at home, and his family observes cultural traditions such as Día de los Muertos, celebrating
    with homemade altars and papel picado, and enjoys Mexican cuisine like tacos, tamales, and fresh guacamole. His grandparents often share stories and songs from their hometown in Michoacán, reinforcing
    a strong sense of heritage. Living in a diverse neighbourhood, Raul is exposed to both the vibrant Mexican community and the broader American culture, shaping a bicultural identity that values family
    bonds, respect for elders, and a love for festive celebrations.
