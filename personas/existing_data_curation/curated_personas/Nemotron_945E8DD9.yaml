  career_goals: Raul often talks about becoming a firefighter when he grows up. He’s fascinated by the bright red trucks and the idea of keeping people safe, and the clear rules and training appeal to his
    love of structure. He also enjoys watching soccer matches and sometimes imagines himself scoring goals for a team, showing a budding competitive spirit. Though still playful, his ambitions revolve around
    roles that combine order, responsibility, and the chance to demonstrate his abilities.
