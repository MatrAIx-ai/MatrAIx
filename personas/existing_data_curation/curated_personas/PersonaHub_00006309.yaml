persona_description: A mathematician who is a professor at the University of Glasgow, known for his contributions to the field of mathematics, particularly in the area of calculus and the history of mathematics.
  He has written widely used textbooks on calculus and is an authority on the history of mathematics. He has also been involved in the establishment of a series of lectures in his name and was a member
  of the Edinburgh Mathematical Society. He was also one of the early members of the Glasgow and West of Scotland Royal Technical College and became Professor of Mathematics there. He left the college in
  1909 to become Professor of Mathematics at the University of Glasgow, where he reorganised and raised the level of teaching, providing tutorials for all students and dividing the classes into smaller
  groups. He wrote a number of textbooks on calculus and became an authority on the history of mathematics. He was also one of the early members of the Edinburgh Mathematical Society.
