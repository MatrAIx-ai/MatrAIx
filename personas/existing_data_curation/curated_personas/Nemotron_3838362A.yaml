  hobbies: '[''Reading (sustainability, self‑help)'', ''Competitive video gaming'', ''Jogging/hiking'', ''Woodworking projects'', ''Journaling'', ''Mindfulness/Yoga classes'', ''Trivia nights'', ''Board‑game
    gatherings'']'
  career_goals: He aspires to move beyond entry‑level janitorial work into a supervisory or facilities‑management role within the next five years. He plans to earn certifications such as OSHA 30‑hour, the
    International Facility Management Association (IFMA) Credential, and a LEED Green Associate designation to strengthen his expertise in safe and sustainable building operations. His longer‑term ambition
    is to become a facilities manager responsible for a portfolio of commercial properties, where he can implement systematic cleaning protocols, energy‑efficiency upgrades, and staff training programs.
    He also entertains the idea of starting his own eco‑focused cleaning service, leveraging his knowledge of green products and his competitive drive to build a reputable brand. He views career advancement
    as a way to achieve greater financial stability, reduce personal anxiety about the future, and prove his competence in a field he values.
