  hobbies: '["Cooking Venezuelan cuisine", "Watching soccer", "Hiking", "Chess", "Data‑science side projects", "Volunteer tax assistance", "Listening to salsa and jazz music"]'
  career_goals: Anibal aims to become a Certified Public Accountant (CPA) within the next two years and progress to a senior audit manager position at a regional firm. Long‑term, he envisions attaining
    partnership status or launching his own boutique accounting practice focused on small businesses and cross‑border clients, leveraging his expertise in data analytics to offer advisory services that
    blend traditional accounting with modern automation. He also hopes to mentor junior accountants and occasionally teach adjunct finance courses at a community college, balancing professional growth with
    a flexible schedule that allows time for personal pursuits.
