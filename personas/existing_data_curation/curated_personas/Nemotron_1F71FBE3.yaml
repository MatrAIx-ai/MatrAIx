  career_goals: Beverly dreams of becoming a marine biologist one day because she loves watching tide-pool creatures at the beach and wants to protect the ocean. She also imagines herself as a teacher who
    can share stories and lead fun classroom projects. In the short term, she aims to be the team captain in her kindergarten's relay races and to win the upcoming spelling-bee for her class, reflecting
    her competitive streak.
