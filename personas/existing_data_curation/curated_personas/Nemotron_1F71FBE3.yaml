personas:
  professional: Beverly Puliatti, a budding marine explorer, thrives on the predictable rhythm of tide‑pool surveys yet often breaks the routine by building wildly imaginative sandcastles, showing early
    signs of analytical curiosity and spontaneous creativity that could shape a future career in marine biology.
  sports: Beverly Puliatti loves swimming with the Little Dolphins Swim Team, enjoys beginner soccer drills at the Sunnyvale Tigers club, cheers for the Los Angeles Angels baseball team and the San Jose
    Earthquakes soccer team, and frequently leads games of tag, reflecting a competitive spirit balanced with a love for group play.
  arts: Beverly Puliatti spends afternoons drawing cartoon heroes like Mickey Mouse, coloring pages featuring tropical fish, constructing LEGO Star Wars scenes, and belting out pop hits such as Taylor Swift’s
    Shake It Off and the Let It Go anthem from Frozen, weaving creativity into daily routines.
  travel: Beverly Puliatti’s travel log includes family beach trips to Santa Cruz, a day at Monterey Bay Aquarium, a magic‑filled stay at Disneyland Resort, and a wish‑list spot of the Great Barrier Reef,
    favoring short, well‑planned outings under parental guidance while craving the excitement of new marine environments.
  culinary: Beverly Puliatti favours mac and cheese, pizza with extra cheese, fish sticks with tartar sauce, and strawberry‑banana smoothies, can assemble a peanut‑butter‑banana sandwich with minimal help,
    loves helping stir pancake batter, yet often forgets to eat the broccoli side, showcasing a pick‑and‑choose palate.
  core: Beverly Puliatti is a beach‑loving, sandcastle‑building, LEGO‑stacking six‑year‑old who balances a love for structured routines with bursts of spontaneous play, competitive games, and occasional
    over‑indulgence in sweets.
background:
  cultural: Beverly was born and raised in Honolulu to parents of Italian-American descent who have embraced the island's multicultural atmosphere. Her family celebrates both traditional American holidays
    and local Hawaiian customs, such as attending occasional luau gatherings, wearing aloha shirts, and learning a few Hawaiian words. She attends a community preschool where classmates represent many ethnicities,
    giving her daily exposure to diverse languages, foods, and perspectives. The ocean and tropical environment are central to her life, shaping her love for water activities and respect for nature.
