  hobbies: '[''Watercolor Painting'', ''Digital Photography'', ''Senior Technology Book Club'', ''Community Art Exhibitions'', ''Gardening'', ''Birdwatching'', ''Hiking'', ''Volunteering as Docent'', ''Attending
    Public Lectures'', ''Digital Sketching'', ''Pottery'', ''Travel to Museums'']'
  career_goals: In retirement, Crystal aims to leverage her technical expertise and love of the arts to enrich her community. She aspires to expand the senior‑center technology program she volunteers with,
    developing curricula that introduce emerging topics like artificial intelligence and renewable energy in an accessible way. She also wishes to curate intergenerational art‑science exhibitions that celebrate
    creative inquiry. Another personal ambition is to author a memoir that blends her professional journey as a woman in STEM with reflections on lifelong learning, thereby inspiring younger generations.
    Travel to regional museums and botanical gardens remains a goal, as does maintaining an active role in local volunteering and mentorship.
