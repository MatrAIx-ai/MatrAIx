personas:
  professional: Dok Danh is an aspiring game designer who blends strategic mastery from Civilization and StarCraft with meticulous model‑building precision and digital manga illustration, channeling their
    love of structure and calm resilience into collaborative school projects while comfortably navigating the informal, flexible rhythms of teenage life.
  sports: Dok Danh enjoys weekly badminton matches with a tight‑knit group of friends through the high‑school badminton club, balances this with a casual fanhood for Manchester United and the Los Angeles
    Lakers, and approaches fitness with a laid‑back routine that prefers skill‑based drills over rigorous gym schedules.
  arts: Dok Danh channels their creative spark into digital manga sketches inspired by Akira Toriyama and Studio Ghibli’s animation, while their soundtrack features K‑pop icons like BTS and Blackpink alongside
    occasional listening to indie pop artist Billie Eilish, shaping their artistic mood and after‑school downtime.
  travel: Dok Danh’s travel style blends meticulous planning for school‑approved trips to nearby cultural festivals with spontaneous wander‑lust dreaming of a future solo journey to Tokyo’s anime districts,
    a weekend in Paris for Louvre sketches, and a music‑laden weekend in Seoul to see K‑pop live, all while balancing a modest family budget.
  culinary: Dok Danh, a competent home cook, delights in crafting aromatic pho broth with star anise, ginger, and thin rice noodles, assembling fresh spring rolls packed with shrimp, mint, and vermicelli,
    and occasionally experiments with sushi rolls featuring avocado and tuna, showcasing a moderate skill level that blends family tradition with personal curiosity.
  core: Dok Danh is a calm, structure‑loving teen who balances a love for strategic gaming and meticulous model building with a laid‑back approach to obligations, hidden behind a quiet demeanor and occasional
    forgetfulness about homework.
background:
  cultural: Dok is a second‑generation Vietnamese‑American raised in San Diego’s Little Saigon neighborhood. His household maintains bilingual communication, celebrating Tet, the Mid‑Autumn Festival, and
    other Vietnamese traditions while also embracing mainstream American holidays. Family values emphasize respect for elders, community harmony, and the importance of education, which have shaped his calm
    and cooperative nature. Cooking and sharing traditional foods are central to family gatherings, and Dok’s parents encourage him to stay connected to his heritage through language, cultural events, and
    community service. At the same time, he participates in typical American teen activities at school and with friends, creating a blended cultural identity that informs his worldview and aspirations.
