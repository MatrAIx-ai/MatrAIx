  career_goals: Dok aims to pursue a bachelor’s degree in Computer Science at a university such as UC San Diego, with the long‑term goal of becoming a software engineer who designs educational technology
    tools for multilingual and underrepresented communities. He envisions creating user‑friendly apps that help Vietnamese‑speaking students access STEM resources, blending his technical skills with his
    cultural background. Dok also hopes to earn scholarships that recognize both academic merit and community involvement, and he plans to eventually lead a small, collaborative development team that values
    harmony, structured workflows, and flexible remote work options.
