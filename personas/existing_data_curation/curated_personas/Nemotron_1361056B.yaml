  hobbies: '[''cooking traditional Mexican recipes'', ''baking pan dulce and other pastries'', ''crocheting and knitting'', ''volunteering at church youth group and food bank'', ''listening to regional
    Mexican and pop music'', ''watching family‑oriented TV series'', ''playing recreational soccer'', ''reading and journaling'']'
  career_goals: Veronica aims to pursue a stable, community‑focused career that builds on her practical strengths. She plans to attend a vocational program after high school to become a certified medical
    assistant or dental hygienist, roles she sees as offering clear routines, dependable schedules, and opportunities to help families like her own. In the longer term, she hopes to open a small family‑run
    bakery where she can share traditional Mexican pastries with her Muncie community while maintaining a predictable work environment that respects her need for routine and balance.
