personas:
  professional: Veronica, a diligent 16‑year‑old high‑school junior, is preparing for a vocational career as a certified medical assistant, applying their bilingual fluency, routine‑focused organization,
    and first‑aid experience to support family health while quietly planning a future bakery that will share their cherished holiday pastries with neighbors.
  sports: Veronica, a regular participant in their neighborhood’s youth soccer league and avid fan of the Chicago Fire, spends Saturday mornings on the field, follows the Indiana Hoosiers basketball season,
    and incorporates short interval training into their routine to stay fit.
  arts: Veronica, who spends evenings crocheting cozy blankets while streaming Los Tigres del Norte and Taylor Swift, enjoys family‑friendly shows such as Modern Family and the occasional Disney movie,
    and finds inspiration for their craft in the vibrant rhythms of regional folk and contemporary pop.
  travel: Veronica, who carefully plans each trip using a shared family itinerary, dreams of revisiting the small town near Guadalajara to celebrate Día de los Muertos with relatives, while also looking
    forward to weekend getaways to Chicago’s museum district and seasonal family outings to the Great Lakes.
  culinary: Veronica, an adept home cook, delights in baking pan dulce with cinnamon and piloncillo, simmering mole sauce with chilies and chocolate, and preparing tacos al pastor and tamales for weekend
    family meals, often experimenting with fresh cilantro, Oaxaca cheese, and homemade corn masa.
  core: Veronica, a routine‑loving 16‑year‑old with a sweet tooth for pan dulce, balances meticulous budgeting and community service with an occasional habit of staying up late scrolling social media before
    school.
background:
  cultural: Veronica was born to Mexican immigrant parents who settled in Muncie, Indiana, after moving from a small town near Guadalajara. Her household is bilingual, speaking Spanish at home while she
    uses English at school and in the broader community. She grows up immersed in Mexican cultural traditions such as celebrating Día de los Muertos, quinceañera preparations, and cooking weekend family
    meals that emphasize communal sharing and respect (respeto) for elders. Her family maintains close ties with a local Hispanic community center and attends a Catholic church where cultural customs—like
    altar decorations for the feast of Our Lady of Guadalupe—are blended with Midwestern customs. This bicultural environment shapes her values of familismo, hard work, and practical stewardship, which
    she carries into her daily life and future aspirations.
