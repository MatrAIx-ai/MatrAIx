  hobbies: '[''Hiking'', ''Surfing'', ''Backpacking'', ''Photography'', ''DIY electronics projects'', ''Reading science and technology articles'', ''Playing video games'', ''Board game nights with friends'',
    ''Volunteering at local beach cleanups'', ''Cooking experimental recipes'', ''Meditation'']'
  career_goals: Todd aims to deepen his expertise in quality assurance by earning an Associate's degree in Industrial Technology and obtaining a Certified Quality Engineer (CQE) credential within the next
    three years. He envisions moving into a supervisory role where he can mentor new inspectors and lead small improvement projects. While he values the stability of a structured career path, he also hopes
    to stay involved with emerging testing technologies, perhaps transitioning into a process‑optimization specialist role that blends his practical mindset with his curiosity about new methods. Managing
    his time and stress more effectively is a personal goal that he ties to his professional growth.
