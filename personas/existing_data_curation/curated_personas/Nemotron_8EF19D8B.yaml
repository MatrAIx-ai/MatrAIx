personas:
  professional: Earl Wright, a 52‑year‑old freelance investigator with a liberal‑arts foundation, blends meticulous surveillance and interview expertise with emerging open‑source intelligence and basic
    digital forensics to launch a boutique agency targeting complex civil, corporate, and cyber‑fraud cases across Central Florida, driven by a competitive edge and a pragmatic, low‑stress demeanor.
  sports: Earl Wright, a dedicated member of the local fly‑fishing club, spends weekends casting along the St. Johns River and biking the county’s nature trails while rooting for the Orlando Magic and Tampa
    Bay Rays, and they treat each fishing outing as a low‑key workout that balances a love of the outdoors with modest cardio.
  arts: Earl Wright, a regular at Port Orange’s Blue Planet Jazz Club, savors live sets by a Miles Davis tribute ensemble and local saxophonist Sam Rivers, immerses themselves in historical nonfiction by
    authors such as David McCullough, and curates a vintage Japanese camera collection that doubles as an artistic homage to mid‑century design, reflecting a blend of scholarly curiosity and aesthetic appreciation.
  travel: Earl Wright prefers road‑trip adventures that blend scenic drives along Florida’s Gulf and Atlantic coasts with occasional overseas cultural immersion, having kayaked the Atlantic shoreline, explored
    historic Savannah, journeyed to Kyoto to hunt rare camera gear, and they now dream of a spring cruise to the Bahamas and a winter trek through New Zealand to photograph remote waterfalls.
  culinary: Earl Wright enjoys cooking fresh grouper in a blackened Cajun style with stone‑ground grits, delights in savoring seared snapper sashimi alongside a cold craft lager, and they occasionally fire
    up the grill for a backyard barbecue featuring smoked pork ribs, reflecting a modest yet adventurous palate that balances Southern comfort with Japanese culinary precision.
  core: Earl Wright melds a detective’s relentless curiosity with a laid‑back Floridian vibe, often juggling vintage camera hunts, spontaneous fishing trips, and a tendency to misplace appointment notes
    while still delivering high‑stakes investigative work on deadline.
background:
  cultural: Earl grew up in a middle‑class, white, Anglo‑American family in the southeastern United States, where self‑reliance and respect for privacy were emphasized. His liberal‑arts education deepened
    his appreciation for American literary and historical traditions. Living in Port Orange, Florida, he is immersed in a coastal, retiree‑heavy community that blends Southern hospitality with a laid‑back,
    tourism‑driven lifestyle. This regional mix—combined with his academic background—shapes his adaptable, pragmatic worldview and his comfort navigating both traditional and modern cultural settings.
