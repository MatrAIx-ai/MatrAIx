  hobbies: '[ ''drawing'', ''painting'', ''building with blocks'', ''collecting seashells'', ''pretend play'', ''listening to stories'', ''exploring nature'' ]'
  career_goals: Even at age five, Allan envisions a future where he can create and explore. He dreams of becoming an artist who paints the colors of the sea, an astronaut who journeys beyond the clouds,
    and a storyteller who writes his own picture books. He also imagines inventing new games or gadgets that let his friends dive into imaginative worlds.
