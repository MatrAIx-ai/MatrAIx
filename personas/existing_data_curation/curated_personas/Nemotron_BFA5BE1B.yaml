personas:
  professional: Allan Powell, an aspiring marine biologist who spends afternoons at the tide pools near Brunswick building miniature sand habitats, uses a vivid imagination to catalog sea creatures and
    shows early curiosity for abstract concepts even though they prefer a delightfully unstructured play schedule.
  sports: Allan Powell, a budding soccer enthusiast who kicks a ball with the Brunswick Youth Soccer Club each Saturday and cheers loudly for the Atlanta Braves on family game nights, also loves to splash
    at the community pool while they dream of becoming a future Olympian swimmer.
  arts: Allan Powell, a little storyteller who sketches crabs and castles inspired by Dr. Seuss books, sings along to the Disney soundtrack of "Moana", and mimics their favorite character in "Bluey" during
    playdates, because they find comfort in bright colors and rhythmic rhymes.
  travel: Allan Powell, who delights in spontaneous family road trips to the salty shores of Tybee Island and the magic of Disney World in Orlando, prefers short, snack‑filled journeys over long flights
    but they daydream about exploring the coral reefs of the Caribbean next summer.
  culinary: Allan Powell, a budding little chef who eagerly helps stir the hushpuppy batter and loves the buttery crunch of fried shrimp at weekend barbecues, frequently insists on adding extra cheese to
    mac and cheese and can identify the sweet snap of fresh strawberries from the local farmer’s market, because they love mixing flavors.
  core: Allan Powell, a wildly imaginative five‑year‑old who never leaves a sandcastle unfinished, hoards glitter stickers, and often misplaces their favorite superhero cape while they dream of sailing
    the ocean.
background:
  cultural: 'Allan was born and raised in Brunswick, a small coastal city in Glynn County, Georgia. His family follows typical Southern customs: weekend barbecues with hushpuppies and shrimp, church gatherings
    on Sundays, and community festivals like the Brunswick Seafood Festival. The coastal environment and Southern hospitality shape his appreciation for nature, storytelling, and sharing with others. His
    household reflects a mainstream white Southern American upbringing, blending modest rural values with the cultural rhythm of a close‑knit beach town.'
