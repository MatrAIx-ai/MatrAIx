personas:
  professional: Tin Yeh, a seasoned research administrator with a graduate-level STEM background, excels at orchestrating grant submissions, meticulous document preparation, and bridging technical and administrative
    communication, leveraging their organized, low‑stress approach and bilingual English‑Mandarin proficiency to support interdisciplinary biotech teams and mentor junior staff.
  sports: Tin Yeh enjoys low‑impact fitness, attending a weekly gentle‑yoga class and strolling through Golden Gate Park, follows the San Francisco 49ers, Golden State Warriors, and San Jose Earthquakes
    with spirited weekend viewing, and they run occasional 5K races with the Bay Area Runners club to maintain cardiovascular health without excessive competition.
  arts: Tin Yeh, an avid reader in a close‑knit book club, immerses themselves in contemporary fiction by Sally Rooney and psychological insights from Brené Brown, they capture silhouettes of succulents
    and city parks through photography, and they curate playlists featuring Norah Jones, Bon Iver, and the cinematic scores of Hans Zimmer while unwinding after work.
  travel: Tin Yeh prefers thoughtfully planned, low‑stress getaways, often escaping to nearby Redwood National Park or Napa Valley for weekend nature walks, while dreaming of immersive trips to Kyoto’s
    zen gardens and Luang Prabang’s riverfront temples, and they always book boutique B&Bs that offer quiet spaces for meditation and photography.
  culinary: Tin Yeh, a modestly skilled home cook, delights in preparing traditional dishes such as steamed dumplings with pork and chive, braised pork belly flavored with star anise and soy sauce, and
    aromatic ginger‑scallion tofu, while they experiment with herb‑infused teas and occasionally over‑salt recipes when anxiety spikes.
  core: Tin Yeh balances a methodical professional life with a tranquil, anxiety‑driven pursuit of solo hobbies, from precise budgeting and meticulous grant work to gentle yoga, herb gardening, and a love
    for quiet literature and mindful cooking, and they constantly seek harmony between structure and serenity.
background:
  cultural: Tin was raised in a bilingual Chinese‑American household that emphasized respect for elders, educational achievement, and community harmony. She maintains cultural ties through celebrating Lunar
    New Year, practicing traditional tea ceremony, and volunteering with local Asian‑American community organizations in Montgomery County. Her upbringing instilled a strong sense of collectivism and cooperation,
    which influences her considerate work style and priority on group harmony. Although never married, she values extended family connections and regularly participates in intergenerational gatherings with
    relatives both in the United States and her family's country of origin.
