    communication (English, Mandarin)'', ''Meeting facilitation'', ''Record keeping'', ''Customer service'', ''Problem solving'']'
  hobbies: '[''Reading contemporary fiction and psychology'', ''Yoga and mindfulness meditation'', ''Indoor gardening'', ''Cooking Chinese cuisine'', ''Nature walks and photography'', ''Small book club
    participation'']'
  career_goals: Tin aims to advance into a senior research administration role, such as Grants Manager or Project Coordinator, where she can leverage her technical background to oversee grant submissions,
    compliance, and interdisciplinary project workflows. She is pursuing a Certified Administrative Professional (CAP) credential and considering a Project Management Professional (PMP) certification to
    formalize her project‑management skills. In the longer term, she hopes to mentor junior administrative staff, shape efficient office policies, and eventually assume a leadership position that promotes
    a supportive, well‑structured work environment while allowing her to maintain a balanced, low‑stress schedule.
