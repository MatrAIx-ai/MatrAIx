  career_goals: Guadalupe aims to formalize her expertise by completing an associate degree in Early Childhood Education within the next two years. She aspires to become a lead caregiver or supervisor at
    a community daycare in Aguadilla, eventually launching her own licensed home‑based daycare that serves families in the Isabela municipality. Additionally, she plans to earn a certification in special‑needs
    support to broaden the inclusivity of her services, and to mentor newer childcare workers, helping them develop the same structured, compassionate approach she values.
