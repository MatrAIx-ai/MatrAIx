personas:
  professional: At 31, Guadalupe Cifuentes is a meticulous early‑childhood caregiver whose CPR certification, bilingual communication, and talent for designing developmentally appropriate activities enable
    them to create safe, structured classrooms while their outgoing nature fosters lively, collaborative playtime.
  sports: At 31, Guadalupe Cifuentes enjoys weekend hikes along the coastal trails of Aguadilla, follows the local baseball team the Aguadilla Sharks, participates in the community’s Ríos de Aguadilla running
    club, and plays casual beach volleyball with friends at Playa Pine Grove, keeping fit through a mix of cardio, strength, and social sports.
  arts: At 31, Guadalupe Cifuentes relishes salsa nights to the rhythms of Celia Cruz and Marc Anthony, attends local bomba performances by the group Bomba Yola, and unwinds with classic films starring
    Rita Moreno while collecting vintage vinyl records of Latin jazz, letting music and performance art energize their social spirit.
  travel: At 31, Guadalupe Cifuentes plans trips with a detailed spreadsheet, favoring short drives to historic Old San Juan for weekend getaways and longer voyages to Barcelona’s Gothic Quarter and the
    hiking trails of New Zealand’s South Island, yet they balance travel aspirations with the financial responsibility of saving for their future daycare.
  culinary: At 31, Guadalupe Cifuentes enjoys cooking mofongo with green plantains, sofrito, and chicharrón, prepares arroz con gandules seasoned with annatto and recaito, and experiments with seasonal
    garden vegetables like sweet potatoes and okra, demonstrating a solid intermediate cooking skill that blends traditional flavors with fresh, home‑grown ingredients.
  core: At 31, Guadalupe Cifuentes blends a love for order and community, turning childcare into a disciplined yet vibrant craft while juggling a penchant for salsa dancing, meticulous budgeting, and occasional
    back‑pain yoga breaks.
background:
  cultural: Guadalupe was raised in the coastal region of Aguadilla and the rural municipality of Isabela, immersing her in a vibrant blend of Puerto Rican traditions. Bilingual in Spanish and English,
    she grew up with a strong Catholic upbringing and close‑knit family ties, which fostered her communal values. Her heritage is reflected in her love for island music, dance, and cuisine, as well as her
    commitment to community service and the warm, hospitable spirit characteristic of Puerto Rican culture.
