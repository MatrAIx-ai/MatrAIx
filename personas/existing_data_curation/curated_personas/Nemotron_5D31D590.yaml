  hobbies: '["LEGO building", "Jigsaw puzzles", "Reading picture books about science", "Nature walks (beach and park)", "Shell collecting", "Drawing and coloring", "Board games (small group)", "Drag-and-drop
    coding (ScratchJr)"]'
  career_goals: Brian dreams of becoming someone who designs and builds things that help people. He talks about wanting to be a mechanical engineer or architect who creates safe bridges, fun playgrounds,
    or even space‑exploration gadgets. He aims to stay disciplined in school, achieve high grades, and develop the problem‑solving skills needed for those careers. He also imagines helping younger kids
    learn good habits, hinting at a future role as a mentor or teacher.
