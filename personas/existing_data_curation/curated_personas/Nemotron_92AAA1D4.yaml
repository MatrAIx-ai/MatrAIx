personas:
  professional: Leila Bahena is a high‑school student who channels their natural talent for organization and methodical planning into budding data‑analysis projects, mastering Excel spreadsheets and introductory
    Python scripts while dreaming of a future role as a technical writer that lets them work in quiet, structured environments.
  sports: Leila Bahena favors low‑impact fitness, strolling through Amelia Earhart Park three times a week and attending a local yoga class, while cheering for the Miami Heat and Orlando Magic from the
    comfort of their bedroom, rarely joining competitive sports but keeping a simple step‑count goal of 10,000 daily.
  arts: Leila Bahena nurtures their creative side by sketching digital illustrations on a tablet inspired by classic boleros and salsa rhythms, binge‑reading mystery author Agatha Christie and sci‑fi author
    Octavia Butler, and curating playlists that include artists like Celia Cruz and Rubén Blades to accompany their cooking sessions.
  travel: Leila Bahena prefers careful, contemplative travel, planning weekend getaways to quiet places like the Florida Keys or the botanical gardens of Savannah, while dreaming of a future solo trip to
    Kyoto’s Zen temples, always using a spreadsheet to track budgets and itinerary details.
  culinary: Leila Bahena enjoys cooking traditional dishes like arroz con pollo, seasoning it with cumin, garlic, and saffron, experimenting with plantain fritters and avocado salads, while occasionally
    over‑salting meals when distracted by anxiety and proudly sharing their creations on Instagram stories using Canva templates.
  core: Leila Bahena blends meticulous organization with quiet curiosity, navigating teenage life through structured study, solo creative pursuits, and constant self‑monitoring while battling anxiety and
    occasional impulsive snack binges.
background:
  cultural: Leila is a second‑generation Cuban‑American raised in Hialeah, a city with a vibrant Cuban community. She grew up in a bilingual household where Spanish was spoken at home and English at school,
    letting her comfortably navigate both cultures. Family gatherings often featured Cuban music, food, and stories about life in Cuba, which fostered her appreciation for her heritage. Though she values
    solitude, she stays connected to her roots through cooking family recipes, listening to Cuban radio stations, and attending occasional community festivals like Calle Ocho. Her cultural background instills
    a strong sense of resilience, familial responsibility, and pride in Cuban traditions.
