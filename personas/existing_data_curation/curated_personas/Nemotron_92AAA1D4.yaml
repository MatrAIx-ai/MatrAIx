  career_goals: Leila aims to pursue a career that leverages her organizational strengths, analytical mind, and preference for low‑stress, structured environments. She plans to enroll in a community college
    after high school to study business administration or information technology, with a long‑term goal of becoming a data analyst or a technical writer. These roles would allow her to work with data, documentation,
    and systematic processes while minimizing constant social interaction. Ultimately, she hopes to secure a stable position that supports her family and offers clear expectations, and she envisions obtaining
    certifications such as Microsoft Excel Expert or a data‑analysis credential.
