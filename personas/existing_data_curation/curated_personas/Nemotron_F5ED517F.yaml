personas:
  professional: Travis Titchworth, an aspiring teen technologist, blends a curiosity for new ideas with a practical approach, and they spend afternoons writing Python scripts to automate school chores,
    soldering Arduino prototypes for mini‑robots, and meticulously documenting each step of their LEGO Technic builds while staying flexible enough to pivot when a circuit misbehaves.
  sports: Travis Titchworth, a 14‑year‑old who favors solitary activity, runs with the Eagle Creek Junior Cross‑Country Team during fall, spends weekends fishing at Lake Willow with the local youth angling
    club, and quietly roots for the neighboring Riverdale Rivermen baseball team, treating fitness as a low‑key extension of their love for nature.
  arts: Travis Titchworth, a 14‑year‑old sci‑fi enthusiast, devours novels by Isaac Asimov and Anne Leigh, sketches speculative spacecraft inspired by the artwork of Alex Ross, binge‑watches classic science‑fiction
    films for John Williams’ scores, and occasionally sketches Lego designs, finding artistic expression in the detail of their creations.
  travel: Travis Titchworth, a 14‑year‑old who prefers low‑key, nature‑focused trips, has hiked the Blue Ridge Mountains, visited the Grand Canyon on a family road‑trip, and daydreams about backpacking
    through Patagonia, but budget and school constraints keep most adventures within a few‑hour drive of home, shaping their wanderlust.
  culinary: Travis Titchworth, a 14‑year‑old with a functional kitchen, whips up quick ramen topped with sliced carrots and boiled eggs, makes grilled cheese on sourdough with tangy cheddar, and adds pickled
    jalapeños to tacos, though they often skip breakfast in favor of late‑night coding snacks like granola bars.
  core: Travis Titchworth, a 14‑year‑old solitary thinker, lives for coding and rockets, hoards reusable coffee cup lids as a quirky habit, and they frequently forget to stretch, leading to occasional backaches.
background:
  cultural: Travis was raised in Schofield, a small Midwestern town in central Wisconsin, where the community is largely composed of families with German, Polish, and Scandinavian heritage. His household
    reflects the region’s values of modesty, self‑reliance, and community involvement. He participates in local traditions such as the county fair and winter ice‑fishing outings, and his family observes
    a blend of Protestant values emphasizing hard work and curiosity. The natural environment—forests, lakes, and seasonal changes—shapes his appreciation for outdoor activities and informs his practical
    outlook on life.
