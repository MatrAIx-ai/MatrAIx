    a software engineer or embedded‑systems developer who creates tools for sustainable agriculture and rural infrastructure. He also considers civil engineering as a path to design energy‑efficient buildings
    for towns like Schofield. He plans to attend a STEM‑focused high school, pursue a bachelor’s degree, and later contribute to projects that blend technology with practical solutions for his region.
