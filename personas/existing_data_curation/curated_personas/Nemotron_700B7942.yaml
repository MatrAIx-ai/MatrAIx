personas:
  professional: Architect Karla Ocampo leverages mastery of BIM, Revit, Rhino, and sustainable passive‑solar design to lead multidisciplinary projects while channeling her curiosity for avant‑garde art
    into innovative, culturally resonant concept visualizations that balance meticulous organization with flexible creative problem‑solving.
  sports: Sports Karla Ocampo hits the Lakefront Trail for sunrise runs in spring and summer, practices vinyasa yoga at a downtown studio, follows the Chicago Bulls and Cubs with fervor, and volunteers
    as an assistant coach for a community youth soccer team during the winter months.
  arts: Arts Karla Ocampo frequents the Museum of Contemporary Art Chicago, curates personal photo series inspired by the textures of vernacular colonial facades, draws influence from photographers Henri
    Cartier‑Bresson and Graciela Iturbide, and watches installations by Ai Weiwei and local muralist Shepard Fairey, all of which shape her design aesthetic.
  travel: Travel Karla Ocampo prefers immersive architecture tours, having recently explored the modernist legacy of Barcelona’s Sagrada Família, the sustainable housing projects of Portland, and the historic
    haciendas of Oaxaca, while planning a future train journey through the Canadian Rockies to combine scenic photography with mindful retreats.
  culinary: Culinary Karla Ocampo dazzles friends with homemade corn tortillas, mole‑based braised short ribs, and adventurous fusion tacos that pair smoked mezcal glaze with Asian slaw, yet often over‑spices
    the dishes in her quest for bold flavor.
  core: Concise Karla Ocampo blends sustainable architecture with vibrant cultural motifs, channels chronic worry into disciplined yoga and running rituals, and rewards herself with mezcal‑centric gatherings
    that reveal a playful, detail‑obsessive creator.
background:
  cultural: Karla was raised in a Mexican‑American household where both Spanish and English were spoken daily, and where celebrations like Día de los Muertos, Semana Santa, and Mexican Independence Day
    were observed with vibrant community gatherings. Her parents, who immigrated to the United States in the late 1970s, instilled a deep appreciation for the rich visual language of Mexican folk art—bright
    colors, intricate tile patterns, and handcrafted textiles—which later influenced her design ethos. Growing up in the Chicago suburbs, she participated in cultural festivals hosted by the local Mexican
    community, volunteered at a neighborhood mural project, and attended a bilingual elementary school that emphasized heritage pride. This bicultural upbringing gave her a nuanced perspective that merges
    Mexican cultural motifs with contemporary architectural practice, and it fuels her commitment to create spaces that honor cultural identity while addressing modern environmental challenges.
