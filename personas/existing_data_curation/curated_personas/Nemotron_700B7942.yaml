  hobbies: '["Visiting contemporary art museums", "Exploring street art and avant‑garde installations", "Urban and vernacular photography", "Hand sketching and visual journaling", "Cooking traditional Mexican
    cuisine and fusion experiments", "Hosting mezcal tasting evenings", "Yoga and mindfulness meditation", "Lakefront running", "Volunteering at a local cultural center teaching design to youth", "Bilingual
    book club (Mexican literature & architectural theory)"]'
  career_goals: Karla aims to become a senior architect who leads large‑scale sustainable projects that celebrate Mexican cultural heritage within the Chicago region. She plans to attain LEED Accredited
    Professional status and spearhead affordable‑housing initiatives that integrate passive design strategies for low‑income neighborhoods. Over the next five years, she envisions directing a multidisciplinary
    studio where junior designers are mentored, and where research on climate‑responsive architecture informs practice. Long‑term, she aspires to launch her own boutique firm that produces culturally resonant,
    environmentally responsible designs, while also contributing to scholarly publications and speaking at national design conferences. Balancing professional ambition with personal well‑being, she seeks
    to implement structured work‑life boundaries to mitigate her natural tendency toward worry and stress.
