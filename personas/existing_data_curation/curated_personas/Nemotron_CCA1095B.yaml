personas:
  professional: Antwone Hall is a 39-year-old aspiring HVAC technician who leverages their hands-on repair skills—from automotive and plumbing to basic electrical work—to thrive in a role with clearly defined
    duties at a local casino, and they use a calm but assertive communication style to keep maintenance tasks predictable and reduce anxiety about the future.
  sports: Antwone Hall follows the Detroit Tigers for baseball and the Miami Heat for basketball, fits weekly pick-up basketball games into a structured schedule, enjoys light cardio fishing trips on Lake
    Miller for relaxation, and they maintain a modest fitness routine tracked on a smartwatch to stay active without overwhelming their routine.
  arts: Antwone Hall finds solace in R&B legends like Marvin Gaye, classic hip-hop from Tupac Shakur, and soul-filled gospel performances at their local church, frequently attends community concerts featuring
    artists such as Anderson .Paak, and they curate a personal playlist that blends nostalgic tracks with contemporary soul to accompany their DIY projects.
  travel: Antwone Hall prefers short, planned road trips to nearby cultural hotspots such as Savannah's historic district and New Orleans for its music and cuisine, balances travel budgeting with family
    responsibilities, and they dream of a future vacation to the Great Smoky Mountains once a stable side-business provides extra income.
  culinary: Antwone Hall enjoys cooking Southern-style meals like buttermilk fried chicken, shrimp and grits, and collard greens seasoned with smoked paprika, experimenting with family-rooted recipes while
    honing a moderate cooking skill that blends careful preparation with occasional improvisation using hot sauce and fresh herbs, and they often host friends for casual dinner parties to showcase their
    culinary creations.
  core: Antwone Hall is a practical, structure-seeking handyman who balances a love for routine—from scheduled sports viewing to meticulously tracked finances—with a tendency to worry, occasional disorganization,
    and a craving for quiet fishing retreats, and they rely on community support to keep anxiety in check.
background:
  cultural: Antwone is a Black American whose family originally hails from the Southern United States, bringing with them a rich tradition of soulful music, communal gatherings, and home‑cooked meals. Growing
    up in a tight‑knit African‑American community in Las Vegas, he was raised with a strong sense of church involvement and respect for elders. This cultural foundation influences his love for gospel music,
    his appreciation for communal meals, and his commitment to helping neighbors. While he embraces the diverse cultural landscape of Las Vegas, he also maintains a connection to his Southern roots through
    food, storytelling, and participation in local Black cultural festivals.
attributes:
  skills: '[''Automotive repair'', ''Home maintenance (plumbing, electrical, carpentry)'', ''Basic computer troubleshooting'', ''Household budgeting'', ''Cooking'', ''Conflict mediation'']'
