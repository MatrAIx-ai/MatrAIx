    with friends'']'
  career_goals: After a period of unemployment, Antwone wants to re‑enter the workforce in a role that offers clear responsibilities and a predictable schedule, which would help ease his anxiety about the
    future. He aims to obtain a vocational certification in HVAC or electrical maintenance to qualify for a stable job with a local casino or property management firm. In the longer term he hopes to launch
    a modest home‑repair side business, giving him the flexibility to manage his own time while providing a steady income for his family. He also plans to complete his GED and attend evening classes to
    broaden his career options, all while minimizing stress and maintaining a supportive home environment.
