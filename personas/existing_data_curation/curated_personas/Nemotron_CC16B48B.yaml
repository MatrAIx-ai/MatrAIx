  career_goals: Jeleesa aims to finish high school with solid grades and then pursue a career that blends routine, practicality, and helping others. She is drawn to the healthcare field and plans to enroll
    in a nursing program at a community college, aspiring to become a registered nurse specializing in pediatric care where she can provide compassionate, reliable support. Simultaneously, she is exploring
    the possibility of working in a library or as a library technician, attracted by the quiet, organized environment and the chance to foster a love of reading in her community. In either path, she seeks
    a stable, service‑oriented role that allows her to uphold her values of consistency and care.
