personas:
  professional: Jeleesa Pellette is a budding historical fiction writer and illustrator who channels their love for quiet reflection and routine into daily journaling and watercolor sketches, using their
    methodical nature to meticulously research period details while preferring solitary creative work over group projects.
  sports: Jeleesa Pellette enjoys solitary fitness activities such as early‑morning trail walks in the nearby woods and occasional yoga sessions at the community center, while cheering on the local high
    school track team and following the professional basketball club the Los Angeles Lakers for the occasional game night.
  arts: Jeleesa Pellette immerses themselves in the arts by painting watercolors inspired by Claude Monet, sketching scenes reminiscent of John Singer Sargent, listening to gospel legends Mahalia Jackson
    and classic R&B icons Aretha Franklin, and practicing piano pieces such as Bach’s Minuet in G learned from church, all of which fuel their quiet creative expression.
  travel: Jeleesa Pellette prefers low‑key travel that balances historical curiosity with natural tranquility, having visited Washington, D.C. to explore the Smithsonian’s American history exhibits and
    dreaming of hiking the quiet stretches of the Appalachian Trail in Shenandoah National Park, while always planning trips months ahead to fit their school schedule and limited budget.
  culinary: Jeleesa Pellette enjoys cooking simple family soul‑food recipes such as collard greens seasoned with smoked paprika, sweet potato pie flavored with nutmeg and cinnamon, and cornbread with honey
    butter, demonstrating a modest yet confident culinary skill set that blends tradition with occasional experimental twists like adding a dash of ginger to barbecue sauce.
  core: Jeleesa Pellette is a methodical fourteen‑year‑old who finds solace in solitary creative pursuits, adheres to strict routines for reading, journaling, and budgeting, yet occasionally procrastinates
    on chores, preferring the quiet glow of a watercolor palette to social chatter.
background:
  cultural: 'Jeleesa is a Black teenager raised in Caddo Mills, a small town in East Texas. Her family maintains strong ties to Southern African‑American traditions: church is a central part of life, with
    gospel music, choir participation, and community service shaping her values of harmony and cooperation. Family gatherings feature soul‑food cooking, storytelling, and a respect for elders that reinforces
    her preference for routine and practical responsibilities. Growing up in a predominantly white rural area, she has learned to navigate cultural differences while drawing pride from her heritage, celebrating
    Juneteenth with friends and participating in local Black History Month events. These experiences have fostered a deep sense of resilience, community, and an appreciation for both the quiet moments at
    home and the broader cultural celebrations that connect her to a larger Black community in Texas.'
