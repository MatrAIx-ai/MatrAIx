    English Tutoring'', ''Attending Cultural Festivals'', ''Mezcal Tasting'']'
  career_goals: At this stage, Manuel aims to transition into mentorship and consultancy, establishing a boutique advisory firm that helps property owners adopt sustainable community‑development practices.
    He plans to earn Certified Property Manager (CPM) and Sustainable Communities Professional (SCP) credentials, lead pilot retrofits of aging complexes with solar panels and water‑saving technologies,
    and influence local policy on affordable housing and green building standards. He also hopes to document his industry knowledge in a guidebook for emerging property managers while ensuring a stable
    financial foundation for his family.
