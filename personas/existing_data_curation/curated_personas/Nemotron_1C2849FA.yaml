personas:
  professional: Maria Feliciano is a 26‑year‑old mechanical engineer who leverages her CAD, FEM and Python expertise to embed bright colors and indigenous patterns inspired by Semana Santa processions and
    Día de los Muertos altars into sustainable infrastructure projects, balancing rigorous Agile timelines with an artistic flair while quietly competing for leadership roles.
  sports: Maria Feliciano jogs early mornings along Buffalo Bayou, follows the Houston Astros and Rockets loyally, and participates in a women’s climbing club at Texas Climbing Academy, using fitness as
    a counterbalance to her competitive work mindset.
  arts: Maria Feliciano immerses herself in visual arts by sketching downtown Houston cityscapes, attending exhibitions at the Museum of Fine Arts, and curating playlists featuring marimba virtuoso Marco
    Rodríguez, contemporary Latin pop icons Bad Bunny and Natalia Lafourcade, while frequently attending marimba performances and the annual La Quema del Diablo celebration that inspire her bold creative
    palette.
  travel: Maria Feliciano enjoys weekend getaways to the Texas Hill Country, has trekked the ruins of Tikal on a study‑abroad trip, and dreams of exploring Barcelona’s modernist architecture, all while
    budgeting travel expenses against her professional development fund.
  culinary: Maria Feliciano loves cooking vibrant pepián, handmade tamales, and black‑bean pupusas, experimenting with smoked paprika, fresh corn, and plantain leaves, yet she frequently orders sushi on
    busy weeks, citing a guilty pleasure for convenience.
  core: Maria Feliciano fuses engineering precision with bold cultural aesthetics, obsessively tracks budgets, battles anxiety with yoga, competes zealously at work, and channels her restless creativity
    into art, food, and community‑driven design.
background:
  cultural: Maria grew up in a bilingual household in Houston, the daughter of Guatemalan immigrants who emigrated in the early 2000s. Her family maintains traditions such as Semana Santa processions, Día
    de los Muertos altars, and the annual celebration of La Quema del Diablo, which have shaped her appreciation for ritual and visual symbolism. She speaks Spanish fluently at home and engages with Houston's
    vibrant Guatemalan community through cultural festivals, marimba performances, and local culinary events. These experiences inform her design sensibility, often incorporating bright colors, indigenous
    patterns, and communal spaces reminiscent of Guatemalan plazas into her engineering projects. Maria values the blend of her Latin American roots with her American professional identity, striving to
    bridge cultural narratives through sustainable, artistic engineering solutions.
attributes:
  skills: '[''SolidWorks'', ''AutoCAD'', ''ANSYS'', ''MATLAB'', ''Python'', ''Finite Element Analysis'', ''Project Management'', ''Design Thinking'', ''Technical Writing'', ''Bilingual Spanish-English'']'
  hobbies: '[''Sketching'', ''Visiting Art Galleries'', ''Cooking Guatemalan Cuisine'', ''Yoga'', ''Hiking'', ''Reading Science Fiction'', ''Traveling'', ''Volunteering STEM Workshops'', ''Photography'']'
  career_goals: Maria aims to become a senior engineer leading multidisciplinary projects that integrate sustainability and artistic design, particularly in urban infrastructure and renewable energy systems.
    Over the next five years she plans to obtain a Professional Engineer (PE) license, spearhead a team that designs solar‑powered public spaces infused with cultural art motifs, and publish her work in
    industry journals. She aspires to speak at conferences on the intersection of engineering and art, and eventually launch her own consultancy focused on community‑driven, eco‑friendly design solutions
    for under‑served neighborhoods in Houston and beyond. Her competitive drive fuels a desire for recognition as an innovative leader, while her disciplined approach ensures she meets deadlines and quality
    standards.
