  hobbies: '[''Sketching automotive designs'', ''Painting'', ''Reading art and science‑fiction literature'', ''Listening to instrumental music'', ''Solo nature walks'', ''Yoga and meditation'', ''Cooking
    traditional Mexican dishes'', ''Building model cars'', ''Visiting art museums'', ''Learning Spanish poetry'']'
  career_goals: Ana aims to become a master technician by earning additional ASE certifications, especially in hybrid/electric systems. She envisions moving into a lead‑technician or shop‑manager role where
    she can mentor junior staff, particularly women and under‑represented minorities in the trade. Long‑term, she hopes to open a boutique garage focused on high‑performance and environmentally friendly
    vehicles, offering quiet, high‑quality service and bespoke aesthetic upgrades that reflect her artistic curiosity.
