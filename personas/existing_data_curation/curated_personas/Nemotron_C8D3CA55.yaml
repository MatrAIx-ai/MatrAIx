personas:
  professional: Bryan Mackle is an aspiring junior engineer who constructs moving LEGO sets, programs rule‑breaking Minecraft worlds, and drafts comic strips, channeling their curiosity and practical mind
    while often hopping between ideas before a project is finished.
  sports: Bryan Mackle plays midfield for a neighborhood soccer league, cheers for Manchester United, practices with the local youth club on weekends, and in the winter swaps the field for indoor basketball,
    where their competitive streak often drives them to out‑score opponents.
  arts: Bryan Mackle devotes after‑school hours to sketching comic panels inspired by Stan Lee and Adventure Time, binge‑watches the Harry Potter films, and builds elaborate Minecraft landscapes as digital
    canvases, channeling their imaginative flair into visual storytelling.
  travel: Bryan Mackle enjoys weekend hikes collecting rocks and insects, dreams of road‑tripping to the Grand Canyon and a family visit to Disneyland, and prefers itineraries that mix adventurous stops
    with frequent snack breaks to keep their energy up.
  culinary: Bryan Mackle loves pepperoni pizza, handmade chocolate chip cookies, and crafting slime‑themed gummy snacks, can whisk up a simple volcano experiment using edible ingredients, yet stubbornly
    refuses broccoli, dubbing it a ‘green monster’.
  core: Bryan Mackle is a curious, hyper‑creative 8‑year‑old whose love for building, gaming, and comics fuels their imagination while intense anxiety and a knack for impulsive spending keep life delightfully
    unpredictable.
background:
  cultural: 'Bryan comes from a white, middle‑class family in Norton, Massachusetts, a suburb of the Greater Boston area. His upbringing reflects typical New England values: emphasis on education, community
    involvement, and self‑reliance. He celebrates traditional American holidays such as Thanksgiving, Christmas, and Fourth of July fireworks with his family, and participates in local youth sports leagues
    and school activities. His family heritage likely includes English, Irish, or other Northern European roots, which influence family stories and occasional cultural foods.'
