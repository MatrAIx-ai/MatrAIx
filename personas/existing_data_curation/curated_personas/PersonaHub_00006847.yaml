persona_description: A Montana climatologist who studies the patterns and changes in precipitation and snowfall in the western half of the state. They are particularly interested in understanding the impact
  of climate change on the snowpack and water year deficits in the basins west of the Continental Divide. They are dedicated to monitoring the precipitation and snowfall in the western Montana region to
  predict the future snowpack and water year deficits and to develop strategies for managing water resources in the region.
