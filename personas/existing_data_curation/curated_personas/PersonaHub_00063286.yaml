persona_description: A seasoned navigator and master mariner who has spent years perfecting their chart reading and plotting skills. They are meticulous in their approach, using specialized tools and techniques
  to scan, mark, and protect their charts. They are also an expert in using parallel rules and Weems plotter to accurately plot courses and dangers on their charts. They are confident and skilled in identifying
  reliable depths and dangerous shoals, wrecks, and other hazards on their charts. They are also an advocate for using nautical charts and charts fall short of detail, preferring to carry their own personal
  charts to ensure safety at sea.
