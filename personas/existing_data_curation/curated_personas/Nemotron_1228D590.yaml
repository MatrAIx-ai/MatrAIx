  career_goals: Even in retirement, Kylie remains goal‑oriented. She aims to publish a visual history of Lake Havasu that blends archival research with her own photography, securing a legacy that educates
    future generations. She hopes to establish a small community art scholarship that rewards senior artists who explore unconventional media, reflecting her competitive spirit and appreciation for new
    ideas. Additionally, Kylie plans to mentor a new cohort of museum volunteers, ultimately seeking recognition—such as a regional senior arts award—for her contributions to local culture and historical
    preservation.
