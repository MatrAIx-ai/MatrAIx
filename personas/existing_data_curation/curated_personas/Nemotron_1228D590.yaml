personas:
  professional: Kylie Goldberg, a retired business administrator turned volunteer coordinator, leverages their associate’s degree in business administration, budget management, and event‑planning expertise
    to oversee museum exhibitions and senior technology workshops, applying their competitive drive to ensure projects meet high standards, and they adapt flexibly to new ideas.
  sports: Kylie Goldberg, an avid water‑sport enthusiast, paddles with the Lake Havasu Kayak Club each morning, joins a weekly paddle‑boarding session, cheers for the Arizona Cardinals and roots for the
    Phoenix Suns during basketball season, and competes in bridge tournaments at the senior center, and they treat fitness as a blend of low‑impact endurance and mental sharpness that keeps them feeling
    youthful.
  arts: Kylie Goldberg, a watercolorist and museum curator, draws inspiration from Georgia O'Keeffe’s desert palettes, Ansel Adams’ black‑and‑white landscapes, and Lin‑Manuel Miranda’s storytelling, regularly
    attending productions by the Arizona Theatre Company, curating small exhibitions at the Lake Havasu Museum of History, and designing graphic flyers for community events, which they consider a vital
    outlet for their creative curiosity.
  travel: Kylie Goldberg, a methodical planner who loves both leisurely river cruises and desert hikes, prefers curated itineraries that blend art gallery tours in Phoenix and Los Angeles with off‑the‑beaten‑path
    visits to Sedona’s red rocks and historic southern Arizona towns, often traveling with a small group of senior friends to keep costs manageable while still indulging in occasional spontaneous photo‑excursions,
    which they cherish as sources of fresh inspiration.
  culinary: Kylie Goldberg, an enthusiastic home chef, experiments with Southwest flavors such as roasted green chilies, piñón nuts, and prickly pear salsa, while mastering international dishes like Thai
    green curry with lemongrass and Ethiopian lentil stew, often sourcing fresh herbs from their xeriscape garden and hosting casual dinner parties where they pair meals with a glass of Arizona‑grown Tempranillo.
  core: Kylie Goldberg, a curious and competitive 75‑year‑old who blends artistic passion with community service, navigates life with meticulous planning, a love for water‑bound adventures, and a habit
    of tinkering with genealogy charts while they occasionally swear at slow‑moving bridge opponents.
background:
  cultural: Kylie grew up in the post‑war United States, likely in a Midwestern suburb, experiencing the cultural shifts of the 1960s and 1970s. Her upbringing is rooted in mainstream white American traditions
    with Protestant family values, emphasizing community involvement, self‑reliance, and modest ambition. After moving to Lake Havasu City in retirement, she has embraced the Southwest’s unique cultural
    blend, appreciating Native American art motifs and Mexican culinary influences. Her long‑standing marriage reflects traditional partnership values while also adapting to contemporary, egalitarian views
    on shared responsibilities.
