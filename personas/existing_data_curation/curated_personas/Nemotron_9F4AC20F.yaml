  career_goals: Even at four, Veena enjoys imagining future roles that involve helping and guiding others. She often says she wants to be a teacher because she loves sharing what she knows, or a doctor
    because she likes caring for people who are hurt. She also shows fascination with building structures, imagining herself as an engineer who creates safe, orderly spaces. These aspirations reflect her
    practical mindset, desire for structure, and kindness.
