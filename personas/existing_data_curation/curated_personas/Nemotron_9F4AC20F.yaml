personas:
  professional: Veena Bajnath, a 4‑year‑old with a natural love for order, already takes on the role of "helper" at their preschool, skillfully organizing crayons and play‑area schedules while using their
    outgoing, cooperative spirit to guide classmates through group projects.
  sports: Veena Bajnath, 4, darts around the playground with boundless energy, participates in the "Kiddie Kickers" youth soccer club where they learn teamwork, and they root for the Seattle Mariners during
    family baseball game nights.
  arts: Veena Bajnath, 4, spends afternoons drawing vivid dinosaurs with Crayola crayons, sings along to the upbeat tunes of Raffi’s "Baby Belugais" and Disney’s "Moana" soundtrack, and they enjoy watching
    the animated series "Bluey" for inspiration.
  travel: Veena Bajnath, 4, has already visited Disney World in Florida and the Grand Canyon on a family road trip, loves the excitement of airplane windows showing clouds, and they dream of seeing the
    Eiffel Tower in Paris someday.
  culinary: Veena Bajnath, 4, adores creamy macaroni‑and‑cheese, crispy chicken nuggets, and sweet strawberry slices, can stir pancake batter with a plastic spoon all by themselves, but stubbornly refuses
    to eat broccoli.
  core: Veena Bajnath, a 4‑year‑old whose bright curiosity blends with a love for routines, they thrive on interactive play, organized scenes, and the comfort of familiar meals and games.
background:
  cultural: Veena belongs to a South Asian (Indian) family living in Milpitas, California. She grows up bilingual, hearing both English and Hindi (or a regional language spoken at home) and celebrating
    cultural festivals such as Diwali, Holi, and Pongal with family gatherings, traditional foods, and music. Her parents emphasize respect for elders, the value of education, and community involvement,
    which blend with the diverse, tech-oriented environment of the Bay Area. This multicultural exposure shapes her worldview, fostering curiosity about both her heritage and the broader American culture.
