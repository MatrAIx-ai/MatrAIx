  career_goals: Although retired from full-time employment, Richard aims to stay professionally engaged by offering pro-bono consulting to local small businesses and non-profit art organizations in the
    Chicago suburbs. He aspires to mentor younger entrepreneurs, serve on the board of the Orland Park Arts Council, and lead fundraising campaigns for community cultural projects. He also hopes to travel
    internationally to visit major museums and galleries, enriching his personal art collection and cultural knowledge.
