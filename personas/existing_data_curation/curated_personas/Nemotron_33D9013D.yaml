  hobbies: '[''sketching desert landscapes'', ''digital mood‑board creation'', ''mixed‑media collage'', ''listening to ambient/electronic music'', ''strategy video gaming'', ''journaling'', ''visiting art
    galleries and museums'']'
  career_goals: Martha dreams of turning her artistic curiosity into a career as a concept artist and independent game developer. She hopes to earn a GED, then enroll in a specialized art program or an
    online visual arts degree where she can study illustration, animation, and interactive storytelling. Long‑term, she wants to create her own indie video games that blend surreal visuals with thought‑provoking
    narratives, and eventually establish a small studio where she can collaborate with a tight‑knit team of like‑minded creators. She also entertains the idea of freelance illustration work for magazines
    or digital media, giving her the flexibility she values and allowing her to pursue personal projects without restrictive schedules.
