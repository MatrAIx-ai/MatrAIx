personas:
  professional: Martha Ngo, an aspiring visual artist and self‑taught game strategist, merges desert‑inspired sketches with analytical thinking honed in Civilization and StarCraft, channeling a relaxed
    attitude toward deadlines into spontaneous mixed‑media collages while their critical, competitive streak pushes them to constantly refine their technique despite occasional missed school project due
    dates.
  sports: Martha Ngo occasionally joins the Albuquerque Youth Soccer Club in the spring, watches New Mexico United matches and New Mexico State Aggies basketball games for motivation, prefers solo sunset
    jogs along the Sandia foothills to stay fit, and often skips workouts when stress overwhelms them, reflecting their competitive yet flexible approach to physical activity.
  arts: Martha Ngo curates Pinterest mood boards that draw on the atmospheric soundscapes of Brian Eno, the abstract brushwork of Georgia O’Keeffe, and the immersive light installations of James Turrell,
    while spending weekends sketching desert sunsets and assembling mixed‑media collages that echo the experimental electronic beats of Aphex Twin and the ambient textures of Sigur Rós, constantly iterating
    with a critical eye.
  travel: Martha Ngo favors spontaneous, low‑budget road trips across the Southwest, having explored Sedona’s red rocks, Santa Fe’s historic plaza, and a weekend music‑scene crawl in Austin, Texas, while
    dreaming of a solo pilgrimage to Burning Man, always opting for small‑group travel and flexible itineraries that leave room for impromptu sketching sessions.
  culinary: Martha Ngo, a moderately skilled home cook, gravitates toward bold Southwestern flavors, regularly preparing green chile enchiladas, quinoa salads with pomegranate and toasted pepitas, and experimenting
    with lavender‑infused desserts, while also indulging in occasional sushi rolls to break from familiar tastes.
  core: Martha Ngo is a fiercely curious teen who channels anxiety into artistic collages, strategic gaming, and spontaneous desert‑inspired sketches, all while juggling a love for ambient music and a penchant
    for last‑minute plans.
background:
  cultural: Martha comes from a white, middle‑class family that settled in Albuquerque when she was a child. Growing up in the Southwest, she has been exposed to the region’s vivid desert scenery, Native
    American art motifs, and the lively multicultural atmosphere of the city, including its strong Hispanic influences. Her family celebrates typical American holidays but also appreciates local traditions
    such as the Albuquerque International Balloon Fiesta and community art events. This blend of suburban upbringing and the eclectic cultural tapestry of New Mexico has shaped her artistic sensibility,
    giving her a fondness for bold colors, expansive horizons, and an appreciation for both historic and contemporary art forms.
attributes:
  skills: '[''digital illustration'', ''basic HTML/CSS'', ''creative writing'', ''critical media analysis'', ''strategic video gaming'', ''photography'', ''self‑directed research'', ''problem solving'',
