personas:
  professional: Darryl Toussaint is an aspiring young programmer who blends a love for sci‑fi graphic novels, Minecraft world‑building, and moving‑part LEGO engineering into Scratch projects that turn comic
    ideas into interactive stories, and they balance boundless curiosity with a practical, flexible approach to school assignments.
  sports: Darryl Toussaint shines in one‑on‑one basketball games on the neighborhood court, cheers on the Washington Wizards, occasionally joins small pick‑up matches with friends, and they balance a laid‑back
    training routine that mixes daily jump‑rope sessions with spontaneous weekend park runs.
  arts: Darryl Toussaint is a budding comic artist who sketches original superhero characters while vibing to Kendrick Lamar, Burna Boy, and Kompa classics like Tabou Combo, and they channel that musical
    inspiration into vivid panels that often feature sci‑fi technology, reflecting their love for graphic novels and LEGO engineering.
  travel: Darryl Toussaint loves weekend excursions to the National Mall and nearby nature trails, collecting leaves for science notebooks, and they dream of an adventure trip to Tokyo’s Akihabara district
    to explore gaming culture, though they prefer short, low‑cost journeys over lengthy vacations.
  culinary: Darryl Toussaint enjoys helping their mother cook simple rice and beans seasoned with cumin, garlic, and a dash of hot sauce, often improvising a quick cheese quesadilla as a snack between coding
    sessions, and they delight in mastering the art of perfectly fluffy rice.
  core: Darryl Toussaint is a curious, LEGO‑building, comic‑drawing, basketball‑playing, music‑loving kid who can lose a sock in a backpack but they will spend hours perfecting a Scratch animation for the
    sheer joy of creation.
background:
  cultural: Darryl is an African‑American boy of Haitian descent living in Washington, DC. At home, his family speaks Haitian Creole and celebrates Haitian traditions such as Rara music, bonfouné gatherings,
    and cooking dishes like griot and pikliz. In the broader community, he participates in Black History Month events, attends a local Baptist church, and takes part in youth programs at the Boys & Girls
    Club. He enjoys the multicultural fabric of the city, from visiting the Smithsonian’s African American history exhibits to attending neighborhood block parties that blend Caribbean and African American
    food, music, and dance. His cultural identity shapes his values of community solidarity, respect for elders, and a love for rhythmic music and storytelling.
