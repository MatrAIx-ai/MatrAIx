  hobbies: '[''Reading sci‑fi graphic novels'', ''Playing Minecraft'', ''Building LEGO sets'', ''Basketball (small games)'', ''Listening to hip‑hop and Haitian Kompa'', ''Drawing comic strips'', ''After‑school
    Scratch coding club'', ''Exploring DC parks and nature trails'', ''Cooking family recipes'']'
  career_goals: Darryl dreams of becoming a robotics engineer who designs machines that can help keep his neighborhood safe and clean. He is fascinated by how things work and wants to combine his love of
    building with his curiosity about science. He also imagines himself as a community mentor someday, teaching younger kids how to code or build projects, because he values harmony and cooperation. In
    the long term, he hopes to study environmental science to protect the parks and green spaces of Washington, DC.
