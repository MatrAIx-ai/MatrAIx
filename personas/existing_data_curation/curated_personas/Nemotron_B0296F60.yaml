personas:
  professional: Mario Pomeroy, a 17‑year‑old aspiring IT support specialist and budding residential carpenter, blends hands‑on troubleshooting of computer hardware, basic networking knowledge from his CompTIA
    A+ study, and practical carpentry skills with a calm, cooperative demeanor that makes peers and future customers feel heard and supported.
  sports: Mario Pomeroy spends most afternoons at the Atlanta Skate Club perfecting kickflips, follows the Atlanta Falcons in the fall and the Atlanta Braves in the spring, and joins a local pick‑up basketball
    league at the community center, balancing his love for individual skate culture with team‑sport camaraderie.
  arts: Mario Pomeroy curates eclectic playlists that swing from classic rock legends like Led Zeppelin to Atlanta hip‑hop icons such as J. Cole and Lil Baby, and he sketches street scenes in his notebook
    while listening, letting the music shape his visual style and provide a soundtrack for his creative breaks.
  travel: Mario Pomeroy prefers short road trips that blend adventure and comfort, having driven to Savannah’s historic squares and Asheville’s mountain trails, while dreaming of a weekend in New Orleans
    for its live jazz and street food, all budgeted through earnings from his part‑time tech help gigs.
  culinary: Mario Pomeroy favors Southern comfort dishes such as buttermilk‑marinated fried chicken, collard greens seasoned with smoked paprika, and homemade mac & cheese, yet he also experiments with
    sushi rolls and can rust‑proof a skillet for a perfect sear, though he often forgets to eat enough between fixing projects.
  core: Mario Pomeroy is a 17‑year‑old tech‑curious, skate‑obsessed teen who balances Southern hospitality values with a modern DIY mindset, often juggling hardware repairs, homework, and skate sessions
    while occasionally forgetting to hydrate or eat on schedule.
background:
  cultural: Mario grew up in a middle‑class, predominantly white suburb of Fulton County, Atlanta, where Southern traditions intersect with the city’s diverse cultural landscape. Family gatherings often
    featured Southern hospitality, church involvement, and home‑cooked comfort foods, while his school and community exposure introduced him to the vibrant music, food, and social scenes of a multicultural
    Atlanta. This blend of traditional Southern values and the city’s dynamic, inclusive environment has shaped his balanced outlook, fostering both respect for established customs and openness to new ideas.
