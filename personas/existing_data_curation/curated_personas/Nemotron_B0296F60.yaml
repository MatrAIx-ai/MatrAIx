  hobbies: '["skateboarding", "video gaming", "electronics tinkering", "music listening and playlist creation", "animal shelter volunteering", "reading popular science", "coding simple scripts"]'
  career_goals: Mario aims to earn his GED within the next year and then enroll in a vocational program focused on computer networking and repair. He plans to obtain a CompTIA A+ certification and secure
    an entry‑level IT support position at a local business, blending his tech curiosity with practical work experience. Simultaneously, he is interested in pursuing an apprenticeship in residential carpentry
    to develop a stable trade skill. Long‑term, Mario hopes to achieve financial independence that allows him to support his family and eventually mentor younger teens through an after‑school community
    program, fostering both technical and life‑skills development.
