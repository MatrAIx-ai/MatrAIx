persona_description: A historian who specializes in the history of the Islamic world, particularly the period from the 7th to the 12th century. His research interests include the political, social, and
  cultural history of the Islamic kingdoms of Spain, Morocco, and Algeria, as well as the rise and fall of the Islamic Caliphates in the Iberian Peninsula. He has written extensively on the political and
  military history of the Islamic kingdoms of Spain, as well as on the cultural and religious history of the Islamic world during this period. He is particularly interested in the role of the Omayyad dynasty
  in the history of Islamic Spain, and the contributions of the Moors to the development of Islamic civilization in the Iberian Peninsula. He is a member of several academic societies and has given numerous
  lectures and presentations on his research.
