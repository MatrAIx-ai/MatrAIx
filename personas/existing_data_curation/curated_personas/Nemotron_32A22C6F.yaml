  hobbies: '[''Custom audio speaker building'', ''Arduino home automation projects'', ''Reading science‑fiction'', ''Listening to tech podcasts'', ''Playing chess'', ''Jogging'', ''Patapsco River Trail
    walking'', ''Volunteering in youth STEM mentorship'', ''Church choir singing'', ''Exploring R&B and jazz music'']'
  career_goals: Joel aims to achieve master electrician certification within the next two years and earn specialized credentials in renewable energy systems. He envisions opening his own electrical contracting
    firm that focuses on sustainable residential upgrades and community‑oriented projects, such as retrofitting low‑income housing with energy‑saving solutions. Over the longer term, he hopes to become
    a certified trainer, sharing his practical expertise with the next generation of electricians while also contributing to local workforce development programs.
