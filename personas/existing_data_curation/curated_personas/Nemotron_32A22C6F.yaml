personas:
  professional: Joel Mitchell, a 31‑year‑old electrician with a penchant for hands‑on problem solving, blends rigorous code compliance with a curiosity for renewable technology; they routinely mentor apprentices,
    manage project timelines with methodical precision, and are charting a path toward master‑electrician certification while drafting plans for a community‑focused sustainable contracting firm.
  sports: Joel Mitchell jogs the Patapsco River Trail three times a week, follows the Baltimore Ravens and the Maryland Terrapins for football, participates in a local adult basketball league at the community
    center, and they occasionally join a weekend cycling club that rides the Chesapeake Bay shoreline.
  arts: Joel Mitchell’s creative life is anchored by evenings in the church choir singing classic soul tunes from Marvin Gaye and Aretha Franklin, weekend listening sessions of John Coltrane’s jazz on vinyl,
    and immersive reading of science‑fiction works by Isaac Asimov and Liu Cixin, which they use to inspire improvisational thinking and narrative appreciation.
  travel: Joel Mitchell favors low‑key road trips that blend tech conferences in Seattle, jazz festivals in New Orleans, and weekend hikes in Shenandoah National Park, planning future visits to Japan’s
    Akihabara district for electronics inspiration while they balance a modest budget that prioritizes family time over pricey tours.
  culinary: Joel Mitchell enjoys cooking soul‑food staples like fried catfish with hushpuppies, collard greens seasoned with smoked turkey, and sweet‑potato casserole while experimenting with Arduino‑controlled
    sous‑vide rigs, and they relish a well‑balanced diet featuring black‑eyed peas, corn succotash, and a strong espresso shot after each meal.
  core: Joel Mitchell merges a meticulous electrician’s eye for safety with a restless hobbyist’s urge to tinker, often humming R&B while wiring circuits, they neglect dentist appointments but never miss
    a chess match at the community center.
background:
  cultural: Joel grew up in a close‑knit African‑American family in the Baltimore metropolitan area before moving to Glen Burnie. His upbringing was shaped by church community gatherings, family cookouts
    featuring soul food traditions, and a strong emphasis on mutual support. He carries forward these cultural values by prioritizing harmony in his work relationships and volunteering to mentor younger
    community members. While his profession reflects the practical, hands‑on tradition often celebrated in his community, his interests in music, storytelling, and collective uplift echo broader African‑American
    cultural narratives. Living in Anne Arundel County, Joel also navigates a diverse suburban environment, drawing from both his heritage and the multicultural experiences of Maryland's coastal region.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical systems'', ''Solar photovoltaic installation'', ''Smart home automation'', ''Blueprint reading'', ''National Electrical Code compliance'', ''Electrical
