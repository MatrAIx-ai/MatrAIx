persona_description: A scientist and researcher from the Indian Institute of Astrophysics (IIA) who specializes in the study of gamma-ray emission mechanisms in blazars. He/she has conducted a systematic
  study on the gamma-ray flux variability of different types of blazars, which could provide clues to the processes happening close to the black hole. The results obtained from this study will have direct
  relevance to the problem of finding the high energy gamma-ray production site in blazars and will build capacity to interpret the gamma-ray data that will emerge from India's upcoming facility, the Major
  Atmospheric Cerenkov Experiment Telescope, as well as from any X-ray missions by India in the future.
