personas:
  professional: Maria Pour, an aspiring junior architect, channels her love for building intricate LEGO structures and organizing soccer drills into early design thinking, applying meticulous step‑by‑step
    planning while also embracing spontaneous tweaks that showcase her balanced blend of practicality and creativity.
  sports: Maria Pour, an enthusiastic member of the Thunderbolts Youth Soccer Club, thrives on weekly matches against the River Valley Rangers and supplements her training with weekend bike rides, setting
    a personal goal to master intricate dribbling drills at home.
  arts: Maria Pour, an eager drama club participant, delights in performing short plays directed by her school’s theater teacher and idolizes child star Millie Bobby Brown and the whimsical animation of
    Studio Ghibli, which fuel her imaginative storytelling during library storytime.
  travel: Maria Pour, a curious explorer, loves family road trips to the nearby National Park’s dinosaur exhibit and daydreams about visiting Tokyo’s Ghibli Museum, preferring organized itineraries that
    balance sightseeing with plenty of snack breaks to keep her energy up.
  culinary: Maria Pour enjoys helping her parents in the kitchen, especially measuring flour for homemade pizza dough and whisking chocolate chip cookie batter, and she proudly claims her favorite snack
    is a perfectly crisp mozzarella stick dipped in marinara sauce.
  core: Maria Pour blends routine‑loving precision with outgoing energy, turning LEGO bricks into architectural dreams, soccer fields into teamwork labs, and kitchen counters into mini‑science experiments,
    all while occasionally forgetting to finish her vegetable plate.
background:
  cultural: 'Maria comes from a middle‑class, white, suburban family in Voorhees, New Jersey. Her upbringing reflects typical New Jersey suburban culture: attending a public elementary school, taking part
    in community programs such as the local library and town recreation center, and celebrating national holidays and seasonal traditions with family. Her family values reliability, routine, and community
    involvement, which align with her own preference for stability and group activities. Exposure to a diverse neighborhood and occasional visits to nearby urban centers like Philadelphia provide her with
    broader cultural awareness while her day‑to‑day life remains grounded in the familiar rhythms of suburban life.'
