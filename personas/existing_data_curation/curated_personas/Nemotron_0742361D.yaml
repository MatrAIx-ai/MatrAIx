  career_goals: Maria is already thinking about her future. She loves the predictability of school and wants a career where she can create a structured, supportive environment for other children. She imagines
    becoming a kindergarten teacher, designing daily schedules and guiding students through hands‑on learning activities. She is also fascinated by animals and envisions working as a veterinarian, where
    she can combine practical problem‑solving with caring for pets. In the short term, she aims to take on leadership roles like class monitor or team captain, positions that let her practice organization
    and leadership while keeping things orderly.
