    User 1: Me too! I love clothes shopping.

    User 2: It''s so much fun!

    User 1: It is! Do you like to shop online or in stores?

    User 2: I like to do both. I like to shop online for convenience, but I also like to go to stores to try on clothes and see them in person.

    User 1: I like that too! I like to be able to try on clothes before I buy them.

    User 2: Me too! It''s so important to make sure that clothes fit well before you buy them.

    User 1: I agree! I hate when I buy clothes that don''t fit right.

    User 2: Me too! It''s so frustrating.

    User 1: Well, it was nice talking to you!

    User 2: It was nice talking to you too!'
