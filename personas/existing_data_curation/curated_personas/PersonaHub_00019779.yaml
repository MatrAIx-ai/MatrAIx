persona_description: A historian who specializes in the study of the history of India and its culture, particularly the contributions of Indian artists and their works. Coomaraswamy was a prominent figure
  in the movement to promote Indian art and culture, and his involvement in the India Society and later the Royal India Society played a significant role in this endeavor. He was also involved in the foundation
  of the East India Association and the Royal India, Pakistan, and Ceylon Society.
