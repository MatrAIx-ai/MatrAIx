  hobbies: '[''Gardening (heirloom tomatoes, herbs)'', ''Reading historical fiction and African‑American literature'', ''Crocheting and quilting'', ''Attending gospel services and jazz concerts'', ''Playing
    bridge'', ''Experimenting with new recipes'']'
  career_goals: Rosa aims to preserve and share her life‑long educational insights by mentoring retired teachers, volunteering at the local senior center, and documenting her experiences in a memoir that
    highlights the evolution of education for Black students in Houston. She aspires to establish a modest scholarship fund for under‑represented students and to champion senior‑friendly community programs
    that encourage lifelong learning and cultural exchange.
