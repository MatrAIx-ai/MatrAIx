personas:
  professional: Rosa Jordan, a veteran classroom teacher with decades of experience designing differentiated curricula, blends rigorous academic standards with a curiosity‑driven flexibility, often juggling
    lesson plans in a delightfully disorganized yet effective manner while they mentor emerging educators with a competitive, critical eye.
  sports: Rosa Jordan enjoys low‑impact exercise through daily garden walks and a gentle tai chi class at the community center, they cheer on the Houston Astros during baseball season and the Houston Rockets
    in basketball, and they treat their weekly bridge tournament as a competitive mental sport that keeps their mind sharp.
  arts: Rosa Jordan attends lively gospel services featuring the Sweet Honey & the Bumblebees, cherishes jazz concerts highlighting the timeless sounds of Miles Davis, and they unwind crocheting vibrant
    blankets while listening to the soulful melodies of Aretha Franklin.
  travel: Rosa Jordan prefers relaxed, culturally immersive trips, having explored the historic riverfront of New Orleans, the cobblestone streets of Savannah, and the monuments of Washington D.C., they
    now dream of a guided pilgrimage to the plantation sites of Ghana, always planning with senior‑friendly itineraries and travel discounts.
  culinary: Rosa Jordan delights in cooking with fresh basil, thyme, and smoked paprika, frequently preparing heirloom tomato bruschetta, a hearty Southern gumbo with okra and shrimp, and sweet tea sweetened
    with cane sugar, they boast solid culinary skills yet occasionally resort to microwave meals when garden harvests run low.
  core: Rosa Jordan, a fiercely curious yet pragmatically relaxed octogenarian, they blend stories, tomatoes, and jazz with a skeptical, competitive edge, and they habitually misplace their reading glasses.
background:
  cultural: Rosa was born and raised in Houston during the 1940s, a period marked by segregation and the burgeoning civil‑rights movement. As a Black woman, she experienced both the challenges of systemic
    inequality and the strength of close‑knit community networks anchored in churches, schools, and family gatherings. Her cultural identity is shaped by Southern traditions, gospel music, and a deep respect
    for oral storytelling. The diverse tapestry of Houston’s neighborhoods exposed her to a variety of cuisines, languages, and artistic expressions, fostering a lifelong curiosity about different cultures
    while reinforcing her pride in her own heritage. Throughout her life, Rosa has been guided by the values of resilience, intergenerational solidarity, and the pursuit of education as a pathway to empowerment.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Assessment design'', ''Mentorship and coaching'', ''Community event planning'', ''Basic digital literacy'', ''Intergenerational
