personas:
  professional: Marjorie Magana, a 10‑year‑old budding strategist, channels her love of routine and competition into leading her school’s math club and mastering chess openings, while meticulously organizing
    her LEGO builds as practice for logical problem‑solving, and they relish the sense of order that each win brings.
  sports: Marjorie Magana, a forward on the Greenwood Youth Soccer Club, trains twice a week, watches the US Women’s National Team for tactical inspiration, and cheers for the local baseball squad, the
    River City Rovers, each spring, while they balance competitive spirit with the need for structured practice routines.
  arts: Marjorie Magana blends creative spark by constructing intricate LEGO architectures inspired by the works of architect Frank Gehry, coding animated stories on Scratch, and listening to the whimsical
    piano pieces of Yiruma while they sketch wildlife scenes after reading field guides.
  travel: Marjorie Magana loves structured family road trips, preferring destinations with clear itineraries like the Grand Canyon and the interactive science museum in Orlando, while dreaming of a future
    backpacking adventure through the historic streets of Barcelona, and they always pack a checklist to keep the journey predictable.
  culinary: Marjorie Magana’s culinary hobby centers on mastering traditional Spanish dishes such as paella al fuego and tortilla española, where they meticulously measure saffron, smoked paprika, and olive
    oil, though they often forget to clean the kitchen promptly after cooking.
  core: Marjorie Magana is a routine‑driven ten‑year‑old with a competitive edge, balancing chess tactics, LEGO precision, and soccer teamwork, yet they can become overly anxious about grades and tend to
    worry about meeting their own high standards.
background:
  cultural: Marjorie's family originates from Spain, and she grew up in a bilingual household where Spanish is spoken daily alongside English. The household maintains Spanish cultural traditions, such as
    celebrating Semana Santa and enjoying dishes like paella and gazpacho during family meals. She participates in local Spanish community events in New Jersey, which reinforces her connection to her heritage
    while also integrating American customs. This dual cultural exposure shapes her worldview, giving her a strong sense of family, respect for tradition, and pride in her Spanish roots.
