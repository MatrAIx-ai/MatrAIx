  hobbies: '[''Chess'', ''LEGO building'', ''School math club'', ''Cooking family recipes'', ''Youth soccer'', ''Reading non‑fiction (science/nature)'', ''Scratch coding projects'']'
  career_goals: Although she is only ten, Marjorie envisions a future career that combines practical problem‑solving with clear structure. She aspires to become a biomedical engineer or a veterinarian,
    fields where she can apply her analytical mindset, love for animals, and desire to help others in tangible ways. She also aims to excel in school science fairs and math competitions, seeing these achievements
    as stepping stones toward a stable, organized profession where she can contribute reliable solutions to real‑world challenges.
