  hobbies: '["Vegetable and flower gardening", "Quilting and knitting projects", "Reading historical non‑fiction", "Crossword and Sudoku puzzles", "Baking pies and preserving fruits", "Walking local nature
    trails", "Small book‑club gatherings", "Genealogy and family history research"]'
  career_goals: Although retired, Vivian aims to remain a useful resource in her community. She plans to volunteer as a financial‑literacy mentor at the local senior center, helping peers develop reliable
    budgeting habits. She also hopes to complete a detailed family genealogy manuscript, preserving her family’s history for future generations. Maintaining a productive garden that supplies fresh produce
    to herself and occasional neighbors is another ongoing ambition, as is staying mentally sharp by entering local puzzle and quilting contests. While she values stability, she occasionally welcomes spontaneous
    short trips to nearby historical sites to satisfy her curiosity and break routine.
