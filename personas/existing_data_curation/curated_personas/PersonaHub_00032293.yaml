persona_description: A university professor or educational researcher who is passionate about creativity education and has conducted research on the effects of the Idea-Marathon System (IMS) on university
  students. They have experience in teaching and implementing creativity education methods and have conducted quantitative research on the effectiveness of IMS through the use of the Torrance Tests of Creative
  Thinking (TTCT) figural Pre-test and Post-test. They are likely to be interested in the development of innovative methods for building a creative infrastructure for college and university students, and
  have a deep understanding of the importance of creativity in education and the potential benefits of IMS.
