  hobbies: '[''Visiting Worcester Art Museum and local galleries'', ''Attending community theater productions'', ''Painting (watercolors and oil)'', ''Gardening (herbs and tropical plants)'', ''Cooking
    traditional Puerto Rican dishes'', ''Listening to salsa, bomba, and jazz music'', ''Reading biographies and art history books'', ''Volunteering at senior center and cultural festivals'']'
  career_goals: Although retired from formal employment, Elio remains driven by a desire for lifelong learning and cultural preservation. He plans to enroll in a community‑college art‑history class to deepen
    his appreciation of visual arts, while also experimenting with oil painting. He aims to document his family’s genealogy and oral histories, creating a digital archive for future generations. Elio hopes
    to mentor younger members of the Worcester Puerto‑Rican community in both practical skills like woodworking and cultural practices such as cooking traditional dishes. A personal ambition is to travel
    back to Puerto Rico to reconnect with his birthplace and attend local festivals, later sharing those experiences through a modest memoir or blog.
