  career_goals: Michael aims to obtain his Certified Nursing Assistant (CNA) credential within the next year and then pursue an associate degree in health sciences to become a registered nurse. His competitive
    nature fuels a desire to rise to a supervisory or shift‑lead role on his unit, where he can implement efficiency improvements he spots. Long‑term, he envisions launching a health‑tech consulting startup
    that leverages his practical experience and curiosity about emerging medical technologies, positioning himself as an innovative leader in patient‑care workflow optimization.
