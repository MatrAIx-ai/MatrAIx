personas:
  professional: Christasia Sheppard, a retired community organizer and oral‑history storyteller, leverages their curiosity and sociable nature to coordinate intergenerational art workshops, senior‑center
    events, and a memoir recording project, while occasionally misplacing paperwork due to a relaxed approach to obligations.
  sports: Christasia Sheppard, an enthusiastic walker and senior‑dance participant, joins the C&O Canal walking club, follows the Washington Capitals hockey team, and occasionally plays light badminton
    at the senior center, embracing low‑impact fitness with a social twist.
  arts: Christasia Sheppard, an avid visitor of the National Gallery of Art and the African American Art Museum, draws inspiration from Jacob Lawrence, Kara Walker, Ella Fitzgerald, and Gregory Porter,
    which fuels their informal curating of community quilting exhibitions and lively discussions at the senior book club.
  travel: Christasia Sheppard, who prefers escorted group tours and leisurely river cruises, has revisited historic Charleston, explored New Orleans for its jazz and cuisine, and taken a week‑long trip
    to Paris to see the Louvre, balancing travel with modest savings and senior discounts.
  culinary: Christasia Sheppard, a seasoned soul‑food cook, perfects dishes such as collard‑greens stew, smoked turkey jambalaya, and sweet‑potato pie using fresh herbs from their raised‑bed garden, enjoys
    experimenting with okra and hot sauce, and hosts monthly family feasts that showcase their seasoned culinary prowess.
  core: Christasia Sheppard blends a lifelong love of art, storytelling, and soul‑food cooking with a relaxed, sociable spirit, turning everyday gatherings into vibrant cultural celebrations while occasionally
    misplacing their glasses or diary.
background:
  cultural: Christasia is an African‑American woman whose roots trace back to the Jim Crow South, where she was born before her family joined the Great Migration to the Washington, DC metropolitan area.
    Growing up in Silver Spring, she was shaped by the close‑knit Black church community, the civil‑rights activism of the 1960s, and the rich culinary traditions passed down through generations. Her cultural
    identity blends Southern heritage—evident in her cooking, music, and storytelling—with the urban, multicultural vibrancy of Montgomery County. She remains deeply connected to community spaces such as
    the local senior center, the African American heritage museum, and neighborhood churches, where she both receives support and contributes her experience, fostering intergenerational solidarity.
