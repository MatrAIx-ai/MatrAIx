personas:
  professional: Carlos Prieto, a 20-year-old fire inspector in Monterey County, blends a meticulous, routine-driven work ethic with hands-on problem-solving, leveraging expertise in fire codes, risk assessments,
    and bilingual communication to produce clear reports and guide property owners toward practical safety improvements.
  sports: Carlos Prieto, a 20-year-old fire inspector, competes in the Monterey Bay Soccer Club's amateur league, follows the San Jose Sharks and the San Francisco Giants, and combines structured weekend
    runs on the coastal trail with casual beach volleyball, maintaining a balanced, moderate-intensity fitness routine.
  arts: Carlos Prieto enjoys the acoustic storytelling of Rodrigo y Gabriela, the cinematic depth of Alejandro González Iñárritu's films, and attends the Monterey County Art & Music Festival, where they
    appreciate folk paintings and street murals that reflect community narratives.
  travel: Carlos Prieto prefers a semi-planned travel style that blends budget-friendly road trips along California's Big Sur and Yosemite with occasional overseas adventures to Kyoto and Cabo San Lucas,
    balancing a love for nature with a desire for cultural immersion while keeping costs in check.
  culinary: Carlos Prieto, an avid home cook, masters traditional dishes like tamales and pozole using homestyle corn masa, simmered pork, dried chiles and fresh cilantro, and their kitchen skill sits between
    confident weekend chef and enthusiastic experimenter with new spice blends.
  core: Carlos Prieto, a disciplined 20-year-old fire inspector with a DIY hobby, balances routine-oriented professionalism with a love for cooking, soccer, and nature, though they sometimes neglect sleep
    and overextend on weekend projects.
background:
  cultural: Carlos was raised in a Mexican‑American household that values close family ties, community involvement, and cultural traditions. His parents immigrated from Jalisco, and the family maintains
    strong ties to Mexican customs, such as celebrating Día de los Muertos and participating in local Mexican festivals in Salinas. Bilingualism is a core part of his identity; he speaks Spanish at home
    and uses English in school and work. Catholic values and a respect for elders shape his worldview, reinforcing his preference for routine, practicality, and a sense of responsibility toward his community.
attributes:
  skills: '["Fire code compliance","Risk assessment and hazard identification","Inspection report writing","Fire‑prevention equipment troubleshooting","Schedule management and record‑keeping","Bilingual
