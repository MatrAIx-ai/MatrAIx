  career_goals: Carlos aims to become a senior fire safety analyst within the next five years, obtaining certifications such as the Certified Fire Inspector (CFI) and Fire Inspector I/II from the International
    Fire Service Accreditation Congress. He plans to deepen his expertise in fire engineering and eventually transition into a supervisory role where he can mentor new inspectors and lead community outreach
    programs focused on fire prevention education. Long‑term, Carlos envisions contributing to the development of more robust fire safety policies for Monterey County, leveraging his practical experience
    and cultural insight to improve public safety outcomes.
