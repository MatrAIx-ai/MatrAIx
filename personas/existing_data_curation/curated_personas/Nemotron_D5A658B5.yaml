  hobbies: '[''Fly fishing'', ''Birdwatching'', ''Hiking'', ''Science‑fiction reading'', ''Chess'', ''Woodworking'', ''Home brewing'', ''Amateur astronomy'']'
  career_goals: Douglas aims to lead a translational research program that bridges basic discovery with therapeutic development for neurodegenerative diseases. He aspires to secure a senior research chair
    at a university or institute, mentor a new generation of scientists, and establish a small nonprofit that brings cutting‑edge science outreach to rural Alabama schools. In the longer term, he envisions
    transitioning to an advisory role where his calm, resilient temperament can guide strategic decisions in biotech ventures while still contributing to scholarly publications.
