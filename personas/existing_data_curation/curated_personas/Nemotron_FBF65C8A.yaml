  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Visiting Art Galleries'', ''Reading Contemporary Fiction'', ''Poetry Writing'', ''Theater Performances'', ''Yoga'', ''Mindfulness Meditation'', ''Hiking'',
    ''Exploring Local Trails'', ''Cooking International Cuisine'', ''Volunteer Work with Mental Health Organizations'', ''Book Club Participation'', ''Board Game Nights'', ''Swing Dancing'']'
  career_goals: Looking ahead, Gina aims to obtain her Licensed Professional Counselor (LPC) credential and subsequently pursue a clinical doctorate in counseling psychology. She envisions establishing
    a private practice that merges evidence-based therapy with arts-based interventions, serving individuals and families across the Quad Cities region. In the next five years, she plans to lead a regional
    mental-health outreach program that partners with schools, churches, and community centers to expand access to preventive services, especially in rural parts of Scott County. Gina also aspires to become
    a mentor and supervisor for early-career counselors, contribute scholarly articles on the efficacy of creative therapies, and teach part-time in a university's counseling or humanities department.
