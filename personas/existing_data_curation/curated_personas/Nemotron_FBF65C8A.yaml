personas:
  professional: Gina Carlton, a mental health counselor with a graduate background in arts and humanities, leverages evidence‑based "CBT", trauma‑informed care, and art‑therapy techniques to design individualized
    treatment plans, while their organized, methodical nature and sociable charisma shine in group facilitation and community outreach.
  sports: Gina Carlton, an avid participant in the Quad Cities Hiking Club and a regular attendee of Quad City River Bandits baseball games, combines weekend hikes along the Mississippi River Trail with
    twice‑weekly yoga at the Quad Cities Yoga Collective, and occasionally joins a community spin class to stay energized.
  arts: Gina Carlton, a watercolor painter who draws inspiration from Georgia O'Keeffe, Yayoi Kusama, and local Midwestern contemporary artists, frequents the Figge Art Museum, attends monthly poetry readings
    featuring Rupi Kaur and Ocean Vuong, and volunteers as a workshop facilitator at community theater, weaving art into both leisure and professional life.
  travel: Gina Carlton, a weekend explorer, blends spontaneous day trips to St. Louis for jazz and barbecue with meticulously planned cultural tours to Lisbon and Kyoto, prioritizing destinations that offer
    rich visual art scenes and opportunities to practice sketching in foreign streets, all while budgeting travel expenses through a dedicated savings envelope.
  culinary: Gina Carlton, an intermediate home chef, delights friends with homemade Thai green curry, Ethiopian injera served with berbere‑spiced lentils, and occasional mis‑executed paella, showcasing
    a love for fresh basil, lemongrass, and za'atar while still relying on pizza delivery when time runs short.
  core: Curious, organized, and socially vibrant, Gina Carlton blends evidence‑based therapy with watercolor art, budgets meticulously yet indulges in creative impulses, and can be found sketching after
    a yoga session while dreaming of their next cultural getaway.
background:
  cultural: Born and raised in a small town near the Iowa-Illinois border, Gina grew up in a predominantly white Midwestern community with German and Irish ancestry. The region's emphasis on modesty, community
    responsibility, and a strong work ethic shaped her reliable and cooperative demeanor. Exposure to the Quad Cities' growing arts scene during her undergraduate studies sparked an appreciation for cultural
    diversity and creative expression. While she identifies with Midwestern values of neighborliness and practicality, her graduate education in arts and humanities broadened her perspective, encouraging
    an open-minded curiosity toward varied experiences and unconventional ideas.
