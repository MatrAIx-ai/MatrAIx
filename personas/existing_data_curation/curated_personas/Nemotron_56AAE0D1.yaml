personas:
  professional: Jeffrey is a budding problem‑solver who channels his love for marine life and LEGO building into designing miniature ecosystems in Minecraft, dreaming of becoming a marine engineer while
    juggling school assignments with enthusiastic, sometimes chaotic, teamwork.
  sports: Jeffrey is an energetic midfielder for Crescent City FC's U10 team, a passionate follower of the New Orleans Pelicans, and spends weekend mornings playing pickup soccer at the local park while
    also dabbling in swimming in the bayou during summer.
  arts: Jeffrey thrives in his school drama club performing scenes from "Peter Pan," idolizes Lin‑Manuel Miranda, and enjoys listening to Imagine Dragons and Billie Eilish while crafting intricate LEGO
    dioramas of marine habitats.
  travel: Jeffrey has explored the quiet trails of the nearby Atchafalaya Basin, visited Orlando’s Magic Kingdom with his family, and dreams of snorkeling in the Great Barrier Reef, preferring trips that
    blend adventure with hands‑on learning.
  culinary: Jeffrey favors shrimp gumbo and lemon‑garlic grilled fish, often helping his family sauté shrimp with okra, while his snack of choice is peanut butter and jelly sandwiches, and he enjoys experimenting
    with edible LEGO‑style fruit kebabs using grapes, pineapple, and banana slices.
  core: Jeffrey is a curious, socially‑driven ten‑year‑old who blends his love for marine exploration, LEGO engineering, and collaborative play, while juggling a whirlwind of spontaneous ideas and the occasional
    forgetful mess.
background:
  cultural: Jeffrey grew up in a close‑knit family in Slidell, Louisiana, a town framed by the Pearl River, Lake Pontchartrain, and the Gulf Coast wetlands. The community’s Southern hospitality and strong
    church involvement have shaped his values of kindness and cooperation. Local traditions such as attending community festivals, enjoying crawfish boils, and learning about the region’s natural ecosystems
    have fostered his appreciation for the outdoors and multicultural food customs. While his family identifies as white American, they frequently interact with the diverse cultural tapestry of St. Tammany
    Parish, exposing Jeffrey to a blend of Cajun, Creole, and broader Southern influences that enrich his worldview.
attributes:
  skills: '["Empathetic communication", "Collaborative teamwork", "Basic computer and tablet usage", "LEGO building and design", "Peer conflict mediation", "Reading comprehension and elementary math", "Enthusiastic
