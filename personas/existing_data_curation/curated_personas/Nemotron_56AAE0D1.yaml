  hobbies: '["Soccer", "Exploring local bayous and collecting shells", "LEGO building", "Minecraft and basic coding", "Reading adventure and marine life books", "School drama club", "Neighborhood clean‑up
    volunteering"]'
  career_goals: Jeffrey dreams of a future where he can combine his love of people and nature. He often talks about becoming a teacher or a community health aide so he can help other children learn and
    stay healthy. He is also fascinated by the local bayous and imagines a career as a park ranger or marine‑biology assistant, where he could protect wildlife and share that passion with others. At a broader
    level, he hopes to lead youth clubs or volunteer groups that promote cooperation and harmony in his neighborhood.
