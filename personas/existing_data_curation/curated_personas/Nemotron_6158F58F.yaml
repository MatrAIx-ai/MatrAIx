  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Cooking traditional Mexican cuisine'', ''Hiking on local trails'', ''Yoga'', ''Puzzle solving (crosswords, Sudoku)'', ''DIY home improvement
    projects'', ''Listening to classical music'']'
  career_goals: Aide aims to advance into a district‑level instructional leadership role, such as Curriculum Specialist or Instructional Coach, where she can shape school‑wide academic programs and promote
    evidence‑based practices. She plans to earn a Master's in Educational Leadership to qualify for a department chair position and eventually lead the development of a bilingual STEM initiative in Kern
    County schools. Aide is driven to achieve measurable improvements in student performance on state assessments, earn recognition as a Teacher of the Year, and mentor a cohort of teachers to adopt rigorous
    data analysis for instructional decision‑making.
