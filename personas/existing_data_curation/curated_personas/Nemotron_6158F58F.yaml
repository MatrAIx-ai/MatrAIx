personas:
  professional: Aide Arevalo is a meticulous elementary and middle school teacher who designs standards‑aligned, bilingual curricula, leverages Google Classroom and interactive whiteboards for data‑driven
    instruction, runs systematic behavior‑tracking interventions, and leads concise professional‑development workshops, and they channel their competitive, detail‑oriented nature toward a future role as
    a district instructional leader.
  sports: Aide Arevalo enjoys weekend hikes on the Kern River Canyon trail with the local Kern County Trails Association, practices yoga three times weekly at Serenity Yoga Studio, follows the Los Angeles
    Dodgers and the LA Lakers for a seasonal dose of team spirit, and participates in a casual adult soccer league with a small group of colleague friends, and they balance structured fitness with their
    preference for solitary or small‑group activities.
  arts: Aide Arevalo immerses themselves in classical music, regularly listening to Beethoven’s Ninth Symphony, Yo‑Yo Ma’s cello suites, and the LA Philharmonic’s performances while solving crossword puzzles,
    and they indulge in historical fiction by Hilary Mantel and biographies of figures like Maya Angelou, reflecting how the arts sustain their disciplined yet introspective mindset.
  travel: Aide Arevalo meticulously plans quiet getaways, favoring nature‑focused trips such as a solo cabin stay in the Sierra Nevada, a cultural tour of historic Granada in Spain, and budget‑friendly
    road trips to Sedona’s red rocks, while balancing family responsibilities that limit extended overseas travel and adhering to a travel budget that aligns with their pragmatic financial outlook, and
    they seek experiences that offer both relaxation and intellectual enrichment.
  culinary: Aide Arevalo demonstrates intermediate cooking skills, crafting authentic Mexican dishes like mole poblano with dried ancho chilies, pasilla, epazote, and homemade masa, while incorporating
    fresh vegetables from their garden—tomatillos, zucchini, and cilantro—into salsas and tamales, and they occasionally treat themselves to a perfectly seared fish taco with lime‑avocado crema.
  core: Aide Arevalo is a disciplined, puzzle‑loving educator whose love of gardening, authentic cooking, and data‑driven instruction reflects their structured, quietly competitive spirit balanced by a
    penchant for solitary self‑care, and they constantly seek to refine their craft through meticulous planning.
background:
  cultural: Aide was raised in a Mexican‑American household in Bakersfield, where Spanish was spoken alongside English and family gatherings centered around cultural traditions such as Día de los Muertos,
    quinceañeras, and holiday feasts. She maintains strong ties to her heritage through community events at the local Hispanic cultural center and by incorporating culturally relevant pedagogy into her
    classroom—using Mexican folklore, bilingual books, and real‑world examples that reflect her students' lived experiences. While she identifies with the broader Mexican community, she also values the
    multicultural environment of Kern County and integrates a respect for diversity into her teaching philosophy.
attributes:
  skills: '[''Curriculum development'', ''Data‑driven instruction'', ''Bilingual education'', ''Classroom management'', ''Educational technology integration'', ''Assessment design'', ''Differentiated instruction'',
