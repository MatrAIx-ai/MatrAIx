  career_goals: Johnny aims to secure a stable position in Orlando's hospitality or tourism industry, leveraging his customer-service expertise to become a guest-services supervisor within the next three
    years. Recognizing the value of formal qualifications, he plans to obtain his GED within the next year and enroll in a vocational program for HVAC or electrical trades, with the long-term ambition of
    launching his own home-repair business. Simultaneously, he hopes to use his event-planning and social-media talents to take on a community-engagement role at a local nonprofit, where he can mentor younger
    residents and organize youth programs.
