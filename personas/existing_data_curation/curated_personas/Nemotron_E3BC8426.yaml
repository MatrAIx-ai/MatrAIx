personas:
  professional: Johnny Minnifield, a 23‑year‑old hospitality enthusiast in Orlando, leverages their methodical event‑planning skills, knack for volunteer coordination, and hands‑on DIY know‑how to deliver
    seamless guest experiences while they eye a supervisor role and prep for a future trade business.
  sports: Johnny Minnifield, an avid street‑ball participant in Orlando’s downtown league and a regular attendee of community yoga classes, roots for the Orlando Magic, admires the Miami Heat’s fast‑break
    style, and maintains a weekend cycling club where they tinker with bike upgrades.
  arts: Johnny Minnifield, a playlist curator who spins Kendrick Lamar, SZA, and J. Cole while producing TikTok tutorials on quick repairs and cooking hacks, also dives into competitive esports on titles
    like Rocket League, and attends local open‑mic nights featuring spoken‑word poets, where they enjoy soaking up creative energy.
  travel: Johnny Minnifield, who dreams of budget‑friendly road trips along Florida’s Gulf Coast, has already explored Clearwater Beach, spent a weekend in Savannah for its historic districts, and plans
    a future backpacking adventure through Portugal’s coastal towns to combine culinary exploration with DIY workshops, all while they balance travel costs with their saving goals.
  culinary: Johnny Minnifield, an experimental home chef, loves whipping up soulful dishes such as smoked chicken thighs, creamy jalapeño mac and cheese, and caramelized banana foster, often using smoked
    paprika and maple syrup, while they share quick‑cook hacks on TikTok for friends.
  core: Johnny Minnifield, a curious yet practical 23‑year‑old, blends organized hustle with sociable energy, channels stress into yoga and gaming, and constantly juggles worries about finances and future
    plans, while they remain determined to turn every challenge into a learning opportunity.
background:
  cultural: Johnny grew up in a predominantly African-American neighborhood in Orlando, where family gatherings, church events, and community festivals formed the core of his cultural experience. He celebrates
    traditions such as Juneteenth and Thanksgiving with soul-food meals, and he participates in the local church choir that blends gospel with contemporary R&B. While rooted in these traditions, he also
    embraces the multicultural vibe of central Florida, drawing inspiration from the diverse culinary scenes, music, and arts around him. His cultural identity emphasizes solidarity, resilience, and a commitment
    to uplift his community, which informs both his personal pursuits and his future career aspirations.
