persona_description: A scientist and inventor who specializes in developing novel technologies for microscopy and imaging. He/she has a deep understanding of subpixel perspective sweeping microscopy (SPSM),
  a technique that allows for high-resolution imaging of living cells without the use of a lens. The individual is also a coauthor on a study titled "The ePetri dish, an on-chip cell imaging platform based
  on subpixel perspective sweeping microscopy (SPSM)," which demonstrates the potential of ePetri for capturing details that would otherwise be difficult or impossible with state-of-the-art light microscopes.
  The individual is likely to be interested in the application of ePetri to other biological systems and the potential for it to open up new approaches to many other biological systems. The individual is
  also likely to be familiar with the Coulter Foundation and the funding support provided for the study.
