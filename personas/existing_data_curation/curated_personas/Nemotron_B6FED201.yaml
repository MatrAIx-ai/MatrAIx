  career_goals: Robert aims to move into a foreman or site‑supervisor role within the next three years, while obtaining a certified General Contractor license and an OSHA 30‑hour trainer certification.
    He wants to lead community‑focused renovation projects, such as restoring historic homes in Iosco County, and eventually start his own small, eco‑friendly custom‑home building business that emphasizes
    energy‑efficient design and local materials. He also hopes to mentor younger workers, share his creative approach to construction, and reduce his physical workload as he ages by transitioning into safety
    management or project coordination.
