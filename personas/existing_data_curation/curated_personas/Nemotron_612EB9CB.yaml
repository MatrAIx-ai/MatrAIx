  career_goals: Israel dreams of one day becoming an engineer who designs sustainable solutions for his community, especially in agriculture and water management. He is fascinated by how things are built
    and hopes to study civil or environmental engineering in high school and college. He also imagines helping local farms in the San Joaquin Valley by creating efficient irrigation systems, combining his
    curiosity for new ideas with practical, hands‑on methods. Ultimately, he wants a career that lets him solve real problems while giving back to both his Puerto Rican heritage and his Californian hometown.
