personas:
  professional: Israel Garrido is a methodical ten‑year‑old aspiring coder who builds intricate LEGO creations, programs simple Scratch games, and approaches each project with a blend of curiosity and practicality,
    often planning his designs on paper before assembling the pieces.
  sports: Israel Garrido plays on a community U‑10 soccer team, enjoys cheering for his favorite professional club FC Barcelona during weekend matches, and practices drills at the local park where he also
    observes birds, balancing competitive spirit with a love for nature.
  arts: Israel Garrido draws cartoons inspired by classic pop icons, listens to reggaeton artist Bad Bunny, salsa legend Marc Anthony, and pop star Taylor Swift while sketching, and admires the animation
    style of Pixar movies, often re‑creating his favorite scenes with LEGO figures.
  travel: Israel Garrido loves weekend trips to nearby state parks for bug‑watching and has visited a science museum in Washington, D.C., while dreaming of a future visit to the Kennedy Space Center to
    experience real rockets, preferring small‑group family outings over large crowds.
  culinary: Israel Garrido assists in cooking traditional dishes like mofongo and alcapurrias, enjoys the aroma of plantains and garlic, prides himself on whisking together mango smoothies, and although
    his chopping skills are still developing, he eagerly tastes every bite.
  core: Israel Garrido blends meticulous LEGO engineering, budding Scratch programming, and a love for soccer and cartoons into a curious yet disciplined ten‑year‑old who sometimes forgets chores when a
    new project captures his imagination.
background:
  cultural: Israel is a proud Puerto Rican American who grew up in a household where Spanish and English flow together. Family gatherings often feature traditional foods like arroz con gandules, tembleque,
    and pasteles, especially during holidays such as Three Kings' Day and Puerto Rico Day. He participates in local Latino community events in Lodi, where bachata and salsa rhythms fill the air, reinforcing
    his connection to Caribbean culture. Catholic traditions and the close‑knit extended family play an important role in his upbringing, while his everyday life blends these cultural roots with the agricultural
    vibe of San Joaquin County, shaping a unique bicultural identity.
