personas:
  professional: Leona Leblue, a 13‑year‑old budding digital artist and novice game developer, channels her curiosity and organized‑yet‑flexible mindset into sketching characters, creating watercolor river
    scenes, and building interactive Scratch games, while assertively contributing ideas in her weekend coding club.
  sports: Leona Leblue follows the Jacksonville Jaguars and Jacksonville Jumbo Shrimp, participates in a local youth swim team during summer, and practices yoga at home, balancing competitive spirit with
    a preference for low‑pressure, solitary exercise.
  arts: Leona Leblue immerses themselves in indie folk music from artists like Sufjan Stevens and Phoebe Bridgers while sketching characters inspired by graphic novels such as "Saga" and "Nimona", and frequently
    visits the Cummer Museum to study works by contemporary Southern painter John Stuart, shaping their creative identity.
  travel: Leona Leblue favors weekend road trips to nearby St. Augustine’s historic district and Jacksonville Beach for relaxed exploration, while dreaming of a spring visit to Paris to see the Louvre,
    planning trips through school fundraisers and family budget constraints.
  culinary: Leona Leblue enjoys cooking shrimp and grits with fresh local shrimp, savoring key lime pie, and experimenting with avocado‑lime smoothies, yet their kitchen skills remain beginner‑level, often
    relying on family guidance for complex recipes.
  core: Leona Leblue is a thoughtful, art‑driven teen who balances meticulous planning with spontaneous creativity, frequently worries over perfection, and finds solace in sketching and yoga.
background:
  cultural: Leona grew up in a middle‑class, white family in Jacksonville, Florida, with deep roots in the Southern United States. Her upbringing reflects a blend of traditional Southern values—family gatherings,
    community involvement, and a respect for local history—combined with the diverse, coastal culture of Florida. She has been exposed to the city’s vibrant arts scene, including visits to the Cummer Museum,
    local art fairs, and beach festivals. While her household is grounded in Protestant Christian traditions, she experiences the multicultural rhythm of Jacksonville through its mix of cuisines, music,
    and outdoor activities, which shape her open‑minded yet grounded worldview.
attributes:
  skills: '["Hand-drawing and watercolor painting", "Digital illustration (Procreate, Photoshop)", "Basic coding in Scratch and introductory Python", "Research and information synthesis", "Organizational
    planning and time management", "Small-group leadership and peer mentorship"]'
  hobbies: '["Sketching and character drawing", "Watercolor painting", "Digital illustration on tablet", "Reading graphic novels and fantasy books", "Creative writing and journaling", "Scratch coding and
    simple game development", "Visiting museums (Cummer Museum) and photography", "Mindfulness drawing and yoga", "Listening to indie folk music"]'
  career_goals: Leona aspires to turn her love of art and technology into a career as a concept artist or visual designer for video games and interactive media. She dreams of attending a specialized art
    high school and later earning a degree in Fine Arts or Game Design. Over time, she hopes to work on projects that blend storytelling with visual creativity, and she also envisions using her artistic
    skills in museum education, creating engaging exhibits for youth. Because she feels deeply about emotions, she also considers studying psychology or counseling to better understand and help people who
    struggle with anxiety, merging creative therapy with visual art.
