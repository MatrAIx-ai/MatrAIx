  career_goals: Emily aims to transition from field work to owning her own electrical contracting business focused on sustainable and artistic lighting solutions. She plans to obtain a master electrician
    license, deepen her expertise in solar and battery storage, and become a certified energy‑efficiency specialist. She envisions developing a niche in custom lighting design for historic homes, building
    a reputation for blending functionality with aesthetic appeal. Additionally, she hopes to mentor more women entering the trades, create apprenticeship programs, and eventually achieve a work‑life balance
    that gives her ample flexibility for personal creative pursuits.
