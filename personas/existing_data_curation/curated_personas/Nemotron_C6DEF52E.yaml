  career_goals: Seeking to channel her decades of transit experience into mentorship, Tran aims to become a certified driver trainer for the local transit agency, where she can teach safe driving practices
    and cultural sensitivity to new hires. Concurrently, she wishes to volunteer with community organizations that provide transportation for seniors and low‑income residents, leveraging her calm resilience
    to handle delicate situations. Inspired by her love of art, she also plans to launch a community photo‑exhibit that captures the everyday stories of commuters, hoping to foster greater empathy and appreciation
    for public transit among the broader public.
