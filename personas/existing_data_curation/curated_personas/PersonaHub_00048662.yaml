persona_description: A nutritionist who specializes in understanding the unique dietary needs of older adults, and in providing appropriate food options and support for them to maintain good health. This
  nutritionist is sensitive to the changes in taste, smell, vision, appetite, and thirst sensation that come with aging, and is knowledgeable about dental diseases, osteoporosis, lactose intolerance, arthritis,
  and other special dietary needs. They are also aware of the importance of socialization in older adults and are skilled in creating a stimulating dining environment that promotes conversation and physical
  activity.
