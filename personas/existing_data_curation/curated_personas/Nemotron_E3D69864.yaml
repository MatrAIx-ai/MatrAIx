  hobbies: '[''Waterfront walking'', ''Birdwatching'', ''Gardening'', ''Mahjong'', ''Reading historical fiction'', ''Listening to jazz and Mandarin music'', ''Cooking'', ''Crossword puzzles'', ''Volunteering
    at community events'']'
  career_goals: He aims to stay physically active, maintain his independence, and continue contributing to his community. He hopes to mentor younger neighbors in practical skills, document his family's
    immigration story in a memoir, and perhaps make a short trip to his ancestral hometown in China to reconnect with his roots. He also aspires to improve his digital literacy enough to create a modest
    photo blog of his waterfront walks, and to sustain his health through regular gardening and walking.
