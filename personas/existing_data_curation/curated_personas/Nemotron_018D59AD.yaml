  career_goals: Hoang aims to obtain his master electrician license and a contractor’s license within the next three years, allowing him to launch his own electrical contracting firm focused on sustainable
    energy solutions and artistic lighting installations. He aspires to become a recognized specialist in integrating technology with art for residential, commercial, and public spaces, and to work as a
    consultant for architects on green building projects. In the long term, he hopes to mentor apprentices, expand his business to include a design studio, and contribute to community art initiatives that
    celebrate cultural diversity.
