personas:
  professional: Hoang Bui, a 27‑year‑old certified electrician specializing in solar photovoltaic installations and smart‑home automation, they blend meticulous organization with a curiosity for artistic
    lighting to deliver code‑compliant, gallery‑ready projects while ambitiously pursuing a master electrician and contractor license.
  sports: Hoang Bui, an avid hiker who tackles Colorado’s trail network year‑round, they play point guard for the community basketball club Rocky Mountain Raptors, follow the Denver Broncos, Colorado Rockies,
    and Colorado Avalanche, and adhere to a disciplined fitness routine that mixes cardio climbs with weekly pickup games.
  arts: Hoang Bui, who spends weekends wandering Denver’s contemporary art galleries and photographing vibrant street‑art murals, they draw inspiration from artists such as Banksy, Shepard Fairey, and Ai Weiwei,
    and strum acoustic covers of John Mayer and Bon Iver on guitar, and devour science‑fiction novels by Neal Stephenson and Cixin Liu.
  travel: Hoang Bui, a methodical planner who favors photography‑rich itineraries, they have trekked Rocky Mountain National Park, explored Oaxaca’s historic streets during its Mexican festivals, and dream
    of capturing sunrise on Bali’s rice terraces for future art‑lighting projects.
  culinary: Hoang Bui, a proficient home chef who blends Southeast Asian herbs with Latin spices, they regularly prepare lemongrass‑infused chicken tacos, pho‑style beef broth with chipotle, and bánh mì
    topped with salsa verde, favoring ingredients like coconut milk, cilantro, corn masa, and fresh lime.
  core: Hoang Bui, the organized electrician‑artist hybrid who turns power circuits into luminous canvases while obsessively cataloguing tools and playlists, they balance a competitive edge with a love
    for quiet mountain sunsets.
background:
  cultural: Hoang was raised in Colorado by parents of mixed Vietnamese and Mexican heritage. He grew up speaking English and Vietnamese at home, and learned basic Spanish from his mother’s side. Family
    traditions such as celebrating Tết, making bánh giao thứ, and enjoying pho are blended with Día de los Muertos altars, salsa dancing, and Mexican holiday feasts. This multicultural upbringing gives
    him a deep appreciation for both Southeast Asian and Latin American arts, music, and cuisine, and he remains actively involved in local Vietnamese community events and Latino cultural festivals.
