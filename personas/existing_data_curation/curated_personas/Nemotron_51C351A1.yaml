personas:
  professional: Joshua Gibson, an aspiring junior scientist who transforms his bedroom into a makeshift laboratory, balances curiosity about how things work with a practical habit of re‑using household
    items, and channels their critical, competitive nature into winning neighborhood science fair challenges.
  sports: Joshua Gibson, plays for the neighborhood Little League Tigers in spring, kicks a soccer ball for the local Cubs Kids Soccer Club each fall, avidly watches the Chicago Cubs on TV and the Chicago
    Bears on Sundays, and treats practice with a relaxed attitude but brings fierce competition to every game.
  arts: Joshua Gibson, spends free time drawing superhero comics, sings loudly to the soundtrack of Disney’s Frozen and Pixar’s Toy Story, collects stickers of Taylor Swift and BTS on his notebook, and
    proudly showcases a handmade paper‑mâché dinosaur at family gatherings.
  travel: Joshua Gibson, has already visited Disneyland in California and the Grand Canyon on a family road trip, dreams of seeing the Eiffel Tower in Paris someday, and prefers itineraries that leave room
    for spontaneous playground stops, balancing adventure with the comforts of familiar routines.
  culinary: Joshua Gibson, loves chicken nuggets with sweet‑potato fries, helps assemble pizza topped with pepperoni, pineapple, and mushrooms, can make a peanut‑butter‑banana sandwich without adult help,
    yet frequently argues for extra chocolate ice cream, showing a pragmatic palate coupled with a competitive appetite for the best treats.
  core: Joshua Gibson, a curious 5‑year‑old who blends practical play with a competitive streak, thrives on flexible routines, and navigates the world with a relaxed yet critical eye.
background:
  cultural: Joshua comes from a predominantly white, middle‑class family in Uxbridge, Massachusetts. His upbringing reflects typical New England cultural norms, including celebrating Thanksgiving with a
    family feast, attending seasonal community events like the Uxbridge summer fair, and participating in local church activities. The family values education and encourages curiosity through visits to
    nearby Worcester County museums and the public library, and they maintain a flexible schedule that allows Joshua to follow his interests at his own pace.
attributes:
