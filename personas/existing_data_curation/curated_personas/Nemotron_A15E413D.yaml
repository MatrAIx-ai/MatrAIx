  career_goals: Edward aims to transition from a journeyman carpenter to a well‑known small‑business owner specializing in sustainable, high‑end residential renovations in New York City. He plans to earn
    a Certified Journeyman Carpenter credential, develop a signature line of custom furniture using reclaimed wood, and mentor apprentices through a formal apprenticeship program. Over the next five years,
    he hopes to win a local craftsmanship award, expand his client base to include boutique hotels and historic brownstone restorations, and perhaps co‑author a guide on merging traditional carpentry with
    modern design tools.
