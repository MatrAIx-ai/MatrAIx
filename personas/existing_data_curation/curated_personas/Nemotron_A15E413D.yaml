personas:
  professional: Edward Turbinton, a seasoned carpenter with a knack for merging precise structural framing and CAD‑assisted custom millwork, applies a pragmatic curiosity to every renovation, balancing
    meticulous project management with the flexibility to improvise while keeping a skeptical eye on subcontractors' motives.
  sports: Edward Turbinton, a point guard for the Riverside Community Basketball League, trains twice weekly at the local gym, follows the New York Knicks with fervor, and uses weekend rooftop gardening
    as a low‑impact warm‑up, maintaining a competitive edge while valuing structured practice routines.
  arts: Edward Turbinton curates a vinyl stash featuring Miles Davis' Kind of Blue, Kendrick Lamar's To Pimp a Butterfly, and Mahalia Jackson's gospel hymns, performs occasional spoken‑word pieces at open‑mic
    nights, and captures black‑and‑white photographs of SoHo’s cast‑iron facades that regularly appear in the Brooklyn Arts Council’s quarterly showcase.
  travel: Edward Turbinton seeks design inspiration through weekend drives to the Hudson Valley’s farm‑to‑table markets, an annual pilgrimage to Savannah’s historic districts for Southern culinary research,
    and dreams of a summer study trip to Copenhagen’s sustainable architecture tours, all while juggling a tight project schedule.
  culinary: Edward Turbinton specializes in Southern soul food staples like shrimp‑and‑grits, collard greens simmered with smoked turkey, and sweet potato pie, often seasoning his gumbo with extra cayenne
    and harvesting fresh basil and thyme from his urban rooftop garden, though they sometimes over‑salt the dishes in pursuit of bold flavor.
  core: Edward Turbinton is a pragmatic, competition‑driven carpenter who blends curiosity with careful planning, balances social rhythm with solitary craft, and measures life with the same precision they
    apply to their reclaimed‑wood furniture.
background:
  cultural: Edward grew up in a vibrant, multicultural neighborhood of New York City, where the rhythms of African‑American culture—from church gospel choirs to street‑corner hip‑hop—shaped his worldview.
    His family has a tradition of skilled trades, with his father and uncles working in construction, which instilled an early respect for craftsmanship. Navigating the challenges of urban life as a Black
    man, he developed a healthy skepticism that fuels his meticulous client vetting and competitive drive. He values community ties, often participating in local block parties, basketball pick‑up games,
    and mentorship programs that celebrate and preserve the legacy of Black artisans in the city.
