  hobbies: '[''building block construction'', ''sandbox exploration'', ''picture book listening'', ''crayon drawing'', ''educational animal and machine videos'', ''rhythmic clapping and simple dancing'',
    ''small‑group play at the park'', ''pretend rescue and firefighter play'']'
  career_goals: James dreams of becoming a builder or engineer who can create big structures, often saying he wants to 'make houses' or 'fix things' after playing with construction toys. He is also fascinated
    by firefighters, imagining himself rescuing people and animals. These aspirations blend his curiosity about how things work with a practical desire to see tangible results, while his compassionate side
    fuels a wish to help and protect others.
