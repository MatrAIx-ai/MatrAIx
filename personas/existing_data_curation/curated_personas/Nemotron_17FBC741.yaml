  hobbies: '["Journaling and personal reflection", "Playing the piano", "Reading mystery and adventure novels", "Participating in robotics club", "Volunteering at local community center", "Participating
    in Folklórico dance practice", "Baking traditional Mexican sweets with family", "Playing strategic video games (e.g., Minecraft)"]'
  career_goals: Martha aims to maintain top grades throughout high school and earn a scholarship to study engineering or computer science, fields where her love for structured problem‑solving can thrive.
    She envisions a future as a civil or architectural engineer designing sustainable projects that reflect Mexican cultural aesthetics. She also plans to obtain advanced bilingual certification to serve
    as a bridge for Spanish‑speaking residents in her community, potentially mentoring younger students. Her long‑term ambition is to combine technical expertise with community service, contributing to
    local infrastructure and educational programs.
