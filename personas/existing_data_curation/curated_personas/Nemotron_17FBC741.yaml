personas:
  professional: Martha Betancourt, a budding robotics enthusiast, channels their disciplined nature and love for structure into building and programming simple devices for their school's robotics club,
    meticulously documenting each project in their daily journal.
  sports: Martha Betancourt follows the San Antonio Spurs with fervor, attends weekend youth soccer matches with the San Antonio FC Juniors, and maintains a weekly cardio routine that combines a brisk walk
    to the community center with after‑school basketball drills, which they find both structured and socially rewarding.
  arts: Martha Betancourt expresses creativity through diligent piano practice, performing pieces by Beethoven and Ludovico Einaudi, dancing Folklórico routines to traditional songs like "La Bamba," and
    immersing themselves in mystery novels by authors such as James Patterson, while drawing inspiration from contemporary musicians like Billie Eilish.
  travel: Martha Betancourt prefers meticulously planned weekend getaways, enjoys day trips to the Texas Hill Country and recent family visits to San Antonio’s historic missions, dreams of an immersive
    cultural adventure during Mexico City’s Día de los Muertos celebrations, and hopes to backpack through the historic towns of Andalucía when they're older.
  culinary: Martha Betancourt enjoys mastering family recipes such as tamales, pan dulce, and chilaquiles, experimenting with fresh corn masa and sweet anise, while also delighting in making pepperoni pizza
    and baking chocolate chip cookies, seeing themselves as an enthusiastic apprentice guided by their grandparents.
  core: Martha Betancourt is a meticulously organized 13‑year‑old who balances a disciplined love for robotics, piano, and family traditions, yet occasionally trades diligent journaling for late‑night Minecraft
    marathons and the occasional procrastinated dentist visit, which they find both exciting and stressful.
background:
  cultural: Martha was raised in a Mexican‑American household in San Antonio, Texas. Her parents immigrated from Mexico, and both Spanish and English are spoken at home, giving her strong bilingual abilities.
    She celebrates Mexican traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around homemade tamales and pan dulce. Catholic holidays and community festivals in the Bexar
    County area shape her values of family loyalty, respect for elders, and community involvement. Her cultural identity blends Mexican heritage with the broader Texan environment, influencing her language,
    cuisine preferences, music, and her desire to give back to the local Latino community.
attributes:
  skills: '["Organizational planning", "Algebra and math problem solving", "Bilingual communication (Spanish/English)", "Basic computer proficiency (Microsoft Office, Scratch coding)", "Piano performance",
