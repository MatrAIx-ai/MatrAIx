    junior staff'', ''Vendor management'', ''Project coordination'', ''Data backup and recovery'', ''PowerShell scripting'', ''Bash scripting'', ''Cloud services support (Office 365, G Suite)'', ''ITIL
    best practices'']'
  hobbies: '[''Hiking in Wasatch Mountains'', ''Bowling league'', ''Skiing'', ''Custom PC building'', ''Vintage computer restoration'', ''Youth robotics coaching'', ''Competitive board games (Settlers of
    Catan, chess)'', ''Volunteer computer instruction'', ''Classic rock listening'', ''Live music attendance'', ''Landscape photography'', ''Mindfulness meditation'']'
  career_goals: Approaching retirement, Kenneth plans to transition from full‑time support to a part‑time consultancy focused on cybersecurity and small‑business IT resilience. He aims to earn CompTIA Security+
    and eventually CISSP certification to broaden his advisory capabilities. He also wants to lead a community tech‑outreach program that teaches basic computer skills and online safety to seniors in West
    Jordan. Additionally, he hopes to design and implement a comprehensive home‑automation system for his own residence, integrating smart lighting, security, and energy‑management devices. Mentoring remains
    a priority; he intends to volunteer as a guest lecturer at the local community college and help shape the next generation of IT professionals.
