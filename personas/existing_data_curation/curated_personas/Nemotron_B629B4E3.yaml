personas:
  professional: Kenneth Paulsen is a veteran computer support specialist transitioning to part‑time cybersecurity consulting, leveraging three decades of cross‑platform troubleshooting, network configuration,
    and ITIL‑aligned service delivery while mentoring junior staff and championing structured SOPs despite his occasionally relaxed approach to deadlines.
  sports: Kenneth Paulsen hits the Wasatch trails every weekend, competes in a senior bowling league at the West Jordan Community Center, and joins seasonal ski trips to Alta, while cheering on the Utah
    Jazz and following Real Salt Lake with the same competitive spirit he brings to board games.
  arts: Kenneth Paulsen immerses himself in classic rock, regularly attending live shows featuring a Rolling Stones tribute band and Bruce Springsteen at Salt Lake City’s Red Butte Garden, curates a personal
    vinyl collection, and captures Utah’s dramatic canyons in black‑and‑white photography, often showcasing his prints at local art fairs.
  travel: Kenneth Paulsen balances structured planning with spontaneous road trips, having hiked through Zion and Arches National Parks, skied at Colorado’s Vail resort, and explored the historic streets
    of Edinburgh, while budgeting for future visits to Japan’s tech expos and the Swiss Alps.
  culinary: Kenneth Paulsen enjoys cooking hearty Utah‑style fry sauce‑topped burgers, slow‑roasted lamb shoulder with rosemary, a weekly homemade sourdough, and occasionally treats himself to a craft IPA
    and Oregon smoked salmon, while he often experiments with spice blends sourced from his vintage computer restoration trips.
  core: Kenneth Paulsen is a technically curious, socially vibrant senior who balances structured expertise with flexible hobbies, mitigates anxiety through mindfulness, and navigates retirement with a
    mix of disciplined investing and spontaneous tech projects.
background:
  cultural: Kenneth grew up in a middle‑class white family in the Intermountain West, where the outdoor recreation culture and community‑centered values shaped his outlook. While his upbringing included
    exposure to the LDS cultural environment common in Utah, his personal beliefs are eclectic, emphasizing family, hard work, and self‑reliance. The region’s pioneering history and seasonal activities—hiking,
    skiing, and local fairs—have fostered a strong connection to nature and local traditions. His professional life mirrors the tech boom of the 1990s, and he values practical, hands‑on problem solving,
    reflecting the pragmatic spirit of his generation.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software troubleshooting'', ''Network configuration'', ''Windows OS support'', ''macOS support'', ''Linux support'', ''Help desk ticketing (ServiceNow, JIRA)'',
