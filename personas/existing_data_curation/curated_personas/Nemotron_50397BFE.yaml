  career_goals: Francisco dreams of a future where he can help keep his community safe and organized. He often talks about becoming a firefighter, attracted by the clear structure, teamwork, and the chance
    to respond predictably to emergencies. He is also fascinated by building things, so he imagines pursuing civil engineering or construction work, where he can apply his practical skills and enjoy a job
    with defined plans and procedures.
