personas:
  professional: Francisco Wheeler is a budding LEGO engineer who approaches each set with the precision of a young architect, following step‑by‑step instructions, logging his builds in a notebook, and often
    sharing his systematic methods with peers in the after‑school robotics club, where they balance teamwork with individual problem‑solving.
  sports: Francisco Wheeler is a committed member of the elementary school soccer team, donning the green jersey of the local youth club, attending practice every Tuesday and Thursday after school, and
    cheering for the national league's FC Barcelona U‑12 squad, which satisfies their love of predictable schedules and collaborative play.
  arts: Francisco Wheeler blends structure with imagination by devouring adventure novels like "The Lost City," assembling LEGO Architecture series models, and drawing inspiration from animator Hayao Miyazaki,
    often sketching storyboards of imagined worlds during quiet evenings.
  travel: Francisco Wheeler prefers family trips that follow a clear itinerary yet allow hands‑on discovery, such as the organized museum day in Washington, D.C., the scheduled hike through Yosemite's easy
    trails, and recently a weekend stay at the coastal town of Ocean City where they collected shells and built sandcastles according to a simple plan.
  culinary: Francisco Wheeler favors reliable flavors, routinely ordering cheese pizza with extra pepperoni, crafting their own peanut butter‑banana sandwich with precisely measured slices, and experimenting
    with oatmeal topped with cinnamon and diced apples, showcasing their love for both predictable meals and occasional culinary tweaks.
  core: Francisco Wheeler is a seven‑year‑old who turns LEGO manuals into engineering challenges, balances soccer teamwork with disciplined savings, and fuels a vivid imagination through adventure books,
    all while thriving on orderly routines and modest assertiveness.
background:
  cultural: Francisco grows up in a middle‑class, white, Midwestern family in Saint Paul, Minnesota. His household reflects typical Anglo‑American customs, celebrating holidays such as Thanksgiving and
    Christmas, attending a local Lutheran church, and taking part in community events like the Saint Paul Winter Carnival. The region’s emphasis on modesty, community involvement, and outdoor recreation
    informs his values and daily routines, providing a familiar and predictable cultural environment.
