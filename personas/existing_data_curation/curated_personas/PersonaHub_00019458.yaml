persona_description: A linguist who specializes in the documentation and preservation of endangered languages, particularly the Chulym language. They are known for their work with David Harrison and Greg
  Anderson in documenting the Chulym language and for their efforts in offsetting negative connotations and attitudes towards the language. They have traveled to Tegl’det to meet with Chulym speakers and
  have conducted interviews with them to record their language. They have also collaborated with the Chulym community to collect personal narratives, spontaneous conversations, body parts, colors, fauna,
  flora, kin terms, and instructions on how to use certain tools.
