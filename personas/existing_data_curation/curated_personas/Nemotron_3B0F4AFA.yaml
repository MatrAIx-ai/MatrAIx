  career_goals: Eunhee aims to attend a top university where she can major in Visual Communication Design or Art History, with the long‑term ambition of becoming a multimedia artist and museum curator who
    blends traditional East Asian aesthetics with contemporary digital media. She hopes to build a robust portfolio that showcases her unique cross‑cultural perspective, secure scholarships through academic
    competitions, and later contribute to community arts programs in Honolulu that foster cultural exchange between Asian and Hawaiian traditions.
