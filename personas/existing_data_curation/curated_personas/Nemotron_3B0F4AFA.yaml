personas:
  professional: A budding digital artist and interactive coder, Eunhee Lo blends meticulous planning with a curiosity for unconventional visual storytelling, channeling their methodical mindset into creating
    mixed-media projects that often explore the tension between the tranquil aloha vibe and disciplined family values, while their competitive edge drives them to enter statewide art tech contests.
  sports: Eunhee Lo participates in the high school surf club and occasional beach volleyball games, follows the University of Hawai'i Rainbow Warriors football team and the NBA's Los Angeles Lakers, and
    balances their solitary preference with structured weekly workouts that emphasize flexibility and endurance.
  arts: Eunhee Lo immerses themselves in digital illustration inspired by artists like James Jean and Korean webtoon creator Lee Jong-hui, curates a personal photography series of Hawaiian waterfalls reminiscent
    of Ansel Adams, and regularly attends local hula performances by groups such as Na Keiki Hula to weave cultural rhythm into their creative process.
  travel: Eunhee Lo prefers meticulously planned short trips that blend adventure and cultural immersion, having explored the volcanic landscapes of Maui and the historic streets of Seoul, and dreams of
    hiking the Jeju Olle Trail and visiting the art districts of Berlin on future school exchanges.
  culinary: Eunhee Lo enjoys cooking a fusion of bibimbap with fresh pineapple and kimchi, perfecting their gochujang glaze for grilled fish while also savoring poke bowls topped with seaweed and sesame,
    and their intermediate kitchen skills are reflected in a weekly family recipe night where they experiment with taro and coconut milk.
  core: Eunhee Lo, a 15-year-old digital creator, balances a disciplined love of art and code with a quiet, competitive streak, a habit of over-organizing school projects, and an occasional reluctance to
    trust new friends.
background:
  cultural: Eunhee is a Korean‑American teenager raised in Honolulu. At home, her family preserves Korean customs, language, and cuisine, celebrating holidays like Seollal and Chuseok, while outside she
    embraces Hawai‘i’s multicultural environment, participating in local festivals, school events, and occasionally learning hula. This blend gives her fluency in Korean and English, a respect for education
    rooted in Confucian values, and an appreciation for the relaxed aloha spirit, shaping a unique bicultural identity.
