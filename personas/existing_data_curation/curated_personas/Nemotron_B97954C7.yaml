  hobbies: '[''Museum and Gallery Visits'', ''Live Theatre Attendance'', ''Watercolor Painting'', ''Photography'', ''Group Hiking'', ''Pickup Basketball'', ''Cycling Club'', ''Volunteer Mentoring (Arts
    for All)'', ''Festival Coordination (Lombard Summer Festival)'', ''Culinary Exploration of European Cuisine'']'
  career_goals: Mark aims to advance to a senior leadership role within the DuPage County Parks and Recreation Department, such as Recreation Services Director, where he can shape county‑wide policy on
    arts‑based programming and inclusive recreation. He envisions creating an intergenerational arts initiative that pairs youth artists with senior participants, fostering mutual learning and community
    cohesion. Additionally, Mark is interested in mentoring emerging recreation professionals and eventually consulting for nonprofit cultural organizations on program design and grant acquisition. While
    planning for a gradual transition toward retirement, he wants to leave a lasting legacy of innovative, compassionate community programs.
