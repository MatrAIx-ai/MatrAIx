  career_goals: Santa aims to transition from a skilled subcontractor to the owner of a boutique painting and decorative‑art studio in Middletown. Her short‑term goal is to earn a Certified Master Painter
    credential and expand her portfolio with high‑visibility community murals that blend Ecuadorian motifs with New England architecture. Long‑term, she envisions hiring a small crew of women tradespeople,
    offering specialized services such as custom color consulting and sustainable finishing solutions, and establishing a reputation as the go‑to painter for environmentally conscious homeowners. By building
    a resilient client base, she hopes to achieve financial stability that reduces her chronic worry and provides flexibility to balance work with family and community commitments.
