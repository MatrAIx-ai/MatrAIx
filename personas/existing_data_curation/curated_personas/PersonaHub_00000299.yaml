persona_description: A Peruvian conservationist and park warden, Jose Altamarino, who has dedicated his life to protecting the unique cloud forests of the Abra Patricia Private Conservation Area in northern
  Peru. He has spent years combing the area for the long-whiskered owlet, Xenoglaux loweryi, and has worked tirelessly to combat illegal activities that threaten the species and the reserve. Altamarino's
  dedication and passion for conservation have earned him the respect of his peers and the admiration of many bird watchers who have been disappointed in their attempts to spot the rare and elusive owl.
