personas:
  professional: Nadia Molina, a one‑year‑old participant in a parent‑led early learning program, demonstrates budding analytical skills by sorting shapes and colors, and their highly imaginative and methodical
    nature shines as they meticulously build and rearrange block structures, turning solitary play into a disciplined creative exercise.
  sports: Nadia Molina, a budding fan of toddler swim lessons at the local community pool and a member of the YMCA’s baby gymnastics class, also enjoys watching the Chicago Cubs on family TV nights and
    cheerfully waves a tiny foam finger during occasional soccer matches from the living room.
  arts: Nadia Molina, enchanted by the gentle melodies of Mozart’s “Eine kleine Nachtmusik” and the playful tunes of Sesame Street’s cast, delights in finger‑painting with non‑toxic paints while a plush
    rabbit that plays lullabies by Jewel provides a soothing soundtrack to their imaginative quiet time.
  travel: Nadia Molina, after a family road trip to the Grand Canyon’s South Rim and a sunny weekend at Santa Monica Beach, now dreams of exploring the vibrant colors of Kyoto’s cherry blossoms, but their
    current travel style remains stroller‑friendly day outings to nearby parks and grandparents’ farm.
  culinary: Nadia Molina, a tiny connoisseur of mashed sweet potatoes, ripe avocado, and homemade organic carrot puree, skillfully uses a miniature spoon to self‑feed, and they show a particular preference
    for warm oat‑milk rice cereal seasoned with a pinch of cinnamon, while occasionally rejecting peas in protest.
  core: Nadia Molina, a one‑year‑old with a vivid imagination and methodical curiosity, builds elaborate block towers in solitude, insists on a precise bedtime routine, and habitually requests an extra
    banana bite before nap.
background:
  cultural: Nadia is raised in a Mexican‑American household in Houston’s vibrant Meyerland neighborhood. Her parents speak both Spanish and English, and family gatherings often feature traditional dishes
    like tamales and pozole, as well as music ranging from mariachi to contemporary Latin pop. Growing up in a city with a strong Mexican community, she is regularly exposed to cultural festivals such as
    Cinco de Mayo parades and Día de los Muertos celebrations, which nurture her appreciation for rich visual symbols and storytelling traditions.
