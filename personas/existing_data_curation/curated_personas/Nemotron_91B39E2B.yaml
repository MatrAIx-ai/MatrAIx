  career_goals: Even at this age Nadia has expressed a budding desire to become a creator of beautiful things. She often points to picture books and bright paintings and says she wants "to make pictures"
    when she grows up. Her long‑term ambition is to explore art and design, eventually becoming a visual artist or illustrator who can blend colors and shapes in innovative ways.
