  hobbies: '[''Co‑ed softball league'', ''Zumba fitness classes'', ''Community clean‑up volunteering'', ''Potluck cooking with church group'', ''DIY home improvement projects'', ''Backyard gardening'',
    ''Reading mystery novels'', ''Watching classic Texas western films'', ''Community theater acting'', ''Group hiking on local trails'']'
  career_goals: Belinda aims to transition from frontline cleaning to a supervisory role within facilities management. She plans to earn the ISSA Cleaning Management Institute (CMI) certification and complete
    an associate’s degree in Facilities Management. Over the next five years she hopes to become a Facilities Operations Supervisor for a large office campus in the Dallas‑Fort Worth area, overseeing a
    team of cleaners, managing vendor contracts, and implementing sustainability initiatives. Long‑term, she envisions launching her own environmentally focused cleaning business, leveraging her practical
    expertise and community connections.
