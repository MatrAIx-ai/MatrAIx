  career_goals: Monica aims to obtain a state-recognized painting certification within the next two years and leverage her expertise to launch a small, owner-operated painting and paper-hanging business
    in Tulsa. She aspires to specialize in decorative finishes and eco-friendly paint products, positioning herself as a reliable, high-quality contractor for residential clients. Long-term, she hopes to
    expand her team, secure steady contracts with property management firms, and achieve financial independence that allows her to support her family and maintain a balanced lifestyle.
