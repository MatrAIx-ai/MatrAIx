  hobbies: '[''Attending local events (football games, fairs)'', ''Community drama club (acting, improv)'', ''Karaoke and dancing'', ''Biking around the countryside'', ''Baking cupcakes and desserts'',
    ''Volunteering at animal shelter'', ''Photography of rural scenes'', ''Social media content sharing'', ''Journaling'', ''Guided meditation'']'
  career_goals: In the short term, Sharon plans to earn her GED and complete a community‑college certificate in digital communications while working part‑time at the local café to gain customer‑service
    experience. She wants to build a portfolio of social‑media projects for small businesses in Scranton, aiming for a role as a community events coordinator or social‑media manager for a regional retailer.
    Long‑term, she envisions opening a small coffee‑and‑bakery shop that serves as a gathering spot for locals, combining her love of hospitality, baking, and community building. She also hopes to develop
    leadership skills to serve on the town's youth council and represent her peers.
