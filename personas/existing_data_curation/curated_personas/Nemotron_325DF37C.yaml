personas:
  professional: Sharon Crispell is an 18‑year‑old aspiring digital communications specialist who leverages their knack for community event promotion, social‑media content creation, and basic graphic design
    to run the town’s Facebook page and organize high‑school dances, while balancing a love of structure with spontaneous bursts of creativity.
  sports: Sharon Crispell cheers enthusiastically for the Scranton High Bulldogs football team, participates in weekend community softball games, rides a mountain bike on the nearby prairie trails, and
    follows the Kansas City Chiefs and the Wichita State Shockers, embodying a hometown sports spirit blended with a love for outdoor fitness.
  arts: Sharon Crispell delights in performing improv at the community drama club, belts out pop hits from Taylor Swift and country favorites from Luke Bryan during karaoke nights at the local diner, and
    draws inspiration from photographer Annie Leibovitz for their candid landscape shots, integrating both modern pop culture and small‑town artistic expression.
  travel: Sharon Crispell enjoys weekend road trips to the Flint Hills, plans an annual summer visit to Nashville for its music scene, dreams of a spring break in New York City’s Central Park, yet balances
    these wanderlust urges with a tight student budget and a sense of responsibility to help at the family farm during harvest.
  culinary: Sharon Crispell loves baking cupcakes with velvety vanilla buttercream and experimenting with red‑velvet and salted caramel flavors, often adding locally sourced honey and fresh berries, while
    also relishing hearty Midwestern comfort foods like chicken‑pot pie and cornbread, showcasing a blend of sweet indulgence and rustic cooking.
  core: Sharon Crispell is a sociable, structure‑seeking 18‑year‑old who balances community‑driven ambition with spontaneous creativity, a sprinkle of anxiety, and a persistent habit of over‑decorating
    cupcakes.
background:
  cultural: Sharon grew up in Scranton, a small town in Osage County, Kansas, representative of the Midwestern heartland. Her family has deep roots in the area, with a tradition of farming and strong community
    involvement. Local culture emphasizes self‑reliance, neighborly support, participation in church and town events such as county fairs and high‑school sports. While she embraces these modest, practical
    values, Sharon is also influenced by contemporary pop culture through social media, music, and streaming shows. This blend of traditional Midwestern community spirit and modern digital connectivity
    shapes her worldview, giving her a strong sense of place while staying open to broader trends.
attributes:
  skills: '[''Social media content creation'', ''Event planning and coordination'', ''Public speaking'', ''Improvisational performance'', ''Interpersonal communication'', ''Basic computer literacy'', ''Photo
