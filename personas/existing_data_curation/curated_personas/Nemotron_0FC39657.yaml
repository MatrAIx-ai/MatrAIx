  career_goals: Anita aims to pursue a career as a multimedia artist or graphic designer. After completing her high school diploma, she hopes to enroll in a specialized art program or community college
    where she can build a professional portfolio. Her long‑term ambition is to freelance for creative agencies, develop an independent brand that merges visual storytelling with social media, and eventually
    mentor younger artists through community workshops in her hometown.
