personas:
  professional: Tyler Griffith, a 14‑year‑old aspiring mechanical engineer, channels their practical mindset and competitive streak into building precise model kits and leading STEM club projects, consistently
    delivering organized results while juggling school duties, which they approach with disciplined focus.
  sports: Tyler Griffith, a 14‑year‑old midfield enthusiast on the Gilbertsville Middle School Lions soccer team and point guard for the school basketball squad, follows the Philadelphia Eagles and the
    Philadelphia 76ers avidly, spends weekends hiking local trails with friends, and adheres to a disciplined training routine that balances competitive drills with structured conditioning sessions, which
    they treat as a personal challenge.
  arts: Tyler Griffith, a 14‑year‑old guitarist who hones their skills on songs by John Mayer and Ed Sheeran, finds artistic release in assembling intricate model airplane kits, and relaxes after school
    by playing Overwatch to the soundtrack of composers like Jeremy Soule, weaving together music, craftsmanship, and gaming as core parts of their creative identity, which they cherish.
  travel: Tyler Griffith, a 14‑year‑old who prefers meticulously planned weekend getaways to nearby spots like the Poconos and Lancaster County fairs, dreams of a family road trip to Washington, D.C. and
    a future vacation at Disneyland, and balances a love for outdoor hiking with a cautious budget that limits spontaneous international travel, which they manage with a detailed spreadsheet.
  culinary: Tyler Griffith, a 14‑year‑old with a solid grasp of basic cooking techniques, frequently whips up pepperoni pizza, mac & cheese, and grilled cheese sandwiches using cheddar cheese and sourdough,
    delights in making homemade chocolate brownies on weekends, and often indulges in soft pretzels and locally sourced apple butter after a hectic school day, which they consider a well‑earned reward.
  core: Tyler Griffith blends a competitive, structure‑loving mindset with a sociable, community‑focused spirit, channels stress through guitar and model building, and navigates teenage life with a healthy
    dose of skepticism and occasional anxiety, which they manage through journaling and weekend hikes.
background:
  cultural: Tyler grew up in Gilbertsville, a small community in Montgomery County, Pennsylvania, where his family blends a mix of Pennsylvania German heritage and typical suburban middle‑class values.
    His upbringing emphasized hard work, community involvement, and participation in local traditions such as the county fair and volunteer fire department events. He attends a public middle school that
    values extracurricular sports and STEM clubs, and his family—both parents working in caring and trade professions—encourages responsibility, punctuality, and extracurricular engagement, fostering a
    practical and organized outlook.
