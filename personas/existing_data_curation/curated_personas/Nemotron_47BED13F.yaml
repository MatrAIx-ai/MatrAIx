  career_goals: Tyler aims to enroll in a vocational high school with a strong engineering track, then earn a civil engineering degree focused on sustainable infrastructure. He envisions designing bridges,
    roads, or community facilities that improve Gilbertsville and surrounding areas. In the short term, he wants to be a captain of his high‑school basketball team to develop leadership experience, earn
    a scholarship, and secure an apprenticeship with a local construction firm. Long‑term, he aspires to become a reliable, organized professional who leads multidisciplinary teams on public‑works projects.
