persona_description: A theoretical physicist who specializes in the field of quantum gravity, particularly the development of a theory that can unify quantum mechanics and Einstein's general theory of relativity.
  He is known for his proposal of a table-top probe of quantum gravity, which involves firing single photons at a piece of glass or crystal, suspended by a tiny thread. Bekenstein's proposal is considered
  challenging but not beyond what experimental physicists can do today, and he believes that the presence of the foam would prevent the glass from recoiling in exactly the same way when struck by a succession
  of identical photons.
