personas:
  professional: Yuk Chen is a 14‑year‑old varsity soccer captain who also leads a robotics team, using Python programming and structured practice drills to design competition‑ready bots while balancing
    demanding schoolwork and a fiercely competitive outlook.
  sports: Yuk Chen is a 14‑year‑old varsity soccer midfielder who trains five days a week, models tactics after the San Jose Earthquakes, leads high‑intensity drills for teammates, and competes in regional
    leagues, though they occasionally battle shin splints in the spring.
  arts: Yuk Chen is a 14‑year‑old digital artist who creates fan‑art in Photoshop, plays piano pieces by Yiruma, folds intricate origami cranes, practices calligraphy with brush pens, and reads Liu Cixin’s
    sci‑fi novels, drawing inspiration from both modern media and traditional artistic techniques.
  travel: Yuk Chen is a 14‑year‑old who plans weekend getaways with spreadsheets, favoring structured itineraries to Yosemite National Park and San Francisco’s Chinatown, while dreaming of a future study‑abroad
    stint in Tokyo to explore cutting‑edge tech and cultural festivals.
  culinary: Yuk Chen is a 14‑year‑old who enjoys preparing homemade pork dumplings with ginger and soy sauce for Lunar New Year, cooks pepperoni pizza for friends, and expertly folds delicate mooncake‑shaped
    pastries, though they sometimes over‑season dishes in their excitement.
  core: Yuk Chen is a disciplined, competitively driven 14‑year‑old who balances varsity soccer, robotics, and cultural traditions, yet wrestles with anxiety and a habit of over‑planning every detail.
background:
  cultural: Yuk comes from a Chinese‑American family that preserves its East Asian heritage while embracing life in the Bay Area. She speaks Mandarin at home and celebrates traditional holidays such as
    Lunar New Year and the Mid‑Autumn Festival, often helping to prepare dishes and cultural performances. Her parents place a strong emphasis on education and respect for elders, shaping her disciplined
    and practical approach to school and extracurricular activities. Growing up in Antioch, California, she experiences a multicultural environment that blends Chinese cultural practices with typical Californian
    suburban life, giving her a bicultural perspective that informs her interests, values, and future ambitions.
