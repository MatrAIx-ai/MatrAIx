  career_goals: Yuk aims to pursue a career that blends technology, organization, and problem solving. She plans to study computer science or engineering at a top university, with the long‑term goal of
    becoming a software engineer or product manager leading collaborative tech projects. She is especially interested in robotics and sustainable technology, hoping to design devices that address environmental
    challenges. In the short term, she wants to win a regional robotics competition, secure a summer internship at a tech company, and build a portfolio of coding projects that demonstrate her practical
    skills.
