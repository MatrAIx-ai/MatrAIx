personas:
  professional: Raul Castellanos, a retired construction veteran with decades of carpentry, plumbing, and electrical work, now channels their practical expertise into teaching home‑repair and gardening
    workshops at the local community center, using their calm, cooperative demeanor to foster hands‑on learning among neighbors.
  sports: Raul Castellanos enjoys gentle exercise through daily neighborhood walks and weekend fly‑fishing on nearby streams, follows the Los Angeles Dodgers with devotion, and occasionally joins a senior
    softball league at the community center.
  arts: Raul Castellanos finds joy in listening to ranchera legends like Vicente Fernández and folk bands at his parish, while channeling his creative side into small woodworking projects inspired by traditional
    crafts, and occasionally watches classic cinema starring Pedro Infante.
  travel: Raul Castellanos prefers low‑key road trips, often driving to Joshua Tree for its desert tranquility or to the historic missions of Southern California, while planning occasional family visits
    to his grandchildren's school events and dreaming of a pilgrimage to the coastal village where his grandparents once lived.
  culinary: Raul Castellanos delights in preparing fragrant pozole, handmade tamales, and chiles rellenos with fresh corn, chilies, and cilantro from his garden, a skillful yet relaxed cook who often experiments
    with traditional sauces like salsa verde while occasionally burning the garlic when distracted.
  core: Raul Castellanos embodies a calm, resilient handyman who delights in gardening, cooking, and quietly sharing his practical wisdom, even as he occasionally misplaces toolboxes and forgets appointments.
background:
  cultural: Raul was born to Mexican immigrant parents and raised in a tightly knit Mexican‑American community in Southern California. He grew up bilingual, celebrating Día de los Muertos, quinceañeras,
    and other family traditions, while also integrating into the broader Californian culture. His values reflect a blend of Mexican collectivist family orientation and the practical, resilient spirit of
    long‑time immigrant settlers, shaping his respectful, cooperative nature and deep appreciation for cultural heritage.
