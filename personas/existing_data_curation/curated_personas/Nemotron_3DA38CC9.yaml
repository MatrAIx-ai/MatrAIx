  hobbies: '[''Gardening'', ''Coastal walking and hiking'', ''Book club reading'', ''Bird watching'', ''Community theater'', ''Knitting and quilting'', ''Volunteering at food pantry'', ''Pottery classes'',
    ''Attending local cultural events'']'
  career_goals: Although retired from formal employment, Autumn aims to deepen her impact in the community. She plans to lead intergenerational programs at the local senior center, mentor younger volunteers,
    and help preserve Laguna Niguel’s local history through oral storytelling projects. She also hopes to learn new crafts such as pottery, compile a memoir of her life experiences, and serve as an advocate
    for seniors’ interests with the city council.
