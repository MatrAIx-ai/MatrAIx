    running program'']'
  career_goals: Angela aims to step into a senior systems analyst role within the next two years, followed by a transition into IT strategy and solutions architecture. She plans to earn PMP and CISSP certifications
    to bolster her credibility in project leadership and security. Beyond titles, she is driven to build and lead a diverse, high‑performing team that champions inclusive design practices. She envisions
    launching a mentorship program for underrepresented women in technology and contributing thought‑leadership articles that weave humanistic perspectives into tech policy. Achieving these goals while
    maintaining a structured, low‑stress work environment is a core ambition.
