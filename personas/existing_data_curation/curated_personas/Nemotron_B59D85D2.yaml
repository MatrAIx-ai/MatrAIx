  hobbies: '[''Reading marine and science books'', ''Sketching and watercolor illustration of sea life'', ''Shell and sea‑glass collecting with detailed cataloguing'', ''Journaling and planning'', ''Cooking
    traditional Mexican dishes with family'', ''Participating in small‑group beach clean‑up events'', ''Playing strategy‑focused video games'']'
  career_goals: Gilda aspires to become a marine biologist or coastal environmental scientist, motivated by the marine ecosystem that surrounds Fort Myers Beach. She envisions studying coral health, marine
    wildlife, and the impacts of climate change, then using that knowledge to protect her community’s shoreline. Recognizing her practical nature, she plans to pursue a scholarship for a reputable university,
    aiming for a stable career that balances fieldwork with research and public outreach. She also hopes to mentor younger students, especially bilingual teens, encouraging them to explore science while
    respecting cultural roots.
