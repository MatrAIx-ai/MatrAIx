personas:
  professional: Gilda Campos is a budding marine science enthusiast who channels her methodical curiosity into leading her high school’s aquatics club, where she combines detailed research on marine ecosystems
    with organized project planning, and confidently presents findings to small groups while quietly asserting her ideas.
  sports: Gilda Campos enjoys open‑water swimming and paddleboarding with the Ocean Breeze Surf Club during summer, follows the Los Angeles Dodgers in baseball and the LAFC soccer team for excitement, and
    participates in a small‑team beach volleyball league that mirrors her preference for focused teamwork, while avoiding large‑scale school sports that feel overwhelming.
  arts: Gilda Campos blends scientific precision with artistic flair by creating watercolor illustrations of sea turtles and jellyfish inspired by the works of Ernst Haeckel and marine photographer Chris
    Jordan, and she collects limited‑edition prints from contemporary ocean‑themed artist Maya Lin, allowing her solitary sketch sessions to serve as both relaxation and creative expression.
  travel: Gilda Campos dreams of organizing a family trip to the Galápagos Islands to study unique wildlife, has already visited Monterey Bay and the coastal town of Carmel for beachcombing field trips,
    and prefers meticulously planned itineraries that balance guided tours with free time for collecting shells, all while staying within a modest budget set by her parents.
  culinary: Gilda Campos enjoys preparing family staples such as tamales, salsa, and arroz con leche, refining her timing and organization in the kitchen, while also experimenting with grilled fish tacos
    seasoned with lime, cilantro, and chipotle, and she loves incorporating fresh seaweed into sushi rolls for a marine twist.
  core: Gilda Campos is a diligent, curiosity‑driven teen who meticulously documents marine life, worries about details, and balances solitary artistic pursuits with responsible financial habits, all while
    navigating occasional anxiety.
background:
  cultural: Gilda is a second‑generation Mexican‑American who grew up in a bilingual household in Fort Myers Beach, Florida. At home, Spanish is spoken daily, and family meals often feature classic Mexican
    dishes that connect her to her heritage. She celebrates cultural traditions such as Día de los Muertos and Las Posadas, blending them with local Floridian customs like beach festivals. The Catholic
    faith, observed through family prayers and community celebrations, provides a sense of routine and community. Her Mexican roots influence her strong family bonds, respect for elders, and communal values,
    while living on the Gulf Coast has nurtured a deep appreciation for coastal ecology. This dual cultural lens shapes her identity, informing her interests in marine conservation and her desire to serve
    as a bridge between Latino youth and scientific fields.
attributes:
  skills: '[''Bilingual Spanish‑English communication'', ''Organizational and time‑management skills'', ''Basic scientific observation and data recording'', ''Reading comprehension and creative writing'',
