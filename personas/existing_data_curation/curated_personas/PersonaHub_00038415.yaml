persona_description: A historian who specializes in the study of religious and cultural history, particularly the interactions between Buddhism and the Mongolian nomadic culture. His research interests
  include, but are not limited to, the history of Buddhism in Mongolia, the cultural and religious influences of Buddhism on the Mongolian society, and the interactions between Buddhism and other religions
  and cultures in the region. He is particularly interested in the development of Lamaistic Buddhism in Mongolia and the ways in which it has been integrated into the local cultural and religious landscape.
  He has conducted extensive fieldwork in Inner Mongolia and Gansu, and has published several articles and books on the subject. He is also interested in the role of rock art and Buddhist grottoes in the
  development of the Mongolian nomadic culture and the impact of Buddhism on the Mongolian society.
