persona_description: An engineer working in the nuclear industry, specifically focused on reactor design and optimization. This individual is involved in the development of nuclear reactors, with a particular
  interest in epithermal, water-cooled reactors. They are responsible for assessing nuclear reactor physics, thermal hydraulics, and economics to develop a 8-yr core design for an epithermal, water-cooled
  reactor. They are skilled in the use of MCNP for whole-core simulations and have experience in subchannel thermal-hydraulic analysis using the VIPRETM code. They are interested in the financial aspects
  of reactor design, including financing requirements and lifetime-levelized total unit costs, and are knowledgeable about the proliferation-resistant limit of 20 wt% 235U.
