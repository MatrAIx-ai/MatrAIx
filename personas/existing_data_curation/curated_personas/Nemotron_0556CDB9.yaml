  career_goals: Willie aims to advance from his current representative role to a team lead or supervisory position within the next two to three years, leveraging his reliability and methodical approach.
    He plans to earn a Certified Customer Service Professional credential and complete his bachelor's degree in Business Administration, focusing on operations or analytics. Long‑term, he aspires to become
    a Customer Experience Manager, overseeing cross‑functional initiatives that improve service quality and efficiency, and eventually transition into a regional operations manager role where he can apply
    his competitive drive to meet performance targets.
