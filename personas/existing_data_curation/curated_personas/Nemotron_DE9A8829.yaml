personas:
  professional: Enrique Batista, a retired handyman turned community workshop founder, leverages decades of hands‑on mechanical, electrical, and carpentry expertise to mentor seniors and young adults, combining
    meticulous craftsmanship with a pragmatic problem‑solving mindset and fluent Spanish–English communication, and they are known for their patient teaching style.
  sports: Enrique Batista enjoys leisurely walks in the nearby park, participates in a senior bowling league at the community center, and avidly follows the regional baseball team, the Cleveland Guardians,
    attending games when possible, and they often chat with fellow bowlers about the latest DIY projects.
  arts: Enrique Batista delights in classic boleros by Trio Los Panchos and salsa legends such as Celia Cruz, while also immersing in historical nonfiction authors like David McCullough, finding that the
    blend of music and literature fuels both their reflective walks and their meticulous model‑building hobby.
  travel: Enrique Batista prefers thoughtfully planned trips that balance cultural immersion and comfort, having explored a historic Caribbean harbor town and the tranquil vineyards of Niagara‑on‑the‑Lake,
    while dreaming of a future pilgrimage to the shipyards of Belfast to deepen their model‑ship expertise, and they keep detailed sketches of every place they visit.
  culinary: Enrique Batista threads their culinary skill through family recipes, skillfully preparing aromatic rice and bean dishes seasoned with sofrito, plantains, and slow‑cooked pork, while also experimenting
    with spiced herb‑infused sauces for grilled vegetables from their garden, and they love serving these meals to friends during workshop gatherings.
  core: Enrique Batista is a meticulous, curiosity‑driven retiree who channels decades of repair expertise into community mentorship, balances frugal finances with a love for heritage cooking, and they
    find solace in solitary pursuits like model‑building and reflective walks.
background:
  cultural: Enrique was born in San Juan, Puerto Rico, and moved to Cleveland with his family at age 12, settling in the historic Clark‑Fulton neighborhood, a hub of the city’s Puerto Rican diaspora. He
    grew up speaking Spanish at home while navigating an English‑dominant school environment, giving him a bicultural fluency that informs his identity today. He maintains close ties with relatives in Puerto
    Rico, visiting every few years and staying connected through regular video calls. In Cleveland, he participates in community gatherings such as the annual Carnaval del Barrio and the Puerto Rican Day
    Parade, where he volunteers to help organize cultural activities and mentor youth. His culinary traditions, love for Latin music, and commitment to preserving Spanish language within his community reflect
    a deep pride in his heritage while he also embraces the multicultural fabric of the Greater Cleveland area.
attributes:
  skills: '[''Mechanical repair and maintenance'', ''Carpentry and woodworking'', ''Electronics troubleshooting'', ''Personal budgeting and financial planning'', ''Bilingual Spanish–English communication'',
