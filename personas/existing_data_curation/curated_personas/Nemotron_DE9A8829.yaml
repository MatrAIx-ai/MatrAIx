  hobbies: '[''Model ship building'', ''Vintage radio kit assembly'', ''Reading historical non‑fiction'', ''Chess and Sudoku'', ''Gardening (herbs and vegetables)'', ''Cooking traditional Puerto Rican cuisine'',
    ''Listening to boleros and salsa'', ''Walking in local parks'']'
  career_goals: Although retired from formal employment, Enrique aims to stay active by establishing a community workshop where seniors and young adults can learn practical repair and woodworking skills.
    He plans to volunteer regularly at the local Puerto Rican cultural center, offering Spanish language tutoring and assisting with the organization of cultural festivals. Completing the college credits
    he began decades ago remains a personal milestone, and he hopes to earn a degree in technical education to formalize his expertise. Additionally, Enrique aspires to compile and publish a memoir that
    captures his experience as a Puerto Rican immigrant in the Rust Belt, preserving his family’s oral history for future generations.
