persona_description: A linguist who specializes in the study of creole languages, particularly those that developed in the context of colonialism and slavery. Her research interests include the negotiation
  between different cultures, perceptions of space and nature, and of the body in history. She is interested in the history of Ile de Reunion and the people who fled slavery and hid in the forests. She
  has gathered the names of plants, shrubs and trees on the island and recorded the names of the Creole actors. Her work challenges the nomenclature of faux Bois de Mademoiselle which is still called Bois
  de la Negresse.
