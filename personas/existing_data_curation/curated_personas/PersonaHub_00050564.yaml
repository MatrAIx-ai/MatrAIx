persona_description: A historian and art expert with a specialization in the study of Italian art history, particularly the works of Michelangelo Merisi da Caravaggio. With extensive knowledge of the Baroque
  period and the stylistic and compositional similarities between early Caravaggio works and his famous paintings, they have made a unique discovery of over 1,400 previously unknown works by Caravaggio.
  If the authenticity of the discovered drawings is confirmed by the international community, their value may come to some 700 million Euros, making them a valuable resource for art historians and collectors
  alike.
