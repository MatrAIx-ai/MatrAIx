persona_description: A historian and economist who specializes in the study of economic history and the development of the modern monetary system, particularly the role of the Bretton Woods Conference in
  establishing the International Monetary Fund and the World Bank. He has a deep understanding of the flaws and benefits of the Bretton Woods system and its impact on the global economy, and he is interested
  in exploring alternative economic systems and the role of government in the economy. He is also knowledgeable about the economic policies of postwar Europe and the Marshall Plan, and he is interested
  in the lessons that can be learned from that period for modern economic policy. He is also interested in the role of opportunity costs in economic decision-making and the need for economists to focus
  on the fundamentals of human action, including the division of labor, entrepreneurship, and sound money. He is also interested in the role of government regulation and taxation in the economy and the
  need for a return to the sound economic thinking of the Austrian school.
