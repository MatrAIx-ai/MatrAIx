    at a local animal shelter'', ''DIY crafts (friendship bracelets, upcycled art)'', ''Participating in school Media Club'', ''Beginner Python coding for interactive storytelling'']'
  career_goals: Guided by her passion for art, social impact, and community service, Ashley aspires to pursue a career that merges visual communication with advocacy. She aims to attend a specialized arts
    high school, then study graphic design or art therapy at a university where she can create campaigns that raise awareness about mental health and environmental stewardship. Long‑term, she envisions
    working with non‑profit organizations as a creative director or community arts mentor, using her artistic talents to empower peers and promote positive change.
