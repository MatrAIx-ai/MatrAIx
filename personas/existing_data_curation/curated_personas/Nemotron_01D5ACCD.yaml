  career_goals: Looking ahead, Emil aims to rise to a senior executive role—such as Regional Vice President of Operations—within a prominent Chicago‑based organization, where he can embed innovative, art‑inspired
    practices into corporate culture to boost creativity and efficiency. He also strives to become a mentor and advocate for emerging Black professionals in his community, eventually launching a consultancy
    that advises nonprofits and cultural institutions on strategic growth and creative programming. To complement his hands‑on experience, he plans to complete an executive leadership certificate, positioning
    himself to drive both business success and cultural revitalization in Chicago.
