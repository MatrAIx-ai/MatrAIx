  career_goals: Although retired, Ki Lin remains driven to make a lasting impact on the STEM community. She aims to mentor a new generation of engineers, especially women and East Asian students, through
    outreach programs at local colleges and by serving on advisory boards. She plans to document her professional journey in a memoir that blends personal history with reflections on the evolution of semiconductor
    technology, hoping to inspire future innovators. Determined to ensure her contributions are evidence‑based, she seeks to establish a scholarship fund for underrepresented Pasadena students with clear,
    measurable outcomes, and to continue her lifelong learning by attending advanced seminars on emerging fields such as quantum computing.
