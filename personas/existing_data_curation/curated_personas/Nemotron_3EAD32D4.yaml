personas:
  professional: Ricardo Samaniego, a seasoned project management specialist, leverages a blend of agile and waterfall frameworks, advanced Excel and Tableau analytics, and a Lean Six Sigma Green Belt to
    drive multi‑disciplinary programs, while their sociable nature and bilingual fluency enable seamless stakeholder collaboration across cultural lines.
  sports: Ricardo Samaniego stays active as a midfield player for the Miami Midfielders adult soccer league, hits the sand with the Sunset Spikers beach volleyball club, sails the Intracoastal Waterway
    on weekends, and fervently supports the Miami Heat, Inter Miami CF, and the Dolphins.
  arts: Ricardo Samaniego channels their energetic spirit through salsa dancing to the rhythms of Celia Cruz and Marc Anthony, relaxes watching films starring Benicio Del Toro and Sofia Vergara, and enjoys
    live acoustic sets by local singer‑songwriters at neighborhood cafés.
  travel: Ricardo Samaniego plans trips that blend adventure and family time, favoring weekend sailing excursions to the Florida Keys, annual hikes in the Everglades, and longer vacations to Cartagena’s
    historic waterfront and the mountains of Costa Rica, balancing budget‑conscious decisions with a love for immersive cultural experiences.
  culinary: Ricardo Samaniego, a confident home cook, regularly prepares pupusas stuffed with cheese and refried beans and festive tamales flavored with sazon, while they also experiment with grilled mahi‑mahi,
    cilantro‑lime rice, and fresh plantain slices, showcasing a blend of traditional flavors and modern twists.
  core: Ricardo Samaniego merges a pragmatic project‑management mindset with a passion for salsa, tech gadgets, and community mentorship, often juggling multiple spreadsheets while humming dance steps and
    occasionally forgetting to hydrate during marathon soccer matches.
background:
  cultural: Ricardo’s Salvadoran heritage shapes his values of family, community, and hospitality. He grew up in a bicultural household where Spanish was spoken at home and Catholic traditions marked holidays
    such as Día de la Independencia and Las Posadas. Maintaining strong ties to the Salvadoran diaspora in Broward County, he participates in local cultural associations, supports community events, and
    encourages bilingualism in his children. This background informs his collaborative work style, his emphasis on harmony, and his willingness to give back through volunteerism, blending Salvadoran warmth
    with the pragmatism of his American professional life.
