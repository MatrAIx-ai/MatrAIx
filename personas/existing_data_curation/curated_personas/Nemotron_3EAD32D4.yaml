  career_goals: Ricardo aims to advance to a senior director role overseeing large‑scale, multi‑disciplinary programs in the Southeast region. He plans to obtain PMP and Agile Certified Practitioner credentials
    within the next two years, and to lead high‑impact digital transformation and sustainability projects that blend his technical background with practical execution. He is committed to mentoring emerging
    Latinx project managers, establishing a company‑wide mentorship pipeline, and eventually launching his own consultancy focused on agile transformation for community development initiatives in Central
    America and South Florida.
