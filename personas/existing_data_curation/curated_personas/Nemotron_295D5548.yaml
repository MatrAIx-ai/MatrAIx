  career_goals: Alexander envisions a future where he can blend his love for art and technology, aiming to become a multimedia designer or digital content creator who crafts engaging visual stories. He
    hopes to attend a specialized arts high school or a college program in graphic design, game development, or digital media. Long‑term, he aspires to work freelance on indie video games, animated shorts,
    or social‑media campaigns, while also mentoring younger peers through creative workshops. He is drawn to projects that use visual media to highlight community issues, such as collaborative mural initiatives
    or documentary‑style storytelling.
