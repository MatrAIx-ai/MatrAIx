personas:
  professional: Alexander Mckenny is an aspiring multimedia storyteller who fuses sketching, park photography, improvisational guitar jams, and improv theater to craft immersive narratives for school projects
    and local community events, and they channel a curious, flexible mindset into collaborative creativity.
  sports: Alexander Mckenny plays midfielder for the Lehigh Valley Cougars U‑15 soccer team and point guard for the Bethlehem Bulldogs youth basketball club, cheers on the Philadelphia 76ers and New York
    Knicks, and frequently joins pickup games at the local park, all while sometimes overlooking proper warm‑ups due to their easygoing attitude.
  arts: Alexander Mckenny frequents the Allentown Art Museum’s rotating exhibits, sketches graffiti‑inspired scenes in the park, jams to The Strokes and Tame Impala on guitar, and improvises theatrical
    scenes in drama club, demonstrating a curiosity‑driven, eclectic artistic taste that fuels both personal expression and social connection.
  travel: Alexander Mckenny favors spontaneous weekend bike rides through the Lehigh Valley and occasional family road trips to New York City and Washington D.C., while day‑dreaming about a future backpacking
    adventure to Paris and Barcelona, balancing a love for discovery with the constraints of a teen budget and limited planning.
  culinary: Alexander Mckenny devours pepperoni pizza and sriracha cauliflower tacos after gaming sessions, whips up quick cinnamon oat pancakes on Saturday mornings, and experiments with miso‑flavored
    ramen bowls, reflecting a casual yet increasingly adventurous palate that mirrors their eclectic interests.
  core: Alexander Mckenny is a curious, art‑obsessed teen who darts between sketchbooks, guitar strings, and soccer fields, juggling a laid‑back attitude toward responsibilities with bursts of assertive
    creativity and a habit of misplacing homework.
background:
  cultural: Alexander comes from a middle‑class, European‑American family rooted in the Lehigh Valley. His parents, both professionals in healthcare and education, emphasize community involvement, lifelong
    learning, and appreciation for the arts. Growing up in Bethlehem, he is surrounded by the city’s rich Moravian heritage, the legacy of the former steel industry, and a vibrant contemporary arts scene
    that includes murals, music festivals, and local theaters. He celebrates traditional American holidays, enjoys regional foods like Pennsylvania Dutch pretzels, and participates in neighborhood activities,
    giving him a blend of small‑town community values and exposure to diverse cultural events within the broader Pennsylvania region.
