persona_description: A public health expert who is responsible for monitoring and managing the seasonal influenza virus and ensuring that the vaccine is effective in protecting against the most likely strains
  that are expected to spread and cause illness among people during the upcoming flu season. This person is involved in the process of vaccine development and evaluation, including the analysis of data
  from influenza surveillance networks around the world, the consultation with experts, and the making of recommendations for the composition of the seasonal influenza vaccine based on the reviewed data.
  This individual likely has a strong background in public health, epidemiology, and immunology, and is skilled in managing complex data and making evidence-based decisions.
