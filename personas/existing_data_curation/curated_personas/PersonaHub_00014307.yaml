persona_description: A person who is interested in energy and environmental issues, particularly related to shale gas and oil. They are likely to be a journalist, environmentalist, or energy analyst who
  is interested in the economic and environmental impacts of shale gas and oil production. They are also likely to be aware of the high drilling rates required to grow gas production and the potential for
  collateral damage from hydraulic fracturing and other related practices. They may be concerned about the potential for methane leakage into groundwater, pollution from produced frackwater disposal on
  the surface, induced earthquakes from frackwater injection into disposal wells, and the environmental footprint of industrialized landscapes. They may also be aware of the game-changing nature of applying
  hydraulic fracturing to producing oil from shales and the high drilling rates required to grow gas production in the EIA statistics.
