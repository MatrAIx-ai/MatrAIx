personas:
  professional: Juan Miranda is a budding young architect who loves building elaborate block structures, channeling their exceptional organization and curiosity into early spatial design and problem‑solving.
  sports: Juan Miranda plays in a preschool soccer club, attends weekly swimming lessons, and cheerfully roots for the hometown baseball team the Tigers while wearing a tiny cap during practice, blending
    disciplined training with early team spirit.
  arts: Juan Miranda adores drawing whimsical animals, visits the local children's museum for interactive art installations, and is enchanted by the soothing cello of Yo‑Yo Ma and the animated storytelling
    of Studio Ghibli films.
  travel: Juan Miranda enjoys family trips to the nearby sandy beach where they collect seashells, dreams of seeing the Grand Canyon’s vast canyons, and prefers short, structured itineraries with plenty
    of sandbox time and familiar snacks.
  culinary: Juan Miranda favors macaroni and cheese, chicken nuggets, and fresh strawberries, can barely mash bananas for a snack, and delights in occasional homemade pizza nights where they carefully line
    pepperoni slices in neat rows.
  core: Juan Miranda, a meticulously organized four‑year‑old with boundless curiosity, balances disciplined play with a love for art, tiny finances, and methodical snack routines, all while staying quietly
    resilient.
background:
  cultural: Juan is a Dominican‑American raised in the Bronx and Westchester County, growing up in a bilingual household where Spanish and English intertwine daily. He experiences Dominican cultural traditions
    such as family gatherings featuring dishes like mangú, rhythmic merengue and bachata music, and celebrations of Día de la Hispanidad. The vibrant urban environment of the Bronx exposes him to diverse
    artistic expressions, while Westchester’s parks provide natural spaces for exploration. This blend of Caribbean heritage and New York’s multicultural fabric shapes his worldview, language proficiency,
    and deep appreciation for art.
attributes:
  skills: '[''fine motor dexterity'', ''basic bilingual literacy'', ''colorful drawing'', ''toy organization'', ''simple problem solving'', ''rhythm imitation'', ''basic counting'']'
