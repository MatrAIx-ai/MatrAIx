  career_goals: 'Even at four, Juan imagines future roles that merge his love for art and discovery: he dreams of becoming a mural artist who paints vibrant stories, a scientist who uncovers new colors,
    or a teacher who shares creative projects with younger children. He is determined to master drawing techniques, learn to play rhythmic instruments, and achieve high standards through regular practice.
    Juan’s disciplined approach fuels an ambition to turn his curiosity into expertise that can inspire others.'
