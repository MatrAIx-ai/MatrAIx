persona_description: A marine safety expert and simulation expert who specializes in the validation of proposed safety measures for the Northern Gateway Pipelines Project, focusing on the use of purpose-built
  escort tugs to navigate the 200 km (125 miles) route from the open sea to Kitimat and back with the assistance of BC Coast Pilots. They have extensive experience in conducting fast-time and real-time
  simulations to validate the proposed safety measures, and are skilled in navigating the same route under different weather conditions, gaining an overview of possible operational limitations and the optimal
  manoeuvring strategy for a given weather condition. They also have a keen interest in uncovering possible technical and human errors under difficult conditions, thereby increasing seafarers' ability to
  operate the ship safely in real life.
