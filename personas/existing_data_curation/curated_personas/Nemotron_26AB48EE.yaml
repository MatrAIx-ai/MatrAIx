personas:
  professional: A seasoned veterinary technician with decades of hands-on animal care experience, Amy Mcnaughton leverages her methodical nature and passion for animal welfare to lead clinic operations,
    mentor junior staff, and champion compliance, while they navigate a competitive drive and occasional anxiety.
  sports: An avid bird-watcher and low-impact fitness enthusiast, Amy Mcnaughton walks the Florida Gulf Coast with a senior walking club, roots for the Miami Dolphins, and occasionally joins a community
    pickleball league, while they channel their competitive streak into friendly matches and respect their age-appropriate pace.
  arts: A watercolor hobbyist inspired by unconventional palettes, Amy Mcnaughton frequents the Ringling Museum of Art, attends community art fairs, and draws creative fuel from Georgia O'Keeffe, Henri
    Matisse, and contemporary artist Yayoi Kusama, letting these influences color their experimental paintings.
  travel: A meticulous planner who favors relaxed coastal retreats and art-centric journeys, Amy Mcnaughton has explored historic Savannah, the botanical gardens of Bali, and the Gulf Islands of Canada,
    always booking months ahead to balance travel costs with their fixed retirement income.
  culinary: A self-taught chef who delights in fresh seafood and herb-infused dishes, Amy Mcnaughton loves preparing grilled grouper with lemon-dill sauce, shrimp ceviche with mango, and roasted sweet potatoes,
    while they occasionally binge-eat chocolate truffles during stressful evenings.
  core: A detail-oriented animal lover with a competitive edge, Amy Mcnaughton blends artistry and routine, battling anxiety through yoga, gratitude journaling, and a relentless quest for perfect protocol
    compliance that they pursue daily.
background:
  cultural: Amy comes from a white, Midwestern family with Scottish and Irish ancestry, a heritage she honors through holiday traditions and occasional genealogy research. Moving to Boynton Beach after
    a long career in the Midwest, she has embraced the multicultural, coastal community of Palm Beach County while retaining the work ethic and modesty characteristic of her upbringing. She is active in
    her local senior center’s cultural programs, often sharing stories of her family's past and participating in community art projects. Her cultural identity blends a respect for traditional family values
    with an openness to the diverse artistic and ecological influences of South Florida.
attributes:
  skills: '["Animal handling", "Veterinary sample collection", "Medication administration", "Laboratory equipment operation", "Biosecurity protocol compliance", "Record keeping and data entry", "Inventory
    management", "Client communication", "Basic diagnostic testing", "Animal behavior observation"]'
  hobbies: '["Watercolor painting", "Gallery and museum visits", "Coastal nature walks", "Birdwatching", "Historical fiction reading", "Crossword puzzles", "Trivia night participation", "Bridge club", "Gentle
    yoga", "Volunteering at animal rescue"]'
  career_goals: Amy aims to leverage her decades of experience to move into a senior supervisory role within her clinic or research facility, overseeing animal care staff and streamlining workflows. She
    plans to earn the Certified Veterinary Technician (CVT) credential to formalize her expertise and to mentor younger assistants, sharing her meticulous methods and passion for animal welfare. Over the
    next few years, she hopes to lead a small‑scale research project on stress reduction in laboratory animals, combining her curiosity for new ideas with her methodical nature. As she approaches retirement,
    she also envisions transitioning part‑time to a consultancy role, offering training on compliance and best practices to local shelters and veterinary practices, while maintaining a balanced workload
    to manage her anxiety.
