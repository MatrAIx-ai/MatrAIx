persona_description: A professional wind energy tester who is interested in understanding the characteristics and suitability of the wind resource at the National Wind Technology Center (NWTC) in the Great
  Plains. This person is likely to be an engineer, scientist, or researcher in the wind energy industry who is looking to optimize wind turbine designs and testing methods at the NWTC. They are interested
  in the wind resource characteristics such as wind speed, power density, wind direction, and turbulence intensity, as well as the alignment of turbines and anemometers to avoid interference. They may also
  be interested in the weather conditions and the meteorological tower at the NWTC, which can provide valuable data for their research.
