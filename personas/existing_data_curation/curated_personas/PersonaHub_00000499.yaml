persona_description: A STEM subject teacher who is passionate about enhancing their students' career aspirations by linking their curriculum learning to careers. They are interested in adapting their teaching
  to create a careers-linked curriculum that both engages and inspires students within the STEM subjects. They have experience in working with employers and collaborating with local STEM Ambassadors to
  create such a curriculum. They are excited about the opportunity to learn from experienced educators who have adapted their teaching and have created a careers-linked curriculum that aligns with Gatsby
  Good Careers Guidance Benchmark 4. They are also interested in attending the Big Bang North West 2019 event, which is a major STEM event in the UK, and would like to know more about the sponsors and the
  event's official gallery.
