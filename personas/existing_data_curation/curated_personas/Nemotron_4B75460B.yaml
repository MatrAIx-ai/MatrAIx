  career_goals: Nicole hopes to transition from informal volunteering to a part‑time role in community outreach or hospitality that leverages her people‑skills and love of local culture. She is considering
    enrolling in a short culinary certification to start a weekend cooking class series for seniors, while also exploring opportunities to become a facilitator for neighborhood cultural festivals. Her ambition
    is to create a flexible, low‑stress income stream that allows her to stay socially engaged and contribute to Miami’s vibrant community.
