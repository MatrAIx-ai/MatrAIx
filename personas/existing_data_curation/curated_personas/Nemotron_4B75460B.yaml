personas:
  professional: Nicole Dahdah is a community‑oriented organizer poised to transition into a part‑time outreach role, blending her natural flair for building rapport, event coordination, and basic budgeting
    with a budding culinary certification to spearhead weekend cooking classes for seniors and local festivals.
  sports: Nicole Dahdah channels her love for movement into salsa and bachata dancing at local clubs, weekly beach walks with her golden retriever, avidly follows the Miami Heat and the Miami Marlins, and
    sometimes joins a beginner’s kick‑boxing class for a seasonal challenge.
  arts: Nicole Dahdah immerses herself in the arts through rhythm‑driven salsa lessons, spontaneous photo edits of Miami sunsets featuring pastel hues, devouring mystery novels by Agatha Christie and Gillian
    Flynn, and attending live performances by local Afro‑Cuban percussion band Yaya and jazz singer Norah Jones at neighborhood festivals.
  travel: Nicole Dahdah prefers short, flexible getaways, often whisking off to Key West for a weekend of beach walks and seafood paella, dreaming of a summer trip to Cartagena to explore its historic walls,
    and planning itineraries through Instagram guides while balancing her modest budget and family commitments.
  culinary: Nicole Dahdah delights in experimenting with multicultural dishes such as Peruvian ceviche with fresh lime, Thai pho with star anise, and Spanish paella seasoned with saffron and chorizo, often
    stocking her pantry with chipotle peppers, plantains, and Oaxaca cheese, while her cooking level hovers between confident home chef and enthusiastic amateur.
  core: Nicole Dahdah blends a vibrant social spirit, a relaxed organizational style, and a love for flavor and rhythm, often juggling spontaneous dance nights and community events while occasionally misplacing
    her keys in the midst of her bustling schedule.
background:
  cultural: Nicole grew up in a middle‑class white family that moved to South Florida in the 1970s. Her upbringing combined traditional Midwestern values with the multicultural milieu of Miami, exposing
    her to Cuban, Haitian, and Caribbean influences early on. She celebrates American holidays while also embracing local traditions such as Carnaval Miami and the Calle Ocho festival, and she enjoys Cuban
    coffee and pastelitos. Though her heritage is predominantly European, she identifies as a Miami‑native who feels comfortable navigating both Anglo‑American and Latin‑American cultural spaces.
