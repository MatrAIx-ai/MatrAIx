persona_description: A scientist or researcher who is interested in the origins of life and the evolution of cellular structures. This person is likely to have a background in molecular biology, genetics,
  or biochemistry, and has studied the history of life and the development of cellular structures. They are interested in the different versions of ribosomal RNAs and ribosomal proteins, the differences
  between the three domains of cellular life, and the evidence for the RNA world. They are also likely to have a strong interest in the concept of symbiosis and the idea that early living communities would
  have shared their genetic material more extensively than current microbes.
