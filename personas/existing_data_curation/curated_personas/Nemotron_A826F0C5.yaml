    event hosting","Local craft fairs attendance"]'
  career_goals: Kimberly aims to transition from a teaching assistant to a fully credentialed classroom teacher within the next three years. She plans to complete a Missouri teacher‑licensure program and
    earn a master’s degree in curriculum and instruction, with a focus on inclusive education. Long‑term, she hopes to become a curriculum coordinator or literacy specialist, designing programs that promote
    student well‑being and academic success. She also aspires to lead professional‑development workshops that help other paraprofessionals develop communication and classroom‑management skills.
