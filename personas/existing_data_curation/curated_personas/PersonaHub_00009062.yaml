persona_description: 'Perry G. Miller was an American intellectual historian and professor at Harvard University. He was an authority on American Puritanism and a founder of the field of American Studies.
  Miller''s most famous book, "The New England Mind: The Seventeenth Century," adopted a cultural approach to illuminate the worldview of the Puritans, unlike previous historians who employed psychological
  and economic explanations. Miller was a respected scholar who wrote book reviews and articles in The Nation and American Scholar. He was also instrumental in creating the Psychological Warfare Branch
  of the O.S.S. after serving in the U.S. Army during World War II. Miller''s death was a tragic loss to America''s intellectual landscape, and he received a Pulitzer Prize posthumously for his book "The
  Life of the Mind in America."'
