  hobbies: '[''Desert gardening'', ''Historical reading'', ''Genealogy research'', ''Quilting'', ''Crossword and Sudoku puzzles'', ''Solo hiking and photography'', ''Southwest cooking experiments'', ''Journaling'']'
  career_goals: Though retired, Carlamarie aims to create a lasting family legacy by publishing a handwritten memoir and a comprehensive genealogy booklet for future generations. She plans to volunteer
    as a research aide at the Tucson Historical Society, offering workshops on archival techniques and desert gardening for senior community members. A personal ambition is to win the annual Pima County
    crossword tournament, reflecting her competitive streak. She also intends to complete a senior‑focused online certification in public history, master basic conversational Spanish to better engage with
    local culture, and visit at least three national parks in the Southwest before turning eighty‑one.
