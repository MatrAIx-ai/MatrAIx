  hobbies: '[''Gallery visits'', ''Live music concerts'', ''Salsa dancing'', ''Swing dancing'', ''Weekend hiking'', ''Improv theater'', ''Journaling'', ''Mindfulness meditation'', ''Cooking international
    cuisine'', ''Listening to psychology and art podcasts'']'
  career_goals: She aims to become a senior interview manager within five years, leading a team and designing large‑scale research projects. She plans to earn her GED and pursue coursework in social research
    methods to strengthen analytical skills. Ultimately, she hopes to launch an independent community‑engagement consultancy that blends market research with artistic programming to help local cultural
    organizations better understand their audiences.
