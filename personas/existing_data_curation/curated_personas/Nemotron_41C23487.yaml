personas:
  professional: Eric Geller is a versatile visual artist who blends oil, acrylic, watercolor, and mixed-media sculpture with digital illustration, leveraging his curiosity and community-first values to
    design grant-winning public-art projects, mentor emerging creators, and coordinate collaborative exhibitions in the Appalachian foothills.
  sports: Eric Geller regularly hikes the Blue Ridge Trail with the Oconee County Hiking Club, participates in a Sunday morning adult softball league, follows the Carolina Panthers in football and the Clemson
    Tigers in college football, and enjoys occasional kayaking on Lake Keowee during summer.
  arts: Eric Geller frequents the Greenville County Museum of Art to study Andrew Wyeth's realism, draws inspiration from folk musicians like The Avett Brothers and traditional Appalachian ballads, and
    curates community craft fairs featuring local woodcarvers such as Stacy LeBaron, which together shape his artistic identity.
  travel: Eric Geller prefers modest road trips that combine weekend hikes in the Blue Ridge Mountains with visits to art-rich towns like Asheville and Charleston, while dreaming of a summer retreat in
    the coastal villages of the Amalfi Coast to capture Mediterranean light for his paintings.
  culinary: Eric Geller enjoys cooking low-country shrimp and grits, collard greens seasoned with smoked turkey, and heirloom tomato salads, often incorporating garden-grown okra, sweet corn, and fresh
    herbs, and his intermediate cooking skills allow him to experiment with simmered sauces while still occasionally over-salting his gumbo.
  core: Eric Geller blends a love for Appalachian tradition with a restless curiosity, balancing community-focused art projects with a lingering worry about unfinished work and a habit of over-packing his
    backpack for every hike.
background:
  cultural: Eric was raised in a close‑knit, predominantly white community in the foothills of the Appalachian region of South Carolina. His family’s heritage is a blend of German and Anglo‑American roots,
    and he grew up attending a Southern Baptist church where communal service and humility were emphasized. The rural setting cultivated an appreciation for folk traditions, Appalachian craft, and Southern
    hospitality, all of which inform his artistic sensibility. Exposure to local festivals, story‑telling gatherings, and the natural landscape has shaped his worldview, encouraging a balance between reverence
    for tradition and curiosity for new, unconventional ideas.
