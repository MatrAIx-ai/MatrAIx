  career_goals: Eric hopes to establish a sustainable studio practice that balances personal creative exploration with community impact. Over the next five years he plans to secure a regional public‑art
    commission for a mural in downtown Seneca, open a cooperative gallery‑studio space that offers affordable studio rentals and regular exhibitions for local artists, and earn a fellowship that supports
    interdisciplinary projects merging visual art with environmental storytelling. He also aims to expand his digital portfolio, build a robust online sales channel, and develop a mentorship program that
    pairs experienced artists with youth in Oconee County schools.
