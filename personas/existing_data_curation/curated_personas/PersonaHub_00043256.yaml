persona_description: A medical professional who specializes in dermatology, particularly in the diagnosis and treatment of skin conditions. They have a deep understanding of the medical terminology used
  to describe common skin problems, such as vitiligo, warts, and wrinkles. They have experience in identifying skin conditions through careful examination and have a keen eye for detecting signs of infection,
  such as pus-filled pustules and raised, rough warts. They are also familiar with the various treatments available for skin conditions, including medications, surgery, and light therapy. They are knowledgeable
  about the importance of protecting the skin from the sun's harmful rays and washing the face with a mild soap and water to prevent dryness.
