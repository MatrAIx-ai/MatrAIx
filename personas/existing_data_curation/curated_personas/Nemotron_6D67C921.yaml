personas:
  professional: Humberto Yupanqui is a hands‑on health technologist who expertly calibrates imaging and point‑of‑care equipment, streamlines clinical workflows through meticulous EHR management, and they
    leverage a spontaneous problem‑solving style to train multidisciplinary teams while eyeing CCT certification and a future senior leadership role in telehealth deployment.
  sports: Humberto Yupanqui is a midfield anchor for the Kalamazoo Strikers in a co‑ed adult soccer league, spends early Saturday mornings casting lines at Paw Paw Lake, hikes the rugged trails of Ionia
    State Park on Sundays, and they root for the Detroit Lions, Detroit Tigers, and Michigan Wolverines.
  arts: Humberto Yupanqui regularly helps organize Día de los Muertos street altars, enjoys the guitar work of Carlos Santana and folk singer Lila Downs, watches Alejandro González Iñárritu films, and they
    follow the mural art of Detroit’s Heidelberg Project, blending community tradition with contemporary visual culture.
  travel: Humberto Yupanqui prefers spontaneous, family‑focused road trips that start with a quick spreadsheet of must‑see spots like Mackinac Island, the Sleeping Bear Dunes, and the artsy streets of Marfa,
    Texas, while they balance limited vacation days and a desire for both adventure and relaxed beach time on the Lake Michigan shoreline.
  culinary: Humberto Yupanqui, an avid home cook, perfects tamales filled with seasoned pork shoulder, simmers hearty pozole broth with hominy and dried chiles, and crafts fiery salsas using roasted tomatillos,
    chipotle peppers, and fresh cilantro, and they treat each family gathering as a chance to showcase their moderate‑level culinary skill, occasionally over‑salting in their enthusiasm for bold flavors.
  core: Humberto Yupanqui masterfully juggles a structured health‑tech career with spontaneous culinary adventures, soccer camaraderie, and a quirky habit of building DIY health gadgets, and they navigate
    occasional budget slip‑ups while maintaining a love for family road trips.
background:
  cultural: Humberto grew up in a bilingual Mexican‑American household in Michigan, speaking both Spanish and English at home. His family maintains strong ties to Mexican traditions—celebrating Día de los
    Muertos, Mexican Independence Day, and sharing family recipes passed down through generations. While he identifies with his Mexican heritage, he also embraces Midwestern values of community service
    and self‑reliance. He is active in the local Latinx cultural center, volunteering to mentor high‑school students interested in STEM. His surname Yupanqui hints at indigenous roots, which he honors by
    learning about Andean cultural practices and incorporating that awareness into his personal identity.
attributes:
  skills: '[''Medical equipment maintenance and calibration'', ''Imaging device operation (ultrasound, X‑ray, CT peripherals)'', ''Electronic health record (EHR) management'', ''Clinical data documentation
    and analysis'', ''HIPAA and OSHA compliance'', ''Infection control and patient safety protocols'', ''Technical troubleshooting and rapid problem solving'', ''Staff training and mentorship'', ''Process
    optimization and workflow improvement'']'
  hobbies: '[''Cooking traditional Mexican dishes'', ''Playing soccer in a local league'', ''Fishing on Paw Paw Lake'', ''Hiking in nearby state parks'', ''Electronics tinkering (Arduino projects)'', ''Strategy
    video gaming'', ''Reading health technology news'', ''Participating in Mexican cultural festivals'', ''Spontaneous road trips with family'']'
  career_goals: He aims to earn a Certified Clinical Technologist (CCT) credential and later a bachelor’s degree in health informatics or biomedical engineering. In the next five years he hopes to be promoted
    to senior health technologist or department lead, overseeing a team that implements new telehealth equipment across the Kalamazoo health system. Long‑term, he envisions launching a small consulting
    firm that provides preventive maintenance and compliance auditing for clinics serving underserved Latino communities, while maintaining a balanced lifestyle that allows regular family time.
