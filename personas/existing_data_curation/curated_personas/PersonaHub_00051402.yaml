persona_description: A healthcare provider who works in a psychiatric setting and specializes in the treatment of eating disorders, particularly anorexia nervosa. They are likely to have a deep understanding
  of the severity and risk of the illness, as well as the potential for fatal outcomes. They may be hesitant to initiate involuntary treatment but recognize the importance of addressing the needs of patients
  with anorexia nervosa. They are likely to have a strong interest in legal cases involving the treatment of eating disorders and may be familiar with recent court cases that suggest a court's role in deciding
  whether to commit a patient to involuntary treatment.
