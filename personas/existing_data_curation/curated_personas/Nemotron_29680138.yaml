  career_goals: Suncha aims to earn a Master Pipefitter certification within the next three years, transition into a foreman role where she can lead a crew, and eventually launch her own plumbing and pipefitting
    business that emphasizes reliable service and community hiring. She also hopes to become an instructor at the local vocational college to pass on her expertise, and to spearhead environmentally-friendly
    piping projects, such as solar-thermal and geothermal systems, for Hawaiian households. Additionally, she seeks recognition for maintaining an impeccable safety record and to serve on the union board
    to advocate for workers' rights.
