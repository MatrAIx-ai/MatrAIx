  hobbies: '[''Church choir singing'', ''Potluck cooking and hosting'', ''Community gardening'', ''Knitting and quilting'', ''Senior dance classes (line dancing, Zumba)'', ''Reading African-American literature'',
    ''Book club participation'', ''Attending local history talks'', ''Visiting museums and cultural sites'']'
  career_goals: Danielle aims to deepen her impact within the Compton community by establishing a senior mentorship program that pairs older adults with local high-school students, preserving oral histories
    and cultural traditions. She hopes to launch a monthly cooking workshop series that teaches healthy soul-food recipes, and to organize an intergenerational garden where residents can grow fresh produce.
    Additionally, she plans to complete a short certificate in gerontology to enhance her caregiving and advocacy work for seniors, and she aspires to write a memoir that captures her experiences across
    the civil-rights era and the evolution of her neighborhood.
