personas:
  professional: Angel Blanco, a 26‑year‑old maintenance technician specializing in HVAC, electrical, and plumbing systems, combines a methodical, organized approach with clear communication to devise preventive
    maintenance schedules, train crews, and ensure safety compliance while fostering a cooperative atmosphere for coworkers and building occupants.
  sports: Angel Blanco, an avid beach‑volleyball player with the Sunset Surf Club, spends summer weekends volleying on Pacific Beach while cheering on the San Diego Wave and the San Diego Padres, and balances
    this high‑energy routine with weekly hikes along the Torrey Pines trail to maintain overall fitness.
  arts: Angel Blanco infuses evenings with salsa dancing to the rhythms of Marc Anthony and folkloric steps inspired by traditional dance troupes, regularly attends live mariachi performances by Los Rancheros,
    and enjoys indie‑film screenings at the San Diego Lowrider Film Festival, all of which deepen their sense of community and creative expression.
  travel: Angel Blanco plans trips with meticulous itineraries, favoring weekend road trips along the Pacific Coast Highway to Laguna Beach and short getaways to Ensenada for seafood feasts, while dreaming
    of a month‑long cultural immersion in Oaxaca and a future adventure hiking the Inca Trail to Machu Picchu despite a modest travel budget.
  culinary: Angel Blanco, a confident home cook, routinely crafts authentic tacos al pastor with pineapple‑marinated pork, chipotle adobo, and fresh cilantro, experiments with slow‑cooked pozole featuring
    hominy and pork shoulder, and relishes grilling local fish tacos with mango‑avocado salsa, while occasionally hosting mezcal‑infused tasting nights for friends.
  core: Angel Blanco is the organized, people‑centric fixer who balances a worry‑prone mind with a love for beach volleyball, DIY projects, and midnight salsa sessions, yet secretly hoards stray screws
    and half‑finished renovation ideas on a cluttered workbench.
background:
  cultural: Born and raised in San Diego to Mexican immigrant parents, Angel grew up in a bilingual household where Spanish and English were spoken interchangeably. Her family maintains strong ties to Mexican
    traditions—celebrating Día de los Muertos, quinceañeras, and weekly family meals featuring tacos, pozole, and homemade salsas. The blend of Mexican cultural values, such as familismo, communal support,
    and respect for elders, with Southern California’s outdoor lifestyle has shaped her sociable and cooperative nature. Angel frequently participates in local cultural events, like the San Diego Mexican
    Heritage Festival, and incorporates her heritage into her cooking, music preferences, and community involvement.
attributes:
  skills: '[''HVAC system maintenance and repair'', ''Electrical wiring troubleshooting and repair'', ''Plumbing fixture installation and maintenance'', ''Preventive maintenance scheduling and execution'',
    ''Equipment diagnostics and troubleshooting'', ''Use of hand and power tools'', ''Blueprint and schematic reading'', ''Safety regulations and OSHA compliance'', ''Inventory and parts management'', ''Team
    coordination and communication'', ''Customer service and occupant assistance'', ''Training and mentorship of junior staff'']'
  hobbies: '[''Beach volleyball'', ''Salsa and folkloric dancing'', ''Community clean‑up volunteering'', ''DIY home improvement projects'', ''Balcony gardening (succulents)'', ''Cooking Mexican cuisine'',
    ''Hiking coastal trails'', ''Yoga for stress relief'', ''Attending music festivals and live mariachi shows'']'
  career_goals: Hoping to advance from a general maintenance technician to a senior lead role, Angel aims to earn industry certifications such as the EPA 608 for HVAC, OSHA 30‑hour safety, and a Certified
    Facility Manager (CFM) credential. Over the next five years she plans to take college courses toward a bachelor's degree in Facilities Management, take on supervisory responsibilities, and develop expertise
    in sustainable building systems. Ultimately, she envisions leading a maintenance team for a large commercial property or launching her own small contracting business that emphasizes energy‑efficient
    repairs and community‑focused service.
