  hobbies: '[''Reading contemporary fiction and poetry'', ''Journaling and creative writing'', ''Watercolor painting'', ''Gardening (herbs, vegetables, native plants)'', ''Cooking and recipe experimentation
    (especially Honduran cuisine)'', ''Nature walks and birdwatching'', ''Listening to music (Honduran folk, ambient, reggaeton)'', ''Yoga and guided meditation'']'
  career_goals: She aims to enroll in a community‑college program in mental‑health counseling or social work, eventually becoming a certified peer‑support specialist who can help others in her rural community
    navigate anxiety and depression. In the short term, Angel plans to secure a part‑time administrative role at a local health clinic to gain professional experience while saving for tuition. She also
    hopes to launch a small home‑based catering service offering authentic Honduran meals, providing both income and a cultural outlet.
