personas:
  professional: Angel Perez, a 24‑year‑old aspiring mental‑health counselor, leverages bilingual communication, meticulous organization, and empathetic listening to thrive in a part‑time administrative
    role at a local health clinic while volunteering as a peer‑support listener, balancing practicality with a curiosity about human behavior.
  sports: Angel Perez enjoys low‑impact, nature‑focused activities, regularly strolling along the nearby bayou to observe wildlife, joining a weekend kayaking club on the local river, and casually follows
    the regional minor‑league baseball team, the Baton Rouge Riverbats, while avoiding high‑intensity gym sessions.
  arts: Angel Perez, a dedicated watercolor hobbyist, draws inspiration from contemporary poets like Ocean Vuong and captures tranquil natural scenes, while listening to folk music from her family's homeland
    and ambient composers such as Brian Eno, and occasionally attending local poetry slams featuring spoken‑word artists like Sarah Kay.
  travel: Angel Perez prefers solitary, reflective getaways, having explored the botanical gardens of Oaxaca and planning a future visit to the coastal town of Tulum to study herbal traditions, yet budget
    constraints keep most adventures limited to weekend bayou excursions and occasional train trips to nearby New Orleans.
  culinary: Angel Perez, a passionate home cook, blends authentic family recipes with modern twists, often preparing dishes such as carne asada with chimol, plantain mofongo, and herb‑infused lentil stews,
    while experimenting with home‑grown cilantro, epazote, and heirloom tomatoes grown in her modest garden.
  core: Angel Perez, a solitary yet deeply empathetic 24‑year‑old, channels anxiety into creative outlets like journaling, watercolor painting, and cooking, while juggling a part‑time clinic job, tuition
    savings, and a budding home‑catering dream, guided by a blend of practicality and curiosity.
background:
  cultural: Angel was raised by Honduran immigrant parents who preserved many traditions from their home country while adapting to life in rural Louisiana. She grew up bilingual, celebrating holidays such
    as Semana Santa and Día de la Independencia with family gatherings, traditional foods like baleadas and tamales, and lively music. Catholic rituals and community church events play a central role in
    her family life. The blend of Honduran family values—respect for elders, strong familial bonds, and communal support—with the close‑knit, modest culture of Independence, LA, shapes her identity and
    informs her commitment to helping others while honoring her heritage.
