  hobbies: '[''Volleyball'', ''Book Club Leadership'', ''Theater Mentorship'', ''Hiking and Trail Walking'', ''Yoga'', ''DIY Home Improvement'', ''Digital Photography'', ''Cooking'', ''Traveling'', ''Attending
    Professional Conferences'']'
  career_goals: Susan aims to transition into district‑wide leadership, such as Special Education Coordinator or Director, where she can shape policy and develop innovative inclusion programs. She plans
    to pursue a master’s degree in Educational Leadership, spearhead evidence‑based intervention initiatives, and publish a curriculum guide for integrating arts‑based strategies in special education. Additionally,
    she seeks to become a recognized advocate for student empowerment, leading statewide workshops and influencing legislative standards while maintaining a competitive edge in achieving measurable student
    outcomes.
