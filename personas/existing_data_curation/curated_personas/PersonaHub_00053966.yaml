persona_description: 'A professional diplomat who has a deep understanding of the principles of diplomacy, including the use of modern communication techniques to reach large segments of national populations
  and influence their attitudes and actions. This individual is skilled in the art of propaganda and is well-versed in the use of modern instruments and techniques of communications to reach influential
  segments of the population, inform them, influence their attitudes, and motivate them to support U.S. policies. This persona is aware of the new dimension of foreign policy operations created by the awareness
  of international public opinion becoming a major factor in the conduct of diplomacy, and is skilled in creating "sound bites" that accurately describe the objectives of American foreign policy. This individual
  is likely to be interested in the House Foreign Relations Committee report "Winning the Cold War: The U.S. Ideological Offensive" and the increasing influence of popular opinion over government in foreign
  policy operations.'
