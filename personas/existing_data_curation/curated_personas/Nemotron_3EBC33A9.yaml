personas:
  professional: Mildred Brown is a multidisciplinary artist and aspiring cultural program coordinator, leveraging their Adobe Photoshop, Illustrator, and Premiere Pro expertise, event‑planning savvy, and
    upbeat, collaborative spirit to design immersive installations that spark community dialogue.
  sports: Mildred Brown stays active by dancing to jazz and hip‑hop at community gatherings, joining a weekly beginner’s yoga class at a local studio, cheering on the Houston Rockets and Astros, and participating
    in seasonal 5 k runs organized by the university’s wellness club, and they often swap workout playlists with friends after classes.
  arts: Mildred Brown draws inspiration from the bold graffiti of Banksy, the raw collage techniques of Jean‑Michel Basquiat, the lyrical depth of Maya Angelou’s poetry, and the soulful improvisations of
    Miles Davis, weaving these influences into their own mixed‑media pieces and midnight open‑mic performances.
  travel: Mildred Brown favors spontaneous weekend road trips to vibrant neighborhoods like Austin’s South Congress and New Orleans’ French Quarter for culinary delights, while dreaming of a month‑long
    artist‑in‑residence stay in Lisbon and a museum‑hopping adventure in Paris, and they usually plan each outing around student discounts and festival dates.
  culinary: Mildred Brown enjoys experimenting with bold flavors, from mastering homemade kimchi tacos with gochujang‑marinated pork to perfecting a silky miso‑ramen broth, cooking at an intermediate level
    while frequently seeking out food‑truck creations like smoked brisket sliders and churro‑filled doughnuts at local festivals, and they never miss a chance to pair each dish with a curated playlist.
  core: Mildred Brown is a vibrant, socially‑driven creator who blends artistic experimentation with community empowerment, constantly juggling a bustling schedule, a love for eclectic music, and a habit
    of collecting stray coffee cups for future collages, and they often stay up late sketching new ideas.
background:
  cultural: Mildred is an African‑American woman rooted in Houston’s vibrant Black community, particularly the historic Third Ward. Growing up, she was immersed in the rich traditions of gospel music, jazz,
    and hip‑hop that echo through local festivals and church gatherings. Family celebrations featured Southern soul food and storytelling, fostering her appreciation for communal harmony. She participates
    in Juneteenth commemorations and supports neighborhood art initiatives that celebrate Black heritage, drawing on these cultural influences to inform her artistic voice and community‑oriented aspirations.
attributes:
  skills: '["Digital illustration", "Graphic design (Adobe Photoshop, Illustrator)", "Creative writing (poetry, short fiction)", "Video editing (Adobe Premiere Pro)", "Event planning", "Community facilitation",
