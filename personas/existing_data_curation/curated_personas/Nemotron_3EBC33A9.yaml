  hobbies: '["Visiting art galleries and street murals", "Mixed‑media art and collage", "Poetry writing and open‑mic performances", "Improvisational theater", "Dancing (jazz, hip‑hop) at community events",
    "Photography walks", "Exploring Houston food festivals", "Strategy board games", "Volunteering as youth art workshop facilitator"]'
  career_goals: Mildred aims to channel her love for novelty and abstract concepts into a career as a multidisciplinary artist and cultural program coordinator. She envisions creating immersive art installations
    that engage diverse audiences, eventually curating community‑focused exhibitions at Houston’s cultural centers. In the longer term, she hopes to earn a Master of Fine Arts and lead an arts‑education
    nonprofit that mentors young Black creatives, blending her artistic vision with her commitment to harmony and community empowerment.
