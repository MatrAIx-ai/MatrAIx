persona_description: A scientist or engineer who specializes in the study of materials science, particularly in the field of surface science. They are interested in understanding the wettability of materials
  and how it affects their behavior in various liquids. They are skilled in using the contact angle measurement as a tool to quantify the wettability of materials and understand the underlying mechanisms
  of their behavior. They may also be interested in studying the effects of surface roughness on the contact angle and how it can be corrected for. They may have experience in using different types of liquid
  and surface materials to conduct experiments and collect data, and may have a strong background in mathematical modeling and analysis.
