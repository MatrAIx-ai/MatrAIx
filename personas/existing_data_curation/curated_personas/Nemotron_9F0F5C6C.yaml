  career_goals: Ernestine aims to become the director of youth sports development for a regional nonprofit, expanding access to high‑quality coaching in New London and surrounding towns. She plans to create
    a holistic curriculum that blends physical training with arts‑based learning, reflecting her humanities background. Over the next five years she hopes to earn a Certified Strength and Conditioning Specialist
    credential, publish a guide on mindful coaching, and establish a mentorship network that connects experienced scouts with emerging talent in underserved communities.
