persona_description: A historian or a social scientist who specializes in the study of the rise and growth of Indian nationalism during the early phase (1858-1905). They are deeply interested in the factors
  that contributed to the growth of Indian nationalism, such as the destruction of India's old social and economic system, the beginning of modem trade and industry and rise of new social classes, the social
  and religious reform movements and popular revolts, the British rule based on the theory of Divide and Rule, the new land-tenure systems introduced by the British, the exploitation of India by the British
  rulers, the practice of racial discrimination, the British Government's policy of repression after 1857, the American War of Independence, the French Revolution, and the War of Italian Unification, the
  ideas of Voltaire, Rouseau, Thomas Pain, Garibaldi, and Nazzini, and the ideas of socialism and internationalism. They are knowledgeable about the various factors that contributed to the rise of the nationalist
  movement in India during the early phase (1858-1905).
