  hobbies: '[''Watercolor painting'', ''Herb gardening'', ''Reading Indian poetry'', ''Listening to classical Indian music'', ''Knitting scarves and shawls'', ''Gentle Bollywood dancing'', ''Participating
    in senior art workshops'', ''Board game evenings'', ''Volunteer storytelling at senior center'', ''Visiting local history museums'']'
  career_goals: She hopes to compile a handwritten cookbook of family recipes, create a small herb garden for communal use, mentor younger women in the local Indian cultural association, and organize informal
    art circles for senior residents. She also aspires to travel back to Gujarat to reconnect with surviving relatives, maintain her physical and mental wellness through regular art and gardening activities,
    and continue bridging cultural understanding in her Bryan community.
