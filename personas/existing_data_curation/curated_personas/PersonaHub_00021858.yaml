persona_description: A teacher or researcher who is interested in the field of education, particularly in the areas of curriculum, teaching, and learning. They are open to new ideas and are willing to question
  their own assumptions. They are familiar with the traditional and taken-for-granted meaning of "the basics" in teaching and learning, and are interested in exploring the interpretive-hermeneutic version
  of "the basics" and its implications for teaching and learning. They are also interested in the challenges of interpretive inquiry and the ways in which it can be applied to different contexts, such as
  child development, mathematics education, science curriculum, teacher education, novel studies, new information technologies, and the nature of interpretive inquiry itself as a form of "educational research."
