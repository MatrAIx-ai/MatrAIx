personas:
  professional: Andrew Poole is a seasoned full‑stack software developer who leverages fifteen years of self‑taught expertise in Python, JavaScript, and AWS to build robust cloud services, while balancing
    a pragmatic, test‑driven approach with a curiosity for emerging DevOps tools; they thrive in organized yet flexible workflows, mentor junior teammates, and are poised to step into a lead architect or
    technical manager role that still lets them code hands‑on.
  sports: Andrew Poole is a devoted fan of the New York Islanders hockey team and the Long Island Ducks baseball club, while personally sailing with the Oyster Bay Yacht Club during summer and joining weekend
    hikes organized by the Suffolk County Parks Association; they also play pick‑up basketball at the community center and pinch‑hit for a local rec soccer league, always balancing competitive spirit with
    a laid‑back approach to fitness.
  arts: Andrew Poole's artistic side shines in his twilight photography of Long Island Sound sunsets, inspired by Ansel Adams' use of light, and in his acoustic‑guitar renditions of Bob Dylan and Ed Sheeran
    tunes during intimate gatherings; they devour science‑fiction novels by Isaac Asimov and Neal Stephenson, host monthly board‑game nights featuring Settlers of Catan and Gloomhaven, and occasionally
    dabble in digital art using Raspberry Pi‑controlled LED installations.
  travel: Andrew Poole favors a mix of spontaneous day trips and carefully planned short vacations, such as weekend camping in the Adirondacks, coastal road trips to Cape Cod and Martha's Vineyard, and
    an annual family cruise to the Bahamas; they dream of sailing the fjords of Norway and exploring the historic ruins of Malta, but a demanding work schedule and children's school calendar keep most overseas
    travel on a wish‑list, prompting them to maximize local getaways whenever possible.
  culinary: Andrew Poole enjoys fresh seafood, regularly grilling swordfish and preparing classic New England clam chowder with locally sourced clams, corn, and potatoes; they experiment with homemade sourdough
    bread on rainy Sundays, relish a hearty skillet of pork chops with apple‑cider glaze, and frequently end evenings with a glass of locally brewed pale ale, while their coffee habit borders on a daily
    espresso ritual that occasionally leads to late‑night jittery coding sessions.
  core: A pragmatic tech mentor with a salty‑air soul, Andrew Poole balances code, community, and coastal sunsets, but can’t resist a good espresso and occasionally lets paperwork lag behind their ambitious
    projects.
background:
  cultural: Andrew grew up in a working-class family in Suffolk County, with Irish-English roots that value self-reliance, community involvement, and a strong work ethic. His upbringing in the suburban-coastal
    environment of Long Island has shaped a lifestyle that blends seasonal beach outings, appreciation for local history, and participation in neighborhood events and volunteer activities. While he identifies
    with mainstream American middle-class culture, his personal values reflect a balance of independence, practicality, and a commitment to helping others in his community.
attributes:
  skills: '[''Python'', ''JavaScript (Node.js & React)'', ''C#'', ''SQL'', ''Git'', ''Docker'', ''AWS'', ''Test-Driven Development'', ''Agile Scrum'', ''Mentorship'', ''Technical Writing'']'
  hobbies: '[''Sailing'', ''Fishing'', ''Hiking'', ''Raspberry Pi home automation'', ''Landscape photography'', ''Acoustic guitar'', ''Science-fiction reading'', ''Volunteer tech tutoring'', ''Board game
    nights'']'
  career_goals: Andrew aims to move into a lead architect or technical manager role where he can shape system design while still staying hands-on with code. He plans to earn an AWS Certified Solutions Architect
    credential and to launch a small consultancy that provides custom software and tech-training to local small businesses and nonprofits. At the same time, he wants to preserve a balanced schedule that
    allows him to spend quality time with his family and pursue his hobby projects.
