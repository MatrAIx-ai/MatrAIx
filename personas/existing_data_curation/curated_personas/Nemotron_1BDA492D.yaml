  career_goals: Robert aims to advance into supervisory or management roles within administrative services, targeting positions such as Front Office Manager or Visitor Services Director for a cultural institution
    like a museum or university. Over the next two years, he plans to earn a Certified Administrative Professional (CAP) credential and an Office Management certification. He also intends to leverage his
    passion for the arts by leading community outreach programs that connect the public with Lexington's burgeoning cultural scene. Long‑term, he envisions shaping visitor experiences and implementing efficiency‑driven
    process improvements that enhance overall operations.
