  career_goals: Robin dreams of becoming someone who creates and explores—he often says he wants to be an astronaut exploring space, a scientist discovering new things, or an artist who makes big colorful
    paintings for museums. His competitive spirit also makes him imagine being a professional gamer or a team leader, but his calm, methodical nature steers him toward careers that combine creativity with
    structure, such as an architect or a robotics engineer.
