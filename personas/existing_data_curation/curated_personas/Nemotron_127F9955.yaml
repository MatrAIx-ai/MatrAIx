personas:
  professional: Robin Walker, a budding junior explorer and proto‑engineer, channels a methodical love for building LEGO structures and magnetic tiles into early design thinking, using their curious, organized
    mindset to plan elaborate play scenarios while delighting peers with confident storytelling and a competitive spark.
  sports: Robin Walker, an energetic member of the neighborhood soccer team (Sunset Sprouts) and a weekly swimmer at the community pool, idolizes the local baseball team the City Cubs, and balances a love
    for team play with a competitive drive to win every mini‑tournament.
  arts: Robin Walker, an enthusiastic little artist, fills sketchbooks with bright crayon landscapes inspired by Eric Carle’s vivid collages, sings along to The Wiggles and Disney movie soundtracks, and
    proudly displays a hand‑painted portrait of Dr. Seuss’s Cat in the Hat on the fridge.
  travel: Robin Walker, a curious explorer, loves day trips to the nearby science museum, dreams of visiting Disneyland and the Grand Canyon, and meticulously plans each outing with a colorful map of the
    route, balancing family budget constraints with a desire for adventure.
  culinary: Robin Walker, a budding chef in the kitchen, prefers colorful dishes like macaroni and cheese with peas, enjoys crafting banana‑pancake smiley faces, and is fascinated by the crisp crunch of
    apple slices dipped in peanut butter, often demanding extra ketchup on everything.
  core: Robin Walker, a calm yet fiercely competitive six‑year‑old, blends an organized curiosity for building and art with a knack for leading playtime, a love of bright crayons, and a habit of meticulously
    counting every coin toward the next LEGO set.
background:
  cultural: Robin is raised in a middle‑class white American family in San Jose, California. His household celebrates typical U.S. holidays such as Thanksgiving, Christmas, and Fourth of July while also
    embracing the multicultural spirit of the Bay Area, where he observes Asian and Hispanic festivals and cuisines. His parents emphasize curiosity, education, and community involvement, encouraging visits
    to museums, science centers, and cultural events. He attends a public elementary school that reflects California’s diverse cultural heritage.
