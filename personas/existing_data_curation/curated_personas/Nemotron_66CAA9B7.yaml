  career_goals: Stephanie aims to advance from her current supervisory role to an office manager position within the next two years, and eventually pursue a regional operations manager role at a larger
    organization. She plans to complete her associate degree in business administration through part‑time coursework, gaining formal credentials that will support her promotion goals. Additionally, she
    hopes to lead initiatives that improve workplace efficiency and employee engagement, and she is interested in mentoring newer staff. Long‑term, she envisions playing a key role in fostering job growth
    and community development in Asotin County, possibly by partnering with local businesses on workforce training programs.
