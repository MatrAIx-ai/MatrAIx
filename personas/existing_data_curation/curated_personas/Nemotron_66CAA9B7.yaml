personas:
  professional: Stephanie Mitchell excels as a supervisory office manager in Asotin County, using her love of routine to keep schedules tight, her practical budgeting skills to streamline procurement, and
    her outgoing, cooperative nature to boost team morale, even though they sometimes let a relaxed attitude toward strict deadlines lead to minor disarray.
  sports: Stephanie Mitchell fuels her love of the outdoors by leading a weekly walking group in the Blue Mountains, cheering on the Seattle Seahawks and Seattle Sounders FC, and participating in a local
    yoga club, while they sometimes join a weekend casual softball league with the Asotin County Rattlers for a change of pace.
  arts: Stephanie Mitchell immerses themselves in the arts by acting onstage and handling backstage duties for the town’s community theater, regularly attending productions of Lin-Manuel Miranda's 'In the
    Heights', listening to folk-rock star Brandi Carlile, and curating potluck playlists featuring Adele and Kacey Musgraves.
  travel: Stephanie Mitchell prefers low-key, nature-focused getaways, planning spontaneous weekend hikes to the Columbia River Gorge and day trips to Portland’s food markets, while dreaming of a spring
    tour of the Canadian Rockies and an organized group adventure to New Zealand’s Milford Sound.
  culinary: Stephanie Mitchell enjoys cooking farm-to-table meals, cultivating basil and tomatoes in their garden to craft lemon-rosemary grilled salmon, quinoa-black bean salad, and blueberry crumble,
    and they love hosting potluck dinners where neighbors share signature recipes, often swapping stories over a glass of locally brewed cider.
  core: Stephanie Mitchell blends a love for routine and community with a playful, occasionally disorganized spirit, turning everyday responsibilities into lively, collaborative experiences.
background:
  cultural: Stephanie grew up in a modest, white, middle‑class family in Asotin County, Washington. Her parents worked in agriculture and local government, instilling a strong work ethic and a deep sense
    of community responsibility. She attended the local public schools and later took business courses at a nearby community college before entering the workforce. The Pacific Northwest’s blend of rural
    traditions, outdoor recreation, and close‑knit community values have shaped her practical outlook and love of group activities. She celebrates typical American holidays such as Thanksgiving and the
    Fourth of July, and she regularly participates in regional events like the Asotin County Fair and local farmers’ markets, reflecting the region’s emphasis on family, self‑reliance, and community engagement.
