personas:
  professional: Raul Otero, a 41‑year‑old bilingual utility call‑center specialist, leverages their methodical problem‑solving, expertise in Zendesk and Salesforce, and natural sociability to streamline
    workflows, de‑escalate customer issues, and mentor new agents, all while balancing a curiosity for emerging tech with a pragmatic focus on service metrics.
  sports: Raul Otero, a devoted member of the West Texas Strikers adult soccer league and a weekend hiker of the Guadalupe Mountains, supports the Dallas Cowboys and Texas Rangers, keeps fit through weekly
    team practices and trail treks, and balances competitive spirit with a laid‑back approach to personal wellness.
  arts: Raul Otero, an avid fan of regional Mexican corridos and mariachi ensembles like Mariachi Los Camperos, also enjoys the films of Gael García Bernal and regularly attends community theater productions
    in Midland, letting music and performance art color their social gatherings.
  travel: Raul Otero favors road‑tripping across West Texas—exploring Big Bend, the Santa Fe Trail, and neighboring New Mexico—while dreaming of culinary pilgrimages to Oaxaca and a relaxing beach getaway
    in Costa Rica, always planning trips with a blend of spontaneity and a detailed itinerary.
  culinary: Raul Otero, an adept home cook, perfects dishes such as carnitas tacos, chicken enchiladas with chilies verde, and brisket‑infused Tex‑Mex nachos, skillfully blending traditional Mexican spices
    with local Texas ingredients while experimenting with new sauces on weekends.
  core: Raul Otero, the pragmatic yet curious 41‑year‑old, balances a methodical work ethic and community spirit with a love for soccer, hikes, and bold Tex‑Mex flavors, even if they sometimes forget to
    schedule that overdue dentist appointment.
background:
  cultural: Raul is the son of Mexican immigrants who settled in Midland after working in the oil industry. Raised in a bilingual household, he grew up celebrating Día de los Muertos, Cinco de Mayo, and
    family-centric holidays such as Las Posadas, while also embracing Texas traditions like barbecues and rodeo gatherings. His upbringing emphasized respeto, hard work, and community service, values that
    continue to influence his personal and professional life. He maintains close ties with the local Mexican community, often participating in cultural festivals and supporting neighborhood initiatives
    that promote cultural exchange and mutual support.
