    User 1: Me too! I love the feeling of being on the edge of my seat, not knowing what''s going to happen next.

    User 2: I know what you mean. It''s so exciting!

    User 1: What are some of your favorite action adventure movies?

    User 2: I really like the Mission Impossible movies. They''re so well-made and exciting.

    User 1: Me too! I love Tom Cruise in those movies. He''s such a great action star.

    User 2: He is! I''m also a big fan of the Bourne movies.

    User 1: I''ve never seen those. I''ll have to check them out.

    User 2: You should! They''re really good.

    User 1: I will.

    User 2: What are some of your favorite action adventure novels?

    User 1: I really like the Jack Reacher series by Lee Child.

    User 2: I''ve heard good things about those.

    User 1: They''re really good! Jack Reacher is a badass character.

    User 2: He sounds like it!

    User 1: He is! I''m also a big fan of the James Bond novels by Ian Fleming.

    User 2: Me too! I love those books.

    User 1: They''re so classic.

    User 2: They are!

    User 1: I''m glad we have similar taste in books.

    User 2: Me too! I think it''s always nice to find someone who likes the same things you do.

    User 1: I agree!'
