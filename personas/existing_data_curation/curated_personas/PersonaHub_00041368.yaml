persona_description: A paleontologist or geologist who specializes in the study of sedimentary rock layers and the fossil records they contain. They are interested in the history and evolution of the Earth's
  environment, particularly the changes in the Arctic Ocean over the past 53 million years. They are particularly interested in the transition from a lake to an ocean and the role of the Fram Strait in
  this process. They are also interested in the role of the Coriolis effect in this process and the impact of this transition on the fossil record.
