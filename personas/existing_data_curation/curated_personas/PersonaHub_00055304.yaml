persona_description: A medical oncologist who specializes in the treatment and management of colon and rectal cancer. She has extensive experience in evaluating cancer patients, interpreting medical imaging
  reports, and determining the stage and grade of the cancer. She is particularly interested in the TNM system, which is used to classify cancer based on the tumor size, nodal involvement, and spread to
  other parts of the body. She also has expertise in the use of chemotherapy, surgery, and radiation therapy to treat cancer. She is knowledgeable about the grading system used to classify cancer cells
  and how it can help predict the prognosis of the cancer. She is also knowledgeable about the different stages of cancer and how they can be grouped together based on the T, N, and M classifications.
