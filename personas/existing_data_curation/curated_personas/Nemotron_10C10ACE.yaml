personas:
  professional: Jennifer Park is a high‑school student who channels her methodical, organized mindset into biology‑focused science fair projects, where meticulous data logging, structured experimental design,
    and clear presentation allow they to excel while sharpening their debate‑honed communication skills.
  sports: Jennifer Park combines a love of the outdoors with structured fitness, spending weekends hiking the Columbia River Gorge with the Portland Youth Hiking Club, following the Portland Trail Blazers
    and Timbers for inspiration, and attending weekly school soccer practice, though they prefer low‑impact cardio over competitive sports.
  arts: Jennifer Park expresses artistic appreciation through piano, favoring pieces by Ludwig van Beethoven and contemporary works by Yiruma, while also drawing inspiration from visual artist Yayoi Kusama
    and filmmaker Greta Gerwig, often listening to the La La Land soundtrack while practicing.
  travel: Jennifer Park balances a structured travel style—using a detailed itinerary spreadsheet and packing checklist—with a yearning for natural discovery, having camped in Yellowstone National Park,
    visited the coastal town of Cannon Beach, and dreaming of a spring trip to Kyoto to see cherry blossoms, though they tend to postpone international travel until school exams are out of the way.
  culinary: Jennifer Park enjoys cooking garden‑fresh meals such as quinoa‑seeded zucchini stir‑fry with cherry tomatoes, avocado toast topped with smoked salmon, and occasional homemade vegetable sushi
    rolls, demonstrating a moderate skill level that blends methodical recipe following with occasional improvisation when they run short on herbs.
  core: Jennifer Park is an orderly teen who juggles biology books, piano practice, and debate prep with a habit of over‑scheduling, a love for board‑game strategy, and a tendency to stay up late cramming
    notes before school.
background:
  cultural: Jennifer was raised in Arlington, a small town in Sibley County, Minnesota, within a predominantly white, Midwest community. Her family’s heritage includes German and Norwegian roots, common
    among many residents of the region. This cultural background emphasizes modesty, self‑reliance, community involvement, and a deep appreciation for the changing seasons. Traditions such as family gatherings
    around the dinner table, seasonal festivals, and outdoor activities like fishing, hunting, and snow‑shoeing have shaped her values. The local culture’s focus on hard work, practicality, and respect
    for nature aligns closely with Jennifer’s organized and pragmatic personality.
