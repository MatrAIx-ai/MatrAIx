  career_goals: Jennifer aims to build a career that blends her love of animals, her methodical nature, and her desire to serve her community. In the short term she plans to maintain high grades in science
    and math, take advanced biology courses, and volunteer at the local veterinary clinic and 4‑H club. She hopes to earn a scholarship to study animal science or veterinary medicine at a university such
    as the University of Minnesota. Long‑term, she envisions becoming a veterinarian or veterinary technician who runs a small practice in a rural setting, perhaps establishing an outreach program that
    teaches sustainable livestock care and youth education. Her goal also includes developing strong leadership and project‑management skills to eventually manage a family farm with modern, environmentally‑friendly
    practices.
