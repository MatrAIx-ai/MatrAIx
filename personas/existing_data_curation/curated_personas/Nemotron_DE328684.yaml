  hobbies: '[''Painting'', ''Sketching'', ''Visiting art galleries'', ''Jazz concerts'', ''Vinyl record collecting'', ''Cooking soulful dishes'', ''Herb gardening'', ''Community volunteering'', ''Mentoring
    youth'', ''Yoga'', ''Reading contemporary fiction and poetry'']'
  career_goals: Beatrice aims to open her own barbershop in Hamden that doubles as a cultural hub, showcasing local art and offering free grooming workshops for youth. She plans to complete her college
    coursework in business administration to better manage the shop and eventually expand to a small chain of community-focused salons across New Haven County. Additionally, she hopes to develop a line
    of natural haircare products tailored to textured hair and to become a certified mentor for aspiring barbers through a local apprenticeship program. Her long-term ambition is to foster a supportive
    environment where creativity, cultural pride, and personal grooming intersect.
