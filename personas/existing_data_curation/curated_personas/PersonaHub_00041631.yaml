persona_description: A historian who specializes in the study of American history, particularly the social and cultural history of the United States. His research interests include the development of American
  society, the sources of American ideas and habits, and the course of American history from its beginnings. He has written two volumes of a planned history of American life, "The Beginners of a Nation"
  and "The Transit of Civilization", which have been described as accurate, broad in scope, and characterized by accuracy, breadth of view, and great charm of narration. He has also written about social
  history, particularly the Hoosier stories that he wrote for the Indiana backwoods.
