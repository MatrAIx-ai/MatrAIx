personas:
  professional: Kevin Maquilon, a budding LEGO architect who transforms their love for cartoons into detailed model designs, uses science experiment videos to fuel inventive play, and treats school projects
    as informal labs, often juggling ideas with a relaxed, flexible approach that sometimes leaves deadlines in the dust.
  sports: Kevin Maquilon, a spirited defender for the Riverside Kids Soccer Club's U‑9 team, cheers for the city’s professional side, the Metro United FC, during school breaks, and spends Saturday mornings
    sprinting drills at the local park to boost stamina, yet often leaves their soccer shoes near the creek after practice.
  arts: Kevin Maquilon, a sketch‑enthusiast who fills notebook margins with cartoon heroes inspired by classic comics like Calvin and Hobbes and Marvel legends by Stan Lee, rehearses traditional folk tunes
    on a small ukulele while humming contemporary pop hits from Billie Eilish, and collects limited‑edition figurines that spark their creative storytelling.
  travel: Kevin Maquilon, an adventurous explorer who has camped by the nearby Willow Creek, dreams of visiting the towering red‑rock formations of Sedona, and prefers spontaneous road trips with family
    over meticulously planned itineraries, often packing a sketchbook for impromptu drawing sessions on the go.
  culinary: Kevin Maquilon, an eager junior cook who enjoys helping prep spiced corn dumplings and fresh salsa during holiday feasts, experiments with adding chocolate drizzles to cheese quesadillas for
    extra fun, and balances cooking sessions with LEGO building, sometimes forgetting to wash hands after handling play dough.
  core: Kevin Maquilon, a 9‑year‑old curious tinkerer whose LEGO creations, sketchbooks, and science experiments occupy most of their day, yet they often misplace their crayons, worry about school tests,
    and delight in competitive video‑game showdowns.
background:
  cultural: Kevin comes from a Mexican‑American family in Fresno, where Spanish is spoken at home alongside English. He participates in cultural traditions such as Día de los Muertos and enjoys family gatherings
    centered around Mexican cuisine. Growing up in the Central Valley, he is familiar with the agricultural landscape and often visits local farms with relatives, which deepens his appreciation for nature
    and the community’s work ethic. His bicultural upbringing gives him a strong sense of identity, blending Latino cultural values with the diverse influences of Fresno’s multicultural environment.
attributes:
  skills: '[''Drawing'', ''Storytelling'', ''Bilingual English‑Spanish communication'', ''Basic scientific experimentation'', ''LEGO construction'', ''Problem solving'', ''Creative brainstorming'']'
  hobbies: '[''Sketching and drawing'', ''LEGO building'', ''Playing soccer'', ''Watching and doing science experiments'', ''Listening to music (Mariachi and pop)'', ''Reading comic books'', ''Exploring
    the local creek'', ''Competitive video gaming'']'
  career_goals: 'Kevin dreams of turning his love for art and imagination into a future career: he wants to become a comic‑book illustrator or a video‑game designer who creates worlds where players can
    explore new ideas. He also imagines himself as a wildlife photographer who captures the beauty of California’s farms and natural habitats. His competitive nature fuels a desire to be recognized in school
    art contests, while his flexible mindset means he’s open to any path that lets him keep learning and creating.'
