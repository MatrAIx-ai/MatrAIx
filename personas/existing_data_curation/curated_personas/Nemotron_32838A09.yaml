  hobbies: '[''Playing with building blocks'', ''Exploring textured books'', ''Dancing to Mexican folk music'', ''Group play sessions at community center'', ''Outdoor nature exploration in backyard'']'
  career_goals: Alexis’s immediate ambitions revolve around mastering physical milestones and expanding her communication abilities. In the near future, she aims to walk confidently, say her first name,
    and engage more actively in group play. Her parents nurture aspirations for her to become a lifelong learner, hoping she will eventually pursue a career that combines her love for helping others—such
    as teaching or healthcare—while staying grounded in practical, community-focused work.
