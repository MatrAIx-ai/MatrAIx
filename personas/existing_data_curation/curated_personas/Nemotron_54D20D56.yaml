    ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Approaching retirement, Alexis aims to transition from day‑to‑day site oversight to a mentorship and advisory role, establishing a consultancy that guides smaller contractors on integrating
    sustainable methods and artistic design elements. She hopes to lead a flagship community revitalization project in Allegheny County—such as a cultural center that showcases local art within a modern,
    environmentally‑friendly structure. Additionally, she aspires to serve on a regional construction board to influence policy toward safer, greener building standards and to create a short‑term training
    program that encourages women and underrepresented groups to pursue construction careers.
