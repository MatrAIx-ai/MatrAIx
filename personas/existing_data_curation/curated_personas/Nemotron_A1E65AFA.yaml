  hobbies: '[''Abstract watercolor painting'', ''Reading experimental literature'', ''Poetry writing'', ''Jigsaw puzzles'', ''Cooking traditional Mexican cuisine'', ''Gardening'', ''Listening to jazz and
    Mexican folk music'', ''Senior book club participation'', ''Attending local cultural festivals'']'
  career_goals: Although retired, Leyla aims to complete a memoir that intertwines her personal narrative with Mexican cultural heritage, and to organize a small exhibition of her abstract paintings at
    the Ellinwood community center. She also hopes to mentor her grandchildren in creative writing and to learn basic digital photography to document family stories for future generations.
