  career_goals: At 55, Sandra aims to transition into a senior leadership role—such as Audit Manager or Director of Finance—where she can shape strategic financial decisions for a regional nonprofit or
    municipal agency. She plans to finalize her CPA certification, mentor emerging accountants, and champion the integration of data‑driven tools to modernize audit practices. Simultaneously, Sandra seeks
    a position that allows her to allocate time for community arts initiatives, reflecting her desire to blend her financial expertise with her passion for supporting cultural programs while maintaining
    a healthier work‑life balance.
