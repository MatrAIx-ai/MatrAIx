personas:
  professional: Una Dusetzina, an aspiring community arts coordinator and budding graphic designer, blends meticulous project planning with a flair for digital illustration, using Adobe Photoshop and Canva
    to craft engaging flyers and exhibit concepts while championing collaborative, low‑key workshops at the local community center, and they always ensure every detail aligns with the community’s values.
  sports: Una Dusetzina enjoys low‑impact fitness, joining a weekend river‑side yoga class, taking evening walks along the Little Miami River, and cheering on the Ohio State Buckeyes football team and the
    Cleveland Cavaliers during the season, though they rarely join organized sports beyond casual pick‑up volleyball games.
  arts: Una Dusetzina immerses themselves in the arts by sketching in local galleries, drawing inspiration from Frida Kahlo’s vivid self‑portraits, attending indie film screenings of directors like Greta
    Gerwig, and vibing to Sufjan Stevens and The National at cozy coffee house concerts, while also curating a community newsletter featuring the work of emerging local muralists.
  travel: Una Dusetzina dreams of expanding their creative horizons by touring the bustling art districts of New York City, the architectural marvels of Chicago’s Museum Campus, and the historic streets
    of Dublin and Florence, yet they often start their wanderlust with weekend road trips to the nearby Amish country and the Ohio River Valley’s state parks.
  culinary: Una Dusetzina favors simple yet wholesome meals, cooking spaghetti carbonara with pancetta, sprinkling fresh basil and Parmesan over a homemade Margherita pizza, and indulging in seasonal apple
    crisp made with locally sourced honey, while their modest cooking skills keep them mostly reliant on farm‑to‑table cafés for lunch.
  core: Una Dusetzina is a diligent, art‑obsessed planner who balances methodical budgeting and yoga‑driven wellness with a stubborn habit of procrastinating their GED paperwork until the last minute.
background:
  cultural: Una was raised in Loveland, Ohio, a small Midwestern town with a close‑knit community that values modesty, hard work, and cooperation. Her family’s European ancestry—primarily German and Irish—has
    shaped traditions such as holiday gatherings and an appreciation for folk music. Growing up in a predominantly white, middle‑class neighborhood, she experienced a blend of traditional American values
    and local cultural events like county fairs, farmer’s markets, and community theater productions. These influences have fostered her sense of civic responsibility, respect for diverse artistic expressions,
    and a grounded yet curious worldview.
attributes:
  skills: '[''Digital Illustration (Adobe Photoshop, Canva)'', ''Graphic Design for Print and Web'', ''Event Planning and Coordination'', ''Volunteer Management'', ''Research and Fact‑Finding'', ''Effective
