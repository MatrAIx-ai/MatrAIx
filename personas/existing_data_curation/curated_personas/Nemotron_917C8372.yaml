  hobbies: '[''Sketching and Digital Painting'', ''Visiting Art Galleries and Museums'', ''Reading Art History and Contemporary Fiction'', ''Volunteering for Community Events'', ''Yoga and River Walks'',
    ''Indie Film Watching'', ''Listening to Live Music at Local Cafés'']'
  career_goals: Una plans to obtain her GED this year and enroll in a community college program focused on graphic design and visual arts. She aspires to combine her love of art with her organizational
    strengths by working as a community arts coordinator or museum educator, designing engaging exhibitions and outreach programs. In the longer term, she hopes to earn a bachelor's degree in Visual Communication,
    gain professional certification in UX design, and eventually lead a nonprofit organization that promotes arts education for underserved youth. She also dreams of traveling to major cultural hubs such
    as New York, Chicago, and European cities to broaden her creative perspective.
