personas:
  professional: Judith Decker, a two-year-old with a surprisingly organized mind, acts as a mini‑entrepreneur in the playroom, meticulously arranging blocks like a project manager and negotiating snack
    trades, and they channel their imaginative curiosity into imaginative business meetings with stuffed‑animal clients.
  sports: Judith Decker, a two-year-old, participates in the Little Sprouts Gymnastics Club, loves tumbling on the playground, proudly wears a t‑shirt featuring the New York Yankees, and they cheer loudly
    for the local toddlers’ soccer mini‑league after each practice.
  arts: Judith Decker, a two-year-old, delights in drawing whimsical creatures inspired by Pablo Picasso’s simple shapes, loves listening to Beethoven’s Für Elise as a bedtime lullaby, and they are enchanted
    by the animated adventures of Pixar’s Toy Story, often reenacting scenes with plush toys.
  travel: Judith Decker, a two-year-old, has enjoyed a family day at the city aquarium and a sunny beach picnic, and they dream of a future trip to the magical castles of Disneyland Paris and the towering
    Eiffel Tower, envisioning endless wonder.
  culinary: Judith Decker, a two-year-old, prefers creamy macaroni‑and‑cheese, bites into soft banana slices with peanut butter, and they proudly help stir honey into warm oatmeal, showing a budding enthusiasm
    for simple, sweet flavors and basic kitchen tasks.
  core: Judith Decker, a two-year-old, blends fierce imagination with meticulous organization, turning everyday play into entrepreneurial ventures while navigating the ups and downs of toddler worries.
background:
  cultural: Judith is raised in a white, middle‑class family in Wolfforth, Texas, a small town in Lubbock County. Her upbringing blends traditional small‑town Texan culture—church gatherings, community
    fairs, Fourth of July fireworks, and a love for country and folk music—with modern suburban life that encourages creativity through preschool programs and the local library. Family traditions include
    celebrating Thanksgiving with a turkey dinner, enjoying Texas‑style barbecue, and emphasizing hospitality and neighborliness. These cultural influences foster Judith’s sociable spirit, appreciation
    for organized community events, and support for her imaginative pursuits.
