  career_goals: Even at two, Judith often expresses vivid future ambitions that echo her disciplined, creative, and sociable nature. She dreams of becoming a storyteller who writes picture books, an artist
    who paints bold murals, or a teacher who leads a joyful, well‑structured classroom. She imagines organizing community art workshops in Wolfforth where children gather to create and explore. Her high
    standards drive her to aspire to roles where she can inspire others, blend imagination with organization, and make a positive impact on her hometown.
