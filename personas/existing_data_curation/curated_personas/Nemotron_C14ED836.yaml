  career_goals: His primary ambition is to guide his company toward sustained, profitable growth while cementing its reputation for operational excellence and ethical stewardship. Over the next five years,
    he aims to implement a robust succession plan that prepares his senior leadership team and his own children for future ownership, expand the firm’s market share in the Mid‑Atlantic region, integrate
    sustainability practices into the core business model, and secure a seat on the board of a regional industry association to influence policy and best practices.
