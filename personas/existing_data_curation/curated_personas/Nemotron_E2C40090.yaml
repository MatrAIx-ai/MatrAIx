personas:
  professional: Long Chan is a veteran construction cost estimator who expertly merges traditional take‑off calculations with BIM‑based analytics, leveraging their meticulous material‑pricing research and
    pragmatic curiosity while managing the stress of tight deadlines through a flexible, sometimes disorganized workflow.
  sports: Long Chan supports the Kansas City Chiefs and Kansas City Royals, is a member of the Lake Phillips fishing club that meets each Saturday at sunrise, and they maintain a personal habit of solo
    early‑morning jogs along the Cedar Creek trail, preferring solitary physical activity over team sports.
  arts: Long Chan immerses themselves in historical nonfiction by authors such as David McCullough and Japanese literature by Haruki Murakami, participates in a small book club discussing resilience and
    tradition, and they appreciate minimalist Zen calligraphy while attending the Olathe Lunar New Year celebration each year.
  travel: Long Chan favors contemplative travel, meticulously planning visits to historic Kyoto temples and scenic drives through Colorado’s Rocky Mountains, yet they keep a flexible spare week for spontaneous
    fishing trips to Lake Tahoe or weekend retreats at nearby Lake Wakarusa.
  culinary: Long Chan delights in cooking authentic Japanese dishes—searing miso‑marinated black cod, crafting hand‑rolled sushi with shoyu dipping sauce, and perfecting a humble miso soup—while they use
    hand‑carved bamboo serving boards from their woodworking hobby to enhance each meal.
  core: Long Chan is a methodical yet relaxed craftsman of numbers and wood, whose solitary Zen practice tempers a competitive streak and occasional worry about the future, and they often find solace in
    quiet solitary activities.
background:
  cultural: Long is a second‑generation Japanese‑American whose parents immigrated to the United States in the early 1970s. Growing up in the Kansas City metro area, he absorbed both the disciplined, community‑oriented
    values of his heritage and the pragmatic, independent spirit of the Midwest. He maintains a connection to his cultural roots through regular visits to a local Buddhist temple, participation in annual
    celebrations such as Obon and Lunar New Year, and by preserving traditional cooking practices at home. At the same time, he embraces the local Midwestern culture, attending county fairs and supporting
    community volunteer initiatives, balancing a dual identity that informs his worldview and work ethic.
attributes:
  skills: '[''Cost estimation for commercial construction'', ''Quantity take‑off'', ''BIM integration for estimating'', ''Advanced Excel modeling'', ''Cost estimating software (e.g., ProEst, WinEst)'',
