  hobbies: '[''Woodworking'', ''Reading historical nonfiction and Japanese literature'', ''Small book club discussions'', ''Zen meditation'', ''Fishing trips'', ''Cooking Japanese cuisine'', ''Participating
    in local cultural events'']'
  career_goals: Long is aiming to transition from a hands‑on estimator to a strategic cost‑management leader within the next five years. He plans to earn the AACE Certified Cost Professional (CCP) designation,
    develop a niche in green building cost estimation, and mentor junior estimators at his firm. Ultimately, he hopes to launch a boutique consultancy that offers high‑level cost‑planning services to mid‑size
    developers in the Midwest, leveraging his blend of practical experience and interest in innovative tools while maintaining a work style that accommodates his preference for flexibility and reduced stress.
