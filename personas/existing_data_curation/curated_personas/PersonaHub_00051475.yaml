persona_description: A musicologist and researcher who specializes in the study of human vocal synchrony and its impact on the human heart rate. They have conducted research on the synchronized heart rates
  of choir singers and have found that the synchronized voices of a choir can cause the heart rates of its members to slow down. They have also discovered that the synchronized heartbeat of choir singers
  is a form of guided breathing that helps them to exhale on the phrases and breathe in between the phrases. They are known for their research on the internal counterpart of the synchronized heartbeat of
  choir singers and the impact of this on the human body.
