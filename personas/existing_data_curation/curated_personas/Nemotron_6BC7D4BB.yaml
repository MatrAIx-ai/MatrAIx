  career_goals: Todd dreams of becoming a creator who merges art and technology, envisioning a future as a video‑game designer or a children’s book author‑illustrator who brings his imaginative worlds to
    life. In the short term, he aims to win his regional science fair with an interactive art project that uses simple electronics, and he hopes to lead his school’s debate team to a state competition.
    His competitive spirit also fuels a long‑term goal of earning a national chess title, while his sociable nature pushes him to share his creations through videos or school workshops, inspiring peers
    to explore creativity and curiosity.
