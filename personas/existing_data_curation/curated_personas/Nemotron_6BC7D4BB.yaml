personas:
  professional: Todd Anderson is a budding junior inventor and storyteller who merges his love of fantasy novels with hands‑on robotics and comic sketching, building narrative‑driven LEGO Mindstorms creations
    that they proudly present at school fairs, showcasing their imaginative, competitive, and sociable spirit.
  sports: Todd Anderson is a forward on the local Under‑9 soccer team that idolizes FC Barcelona’s youth academy, spends Saturday evenings sprinting through the park’s mini‑league, and balances their competitive
    drive with a habit of collecting unique pebbles from the field’s sidelines as trophies.
  arts: Todd Anderson devotes afternoons to drawing comic strips inspired by J.R.R. Tolkien’s Middle‑earth and the cinematic flair of Hayao Miyazaki, while riffing on the storytelling beats of Marvel’s
    Stan Lee and layering LEGO dioramas with the epic soundtrack of Star Wars, a creative ritual that reflects their imaginative and sociable nature.
  travel: Todd Anderson dreams of an epic family road trip to the Grand Canyon’s rim and a weekend pilgrimage to the Kennedy Space Center, yet they also cherish routine weekend nature walks in the nearby
    state park where they collect rocks as souvenirs for a future personal museum exhibit.
  culinary: Todd Anderson loves crafting kitchen‑science snacks like volcano‑style soda‑vinegar eruptions and rock‑candy lollies made from sugar, while their favorite meals include pepperoni pizza, cheesy
    quesadillas, and carrot sticks dipped in hummus, a menu they proudly serve to their LEGO minifigures during imaginative dinner parties.
  core: Todd Anderson is a talkative, competition‑driven nine‑year‑old whose imagination turns everyday chores into epic quests, yet they sometimes trade a night’s sleep for a new LEGO set.
background:
  cultural: Todd comes from a middle‑class, white family living in Yorkville, Illinois, a suburban community in Kendall County known for its close‑knit neighborhoods and Midwestern values of politeness,
    hard work, and community involvement. He attends a public elementary school that emphasizes both academic achievement and extracurricular exploration, giving him access to art, technology, and sports
    programs. His family supports his curiosity and often takes him to local events like the Kendall County Fair, community library reading programs, and nearby nature parks, reinforcing a blend of traditional
    Midwestern community spirit and modern, media‑driven interests.
