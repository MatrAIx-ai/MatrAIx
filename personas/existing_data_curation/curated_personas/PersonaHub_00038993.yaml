persona_description: A scientist who specializes in the study of astronomy, specifically the discovery and classification of galaxies, starburst galaxies, and their formation in the early Universe. Their
  research interests include the use of large telescopes like the Atacama Large Millimeter/submillimeter Array (ALMA) and the ESO-operated 12-meter Atacama Pathfinder Experiment (APEX) telescope to study
  distant starburst galaxies, their intensity of star formation, and their impact on the early Universe's star formation history. They are also interested in the gravitational lensing technique used to
  measure the intensity of star formation in these galaxies.
