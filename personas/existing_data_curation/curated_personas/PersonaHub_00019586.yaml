persona_description: A human rights advocate who is passionate about advocating for the prohibition of all violent punishment of children, particularly corporal punishment. They are committed to monitoring
  and advocating for the implementation of the Universal Periodic Review (UPR) process and have experience in providing technical assistance and advice to NGOs, human rights institutions, UN agencies, and
  others on law reform efforts. They have a keen interest in the Global Initiative's follow-up programmes and are eager to see positive responses from states which have not yet prohibited all corporal punishment
  of children.
