  hobbies: '["LEGO robotics building", "Soccer", "Strategy video games (Minecraft, StarCraft)", "Scratch programming", "Science club experiments", "Listening to Salvadoran folk music", "Cooking family dishes
    (pupusas)", "Collecting baseball cards"]'
  career_goals: Jose aspires to become a robotics engineer or civil engineer, aiming to design innovative machines and structures that improve daily life. He plans to excel in math and science throughout
    high school, participate in STEM competitions, and eventually attend a university with a strong engineering program. He also hopes to leverage his bilingual abilities to mentor younger students in his
    community, bridging language gaps in technology education.
