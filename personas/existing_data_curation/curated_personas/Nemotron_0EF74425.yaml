personas:
  professional: Jose Velazquez, an aspiring robotics engineer in the making, channels their curiosity and methodical nature into designing LEGO Mindstorms robots with programmable sensors, while leading
    their school’s science club projects and applying their competitive edge to solve engineering challenges.
  sports: Jose Velazquez, a forward on the Westside Strikers youth soccer team, trains twice weekly, follows the LA Galaxy for tactical inspiration, and channels their competitive spirit into leading drills
    while maintaining a calm demeanor on the field.
  arts: Jose Velazquez, a devoted fan of the folk band Los Hermanos Flores, spends evenings humming traditional melodies while building LEGO sets, and collects baseball cards as visual art, showing how
    music and visual collectibles shape their creative identity.
  travel: Jose Velazquez, who has already visited the family‑friendly Cascades National Park and a cultural festival in San Salvador, prefers short road trips with friends, dreams of exploring the Grand
    Canyon, and balances travel plans with school commitments and a modest family budget.
  culinary: Jose Velazquez, eager to assist in the kitchen, loves preparing pupusas with cheese, loroco, and chicharrón fillings, often perfecting the dough’s texture, and enjoys trying new sauces like
    salsa roja, while occasionally sneaking an extra serving of mango juice.
  core: Jose Velazquez blends meticulous LEGO engineering with a competitive soccer drive, remains remarkably calm under pressure, and habitually hums folk tunes while budgeting their allowance.
background:
  cultural: Jose is a first‑generation Salvadoran‑American growing up in Springfield Gardens, Queens. His household is bilingual, speaking Spanish at home and English at school, and his family maintains
    strong ties to Salvadoran customs, celebrating holidays such as Día de los Faroles and preparing traditional foods like pupusas and yuca frita. Living in a diverse Queens neighborhood, he is exposed
    to a mosaic of cultures, which fosters his sociable and outgoing nature while reinforcing the Salvadoran values of family cohesion, resilience, and community involvement.
attributes:
  skills: '["Scratch programming", "LEGO robotics building", "Bilingual Spanish–English communication", "Project planning and organization", "Team leadership in group activities", "Strategic board game
