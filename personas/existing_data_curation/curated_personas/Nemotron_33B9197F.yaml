personas:
  professional: Eliecer Ibargollin is a postal service technician at a high‑speed mail‑sorting facility, leveraging expertise in machine maintenance, USPS routing rules, and bilingual team communication,
    while their penchant for structure and reliability drives efficient shift supervision and process improvements.
  sports: Eliecer Ibargollin plays pickup basketball with the Broward Community Center Hoops Club, follows the Miami Heat and the Tampa Bay Rays, and spends weekend runs along the Hollywood Beach Boardwalk
    to stay fit.
  arts: Eliecer Ibargollin immerses themselves in Latin music, regularly dancing to Romeo Santos, Bad Bunny, and Marc Anthony at local salsa nights, and they unwind by streaming classic films of Pedro Almodóvar
    and attending community theater productions of contemporary plays.
  travel: Eliecer Ibargollin enjoys weekend road trips to the Everglades and the Florida Keys, has a bucket‑list entry for a cultural tour of Cartagena, Colombia, and plans their itineraries around affordable
    Airbnb stays and group travel discounts with friends.
  culinary: Eliecer Ibargollin loves cooking hearty dishes like mofongo with garlicky pork, sancocho brimming with root vegetables, and revives family recipes using plantains, yuca, and sofrito, while they
    also enjoy sampling street‑taco stalls for fresh cilantro and lime.
  core: Eliecer Ibargollin balances a rigid love for order—evident in their meticulous shift checklists—with a spontaneous flair for salsa nights, all while habitually hitting the snooze button twice before
    tackling the day.
background:
  cultural: Eliecer is a second‑generation Dominican American raised in Hollywood, FL. Growing up in a bilingual household, he speaks both Spanish and English fluently and embraces the close‑knit family
    values typical of Dominican culture. He participates in local Dominican community gatherings, celebrates holidays like Día de la Independencia and Carnaval, and maintains ties with relatives in the
    Dominican Republic through regular visits and virtual communication. His heritage influences his love for music, dance, and cuisine, while his Florida upbringing integrates broader American customs
    and a multicultural social circle.
