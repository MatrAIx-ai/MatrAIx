  career_goals: Eliecer aims to advance within the postal service by first becoming a shift supervisor and then a department manager, overseeing mail‑processing operations and staff training. He plans to
    complete a bachelor's degree in supply‑chain management and earn professional certifications in logistics. Long‑term, he envisions a leadership role in a larger logistics firm or launching his own small‑scale
    freight‑handling business, leveraging his hands‑on experience and formal education.
