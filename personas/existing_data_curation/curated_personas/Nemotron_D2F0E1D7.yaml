  hobbies: '[''Gardening'', ''Reading mystery and historical fiction'', ''Yoga and mindfulness meditation'', ''Volunteering at senior center (organizing potlucks, sewing circles)'', ''Hiking local trails'',
    ''Knitting quilts'']'
  career_goals: Jessica aims to move into a supervisory role within the utility company, such as Meter Reading Team Lead or Operations Supervisor, where she can mentor new hires and help streamline processes.
    She plans to complete a bachelor’s degree in Business Administration or Energy Management to qualify for higher‑level positions. Gaining certification in energy data analysis or meter technology is
    also a priority, as she hopes to transition to a less physically demanding, more analytical role that offers a more predictable schedule and reduced stress. Ultimately, she seeks a stable career path
    that balances her need for structure with the flexibility she values in her personal life.
