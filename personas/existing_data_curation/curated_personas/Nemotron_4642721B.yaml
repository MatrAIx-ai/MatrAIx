personas:
  professional: Edgar Yeldell, a 52‑year‑old hands‑on technician with a business‑admin background, is gearing up to launch a neighborhood‑focused home‑services firm that offers appliance repair, vehicle
    maintenance, and soon, HVAC installations; they blend their DIY troubleshooting knack with meticulous budgeting, leveraging Google Workspace and a simple CRM to schedule jobs, while their competitive
    streak drives them to out‑perform local rivals and earn a reputation as the go‑to handyman in Lakewood.
  sports: Edgar Yeldell, a stalwart member of the Lakewood Community Basketball League and a regular in weekend pick‑up soccer games at the local park, roots for the Los Angeles Lakers and follows the LA
    Galaxy; they keep fit by blending competitive scrimmages with everyday stretching, but admit to a guilty pleasure of binge‑watching classic NBA reruns on lazy Sunday afternoons.
  arts: Edgar Yeldell, an avid concert‑goer, fills evenings with soul and funk legends like James Brown, Earth, Wind & Fire, and contemporary artists such as Leon Bridges, while also curating trivia nights
    that celebrate the rich history of Black music; they often quote gospel hymn lyrics during community events, reflecting a deep love for storytelling through rhythm and rhyme.
  travel: Edgar Yeldell, a weekend explorer, prefers road trips that balance spontaneity with spreadsheet‑planned stops, having driven the Pacific Coast Highway to Big Sur, spent a long weekend soaking
    up jazz in New Orleans' French Quarter, and dreaming of a pilgrimage to the National Museum of African American History and Culture in Washington, D.C.; budget constraints keep the family car as their
    primary travel companion, though they occasionally splurge on a boutique B&B in Santa Barbara.
  culinary: Edgar Yeldell, a self‑taught chef, specializes in Southern comfort dishes like smoked chicken with buttermilk brine, collard greens seasoned with smoked paprika, and shrimp étouffée simmered
    with okra; they experiment with sous‑vide techniques for tender brisket, yet their desk drawer habitually houses a half‑eaten box of Hot‑Pockets for late‑night project bursts.
  core: Edgar Yeldell, a 52‑year‑old handyman‑entrepreneur with a soul‑music soundtrack, balances fierce competitiveness with community‑driven generosity, occasionally slipping into procrastination over
    bills while dreaming of expanding his tech‑savvy service empire.
background:
  cultural: Edgar’s cultural background is rooted in African‑American traditions of Southern heritage and the vibrant Black communities of Los Angeles County. Growing up, his family gatherings featured
    storytelling, gospel music, and soul food, fostering a strong sense of community and cultural pride. Living in Lakewood, he remains connected to a multi‑generational Black enclave that values mutual
    support, resilience, and the celebration of Black art and history. He actively participates in local African‑American cultural festivals, supports Black‑owned businesses, and stays engaged with issues
    affecting his community. His experiences as a Black man have cultivated a critical eye toward systemic challenges, a competitive drive to succeed, and a commitment to uplift others through mentorship
    and community service.
