  career_goals: Edgar’s immediate goal is to re‑enter the workforce by launching a small home‑services business that offers appliance and vehicle maintenance to residents of Lakewood and neighboring communities.
    To formalize his technical knowledge, he is pursuing an HVAC certification and plans to secure a modest loan to purchase the necessary tools and a service vehicle. Parallel to his entrepreneurial ambitions,
    Edgar seeks to become a mentor for at‑risk youth through a local nonprofit, teaching practical trades, project management, and financial literacy. Long‑term, he aims for financial independence, property
    ownership, and recognition as a reliable, go‑to resource within his neighborhood, while continuing to nurture his curiosity for new technologies and methods.
