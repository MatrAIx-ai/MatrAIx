  career_goals: Jeffrey aims to complete a bachelor's degree in environmental studies or sustainable business within the next three years, leveraging his practical mindset and curiosity about how natural
    systems intersect with human activity. He envisions starting a career in environmental consulting or outdoor recreation management, where he can apply his analytical skills, project organization, and
    passion for the outdoors. In the longer term, he hopes to lead community-based sustainability projects that balance ecological stewardship with economic viability.
