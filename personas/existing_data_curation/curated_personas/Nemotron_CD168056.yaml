  career_goals: Melissa aims to advance to a senior leadership role such as Director of Operations within the next five years, overseeing multiple locations and driving company‑wide innovation initiatives.
    She plans to pursue an MBA to deepen her strategic expertise and hopes to champion a workplace culture that balances structure with flexibility, encouraging creativity and employee well‑being. Long‑term,
    she envisions launching her own boutique consultancy that helps small businesses integrate artistic branding and innovative processes, while also mentoring emerging women leaders in her industry.
