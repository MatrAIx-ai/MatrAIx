persona_description: A high-level executive in a manufacturing company with expertise in additive manufacturing and rapid prototype techniques. The individual is responsible for overseeing the company's
  additive manufacturing operations and ensuring that the technology is used to develop and support the company's product development programs. They have experience with the latest in additive manufacturing
  technology and are able to make informed decisions about the best approach for each project. The individual is also skilled in managing the complex processes involved in the additive manufacturing process,
  including the development of computer-aided manufacturing (CAM) data and the post-processing steps. They have a strong understanding of the benefits of additive manufacturing, including its ability to
  provide up to 15 months lead time savings and the potential for new and innovative designs that can't be made using conventional processes. Additionally, the individual is aware of the disruptive potential
  of additive manufacturing technology and is committed to keeping GE's additive manufacturing capabilities in-house.
