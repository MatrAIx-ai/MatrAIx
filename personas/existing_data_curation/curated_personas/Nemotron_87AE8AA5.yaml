  career_goals: He aims to advance to a senior executive role such as Vice President of Operations or Chief Operations Officer within the next five years, leading large‑scale transformation initiatives
    that embed sustainability and digital innovation. He also aspires to mentor emerging managers, contribute to industry thought leadership through speaking and publishing, and eventually launch a boutique
    consultancy that helps mid‑size firms adopt lean, technology‑driven operational excellence. Balancing his ambition with his family life, he seeks a role that allows flexibility for community involvement
    and personal wellbeing.
