persona_description: A senior official in the Ministry of Transport and Infrastructure responsible for developing and implementing a national strategy for road safety and mobility, coordinating with other
  agencies and stakeholders to ensure effective implementation of road infrastructure agreements under the UN framework and improved safety-conscious planning, design, construction, and operation of roads.
  This official is committed to promoting road safety ownership and accountability among road authorities, road engineers, and urban planners, as well as promoting the needs of all road users as part of
  sustainable urban planning, transport demand management, and land-use management.
