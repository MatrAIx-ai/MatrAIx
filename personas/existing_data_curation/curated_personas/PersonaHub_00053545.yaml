persona_description: A researcher at the University of British Columbia who specializes in developing advanced dialysis technology for hydraulic fracturing. The researcher has received funding from the
  Climate Change and Emissions Management Corporation to push the technology towards commercialization, with the potential to reduce CO2 emissions and save more than 2 billion liters of fresh water for
  tight oil and shale gas extraction in Alberta. The system uses excess carbon dioxide to desalinate wastewater for reuse and produces hydrochloric acid and carbonate salts as byproducts, which are used
  in fracking.
