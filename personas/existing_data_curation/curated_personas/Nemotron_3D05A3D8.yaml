  hobbies: '["Fishing on the Rappahannock River", "Woodworking and furniture making", "Reading local and national history", "Gardening (heirloom vegetables and herbs)", "Attending community events and fairs",
    "Listening to classic rock and folk music", "DIY electronics tinkering", "Volunteer activities with local historical society"]'
  career_goals: Joseph hopes to translate his practical abilities into a modest, flexible source of income that fits his desire for autonomy. He is exploring part‑time work as a handyman for neighbors and
    local small businesses, occasional contract work at a nearby bait‑and‑tackle shop, or a seasonal position helping maintain the town’s waterfront facilities. He also wants to volunteer as a mentor for
    youth interested in trades, which aligns with his cooperative nature and his wish to give back to the community. Long‑term, he aims to establish a small side‑business offering custom woodworking pieces,
    allowing him to merge his curiosity for new designs with his practical skill set while maintaining an unstructured schedule.
