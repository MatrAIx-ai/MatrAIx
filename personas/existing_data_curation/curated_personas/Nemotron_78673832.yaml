  career_goals: Patricia aims to translate her associate’s background in business into an entry‑level administrative or marketing support role that offers flexibility and room for skill development. She
    plans to enroll part‑time in a Bachelor’s program in Business Management to broaden her career options while maintaining a work‑life balance that accommodates her preference for autonomy. In the longer
    term, she is interested in launching a freelance digital content studio or an online boutique, leveraging her graphic design and social media expertise. Her competitive drive pushes her to seek positions
    where she can distinguish herself through measurable results, while her emotional stability ensures she can handle the pressures of career advancement without becoming overwhelmed.
