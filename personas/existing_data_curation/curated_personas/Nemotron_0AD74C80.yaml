  hobbies: '[''Acoustic guitar'', ''Hiking'', ''Coaching youth soccer'', ''Cooking Southern cuisine'', ''Volunteering at library reading program'', ''Gardening'', ''Attending church socials'', ''Hosting
    game nights'', ''Participating in local festivals'', ''Charity runs'']'
  career_goals: Tommy aims to advance to a lead special‑education coordinator position within his district, pursue a Master's degree in Special Education, obtain certifications in autism spectrum disorder
    and applied behavior analysis, and develop community‑based inclusive programs that bridge school and local resources. He also aspires to mentor new teachers and influence district policy to promote
    equity for students with disabilities.
