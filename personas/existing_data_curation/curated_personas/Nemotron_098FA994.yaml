personas:
  professional: Sadie Lee is a veteran call center representative who combines meticulous CRM proficiency and active listening with a warm, community‑focused demeanor, using structured scripts yet flexibly
    adapting to unexpected queries, and they mentor newer agents despite occasional lapses in personal organization and a tendency toward worry about performance metrics.
  sports: Sadie Lee stays active by marching with their local senior walking club each morning, cheering on the Chattanooga Lookouts during baseball season and the Tennessee Titans on Sundays, while occasionally
    joining a community pick‑up softball game, and they embody a relaxed yet consistent approach to fitness.
  arts: Sadie Lee immerses themselves in classic R&B and jazz, often humming the tunes of Etta James, Marvin Gaye, Nat King Cole, and Billie Holiday while performing with their church gospel choir that
    reveres the legacy of Mahalia Jackson, and they regularly attend live performances at the Tivoli Theatre featuring productions of classic American plays like A Streetcar Named Desire.
  travel: Sadie Lee prefers well‑planned, moderate‑length road trips that blend relaxation and cultural immersion, such as their annual weekend getaway to Asheville’s Blue Ridge vistas, a savory culinary
    tour of Savannah’s historic district, and a dream itinerary to New Orleans for its jazz festivals, and they balance these adventures against a modest travel budget and the need to coordinate with their
    family’s schedule.
  culinary: Sadie Lee showcases their seasoned Southern palate by expertly preparing collard greens simmered with smoked turkey, crispy fried catfish, buttery cornbread, and sweet tea infused with fresh
    mint, often incorporating garden‑grown tomatoes, okra, and hot peppers into their dishes while they delight friends at potluck gatherings.
  core: Sadie Lee blends a structured work ethic with a delightfully chaotic love for community gatherings, juggling a knack for meticulous customer care alongside a habit of misplacing their own keys,
    and they carry a lingering worry about the future.
background:
  cultural: Sadie grew up in the African-American community of Chattanooga, deeply rooted in Southern traditions and the legacy of the civil-rights era. Her upbringing emphasized church fellowship, gospel
    music, and close family ties, shaping a strong sense of community responsibility. She celebrates African-American heritage through local festivals, cuisine, and storytelling, while also navigating the
    cultural nuances of a mid-south city.
