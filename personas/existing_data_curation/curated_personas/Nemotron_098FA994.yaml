  hobbies: '[''Walking club'', ''Gospel choir'', ''Community potlucks'', ''Southern cooking'', ''Gardening'', ''Knitting'', ''R&B and jazz appreciation'', ''Local cultural festivals'']'
  career_goals: Sadie aims to advance into a supervisory or quality-assurance role within the call center, where she can mentor junior staff and shape service standards. She also wishes to obtain a certification
    in Customer Service Management to solidify her expertise, and eventually transition to a part-time consulting role that allows a more predictable schedule and reduced stress as she approaches retirement.
