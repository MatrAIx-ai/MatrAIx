  hobbies: '[''Bowling league'', ''Neighborhood barbecues'', ''Rotary Club STEM mentorship'', ''Woodworking'', ''Classic car restoration'', ''Hiking'', ''Maker Faire attendance'', ''Blues guitar jam sessions'',
    ''College football fandom'', ''Professional football fandom'']'
  career_goals: Looking ahead, James aims to shift into a senior advisory role where he can shape the next generation of lightweight, high‑performance materials with a focus on sustainability. He plans
    to lead a company‑wide initiative to replace traditional steel components with recycled‑content composites, positioning his employer as a regional leader in green engineering. Simultaneously, James
    wants to mentor younger engineers through formal apprenticeship programs and serve on industry standards committees for additive manufacturing. Eventually, he envisions launching a boutique consulting
    practice that helps small manufacturers in Indiana adopt advanced material technologies, leaving a lasting impact on the local manufacturing ecosystem.
