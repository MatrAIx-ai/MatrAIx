  hobbies: '["Abstract painting", "Poetry reading", "Journal writing", "Gardening", "Crossword puzzles", "Cuban cooking", "Beach walking", "Virtual art lectures", "Listening to Cuban jazz"]'
  career_goals: Although retired, Lourdes aims to channel her imagination into a personal legacy. She plans to write and self‑publish a memoir that weaves her family's Cuban migration story with reflections
    on art and aging. She hopes to organize a small community exhibition of her artwork at the local senior center, digitize and archive family photographs, and learn basic digital photography and computer
    skills to preserve her creations. Additionally, she wishes to volunteer as a mentor for other seniors interested in artistic pursuits, while continuing to nurture her emotional well‑being through mindfulness
    practices.
