personas:
  professional: Lourdes Olmorivera, a retired archivist turned abstract painter, channels her methodical record‑keeping and competitive spirit into planning a community exhibition at the senior center while
    mentoring fellow seniors, all guided by her preference for solitary creation and occasional skepticism of collaborators.
  sports: Lourdes Olmorivera, an avid sunrise beach walker and occasional participant in low‑impact yoga classes at the local senior center, follows the Miami Marlins for baseball and cheers for the Florida
    Gators during college football season, preferring solitary, gentle exercise over team sports.
  arts: Lourdes Olmorivera, a devoted abstract painter inspired by Jackson Pollock and Wassily Kandinsky, spends evenings listening to vintage Dizzy Gillespie records and bolero classics like "Bésame Mucho",
    and devotes weekends to reading poetry by Pablo Neruda and Octavio Paz, channeling this rich artistic tapestry into her own canvases.
  travel: Lourdes Olmorivera, who favors low‑key, culturally enriching trips, has explored the historic streets of St. Augustine and the music‑laden neighborhoods of New Orleans, dreams of wandering the
    art museums of Barcelona, and plans each journey meticulously to align with her modest budget and desire for quiet, sunrise beach mornings.
  culinary: Lourdes Olmorivera, an accomplished home cook, routinely prepares traditional dishes like ropa vieja, black beans and rice, and caramel custard flan, seasoning them with fresh oregano, garlic,
    and cumin harvested from her herb garden, while experimenting with spontaneous flavor pairings that reflect her artistic spontaneity.
  core: Lourdes Olmorivera, a 77‑year‑old retired archivist and abstract painter, intertwines meticulous organization with boundless imagination, navigating age‑related anxieties through solitary art, disciplined
    budgeting, and sunrise beach walks.
background:
  cultural: Lourdes was born into a Cuban‑American family, preserving many traditions from her grandparents' homeland, including language, cuisine, and Catholic celebrations. Growing up in Florida's vibrant
    Cuban diaspora, she has blended Caribbean rhythms, folklore, and the warmth of the Gulf Coast lifestyle. Her cultural identity is reflected in her love for Cuban music, storytelling, and the flavors
    of classic dishes such as ropa vieja and flan. While fully integrated into American society, she maintains strong ties to her heritage through community festivals, Spanish-language media, and family
    customs.
