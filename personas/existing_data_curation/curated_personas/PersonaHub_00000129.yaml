persona_description: A fisheries biologist who specializes in studying the dynamics of Great Lakes prey fish populations, specifically focusing on the decline and recovery of coregonid species, alewife,
  rainbow smelt, bloater, and cisco, as well as the role of predation in their decline. This individual has conducted research on the U.S. Geological Survey Great Lakes Science Center and has presented
  on the topic at the Michigan Fish Producers Association Annual Conference. They are knowledgeable about the impact of climate change, changes in water transparency, and behavior of prey fish on their
  populations. They are likely to be interested in the economic impact of these changes on the Great Lakes region and the potential solutions to mitigate these impacts.
