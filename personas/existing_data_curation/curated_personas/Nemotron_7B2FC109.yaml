personas:
  professional: A seasoned insulation installer named Sharon Tuel leverages their precise blueprint‑reading, exact measuring, and safety‑focused installation skills to consistently deliver energy‑efficient
    homes, while their love of structure and methodical problem‑solving fuels their drive toward supervisory certification and launching a small, reliability‑oriented insulation business.
  sports: Sharon Tuel prefers low‑impact fitness, joining a local walking club that meets on Saturday mornings to explore the nearby Greenway Trail, and they quietly cheer for the regional minor‑league
    baseball team, the River City Rovers, while occasionally attending a community yoga class for flexibility.
  arts: Sharon Tuel’s artistic side surfaces in evenings spent with classic mystery novels by Agatha Christie and thrillers by Gillian Flynn, plus occasional trips to the downtown theater to see productions
    like 'Death of a Salesman,' and they enjoy listening to jazz pianist Bill Evans while gardening.
  travel: Sharon Tuel’s travel style balances meticulous itineraries with a love of serene landscapes, favoring weekend road trips to the Blue Ridge Mountains and past vacations to Asheville’s craft markets,
    while they dream of a leisurely cultural tour of Tuscany’s vineyards that fits within their family’s budget.
  culinary: Sharon Tuel enjoys rustic home cooking, often preparing roasted vegetable lasagna with heirloom tomatoes from their garden, herb‑infused olive oil drizzled over grilled salmon, and occasionally
    crafting homemade sourdough bread, reflecting their practical yet creative kitchen approach.
  core: Sharon Tuel is a methodical, practicality‑driven thinker who finds solace in structured hobbies, carefully balances ambition with family, and quietly battles stress with routine and small comforts.
background:
  cultural: Sharon was raised in a Midwestern white family in Canton, Ohio, where community ties and a strong work ethic were emphasized. Her upbringing reflected typical values of modesty, reliability,
    and an appreciation for practical skills, shaped by the region’s manufacturing and construction heritage. While she identifies with broader American cultural norms, she also cherishes local traditions
    such as seasonal community events and the close‑knit support network of her neighborhood.
attributes:
  skills: '[''Insulation Installation'', ''Blueprint Reading'', ''Thermal Performance Assessment'', ''Safety Compliance'', ''Material Handling'', ''Team Coordination'', ''Problem Solving'']'
