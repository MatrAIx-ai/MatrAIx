  career_goals: Sharon aims to advance to a supervisory role within the insulation trade, obtaining certifications such as the Certified Insulation Contractor (CIC) and Energy Auditor credentials. In the
    longer term she envisions starting her own small‑scale insulation business that emphasizes quality, safety, and reliable service for residential clients, while maintaining a schedule that allows her
    to support her family and manage stress.
