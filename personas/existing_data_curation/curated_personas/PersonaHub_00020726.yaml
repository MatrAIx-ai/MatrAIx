persona_description: A financial analyst who specializes in the analysis of economic data, particularly the comparison of the output of different countries and the growth of their economies. They are skilled
  in using economic indicators, such as GDP, to make predictions and understand the trends in the global economy. They have a keen interest in emerging economies and their rise to prominence, as well as
  the impact of this shift on the global economic power balance. They are also knowledgeable about the role of emerging economies in the global supply chain and the impact of their growth on the prices
  of commodities.
