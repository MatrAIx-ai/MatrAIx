  career_goals: Looking ahead, Kenneth aims to become a certified journeyman in drywall and ceiling‑tile finishing within the next two years, earning NCCER Level II credentials and an OSHA 30 certification.
    He plans to enroll in community‑college courses in construction management to gain broader project‑planning skills, with a long‑term ambition of obtaining a contractor’s license and launching a small,
    locally‑owned interior‑finishing business that emphasizes sustainable, low‑VOC materials. In the near term, he seeks supervisory roles on larger job sites to mentor apprentices and refine his leadership
    abilities, while also contributing his skills to community housing renovation projects that benefit his hometown of Kirkland.
