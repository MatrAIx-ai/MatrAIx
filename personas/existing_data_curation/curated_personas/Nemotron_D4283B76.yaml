personas:
  professional: Kenneth Mai, a 23‑year‑old drywall and ceiling‑tile installer, blends meticulous blueprint reading with a passion for sustainable, low‑VOC materials, and they deliver paint‑ready surfaces
    while mentoring apprentices and seeking supervisory roles that champion efficient, eco‑friendly building practices.
  sports: Kenneth Mai, an outdoor‑oriented 23‑year‑old, hikes the limestone bluffs of Starved Rock State Park on weekends, and they join the Kirkland Community Center's pick‑up basketball league, rooting
    for the Chicago Bulls and following the Chicago Cubs, balancing their love of nature with competitive streetball.
  arts: Kenneth Mai, a 23‑year‑old amateur songwriter, strums acoustic guitar to the tunes of John Mayer and Mumford & Sons while drawing lyrical inspiration from documentary series on Frank Lloyd Wright
    and sustainable architecture, and they occasionally attend local Chicago gallery openings featuring mixed‑media installations that echo their interest in texture and finish.
  travel: Kenneth Mai, a 23‑year‑old explorer, has road‑tripped to the Grand Canyon, dreams of kayaking the Hoh Rainforest in Washington's Olympic Peninsula, and hopes to visit New Zealand's South Island
    to experience farm‑to‑table dining and eco‑tourism, always planning trips around budget-friendly hostels and outdoor adventure opportunities.
  culinary: Kenneth Mai, a 23‑year‑old home chef, blends family recipes with Midwestern ingredients, perfecting dishes like lemongrass‑infused pork shoulder stew with corn and kale, crafting a fresh basil
    and jalapeño twist on classic noodle bowls, and they experiment with low‑VOC-friendly herb‑infused sauces while still favoring a well‑worn cast‑iron skillet for searing.
  core: Kenneth Mai, a 23‑year‑old drywall craftsman, balances a pragmatic work ethic with creative DIY projects, a love for acoustic songwriting, and a habit of over‑measuring everything, and they juggle
    a modest budget alongside occasional late‑night gaming marathons.
background:
  cultural: Kenneth is the son of Southeast Asian immigrants who settled in the Midwest, and his household blends the values of his parents’ heritage with the practical, community‑focused lifestyle of small‑town
    Illinois. Raised bilingual, he speaks both English and his family's native language, which he uses during family gatherings and cultural celebrations such as Lunar New Year and the Mid‑Autumn Festival.
    These traditions emphasize respect for elders, hard work, and communal harmony—principles reflected in his cooperative and considerate demeanor. While he enjoys typical Midwestern pastimes like fishing,
    hiking, and local sports, his cultural roots also shape his culinary interests, his appreciation for collective community projects, and his commitment to maintaining strong family connections.
