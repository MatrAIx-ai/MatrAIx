persona_description: A scientist and engineer with a background in mechanical engineering and a particular interest in the development of high-performance portable pump systems and efficient chemical rockets
  for nanosatellites. They have experience in the design and development of microscale chemical reactors, particularly those using aqueous high-test hydrogen peroxide for the chemical generation of steam
  using a catalyst. They are skilled in multi-domain physical modeling, simulation, and experimentation to optimize the design of microscale devices and systems. They have published research on the development
  of scaled-down MEMS hydrogen peroxide steam generators, including the use of multi-domain physical modeling to simulate the reacting flow and evaluate the heat losses from the device. They have also used
  refractive index analysis to confirm full peroxide decomposition and visual inspection and temperature measurements to confirm full water vaporization.
