personas:
  professional: Ryan Brewer is a seasoned Emergency Medical Technician with ACLS and BLS credentials who excels at rapid trauma assessment and improvises solutions under pressure, and their spontaneous,
    flexible mindset drives them to mentor newcomers while battling a tendency to let paperwork slip.
  sports: Ryan Brewer regularly hikes the Chesapeake Bay shoreline and kayaks the Patapsco River with the local Patapsco Paddle Club, cheers the Baltimore Ravens on Sundays, and follows the Baltimore Orioles,
    while also participating in a weekend adult soccer league at a nearby rec center.
  arts: Ryan Brewer channels their creative side by strumming folk classics from Bob Dylan, Gillian Welch, and Joanie Mack at The Green Turtle venue, captures sunrise landscapes with a DSLR, and collects
    vintage analog film rolls for occasional dark‑room experiments.
  travel: Ryan Brewer favors early‑morning road trips to Shenandoah National Park or historic Gettysburg for sunrise photography, mixes spontaneous weekend getaways to Annapolis with occasional overseas
    trips to Dublin to explore Celtic music roots, all while balancing limited family time and budget constraints.
  culinary: Ryan Brewer enjoys cooking simple, nutrient‑dense meals like grilled salmon with quinoa, roasted Brussels sprouts, and lemon‑garlic kale, has a solid grasp of basic knife skills, and often experiments
    with herbs such as rosemary and cumin while using a trusty Dutch oven.
  core: Ryan Brewer, a 41‑year‑old EMT‑to‑paramedic hopeful, merges solitary sunrise hikes with impromptu folk jam sessions, automatically pilots their retirement savings, and perpetually wrestles with
    disorganized incident reports.
background:
  cultural: Ryan grew up in a middle‑class suburban setting in Maryland, absorbing the blend of Mid‑Atlantic American values that emphasize self‑reliance, community service, and respect for individual freedom.
    His family traditions include celebrating national holidays such as Thanksgiving, Independence Day, and Christmas with close relatives, often featuring backyard barbecues and local seafood dishes that
    reflect the Chesapeake Bay’s maritime heritage. His bachelor's degree in humanities broadened his appreciation for diverse artistic and literary traditions, informing his open‑minded yet pragmatic worldview.
    Living in Anne Arundel County, he interacts daily with a cross‑section of residents—including military families, long‑time waterfront communities, and newer commuter populations—shaping a culturally
    aware perspective that values both tradition and progressive change.
attributes:
