    documentation'', ''Rapid decision‑making under pressure'', ''Basic emergency vehicle navigation of Anne Arundel County routes'']'
  hobbies: '[''Hiking Chesapeake Bay trails'', ''Kayaking on the Patapsco River'', ''Amateur wildlife and landscape photography'', ''Playing acoustic guitar'', ''Reading historical non‑fiction and medical
    case studies'', ''Cooking simple, nutritious meals'', ''Volunteering at community health fairs'', ''DIY home‑improvement projects'', ''Listening to classic rock and folk music'']'
  career_goals: Ryan aims to obtain paramedic certification within the next two years, followed by a supervisory role overseeing EMS operations in Anne Arundel County. He is interested in integrating emerging
    tele‑medicine tools into field response to improve patient outcomes. Long‑term, he envisions developing a community‑based disaster‑preparedness program that blends his practical EMS expertise with his
    passion for public education, potentially authoring a guidebook that combines real‑world case studies with accessible health‑literacy content. He also hopes to pursue a master's degree in public health
    to broaden his impact on regional health policy.
