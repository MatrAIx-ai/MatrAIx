  hobbies: '[''Reading (non‑fiction, productivity, Asian history)'', ''Indoor herb and succulent gardening'', ''Woodworking (small furniture, decorative items)'', ''Hiking on local trails'', ''Cooking Vietnamese
    cuisine with modern twists'', ''Mindfulness meditation'', ''Nature photography'']'
  career_goals: Nhung is aiming to re‑enter the workforce in a role that offers clear structure, predictable hours, and minimal social pressure. He is pursuing remote freelance work as a data analyst and
    web maintenance specialist, where he can work independently from his home office. Over the next few years he hopes to build a modest client base, eventually transitioning to a part‑time consulting business
    helping small businesses streamline their operations and improve their digital presence. He also wishes to obtain a certification in project management to formalize his expertise.
