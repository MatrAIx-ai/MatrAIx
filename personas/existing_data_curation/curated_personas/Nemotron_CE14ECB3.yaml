personas:
  professional: Nhung Tu works as a remote freelance data analyst and website maintenance specialist, using their strong spreadsheet, HTML/CSS/JavaScript, and project‑planning skills to deliver highly structured,
    well‑documented solutions for small businesses while thriving in a solitary, predictable work environment.
  sports: Nhung Tu hikes the Cascade foothills regularly with the local Cascades Trekking Club, enjoys occasional solo jogs, follows the Seattle Seahawks for a dash of team spirit, and prefers low‑impact,
    nature‑based fitness over crowded gyms.
  arts: Nhung Tu captures nature photography with a DSLR, draws inspiration from Ansel Adams and contemporary photographer Peter Lik, listens to the calming strings of Yo‑Yo Ma and the indie folk of Bon Iver,
    and treats their small woodworking projects as functional art.
  travel: Nhung Tu plans low‑key, budget‑conscious trips focusing on natural scenery, has explored Banff, Kyoto, and Sedona, and dreams of photographing Iceland’s highlands, always choosing off‑season travel
    dates and staying in modest guesthouses to keep expenses predictable.
  culinary: Nhung Tu cooks traditional dishes such as pho, bánh mì, and bun cha with modern twists like quinoa noodles or smoked tofu, spices them with fresh Thai basil, cilantro, and mint from their indoor
    garden, and occasionally overcooks rice when distracted by a podcast.
  core: Nhung Tu is a meticulous, introverted 38‑year‑old who blends technical precision with solitary crafts, disciplined budgeting, cautious health habits, and a quiet love for nature‑inspired creativity.
background:
  cultural: Nhung is a first‑generation Vietnamese American who grew up in a close‑knit immigrant community in Seattle’s International District. His upbringing blended traditional Vietnamese customs—such
    as Tet celebrations, respect for elders, and a strong emphasis on family unity—with the individualistic values of American society. He maintains ties to his heritage through language, cuisine, and participation
    in community cultural festivals, while also navigating the multicultural environment of the Pacific Northwest. This dual cultural lens informs his practical mindset, respect for structure, and preference
    for solitary reflection.
attributes:
  skills: '[''Computer troubleshooting'', ''Spreadsheet analysis (Excel, Google Sheets)'', ''Basic web development (HTML, CSS, JavaScript)'', ''DIY home repair (plumbing, electrical, woodworking)'', ''Project
