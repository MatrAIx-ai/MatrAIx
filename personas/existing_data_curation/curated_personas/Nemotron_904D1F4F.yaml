  career_goals: Cynthia aspires to build a career that fuses her artistic passion with her desire to support others. After completing her GED, she plans to enroll in a community‑college program in graphic
    design or art therapy. Her long‑term goal is to work as an art therapist or community‑arts program coordinator in schools, youth centers, or museums, designing therapeutic workshops that promote emotional
    wellbeing and self‑expression for at‑risk youth. She also envisions supplementing her artistic training with studies in social work to broaden the impact of her creative initiatives.
