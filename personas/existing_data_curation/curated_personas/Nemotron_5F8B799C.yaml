    and information synthesis'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries and murals'', ''Indie film screenings'', ''Hiking in Oregon forests'', ''Yoga and meditation'', ''Cooking Guatemalan cuisine'',
    ''Reading Latin American literature'', ''Listening to alternative music'', ''Volunteering (Spanish tutoring and art workshops)'']'
  career_goals: Samira aims to transition from routine clerical duties to a role that blends her organizational strengths with her creative curiosity, such as project coordinator or community outreach specialist.
    She plans to earn a Certified Administrative Professional (CAP) credential and later pursue a Project Management Professional (PMP) certification to formalize her project‑planning skills. In the longer
    term, Samira envisions leveraging her Guatemalan heritage by working for a nonprofit or cultural organization that promotes Latinx arts and education, or by launching a boutique online platform that
    showcases Guatemalan crafts and stories. Flexibility and the ability to think unconventionally are central to her career aspirations.
