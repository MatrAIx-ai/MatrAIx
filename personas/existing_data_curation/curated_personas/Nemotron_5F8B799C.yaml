personas:
  professional: Samira Robles, a bilingual administrative professional with expertise in data entry, scheduling, and basic bookkeeping, leverages their knack for creative brainstorming and social-media
    curation while embracing a relaxed, flexible attitude to improvise workflow solutions in Trello and Notion as they transition toward project coordination roles.
  sports: Samira Robles, an avid hiker who explores the Cascades and Willamette Valley trails with the Pacific Trails Hiking Club, blends low-intensity cardio hikes with occasional pick-up volleyball at
    the university recreation center, and follows the Oregon State Beavers women’s soccer and the Portland Timbers, keeping their competitive edge alive.
  arts: Samira Robles immerses herself in the Corvallis art scene, regularly visiting galleries that showcase Frida Kahlo-inspired street murals, sketching watercolors of local flora, attending indie screenings
    of Greta Gerwig’s latest film, devouring Jorge Luis Borges’ magical-realism stories, and curating Instagram reels set to the sultry rhythms of contemporary Latinx singer Natalia Lafourcade, which they
    share with friends.
  travel: Samira Robles prefers spontaneous yet budget-conscious weekend getaways, having trekked the rainforest trails of Antigua, Guatemala, sampled the vibrant markets of Oaxaca, Mexico, and hiked the
    misty Hoh River gorge in Washington, while they plan a future solo backpacking trek through the Peruvian Andes.
  culinary: Samira Robles, a confident home cook, delights friends with handcrafted pepian simmered in roasted achiote and cinnamon, delicate tamales filled with sweet corn masa and pumpkin seeds, and occasional
    experimental fusions like quinoa-based kak´ik, while they savor fresh avocado, lime, and chocolate-covered plantain as signature flavors.
  core: Samira Robles channels a curious, art-driven spirit into a flexible, slightly disorganized life, juggling bilingual admin work, vivid watercolor sketches, and a relentless pursuit of cultural storytelling,
    while they battle a tendency to procrastinate and a habit of chasing discount deals.
background:
  cultural: Samira was raised in a bilingual Guatemalan household, where Spanish was spoken daily and Guatemalan traditions were celebrated, such as Día de la Independencia and Semana Santa. Her family
    maintains connections to their Maya roots, influencing her appreciation for intricate patterns and folk art. While she embraces mainstream American culture—attending university events and engaging with
    the local outdoor lifestyle—she also actively preserves her heritage through cooking, cultural festivals, and community involvement within the Guatemalan diaspora in Oregon. This bicultural upbringing
    shapes her identity, values, and perspective on both personal and professional interactions.
