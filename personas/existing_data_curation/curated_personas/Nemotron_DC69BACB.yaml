personas:
  professional: Gina Zeleznik, an aspiring social work student with a talent for empathetic listening and grassroots event coordination, blends their curiosity about adolescent mental health with a practical,
    flexible mindset, often juggling volunteer commitments, campus group projects, and a loosely kept spreadsheet of community resources while still struggling to keep a tidy schedule.
  sports: Gina Zeleznik enjoys low‑key fitness routines like weekend jogs through Garfield Park, occasional yoga classes at a local studio, and cheering on the Grand Rapids Griffins in the AHL while also
    playing casual ultimate Frisbee with friends from their community garden crew.
  arts: Through sketching prairie wildflowers, posting nature photography on an Instagram feed, and listening to folk tunes from artists like The Both and indie folk musician Sufjan Stevens, Gina Zeleznik
    weaves creative expression into daily life, often attending intimate exhibitions at the Grand Rapids Art Museum and finding inspiration in the region’s seasonal colors.
  travel: Preferring solitary, low‑budget adventures, Gina Zeleznik has taken weekend road trips to Door County’s lighthouses, explored Sleeping Bear Dunes with a backpack and camera, dreams of a spring
    pilgrimage to Prague to experience family folk traditions, and meticulously plans itineraries on a shared Google Doc while leaving room for spontaneous detours.
  culinary: An enthusiastic home cook, Gina Zeleznik often prepares molé with smoked paprika and carrots for family gatherings, experiments with seasonal dishes like carrot‑and‑beet quinoa bowls and fresh
    herb pesto pasta using garden‑harvested basil, yet occasionally skips cooking in favor of quick Chipotle burritos when deadlines loom.
  core: Balancing a love of solitary creativity with a compassionate, community‑oriented heart, Gina Zeleznik is an organized‑in‑the‑mess type who crops up early at garden beds, forgets to water their own
    succulents, and dreams of turning sketchbooks into a mental‑health mentorship hub.
background:
  cultural: Gina comes from a Midwestern white family with roots in Czech heritage, reflected in occasional family traditions like preparing molé (a traditional Czech dish) and listening to folk music
    during holidays. Growing up in Grand Rapids, she has been shaped by the region’s emphasis on community involvement, modesty, and practical problem‑solving. The city’s vibrant arts scene and strong volunteer
    culture have reinforced her compassionate outlook and desire to contribute to local well‑being.
attributes:
  skills: '["Empathetic communication", "Active listening", "Basic conflict mediation", "Community event organization", "Social media outreach", "Independent research", "First‑aid certification", "Team
    collaboration"]'
  hobbies: '["Sketching nature scenes", "Nature photography", "Reading non‑fiction (psychology, sustainability, social justice)", "Book club participation", "Board‑game evenings with close friends", "Volunteering
    at community garden"]'
  career_goals: Gina aims to complete a bachelor's degree in social work or psychology, with the long‑term ambition of becoming a licensed clinical social worker specializing in adolescent mental health.
    She dreams of establishing a youth mentorship program in Grand Rapids that combines counseling services with creative workshops. In the short term, she plans to secure an internship at a local non‑profit
    agency, gain experience in case management, and develop grant‑writing skills to support community projects.
