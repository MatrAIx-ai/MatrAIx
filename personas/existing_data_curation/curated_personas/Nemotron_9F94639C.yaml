personas:
  professional: Joseph Wagoner, a 61‑year‑old veteran janitor and facilities‑maintenance specialist, blends three decades of detailed cleaning schedules, OSHA‑compliant safety procedures, and hands‑on repairs
    into a pragmatic plan to transition into part‑time building supervision or a modest consulting cleaning service, where they can mentor younger staff while preserving the dependable routines that define
    their work ethic.
  sports: Joseph Wagoner, a loyal fan of the Dallas Cowboys and regular attendee of the Whitesboro High School Panthers football games, enjoys occasional Saturday morning rounds of golf at the local municipal
    course and spends quiet afternoons fishing at Lake Ray Roberts, activities that they pursue with the same steady cadence they apply to their work and hobbies.
  arts: Joseph Wagoner immerses himself in classic country music, often playing the crooning of Merle Haggard, Dolly Parton, and George Jones while woodworking, attends the Whitesboro Community Theater’s
    monthly productions of old‑time plays, and collects vintage vinyl records, a pastime they cherish as a soothing backdrop to their solitary craftsmanship.
  travel: Joseph Wagoner favors low‑key road trips to historic small‑town festivals in the Texas Hill Country, such as the annual Waco Spring Fest, and occasional winter visits to Nashville’s Country Music
    Hall of Fame, planning each journey with detailed itineraries that they catalogue in a leather‑bound notebook to ensure familiar comforts and predictable schedules.
  culinary: Joseph Wagoner prefers hearty, home‑cooked meals like pan‑seared catfish with lemon butter, chili over cornbread, and apple‑crumble pie made from garden‑grown fruit, grilling his catches on
    a portable propane grill and carefully seasoning with vintage Tabasco, a culinary routine they follow while rarely venturing beyond familiar Southern comfort foods.
  core: Joseph Wagoner is a steadfast, routine‑driven craftsman who balances community service, solitary woodworking, and classic country nostalgia, yet stubbornly resists technological shortcuts and occasionally
    forgets to record small expenses, embodying a blend of reliability and endearing quirks.
background:
  cultural: Joseph was raised in a small, predominantly white community in North Texas, where self‑reliance, neighborly assistance, and modesty are valued. His family’s history is tied to local farming
    and ranching traditions, shaping a down‑to‑earth, practical worldview. He identifies with Southern‑Texan culture, participating in county fairs, church gatherings, and local high‑school sports events.
    His cultural outlook is traditionally conservative, emphasizing routine, responsibility, and community service, reflecting the straightforward ethos common in his region.
attributes:
  skills: '[''Janitorial services and routine building cleaning'', ''Floor care (strip‑and‑wax, carpet cleaning)'', ''Restroom sanitation and supply management'', ''Safety compliance (OSHA, chemical handling)'',
    ''Minor plumbing and electrical repairs'', ''Inventory control and budgeting for cleaning supplies'', ''Scheduling and time management'', ''Training and supervising junior cleaning staff'', ''Green
    cleaning practices'', ''Facility inspection and reporting'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Church volunteering'', ''Listening to classic country music'', ''Walking/hiking in local natural areas'', ''Seniors card‑game club (e.g., canasta,
    bridge)'']'
  career_goals: Approaching retirement, Joseph aims to shift into a supervisory or consulting role within facilities management that leverages his decades of hands‑on experience. He is interested in part‑time
    building supervisor positions at local schools or municipal facilities, or in launching a small, reliable cleaning service for businesses in Whitesboro. Additionally, he hopes to mentor younger janitors,
    sharing his routine‑driven methods and emphasis on safety and efficiency. Ultimately, he seeks a stable, modest income that supports his independence while allowing continued contribution to his community.
