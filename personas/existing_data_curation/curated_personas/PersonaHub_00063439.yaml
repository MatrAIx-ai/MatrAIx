persona_description: A paleontologist who specializes in the study of bird evolution, particularly the fossil record of Archeopteryx lithographica and its place in the evolutionary tree of birds. They are
  interested in the similarities and differences between Archeopteryx and modern birds, as well as the transitional forms that link reptiles and birds. They are also knowledgeable about the evolution of
  flight, homeothermy, and the transition from poikilothermic to homeothermic reptiles. They are likely to be interested in the latest estimates of the total number of bird species that have ever lived
  and the latest estimates of the total number of species that have ever existed.
