  career_goals: Shirley aims to move from a frontline sales role to a store manager position within the next two years, using her organized approach to improve operational efficiency and staff development.
    She envisions later advancing to a district manager role where she can influence broader merchandising strategies. Parallel to her retail trajectory, she plans to complete her college degree in marketing
    or visual arts, allowing her to merge her passion for art with commerce by eventually specializing in visual merchandising for a fashion or lifestyle brand, or even launching her own boutique that showcases
    African‑American artists and designers.
