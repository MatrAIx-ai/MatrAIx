personas:
  professional: Shirley Bennett, a retail specialist in Iowa City, combines meticulous inventory management and eye‑catching visual merchandising with a natural flair for customer engagement, leveraging
    their organized, talkative nature to lead store events, mentor teammates, and confidently negotiate sales while driving social‑media buzz for new product launches.
  sports: Shirley Bennett fuels their social energy by playing in a co‑ed volleyball league at the Iowa City Community Center, cheering on the Iowa Hawkeyes basketball team during March Madness, and fitting
    in morning jogs along the Cedar River to stay fit without turning exercise into a rigid regimen.
  arts: Shirley Bennett channels their curiosity into vibrant mixed‑media canvases inspired by Frida Kahlo’s bold colors and Banksy’s urban satire, captures the pulse of Iowa City’s murals with a DSLR camera,
    and fuels open‑mic evenings with a curated playlist of Kendrick Lamar and classic R&B, all while regularly attending local poetry slams and theater productions.
  travel: Shirley Bennett prefers carefully planned weekend road trips that blend cultural immersion and culinary adventure, often cycling to Chicago’s Art Institute, taking a budget flight to New Orleans
    for jazz and Creole cuisine, and dreaming of a future summer backpacking through Portugal’s historic towns on a modest student‑budget.
  culinary: Shirley Bennett, an intermediate home chef, delights in fusing Midwestern staples like cornmeal and sweet potatoes with bold spices such as smoked paprika and jalapeño, often whipping up dishes
    like spiced sweet‑potato tacos, corn‑bread‑crusted pork chops, and rosemary‑infused mushroom risotto while also exploring new flavors at local food markets.
  core: Shirley Bennett is a sociable, detail‑driven retail pro who balances a knack for curating eye‑catching store displays with a relentless appetite for street art, late‑night poetry slams, and an ever‑growing
    stash of paint tubes that sometimes spill onto their budget spreadsheets.
background:
  cultural: Shirley is an African‑American woman raised in the Midwest, where her family’s roots trace back to the Great Migration from the South. Her upbringing blended church‑centered community values
    with a strong appreciation for Black music, storytelling, and visual arts. Living in Iowa City, she participates in the university’s Black Cultural Center events, celebrates Juneteenth, and supports
    local Black artists. This cultural heritage informs her worldview, giving her a deep sense of resilience, pride, and a commitment to uplifting Black voices within the broader Midwestern community.
