personas:
  professional: Chi Li, an inquisitive three‑year‑old preschooler who loves arranging puzzle pieces and building miniature forts from blocks, demonstrates early organizational skills balanced with flexibility
    as they responsibly tidy up toys, share with peers, and occasionally worry about keeping everything perfectly in order.
  sports: Chi Li, a three‑year‑old who enjoys toddler gymnastics at the community center and cheerfully waves at the hometown baseball team, the Springfield Sox, while also participating in a weekend soccer
    playgroup at the local park, balancing a love for structured activity with spontaneous runs on the grass.
  arts: Chi Li, a three‑year‑old who delights in drawing colorful pictures of animals, humming The Wiggles' tunes, and watching Pixar animated shorts, often imitates Disney’s Mickey Mouse dance moves, and
    occasionally feels upset when a crayon breaks, reflecting their curiosity and sensitivity toward artistic expression.
  travel: Chi Li, an adventurous three‑year‑old who loves trips to the nearby botanical garden and the family’s annual beach vacation at Cape Cod, prefers itineraries with clear routines yet enjoys spontaneous
    stops at ice‑cream stalls, navigating new places with both excitement and a touch of worry about unfamiliar settings.
  culinary: Chi Li, a three‑year‑old with a fondness for cheesy macaroni, banana‑smoothie bites, and occasional broccoli florets, can whisk together peanut butter toast with a plastic spoon, yet sometimes
    refuses to try new foods, showing a selective palate and a cautious approach to novel flavors.
  core: Chi Li, a curious, art‑loving three‑year‑old who balances organization with spontaneity, worries about small changes, and navigates toddler life with a blend of careful planning, occasional impulsiveness,
    and vivid imagination.
background:
  cultural: Chi Li is raised in an East Asian household in Plano, Illinois. Her family maintains bilingual practices, speaking Mandarin at home and English in the community. She participates in cultural
    traditions such as Lunar New Year, enjoys traditional foods like dumplings, and celebrates holidays with both Chinese and American customs. Her upbringing blends respect for elders and community harmony
    with the openness and curiosity encouraged by her suburban environment.
