  career_goals: Scott aims to transition his artistic passion into a sustainable freelance career, focusing on digital illustration, album artwork, and content writing. He plans to complete his interrupted
    college coursework in visual arts through online courses, build a professional portfolio, and secure recurring commissions from independent musicians and boutique publications. Ultimately, he hopes
    to launch an online shop selling limited‑edition prints and to curate virtual exhibitions that spotlight emerging Southern artists, while maintaining the flexibility and solitude that suit his lifestyle.
