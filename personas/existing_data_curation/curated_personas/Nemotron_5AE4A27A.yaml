personas:
  professional: Scott Moore, a 28‑year‑old freelance visual illustrator and content writer, leverages their proficiency in Photoshop, Illustrator, and analog photography to craft moody album covers for
    underground musicians, while their relaxed, often disorganized approach pushes them to thrive on spontaneous late‑night creative bursts and maintain a quiet, solitary workflow that they cherish.
  sports: Scott Moore, a casual runner who logs miles along the Mississippi River trail each spring, follows the Memphis Grizzlies and the Ole Miss Rebels football team, and they prefer solitary workouts
    over team sports, viewing fitness as a meditative complement to their creative routine.
  arts: Scott Moore spends weekends sketching downtown murals while listening to B.B. King and Miles Davis, curates playlists featuring experimental musician Tim Hecker, and they draw inspiration from contemporary
    painter Kerry James Marshall to fuel their digital illustration projects.
  travel: Scott Moore favors spontaneous road trips down the blues‑laden Mississippi delta, dreaming of exploring New Orleans’ French Quarter and its music scene, while they also plan occasional solo pilgrimages
    to Florence’s Renaissance galleries, all on a modest budget that matches their preference for low‑key, immersive experiences.
  culinary: Scott Moore, an amateur chef who perfects smoky baby‑back ribs with a rosemary‑infused bourbon glaze and experiments with pulled pork sliders, tends a balcony herb garden for fresh cilantro
    and basil, and they enjoy pairing meals with cold‑brew coffee while spinning classic Memphis blues records.
  core: Scott Moore is a solitary 28‑year‑old creator who thrives on late‑night artistic spurts, balances a love for Memphis barbecue with a chronic habit of misplacing sketchbooks, and they channel curiosity
    into quiet, introspective pursuits.
background:
  cultural: Scott grew up in Memphis, Tennessee, a city famed for its blues, soul, and civil‑rights legacy. As a white Southern male, he was raised in a middle‑class family that valued hospitality, humility,
    and a relaxed pace of life. The city's vibrant music scene, street art, and annual festivals shaped his aesthetic sensibilities. While he feels comfortable within broader Southern cultural norms—such
    as a love for barbecue, college football, and community gatherings—he also seeks out the city's multicultural art spaces and honors its complex history, which informs his appreciation for diverse artistic
    expression.
