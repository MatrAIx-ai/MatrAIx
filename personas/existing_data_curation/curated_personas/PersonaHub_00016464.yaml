persona_description: A business owner or manager who is responsible for overseeing the production process of a company and ensuring that the company meets its financial targets. The person is responsible
  for setting the direct labor standards, which include the direct labor standard rate and the direct labor standard hours per unit. They need to have a deep understanding of the production process, product
  design, and manufacturing operations. They also need to be able to estimate the amount of direct labor time needed to produce a single unit and the direct materials standard quantity.
