persona_description: 'A historian who specializes in the history of music, particularly the cultural, social, and political contexts of modern Germany, with a particular focus on the history of music, nationalism,
  and national identity. She has published several books and articles on these topics, including "A Nation of Provincials: The German Idea of Heimat" (Berkeley, 1990), "Music and German National Identity"
  (Chicago, 2000), and "Bach in Berlin: Nation and Culture in Mendelssohn’s Revival of the St. Matthew Passion" (Cornell, 2005), which won the DAAD/GSA Book Prize. She is currently working on a comprehensive
  interpretation of musical life in Germany from the 17th century to the present, titled "Music and the Germans: A History." She is past President of the German Studies Association and Vice President of
  the Central European History Society.'
