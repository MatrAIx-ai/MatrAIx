personas:
  professional: Amiee Fuentes is a budding junior architect who builds sprawling block fort cities in the living room, turning curiosity about shapes into creative design sketches, while their spontaneous,
    structure‑resistant streak means each masterpiece is a lively, ever‑changing canvas.
  sports: Amiee Fuentes dashes around the local playground as a spirited member of the ‘Tiny Turtles’ kids’ soccer club, idolizes the city’s professional baseball team, the Metro Mariners, and favors spontaneous
    tag games over rigid training routines, reflecting an energetic yet structure‑averse spirit.
  arts: Amiee Fuentes fills sketchbooks with Dr. Seuss‑style characters, sings along to Disney’s ‘Let It Go’, and delights in the colorful worlds of Studio Ghibli’s ‘My Neighbor Totoro’, allowing these
    artistic influences to color their imaginative games and quiet moments alike.
  travel: Amiee Fuentes recalls a family trip to the sun‑kissed beaches of Florida’s Gulf Coast, where building sandcastles sparked a love for tactile exploration, and now dreams of wandering the lantern‑lit
    streets of Kyoto’s Arashiyama bamboo grove, preferring short, guided outings over long, unstructured journeys.
  culinary: Amiee Fuentes delights in buttery macaroni‑and‑cheese sprinkled with toasted breadcrumbs, loves dipping crisp apple slices into honey‑yogurt dip, and proudly helps stir pancake batter with a
    wooden spoon, though they often sneak a bite of chocolate chip cookies before dinner.
  core: Amiee Fuentes is a curious, art‑loving five‑year‑old who builds chaotic block castles, hoards shiny stickers, battles pollen sneezes, and transforms everyday moments into whimsical adventures.
background:
  cultural: Amiee is a white American girl raised in Riverside, California. Her family participates in typical suburban activities such as park outings, community library events, and occasional family barbecues.
    Growing up in a diverse county, she is exposed to a mix of cultures, which fuels her curiosity about new ideas and artistic expressions.
