personas:
  professional: Elias Whitley, a veteran casino surveillance officer with over three decades of experience in real‑time CCTV monitoring, risk assessment, and incident reporting, leverages their sharp observational
    instincts, arts‑inspired communication skills, and a penchant for teamwork to keep the gaming floor safe while channeling their emotional reactivity into a drive for developing mentally resilient security
    training programs.
  sports: Elias Whitley, an avid youth baseball coach and member of the Kent County Hiking Club, balances seasonal enthusiasm for local Detroit Tigers baseball games and winter ice‑hockey viewings with
    weekly hikes through the county’s dunes, using these activities as both social outlets and stress‑relief rituals.
  arts: Elias Whitley actively participates in community theater productions, often starring in Shakespearean comedies, captures candid moments with a DSLR inspired by Ansel Adams, and unwinds listening
    to Bob Dylan and classical piano recitals, allowing their humanities background to shape a lifelong appreciation for storytelling and visual art.
  travel: Elias Whitley prefers road‑trip adventures that blend meticulous itineraries—such as a week‑long drive along the Great Lakes to explore Mackinac Island and the historic lighthouses of Door County—with
    spontaneous weekend getaways to nearby vineyards, reflecting a balance of curiosity and practicality tempered by a modest retirement budget.
  culinary: Elias Whitley enjoys cooking rustic Midwestern fare like pan‑seared trout with rosemary‑infused butter, beet and goat‑cheese salads, and slow‑cooked pork shoulder, often experimenting with heirloom
    vegetables from their garden while occasionally over‑indulging in late‑night poker snacks of pepperoni pizza.
  core: Elias Whitley is a sociable, anxiety‑prone security veteran who balances meticulous professionalism with a love for theater, woodworking, and late‑night poker, often channeling their emotional intensity
    into creative projects and community mentorship.
background:
  cultural: Elias grew up in the Midwestern heartland of Michigan, absorbing the region's blend of pragmatic work ethic and close‑knit community values. His family background is typical of white Midwestern
    households, with roots in both the traditional Protestant work culture and the area's Dutch and Scandinavian immigrant heritage that influences local festivals, cuisine, and communal traditions. The
    local love of outdoor recreation, support for the arts, and an emphasis on practical education shaped his balanced perspective, fostering both curiosity about new ideas and a reliance on proven methods.
attributes:
  skills: '[''CCTV Monitoring'', ''Risk Assessment'', ''Incident Reporting'', ''Legal Compliance'', ''Conflict De‑escalation'', ''First Aid'', ''Critical Thinking'', ''Effective Communication'', ''Physical
