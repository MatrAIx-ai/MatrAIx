  hobbies: '[''Community Theater Acting'', ''Live Poker Nights'', ''Hiking in Kent County Trails'', ''Gardening'', ''Woodworking'', ''Reading Historical Non‑fiction'', ''Photography'', ''Volunteer Youth
    Sports Coaching'']'
  career_goals: Elias aims to move from a frontline surveillance officer to a supervisory role within the next three years, seeking certification as a Certified Protection Professional (CPP) to solidify
    his expertise. He hopes to design and lead a comprehensive training program for new guards that integrates mental‑health resilience techniques, reflecting his own experience with anxiety and emotional
    reactivity. Long‑term, he envisions establishing a boutique security consulting firm that serves small casinos and event venues across Michigan, allowing him to blend his practical knowledge with his
    curiosity for innovative security technologies.
