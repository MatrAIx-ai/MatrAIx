personas:
  professional: Charles Stanton, a veteran early‑childhood program director, leverages their curiosity and compassionate leadership to weave visual arts, theater, and horticulture into pre‑K curricula,
    while their relaxed, often spontaneous planning style invites community partners to co‑create enriching learning experiences, and they thrive on the lively energy of group collaboration.
  sports: Charles Stanton stays active through early‑morning birdwatching hikes in coastal preserves, weekly pickleball matches at the senior center, and enthusiastic support for the Tampa Bay Rays and
    Florida Gators, and they regularly join a local seniors’ walking club that explores historic neighborhoods every Saturday.
  arts: Charles Stanton, an avid watercolorist of historic port facades, regularly attends productions by the St. Augustine Players, draws inspiration from Monet’s delicate brushwork and John Coltrane’s
    jazz improvisations, and they often lead community workshops that blend storytelling with live music.
  travel: Charles Stanton prefers leisurely road trips to historic towns like Savannah, Charleston, and Seville, combining guided tours of colonial architecture with spontaneous stops at seaside cafés,
    and they dream of a future multigenerational cruise along the Gulf Coast to explore the Gulf Islands National Seashore.
  culinary: Charles Stanton enjoys preparing fresh seafood dishes such as grilled grouper with mango salsa, bright key lime pie, and hibiscus‑infused tea, cooking at a moderate skill level using native
    herbs and fruits from their garden, and they delight in occasional meals at The Columbia Restaurant for its Spanish‑styled paella.
  core: Charles Stanton, a 71‑year‑old art‑driven educator, blends curiosity, compassion, and a relaxed, sometimes disorganized, outlook to foster intergenerational creativity, and they savor garden‑fresh
    meals, birdwatching, and community storytelling.
background:
  cultural: Charles is a white American who grew up in the Midwest before relocating to the historic coastal city of St. Augustine, Florida. He embraces the blend of Southern hospitality and the city’s
    Spanish‑colonial heritage, often reflecting on the town’s layered cultural narratives in his work and art. Though raised in a traditional Protestant household, his later years have been marked by an
    inclusive appreciation for the diverse cultural and religious traditions represented in his community, informing his compassionate, collaborative approach to education.
attributes:
  skills: '["Curriculum design", "Early childhood program administration", "Grant writing", "Community partnership development", "Conflict mediation", "Art integration in education", "Public speaking",
