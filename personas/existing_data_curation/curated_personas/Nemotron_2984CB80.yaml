  hobbies: '["Watercolor painting of historic architecture", "Volunteer docent at local museums", "Birdwatching in coastal preserves", "Gardening native Floridian plants", "Attending community theater productions",
    "Participating in intergenerational storytelling circles", "Exploring historic sites in St. Augustine", "Reading historical biographies"]'
  career_goals: Now approaching retirement, Charles aims to leave a lasting legacy by establishing an intergenerational learning hub that brings seniors and preschoolers together through shared art projects,
    storytelling, and horticulture. He hopes to serve as a consultant for district-wide arts integration initiatives, advise on sustainable funding models, and create a mentorship network for future education
    administrators. His ultimate ambition is to see the community’s cultural heritage celebrated in everyday classrooms and to empower younger educators to adopt flexible, compassion‑driven leadership styles.
