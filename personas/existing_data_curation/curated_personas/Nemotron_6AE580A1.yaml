  career_goals: Albert dreams of turning his love for art and invention into a future career. He hopes to become an illustrator or animation artist who can tell stories through pictures, possibly creating
    his own video games that blend art and science. He also entertains the idea of becoming an architect or engineer to design imaginative spaces. Ultimately, he wants to inspire other children to explore
    their creativity while contributing positively to his community.
