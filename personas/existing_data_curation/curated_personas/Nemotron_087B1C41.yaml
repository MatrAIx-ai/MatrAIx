  hobbies: '[''reading personal finance and technology'', ''playing basketball'', ''cooking Salvadoran cuisine'', ''hiking'', ''volunteering in youth mentorship'', ''listening to podcasts'', ''experimenting
    with fusion cooking'']'
  career_goals: He aims to move from top‑performing agent to a leadership role within his agency, targeting a position as a team supervisor or regional sales manager within the next three years. Erick plans
    to earn the Chartered Property‑Casualty Underwriter (CPCU) and Certified Life Underwriter (CLU) designations to deepen his technical expertise. Long‑term, he envisions launching his own boutique insurance
    brokerage that focuses on serving the Hispanic community in Nassau County, leveraging his cultural insight and network to provide tailored financial protection solutions.
