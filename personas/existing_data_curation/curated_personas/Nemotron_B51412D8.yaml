personas:
  professional: Flor Santos is a veteran CNC machine operator turned safety trainer, leveraging three decades of lean manufacturing expertise and bilingual communication to mentor new hires, design a formal
    safety‑trainer curriculum, and apply practical DIY problem‑solving to improve plant morale and efficiency.
  sports: Flor Santos enjoys weekend hikes on the Sierra foothill trails, supports the Sacramento River Cats baseball team, follows the Golden State Warriors with fervor during playoffs, and participates
    in a community walking club that meets at the county park each Saturday morning.
  arts: Flor Santos finds creative escape in knitting and crocheting intricate shawls inspired by traditional patterns, regularly attends performances by local folk music group Los Ríos, admires the works
    of a renowned Latin American painter celebrated for emotional depth, and delights in watching classic films from their cultural roots starring iconic actresses during family movie nights.
  travel: Flor Santos prefers relaxed road trips to historic towns known for vibrant festivals, such as a colorful hillside village in the south and the coastal charm of Carmel-by-the-Sea, plans itineraries
    months in advance to include visits to local markets and community celebrations, but now limits long‑haul flights due to health concerns and a desire to stay close to family.
  culinary: Flor Santos is a passionate home chef who perfects mole using roasted chiles, chocolate, and fresh hoja santa from the garden, crafts tangy salsa verde with tomatillos and cilantro, and experiments
    with farm‑to‑table twists like grilled avocado tacos topped with crumbled queso fresco.
  core: Flor Santos blends seasoned manufacturing insight with a heartfelt dedication to family‑centered cooking, balancing meticulous safety training and emotional sensitivity while nurturing a garden
    oasis and dreaming of a roadside catering stall.
background:
  cultural: Flor was born in Mexico and moved to California as a child, growing up within a bicultural Mexican‑American household in El Dorado County. She maintains strong ties to Mexican traditions such
    as Día de los Muertos, quinceañeras, and family gatherings centered around food and music. Fluent in Spanish, she often incorporates Mexican idioms and values of respeto (respect) and familismo (family
    loyalty) into her daily interactions. While fully integrated into American life, she embraces both cultures, blending Mexican culinary heritage with local Californian influences and participating in
    community events that celebrate her dual identity.
attributes:
  skills: '[''CNC machine operation'', ''Assembly line workflow'', ''Quality control and inspection'', ''Lean manufacturing (Kaizen)'', ''Process troubleshooting'', ''Safety compliance and training'', ''Bilingual
