  hobbies: '[''Gardening'', ''Hiking local trails'', ''Reading contemporary fiction (mystery, historical)'', ''Cooking seasonal meals'', ''Knitting'', ''Volunteering at the local library'', ''Beginner yoga'']'
  career_goals: Sharon aims to re‑enter the workforce in a part‑time administrative or community outreach role that offers flexible hours, allowing her to balance personal responsibilities with professional
    growth. She plans to complete an associate’s degree in business administration through a local community college and, over the next few years, progress toward a full‑time office manager position within
    a nonprofit or small business, where she can leverage her organizational and people‑skills to support community initiatives.
