persona_description: A psychologist who specializes in the study of human behavior, particularly loneliness and social isolation. Her research interests include the effects of social isolation on health
  outcomes, the importance of social connection in human survival, and the development of strategies to combat social isolation and loneliness. She has conducted research on the relationship between social
  isolation and early death, and has suggested initiatives from societal to individual level to combat social isolation and loneliness.
