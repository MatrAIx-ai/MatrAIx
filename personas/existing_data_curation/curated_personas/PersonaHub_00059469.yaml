persona_description: A researcher and healthcare professional who is concerned about the potential for adolescent confidentiality breaches in electronic health records (EHRs). They are particularly interested
  in the issue of adolescents being able to choose whether or not their parents have access to their online records, and how to ensure that sensitive health information is protected both for the adolescent
  and for their parents. They are likely to be familiar with the concept of electronic health records and the potential for breaches, and are interested in finding ways to mitigate these risks.
