personas:
  professional: Sharon Taylor, a retired senior‑center volunteer who now leads a monthly craft workshop, blends their meticulous budgeting, first‑aid knowledge, and digital‑communication skills to create
    reliable, well‑organized sessions while quietly battling the anxiety that sometimes flares when new technology glitches arise.
  sports: Sharon Taylor enjoys low‑impact fitness through sunrise walks along the Gulf shoreline, belongs to a senior walking club that cheers on the Miami Marlins during spring training, and occasionally
    watches the Tampa Bay Buccaneers with their church fellowship group.
  arts: Sharon Taylor spends evenings knitting scarves while listening to Dolly Parton and John Denver, loses themselves in historical novels by Ken Follett and Philippa Gregory, and watches classic films
    starring Meryl Streep on the local community theater’s senior matinee.
  travel: Sharon Taylor prefers carefully planned road trips to historic Gulf‑Coast towns like St. George Island and New Orleans, enjoys a yearly cruise to the Caribbean for bird‑watching excursions, and
    dreams of visiting the historic sites of Savannah’s Savannah River district.
  culinary: Sharon Taylor excels at baking their family’s signature key‑lime pie and peach cobbler, cooks shrimp gumbo with fresh Gulf fish, favors ingredients like citrus zest, locally sourced shrimp,
    and sweet corn, and treats their knitting club gatherings with warm catfish croquettes.
  core: Sharon Taylor is a structured, community‑spirited retiree who channels their anxiety into meticulous garden care, craft workshops, and a well‑budgeted life peppered with occasional impulsive yarn
    purchases.
background:
  cultural: Sharon’s cultural background is that of a white, Anglo‑American family who grew up in the mid‑South and later settled in Florida’s retirement communities. Her upbringing emphasized traditional
    family values, self‑reliance, and community involvement centered around her local Protestant church. These cultural influences shape her practical approach to daily life, appreciation for hospitality,
    and her preference for close‑knit social circles.
attributes:
  skills: '[''Home budgeting and bill management'', ''Meal planning and cooking'', ''Gardening and plant care'', ''Basic sewing and mending'', ''Home organization and decluttering'', ''First aid and emergency
    preparedness'', ''Basic computer use (email, video calls)'', ''Community volunteer coordination'']'
  hobbies: '[''Gardening'', ''Knitting'', ''Baking'', ''Reading historical fiction'', ''Crossword puzzles'', ''Walking on the beach'', ''Birdwatching'', ''Church fellowship'', ''Volunteering at the senior
    center'']'
  career_goals: Although retired, Sharon aims to remain active and purposeful. She plans to deepen her involvement with the local seniors' center by leading a monthly craft workshop and organizing a buddy‑system
    for neighbors coping with anxiety. She also hopes to improve her digital literacy to maintain stronger connections with her children and grandchildren, and to document family recipes and stories in
    a small memoir for future generations. Additionally, she aspires to maintain the health and stability of her household finances and to ensure her home remains a safe, organized space.
