  hobbies: '[''Church choir participation'', ''Book club member'', ''Women’s softball league'', ''Trivia night organizer/competitor'', ''Bridge card game club'', ''Vegetable gardening'', ''Quilting with
    a local circle'', ''Cooking traditional Southern dishes'']'
  career_goals: Beverly’s primary career ambition is to translate her extensive volunteer and household management experience into a paid position that offers a predictable schedule and allows her to exercise
    her organizational strengths. She is actively seeking part‑time or flexible administrative roles within local businesses, non‑profits, or the county health department where she can manage calendars,
    process paperwork, and coordinate small‑scale events. Concurrently, she plans to complete a certification in Project Management (CAPM) and enroll in night courses to obtain a bachelor’s degree in Business
    Administration, positioning herself for future advancement to a community program coordinator. Additionally, she aspires to launch a modest home‑based catering service, specializing in traditional Southern
    comfort food for church gatherings and local festivals, with the goal of achieving financial self‑sufficiency and earning recognition for her culinary reliability and efficiency.
