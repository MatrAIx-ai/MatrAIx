personas:
  professional: Beverly Noel is a seasoned volunteer coordinator transitioning into a part‑time administrative role, leveraging her meticulous organization, Excel expertise, and competitive drive to streamline
    schedules and events for local nonprofits while balancing flexibility with her love of routine.
  sports: Beverly Noel competes on a women’s softball team in the River Valley League, cheers for the Atlanta Falcons on Sundays, and attends weekly yoga classes at the community center to balance her competitive
    spirit with low‑impact fitness.
  arts: Beverly Noel sings alto in her church choir, enjoys quilting patterns inspired by traditional Southern quilt blocks, reads Agatha Christie mysteries, and is a fan of gospel legend Kirk Franklin
    and classic film star Meryl Streep, weaving these influences into her creative leisure.
  travel: Beverly Noel favors road trips to historic Southern cities like Charleston, Savannah, and New Orleans, often planning itineraries months in advance and traveling with her church choir or family,
    while dreaming of a Caribbean cruise for a break from routine.
  culinary: Beverly Noel specializes in Southern comfort dishes such as chicken fried steak, collard greens with smoked turkey, and pecan pie, maintains a pantry stocked with okra, grits, and buttermilk,
    and enjoys batch cooking for potlucks, though she sometimes over‑salts recipes in her quest for the perfect flavor.
  core: Beverly Noel blends a love for schedule‑driven community service with a competitive edge, meticulously budgeting her life while never skipping a chorus rehearsal, even if it means occasional over‑cooking
    and missed flossing.
background:
  cultural: Beverly’s cultural background is rooted in the rural Southern traditions of East Tennessee. She grew up in a close‑knit white community where family ties, church involvement, and hospitality
    are central. The region’s emphasis on practical self‑reliance and modesty shaped her traditional values and preference for routine. Local customs such as Sunday worship at the evangelical Baptist church,
    community potluck meals, and seasonal festivals like the Meigs County Harvest Fair are integral to her identity. While she embraces broader American cultural norms, she retains a strong connection to
    Southern etiquette, culinary heritage, and a communal spirit that prioritizes mutual support and neighborly cooperation.
attributes:
  skills: '[''Event planning and coordination'', ''Administrative support'', ''Microsoft Office (Word, Excel, Outlook)'', ''Basic bookkeeping'', ''Community volunteer management'', ''Vendor negotiation'',
