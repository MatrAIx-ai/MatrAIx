  career_goals: As he approaches the next phase of his career, Tod aims to steward a smooth leadership transition by identifying and grooming a successor while remaining active as a board chair or senior
    advisor to ensure strategic continuity. He seeks to expand his company's footprint into sustainable products and green technologies, aligning profitability with environmental stewardship. Tod also aspires
    to establish a philanthropic foundation that supports regional arts education and community cultural programs, leveraging his network to create enduring impact. Additionally, he hopes to author a memoir
    sharing leadership lessons that blend business acumen with his artistic curiosity.
