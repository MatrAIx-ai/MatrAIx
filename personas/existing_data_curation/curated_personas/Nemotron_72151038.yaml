personas:
  professional: Tod Loving, a retired chief executive turned senior advisor, blends decades of strategic leadership, corporate governance, and digital transformation expertise with a genuine curiosity for
    the visual arts; they apply a cooperative and balanced approach to mentor emerging leaders, steer boardrooms toward sustainable innovation, and embed creative problem‑solving into disciplined execution.
  sports: Tod Loving, an avid weekend angler on Pewaukee Lake, follows the Milwaukee Brewers and Bucks, participates in the local senior bowling league, and keeps fit with low‑impact rowing and gentle hikes
    through state parks; they balance social interaction at the bowling alley with solitary sunrise fishing outings.
  arts: Tod Loving, a board member of the Pewaukee Community Arts Center, curates a modest collection of contemporary works by artists like Jeff Koons, Kerry James Marshall, and local Wisconsin painter
    Noah Rupert, frequents traveling exhibitions at the Milwaukee Art Museum—including the recent "Impressionism Reimagined" showcase—and they volunteer to lead art‑history discussion groups, merging their
    curiosity and appreciation for unconventional perspectives with community service.
  travel: Tod Loving, a seasoned Midwestern explorer, plans weekend drives to Door County’s lighthouses and state‑park trails, regularly visits Chicago’s museum district for special shows, and earmarks
    an annual trip to Florence, Italy, to study Renaissance frescoes and sample Tuscan Chianti; they balance a modest retirement budget with a love for both local nature retreats and international art pilgrimages.
  culinary: Tod Loving, an enthusiastic home cook, blends fresh garden vegetables—like heirloom tomatoes, zucchini, and purple potatoes—into Wisconsin‑style fish tacos featuring perch from Pewaukee Lake,
    pairs the dishes with Riesling and a splash of locally brewed IPA, while they occasionally over‑season in a quest for bold flavor, a habit that sometimes results in a smoky kitchen.
  core: Tod Loving fuses executive discipline with artistic curiosity, navigating boardrooms, garden beds, and lake mornings with equal precision and quiet wonder, and they approach each day as a canvas
    for balanced growth.
background:
  cultural: Tod grew up in the Milwaukee suburbs during the post‑war boom, immersed in a Midwestern white middle‑class environment shaped by German‑Scandinavian heritage and a Protestant work ethic. The
    community emphasized modesty, reliability, and civic participation—values that permeated his upbringing and later business philosophy. Wisconsin’s strong tradition of local arts patronage, co‑ops, and
    community festivals nurtured his early appreciation for culture. He maintains ties to the region’s charitable networks and values the balance of hard work with quality of life that characterizes the
    Upper Midwest.
