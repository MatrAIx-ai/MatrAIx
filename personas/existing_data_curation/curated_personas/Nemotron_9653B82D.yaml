  career_goals: Tyler aspires to pursue a degree in community development or social work, blending his curiosity for people with practical, hands‑on solutions. He aims to secure a role in community outreach,
    non‑profit program coordination, or hospitality management where he can use his sociable nature to build connections and support others. Long‑term, he envisions leading larger community initiatives
    that promote harmony and provide tangible resources for underserved populations, while still maintaining flexibility to explore new ideas and skill sets.
