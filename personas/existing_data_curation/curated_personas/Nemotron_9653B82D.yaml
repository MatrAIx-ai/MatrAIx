personas:
  professional: Tyler Poierier is an aspiring community development coordinator who leverages their natural charisma, conflict‑mediating skills, and experience in event organization to foster inclusive
    neighborhood programs, while juggling a part‑time hospitality job to fund their studies.
  sports: Tyler Poierier is a dedicated ultimate frisbee player for the Birmingham Skyhawks, an avid fan of the Alabama Crimson Tide, a regular hiker at Oak Mountain State Park, and a weekend volunteer
    coach for youth soccer, balancing competitive spirit with community camaraderie.
  arts: Tyler Poierier immerses themselves in Birmingham's live‑music scene, attending shows by The Black Keys and local soul bands, rolling dice in weekly Dungeons & Dragons sessions, and frequenting the
    Alabama Theatre for classic film screenings, all of which fuel their love for collaborative storytelling.
  travel: Tyler Poierier prefers spontaneous road trips, having explored Nashville's music districts, Asheville's craft breweries, and the Great Smoky Mountains, while dreaming of a future visit to New
    Orleans' vibrant festivals, all planned on a modest budget using last‑minute Airbnb deals.
  culinary: Tyler Poierier combines Southern comfort cooking with experimental twists—perfecting crispy fried chicken, buttery biscuits, and peach cobbler, while adding unexpected ingredients like chipotle
    honey glaze and Cajun spices, and they often host potluck nights for friends at their apartment.
  core: Tyler Poierier is a sociable, community‑focused 23‑year‑old who balances a love for Southern hospitality, spontaneous adventure, and meticulous organization, yet sometimes forgets to sleep after
    late‑night concert outings.
background:
  cultural: Tyler grew up in the deep South, specifically Birmingham, Alabama, where a mix of traditional Southern hospitality, community gatherings, and a strong sense of local identity shaped his worldview.
    Raised in a predominantly white, working‑class neighborhood, he was exposed to Southern customs such as family barbecues, football Sundays, and a reverence for regional cuisine like fried chicken and
    biscuits. At the same time, his high school encouraged participation in diverse clubs and community service, giving him exposure to broader cultural perspectives and fostering an inclusive, cooperative
    mindset. This blend of Southern roots and modern, multicultural influences informs his values of compassion, cooperation, and community harmony.
