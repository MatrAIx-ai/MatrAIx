  hobbies: '[''Hiking'', ''Mountain Biking'', ''Cooking South Asian Cuisine'', ''Yoga'', ''Reading Logistics & Self‑Improvement Books'', ''Watching Cricket'', ''Playing Strategic Board Games'', ''Volunteering
