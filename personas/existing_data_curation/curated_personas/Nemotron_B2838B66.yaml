  career_goals: Sookdeo aims to transition from a hands‑on stocker role into a supervisory position within the supply‑chain segment of a retail or distribution company. In the short term, he plans to obtain
    a Certified Forklift Operator credential and enroll in a part‑time Business Administration program to earn a bachelor's degree. He also hopes to gain a certification such as the Certified Supply Chain
    Professional (CSCP) to deepen his analytical expertise. Over the next five to ten years, his ambition is to become a warehouse manager or logistics coordinator, overseeing teams, optimizing processes,
    and contributing to cost‑saving initiatives. Ultimately, he envisions leveraging his experience and cultural connections to launch a small business importing specialty South Asian food products to the
    Boulder area.
