persona_description: A University professor who specializes in the study of liturgy, particularly the Latin language and the solemn celebration of the liturgy. His research interests include, but are not
  limited to, the history and development of the Latin liturgy, the use of Latin in the liturgy, and the role of the Latin language in the Catholic Faith. He is a strong advocate for the use of Latin in
  the liturgy and believes that it is a way to raise the faith above the level of the everyday. He is also interested in the history of the Latin liturgy and the use of Latin in the Catholic Church.
