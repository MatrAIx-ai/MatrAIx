  skills: '[''reading comprehension'', ''basic arithmetic'', ''drawing and sketching'', ''organizing personal items'', ''following routines'', ''small-group collaboration'', ''presenting ideas verbally'']'
  hobbies: '[''drawing'', ''watercolor painting'', ''LEGO building'', ''museum visits'', ''reading picture books'', ''science kit experiments'', ''organizing collections'']'
  career_goals: She aspires to a future where she can blend her love for art and discovery—dreaming of becoming a scientist‑artist who invents creative solutions, a museum curator who showcases unique artifacts,
    or an astronaut exploring the cosmos. Berenice is determined to earn top grades, lead collaborative projects, and continue developing her disciplined work habits.
