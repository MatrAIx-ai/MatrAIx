personas:
  professional: Berenice Alexander, a budding junior scientist who loves building intricate LEGO inventions and sketching space rockets, channels their curiosity and disciplined organization into meticulous
    project notebooks, and they proudly share findings during school science fairs.
  sports: Berenice Alexander, an enthusiastic youth soccer player with the Edmond Youth Soccer Club who practices after school, cheers for the Oklahoma City Thunder during weekend games, and they also love
    hiking the nearby trails of the Red Rock Canyon during family outings.
  arts: Berenice Alexander, a dedicated watercolor painter inspired by the whimsical illustrations of Dr. Seuss and the vibrant palettes of Mary Blair, spends afternoons arranging stuffed animals as models
    for still‑life sketches and they eagerly attend the local museum’s Friday family art workshops.
  travel: Berenice Alexander, a curious explorer who has visited the Oklahoma City Zoo, taken a family road trip to the Grand Canyon, and dreams of seeing the National Air and Space Museum in Washington,
    D.C., they plan future trips with colorful stickers on a travel map.
  culinary: Berenice Alexander, a budding home chef who adores making banana‑peanut butter smoothies, meticulously measures ingredients for chocolate chip cookies, and they occasionally sneak a bite of
    extra cheese pizza before dinner.
  core: Berenice Alexander, a seven‑year‑old organizer with a love for LEGO, watercolors, and meticulous detail, they balance curiosity with a quiet confidence, often arranging their world in neat rows
    and occasionally losing track of time in a single‑piece experiment.
background:
  cultural: Berenice is raised in a suburban, Midwestern American family in Edmond, Oklahoma. Her upbringing reflects a community‑oriented environment that values education, modest participation in local
    traditions such as county fairs and holiday celebrations, and an appreciation for regional art and nature. Her parents encourage curiosity, disciplined effort, and respect for diverse ideas while nurturing
    her individuality.
