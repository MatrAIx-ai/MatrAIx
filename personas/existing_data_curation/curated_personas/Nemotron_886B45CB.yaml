    written and verbal communication'']'
  hobbies: '[''Hiking in local parks'', ''Group yoga classes'', ''Community theater volunteering'', ''Book club participation'', ''Cooking and recipe experimentation'', ''Board game nights'', ''Photography'',
    ''Attending art and wine festivals'']'
  career_goals: Jodiann aims to progress into a senior supervisory role within casino security, eventually becoming a security manager or shift supervisor. She plans to obtain the Certified Protection Officer
    (CPO) credential and explore a Master's degree in Security Management to deepen her strategic expertise. Her short‑term goal is to lead a team of surveillance officers, develop comprehensive security
    protocols, and mentor new staff. Long‑term, she envisions specializing in fraud detection and regulatory compliance, possibly transitioning to a compliance officer role or launching a private security
    consultancy focused on the gaming industry.
