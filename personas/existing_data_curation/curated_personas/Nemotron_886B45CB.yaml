personas:
  professional: Jodiann Ragan is a seasoned casino surveillance specialist with a liberal‑arts background, excelling at real‑time threat assessment, CCTV analysis, and detailed incident reporting, while
    leveraging strong written communication and liaison skills to train new officers and coordinate with law‑enforcement and management, all in pursuit of a senior security manager role, the Certified Protection
    Officer credential, and a future master’s degree in security management.
  sports: Jodiann Ragan is a regular participant in Saturday morning hikes at Mount Diablo, a weekly yoga enthusiast at a local studio, a devoted fan of the Golden State Warriors and San Francisco 49ers,
    and a member of a casual co‑ed recreational soccer league that meets on weekday evenings.
  arts: Jodiann Ragan immerses themselves in the Bay Area arts scene by volunteering at the Walnut Creek Art & Wine Festival, attending quarterly performances of “Hamilton” at the SHPE Theater, collecting
    prints by Anish Kapoor, and discussing contemporary fiction like “The Vanishing Half” at a lively book club.
  travel: Jodiann Ragan prefers weekend road trips that blend adventure and relaxation, such as exploring the vineyards of Napa Valley, hiking the trails of Lake Tahoe in winter, and dreaming of a cultural
    immersion tour of Kyoto’s temples, while meticulously planning itineraries using a spreadsheet to balance time with family commitments.
  culinary: Jodiann Ragan enjoys moderate‑level cooking, often experimenting with miso‑glazed salmon, roasted vegetable lasagna, and homemade kimchi, while sourcing fresh herbs from their backyard garden
    and pairing dishes with a curated selection of regional California wines, though they have a guilty habit of snacking on late‑night chips while proofreading incident reports.
  core: Jodiann Ragan is a structured yet sociable security professional who balances disciplined budgeting, proactive health habits, community‑driven arts involvement, and a love for hiking, yoga, and
    experimental cooking, all tempered by a penchant for occasional indulgent splurges and late‑night snack cravings.
background:
  cultural: Jodiann grew up in a suburban, middle‑class family in the San Francisco Bay Area. As a white American with family roots in New England and the Midwest, her upbringing combined traditional American
    holidays, community involvement, and a strong work ethic. Living in Walnut Creek, a city known for its diverse population and vibrant arts scene, she has been exposed to a broad range of cultural experiences,
    from local festivals to museum visits. Her liberal‑arts degree fostered an appreciation for literature, history, and the arts, which she integrates into her life through regular attendance at theater
    performances, art exhibitions, and cultural events. She values the West Coast emphasis on work‑life balance, civic engagement, and environmental stewardship.
attributes:
  skills: '[''CCTV monitoring and video analysis'', ''Threat assessment and situational awareness'', ''Incident reporting and documentation'', ''De-escalation and conflict resolution'', ''Compliance with
