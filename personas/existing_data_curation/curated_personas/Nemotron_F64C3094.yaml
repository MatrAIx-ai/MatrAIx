personas:
  professional: Norman Estis, a three‑year‑old who proudly assumes the role of "preschool project leader" during free‑play, channels a love for organization and spontaneous creativity to guide peers in
    building block towers and story‑dramatics, while their talkative nature makes them the center of attention and their underlying worry sometimes flutters when routines shift.
  sports: Norman Estis, a three‑year‑old enthusiastic member of the Tiny Tykes Soccer Club, loves sprinting in the preschool’s mini‑soccer drills, cheers for the hometown MLB team the River City Rangers,
    and proudly wears a miniature cap of the city’s NBA squad, the River City Raptors, during family game nights.
  arts: Norman Estis, a three‑year‑old who delights in drawing with Crayola crayons while humming Raffi’s "Baby Beluga" and the catchy tunes of The Wiggles, is fascinated by Disney’s animated classics and
    enjoys listening to Beethoven’s "Für Elise" on a child‑friendly music player, often staging impromptu performances for family members.
  travel: Norman Estis, a three‑year‑old adventurous traveler who enjoys family road trips to the sunny beaches of Miami, weekend excursions to the aquarium in Boston, and a magical day at Orlando’s Magic
    Kingdom, eagerly plans future adventures to Tokyo’s KidZania with a sunny imagination.
  culinary: Norman Estis, a three‑year‑old with a penchant for bite‑size comfort foods like chicken nuggets, macaroni and cheese, and banana pancakes, loves to sprinkle shredded cheese on everything, enjoys
    apple slices with honey, and proudly helps stir pancake batter with a plastic spoon while occasionally refusing broccoli.
  core: Norman Estis is a bright, talkative three‑year‑old whose curiosity, love for attention, and occasional worries shape a lively world of play, art, and miniature leadership.
background:
  cultural: Norman is raised in a white, working‑class family in East Saint Louis, Illinois. His family’s daily life reflects Midwestern values of community, modesty, and often involvement in a local church.
    He attends a neighborhood preschool that offers art and music programs, and he frequently participates in community events at the nearby community center and public library. The multicultural surroundings
    of East Saint Louis expose him to a mix of traditions, foods, and celebrations, fostering his early appreciation for diverse artistic expressions and reinforcing his sociable, curious personality.
attributes:
  skills: '["using crayons and markers", "drawing simple pictures and identifying colors", "stacking blocks and constructing towers", "forming sentences and telling short stories", "following multi‑step
    instructions", "initiating and sharing in play with peers", "basic self‑care such as feeding and dressing"]'
  hobbies: '["coloring with crayons", "building block structures", "listening to children’s songs", "dancing to music", "pretend play with stuffed animals", "exploring the neighborhood park", "attending
    library storytime", "watching animated shows"]'
  career_goals: Norman’s big dreams are bright and imaginative. He often says he wants to be an artist who paints vibrant pictures for everyone, a storyteller who makes friends laugh, or a performer who
    sings and dances on stage. He also imagines exploring places like a museum or a park and helping other children learn through games. His love of attention and sociable nature fuels a desire to be a
    friend and a little leader in his circle of playmates.
