persona_description: A historian who specializes in the study of ancient civilizations, particularly those that existed in Mesopotamia. She is interested in the rise and fall of civilizations, the impact
  of external invasions and the survival of civilizations in the face of catastrophe. She has a deep understanding of the Sumerian language and culture, and is knowledgeable about the events that led to
  the fall of Ur and the subsequent decline of the civilization. She is also interested in the impact of the end of the world on the survivors and the way they remembered and documented the event.
