  career_goals: Anna aims to earn her CPA certification within the next three years and move into a senior accountant or audit supervisor position at a midsize firm, where she can mentor junior staff and
    lead process‑improvement initiatives. In the longer term, she envisions launching a boutique bookkeeping consultancy that serves artists, galleries, and cultural nonprofits, allowing her to blend financial
    expertise with her passion for the arts. Additionally, she hopes to become a recognized speaker on financial literacy for small businesses in the Peoria region, leveraging her sociable nature to educate
    and inspire the community.
