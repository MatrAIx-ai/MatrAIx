  hobbies: '[''Hiking'', ''Nature photography'', ''Reading historical fiction'', ''Philosophy'', ''Acoustic guitar playing'', ''Gardening'', ''Cooking'', ''Volunteering at a food bank'', ''Journaling'',
    ''Mindfulness meditation'', ''Board games with friends'']'
  career_goals: Jeremy aims to advance from his current residential advisor role to a senior leadership position such as Director of Residence Life, where he can shape campus housing policy and champion
    student well‑being initiatives. He plans to earn a master's degree in Higher Education Administration or Student Affairs to deepen his expertise in organizational leadership and mental‑health programming.
    Long‑term, he aspires to develop a comprehensive wellness framework for residential communities that integrates stress‑reduction workshops, peer‑support networks, and evidence‑based crisis response,
    thereby creating a more harmonious and resilient campus environment.
