    curriculum development'']'
  hobbies: '[''Gardening'',''Quilting'',''Reading historical fiction'',''Hiking'',''Cooking family meals'',''Church potluck participation'',''Volunteering at senior center'',''Organizing community health
    fairs'']'
  career_goals: Laurine aims to transition into a nurse manager role within the next two years, focusing on building a culture of safety and structured workflow on her unit. She plans to pursue a Master’s
    degree in Nursing Leadership to deepen her knowledge of health systems management and to obtain certification in Quality and Safety. Long‑term, she envisions becoming a clinical educator who designs
    onboarding programs that blend practical skill development with evidence‑based practice, and she hopes to spearhead community outreach initiatives that improve chronic disease management for seniors
    in Rochester.
