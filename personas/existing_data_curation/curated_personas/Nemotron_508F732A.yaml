personas:
  professional: Laurine Ricca, a veteran registered nurse who thrives on structured workflows and evidence‑based care, leverages their practical expertise in patient assessment, Epic documentation, and
    quality‑improvement to mentor staff, reduce medication errors, and steer the unit toward a safety‑focused culture as they prepare for a nurse manager role.
  sports: Laurine Ricca enjoys weekly hikes along the Genesee River Gorge with the Rochester Trailblazers Hiking Club, supports the Rochester Red Wings minor‑league baseball team, and they stay active by
    joining a community frisbee league on Saturdays.
  arts: Laurine Ricca expresses creativity through quilting with intricate Art Nouveau motifs, delves into historical fiction by Ken Follett and biographies by Doris Kearns Goodwin, and they regularly attend
    Rochester Philharmonic Orchestra performances of Beethoven’s Ninth and local Shakespeare Company productions.
  travel: Laurine Ricca prefers well‑planned cultural trips, having explored the historic streets of York, England and the Gettysburg battlefields, while they daydream about a weekend wine‑tasting retreat
    in the Finger Lakes and a future pilgrimage to Normandy’s D‑Day beaches.
  culinary: Laurine Ricca enjoys cooking wholesome family meals, often featuring garden‑fresh vegetables in dishes like rosemary‑infused roasted chicken, quinoa‑stuffed bell peppers, and a seasonal mushroom
    risotto, and they delight in experimenting with fresh basil and thyme harvested from their own herb patch.
  core: Laurine Ricca is a meticulous nurse‑leader who balances disciplined planning with a love for quilting patterns, garden cycles, and historical narratives, while they occasionally indulge in impulsive
    fabric splurges and cherish quiet evenings on solitary hikes.
background:
  cultural: Laurine was raised in a small Midwestern town in a family of Italian heritage, blending traditional Italian customs with the “Minnesota nice” ethos of politeness, reliability, and community
    service. Her upbringing emphasized modesty, a strong work ethic, and mutual support, values that are reflected in her collaborative nursing style. She celebrates holidays such as Christmas and Thanksgiving
    with extended family, often preparing multi‑generational meals that honor both her Italian roots and Midwestern traditions. Active in her local Catholic parish, Laurine participates in volunteer ministries,
    reinforcing her commitment to caring for others and maintaining harmonious relationships.
attributes:
  skills: '[''Acute care nursing'',''Patient assessment'',''IV therapy and medication administration'',''Wound care and pressure ulcer prevention'',''Electronic health record management (Epic)'',''Care
