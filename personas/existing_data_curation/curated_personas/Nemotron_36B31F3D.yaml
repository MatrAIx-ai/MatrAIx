  career_goals: Kenley aims to leave a lasting legacy that fuses functionality with artistic expression in Cleveland’s built environment. She aspires to champion sustainable redevelopment projects that
    incorporate local art installations and to establish a scholarship for women pursuing construction management. As she transitions toward semi‑retirement, her ambition is to serve as a consultant and
    mentor, guiding the next generation of builders, advocating for inclusive workplace cultures, and documenting her pioneering experiences in a memoir that inspires others to pursue unconventional paths
    in the industry.
