    User 1: Me too! I just went camping last weekend.

    User 2: Where did you go camping?

    User 1: I went camping in the mountains. It was so peaceful and beautiful.

    User 2: That sounds amazing! I love the mountains.

    User 1: Yeah, me too.

    User 2: What else do you like to do for fun?

    User 1: I also like to read, watch movies, and go to the gym.

    User 2: I like to read too. What are some of your favorite books?

    User 1: I like to read all sorts of books, but I''m really into historical fiction right now.

    User 2: That sounds interesting. I''ll have to check it out.

    User 1: Yeah, you should. It''s really good.

    User 2: Thanks for the recommendation.

    User 1: You''re welcome.

    User 2: So, what are you doing this weekend?

    User 1: I''m not sure yet. What are you doing?

    User 2: I''m going to go hiking with my dogs. Do you want to come?

    User 1: That sounds like fun! I''d love to come.

