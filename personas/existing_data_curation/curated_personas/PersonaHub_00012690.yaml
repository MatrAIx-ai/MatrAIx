persona_description: A researcher interested in the study of the interactions between hydrology, weathering, and landscape variables in high-latitude watersheds, particularly in the taiga and tundra ecoregions
  of Northern Sweden. This person is likely to be interested in the effects of thawing permafrost soils on the carbon sink, the role of vegetation-covered riparian zones in river loading, and the impact
  of damming on dissolved silica fluxes in oligotrophic river systems. This person may have expertise in hydrological mixing models, soil carbon accumulation, and the effects of climate change on terrestrial
  ecosystems.
