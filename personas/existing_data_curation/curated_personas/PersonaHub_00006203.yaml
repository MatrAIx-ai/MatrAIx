persona_description: A professional interpreter who specializes in translating spoken words and meaning from one language to another, often in a multinational or expatriate environment. They have excellent
  language skills and can quickly analyze and understand the nuances of the target language to ensure seamless and accurate communication. The interpreter is often required to jump between registers and
  cultures, making them skilled in both the source and target languages. They are also adept at interpreting spoken and sign language communication, making them versatile and essential in various settings.
  The interpreter is known for their ability to handle complex language challenges and maintain professionalism in a multicultural environment.
