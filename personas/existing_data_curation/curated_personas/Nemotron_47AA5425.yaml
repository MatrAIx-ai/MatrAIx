personas:
  professional: Beth Rocke, a meticulous senior accountant with three decades of forensic accounting, audit, and regulatory compliance expertise, channels her curiosity for new analytical tools into data‑driven
    financial insights while leveraging her methodical, organized nature to train junior staff and deliver clear reports for corporate clients and local nonprofits alike.
  sports: Beth Rocke maintains a gentle fitness routine that includes weekly walks with her bird‑watching group at Tyler State Park, attends the Doylestown Seniors’ Yoga class each spring, and follows the
    Philadelphia Eagles football and Philadelphia Phillies baseball teams from their backyard patio.
  arts: Beth Rocke nurtures their artistic side by devouring historical fiction by Hilary Mantel, attending performances by the Philadelphia Orchestra, and curating a small collection of Andrew Wyeth prints
    that adorn the walls beside their hand‑stitched quilts.
  travel: Beth Rocke prefers carefully planned weekend road trips, such as recent visits to the National Museum of American History in Washington, D.C., the historic battlefield at Gettysburg, and a charming
    B&B in Annapolis, while dreaming of a spring pilgrimage to Williamsburg’s colonial streets and the gardens of Longwood Gardens.
  culinary: Beth Rocke delights in crafting experimental dishes like heirloom tomato gazpacho with basil‑infused olive oil, roasted beet and goat‑cheese salad drizzled with honey‑maple vinaigrette, and
    a slow‑cooked lamb shank seasoned with rosemary and lavender, all sourced from the local farmers’ market.
  core: Beth Rocke blends a razor‑sharp accounting mind with a gardener’s love for seasonal cycles, turning every spreadsheet into a garden plot and every bridge game into a strategic audit.
background:
  cultural: Beth was raised in the suburban‑rural environment of Doylestown, PA, a region steeped in Quaker heritage and early American history. Her family roots trace back to German and Irish immigrants
    who settled in the Mid‑Atlantic during the 19th century, instilling values of hard work, reliability, and community service. Growing up, she attended local public schools and participated in community
    events such as county fairs and church gatherings, fostering a strong sense of modesty and civic responsibility. While she identifies with mainstream white American culture, she also appreciates the
    diverse perspectives of the wider Bucks County area, integrating traditional values with a practical openness to new ideas.
