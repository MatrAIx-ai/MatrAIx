personas:
  professional: Cynthia Sole, a budding builder of block towers, exhibits early problem‑solving curiosity and practical ingenuity, often constructing elaborate structures only to knock them down in a competitive
    game, reflecting a playful balance of curiosity and pragmatism.
  sports: Cynthia Sole, a regular participant in the neighborhood toddler gymnastics class and an enthusiastic fan of the Green Bay Packers, loves squealing during mini‑soccer drills, while occasionally
    forgetting her water bottle and questioning new drill instructions, showcasing her love for movement and occasional skepticism.
  arts: Cynthia Sole, who delights in singing along to Sesame Street and watching Disney Pixar short films, often draws vivid crayon pictures of Thanksgiving turkeys and Christmas trees, yet sometimes interrupts
    quiet evenings with spontaneous dance breaks, revealing her artistic joy and competitive desire for attention.
  travel: Cynthia Sole, who has explored the nearby state park trails in Wisconsin and taken a family road trip to Chicago’s Navy Pier, prefers spontaneous car rides over strict itineraries, yet secretly
    hopes to see the snowy hills of Vermont, reflecting her flexible travel style and budding sense of adventure.
  culinary: Cynthia Sole, who adores cheese curds, chicken nuggets, and apple sauce, frequently demands extra ketchup at the dinner table and loves smearing peanut butter on everything, a quirky habit that
    highlights her fearless palate and occasional lack of table manners.
  core: Cynthia Sole, a curious yet practical two‑year‑old, transforms everyday play into mini‑ventures, even as scattered toys and sneaky snack cravings betray her love for flexibility and a hint of competitive
    spirit.
background:
