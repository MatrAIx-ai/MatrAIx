persona_description: A public health researcher with expertise in the study of infectious diseases and their transmission. This individual has conducted research on the epidemiology of infectious diseases,
  including the transmission of COVID-19, and is familiar with the long incubation period of the virus. The researcher has experience in collecting and analyzing data to draw conclusions about the source
  of an outbreak, and is skilled in identifying patterns and trends in the data. This individual is also knowledgeable about the concept of asymptomatic transmission of the virus, and is able to draw conclusions
  about the source of an outbreak based on the number of cases and the mode of transmission.
