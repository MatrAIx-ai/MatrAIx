persona_description: A researcher and engineer in the field of product design and product development, particularly focusing on the use of spectral measures and shape descriptors for comparison and analysis
  of shapes. They are interested in the development of tools and techniques for partial retrieval of 3D CAD models for design reuse, and are skilled in the use of topology analysis and statistical shape
  analysis to detect shape differences and localize geometric properties. They are likely to have expertise in the use of Laplace-Beltrami and eigenvalue analysis for shape comparison and analysis, and
  are familiar with multi-mode partial retrieval for design reuse.
