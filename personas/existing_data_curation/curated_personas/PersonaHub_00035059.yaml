persona_description: A tax lawyer who specializes in progressive tax structures and their implementation. They have experience working with flat-rate systems and understand the economic advantages and disadvantages
  of such systems. They are knowledgeable about the concept of average tax rates and how they can be achieved in a progressive tax structure. They are also familiar with the tax code in various states and
  how tax brackets and rates vary across different states. They are skilled in interpreting tax laws and regulations and can advise clients on how to minimize their tax liability while adhering to progressive
  tax principles.
