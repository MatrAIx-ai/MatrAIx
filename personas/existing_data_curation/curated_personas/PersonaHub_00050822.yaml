persona_description: A biologist with expertise in wetland management and restoration, particularly focused on the restoration of floodplain forests and the use of prescribed fire to enhance native grasslands.
  They have experience with the use of water control structures and pumps to mimic natural wet and dry conditions in wetland habitats. They are skilled in conducting research to determine the amount of
  seed and habitat produced by wetland areas, and have experience with predicting the number of waterfowl that could use a certain number of waterfowl on a given lake. They have a passion for wildlife conservation
  and have worked to bring bald eagles back from the brink of extinction.
