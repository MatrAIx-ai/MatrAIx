persona_description: A researcher at the University of Alberta who is focused on the limitations and potential harm of using BMI as a measure of health and weight status, and advocates for a more holistic
  and health-based approach to weight management and disease diagnosis. This persona is interested in understanding the limitations of BMI as a tool for tracking population trends and the potential consequences
  of focusing too much on this metric. They are also interested in the development of more accurate and comprehensive measures of health and weight status, and in the potential benefits of a more holistic
  and health-based approach to weight management and disease diagnosis.
