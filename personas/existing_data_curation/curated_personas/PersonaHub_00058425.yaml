persona_description: A person who is concerned about the health and safety of their loved ones and is always prepared for emergencies, especially those related to sudden cardiac arrest. They are well-informed
  about the signs and symptoms of cardiac arrest and the importance of performing CPR and using an AED as soon as possible. They are familiar with the AED and its operation and are confident in their ability
  to use it to help save a life. They are also aware of the potential risks and benefits of using an AED and are prepared to follow the instructions given by the device.
