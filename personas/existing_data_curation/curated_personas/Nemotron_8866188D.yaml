  hobbies: '["Watercolor painting", "Wildlife photography", "Gardening", "Art gallery visits", "Theater and live performance", "Historical fiction reading", "Genealogy research", "Volunteer tutoring in
    STEM", "Local history preservation", "Birdwatching"]'
  career_goals: Although retired from full‑time work, Nell aims to mentor emerging women in STEM through local workshops and one‑on‑one coaching, to author a memoir that captures her experiences as a pioneering
    female engineer, and to continue contributing to the Orange County Museum by helping develop interdisciplinary exhibits that blend science and art. She also hopes to expand the county’s science‑outreach
    program for middle‑school students, ensuring that curiosity and inclusive thinking thrive in the next generation.
