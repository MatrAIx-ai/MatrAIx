personas:
  professional: Nell Dickerson, an experienced aerospace systems engineer turned community STEM mentor, leverages their analytical rigor, CAD expertise, and project coordination skills to design data-driven
    outreach programs, curate interdisciplinary museum exhibits, and coach emerging women engineers, all while balancing meticulous planning with a flexible, curiosity-driven approach.
  sports: Nell Dickerson stays active through early morning birdwatching hikes with the Virginia Naturalists club, occasional gentle yoga sessions, and a loyal following of the Washington Commanders in
    the fall football season, the Washington Capitals during winter hockey, and DC United in spring soccer, balancing moderate cardio with low-impact strength work to support their garden labor and manage
    osteoarthritis.
  arts: Nell Dickerson enriches their creative life by painting watercolors reminiscent of Monet’s light and Winslow Homer’s coastal scenes, attending live performances at the local Shakespeare Theatre
    Company featuring talents like Sir Ian McKellen, and curating small exhibitions at the county museum that showcase regional artists such as John McEwen, while also savoring classical concerts by Yo‑Yo
    Ma and the folk storytelling of Joan Baez.
  travel: Nell Dickerson prefers thoughtfully planned road trips that blend leisurely garden stops with cultural detours, having explored Shenandoah National Park’s wildflower trails and the historic streets
    of Dublin to trace Irish roots, and now dreaming of a spring pilgrimage to the Scottish Highlands and a summer visit to Kyoto’s botanical gardens, all while balancing their modest travel allowance with
    occasional splurges on special train tickets.
  culinary: Nell Dickerson enjoys crafting herb-infused meals such as basil-and-lavender focaccia, heirloom tomato and violet salad, and a Sunday roast featuring Virginia ham and rosemary-roasted potatoes,
    using garden-fresh herbs like thyme and sage to season their intermediate-level cooking, while also indulging in occasional farm-to-table dinners at the local Harvest Table restaurant to savor seasonal
    dishes like shrimp and grits.
  core: Nell Dickerson blends analytical precision with artistic curiosity, habitually sketching garden scenes in the margins of spreadsheets, swapping museum tours for sunrise photo expeditions, and occasionally
    hoarding vintage camera batteries for future projects—an endearing blend of meticulous planning and spontaneous wonder.
background:
  cultural: Nell’s cultural background is rooted in a mid‑Atlantic American heritage, with family ancestry tracing back to English and Irish immigrants who settled in Virginia in the early 19th century.
    Raised in the post‑war South of the 1950s, she grew up in a community centered around church, local traditions, and a strong emphasis on education. Her academic pursuits in a STEM field during a period
    when few women entered those disciplines fostered a progressive outlook and an appreciation for cultural diversity. Today, she embraces the agrarian rhythms of Orange County while actively engaging
    with broader artistic, intellectual, and volunteer circles.
attributes:
  skills: '["Applied mathematics", "Systems engineering", "Computer-aided design (CAD)", "Project management", "Data analysis", "Technical writing", "Curriculum development", "Art history", "Curatorial
