  career_goals: Although retired from full-time employment, Horace aims to leave a lasting professional legacy by mentoring emerging engineers through local university outreach programs and writing a concise
    guide on practical engineering problem-solving for hobbyists. He aspires to complete a memoir that captures the evolution of engineering practice over his career, contributing to historical knowledge
    for future generations. On a personal level, he seeks to maintain his health to support his wife, stay actively involved in his church’s small-group service projects, and ensure that his accumulated
    expertise continues to benefit his community.
