  hobbies: '[''fishing at local ponds'', ''hiking nature trails'', ''DIY woodworking'', ''playing acoustic guitar'', ''volunteering at neighborhood fire department'', ''attending live music events'', ''watching
    classic car shows'', ''barbecuing with friends'']'
  career_goals: He aims to become a certified roofing foreman within the next two years, earning the NRCA Certified Roofing Contractor designation and an OSHA 30‑hour certification. Yasmany wants to deepen
    his knowledge of solar‑integrated roofing and green building practices, with a long‑term ambition to launch his own eco‑focused roofing contracting business serving the Indianapolis metro area. He also
    aspires to mentor younger workers and eventually take on a supervisory role that balances field work with strategic planning.
