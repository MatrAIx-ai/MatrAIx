personas:
  professional: Yasmany Green is a 27‑year‑old roofing specialist who blends hands‑on expertise in shingle, metal, and flat‑roof systems with a curious drive toward solar‑integrated, green building practices,
    often improvising on‑site solutions, coordinating crews with a cooperative yet assertive style, and pursuing NRCA foreman certification and OSHA 30‑hour training while keeping a relaxed, flexible approach
    to scheduling.
  sports: Yasmany Green follows the Indianapolis Indians baseball team, regularly attends Indianapolis Colts games, participates in weekly pickup basketball at the community center, hikes with a local trail
    club on weekends, and balances his love for outdoor activity with relaxed, spontaneous weekend barbecues.
  arts: Yasmany Green enjoys playing acoustic guitar at a community coffee house, drawing inspiration from John Mayer and local folk group The Barnaclers, regularly attends live music gigs and classic car
    shows, and appreciates the craftsmanship of vintage automobiles as functional art, while his moderate talkativeness makes him a friendly presence at these events.
  travel: Yasmany Green prefers spontaneous road trips to nearby state parks like Brown County and weekend getaways to Nashville, while dreaming of eco‑tourism adventures in Costa Rica, often planning itineraries
    on the fly and embracing the flexibility that fits his relaxed approach to life.
  culinary: Yasmany Green loves grilling, especially smoked pork ribs with a bourbon‑infused glaze, fish tacos made from pond‑caught catfish with cilantro‑lime sauce, and homemade coleslaw, boasting solid
    cooking skills and frequently hosting backyard barbecues featuring corn on the cob and baked beans.
  core: Yasmany Green is a curious yet easygoing roofer who builds sustainable roofs by day, strums acoustic tunes by night, and lives for spontaneous hikes, backyard barbecues, and the occasional over‑commitment
    to DIY projects.
background:
  cultural: Yasmany grew up in a working‑class family on the rural‑suburban edge of Greenwood, Indiana. His ancestry traces back to Irish and German immigrants who settled in the Midwest in the early 20th
    century. He attended the local public high school, played varsity football, and was active in the community's Protestant church, where values of hard work, modesty, and neighborly support were emphasized.
    The pragmatic Midwestern ethos shaped his practical problem‑solving approach, while diverse coworkers introduced broader cultural perspectives. He celebrates traditional American holidays, enjoys regional
    fairs, and identifies with the Midwest's straightforward, friendly communication style.
attributes:
  skills: '[''roof shingle installation'', ''metal roofing installation'', ''flat roof membrane application'', ''roof leak detection and repair'', ''material measurement and estimation'', ''building code
