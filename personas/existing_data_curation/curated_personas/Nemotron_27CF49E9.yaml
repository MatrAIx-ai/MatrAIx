  hobbies: '["Volunteering at community health fairs","Community choir participation","Milwaukee Brewers baseball games","Craft‑brew tasting tours","Lakefront park walking and Kettle Moraine hiking","Gardening","Cooking
    healthy meals","Yoga and mindfulness practice","Knitting for charity"]'
  career_goals: Susan aims to advance into a senior educator role, teaching dental hygiene students at a community college or continuing‑education program. She plans to earn a Master’s degree in Public
    Health to broaden her impact on community oral health. Her long‑term ambition includes developing and overseeing a county‑wide preventive oral health initiative targeting seniors and low‑income families
    in Milwaukee. She also hopes to mentor emerging hygienists through a formal apprenticeship program and to consult with dental practices on increasing efficiency and patient satisfaction.
