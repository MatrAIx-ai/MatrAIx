persona_description: A public health researcher who specializes in the study of cholera epidemics and the effectiveness of vaccination programs in controlling them. They are familiar with mathematical models
  and have experience in conducting research to evaluate the impact of vaccination coverage on disease transmission. They are also aware of the importance of sanitation in preventing cholera and have a
  deep understanding of the concept of herd immunity. They have published research on the efficacy of vaccination coverage in controlling cholera epidemics and are currently involved in discussions about
  the use of cholera vaccines in Haiti.
