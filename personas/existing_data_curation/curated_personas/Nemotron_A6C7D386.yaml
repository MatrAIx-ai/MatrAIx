  hobbies: '["Sketching and drawing", "Digital illustration", "Photography", "Attending art exhibitions and galleries", "Listening to music and exploring new genres", "Playing drums", "Reading sci‑fi and
    fantasy novels", "Listening to podcasts about art and mental health", "Volunteering at community youth centers", "Organizing local events", "Mindful meditation and journaling", "Playing basketball"]'
  career_goals: In the short term, Nocles plans to enroll in a community‑college program in graphic design or visual communication while building a professional portfolio of digital artwork and community‑based
    murals. He wants to launch a modest YouTube channel that mixes art tutorials with candid conversations about anxiety and mental‑health coping, aiming to create a supportive space for other young adults.
    Long‑term, he envisions securing a role as a creative director for a nonprofit arts organization in Riverside County, where he can curate public art projects, lead youth workshops, and use visual storytelling
    to raise awareness about mental‑health issues. Ultimately, he hopes to establish his own studio that offers freelance design services to local businesses and runs mentorship programs for aspiring artists
    from under‑represented backgrounds, providing both financial stability for his marriage and a platform to celebrate Black cultural narratives.
