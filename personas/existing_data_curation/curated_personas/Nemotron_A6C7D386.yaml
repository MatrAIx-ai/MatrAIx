personas:
  professional: An aspiring graphic designer and community arts facilitator, Nocles Cooks leverages their knack for digital illustration, event planning, and public speaking to orchestrate pop‑up mural
    projects and youth workshops, while their methodical organization balances their boundless sociability and occasional emotional turbulence.
  sports: A regular participant in Lake Elsinore pickup basketball games, Nocles Cooks also follows the Los Angeles Lakers and the local Riverside City College baseball team, and they use fast‑break drills
    to release excess energy while staying socially connected.
  arts: An enthusiastic visual storyteller, Nocles Cooks spends weekends sketching downtown Riverside cityscapes, curating playlists featuring Flying Lotus, J Dilla, and Tycho while practicing drumming,
    and they frequently visit the Riverside Art Museum to study works by contemporary street‑artist Shepard Fairey and digital visionary Beeple.
  travel: A weekend explorer, Nocles Cooks has taken day trips to the Los Angeles Arts District to photograph murals, visited the San Diego Museum of Contemporary Art, and dreams of a backpacking trip through
    Berlin’s vibrant street‑art scene and a pilgrimage to the MoMA in New York, and they favor budget‑friendly hostels and spontaneous itineraries.
  culinary: An adventurous home cook, Nocles Cooks enjoys whipping up avocado‑lime tacos, ramen bowls with miso broth, and espresso‑driven latte art, and they often experiment with spices like smoked paprika
    and sumac while occasionally indulging in late‑night pizza deliveries during marathon illustration sessions.
  core: Nocles Cooks is a sociable, methodical 18‑year‑old artist who channels their anxiety into creative community projects, and they balance meticulous budgeting with impulsive art‑supply splurges and
    nightly basketball games.
background:
  cultural: Nocles is an African‑American raised in Lake Elsinore, a multicultural suburb of Southern California. His family’s roots trace back to the Southern United States, and his grandparents imparted
    oral histories, soulful music, and culinary traditions that honor Black heritage. Growing up amid a blend of cultures, he has developed a fluid identity that combines contemporary West‑Coast hip‑hop,
    R&B, and street‑art influences with the historic narratives and communal values of the African‑American diaspora. He participates actively in local cultural celebrations—such as Juneteenth gatherings,
    community mural projects, and church events—where he feels a deep sense of belonging. This background informs his artistic sensibility, his commitment to community empowerment, and his desire to challenge
    stereotypes through creative expression.
attributes:
  skills: '["Public speaking", "Event planning", "Social media content creation", "Basic graphic design (Canva, Photoshop)", "Photography", "Interpersonal communication", "Community outreach", "Conflict
