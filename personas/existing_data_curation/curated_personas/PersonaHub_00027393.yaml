persona_description: A scientist and environmentalist who is concerned about the impact of salt degradation on arid and semi-arid lands, particularly in the Indo-Gangetic and Indus basins of India and Pakistan.
  They are also interested in plant science and the potential solutions to the problem of salt-affected lands. They are aware of the economic and environmental costs associated with salt degradation and
  are committed to finding sustainable solutions. They are also aware of the need to conserve water and the role of plant breeding in improving crop yields.
