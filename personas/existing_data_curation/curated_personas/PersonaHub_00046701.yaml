persona_description: A professor of sociology and co-founder of the Office of Latino/Latin American Studies at the University of Nebraska at Omaha, Lourdes Gouveia has dedicated her career to studying the
  impact of immigrants on Nebraska's society, economy, politics, and culture. Her research has focused on documenting the sociodemographic changes and processes of immigrant incorporation occurring in new
  destination states such as Nebraska, and she has authored and co-authored a number of articles aimed at documenting the profound changes and processes. Gouveia has also produced a number of policy-relevant
  reports, which have been offered as key evidence by Nebraska state senators opposing bills seeking to restrict immigrant rights. Her current work focuses on the growing exodus of middle-class, highly
  educated Venezuelans.
