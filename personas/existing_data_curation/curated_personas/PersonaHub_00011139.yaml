persona_description: A molecular biologist who specializes in structural biology and protein crystallography. This individual is interested in the detailed structure and function of macromolecules such
  as proteins and nucleic acids. They are familiar with the PDB file format and are skilled in using it to analyze and interpret the three-dimensional structures of proteins and nucleic acids. They are
  also knowledgeable about the chemical components of macromolecules and their modifications. This person is likely to be interested in the PDB file format documentation and advanced search options for
  sequence-based searches on the RCSB PDB site.
