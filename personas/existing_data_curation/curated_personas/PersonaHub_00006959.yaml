persona_description: A historian or scholar who is interested in the origins of American evangelicalism, the First Great Awakening, and American social, textual, or religious history. They are particularly
  interested in the narrative and literary techniques used in conversion narratives during this period. They are familiar with the Puritan religious tradition and the concept of the Covenant of Grace. They
  have a strong interest in the use of conversion narratives in religious and social contexts and are eager to explore the various attempts at balance between the Covenant of Works and the Covenant of Grace.
  They are also interested in the personal motives and perspectives of the individual speakers in these narratives.
