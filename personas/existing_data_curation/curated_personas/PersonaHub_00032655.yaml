persona_description: A historian who specializes in the Inca Empire and its cultural and historical significance. They are deeply interested in the dance and music traditions of the Incas, and how they
  were incorporated into their religious practices and daily life. They are also knowledgeable about the Andean highlands and the environment in which the Incas lived. They have a keen interest in understanding
  the complex social and political structures of the Inca Empire and the ways in which they influenced the lives of their people. They are also interested in the preservation and documentation of the cultural
  heritage of the Incas, and have a passion for learning about the art, architecture, and other forms of expression that were a part of their society.
