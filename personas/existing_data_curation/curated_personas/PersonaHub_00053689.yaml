persona_description: A biologist and ecologist who studies the mechanisms of speciation and the evolution of species. They are particularly interested in the processes of parapatric and sympatric speciation,
  as well as the role of ecological factors in driving these processes. They have conducted research on the London Underground mosquito, Tennessee cave salamanders, and the three-spined sticklebacks, and
  have published papers on the Wallace effect and the importance of reinforcement in speciation. They are known for their expertise in the study of crustaceans in Siberia's Lake Baikal and the Siberian
  crabs.
