  career_goals: Approaching retirement, James aims to shift from full‑time on‑site work to a part‑time consulting role where he can mentor apprentices and advise small contractors on complex projects. He
    plans to obtain a licensed contractor certificate, expand his modest business to include historic home restoration, and eventually author a handbook on traditional Midwestern carpentry techniques. Additionally,
    he seeks to contribute his expertise through volunteer work with Habitat for Humanity, leaving a lasting craftsmanship legacy for his grandchildren.
