  hobbies: '[''Visiting art galleries'', ''Street murals'', ''Live music and dance events'', ''Salsa dancing'', ''Cooking Mexican cuisine'', ''Hosting potluck gatherings'', ''Volleyball'', ''Hiking'', ''Photography'',
