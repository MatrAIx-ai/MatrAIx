personas:
  professional: Jaime Pizzo, a 21‑year‑old sales supervisor in the Rio Grande Valley, channels their curiosity and sociable energy into coaching a small team, leveraging bilingual fluency and creative problem‑solving
    to win contracts and design art‑inspired marketing campaigns.
  sports: Jaime Pizzo, a weekend volleyball enthusiast who also spikes salsa moves at the local dance studio, hikes the Sabal Palm trails of the Rio Grande Valley, and roots for the Houston Astros, the
    Dallas Mavericks, and occasionally cheers on the Rio Grande Valley FC Toros in the USL Championship.
  arts: Jaime Pizzo, a gallery hopper who spends evenings dissecting the bold colors of Shepard Fairey’s street prints, the emotive brushwork of Frida Kahlo, and the lyrical poetry of Lila Downs, while
    also curating playlists featuring Café Tacvba and J Balvin to soundtrack their creative brainstorming.
  travel: Jaime Pizzo, a spontaneous traveler who has already explored Oaxaca’s culinary markets, road‑tripped to Austin for the South By Southwest music fest, spent sun‑soaked days at South Padre Island,
    and now dreams of wandering the souks of Marrakech on a modest budget.
  culinary: Jaime Pizzo, an experimental home cook who reimagines tacos al pastor with quinoa‑stuffed shells, adds smoked chipotle to a modern chiles en nogada, and always garnishes their potluck dishes
    with fresh avocado and lime, while confidently juggling their role as the go‑to host for friends.
  core: Jaime Pizzo, a vibrant 21‑year‑old whose curiosity fuels creativity, loves swapping sales spreadsheets for salsa steps, and occasionally lets disorganization slip in their quest for artistic inspiration.
background:
  cultural: Jaime grew up in a Mexican‑American household in Edinburg, Texas, where the blend of Mexican traditions and border‑region Texan culture shaped her identity. Bilingual and deeply rooted in family
    values, she celebrates holidays such as Día de los Muertos, Cinco de Mayo, and Texas Independence Day, often incorporating traditional music, food, and storytelling. Her community ties include participation
    in local church events, cultural festivals, and neighborhood volunteer groups, which foster a strong sense of belonging and cultural pride.
