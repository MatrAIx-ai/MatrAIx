  career_goals: Short‑term, Jaime aims to complete her bachelor's degree in Business Administration while earning a promotion to sales manager within her company. She wants to refine her organizational
    skills, obtain certifications in sales leadership, and lead larger regional teams. Long‑term, she envisions starting her own boutique marketing firm that blends her passion for art and culture with
    sales strategies, helping local artists and small businesses reach broader markets. She also hopes to mentor young women in her community, fostering leadership and entrepreneurship.
