personas:
  professional: Ephraim Golson, a veteran landscape contractor with three decades of horticulture and grounds‑management experience, blends meticulous project planning with a curious eye for sustainable
    design, leading his crew to implement low‑water ecosystems while mentoring apprentices toward a Certified Landscape Professional credential.
  sports: Ephraim Golson stays fit by tending the garden and joining the Minneapolis Harvest Hikers, enjoys seasonal walks along the Chain of Lakes, follows the Minnesota Twins and Minnesota Vikings on
    game days, and occasionally participates in low‑impact senior softball leagues at the local recreation center.
  arts: Ephraim Golson frequents the Walker Art Center and Minnesota History Center, draws inspiration from the jazz stylings of Miles Davis and John Coltrane, admires the photographic landscapes of Ansel Adams,
    and often sketches plant compositions after visiting exhibitions by contemporary painter Kehinde Wiley.
  travel: Ephraim Golson prefers thoughtfully planned eco‑tourism getaways, has already explored the botanical gardens of Kew in London and the Redwood National Park in California, and now hopes to embark
    on a low‑impact tour of Japan’s historic Zen gardens and tea houses next spring.
  culinary: Ephraim Golson, an adept home cook, crafts Southern comfort dishes such as slow‑braised collard greens seasoned with smoked turkey, buttery rosemary‑infused cornbread harvested from their garden,
    and sweet‑potato pie spiced with a pinch of cinnamon, while occasionally treating themselves to upscale farm‑to‑table brunches at downtown Minneapolis eateries.
  core: Ephraim Golson blends a methodical gardener’s discipline with a jazz‑infused curiosity, turning every backyard into a sustainable gallery while discreetly humming saxophone solos during sunrise
    coffee.
background:
  cultural: Ephraim is an African American who grew up in the Twin Cities, absorbing the rich cultural tapestry of Minneapolis's Black community. He maintains deep ties to local churches, soul‑food cookouts,
    and jazz clubs, and participates in cultural festivals that celebrate Black heritage. His upbringing instilled a strong sense of communal stewardship, which he expresses through mentoring youth in horticulture
    programs and supporting Black‑owned businesses. These cultural influences shape his appreciation for storytelling, music, and the collective care of shared green spaces.
