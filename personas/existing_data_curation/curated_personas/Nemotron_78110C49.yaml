  career_goals: Ephraim aims to expand his company's portfolio to offer eco‑friendly, low‑water landscaping solutions, earn a Certified Landscape Professional credential, and establish a mentorship program
    for aspiring Black landscapers. Over the next five years, he hopes to transition into a consulting role that focuses on sustainable urban greening while remaining active in community education workshops.
