personas:
  professional: Iraida Lui, an 11‑year‑old budding illustrator‑journalist, blends a love for routine and detail with creative flair, channeling their organized nature into meticulous sketch‑journals of
    school events and aspiring to turn the hobby into a future career in visual storytelling.
  sports: Iraida Lui shines as a midfielder for the Eastside Tigers Youth Soccer Club, attends after‑school practices five times a week, follows the professional team LA Galaxy for inspiration, and balances
    competitive play with a love for casual pick‑up games at the community park.
  arts: Iraida Lui spends afternoons drawing detailed comic‑style panels inspired by Frida Kahlo’s vibrant colors and listening to folk singer Lila Hernández while practicing simple traditional dance steps,
    turning craft projects like papel picado for celebrations into expressive outlets that blend cultural appreciation with personal creativity.
  travel: Iraida Lui enjoys family road trips to historic Puebla to explore colonial architecture, seasonal visits to the seaside town of Puerto Escondido for beach sandcastle building, and dreams of hiking
    the ancient ruins of Teotihuacan, preferring structured itineraries that balance adventure with familiar comforts.
  culinary: Iraida Lui helps their mother prepare traditional dishes such as tamales filled with pork, mole sauce made with dried chiles, and pozole enriched with hominy and cilantro, enjoying the tactile
    process of grinding masa by hand and proudly sharing the finished meals at family gatherings.
  core: Iraida Lui is a meticulous, routine‑loving eleven‑year‑old who balances creativity in drawing and cooking with a disciplined soccer schedule, all while navigating the typical quirks of childhood
    such as occasional forgetfulness about homework.
background:
  cultural: 'Iraida was born and raised in Benson, Arizona, to parents who immigrated from the state of Jalisco, Mexico, in the late 1990s. The household is Spanish‑speaking at home, and she attends an
    English‑language public school, making her fluently bilingual. Family life revolves around Mexican cultural traditions: they celebrate Día de los Muertos with an altar at home, prepare tamales for holidays,
    and observe religious practices such as attending mass at the local Catholic church. Community gatherings at the nearby Mexican community center and the annual Benson Mexican Festival provide her with
    a sense of belonging. The family''s cultural values emphasize respect for elders, the importance of family cohesion, hard work, and hospitality, influencing her own conscientious and cooperative personality.'
attributes:
  skills: '["Organizational skills (using planner and keeping tidy)", "Bilingual communication (Spanish and English)", "Basic cooking (preparing tacos, guacamole, and other simple dishes)", "Digital literacy
    (educational apps, Google Classroom)", "Animal care (feeding and walking family dog)"]'
  hobbies: '["Reading chapter books", "Keeping a daily journal", "Drawing and crafting (including papel picado)", "Soccer (team practice and games)", "Cooking traditional Mexican dishes with family", "Puzzle
    games (crosswords, Sudoku)", "Listening to Mexican folk music and dancing"]'
  career_goals: Iraida’s long‑term career vision is guided by her love of routine, her desire to support others, and her bilingual heritage. She dreams of becoming a bilingual elementary school teacher,
    where she can create a structured, nurturing classroom environment and help students master both English and Spanish. She also feels drawn to the healthcare field, considering a future as a pediatric
    nurse or medical assistant to care for children in her community. In the coming years, she aims to excel academically, earn a scholarship for higher education, and ultimately secure a role that blends
    organization, compassion, and cultural connection, allowing her to give back to the Mexican‑American community in Arizona.
