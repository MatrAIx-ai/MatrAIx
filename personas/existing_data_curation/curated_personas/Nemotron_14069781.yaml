  career_goals: Nazmoon aims to ascend to a senior managerial role within a leading accounting firm, eventually targeting partnership status to influence firm-wide audit strategies and drive digital transformation.
    She is also eager to obtain a CPA credential if not already secured, and to spearhead initiatives that integrate advanced analytics into audit practices. Long-term, she envisions founding a boutique
    consulting firm that offers culturally attuned financial advisory services to Hispanic-owned businesses in the Bay Area, while mentoring emerging women accountants from diverse backgrounds.
