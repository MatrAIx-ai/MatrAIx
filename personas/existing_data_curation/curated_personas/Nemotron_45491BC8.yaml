  hobbies: '[''Reading historical fiction'', ''African American history study'', ''Organic gardening'', ''Hiking'', ''Jazz and R&B music appreciation'', ''Cooking soul food with healthy twists'', ''Community
    volunteering (financial literacy coaching)'']'
  career_goals: Looking ahead, Sandra aims to advance to a senior leadership position such as Chief Compliance Officer or Vice President of Risk Management within the next five years. She plans to deepen
    her expertise by obtaining certifications like Certified Regulatory Compliance Manager (CRCM) and Certified Fraud Examiner (CFE). Sandra is also passionate about mentoring rising compliance professionals,
    especially women and minorities, and intends to establish a corporate mentorship program. In the longer term, she envisions influencing industry-wide best practices through participation in regulatory
    advisory committees and publishing thought leadership on balancing compliance rigor with operational efficiency.
