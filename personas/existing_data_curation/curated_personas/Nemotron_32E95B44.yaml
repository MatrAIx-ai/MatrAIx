  career_goals: Although retired from formal employment, Genie aims to solidify her legacy as a steward of regional history. She plans to complete a comprehensive history of Norwood and surrounding areas,
    publish her memoirs, and create a publicly accessible digital archive of local photographs and oral testimonies. Additionally, she seeks to secure a small grant to support youth mentorship programs
    that teach archival techniques and local heritage appreciation. Her broader ambition is to ensure that the cultural narratives of St. Lawrence County are preserved for future generations.
