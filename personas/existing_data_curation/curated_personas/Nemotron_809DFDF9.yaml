personas:
  professional: Ruber Montanez, a seasoned project coordinator with a talent for fusing Agile and Waterfall methodologies, crafts meticulous plans, tracks budgets with Microsoft Project and Asana, and communicates
    clearly across cross‑functional teams, reflecting their organized, curious, and cooperative nature.
  sports: Ruber Montanez enjoys low‑impact fitness, alternating weekend runs with community‑center yoga classes, roots for the Dallas Cowboys during football season, follows the Houston Astros in the summer,
    and participates in a local walking club that meets every Saturday.
  arts: Ruber Montanez, a diligent book‑club member, delves into mystery novels by Agatha Christie and Tana French, relaxes to the smooth jazz of Norah Jones and classic film scores by Ennio Morricone,
    and attends occasional productions at the community theater featuring shows like Arthur Miller’s "Death of a Salesman."
  travel: Ruber Montanez prefers carefully planned getaways that blend cultural exploration with relaxation, such as weekend trips to Texas Hill Country vineyards, annual visits to Santa Fe’s art scene,
    and they dream of a solo culinary tour through Oaxaca and a scenic drive along the Pacific Coast Highway.
  culinary: Ruber Montanez, an enthusiastic home chef, perfects traditional family dishes like mole poblano, pozole, and homemade tamales, layering flavors with fire‑roasted chilies, cacao, and fresh cilantro,
    while also incorporating seasonal garden vegetables to create balanced, vibrant meals.
  core: Ruber Montanez merges a detective‑like curiosity with a planner’s precision, spending evenings solving crosswords and sudokus while meticulously color‑coding their pantry, a quirk that sometimes
    slows dinner prep.
background:
  cultural: Ruber is a first‑generation Mexican‑American who grew up in a bilingual household speaking Spanish and English. Her family's traditions—such as celebrating Día de los Muertos, Semana Santa,
    and other Mexican holidays—have fostered a strong sense of community and cultural pride. Residing in Universal City within Bexar County, she is immersed in the vibrant Mexican‑American culture of the
    San Antonio area, which influences her culinary tastes, music preferences, and social values. She maintains close ties with her extended family and regularly participates in neighborhood events that
    honor Mexican customs and promote solidarity.
attributes:
  skills: '["Project Planning","Risk Management","Budget Management","Stakeholder Communication","Agile & Waterfall Methodologies","Project Scheduling (MS Project, Smartsheet)","Data Analysis & Reporting","Process
