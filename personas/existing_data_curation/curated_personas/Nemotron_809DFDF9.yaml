  hobbies: '["Reading mystery novels","Solving puzzles (crosswords, Sudoku)","Cooking Mexican cuisine","Gardening","Book club participation","Volunteer project planning at community center","Yoga for stress
    relief","Attending local cultural festivals"]'
  career_goals: Ruber aims to move into senior project manager roles within the next three years, focusing on larger technology or infrastructure projects in Texas. She is pursuing PMP certification to
    strengthen her credentials and plans to lead multi‑disciplinary teams on complex initiatives. Long‑term, she envisions becoming a program manager or director of a Project Management Office, where she
    can mentor emerging female project managers, especially those of Mexican‑American heritage, while maintaining a balanced work‑life schedule that supports her family and community involvement.
