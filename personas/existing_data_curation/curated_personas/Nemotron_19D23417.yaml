personas:
  professional: A budding storyteller and illustrator, Melissa Sanchez delights in turning picture books into their own drawings, using their organized, methodical nature to plan each page and their compassionate
    heart to create characters that help friends feel understood.
  sports: Melissa Sanchez loves playing tag, riding their bike around the neighborhood park, and cheering for the local youth soccer team the Little Lions, while attending a Saturday morning gymnastics
    class at the community center and always packing a water bottle and a small snack, reflecting their organized and reliable approach to fun.
  arts: Melissa Sanchez spends afternoons with crayons and watercolor paints, drawing vibrant scenes inspired by picture books and the lively folk tunes they dance to, admiring the illustrations of Dr Seuss,
    the playful stories of Mo Willems, and the animated wonders of Pixar, which fuel their creative imagination.
  travel: Melissa Sanchez enjoys weekend trips to their grandparents' house where they explore a garden full of fresh tomatoes, and dreams of visiting a sunny beach to build sandcastles, yet their travels
    are usually planned by a colorful map and a small backpack, balancing their curiosity with a desire for familiar comfort.
  culinary: Melissa Sanchez loves stirring batter for chocolate chip cookies with their mom, mixing in vanilla and chocolate chips, and proudly snack on fresh apple slices, carrot sticks, and cheese sticks,
    while also relishing simple fruit smoothies made with banana and strawberry.
  core: Melissa Sanchez, a bright and caring six-year-old, blends the curiosity of a budding artist with the practicality of a tiny planner, turning crayons into stories, piggy-bank coins into dreams, and
    backyard adventures into lessons of harmony.
background:
  cultural: Melissa was raised in a bilingual Mexican‑American household in La Villa, Texas. At home she speaks Spanish and celebrates traditions such as Día de los Muertos, Las Posadas, and family gatherings
    centered around tamales, arroz con pollo, and music. Her family values collectivism, respect for elders, and community participation, which shape her compassionate and cooperative nature.
