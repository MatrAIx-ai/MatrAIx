  skills: '[''early literacy'', ''basic numeracy'', ''digital literacy'', ''fine motor skills'', ''empathy'']'
  hobbies: '[''coloring'', ''drawing'', ''reading picture books'', ''exploring outdoors'', ''listening to family stories'', ''dancing'', ''helping in the kitchen'', ''playing with friends'']'
  career_goals: Inspired by her curiosity and compassion, Melissa dreams of becoming a teacher who helps children learn, or a veterinarian who cares for animals. She also imagines helping her community
    by organizing clean‑up projects when she gets older.
