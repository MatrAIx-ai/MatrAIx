  hobbies: '["Reading adventure/fantasy books", "Drawing/sketching cartoons", "Small-group board games and crafts", "Helping prepare Mexican meals (tacos, tamales)", "Listening to Mexican folk and mariachi
    music", "Caring for family rabbit", "Gardening herbs (cilantro, basil)"]'
  career_goals: Jamie dreams of a future where she can nurture and help others. She imagines becoming a teacher because she loves sharing knowledge and sees herself creating a stable, supportive classroom
    environment. She is also fascinated by animals and occasionally thinks about being a veterinarian, combining her love for pets with scientific curiosity. Additionally, she enjoys cooking with her family
    and hopes to keep treasured Mexican culinary traditions alive, possibly pursuing a career as a chef or culinary educator that honors her heritage.
