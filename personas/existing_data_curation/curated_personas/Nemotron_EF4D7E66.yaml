personas:
  professional: Sheena Negron, a 35‑year‑old community mental‑health strategist, blends rigorous STEM‑based data analysis with compassionate social‑work practice; they wield bilingual communication and
    arts‑integrated therapeutic techniques to design culturally responsive programs that empower underserved populations.
  sports: Sheena Negron, an energetic 35‑year‑old, thrives on active group fitness; they regularly attend Zumba classes and salsa nights, hike the Red Rock Canyon trails each month, cheer for the Las Vegas
    Raiders and the Golden Knights, and occasionally join a local running club for weekend 5‑k races.
  arts: Sheena Negron immerses themselves in the vibrant Las Vegas arts scene, attending gallery openings featuring muralists like Shepard Fairey and Jorge Gutierrez; they create their own paintings inspired
    by the bold color palettes of Frida Kahlo and capture neon‑lit street life through experimental photography.
  travel: Sheena Negron prefers immersive cultural travel; they have explored the historic streets of Oaxaca during Día de los Muertos, wandered the souks of Marrakech, strolled through Kyoto’s bamboo groves,
    and are planning a road‑trip across the Southwest national parks to photograph desert sunsets.
  culinary: Sheena Negron loves reimagining family recipes, crafting mole with dark chocolate and quinoa, preparing carnitas tacos topped with pineapple salsa, and baking churros infused with matcha; they
    relish fresh ingredients like avocados, corn masa, and local herbs while experimenting in a modest home kitchen.
  core: Sheena Negron, a 35‑year‑old social‑work strategist, blends data‑driven precision with spontaneous artistic bursts, but habitually runs late to community meetings because they lose track of time
    while cataloguing new art finds.
background:
  cultural: Sheena is a first‑generation Mexican‑American raised in a bilingual household. She celebrates Mexican traditions such as Día de los Muertos and Día de la Independencia, and incorporates these
    cultural elements into her community work. Family solidarity, collective responsibility, and respect for cultural heritage shape her values and drive her commitment to serving the Mexican‑American population
    in Las Vegas. Her cultural fluency enriches her ability to connect with clients and design programs that honor heritage while fostering empowerment.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Community Outreach'', ''Program Development'', ''Data Analysis'', ''Grant Writing'', ''Cultural Competency'', ''Bilingual (Spanish/English)'',
