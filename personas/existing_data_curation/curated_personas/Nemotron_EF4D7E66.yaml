  hobbies: '[''Painting'', ''Photography'', ''Salsa dancing'', ''Hiking'', ''Mexican cooking'', ''Visiting art galleries'', ''Volunteering at local shelters'', ''Reading science fiction'', ''Group fitness
    classes (Zumba)'', ''Traveling'']'
  career_goals: Sheena aspires to move into senior leadership within community mental health, aiming for roles such as program director or clinical supervisor where she can design culturally responsive,
    arts-integrated interventions for underserved Mexican‑American communities in Las Vegas. She plans to earn a Master of Social Work, obtain certification in trauma‑informed care, and advocate for policy
    changes that expand tele‑health access. Long‑term, she envisions establishing a community arts hub that combines mental‑health support with creative expression, fostering resilience and empowerment.
