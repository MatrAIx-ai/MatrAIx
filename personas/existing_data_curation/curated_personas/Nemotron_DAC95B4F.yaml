  career_goals: Driven by a desire for greater stability and advancement for his family, Matthew aims to become a certified foreman within the next three years, earning an OSHA 30‑hour certification and
    a Journeyman Carpentry license. He plans to finish his associate degree in construction management, which he started in community college, to qualify for supervisory roles. Long‑term, he dreams of launching
    a small, family‑owned construction firm that focuses on energy‑efficient residential projects, allowing him to blend his practical skills with his curiosity about green building. He is also mindful
    of the financial and health stresses of construction work, so he seeks a role that offers more predictable hours and benefits.
