personas:
  professional: Matthew Geist is a seasoned construction specialist whose hands‑on expertise in framing, concrete formwork, and blueprint interpretation blends with a curiosity for sustainable building
    tech, and they balance a relaxed, sometimes disorganized approach that lets them improvise on‑site solutions while assertively guiding small crews toward schedule goals.
  sports: Matthew Geist follows the Chicago Cubs and Bears religiously, joining fellow fans at the local sports bar for game‑day rituals while they maintain weekend fitness by fishing on Lake Michigan,
    occasional jogs with the Lakefront Trail Runners Club, and occasional pickup basketball at the neighborhood community center.
  arts: Matthew Geist unwinds by strumming acoustic guitar renditions of John Prine and Neil Young, snapping cityscape photos during lakefront walks, and attending Chicago blues nights featuring Buddy Guy,
    all of which shape their modest but heartfelt appreciation for folk and blues artistry, and they often share these recordings with friends.
  travel: Matthew Geist prefers low‑key road trips that combine fishing and family bonding, having spent summers on Door County’s bays and a weekend at Mackinac Island, while they keep their wish list open
    for an adventurous Icelandic geothermal tour and a rugged Canadian salmon‑run in British Columbia, all planned around their work schedule and modest budget.
  culinary: Matthew Geist enjoys cooking hearty meals like soda bread with butter, smoked bratwurst topped with sauerkraut, and Lake Michigan perch fried with cornmeal and dill, while they range from casual
    grill nights to meticulous DIY pizza dough work for occasional deep‑dish evenings with friends.
  core: Matthew Geist balances a pragmatic, hands‑on work ethic with a restless curiosity, often juggling DIY projects and fishing trips while worrying about deadlines, occasionally forgetting appointments
    yet refusing to let stress dull their community‑spirit and love for music, and they stay motivated by the small victories in each day's work.
background:
  cultural: Matthew grew up in a working‑class white family on the South Side of Chicago, with deep roots in the city’s industrial neighborhoods. His heritage is a blend of German and Irish ancestry, which
    he celebrates through family gatherings and seasonal holidays. He was raised with Midwestern values of hard work, self‑reliance, and community solidarity, and he joined the local union of construction
    workers during his teenage years, fostering a strong sense of collective responsibility. While he respects traditional customs, his curiosity drives him to stay informed about broader cultural trends,
    and he enjoys sharing his cultural background through food, storytelling, and participation in neighborhood block parties.
