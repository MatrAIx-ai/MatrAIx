personas:
  professional: Jennie Arnold is a budding young scientist who blends LEGO constructions with simple volcano and magnet experiments, applying their curious yet practical mindset while their relaxed, slightly
    disorganized nature often leaves a glittery trail of test tubes in the living room.
  sports: Jennie Arnold darts across the open fields of Eisenhower Park as a member of the Queens Junior Soccer Club, cheers for the New York Yankees at baseball season and the New York Knicks during winter,
    and enjoys swinging on the playground and practicing basic gymnastics moves in their after‑school dance class.
  arts: Jennie Arnold channels their love for animals into vibrant watercolor paintings inspired by Eric Carle and Mo Willems, crafts friendship bracelets while humming tunes from The Wiggles, and delights
    in performing little dance routines to Disney songs during community library storytime.
  travel: Jennie Arnold prefers spontaneous family outings, from sandy days at Jones Beach on Long Island to weekend picnics in Eisenhower Park, and they dream of riding roller coasters at Disney World
    in Orlando while their parents plan future trips around school holidays.
  culinary: Jennie Arnold delights in mixing no‑bake peanut butter and honey cookies, munching cheesy macaroni with bite‑size broccoli florets, and topping homemade fruit kebabs with strawberries, banana
    slices, and a drizzle of chocolate syrup, though they often skip the broccoli when the cookie aroma fills the kitchen.
  core: Jennie Arnold is a curious, easy‑going six‑year‑old who fuses science experiments with LEGO creations, saves pocket money for crafts, and balances playful messes with a gentle, harmony‑seeking heart,
    showing they always prioritize fun over perfection.
background:
  cultural: Jennie grows up in a white, middle‑class family in Inwood, Nassau County, a suburban part of Long Island. Her household celebrates traditional American holidays such as Thanksgiving, the Fourth
    of July, Halloween, and Christmas, with occasional nods to her family's European roots (German and Irish ancestry). The family values community involvement, attending a local church, participating in
    school events, and joining programs like the Girl Scouts. Her public elementary school is culturally diverse, exposing her to classmates from many backgrounds and teaching her inclusive values. Frequent
    visits to the local library, community center, and nearby parks shape her experiences. Weekend outings often include trips to the beach, family picnics, and occasional rides on the Long Island Rail
    Road to explore Manhattan's museums and cultural events, giving her a blend of suburban and urban influences.
