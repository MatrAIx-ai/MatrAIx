  career_goals: Jennie dreams of one day becoming a veterinarian because she loves animals and wants to help them stay healthy. Her curiosity about how things work also fuels an interest in science, and
    she imagines exploring nature as a young researcher or environmental steward. At the same time, she enjoys sharing stories and teaching her friends, so she occasionally pictures herself as a kindergarten
    teacher or a storyteller who makes learning fun. Her goals are flexible; she wants a career that lets her combine caring for others, discovering new ideas, and using practical, hands‑on skills.
