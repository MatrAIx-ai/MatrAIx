  career_goals: Gina aspires to pursue a career that merges her curiosity about how things work with a practical impact on everyday life. She envisions studying computer science or environmental science
    at a university that values interdisciplinary learning. Her goal is to become a software engineer or data analyst focused on sustainability solutions, such as developing tools that help communities
    track energy use or protect local ecosystems. She hopes to earn scholarships that recognize both academic achievement and community involvement, and ultimately to contribute to projects that improve
    the Pacific Northwest’s environmental stewardship while maintaining a balanced, organized work life.
