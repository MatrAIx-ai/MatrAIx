personas:
  professional: Gina Bradberry, a 15‑year‑old high school sophomore, blends curiosity with practicality as an aspiring junior web developer who builds a personal website, scripts simple Python games, and
    contributes to the school robotics club while reliably meeting school deadlines and balancing creative sketching breaks, and they often share progress on the class forum.
  sports: Gina Bradberry stays active by running cross‑country for her high school, hiking Bothell’s Cedar River Trail with the local Bothell Hiking Club, and cheering on the Seattle Seahawks, Seattle Mariners,
    and Seattle Sounders FC, while occasionally playing ultimate frisbee in small friend groups that satisfy her preference for low‑pressure team activities, and they enjoy the camaraderie after a long
    study session.
  arts: Gina Bradberry expresses creativity through sketching urban scenes inspired by Ansel Adams’ landscapes, taking photography trips along the Bothell waterfront, strumming acoustic renditions of John Mayer
    and Ed Sheeran songs on guitar, and immersing herself in fantasy novels by Neil Gaiman and Brandon Sanderson, all of which shape her reflective artistic identity, and they often post their work on a
    personal blog.
  travel: Gina Bradberry enjoys weekend trips to Seattle’s Pike Place Market, a day hike in the San Juan Islands, and an annual family visit to Portland, while dreaming of a solo backpacking adventure through
    Kyoto’s bamboo forests and a summer trek across New Zealand’s South Island, planning trips with meticulous Google Maps itineraries but constrained by school schedules and a teen budget, and they keep
    a travel scrapbook to visualize future journeys.
  culinary: Gina Bradberry’s food tastes range from homemade miso ramen with fresh ginger and sriracha to quick avocado‑tuna sushi rolls and classic pepperoni pizza, and while her cooking skill sits at
    intermediate—she can follow YouTube tutorials for chicken tikka masala—she often prefers casual diners where she can savor artisanal mac and cheese with truffle oil, and they experiment with spice blends
    whenever a new recipe catches their eye.
  core: Gina Bradberry is a reflective teen who stitches together code, sketches, and strings while quietly charting her own path through solo projects and small‑group collaborations, and they always carry
    a notebook for spontaneous ideas.
background:
  cultural: Gina comes from a middle‑class, predominantly white suburban family in Bothell, Washington. Her upbringing reflects the Pacific Northwest’s blend of tech‑oriented progressiveness and a strong
    appreciation for the outdoors. Family gatherings often include seasonal activities like hiking, camping, and community service, fostering a respect for environmental stewardship. Her household values
    education and self‑reliance, encouraging curiosity while emphasizing practical outcomes. Growing up near the tech corridor of Seattle, she is exposed to a culture that celebrates innovation, yet her
    community also holds onto traditions of modesty and collaborative support typical of the region’s small‑town atmosphere.
