  career_goals: John aims to transition from hands‑on groundskeeping to a boutique landscaping consultancy that blends his practical expertise with his love for artistic garden design. Over the next five
    years he plans to obtain a Certified Landscape Technician credential and a pesticide‑application license, and to build a modest client base focused on sustainable, native‑plant installations and small‑scale
    garden art. He hopes to mentor younger workers, eventually delegating field work while he handles design, client relations, and community projects such as park beautification initiatives in Middlesex
    County. Long‑term, he envisions a semi‑retired role where he can balance a reduced physical workload with occasional creative design commissions and occasional teaching at a local community college's
    horticulture program.
