personas:
  professional: John Braga, a seasoned landscape professional with three decades of hands‑on expertise in design, irrigation, and sustainable horticulture, leverages his curiosity and artistic eye to blend
    traditional garden orderliness—echoing the neat hedges of his childhood parish garden and the rhythm of large Sunday family meals—with contemporary artful elements while confidently guiding clients
    and apprentices toward eco‑friendly solutions.
  sports: John Braga, an avid weekend golfer at the Middlesex County Golf Club and a casual tennis player at the local community center, regularly jogs the Raritan River Trail while cheering for the New
    York Giants and the New Jersey Devils, yet he sometimes skips workouts when stress from client projects mounts, balancing his competitive spirit with a love for community park clean‑up activities.
  arts: John Braga, a black‑and‑white photography enthusiast who draws inspiration from Ansel Adams and captures local flora along the river, frequents the Zimmerli Art Museum for contemporary installations,
    and relaxes while listening to The Rolling Stones, Miles Davis, and Bruce Springsteen’s storytelling songs, often sharing his images with friends during Sunday gatherings.
  travel: John Braga, a thoughtful traveler who prefers meticulously planned road trips to the Azores islands and the Irish countryside to connect with his family’s roots, yet enjoys spontaneous weekend
    getaways to the Catskills for hiking and sketching, balancing his love of nature with a modest budget and occasional family obligations.
  culinary: John Braga, a home gardener who transforms heirloom tomatoes and peppers into fresh bruschetta, Portuguese‑style grilled sardines, and a hearty Irish stew, cooks with a well‑worn cast‑iron skillet
    and a love for garlic and fresh basil, though he sometimes forgets to let his garden produce fully ripen before harvesting, leading to occasional culinary improvisations.
  core: John Braga blends meticulous craftsmanship with artistic curiosity, balancing a disciplined work ethic and community devotion with occasional worries, a love for nature photography, and a habit
    of over‑planning both garden projects and weekend adventures.
background:
  cultural: John’s family traces its roots to the Portuguese islands, with a paternal lineage that settled in New Jersey after World War II, while his maternal side has Irish ancestry. Raised in a Catholic
    household in Old Bridge, he grew up attending St. Gertrude’s parish and celebrating traditional holidays with extended family gatherings centered around large Sunday meals and shared music. The multicultural
    tapestry of Middlesex County exposed him early to a blend of Portuguese festivals, Irish storytelling, and the broader American suburban culture, fostering a respect for community, hard work, and the
    value of practical craftsmanship. These cultural influences shape his appreciation for classic garden aesthetics—such as orderly hedges and stone pathways—while his curiosity encourages the incorporation
    of contemporary, artistic elements into his landscaping projects.
