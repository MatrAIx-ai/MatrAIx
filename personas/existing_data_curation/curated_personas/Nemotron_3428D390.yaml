personas:
  professional: Rui Su, a senior full‑stack engineer adept in JavaScript (React, Node.js), Python (Django, Flask), and cloud platforms (AWS, Azure), channels their boundless imagination and compassionate
    leadership into crafting user‑centric, art‑infused digital experiences while loosely structuring project timelines to keep creative flow alive.
  sports: Rui Su, an avid hiker of the Appalachian Trail and member of the Bethlehem Trailblazers Hiking Club, prefers nature‑based cardio over gym routines, roots for the Philadelphia Eagles and 76ers,
    and occasionally joins a community soccer pickup game for social fitness.
  arts: Rui Su, a generative art enthusiast who builds visual pieces with p5.js and composes ambient tracks on modular synthesizers, draws inspiration from Aphex Twin, Brian Eno, and Björk, and regularly
    attends speculative‑fiction readings and local indie film screenings to fuel their creative imagination.
  travel: Rui Su, a spontaneous traveler with a penchant for cultural immersion, has explored Kyoto during Lunar New Year, trekked Iceland’s volcanic landscapes, and frequently escapes to the Poconos for
    weekend hikes, while their flexible planning style and modest budget guide them toward off‑the‑beaten‑path adventures rather than luxury resorts.
  culinary: Rui Su, an experimental home chef, loves fusing traditional family recipes with bold flavors—think maple‑glazed pork belly with fermented black bean sauce, spicy miso ramen, and pan‑fried bao
    buns seasoned with gochujang and Sichuan pepper—yet often leaves the kitchen a mess as their creative flow overtakes meticulous cleanup.
  core: Rui Su, a calm, curiosity‑driven technologist who blends code, meditation, and synth music, habitually misplaces coffee mugs and lets project deadlines drift in favor of spontaneous creative sessions.
background:
  cultural: Rui's family originated from East Asia, likely Chinese‑Taiwanese, and he was raised in a bicultural household that blended traditional values—such as respect for elders, emphasis on education,
    and communal harmony—with the openness of American life. Bilingual in English and Mandarin, he celebrates Lunar New Year and the Mid‑Autumn Festival, often preparing family‑style dishes for friends.
    His cultural upbringing instilled a strong sense of responsibility to give back, which is reflected in his community mentorship. While living in Bethlehem, PA, he participates in the local Asian cultural
    association, shares his heritage through cooking demonstrations, and integrates gentle Eastern mindfulness practices into his daily routine.
