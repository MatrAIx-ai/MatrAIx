  hobbies: '[''Generative art programming'', ''Digital illustration'', ''Electronic music production'', ''Speculative fiction reading'', ''Hiking in the Appalachian region'', ''Asian‑fusion cooking'', ''Community
    coding workshops'', ''Meditation practice'', ''Board game evenings'', ''Street photography'']'
  career_goals: Rui aims to transition from senior developer to technical leader, shaping product visions that merge technology with creative expression. He aspires to become a lead architect or CTO of
    a boutique studio that builds immersive digital experiences, such as interactive art installations or therapeutic creative‑coding platforms. He also wants to contribute to open‑source projects that
    lower barriers for aspiring coders, especially from underrepresented communities. In the longer term, Rui dreams of launching his own startup that leverages AI‑generated media to help people explore
    mindfulness and emotional well‑being, aligning his technical expertise with his compassionate nature.
