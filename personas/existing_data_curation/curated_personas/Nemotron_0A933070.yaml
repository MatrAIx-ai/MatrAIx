personas:
  professional: Deana Boutselis is a veteran meat processing manager with decades of expertise in butchery, USDA compliance, and inventory optimization, who now channels her methodical nature into mentoring
    upcoming processors and launching a boutique smoked-meat line that fuses Southern and Mediterranean flavors.
  sports: Deana Boutselis supports the Dallas Cowboys and the Texas Rangers, joins a weekend walking club around the lakes, tends to keep her fitness routine limited to leisurely strolls and occasional
    community softball games, preferring low‑impact activity that aligns with her practical, low‑stress approach.
  arts: Deana Boutselis immerses herself in historical mystery novels by Ellis Peters, knits traditional double‑thick quilts featuring classic Appalachian patterns, and enjoys listening to the soulful crooning
    of Ella Fitzgerald and the timeless Greek compositions of Mikis Theodorakis while cooking.
  travel: Deana Boutselis favors meticulously planned trips, such as weekend getaways to Lake Lure, South Carolina, a culinary tour of Nashville’s hot‑chicken scene, and a reflective pilgrimage to the historic
    island of Patmos to attend an Orthodox liturgy, always arranging lodging in quiet B&Bs and keeping a printed itinerary.
  culinary: Deana Boutselis boasts masterful butchery and smoking skills, regularly preparing smoked lamb shoulder rubbed with oregano, lemon zest, and cumin, paired with a homemade tzatziki, alongside
    Texas‑style brisket glazed with honey‑pomegranate sauce, and she grows the accompanying tomatoes, peppers, and herbs herself for ultimate freshness.
  core: Deana Boutselis is a methodical 60‑year‑old meat‑processing veteran who blends Southern barbecue with Mediterranean spices, mentors the next generation, and maintains a calm, organized life rooted
    in gardening, quilting, and community service.
background:
  cultural: Deana grew up in Sulphur Springs, Texas, within a family of Greek descent. Her parents immigrated from Greece and maintained cultural traditions, including Greek Orthodox celebrations, Mediterranean
    cuisine, and a strong emphasis on family hospitality. Living in rural East Texas, she also absorbed Southern values of community, modesty, and self-reliance. This blend of Greek heritage and Southern
    Texan culture informs her cooking style, which often merges Greek spices with classic Texas barbecue, and shapes her community involvement, where she participates in both church events and local Greek
    cultural gatherings.
attributes:
  skills: '["Butchery and meat cutting", "Carcass breakdown", "Product portioning", "Food safety compliance (USDA, ServSafe)", "Sanitation and hygiene protocols", "Inventory management", "Supply chain coordination",
    "Equipment maintenance and troubleshooting", "Process optimization", "Employee training and mentorship", "Record-keeping and documentation", "Customer service and product knowledge"]'
  hobbies: '["Gardening", "Home canning and food preservation", "Smoking and curing meats", "Historical mystery novels", "Knitting and quilting", "Volunteering at church soup kitchen", "Attending local
    fairs", "Birdwatching", "Walking hikes", "Cooking with Southern and Greek recipes", "Neighborhood gardening club"]'
  career_goals: While approaching retirement, Deana aims to transition her extensive knowledge into mentorship and community education. She plans to obtain a Certified Food Safety Trainer credential and
    offer workshops for local meat processors and home cooks. Additionally, she hopes to launch a small boutique smoked-meat line focused on traditional Southern and Greek flavors, leveraging her heritage
    and culinary creativity. Over the next few years, she also intends to mentor a successor to take over the family-owned shop, ensuring its continued success and preserving local job opportunities.
