personas:
  professional: Miranda Adcock, a veteran nonprofit communications strategist with over twenty years leading fundraising campaigns, blends data‑driven analytics, persuasive storytelling, and a competitive,
    risk‑aware mindset to craft large‑scale donor initiatives while mentoring emerging fundraisers.
  sports: Miranda Adcock, an avid tennis player who competes in weekly co‑ed matches at the Austin Tennis Club and cheers on the Dallas Cowboys during football season, balances her fitness routine with
    occasional weekend hikes to keep stress at bay.
  arts: Miranda Adcock, who volunteers in community theatre productions of classics like Arthur Miller's "Death of a Salesman" and hosts a book club that often debates works by Toni Morrison and Haruki
    Murakami, draws creative inspiration from playwright Lin‑Manuel Miranda and musician Esperanza Spalding, shaping her identity through performance and literature.
  travel: Miranda Adcock, who plans her trips with a mix of structured itineraries and spontaneous detours, enjoys weekend getaways to New Mexico's Santa Fe for art festivals and longer vacations to Oaxaca,
    Mexico to explore the roots of Tex‑Mex cuisine, though family commitments sometimes limit her travel budget.
  culinary: Miranda Adcock, whose intermediate cooking skills shine when she prepares spicy chile verde enchiladas, hand‑chopped guacamole, and grilled corn with fresh cilantro and epazote from her herb
    garden, delights in experimenting with bold Tex‑Mex flavors while occasionally over‑seasoning out of a competitive desire to impress guests.
  core: Miranda Adcock, a fiercely competitive yet community‑driven fundraising veteran, balances meticulous data analysis with a love for theatre, tennis, and spicy Tex‑Mex cooking, all while wrestling
    with chronic worry and a penchant for over‑planning every detail.
background:
  cultural: Miranda was raised in a middle‑class, suburban white family in the Dallas‑Fort Worth metroplex, steeped in Texas cultural values of hospitality, self‑reliance, and community service. Her upbringing
    in a Methodist congregation emphasized charitable giving and civic engagement, shaping her lifelong commitment to nonprofit work. While she cherishes traditional Texan customs—family barbecues, country
    music, and a love for local food—her humanities education broadened her perspective, fostering an appreciation for diverse narratives and global cultural contexts. This blend of regional pride and outward
    curiosity informs her pragmatic yet innovative professional approach.
attributes:
  skills: '["Strategic messaging", "Media relations", "Donor cultivation", "Grant writing", "Major‑gift solicitation", "Event planning", "Crisis communications", "Data‑driven fundraising analytics", "CRM
    platforms (Raiser’s Edge, Salesforce Nonprofit Cloud)", "Budgeting and financial oversight", "Team leadership", "Public speaking"]'
  hobbies: '["Community theatre", "Book club", "Tennis", "Gardening (native Texan herbs)", "Cooking Tex‑Mex cuisine", "Yoga", "Mindfulness meditation", "Reflective journaling", "Online courses in digital
    storytelling", "Volunteer fundraising coach"]'
  career_goals: Miranda aims to step into a senior director role overseeing development for a statewide nonprofit network, where she can design and execute large‑scale, data‑informed fundraising campaigns.
    She intends to mentor the next generation of fundraisers, champion inclusive philanthropy, and embed risk‑assessment frameworks to mitigate the uncertainty she often feels. Long‑term, she envisions
    launching a boutique consulting firm that helps midsize nonprofits modernize their communications while preserving mission integrity. Additionally, Miranda hopes to author a practical guide on resilient
    fundraising amidst economic fluctuations, cementing her legacy as a thought leader in the sector.
