personas:
  professional: Corey Wheeler, a veteran secondary‑school STEM teacher, leverages a data‑driven, meticulously organized approach to curriculum design and lab safety while assertively championing resources
    and collaborating with colleagues to elevate physics and mathematics achievement.
  sports: Corey Wheeler, a dedicated member of the Hendersonville Hiking Club, spends Saturdays trekking the Blue Ridge trails and joins a senior pickleball league at the local community center, while rooting
    for the Charlotte Hornets in basketball and the Carolina Panthers in football.
  arts: Corey Wheeler, an avid photographer who emulates Ansel Adams’ dramatic black‑and‑white landscapes, draws design inspiration from the furniture of George Nakashima, relaxes to the folk melodies of
    John Denver and the cello suites of Johann Sebastian Bach, and collects vintage posters of Tennessee Williams plays, weaving these artistic influences into his woodworking and garden aesthetics.
  travel: Corey Wheeler, a meticulous planner who logs each itinerary in a spreadsheet, prefers leisurely road trips along the Blue Ridge Parkway, weekend getaways to historic Charleston, and annual visits
    to England’s Lake District to capture its fells, while dreaming of a spring pilgrimage to the apple orchards of Normandy, balancing his modest retirement budget with a love for cultural immersion.
  culinary: Corey Wheeler, a garden‑to‑table enthusiast, frequently cooks heirloom tomato salads with fresh basil, bakes rustic sourdough loaves using locally milled whole‑grain flour, and perfects a caramel‑apple
    crumble featuring the heritage apples from his orchard, all while savoring a glass of aged Cabernet Sauvignon on quiet evenings.
  core: Corey Wheeler, a detail‑obsessed educator‑turn‑craftsman, blends relentless curiosity with practical precision, yet often battles lingering worries that drive both disciplined habits and occasional
    over‑planning.
background:
  cultural: Corey was raised in a middle‑class family in the foothills of western North Carolina, where his parents valued hard work, community involvement, and education. His father, a carpenter, taught
    him practical problem‑solving skills, while his mother, a school secretary, instilled an appreciation for organized systems and academic achievement. Growing up near the Appalachian region, Corey absorbed
    a blend of Southern hospitality and a deep respect for the natural environment, participation in local festivals, and a tradition of volunteerism. He attended public schools in Buncombe County, where
    he gravitated toward science and mathematics, and later earned a STEM degree before returning to his hometown to teach. This regional heritage informs his emphasis on community outreach, stewardship
    of the local landscape, and an inclusive approach to education that honors both tradition and innovation.
attributes:
  skills: '[''Curriculum design'', ''Lesson planning'', ''STEM integration'', ''Laboratory safety management'', ''Data‑driven assessment'', ''Educational technology utilization'', ''Mentoring new teachers'',
    ''Project‑based learning facilitation'', ''Community outreach coordination'', ''Professional development facilitation'', ''Classroom organization'']'
  hobbies: '[''Woodworking'', ''Gardening (vegetable and apple orchards)'', ''Birdwatching'', ''Model train building'', ''Reading historical non‑fiction'', ''Hiking the Blue Ridge Mountains'', ''Playing
    chess'', ''Landscape photography'']'
  career_goals: Looking ahead to the next five years, Corey aims to earn National Board certification in Mathematics to solidify his instructional expertise and to author a district‑wide STEM curriculum
    framework that balances innovative projects with proven teaching methods. He plans to expand the school's robotics and coding club, secure grant funding for new lab equipment, and build stronger partnerships
    with Asheville‑area colleges for dual‑enrollment opportunities. As retirement approaches, Corey hopes to transition into a mentor‑teacher role, guiding his successor while reducing his own classroom
    load to manage stress more effectively. He also aspires to present his instructional strategies at regional education conferences and contribute articles to professional journals, thereby leaving a
    lasting impact on STEM education in his community.
