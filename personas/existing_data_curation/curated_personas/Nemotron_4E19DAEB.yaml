personas:
  professional: Michelle Vargas, an aspiring teen visual storyteller, blends watercolor, acrylic, and digital illustration on her tablet to craft fantasy characters, yet their spontaneous nature often leads
    to unfinished projects and a struggle to meet school art deadlines.
  sports: Michelle Vargas, a fan of the Houston Dynamo soccer club and a participant in the community youth dance troupe, prefers the rhythmic footwork of flamenco over conventional sports, yet joins the
    after‑school park volleyball games when friends invite them.
  arts: Michelle Vargas, who devours graphic novels like 'Saga' and 'Monstress' and admires artists such as Hayao Miyazaki, Frida Kahlo, and Alex Ross, spends weekends sketching in the Houston Museum of
    Fine Arts courtyard, experimenting with color palettes that echo the vibrant hues of their favorite indie pop album covers.
  travel: Michelle Vargas, dreaming of wandering the historic streets of Barcelona and the vibrant markets of Oaxaca after school trips, favors spontaneous weekend outings to nearby parks and museums over
    long‑planned vacations, but their family budget confines them to local destinations for now.
  culinary: Michelle Vargas, who loves helping prepare paella with saffron and shrimp on family Sundays, also enjoys recreating a simple tortilla española and experimenting with watercolor‑inspired plating
    for dishes like avocado toast topped with cherry tomatoes.
  core: Michelle Vargas, a curious and worry‑prone teen, channels spontaneous artistic bursts into vivid sketches while juggling the anxiety of unfinished projects and a love for indie Latin pop beats.
background:
  cultural: Michelle comes from a Spanish‑heritage family that keeps the language alive at home, celebrating holidays such as Semana Santa, Día de los Santos Inocentes, and Spanish National Day with traditional
    foods, music, and dance. Her parents encourage her to maintain a connection to Spanish culture while also embracing the multicultural environment of Houston, where she interacts with Mexican, Central
    American, and other Latino communities. This blend of cultural influences shapes her values of family closeness, respect for artistic expression, and pride in sharing her heritage through art.
