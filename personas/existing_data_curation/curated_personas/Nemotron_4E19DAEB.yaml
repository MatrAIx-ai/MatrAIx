  career_goals: She dreams of becoming a visual artist or graphic designer, hoping to study fine arts at a university and eventually create illustrations that celebrate her Spanish heritage. She also considers
    a future as a cultural journalist or museum curator, where she could blend storytelling with art. In the short term, she aims to build a strong portfolio, win a school art competition, and maybe secure
    a mentorship with a local illustrator. She wants to improve her organization skills so she can meet deadlines for future studies and creative projects.
