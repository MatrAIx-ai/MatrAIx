personas:
  professional: Hiroshi Wu, a 10‑year‑old aspiring visual storyteller and junior coder, blends their boundless curiosity and sociable energy by sketching manga‑style characters on a drawing tablet and co‑creating
    simple animations in Scratch, showcasing early proficiency in visual composition and logical sequencing while thriving as the enthusiastic voice of group projects.
  sports: Hiroshi Wu actively participates in their after‑school soccer league as a midfield enthusiast, idolizes Manchester United’s dynamic playstyle, and proudly wears the jersey of the hometown Tigers
    club on weekends, blending disciplined team drills with a love for high‑energy matches.
  arts: Hiroshi Wu channels their artistic curiosity through manga‑inspired sketches modeled after Osamu Tezuka and Akira Toriyama while absorbing the whimsical storytelling of Hayao Miyazaki’s Studio Ghibli
    films, and often hums along to Billie Eilish and Taylor Swift as a soundtrack for their drawing sessions.
  travel: Hiroshi Wu prefers family‑planned weekend getaways, exploring local nature trails to collect insects for their science journal while enjoying occasional trips to Orlando's Magic Kingdom for its
    rides, and they dream of strolling through Paris’s historic streets and the Eiffel Tower someday.
  culinary: Hiroshi Wu has an adventurous palate, often helping prepare sweet rice cakes and simple dumplings for Lunar New Year celebrations while impressively mastering the art of rolling sushi with tuna
    and avocado, loves the comforting taste of pepperoni pizza, and frequently adds soy sauce and wasabi to snacks, showcasing a budding intermediate cooking skill but a tendency to over‑indulge in sugary
    treats.
  core: Hiroshi Wu is a curious, talkative ten‑year‑old who balances a love for cartoon storytelling and coding with a habit of impulsively splurging on LEGO sets, all while keeping a science journal full
    of collected leaves and insects.
background:
  cultural: Hiroshi was born to parents of East Asian descent—his mother grew up in Taiwan and his father in Japan—who immigrated to the United States before his birth. The family lives in Silver Spring,
    Maryland, a culturally diverse suburb of Washington, D.C., where they maintain a bilingual household that blends Mandarin Chinese, Japanese cultural practices, and American customs. At home, Hiroshi
    hears both English and Mandarin spoken daily, and his parents encourage an appreciation for traditional arts such as calligraphy, tea ceremony, and storytelling, alongside participation in local community
    events. He celebrates Lunar New Year with family gatherings, red envelopes, and homemade dumplings, and he attends a nearby multicultural center’s workshops on Asian art and music. This blend of heritage
    and the inclusive, multicultural environment of Montgomery County shapes his values of harmony, respect for others, and a curiosity about different perspectives.
