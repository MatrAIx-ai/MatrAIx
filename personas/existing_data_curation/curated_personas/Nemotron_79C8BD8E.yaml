  career_goals: Looking ahead, Hiroshi dreams of turning his love of art and technology into a career where he can share stories that celebrate different cultures. He imagines becoming a multimedia storyteller—whether
    as an illustrator of children’s books, a video‑game designer, or a young educator who creates interactive learning experiences. He is especially excited about projects that let him combine his digital
    drawing skills with the simple programming he enjoys, hoping to develop games or apps that teach language and cultural concepts. Over the long term, he sees himself fostering collaboration among diverse
    groups of kids, perhaps as a youth program director or cultural ambassador, using his sociable nature and knack for clear communication to inspire others.
