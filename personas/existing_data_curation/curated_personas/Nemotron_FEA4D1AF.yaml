  career_goals: Despite being retired, Linda aims to leave a lasting legacy through a memoir that intertwines her life story with reflections on education and art. She aspires to mentor younger teachers
    through a local senior‑teacher mentorship program she hopes to establish. Linda also seeks to curate an intergenerational art exhibit at the Orland Park public library, showcasing works by seniors and
    schoolchildren, and hopes to be recognized as a community elder who bridges generational gaps through learning and creativity.
