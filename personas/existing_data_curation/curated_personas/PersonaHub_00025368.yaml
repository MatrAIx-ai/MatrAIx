persona_description: A fisheries researcher with expertise in odontocete depredation, particularly in the context of longline fisheries off the Crozet Islands. This person is interested in identifying fishing
  practices that could reduce odontocete depredation, with a focus on killer whales interacting with Patagonian toothfish longliners. They are looking for cost-effective and feasible solutions that can
  mitigate the negative impacts of killer whale depredation on the fisheries and wild populations.
