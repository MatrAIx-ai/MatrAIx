personas:
  professional: Philip Hotard is a budding young game designer who crafts Scratch games with intricate storylines, applies the same methodical planning they use for LEGO builds to code, and channels their
    vivid imagination into original comic panels that they hope to turn into interactive narratives.
  sports: Philip Hotard is a member of the Columbia River Trail Club's junior hiking group, plays on the local youth soccer team the River Runners, and cheers for the Seattle Seahawks, while maintaining
    a disciplined weekly routine of bike rides and bird‑watching hikes that blend their love of nature with light exercise.
  arts: Philip Hotard is a diligent comic‑book creator who emulates the dynamic panels of Jim Lee, sketches fantasy creatures inspired by J.R.R. Tolkien, and practices piano pieces by Beethoven and Debussy
    while improvising melodic themes that echo video‑game scores by Koji Kondo.
  travel: Philip Hotard prefers weekend road trips that combine sketching sessions at the Columbia River waterfront, hikes in Mount Rainier National Park, and visits to science museums, while dreaming of
    a future adventure to Kyoto to explore its historic temples and anime culture.
  culinary: Philip Hotard enjoys crafting layered fruit parfaits with granola and honey, devouring pepperoni pizza with extra cheese, yet they often trade a balanced meal for a quick bag of gummy bears
    after an intense LEGO build, reflecting a habit of rewarding themselves with sugary snacks.
  core: Philip Hotard is a ten‑year‑old imagination‑driven prodigy who balances disciplined LEGO engineering and Scratch coding with spontaneous snack binges and occasional forgetfulness about chores.
background:
  cultural: Philip comes from a white American family with Northern European (German and Scandinavian) ancestry. He lives in Winlock, a small town in Lewis County, Washington, where community life centers
    on the local school, church, and seasonal events such as the Lewis County Fair and the annual salmon run. The Pacific Northwest's outdoors‑oriented culture influences his interests in nature walks,
    birdwatching, and environmental stewardship. He celebrates mainstream American holidays—Thanksgiving, Fourth of July, and Christmas—while also participating in local traditions like community potlucks,
    holiday parades, and volunteer clean‑up days. His family values education, curiosity, and self‑reliance, encouraging him to explore both academic and creative pursuits.
