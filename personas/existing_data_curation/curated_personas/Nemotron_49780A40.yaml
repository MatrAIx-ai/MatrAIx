  hobbies: '[''Drawing comics'', ''Reading fantasy/sci-fi books'', ''LEGO building'', ''Coding with Scratch'', ''Stargazing'', ''Exploring nature trails'', ''Birdwatching'', ''Playing piano'', ''Collecting
    rocks'', ''Solving puzzles'']'
  career_goals: Philip dreams of a future where he can blend art and technology, envisioning himself as a game designer or interactive storyteller who creates immersive digital worlds for other kids. He
    also imagines becoming an astronomer or aerospace engineer, drawn by his fascination with space and abstract concepts. Ultimately, his ambition is to pursue a career that lets him innovate, create,
    and share imaginative ideas while inspiring curiosity in others.
