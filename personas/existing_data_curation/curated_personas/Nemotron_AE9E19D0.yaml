  hobbies: '[''Reading middle‑grade mystery series'', ''Comic strip drawing'', ''After‑school soccer'', ''Ice‑skating'', ''Exploring Como Park'', ''LEGO building'', ''Scratch game creation'', ''Piano lessons'',
