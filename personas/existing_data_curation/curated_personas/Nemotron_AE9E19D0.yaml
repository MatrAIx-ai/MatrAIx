personas:
  professional: Susie Yair is a budding junior coder who crafts simple games in Scratch, builds LEGO sets, and draws mystery-inspired comic strips, applying a love for structure to logical game logic while
    also injecting spontaneous plot twists, and they eagerly showcase their creations during Girl Scout badge workshops.
  sports: Susie Yair plays on the YMCA Warriors youth soccer team after school, ice-skates at the community rink each winter, and embraces spontaneous sledding adventures on snow days, cheering for the
    Minnesota Twins and Vikings while balancing structured training sessions with the joy of free-form outdoor play, and they relish the sense of teamwork that comes from both organized matches and casual
    snow-drift races.
  arts: Susie Yair spends afternoons drawing comic strips influenced by Mo Willems and Kate Beaton, devours Nancy Drew mystery novels, listens to Taylor Swift and Billie Eilish on their piano practice breaks,
    watches Pixar films like Toy Story, and occasionally participates in the local children's theater's productions of Annie, weaving these artistic inspirations into their own storytelling.
  travel: Susie Yair enjoys family road trips to nearby Lake Harriet and the Mall of America, dreams of exploring Walt Disney World in Orlando and Yellowstone National Park, prefers organized weekend itineraries
    with parents but also delights in impromptu snow-day sledding outings, balancing a modest travel allowance with the excitement of future adventures abroad, and they often keep a scrapbook of tickets
    and photos to remember each journey.
  culinary: Susie Yair favors cheery meals like macaroni and cheese with sharp cheddar and pepperoni, builds their own mini pizzas topped with mozzarella, olives, and sliced bell peppers, bakes chocolate-chip
    cookies with help from Mom, and can whisk together fluffy pancakes with maple syrup, showcasing an enthusiastic but occasionally messy kitchen style.
  core: Susie Yair is a curious ten-year-old who balances a love for orderly LEGO builds with spontaneous comic-book splurges, often leaving a trail of crayons and LEGO bricks wherever they go.
background:
  cultural: Susie belongs to a white family living in Saint Paul, Minnesota, a city known for its mix of Midwestern and Scandinavian heritage. Her upbringing reflects typical Midwestern values of community,
    modesty, and appreciation for the outdoors. She celebrates common holidays such as Thanksgiving, Christmas, and Halloween, and often participates in local events like the Saint Paul Winter Carnival.
    Her school is a diverse public elementary school, exposing her to classmates from many cultural backgrounds. Family meals sometimes feature regional dishes like hotdish, and she enjoys following the
    Minnesota Twins and Vikings sports seasons. Her parents stress the importance of education, kindness, and engaging in community programs such as library story time and local park clean‑ups.
