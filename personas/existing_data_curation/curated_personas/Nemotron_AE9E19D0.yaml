  career_goals: Susie dreams of a future where she works closely with animals and nature. She often talks about becoming a veterinarian or a wildlife conservationist, attracted by the clear steps of study
    and the chance to help living creatures. She also enjoys explaining things to friends, which fuels an interest in teaching elementary school. While she recognizes she is still early, she envisions a
    structured educational path through middle school, high school, and college, while keeping an open mind for creative problem‑solving opportunities along the way.
