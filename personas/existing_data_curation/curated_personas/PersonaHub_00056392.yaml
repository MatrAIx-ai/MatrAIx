persona_description: An engineer who is interested in studying and designing plane curves and their applications in engineering practices. The engineer is familiar with the principles of projection and
  its application in engineering drawings, and is interested in constructing and drawing curves such as ellipses, parabolas, and hyperbolas by using the eccentricity method only. The engineer also has knowledge
  of cycloids, involutes of squares and circles, and the construction of an ellipse, parabola, and hyperbola by eccentricity. The engineer is interested in drawing normal and tangent to these curves and
  is looking for a detailed explanation and practice problems related to these curves.
