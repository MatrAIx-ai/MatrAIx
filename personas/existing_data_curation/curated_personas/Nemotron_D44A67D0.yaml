personas:
  professional: Stephanie Hamilton, a 26‑year‑old automotive body technician in Los Angeles, merges an artist’s imagination with ASE‑certified precision, wielding a welding torch and CAD software to craft
    seamless paint finishes while they meticulously manage shop workflow, mentor junior staff, and pursue a master technician certification with a vision of a sustainable boutique body shop.
  sports: Stephanie Hamilton fuels their fitness routine with sunrise yoga, weekend surf sessions at Venice Beach, and weekly rides with the Santa Monica Cycling Club, cheering on the LA Dodgers and Lakers
    while they balance a love for low‑impact cardio with occasional strength training to counteract the physical toll of welding.
  arts: Stephanie Hamilton channels the vibrancy of LA street art by sketching murals inspired by Shepard Fairey and David Hockney, infusing digital illustrations with the neon glow of James Turrell installations,
    while they unwind listening to Daft Punk and attend monthly gallery openings at LACMA.
  travel: Stephanie Hamilton maps out weekend getaways along the Pacific Coast Highway, annual pilgrimages to the Tokyo Auto Salon and Detroit’s Motor City Classic, and art‑focused trips to Berlin’s Urban
    Nation museum, balancing a structured itinerary with spontaneous detours to local street‑art districts while they savor each new cultural vibe.
  culinary: Stephanie Hamilton’s kitchen is a laboratory where they experiment with gochujang‑marinated tacos, miso‑glazed salmon, and matcha‑infused pancakes, skillfully blending fresh cilantro, smoked
    paprika, and fermented black beans to create eclectic, Instagram‑worthy meals that reflect their love for bold colors and textures.
  core: Stephanie Hamilton is a 26‑year‑old auto‑body wizard who paints with welds, solves puzzles between yoga breaths, and obsessively catalogs every shade of paint like a seasoned collector, all while
    they maintain an almost uncanny calm.
background:
  cultural: Stephanie grew up in a middle‑class, Anglo‑American household in the Los Angeles area. Her upbringing combined a traditional work ethic with the city’s vibrant, multicultural environment, exposing
    her to West Coast car culture, contemporary art scenes, and diverse community values. This blend fostered her appreciation for craftsmanship, collaborative harmony, and creative expression, shaping
    her identity as a disciplined yet imaginative automotive professional.
attributes:
  skills: '["structural panel repair", "frame alignment", "MIG/TIG welding", "automotive paint mixing", "color matching", "CAD body design", "shop workflow management", "inventory control", "quality assurance",
