  career_goals: Clint aims to leverage his practical experience and people‑skills into a supervisory role. Over the next few years he plans to obtain a retail‑management certificate at a local community
    college, move up to shift supervisor, and eventually become store manager. His longer‑term ambition is to open a small independent convenience store that reflects his community values, giving him greater
    control over scheduling while allowing him to compete for market share. He also hopes to mentor new cashiers, sharing his knowledge of customer interaction and efficient store operations.
