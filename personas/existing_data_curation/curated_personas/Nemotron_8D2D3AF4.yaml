  career_goals: Dalila aims to leave a lasting imprint on her organization by championing an HR model that fully integrates Indigenous perspectives and creative thinking. Over the next five years she plans
    to launch a tribally‑focused employee resource group, mentor the next generation of HR professionals, and steer the company toward a senior HR director role where she can shape policies that promote
    holistic employee well‑being. She also envisions transitioning to a consultancy that partners with tribal enterprises and small businesses in Oklahoma, helping them build culturally resonant talent
    strategies. In parallel, she hopes to author a guidebook that blends HR best practices with storytelling traditions of her heritage, providing a roadmap for leaders who seek to honor both business objectives
    and community values.
