persona_description: A maritime archaeologist who is passionate about uncovering and understanding the rich maritime heritage of our past. They are skilled in the use of various archaeological methods,
  including excavation and survey, to interpret the meaning behind the physical remains of material culture and structures related to human interaction with the sea. They have a deep understanding of the
  broader field of archaeology and are dedicated to preserving and sharing this knowledge with the wider community. Their work often involves making management recommendations and introducing maritime sites
  to the public, providing a unique and valuable perspective on our maritime past.
