  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Cooking Cuban cuisine and hosting dinner gatherings'', ''Balcony herb and flower gardening'', ''Listening to classic Cuban
    music'', ''Reading historical fiction and Cuban memoirs'', ''Walking in Bayfront Park and along the beach'', ''Practicing yoga and mindfulness for stress relief'', ''Volunteering as a reader for senior
    community members'']'
  career_goals: Although retired from formal employment, Ana aims to deepen her involvement in cultural and educational volunteer work. She hopes to become a docent at the Miami Art Museum, lead cooking
    workshops for senior residents, and mentor young Cuban-American artists through a local arts nonprofit. Ana also plans to enroll in a community college art history class to satisfy her curiosity about
    new ideas and artistic movements. A heartfelt ambition is to travel back to Cuba to document family stories and preserve oral histories for future generations, thereby contributing to her community’s
    cultural legacy.
