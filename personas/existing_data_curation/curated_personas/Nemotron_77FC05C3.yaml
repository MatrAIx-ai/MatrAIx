  career_goals: She aims to expand cultural programming at her local senior center, mentor younger volunteers, preserve and teach Mexican culinary traditions to new generations, learn advanced digital tools
    such as video editing to document her family's history, and eventually author a memoir that captures her life's journey and cultural heritage.
