  hobbies: '[''Reading (Mexican literature and history)'', ''Gardening'', ''Hiking'', ''Woodworking'', ''Cooking traditional Mexican meals'', ''Volunteering at community pantry (organizing)'', ''Listening
    to regional Mexican music'', ''Nature photography'']'
  career_goals: Jorge aims to become a senior administrative coordinator within a nonprofit or community organization that serves the local Mexican‑American population. He plans to earn the Certified Administrative
    Professional (CAP) credential and develop expertise in workflow automation tools to streamline office operations. By leveraging his compassionate disposition, he hopes to mentor junior staff and lead
    initiatives that enhance workplace harmony. Ultimately, he seeks a role that offers flexible scheduling, allowing him to maintain his quiet work style while contributing meaningfully to community well‑being.
