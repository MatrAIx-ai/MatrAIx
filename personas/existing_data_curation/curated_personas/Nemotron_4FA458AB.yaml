  hobbies: '[''Puzzle and matching games'', ''Building wooden block towers'', ''Coloring and drawing'', ''Listening to picture books'', ''Singing nursery rhymes'', ''Playing at the park (swings, slides)'',
    ''Helping set the table'']'
  career_goals: Tatiana loves helping others and often imagines a future where she can care for and guide people in a practical, organized setting. She dreams of becoming a teacher who can create a kind
    and structured classroom for younger children, or a pediatric nurse who can look after kids when they are ill. She also envisions working at the local library, helping friends find their favorite storybooks.
    These ambitions reflect her compassionate nature and her desire for realistic, helpful roles that fit her preference for routine and order.
