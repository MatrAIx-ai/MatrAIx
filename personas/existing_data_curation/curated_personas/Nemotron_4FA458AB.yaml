personas:
  professional: Tatiana Hammer, a diligent preschool helper, loves organizing the daily story‑time rotation, assisting teachers in tidying up toys, and quietly reminding classmates to line up, reflecting
    her strong preference for routine and practical, cooperative nature.
  sports: Tatiana Hammer participates in the Little Lions community soccer club on Saturday mornings, idolizes the River City Bears professional baseball team, and loves cheering them on at the downtown
    stadium, demonstrating her love for routine practice and playful competition.
  arts: Tatiana Hammer adores watching the animated classic "Frozen" starring Idina Menzel, sings along to The Wiggles' "Fruit Salad" song, and proudly displays crayon drawings of magical castles, reflecting
    her compassionate imagination and love for familiar, joyful artistic experiences.
  travel: Tatiana Hammer enjoys family trips to the nearby seaside boardwalk where she builds sandcastles, loves the annual visit to the city's children's museum in Springfield, and dreams of exploring
    Disney World in Orlando, balancing her love for routine vacations with occasional excitement for new adventures.
  culinary: Tatiana Hammer prefers simple comfort foods like chicken nuggets with ketchup, mac and cheese with a sprinkle of cheddar, and loves helping stir batter for blueberry muffins using a tiny wooden
    spoon, yet stubbornly refuses broccoli, showing her practical taste preferences and occasional picky eating habit.
  core: Tatiana Hammer is a routine‑loving, compassionate 4‑year‑old who balances organized play, careful saving, gentle health habits, enthusiastic sports participation, cheerful arts appreciation, adventure‑tuned
    travel, and comfort‑focused meals, all sprinkled with adorable quirks.
background:
  cultural: Tatiana was born and raised in Ogden, Utah, in Weber County, as part of a middle‑class white family. Her upbringing reflects the Intermountain West’s blend of suburban American culture, with
    an emphasis on family togetherness, community involvement, and outdoor recreation in the nearby mountains. She celebrates typical U.S. holidays such as Thanksgiving, Christmas, and Independence Day,
    and regularly attends library storytime and local park events. The region’s practical, modest values and focus on cooperation have shaped her routine‑oriented and compassionate personality.
attributes:
  skills: '[''Fine motor coordination (cutting, drawing, block building)'', ''Letter recognition and early phonics'', ''Counting to 20 and basic addition'', ''Expressive vocabulary and simple storytelling'',
