personas:
  professional: Margarita Pham, a two‑year‑old budding engineer, tinkers with building blocks and magnetic tiles, showing early problem‑solving skills and a balance of spontaneous curiosity with a surprisingly
    practical approach to assembling structures, even if she resists tidy cleanup.
  sports: Margarita Pham, a two‑year‑old who loves to splash in the community pool during summer and toddles around the park’s mini soccer field with the Tiny Tots Soccer Club, often watches the Los Angeles
    Dodgers on TV, but prefers solitary dashing over structured drills.
  arts: Margarita Pham, a two‑year‑old who delights in finger‑painting with bright primary colors while dancing to songs by Raffi and watching the animated antics of Peppa Pig and Sesame Street’s Elmo,
    integrates these creative moments into her daily routine.
  travel: Margarita Pham, a two‑year‑old who recently explored the seaside boardwalk of Santa Monica with her parents and spent a weekend at grandma’s mountain cabin, dreams of a family adventure to Disney
    World in Orlando and is fascinated by colorful maps of Paris.
  culinary: Margarita Pham, a two‑year‑old with a soft spot for creamy mac and cheese, banana slices, and bite‑size carrot sticks, enjoys helping stir batter with a plastic spoon and gets a giggle when
    she accidentally spills a splash of oat milk onto the high‑chair tray.
  core: Margarita Pham, a two‑year‑old who balances limitless curiosity with a quiet, solitary nature, insists on arranging her stuffed animals in perfect rows yet stubbornly refuses noisy bedtime stories,
    and often bursts into song while brushing her teeth.
background:
  cultural: Margarita comes from a Vietnamese‑American family rooted in southeast Asian traditions, reflected in the bilingual environment of her home where Vietnamese and English are spoken. Her family
    celebrates Tet (Lunar New Year) with traditional foods like bánh chưng and visits to the local Vietnamese community center in Vallejo. The household places high value on respect for elders, communal
    meals, and storytelling, often sharing folktales from her heritage. Growing up in the diverse Bay Area, she is also exposed to a blend of cultures, which enriches her appreciation for varied cuisines
    and festivities. These cultural influences shape her values of modesty, curiosity about the world, and the importance of family.
