  career_goals: In retirement Anita aims to continue her lifelong commitment to education and community service. She plans to volunteer as a reading tutor at the local library, mentor aspiring teachers
    through the state's educator mentorship program, and spearhead an intergenerational community garden project that brings together seniors and schoolchildren. She also hopes to document and share the
    oral histories of long‑time residents of Iowa Falls, preserving the town's heritage for future generations. Maintaining her health and staying socially engaged are central to her personal ambitions.
