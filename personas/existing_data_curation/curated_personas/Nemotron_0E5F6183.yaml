  hobbies: '[''Visiting art galleries and museums'', ''Reading historical biographies and contemporary fiction'', ''Gardening (vegetables, herbs, and flowers)'', ''Cooking and exploring international recipes'',
    ''Volunteering at the local library and senior center'', ''Road trips to cultural sites'', ''Digital photography of nature and community events'', ''Solving crossword puzzles and Sudoku'', ''Knitting
    scarves and blankets for charity'']'
  career_goals: While currently not in the formal workforce, Maria aims to expand her impact in the Cary community by taking on a leadership role with the McHenry County Historical Society and by developing
    a series of art-appreciation workshops for seniors. She plans to complete a short certification in nonprofit management to strengthen her volunteer leadership, and she hopes to author a memoir that
    weaves together her life experiences, resilience, and love of art. Additionally, Maria aspires to cultivate a community garden that provides fresh produce and a shared space for intergenerational learning,
    and she intends to travel to at least three major museums across the United States over the next five years.
