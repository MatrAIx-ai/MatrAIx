personas:
  professional: Maria Johnston, a meticulous community event coordinator in Cary, blends her disciplined project‑management expertise with a lifelong curiosity for art history to oversee fundraising drives,
    volunteer programs, and the upcoming community garden, while their cooperative nature fuels mentorship of senior volunteers and drives their pursuit of a nonprofit‑management certification.
  sports: Maria Johnston stays active through weekend walks with the Cary Senior Walking Club and occasional yoga sessions, cheers the Chicago Cubs and Chicago Bears from their porch, and participates in
    a low‑impact tennis league at the local community center, balancing gentle exercise with a love for seasonal outdoor activity.
  arts: Maria Johnston's artistic life revolves around weekly visits to the Art Institute of Chicago, where they study Monet’s water lilies and O’Keeffe’s flower series, while at home they curate a personal
    collection of Ansel Adams prints and soundtrack their knitting sessions with Beethoven symphonies and Miles Davis’s Kind of Blue.
  travel: Maria Johnston prefers meticulously planned short road trips to cultural landmarks, already having toured the Getty Center in Los Angeles, the Metropolitan Museum of Art in New York, and the Smithsonian
    American Art Museum in Washington, D.C., while dreaming of a future pilgrimage to the Museum of Modern Art in San Francisco’s Golden Gate Park.
  culinary: Maria Johnston, an avid home cook, often experiments with global recipes such as Thai green curry with kaffir lime leaves, Italian risotto flavored with saffron and Parmigiano-Reggiano, and
    Moroccan chickpea tagine seasoned with preserved lemons and ras el hanout, while frequently sourcing fresh herbs from their garden to elevate each dish.
  core: Maria Johnston fuses a disciplined organizer’s mind with an artist’s soul, juggling community projects, garden experiments, and knitting for charity, yet often forgets to water indoor succulents
    during busy weeks.
background:
  cultural: Maria is a third-generation Midwestern American of German, Irish, and English ancestry. Raised in a small town in Illinois, she grew up with a strong sense of community, self-reliance, and modesty
    that are hallmarks of the region's cultural fabric. Family traditions emphasized participation in local churches, school events, and neighborhood gatherings, fostering a cooperative spirit. Although
    she values these roots, Maria's curiosity has led her to embrace diverse artistic and cultural experiences, blending traditional Midwestern values with an openness to new ideas and unconventional thinking.
attributes:
  skills: '[''Project and event planning'', ''Volunteer coordination and leadership'', ''Nonprofit budgeting and financial record-keeping'', ''Research and information synthesis'', ''Basic art history knowledge'',
