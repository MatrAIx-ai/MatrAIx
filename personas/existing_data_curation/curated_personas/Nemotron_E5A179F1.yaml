  career_goals: Although retired from full‑time work, Mario aims to stay active and give back. He plans to volunteer as a mentor at the local community college’s trade program, sharing his hands‑on knowledge
    with younger apprentices. He also wants to compile a family genealogy booklet that traces his Italian roots and share it at the town historical society. A personal ambition is to travel with his wife
    to the Italian countryside to experience the culture of his ancestors. In addition, he hopes to lead a small community‑garden initiative that brings neighbors together to grow fresh produce, combining
    his love of gardening with social connection. Maintaining his health through regular walks along the nearby river and a low‑impact exercise routine is also a priority.
