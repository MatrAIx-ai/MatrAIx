persona_description: A district administrator who is responsible for overseeing the educational system in a school district. This individual is interested in analyzing and interpreting student performance
  data to make informed decisions about the improvement of schools and the development of students. They are focused on ensuring that all students are meeting state and federal standards and are prepared
  to succeed in their future academic and professional endeavors. They are dedicated to using data to identify and address areas of weakness in the district, and to provide targeted interventions to help
  students and teachers improve. This persona is skilled in analyzing complex data sets, and is able to make sense of the information presented to them in order to make strategic decisions that will benefit
  the district as a whole.
