persona_description: A scientist and researcher who specializes in environmental fluid dynamics, particularly in the study of waves and their effects on coastal regions. The individual has spent six days
  measuring the maximum heights of waves and the height of water run-up on land, as well as the distance inland the tsunami came and the total area of inundation on land. The scientist has also collected
  data against computer model predictions and published their results in a scientific journal. The individual is interested in the findings and their potential impact on future research and policy concerning
  development and tourism.
