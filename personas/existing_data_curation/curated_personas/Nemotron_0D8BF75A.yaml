personas:
  professional: Javier Flecha is a veteran facilities caretaker whose meticulous, calm, and methodical work ethic has earned him a reputation for flawless cleaning schedules, deep expertise in eco‑friendly
    cleaning technologies, and the ability to train new staff in both technical tasks and safe chemical handling.
  sports: Javier Flecha keeps active with daily walks through Bayamón’s municipal parks, occasionally joins a senior pickleball league, and follows the Vaqueros de Bayamón basketball team and Cangrejeros
    de Santurce baseball club on television, cheering quietly from his modest balcony.
  arts: Javier Flecha finds solace in the lively rhythms of salsa legends Celia Cruz and Willie Colón, the storytelling of plena groups like Plena Libre, and the occasional classic film by Pedro Almodóvar,
    while attending community art fairs that showcase local painters such as an emerging acrylic artist named María Torres.
  travel: Javier Flecha prefers low‑key travel that blends cultural immersion with relaxation, such as weekend trips to the historic streets of Old San Juan, a serene week in the Culebra archipelago, and
    occasional visits to Seville, Spain, where he savors flamenco evenings, all planned well in advance to fit his modest retirement budget.
  culinary: Javier Flecha is a proficient home chef who masterfully prepares family recipes like arroz con gandules and mofongo, seasoning them with fresh cilantro, oregano, and mint from his balcony garden,
    while occasionally indulging in a secret stash of extra hot sauce that he sneaks into every stew.
  core: Javier Flecha embodies quiet diligence and eco‑conscious curiosity, balancing a lifelong love of meticulous cleaning with a penchant for late‑night stargazing, a stubborn refusal to upgrade his
    aging flip‑phone, and a habit of overwatering his herb garden.
background:
  cultural: Javier is a lifelong resident of Bayamón and the neighboring Catano municipality, rooted in Puerto Rican culture that blends Spanish, African, and Taíno influences. He grew up speaking Spanish
    at home and learned English through school and work, reflecting the island's bilingual reality. His Catholic faith and strong family ties shape his values of respect, harmony, and community service.
    He participates in local festivals and neighborhood gatherings, cherishing the rhythms of plena, bomba, and salsa while preferring intimate settings. The resilient spirit of his generation—weathering
    economic shifts and natural challenges—has instilled in him a calm, steady temperament and a pragmatic approach to life.
attributes:
