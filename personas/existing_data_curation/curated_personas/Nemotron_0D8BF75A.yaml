  hobbies: '[''Reading historical non-fiction'', ''Herb gardening'', ''Cooking traditional Puerto Rican cuisine'', ''Listening to plena and salsa music'', ''Playing dominoes with family'', ''Walking in
    local parks'', ''Volunteering at church'', ''Observing night sky/astronomy'']'
  career_goals: Javier aims to transition from frontline cleaning to a supervisory role where he can design efficient cleaning protocols and mentor younger workers. He plans to earn a certification in Facility
    Management to formalize his expertise and to introduce a small community‑based cleaning service that provides part‑time employment for local youth. Ultimately, he hopes to secure a part‑time advisory
    position that lets him share his knowledge while maintaining a balanced, low‑stress lifestyle that supports his health and family commitments.
