personas:
  professional: Leona Pifer is a retired community organizer and volunteer coordinator who leverages her meticulous project‑management skills, digital savvy, and assertive yet compassionate leadership to
    run fundraisers, mentor younger volunteers, and curate a growing online photography archive.
  sports: Leona Pifer enjoys low‑impact fitness through daily walks on the St. Johns River Trail, participates in the Sunrise Senior Walking Club, and follows the Tampa Bay Rays and Orlando Magic, attending
    occasional spring training games and community softball matches with local seniors.
  arts: Leona Pifer immerses herself in creative pursuits by quilting, knitting, photographing native Floridian flora, attending the Sarasota Film Festival, and cites the photographic work of Ansel Adams,
    the folk songwriting of Gillian Welch, and the nostalgic paintings of Andrew Wyeth as continual sources of inspiration.
  travel: Leona Pifer plans meticulous trips using spreadsheets, has explored historic St. Augustine, the Everglades, and Washington D.C., and dreams of attending a space‑launch viewing in Cape Canaveral
    followed by a cultural photography tour of Paris and the historic Camino de Santiago pilgrimage routes.
  culinary: Leona Pifer prefers fresh citrus‑forward meals, often preparing key‑lime pie, citrus‑glazed salmon with basil, and shrimp‑and‑grits seasoned with fresh dill, while her gardening allows her to
    incorporate home‑grown oranges and grapefruit into salads and jams, reflecting a comfortable yet adventurous cooking style.
  core: Leona Pifer blends disciplined organization with relentless curiosity, turning volunteer leadership, gardening, and photography into lifelong projects while refusing to let her age hinder ambitious
    goals.
background:
  cultural: Leona grew up in a mid‑century white, middle‑class family with Southern roots, where values such as hospitality, a strong work ethic, and regular church involvement (Baptist) were emphasized.
    After moving to Titusville on Florida's Space Coast, she embraced the local culture of close‑knit community, a deep respect for the nearby marine environment, and pride in the region's connection to
    NASA's space program. Her cultural identity blends traditional American family celebrations—Thanksgiving, Christmas, Easter—with participation in local festivals, space‑related events, and community
    service.
attributes:
  skills: '["Project organization", "Community event planning", "Volunteer coordination", "Budget management", "Digital photography", "Computer literacy (email, word processing, spreadsheets)", "Home maintenance
    (basic repairs)", "Gardening (native Florida plants)", "Conflict mediation", "Research and information synthesis"]'
  hobbies: '["Gardening (citrus and native plants)", "Birdwatching", "Reading historical fiction and biographies", "Book club participation", "Volunteering at community events", "Digital photography", "Space
    launch viewings", "Quilting and knitting"]'
  career_goals: Although retired, Leona aims to continue leading volunteer initiatives at the local community center, mentor younger volunteers, complete a memoir documenting her life and family history,
    and expand her digital photography portfolio. She also hopes to attend more space launch viewings at the Kennedy Space Center, take a short course in advanced photo editing, and walk the historic St.
    Johns River Trail before she turns 75.
