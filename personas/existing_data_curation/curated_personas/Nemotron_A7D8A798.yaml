personas:
  professional: Nicole Larsen is an aspiring teen nature illustrator who merges her love for drawing, photography, and acoustic guitar into multimedia storytelling, balancing school assignments with volunteer
    story‑time sessions at the local library while maintaining a flexible yet organized approach to her creative projects.
  sports: Nicole Larsen enjoys family hikes in nearby state parks, participates in an after‑school cross‑country running club, cheers on the Cullman High School Bengals football team and the Alabama Crimson
    Tide during college season, and balances her love for outdoor activity with occasional video‑gaming marathons.
  arts: Nicole Larsen draws inspiration from wildlife illustrator John James Audubon, graphic novelist Jillian Tamaki, and folk musician John Denver, often listening to Denver while strumming their acoustic
    guitar, and they attend local art fairs to admire works by regional watercolorist Yao Cheng and other emerging creators.
  travel: Nicole Larsen loves spontaneous weekend trips to Alabama's Oak Mountain and Little River Canyon state parks, dreams of exploring the National Gallery of Art in Washington, D.C., and yearns to
    hike the misty forests of the Pacific Northwest, though family budgeting typically limits travel to short drives and occasional overnight camps.
  culinary: Nicole Larsen enjoys baking chocolate chip cookies, strawberry shortcake cupcakes, and mastering perfect cinnamon rolls with their mom, favoring ingredients like butter, fresh berries, and dark
    chocolate, often pairing desserts with a glass of cold milk and adding a sprig of garden‑grown mint for garnish.
  core: Nicole Larsen is a curious, art‑obsessed 13‑year‑old who balances a love for nature, music, and crafting with a kindness‑driven desire to help others, while navigating typical teen quirks like late‑night
    snack cravings and occasional procrastination.
background:
  cultural: Nicole was raised in Cullman, Alabama, a small town with deep Southern hospitality and a distinct German heritage stemming from the city’s founding. Her family participates in community gatherings
    like church potlucks, local high‑school sports events, and the annual Cullman Oktoberfest, where she has learned about German customs such as folk music and traditional foods. This blend of Southern
    values, close‑knit community life, and multicultural celebrations shapes her appreciation for diverse artistic expressions and her desire to contribute positively to her neighborhood.
