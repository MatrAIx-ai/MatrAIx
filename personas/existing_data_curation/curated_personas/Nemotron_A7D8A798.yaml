  career_goals: Nicole aspires to blend her love of art with community impact. She dreams of becoming an art teacher or community arts coordinator who can lead mural projects and workshops that bring people
    together. She also envisions studying visual arts at a liberal‑arts college and exploring interdisciplinary paths such as art therapy or environmental design, using creativity to foster well‑being and
    social harmony.
