persona_description: A military historian who is interested in the strategic importance of Mantua in the context of the Napoleonic Wars, and the conditions it created inside the city during the sieges of
  1796-1799. Cuccia's work brings to light the words of soldiers, leaders, and citizens who experienced the sieges firsthand, and how the sieges had consequences long after they were over. He is also interested
  in the broader understanding of siege warfare and how the global impacts the local.
