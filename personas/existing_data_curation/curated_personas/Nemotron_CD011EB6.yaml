  hobbies: '[''Reading historical non-fiction'', ''Gardening (perennials and herbs)'', ''Bird watching'', ''Knitting'', ''Crossword puzzles'', ''Baking artisanal bread'', ''Genealogy research'', ''Volunteer
    library shelving'', ''Listening to logistics and sustainability podcasts'', ''Yoga and meditation'']'
  career_goals: Elisa aims to transition into a senior advisory role where she can share her logistics expertise while maintaining a low‑stress, quieter work rhythm. Over the next few years she plans to
    lead a sustainability project to reduce her company's carbon footprint, obtain a Lean Six Sigma Green Belt certification, and create a comprehensive knowledge‑transfer program for junior staff. She
    also hopes to work part‑time as a consultant for regional small‑business supply chains, applying her practical curiosity to implement technology‑enhanced routing solutions that balance cost and environmental
    impact. Ultimately, she wishes to retire from full‑time employment while remaining an active mentor and occasional project advisor.
