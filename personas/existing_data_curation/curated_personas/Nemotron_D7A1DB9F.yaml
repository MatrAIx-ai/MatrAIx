  hobbies: '[''Visiting art museums and galleries'', ''Cooking and recipe experimentation (Mexican cuisine)'', ''Sustainable gardening'', ''Crochet and knitting'', ''Pottery making'', ''Reading historical
    fiction and memoirs'', ''Attending cultural festivals (e.g., Día de los Muertos)'', ''Participating in a senior book club'', ''Gentle yoga and walking in local parks'', ''Playing card games with friends'']'
  career_goals: Although retired from formal employment, Alejandra aims to deepen her impact within the West Covina community. She hopes to lead a multicultural senior-center mentorship program that pairs
    younger volunteers with older adults to share life skills, cultural traditions, and digital literacy. She is also pursuing a small grant to establish a community garden that provides fresh produce and
    a therapeutic space for neighborhood elders. Alejandra dreams of documenting her family's history and traditional recipes in a handwritten memoir that could serve as a cultural bridge for future generations.
    Finally, she aspires to continue attending art workshops and lectures, gradually building her knowledge of contemporary art to share with friends at informal discussion circles.
