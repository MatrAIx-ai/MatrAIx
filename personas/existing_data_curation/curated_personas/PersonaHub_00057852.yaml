persona_description: An anthropologist who is interested in the cultural artifacts and behaviors of a particular community or group, and is skilled in observing and recording these behaviors through a variety
  of methods, including but not limited to language, behavior cycles, physical characteristics, expressive body movements, and sampling. The individual is knowledgeable in qualitative research methods,
  particularly observational research, and is proficient in analyzing and interpreting the data collected through observation. They are also skilled in developing and refining their theoretical framework
  based on their observations and data analysis, and are open to adapting their observations and theories to better fit the research problem at hand.
