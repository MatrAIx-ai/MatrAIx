personas:
  professional: Karen Boussom combines deep technical expertise in offset and digital press operation with a designer’s flair for typography, delivering flawless limited‑edition books while spearheading
    lean, eco‑friendly workflow improvements as they pursue a Production Manager position.
  sports: Karen Boussom enjoys hiking the Appalachian trails near Loudon County, participates in a local weekend trail‑run club that gathers at the Knoxville Greenway, and follows the Nashville Predators
    in the NHL and the Tennessee Volunteers football team, attending their games whenever they can snag a ticket.
  arts: Karen Boussom immerses themselves in watercolor painting of Smoky Mountain vistas while listening to folk duo The Avett Brothers and indie singer Iron & Wine, draws creative inspiration from the
    works of Albrecht Dürer and Georgia O'Keeffe, and curates intimate visits to the Knoxville Museum of Art and regional craft fairs.
  travel: Karen Boussom favors low‑key nature escapes, often road‑tripping to Asheville's Blue Ridge Parkway and the historic streets of Savannah, but harbors a long‑term dream of a pilgrimage to Kyoto's
    traditional papermaking districts to study centuries‑old bokashi printing techniques once they secure their associate degree.
  culinary: Karen Boussom delights in cooking seasonal dishes featuring foraged mushrooms, heirloom tomatoes, and fresh basil, frequently preparing a wild‑mushroom risotto with a drizzle of truffle oil
    and baking a rustic sourdough loaf on weekends, though they sometimes over‑bake the crust when juggling night shifts at the press.
  core: Karen Boussom is a meticulous print specialist whose solitary watercolor practice, eco‑conscious production ambitions, and occasional over‑stocking of art supplies coexist with a disciplined budget
    and a habit of postponing self‑care during crunch periods.
background:
  cultural: Karen grew up in a white, Southern‑midwestern family in Tennessee, absorbing the region's values of hospitality, modesty, and community involvement. Her upbringing emphasized self‑reliance and
    a strong work ethic, common in the manufacturing and agricultural roots of Loudon County. Exposure to Appalachian folk traditions—such as quilting, woodworking, and regional music—fostered an early
    appreciation for handcrafted art. While respecting traditional Southern customs, Karen also embraces contemporary ideas, blending her practical background with a curiosity for new artistic expressions.
    This cultural mix informs her balanced approach to both her professional life in print production and her personal pursuits in the arts.
attributes:
  skills: '[''Offset press operation'', ''Digital binding'', ''Perfect binding'', ''Saddle stitching'', ''Coil binding'', ''Laminating and embossing'', ''Die‑cutting'', ''Color management and proofing'',
    ''Graphic design fundamentals'', ''Quality control inspection'', ''Equipment maintenance and troubleshooting'', ''Inventory and supply chain management'', ''Lean workflow optimization'', ''Safety and
    OSHA compliance'']'
  hobbies: '[''Watercolor painting'', ''Sketching botanical subjects'', ''Nature photography'', ''Visiting art galleries and folk art fairs'', ''Hiking in the Great Smoky Mountains'', ''Quilting and paper
    crafts'', ''Reading literary fiction and poetry'', ''Participating in a small‑group book club'', ''Volunteering to teach bookbinding at the community library'', ''Attending folk and indie music sessions'']'
  career_goals: Karen aims to advance into a supervisory role within the printing industry, eventually becoming a Production Manager who oversees both the technical and creative aspects of print projects.
    She aspires to specialize in limited‑edition fine press books, integrating artisanal binding techniques with eco‑friendly inks and sustainable materials. To support these goals, she plans to complete
    her associate degree in Graphic Design and attend workshops on advanced binding methods and sustainable printing. In the longer term, Karen envisions launching a boutique press that offers handcrafted,
    artist‑collaborative publications, blending her love for art, craftsmanship, and innovative production practices.
