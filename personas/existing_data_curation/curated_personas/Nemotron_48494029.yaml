  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Hip‑hop dance classes'', ''Exploring street art and murals'', ''Reading contemporary fiction and philosophy'',
    ''Café hopping and people‑watching'', ''Cooking experimental fusion dishes'', ''Travel blogging about art and culture'', ''Attending live music concerts'', ''Volunteer tutoring with creative projects'']'
  career_goals: Barbara aims to complete a bachelor’s degree in Art History or Museum Studies, followed by a master’s program in Curatorial Practice. She plans to secure internships at institutions such
    as the Natural History Museum of Los Angeles County or the Getty Center to gain hands‑on curatorial experience. Her long‑term ambition is to become a curator or education coordinator, designing inclusive
    exhibitions that highlight under‑represented artists and foster community engagement. She is also interested in developing outreach programs that bring arts education to schools and neighborhood centers
    in South‑Los Angeles, merging her passion for art with social impact. In the near term, she hopes to launch a small‑scale digital platform where emerging artists can showcase their work and connect
    with local audiences.
