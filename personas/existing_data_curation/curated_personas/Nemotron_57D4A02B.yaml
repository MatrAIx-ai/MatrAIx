  hobbies: '[''Surfing'', ''Gardening'', ''Cooking Mexican cuisine'', ''Woodworking'', ''Acoustic guitar'', ''Reading popular science'', ''Volunteering at STEM outreach programs'', ''Attending cultural
    festivals'']'
  career_goals: Armando’s primary ambition is to translate his technical background into community impact. He plans to establish a bilingual makerspace in Orange County that offers hands‑on STEM workshops
    for at‑risk youth and seniors, fostering curiosity while providing practical skills. He also hopes to author a guidebook on simple home repairs for older adults, volunteer as a mentor in after‑school
    programs, and eventually serve on the board of a local nonprofit focused on environmental stewardship and cultural education. Throughout, he seeks flexible, part‑time roles that let him balance family
    time and personal projects.
