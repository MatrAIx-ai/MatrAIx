personas:
  professional: Armando Riveramatos, a seasoned electrical troubleshooting and computer hardware specialist, blends his STEM expertise with hands‑on maker ingenuity, translating curiosity into practical
    workshop solutions while his compassionate, cooperative nature shines as he mentors volunteers in a flexible, community‑driven makerspace.
  sports: Armando Riveramatos catches morning swells at Huntington Beach, joins neighborhood pick‑up basketball games at the local community center, and cheers for the Los Angeles Dodgers and Lakers, balancing
    a love for ocean sport with light cardio to keep his joints supple.
  arts: Armando Riveramatos spends evenings strumming acoustic guitar to folk classics like Bob Dylan and the Beatles while weaving in traditional songs heard at family fiestas, and he regularly attends
    local art walks featuring muralists such as Shepard Fairey and vibrant community dance performances.
  travel: Armando Riveramatos favors spontaneous, budget‑friendly road trips along the Pacific Coast, savoring the sea breezes of Santa Barbara and the vineyards of Paso Robles, while occasionally planning
    a week‑long adventure to Costa Rica to surf, hike, and explore rainforest biodiversity, always packing a portable guitar for sunset sing‑alongs.
  culinary: Armando Riveramatos skillfully prepares heritage dishes like mole, chilaquiles, and fish tacos, infusing them with coastal Californian twists such as avocado‑lime salsa and chipotle‑buttered
    grilled corn, showcasing a confident home‑cook level that spans hand‑made tortillas to perfectly seasoned pico de gallo.
  core: Armando Riveramatos is a curious, community‑focused maker who blends technical expertise with cultural storytelling, riding both electrical circuits and ocean swells while navigating a relaxed,
    often disorganized schedule.
background:
  cultural: Armando grew up in a Mexican‑American household where family gatherings, respect for elders, and the celebration of Mexican holidays such as Día de los Muertos, Cinco de Mayo, and Christmas
    posada play a central role. Bilingual in Spanish and English, he stays connected to the vibrant Mexican community in Orange County through church activities, neighborhood fiestas, and volunteer work
    at cultural organizations. His heritage influences his love for cooking authentic Mexican foods, storytelling, and fostering a sense of belonging and harmony within his social circles.
attributes:
  skills: '[''Electrical troubleshooting'', ''Computer hardware repair'', ''DIY home improvement'', ''Woodworking'', ''Garden infrastructure design'', ''Project planning'', ''Community outreach coordination'',
