  career_goals: Approaching retirement, Kelsey aims to transition into a mentorship role, guiding younger teachers in creating inclusive, resilient curricula. She hopes to lead professional‑development
    workshops focused on stress‑management and collaborative teaching strategies. Kelsey also intends to author a guidebook on maintaining classroom harmony and to serve as an emeritus advisor on the school
    board, advocating for expanded mental‑health resources for students and staff. Ultimately, she wishes to leave a lasting legacy of compassionate, well‑structured education in her school district.
