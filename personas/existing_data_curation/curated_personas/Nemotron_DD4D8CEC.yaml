  hobbies: '["Building block construction", "Coloring books", "Picture book reading", "Simple jigsaw puzzles", "Nature walks with family", "Singing nursery rhymes", "Pretend play with dolls and stuffed
    animals", "Matching card games"]'
  career_goals: Even at her young age, Shirley imagines future roles that revolve around creating and maintaining structure for others. She dreams of becoming a preschool teacher or a kindergarten librarian,
    where she can organize learning environments, establish routines, and help children develop reliable habits. Occasionally, she expresses a fascination with caring for animals, envisioning herself as
    a veterinarian who provides gentle, systematic care. Her ambitions consistently reflect her desire for responsible, organized, and dependable professions.
