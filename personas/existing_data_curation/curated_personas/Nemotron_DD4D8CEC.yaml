personas:
  professional: Shirley Cato, a preschooler who meticulously lines up her wooden blocks during the church preschool routine, imagines herself one day as a librarian, and enjoys the predictability of organizing
    storybooks on tiny shelves.
  sports: Shirley Cato, an enthusiastic participant in the preschool's fall apple harvest field day, prefers the orderly beanbag toss over chaotic tag, is a member of the local toddler soccer class where
    she competes fiercely to be the first to kick the ball, and enjoys watching the West Virginia Mountaineers football games on weekends with her family.
  arts: Shirley Cato, a budding artist who spends afternoons coloring detailed pictures of apples and farm animals while humming the bluegrass fiddle tunes played at Sunday school, collects stickers of
    cartoon critters, and can recite the verses of Amazing Grace with solemn pride.
  travel: Shirley Cato, who has explored the nearby Spruce Knob State Park on a family camping outing, loves the structured schedule of bedtime stories in the cabin, dreams of visiting Disney World but
    feels most comfortable returning to the familiar porch swing at her grandparents' farm.
  culinary: Shirley Cato, a picky eater who adores homemade apple crumble, chicken nuggets, and soft cheese, proudly helps stir batter with a wooden spoon under her mother's watchful eye, yet often leaves
    a trail of flour on the kitchen floor when distracted.
  core: Shirley Cato is a three-year-old with a love for order, a competitive streak in games, a lingering worry about new experiences, and a habit of arranging toys in perfect rows before bedtime.
background:
  cultural: Shirley is raised in Paw Paw, West Virginia, a close‑knit Appalachian community where family, church, and local traditions shape everyday life. Her white, rural background immerses her in values
    of self‑reliance, modesty, and appreciation for the natural landscape. Community gatherings often center around seasonal festivals, such as the apple harvest, and church‑based preschool programs emphasize
    routine, responsibility, and respectful conduct. These influences foster Shirley's preference for structure, her comfort with small groups, and her practical outlook on life.
attributes:
  skills: '["Running and climbing", "Simple puzzle assembly", "Building block construction", "Basic color and shape identification", "Early language and vocabulary", "Independent dressing and toileting",
