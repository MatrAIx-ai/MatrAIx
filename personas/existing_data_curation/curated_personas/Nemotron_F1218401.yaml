  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art museums'', ''Attending theater productions'', ''Hiking in Columbia River Gorge'', ''Nature photography'', ''Ukulele playing'', ''Volunteering
    at animal shelters'', ''Volunteering at senior centers'']'
  career_goals: Nicole aims to complete her high school equivalency and enroll in a university program focused on social work or community development. She envisions a career that blends her love for the
    arts with her compassion for others, such as becoming a community outreach coordinator for arts‑based youth programs or starting a nonprofit that provides art therapy to underprivileged children in
    Oregon. In the short term, she seeks leadership roles in local volunteer organizations to build experience, and long‑term she hopes to earn a degree that enables her to design inclusive, creative initiatives
    that foster social harmony and personal growth.
