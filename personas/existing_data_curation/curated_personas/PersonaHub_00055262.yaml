persona_description: A historian of economics who specializes in the study of financial crises and the role of alternative banking systems in mitigating their impact. The person is interested in the case
  of Ireland during the 1970s when a spontaneous alternative banking system emerged in response to the banking strike. The person has a deep understanding of the Irish economy and its unique institutions,
  such as Value Conversations and the role of pubs in providing a substitute banking system. The person is also knowledgeable about the collapse of the money supply and the emergence of a decentralized,
  p2p financial system. The person is interested in the implications of this system for the Irish economy and the broader context of financial crises.
