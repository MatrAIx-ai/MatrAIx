persona_description: A historian and musicologist who specializes in the study of African American music and its impact on American culture. They have a deep understanding of the blues genre and its evolution
  from rural to urban settings, and have written extensively on the subject. They are knowledgeable about the legislative chicanery and extreme violence used to disenfranchise and dispossess African Americans
  after the failure of Reconstruction, and have written extensively on the emergence of the blues in the rural South into the cities. They are also knowledgeable about the role of women in the blues movement,
  and have written extensively on the impact of the blues on popular culture.
