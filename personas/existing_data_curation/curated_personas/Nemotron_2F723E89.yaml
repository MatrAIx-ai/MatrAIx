  hobbies: '[''Watercolor Painting'', ''Chess (Club & Tournaments)'', ''Crossword Puzzles'', ''Historical Fiction Reading'', ''Hiking (Rocky Mountain Foothills)'', ''Gardening (Heirloom Vegetables & Native
    Plants)'', ''Theater Set Design Volunteering'', ''Art Gallery Visits'', ''Community Art‑Integrated Literacy Programs'']'
  career_goals: Although retired from formal employment, Marjorie seeks to continue shaping educational practice through volunteer mentorship, coaching younger teachers in the Fort Collins School District
    and offering pro bono curriculum consulting for nonprofit after‑school programs. She aims to spearhead a community art‑integrated literacy program for seniors at the local senior center, leveraging
    her competitive drive to secure funding and partnerships. She also aspires to author a guidebook on incorporating visual arts into language‑arts curricula and to serve on the board of the Fort Collins
    Museum of Contemporary Art, where she can influence programming that bridges education and cultural appreciation.
