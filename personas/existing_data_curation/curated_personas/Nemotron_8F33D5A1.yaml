personas:
  professional: Henry Green, a retired automotive assembly line foreman turned community mentor, combines decades of mechanical troubleshooting, carpentry, and oral history storytelling into an organized
    yet adaptable approach that they apply when teaching woodworking and coordinating senior‑center programs.
  sports: Henry Green supports the Kalamazoo Wings hockey team and the Detroit Tigers baseball club, participates in the senior center’s weekly walking club and low‑impact water aerobics class, and they
    keep a modest garden‑lifted fitness routine that balances gentle cardio with occasional shuffleboard matches at the local community center.
  arts: Henry Green appreciates classic jazz legends like Louis Armstrong and Ella Fitzgerald, enjoys reading historical nonfiction about the Great Lakes, crafts wooden toys reminiscent of mid‑century folk
    art, and they often attend the local library’s occasional poetry reading featuring Midwestern authors such as Gwendolyn Brooks.
  travel: Henry Green favors well‑planned, low‑stress trips to historic Great Lakes destinations such as Mackinac Island, the Soo Locks, and the Upper Peninsula’s lighthouses, traveling by senior‑discounted
    Amtrak and staying in modest B&Bs where they can sketch the scenery in a pocket notebook while reminiscing about their own family road trips.
  culinary: Henry Green loves cooking hearty Midwestern fare like pork roast with apple sauce, corn chowder seasoned with thyme, and Michigan cherry pie, and they relish gathering around the kitchen table
    to share stories while expertly seasoning each dish with a pinch of pepper and a dash of nostalgia.
  core: Henry Green embodies a steadfast blend of curiosity and thrift, juggling a love for woodworking, classic jazz, and community storytelling with occasional stubbornness about new technology and a
    gentle, resilient outlook on aging.
background:
  cultural: 'Henry grew up in post‑World War II Michigan, raised in a working‑class family with roots in both small‑town manufacturing and modest farming. His upbringing was steeped in Midwestern values
    of self‑reliance, community service, and modesty, reinforced by regular attendance at a Protestant congregation that emphasized stewardship and neighborly support. The cultural rhythm of Kalamazoo and
    Van Buren County—annual county fairs, Fourth of July parades, and community potlucks—shaped his sense of belonging. Though his ethnic background is white American, his identity is defined more by the
    regional ethos of the Midwest: a pragmatic approach to life, respect for tradition, and an enduring curiosity about how things work and how people connect.'
