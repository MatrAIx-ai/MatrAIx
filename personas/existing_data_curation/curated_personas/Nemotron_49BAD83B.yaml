personas:
  professional: Joyce Johnston is a food‑service manager who leverages a STEM background and data‑driven mindset to optimize point‑of‑sale analytics, inventory forecasting, and cost‑control models while
    leading a 30‑person team with a blend of organized structure and spontaneous creativity inspired by the vibrant art scene they love.
  sports: Joyce Johnston fuels their competitive streak by hiking the Laguna Canyon trails with the local hiking club, attending LA Lakers games and supporting the Anaheim Ducks, and maintaining a disciplined
    yoga practice using a fitness tracker that logs every session, all while juggling a weekend pick‑up soccer league with friends.
  arts: Joyce Johnston frequents contemporary galleries like the Laguna Art Museum, drawing design cues from artists such as Yayoi Kusama and James Turrell, while also curating playlists that blend Billie
    Eilish with the classic jazz of Miles Davis to set the mood for their restaurant’s art‑infused ambiance.
  travel: Joyce Johnston plans trips with meticulous checklists, favoring road‑trip adventures along the Pacific Coast Highway to Big Sur and weekend getaways in Santa Barbara, while dreaming of culinary
    pilgrimages to Oaxaca’s tlayudas markets and Japan’s Osaka street‑food districts, balancing a love for exploration with a budget that prioritizes family time.
  culinary: Joyce Johnston is an avid home cook who masterfully blends Californian produce like heirloom tomatoes and avocados with global flavors, creating dishes such as miso‑glazed salmon tacos, harissa‑spiced
    quinoa bowls, and kimchi‑infused avocado toast, while constantly testing smart kitchen gadgets like sous‑vide circulators and Arduino‑controlled spice dispensers.
  core: Joyce Johnston is a data‑savvy restaurant leader who marries art‑inspired creativity with a relentless drive for efficiency, occasionally over‑analyzing vendor quotes and habitually forgetting to
    water their succulents.
background:
  cultural: Joyce was raised in a middle‑class suburban household in Orange County, California. Her family’s roots trace back to Irish and English ancestry, and she grew up celebrating a blend of traditional
    American holidays and occasional cultural customs passed down from her grandparents. The diverse, multicultural environment of Southern California shaped her worldview, fostering an appreciation for
    a wide range of cuisines, artistic expressions, and social dynamics. As a white American, she identifies with the broader West Coast cultural values of openness, environmental consciousness, and community
    involvement, which inform both her personal life and professional ethos.
