  hobbies: '["Visiting contemporary art galleries", "Experimenting with fusion cuisine at home", "Hiking Laguna Canyon trails", "Practicing yoga", "Volunteering at local food banks", "Attending cooking
    workshops and food festivals", "Exploring smart kitchen gadgets", "Traveling to culinary destinations", "Participating in community theater improv nights", "Reading science and technology articles"]'
  career_goals: Joyce aims to transition from managing a single restaurant to overseeing multiple venues as a regional operations director within the next five years. She aspires to launch her own concept—a
    farm‑to‑table eatery that integrates local art installations and sustainable, technology‑enhanced kitchen practices. Her long‑term ambition includes championing industry‑wide sustainability standards,
    mentoring emerging hospitality leaders, and possibly earning an MBA to augment her strategic skill set. She is driven to achieve measurable improvements in employee retention, operational efficiency,
    and community engagement, positioning herself as a forward‑thinking leader in Southern California’s culinary scene.
