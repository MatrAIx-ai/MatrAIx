personas:
  professional: Joseph Darwiche, a 41‑year‑old aspiring handyman and emerging data‑entry specialist, leverages meticulous DIY expertise, advanced spreadsheet skills, and a methodical work ethic to deliver
    reliable remote administrative support while they build a freelance repair business that reflects an organized, low‑stress approach.
  sports: Joseph Darwiche enjoys low‑impact fitness through weekend cycling with the Fort Worth Trail Riders Club, follows the Dallas Cowboys in the fall football season, and they play occasional Friday‑night
    pool leagues at the local community center, balancing structured exercise with relaxed social competition.
  arts: Joseph Darwiche finds solace in classic rock legends like The Rolling Stones and Led Zeppelin, country storytellers such as Johnny Cash, and channels that appreciation into board‑game nights featuring
    titles from designers Stefan Feld and Eric Lang, while they occasionally visit the Kimbell Art Museum to deepen their quiet appreciation for visual art.
  travel: Joseph Darwiche prefers meticulously planned road trips that combine scenic drives through the Southwest—recently exploring Sedona’s red rocks and Santa Fe’s art scene—and short weekend getaways
    to nearby lakes where they can set up a portable workshop, balancing adventure with the comfort of familiar routines.
  culinary: Joseph Darwiche enjoys cooking hearty meals like beef chili with home‑grown jalapeños and cornbread, perfecting a smoky brisket on their backyard grill, while they showcase competent cooking
    skills during weekend gatherings by sharing freshly baked apple crumble with neighbors.
  core: Joseph Darwiche, a 41‑year‑old methodical tinkerer whose curiosity fuels a quiet obsession with model building and meticulous budgeting, balances a steadfast worry about future uncertainties with
    a disciplined routine, and they channel their solitary hobbies into small‑scale community contributions.
background:
  cultural: Joseph was born and raised in Fort Worth, Texas, within a middle‑class, white Anglo‑American family that values self‑reliance and community. Growing up in the Texas Hill Country, he was immersed
    in Southern hospitality, the independent Texan ethos, and traditions such as country music, rodeo culture, and Texas barbecue. His public‑school education ended before high‑school graduation, reinforcing
    his preference for hands‑on, practical learning over formal academia. A modest Christian upbringing (Methodist) emphasized personal responsibility and neighborly service. The multicultural fabric of
    Fort Worth—marked by Hispanic influences and a strong military presence—has broadened his curiosity while reinforcing a conservative yet open‑minded worldview.
attributes:
  skills: '["Automotive Repair", "Basic Carpentry", "DIY Home Maintenance", "Budgeting & Personal Finance", "Spreadsheet Management (Excel)", "Self‑taught Computer Troubleshooting", "Project Planning &
