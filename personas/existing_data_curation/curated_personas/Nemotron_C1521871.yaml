  hobbies: '["Model Building", "Non‑fiction Reading (DIY/Finance)", "Birdwatching", "Vintage Tool Restoration", "Online Chess", "Small Group Board Game Sessions", "Gardening", "Music Listening (Classic
    Rock, Country)"]'
  career_goals: Joseph aims to obtain his GED and enroll in a vocational program—preferably HVAC or electrical technology—to formalize his mechanical skills. He plans to launch a small freelance handyman
    business serving the Fort Worth community, leveraging his reliability and organized approach. In the short term, he seeks part‑time remote work in data entry or virtual assistance to capitalize on his
    spreadsheet and administrative strengths while maintaining a flexible schedule for continued learning. Long‑term, he hopes to achieve financial stability, reduce stress, and become a certified emergency‑preparedness
    coordinator for local neighborhood initiatives, thereby combining his practical expertise with community service.
