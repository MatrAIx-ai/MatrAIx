persona_description: A city planner who is interested in the relationship between economic health, economic inclusion, and racial inclusion in US cities. They are looking for ways to overcome economic distress
  in a way that provides the opportunity for all residents—especially historically excluded populations—to benefit from and contribute to economic prosperity. They want to understand the trends across cities,
  key lessons for how economic turnarounds can support inclusion, and common building blocks of inclusive growth across different geographic contexts. They are interested in the DC region's ranking on inclusion
  and shared prosperity, as well as the comparison of racial inclusion and racial diversity across cities.
