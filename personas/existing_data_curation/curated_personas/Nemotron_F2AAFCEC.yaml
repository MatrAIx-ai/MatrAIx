  career_goals: Chip aims to earn his GED within the next year and enroll in a vocational program at a local community college, focusing on automotive technology or IT support. He envisions a career that
    balances hands‑on problem solving with structured processes, such as becoming a certified automotive technician who later manages a workshop, or an entry‑level network technician who can advance to
    systems administration. Additionally, he hopes to lead a youth sports league in San Antonio, using his organizational skills to mentor younger teammates and foster a competitive yet supportive environment.
