  hobbies: '[''Reading historical books and poetry'', ''Listening to jazz and blues music'', ''Visiting museums and art galleries'', ''Gardening (vegetable and ornamental)'', ''Woodworking and crafts'',
    ''Journaling and sketching'', ''Participating in senior-center art workshops and church choir'']'
  career_goals: Although no longer in the formal workforce, Derrick remains driven by a desire to leave a lasting legacy for his family and community. He intends to finish a memoir that weaves together
    his personal experiences with the broader story of the Black community in Montgomery County, and to create a small archival collection of recorded oral histories, photographs, and artifacts that can
    be housed at the local library. He hopes to launch a mentorship circle that pairs seniors with teenagers for arts‑and‑craft projects, and to work with the Silver Spring senior center to expand culturally
    relevant art programs. A personal ambition is to secure a scholarship fund for his grandchildren and other deserving youth, ensuring that future generations have access to higher education.
