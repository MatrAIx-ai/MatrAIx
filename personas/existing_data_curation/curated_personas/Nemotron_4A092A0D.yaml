personas:
  professional: Derrick Williams, a retired oral historian and woodworking enthusiast, blends meticulous record‑keeping with a calm, methodical approach to mentoring seniors and teens through arts‑and‑craft
    projects at the local senior center.
  sports: Derrick Williams, a devoted fan of the Washington Nationals and Wizards, participates in a weekly senior walking club and enjoys gentle Tai Chi classes at the senior center, preferring leisurely
    strolls through local parks over high‑intensity sports.
  arts: Derrick Williams, a lifelong lover of classic jazz, blues, and soul, regularly attends live performances featuring Miles Davis tributes and B.B. King covers, frequents the Smithsonian’s Silver Spring
    gallery, and sings gospel hymns in the church choir, drawing inspiration from poets Langston Hughes and Maya Angelou.
  travel: Derrick Williams favors well‑planned trips that balance cultural immersion and comfort, having visited historic sites in Washington D.C., New Orleans for the Jazz & Heritage Festival, and Shenandoah
    National Park for scenic hikes, while dreaming of a future pilgrimage to Ghana's coastal heritage sites.
  culinary: Derrick Williams enjoys cooking soul‑food classics such as collard greens, smothered pork, and sweet potato pie using fresh herbs from his garden, and delights in sipping strong black coffee
    while listening to classic blues records.
  core: Derrick Williams is a calm, organized octogenarian who channels curiosity into preserving community stories, tending a garden, restoring antique furniture, and mentoring youth, all while indulging
    in jazz, gospel, and modest culinary pleasures.
background:
  cultural: Derrick is an African American who grew up in the segregated neighborhoods of Washington, D.C., before moving to Silver Spring in the 1960s. He was shaped by the civil‑rights movement, the solidarity
    of the Black church, and the strong communal networks of African American families in Montgomery County. His cultural identity is rooted in traditions of oral storytelling, gospel music, and a deep
    reverence for collective resilience. He maintains close ties with his extended family and church community, honoring holidays such as Juneteenth and participating in local celebrations that highlight
    Black heritage. His experiences have instilled a respect for history, a commitment to mentorship, and a pride in preserving African American cultural contributions.
attributes:
  skills: '[''Woodworking and antique furniture restoration'', ''Gardening and horticulture'', ''Oral history collection and documentation'', ''Mentoring youth and seniors'', ''Personal budgeting and precise
