personas:
  professional: Edward Davis, a ten‑year‑old budding engineer, channels his love of structure into building complex LEGO mechanisms, crafting Scratch games, and strategizing in chess, approaching each project
    with methodical precision and a competitive drive to outperform his close friend in school science fairs.
  sports: Edward Davis enjoys shooting hoops at the local park, practicing free throws and dribbling drills solo and with a close friend, participates in a community youth basketball league, and follows
    the city’s professional basketball team for inspiration.
  arts: Edward Davis immerses themselves in instrumental hip‑hop beats from artists like J Dilla and Nujabes while coding, draws inspiration from documentaries about groundbreaking inventors, and treats
    LEGO builds as kinetic sculptures that blend engineering with aesthetic design.
  travel: Edward Davis’s travel itinerary centers on sci‑tech stops, having visited the Space Center in Houston, explored the Museum of Science and Industry in Chicago, and dreaming of touring the Smithsonian
    National Air and Space Museum in Washington, D.C., with a preference for carefully planned trips over spontaneous adventures.
  culinary: Edward Davis prefers quick, hands‑on meals such as building homemade pizza with pepperoni and mozzarella, blending peanut butter banana smoothies, and snacking on trail mix, often preparing
    dishes after a LEGO session to balance creativity and nutrition.
  core: Edward Davis is a methodical ten‑year‑old whose love for structured play, competitive spirit, and disciplined routines shape a pragmatic yet curious approach to learning and life.
background:
  cultural: Edward is an African‑American boy raised in Eden Prairie, Minnesota. He grows up in a close‑knit family that celebrates traditions such as family Sunday meals, storytelling about his ancestors,
    and cultural events at the local African‑American community center, including Kwanzaa and Black History Month activities. The diverse Midwestern environment provides him with exposure to both broader
    American culture and the rich heritage of his community, shaping his values of perseverance, education, and community responsibility.
attributes:
  skills: '[''Scratch programming'', ''LEGO robotics building'', ''Mathematics problem solving'', ''Reading comprehension'', ''Organizational skills'', ''Time management'', ''Strategic thinking (chess)'',
    ''Basketball fundamentals'', ''Responsibility handling'']'
  hobbies: '[''LEGO building'', ''Scratch coding'', ''Chess'', ''Basketball'', ''Reading science books'', ''Science fair projects'', ''Watching documentaries about African American inventors'', ''Listening
    to hip‑hop instrumental music'']'
  career_goals: Edward aspires to become a software engineer who designs interactive games or a robotics engineer who creates machines that help people. He also entertains the idea of playing basketball
    competitively at a higher level. His ambition is to attend a STEM‑focused high school, earn scholarships, and eventually work on projects that combine technology, creativity, and problem‑solving.
