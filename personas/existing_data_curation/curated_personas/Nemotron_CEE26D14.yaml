personas:
  professional: Dean Seykora, a meticulous high school junior with a knack for precision, channels their methodical nature and love for detailed instructions into building model airplane kits and excelling
    in the school's chess club, laying the groundwork for a future in aerospace engineering.
  sports: Dean Seykora, a member of the local cross-country running club who enjoys weekend hikes in nearby state parks, follows the Boston Red Sox and the New England Patriots, prefers low-intensity endurance
    activities over team sports, and schedules weekly trail runs to balance mental stress.
  arts: Dean Seykora, who finds inspiration in the intricate set designs of James Cameron's sci-fi films and the melodic precision of composer Hans Zimmer, spends free time sketching model airplane schematics
    and listening to classical pianist Ludovico Einaudi while occasionally attending local community theater productions.
  travel: Dean Seykora, a meticulous planner, prefers short, well-organized road trips to nearby state parks such as Shenandoah and has a long-standing dream of touring the aviation museums of Seattle and
    the historic airfields of western Europe, balancing school obligations with family budget constraints.
  culinary: Dean Seykora, a budding home-cook with basic kitchen skills, enjoys whipping up spaghetti carbonara with pancetta and parmesan, perfecting homemade pepperoni pizza crust, and occasionally snacking
    on trail mix containing almonds, dried cranberries, and dark chocolate.
  core: Dean Seykora, a detail-obsessed teen who channels worry into precise model building and journaling, often loses sleep over unfinished LEGO sets while meticulously planning every hobby.
background:
  cultural: Dean is a white Midwestern American raised in Beloit, Wisconsin, with family roots that include German and Polish ancestry common to the region. His upbringing emphasizes a strong work ethic,
    community involvement, modesty, and participation in local traditions such as county fairs, high school sports events, and church gatherings. The surrounding rural and small‑town environment has shaped
    his practical outlook and appreciation for reliable, structured routines.
