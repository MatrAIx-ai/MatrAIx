personas:
  professional: Christina Novoa is a senior support specialist in a community‑focused IT organization, combining precise hardware diagnostics, multi‑OS installations, network configuration, and empathetic
    user education while they prepare for CompTIA A+ and Network+ certifications to mentor junior staff.
  sports: Christina Novoa hikes the Green Mountains, joins a local birdwatching club, practices weekly yoga, and cheers for the Vermont Catamounts and Boston Red Sox, blending solitary outdoor fitness with
    community sports fandom as they balance personal downtime with team spirit.
  arts: Christina Novoa knits scarves for friends, devotes weekend afternoons to solving crossword puzzles, reads historical fiction by Hilary Mantel, enjoys folk music from Joan Baez, and attends community
    theater productions of classics like "Our Town," while they find creative expression a soothing counterpoint to anxiety.
  travel: Christina Novoa enjoys road trips to New England’s Acadia National Park and Quebec City, plans itineraries loosely with room for spontaneous stops, and dreams of exploring the Pacific Northwest’s
    Olympic National Park and Japan’s cherry blossom season, as they balance travel aspirations with a modest budget and family commitments.
  culinary: Christina Novoa favors farm‑to‑table cooking, frequently preparing roasted beet and goat cheese salads, carrot‑ginger soup, and herb‑infused grilled chicken using basil, mint, and rosemary from
    their garden, with an intermediate skill level that lets them experiment while they stay mindful of nutrition.
  core: Christina Novoa blends methodical tech support with flexible garden and knitting hobbies, managing anxiety through structured mindfulness while they generously support their community.
background:
  cultural: Christina was raised in a small, predominantly white New England town in Vermont, where community ties and self‑reliance are deeply valued. Her upbringing reflected the region’s pragmatic ethos,
    seasonal rhythms, and an emphasis on practical education. Family gatherings often centered around shared meals made from locally sourced produce, and community events like town fairs and town‑hall meetings
    reinforced her sense of civic responsibility. While she respects traditional New England customs—such as modest holiday celebrations and a love for the outdoors—she also embraces contemporary ideas
    about mental health awareness and inclusive community support, blending the old and new in her personal worldview.
attributes:
  skills: '[''Computer hardware troubleshooting'', ''Operating system installation and configuration (Windows, macOS, Linux)'', ''Network setup and basic troubleshooting'', ''Help desk support and ticket
    management'', ''User training and technology literacy coaching'', ''Empathetic communication and conflict resolution'', ''Basic scripting in PowerShell and Bash'', ''Documentation and creating step‑by‑step
    guides'', ''Remote assistance via screen‑sharing tools'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Birdwatching'', ''Knitting'', ''Volunteering at local food bank'', ''Yoga for anxiety relief'', ''Reading historical fiction'', ''Cooking farm‑to‑table meals'',
    ''Leading community technology workshops'', ''Puzzle solving'']'
  career_goals: Christina aims to leverage her technical know‑how and compassionate approach to move into a senior support specialist or team‑lead position within a community‑focused IT organization. She
    plans to earn CompTIA A+ and Network+ certifications to formalize her expertise and to broaden her knowledge of cybersecurity basics. Long‑term, she hopes to design and run a free digital‑inclusion
    workshop series for seniors and low‑income residents of Addison County, helping them gain confidence with smartphones, online banking, and telehealth platforms. She also envisions mentoring younger
    staff members, fostering a workplace culture where cooperation and emotional well‑being are prioritized alongside productivity.
