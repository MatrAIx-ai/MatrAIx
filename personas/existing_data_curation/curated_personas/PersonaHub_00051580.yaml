persona_description: A microbiologist who studies the effects of aerosolization on the viability and colony-forming ability of bacterial species, particularly in enclosed buildings. The microbiologist has
  conducted research on the role of airborne bacteria in sick building syndrome and is interested in the potential for aerosolization to alter the behavior of bacteria. The microbiologist is likely to be
  a scientist with a background in microbiology and environmental science, and may have expertise in using culture methods and direct staining techniques to quantify the number of viable bacteria. The microbiologist
  is also likely to be familiar with the research methods and techniques used in the study described in the text.
