  career_goals: Quoc aims to progress into a senior technology leadership role—such as Director of Engineering or Chief Technology Officer—within a midsize firm that values stability and systematic processes.
    He seeks to lead initiatives that build resilient, secure systems while fostering a supportive, structured team environment. Additionally, he plans to launch a boutique consultancy focused on helping
    small businesses secure and optimize their digital infrastructure, giving him greater control over his schedule to manage his emotional wellbeing and maintain a balanced work‑life rhythm.
