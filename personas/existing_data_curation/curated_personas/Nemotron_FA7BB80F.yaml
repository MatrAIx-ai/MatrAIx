  hobbies: '[''Watercolor painting'', ''Nature photography'', ''Bird watching'', ''Coastal hiking'', ''Community theater'', ''Woodworking'', ''Science‑fiction reading'', ''Cooking for friends'', ''Volunteer
    gardening'', ''Attending poetry slams'']'
  career_goals: Donald aims to transition from employee to independent consultant, establishing a boutique landscape studio that specializes in therapeutic and community-oriented garden projects, particularly
    for senior living facilities and public parks in Ocean County. He wishes to mentor younger landscapers through apprenticeship programs and offer workshops on sustainable gardening and creative design.
    Long‑term, he hopes to partner with local schools and community colleges to teach horticulture and landscape art, and to spearhead a municipal initiative for creating and maintaining neighborhood green
    spaces that promote social cohesion and mental well‑being.
