  career_goals: Phyllis dreams of becoming an astronaut who can explore distant planets and bring back stories about the stars. She also imagines herself as a children's book author and illustrator, using
    her love of art and imagination to teach kindness and empathy. In the future she hopes to work as a teacher or community storyteller, creating harmonious spaces where other children can learn, play,
    and feel safe.
