  hobbies: '[''Cooking traditional Mexican cuisine'', ''Watching soccer (Liga MX)'', ''Fishing in the Rio Grande'', ''Family gatherings and barbecues'', ''Listening to regional Mexican music'', ''DIY home
    repair projects'', ''Gardening'']'
  career_goals: Cristian aims to advance within the manufacturing plant by moving into a lead or supervisory role where he can apply his cooperative nature and practical expertise to support his crew. He
    plans to obtain additional certifications, such as advanced forklift operation and CNC machine basics, to increase his technical competence and eligibility for higher‑pay positions. Ultimately, he hopes
    to secure a stable, well‑compensated role that provides financial security for his family while allowing him a predictable schedule that aligns with his preference for routine.
