    local restaurants'', ''Home brewing craft beer'', ''Listening to business and fintech podcasts'', ''Reading historical fiction'', ''Landscape photography'']'
  career_goals: Brenden aims to move from his current financial manager role into a senior finance leadership position within the next five years, targeting a Director of Finance or CFO role at a mid‑size
    company operating in the tourism or real‑estate sector of Central Florida. He plans to earn his CPA certification and begin coursework for a CFA designation to deepen his analytical credentials. He
    is also interested in championing sustainable finance initiatives, such as incorporating ESG metrics into budgeting processes. Beyond corporate advancement, Brenden aspires to launch a community‑focused
    financial‑literacy consultancy that helps local small businesses and non‑profits improve cash‑flow health and strategic planning.
