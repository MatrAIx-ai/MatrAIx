persona_description: A historian or social scientist who is interested in the intersection of gender, class, and cultural studies, and who has a particular interest in the ways in which 19th-century culture
  was shaped by the representation of the population as an aggregate—a social body. They are likely to have a strong background in Victorian studies, literature, and social reform texts, and have a keen
  interest in the development of a mass culture in Victorian Britain. They would be able to analyze the organization of knowledge during this period and the role it played in the emergence of the idea of
  the social body. They would also be familiar with literary genres such as the novel and the impact of innovations in social thought on Victorian ideas about the role of the state. Additionally, they would
  have a deep understanding of the conflict between Kay's idea of the social body and Babbage's image of the social machine, and how it relates to the place of Victorian women. They would be able to infer
  the persona of a mathematics professor who specializes in the study of group theory and the theory of group automorphisms, but would not be limited to this specific field of study.
