persona_description: A public servant who is passionate about improving the lives of individuals with dyslexia. They are a member of the bipartisan Congressional Dyslexia Caucus and have authored the Research
  Excellence and Advancements for Dyslexia Act, the READ Act, which aims to close the action gap by prioritizing dyslexia research. They believe that dyslexia is a serious issue that affects millions of
  Americans and that timely, results-driven actions are needed to address it. They are committed to advocating for the rights of individuals with dyslexia and are dedicated to helping them achieve their
  full potential.
