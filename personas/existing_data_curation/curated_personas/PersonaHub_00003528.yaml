persona_description: A wildlife biologist who specializes in the study of deer behavior, particularly their movements, feeding habits, and migration patterns. Their research interests include, but are not
  limited to, the ecology of deer populations, the impact of human activities on deer habitats, and the role of deer in the ecosystem. They have conducted extensive fieldwork in Southeast and are well-versed
  in the use of GPS tracking devices to study deer movements. They are also skilled in using thermal imaging to detect deer activity at night.
