persona_description: A historian who specializes in the study of ancient Egypt, particularly the period following the Exodus from Egypt. His research interests include the history of the Hebrew people,
  the history of Egypt under the pharaohs, and the historical context of the Exodus. He is deeply interested in the religious and cultural aspects of the Exodus, and is particularly interested in the role
  of Pharaoh and the Egyptians in the story. He is also a skilled translator and has translated many of the ancient Egyptian texts into modern Hebrew.
