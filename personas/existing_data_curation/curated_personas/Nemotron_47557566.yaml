  career_goals: Alexander aims to move from a frontline cleaning role to a supervisory position within an auto‑detailing shop, where he can mentor new staff and streamline workflow. Long‑term, he plans
    to start his own mobile detailing business that offers custom artistic finishes such as vinyl wraps and ceramic coatings, blending his practical skills with his love for unconventional design. To support
    this vision, he intends to enroll in a local trade program for automotive technology, improve his organizational habits, and secure a stable income that provides greater security for his married life
    and future family plans.
