personas:
  professional: Grace Hankerson, a seasoned construction laborer with over two decades of hands‑on experience in concrete, framing, and site safety, leverages their curiosity for design and an eye for aesthetic
    details to propose on‑site improvements while sometimes letting paperwork slip due to a relaxed, flexible approach, and they aim to become a foreman and eventually run a design‑forward subcontracting
    firm.
  sports: Grace Hankerson follows the Atlanta Falcons, Atlanta Braves, and Atlanta Hawks with loyal enthusiasm, participates in weekend hikes with the Georgia Outdoor Adventure Club, and attends local pick‑up
    basketball games at the Cobb County community center, though they remain skeptical of the teams' hype unless performance justifies it, and they balance their physically demanding job with moderate fitness
    activities that keep them grounded.
  arts: Grace Hankerson explores acrylic painting inspired by the vibrant murals of Atlanta, frequently visits the High Museum to view works by artists like Kehinde Wiley and Jacob Lawrence, attends live
    jazz performances by Gregory Porter and classic soul concerts featuring Al Green, supports community theater productions of August Wilson’s plays, and they let their artistic curiosity inform their
    design eye on construction sites.
  travel: Grace Hankerson enjoys road‑trip adventures that blend nature and culture, having hiked the Appalachian Trail near Asheville, explored the historic streets of Savannah, and attended a jazz festival
    in New Orleans, while dreaming of a culinary tour of Tuscany to study farm‑to‑table practices, and they plan trips with a flexible itinerary that leaves room for spontaneous detours.
  culinary: Grace Hankerson loves cooking Southern comfort dishes like shrimp and grits, collard greens, and caramelized sweet potatoes, often adding their own twists such as a dash of smoked paprika or
    a splash of harissa, cultivates fresh herbs in their garden to bring bright flavor to meals, though they sometimes forget to clean the kitchen promptly after a lively dinner with friends.
  core: Grace Hankerson is a hard‑working construction veteran with a flair for art, a competitive drive that fuels their ambition, a relaxed approach that makes organization a challenge, and they love
    jazz, gardening, and spontaneous road trips.
background:
  cultural: Grace grew up as a Black woman in the Atlanta metro area, steeped in Southern African‑American culture. Her family’s roots in church, gospel music, and community gatherings shaped her values
    of resilience and mutual support. She celebrates her heritage through food, music, and participation in local cultural festivals that highlight Black history and art. Living in Smyrna, she navigates
    a diverse suburban environment while staying connected to the broader Black community of Cobb County, often volunteering at neighborhood clean‑up projects and mentoring youth interested in construction
    trades.
attributes:
  skills: '["Concrete pouring", "Framing", "Heavy equipment operation (forklift, backhoe)", "Safety inspections", "Blueprint reading", "Basic carpentry", "Site troubleshooting", "Project coordination",
    "DIY home renovation", "Basic sketching"]'
  hobbies: '["Acrylic painting", "Sketching", "Photography (urban & nature)", "Visiting art galleries", "Attending community theater", "Gardening", "Hiking", "Listening to jazz and soul music", "Cooking
    Southern dishes with creative twists", "Reading about architecture and sustainable design"]'
  career_goals: Grace aims to move from laborer to foreman or site supervisor within the next five years, leveraging her hands‑on expertise and growing leadership abilities. She plans to complete a certification
    in construction management and eventually start a small subcontracting firm that focuses on residential remodels with a creative design twist, integrating her love for art and unconventional thinking.
    Long‑term, she hopes to mentor younger workers, especially women and people of color, and to be a catalyst for more inclusive, aesthetically mindful building projects in the Cobb County area.
