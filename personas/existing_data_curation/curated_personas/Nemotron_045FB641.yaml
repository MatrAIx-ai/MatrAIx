  career_goals: James aims to progress to a senior network engineer role within the next two years, targeting advanced certifications such as CCNP, CCIE, and AWS Solutions Architect. He envisions leading
    large‑scale infrastructure projects, driving network automation initiatives, and eventually transitioning into an IT architect position where he can shape strategic technology roadmaps. Balancing his
    curiosity for emerging tech with practical reliability, he also seeks to mentor junior staff, foster collaborative team environments, and achieve a senior leadership role that aligns with his personal
    commitment to work‑life balance and family stability.
