  career_goals: Jason aims to turn his passion for visual storytelling into a professional career. In the short term, he plans to earn his high school diploma or GED, build a robust portfolio of digital
    and hand‑crafted artwork, and secure an internship or part‑time position at a local art studio or museum in the Philadelphia‑Camden area. Over the next five to ten years, he envisions enrolling in a
    Bachelor of Fine Arts or a related program in graphic design or game art, where he can refine his technical skills and learn industry‑standard pipelines. Ultimately, he aspires to become a concept artist
    or multimedia designer for video games or independent film, leveraging his organized workflow and calm problem‑solving style to lead creative projects or run his own freelance studio.
