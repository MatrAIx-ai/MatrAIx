personas:
  professional: Jason Tumi is a 16‑year‑old aspiring concept artist who leverages their methodical workflow, proficiency in Photoshop and Procreate, and calm problem‑solving style to create detailed digital
    illustrations and motion‑graphics for school projects and local library art workshops.
  sports: Jason Tumi follows the Philadelphia Eagles and Phillies avidly, plays pick‑up basketball at the local community center on weekends, and practices mindfulness‑focused yoga to complement their otherwise
    solitary hobbies, while occasionally joining the high school chess club's strategic thinking sessions that double as mental sport.
  arts: Jason Tumi immerses themselves in visual storytelling, drawing inspiration from illustrators like Hayao Miyazaki, contemporary digital artist Bee Bee Bee, and indie filmmaker Wes Anderson, while
    spending evenings sketching in the Cherry Hill public library’s art room and curating a digital portfolio that blends classic art‑history motifs with modern game‑concept designs.
  travel: Jason Tumi enjoys short trips to nearby cultural hubs, having explored the Philadelphia Museum of Art, the historic streets of Old Town Alexandria, and the murals of Philadelphia’s Magic Gardens,
    and they dream of a future backpacking adventure through Kyoto’s art districts and a study‑abroad semester in Barcelona to experience European design firsthand.
  culinary: Jason Tumi prefers simple yet diverse cuisine, often cooking avocado toast with smoked salmon for breakfast, savoring homemade ramen with miso broth and soft‑boiled eggs for dinner, indulging
    in classic Thanksgiving turkey when family gathers, and experimenting with seasonal ingredients like pumpkin in their occasional digital art‑themed culinary blog.
  core: Jason Tumi is a calm, methodical teen whose curiosity fuels a disciplined art practice, strategic gaming, and a quiet confidence that makes even the most complex projects feel like a well‑planned
    sketch.
background:
  cultural: Jason comes from a middle‑class, Anglo‑American family in Cherry Hill, New Jersey, a suburban community with a mix of traditional Mid‑Atlantic values and easy access to the cultural offerings
    of nearby Philadelphia. His upbringing reflects typical white suburban American customs—celebrating holidays such as Thanksgiving, Christmas, and Fourth of July with family gatherings, and participating
    in community events organized by the local school and library. The area’s diverse population and proximity to a vibrant arts scene have exposed him to a broad range of cultural influences, from museum
    exhibitions to street murals, which nurture his appreciation for visual arts. While his family background is predominantly of English and German ancestry, he embraces the multicultural atmosphere of
    the region, incorporating both local traditions and contemporary artistic trends into his personal identity.
