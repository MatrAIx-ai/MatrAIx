  career_goals: Andrea imagines herself as a teacher who creates a structured, supportive classroom where she can help peers learn new concepts. She also dreams of becoming a veterinarian because she loves
    caring for animals. Ultimately, she hopes to combine her love of organization, education, and compassion by guiding younger children in science or biology.
