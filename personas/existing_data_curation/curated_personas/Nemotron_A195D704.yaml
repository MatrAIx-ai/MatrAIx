personas:
  professional: A budding problem‑solver, Andrea Tribbett channels their passion for LEGO building and jigsaw puzzles, and they envision a future as an architect, meticulously sketching blueprints of playgrounds
    and guiding classmates through structured group projects.
  sports: Andrea Tribbett spends weekends on structured play as a midfielder for the Sunnyvale Sprouts youth soccer club, cheers on the hometown baseball team the River City Rovers, and mimics moves from
    the U.S. women’s gymnastics team, preferring small‑group games that follow clear rules over chaotic free‑play, and they always keep a score sheet to track progress.
  arts: Andrea Tribbett devotes afternoons to filling sketchbooks with detailed scenes of their backyard and church picnics, idolises illustrator Oliver Jeffers, and sings along to gospel legends like Kirk
    Franklin and Aretha Franklin, letting the soulful choir at Sunday service inspire bold, albeit off‑key, performances that they proudly share with family.
  travel: Andrea Tribbett prefers travel itineraries that outline every activity—such as the family’s well‑planned beach getaway to Gulf Shores where they built sandcastles step by step, the school’s organized
    field trip to the Grand Canyon, and the dreamed‑up, schedule‑filled visit to Disney World’s Magic Kingdom—because they feel most comfortable when schedules are clear and predictable.
  culinary: Andrea Tribbett enjoys the comforting taste of creamy mac & cheese and homemade banana bread, proudly mastering the art of buttering toast and assembling a precise grilled cheese, yet they occasionally
    sneak extra chocolate chip cookies from the church potluck despite parental reminders to balance sweets with vegetables like carrot sticks.
  core: Andrea Tribbett is a meticulous seven‑year‑old who blends a love for LEGO, gospel music, and tidy schedules with occasional cookie‑theft, quiet confidence, and a talent for turning everyday scenes
    into colorful illustrations, and they approach each day with methodical curiosity.
background:
  cultural: Andrea is raised in a close‑knit African American family in Alexandria, Louisiana. Her family’s traditions blend Southern heritage and African American culture, including regular attendance
    at a Baptist church where she takes part in gospel singing, Sunday potluck meals featuring dishes such as gumbo and collard greens, and storytelling evenings that celebrate African American history
    and local folklore. The community’s emphasis on resilience, mutual support, and celebration of music and dance shapes her values and daily life. Growing up in Rapides Parish, she experiences both the
    rural charm of central Louisiana and the vibrant local cultural scene that includes blues, jazz, and community festivals.
