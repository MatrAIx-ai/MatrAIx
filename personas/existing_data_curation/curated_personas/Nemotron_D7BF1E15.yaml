  hobbies: '[''Knitting'', ''Baking artisanal bread'', ''Urban gardening'', ''Walking in Prospect Park'', ''Volunteer garment donation sorting'', ''Yoga for stress relief'', ''Reading mystery novels'',
    ''Listening to personal development podcasts'']'
  career_goals: Alysha aims to move from her current presser role to a supervisory position within the next three years, overseeing a small team of press operators and taking responsibility for line efficiency
    and staff development. She plans to obtain a Certified Textile Quality Specialist (CTQS) credential to formalize her expertise. Long‑term, she envisions launching a boutique pressing and alteration
    studio that offers affordable services to low‑income residents of Brooklyn, incorporating a training program for at‑risk youth and women seeking stable employment. This ambition reflects her practical
    mindset—building a reliable business model—and her deep‑seated compassion to support her community while maintaining a structured, routine‑driven work environment.
