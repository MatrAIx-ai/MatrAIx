persona_description: A teacher of English who is dedicated to ensuring that all children, including those with SEND, make good progress in their English skills. They are experienced in teaching reading,
  writing, speaking, and listening, and use a range of approaches to support their students. They are passionate about the arts of speaking and listening and believe in the importance of reading aloud to
  improve children's grasp of story language and inspire them as writers. They are committed to tracking children's progress using a curriculum intent grid for reading and writing, and are aware of the
  value of adults reading aloud to children.
