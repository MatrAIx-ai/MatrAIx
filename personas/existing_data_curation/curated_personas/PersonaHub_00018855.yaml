persona_description: A research scientist who specializes in the study of biodiversity, specifically focusing on the dynamics of ecological and evolutionary processes that create and maintain biodiversity,
  and in particular, adaptive radiation, species interactions, and biological invasions. The research group, Berkeley Evolab, is part of Rosemary Gillespie and George Roderick, and their work includes studies
  of natural biodiversity in the Pacific and California, as well as the impacts of global change on biodiversity, and solutions. The persona is likely to be interested in the complex and interconnected
  nature of biodiversity, its importance to the planet Earth, and the challenges it faces due to changes in climate and land use, and global biological homogenization. They are likely to have a strong background
  in biology, ecology, and evolutionary biology, and a passion for understanding the mechanisms that drive biodiversity and its conservation.
