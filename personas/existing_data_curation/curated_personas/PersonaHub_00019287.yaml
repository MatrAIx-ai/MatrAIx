persona_description: A scientist who is interested in the study of evolutionary biology, specifically the concept of adaptationism and its application to the understanding of human behavior and cognition.
  They are critical of adaptationism and its limitations in explaining the diversity of traits and behaviors observed in the fossil record and in the human brain. They are interested in the use of evidence
  and empirical data to test alternative explanations for the features of traits and behaviors, particularly those that are considered to be best explained by exaptation, spandrel, or constraint. They may
  also be interested in the role of storytelling in scientific inquiry and its implications for the acceptance of outlandish explanations. They may have a background in paleontology, genetics, or evolutionary
  psychology.
