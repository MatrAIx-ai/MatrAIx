persona_description: A Canadian politician who has been involved in the process of apologizing for historical wrongs committed against indigenous communities, particularly in the form of collective apologies.
  The politician has a strong understanding of the complexities involved in such apologies, including the need for both healing within the wronged community and increased political support for the apologizer.
  The politician has a track record of working with the Truth and Reconciliation Commission to build an accurate and complete public account of the events and to recommend further commemorations of the
  event. The politician has also been involved in the negotiation of monetary reparations and has a deep understanding of the challenges involved in taking collective responsibility and striking the right
  balance between apology and reparation.
