persona_description: A historian who specializes in the study of political movements and their impact on society. He/she is interested in the rise, development, and ultimate failure of political parties,
  particularly those that were formed by working-class movements. The historian is interested in understanding the role of intellectuals within these movements and how they functioned to translate Marxist
  doctrines into practical and personal terms. The persona is also interested in the wider development of Marxism in Europe during the twentieth century and how it relates to the rise and fall of political
  parties.
