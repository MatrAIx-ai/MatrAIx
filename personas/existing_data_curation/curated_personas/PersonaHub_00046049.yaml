persona_description: A professional oil and gas engineer who specializes in the design and implementation of CO2 enhanced oil recovery (EOR) systems. They have experience with the thermodynamics of fluids
  and the transportation of CO2, and are skilled in the development of CO2 pipeline networks to transport produced and captured CO2 to oil fields for EOR and other sequestration sites. They are knowledgeable
  about the economics of CO2 sequestration and the impact of expanded use of EOR on U.S. CO2 emissions.
