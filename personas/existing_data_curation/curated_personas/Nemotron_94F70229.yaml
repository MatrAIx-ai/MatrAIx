  career_goals: As a newly retired senior, Wanda’s primary ambition is to remain actively engaged in her community while deepening her artistic pursuits. She aims to serve as a volunteer docent and outreach
    coordinator at the Evansville Museum of Arts, History, and Science, using her organizational talents to develop senior‑friendly tours and interactive programs. She also hopes to complete a personal
    watercolor series inspired by Indiana’s river landscapes and to publish a short memoir chronicling her Midwestern life and family genealogy. Additionally, Wanda plans to travel to at least three major
    art institutions in the next five years — the Indianapolis Museum of Art, the Art Institute of Chicago, and the Metropolitan Museum of Art — to broaden her exposure to diverse artistic traditions.
