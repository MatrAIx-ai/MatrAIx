personas:
  professional: Wanda Berry is a retired senior office manager who now volunteers as a docent and outreach coordinator at the Evansville Museum of Arts, History, and Science, using their methodical budgeting,
    event‑planning expertise, and curious appreciation for art to design senior‑friendly tours and interactive programs while meticulous attention to detail ensures every exhibit runs smoothly.
  sports: Wanda Berry enjoys low‑impact fitness through a weekday walking club at the nearby wetlands, occasionally joining a senior softball league, roots for the Indiana Pacers in basketball, the Cincinnati
    Bengals in football, and the Evansville Purple Aces in college basketball, and they blend social camaraderie with solitary bird‑watching hikes to stay active.
  arts: Wanda Berry spends afternoons painting watercolors of the Ohio River inspired by Claude Monet and Georgia O'Keeffe, quilts historic Midwest patterns after studying the work of folk artist William
    “Bill” Frost, frequents performances at the Reitz Family Arts Center, and they regularly discuss the biographies of Frida Kahlo and Andrew Wyeth at the local book club, letting these influences shape
    both their visual style and community storytelling.
  travel: Wanda Berry plans to visit three major art institutions—the Indianapolis Museum of Art, the Art Institute of Chicago, and the Metropolitan Museum of Art—over the next five years, preferring meticulously
    planned itineraries with early‑morning museum tours, modest boutique hotels, and occasional day trips to nearby state parks like Brown County, while budget constraints sometimes limit their impulse
    to travel abroad.
  culinary: Wanda Berry, a confident home cook, bakes buttery apple pie using heirloom Cortland apples and warm spices like cinnamon and nutmeg, rolls German‑style pretzels with fresh caraway seeds, often
    pairs meals with garden‑fresh herbs such as basil and thyme, and they love sharing these dishes at community potlucks, though they sometimes over‑salt the pretzel dough in the excitement of a gathering.
  core: Wanda Berry blends disciplined organization with a restless curiosity, turning senior years into a tapestry of garden blooms, watercolor sunsets, and community storytelling, even if they sometimes
    misplace their glasses while reaching for a paintbrush.
background:
  cultural: Wanda Berry was born and raised in the small‑town environs of Posey County, Indiana, a region characterized by its agricultural roots and close‑knit Midwestern community. Her family traces its
    ancestry to German and Irish immigrants who settled the area in the late 19th century, a heritage reflected in the holiday customs, food traditions, and church involvement that shaped her upbringing.
    Growing up in a predominantly white, Protestant (Methodist) community, she internalized values of hard work, self‑reliance, and civic responsibility. The local high school football games, county fairs,
    and church gatherings fostered a strong sense of belonging, while her exposure to the Evansville Museum’s regional art exhibitions sparked an early appreciation for visual arts. These cultural influences
    have guided Wanda’s lifelong balance of practicality and curiosity, informing both her organized approach to community service and her love of artistic exploration.
