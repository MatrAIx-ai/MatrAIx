personas:
  professional: Norma Espejo is a certified radiologic technologist who leverages their biomedical engineering background to deliver high‑quality imaging while juggling a spontaneous work style that sometimes
    clashes with the department’s strict scheduling, and they are actively pursuing MRI and interventional radiology certifications to position themselves for a lead technologist role and eventual health‑informatics
    management.
  sports: Norma Espejo is an outdoor enthusiast who regularly hikes the Indiana Dunes and North Liberty trails, occasionally joins the local running club for 5 K races, follows the Indianapolis Colts and
    Chicago Bulls on TV, and balances active weekends with yoga sessions at a neighboring studio, though they sometimes skip workouts when work stress spikes.
  arts: Norma Espejo is a low‑light and macro photography hobbyist who draws inspiration from Ansel Adams and Vivian Maier, sketches nature scenes in a weathered journal, devotes Saturday evenings to a
    sci‑fi book club discussing authors like N.K. Jemisin and Octavia Butler, and unwinds listening to Brian Eno’s ambient albums while sipping chai tea.
  travel: Norma Espejo is a weekend traveler who favors road trips to national parks such as Acadia and Yellowstone for sunrise shoots, dreams of photographing the aurora borealis in Iceland, and plans
    budget‑friendly trips around health‑fair volunteering schedules, although they sometimes postpone travel plans due to lingering work deadlines.
  culinary: Norma Espejo is a health‑conscious home cook who favors quinoa bowls with roasted beets, kale, and feta, prepares quick avocado toast for post‑yoga breakfasts, enjoys occasional sushi rolls
    from a local Japanese spot, and treats themselves to a double‑espresso and dark chocolate when a new camera lens arrives.
  core: Norma Espejo is a curious, detail‑driven radiologic technologist whose love for photography, sci‑fi speculation, and spontaneous living coexists with a persistent undercurrent of anxiety and a habit
    of impulsively buying gear.
background:
  cultural: Norma grew up in a suburban Midwestern community in Indiana, where values such as self‑reliance, modesty, and community involvement are emphasized. Her family celebrated traditional holidays
    like Thanksgiving and Independence Day with potluck meals and local parades, fostering a sense of belonging. The region’s strong public‑school system and exposure to nearby universities encouraged her
    early interest in science and technology. While she identifies as White, she embraces the cultural mosaic of North Liberty, engaging with neighbors of diverse backgrounds through volunteer work and
    local events, and she appreciates the balance between rural openness and the growing suburban amenities of the Greater South Bend area.
attributes:
  skills: '[''Digital Radiography'', ''Computed Tomography (CT)'', ''Mammography'', ''Patient Positioning'', ''Radiation Safety'', ''PACS'', ''RIS'', ''Basic Health Informatics'', ''Quality Control'', ''Equipment
    Troubleshooting'']'
  hobbies: '[''Photography'', ''Hiking'', ''Sketching'', ''Journaling'', ''Science Fiction Book Club'', ''Yoga'', ''Mindfulness Meditation'', ''Volunteering at Community Health Fairs'']'
  career_goals: She aims to become a lead technologist in her department within the next three years, pursuing advanced certifications in MRI and interventional radiology. In the longer term, she hopes
    to earn a master’s degree in health informatics to transition into a role that blends imaging expertise with data analysis, eventually moving into a managerial or education position where she can mentor
    new technologists and influence workflow improvements. She also wants to maintain a flexible schedule that supports her personal well‑being.
