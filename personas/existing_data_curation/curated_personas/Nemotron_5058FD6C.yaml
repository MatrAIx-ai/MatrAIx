personas:
  professional: Roberto Limbaugh, a 26‑year‑old cashier turned community‑arts coordinator, blends their POS expertise, basic Spanish fluency, and self‑taught Canva and Photoshop skills to design eye‑catching
    flyers, manage art‑walk logistics, and navigate a relaxed yet improvisational work style that thrives on social interaction, quick problem‑solving, and a competitive drive to out‑shine rival events.
  sports: Roberto Limbaugh fuels their competitive streak by playing weekly pickup basketball at the town’s community center, cheering on the New England Patriots and the Hartford Yard Goats, and maintaining
    a casual fitness routine of trail runs in Riverside Park, while occasionally joining a local adult league that blends strategy with social camaraderie.
  arts: Roberto Limbaugh immerses themselves in the arts by curating street‑art tours featuring works by Banksy, local muralist Storm, and contemporary installations by Yayoi Kusama, attending live shows
    by indie group Vampire Weekend and jazz saxophonist Kamasi Washington, and channeling their graphic‑design hobby into vibrant promotional flyers for community events.
  travel: Roberto Limbaugh favors spontaneous weekend road trips along the Connecticut coastline, exploring coastal towns like Mystic, New London, and Provincetown, documenting hidden galleries and taco‑truck
    gems on a blog, while dreaming of a spring pilgrimage to Barcelona’s El Raval street‑art scene and a summer art‑festival tour of Kyoto’s traditional tea houses.
  culinary: Roberto Limbaugh’s culinary experiments blend Korean BBQ tacos, miso‑glazed salmon, and harissa‑spiced falafel, a testament to their intermediate cooking chops and love for food‑truck flavors,
    while they relish fresh basil, lime, and smoked paprika in home‑cooked dishes and frequently scout the night market for innovative ingredients.
  core: Roberto Limbaugh is a curiosity‑driven, socially magnetic 26‑year‑old whose love of spontaneous art events, competitive games, and food‑truck adventures is balanced by a laid‑back, sometimes disorganized
    lifestyle and a habit of worrying over unfinished projects.
background:
  cultural: Roberto was raised in a middle‑class New England family with roots in the Northeastern United States; his heritage includes English and Irish ancestry. Growing up in suburban Plainfield, Connecticut,
    he experienced the region’s emphasis on community involvement, seasonal celebrations, and a strong work ethic. His family encouraged participation in local events such as town fairs, community theater
    productions, and volunteer art projects, fostering his appreciation for the arts and social engagement. He maintains ties to traditional New England customs—like Thanksgiving gatherings and holiday
    décor—while also actively seeking contemporary cultural experiences through local galleries, music venues, and multicultural food scenes.
attributes:
