  hobbies: '[''Visiting art galleries'',''Street photography'',''Live music concerts'',''Board‑game nights'',''Pickup basketball'',''Competitive online gaming'',''Cooking experimental recipes'',''Weekend
    road trips'',''Blogging about local art and events'',''Journaling'',''Running'']'
  career_goals: Roberto aims to blend his retail experience with his passion for the arts by pursuing a role such as gallery assistant or community‑arts program coordinator in the New London County area.
    Over the next three years he plans to complete his associate degree in liberal arts, obtain a certificate in graphic design, and build a portfolio of promotional materials for local events. He also
    hopes to secure a supervisory position in a retail setting to gain management experience, budgeting skills, and staff‑training expertise. Ultimately, his long‑term ambition is to open a small café‑gallery
    hybrid where he can host exhibitions, live music, and community workshops, offering a flexible, creative work environment that aligns with his love for varied experiences and social interaction.
