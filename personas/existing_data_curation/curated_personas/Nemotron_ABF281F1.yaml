  skills: '[''Early reading'', ''Counting to 20'', ''Puzzle solving'', ''Lego building'', ''Following multi-step instructions'', ''Organizing toys'', ''Emotional awareness'']'
  hobbies: '[''Reading picture books'', ''Lego building'', ''Puzzle solving'', ''Drawing'', ''Nature walks'', ''Organizing crafts'', ''Attending library storytime'']'
  career_goals: Even at five, Cynthia dreams of careers that blend curiosity with practicality. She imagines becoming a scientist or engineer who designs inventions, a veterinarian caring for animals, or
    an astronaut exploring space. She also likes the idea of being a teacher, where she can organize lessons and share knowledge with peers. Her competitive streak drives her to aim for top positions in
    school projects and win science fair competitions, while her skeptical side makes her want to verify facts before believing them.
