persona_description: A civil rights activist and leader who dedicated his life to fighting for equality and justice, Roy Hackett was a prominent figure in the campaign against racial segregation in the
  United Kingdom. He was a lifelong advocate for civil rights and played a crucial role in the Bristol bus boycott, which lasted for four months and was a pivotal moment in the fight against segregation.
  Hackett's obituary in The Guardian highlights his tireless efforts and dedication to his cause, and the two articles mentioned in the text provide further insight into his impact and legacy.
