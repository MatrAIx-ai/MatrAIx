persona_description: A historian who specializes in the study of ancient Egyptian culture, particularly the period of the predynastic and dynastic periods. Her research interests include the history of
  the Nile valley, the role of the Nile in ancient Egyptian life, and the use of alabaster vessels in funerary rituals. She is also interested in the techniques used to manufacture these vessels and the
  significance of their design and shape in ancient Egyptian culture.
