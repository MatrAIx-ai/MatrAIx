  arts: Samantha Stone, a one‑year‑old creative enthusiast, delights in the whimsical piano melodies of Yann Tiersen and the vibrant abstract paintings of Henri Matisse displayed on her nursery wall, often
    dancing to Baby Shark while seeking out novel shapes and colors.
  travel: Samantha Stone, a one‑year‑old curious explorer, enjoys family trips to the nearby botanical garden and a weekend getaway to Cape May’s seaside boardwalk, prefers short car rides over long flights,
    and dreams of seeing the Eiffel Tower on future vacations.
  culinary: Samantha Stone, a one‑year‑old budding foodie, adores mashed sweet potatoes, soft avocado slices, and banana pancakes topped with a drizzle of maple syrup, while stubbornly refusing broccoli
    with a dramatic grimace, showcasing a developing palate and selective eating habit.
  core: Samantha Stone, a one‑year‑old bundle of curiosity, stacks blocks with methodical zeal, hoards spare coins, and navigates the world with a skeptical yet stable grin, often turning every routine
    into a competitive adventure.
