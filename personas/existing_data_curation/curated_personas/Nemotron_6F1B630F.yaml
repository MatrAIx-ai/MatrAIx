    to classic rock'']'
  career_goals: David dreams of turning his curiosity about how things work into a career in engineering. He imagines designing robots or mechanical devices that could help people in his community, especially
    in areas where manufacturing once thrived. He is also drawn to the idea of sharing knowledge, hoping to mentor younger students through after-school STEM clubs. In the longer term, he aims to attend
    a specialized STEM high school, earn a degree in robotics or environmental engineering, and eventually contribute to projects that improve local industry and protect the nearby rivers.
