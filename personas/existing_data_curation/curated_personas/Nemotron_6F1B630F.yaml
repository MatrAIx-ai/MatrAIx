personas:
  professional: David Ashe, a budding robotics enthusiast, balances curiosity with practicality by designing LEGO robots that are both imaginative and mechanically sound, organizes each build step on a
    color‑coded chart while allowing room for spontaneous tinkering, collaborates politely with teammates on the soccer field and fellow LEGO club members, and they show enough resilience to quickly bounce
    back when a circuit fails.
  sports: David Ashe, a dedicated midfielder on the Greensburg Youth Soccer Club, practices disciplined drills while still making time for spontaneous scrimmages with friends, cheers for the Pittsburgh
    Steelers and Penguins as a nod to local sports culture, and they embrace the physical challenge of hiking the Appalachian foothills, often timing personal bests on weekend trail runs.
  arts: David Ashe, an avid comic‑strip creator and fantasy‑novel reader, channels a kind, cooperative spirit into collaborative art projects at school, draws characters inspired by classic rock album covers
    from Led Zeppelin, The Rolling Stones, and Pink Floyd, and they eagerly share finished strips with teammates and garden volunteers, though they sometimes procrastinate finishing panels when a new LEGO
    design beckons.
  travel: David Ashe, who prefers a blend of structured day trips and spontaneous weekend escapes, has hiked Shenandoah National Park with family, explored Philadelphia's historic sites on a school field
    trip, and they dream of backpacking through the Canadian Rockies while using a hand‑drawn map to plan each route and occasionally relying on friends to split travel costs.
  culinary: David Ashe, the self‑appointed snack commander in the family kitchen, meticulously plans weekly meals featuring extra‑cheesy macaroni and garden‑fresh veggie kebabs, loves experimenting with
    the LEGO‑pizza topping arrangement, but they frequently neglect to wash dishes promptly after cooking, leading to a growing pile in the sink they habitually promise to tackle the next day.
  core: David Ashe is a curiosity‑driven, organized yet flexible 12‑year‑old who balances LEGO robotics, soccer, comic art, and classic rock, while they occasionally juggle procrastination and a love for
    adventure.
background:
  cultural: David grew up in Greensburg, a midsized town in Westmoreland County, western Pennsylvania, a region shaped by its historic steel and coal industries and a strong sense of community. His family
    traces its roots to European immigrants—predominantly German and Irish—who settled the area in the early 20th century. The local culture emphasizes modesty, hard work, and neighborly support, reflected
    in community events such as the annual Greensburg Community Fair, high-school football games, and volunteer clean-up days. At school, he experiences a curriculum that blends traditional American subjects
    with hands-on STEM initiatives, while his church and family gatherings reinforce values of kindness and cooperation. These cultural influences, together with the small-town environment, shape David’s
    outlook, encouraging him to balance curiosity with practicality and to contribute positively to his community.
