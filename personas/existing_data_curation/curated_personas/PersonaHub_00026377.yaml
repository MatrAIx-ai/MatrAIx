persona_description: A statistician who specializes in event history analysis, particularly in the study of mortality and the use of illegal drugs. They are familiar with various types of event history
  models and the intricacies of censoring and recidivism. They are aware of the limitations of logistic regression and the importance of using a critical piece of information, such as the duration of survival,
  when analyzing event history data. They are also aware of the potential for bubble-vision and the need to broaden their horizons and focus on things that are not particularly important.
