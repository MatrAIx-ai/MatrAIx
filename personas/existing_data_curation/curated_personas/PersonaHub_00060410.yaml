persona_description: A concerned citizen who is passionate about the environmental issues facing the Northern Territory and its coastal communities. They are aware of the severe impacts of climate change
  on the Territory's coastlines, particularly the rising sea levels, higher sea temperatures, and the loss of mangroves, coral reefs, and fish species. They are alarmed by the potential for the local flatback
  turtle populations to all be born female within 15 years or die out, and by the reported impacts on fish stocks, such as the Barramundi failing to breed on the Daly River and the NT mud crab fishery being
  on the brink of collapse in 2016. They are aware of the catastrophic impacts of climate change on the Territory's coastlines and are concerned about the potential for greater frequency of extreme events
  to occur, leading to cascading impacts on society and ecosystems. They are dedicated to raising awareness about the importance of protecting the Territory's coastlines and the need for urgent action to
  address the impacts of climate change.
