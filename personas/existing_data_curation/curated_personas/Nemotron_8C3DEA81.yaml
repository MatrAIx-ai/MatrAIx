personas:
  professional: Bertram Boyce is a hands‑on teen who converts their love of structure into reliable automotive maintenance, precise woodworking, and meticulous garden care, while using their strong organizational
    talent to keep detailed logs and budgeting spreadsheets, positioning themselves to pursue a trade apprenticeship as an electrician or automotive technician.
  sports: Bertram Boyce is a weekend basketball enthusiast who plays in the Eastside Community Center's pickup league, follows the Chicago Bulls (NBA) and Chicago Cubs (MLB) with a disciplined schedule,
    supplements their game with a twice‑weekly strength‑training routine, and applies their methodical planning to track performance metrics like shooting percentages.
  arts: Bertram Boyce is a classic‑rock and folk aficionado who fills their journal pages while listening to The Rolling Stones, Fleetwood Mac, and Bob Dylan, collects vintage vinyl, attends occasional
    local open‑mic folk nights, and draws creative inspiration for their woodworking designs from album art and lyrical storytelling.
  travel: Bertram Boyce is a methodical planner who road‑tripped to Grand Canyon National Park and visited grandparents in Ohio, prefers pre‑booked itineraries with detailed checklists, dreams of a structured
    backpacking tour of Japan’s historic towns, and balances travel costs with their budgeting spreadsheet.
  culinary: Bertram Boyce is a practical home cook who favors garden‑fresh dishes like roasted tomato‑basil pasta, grilled chicken with rosemary, and homemade vegetable soup, enjoys experimenting with garlic,
    oregano, and fresh basil, and occasionally treats themselves to a craft burger at a local diner after completing a woodworking project.
  core: Bertram Boyce is a detail‑obsessed teen who masters model kits and spreadsheets to tame anxiety, dreams of a stable trade apprenticeship, and balances structured solitude with occasional basketball
    games.
background:
  cultural: Bertram was raised in Waynesboro, a small town in Franklin County, Pennsylvania, within a predominantly white, working‑class community with deep roots in Appalachian and early German‑American
    settlement patterns. His family traditions include attending local community events, such as county fairs and church gatherings, emphasizing self‑reliance, hard work, and mutual support. The regional
    culture values practicality, modesty, and a close‑knit neighborhood network, which have shaped his practical outlook and collaborative yet independent nature.
attributes:
  skills: '["Basic automotive maintenance", "Woodworking and carpentry basics", "Garden care and landscaping", "Computer troubleshooting", "Spreadsheet and budgeting management", "Time-management and task-prioritization",
    "Clear communication and assertive teamwork"]'
  hobbies: '["Model kit building", "Woodworking projects", "Vegetable gardening", "Chess and logic puzzles", "Pickup basketball", "Listening to classic rock and folk music", "Journaling"]'
  career_goals: Bertram aims to complete his GED within the next two years and then enter a trade apprenticeship, such as an electrician or automotive technician program, where he can apply his methodical
    approach and hands‑on abilities. He hopes to secure a stable, well‑structured job that offers clear progression and a predictable routine, allowing him to manage stress and provide financial security
    for himself and his family. In the longer term, he envisions eventually becoming a journeyman in his chosen trade and possibly mentoring younger apprentices.
