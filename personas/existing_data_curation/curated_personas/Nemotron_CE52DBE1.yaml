personas:
  professional: An aspiring junior naturalist and budding engineer, Sonyia Jackson blends their love for adventure books and LEGO building to craft imaginative experiments in their school’s science club,
    where their curiosity-driven yet practical mindset guides their hands‑on projects, even as they often sidestep strict timelines.
  sports: A budding water‑enthusiast, Sonyia Jackson participates in the community’s after‑school swimming club and occasionally joins the local youth soccer team, cheering for the minor‑league baseball
    team the River City Runners, while their love for shoreline exploration keeps them active with daily beach walks and tide‑pool surveys.
  arts: A creative storyteller, Sonyia Jackson sketches vivid scenes from mystery novels and draws characters inspired by classic soul icons like Aretha Franklin and Marvin Gaye, while they hum gospel harmonies
    and play simple melodies on the piano, often attempting to recreate the chord progressions of Stevie Wonder’s ‘Isn’t She Lovely’.
  travel: An inquisitive explorer, Sonyia Jackson has visited the nearby coastal town of Seaside Cove and loves collecting shells there, and they dream of trekking through the Redwood National Park and
    sailing around the islands of the Greek Aegean, preferring day trips with their family that balance discovery with their school schedule.
  culinary: A budding baker, Sonyia Jackson enjoys mixing butter, brown sugar, vanilla, and chocolate chips to create chewy cookies with their grandmother, and they also love the bright tang of fresh strawberries
    on a blueberry muffin, though they sometimes forget to set a timer and end up with a slightly burnt edge.
  core: Sonyia Jackson is a curious, hands‑on 8‑year‑old who blends a love for nature, LEGO design, and soulful music with a playful habit of impulsive spending and occasional bedtime snack mischief, and
    they approach new challenges with calm confidence.
background:
  cultural: Sonyia is raised in an African American family in Mobile, Alabama, a city with deep Southern and coastal traditions. Her family maintains strong ties to the local historically Black church,
    where she experiences gospel music, community gatherings, and values of mutual support. She celebrates cultural milestones such as Juneteenth and Kwanzaa, learning stories of resilience and heritage
    from her grandparents. Southern cuisine, especially dishes shared during family meals like collard greens and cornbread, connects her to her roots. The city’s Creole and Gullah influences also shape
    her appreciation for coastal ecosystems, which fuels her interest in marine wildlife. These cultural experiences blend with her personal curiosity, shaping a well‑rounded perspective.
