  career_goals: Sonyia dreams of a future where she can combine her love for animals and her practical problem‑solving skills. She envisions becoming a wildlife rehabilitator or veterinarian, helping injured
    birds and marine creatures she discovers along Mobile Bay. She also imagines using her storytelling ability to become a children's author or teacher, sharing knowledge in small, supportive classroom
    settings. Her ambition is guided by a desire to make a tangible, positive impact on her community while staying true to her curious and practical nature.
