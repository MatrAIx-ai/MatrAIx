  hobbies: '[''Playing shortstop for a community softball league'', ''Volunteering at the local food pantry'', ''DIY woodworking and small metal‑craft projects'', ''Hiking the Fox River State Trail'', ''Attending
    weekly church fellowship gatherings'', ''Listening to classic rock music'', ''Helping with Applefest organization and clean‑up'']'
  career_goals: Jane values routine, stability, and community, so her career aspirations focus on building a reliable path within manufacturing while taking on increasing responsibility. In the next year
    she plans to earn Certified Welder and CNC Operator certifications and complete an associate degree in Manufacturing Technology at a local community college. Within three to five years she hopes to
    be promoted to shift supervisor, where she can use her organizational strengths to oversee scheduling, quality control, and safety training. Long‑term, she envisions either becoming a production manager
    at a regional plant or launching a small family‑run fabrication shop that offers apprenticeship opportunities for local youth, allowing her to give back to the community.
