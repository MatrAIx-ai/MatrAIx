personas:
  professional: Jane Healy is a metal and plastic fabricator in Appleton who leverages MIG/TIG welding, CNC lathe and mill operation, and blueprint reading to produce high‑quality parts, while their meticulous
    organization and love for routine drive them to document work logs, train new coworkers, and pursue Certified Welder and CNC Operator certifications as stepping stones toward a shift supervisor role
    and eventual production manager or family‑run shop.
  sports: Jane Healy plays shortstop for the Appleton community softball league, cheers for the Milwaukee Brewers and Wisconsin Badgers football, hikes the Fox River State Trail weekly, cycles the lakeside
    bike paths, and volunteers as a scorekeeper for youth soccer, while also joining the Appleton Runners club during the spring season.
  arts: Jane Healy’s creative outlet includes listening to classic rock legends like Led Zeppelin, The Rolling Stones, and Fleetwood Mac while sanding wood, attending occasional concerts at the Fox Cities
    Performing Arts Center, and admiring the craftsmanship of vintage lawn equipment, which fuels their DIY metal‑craft projects.
  travel: Jane Healy prefers road‑trip adventures that blend outdoor activity and community, planning weekend getaways to Door County’s coastal trails, the Upper Peninsula’s Pictured Rocks, and Badlands
    National Park, using a compact SUV to carry a bike and camping gear, and budgeting trips carefully to stay within their savings plan.
  culinary: Jane Healy enjoys cooking hearty dishes such as apple‑cider‑glazed pork ribs, homemade mac and cheese with sharp cheddar, and fresh apple pie, frequently sourcing local apples, honey, and grass‑fed
    beef from the Appleton farmer’s market, and they often grill at community picnics with a side of coleslaw.
  core: Jane Healy is a reliably organized, community‑focused fabricator who balances hands‑on metal work, classic rock, and weekend outdoor adventures while diligently planning for a future shop and keeping
    life both practical and socially vibrant.
background:
  cultural: Jane was raised in Appleton, Wisconsin, a Midwestern city known for its strong sense of community, modest values, and work ethic. She comes from a white family of largely German and Irish ancestry
    that has lived in the region for several generations. Her upbringing emphasized reliability, practicality, and helping neighbors, often through church‑based volunteer activities and local community
    events. The cultural fabric of Appleton—characterized by annual festivals like Applefest, a love of outdoor recreation, and a tradition of modest, down‑to‑earth living—shapes Jane’s outlook, reinforcing
    her preference for routine, her cooperative spirit, and her commitment to contributing to the community.
attributes:
  skills: '[''MIG/TIG welding'', ''CNC lathe operation'', ''CNC mill operation'', ''Blueprint reading'', ''Quality inspection and assurance'', ''Equipment maintenance and troubleshooting'', ''OSHA safety
