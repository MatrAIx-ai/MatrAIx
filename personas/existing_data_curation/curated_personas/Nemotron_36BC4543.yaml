  hobbies: '["Visiting art galleries and museums","Painting (landscapes, folk motifs)","Pottery and ceramics","Cooking Mexican cuisine (mole, tamales, ceviche)","Traditional crafts (papel picado, embroidery)","Hiking
    in local trails (Cuyamaca Rancho State Park)","Listening to music (mariachi, indie folk)","Podcasting (art history, cultural anthropology, sustainable living)"]'
  career_goals: Lesbia plans to earn her GED within the next year and enroll in a community‑college program focused on arts administration or nonprofit management. She aims to obtain a certification in
    community arts programming and secure a part‑time position at a local cultural center where she can assist in organizing Mexican heritage festivals and art workshops. In the longer term, she aspires
    to become a program director for a nonprofit that promotes Latino arts, or to launch a small business offering art classes and culinary workshops that celebrate her Mexican roots.
