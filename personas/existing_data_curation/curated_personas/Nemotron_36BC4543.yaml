personas:
  professional: Lesbia Quevedo, a 37‑year‑old aspiring arts administrator, builds on bilingual communication, meticulous event planning, and hands‑on craft expertise to coordinate community festivals and
    workshops while balancing caregiving duties, and infuses each program with their curious, open‑minded approach to new artistic ideas.
  sports: Lesbia Quevedo, an active member of the San Diego Hiking Club, spends weekends trekking the trails of Cuyamaca Rancho State Park, follows the San Diego Wave FC avidly, plays in a casual adult
    soccer league with the San Diego Scorpions each spring, and complements their fitness regimen with beach yoga, preferring low‑impact exercise that harmonizes with their artistic lifestyle.
  arts: Lesbia Quevedo immerses themselves in contemporary art by attending gallery shows featuring artists like Marisol Sánchez and Alfredo Rivera, creates original landscape paintings and pottery inspired
    by folk motifs, curates community murals, enjoys listening to mariachi ensembles and indie folk groups such as Fleet Foxes, and draws creative energy from performances by dancer‑choreographer Alejandro
    Gómez.
  travel: Lesbia Quevedo favors thoughtfully planned road trips that blend cultural immersion with natural beauty, recently explored the historic streets of Oaxaca, drove along the dramatic cliffs of Big
    Sur, enjoys weekend museum visits in La Jolla, and dreams of a solo pilgrimage to the artist colonies of Santa Fe while carefully budgeting their travel expenses.
  culinary: Lesbia Quevedo, a passionate home cook, excels at preparing mole, hand‑shaping tamales, and balancing the bright flavors of ceviche, experiments with seasonal farm‑to‑table ingredients, leads
    weekly cooking workshops, and maintains a well‑stocked pantry of chilies, masa harina, fresh herbs, and citrus fruits to reinvent cherished family recipes with a creative twist.
  core: Lesbia Quevedo, a curious and organized community‑focused artist, habitually loses track of time while painting, forgets to water their succulents, yet transforms these quirks into spontaneous workshops
    that blend craft, cuisine, and cultural storytelling.
background:
  cultural: Lesbia was raised in a Mexican‑American household in San Diego County, where Spanish was spoken at home and Mexican traditions were celebrated. She grew up participating in Día de los Muertos
    altars, quinceañera festivities, and local community events that emphasized family and collective identity. Her heritage is reflected in her love for Mexican folk art, music, and cuisine, and she maintains
    strong ties to the broader Mexican community in Southern California. While embracing her Mexican roots, she also integrates Californian influences, such as a focus on environmental stewardship and the
    region’s diverse artistic scene.
attributes:
  skills: '["Bilingual Spanish-English communication","Event planning and volunteer coordination","Visual arts (painting, pottery, papel picado)","Traditional Mexican cooking","Basic computer proficiency
