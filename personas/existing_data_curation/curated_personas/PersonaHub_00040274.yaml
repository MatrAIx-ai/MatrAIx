persona_description: A legal historian who is interested in the history of the equal protection clause in the United States, particularly the development of constitutional norms before the Supreme Court
  systematically began attacking racial discrimination in the 1950s. The individual is knowledgeable about the history of compulsory sterilization litigation before the landmark case Buck v. Bell, and is
  familiar with the many instances in early twentieth-century law, both before and after Buck v. Bell, in which the Supreme Court struck down legislation on equal protection clause grounds. The individual
  has a unique perspective on the revisionist history of the equal protection clause and its implications for an understanding of constitutional norms in the Lochner era.
