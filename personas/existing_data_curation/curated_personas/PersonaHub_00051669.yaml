persona_description: Shelley Feist, Executive Director, Partnership for Food Safety Education. Shelley is an expert in food safety education and has extensive knowledge in the fields of nutrition, food
  safety, and public health. She is passionate about promoting safe food handling practices and reducing the risk of foodborne illness in households where one or more people are immune-compromised or at
  risk for serious foodborne illness. Shelley is dedicated to fostering a strong internal "food safety culture" in homes and is constantly working to learn more about the blocks and motivators to home safe
  food handling practices.
