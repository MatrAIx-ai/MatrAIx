  hobbies: '[''Pick‑up basketball'', ''K‑pop dance workshops'', ''Lunar New Year festival participation'', ''Asian‑fusion cooking and potlucks'', ''Arduino and Raspberry Pi hobby projects'', ''Volunteer
    tech tutoring for seniors'', ''Board games and mahjong nights'', ''Exploring Brooklyn street markets'', ''Sci‑fi movies and tech podcasts'', ''Casual hiking with friends'']'
  career_goals: He aims to become a senior lead technician and eventually open his own boutique repair and consulting service specializing in ATMs and office automation. He plans to acquire certifications
    in financial technology security and networked device management, and to mentor younger technicians through community workshops. While he values flexibility, he also seeks a role that allows him to
    blend hands‑on work with strategic planning, perhaps moving into a supervisory position that lets him shape service standards and innovate repair processes.
