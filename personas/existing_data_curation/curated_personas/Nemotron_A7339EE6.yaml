  hobbies: '[''Playing soccer'', ''Ballet dance class'', ''Reading adventure books (Magic Tree House)'', ''Crafting friendship bracelets and paper art'', ''Singing in church choir'', ''Baking cookies with
    family'', ''Feeding and walking the family dog'', ''Attending the county fair'']'
  career_goals: Kandace dreams of a future where she can help people and animals. She often says she wants to become a teacher because she enjoys explaining things to her younger brother and classmates,
    and she also imagines being a veterinarian to care for pets and farm animals. She likes the idea of working on her family's farm as a caretaker or community helper. Her short-term goals include improving
    her reading level, learning more about animals through the school's science club, and continuing to practice music and teamwork.
