personas:
  professional: Kandace Smith is a budding community helper who volunteers at the church choir and local fair committees, using their sociable and cooperative nature to foster group harmony while they thrive
    on familiar routines despite occasional disorganization.
  sports: Kandace Smith plays forward for the Little Lions youth soccer club, sticks to a predictable after-school practice schedule, and chants along with the Seattle Seahawks on weekend game days, finding
    comfort in the routine of team drills while they and their friends join them for spontaneous games of tag in the park.
  arts: Kandace Smith delights in pirouetting to Tchaikovsky's Nutcracker during ballet class, sings hymns in the church choir with a voice reminiscent of Andrea Bocelli, and spends afternoons listening
    to Taylor Swift's pop hits and watching Disney's Cinderella while they craft friendship bracelets, weaving these artistic influences into a vibrant personal style.
  travel: Kandace Smith enjoys the familiar excitement of the annual county fair and weekly trips to the nearby farm market, and dreams of visiting Disney World in Orlando for a magical getaway, preferring
    well-planned itineraries that balance known local stops with one new adventure each summer, even though they sometimes face family budget limits for longer trips.
  culinary: Kandace Smith loves the sweet, buttery taste of chocolate-chip cookies they help bake for church potlucks, enjoys stirring up a creamy mac-and-cheese with extra cheddar, and can skillfully whisk
    together a strawberry shortcake using fresh farm strawberries and vanilla extract, though they often sneak an extra cookie before the batch cools.
  core: Kandace Smith is an energetic nine-year-old who thrives on routine and group play, yet they habitually misplace school supplies, worry over small setbacks, and can't resist a spontaneous game of
    tag after chores.
background:
  cultural: Kandace is a white child raised in Elton, a small town in Allen Parish, Louisiana. Her family follows a Southern Baptist tradition, and the local church is a central hub for community events.
    The region's culture blends Southern hospitality with Cajun and Creole influences seen in food, music, and festivals such as Mardi Gras and the parish fair. Growing up in a rural setting, she is familiar
    with farm life, outdoor recreation, and close-knit neighborly ties. Her upbringing emphasizes practicality, respect for elders, and a strong sense of community, which align with her preference for routine,
    helping others, and cooperative activities.
