personas:
  professional: Yvonne Yanker, a 15‑year‑old budding indie game developer, blends curiosity for sci‑fi narratives with practical coding skills to craft small interactive text‑based mysteries, working methodically
    in solitary evenings while competitively sharing prototypes on a youth forum.
  sports: Yvonne Yanker prefers solo fitness, spending weekday mornings on a home treadmill run and practising yoga for flexibility, yet follows the Los Angeles Lakers and the New York Yankees avidly, cheering
    quietly during games and occasionally joining a local weekend running club for a competitive edge.
  arts: Yvonne Yanker immerses themselves in speculative fiction, penning reflective poetry inspired by authors like Neil Gaiman and sketching digital character concepts in a style reminiscent of Studio
    Ghibli, while listening to the ambient soundscapes of composer Ólafur Arnalds to fuel their creative workflow.
  travel: Yvonne Yanker dreams of exploring Tokyo’s anime districts and has already visited the historic streets of Santo Domingo with family, balancing a careful budget that favors low‑cost hostels and
    using a travel planner app to map out quiet museum itineraries rather than crowded party scenes.
  culinary: Yvonne Yanker loves the collaborative cooking ritual of preparing mangu and sancocho on weekends, perfects the balance of plantain mash with sautéed onions, and experiments with a side of homemade
    guava glaze for pork, while also mastering quick dishes like garlic butter pasta and pepperoni pizza slices.
  core: Yvonne Yanker is an introspective, tech‑savvy teen who channels competitive curiosity into solitary coding and poetry, battles stress with mindfulness, and balances frugal habits with a love for
    cultural cooking and quiet fandoms.
background:
  cultural: Yvonne was raised in a Dominican immigrant household in Salina, Kansas. At home, Spanish is spoken and Dominican traditions—such as music (bachata, merengue), festivals, and family meals—play
    a central role. While she values the close‑knit community aspects of her heritage, she often retreats to solitary activities, balancing the vibrant cultural environment with her preference for quiet,
    independent endeavors. This blend of Dominican cultural pride and Midwestern upbringing informs her worldview, academic interests, and personal expressions.
