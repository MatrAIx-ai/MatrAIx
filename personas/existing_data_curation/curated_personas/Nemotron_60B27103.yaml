  career_goals: She aims to attend a STEM-focused high school and later pursue a degree in computer science or data science, with a long‑term ambition to become a software engineer who creates tools that
    aid health analytics. Her competitive drive pushes her toward academic competitions and hackathons, while her practical mindset keeps her focused on building a solid technical foundation and securing
    internships that offer real‑world experience.
