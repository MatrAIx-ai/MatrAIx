personas:
  professional: Amber Cochran, a seasoned housekeeping specialist with a deep mastery of eco‑friendly cleaning techniques, channels her love for nature and art into a boutique service that blends meticulous
    cabin upkeep with subtle, locally inspired decorative refreshes, while navigating the disorganized chaos of launching her own business.
  sports: Amber Cochran’s favorite sport is leisurely hiking the Great Smoky Mountains trails, where she joins the Great Smoky Mountains Hiking Club, follows the Charlotte Hornets for occasional basketball
    excitement, and enjoys weekend walks with the Asheville City SC supporters who meet for community runs.
  arts: Amber Cochran’s artistic soul thrives on watercolor painting of misty peaks inspired by Ansel Adams, sketching with her DSLR, knitting crochet blankets, and curating vintage Appalachian postcards
    while devouring speculative fiction by N.K. Jemisin and studying the abstract works of Mark Rothko.
  travel: Amber Cochran prefers flexible, nature‑centric trips, often improvising weekend getaways along the Blue Ridge Parkway, revisiting Asheville’s River Arts District, dreaming of the distant Isle
    of Skye, and balancing her wanderlust with the modest budget of a budding entrepreneur.
  culinary: Amber Cochran delights in cooking simple mountain fare like smoked trout with lemon‑dill, fried green tomatoes, and blackberry jam on warm toast, experimenting with herb‑infused teas of chamomile
    and mint, while her cooking skill hovers between confident stovetop basics and occasional burnt sauces.
  core: Amber Cochran, a 64‑year‑old mountain‑loving dreamer, balances eco‑cleaning entrepreneurship with watercolor wanderings, worries about cash flow, battles mild hypertension, and occasionally lets
    disorganization derail her meticulous artistic vision.
background:
  cultural: Amber grew up in a modest, close-knit community in the Appalachian foothills of western North Carolina. Her family traditions include seasonal barn-raising gatherings, folk music sessionals,
    and a strong oral storytelling heritage that values both humor and melancholy. The region's appreciation for self-reliance, respect for the natural environment, and reverence for local crafts shaped
    her practical skills and artistic sensibilities. Though she now lives in Bryson City, those Appalachian roots still inform her values of modesty, hospitality, and a deep connection to the mountain landscape.
attributes:
  skills: '[''Residential and vacation-rental cleaning'', ''Eco-friendly cleaning solution formulation'', ''Improvisational organization'', ''Client communication and boundary setting'', ''Basic interior
    staging and decor'', ''Hand-crafting reusable textile items'', ''Knowledge of Appalachian plant aromatics'']'
  hobbies: '[''Landscape photography'', ''Watercolor sketching'', ''Reading speculative fiction and art theory'', ''Knit and crochet'', ''Collecting vintage Appalachian postcards'', ''Nature journaling'',
    ''Creative short-story writing'']'
  career_goals: Amber hopes to transition from employee to independent contractor, launching a boutique cleaning service that specializes in sustainable, artistically-enhanced cabin upkeep for the growing
    tourism market in Swain County. She aims to partner with local artists to offer occasional "art-refresh" packages that combine deep cleaning with subtle decorative updates. In parallel, she wants to
    complete a series of evening classes in watercolor and creative writing at the nearby community college, eventually publishing a collection of nature-inspired sketches and short stories reflecting life
    in the mountains.
