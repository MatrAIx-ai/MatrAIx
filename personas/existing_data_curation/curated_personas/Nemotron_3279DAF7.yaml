personas:
  professional: Cody Rogers, a 73‑year‑old retired manufacturing foreman turned community mentor, blends decades of hands‑on mechanical know‑how with a collaborative spirit to run DIY home‑repair workshops
    at the senior center, where they patiently guide peers through plumbing fixes and carpentry projects while embracing both tried‑and‑true methods and newer, internet‑sourced ideas.
  sports: Cody Rogers follows the Detroit Tigers, the Lions, and the Red Wings with devoted fanfare, they play weekly pickleball at the senior center, join the Midland Senior Walking Group for sunrise walks
    on the Lakeshore Trail, and attend local high‑school football games each fall, treating sports as a social ritual that keeps them active and connected.
  arts: Cody Rogers immerses themselves in the arts through evenings listening to Bob Dylan and Willie Nelson on vinyl, afternoons reading historical novels by Ken Follett and Bernard Cornwell, and weekends
    crafting wooden birdhouses inspired by master woodworker Sam Maloof, all of which shape his nostalgic yet curious creative outlook.
  travel: Cody Rogers plans trips with the same careful detail he applies to his garden, they embark on yearly road trips to Mackinac Island and Sleeping Bear Dunes, cherish weekend getaways to Charlevoix,
    and have recently ticked off Lake Bled in Slovenia and Edinburgh, Scotland from their bucket list, balancing relaxed scenic drives with occasional overseas adventure.
  culinary: Cody Rogers channels his love of gardening into the kitchen, they grill smoked brisket seasoned with a homemade hickory rub, toss heirloom tomatoes and fresh basil into a summer salsa, simmer
    sweet corn chowder with butter and thyme, and finish meals with a slice of locally sourced apple pie, showcasing a palate rooted in Midwestern comfort and fresh, home‑grown flavors.
  core: Cody Rogers, a 73‑year‑old bridge‑playing, classic‑car‑obsessed community mentor, never says no to a second helping of barbecue ribs, often forgets to take their evening blood‑pressure pill until
    night, and can spend hours polishing a vintage Chevrolet while still finding time to plant a new row of tomatoes, all while they radiate a warm, collaborative spirit.
background:
  cultural: Cody’s cultural background reflects the Midwestern values of his upbringing in Midland, Michigan. He descends from a mix of German and English ancestry, a common heritage in the region, and
    grew up with a strong sense of community, self‑reliance, and modesty. His family’s traditions emphasize family gatherings, church involvement (he is an active member of the local Methodist congregation),
    and respect for hard work, especially in the local manufacturing and agricultural sectors that have shaped the area’s identity. These cultural influences are evident in his collaborative spirit, practical
    problem‑solving, and dedication to preserving local history and community ties.
attributes:
  skills: '["home maintenance and minor repairs (plumbing, electrical, carpentry)", "automotive mechanics and classic car care", "event planning and community coordination", "basic computer literacy (email,
    video calls, online research)", "mentoring and interpersonal communication", "gardening and small‑scale horticulture"]'
  hobbies: '["fishing on Lake Huron", "vegetable gardening", "bridge and poker nights at the senior center", "classic car restoration and club events", "volunteering as a historical society docent", "reading
    historical fiction", "woodworking (birdhouses, small furniture)", "barbecue cooking and recipe experimentation"]'
  career_goals: Although retired, Cody aims to deepen his impact on the Midland community by expanding his volunteer work at the local senior center, eventually leading a weekly workshop series on DIY home
    repairs and gardening for fellow seniors. He hopes to complete a personal project of restoring a classic 1950s Chevrolet to show at the town’s annual vintage car exhibit. Cody also aspires to document
    his family’s genealogy and Midwestern roots in a memoir that he can share with his grandchildren, preserving local history for future generations. Maintaining good health and staying active are also
    central goals, and he plans to walk the nearby Lakeshore Trail regularly and join a walking group.
