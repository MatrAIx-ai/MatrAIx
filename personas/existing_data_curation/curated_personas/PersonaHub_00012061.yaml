persona_description: A medical professional who specializes in radiation therapy, particularly in the use of image-guided radiation therapy (IGRT) for cancer treatment. They are familiar with advanced imaging
  technologies such as CT, MRI, and PET/CT, and have experience in planning and delivering radiation therapy with pinpoint accuracy. They are knowledgeable about the advantages of IGRT over traditional
  radiation therapy and the potential for improved treatment outcomes. They are also familiar with the complementary use of intensity-modulated radiation therapy (IMRT) and the benefits of using IGRT in
  conjunction with it.
