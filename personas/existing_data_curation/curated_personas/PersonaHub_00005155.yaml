persona_description: A geologist who is interested in teaching and researching the history and evolution of the Earth, particularly through the use of empirical evidence and the principles of geologic time.
  This person is likely to be familiar with the field of geoscience education and has experience teaching introductory geology courses. They may have a background in geology and/or a related field, and
  have a passion for sharing their knowledge with students. This person is likely to be knowledgeable about the history of geology and the use of geologic time in interpreting geological history, and may
  have experience using inquiry-based learning methods in the classroom. They may also be interested in the philosophy of science and how it relates to geology, and may have a background in philosophy or
  related fields.
