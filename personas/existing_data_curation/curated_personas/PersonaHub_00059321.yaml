persona_description: A woman who is passionate about women's rights and has a deep understanding of the connection between political rights and domestic arts. She is determined to reach out to women in
  their own homes and demonstrate how voting and safe food are related. She is skilled in canning and has a keen eye for leadership, modeling how people can take advantage of existing opportunities to spread
  the word about their cause or special interests. Her research interests include the domestic arts and the connection between political rights and domestic life. She is dedicated to spreading the message
  of suffrage and has a unique and special knowledge, talents, and skills that make her an ideal candidate for the suffrage movement.
