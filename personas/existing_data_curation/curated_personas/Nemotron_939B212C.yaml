  career_goals: Regina aims to transition into a nursing leadership role within the next three years, targeting a Nurse Manager or Clinical Educator position at her hospital. She plans to complete her Master
    of Science in Nursing (MSN) with a focus on healthcare administration and to obtain the Certified Nurse Manager (CNM) credential. Long-term, she hopes to spearhead a hospital-wide quality improvement
    initiative that reduces readmission rates for chronic disease patients, and to mentor the next generation of nurses through a structured preceptorship program.
