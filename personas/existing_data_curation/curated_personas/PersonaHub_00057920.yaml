persona_description: A retired high school math teacher and tutor who specializes in brain-based learning/teaching, particularly in the areas of mathematics and psychology. Her goals include helping parents
  and the general public understand and improve their child's study habits and performance in mathematics. She is interested in teaching students how to use meaningful, thoughtful lessons and activities
  that peak student interest and promote higher-level learning. Her interests include helping parents with their children's math, eliminating the Algebra failure rate, and informing the public about problematic
  issues related to the field of education. Her expertise includes teaching math, especially in the areas of number sense, problem-solving, and critical thinking.
