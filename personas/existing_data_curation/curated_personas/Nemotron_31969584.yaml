  career_goals: Billy dreams of turning his years of hands‑on experience into ownership of a small, upscale dry‑cleaning boutique that specializes in sustainable, artist‑inspired services. In the short
    term, he seeks a supervisory position at his current shop to formalize his informal leadership and gain budgeting experience. He plans to enroll in a community‑college certificate program in small‑business
    management to strengthen his confidence in running a business despite his limited formal schooling. Eventually, he hopes to secure a modest SBA loan to retrofit a storefront with energy‑efficient machines
    and a gallery‑style waiting area where local artists can display their work. He also aims to become the go‑to expert for delicate, high‑value garments, leveraging his curiosity for textiles and aesthetics,
    while achieving a steadier income that eases his financial worries and allows more time for volunteering at community art events.
