personas:
  professional: Amal Johnson, a senior learning‑and‑development strategist with three decades of instructional design expertise, leverages the ADDIE and SAM models to build data‑driven, competency‑based
    curricula for corporate and nonprofit clients, and channels their competitive drive and methodical planning into championing inclusive talent pathways while mentoring emerging L&D professionals.
  sports: Amal Johnson stays active by attending sunrise bird‑watching walks with the Broward County Senior Walking Club, cheering for the Miami Dolphins in the fall and the Miami Heat during winter, and
    playing in a local senior softball league, where their competitive spirit drives them to practice regularly despite occasional knee soreness.
  arts: Amal Johnson leads a community book club that delves into historical non‑fiction while also frequenting the Broward Center for the Performing Arts to watch productions of Shakespeare and jazz concerts
    featuring Wynton Marsalis, and they unwind by listening to the piano works of Ludovico Einaudi, which inspire their love for storytelling through music.
  travel: Amal Johnson prefers meticulously planned road trips to U.S. historic sites—having explored Boston’s Freedom Trail, Philadelphia’s Independence Hall, and the battlefields of Gettysburg—while dreaming
    of a guided pilgrimage to Monticello and the Alamo, balancing a love for structured itineraries with spontaneous detours to local museums.
  culinary: Amal Johnson, a confident home chef, delights in preparing Mediterranean staples like Greek moussaka with eggplant, Italian risotto scented with saffron and arborio rice, and fresh hummus drizzled
    with olive oil and lemon, often harvesting heirloom tomatoes, basil, and rosemary from their Floridian garden to infuse each dish with garden‑fresh flavor.
  core: Amal Johnson blends a methodical, data‑driven mindset with a sociable, competitive energy, balancing a love for structured learning, community gardening, and occasional forgetfulness about medication
    refills.
background:
  cultural: Amal comes from a middle-class, white American family that settled in the Southeast during the post-World II era. Raised in Florida, she was immersed in a blend of Southern hospitality, outdoor
    recreation, and a strong emphasis on education and self-improvement. Her cultural upbringing values punctuality, reliability, and community involvement, which aligns with her structured, organized personality.
    While she respects the diverse multicultural fabric of Fort Lauderdale, she maintains traditions such as holiday gatherings with extended family, seasonal gardening, and participation in local volunteer
    initiatives.
attributes:
  skills: '[''Instructional Design'', ''Adult Learning Theory'', ''Facilitation & Workshop Delivery'', ''Curriculum Development'', ''E‑learning Development (Articulate Storyline)'', ''Project Management'',
    ''Performance Metrics & Evaluation'', ''Data Analysis (Excel, SQL)'', ''Change Management'', ''Leadership Coaching'']'
  hobbies: '[''Gardening'', ''Florida Birdwatching'', ''Community Book Club'', ''Yoga'', ''Volunteer Tutoring'', ''Traveling to Historical Sites'', ''Line Dancing'', ''Cooking Mediterranean Cuisine'']'
  career_goals: Amal aims to advance into a senior leadership role such as Director of Learning & Development within the next five years, where she can shape organization-wide talent development strategies.
    She is focused on expanding the use of data-informed learning solutions, mentoring emerging training professionals, and championing inclusive, competency-based learning pathways for diverse employee
    populations. Additionally, she hopes to author a guidebook on integrating STEM concepts into adult education and to lead community outreach programs that improve workforce readiness in Broward County.
