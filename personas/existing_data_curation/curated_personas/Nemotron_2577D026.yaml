  hobbies: '["Book club", "Docent at Greensboro Science Center", "Gardening (roses & heirloom tomatoes)", "Yoga & mindfulness", "Cooking Southern cuisine", "Hiking (Pilot Mountain State Park)", "Quilting",
    "Community theater attendance", "Hosting dinner parties", "Volunteer charity runs"]'
  career_goals: Kinzie aims to advance to a regional sales manager role within the next three years, overseeing multiple market territories and shaping broader sales strategy. She plans to earn the Certified
    Sales Leader (CSL) credential to formalize her expertise. In parallel, she wants to design a mentorship program for junior sales staff that combines practical skill‑building with personal‑development
    workshops focused on stress management. Kinzie also seeks to champion inclusive hiring practices in her company and to lead the rollout of a new sales enablement platform that streamlines team workflows.
    Long‑term, she envisions moving into a corporate training or sales‑strategy consultancy position, allowing her to leverage both her leadership experience and her humanities background while maintaining
    a balanced, healthy lifestyle.
