personas:
  professional: Kinzie Brigmond leverages her humanities‑rooted critical thinking and methodical sales expertise to lead non‑retail teams, designing data‑driven strategies in Salesforce while fostering
    a supportive, structured environment that balances assertive performance goals with compassionate mentorship.
  sports: Kinzie Brigmond hits the trails of Pilot Mountain State Park every Saturday with her local hiking club, roots for the Charlotte Hornets during the NBA season, and participates in a weekly beginner’s
    tennis league at the Greensboro community center.
  arts: Kinzie Brigmond immerses herself in contemporary fiction by Sally Rooney, classic works of James Baldwin, attends community‑theater productions of Tennessee Williams, and quilts inspired by the
    geometric patterns of folk artist Faith Ringgold, all while discussing the latest exhibit at the Greensboro Science Center.
  travel: Kinzie Brigmond plans meticulously for her weekend getaways, favoring structured itineraries to Asheville’s Blue Ridge Parkway and the historic charm of Charleston, while dreaming of a leisurely
    road trip along the Gulf Coast to savor coastal cuisine, balancing travel budget constraints with her love for curated experiences.
  culinary: Kinzie Brigmond delights in cooking Southern comfort dishes like shrimp and grits, bourbon‑glazed pork chops, and collard greens seasoned with smoked ham hocks, often using heirloom tomatoes
    and fresh rosemary from her garden, and hosts monthly dinner parties where guests share stories over sweet tea.
  core: Kinzie Brigmond blends meticulous organization with a sociable, anxiety‑prone spirit, turning structured sales leadership, garden‑to‑table cooking, and community‑theater enthusiasm into a life marked
    by purposeful routines and occasional over‑planning quirks.
background:
  cultural: Kinzie grew up in a middle‑class family in the Piedmont region of North Carolina, where Southern hospitality, community involvement, and a strong work ethic are deeply valued. Her white, American
    heritage combines with a liberal‑arts education that fostered an appreciation for literature, history, and critical inquiry. She maintains ties to local traditions such as the North Carolina State Fair,
    college basketball fandom, and church gatherings, while also embracing progressive values like gender equality and lifelong learning. The blend of regional customs—comfort food, church potlucks, and
    a love for outdoor recreation—alongside her academic background shapes a cultural outlook that balances respect for tradition with openness to new ideas.
attributes:
  skills: '["Team leadership", "Sales operations", "CRM (Salesforce) proficiency", "Data analysis & reporting", "Performance coaching", "Conflict resolution", "Effective written and verbal communication",
