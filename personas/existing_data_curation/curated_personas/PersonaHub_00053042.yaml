persona_description: A tenured professor at the UCLA Department of Information Studies who has retired but continues to teach classes and advise students. She is an active library consultant and trainer
  who has been invited to speak at many domestic and international venues. She has authored many journal articles, nine monographs, and two books for young people. She has an MLS from UC Berkeley and a
  PhD in public administration from the University of Southern California. She is a past president of the Association for Library Service to Children. Her expertise lies in fostering greater civic literacy
  and civic engagement in young patrons through a research-based approach that incorporates case studies and interviews with young people and librarians. She is passionate about empowering today's children
  and teens to become active participants in their communities.
