personas:
  professional: Luis Perez, a bilingual psychotherapist and evidence‑based researcher with three decades of clinical experience, they blend rigorous CBT, motivational interviewing, and trauma‑informed crisis
    work with a pragmatic, data‑driven mindset, while their competitive streak drives constant professional development and their relaxed, flexible approach often leads them to adopt emerging digital health
    tools when they demonstrably improve outcomes for Spanish‑speaking families.
  sports: Luis Perez, a weekend hiker who frequently explores the trail network of the Missouri Botanical Garden, they follow the Kansas City Royals baseball and the Kansas City Chiefs football teams, and
    they participate in a local senior walking club that meets twice weekly, balancing their love of low‑impact cardio with a competitive spirit that pushes them to log personal mileage records.
  arts: Luis Perez, an amateur acoustic‑guitarist who often leads impromptu sing‑alongs at family gatherings, they enjoy the folk‑rock sounds of Bob Dylan, the soulful guitar work of Eric Clapton, and the
    melodic Latin‑influenced tunes of José González, they regularly attend performances at the Kauffman Center for the Performing Arts and keep a collection of vintage vinyl records that reflect their eclectic
    taste.
  travel: Luis Perez, who values both discovery and relaxation, they often plan month‑long vacations to historic cities such as Granada, Spain and Cusco, Peru, or to nature retreats like the Colorado Rockies,
    preferring mid‑range lodging and guided walking tours, and they balance their travel budget with contributions to their retirement fund, occasional family obligations limiting the length of their trips.
  culinary: Luis Perez, a proficient home cook who specializes in creating tamales with pork, corn masa, and ancho chiles, and slow‑cooked mole featuring chocolate, sesame seeds, and dried chilies, they
    enjoy experimenting with the balance of smoky, sweet, and spicy flavors, frequently source fresh cilantro, epazote, and roasted tomatillos from their garden, and they alternate between casual family
    meals and occasional visits to upscale restaurants that reinterpret these classic dishes.
  core: Luis Perez, a data‑driven therapist who balances scientific rigor with a love for gardening, guitar, and spontaneous cooking experiments, they navigate life with a competitive edge, flexible planning,
    and a skeptical yet compassionate outlook.
background:
  cultural: Luis is a first‑generation Mexican‑American whose parents immigrated to the United States in the 1970s. He grew up bilingual, navigating both Mexican family traditions—such as Día de los Muertos
    celebrations and a strong emphasis on familial solidarity—and Midwestern American values of independence and practicality. His Catholic upbringing informs a compassionate, service‑oriented worldview,
    while his professional practice reflects an integration of Mexican folk healing concepts with Western psychotherapy. Luis remains actively involved in the local Mexican community, participates in cultural
    events, and frequently travels to Mexico to maintain close ties with extended family, allowing him to bring authentic cultural insight to his clinical work.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Motivational Interviewing'', ''Psychometric Testing (MMPI‑2, BDI)'', ''Bilingual Spanish‑English Counseling'', ''Telepsychology and Digital Health Integration'',
    ''Crisis Intervention and Trauma‑Informed Care'', ''Research Design and Statistical Analysis (SPSS, R)'', ''Community Mental‑Health Program Development'', ''Clinical Supervision and Mentorship'', ''Evidence‑Based
    Practice Integration'']'
  hobbies: '[''Gardening'', ''Mexican cooking'', ''Acoustic guitar playing'', ''Hiking'', ''Reading historical non‑fiction'', ''Reading psychology literature'', ''Volunteer work at community garden'', ''Attending
    Mexican cultural festivals'', ''Woodworking'', ''Exploring telehealth technology for personal use'']'
  career_goals: Luis aims to become the director of a community mental‑health hub serving Mexican‑American families in the Kansas City area, where he can implement culturally adapted, bilingual therapeutic
    programs and expand telehealth services to underserved neighborhoods. He plans to publish a series of papers on the efficacy of bilingual CBT for depression and anxiety, secure grant funding for community
    outreach, and take on a leadership role within the Missouri Psychological Association. Mentoring the next generation of clinicians and establishing a regional training institute for culturally competent
    counseling are also central to his long‑term vision.
