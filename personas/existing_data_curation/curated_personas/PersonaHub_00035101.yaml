persona_description: A professional who is looking for a high-quality and durable fiber optic cable for industrial applications, especially in harsh environmental conditions. This individual is interested
  in the rugged and double-sheathed versions of breakout cables that can withstand high tensile and compressive loads, be non-metallic, rodent-proof, halogen-free, and flame-retardant. They are also looking
  for breakout cables that can be assembled with any FO connector and have a small diameter and bending radius compared to loose tubes. They are particularly interested in breakout cables with a UV-resistant
  cable jacket and are willing to pay a premium for the additional features and durability offered by the rugged versions.
