  hobbies: '[''Photography (industrial and rural scenes)'',''Visiting art galleries and craft fairs'',''DIY electronics tinkering'',''Listening to technology and sustainability podcasts'',''Hiking in local
    forests'',''Playing building‑simulation video games'',''Model building (scale houses)'',''Country line dancing'',''Listening to jazz and indie folk music'']'
  career_goals: Michael aims to earn his EPA Section 608 certification and complete a formal apprenticeship program within the next year, followed by journeyman licensure. He plans to deepen his expertise
    in sustainable HVAC solutions, such as solar‑assisted heating and low‑GWP refrigerants, and hopes to obtain certifications in green building practices. Over the next five years, his ambition is to launch
    a small, locally‑owned HVAC business that emphasizes energy‑saving installations for rural homes. Alongside his technical goals, Michael wants to achieve a GED, improve his written communication, and
    secure a stable income that will allow him to purchase a home and reduce the financial stress that often worries him.
