persona_description: A professor of child development who has conducted research on bullying and gender identity, and has found that homophobia and bullying are linked. She has presented her findings at
  Boston University School of Education and has a PhD in counseling psychology. She has published research on the effects of bullying and sexual harassment on young people and has been involved in developing
  bullying prevention programs.
