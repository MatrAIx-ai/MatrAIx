  career_goals: William aims to pursue a career in civil engineering, motivated by a desire to design safe, sustainable infrastructure that benefits his community. He plans to attend a STEM‑focused high
    school, earn a degree in structural engineering, and ultimately obtain a professional engineering license. Additionally, he is interested in developing software tools that support community project
    coordination, and hopes to combine his technical skills with his collaborative nature to lead organized, impact‑driven initiatives.
