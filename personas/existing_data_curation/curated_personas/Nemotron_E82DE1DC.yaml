personas:
  professional: Bobbi Porter, a 16‑year‑old aspiring trades enthusiast, channels their hands‑on automotive and carpentry skill set into volunteer community projects, leveraging keen organization and an
    assertive yet cooperative demeanor to coordinate repair workshops, reflecting their preference for structure and teamwork.
  sports: Bobbi Porter competes in the Spokane Youth Basketball League, hikes the Selkirk Mountains each summer, fishes the Spokane River in the spring, and proudly supports the Seattle Seahawks and Seattle
    Kraken, embodying a balanced fitness regimen that blends structured team practice with spontaneous outdoor pursuits.
  arts: Bobbi Porter builds detailed model airplanes, strums acoustic renditions of Foo Fighters and Green Day songs during informal jam sessions, and attends community theater productions featuring works
    by Lin‑Manuel Miranda, weaving collaborative creativity into their hands‑on hobbies.
  travel: Bobbi Porter enjoys planning weekend camping trips to Selkirk trailheads and short road trips to Coeur d’Alene, while dreaming of a future backpacking adventure through the Canadian Rockies and
    a summer excursion with friends to Yellowstone, balancing a limited teenage budget with a love for rugged, nature‑focused travel.
  culinary: Bobbi Porter favors protein‑rich meals such as grilled chicken with quinoa and avocado, enjoys hearty homemade chili spiced with cumin and peppers, and indulges in classic teenage staples like
    pepperoni pizza and loaded nachos, often cooking on a portable camp stove during hikes and appreciating the smoky notes of cedar‑plank salmon seasoned with dill and lemon.
  core: Bobbi Porter is a socially driven, structure‑loving teen who balances basketball, gaming, and budding trades aspirations while occasionally overspending on the latest gaming gear.
background:
  cultural: Bobbi grew up in a predominantly white, working‑class community in Chattaroy, Washington, where farming, timber, and small‑scale industry shape daily life. His family values emphasize self‑reliance,
    community involvement, and respect for tradition, while also encouraging participation in modern activities like video gaming and social media. The close‑knit nature of the town, with its local fairs,
    volunteer fire department, and high school sports culture, reinforces a sense of belonging and collective responsibility. These regional influences blend with broader American cultural norms, giving
    Bobbi a grounded, pragmatic outlook balanced by an openness to new experiences within his peer group.
attributes:
