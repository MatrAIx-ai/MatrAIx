  career_goals: Bobbi aims to earn his GED within the next two years and enroll in a vocational program at Spokane Community College, focusing on electrical or mechanical engineering technology. He hopes
    to secure an apprenticeship with a local trade union, eventually becoming a licensed electrician or diesel mechanic. In the longer term, he envisions starting his own small repair shop serving the Chattaroy
    and Spokane County communities, leveraging his practical skills and reputation for reliability. He also considers joining the U.S. Army’s engineering corps as a backup path that offers structured training
    and clear career progression.
