  hobbies: '[''Gardening'', ''Hiking the Marin County trails'', ''Reading non-fiction and science literature'', ''Birdwatching'', ''Participating in a small book club'', ''Pottery'', ''Cooking seasonal
    meals'', ''Volunteer work with local community garden'']'
  career_goals: Amber aims to transition into a senior leadership role where she can shape community‑based programs for seniors and vulnerable populations in Marin County. She is driven to integrate data‑driven
    decision making with compassionate service delivery, creating flexible, responsive initiatives that adapt to client needs. Over the next five years, she hopes to secure funding for a pilot program that
    uses real‑time outcome tracking to refine interventions, mentor emerging social workers, and publish research on the impact of evidence‑based practices in community settings. Ultimately, she envisions
    a consultancy role that helps nonprofit agencies adopt agile, evidence‑focused approaches while maintaining the personal, empathetic touch she values.
