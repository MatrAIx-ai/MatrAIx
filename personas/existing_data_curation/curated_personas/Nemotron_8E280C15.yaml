  hobbies: '[''Community event participation'', ''Reading African-American literature and history'', ''Book clubs'', ''Gardening'', ''Playing chess and bridge'', ''Listening to blues and gospel music'',
    ''Cooking Southern cuisine'', ''Nature walks'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: Michael aims to re‑enter the workforce in a role that leverages his community‑building expertise, such as a program coordinator for a local non‑profit or a community liaison for a municipal
    agency. He is interested in obtaining certification in social work or community health to formalize his counseling skills. He hopes to lead initiatives that address social inequality and support underserved
    populations in Bradley County. Over the next few years, he aspires to secure a stable, part‑time position that provides both income and meaningful social interaction, while gradually building a modest
    consulting practice offering event planning and grant‑writing services for grassroots organizations.
