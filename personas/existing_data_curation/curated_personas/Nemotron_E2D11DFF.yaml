personas:
  professional: A veteran community arts organizer and grant writer, Chassity Stembridge leverages their curiosity, meticulous planning, and a healthy dose of competitive spirit to design vibrant senior
    workshops, secure funding through detailed proposals, and advocate passionately for older adults at town meetings.
  sports: An avid nature‑trail walker and seasonal pickleball enthusiast, Chassity Stembridge enjoys sunrise strolls along the St. Johns River, joins the DeLand Senior Walking Club for low‑impact cardio,
    and follows the Orlando Magic basketball team and the Tampa Bay Buccaneers football team with spirited game‑day gatherings at the local senior center.
  arts: A passionate lifelong creator, Chassity Stembridge immerses themselves in watercolor studies of Floridian sunsets, spins clay on a pottery wheel, draws inspiration from Georgia O’Keeffe and Jackson Pollock,
    and regularly attends performances by the DeLand Historic Playhouse and jazz nights featuring the sounds of Duke Ellington and classic rock from The Rolling Stones.
  travel: A methodical planner with a taste for coastal retreats, Chassity Stembridge favors day trips to the nearby beaches of New Smyrna and historic tours of St. Augustine, while day‑dreaming about a
    future pilgrimage to Charleston’s historic district and a springtime visit to the cherry blossoms in Kyoto, always booking senior‑friendly accommodations and travel insurance well in advance.
  culinary: A seasoned home cook with a flair for Southern comfort, Chassity Stembridge delights in simmering shrimp‑and‑grits, slow‑roasting fried chicken with buttery mashed potatoes, and baking peach
    cobbler using heirloom peaches from their garden, often seasoning dishes with fresh rosemary, thyme, and a dash of cayenne for a subtle kick.
  core: Chassity Stembridge blends a fierce competitive drive with warm Southern hospitality, turning every community art project into a lively, meticulously organized celebration while never missing a
    chance to indulge in a slice of peach cobbler.
background:
  cultural: Chassity grew up as a white American in the post‑war South, where community gatherings, church involvement, and Southern hospitality shaped her early worldview. A lifelong Protestant, she values
    traditions of service and fellowship, which later guided her volunteer work. Relocating to DeLand, Florida, for retirement immersed her in a blend of historical charm and a vibrant senior community.
    The cultural mix of Florida's coastal lifestyle, the region's emphasis on arts and preservation, and her own openness to new ideas have fostered a hybrid identity that honors her roots while enthusiastically
    embracing contemporary artistic and social experiences.
