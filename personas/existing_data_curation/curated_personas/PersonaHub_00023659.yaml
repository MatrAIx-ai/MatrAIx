persona_description: John B. Morris is a professor of pharmacy & toxicology and assistant dean for research in the School of Pharmacy. He is a top-notch researcher with a light-hearted and amicable nature,
  making him a favorite among students who take his classes. Morris teaches an undergraduate course called Toxic Chemicals and Health at the School of Pharmacy, on a rotation with two other professors.
  The course, which satisfies a general education science requirement for non-science majors, introduces students to basic concepts in toxicology, such as how different chemicals and drugs can have harmful
  effects on the human body. Morris also introduces real life examples to make the material covered in his lectures more meaningful and stress key points of toxicology. Morris has a bachelor of science
  degree from Allegheny College in 1973, a master’s degree in toxicology from the University of Rochester in 1977, and a doctorate in 1979. He has also served as chair of the State of Connecticut Hazardous
  Air Pollutant Advisory Pane.
