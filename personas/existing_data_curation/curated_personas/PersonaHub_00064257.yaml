persona_description: A licensed Speech-Language Pathologist specializing in the treatment of children with autism and apraxia. She has extensive experience in the development and implementation of evidence-based
  school programs such as GABA School. She has a deep understanding of the Early Start Denver Model, Pivotal Response Treatment, Discrete Trial Training, PROMPT, Picture Exchange Communication System, Social
  Stories, Hanen More Than Words, ASL, SOS Sequential Oral Sensory Feeding, Sensational Mealtimes, BLADES, and Zones of Regulation. She is passionate about helping children with autism reach their full
  potential through a holistic and personalized approach.
