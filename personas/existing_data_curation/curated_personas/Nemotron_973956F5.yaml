  hobbies: '["Gardening","Quilting","Cooking Southern recipes","Reading romance novels","Reading historical fiction","Walking in local parks","Journaling","Adult coloring","Church choir participation","Community
    volunteering"]'
  career_goals: Morgan aims to secure a supervisory position within her retail environment, leveraging her reliability and competitive drive to become a shift lead and trainer for new cashiers. Simultaneously,
    she aspires to integrate her educational background by pursuing a part‑time role as a teaching aide or adult‑education facilitator at a local community college, allowing her to blend practical routine
    with meaningful mentorship. Stability, predictable schedules, and opportunities to mentor others are central to her long‑term career vision.
