personas:
  professional: Morgan Lee is a seasoned retail associate aspiring shift lead who uses meticulous cash‑handling expertise, calm conflict‑de‑escalation skills, and educator‑trained lesson‑planning acumen
    to create predictable, efficient store routines, and they competitively mentor new cashiers to uphold high standards.
  sports: Morgan Lee enjoys walking in the local park as low‑impact exercise, follows the Alabama Crimson Tide football team and the Atlanta Braves baseball club, participates in a community walking club
    that meets thrice weekly, and they occasionally join a seasonal women’s softball league in the spring.
  arts: Morgan Lee expresses creativity through quilting while listening to classic Southern gospel ensembles like the Gaither Vocal Band and country icons such as Dolly Parton, they also unwind with romance
    novels by Nora Roberts and historical fiction by Philippa Gregory, and they occasionally attend community theater productions starring local talent.
  travel: Morgan Lee prefers meticulously planned road trips to historic Southern towns like Savannah and Charleston, cherishes a yearly family vacation to the Great Smoky Mountains, they dream of a quiet
    pilgrimage to the English countryside to trace colonial roots, and they budget travel carefully to maintain financial stability.
  culinary: Morgan Lee delights in cooking classic Southern fare such as fried chicken, collard greens seasoned with smoked turkey, and peach cobbler topped with buttery biscuits, they relish using buttermilk,
    hot sauce, and sweet potatoes in their recipes, and they balance these hearty meals with occasional experimental dishes like shrimp étouffée.
  core: Morgan Lee blends steadfast routine with a competitive mentorship drive, navigating anxiety through quilting, journaling, and community faith, while they occasionally splurge on fabric and neglect
    dental care.
background:
  cultural: Raised in the heart of Alabama, Morgan embodies a traditional Southern white culture marked by strong family ties, Baptist faith, and community hospitality. She values practicality, modesty,
    and a sense of duty to her family and neighbors. Her upbringing emphasized routine, respect for established customs, and a pragmatic approach to problem‑solving, all of which continue to shape her worldview
    and daily habits.
