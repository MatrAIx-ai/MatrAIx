persona_description: A teacher who is dedicated to creating a positive and supportive learning environment for children, particularly in the context of language and communication. They are skilled at establishing
  a safe communication zone with their students and are aware of the importance of using language as a means for safe communication. They understand the impact of language on children's experiences and
  are committed to promoting positive interactions and language use in their classroom. They are aware of the challenges of creating a positive language environment and are looking for ways to counteract
  the negative impact of language on children's experiences.
