  career_goals: Although retired, Gustavo aims to deepen his involvement in the local arts scene, mentoring younger artists and documenting family histories. He hopes to publish a small memoir of his life
    bridging Mexican heritage and Texan life, and to develop a community garden that serves both as a teaching space and a source of fresh herbs for neighborhood kitchens. Maintaining mental and physical
    health, he also seeks to learn digital photography to capture moments that inspire his curiosity while managing his tendency toward worry by setting achievable, rewarding milestones.
