personas:
  professional: Vivian Soullier, a meticulous food‑preparation specialist who leverages rigorous food‑safety expertise and an artist’s eye for plating to streamline kitchen workflow while mentoring staff
    toward her goal of sous‑chef promotion within two years.
  sports: Vivian Soullier, an avid hiker who belongs to the Oklahoma Trailblazers Club, follows the Oklahoma City Thunder and Dallas Cowboys avidly, squeezes in weekend yoga at Sunrise Studio for flexibility,
    and joins a casual softball league each spring to balance her love of community activity with fitness.
  arts: Vivian Soullier, a watercolor enthusiast who regularly attends gallery openings featuring works by contemporary artist 'Kehinde Wiley', draws inspiration from the surreal paintings of 'Yayoi Kusama',
    and unwinds after community‑theater rehearsals listening to the jazzy crooning of 'Norah Jones'.
  travel: Vivian Soullier, a weekend road‑trip planner who alternates spontaneous drives through the Texas Hill Country with meticulously booked culinary tours to Kyoto and Oaxaca, dreams of hiking the
    Great Smoky Mountains and eventually opening a pop‑up kitchen in New Orleans' French Quarter.
  culinary: Vivian Soullier, an inventive home chef who blends Oklahoma BBQ smoke rings with Korean gochujang and Mediterranean herbs to create signature dishes like smoked brisket tacos with kimchi slaw,
    and who expertly wields ingredients such as smoked paprika, chipotle honey, and fresh watermelon jalapeño relish.
  core: Vivian Soullier, a fiercely organized culinary artist who fuses Midwestern comfort food with gallery‑inspired plating, channels boundless curiosity into community service, and never misses a yoga
    class despite an occasional penchant for late‑night art‑supply shopping.
background:
  cultural: Vivian grew up in a small‑town environment in Yale, Oklahoma, within a family of German and English ancestry that valued Midwestern hospitality and Southern cooking traditions. The close‑knit
    community emphasized teamwork, church involvement, and support for local agriculture, shaping her appreciation for hearty, farm‑fresh foods. Her upbringing blended the conservative work ethic of the
    Great Plains with exposure to regional music, folk art, and community gatherings, fostering a deep respect for cultural heritage while encouraging openness to new ideas and artistic expression.
attributes:
  skills: '[''Food safety compliance'', ''Culinary recipe development'', ''Menu planning and costing'', ''Kitchen inventory control'', ''Time and workflow optimization'', ''Team leadership and training'',
    ''Interpersonal communication'', ''Event catering coordination'', ''Creative plating and food presentation'', ''Adaptation of diverse cuisines'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Community theater acting'', ''Volunteer cooking for local shelters'', ''Experimenting with fusion recipes'', ''Hiking in Oklahoma state
    parks'', ''Yoga and meditation'', ''Reading culinary literature and art history'']'
  career_goals: Vivian aims to advance from her current food preparation role to a sous chef position within the next two years, pursuing a Certified Culinary Professional credential to solidify her expertise.
    Long‑term, she envisions opening a community‑focused restaurant or café that melds Midwestern comfort food with artistic presentation, offering cooking workshops that emphasize both technique and creativity.
    She also aspires to partner with local nonprofits to run nutrition education programs and to mentor aspiring cooks from underserved backgrounds.
