personas:
  professional: Thomas Rutherford is a seasoned community art curator and grant writer, and they apply meticulous archival expertise and disciplined project management to transform historic locales into
    immersive exhibitions while their reserved yet collaborative spirit fosters deep relationships with local artisans.
  sports: Thomas Rutherford follows the Arkansas Razorbacks football team and the St. Louis Cardinals baseball club, and they participate in a local weekend walking club that explores the Ozark trails,
    as well as join a casual senior tennis league each summer, balancing a love for low‑impact endurance with occasional competitive spirit.
  arts: Thomas Rutherford immerses themselves in visual and performing arts, and they sketch at historic house museums, photograph the intricate façades of Frank Lloyd Wright structures, revere the work
    of Ansel Adams, Edward Hopper, and local folk woodcarver Mary Lee, and attend chamber music recitals featuring the violinist Hilary Hahn.
  travel: Thomas Rutherford prefers thoughtfully planned cultural trips, and they have visited the Louvre in Paris, toured the Renaissance galleries of Florence, and journeyed to Kyoto’s historic temples
    to study wooden architecture, while dreaming of a future retreat in the Scottish Highlands to study Celtic folk craft traditions.
  culinary: Thomas Rutherford enjoys cooking hearty Southern fare such as smoked brisket, collard greens with smoked turkey, and freshly baked cornbread, and they often incorporate wild mushrooms they forage
    on their property, though their skill level remains that of an enthusiastic home chef who relies heavily on family recipes.
  core: Thomas Rutherford blends Southern stewardship with scholarly curiosity, and they turn disciplined organization into community cultural enrichment while quietly battling a back ache that thwarts
    their woodworking marathons.
background:
  cultural: Thomas grew up in the rural outskirts of Pulaski County, Arkansas, within a predominantly white, Southern-midland community. His upbringing was shaped by the region’s strong sense of place,
    appreciation for folk crafts, and a close-knit church environment that emphasized cooperation and respect for others. A liberal arts education at the University of Arkansas broadened his perspective,
    exposing him to diverse artistic traditions and encouraging an unconventional, curiosity-driven outlook. This blend of Southern heritage and academic exposure informs his respect for local cultural
    narratives while fostering an openness to global artistic ideas.
attributes:
