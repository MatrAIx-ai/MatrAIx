  hobbies: '[''Visiting galleries and museums'', ''Sketching'', ''Reading literature and philosophy'', ''Photography'', ''Woodworking'', ''Book club participation'', ''Chamber music listening'', ''Volunteering
    at public library'', ''Gardening'', ''Birdwatching'']'
  career_goals: Thomas aims to establish a modest community art center in Cabot that showcases regional artists and preserves local cultural heritage. He aspires to curate a series of thematic exhibitions,
    secure sustainable funding through grant applications, and produce a scholarly catalog that documents the artistic evolution of Central Arkansas. Additionally, he seeks to mentor emerging artists and
    volunteers, sharing his expertise in research and exhibition design, while maintaining a disciplined schedule that balances these ambitions with personal creative pursuits.
