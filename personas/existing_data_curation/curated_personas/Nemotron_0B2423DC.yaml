  hobbies: '[''Basketball'', ''Freestyle rap and beat‑making'', ''Open‑mic performances'', ''Mental‑health podcast listening'', ''Journaling'', ''Hiking in the Ozarks'', ''Volunteer work at food bank'',
    ''Church youth events'', ''Social media content creation'']'
  career_goals: Andre wants to turn his people‑skills and community spirit into a career. In the short term, he plans to enroll in a community‑college program for peer counseling or social work while working
    part‑time at the local recreation center, where he can lead youth activities and continue to mentor friends. He aims to earn a certification in mental‑health first aid to formalize his ability to help
    others manage anxiety and stress. Long‑term, Andre aspires to become a licensed mental‑health counselor or community outreach coordinator who designs programs for underserved Black youth in rural Missouri.
    He also hopes to combine his passion for music and storytelling by creating spoken‑word workshops that empower young people to express their emotions creatively.
