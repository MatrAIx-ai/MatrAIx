persona_description: A teacher who is passionate about observing and documenting children's play and learning, with a focus on capturing the essence of their experiences through photos, videos, and other
  forms of documentation. They are interested in exploring the process of learning and development, and how it can be captured through their documentation. They are skilled at recognizing the most salient
  aspects of a child's play and using their observations to create stories that can be shared with the classroom community. They are not interested in documenting the final product of a child's work, but
  rather in capturing the journey of learning and discovery.
