personas:
  professional: Andrew Gigi, a 26‑year‑old elementary teacher in Juneau, blends curiosity‑driven interdisciplinary lesson design with a laid‑back, improvisational classroom style, using Google Classroom
    and interactive whiteboards to fuse speculative‑fiction narratives, local indigenous stories, and hands‑on environmental projects while they champion a future as a curriculum specialist.
  sports: Andrew Gigi tackles Alaska’s rugged outdoors with enthusiasm, joining the Alaska Hikers Association for sunrise treks up Mount Roberts and paddling the Inside Passage with the Juneau Kayak Club,
    while they also squeeze in pickup basketball games at the community center and cheer for the Seattle Seahawks each fall.
  arts: Andrew Gigi immerses themselves in the Juneau arts scene by acting in community theater productions of A Midsummer Night’s Dream, crafting set pieces inspired by indigenous carving motifs, and drumming
    in an indie band that draws on the atmospheric sounds of Radiohead and Arctic Monkeys, while they unwind with speculative‑fiction novels by Neal Stephenson and competitive board‑game nights featuring
    Settlers of Catan.
  travel: Andrew Gigi prefers low‑key, nature‑driven travel, planning most trips on a whim with a trusty paper map and their DSLR, having already trekked Glacier Bay and kayaked the Inside Passage, while
    they dream of future adventures to Iceland’s volcanic landscapes and New Zealand’s fjord‑filled South Island.
  culinary: Andrew Gigi enjoys experimenting in their modest kitchen by pan‑searing fresh Alaskan halibut on cedar planks, tossing it with wild blueberry sauce and locally sourced herbs, while they frequently
    indulge in reef‑caught king crab legs at the downtown harbor restaurant and swap recipes for hearty cedar‑smoked salmon chowder with fellow fishermen.
  core: Andrew Gigi is a spontaneously organized teacher‑adventurer who balances drumming in an indie band with sunrise hikes, a love of speculative fiction, and a habit of forgetting to file lesson plans
    until the last minute, yet they always manage to rally classmates for a creative project.
background:
  cultural: Andrew is a white American who grew up in the Pacific Northwest before moving to Juneau for his teaching career. His upbringing emphasized self‑reliance, a love of the outdoors, and an appreciation
    for diverse narratives through his arts‑humanities education. Living in Juneau has immersed him in a community that values environmental stewardship and respects Tlingit cultural traditions. He actively
    participates in local celebrations, learns indigenous stories, and incorporates these perspectives into his classroom to foster cultural awareness. While his familial heritage is European‑American,
    his daily life reflects a blend of contemporary Alaskan values, community collaboration, and an ongoing commitment to honoring the region’s indigenous heritage.
attributes:
  skills: '[''Interdisciplinary Lesson Planning'', ''Arts Integration'', ''Classroom Management'', ''Outdoor Education Facilitation'', ''Digital Learning Tools (Google Classroom, SMART Boards)'', ''Community
    Engagement'', ''Cultural Competency'', ''Collaborative Learning Facilitation'', ''Student Mentorship'', ''Adaptive Curriculum Design'']'
  hobbies: '[''Hiking and kayaking in the Alaskan wilderness'', ''Community theater acting and set design'', ''Playing drums in a local band'', ''Nature photography'', ''Reading speculative fiction'', ''Cooking
    Alaskan seafood dishes'', ''Board game nights with friends'', ''Volunteering at youth mentorship programs'', ''Attending local indigenous cultural festivals'']'
  career_goals: Andrew aims to deepen his impact on elementary education by earning a Master’s in Curriculum and Instruction within the next three years. He envisions becoming a curriculum specialist who
    champions the incorporation of Alaskan environmental and indigenous content across subjects. He hopes to lead professional‑development workshops for fellow teachers, launch an after‑school arts‑and‑nature
    program, and eventually step into a lead teacher or assistant principal role where he can shape school‑wide policies that prioritize experiential learning and community collaboration.
