    documentation and report writing'', ''Creative problem solving and visual communication'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Reading speculative and science-fiction literature'', ''Playing acoustic guitar'', ''Writing short stories'', ''Tabletop role-playing games'',
    ''Hiking and nature photography'', ''Bird-watching'', ''Volunteering at community health clinics'', ''Puzzle solving (crosswords, logic puzzles)'']'
  career_goals: His career ambition is to advance from a technologist role to a senior specialist in molecular pathology, eventually assuming a supervisory or laboratory manager position. He plans to complete
    a bachelor’s degree in medical technology, followed by a Master’s in Clinical Laboratory Science, to deepen his expertise in emerging diagnostic technologies. Peni also hopes to contribute to community
    health by establishing a local outreach program that offers free screening services and health education, combining his technical skills with his compassionate drive to help others.
