  hobbies: '["Reading contemporary fiction", "Hiking Appalachian trails", "Gardening (vegetable garden)", "Baking and recipe experimentation", "Knitting", "Listening to true-crime podcasts", "Photography
    of rural landscapes", "Journaling"]'
  career_goals: While Nancy enjoys the immediacy of waiting tables, she sees her long‑term career moving toward a supervisory and eventually ownership role in the hospitality sector. She plans to complete
    a certification in restaurant management (ServSafe and a hospitality‑management associate degree) within the next two years, then apply for a shift‑supervisor position at a larger restaurant in the
    region. Her ambition is to one day open a modest, quiet coffee‑shop‑bakery that caters to local residents seeking a relaxed space to read or work. She also hopes to blend her love of cooking with business
    skills by offering specialty baked goods sourced from her garden, positioning herself as a community‑focused entrepreneur.
