personas:
  professional: Nancy Dowd, a 24‑year‑old waitress in Wheeling, blends meticulous front‑of‑house service with a curiosity for new recipes, using her practical mindset and calm assertiveness to resolve customer
    issues while preparing for a future as a coffee‑shop‑bakery owner.
  sports: Nancy Dowd enjoys weekend hikes on the Appalachian Trail, occasionally joins a local walking club, and roots for the West Virginia Mountaineers football team while keeping an eye on the Wheeling
    Nailers hockey games for a touch of community spirit.
  arts: Nancy Dowd spends quiet evenings listening to folk legends like Doc Watson and contemporary singer‑songwriter Laura Marling, knitting scarves while absorbing true‑crime podcasts, and developing
    images from her vintage film camera that capture rustic West Virginia landscapes, all of which shape her modest artistic identity.
  travel: Nancy Dowd prefers low‑key road trips to nearby natural retreats such as Shenandoah National Park and occasionally dreams of exploring the historic streets of Asheville or the misty cliffs of
    Scotland, planning each journey with meticulous budgeting and a desire for quiet reflection.
  culinary: Nancy Dowd delights in baking sourdough loaves, rosemary focaccia, and apple‑cinnamon streusel pastries with flour milled from locally sourced wheat, while experimenting with heirloom tomatoes
    and kale from her garden, and she often pairs her creations with a robust cup of single‑origin coffee.
  core: Nancy Dowd is a curious yet pragmatic 24‑year‑old who balances a love for solitary pursuits—like knitting, hiking, and baking—with an ambition to turn her modest hospitality experience into a community‑focused
    coffee shop.
background:
  cultural: Nancy was raised in a working‑class family in Wheeling, a city with deep Appalachian roots. Her family’s heritage includes generations of coal‑mining and manufacturing workers, instilling a
    strong work ethic, self‑reliance, and a respect for community traditions. She grew up attending a local Methodist congregation, which reinforced values of hospitality, modesty, and mutual support. The
    regional culture of West Virginia—characterized by a love of folk music, local festivals, and close‑knit friendships—has shaped her appreciation for quiet, personal spaces while still feeling connected
    to a broader community. Though she identifies as white, Nancy is aware of the cultural mosaic of the area and integrates both traditional Appalachian customs and contemporary, broader cultural influences
    through books, documentaries, and her own explorations.
