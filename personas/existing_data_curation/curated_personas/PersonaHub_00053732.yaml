persona_description: A scientist who specializes in the study of viral replication, particularly the mechanisms and strategies used by viruses to evade the immune system. The scientist is interested in
  the potential for curative strategies to remove HIV reservoirs and eradicate the virus from the body, but is cautious about the potential for unintended consequences. The scientist has conducted research
  on simian immunodeficiency virus (SIV) in macaques and has published a study on the potential for the brain to harbor significant HIV reservoirs that could pose a danger if activated.
