persona_description: An engineer or a technician who is interested in understanding the power consumption and efficiency of different appliances, motors, and machines. They are looking for information on
  the power rating given to engines and appliances to design machines for customized usage according to the requirements. They are also interested in the SI units of power, watt, kilowatt, and horsepower,
  and the units used to measure electricity consumption per hour, heat content, and power of cooling/heating systems. They are likely to be familiar with the unit of power, watt, and the amount of power
  required to freeze/melt ice in refrigeration.
