  hobbies: '["Drawing comic strips", "Watercolor painting", "Minecraft and Roblox gaming", "Lego building (robotics and space sets)", "Reading sci‑fi/fantasy novels", "Basketball with friends", "Baseball
    practice", "Nature walks and birdwatching", "Rubik''s Cube and logic puzzles", "School science club", "Listening to classic rock and country music"]'
  career_goals: Jeremy dreams of becoming an interactive game designer who merges his love for storytelling, art, and technology. He envisions creating educational video games that challenge players with
    puzzles and encourage curiosity, much like the experiences he enjoys. In the longer term, he hopes to attend a specialized STEM high school, then study graphic design or animation at university, eventually
    working for a game studio or as a freelance illustrator. He also entertains the idea of contributing to wildlife documentaries as a visual artist, combining his interest in nature with his artistic
    talents. Competitive achievements, such as winning a school science fair or a gaming tournament, motivate him to set high standards for himself.
