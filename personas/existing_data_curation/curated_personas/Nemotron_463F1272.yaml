personas:
  professional: Jeremy Betros, a ten‑year‑old budding comic‑strip creator, blends their love of watercolor and sandbox video games into intricate storyboard drafts, showing early aptitude for visual narrative
    and basic digital design while maintaining a balance between organized planning and spontaneous imagination.
  sports: Jeremy Betros throws the ball at weekly neighborhood basketball pick‑ups, practices as a left‑handed pitcher for the Bainbridge youth baseball league, and cheers for the Seattle Mariners and Seattle
    Seahawks, while also belonging to the local junior track club for occasional sprint drills.
  arts: Jeremy Betros spends afternoons sketching comic panels inspired by Jim Lee and watercolor studies echoing John Singer Sargent, while listening to classic rock legends like The Rolling Stones and
    country icons such as Johnny Cash, and they eagerly devour the magical worlds of J.K. Rowling and Rick Riordan for narrative inspiration.
  travel: Jeremy Betros prefers family road trips that blend adventure and comfort, having explored the Bloedel Reserve on Bainbridge, the Seattle Museum of Pop Culture, and a weekend camping excursion
    in Olympic National Park, while dreaming of a future visit to Disneyland and a summer stay at a coastal cabin on the Oregon coast.
  culinary: Jeremy Betros has a growing palate for classic kid‑friendly fare—gooey pepperoni pizza, buttery macaroni‑and‑cheese, and warm chocolate‑chip cookies—while also experimenting with simple snack
    art, such as arranging strawberry‑banana fruit kebabs and homemade trail mix featuring pretzels, raisins, and M&Ms.
  core: Jeremy Betros is a ten‑year‑old imaginative storyteller who balances a fierce competitive edge in games and sports with a shy, worry‑prone heart that fuels endless doodles, meticulous allowance
    saving, and a love for both classic rock and fantasy novels.
background:
  cultural: Jeremy is a white Southern youth raised in Bainbridge, Georgia, a close‑knit community where family, church, and local traditions shape daily life. He attends a Baptist church with his family,
    where community gatherings and Sunday services reinforce values of hospitality and mutual support. Seasonal events like the Decatur County Peach Festival and the county fair expose him to regional foods—fried
    chicken, biscuits, peach cobbler—and to local music such as country and bluegrass. He enjoys watching high school football games, a staple of Southern social life, and feels a strong sense of pride
    in his town's agricultural roots. While his immediate environment is traditionally Southern, Jeremy's curiosity and internet access introduce him to a broader cultural tapestry, including global media,
    diverse artistic styles, and modern technology, which he blends with his local upbringing to form a unique personal identity.
attributes:
