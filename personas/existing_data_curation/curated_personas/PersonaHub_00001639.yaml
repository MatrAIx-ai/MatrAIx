persona_description: A biologist or ecologist who is interested in the evolution of pheromone signals in Lepidoptera insects and the mechanisms behind their production and diversity. This person may be
  particularly interested in the use of synthetic sex pheromones as biocontrol agents for moth pests and the role of gene diversity and evolution in the development of these signals. They may also be interested
  in the desaturases used in the pheromone biosynthetic pathway and the implications of their evolution for the evolution of moth species.
