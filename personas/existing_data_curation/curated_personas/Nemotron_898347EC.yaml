  career_goals: Although formally retired, Jessica remains driven to make an impact. She aspires to expand the intergenerational art program she started at the local senior center, securing grant funding
    to provide free workshops for seniors and youth. She hopes to mentor newly retired teachers, sharing her experience in fostering curiosity and methodical lesson planning. Jessica also aims to serve
    on the Lorain County Board of Education, advocating for mental‑health resources for students and seniors. On a personal level, she plans to complete a memoir chronicling her family's Italian heritage
    and to travel to her ancestral hometown in Calabria, deepening her cultural roots.
