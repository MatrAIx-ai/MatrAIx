personas:
  professional: Jessica Carillo, a retired educator turned community arts facilitator, leverages her methodical curriculum design expertise and vivid imagination to organize intergenerational art workshops,
    and they assertively advocate for senior and student mental‑health resources.
  sports: Jessica Carillo enjoys walking the lakefront trails with a local senior walking group, plays bridge competitively at the Lorain County senior center, and they follow the Cleveland Guardians and
    Cleveland Browns zealously, balancing light cardio with occasional yoga classes offered at the community center.
  arts: Jessica Carillo paints serene lake scenes inspired by Claude Monet, experiments with mixed‑media abstracts echoing the bold colors of Frida Kahlo, and they regularly attend performances by the Cleveland
    Orchestra and community theater productions of classic Italian operas, finding that these experiences profoundly shape their creative outlook.
  travel: Jessica Carillo plans trips with meticulous itineraries, favoring a blend of cultural immersion and relaxation, such as revisiting the ancestral village in Calabria, exploring the historic streets
    of Rome, and they take weekend drives to the Amish Country of Ohio, while budgeting carefully due to fixed retirement income.
  culinary: Jessica Carillo delights in cooking traditional spaghetti alle vongole with fresh basil, oregano, and garlic, skillfully blends herb‑infused extra‑virgin olive oil into homemade focaccia, and
    they enjoy sharing these meals at family gatherings, though they sometimes forget to refrigerate leftovers, leading to occasional food waste.
  core: Jessica Carillo is an imaginative, meticulously organized octogenarian who channels boundless curiosity into community art, and they battle chronic worry and a habit of over‑committing to volunteer
    projects.
background:
  cultural: 'Jessica is a third‑generation Italian‑American from Nova, Ohio, a small town in Lorain County on the shores of Lake Erie. Her grandparents emigrated from Calabria in the early 1900s, working
    in the region’s steel mills and establishing a close‑knit family rooted in Catholic traditions. Growing up in mid‑century Midwestern America, she absorbed the values of hard work, community service,
    and modesty, while maintaining vibrant Italian customs: celebrating feast days, cooking famiglia‑style meals, and speaking a few phrases of Italian with relatives. The blend of Midwestern hospitality
    and Italian heritage has shaped her worldview, fostering a strong sense of family loyalty, respect for education, and a love for communal gatherings.'
