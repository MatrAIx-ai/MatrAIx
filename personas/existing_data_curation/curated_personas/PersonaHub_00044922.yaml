persona_description: A scientist and researcher in the field of organic chemistry, particularly in the synthesis of complex organic substances. Sarett's contributions to the field, including the synthesis
  of cortisone and his role in the development of techniques for the chemical synthesis of peptides, have made him a highly respected figure in the field of medicinal chemistry. His work has had wide-ranging
  applications in the treatment of allergies, inflammatory, and neoplastic diseases, and his achievements have earned him numerous honours, including the National Medal of Science and induction into the
  National Inventors Hall of Fame.
