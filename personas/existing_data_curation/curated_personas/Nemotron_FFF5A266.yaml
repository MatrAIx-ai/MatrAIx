  career_goals: Cirilo aims to become a lead data architect within the next three years, steering enterprise‑wide data strategy and migration to hybrid‑cloud environments. He aspires to attain a senior
    leadership role—such as Director of Data Engineering or Chief Data Officer—where he can shape data governance policies, mentor junior DBAs, and champion data‑driven decision making across the organization.
    His competitive nature fuels a desire to earn advanced certifications (e.g., AWS Certified Solutions Architect, Oracle Certified Master) and to lead high‑impact projects that demonstrate measurable
    improvements in system uptime and query performance.
