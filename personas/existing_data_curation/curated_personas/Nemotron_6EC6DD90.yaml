  career_goals: Noah aspires to become a software engineer or video game developer, envisioning a career where he can solve concrete technical challenges while exercising creative freedom. He hopes to attend
    a university with a strong computer science program and eventually work at an innovative tech company or as a freelance developer, allowing him to balance structured progress with the flexibility to
    pursue personal projects and maintain a calm, predictable work environment.
