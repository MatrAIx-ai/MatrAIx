  career_goals: Looking ahead, Perry aims to transition into a senior leadership role within gambling operations, such as a compliance director or head of risk analytics. He plans to augment his technical
    expertise with advanced certifications, for example a Certified Gaming Compliance Professional credential and possibly a Certified Fraud Examiner designation, and may pursue an MBA focused on operations
    management. His ambition is to design and implement predictive risk models that reduce fraudulent betting activity, streamline regulatory reporting, and enhance operational efficiency across casino
    floors. Perry also seeks to mentor a new generation of analysts, fostering a culture of methodical problem‑solving. Ultimately, he envisions a stable, well‑structured career that positions him as a
    trusted authority in gambling compliance before considering a boutique consulting practice as a post‑retirement venture.
