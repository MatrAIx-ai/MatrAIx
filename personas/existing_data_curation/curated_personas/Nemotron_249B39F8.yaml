personas:
  professional: Juan Sorendo, an aspiring data analyst, leverages bilingual fluency and intermediate Python expertise to translate raw datasets into actionable insights for local businesses, while their
    competitive edge drives meticulous report crafting and a pragmatic mindset ensures solutions stay grounded in real-world constraints.
  sports: Juan Sorendo, a regular at Lake Eola Park’s pick‑up basketball games, follows the Orlando Magic and Orlando City SC with fervor, and blends competitive training sessions with solo runs through
    Wekiwa Springs State Park to stay fit.
  arts: Juan Sorendo, a quiet enthusiast of Latin music, fills work sessions with Romeo Santos and Aventura while curating a pocket‑sized photography portfolio inspired by Ansel Adams and local Florida
    wildlife photographers, and occasionally designs flyers for community events using Adobe Photoshop.
  travel: Juan Sorendo prefers spontaneous, budget‑friendly road trips, having already hiked the trails of Ocala National Forest and explored the Everglades, and now dreams of a cultural immersion tour
    through Puerto Rico’s historic Old San Juan and the Dominican Republic’s mountainous regions.
  culinary: Juan Sorendo, a self‑taught home chef, experiments with traditional sancocho and mangú—adding smoked turkey, yucca, and a pinch of cumin—while mastering the perfect fried plantain caramelization,
    and treats each cooking session as a solitary creative outlet.
  core: Juan Sorendo, a competitive gamer turned budding data analyst, balances a love for strategic problem‑solving with late‑night gaming marathons, occasional coffee‑driven procrastination, and a habit
    of swapping between Python scripts and simmering pots of sancocho.
background:
  cultural: Juan David was raised in a bilingual Dominican household in Kissimmee, where Spanish was spoken at home and English at school and work. His parents immigrated from the Dominican Republic in
    the early 2000s, bringing with them a strong emphasis on family cohesion, respect for elders, and a love for Dominican culinary traditions. He participates in the local Dominican community’s cultural
    events, such as the annual Dominican Day Parade in Orlando, and volunteers occasionally at the community center teaching basic computer skills to seniors. His cultural identity blends the collective
    warmth and celebratory spirit of Dominican culture with the individualistic, career-focused values of his American environment, informing both his personal interactions and his professional aspirations.
