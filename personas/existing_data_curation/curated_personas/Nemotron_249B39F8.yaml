  hobbies: '[''Competitive online gaming (strategy titles)'', ''Pick-up basketball'', ''Cooking Dominican cuisine (sancocho, mangú)'', ''Exploring Central Florida nature parks'', ''DIY electronics projects
    (Raspberry Pi)'', ''Nature photography'', ''Listening to bachata and merengue'']'
  career_goals: Juan David aims to complete his associate degree in Information Technology within the next two years, after which he plans to secure an entry-level data analyst position at a regional firm
    or a municipal office, leveraging his bilingual ability to serve the growing Latino population. In the longer term, he aspires to launch a boutique consulting service that helps small Dominican-owned
    businesses modernize their operations through data-driven decisions and affordable tech solutions. He also entertains the idea of opening a modest Dominican cuisine pop-up that showcases family recipes,
    merging his culinary interest with entrepreneurial ambition.
