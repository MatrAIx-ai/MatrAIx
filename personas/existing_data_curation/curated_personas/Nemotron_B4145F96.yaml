    projects'', ''Playing acoustic guitar'', ''Listening to mariachi and norteño music'', ''Volunteering at youth workshop'', ''Exploring new fabrication techniques'']'
  career_goals: Leonel aims to move from pure fabrication to a role that blends leadership, creativity, and technical depth. He plans to earn a certified welder credential and complete a short-term course
    in small-business management so he can eventually open a boutique metal-art studio that produces custom sculptures, decorative fixtures for local restaurants, and community-focused public art pieces.
    He also hopes to become a shift supervisor, using his people-oriented style to foster a supportive, harmonious work environment and to mentor younger workers, especially those from under-represented
    backgrounds. Flexibility is important to him, so he seeks a schedule that reduces his anxiety while still allowing time for community volunteering and personal artistic projects.
