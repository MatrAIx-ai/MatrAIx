personas:
  professional: A seasoned fabrication specialist named Leonel Mendez merges two decades of CNC routing, MIG/TIG welding, and manual lathe mastery with a curiosity‑driven flair for decorative metal art,
    using bilingual communication to mentor a diverse crew while juggling a habit of misplacing tools and a preference for flexible, low‑stress schedules as he charts a path toward supervising and eventually
    opening his own boutique metal‑art studio.
  sports: Leonel Mendez thrills in Saturday matches with his community soccer league, cheers for San Antonio FC during the season, mixes spontaneous street‑basketball pick‑ups and occasional yoga classes
    into his fitness routine, yet often skips a regular gym schedule, preferring group activities that feed his sociable energy.
  arts: Leonel Mendez immerses himself in San Antonio’s vibrant art scene, frequenting the Blue Star Arts Complex and local mural tours for inspiration, strums acoustic guitar to the sounds of mariachi,
    norteño, and cumbia during lively dance nights, and draws creative cues from artists like José JMB Martínez and the rhythmic storytelling of Los Tigres del Norte, channeling this cultural vitality into
    his metal‑art designs.
  travel: Leonel Mendez favors spontaneous road trips to Hill Country vineyards, weekend getaways to Austin’s music festivals, and dreams of exploring historic plazas in Oaxaca and the bustling streets
    of Mexico City, yet balances his wanderlust with family responsibilities that limit longer vacations, prompting him to plan short, budget‑friendly escapes.
  culinary: Leonel Mendez delights in cooking traditional dishes such as tamales de carne, pozole with hominy, and carne asada, often infusing them with modern twists like chipotle‑marinated quinoa stuffing
    or a mole‑glazed finish, using ingredients like epazote, corn masa, and fresh cilantro while wielding a modest yet confident kitchen skill set that blends familial recipes with experimental plating.
  core: Leonel Mendez is a curious, artist‑hearted fabricator who balances a love for community, spontaneous creativity, and emotional intensity with a laid‑back, sometimes disorganized lifestyle.
background:
  cultural: Leonel is a first-generation Mexican-American raised in a close-knit family in San Antonio’s historically Mexican-influenced neighborhoods. He grew up bilingual, speaking Spanish at home and
    English at school, and his upbringing blended Catholic traditions with vibrant community celebrations such as Día de los Muertos, Las Posadas, and the city’s annual Fiesta. Family meals centered around
    homemade tacos, pozole, and tamales, fostering a deep appreciation for Mexican culinary arts. The rich visual culture of Chicano murals, folk art, and regional crafts shaped his early love for aesthetics,
    while the work ethic of his parents—who held jobs in manufacturing and construction—instilled pride in hands-on labor. Leonel’s heritage continues to influence his worldview, emphasizing respect for
    elders, communal support, and the fusion of traditional Mexican motifs with contemporary expression.
