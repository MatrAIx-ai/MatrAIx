    participation'', ''art theory lectures'', ''crossword puzzles'']'
  career_goals: Although retired from the formal workforce, April aims to leave a lasting intellectual and artistic legacy in her community. She plans to complete a memoir that weaves personal history with
    the broader narrative of Rossville, and to curate a small traveling exhibit of local art and historical artifacts for senior centers and schools. She also aspires to earn a certificate in digital archiving
    to preserve the county's oral histories, and to establish a quarterly workshop where interested seniors can explore abstract art and creative writing under her guidance.
