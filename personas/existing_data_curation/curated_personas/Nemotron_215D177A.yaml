personas:
  professional: Rosalia Martinezparra, a 28‑year‑old pastor‑scientist in Albuquerque, blends their STEM background with clerical duties by crafting bilingual sermons infused with interactive Arduino‑driven
    liturgical art, while leading community outreach programs for underserved youth.
  sports: Rosalia Martinezparra, a 28‑year‑old pastor who favors solitary weekend hikes with the Sandia Mountain Hiking Club and follows the New Mexico Lobos basketball team while occasionally joining a
    casual co‑ed soccer pick‑up league, treats fitness as a meditative practice rather than competitive sport.
  arts: Rosalia Martinezparra, an abstract painter and classical guitarist, finds inspiration in the mystical light installations of James Turrell, the surreal symbolism of Frida Kahlo, and the atmospheric
    scores of Jóhann Jóhannsson, often integrating these influences into their liturgical art and weekend performances at the New Mexico Museum of Art's avant‑garde shows.
  travel: Rosalia Martinezparra, a 28‑year‑old explorer who prefers loosely planned road trips to the high‑altitude deserts of Utah’s Zion National Park and spontaneous stargazing nights in Chile’s Atacama,
    dreams of a pilgrimage‑style visit to the ancient ruins of Chichén Itzá, yet balances travel with limited grant funding for their ministry.
  culinary: Rosalia Martinezparra, an enthusiastic home‑cook, frequently prepares Oaxacan mole negro rich with toasted chilies, cacao, and epazote for friends, experiments with smoked duck tacos, and balances
    their palate with occasional vegan quinoa salads when they feel too busy to indulge in elaborate cooking.
  core: Rosalia Martinezparra, a 28‑year‑old pastor‑engineer, merges science and faith through inventive worship tech, but often misplaces their sermon notes, forgets to pay bills on time, and thrives on
    midnight stargazing and solitary art sessions.
background:
  cultural: Rosalia is a first‑generation Mexican‑American whose family traditions are rooted in the Catholic faith and Mexican folk customs. Growing up in a bilingual household, she celebrates Día de los
    Muertos and incorporates vibrant papel picado and marigold motifs into liturgical settings, honoring her heritage while fostering inclusivity. Living in Albuquerque, she navigates a rich cultural tapestry
    that includes Hispanic, Native American, and contemporary American influences. This environment informs her ministry, prompting her to respect Indigenous spiritual perspectives and to engage with the
    broader Southwest artistic community. Her STEM education at a regional university further connects her to New Mexico’s burgeoning tech scene, shaping a worldview that values both scientific rigor and
    spiritual depth.
attributes:
  skills: '["Pastoral counseling", "Bilingual communication (Spanish/English)", "Theological scholarship (science‑faith dialogue)", "Public speaking and sermon composition", "Community outreach program
    development", "Liturgical arts design", "Scientific literacy (biology and environmental science)", "Small group facilitation", "Conflict mediation", "Adaptive leadership", "Digital media production
    for worship", "Basic Python programming"]'
  hobbies: '["Abstract painting", "Classical guitar", "Reading speculative fiction and philosophy", "Astronomy stargazing", "Hiking", "Cooking traditional Mexican dishes", "Yoga meditation", "Contemporary
    art exhibitions", "Arduino electronics projects", "Dream journaling", "Listening to experimental music"]'
  career_goals: Rosalia aims to become a pioneering voice that integrates scientific insight with spiritual practice, authoring a book that explores contemporary theology through the lens of modern science.
    She seeks to secure grants for innovative worship projects that blend art, technology, and ritual, and to expand her congregation’s outreach to marginalized neighborhoods in Albuquerque by establishing
    a youth technology and mentorship center. Pursuing a PhD in theology is a long‑term goal, as is assuming a senior pastoral role that oversees multilingual services and fosters interfaith dialogue with
    local Indigenous communities. She is driven to be recognized for her creative liturgical contributions while maintaining the flexibility to experiment and evolve her ministry.
