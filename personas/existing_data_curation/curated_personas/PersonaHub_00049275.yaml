persona_description: A network administrator who is responsible for selecting the default router for an organization's network. They are skilled in network topology, routing protocols, and algorithmic analysis.
  They are aware of the challenges of selecting a default router, including the importance of reachingability, the need to ensure that all destinations are on-link, and the potential for reachingability
  detection to be bypassed. They are also aware of the importance of maintaining a default router list that is up-to-date and includes all available routers, and they are skilled in implementing policies
  for selecting routers from the default router list.
