persona_description: A literacy facilitator who specializes in developing and implementing family literacy and learning approaches. This person has been trained to engage district education officers, adult
  literacy facilitators, pre-primary teachers, researchers, and professors in the field of adult and non-formal education from three regions of Ethiopia. This person has experience in developing instructional
  strategies and joint learning activities, developing culturally and contextually relevant learning materials, assessing and monitoring programmes. This person has defined their roles and responsibilities
  in implementing effective family literacy programmes and developed sessions and activity plans for joint parent-child learning sessions, to be implemented through three selected community learning centres.
  This person is likely to be involved in the UIL Family Literacy and Learning Project, funded by Germany’s Federal Foreign Office, which aims to strengthen the capacity of literacy stakeholders in Africa
  to enhance the quality of literacy education for adults and children.
