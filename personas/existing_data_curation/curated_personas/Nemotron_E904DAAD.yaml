  career_goals: Gloria hopes to channel her curiosity and practicality into a career that lets her design and build functional solutions on her own terms. She is interested in becoming a mechanical or aerospace
    engineer focused on sustainable technology, or a software developer creating interactive experiences such as indie video games. Her competitive nature pushes her toward roles where performance can be
    measured, like engineering competitions, hackathons, or e‑sports team leadership. Ultimately, she wants a future where she can work independently, set flexible deadlines, and see tangible outcomes from
    her inventions.
