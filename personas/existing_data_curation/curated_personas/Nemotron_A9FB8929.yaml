    and emotional support'']'
  hobbies: '[''Gardening (desert-friendly plants)'', ''Knitting and crocheting'', ''Reading historical fiction and biographies'', ''Birdwatching'', ''Volunteering at the local senior center'', ''Walking
    on desert trails'', ''Listening to classic country music'', ''Jigsaw puzzles and crosswords'', ''Cooking simple, nutritious meals'']'
  career_goals: Renee is pursuing certification as a Certified Nursing Assistant (CNA) to broaden her clinical expertise while retaining her hands‑on caregiving role. She aims to transition into a supervisory
    position within her home‑care agency, where she can mentor newer aides and shape supportive, structured care environments. Additionally, she hopes to establish a small, community‑focused home‑care service
    that offers reliable, personalized assistance to the growing elderly population in Nye County, ensuring financial stability for her retirement and fostering a network of compassionate caregivers.
