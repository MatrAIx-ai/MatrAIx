  career_goals: At 77, Tunja’s ambitions center on legacy rather than employment. He aims to compile a memoir of his family’s experiences in rural Georgia, preserving stories for future generations. He
    hopes to lead a weekly woodworking class at the local community center, passing his craft to teens and adults. Tunja also wishes to serve on the town’s historical preservation committee to ensure local
    African‑American heritage is recorded and celebrated. Finally, he seeks to expand senior services in Byromville by advocating for a weekly transportation program to the county library and health clinic.
