  career_goals: Sandra hopes to deepen her involvement with the Dayton Art Institute by becoming a volunteer docent and leading a weekly senior art‑appreciation circle. She also plans to launch a neighborhood
    garden project that pairs horticulture with intergenerational mentorship, and she aims to complete a GED‑level art history course at a local community college to formalize her knowledge.
