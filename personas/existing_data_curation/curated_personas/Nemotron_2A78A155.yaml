personas:
  professional: Sandra Miles, a seasoned community‑event organizer and aspiring volunteer docent, leverages her meticulous planning, conflict‑mediation savvy, and boundless curiosity to coordinate art‑focused
    workshops, manage modest nonprofit budgets, and foster intergenerational mentorship through a neighborhood garden project, all while thriving on the social energy of senior groups.
  sports: Sandra Miles, an avid fan of the Dayton Dragons minor‑league baseball team and a seasonal supporter of the Cincinnati Bengals, spends her mornings in a community walking club that meets at the
    Five Rivers MetroParks trail, joins a local senior softball league each spring, and practices gentle yoga twice a week to maintain flexibility, all while encouraging friends to join her for the occasional
    dance class at the senior center.
  arts: Sandra Miles, a devoted patron of the Dayton Art Institute, regularly attends exhibitions featuring Georgia O'Keeffe, Yayoi Kusama, and Vincent van Gogh, volunteers at the local community theatre
    where she helps design set backdrops, and channels her own creative outlet through quilting projects inspired by bold textile patterns, giving her a personal lens through which she critiques and celebrates
    visual culture.
  travel: Sandra Miles, who prefers thoughtfully planned trips over spontaneous getaways, spends her summers exploring cultural festivals such as the New Orleans Jazz & Heritage Festival and the Edinburgh
    Fringe, has visited Florence to wander the halls of the Uffizi Gallery while tracing family roots in Italy, and enjoys weekend road trips to Ohio’s Amish Country for heirloom garden inspiration, all
    while budgeting her travel through senior discounts and careful itinerary research.
  culinary: Sandra Miles, a confident home cook who harvests heirloom tomatoes, basil, and rainbow carrots from her own vegetable garden, delights in preparing rustic ratatouille, lemon‑herb grilled salmon
    on a summer patio, and a signature quinoa salad tossed with roasted beets, feta, and a drizzle of walnut oil, while they occasionally treat themselves to a fine‑dining tasting menu for inspiration.
  core: Sandra Miles, a 66‑year‑old garden‑loving art enthusiast, blends diligent organization with boundless curiosity, often over‑schedules volunteer projects, hoards vintage seed packets, and still finds
    time to quilt intricate patterns for friends.
background:
  cultural: Sandra was raised in a Midwestern white working‑class family in Dayton, Ohio, where community ties, church participation, and a modest, service‑oriented ethic were emphasized. The region’s emphasis
    on friendliness, volunteerism, and practical craftsmanship shaped her values and her lifelong commitment to local civic and cultural institutions.
