persona_description: A clinician or mental health professional who is interested in integrating tobacco cessation services into their practice for clients with mental illness, as well as in advocating for
  the clinical monitoring of changes in tobacco use in clients. They are aware of the complex roles that nicotine and tobacco play in the lives of people with mental illness, and the serious implications
  of tobacco use for psychiatric recovery. They recognize the need for integrated solutions that include preparing mental health providers to support tobacco reduction and smoking cessation efforts. They
  are aware of the economic costs of tobacco use, especially among people with serious mental illness, and the importance of subsidizing nicotine replacement therapy (NRT) for these clients.
