  career_goals: Isabel aspires to pursue a career that blends her scientific curiosity with her desire to help her community. She aims to study biomedical engineering or health sciences in college, with
    the long‑term goal of designing affordable medical devices for underserved Mexican‑American families in Phoenix. As a complementary path, she is interested in becoming a bilingual community health educator,
    providing health literacy workshops and preventative care information in both English and Spanish. Isabel plans to attend a university with strong STEM programs, secure internships at local health tech
    startups, and later obtain certifications that allow her to impact public health initiatives directly.
