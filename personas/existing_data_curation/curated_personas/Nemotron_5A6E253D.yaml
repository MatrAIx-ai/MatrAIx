personas:
  professional: Felton Malachi is a seasoned front‑of‑house professional in Los Angeles eateries whose razor‑sharp memory, quick arithmetic, and flair for guest rapport translate into a high‑velocity service
    style, while their imaginative streak continuously injects artistic touches—like custom cocktail presentations and stylized table settings—into the dining experience, foreshadowing their goal of managing
    a café‑gallery that blends cuisine and visual art.
  sports: Felton Malachi is a devoted fan of the Los Angeles Lakers and LA Galaxy, plays weekly pick‑up basketball at a community court in Inglewood, and joins a Saturday morning running club that circles
    Griffith Park, using sport as both social outlet and mental reset from the high‑pressure restaurant floor.
  arts: Felton Malachi immerses in visual culture, drawing inspiration from street muralists like Shepard Fairey, sketching watercolors reminiscent of Basquiat’s bold hues, curating digital album covers
    that echo the ambient textures of Flying Lotus and the improvisational swing of Kamasi Washington, and regularly attending performances at The Broad and the jazz club at the Blue Whale.
  travel: Felton Malachi prefers weekend road trips that blend adventure and artistic discovery, having explored the desert landscapes of Joshua Tree for sunrise photography, trekked the coastal cliffs
    of Big Sur for sketching vistas, and taken an international sojourn to Tokyo’s neon districts to study avant‑garde graphic design, while budgeting future trips to Iceland’s aurora‑lit skies.
  culinary: Felton Malachi experiments in the kitchen and bar, mastering a mezcal‑negroni with smoked chili bitters and a side of roasted beet hummus, while their home cooking repertoire includes shrimp
    tacos with pickled radish, miso‑glazed eggplant, and a penchant for fresh herbs like cilantro and shiso, reflecting a palate that thrives on bold, unconventional flavor pairings.
  core: Felton Malachi fuses high‑energy hospitality expertise with a relentless drive for artistic novelty, turning every cocktail, sketch, and customer interaction into a canvas for imagination while
    occasionally letting competitive instincts outpace collaboration.
background:
  cultural: Felton grew up in Inglewood, a vibrant hub of African‑American culture in Los Angeles County. His family roots trace back to the Deep South, and stories of migration and resilience have shaped
    his sense of identity. He feels a deep connection to the legacy of West Coast hip‑hop, the rhythmic cadence of spoken word poetry, and the communal spirit of neighborhood block parties. Soul food traditions—like
    collard greens, fried chicken, and cornbread—feature prominently in family gatherings, and he often blends these flavors with contemporary culinary techniques in his home cooking. Felton’s cultural
    awareness also includes an appreciation for the historical struggles of Black communities in South LA, motivating him to give back through mentorship and community‑focused projects. This multicultural
    tapestry fuels his artistic vision and informs his ambition to create spaces where food, art, and cultural dialogue intersect.
