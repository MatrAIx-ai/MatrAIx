  hobbies: '[''Watercolor sketching'', ''Digital illustration'', ''Urban street photography'', ''Reading speculative fiction and philosophy'', ''Attending local art openings and gallery talks'', ''Experimental
    mixology'', ''Listening to jazz, hip‑hop, and electronic music'', ''Volunteering at youth art programs'']'
  career_goals: Felton aspires to leverage his front‑of‑house mastery into a supervisory role within the next two years, aiming to become a restaurant manager who blends culinary excellence with artistic
    expression. Long‑term, he dreams of opening a community‑focused café/gallery in Inglewood that showcases local Black artists, serves innovative, locally sourced dishes, and offers a rotating menu of
    experimental cocktails he designs himself. To achieve this, he plans to enroll in an associate’s program in hospitality management, build a network of mentors in the LA food‑scene, and secure modest
    seed funding through community partnerships and small‑business grants.
