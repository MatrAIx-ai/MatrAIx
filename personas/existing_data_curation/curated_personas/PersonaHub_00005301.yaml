persona_description: A professional with a background in management, particularly in the field of strategic management. This person is interested in understanding the formulation and implementation of goals,
  the evaluation of available resources and the assessment of the internal and external environments in which the company operates. They are also interested in the allocation of resources to achieve the
  goals of the organization, as well as the use of various frameworks and concepts such as experience curve, industry structure and profitability, SWOT analysis, corporate strategy, and portfolio theory.
  Additionally, this person is familiar with the generic competitive strategies and the discipline of globalization, self-service, sustainability, and internet and information availability. This person
  is likely to be interested in the most vital concepts in the field of strategic management and would find this book to be a comprehensive and easy-to-understand resource.
