personas:
  professional: Ariel Lewandowski, a 13‑year‑old aspiring content creator, blends drama‑club rehearsals with quick‑cut TikTok reels and soccer highlights, leveraging their sociable energy to dominate the
    school’s social‑media scene while staying grounded in practical, short‑term goals.
  sports: Ariel Lewandowski, a passionate member of the local youth soccer league, regularly trains on weekends, cheers for the Denver Broncos and Colorado Avalanche, and hits the slopes at Vail for snowboarding,
    approaching each sport with competitive fire and a pragmatic focus on immediate performance.
  arts: Ariel Lewandowski curates indie playlists featuring artists like Clairo and Tame Impaala, stars in drama‑club short scenes that double as Instagram reels, and captures urban sunrise shots of the
    Denver skyline and mountain vistas, while admiring actors such as Timothée Chalamet and Zendaya.
  travel: Ariel Lewandowski prefers spontaneous weekend hikes in the Rocky Mountain National Park and quick ski trips to Breckenridge over elaborate itineraries, yet dreams of swapping Rocky passes for
    a Tokyo street‑food tour of ramen and neon lights.
  culinary: Ariel Lewandowski loves helping the family roll traditional pierogi stuffed with potato and cheese, experiments with a midnight snack of loaded nachos topped with jalapeños, and can whip up
    a surprisingly decent avocado toast despite a habit of burning toast when distracted.
  core: Ariel Lewandowski is a 13‑year‑old charismatic teen who balances bursts of competitive gaming, social‑media stardom, and outdoor adventures with a pragmatic streak, a touch of disorganization, and
    a penchant for impulsive snack cravings.
background:
  cultural: Ariel is a white American with Polish ancestry, reflected in her surname Lewandowski and family traditions like cooking pierogi and celebrating Polish holidays. Growing up in Denver, she blends
    this heritage with the city's vibrant, multicultural atmosphere and outdoor lifestyle. She participates in typical American celebrations such as Thanksgiving and Fourth of July, while also enjoying
    the diverse cultural events and natural adventures that the Colorado region offers.
