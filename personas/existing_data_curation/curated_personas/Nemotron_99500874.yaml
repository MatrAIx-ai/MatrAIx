  career_goals: Ariel envisions turning her love for performance and digital storytelling into a career as a teen influencer or television host, focusing on lifestyle, pop culture, and outdoor adventure
    content. In the near future she aims to lead her school's student council, win a regional debate competition, and earn a scholarship for a high‑school media program. Long‑term, she hopes to study communications
    or journalism in college and eventually work as a sports broadcaster or multimedia producer.
