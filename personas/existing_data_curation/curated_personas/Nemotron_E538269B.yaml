personas:
  professional: Giselle Vidales, a budding kindergarten teacher‑in‑training, showcases exceptional organization by setting up daily schedule boards, they delight peers with their chatter‑filled story sessions,
    and they confidently lead playtime circles while maintaining a reliable routine.
  sports: Giselle Vidales, a devoted member of the kindergarten soccer club who idolizes the Seattle Sounders, thrives on structured after‑school drills, they channel their energetic spirit through weekly
    dance classes, and they cherish the routine of weekend match‑day celebrations with their family.
  arts: Giselle Vidales, an avid fan of Disney animations and a budding finger‑painter, spends afternoons recreating scenes from Frozen by the window, they sing loudly along to the soundtrack, and they
    eagerly attend the local children’s theater productions of The Lion King.
  travel: Giselle Vidales, a curious explorer who loves family road trips to the national park’s junior ranger program, they eagerly plan snack routes on map stickers, and they dream of visiting the bright
    lights of Disneyland next summer.
  culinary: Giselle Vidales, a picky yet adventurous eater who adores cheesy pizza, mac and cheese, and strawberries, they help stir batter at home but often get flour on their nose, and they insist on
    arranging their food neatly on the plate.
  core: Giselle Vidales, a lively five‑year‑old who thrives on routine, talks nonstop, meticulously organizes their toys, and can’t resist a glittery sticker reward.
background:
  cultural: Giselle comes from an Ecuadorian family that celebrates cultural traditions through music, dance, and food. At home she frequently hears Spanish and English, enjoys familiar dishes such as empanadas
    and plantain fritters, and participates in family gatherings that emphasize community, respect, and festive celebrations like Carnaval.
