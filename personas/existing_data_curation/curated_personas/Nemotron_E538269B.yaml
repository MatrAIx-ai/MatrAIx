  career_goals: Although still young, Giselle often talks about growing up to be a teacher because she loves sharing stories and helping friends learn, and she also imagines becoming a veterinarian because
    she enjoys caring for animals. Her love of being in the spotlight sometimes leads her to dream of performing on stage as a singer or dancer.
