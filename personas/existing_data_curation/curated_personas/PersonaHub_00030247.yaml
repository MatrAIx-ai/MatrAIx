persona_description: A professor who leads a short-term course on studying forest trees' responses to stress, focusing on the research and teaching interests related to studying how forest trees adapt to
  long- and short-term stress. The course takes students on fieldwork to observe forested habitats from sea level to mountains, including a trip to alpine environments that is not scheduled. The professor
  strives to create useful experiences for his students and fits his approach with key Bates initiatives, including Purposeful Work and the college's robust culture of community-engaged learning.
