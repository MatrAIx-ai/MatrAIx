  hobbies: '[''Gardening'', ''Traditional Mexican cooking'', ''Playing dominoes'', ''Church choir participation'', ''Attending cultural festivals'', ''Listening to mariachi music'', ''Reading historical
    biographies'', ''Walking along the Rio Grande'']'
  career_goals: Although retired, Fernando aims to remain a pillar of his community by mentoring local youth, leading senior‑center workshops on financial literacy, and preserving his family’s cultural
    stories through a written memoir. He also hopes to contribute to the improvement of neighborhood public spaces, leveraging his planning skills to organize volunteer clean‑up days. Maintaining his health
    and independence is a personal ambition, so he prioritizes regular walking and balanced nutrition.
