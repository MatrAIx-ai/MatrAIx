  career_goals: Lisa aims to transition from a clerical role to a supervisory position within the next three to five years, targeting a claims supervisor or team lead role where she can shape process efficiencies
    and mentor junior staff. She plans to earn the CPCU (Chartered Property Casualty Underwriter) designation to deepen her technical expertise and is considering a part‑time MBA in Operations Management
    to blend her curiosity for new ideas with practical leadership skills. Long‑term, she envisions a managerial career that balances operational excellence with fostering a supportive, collaborative workplace
    culture.
