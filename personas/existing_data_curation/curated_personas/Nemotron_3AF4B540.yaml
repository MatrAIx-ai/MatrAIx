  career_goals: Pedro’s budding ambitions are shaped by his love of art, desire to help others, and cultural pride. He often talks about becoming a painter or illustrator who creates bright pictures that
    make people smile. He also imagines being a teacher who shares stories and guides younger children, as well as a doctor or community helper who heals and protects friends. Inspired by family gatherings,
    he dreams of playing mariachi music in a band, performing for celebrations, and keeping Mexican traditions alive. Though simple, his goals reflect a compassionate, creative spirit eager to learn and
    make a positive impact.
