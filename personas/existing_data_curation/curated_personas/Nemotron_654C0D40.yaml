  career_goals: Approaching retirement, Katelyn’s primary professional ambition is to transition into a mentorship and safety‑training role, passing on her extensive practical knowledge to the next generation
    of technicians. She hopes to spearhead a plant‑wide initiative to integrate energy‑efficiency upgrades—such as variable‑frequency drives and reclaimed‑heat systems—drawing on her curiosity for new ideas.
    Additionally, she aspires to volunteer as an OSHA safety liaison for local small‑business workshops and to serve on the board of a community arts council, blending her technical background with her
    love for the arts.
