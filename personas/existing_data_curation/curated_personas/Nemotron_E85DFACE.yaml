    and organization'', ''Adaptability to fast-paced retail environment'']'
  hobbies: '[''Attending live Latin music concerts'', ''Sampling street food at local festivals'', ''Cooking traditional Latino dishes (e.g., mole, tamales)'', ''Reading historical fiction and philosophy'',
    ''Hiking in Red Rock Canyon'', ''Playing acoustic guitar (salsa rhythms)'', ''Volunteering to teach English to immigrants'']'
  career_goals: Hector aims to move beyond floor supervision to a store‑manager role within the next two years, leveraging his humanities background to foster a customer‑centric culture that values employee
    well‑being. He plans to earn an MBA focused on retail management to complement his practical experience, aspiring eventually to oversee multiple locations or open his own boutique that showcases Latino
    craftsmanship and sustainable fashion. He is also motivated to develop training programs that incorporate cultural competency, helping his team navigate the diverse Las Vegas market while reducing stress
    and turnover.
