  hobbies: '["Reading self-help books", "Journaling", "Yoga", "Mindfulness meditation", "Walking/hiking", "Cooking and baking", "Gardening", "Strategic board games (e.g., chess)", "Puzzle solving (crosswords,
    Sudoku)", "Volunteering at church events", "Attending local fairs and country-music concerts"]'
  career_goals: Marlen aspires to move beyond front-line support into a supervisory or quality-assurance role within the next two to three years. She aims to complete an associate degree in business administration
    while working, eventually earning a bachelor's in communications or management. Her long-term ambition is to become a call-center manager or customer-experience strategist, overseeing team performance,
    designing training programs, and shaping service policies. She also hopes to achieve financial stability to purchase a home for her married life and possibly start a family.
