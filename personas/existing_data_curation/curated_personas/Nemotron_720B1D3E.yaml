personas:
  professional: A retired protective‑service veteran named Juan Arroyo combines decades of risk‑assessment expertise with a disciplined, methodical mindset; they excel at surveillance, conflict de‑escalation,
    and meticulous record‑keeping, and now devote their structured energy to mentoring new recruits, drafting a concise community‑security handbook, and preserving oral histories of immigrant experiences
    in Northern New Mexico.
  sports: A quiet outdoors enthusiast named Juan Arroyo spends mornings birdwatching along the Rio Grande, joins a senior walking club for gentle strolls through the Española river trail, and reserves weekend
    afternoons for watching the Albuquerque Isotopes at the stadium, while occasionally cheering for New Mexico United soccer matches, preferring low‑impact activities that align with his structured routine
    and modest mobility.
  arts: A reflective creator named Juan Arroyo spends afternoons immersed in classic literature such as Moby‑Dick and the poetry of Pablo Neruda, hones calligraphy with ink‑on‑paper rituals, crafts small
    wooden furniture inspired by the precision of Gustav Stickley, and fills his home with the melodies of traditional folk songs by Lila Downs and the gentle guitars of Andrés Calamaro, while also finding
    inspiration in the paintings of Frida Kahlo and the sculptures of Henry Moore.
  travel: A contemplative explorer named Juan Arroyo favours low‑key journeys that blend history and nature, having spent his retirement visiting Santa Fe’s historic Plaza, wandering the adobe streets of
    Taos Pueblo, marveling at the limestone chambers of Carlsbad Caverns, and strolling the dunes of White Sands; they dream of a serene pilgrimage to the Mission San José de Gracia in New Mexico and a
    brief cultural stop in Sedona, Arizona, always booking accommodations well in advance to ensure accessibility and comfort.
  culinary: A traditional‑flavor cook named Juan Arroyo delights in preparing hand‑pressed pupusas filled with loroco and queso fresco, slow‑cooked tamales de elote wrapped in corn husks, and aromatic bean
    soup seasoned with cilantro and cumin, often pairing these meals with freshly harvested tomatoes, chilies, and garden‑grown avocados, while his modest culinary skills also shine in baking simple cornbread
    and brewing a comforting pot of herbal chamomile tea.
  core: Juan Arroyo is an 86‑year‑old methodical mentor who blends protective‑service precision with solitary cultural pursuits, channeling his competitive drive into meticulous record‑keeping, careful
    budgeting, and quiet dedication to community safety and heritage.
background:
  cultural: Juan Ivan was born to Salvadoran immigrant parents who settled in New Mexico in the 1960s. He grew up bilingual, celebrating Catholic holidays such as Semana Santa and Salvadoran traditions
    like Día de la Madre with a blend of New Mexican customs. His family's culinary heritage—pupusas, tamales, and horchata—remains central to his identity. He maintains close ties to the Salvadoran diaspora
    community in Española and respects the region's Indigenous Tewa influences, often participating in cultural exchange events that honor both his Latin American roots and his New Mexican home.
