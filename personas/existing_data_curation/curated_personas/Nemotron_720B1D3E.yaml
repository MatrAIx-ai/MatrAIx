  hobbies: '[''Reading classic literature'', ''Salvadoran poetry'', ''Vegetable gardening'', ''Woodworking'', ''Calligraphy'', ''Preparing Salvadoran dishes'', ''Birdwatching'', ''Quiet church attendance'']'
  career_goals: Although officially retired, Juan Ivan aims to leave a lasting legacy of safety and cultural awareness in Española. He plans to compile a concise handbook on best practices for community
    security that reflects his structured approach, and to volunteer as a mentor for new protective service recruits. He also aspires to document and share oral histories of Salvadoran immigrants in Northern
    New Mexico, contributing to the local historical society. Maintaining his health to support his spouse and ensuring a secure environment for his neighbors remain his primary ambitions.
