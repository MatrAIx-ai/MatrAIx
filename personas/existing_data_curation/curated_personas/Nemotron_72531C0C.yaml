  hobbies: '[''Sailing'', ''Gardening'', ''Woodworking'', ''Reading (science history & Vietnamese literature)'', ''Cooking traditional Vietnamese dishes'', ''Bridge'', ''Chess'', ''Beach clean‑up volunteering'',
