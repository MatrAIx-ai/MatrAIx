  career_goals: Although retired, Duc aims to stay intellectually active by volunteering as a mentor for engineering students at the local community college and offering free workshops on sustainable home
    projects. He plans to document his personal and professional journey in a memoir that weaves his migration story with his engineering insights. A long‑standing personal project is to build a solar‑powered
    kayak for leisurely rides along the Delaware shoreline. He also hopes to keep up with emerging home‑automation technologies, support his grandchildren’s education, and maintain a flexible, low‑pressure
    lifestyle.
