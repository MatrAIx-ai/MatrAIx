personas:
  professional: Indroutie Cherukuri is a construction laborer in San Antonio who leverages three years of hands‑on framing, concrete finishing, and electrical wiring experience, alongside an OSHA‑10 certification
    and a forklift license, to methodically oversee site inventories and safety audits while charting a fast‑track path toward a foreman role through NCCER and OSHA‑30 credentials.
  sports: Indroutie Cherukuri is an avid follower of the San Antonio Spurs and San Antonio FC, jogs five times a week through the Hill Country parks, and belongs to a local weekend running club that meets
    at Brackenridge Park for group mileage challenges.
  arts: Indroutie Cherukuri enjoys listening to acoustic guitarist Andy McKee, reading Alan Moore’s graphic novels, and watching classic Bollywood epics like Mughal‑e‑Azam for their storytelling depth,
    while occasionally sketching architectural concepts during quiet evenings.
  travel: Indroutie Cherukuri prefers meticulously planned road trips, having explored the Texas Hill Country vineyards, the historic streets of Santa Fe, and the bustling markets of Marrakech, and now
    dreams of a future cultural immersion in the ancient temples of Udupi.
  culinary: Indroutie Cherukuri loves preparing fragrant chicken biryani with basmati rice, cumin, and saffron, alongside spicy lentil dal and perfectly crisp homemade garlic naan, showcasing a confident
    DIY cooking skill level despite occasional over‑spicing mishaps.
  core: Indroutie Cherukuri is a methodical, curiosity‑driven builder who balances solitary tinkering with community‑focused harmony, always planning the next project while keeping a disciplined budget
    and health routine.
background:
  cultural: Indroutie comes from a South Asian Muslim family of Telugu origin, with parents who immigrated to the United States before he was born. He grew up speaking Telugu at home while attending English‑language
    schools, giving him a bicultural perspective. Family life emphasized respect for elders, hospitality, and the importance of community, which is reflected in his cooperative nature at work and his involvement
    in mosque activities. Religious observances such as Ramadan and Eid shape his yearly rhythm, and culinary traditions like biryani and dosa connect him to his heritage. These cultural influences blend
    with his American upbringing in San Antonio, fostering a pragmatic yet curious worldview.
attributes:
