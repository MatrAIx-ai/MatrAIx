  hobbies: '[''DIY home‑improvement projects'', ''Scale model house building'', ''Reading construction manuals'', ''Arduino tinkering'', ''Cooking traditional South Asian dishes'', ''Playing chess'', ''Jogging
    in Hill Country parks'', ''Volunteering at community clean‑ups'', ''Listening to music (Qawwali and classic rock)'']'
  career_goals: Indroutie aims to progress from laborer to foreman within the next two years by earning an NCCER journeyman certification and completing an OSHA 30‑hour course. He plans to enroll in a community‑college
    associate program in construction management to qualify for a site‑supervisor role. Long‑term, he envisions starting his own contracting business focused on energy‑efficient residential builds, using
    his practical knowledge and organized leadership style to create stable employment opportunities for young workers in his community.
