persona_description: A historian who specializes in the study of criminal justice and Victorian England, particularly the treatment of violence by men against women. She is an expert in the legal development
  of the criminal law during Victoria's reign and the resistance to this progressive legal development, which was fueled by discussions about democracy, humanitarianism, and patriarchy. She is also interested
  in the impact of this legal development on the treatment of serious violence by men against women in nineteenth-century England.
