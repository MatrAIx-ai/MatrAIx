  career_goals: At this age, Natasha enjoys imagining future occupations that involve caring for others and using practical skills. She frequently says she wants to be a teacher because she likes helping
    classmates learn, and she also dreams of becoming a veterinarian to take care of animals. Influenced by her family's emphasis on practicality, she imagines working in a community garden or a food pantry
    where she can help provide healthy meals. These aspirations reflect her desire for stable, helpful roles rather than abstract or highly imaginative careers.
