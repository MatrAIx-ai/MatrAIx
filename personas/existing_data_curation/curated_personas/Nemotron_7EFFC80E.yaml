personas:
  professional: Michelle Dickens, a seasoned metal fabricator with over a decade of CNC, welding, and PLC expertise, leverages lean principles and meticulous ISO-9001 quality inspections to keep her shop
    floor humming, while they communicate clearly, train apprentices effectively, and pursue a Certified Welding Inspector credential to eventually supervise a small, community-focused custom metal-work
    shop.
  sports: Michelle Dickens enjoys a weekly jog along the Darlington River Trail, follows the Carolina Panthers football team, plays pickup basketball at the community center, participates in a local women's
    cycling club that meets every Saturday for a 15-mile ride, and they love the camaraderie it brings.
  arts: Michelle Dickens expresses creativity both in the makerspace, where they craft metal-art sculptures inspired by the fluid lines of Isamu Noguchi, and in the gospel choir, where they harmonize with
    renditions of Mahalia Jackson and Aretha Franklin, while also attending local theater productions featuring works by August Wilson.
  travel: Michelle Dickens prefers road trips that blend scenic drives with hands-on workshops, having recently explored Asheville’s craft beer trail and Savannah’s historic district, while they dream of
    a culinary pilgrimage to New Orleans and a future family vacation at Great Smoky Mountains National Park.
  culinary: Michelle Dickens excels at cooking Southern comfort foods like fried chicken, collard greens, and shrimp-and-grits, often seasoned with smoked paprika, cayenne, and fresh thyme from their garden,
    and they love experimenting with a community cookbook’s twist on classic gumbo while occasionally over-salting their cornbread batter in enthusiasm.
  core: Michelle Dickens, a 36-year-old metal-fabrication specialist, balances precision work with soulful gospel singing, garden-to-table cooking, and a habit of checking spreadsheets for both budget and
    CNC tolerances, while they quietly champion women in trades.
background:
  cultural: Michelle grew up in Darlington County within a close‑knit African‑American community where church, family, and Southern traditions formed the core of daily life. Her upbringing emphasized self‑reliance,
    hard work, and the importance of communal support through church youth programs and neighborhood gatherings. Exposure to gospel music, soul‑food cooking, and storytelling shaped her values of cooperation,
    respect, and giving back. As a black woman in a traditionally male‑dominated trade, she draws strength from the resilience of her ancestors and the solidarity of local networks, navigating workplace
    challenges with confidence and a commitment to mentor the next generation.
attributes:
  skills: '[''CNC machining'', ''MIG/TIG welding'', ''Blueprint reading'', ''Injection molding operation'', ''Preventative maintenance'', ''Quality inspection'', ''Lean manufacturing'', ''Safety compliance'',
    ''Team leadership'', ''Apprentice training'']'
  hobbies: '[''Gardening'', ''Cooking Southern cuisine'', ''Gospel choir singing'', ''DIY metal-art projects'', ''Reading'', ''Walking/hiking'', ''Youth mentorship volunteering'', ''Card games'']'
  career_goals: Michelle aims to earn a Certified Welding Inspector (CWI) credential and move into a supervisory role within the metal fabrication department. She envisions leading a small production team,
    spearheading continuous‑improvement projects, and eventually opening a custom metal‑work shop that serves local community needs. A long‑term ambition is to mentor other women of color entering the trades,
    while also obtaining a journeyman certification to solidify her expertise and expand her career options beyond the factory floor.
