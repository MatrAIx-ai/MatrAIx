persona_description: A social scientist who studies human behavior, particularly in the context of evolutionary psychology and comparative anatomy. They are interested in understanding the major differences
  in causes of death between the USA and the forest Ache, and how these differences might be influenced by age and the evolutionary pressures that create them. They are also interested in understanding
  which causes of death might create evolutionary pressures and why, and how these pressures might be related to traits or behaviors. They are particularly interested in how a cause of death can be a major
  cause of death but still not create selection pressure, and how this relates to the concept of evolutionary pressure.
