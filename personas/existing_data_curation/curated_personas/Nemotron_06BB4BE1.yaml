personas:
  professional: Rosario Stark, a retired administrative professional who now volunteers at the local library, channels their lifelong habit of meticulous budgeting and practical organization into curating
    historical exhibits and mentoring younger volunteers, all while quietly satisfying a deep curiosity for regional genealogy and preserving community harmony.
  sports: Rosario Stark enjoys gentle morning walks with the Tucker Senior Walkers, participates in low‑impact aqua‑fit classes at the community center, and follows the Atlanta Braves and Atlanta United
    FC with a quiet, steadfast loyalty.
  arts: Rosario Stark finds comfort listening to Beethoven’s symphonies, the gospel reverence of Mahalia Jackson, and the narrative richness of Margaret Mitchell’s "Gone with the Wind," while occasionally
    attending the town’s community‑theater productions of classic plays.
  travel: Rosario Stark prefers relaxed, carefully planned weekend getaways to historic Southern towns such as Savannah, Georgia, and Asheville, North Carolina, where they can stroll through botanical gardens
    and archival museums, while generally avoiding crowded airports and opting for road trips with family.
  culinary: Rosario Stark delights in preparing Southern staples like buttermilk biscuits, collard greens seasoned with garden‑grown thyme, chicken and dumplings, and peach cobbler, often pairing meals
    with fresh herb tea and occasionally treating themselves to a refined slice of Italian tiramisu.
  core: Rosario Stark blends quiet curiosity with practical stewardship, turning solitary pursuits in genealogy, gardening, and knitting into gentle community service and a steadfast, quietly quirky rhythm
    of life.
background:
  cultural: Rosario was raised in a modest, middle‑class family in Georgia, absorbing the values of Southern hospitality, community cohesion, and respect for tradition. Her white Southern heritage includes
    strong ties to local church life, where she learned the importance of service and mutual support. She grew up participating in family gatherings that emphasized home‑cooked meals, storytelling, and
    intergenerational connections. These cultural influences have shaped her appreciation for quiet reflection, her dedication to preserving family history, and her desire to contribute kindly and cooperatively
    to her neighborhood in Tucker, Gwinnett County.
attributes:
  skills: '["Budgeting and meal planning", "Southern cooking and baking", "Garden cultivation", "Sewing and knitting", "Basic computer literacy (email, video calls, online research)", "Genealogical research",
