personas:
  professional: Linda Corley, a 45-year-old distribution center site manager, leverages her practical curiosity and competitive drive to streamline operations, motivate staff with her outgoing style, and
    navigate high-pressure challenges while cautiously scrutinizing new technology proposals.
  sports: Linda Corley hikes the Blue Ridge Mountains on weekends, participates in Zumba and boot-camp classes, supports the Carolina Panthers and the Atlanta Braves, and belongs to a local running club
    that meets for 5K races each spring.
  arts: Linda Corley enjoys catching live-music shows featuring artists like Chris Stapleton and local jazz ensembles, regularly attends productions at the community theater starring actors such as John
    Stamos, and discusses contemporary fiction by authors like Sally Rooney in her book club.
  travel: Linda Corley prefers family-focused road trips to scenic destinations such as Asheville, Savannah, and the Great Smoky Mountains, plans each outing using a detailed spreadsheet, and daydreams
    about a future culinary tour of Tuscany once finances allow.
  culinary: Linda Corley excels at cooking Southern comfort dishes—shrimp and grits, fried green tomatoes, and peach cobbler—using fresh vegetables from her garden like okra and sweet potatoes, and she
    routinely hosts elaborate dinner parties for friends and neighbors.
  core: Linda Corley is a competitively spirited, community-oriented operations leader who balances meticulous organization with a love for social gatherings, gardening, and hiking, yet often grapples with
    worry and occasional skepticism.
background:
  cultural: Linda grew up in a middle‑class family in the Charlotte suburbs, where Southern hospitality and community involvement were everyday norms. Attending the local public high school, she participated
    in cheerleading and volunteered at church events, which reinforced values of hard work, loyalty, and neighborly support. Although she did not pursue a college degree, she built her career through on‑the‑job
    training and professional certifications, reflecting the region’s emphasis on practical skill development. Her cultural identity is rooted in the blend of traditional Southern customs—such as family
    meals, church fellowship, and support for local sports teams—and the modern, diverse urban atmosphere of Charlotte, which offers her both a sense of continuity and opportunities for growth.
attributes:
