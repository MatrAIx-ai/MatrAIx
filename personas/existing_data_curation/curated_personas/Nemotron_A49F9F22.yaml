personas:
  professional: Albert Thomas, a seasoned construction project manager with two decades of field experience, blends meticulous budgeting and BIM expertise with a charismatic, talkative presence that turns
    stakeholder meetings into collaborative storytelling sessions, while integrating sustainable design and community-focused aesthetics.
  sports: Albert Thomas, an avid supporter of the New Orleans Saints and the Mississippi State Bulldogs, enjoys weekend pickup basketball at the local community center, participates in biweekly swim laps
    at the municipal pool for low‑impact cardio, and attends the Jackson State University alumni golf outings each spring.
  arts: Albert Thomas immerses themselves in the local arts scene by attending live blues legends like B.B. King tributes, admiring murals by emerging street artists such as Marcus "Moco" Hargrove, painting
    watercolors of historic facades, and performing in community theater productions of August Wilson's "Fences."
  travel: Albert Thomas prefers road trips that blend heritage tourism and culinary discovery, having driven the Blues Trail through the Mississippi Delta, explored the historic streets of Savannah, Georgia,
    and dreaming of a future pilgrimage to New Orleans' French Quarter for its jazz festivals and Creole cuisine.
  culinary: Albert Thomas, a confident home‑cook, masters soul‑food staples like smoked pork ribs with a spice rub of paprika, brown sugar, and cayenne, perfects the classic Southern shrimp and grits, and
    delights in experimenting with heirloom tomatoes, collard greens, and homemade cornbread during weekend barbecues.
  core: Albert Thomas combines a methodical, community‑oriented mindset with a love for blues, bold flavors, and bold conversation, yet wrestles with intense anxiety that fuels both meticulous planning
    and occasional over‑commitment.
background:
  cultural: Albert is a Black man raised in the heart of the American South, deeply rooted in the African‑American traditions of Jackson, Mississippi. His upbringing was shaped by the close‑knit church
    community, gospel music, and the oral storytelling heritage that values resilience, collective uplift, and hospitality. He earned his STEM degree at Jackson State University, an HBCU that fostered a
    strong sense of pride in Black achievement. These cultural influences inform his commitment to community‑centered construction projects, his appreciation for artistic expression, and his dedication
    to mentoring younger Black professionals in the industry.
