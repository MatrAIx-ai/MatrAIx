  career_goals: Albert aims to transition into a senior executive role—such as Director of Construction Operations—where he can shape regional development strategies that blend efficiency with artistic
    and sustainable design. He aspires to earn LEED AP certification and spearhead community‑focused projects that revitalize historic neighborhoods in Jackson. Additionally, he wants to mentor the next
    generation of Black construction professionals, establishing a scholarship pipeline with local HBCUs and serving as a speaker at industry diversity forums.
