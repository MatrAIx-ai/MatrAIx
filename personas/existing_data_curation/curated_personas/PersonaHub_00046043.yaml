persona_description: A historian who is interested in the development of the coinage of the early Arab caliphate in the seventh century, and the transition from coins that closely resembled Byzantine issues
  with imperial images to purely aniconic specimens with inscriptions in Arabic. This person is likely to be familiar with the history of Syria, Palestine, and Egypt, and the impact of the Arab conquests
  of the 630s and 640s on the region. They have a keen interest in the details of the coinage and the inscriptions on them, and are likely to have a strong understanding of the historical context in which
  these coins were produced. They may also be interested in the broader implications of the coinage for the region and the wider world.
