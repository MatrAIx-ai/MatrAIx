    technology'', ''Practicing mindfulness meditation'']'
  career_goals: Jason aims to bridge his technical expertise with his passion for social impact by becoming a leader in data‑driven social work practice. In the next three years he plans to earn a Master
    of Social Work with a concentration in clinical research and advanced program evaluation. He envisions transitioning into a role as an evidence‑based practice specialist or program evaluator for a regional
    nonprofit, where he can design, implement, and assess interventions that leverage technology and analytics to improve outcomes for vulnerable populations. Long‑term, he aspires to direct a community
    services department or launch a tech‑enabled mental‑health platform that integrates data insights with personalized support, earning recognition as an innovator who elevates the effectiveness of social
    services while maintaining a flexible, research‑focused work style.
