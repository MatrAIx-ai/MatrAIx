  career_goals: Horacio dreams of growing up to be someone who can blend his love of art with helping others. He often says he wants to become an artist who paints bright pictures that make people smile,
    or a teacher who can share stories and guide friends in learning. Occasionally he imagines being a community helper—like a firefighter or a doctor—because he enjoys making people feel safe and cared
    for.
