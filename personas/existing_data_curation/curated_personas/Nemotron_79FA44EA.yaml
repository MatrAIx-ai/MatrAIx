personas:
  professional: Kerry Sweetser is a quality assurance specialist in a manufacturing setting, leveraging precise weighing, instrument calibration, and data visualization skills while infusing whimsical digital
    illustrations into process documentation to engage teammates and drive continuous improvement.
  sports: Kerry Sweetser is an avid cyclist and hiker who rides with the Oviedo Trail Riders club, follows the Orlando Magic and Orlando City SC loyally, and incorporates weekend trail runs into a balanced
    fitness routine, while occasionally joining a community soccer league for fun.
  arts: Kerry Sweetser paints oil cityscapes inspired by Monet and James Gurney, creates digital illustrations reminiscent of Studio Ghibli’s whimsical style, strums acoustic guitar to the tunes of Joni
    Mitchell at local open‑mic nights, and participates in community theater productions that echo the energy of Lin‑Manuel Miranda’s works.
  travel: Kerry Sweetser prefers weekend road trips to nearby state parks, has explored Asheville’s art scene and Seattle’s coffee culture, and dreams of a spring pilgrimage to Kyoto to study traditional
    tea ceremonies and Japanese illustration techniques.
  culinary: Kerry Sweetser enjoys cooking Mediterranean dishes like homemade shakshuka with fresh basil and feta, is adept at grilling marinated chicken thighs, and delights in savoring artisanal avocado
    toast topped with smoked salmon and capers at local brunch spots.
  core: Kerry Sweetser balances meticulous QA precision with a vivid artistic imagination, staying serenely organized while buzzing with social energy and occasional over‑commitment to creative side projects.
background:
  cultural: Kerry grew up in the suburban neighborhoods of Oviedo, Florida, in a family with deep roots in the American Midwest, tracing ancestry to English and Irish immigrants. His upbringing reflected
    the Sun-belt’s blend of laid-back outdoor lifestyle and a strong community ethic, with frequent participation in local festivals, high-school sports, and neighborhood gatherings. While his cultural
    heritage is primarily Western European, the multicultural atmosphere of central Florida has exposed him to diverse influences—particularly Latin culinary flavors and a vibrant arts scene—which he embraces
    in his everyday life. He values hard work, reliability, and a collaborative spirit, traits often celebrated in his regional community.
