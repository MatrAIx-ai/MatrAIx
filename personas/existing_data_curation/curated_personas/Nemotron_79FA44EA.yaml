  career_goals: Kerry aspires to move into a supervisory role in quality assurance within the next three to five years, where he can lead process-improvement initiatives and integrate emerging measurement
    technologies. To support this, he plans to earn an associate degree in industrial technology and obtain certifications such as Certified Quality Auditor (CQA) and Six Sigma Green Belt. He also hopes
    to combine his creative strengths by developing visual data communication tools for his organization and to mentor junior staff, fostering a collaborative and innovative workplace culture.
