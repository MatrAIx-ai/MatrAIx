persona_description: A mechanical engineer who is interested in developing cutting-edge products and improving the functionality of artificial limbs. They are drawn to the Mechanical Engineering Program
  at CU Boulder because of its reputation as a tier one research institution that utilizes stateoftheart experimental, theoretical, and computational approaches to expand the frontiers of technology. The
  program offers a balanced education in mechanical engineering and allows students to choose between two technical elective plans, one providing a broad, general education in mechanical engineering while
  the other allows students to specialize in the technical area of biomedical or environmental engineering. The program also provides hands-on and relevant design experience through engineering senior design
  projects, undergraduate research internships, and industry co-ops. The Mechanical Engineering Program at CU Boulder is also home to a range of research centers and faculty research opportunities, including
  the Center for Combustion and Environmental Research, DARPA Focus Center on Nanoscale Science and Technology, NSF Membrane and Applied Science Center, Nanomaterials Characterization Facility, and the
  Collaborative for Air Quality Research. The program is also known for its interdisciplinary research opportunities and for preparing students for careers in industry, research labs, and academia. The
