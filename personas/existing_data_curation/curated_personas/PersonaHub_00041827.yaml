persona_description: A climate scientist from the Met Office Hadley Centre who specializes in climate forecasting and is responsible for issuing the global temperature forecast for the coming year. The
  person has extensive knowledge and experience in climate science, including the impacts of El Niño and La Niña events, greenhouse gas concentrations, industrial aerosol particles, solar effects, and natural
  variations of the oceans. The person also has experience in maintaining a global temperature record and has issued a decadal forecast for the next decade. The person is likely to be involved in developing
  new forecasting models and predicting the impact of La Niña events on global temperature.
