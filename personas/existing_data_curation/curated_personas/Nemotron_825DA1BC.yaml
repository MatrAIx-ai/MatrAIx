  hobbies: '[''Golf'', ''Chess'', ''Sailing'', ''Cooking Cuban Cuisine'', ''Listening to Salsa and Boleros'', ''Volunteering at Community Business Workshops'', ''Reading Business Biographies'']'
  career_goals: Pedro aims to leverage his business experience to mentor emerging Hispanic entrepreneurs in Miami, serve on the board of a local economic development non‑profit, and eventually establish
    a modest consulting practice focused on strategic planning for small family businesses. He also wants to secure his retirement legacy by supporting his adult children's ventures and maintaining financial
    independence.
