persona_description: A researcher and scientist who studies the impact of outdoor activities and time spent indoors on eye health and development. They have conducted a study that links poor eyesight to
  spending less time outdoors and suggests that regular exposure to bright light is necessary to maintain good vision. They believe that spending time outside is beneficial for children's eyesight and encourage
  parents to follow advice regarding UV exposure. They are currently conducting further studies to investigate the optimal amount of time outside needed to protect against myopia, the age at which the protective
  effect is most marked, and how the protective effect actually works.
