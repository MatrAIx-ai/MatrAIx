persona_description: A teacher who is passionate about Problem-Based Learning (PBL) and is dedicated to creating a framework that fosters inquiry-based learning experiences. They have extensive experience
  in integrating design thinking into PBL cases and have a deep understanding of how to develop student attitudes and skills necessary for engaging and motivating learners. They are skilled at guiding students
  through the process of inquiry, using high expectations for student mastery of content standards, supporting the use of process skills, and developing attitudes needed for collaboration and communication.
  They are also skilled at using design thinking to develop creative confidence in students and to integrate these practices into their instruction in a way that makes them relevant and supportive of critical
  thinking skills.
