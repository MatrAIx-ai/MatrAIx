    (Agile Basics)"]'
  hobbies: '["Soccer (playing and watching)", "Cooking Colombian recipes", "Fishing and boating", "Fitness (gym/weight training)", "Reading business and leadership literature", "Listening to Latin music",
    "Photography (sunsets, coastal scenes)", "Participating in fantasy sports leagues", "Community volunteering with Colombian cultural group"]'
  career_goals: Javier aims to advance to a senior category manager role where he can lead a multidisciplinary procurement team and shape the company’s sourcing strategy across the Southeast United States.
    He is focused on integrating AI‑driven analytics into the buying process to further boost efficiency and predictive accuracy. Over the next five years, he plans to obtain a Certified Professional in
    Supply Management (CPSM) credential and expand the firm’s supplier network in Colombia, positioning himself as a bridge between North‑American retailers and Latin American producers. Ultimately, Javier
    hopes to launch his own boutique import business specializing in high‑quality Colombian artisanal goods, leveraging his industry expertise and cultural connections.
