  career_goals: Matthew dreams of becoming a veterinarian or wildlife rehabilitator, driven by his love for animals and his desire to care for those in need. He also imagines a future as a research assistant
    who uses precise data collection to protect the environment. Ultimately, he wants a career that blends his disciplined, structured approach with his deep compassion, allowing him to help living beings
    while maintaining order and predictability in his work.
