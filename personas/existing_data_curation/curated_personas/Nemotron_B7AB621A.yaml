    public safety education'']'
  hobbies: '[''Amateur soccer (midfielder)'', ''Salsa dancing'', ''Community festival participation'', ''Jogging (LA River trail)'', ''Cooking Spanish cuisine (paella, gazpacho)'', ''First‑aid volunteering'',
    ''Listening to music (Spanish guitar, rock)'', ''Neighborhood safety workshops'']'
  career_goals: Jose aims to advance into a supervisory and training role within the public safety communications center, such as Shift Supervisor or Training Coordinator, where he can shape protocol implementation
    and mentor new dispatchers. He is pursuing an associate degree in Emergency Management to deepen his strategic understanding of public safety. Over the next five years, he hopes to obtain certification
    as a Certified Public Safety Telecommunicator (CPT) and lead community outreach programs that improve emergency preparedness among Spanish‑speaking residents of Pico Rivera. Ultimately, he envisions
    transitioning into an emergency management analyst position at the county level, blending his hands‑on dispatch experience with policy development while achieving a healthier work‑life balance.
