persona_description: A scientist who specializes in the study of virus detection and biosensors, particularly in the field of adenovirus detection and quantification. She is a PhD student at the University
  of Leeds and has developed a novel technique for testing for the presence and number of adenovirus particles using an electrical sensor and reduced antibody fragments. The research has been funded by
  ELISHA Systems Ltd and has potential applications in healthcare and medical diagnostics.
