persona_description: Farzaneh Khorsandi, PhD, is an Assistant Safety and Health Engineering Specialist in Cooperative Extension at the University of California, Davis. Her main research interest is on agricultural
  machinery safety with a focus on engineering control methods. She has worked on several projects related to rollover protective structures for tractors and is currently developing the first Agricultural
  ATV safety test station in the United States at UC, Davis. Her expertise lies in the hierarchy of control, including elimination or substitution, engineering control, administrative authority, training,
  and personal protective equipment.
