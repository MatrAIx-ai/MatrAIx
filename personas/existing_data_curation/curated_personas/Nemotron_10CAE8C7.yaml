  career_goals: Kim aims to earn her Professional Engineer (PE) license within the next two years and transition into a senior electrical engineer position where she can lead the development of reliable
    power solutions for medical devices and other health‑technology products. Over the next five to seven years she envisions taking on a technical leadership role—such as a principal engineer or engineering
    manager—where she can mentor junior staff, guide cross‑functional project teams, and influence product strategy. To support these goals she plans to pursue a part‑time Master’s degree in Systems Engineering
    and obtain certifications in reliability engineering and project management, while maintaining a balanced workload that respects her personal well‑being.
