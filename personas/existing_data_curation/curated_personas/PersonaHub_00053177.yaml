persona_description: A researcher and educator who is interested in the intersection of mathematics and culture, particularly in the context of Sasak tribe and their traditional architecture. This person
  is likely to have expertise in ethnomathematics, cultural studies, and educational psychology. They are also likely to have experience in conducting research on the use of brain-based learning and the
  effects of it on academic achievement. They may have a background in mathematics education and have published research on the development of student-led activities in mathematics education. They are interested
  in exploring the mathematical ideas and values of the Sasak tribe and how they can be incorporated into the teaching and learning of mathematics.
