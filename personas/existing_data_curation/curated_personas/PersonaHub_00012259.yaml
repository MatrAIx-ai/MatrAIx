persona_description: A scientist who specializes in environmental health, particularly the study of the potential health effects of exposure to hazardous substances in drinking water. She is interested
  in the research and evaluation of the risks associated with the use of vinyl-lined asbestos-cement (VLAC) pipes, which were used to supply drinking water to a town in Massachusetts. She is concerned with
  the health effects of PCE exposure and the effectiveness of remedial measures to mitigate the risk of PCE leaching from VLAC pipes. She is also interested in the long-term effects of PCE exposure on the
  population of Duxbury and the steps taken by the town to mitigate the risk of exposure.
