personas:
  professional: Morganna Lamb, a budding mini architect in the preschool sandbox, constructs block towers with a surprising blend of inventive curiosity and practical sturdiness, thriving on flexible playtime
    rather than rigid schedules, and they proudly showcase each new creation to an appreciative audience of stuffed animals.
  sports: Morganna Lamb prefers solo rides on her tricycle in the neighborhood park and occasionally joins a small group for a brief T‑ball game, cheering for the hometown minor league baseball team, the
    River City Reds, while maintaining a competitive edge over their own personal best lap times, and they celebrate every small victory with a triumphant grin.
  arts: Morganna Lamb delights in fingerpainting to the upbeat tunes of The Wiggles, often humming 'Fruit Salad' while creating bright scenes inspired by Eric Carle's illustrations, which shape their playful
    identity and quiet artistic exploration, and they love to share their colorful masterpieces with family members during snack time.
  travel: Morganna Lamb enjoys short family trips to the nearby aquarium and dreams of a sunny adventure at Disneyland Paris, favoring unplanned beach sandcastle sessions over strict itineraries and valuing
    flexibility in every journey, and they often pack their favorite stuffed bunny for comfort on the road.
  culinary: Morganna Lamb prefers creamy macaroni and cheese sprinkled with shredded cheddar and a side of buttery peas, eagerly helping whisk pancake batter despite often leaving a sticky mess on the counter,
    showcasing their enthusiastic yet somewhat messy culinary curiosity, and they proudly declare themselves the 'king of cheese' after each bite.
  core: Morganna Lamb is a precociously curious yet delightfully disorganized three‑year‑old who balances solitary imagination with a subtle competitive streak, never letting a spilled cup or stray toy
    ruin their sunny outlook, and they constantly seek new puzzles to solve.
background:
  cultural: Morganna is raised in a predominantly white, middle‑class neighborhood of Ballwin, Missouri, a suburb of St. Louis County known for its Midwestern values of modesty, practicality, and strong
    community ties. Her family participates in local traditions such as church holidays, county fair celebrations, and library story‑time events. She attends a Catholic preschool that emphasizes respect,
    teamwork, and hands‑on learning, reinforcing both curiosity and practical responsibilities like tidying up after activities. The cultural setting encourages outdoor play in parks and backyard barbecues,
    fostering a balance between new ideas and established community practices.
attributes:
  skills: '["Basic language and naming skills", "Fine motor coordination (stacking blocks, crayon drawing)", "Simple problem solving (puzzles, shape sorters)", "Independent play and self‑entertainment",
