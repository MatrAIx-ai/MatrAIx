  hobbies: '["Building wooden block towers", "Crayon drawing and coloring", "Listening to picture books", "Exploring local park and creek", "Watching ducks and farm animals", "Simple puzzles (shape sorters,
    matching games)", "Sing‑along children’s songs", "Small‑group hide‑and‑seek"]'
  career_goals: Morganna often talks about wanting to be a teacher because she loves storytime, or a veterinarian because she adores the animals she sees at the local farm. She also enjoys building tall
    towers with blocks and imagines becoming an architect. Her ambition is to keep learning new things, explore practical ways to help others, and turn her curiosity into simple, real‑world contributions.
