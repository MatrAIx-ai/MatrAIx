personas:
  professional: Morgan Miller is a driven commercial‑vehicle operator and budding logistics strategist who blends meticulous route planning with on‑the‑fly schedule adjustments, leverages strong sales and
    negotiation skills to secure delivery contracts, and channels a competitive yet calm demeanor—paired with a healthy skepticism toward unvetted shortcuts—toward a future fleet‑supervisor role that will
    specialize in artist‑friendly freight.
  sports: Morgan Miller devotes weekends to desert hiking and mountain‑bike trails in spring, competes avidly in the Imperial County Spinners ultimate frisbee league, and roots for the San Diego Padres
    (MLB), the LA Lakers (NBA), and the San Diego State Aztecs men's soccer team.
  arts: Morgan Miller journeys through Imperial County’s mural corridors, photographing vibrant works by Shepard Fairey, local legend Liese Miller, and the ever‑enigmatic Banksy, while regularly attending
    live shows at San Diego’s House of Blues featuring The Black Keys and Los Lobos, and volunteers at the Yuma Art Collective to assist with art‑curation logistics.
  travel: Morgan Miller favors spontaneous road trips that weave through Joshua Tree, the Grand Canyon, and the coastal highways of Baja California, uses a mix of digital planning apps and gut instinct
    to map routes that balance scenic detours with efficient freight legs, and dreams of a future cross‑country art‑transport showcase that stops at galleries in Austin, Portland, and New York.
  culinary: Morgan Miller enjoys cooking Mexican‑inspired dishes like carne asada tacos with fresh cilantro, lime, and roasted chiles de árbol, crafts homemade salsa verde with tomatillos, and occasionally
    experiments with chiles en nogada, all while wielding a portable stovetop in the truck’s custom kitchenette and performing a meticulous mise‑en‑place before each culinary adventure.
  core: Morgan Miller fuses a desert‑road work ethic with an artist’s eye, staying cool under pressure while fiercely debating route efficiency and mural aesthetics, and constantly upgrades their truck
    as a rolling canvas for creativity and competition.
background:
  cultural: Morgan grew up in Imperial, a desert farming community near the U.S.–Mexico border. While her family background is white and rooted in the agricultural and small‑business culture of the Imperial
    Valley, she has been exposed to the rich Mexican‑American traditions that shape the region, from the annual Dia de los Muertos celebrations to the local cuisine and bilingual street signs. This blend
    of rural self‑reliance and cross‑cultural interaction has given her a pragmatic outlook, a deep respect for diverse artistic expressions, and an appreciation for the communal spirit that permeates both
    the farming and border‑influenced neighborhoods.
attributes:
  skills: '[''Commercial Driving (CDL Class A)'', ''Route Planning & Navigation'', ''Vehicle Inspection & Basic Maintenance'', ''Customer Service & Relationship Management'', ''Sales Negotiation'', ''Time
    Management & Adaptability'', ''Logistics Documentation'', ''Resilience to High‑Heat Working Conditions'', ''Basic Art Curation Knowledge'', ''Team Collaboration'']'
  hobbies: '[''Mural & Street‑Art Tours'', ''Live Music Concerts'', ''Desert Hiking & Mountain Biking'', ''Ultimate Frisbee'', ''Photography (Street Art & Landscapes)'', ''Truck Customization'', ''Cooking
    Mexican‑Inspired Dishes'', ''Volunteering at Community Festivals'', ''Reading Technology & Sci‑Fi Blogs'', ''Participating in Local Art Workshops'']'
  career_goals: Morgan aims to obtain her full CDL Class A license and move from local deliveries to long‑haul freight, ultimately working toward a fleet supervisor role where she can oversee driver performance
    and route efficiency. She plans to pursue a logistics certification through a community college to deepen her understanding of supply‑chain management. In the longer term, she envisions launching her
    own boutique transportation service that specializes in safe, artist‑friendly delivery of artwork and cultural items throughout Southern California, merging her love for art with her expertise in trucking
    and sales.
