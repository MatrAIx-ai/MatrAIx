persona_description: A high school English teacher who specializes in teaching literature and literature study, particularly in the context of analyzing and interpreting literary texts. The teacher has
  a deep understanding of the CCSS and the ELA standards, and is skilled in using innovative teaching methods to enhance student learning. The teacher is knowledgeable about the Shakespearean canon and
  contemporary literature, and has experience teaching both genres. The teacher is skilled in using digital resources, such as the Folger Shakespeare Library text, and is able to adapt lessons to different
  levels of student ability. The teacher is knowledgeable about the challenges of teaching Early Modern English and is skilled in providing direction and guidance to students. The teacher is passionate
  about teaching and is dedicated to helping students develop critical thinking skills and a love for literature.
