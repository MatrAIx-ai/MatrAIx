  hobbies: '[''Beachcombing'', ''Gardening'', ''Fishing'', ''Reading historical fiction'', ''Ukulele playing'', ''Woodworking'', ''Traditional Polynesian cooking'', ''Attending small cultural gatherings'',
    ''Documentary watching'', ''Volunteer mentoring'']'
  career_goals: Although not currently in the workforce, Daniel aims to formalize his self‑education by obtaining a GED, which would enable him to contribute more effectively to community projects. He aspires
    to become a recognized cultural mentor within Long Beach's Polynesian community, sharing traditional cooking, music, and stories with younger generations. He also hopes to expand the community garden
    he tends, turning it into a collaborative learning space. Maintaining his health and independence is a personal priority, and he dreams of documenting his family’s migration story in a memoir that celebrates
    resilience and cultural heritage.
