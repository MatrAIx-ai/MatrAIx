  career_goals: In her later years, Lathy aims to compile a memoir that weaves her personal journey with the broader history of Bladenboro, and to curate a traveling exhibit of her watercolor and quilting
    work to inspire younger generations. She hopes to record and archive oral histories of longtime residents, preserving the community’s heritage for future scholars. Lathy also aspires to lead intergenerational
    workshops at the senior center, mentoring youth in quilting, storytelling, and creative writing, while continuing to learn new artistic techniques to keep her mind active and her emotional well‑being
    balanced.
