  career_goals: Kevin aims to transition into a senior advisory role where he can mentor the next generation of HR professionals and shape strategic initiatives that improve employee wellbeing. He is passionate
    about creating flexible work policies and stress-reduction programs that reflect his own experiences with worry and burnout. Over the next few years, he hopes to lead a company-wide culture-change project
    that embeds empathy, collaboration, and resilience into the organization’s core values before winding down to part-time consulting.
