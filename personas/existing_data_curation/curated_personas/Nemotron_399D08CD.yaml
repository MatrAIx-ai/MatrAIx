  career_goals: Although still young, B dreams of combining his love for teamwork and excitement. He hopes to become a professional soccer player who can lead a team, or a space explorer who can share his
    adventures on video. He also imagines interviewing friends on his own YouTube channel, turning his talkative nature into a platform to entertain and inspire. Short‑term, he aims to captain his school’s
    soccer team and win the regional science fair with a project that shows how everyday materials can create a small rocket.
