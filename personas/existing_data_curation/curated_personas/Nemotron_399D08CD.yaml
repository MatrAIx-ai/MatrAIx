  hobbies: '[''Soccer'', ''Biking'', ''Minecraft'', ''Fortnite'', ''LEGO building'', ''Science experiments (slime, volcanoes)'', ''Reading adventure books (Percy Jackson, Harry Potter)'', ''Performing jokes/skits'',
