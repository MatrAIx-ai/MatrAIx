persona_description: A researcher who specializes in the study of reading disorders, particularly those related to dyslexia. She has conducted research on the relationship between reading fluency and automaticity
  in readers with dyslexia, using the Rapid Automatic Naming Stroop Switch task. Her research interests include the specific processes involved in automaticity deficits in dyslexic readers, the impact of
  dyslexia on reading fluency, and the development of effective intervention strategies for dyslexic readers.
