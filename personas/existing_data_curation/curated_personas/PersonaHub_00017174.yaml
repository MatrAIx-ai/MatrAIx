persona_description: A Canadian historian who specializes in the contributions and achievements of Black Canadians in the fields of science and technology. His research focuses on the life and work of Anderson
  Ruffin Abbott, Elijah McCoy, and William Peyton Hubbard, and the impact of their contributions on Canadian society. He is particularly interested in their struggles for education and integration, and
  their efforts to break down racial barriers in science and technology. His work includes writing and publishing articles, conducting interviews with surviving family members, and organizing public events
  to honor their memory.
