  hobbies: '[''watercolor painting'', ''landscape photography'', ''hiking the Kalalau Trail'', ''herb gardening'', ''reading culinary history'', ''yoga'', ''volunteering at community food banks'', ''attending
    local art exhibitions'']'
  career_goals: Her primary ambition is to open a boutique bakery in Kapaa that showcases a signature line of Vietnamese‑Hawaiian fusion pastries, such as taro‑infused bánh bao and pineapple‑scented croissants.
    She hopes to earn a professional pastry certification from a recognized culinary institute, expand her offerings to include catering for local festivals, and publish a small cookbook that documents
    her experimental recipes. Long‑term, Thi aims to mentor youth from the island’s underserved communities, establishing a weekly apprenticeship program that blends baking skills with cultural storytelling.
