persona_description: James Robert Lincoln Diggs was an influential African-American scholar and educator who played a significant role in the development of the NAACP. He was the first African-American
  to earn a Ph.D. in sociology and was a key figure in the Niagara Movement, which was the forerunner of the NAACP. Diggs was a colleague of W.E.B. DuBois and was one of the few black educators to participate
  in the Niagara Movement. He was also a member of the national Equal Rights League and served as its national vice president. Diggs was regarded for his scholarly sermons, including an eloquent defense
  of Marcus Garvey during the third International Convention of Garvey Universal Negro Improvement Association in August 1922.
