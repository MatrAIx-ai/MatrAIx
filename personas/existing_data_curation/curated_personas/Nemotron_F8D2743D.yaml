personas:
  professional: Angie Bryan, a seasoned private investigator in Brooklyn, blends meticulous case management with on‑the‑fly adaptability, leveraging covert surveillance, open‑source intelligence, and a
    deep network of law‑enforcement contacts while navigating the male‑dominated field with a competitive drive and a relaxed attitude toward rigid schedules.
  sports: Angie Bryan, a regular at a downtown boxing gym where they spar three nights a week, also follows the New York Knicks, the New York Yankees, and the Brooklyn Nets, and occasionally joins community
    soccer pick‑up games in the spring.
  arts: Angie Bryan, who directs and acts in a community theater troupe that stages works spotlighting African‑Diaspora narratives, regularly dances to the rhythms of Celia Cruz at Brooklyn salsa nights,
    writes detective‑fiction reviews for a literary blog, and captures street life through a Leica camera while sipping on a Miles Davis record at jazz clubs.
  travel: Angie Bryan, who alternates between meticulously planning trips to heritage sites like Ghana’s Cape Coast Castle and spontaneous weekend getaways to New Orleans for its jazz and Creole cuisine,
    balances a love of cultural immersion with a practical budget that favors direct flights and Airbnb stays.
  culinary: Angie Bryan, an experimental home cook, frequently prepares soul‑food staples such as collard greens simmered with smoked turkey, Caribbean jerk chicken marinated in scotch bonnet peppers, and
    sweet potato pie spiced with nutmeg, while also hunting for fresh okra and plantains at the local farmers market.
  core: Angie Bryan, a competitive yet laid‑back investigator, channels her love of salsa, boxing, and community storytelling into a vibrant life where structured cases coexist with spontaneous social thrills
    and occasional budgeting slip‑ups.
background:
  cultural: Angie is a second‑generation African‑American who grew up in a close‑knit Brooklyn community steeped in Black cultural traditions. Her family maintains ties to Southern gospel music, soul cuisine,
    and the civil‑rights legacy of the 1960s, which inform her strong sense of community responsibility. She actively participates in neighborhood block parties, church gatherings, and local advocacy groups,
    drawing on these experiences to build rapport with clients and witnesses. Her cultural heritage provides both a rich reservoir of historical knowledge and a network of relationships that enhance her
    investigative work.
attributes:
  skills: '[''Surveillance'', ''Interviewing'', ''Open-source intelligence (OSINT)'', ''Legal knowledge'', ''Analytical reasoning'', ''Networking'', ''Self-defense'', ''Report writing'', ''Crisis negotiation'',
