  hobbies: '[''Salsa dancing'', ''Community theater acting'', ''Reading detective fiction'', ''Youth mentorship volunteering'', ''Urban gardening'', ''Cooking soul food'', ''Boxing'', ''Jazz club attendance'',
    ''Travel'', ''Street photography'']'
  career_goals: Angie aims to transform her solo practice into a boutique investigative agency that specializes in cold‑case and missing‑person investigations across New York City. She plans to secure accreditation
    from the National Association of Investigative Professionals and to develop a mentorship program that recruits and trains young Black investigators from underrepresented backgrounds. Additionally, she
    hopes to author a memoir‑style guide that blends case studies with reflections on navigating a predominantly male field, and to collaborate with local law‑enforcement agencies on community‑safety initiatives.
