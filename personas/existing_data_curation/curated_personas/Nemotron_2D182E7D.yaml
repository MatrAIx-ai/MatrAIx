personas:
  professional: John Trotter, a self‑directed teen aspiring graphic design technician, leverages disciplined organization, a sharp eye for visual detail, and basic Python scripting to coordinate the county
    fair’s art showcase while they hone digital illustration skills on free software.
  sports: John Trotter enjoys solitary hikes along the nearby Greenridge Trail and occasional bike rides, follows the high‑school Centerville Cougars football team and the State University Wildcats basketball
    squad, and while they occasionally jog to stay fit, they prefer the quiet of nature over organized sports.
  arts: John Trotter immerses themselves in indie folk, looping Bon Iver and Sufjan Stevens while they sketch landscapes inspired by Edward Hopper’s rural scenes, and they regularly volunteer to arrange
    the county fair’s art showcase, finding community connection through curated exhibitions.
  travel: John Trotter favors low‑key road trips to nearby ghost towns and state parks, dreaming of a solo photography expedition to Sedona’s red rocks and a weekend in the English Cotswolds, yet they often
    postpone travel plans due to college tuition savings and a tight part‑time schedule.
  culinary: John Trotter prefers simple, rustic meals like chicken pot pie with rosemary, apple crumble, and grilled cheese paired with tomato soup, and while they possess moderate cooking skills enabling
    them to experiment with seasonal herbs, they habitually skip breakfast, relying on coffee and a granola bar to start the day.
  core: John Trotter is a meticulous solitary dreamer who catalogues every stray thought in a battered notebook while they obsessively perfect sketches of abandoned barns.
background:
  cultural: John comes from a white, Midwestern rural background typical of Appanoose County, IA. His family’s ancestry includes German and Scandinavian settlers who valued hard work, self‑reliance, and
    community involvement. He grew up attending a small local church, participating in county fairs, and experiencing the close‑knit culture of a small town where neighbors rely on each other. These influences
    have shaped his disciplined work ethic, modest demeanor, and appreciation for both the practical and aesthetic aspects of everyday life.
