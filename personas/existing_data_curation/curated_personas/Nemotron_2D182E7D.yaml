  career_goals: John aims to enroll in a community college or trade school to earn an associate degree in graphic design or industrial technology. He hopes to blend his artistic interests with practical
    skills by working as a design technician for a manufacturing firm or launching a custom furniture and décor business that emphasizes handcrafted, artistic pieces. Long‑term, he dreams of curating a
    small local art exhibition that showcases rural youth creativity, combining his love for art, organization, and community engagement.
