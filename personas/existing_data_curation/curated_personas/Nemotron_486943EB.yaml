personas:
  professional: Peyton Riggs fuses three decades of secondary physics and mathematics teaching with a pragmatic, student‑centered pedagogy, designing labs that double as living experiments, mentoring novice
    teachers, and shepherding district‑wide STEM reforms while balancing meticulous curriculum planning with on‑the‑fly flexibility, and they consistently encourage curiosity while safeguarding structure.
  sports: An avid early‑morning fisherman on Galveston Bay, weekend hiker in the Texas Hill Country, and supporter of the Houston Astros, Houston Rockets, and Dallas Cowboys, Peyton Riggs also belongs to
    a local hiking club and they occasionally join community fishing tournaments.
  arts: Peyton Riggs cultivates a rich artistic life through astrophotography, listening to classic rock legends like David Bowie and regional Tex‑Mex folk groups such as Los Lobos, devouring biographies
    of luminaries like Carl Sagan and Marie Curie, and they attend planetarium shows and community theater productions starring local artists.
  travel: Peyton Riggs favors purposeful travel, often planning low‑key weekend getaways to dark‑sky locales like Big Bend National Park and international culinary trips to Oaxaca, Mexico, while balancing
    a modest travel budget and family commitments, and they dream of a future road‑trip across the western United States to visit historic scientific sites such as the Lowell Observatory.
  culinary: Peyton Riggs enjoys experimenting with Tex‑Mex cuisine, frequently preparing dishes like chicken mole poblano, shrimp tacos with chipotle‑lime sauce, and homemade guacamole featuring ripe avocados
    and fresh cilantro, while their cooking skill sits at an enthusiastic intermediate level that blends tried‑and‑true family recipes with adventurous ingredients, and they often share leftovers with neighbors.
  core: Peyton Riggs blends a lifelong devotion to hands‑on STEM education with a reflective, worry‑prone nature, juggling meticulous lesson plans, occasional indulgences in fishing gear, and a steadfast
    commitment to mentoring the next generation, and they often pause to stare at the night sky for reassurance.
background:
  cultural: Peyton was born and raised in suburban Houston to a middle‑class, Southern‑Baptist family. Growing up in a city known for its cultural diversity, he developed an appreciation for the rich blend
    of Texan and Mexican‑American traditions—evident in his fluency in basic Spanish, his enjoyment of regional foods, and his incorporation of multicultural scientific contributions into lessons. His upbringing
    emphasized community service, humility, and a strong work ethic, values that continue to shape his collaborative teaching style and his dedication to fostering harmony in the classroom. While he identifies
    with classic Texan values of independence and hospitality, he also embraces the progressive, inclusive spirit of modern Houston, striving to ensure all students feel represented and supported.
attributes:
  skills: '[''Physics and Mathematics content knowledge'', ''Curriculum development'', ''Project‑based learning design'', ''Differentiated instruction'', ''Classroom technology integration'', ''Laboratory
