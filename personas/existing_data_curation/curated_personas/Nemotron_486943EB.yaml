  hobbies: '[''Fishing'', ''Hiking'', ''Gardening'', ''Astronomy'', ''Reading historical biographies'', ''Woodworking (model rockets)'', ''Chess'', ''Cooking Tex‑Mex cuisine'', ''Community tutoring'', ''Mindfulness
    meditation'']'
  career_goals: Peyton aims to leave a lasting impact on STEM education in his district before retirement. His primary ambitions include becoming the STEM department chair to guide district‑wide curriculum
    reforms, securing funding for a state‑of‑the‑art makerspace that supports robotics and engineering projects, and establishing a mentorship program that pairs experienced teachers with early‑career educators.
    He also hopes to publish a practical guide on integrating project‑based labs into high‑school curricula, present workshops at regional education conferences, and ensure that underrepresented students
    in Houston have equitable access to advanced science courses. Additionally, he envisions transitioning to a consulting role to support other schools in building inclusive, curiosity‑driven learning
    environments.
