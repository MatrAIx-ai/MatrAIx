  hobbies: '[''Abstract painting'', ''Coastal photography'', ''Reading speculative fiction'', ''Creative writing'', ''Cooking Latin-Florida fusion dishes'', ''Salsa dancing'', ''Volunteering at local art
    events'', ''Spanish-language book club'', ''Shell jewelry making'', ''Yoga'']'
  career_goals: Elba aims to progress from her current warehouse role to a shift supervisor position within the next two years, obtaining a Certified Supply Chain Professional (CSCP) credential to strengthen
    her logistics knowledge. She envisions eventually moving into a logistics coordinator or supply chain analyst role where she can blend her operational expertise with strategic planning. Concurrently,
    she dreams of launching a small boutique—both a physical storefront and an online shop—that showcases her abstract paintings, handmade coastal jewelry, and curated Latin‑inspired home décor, using her
    supply‑chain skills to manage inventory and shipping. Elba also hopes to mentor new hires, especially within the Latino community, fostering growth and cultural pride in the workplace.
