personas:
  professional: Elba Cubas blends systematic warehouse management—proficient in WMS, barcode scanning, and forklift operation—with an artistic flair for visual signage and product displays, delivering reliable
    order fulfillment while injecting creative problem‑solving into logistics processes, positioning themselves for a shift supervisor role and eventual supply‑chain analysis.
  sports: Elba Cubas combines a love for sunrise beach jogs with membership in the Fernandina Beach Yoga Collective, follows the Jacksonville Jaguars in the NFL and the Jacksonville Jumbo Shrimp during
    baseball season, and participates in a recreational co‑ed soccer league called Amelia Island Strikers, balancing competitive spirit with relaxed weekend paddle‑boarding sessions.
  arts: Elba Cubas immerses themselves in abstract painting inspired by Kandinsky and Pollock, curates coastal photography series reminiscent of Ansel Adams’ tonal mastery, reads speculative fiction by
    Margaret Atwood and N.K. Jemisin, writes short surreal stories, and finds rhythmic inspiration in the music of Buena Vista Social Club and the modern beats of Thievery Board, all of which influence
    their creative output and community art‑festival volunteer work.
  travel: Elba Cubas prefers a blend of spontaneous weekend road trips along Florida’s Gulf Coast—revisiting Amelia Island, exploring the historic streets of St. Augustine, and snorkeling in the Florida
    Keys—and carefully planned international escapes to coastal destinations such as Cartagena, the Azores, and Reykjavik, where they seek vivid light for photography while balancing travel costs against
    their boutique launch budget.
  culinary: Elba Cubas enjoys crafting Latin‑Florida fusion dishes like citrus‑marinated grouper al mojo with plantain yucca fritters, shrimp ceviche with mango and habanero, and key‑lime pie topped with
    toasted coconut, demonstrating a confident home‑cooking skill set that mixes fresh seafood, tropical fruits, and aromatic spices such as cumin, cilantro, and smoked paprika.
  core: Elba Cubas is a meticulously organized logistician who channels boundless imagination into vibrant art, spontaneous seaside cooking, and a disciplined pursuit of career advancement, all while juggling
    occasional procrastination on paperwork and a habit of arranging pantry items by colour.
background:
  cultural: Elba is a second‑generation Latina of Cuban descent, raised in a bilingual household in Florida. Her family celebrates traditional Cuban holidays, enjoys salsa and merengue music, and prepares
    classic dishes like arroz con pollo and empanadas, while also embracing the coastal flavors of the Gulf. She maintains strong ties to the local Hispanic community, attending cultural festivals, supporting
    fellow Latin‑American artisans, and speaking Spanish at home. These cultural roots enrich her artistic vision—she often incorporates Cuban motifs and vibrant color palettes into her abstract works—and
    inform her collaborative approach, valuing community, family, and shared heritage.
attributes:
  skills: '[''Inventory management'', ''Order processing'', ''Warehouse Management System (WMS) operation'', ''Forklift certification'', ''Bilingual Spanish-English communication'', ''Creative visual design'',
