    "Telehealth facilitation"]'
  hobbies: '["Gardening", "Birdwatching", "Reading historical fiction", "Quilting", "Sailing", "Fishing", "Yoga", "Mindfulness meditation", "Volunteer work at food bank", "Church outreach", "Community theater
    (backstage)"]'
  career_goals: Gail plans to obtain Certified Wound Care Nurse (CWCN) certification within the next two years and transition to a part‑time clinical educator role at a local community college, teaching
    practical nursing courses. She aims to develop a mental‑health resilience program for nursing staff, leveraging her personal experience with anxiety, and to spearhead a quality‑improvement initiative
    that reduces medication errors in the home‑health agency where she works. Long‑term, she hopes to mentor a cohort of younger nurses through a structured mentorship program, volunteer as a hospice‑care
    consultant after retirement, and collaborate with the county health department to expand community screening and health‑fair programs.
