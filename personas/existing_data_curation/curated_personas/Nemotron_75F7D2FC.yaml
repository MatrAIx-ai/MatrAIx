personas:
  professional: Rosario Toney is a high school sophomore who channels their curiosity and artistic drive into a fledgling freelance illustration side-hustle for indie zines, leveraging sketching and mixed-media
    collage skills while they maintain a relaxed attitude toward deadlines and a competitive streak that constantly battles bouts of disorganization, forcing them to adopt a loose, project-by-project workflow
    that suits their love of flexibility.
  sports: Rosario Toney is an avid follower of the Marceline Mustangs high school basketball team and the St. Louis Cardinals, enjoys casual weekend hikes through local woods that double as moving sketches
    for their art, yet they rarely join formal sports clubs, preferring solitary exploration over team drills, and they occasionally dabble in yoga videos from indie creators to stretch out after long drawing
    sessions.
  arts: Rosario Toney immerses themselves in sketching, mixed-media collages, and online art community exchanges, drawing inspiration from Yayoi Kusama's dots, the surreal narratives of Leonora Carrington,
    the experimental sounds of Sufjan Stevens, and the magical realism of Gabriel Garcia Marquez, while they maintain a skeptical eye that pushes them to constantly refine technique and their anxiety fuels
    expressive, emotive motifs.
  travel: Rosario Toney dreams of wandering the misty forests of the Pacific Northwest and the sun-drenched cliffs of Cinque Terra, but currently satisfies wanderlust by exploring the fields and wooded
    trails around Marceline, mapping secret sketch spots on a battered notebook, and they plan low-budget trips with friends to nearby state parks like Yellowstone whenever school allows.
  culinary: Rosario Toney prefers simple yet experimental meals like avocado toast sprinkled with chili flakes, hand-rolled sushi with cucumber and pickled ginger, and late-night ramen bowls flavored with
    miso and sriracha, while they hover between student-level microwave hacks and occasional confident sautéing after a burst of creative energy.
  core: Rosario Toney is a solitary, art-obsessed teen whose fierce curiosity and competitive streak drive a whirlwind of sketchbooks, anxiety-fueled journaling, and impulsive spending on creative tools,
    all tempered by a laid-back attitude toward structure and a penchant for secret forest hideouts.
background:
  cultural: Rosario grew up in Marceline, Missouri, a modest Midwestern town famed for its historic connection to Walt Disney. Her family’s heritage is primarily of European descent, and she was raised
    with traditional small‑town values such as self‑reliance, modesty, and respect for community traditions. The town’s quiet streets, surrounding farmland, and the legacy of storytelling through local
    arts programs nurtured her appreciation for solitude, nature, and creative expression. While she embraces these community roots, her curiosity drives her to explore unconventional ideas and artistic
    pursuits beyond the conventional expectations of her environment.
attributes:
  skills: '[''pencil sketching'', ''watercolor painting'', ''digital illustration (Procreate)'', ''creative writing'', ''short story crafting'', ''photography (smartphone)'', ''online research for art techniques'']'
