    found objects for collages'', ''journaling emotions'', ''participating in small art clubs'', ''mindfulness drawing'']'
  career_goals: Rosario dreams of turning her artistic passions into a flexible, independent career. She aims to earn a scholarship to an art-focused college where she can study graphic design or animation.
    Long‑term, she envisions working as a freelance concept artist or illustrator for indie video games and children’s books, allowing her to create visual narratives on her own terms. She also hopes to
    channel her personal experience with anxiety into art‑based mental‑health projects, collaborating with organizations that use creative expression to raise awareness and support peers. Competing in national
    art competitions and building a modest online following are milestones she actively pursues.
