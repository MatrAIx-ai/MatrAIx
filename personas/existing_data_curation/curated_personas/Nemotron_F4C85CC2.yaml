  hobbies: '[''Visiting Contemporary Art Galleries'', ''Digital Illustration'', ''Collecting and Restoring Vintage Arcade Machines'', ''Playing Strategy Board Games (Go, Settlers of Catan)'', ''Reading
    Science‑Fiction and Philosophy'', ''Mindfulness Meditation'', ''Writing Reflective Essays'', ''Practicing Mandarin Calligraphy'', ''Hiking Local Trails'']'
  career_goals: He aims to advance from his current role as a gambling services worker to a supervisory position overseeing floor operations, eventually specializing in responsible gambling program management
    or data analytics within the industry. To achieve this, he plans to complete a certification in Responsible Gambling and enroll in a bachelor’s program in Hospitality Management or Business Analytics.
    Long‑term, he envisions leading a team that designs technology solutions to promote safe gambling practices or launching his own startup that provides analytical tools for gambling operators. He also
    seeks to strengthen his leadership, stress‑management, and strategic planning skills.
