  career_goals: William aims to obtain certification as a radiologic technologist within the next two years while completing his associate degree in health sciences. Long-term, he hopes to specialize in
    advanced imaging modalities such as MRI, and eventually transition into health informatics, contributing to the integration of technology and patient care. He also plans to pursue leadership training
    to become a department supervisor or quality-improvement coordinator in a hospital setting.
