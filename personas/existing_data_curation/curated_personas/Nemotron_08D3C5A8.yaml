personas:
  professional: Tiona Williams, a seasoned personal care aide pursuing an associate degree in nursing, leverages meticulous documentation, disciplined scheduling, and compassionate communication to excel
    in medication reminders, safe mobility transfers, basic vital‑sign monitoring, and leading memory‑stimulation workshops at a senior center, while they assertively mentor new aides and coordinate supply
    inventories with precision.
  sports: Tiona Williams supports the Los Angeles Lakers and Dodgers, participates in the neighborhood Sunrise Walking Club for regular strolls through Griffith Park, incorporates weekly yoga sessions into
    their fitness routine, and they prefer low‑impact activities that fit their disciplined schedule.
  arts: Tiona Williams finds inspiration in contemporary novels by authors such as Colson Whitehead and Chimamanda Ngozi Adichie, enjoys the soulful sounds of Norah Jones and John Coltrane, and they channel
    their meticulous nature into crocheting intricate blankets for church outreach while listening to live jazz at local cafés.
  travel: Tiona Williams prefers carefully planned low‑key trips that blend cultural enrichment with relaxation, having explored New Orleans’ historic districts, the dramatic cliffs of Big Sur, and the
    art museums of Santa Fe, and they dream of a solo pilgrimage to Kyoto’s Zen gardens for quiet reflection.
  culinary: Tiona Williams, an adept home cook, blends Southern comfort staples like collard greens and sweet potatoes with West‑Coast twists such as avocado‑lime salsa and quinoa‑infused gumbo, frequently
    seasoning dishes with fresh basil, rosemary, and smoked paprika, and they share these nutrient‑dense meals with their church community during monthly potlucks.
  core: Tiona Williams is a disciplined, curiosity‑driven personal care aide who translates their love of order into meticulous patient charts, nightly crochet sessions, and a tendency to over‑schedule
    yoga classes at the expense of occasional Netflix binge‑watching.
background:
  cultural: Tiona identifies as African‑American, with family roots that trace back to the Deep South before relocating to California in the 1970s. Growing up in Sun Valley, she absorbed the vibrant mix
    of Black cultural traditions in Los Angeles—church gospel music, community festivals, and a strong emphasis on mutual support. Her heritage informs her caregiving philosophy, emphasizing respect, storytelling,
    and culturally relevant health practices. She maintains close ties with extended family, participates in local Black cultural events, and draws inspiration from the resilience and creativity that characterize
    the Black community in Southern California.
