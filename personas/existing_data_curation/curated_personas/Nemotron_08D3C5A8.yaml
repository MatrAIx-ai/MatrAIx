  hobbies: '["Reading African-American literature","Gardening","Yoga and meditation","Crocheting","Cooking healthy meals","Small book club participation","Volunteer work at senior center","Continuing education
    webinars"]'
  career_goals: Tiona aims to complete her associate degree in nursing within the next three years and become a Licensed Practical Nurse (LPN), with the longer‑term goal of attaining RN licensure. She envisions
    moving into a supervisory role as a Home‑Health Care Coordinator or launching a small agency that delivers culturally sensitive personal care services to seniors in the Black community of Los Angeles
    County. Additionally, she wants to mentor new aides, develop training workshops, and advocate for improved working conditions and professional development opportunities for direct‑care staff.
