  hobbies: '[''oil painting'', ''watercolor sketching'', ''creative writing'', ''reading speculative fiction'', ''herb gardening'', ''cooking fusion Vietnamese-Italian dishes'', ''mindfulness meditation'',
    ''jigsaw puzzles'', ''volunteering at local Asian cultural center'', ''attending small art workshops'']'
  career_goals: Tuong aspires to advance into a regional director role within a senior‑living or community health organization, where she can shape policy and champion culturally sensitive care models.
    She plans to pursue a master's degree in healthcare administration to deepen her strategic expertise. Additionally, she hopes to mentor emerging supervisors, develop innovative therapeutic art programs
    for residents, and eventually launch a non‑profit that provides support services for Southeast Asian elders navigating the U.S. care system.
