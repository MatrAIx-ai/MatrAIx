persona_description: A highly sensitive person who struggles with setting boundaries and dealing with social context, but also has a strong capacity for creativity, empathy, and relating to others. They
  are likely to have sensory hypersensitivity and may experience overstimulation easily. They may have a deep level of processing in the brain and may experience intense sensory experiences, such as being
  sensitive to sounds or bright lights. They may also have sensitive skin and an itchy or irritating sense of smell. They may have difficulty setting boundaries and may struggle with alcohol consumption
  and binge-watching. They may also have a tendency to become overly involved in other people's emotions, which takes up a lot of their energy and may lead to exhaustion. They may have a unique understanding
  of their brain and its workings and may have a deep knowledge of group theory and the concepts related to subgroups and isomorphisms.
