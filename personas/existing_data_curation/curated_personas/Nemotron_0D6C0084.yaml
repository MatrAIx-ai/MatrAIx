  hobbies: '[''watercolor painting'', ''sketching'', ''digital illustration'', ''piano practice'', ''book club (science‑fiction)'', ''nature sketching'', ''Scratch animation'', ''volunteering at county
    fair'', ''reading speculative fiction'']'
  career_goals: Erin hopes to attend a high‑school program with a strong visual‑arts focus and eventually study graphic design or illustration at a university. She imagines a career that blends creativity
    with structure, such as becoming a user‑experience (UX) designer, a museum exhibit planner, or an art director for a publishing house. She also dreams of traveling to visit famous museums and galleries,
    using those experiences to fuel her own art. In the short term, she aims to win a regional art competition, build a portfolio of digital and traditional pieces, and secure a summer internship at a local
    community arts center.
