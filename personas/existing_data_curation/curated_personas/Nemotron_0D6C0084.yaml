personas:
  professional: Erin Reed is an aspiring digital illustrator who combines watercolor techniques with Scratch animation, using their curious mind to experiment with unconventional visual storytelling while
    reliably meeting school art projects and community fair display deadlines.
  sports: Erin Reed is a fan of the West Winfield Wildcats football team and plays on the community youth soccer league’s midfield squad, while also enjoying weekend hiking along nearby farms and streams
    for informal cardio, preferring low‑impact activities that complement their artistic schedule.
  arts: Erin Reed immerses themselves in the arts by sketching characters inspired by Hayao Miyazaki films, practicing piano works by Claude Debussy, and following watercolor master Claude Monet’s tutorials,
    while occasionally composing simple melodies that echo the moods of their favorite speculative‑fiction books.
  travel: Erin Reed loves short trips to the Adirondack Mountains and family visits to Niagara Falls, dreams of exploring the Pacific Northwest’s national parks, and plans each outing with a detailed sketch‑based
    itinerary that balances artistic inspiration with affordable travel options.
  culinary: Erin Reed enjoys preparing fresh farm‑to‑table meals like vegetable stir‑fry with locally sourced carrots and zucchini, baking strawberry shortcake for book‑club gatherings, and experimenting
    with homemade lemon‑scented watercolor‑inspired desserts, though they sometimes forget to pack a snack before long nature walks.
  core: Erin Reed is a quietly curious 13‑year‑old whose artistic flair, methodical yet flexible nature, and love for solitary exploration blend into a distinctive mix of disciplined creativity and gentle
    self‑reliance.
background:
  cultural: 'Erin grew up in West Winfield, a small rural community in Herkimer County, New York. Her family reflects a typical upstate white American background: modest middle‑class values, a strong sense
    of community, and an appreciation for seasonal traditions such as the county fair, Thanksgiving gatherings, and local church events. The region’s natural environment—farm fields, forests, and the nearby
    Mohawk River—has shaped her love of outdoor observation and simple, grounded living. While her cultural milieu is largely mainstream American, Erin’s household encourages curiosity and exposure to the
    arts, often taking her to nearby museums in Utica and Syracuse. This blend of small‑town conservatism and artistic openness informs her identity and aspirations.'
