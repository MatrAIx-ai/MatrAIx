  hobbies: '[''Hiking and nature walks'', ''Apple picking and gardening'', ''Quilting & crocheting'', ''Community event volunteering (Apple Festival)'', ''Line dancing'', ''Baking and cooking (southern
    recipes)'', ''Reading DIY & sustainability books'', ''Senior craft circle participation'', ''Volunteer work at food pantry'']'
  career_goals: Jaclyn aims to move into a supervisory role within facility management, ultimately becoming a cleaning manager who oversees a small team of custodians. She plans to earn a Certified Professional
    Cleaner (CPC) credential and enroll in a community‑college course in facilities management to deepen her technical knowledge. She is also exploring the possibility of launching a boutique cleaning service
    that emphasizes green cleaning practices for local businesses and homes. In the longer term, she hopes to secure a stable retirement by transitioning to a part‑time consulting role on cleaning best
    practices for schools and churches while staying active in her community.
