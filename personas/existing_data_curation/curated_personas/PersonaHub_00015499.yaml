persona_description: A scientist or environmentalist who is interested in understanding the impact of transportation emissions on air quality and climate change. They are likely to be familiar with the
  work of Michael Jacobson and his research on the effects of diesel exhaust emissions on air quality and climate change. They may also be interested in the development and implementation of strategies
  to reduce black carbon emissions and mitigate the impacts of climate change. They may have a background in environmental science, engineering, or public health and may be interested in the intersection
  of transportation emissions and public health.
