persona_description: A team of engineering students at Rice University who have developed a new sterilization method using a Capteur Soliel device, a device created decades ago by French inventor. The team
  is working on developing a custom-designed autoclave using steam generated by focusing sunlight along a steel tube at the Capteur Soliel's apex. The autoclave is designed to heat a custom-designed conductive
  hotplate in an insulated box to create an autoclave. The team's experiments have shown that they are able to sterilize objects using the autoclave, and they have used biological spores from a test kit
  to demonstrate that the autoclave is effective in killing any biological growth. The team is working on refining their autoclave design and testing it on various objects to ensure its effectiveness.
