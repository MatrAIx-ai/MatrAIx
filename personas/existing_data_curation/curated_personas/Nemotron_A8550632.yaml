  career_goals: Although retired, Khuong aims to become a cultural ambassador in Knoxville, preserving and sharing Southeast Asian heritage. She plans to mentor younger immigrant families, organize an annual
    multicultural art showcase, and lead weekly story‑circles at the senior center. Additionally, she aspires to document her life experiences in a memoir and learn advanced digital tools to archive community
    photographs for future generations.
