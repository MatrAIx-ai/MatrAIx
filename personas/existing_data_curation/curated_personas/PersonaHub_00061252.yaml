persona_description: A geologist who specializes in the study of hydrothermal systems and their interaction with the solid earth, weather, and external stress perturbations. They have conducted research
  on the response of geysers to stress perturbations from within the solid earth and from weather, and have concluded that most subannual geyser IBE variability is dominated by internal processes and interaction
  with other geysers. They are interested in the quantitative bounds on the sensitivity of hydrothermal systems to external stress perturbations and have implications for studying the triggering and modulation
  of volcanic eruptions by external forces.
