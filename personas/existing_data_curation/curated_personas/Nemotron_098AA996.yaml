personas:
  professional: Lara Danley, a preschool classroom helper and junior storyteller, uses their curiosity and methodical planning to organize Show‑and‑Tell rotations, ensuring each friend gets a turn, while
    their competitive streak pushes them to earn the "Helper of the Week" badge.
  sports: Lara Danley loves playing in the Crown Point Little League baseball team, practices toddler gymnastics at the local community center, cheers for the Indianapolis Colts on Sundays, and roots for
    the Chicago Cubs whenever the family watches a spring‑training game together.
  arts: Lara Danley is enchanted by The Wiggles' songs, hosts impromptu dance parties to Raffi's "Baby Beluga," delights in finger‑painting scenes from Disney's "Moana," and collects picture books by Eric
    Carle, especially "The Very Hungry Caterpillar."
  travel: Lara Danley enjoys weekend trips to the Indiana Dunes State Park for sandcastle building, family visits to the Chicago Children's Museum, a magical vacation at Disney World in Orlando, and dreams
    of exploring the Grand Canyon's red cliffs someday.
  culinary: Lara Danley prefers cheesy macaroni with a sprinkle of cheddar, loves spreading peanut butter on banana slices, munches carrot sticks with ranch dip, and proudly helps stir batter for chocolate
    chip cookies using a bright blue wooden spoon.
  core: Lara Danley is a remarkably calm four‑year‑old whose boundless curiosity drives them to schedule playdates like tiny project managers, yet they have an endearing habit of hoarding glitter for spontaneous
    art attacks.
background:
  cultural: Lara is raised in a middle‑class, white family in Crown Point, Indiana, a suburban community in Porter County. Her upbringing reflects typical Midwestern values of friendliness, community involvement,
    and appreciation for local traditions such as county fairs, holiday celebrations, and church activities. She regularly attends neighborhood playgroups, enjoys outdoor play in nearby parks, and is exposed
    to a blend of modern media and classic crafts through family and school programs.
attributes:
  skills: '["Fine motor coordination (drawing, cutting)", "Early literacy (letter recognition)", "Number recognition (counting to 20)", "Simple puzzle solving", "Organized play (toy categorisation)", "Routine
    adherence", "Cooperative social interaction", "Independent use of educational tablet", "Calm emotional regulation"]'
  hobbies: '["Coloring and drawing", "Building with Lego bricks", "Listening to storytime books", "Dancing and singing", "Playing tag and hide‑and‑seek", "Visiting the children’s museum", "Collecting and
    trading stickers"]'
  career_goals: Lara often dreams of becoming an artist who creates bright pictures for everyone, an astronaut exploring the wonders of space, or a teacher who leads fun projects for her friends. She imagines
    guiding group activities where she can share new ideas, win friendly challenges, and inspire curiosity in others as she grows.
