  hobbies: '["Scale Model Bridge Building", "Woodworking", "Vegetable Gardening", "Fishing", "Historical Non-Fiction Reading", "Community Service (Park Clean-Ups)", "Journaling"]'
  career_goals: Efstratios aims to transition into a senior site-manager or project-director role within the next three years, overseeing larger municipal infrastructure projects while maintaining the disciplined,
    safety-first environment he values. He plans to complete the Certified Construction Manager (CCM) credential and, if feasible, obtain his Professional Engineer (PE) license to broaden his technical
    authority. Long-term, he envisions establishing a small civil-engineering consultancy that serves Warren County and surrounding communities, allowing him to mentor younger engineers and apply sustainable,
    cost-effective design practices. Throughout, his primary ambition is to guarantee financial stability for his wife and to gradually reduce work-related stress as he approaches retirement.
