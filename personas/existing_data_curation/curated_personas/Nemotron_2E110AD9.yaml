personas:
  professional: Efstratios Glenn is a veteran civil construction manager who combines three decades of concrete and roadway expertise with a methodical, safety‑first approach, meticulously coordinating
    crews, budgets, and schedules while they assert themselves to ensure compliance and on‑time delivery.
  sports: Efstratios Glenn enjoys solitary weekend angling on the Wabash River as their primary sport, complements it with early‑morning jogs around their neighborhood, and they remain a devoted fan of
    the Indianapolis Colts, attending select games when their schedule permits.
  arts: Efstratios Glenn channels their meticulous nature into building scale bridge models and restoring wooden furniture while they also find inspiration in the works of Leonardo da Vinci and the folk
    ballads of Woody Guthrie, attending quarterly concerts at the Indianapolis Symphony Orchestra and browsing exhibitions at the Indianapolis Museum of Art.
  travel: Efstratios Glenn plans their trips with the precision of a project schedule, favoring weekend road‑trips to historic Midwest sites such as Gettysburg, Pennsylvania, and the historic French Quarter
    of New Orleans, and they also budget for a longer, solo fishing expedition to the Kenai Peninsula in Alaska once every few years.
  culinary: Efstratios Glenn likes to cultivate tomatoes, carrots, and basil in their petite garden, then grill fresh river trout seasoned with rosemary and lemon, pair it with a garden salad featuring
    goat cheese and olives, and they also occasionally whip up a comforting chicken pot pie using their own hand‑rolled pastry.
  core: Efstratios Glenn is a detail‑obsessed civil construction veteran who steadies their life with model bridges, garden vegetables, and a strict budgeting ritual, even as they wrestle with chronic hypertension,
    a tendency to over‑plan, and a habit of hoarding receipts for future audits.
background:
  cultural: Born to second-generation Greek-American parents, Efstratios grew up in a household where Greek customs and the Greek Orthodox faith were central. Family gatherings often featured traditional
    dishes such as moussaka, spanakopita, and baklava, and he celebrates holidays like Easter and the name-day of St. Efstratios. Though his community life is rooted in the rural Midwest of West Lebanon,
    Indiana, he maintains ties to the regional Greek diaspora through the local Hellenic society, attending occasional cultural events and language lessons. This blend of Greek lineage and Midwestern values
    has fostered a strong work ethic, an emphasis on family loyalty, and a respect for community responsibility.
attributes:
