personas:
  professional: Rosalyn Whitaker, a two‑year‑old with an innate blend of curiosity and practicality, spends hours arranging building blocks into structurally sound towers while narrating detailed construction
    plans to any attentive sibling or parent.
  sports: Rosalyn Whitaker delights in toddler soccer sessions at the neighborhood park, energetically chasing the ball while chanting cheers for the local Chicago Cubs, and proudly wears a tiny jersey
    that reflects a family tradition of Sunday game gatherings.
  arts: Rosalyn Whitaker immerses herself in fingerpainting with non‑toxic tempera paints, favoring bold blues and sunny yellows, and can be heard belting out the ‘Twinkle Twinkle Little Star’ chorus in
    the style of Disney’s Moana, turning any playroom into a miniature stage.
  travel: Rosalyn Whitaker’s travel adventures include a weekend trip to the San Diego Zoo, where she clapped for the giraffes, and a serene stay at her grandparents’ countryside cottage, favoring short
    car rides with frequent snack breaks and the comfort of her beloved stuffed giraffe.
  culinary: Rosalyn Whitaker favors smooth peanut butter‑banana sandwiches, enjoys scooping avocado toast into star shapes, and enthusiastically helps stir oatmeal, though the resulting mess often ends
    up on the kitchen floor, prompting a quick clean‑up dance.
  core: Rosalyn Whitaker, a two‑year‑old social butterfly, balances boundless curiosity with surprisingly organized play, turning snack time into a lively concert for anyone within earshot while occasionally
    insisting on arranging toys by color.
background:
  cultural: Rosalyn is a White American child raised in Plainfield, Illinois, a suburban community in Kendall County that embodies Midwestern values of friendliness, community involvement, and strong family
    ties. Her family participates in local traditions such as the Plainfield Harvest Festival and attends a community church that emphasizes service and togetherness. These surroundings reinforce her sociable,
    compassionate, and emotionally stable disposition, while seasonal activities—apple picking in autumn and swimming in the summer—provide her with a rich variety of experiences that shape her curiosity
    and practical outlook.
