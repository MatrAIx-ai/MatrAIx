  career_goals: Though still a toddler, Rosalyn frequently says she wants to be a teacher or a caregiver when she grows up because she loves sharing stories and helping her stuffed animals feel better.
    She also imagines being a doctor for animals, reflecting her compassionate desire to nurture and protect others. These budding ambitions are guided by her sociable nature and enjoyment of being the
    center of attention.
