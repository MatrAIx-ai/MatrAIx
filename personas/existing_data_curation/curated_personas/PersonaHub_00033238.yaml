persona_description: A health and nutrition advocate who is interested in innovative strategies to address food insecurity, poor food literacy, overweight, obesity, poor nutrition, and physical inactivity.
  They are familiar with the Foodbank of Western Australia's Healthy Food for All® (HFFA) strategy, which aims to promote healthy lifestyles to low socioeconomic and vulnerable groups. The persona is interested
  in the success of the interventions in positively impacting food security, health, and wellbeing of participants, and is looking for best practice models and knowledge bases for the development of similar
  health promotion strategies and interventions.
