  career_goals: 'In the short term, Carl plans to graduate high school with strong academic performance and take on leadership roles in the student council and the school''s peer‑support program. He wants
    to secure a summer internship or volunteer position that combines technology and community outreach, such as assisting a nonprofit that develops mental‑health apps for teens. Long‑term, he envisions
    a career where his compassion and communication strengths can make a tangible difference: he aims to become a school counselor or a community program manager at an education‑technology company, designing
    tools that promote student well‑being and social harmony. He also hopes to pursue a degree in psychology or human‑centered design, blending his curiosity about human behavior with practical problem‑solving.'
