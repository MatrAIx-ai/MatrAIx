  hobbies: '[''Debate Club'', ''Soccer'', ''Hiking'', ''Coding Small Projects'', ''YouTube Content Creation'', ''Guitar Playing'', ''Volunteer Work at Food Bank'', ''Journaling'', ''Mindfulness Meditation'',
