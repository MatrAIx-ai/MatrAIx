persona_description: A scientist who studies epigenetic inheritance and its effects on mammalian embryos, focusing on the role of Kdm6a in the deletion of this gene and the persistence of hypermethylation
  in offspring. The scientist has experience in designing experiments to track epigenetic patterns and health effects, and has worked with colleagues such as Benjamin Ebert and Zuzana Tothova to characterize
  the diseases in the mice. The scientist is interested in understanding the mechanisms that allow hypermethylation to persist in the offspring, and is hopeful to pursue this question in the future.
