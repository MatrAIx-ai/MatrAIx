personas:
  professional: Holly Rexford, a diligent paralegal with three years of case‑management experience, blends sharp analytical instincts with a practical, people‑first mindset, using legal databases and workflow
    tools to keep massive file systems organized while quietly mentoring junior staff as they work toward a Certified Paralegal credential and a part‑time law degree focused on family and civil‑rights law.
  sports: Holly Rexford enjoys low‑impact fitness, hitting the Lake Orion Trail Club for weekly hikes and attending a Sunday sunrise yoga class at the community center, they root for the Detroit Tigers
    in the spring, the Lions in the fall, and cheer on the Red Wings during hockey season, and they occasionally join the Metro Detroit Running Club for a 5 k charity race.
  arts: Holly Rexford’s creative side blossoms in a small pottery studio where they spin earthy bowls alongside friends, they capture sunrise over the lake with a DSLR inspired by Ansel Adams, and they
    unwind reading Margaret Atwood’s historical novels and reciting poetry by Mary Oliver, while a playlist of Sufjan Stevens and folk‑rock band Fleet Foxes provides a soothing soundtrack.
  travel: Holly Rexford favors thoughtful, nature‑centric travel, planning weekend road trips to places like Mackinac Island, Sedona’s red rock trails, and the historic streets of Charleston, they keep
    a travel journal of each visit and dream of hiking the Scottish Highlands, but budget constraints keep them focused on < 5‑day getaways within the continental U.S.
  culinary: Holly Rexford prefers farm‑to‑table meals, tending a modest garden of tomatoes, basil, and kale that feeds into a favorite roasted beet and goat‑cheese salad, they enjoy brewing single‑origin
    pour‑over coffee, whipping up simple pasta with fresh oregano from the garden, and occasionally treating themselves to a buttery croissant from The Farmhouse Bistro on Saturday mornings.
  core: Holly Rexford, a 25‑year‑old analytical paralegal who balances quiet ambition with a love for poetry, pottery, and purposeful hikes, turns meticulous organization into both career progress and a
    serene, well‑curated life.
background:
  cultural: Holly comes from a Midwestern white American family with German and Irish ancestry. Raised in a suburban community near Detroit, she internalized values of hard work, modesty, and community
    involvement. Her upbringing blended traditional Midwestern hospitality with a deep appreciation for the arts, fostered by her liberal arts education. This cultural mix informs her balanced perspective—valuing
    both established practices and new ideas—while keeping her grounded in the cooperative, family‑oriented environment of Lake Orion.
attributes:
  skills: '[''Legal research'', ''Case file management'', ''Document drafting'', ''Legal writing'', ''Client intake and communication'', ''Litigation support'', ''E‑discovery assistance'', ''Proficiency
    with Clio and LexisNexis'', ''Time tracking and billing'', ''Office organization'', ''Mediation coordination'']'
  hobbies: '[''Reading historical fiction'', ''Poetry'', ''Journaling'', ''Hiking and nature walks'', ''Photography'', ''Yoga'', ''Gardening'', ''Pottery'', ''Volunteer work at local library'', ''Cooking
    and baking'']'
  career_goals: Holly aims to become a senior paralegal who leads a small team and mentors junior staff. She plans to earn the Certified Paralegal (CP) credential within the next two years and to enroll
    in a part‑time law school program to eventually practice as an attorney, preferably in family law or civil rights, where she can blend her curiosity about social issues with pragmatic advocacy. She
    also hopes to introduce workflow improvements in her firm that balance efficiency with a supportive workplace culture.
