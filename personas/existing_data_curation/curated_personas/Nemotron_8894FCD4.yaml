personas:
  professional: A veteran correctional security officer with over three decades of hands‑on experience, Sheyna Dupree leverages her keen observational skills, crisis‑de‑escalation expertise, and competitive
    drive to mentor younger staff while pushing for a shift‑supervisor role that would embed mental‑health support into inmate rehabilitation programs.
  sports: An enthusiastic walker of Hudson Valley trails, Sheyna Dupree joins a small Sunday‑morning walking club linked to her church, follows the New York Yankees with a seasonal ticket, and dabbles in
    low‑impact pickleball at the local community center to maintain agility without the strain of high‑impact sports.
  arts: A devout lover of classic R&B, jazz, and gospel, Sheyna Dupree fills her afternoons with the soulful sounds of Marvin Gaye, Aretha Franklin, John Coltrane, and Mahalia Jackson on a portable cassette
    player, while diving into historical fiction by Philippa Gregory and true‑crime biographies of infamous investigators, occasionally attending intimate jazz sessions at a Hudson Valley coffeehouse.
  travel: A flexible, low‑key traveler, Sheyna Dupree prefers spontaneous weekend road trips to nearby destinations like the Catskills, the historic streets of Savannah, and the jazz‑filled neighborhoods
    of New Orleans, relying on her car and a modest travel fund, while avoiding crowded tourist hotspots.
  culinary: A dedicated home cook with a passion for soulful cuisine, Sheyna Dupree perfects grandmother‑inspired dishes such as smoked collard greens, crispy fried chicken, and sweet‑potato pie, often
    seasoning her garden‑grown tomatoes, kale, and herbs with smoked paprika and cumin, yet she sometimes over‑salts her gumbo in pursuit of bold flavor.
  core: Sheyna Dupree blends disciplined security expertise with a quiet love of gardening, soulful cooking, and classic music, navigating retirement ambitions with a competitive edge, a skeptical eye,
    and an occasional tendency to forget deadlines.
background:
  cultural: She grew up in a close‑knit Black family in the Hudson Valley, with deep roots tracing back to the Great Migration of the 1940s. Her upbringing was shaped by the church, community picnics, and
    the storytelling traditions of her grandparents, who hailed from the rural South. These experiences instilled a strong sense of resilience, respect for communal ties, and an appreciation for African‑American
    culinary and musical heritage. Living in Newburgh, she has witnessed both the challenges and the vibrant cultural revival of the local Black community, influencing her commitment to mentorship, advocacy,
    and preserving cultural traditions such as gospel singing and soul‑food cooking. Her identity is interwoven with the history of civil‑rights progress in the region, which informs her pragmatic yet hopeful
    outlook on social change.
attributes:
  skills: '["Inmate supervision", "Crisis de‑escalation", "Emergency response", "Security technology operation (CCTV, metal detectors)", "Incident report writing", "Legal compliance and search procedures",
    "Conflict resolution", "Situational awareness", "Rapid decision‑making", "Mentoring and training of junior staff"]'
  hobbies: '["Gardening (vegetables and herbs)", "Reading historical fiction and true‑crime biographies", "Hiking Hudson Valley trails", "Listening to classic R&B, jazz, and gospel", "Volunteer work at
    church Sunday‑school committee", "Cooking traditional soul‑food dishes"]'
  career_goals: Approaching retirement, she aims to secure a shift‑supervisor position to influence policy on inmate mental‑health support and to spearhead a pilot rehabilitation program that blends practical
    skill‑building with community outreach. She also hopes to transition into a part‑time security consultant role for local government facilities, leveraging her extensive field knowledge. Concurrently,
    she is considering enrolling in a community‑college administration course to broaden her qualifications for a future in corrections management or advocacy work for criminal‑justice reform, particularly
    focusing on programs that benefit older female officers and minority communities.
