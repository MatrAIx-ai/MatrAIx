personas:
  professional: Jonathan Gonzalez, a retired maintenance supervisor turned senior‑center DIY mentor, leverages decades of hands‑on electrical, plumbing, and woodworking expertise to guide neighbors through
    practical projects while they embrace a relaxed, sometimes haphazard, approach to planning and a love for small‑group storytelling.
  sports: Jonathan Gonzalez enjoys daily walks along the nearby nature trail, participates in the local senior walking club, and follows the regional baseball team, the Riverside Rivermen, cheering them
    from their porch while they occasionally play casual bocce with friends.
  arts: Jonathan Gonzalez finds solace in classic Mexican folk music, regularly listening to the timeless strums of Los Tres Reyes and the soulful ballads of Lila Downs, while also appreciating the paintings
    of Frida Kahlo and the storytelling of Gabriel García Márquez, and they often share these cultural treasures during intimate evenings with friends.
  travel: Jonathan Gonzalez prefers low‑stress, purposeful travel, often driving to the nearby Sierra Vista National Park for botanical forays, occasionally crossing the border to Oaxaca to share meals
    with family, and they dream of a quiet Mediterranean cruise once their health and budget allow.
  culinary: Jonathan Gonzalez, an avid home chef, delights in crafting seasonal Mexican dishes such as pozole with fresh hominy, grilled nopales with ancho chilies, and handmade tamales stuffed with pork
    al pastor, all while meticulously tending his organic garden for the freshest cilantro, chilies, and tomatillos, and they savor each bite as a celebration of heritage.
  core: Jonathan Gonzalez is a curious, hands‑on elder who transforms solitary gardening and cooking into community storytelling, yet they wrestle with chronic worry and occasional disorganization that
    color their thoughtful, unhurried rhythm of life.
background:
  cultural: Jonathan grew up in a Mexican‑American household in Southern California, the son of immigrants from Jalisco and Veracruz who settled in Orange County in the 1950s. Spanish was spoken at home,
    and family gatherings centered around cultural celebrations such as Día de los Muertos and Las Posadas, reinforcing deep respect for tradition and communal bonds. While he has assimilated into broader
    American culture, he maintains a strong connection to his heritage through cuisine, music, and the practice of sharing stories in both Spanish and English. His cultural background informs his love for
    community service, his emphasis on family legacy, and his appreciation for the blend of old and new ideas.
