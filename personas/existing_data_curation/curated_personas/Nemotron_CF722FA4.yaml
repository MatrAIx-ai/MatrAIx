personas:
  professional: Jaquavious Key is a seasoned real‑estate broker who blends data‑driven market analysis with an artist’s eye for historic Delta homes, using their knack for storytelling and community‑centered
    staging to turn each property into a living tribute to local heritage while mentoring a new generation of agents.
  sports: Jaquavious Key is an avid supporter of the Mississippi State Bulldogs football team, participates in a weekly walking club that doubles as a networking stroll through the historic neighborhoods
    they love, and joins the local senior softball league every summer, preferring community camaraderie over competitive intensity.
  arts: Jaquavious Key captures the quiet poetry of rural Delta life through their DSLR, volunteers as a choir member for Sunday gospel services, curates photography exhibits at the local arts center, and
    spends evenings quilting intricate patterns inspired by the blues festivals they attend, drawing creative energy from artists like B.B. King and photographer Gordon Parks.
  travel: Jaquavious Key enjoys curated trips to historic Southern sites, having explored Natchez’s ante‑bellum homes, the civil‑rights landmarks of Selma, and the jazz streets of New Orleans, while also
    planning a future pilgrimage to the historic St. Augustine district to study preservation practices, and they often bring a camera to document the architecture.
  culinary: Jaquavious Key loves cooking hearty Southern fare, perfecting collard greens simmered with smoked turkey, crispy catfish seasoned with a secret blend of paprika and cayenne, and buttery cornbread,
    while experimenting with heirloom vegetables from their garden to add fresh twists to classic dishes.
  core: Jaquavious Key is a charismatic curator of heritage homes who balances data and artistry, mentors with a community spirit, and finds joy in gospel, gardening, and the occasional indulgence in fresh
    blossoms for their yard.
background:
  cultural: Jaquavious is a Black woman rooted in the Southern African‑American tradition of the Mississippi Delta. Her family lineage traces back to the Great Migration era, and she grew up immersed in
    gospel music, church community, and oral storytelling. She identifies strongly with the cultural heritage of Tate County, celebrating Juneteenth, participating in church choirs, and preserving family
    recipes passed down through generations. Her upbringing emphasized communal responsibility, resilience, and a deep respect for civil‑rights history, which informs both her personal values and professional
    approach. She blends this cultural foundation with a forward‑looking curiosity, constantly seeking new ideas while honoring the traditions that shaped her.
attributes:
  skills: '[''Real estate negotiation'', ''Comparative market analysis'', ''Artistic home staging'', ''Client relationship management'', ''Public speaking and event hosting'', ''Community networking'',
    ''Project coordination'', ''Technology adoption (MLS, CRM)'', ''Mediation and conflict resolution'', ''Mentoring junior agents'']'
  hobbies: '[''Attending art exhibitions and local cultural festivals'', ''Gardening and landscape design'', ''Southern cooking and recipe development'', ''Traveling to historic sites'', ''Photography'',
    ''Community volunteer work (church choir, youth mentorship)'', ''Reading historical fiction and biographies'', ''Quilting and textile arts'']'
  career_goals: Jaquavious aims to expand her brokerage into a boutique firm that specializes in historic and culturally significant homes in the Delta region, positioning herself as a trusted curator of
    Southern heritage properties. Over the next five years she plans to increase her market share by 25 % and to launch a mentorship program for aspiring Black real‑estate professionals in Mississippi.
    She also hopes to partner with local arts organizations to sponsor community exhibitions and integrate art installations into new developments, thereby enriching the cultural landscape while boosting
    property values. Ultimately, she envisions retiring from day‑to‑day sales to become a consultant and advocate for affordable homeownership education in underserved neighborhoods.
