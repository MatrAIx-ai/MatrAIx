persona_description: A government official who is responsible for overseeing and implementing water management strategies to prevent future flooding disasters in the UK. They have extensive experience in
  environmental and planning organizations and are aware of the need for a clear and forward-looking strategy for future flood prevention. They are aware of the recent flooding crisis and are eager to learn
  from the lessons and take action to prevent future disasters. They are committed to using a range of measures to alleviate flooding, including improving the resilience of homes built on flood plains,
  sustainable drainage systems, and better co-operation between the relevant organizations and authorities. They are also aware of the importance of using a long-term approach to flood management and are
  willing to hold a cross-departmental conference to discuss how a repeat of the scale of damage caused by recent floods can be prevented.
