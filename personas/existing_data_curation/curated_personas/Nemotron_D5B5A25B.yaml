personas:
  professional: Alan James is an aspiring young robotics hobbyist who builds complex LEGO Mindstorms creations, writes detailed programming notes, and they apply their organized, methodical mindset to solve
    technical challenges while balancing a competitive edge in school science projects.
  sports: Alan James is a keen outdoor enthusiast who cycles the winding trails of Washington County with the local junior biking club, hikes Forest Park on weekends while documenting rock formations, and
    they cheer for the Portland Timbers and the Oregon Ducks, even organizing a friendly neighborhood chess‑themed relay race each spring.
  arts: Alan James immerses themselves in sci‑fi culture, devouring Isaac Asimov novels, listening to Daft Punk and the orchestral scores of Hans Zimmer while sketching natural patterns inspired by Hubble
    images, and they occasionally experiment with stop‑motion animation using LEGO bricks to combine their technical and artistic passions.
  travel: Alan James dreams of visiting the Kennedy Space Center in Florida and the International Space Station exhibit in Houston, but currently their family vacations revolve around weekend trips to the
    nearby Columbia River Gorge for rock‑collecting hikes, and they meticulously plan each outing with a hand‑drawn itinerary.
  culinary: Alan James enjoys building their own snack combos, favoring crunchy trail mix with almonds, dried mango, and chocolate chips, loves making simple spaghetti carbonara with parmesan, and they
    often experiment by adding a dash of sriracha to grilled cheese for an extra kick.
  core: Alan James is a methodical, curiosity‑driven 11‑year‑old who engineers LEGO robots, dominates chess puzzles, and treats life as a series of logical challenges, yet they sometimes forget to do chores
    because their next invention captures their full attention.
background:
  cultural: Alan was raised in a middle‑class family in Portland’s Washington County, a region known for its strong emphasis on environmental stewardship and community involvement. His family celebrates
    typical American holidays such as Thanksgiving and Independence Day, while also observing cultural traditions from their European ancestry, including Irish St. Patrick’s Day gatherings. He regularly
    visits the local public library and the Portland Children’s Museum, which foster his love of learning. The city’s progressive values and access to outdoor spaces have shaped his appreciation for nature,
    sustainability, and civic engagement.
