  career_goals: Alan aspires to become a software engineer or aerospace engineer, dreaming of designing robots that could explore other planets. He hopes to lead a youth robotics team and win a regional
    FIRST LEGO League competition, then move on to a high‑school robotics program. In the long term, he wants to contribute to sustainable technology solutions and maybe work at a space agency, combining
    his curiosity for new ideas with his practical, methodical approach to problem‑solving.
