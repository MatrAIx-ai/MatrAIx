personas:
  professional: Karina Yela is a bilingual retail veteran with two decades of floor sales experience who blends meticulous organization with a curiosity for new merchandising trends, and they confidently
    mentor new staff, resolve conflicts with calm assertiveness, and are actively positioning themselves for a supervisory role that champions both efficiency and employee well‑being.
  sports: Karina Yela enjoys low‑impact fitness through daily backyard gardening and weekend walks, follows the Charlotte Hornets for basketball excitement, supports the Carolina Panthers during football
    season, and they occasionally join a local senior tennis league at the community center.
  arts: Karina Yela finds creative solace in crocheting vibrant shawls while attending local cultural festivals that showcase folk dances, and they draw artistic inspiration from the music of Celia Cruz
    and the paintings of Frida Kahlo, often listening to Sade's smooth jazz while working on their latest crochet pattern.
  travel: Karina Yela prefers thoughtfully organized trips that blend cultural immersion with relaxed pacing, having already explored Antigua's colonial streets, Asheville's art scene, and Oaxacan cuisine,
    while they hope to someday visit the historic districts of Cartagena and the vineyards of Mendoza in a future retirement adventure.
  culinary: Karina Yela delights in cooking Guatemalan staples like pepian with roasted chilies, kak'ik broth seasoned with coriander and annatto, and handmade tamales filled with pork and masa, and they
    experiment by adding locally sourced heirloom tomatoes and fresh cilantro to honor family recipes while expanding flavor horizons.
  core: Karina Yela is a pragmatic yet curious soul who balances disciplined organization with gentle spontaneity, nurturing community ties through cooking, volunteering, and mentorship while they quietly
    pursue personal growth and cultural heritage.
background:
  cultural: Karina was born in Guatemala and immigrated to the United States in her early twenties. She retains strong ties to her Mayan-rooted heritage, celebrating holidays such as Dia de los Muertos
    and Guatemalan Independence Day with family gatherings centered around traditional foods like pepian and tamales. Bilingualism is a core part of her identity, and she often serves as a cultural bridge
    within her workplace, helping Spanish-speaking customers and coworkers navigate daily interactions. Her Catholic upbringing influences her values of community service, respect for elders, and gratitude,
    all of which she integrates into her life in Charlotte's diverse, multicultural environment.
attributes:
  skills: '[''Customer Service'', ''Bilingual Communication (Spanish/English)'', ''Product Knowledge'', ''Inventory Management'', ''Visual Merchandising'', ''POS System Operation'', ''Loss Prevention'',
