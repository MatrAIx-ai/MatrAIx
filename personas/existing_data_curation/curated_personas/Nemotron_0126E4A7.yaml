  hobbies: '[''Cooking Guatemalan cuisine'', ''Gardening'', ''Crocheting'', ''Attending cultural festivals with small groups'', ''Volunteering at community center'', ''Adult literacy tutoring'']'
  career_goals: Karina aims to transition from a floor sales role to a supervisory position within the next two years, ultimately seeking a store manager role where she can shape policies that balance efficiency
    with employee well-being. She is interested in leveraging her industry experience to mentor younger workers, especially those from the Hispanic community, and hopes to develop a small boutique that
    specializes in ethically sourced Latin American goods. Continuing education through local community college courses in business management is also part of her plan.
