personas:
  professional: Mario Gurrola is a retired handyman-turn-community mentor who leverages decades of practical repair skills, bilingual fluency, and a love of storytelling; they coordinate senior-center tech
    workshops, lead weekly garden-to-table cooking classes, and serve as the charismatic centerpiece of local salsa and music gatherings.
  sports: Mario Gurrola enjoys daily morning walks in the neighborhood park, is an avid fan of the local baseball team - cheering for the New York Yankees during televised games, and participates in a senior
    walking club that meets each Saturday; they occasionally join a low-impact chair-yoga class to stay limber.
  arts: Mario Gurrola regularly attends salsa and plena music nights where they dance to the rhythms of Celia Cruz, Tito Puente, and Marc Anthony, love recounting classic movie scenes from "West Side Story",
    and keep a collection of vinyl records featuring both traditional island folk songs and contemporary Latin jazz, all of which fuel their vibrant storytelling at community events.
  travel: Mario Gurrola prefers leisurely road trips to coastal towns such as Key West, Florida, and Savannah, Georgia, enjoys revisiting the historic streets of San Antonio, Texas, and dreams of a relaxed
    cruise to the Caribbean islands; they plan each journey with a mix of meticulous itinerary notes and spontaneous detours inspired by friends' stories.
  culinary: Mario Gurrola delights in preparing classic island dishes - arroz con gandules, roasted pork shoulder, mofongo with garlic-infused plantains, and seasoned sofrito - often inviting neighbors
    to share meals; they experiment with adobo rubs in a modest kitchen, proudly share recipes via video calls with grandchildren, and occasionally over-salt and forget to set the timer.
  core: Mario Gurrola, 85, is a sociable, talkative handyman-mentor who balances a love for community cooking, garden care, and lively music nights with chronic worries about health and finances; they often
    misplace their keys while never missing a chance to tell a good story.
background:
  cultural: Mario is a first‑generation Puerto Rican who grew up immersed in the island’s rich traditions of family closeness, Catholic faith, and vibrant music and food culture. After moving to Florida,
    he blended those roots with the diverse tapestry of the Port Saint Lucie community, becoming a bridge between the Puerto Rican diaspora and local residents. He cherishes the values of respeto (respect)
    and familismo (family loyalty), which shape his daily interactions, and he actively preserves cultural practices—such as cooking arroz con gandules, dancing to salsa, and celebrating fiestas patronales—while
    also embracing the multicultural life of South‑eastern Florida.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Traditional Puerto Rican cooking'', ''Home gardening'', ''Handyman repairs'', ''Storytelling and oral history sharing'', ''Community event coordination'',
    ''Mentorship of younger volunteers'', ''Basic computer literacy (email, video calls)'']'
  hobbies: '[''Cooking traditional Puerto Rican dishes'', ''Home gardening'', ''Salsa and plena music dancing'', ''Card games (bridge, canasta)'', ''Morning walks in local parks'', ''Attending church services'',
    ''Volunteering at the senior center'', ''Watching baseball'', ''Storytelling with grandchildren via video calls'']'
  career_goals: Although officially retired, Mario’s ambition is to stay actively engaged in his community and family. He aims to lead a weekly cooking class that preserves Puerto Rican culinary traditions
    for younger generations, mentor seniors at the community center on social interaction and basic technology, and compile a personal scrapbook of family stories and photographs. Maintaining his health
    and managing his finances to avoid stress are also central goals, as is continuing to be a familiar, reassuring presence at local gatherings.
