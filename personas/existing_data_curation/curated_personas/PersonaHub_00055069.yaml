persona_description: A researcher and scientist at Stanford University who specializes in the field of semiconductor fabrication, particularly in the development of new techniques for the construction of
  smaller and more efficient electronic circuits. This person has expertise in the use of block copolymer films and the self-assembly of molecules to create contact holes for circuits, and has successfully
  extended this technique to 22 nm circuits. The persona is likely to be interested in the environmental safety and cost savings of using the new technique, and is likely to be looking for ways to apply
  this technology to other nano-level applications.
