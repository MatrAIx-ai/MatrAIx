  career_goals: Antonio aims to climb the retail ladder, targeting a promotion to assistant manager within the next year and a store manager role within three years. He plans to enroll in an associate’s
    program in business administration to deepen his understanding of retail analytics and operations. Long‑term, he envisions opening a boutique that blends Mexican cultural products with modern retail
    concepts, possibly incorporating an e‑commerce platform to reach a broader market. He balances his practical experience with a curiosity for innovative sales strategies, hoping to lead a team that values
    both efficiency and creativity.
