  hobbies: '["Reading picture books", "Drawing and coloring", "Building with LEGO bricks or wooden blocks", "Gardening with family", "Listening to gospel and soul music", "Simple dance and rhythmic clapping",
    "Caring for a family pet", "Doing age‑appropriate puzzles", "Small group playdates"]'
  career_goals: Nia dreams of growing up to be someone who helps others learn and stay healthy. She frequently talks about becoming a teacher because she loves sharing stories and helping classmates understand
    new ideas. She is also fascinated by animals and imagines working as a veterinarian, caring for pets and farm animals. Inspired by the practical side of her curiosity, she hopes to blend learning with
    real‑world help, perhaps by leading a community garden or a school science club where children can explore nature hands‑on.
