personas:
  professional: Nia Myles is a budding junior architect who assembles LEGO neighborhoods with quiet focus, applying their practical curiosity and organized mindset to plan sturdy structures while delighting
    in the collaborative storytelling of each build.
  sports: Nia Myles enjoys playing gentle games of tag and soccer with the Little Lions after‑school club, cheers for the local River City Bears baseball team on weekends, and participates in the Rainbow
    Sprouts mini gymnastics class where they practice balance beams with a quiet, steady determination.
  arts: Nia Myles delights in drawing vibrant scenes inspired by picture books like "The Very Hungry Caterpillar" and listens to soulful gospel classics by Mahalia Jackson and Aretha Franklin, often clapping
    along to rhythmic hymns during church services and recreating favorite characters in their coloring books.
  travel: Nia Myles prefers short family road trips to nature spots such as the nearby botanical garden, the sandy shores of Cape May, and the junior ranger program at Shenandoah National Park, dreaming
    of one day visiting the Smithsonian in Washington, D.C., while staying within the family’s modest vacation budget.
  culinary: Nia Myles loves pairing peanut butter and jelly sandwiches with crunchy carrot sticks, enjoys helping stir batter for banana muffins, and requests bright dishes like rainbow fruit salad featuring
    mango, blueberries, and kiwi, displaying a budding curiosity in the kitchen while still relying on simple, familiar flavors.
  core: Nia Myles is a quietly curious six‑year‑old who balances building intricate LEGO worlds, caring for a garden and dog, and soaking in soulful gospel tunes, all while mastering the art of modest saving
    and gentle resilience.
background:
  cultural: Nia is a Black child raised in Montgomery, Alabama, where Southern African‑American culture threads through daily life. Her family participates in church gatherings that blend gospel music,
    storytelling, and community service, reinforcing values of kindness and cooperation. She attends local cultural events that honor the city’s civil‑rights legacy, and celebrations like Juneteenth and
    Kwanzaa are moments of shared history, music, and food. Family meals often feature Southern comfort foods such as collard greens, cornbread, and sweet tea, providing a sense of belonging and continuity.
    Stories from her grandparents about Montgomery’s past inspire her curiosity about history and community responsibility. This rich cultural tapestry nurtures her respect for tradition while encouraging
    her practical, curious spirit.
