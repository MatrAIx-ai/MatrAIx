persona_description: A historian and archaeologist who specializes in the study of medieval cities and their archaeological sites, particularly those in Central Asia. This person is interested in the excavation
  and reconstruction of ancient structures and their impact on the cultural and historical landscape. They are skilled in the use of digital technology and animation to visualize complex archaeological
  findings and to better understand the historical context of these sites. This person is likely to be interested in the reconstruction of the 'Great Hall' at Karakorum and its significance in the context
  of Tibetan and Chinese architecture.
