personas:
  professional: Lynn Mannausa, a retired community arts catalyst, channels their abstract acrylic painting, mixed-media collage, and memoir-style storytelling into curating intergenerational workshops and
    orchestrating a flagship exhibition that reflects their spontaneous imagination and competitive drive, even as they wrestle with deadlines and rigid planning.
  sports: Lynn Mannausa, an avid early-morning walker who logs daily laps along the St. Johns River with the Jacksonville Riverside Walking Club and follows the Jacksonville Jaguars, Jacksonville Jumbo
    Shrimp, and the Florida Gators with a competitive spirit, supplements their routine with weekend yoga sessions and occasional senior volleyball games, preferring low-impact activity that nurtures the
    creative mind.
  arts: Lynn Mannausa, an experimental mixed-media painter and conceptual photographer, devotes their free time to critiquing openings at the Jacksonville Museum of Contemporary Art where they cite the
    influence of Jackson Pollock’s drip technique, Yayoi Kusama’s immersive installations, and Mark Rothko’s color fields, while their literary palate includes poems by Mary Oliver and Ocean Vuong and their
    soundtrack features Nina Simone and Philip Glass, all weaving into a vibrant artistic identity that fuels both studio practice and community mentorship.
  travel: Lynn Mannausa, a spontaneous yet mildly budget-conscious traveler, prefers short road trips that blend artistic pilgrimage and natural wonder, having explored the historic streets of Charleston
    and the jazz-filled nights of New Orleans, dreaming of capturing the aurora borealis in Iceland and the cherry blossoms in Kyoto, while they typically sketch itineraries on the back of a notebook rather
    than booking rigid packages, allowing room for serendipitous detours.
  culinary: Lynn Mannausa, an intermediate-to-advanced home chef with a penchant for experimental cooking, relishes whisking together miso-glazed salmon with black garlic, crafting sourdough loaves infused
    with sumac, and perfecting shrimp and grits seasoned with smoked paprika, all while they keep a well-stocked pantry of saffron, heirloom tomatoes, and fresh herbs that inspire nightly culinary improvisations
    despite occasional over-spicing that leads to frantic taste-tests.
  core: Lynn Mannausa, a creatively restless 63-year-old who blends spontaneous art, relentless curiosity, and a competitive edge into a life of perpetual reinvention, even as they sometimes misplace brushes
    and forget bill due dates.
background:
  cultural: Lynn grew up in a middle‑class white family in the American South, where community gatherings, seasonal festivals, and a respect for self‑reliance were woven into daily life. Relocating to Jacksonville
    in her thirties, she absorbed the city’s blend of coastal culture, diverse artistic scenes, and Southern hospitality. Her cultural identity reflects a balance between traditional Southern values—such
    as modesty, a strong work ethic, and an appreciation for local history—and a modern, curiosity‑driven outlook shaped by decades of independent learning. Though she does not identify strongly with any
    particular religious practice, the rhythm of church‑linked community events and neighborhood potlucks remains part of her social memory. This background informs her artistic voice, which often juxtaposes
    regional motifs with abstract, universal themes.
