persona_description: A medical professional who specializes in the diagnosis and treatment of parathyroid disease, particularly hyperparathyroidism. They have extensive knowledge and experience in the surgical
  removal of the diseased parathyroid gland and its minimally invasive surgical procedures. They are knowledgeable in the signs and symptoms of the disease, including foggy thinking, confusion, loss of
  energy, cramping in the muscles, and personality changes. They are also familiar with the treatment options for the disease, including the use of calcium supplements and medications to manage symptoms.
