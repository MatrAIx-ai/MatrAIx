personas:
  professional: Jessica Scorpo, a 34‑year‑old HVAC technician with a decade of installation, maintenance, and repair experience, blends meticulous blueprint reading with a pragmatic problem‑solving style,
    and despite occasional disorganization they keep client schedules on track through clear communication and safety‑first practices.
  sports: Jessica Scorpo hikes the foothills of Snake River Canyon on weekends, follows the Boise State Broncos football team, and belongs to the Boise Hikers Club, using trail maps to satisfy both their
    love of order and spontaneous detours, and they often chart new routes for the next adventure.
  arts: Jessica Scorpo volunteers in a local community theater, constructing sets that let them merge hands‑on craftsmanship with creative expression, while evenings are spent devouring mystery novels by
    Agatha Christie and listening to Fleetwood Mac for inspiration, and they find the collaborative stage process refreshes their problem‑solving mindset.
  travel: Jessica Scorpo prefers well‑planned road trips to Yellowstone and Grand Teton National Parks, uses detailed itineraries for weekend getaways but leaves room for unscripted detours, dreams of a
    cultural immersion tour of Kyoto’s onsen towns within the next five years, and they often pause at roadside farms to sample fresh produce.
  culinary: Jessica Scorpo enjoys baking sourdough bread, preserving garden tomatoes with basil and garlic, and experimenting with seasonal quinoa salads, balancing simple home‑cooked meals with occasional
    indulgence in a local farm‑to‑table restaurant’s trout dish, and they occasionally experiment with new spice blends to keep their palate excited.
  core: Jessica Scorpo is a detail‑oriented HVAC specialist who channels anxiety into structured hobbies, occasionally battling disorganization while they nurture a hands‑on creative spirit.
background:
  cultural: Jessica comes from a working‑class, Italian‑American family that settled in the Pacific Northwest during the mid‑20th century. Her grandparents migrated from northern Italy and integrated into
    the predominantly agrarian communities of Idaho, bringing a strong ethic of hard work, self‑reliance, and close‑knit family ties. Raised in a small town environment, she was exposed to both Protestant
    and Catholic traditions, celebrating holidays with extended family and community potlucks. The regional culture of Nampa emphasizes modesty, neighborly cooperation, and a respect for outdoor life, all
    of which have shaped Jessica’s pragmatic worldview and her appreciation for community involvement.
attributes:
  skills: '[''HVAC system installation and maintenance'', ''Electrical wiring and troubleshooting'', ''Plumbing repair and upkeep'', ''Blueprint and schematic interpretation'', ''Safety compliance (OSHA)'',
    ''Customer service and communication'', ''Problem solving under pressure'', ''Project scheduling and coordination'']'
  hobbies: '[''Hiking in Snake River Canyon'', ''Yoga and meditation'', ''Vegetable gardening'', ''Bread baking'', ''Reading mystery novels'', ''Community theater set building'']'
  career_goals: Jessica aims to formalize her expertise by earning an EPA Section 608 certification and a Journeyman HVAC license within the next two years. She envisions moving into a lead technician or
    foreman position where she can mentor newer workers while maintaining a predictable schedule. Long‑term, she hopes to start her own small‑scale service business that offers personalized maintenance
    contracts, allowing her to balance steady income with the flexibility to manage her own workload. She also wishes to develop stronger management skills through community college courses in construction
    management, enabling her to guide projects with both structure and adaptability. Reducing the daily stress of reactive repairs by focusing on preventive maintenance plans is a key ambition for her overall
    well‑being.
