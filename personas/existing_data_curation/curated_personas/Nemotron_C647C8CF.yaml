personas:
  professional: Alexis Coleman is a 31‑year‑old cosmetology professional who combines precision cutting, balayage, and protective styling expertise for textured hair with a curious, flexible mindset that
    encourages eco‑friendly product experimentation while occasionally letting last‑minute appointment changes disrupt an otherwise meticulous salon workflow.
  sports: Alexis Coleman cycles the Scioto Mile several times a week, is a season ticket holder for the Columbus Crew in MLS and the Columbus Blue Jackets in the NHL, occasionally joins a local yoga class,
    and prefers solitary rides over team sports, yet she volunteers as a mentor for the Columbus Cycling Club’s beginner group.
  arts: Alexis Coleman fuels her creative side by sketching watercolor portraits of downtown Columbus, listening to neo‑soul icons like Erykah Badu and D'Angelo and jazz legends such as Miles Davis and
    Robert Glasper, and attending monthly shows at the Columbus Museum of Art and the Treehouse Club.
  travel: Alexis Coleman plans loosely structured trips that blend cultural immersion with culinary exploration, having taken a weekend road trip to Savannah, a music‑focused getaway to New Orleans, and
    dreaming of a solo retreat to Barbados to sample its spice‑laden cuisine and beachfront serenity.
  culinary: Alexis Coleman delights in cooking soulful Southern and Caribbean dishes such as shrimp and grits with okra, collard greens seasoned with smoked turkey, jerk chicken marinated in Scotch bonnet
    pepper, and callaloo soup enriched with coconut milk, showcasing an intermediate to advanced skill level and a penchant for experimenting with fresh herbs and tropical spices.
  core: Alexis Coleman is a curiosity‑driven, flexibly organized hair stylist who balances meticulous technique with a love for solo cycling, watercolor sketching, and nurturing a community‑focused boutique
    salon vision.
background:
  cultural: Alexis is a second-generation African-American raised in the Columbus metropolitan area. Her family's roots trace back to the South, and she grew up celebrating traditions of church, soul food,
    and the communal significance of hair as a form of cultural expression. The vibrant Black community in Columbus - especially the historic Near East Side - shaped her appreciation for natural hair care
    and community uplift. She draws on this heritage in her styling, emphasizing protective techniques that honor the textures of Black hair, and she actively participates in local cultural events, such
    as Juneteenth picnics and Black History Month panel discussions.
attributes:
  skills: '[''Precision hair cutting'', ''Balayage and ombre coloring'', ''Protective styling for textured hair'', ''Scalp health assessment'', ''Organic hair product knowledge'', ''Client consultation
    and personalized styling'', ''Salon business management'', ''Curriculum development for hair education'', ''Workshop facilitation'', ''Inclusive customer service'']'
  hobbies: '[''Reading contemporary fiction and hair history'', ''Cycling around Scioto Mile'', ''Experimenting with DIY natural hair masks'', ''Cooking Southern and Caribbean dishes'', ''Listening to neo-soul
    and jazz'', ''Yoga and meditation'', ''Volunteer teaching hair care workshops'', ''Sketching and watercolor painting'']'
  career_goals: Alexis envisions opening a boutique salon in a residential Columbus neighborhood that centers on natural hair care and offers a low-pressure, appointment-flexible environment. She aims to
    become a certified Master Cosmetologist, develop a community-based hair-education curriculum taught at local schools and community centers, and eventually launch her own line of organic hair-care products
    inspired by her research. Mentoring apprentices and creating a supportive network for Black stylists are also top priorities, as is publishing a guidebook on protective styling for textured hair. All
    aspirations are framed around sustainable growth that respects her need for flexibility and personal space.
