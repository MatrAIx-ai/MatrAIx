  career_goals: Hector aims to transition his independent carpentry work into a small design-build studio that specializes in bespoke, art-inspired furniture and eco-friendly home renovations. Over the
    next three years he plans to earn a Master Carpenter certification, incorporate reclaimed and locally sourced wood, and develop a signature line of pieces that fuse Venezuelan folk motifs with modern
    aesthetics. He also wants to formalize a mentorship program for young trade apprentices in Jacksonville and become a recognized contributor to community projects such as Habitat for Humanity builds.
    Building a loyal client base through strong relationships and expanding his network at local art and home-improvement events are central to his long-term ambition.
