personas:
  professional: Hector Acosta is a master carpenter-in-the-making who blends two decades of structural framing, custom cabinetry, and decorative wood carving with a meticulous project‑management style,
    translating client visions into sustainable, art‑inspired furniture and renovation solutions while mentoring apprentices and cultivating a community‑focused design‑build studio.
  sports: Hector Acosta stays active by playing forward in a Jacksonville community soccer league on weekends, cheering for the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp while also joining
    a local pickup basketball group to maintain cardiovascular fitness and balance the physical demands of carpentry.
  arts: Hector Acosta frequents Jacksonville's River City Art Center, sketches design concepts inspired by the geometric abstractions of Piet Mondrian and the vivid narratives of Frida Kahlo, and at community
    gatherings plays the cuatro to sing folk songs while also keeping an eye on contemporary installations by Banksy and local muralists, letting art guide both his creative work and personal aesthetic.
  travel: Hector Acosta plans trips with a blend of meticulous research and spontaneous detours, having explored the historic architecture of Cartagena, the rainforests of Costa Rica, and the contemporary
    galleries of Barcelona, while dreaming of a future eco‑retreat in the Appalachian Mountains to draw inspiration for his woodwork.
  culinary: Hector Acosta cooks traditional arepas filled with shredded beef, black beans, and sweet plantains, perfects pabellón criollo with roasted plantain slices and seasoned rice, and experiments
    with wood‑smoked trout, showcasing a high level of culinary skill that blends familial recipes with modern plating techniques during weekly dinner gatherings.
  core: Hector Acosta is a talkative, detail‑oriented carpenter who balances relentless curiosity for sustainable design with a habit of overcommitting to community projects, often juggling too many commitments
    while thriving on the buzz of collaborative workshops.
background:
  cultural: Hector was born in Venezuela and moved to the United States as a young adult, bringing with him a deep appreciation for his homeland’s cultural traditions. He speaks fluent Spanish and English,
    and maintains strong ties to the Venezuelan community in Jacksonville through church, cultural festivals, and local food markets. Family gatherings feature classic dishes such as arepas, empanadas,
    and hallacas, and celebrations often include música tropical, dancing, and sharing stories of Venezuelan heritage. His Catholic upbringing influences his values of community service and hospitality.
    Hector’s cultural identity informs his craftsmanship, as he frequently incorporates vibrant colors, folkloric patterns, and traditional woodworking motifs into his designs, creating a unique blend of
    Venezuelan artistry and American construction practices.
