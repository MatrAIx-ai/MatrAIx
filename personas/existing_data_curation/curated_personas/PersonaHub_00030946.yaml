persona_description: A software developer who is interested in using the Enterprise Object technology to build database applications that encapsulate business logic and are independent of any particular
  data source. They are familiar with relational databases and have some experience with object-oriented programming languages. They are looking for a comprehensive guide on how to use EOModeler to build
  data models for Enterprise Objects, including an introduction to data modeling concepts, the major user interface elements of EOModeler, and advanced data modeling techniques. They are also interested
  in advanced features of EOModeler, such as schema synchronization, SQL generation, and Java class file generation, and are ready to learn about these features in the context of a specific application.
