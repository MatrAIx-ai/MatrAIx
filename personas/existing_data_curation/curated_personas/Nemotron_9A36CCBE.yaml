personas:
  professional: Darius Goodman, a budding junior robotics programmer, combines his love for LEGO Technic and strategic video games to design and code small autonomous robots, applying methodical planning,
    competitive problem‑solving, and a skeptical eye for unreliable components.
  sports: Darius Goodman, a dedicated BMX rider with the Peachtree City Trail Club, cycles the network’s 15‑mile loops year‑round, tracks his lap times with a fitness watch, and supports the Atlanta Hawks
    and Atlanta Braves, channeling his competitive spirit into pushing personal speed records while rarely joining team sports.
  arts: Darius Goodman, who devotes spare evenings to listening to Daft Punk and deadmau5 while sketching futuristic LEGO designs, reads Asimov’s sci‑fi novels and Walter Isaacson biographies, and watches
    the latest Pixar animations for their storytelling craft, letting these influences spark his own creative engineering concepts.
  travel: Darius Goodman, who has visited the Smithsonian’s National Air and Space Museum in Washington, D.C., attended the annual RoboCon in San Jose, California, and dreams of exploring Akihabara in Tokyo
    for its gadget culture, all while preferring meticulously planned trips that balance family budgeting with limited school time.
  culinary: Darius Goodman, who favors building his own pepperoni pizza with fresh mozzarella, enjoys a bowl of spicy chicken teriyaki ramen topped with soft‑boiled eggs, and crafts peanut‑butter‑banana
    smoothies for post‑bike recovery, yet often forgets to eat vegetables unless they’re part of a LEGO‑themed snack platter.
  core: Darius Goodman, a methodical teen tinkerer, merges competitive strategy from StarCraft with precise LEGO building, hoards spare parts, and occasionally sacrifices social outings for a new robotics
    challenge.
background:
  cultural: Raised in a close‑knit Black family in Peachtree City, Georgia, Darius is deeply rooted in Southern African‑American traditions. Family gatherings often feature gospel music, soul food, and
    stories of his grandparents' experiences during the civil‑rights era, fostering a strong sense of resilience and community pride. He attends a local church that emphasizes education and service, and
    he participates in community STEM outreach programs aimed at increasing representation of Black youth in technology. The suburban layout of Peachtree City, with its extensive golf‑cart paths and community
    parks, provides him with safe spaces for biking and independent exploration, reinforcing his blend of curiosity and practicality.
attributes:
  skills: '[''Python programming'', ''Basic robotics engineering'', ''Mathematical problem solving'', ''Technical writing'', ''Organizational planning'', ''Small‑group team coordination'']'
  hobbies: '[''Robotics club projects'', ''Strategic video gaming'', ''Science‑fiction and biography reading'', ''Chess puzzles'', ''BMX biking on local trails'', ''LEGO Technic building'']'
  career_goals: Darius aspires to become a robotics engineer or software developer focused on creating sustainable technology solutions. He plans to attend a top STEM university such as Georgia Tech or
    MIT, where he can deepen his expertise in artificial intelligence and autonomous systems. Long‑term, he hopes to lead a research team that designs affordable robotics for community health and education,
    and later mentor younger Black students in his hometown to pursue STEM careers.
