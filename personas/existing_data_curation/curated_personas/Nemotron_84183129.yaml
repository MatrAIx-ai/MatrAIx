  hobbies: '[''Cooking Mexican cuisine and fusion recipes'', ''Gardening (chilies, herbs, vegetables)'', ''Senior center social activities (dance nights, bingo)'', ''Volunteering at church and food pantry'',
    ''Attending Mexican cultural festivals'', ''Genealogy research'', ''Walking in local parks'', ''Listening to ranchera music and dancing'']'
  career_goals: Although retired, Gabriel aims to stay mentally and physically active by continuing to share his cultural heritage. He plans to compile a family recipe book that blends traditional Mexican
    flavors with New England produce, and hopes to travel back to Mexico to reconnect with extended family and participate in community festivals. He also wants to deepen his digital skills so he can video‑chat
    with grandchildren and offer virtual mentorship. Volunteering at the parish food pantry and leading senior‑center workshops on basic home repairs are central to his sense of purpose. Ultimately, Gabriel
    seeks to leave a lasting legacy of family cohesion, cultural pride, and practical knowledge for the next generation.
