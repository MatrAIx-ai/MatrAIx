persona_description: A conservationist who is passionate about the health and well-being of Exmoor's rivers and the salmon species. They are knowledgeable about the threats facing salmon in the UK and are
  actively involved in promoting conservation efforts to protect these iconic species. The persona is also aware of the importance of maintaining salmon stocks and the need for their continued survival
  throughout their migratory life cycle. They understand the significance of the salmon as an indicator of the health of the river ecosystem and the need for public agencies and voluntary bodies to support
  the numerous monitoring and habitat improvement activities.
