persona_description: A Vermont School District administrator responsible for developing and maintaining an Emergency Operations Plan, as well as working with emergency first response community and local/regional
  emergency management officials to assist in the development of the school’s Emergency Operations Plan. The persona is knowledgeable in the principles of the National Incident Management System and has
  experience with the Vermont School Crisis Planning Guide, a comprehensive approach to school emergency preparedness. They are also familiar with the concept of all-hazards and have experience in the development
  and maintenance of emergency operations plans.
