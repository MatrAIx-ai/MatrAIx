personas:
  professional: Renaldo Santana is a CNC machinist and quality inspector at a Cincinnati precision parts shop, leveraging a strong mechanical aptitude, expertise in MIG/TIG welding, and meticulous reading
    of technical drawings, while channeling their organized, methodical nature and competitive drive into improving line efficiency and mentoring teammates.
  sports: Renaldo Santana is an avid pick‑up basketball player at Fountain Square and a forward for the community soccer club ‘Cincinnati Immigrants FC,’ and they regularly cheer on the Cincinnati Bengals
    and Reds while maintaining a disciplined gym routine at ‘Fit4Life’ that blends strength training with cardio drills to stay competition‑ready year‑round.
  arts: Renaldo Santana delights in salsa dancing at ‘La Rumba’ nights, attends live shows ranging from Juan Luis Guerra’s salsa orchestra to The Strokes’ indie rock set at Riverfest, and they collect vinyl
    records of Celia Cruz and Bad Bunny, drawing creative energy from these musical experiences that spill over into their hands‑on drone designs.
  travel: Renaldo Santana favors weekend road trips to nearby cities like Louisville for bourbon tours and Chicago for blues festivals, while dreaming of a summer adventure to Mexico City’s street food
    markets and a trek to Machu Picchu, and they plan each itinerary with a spreadsheet to balance cost, time off work, and the chance to capture drone footage of iconic landmarks.
  culinary: Renaldo Santana prides themselves on mastering the preparation of pepian and tamales, seasoned with roasted chilies, cumin, and coriander, while also experimenting with craft IPA‑marinated chicken
    wings and homemade guajillo‑chili salsa, and they often host dinner parties where friends sample their spicy dishes alongside local brewery samplers.
  core: Renaldo Santana is a methodical CNC machinist who channels their competitive spark into both the shop floor and weekend courts, balancing disciplined budgeting with a love for spicy home‑cooked
    meals and late‑night drone builds.
background:
  cultural: Renaldo grew up in a close‑knit Guatemalan immigrant family, fluent in both Spanish and English. His upbringing emphasized family loyalty, Catholic traditions, and celebrations such as Semana
    Santa and Día de los Muertos. He remains active in Cincinnati’s Guatemalan community, participating in cultural festivals, listening to marimba music, and preserving culinary traditions, while also
    embracing the values of hard work and resilience that have helped him thrive in the Midwestern United States.
