  career_goals: Renaldo aims to move into a supervisory role on the production floor within the next three years, earning a CNC programming certification and a Lean Six Sigma Green Belt along the way. He
    wants to lead process‑improvement projects that boost efficiency and reduce waste, and eventually launch his own small precision‑parts fabrication shop to provide stability for his family and give back
    to his community.
