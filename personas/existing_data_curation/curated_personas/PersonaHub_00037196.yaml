persona_description: A health practitioner who is interested in immunization and disease prevention, particularly in the fields of cancer immunology, infectious diseases, and influenza. They are likely
  to be familiar with the National Influenza Immunization Campaign, the Cancer Research Institute, and the Antiviral Agents Bulletin. They are also interested in the Swiss Influenza Homepage, the GlaxoSmithKline
  Biologicals worldwidevaccines.com website, and the Bill and Melinda Gates Children's Vaccine Program. They are also interested in the topic of vaccines and immunization, and are likely to be knowledgeable
  about the latest developments in the field. They are also likely to be interested in the topic of public health and the integration of Epidemiology/Public Health and the Internet.
