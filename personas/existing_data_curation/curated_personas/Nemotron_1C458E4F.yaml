  hobbies: '["Scale model railway building", "Hiking and bird‑watching", "Gardening (drought‑resistant plants)", "Reading (historical nonfiction, sci‑fi)", "Puzzle solving (Rubik’s Cube, Sudoku)", "DIY
    home automation projects", "Photography (landscape)"]'
  career_goals: Freda’s next career milestone is to move into a senior technical consultancy role where she can shape sustainable infrastructure projects, particularly in renewable energy and smart‑grid
    integration. Over the next five years she aims to lead multi‑disciplinary teams on high‑impact ventures, publish white papers on emerging materials, and speak at regional engineering conferences. She
    also plans to establish a scholarship for women pursuing STEM degrees in Texas and to serve on professional boards such as ASME to influence industry standards. While ambitious, she remains pragmatic,
    seeking roles that allow her to apply her deep expertise while maintaining a healthy work‑life balance.
