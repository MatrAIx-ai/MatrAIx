personas:
  professional: Jimmie Tarlton is a 27‑year‑old mental‑health counselor who blends rigorous CBT practice with a tech‑savvy approach, using data‑driven outcome tracking and custom spreadsheets to refine
    treatment plans while they juggle the hectic pursuit of an LPC credential and a future private practice.
  sports: Jimmie Tarlton regularly joins pickup basketball games at the local Boone County park, hikes the rolling trails of Hoosier National Forest on weekends, and energetically supports the Indiana Pacers,
    Indianapolis Colts, and Indiana Fever while they occasionally rock a pair of running shoes for a quick jog around town.
  arts: Jimmie Tarlton strums an acoustic guitar at informal jam sessions, thrives in community theater improv workshops, and fills evenings with live music featuring John Mayer, The Avett Brothers, and
    emerging indie folk acts, while they often swap stories about favorite songs over coffee.
  travel: Jimmie Tarlton favors spontaneous road trips to music hubs like Nashville and Chicago, dreams of backpacking the Appalachian Trail, balances limited travel funds with weekend getaways to local
    breweries and historic small towns, and they rely on a mix of budget‑travel apps and last‑minute deals to satisfy their wanderlust.
  culinary: Jimmie Tarlton cooks quick, protein‑rich meals such as chicken pesto pasta and quinoa‑black bean bowls seasoned with fresh basil and garlic, enjoys perfecting banana pancake Sunday rituals,
    and they treat themselves to craft beer and artisanal coffee while debating whether to try a new recipe from a food blog.
  core: Jimmie Tarlton is an energetic, worry‑prone counselor who merges data‑driven therapy with spontaneous social fun, juggling structured career ambitions and a laid‑back lifestyle peppered with quirky
    habits like occasional budget missteps and midnight guitar strumming, and they constantly wrestle with the balance between control and carefree.
background:
  cultural: Jimmie grew up in a middle‑class family in the suburbs of Indianapolis, Indiana, absorbing the Midwestern values of community orientation, practicality, and modest self‑reliance. His white,
    Midwestern upbringing emphasized a strong work ethic, a preference for clear structures, and a friendly, direct communication style. These cultural influences, combined with exposure to a supportive
    local school system that encouraged both scientific inquiry and community service, shaped his balanced worldview—valuing both data‑driven decision making and personal connection.
attributes:
  skills: '[''Active Listening'', ''Cognitive Behavioral Therapy (CBT)'', ''Motivational Interviewing'', ''Group Facilitation'', ''Crisis Intervention'', ''Case Management'', ''Data Analysis'', ''Psychometric
    Assessment'', ''Electronic Health Record (EHR) Management'', ''Conflict Resolution'', ''Program Development'']'
  hobbies: '[''Pickup Basketball'', ''Hiking'', ''Acoustic Guitar'', ''Community Theater Improv'', ''Coding Side Projects'', ''STEM Club Mentoring'', ''Yoga'', ''Live‑Music Concerts'', ''Board‑Game Nights'']'
  career_goals: Jimmie aims to earn his Licensed Professional Counselor (LPC) credential within the next two years and pursue a master’s degree in Clinical Mental Health Counseling to deepen his expertise.
    He aspires to specialize in adolescent substance‑use counseling and develop a community‑based outreach program in Boone County that integrates data‑driven outcome tracking. Long‑term, he hopes to open
    a private practice that blends traditional therapy with digital health tools, such as teletherapy platforms and mobile mood‑tracking apps, while also serving as a supervisor for upcoming counselors.
