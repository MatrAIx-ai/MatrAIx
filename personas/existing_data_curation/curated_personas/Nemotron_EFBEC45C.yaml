personas:
  professional: Ellen Imran, a senior Software Quality Assurance Analyst, leverages their methodical precision and curiosity to craft robust automation frameworks using Selenium, Cypress, and Python while
    bridging technical and business teams through clear communication and design-thinking workshops.
  sports: Ellen Imran, an avid weekend hiker, enjoys tackling Colorado’s Rocky Mountain trails, participates in the Trailblazers Running Club, attends Denver Nuggets basketball games in the winter, and
    practices yoga at the community studio to balance their fitness routine.
  arts: Ellen Imran, a frequent visitor of local galleries, draws watercolor studies inspired by Claude Monet and Georgia O'Keeffe, volunteers backstage at the community theater where they admire productions
    of Lin‑Manuel Miranda’s Hamilton, and discusses contemporary fiction by Sally Rooney in a monthly book club, letting these artistic encounters inform their creative problem‑solving at work.
  travel: Ellen Imran, a meticulous planner, often escapes to Colorado’s Mesa Verde National Park for weekend hikes, has visited Kyoto’s Arashiyama bamboo forest to experience Japanese garden design, and
    keeps a wish‑list for a culinary tour of Tuscany, always booking trips through a mix of detailed itineraries and spontaneous local recommendations that suit their desire for both structure and surprise.
  culinary: Ellen Imran, an experimental home cook, perfects dishes like Moroccan chicken tagine with preserved lemons and apricots, Japanese ramen featuring homemade shoyu broth and fresh shiitake, and
    Mediterranean quinoa salad tossed with feta, olives, and roasted cherry tomatoes, showcasing a moderate skill level that thrives on fresh herbs and seasonal produce from their garden.
  core: Ellen Imran blends analytical rigor with artistic curiosity, juggling QA leadership ambitions and watercolor sketchpads, while occasionally overcommitting to side projects and forgetting to schedule
    personal downtime, even though they know the value of balance.
background:
  cultural: Ellen grew up in the heart of the Midwest, raised in a small‑town environment that emphasized community, modesty, and a strong work ethic. Her family’s roots trace back to German and Irish immigrants
    who settled in Ohio in the early 20th century, leaving a legacy of seasonal traditions, folk music, and a love for hearty home‑cooked meals. The multicultural nature of her marriage—her husband’s Middle‑Eastern
    heritage—has broadened her cultural perspective, introducing her to Arabic cuisine, music, and celebrations, which she embraces alongside her own Midwestern customs. Ellen’s cultural identity is shaped
    by a blend of Midwestern pragmatism, appreciation for artistic pursuits, and an openness to new cultural experiences, reflected in her participation in local arts festivals, community volunteer work,
    and seasonal family gatherings.
attributes:
  skills: '[''manual testing'', ''test automation (Selenium, Cypress)'', ''Python scripting'', ''JavaScript scripting'', ''test planning and design'', ''defect tracking (JIRA, TestRail)'', ''performance
