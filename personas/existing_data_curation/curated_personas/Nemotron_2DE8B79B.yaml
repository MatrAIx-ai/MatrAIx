personas:
  professional: Maritza Velazquez, a 7-year-old budding junior architect, uses LEGO blocks to prototype imagined cityscapes, applying their organized curiosity and practical mindset to construct sturdy
    structures and narrate their functions to friends.
  sports: Maritza Velazquez, a 7-year-old soccer enthusiast, plays forward for the Little Lions Soccer Club at the neighborhood park, idolizes the tactics of FC Barcelona's youth academy, and cheers for
    the Los Angeles Galaxy during televised matches, and they love the open field, relishing the teamwork and chance to sprint after the ball.
  arts: Maritza Velazquez, a 7-year-old bilingual book lover and budding illustrator, draws vibrant animal and landscape pictures inspired by the colorful murals of Diego Rivera and the whimsical style
    of Dr. Seuss, dances to cumbia beats by Celso Piña and mariachi classics from Mariachi Vargas de Tecalitlán, enjoys the animated adventures of Pixar's Finding Nemo and Studio Ghibli's My Neighbor Totoro,
    and they often share their sketches with family and friends.
  travel: Maritza Velazquez, a 7-year-old adventure seeker, has explored the nearby Red Rock Canyon nature trail, taken a family road trip to the Grand Canyon, visited Disneyland for a magical weekend,
    dreams of seeing the pyramids of Giza and the rainforests of Costa Rica, and they prefer mixed itineraries that blend exciting exploration with familiar snack breaks.
  culinary: Maritza Velazquez, a 7-year-old kitchen helper, delights in mashing ripe avocados with lime juice, salt, and cilantro to make guacamole, assembling tacos with soft corn tortillas, shredded cheese,
    grilled chicken, cumin, and paprika, and whipping up mango salsa topped with diced jalapeño, and they showcase a budding palate for fresh, bold flavors.
  core: Maritza Velazquez, a curious 7-year-old, blends a practical love for building LEGO cities with a vibrant passion for dancing cumbia, saves coins for new sets while occasionally splurging on candy,
    and they tackle mild allergies with a portable inhaler, all powered by endless energy and a love of simple science experiments.
background:
  cultural: Maritza is a first‑generation Mexican‑American living in Dallas, Texas. She grows up in a bilingual household where Spanish is spoken alongside English, giving her fluency in both languages.
    Her family celebrates Mexican traditions such as Día de los Muertos, quinceañera preparations for older relatives, and holidays that feature homemade tamales and pozole. The vibrant Mexican community
    in Dallas County provides cultural events, dance classes, and Spanish‑language school programs that reinforce her heritage. At the same time, she attends a public elementary school where she interacts
    with peers from diverse backgrounds, blending Mexican cultural values of family and community with the broader American environment.
