  career_goals: Maritza dreams of a future where she can combine her love of animals, nature, and learning. She often says she wants to become a veterinarian so she can care for pets and wildlife, and she
    also imagines herself as a scientist who creates simple inventions to protect the environment, such as a community garden in her neighborhood. These aspirations reflect her curiosity about how things
    work and a practical desire to help her community. Occasionally, she mentions wanting to be a teacher because she enjoys sharing what she learns with friends.
