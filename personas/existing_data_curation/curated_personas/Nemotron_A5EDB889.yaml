personas:
  professional: Farrah Short, a seasoned architect specializing in residential and small‑scale commercial design, historic preservation, and sustainable building, balances their curiosity for innovative
    materials with a practical, code‑compliant mindset, while their relaxed attitude toward obligations occasionally leads to disorganized project timelines, and their competitive spirit drives them to
    mentor emerging architects by challenging design assumptions.
  sports: Farrah Short enjoys low‑impact fitness through morning walks in the prairie, occasional senior yoga classes at the community center, and follows the Minnesota Twins and Minnesota Vikings with
    fervent loyalty, while they also participate in a local quilting club’s weekend walking group, which blends social interaction with gentle cardio.
  arts: Farrah Short finds creative expression through quilting, woodworking, and attending jazz concerts featuring legends like Miles Davis and contemporary artists such as Esperanza Spalding, while they
    also indulge in historical fiction by Hilary Mantel and architectural travel photography, allowing the arts to shape their weekend leisure and inspire their design work.
  travel: Farrah Short prefers thoughtfully planned trips that combine historic architecture and natural scenery, such as a spring visit to the colonial town of Williamsburg, Virginia, a leisurely tour
    of the prairie‑style homes in Kansas, and an annual pilgrimage to the St. Paul Cathedral’s restoration tour, balancing their love for cultural immersion with a modest travel budget.
  culinary: Farrah Short delights in cooking family meals like rosemary‑roasted chicken with root‑vegetable medley, wild‑rice and cranberry pilaf, and homemade apple crumble, employing their woodworking
    precision in the kitchen and favoring ingredients such as sage, fennel, and locally sourced honey to add depth to their dishes.
  core: Farrah Short blends a lifelong passion for historic preservation with a pragmatic love of sustainable design, a competitive mentoring style, a relaxed approach to obligations, and quirky habits
    like late‑night crossword puzzles and occasional forgetfulness about bills, which they attribute to a desire for flexibility over strict scheduling.
background:
  cultural: Farrah grew up in the American Midwest during the post‑war era, raised in a modest, family‑oriented household that emphasized community, self‑reliance, and practicality. Her cultural roots are
    reflected in her appreciation for the prairie landscape, participation in local traditions such as town festivals and Thanksgiving gatherings, and an enduring respect for the region's agricultural heritage.
    As a woman entering the architectural field in the 1960s, she experienced both the challenges and the empowerment of the women's movement, shaping a worldview that balances progressive curiosity with
    a deep respect for established methods and communal values.
