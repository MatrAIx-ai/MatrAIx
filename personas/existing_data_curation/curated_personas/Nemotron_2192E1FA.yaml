personas:
  professional: Stephanie La, a seasoned volunteer coordinator for Riverside’s nonprofits, blends her methodical planning, reliable budgeting, and charismatic public speaking to design community events,
    mentor younger volunteers, and weave genealogical stories into local history programs, while her practical curiosity ensures every project stays on track.
  sports: Stephanie La blends low‑impact fitness with fandom, joining the Riverside Hiking Club for weekend nature walks, attending community yoga sessions, cheering on the Boston Red Sox and New England
    Patriots on television, and competing in a weekly bridge league at the senior center where she treats the game as a strategic sport.
  arts: Stephanie La, an avid reader of Hilary Mantel and David McCullough, regularly visits the New England Historical Society’s gallery to admire Monet’s Impressionist works and local painters, enjoys
    Diana Krall’s jazz piano while baking, and brings dramatic flair to the monthly book club by reciting favorite passages.
  travel: Stephanie La prefers meticulously planned weekend trips to historic sites such as Boston’s Freedom Trail, Philadelphia’s Independence Hall, and Salem’s witch‑tour attractions, relies on senior
    discount rail passes to stay within budget, and dreams of a future pilgrimage to Italy to connect with her extended family heritage.
  culinary: Stephanie La delights in baking seasonal pastries like apple‑cinnamon tarts, pumpkin scones, and lemon shortbread, often seasoning savory dishes with rosemary and thyme harvested from her garden,
    and records her culinary experiments on a self‑made spreadsheet, though she habitually forgets to pre‑heat the oven until the last minute.
  core: Stephanie La, the gregarious garden‑guru who never misses a library shift, keeps a meticulous scrapbook of neighborhood gossip yet habitually misplaces her reading glasses, and can’t resist a fresh
    batch of cinnamon rolls even after dinner.
background:
  cultural: Stephanie was raised in a post‑war suburban environment in the Northeast, where white, middle‑class values emphasized self‑reliance, community service, and family traditions. Her family’s roots
    include French‑Canadian ancestry reflected in the surname 'La', coupled with broader Anglo‑American cultural influences. Growing up in New Jersey, she absorbed the region’s blend of ethnic diversity
    and civic engagement, participating in church events, holiday gatherings, and neighborhood associations. These experiences fostered a strong sense of duty to her community, an appreciation for collective
    celebration, and a respect for preserving local history.
