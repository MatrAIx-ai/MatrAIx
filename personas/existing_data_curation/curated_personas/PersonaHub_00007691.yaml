persona_description: A World War II veteran who flew the Typhoon fighter-bomber during the Second World War, specifically serving with the City of Ottawa 440 Squadron and flying 99 missions in 1944, most
  of them including two into France on D-Day, in Typhoons. The veteran recalls the struggles and difficulties faced during the war, including carbon monoxide seepage into the cockpit on earlier models and
  limited visibility, especially on takeoff and landing. The veteran is proud of his service and the achievements he made as a Typhoon ace during the war.
