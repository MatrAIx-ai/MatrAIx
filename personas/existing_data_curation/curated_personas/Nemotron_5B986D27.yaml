  hobbies: '[''Chess'', ''Weight Training'', ''Running (5K)'', ''Basketball (Spectator and Pickup)'', ''Reading (Finance & Personal Development)'', ''Church Participation'', ''Community Mentoring'', ''Hip‑hop
    & R&B Listening'', ''Cooking Soul Food'']'
  career_goals: In the short term, Tesfaye aims to solidify his foothold in the Charlotte market by closing at least ten transactions per quarter, earning a top‑quartile performance rating, and obtaining
    the Certified Residential Specialist (CRS) designation. Over the next three to five years, he plans to launch his own boutique brokerage focused on residential properties in rapidly growing neighborhoods
    like South End and Uptown, assembling a tightly knit team of five agents who share his disciplined, client‑centric ethos. Long‑term, Tesfaye envisions becoming a recognized thought leader in real‑estate
    investment for young African American professionals, speaking at industry conferences, mentoring emerging agents, and building a diversified portfolio of rental properties that generate passive income
    while supporting community revitalization efforts. He also aspires to complete a bachelor’s degree in business administration to augment his strategic acumen.
