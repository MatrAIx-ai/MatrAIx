persona_description: A philosopher who is skeptical of the notion of purpose in biology, particularly in the context of natural selection. They believe that teleological thinking is heuristic and imposes
  itself on the world, and that natural selection alone can explain the appearance of design-like traits in organisms. They are interested in the implications of this for the understanding of human consciousness,
  free will, and moral choice. They are also interested in the potential for a coherent theory of evolution that does not rely on the concept of purpose.
