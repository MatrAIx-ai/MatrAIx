  career_goals: Louis aims to move up to a district‑manager position within the next few years, using his supervisory experience to mentor multiple store teams. He plans to earn a formal retail management
    certification to solidify his expertise. Parallel to his corporate ambitions, he dreams of launching a small boutique that highlights work by regional artists, merging his love for art with his retail
    background. Long‑term, he hopes to transition into part‑time consulting for independent retailers, allowing him to stay engaged while reducing daily stressors as he approaches retirement.
