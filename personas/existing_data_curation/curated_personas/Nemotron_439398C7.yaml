  hobbies: '[''Reading (fiction and historical books)'', ''Sketching and drawing'', ''Puzzle solving (jigsaw, Sudoku)'', ''Playing piano'', ''Educational apps on tablet'', ''Observing cooking traditional
    Dominican dishes'', ''Attending Dominican cultural festivals'', ''Collecting stickers'', ''Nature walks in local parks'']'
  career_goals: Liliana aspires to a career that offers structure, quiet focus, and the chance to help others. She dreams of becoming a librarian or archivist, where she can organize information and create
    calm spaces for community members, especially sharing resources related to Dominican culture and literature. She also has an emerging interest in computer science, hoping to design educational apps
    that support children’s learning, allowing her to work behind the scenes in a systematic environment. Her ambition includes attending a high school with strong STEM and library science programs and
    eventually earning a degree in library and information science or computer engineering.
