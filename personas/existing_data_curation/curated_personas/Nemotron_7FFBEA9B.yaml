personas:
  professional: Caran Lebouef, a seasoned landscape maintenance specialist who leverages decades of hands‑on expertise in soil health, irrigation design, and equipment repair to create low‑maintenance therapeutic
    gardens, channels their preference for structure into meticulous project plans while embracing a relaxed, sometimes chaotic, approach to scheduling, and asserts themselves confidently when guiding apprentices
    and negotiating contracts for senior‑living communities.
  sports: Caran Lebouef enjoys low‑impact fitness through early‑morning bird‑watching walks along Port Orange’s coastal trails and participates in a weekly senior yoga class at the local community center;
    they cheer for the Orlando Magic during basketball season, follow the Tampa Bay Buccaneers for football, and belong to the Port Orange Garden Club’s walking group that meets on Saturdays.
  arts: Caran Lebouef spends quiet afternoons sketching plant silhouettes in a weathered notebook, draws inspiration from the botanical paintings of Georgia O'Keeffe, listens to the folk ballads of Joan
    Baez while working, and collects historical fiction by Leslie Marmon Silko that explores indigenous narratives, occasionally attending local cultural festivals featuring traditional dancers and handcrafted
    textiles.
  travel: Caran Lebouef prefers serene, nature‑focused travel, often planning week‑long trips to places like the Everglades National Park, the coastal town of St. Augustine, and the ancient ruins of Tulum;
    they favor self‑guided itineraries, rely on a modest travel budget, and dream of a future solo excursion to Patagonia's lenga forests, though family responsibilities sometimes limit extended voyages.
  culinary: Caran Lebouef enjoys cooking with herbs from their patio garden—such as rosemary, sage, and native oregano—preparing dishes like herb‑infused grilled sardines, quinoa salad with cilantro‑lime
    dressing, and slow‑cooked chicken stew seasoned with chilies and epazote; their culinary skill is modest but they relish savoring meals at quiet seaside cafes and experimenting with traditional spice
    blends.
  core: Caran Lebouef, a solitary 61‑year‑old landscape artisan, blends ancestral plant wisdom with modern garden design, savoring quiet mornings with birdsong while juggling relaxed planning habits and
    a steady, low‑key financial life.
background:
  cultural: Caran’s family traces its lineage to the Mixtec peoples of southern Mexico, interwoven with broader Latin American cultural traditions. Growing up, she learned traditional uses of native plants
    for food, medicine, and ceremony, and she retains a deep respect for the land’s rhythms. Although she was raised in the United States, she celebrates her heritage through cooking regional dishes, preserving
    oral histories, and integrating indigenous planting knowledge into her landscaping work, especially by favoring drought‑tolerant species that reflect her ancestors’ stewardship of arid environments.
attributes:
  skills: '[''Soil testing and amendment'', ''Native plant identification'', ''Irrigation system design and troubleshooting'', ''Equipment operation and maintenance'', ''Landscape design for low‑maintenance
    gardens'', ''Safety training and compliance'', ''Basic horticultural pest management'']'
  hobbies: '[''Bird‑watching'', ''Container herb gardening'', ''Sketching plant drawings'', ''Reading historical fiction'', ''Woodworking (building garden benches)'', ''Attending cultural festivals'']'
  career_goals: Looking ahead, Caran wishes to transition from hourly employment to operating a small, niche landscaping business focused on quiet, therapeutic gardens for senior living communities and
    private clients who appreciate solitude. She hopes to obtain a Florida Certified Landscape Technician (FCLT) credential, mentor a handful of apprentices, and eventually compile a handbook that blends
    modern landscape practices with indigenous plant stewardship. She also aims to secure a modest contract with the city of Port Orange for maintaining community greenways.
