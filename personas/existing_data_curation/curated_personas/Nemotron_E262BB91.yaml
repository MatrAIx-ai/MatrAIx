  hobbies: '[''Visiting Art Galleries'', ''Reading Literature and Poetry'', ''Sketching and Watercolor Painting'', ''Creative Writing and Journaling'', ''Gardening'', ''Birdwatching'', ''Knitting'', ''Listening
    to Jazz and Classical Music'', ''Solving Crossword Puzzles'']'
  career_goals: Shirvonne aspires to transition her lifelong love of the arts into a low‑stress, purpose‑driven role as a community museum docent or volunteer curator, where she can share her art knowledge
    without the demands of a high‑traffic retail environment. She hopes to develop a modest freelance portfolio of art‑related writing—blog posts, exhibition reviews, and short essays—that will allow her
    to earn supplemental income while maintaining her solitude. Ultimately, she seeks financial stability for a comfortable retirement, the opportunity to mentor younger art enthusiasts in a one‑on‑one
    setting, and the chance to exhibit her own watercolor paintings in local shows.
