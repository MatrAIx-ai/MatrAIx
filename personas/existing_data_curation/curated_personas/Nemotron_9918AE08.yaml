  career_goals: Christin aims to advance to a senior leadership role, such as Director of Compliance or Chief Compliance Officer, within the next five years. She seeks to lead organization‑wide risk management
    initiatives, mentor junior staff, and drive a culture of ethical decision‑making. To support these goals, she plans to obtain the Certified Regulatory Compliance Manager (CRCM) credential and deepen
    her knowledge of emerging data‑privacy regulations.
