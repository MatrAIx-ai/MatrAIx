  hobbies: '[''Visiting art museums and galleries'', ''Hiking in the Sonoran Desert'', ''Playing beach volleyball'', ''Cooking and experimenting with Southwestern cuisine'', ''Digital photography'', ''Attending
    live music and theater'', ''Volunteering at community art festivals'', ''Reading contemporary fiction and philosophy'']'
  career_goals: Kenneth aims to re‑enter the workforce by establishing a community‑focused arts hub in Mesa that offers workshops, pop‑up exhibitions, and event‑planning services. In the medium term he
    hopes to secure a role as program director for a non‑profit arts organization, curating inclusive exhibitions that highlight local Southwestern and indigenous artists. Ultimately, he aspires to open
    his own gallery‑café that serves as a cultural gathering place and supports emerging creators.
