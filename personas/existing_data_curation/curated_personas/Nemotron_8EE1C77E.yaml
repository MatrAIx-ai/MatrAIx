  hobbies: '[ ''Visiting art galleries and street murals'', ''Urban photography'', ''Collecting and listening to vinyl records (jazz, blues, hip‑hop)'', ''Reading non‑fiction (urban development, finance,
    culture)'', ''Hiking and fishing in nearby parks'', ''Pickup basketball games'', ''Chess and puzzle solving'', ''Mentoring high‑school students (financial literacy)'', ''Volunteering at local art festivals'',
    ''DIY crafts and digital illustration workshops'', ''Experimental cooking blending Southern and Midwestern cuisine'' ]'
  career_goals: Andre aims to earn a Certified Financial Services Counselor (CFSC) credential within the next two years and transition from loan interviewer to senior loan officer. Over the next five years
    he hopes to become a branch manager, where he can influence lending policies to be more inclusive of Black‑owned small businesses and creative entrepreneurs. Long‑term, he envisions launching a micro‑lending
    program or a community development financial institution (CDFI) focused on supporting local artists and startups in Rockford, merging his finance expertise with his passion for the arts. He also plans
    to complete an associate degree in finance to strengthen his analytical skills and to attend project‑management training to improve his organizational effectiveness.
