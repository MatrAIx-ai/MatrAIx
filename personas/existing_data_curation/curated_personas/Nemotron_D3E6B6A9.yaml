    acoustic guitar'', ''journaling'']'
  career_goals: Dante hopes to combine his compassion with his practical abilities by pursuing a career in emergency medical services, such as becoming a paramedic or EMT, so he can help people in his rural
    community. He also dreams of studying environmental science or sustainable agriculture at a community college, aiming to address local ecological challenges. In the short term, he plans to earn his
    first aid certification and attend a youth EMT training program offered by the nearby fire department.
