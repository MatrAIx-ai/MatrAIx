personas:
  professional: A budding teen astronomer and hobbyist engineer, Dante Eddington blends love for model rockets and wildlife sketching with a practical mindset, channeling curiosity into science‑fair projects
    while staying relaxed about deadlines, preferring hands‑on learning over rigid schedules, and they often skip formal paperwork in favor of tinkering.
  sports: Dante Eddington's athletic interests center on hiking the Ozark trails and a casual membership in the local youth fishing club, while they cheer passionately for the St. Louis Cardinals and the
    Kansas City Chiefs, preferring low‑key weekend outings to organized team sports.
  arts: Dante Eddington's creative side shines through acoustic guitar sessions where they strum folk classics by Bob Dylan and modern indie tunes by Fleet Foxes, alongside sketching native plants inspired
    by botanical artist Margaret Mee, and they often lose themselves in the storytelling of Star Wars soundtracks.
  travel: Dante Eddington's travel style mixes careful planning for family road trips to Ozark state parks with spontaneous day‑trips to the nearby Steelville Fair, while they dream of hiking the Grand
    Canyon and visiting NASA's Kennedy Space Center, balancing a modest budget with a yearning for wide‑open horizons.
  culinary: Dante Eddington's palate favors hearty Mid‑Missouri fare like chicken fried steak and tangy BBQ ribs, yet they also love preparing simple veggie‑packed salads with fresh tomatoes and cucumbers
    from the local farmer’s market, often experimenting with homemade trail mix topped with dried cranberries and pecans.
  core: Dante Eddington is a curious, compassionate teen whose practical tinkering and love of nature are tempered by a relaxed, sometimes disorganized streak and an undercurrent of worry that fuels both
    meticulous journaling and occasional over‑thinking.
background:
  cultural: Dante was raised in Steelville, a small Mid‑Missouri town where community life revolves around family gatherings, church events, and local traditions like the Steelville Fair. The region's rural
    heritage, with family roots in farming and outdoor recreation, has fostered a strong sense of self‑reliance and neighborly support. While the town is predominantly white, its close‑knit atmosphere promotes
    cooperation and mutual assistance, values that align with Dante's compassionate and cooperative nature. Local schools and community programs provide modest exposure to broader ideas, encouraging his
    curiosity within a practical, grounded environment.
attributes:
  skills: '[''mechanical troubleshooting'', ''basic digital literacy'', ''introductory coding (Scratch, Python)'', ''empathetic listening'', ''peer mediation'', ''first aid basics'', ''animal care'']'
