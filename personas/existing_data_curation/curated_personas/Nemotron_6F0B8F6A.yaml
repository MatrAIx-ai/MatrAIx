    community center'', ''attending youth group'']'
  career_goals: Robin aims to complete her high school education, possibly through a GED program, and then pursue a vocational certificate in nursing assistance or community mental‑health support. She envisions
    working in a local clinic or school environment where she can combine her desire to help others with a stable, supportive setting. Long‑term, she hopes to become a certified nursing aide or peer counselor,
    allowing her to apply her empathy, practical skills, and balanced approach to a low‑stress, community‑focused career.
