  career_goals: Soonja aspires to become an illustrator or visual storyteller who can share her imagination with others, while also dreaming of a role that helps children—such as a teacher, youth mentor,
    or community arts coordinator. She hopes to start an art club at her elementary school and eventually pursue a career that blends creativity, education, and compassion, allowing her to make a positive
    impact on her community.
