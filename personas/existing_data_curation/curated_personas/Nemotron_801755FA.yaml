personas:
  professional: Soonja La, a 9-year-old budding robotics enthusiast and aspiring cartoonist, blends meticulous organization with a love for creative problem solving, leading school robotics club projects
    with disciplined Scratch coding while consistently refining comic sketches to meet high personal standards.
  sports: Soonja La plays on the North County Youth Soccer Club, practices Korean cultural dance classes for stamina, cheers passionately for the San Diego Padres, and joins weekend swimming lessons at
    the local community center to stay active year‑round.
  arts: Soonja La spends afternoons sketching cartoons inspired by Studio Ghibli’s Miyazaki, Dr. Seuss’s whimsical lines, and Pixar’s character designs, while regularly visiting the San Diego Museum of
    Art to study works by Leonardo da Vinci and Frida Kahlo, letting those influences shape their own storytelling art.
  travel: Soonja La loves family road trips to the California coast, has visited Disneyland and the San Diego Zoo, dreams of exploring the ancient castles of Edinburgh, and enjoys planning detailed itineraries
    that balance museum stops with interactive science museums.
  culinary: Soonja La enjoys crafting homemade pizza with mozzarella, pepperoni, and fresh basil, loves making chocolate chip cookies using vanilla extract and melted butter, and occasionally experiments
    with simple Korean‑style bulgogi tacos, though they sometimes forget to clean up the kitchen afterward.
  core: Soonja La is a curious, highly organized nine‑year‑old who channels boundless creativity into art and robotics, thrives on social interaction, shows deep compassion through volunteering, yet wrestles
    with frequent bouts of anxiety that can trigger impulsive splurges and occasional procrastination.
background:
  cultural: Soonja comes from an East Asian American family, likely Korean, that maintains strong cultural traditions while living in San Diego. Her household celebrates Lunar New Year and Chuseok, serves
    traditional dishes like bibimbap and kimchi, and attends Korean language school on weekends. The family values education, community harmony, and respect for elders, which influence Soonja's disciplined
    approach to schoolwork and her compassionate interactions with peers. Growing up in a diverse city, she blends her heritage with American culture, participating in local festivals and community events.
