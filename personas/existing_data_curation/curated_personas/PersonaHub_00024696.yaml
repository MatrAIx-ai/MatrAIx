persona_description: A scientist or geologist who is interested in understanding the processes that occur in lava before it erupts and as it solidifies, and how these processes can influence radiometric
  dating. They are likely to be curious about the many factors that can affect the daughter to parent ratios of minerals in lava, and how these factors can be used to determine the age of rocks. They may
  also be interested in the broader implications of the discovery that the parent to daughter ratios in lava can be influenced by the processes that occur during its formation and solidification, and how
  this could change the way radiometric dating is conducted.
