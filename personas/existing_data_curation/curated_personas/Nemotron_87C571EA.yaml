personas:
  professional: Marion Nielsen, a 25‑year‑old aspiring curator, blends their curiosity and sociable energy with meticulous planning to design community‑focused exhibitions, write compelling art criticism,
    and run engaging workshops, using their skills in digital illustration, social‑media strategy, and public speaking to make regional art accessible to diverse audiences.
  sports: Marion Nielsen cheers on the Wichita State Shockers basketball team and the Kansas City Chiefs during the football season, belongs to a local hiking club that explores the scenic lake trails each
    summer, and participates in a weekly recreational yoga class that doubles as a low‑impact fitness routine.
  arts: Marion Nielsen frequents the Wichita Art Museum and local galleries, draws inspiration from Monet’s watercolors and contemporary illustrator James R. Eads, contributes thoughtful reviews of productions
    at the Wichita Music Theatre starring the resident troupe, and volunteers at community art festivals featuring local folk musician The Dandelion Parade.
  travel: Marion Nielsen enjoys purposeful travel, having trekked the historic streets of Savannah, Georgia, explored the desert art installations of Marfa, Texas, and visited the Gettysburg Battlefield
    for research, while planning future trips to Europe’s Renaissance museums to fuel their curatorial studies.
  culinary: Marion Nielsen loves cooking with garden‑fresh basil, rosemary, and heirloom tomatoes, often preparing dishes like zucchini noodles with lemon‑basil pesto, pan‑seared salmon with dill sauce,
    and a hearty beet and goat‑cheese salad, while hosting weekly recipe‑swap evenings with friends that blend global flavors.
  core: Marion Nielsen is a curious, sociable art enthusiast who balances meticulous organization with spontaneous creativity, turning community engagement into a vibrant career path while juggling study,
    budgeting, and a zest for travel and culinary experiments.
background:
  cultural: Marion grew up in a middle‑class white family in the Midwest, deeply rooted in the small‑town community of Shawnee, Kansas. Her heritage includes Scandinavian (Danish/Norwegian) ancestry, reflected
    in her surname Nielsen, as well as broader Central European roots. Midwestern cultural values—friendliness, community involvement, modest self‑reliance, and a strong emphasis on education—have shaped
    her worldview. She celebrates traditional American holidays such as Thanksgiving and Independence Day with family, participates in county fairs and church gatherings, and actively volunteers in local
    civic and cultural initiatives, embodying a blend of personal curiosity and regional cultural ties.
