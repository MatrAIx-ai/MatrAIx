  career_goals: Marion aspires to transition from her current role as a stay‑at‑home partner to a professional position that harnesses her passion for the arts and community engagement. In the near term,
    she plans to pursue a master's degree in Museum Studies or Arts Administration and secure a curatorial or program‑management role at a regional museum or cultural center. Over the longer term, she hopes
    to launch a community art space in Shawnee that offers workshops, rotating gallery shows, and youth outreach initiatives, while also developing a freelance portfolio of art criticism, essays, and illustrated
    projects.
