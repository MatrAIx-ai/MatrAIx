  hobbies: '[''Kayaking'', ''Sailing'', ''Birdwatching'', ''Wildlife photography'', ''Coastal gardening'', ''Volunteer work at Chincoteague National Wildlife Refuge'', ''Community theater'', ''Seafood cooking'',
    ''Book club'', ''Yoga'']'
  career_goals: Melissa aims to advance from first‑line supervisor to senior office manager within the next five years, securing a Certified Administrative Professional (CAP) credential to formalize her
    expertise. She plans to introduce a paper‑less filing system and streamlined onboarding program for her department, enhancing efficiency while preserving the predictability she values. Long‑term, she
    hopes to mentor emerging supervisors and eventually transition into a part‑time consultancy role that supports local businesses on the Eastern Shore with operational best practices.
