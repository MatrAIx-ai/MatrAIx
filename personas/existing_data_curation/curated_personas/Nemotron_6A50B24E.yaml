personas:
  professional: Jenna Handegan, a future community health worker in training, blends her peer‑mediator experience, basic first‑aid knowledge, and hands‑on DIY skills to organize neighborhood health outreach
    events while prioritizing sustainable living and embracing a flexible, occasionally disorganized planning style.
  sports: Jenna Handegan, a member of the Blue Ridge Hiking Club who frequently tackles moderate trail hikes, occasionally plays on the local youth soccer league, and roots for the Carolina Panthers as
    her favorite professional football team, balances outdoor activity with a relaxed approach to structured sports.
  arts: Jenna Handegan, who spends evenings watercolor‑painting tranquil countryside scenes inspired by Claude Monet and editing short documentary clips for her school’s social‑media page, finds creative
    refuge in the folk melodies of Bon Iver and the novels of Jane Austen.
  travel: Jenna Handegan, who favors spontaneous weekend trips to nearby state parks like Shenandoah and dreams of backpacking through the Scottish Highlands, plans her adventures on a shoestring budget
    using rideshare apps and hostels, allowing her modest savings to stretch across both local nature escapes and distant wanderlust.
  culinary: Jenna Handegan, an enthusiastic home baker, experiments with simple pastries such as lemon scones drizzled with local honey and rustic vegetable quiches, while also preparing hearty bean soups
    seasoned with fresh basil harvested from her garden.
  core: Jenna Handegan is a compassionate, nature‑loving teen who blends community service, creative hobbies, and sustainable living into a relaxed, occasionally disorganized lifestyle.
background:
  cultural: Jenna grew up in Bealeton, a small community in Fauquier County, Virginia. Her family has deep roots in the region's agricultural and small-town traditions, valuing self-reliance, neighborly
    help, and a close connection to the land. The local culture mixes historic Southern hospitality with a modern emphasis on community engagement and environmental awareness. Jenna's upbringing included
    participation in town fairs, church-based service projects, and family gatherings that celebrate regional foods and storytelling. These experiences have shaped her practical outlook, cooperative spirit,
    and appreciation for both tradition and new ideas.
attributes:
  skills: '[''Active listening'', ''Peer mediation'', ''Basic first aid'', ''Gardening'', ''Animal care'', ''DIY home repairs'', ''Cooking'', ''Simple woodworking'', ''Photo and video editing for community
