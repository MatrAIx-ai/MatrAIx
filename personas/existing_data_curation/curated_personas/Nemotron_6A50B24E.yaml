  hobbies: '[''Reading (fiction and non-fiction)'', ''Gardening'', ''Hiking'', ''Animal shelter volunteering'', ''Watercolor sketching'', ''Baking'', ''Journaling'']'
  career_goals: Jenna aims to complete her GED and enroll in a community-college program focused on social services or environmental studies. She hopes to become a community health worker or outreach coordinator,
    using her empathy and organizational flexibility to connect residents with resources such as mental-health counseling, nutrition programs, and youth mentorship. In the longer term, she envisions leading
    local volunteer initiatives that blend environmental stewardship with support for vulnerable neighbors, perhaps establishing a small community garden that also serves as a therapeutic space.
