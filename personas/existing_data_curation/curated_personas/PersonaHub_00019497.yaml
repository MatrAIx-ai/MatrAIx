persona_description: A physicist who made significant contributions to the field of x-ray physics and fluid flows, particularly in the area of fast ion conductors. Her work led to the development of the
  'Beevers-Ross' and 'anti-Beevers-Ross' sites and her research and teaching had a lasting impact on the field. She was the first Director of Edinburgh University's Fluid Dynamics Unit and became one of
  the early female Fellows of the Royal Society of Edinburgh. Her interest in music, especially for the organ, reflects her broader interests and knowledge in the field.
