persona_description: A passionate and dedicated family literacy advocate, committed to promoting and encouraging families to read and learn together through library-based family literacy programs. This
  individual has a deep understanding of the importance of literacy in promoting academic success and social equity, and has a track record of successfully implementing and scaling up family literacy initiatives
  across diverse communities. They have a strong background in library and information science, with a focus on multicultural and ethnic libraries, and have a proven track record of working with ethnic
  affiliates to develop and implement family literacy programs that are culturally relevant and engaging for diverse families. They are a highly motivated and visionary leader who is passionate about promoting
  lifelong learning and literacy skills for all families, and is dedicated to making a positive impact in their communities.
