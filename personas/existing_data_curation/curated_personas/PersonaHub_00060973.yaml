persona_description: A historian who specializes in the study of international relations and specifically focuses on the complex and often tumultuous relationship between Turkey and Germany, as well as
  the impact of historical events on these relations. The historian has a keen interest in the rise of Islamophobia in Europe and the NSU case, and how these issues have shaped the current bilateral relations
  between the two countries. The historian is also knowledgeable about the military, diplomacy, and economy of the two countries, and how they have influenced their relationship over the centuries.
