personas:
  professional: Sarah Doan, a budding digital media creator, blends sketching, music production, and strategic gaming into a nascent career as an indie concept artist, and they apply their meticulous organization
    and competitive drive to meet deadlines and refine their portfolio.
  sports: Sarah Doan plays on her high school’s varsity soccer team, follows the Los Angeles Lakers for basketball, and they attend weekend skate sessions at the community skate park, using the activity
    as a creative outlet and a way to stay physically engaged.
  arts: Sarah Doan frequents the city’s art museum, especially the contemporary wing featuring works by Banksy and Hayao Miyazaki’s concept art, and they spend weekends recreating atmospheric soundscapes
    inspired by Björk while sketching speculative sci‑fi creatures.
  travel: Sarah Doan, a teen with a penchant for immersive experiences, prefers meticulously planned school trips to historic sites like Kyoto’s ancient temples and spontaneous weekend hikes in the nearby
    Cascade Mountains, yet parental budget constraints keep their overseas journeys limited to annual family visits to Montreal, and they dream of exploring Iceland’s volcanic fields when the opportunity
    arises.
  culinary: Sarah Doan enjoys crafting experimental ramen bowls with miso broth, sliced pork belly, and soft‑boiled eggs, while also savoring avocado toast drizzled with sriracha, and they often snack on
    matcha‑flavored mochi during late‑night study sessions.
  core: Sarah Doan, a 15‑year‑old imagination powerhouse, balances meticulous planning with spontaneous creativity, can be fiercely competitive, yet often retreats into sketchbooks and synth loops to recharge,
    and they find solace in the quiet hum of their own thoughts.
background:
  cultural: Sarah grew up in Richmond, a small community in Macomb County, Michigan. Her family embraces Midwestern cultural values such as community involvement, modesty, and a strong work ethic, often
    participating in local events like the annual Fall Festival, the Michigan State Fair, and church gatherings. While the regional culture emphasizes practicality and collective responsibility, Sarah’s
    personal inclination toward artistic novelty and abstract concepts reflects a blend of the area’s appreciation for craftsmanship and her own curiosity about broader creative influences.
