  career_goals: Sarah aims to merge her love for visual storytelling and technology. She aspires to study graphic design, animation, or game narrative design in college and eventually work as a concept
    artist or multimedia storyteller, creating immersive worlds that blend art and interactivity. She also dreams of publishing an illustrated collection of short stories. To reach these goals, she plans
    to build a robust portfolio, win local art competitions, and attend specialized workshops that challenge her creativity.
