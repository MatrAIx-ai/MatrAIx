personas:
  professional: Joyce Aucoin, a 30‑year‑old computer support specialist with a business degree, leverages their knack for rapid problem‑solving and friendly communication to diagnose hardware, software,
    and network issues via ServiceNow and Zendesk while sprinkling spontaneous, art‑inspired analogies that keep users engaged—though their aversion to rigid structure sometimes leads to missed ticket deadlines.
  sports: Joyce Aucoin hits the Orlando Running Club’s Saturday morning runs for cardio, joins a co‑ed recreational soccer league affiliated with Orlando City SC for weekend fun, and follows the Orlando
    Magic and Orlando Pride avidly—yet prefers low‑impact yoga sessions three times a week to keep their flexible, spontaneous energy balanced.
  arts: Joyce Aucoin immerses themselves in Orlando’s contemporary art scene, regularly visiting the Orlando Museum of Art to absorb installations by Yayoi Kusama and street‑art pieces reminiscent of Banksy,
    while juggling board‑game nights with friends and catching live performances by Tame Impala, Hozier, and local improv troupe The Secret Society, all of which fuel their own photography of urban street
    life and dabbling in Adobe Creative Suite.
  travel: Joyce Aucoin prefers spontaneous, budget‑friendly weekend road trips, often heading down I‑95 to the sun‑kissed sands of Clearwater Beach or the lush trails of the Everglades, while dreaming of
    a spring escape to Asheville’s art‑filled downtown and a summer backpacking adventure in Costa Rica’s rainforests, always using a mix of last‑minute Airbnb finds and tried‑and‑true map apps to chart
    their route.
  culinary: Joyce Aucoin, a self‑described ‘food‑festival junkie’, gravitates toward bold street‑food flavors like Korean‑style tteokbokki, Mexican tacos al pastor, and artisanal avocado toast topped with
    heirloom tomatoes and smoked paprika, while at home they wield a decent skillet to whip up quick pasta alla carbonara and experiment with matcha‑infused desserts, often sharing the results on Instagram
    with meticulously styled shots.
  core: Joyce Aucoin blends a tech‑savvy brain with a graffiti‑loving heart, thriving on spontaneous group outings and artistic ventures while habitually forgetting deadlines, hoarding raffle tickets from
    every art fair, and secretly curating a digital archive of street‑photography that fuels their next impulsive project.
background:
  cultural: Joyce grew up in a middle‑class white family in suburban Orlando, Florida, where the tourism industry and a diverse population exposed her to a blend of Southern hospitality and multicultural
    influences. Her parents encouraged academic achievement and community involvement, leading her to pursue a business degree and later a career in technology. While she identifies with mainstream American
    cultural norms—valuing individualism, educational advancement, and civic engagement—she also embraces the cultural mosaic of Central Florida, from Latin American festivals to the arts community that
    thrives in the area. This environment fostered her appreciation for varied artistic expressions and her openness to unconventional ideas, shaping a worldview that balances traditional roots with a curiosity
    for new experiences.
attributes:
  skills: '["Technical troubleshooting", "Hardware and software diagnostics", "Network connectivity support", "Help desk ticket management (e.g., ServiceNow)", "Remote desktop assistance", "Operating system
    support (Windows/macOS/Linux)", "Basic cybersecurity awareness", "Customer service and communication", "Active listening and empathy", "Documentation and knowledge base creation", "Process improvement
    and creative problem solving", "Collaboration and team coordination", "Data analysis using Excel", "User training and workshop facilitation"]'
  hobbies: '["Visiting contemporary art galleries and museums", "Attending live music and theater performances", "Participating in improv comedy workshops", "Exploring local food festivals and street markets",
    "Weekend road trips to nearby beaches or natural parks", "Photography, especially urban street photography", "Volunteering at community art and tech outreach programs", "Playing board games and group
    trivia nights", "Practicing yoga and dance for energetic expression", "Learning basic graphic design using Adobe Creative Suite"]'
  career_goals: Joyce aspires to transition from a front‑line support role into a position that blends her business acumen with technology, such as IT Business Analyst or Project Manager. She plans to earn
    industry certifications like CompTIA Network+, ITIL Foundation, and eventually the PMP credential. Her goal is to lead a cross‑functional team that designs user‑centric tech solutions, especially for
    creative professionals and arts organizations. In the longer term, Joyce envisions launching a boutique consultancy that provides tech support, digital tools training, and workflow optimization for
    artists and small cultural nonprofits, allowing her to merge her love for art with her technical expertise while maintaining a flexible, collaborative work environment.
