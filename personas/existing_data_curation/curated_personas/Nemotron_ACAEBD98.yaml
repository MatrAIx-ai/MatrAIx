  hobbies: '[''street photography in Los Angeles'', ''gallery and exhibition attendance'', ''photography meet‑ups'', ''hiking and landscape exploration'', ''light‑painting and DIY camera experiments'',
    ''cooking Salvadoran cuisine'', ''salsa and bachata dancing'', ''world‑music playlist curation'', ''travel photography in Central America'', ''volunteering photography workshops for youth'']'
  career_goals: In the near term, Angel aims to secure a regular freelance contract with lifestyle and editorial publications in Los Angeles, expanding her portfolio to include high‑profile fashion shoots
    and community‑focused photo essays. She plans to launch a professional website and grow a curated Instagram following that highlights under‑represented Salvadoran and Latinx narratives. Mid‑term, she
    aspires to produce a solo exhibition and a coffee‑table photo book chronicling the experiences of the Salvadoran diaspora in Southern California, and to win a regional photography award to boost her
    credibility. Long‑term, Angel envisions opening a collaborative studio that offers photography services, workshops for youth in immigrant neighborhoods, and a platform for socially engaged visual projects
    that merge art with activism.
