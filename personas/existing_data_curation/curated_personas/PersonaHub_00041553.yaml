persona_description: A West Virginia University researcher who is actively working to reduce childhood obesity rates in the state through the CARDIAC Project. She is a Ware Distinguished Professor at the
  university and has been funded by the Ware Family Foundation to focus on physical education and physical activity in elementary and middle school-aged children. She is aware of the challenges of changing
  unhealthy eating and exercise habits in children and believes that parents can play a critical role in promoting physical activity and healthy lifestyle behaviors.
