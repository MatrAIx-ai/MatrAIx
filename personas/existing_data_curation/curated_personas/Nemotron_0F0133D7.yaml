  career_goals: Odalys aspires to move into a supervisory role as a lead facilities coordinator for municipal buildings in Isabela, where she can champion eco‑friendly cleaning protocols and mentor a new
    generation of custodial staff. She hopes to develop a formal training curriculum that blends technical proficiency with creative thinking, enabling workers to devise innovative solutions to maintenance
    challenges. In the longer term, Odalys envisions establishing a small community studio that offers art workshops—particularly quilting and collage—allowing her to share her artistic passions while preserving
    local cultural expressions. Her ambition also includes obtaining certification in sustainable facilities management to position herself as a consultant for greener sanitation practices across the island.
