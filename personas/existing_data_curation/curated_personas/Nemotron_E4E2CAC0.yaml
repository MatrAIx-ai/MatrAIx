personas:
  professional: Maria Herr is an IT service desk specialist who blends practical troubleshooting expertise—hardware repair, OS configuration, network diagnostics, and ITIL‑based incident management—with
    a natural talent for translating technical jargon into friendly conversation, making the support desk a hub of calm, empathetic problem‑solving while they mentor junior staff and streamline ticket workflows
    toward their leadership ambitions.
  sports: Maria Herr is a weekend paddle‑boarding enthusiast on Lake Calhoun, a member of the Minneapolis Trailblazers hiking club for year‑round lake‑side treks, and a vocal supporter of the Minnesota
    Vikings, Twins, and Wild, channeling their sociable energy into team‑spirit gatherings and community 5K runs.
  arts: Maria Herr immerses themselves in the local improv theater at Mixed Blood Theatre, dances salsa to the rhythms of Celia Cruz and Marc Anthony, devours mystery novels by Agatha Christie and Gillian
    Flynn, and enjoys live performances by Minnesota‑based folk duo The Lumineers, letting creative expression fuel their talkative, collaborative nature.
  travel: Maria Herr prefers road‑trip adventures that blend nature and community, having explored Door County’s cherry orchards, the historic charm of Mackinac Island, and the vibrant streets of Dublin
    during St. Patrick’s Day, while they dream of kayaking the fjords of Norway and hiking New Zealand’s Tongariro Alpine Crossing when their schedule and budget allow.
  culinary: Maria Herr delights in cooking seasonal Midwestern fare—pan‑fried walleye with dill butter, roasted root vegetables, and fresh corn succotash—while they experiment with homemade pumpkin spice
    latte, savor locally sourced honey, and host weekly dinner parties where friends sample their latest recipe twists.
  core: Maria Herr is a community‑focused IT pro who balances methodical problem‑solving with lively social gatherings, often swapping tech tips for salsa steps, and who occasionally forgets to log their
    own water intake during busy days.
background:
  cultural: Maria grew up in a middle‑class family in the Twin Cities region, with German‑Scandinavian ancestry that shaped her appreciation for practicality, modesty, and community service. Her upbringing
    emphasized seasonal outdoor activities—ice‑fishing in winter, lake swimming in summer—and participation in local traditions such as the Minnesota State Fair and community potlucks. She celebrates holidays
    like Thanksgiving, Christmas, and St. Patrick’s Day while maintaining strong ties to her extended family. The Midwest ethos of friendly openness and a collaborative spirit is reflected in her daily
    interactions and professional demeanor.
attributes:
  skills: '["Hardware troubleshooting", "Software installation and configuration", "Network diagnostics", "Ticketing system management (ServiceNow)", "Remote support tools (TeamViewer, AnyDesk)", "ITIL
