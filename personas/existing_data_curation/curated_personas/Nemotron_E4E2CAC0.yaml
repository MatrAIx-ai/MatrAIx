  hobbies: '["Salsa dancing", "Hiking in the Cascade Lakes", "Community theater improv", "Hosting dinner parties", "Volunteering at local senior center", "Board game nights", "Reading mystery novels"]'
  career_goals: Looking ahead, Maria aims to move from individual contributor to a leadership role within IT service management. She plans to obtain a bachelor's degree in information systems while pursuing
    certifications such as ITIL Expert and CompTIA Security+. Her short‑term goal is to become a senior support specialist or team lead, where she can mentor junior technicians and streamline ticketing
    workflows. Long‑term, she envisions a position as an IT Service Manager or Director, driving strategic initiatives that enhance user experience, integrate emerging technologies, and promote a culture
    of continuous improvement across the organization.
