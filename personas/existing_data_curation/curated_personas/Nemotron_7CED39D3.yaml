  career_goals: Tommy aims to move into a regional sales leadership role within the next three years, overseeing a team of representatives across multiple states. He wants to leverage his educational background
    to develop a formal onboarding and continuous-learning program for new hires, blending his curiosity for industry innovations with practical training methods. In the longer term, he envisions establishing
    his own niche distribution business that supplies specialized manufacturing components to local Midwestern producers, allowing him to apply his market insights while maintaining a more balanced work-life
    rhythm. He also aspires to serve as a guest lecturer at the nearby community college, sharing real-world sales strategies with students.
