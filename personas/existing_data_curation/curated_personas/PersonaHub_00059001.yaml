persona_description: A veterinarian who specializes in the study of feline mucopolysaccharidosis type VII (MPS VII) in cats, and has conducted extensive research on the molecular genetics of the disease,
  including the identification of mutations in the β-glucuronidase gene (GUSB) causing the disease. They have experience in developing and implementing experimental treatments for the disease, such as gene
  therapy and enzyme replacement therapy, and have published several studies on the molecular basis of the disease and its treatment.
