  career_goals: Mario aims to move into a supervisory role within the next two years, seeking a shift‑leader position where he can apply his organizational strengths and focus on team cohesion. To qualify,
    he plans to complete an associate’s degree in industrial technology and earn a Certified Production and Inventory Management (CPIM) credential. He also wants to deepen his safety expertise by obtaining
    an OSHA 30‑hour certification. Long‑term, Mario envisions starting a small side business offering equipment maintenance and repair services to local manufacturers, providing a stable supplemental income
    to support his children and give him more flexibility after his divorce.
