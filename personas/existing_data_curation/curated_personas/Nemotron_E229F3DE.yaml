  hobbies: '[''Watercolor Painting'', ''Nature Photography'', ''Hiking'', ''Kayaking'', ''Birdwatching'', ''Bridge (card game)'', ''Community Theater'', ''Volunteering for Art Workshops'', ''Reading Educational
    Theory'', ''Attending Local Art Exhibitions'', ''Mindfulness Meditation'']'
  career_goals: Approaching retirement, Allison aims to leave a lasting legacy by establishing a regional inclusive‑arts mentorship program that pairs special‑education teachers with local artists. She
    aspires to author a practical guide on integrating visual arts into special‑education curricula for remote Alaskan schools. Additionally, she seeks to serve as a part‑time consultant, advising district
    leaders on policy enhancements for students with disabilities and developing mental‑health support frameworks for educators and learners alike. Allison also hopes to champion the adoption of culturally
    responsive teaching practices that honor Alaska Native perspectives within her school community.
