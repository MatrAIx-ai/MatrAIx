  hobbies: '["Vegetable gardening", "Vietnamese cooking", "Chess", "Bridge", "Reading historical non-fiction", "Walking/hiking", "Photography", "Volunteering at cultural festivals"]'
  career_goals: Although retired, Phat aims to leave a lasting legacy by mentoring younger engineers and community members, documenting his career experiences in a short memoir, and preserving Vietnamese
    cultural heritage for future generations. He seeks to support his grandchildren’s education through scholarships, stay physically active through regular walks and gardening, and continue volunteering
    at the local Vietnamese cultural association and senior center. His ambition is to balance personal wellbeing with meaningful contribution to his family and community, ensuring harmony and continuity.
