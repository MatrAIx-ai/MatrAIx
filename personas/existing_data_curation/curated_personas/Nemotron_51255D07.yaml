  hobbies: '[''Saltwater Fishing'', ''Classic Car Restoration'', ''Woodworking'', ''Barbecue Grilling'', ''NFL Football'', ''Reading Non-fiction Manuals'', ''Community Volunteering'']'
  career_goals: Joseph aims to transition from a driver‑sales role to a supervisory position within the logistics sector, such as fleet manager or dispatch coordinator. He plans to obtain additional CDL
    endorsements and safety certifications to qualify for higher‑responsibility routes. Over the next five years, he hopes to launch a small owner‑operator trucking business, leveraging his sales experience
    to secure contracts and his operational expertise to maintain a flawless safety record. Financial security and a steady retirement fund are central to his long‑term ambition.
