personas:
  professional: Jonathan Mansfield is a budding junior game designer who leverages his love for cooperative video games and LEGO building to prototype game levels in Scratch, channeling his sociable, talkative
    nature into collaborative brainstorming sessions while his relaxed approach to schedules allows him to experiment freely, even if his projects sometimes end up in a creative mess.
  sports: Jonathan Mansfield energizes himself on the middle school soccer field in fall and the local community baseball league in spring, proudly wearing the colors of the Seattle Sounders FC while training
    with the River Valley Youth Soccer Club, and he stays active on weekends by fishing and hiking along the Columbia River, even though his relaxed attitude sometimes leads him to skip post‑practice stretching.
  arts: 'Jonathan Mansfield dives into graphic novels such as ''Amulet'' and ''Saga'', idolizes the playful storytelling of Studio Ghibli films, pumps up his drama club improv sessions with the soundtrack
    of Imagine Dragons, and spends weekends reenacting his favorite scenes from Spider‑Man: Into the Spider‑Verse, blending his love for acting and pop culture into a vibrant creative outlet.'
  travel: Jonathan Mansfield prefers spontaneous weekend getaways, relishing family hikes along the Columbia River and trips to Seattle's Space Needle, while dreaming of a future road trip to the Grand
    Canyon and an overseas adventure to Tokyo's Akihabara district to attend a gaming convention, though his limited savings sometimes curtail his travel plans.
  culinary: Jonathan Mansfield gravitates toward cheddar‑laden pizza, crunchy chicken teriyaki bowls, and fish tacos seasoned with lime and cilantro, often attempting to recreate them in the kitchen with
    his modest cooking skills, while proudly boasting his ability to assemble a perfect LEGO‑inspired sandwich stack, though he sometimes over‑season his dishes in a burst of teenage enthusiasm.
  core: Jonathan Mansfield is a talkative, LEGO‑building, video‑game‑obsessed 12‑year‑old who thrives on spontaneous fun, yet habitually forgets to tidy his room after epic gaming marathons.
background:
  cultural: Jonathan grew up in a predominantly white, middle‑class family in Pasco, Washington, a small city on the Columbia River known for its agricultural roots. His family values hard work, community
    involvement, and outdoor recreation, and they celebrate typical American holidays such as Thanksgiving and the Fourth of July with barbecues and fireworks. He regularly participates in local events
    like the Pasco Farmers Market and the annual River Days festival, which expose him to the region’s multicultural atmosphere, including the strong Hispanic presence that adds Spanish language sounds
    and foods to his community experiences.
