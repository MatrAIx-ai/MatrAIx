  career_goals: Jonathan dreams of turning his love for video games and curiosity about how things work into a future career as a video game designer or software developer focused on educational technology.
    He hopes to attend a high school with strong STEM programs, study computer science in college, and eventually work at a game studio where he can create interactive experiences that teach science and
    math. He also wants to use his sociable personality to mentor younger kids through coding clubs or summer camps, combining his technical skills with his natural ability to connect with peers.
