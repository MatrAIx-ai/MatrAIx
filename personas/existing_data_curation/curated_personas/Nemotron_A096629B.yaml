    solving'', ''Digital photography'', ''DIY electronics and prototyping'']'
  hobbies: '[''Visiting art galleries and museums'', ''DIY electronics and prototyping'', ''Woodworking'', ''Hiking in nature'', ''Chess'', ''Bridge'', ''Logic puzzles'', ''Science and art podcasting'',
    ''Urban photography'', ''Mentoring STEM students'', ''Community gardening'', ''Attending public lectures'', ''Participating in local theatre workshops'', ''Traveling to cultural events'']'
  career_goals: Now retired, Jay aims to remain intellectually vibrant by mentoring emerging engineers through local maker spaces and offering guest lectures at regional colleges. He aspires to develop
    a community art‑science series that showcases interdisciplinary projects, and hopes to publish a series of articles linking emerging technologies with visual culture. Additionally, he plans to compete
    in regional photography contests, contribute to the planning board of the Hampstead historical society, and eventually curate a traveling exhibit that celebrates Baltimore County’s industrial heritage.
