  career_goals: Mittie aims to advance to a senior administrative or office manager role within her current organization, where she can lead a small team and streamline office procedures. She plans to earn
    the Certified Administrative Professional (CAP) credential and, if feasible, complete an associate degree in Business Administration to broaden her managerial competencies. Additionally, she hopes to
    mentor newer receptionists, fostering a supportive work environment while maintaining a stable schedule that allows her to prioritize family and community commitments.
