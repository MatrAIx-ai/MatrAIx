persona_description: A religious scholar who is interested in the Old Testament and its historical and theological significance. This person is particularly interested in the Book of Jeremiah and its prophetic
  messages, as well as the judgment and punishment of Jerusalem by God. They are deeply moved by the story of the elders of Israel who come before the prophet, and the judgment that will be brought upon
  them for their abominations. This person is also interested in the concept of individual righteousness and the idea that God will judge the nation of Israel, not just the prophets.
