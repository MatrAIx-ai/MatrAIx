personas:
  professional: Rosella Mcmahan, a 40-year-old traffic flagger turned aspiring safety manager, they blend meticulous record-keeping, OSHA-level risk assessments, and a classroom-style communication approach
    to lead construction crews while fiercely pursuing Certified Safety Professional certification and a future as a state traffic safety instructor.
  sports: Rosella Mcmahan, a 40-year-old outdoor enthusiast, they trek the Ouachita National Forest with the local hiking club, cheer the Arkansas Razorbacks football team, attend Dallas Cowboys Sunday
    games at the neighborhood bar, and play casual pick-up volleyball at the community center each summer.
  arts: Rosella Mcmahan, a 40-year-old practical creative, they enjoy listening to Yo-Yo Ma's cello suites while prepping gumbo, attend quarterly performances by the Arkansas Repertory Theatre, and cite
    Malcolm Gladwell's nonfiction as artistic inspiration, blending disciplined reading with occasional weekend visits to local art galleries featuring realist painters such as Andrew Wyeth.
  travel: Rosella Mcmahan, a 40-year-old adventure-balanced traveler, they favor weekend road trips to the Great Smoky Mountains, have documented a family getaway to New Orleans for its music scene, dream
    of kayaking the fjords of Norway but postpone it due to a tight consulting-startup budget and school-year responsibilities.
  culinary: Rosella Mcmahan, a 40-year-old culinary experimenter, they meticulously follow a measured recipe for gumbo using okra, shrimp, Andouille sausage, roux, and filé powder, while also perfecting
    baked chicken with a brine of buttermilk and rosemary, and they regularly grow heirloom tomatoes and sweet potatoes in their garden to enhance freshness.
  core: Rosella Mcmahan turns every garden bed, safety plan, and weekend hike into a meticulously charted project, yet they habitually lose track of time when a new recipe calls for just one more pinch
    of spice.
background:
  cultural: Rosella grew up in West Monroe, Louisiana, a small city in the heart of the American South. She comes from a working‑class white family with deep roots in the region; her parents were employed
    in the rail and construction sectors, and evenings often centered around church gatherings and local community events. The Southern cultural emphasis on hospitality, respect for authority, and a strong
    sense of community shaped her practical outlook and preference for clear structures. She attended the local public schools and earned her bachelor’s degree in education from the University of Louisiana
    at Monroe, where she was exposed to regional traditions such as Mardi Gras celebrations and Cajun culinary influences, albeit through a largely Anglo‑American lens. These experiences, combined with
    the conservative values of Ouachita Parish, inform her balanced yet independent approach to work and personal life.
attributes:
  skills: '["Flagger certification", "Traffic control signal operation", "Safety compliance (OSHA/DOT)", "First aid & CPR", "Risk assessment", "Incident reporting", "Child supervision", "Classroom management
    techniques", "Conflict resolution", "Team coordination", "Schedule and time management", "Record‑keeping and documentation", "Public communication"]'
  hobbies: '["Vegetable gardening", "Cooking Southern cuisine", "Reading non‑fiction (self‑improvement, local history)", "Journaling", "Volunteering for road‑safety education", "Hiking Ouachita trails",
    "Yoga", "DIY home improvement projects", "Attending community festivals", "Genealogy research"]'
  career_goals: Rosella aims to leverage her practical experience and education degree to move into a supervisory safety role. She plans to earn a safety‑manager certification, such as the Certified Safety
    Professional, and eventually become a Traffic Safety Instructor for the state highway agency, training new flaggers and conducting outreach programs in schools. Long‑term, she aspires to obtain a master’s
    in educational leadership to transition into a school administration position where she can integrate road‑safety education into curricula. She also dreams of establishing her own consulting firm to
    advise small construction firms on compliance and best practices, reflecting her competitive drive for professional recognition.
