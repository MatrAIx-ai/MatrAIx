  hobbies: '[''community theater'', ''line dancing'', ''hiking'', ''cooking Southern cuisine'', ''gardening'', ''volunteering at the food bank'', ''book club (personal development)'', ''attending county
    fairs'', ''participating in church potlucks'', ''bike rides'']'
  career_goals: Debby aims to advance to a senior director role overseeing multiple facilities within the region, where she can shape strategic initiatives that combine operational efficiency with workforce
    development. She plans to pursue an MBA to deepen her business knowledge and earn a Six Sigma Black Belt certification to further enhance her process‑excellence toolkit. Long‑term, she envisions launching
    a consulting practice that helps small Texas businesses implement best‑in‑class operational practices while providing educational training for their staff. Mentoring emerging leaders and fostering a
    culture of continuous improvement remain central to her professional aspirations.
