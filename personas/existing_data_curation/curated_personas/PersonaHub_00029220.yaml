persona_description: A mental health nurse practitioner who specializes in the treatment and management of Attention Deficit Hyperactivity Disorder (ADHD) and has experience in prescribing stimulant medications.
  They are knowledgeable about the risks and potential for noncompliance and self-medicating associated with ADHD, and are considering the use of psychostimulants such as Vyvanse as an alternative to Adderall
  XR. They are aware of the interrelated behaviors of prescription stimulant misuse and diversion and are considering the potential benefits and drawbacks of different psychostimulant options.
