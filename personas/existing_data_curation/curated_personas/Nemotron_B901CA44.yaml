  career_goals: Tony aims to transition from a senior analyst role to a systems architect position where he can shape enterprise‑wide technology strategies. He aspires to lead multidisciplinary teams that
    blend cutting‑edge tech with user‑centred design, eventually founding a boutique consulting practice that helps small organizations adopt innovative, sustainable digital solutions. Long‑term, he hopes
    to publish thought‑leadership articles on the intersection of technology, art, and abstract systems, and to be recognized as a forward‑thinking strategist in the New England tech community.
