personas:
  professional: Paula Brewer is a budding game developer who blends a practical, structured mindset with a love for building complex systems, channeling their competitive streak into designing balanced
    multiplayer maps in Scratch while they juggle occasional school‑project disorganization.
  sports: Paula Brewer plays forward on the middle school soccer team, idolizes the play style of Megan Rapinoe and roots for the local minor‑league baseball club the River City Rapids while they also hit
    the hiking trails of Cedar Creek State Park during off‑season, balancing structured training with spontaneous outdoor challenges.
  arts: Paula Brewer spends weekends sketching original comic characters inspired by Studio Ghibli’s Miyazaki and the gritty art of Frank Miller, devouring mystery novels by Agatha Christie and Arthur Conan
    Doyle, and tinkering with DIY Arduino kits, weaving visual storytelling, literary intrigue, and hands‑on invention into their creative identity, which they proudly showcase on school bulletin boards.
  travel: Paula Brewer’s travel style mixes meticulous day‑trip planning for nearby hikes like the Blue Ridge Loop with spur‑of‑the‑moment road trips to Twin Days in Twinsburg, Ohio, and they dream of visiting
    the LEGO House in Billund, Denmark, though limited allowance keeps most adventures within a few hours’ drive.
  culinary: Paula Brewer favors quick, handheld meals like pepperoni pizza and cheesy quesadillas, often adding extra mozzarella and a dash of hot sauce for a game‑night boost, while they occasionally experiment
    with homemade trail‑mix using dried cranberries, pretzels, and chocolate chips during hiking expeditions.
  core: Paula Brewer is a competitive, structure‑loving teen who balances a love for tech‑driven creativity with spontaneous outdoor fun, all while they juggle a knack for impulse purchases and occasional
    forgetfulness.
background:
  cultural: 'Paula comes from a middle‑class white family rooted in suburban Ohio. Her upbringing reflects typical Midwestern values: an emphasis on family, community involvement (including the annual Twins
    Days festival), participation in a local Protestant church, and a modest appreciation for the region''s agricultural and manufacturing heritage. This cultural backdrop blends respect for tradition with
    an openness to new technologies and modern hobbies.'
