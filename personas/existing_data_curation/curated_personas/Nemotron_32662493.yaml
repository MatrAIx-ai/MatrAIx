  career_goals: Paula aims to channel her practical problem‑solving mindset and competitive spirit into a future career in engineering, ideally mechanical or robotics engineering, where she can design tangible
    solutions. She also envisions exploring digital content creation focused on DIY tech projects, combining her love for hands‑on work with her ability to explain concepts clearly. To prepare, she plans
    to take high‑school STEM electives, join the robotics club, and seek mentorship opportunities with local tech firms in the Cleveland area.
