personas:
  professional: Anabel Cabrera, a 16‑year‑old self‑taught tech hobbyist, blends solid Python scripting, Arduino tinkering, and free‑software video editing into a budding digital media skillset, approaching
    each project with analytical rigor and a competitive drive to prove that independent learning can rival formal training.
  sports: Anabel Cabrera, though preferring quiet solo activities, follows the Los Angeles Lakers and the New York Yankees on TV, occasionally attends a community yoga class and swims with a local weekend
    swim club, treating fitness as a low‑key complement to her primarily sedentary hobbies.
  arts: Anabel Cabrera curates a personal YouTube channel where she edits gameplay footage set to the ambient scores of Koji Kondo and the indie rock stylings of Mitski, and she often revisits classic folk
    albums by Bob Dylan to unwind, allowing these diverse musical influences to shape her creative narratives.
  travel: Anabel Cabrera favors meticulously planned solo road trips to natural locales such as Yosemite National Park and the coastal trails of Cannon Beach, while dreaming of a cultural immersion in Kyoto
    to attend a game development conference; limited budget and school commitments confine her adventures to short weekend getaways within a few hours’ drive.
  culinary: Anabel Cabrera is an adept home cook who regularly prepares traditional family dishes like tamales and mole, savoring the complex blend of masa, ancho chilies, roasted nuts, and chocolate, while
    also experimenting with fusion by adding avocado crema to her sauces.
  core: Anabel Cabrera is a solitary, analytically‑driven teen who channels her competitive edge into coding, gaming, and meticulous cooking, while juggling occasional disorganization and a penchant for
    late‑night creative marathons.
background:
  cultural: Anabel is a first‑generation Mexican‑American raised in a bilingual household in Kent, Washington. Spanish is spoken at home, and Mexican traditions such as Día de los Muertos, quinceañera celebrations,
    and cooking classic dishes from her grandparents are integral to family life. At the same time, she is exposed to the diverse cultural environment of the Pacific Northwest, attending school and community
    events where American customs are prevalent. This bicultural upbringing gives her a strong sense of her Mexican heritage while navigating broader American society, influencing her values, language use,
    and culinary preferences.
attributes:
  skills: '[''Basic computer operation'', ''Video editing (DaVinci Resolve)'', ''Graphic design with Canva'', ''Fluent Spanish'', ''Conversational English'', ''Basic Python programming'', ''Hardware troubleshooting'',
    ''Traditional Mexican cooking'', ''Puzzle solving'', ''Analytical thinking'']'
  hobbies: '[''Single-player RPG video games'', ''Puzzle games'', ''Coding small Python scripts'', ''Arduino electronics projects'', ''Video editing for personal YouTube channel'', ''Reading sci‑fi and
    fantasy novels'', ''Listening to Mexican folk music and alternative rock'', ''Cooking traditional Mexican dishes (tamales, mole)'', ''Attending local Mexican cultural events (occasionally)'']'
  career_goals: Anabel aims to turn her passion for digital media into a career. She plans to earn her GED within the next two years, then enroll in a community college program in Computer Science or Digital
    Media Production. Her long‑term ambition is to become a video game developer or a content creator who produces high‑quality tutorial videos and streams focused on indie games and tech reviews. She also
    hopes to build a freelance portfolio of video editing and graphic design projects that can support her financially. Ultimately, she wants to demonstrate her competence and independence, proving that
    her self‑taught skills can compete in a professional environment.
