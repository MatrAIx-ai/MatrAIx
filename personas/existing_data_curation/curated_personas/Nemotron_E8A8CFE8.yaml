  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Classic rock music'', ''Reading true‑crime'', ''DIY home improvement'', ''Community volunteering'']'
  career_goals: Daryl aims to advance to a shift supervisory role within the next two years, seeking OSHA safety certification and more advanced training on warehouse management systems. He wants to lead
    a team, streamline processes, and mentor newer employees while maintaining the practical standards he values. In the longer term, he envisions starting a small logistics service that supports local
    farms and businesses, applying his curiosity for new inventory technologies while staying grounded in proven methods.
