persona_description: A nutritionist and osteoporosis researcher who specializes in understanding the relationship between dietary calcium intake and osteoporosis rates. They have conducted extensive research
  on the role of dietary calcium in bone health and have published several papers on the subject. They are also interested in the impact of lifestyle factors such as physical activity and calcium intake
  on osteoporosis rates. They are knowledgeable about the differences in calcium intake between the top ten countries with the highest intake of calcium and the Asian countries that have the lowest intake.
