persona_description: A radiologist who specializes in the interpretation of abdominal radiographs and ultrasound in emergency/critical care situations. This person has a keen eye for diagnosing various
  abdominal disorders, particularly in emergency settings. They are familiar with the interpretation of signs and rules used to diagnose mechanical obstructions, partial obstructions, linear foreign body
  obstructions, loss of serosal detail, and GI contrast studies in the abdomen. They have a thorough understanding of the importance of early diagnosis and the potential consequences of delays in surgery
  or endoscopy. This radiologist is skilled in using ultrasound to distinguish between normal and abnormal findings and to diagnose peritoneal effusion and septic peritonitis.
