  hobbies: '[''Basketball'', ''Soccer'', ''Community Volunteering'', ''Hiking'', ''Car Restoration'', ''Strategy Video Gaming'', ''Live Music Attendance'', ''Photography'']'
  career_goals: Phillip aims to secure a stable position in logistics, supply chain, or operations within the next two years, leveraging his organizational strengths and practical mindset. He plans to enroll
    in a bachelor's program in Business Administration while gaining hands‑on experience in a warehouse or distribution center. He hopes to advance to a supervisory or project management role, where he
    can lead teams, optimize procedures, and implement efficient systems. In the longer term, Phillip dreams of starting his own automotive restoration shop, combining his technical curiosity with entrepreneurial
    ambition.
