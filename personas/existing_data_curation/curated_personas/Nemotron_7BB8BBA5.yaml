personas:
  professional: Chynah Glaze, a seasoned community service manager with a business administration background, leverages structured program design and data‑driven evaluation while embracing a relaxed, flexible
    style in daily operations, builds strategic partnerships with local nonprofits, faith‑based groups, and municipal agencies, and assertively advocates for equitable resources to expand economic empowerment
    and health equity across the county.
  sports: Chynah Glaze, a dedicated member of a senior walking club and occasional player on the church’s softball team, roots for the Atlanta Hawks, and finds mindfulness in birdwatching at South River
    Park as part of a low‑intensity fitness routine.
  arts: Chynah Glaze, an avid reader of Toni Morrison and James Baldwin, creates narrative quilts inspired by gospel hymns, sings in the church choir, and regularly attends performances at the Alliance
    Theatre featuring contemporary playwrights, while also enjoying recordings by Mahalia Jackson and Ella Fitzgerald.
  travel: Chynah Glaze, who prefers low‑key, well‑planned weekend getaways, frequently visits Savannah, New Orleans, and the Blue Ridge Mountains, and dreams of a heritage pilgrimage to Accra, Ghana, balancing
    travel aspirations with family responsibilities and a modest budget.
  culinary: Chynah Glaze, an enthusiastic home chef, transforms classic collard greens and black‑eyed peas into lighter dishes with quinoa and kale, seasons gumbo with smoked turkey and garden herbs, and
    delights in baking peach cobbler, although they sometimes over‑spice dishes with too much hot sauce.
  core: Chynah Glaze blends disciplined community leadership with a relaxed, solitary creative spirit, balancing structured program work with impromptu quilting marathons and a gentle resistance to rigid
    schedules.
background:
  cultural: Chynah grew up in Decatur, Georgia, as part of a multigenerational Black family with deep roots in the Southern diaspora. Her upbringing was shaped by the close-knit church community, the legacy
    of civil rights activism in the Atlanta metro area, and the vibrant cultural expressions of Black Southern life, including music, food, and storytelling. These influences fostered a strong sense of
    communal responsibility and cultural pride. Her professional perspective is informed by personal experiences of both systemic challenges and the resilience of her community, driving her commitment to
    equity‑focused service delivery and to preserving traditions while advocating for progressive change.
attributes:
  skills: '["Community program development and management", "Grant research and writing", "Budgeting and financial oversight", "Data-driven program evaluation", "Stakeholder engagement and partnership building",
    "Volunteer recruitment and training", "Conflict mediation and crisis intervention", "Public speaking for community meetings", "Advocacy and policy navigation", "Cultural competency and equity-focused
    service delivery"]'
  hobbies: '["Reading African American literature", "Gardening (especially native plants)", "Cooking Southern and soul food recipes", "Quilting", "Birdwatching in local parks", "Family genealogy research",
    "Participating in church choir"]'
  career_goals: Chynah aims to expand the impact of community services across DeKalb County by establishing a regional coalition of nonprofits focused on economic empowerment and health equity for Black
    residents. She seeks to secure multi-year funding streams that reduce reliance on short-term grants and to develop mentorship programs that prepare emerging Black leaders for management roles in the
    social sector. Ultimately, she hopes to influence local policy to embed sustainable, culturally-relevant programming within city planning, while also considering a phased transition to a consultancy
    role that advises smaller community organizations on strategic planning and resilience building.
