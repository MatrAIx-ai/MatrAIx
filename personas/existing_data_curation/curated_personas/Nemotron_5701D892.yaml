  hobbies: '[''Fishing on Lake Mohave'', ''Poker nights at the senior center'', ''Gardening (desert flora)'', ''Classic car restoration'', ''Reading western novels'', ''Watching college football'', ''Desert
    landscape photography'']'
  career_goals: Jason aims to transition into a mentorship role before retirement, passing his practical knowledge to newer representatives and earning recognition such as an employee of the month award.
    He plans to ensure a smooth handover of his responsibilities while also focusing on maintaining his health, exploring part‑time consulting opportunities, and dedicating more time to community volunteer
    work.
