personas:
  professional: Donna Hurlburt, a seasoned retail and hospitality manager, leverages two decades of hands‑on operation oversight to drive cost‑saving initiatives across multiple locations while mentoring
    staff with a structured yet flexible leadership style, and they excel at balancing data‑driven decisions with on‑the‑fly adjustments.
  sports: Donna Hurlburt hikes the Griffith Park trails and casually practices yoga at a downtown studio, rooting for the Los Angeles Dodgers and joining a community running club that meets every other
    Saturday, and they value flexible exercise routines that fit around their managerial schedule.
  arts: Donna Hurlburt frequents The Mint for live jazz by artists like Kamasi Washington, leads a mystery novel book club that dissects Agatha Christie, and dabbles in acrylic painting of downtown skylines
    on rainy evenings, where they find creative expression a vital counterbalance to the structured rhythm of their work life.
  travel: Donna Hurlburt prefers weekend escapes to California’s Joshua Tree and coastal Big Sur, planning itineraries on a loose spreadsheet while dreaming of a culinary pilgrimage to the Amalfi Coast
    once their consultancy takes off, and they blend structured budgeting with a spontaneous desire to explore new horizons.
  culinary: Donna Hurlburt blends Mediterranean flavors such as rosemary‑infused grilled lamb with Mexican staples like pork al pastor tacos, often harvesting cilantro and basil from their rooftop garden
    to season each dish, and they delight in cooking for close friends as a way to merge practical skill with cultural curiosity.
  core: Donna Hurlburt is a pragmatic, stress‑resilient manager who balances structured budgeting with spontaneous culinary experiments, tending their rooftop herbs while they eye a regional oversight role.
background:
  cultural: Donna is an American woman of Anglo‑European descent, raised in a middle‑class suburban neighborhood of Los Angeles County. Her upbringing blended classic West Coast values of independence,
    self‑reliance, and a laid‑back lifestyle with exposure to the city’s multicultural fabric. She grew up celebrating typical American holidays while appreciating the eclectic food and cultural scenes
    of Los Angeles, such as Mexican street tacos and Asian festivals. Her family’s roots trace back to immigration from England and Ireland in the early 20th century, and she identifies strongly with the
    independent, pragmatic ethos of the West while maintaining an open‑minded respect for the diverse communities around her.
