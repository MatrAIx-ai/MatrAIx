persona_description: A business owner or manager who is concerned about the potential risks and drawbacks of using debt financing, particularly in the context of ordinary shares and preference shares. They
  are likely to have a strong understanding of financial statements and accounting principles, and are looking for ways to maximize the use of retained earnings as a source of funding for new investments
  without diluting control or increasing the risk of bankruptcy. They may also be interested in the concept of convertible loan stocks and the potential for converting them into common shares under specified
  conditions and with a pre-determined conversion rate.
