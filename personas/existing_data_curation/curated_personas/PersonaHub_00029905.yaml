persona_description: A researcher in public health who specializes in studying the factors influencing infant and child mortality in Zimbabwe. She is interested in understanding the socioeconomic, bio-demographic,
  maternal fertility behaviour, sexual reproductive health, and services delivery factors that contribute to high child mortality rates in the country. She aims to analyze the data from the Demographic
  and Health Survey Zimbabwe of 2010-11 to assess the impact of these factors on infant and child mortality. She is passionate about improving maternal health and reducing child mortality rates in Zimbabwe.
