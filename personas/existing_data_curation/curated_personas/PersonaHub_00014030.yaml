persona_description: A professional engineer or designer who is interested in learning about the aluminum extrusion process, optimizing profile designs, and discovering technical information on alloys,
  finishes, and tolerances. They are also interested in reducing the environmental impact of their products through the use of extruded aluminum components. They are likely to be familiar with the Aluminum
  Extrusion Manual version 4.2 and its updated content, which covers sustainability, fabrication, and microstructure. They are also interested in the new section on specifying microstructure as a means
  of achieving part performance for demanding applications.
