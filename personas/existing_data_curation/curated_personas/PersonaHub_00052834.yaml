persona_description: A pediatrician, writer, wife, and mother who has demonstrated how medicine is integral to the health of families and communities, and how doctors themselves struggle to balance the
  conflicting needs of profession, self, and family. She has been actively involved in promoting reforms to eradicate the professional barriers that many of her colleagues faced in their own careers and
  has worked to change the way that medicine is taught and practiced. Her love of literature and her involvement with literacy has also contributed to her understanding of the importance of reading to personal
  and professional success.
