persona_description: A Mexican historian who specializes in urban history and development, particularly in the context of Mexico City. She is interested in the history of housing, urban planning, and social
  justice. Her work involves analyzing the evolution of housing policies and the impact of urban sprawl on the right to housing in Mexico. She is also interested in the role of cooperatives in housing and
  the challenges facing housing cooperatives in the country.
