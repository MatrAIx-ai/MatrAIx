  hobbies: '["Hiking", "Cycling", "Community running events", "Dance classes", "Cooking wholesome meals", "Kombucha brewing", "Listening to scientific podcasts", "Volunteer medication counseling", "Yoga",
    "Mindfulness meditation", "Pottery", "Gardening", "Visiting historic sites"]'
  career_goals: Halie aims to become a certified pharmacy technician with advanced credentials, such as the Certified Pharmacology Technician (CPhT) and specialized immunization certification. She aspires
    to take on a supervisory role within her pharmacy, leading a team, overseeing inventory management, and driving quality‑improvement initiatives. Long‑term, she is considering pursuing a Bachelor's degree
    in Pharmacy Sciences or a Pharm.D. to transition into a pharmacist role. She also wishes to develop a community health outreach program focusing on medication safety and vaccination education in York
    County. Additionally, she plans to incorporate stress‑management workshops for pharmacy staff, leveraging her personal experience with anxiety to foster a healthier work environment.
