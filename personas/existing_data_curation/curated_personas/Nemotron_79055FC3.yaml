personas:
  professional: Carlos Santos, a seasoned customer‑service veteran with over three decades of bilingual (Spanish‑English) communication expertise, now volunteers as a mentor at community colleges, weaving
    their imaginative problem‑solving and artistic sensibility into empathy‑driven training for younger agents.
  sports: Carlos Santos, a devoted member of the local senior walking club, enjoys daily strolls along the coastal trail, participates in weekly bocce tournaments at the community center, and they cheer
    passionately for the Cangrejeros baseball team during the summer season.
  arts: Carlos Santos, an abstract landscape painter who captures Caribbean skies with vivid blues and oranges, writes reflective poetry, plays the cuatro at family gatherings, and they admire the works
    of Frida Kahlo, the songs of Rubén Blades, and the theatrical productions of the San Juan Drama Society.
  travel: Carlos Santos, who favors leisurely trips that blend cultural immersion with family time, has explored Old San Juan’s historic plazas, visited the serene beaches of Culebra, dreams of photographing
    Barcelona’s architecture, and they plan a future pilgrimage to the art museums of Paris while balancing their modest travel budget.
  culinary: Carlos Santos, an avid home cook, prepares arroz con gandules with sofrito, tender pasteles wrapped in banana leaves, and crispy tostones, skillfully seasoning each dish with recao and adobo,
    while their garden’s fresh herbs and ripe plantains inspire their culinary creations.
  core: Carlos Santos, an 87‑year‑old storyteller whose imagination fuels a kaleidoscope of art, music, and mentorship, balances meticulous budgeting with occasional splurges, battles age‑related aches
    yet stays active through daily walks, and they live with a healthy dose of worry that fuels their relentless curiosity.
background:
  cultural: Carlos was born in 1938 in Trujillo Alto, a community that grew alongside Puerto Rico’s rapid industrialization during Operation Bootstrap. Raised in a devout Catholic household, he absorbed
    the island’s blend of Spanish colonial, African, and Taino influences. Family gatherings were marked by parranda music, story‑telling, and the preparation of dishes passed down through generations.
    He grew up speaking Spanish as his first language and learned English in school, making him fluent in both tongues—a skill that later proved invaluable in his customer‑service career. The vibrant rhythms
    of salsa, plena, and bomba shaped his love for dance, while the colorful murals and local art scenes nurtured his imaginative spirit. Throughout his life, Carlos has participated in community traditions
    such as the San Juan Festival, Noche de San Juan beach bonfires, and local patron saint celebrations, reinforcing a strong sense of identity rooted in Puerto Rican heritage and community solidarity.
