  career_goals: Even at 87, Carlos remains driven to share his lifetime of service knowledge. He aims to volunteer as a mentor for younger customer‑service professionals in local community colleges and
    senior‑center workshops, helping them develop both technical skills and emotional intelligence. He also aspires to document the oral histories of his neighborhood, preserving stories of Trujillo Alto’s
    mid‑century transformation. Carlos hopes to publish a memoir that blends personal anecdotes with reflections on Puerto Rican culture, while continuing to learn new artistic techniques such as digital
    photography. Maintaining his health, staying socially active, and supporting his family’s well‑being are central to his long‑term ambitions.
