  career_goals: Armando loves to imagine himself as a big helper. He often says he wants to be a firefighter who rescues people, a teacher who tells stories, and an astronaut who explores space. He also
    dreams of playing on a soccer team and helping his family bake tortillas, showing his blend of curiosity about the world and a practical desire to care for others.
