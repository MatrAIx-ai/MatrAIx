personas:
  professional: Armando Lopez is a budding little engineer who spends afternoons constructing LEGO skyscrapers, meticulously sorting their bricks before improvising new designs, showcasing a blend of curiosity,
    practicality, and playful organization.
  sports: Armando Lopez darts across the neighborhood soccer field with the Little Leopards kids' team, eagerly practicing dribbles after preschool, and also delights in splashing through beginner swim
    lessons at the community pool during summer.
  arts: Armando Lopez delights in drawing vibrant dinosaurs with Crayola crayons, sings loudly along to Disney’s Frozen soundtrack, and enthusiastically recites Dr. Seuss’s ‘Green Eggs and Ham’, blending
    visual, musical, and literary play.
  travel: Armando Lopez enjoys family road trips to the local zoo where they marvel at giraffes, looks forward to the upcoming beach vacation at Santa Monica, and proudly packs a tiny backpack with crayons,
    a snack bar, and a favorite stuffed bunny for each adventure.
  culinary: Armando Lopez loves cheesy pizza slices and spaghetti with marinara sauce, relishes crunchy apple wedges, pretends to stir a soup in a plastic pot, yet often refuses broccoli in favor of golden
    chicken nuggets.
  core: Armando Lopez is a bright-eyed, energetic four-year-old who balances organized LEGO building with spontaneous imagination, thrives on social play, and navigates tiny triumphs and occasional meltdowns
    with an endearing mix of curiosity and kindness.
background:
  cultural: Armando comes from a Mexican‑American family in San Jacinto, California. At home he hears both Spanish and English, celebrates Día de los Muertos and Cinco de Mayo with colorful decorations,
    enjoys family meals of tacos, tamales, and fresh fruit, and participates in community events at the local parish. His grandparents often visit, sharing traditional stories and songs, which nurture his
    appreciation for his heritage while he grows up in a diverse Southern California setting.
