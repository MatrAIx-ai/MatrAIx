  hobbies: '["Watercolor Painting", "Attending Local Theater", "Reading Historical Biographies", "Listening to Philosophy Podcasts", "Playing Bridge", "Gardening", "Fishing", "Hiking", "Traveling to Cultural
    Festivals", "Volunteer Work at Community Center"]'
  career_goals: Although retired, Michael is driven to give back. He aims to establish a community arts scholarship that funds local youth to attend workshops and summer programs. He wants to mentor emerging
    entrepreneurs in Frenchville, helping them navigate financing and marketing while fostering healthy competition through friendly business pitch contests. Michael also hopes to author a memoir that weaves
    his business experiences with reflections on art and community life, preserving the region’s cultural heritage for future generations.
