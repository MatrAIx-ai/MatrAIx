  career_goals: Somchay aims to leverage his reliability and systematic work style to advance into a supervisory role within the next two years, targeting a Team Lead position where he can mentor staff
    and drive service‑quality improvements. He plans to earn a certification in Customer Success Management and pursue an associate degree in Business Administration to deepen his strategic understanding
    of operations. Long‑term, he envisions moving into a Customer Experience Manager role, focusing on data‑driven process enhancements and cross‑functional collaboration, while also exploring opportunities
    to develop a small online venture that showcases Southeast Asian culinary traditions.
