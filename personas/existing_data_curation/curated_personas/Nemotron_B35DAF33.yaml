  career_goals: Although still in preschool, Martin already shares vivid aspirations about his future. He frequently talks about becoming an artist because he loves mixing colors and creating pictures,
    and he is fascinated by astronauts and space, saying he wants to explore the stars. He also expresses a desire to help others, mentioning that he would like to be a teacher or a "friend" who makes people
    feel better when they're sad. These goals reflect his curiosity, love of art, and his compassionate yet assertive nature.
