  hobbies: '[''Walking in Fairmount Park'', ''Historical Fiction Reading'', ''Soul Food Cooking'', ''Quilting'', ''Community Volunteering'', ''Jazz Concert Attendance'', ''Gardening'', ''Local History Tours'']'
  career_goals: Towanda aims to leverage her supervisory experience into a regional management position, overseeing multiple stores within the greater Philadelphia area. She is focused on building a mentorship
    pipeline that prepares the next generation of retail leaders, especially women of color. In the next two to three years she plans to complete a certification in retail operations management, implement
    a data‑driven performance dashboard across her stores, and ultimately transition into a consultancy role that helps independent boutiques streamline their operations and strengthen community ties.
