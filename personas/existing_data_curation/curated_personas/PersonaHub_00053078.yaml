persona_description: A policy analyst who is concerned about the impact of migration policies on vulnerable populations and the consequences of these policies on the movement of people across international
  borders. This person is likely to have expertise in international relations, migration studies, and the political economy of globalization. They are interested in understanding the complex interplay between
  economic migrants, refugees, and the border systems designed to keep them out, and how these systems affect the well-being of individuals and communities. They are also likely to be familiar with the
  history of migration, the 1948 Universal Declaration of Human Rights, and the concept of refugee status.
