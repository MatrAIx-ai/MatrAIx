  hobbies: '[''Playing soccer'', ''Cooking traditional Mexican dishes'', ''Listening to regional Mexican music'', ''Video gaming (open‑world and strategy)'', ''Hiking and exploring local trails'', ''Reading
    business self‑help books'', ''Creating social media content'']'
  career_goals: Fernando aims to leverage his business education and bilingual abilities to launch a small venture that serves the local Hispanic community, such as a specialty Mexican food stand or a boutique
    selling Mexican artisan goods. In the short term, he is seeking a role in marketing or sales where he can apply his curiosity for digital trends while gaining hands‑on experience. He plans to pursue
    an MBA within the next three years to deepen his strategic management skills and expand his professional network. Ultimately, he envisions becoming a community‑focused entrepreneur who balances profitability
    with cultural representation.
