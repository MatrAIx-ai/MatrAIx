personas:
  professional: Fernando Roper is an aspiring marketing associate who leverages his bilingual fluency, business degree, and hands‑on retail experience to blend curiosity‑driven digital trend scouting with
    practical campaign execution, while navigating a relaxed attitude toward deadlines that sometimes leads to last‑minute scrambles.
  sports: Fernando Roper is a regular participant in the Racine Community Soccer League at the local park, roots for the Milwaukee Bucks and Green Bay Packers, and combines casual trail hikes around Lake
    Michigan with an otherwise laid‑back fitness routine that occasionally slips due to his disorganized scheduling.
  arts: Fernando Roper immerses himself in regional music from his heritage, regularly streaming bands like Los Tigres del Norte and Calibre 50, attends occasional live shows at local venues, and balances
    this with a love for the orchestral scores of open‑world video games, citing composers such as Austin Wintory as artistic inspiration.
  travel: Fernando Roper prefers spontaneous weekend road trips, often heading to Door County’s Peninsula State Park for lakeside hikes, occasionally planning longer getaways to Oaxaca for its culinary
    scene, while balancing travel costs with a part‑time gig that funds his Instagram content creation.
  culinary: Fernando Roper enjoys cooking tacos al pastor with pineapple, achiote, and cilantro, slow‑cooks mole poblano using dried chilies and chocolate, and while his kitchen is often a lively mess of
    spices, he prides himself on mastering the balance of flavors that connect him to family traditions.
  core: Fernando Roper blends entrepreneurial curiosity with a laid‑back outlook, juggling bilingual marketing ideas, spontaneous soccer games, and a love for bold flavors, all while occasionally letting
    disorganization and impulse gaming purchases spill over into his daily routine.
background:
  cultural: Fernando is a first‑generation Mexican American; his parents immigrated from Jalisco, Mexico, and he was raised in a bilingual household in Racine, Wisconsin. He grew up celebrating Mexican
    holidays such as Día de los Muertos and Cinco de Mayo, and family gatherings often revolve around traditional foods and music. The values of familismo and respect for elders shape his outlook, while
    his community involvement includes volunteering at a local Hispanic cultural center. Though he identifies strongly with his Mexican roots, he also embraces the Midwestern work ethic and the multicultural
    environment of Racine.
attributes:
  skills: '[''Financial analysis'', ''Market research'', ''Bilingual communication (English/Spanish)'', ''Social media management'', ''Customer service'', ''Basic accounting'', ''Project coordination'',
