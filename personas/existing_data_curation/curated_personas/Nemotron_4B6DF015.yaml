  hobbies: '["Karaoke", "Community theater acting", "Board game nights", "Card game tournaments", "Zumba classes", "Volunteer event coordination", "Personal blog about small‑town life", "Cooking and hosting
    potluck dinners", "Country and pop music listening", "Thrifting and upcycling", "Hiking local trails"]'
  career_goals: Vickie aims to earn her GED within the next year and enroll in a vocational program focused on sales or hospitality. She is driven to secure a customer‑facing role—such as retail sales associate
    or automotive salesperson—where her talkative, competitive streak can translate into top‑performer status. In the medium term, she hopes to advance to a supervisory position or launch a small, community‑oriented
    business like a coffee shop that offers both structure and flexibility. Financial independence and a steadier income are central to reducing her stress, while she also plans to develop better coping
    mechanisms for anxiety through workshops or counseling. Ultimately, she envisions herself as a regional sales manager or small‑business owner who can blend her sociable nature with her desire for personal
    achievement.
