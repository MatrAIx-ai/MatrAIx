personas:
  professional: John Jenkins, a 57‑year‑old artisan baker in Florida, runs a small bakery that thrives on his deep knowledge of humid‑climate breadmaking and citrus‑infused pastry innovation, mentors junior
    staff with cooperative guidance, and they navigate daily operations with a relaxed, occasionally chaotic approach that favors flexibility over rigid planning.
  sports: John Jenkins spends weekends fishing on Lake Okeechobee, participates in a senior paddle‑boarding club at the local marina, roots for the Miami Marlins and Orlando City SC, and volunteers as a
    timekeeper for the community’s senior softball league, and they prefer low‑impact, social‑light activities.
  arts: John Jenkins curates a modest home gallery of vintage cookbook covers, admires the photographic work of William Wegman, listens avidly to classic rock legends like The Rolling Stones and Led Zeppelin,
    and they draw creative inspiration from cooking shows such as Chef’s Table and The Great British Bake Off.
  travel: John Jenkins favors relaxed road trips to coastal towns like Key West and culinary havens like New Orleans, plans visits around the seasonal farmers’ market calendar, enjoys birdwatching excursions
    in the Everglades, and they balance travel with the bakery’s schedule by booking weekend stays or day trips.
  culinary: John Jenkins, a seasoned baker, excels at crafting citrus‑infused sourdough loaves, lemon‑morel croissants, and orange‑honey glazed sticky buns, frequently incorporates Florida oranges, lime
    zest, sea‑salt caramel, and heirloom tomatoes into his recipes, delights in photographing rustic apple‑cinnamon galettes, and they frequently revisit vintage Southern dishes like shrimp and grits for
    inspiration.
  core: John Jenkins is a 57‑year‑old baker who blends Southern tradition with citrus creativity, runs a community‑focused shop with a relaxed and sometimes chaotic style, and they soothe frequent anxiety
    through gardening, birdwatching, and classic rock.
background:
  cultural: John grew up in a working‑class white family in rural Citrus County, Florida, where the rhythms of the citrus harvest and Southern hospitality shaped his worldview. Raised in a modest Baptist
    household, he learned the value of community, hard work, and sharing food with neighbors. These cultural roots influence his baking style—favoring classic Southern breads, key‑lime desserts, and a warm,
    welcoming atmosphere in his shop—while his lifelong curiosity drives him to experiment within that tradition.
