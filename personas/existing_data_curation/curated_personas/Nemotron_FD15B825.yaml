  hobbies: '[''Citrus tree gardening'', ''Lake fishing'', ''DIY woodworking (building wooden rolling pins and shelves)'', ''Reading culinary history and vintage cookbooks'', ''Watching cooking shows and
    food documentaries'', ''Food photography'', ''Attending local farmers markets'', ''Volunteering at the community kitchen'', ''Listening to classic rock'', ''Birdwatching in nearby nature trails'']'
  career_goals: John hopes to cement his bakery as a beloved community hub known for high‑quality, locally sourced baked goods while gradually expanding his product line to include healthier, citrus‑infused
    options. He dreams of publishing a small cookbook that captures his blend of tradition and curiosity, mentoring an apprentice, and eventually scaling back his hours so he can focus on creative experimentation
    and reduce the anxiety that comes with running a busy shop.
