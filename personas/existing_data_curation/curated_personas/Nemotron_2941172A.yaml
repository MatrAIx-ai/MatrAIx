    History Research'']'
  career_goals: Even in retirement, Frances aims to remain a lively contributor to her community. She hopes to expand the mentorship program she runs at the local high school, secure ongoing funding for
    a scholarship that supports under‑represented students pursuing STEM degrees, and publish a memoir that captures the history of Hartford and the experiences of women engineers from the 1960s. Additionally,
    she wishes to maintain her health through regular activity, continue traveling to regional fairs, and stay actively involved in her church’s outreach committees.
