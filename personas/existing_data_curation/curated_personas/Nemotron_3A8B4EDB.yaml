    ''Journaling and memoir writing'', ''Attending community cultural events and festivals'']'
  career_goals: Although she is retired, Krystle aims to leave a lasting cultural imprint in her community. She plans to compile and self‑publish a memoir that weaves together her Colombian upbringing,
    immigration journey, and lifelong love of art. She hopes to establish a monthly “Cultura Café” series at the local senior center, where she can teach cooking, share folk stories, and introduce participants
    to contemporary art concepts. Continuing her personal growth, she intends to enroll in a digital photography workshop to document neighborhood life and perhaps exhibit her photographs at a community
    gallery. Travel remains a cherished ambition; she dreams of revisiting her hometown in Colombia and exploring other Latin American art hubs. Ultimately, she aspires to mentor younger immigrants, especially
    women, encouraging them to pursue creative passions and community involvement.
