personas:
  professional: Krystle Dejesus, a retired community arts coordinator, blends fluency in English and Spanish with a lifelong passion for visual arts to design spontaneous, hands‑on multicultural workshops
    at the Yonkers Senior Center, where her relaxed planning style fosters creativity while her assertive storytelling engages participants.
  sports: Krystle Dejesus enjoys regular walks along the Hudson River with the Yonkers Senior Walking Club, cheers on the New York Yankees during summer games, and participates in low‑impact tai chi sessions
    at the senior center to maintain flexibility.
  arts: Krystle Dejesus spends Saturdays at the Metropolitan Museum sketching interpretations of Frida Kahlo, Diego Rivera, and Georgia O'Keeffe, while evenings echo with classic cumbia, contemporary world
    music, and readings of Pablo Neruda, and she captures street scenes and garden close‑ups through her budding photography hobby.
  travel: Krystle Dejesus dreams of revisiting her coastal hometown in South America and exploring the mural‑rich neighborhoods of Mexico City and the historic cafés of Buenos Aires, planning trips that
    fit within a modest travel budget and her weekly senior‑center commitments.
  culinary: Krystle Dejesus experiments in her kitchen, perfecting a hearty ajiaco stew and a daring mole‑infused pasta, while cultivating basil, cilantro, and chilies in her herb garden to flavor weekly
    cooking workshops that blend heritage recipes with modern twists.
  core: Krystle Dejesus is a curious septuagenarian who balances spontaneous creativity with relaxed planning, often misplacing receipts but never misplacing a sketchbook.
background:
  cultural: Krystle was born and raised in the Andean region of Colombia, where family gatherings, music, and food are central to daily life. She grew up speaking Spanish at home, celebrating holidays such
    as Carnaval de Barranquilla and Día de la Independencia with colorful parades, traditional foods, and folkloric dances. After moving to the United States in her early twenties, she settled in Yonkers,
    where she blended her Colombian heritage with the multicultural tapestry of the New York metropolitan area. She remains active in the local Colombian diaspora, participating in cultural festivals, sharing
    recipes, and teaching Spanish to interested neighbors. Her Catholic upbringing still informs her values of community service and compassion, though she embraces a broad spiritual outlook. This bicultural
    experience enriches her worldview, fuels her artistic curiosity, and guides her desire to preserve and share Colombian traditions within her American community.
