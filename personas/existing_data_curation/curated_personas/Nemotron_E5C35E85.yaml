  hobbies: '[''Cooking and recipe development'', ''Gardening'', ''Knitting and crocheting'', ''Listening to gospel music'', ''Reading mystery novels'', ''Walking in local parks'', ''Participating in community
    bake‑offs'', ''Attending church events'']'
  career_goals: Abena aims to transform her culinary talents and love of community into a modest home‑based catering business focused on authentic Southern comfort food, with the long‑term goal of supporting
    a small line of handcrafted home‑decor items. She also plans to obtain a certification in community health outreach so she can lead local health‑fair initiatives and expand her impact within the neighborhood.
    Ultimately, she seeks financial independence for her family while preserving the flexibility that allows her to balance work, family responsibilities, and personal interests.
