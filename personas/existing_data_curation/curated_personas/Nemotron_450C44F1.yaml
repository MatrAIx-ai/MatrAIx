  career_goals: Kayla aims to transition into an office manager role within the next two years, leveraging her extensive administrative experience to oversee larger operational functions and mentor junior
    staff. She plans to earn a certification in office technology and workflow automation to enhance efficiency in her workplace. Long‑term, she hopes to contribute to community outreach initiatives by
    coordinating volunteer programs for local senior services, blending her professional expertise with her compassionate drive to help others. Kayla also envisions developing a small‑scale training workshop
    for coworkers on effective communication and conflict resolution, fostering a harmonious office culture.
