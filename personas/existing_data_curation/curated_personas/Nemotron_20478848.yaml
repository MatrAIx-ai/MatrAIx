  hobbies: '[''Reading non‑fiction (business, economics, personal development)'', ''Playing strategy video games'', ''Cooking and experimenting with recipes'', ''Hiking local New England trails'', ''Urban
    photography'', ''Small gatherings with close friends'', ''Volunteering at a community center'']'
  career_goals: Michael aims to earn his Certified Public Accountant (CPA) license within the next three years and advance to a senior auditor role at a reputable firm. He is interested in specializing
    in forensic accounting or financial controls, with a long‑term goal of becoming a financial controller or chief financial officer. He values a stable career that offers opportunities for continuous
    learning, professional growth, and a balanced lifestyle that allows him to maintain his preference for flexibility and personal time.
