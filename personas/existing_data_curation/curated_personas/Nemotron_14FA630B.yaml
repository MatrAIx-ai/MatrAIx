personas:
  professional: Kaitlin Smith, an aspiring visual storyteller, merges hand‑drawn sketches, watercolor washes, and digital illustration in Photoshop and Illustrator to produce narrative‑rich freelance commissions,
    while their empathetic, collaborative style fuels community art workshops despite a habit of leaving projects unorganized.
  sports: Kaitlin Smith enjoys weekend hikes along the Hill Country, regular kayaking sessions with the Austin Paddle Club on Lady Bird Lake, Vinyasa yoga classes at a downtown studio, and cheering on Austin
    FC during MLS matches while following the Texas Longhorns women’s basketball team.
  arts: Kaitlin Smith immerses herself in Austin’s vibrant arts scene by sketching daily, attending gallery openings featuring works by James Jean and Yayoi Kusama, catching indie film screenings of Greta Gerwig’s
    titles, and curating playlists that blend Sufjan Stevens, Bon Iver, and classic rock legends like The Rolling Stones.
  travel: Kaitlin Smith favors spontaneous road trips that blend nature and culture—having explored New Orleans’ jazz districts, camped in Texas’ Big Bend National Park, and spent a weekend in Portland’s
    indie music scene—while dreaming of attending the Reykjavik Arts Festival and visiting Japan’s art island of Naoshima.
  culinary: Kaitlin Smith’s palate rides Austin’s food‑truck wave, regularly indulging in smoked brisket tacos topped with cilantro and chipotle, savoring a cauliflower‑crust vegan pizza at a downtown spot,
    and experimenting with homemade mango‑avocado smoothies blended with lime and honey.
  core: Kaitlin Smith is a dreamy, curiosity‑driven illustration student who balances chaotic creativity with quiet reflection, often swapping scattered schedules for spontaneous art adventures and occasional
    over‑caffeinated sketch marathons.
background:
  cultural: Kaitlin grew up in Austin, Texas, a city known for its vibrant arts scene, progressive values, and blend of Southern hospitality with a cosmopolitan spirit. Her family, of primarily European-American
    descent, emphasized education and artistic expression, encouraging her to explore local museums, music festivals, and community art projects. While she identifies as white, her cultural experience is
    shaped by Austin's eclectic mix of influences—Tex-Mex culinary traditions, outdoor recreation culture, and a strong DIY ethic evident in the city's maker spaces and independent venues. This environment
    nurtured her open‑mindedness, appreciation for collaborative creativity, and a love for both the city's historic roots and its forward‑looking artistic innovation.
