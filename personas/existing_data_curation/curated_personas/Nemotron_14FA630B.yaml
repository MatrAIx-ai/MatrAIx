  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Digital Art'', ''Creative Writing (short stories, poetry)'', ''Attending Art Galleries & SXSW'', ''Live Music & Indie Film'', ''Hiking Hill Country
    Trails'', ''Kayaking on Lady Bird Lake'', ''Yoga'', ''Curating Music Playlists'']'
  career_goals: Kaitlin aims to complete a Bachelor of Fine Arts or a liberal arts degree with a concentration in visual storytelling. She envisions a career as a freelance illustrator or graphic novelist,
    creating work that blends imaginative narratives with striking visuals. In the longer term, she hopes to launch a small creative studio that collaborates with community organizations in Austin to produce
    public art installations and youth art workshops. She also aspires to further her education with a graduate program in visual arts or art therapy, allowing her to merge her artistic passion with a desire
    to support mental well‑being through creative expression.
