  career_goals: Samantha envisions a career that offers clear structure, tangible responsibilities, and the chance to help others. She is drawn to the idea of becoming a pediatric nurse or a veterinarian
    because both paths combine her love for science, caring for living beings, and a predictable routine of daily patient care. She also dreams of coaching a youth soccer team someday, merging her competitive
    spirit with mentorship. In the short term, she aims to graduate high school with honors, earn a scholarship to study biology or health sciences, and gain volunteer experience at the local animal shelter
    to strengthen her future college applications.
