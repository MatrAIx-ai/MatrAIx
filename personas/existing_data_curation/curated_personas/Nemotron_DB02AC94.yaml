personas:
  professional: Tarsha Sanders, a high‑school junior passionate about archival research and data‑driven civic engagement, channels their meticulous organization, love of historical nonfiction, and budding
    Python scripting skills into cataloguing local history collections at the public library, where they regularly assist librarians.
  sports: Tarsha Sanders, a quiet fitness enthusiast, follows the New Orleans Pelicans and Saints on game nights, yet prefers solitary early‑morning runs along the Mississippi River levee, and they also
    participate in the Bayou Youth Swim Club for low‑key cardio sessions.
  arts: Tarsha Sanders, a budding visual storyteller, spends weekends listening to Wynton Marsalis and Trombone Shorty while photographing French‑Quarter balconies and reading poetry by Natasha Trethewey,
    and they weave these artistic influences into a quiet yet vibrant personal aesthetic.
  travel: Tarsha Sanders, an organized teen traveler, plans low‑key weekend trips to historic sites such as Natchez and Oak Alley Plantation, dreams of a solo study tour of Paris’s Musée d’Orsay, and they
    balance these aspirations with parental budget limits and school responsibilities.
  culinary: Tarsha Sanders, an aspiring home cook, perfects Creole classics like gumbo and jambalaya using fresh okra, smoked andouille, and file powder, while also experimenting with beignets and documenting
    each recipe in a handwritten journal, and they relish sharing these dishes with family during communal meals.
  core: Tarsha Sanders blends disciplined archival ambition with a quiet love for jazz, a habit of over‑organizing notebooks, and occasional midnight snack binges of spicy beignets, and they often recharge
    by listening to saxophone solos while sketching street scenes.
background:
  cultural: 'Tarsha is a Black teenager whose family has deep roots in New Orleans, a city shaped by African, French, Spanish, and Creole influences. Her upbringing reflects a blend of cultural traditions:
    the rhythm of jazz that drifts through neighborhood streets, the flavors of Creole cooking shared at family gatherings, and the oral storytelling traditions passed down from elders. Her community places
    a strong emphasis on education, resilience, and preserving local history, values that have guided her interest in archival work and data‑driven civic engagement. While navigating the systemic challenges
    that many Black youth face, Tarsha draws strength from a supportive extended family, church community, and local mentors who encourage her disciplined pursuits. This cultural tapestry informs her identity,
    fuels her curiosity about New Orleans’ past, and inspires her commitment to contribute positively to her city’s future.'
attributes:
  skills: '[''Advanced time-management and scheduling'', ''Digital productivity tools (Notion, Google Calendar, Trello)'', ''Structured note-taking (Cornell method)'', ''Mathematics (Algebra, Geometry)'',
    ''Science lab techniques (Earth Science)'', ''Basic Python programming'', ''Personal finance budgeting'', ''Meal planning and basic Creole cooking'', ''Research using library databases and local archives'',
    ''Effective written communication and journaling'']'
  hobbies: '[''Reading historical nonfiction and poetry'', ''Solo journaling and reflective writing'', ''Solving puzzles (crosswords, sudoku, logic games)'', ''Learning and creating small Python scripts'',
    ''Photography of New Orleans architecture'', ''Cooking traditional Creole dishes with family'', ''Gardening in a community plot'', ''Attending low‑key cultural events (museum visits, jazz performances)'',
    ''Collecting vintage postcards and organizing them'', ''Volunteering at the local public library (shelving, cataloguing)'']'
  career_goals: Tarsha aims to attend a high school with a strong STEM and humanities program, earn a scholarship, and eventually pursue a college degree in data analytics, information science, or archival
    studies. She envisions a career that combines her love for organization, research, and her community’s heritage—such as becoming a city data analyst or urban planner who helps New Orleans make data‑driven
    decisions, or an archivist/museum curator preserving the city’s African‑American and Creole histories. Her ambition is to contribute to preserving cultural memory while working in a structured, predictable
    environment where her meticulous skills add tangible value.
