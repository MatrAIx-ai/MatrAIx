personas:
  professional: Ronald is an aspiring junior engineer and game developer who spends afternoons building LEGO models and coding simple games in Scratch, and they channel their quiet curiosity and practical
    mindset into iterative prototypes.
  sports: Ronald enjoys low‑key physical activity like bike rides on neighborhood trails and junior tennis lessons, plays on the Oakdale Kids Soccer Club, and they cheer passionately for the Boston Red
    Sox while following the World Cup for its strategic depth.
  arts: Ronald’s creative outlet includes building LEGO stop‑motion animations, sketching insects, reading sci‑fi novels by Andy Weir, watching Hayao Miyazaki’s Studio Ghibli films, and they find inspiration
    in Hans Zimmer’s orchestral scores, which fuel his imaginative storytelling.
  travel: Ronald prefers meticulously planned trips to science‑focused destinations such as Yellowstone National Park and the Kennedy Space Center, and they dream of a virtual reality tour of the International
    Space Station after saving enough for a future space‑themed getaway.
  culinary: Ronald enjoys simple cooking experiments like making banana pancakes, rock candy, and grilled cheese sandwiches with cheddar and tomato, favoring ingredients like strawberries, peanut butter,
    and cocoa powder, and they often add a dash of cinnamon for extra flavor.
  core: Ronald blends quiet curiosity with methodical practicality, turning solitary LEGO builds and Scratch games into boundless imagination while they secretly hoard snack wrappers for midnight snack
    raids.
background:
  cultural: Ronald is a white American growing up in Allen, a suburban city in Collin County, Texas. His family emphasizes education, community involvement, and occasional participation in local traditions
    such as county fairs and holiday celebrations. While the region is known for football and outdoor activities, Ronald's preference for quiet, solitary pursuits leads him to spend more time at the local
    library, a community makerspace, and his backyard garden. He occasionally attends a small community church with his family, which reinforces a sense of responsibility and respectful behavior. His cultural
    environment blends modern suburban life with subtle Texan influences—like a love for BBQ, country music, and outdoor recreation—yet he primarily identifies with broader American cultural norms and a
    growing passion for science and technology.
