  career_goals: Ronald hopes to turn his love for building and problem solving into a career in engineering. He dreams of becoming a civil or robotics engineer who designs sustainable structures and innovative
    machines. In the short term, he wants to join his school's robotics club, win a science‑fair award, and attend a STEM‑focused summer camp. Over the next decade, he plans to attend a high school with
    a strong engineering program, then pursue an undergraduate degree in mechanical or civil engineering, eventually working on projects that improve his community's infrastructure while incorporating environmentally
    friendly technologies.
