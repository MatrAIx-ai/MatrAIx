personas:
  professional: Eddy Scott is a budding hands‑on tinkerer who blends a quiet curiosity with a practical knack for disassembling gadgets, writing simple Python automations, and dreaming of a future certification
    in automotive technology or carpentry, all while they favor flexible, low‑pressure projects over rigid schedules.
  sports: Eddy Scott spends afternoons at the neighborhood park shooting free‑throws for the Eastside Youth Basketball Club, idolizes the Los Angeles Lakers for their teamwork, and maintains fitness by
    combining dribbling drills with quiet walks through the woods, preferring solo cardio over group gym classes while they keep their free‑throw rhythm consistently sharp.
  arts: Eddy Scott crafts hip‑hop beats on FL Studio, drums by ear during jam sessions with friends, channels the sample‑centric vibe of J Dilla and the lyrical depth of Kendrick Lamar, and balances this
    creative outlet with a love for sci‑fi short stories by Ted Chiang, revealing a blend of technical precision and artistic imagination that they nurture whenever inspiration strikes.
  travel: Eddy Scott favors low‑key, budget‑friendly road trips, having already explored the nearby Blue Ridge Parkway and a weekend hike in Shenandoah National Park, while dreaming of a future music pilgrimage
    to New Orleans and a road‑trip across the Southwest, planning loosely and letting curiosity guide them more than strict itineraries.
  culinary: Eddy Scott loves cooking home‑style comfort foods like fried chicken, buttery biscuits, and collard greens with a twist of smoked paprika and hot sauce, often prepping meals with their grandmother
    in the family kitchen, and they take pride in mastering the perfect golden crust while also experimenting with LED‑lit kitchen gadgets to time their recipes.
  core: Eddy Scott is a calm, curiosity‑driven teen who toggles between tinkering with circuits and making beats, juggling a laid‑back approach to school, finances, and life while occasionally misplacing
    their screwdriver and forgetting to stretch before basketball.
background:
  cultural: Eddy is an African‑American teen raised in Cowpens, a small town in Cherokee County, South Carolina. His upbringing is intertwined with the local Black church community, weekend gospel choirs,
    and family gatherings where stories of Black resilience in the rural South are shared. He grew up listening to a mix of classic soul, modern hip‑hop, and the rhythms of church music that shaped his
    appreciation for drumming. Food, faith, and a strong sense of family responsibility are central to his cultural identity, as are neighborhood barbershop chats and community basketball tournaments that
    serve as informal social hubs. This background reinforces his calm demeanor, cooperative nature, and desire to contribute positively to his close‑knit community.
attributes:
  skills: '[''basic mechanical repair'', ''troubleshooting computer issues'', ''introductory Python scripting'', ''playing drums by ear'', ''basketball shooting'', ''peer mediation'', ''Southern cooking'']'
  hobbies: '[''playing basketball'', ''beat‑making on a laptop'', ''building simple electronics'', ''reading sci‑fi'', ''watching tech documentaries'', ''cooking Southern dishes'', ''walking in local woods'']'
  career_goals: Eddy wants to complete his GED within the next two years and then pursue a technical certification in automotive technology or carpentry, fields that combine his love of practical problem‑solving
    with the chance to work independently. He also dreams of producing his own hip‑hop beats and, if opportunities arise, opening a small community workshop where he can repair electronics for neighbors
    while mentoring younger kids. His long‑term ambition is to build a flexible career that lets him stay close to his hometown, support his family, and keep learning new skills on his own terms.
