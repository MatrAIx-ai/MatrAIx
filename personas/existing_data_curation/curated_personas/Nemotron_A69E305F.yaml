  hobbies: '[''Home vegetable gardening'', ''Hiking in the White Mountains'', ''Birdwatching'', ''Farm-to-table cooking'', ''Reading mystery novels'', ''Volunteering at local farmer\''s markets'', ''Knitting'',
    ''Landscape photography'', ''DIY woodworking'']'
  career_goals: She aims to expand her current plot into a certified organic farm that supplies a weekly CSA to the Leeds area while incorporating a small agritourism component—hosting seasonal workshops
    on composting and heirloom seed saving. Over the next five years she hopes to earn organic certification, develop a modest farm‑stand, and mentor younger agricultural workers interested in sustainable
    practices. She also wants to deepen her knowledge of regenerative agriculture through workshops and possibly a part‑time certificate program, balancing her curiosity with the practicality of keeping
    the farm financially viable.
