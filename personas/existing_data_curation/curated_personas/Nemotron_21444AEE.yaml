  hobbies: '[''Visiting museums and galleries'', ''Watercolor painting'', ''Mixed‑media collage'', ''Book club participation'', ''Bridge and trivia games'', ''Backyard gardening'', ''Cooking family recipes'',
    ''Traveling to cultural festivals'', ''Organizing community potlucks'', ''Digital photography classes'', ''Story‑mapping workshops'']'
  career_goals: Although officially retired, Irma aims to leave a lasting cultural imprint on her neighborhood. Her primary ambition is to launch a free, monthly intergenerational art studio at the Orland Park
    Community Center that blends traditional African‑American art forms with contemporary media, encouraging seniors and teens to co‑create. She also hopes to compile and self‑publish a memoir of family
    recipes and the stories behind them, preserving Black culinary heritage for future generations. In addition, Irma plans to travel to key sites of African‑Diaspora history, such as the National Museum
    of African American History & Culture in Washington, D.C., and selected locations in Ghana, sharing those experiences through community presentations. Ultimately, she seeks to be recognized as a cultural
    bridge‑builder who nurtures curiosity and creative expression within her community.
