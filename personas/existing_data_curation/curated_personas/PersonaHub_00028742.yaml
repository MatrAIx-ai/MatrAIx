persona_description: A comic artist who specializes in creating comics that focus on education and literacy. They have experience working with youth and have a passion for using comics as a tool to improve
  literacy rates. They have won grants and awards for their work in improving literacy among urban youths in Pittsburgh and have published books on comic creation and literacy. They are known for their
  work with the Create a Comic Project, which is a youth literacy program that uses comics to teach reading and writing skills. They have a unique understanding of the relationship between comics and education
  and have developed a range of techniques to enhance math education through comics.
