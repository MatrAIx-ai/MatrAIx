  career_goals: Neeley aspires to transition from a front‑line cashier to a supervisory role within the retail environment, seeking to leverage her strong customer‑service record and natural affinity for
    teamwork. She aims to complete a certificate in retail management within the next two years, which would position her for a shift‑lead or assistant store manager position. Simultaneously, she is interested
    in applying her humanities background to community‑focused roles, such as coordinating local cultural events or volunteering at the Holland Public Library, where she could blend her organizational skills
    with her passion for education and cultural preservation. Her long‑term ambition is to achieve a balanced professional life that allows her to contribute meaningfully to her community while maintaining
    a predictable schedule that supports her family.
