  hobbies: '[''reading classic literature'', ''gardening'', ''baking'', ''yoga'', ''mindfulness meditation'', ''book club'', ''knitting circle'', ''hiking on local trails'', ''crossword puzzles'']'
  career_goals: Paige aims to transition into a leadership role that leverages her organizational strengths and commitment to client-centered care. Over the next five years, she plans to obtain clinical
    social work licensure (LCSW) and pursue a certification in trauma-informed care, positioning herself for a supervisory or program director position within a regional health system or community nonprofit.
    Her ambition is to design and implement a structured, evidence-based outreach program targeting low-income families in Hinds County, improving access to preventive health services and mental health
    resources. Paige also envisions mentoring junior social workers, fostering a collaborative team environment that balances accountability with supportive practice. Long-term, she is interested in influencing
    health policy at the county level, advocating for integrated care models that address both medical and social determinants of health.
