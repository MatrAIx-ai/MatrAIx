personas:
  professional: Paige Ayotte is a diligent healthcare social worker whose humanistic graduate training blends seamlessly with her knack for organized case management, enabling her to swiftly assess client
    needs, coordinate interdisciplinary services, and document everything with meticulous precision while she advances toward LCSW licensure and a trauma‑informed care certification to lead a structured
    outreach program for low‑income families in Hinds County.
  sports: Paige Ayotte enjoys low‑impact fitness, regularly attending sunrise yoga classes at the community center, participating in a small walking club that meets twice weekly to explore the Natchez Trace,
    and cheering for the Mississippi State Bulldogs football team on Saturday afternoons, finding the routine both calming and socially intimate.
  arts: Paige Ayotte is an avid reader of classic literature such as Jane Austen and Leo Tolstoy and savors contemporary nonfiction by Malcolm Gladwell, while their evenings often include listening to Vladimir
    Horowitz’s piano recordings, attending local theater productions like 'Our Town' with their book club, and knitting while humming folk tunes by Bob Dylan.
  travel: Paige Ayotte favors meticulously planned trips that blend nature, history, and quiet reflection, having spent a weekend touring the historic gardens of Savannah, Georgia, and a solo retreat in
    Asheville, North Carolina to explore the Biltmore Estate and nearby Blue Ridge hikes, while they keep a running list of future destinations that include the English countryside’s cottage gardens.
  culinary: Paige Ayotte's baking ritual centers on precise measurements, producing flawless almond biscotti, sourdough loaves, and lemon drizzle cake, often infusing garden‑fresh herbs like rosemary and
    thyme into savory dishes such as rosemary‑infused roasted chicken, and they regularly source seasonal vegetables from the local farmer’s market to complement their culinary experiments.
  core: Paige Ayotte is a methodical, quietly ambitious social worker whose love for order extends from case files to garden rows, baking trays, and a meticulously budgeted life.
background:
  cultural: Born and raised in the Deep South, Paige's cultural identity is shaped by the traditions of small-town Mississippi. As a white Mississippian, she grew up in a community that values Southern
    hospitality, strong family ties, and church involvement—the latter playing a central role in her personal and social life. Living in Clinton, Hinds County, she is attuned to the region's historic complexities
    and the socioeconomic disparities that influence health outcomes. Her graduate work in the humanities has deepened her appreciation for diverse narratives, fostering a culturally competent perspective
    essential to her social work practice. This blend of Southern cultural norms, a commitment to service, and an academic grounding in humanistic inquiry informs both her professional ethos and her everyday
    interactions.
