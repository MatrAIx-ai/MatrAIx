  career_goals: Manuel loves to imagine future roles that let him help others and create. He often says he wants to become a teacher because he enjoys explaining new ideas to friends, an artist because
    he loves drawing and exploring colors, an astronaut because space fascinates him, or a community helper like a firefighter who protects people. These ambitions reflect his curiosity, kindness, and desire
