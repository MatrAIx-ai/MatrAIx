  hobbies: '[''Softball league'', ''Line dancing'', ''Cooking and baking'', ''Hosting potluck gatherings'', ''Gardening'', ''Crossword puzzles'', ''Volunteering at church youth group'']'
  career_goals: Jean Marie aims to build on her practical office experience by earning a GED and pursuing a certification in office administration. Over the next five years she envisions moving into an
    office supervisor or administrative manager role within her current organization or a local public agency, where she can oversee a small team and implement process improvements. She also hopes to develop
    expertise in project coordination to support community events, all while balancing her family responsibilities and maintaining a stable, dependable career trajectory.
