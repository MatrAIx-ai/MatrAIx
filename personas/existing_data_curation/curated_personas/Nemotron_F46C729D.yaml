personas:
  professional: A seasoned electrician turned solar‑retrofit consultant, Royce Alexander leverages five decades of wiring expertise, meticulous tool organization, and a competitive curiosity for emerging
    smart‑home technologies to mentor apprentices, author a Practical Guide to Electrical Safety, and ensure every code detail meets his exacting standards.
  sports: An avid fan of Gulf Coast athletics, Royce Alexander follows the New Orleans Saints, the Tampa Bay Rays, and the local semi‑pro fishing club, they spend mornings rowing at the community marina
    and evenings playing casual bocce with neighbors, balancing competitive enthusiasm with low‑impact fitness to accommodate aging joints.
  arts: A lover of mid‑century craftsmanship and classic Americana, Royce Alexander restores vintage radios to hear Glenn Miller and Merle Haggard on vinyl, they carve custom fishing rods while listening
    to Johnny Cash, and they attend seasonal performances of the Gulf Coast Symphony, finding creative solace in hands‑on artistry.
  travel: A methodical planner who prefers short, purposeful trips, Royce Alexander enjoys weekend fishing charters to the Florida Keys and annual family road‑trips along the Gulf Coast to Galveston, they
    book accommodations early to secure dock space, yet they dream of a relaxed cruise to Bermuda once health permits.
  culinary: A seasoned outdoorsman and modest gardener, Royce Alexander delights in grilling fresh redfish with a citrus‑herb glaze, simmering shrimp étouffée with garden‑grown bell peppers and okra, they
    experiment with homemade smoked paprika and relish the occasional plate of jambalaya seasoned with cayenne and thyme.
  core: A meticulous yet skeptical 72‑year‑old electrician, Royce Alexander balances a love for hands‑on projects—fishing, woodworking, and vintage radios—with a constant undercurrent of worry, a competitive
    drive, and a habit of double‑checking every detail, from wiring diagrams to garden harvests.
background:
  cultural: Royce grew up in a working‑class, white Texan family in Galveston County, steeped in Southern hospitality, modesty, and a strong work ethic. Raised in a Methodist household that emphasized community
    service and family loyalty, he internalized values of self‑reliance and respect for tradition. The coastal culture of Hitchcock—fishing, barbecues, country music, and a close‑knit community—shapes his
    identity, while his pragmatic openness to new technology reflects a balance between heritage and curiosity.
