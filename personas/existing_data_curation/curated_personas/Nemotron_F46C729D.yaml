  hobbies: '[''Gulf Coast Fishing'', ''Boating'', ''Woodworking'', ''Vintage Radio Restoration'', ''Model Airplane Construction'', ''Historical Non‑Fiction Reading'', ''Methodist Church Attendance'', ''Community
    Safety Workshops'', ''Vegetable Gardening'']'
  career_goals: Approaching retirement, Royce aims to transition to a consultancy role that lets him share his knowledge through a Practical Guide to Electrical Safety, mentor apprentices at the local trade
    school, and expand his small family‑run service into a trusted provider of solar retrofits for older homes. He also seeks to secure financial stability for his wife, create a modest passive‑income stream
    from occasional contract work and a community solar investment, and reduce his own worry by establishing clear, low‑stress routines.
