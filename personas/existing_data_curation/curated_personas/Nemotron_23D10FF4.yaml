personas:
  professional: Anita Merritt, a budding digital illustrator and story‑crafter, channels their vivid imagination and love of fantasy into art club projects while they navigate a carefree, often‑disorganized
    schedule that favors creative spontaneity over rigid deadlines.
  sports: Anita Merritt spends afternoons mastering tricks at the Owasso skate park, cheers loudly for the Owasso Wildcat football team on Friday nights, and follows the Oklahoma City Thunder with a jersey
    they wear to school, balancing a zest for movement with a laid‑back approach to organized sports.
  arts: Anita Merritt immerses themselves in drawing, digital painting on their iPad, and writing fanfiction inspired by J.K. Rowling, Neil Gaiman, and indie pop icons like Lorde and Tame Impala, while
    they also attend local museum nights that showcase indigenous art and folk crafts.
  travel: Anita Merritt prefers weekend road trips to family cabins on Grand Lake, spontaneous visits to the Oklahoma State Fair, and occasional family outings to Disney World, planning their adventures
    loosely with a notebook full of doodles rather than a strict itinerary, which they find exhilarating.
  culinary: Anita Merritt favors comfort foods such as chicken‑fried steak, sweet potato fries, and homemade banana smoothies, enjoys experimenting with spicy buffalo wings at home, and loves indulging
    in apple‑pie‑filled donuts after a long skate session, while they often snack on candy bars when anxious.
  core: Anita Merritt is an imaginative, socially vibrant teen who channels their creative energy into art and skateboarding while battling anxiety‑driven impulsivity and a charmingly chaotic approach to
    life.
background:
  cultural: Growing up in Owasso, a suburban community just north of Tulsa, Anita’s cultural backdrop blends typical Mid‑American values with the distinctive character of Oklahoma. Her family participates
    in community traditions like weekend high‑school football games, Thanksgiving, and local holiday festivals. Raised in a household that emphasizes kindness, community service, and a respect for the land,
    she is aware of the region’s agricultural heritage and the influence of nearby Native American cultures that enrich Oklahoma’s tapestry. Local museums, county fairs, and occasional exposure to indigenous
    art have sparked her curiosity about diverse artistic expressions. While she enjoys contemporary pop culture, her upbringing in a close‑knit Mid‑South environment shapes her sense of neighborliness,
    resilience, and a love for outdoor activities such as skateboarding at the town’s park.
