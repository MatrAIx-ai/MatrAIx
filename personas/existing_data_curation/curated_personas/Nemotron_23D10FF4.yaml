  career_goals: Anita dreams of turning her love for art and storytelling into a career that lets her bring imagined worlds to life. She aims to study illustration or graphic design at an arts‑focused college,
    aspiring to work as a concept artist for video games or as an author‑illustrator of graphic novels. Motivated by her own experiences with anxiety, she also hopes to create projects that raise mental‑health
    awareness among teens, perhaps through illustrated storylines or a youth‑focused web series. In the long term she wants to combine creativity with advocacy, leading creative teams that produce emotionally
    resonant media.
