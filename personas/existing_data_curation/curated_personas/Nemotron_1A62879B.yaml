  career_goals: Patrick aims to transition from a senior developer role to a technical leadership position such as lead engineer or software architect, where he can shape product strategy and mentor junior
    developers. He is especially motivated to spearhead projects that blend cutting‑edge AI technologies with user‑centric design, leveraging his business acumen to drive market‑ready solutions. In the
    longer term, he envisions founding a boutique SaaS startup that solves niche problems for the financial services sector in Charlotte, while also creating an environment that balances innovative freedom
    with disciplined processes to manage his stress and competitive drive.
