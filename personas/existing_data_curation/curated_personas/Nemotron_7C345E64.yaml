personas:
  professional: Edwin James, an aspiring nonprofit public relations and fundraising coordinator, leverages their knack for relationship‑building, persuasive messaging, and event organization while thriving
    on the energy of social gatherings, though their relaxed approach to deadlines sometimes creates last‑minute scrambles for campaign roll‑outs.
  sports: Edwin James, a regular participant in pickup basketball at City Park, follows the LSU Tigers football and men’s basketball teams, trains with the community Raptor Hoops club during the winter,
    and treats fitness as a social outing rather than a regimented routine, which sometimes leads to missed workouts after a late‑night gig.
  arts: Edwin James immerses themselves in Baton Rouge’s eclectic music scene, vibing to Kendrick Lamar’s hip‑hop verses, Louis Armstrong’s jazz standards, and local brass bands like the Red River Street
    Youth Ensemble, while snapping street photography that captures moments of community resilience, and they frequently cite Maya Angelou’s spoken‑word poetry as an influence on their blog narratives.
  travel: Edwin James prefers spontaneous weekend road trips over meticulously planned vacations, has explored New Orleans for its Mardi Gras parades and culinary scene, dreams of a cultural immersion tour
    in Senegal’s Dakar, yet budgets carefully to ensure funds remain for mentorship program supplies back home.
  culinary: Edwin James enjoys cooking Creole classics like jambalaya and shrimp étouffée, experimenting with Andouille sausage and okra, yet their kitchen skills hover at enthusiastic amateur level, leading
    to occasional burnt roux, and they love pairing these dishes with fresh beignets and locally sourced collard greens.
  core: Edwin James blends boundless sociability with a laid‑back, sometimes chaotic, approach to organization, turning community events into energetic gatherings while often misplacing their keys before
    a big presentation.
background:
  cultural: Edwin is an African‑American raised in Baton Rouge, steeped in Southern Black and Creole cultural traditions. He grew up attending a historically Black Baptist church where gospel music, communal
    worship, and service projects were central. Family gatherings feature classic dishes like gumbo, jambalaya, collard greens, and sweet potato pie, and storytelling often centers on civil‑rights history
    and community resilience. The city’s blend of French, African, and Caribbean influences shaped his love for music, cuisine, and collective celebration. He speaks with a subtle Southern drawl, values
    solidarity within the Black community, and actively participates in local cultural events such as Mardi Gras parades, Juneteenth celebrations, and community festivals.
attributes:
  skills: '[''Public Relations'', ''Fundraising'', ''Event Planning'', ''Social Media Management'', ''Donor Relations'', ''Grant Writing'', ''Community Outreach'', ''Public Speaking'', ''Press Release Writing'',
