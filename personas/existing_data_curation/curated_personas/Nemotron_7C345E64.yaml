  hobbies: '[''Listening to hip‑hop and jazz'', ''Playing basketball'', ''Volunteering at community shelters'', ''Cooking Creole and soul‑food dishes'', ''Street photography'', ''Reading social‑justice
    and self‑help books'', ''Writing a community blog'', ''Playing casual video games with friends'']'
  career_goals: Edwin aims to become a senior public relations and fundraising manager for a major nonprofit serving underprivileged youth in Baton Rouge within the next five years. He wants to design large‑scale
    fundraising campaigns, secure major gifts, and build a robust community‑engagement platform. In the longer term, he dreams of founding his own social‑enterprise that provides mentorship and scholarships
    for African‑American students pursuing higher education, and he aspires to become a spokesperson for social‑justice initiatives, using his communication skills to amplify marginalized voices.
