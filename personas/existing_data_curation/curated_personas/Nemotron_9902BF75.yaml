  career_goals: Anthony aims to transition from direct bedside care to a supervisory role as a charge nurse or unit manager within the next two years, allowing him to shape staffing and workflow policies
    that enhance nurse satisfaction and patient outcomes. He is also pursuing a clinical educator certification so he can lead in‑service training and mentorship programs. Long‑term, he envisions a part‑time
    consulting position in geriatric case management, giving him the flexibility to spend more time with his family while still contributing his expertise to the community’s aging population.
