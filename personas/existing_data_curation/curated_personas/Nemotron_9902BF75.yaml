personas:
  professional: Anthony Leidner, a seasoned bedside nurse with over thirty years of expertise in patient assessments, IV therapy, wound care, and Epic EMR navigation, blends his love of structured care
    plans with a laid‑back attitude toward shift scheduling, allowing them to calmly mentor new staff while occasionally letting paperwork slip in favor of hands‑on problem solving.
  sports: Anthony Leidner avidly follows the Orlando Magic and Tampa Bay Buccaneers, participates in a local deep‑sea fishing club that meets on weekend outings to the Gulf, and plays occasional weekend
    golf at a Kissimmee country club, balancing his love for competitive team sports with solitary fishing expeditions.
  arts: Anthony Leidner finds solace in classic rock, routinely spinning Led Zeppelin, The Rolling Stones, and The Eagles on a vintage turntable while woodworking, and spends evenings absorbed in historical
    nonfiction titles like "The Rise and Fall of the Third Reich" and the latest medical journals, which shape both his creative and professional mindsets.
  travel: Anthony Leidner prefers meticulously planned road trips to the Gulf Coast and occasional week‑long cruises to the Bahamas, yet they also enjoy spontaneous weekend getaways to nearby state parks
    such as Ocala National Forest, and they dream of a cultural immersion trip to Puerto Rico to practice conversational Spanish with local families.
  culinary: Anthony Leidner delights in cooking heirloom tomatoes into fresh Caprese salads, grilling mahi‑mahi caught on his own outings, and whipping up rustic bean soups seasoned with home‑grown basil,
    all prepared on his trusty cast‑iron skillet while classic rock plays in the background.
  core: Anthony Leidner is a practical, self‑reliant nurse who balances structured care with a love for early‑morning fishing, heirloom gardening, and classic rock, all while occasionally letting paperwork
    and budgeting slip through the cracks.
background:
  cultural: Anthony is a white American who grew up in a Midwestern suburb before relocating to Central Florida for work. He attended a Catholic high school, which fostered a sense of community service
    that carries into his nursing career. Living in Kissimmee, he regularly interacts with a diverse patient base, especially Spanish‑speaking families, and has picked up basic conversational Spanish to
    improve communication. While his core cultural identity reflects traditional American values of self‑reliance and practicality, his professional environment has broadened his appreciation for multicultural
    perspectives and inclusive care.
