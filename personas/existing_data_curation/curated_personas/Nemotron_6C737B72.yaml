  career_goals: Ethan aims to obtain his GED and pursue a certificate in museum studies or art curation, seeking a quiet, behind-the-scenes role at a local museum or historical society where he can apply
    his love for art and attention to detail. He also aspires to build a personal portfolio of sketches and photographs, eventually offering freelance illustration services that allow him to work independently.
    In the longer term, he hopes to contribute to community cultural projects, such as curating local art exhibitions or volunteering for educational programs that promote appreciation of the arts.
