  hobbies: '[''Visiting art galleries'', ''Landscape painting'', ''Reading (history, sci‑fi)'', ''Deer hunting'', ''Bass fishing'', ''Camping'', ''Woodworking'', ''Playing electric guitar'', ''Barbecue
    cooking'', ''Teaching basic computer skills at community library'']'
  career_goals: Marcus aims to progress from a plant/department manager to a regional operations director within the next five years, taking on broader responsibility for multiple sites across the state.
    He plans to earn a Project Management Professional (PMP) certification and deepen his expertise in supply chain technology to lead digital transformation initiatives. Long‑term, he hopes to mentor the
    next generation of managers, cultivating a culture of continuous improvement and high standards. He also envisions playing a pivotal role in his company's community outreach programs, aligning business
    success with local development.
