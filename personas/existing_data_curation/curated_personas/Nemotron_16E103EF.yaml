  career_goals: Although formally retired, Annie is driven by a desire to remain purpose‑filled and engaged. She aims to expand her role as a community mentor, teaching newer volunteers the art of inclusive
    event facilitation. She hopes to complete a series of lifelong‑learning courses at the local community college—particularly in gerontology and nutrition—to better support peers at the senior center.
    Annie also aspires to compile a memoir of her life experiences, emphasizing resilience, curiosity, and the importance of kindness, which she plans to share through a small local publication. Ultimately,
    her goal is to cultivate a supportive, intergenerational network in Jurupa Valley that blends cultural traditions and fosters well‑being for all ages.
