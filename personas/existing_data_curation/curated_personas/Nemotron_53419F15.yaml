  career_goals: Matthew aspires to turn his creative passions into a sustainable career. He plans to enroll in a community college or vocational program that offers training in graphic design or multimedia
    arts, aiming to become a freelance illustrator or concept artist for video games and independent publishing. He also considers an apprenticeship in carpentry or furniture design, blending his love for
    hands‑on craftsmanship with aesthetic expression. Building a strong portfolio that showcases his unique style is a priority, and he dreams of eventually operating his own modest studio where he can
    work independently while collaborating on selective projects with like‑minded creators.
