  hobbies: '["Drawing and sketching", "Digital painting", "Reading graphic novels", "Exploring art museums and galleries", "Introductory coding (Python, Scratch)", "Strategic board games with small groups",
    "Journaling", "Cooking Mexican cuisine with family", "Volunteering (tutoring younger students)", "Mindfulness and meditation"]'
  career_goals: Adolfo aspires to blend his artistic passion with technology, aiming to study graphic design and user experience (UX) design in college. He dreams of creating inclusive digital products
    that celebrate cultural diversity and help underrepresented youth express themselves. Long‑term, he hopes to work as a UX designer or community arts coordinator at a tech company or nonprofit, where
    he can mentor other teens, advocate for mental‑health awareness through creative media, and preserve Mexican cultural narratives in modern platforms.
