personas:
  professional: Alice Gannon is an emerging district‑level school psychologist who blends rigorous SPSS and R data analysis with art‑integrated therapeutic interventions, designs evidence‑based STEAM programs,
    delivers swift crisis counseling, and they leverage their organized, competitive drive to secure grant funding and mentor junior staff.
  sports: Alice Gannon is a committed weekend hiker with the Sierra Club’s Los Angeles chapter, participates in sunrise yoga at a Brentwood studio, follows the Los Angeles Lakers and LA Galaxy with fervor,
    and they squeeze in weekly pick‑up tennis matches at the local community center to keep their cardio balanced.
  arts: Alice Gannon immerses herself in Los Angeles’s vibrant art scene, regularly visiting the Getty Center and LACMA to study works by Yayoi Kusama and Jeff Koons, curates a personal photography series
    of Venice Beach street murals, and they unwind at the piano playing Debussy’s 'Clair de Lune' and Chopin nocturnes, letting music inform their therapeutic creativity.
  travel: Alice Gannon prefers meticulously planned cultural trips, having trekked the desert trails of Joshua Tree, explored the historic temples of Kyoto, wandered the souks of Marrakesh, and they are
    eyeing a solo adventure through Iceland’s volcanic landscapes for a blend of introspection and physical challenge, all while budgeting each journey through a dedicated travel spreadsheet.
  culinary: Alice Gannon enjoys experimenting in the kitchen, mastering a Mediterranean quinoa salad with feta, mint, and lemon, perfecting avocado‑lime sushi rolls, occasionally indulging in a home‑cooked
    Margherita pizza on a stone‑baked oven, and they balance these culinary pursuits with a habit of sipping artisanal coffee from a local roaster each morning, despite sometimes over‑roasting the beans.
  core: Alice Gannon is a methodical, curiosity‑driven school psychologist who fuses data‑backed STEAM interventions with art‑based therapy, balances disciplined professionalism with a competitive edge,
    and they find solace in solitary creativity through photography, piano, and carefully planned travel.
background:
  cultural: Alice is a white American who grew up in a suburban community of Southern California. Her family emphasized education, community service, and exposure to diverse cultural experiences, encouraging
    curiosity about the arts and science alike. Living in the multicultural environment of Los Angeles, she developed an appreciation for a wide range of artistic expressions and cultural perspectives while
    maintaining a pragmatic, individualistic outlook shaped by her upbringing.
attributes:
  skills: '[''Psychological assessment'', ''Individual and group counseling'', ''Crisis intervention'', ''Data analysis (SPSS, R)'', ''Program development and evaluation'', ''Special education law compliance'',
    ''Interdisciplinary collaboration'', ''Report writing and documentation'', ''Project management'', ''Art‑integrated therapeutic techniques'']'
  hobbies: '[''Contemporary art gallery visits'', ''Photography'', ''Reading psychology and philosophy'', ''Yoga'', ''Hiking Los Angeles trails'', ''Experimental cooking'', ''Playing piano'', ''Puzzle solving'',
    ''Small‑group book club'', ''Volunteering in community art‑therapy workshops'']'
  career_goals: Alice aims to become a district‑level lead psychologist, shaping a comprehensive mental‑health framework for schools across Los Angeles County. She plans to spearhead research on the efficacy
    of STEAM‑based and art‑integrated interventions, publish her findings in peer‑reviewed journals, and secure grant funding to expand these programs. Pursuing a doctorate in clinical psychology is a long‑term
    goal, as is mentorship of early‑career school psychologists and advocacy for policies that prioritize student well‑being.
