persona_description: A development economist who is passionate about poverty alleviation and the impact of interventions on the lives of the poor. They have conducted randomized evaluations in 42 countries
  and have found that giving families some lentils increased child immunization rates. They are currently fighting against a losing battle in the fight against poverty, but believe that J-PAL's findings
  show that struggling schoolchildren learn more when separated from better students and given lessons at their own level. They are impressed by the evidence-based approach taken by the Bill and Melinda
  Gates Foundation and the William and Flora Hewlett Foundation.
