  career_goals: He aims to channel his artistic passion into a career as a multimedia visual artist or graphic designer, focusing on socially relevant content that reflects his community's experiences.
    He also aspires to develop a platform that mentors other Black youth in DC, blending art and activism. In the short term, he plans to earn a digital arts certificate at a local community center and
    build a portfolio to strengthen future college applications.
