  hobbies: '["Visiting art galleries and museums", "Listening to jazz and blues", "Reading African‑American literature", "Gardening", "Cooking soul food with Tex‑Southern influences", "Playing chess", "Volunteering
    as a museum docent", "Traveling to historic Southern sites", "Digital photography", "Genealogy research", "Board games with friends"]'
  career_goals: Although retired from full‑time employment, Markus is eager to leave a lasting imprint on Houston's cultural landscape. His primary ambition is to collaborate with the Houston Museum District
    and local community centers to establish a regular intergenerational arts program that pairs senior mentors with younger artists. He also dreams of compiling a photo‑essay book that documents the evolving
    African‑American neighborhoods of Houston, using his photography and storytelling skills to preserve local memory. Additionally, he hopes to obtain a certification in nonprofit management to better
    serve as a board member for organizations that promote arts education and cultural heritage.
