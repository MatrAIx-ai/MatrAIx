personas:
  professional: Markus Lee, a retired energy engineer turned community arts advocate, blends his troubleshooting expertise and grant‑writing acumen with a calm, collaborative demeanor to coordinate intergenerational
    art workshops and serve as a museum docent, leveraging their curiosity and reliability to shape Houston's cultural landscape.
  sports: Markus Lee enjoys low‑impact fitness such as morning walks in Hermann Park, a weekly slot at the senior tennis league, and cheering for the Houston Astros and Houston Rockets, balancing social
    camaraderie at the community café with personal exercise modestly.
  arts: Markus Lee frequents the Menil Collection and the Contemporary Arts Museum, immerses themselves in live jazz at House of Blues and blues evenings at local clubs, curates a personal library of vintage
    African‑American literature, and snaps digital photographs of street murals, channeling their curious spirit into rich artistic engagement.
  travel: Markus Lee prefers carefully planned road trips to historic Southern sites like Savannah, Montgomery, and New Orleans, staying in boutique B&Bs and using a digital itinerary that intertwines heritage
    tours with spontaneous coffee stops, while keeping an eye on budget and family obligations.
  culinary: Markus Lee delights in cooking soulful Tex‑Southern dishes such as shrimp étouffée, smoked collard greens, and sweet potato pie, seasoning with Cajun paprika and fresh thyme, and while their
    culinary skill shines, they occasionally over‑salt the gumbo in their enthusiasm.
  core: Markus Lee is a curious, community‑oriented retiree who fuses engineering precision with artistic storytelling, balancing methodical planning with spontaneous creativity, and occasionally indulging
    in vintage book hunts and jazz improvisations.
background:
  cultural: Markus grew up in a close‑knit African‑American family in Houston, steeped in the rich traditions of the city's Black community. Church and church choir were central to his upbringing, fostering
    a love for gospel music that later broadened to jazz, blues, and contemporary R&B. He celebrates Southern culinary customs, especially dishes like collard greens, cornbread, and gumbo, often blending
    them with the diverse flavors of Houston's multicultural food scene. His cultural identity is shaped by a strong sense of communal responsibility, storytelling, and a celebration of resilience, values
    he carries into his volunteer work and creative endeavors.
