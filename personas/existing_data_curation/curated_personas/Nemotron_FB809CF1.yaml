  career_goals: Ronnie aims to transition from informal freelancing to a sustainable independent creative business. His short‑term goal is to launch a boutique digital illustration studio that serves indie
    game developers and book publishers. He plans to self-publish his first science-fiction novel within three years and secure gallery shows for his paintings. He also intends to develop a Patreon‑based
    community for emerging artists, generating a modest income that allows him to focus full‑time on art. Long‑term, he hopes to be recognized as a thought leader in speculative visual storytelling and
    to teach workshops on creative process and project management.
