persona_description: A political economist who specializes in the analysis of economic crises, particularly the effects of high government debt on economic growth. They are known for their critique of the
  work of Reinhart and Rogoff on high public debt and its impact on economic growth. They are critical of the use of data manipulation and have a unique perspective on the role of monetary policy in addressing
  fiscal crises. They are also interested in the implications of austerity measures in the Eurozone and their impact on the stability of the region.
