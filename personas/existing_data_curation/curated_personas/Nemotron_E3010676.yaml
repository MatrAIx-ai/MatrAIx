  hobbies: '[''Visiting galleries and street art tours'', ''Sketching and drawing'', ''Photography'', ''Listening to indie/jazz music'', ''Experimenting with Southern cooking'', ''Volunteer meal delivery
    for seniors'', ''Board games and tabletop RPGs with friends'', ''Reading nonfiction on logistics and art'', ''Spontaneous road trips'', ''Podcast listening on transportation and culture'']'
  career_goals: Kenneth aims to deepen his expertise in specialized freight by obtaining endorsements for hazardous‑materials and high‑value cargo transport, particularly art and antiques, aligning his
    professional path with his personal passion for art. In the next three years, he plans to acquire a logistics management certification and transition to a fleet supervisory role where he can mentor
    new drivers. Long‑term, he envisions launching his own boutique transport company that focuses on delicate and culturally significant shipments, supported by a bachelor's degree in Business Administration
    and a driver‑trainer certification.
