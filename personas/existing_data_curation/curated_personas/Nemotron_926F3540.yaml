personas:
  professional: Teresa Wilson is an aspiring Certified Professional Organizer who leverages their methodical planning, budgeting expertise, and community‑focused reliability to transform chaotic households
    into streamlined, harmonious spaces.
  sports: Teresa Wilson enjoys weekend walks with the Ilchester Trails Club, follows the Washington Capitals during hockey season and the Baltimore Ravens in football, and they join a co‑ed community soccer
    league on summer evenings.
  arts: Teresa Wilson finds inspiration in the folk melodies of John Denver and the piano stylings of Norah Jones, reads gardening wisdom from Monty Don and self‑help guidance from Brené Brown, and they
    regularly attend the Bethesda Fine Arts Festival to support local painters.
  travel: Teresa Wilson prefers low‑key, nature‑centric trips, having hiked Shenandoah’s Skyline Drive, spent a relaxed weekend exploring Asheville’s artsy downtown, and they day‑dream about visiting Kyoto’s
    zen gardens and the Tuscan countryside to deepen their farm‑to‑table passion.
  culinary: Teresa Wilson is a confident home cook who crafts plant‑forward meals such as quinoa‑kale salads with roasted beets, goat cheese, and lemon‑tahini dressing, regularly experiments with kimchi
    fermentation, and they delight in sourcing fresh herbs, heirloom tomatoes, and seasonal squash from the local farmers market.
  core: Teresa Wilson balances a methodical love for order with a green‑thumb curiosity, often juggling garden chores while plotting the next home‑organizing workshop, and they can’t resist buying bulk
    seed packets even when the pantry is full.
background:
  cultural: Teresa is a white American from the Mid‑Atlantic region who grew up in a suburban environment near Washington, D.C. Her upbringing emphasized community involvement, self‑reliance, and a blend
    of traditional American values with the diverse cultural offerings of Montgomery County. She enjoys local seasonal festivals, supports neighborhood initiatives, and incorporates the region’s emphasis
    on education and civic responsibility into her everyday life.
attributes:
  skills: '[''household budgeting'', ''event planning'', ''home organization'', ''basic cooking and nutrition planning'', ''gardening'', ''basic home maintenance'', ''digital literacy'', ''volunteer coordination'',
