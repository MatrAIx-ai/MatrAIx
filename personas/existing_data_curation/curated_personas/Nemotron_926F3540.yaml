  hobbies: '[''gardening'', ''home cooking'', ''DIY crafts and upcycling'', ''reading self‑help and gardening books'', ''nature walking'', ''attending farmers markets'', ''volunteering at community library'']'
  career_goals: Teresa aims to formalize her practical expertise by completing her GED within the next year and obtaining a certification as a Certified Professional Organizer (CPO). She envisions starting
    a part‑time home‑organizing consultancy that serves families in Montgomery County, while also volunteering as a community health aide at the local senior center. Her long‑term ambition is to blend her
    love of organization with community service, eventually leading workshops on efficient household management and senior caregiving.
