personas:
  professional: Adriana Correa is a budding community engagement coordinator-in-training who leverages bilingual communication, event planning, and Canva design skills, balancing her love of structure with
    a laid‑back, flexible approach to group facilitation and volunteer coordination.
  sports: Adriana Correa enjoys weekend hikes with the Sandia Mountain Trail Club, fans New Mexico United soccer and the Albuquerque Isotopes baseball team, plays pickup soccer matches with friends, and
    looks forward to winter ski trips to Taos, balancing active outdoor pursuits with relaxed game‑day spectating.
  arts: Adriana Correa expresses her artistic side through flamenco dance classes, snapping street‑level photos at local festivals, and regularly streaming Paco de Lucía guitar sessions, while also attending
    live shows by Rosalia and catching indie performances at Loni’s Place.
  travel: Adriana Correa’s travel style blends budget‑friendly backpacking to the deserts of New Mexico with cultural jaunts to Seville’s Feria de Abril and a solo road trip to Santa Fe, planning trips
    on a spreadsheet yet often improvising itinerary details on the fly.
  culinary: Adriana Correa’s kitchen showcases her skill in crafting paella Valenciana with saffron and chorizo, tortilla de patatas, and green‑chile enchiladas, mixing authentic Spanish flavors with local
    New Mexican produce like roasted chiles and corn masa, while she also enjoys casual tapas nights with friends.
  core: Adriana Correa is a socially vibrant, bilingual 24‑year‑old who blends structured event planning with a carefree love for flamenco, hikes, and spontaneous culinary experiments, all while occasionally
    misplacing receipts and forgetting to stretch.
background:
  cultural: Adriana was born to Spanish parents who relocated to Albuquerque, bringing with them rich traditions from Andalusia and central Spain. She grew up celebrating Spanish holidays such as Semana
    Santa and Día de los Reyes, speaking Spanish at home and maintaining close ties to Spanish culinary and musical customs. Living in New Mexico, she has also embraced Southwestern culture, participating
    in local fiestas, appreciating regional dishes like green chile, and engaging with the broader Hispanic community. This blend of European Spanish heritage and New Mexican influences shapes her identity,
    language fluency, and appreciation for multicultural community life.
attributes:
  skills: '["Bilingual communication (Spanish & English)", "Interpersonal and group facilitation", "Basic digital literacy (Microsoft Office, Google Workspace)", "Social media content creation", "Informal
