  hobbies: '["Flamenco dancing", "Cooking traditional Spanish dishes", "Hiking the Sandia Mountains", "Participating in local cultural festivals", "Volunteer work at community events", "Photography (landscape
    and street)", "Attending live music concerts", "Organizing game nights and casual soccer matches"]'
  career_goals: Adriana aims to pursue an associate degree in hospitality management or public administration at a community college while gaining part‑time experience in event planning or community outreach.
    Her long‑term ambition is to secure a full‑time role as a community engagement coordinator or cultural event organizer, leveraging her bilingual abilities and outgoing personality to bridge Spanish
    cultural traditions with the diverse community of Albuquerque. She also hopes to develop a side project, such as a blog or YouTube channel showcasing Spanish cooking and local New Mexican adventures.
