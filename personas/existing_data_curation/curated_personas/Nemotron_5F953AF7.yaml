    stakeholder engagement"]'
  hobbies: '["Visiting museums and art galleries (e.g., High Museum of Art)","Attending symphony concerts and theater performances","Collecting contemporary Spanish artwork","Cooking traditional Spanish
    dishes (paella, gazpacho)","Reading classic Spanish literature and art criticism","Yoga and mindfulness meditation","Gardening (lavender, rosemary)","Volunteering as treasurer for a local arts non-profit"]'
  career_goals: Claudia aims to transition from traditional corporate auditing to a senior finance leadership role within a cultural institution, such as becoming the Chief Financial Officer of a museum
    or performing arts center in Atlanta. She is pursuing a CPA designation (if not yet obtained) and enrolling in data‑analytics courses to integrate AI‑driven auditing tools into her practice. In the
    longer term, she hopes to launch a boutique consultancy that assists non‑profits with financial sustainability and grant management, while also mentoring younger accountants, especially those from underrepresented
    backgrounds. A personal ambition is to establish a scholarship fund for Spanish‑heritage students pursuing arts‑related studies, leaving a lasting legacy that bridges her professional expertise and
    cultural passion.
