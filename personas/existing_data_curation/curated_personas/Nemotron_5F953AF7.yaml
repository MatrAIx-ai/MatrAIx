personas:
  professional: Claudia Santiago, a seasoned accountant and auditor fluent in both GAAP and IFRS, merges their meticulous financial acumen with a lifelong curiosity for the arts, eagerly experiments with
    AI‑driven auditing tools to challenge conventional practice, guides non‑profit budgets, develops data‑driven audit strategies using Power BI, and positions themselves for a future CFO role at an Atlanta
    museum.
  sports: Claudia Santiago, a low‑impact fitness enthusiast who plays weekly tennis at the Brookhaven Country Club, follows the Atlanta Hawks in basketball and the Atlanta United in soccer, attends occasional
    Pilates classes, and maintains a disciplined routine of sunrise walks through Piedmont Park to manage stress and stay active, often reminding themselves to stay hydrated.
  arts: Claudia Santiago, an avid patron of the High Museum and the Atlanta Symphony Orchestra, curates a personal collection of contemporary Spanish painters such as Aitor Toledo and Jorge Oteiza, devotes
    evenings to dissecting art criticism by Rosalind Krauss, and draws inspiration from the works of Pablo Picasso, Salvador Dalí, and guitarist Paco de Lucía, while they occasionally skip a gallery opening
    due to lingering worries about deadlines.
  travel: Claudia Santiago, a culturally curious traveler who annually spends a week exploring European art capitals like Barcelona, Seville, and Florence, enjoys weekend getaways to the Blue Ridge Mountains,
    and dreams of a quiet retreat in Kyoto’s historic Gion district, often planning trips around museum exhibition openings while they balance a modest travel budget.
  culinary: Claudia Santiago, an enthusiastic home chef who perfects traditional Andalusian dishes such as gazpacho, paella with saffron and rosemary, and jamón ibérico, frequently pairs meals with sherry
    or Rioja, and they occasionally over‑salt the paella in an attempt to replicate restaurant flavors for their intimate dinner gatherings.
  core: Claudia Santiago, a meticulous yet quietly anxious accountant whose days blend financial spreadsheets, yoga breaths, and art‑filled evenings, often worries about budget margins while they nurture
    a thriving garden of lavender and rosemary and host soulful dinner parties that double as cultural salons.
background:
  cultural: Born and raised in Madrid, Claudia grew up immersed in Spain’s rich artistic heritage, from the works of Goya to the rhythms of flamenco. Her family emphasized the importance of cultural celebration,
    storytelling, and community, values she carries into her life in Atlanta. While she has fully embraced Southern hospitality and the vibrant multicultural scene of Cobb County, she still observes Spanish
    customs—celebrating Semana Santa, enjoying tapas evenings, and speaking Spanish at home. As a member of the Spanish‑American Chamber of Commerce and the local Hispanic cultural association, she actively
    promotes cultural exchange, teaching Spanish language workshops and organizing art‑focused community events that blend her Spanish roots with her American surroundings.
attributes:
  skills: '["GAAP and IFRS financial reporting","Tax compliance and planning","Audit planning and risk assessment","Internal controls and SOX compliance","Non-profit financial management","Grant accounting
