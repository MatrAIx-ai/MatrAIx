personas:
  professional: Heather Whitlow, an operations research statistician with deep expertise in linear and integer programming, uses her analytical rigor to craft decision‑support tools for public‑sector logistics
    while balancing her love of structure with occasional spontaneous project pivots, and she translates complex model outputs into clear recommendations that reflect her compassionate drive to serve underserved
    communities.
  sports: Heather Whitlow, an avid yoga practitioner and weekend trail walker, follows the Carolina Panthers (NFL) and Charlotte Hornets (NBA) for a touch of local sports excitement, and she is a member
    of a modest women’s walking club that meets at the Sumter Riverwalk, using those outings as both exercise and reflective time.
  arts: Heather Whitlow, a devoted reader of contemporary fiction by authors such as Celeste Ng and Ann Patchett, enjoys the calming piano works of Ludovico Einaudi, the soulful voice of Adele, and the
    Southern storytelling of Hozier, and she attends occasional local theater productions of classic plays, all of which nourish her quiet creative spirit.
  travel: Heather Whitlow, a weekend road‑trip enthusiast, prefers short drives to nearby nature escapes like the Congaree National Park, the Blue Ridge Parkway, and the historic streets of Charleston,
    while dreaming of a low‑key cultural immersion in Kyoto’s Zen gardens once she secures enough savings for an extended, anxiety‑free stay.
  culinary: Heather Whitlow, a home‑cook of Southern comfort dishes, expertly prepares low‑sugar shrimp and grits, roasted tomato‑basil soup using her garden’s heirloom tomatoes, and a lightly sweetened
    peach cobbler with rolled oats, favoring ingredients such as fresh basil, rosemary, garlic, and locally sourced squash.
  core: Heather Whitlow, a puzzle‑solving, garden‑tending analyst with a compassionate heart and a habit of overthinking, balances her love of structure with whimsical spurts of spontaneity, all while managing
    a persistent undercurrent of anxiety.
background:
  cultural: Heather grew up in a middle-class family in Sumter, South Carolina, where the rhythms of Southern life emphasized community, hospitality, and modesty. Her upbringing included regular church
    attendance at a local Baptist congregation, which reinforced values of service and cooperation. The region’s agricultural heritage and close-knit neighborhoods shaped her appreciation for self-sufficiency,
    gardening, and supporting local initiatives. While identifying as white, she is keenly aware of the diverse cultural tapestry of Sumter County, including the histories of African-American and Gullah
    communities, and she strives to honor that diversity through inclusive community engagement and equitable data practices.
attributes:
  skills: '[''Mathematical modeling'', ''Linear programming'', ''Integer programming'', ''Stochastic simulation'', ''Statistical analysis'', ''Python (pandas, NumPy, SciPy)'', ''R programming'', ''Data
