  hobbies: '[''Logic puzzles (Sudoku, crosswords)'', ''Reading (fiction, mindfulness)'', ''Gardening (vegetable garden)'', ''Yoga and meditation'', ''Volunteer work at local food pantry'', ''Cooking Southern
    cuisine'', ''Weekend nature walks'', ''Small book club participation'']'
  career_goals: Heather aims to leverage her analytical rigor to lead strategic initiatives that improve public health and social services in her region. She aspires to become a senior analytics manager
    or director within a county government or nonprofit, focusing on projects that enhance resource allocation for underserved populations. She is also driven to mentor young women in STEM, develop inclusive
    analytics practices, and create a work environment that values mental well-being. Additionally, she hopes to earn a professional certification such as the INFORMS Certified Analytics Professional and
    publish case studies on ethically-informed operations research.
