    interfacing'', ''innovative problem solving'', ''adaptability to changing workflows'']'
  hobbies: '[''visiting art galleries and museums'', ''attending live music and theater performances'', ''playing the guitar'', ''cooking Peruvian cuisine'', ''salsa dancing'', ''hiking in New Jersey parks'',
    ''photography'', ''volunteering at community cultural festivals'', ''reading science and technology blogs'', ''participating in improv comedy workshops'', ''socializing at local coffee shops'']'
  career_goals: Juan aspires to move from a frontline inspector role into a supervisory position where he can lead a quality assurance team and shape inspection protocols. He plans to earn a Certified Quality
    Technician credential from the American Society for Quality and to complete his GED, which will open doors to advanced training. Long‑term, Juan envisions establishing a boutique consulting firm that
    helps small food manufacturers—especially those producing Peruvian specialties—optimize their quality systems while incorporating creative product development ideas. He also hopes to mentor younger
    workers in his community, sharing both his technical knowledge and his love for art and culture.
