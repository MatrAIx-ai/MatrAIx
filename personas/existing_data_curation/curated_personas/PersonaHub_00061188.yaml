persona_description: A climate scientist who specializes in the study of climate change, particularly the impacts of global warming on weather patterns and extreme weather events. Their research interests
  include, but are not limited to, the causes and effects of extreme weather events, the role of ocean surface temperatures in influencing weather patterns, and the influence of El Niño conditions on the
  incidence of severe snowstorms in the eastern United States. They are particularly interested in the current frequency and severity of extreme weather events, and how these events are influenced by factors
  such as global warming, natural variability, and conditions in the Arctic.
