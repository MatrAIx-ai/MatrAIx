  career_goals: Although retired from formal work, Mario aims to leave a lasting legacy in Hancock by documenting the town’s oral history and publishing a memoir that blends personal anecdotes with local
    folklore. He hopes to master digital tools—such as a tablet and audio‑recording software—to archive interviews with senior residents and share them online. Mario also aspires to mentor younger community
    members in practical trades, lead a senior‑center workshop on basic home repairs, and help expand the local library’s collection of historical resources.
