persona_description: A scientist at NASA's Goddard Space Flight Center, Dr. Alexander Kashlinsky, who specializes in the study of astrophysics and the origin of the universe. He is a co-author on two reports
  to appear in the Astrophysical Journal Letters, leading the team that has followed up on the initial observation presented in Nature in November 2005. His work focuses on the observation and study of
  cosmic infrared background, the earliest light from the universe, and the formation of the first stars and mini-galaxies.
