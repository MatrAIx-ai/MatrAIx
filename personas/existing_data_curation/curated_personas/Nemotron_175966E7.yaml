personas:
  professional: Dep Vellanki, a detail‑oriented warehouse operative skilled in forklift operation, precise inventory tracking, and OSHA compliance, leverages their preference for structure and assertive
    cooperation to lead a small team while they pursue a shift‑supervisor role.
  sports: Dep Vellanki, who enjoys daily walks in the local park and participates in the Sunrise Senior Walkers Club, follows the New York Knicks for basketball and New York City FC for soccer, and they
    occasionally play badminton at the community YMCA during the winter months, balancing low‑impact activity with enthusiastic fandom.
  arts: Dep Vellanki, an avid listener of Carnatic violinist L. Subramaniam and classical vocalist M. Balamuralikrishna, often attends local Indian classical music recitals and they cherish the intricate
    ragas that echo their desire for order, while also enjoying occasional Tamil cinema classics starring Kamal Haasan.
  travel: Dep Vellanki, who prefers meticulously planned weekend getaways, has explored the seaside town of Asbury Park, the historic streets of Williamsburg, and dreams of visiting the temple city of Madurai
    to draw culinary inspiration, and they balance a modest travel budget with a love for cultural immersion.
  culinary: Dep Vellanki, a skilled home cook specializing in idli, dosa, sambar, and coconut chutney, frequently experiments with mustard seeds, curry leaves, and tamarind to perfect regional spice blends,
    and they delight in sharing elaborate brunches with close friends while occasionally treating themselves to a gourmet Indian restaurant experience.
  core: Dep Vellanki, a methodical planner who channels their love of order into precise warehouse logistics, yet frequently forgets to water potted plants until the last minute, and they reveal a paradox
    of precision and occasional neglect.
background:
  cultural: Dep belongs to the South Asian (Indian) diaspora, specifically of Telugu heritage, and has lived in New Jersey for most of her adult life. Her family places strong emphasis on respect for elders,
    community support, and the observance of Hindu festivals such as Sankranti and Diwali. Growing up in a multicultural suburb, she navigated both Indian cultural practices and American norms, shaping
    a pragmatic and adaptable outlook. Her bilingual ability, devotion to family gatherings, and love of traditional cuisine reflect her cultural roots while her professional life demonstrates the integration
    of immigrant work ethic into the U.S. logistics sector.
attributes:
  skills: '[''material handling'', ''forklift operation'', ''inventory management'', ''OSHA safety compliance'', ''team coordination'', ''time management'', ''basic computer skills (inventory software)'',
