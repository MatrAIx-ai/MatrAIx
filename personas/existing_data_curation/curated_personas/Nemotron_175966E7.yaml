  hobbies: '[''traditional cooking'', ''gardening'', ''reading contemporary fiction'', ''classical Indian music'', ''walking'', ''temple volunteer work'', ''knitting'']'
  career_goals: Looking ahead, Dep aims to transition from a front‑line laborer to a supervisory or lead role within the warehouse. She plans to obtain a certified forklift operator credential and complete
    an OSHA 30‑hour safety course, positioning herself for a shift‑supervisor or logistics‑coordinator position. Her long‑term ambition is to secure a steady income that supports her family’s future, contribute
    to a safe and efficiently organized workplace, and eventually retire with the option to start a small home‑based catering service featuring South Indian cuisine.
