  career_goals: Amy aims to transition into a senior leadership position within the purchasing and supply chain domain, such as Director of Strategic Sourcing or Vice President of Merchandise Planning.
    She is passionate about integrating sustainable and ethically sourced products into mainstream retail assortments, and she aspires to champion data‑driven purchasing practices that reduce waste and
    improve profitability. Over the next five years, she plans to mentor emerging buyers, spearhead a cross‑functional initiative to incorporate emerging technologies (e.g., AI forecasting) into her organization,
    and eventually consult for boutique retailers seeking to blend artistic novelty with commercial viability.
