  career_goals: Short‑term, William aims to earn his GED within the next year and enroll in Riverside Community College’s associate program in graphic design, building a professional portfolio through freelance
    commissions for local businesses and community events. Long‑term, he aspires to become a creative director or art curator who not only produces compelling visual content but also designs and leads community
    art programs, curating exhibitions that highlight the diverse voices of the Inland Empire. He hopes to eventually open a collaborative art space that offers workshops and mentorship for at‑risk youth,
    merging his organizational strengths with his passion for art and community empowerment.
