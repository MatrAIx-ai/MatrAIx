personas:
  professional: William Miller, a 17‑year‑old self‑taught digital illustrator in Riverside, blends meticulous Photoshop and GIMP skills with an organizer’s mindset to lead the school art club’s events,
    coordinate community workshops, and take on freelance commissions for local cafés, all while satisfying a curious appetite for experimenting with mixed media and bold visual narratives.
  sports: William Miller, 17, spends weekends at the Riverside Skate Park with the local skate club, plays pickup basketball at the community center while rooting for the Los Angeles Lakers and LA Galaxy,
    and follows a weekly routine of street‑ball drills and hill‑climb skate sessions, though they occasionally skip practice to finish school projects.
  arts: William Miller, an avid visitor of the Riverside Art Museum, draws creative fuel from the murals of Shepard Fairey, the graphic storytelling of Alison Bechdel, and the indie sounds of Tame Impala
    and Arcade Fire, while attending live shows by the local band The Latest and volunteering at community art workshops that celebrate diverse voices.
  travel: William Miller dreams of a summer road‑trip to Portland’s vibrant street‑art districts after school breaks spent exploring San Diego’s boardwalk, a weekend art‑gallery crawl in Los Angeles, and
    a future study‑abroad semester in Tokyo to absorb manga culture and Japanese design aesthetics.
  culinary: William Miller enjoys late‑night slices of pepperoni pizza after marathon sketching sessions, delights in homemade spicy tuna tacos topped with avocado and pickled red onion, and experiments
    with matcha‑green‑tea ice cream baked into churros, yet often forgets to eat balanced meals, relying heavily on coffee and energy drinks.
  core: William Miller, 17, is a curiosity‑driven digital artist who balances methodical planning with spontaneous skate sessions, a habit of worrying over deadlines, and a relentless drive to turn community
    art into a career.
background:
  cultural: William is a second‑generation white American with mixed German and Irish ancestry, raised in Riverside, California. The city’s diverse makeup blends suburban Southern‑California life with a
    strong Hispanic presence, exposing him to multicultural art, music, and cuisine. His family values hard work and practicality, yet his frequent visits to the Riverside Art Museum, local murals, and
    the annual Riverside Festival have nurtured an appreciation for varied artistic expressions. He celebrates typical American holidays, enjoys regional foods such as Mexican‑American tacos and fresh produce
    from the farmer’s market, and participates in community events like the Riverside Parade. This mix of suburban Californian lifestyle, local Latino influences, and modest working‑class roots shapes his
    worldview and artistic sensibility.
