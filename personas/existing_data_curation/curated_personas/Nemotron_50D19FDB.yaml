personas:
  professional: Alexander Mcclain, an aspiring shipyard engineer who builds LEGO boats and sandcastles, blends curiosity about how things float with practical step-by-step planning, organizes his play area
    meticulously yet stays flexible enough to improvise when a castle collapses.
  sports: Alexander Mcclain enjoys swimming lessons at the community pool, plays T-ball in the local Little League, and cheers for the Norfolk Tides during summer while also attending the church-run soccer
    club, balancing a competitive drive to win home runs with a love for teamwork and frequent beach runs along Virginia Beach.
  arts: Alexander Mcclain delights in watching Disney's Frozen, singing along to Taylor Swift's Shake It Off, and drawing cartoons inspired by SpongeBob SquarePants and Mickey Mouse, turning his bedroom
    wall into a vibrant gallery that reflects his blend of curiosity and practicality.
  travel: Alexander Mcclain prefers family road trips to nearby beach destinations like Virginia Beach and the Naval Station Norfolk Museum, yet dreams of a future adventure to Disney World in Orlando and
    a summer camp at the Outer Banks, planning each outing with a simple checklist of sunscreen, snacks, and shells to collect.
  culinary: Alexander Mcclain favors chicken tenders with honey mustard, creamy mac & cheese sprinkled with extra cheddar, and banana slices spread with peanut butter, and when allowed to help, they stir
    the pot with a wooden spoon and proudly arrange food on plates, though they often forget to wash their hands afterward.
  core: Alexander Mcclain is a curious, competitively spirited five-year-old who balances organized play with spontaneous imagination, often questioning others' motives while delighting in beach outings,
    fireworks, and dinosaur puzzles.
background:
  cultural: Alexander is raised in a middle-class white family in Norfolk, Virginia. His community is shaped by the Naval base, giving him exposure to maritime traditions, such as beach outings and local
    shipyard tours. He celebrates regional customs like Fourth of July fireworks and enjoys Southern comfort foods like chicken tenders and mac & cheese. Family gatherings often include church attendance
    and community events, reinforcing a blend of Southern hospitality and a modest, practical outlook.
