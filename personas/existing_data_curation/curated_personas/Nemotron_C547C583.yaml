personas:
  professional: London Taylor, an aspiring digital animator, combines their methodical planning with a boundless curiosity for storytelling, creating Scratch animations that blend fantasy narratives with
    vibrant watercolor aesthetics.
  sports: London Taylor plays midfield for the Indio Soccer Club’s U12 team, trains three times a week, cheers for the LA Galaxy and Los Angeles Lakers, and approaches fitness with energetic group drills
    and disciplined conditioning routines.
  arts: London Taylor, a budding watercolor painter and theater enthusiast, draws inspiration from Hayao Miyazaki’s films, the music of Billie Eilish, and the choreography of hip‑hop crew The Jabbawockees,
    weaving these influences into school productions and digital Scratch animations.
  travel: London Taylor, who plans weekend hikes in the desert trails surrounding Indio with a hand‑drawn map, has visited Joshua Tree National Park, dreams of exploring Tokyo’s anime districts, and balances
    family trips to Disneyland with school‑approved day trips to the Grand Canyon.
  culinary: London Taylor enjoys cooking family chicken enchiladas and lemon herb rice, experiments with smoothie bowls featuring banana, strawberries, and almond milk, and favours taco al pastor with fresh
    cilantro, all while proudly presenting their creations to friends after school.
  core: London Taylor is a curious, organized 11‑year‑old whose endless doodles, love of fantasy worlds, and habit of over‑packing a snack for every adventure make every day a vibrant blend of art, sport,
    and discovery.
background:
  cultural: London is a second‑generation African‑American raised in the multicultural desert city of Indio, California. Her family has deep roots in the African‑American community of the Greater Palm Springs
    area, where they maintain traditions such as celebrating Juneteenth, Kwanzaa, and family reunions centered around music, storytelling, and soul food. Growing up amid the diverse populations of the Coachella
    Valley, she also experiences strong Hispanic influences, often hearing Spanish at community events and taking part in bilingual after‑school classes. The annual Coachella Valley Music and Arts Festival
    and local art fairs have nurtured her appreciation for varied artistic expressions. Her mother’s involvement in church choirs and community service taught her the value of giving back, while her father’s
    interest in technology sparked her early exposure to coding. This blend of African‑American heritage, Southwestern multiculturalism, and a supportive family environment shapes her identity and worldview.
