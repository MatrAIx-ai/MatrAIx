  hobbies: '["Drawing and sketching","Watercolor painting","Digital animation with Scratch","Reading fantasy and science‑fiction novels","Playing soccer","School theater and drama","Hip‑hop dance classes","Hiking
    local desert trails","Cooking family recipes","Attending community festivals and Coachella events","Mentoring younger students in after‑school program"]'
  career_goals: London dreams of blending her love for art and technology into a career as a multimedia storyteller—perhaps as a video‑game designer, digital illustrator, or interactive media creator who
    celebrates diverse cultures. She hopes to attend a high‑school arts magnet program to deepen her drawing, animation, and coding skills, then study graphic design and environmental communication at college.
    In the long term she envisions leading community workshops that empower other young people, especially girls of color, to explore STEAM projects, and she aspires to travel internationally to learn artistic
    traditions and incorporate them into her own work.
