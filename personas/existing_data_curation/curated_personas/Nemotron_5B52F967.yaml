  career_goals: Chelsey’s career ambition is to move into senior technical leadership, such as a lead architect or engineering manager, where she can shape the design of reliable, secure, and maintainable
    software systems. She seeks to mentor junior engineers and integrate data‑driven decision making into product strategy, balancing innovative ideas with pragmatic execution. Long‑term, she aspires to
    become a chief technology officer at a mid‑size technology firm, focusing on sustainable growth while preserving a healthy work‑life balance to manage her sensitivity to stress.
