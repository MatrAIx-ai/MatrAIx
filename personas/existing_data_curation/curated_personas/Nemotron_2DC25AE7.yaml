  career_goals: He dreams of becoming a children's book illustrator or an animator who can blend visual storytelling with interactive media, eventually using his art to help other kids cope with anxiety.
    He hopes to study fine arts and possibly art therapy in college, and to create community workshops that combine creativity and emotional support. He also aims to develop an online platform for young
    artists to share their work and receive encouragement.
