  hobbies: '[''Puzzle solving (Sudoku, crosswords)'', ''Reading (science‑fiction, medical non‑fiction)'', ''Gardening (vegetable garden)'', ''Cooking and recipe experimentation'', ''Hiking local trails'',
    ''Small‑group book‑exchange club'']'
  career_goals: Trinity aims to advance her clinical expertise while maintaining flexibility. In the next two years she plans to earn a certification in critical care nursing (CCRN) and to lead a unit‑based
    quality‑improvement project on sepsis protocols. Over the longer term, she aspires to complete a Master’s in Nursing with a focus on health informatics, positioning herself for a role as a nurse manager
    or clinical informatics specialist. She envisions eventually consulting for small community hospitals to streamline workflow and implement evidence‑based practices, allowing her to merge her competitive
    drive with her curiosity for emerging technologies.
