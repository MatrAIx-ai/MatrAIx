persona_description: A scientist and researcher who specializes in proton physics and technology, particularly in the development of new, more economical means of producing proton beams and the use of beams
  of carbon ions in cancer therapy. They have expertise in laser-driven proton acceleration, proton computed tomography, and the use of beams of anti-protons in cancer therapy. They have experience in designing
  and building proton therapy machines and detectors, as well as developing advanced computer algorithms for extracting images from measured data. They have published numerous papers and presented their
  work at scientific conferences.
