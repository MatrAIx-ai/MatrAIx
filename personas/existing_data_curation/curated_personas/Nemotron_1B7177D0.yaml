  hobbies: '[''Cricket (watching and playing)'', ''Cooking Gujarati cuisine'', ''Attending temple festivals (Diwali, Navratri)'', ''Fishing at Lake San Marcos'', ''Gardening (vegetable patch)'', ''Walking
    the San Marcos River trail'', ''Watching classic American movies'', ''Listening to Bollywood music'', ''Volunteering at local community events'']'
  career_goals: Gaurav aims to secure a stable, predictable income stream as he approaches retirement, with a focus on reducing workplace stress. In the next two years he plans to obtain an owner-operator
    permit for his own small trucking business, allowing him to set his own schedule while leveraging his deep knowledge of local routes. He also wants to improve his safety record to qualify for higher
    pay tiers, and to mentor younger drivers so his expertise can be passed on. If the owner-operator path proves too demanding, he would consider transitioning to a sales or dispatch role within a logistics
    company to gain a steadier routine and health benefits.
