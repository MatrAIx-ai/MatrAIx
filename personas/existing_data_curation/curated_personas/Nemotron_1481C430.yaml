  career_goals: Although no longer employed full‑time, Joshua aims to stay intellectually engaged by mentoring small‑business owners and serving on the boards of local charitable organizations. He is interested
    in contributing his financial expertise to community development projects, learning basic digital photography to document his outdoor excursions, and maintaining a healthy lifestyle that supports his
    active retirement. He also hopes to travel with his wife to modest, culturally rich destinations that offer both structure (planned itineraries) and the flexibility to explore at their own pace.
