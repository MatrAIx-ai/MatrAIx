personas:
  professional: Francisca Burgos, a senior aerospace engineer specializing in aerodynamics, propulsion analysis, and structural mechanics, translates their balanced curiosity and practicality into projects
    that combine rigorous CFD and FEA with hands‑on model‑rocket experiments, while their organized yet flexible project‑management style lets them pivot quickly without sacrificing reliability.
  sports: Francisca Burgos fuels fitness through weekend hikes in the Angeles National Forest, anchors a neighborhood soccer team that competes in a local league, and roots for the Los Angeles Galaxy and
    Dodgers, balancing competitive play with the relaxed cadence of trail walking.
  arts: Francisca Burgos channels creative energy into acoustic‑guitar sessions featuring songs by José González and John Prine at family gatherings, captures twilight shots of the Los Angeles skyline inspired
    by Ansel Adams’ composition, and indulges in sci‑fi literature from Isaac Asimov and recent aerospace journals, weaving artistic appreciation into their technical world.
  travel: Francisca Burgos favors meticulously planned trips that blend aerospace fascination with cultural immersion, having explored the Atacama Desert’s observatories in Chile, the historic launch sites
    at Cape Canaveral, and the vibrant street markets of Oaxaca, while dreaming of a future photo‑expedition to Reykjavik’s aurora‑lit skies and a pilgrimage to the European Space Agency’s research campus
    in the Netherlands.
  culinary: Francisca Burgos enjoys preparing traditional dishes like baleadas and sopa de caracol, mastering the perfect balance of refried beans, cheese, and plantain‑based flour for the former, while
    also crafting modern tacos with cilantro, lime, and smoked paprika chicken, demonstrating a moderate cooking skill that blends heritage flavors with contemporary twists.
  core: Francisca Burgos is a pragmatic aerospace leader who balances rocket‑building hobbyism with community mentorship, navigates financial risks with disciplined investing, and occasionally lets coffee‑fueled
    perfectionism delay mundane tasks.
background:
  cultural: Francisca is a first‑generation American of Honduran descent. Raised in a bilingual household, he grew up speaking Spanish at home while navigating American schools, giving him a bicultural
    perspective that blends Honduran familial closeness with the individualistic drive common in U.S. professional life. His family maintains strong ties to their heritage, celebrating Honduran Independence
    Day (September 15) and Semana Santa with traditional foods, music, and community gatherings in the Greater Los Angeles area. He is active in the local Honduran-American Association, where he volunteers
    to organize cultural events and supports youth programs that introduce STEM concepts to Hispanic students. This cultural grounding informs his compassionate approach to mentorship and his ambition to
    increase Latino representation in aerospace engineering.
