  hobbies: '[''Model rocketry'', ''Drone piloting'', ''Hiking'', ''Cooking Honduran cuisine'', ''Soccer'', ''Reading science fiction'', ''STEM mentorship volunteering'', ''Acoustic guitar playing'', ''Photography
    of cityscapes'', ''Attending aerospace documentaries'']'
  career_goals: Francisca aims to transition into a senior leadership role, such as Director of Engineering, where he can steer large‑scale space launch or satellite projects from concept through flight
    operations. He is passionate about advancing sustainable aerospace technologies, particularly electric or hybrid propulsion systems, and hopes to spearhead research initiatives that reduce carbon footprints
    of launch vehicles. Additionally, he seeks to champion diversity in the aerospace sector by establishing mentorship pipelines for Latino students and professionals, partnering with local schools and
    community organizations. Long‑term, he envisions launching a boutique consulting firm that offers expertise in systems integration and regulatory compliance for emerging space startups while continuing
    to contribute to flagship missions at major aerospace contractors.
