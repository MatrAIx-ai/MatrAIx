  career_goals: Erika dreams of a future where she can combine her love for learning, her caring nature, and her practical mindset. In the short term, she aims to finish middle school with strong grades,
    join the school’s robotics and science clubs, and continue volunteering as a peer mediator. She envisions herself eventually becoming an elementary school teacher or a pediatric nurse, careers that
    allow her to support children’s growth and health while using her organizational talents and bilingual abilities. Erika also hopes to pursue a college degree in education or health sciences, and she
    wants to give back to her Pasadena community by mentoring younger students and promoting cultural pride.
