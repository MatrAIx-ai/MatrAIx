personas:
  professional: Erika Hernandez is an 11‑year‑old budding STEM enthusiast who blends their curiosity and methodical planning into leading their school’s science club experiments while also coordinating
    soccer drills and Folklorico rehearsals, demonstrating early leadership and teamwork.
  sports: Erika Hernandez plays forward for Lincoln Middle School’s soccer team, trains with the community’s Lincoln Lions youth soccer club, and follows the city’s MLS franchise, the Lincoln Capitals,
    cheering them on during the spring season while also enjoying weekend pick‑up games at the local park.
  arts: Erika Hernandez fuels their artistic side by devouring Agatha Christie mystery novels and Marvel graphic comics, painting vibrant acrylics inspired by Frida Kahlo and Vincent van Gogh, practicing
    Folklorico dance steps to the lively rhythms of the traditional folk ensemble 'Harmony Circle', and singing in school choir renditions of Lin‑Manuel Miranda’s songs from ‘Hamilton.’
  travel: Erika Hernandez loves family road trips to the Grand Canyon, summer beach vacations in Destin, Florida, and dreams of exploring the ancient ruins of Machu Picchu in Peru and wandering the colorful
    streets of Barcelona, Spain, always planning their itineraries with careful checklists to ease their worry about missing out.
  culinary: Erika Hernandez enjoys assisting their grandmother in the kitchen, skillfully rolling homemade quesadillas filled with cheese, chicken, and fresh cilantro, baking perfectly chewy chocolate‑chip
    cookies, and experimenting with a strawberry‑lime salsa, all while proudly sharing their creations with friends after school.
  core: Erika Hernandez is a curious, organized whirlwind who balances a love for science experiments and team sports with a lingering worry that often leads them to double‑check homework, snack portions,
    and soccer strategies, while secretly hoarding extra glitter for spontaneous bracelet projects.
background:
  cultural: Erika grew up in a Mexican‑American household in Pasadena, Texas, where both Spanish and English are spoken daily. Family gatherings revolve around celebrations like Día de los Muertos, Christmas
    posadas, and traditional Mexican holidays, reinforcing cultural values of community, respect, and hospitality. Her parents emphasize the importance of education and bilingualism, and she regularly attends
    a local community center that offers Mexican dance, cooking classes, and cultural festivals. This rich cultural environment shapes her identity, fostering pride in her heritage while encouraging her
    to share it with peers through school projects and community events.
