  skills: '[''Structural Analysis'', ''Finite-Element Modeling'', ''AutoCAD'', ''Revit'', ''MATLAB'', ''Python'', ''Project Planning'', ''Risk Assessment'', ''Technical Writing'', ''Data Analysis'']'
  hobbies: '[''Woodworking'', ''Model Bridge Building'', ''Astronomy'', ''Reading Scientific Biographies'', ''Crossword Puzzles'', ''Sudoku'', ''Vegetable Gardening'', ''Fishing'']'
  career_goals: Although retired, Michael aims to channel his expertise into mentorship and knowledge preservation. He plans to author a practical guide on residential structural safety, contribute occasional
    pro-bono consulting for community building projects, and serve as a technical mentor for a local high-school robotics club. He also hopes to complete a personal project—designing and constructing a
    solar-powered, energy-efficient workshop on his property—to demonstrate the integration of modern sustainability principles with classic engineering methods.
