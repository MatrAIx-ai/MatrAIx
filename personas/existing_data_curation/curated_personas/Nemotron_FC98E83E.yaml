  career_goals: Thomas aims to remain an active contributor to his community by offering part‑time workshops at the local senior center on home safety, budgeting, and basic repairs. He is interested in
    turning his woodworking hobby into a modest side venture, creating custom furniture and birdhouses for friends and local markets. Maintaining his health, independence, and social connections are central
    to his long‑term goals, as is leaving a legacy of practical knowledge for younger neighbors and volunteer groups.
