  career_goals: Sheri dreams of turning her love of art and nature into a future career as a wildlife illustrator or a scientist who can bring her discoveries to life through drawings. She hopes to win
    a school science fair, become a champion in her local art competition, and one day study at a university where she can combine research with creative illustration. Her competitive streak fuels her ambition
    to be recognized for her unique ideas and artistic style.
