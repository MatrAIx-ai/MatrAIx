  hobbies: '[''Watercolor painting'', ''Reading historical fiction and art journals'', ''Gardening (heirloom vegetables, native flowers)'', ''Genealogy research'', ''Birdwatching'', ''Knitting and quilting'',
    ''Volunteer coordination at senior center'', ''Attending community theater'']'
  career_goals: Although retired, Norma aims to leave a lasting imprint on her community. She intends to compile a memoir and a family genealogy book, and to create a traveling exhibition of senior‑crafted
    artworks for local schools. She aspires to become a docent at the Warren County Historical Museum, sharing stories of the county’s past. Maintaining her health and independence remains a priority, and
    she hopes to complete a series of watercolor landscapes that capture the changing seasons of rural Ohio. Additionally, she seeks to champion senior voices within the town council’s advisory committee.
