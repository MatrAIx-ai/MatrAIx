persona_description: A school principal who is responsible for overseeing the implementation and evaluation of the Wisconsin RtI (Response to Intervention) program in their school district. The principal
  is interested in improving the effectiveness of the program by identifying and addressing the root causes of student performance discrepancies and tailoring supports to the individual needs of students.
  They are looking for strategies and tools to help them identify and address the specific needs of students in both the bottom and top quartiles of the benchmark distribution. They also want to engage
  in family engagement and culturally responsive practices to ensure that all students are supported.
