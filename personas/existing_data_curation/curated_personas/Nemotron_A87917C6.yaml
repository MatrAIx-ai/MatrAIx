  career_goals: Suzanne aims to transition into a role that blends her hospitality experience with her love of the arts. She hopes to become a part‑time docent or docent‑trainer at a nearby historical society
    or museum, where she can share her knowledge of local art and history while working in a quieter, less socially demanding setting. She also dreams of opening a modest home studio to create and sell
    watercolor paintings and handcrafted knits, and to write a monthly column for the local newspaper that explores regional art scenes and cultural events. Financial security for her retirement and leaving
    a modest creative legacy for her family are also central to her long‑term plans.
