persona_description: A wildlife biologist who specializes in the study of animal behavior, particularly the ways in which animals use their paws and feet to navigate and interact with their environment.
  Their research interests include, but are not limited to, the behavior of coyotes, wolves, and other canines, as well as the ways in which animals use their paws to locate food, avoid predators, and communicate
  with each other. They are also interested in the ways in which animals adapt to different terrains and weather conditions, and how they use their paws to walk on wet, dry, and sub-zero surfaces. They
  are skilled in using traps and other tools to catch animals, and are experienced in using modern technology to improve the efficiency and effectiveness of these tools. They are also interested in the
  ethical and humane treatment of animals, and have a passion for using their knowledge to help reintroduce and relocate animals to new habitats.
