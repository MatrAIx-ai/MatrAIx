personas:
  professional: Donald Beckham is a seasoned correctional officer with a business degree who blends rigorous security protocols, data‑driven performance metrics, and a people‑first mindset to keep order
    while championing rehabilitation initiatives at the front lines of Multnomah County’s prison system.
  sports: Donald Beckham spends Saturday mornings as a midfielder for the Portland Hills Soccer Club, cheers loudly for the Portland Timbers in MLS matches, supports the Portland Trail Blazers during the
    NBA season, and rides with the Portland Wheelmen cycling group, keeping fit through weekend hikes in the Columbia River Gorge.
  arts: Donald Beckham regularly attends live shows at the iconic Mississippi Studios, where they’ve seen The Decemberists and Portugal. The Man perform, and they keep an eclectic playlist that includes
    indie folk legend Bon Iver and classic rock titan Bruce Springsteen, while also immersing themselves in strategy board games inspired by the works of game designer Reiner Knizia.
  travel: Donald Beckham favors road‑trip adventures, having explored the Columbia River Gorge, the Oregon Coast, and a weekend getaway to Mount Hood, while dreaming of a bicycle‑tour through Amsterdam,
    a hiking trek in New Zealand’s Queenstown, and a cultural immersion in Japan’s Tokyo neighborhoods.
  culinary: Donald Beckham loves firing up the smoker for bourbon‑glazed pork ribs and charcoal‑seared bratwurst, pairs them with craft‑brew selections like Deschutes Fresh Squeezed IPA, and enjoys tossing
    together a Pacific Northwest salmon salad with dill, capers, and a drizzle of lemon‑olive oil, though their grilling obsession sometimes eclipses healthy eating.
  core: Donald Beckham is a charismatic, bike‑riding correctional officer who balances a love for community BBQs and craft brews with a pragmatic yet occasionally forgetful approach to finances and health,
    channeling outgoing energy into team sports, live music, and a drive to reform the system from within.
background:
  cultural: Donald is a white American raised in the Pacific Northwest, with deep ties to Oregon’s outdoor, environmentally‑conscious lifestyle and Portland’s progressive, community‑focused culture. His
    upbringing blends traditional Midwestern work ethic—valuing reliability, structure, and self‑reliance—with the region’s emphasis on inclusivity, sustainability, and social engagement. This dual influence
    shapes his approach to both his corrections career and his personal life, balancing the hierarchical demands of a correctional environment with the collaborative spirit of his hometown.
