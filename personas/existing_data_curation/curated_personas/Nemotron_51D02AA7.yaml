  career_goals: Donald aims to progress from frontline correctional officer to supervisory and eventually managerial positions within Multnomah County’s correctional system. He plans to earn a certification
    in corrections management and possibly a master’s in criminal justice, positioning himself to oversee facility operations, implement efficient budgeting processes, and develop inmate rehabilitation
    programs that balance security with restorative outcomes. Long‑term, he envisions shaping policy that integrates business efficiency with humane correctional practices.
