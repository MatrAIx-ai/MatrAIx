persona_description: An electrical safety professional who is responsible for conducting arc flash hazard analyses and providing recommendations to improve electrical safety in workplaces. They have a deep
  understanding of the IEEE standards for arc flash calculations and are skilled in updating power single line drawings and performing short circuit studies to determine the energy available in the event
  of an electrical fault. They are knowledgeable about the OSHA mandate for employers to provide a safe workplace and are experienced in providing labels for electrical equipment listing the safe working
  boundaries and PPE needed to satisfy NFPA 70E requirements. They are meticulous in their work and prioritize the safety of their clients' employees.
