  career_goals: At her stage in life, Lisa's primary ambition is to maintain her independence and health while continuing to give back to her community. She hopes to keep her mind sharp by tutoring younger
    volunteers and documenting her family’s Swedish‑American heritage in a memoir. Lisa also aspires to travel briefly to Sweden to visit ancestral sites, and to create a small legacy of handwritten recipes
    and knit patterns for her grandchildren and great‑grandchildren.
