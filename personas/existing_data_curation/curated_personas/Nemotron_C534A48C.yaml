personas:
  professional: Marcel Sarmiento, an aspiring digital illustrator, blends mythic and sci‑fi characters into polished portfolio pieces, meticulously plans each project timeline, and leads volunteer teams
    at the community center to showcase youth art, reflecting their imaginative yet methodical drive.
  sports: Marcel Sarmiento, a member of the school’s soccer team and a weekend participant in a local youth basketball league, roots for the national soccer squad and follows the NBA’s Los Angeles Lakers,
    balancing active play with occasional video‑game marathons.
  arts: Marcel Sarmiento, a devoted fan of graphic novels like "Saga" and classic comics by Mike Mignola, draws inspiration from illustrators such as Loish and Katsuhiro Otomo, strums acoustic guitar to
    the melodies of folk songs and modern rock bands like Foo Fighters, and contributes original lyrics to the drama club’s musical productions.
  travel: Marcel Sarmiento, a 15‑year‑old who loves planning detailed itineraries, has visited family gatherings in the neighboring state, dreams of exploring Kyoto’s historic temples and the bustling streets
    of New York City, and prefers backpacking trips that blend cultural festivals with science‑fiction conventions.
  culinary: Marcel Sarmiento, an enthusiastic apprentice in the kitchen, perfects family recipes such as tamales filled with seasoned pork and hearty pozole brimming with hominy and chilies, while experimenting
    with fresh cilantro, lime, and avocado to create vibrant salsas.
  core: Marcel Sarmiento, a 15‑year‑old visionary artist who balances meticulous project planning, spontaneous guitar riffs, and occasional budget splurges, navigates teen health quirks and sports commitments
    with a blend of curiosity and collaborative flair.
background:
  cultural: Marcel is a second‑generation Mexican‑American who grew up in Winchester, Kansas. At home, Spanish is spoken and family traditions such as Día de los Muertos, quinceañera celebrations, and the
    preparation of dishes like tamales and pozole are regularly observed. He balances these customs with the Midwestern lifestyle of his town, attending a predominantly white middle school, celebrating
    U.S. holidays, and engaging with the local farming community. His Catholic upbringing informs his values of family, respect, and community service. Marcel maintains strong ties to the broader Mexican‑American
    community through a local cultural association that offers dance classes, language workshops, and cultural festivals, allowing him to share his heritage while also integrating into the wider town culture.
