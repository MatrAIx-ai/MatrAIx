  career_goals: Marcel aims to attend a high school with a strong arts and technology program, eventually pursuing a degree in game design or visual arts. He dreams of creating an indie video game that
    weaves Mexican folklore with contemporary storytelling, and hopes to showcase his work at regional art festivals. In the longer term, he envisions becoming a creative director for a multimedia studio
    while also leading community art projects—such as murals that celebrate the cultural heritage of his town. He is also interested in building a modest online presence to share tutorials and cultural
    content with a broader audience.
