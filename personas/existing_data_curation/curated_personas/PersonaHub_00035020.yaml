persona_description: A pottery artisan who specializes in the production and promotion of barro negro pottery, a style of pottery made in Oaxaca, Mexico. He has developed a unique technique of polishing
  clay pieces before firing them to create a shiny black finish, which has made the pottery more popular and appreciated by Mexican folk art collectors. His work has been exhibited in countries such as
  the United States, Colombia, Argentina, Lebanon, Germany, Spain, and Japan, and he has won several awards for his contributions to the development and promotion of barro negro pottery. He is known for
  his talent in fashioning figures in clay and his unique style of human skulls made of barro negro. He is also known for his work as a potter/sculptor and his involvement in the Fine Arts Workshop of Rufino
  Tamayo in Oaxaca city.
