personas:
  professional: Britney Jackson is an aspiring multimedia storyteller who blends sketching, LEGO engineering, and simple coding to craft interactive visual narratives, applying their disciplined work ethic
    and love for abstract concepts to school projects and community art fairs, and they constantly iterate on each piece until it meets their high standards.
  sports: Britney Jackson follows the local high school basketball team, the Riverside Raiders, eagerly cheering from the bleachers, plays intramural volleyball twice a month for social fitness, and participates
    in a weekend youth swim club that satisfies their energetic side, while keeping a relaxed stance toward competitive sports, preferring the camaraderie of team activities over solo training, and they
    love the group atmosphere.
  arts: Britney Jackson engages deeply with surrealist visions, they regularly study the works of Salvador Dalí and Yayoi Kusama, draw inspiration from speculative fiction authors like Neil Gaiman and N. K. Jemisin,
    attend school improv nights where they improvise scenes with quick wit, compose short piano pieces reminiscent of Ludovico Einaudi, and curate school art fairs that showcase student photography alongside
    their own abstract paintings, often citing the influence of contemporary street artist Banksy.
  travel: Britney Jackson’s travel style mixes school‑organized field trips to national museums with spontaneous weekend road trips to nearby state parks for sunrise photography, they dream of visiting
    Kyoto, Japan to sketch its zen gardens and explore its mystical shrines, and they plan a future backpacking adventure through Iceland’s volcanic landscapes, all while balancing a modest budget and a
    school calendar that limits extended vacations.
  culinary: Britney Jackson’s culinary palate favors creative plating, often making avocado toast topped with radish roses and chia seeds, experiments with colorful smoothie bowls swirled with dragon fruit
    and mango, enjoys preparing quick ramen bowls flavored with miso paste for late‑night study sessions, and, despite limited cooking experience, they take pride in successfully baking cinnamon roll cupcakes
    that double as edible art projects.
  core: Britney Jackson is a hyper‑organized teen who turns every curiosity into a sketch, balances relentless achievement with boundless imagination, and they occasionally indulge in late‑night snack binges
    after marathon piano practice.
background:
  cultural: Britney grew up in a middle‑class, white family in the suburban town of Howell, Michigan, within Livingston County’s close‑knit community. The Midwest setting emphasizes hard work, community
    involvement, and supportive family ties. Her parents encouraged both academic achievement and creative expression, enrolling her in local art workshops, library programs, and school clubs. The area’s
    cultural landscape includes participation in town festivals, high‑school sports events, and volunteer drives, which fostered her sociable and outgoing nature. While primarily identifying with mainstream
    American cultural norms—valuing independence, self‑reliance, and egalitarianism—Britney also appreciates the region’s diverse heritage, including the history of Native American tribes and immigrant
    communities, which informs her inclusive outlook and collaborative spirit.
