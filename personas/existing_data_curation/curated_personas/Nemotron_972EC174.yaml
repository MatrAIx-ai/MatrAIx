  career_goals: Britney aims to attend a specialized arts high school where she can deepen her visual‑arts and technology skills. Her long‑term ambition is to become a concept artist and later a creative
    director in the video‑game or animated‑film industry, blending her love of abstract ideas with cutting‑edge digital tools. She plans to build a strong portfolio through competitions, mentorships, and
    collaborations with peers, eventually pursuing a degree in interactive media or graphic design at a university known for innovation. Britney also envisions leading community‑based art initiatives that
    inspire curiosity and creativity in younger students, using her organizational strengths to launch workshops, pop‑up galleries, and interdisciplinary projects that merge art, storytelling, and basic
    coding.
