persona_description: A strategy and innovation organization that aims to provide equitable access to health services to priority and vulnerable groups through a community-based approach, using technology
  and collaboration with all levels of government, private sector, and non-governmental stakeholders. The organization rethinks the work of health teams and their aim, functions, methodologies, and aims
  to prioritize health through an identification and geographically referencing the population. The organization is located in the northwestern part of South America, Ecuador, and is focused on promoting
  health and preventing disease through the promotion of the MAIS model, which prioritizes the prevention of disease and the promotion of health.
