personas:
  professional: Melvin Rodriguez, an avid LEGO architect and classroom problem‑solver, channels his practicality and love for structure into meticulously planned builds while balancing cooperative play
    and moments of assertiveness, often double‑checking instructions to ease his worries.
  sports: Melvin Rodriguez competes on the Sunset Dragons youth soccer league, idolizes the LA Galaxy and the Chicago Bulls, and approaches fitness with energetic recess games while occasionally skipping
    warm‑ups, leading to occasional bruises.
  arts: Melvin Rodriguez fills sketchbooks with superhero comic strips inspired by Stan Lee and manga, devours adventure novels like Rick Riordan's Percy Jackson series, and relaxes to the sounds of Lila
    Downs and the classic guitars of Carlos Santana, shaping a vibrant creative outlet that balances imagination and structured storytelling.
  travel: Melvin Rodriguez dreams of family trips to the Smithsonian in Washington, D.C., the colorful streets of Mexico City to taste authentic tacos, and a weekend adventure at Disneyland, yet they usually
    stick to local day trips due to their parents' budget constraints and school schedules.
  culinary: Melvin Rodriguez loves assembling al pastor tacos with fresh cilantro and pineapple, mastering the art of mixing salsa verde, enjoys snacking on churros with chocolate dip, and, while still
    mastering safe knife handling, can deftly roll out tortillas and garnish dishes under their mom's watchful eye.
  core: Melvin Rodriguez is a structured, imaginative eight‑year‑old who balances meticulously planned LEGO builds with restless curiosity, occasional worry‑driven stomachaches, and a habit of losing socks
    during soccer warm‑ups.
background:
  cultural: Melvin is a Mexican‑American growing up in Rialto, California, a city with a vibrant Latino community. At home, Spanish is spoken alongside English, and his family celebrates traditions such
    as Día de los Muertos, Cinco de Mayo, and family gatherings centered around Mexican cuisine. He attends a local school where he experiences a blend of American curriculum and bilingual education, and
    he participates in community events at the neighborhood cultural center and church, which reinforce his cultural heritage while exposing him to the broader multicultural environment of Southern California.
attributes:
  skills: '[''Following step‑by‑step instructions'', ''LEGO building'', ''Basic arithmetic'', ''Bilingual (English/Spanish)'', ''Organizing classroom supplies'', ''Problem‑solving with puzzles'', ''Reliable
    in completing chores'']'
  hobbies: '[''Soccer'', ''LEGO building'', ''Reading adventure books'', ''Drawing comics'', ''Educational strategy video games'', ''Cooking with family'', ''Listening to Mexican folk music'']'
  career_goals: Melvin dreams of becoming an architect or civil engineer because he loves constructing things, organizing spaces, and seeing how structures fit together. He also imagines a future as a firefighter,
    attracted by the clear structure, teamwork, and the chance to help his community. He hopes to combine his love for building with a role that provides safety and service to others.
