personas:
  professional: Brock Freedman is an educational strategist at a community college who leverages expertise in curriculum design, data‑driven instruction, and LMS integration to create structured yet adaptable
    learning experiences, while their competitive drive pushes them to benchmark outcomes, continuously refine programs, and pursue a future role as department chair and instructional technology leader.
  sports: Brock Freedman competes in Muscatine intramural basketball, cheers on the Iowa Hawkeyes and the Chicago Bulls, and joins the Mid‑Mississippi Trail Runners club for weekend hikes, treating fitness
    as a blend of competition and camaraderie.
  arts: Brock Freedman strums guitar in a folk‑rock band that covers Bob Dylan, The Avett Brothers, and Gillian Welch, while they regularly attend live shows at the River Bend Center, collect vinyl records
    of Joni Jenkins, and immerse themselves in board‑game artwork that fuels their strategic creativity.
  travel: Brock Freedman enjoys budget‑friendly road trips to the Mississippi River bluffs, weekend getaways to Chicago’s craft‑brew scene, and annual visits to the Iowa State Fair, while dreaming of a
    hiking expedition in New Zealand’s Southern Alps and a cultural tour of Berlin’s beer festivals.
  culinary: Brock Freedman experiments with hop‑forward IPAs featuring Cascade and Centennial hops, pairs them with his go‑to pork tenderloin and apple chutney, fresh corn on the cob, and buttery cornbread,
    yet he often forgets to clean the brewing equipment promptly, leading to occasional off‑flavors.
  core: Brock Freedman blends a competitive, data‑driven mindset with a love for community music, outdoor adventure, and craft brewing, navigating life with structured plans, skeptical optimism, and a habit
    of procrastinating equipment cleanup.
background:
  cultural: Brock was raised in a small-town Midwestern family with deep roots in Iowa’s agricultural communities. His cultural upbringing emphasizes hard work, community involvement, modesty, and straightforward
    communication. He grew up attending public schools and a Methodist church, celebrating regional traditions such as the Iowa State Fair, county fairs, and local football games. This background fosters
    a practical, reliable, and socially engaged outlook that informs both his professional life and personal interests.
attributes:
  skills: '[''Curriculum Design'', ''Lesson Planning'', ''Classroom Management'', ''Learning Management Systems (Canvas, Blackboard)'', ''Assessment Design'', ''Student Advising'', ''Data-Driven Instruction'',
