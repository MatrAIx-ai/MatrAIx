  hobbies: '[''Playing guitar'', ''Intramural basketball'', ''Group hiking'', ''Homebrewing'', ''Volunteer work at food bank'', ''Board game nights'', ''Reading non-fiction'', ''Attending Iowa State Fair'']'
  career_goals: Brock aims to complete a bachelor’s degree in education within the next two years and pursue a master’s in instructional technology to enhance his online teaching capabilities. He aspires
    to transition to a tenure-track faculty role, eventually becoming a department chair for the Business & Technology programs at his community college. In the longer term, he envisions leading professional
    development workshops across the Midwest and contributing to statewide curriculum standards, while also obtaining certification as an instructional designer.
