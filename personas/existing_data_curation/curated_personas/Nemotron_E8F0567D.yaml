  career_goals: While still in middle school, Christopher dreams of turning his curiosity for technology into a career. He hopes to earn a certification in computer repair (CompTIA A+) and later pursue
    an associate degree in software development or game design at a community college. He envisions creating his own indie video game that blends storytelling with interactive puzzles. At the same time,
    his love of hands‑on work leads him to consider an apprenticeship in automotive technology, with the goal of becoming a certified ASE technician. He wants to combine these interests by eventually working
    on the software side of automotive engineering, developing diagnostic tools for cars. Christopher also aspires to improve his organizational skills so he can meet project deadlines and perhaps start
    a small side business fixing bikes or customizing gaming PCs for classmates.
