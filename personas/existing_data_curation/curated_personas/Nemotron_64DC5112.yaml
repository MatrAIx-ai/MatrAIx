  hobbies: '["Reading non‑fiction (environmental sustainability, technology)","DIY home projects (woodworking, appliance repair)","Gardening","Chess and puzzle games (sudoku, online strategy)","Hiking and
    nature photography","Small book club participation","Listening to educational podcasts","Community clean‑up volunteering"]'
  career_goals: Stephanie aims to transition from a frontline cleaning role to a supervisory or facilities coordination position within the next three to five years. She plans to earn certifications such
    as Certified Professional Cleaner (CPC) and Facility Management Professional (FMP) to bolster her credentials. Her ambition includes leading a small team, improving operational efficiency through data‑driven
    scheduling, and championing sustainable cleaning practices across the facility. Long‑term, she envisions launching her own green cleaning business that serves small businesses and community institutions
    in rural Nebraska, leveraging her competitive drive to become a top‑rated service provider in the region.
