personas:
  professional: Stephanie Moreyra, a 22‑year‑old janitor at a small Nebraska commercial building, combines meticulous floor‑care expertise, OSHA‑savvy safety practices, and spreadsheet‑driven inventory
    management, and they pursue a supervisory role while championing eco‑friendly cleaning methods and targeting CPC and FMP certifications.
  sports: Stephanie Moreyra enjoys hiking the Niobrara River Trail and the Sandhills, follows the Nebraska Cornhuskers football and the Omaha Storm Chasers minor‑league baseball, and they play weekly matches
    at a community tennis club where their competitive spirit shines despite a preference for solitary pursuits.
  arts: Stephanie Moreyra captures prairie sunsets in nature photography inspired by Ansel Adams, listens to the folk‑rock harmonies of The Avett Brothers while working on DIY projects, and they occasionally
    discuss sustainability‑focused documentaries with their intimate book club during quiet evenings.
  travel: Stephanie Moreyra favors low‑key road‑trip adventures that balance exploration with budgeting, having driven to Yellowstone for a weekend of hiking and photography, they dream of a sustainable‑design
    tour of Copenhagen, and they keep vacation plans modest to respect family expectations and financial constraints.
  culinary: Stephanie Moreyra prefers farm‑to‑table meals, routinely preparing roasted beet salad with goat cheese, garden‑fresh zucchini fritters, and hearty chicken and barley soup, they enjoy using an
    old cast‑iron skillet and experimenting with seasonal herbs like dill and sage, yet they sometimes over‑season dishes in a quest for bold flavor.
  core: Stephanie Moreyra blends a quiet, data‑driven work ethic with eco‑conscious curiosity, obsessively tracking cleaning metrics, budgeting each cent, and cataloguing prairie photography, yet they cannot
    resist the occasional impulse purchase of a new power drill.
background:
  cultural: Stephanie was raised in a small Midwestern town in Nebraska within a German‑American family with Lutheran roots. The local culture emphasizes hard work, self‑reliance, modesty, and a practical
    stewardship of resources. These values have shaped her pragmatic approach, respect for routine, and preference for quiet, solitary environments. At the same time, the community’s strong sense of collective
    responsibility has fostered her interest in sustainable practices and volunteer service. This blend of Midwestern work ethic and cultural heritage informs her balance of curiosity and practicality,
    her competitive drive to excel, and her calm, resilient demeanor.
attributes:
  skills: '["Commercial cleaning","Floor care (stripping, waxing, buffing)","Restroom sanitation","Waste management and recycling","Inventory tracking and supply ordering","Basic maintenance (minor plumbing,
