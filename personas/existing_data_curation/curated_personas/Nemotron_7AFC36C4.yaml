  career_goals: Patricia dreams of becoming an illustrator or animator who can bring her imagined worlds to life. She also envisions a future where she can teach art to younger children, perhaps at a community
    center or school, to help them express their creativity. Her caring nature fuels an ambition to create supportive, inclusive spaces for kids to explore art and storytelling.
