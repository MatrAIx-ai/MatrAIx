personas:
  professional: Tracy Sharnoff, a retired environmental scientist and citizen‑science champion, leverages four decades of experimental design, R/Python analytics, and clear technical writing to mentor students,
    guide museum workshops, and translate coastal water‑quality data into practical community action, all while embracing a relaxed, flexible approach that tolerates occasional disorganization.
  sports: Tracy Sharnoff enjoys daily sunrise walks along the Delray Beach shoreline, participates in a senior yoga class at the local community center, and cheerfully follows the Miami Heat and Miami Marlins,
    occasionally joining a weekend beach‑volleyball meetup with friends, embodying a low‑impact, socially connected fitness routine.
  arts: Tracy Sharnoff spends evenings immersed in Agatha Christie mystery novels, attends local museum exhibitions featuring Monet and Van Gogh, listens to classic jazz records by Ella Fitzgerald, and
    volunteers to lead hands‑on science workshops that blend art and science for children, reflecting a deep appreciation for narrative, visual art, and interdisciplinary creativity.
  travel: Tracy Sharnoff prefers flexible, curiosity‑driven trips, such as a leisurely road‑trip down the Pacific Coast Highway, a spring pilgrimage to the Greek islands to taste authentic olives and feta,
    and yearly weekend getaways to the Florida Keys for snorkeling, always balancing limited senior travel budgets with a desire for both adventure and relaxation.
  culinary: Tracy Sharnoff, an experimental home cook, loves blending Mediterranean staples like olive oil, saffron, and feta cheese with fresh local seafood to create dishes such as grilled sea bass with
    lemon‑herb quinoa, shrimp paella, and tomato‑basil bruschetta, while modestly mastering a mid‑range oven‑toaster and a small herb‑garden harvest.
  core: Tracy Sharnoff is a curious yet pragmatic octogenarian who juggles shell‑collecting, stargazing, and seasoned scientific mentorship while occasionally misplacing their keys and forgetting to water
    native plants, embodying a delightful blend of disciplined expertise and relaxed spontaneity.
background:
  cultural: Tracy was raised in a close‑knit Midwestern town where a strong emphasis on education, self‑reliance, and community service shaped her early worldview. Her family encouraged curiosity and practicality,
    leading her to pursue a STEM degree and a career in scientific research. After retiring, she relocated to Delray Beach, Florida, where she embraces the area's vibrant, multicultural atmosphere while
    maintaining traditions from her upbringing, such as holiday gatherings and participation in local church socials. She values the blend of her American Midwestern roots with the diverse cultural influences
    of South Florida, fostering a lifelong commitment to learning, mentorship, and community involvement.
attributes:
  skills: '[''Experimental design'', ''Statistical data analysis (R, Python)'', ''Technical writing & publishing'', ''Laboratory safety & compliance'', ''Project management & budgeting'', ''STEM education
    & mentoring'', ''Grant writing'', ''Applied environmental problem solving'', ''DIY electronics troubleshooting'', ''Public speaking'']'
  hobbies: '[''Beachcombing'', ''Native plant gardening'', ''Birdwatching'', ''Stargazing (telescope)'', ''Reading mystery novels'', ''Experimental cooking'', ''Puzzle solving (crosswords, Sudoku)'', ''Yoga'',
    ''Volunteering at local museum'']'
  career_goals: Although no longer in the formal workforce, Tracy remains driven to contribute her knowledge and experience. She aims to mentor high‑school and college students in STEM through local after‑school
    programs, serve on the advisory board of the Delray Beach Science Museum, and lead citizen‑science projects focused on coastal water quality and native plant restoration. Tracy also hopes to author
    a series of popular‑science articles for the community newspaper, share her career reflections in a memoir, and occasionally present at regional science conferences. Her goals reflect a balance of curiosity
    and practicality, seeking tangible impact while satisfying her lifelong love of learning.
