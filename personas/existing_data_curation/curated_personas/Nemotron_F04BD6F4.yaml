  career_goals: Even in retirement, Fernando aims to keep his mind engaged and his community contributions meaningful. He hopes to compile a memoir that records his family’s stories and the cultural shifts
    he has witnessed in the Inland Empire, and to volunteer as a mentor at the local senior center where he can teach basic woodworking and cooking to younger participants. He also aspires to assist the
    Riverside County Museum’s oral‑history project, sharing his personal experiences and helping to document Mexican‑American heritage. Additionally, Fernando wishes to explore new artistic techniques through
    occasional workshops, ensuring his lifelong curiosity for art remains nurtured.
