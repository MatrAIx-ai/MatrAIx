personas:
  professional: Fernando Restrepo, a retired agricultural specialist and handyman, leverages his meticulous yet adaptable approach to mentor seniors in woodworking and traditional cooking, while serving
    as a bilingual liaison for the Riverside County Library’s oral‑history project, embodying his curiosity and quiet assertiveness in community service.
  sports: Fernando Restrepo maintains fitness through daily walks in Riverside’s Fairmount Park and a weekly senior bowling league at the community center, while cheering for the Los Angeles Dodgers, the
    Los Angeles Lakers, and the Inland Empire 66ers during the baseball and basketball seasons.
  arts: Fernando Restrepo expresses his artistic side by painting watercolors of Mira Loma’s hills in unconventional palettes inspired by Monet and Frida Kahlo, attends intimate art workshops at the local
    cultural center, and draws daily inspiration from a musical blend of traditional Mexican folk, boleros, and classic jazz legends such as Ella Fitzgerald and Louis Armstrong.
  travel: Fernando Restrepo favors low‑key, self‑driven road trips to culturally rich sites such as Santa Fe, New Mexico, and the historic missions of San Juan Capistrano, plans each outing with meticulous
    itineraries to accommodate his modest retirement budget, and dreams of a future pilgrimage to San Miguel de Allende to explore its colonial architecture and culinary scene.
  culinary: Fernando Restrepo, a proficient home chef, delights in preparing traditional Mexican fare such as tamales made from hand‑ground masa, slow‑cooked carnitas seasoned with dried ancho chilies,
    and aromatic pozole broth enriched with hominy and fresh cilantro, often pairing these meals with homemade salsa verde and sharing them with his spouse and close relatives around the kitchen table.
  core: Fernando Restrepo is an 81‑year‑old gardener‑artist whose methodical routine coexists with an insatiable curiosity, quietly mentoring neighbors while sometimes obsessively rearranging his garden
    tools at night.
background:
  cultural: Fernando is a second‑generation Mexican‑American whose parents immigrated from Michoacán in the 1940s. He grew up in a bilingual household in the Inland Empire, where Spanish was spoken at home
    and English in school and the community. His upbringing was steeped in Mexican traditions—celebrating Día de los Muertos, participating in Catholic masses, and cooking family recipes passed down through
    generations—while also absorbing Southern California’s multicultural influences. Over his life, he has blended these cultural strands, fostering a strong sense of identity rooted in family, community
    service, and respect for both his Mexican heritage and the broader American society.
