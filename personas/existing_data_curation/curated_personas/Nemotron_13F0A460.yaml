  hobbies: '["Acrylic Painting", "Attending Art Festivals", "Reading Self‑Help and Psychology Books", "Yoga and Meditation", "Gardening", "Cooking Soul Food and Caribbean Cuisine", "Listening to Jazz, Neo‑Soul,
    and R&B", "Volunteering at Community Center for Nail Care Workshops"]'
  career_goals: Tiffany aims to earn a Master Nail Technician certification and establish her own boutique nail studio in Loxahatchee that doubles as a creative studio for local artists. She plans to launch
    a signature line of eco‑friendly nail polish inspired by Caribbean and Southern African‑American palettes. Over the next five years, she hopes to host quarterly workshops that teach advanced nail art
    and entrepreneurship to aspiring technicians, especially women of color. She also seeks to achieve a healthier work‑life balance by delegating administrative tasks, practicing mindfulness, and reducing
    stress‑induced anxiety. Her long‑term ambition includes being recognized at regional beauty competitions and contributing articles to industry magazines, positioning herself as a thought leader who
    blends artistic curiosity with business acumen.
