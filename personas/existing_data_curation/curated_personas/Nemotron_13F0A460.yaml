personas:
  professional: Tiffany Larry, a 45‑year‑old nail artist and salon owner, combines two decades of precision acrylic and gel techniques with fine‑art color theory, leveraging her curiosity to invent unconventional
    motifs while her competitive streak drives her to pursue a Master Nail Technician certification and a boutique studio that doubles as a community art space, despite a skeptical eye that makes her meticulously
    vet client requests and delegate administrative duties.
  sports: Tiffany Larry enjoys cheering for the Miami Heat and Tampa Bay Buccaneers, plays beach volleyball at a local club on weekends, and attends weekly yoga sessions at a West Palm Beach studio to stay
    fit, balancing a competitive spirit with a relaxed, health‑focused routine.
  arts: Tiffany Larry immerses herself in visual and musical arts, drawing inspiration from the paintings of Kehinde Wiley and the jazz improvisations of Miles Davis, while the soulful vocals of Erykah
    Badu and the contemporary R&B of H.E.R. soundtrack her acrylic nail designs and canvas work.
  travel: Tiffany Larry favors short getaways to the Florida Keys and cultural festivals in New Orleans, while dreaming of exploring the vibrant color markets of Cartagena, Colombia, and the historic art
    villages of Provence, France, balancing travel planning with her studio responsibilities and family commitments.
  culinary: Tiffany Larry delights in cooking Southern classics like shrimp‑and‑grits and Caribbean staples such as jerk chicken, frequently seasoning with scotch bonnet pepper, smoked paprika, and fresh
    herbs from their garden, and they pride themselves on perfecting sweet potato pie and mango‑lime salsa for friends.
  core: Tiffany Larry is a fiercely creative nail artist who channels artistic curiosity into vibrant designs, battles chronic worry with yoga and meditation, occasionally over‑indulges in exotic plant
    shopping, and balances a competitive drive with a skeptical eye toward every new client.
background:
  cultural: Tiffany is an African‑American woman whose upbringing in the culturally rich communities of South Florida exposed her to a blend of Southern soul traditions, Caribbean rhythms, and the vibrant
    Black artistic scene of Palm Beach County. Her family values emphasize self‑care, resilience, and community uplift, which she expresses through her nail artistry—often incorporating Afro‑centric symbols,
    bold colors, and storytelling motifs. Growing up attending church gatherings and local festivals, she developed a strong sense of solidarity and a desire to mentor younger Black women in the beauty
    industry. Tiffany’s cultural identity also informs her culinary tastes, her love for jazz and R&B, and her commitment to using her craft as a form of personal empowerment and cultural celebration.
attributes:
  skills: '["Manicure and Pedicure Techniques", "Gel and Acrylic Nail Art", "Custom Design and Color Theory", "Hand/Foot Health Assessment", "Sanitation and Hygiene Compliance", "Client Consultation and
