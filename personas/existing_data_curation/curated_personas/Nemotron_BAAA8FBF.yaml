personas:
  professional: Barbara Peeples, an 11‑year‑old budding comic‑strip creator, channels her love of drawing and competitive spirit into weekly school newspaper panels, balancing her practical desire for clear
    deadlines with frequent bursts of spontaneous story twists that often derail her initial plans.
  sports: Barbara Peeples plays forward for the Copperas Cove Junior Soccer Club, idolizes the Dallas Cowboys and the Houston Astros, and spends Saturday mornings sprinting drills at the local park while
    secretly competing in a neighborhood rock‑collecting contest that she treats with the same fierce competitiveness as a match.
  arts: Barbara Peeples devotes after‑school hours to sketching comic panels inspired by artists like Alex Ross and the storytelling style of Neil Gaiman, while also dancing to country hits from Carrie
    Underwood and listening to the classic rock of Lynyrd Skynyrd during rehearsal, weaving music into her visual narratives.
  travel: Barbara Peeples prefers family‑planned road trips to familiar Texas spots like Austin’s live‑music scene and Big Bend’s starlit nights, yet dreams of a spontaneous weekend at Disney World, and
    they regularly ask friends for tips on camping at Lake Conroe, balancing careful itineraries with occasional “just drive‑out‑there” adventures.
  culinary: Barbara Peeples loves the smoky flavor of brisket tacos, the comfort of mac and cheese with a crunchy breadcrumb topping, and the sweet tang of peach cobbler, often experimenting by adding crushed
    shells from their rock collection to homemade salsa for an extra crunch, while also insisting on a nightly glass of sweet tea.
  core: Barbara Peeples, an ambitious 11‑year‑old comic artist, toggles between meticulous planning and impulsive bursts, hoards allowances for art supplies, battles anxiety with breathing exercises, dominates
    soccer drills, and treats every weekend like a mini‑adventure.
background:
  cultural: Barbara grows up in a small‑town Texan environment in Copperas Cove, surrounded by a predominantly white, middle‑class community with strong ties to local churches and school events. Family
    gatherings often feature home‑cooked meals, country music, and celebrations of American holidays. The nearby military presence adds a sense of discipline and respect for service, while the rural surroundings
    encourage an appreciation for the outdoors and community sports.
