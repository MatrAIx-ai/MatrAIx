personas:
  professional: Siri Smith is an aspiring LEGO architect who thrives on routine step‑by‑step builds, and they channel their competitive drive into perfecting each model, even as bouts of anxiety sometimes
    make them double‑check every connection.
  sports: Siri Smith dashes across the school soccer field with the Tigers youth team, follows a set practice schedule, and cheers for the City FC professional squad, and they demand competition in drills
    while often feeling intense disappointment when missing a goal.
  arts: Siri Smith sketches cartoon characters at the weekend art club, sings along to Taylor Swift pop hits, and collects Mo Willems books, letting their competitive nature turn doodling sessions into
    friendly illustration contests, and they proudly display each finished piece on their bedroom wall.
  travel: Siri Smith enjoys planned weekend trips to the nearby wildlife sanctuary and the family’s yearly visit to the seaside amusement park, favoring familiar itineraries but dreaming of a solo adventure
    to Disney World, and they sometimes feel nervous about new environments despite their curiosity.
  culinary: Siri Smith favors simple comfort foods like cheesy macaroni, chicken nuggets, and apple slices, can whip up a peanut‑butter‑jelly sandwich with precision, yet they often skip vegetables and
    occasionally trade snacks for extra dog treats during walks.
  core: Siri Smith is a routine‑loving, competitive nine‑year‑old whose vivid imagination fuels LEGO creations while anxiety and occasional disorganization color their bright, energetic world.
background:
  cultural: Siri grew up in a predominantly white, middle‑class family in Slingerlands, a suburban community in Albany County, New York. Her family maintains traditional American customs, celebrating holidays
    such as Thanksgiving, Christmas, and the Fourth of July with familiar rituals passed down through generations. They occasionally acknowledge their European ancestry—primarily Irish and German—through
    food traditions like homemade potato salad and apple pie. The local public school, community church, and neighborhood events shape her sense of belonging, emphasizing practicality, routine, and modest
    ambition. This cultural setting reinforces her preference for familiar structures and values a balanced mix of independence and community involvement.
