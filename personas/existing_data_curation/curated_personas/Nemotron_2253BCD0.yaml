  career_goals: Siri is beginning to think about what she wants to do when she grows up. She is drawn to careers that involve caring for living things and that follow clear, practical routines. She often
    says she would like to become a veterinarian because she loves animals and likes the idea of helping them stay healthy. She also imagines being a teacher, appreciating the predictable classroom schedule
    and the chance to share knowledge. While she enjoys these ideas, she recognizes that she still has many interests to explore and hopes to find a path that lets her combine her love of routine, hands‑on
    work, and helping others.
