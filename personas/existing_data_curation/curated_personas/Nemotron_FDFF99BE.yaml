  hobbies: '[''Bullet journaling'', ''Reading classic literature and historical biographies'', ''Playing piano'', ''Baking and cooking'', ''Gardening'', ''Volunteering at the local library'', ''Hiking desert
    trails'', ''Watching documentary series'']'
  career_goals: Stacey aspires to pursue a career that combines practicality, structure, and service. She dreams of becoming an accountant or financial analyst to work with numbers and organization, or
    alternatively, a teacher who can provide stability and routine for students. She plans to attend a college with a strong business program and hopes to secure an internship in a local accounting firm
    during high school. Long‑term, she aims to achieve a stable, well‑organized professional life where she can contribute to her community.
