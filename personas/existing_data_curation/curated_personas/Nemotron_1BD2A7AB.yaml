  career_goals: Kenneth aims to launch a flagship interdisciplinary program that combines visual arts, digital media, and cultural studies, positioning the university as a hub for creative scholarship in
    the Midwest. He plans to secure a multi‑year grant to support community‑based art workshops that serve underserved neighborhoods in St. Louis County. Over the next five years, he hopes to mentor a cohort
    of emerging scholars, publish a monograph on innovative pedagogy for adult learners, and earn a distinguished teaching award. As he approaches retirement, Kenneth envisions transitioning to an emeritus
    role that allows him to continue teaching part‑time, consulting on curriculum reform, and leading a campus initiative focused on student mental‑health resilience, reflecting his own experiences with
    stress and worry.
