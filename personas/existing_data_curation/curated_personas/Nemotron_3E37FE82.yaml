  career_goals: Summer aims to stay at the Burbank Public Library while expanding her role into community outreach, such as leading a weekly book club for seniors or organizing informal cultural programs.
    She hopes to complete her GED, which would open a path toward a supervisory assistant position and give her more confidence in handling larger projects. A long‑term ambition is to mentor new volunteers,
    sharing her love of books and her knack for making patrons feel welcome. She also dreams of curating a special collection that showcases local Hollywood history, blending her curiosity with a tangible
    contribution to the library’s cultural legacy. Throughout, she seeks a supportive, low‑stress environment that respects her need for flexibility and harmony.
