personas:
  professional: Summer Fruge, a veteran circulation specialist at the Burbank Public Library who combines a warm, talkative demeanor with a keen curiosity for community storytelling, managing book loans,
    reference queries, and informal shelf displays while dreaming of completing a GED, mentoring volunteers, and curating a special collection of local Hollywood history despite a relaxed approach that
    sometimes leaves paperwork slightly untidy; they thrive on personal interaction and see each patron as a story waiting to be shared.
  sports: Summer Fruge, an enthusiastic fan of the Los Angeles Dodgers and Lakers who enjoys walking the shaded trails of Verdugo Park, participates in senior‑center dance and low‑impact yoga classes, and
    occasionally joins a local walking club that meets for weekend strolls to the nearby Griffith Observatory; they use sport as a social outlet rather than a competitive pursuit, finding joy in shared
    movement and cheering for their favorite teams.
  arts: Summer Fruge, an avid consumer of classic Hollywood cinema and contemporary fiction who regularly watches Alfred Hitchcock thrillers, Cary Grant comedies, and recent novels by Ann Patchett, volunteers
    as an occasional usher and set‑hand for Burbank community theater productions, and hosts monthly book‑talks featuring authors like Neil Gaiman; they let the arts shape their evenings and community connections,
    often discussing film aesthetics while sipping tea infused with garden‑grown rosemary.
  travel: Summer Fruge, a seasoned day‑tripper who loves weekend getaways to Santa Barbara’s beachfront cafés, a ferry ride to Catalina Island for snorkeling, and guided tours of the Warner Bros. Studio
    lot, while dreaming of a literary pilgrimage to the Brontë Parsonage in England; they prefer organized group travel that fits their modest budget and social nature, often traveling with fellow seniors
    from the library’s outreach program.
  culinary: Summer Fruge, a garden‑to‑table enthusiast who harvests basil, rosemary, and thyme to flavor family staples such as chicken piccata, spaghetti bolognese, and herb‑infused olive oil, enjoys occasional
    brunch at the Original Pantry Cafe, and while their cooking skills are solid, they sometimes let the timer slip, resulting in a charred crust they laugh off with friends over a cup of fresh pesto sauce.
  core: Summer Fruge, a sociable 63‑year‑old librarian whose love of stories, herb‑spiced meals, and classic films fuels a gentle curiosity, occasional disorganization, and a steadfast drive to keep community
    harmony alive; they cherish every conversation as a chance to share a story.
background:
  cultural: Summer is a white American who grew up in post‑war Southern California, shaped by the suburban boom and the nearby entertainment industry of Burbank. Her upbringing reflects a blend of mid‑century
    values—emphasis on community, politeness, and public service—combined with the artistic and multicultural currents of Los Angeles County. Influenced by a likely Protestant or Catholic family tradition,
    she values harmony, cooperation, and inclusivity. Her cultural identity includes a deep appreciation for Hollywood storytelling, a strong sense of civic duty, and an affinity for the diverse, neighborly
    spirit that characterizes the region.
