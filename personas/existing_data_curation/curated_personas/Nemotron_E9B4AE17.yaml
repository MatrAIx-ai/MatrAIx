  career_goals: Milagros dreams of becoming a veterinarian because she loves animals and wants to protect them, combining her compassionate nature with her competitive drive for scientific excellence. She
    also envisions a future as a bilingual teacher or community health advocate, helping younger children navigate school and health topics in both Spanish and English. Long-term, she aspires to lead youth
    sports or arts programs that celebrate Dominican culture while empowering peers. She is motivated to excel academically and plans to pursue higher education in biology or education.
