personas:
  professional: Milagros Pastora is a budding soccer strategist who organizes neighborhood games with clear rules, channels her love of drawing into comic strips that celebrate her family’s festive gatherings,
    and dreams of becoming a sports journalist who can blend structured reporting with her competitive spirit.
  sports: Milagros Pastora is a passionate midfield player in the Maitland Youth Soccer Club, idolizes Orlando City SC’s goalkeeper, follows the Florida State Seminoles women's soccer team for inspiration,
    and balances her love of the sport with weekend beach volleyball at Lake Fairview.
  arts: Milagros Pastora sketches vibrant comic strips featuring dancing characters set to the rhythms of Juan Luis Guerra and Aventura, enjoys listening to Bad Bunny’s reggaeton mixes while practicing
    simple bachata steps at home, and watches animated films by Studio Ghibli for storytelling inspiration.
  travel: Milagros Pastora dreams of returning to her grandparents’ hometown for a family reunion, has already explored Orlando’s theme parks and the Everglades National Park, and hopes to one day trek
    the historic streets of Cartagena while saving allowance money for airfare.
  culinary: Milagros Pastora loves helping her mother simmer arroz con pollo with sofrito, mash plantains into a fluffy side dish, and bake pastelitos stuffed with sweet guava, while also mastering homemade
    pizza dough topped with mozzarella and pepperoni for after‑school snacks.
  core: Milagros Pastora blends a competitive soccer mindset with a love for drawing comics, saves diligently for her gear, navigates mild allergies with a realistic routine, and never misses a chance to
    dance when merengue beats fill the house.
background:
  cultural: Milagros comes from a Dominican family that maintains strong ties to its heritage while living in Maitland, Florida. Spanish is spoken at home, and family gatherings often feature traditional
    foods such as mangú, sancocho, and pastelitos. Music and dance—especially merengue, bachata, and modern reggaeton—play a central role in celebrations and daily life. She participates in community events
    like the Dominican Parade and local cultural festivals, fostering pride in her roots. Catholic traditions are part of her family's routine, with occasional church attendance and observance of holidays
    such as Día de los Santos Reyes. Balancing Dominican customs with American school life, Milagros navigates a bicultural identity that enriches her perspective and social interactions.
