personas:
  professional: Erin Smith, a retired engineer with a STEM background, channels her methodical problem‑solving and community‑focused mindset into mentoring young engineers, organizing senior STEM workshops
    at the Albuquerque Science Center, and authoring a memoir that blends scientific rigor with personal narrative.
  sports: Erin Smith joins guided hikes up the Sandia Mountains every spring, participates in a low‑impact walking club that tracks steps with a fitness app, and cheers for the Albuquerque Isotopes and
    the New Mexico State Aggies, balancing her love of the outdoors with a competitive spirit for staying active.
  arts: Erin Smith explores creative expression through digital‑photography walks capturing desert sunrise hues, devours novels by Toni Morrison and Cormac McCarthy, and enjoys listening to Lila Downs and
    the instrumental works of Ennio Morricone, which she weaves into her bridge and trivia nights.
  travel: Erin Smith prefers road‑trip itineraries that blend scenic drives through the Southwest—like the historic Route 66 stretch to Winslow—with occasional pilgrimages to European art museums in Florence
    and Madrid, always planning each journey on a detailed spreadsheet to avoid last‑minute stress.
  culinary: Erin Smith cultivates a tiny herb garden of cilantro and oregano to season her favorite New Mexican dishes—green chile stew, carne adovada, and posole—while experimenting with Hatch green chilies,
    roasted corn, and a pinch of cinnamon in sweet desserts, finding the kitchen both a lab and a sanctuary.
  core: Erin Smith is a meticulous, puzzle‑loving senior who blends scientific curiosity with a love for community, but a lingering worry about health and finances often fuels a competitive edge in bridge
    and garden‑to‑table cooking.
background:
  cultural: Erin grew up in a middle-class white family in the Midwest before moving to New Mexico after college. Over four decades in Albuquerque she has absorbed the Southwest's blend of Native, Hispanic,
    and Anglo influences, which is evident in her appreciation for regional cuisine and outdoor recreation. Her upbringing emphasized self-reliance, community service, and a strong work ethic, values she
    carries into her volunteer and mentoring activities. While she identifies culturally as American, she also respects the local traditions, languages, and historic preservation efforts of the Bernalillo
    County community.
attributes:
  skills: '["Analytical problem-solving", "Project management", "Data analysis (Excel, SPSS)", "Scientific writing", "Community outreach coordination", "Digital photography", "Genealogical research", "Mentorship",
