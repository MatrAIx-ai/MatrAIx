  hobbies: '["Guided hikes", "Herb gardening", "Senior book club", "Bridge tournaments", "Trivia nights", "Digital photography", "Crossword puzzles", "Sudoku", "New Mexican cooking", "Genealogy workshops",
    "Volunteer work at museum and senior center"]'
  career_goals: Although retired from formal employment, Erin aims to remain intellectually active by mentoring early-career engineers and students through local university outreach programs, authoring
    a memoir that chronicles her experiences as a woman in STEM during the 1960s-80s, and leading a senior-focused STEM education initiative at the Albuquerque Science Center. She also hopes to advocate
    for age-friendly public policy in Bernalillo County, ensuring that public spaces remain safe and accessible for older adults.
