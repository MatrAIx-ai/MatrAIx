  career_goals: Jasmine aims to transition from retail management to a director‑level position that merges her managerial strengths with her passion for the arts. She envisions leading a community arts
    hub or a nonprofit that provides art‑education programs for underserved youth in the Bay Area. To achieve this, she plans to complete a bachelor’s degree in Arts Administration, expand her grant‑writing
    expertise, and build a network of local artists and cultural institutions. Long‑term, she hopes to champion inclusive workplace policies that prioritize employee well‑being, especially mental health,
    and to become a mentor for women of color seeking leadership roles in the nonprofit sector.
