personas:
  professional: Nga Tran, a 15‑year‑old high‑school junior, blends an organized, detail‑oriented mindset with a vibrant, sociable energy to lead the school’s digital art club, designing character illustrations
    and theater posters that weave contemporary pop aesthetics with the warm memories of family meals like pho and bánh mì as narrative inspiration.
  sports: Nga Tran, an enthusiastic participant on the varsity soccer team and a member of the Inland Empire Modern Dance Collective, roots for the Los Angeles Lakers and the LA Galaxy, spends weekends
    at local parks for pick‑up basketball games, and enjoys spontaneous skate sessions at nearby ramps.
  arts: Nga Tran, an avid digital painter, theatre enthusiast, and modern‑dance aficionado, spends afternoons sketching manga‑style characters inspired by pop icons like Billie Eilish and classic storytellers
    such as Hayao Miyazaki, curates eclectic indie‑pop playlists laced with traditional folk scores, and shines in school productions where they often take the lead.
  travel: Nga Tran dreams of backpacking through the lantern‑lit streets of Hoi An during Tet, while also planning weekend road trips to Santa Monica Pier, spontaneous camping excursions in the San Gabriel
    Mountains, and annual family outings to Los Angeles’ Grand Central Market to explore new culinary delights.
  culinary: Nga Tran loves the aromatic broth of pho, the crunchy crust of bánh mì, and hand‑rolled spring rolls, often recreating these dishes at home with fresh herbs, lemongrass, and sriracha, while
    also experimenting with avocado toast topped with feta and seeking mango sticky rice and kimchi tacos at local farmers markets.
  core: Nga Tran fuses a curious, organized, and sociable spirit with a passion for digital art, theatre, and family‑rooted culinary traditions, navigating teenage life with lively chatter, meticulous budgeting,
    and relentless creativity.
background:
  cultural: Ngá is a second‑generation Southeast Asian American, with her parents having immigrated from Vietnam. At home, Vietnamese is spoken alongside English, and family gatherings revolve around traditional
    meals such as pho, bánh mì, and fresh spring rolls. She celebrates Tet (Lunar New Year) with lanterns, red envelopes, and stories of ancestors, and participates in local cultural festivals in the Inland
    Empire that showcase Southeast Asian dance, music, and crafts. Growing up in Rancho Cucamonga, she experiences a blend of suburban Californian life and a vibrant multicultural community, which has shaped
    her values of family solidarity, respect for elders, and a strong desire to share her heritage with peers.
