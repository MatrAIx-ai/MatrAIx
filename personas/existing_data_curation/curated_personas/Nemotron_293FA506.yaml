  career_goals: Ngá dreams of turning her love for art, storytelling, and community into a career. In the next few years she plans to lead her high school’s art club, produce a podcast that showcases local
    youth artists, and volunteer as a coordinator for cultural festivals that celebrate Southeast Asian heritage. Her long‑term ambition is to study graphic design or visual communications at a university
    and later become a creative director or content strategist who creates inclusive campaigns and mentors emerging creators from immigrant backgrounds.
