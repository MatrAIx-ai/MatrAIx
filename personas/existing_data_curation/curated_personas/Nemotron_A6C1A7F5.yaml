  hobbies: '[''hiking'', ''book club'', ''volunteering at food bank'', ''cooking classes'', ''line dancing'', ''gardening'']'
  career_goals: Sharon aims to move into a senior leadership position such as Claims Manager or Regional Director, where she can influence policies that enhance the customer experience and streamline claim
    processes. She also wishes to formalize her mentorship role by developing structured training programs for new adjusters. Looking ahead to retirement, she plans to transition to part‑time consulting
    focused on claims process optimization for local businesses and to serve on consumer‑advocacy or community safety boards, balancing professional contributions with personal fulfillment.
