persona_description: A historian who specializes in the study of 20th-century Korean history, particularly the period of Japanese colonial expansion and the Gwangju Uprising. Her research interests include
  the role of women in colonial contexts, direct testimony as a source of historical knowledge, and the study of East Asian female subjectivity. She is also interested in contemporary democratic movements
  in Korea and the June Democratic Struggle.
