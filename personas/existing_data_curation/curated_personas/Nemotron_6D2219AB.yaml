  hobbies: '[''cooking traditional Mexican dishes'', ''organic gardening'', ''salsa and cumbia dancing'', ''embroidering (bordado)'', ''reading historical fiction'', ''volunteering at senior center'', ''bird
    watching'', ''walking in Sonoma County vineyards and parks'', ''participating in church choir'']'
  career_goals: Adiela aims to channel her organizational talent and cultural knowledge into a leadership role within local nonprofit or community organizations. She plans to become a volunteer coordinator
    at the Rohnert Park Community Center, develop a year‑round multicultural garden that provides fresh produce and a cultural learning space, and mentor younger Mexican‑American families in preserving
    heritage traditions. She also intends to pursue a certification in community health outreach and eventually serve as a cultural liaison to bridge the Mexican community with municipal services.
