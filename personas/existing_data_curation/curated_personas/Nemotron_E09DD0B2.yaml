  hobbies: '[''Gardening'', ''Singing in a choir'', ''Bingo and card games'', ''Knitting and quilting'', ''Walking and birdwatching'', ''Reading historical fiction'', ''Genealogy research'']'
  career_goals: Although retired, Ronni aims to deepen her community involvement by leading intergenerational programs at the senior center, preserving Lansing's heritage through a volunteer oral‑history
    project, learning digital photography to capture the Finger Lakes landscape, and maintaining her health and vitality to stay active and supportive of local initiatives.
