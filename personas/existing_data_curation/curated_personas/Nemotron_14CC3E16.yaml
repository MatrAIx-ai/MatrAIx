  career_goals: Julie aims to advance to a shift‑supervisor or store‑manager role within the next two years, using her organized and reliable reputation to lead a team effectively. She also envisions opening
    a small boutique that showcases local Cajun crafts and foods, allowing her to blend her practical business sense with her curiosity about regional culture. To support this, she plans to complete a short
    certificate program in small‑business management and to continue mentoring younger employees. Even after retirement, she intends to stay active in parish volunteer programs, especially those that involve
    event planning and community education.
