  hobbies: '[''LEGO building'', ''reading adventure books'', ''soccer'', ''drawing and crafts'', ''cooking traditional Dominican dishes'', ''listening to merengue and dancing'']'
  career_goals: Peter dreams of growing up to help people in a hands‑on way. He often says he wants to be a doctor because he likes caring for friends who get hurt, and he also imagines being a teacher
    who can share stories and make learning fun. He is fascinated by space and sometimes mentions wanting to become an astronaut, combining his curiosity about the world with a practical desire to protect
    and explore. His short‑term ambition is to earn a 'helping‑hand' badge in his school's community service program.
