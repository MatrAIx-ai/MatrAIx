personas:
  professional: Peter imagines themselves as a budding civil engineer who transforms LEGO vehicle and city sets into miniature testbeds for real-world engineering concepts, meticulously planning each build
    in a notebook while balancing boundless curiosity with a methodical, practical approach that keeps projects organized yet flexible.
  sports: Peter loves sprinting around the local park for soccer matches with the Cedar Grove Kids Soccer Club, idolizes Manchester United’s midfielders for their teamwork, and stays fit by juggling a ball
    during recess, though they occasionally skip a practice when a new LEGO set beckons.
  arts: Peter expresses creativity by drawing Mickey Mouse, Peppa Pig, and original cartoon heroes, crafting vibrant papel picado cut‑outs inspired by festive traditions, and dancing to upbeat merengue
    tunes from Juan Luis Guerra while humming along to The Wiggles’ playful songs, showing they blend visual art with rhythmic movement.
  travel: Peter enjoys weekend family road trips to the nearby beach and the historic city museum, dreams of visiting the American Museum of Natural History’s dinosaur halls in New York and the towering
    cliffs of the Grand Canyon, and prefers a mix of planned excursions with spontaneous treasure hunts for hidden LEGO pieces along the way, reflecting they balance structure with adventure.
  culinary: Peter helps his grandmother roll empanada dough, mastering a buttery crust with fillings of seasoned ground beef, cheese, and cilantro, delights in assembling tiny fruit kebabs with pineapple
    and strawberry, and often insists on adding an extra sprinkle of cinnamon to his chocolate chip cookies, though they sometimes over‑salt the empanada filling.
  core: Peter is a curious, organized 7‑year‑old LEGO builder who balances imagination with practicality, thrives on teamwork in soccer, and brings rhythm to daily life through music and kitchen adventures,
    showing they blend creativity with responsibility.
background:
  cultural: Peter’s family emigrated from the Dominican Republic to the United States a few years ago. At home, Spanish is spoken alongside English, and he participates in Dominican cultural traditions
    such as celebrating Dominican Independence Day, eating foods like rice and beans, and listening to merengue and bachata music. His parents maintain strong family ties, often gathering extended relatives
    for Sunday meals and teaching him basic Dominican customs. Living in Wilkes‑Barre, PA, Peter also experiences local Pennsylvania holidays and community events, giving him a blended cultural identity
    that respects his Caribbean heritage while integrating into his suburban American environment.
