    Nights'', ''Book Club'']'
  career_goals: Md aims to move into an Office Manager or Senior Executive Assistant role where he can shape office processes, lead a small administrative team, and implement digital workflow solutions.
    He plans to earn the Certified Administrative Professional (CAP) credential and attend workshops on process improvement and change management. Long‑term, he hopes to become a community liaison, leveraging
    his administrative expertise and cultural fluency to connect local businesses with the South Asian community in Dublin and Union County, while also mentoring aspiring administrative professionals.
