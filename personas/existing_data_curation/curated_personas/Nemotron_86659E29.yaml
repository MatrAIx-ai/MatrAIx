personas:
  professional: Yu Yeh, a retired electrical engineer with three decades of circuit design and signal‑processing expertise, now channels their meticulous problem‑solving skills into mentoring Bay Area students,
    guiding open‑source accessibility tools for seniors, and leading hands‑on workshops at local makerspaces, all while balancing a pragmatic approach with an insatiable curiosity for emerging AI ethics.
  sports: Yu Yeh enjoys weekend hikes along the East Bay hills, follows the Golden State Warriors and Oakland Athletics with a loyal devotion, participates in a senior cycling group that meets at Lake Merritt,
    and occasionally plays friendly chess matches at the Richmond Library, balancing moderate cardio with low‑impact activities suited to their age.
  arts: Yu Yeh cultivates artistic expression through Chinese calligraphy, devotes evenings to reading classic sci‑fi authors like Isaac Asimov and Chinese historical epics, attends performances by the
    San Francisco Symphony, and draws inspiration from musicians such as Yo‑Yo Ma and filmmaker Ang Lee, weaving these influences into a reflective creative outlet.
  travel: Yu Yeh prefers purposeful travel that blends cultural immersion and natural scenery, having explored the cherry blossoms of Hokkaido, the historic streets of Kyoto, and the rugged cliffs of Yosemite,
    while planning future trips to the Canadian Rockies and a family reunion in Vancouver, always budgeting carefully but allowing occasional splurges on local specialty tours.
  culinary: Yu Yeh delights in preparing traditional family dishes like braised pork belly with star anise, steaming whole fish with ginger and scallions, and hand‑rolled dumplings, mastering the balance
    of soy, sesame oil, and rice vinegar, while experimenting with a modest vegetable plot to harvest fresh bok choy and daikon for daily meals.
  core: Yu Yeh is a diligent lifelong learner who balances meticulous organization with spontaneous curiosity, often worrying about finances and health yet finding calm in bonsai, calligraphy, and community
    mentorship.
background:
  cultural: Yu Yeh is of East Asian (Chinese‑Taiwanese) descent, raised in a household that valued education, respect for elders, and community service. He is bilingual in Mandarin and English, and maintains
    cultural ties through celebrating Lunar New Year, observing traditional food customs, and engaging with local Asian cultural organizations in Richmond, CA. His upbringing instilled a blend of collectivist
    values—emphasizing family and community cohesion—with a strong personal drive for academic and professional excellence, shaping his balanced approach to curiosity, practicality, and social interaction.
