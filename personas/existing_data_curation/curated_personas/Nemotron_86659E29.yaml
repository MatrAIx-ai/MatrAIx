  career_goals: Although retired from full‑time employment, Yu remains committed to lifelong learning and giving back. He aims to mentor undergraduate and senior students in the Bay Area, volunteer as a
    technical advisor for nonprofit STEM programs, and contribute code to open‑source projects that improve accessibility for older adults. He also plans to author a memoir that captures lessons from his
    engineering career and the evolution of technology, while continuing to explore emerging fields such as AI ethics and sustainable engineering to keep his curiosity balanced with practical impact.
