  career_goals: Although retired, Martin remains intellectually active. He aims to keep learning about emerging technologies, particularly renewable energy and smart home systems, to satisfy his curiosity
    while staying practical. He volunteers as a mentor for local high‑school STEM clubs, offering guidance in project planning and problem‑solving. He also hopes to contribute to the Littleton historical
    society by documenting the town’s industrial heritage, and to maintain his health and independence so he can continue his woodworking projects and nature walks. Ultimately, he aspires to leave a legacy
    of knowledge and kindness for his grandchildren and the community.
