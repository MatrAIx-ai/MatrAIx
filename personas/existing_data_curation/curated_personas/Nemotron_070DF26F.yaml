  hobbies: '[''Watercolor painting'', ''Poetry writing'', ''Reading speculative fiction'', ''Gardening'', ''Visiting Detroit Institute of Arts'', ''Exploring second‑hand bookstores'', ''Attending intimate
    poetry readings'', ''Yoga and meditation'', ''Experimental cooking'', ''Facilitating a small avant‑garde book club'']'
  career_goals: Diana hopes to turn her art into a modest, home‑based venture by launching an Etsy shop for her watercolor prints and handcrafted accessories, while also publishing a small collection of
    poetry and illustrations that reflect her lifelong fascination with abstract concepts. She plans to complete a certificate in art‑therapy facilitation so she can volunteer at the local senior center,
    using creative projects to help others manage stress. Long‑term, she envisions holding quarterly pop‑up exhibitions at community spaces in Wyandotte and mentoring a tight‑knit circle of fellow hobbyists,
    balancing her desire for personal expression with a gentle contribution to her neighborhood.
