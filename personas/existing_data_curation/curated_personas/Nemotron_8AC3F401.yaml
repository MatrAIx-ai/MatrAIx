    Spanish folk songs"]'
  career_goals: Olga’s primary career goal is to earn a recognized maintenance certification—such as the Certified Maintenance & Reliability Technician (CMRT) or an HVAC license—to increase her earning
    potential and gain more predictable, scheduled work. She hopes to transition from primarily on‑call, irregular hours to a role that offers steadier shifts, which would help alleviate the stress and
    worry she often feels about unpredictable income. In the longer term, she dreams of opening a small family‑run repair service under the name “Camacho Home Repairs,” where she can employ a handful of
    trusted workers, including other women from the Dominican community who are interested in learning the trade. She also wants to serve as a mentor, offering informal workshops on basic home maintenance
    for tenants in her neighborhood, thereby giving back while reinforcing her own expertise.
