persona_description: A geologist who specializes in the study of river systems, specifically focusing on the effects of dams on sediment transport and the impact on the provenance signatures of detrital
  zircon U-Pb ages. This person is interested in understanding the complex interactions between human activities and natural processes, and how these interactions can affect the geologic record. They are
  particularly interested in the use of detrital zircon U-Pb ages as a proxy for understanding the past sedimentary history of a river system, and how anthropogenic modifications such as dams can alter
  this history.
