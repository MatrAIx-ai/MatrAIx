personas:
  professional: Joel Flores, a 21‑year‑old civil engineering junior, blends rigorous structural analysis with a flair for public art, using AutoCAD, Civil 3D, and drone‑derived GIS data to design sustainable
    streetscapes that delight both commuters and the community while working toward a PE license and future senior project leadership.
  sports: Joel Flores competes weekly in Seattle’s ultimate frisbee league, hikes the Cascades, mountain‑bikes Vantage Point trails, and kayaks Puget Sound, cheering on the Seattle Seahawks and Sounders
    while also belonging to a local climbing gym.
  arts: Joel Flores captures the misty interplay of forest and city through photography inspired by Ansel Adams, strums acoustic guitar in a folk band covering Bon Iver, and acts in community theatre productions
    of classic Shakespeare, all while drawing design cues from Frank Lloyd Wright’s organic architecture.
  travel: Joel Flores prefers spontaneous weekend getaways to places like Portland’s food carts, Vancouver’s seawall, and the Scottish Highlands, balancing adventure with a modest travel budget that prioritizes
    bike‑friendly routes and eco‑lodges over luxury hotels.
  culinary: Joel Flores experiments with global cuisines, frequently cooking Korean bibimbap, Indian butter chicken, and Ethiopian injera using fresh Pacific Northwest salmon, but they often over‑season
    dishes and then compensate by ordering sushi for the neighbor’s board‑game night.
  core: Joel Flores fuses engineering precision with artistic curiosity, lives for outdoor group activities, and manages to juggle disciplined savings with occasional overspending on creative gadgets, all
    while occasionally neglecting sleep after late‑night jam sessions.
background:
  cultural: Joel grew up in a middle‑class white family in the Pacific Northwest, absorbing the region’s blend of independent, environmentally conscious values and a vibrant local arts scene. The Snohomish
    community’s strong emphasis on outdoor recreation, sustainability, and collaborative projects has shaped his worldview. While he identifies with mainstream American cultural norms, he also embraces
    the progressive, nature‑focused ethos of Washington state, reflected in his commitment to green design, community service, and lifelong learning. His early marriage underscores a personal dedication
    to partnership and family stability, values that are common in his local cultural context.
