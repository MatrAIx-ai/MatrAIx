  hobbies: '[''Hiking'', ''Mountain biking'', ''Kayaking'', ''Photography (architecture and landscape)'', ''Acoustic guitar'', ''Community theatre'', ''Volunteering with Habitat for Humanity'', ''Ultimate
    frisbee'', ''Board games'', ''Cooking (global cuisines)'']'
  career_goals: Joel aims to earn his Professional Engineer (PE) license within the next three years and progress to senior project manager roles on large‑scale infrastructure projects. He is particularly
    interested in leading initiatives that blend engineering efficiency with public art and community‑focused design, such as pedestrian‑friendly streetscapes, green bridges, and waterfront revitalization
    in Snohomish County. Long‑term, he aspires to start his own consultancy that specializes in sustainable, resilient infrastructure and to contribute to regional planning efforts that prioritize climate
    adaptation and equitable access to public spaces. He also envisions mentoring junior engineers and promoting inclusive, collaborative workplace cultures.
