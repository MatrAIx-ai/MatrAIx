  career_goals: Claudia aims to transition into a senior operations leadership role, such as Director of Operations, where she can shape strategic initiatives that integrate flexibility, employee well‑being,
    and cultural inclusivity. She aspires to develop a corporate wellness program that addresses mental health, drawing on her personal experience with anxiety. Long‑term, she envisions launching a boutique
    consultancy that helps mid‑size firms embed creative thinking and socially responsible practices into their operational frameworks, while maintaining a work‑life balance that supports her family and
    personal passions.
