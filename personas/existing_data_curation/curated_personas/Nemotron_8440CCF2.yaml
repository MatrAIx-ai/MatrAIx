personas:
  professional: Claudia Murillo is a senior operations analyst who transforms messy cross‑functional processes into streamlined, data‑driven workflows using ERP systems and vivid visualizations, while weaving
    her compassion for employee well‑being and love for flexible, improvisational problem‑solving into every strategic initiative.
  sports: Claudia Murillo cheers for the New York Giants and New Jersey Devils, jogs with the New Brunswick Runners club on Saturday mornings, attends community yoga sessions, and dances salsa at local
    cultural nights, though she rarely follows a fixed training schedule, favoring spontaneous movement that fits her flexible mindset.
  arts: Claudia Murillo frequents the Newark Museum of Art and MoMA, captures candid street moments with her Leica camera, paints watercolors of everyday scenes, and immerses herself in experimental music
    performances by artists like Flying Lotus and Animal Collective, while citing Frida Kahlo’s bold self‑portraiture as an enduring source of inspiration.
  travel: Claudia Murillo plans trips with a loose itinerary, recently returned from a soulful pilgrimage to Oaxaca’s vibrant markets and Día de los Muertos festivities, while also exploring Kyoto’s temples
    on a whim, loves staying in family‑run guesthouses that offer authentic home‑cooked meals, and often squeezes weekend getaways to the Catskills when family obligations allow.
  culinary: Claudia Murillo experiments in the kitchen with mole, pozole, and handmade tamales using roasted chiles, cacao, and masa, delights in the fresh zest of avocado‑lime salsa, pairs her cooking
    with occasional Korean BBQ nights, and enjoys tasting dishes like ceviche and ramen at boutique eateries, though she sometimes forgets the simmer timer when multitasking with a podcast.
  core: Claudia Murillo, a 37‑year‑old operations strategist, fuses analytical precision with artistic curiosity, compassionate mentorship, and a delightfully improvisational approach to work and life.
background:
  cultural: Claudia is a first‑generation Mexican‑American whose family roots trace back to the states of Oaxaca and Jalisco. Growing up in a bilingual household, she speaks both Spanish and English fluently
    and carries forward traditions such as Día de los Muertos celebrations and family‑centric gatherings. The Mexican cultural emphasis on community, hospitality, and vibrant artistic expression informs
    her compassionate nature and love for the arts. In New Jersey, she stays connected to the local Mexican diaspora through cultural festivals, community cooking classes, and a network of extended family
    who visit regularly, blending heritage with her professional life.
