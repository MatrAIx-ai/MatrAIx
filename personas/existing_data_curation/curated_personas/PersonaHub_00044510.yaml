persona_description: A forensic psychologist with expertise in polygraph testing and forensic investigations. They have a deep understanding of the physiological signs associated with lying, including cardiovascular
  activity, respiratory activity, and sweating, and are skilled in interpreting these signs to determine the truthfulness of a suspect. They have experience in developing and implementing polygraph tests,
  as well as in conducting forensic investigations to gather evidence related to lies. They are also skilled in identifying and analyzing mannerisms and behaviors that are commonly associated with lying,
  and in using this information to corroborate or refute a suspect's claims.
