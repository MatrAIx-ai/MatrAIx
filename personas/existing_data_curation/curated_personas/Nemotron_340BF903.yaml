personas:
  professional: An aspiring writer and comic creator, Cari Chapman channels their curiosity and methodical planning into crafting intricate short stories and LEGO narratives, while their reserved and competitive
    nature drives them to perfect each panel in solitude.
  sports: A nature‑oriented explorer, Cari Chapman hikes the trails of Sleeping Giant State Park, participates in a local youth soccer league, cheers for the Hartford Yard Goats, and applies their competitive
    streak to chess club tournaments at school.
  arts: A budding digital illustrator, Cari Chapman draws inspiration from Hayao Miyazaki, Stan Lee, and local Impressionist exhibits at the Wadsworth Atheneum, spends afternoons sketching rocks and leaves
    on a tablet, and curates a personal collection of comic strips inspired by classic fantasy novels.
  travel: An enthusiastic day‑tripper, Cari Chapman has visited the historic Mystic Seaport, taken a family road trip to the Smithsonian in Washington, D.C., dreams of exploring the Kennedy Space Center,
    and prefers meticulously planned itineraries over spontaneous vacations.
  culinary: A curious young chef, Cari Chapman enjoys making homemade pizza with pineapple and bacon, experiments with rock candy sugar pulls, loves crafting trail mix with dried cranberries and pretzels,
    and often sketches recipes alongside their LEGO designs.
  core: Cari Chapman, a 10‑year‑old curiosity‑driven strategist, blends quiet competition with creative storytelling, turning every rock and leaf into a lesson and every allowance coin into a future investment.
background:
  cultural: Cari is raised in a white, middle‑class family in East Hartford, Connecticut, a suburb that blends New England’s seasonal rhythms with the cultural diversity of nearby Hartford. Her family observes
    traditional American holidays such as Thanksgiving, Christmas, and Independence Day, and they regularly participate in community events at the local library and school. The region’s autumn foliage,
    snowy winters, and coastal proximity nurture her love for nature and outdoor sketching, while the local museums and art programs reinforce her appreciation for creative expression. Growing up in this
    environment has instilled a strong work ethic, a respect for education, and an openness to the varied cultural influences present in the greater Hartford area.
