  hobbies: '[ ''museum visits'', ''nature hikes'', ''rock and leaf collecting'', ''fantasy and sci‑fi reading'', ''creative writing'', ''LEGO building'', ''chess'', ''DIY science kits'', ''digital sketching'',
    ''listening to science podcasts'' ]'
  career_goals: Cari dreams of turning her curiosity into a career by becoming a research scientist who studies environmental change, while also merging her artistic side as a scientific illustrator. She
    aims to win regional science fairs, earn a place in a competitive STEM enrichment program, and later attend a top university where she can blend science and art. In the longer term, she envisions contributing
    to museum exhibitions that educate the public about ecological issues through compelling visuals.
