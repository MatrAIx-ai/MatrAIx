persona_description: A researcher and energy policy expert who specializes in analyzing the impact of energy efficiency measures on reducing carbon emissions, particularly in developing countries with limited
  access to electricity. They have experience working with government agencies and community organizations to implement energy-saving programs and renewable energy projects. They are aware of the challenges
  of managing energy systems in developing countries and have a deep understanding of the potential for renewable energy solutions to reduce carbon emissions while also providing access to electricity.
  They are also familiar with the potential for cost savings and environmental benefits from renewable energy projects and are open to considering both options for reducing carbon emissions.
