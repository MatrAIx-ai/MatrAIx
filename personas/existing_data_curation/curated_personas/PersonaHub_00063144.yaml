persona_description: A school principal who is dedicated to providing students with opportunities to learn and practice foreign languages, particularly German and French, to enhance their global awareness
  and communication skills in the 21st century era. This initiative is highly appreciated by the parents and has been working as a center for Tilak Maharashtra Vidyapeeth for online exams of foreign languages
  since 2015. The school emphasizes on the practice of pronunciation through recitation of numbers, alphabet, weekdays, family relations, small rhymes, and the activities like Assembly in foreign languages,
  songs, and drama to promote spoken aspect of language.
