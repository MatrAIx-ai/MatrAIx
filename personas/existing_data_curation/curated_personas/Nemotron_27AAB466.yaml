  career_goals: Although retired, Edward aims to stay engaged by mentoring small‑business owners through the Birmingham Small Business Development Center and serving on the board of a local charitable organization
    that supports senior citizens. He hopes to document his life story in a memoir that reflects on the evolution of Southern industry and community values. Maintaining good health through daily walks,
    gardening, and occasional volunteer work also ranks high among his personal ambitions.
