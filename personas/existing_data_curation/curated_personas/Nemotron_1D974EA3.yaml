personas:
  professional: A pipefitting apprentice with a knack for meticulous documentation, Madeline Mathias leverages her solid technical expertise in steamfitting, welding, and OSHA compliance while balancing
    routine‑driven work habits with a collaborative crew mindset, aiming to secure her journeyman license and eventually launch a locally‑owned plumbing business that mentors women in the trades.
  sports: A weekend jogger and avid angler, Madeline Mathias follows the Virginia Tech Hokies football team, roots for the Washington Nationals, and belongs to a local fishing club that meets at the Dan
    River, while also keeping a casual membership at a community gym for strength training.
  arts: A mandolin enthusiast, Madeline Mathias plays bluegrass standards from Bill Monroe and Alison Krauss in an informal jam group, attends the Roanoke Folk Festival, and volunteers as a choir accompanist
    for her church, letting the music of Appalachian roots shape her free‑time rhythm.
  travel: A pragmatic traveler with a modest budget, Madeline Mathias enjoys road trips to the Blue Ridge Parkway, weekend fishing trips to the Great Smoky Mountains, and yearly pilgrimages to the Nashville
    Bluegrass Festival, while dreaming of a cultural tour of Ireland’s music villages.
  culinary: A Southern‑style home cook, Madeline Mathias perfects buttermilk biscuits and fried chicken seasoned with cayenne and garlic powder, loves to harvest garden tomatoes, collard greens, and sweet
    corn for side dishes, and frequently experiments with a dash of smoked paprika in her mashed potatoes.
  core: Madeline Mathias blends a love for routine, pipefitting precision, bluegrass mandolin jams, and Southern cooking into a down‑to‑earth lifestyle marked by early morning jogs, a penchant for mentoring
    women in trades, and a habit of over‑watering her garden when she’s not on the job.
background:
  cultural: Madeline grew up in Burnside, a small town in Pulaski County, Kentucky, within a white Appalachian family that values hard work, self‑reliance, and community ties. Her upbringing was shaped
    by Southern hospitality, regular church attendance, and family gatherings centered around home‑cooked meals and folk music. Local customs such as the county fair, bluegrass festivals, and a strong sense
    of neighborhood support have reinforced a practical, modest worldview that aligns with her traditional, routine‑focused personality.
attributes:
  skills: '["Pipefitting", "Steamfitting", "Industrial Plumbing", "Blueprint Reading", "Welding", "Safety Compliance", "Equipment Maintenance", "Troubleshooting", "Customer Service", "Team Collaboration",
