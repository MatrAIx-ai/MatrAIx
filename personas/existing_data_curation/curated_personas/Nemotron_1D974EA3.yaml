  hobbies: '["Morning jogging", "Fishing", "Vegetable gardening", "Mandolin playing (bluegrass)", "Cooking Southern cuisine", "Church volunteer work", "County fair volunteer"]'
  career_goals: Madeline aims to obtain her journeyman plumbing license within the next 12 months and subsequently pursue master pipefitter certification. She envisions eventually owning a small, locally‑run
    plumbing and pipe‑fitting business in Burnside, providing reliable services to the community. A secondary ambition is to mentor other women entering the trades, possibly through partnerships with local
    trade schools. She also plans to complete a certificate in construction project management to broaden her business acumen.
