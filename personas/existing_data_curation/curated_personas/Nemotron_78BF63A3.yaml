  career_goals: Shannon hopes to attend a high school with a strong arts program and eventually pursue a Bachelor of Fine Arts, aiming to become an art therapist or visual storyteller who can help other
    youths process emotions through creative media. She also envisions working in a museum or gallery setting where she can design interactive exhibits that encourage unconventional thinking and emotional
    connection.
