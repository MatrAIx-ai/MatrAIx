personas:
  professional: Shannon Gaston is an aspiring visual storyteller who blends hand‑drawn character sketches with digital painting tools, leveraging a meticulous notebook habit to brainstorm ideas while navigating
    the occasional anxiety‑induced creative block.
  sports: Shannon Gaston enjoys weekly nature walks along the Missouri River as part of the River Runners youth club, follows the St. Louis Cardinals and the local high‑school cross‑country team for inspiration,
    and treats fitness as a mental‑health anchor rather than a competitive pursuit.
  arts: Shannon Gaston immerses themselves in drawing fantasy heroes from graphic novels, draws inspiration from artists like Hayao Miyazaki and Rebecca Sugar, listens to indie musicians such as Bon Iver
    and Joanna Newsom, and volunteers at the library’s art corner to share their love of sketching with peers.
  travel: Shannon Gaston prefers low‑key weekend getaways to scenic spots like the Ozark National Forest and the Smithsonian American Art Museum in Washington, D.C., planning trips using a shared family
    spreadsheet while dreaming of a future solo pilgrimage to the historic streets of Edinburgh, Scotland.
  culinary: Shannon Gaston favors simple, comforting meals such as avocado toast sprinkled with chili flakes, homemade veggie stir‑fry with tamari, and occasional sushi rolls featuring tuna and cucumber,
    while often experimenting with pastel‑colored smoothies for a creative twist on breakfast.
  core: Shannon Gaston is a quietly ambitious teen who channels curiosity and art‑obsession into daily sketches, balances cautious saving with occasional splurges on supplies, wrestles with anxiety through
    mindfulness, and finds calm in riverside walks and indie melodies.
background:
  cultural: Shannon grew up in a predominantly white, middle‑class neighborhood in St. Charles, Missouri, where Midwestern values of community, modesty, and appreciation for the outdoors shape daily life.
    Family traditions include weekend visits to local parks and participation in community events like the St. Charles Art Fair. Her upbringing blends suburban school life with exposure to regional cultural
    sites such as the Missouri River waterfront, the historic Main Street, and the nearby Lewis and Clark Discovery Center, fostering an appreciation for local history and modest artistic expression.
