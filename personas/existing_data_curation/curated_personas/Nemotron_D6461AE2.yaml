  career_goals: In the short term, Marylynn aims to earn a shift‑supervisor certification and take a supervisory course offered by her employer. She plans to enroll in evening classes for a Supply Chain
    Management associate degree at Tallahassee Community College, positioning herself for a logistics coordinator role within the next three years. Long‑term, she aspires to become a warehouse operations
    manager, leading a team that implements continuous‑improvement initiatives and embraces new technologies such as automation and data‑driven inventory forecasting. She also hopes to mentor younger workers,
    sharing her organized work ethic and curiosity for innovative solutions.
