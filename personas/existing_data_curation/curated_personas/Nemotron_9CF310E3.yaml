personas:
  professional: Mirta Feliciano is a budding young scientist who spends hours building block towers and asking endless 'why' questions, turning their curiosity into early experimentation while they prefer
    solitary discovery over group projects.
  sports: Mirta Feliciano enjoys swinging on the playground and joining the 'Sunny Sprouts' toddler soccer group, they cheer quietly for the hometown basketball team the City Hawks while preferring solitary
    hopping games over noisy matches.
  arts: Mirta Feliciano spends afternoons drawing whimsical creatures inspired by Eric Carle's collage style, and they hum the tunes of the animated film 'Moana', especially the song 'How Far I'll Go' by
    Auli'i Cravalho, which fuels their appreciation for vibrant colors and simple melodies.
  travel: Mirta Feliciano loves the sensory adventure of visiting the city zoo, the glimmering aquarium in nearby Baytown, and dreams of seeing the sand dunes of Dubai, they prefer meticulously packed car
    rides over chaotic airport experiences.
  culinary: Mirta Feliciano delights in scooping bright orange macaroni into a bowl, slathering it with cheddar sauce, and occasionally mixing batter for banana pancakes, they favor sweet flavors like honey
    and strawberries, while sometimes forgetting to eat their vegetables.
  core: Mirta Feliciano is a quietly curious five‑year‑old who thrives on solitary exploration, hoards tiny treasures, and balances a gentle generosity with a stubborn streak for personal space, and they
    often retreat to a quiet corner with a favorite book.
background:
  cultural: Mirta was born to Mexican immigrant parents who settled in Denver, Adams County. Spanish is spoken at home, and she celebrates Mexican holidays such as Día de los Muertos and Navidad with family
    traditions like making papel picado, cooking tacos and tamales, and listening to mariachi music. The neighborhood community is diverse, exposing her to both Mexican cultural events (e.g., local festivals
    and dance classes) and typical American activities. This blend of Mexican heritage and Colorado upbringing shapes her love for colorful art, bilingual language skills, and appreciation for both cultural
    worlds.
attributes:
  skills: '["basic drawing with crayons and watercolors", "color recognition in English and Spanish", "counting to 20", "letter identification (uppercase and lowercase)", "story retelling", "fine‑motor
    craft work (cutting, gluing, assembling puzzles)", "basic nature observation (identifying insects and plants)", "following simple multi‑step instructions"]'
  hobbies: '["drawing and coloring with bright pigments", "reading picture books", "listening to traditional Mexican lullabies and children''s songs", "collecting leaves, rocks, and sticks for crafts",
    "building with LEGO and wooden blocks", "making paper chains and simple crafts", "helping in the kitchen with easy food prep (e.g., stirring batter)", "quiet imaginative play and story creation"]'
  career_goals: Mirta dreams of becoming a painter who creates bright, story‑filled pictures that celebrate her family’s Mexican heritage. She also imagines writing her own picture books and exploring science
    as a young astronomer or biologist to learn how things grow. She hopes to travel to Mexico someday to see the places her parents talk about, and she wants to become fluent in reading and writing in
    both English and Spanish so she can share her stories with a wider audience. While she values creative work, she prefers a quiet, solo studio or her own cozy corner at home where she can focus without
    interruption.
