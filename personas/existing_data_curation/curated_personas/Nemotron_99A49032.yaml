  career_goals: Richard envisions pursuing a career that blends his artistic talents with technology. He aims to attend a high school with a strong visual arts program and later earn a BFA in illustration
    or concept art, with the goal of becoming a concept artist for video games or a freelance graphic designer. He also dreams of building a personal portfolio that includes a webcomic and a curated digital
    gallery, eventually working with a museum or cultural center to design exhibitions that showcase contemporary art and celebrate the unique cultural heritage of the Gulf Coast. His long‑term ambition
    is to create work that challenges conventional ideas while remaining financially sustainable.
