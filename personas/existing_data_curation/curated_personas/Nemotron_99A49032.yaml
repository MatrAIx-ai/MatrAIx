personas:
  professional: Richard Dirling is an aspiring visual storyteller who spends their afternoons sketching elaborate sci‑fi landscapes and experimenting with digital painting on a tablet, channeling their
    disciplined yet flexible nature into detailed concept art for school projects and the local art club, while their reserved temperament makes them prefer solo creative sessions to large‑scale collaborations.
  sports: Richard Dirling follows the New Orleans Saints in football and the Pelicans in basketball, plays pick‑up basketball with classmates at the community center, enjoys weekend fishing trips in the
    bayou, and maintains a light fitness routine of biking around Metairie, preferring low‑pressure, small‑group activities over competitive sports and they often join their friends for these casual outings.
  arts: Richard Dirling engages deeply with the arts through sketching daily in a battered notebook, crafting digital paintings inspired by sci‑fi novels, capturing neighborhood scenes on a camera, listening
    to Louis Armstrong’s trumpet, the Preservation Hall Jazz Band, and B.B. King’s blues, attending intimate gigs at local cafés, collecting vintage comic books by Jack Kirby, and practicing basic piano
    chords, which together shape their creative identity and provide a quiet yet vibrant outlet for expression.
  travel: Richard Dirling prefers short, adventurous trips that blend cultural immersion with relaxation, such as exploring the historic French Quarter during Mardi Gras, taking day trips to the Barataria
    Bay swamps for airboat tours, and dreaming of visiting Tokyo’s anime districts and the jazz clubs of Paris, while their limited allowance and school schedule steer them toward weekend getaways rather
    than extended overseas vacations.
  culinary: Richard Dirling enjoys the bold flavors of Cajun and Creole cuisine, regularly helping their family prepare gumbo with shrimp, andouille sausage, and okra, savoring spicy jambalaya and the iconic
    po'boy with fried catfish, experimenting with homemade beignets on weekends, yet their cooking skill remains at a beginner level, often relying on step‑by‑step videos while they proudly claim the title
    of the household’s official taste‑tester.
  core: Richard Dirling is a quietly curious teen who channels a love of sci‑fi storytelling and New Orleans’ musical heritage into solitary sketching and digital art, balancing meticulous budgeting with
    occasional comic‑book splurges, while they juggle mild asthma, occasional sleep‑deprivation from gaming, and a steadfast appetite for spicy gumbo and jazz.
background:
  cultural: Richard is a white adolescent raised in Metairie, a suburban community of New Orleans in Jefferson Parish. He grew up immersed in Southern hospitality and Catholic traditions, regularly participating
    in church events and community celebrations. The vibrant cultural tapestry of the Gulf Coast—Mardi Gras festivities, Cajun and Creole culinary flavors, and the city's iconic jazz and blues scene—has
    shaped his appreciation for diverse artistic expressions. While his family roots trace back to other parts of the Southern United States, his daily life is marked by the multicultural influences of
    New Orleans, from attending local art fairs to enjoying regional foods like gumbo, jambalaya, and po'boys. This blend of Southern and Creole heritage informs his curiosity about art, music, and cultural
    history.
