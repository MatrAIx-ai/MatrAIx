personas:
  professional: Juan Lopez, a six‑year‑old aspiring engineer, channels their love of Lego construction and level‑based puzzle games into hands‑on experiments, displaying a practical focus and a competitive
    streak that drives them to perfect every build.
  sports: Juan Lopez spends afternoons at the park playing soccer with the Little Strikers youth club, follows the local professional team Seattle Sounders FC, and competes in weekend matches, balancing
    a drive to win with occasional frustration when the game doesn’t go their way.
  arts: Juan Lopez enjoys drawing video‑game scenes, listening to merengue and bachata beats from artists like Juan Luis Guerra and Aventura, and reading bilingual bedtime stories by Alma Flor Ada, letting
    these artistic influences shape their vivid imagination and creative play.
  travel: Juan Lopez has taken family road trips to the nearby lake, visited the historic streets of San Juan, and dreams of exploring the Eiffel Tower in Paris and the neon lights of Tokyo on future school‑organized
    outings.
  culinary: Juan Lopez loves spaghetti with meatballs, mango salsa, and cheese quesadillas, enjoys helping their parents stir the sauce, and prefers sweet fruit snacks like sliced banana over sugary cereals,
    often asking for extra cheese on their dishes.
  core: Juan Lopez balances a competitive spark with a love for structured play, often demanding order in Lego builds while secretly hoarding extra crayons for midnight doodles.
background:
  cultural: Juan comes from a Dominican family rooted in the Bronx. At home, Dominican Spanish is spoken daily, and family gatherings feature traditional foods like mangú, pasteles, and empanadas. He participates
    in community celebrations such as Dominican Independence Day parades and local salsa dances. The vibrant Dominican diaspora in the Bronx provides him with strong cultural ties, exposure to Caribbean
    music, role models in baseball and soccer, and a bilingual environment that shapes his identity.
