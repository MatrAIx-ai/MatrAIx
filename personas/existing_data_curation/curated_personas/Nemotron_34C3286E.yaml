  career_goals: Juan dreams of future roles that combine his love for structure, responsibility, and helping others. He often talks about becoming a firefighter or a police officer, seeing these jobs as
    organized, community‑focused, and reliable. He also imagines designing safe playgrounds or city streets, so he sometimes says he wants to be a civil engineer or a city planner, reflecting his desire
    for purposeful, predictable work that benefits his neighborhood.
