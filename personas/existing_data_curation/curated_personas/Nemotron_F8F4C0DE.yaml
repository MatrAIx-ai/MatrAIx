personas:
  professional: Shawnelle Aguilar, a veteran correctional officer at Tensas Parish Detention Center, blends a hands‑on command of security protocols, precise incident reporting, and a natural flair for
    mentoring new staff, using their curiosity about restorative justice and relaxed, adaptable demeanor to de‑escalate tense situations while fostering teamwork on the floor.
  sports: Shawnelle Aguilar stays active by coaching youth softball for the Bayou Kids league, playing weekend pickup basketball with the St. Francis Community Court crew, cheering for the New Orleans Saints
    and LSU Tigers, and casting a line on Bayou Macon whenever a quiet afternoon opens up.
  arts: Shawnelle Aguilar relishes live zydeco at the Bayou Bar—swaying to Buckwheat Zydeco and Clifton Chenier—while also attending country shows featuring Dolly Parton covers, taking the mic at karaoke
    nights, and quoting favorite true‑crime podcasts in informal book‑club gatherings, all of which shape a colorful, eclectic artistic palette.
  travel: Shawnelle Aguilar prefers spontaneous road trips that blend fishing expeditions on the Atchafalaya Basin with weekend visits to the bustling streets of New Orleans for Mardi‑Gras revelry, occasionally
    escaping to historic Savannah for a quiet stay, yet careful to budget travel around a modest salary and family responsibilities.
  culinary: Shawnelle Aguilar cooks at an intermediate level, regularly perfecting gumbo with okra, roux, andouille sausage, crafting red beans and rice with smoked turkey, and tossing fresh garden tomatoes
    into a seasonal collard‑green sauté, while also indulging in spontaneous bar‑food challenges like giant crawfish boils when out with friends.
  core: Shawnelle Aguilar navigates life with a blend of curiosity‑driven pragmatism and easy‑going spontaneity, balancing a demanding security career, vibrant community involvement, and a love for Southern
    flavor, even if their laid‑back nature sometimes lets paperwork slip through the cracks.
background:
  cultural: Shawnelle grew up in Waterproof, a small town steeped in Southern tradition and the agrarian heritage of Tensas Parish. Her family has lived in the area for generations, maintaining close ties
    to the local church and community events. Although she identifies as white, the cultural tapestry of the region—marked by Cajun, Creole, and country influences—has shaped her tastes in music, food,
    and celebrations. She was raised on the values of southern hospitality, practicality, and a strong work ethic, learning early the importance of self‑reliance and community support. The slow‑paced, close‑knit
    environment of her hometown has fostered her sociable nature, and the cyclical rhythms of farming and flood seasons have given her a pragmatic view of life's challenges. Her cultural outlook blends
    reverence for tradition—such as church gatherings, local festivals, and home‑cooked meals—with an openness to new ideas, reflecting the balance described in her personality profile.
