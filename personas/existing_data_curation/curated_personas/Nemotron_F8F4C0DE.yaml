  career_goals: Given her age and experience, Shawnelle aims to formalize her education by obtaining a GED and pursuing an associate degree in criminal justice. She sees herself moving into a supervisory
    role, such as shift sergeant or training officer, where she can leverage her people‑skills to mentor younger officers. She also harbors an ambition to become a deputy warden or a community corrections
    supervisor, focusing on rehabilitation programs that combine practical security with supportive services. Her curiosity fuels a wish to attend state‑run workshops on restorative justice and crisis intervention.
    Long‑term, she envisions opening a small safety consulting business serving local schools and farm operations, applying her pragmatic knowledge of risk assessment.
