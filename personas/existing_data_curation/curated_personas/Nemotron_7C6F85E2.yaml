  career_goals: Though retired, Tina aims to remain an active contributor to her community. She plans to launch an oral‑history project that records stories of long‑time Alliance residents, preserving local
    heritage for future generations. She also hopes to write and self‑publish a memoir of her life’s anecdotes, learning more about digital publishing tools along the way. Beyond that, Tina wants to continue
    mentoring new volunteers at the senior center and perhaps take a short community‑college course on genealogy to trace her family roots more deeply.
