  career_goals: Devon aims to transition from her current administrative assistant role into an office manager or senior executive assistant position within the next three to five years. She plans to earn
    the Certified Administrative Professional (CAP) credential and enroll in part‑time coursework toward a Master’s in Business Administration, focusing on operations management. Her ambition is to lead
    a small administrative team, implement efficiency‑boosting systems, and serve as a strategic liaison between senior leadership and staff. While pursuing these professional milestones, she also strives
    to maintain a work‑life balance that supports her family and personal well‑being.
