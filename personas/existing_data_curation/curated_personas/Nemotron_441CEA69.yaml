personas:
  professional: Marwan Hightower, an undergraduate elementary education student with a knack for merging Google Classroom tools and Indigenous storytelling, designs flexible lesson plans that weave digital
    interactivity with traditional narratives, though they sometimes let loose organization slip in favor of spontaneity.
  sports: Marwan Hightower enjoys weekend hikes in the De Pere trail system, follows the Green Bay Packers and Milwaukee Bucks on TV, and participates in a local co‑ed recreational soccer league where they
    appreciate the community focus over competition.
  arts: Marwan Hightower nurtures an acoustic guitar habit, often covering folk standards by Joan Baez and contemporary songwriter Iron & Wine, while also crafting beadwork and small wooden sculptures that
    echo family stories, and they unwind by listening to mythology podcasts and reading fiction by N. K. Jemisin.
  travel: Marwan Hightower prefers low‑key road trips to natural sites like Door County, the Upper Peninsula of Michigan, and the Canadian Shield, planning itineraries loosely with a mix of spontaneous
    detours and a few must‑see spots like Glacier National Park, though financial constraints keep long‑haul trips like a solo voyage to Japan on the wish list.
  culinary: Marwan Hightower enjoys cooking simple, hearty meals such as wild‑rice soup with local mushrooms, grilled trout seasoned with spruce tips, and they often experiment with making birch‑bark tea,
    yet their habit of leaving ingredients unattended sometimes results in over‑cooked pasta.
  core: Marwan Hightower is a quietly compassionate 21‑year‑old who balances curiosity with a laid‑back, occasionally disorganized lifestyle, channeling that mix into teaching, music, and a love of the
    outdoors.
background:
  cultural: Marwan is a member of the Menominee Nation, whose ancestral lands span the Great Lakes region of Wisconsin. He was raised in a household where oral storytelling, respect for the land, and communal
    responsibility were daily teachings. His family maintains connections to tribal ceremonies, language classes, and seasonal gatherings, which have instilled in him a deep sense of cultural pride and
    a commitment to sharing that heritage with others. These values shape his approach to teaching, emphasizing relational learning, environmental stewardship, and the inclusion of Indigenous perspectives
    in the wider curriculum.
attributes:
  skills: '[''Flexible lesson planning'', ''Digital instruction (Google Classroom, educational apps)'', ''Integrating Indigenous perspectives into curriculum'', ''Small-group facilitation'', ''Peer conflict
    mediation'', ''Community partnership development'', ''Basic first aid'', ''Conversational Menominee language'']'
  hobbies: '[''Hiking and trail walking'', ''Nature photography'', ''Acoustic guitar playing'', ''Beadwork and woodworking'', ''Cooking fusion recipes'', ''Reading mythology and fiction'', ''Podcast listening
    (education & Indigenous topics)'', ''Yoga and meditation'', ''Board games with spouse and close friends'']'
  career_goals: Marwan aims to complete his bachelor’s degree in elementary education and obtain state certification within the next two years. He aspires to become a full-time teacher who specializes in
    culturally responsive pedagogy for Native American students and their peers. In the medium term, he wants to design and lead an after-school mentorship program that connects tribal youth with elders
    and modern STEM activities. Long-term, he envisions pursuing a master’s in educational leadership to serve as a school administrator or community liaison, shaping policies that promote equity and preserve
    Indigenous knowledge in the classroom.
