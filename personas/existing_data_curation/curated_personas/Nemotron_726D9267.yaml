  career_goals: Although retired from formal employment, Beverly’s ambitions focus on giving back to her community and nurturing personal growth. She aims to become a mentor for younger volunteers at the
    senior center, help preserve local oral histories by recording stories of longtime residents, and compile a family memoir that celebrates her roots. Maintaining her health remains a priority, so she
    plans to keep attending weekly tai chi classes and take up a beginner’s piano course. She also hopes to deepen her digital skills by joining a senior photography workshop and to serve as an ambassador
    for the Fort Wayne public library’s outreach programs.
