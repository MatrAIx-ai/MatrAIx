personas:
  professional: Araceli Ramirez, an aspiring junior coder and little designer, uses Scratch to create interactive stories and prototype tiny games, applying their methodical planning and curiosity to organize
    blocks like building bricks, while also sketching UI ideas with bright colors reminiscent of woven patterns.
  sports: Araceli Ramirez, a spirited member of the neighborhood “Sunnydale Soccer Club” U‑9 team, loves sprinting down the field for the River Rapids junior squad while idolizing forward Alex Morgan; they
    enjoy the camaraderie of weekend games, but often skip warm‑up stretches, leading to occasional crampy calves, and they track their soccer practice minutes in a bright notebook.
  arts: Araceli Ramirez, a vibrant young visual artist, spends afternoons drawing and painting bold, geometric patterns inspired by traditional woven textiles, and they frequently reference the works of
    Henri Matisse and contemporary muralist Diego Rivera; they also curate a tiny collage of favorite Latin folk songs from artists like Carlos Vives, which they play while they create.
  travel: Araceli Ramirez, an eager explorer, loves day trips to the local botanical garden and the historic lighthouse on the coast, and they dream of visiting the cloud forests of Costa Rica and the ancient
    ruins of Machu Picchu someday; they prefer family road trips with a well‑packed snack stash, planning each outing with a checklist of 'must‑see' bugs and sketches.
  culinary: Araceli Ramirez, a budding food enthusiast, adores bright, fresh dishes such as mango‑lime salsa, rainbow fruit salad with strawberries, kiwi, and blueberries, and they proudly help their family
    bake chocolate chip cookies, often adding extra sprinkles for color; they favor crunchy tortilla chips dipped in guacamole and experiment with blending colors on their plate as a form of edible art.
  core: Araceli Ramirez blends bright artistic flair with methodical curiosity, saving allowance for LEGO, managing seasonal allergies, and scoring soccer goals while humming Latin folk tunes.
background:
  cultural: Araceli comes from a Guatemalan family that maintains strong cultural ties, speaking Spanish at home and celebrating traditions such as Día de los Muertos, Semana Santa, and the making of tamales.
    Growing up in Camden, Delaware, she blends these customs with local American holidays and school activities, creating a bicultural identity. Her heritage influences her appreciation for vibrant colors,
    rhythmic music, and stories about Maya history, which she often shares with classmates and friends.
