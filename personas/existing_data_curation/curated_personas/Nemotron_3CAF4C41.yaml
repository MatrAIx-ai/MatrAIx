  hobbies: '[''Drawing and painting'', ''Reading picture books'', ''Building LEGO sets'', ''Exploring nature and bug collecting'', ''Playing soccer'', ''Listening to Latin folk music'', ''Basic Scratch
    coding'', ''Crafting with recycled materials'']'
  career_goals: Araceli imagines a future where she can combine her love of art and her curiosity about the world. She dreams of becoming an illustrator or a museum guide who shares stories of Guatemalan
    culture with others, and she also envisions helping younger children learn through creative projects. Her organized and reliable nature fuels her ambition to lead community art workshops and perhaps
    one day work as a cultural educator or children's author.
