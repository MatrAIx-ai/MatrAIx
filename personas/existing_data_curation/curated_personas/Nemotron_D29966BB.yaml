personas:
  professional: Belarmina Castillo is a preschool prodigy who loves building LEGO constructions, asks endless "why" questions, and demonstrates early leadership during group projects, balancing organized
    play with spontaneous imagination, and they eagerly share newfound ideas with classmates.
  sports: Belarmina Castillo dashes around the playground playing tag, attends the Tumble Tots FC preschool soccer clinic on Saturdays, proudly wears a Los Angeles Dodgers cap while watching baseball with
    family, loves beginner swimming lessons at the community pool, and they balance energetic bursts with occasional moments of quiet observation.
  arts: Belarmina Castillo paints whimsical scenes inspired by Van Gogh’s Sunflowers, sings along to Idina Menzel’s ‘Let It Go’ from Frozen, watches Pixar’s Toy Story for imaginative storytelling, and they
    often reenact favorite characters like Moana during playtime, showing a vivid artistic imagination.
  travel: Belarmina Castillo enjoys weekend trips to the local aquarium, remembers a magical day at Disneyland in California, dreams of seeing the Eiffel Tower in Paris, loves family road trips where they
    collect seashells on the beach, and they frequently ask for new adventure books to fuel their wanderlust.
  culinary: Belarmina Castillo adores cheesy macaroni, peanut butter and jelly sandwiches with crunchy grape jelly, giggles while stirring chocolate chip cookie dough under adult supervision, insists on
    adding sprinkles to plain yogurt, and they are a picky eater who refuses broccoli but loves sweet potatoes.
  core: Belarmina Castillo is a curious five‑year‑old who blends organized LEGO building with spontaneous storytelling, hoards glittery stickers, forgets bedtime brushing, and bursts into song whenever
    a familiar cartoon tune plays, and they often brighten the room with their infectious imagination.
background:
  cultural: Belarmina grows up in a Dominican‑American household in Brooklyn, where Spanish and English are spoken interchangeably. Family gatherings feature traditional foods like mangú and pastelitos,
    lively Dominican music, and celebrations of cultural holidays such as Dominican Independence Day and Carnaval. She is surrounded by a vibrant community of Dominican neighbors, which influences her love
    for music, dance, and storytelling rooted in Caribbean traditions.
