personas:
  professional: Ronald Lyman, a veteran wholesale and retail buyer with a business degree, translates decades of procurement expertise, sharp negotiation skills, and a pragmatic, stress‑aware approach into
    strategic sourcing leadership while balancing a love for structure with a flexible, community‑focused mindset.
  sports: Ronald Lyman, a relaxed fan of the Orlando Magic and Tampa Bay Buccaneers, spends his free weekends fishing on Lake Tohopekaliga, walking the local nature trail, and participating in a senior
    bowling league, while occasionally joining a church softball team for friendly competition.
  arts: Ronald Lyman, an avid reader of historical biographies and a hands‑on woodworker, finds artistic fulfillment in crafting furniture, attending classic car shows, and listening to gospel and blues
    legends like Mahalia Jackson and B.B. King, with occasional trips to the local historical museum.
  travel: Ronald Lyman, a low‑key road‑trip enthusiast, prefers leisurely drives to Savannah, Charleston, and the Great Smoky Mountains, combining his love of Southern cuisine with fishing opportunities,
    while planning trips around his church calendar and budget constraints.
  culinary: Ronald Lyman, a competent home cook, blends garden‑fresh vegetables and citrus into Southern‑style meals such as fried catfish, collard greens, and peach‑glazed pork, often perfecting his famous
    peach cobbler, though he sometimes over‑season out of habit.
  core: Ronald Lyman navigates life with a structured yet flexible outlook, merging seasoned procurement expertise, community compassion, and a quiet love for fishing, woodworking, and classic cars, all
    while wrestling with occasional worry and a penchant for late‑night budgeting.
background:
  cultural: Ronald was raised in a middle‑class white family that settled in central Florida after relocating from the Midwest. His upbringing was steeped in Protestant (Methodist) traditions, emphasizing
    hard work, modesty, hospitality, and community service. The Floridian lifestyle—outdoor recreation, a relaxed pace, and strong family ties—blended with Southern‑influenced values of respect and generosity.
    This cultural mix shapes his practical outlook, his commitment to helping others, and his preference for small, close‑knit gatherings over large social events.
