  hobbies: '[''Vegetable Gardening'', ''Walking the Bay Trail'', ''Hiking Coastal Hills'', ''Traditional Korean Cooking'', ''Reading Historical Non-Fiction'', ''Chess'', ''Volunteering at Senior Center'']'
  career_goals: Although retired from full‑time employment, Chul aims to leverage his business acumen by mentoring young entrepreneurs in the Bay Area, serving on the board of a local nonprofit, and offering
    occasional consulting on financial literacy for seniors. He also wishes to complete a personal finance guide for his extended family and plan a heritage trip to Korea to reconnect with his roots. Maintaining
    his health and staying active in community service remain central ambitions.
