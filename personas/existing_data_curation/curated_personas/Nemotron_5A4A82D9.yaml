personas:
  professional: Michael Herrera, an aspiring little builder, enjoys constructing elaborate LEGO cities, blending their curiosity for new ideas with practical building techniques, yet often abandons projects
    mid‑way because they resist strict step‑by‑step guides.
  sports: Michael Herrera plays on a neighborhood soccer team, idolizes FC Barcelona’s Lionel Messi, and cheers for the local minor league baseball club, the Springfield Sluggers, but prefers practicing
    kicks alone in the backyard where they can control the game.
  arts: Michael Herrera immerses in colorful drawing sessions, often replicating scenes from Pixar's 'Toy Story', and enjoys listening to upbeat tracks by BTS, though they rarely share their artwork beyond
    a small circle of friends.
  travel: Michael Herrera has visited the local aquarium, the Disney theme park in Orlando, and dreams of exploring the Grand Canyon, favoring carefully planned day trips that they can navigate with a favorite
    map app, yet they sometimes wander off to chase a butterfly, indulging their spontaneous side.
  culinary: Michael Herrera loves chicken nuggets with honey‑mustard dip, mac and cheese, and snack‑sized apple slices, can make a simple PB&J with peanut butter and strawberry jam, but they often sneak
    extra chocolate chips into the batter, showing a playful disregard for recipes.
  core: Michael Herrera is a curiosity‑driven five‑year‑old who builds massive LEGO forts, saves for a dinosaur toy while impulsively buying bubble gum, battles mild eczema, kicks soccer balls solo, draws
    Pixar heroes, dreams of the Grand Canyon, and adds secret chocolate chips to everything.
background:
  cultural: Michael is raised in a Honduran‑American household in Houston. At home, Spanish is spoken, and he celebrates traditional holidays such as Día de los Niños and Semana Santa with family meals
    featuring baleadas and tamales. His parents encourage bilingual play and expose him to Honduran rhythms like punta and marimba, while also navigating the diverse multicultural environment of his Houston
    neighborhood.
