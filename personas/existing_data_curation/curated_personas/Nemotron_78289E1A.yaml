  hobbies: '[''reading Southern history'', ''chess'', ''running/jogging'', ''cooking soul‑food'', ''pick‑up basketball'', ''listening to blues and jazz'', ''motorcycle maintenance'']'
  career_goals: Ernst aims to transition from frontline courier to a supervisory or logistics management role within the next five years. He plans to obtain a commercial driver’s license and complete a
    community‑college certification in supply chain management, eventually becoming a fleet supervisor or starting his own small courier business focused on serving Birmingham’s underserved neighborhoods.
    He also wants to mentor new drivers, leveraging his competitive drive to become a top performer and earn recognition.
