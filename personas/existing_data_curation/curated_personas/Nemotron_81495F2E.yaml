  career_goals: Alejandra aims to advance from floor-level surveillance to a supervisory role where she can design and implement security protocols for casino operations. She plans to obtain the Certified
    Protection Professional (CPP) credential and specialized training in AI-driven video analytics, hoping to lead a team that integrates predictive monitoring tools. Long-term, she envisions opening a
    boutique security consulting firm that serves small gaming establishments and community venues, emphasizing culturally aware training programs. She also wants to mentor younger staff, especially women
    from underrepresented backgrounds, to foster a more inclusive security workforce. Balancing ambition with her family life, she seeks a schedule that reduces stress and allows more time for community
    involvement.
