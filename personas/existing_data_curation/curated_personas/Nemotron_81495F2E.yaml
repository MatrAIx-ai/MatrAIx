personas:
  professional: Alejandra Harilal, a 43‑year‑old casino security specialist with a STEM background, blends technical expertise in CCTV and AI video analytics with a people‑first approach, leveraging curiosity
    and quick decision‑making to manage real‑time surveillance while navigating the stress of high‑stakes environments, and they are driving toward a supervisory role that marries predictive monitoring
    with culturally aware training.
  sports: Alejandra Harilal, an avid weekend hiker who explores the San Bernardino Mountains and belongs to a local hiking club, also plays recreational soccer with a co‑ed league, follows the Los Angeles
    Lakers and LA Dodgers, and they join a seasonal indoor climbing group in the winter, all while juggling a busy security schedule.
  arts: Alejandra Harilal, who channels their love for community dance and karaoke into evenings humming along to the soulful tunes of Gregory Porter, dancing to the vibrant beats of the Pacific drum ensemble
    'The Island Vibes', and curating drone photography set to the ambient sounds of Ólafur Arnalds, often winds down with board‑game nights featuring strategy games like Terraforming Mars, and they find
    inspiration in the eclectic mix of modern pop and traditional rhythms.
  travel: Alejandra Harilal, who prefers spontaneous weekend getaways to the Sierra Nevada peaks and planned family vacations to culturally rich locales like Bali and the Great Barrier Reef, balances their
    love for adventure photography with a modest travel budget, often booking last‑minute flights to capture sunrise over Mount Batur while they reserve longer holidays for exploring the historic streets
    of Luang Prabang with their children.
  culinary: Alejandra Harilal, an enthusiastic home cook who blends traditional melanesian flavors with contemporary flair, frequently prepares taro‑coconut curry with lemongrass, kava‑infused dessert mousse,
    and coconut‑lime grilled mahi‑mahi, while also mastering Thai basil chicken and experimenting with homemade sourdough bread for family gatherings, and they love sharing these modern twists at community
    potlucks.
  core: Alejandra Harilal, a tech‑savvy security professional in their early forties who balances a restless curiosity for gadgets with a deep commitment to community, often juggling spontaneous hikes,
    karaoke nights, and a lingering worry about meeting every deadline, and they navigate life with a mix of practical pragmatism and heartfelt kindness.
background:
  cultural: Alejandra's family traces its roots to the islands of Fiji and Papua New Guinea, and she grew up in a close-knit melanesian diaspora community in Southern California. Her parents instilled values
    of communal responsibility, respect for elders, and a deep connection to oral storytelling, which shape her cooperative and harmony-seeking nature. Bilingual in English and conversational Fijian, she
    often serves as a cultural bridge at local festivals, introducing neighbors to melanesian music, dance, and cuisine. The melanesian emphasis on collective well-being influences her approach to teamwork
    and conflict resolution at work, while her American upbringing fuels curiosity and a pragmatic outlook. She celebrates traditional holidays such as Fiji's Bula Festival and participates in community
    service events that support Pacific Islander youth, maintaining a strong sense of identity while integrating into the broader Fontana community.
