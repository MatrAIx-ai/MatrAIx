persona_description: A historian who specializes in the study of World War II, particularly the events and figures related to the liberation of concentration camps and the role of journalists in documenting
  these atrocities. Her research interests include, but are not limited to, the history of the Holocaust, the role of photography in documenting this history, and the impact of mass media on public opinion
  during wartime. She is particularly interested in the work of Margaret Bourke-White and the impact of her photographs on public awareness and understanding of the Holocaust.
