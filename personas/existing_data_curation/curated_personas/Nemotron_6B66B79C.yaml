  hobbies: '[''Ukulele jam sessions'', ''Bridge and mahjong'', ''Hawaiian gardening'', ''Coastal hiking'', ''Fusion cooking'', ''Cultural festival attendance'', ''Landscape photography'', ''Historical novel
    reading'', ''Language exchange meet‑ups'', ''Volunteering at community centers'']'
  career_goals: Although retired, Quan aims to keep sharing his cultural knowledge by volunteering as a docent at local museums and leading informal workshops on East Asian‑Hawaiian heritage. He plans to
    write a memoir that blends personal anecdotes with historical insight, and to launch a community‑based cultural exchange program that pairs seniors with youth for language and cooking sessions. Quan
    also hopes to become comfortable with new digital archiving tools, allowing him to preserve stories without the pressure of strict deadlines, while maintaining his health and reducing his tendency toward
    worry.
