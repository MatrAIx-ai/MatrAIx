personas:
  professional: Pratibha Abubaker, a 17‑year‑old visual arts enthusiast, blends self‑taught digital illustration skills in Procreate and Photoshop with a knack for community graphic design, managing an
    Instagram showcase and coordinating school club events while they dream of a future degree in visual communication that will let them merge contemporary aesthetics with cultural motifs.
  sports: Pratibha Abubaker, a high‑school sophomore who swaps traditional team sports for morning yoga flows and weekend bike rides, cheers loudly for the Oklahoma City Thunder and follows the Oklahoma
    Sooners football season, volunteers as a photographer at local charity runs, and they quietly aspire to improve their endurance for a half‑marathon.
  arts: Pratibha Abubaker, a sketch‑loving teen who frequently wanders Oklahoma City art galleries, curates pop‑up exhibition flyers with hand‑drawn typography, draws inspiration from indie folk singer
    Sufjan Stevens, the ethereal saxophone of Kamasi Washington, and the visual storytelling of Hayao Miyazaki, and they spend evenings crafting watercolor poems that blend sci‑fi imagery with personal
    reflections.
  travel: Pratibha Abubaker, an adventure‑curious 17‑year‑old who prefers weekend road trips to nearby art towns like Marfa, dreams of strolling through the bustling streets of Tokyo’s Harajuku district,
    meticulously plans low‑budget itineraries using public transit, yet they often postpone travel dreams due to school testing schedules and part‑time work commitments.
  culinary: Pratibha Abubaker, an experimental home cook who mixes spice‑rich lentil dal with creamy mac and cheese to create a fusion comfort dish, enjoys perfecting cilantro‑infused chutney for grilled
    chicken tacos, and they sometimes forget to chill the dough for homemade naan, leading to occasional culinary mishaps.
  core: Pratibha Abubaker, a curious 17‑year‑old visual storyteller, balances sketch‑filled nights, disciplined budgeting, yoga‑driven mindfulness, and a love for indie music while they chase freelance
    gigs and dream of cultural‑rich design careers.
background:
  cultural: Pratibha comes from a South Asian Muslim family originally from Pakistan that settled in Edmond, Oklahoma. At home, Urdu is spoken alongside English, and family traditions such as celebrating
    Eid al-Fitr, Eid al-Adha, and Ramadan are observed with communal meals and charitable giving. She also participates in local South Asian cultural gatherings, where traditional music, dance, and cuisine
    are shared. While embracing American customs—such as participating in school sports and community service—she maintains strong ties to her heritage through language, holiday observances, and the cooking
    of family recipes. The blend of Pakistani cultural values, such as respect for elders, community responsibility, and a love of storytelling, informs her worldview and artistic expression.
attributes:
  skills: '[''Digital illustration'', ''Basic graphic design'', ''Photography'', ''Social media content creation'', ''Bilingual communication (English & Urdu)'', ''Cooking traditional South Asian dishes'',
    ''Event coordination'', ''HTML/CSS basics'', ''Creative writing'']'
  hobbies: '[''Sketching'', ''Visiting art galleries'', ''Listening to world music'', ''Reading sci-fi and fantasy novels'', ''Yoga and mindfulness'', ''Volunteering at cultural events'', ''Cooking fusion
    recipes'', ''Creative writing (poetry)'']'
  career_goals: Pratibha aspires to return to a formal high-school program and eventually pursue a degree in visual communication or digital media. She hopes to become a professional illustrator and graphic
    designer, creating artwork that blends contemporary aesthetics with South Asian cultural motifs. In the medium term, she plans to build a freelance portfolio, launch an online shop for prints and custom
    designs, and collaborate with community organizations to run youth art workshops. Long-term, she envisions a career that allows her to mentor other young artists from under-represented backgrounds and
    to use visual storytelling to bridge cultural gaps.
