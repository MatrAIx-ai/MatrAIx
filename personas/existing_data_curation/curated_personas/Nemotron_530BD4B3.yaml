    and interdisciplinary collaboration"]'
  hobbies: '["Urban gardening","Reading historical fiction and African American memoirs","Cooking nutritious Southern cuisine","Yoga and mindfulness meditation","Jazz music appreciation","Volunteering at
    community health fairs","Mentoring youth through church programs"]'
  career_goals: Raquel aims to earn her BSN within the next two years and transition to a registered nurse role, with a long‑term goal of becoming a charge nurse in a community health setting. She is pursuing
    certifications in wound care (CWCN) and case management to broaden her clinical scope. Ultimately, she aspires to design and lead a community‑based diabetes prevention program targeting underserved
    African‑American neighborhoods in Charlotte, and to mentor other LPNs and nursing students, contributing to the advancement of Black nurses in the region.
