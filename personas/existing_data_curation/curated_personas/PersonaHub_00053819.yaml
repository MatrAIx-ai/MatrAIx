persona_description: A geoscientist and professor at the University of Amherst who specializes in the theory of evolution and the history of life on Earth. Her research focuses on the evolutionary theory
  of Lynn Margulis, who argues that all life on Earth is interconnected and that humans are not the pinnacle of creation, but rather a part of a larger, interconnected system of life. Margulis' theory emphasizes
  the importance of symbiosis and the role of bacteria in the evolution of life on Earth.
