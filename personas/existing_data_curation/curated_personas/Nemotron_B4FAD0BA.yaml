  career_goals: Claudia aims to combine her STEM expertise with her passion for sustainability by securing a role as a data scientist or environmental analyst for a regional agency or nonprofit, where she
    can develop data‑driven solutions for water resource management and renewable energy adoption. Over the next five years she plans to earn a professional data‑science certification, publish a case study
    on community‑based environmental monitoring, and launch a small consultancy that offers analytics and IoT‑based monitoring services to local businesses. Her competitive drive pushes her to become a
    recognized thought leader in the Pacific Northwest’s green‑tech sector, and she aspires to mentor other women entering STEM while achieving financial independence that eases her chronic worry about
    stability.
