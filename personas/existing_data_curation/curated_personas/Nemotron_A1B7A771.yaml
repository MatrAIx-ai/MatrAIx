  career_goals: Ronald aims to transition into a senior engineering or technical lead role where he can mentor junior developers and shape project architecture while maintaining a balanced workload that
    respects his family life. He plans to earn an AWS Solutions Architect certification, deepen his expertise in cloud‑native design, and eventually lead a small team building productivity tools for regional
    small businesses. He also envisions contributing to open‑source projects that promote collaborative coding practices and inclusive community standards.
