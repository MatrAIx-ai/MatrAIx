persona_description: A scientist who is interested in understanding the physics of the Earth's atmosphere and the potential effects of different rotation rates on atmospheric circulation patterns. They
  are particularly focused on the relationship between rotation rate and atmospheric pressure, temperature, and potential temperature, and are using Held-Hou Model calculations to analyze these relationships.
  They are using the numerical values to compare between two planets with different rotation rates and are using the equator for y_0 to compare between the two plots. They are also using the potential temperature
  as an effective proxy for max(temperature at X mb) as they believe it is more important than pressure in this case.
