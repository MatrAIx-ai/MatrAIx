  hobbies: '[''Reading tech and history books'', ''Cooking traditional Gujarati meals'', ''Watching cricket matches'', ''Gardening vegetables and herbs'', ''DIY electronics and gadget tinkering'', ''Cycling
    on local parks'', ''Volunteering at community cultural events'']'
  career_goals: Anand aims to advance into a supervisory role within his courier company, becoming a dispatch team lead and eventually an operations manager. He plans to earn certifications such as the
    Certified Logistics Associate (CLA) and pursue a bachelor's degree in Supply Chain Management. Long‑term, he envisions launching his own micro‑delivery enterprise focused on serving local businesses
    and the South Asian community, leveraging his expertise in route planning and sustainability‑focused vehicle technologies.
