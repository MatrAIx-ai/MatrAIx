  career_goals: Ferdinand envisions a stable future working with his hands in a hands‑on trade. He aspires to become a certified automotive technician, attracted by the routine maintenance schedules and
    clear, practical outcomes of fixing vehicles. He plans to graduate high school, attend a vocational program, and eventually earn his ASE certification. In the long term, he hopes to open a modest auto‑repair
    shop in his neighborhood, providing reliable service to his community while offering a steady income that supports his family.
