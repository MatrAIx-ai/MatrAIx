personas:
  professional: Ferdinand Aponte, a middle‑school student who channels his love for methodical, single‑player strategy games into a growing fascination with coding and game design, spends afternoons writing
    simple scripts and planning detailed level layouts, and they aspire to become a thoughtful game developer who values structure and narrative depth.
  sports: Ferdinand Aponte, a reserved teen who prefers low‑key physical activity, participates in a weekend community swimming club and enjoys tracking the performance of the Cityville Falcons (football)
    and the Riverbank Rangers (basketball), and they often schedule workouts on a strict weekly routine to maintain a sense of predictability.
  arts: Ferdinand Aponte, an aspiring cartoonist who fills sketchbooks with witty comic panels influenced by the visual style of Matt Groening and the whimsical storytelling of classic folk illustrators,
    listens to traditional folk tunes by Los Tigres del Norte alongside contemporary pop hits from Billie Eilish, and they use drawing as a calming outlet for their intense emotions.
  travel: Ferdinand Aponte, a teen who enjoys well‑planned short trips, frequently visits nearby historic towns such as Puebla for cultural festivals, dreams of exploring the ancient ruins of Teotihuacan
    and later traveling to Kyoto, Japan, and they carefully budget each journey to align with family constraints and school responsibilities.
  culinary: Ferdinand Aponte, a budding home cook who assists their mother in preparing family‑style tacos and tamales, experiments with fresh herbs from their balcony garden like cilantro and oregano,
    enjoys perfecting the balance of flavors in salsa roja, and they view each cooking session as a structured, soothing ritual that connects them to their heritage.
  core: Ferdinand Aponte is a methodical, introverted teen who balances a love for detailed solo projects and intense emotions with a disciplined routine that extends from gaming and model building to journaling
    and thoughtfully managed finances.
background:
  cultural: Ferdinand is a second‑generation Mexican‑American raised in East Hartford, Connecticut. At home, Spanish is spoken daily, preserving close ties to his family's origins in central Mexico. He
    participates in cultural celebrations such as Día de los Muertos and Mexican Independence Day, where extended family gathers for traditional foods, music, and storytelling. His household emphasizes
    familismo—placing family needs above individual desires—and respect for elders, shaping his cooperative yet assertive nature. While attending a public middle school where he navigates English‑dominant
    environments, he balances his heritage with the broader American culture, often acting as a cultural bridge for classmates curious about Mexican customs.
