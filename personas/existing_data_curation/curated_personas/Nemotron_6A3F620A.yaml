    forensics'']'
  hobbies: '[''Chess'',''CTF cybersecurity competitions'',''Home lab tinkering'',''Puzzle solving'',''Urban hiking'',''Street photography'',''Jazz and hip‑hop vinyl collecting'',''Meditation'',''Strength
    training'',''Reading science‑fiction'',''Strategic board games with a close friend group'']'
  career_goals: Darrell aims to transition from a senior analyst role to a strategic security leader within the next five years, targeting positions such as Security Architect Manager or Chief Information
    Security Officer at a mid‑size tech firm. He plans to earn CISSP, CISM, and OSCP certifications to solidify his credibility, publish research on threat‑intelligence automation, and speak at industry
    conferences like Black Hat and RSA. In parallel, he wants to mentor underrepresented talent in cybersecurity through local groups such as Black Tech SF, while establishing a healthier work‑life balance
    by implementing systematic processes that reduce his stress and disorganization.
