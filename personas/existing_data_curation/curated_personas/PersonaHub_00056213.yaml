persona_description: A conservationist who is interested in the sustainable use of wildlife resources, particularly in the context of trophy hunting. They are likely to be knowledgeable about the economic
  incentives for conservation created by trophy hunting and the potential for it to play a key role in endangered species conservation. They are also likely to be aware of the challenges and drawbacks associated
  with trophy hunting, such as the potential for over-hunting and the need for sustainable management practices. They may be interested in the potential for trophy hunting to generate revenues in areas
  where alternative tourism may not be viable, and may be interested in the role that trophy hunting can play in the rehabilitation of degraded wildlife areas. They may also be interested in the role that
  trophy hunting can play in the development of wildlife conservancies and the role that hunting operators can play in the conservation of wildlife on communal land.
