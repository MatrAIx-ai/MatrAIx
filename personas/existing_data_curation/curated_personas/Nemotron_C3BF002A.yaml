  hobbies: '[''gardening (prairie wildflowers, vegetables)'', ''walking along the Root River'', ''quilting'', ''reading historical fiction and poetry'', ''community theater attendance'', ''journaling'',
    ''watercolor painting'', ''gentle yoga'', ''volunteering at church food pantry'', ''seniors’ book club'', ''attending the county fair'']'
  career_goals: Jennifer aims to secure long‑term funding for a local senior services center, creating an endowment that will ensure sustainability for future generations. She also wants to formalize a
    mentorship program for emerging fundraisers in Scott County, sharing her practical knowledge while fostering a supportive community. Over the next few years, she plans to transition into a senior advisory
    role, offering consulting services to small nonprofits, and to complete a Certified Fundraising Executive (CFRE) designation to complement her hands‑on experience. Balancing her professional drive with
    personal well‑being, she seeks to integrate self‑care practices that mitigate her anxiety while maintaining her commitment to community impact.
