personas:
  professional: Cody Sharkey, a meticulous school bus driver, they excel at route planning, hands‑on mechanical troubleshooting, and calm conflict resolution, channeling their curiosity for art and methodical
    nature into creating spontaneous, culture‑rich moments for students while vigilantly maintaining safety standards.
  sports: Cody Sharkey, an avid follower of Orlando’s sports scene, they cheer for the Orlando Magic and Orlando City SC, run with the Orlando Running Club’s Saturday 5K outings, and squeeze in occasional
    pick‑up basketball games at the community center to stay active despite a preference for solitary exercise.
  arts: Cody Sharkey, a frequent visitor to the Orlando Museum of Art, they sketch urban scenes inspired by James Turrell and Ai Weiwei, experiment with photography echoing Cindy Sherman's surrealism, and
    curate playlists featuring Brian Eno’s ambient soundscapes to accompany creative sessions.
  travel: Cody Sharkey, an itinerary‑obsessed traveler, they have explored New Orleans’ jazz districts and Reykjavik’s modern art museums, dream of a meticulously planned Pacific Coast Highway road trip
    to San Francisco, and save steadily for a future cultural pilgrimage to Kyoto’s historic temples while balancing a modest family budget.
  culinary: Cody Sharkey, a passionate home cook, they enjoy preparing simple yet flavorful dishes like cilantro‑lime shrimp tacos, spicy lentil soup, and homemade Pad Thai, skillfully combining fresh herbs
    such as basil and cilantro with pantry staples, and delight in sharing these meals with a close circle of friends at casual dinner gatherings.
  core: Cody Sharkey blends quiet curiosity with a detail‑driven work ethic, they over‑plan routes, nervously double‑check bus diagnostics, hoard travel brochures like trophies, and constantly battle a
    persistent undercurrent of stress.
background:
  cultural: Cody grew up in the suburban neighborhoods of Orlando, Florida, within a white American family of European ancestry. His upbringing combined a Mid‑Atlantic work ethic with the relaxed, community‑oriented
    vibe of Central Florida. The region’s blend of Southern hospitality, a robust tourism industry, and a multicultural population exposed him to a wide range of cultural expressions, fostering his appreciation
    for art and new ideas. Local public schools emphasized safety, reliability, and service, shaping his professional identity as a school bus driver. Community festivals, theme‑park culture, and the vibrant
    local arts scene have left a lasting imprint on his values and interests.
