  hobbies: '[''Visiting Art Museums and Galleries'', ''Sketching Urban Landscapes'', ''Photography'', ''Reading Science Fiction and Philosophy'', ''Listening to Podcasts on Transportation and Art'', ''Morning
    Walks in Nature Reserves'', ''Cooking Small Meals for Friends'', ''Volunteering for Youth Art Workshops'']'
  career_goals: Cody aims to advance into a supervisory role within the school district’s transportation department, eventually becoming a Transportation Coordinator or Fleet Manager. To achieve this, he
    plans to complete his associate degree in Transportation Management and obtain additional certifications in fleet safety and green vehicle initiatives. He also hopes to advocate for the integration
    of art‑focused outreach programs on school buses, using his love of culture to enrich students’ daily experiences. Long‑term, Cody envisions contributing to district‑wide policies that improve safety,
    efficiency, and community engagement while maintaining a balanced work life to manage stress.
