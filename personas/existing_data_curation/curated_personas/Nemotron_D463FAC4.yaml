  career_goals: 'Although Kevin is only two, he expresses early ambitions that mirror his personality: he loves watching firefighters and construction workers, and often declares that he wants to "help
    people" and "build big things." He aspires to become a big helper at home—bringing toys to his parents, assisting with simple chores, and later, when older, to explore how machines work and perhaps
    pursue a role that combines caring for others with hands‑on problem solving, such as a community service or public‑safety career.'
