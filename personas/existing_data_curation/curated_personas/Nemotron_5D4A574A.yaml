  career_goals: Taylor aims to channel her organizational strengths into a leadership role within local volunteer initiatives. She plans to launch a neighborhood garden project, expand her genealogical
    research into a published family history, and develop a small home-based business selling handcrafted knitted items. She also intends to complete the remaining credits toward a degree in community development
    through online courses and to mentor younger women seeking work-life balance.
