  hobbies: '[''Hosting neighborhood potlucks'', ''Community theater acting'', ''Playing bass guitar in church band'', ''Gardening'', ''Woodworking'', ''Fishing'', ''Attending local high school sports games'',
    ''Reading mystery novels'', ''Volunteering at the food bank'']'
  career_goals: Pete aims to transition his experience into a part‑time role as a community program facilitator or volunteer manager for a local nonprofit. He plans to obtain a certified mediator credential
    to enhance his conflict‑resolution skills and hopes to launch a modest consulting service offering event planning and senior‑care support for neighbors. His overarching ambition is to strengthen community
    bonds in Georgetown and mentor younger volunteers.
