persona_description: A scientist with expertise in atmospheric environment, global environmental change, and atmospheric trace gases. Prof. Hideaki Nakajima and Prof. Toshinobu Machida are prominent figures
  in this field, focusing on remote sensing and data analysis techniques for measuring atmospheric trace gases, observations of trace gases and aerosols in the stratosphere, monitoring of atmospheric greenhouse
  gases by ground stations and ships, global observation of atmospheric carbon dioxide by aircraft, and field studies for atmospheric observation such as in Antarctica, Arctic region, and Siberia. They
  are likely to be interested in environmental measurement, assessment, environmental analytical chemistry, information sciences for environment, earth system monitoring and instrumentation, surface and
  subsurface instrumentation, analytical sciences for environmental evaluation, and geo-environmental measurement and analysis.
