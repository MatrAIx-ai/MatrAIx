  hobbies: '["Watercolor painting of food subjects", "Food photography", "Experimental home cooking", "Reading culinary history and Mexican folklore", "Listening to diverse music genres", "Running in the
    Texas Hill Country", "Herb gardening", "Volunteering at community food banks", "Exploring local art galleries", "Learning basic Spanish literature"]'
  career_goals: Samuel aspires to advance from his current role as a food preparation worker to become a certified sous chef specializing in Mexican‑Texan fusion cuisine. He plans to earn a ServSafe certification
    and enroll in a culinary program to deepen his technical expertise. In the long term, he dreams of opening a community‑focused restaurant or food truck that celebrates his cultural heritage, offers
    healthy, affordable meals, and provides culinary training opportunities for youth. He also hopes to develop a mentorship program that pairs aspiring cooks from underserved neighborhoods with professional
    chefs, reflecting his desire to help others and promote harmony.
