personas:
  professional: David Ortiz, a veteran housekeeping specialist with an associate’s degree in hospitality management, applies their deep‑cleaning expertise, bilingual fluency, and curiosity for eco‑friendly
    solutions to mentor staff, pursue a supervisory role, and lay the groundwork for a modest family‑run cleaning business that prioritizes reliable service and community harmony.
  sports: David Ortiz, a faithful Yankees fan, enjoys attending occasional games with their spouse, participates in a senior bowling league at the community center, and keeps active with daily dog walks
    in Meadowbrook Park, favoring low‑impact activities that accommodate their joint health and love for friendly competition.
  arts: David Ortiz immerses themselves in the rhythms of classic boleros by José José and the vibrant salsa of Celia Cruz while strolling in the park, and they wind down with historical novels by Ken Follett,
    finding that stories of past revolutions echo their curiosity for heritage and continuity.
  travel: David Ortiz prefers thoughtfully planned trips that blend culinary discovery with leisurely pacing, having savored a family vacation to the historic streets of Old San Juan and a recent road‑trip
    through the Hudson Valley, while they dream of a relaxed cruise to Caribbean islands where they can sample island flavors and enjoy gentle sea breezes.
  culinary: David Ortiz, a skilled home chef, delights in crafting aromatic dishes such as ropa vieja, picadillo, and sweet turrón using garden‑grown cilantro, oregano, and fresh garlic, often improvising
    with a pinch of smoked paprika to keep their meals inventive while balancing practicality with culinary curiosity.
  core: David Ortiz blends decades of meticulous housekeeping expertise with a love for herb‑filled kitchens, community dominoes, and a steadfast commitment to green practices, all while they occasionally
    forget to water their garden during rainy weeks.
background:
  cultural: David is a first‑generation Cuban American whose parents migrated to the United States after the 1959 revolution. Growing up in a close‑knit Cuban neighborhood in New York, he was immersed in
    Spanish language, Catholic traditions, and the vibrant music and culinary customs of his heritage. He celebrates Cuban holidays such as Día de la Independencia and participates in community festivals
    that feature salsa dancing, folkloric performances, and family‑style meals. While fully embracing American life—evident in his education and career—he remains deeply connected to his roots by maintaining
    bilingual communication, cooking traditional foods, and supporting fellow Cuban immigrants through volunteer work.
