  career_goals: David aims to transition from a frontline housekeeping role to a supervisory or managerial position within a residential services firm, leveraging his experience to mentor younger workers
    and implement eco‑friendly cleaning standards. He is also exploring the possibility of launching a modest, family‑run cleaning business that would allow him greater flexibility and the ability to serve
    his Cuban‑American community directly. In the next few years, he plans to earn a certification in green cleaning practices and to build a reliable client base that secures his financial stability for
    a comfortable retirement.
