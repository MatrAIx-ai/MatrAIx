personas:
  professional: Rosa Fernandez, a budding engineer in the making, channels her curiosity and practical knack for fitting pieces together into elaborate LEGO constructions while drawing detailed animal habitats,
    and they demonstrate early teamwork and assertiveness even in classroom projects.
  sports: Rosa Fernandez enjoys weekly soccer sessions with the Little Lions youth team, cheers for the Houston Astros during spring games, and they spend afternoons at the park mastering the jungle gym
    and a small basketball hoop, showing a balanced love for team play and solo activity.
  arts: Rosa Fernandez fills sketchbooks with bright animal drawings inspired by the vivid colors of Frida Kahlo's murals, dances to lively folk rhythms of Los Tigres del Norte in the living room, and they
    sing bilingual nursery rhymes with gusto, letting art shape her playful identity.
  travel: Rosa Fernandez prefers short family road trips, such as a weekend visit to the Hill Country’s flower‑filled fields and a day exploring the Houston Space Center, while they dream of future adventures
    to the Grand Canyon’s rim, balancing curiosity with the comfort of familiar routines.
  culinary: Rosa Fernandez eagerly helps her grandma mash ripe avocados for guacamole, rolls small flour tortillas for tasty quesadillas, proudly declares herself the ‘sauce master’ when sprinkling lime
    juice and cilantro, yet they sometimes forget to wash their hands before tasting.
  core: Rosa Fernandez blends boundless curiosity with disciplined building and drawing, keeps a secret stash of glitter crayons, and can negotiate extra dessert time with the same steadiness they show
    when solving a tricky puzzle.
background:
  cultural: Rosa Maria is raised in a Mexican-American household in Houston, Texas, where Spanish is spoken at home and English at school, giving her a bilingual upbringing. Her family celebrates Mexican
    traditions such as Día de los Muertos, Día de la Independencia, and festive holidays with homemade foods like tacos, tamales, and guacamole. The strong family bonds (familismo) and respect for elders
    (respeto) are integral to her daily life, influencing her cooperative yet assertive demeanor. Living in the diverse city of Houston exposes her to a wide range of cultures, while her Mexican heritage
    shapes her values of community involvement, practical responsibility, and an appreciation for both new ideas and established customs.
attributes:
  skills: '["Basic reading (Spanish & English)", "Counting and simple addition", "Fine motor skills (drawing, coloring, puzzles, LEGO)", "Simple kitchen assistance", "Organizing personal space and school
    supplies"]'
  hobbies: '["Drawing and coloring", "LEGO building and puzzles", "Listening to Mexican folk music and dancing", "Reading picture books (nature, space, everyday life)", "Exploring the park with friends",
    "Helping in the kitchen with family recipes"]'
  career_goals: Rosa Maria dreams of becoming a teacher who can share stories and teach children to read in both Spanish and English, blending her love of language with a desire to help her community. She
    also imagines caring for animals as a veterinarian because she loves the family rabbit and wants to protect all creatures. These ambitions reflect her curious mind, practical approach, and compassionate
    nature while staying grounded in realistic, attainable goals for a young child.
