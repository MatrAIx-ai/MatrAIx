  career_goals: 'Jerry aspires to a career that combines his love of structure with a tangible impact while offering a predictable work environment. He envisions becoming a civil engineer, designing bridges
    and public spaces in Columbia that improve daily life, because the profession provides clear milestones and measurable outcomes. He is also fascinated by the idea of working as a software developer
    for educational games, where his methodical coding skills could help create clear, instructional experiences for other kids. Aware of his sensitivity to stress, he values roles with defined processes
    and teamwork, and he already sets short‑term milestones: maintaining a top‑grade average in math, joining the school robotics club, and seeking a mentorship with a local engineer through a summer program.'
