personas:
  professional: A retired community historian, Stephanie Doyle leverages her expertise in archival research, literary analysis, and clear prose to design and coordinate a grassroots oral‑history project
    in Lincoln, blending meticulous note‑taking with a flexible, sometimes spontaneous workflow that reflects their curiosity‑driven yet pragmatic nature, while they balance competitive ambition with a
    relaxed approach to deadlines.
  sports: A regular participant in the local senior walking club and occasional bird‑watching trek, Stephanie Doyle follows the Nebraska Cornhuskers football season with enthusiasm, and they also enjoy
    casual shuffleboard at the senior center, preferring low‑impact activities that suit their reserved but competitively spirited nature.
  arts: An avid patron of the arts, Stephanie Doyle attends quarterly performances by the local chamber orchestra and enjoys listening to folk musicians like Bob Dylan and jazz legends such as Miles Davis
    while sketching watercolor landscapes, a practice that satisfies their curiosity‑driven yet solitary creative impulse.
  travel: A reflective traveler, Stephanie Doyle prefers meticulously planned yet flexible itineraries, opting for leisurely road trips across the Midwest and a long‑awaited pilgrimage to Ireland to explore
    family roots, balancing modest budgeting with occasional splurges on authentic local experiences.
  culinary: A seasoned home cook, Stephanie Doyle delights in preparing traditional corned beef with cabbage, shepherd’s pie, and herb‑infused stews, wielding a garden bounty of rosemary, thyme, and sage,
    though they sometimes forget to preheat the oven, leading to a few charred edges in the final dish.
  core: A curious and pragmatic scholar, Stephanie Doyle blends meticulous research with a relaxed, sometimes chaotic daily rhythm, channeling their competitive streak into community projects while indulging
    in quiet moments of watercolor and folk tunes.
background:
  cultural: Stephanie identifies as a white American of Irish descent, raised in a modest Midwestern town before settling in Lincoln, Nebraska. Her family traditions include celebrating St. Patrick's Day
    with homemade corned beef and sharing Irish folk tales, which fuel her interest in oral history. While she grew up in a Catholic school environment, she now approaches spirituality and cultural practices
    with a secular, inquisitive lens. Her Midwest upbringing instilled values of self‑reliance, modesty, and community participation, which she balances with a lifelong curiosity about new ideas and cultures.
    This blend of Irish heritage and Nebraskan prairie sensibility informs her worldview, artistic tastes, and the community‑oriented projects she chooses to support.
attributes:
  skills: '[''Historical research'', ''Creative writing'', ''Oral history interviewing'', ''Museum curation assistance'', ''Digital archiving'', ''Gardening'', ''Budgeting'', ''Conflict mediation'']'
  hobbies: '[''Reading literary fiction'', ''Memoir writing'', ''Genealogy'', ''Gardening'', ''Birdwatching'', ''Book clubs'', ''Cooking Irish dishes'', ''Sketching'']'
  career_goals: Although retired from formal employment, Stephanie remains driven to contribute her expertise to her community. She aims to develop a comprehensive oral‑history project documenting the stories
    of long‑time Lincoln residents, eventually publishing the collection through the local historical society. She also hopes to mentor younger volunteers at the senior center, teaching them research and
    writing techniques. A personal ambition is to complete a memoir that weaves together her Irish heritage, Midwestern upbringing, and lifelong love of literature. In the next few years, she plans to travel
    to Ireland to deepen her understanding of her ancestral culture while continuing to share those experiences through local talks and articles.
