  career_goals: Although retired, Keith aims to keep contributing to his community. He plans to mentor young South Asian entrepreneurs through a local business incubator, volunteer as a financial advisor
    for a nonprofit senior‑services organization, and document his family’s immigration story in a memoir that blends business lessons with cultural reflections. He also hopes to co‑curate a traveling art
    exhibit that showcases emerging South Asian artists in Delaware, promoting cultural exchange and creative dialogue.
