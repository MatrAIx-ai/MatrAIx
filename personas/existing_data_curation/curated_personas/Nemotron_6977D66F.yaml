personas:
  professional: Tanisha Strong, a 55-year-old bakery owner and artisan pastry chef, blends Southern soul-food flavors with contemporary design, leveraging meticulous cost control, inventory precision, and
    a skeptical, competitive eye for quality to run a low-waste boutique bakery that also serves as a gallery of edible art.
  sports: Tanisha Strong enjoys early-morning jogs along the Tennessee River Trail, participates in a local senior tennis league, passionately supports the Alabama Crimson Tide during college football season
    and the New Orleans Saints in the NFL, and follows the Nashville Predators for hockey, balancing a disciplined fitness routine with a competitive spirit that mirrors their bakery pursuits.
  arts: Tanisha Strong channels their love of painting and sketching into dessert designs while listening to Miles Davis, John Coltrane, and gospel icons like Mahalia Jackson, regularly attending exhibit
    openings at the Huntsville Museum of Art and drawing inspiration from the vibrant canvases of Georgia O'Keeffe.
  travel: Tanisha Strong prefers meticulously planned road trips that blend culinary exploration and family heritage, having toured New Orleans for its Creole cuisine, Savannah's historic district, and
    Asheville's craft food scene, while dreaming of a gastronomic pilgrimage to Tuscany's vineyards and Marrakech's spice markets, all balanced against modest travel budgets and family commitments.
  culinary: Tanisha Strong, a master pastry artisan, delights in crafting sweet potato pies, buttery cornbread, rosemary-infused shortbread, and mint-scented lemon tarts using fresh thyme, rosemary, and
    mint from their herb garden, while showcasing each creation through meticulous food photography and savoring farm-to-table experiences at local Southern bistros.
  core: Tanisha Strong is a fiercely organized, art-obsessed baker whose competitive drive fuels relentless recipe innovation, yet they often sacrifice sleep and skip workouts in pursuit of the perfect
    pastry.
background:
  cultural: Tanisha is an African‑American woman raised in the heart of Alabama, where the flavors of Southern soul food and the rhythms of gospel and jazz shaped her upbringing. Her family's baking traditions—sweet
    potato pies, cornbread, and spiced pastries—have been passed down through generations, reinforcing a strong sense of community, resilience, and storytelling. Living in Huntsville, she blends this heritage
    with contemporary culinary trends, while her marriage and close‑knit family provide a supportive foundation for her artistic and entrepreneurial pursuits.
attributes:
  skills: '["Artisan bread making", "Cake decorating", "Pastry arts", "Food safety compliance", "Inventory management", "Cost control", "Small business operations", "Recipe development and testing", "Quality
