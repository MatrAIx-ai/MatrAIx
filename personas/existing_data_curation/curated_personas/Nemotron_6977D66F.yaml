  hobbies: '["Painting", "Sketching", "Herb gardening", "Food photography", "Visiting local art galleries", "Listening to jazz and gospel music", "Genealogy research", "Puzzle solving (crosswords)", "Collecting
    vintage kitchen tools"]'
  career_goals: Tanisha aims to transform her current bakery into a boutique destination that highlights artful, soul‑food‑inspired pastries, and to earn recognition in regional culinary competitions. She
    plans to publish a cookbook that documents her family's baking legacy while introducing innovative flavor pairings. Long‑term, she hopes to mentor aspiring bakers from the African‑American community
    and to expand her brand into a line of premium ready‑to‑bake mixes.
