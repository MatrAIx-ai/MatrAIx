personas:
  professional: Jordan Johnson, a budding trades professional with a hands‑on knack for small‑engine repair, woodworking, and emerging HVAC/electrical certification, channels their competitive, methodical
    mindset into meticulous project planning and a reputation for reliability, while remaining flexible enough to tweak designs mid‑project when a better solution appears.
  sports: Jordan Johnson hits the trails for deer and turkey seasons, joins the local outdoor club that partners with the state wildlife agency, follows the Green Bay Packers for football and the Milwaukee
    Brewers for baseball, and squeezes in weekend hikes where they practice wildlife photography while keeping a personal fitness regimen of wood‑chopping drills and occasional lawn‑mower sprint intervals.
  arts: Jordan Johnson finds solace in classic rock and vintage cinema, frequently listening to Led Zeppelin on vinyl while painting custom airbrush designs on model kits, and admires the craftsmanship
    of woodworking master George Nakashima, often watching documentaries about him for inspiration.
  travel: Jordan Johnson prefers low‑key road trips that blend hunting lodges and scenic backroads, having camped in the Adirondacks and explored the historic motor‑route of Route 66, while dreaming of
    a future DIY workshop retreat in the Blue Ridge Mountains once the handyman business stabilizes financially.
  culinary: Jordan Johnson enjoys hearty, home‑cooked meals like pork chops with apple‑cider glaze, homemade chili with beans and smoked paprika, and often experiments with fresh garden veggies in stir‑fry,
    boasting a modest skill set that includes perfecting a crisp, golden cornbread crust on their grill.
  core: Jordan Johnson is a competitive, detail‑obsessed DIY enthusiast who balances methodical planning with spontaneous tinkering, all while maintaining a frugal, self‑reliant lifestyle that sometimes
    borders on obsessive perfectionism.
background:
  cultural: Jordan grew up in Avoca, a small, close‑knit community in Iowa County, Wisconsin, where many families trace their roots to German and Scandinavian immigrants. The local culture emphasizes self‑reliance,
    modesty, and a strong work ethic, values that are reflected in Jordan’s practical skill set and his preference for personal responsibility. While he is generally reserved, community events such as the
    county fair, church socials, and volunteer fire‑department gatherings have reinforced a sense of belonging without demanding large‑scale social interaction. His upbringing in a rural Midwestern environment
    has fostered a deep respect for the land, seasonal rhythms, and the value of hands‑on craftsmanship. These cultural influences shape his approach to life, balancing curiosity about new ideas with a
    pragmatic respect for tried‑and‑true methods.
attributes:
  skills: '[''Small engine repair'', ''Automotive maintenance'', ''Woodworking and carpentry'', ''Basic computer hardware troubleshooting'', ''Introductory Python programming'', ''Arduino electronics prototyping'',
    ''Project planning and budgeting'', ''Strategic problem solving'']'
  hobbies: '[''Scale model building (cars and aircraft)'', ''Hunting and fishing'', ''Hiking and wildlife photography'', ''Strategic board games (chess, Go)'', ''Competitive online real‑time strategy gaming'',
    ''Reading DIY and technical manuals'', ''Home vegetable gardening'']'
  career_goals: Jordan aims to translate his hands‑on expertise into a sustainable career. He plans to enroll in a community‑college trades program within the next year, targeting certifications in HVAC
    or electrical maintenance, which combine his mechanical aptitude with higher earning potential. Simultaneously, he hopes to launch a part‑time handyman service focused on rural homeowners, leveraging
    his woodworking and small‑engine skills. In the longer term, Jordan envisions owning a small, family‑run service business that can support his desire for independence, while also giving him the flexibility
    to continue personal projects and remain closely tied to his community. He is motivated by the challenge of building a reputation for reliability and quality, and he hopes to win regional trade competitions
    that showcase his technical competence.
