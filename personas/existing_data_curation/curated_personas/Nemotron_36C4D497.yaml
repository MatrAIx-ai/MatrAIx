  career_goals: Karishma aims to turn her love for technology and problem‑solving into a career in biomedical engineering, where she can design affordable medical devices that merge cutting‑edge innovation
    with real‑world practicality. In the near term, she plans to excel in high‑school STEM courses, win regional science‑fair awards, and secure a spot on a competitive robotics team. She envisions attending
    a university with a strong engineering program, obtaining research internships in medical‑device labs, and eventually leading projects that improve healthcare accessibility for underserved communities.
    Her competitive nature fuels a desire to achieve top honors in competitions, while her critical mindset drives her to pursue evidence‑based research that challenges assumptions.
