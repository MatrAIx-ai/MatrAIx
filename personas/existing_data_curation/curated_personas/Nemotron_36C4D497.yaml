personas:
  professional: Karishma Patel, a budding robotics enthusiast, leverages Arduino kits, Python scripting, and data visualization to solve school challenges, approaching each project with methodical planning
    and a competitive drive reminiscent of chess, while also applying her debate experience to pitch ideas confidently.
  sports: Karishma Patel plays on the middle school basketball team, follows the local NBA franchise, and participates in a weekend swimming club, but prefers strategic spectatorship, analyzing game tactics
    like a chess match, while sprinting on the track only during school PE to stay fit.
  arts: Karishma Patel performs flute in her family's cultural music ensemble, enjoys the minimalist compositions of Ólafur Arnalds, reads sci‑fi novels by authors like Neal Stephenson, and occasionally
    sketches data visualizations that double as abstract art, blending technical precision with creative expression.
  travel: Karishma Patel has visited the Grand Canyon during a school field trip, explored the science museums of Washington, D.C., and dreams of attending the Tokyo Tech Expo, favoring meticulously planned
    itineraries that balance educational stops with short bursts of adventure, while budget constraints keep trips primarily domestic.
  culinary: Karishma Patel loves experimenting with quick, tech‑inspired meals like sushi‑roll tutorials on YouTube, perfects a spicy chicken tikka masala for family gatherings, and meticulously measures
    ingredients using a digital kitchen scale, yet often forgets to eat lunch during marathon coding sessions.
  core: Karishma Patel is a methodical teen tech whiz whose competitive chess mind fuels her robotics projects, yet her constant worry and perfectionism frequently clash with her love for solo creative
    pursuits.
background:
  cultural: Karishma was born to Indian (Gujarati) parents who emigrated to the United States in the early 2000s. Her household blends traditional South Asian customs with American life. At home, Hindi
    and Gujarati are spoken, and family gatherings revolve around celebrations of Diwali, Navratri, and Holi, featuring homemade sweets and traditional music. The Patel family maintains strong ties to the
    local Indian community in Hurst, attending the nearby Hindu temple and participating in cultural events such as the annual Texas Holi Festival. While she embraces these cultural roots, Karishma also
    engages fully with the broader Texan environment—her school friends, local sports, and community activities—creating a bicultural identity that informs her worldview and future aspirations.
