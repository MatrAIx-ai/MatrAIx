  hobbies: '[''Hiking'', ''Gardening'', ''Seasonal Cooking'', ''Reading (Science & Education)'', ''DIY Electronics Projects'', ''STEM Outreach Volunteering'', ''Yoga'', ''Puzzle Solving'']'
  career_goals: Renee aims to advance to a district-wide early childhood program director within the next five years, spearheading the expansion of STEM-focused preschool curricula across Chester County.
    She plans to earn a Master's in Educational Leadership, secure larger federal and state grants for innovative learning labs, and eventually mentor emerging administrators. Long-term, she envisions establishing
    a community-run early learning center that blends rigorous STEM inquiry with inclusive, play-based pedagogy, positioning herself as a regional thought leader in early childhood education reform.
