personas:
  professional: A budding mini-architect, Jennifer drafts elaborate LEGO cities with a meticulous eye, balancing curiosity and practicality as they test new building ideas while insisting on their own rules.
  sports: A spirited junior soccer enthusiast, Jennifer sprints across the Pennington park field for the local U‑6 Pennington Panthers training sessions, cheers for the New York Red Bulls during televised
    matches, and occasionally joins a weekend ice‑skating class, playing competitively and celebrating each goal with a triumphant fist pump.
  arts: A lively young creator, Jennifer sketches bright scenes with Crayola markers, twirls in a community dance class set to Disney songs, and collects picture books by Mo Willems, often humming the tunes
    of Sesame Street and drawing inspiration from animated movies for their block constructions.
  travel: An adventurous weekend explorer, Jennifer has visited the Jersey Shore to build sandcastles, toured the Liberty Science Center on a family field trip, and dreamt of a future trip to Disney World
    where they imagine meeting Mickey Mouse, preferring short trips with familiar family members and planning routes with a colorful map.
  culinary: A picky but enthusiastic eater, Jennifer loves grilled cheese sandwiches with extra cheddar, mac and cheese, and chicken nuggets dipped in honey mustard, while avoiding broccoli, and enjoys
    helping in the kitchen by spreading peanut butter on toast, proudly presenting their plated creations to family.
  core: Jennifer blends a fierce curiosity for building with a competitive edge, juggling structured LEGO projects and spontaneous backyard discoveries while occasionally letting stubbornness overrule sharing,
    making every day a mix of imagination and minor rebellions.
background:
  cultural: Jennifer was raised in a middle‑class, white suburban family in Pennington, New Jersey. Her family celebrates typical American traditions such as Thanksgiving, Fourth of July fireworks, Halloween
    trick‑or‑treat, and holiday gatherings with extended relatives. She attends the local public elementary school and frequently visits the town library, where community programs introduce her to a modestly
    diverse cultural environment characteristic of the Greater New York metropolitan area. Family life includes occasional attendance at a nearby church and participation in neighborhood events that emphasize
    education, responsibility, and community involvement.
