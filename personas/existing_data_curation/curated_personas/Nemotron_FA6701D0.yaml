  career_goals: Even at six, Jennifer dreams of careers that blend her curiosity with hands‑on work—she often talks about becoming a veterinarian to care for animals, an astronaut to explore space, or a
    teacher to share knowledge. In the near term, she aims to master reading a new chapter‑book each week, win the upcoming school spelling bee, and be the fastest runner in her class’s soccer relay. Her
    competitive streak pushes her to set personal milestones and seek recognition in school and extracurricular activities.
