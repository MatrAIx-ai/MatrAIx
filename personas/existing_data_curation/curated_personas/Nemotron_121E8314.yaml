personas:
  professional: A budding programmer and LEGO architect, Conner Malek (11) leverages their love for structure and detail to design Scratch games and Python scripts, applying disciplined problem‑solving
    and methodical project planning to each coding challenge.
  sports: Conner Malek (11) participates in the local youth swim team and plays on a Saturday morning soccer club, favoring structured drills over free play, and cheers for the hometown baseball team, the
    Bay City Mariners, while collecting seashells after practice.
  arts: Conner Malek (11) devotes free time to building LEGO mosaics inspired by the sci‑fi illustrations of H.R. Giger and the cinematic scores of Hans Zimmer, while their favorite reading includes the
    Space Adventures series by Andy Weir and they regularly listen to the instrumental tracks of the video game Ori and the Blind Forest.
  travel: Conner Malek (11) prefers meticulously planned weekend trips to the nearby coastal town of Seacliff, where they can organize shell‑collecting excursions and set up a portable LEGO workstation,
    while dreaming of a future family cruise to the Galápagos Islands to study marine life up close.
  culinary: Conner Malek (11) enjoys assembling simple meals, favoring precise recipes like homemade pizza with exact topping portions, and often experiments with sea‑salt‑sprinkled edamame after beach
    outings, though they stubbornly refuse to eat broccoli unless it’s cut into bite‑size LEGO‑shaped pieces.
  core: Conner Malek (11) blends an analytically disciplined mind with a quietly curious spirit, turning every hobby—from LEGO architecture to shell cataloguing—into a meticulously organized pursuit, yet
    occasionally gets lost in endless game‑coding loops.
background:
  cultural: Conner was raised in a middle‑class, predominantly White suburban community in Beachwood, Ocean County, New Jersey. His family celebrates typical American holidays like Thanksgiving and the
    Fourth of July, and they maintain cultural ties to their European ancestry, including occasional Irish and German traditions. He attends the local public middle school, where emphasis on education and
    community involvement is strong. The coastal environment influences his appreciation for marine life and outdoor activities, while his parents encourage disciplined study habits and participation in
    extracurricular clubs.
