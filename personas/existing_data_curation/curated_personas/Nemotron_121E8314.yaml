  career_goals: Conner dreams of a future where he can combine his love for the ocean with his organizational strengths, aspiring to become a marine engineer or an environmental data analyst. He aims to
    earn top grades in middle and high school, win his school’s science fair, and eventually attend a university known for engineering and marine sciences. In the short term, he wants to master Python,
    lead his class’s robotics club, and contribute to community beach clean‑up projects that reflect his desire for practical, impactful work.
