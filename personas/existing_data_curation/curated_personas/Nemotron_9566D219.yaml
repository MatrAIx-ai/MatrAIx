  hobbies: '[''Hiking and lake kayaking in the Twin Cities area'', ''Group dance fitness classes (Zumba, swing dance)'', ''Ice skating on frozen ponds during winter'', ''Experimenting with culinary science
    and home brewing'', ''Community garden plot maintenance'', ''Board game nights with friends'', ''Volunteering for STEM workshops at the public library'', ''Attending live music and local theater events'']'
  career_goals: After taking time away from the formal workforce to focus on family and community projects, Amy intends to re‑enter the job market in a role that blends her technical background with her
    sociable, people‑centered personality. Her short‑term goal is to obtain a certification in science communication and secure a part‑time position as a community liaison for a local museum or science
    center, where she can design and lead hands‑on STEM programs for families. In the longer term she hopes to launch a nonprofit that offers free after‑school science clubs in underserved neighborhoods
    of St. Paul, positioning herself as a director of program development while maintaining a flexible schedule that honors her personal values of flexibility and collaboration.
