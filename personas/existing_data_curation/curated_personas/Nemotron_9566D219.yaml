personas:
  professional: Amy Barnett, a 31‑year‑old aspiring science communicator with strong data‑analysis abilities in Python and R and practical lab skills in PCR and microscopy, uses their sociable and flexible
    nature to craft hands‑on STEM programs for families at the local museum, although their easygoing approach sometimes results in spontaneous, last‑minute event planning.
  sports: Amy Barnett fuels their active lifestyle with weekend hikes around the Chain of Lakes, spontaneous ice‑skating on frozen ponds, and high‑energy Zumba classes, while cheering for the Minnesota
    Twins and Vikings and rowing with a local kayaking club that meets each summer.
  arts: Amy Barnett channels creativity through swing‑dance evenings, Zumba workouts set to folk‑rock tunes by Bob Dylan and The Avett Brothers, and regular visits to the Guthrie Theater, often designing
    vibrant flyers for community events using Canva and Adobe Illustrator.
  travel: Amy Barnett prefers low‑key road trips that blend adventure with family time, often heading to the Boundary Waters for canoeing or exploring Door County’s shoreline, while dreaming of a spring
    stroll through Edinburgh’s historic streets and a winter ski weekend in Colorado’s Rocky Mountains.
  culinary: Amy Barnett’s culinary experiments mix science and comfort, from brewing a crisp saison with local hops and orange peel to perfecting mushroom‑risotto using forest‑foraged chanterelles, while
    their garden’s heirloom tomatoes star in fresh salsa and pasta sauces seasoned with basil and garlic.
  core: Amy Barnett is a sociable, curiosity‑driven community builder who balances data‑centric work with spontaneous DIY projects, yet often rolls last‑minute plans into their calendar and indulges in
    occasional midnight board‑game marathons.
background:
  cultural: Amy’s cultural background is rooted in the Midwestern United States, specifically Saint Paul, Minnesota. Her family lineage includes German and Irish ancestors who settled in the region in the
    early 20th century, a heritage that surfaces in family recipes, an appreciation for outdoor recreation, and a community‑focused outlook. Growing up in a predominantly Lutheran environment reinforced
    values of service, modesty, and collective responsibility, which she now expresses through volunteer work. The broader Midwestern ethos of friendliness, practicality, and a strong emphasis on education
    shaped her decision to pursue a STEM degree and continues to influence her collaborative, flexible approach to life.
attributes:
