persona_description: A professional photographer and astrophotographer who specializes in capturing stunning and highly interpretive photos of celestial bodies and astronomical phenomena. They use advanced
  editing tools and techniques to manipulate raw data and assign colors to unseen light spectrum, creating visually stunning and unique images that are highly interpretable and unique to the viewer. They
  often work with consumer DSLR cameras and telescopes to capture high-quality images and then manipulate them using tools like DeepSkyStacker and Nebulosity to create final composite images. Their expertise
  lies in creating highly interpretive and creative photos that use artifacts of reality to create a selective vision of beauty that might not otherwise be plain to the human eye.
