personas:
  professional: Angelique Addison, an aspiring junior game designer, merges her methodical Scratch coding, intricate LEGO architectural builds, and expressive watercolor sketches to prototype narrative-driven
    puzzle games, reflecting her curiosity, competitive drive, and meticulous planning; they approach each project with a skeptical eye and a desire to outdo themselves.
  sports: Angelique Addison, an enthusiastic hiker and member of her middle school's cross-country team, spends weekends trekking pine‑forested trails while also cheering for the local Springfield Tigers
    baseball team and the U.S. Women's National Soccer Team, approaching fitness with a competitive edge that drives them to meticulously log mileage and set personal bests, yet they sometimes push themselves
    too hard, leading to occasional fatigue.
  arts: Angelique Addison, a dedicated watercolorist and piano enthusiast, regularly attends community art workshops where they practice techniques inspired by Claude Monet and Yoshitaka Amano, lose themselves
    in the melodies of Ludovico Einaudi while composing tiny variations on the piano, and devour fantasy novels by Brandon Sanderson and sci‑fi classics by Octavia Butler, letting these influences shape
    their own short stories and elaborate LEGO sculptures.
  travel: Angelique Addison, an inquisitive budding traveler, meticulously maps out family road trips to nearby state parks like Redwood National Forest and dreams of backpacking through the ancient temples
    of Kyoto, balancing a love for adventurous hikes with a careful desire for structured itineraries, yet they sometimes fret over the unknown, causing them to double-check every detail before departure.
  culinary: Angelique Addison, a budding home chef with a knack for experimental cooking, adores whipping up vibrant strawberry‑spinach smoothies, crafting homemade pepperoni pizza with a perfectly crisp
    crust, and mastering the art of making bright turquoise blueberry muffins, often adding shimmering edible glitter for fun, while they occasionally over‑season dishes in their quest for bold flavors
    and worry about burning the next batch.
  core: Angelique Addison, a curious yet slightly anxious 12‑year‑old, blends artistic ambition, competitive drive, and meticulous organization into every hobby, from coding games to sketching pine forests,
    while habitually over‑thinking outcomes and chasing perfection.
background:
  cultural: Angelique grew up in Piedmont, a small town in Anderson County, South Carolina. Her family is part of a predominantly white, middle‑class community with deep roots in Southern tradition. She
    has been shaped by the region’s emphasis on community gatherings, church involvement, and local events such as the Anderson County Fair. The rural‑suburban landscape, with its pine forests and historic
    homes, fuels her interest in nature and preservation. While grounded in Southern hospitality and regional cuisine, Angelique also embraces modern influences through school programs, digital media, and
    exposure to diverse artistic ideas, giving her a blended cultural perspective.
