  career_goals: Angelique aspires to blend her love for art and science by pursuing a career in sustainable architecture or interactive design. In the short term, she aims to win her regional science fair,
    earn a place in a competitive summer art program, and lead her school's student council on a community‑based project. Long‑term, she hopes to study architecture or graphic illustration at a university,
    develop eco‑friendly design solutions, and eventually create a digital platform that helps young artists organize their creative workflow.
