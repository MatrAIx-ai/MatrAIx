  career_goals: Even though she is retired from formal employment, Amy aims to continue leveraging her STEM background to inspire lifelong learning in her community. She plans to develop a series of intergenerational
    workshops that combine practical skills—such as gardening, basic home repair, and digital technology—with scientific curiosity, like exploring renewable energy or local ecology. Amy also hopes to mentor
    younger volunteers, contribute articles to the local newspaper on sustainability, and eventually compile a memoir that captures the stories of her neighborhood’s evolution.
