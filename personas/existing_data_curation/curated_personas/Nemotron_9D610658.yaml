personas:
  professional: Amy Geiger, a retired STEM professional with a bachelor's degree in science, channels her analytical mind into community workshops that blend gardening, home repair, and digital literacy,
    and they leverage their confident public speaking and calm mediation skills to lead intergenerational learning events while joyfully hosting potluck gatherings at the local senior center.
  sports: Amy Geiger, an enthusiastic member of the East River Walking Club who delights in spring wildflower hikes, winter snowshoe outings, and avidly supports the Milwaukee Brewers and Green Bay Packers,
    balances organized exercise with a relaxed approach—often skipping scheduled tai chi sessions to tend to spontaneous garden projects, and they enjoy casual bridge tournaments as a mental sport with
    fellow seniors.
  arts: Amy Geiger, a devoted community‑theater host and avid digital‑photography student, finds inspiration in the folk melodies of the polka band The Bavarian Brass, the storytelling songs of Gillian
    Welch, and the iconic black‑and‑white landscapes of Ansel Adams, often sharing their own nature photographs at local art nights while volunteering backstage for productions of the Hometown Players.
  travel: Amy Geiger, an adventurous yet unhurried traveler, loves weekend road trips to Door County’s cherry orchards, leisurely explores the historic streets of Heidelberg during genealogical research
    trips, and revisits the Milwaukee Art Museum, always planning itineraries with flexible stops for unexpected bird‑watching detours and family‑friendly B&B stays, and they prefer relaxed travel over
    rigid schedules.
  culinary: Amy Geiger, a seasoned potluck chef, delights friends with her signature sauerkraut‑and‑apple strudel, buttery spätzle topped with fresh garden basil, and a comforting chicken noodle soup seasoned
    with rosemary from her herb patch, while they occasionally splurge on specialty cheese for Oktoberfest celebrations despite a habit of over‑salting recipes during busy evenings.
  core: Amy Geiger, a spry 72‑year‑old who blends scientific curiosity with community spirit, channels her love of gardening, photography, and teaching into vibrant neighborhood workshops, all while delighting
    in potlucks, casual sports fandom, and spontaneous travel adventures.
background:
  cultural: Amy was raised in a mid-western, predominantly white, German-American community in Wisconsin, where Lutheran traditions, strong neighborhood ties, and a deep appreciation for the natural landscape
    shaped her values. The regional culture emphasizes modesty, practicality, volunteerism, and seasonal celebrations such as potlucks, church festivals, and Oktoberfest. These influences fostered Amy’s
    collaborative spirit, love of outdoor activities, and commitment to giving back to her community.
