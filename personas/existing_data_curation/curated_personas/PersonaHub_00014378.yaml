persona_description: An IBM physicist who specializes in the development of nanotechnology and the creation of advanced manufacturing techniques. He has a team of physicists and chemists who work collaboratively
  to develop the substrate materials and refine the scanning probe technique. The persona is focused on the commercialisation of the technology and is in discussions with a European manufacturing company
  about its potential commercial applications. He is interested in the future of nanotechnology and the potential for the scanning probe technique to enable new micro-optic devices and shape-matching templates
  for self-assembling nano-rods or nano-tubes.
