personas:
  professional: Ella Theodate is a seasoned community arts organizer who blends meticulous event‑planning, budget analysis, and a skeptical eye for authenticity to curate inclusive art fairs that celebrate
    Southern gospel traditions while encouraging contemporary dialogues, and they consistently apply their critical, competitive mindset to ensure each project meets high standards.
  sports: Ella Theodate stays active by joining the Friday night senior tennis league at the Fayetteville Community Center and cheering for the Woodpeckers during the spring baseball season, while their
    weekly yoga class at a downtown studio keeps their joints supple for weekend hikes.
  arts: Ella Theodate’s artistic life swirls around sketching in Piedmont Park, writing reviews for the Greensboro Arts Alliance, and drawing inspiration from the bold narratives of Kara Walker, the soulful
    piano of Wynton Marsalis, and the gritty storytelling of August Wilson, all of which fuel their community‑focused curations.
  travel: Ella Theodate prefers carefully planned road trips that blend heritage tourism and artistic discovery, having spent a summer exploring the historic districts of Savannah and Charleston, while
    a future wish list includes a pilgrimage to New Orleans for its jazz festivals and a week‑long art immersion in Santa Fe's Pueblo‑style galleries, and they meticulously map routes to maximize cultural
    stops.
  culinary: Ella Theodate’s kitchen is a workshop where they transform classic Southern dishes like smoked collard greens and buttermilk fried chicken into healthier, flavor‑forward plates by adding quinoa,
    smoked paprika, and locally sourced honey, while they regularly indulge in shrimp and grits at the town’s beloved Riverfront Café and savor a slice of pecan pie made from their grandmother’s secret
    recipe.
  core: Ella Theodate blends a meticulous planner’s eye with a spontaneous artist’s heart, juggling endless community projects while hoarding vintage postcards, obsessively checking price tags for hidden
    fees, and never turning down a chance to sketch a passing street scene.
background:
  cultural: Ella’s cultural identity is rooted in the African‑American experience of the American South. Raised in Fayetteville’s historically Black neighborhoods, she grew up attending a Baptist church
    where gospel music, storytelling, and community service were integral. Family traditions emphasize resilience, self‑reliance, and pride in Southern Black culinary arts. She maintains strong ties to
    local civil‑rights history, often volunteering at events commemorating the region’s role in the movement. This heritage informs her artistic tastes, her appreciation for both traditional and contemporary
    Black art, and her commitment to uplifting under‑represented voices in the community.
