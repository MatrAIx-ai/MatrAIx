  hobbies: '[''Visiting galleries and museums'', ''Sketching and watercolor painting'', ''Digital photography'', ''Reading African‑American history and genealogy'', ''Cooking Southern cuisine'', ''Blogging
    about art and culture'', ''Attending jazz concerts and church events'', ''Community festivals'', ''Journaling'', ''Crossword puzzles'']'
  career_goals: Ella aims to transition from informal volunteer work to a paid role as a Community Arts Coordinator for a local nonprofit or museum in Fayetteville, where she can design and run workshops
    that blend African‑American cultural heritage with contemporary art practices. She also dreams of launching a small boutique studio that offers art‑supply sales, pop‑up exhibitions, and affordable art‑education
    classes for adults and youth. To achieve these goals, she plans to enroll in a community‑college certificate program in Arts Administration while building a professional portfolio of curated events
    and online content.
