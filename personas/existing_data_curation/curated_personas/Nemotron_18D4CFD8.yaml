personas:
  professional: Donald Harding, a retired manufacturing specialist turned senior volunteer fire department mentor, harnesses their methodical mechanical expertise, competitive drive, and event-planning
    acumen to lead safety trainings, coordinate emergency drills, and oversee community preparedness programs with precise logistics.
  sports: Donald Harding stays active by competing in a local bowling league, joining a senior cycling club that rides the rural trails, and attending weekly bridge sessions, while cheering for the Cleveland
    Browns, the Cleveland Cavaliers, and the Cincinnati Reds as their favorite professional sports teams.
  arts: Donald Harding expresses their artistic side backstage in a community theater troupe, handling set construction and lighting, while their leisure listening features folk legends Bob Dylan and Johnny
    Cash, their favorite films are classic John Wayne westerns, and they admire the Midwestern paintings of Grant Wood for their nostalgic charm.
  travel: Donald Harding prefers meticulously planned road trips, often charting scenic routes through Ohio's Hocking Hills, historic Gettysburg, and Maine's coastal cliffs, balancing a modest budget that
    limits overseas travel but fueling a long-standing dream of a heritage pilgrimage to Ireland's County Kerry.
  culinary: Donald Harding, an avid gardener, delights in turning their harvest of heirloom tomatoes, sweet corn, and fresh herbs into dishes like chilled tomato gazpacho, roasted corn and basil risotto,
    and a signature chicken pot pie seasoned with rosemary and thyme from the garden.
  core: Donald Harding is a structured, competitive retiree who channels their energetic sociability into community service, meticulous hobbies, and a relentless quest for perfect scores - whether on bowling
    lanes, garden yields, or safety drills - while occasionally splurging on impulse tool purchases and overlooking routine eye exams.
background:
  cultural: Donald Thomas Harding is a fifth‑generation Midwestern American whose family roots trace back to German and Irish immigrants who settled in southeastern Ohio in the late 19th century. Raised
    in a modest Methodist household in Quaker City, he internalized the region’s values of self‑reliance, modesty, and community service. The town’s historic Quaker influence, though subtle, fostered an
    appreciation for plain living and egalitarian principles, which blend with the broader Ohio rural culture of county fairs, church socials, and volunteerism. Donald’s upbringing in a tight‑knit, predominantly
    white community reinforced a strong sense of belonging and a practical, no‑nonsense outlook. He continues to honor these traditions through participation in local events, support of the volunteer fire
    department, and dedication to preserving the town’s historical narratives.
