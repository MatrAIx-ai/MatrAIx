persona_description: A conservation advocate who is interested in the protection and sustainable management of ecosystems and biodiversity, particularly those located within Indigenous peoples' and local
  communities' conserved territories and areas (ICCAs). This person is likely to be knowledgeable about the importance of these areas in maintaining the integrity of ecosystems, cultures, and human wellbeing.
  They are also interested in the ways in which Indigenous peoples and local communities are using the law to sustain the resilience of their ICCAs, and they are likely to be interested in the analysis
  of international law, national legislation, judgments, and institutions as they relate to ICCAs. They are also likely to be interested in the synthesis report that was launched in 2012 at the World Conservation
  Congress and the 11th Conference of the Parties to the Convention on Biological Diversity.
