  hobbies: '[''Visiting Art Museums and Galleries'', ''Painting/Sketching'', ''Photography'', ''Reading Contemporary Fiction and Poetry'', ''Writing an Art/Culture Blog'', ''Hiking with Friends'', ''Volunteering
    at Community Arts Programs'', ''Participating in Book Clubs'', ''Exploring New Cuisines through Cooking'', ''Traveling to Cultural Festivals'']'
  career_goals: Leslie aims to become a department chair within the next five years, using that platform to champion interdisciplinary humanities programs that bridge art, technology, and social justice.
    She aspires to secure a major research grant for a community-based public art initiative that partners local schools with nearby museums. Publishing a monograph on contemporary art theory and its impact
    on everyday life is a long‑term scholarly goal. She also hopes to mentor emerging educators, expand outreach programs that bring the campus's cultural resources into the broader South Plainfield community,
    and integrate innovative teaching technologies to enhance student engagement and experiential learning.
