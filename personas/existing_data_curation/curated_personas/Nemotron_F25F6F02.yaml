personas:
  professional: Lisa Thompson translates her hands‑on expertise in equipment calibration, OSHA compliance, and Kaizen‑driven continuous improvement into mentoring new hires and streamlining production,
    positioning herself for a shift‑supervisor role while actively pursuing a Six Sigma Green Belt certification.
  sports: Lisa Thompson hikes the Puente Hills every Saturday with the local Puente Hills Hiking Group, attends weekly Vinyasa sessions at Sunrise Flow Yoga, and roots for the Los Angeles Dodgers in baseball
    and the LA Galaxy in soccer, balancing structured team fandom with personal outdoor pursuits.
  arts: Lisa Thompson devotes evenings to unravelling mysteries by Agatha Christie, enjoys live shows at The Echo featuring John Mayer and The Strokes, and channels her creative energy into DIY home‑improvement
    projects that blend practical skill with artistic flair.
  travel: Lisa Thompson prefers a mixed travel style that blends carefully planned itineraries with spontaneous community festivals, having explored the vineyards of Napa Valley, the historic streets of
    Santa Fe, and a culinary tour of Tokyo, while dreaming of a future road trip along the Pacific Coast Highway.
  culinary: Lisa Thompson draws on her garden’s bounty of zucchini, heirloom tomatoes, and sweet corn to craft dishes like smoky chipotle chicken pot pie, ginger‑soy glazed salmon bowls, and roasted veggie
    tacos, showcasing a confident yet experimental cooking skill set.
  core: Lisa Thompson balances a pragmatic work ethic with a curiosity for new flavors and community ties, thriving on structure but allowing room for spontaneous DIY projects and occasional impulsive splurges
    on garden gear.
background:
  cultural: Lisa was raised in a middle‑class, white, suburban family in Southern California. Her parents, originally from the Midwest, instilled values of hard work, self‑reliance, and active community
    involvement. Growing up in the diverse environment of West Covina, she was exposed to a rich tapestry of cultures, especially Mexican and Asian communities, which broadened her appreciation for multicultural
    food, festivals, and the bilingual fabric of the area. Lisa embraces traditional American holidays such as Thanksgiving and the Fourth of July, while also participating in local multicultural celebrations
    and supporting neighborhood events that reflect the inclusive spirit of Los Angeles County.
attributes:
  skills: '[''assembly line operation'', ''machine setup and calibration'', ''basic mechanical troubleshooting'', ''quality inspection'', ''forklift operation (certified)'', ''inventory management'', ''OSHA
