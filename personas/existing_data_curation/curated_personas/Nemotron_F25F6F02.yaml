  hobbies: '[''gardening'', ''cooking'', ''hiking'', ''yoga'', ''volunteering at community center'', ''reading mystery novels'', ''attending live music'', ''DIY home improvement'']'
  career_goals: Lisa aims to advance to a shift‑supervisor role within the next two years, leveraging her practical experience to lead a team and improve operational efficiency. She plans to earn certifications
    such as a Six Sigma Green Belt and an advanced forklift safety course to broaden her qualifications. Over the longer term, Lisa envisions moving into production planning or quality‑assurance management,
    where she can combine her curiosity for new process innovations with her practical, detail‑oriented approach. She also hopes to mentor more junior workers and contribute to a culture of safety and continuous
    improvement at her plant.
