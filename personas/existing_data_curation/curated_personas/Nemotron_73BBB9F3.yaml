personas:
  professional: Linwood Wellman is a budding young inventor who loves tinkering with LEGO mechanisms and simple chemistry kits, using their curious and laid‑back mindset to experiment without strict plans,
    often turning playground ideas into makeshift prototypes.
  sports: Linwood Wellman dabbles in after‑school soccer with the Springfield Youth Soccer Club, cheers on the St. Louis Cardinals in baseball season, and enjoys spontaneous creek‑side tag games that keep
    their energy flowing without a rigid training schedule.
  arts: Linwood Wellman frequents the Springfield Art Museum to copy cartoon sketches, idolizes classic rock icons like The Beatles and folk legends like Woody Guthrie, and spends idle afternoons doodling
    characters inspired by Disney’s animated films.
  travel: Linwood Wellman loves weekend trips to Lake Springfield for fishing, day‑long pilgrimages to the Abraham Lincoln Home National Historic Site, and daydreams about future family road trips to the
    Grand Canyon and a possible visit to London’s Natural History Museum.
  culinary: Linwood Wellman prefers classic mid‑western fare such as buttered corn, pepperoni pizza, and warm apple pie, while their modest kitchen skills let them mash together easy trail‑mix snacks and
    help whisk pancake batter on Saturday mornings.
  core: Linwood Wellman is an eight‑year‑old curiosity machine who balances calm resilience with a habit of leaving LEGO pieces scattered across the floor, turning everyday moments into whimsical experiments.
background:
  cultural: Linwood was raised in Springfield, Illinois, a Midwestern city known for its historic ties to Abraham Lincoln and a tight‑knit community atmosphere. His family values modesty, friendliness,
    and a love of outdoor activities typical of the region. He regularly attends community events such as the Sangamon County Fair, participates in library storytimes, and benefits from a school curriculum
    that balances core academics with creative arts. This cultural setting blends practical Midwestern sensibilities with encouragement of curiosity, exposing him to American history, regional art, and
    the surrounding agricultural landscape.
