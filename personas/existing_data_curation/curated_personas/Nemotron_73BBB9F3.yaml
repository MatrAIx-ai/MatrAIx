  career_goals: Linwood dreams of a future where he can blend imagination with discovery. He aspires to become an illustrator who brings stories to life, a wildlife biologist who explores nature, or even
    an astronaut who travels to space. He also imagines teaching or sharing his love of art and science with other kids through community workshops one day.
