  career_goals: Although officially retired, Alec aims to stay purposefully engaged. He plans to complete the bachelor’s degree he began in business administration at a local community college, using the
    structured schedule to give his days predictability. He hopes to serve on the board of the El Paso Senior Resource Center, where he can apply his organizational strengths to improve program delivery.
    Alec also wants to mentor younger volunteers, sharing his practical expertise while learning new digital tools. To manage his tendency toward worry, he intends to adopt a regular mindfulness routine
    and attend a stress‑management workshop. Finally, he dreams of documenting his life story—particularly his experiences bridging Anglo‑Texan and Hispanic cultures—through a short memoir that can be shared
    with his grandchildren and the community.
