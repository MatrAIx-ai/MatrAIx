  hobbies: '[''Line dancing'', ''Gardening'', ''Hiking'', ''Acoustic guitar'', ''Book club'', ''Volunteer work at senior center'', ''Cooking Tex-Mex meals'', ''Crossword puzzles'', ''Community theater'',
