personas:
  professional: Neoma Sanders, a seasoned production-machine operator in a manufacturing plant, leverages their meticulous attention to routine, precise feed‑rate management, and safety‑first mindset to
    keep the line running smoothly while quietly mentoring newer employees and refining standard operating procedures.
  sports: Neoma Sanders enjoys weekend hikes on nearby Appalachian trails, participates in a community‑center pick‑up softball league, and faithfully follows the Pittsburgh Steelers and West Virginia Mountaineers,
    cheering from their living room while keeping a casual membership in the local hiking club.
  arts: Neoma Sanders finds solace in classic country and bluegrass, regularly listening to Dolly Parton, Bill Monroe, and Alison Krauss while knitting, and volunteers to lead crafts workshops for children,
    channeling their love of routine into creative expression.
  travel: Neoma Sanders prefers low‑cost road trips that blend nature and nostalgia, having explored Shenandoah National Park, Asheville’s Biltmore Estate, and Nashville’s music scene, while dreaming of
    a quiet cabin weekend in the Great Smoky Mountains.
  culinary: Neoma Sanders enjoys cooking comfort meals like chicken and dumplings, collard greens, and cornbread, skillfully using garden‑fresh tomatoes and sweet corn, though they occasionally over‑salt
    dishes when a stressful day at work lingers.
  core: Neoma Sanders is a routine‑driven, gentle mentor with a penchant for knitting, a worry‑prone mind, and a habit of double‑checking machinery before each shift.
background:
  cultural: Neoma grew up in a close‑knit white Appalachian family in Randolph County, West Virginia. Her upbringing emphasized self‑reliance, practical skills, community cooperation, and respect for tradition.
    She was raised attending a family‑run church, participating in local fairs and bluegrass festivals, and learning to prepare regional dishes and maintain a homestead. These rural cultural values of routine,
    modesty, and strong neighborly ties shape her worldview and daily habits.
attributes:
  skills: '[''Machine feeding'', ''Production line monitoring'', ''Basic mechanical troubleshooting'', ''Safety compliance'', ''Data logging for production'', ''Inventory tracking'']'
  hobbies: '[''Knitting'', ''Gardening'', ''Church potlucks'', ''Listening to country and bluegrass music'', ''Hiking local trails'', ''Volunteering at community center'']'
  career_goals: Neoma aims to advance within the plant by moving into a lead‑operator or shift‑supervisor position where she can mentor newer employees and help refine standard operating procedures. She
    hopes to obtain a certification in industrial safety and eventually transition to a training coordinator role that blends her love of routine with a focus on fostering a harmonious and low‑stress work
    environment.
