personas:
  professional: Kevin, an entertainment attendant at a bustling South Florida music venue, leverages their curiosity and sociable nature to manage crowds, operate audio-visual equipment, and promote events
    on social media, and they are actively pursuing a junior event-planner role within two years through coursework in hospitality management.
  sports: Kevin, an avid pick-up basketball player who regularly joins the Broward County open-court league, cycles the scenic coastal trail with the South Florida Cycling Club, and roots for the Miami
    Heat and Tampa Bay Buccaneers, approaches fitness with a relaxed, spontaneous mindset, and they often squeeze a quick ride after a night shift.
  arts: Kevin, a devoted vinyl collector who spins reggae legends like Bob Marley and hip-hop icons such as Kendrick Lamar at backyard parties, frequents Wynwood Walls to photograph murals by local artists
    like Hennessy Young, and volunteers to curate youth art workshops where they encourage emerging talent to blend visual storytelling with rhythm.
  travel: Kevin, who dreams of island-hopping through Jamaica’s reggae-filled streets and tasting Trinidadian doubles, often plans last-minute weekend getaways to Key West or the Everglades, blending adventure
    with a modest travel budget and a penchant for spontaneous road trips that they book on a whim.
  culinary: Kevin, a budding home chef who blends Caribbean staples like jerk chicken and plantain chips with Southern comforts such as collard greens and gumbo, skillfully seasons dishes with Scotch bonnet
    peppers, allspice, and smoked paprika, and often invites friends over to share their culinary experiments, though they sometimes over-salt in the excitement.
  core: Kevin, a curious and sociable 23-year-old who balances spontaneous art-filled nights and a love for Caribbean-Southern flavors with an occasional disorganized streak, uses their vibrant cultural
    roots to create inclusive experiences, even if they sometimes forget to pay a bill on time.
background:
  cultural: Kevin identifies as a Black American raised in Hollywood, Florida, a city marked by a blend of Afro‑Caribbean, Southern, and multicultural influences. His family maintains traditions rooted
    in Southern Black church gatherings and Caribbean celebrations, giving him a deep appreciation for gospel music, reggae rhythms, and storytelling through food and dance. Growing up in Broward County's
    diverse neighborhoods exposed him to a vibrant mix of cultures, which fuels his curiosity about art and his desire to create inclusive spaces where varied experiences are celebrated.
attributes:
  skills: '[''Customer service'', ''Crowd management'', ''Ticketing system operation'', ''Cash handling'', ''Basic audio‑visual equipment setup'', ''Social media promotion'', ''Creative problem solving'',
    ''Interpersonal communication'', ''Basic graphic design'', ''Photography'']'
  hobbies: '[''Visiting art galleries'', ''Street‑art tours'', ''Indie film screenings'', ''Pick‑up basketball'', ''Coastal biking'', ''Cooking Caribbean‑Southern cuisine'', ''DJing'', ''Collecting vinyl
    records'', ''Attending live concerts'', ''Volunteering at community art workshops'']'
  career_goals: Kevin aspires to transition from attendant duties to event coordination, aiming to become a junior event planner for a mid‑size music venue within the next two years. He plans to enroll
    in a bachelor's program in hospitality or entertainment management to deepen his knowledge of budgeting, logistics, and vendor relations. Ultimately, he dreams of launching his own boutique events company
    that showcases Black and Afro‑Caribbean art, music, and cuisine, providing a platform for emerging artists in South Florida while maintaining the flexibility and varied experiences he values.
