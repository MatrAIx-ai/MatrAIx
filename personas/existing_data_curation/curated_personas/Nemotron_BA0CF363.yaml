  hobbies: '["Woodworking", "Fishing", "Gardening", "Classic car club", "Reading historical nonfiction", "Model train building", "Puzzle solving", "Volunteering at community senior center"]'
  career_goals: Rickey aims to transition into a stable supervisory role within his current plant, where he can apply his extensive practical knowledge to improve production efficiency and safety outcomes.
    He wants to formalize his mentorship of younger workers, potentially moving into a part‑time trainer or consultant position as he approaches retirement. Financial security is a priority, so he seeks
    a reliable pension and explores opportunities to provide lean‑manufacturing consulting on a freelance basis. Additionally, he hopes to maintain a manageable workload that minimizes stress and allows
    him to preserve his health and well‑being.
