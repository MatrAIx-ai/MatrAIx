  hobbies: '[''Watercolor Painting'', ''Quilting'', ''Reading Historical Fiction and Philosophy'', ''Gardening (Heirloom Tomatoes, Herbs)'', ''Book Club Participation'', ''Community Theater Acting and Writing'',
    ''Digital Photography'']'
  career_goals: Nicole aims to transition from full‑time call‑center work to a part‑time mentorship and training role within her organization, where she can share her accumulated knowledge with younger
    employees. She also hopes to volunteer as a community liaison for the local senior center, offering workshops that blend practical communication skills with creative arts. In the longer term, Nicole
    envisions publishing a collection of short stories inspired by her Southern upbringing and the diverse people she has helped throughout her career.
