persona_description: A development professional with expertise in climate finance, particularly in Africa. They are focused on supporting African countries in accessing international climate finance and
  developing strategies to increase their share of global climate finance disbursements. They have a strong understanding of the challenges faced by African countries in accessing climate finance, including
  a weak enabling environment, limited institutional capacity, and cumbersome processes and requirements of international funds and institutions. They have experience in conducting preparatory or "readiness"
  activities to help countries strengthen their capacities and enabling environment to access and mobilise climate finance. They are passionate about using their expertise to support sustainable development
  in Africa.
