persona_description: A historian or a researcher who is interested in the history and culture of the Appaloosa horse, its evolution, and its association with art and history. They appreciate the effort
  put into researching the history of the Appaloosa horse and are interested in the variety of art forms that depict the horse. They are likely to be familiar with the Stone Age paintings of spotted horses
  and the history of the Appaloosa horse from ancient times. They are interested in the scientific research conducted by Francis Haines and appreciate the illustrations and footnotes included in the book.
