personas:
  professional: Phoebe Bolden, an aspiring young coder and storyteller who builds intricate LEGO worlds and draws characters from adventure novels, channels a love of structure into their Scratch projects
    while occasionally abandoning plans for spontaneous ideas, and they often find themselves worrying about meeting expectations despite their kind, cooperative nature that drives them to help classmates.
  sports: Phoebe Bolden, a soccer enthusiast who plays forward for the Longmeadow Little Strikers youth club and cheers on the Boston Red Sox and Boston Celtics during the baseball and basketball seasons,
    enjoys weekend games at the local park, mixes structured practice drills with spontaneous backyard kicks, and their cooperative spirit makes them a supportive teammate, though they occasionally skip
    drills when overwhelmed by school stress.
  arts: Phoebe Bolden, an avid young artist who spends afternoons drawing characters from Harry Potter and Percy Jackson, sings soulful R&B tunes by Beyoncé and Leon Bridges in the church choir, and playlists
    upbeat pop hits from Taylor Swift and Ariana Grande while they doodle, channeling their love of structure into detailed sketches yet sometimes abandoning projects for spontaneous bursts of color, reflecting
    a kind heart that enjoys sharing art with friends.
  travel: Phoebe Bolden, a curious traveler who has explored the leaf‑laden trails of the Longmeadow Conservation Area, visited Cape Cod for beach picnics, dreamed of seeing the Acadia National Park sunrise,
    and hopes to wander the historic Smithsonian museums in Washington, D.C., all while preferring their parents’ carefully planned itineraries but sneaking in spontaneous detours to ice‑cream stands whenever
    they spot a new flavor.
  culinary: Phoebe Bolden, a budding kitchen helper who loves baking sweet potato pie and gingerbread cookies alongside grandparents during Juneteenth celebrations, mixes batter for banana bread and mac and cheese
    with a dash of extra cheese out of excitement, and while they skillfully follow recipes for collard greens, they sometimes forget to measure spices, leading to overly salty bites that they laugh off
    and fix with a splash of lemon.
  core: Phoebe Bolden, a ten‑year‑old who balances a love for structured LEGO builds and spontaneous coding bursts, worries about school expectations, yet they shine through kindness in group projects and
    a palate for soul‑food sweets.
background:
  cultural: Phoebe is a Black child growing up in Longmeadow, Massachusetts, where her family maintains strong ties to African American cultural traditions. She celebrates Juneteenth and Black History Month,
    learning about the contributions of Black pioneers through school projects and family storytelling. Her grandparents often share oral histories and recipes for soul food dishes, which she helps prepare
    during holidays. The local church community provides a supportive network, with choir rehearsals and community service events that reinforce values of cooperation and kindness. Exposure to both the
    regional New England environment and her family's heritage shapes her worldview, fostering a sense of pride in her identity and an appreciation for cultural diversity.
