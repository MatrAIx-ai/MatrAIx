  skills: '[''reading comprehension'', ''basic arithmetic'', ''digital literacy (tablet, Scratch)'', ''drawing and painting'', ''empathy and peer mediation'', ''following structured classroom routines'']'
  hobbies: '[''reading adventure books'', ''drawing and sketching'', ''LEGO building'', ''soccer'', ''exploring nature (leaf/rock collection)'', ''basic Scratch coding'', ''listening to music (pop and R&B)'',
    ''baking with family'']'
  career_goals: Phoebe dreams of a future where she can help both animals and people. She aspires to become a veterinarian because she loves caring for pets and wildlife, and she also imagines herself as
    a teacher who can make learning fun and supportive for younger children. She hopes to combine her love for science and her desire to create a caring, structured environment where everyone feels safe
    and understood.
