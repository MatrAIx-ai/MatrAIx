  career_goals: Fred aims to transition into an engineering management role where he can guide sustainable product development and drive continuous improvement initiatives. He is motivated to spearhead
    projects that integrate emerging technologies with proven manufacturing practices, while fostering a collaborative culture that supports junior engineers' growth. Over the next five years, he envisions
    establishing a consulting practice that helps Midwestern manufacturers adopt lean and eco-friendly processes, allowing him to balance professional impact with personal flexibility.
