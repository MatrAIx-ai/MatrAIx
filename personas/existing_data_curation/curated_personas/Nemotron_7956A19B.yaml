  hobbies: '[''Gardening'', ''Woodworking'', ''Playing bridge'', ''Volunteer work at senior center'', ''Nature trail walking'', ''Historical society involvement'', ''Reading historical nonfiction'', ''Genealogy
    research'', ''Community theater attendance'', ''Traveling to family'']'
  career_goals: Although retired from full‑time employment, John aims to remain intellectually active and socially engaged. He plans to volunteer his engineering expertise on local historic preservation
    and community park improvement projects, offering design advice and safety reviews. He aspires to mentor high‑school and community‑college students interested in STEM, perhaps through a formal program
    at the nearby community college. Additionally, John wishes to document his professional experiences in a memoir that could serve as a resource for future engineers. Maintaining his health and supporting
    his wife’s interests are also central to his personal ambition.
