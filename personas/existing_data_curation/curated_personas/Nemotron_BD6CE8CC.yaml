personas:
  professional: Amir Ray, a 43‑year‑old engineering consultant with expertise in data analysis, CAD design, and prototype development, blends his curiosity for new technology with a pragmatic, flexible
    approach, often juggling multiple client projects despite a habit of occasional disorganization and a skeptical eye toward vague proposals.
  sports: Amir Ray enjoys weekend bike rides with the Wichita Cycling Club, cheers for the Kansas City Chiefs during football season, and participates in community pick‑up basketball games at the local
    recreation center, preferring low‑key activity over regimented gym routines.
  arts: Amir Ray’s evenings are filled with jazz classics from Miles Davis and blues from B.B. King, occasional gospel hymns at his neighborhood church, and strategic video‑game sessions with titles like
    Civilization VI, which satisfy his love for narrative depth and competitive strategy.
  travel: Amir Ray favors road trips that combine outdoor adventure and cultural immersion, such as his recent drive through Yellowstone and a weekend in New Orleans for live jazz and Creole cuisine, while
    his family commitments steer future plans toward family‑friendly destinations like the Grand Canyon and a tech‑focused tour of Seattle.
  culinary: Amir Ray’s kitchen balances soulful comfort dishes like fried catfish with collard greens and a modern farm‑to‑table twist, often adding heirloom tomatoes, fresh basil, and smoked paprika to
    create a weekend brunch of shrimp and grits topped with jalapeño‑infused hollandaise.
  core: Amir Ray is a curious yet pragmatic tinkerer who balances flexible consulting work with community mentorship, wrestling with occasional worry and disorganization while staying rooted in hands‑on
    creation, music, and soulful cooking.
background:
  cultural: Amir is an African American who grew up in Wichita’s historic Black neighborhoods, where community churches, family gatherings, and local cultural events shaped his identity. The legacy of the
    Great Migration and the civil‑rights era instilled in him a strong sense of resilience and collective responsibility. He maintains active ties with regional Black organizations, participates in Juneteenth
    celebrations, and supports initiatives that promote Black youth in STEM. His culinary tastes blend Southern soul‑food traditions with Midwestern farm‑to‑table freshness, reflecting both his heritage
    and his Kansas surroundings. The intersection of Midwestern practicality and African American cultural expression informs his worldview, fostering a balance between curiosity, pragmatism, and a commitment
    to give back to his community.
