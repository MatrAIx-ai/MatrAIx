  hobbies: '[''Electronics tinkering'', ''Gardening'', ''Reading science fiction'', ''Listening to jazz and gospel music'', ''Cooking soul food'', ''Cycling'', ''Meditation and journaling'', ''Playing strategy
    video games'', ''Community volunteer tutoring'']'
  career_goals: Amir aims to re‑enter the workforce on his own terms, seeking flexible consulting roles that let him apply his engineering expertise to local manufacturers and small businesses in Wichita.
    He dreams of launching a boutique technical consultancy that offers process improvement and prototype development services, allowing him to balance curiosity‑driven projects with practical outcomes.
    Mentoring the next generation of Black STEM students is also a key ambition; he hopes to teach part‑time at a community college or run after‑school coding workshops. Ultimately, he wants a career path
    that provides financial stability for his family while preserving the flexibility he values and reducing the stress associated with rigid corporate schedules.
