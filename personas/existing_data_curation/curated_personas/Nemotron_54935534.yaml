personas:
  professional: Stephanie Lewis is a veteran STEM curriculum specialist who leverages their analytical mindset, meticulous organization, and competitive drive to design data‑driven, equity‑focused programs
    while mentoring early‑career teachers and navigating grant proposals with pragmatic flexibility.
  sports: Stephanie Lewis enjoys solitary walks and bird‑watching at Patterson Park, follows the Baltimore Ravens and Orioles avidly, participates in a low‑key senior walking group at the Inner Harbor,
    and occasionally joins a local pickleball club for light competition, balancing a preference for quiet exercise with a competitive streak in weekend bridge tournaments.
  arts: Stephanie Lewis finds solace in classic literature by Jane Austen and George Orwell, curates an eclectic jazz playlist featuring Miles Davis, John Coltrane, and B.B. King, and attends occasional
    performances at the Baltimore Symphony Orchestra, allowing the rhythms and narratives to shape their reflective leisure time.
  travel: Stephanie Lewis favors thoughtfully planned, low‑stress trips such as a quiet weekend retreat in the Blue Ridge Mountains, a literary pilgrimage to Edinburgh to trace the footsteps of the Scottish
    Enlightenment, and a leisurely cruise along the Chesapeake Bay, often choosing destinations that offer gentle walking paths and opportunities for bird‑watching.
  culinary: Stephanie Lewis delights in preparing garden‑fresh dishes like roasted carrot‑beet salad with a tangy balsamic glaze, sautéed kale with garlic and lemon, and homemade sourdough bread, while
    their cooking skill sits at an adept level, and they frequently pair meals with a smooth jazz record and a glass of crisp Riesling.
  core: Stephanie Lewis blends a meticulous, skeptical mind with a love for solitary intellectual pursuits, channeling competitive energy into mentorship and gardening while juggling worry‑driven financial
    caution and a habit of over‑analysing everyday stresses.
background:
  cultural: Stephanie is a second‑generation African‑American rooted in Baltimore’s historic Black neighborhoods. Growing up during the civil‑rights era, she witnessed the power of community activism and
    the importance of education as a vehicle for empowerment. Her family traditions include celebrating Juneteenth, gospel music, and soul food cooking, while her faith community has long provided a support
    network. She incorporates culturally responsive teaching practices, drawing on local Black history such as Frederick Douglass and the Baltimore Freedom Trail, to make STEM content relevant to her students.
    Her background as a widowed Black woman informs a resilient outlook and a commitment to mentoring the next generation, particularly those from under‑represented backgrounds.
attributes:
  skills: '[''STEM curriculum development'', ''Differentiated instruction'', ''Data‑driven assessment and analysis'', ''Technology integration (coding, robotics, digital labs)'', ''Classroom management'',
    ''Mentoring novice teachers'', ''Grant writing for STEAM programs'', ''Lesson planning and execution'', ''Educational research and resource evaluation'', ''Use of Learning Management Systems (e.g.,
    Google Classroom)'', ''Curriculum alignment with Maryland state standards'']'
  hobbies: '[''Reading (science nonfiction and classic literature)'', ''Gardening (balcony vegetable garden)'', ''Knitting and crocheting'', ''Solitaire and chess (online tournaments)'', ''Crossword and
    Sudoku puzzles'', ''Walking along the Inner Harbor and in local parks'', ''Bird‑watching'', ''Listening to jazz and blues music'', ''Mentoring in after‑school STEM programs'', ''Journaling and reflective
    writing'']'
  career_goals: Stephanie aims to cement her legacy as a champion for equitable STEM education in Baltimore. Over the next few years she plans to mentor a cohort of early‑career teachers, develop a community‑based
    after‑school robotics and coding program targeting under‑represented Black students, and author a culturally responsive STEM curriculum guide for elementary educators. She also seeks to secure grant
    funding to upgrade her school's technology lab, and to present her research on the impact of early STEM exposure on student resilience at regional conferences. While approaching retirement, she remains
    driven to influence policy at the district level, advocating for resources that reduce student stress and promote inclusive pedagogy.
