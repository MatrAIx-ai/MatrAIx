personas:
  professional: Kathleen Vann, a 29‑year‑old Licensed Practical Nurse in Colorado Springs, combines meticulous vital‑sign monitoring, wound‑care expertise, and efficient electronic health record documentation
    with a curious yet pragmatic mindset that fuels her collaborative approach to interdisciplinary patient care and drives her ambition to become a BSN‑educated RN.
  sports: Kathleen Vann fuels her fitness through weekend hikes on Garden of the Gods and Pikes Peak with the Pikes Peak Adventure Club, weekly Zumba and line‑dancing sessions at Fit Pulse Zumba, and cheering
    on the Colorado Springs Switchbacks FC and the Denver Broncos, embodying a social and adventurous athletic lifestyle.
  arts: Kathleen Vann captures the Colorado skyline with her landscape photography inspired by Ansel Adams and Edward Burtynsky, enjoys contemporary novels by Sally Rooney and Celeste Ng, and relaxes to
    indie folk sounds from The Lumineers and Fleet Foxes, weaving artistic appreciation into her leisure time.
  travel: Kathleen Vann favors spontaneous weekend road trips to Rocky Mountain National Park, Sedona, and Banff, while dreaming of trekking Patagonia and Iceland, planning trips around group availability
    and modest budgets, and often uses Airbnb stays to stay close to nature.
  culinary: Kathleen Vann balances her wholesome cooking skills by whipping up quinoa‑vegetable bowls, cedar‑plank salmon with a dash of Colorado green chili, and kale‑goat‑cheese salads, favoring fresh
    local ingredients like rainbow trout and heirloom tomatoes while delighting friends with experimental flavor pairings.
  core: Kathleen Vann, 29, is an energetic nurse who blends a love for the Colorado outdoors, community health advocacy, and vibrant group activities, yet sometimes overcommits to social events, leading
    to occasional sleep deprivation.
background:
  cultural: Kathleen identifies as a White American with deep roots in the Rocky Mountain region. Her family heritage includes German and Irish ancestry, typical of many Colorado Springs residents. Growing
    up in a modest suburban neighborhood, she embraced the outdoor, self‑reliant culture of the area—hiking, camping, and a strong community spirit. Her upbringing in a Protestant Christian household emphasized
    kindness, cooperation, and service to others, values that continue to shape her interpersonal approach. The blend of Midwestern work ethic, Colorado's love for nature, and a commitment to community
    involvement forms the core of her cultural identity.
attributes:
