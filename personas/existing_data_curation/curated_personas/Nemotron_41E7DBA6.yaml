  hobbies: '[''Hiking the Rocky Mountains'', ''Group fitness classes (Zumba, line dancing)'', ''Volunteering at community health fairs and food banks'', ''Landscape photography'', ''Cooking and baking for
    friends'', ''Reading contemporary fiction'', ''Board game nights with friends'', ''Gardening (herb garden)'', ''Attending local music festivals'', ''Participating in community volunteer clean‑up events'']'
  career_goals: Kathleen aims to advance her nursing career by completing a Bachelor of Science in Nursing (BSN) program part‑time, seeking a transition to Registered Nurse status. She is drawn to community
    health nursing, hoping to work in outreach programs that address health disparities in Colorado Springs. She also aspires to obtain a wound‑care certification and eventually take on a charge nurse role
    in a clinic or urgent‑care center, where she can mentor new staff and implement patient‑centered care models. Additionally, she is interested in pursuing leadership training and possibly a Nurse Practitioner
    track in the future, balancing her professional growth with personal stability.
