persona_description: A professional engineer who specializes in the design and optimization of cooling systems for engines. They are responsible for ensuring the efficient and reliable operation of the
  cooling circuit by selecting the appropriate size and type of cooling circuit, controlling the thermostat to maintain the desired operating temperature, and designing the cooling system to withstand extreme
  ambient temperatures. They have extensive knowledge in thermodynamics, heat transfer, and fluid dynamics, and are skilled in the use of advanced cooling technologies such as advanced coolant mixtures,
  heat exchangers, and control systems. They are also familiar with the latest research and developments in the field of engine cooling, and are constantly seeking to improve the efficiency and performance
  of the cooling system.
