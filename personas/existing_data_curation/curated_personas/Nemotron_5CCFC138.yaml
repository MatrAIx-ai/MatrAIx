personas:
  professional: Maria Munoz, a 32‑year‑old residential housekeeping specialist, leverages their bilingual fluency, meticulous cleaning protocols, and competitive drive to train staff, manage inventory,
    and pursue IICRC and green‑cleaning certifications while plotting an eco‑friendly cleaning startup that balances structured workflows with their need for flexible scheduling.
  sports: Maria Munoz follows their favorite Liga MX club passionately, watches each match on streaming platforms and joins local fan watch‑parties, while complementing their soccer enthusiasm with twice‑weekly
    walks in Merced’s Central Park where they often sync their steps to the rhythm of cumbia music.
  arts: Maria Munoz immerses themselves in regional cumbia and norteño sounds from artists like Los Ángeles Azules and Banda El Recodo, attends the annual Merced Fiesta cultural festival featuring folkloric
    dance, and channels their creative side by crocheting colorful blankets while binge‑watching drama series such as "Narcos" and "El Señor de los Cielos."
  travel: Maria Munoz prefers flexible, budget‑conscious weekend trips, often heading to nearby Santa Barbara vineyards or the historic missions of California, while dreaming of a future getaway to Oaxaca’s
    markets to source authentic chilies for their mole, balancing travel plans with the financial demands of their budding cleaning business.
  culinary: Maria Munoz passionately cooks tamales, mole poblano, and fresh salsa, regularly harvesting cilantro, oregano, and rosemary from their balcony herb garden, experiments with heirloom corn and
    rare chilies, yet when deadlines loom they sometimes shortcut with frozen tortillas and take‑out tacos.
  core: Maria Munoz blends a competitive, structure‑seeking mindset with a love for community traditions, juggling an ambitious eco‑cleaning venture, anxiety‑driven stress‑relief rituals, and a vibrant
    cultural life.
background:
  cultural: Maria is a first‑generation Mexican American whose parents immigrated from central Mexico. She grew up speaking Spanish at home and celebrating Catholic holidays such as Día de los Muertos,
    Christmas posadas, and quinceañeras. These traditions have shaped her strong sense of family, community, and respect for cultural customs. In Merced’s vibrant Latino community, Maria participates in
    local church events, neighborhood festivals, and Spanish‑language gatherings, maintaining a bilingual identity that informs both her personal life and professional interactions. Her cultural heritage
    influences her cooking, her appreciation for music, and her meticulous care when cleaning homes that host cultural celebrations.
