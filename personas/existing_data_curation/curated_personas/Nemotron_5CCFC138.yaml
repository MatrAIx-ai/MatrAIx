  career_goals: Maria aims to obtain professional cleaning certifications (such as IICRC and green‑cleaning credentials) within the next year to solidify her expertise. She plans to complete her associate
    degree in business administration, which will enable her to launch her own eco‑friendly cleaning service focused on residential clients in Merced. Her ambition is to become the highest‑rated cleaning
    provider in the area, offering flexible scheduling that balances predictability for clients with her own need for adaptable work hours. In the longer term, Maria hopes to expand the business to a small
    team, secure a stable income that supports homeownership, and eventually transition into a supervisory role for a larger facilities‑management firm if she chooses to scale back her entrepreneurial responsibilities.
