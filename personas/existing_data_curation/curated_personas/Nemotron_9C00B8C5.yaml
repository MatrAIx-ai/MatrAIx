  career_goals: Randy dreams of a future where his curiosity and practicality combine. He aspires to become a scientist‑engineer who designs simple inventions that help people, and also envisions serving
    his community as a firefighter. In the meantime, he sets concrete short‑term goals such as mastering reading, earning a ‘Classroom Helper’ badge, and leading his soccer team.
