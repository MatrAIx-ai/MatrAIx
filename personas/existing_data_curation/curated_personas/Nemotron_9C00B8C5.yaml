personas:
  professional: Randy Kelly, a budding junior architect of the sandbox world, channels their methodical LEGO engineering into daily play, organizes playdate projects with the precision of a tiny project
    manager, and merges curiosity about space animals with practical problem‑solving to prototype simple structures for school science fairs.
  sports: Randy Kelly, a lively six‑year‑old forward for the Sunset Stars Youth Soccer Club, spends Saturday mornings sprinting drills with classmates, idolizes the Seattle Seahawks’ defensive line for
    their teamwork, and eagerly cheers for the Seattle Mariners whenever the family watches a game after school, often using their bright shout of ‘Go!’ to pump up teammates.
  arts: Randy Kelly, a bright choir singer who loves belting ‘Let It Go’ from Disney’s Frozen, sketches space rockets in the margin of Dr. Seuss picture books, and proudly displays a LEGO mini‑figure of
    astronaut Chris Hadfield while humming along to Taylor Swift’s ‘Shake It Off’ during playtime.
  travel: Randy Kelly, a curious explorer who has collected shells on the local Bluewater Beach and trekked the family’s weekend hikes in the Cascade foothills, dreams of an adventure to the Grand Canyon’s
    rim and a future trip to Australia’s Great Barrier Reef to spot colorful marine life.
  culinary: Randy Kelly, an eager kitchen helper who can whisk together a perfect bowl of cheesy macaroni, loves topping pizza with pepperoni and extra mozzarella, and proudly collects strawberry slices
    and tiny dinosaur‑shaped chicken nuggets for their snack box, while insisting on adding a pinch of ketchup to everything.
  core: Randy Kelly, a six‑year‑old whirlwind of organized curiosity, can build elaborate LEGO galaxies in minutes, bargain for extra soccer drills with the same charm they use to negotiate bedtime stories,
    yet occasionally leaves a trail of scattered rock collections in their wake.
background:
  cultural: Randy grew up in the coastal community of Kingsland, Georgia, where Southern hospitality and close‑knit neighborhood ties shape everyday life. His family celebrates traditional holidays with
    Southern dishes, attends a local Baptist church, and participates in community events such as Fourth of July parades and Little League games. Outdoor activities like beach visits, fishing trips, and
    nature hikes are common, fostering his love for the environment. While rooted in a predominantly white, suburban Southern culture, Randy is also exposed to the diverse cultural influences of Camden
    County through school and community gatherings.
