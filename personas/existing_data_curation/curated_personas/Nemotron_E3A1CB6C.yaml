  career_goals: Adam often talks about becoming an engineer or a firefighter when he grows up, because he likes building things that work and helping people in need. He is also fascinated by space, so he
    sometimes imagines being an astronaut. At age eight, his ambitions are guided by his love of practical projects, teamwork, and solving puzzles, and he hopes to keep learning new skills that could lead
    to these future roles.
