personas:
  professional: Adam Brown is an eager junior robotics enthusiast who spends their afternoons in an after‑school LEGO Boost club, tinkering with simple programmable builds and dreaming about how their curiosity
    for how things work can someday translate into real‑world inventions, even if their scattered notes and relaxed attitude toward deadlines sometimes force them to improvise on the fly.
  sports: Adam Brown is a spirited member of the Riverdale Rockets U‑9 soccer team, cheering for the local professional club Metro FC while also spending weekends racing their bike around the neighborhood
    park, and they proudly wear a jersey emblazoned with their favorite player, Alex Morgan.
  arts: Adam Brown is a budding doodler who fills sketchbooks with detailed dinosaurs inspired by the 'Jurassic World' movies, enjoys listening to The Wiggles while building in Minecraft, and curls up with
    the Magic Tree House series, they often reenact scenes with homemade props during family barbecues.
  travel: Adam Brown loves spontaneous family road trips to nearby state parks like the Blue Ridge Mountains, dreams of visiting the dinosaur fossils at the Dinosaur National Monument in Utah, and prefers
    the thrill of camping under the stars over staying in hotels, though occasional boredom on long drives leads them to demand extra stops at fast‑food joints.
  culinary: Adam Brown prefers hands‑on meals, helping grill burgers and hot dogs at backyard barbecues, loves the crunchy texture of dinosaur‑shaped chicken nuggets and cheesy macaroni, and while their
    cooking skill is limited to stirring batter, they often experiment by adding unexpected ingredients like pineapple to pizza, much to the amusement of their parents.
  core: Adam Brown, an 8‑year‑old with boundless curiosity and a love for group play, blends a passion for building LEGO robots with a carefree approach to chores, often forgetting homework but never missing
    a chance to score a goal on the soccer field, and they always rally friends for a quick game after school.
background:
  cultural: Adam grows up in a suburban neighborhood of Euless, Texas, in a middle‑class family that reflects mainstream American culture with local Texan influences. He celebrates national holidays such
    as Thanksgiving and the Fourth of July, enjoys community events like local fire‑department open houses, and attends school functions that emphasize teamwork and friendly competition. The multicultural
    atmosphere of the Dallas‑Fort Worth metro area exposes him to diverse foods, music, and traditions, while his family emphasizes education, community involvement, and a relaxed, friendly lifestyle.
