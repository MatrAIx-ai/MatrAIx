  hobbies: '["Reading mystery and historical fiction", "Gardening (vegetables and herbs)", "Woodworking and DIY projects", "Bird‑watching", "Playing chess and card games at the senior center", "Volunteering
    at soup kitchen and senior outreach", "Listening to classic rock and folk music", "Cooking experimental dishes", "Mindfulness breathing exercises", "Attending senior‑friendly yoga classes"]'
  career_goals: Approaching retirement, Robert aims to transition from a front‑line crew member to a mentorship role, becoming a trusted shift supervisor who can train new hires and model compassionate
    workplace behavior. He hopes to develop a small, community‑focused nutrition program within his restaurant, offering healthier meal options and educational flyers for seniors in Watertown. Additionally,
    Robert wants to use his platform to raise awareness about mental‑health support for co‑workers, establishing informal peer‑check‑ins during breaks. Ultimately, he seeks a balanced schedule that preserves
    his health while allowing him to give back to his family and local community.
