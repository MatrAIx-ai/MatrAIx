personas:
  professional: Jason Nova, a veteran long‑haul truck driver turned aspiring transportation safety trainer, uses their three decades of route‑optimization expertise and keen eye for detail to mentor new
    drivers, while their relaxed attitude toward obligations sometimes makes mentoring sessions drift into informal storytelling about vintage radios and New England art.
  sports: Jason Nova, a seasonal hiker with the White Mountain Hiking Club and a loyal fan of the Boston Red Sox and the New Hampshire Wildcats hockey team, keeps fit through weekly walks on rugged trails
    and occasional cross‑country skiing, though their competitive streak shows up more in their backyard chess battles than on the sports field.
  arts: Jason Nova, an avid collector of classic vinyl records by The Beatles, Miles Davis, and Bob Dylan, and a devoted reader of Winslow Homer and John Singer Sargent monographs, spends their weekends
    at the Currier Museum of Art dissecting exhibitions with a skeptical eye while restoring vintage radios that double as their personal soundtrack.
  travel: Jason Nova, who favors spontaneous road trips along the Kancamagus Highway, weekend getaways to Acadia National Park and Portland’s waterfront, and dreams of a future drive through the Scottish
    Highlands to chase historic stone castles, plans their itineraries over a cup of coffee with a rolled‑up map, yet often lets their flexible nature lead to last‑minute detours and unplanned photo stops.
  culinary: Jason Nova, a fan of hearty New England fare such as New‑England clam chowder, lobster rolls with buttered rolls, and apple‑pie topped with locally sourced maple syrup, enjoys cooking at home
    with a moderate skill set, frequently grilling venison steaks seasoned with rosemary while occasionally over‑cooking their famous meatloaf when their mind wanders to upcoming photo shoots.
  core: Jason Nova, a weather‑wise veteran trucker turned mentor who trades meticulous route calculations for spontaneous landscape photography, battles chronic worry and a habit of late‑night crossword
    marathons, all while nurturing a secret stash of vintage radios and classic vinyl.
background:
  cultural: Jason was raised in a small, predominantly white rural community in northern New England, where self-reliance, modesty, and a strong work ethic are cultural hallmarks. His family's roots trace
    back to early English and Irish settlers who valued practicality and community participation. The region's seasonal rhythms, from harsh winters to vibrant autumn foliage, have shaped his appreciation
    for the outdoors and local heritage. He grew up attending a public high school, where he learned practical skills and a respect for punctuality, even though he later adopted a more flexible, independent
    attitude. His marriage and involvement in the Littleton community reflect traditional New England values of family loyalty, neighborly support, and a quiet, contemplative lifestyle.
attributes:
  skills: '[''Long-haul truck driving'', ''Local delivery and sales'', ''Vehicle maintenance and minor repairs'', ''Route planning and navigation'', ''DOT safety compliance'', ''Customer relationship management'',
    ''Negotiation and small-scale sales'', ''Fuel-efficiency monitoring'', ''Fleet management software operation'', ''Basic logistics paperwork'']'
  hobbies: '[''Road photography'', ''Reading New England history and art'', ''Restoring vintage radios'', ''Truck upholstery tinkering'', ''Chess'', ''Crossword puzzles'', ''Collecting classic vinyl records'',
    ''Hiking in the White Mountains'', ''Visiting local art exhibitions'', ''Participating in a senior book club'']'
  career_goals: He is aiming to transition from full-time driving to a mentorship and consulting role within the next five years. He hopes to obtain a Certified Transportation Safety Trainer credential
    so he can teach new drivers and advise local carriers on efficiency and compliance. Concurrently, he wants to launch a niche freight service that transports artwork and antiques for New England galleries,
    leveraging his art appreciation and sales experience. Ultimately, he seeks a semi-retired lifestyle where he balances occasional contracted deliveries with a small consulting practice, while ensuring
    a stable retirement fund for his wife.
