personas:
  professional: Kelly Jones is a seasoned real‑estate broker in Swartz Creek who leverages three decades of market analysis, meticulous contract management, and disciplined mentorship to drive high sales
    volume while upholding a reputation for ethical rigor.
  sports: Kelly Jones prefers low‑impact fitness, taking sunrise walks with the Swartz Creek Senior Walking Club and tending to the garden, while cheering on the Detroit Tigers during baseball season and
    the Michigan Wolverines football team each fall; they occasionally attend local high‑school basketball games but never join competitive leagues.
  arts: Kelly Jones finds creative fulfillment singing soprano parts in the St. Mary’s church choir, performing hymns by John Rutter and traditional gospel arrangements, unwinding with classic mystery novels
    by Agatha Christie, attending community theater productions of Shakespeare’s *Much Ado About Nothing*, and enjoying the Brandenburg Concertos by Bach and folk ballads by Joan Baez.
  travel: 'Kelly Jones plans trips with meticulous itineraries, favoring heritage tours and quiet retreats: they have visited Colonial Williamsburg, explored the historic canals of Holland, taken a weekend
    getaway to Mackinac Island, and dream of a pilgrimage to their ancestors’ hometown in Ohio; they balance travel with budget constraints and health considerations, preferring short flights and accessible
    accommodations.'
  culinary: Kelly Jones enjoys cooking farm‑to‑table meals featuring vegetables from their garden, often preparing roasted beet salad with goat cheese, chicken pot pie with a flaky crust, and homemade zucchini
    bread spiced with nutmeg; they favor root vegetables, fresh herbs such as thyme and rosemary, and appreciate a well‑steeped Earl Grey tea after dinner.
  core: Kelly Jones blends a lifelong love of order and community heritage with a disciplined real‑estate career, quietly knitting scarves for charity while obsessively cataloguing bird sightings and occasionally
    forgetting to water the garden on rainy days.
background:
  cultural: Raised in the heart of Michigan’s Midwestern culture, Kelly’s background reflects values of reliability, community involvement, modesty, and a pragmatic work ethic. Her family’s roots trace
    back to early settlers of the Great Lakes region, fostering a deep appreciation for seasonal cycles, local neighborhoods, and the importance of contributing to the collective well‑being of Swartz Creek
    and Genesee County.
attributes:
  skills: '[''Residential property valuation'', ''Market trend analysis'', ''Negotiation'', ''Contract preparation and review'', ''Michigan regulatory compliance'', ''Time management'', ''Targeted marketing
