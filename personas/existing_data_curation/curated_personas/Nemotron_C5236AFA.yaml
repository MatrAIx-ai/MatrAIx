  hobbies: '[''Photography (street art and nature)'', ''Attending concerts and open‑mic nights'', ''Improv comedy workshops'', ''Playing acoustic guitar'', ''Hiking and cycling in state parks'', ''Curating
    music playlists'', ''Writing reflections on art'', ''Volunteering at community theater and art festivals'']'
  career_goals: Hashem aims to advance from his current managerial role to a regional manager position within the hospitality or retail sector, while simultaneously completing a bachelor's degree in business
    administration with an emphasis on arts management. He aspires to launch a community‑focused art studio or co‑working space that blends his love for creativity with his managerial expertise. Long‑term,
    he hopes to become known for fostering innovative, employee‑friendly cultures that encourage unconventional ideas and artistic expression in everyday business settings.
