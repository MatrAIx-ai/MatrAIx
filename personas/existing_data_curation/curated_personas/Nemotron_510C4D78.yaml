personas:
  professional: Yong Zheng, a 12-year-old aspiring software developer, channels a love for structured problem-solving into building Python mini-games and intricate LEGO robotics models, applying meticulous
    planning, competitive analysis, and disciplined execution to every line of code and gear assembly.
  sports: Yong Zheng, a fan of the Golden State Warriors and San Francisco Giants, follows a structured running routine three times a week with the school cross-country team, joins a weekend youth martial-arts
    class that treats each drill like a strategic game, and competes in local chess-themed obstacle races, bringing a disciplined, competitive edge to every physical activity.
  arts: Yong Zheng immerses in artistic expression by practicing piano pieces like Yiruma's 'River Flows in You' and Beethoven's 'Moonlight Sonata', listening to the synth-pop sounds of Daft Punk and the
    orchestral scores of Hans Zimmer, and watching Studio Ghibli films during family evenings, using these creative outlets as structured, reflective interludes from their analytical pursuits.
  travel: Yong Zheng prefers carefully planned weekend getaways that combine educational stops—such as a day at the Exploratorium in San Francisco—with short hikes in nearby state parks, and dreams of a
    future family trip to Singapore during the Mid-Autumn Festival to see lantern displays, balancing parental budget limits with a hunger for cultural discovery.
  culinary: Yong Zheng enjoys precise cooking sessions, measuring ingredients to perfect a chicken fried rice seasoned with Sichuan peppercorns, baking mooncakes with lotus-seed paste for the Mid-Autumn
    Festival, and occasionally treats themselves to a slice of pepperoni pizza, all while following a methodical recipe checklist that mirrors their love for order.
  core: Yong Zheng is a hyper-organized 12-year-old who turns daily chores into strategic games, obsessively logs every minute of their schedule, and battles chronic worry that makes even simple decisions
    feel like high-stakes puzzles.
background:
  cultural: Yong Zheng is a first‑generation Chinese‑Malaysian American. His parents immigrated to the United States from Malaysia, where they were part of the local Chinese diaspora. At home, Yong hears
    Mandarin and Malay alongside English, and his family celebrates Chinese New Year and the Mid‑Autumn Festival with a blend of Malaysian customs, such as enjoying mooncakes and festive lanterns. He attends
    a weekend heritage language program to maintain his Mandarin skills and participates in cultural events at the local Chinese community center, balancing American school life with the strong educational
    values and family cohesion emphasized in his cultural upbringing.
