  hobbies: '[''Woodworking'', ''Gardening'', ''Hiking'', ''Fishing'', ''Reading non-fiction'', ''Volunteer work'', ''Town hall participation'', ''Chess'', ''Model airplane building'', ''Home brewing'']'
  career_goals: He aims to complete his bachelor's degree in Business Administration, leveraging his practical experience to launch a boutique consultancy that offers process optimization and custom woodworking
    solutions to local small businesses. Harrison also seeks to mentor younger professionals through a local chamber of commerce mentorship program and to serve on the board of a regional nonprofit focused
    on workforce development.
