personas:
  professional: Harrison Bartholomew is a seasoned project manager with a manufacturing and logistics background who leverages meticulous process‑improvement expertise, data‑driven analysis, and a hands‑on
    mechanical aptitude to launch a boutique consultancy that fuses operational efficiency with custom woodworking for local small businesses, while actively mentoring emerging professionals and championing
    cooperative community initiatives.
  sports: Harrison Bartholomew is an avid outdoors enthusiast who spends weekends hiking the lakes and forests of central Wisconsin, casting trout on the North Fork River, cheering the Green Bay Packers,
    and participating in the Madison Mountain Bike Club, while also playing casual pickup basketball with friends and maintaining a membership in a local fishing association.
  arts: Harrison Bartholomew is a lifelong learner who fills spare moments with non‑fiction books on history and science, enjoys classic American folk music from Bob Dylan and Joan Baez, attends community‑theater
    productions of Shakespeare, and channels creative energy into model‑airplane building and weekly chess matches at the local library.
  travel: Harrison Bartholomew is a methodical traveler who prefers well‑planned road trips to regional gems such as Door County’s cherry orchards, the Apostle Islands, and an annual pilgrimage to Gettysburg’s
    historic battlefields, yet leaves room for spontaneous fishing spots and scenic detours, always packing a portable camping stove and a sturdy wooden walking stick for outdoor comfort.
  culinary: Harrison Bartholomew is a farm‑to‑table enthusiast who cultivates heirloom tomatoes, sweet corn, and carrots in a modest garden, then crafts hearty meals like cedar‑plank smoked walleye, roasted
    beet salad with goat cheese, and spiced apple crumble, while occasionally savoring a craft beer from a local microbrewery and perfecting a secret family barbecue rub.
  core: Harrison Bartholomew blends meticulous project management with a hands‑on love for woodworking, community service, and the outdoors, all while juggling disciplined finances and an occasional splurge
    on premium tools.
background:
  cultural: Harrison comes from a family with deep German and Scandinavian roots in the Upper Midwest. Raised in a small‑town Lutheran community in Wisconsin, he internalized values of hard work, self‑reliance,
    modesty, and community service. He celebrates traditional holidays such as Thanksgiving, Christmas, and the annual county fair, and maintains close ties with extended family spread across Wisconsin
    and Minnesota. His cultural upbringing emphasizes practicality, order, and a respect for nature, which continue to shape his daily life.
