persona_description: A historian who specializes in ancient Roman history, particularly the period of the Roman Empire. His research interests include the political and social structures of ancient Rome,
  the development of democracy in Pompeii, and the role of the Roman Empire in shaping the course of history. He is particularly interested in the implications of democracy for society and its citizens,
  and how such ideas were expressed in the political systems of Pompeii and the Roman Empire. He is also interested in the role of religion and mythology in shaping the political landscape of ancient Rome.
