personas:
  professional: Brian Gali, a 70‑year‑old retired craftsman turned self‑taught abstract painter, combines meticulous woodworking precision, disciplined archival research, and a fiercely imaginative mindset
    to produce intricate wooden models, mixed‑media canvases, and a forthcoming illustrated genealogical volume that they hope will cement their legacy in Union's cultural memory.
  sports: Brian Gali finds their physical outlet in solo hikes along the Piedmont trails as a member of the Union County Hiking Club, while quiet evenings are spent watching the University of South Carolina
    Gamecocks football season and the Charlotte Hornets basketball games, though they rarely participate in organized team sports.
  arts: Brian Gali's leisure is dominated by abstract painting sessions inspired by the gestural chaos of Jackson Pollock, the color fields of Mark Rothko, and the botanical precision of John James Audubon,
    while their evenings often include listening to Thelonious Monk's jazz and rereading Philip K. Dick, anchoring their avant‑garde sensibility in both visual and literary art.
  travel: Brian Gali prefers low‑key road trips in a vintage Chevrolet, having driven the historic streets of Savannah, Georgia, explored the Blue Ridge vistas of Asheville, North Carolina, and catalogued
    the artifacts at the Charleston Historic District, yet they dream of a scholarly pilgrimage to the National Archives in Washington, D.C.
  culinary: Brian Gali, an adept home cook, delights in crafting shrimp and grits with fresh Gulf shrimp, ripe heirloom tomatoes, and locally sourced stone‑ground grits, while their weekend indulgence includes
    a modest pour of aged bourbon over a pecan pie made with heritage pecans and a dash of cane sugar.
  core: Brian Gali, a solitary, rigorously organized 70‑year‑old artisan, merges Southern woodworking heritage with avant‑garde abstract art, curates local histories, and quietly fuels their curiosity with
    puzzles, chess, and solitary hikes.
background:
  cultural: Brian is a lifelong resident of Union, South Carolina, raised in a white, rural Southern family with deep roots in farming and small‑scale craftsmanship. His upbringing was shaped by the region’s
    emphasis on self‑reliance, respect for local history, and modest community gatherings, often centered around church and town events. Exposure to Southern folk traditions—such as quilting, hand‑carved
    woodwork, and storytelling—instilled an appreciation for tangible heritage, while his innate curiosity propelled him toward broader artistic and scholarly influences. Though he embraces the values of
    his Southern heritage, Brian’s personal journey reflects a blend of regional culture with an independent, avant‑garde artistic sensibility.
