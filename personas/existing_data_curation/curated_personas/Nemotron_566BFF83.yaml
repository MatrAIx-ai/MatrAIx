  hobbies: '[''Abstract painting'', ''Woodworking'', ''Model ship building'', ''Reading philosophy'', ''Science fiction literature'', ''Solitary hiking'', ''Birdwatching'', ''Chess'', ''Puzzle solving'',
    ''Journaling'']'
  career_goals: Although retired from the formal workforce, Brian remains driven to leave a lasting cultural imprint on his community. He aims to publish a illustrated volume that weaves his genealogical
    research with personal memoirs and stories of Union County’s early settlers. He also intends to curate a small‑scale exhibition of his abstract paintings at the local historic society, hoping to gain
    recognition from regional art boards. Additionally, Brian plans to launch an online archive of oral histories collected from longtime residents, preserving their narratives for future scholars. Finally,
    he aspires to teach occasional, highly focused workshops on precision woodworking and archival techniques to a select group of enthusiasts, emphasizing disciplined craftsmanship and scholarly rigor.
