persona_description: A historian or a linguist who is interested in the history and languages of the Slavic tribes, particularly the Bulgarian and Bulgarian-related tribes. They are particularly interested
  in the history of the Unogundurs and Asparuh, and the location of the Great Bulgaria based on the information provided by Theophanes. They are also interested in the linguistic and cultural differences
  between the Unogundurs and Asparuh, and the similarities between the two tribes. They are also interested in the geographical and historical context of the region, and the impact of the Avars and the
  Khazars on the region.
