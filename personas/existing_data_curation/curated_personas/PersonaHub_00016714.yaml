persona_description: A rabbi who lived during the Holocaust in Kovno, Lithuania, and wrote a book on Talmud at the young age of 19. He was recognized as a posek, an expert on Jewish law, and his knowledge
  was tested during the German occupation of the city. His responses to difficult ethical questions posed by the ghetto's residents had life-and-death implications.
