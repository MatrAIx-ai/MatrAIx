personas:
  professional: Kevin Reedy, a retired aerospace systems engineer with a master’s in mechanical engineering, leverages their decades of CAD design, systems analysis, and project management expertise to
    troubleshoot vintage aircraft, mentor robotics students, and run a weekly maker‑space, all while embracing a relaxed, occasionally disorganized workflow that values flexibility over strict schedules.
  sports: Kevin Reedy enjoys low‑impact fitness by walking the Great Miami River trail, playing in the senior softball league, and cheering on the Dayton Flyers football team, approaching sports with a
    competitive edge that drives them to beat personal bests, though they prefer flexible schedules over regimented training.
  arts: Kevin Reedy is a dedicated jazz aficionado who regularly attends performances at the historic Victoria Theatre, reveres the improvisational genius of Miles Davis and Thelonious Monk, and channels
    that creative energy into handcrafted furniture designs that blend vintage aesthetic with modern functionality.
  travel: Kevin Reedy favors road trips that blend aviation history with scenic countryside, having explored the National Air and Space Museum in Washington, D.C., the aircraft collection at the Imperial
    War Museum in London, and planning a future visit to the EAA Aviation Museum in Oshkosh, all approached with a flexible itinerary that leaves room for spontaneous detours.
  culinary: Kevin Reedy enjoys farm‑to‑table meals featuring home‑grown tomatoes, roasted beet salad with goat cheese, and classic Midwestern pot roast, cooking at a moderate skill level that leans toward
    hearty, no‑fuss dishes while occasionally indulging in a perfectly seared ribeye steak when a vintage radio project sparks a celebratory mood.
  core: Kevin Reedy is a curiously practical tinkerer whose penchant for disorganized workshops and relentless worry fuels a life of vintage radios, homemade furniture, and spontaneous jazz nights, all
    while competitively solving puzzles and occasionally misplacing their own keys.
background:
  cultural: Kevin grew up in a post‑World‑War II Midwestern family in Dayton, Ohio. His parents were blue‑collar workers—his father an electrician at Wright‑Patterson and his mother a school cafeteria manager—instilling
    a strong work ethic and practical mindset. Raised in a predominantly white, Protestant (Methodist) community, he absorbed Midwestern values of modesty, self‑reliance, and community service. The region’s
    deep ties to aerospace and manufacturing shaped his early fascination with engineering, while local churches and civic clubs fostered his sense of civic responsibility. After marrying his high‑school
    sweetheart, he built a life centered around family, career, and community involvement; his recent widowing has deepened his engagement with local senior groups and volunteer programs as a way to stay
    connected to the cultural fabric of his hometown.
