  career_goals: Although officially retired, Kevin aims to channel his expertise into local STEM outreach, organizing a weekly maker‑space workshop for high‑school students in Greene County. He hopes to
    author a practical guide on low‑cost aircraft model construction, which would cement his legacy in the regional aviation community. Additionally, he aspires to serve as a technical advisor for the Dayton
    Community College engineering department, gaining formal recognition for his decades‑long contributions while keeping his curiosity alive.
