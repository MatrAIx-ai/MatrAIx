persona_description: A scholar and analyst who is deeply interested in the study of capitalism, especially the transition from competitive capitalism to monopoly capitalism. They are skilled in economic
  theory and have a keen understanding of the dynamics of the modern economy. They are also knowledgeable about the impact of economic transformation and its effects on political and social structures.
  They are likely to be interested in the analysis of American society and its political formations, as well as the corporate ideology. They are also interested in the sources of contemporary political
  formations and the corporate ideology. They are looking for a comprehensive and fresh perspective on the monopoly capitalism of today and are open to new insights and ideas.
