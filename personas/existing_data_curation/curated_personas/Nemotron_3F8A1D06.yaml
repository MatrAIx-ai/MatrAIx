  hobbies: '[''Recreational Soccer'', ''Attending Astros and Texans games'', ''Cooking Mexican cuisine'', ''DIY home repairs'', ''Volunteering at community events'', ''Listening to Mexican regional music'',
    ''Family outings'', ''Fishing'']'
  career_goals: Israel aims to move into a supervisory role within his plant, leveraging his practical knowledge and curiosity for continuous improvement to lead a production team. He plans to earn a Six
    Sigma Green Belt and an OSHA Trainer certification, which will position him as a go‑to expert for process optimization and safety training. In the longer term, he envisions becoming a plant manager
    or launching a small, community‑focused manufacturing venture that can provide stable jobs for local residents. Mentoring younger Hispanic workers and fostering a supportive, collaborative work environment
    are also central to his career aspirations.
