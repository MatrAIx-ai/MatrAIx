personas:
  professional: Michele Woolbright is a 23‑year‑old warehouse operative with a forklift certification who blends strict OSHA‑compliant material handling with a naturally charismatic leadership style, using
    clear verbal coaching and on‑the‑fly schedule adjustments to keep her crew motivated as she pursues a shift‑lead or supervisor role.
  sports: Michele Woolbright is a fitness‑oriented 23‑year‑old who combines regular weightlifting and jogs with seasonal participation in a co‑ed adult soccer league, cheers on the Washington Commanders
    during football season and the Washington Nationals in the summer, and belongs to the Williamsburg Running Club, where she logs miles on scenic historic trails.
  arts: Michele Woolbright thrives in the arts as a karaoke‑night regular, salsa‑class enthusiast, and occasional community‑theater performer, frequently attending live shows by the Avett Brothers at Williamsburg’s
    winery and supporting local playwrights at the York County Playhouse, all of which fuel her outgoing personality.
  travel: Michele Woolbright’s travel style mixes structured weekend road trips with spontaneous spur‑of‑the‑moment getaways, having explored the colonial streets of Williamsburg, taken a weekend escape
    to Charleston’s waterfront, and dreaming of a spring visit to Savannah’s oak‑lined squares while balancing travel costs with her work savings.
  culinary: Michele Woolbright delights in Southern cuisine, confidently whipping up shrimp and grits, fried chicken with buttermilk brine, and peach cobbler using heirloom peaches, while also experimenting
    with global flavors like Vietnamese pho after tasting them at festival food stalls, and she often pairs meals with sweet tea or locally roasted coffee.
  core: Michele Woolbright is a socially magnetic yet anxiously aware 23‑year‑old who balances a structured warehouse skill set with a love for spontaneous performance, community service, and Southern comfort
    food, channeling stress into fitness while dreaming of leading her own local moving business.
background:
  cultural: Michele grew up in a white, working‑class family in James City County, Virginia, where Southern hospitality and a strong community ethic are central. Her upbringing emphasized a solid work ethic,
    practicality, and respect for the region’s colonial history, which is reflected in her appreciation for local historic sites and festivals. The tourism-driven environment of Williamsburg exposed her
    to a variety of cultures and visitors, shaping her sociable and adaptable personality while reinforcing her Southern identity. Family gatherings often feature traditional Southern cuisine, church involvement,
    and outdoor activities like fishing and hiking, all of which contribute to her grounded yet outgoing outlook.
attributes:
  skills: '["forklift operation (certified)", "pallet jack and hand truck handling", "inventory tracking with barcode scanners", "OSHA warehouse safety compliance", "manual pallet building and deconstruction",
