    management software)"]'
  hobbies: '["karaoke", "salsa dance classes", "community theater participation", "volunteering at local festivals and food banks", "online multiplayer gaming", "exploring historic Williamsburg", "live
    music shows", "weightlifting and jogging", "Southern cooking and baking", "journaling for stress management"]'
  career_goals: Michele aims to move into a supervisory role within the next two to three years, targeting a shift lead or warehouse supervisor position where she can blend her practical expertise with
    her natural ability to motivate and manage people. She plans to earn additional certifications, such as a Certified Logistics Associate credential and advanced forklift operator training, to strengthen
    her qualifications. Long‑term, she envisions launching a small, community‑focused moving and freight business that prioritizes safety, fair wages, and personal service, leveraging her local connections
    and deep understanding of the Williamsburg area.
