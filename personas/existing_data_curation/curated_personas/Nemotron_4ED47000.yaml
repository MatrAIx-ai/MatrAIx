personas:
  professional: James Whittingham, a data-driven middle-distance runner, they combine advanced conditioning, periodized strength programs, and biomechanical analysis to fine-tune split times while leading
    a tight-knit training group and coordinating regional meet logistics.
  sports: James Whittingham, an avid runner, they belong to the Destrehan Running Club, follow the New Orleans Saints and LSU Tigers, and structure their weekly workouts around sprint intervals, long-run
    road sessions through the bayous, and weekly strength sessions at the parish recreation center.
  arts: James Whittingham, a lifelong lover of sound, they unwind to the improvisations of Wynton Marsalis, the soul of John Coltrane, and the lyrical flow of Kendrick Lamar while occasionally attending
    the New Orleans Jazz & Heritage Festival and collecting vintage vinyl.
  travel: James Whittingham, a methodical explorer, they plan road-run trips that thread through the tranquil bayous of Louisiana, dream of competing in the Berlin Marathon, and schedule annual family visits
    to New Orleans while saving for a future trek through the Scottish Highlands.
  culinary: James Whittingham, a proficient home cook, they experiment with Creole classics like gumbo, crawfish etouffee, and jambalaya, often adding a dash of extra cayenne for heat, and enjoy pairing
    dishes with locally sourced andouille sausage and fresh okra.
  core: James Whittingham, a disciplined 27-year-old runner, they balance data-driven training, community mentorship, and a love for jazz-infused cooking, while sometimes over-seasoning meals and skipping
    rest days under pressure.
background:
  cultural: James is a second-generation African-American raised in Destrehan, a community steeped in the rich cultural tapestry of South Louisiana. He grew up surrounded by the rhythms of jazz, blues,
    and gospel music, and the flavors of Cajun and Creole cooking that are staples of his family gatherings. The close-knit extended family and his local church have instilled a strong sense of communal
    responsibility, resilience, and pride in his heritage. These cultural influences shape his disciplined work ethic, his respect for tradition, and his commitment to giving back to the youth of his neighborhood.
attributes:
  skills: '["Sprint and middle-distance technique", "Periodized strength and conditioning programming", "Sports nutrition planning", "Performance data analytics", "Injury prevention and rehabilitation",
    "Biomechanical assessment", "Leadership and mentorship", "Event logistics coordination"]'
  hobbies: '["Road running", "Training journaling", "Reading sports science", "Listening to jazz, blues and hip‑hop", "Cooking Creole and Cajun cuisine", "Playing chess", "Fishing on the Mississippi River",
    "Community service through church"]'
  career_goals: James aims to qualify for the U.S. national track championships within the next two years and secure a sponsorship that will enable him to train full-time. He plans to earn a certification
    as a Strength and Conditioning Coach and eventually launch a community-oriented athletic academy in St. Charles Parish that offers structured training and mentorship for underserved youth. Long-term,
    he envisions transitioning into a coaching and sports-management role, leveraging his data-driven expertise to develop performance programs while remaining an active advocate for health and fitness
    in his hometown.
