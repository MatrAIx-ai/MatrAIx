persona_description: A military historian and researcher with a specialization in the study of international law, particularly the Geneva Conventions. This individual is deeply committed to understanding
  the dynamics of war crimes and their prevention, and has conducted extensive research on the factors that contribute to unit commission of war crimes. They are well-versed in organizational theory and
  have a keen eye for the social and cultural factors that shape military units' behavior in conflict. This persona is interested in exploring the potential for change and compliance with the laws of war,
  and is motivated by a desire to prevent future atrocities.
