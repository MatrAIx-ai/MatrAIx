personas:
  professional: Terry Mcaniff is a seasoned construction manager who blends two decades of hands‑on oversight, advanced scheduling mastery in Primavera P6 and Microsoft Project, and a data‑driven, safety‑first
    mindset, while curiously exploring modular construction, BIM, and net‑zero design to craft practical, high‑visibility projects.
  sports: Terry Mcaniff follows the Alabama Crimson Tide football team and the Huntsville Havoc hockey club, participates in occasional pickup basketball at the local recreation center, maintains fitness
    through weekend hikes on Monte Sano trails, regular fly‑fishing trips along the Tennessee River, and enjoys supporting the Huntsville City FC fan group during the soccer season.
  arts: Terry Mcaniff finds artistic inspiration in the handcrafted furniture designs of Gustav Stickley, the soulful guitar of B.B. King, the storytelling of Harper Lee, and the visionary cinematography
    of Ava DuVernay, often listening to classic Southern blues while shaping custom pieces in the workshop.
  travel: Terry Mcaniff prefers meticulously planned road trips that blend outdoor adventure with cultural stops, having explored the scenic Blue Ridge Parkway, the artisan markets of Asheville, a solo
    trek through Iceland’s Golden Circle, and now dreaming of a summer sailing excursion across the Great Lakes while keeping travel within a modest budget to accommodate family commitments.
  culinary: Terry Mcaniff enjoys cooking gumbo with Andouille sausage, catfish fry seasoned with smoked paprika, and collard greens simmered with a dash of hot sauce, often pairing meals with a home‑brewed
    pale ale crafted from locally sourced hops, and they relish the occasional crackling of fresh corn on the cob at weekend barbecues.
  core: Terry Mcaniff blends meticulous construction expertise with a solitary love of woodworking, an ever‑present notebook of project ideas, a habit of night‑time schedule tweaking, and a penchant for
    experimenting with home‑brewed beers.
background:
  cultural: Terry was raised in a middle‑class white family in a suburban community outside Huntsville, Alabama. His upbringing reflects the values of the American South—hard work, self‑reliance, and a
    strong sense of community—shaped by regular participation in the local Baptist church and regional events like the Huntsville Springfest. The proximity to Redstone Arsenal and NASA’s Marshall Space
    Flight Center exposed him to a culture of technological innovation, which tempered his traditional Southern roots with an openness to new ideas. He enjoys Southern hospitality, classic country and southern
    rock music, and traditional foods such as fried chicken, barbecue, and sweet tea, while also appreciating the region’s growing emphasis on sustainable development and renewable energy.
attributes:
  skills: '[''Project Management'', ''Construction Budgeting'', ''Contract Negotiation'', ''Construction Scheduling (Primavera P6)'', ''Safety Compliance (OSHA)'', ''Stakeholder Communication'', ''Risk
    Management'', ''Value Engineering'', ''Procurement'', ''Blueprint Reading'', ''Quality Assurance'', ''Team Leadership'', ''Data-Driven Decision Making'', ''Sustainable Construction Practices'', ''Construction
    Software (Procore, PlanGrid)'']'
  hobbies: '[''Woodworking'', ''Model Aircraft Building'', ''Fishing'', ''Hiking'', ''Reading (Technical Non-Fiction and Southern History)'', ''Southern Cooking'', ''Home Brewing'', ''Habitat for Humanity
    Volunteering'', ''Attending College Football Games'', ''Stargazing'']'
  career_goals: Looking ahead, Terry aims to transition into a senior executive role, such as Director of Construction or Vice President of Project Delivery, where he can shape the strategic direction of
    large‑scale, high‑visibility projects in the Huntsville region. He is particularly interested in integrating emerging technologies—modular construction, Building Information Modeling (BIM), and net‑zero
    energy design—into his work, with the goal of delivering projects that achieve LEED Gold certification. Over the next five years, he plans to lead at least two multi‑million‑dollar infrastructure projects
    that serve the community, mentor emerging construction managers within his firm, and lay the groundwork for an independent consulting practice focused on risk‑based project delivery and sustainable
    building strategies.
