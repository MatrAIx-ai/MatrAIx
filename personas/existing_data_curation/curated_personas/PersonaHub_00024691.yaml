persona_description: A researcher and historian who is interested in the history and culture of Russia, particularly the Russian Geographic Society and its archives. This person is knowledgeable about the
  Society's projects, such as the questionnaire on outward appearance, language, and household life, and the collection of popular superstitions in Southern Russia. They are also interested in the Society's
  involvement in the Russian American Campaign and its personal and professional Fonds.
