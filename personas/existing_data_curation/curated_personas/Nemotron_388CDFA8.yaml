personas:
  professional: Michele Alonso, a budding community organizer and aspiring art‑therapy counselor, leverages their natural curiosity, methodical planning, and talkative charm to design and lead youth art‑wellness
    workshops, coordinating events with meticulous data management while ensuring inclusive, empathetic communication.
  sports: Michele Alonso, an avid hiker and member of the Texarkana Trails Club, spends weekends trekking the Ouachita foothills, follows the Dallas Cowboys for football, attends local volleyball pick‑up
    games in summer, and balances their fitness routine with occasional yoga classes to counteract the stress of academic life.
  arts: Michele Alonso, a watercolor enthusiast and acoustic‑guitar storyteller, draws inspiration from Frida Kahlo’s vibrant self‑portraits, Banksy’s urban commentary, and the lyrical poetry of Rupi Kadri,
    curates Instagram feeds featuring street photography of downtown Texarkana, and spends Sunday afternoons sketching in local galleries while they attend open‑mic nights to perform original songs.
  travel: Michele Alonso, a spontaneous road‑tripper, has explored Austin’s live‑music scene, wandered the historic French Quarter in New Orleans, longed to hike the Andes in Patagonia, and hopes to practice
    conversational Spanish in Granada, Spain, while always budgeting trips carefully to fit their student finances.
  culinary: Michele Alonso, a self‑taught home chef, comforts themselves with Southern dishes like fried chicken, collard greens, and peach cobbler, experiments with shrimp‑and‑grits for brunch, favors
    ingredients such as smoked paprika and buttermilk, and occasionally blends Mexican flavors like chiles rellenos to practice Spanish vocabulary while hosting casual dinner gatherings.
  core: Michele Alonso is a curious, organized, and socially vibrant 19‑year‑old who channels their artistic passion into community wellness, grapples with chronic worry, and balances impulsive art‑supply
    splurges with disciplined budgeting.
background:
  cultural: Michele was raised in Texarkana, Arkansas, a small city that straddles the Texas‑Arkansas border and blends Southern hospitality with a modest, community‑oriented lifestyle. Coming from a middle‑class
    white family with deep roots in the region, she grew up attending local church services, enjoying family barbecues, high‑school football games, and annual county fairs. Her surname reflects a Hispanic
    heritage that introduced her to bilingual conversations and Mexican culinary traditions, which she embraces alongside classic Southern dishes. This multicultural exposure, combined with the supportive
    yet close‑knit atmosphere of her hometown, shaped her appreciation for diverse artistic expressions and her desire to give back to the community.
attributes:
