  hobbies: '[''Sketching'', ''Watercolor painting'', ''Photography'', ''Creative writing'', ''Reading contemporary fiction'', ''Playing acoustic guitar'', ''Attending open‑mic music shows'', ''Hiking in
    the Ouachita foothills'', ''Volunteering at a community art center'', ''Cooking Southern comfort food'', ''Practicing conversational Spanish'', ''Podcasting with friends'']'
  career_goals: Michele plans to complete a bachelor’s degree in psychology or communications and then pursue a master’s program in counseling with a focus on expressive therapies such as art therapy. Her
    long‑term ambition is to become a licensed professional counselor who runs community‑based art‑and‑wellness programs for teens and young adults. She also hopes to launch a podcast that highlights mental‑health
    stories and promotes creative coping strategies, using her sociable personality to reach a broad audience.
