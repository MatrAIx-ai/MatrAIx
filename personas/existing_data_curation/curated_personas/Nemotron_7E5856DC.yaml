  career_goals: Janet aspires to a career that combines structure, practical impact, and long‑term reliability. She aims to become a civil engineer, focusing on designing safe, sustainable infrastructure
    such as bridges and community facilities. Her goal includes earning an engineering degree, obtaining professional licensure, and eventually leading projects that improve the quality of life in her hometown
    and beyond. She also envisions mentoring younger students in STEM, reflecting her desire to share her methodical expertise while maintaining a clear, organized work environment.
