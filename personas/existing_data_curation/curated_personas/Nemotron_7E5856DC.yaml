personas:
  professional: Janet Laferry, a 12‑year‑old aspiring robotics hobbyist, channels their love of order into programming precise bot routines and dominating school chess tournaments, balancing meticulous
    project plans with a quiet, competitive drive.
  sports: Janet Laferry, a member of the Cedar Creek Cubs youth soccer club, enjoys low‑key weekend hikes on the nearby Pine Ridge Trail with a close friend, and roots for the River City Raptors baseball
    team, preferring structured play over chaotic crowds.
  arts: Janet Laferry, an avid reader of Agatha Christie mysteries and Ken Follett historical sagas, spends quiet evenings practicing calligraphy to the soothing piano works of Ludovico Einaudi, and occasionally
    watches Meryl Streep performances for inspiration.
  travel: Janet Laferry prefers meticulously planned family trips, favoring low‑stress destinations like the Grand Canyon’s South Rim, the historic streets of York, England, and the interactive exhibits
    at the Smithsonian National Air and Space Museum, where they can explore at their own pace.
  culinary: Janet Laferry delights in preparing herb‑infused lemon tea from the basil and mint they tend in their garden, enjoys assembling a simple roasted vegetable quinoa bowl, and treats themselves
    to homemade chocolate chip cookies, though they sometimes over‑season dishes in pursuit of perfect flavor balance.
  core: Janet Laferry is a calm, routine‑driven twelve‑year‑old who channels competitive energy into chess and robotics, savors structured hobbies, and quietly masters order in every aspect of life, even
    when a bit too meticulous.
background:
  cultural: Janet comes from a white, middle‑class New England family that has lived in the Concord, New Hampshire area for several generations. Her upbringing reflects the region’s emphasis on practicality,
    self‑reliance, and community involvement. Family traditions include celebrating New England seasonal events such as autumn leaf‑peeping, Thanksgiving harvest meals, and winter holidays with a focus
    on modest, home‑cooked gatherings. Her family’s values are rooted in a blend of Protestant work ethic and a respect for local history, fostering a preference for routine, responsibility, and modest
    ambition. The local school and community programs, such as the town’s volunteer fire department and public library, have reinforced her appreciation for organized, service‑oriented activities.
