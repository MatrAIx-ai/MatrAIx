  hobbies: '[''Salsa dancing'', ''Plena dancing'', ''Hiking in the Sierra de Cayey'', ''Volunteering at community tech workshops'', ''Cooking Puerto Rican cuisine'', ''Reading science‑fiction novels'',
    ''DIY IoT projects'', ''Attending local music festivals'']'
  career_goals: Mary aims to transition into a senior technology leadership role, such as Director of IT or Chief Technology Officer for the municipal government of Las Piedras. She aspires to spearhead
    digital transformation initiatives that improve public services, expand broadband access, and promote smart city technologies. Passionate about diversity in tech, Mary plans to launch a community mentorship
    program that empowers young Puerto Rican women to pursue STEM careers. She also seeks to deepen her expertise in artificial intelligence and cybersecurity through advanced certifications, positioning
    herself as a strategic driver of innovation and resilience for her organization and community.
