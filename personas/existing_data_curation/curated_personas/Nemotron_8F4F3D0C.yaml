personas:
  professional: Mary Martinezguevara, a seasoned software architect and cloud solutions lead, leverages deep expertise in Python, Java, C#, and AWS/Azure to design secure, scalable municipal systems while
    their collaborative yet decisive style and bilingual fluency keep cross‑functional teams aligned and inclusive.
  sports: Mary Martinezguevara, an avid member of the Cayey Trailblazers hiking club, tackles the Sierra de Cayey each spring, roots for the Cangrejeros de Santurce basketball team during the season, and
    enjoys casual pickleball matches at the local community center on weekends.
  arts: Mary Martinezguevara immerses themselves in salsa nights featuring classics by Celia Cruz and Victor Manuelle, appreciates local poetry, and draws creative inspiration from sci‑fi soundtracks by
    Hans Zimmer while tinkering with IoT projects.
  travel: Mary Martinezguevara prefers meticulously planned, family‑friendly trips that blend cultural immersion and relaxation, such as a week‑long heritage tour of Granada, Spain, a weekend stay in the
    historic streets of Old San Juan, and annual hiking expeditions to the cloud forests of Monteverde, Costa Rica, always securing group discounts early.
  culinary: Mary Martinezguevara, an accomplished home cook, regularly prepares arroz con gandules seasoned with sofrito, adobo‑marinated lechón, and crispy sweet plantains for gatherings, while occasionally
    indulging in seafood paella with saffron and chorizo at upscale bistros.
  core: Mary Martinezguevara channels boundless energy into tech leadership and community dance floors, but habitually checks work emails at midnight and never skips a second serving of lechón after celebrations.
background:
  cultural: Mary grew up in Las Piedras, a close‑knit municipality on the island of Puerto Rico, where family, community, and tradition are central to daily life. She speaks both Spanish and English fluently
    and celebrates cultural milestones such as the Fiestas Patronales, where music, dance, and shared meals reinforce communal bonds. Her upbringing instilled a strong sense of hospitality, respect for
    elders, and pride in Puerto Rican heritage, which she weaves into her professional relationships and leadership style. By integrating Caribbean warmth with methodical problem‑solving, Mary bridges contemporary
    technology with the rich cultural fabric of her hometown.
