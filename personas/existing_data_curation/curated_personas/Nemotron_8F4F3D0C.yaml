  skills: '[''Python'', ''Java'', ''C#'', ''SQL'', ''Oracle'', ''AWS'', ''Azure'', ''Agile Scrum'', ''Project Management Professional (PMP)'', ''System Architecture'', ''Technical Writing'', ''Team Leadership'',
