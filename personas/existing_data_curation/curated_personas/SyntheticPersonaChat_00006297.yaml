    User 1: I agree! The food in New Mexico is amazing.

    User 2: Definitely. What''s your favorite kind of food?

    User 1: I love Mexican food.

    User 2: Me too! I''m from New Mexico, so I guess I''m kind of biased.

    User 1: No, it''s not biased. New Mexican food is the best.

    User 2: I agree. I''m glad you agree.

    User 1: Me too. It''s nice to meet someone who appreciates good food.

    User 2: You too. It''s always nice to meet someone from New Mexico.'
