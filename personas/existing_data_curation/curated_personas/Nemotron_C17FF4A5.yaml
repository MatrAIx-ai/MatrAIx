  hobbies: '[''Volleyball league'', ''Hiking the Palisades'', ''Kayaking on the Navesink River'', ''Community theater (stagehand/actor)'', ''Cooking international cuisine'', ''Reading historical fiction
    and non-fiction'', ''Photography of coastal landscapes'', ''Playing acoustic guitar'', ''Family bike rides'', ''Volunteering at health fairs'']'
  career_goals: Richard aims to transition into a leadership role within the next three to five years, targeting a position as a nurse manager or clinical educator at his hospital. He plans to earn a Master
    of Science in Nursing (MSN) with a focus on health care administration, acquire certification as a Certified Nurse Educator (CNE) and a Certified Quality Improvement Associate (CQIA), and spearhead
    a county-wide community wellness program that emphasizes chronic disease prevention and health literacy. Additionally, he wishes to mentor new nurses, contribute to hospital policy development, and
    stay abreast of emerging health technologies.
