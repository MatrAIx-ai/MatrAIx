  hobbies: '[''Playing guitar'', ''Live music attendance'', ''Trivia nights'', ''Board-game cafés'', ''Buffalo sports fandom'', ''Hiking'', ''Volunteering at museum'', ''Historical tours'', ''Social networking'']'
  career_goals: Chad aims to leverage his paralegal experience to transition into a senior legal project manager role within the next three years, overseeing complex litigation teams and streamlining workflow
    processes. He is also preparing for the LSAT and plans to enroll in a part‑time J.D. program within two years, with an ambition to become a corporate attorney specializing in mergers and acquisitions.
    In the meantime, he seeks to obtain additional certifications in e‑discovery and legal technology to stay at the forefront of the industry. His long‑term vision includes mentoring new paralegals and
    contributing to pro bono initiatives that serve the Buffalo community.
