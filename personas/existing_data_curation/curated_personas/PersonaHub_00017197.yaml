persona_description: A researcher in the UF/IFAS soil and water sciences department who specializes in the study of soil nutrient cycling and management. They are particularly interested in the use of cover
  crops in organic vegetable production and have conducted a study on the benefits of a summer cover crop in improving nitrogen cycling. They have published their findings in the journal Nutrient Cycling
  in Agroecosystems and have used the research data for other research projects.
