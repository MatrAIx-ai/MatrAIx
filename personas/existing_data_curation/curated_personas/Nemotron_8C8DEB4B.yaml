personas:
  professional: Joanne Digiovanni, a retired humanities scholar turned volunteer curator in Olympia, leverages their meticulous research skills, deep art‑history knowledge, and compassionate mentorship
    to design intimate exhibitions that spotlight local under‑represented artists while guiding younger volunteers through the museum’s behind‑the‑scenes processes.
  sports: Joanne Digiovanni, an avid birdwatcher and participant in the Olympia senior walking club, enjoys weekend strolls through the Nisqually wetlands, follows the Seattle Seahawks and Seattle Sounders
    on TV, and plays occasional pickleball at the local YMCA’s senior league, while avoiding high‑intensity sports due to knee stiffness.
  arts: Joanne Digiovanni, a dedicated patron of Olympia’s intimate art scene, frequents the Olympia Museum’s modern art exhibitions, the local Pilchuck Glass School’s craft nights, and the Fringe Theatre’s
    experimental plays, often citing the work of artist Margaret Kahn and the music of singer‑songwriter Gregory Porter as sources of inspiration for their own knitting designs and workshop curricula.
  travel: Joanne Digiovanni, preferring well‑planned, culturally immersive trips, has visited the historic museums of Florence, the coastal villages of the French Riviera, and the Pacific Northwest’s San
    Juan Islands, usually traveling with a senior‑friendly tour group, securing early‑bird discounts, and keeping detailed itineraries on index cards while occasionally daydreaming about a solo pilgrimage
    to the ancient monasteries of Greece.
  culinary: Joanne Digiovanni, a lover of Pacific Northwest flavors, delights in preparing cedar‑plank salmon with wild Oregon hazelnut pesto, foraging seasonal mushrooms for a hearty chanterelle risotto,
    and baking raspberry‑blueberry crumble, yet habitually saves leftovers in an unlabeled Tupperware that mysteriously vanishes from the fridge.
  core: Joanne Digiovanni, a methodical, compassionate retiree, curates community art with quiet dedication, balances a cautious financial life, manages health with disciplined routines, enjoys low‑impact
    sports, champions local arts, travels thoughtfully, and cooks with a seasonal palate, all while occasionally forgetting to label leftovers.
background:
  cultural: Joanne is a second-generation Italian-American, raised in a middle-class household in the Pacific Northwest. Her family's heritage, reflected in her surname Digiovanni, has instilled an appreciation
    for family traditions, food, and storytelling, while her upbringing in Washington State exposed her to a progressive, environmentally conscious community. She identifies with the broader white American
    cultural narrative but also values the multicultural fabric of Olympia, actively participating in local cultural festivals and historical preservation efforts. This blend of Italian familial values
    and Pacific Northwest civic engagement informs her compassionate outlook and dedication to fostering inclusive cultural experiences.
attributes:
  skills: '[''Art history knowledge'', ''Curatorial planning'', ''Exhibit organization'', ''Community outreach'', ''Volunteer coordination'', ''Event planning'', ''Budget management'', ''Writing and editorial
    work'', ''Mentorship'', ''Interpersonal communication'', ''Research and archival work'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading historical biographies and literary fiction'', ''Gardening'', ''Knitting'', ''Volunteering at community center art workshops'', ''Birdwatching
    on Nisqually wetlands'', ''Attending small theater productions'', ''Traveling to cultural heritage sites'']'
  career_goals: Despite being retired, Joanne aims to deepen her involvement in the cultural life of Olympia. She aspires to serve as a volunteer curator for the Olympia Historical Museum, developing small-scale
    exhibitions that highlight local artists and underrepresented histories. She hopes to write a series of essays on the interplay of art and community for a regional arts journal. Joanne also wishes to
    mentor younger volunteers, particularly those interested in museum work or arts education, and to launch an intergenerational art workshop that pairs seniors with high school students. Additionally,
    she is interested in advocating for accessible arts programming for senior citizens, ensuring that her community's cultural offerings remain inclusive.
