  career_goals: Though retired, Diego aims to remain purposeful by volunteering at the local senior center, mentoring younger immigrants on navigating life in Miami, and teaching small cooking classes that
    showcase Colombian cuisine. He aspires to compile his life experiences into a memoir to preserve his family's heritage for future generations. In the near term, he wishes to become comfortable using
    a smartphone for video calls with his grandchildren and to explore basic digital tools for community outreach.
