personas:
  professional: Diego Paez, a retired handyman turned senior‑center volunteer, leverages their carpentry, basic plumbing, and budgeting expertise to organize community events with a structured, reliable
    approach, while their practical mindset ensures every project stays on schedule and within budget.
  sports: Diego Paez enjoys low‑impact fitness by strolling along South Beach at sunrise, cheering on the Miami Heat during basketball season and the Miami Marlins in summer, while they regularly join the
    senior center’s Golden Dominoes club for friendly competition.
  arts: Diego Paez’s evenings echo the timeless sounds of Vallenato and Cumbia from maestros like Jorge Celedón and Carlos Vives, and they unwind with biographies of Winston Churchill and Frida Kahlo, finding
    inspiration in stories of perseverance and artistry.
  travel: Diego Paez favors meticulously planned short getaways, often driving to the Everglades or taking a weekend cruise to Key West, while they dream of a cultural immersion tour of Cartagena’s historic
    walled city and a leisurely stroll through Barcelona’s Gothic Quarter, balancing a modest budget with a desire to reconnect with distant relatives.
  culinary: Diego Paez delights in crafting traditional dishes such as arepas stuffed with queso fresco and avocado, the aromatic chicken‑and‑tuber stew ajiaco, and sweet plantain empanadas, showcasing
    their well‑honed culinary skill that blends garden‑fresh herbs with nostalgic flavors for family gatherings and community cooking classes, and they often share these meals with neighbors.
  core: Diego Paez, a methodical yet warm‑hearted gardener and domino enthusiast, consistently forgets to charge their smartphone before video calls but never lets a single herb in their garden go untended.
background:
  cultural: Diego was born and raised in the Antioquia region of Colombia, where family meals, Catholic celebrations, and communal gatherings formed the core of daily life. After relocating to Miami in
    his early forties, he integrated into the city's vibrant Latino diaspora, blending his Colombian customs—such as celebrating Carnaval de Barranquilla, preparing bandeja paisa, and speaking Spanish at
    home—with the multicultural influences of South Florida. His identity reflects a bicultural perspective that values respect for elders, hospitality, and the joyous expression of music and dance, while
    also adapting to the more individualistic and fast‑paced lifestyle of his adopted city.
