  career_goals: Jessi hopes to pursue a career that blends her love for helping others with her interest in science. She is considering a future as a pediatric nurse or a mental-health counselor, motivated
    by her own experiences with stress and a desire to support other teens. She also envisions using her digital-media talent to create a platform focused on teen mental-health awareness, possibly studying
    communications or public health in college. In the short term, she aims to earn a health-science certification through a local community program and to gain leadership experience by serving as president
    of her school’s student-wellness committee.
