persona_description: A network administrator who is responsible for setting up and maintaining a screened host gateway network topology. This individual is skilled in configuring and managing the packet
  filtering rules, as well as ensuring the security of the network against potential threats. They are familiar with the concept of a DMZ and the different components involved in this architecture, including
  the screened host gateway devices and the proxy server (bastion host). This individual is also adept at troubleshooting and resolving network issues that may arise from the implementation of the screened
  host gateway topology. They are detail-oriented and have a strong understanding of network security practices and protocols.
