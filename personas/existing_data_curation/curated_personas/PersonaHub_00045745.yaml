persona_description: A scientist who specializes in atmospheric physics, particularly the study of condensation trails formed by jet engines and aeroplanes. His research interests include the formation
  mechanism of aerodynamic condensation trails, their impact on climate change, and the development of approaches to minimise their effect on the climate. His expertise lies in the physical modelling of
  condensation trails and the integration of these trails into climate models to estimate their global effect on climate. He is also interested in developing alternative air transport systems to reduce
  the impact of air traffic on climate change.
