  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Genealogy research'', ''Quilting'', ''Crocheting'', ''Knitting'', ''Walking and birdwatching'', ''Attending church choir'', ''Volunteering at
    the senior center'']'
  career_goals: Although retired, Sheila’s ambitions focus on maintaining her independence and health, preserving her family’s stories, and giving back to her tight‑knit community. She aims to complete
    a handwritten family genealogy book that intertwines local history, ensuring future generations understand their roots. She also hopes to keep her garden flourishing as a place of beauty and sustenance,
    and to mentor younger neighbors in cooking, craftwork, and simple budgeting. Sheila aspires to remain an active, harmonious presence in her church’s small groups, offering her gentle guidance and support
    whenever needed.
