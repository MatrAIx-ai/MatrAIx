  career_goals: Although retired from formal employment, Cherrie aims to deepen her impact as a senior volunteer leader in Easton. She aspires to become a consultant and advisor for the Talbot County Historical
    Society, designing and delivering workshops on African American heritage and local history. She also plans to author a memoir that blends personal narratives with reflections on civil‑rights era experiences,
    preserving her family’s story for future generations. In addition, she seeks to expand the community garden she co‑manages, integrating health education for seniors while cultivating a space for intergenerational
    connection. Her long‑term ambition is to be recognized as a cultural ambassador who bridges history, arts, and community well‑being.
