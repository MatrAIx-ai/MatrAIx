persona_description: A member of the U.S. Congress who is dedicated to the Constitution and its implementation, particularly the convening of the First Monday in December for the annual session. This member
  is knowledgeable about the historical context and the legislative process of the U.S. Congress, and is interested in preserving the tradition of convening in December. They may also have a strong interest
  in the role of presidents in the legislative process and the use of the constitutional provision to convene Congress during national emergencies.
