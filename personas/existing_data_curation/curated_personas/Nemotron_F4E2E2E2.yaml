  career_goals: William aims to move into a leadership role within his school district, such as STEM department chair or curriculum coordinator, where he can shape district‑wide science and mathematics
    programs. He plans to earn a master’s degree in STEM education to deepen his pedagogical expertise and to spearhead innovative initiatives—e.g., a robotics and coding club, interdisciplinary project‑based
    learning modules, and partnerships with local tech companies. He also wants to expand community outreach by organizing after‑school tutoring and mentorship for under‑represented students, and eventually
    contribute to state education policy committees. His long‑term ambition is to be recognized as a catalyst for inclusive, inquiry‑driven STEM education.
