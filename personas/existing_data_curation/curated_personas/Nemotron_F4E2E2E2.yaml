personas:
  professional: William Wadiak, a 40‑year‑old high school math and physics teacher, blends data‑driven instruction with hands‑on labs, leveraging their curiosity and practical mindset to design inclusive
    curricula that spark student inquiry while mentoring peers toward interdisciplinary STEM initiatives.
  sports: William Wadiak spends weekends hiking the Cascades, follows Seattle Sounders FC with fervor, plays in a local adult soccer league, and practices yoga twice a month to counterbalance the sedentary
    demands of classroom work.
  arts: William Wadiak finds artistic inspiration in the folk melodies of The Decemberists, the piano works of Chopin, and the contemporary installations at the Seattle Art Museum, often attending evening
    concerts with the Seattle Symphony to unwind after a day of lesson planning.
  travel: William Wadiak enjoys weekend road trips to the Olympic Peninsula and an annual summer adventure to Iceland’s volcanic landscapes, while dreaming of a future family expedition to New Zealand’s
    fjords and the historic streets of a European market town.
  culinary: William Wadiak experiments in the kitchen with pierogi stuffed with smoked salmon and dill, simmering a beet‑laden borscht using fresh garden carrots and onions, and perfects a herb‑infused
    quinoa salad featuring rosemary and thyme harvested from their backyard plot.
  core: William Wadiak is a methodical educator who fuses scientific curiosity with community‑rooted compassion, turning modest quirks like a gadget‑hoarding habit into tools for innovative classroom experiences.
background:
  cultural: William was raised in a middle‑class, suburban family in the Seattle metropolitan area. His parents are of Polish descent, and the household blended typical American customs with occasional
    Polish traditions—such as celebrating Wigilia with pierogi and maintaining a connection to the Polish language through family stories. Growing up in the Pacific Northwest instilled a strong appreciation
    for the outdoors, environmental stewardship, and a community‑oriented mindset. The region’s tech‑savvy culture and progressive values have shaped his emphasis on inclusive education and collaborative
    problem solving. His cultural identity combines mainstream American values of individualism and self‑reliance with the collectivist, family‑centric ethic of his Eastern European heritage.
attributes:
  skills: '["Curriculum development and alignment", "Differentiated lesson planning", "Classroom management and student engagement", "Educational technology integration (Google Classroom, interactive whiteboards,
