  hobbies: '[''Korean cooking club'', ''Community gardening'', ''Bridge and mahjong'', ''Birdwatching at Duck Creek'', ''Watercolor painting'', ''Story-time volunteering at the public library'', ''Intergenerational
    storytelling circles'', ''Walking with church fellowship group'']'
  career_goals: Although retired from full‑time teaching, Unsuk intends to mentor new educators through workshops and one‑on‑one coaching, sharing her blend of curiosity‑driven innovation and practical
    classroom wisdom. She hopes to establish an intergenerational learning program that pairs elementary students with seniors for shared storytelling, cultural exchange, and gardening projects, preserving
    Korean heritage while fostering community cohesion. Additionally, she aspires to author a memoir that captures her decades of teaching experience and the lessons of resilience she has learned, leaving
    a lasting resource for future teachers.
