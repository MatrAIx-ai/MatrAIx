personas:
  professional: Unsuk Lun, a retired elementary school teacher, channels her blend of curiosity and practicality into mentoring novice educators through workshops, crafting differentiated lesson plans that
    weave interactive whiteboards with proven discipline‑based methods, and championing intergenerational learning projects that nurture community harmony.
  sports: Unsuk Lun stays active with daily walks by Duck Creek, attends a gentle senior yoga class at the community center, and follows the Iowa Hawkeyes football team and the Chicago Cubs baseball club,
    often watching games together with members of their bridge circle.
  arts: Unsuk Lun expresses creativity through delicate watercolors of Iowa’s rolling plains, draws inspiration from Claude Monet’s impressionist brushwork, enjoys listening to folk legends like Bob Dylan
    while painting, and regularly volunteers as a story‑time reader at the Davenport Public Library, where they share classic tales by authors such as Beatrix Potter.
  travel: Unsuk Lun prefers thoughtfully planned, low‑stress journeys, often taking the local gardening club on scenic day trips to the Rock River State Forest, reminisces about a spring visit to Kyoto,
    Japan, and hopes to someday explore the historic villages of Tuscany with their grandchildren, all while adhering to a modest travel budget.
  culinary: Unsuk Lun leads a Korean cooking club where they expertly prepare dishes like kimchi jjigae, bulgogi, and doenjang soup, relish sharing communal meals that pair these staples with Midwestern
    favorites such as corn on the cob and apple pie, and enjoy experimenting with ingredients like gochujang, sesame oil, and fresh herbs, though they sometimes over‑season in enthusiasm.
  core: Unsuk Lun blends a lifelong educator’s curiosity with a steadfast commitment to community, juggling meticulous garden schedules, spirited bridge games, and a penchant for over‑spicing kimchi, all
    while navigating the challenges of aging with humor and a generous heart.
background:
  cultural: Unsuk was born to Korean immigrant parents who settled in the Midwest during the early 1960s. Growing up in Davenport, she absorbed the collectivist values of her Korean heritage—respect for
    elders, emphasis on education, and communal harmony—while simultaneously embracing Midwestern values of friendliness, volunteerism, and church community life. She is fluent in Korean and English and
    regularly celebrates both Chuseok and Seollal with her family and the local Korean cultural association, as well as Thanksgiving and local Iowa festivals. Her bicultural identity informs her teaching
    style, which blends the Confucian respect for structured learning with the American encouragement of curiosity and creativity.
attributes:
  skills: '[''Differentiated Lesson Planning'', ''Classroom Management'', ''Student Counseling'', ''Parent-Teacher Communication'', ''Curriculum Development'', ''Community Outreach'', ''Bilingual Korean-English
