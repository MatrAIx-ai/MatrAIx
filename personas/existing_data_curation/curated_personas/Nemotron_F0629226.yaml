    at community art workshops"]'
  career_goals: Stephen aims to re‑enter the workforce through a part‑time role that merges his artistic passions with community service. He plans to launch a home‑based studio producing custom artwork
    and offering hands‑on workshops for neighbors and local schools. To strengthen his credentials, he intends to enroll in a community‑college certificate program in graphic design or arts education. Ultimately,
    he hopes to become a recognized catalyst for creative outreach in Clayton County, building a modest, sustainable business that provides both personal fulfillment and a calming, structured environment
    to manage his stress.
