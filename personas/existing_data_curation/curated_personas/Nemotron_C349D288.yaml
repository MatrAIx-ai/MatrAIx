  hobbies: '[''Woodworking Art Projects'', ''Watercolor Painting'', ''Community Gardening'', ''Folk Dancing'', ''Historical Society Talks'', ''Seniors Book Club'', ''Craft Fair Participation'', ''Improv
    Theater Classes'', ''Storytelling Sessions'']'
  career_goals: Mica aims to transition from full-time carpentry to a legacy-focused role as a community artisan. She plans to open a modest studio in Whiting where she can teach woodworking art classes
    to adults and youth, preserving traditional techniques while encouraging novel, abstract designs. She hopes to exhibit a series of 'abstract wooden sculptures' in local galleries and to be recognized
    as a master craftsperson in Lake County. Mica also intends to author a practical guide that merges carpentry skills with artistic expression for hobbyists. Finally, she aspires to organize an annual
    'Crafts of the Lakes' competition that fosters friendly rivalry among regional makers, reflecting her competitive spirit in a collaborative setting.
