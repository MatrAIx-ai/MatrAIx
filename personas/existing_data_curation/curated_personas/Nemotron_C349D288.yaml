personas:
  professional: Mica Artiaga, a 73-year-old master carpenter and community artisan, blends half a century of framing, historic restoration, and custom wood carving with an abstract artistic vision, and
    they mentor apprentices while organizing studio classes and drafting a guide that unites craft with creativity, applying a healthy dose of skepticism to project budgets and a competitive curiosity that
    drives them to push artistic boundaries.
  sports: Mica Artiaga, a devoted fan of the Chicago Cubs and Bears, enjoys weekly walks along the Lake Michigan shoreline, participates in a local senior swim club, and they stay active by joining the
    community garden's spring lawn-mowing crew as a low-impact fitness routine, while they keep a skeptical eye on the teams' performance trends.
  arts: Mica Artiaga paints watercolors of the Lake Michigan shoreline inspired by Winslow Homer and Paul Klee, dances folk steps to recordings of The Chieftains, and they regularly attend Chicago Symphony
    Orchestra performances, letting these artistic experiences fuel their creative drive, all while maintaining a healthy skepticism toward fleeting artistic trends.
  travel: Mica Artiaga prefers purposeful travel, often joining guided heritage tours of Door County's historic lighthouses and the shipyards of Gary, and they dream of a summer art-inspired retreat in
    Provence, France, while rarely taking spontaneous trips due to health considerations, and they approach itinerary planning with a skeptical eye toward overly commercial tours.
  culinary: Mica Artiaga cultivates heirloom tomatoes and basil, crafts fresh bruschetta with crusty sourdough and aged balsamic, and they occasionally experiment with smoked wood-infused sauces for grilled
    fish, though they admit to over-salting dishes when excited about new recipes, and they remain skeptical of heavily processed ingredients.
  core: Mica Artiaga, a spry 73-year-old carpenter-artist, channels a competitive curiosity into woodcraft, community mentorship, and a disciplined financial life, while they balance occasional health neglect
    with a vibrant social calendar.
background:
  cultural: Mica grew up in a white, Midwestern, working-class family in Whiting, Indiana, a town shaped by the oil-refinery industry and close ties to Chicago. Her ancestors were likely European immigrants—Irish
    and Polish—who settled in the region in the early 1900s, bringing Catholic and Protestant traditions that emphasized hard work, self-reliance, and community solidarity. The local culture values practical
    craftsmanship, modesty, and communal gatherings such as church socials, neighborhood potlucks, and labor-union events. This background instilled in Mica a strong work ethic, a pragmatic approach to
    problem-solving, and a deep appreciation for the shared experience of blue-collar life, while also encouraging her to explore artistic expression as a personal and communal outlet.
