personas:
  professional: Corree Reed, a community‑oriented arts facilitator whose curiosity drives her to explore unconventional exhibition formats, balances meticulous budget spreadsheets with on‑the‑fly program
    tweaks, and leverages outgoing networking to secure artist collaborations, while her competitive streak pushes her to outdo neighboring cultural events, all while maintaining a healthy dose of skepticism
    toward overly polished corporate sponsorships.
  sports: Corree Reed follows the Miami Heat with fervor, cheers on the Florida Panthers during hockey season, leads a senior Zumba class at the local community center, attends weekly salsa sessions at
    Palm Beach Salsa Club, and maintains a low‑key membership at the West Palm Beach aquatic center, blending high‑energy dance with occasional pool laps.
  arts: Corree Reed spends afternoons creating mixed‑media collages inspired by the vibrant street murals of Wynwood, showcases emerging regional artists like Maya Torres in pop‑up mini‑exhibits at the
    Norton Museum’s community wing, volunteers backstage at the Palm Beach Playhouse, and frequently cites Frida Kahlo and Banksy when discussing artistic intention.
  travel: Corree Reed enjoys weekend road trips to the Everglades and historic Savannah for Southern culinary inspiration, while dreaming of a summer escape to Santorini to study island light and Mediterranean
    architecture, planning itineraries with a mix of spontaneous detours and carefully budgeted flights that satisfy her curious yet organized travel style.
  culinary: Corree Reed masters Mediterranean dishes such as grilled halloumi with za’atar and Southern classics like shrimp and grits, seasons with fresh basil, thyme, and cilantro harvested from her herb
    garden, and loves hosting potluck soirées where her signature lemon‑olive oil vinaigrette becomes the talk of the table.
  core: Corree Reed blends a competitive spark with boundless curiosity, turning every gallery visit, community class, or potluck into a chance to connect, create, and subtly outshine the crowd.
background:
  cultural: Corree was raised in a middle‑class, suburban setting in the southeastern United States, with Anglo‑American roots that trace back to New England immigrants. Her family traditions include church
    holidays, community picnics, and a strong emphasis on self‑reliance and personal achievement. Living in West Palm Beach for the past two decades has exposed her to the multicultural tapestry of South
    Florida, influencing her taste in music, food, and the arts. While she identifies as white American, she embraces the region’s diverse cultural rhythms, blending classic American values with the lively,
    artistic vibe of the coastal community.
