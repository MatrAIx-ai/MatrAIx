personas:
  professional: Matthew Wasserman, a 40‑year‑old diesel technician renowned for his systematic diagnostic methods, meticulous documentation, and lean workflow implementation, leverages his competitive drive
    and methodical mindset to troubleshoot heavy‑duty engines, mentor apprentices, and lay the groundwork for a specialty shop targeting fleet customers in Saint Paul.
  sports: Matthew Wasserman channels his competitive edge into precision shooting at the St. Paul Target Sports Club, seasonal fishing tournaments on the Mississippi River, weekend hikes along the Superior
    Hiking Trail, and faithfully follows the Minnesota Vikings and Minnesota Twins, while occasionally joining a local amateur softball league.
  arts: Matthew Wasserman immerses himself in automotive heritage through rare diesel history volumes and visits to the Minnesota Transportation Museum, while unwinding to the gritty storytelling of Bob
    Dylan and the raw riffs of AC/DC, and he occasionally sketches detailed line drawings of engine components as a quiet creative outlet.
  travel: Matthew Wasserman favors meticulously planned road trips that combine his love for vintage truck shows in Detroit and the annual Woodward Dream Cruise in Michigan with fishing expeditions at Lake
    of the Woods, preferring mid‑week departures to avoid crowds and budgeting for modest lodging and fuel, while dreaming of a future cross‑country journey along the historic Route 66.
  culinary: Matthew Wasserman gravitates toward hearty Midwestern fare, often grilling freshly caught walleye seasoned with dill and lemon butter, slow‑cooking a family‑style beef chili spiced with chipotle
    and smoked paprika, and hand‑rolling rye‑based sandwiches for his crew, while his woodworking hobby even extends to crafting a custom cedar smoker for outdoor meals.
  core: Matthew Wasserman, a 40‑year‑old diesel specialist with a laser‑focused work ethic, balances a competitive streak and meticulous cataloging habit with a penchant for late‑night engine tinkering,
    occasional over‑caffeination, and a stubborn reluctance to delegate tasks.
background:
  cultural: Matthew is of white Midwestern descent, raised in Saint Paul, Minnesota. His paternal lineage includes Jewish heritage, while his maternal side carries Middle‑Eastern influences, reflected in
    family recipes and occasional cultural celebrations. He grew up immersed in the practical, self‑reliant values of the Upper Midwest—hard work, punctuality, and community responsibility—while also appreciating
    the diverse traditions from his mixed heritage. Though not religiously observant, he honors both Hanukkah and cultural practices from his mother’s background on special occasions.
attributes:
  skills: '[''Diesel engine repair'', ''Truck and bus maintenance'', ''Electronic diagnostic scanning'', ''Welding and metal fabrication'', ''Hydraulic system repair'', ''Air‑brake system servicing'', ''EPA
