  hobbies: '[''Restoring classic trucks'', ''Building scale model diesel engines'', ''Target shooting'', ''Fishing tournaments'', ''Hiking local trails'', ''Woodworking'', ''Reading technical manuals'',
    ''Small‑group car enthusiast meetups'', ''Mentoring apprentices'']'
  career_goals: Matthew aims to obtain a Master Diesel Technician certification and an EPA Emissions Specialist license within the next two years. He plans to open his own specialty diesel repair shop focused
    on fleet customers in the Saint Paul region, offering rapid turnaround and custom maintenance consulting. He also hopes to become a certified trainer at a local technical college, sharing his systematic
    troubleshooting methods with the next generation of mechanics. Long‑term, he envisions his shop becoming a benchmark for efficiency and reliability, earning recognition as the top diesel service provider
    in Minnesota.
