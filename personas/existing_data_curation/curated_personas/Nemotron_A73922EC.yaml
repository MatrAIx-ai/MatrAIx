  career_goals: Martha aims to transition from a purchasing agent to a senior category manager within the next five years, focusing on high‑technology and green‑energy product lines. She plans to spearhead
    the adoption of AI‑driven analytics in procurement to further reduce costs and improve supplier diversity. Additionally, she hopes to mentor junior procurement staff, fostering a collaborative team
    culture that balances flexibility with strategic rigor. Long‑term, she envisions establishing a consultancy that helps midsize manufacturers implement sustainable sourcing practices while leveraging
    her technical expertise.
