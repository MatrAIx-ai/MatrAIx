  hobbies: '["Hiking", "Nature Photography", "Science‑Fiction Reading", "Non‑Fiction Tech & Sustainability Books", "Home Gardening (hydroponics)", "Cooking", "Farmers’ Market Visits", "DIY Electronics Projects",
