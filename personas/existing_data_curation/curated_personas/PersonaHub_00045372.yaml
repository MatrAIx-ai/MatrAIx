persona_description: A geologist who specializes in the study of sedimentary rocks and their history, particularly in the context of glacial erosion and sediment transport. Dr. John Clague is a professor
  at Simon Fraser University and has conducted research on gravel extraction from Kame Terraces, which are underlain by sand and gravel. His work has included the excavation of gravel pits and the analysis
  of the underlying sedimentary rock layers. Dr. Clague's expertise is particularly relevant to the extraction of gravel for modern uses such as concrete and roadbed material, as well as its historical
  use as a resource for human habitation.
