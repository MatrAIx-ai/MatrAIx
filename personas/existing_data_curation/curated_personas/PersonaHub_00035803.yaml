persona_description: A database administrator who is familiar with the best practices and conventions for managing and working with databases in MySQL and other tools. They have extensive experience in
  creating and maintaining test databases, ensuring they are identical to the production database, and handling foreign keys in table relationships. They are detail-oriented and pay close attention to the
  naming conventions for database components, ensuring they are consistently lowercase and follow the rules for table names, column names, and foreign key names. They are also aware of the importance of
  naming conventions and best practices for other database components, such as table and column names, and are knowledgeable about the use of single quotes for SQL commands.
