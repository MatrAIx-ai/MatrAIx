  career_goals: Daphne aims to advance from first‑line supervisor to store manager within the next two years, leveraging a community‑college certification in retail management to formalize her expertise.
    Long‑term, she envisions moving into a district‑manager role where she can mentor multiple store leaders, develop regional training programs, and champion initiatives that improve employee retention.
    She also hopes to eventually open a boutique that showcases local Black artisans, using her retail acumen to create a sustainable, community‑focused business after retirement.
