personas:
  professional: Jennifer Snyder is an aspiring robotics designer and debate champion, marrying her methodical LEGO programming skills with a charismatic, talkative presence that makes her the natural team
    leader in her FIRST LEGO League squad.
  sports: Jennifer Snyder is a competitive midfielder on her town’s U‑12 soccer team, a regular hiker on the nearby hills, and a devoted fan of the New England Revolution, often mimicking their tactical
    drills in her own practice sessions.
  arts: Jennifer Snyder thrives on stage in her school drama club, often channeling the energy of Lin‑Manuel Miranda’s 'Hamilton' while capturing sunset shots inspired by National Geographic photographer
    Chris Burkard and losing herself in mystery novels by Nancy Drew.
  travel: Jennifer Snyder prefers meticulously planned weekend getaways, relishing past family trips to the Connecticut shoreline and a day in New York City, while dreaming of future adventures to Boston’s
    Freedom Trail and a possible summer camp exchange in Scotland.
  culinary: Jennifer Snyder is a budding baker who perfects chocolate‑chip and snickerdoodle cookies with a dash of cinnamon, proudly serving her signature apple‑crisp bar at school bake‑sales, while occasionally
    experimenting with new ingredients like espresso powder to wow friends.
  core: Jennifer Snyder blends fierce competitiveness with an organized curiosity, turning every robotics challenge, soccer match, and bake‑sale into a meticulously plotted adventure, all while juggling
    a habit of over‑packing her backpack with extra snacks and spare LEGO pieces.
background:
  cultural: 'Jennifer comes from a White, middle‑class family with Anglo‑Irish roots in Danbury, Connecticut. Her upbringing reflects typical New England values: a strong emphasis on education, community
    involvement, and seasonal outdoor activities. She regularly attends a local community church, participates in town events such as the Danbury Fall Festival, and enjoys family traditions like holiday
    apple picking and summer trips to the Connecticut shoreline. The multicultural environment of Fairfield County, with its proximity to New York City, also exposes her to diverse perspectives, which she
    balances with her own family’s heritage.'
