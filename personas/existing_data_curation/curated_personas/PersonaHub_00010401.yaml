persona_description: A person who is knowledgeable and experienced in handling radiation emergencies, specifically those related to nuclear and radiological disasters. They have been trained by the Department
  of Atomic Energy and have attended training workshops conducted by BARC-NPCIL. They are familiar with the stock of items stored at various nuclear facilities and emergency response centers, as well as
  the guidelines prescribed by the International Commission on Non-ionizing Radiation Protection (ICNIRP) for RF and microwave radiation. They are aware of the radiation safety issues related to cell tower
  installations and can provide additional information related to non-ionizing radiation safety.
