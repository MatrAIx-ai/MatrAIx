persona_description: A scientist who studies the impacts of climate change on marine ecosystems, specifically focusing on the Pacific Decadal Oscillation (PDO) and its effects on upwelling patterns and
  marine food webs. Sydeman is particularly interested in the role of delayed upwelling in causing widespread marine famine, and has conducted research on the link between the PDO and upwelling cycles.
  He is also aware of the potential effects of global warming on upwelling patterns and has modeled how elevated levels of carbon dioxide might affect upwelling off California.
