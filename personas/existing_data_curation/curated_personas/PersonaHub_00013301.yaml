persona_description: A telecommunications expert who specializes in the design and implementation of digital voice processor standards, particularly SCIP, and is knowledgeable about the encryption, key
  management, and voice compression technologies used in these standards. They have experience working with the Department of Defense Digital Voice Processor Consortium (DDVPC) and the U.S. National Security
  Agency, and have a deep understanding of the interoperability issues faced by earlier NSA encryption systems for voice communication. They are skilled in setting up secure calls using SCIP, negotiating
  key exchange and encryption, and configuring SCIP devices to support various vocoders and voice coders. They are also familiar with the SCIP 23x family of documents, which define the security protocols
  and cryptographic solutions used in SCIP, and have experience implementing these protocols in SCIP systems.
