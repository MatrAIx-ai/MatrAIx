personas:
  professional: Caitlin Harmon, a retail operations specialist with a data‑driven mindset, leads a front‑line sales team at a busy department store, excels at coaching new hires, optimizing inventory through
    analytics, and resolving conflicts with a balanced mix of empathy and assertiveness, reflecting their pragmatic curiosity and methodical organization.
  sports: Caitlin Harmon, an avid weekend hiker who explores the Meramec River trails, plays in a local co‑ed softball league, and faithfully cheers for the St. Louis Cardinals and the Kansas City Chiefs,
    blends structured gym workouts with spontaneous trail runs to maintain a practical yet adventurous fitness routine; they view physical activity as both a personal recharge and a way to embody the neighborly
    spirit of community gatherings.
  arts: Caitlin Harmon, a dedicated patron of the St. Louis Symphony Orchestra and fan of folk‑rock duo The Avett Brothers, spends quiet evenings at the Sheldon Art Museum and occasional community theatre
    productions, letting the melodies of John Legend and the regionalist paintings of Grant Wood inspire their reflective, organized lifestyle; they find that immersive arts experiences sharpen their leadership
    insights and provide a soothing counterbalance to retail pressures.
  travel: Caitlin Harmon, a meticulous trip planner who books family road trips months ahead, enjoys seasonal leaf‑peeping drives through the Great Smoky Mountains, weekend escapes to the Ozarks and a summer
    visit to Napa Valley, dreams of a culinary tour of Tuscany and a wildlife safari in Costa Rica, yet balances these aspirations against modest savings and a demanding work schedule, they prioritize experiences
    that combine natural beauty with opportunities for community connection.
  culinary: Caitlin Harmon, an intermediate home chef who tends a vegetable garden and experiments with seasonal cooking, delights in preparing roasted beet and goat‑cheese salad, summer zucchini casserole,
    and apple crisp with locally sourced honey, favors fresh heirloom tomatoes, kale, and rosemary, and occasionally treats themselves to a farm‑to‑table dinner at a nearby bistro, they view each meal as
    a chance to blend practicality with creative expression.
  core: Caitlin Harmon, a 37‑year‑old retail leader who balances spreadsheets with garden gnomes, thrives on meticulous planning yet can lose hours to a crossword puzzle, embodies pragmatic optimism that
    fuels both career ambition and deep community roots.
background:
  cultural: 'Caitlin’s cultural background is rooted in the Midwestern United States, specifically the small‑town community of Union, Missouri. She grew up in a middle‑class, white family with deep ties
    to the region’s agricultural heritage and values of practicality, hard work, and neighborly courtesy. Her upbringing blended traditional Midwestern customs—such as Thanksgiving gatherings, local fair
    attendance, and a strong church community—with exposure to the broader St. Louis metropolitan area’s cultural diversity. These influences foster her balanced worldview: appreciating new ideas while
    staying grounded in proven, community‑centered practices.'
