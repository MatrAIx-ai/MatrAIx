  career_goals: Caitlin is focused on advancing to a store manager position within the next three years, leveraging her associate’s degree in business administration and pursuing a bachelor’s degree part‑time.
    She aims to earn a Certified Retail Manager credential and lead a high‑performing store that integrates seamless in‑store and online experiences. Long‑term, she envisions moving into district management,
    mentoring multiple store teams, and eventually opening a boutique that reflects her passion for curated product selection and community engagement.
