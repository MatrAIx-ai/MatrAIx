persona_description: A history enthusiast who is particularly interested in the history of porcelain manufacturing in Japan, particularly the Arita region. They are particularly interested in the development
  of the Arita porcelain industry, the history of the stoneware and porcelain production, and the contributions of the potters Sakaida Kakiemon and Imaizumi Imaemon to the improvement of Japanese enameled
  decoration. They are also interested in the export of Arita wares to Europe and the decline of the export trade after the second half of the 17th century.
