persona_description: An academic researcher specializing in the study of Persian literature and the Persian Epic Cycle, particularly focusing on the evolution of the Persian epic tradition and its reception
  over the centuries. This researcher aims to fill the gap in Persian studies and specifically in Shahnama studies by analyzing the available sources of the Persian Epic Cycle, investigating the relationship
  between oral and written traditions, and providing a comprehensive analysis of the epics within the Persian Epic Cycle.
