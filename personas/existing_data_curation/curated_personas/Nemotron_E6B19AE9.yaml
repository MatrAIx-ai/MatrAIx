  hobbies: '[''Visiting art museums and galleries'', ''Photography'', ''DIY woodworking'', ''Gardening'', ''Reading historical non-fiction'', ''Listening to podcasts on science and culture'', ''Hiking in
    Great Falls Park'', ''Cooking and experimenting with new recipes'', ''Volunteering at local community art programs'', ''Puzzle solving (crosswords, jigsaw puzzles)'']'
  career_goals: Looking ahead, Roger aims to move from a front‑line stocker role into a supervisory or training position within his warehouse, where he can mentor new staff and lead small process‑improvement
    projects. He plans to enroll in evening courses at Northern Virginia Community College to earn a certification in Supply Chain Management and to obtain a Certified Forklift Operator credential, strengthening
    his qualifications for leadership. Concurrently, he hopes to blend his passion for the arts with his career by securing a part‑time role in the gift shop of a nearby museum or by leading community workshops
    in woodworking and photography. Financially, his primary ambition is to build a secure retirement fund and ensure his family’s stability, while also implementing personal stress‑reduction strategies
    to maintain well‑being and work‑life balance.
