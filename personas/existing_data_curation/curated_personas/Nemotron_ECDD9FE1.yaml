  core: Eulalia Wangerin, a newborn whose innate need for routine fuels calm yet amplifies anxiety when disruption occurs, they balance a gentle cooperative nature with intense emotional reactivity.
background:
  cultural: Eulalia comes from a white American family with deep roots in the Pacific Northwest. Growing up in Spokane, Washington, she has been influenced by the region's modest, community‑oriented culture
    and its appreciation for outdoor recreation and seasonal change. Her upbringing emphasized self‑reliance, courtesy, and the value of maintaining harmonious relationships within a close‑knit community.
