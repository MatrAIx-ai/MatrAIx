  career_goals: Although retired, Sara aims to remain active and independent by expanding her volunteer involvement, especially in the local food pantry and church outreach programs. She wishes to compile
    a family cookbook that preserves her recipes for future generations, and hopes to learn to use video‑calling platforms more fluently to stay connected with her children and grandchildren. Additionally,
    she aspires to mentor younger neighbors in gardening and crafting, passing on her practical skills while fostering community ties.
