personas:
  professional: Jetta Mauldin, an aspiring marine biologist and budding coder, blends a curiosity for tide pools with meticulous sketching and LEGO construction, while their relaxed, disorganized style
    lets them explore ideas freely without rigid plans.
  sports: Jetta Mauldin enjoys swimming laps at the Greenfield Community Pool as part of the junior Aqua Explorers club, cheers quietly for the local Little League baseball team the River Runners, and follows
    the Seattle Mariners for inspiration while preferring solitary practice over noisy team drills.
  arts: Jetta Mauldin immerses in instrumental piano pieces by Yiruma, studies Monet's water lilies in museum trips, avidly watches Studio Ghibli's 'Ponyo' for its oceanic themes, and often sketches their
    own sea-creature characters inspired by the works of illustrator Shaun Tan.
  travel: Jetta Mauldin loves quiet beach mornings at Monterey Bay, has explored the interactive exhibits at the Children's Museum of Pittsburgh, dreams of a trip to the Kennedy Space Center in Florida,
    and prefers low-key, family-guided tours over crowded amusement parks.
  culinary: Jetta Mauldin favors grilled cheese sandwiches with sharp cheddar, crunchy carrot sticks, and strawberry-banana smoothies blended with fresh fruit, occasionally helps whisk pancake batter but
    mostly enjoys the simple comfort of spaghetti with tomato basil sauce.
  core: Jetta Mauldin is a quiet, endlessly curious eight-year-old who finds serenity in sketching tide pools, builds intricate LEGO worlds, and navigates life with a calm, flexible spirit that occasionally
    forgets the mundane.
background:
  cultural: Jetta is raised in a middle‑class white family of mixed Northern European ancestry in Long Beach, California. Her upbringing blends typical American traditions—celebrating holidays such as Thanksgiving,
    Halloween, and the Fourth of July—with exposure to the multicultural vibe of Los Angeles County. She regularly participates in community art programs, visits the beach, and attends events at local libraries
    and museums, which nurture her curiosity and appreciation for diverse ideas.
attributes:
  skills: '[''drawing'', ''digital illustration'', ''storytelling'', ''reading comprehension'', ''basic Scratch coding'', ''puzzle solving'', ''nature observation'']'
  hobbies: '[''sketching'', ''tide pool exploring'', ''reading picture books'', ''listening to instrumental music'', ''LEGO building'', ''Scratch programming'', ''visiting museums'']'
  career_goals: She dreams of becoming an artist who creates calming visual experiences—perhaps as an illustrator or animator—and is fascinated by marine life, hoping one day to work as a marine researcher
    or conservationist who blends art and science to raise awareness about ocean ecosystems. Jetta aspires to study at an art school, develop her own digital comics, and design interactive installations
    that inspire quiet reflection.
