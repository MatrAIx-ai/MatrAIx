  hobbies: '["Gardening", "Volunteering at community center", "Softball league", "Classic car restoration", "Cooking Maryland seafood", "Reading mystery novels", "DIY home improvement", "Live music concerts"]'
  career_goals: Kim aims to achieve ASE Master Technician certification within the next two years and transition into a shop manager role at her current garage. Her long‑term ambition is to open a small,
    community‑focused auto repair shop that offers mentorship programs for aspiring mechanics, especially women. She hopes to integrate mental‑health awareness into her workplace, creating a supportive
    environment that acknowledges her own experiences with anxiety and sadness. Financial stability for her family, a legacy of reliable service in Rhodesdale, and the satisfaction of teaching practical
    skills to the next generation are central to her career vision.
