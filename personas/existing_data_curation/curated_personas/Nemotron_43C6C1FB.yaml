personas:
  professional: A budding game designer and DIY tech tinkerer, Larry Barnett channels his curiosity and practical mindset into crafting tabletop board game prototypes with LEGO bricks and Arduino circuits,
    while his relaxed approach to obligations leads to occasional last‑minute revisions and a habit of improvising solutions on the fly.
  sports: Larry Barnett, a basketball fan who spends evenings shooting hoops at the Laurel Community Center, roots for the Washington Wizards and Baltimore Ravens, and participates in the local youth basketball
    league, though they often skip the warm‑up drills in favor of jump‑shot challenges with friends.
  arts: Larry Barnett explores digital art on a tablet, producing fan‑art tributes to Marvel graphic novels and creating beats in beginner music software inspired by Kendrick Lamar, H.E.R., and Anderson
    .Paak, while they also enjoy listening to neo‑soul classics like D’Angelo’s Voodoo during study sessions.
  travel: Larry Barnett dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and the historic Frederick Douglass site, while their family’s weekend trips have taken them
    to the Chesapeake Bay’s waterfront and a summer camp in Shenandoah National Park, though limited allowance keeps most trips modest and local.
  culinary: Larry Barnett’s favorite meals range from pepper‑spiced chicken wings with hot sauce and mac & cheese to sushi rolls featuring avocado and cucumber, and they enjoy experimenting with a small
    electric skillet to whip up skillet‑fried cornbread, yet they often rely on pizza delivery when homework piles up.
  core: Larry Barnett is a curious, tech‑savvy teen who balances a love for LEGO engineering, basketball, and hip‑hop beats with a habit of forgetting homework and stretching deadlines, all while grounding
    themselves in community gatherings and seasonal celebrations.
background:
  cultural: Larry is an African‑American teenager growing up in Laurel, Maryland, within Prince George’s County—a region known for its vibrant Black community and proximity to Washington, D.C.’s cultural
    institutions. His family observes traditions such as Juneteenth celebrations, visits historic sites like the Frederick Douglass National Historic Site, and participates in local church events where
    gospel music and community service are central. The regional Black culture influences his musical preferences, awareness of civil‑rights history, and a strong sense of community solidarity. Stories
    of resilience from older relatives and role models among local Black entrepreneurs, athletes, and educators shape his aspirations and values. He balances a modern urban identity with a deep appreciation
    for the broader African‑American heritage, drawing inspiration from both historical legacy and contemporary cultural expressions.
