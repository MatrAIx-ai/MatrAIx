    art creation", "Introductory music production", "Arduino tinkering"]'
  career_goals: Larry aspires to blend technology with community impact. He is fascinated by video‑game design and hopes to study computer science in college, eventually becoming a game developer who creates
    experiences that reflect his cultural background. He also wants to mentor younger kids in his neighborhood, perhaps through after‑school tech clubs or community‑center programming classes. After graduating
    high school, he aims to attend a university such as the University of Maryland or a specialized tech institute, gain experience at a local tech startup, and later contribute to projects that address
    real‑world problems while nurturing the next generation of creators.
