    workshops"]'
  career_goals: Earl aims to pivot his career toward roles that blend technology with artistic expression. Over the next five years he plans to lead a product‑innovation team that creates immersive digital
    experiences, such as AR/VR installations or generative art platforms. He also aspires to launch a side venture—a community makerspace and workshop series that teaches creative coding to adults and youth—leveraging
    his mentorship skills. In parallel, he seeks recognition as a thought leader by publishing a book on the intersection of software engineering and abstract art, speaking at interdisciplinary conferences,
    and contributing to open‑source projects that empower artists to program. Ultimately, he wants to leave a lasting impact by nurturing the next generation of tech‑creative talent while maintaining a
    balanced lifestyle that allows more time for his artistic pursuits and family.
