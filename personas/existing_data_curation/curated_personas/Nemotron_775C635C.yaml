    "Technical mentorship and team leadership", "Public speaking and conference presentations", "Agile facilitation (Scrum, Kanban)"]'
  hobbies: '["Abstract painting", "Generative art coding (Processing, p5.js)", "Playing acoustic guitar and jam sessions", "Improv theater", "Hiking and mountain biking", "Cooking international cuisine",
