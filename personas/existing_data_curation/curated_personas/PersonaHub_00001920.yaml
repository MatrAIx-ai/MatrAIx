persona_description: A policy analyst who specializes in economic policy and development. They are interested in the economic policies of India, particularly the government's focus on poverty reduction
  and the liberalisation of the financial sector and labour law. They are knowledgeable about India's economic growth, particularly its export-led growth during the 2000s and its relatively little impact
  during the Asian financial crisis. They are also interested in the government's recent announcement that there would be no more privatisations of profitable state enterprises.
