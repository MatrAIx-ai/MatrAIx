  hobbies: '["Salsa dancing", "Cooking traditional Honduran recipes", "Volunteering at local food banks", "Hiking in Griffith Park", "Attending cultural festivals", "Listening to Latin music", "Yoga and
    meditation", "Reading personal development books", "Team sports (soccer)", "Journaling"]'
  career_goals: Marcela aims to complete her bachelor's degree in social work or public health and eventually obtain a master's in community health. She aspires to work as a community health worker or case
    manager within Los Angeles, focusing on supporting recent Honduran immigrants and low‑income families. Long‑term, she envisions leading a nonprofit program that provides culturally sensitive resources,
    advocacy, and empowerment workshops, while also pursuing leadership training to become a director of community services.
