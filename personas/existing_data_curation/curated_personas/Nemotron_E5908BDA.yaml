personas:
  professional: Marcela Manriquez is an aspiring community health worker who leverages bilingual communication, meticulous event planning, and compassionate peer counseling to coordinate outreach programs
    for low‑income families in Los Angeles, while steadily building the skill set needed to one day direct a culturally responsive nonprofit.
  sports: Marcela Manriquez plays midfield for the community soccer league Eastside United FC, follows the LA Galaxy, Los Angeles Lakers, and Los Angeles Dodgers, hikes the trails of Griffith Park weekly,
    and incorporates yoga sessions to balance agility and stress relief.
  arts: Marcela Manriquez channels her love of movement by taking salsa and merengue classes, curates playlists featuring Bad Bunny, J Balvin, and Shakira, attends local Latin dance performances, and explores
    the vibrant street‑art murals of Downtown Los Angeles for creative inspiration.
  travel: Marcela Manriquez enjoys budget‑friendly weekend trips, having explored Mexico City’s historic center, hiked the desert trails of Joshua Tree, and plans future cultural immersions in Barcelona’s
    architecture and the ancient ruins of Tikal in Guatemala.
  culinary: Marcela Manriquez cooks traditional family dishes such as plantain‑based mofongo, hearty bean stew, and corn‑based tamales for friends, seasoning with fresh cilantro, achiote, and lime, while
    also indulging in street‑food tacos and occasional sushi outings.
  core: Marcela Manriquez is a methodical, socially‑charged 20‑year‑old who blends structured community work with vibrant dance, worries about the future, yet finds balance through yoga, budgeting, and
    cooking for friends.
background:
  cultural: Marcela is a first‑generation Honduran American raised in Los Angeles. Her family maintains strong ties to Honduran traditions, including Catholic celebrations, family gatherings, and the cuisine
    of her homeland. Growing up in a multicultural neighborhood, she blends these cultural values—community solidarity, respect for elders, and a love of music—with the diverse influences of Southern California.
    Her bilingual upbringing informs her identity and fuels her commitment to help other immigrants navigate the challenges of assimilation while preserving their cultural heritage.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Community outreach", "Event planning", "Volunteer coordination", "Peer counseling", "Data entry and Microsoft Office", "Social media content creation",
