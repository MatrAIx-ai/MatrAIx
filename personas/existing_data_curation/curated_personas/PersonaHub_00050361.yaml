persona_description: A computer artist and pioneer in the field of video synthesis, known for his innovative use of analog computers in the creation of abstract films. His work with John Whitney's Cam Machine,
  a military technology modified for use in animation, paved the way for the increased use of computers in commercial film imagery. Whitney's interest in developing new technologies for abstract filmmaking
  led him to design machines used for the first computer-based animations, and his efforts were instrumental in the development of computer animation stands nearly twenty years later.
