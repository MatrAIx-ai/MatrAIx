  hobbies: '[''Visiting museums and galleries'', ''Watercolor painting'', ''Digital photography'', ''Reading art history and theory'', ''Attending small artist talks and lectures'', ''Volunteer work at
    community arts center'', ''Gardening'', ''Walking hikes in Finger Lakes region'', ''Short story writing'', ''Cooking experimental recipes'', ''Dog walking'', ''Book club (small group)'']'
  career_goals: Although retired from formal employment, Traci aims to deepen her impact on Rochester’s cultural life. She plans to curate a rotating series of small‑scale shows that spotlight senior and
    emerging local artists, author a memoir that weaves her personal journey with reflections on art history, mentor younger volunteers at the Memorial Art Gallery, and learn a new medium such as ceramics
    to expand her creative practice. Additionally, she hopes to develop an intergenerational workshop series that uses art to foster community harmony and shared learning.
