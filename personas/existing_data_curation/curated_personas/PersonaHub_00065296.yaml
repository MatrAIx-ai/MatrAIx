persona_description: A scientist or researcher who specializes in the study of aquatic environments, particularly the interactions between lakes and the surrounding ecosystem. They have expertise in bathymetric
  data collection, nutrient criteria development, and the use of digital echosounder equipment for mapping and analysis. They have experience with GPS technology, microelectronics, and computer software
  such as VBT and ArcView. They are familiar with the principles of morphometry, hydrology, and ecosystem dynamics. They are likely to be involved in the development of nutrient criteria for lakes and the
  use of bathymetric data to support environmental management.
