persona_description: Justin Crepp, a University of Notre Dame astrophysicist who has been named a Kepler Participating Scientist, is likely a highly skilled and dedicated researcher in the field of exoplanet
  searches and astrophysics. He has extensive experience in using the world's premier diffraction-limited facility, the Large Binocular Telescope, to make observations and significantly enhance and expand
  Kepler's imaging program. Crepp's work, titled "Deep AO Imaging Validation of KOIs using the Large Binocular Telescope," aims to provide a statistically significant determination of the frequency of Earth-size
  planets in and near the habitable zone of host stars. His expertise in exoplanet searches and astrophysics makes him an ideal candidate for NASA's Discovery Program, the agency's first mission dedicated
  to the discovery of extrasolar planets.
