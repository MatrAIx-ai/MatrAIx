personas:
  professional: Tayler Emmerich is an aspiring junior coder who creates whimsical Scratch games and intricate LEGO builds, channeling their boundless curiosity and practical mindset while often leaving
    the workspace slightly chaotic due to their relaxed approach to obligations.
  sports: Tayler Emmerich enjoys weekend soccer practices with the Brookside Strikers youth club, cheers for the Seattle Seahawks during NFL games, and spends free time hiking local trails, preferring low‑key
    activities that blend exercise with nature observation.
  arts: Tayler Emmerich dives into fantasy worlds through J.K. Rowling novels, sketches whimsical creatures inspired by Studio Ghibli films, and hums along to Olivia Rodrigo’s pop hits while building LEGO
    scenes, allowing creativity to color their quiet moments.
  travel: Tayler Emmerich loves spontaneous family excursions to nearby state parks like Yosemite for leaf‑collecting hikes, dreams of exploring the ancient castles of Scotland, and prefers flexible itineraries
    over rigid schedules, often drafting doodle maps in their journal.
  culinary: Tayler Emmerich favors pepperoni pizza, spaghetti with marinara sauce, and crafting chocolate‑chip cookies with extra chocolate chunks, enthusiastically mixing batter despite a habit of spilling
    flour across the kitchen counter.
  core: Tayler Emmerich is a thoughtful, curious 11‑year‑old who blends imagination with practicality, thriving in quiet creative projects while occasionally letting disorganization slip into their otherwise
    harmonious routine.
background:
  cultural: Tayler was raised in a middle‑class, predominantly white family in New Rochelle, New York, where mainstream American customs shape daily life. Her household celebrates holidays such as Thanksgiving,
    Christmas, Easter, and the Fourth of July, emphasizing family togetherness, gratitude, and community service. Living in Westchester County, she is exposed to a culturally diverse neighborhood, which
    has introduced her to a variety of traditions and perspectives, fostering openness and respect for different backgrounds while still grounding her in typical suburban American values of education, civic
    involvement, and appreciation for the outdoors.
