  career_goals: She envisions a future where her curiosity about how things work meets her desire to help others. Tayler aspires to study STEM subjects in depth, with a particular interest in environmental
    engineering, wildlife conservation, or biomedical science, where she can design practical solutions that protect nature or improve health. She hopes to continue developing her problem‑solving abilities
    and teamwork skills, ultimately contributing to projects that benefit her community and the planet.
