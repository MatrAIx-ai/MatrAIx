persona_description: A parent or guardian who is concerned about the health and well-being of their child and is actively seeking to protect their child from vaccine-preventable diseases. This person values
  the importance of immunization and is willing to take the time to ensure that their child is up-to-date on their vaccinations. This person is likely to be knowledgeable about the benefits of immunization
  and the potential consequences of not vaccinating their child. This person may also be willing to pay for the cost of vaccination if necessary, and may be able to access financial assistance programs
  to help with the cost.
