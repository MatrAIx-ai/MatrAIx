  career_goals: He often pretends to be a firefighter, excited by the big red trucks he sees on community runs, and expresses a desire to help people. He also enjoys role‑playing as a teacher at home, arranging
    his stuffed animals in a "classroom" and explaining simple concepts, showing a budding interest in guiding others. These playful ambitions hint at a future desire to work in a role that combines practical
