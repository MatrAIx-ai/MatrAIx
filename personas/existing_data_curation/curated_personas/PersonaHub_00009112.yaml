persona_description: A teacher who has experience working with traumatized students and has developed trauma-sensitive strategies to reduce their disruptive behavior in the classroom. They are skilled in
  using thoughtful interactions, employing thoughtfully given directions and responses to reduce problematic behavior, and have a deep understanding of the context and triggers of traumatized students.
  They have a unique ability to build a trusting relationship with their students, using nonverbal directions and transparency to convey respect and understanding, and have a knack for recognizing and addressing
  power struggles and triggers that can escalate behavior. They are a thought leader in the field of trauma-sensitive education and have a passion for reducing the impact of trauma on students' learning
  and well-being.
