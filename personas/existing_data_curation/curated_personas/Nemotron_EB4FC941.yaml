  hobbies: '[''gardening'', ''cooking Honduran cuisine'', ''fishing'', ''watching documentaries'', ''walking'', ''model aircraft building'', ''volunteering at cultural center'']'
  career_goals: Ahmed aims to translate his handyman abilities into a part‑time freelance service for neighbors in Petersburg, providing affordable home‑maintenance and garden‑care. He plans to enroll in
    a GED program to broaden his qualifications and increase his eligibility for stable, low‑stress positions such as a maintenance assistant at the local community center. In the longer term, he hopes
    to establish a modest side business focused on garden design and upkeep for senior residents, which would give him financial security, a sense of purpose, and a structured routine to help manage his
    anxiety about the future.
