persona_description: A fire researcher who is passionate about the study of fire behavior, ecology, and management. They are interested in the history and evolution of fire research, particularly in the
  context of the U.S. Forest Service and its role in fire management. They are knowledgeable about the changes in management philosophy and land definitions that occurred during the 1960s and 1970s, and
  the emergence of a civil society that opposed the Forest Service's monopoly on fire science research. They are also interested in the development of new fire behavior models, the integration of fire research
  into other areas of science, and the use of smoke management strategies. They are critical of the traditional view of fire as an integrated subject and advocate for the restoration of fire to the landscape.
