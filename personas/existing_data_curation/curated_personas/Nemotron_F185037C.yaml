  career_goals: Nicole aims to transition from senior purchasing agent to procurement manager within the next three years, ultimately pursuing a director‑level role overseeing the entire supply chain function.
    She plans to obtain the Certified Professional in Supply Management (CPSM) credential and lead a digital transformation initiative that integrates e‑procurement tools and sustainability metrics. Balancing
    her competitive drive with her sensitivity to stress, she also seeks to cultivate a high‑performing, collaborative team culture that delivers measurable cost savings while supporting employee well‑being.
