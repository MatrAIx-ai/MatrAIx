persona_description: A cosmologist who has studied the properties and characteristics of large and small civilizations, and has conducted extensive research on the probability of a civilization to survive
  and become large. This individual is well-versed in the Doomsday argument, which proposes that the odds for any given civilization to grow large are very low, and has observed that the majority of civilizations
  are small or die out quickly. The individual is interested in understanding the factors that contribute to the rarity of large civilizations, and is seeking to determine the probability of a civilization
  to survive long enough to become large.
