  career_goals: Charles aims to stay actively involved in Heath’s community by mentoring younger volunteers, preserving and sharing local history through oral storytelling sessions, and leading the organization
    of the annual Heath Summer Festival. He also hopes to author a memoir that captures his experiences in Muskingum County and plans a cross‑state road trip to visit historic national parks, using his
    free time to broaden his horizons while remaining rooted in his community.
