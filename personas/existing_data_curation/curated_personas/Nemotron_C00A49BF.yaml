  hobbies: '[''Gardening (vegetable and flower beds)'', ''Fishing on the St. Joseph River'', ''Woodworking projects'', ''Model train building'', ''Attending local historical society gatherings'', ''Playing
    bridge and other card games'', ''Volunteering at the senior center and community kitchen'', ''Family storytelling sessions'', ''Traveling to regional historic sites'', ''Reading mystery and adventure
    novels'', ''Listening to classic rock and big band music'']'
  career_goals: Although retired, Robert aims to keep his contributions to the Mishawaka community vibrant. He hopes to lead a senior‑center oral‑history project that records the recollections of longtime
    residents, mentor young volunteers in practical skills, and author a memoir that blends personal anecdotes with Midwestern history. Staying physically active through gardening and fishing, maintaining
    his social network, and traveling to nearby historic sites are also key ambitions, as is preserving his family's heritage for future generations.
