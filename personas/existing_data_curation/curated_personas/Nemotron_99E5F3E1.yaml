  career_goals: Javier aims to release a debut solo album that fuses traditional Dominican rhythms such as merengue and bachata with indie pop and electronic elements, showcasing his curiosity for genre‑blending.
    He plans to collaborate with both local New York artists and musicians from the Dominican Republic, building an international network. Within the next three years, he hopes to secure a publishing deal
    with an indie label, produce his own music for other emerging artists, and embark on a regional tour across the Northeast and Caribbean. Long‑term, he envisions establishing a community music studio
    in Glen Cove that offers affordable lessons and recording space for Dominican youth, while also pursuing a master's in music business to deepen his industry expertise.
