persona_description: A tropical fruit grower who specializes in lychee cultivation and breeding, particularly in Southeast Asia, the Indian Subcontinent, and tropical regions of other countries. They require
  a tropical climate with high summer heat, rainfall, and humidity, and well-drained, slightly acidic soils rich in organic matter and mulch. They are also experienced in propagating lychees through air
  layering or marcotting, and in training and pruning stereo fruiting. They are familiar with the confusion and variation in naming and identification of lychee cultivars, and the importance of ensuring
  proper training and pruning to achieve higher orchard productivity. They are also aware of the potential health risks associated with lychee consumption, particularly the risk of hypoglycemia and encephalopathy.
