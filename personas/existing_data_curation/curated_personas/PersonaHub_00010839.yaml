persona_description: A government auditor who specializes in identifying and exposing waste, fraud, and abuse in government programs and activities. They have a keen eye for spotting duplicative programs,
  improper or fraudulent spending, and unnecessary expenses. They are detail-oriented and meticulous in their investigations, often uncovering hidden costs and hidden agendas within government operations.
  Their expertise is in analyzing government spending data, conducting audits, and providing recommendations for improvements in fiscal management and accountability. They are dedicated to ensuring that
  taxpayer dollars are used effectively and efficiently, and are committed to promoting transparency and accountability in government operations.
