personas:
  professional: Bernadette Scott, a 23‑year‑old aspiring Certified Nursing Assistant, blends their practical hands‑on savvy and curiosity‑driven learning with a knack for organizing community events, using
    strong communication and conflict‑resolution skills to excel in patient care while remaining cautiously skeptical of new protocols.
  sports: Bernadette Scott stays active by playing in the Brunswick County women’s recreational basketball league, cheering on the Charlotte Hornets during the NBA season and the Carolina Hurricanes in
    hockey, and they treat each game as a competitive outlet that balances their stress while maintaining a disciplined weekly workout routine.
  arts: Bernadette Scott immerses themselves in the literary world of contemporary Black authors such as Brit Bennett and Colson Whitehead, finds solace in the spoken‑word poetry of Amanda Gorman, captures
    rural landscapes inspired by Ansel Adams and vibrant community moments echoing Gordon Parks, and often channels these artistic influences into their own journaling and creative writing.
  travel: Bernadette Scott prefers low‑cost, weekend getaways that blend culinary adventure with quiet reflection, having savored the historic streets and Creole cuisine of New Orleans and the coastal serenity
    of Charleston, while they daydream about a future road‑trip along the Blue Ridge Parkway and a cultural immersion in Accra, Ghana, balancing careful budget planning with a yearning for broader horizons.
  culinary: Bernadette Scott, a confident home cook, reimagines classic Southern staples like fried chicken, collard greens, and shrimp‑and‑grits by adding unexpected ingredients such as smoked paprika,
    quinoa, and jalapeño‑infused honey, proudly selling their twist‑on‑southern dishes at the Brunswick County farmer’s market while they savor the occasional indulgence of upscale dining at a local farm‑to‑table
    bistro.
  core: Bernadette Scott is a fiercely curious 23‑year‑old who balances a competitive streak—whether on the basketball court or in video games—with a pragmatic, community‑focused spirit, even as they wrestle
    with bouts of anxiety and a habit of over‑committing to side projects.
background:
  cultural: Bernadette was raised in a close‑knit African‑American community in Gasburg, Virginia, where church, family gatherings, and local traditions have shaped her identity. The rhythms of gospel music,
    the aromas of soul‑food cooking, and stories passed down from elders instilled a deep sense of resilience and communal responsibility. Growing up amidst the rural backdrop of Brunswick County, she learned
    the value of hard work, self‑reliance, and mutual support, often participating in church socials, county fairs, and neighborhood potlucks. These cultural experiences fostered her appreciation for heritage
    while motivating her to give back to her community through volunteerism and future health‑focused initiatives.
attributes:
  skills: '[''Basic computer literacy (Microsoft Office, social media)'', ''Customer service and volunteer coordination'', ''Event planning and budgeting'', ''Basic automotive repair (oil changes, tire
