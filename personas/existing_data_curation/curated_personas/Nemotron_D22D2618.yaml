  hobbies: '[''Reading contemporary Black literature'', ''Cooking soul food and experimenting with new recipes'', ''Photography of local landscapes'', ''Gardening vegetables and herbs'', ''Playing basketball
    at the community center'', ''Journaling and creative writing'', ''Listening to R&B, gospel, and hip‑hop music'', ''Volunteer work at the local food bank'', ''Exploring online DIY tutorials'', ''Playing
    competitive video games (e.g., Fortnite)'']'
  career_goals: Bernadette plans to enroll in the Certified Nursing Assistant (CNA) program at the nearby community college within the next six months, seeking a stable entry‑level healthcare position that
    leverages her caring nature and practical mindset. While completing her certification, she aims to launch a weekend pop‑up service offering homemade soul‑food meals at the Brunswick County farmer's
    market, using her culinary skills to generate supplemental income. Her long‑term ambition is to become a Licensed Practical Nurse, specialize in community health, and eventually manage a local health
    outreach program that provides preventive care and education to underserved families in her hometown of Gasburg.
