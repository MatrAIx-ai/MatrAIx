  career_goals: Matthew dreams of growing up to be someone who can combine his love for art with his desire to help others. He often says he wants to be a teacher who can draw and make lessons fun, an artist
    who creates pictures that bring joy, or a doctor who helps people feel better. He is especially drawn to roles where he can support friends, foster harmony, and use his imagination to solve problems.
