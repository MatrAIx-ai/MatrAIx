personas:
  professional: Matthew Reid, an aspiring junior visual storyteller, combines their love for sketching animals and constructing LEGO cityscapes with a naturally curious and compassionate mindset, often
    roping in friends for collaborative comic‑style projects and letting their relaxed, spontaneous planning style turn each creation into an unexpected burst of color and imagination.
  sports: Matthew Reid darts across the local soccer field for their neighborhood U‑9 team, idolizing the Houston Dynamo’s midfielders while also cheering loudly for the Houston Astros during baseball season,
    and they keep their energy up by sprinting on the beach dunes after practice, though they sometimes forget to hydrate.
  arts: Matthew Reid explores the world of creativity by drawing whimsical wildlife in the style of Dr. Seuss, painting watercolors inspired by Pixar’s ‘Finding Nemo’ seascapes, building intricate LEGO
    city scenes, and belting out choir songs ranging from Disney classics to contemporary pop hits; they often chat about their favorite artists like Maya Angelou and Lin‑Manuel Miranda during art class.
  travel: Matthew Reid loves family road trips that combine beach sandcastle building in Galveston with pit stops at the Children’s Museum, dreams of a future adventure to Disney World’s Magic Kingdom,
    and enjoys planning their own treasure‑map style itineraries that blend a splash of nature hikes with a pinch of amusement park thrills, though their boundless enthusiasm sometimes leads them to forget
    essential sunscreen.
  culinary: Matthew Reid’s palate swings between the smoky tang of Gulf shrimp tacos and the comforting simplicity of grilled cheese sandwiches, and they proudly help their mom whisk pancake batter while
    sprinkling in blueberries, yet they can’t resist a nightly treat of chocolate‑coated pretzels and frequently argue with their dad over the correct amount of hot sauce for their favorite fish‑po’boy.
  core: Matthew Reid is a compassionate, curious whirlwind who transforms scraps of LEGO, crayons, and sand into bold stories, but their emotional intensity and habit of leaving art supplies scattered often
    turn their vibrant world into a tidy‑up challenge.
background:
  cultural: Matthew was born and raised in Dickinson, a suburban community on the Texas Gulf Coast. His family reflects a middle‑class white American upbringing in the region, emphasizing friendliness,
    community involvement, and appreciation for the outdoors. He often spends weekends at local parks, beaches, and community events such as holiday fairs and library storytimes. The coastal environment
    has given him familiarity with Texas coastal culture—like beach outings, seafood meals, and awareness of wildlife such as sea turtles—while his school and neighborhood expose him to the diverse mix
    of cultures present in the Greater Houston area.
