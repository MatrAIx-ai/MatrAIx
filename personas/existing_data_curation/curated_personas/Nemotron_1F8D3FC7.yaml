  career_goals: Although retired from formal work, Nicholas aims to leave a lasting creative legacy. He hopes to compile his memoirs and a collection of poems reflecting his life in rural Alabama, to be
    published locally. He dreams of organizing a community art workshop for seniors, where his spontaneous teaching style encourages participants to experiment without pressure. He also aspires to exhibit
    his paintings at the Prattville Arts Council and to mentor younger artists through informal mentorship, while continuing his personal journey toward emotional wellbeing through mindfulness practices
    and supportive social connections.
