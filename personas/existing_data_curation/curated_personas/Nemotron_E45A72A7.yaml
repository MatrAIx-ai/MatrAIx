  hobbies: '[''Cooking traditional Mexican dishes'', ''Gardening chilies and herbs'', ''Baseball fandom'', ''Reading border history'', ''Listening to norteño music'', ''Volunteering teaching cooking to
    seniors'']'
  career_goals: Emilio aims to advance from a first‑line supervisor to a kitchen manager position within the next two years, overseeing multiple dining venues. He is also planning to enroll in a culinary
    certification program to refine modern cooking methods and eventually launch a small family‑style Mexican restaurant or food‑truck that highlights authentic regional recipes. Mentoring younger workers
    and establishing a reputation for operational excellence are central to his long‑term ambition.
