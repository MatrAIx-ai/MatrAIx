  hobbies: '[''LEGO building'', ''Puzzle solving'', ''Chess'', ''Robotics club'', ''Mystery reading'', ''Basketball'', ''Baseball card collecting'', ''Nature sketching'']'
  career_goals: Calvin dreams of turning his love for building and problem solving into a profession. He aspires to become a civil engineer so he can design bridges, roads, and community spaces that benefit
    Warfield and surrounding areas. He is also fascinated by computer programming and hopes to develop video games or educational apps that combine creativity with logic. His competitive nature fuels a
    secondary ambition to earn a college basketball scholarship, which he sees as a pathway to further education and teamwork experiences. Overall, Calvin envisions a future where his methodical mindset,
    technical skills, and disciplined work ethic lead to a career that blends engineering or software development with opportunities for leadership.
