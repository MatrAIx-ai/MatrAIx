personas:
  professional: Violeta Jaramillo, a 28‑year‑old journeyman painter in Queens, blends meticulous surface preparation and color‑matching expertise with bilingual client communication, and they channel their
    curiosity for emerging eco‑friendly paints into integrating design concepts while assertively leading small crews and juggling project schedules.
  sports: Violeta Jaramillo cycles regularly with the Queens Wheelers club, follows the New York Mets and New York Knicks, participates in community soccer matches on weekends, and balances high‑energy
    salsa dancing with yoga to maintain fitness without formal gym memberships.
  arts: Violeta Jaramillo immerses themselves in Queens’ street‑art scene, drawing inspiration from artists like Banksy and Jean‑Michel Basquiat, volunteers at a youth center teaching painting techniques,
    and curates playlists featuring Marc Antonio, Romeo Santos, and Celia Cruz, all of which shape their creative outlook.
  travel: Violeta Jaramillo favors weekend getaways to the Caribbean, especially Puerto Rico’s historic Old San Juan, plans trips around local art festivals like Mural Fest, balances spontaneous day trips
    in the Hudson Valley with budget‑conscious airline deals, and dreams of a future cultural exchange trip to Mexico City.
  culinary: Violeta Jaramillo loves preparing traditional Puerto Rican dishes such as mofongo, arroz con gandules, and pastelón, skillfully seasoning with sofrito, plantains, and long‑cured pork, and often
    experiments with low‑VOC paint‑scented dishes for fun, while happily hosting family feasts that showcase their home‑cooking flair.
  core: Violeta Jaramillo is a socially vibrant, curiosity‑driven painter who balances practical craftsmanship with eco‑friendly ambitions, mixes salsa rhythms with yoga, and strategically invests in both
    their health and future business.
background:
  cultural: Violeta was raised in a bilingual Puerto Rican household in Woodside, where Spanish and English flow interchangeably. Her family maintains strong ties to island traditions—celebrating Three
    Kings' Day, San Juan festivities, and the annual Noche de San Juan beach bonfires with relatives visiting from Puerto Rico. Religious observances are rooted in Catholic customs, but the household also
    emphasizes music, dance, and communal gatherings. Growing up amid a dense Puerto Rican diaspora in Queens, she participates in cultural clubs, enjoys the sounds of bomba and plena, and carries forward
    the community's values of resilience, hospitality, and collective support. These cultural influences shape her artistic sensibility, her preference for vibrant color palettes, and her commitment to
    giving back to the neighborhood that nurtured her.
