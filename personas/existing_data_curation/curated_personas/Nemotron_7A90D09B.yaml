  career_goals: Violeta aims to transition from a journeyman painter to the owner of a reputable painting and decorating company that serves residential and boutique commercial clients across Queens and
    Manhattan. She plans to earn her NYC Home Improvement Contractor license, obtain a GED, and attend a trade school to formalize her technical knowledge. Long‑term, she hopes to expand services to include
    custom murals, eco‑friendly low‑VOC paint applications, and modest interior‑design consulting. She also aspires to mentor aspiring tradespeople from the Puerto Rican community, eventually establishing
    a community training workshop that blends trade skills with bilingual education.
