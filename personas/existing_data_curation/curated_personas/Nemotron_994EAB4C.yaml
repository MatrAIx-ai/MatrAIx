  hobbies: '[''Community gardening'', ''Potluck cooking'', ''Local theater'', ''Walking clubs'', ''Photography classes'', ''DIY crafts'', ''Book‑exchange gatherings'', ''Volunteer work at senior center'',
    ''Food‑bank volunteering'']'
  career_goals: Although retired from formal employment, Jean aims to deepen her impact on the Fremont community by expanding senior‑friendship programs, mentoring younger volunteers, and initiating intergenerational
    workshops that blend practical skills with cultural exchange. She hopes to acquire a certification in senior wellness facilitation and to travel to nearby national parks, integrating her love of nature
    with community outreach.
