persona_description: A basket weaver who specializes in the Pomo basket weaving techniques, particularly the designs and decorations used by the Pomo people. He is a master of the four distinct variations
  on the basic twining process and has a deep understanding of the materials used by the Pomo people. He is knowledgeable about the Pomo people's use of redbud for twining work and dyed bullrush root for
  black in coiled work. He is also familiar with the Pomo people's use of four distinct materials and their ability to combine them in various ways to produce amazing designs.
