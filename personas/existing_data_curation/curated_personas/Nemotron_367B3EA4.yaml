  career_goals: June aims to step into a senior executive role—such as Director of Operations or Vice President of Strategy—where she can drive large‑scale digital transformation initiatives within a tech‑focused
    organization in the Seattle region. She is passionate about shaping an inclusive culture that supports women and underrepresented groups in STEM, and she plans to launch a mentorship program and eventually
    start a boutique consulting firm that helps companies integrate sustainable technology practices while maintaining operational efficiency.
