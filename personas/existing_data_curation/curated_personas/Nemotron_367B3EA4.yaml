personas:
  professional: June Persaud is a versatile tech manager who blends data‑driven insight with pragmatic project leadership, using agile methods, stakeholder storytelling, and cross‑functional mentoring to
    drive operational excellence while their natural talkativeness makes meetings lively, and their relaxed approach to deadlines keeps teams adaptable.
  sports: June Persaud is a weekend hiker in the Cascades, a member of the Seattle Hiking Club, an avid supporter of the Seattle Seahawks and Seattle Sounders FC, and in the summer they play ultimate frisbee
    with a local co‑ed league while also attending weekly climbing sessions at a community gym.
  arts: June Persaud enjoys the eclectic sounds of Fleet Foxes and Phoebe Bridgers at intimate Seattle venues, studies improv at Unexpected Productions, appreciates the street murals of Capitol Hill, and
    finds inspiration in spoken‑word performances by poet Amanda Gorman.
  travel: June Persaud prefers culturally immersive trips that balance adventure and comfort, having explored Kyoto’s temples, trekked Machu Picchu’s Inca Trail, and savored Tuscan vineyards, while their
    next dream destination is Patagonia’s glacial valleys, all planned with a flexible itinerary that allows spontaneous detours.
  culinary: June Persaud loves experimenting in the kitchen with seasonal Pacific Northwest produce, often cooking miso‑glazed salmon, mushroom risotto with truffle oil, and spicy Korean kimchi stew, pairing
    each with a carefully chosen Pinot Noir or Riesling, and they eagerly host dinner parties where recipes are shared and wine tasting becomes a lively discussion.
  core: June Persaud is a sociable, slightly disorganized yet highly effective tech leader who fuels their drive with hiking, live music, and a knack for turning data into pragmatic solutions, all while
    juggling spontaneous spending and a relentless curiosity.
background:
  cultural: June grew up in a middle‑class, predominantly Anglo‑American family in the Seattle area. Her upbringing was shaped by the Pacific Northwest’s emphasis on environmental stewardship, progressive
    values, and a strong sense of community. She earned her bachelor's degree in a STEM field from a local university, which reinforced her analytical mindset. While her ethnic background is identified
    as white, her marriage has introduced multicultural influences that enrich her appreciation for diverse traditions and perspectives.
