persona_description: A veterinarian who specializes in the diagnosis and treatment of fungal infections in cats and dogs, particularly ringworm. They are knowledgeable in the ultraviolet light test for
  diagnosing ringworm, the use of antifungal agents, and the prevention of the spread of the infection. They have experience in quarantine, thorough hand washing, and disinfecting surfaces to prevent the
  spread of ringworm. They are also knowledgeable about the treatment of ringworm in individuals with the condition, including children and other household members.
