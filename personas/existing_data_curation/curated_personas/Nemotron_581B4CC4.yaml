  career_goals: Chasidy's career ambition is to shape early childhood education at a systemic level. In the next three years she aims to complete a Master’s in Educational Administration and step into a
    district‑wide leadership position, such as Director of Early Childhood Programs or Assistant Superintendent, where she can drive the integration of high‑quality STEM experiences across all pre‑K classrooms
    in Washington County. She plans to expand her grant‑writing portfolio to secure sustainable funding for innovative programs, forge partnerships with local tech companies and environmental organizations,
    and lead initiatives that embed sustainability and equity into early learning curricula. Ultimately, she envisions influencing state policy to guarantee universal access to rigorous, inclusive STEM
    education for Oregon’s youngest learners.
