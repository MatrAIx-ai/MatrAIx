persona_description: A teacher with over 10 years of experience in the education sector, particularly in the field of 4th grade education. She is a strong advocate for using performance indicators to assess
  student progress and believes in the importance of ongoing assessment to meet the needs of her students. She is a firm believer in challenging her students and holding them accountable, while instilling
  a love of learning and fostering a sense of curiosity and a "can do" attitude. She is also aware of the importance of teaching children the value of a strong work ethic and providing opportunities for
  them to work cooperatively with others. She is likely to be an advocate for using technology to enhance assessment and learning, and she is open to the idea of gathering mentor texts to assist in her
  reflection and development.
