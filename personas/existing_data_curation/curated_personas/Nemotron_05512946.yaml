personas:
  professional: Isaac Keeton, a 21‑year‑old high‑school STEM teacher, blends Python, Arduino prototyping, and digital illustration to craft STEAM lessons that feel like a spontaneous jam session, leveraging
    a relaxed planning style and a cooperative yet assertive classroom presence.
  sports: Isaac Keeton enjoys weekend hikes along the Natchez Trace, swears by early‑morning jogs with the Murfreesboro Running Club, and pumps up on Saturdays watching the Tennessee Volunteers football
    and the Nashville Predators hockey, while reluctantly joining pick‑up basketball games that end early because of a habit of losing track of time.
  arts: Isaac Keeton spends evenings sketching murals inspired by the Murfreesboro Art Walk, strums acoustic renditions of songs by Jason Isbell and Kamasi Washington at local open‑mic nights, and binge‑watches
    indie films starring Frances McDormand, letting the creative buzz bleed into his lesson plans.
  travel: Isaac Keeton favors low‑cost road trips that blend scenic drives through the Great Smoky Mountains with spontaneous stops at folk festivals in Asheville, dreams of a week‑long music pilgrimage
    to New Orleans’ French Quarter, but usually plans trips last‑minute using a shared‑ride app because his student schedule and modest budget keep his wanderlust in check.
  culinary: Isaac Keeton, a moderate home cook, can whip up a mean batch of Nashville hot chicken and tangy pimento cheese on a Saturday night, loves experimenting with homemade sourdough starter, but often
    resorts to instant ramen after late‑night coding sessions, and always adds fresh basil from the farmers market to his pasta sauces.
  core: Isaac Keeton is a curious, laid‑back 21‑year‑old teacher who mixes code, guitars, and hiking into a flexible, arts‑infused approach to life, occasionally forgetting appointments but always bouncing
    back with a smile.
background:
  cultural: Isaac grew up in Rutherford County, a blend of rural Southern roots and the collegiate atmosphere of Murfreesboro, Tennessee. His upbringing emphasized community involvement, hospitality, and
    a strong value placed on education, reflecting the region’s modest, down‑to‑earth ethos. While his family’s cultural traditions align with mainstream Anglo‑American practices, exposure to local festivals—such
    as the Main Street Jazz Fest and the annual Murfreesboro Art Walk—has nurtured his appreciation for diverse artistic expressions. This mix of Southern community values, a college-town openness to new
    ideas, and a personal drive for interdisciplinary learning shapes his worldview and professional outlook.
