  career_goals: Isaac aims to earn a master’s degree in STEM education within the next three years, positioning himself for a role as an instructional coach or curriculum specialist in his district. He
    envisions leading the development of STEAM initiatives that bridge scientific inquiry with artistic expression, and eventually establishing a community makerspace tied to local schools. Over the long
    term, Isaac aspires to contribute research on inquiry‑based STEM pedagogy to educational journals and to mentor new teachers, leveraging his cooperative yet assertive nature to advocate for innovative,
    flexible teaching practices across Tennessee’s public schools.
