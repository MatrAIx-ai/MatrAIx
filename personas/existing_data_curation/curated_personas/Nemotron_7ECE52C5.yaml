personas:
  professional: Jeanne Parusa, a seasoned community storyteller and volunteer guide at the local senior center, leverages their meticulous budgeting, event organization, and mediation skills to curate intergenerational
    narratives that preserve their family legacies while fostering harmony among participants, and they also mentor younger volunteers in the art of storytelling.
  sports: Jeanne Parusa, a faithful supporter of the Chicago Cubs and the St. Louis Cardinals, enjoys attending their games occasionally when family visits, participates in a weekly senior walking club
    at the nearby park to sustain mobility, and finds mental stamina in bridge - a mind sport that sharpens strategy as much as any physical activity, while they relish the camaraderie of the bridge table.
  arts: Jeanne Parusa, an avid listener of big-band legends like Glenn Miller, Duke Ellington, and Ella Fitzgerald on a vintage radio, cherishes historic novels by Hilary Mantel, and fills afternoons crocheting
    while humming swing standards, letting the music shape their creative rhythm and providing a nostalgic soundtrack to their leisure, and they feel a deep connection to the era's optimism.
  travel: Jeanne Parusa, whose travel catalog consists of carefully planned family road trips to Chicago's Art Institute, a scenic cruise down the Mississippi River with grandchildren, and a cherished pilgrimage
    to the historic Willow Creek homestead, prefers short, accompanied journeys that balance adventure with safety and the comfort of familiar companions, and they always pack a notebook to record observations
    and sketches.
  culinary: Jeanne Parusa, an accomplished home baker, lovingly prepares classic Midwestern fare such as chicken pot pie, apple crisp, and noodle casserole, mixes fresh garden herbs like basil and thyme
    into sauces, and bakes buttery shortbread cookies with a hidden dash of cinnamon, savoring each bite as a tribute to their family traditions, and they often share the treats with neighbors and grandchildren.
  core: Jeanne Parusa, a 98-year-old storyteller, crafter, and community anchor, blends meticulous order with nostalgic charm, preserving their family's legacy while delighting in swing music, bridge, and
    lovingly baked pies, and they are known for humming a favorite big-band tune while knitting.
background:
  cultural: Jeanne is a White American who grew up in the Upper Midwest, specifically Minnesota, where community, modesty, and self‑reliance are deeply valued. Her upbringing reflects the region’s blend
    of Scandinavian and German immigrant heritage, evident in her appreciation for hearty home‑cooked meals, seasonal gardening, and participation in church and neighborhood events. The Midwestern cultural
    emphasis on politeness, neighborliness, and voluntary service has shaped her cooperative and considerate nature.
