  career_goals: Even at 98, Jeanne’s primary ambitions focus on preserving her family’s legacy and staying engaged in her community. She plans to compile a memoir that includes her life stories, cherished
    recipes, and photographs for her grandchildren, continue attending weekly church services and bridge games to maintain social ties, volunteer as a storytelling guide at the local senior center and for
    schoolchildren, keep taking short walks in nearby parks to sustain her health, and ensure her home is well‑organized for the benefit of her heirs.
