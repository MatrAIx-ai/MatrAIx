personas:
  professional: John Patton is a seasoned construction supervisor who applies his methodical, routine‑driven approach and STEM‑honed analytical skills to coordinate multi‑trade crews, meticulously manage
    budgets and schedules, and mentor apprentices as they work toward a senior project manager certification.
  sports: John Patton is a devoted fan of the New Orleans Saints and the LSU Tigers football teams, enjoys hunting waterfowl with the local Bayou club, spends weekends fishing the Bayou Teche, and occasionally
    joins a community softball league, all while they proudly wear a Saints jersey to work on Fridays.
  arts: John Patton frequents local zydeco and Cajun music gatherings, regularly attends the Festival International de Louisiane to hear artists like BeauSoleil and Clifton Chenier, and collects vintage
    vinyl records that echo the bayou's rhythm, often they share their curated playlists with friends during weekend barbecues.
  travel: John Patton prefers planned road trips on his Harley‑Davidson, often heading to the Gulf Coast's white‑sand beaches or the historic streets of New Orleans for weekend culinary festivals, while
    saving for a future family fishing expedition to the Florida Keys that they hope will become an annual tradition.
  culinary: John Patton is an avid cook of Cajun and Creole classics, regularly preparing gumbo with andouille sausage, crawfish étouffée, and jambalaya seasoned with file powder, and enjoys experimenting
    with locally sourced wild rice and shrimp at family dinner nights, where they insist on a proper roux before any other ingredient.
  core: John Patton balances meticulous construction management with rugged outdoor pursuits, swapping exacting project schedules for spontaneous Harley rides, yet consistently succumbs to late‑night gumbo
    cravings that they claim are the best reward after a hard day's work.
background:
  cultural: John Paul grew up in a traditional Southern white family in Vermilion Parish, where Catholic faith and Cajun cultural roots are prevalent. The community’s emphasis on hard work, self‑reliance,
    and hospitality shaped his values of reliability and practicality. He speaks the local dialect that blends English with occasional Cajun French expressions, and he participates in regional customs such
    as Mardi Gras celebrations, church gatherings, and community service through the volunteer fire department. His upbringing fostered a strong sense of family cohesion, respect for local traditions, and
    pride in the Gulf Coast’s unique culinary and musical heritage.
attributes:
  skills: '[''Project scheduling'', ''Crew supervision'', ''Blueprint interpretation'', ''Cost estimating'', ''Construction safety compliance'', ''Quality control'', ''Heavy equipment operation'', ''Regulatory
