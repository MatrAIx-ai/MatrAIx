  hobbies: '[''Fishing'', ''Waterfowl hunting'', ''Woodworking'', ''Cajun cooking'', ''Attending local festivals and music events'', ''Motorcycle riding'', ''Gardening'', ''DIY home renovation'', ''Family
    outings'']'
  career_goals: John Paul aims to move from on‑site supervision to a senior project manager role overseeing larger commercial and infrastructure projects across the Gulf Coast. He plans to obtain advanced
    certifications such as the Project Management Professional (PMP) and the OSHA 30‑hour trainer designation, and to deepen his knowledge of Building Information Modeling (BIM) to enhance coordination
    and efficiency. In the long term, he aspires to launch his own construction firm that emphasizes safety, reliability, and community‑focused projects, while serving as a mentor for the next generation
    of tradespeople. Maintaining a stable family life and contributing to local community initiatives remain central to his professional ambitions.
