personas:
  professional: Abel Diaz is an emerging graphic design student whose bilingual fluency, meticulous project planning, and love for Latin American art drive them to craft exhibition graphics that bridge
    community stories with museum audiences.
  sports: Abel Diaz is a casual basketball enthusiast who joins a local pick‑up league after school, follows the Miami Heat and the Miami Marlins, and maintains a disciplined yet low‑key fitness routine
    centered on weekend 5 k runs with the Miami Runners Club.
  arts: Abel Diaz immerses themselves in the vibrant Miami art scene, frequenting the Pérez Art Museum Miami and local galleries to study works by artists like Carlos Garaicoa and Marina Abramović, while
    their soundtrack consists of indie Latin bands such as Bomba Estéreo and the folk melodies of Jorge Drexler, shaping a visual aesthetic that blends street mural energy with contemplative narratives.
  travel: Abel Diaz prefers meticulously planned short‑haul trips that blend cultural immersion and artistic discovery, having explored New Orleans’ music districts, Mexico City’s mural‑laden neighborhoods,
    and dreaming of a future wander through Cartagena’s colonial streets, all while balancing a modest student budget and occasional family obligations.
  culinary: Abel Diaz enjoys a home‑cooking style that ranges from confidently whipping up traditional baleadas with refried beans, cheese, and crema to experimenting with fusion dishes like kale‑infused
    quinoa‑filled tacos, favoring fresh cilantro, ripe plantains, and smoky chipotle as go‑to ingredients.
  core: Abel Diaz is a methodical, art‑obsessed introvert who meticulously budgets every cent, sketches downtown while humming indie Latin tunes, journals nightly, and occasionally pulls all‑nighters perfecting
    mural concepts at the expense of sleep.
background:
  cultural: Abel was born and raised in Miami to Honduran immigrant parents who settled in the Little Honduras enclave of the city. Spanish is spoken at home, and he is fluent in English, giving him a bicultural
    perspective. Family traditions such as celebrating Feria Juniana, Día de los Muertos, and preparing dishes like baleadas are woven into his upbringing. Annual visits to Honduras during holidays expose
    him to punta and garífuna music, traditional dances, and community celebrations, reinforcing his connection to his roots. Living in Miami’s multicultural environment, he also engages with a broader
    Latin American diaspora and American culture, shaping a hybrid identity that values both his Honduran heritage and his American experiences. This background informs his respect for community cohesion,
    family honor, and his desire to bridge cultural gaps through art and service.
attributes:
  skills: '[''Bilingual Communication (Spanish/English)'', ''Graphic Design (Photoshop, Canva)'', ''Photography and Photo Editing (Lightroom)'', ''Research & Information Synthesis'', ''Project Planning
    and Time Management'', ''Creative Writing and Translation'', ''Cultural Liaison & Community Coordination'', ''Empathetic Collaboration and Conflict Resolution'']'
  hobbies: '[''Sketching and Drawing'', ''Visiting Museums and Galleries'', ''Urban Photography'', ''Listening to Indie & World Music'', ''Reading Contemporary Fiction, Graphic Novels, and Art Theory'',
    ''Cooking Traditional Honduran Cuisine'', ''Volunteering at Community Cultural Festivals'', ''Journaling and Meditation'']'
  career_goals: After completing high school, Abel plans to enroll at Miami Dade College to pursue an associate degree in Graphic Design with a minor in Hispanic Studies. He aims to transfer to a four‑year
    university to earn a BA in Visual Arts, focusing on Latin American art history. Long‑term, Abel aspires to work as a curator or exhibition coordinator for a museum or cultural institution that highlights
    Central American artists, especially Honduran voices. Parallel to this, he hopes to use his bilingual and artistic abilities to serve as a digital media strategist for nonprofit organizations that support
    immigrant communities, blending his love of art, organization, and community service.
