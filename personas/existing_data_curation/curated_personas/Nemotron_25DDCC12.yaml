  career_goals: Denise aims to transition into a part‑time consulting role where she can provide pro‑bono promotional support to local non‑profits and arts organizations in the Middlesex area. She is passionate
    about mentoring emerging marketers, especially women and seniors, and hopes to author a concise guide on community‑focused advertising. Long‑term, she envisions curating a senior art exhibition that
    showcases local talent and raises awareness of the benefits of creative expression for aging adults.
