  hobbies: '[''abstract painting'', ''mixed media art'', ''hiking (Rock Creek Park)'', ''reading (art history, philosophy, South Asian folklore)'', ''cooking (fusion Indian cuisine)'', ''yoga and meditation'',
    ''journaling'', ''volunteering at cultural festivals'', ''teaching art workshops for children'']'
  career_goals: Usha aims to transition from a contractor-focused role to a hybrid practice that merges her paperhanging trade with her personal fine-art pursuits. Over the next five years she plans to
    secure a small studio space in Montgomery County where she can produce and exhibit abstract paintings inspired by South Asian motifs and contemporary American urban landscapes. She also hopes to obtain
    a professional certification in decorative finishes to enhance her credibility and increase her earning potential. Long-term, Usha dreams of establishing a community-oriented workshop that offers hands-on
    mural projects for local schools and cultural centers, while providing mentorship to other women interested in trades and visual arts. Balancing financial stability with artistic freedom, she envisions
    her business operating on a flexible schedule that allows time for personal creative exploration and family commitments.
