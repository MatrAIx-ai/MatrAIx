    "Stress Management Techniques"]'
  hobbies: '["Gardening", "Knitting", "Reading Classic Literature", "Yoga", "Journaling", "Hiking", "Small-Group Book Club", "Volunteer Work at Animal Shelter", "Therapeutic Art Workshops", "Baking"]'
  career_goals: Angela aspires to advance into a supervisory position within the community services department of Norfolk County, where she can mentor junior social workers and shape program policy. She
    plans to complete a Master of Social Work (MSW) with a focus on clinical practice, obtain certification in trauma‑informed care, and spearhead a regional initiative that integrates arts‑based therapeutic
    programs into standard mental‑health services. Long‑term, she envisions leading a nonprofit dedicated to supporting at‑risk families in the Greater Boston area, while maintaining a sustainable work‑life
    balance for herself and her husband.
