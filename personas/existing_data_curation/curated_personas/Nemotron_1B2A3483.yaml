personas:
  professional: Angela Miller, a dedicated social worker in Norfolk County, blends rigorous case management, trauma-informed crisis intervention, and narrative-arts facilitation with a structured, detail-oriented
    approach that reflects their love for predictability and compassionate assertiveness.
  sports: Angela Miller channels a love of the outdoors into weekly hikes with the Blue Hills Trail Club, participates in a community adult yoga class for flexibility, avidly supports the Boston Red Sox
    and Boston Celtics, and periodically joins the Massachusetts Running Club’s 5 K series to maintain aerobic health.
  arts: Angela Miller finds creative renewal knitting intricate Kaffe Fassett patterns while facilitating narrative-therapy circles inspired by Emily Dickinson’s poetry, regularly attends the Museum of
    Fine Arts Boston’s American Art exhibitions, and fills quiet evenings with folk legends like Joni Mitchell and contemporary indie folk band Iron & Wine.
  travel: Angela Miller prefers meticulously planned weekend getaways that balance scenic serenity with cultural immersion, frequently retreats to the autumnal hills of the White Mountains, keeps a bucket-list
    spot for Edinburgh’s historic cobblestones, and occasionally squeezes longer trips to Asheville, North Carolina for its thriving arts scene when budget permits.
  culinary: Angela Miller enjoys farm-to-table cooking, skillfully preparing roasted beet and carrot salads seasoned with fresh thyme, hearty New England clam chowder, and a weekly garden stew featuring
    home-grown kale, tomatoes, and heirloom beans, while indulging in artisanal cheese plates at local farm markets for special occasions.
  core: Angela Miller is a methodical caretaker who balances a relentless drive for community betterment with a hidden penchant for late-night binge-watching true-crime documentaries and a tendency to over-schedule
    every spare hour.
background:
  cultural: Angela was raised in a middle‑class, Anglo‑American family in the Boston suburbs, where the traditions of New England's self‑reliance, community involvement, and respect for education shaped
    her worldview. Her family attended a Protestant church and celebrated seasonal holidays with an emphasis on togetherness and charitable giving. Growing up near Stoughton, she developed an affinity for
    the region’s literary heritage—particularly the works of Emily Dickinson and Henry David Thoreau—and for the modest, close‑knit community life that values public service. This cultural foundation informs
    her compassionate yet pragmatic approach to social work and her commitment to improving the well‑being of her neighbors.
attributes:
  skills: '["Case Management", "Client Assessment", "Individualized Service Planning", "Crisis Intervention", "Trauma-Informed Care", "Therapeutic Art Facilitation", "Narrative Therapy", "Report Writing",
