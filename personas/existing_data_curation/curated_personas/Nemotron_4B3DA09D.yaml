personas:
  professional: Aron Thomas, a 19‑year‑old aspiring supply‑chain coordinator, leverages his Excel expertise, Python automation skills, and innate love for logistics to efficiently organize volunteer events
    and prepare for a business administration program focused on nonprofit project management.
  sports: Aron Thomas regularly joins pickup basketball games at Sloan's Lake while rooting for the Denver Nuggets, cycles with the Denver Trail Riders club, and hikes the nearby foothills on weekends,
    treating fitness as both a social ritual and a personal meditation.
  arts: Aron Thomas produces hip‑hop beats in Ableton Live, drawing inspiration from Kendrick Lamar and J. Cole, while relaxing to the sounds of local Denver rapper Code Red and building intricate LEGO
    models that echo the detailed set design of Wes Anderson's films.
  travel: Aron Thomas prefers carefully planned weekend escapades—bike rides to Rocky Mountain National Park, cheap flights to Austin for its live‑music scene, and day trips to Santa Fe—while dreaming of
    a future backpacking trek through Kyoto and Osaka to explore Japan’s music production culture.
  culinary: Aron Thomas enjoys whipping up quick quinoa‑black‑bean bowls seasoned with cumin, lime, and fresh cilantro, occasionally mastering chicken enchiladas topped with salsa verde, and treats himself
    on Friday nights to Denver’s iconic green‑chili pork burritos from Sam’s No. 3.
  core: Aron Thomas is a meticulous 19‑year‑old who balances spreadsheet‑driven organization, community service, outdoor adventure, and beat‑making, even if late‑night LEGO builds sometimes erode his sleep
    schedule.
background:
  cultural: Aron is a Black American raised in Denver’s diverse Adams County community, with family roots that trace back to the Southern United States. He grew up immersed in the rich traditions of African‑American
    culture, attending church regularly where he learned the importance of community service and collective uplift. Family gatherings often feature soulful music, food traditions like collard greens and
    cornbread, and storytelling that reinforce a strong sense of identity. Aron participates in local cultural events such as Juneteenth celebrations and black history month programs, which deepen his connection
    to his heritage while also shaping his commitment to social equity. His upbringing instilled in him values of resilience, cooperation, and a desire to give back to the community that has supported him.
attributes:
  skills: '[''Time management'', ''Microsoft Office (Word, Excel, PowerPoint)'', ''Basic Python programming'', ''Car maintenance basics'', ''Community event planning'', ''Team collaboration'', ''Budgeting
