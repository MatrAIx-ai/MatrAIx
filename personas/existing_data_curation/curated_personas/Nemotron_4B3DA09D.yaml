  hobbies: '[''Basketball (pickup games)'', ''Music production (hip‑hop beats)'', ''Hiking and mountain biking'', ''LEGO model building'', ''Strategy video games'', ''Volunteering at community food bank'',
    ''Organizing Juneteenth events'']'
  career_goals: Aron aims to enroll in a community college program in business administration with a focus on supply chain management or logistics, leveraging his organizational strengths. He aspires to
    become a project coordinator for a regional nonprofit that serves under‑represented youth, eventually moving into a managerial role where he can design and oversee community outreach initiatives. In
    the long term, he envisions starting his own small business—potentially a mobile automotive repair service—that combines his practical skills with his desire to provide reliable services to his neighborhood.
