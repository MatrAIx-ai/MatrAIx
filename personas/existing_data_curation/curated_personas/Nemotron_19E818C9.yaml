personas:
  professional: Amethyst Forges, a veteran accounting and auditing professional with over 25 years of experience, they specialize in financial reporting, tax preparation, internal controls, and risk assessment
    for Gulf Coast SMEs, leveraging advanced Excel macros and SAP Business One while mentoring junior staff and balancing curiosity for new fintech tools with pragmatic, process‑driven solutions.
  sports: Amethyst Forges is a devoted fan of the New Orleans Saints and the Pelicans, they attend Sunday football tailgates, cheer loudly at home games, participate in a local walking club that meets at
    the riverfront, and enjoy casual tennis at the community center during the cooler months.
  arts: Amethyst Forges brings their love of performance to the gospel choir at their church, they sing alongside classics like Mahalia Jackson and modern voices such as Kirk Franklin, dance Zydeco to the
    rhythms of Clifton Chenier at festivals, and discuss literary works by Toni Morrison, James Baldwin, and Zora Neale Hurston at the book club.
  travel: Amethyst Forges enjoys road‑tripping along the Gulf Coast, they have explored the historic French Quarter, taken a weekend getaway to Biloxi, plan a culinary pilgrimage to New Orleans’ Café du
    Monde, and dream of visiting the Bayous of Louisiana and the vibrant markets of Marrakech for spice inspiration.
  culinary: Amethyst Forges is an accomplished home chef who cultivates okra, collard greens, and herbs, they perfect dishes such as shrimp étouffée, red beans and rice with Andouille sausage, collard greens
    seasoned with smoked turkey, and sweet‑potato pie, and they relish the aroma of thyme, bay leaves, and cayenne pepper in every pot.
  core: Amethyst Forges blends seasoned accounting expertise with a thriving garden, soulful choir voice, and community‑first mindset, balancing meticulous financial habits with a love for Creole cooking,
    spirited sports fandom, and a habit of turning every Sunday into a potluck celebration.
background:
  cultural: Amethyst grew up in a close‑knit African‑American family in the Greater New Orleans area, immersed in the region’s rich cultural traditions of church, music, food, and storytelling. She attended
    a historically Black high school where a business program sparked her interest in accounting. The values of resilience, communal support, and pride in heritage shape her worldview, and she remains active
    in local cultural organizations, celebrating Mardi Gras, Juneteenth, and other community events. She incorporates the spirit of community stewardship into both her professional practice and personal
    life.
