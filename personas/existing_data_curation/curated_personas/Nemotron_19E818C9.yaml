  career_goals: Amethyst aims to earn her CPA license within the next two years and move into a senior audit manager role where she can lead larger engagements and mentor a diverse team of accountants.
    Long‑term, she envisions becoming a chief financial officer for a community‑focused nonprofit or a mid‑size company in the New Orleans metro area, using her financial expertise to drive economic development
    in the Black community. She also plans to launch a series of financial‑literacy workshops at local churches and for small‑business owners, blending her professional skills with community service.
