  career_goals: She intends to earn a high‑school equivalency credential and later enroll in a bachelor's program in Computer Science or Interaction Design. Long‑term, Alexandria aspires to become a front‑end
    developer or user experience designer at a Seattle‑area tech firm, with the ultimate ambition of founding her own indie game development studio. She seeks roles that blend creativity with analytical
    rigor, and aims to build a portfolio of personal projects that showcase both technical expertise and aesthetic sensibility.
