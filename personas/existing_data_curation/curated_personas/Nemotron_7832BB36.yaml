  hobbies: '[''Reading contemporary fiction and educational psychology'', ''Hiking and nature walks in the Blue Hills Reservation'', ''Yoga and mindfulness practice'', ''Gardening (vegetable and herb garden)'',
    ''Baking traditional Irish soda bread and seasonal pastries'', ''Playing acoustic guitar and singing folk songs'', ''Knitting scarves and blankets for school donations'', ''Volunteering for library
    storytime programs'', ''Board game evenings with friends'', ''Exploring local history through museum visits'']'
  career_goals: Brighid aims to deepen her impact on school‑wide instructional practice by first becoming a grade‑level lead teacher, then pursuing a master's degree in educational leadership within the
    next three years. She hopes to earn certification as a reading specialist and later transition into a curriculum coordinator role for the Norfolk County district, where she can design interdisciplinary
    units that connect local history, science, and literacy. Long‑term, she envisions stepping into an instructional‑coach or principal position, championing a school culture that balances innovative pedagogy
    with the well‑being of students, staff, and the wider Walpole community.
