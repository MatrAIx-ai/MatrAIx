personas:
  professional: An evidence‑based educator, Brighid Waters, leverages differentiated lesson planning, interactive technology, and calm classroom routines while mentoring novice teachers and collaborating
    with special‑education staff to build inclusive learning environments.
  sports: Brighid Waters enjoys weekend hikes on the Blue Hills, participates in a local running club that meets for 5K runs, and cheers on the Boston Red Sox and Celtics while occasionally joining a recreational
    ultimate frisbee team.
  arts: Brighid Waters finds artistic balance in reading contemporary fiction by authors like Sally Rooney, strumming acoustic guitar to folk tunes reminiscent of The Chieftains, and knitting scarves for
    school families, often listening to singer‑songwriter John Prine while crafting.
  travel: Brighid Waters prefers careful, checklist‑driven itineraries that blend outdoor adventure with cultural immersion, having trekked the White Mountains, explored historic Boston neighborhoods, and
    visited the seaside town of Dún Laoghaire in Ireland, while dreaming of a future backpacking trip through the Scottish Highlands.
  culinary: Brighid Waters delights in baking rustic Irish soda bread and seasonal cinnamon‑apple scones, seasoning garden‑grown rosemary and thyme into roasted chicken, and experimenting with Mediterranean
    lentil soups, often pairing meals with locally sourced honey and a splash of craft cider.
  core: Brighid Waters blends a teacher’s analytical mind with a gardener’s patience, infusing every lesson, recipe, and song with a quiet curiosity, a habit of over‑preparing, and a love of community‑focused
    creativity.
background:
  cultural: Brighid is a second‑generation Irish‑American who grew up in a suburban New England family that prized education, community service, and cultural heritage. Raised in the Boston‑area suburbs,
    she celebrated Irish traditions such as St. Patrick’s Day and attended a Catholic parish where communal events emphasized cooperation and respect. The New England ethos of civic participation and a
    strong public‑school culture shaped her love for local history and reinforced her commitment to inclusive, evidence‑based education. Her family’s involvement in school volunteer programs and town‑meeting
    activities fostered a collaborative mindset that carries into her teaching style.
