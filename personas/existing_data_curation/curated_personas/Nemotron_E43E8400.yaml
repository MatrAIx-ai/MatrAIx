personas:
  professional: Rodney Solmes, a seasoned construction manager with three decades of high‑desert project oversight, leverages meticulous planning in MS Project, rigorous OSHA compliance, and an arts‑infused
    design sensibility to deliver sustainable builds on time and under budget, while their competitive edge fuels relentless pursuit of efficiency.
  sports: Rodney Solmes enjoys low‑impact endurance activities, logging weekend hikes with the Casper Outdoor Club and cross‑country ski sessions at Jackson Hole, while cheering on the University of Wyoming
    Cowboys basketball team and the Denver Broncos, and they keep a modest membership at a local gym for strength training.
  arts: Rodney Solmes, a volunteer curator at the Casper Art Museum, immerses themselves in the work of Ansel Adams, Georgia O’Keeffe, and contemporary light artist James Turrell, often sketching watercolor
    scenes inspired by these influences after museum openings, and they indulge in listening to classical piano recitals by Lang Lang during quiet evenings.
  travel: Rodney Solmes favors purposeful travel that blends artistic pilgrimage with wilderness, planning trips to Florentine galleries and the Musée d'Orsay after meticulously mapping routes, while their
    favorite escapes include Wyoming’s Yellowstone and Grand Teton for sunrise photography and a yearly trek to the Scottish Highlands for its moorland vistas.
  culinary: Rodney Solmes prefers rugged yet refined fare, often preparing wild elk stew with sage and juniper berries, marinating trout in citrus and dill, and they take pride in perfecting a smoked bison
    brisket, though they occasionally over‑season dishes in pursuit of bold flavor.
  core: Rodney Solmes is a methodical, imagination‑driven construction veteran who balances competitive efficiency with solitary artistic pursuits, meticulous finances, and a disciplined yet occasionally
    indulgent lifestyle.
background:
  cultural: Rodney grew up in a modest farming community on the plains of eastern Nebraska before relocating to Casper for work. His family valued self‑reliance, hard work, and a respect for the natural
    world, traits that align with the broader Wyoming frontier ethos. Although his ancestry is primarily Anglo‑American, his liberal arts education exposed him to diverse cultural narratives, shaping a
    worldview that balances traditional rural values with an appreciation for artistic expression. In Casper, he contributes to a close‑knit network of construction professionals, outdoor enthusiasts, and
    local art patrons, embodying a hybrid cultural identity that bridges Midwestern pragmatism and the creative curiosity fostered by his academic training.
