  career_goals: Rodney aims to transition into a regional director role within the next five years, overseeing a portfolio of large‑scale infrastructure and mixed‑use developments across the Intermountain
    West. He is also exploring the possibility of launching his own boutique consulting firm that specializes in integrating artistic design and sustainable practices into commercial construction. In the
    long term, he hopes to mentor the next generation of construction managers, perhaps through a guest‑lecturing position at the University of Wyoming's College of Engineering.
