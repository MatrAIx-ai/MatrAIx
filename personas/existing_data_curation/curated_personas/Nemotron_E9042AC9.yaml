  career_goals: David aims to obtain his teaching certification and pursue a master's degree in education within the next three years, positioning himself for a full‑time classroom teacher role. He aspires
    to become an instructional coach or curriculum specialist at the district level, where he can spearhead data‑informed instructional initiatives and lead professional development workshops. Additionally,
    he seeks to refine his organizational habits and leverage his competitive drive to achieve measurable improvements in student outcomes.
