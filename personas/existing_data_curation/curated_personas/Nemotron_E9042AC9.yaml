personas:
  professional: David Daya blends a methodical lesson‑planning approach with a competitive drive for data‑backed outcomes, leveraging interactive whiteboards and analytics dashboards to tailor instruction
    while flexibly adjusting on the fly to keep classroom energy high; they thrive on turning student data into a scoreboard for improvement.
  sports: David Daya throws themselves into weekly intramural soccer matches with the Berkshire Hills United club, roots for the Boston Red Sox and Boston Celtics, and they hit the trails for sunrise hikes
    that double as photo‑ops, balancing a competitive edge on the field with a laid‑back vibe off it.
  arts: David Daya engages the local arts scene by starring in community‑theater productions with the Berkshire Players, attending live shows by indie bands like Phoebe Bridgers and The National at Boston’s
    House of Blues, and they snap candid shots of performances, which fuel their creative outlet and provide fresh material for board‑game night storytelling.
  travel: David Daya prefers weekend getaways that blend hiking in the Berkshire Hills with short trips to Portland, Maine for seafood feasts and live music, while they dream of trekking New Zealand’s Milford
    Track and have already mapped out a spring break plan to explore the historic streets of Boston and its museums.
  culinary: David Daya experiments with eclectic recipes like kimchi fried rice tacos, rosemary‑infused lamb chops, and a spicy miso ramen that they perfect for board‑game nights, but they sometimes over‑season
    dishes in their eagerness to impress, and they source fresh herbs from the local farmer’s market whenever possible.
  core: David Daya is a socially energized, competitively driven aspiring educator who balances structured lesson design with spontaneous creativity, while they juggle a relaxed approach to obligations
    and a penchant for board games, hikes, and experimental cooking.
background:
  cultural: Raised in Shrewsbury, Massachusetts, David embodies New England cultural influences, including a strong emphasis on education, community involvement, and self‑reliance. His family’s Anglo‑American
    heritage and middle‑class upbringing fostered values of practicality and civic responsibility. While rooted in this regional identity, David embraces the diverse, progressive atmosphere of Worcester
    County, participating in local festivals and multicultural events that broaden his worldview.
