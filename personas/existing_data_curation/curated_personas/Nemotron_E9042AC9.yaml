  hobbies: '[''Intramural Soccer'', ''Community Theater'', ''Live Music Concerts'', ''Board Game Nights (Strategy)'', ''Hiking in the Berkshire Hills'', ''Photography'', ''Cooking with Friends'', ''Educational
