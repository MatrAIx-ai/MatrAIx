  career_goals: Rex aims to move from frontline deliveries to a supervisory role in logistics within the next three to five years. He plans to obtain a Commercial Driver’s License and enroll in a community‑college
    supply‑chain management program to qualify for a fleet‑supervisor position. Long‑term, he hopes to start his own small courier business that offers flexible schedules for his family while maintaining
    the routine and practicality he values. His competitive nature fuels a desire to be recognized as the top performer in his company and eventually in his own venture.
