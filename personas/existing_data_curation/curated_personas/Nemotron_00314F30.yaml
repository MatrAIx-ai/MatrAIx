personas:
  professional: Saadia Jackson is a Miami‑based customer service specialist whose curious mind and balanced blend of organization and flexibility let them apply Salesforce expertise, active listening, and
    conflict de‑escalation through an art‑inspired design lens, turning anxious support tickets into opportunities for empathetic, human‑centered solutions, and they are quietly charting a path toward a
    CX leadership role.
  sports: Saadia Jackson stays fit primarily through sunrise yoga sessions at South Beach and occasional runs with the Bayfront Run Club, while cheering on the Miami Heat during basketball season and the
    Miami Dolphins in the fall, preferring low‑impact, solitary workouts that soothe their anxiety over competitive team sports.
  arts: Saadia Jackson immerses themselves in Miami’s Wynwood art scene, sketching vibrant street murals inspired by Kehinde Wiley’s portraiture, attending poetry slams where they admire spoken‑word artists
    like Danez Smith, and finding solace in novels by Chimamanda Ngozi Adichie and the music of Bob Marley, all of which shape their creative, empathetic outlook.
  travel: Saadia Jackson favors curated cultural escapes, often planning weekend trips to Caribbean islands like Jamaica and the Dominican Republic to reconnect with family roots, while also day‑dreaming
    about a future solo pilgrimage to Barcelona’s street‑art districts, and they balance a modest travel budget with a love for authentic local experiences and occasional spur‑of‑the‑moment beach getaways
    around the Florida Keys.
  culinary: Saadia Jackson loves cooking hearty Caribbean‑inspired meals, expertly preparing jerk‑spiced chicken with Scotch bonnet peppers, sweet fried plantains, and seafood gumbo seasoned with dried
    thyme, while at restaurants they gravitate toward dishes like conch ceviche at Joe’s Stone Crab and savor the aroma of fresh cilantro and allspice that remind them of home.
  core: Saadia Jackson is a creatively curious, empathetic problem‑solver who channels high emotional sensitivity into art‑infused customer experiences while balancing a disciplined work ethic with occasional
    anxiety‑driven perfectionism.
background:
  cultural: Saadia identifies as a Black American with deep ties to the Afro‑Caribbean community in Miami. Her upbringing blended Southern Black church traditions, Caribbean family celebrations, and the
    multicultural rhythm of Miami‑Dade County. She grew up listening to jazz, hip‑hop, reggae, and Latin beats, and her palate reflects a love for dishes like jerk chicken, plantains, and seafood gumbo.
    Saadia’s cultural identity informs her value of community harmony, her appreciation for artistic expression, and her commitment to uplifting under‑represented voices through both her professional work
    and her volunteer activities.
