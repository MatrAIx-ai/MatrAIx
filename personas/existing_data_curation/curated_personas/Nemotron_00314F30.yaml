  career_goals: Saadia aims to move from a front‑line customer service representative to a team lead or customer experience manager within the next three years, leveraging her business degree and people‑centered
    skills to design more humane service processes. She plans to earn a Certified Customer Experience Professional (CCXP) credential and later pursue a master's in organizational psychology to deepen her
    understanding of employee well‑being. Ultimately, she hopes to launch her own consultancy that blends art‑inspired design thinking with customer experience strategy, helping small businesses create
    emotionally resonant brand interactions while fostering supportive work environments for staff who, like her, experience high emotional reactivity.
