  hobbies: '[''Morning Runs'', ''Paddleboarding'', ''Gardening'', ''Reading'', ''Book Club'', ''Acoustic Guitar'', ''Puzzle Solving'', ''Volunteering with Robotics Club'', ''Cooking Healthy Meals'', ''Travel
    Planning'']'
  career_goals: Kasaundra aims to advance from lead teacher to district curriculum coordinator, where she can shape instruction across multiple schools. She plans to earn a Master's in Educational Leadership
    within the next three years, positioning herself for an assistant principal role. Her competitive drive fuels a desire to launch a school‑wide inquiry‑based reading program that demonstrably raises
    literacy scores. Long‑term, she envisions moving into educational consulting to help other districts implement data‑rich, practice‑balanced reforms.
