personas:
  professional: Kasaundra Sgromo, a veteran middle‑school teacher, blends rigorous data‑driven assessment design with inquiry‑based project work, leveraging their meticulous organization and competitive
    drive to continuously raise literacy scores while maintaining calm classroom stability.
  sports: Kasaundra Sgromo kicks off mornings with jogs along the St. Lucie River, joins the Port St. Lucie Paddleboard Club on weekends, roots for the Miami Dolphins and Tampa Bay Rays, and occasionally
    plays recreational tennis at their local community center.
  arts: Kasaundra Sgromo unwinds by strumming an acoustic guitar to the tunes of John Mayer and Ed Sheeran, devours contemporary fiction by Celeste Ng, discusses Malcolm Gladwell’s non‑fiction at their
    book club, and attends community theater productions of Lin‑Manuel Miranda’s Hamilton.
  travel: Kasaundra Sgromo prefers modest, well‑planned trips that mix cultural immersion and nature, such as hiking the Everglades, exploring historic Old San Juan, and dreaming of a week‑long eco‑tour
    in Costa Rica’s rainforests, all while fitting within a family‑friendly budget.
  culinary: Kasaundra Sgromo enjoys cooking balanced meals, often preparing grilled salmon with quinoa, avocado, and citrus herbs, while also perfecting a mango‑chile salsa for tacos, showcasing their skillful
    yet health‑focused kitchen approach.
  core: Kasaundra Sgromo balances a competitive edge with calm composure, starts each day jogging, can’t resist a fresh coffee over tea, and occasionally forgets to water their herb garden when caught up
    in lesson planning.
background:
  cultural: Kasaundra identifies as a White American whose family has deep roots in Central Florida. Raised in a suburban community near the Atlantic coast, she experienced a blend of traditional Mid‑Atlantic
    values and the multicultural, outdoor‑oriented lifestyle of the Space Coast. Her upbringing emphasized self‑reliance, pragmatic work ethic, and community involvement, which continue to shape her teaching
    philosophy and personal interests. While she is not strongly affiliated with any religious tradition, the regional culture of hospitality and civic responsibility remains a core influence in her daily
    life.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Design'', ''Differentiated Instruction'', ''Technology Integration'', ''Data-Driven Assessment'', ''Parent & Community Engagement'', ''Conflict Resolution'',
