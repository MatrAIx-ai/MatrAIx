personas:
  professional: Jean Romero is a highly disciplined firefighter in Los Angeles who applies meticulous incident documentation, advanced thermal imaging and drone scouting, rigorous hazard mitigation, and
    strategic operational planning while they relentlessly chase a captain’s badge within five years, competing in state‑level fire‑service skill events to showcase their competitive drive.
  sports: Jean Romero runs half‑marathons with the Los Angeles Road Runners club, lifts at CrossFit West LA, follows the Los Angeles Lakers and Dodgers, and volunteers for the Firefighter Fitness League’s
    annual obstacle course, which they approach with a militaristic discipline and a competitive edge.
  arts: Jean Romero captures downtown LA’s sleek architecture through a lens inspired by Iwan Baan, orchestrates backstage lighting for community productions of Sondheim’s ‘Sweeney Todd’, and unwinds to
    Kendrick Lamar’s ‘To Pimp a Butterfly’, weaving their meticulous attention to detail into every artistic endeavor they undertake.
  travel: Jean Romero prefers meticulously planned weekend escapes to nearby natural retreats such as Joshua Tree and Santa Barbara, while they dream of a solo trek through the Swiss Alps after achieving
    fire chief certification, balancing a tight training schedule and modest travel budget with a desire for both adventure and relaxation.
  culinary: Jean Romero prepares high‑protein quinoa bowls seasoned with smoked paprika and roasted sweet potatoes, enjoys spicy tuna poke with sesame oil and jalapeños, and occasionally resorts to instant
    ramen from a vending machine during night shifts, though they often skip meals to prioritize training, reflecting a disciplined yet pragmatic approach to nutrition.
  core: Jean Romero balances an unyielding quest for fire‑service leadership with chronic stress, a competitive streak for tactical video games, disciplined mornings of running and weightlifting, and a
    secret habit of frequenting late‑night coffee shops to sketch architectural photography ideas, which they use as a mental reset.
background:
  cultural: Jean grew up in a multicultural neighborhood of Los Angeles in a white, middle‑class family that originally settled from the Midwest. Her upbringing blended a traditional American work ethic
    with the diverse cultural tapestry of the city, exposing her to multiple languages, cuisines, and community values. This environment nurtured her independent mindset, strong sense of civic duty, and
    openness to learning from varied perspectives, while her personal identity remains rooted in mainstream American civic values and a commitment to public service.
