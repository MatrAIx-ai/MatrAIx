  career_goals: Jean aims to become a fire captain within the next five years, earn Fire Officer I and II certifications, and complete an associate degree in fire science. Her long‑term ambition is to advance
    to battalion chief and eventually fire chief, leading high‑performing crews, developing innovative community fire‑safety education programs, and competing in state‑level fire service skill competitions
    to gain recognition for operational excellence.
