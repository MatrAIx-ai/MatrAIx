personas:
  professional: Herbert Burns, a meticulous payroll specialist with advanced Excel, ADP Workforce Now, and QuickBooks expertise, combines his curiosity for automation with his cooperative nature to streamline
    payroll processes while mentoring junior staff and ensuring compliance.
  sports: Herbert Burns, a dedicated member of a local adult softball league and regular participant in community runs, avidly supports the New York Yankees, Philadelphia Eagles, and New Jersey Devils,
    and squeezes in weekend fishing trips on the Delaware River to stay active.
  arts: Herbert Burns, who immerses himself in live regional concerts featuring Bruce Springsteen and The Avett Brothers, enjoys classic cinema starring Tom Hanks and Meryl Streep, and integrates insights
    from his historical nonfiction book club into lively weekend discussions, enriching his cultural palate.
  travel: Herbert Burns, preferring well‑planned road trips that blend historic sites like Colonial Williamsburg, Gettysburg, and the National Mall with weekend getaways to the Pocono Mountains, balances
    his love of exploration with a modest travel budget and a habit of booking off‑peak cabins.
  culinary: Herbert Burns, an enthusiastic home chef who perfects New Jersey‑style pizza with thin crust, mozzarella, pepperoni, fresh basil, and smoky tomato sauce, also grows herbs for fresh garnish,
    and occasionally treats himself to craft beers after cooking, reflecting his blend of tradition and small‑scale indulgence.
  core: Herbert Burns, a 52‑year‑old payroll whiz who blends meticulous number‑crunching with a love for woodworking, community service, and spontaneous fishing trips, often forgets to water his hybrid
    tomatoes while dreaming of automating every manual task.
background:
  cultural: Herbert was raised in a middle‑class, suburban community in Jackson, Monmouth County, New Jersey, within an Irish‑American family that emphasizes hard work, community involvement, and family
    unity. The local culture blends Northeastern U.S. traditions with a focus on practicality, reliability, and modest social gatherings. While not strongly religious, his upbringing instilled values of
    responsibility, courtesy, and respect for authority. He identifies with the broader Mid‑Atlantic cultural norms of dependable labor, neighborly cooperation, and participation in civic events, all of
    which shape his considerate and cooperative outlook.
attributes:
  skills: '[''Payroll processing'', ''Timekeeping management'', ''Excel (advanced formulas & pivot tables)'', ''ADP Workforce Now'', ''QuickBooks Payroll'', ''Regulatory compliance (FICA, tax withholdings)'',
