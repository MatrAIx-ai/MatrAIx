  hobbies: '[''Softball (community league)'', ''Volunteer work at food bank'', ''Gardening'', ''Woodworking'', ''Live music concerts'', ''Fishing'', ''Cooking (family meals)'', ''Historical site visits'',
    ''Book club (history)'']'
  career_goals: Herbert aims to advance to a senior payroll supervisor or payroll manager role within the next three to five years. He plans to earn the Certified Payroll Professional (CPP) designation
    and lead initiatives to automate payroll workflows, reducing manual effort and error rates. He also aspires to mentor and develop junior colleagues, broaden his knowledge of HR analytics, and eventually
    take on a broader HR operations position that integrates payroll, benefits, and employee relations—all while maintaining a healthy work‑life balance and contributing his expertise to community non‑profits
    on a volunteer basis.
