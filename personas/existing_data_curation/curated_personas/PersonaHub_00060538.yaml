persona_description: A mining engineer who specializes in the application of bioleaching technology to extract metals from century-old mining waste. His research interests include the chemical and biological
  processes involved in bioleaching, the engineering of controlled environments for bacterial leaching, and the economic viability of using bioleaching as a remediation solution for toxic mining waste.
  He is also interested in the environmental impact of bioleaching and the potential for the technology to be used in the extraction of other metals and minerals.
