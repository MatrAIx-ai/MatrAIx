  hobbies: '[''LEGO building'', ''Drawing invention schematics'', ''Chess'', ''Soccer'', ''Reading adventure books'', ''Comic books'', ''Bilingual games'', ''Community festivals'']'
  career_goals: Rasiel aspires to become an engineer or architect, drawn by his love for building stable structures and his methodical nature. He also dreams of joining the local fire department as a firefighter,
    attracted by the clear hierarchy, teamwork, and community service. Additionally, he hopes to be the captain of his school's soccer team, where his competitive spirit and leadership can shine.
