personas:
  professional: Rasiel Boquin, a seven-year-old aspiring engineer, channels his love for structure into constructing intricate LEGO sets and drafting detailed invention schematics, treating each project
    as a miniature career challenge that they methodically plan, execute, and proudly showcase.
  sports: Rasiel Boquin, a seven-year-old competitive athlete, plays forward for the neighborhood soccer club Southside Sprinters and pitches for the Little League team Bayside Bombers, idolizes the Los
    Angeles Galaxy and Los Angeles Dodgers, and follows a strict weekly training schedule that balances skill drills with conditioning.
  arts: Rasiel Boquin, a seven-year-old creative strategist, spends afternoons sketching invention blueprints inspired by LEGO Designer Nathan Sawaya, devours Marvel comics by Stan Lee, and dances to Kidz
    Bop renditions of Shake It Off, letting visual and musical influences shape his imaginative play.
  travel: Rasiel Boquin, a seven-year-old explorer with a love for structured itineraries, has visited the historic plazas of Mexico City during a family festival, trekked the Grand Canyon on a school field
    trip, and dreams of traveling to Barcelona to practice Spanish while touring the Sagrada Familia, always mapping out daily activities in a colorful travel journal.
  culinary: Rasiel Boquin, a seven-year-old budding chef, enjoys assembling his own chicken quesadillas with shredded cheese, diced jalapeños, and fresh cilantro, loves the bright flavors of mango-strawberry
    fruit salad, and occasionally helps his mother bake chocolate churros, though they often forget to add a pinch of cinnamon.
  core: Rasiel Boquin, a seven-year-old master of structure, blends competitive sports, meticulous LEGO engineering, and disciplined allowance saving into a quirky, methodical routine that occasionally
    forgets to close the snack box lid.
background:
  cultural: Rasiel grows up in a Mexican-American household in Mission, Texas, where family gatherings, Sunday tamale meals, and celebrations of Día de los Muertos and Cinco de Mayo are regular parts of
    life. He speaks Spanish at home and English at school, giving him a bicultural perspective. His family emphasizes respect for elders, community support, and a strong work ethic, values reflected in
    his organized and reliable demeanor. The border region's blend of Mexican traditions and Texan influences shapes his worldview, fostering pride in his heritage while navigating a diverse community.
