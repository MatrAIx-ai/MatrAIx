personas:
  professional: Theresa Williams, a budding museum content coordinator, blends her self‑taught graphic design and photography skills to craft engaging social‑media stories for local exhibitions, while they
    thrive on spontaneous brainstorming sessions that generate fresh program ideas but often stumble over strict deadlines.
  sports: Theresa Williams follows the Washington Capitals for NHL excitement, cheers on Washington DC United in MLS, and they regularly join a local hiking club that explores the Blue Ridge foothills on
    weekends, while also participating in a casual frisbee league at the Fairfax Community Center during the summer.
  arts: Theresa Williams immerses themselves in contemporary art, frequently visiting Smithsonian exhibitions featuring Kehinde Wiley, snapping photographs of local street murals by artists like J. Tooley,
    and they draw lyrical inspiration from poets Rupi Kaur and Ocean Vuong while listening to indie singer‑songwriter Lucy Dacus during gallery openings.
  travel: Theresa Williams prefers spontaneous weekend road trips, mapping routes through Shenandoah National Park and the historic streets of Williamsburg, and they also dream of a carefully planned summer
    adventure to Barcelona’s art districts and Kyoto’s Zen gardens, balancing a modest travel budget with a love for off‑the‑beaten‑path experiences.
  culinary: Theresa Williams experiments in the kitchen with dishes like Korean kimchi‑taco fusion, Moroccan chickpea stew spiced with cumin and preserved lemon, and miso‑glazed salmon, and they enjoy using
    fresh herbs such as cilantro and sumac, keeping their cooking skill level at confident home‑chef status while pairing meals with a glass of Virginia Albariño.
  core: Theresa Williams is a curiosity‑driven, spontaneous art enthusiast who turns everyday moments into visual stories, balancing creative hustle with occasional impulsivity, and they constantly juggle
    deadlines while cherishing the freedom to explore.
background:
  cultural: Theresa was raised in a middle‑class, white family in the suburban–rural corridor between Fredericksburg and Fauquier County, Virginia. Her family’s roots trace back to Anglo‑American and Irish
    ancestry, and she grew up with a blend of Southern hospitality and a modern appreciation for diverse cultural expressions. Regular church attendance and community events instilled a sense of responsibility
    and cooperation, while her parents encouraged curiosity and open‑mindedness, exposing her to museum visits and artistic pursuits from an early age. This regional upbringing gave her a strong familiarity
    with Virginia’s Civil‑War history, local agriculture, and the flourishing wine‑tourism scene, shaping her values of community involvement, respect for tradition, and a willingness to explore new ideas.
attributes:
  skills: '[''Creative writing'', ''Basic graphic design (Canva, Photoshop)'', ''Photography'', ''Social media content creation'', ''Public speaking'', ''Event planning'', ''Interpersonal communication'',
