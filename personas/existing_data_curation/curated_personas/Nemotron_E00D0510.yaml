  hobbies: '[''Visiting art galleries and museums'', ''Photography (urban and nature)'', ''Creative writing (poetry/journaling)'', ''DIY crafts (painting, collage)'', ''Hiking and nature walks'', ''Wine
    tasting at local vineyards'', ''Attending live music events'', ''Cooking experimental dishes'', ''Reading contemporary fiction and philosophy'', ''Volunteer work at local community arts programs'']'
  career_goals: Theresa aims to turn her artistic interests into a flexible career that still leaves room for spontaneity. She plans to complete her associate degree in art history or communications within
    the next two years while building a portfolio of writing, photography, and graphic design work. She hopes to secure a part‑time role at a local museum, gallery, or nonprofit arts organization where
    she can assist with program planning, community outreach, and content creation. In the longer term, she envisions launching her own blog or YouTube channel that blends art commentary, local history,
    and DIY projects, eventually monetizing the platform and possibly offering workshops. Her ambitions include developing stronger time‑management habits to meet project deadlines without sacrificing creative
    freedom.
