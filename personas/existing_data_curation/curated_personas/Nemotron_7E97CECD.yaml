  career_goals: Although approaching traditional retirement age, Sebastian aims to transition his workshop into a boutique studio that highlights the intersection of craft and contemporary art. He hopes
    to mentor a dedicated apprentice to carry forward his techniques and philosophy, eventually establishing a small apprenticeship program in partnership with local community colleges. He also dreams of
    publishing a guidebook that documents his approach to merging traditional carpentry with artistic experimentation, and contributing his expertise to the preservation of Cambridge’s historic homes and
    public art installations. By staying flexible and selective about projects, he seeks to maintain creative autonomy while leaving a lasting imprint on the city’s built environment.
