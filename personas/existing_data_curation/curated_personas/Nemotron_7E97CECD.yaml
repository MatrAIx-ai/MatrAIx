personas:
  professional: Sebastian Mohun is a veteran master carpenter in Cambridge who blends four decades of fine joinery, historic restoration, and custom furniture design with a curiosity for experimental materials
    like reclaimed metal and CNC‑crafted forms, and his relaxed, somewhat disorganized style leads him to prioritize creative flow over strict schedules while he mentors apprentices in a hands‑on workshop
    environment.
  sports: Sebastian Mohun enjoys low‑impact fitness by rowing with the Cambridge senior rowing club on the Charles River, cheering for Boston’s Red Sox and Celtics, and joining a community senior soccer
    league on Saturdays, though he prefers solitary walks for reflection over competitive team sports.
  arts: Sebastian Mohun frequently visits the Harvard Art Museums and local galleries, drawing inspiration from Edward Hopper’s urban realism and Georgia O’Keeffe’s abstractions, while his evenings are
    filled with sketching architectural details and listening to the Design Matters and Woodworking MasterClasses podcasts that fuel his artistic curiosity.
  travel: Sebastian Mohun favors purposeful travel that blends craftsmanship and culture, having recently studied traditional Japanese joinery in Kyoto, explored Portland’s maker market, and planning a
    pilgrimage to the historic wood‑working villages of the Cotswolds, all balanced against his modest pension and a desire for quiet reflection.
  culinary: Sebastian Mohun delights in farm‑to‑table cuisine, often preparing his own roasted beet and carrot salad with locally sourced goat cheese, simmering classic New England clam chowder using garden‑fresh
    herbs, and treating himself to a perfectly seared ribeye seasoned with smoked paprika and a splash of bourbon‑infused butter.
  core: Sebastian Mohun is a meticulous, art‑obsessed master carpenter who navigates retirement with a competitive edge, a relaxed approach to planning, and a penchant for solitary tinkering and occasional
    health neglect.
background:
  cultural: Sebastian grew up in a modest working‑class family in the Boston suburbs, where his father was a carpenter and his mother an elementary school teacher. The New England emphasis on self‑reliance,
    craftsmanship, and respect for historic architecture shaped his values from an early age. Living in Cambridge for most of his adult life exposed him to a vibrant blend of academic, artistic, and multicultural
    influences, fostering an appreciation for both traditional American building techniques and contemporary artistic expressions. His cultural identity reflects a blend of Mid‑Atlantic Anglo‑American heritage,
    a deep connection to local history, and an openness to the diverse ideas that thrive in the city’s eclectic community.
