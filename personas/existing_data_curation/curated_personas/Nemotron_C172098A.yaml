  hobbies: '[''Watercolor Painting'', ''Reading Speculative Fiction and Poetry'', ''Creative Writing'', ''Storytelling Volunteering'', ''Gardening'', ''Visiting Art Galleries'', ''Attending Literary Events'',
    ''Genealogy Research'', ''Mindfulness Meditation'']'
  career_goals: Although retired from formal employment, Sally aims to complete and self-publish a collection of reflective essays and poems titled 'Seasons of Curiosity', develop a seasonal community mural
    project in Onondaga Park, mentor emerging educators through a local apprenticeship program, and enroll in a graduate-level philosophy or art history course at SUNY Syracuse. She also wishes to travel
    occasionally to visit major art museums and attend literary festivals that spark her imagination.
