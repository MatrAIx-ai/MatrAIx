  hobbies: '["Salsa dancing", "Bomba and plena music", "Cooking Puerto Rican dishes", "Urban gardening", "Walking and hiking in the mountains of Naranjito", "Reading contemporary fiction", "Volunteering
    at local community centers", "Participating in neighborhood festivals", "Crafting handmade decorations"]'
  career_goals: Yulissa aims to complete her associate degree in hospitality management and earn a professional certification in sustainable cleaning. Long‑term, she envisions launching her own eco‑conscious
    cleaning service in the Naranjito region, providing jobs and mentorship to other women in her community. She also hopes to develop workshops on household efficiency and green practices, eventually expanding
    into a small consulting firm that supports low‑income families with home‑care solutions.
