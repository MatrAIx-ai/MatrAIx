personas:
  professional: Hyunjung Yan is a methodical claims adjuster and investigator who leverages a STEM bachelor's degree and bilingual fluency to dissect complex property and casualty cases, using Excel, SQL,
    and basic statistical modeling to quantify damages while ensuring regulatory compliance, and they are actively pursuing CPCU certification and a master’s in Risk Management to transition into a lead
    claims examiner or claims operations manager role within three years.
  sports: Hyunjung Yan is a regular participant in a weekend badminton league at the local community center, a member of the Angeles Trails Hiking Group that conquers the rugged paths of Angeles National
    Forest each month, and a devoted fan of the Los Angeles Dodgers, Lakers, and Galaxy, balancing cardio endurance and flexibility through a structured training schedule.
  arts: Hyunjung Yan performs with a community cultural dance troupe at local festivals, immerses in the music of Yo‑Yo Ma and Lin‑Manuel Miranda’s ‘Hamilton’, enjoys the cinematic storytelling of Christopher
    Nolan, and deepens personal growth through a monthly book club that discusses works by Brené Brown and James Clear.
  travel: Hyunjung Yan plans trips with meticulous spreadsheets, often weekend escapes to Yosemite National Park and Monterey Bay, has already visited Kyoto for its historic temples and cherry‑blossom season,
    and is eagerly saving for a future hiking expedition to the Southern Alps of New Zealand.
  culinary: Hyunjung Yan is an avid home chef who regularly hosts dinner gatherings featuring fermented cabbage side dishes (kimchi) made with napa cabbage, gochugaru, and fermented seafood, hearty bibimbap
    bowls layered with seasoned vegetables, gochujang‑marinated pork, and a fried egg, and they delight in perfecting the balance of umami and spice while coaxing friends to try hands‑on cooking.
  core: Hyunjung Yan is a structured, community‑oriented professional who balances meticulous claim investigations with vibrant cultural cooking and group activities, all while wrestling with an ever‑present
    undercurrent of worry.
background:
  cultural: Hyunjung is a second‑generation Korean American raised in the vibrant Korean enclave of Rowland Heights, California. Her family maintains strong ties to Korean cultural traditions, celebrating
    holidays such as Seollal and Chuseok, and emphasizing respect for elders, education, and community harmony—values that align with her kind and cooperative nature. Fluent in both Korean and English,
    she navigates bicultural contexts with ease, often serving as a bridge between Korean‑speaking claimants and English‑language insurance processes. Her upbringing in a multicultural suburb has also exposed
    her to a diverse mix of Asian and Latino neighbors, fostering an inclusive worldview while preserving her heritage through language, cuisine, and participation in local Korean churches and cultural
    events.
attributes:
  skills: '["Claims investigation", "Property and casualty appraisal", "Risk assessment and loss quantification", "Data analysis (Excel, SQL)", "Regulatory compliance and policy interpretation", "Bilingual
    communication (Korean/English)", "Negotiation and settlement", "Report writing and documentation", "Project management and workflow optimization", "Customer service and stakeholder coordination"]'
  hobbies: '["Badminton club", "Group hiking", "Korean cooking and dinner gatherings", "Korean cultural dance troupe", "Book club (personal development)", "Yoga and meditation", "Volunteer tutoring (math
    and science)"]'
  career_goals: Hyunjung aims to advance to a senior claims management position within the next three years, targeting roles such as Lead Claims Examiner or Claims Operations Manager. She plans to obtain
    the Chartered Property Casualty Underwriter (CPCU) designation and potentially pursue a master’s in Risk Management to deepen her expertise. Her ambition includes leading a specialized team handling
    complex catastrophe claims, developing training programs for new adjusters, and integrating data‑driven analytics into the claims process to improve efficiency and accuracy. She also aspires to mentor
    junior staff, fostering a collaborative and supportive work environment while balancing her commitment to personal well‑being.
