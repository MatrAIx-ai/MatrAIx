  hobbies: '[''cooking Mexican cuisine'', ''gardening'', ''fishing'', ''coaching youth soccer'', ''listening to regional Mexican music'', ''attending cultural festivals'', ''woodworking'', ''reading news'',
    ''meditation'']'
  career_goals: Alberto aims to move into a regional management role within the next five years, overseeing multiple locations and mentoring other managers. He also dreams of opening his own family-run
    Mexican restaurant that showcases traditional recipes from his hometown, while ensuring a stable financial future for his wife and children. To achieve this, he plans to complete a food-service management
    certification and take community-college courses in hospitality leadership, as well as develop stress-management techniques to maintain his well-being.
