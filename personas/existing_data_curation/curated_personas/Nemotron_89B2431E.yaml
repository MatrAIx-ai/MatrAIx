  hobbies: '["Gardening (native plants)", "Reading historical fiction and memoirs", "Knitting and crocheting", "Birdwatching", "Volunteering at the food bank", "Walking in Forest Park", "Local history and
    genealogy research", "Online art history courses", "Seasonal cooking"]'
  career_goals: Although retired, Shirley aims to deepen her impact on the Gresham community by leading the senior gardening club at the local community center and establishing a mentorship program that
    pairs seniors with high‑school students for local history projects. She hopes to complete a memoir that documents her family’s Oregon roots and to travel to two or three new destinations each year with
    her husband, focusing on culturally rich and nature‑oriented experiences. Additionally, she plans to continue learning through online courses in art history and environmental sustainability, applying
    these insights to her volunteer initiatives.
