  hobbies: '[''Journaling'', ''Crossword Puzzles'', ''Sudoku'', ''Knitting'', ''Vegetable Gardening'', ''Volunteer Work at Local Library'', ''Volunteer Work at Church'', ''Reading Non‑Fiction (Productivity,
    Personal Finance, History)'', ''Productivity Podcasts'', ''Hiking in Ozark National Forest'']'
  career_goals: Alyssa aims to advance from her current administrative role to a supervisory position such as Office Manager or Executive Assistant within the next three to five years. She plans to obtain
    a Certified Administrative Professional (CAP) credential and enroll in associate‑level courses in business administration to strengthen her managerial knowledge. Her competitive drive motivates her
    to become the top‑performing office manager in her organization, earning recognition for improving departmental productivity. Long‑term, she aspires to lead a small team, implement workflow efficiencies
    across the organization, and eventually transition into an Operations Coordinator role. She is also considering launching a part‑time virtual‑assistant service to leverage her organizational strengths
    independently.
