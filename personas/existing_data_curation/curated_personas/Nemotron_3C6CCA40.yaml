personas:
  professional: Miguel Montenegro, a 49‑year‑old civil engineer with three decades of hands‑on site supervision, excels at blueprint interpretation, concrete formwork, and crew coordination, leveraging
    their structured, reliable nature to keep projects on schedule while calmly mediating between Spanish‑speaking workers and English‑speaking clients.
  sports: Miguel Montenegro enjoys low‑impact weekend fishing at Lake Irvine as a member of the local fishing club, follows the Los Angeles Dodgers in baseball, the Anaheim Ducks in hockey, and squeezes
    in occasional pickup basketball at the community center to stay fit.
  arts: Miguel Montenegro finds quiet inspiration in the guitar work of Paco de Lucía, the storytelling of Gabriel García Márquez’s novels, and the classic films of Gregory Peck, often playing vinyl records
    while woodworking.
  travel: Miguel Montenegro prefers well‑planned road trips to natural sites like Yosemite and the Grand Canyon, values affordable family stays at cabin rentals, and dreams of exploring a historic coastal
    town’s old quarter in the Caribbean when finances allow.
  culinary: Miguel Montenegro cooks hearty family meals such as mofongo with plantains and pork, arroz con gandules with cilantro and sofrito, and pairs them with fresh garden tomatoes and basil from his
    backyard, showcasing competent but modest culinary skill.
  core: Miguel Montenegro balances a meticulous, hands‑on engineering career with a solitary love for fishing, woodworking, and cooking tradition‑rich meals, all while quietly juggling a disciplined savings
    plan and a stubborn habit of delaying doctor‑recommended physiotherapy.
background:
  cultural: Miguel grew up in a Puerto Rican household where Spanish was spoken at home and traditions from the island were celebrated. The strong family orientation, respect for elders, and Catholic faith
    shaped his values. After moving to California, he became part of the vibrant Latino community in Orange County, maintaining ties through local festivals, salsa music, and sharing island recipes with
    neighbors. His heritage influences his work ethic—hard‑working, collaborative, and community‑focused—while his bicultural fluency helps him bridge cultural gaps on construction sites.
attributes:
  skills: '[''Blueprint Interpretation'', ''Concrete Formwork'', ''Site Safety Management'', ''Project Scheduling'', ''Budget Monitoring'', ''Team Leadership'', ''Construction Quality Assurance'', ''Bilingual
    Communication (Spanish/English)'', ''Permit and Code Compliance'']'
  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Cooking Puerto Rican Cuisine'', ''Family Gatherings'', ''Church Community Events'']'
  career_goals: Miguel aims to transition from field supervision to a senior project manager role, obtain a professional engineer (PE) license through the California Board, and eventually launch his own
    modest contracting firm that focuses on residential and small commercial projects in Orange County. He also wants to mentor younger workers, especially those from the Puerto Rican community, and secure
    a stable retirement that allows him to support his family’s educational aspirations.
