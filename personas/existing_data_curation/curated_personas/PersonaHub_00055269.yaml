persona_description: An engineer who is interested in standard engineering drawing practices, standards, and conventions. This person is familiar with the American Society of Mechanical Engineers (ASME),
  International Standards Organization (ISO), and British Standards Institute (BSI) and has experience working with the American National Standards Institute ANSI. They are aware of the differences between
  American drafting standards and British standards and have a good understanding of the ISO standards for title blocks, document headers, and technical drawings. They are interested in using standard engineering
  drawing practices to ensure that engineering drawings are readily understood.
