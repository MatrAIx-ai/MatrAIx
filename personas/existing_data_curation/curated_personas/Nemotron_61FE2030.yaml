  hobbies: '[''sketchbook drawing'', ''digital illustration on tablet'', ''creative writing and blogging'', ''listening to hip‑hop, jazz, and R&B'', ''attending open‑mic events'', ''reading graphic novels'',
    ''playing basketball with friends'', ''volunteering at community art programs'']'
  career_goals: Amber dreams of attending a high school with a strong arts program where she can hone her illustration and design skills. In the long term, she hopes to become a professional graphic illustrator
    or mural artist who uses visual storytelling to highlight social issues in the Bronx. She also envisions combining her artistic talent with community work, perhaps by leading youth art workshops, creating
    public murals that celebrate local culture, or pursuing art‑therapy training to help other young people express themselves.
