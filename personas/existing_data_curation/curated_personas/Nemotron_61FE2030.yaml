personas:
  professional: Amber Nesbit is an aspiring visual storyteller who blends charcoal sketches with digital illustrations and poetry, channeling their curiosity and balancing organized planning with spontaneous
    creativity into a growing online portfolio where they regularly share new work.
  sports: Amber Nesbit spends weekends shooting hoops at the neighborhood park with their close-knit friends, follows the Chicago Bulls and the WNBA's Chicago Sky for inspiration, and participates in the
    local after-school basketball club where they balance competitive play with a collaborative spirit.
  arts: Amber Nesbit fills sketchbooks with charcoal studies, crafts digital art influenced by illustrators like Loish and graphic novelists such as Raina Telgemeier, and writes poems set to the beats of
    Kendrick Lamar, Miles Davis, and H.E.R., often sharing them at neighborhood open-mic nights where they receive supportive applause.
  travel: Amber Nesbit enjoys weekend trips to the Art Institute of Chicago and occasional family road trips to New York City's MoMA, while daydreaming about a future adventure to Kyoto, Japan to explore
    its historic temples and anime-inspired art districts, and they often plan itineraries in a notebook.
  culinary: Amber Nesbit prefers a mix of bold flavors - devouring pepperoni pizza, experimenting with homemade sushi rolls featuring avocado and cucumber, and sipping matcha latte smoothies - while gradually
    honing basic cooking skills through after-school culinary workshops where they experiment with seasoning.
  core: Amber Nesbit is a quietly curious teen who channels artistic energy into charcoal sketches and digital canvases, balances a love for solitude with occasional open-mic bravery, and they can't resist
    a late-night snack before finishing homework.
background:
  cultural: Amber is an African‑American teenager raised in the Bronx, a borough steeped in hip‑hop history, vibrant street art, and a rich tapestry of Caribbean and Latin influences. Her family celebrates
    traditions like Sunday church gatherings, soul‑food cooking, and storytelling that connect her to the broader Black diaspora. Growing up in a densely populated urban neighborhood has exposed her to
    a strong sense of community activism, local murals that depict the borough’s resilience, and the rhythms of city life—all of which shape her identity and creative voice.
attributes:
  skills: '[''drawing'', ''digital illustration (Procreate)'', ''creative writing (poetry, short stories)'', ''basic coding with Scratch and introductory Python'', ''peer mediation'', ''project organization'',
