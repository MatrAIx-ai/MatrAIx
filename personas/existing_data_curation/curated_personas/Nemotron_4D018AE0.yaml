  hobbies: '["Golf", "Cycling", "Hiking", "Volunteer work with local food bank", "Community theater", "Reading historical non-fiction", "Grilling and cooking", "Wine tasting", "Bridge (card game)", "Mentoring
    finance students"]'
  career_goals: Michael aims to transition from senior analyst to a leadership role such as Portfolio Manager or Chief Investment Officer within the next five years. He plans to earn his CFA charter, deepen
    his expertise in sustainable and ESG investing, and lead a cross‑functional team that designs innovative investment products. Additionally, Michael aspires to mentor junior analysts, contribute thought
    leadership through industry publications, and eventually launch a boutique consultancy focused on value‑driven investment strategies for high‑net‑worth clients.
