    client software'', ''Team collaboration and interdisciplinary communication'', ''Advocacy and negotiation with service providers'', ''Organizational and time‑management skills'']'
  hobbies: '[''Vinyasa yoga'', ''Hiking in Santa Cruz Mountains'', ''Community tech tutoring'', ''Toastmasters public speaking'', ''Cooking Mediterranean dishes'', ''Participating in social‑good hackathons'',
    ''Reading psychology and data science books'', ''Hosting board game nights'', ''Gardening'', ''Photography of Bay Area landscapes'']'
  career_goals: Kara aims to deepen her expertise by pursuing a Master of Social Work (MSW) or a Master of Public Health (MPH) within the next two years, positioning herself for a senior case manager role
    with supervisory responsibilities. Leveraging her STEM background, she plans to spearhead data‑driven interventions for at‑risk populations, integrating predictive analytics into service delivery. Over
    the next five to seven years, she envisions becoming a program director of a nonprofit that uses technology to enhance community health outcomes. She also aspires to speak at national conferences on
    the intersection of technology and human services, and to establish a community tech hub that offers digital literacy training for underserved clients.
