  career_goals: Cesar aims to earn a contract with a major MMA promotion within the next three years and become a top‑ranked contender in his weight class. He plans to leverage his growing personal brand
    to secure sponsorships that align with his values of health, performance, and cultural pride. Long‑term, he envisions opening a community‑focused training center in San Diego County that combines elite
    sports coaching with cultural programming—offering youth mentorship, art workshops, and bilingual fitness classes. He also aspires to become a certified strength and conditioning coach and eventually
    author a guide on integrating performance analytics with holistic athlete development.
