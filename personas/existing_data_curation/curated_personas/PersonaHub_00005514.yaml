persona_description: A mineralogist or crystallographer who specializes in the study of mineral structures and their optical properties. They are interested in understanding the relationship between the
  mineral's structure and its optical properties, and how these properties can be used to infer information about the mineral's crystallographic orientation. They are likely to be familiar with the concept
  of an optic axis, the direction in which the mineral appears isotropic under crossed polarized light, and the different types of interference patterns that can be observed in the mineral's thin sections.
  They may also be interested in the interpretation of Uniaxial Interference Figures, which are a type of optical interference pattern that can be used to infer the mineral's crystallographic orientation.
