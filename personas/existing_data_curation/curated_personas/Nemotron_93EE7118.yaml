personas:
  professional: Osric Akbar is a warehouse inventory clerk who combines advanced Excel, Python data‑cleaning scripts, and SAP/NetSuite expertise to drive process optimization, using a methodical, competitive
    mindset to exceed performance metrics while balancing a packed schedule of basketball, volunteering, and DIY electronics projects.
  sports: Osric Akbar dominates the intramural basketball league at the local community center, cheers for the Chicago Bulls and Chicago Bears, maintains fitness through weightlifting at Iron Forge Gym
    and weekly jogs along Lake Michigan, and participates in seasonal pick‑up games that satisfy their competitive streak.
  arts: Osric Akbar curates high‑energy workout playlists featuring Kendrick Lamar, J. Cole, Beyoncé, and H.E.R., attends live hip‑hop and R&B shows at the House of Blues, and collects limited‑edition vinyls
    as a personal passion that fuels both social gatherings and solo listening sessions.
  travel: Osric Akbar prefers meticulously planned weekend road trips to music hubs like Nashville and Austin, balances adventure with a tight budget by using spreadsheet itineraries, and dreams of attending
    the international logistics expo in Hamburg, Germany, to merge travel with career ambitions.
  culinary: Osric Akbar enjoys cooking soulful dishes such as collard greens, fried chicken, and sweet potato pie with their spouse, experimenting with spice blends like smoked paprika and cayenne, yet
    often resorts to quick microwave meals during hectic work weeks, reflecting a blend of culinary enthusiasm and practical time constraints.
  core: Osric Akbar is a data‑driven warehouse professional who channels competitive energy into basketball, music, and DIY electronics while wrestling with stress‑induced worry and a penchant for meticulous
    planning.
background:
  cultural: Osric is a Black American raised in Columbus, Ohio, with family roots tracing back to the Southern United States and Ghana. His paternal grandparents immigrated from Ghana, bringing Islamic
    and West‑African cultural influences that blend with the broader African‑American traditions of his mother’s side. He actively celebrates Juneteenth, participates in Kwanzaa observances, and is involved
    with the Columbus African Cultural Center and his local church community. His name, "Akbar," reflects his multicultural heritage, and he embraces both his African lineage and the contemporary Black
    experience in the Midwest.
attributes:
