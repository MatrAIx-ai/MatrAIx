  hobbies: '[''Basketball (intramural league)'', ''Community volunteering (food bank)'', ''Cooking (soul food)'', ''Hip‑hop and R&B music'', ''DIY electronics projects'', ''Weightlifting'', ''Running'',
    ''Attending cultural festivals'']'
  career_goals: Osric aims to transition from his current clerk position to a supervisory role within the warehouse, eventually becoming a lead inventory manager. He plans to earn APICS CPIM and Six Sigma
    Green Belt certifications, positioning himself for a supply‑chain analyst role that leverages data‑driven decision‑making. In the longer term, he aspires to manage a regional distribution center and,
    drawing on his STEM background, launch a logistics consulting firm focused on efficiency projects for midsize manufacturers in the Midwest.
