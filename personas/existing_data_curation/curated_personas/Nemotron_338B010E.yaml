    ''digital illustration'']'
  hobbies: '[''digital painting'', ''abstract sketching'', ''science-fiction reading'', ''DIY electronics projects (Arduino, modular synths)'', ''3D printing'', ''photography of Florida wetlands'', ''yoga
    and meditation'', ''volunteering at animal shelter'', ''community theater set construction'', ''science-fiction book club'', ''tabletop role‑playing games'']'
  career_goals: Connie aims to progress from an assembler to a lead technician or production specialist where she can guide teams, design efficient workstations, and influence product development. She is
    driven to blend her technical expertise with her artistic imagination by moving into industrial or product design for consumer electronics, creating devices that are both functionally robust and aesthetically
    engaging. In the next five years she plans to complete a bachelor’s degree in mechatronics or industrial design, while also attaining certifications in advanced soldering and electronics troubleshooting.
    Her longer‑term ambition is to establish a community makerspace in Lakeland that offers free workshops in electronics, robotics, and digital art, thereby merging her compassion for helping others with
    her passion for innovative technology.
