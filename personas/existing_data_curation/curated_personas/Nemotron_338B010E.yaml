personas:
  professional: Connie Charles is an electronics assembler in a consumer‑electronics plant who blends precise electromechanical skills with a vivid artistic imagination, using improvisational problem‑solving
    to craft prototypes that double as kinetic art installations while mentoring new hires and championing inclusive workshop sessions.
  sports: Connie Charles enjoys low‑impact fitness, attending sunrise yoga classes at Lake Parker, cheering on the Tampa Bay Buccaneers on game nights, and playing occasional pick‑up basketball at the local
    community center, though they often skip scheduled runs when the creative spark of a new Arduino project calls.
  arts: Connie Charles immerses themselves in surreal digital painting inspired by the works of Salvador Dalí and contemporary creator Beeple, curates a personal gallery of Florida wetlands photography,
    and collaborates on community theater set designs, regularly listening to the ambient electronica of Tycho while sketching.
  travel: Connie Charles prefers weekend escapes to Florida’s hidden gems like the Ten Thousand Islands and the dry‑season Everglades, while dreaming of a tech‑art pilgrimage to Kyoto’s design museums and
    a month‑long backpacking trip through Italy’s Renaissance towns to study artisanal craftsmanship, always packing a sketchbook and a portable battery‑powered LED lantern.
  culinary: Connie Charles enjoys cooking simple yet flavorful meals such as stone‑crab claws with garlic butter, mango‑avocado salsa, and homemade ramen broth, showing moderate kitchen confidence while
    experimenting with 3D‑printed cookie cutters shaped like circuit boards for novelty treats.
  core: Connie Charles is a 32‑year‑old tech‑savvy dreamer who fuses circuitry with canvas, balances anxiety with yoga, and occasionally splurges on art‑themed gadgetry, all while juggling a laid‑back approach
    to obligations.
background:
  cultural: Connie grew up in a middle‑class, Anglo‑American family in Lakeland, Florida, after her parents moved from the Mid‑Atlantic region during her early childhood. The laid‑back rhythm of Central
    Florida, combined with Southern hospitality values, shaped her appreciation for community, friendliness, and outdoor recreation. Raised in a household that emphasized hard work, respect for neighbors,
    and involvement in church and local volunteer activities, she internalized a sense of duty to help others. Although she identifies culturally as white American, she is attuned to the multicultural character
    of Florida’s population and enjoys the diverse culinary, musical, and artistic influences present in Lakeland’s vibrant community.
attributes:
