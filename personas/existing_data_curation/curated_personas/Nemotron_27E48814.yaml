  career_goals: Dirk dreams of becoming an engineer who builds practical, eco‑friendly inventions. In the short term, he wants to win his school’s science fair with a functional, solar‑powered model. Long‑term,
    he aspires to study mechanical engineering or environmental technology, designing tools that help protect Minnesota’s forests and lakes while satisfying his curiosity about how things work.
