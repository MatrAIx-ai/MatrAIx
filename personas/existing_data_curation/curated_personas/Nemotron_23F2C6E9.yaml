  career_goals: Yolanda aims to attain the rank of battalion chief within the next five years, leveraging her extensive field knowledge and leadership record. She is passionate about creating a fire‑prevention
    outreach program that blends visual arts—murals, community workshops, and storytelling—to engage Philadelphia’s neighborhoods, especially youth of color. She plans to complete a bachelor’s degree in
    Fire Science or Emergency Management, and to obtain a certification in fire safety engineering, positioning herself for a future role as a municipal fire safety educator or consultant. Additionally,
    Yolanda is committed to establishing a mentorship network for aspiring Black women firefighters, hoping to increase representation and support career advancement within the department.
