persona_description: A pediatric nephrologist specializing in the diagnosis and treatment of minimal change disease (MCD) in children and adults. They have extensive experience in the evaluation, management,
  and follow-up of patients with MCD, including the use of corticosteroids, cyclophosphamide, and cyclosporine as treatment options. They are skilled in the use of diagnostic techniques such as renal biopsy
  and immunofluorescence to accurately diagnose MCD and monitor the effectiveness of treatment. They are also aware of the potential risks and side effects of these drugs, and are able to monitor patients
  for adverse effects and adjust treatment accordingly.
