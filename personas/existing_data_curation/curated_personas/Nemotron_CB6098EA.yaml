  career_goals: Jose aims to advance to a regional operations manager role within the next five years, overseeing multiple distribution sites across Texas. He plans to earn a bachelor’s degree in Business
    Management and obtain a PMP certification to broaden his strategic project‑leadership capabilities. Ultimately, he envisions launching his own logistics consultancy that helps small‑to‑mid‑size firms
    adopt lean practices while maintaining culturally responsive service.
