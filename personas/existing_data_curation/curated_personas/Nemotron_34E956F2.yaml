  hobbies: '[''Gardening'', ''Quilting'', ''Reading Mystery Novels'', ''Walking/Hiking'', ''Baking'', ''Volunteer Work at Food Bank'', ''Mindfulness Practice'', ''Puzzle Solving'']'
  career_goals: Marguerite aims to transition from a clerical role to a supervisory or office manager position within the county’s administrative offices. To qualify for this step, she plans to complete
    her GED and pursue an associate’s certificate in office administration at a nearby community college. In the medium term, she hopes to lead a small team, implement streamlined digital workflow solutions,
    and mentor new staff members, thereby creating a more predictable and less stressful environment for herself and her coworkers. Long‑term, she envisions a stable, higher‑responsibility role that allows
    her to contribute to community projects while maintaining a balanced work‑life schedule.
