  career_goals: Although not currently in the workforce, Joshua aims to transform his hobbyist skills into a modest side venture, such as selling handmade wooden furniture or curated photo prints online.
    He also hopes to enroll in evening art classes at a local community college to deepen his artistic technique, and eventually curate a small neighborhood gallery showcasing work from amateur artists.
    Additionally, he aspires to volunteer as a mentor for a youth arts program, sharing his knowledge while staying engaged with the community.
