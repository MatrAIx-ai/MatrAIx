persona_description: A passionate and dedicated conservationist, Joel Sartore, who is renowned for his work in documenting and raising awareness about endangered species. He is a National Geographic fellow
  and a frequent contributor to the magazine, and is currently planning to document 2,800 species over eight years with his Photo Ark project. Sartore is committed to using his platform to educate the public
  about the importance of conservation and to inspire people to take action to protect endangered species.
