personas:
  professional: A veteran prepress technician with over 30 years of expertise in PDF/X compliance, color correction, and bilingual workflow training, Ana Pimentel transforms their love of structure into
    meticulous SOPs, precise proofing, and a mentoring approach that they apply as they prepare for a part‑time consulting practice serving small Orange County print shops.
  sports: An avid walker and occasional yoga practitioner, Ana Pimentel follows the Laguna Beach coastal trail network each weekend, and they cheer for the Los Angeles Dodgers and the Los Angeles Lakers
    while participating in a local senior fitness club that meets for gentle fitness classes in the spring.
  arts: A devoted lover of folk music and historical narratives, Ana Pimentel fills their kitchen with the sounds of Lila Downs and Vicente Fernández while they devour historical fiction by Elena Poniatowska,
    and they spend quiet evenings knitting to the rhythm of classic mariachi ballads, occasionally visiting the Orange County Museum of Art to admire Diego Rivera’s frescoes.
  travel: A methodical planner of road trips, Ana Pimentel recently charted a week‑long drive along the Pacific Coast Highway with stops in Big Sur and Santa Barbara, and they dream of a leisurely cultural
    tour of Granada, Spain, while limiting extensive travel to a single trip per year due to retirement budgeting.
  culinary: A seasoned home chef with a green thumb, Ana Pimentel transforms garden‑grown chilies, oregano, and corn into rich mole negro, sweet tamales de elote, and hearty pozole rojo, demonstrating a
    mastery of traditional flavors while they relish the process of hand‑rolling each tamal and meticulously seasoning each spoonful.
  core: Ana Pimentel epitomizes disciplined craftsmanship, blending a meticulous prepress career with a quiet passion for gardening, knitting, and cooking, and they navigate a structured retirement plan
    while occasionally succumbing to the distraction of endless Sudoku grids.
background:
  cultural: Ana Marie grew up in a Mexican‑American household in Southern California, where Spanish was spoken at home and family ties were central. Her upbringing fused cultural traditions such as Día
    de los Muertos, quinceañera celebrations, and Catholic observances with the multicultural environment of Orange County. She remains bilingual, often switching between English and Spanish in daily life,
    and she actively participates in the local Mexican community through church events, cultural festivals, and sharing homemade dishes that reflect her heritage.
attributes:
  skills: '[''Prepress workflow management'', ''Color correction and proofing'', ''Adobe InDesign, Photoshop, Illustrator proficiency'', ''PDF/X and PDF/A standards compliance'', ''RIP configuration and
