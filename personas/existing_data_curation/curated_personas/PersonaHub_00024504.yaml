persona_description: Dr. Lora Kosten, a Level II Instructor at USF Sarasota-Manatee, has a strong interest in research to improve academic achievement of children in literacy through the integration of
  the arts. She is passionate about promoting the Seven Essential Life Skills every child needs, including using WOOPs to help others set and work toward their own goals and be accountable for what they
  learn, and providing more experiences through field trips, group projects, and activities with collaborative learning. She is also dedicated to developing interesting and more engaging lessons that will
  resonate with her students and helping children to learn how to focus by using games, going "noodle" or "zen", and challenging them to struggle productively. Dr. Kosten is also interested in using the
  WOOP method to overcome obstacles (kids and staff), building relationships with parents, using Actor’s Tool Box for Focus and Self-Control, having multi-age learning and literacy groups, and fostering
  the skills and strategies from MITM to help children focus, set goals, learn more, and be able to make connections with what they have learned.
