  hobbies: '["Bowling (league)", "Woodworking", "Fishing", "Community Church involvement", "Attending Iowa State Fair", "Volunteering at community festivals", "Rotary Club participation", "Reading practical
    self‑help books"]'
  career_goals: Edward aims to advance to a regional director position overseeing community service initiatives across the Quad Cities, where he can shape policy, secure larger multi-year grants, and lead
    a multidisciplinary team. He plans to earn a bachelor's degree in public administration or social work to complement his practical experience. Additionally, he aspires to launch a comprehensive senior‑citizen
    support program and to serve as a mentor for emerging community service managers.
