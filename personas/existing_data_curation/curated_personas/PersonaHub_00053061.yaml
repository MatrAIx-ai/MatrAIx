persona_description: A scientist who specializes in the study of plant diseases and their impact on agriculture. He has extensive experience working with Phytophthora ramorum, the pathogen that causes sudden
  oak death, and has participated in investigations involving other pathogens, including plum pox virus and Asian soybean rust. Despite the impressive successes of the NPDN in preventing the spread of these
  diseases, the program's funding has been cut in the House version of the 2012 congressional budget. The scientist is passionate about ensuring that the program's future and the support it provides to
  the agricultural industry is not jeopardized.
