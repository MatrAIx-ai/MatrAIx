personas:
  professional: An aspiring junior scientist, Henry Larsen channels their disciplined curiosity into building intricate LEGO space stations, solving chess puzzles, and devouring National Geographic Kids
    articles, all while volunteering at the school library to nurture a cooperative spirit.
  sports: A budding outdoor explorer, Henry Larsen spends afternoons on the community soccer field with the Pine Grove Cubs, cheers for the local professional baseball team the River City Ravens, and enjoys
    seasonal swimming lessons at the YMCA, preferring organized team drills over chaotic playground free-play.
  arts: A creative sketch artist and piano aficionado, Henry Larsen draws detailed animal and machine illustrations inspired by the works of Beatrix Potter and Hayao Miyazaki, and practices piano pieces
    ranging from Beethoven's Fur Elise to the playful melodies of the Pink Panther theme, finding solace in quiet artistic expression.
  travel: An inquisitive young traveler, Henry Larsen loves weekend hikes along the Willow Creek trail, dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., and hopes to
    explore the geysers of Yellowstone National Park, always packing a notebook to catalog leaves and insects.
  culinary: A budding home chef with a palate for both comfort and curiosity, Henry Larsen enjoys assembling banana-and-peanut-butter sandwiches, whipping up simple spaghetti with marinara sauce, and experimenting
    with homemade fruit-infused water using strawberries, blueberries, and mint, while proudly mastering the art of making pancake batter without burning the kitchen.
  core: Henry Larsen is a disciplined, curious 7-year-old who blends scientific zeal with artistic calm, balancing meticulous LEGO engineering and piano practice with compassionate library volunteering.
background:
  cultural: Henry grows up in a middle‑class family in Jacksonville, Florida, where Southern hospitality and coastal lifestyle shape his everyday experiences. Family gatherings often feature traditional
    Southern dishes and church attendance, reinforcing values of community and respect. Weekend trips to the nearby beaches and the St. Johns River expose him to fishing, shell collecting, and marine biology
    curiosity. Jacksonville's multicultural environment, blended with his family's European‑American heritage, provides him with a balanced perspective that appreciates both local customs and broader American
    traditions.
