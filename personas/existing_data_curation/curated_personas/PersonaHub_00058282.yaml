persona_description: An economist who is interested in understanding the relationship between price levels, inflation, and economic growth. They are particularly interested in the use of price indexes such
  as the GDP deﬂator and the CPI, and how they are affected by changes in the economy. They may also be interested in the use of chain-weighted price indexes and the potential for substitution bias in the
  measurement of prices. They are likely to have a strong background in macroeconomics and finance, and be familiar with the concepts of inflation, GDP, and consumer spending.
