personas:
  professional: Jeremy Hoard, a health information management specialist who transforms raw EHR data into actionable quality‑improvement reports, bridges technical and clinical teams with clear training
    sessions, and is quietly charting a path toward a CHISP credential and a future directorship where they will shape AI‑driven analytics to improve patient care.
  sports: Jeremy Hoard, an avid hiker and mountain‑biker who spends weekends on the Wasatch trails, holds a membership with the Salt Lake City Cycling Club, roots for the Utah Jazz and Real Salt Lake, and
    occasionally joins a local CrossFit box to fine‑tune endurance, though they admit to occasionally neglecting post‑ride stretching.
  arts: Jeremy Hoard, a landscape‑photography enthusiast who frequently studies Ansel Adams’ techniques, enjoys sci‑fi novels by Neal Stephenson, streams the Utah Symphony’s seasonal concerts, and unwinds
    by binge‑watching Blade Runner 2049, while they sometimes procrastinate editing photo shoots in favor of solving Rubik’s cubes.
  travel: Jeremy Hoard, a weekend adventurer who has trekked Zion and Canyonlands, dreams of photographing Iceland’s midnight sun, regularly attends tech meetups in Tokyo during annual conferences, and
    prefers spontaneous road‑trip planning over rigid itineraries, though they often delay booking flights until the last minute, risking higher fares.
  culinary: Jeremy Hoard, a self‑taught home chef who loves experimenting with kimchi‑fried rice, sous‑vide salmon, and crafting craft coffee with a Chemex, while they sometimes over‑season dishes in an
    effort to impress friends at community health‑fair potlucks, and they keep a well‑worn notebook of recipe tweaks.
  core: Jeremy Hoard, a data‑driven health informatics professional who balances mountain‑bike thrills, DSLR adventures, and relentless curiosity with a methodical approach to career growth, yet can’t resist
    late‑night puzzle marathons and occasional overspending on tech gadgets.
background:
  cultural: Jeremy grew up in Lehi, Utah, a community shaped by the Intermountain West’s blend of frontier self‑reliance and modern tech growth. His family’s ancestry traces mainly to Northern European
    roots—German, Irish, and Scandinavian—instilling a strong work ethic and respect for education. While the region’s predominant cultural influences include a heritage of community service, outdoor recreation,
    and modest conservatism, Jeremy’s upbringing emphasized openness to diverse viewpoints, encouraging both independent curiosity and collaborative responsibility. This cultural mix informs his balanced
    approach to professional duties, personal interests, and social relationships.
attributes:
  skills: '[''Electronic Health Record (EHR) management'', ''Medical coding (ICD-10, CPT)'', ''HIPAA compliance and data privacy'', ''Data analysis using Excel and SQL'', ''Quality improvement and audit
    processes'', ''Project coordination and documentation'', ''Technical troubleshooting'', ''Interdisciplinary communication'', ''Health information governance'']'
  hobbies: '[''Hiking and trail running in the Wasatch Mountains'', ''Mountain biking on local trails'', ''Landscape photography'', ''Reading science‑fiction and popular science books'', ''Board games and
    puzzle solving'', ''Cooking experimental recipes'', ''Volunteering at community health fairs'', ''Attending tech meetups'', ''Playing guitar casually'']'
  career_goals: Jeremy aims to transition from specialist to a leadership role in health informatics. Over the next five years he plans to earn a Certified Health Informatics Systems Professional (CHISP)
    credential and pursue a master's degree in health informatics. His ultimate ambition is to become a Health Information Management Director, where he can shape organization‑wide data strategies, implement
    AI‑driven clinical analytics, and mentor junior staff. He also hopes to contribute to industry standards by presenting case studies at conferences and publishing articles on record‑keeping best practices.
