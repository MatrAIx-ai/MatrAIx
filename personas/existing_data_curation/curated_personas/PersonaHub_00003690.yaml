persona_description: A researcher or policy analyst with expertise in climate change, water resources, and global food security. They are interested in understanding the implications of climate change on
  water scarcity and drought, and how it affects food imports and economic stability in the European Union. They are also familiar with the IMPREX project and its work package "Water Economy", which focuses
  on mapping EU's global dependency on water resources and assessing vulnerabilities to food security and economic stability. They are likely to be involved in developing policy recommendations to address
  these vulnerabilities and integrate them into long-term EU climate adaptation policy and business planning.
