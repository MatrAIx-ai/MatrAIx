personas:
  professional: Telly Bates is a seasoned registered nurse with over two decades in acute and primary care, leveraging meticulous assessment, triage, and health education skills while channeling a pragmatic
    curiosity into evidence‑based practice and mentoring, all underpinned by an organized, reliable approach to shift coordination and quality improvement.
  sports: Telly Bates is an avid participant in weekly walking groups with their husband, enjoys seasonal recreational softball in the local league, roots for the Atlanta Falcons and Atlanta Hawks, and
    attends community fitness classes that blend yoga with low‑impact cardio to stay flexible and energized.
  arts: Telly Bates lends their alto voice to the church choir, finds inspiration in the soulful rhythms of Aretha Franklin, the improvisational brilliance of John Coltrane, and the uplifting harmonies
    of modern gospel group Kirk Franklin, and often attends weekend jazz nights at the local club.
  travel: Telly Bates favors culturally rich weekend getaways, planning detailed itineraries to historic Southern towns like Savannah and Charleston, while also dreaming of a pilgrimage to New Orleans for
    its jazz heritage and a week‑long family cruise to the Caribbean islands where they can blend relaxation with heritage tours.
  culinary: Telly Bates enjoys experimenting in the kitchen, swapping traditional fried chicken for baked herb‑crusted catfish, turning collard greens into a kale‑infused superfood side, and reinventing
    sweet potato pie with a coconut‑flour crust and a hint of ginger, all while sourcing fresh produce from the community garden.
  core: Telly Bates is a relentlessly organized yet socially vibrant nurse who balances a passion for community health with a habit of over‑scheduling, often juggling extra volunteer shifts while never
    missing a chance to share homemade snacks with coworkers.
background:
  cultural: Telly is an African‑American woman who grew up in the Philadelphia metropolitan area and now resides in Brookhaven, PA. Her Black heritage informs her worldview, personal values, and professional
    dedication to health equity. She maintains strong ties to the Black church community, where music, fellowship, and service are central. Family traditions—such as Sunday meals featuring collard greens,
    gumbo, and sweet potatoes—are celebrated, while she also adapts these foods to support modern health recommendations. Telly is acutely aware of the historic and ongoing disparities faced by Black patients
    in the U.S. healthcare system, which fuels her commitment to culturally competent care, community outreach, and advocacy for better access to preventive services in her neighborhood.
attributes:
  skills: '[''Comprehensive patient assessment'', ''Medication administration'', ''IV therapy and phlebotomy'', ''Wound care'', ''Health education and counseling'', ''Electronic medical record documentation
