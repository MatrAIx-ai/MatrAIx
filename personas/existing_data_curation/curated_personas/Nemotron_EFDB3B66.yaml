  hobbies: '[''Singing in the church choir'', ''Community gardening'', ''Cooking healthy soul‑food dishes'', ''Reading mystery novels'', ''Practicing yoga'', ''Walking with her husband and friends'', ''Volunteering
    at local health fairs'', ''Mentoring high‑school students in healthcare'', ''Attending jazz and gospel performances'', ''Exploring historic sites in Pennsylvania'']'
  career_goals: Telly aims to transition into a nurse manager or charge nurse role within her hospital to shape staffing models, workflow efficiencies, and patient safety protocols. She plans to earn her
    Bachelor of Science in Nursing (BSN) within the next two years, followed by a Master’s in Nursing Leadership, positioning herself for future executive roles in healthcare administration. A long‑term
    ambition is to launch a community health outreach program in Brookhaven that focuses on chronic disease prevention and health equity for African‑American seniors, leveraging her nursing expertise and
    cultural insight. She also hopes to develop a mentorship pipeline for Black nursing students, fostering the next generation of culturally competent clinicians.
