personas:
  professional: Jariel Bell is a veteran automotive service technician with three decades of hands‑on expertise in diagnosing complex engine issues, overhauling both conventional and hybrid powertrains,
    and mentoring apprentices, and they bring a blend of Southern hospitality‑fueled customer communication and a curious yet practical mindset to every repair job.
  sports: Jariel Bell organizes community basketball games, cheering for the Dallas Mavericks and following the Dallas Cowboys football season, and they maintain fitness by shooting hoops at the local park
    and hiking the Texas Hill Country on weekends.
  arts: Jariel Bell plays blues guitar at local jam sessions, drawing inspiration from B.B. King and Stevie Ray Vaughan, and they attend regional art fairs where they admire works by contemporary Southern
    folk artists while occasionally humming along to classic soul records.
  travel: Jariel Bell prefers road trips that blend scenic drives and cultural stops, having recently explored the historic blues lanes of Memphis, the vibrant street food scene of Austin, and they dream
    of driving the Pacific Coast Highway to soak in coastal vistas.
  culinary: Jariel Bell excels at smoking brisket and grilling marinated carne asada, seasoning dishes with home‑grown cilantro, oregano, and a dash of hickory smoke, and they love sharing collard greens
    cooked with smoked turkey legs at family gatherings.
  core: Jariel Bell is an outgoing master‑technician who balances curiosity with practicality, mentors youth over grease‑stained workbenches, and fuels life with blues riffs, classic cars, and a generous
    serving of Southern hospitality.
background:
  cultural: Jariel is an African‑American who grew up in the southern United States, absorbing a rich blend of Southern hospitality, soul music, and community church traditions. His family gatherings feature
    traditional dishes like collard greens and fried chicken, and his upbringing emphasized the importance of resilience, mutual support, and giving back. In Denton, he participates actively in local African‑American
    community events, supports church outreach programs, and values the intersection of Texas culture with his Black heritage. His cultural experiences have shaped his collaborative yet assertive work style,
    his commitment to mentoring the next generation, and his appreciation for both innovation and time‑tested practices.
attributes:
  skills: '[''Automotive diagnostics'', ''Engine repair and overhaul'', ''Hybrid and electric vehicle maintenance'', ''Preventive maintenance scheduling'', ''Parts inventory management'', ''Customer service
    and communication'', ''Workshop safety compliance'', ''Mentoring and apprenticeship training'', ''Digital automotive troubleshooting tools'', ''Vehicle inspection and certification'']'
  hobbies: '[''Playing blues guitar'', ''Community basketball'', ''Classic car restoration'', ''Cooking barbecue and Tex-Mex'', ''Mentoring youth in automotive trades'', ''Attending car shows'', ''Hiking'',
    ''Gardening'', ''Listening to live music'']'
  career_goals: Jariel aims to earn Master Technician ASE certification and become a certified trainer for the automotive trade, allowing him to formalize his mentorship role. He aspires to open a boutique
    garage that emphasizes sustainable repair practices, such as recycling parts and offering services for electric vehicles. Within the next five years, he plans to take on a service department manager
    position, where he can introduce organized workflows while remaining adaptable to new technologies. He also hopes to partner with local community colleges to develop apprenticeship programs that attract
    and support underrepresented youth in the automotive industry.
