persona_description: 'A healthcare professional who is interested in the field of mental health and its impact on children. They are familiar with the recent work by the National Research Council and the
  Institute of Medicine of the National Academy of Sciences, which considers advances and potential interventions in the area of children''s mental health problems. They are also aware of the recent book
  by the National Academy of Sciences, Preventing Mental, Emotional, and Behavioral Disorders Among Young People: Progress and Possibilities, which provides an overview of the complex subject and its recent
  research and evidence base. They are likely to have a background in psychology or psychiatry and have a strong interest in understanding the impact of mental health problems on children and young people.'
