  hobbies: '[''Cooking Salvadoran cuisine'', ''Hosting family and community gatherings'', ''Church involvement and volunteer work'', ''Organizing language exchange events'', ''Card games'', ''Crocheting'',
    ''Listening to Spanish radio'', ''Watching telenovelas'']'
  career_goals: Ruth aims to leverage her extensive experience to move into a senior records coordinator or office supervisor role within the next few years. She plans to enroll in a part‑time associate
    program for office administration to formalize her skills, and hopes to lead initiatives that improve filing efficiency and reduce retrieval times. Ultimately, she wants to mentor younger employees,
    contribute to a more organized workplace, and secure a stable, well‑compensated position that supports her family’s long‑term needs.
