  hobbies: '["Hiking and landscape photography","Reading nonfiction on technology and business","Puzzle solving (crosswords, Sudoku)","Board game evenings with close friends","Experimental cooking","DIY
    woodworking projects"]'
  career_goals: She aims to progress to a procurement leadership role, such as Procurement Manager or Director, within the next five years. Susanna plans to earn the Certified Professional in Supply Management
    (CPSM) credential and possibly pursue an MBA focused on supply chain strategy. She is driven to implement digital transformation projects that integrate AI-driven spend analytics, improve supplier diversity,
    and embed sustainability into the purchasing process. Ultimately she envisions leading a high‑impact sourcing team that balances cost efficiency with innovation, positioning her organization as a market
    leader.
