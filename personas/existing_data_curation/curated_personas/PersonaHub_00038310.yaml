persona_description: A geologist or soil scientist who studies the mechanics of soil erosion and the impact of wind on soil surface processes. They are interested in understanding the physical impact of
  wind-driven raindrops on soil and how it affects sand detachment. They are likely to be familiar with the concepts of kinetic energy and the effect of wind on soil erosion, and they may have conducted
  similar experiments or research on this topic. They may have a background in meteorology or environmental science, and they are interested in the implications of their findings for understanding the Earth's
  surface processes.
