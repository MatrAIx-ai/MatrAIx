  hobbies: '[''Watercolor Painting'', ''Attending Art Fairs'', ''Community Theater Volunteering'', ''Cooking Spanish Cuisine'', ''Playing Soccer'', ''Photography'', ''Hiking'', ''Reading Travel Memoirs'']'
  career_goals: Vicente aims to move into a supervisory role within the next two years, targeting a store manager position where he can shape the shopping experience and mentor staff. In the longer term,
    he hopes to combine his retail knowledge with his passion for art by opening a boutique that showcases local artisans and Spanish‑inspired décor. To support these ambitions, he plans to earn a GED and
    take community‑college courses in business management and digital marketing, allowing him to modernize the store’s online presence and expand its reach.
