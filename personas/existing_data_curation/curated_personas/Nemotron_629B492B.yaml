    games)"]'
  hobbies: '["Reading mystery and science‑fiction novels", "Sketching and watercolor painting", "Playing acoustic guitar", "Cooking authentic Mexican meals", "Succulent indoor gardening", "Solving Sudoku
    and logic puzzles", "Playing single‑player RPG video games", "Journaling and writing poetry"]'
  career_goals: Bethzaida aims to complete her high‑school equivalency by age 18 and then enroll in a community‑college program for health‑information technology. She is motivated to become a certified
    medical coder, a role that offers clear, structured workflows and a quiet work environment where her attention to detail can thrive. Leveraging her bilingual fluency, she plans to specialize in coding
    for Spanish‑speaking patient populations, helping bridge language gaps in healthcare delivery. Long‑term, she aspires to advance to a health‑information analyst position, allowing her to apply her organizational
    strengths while maintaining a predictable, independent career path.
