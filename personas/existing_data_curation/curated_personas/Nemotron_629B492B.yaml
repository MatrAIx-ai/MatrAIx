personas:
  professional: Bethzaida Fernandez, an aspiring medical coder, leverages bilingual fluency and a razor‑sharp eye for detail to translate complex healthcare data into clean, standardized records, thriving
    in the quiet, structured environment she craves.
  sports: Bethzaida Fernandez prefers low‑impact exercise, joining a small community hiking club for weekend trail walks in the spring and autumn, while cheering on the Los Angeles Lakers during basketball
    season and occasionally practicing beginner yoga at home to maintain flexibility.
  arts: Bethzaida Fernandez spends quiet evenings watercolor‑painting dreamy cityscapes, strumming acoustic renditions of Joni Mitchell while turning pages of Neil Gaiman's latest novel, and curates a playlist
    that swaps between the ambient piano of Ludovico Einaudi and the cinematic scores of Hayao Miyazaki films.
  travel: Bethzaida Fernandez favors meticulously planned solo getaways to low‑stimulus locales, having trekked the volcanic trails of Oaxaca's Sierra Norte and dreaming of a spring pilgrimage to Kyoto's
    Zen gardens where she can sketch koi ponds in silence.
  culinary: Bethzaida Fernandez, an intermediate home chef, delights in perfecting authentic Mexican dishes like chiles en nogada and handmade corn tortillas, savoring the aromatic blend of roasted poblano,
    fresh cilantro, and toasted cumin, while also experimenting with spice‑balanced mole sauces that she serves alongside crisp garden salads from her succulent collection.
  core: Bethzaida Fernandez is a quietly ambitious teen who channels solitary pursuits—coding, cooking, and sketching—into disciplined rituals, balancing meticulous precision with introspective creativity,
    even if occasional late‑night RPGs disrupt her sleep schedule.
background:
  cultural: Bethzaida is a first‑generation Mexican‑American raised in Irving, Texas, within a bilingual household where Spanish is spoken daily. Her parents emigrated from central Mexico, bringing traditions
    such as Día de los Muertos, quinceañera celebrations, and a strong emphasis on family cohesion. These customs are woven into her life through home‑cooked Mexican cuisine, participation in local cultural
    festivals, and Catholic observances, although she also navigates broader American influences typical of Dallas County, such as attending public libraries and community events. This bicultural environment
    has shaped her identity, giving her fluency in both languages, a respect for Mexican heritage, and an ability to adapt to the multicultural fabric of suburban Texas.
attributes:
  skills: '["Bilingual Spanish‑English communication", "Basic computer operation (Microsoft Office, internet research)", "Cooking traditional Mexican dishes (e.g., tamales, mole, enchiladas)", "Organizational
