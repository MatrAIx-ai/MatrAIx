persona_description: A community leader and advocate for hygiene and sanitation, dedicated to eliminating trachoma and promoting personal hygiene in the Narok District of Kenya. Sarah Kiruri, a teacher
  at Kishermoruak Primary School, is using her role as a teacher to educate her students about the importance of personal hygiene and the use of latrines. Her passion for community advocacy and her determination
  to eliminate trachoma have inspired her to travel to neighboring communities to talk to women about the importance of facial cleanliness and the use of latrines. Her work has led to improvements in the
  school's performance and the health of the school's students, as well as the health of the community as a whole. Sarah's work is an example of how individuals can use their knowledge and skills to make
  a positive impact on their communities and the world.
