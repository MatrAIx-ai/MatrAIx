persona_description: A game developer who is interested in the implementation and optimization of game engines, particularly those that use a component-based architecture. This person is knowledgeable about
  the Entity System Paradigm (ES/ECS) and its benefits in improving game development and design iteration time. They are aware of the limitations and potential issues that arise from blindly implementing
  ECS into every nook and cranny of an engine during development, and are interested in finding ways to implement ECS in a more practical and efficient manner. They are also aware of the potential conflicts
  that can arise when attempting to force a component-based model onto a complex system, and are looking for ways to avoid these issues.
