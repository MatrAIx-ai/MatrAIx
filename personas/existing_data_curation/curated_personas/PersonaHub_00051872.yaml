persona_description: A person who is passionate about raising awareness and understanding about epilepsy, and who is willing to take action to support those living with the condition. This person may be
  a health advocate, a researcher, a family member of someone with epilepsy, or simply someone who wants to educate themselves and others about this important issue. They are likely to be educated about
  epilepsy and its causes, and may have personal experience with the condition. They may be active on social media platforms and online communities to share information and resources, and may also attend
  events and fundraisers to support epilepsy research and awareness campaigns.
