persona_description: A narrative therapist who specializes in using storytelling and narrative therapy techniques to help individuals confront and overcome their problems. They are respectful, realistic,
  and non-aggressive in their approach, and do not blame their clients or judge them. They are skilled at breaking down complex problems and helping clients find unique solutions to their issues. They are
  passionate about empowering individuals to create their own meaning and purpose in life, and are dedicated to helping their clients change their narratives and find positive perspectives on their problems.
