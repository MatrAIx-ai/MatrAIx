personas:
  professional: Paula Stallworth is an aspiring nursing student who integrates quick tech problem‑solving and debate‑sharp public speaking to dominate clinical simulations, while they channel their competitive
    nature toward topping their class and ultimately serving emergency care in their Oxford community.
  sports: Paula Stallworth dominates pick‑up basketball at Beltline Park, plays for the Oxford High School varsity team in the winter, roots for the Mississippi State Bulldogs during college season, and
    joins the Oxford Cycling Club for weekend trail rides that provide the solitude they crave.
  arts: Paula Stallworth lifts their church choir voice in gospel harmonies, hones improv comedy skills inspired by Tina Fey, devours sci‑fi novels by Octavia Butler, and battles friends in video‑gaming
    marathons of 'Overwatch' and 'Fortnite', often echoing lines from 'The Matrix' while they test vocal runs.
  travel: Paula Stallworth enjoys spur‑of‑the‑moment hikes on the Natchez Trace and bike rides through historic downtown Oxford, but also dreams of a road trip to Asheville’s Blue Ridge Mountains and a
    cultural immersion in Tokyo, balancing frugal local outings with big‑ticket wanderlust sparked by Instagram reels, while they also love discovering hidden coffee shops along the way.
  culinary: Paula Stallworth revamps classic Southern comfort food by swapping pork fat for olive oil, swapping grits for quinoa, and adding kale to collard greens, crafting TikTok‑friendly videos featuring
    sweet potato‑black bean tacos, baked watermelon rind chips, and a low‑sugar peach cobbler, while they showcase the quick, nutritious twists on their feed.
  core: Paula Stallworth is a fiercely curious, competition‑driven teen who balances a passion for community‑focused nursing, inventive healthy cooking, and spontaneous outdoor adventures, all while they
    navigate life with calm resilience and a dash of organized chaos.
background:
  cultural: Paula grew up in a close‑knit Black family in Oxford, Mississippi, where Southern hospitality, church life, and community traditions shaped her identity. Family gatherings centered around soulful
    cooking, gospel music, and storytelling about African‑American history, giving her a deep appreciation for her cultural roots. Participation in local Juneteenth celebrations and the town’s vibrant music
    scene exposed her to a blend of traditional and contemporary Black art forms. This heritage informs her love for soulful cuisine, rhythmic expression in choir, and a strong sense of responsibility to
    uplift her community through both health care and cultural sharing.
attributes:
  skills: '[''Quick learning of new technologies'', ''Basic web development (HTML/CSS)'', ''Public speaking and debate'', ''Team sports (basketball)'', ''Cooking Southern soul‑food'', ''First‑aid certified'',
    ''Choir singing'', ''Social media content creation'', ''Problem solving'', ''Adaptability'']'
  hobbies: '[''Cooking Southern soul‑food'', ''Playing basketball'', ''Improv comedy'', ''Listening to R&B and hip‑hop'', ''Hiking local trails'', ''Competitive video gaming'', ''Reading science fiction'',
    ''Creating TikTok videos'', ''Photography'', ''Volunteering at community center'']'
  career_goals: Paula plans to enroll in the nursing program at a nearby community college, aiming to earn an RN license and eventually become a nurse practitioner who can serve the health‑care needs of
    her Oxford community. She is determined to graduate at the top of her class, secure scholarships, and gain clinical experience in emergency care, where her calm demeanor and resilience will be assets.
    Alongside her healthcare career, she hopes to launch a YouTube channel and small catering side‑business that highlights quick, nutritious twists on classic Southern dishes, merging her culinary talent
    with a passion for community wellness.
