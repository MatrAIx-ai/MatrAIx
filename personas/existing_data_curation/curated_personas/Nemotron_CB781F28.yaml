personas:
  professional: Jason Turrentine is a self‑taught visual technologist who leverages Procreate, Photoshop, and Python to craft interactive digital illustrations, applying their methodical project planning
    and calm, strategic mindset—honed by chess competition—to meet tight deadlines and produce polished portfolio pieces.
  sports: Jason Turrentine is an avid weekend hiker who traverses Bucks County’s rolling trails with the local Trailblazers Hiking Club, while also cheering for the Philadelphia Eagles in football and the
    Philadelphia Flyers in hockey, preferring low‑impact cardio over competitive team sports.
  arts: Jason Turrentine immerses themselves in modern art, drawing inspiration from the bold color fields of Mark Rothko, the surreal juxtapositions of Salvador Dalí, and the streetwise irony of Banksy,
    while curating indie ambient playlists and experimenting with digital painting techniques that echo the aesthetics of contemporary indie game studios.
  travel: Jason Turrentine approaches travel like a detailed project plan, mapping out budget‑friendly weekend treks to the historic streets of Philadelphia, dreaming of immersive art tours in Tokyo’s Akihabara
    district, and striving to capture the sunrise over Iceland’s basalt cliffs for future visual concepts.
  culinary: Jason Turrentine enjoys a modest kitchen repertoire, expertly whipping up spicy ramen with miso broth, crafting pepperoni pizza with hand‑tossed dough, and experimenting with avocado‑infused
    smoothies, yet they frequently skip meals when deep in a coding session, relying on energy drinks for a quick caffeine boost.
  core: Jason Turrentine blends a chess‑master’s strategic cool with a restless curiosity, turning every sketch, code line, and hike into a meticulously planned experiment—though they often sacrifice sleep
    and regular meals to chase the next creative breakthrough.
background:
  cultural: Jason comes from a middle-class, European-American family rooted in the suburban community of Doylestown, Bucks County. His grandparents emigrated from Ireland and Germany in the mid-20th century,
    and family traditions include modest holiday gatherings and an emphasis on self-reliance. Growing up near the historic Mercer Museum and the James A. Michener Art Museum, he has been exposed to a blend
    of colonial heritage and a vibrant contemporary arts scene. The local culture values education, community involvement, and a DIY spirit, which aligns with his independent learning habits. While he identifies
    as American, his cultural influences reflect a mix of Irish storytelling, German precision, and the progressive artistic environment of modern Bucks County.
