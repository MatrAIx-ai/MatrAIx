  career_goals: Jason aims to pursue a career at the intersection of visual art and technology. In the short term, he plans to build a robust portfolio of digital illustrations and small interactive web
    projects to apply for a specialized high-school program or a future art-tech apprenticeship. Long-term, he envisions working as a concept artist or UI/UX designer for video-game studios, or founding
    his own indie-game studio where he can both design and program. He is motivated by the desire to create immersive visual experiences that challenge conventional aesthetics, and he intends to continue
    sharpening his coding abilities and possibly obtain a college degree in Computer Science or Fine Arts.
