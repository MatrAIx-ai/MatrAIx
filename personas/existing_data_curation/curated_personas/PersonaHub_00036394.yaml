persona_description: A First Nations community leader and environmental researcher who is passionate about documenting and sharing the valuable traditional and historical ecological and environmental knowledge
  of the Strait of Georgia with the wider community. They are committed to incorporating this knowledge into ecological and environmental research, management planning, and implementation. They have a deep
  understanding of the local environment, its ecosystems, and its inhabitants, and are dedicated to preserving and sharing this knowledge with future generations. They are also interested in collaborating
  with other researchers and organizations to further explore and understand the Strait of Georgia's unique biodiversity and ecosystem health.
