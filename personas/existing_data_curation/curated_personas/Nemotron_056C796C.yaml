personas:
  professional: Duaa Griffin, a diligent office administrator in a bustling Phoenix firm, leverages their strong Microsoft Office and Google Workspace skills, friendly customer service, and practical mindset
    to keep daily operations humming, while their preference for structured schedules is tempered by a relaxed attitude toward strict planning, and they position themselves for a future CAP certification
    and an eventual move into office management and project coordination.
  sports: Duaa Griffin embraces an active lifestyle through weekend Sonoran Desert hikes with the Desert Trail Hikers club, regular yoga sessions at Phoenix’s Flow Yoga studio, and cheering on the Phoenix
    Suns, Arizona Cardinals, and Arizona Diamondbacks, while they prefer low‑impact workouts over competitive sports.
  arts: Duaa Griffin channels their creative side through desert photography inspired by Ansel Adams, devours contemporary fiction by authors like Sally Rooney, and fills their kitchen with soulful R&B
    and neo‑soul playlists featuring H.E.R., Leon Bridges, and Kirk Franklin, while they occasionally attend Phoenix’s First Friday art walks and indie theater productions starring Mahershala Ali.
  travel: Duaa Griffin, who balances a tight student budget with a love for off‑the‑grid adventures, often plans low‑cost road trips to nearby marvels like Sedona’s red rocks, the Grand Canyon, and Santa
    Fe’s art scene, while they dream of a future hike through New Zealand’s South Island and a cultural immersion in Oaxaca’s markets.
  culinary: Duaa Griffin blends Southern comfort foods like fried chicken and shrimp‑and‑grits with Arizona’s bounty of fresh tomatoes, cilantro, and heirloom chilies from their balcony herb garden, and
    they often season with smoked paprika and a dash of bourbon glaze for a soulful twist.
  core: Duaa Griffin is a warm‑hearted, structure‑seeking admin who juggles desert hikes and yoga, often over‑packing their camera bag and procrastinating on bills, while they nurture a relentless love
    for soulful cooking.
background:
  cultural: Duaa is a second‑generation African American raised in Phoenix. Her family’s roots trace back to the Great Migration from the Mississippi Delta, and she grew up steeped in traditions such as
    Juneteenth celebrations, attending a Baptist church, and listening to gospel, soul, and modern R&B. The local Black community’s emphasis on mutual support, resilience, and cultural pride influences
    her values. She actively participates in community festivals, supports Black-owned businesses, and maintains strong family ties that celebrate heritage through food, music, and storytelling.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Google Workspace (Docs, Sheets, Calendar)'', ''Data entry and record-keeping'', ''Appointment scheduling'', ''Customer service and communication'',
