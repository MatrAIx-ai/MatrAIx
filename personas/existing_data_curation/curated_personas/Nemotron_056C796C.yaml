  hobbies: '[''Hiking in the Sonoran Desert'', ''Yoga'', ''Photography'', ''Cooking soulful recipes'', ''Herb gardening'', ''Reading contemporary fiction'', ''Journaling'', ''Listening to R&B/neo‑soul/gospel
    music'', ''Volunteering at community center'']'
  career_goals: Duaa aims to complete an associate degree in Business Administration while earning certifications such as the Certified Administrative Professional (CAP). In the next few years she hopes
    to advance to an Office Manager role, overseeing a small team and streamlining office processes. Long‑term, she aspires to transition into project coordination or human resources, leveraging her people‑focused
    skills and desire for a stable, structured career path that also allows for occasional flexibility.
