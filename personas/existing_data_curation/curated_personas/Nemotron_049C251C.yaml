  hobbies: '[''Block building (stacking towers)'', ''Drawing and coloring'', ''Nature exploration (rock collecting, insect watching)'', ''Pretend play (kitchen, doctor)'', ''Storytime reading at the library'',
    ''Memory and matching games'', ''Singing children’s songs'']'
  career_goals: Patricia dreams of a future where she can combine her love for building and caring for living things. She often says she wants to be an engineer who designs playgrounds, a veterinarian who
    helps neighborhood pets, or a teacher who shares stories and encourages curiosity. Her competitive streak pushes her to want to be the best in school, while her practical side keeps her focused on learning
    the basic skills that will help her achieve those ambitions.
