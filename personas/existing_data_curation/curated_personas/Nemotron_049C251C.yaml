personas:
  professional: Patricia Westman, a preschool explorer who eagerly builds block towers and experiments with both novel shapes and classic stacking techniques, showcases a blend of curiosity and practicality
    while treating each play session as a mini‑project with flexible rules.
  sports: Patricia Westman, a budding soccer enthusiast on the local kindergarten team, darts between the goalposts with a competitive spark, prefers spontaneous playground tag over rigid drills, and cheers
    for the nearby professional baseball team, the Chicago Cubs, during family outings.
  arts: Patricia Westman, an avid fan of the animated series Peppa Pig and the musical group The Wiggles, spends afternoons coloring under the guidance of storybooks and occasionally stages imaginative
    puppet shows, blending curiosity for new characters with a love for familiar songs while maintaining modest talkativeness in group performances.
  travel: Patricia Westman, who delights in short road trips to the local aquarium and eagerly dreams of a future visit to Disney World, prefers spontaneous family outings over meticulously planned vacations,
    balancing a love for new sights with the comfort of familiar bedtime routines.
  culinary: Patricia Westman, who adores cheesy macaroni, chicken nuggets, and helping mash ripe bananas for banana bread, often insists on sprinkling cinnamon on her toast and occasionally forgets to finish
    her vegetables, reflecting a relaxed, slightly disorganized approach to mealtime.
  core: Patricia Westman, the curious yet easy‑going four‑year‑old who balances new experiments with familiar routines, competes fiercely in sandbox games, saves glitter stickers like tiny fortunes, and
    faces doctor visits with calm confidence, all while occasionally forgetting to tidy up her crayons.
background:
  cultural: Patricia is being raised in a white, Midwestern family in Sturgis, Michigan, a small town in St. Joseph County. Her upbringing reflects typical Midwestern values of community, self‑reliance,
    and seasonal outdoor activities. She celebrates national holidays such as Thanksgiving and the Fourth of July, participates in local school events, county fairs, and community gatherings, and is exposed
    to a blend of rural and small‑town cultural traditions that emphasize family involvement, modesty, and a balanced approach to learning and play.
attributes:
  skills: '[''Color and shape recognition'', ''Basic counting (1‑10)'', ''Crayon drawing and coloring'', ''Block stacking and simple construction'', ''Simple storytelling and vocabulary development'', ''Fine
