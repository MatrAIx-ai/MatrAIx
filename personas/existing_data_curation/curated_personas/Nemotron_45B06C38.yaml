  hobbies: '[''Co‑ed soccer league'', ''Running club'', ''Strategy board games (Chess, Settlers of Catan)'', ''Photography'', ''Volunteer work at food pantry'', ''Puzzle solving (crosswords, Sudoku)'']'
  career_goals: Peter aims to advance to a supervisory role within the radiology department, earning a senior technologist designation and acquiring additional certifications in advanced CT and interventional
    imaging. He plans to complete a part‑time associate degree in health information management to prepare for future administrative responsibilities. Long‑term, he envisions establishing a community‑focused
    mobile imaging service that offers convenient, high‑quality diagnostic scans, while continuing to mentor emerging technologists and champion evidence‑based imaging practices.
