personas:
  professional: Alba Caula is a budding visual artist blending sketching with street mural collaborations, channeling their curiosity into a high‑school portfolio that already includes a series of mixed‑media
    pieces inspired by East LA’s colorful walls and indie music vibes.
  sports: Alba Caula follows the Los Angeles Dodgers and the LA Galaxy fervently, occasionally joining a neighborhood basketball pickup at the East LA Community Center on weekends and using sketching breaks
    as spontaneous cardio, though they admit to skipping regular workouts when homework piles up.
  arts: Alba Caula immerses themselves in the works of street artist Shepard Fairey, the mural legacy of Diego Rivera, indie rock band Tame Impala and Latin alternative group Café Tacvba, regularly attending
    local art walks, curating a personal zine featuring poetry, short stories, and photography of urban street scenes that reflect their fascination with color and narrative.
  travel: Alba Caula prefers spontaneous weekend trips, often hitching the Metro to explore the vibrant murals of the Arts District and dreaming of a future backpacking adventure through Oaxaca’s historic
    streets and the neon‑lit alleys of Tokyo, balancing limited pocket money with a love for cultural immersion.
  culinary: Alba Caula loves experimenting in the kitchen, mastering homemade tamales with masa and pork, adding a twist of roasted corn and chipotle to classic tacos al pastor, and often throwing together
    chilaquiles topped with queso fresco and avocado, though they sometimes forget to set timers and end up with over‑cooked rice.
  core: Alba Caula is a color‑obsessed teen who sketches on bus windows, cooks daring taco variations, and journals midnight thoughts while forever losing track of their sketchbooks in the swirl of East LA’s
    street art.
background:
  cultural: Alba grows up in a Mexican‑American household in Los Angeles, where Spanish is spoken daily and Mexican traditions are honored. Her family celebrates Día de los Muertos with homemade altars,
    prepares classic dishes during holidays, and participates in local cultural festivals. She frequently visits community centers that offer after‑school art programs focused on Latino heritage, and she
    draws inspiration from the city’s extensive mural culture, many of which celebrate Mexican history and contemporary issues. Her bicultural identity shapes her worldview, giving her a strong sense of
    belonging to both Mexican roots and the diverse tapestry of Los Angeles.
