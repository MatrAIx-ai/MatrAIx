  career_goals: Alba dreams of turning her artistic passions into a professional career. In the next few years she hopes to earn a scholarship to an art‑focused college in Los Angeles, study concept art
    and illustration, and begin building a freelance portfolio that highlights her Mexican cultural motifs. Ultimately she aims to work for a video‑game studio or animation house where she can create characters
    and visual narratives, while also giving back to her community by leading art workshops for Mexican‑American youth. She wants her work to bridge her heritage and contemporary storytelling, and she is
    determined to develop the discipline needed to meet deadlines despite her relaxed approach.
