personas:
  professional: Stephanie Flowers, a field service engineer specializing in ATM, kiosk, and office equipment maintenance, leverages their meticulous documentation habit, competitive drive, and love of systematic
    problem‑solving to develop data‑driven service checklists that cut downtime by 15% while mentoring junior technicians.
  sports: Stephanie Flowers, a member of the local Lebanon Hiking Club, spends weekends trekking Hocking Hills State Park, keeps their cardio sharp with early‑morning runs while cheering on the Cleveland
    Browns in the fall and the Cincinnati Reds during baseball season, and they practice yoga at a community studio to offset the physical strain of heavy equipment lifts.
  arts: Stephanie Flowers, an avid attendee of the West Cleveland Community Theater and a fan of folk‑rock artist Sufjan Stevens and indie filmmaker Greta Gerwig, channels their curiosity into building
    custom LED displays for maker‑space art installations, while they unwind with a nightly habit of solving crossword puzzles themed around classic literature.
  travel: Stephanie Flowers, who plans trips with a spreadsheet itinerary to maximize efficiency, has explored Chicago’s tech conferences and the historic streets of Savannah, but they dream of attending
    a robotics expo in Tokyo and hiking Iceland’s volcanic trails, balancing a modest budget with occasional splurges on flight upgrades for work‑related travel.
  culinary: Stephanie Flowers, a competent home cook who favors streamlined meals, often prepares grilled chicken with rosemary, roasted sweet potatoes, and a side of fresh garden kale tossed in olive oil,
    while they perfect their signature batch of Ohio‑style Cincinnati chili seasoned with cinnamon and cocoa, and they enjoy experimenting with Arduino‑controlled sous‑vide setups for precise temperature
    cooking.
  core: Stephanie Flowers, a disciplined tech tinkerer who can’t resist a well‑organized toolbox and secretly hoards vintage circuit boards, blends Midwestern pragmatism with a competitive streak that fuels
    both their career ascent and nightly Sudoku marathons.
background:
  cultural: Stephanie grew up in a modest, middle‑class family in a small town near Lebanon, Ohio. Her upbringing reflects classic Midwestern values of hard work, self‑reliance, and community responsibility.
    Though her family has Protestant roots, the household emphasized practical education and modest ambition rather than strong religious observance. Local community events, school programs, and regional
    fairs fostered a sense of belonging while encouraging hands‑on learning. This background, combined with the region’s steady industrial base, shaped her pragmatic outlook, disciplined work ethic, and
    appreciation for concrete results.
attributes:
  skills: '["ATM hardware troubleshooting", "Office equipment repair", "Electronic circuit diagnostics", "Firmware flashing and updates", "Network configuration for devices", "Preventive maintenance scheduling",
    "Technical documentation and reporting", "Inventory management", "Regulatory compliance (PCI‑DSS)", "Team training and mentorship"]'
  hobbies: '["DIY electronics", "Home automation projects", "Chess", "Hiking", "Technical non‑fiction reading", "Sudoku and puzzles", "Gardening", "Maker‑space meetups"]'
  career_goals: Stephanie aims to advance to a senior field service engineer role within the next three years, obtaining vendor‑specific certifications for the latest self‑service kiosk platforms. She aspires
    to lead a regional technical support team, overseeing service quality, scheduling, and continuous improvement initiatives. Long‑term, she envisions moving into a technical operations manager position
    where she can shape maintenance strategy for multiple locations and mentor a pipeline of skilled technicians. To support these goals, she plans to complete an associate degree in electronics technology
    and pursue certifications such as CompTIA A+ and Certified Service Technician (CST).
