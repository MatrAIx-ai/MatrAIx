  career_goals: From her early love of caring for others and appreciation for predictable environments, Kristin envisions a future where she can help people in a practical, nurturing role. She often says
    she wants to be a teacher when she grows up because she likes sharing stories and guiding younger children, and she also expresses interest in becoming a nurse or a community volunteer who can support
    families. Her long‑term ambition is to work in a stable, people‑focused profession that allows her to maintain a consistent schedule while making a positive difference.
