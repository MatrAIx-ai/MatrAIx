personas:
  professional: Kristin Burrough, a budding early‑childhood educator who spends their afternoons reenacting storytime with their stuffed animals and practicing gentle classroom routines, they already show
    the compassionate and cooperative traits that will define their future teaching style.
  sports: Kristin Burrough, an energetic toddler who loves splashing in the splash pad at the community park, attends a weekly parent‑and‑child gymnastics class, and cheerfully watches the Detroit Tigers
    game on family movie night, they frequently shout ‘go Tigers!’ while clutching their tiny foam baseball.
  arts: Kristin Burrough, an enthusiastic fan of nursery‑rhythm classics, sings along to Raffi’s “Baby Beluga,” dances to Sesame Street’s alphabet song, and proudly displays their crayon‑smeared artwork
    at the local library’s storytime showcase, they draw inspiration from Disney’s animated wonderland.
  travel: Kristin Burrough, an adventurous little explorer who has already strolled through the farmer’s market stalls with their mom, built sandcastles on the shores of Lake Michigan, delighted at the
    historic carriage rides on Mackinac Island, and giggled through the magical lights of Disney World, they always travel with their parents’ trusty red wagon in tow.
  culinary: Kristin Burrough, a budding food critic in the making, savors buttery mac and cheese, dip‑ready apple slices with peanut butter, and helps stir the batter for their family’s blueberry pancakes,
    they politely refuse peas and insist on a side of chicken nuggets whenever dinner is served.
  core: Kristin Burrough, a routine‑loving, compassionate two‑year‑old who clings to their beloved blanket, insists on bedtime stories at the same hour, occasionally refuses unfamiliar foods, and can turn
    a simple block tower into an hour‑long collaborative construction project with any willing playmate, they also have a habit of leaving a trail of toys across the living room floor.
background:
  cultural: Kristin comes from a white, Midwestern family in Birmingham, Michigan. Her home reflects typical suburban values of the region—family‑centered gatherings, celebrations of holidays like Thanksgiving,
    Christmas, and the Fourth of July, and participation in community events such as the local farmer’s market and church‑based family programs. Her parents emphasize courtesy, neighborliness, and a practical
    work ethic, which align with the cultural norms of Oakland County’s middle‑class communities. The local climate influences her outdoor play with seasonal activities, from playing in the leaves during
    autumn to building snowmen in winter.
