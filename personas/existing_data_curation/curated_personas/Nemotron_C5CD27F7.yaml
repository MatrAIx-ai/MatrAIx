personas:
  professional: Maurice Kelley, an aspiring mechanical engineer, leverages their meticulous organization and love for structure to excel at building detailed model kits, designing redstone circuits in Minecraft,
    and tutoring peers in science projects, laying early foundations for a future in engineering.
  sports: Maurice Kelley, a dedicated member of the Buffalo Public Schools varsity basketball team, also avidly follows the Buffalo Bills and the Buffalo Sabres, spends winter afternoons skating at the
    Erie Canal Harbor, and participates in a local youth hockey club, balancing competitive drive with a cooperative team spirit.
  arts: Maurice Kelley, a disciplined piano learner, enjoys practicing Chopin’s Nocturnes and the pop anthems of Imagine Dragons, sketches technical diagrams reminiscent of Leonardo da Vinci, and binge‑reads
    science‑fiction novels by Isaac Asimov, allowing music and literature to fuel their creative problem‑solving.
  travel: Maurice Kelley, an organized explorer, plans trips with detailed checklists, favors weekend getaways to Niagara Falls and annual family road trips to Washington, D.C., while dreaming of a future
    summer visit to Tokyo’s Akihabara district to experience cutting‑edge technology and anime culture.
  culinary: Maurice Kelley, a budding chef, relishes the tangy heat of buffalo‑style chicken wings with blue cheese dip, enjoys crafting homemade pepperoni pizza topped with mozzarella and oregano, and
    often experiments with baking chocolate chip cookies using dark chocolate chunks, though they sometimes over‑bake the edges in their quest for perfect crispness.
  core: Maurice Kelley, a hyper‑organized 13‑year‑old with a passion for model kits and piano, balances disciplined routines with a love for strategic gaming, yet occasionally lets perfectionism delay simple
    chores.
background:
  cultural: Maurice was raised in a middle-class white family in Buffalo, New York, with Irish-American roots. His upbringing reflects the values of hard work, community involvement, and respect for tradition
    common in the region. He enjoys local customs such as watching the Buffalo Bills, eating wing nights, and celebrating seasonal events like the Buffalo Winter Festival. His family emphasizes education,
    punctuality, and courteous interaction, shaping his disciplined and cooperative personality.
