  career_goals: Maurice aims to attend a rigorous high school with a strong STEM curriculum, then pursue an engineering degree—preferably civil or mechanical engineering—so he can design and improve infrastructure
    in his hometown. He aspires to combine his love for organized projects with a desire to serve his community, eventually working for a city planning department or a construction firm. In the short term,
    he plans to earn leadership positions in his school's robotics club and maintain high academic achievement.
