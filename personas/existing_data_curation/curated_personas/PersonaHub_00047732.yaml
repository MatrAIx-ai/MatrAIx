persona_description: A Certified Public Accountant (CPA) with a specialization in auditing and risk management, and who also has expertise in tax situations and compliance with various laws and regulations.
  They have completed 150 credit hours at an accredited college or university, including several accounting courses, and have passed an exam that is broken up into the four sections of auditing and attestation,
  business environment and concepts, financial accounting and reporting, and regulation. They have a strong understanding of financial markets, business environments, and industry trends and are adept at
  applying their knowledge in business settings. They have experience in evaluating complicated tax situations and helping clients ensure they are complying with various laws and regulations. They have
  gained employment as accountants and auditors in businesses, accounting firms, and government agencies such as the Internal Revenue Service. They have a strong grounding in accounting methods and theories,
  and are trained in management practices. They possess advanced knowledge of investment practices and help organizations and individuals increase their wealth by advising them on emerging markets, forecasting
  the performance of the stock market, managing high value portfolios, and presenting new investment opportunities. They are highly specialized in financial management and possess advanced knowledge of
  investment practices.
