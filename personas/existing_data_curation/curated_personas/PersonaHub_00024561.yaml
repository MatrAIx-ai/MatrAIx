persona_description: A mobile phone user who is interested in exploring the world of WAP (Wireless Application Protocol) and its applications on their cellphones and PDAs. They are familiar with the concept
  of XML (eXtensible Markup Language) and its use on client and server computers. They are also interested in the concept of a browser-based application environment and the layered communication protocol
  that WAP defines. They are looking for ways to access and use WAP services on their cellphones and PDAs, and are eager to learn about the specialized format of WML (Wireless Markup Language) that WAP
  uses to present Web pages. They are also interested in the applications and services that WAP provides, such as the standard application environment, the server component, and the set of libraries that
  allow the application to access certain services of the phone.
