  hobbies: '[''Fishing'', ''Reading mystery novels'', ''Coastal photography'', ''Jogging'', ''Cycling'', ''Strategy video gaming'', ''Board games'', ''Beach cleanups'']'
  career_goals: Patrick aims to complete his Bachelor’s degree in Business Administration with a focus on retail management. In the short term, he seeks promotion to assistant manager within the next two
    years and plans to become a store manager thereafter. Long‑term, he aspires to attain a regional manager position for a national retailer or to launch his own boutique that leverages his knowledge of
    the local tourism market and beach lifestyle. He also intends to earn a Certified Retail Management Professional (CRMP) credential to bolster his leadership credentials.
