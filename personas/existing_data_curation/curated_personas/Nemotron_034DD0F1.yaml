    media engagement for community awareness'']'
  hobbies: '[''Gardening'', ''Hiking'', ''Quilting'', ''Cooking and sharing recipes'', ''Community theater acting'', ''Participating in book club'', ''Volunteering at local food bank'', ''Running in charity
    events'', ''Listening to folk music gatherings'', ''Attending local history tours'']'
  career_goals: Dorothy aims to expand the reach of her agency beyond Nashport, establishing a regional community hub that serves multiple rural townships in Licking County. She plans to secure a steady
    stream of grant funding and private donations to create a sustainable financial base, while also pursuing a GED and a certificate in nonprofit management to formalize her expertise. Long‑term, she envisions
    stepping into a county‑wide director role, mentoring younger staff, and launching a youth‑leadership mentorship program that channels her love of community building into the next generation. Her ambition
    is to be recognized as a leading voice for rural mental‑health and social‑service innovation in Ohio.
