  career_goals: Lai aims to transition into a lead engineer role within the next three years, eventually becoming a software architect who shapes technical strategy for high‑impact products. He is driven
    to champion best practices in code quality, scalability, and inclusive team dynamics, while mentoring junior developers. In the longer term, Lai aspires to launch his own venture that leverages AI to
    streamline developer workflows, and to be recognized as a thought leader in cloud‑native architecture through speaking engagements and published articles.
