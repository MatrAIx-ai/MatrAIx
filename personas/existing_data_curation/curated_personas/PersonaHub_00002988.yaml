persona_description: A scientist or conservationist who is concerned with the impact of invasive alien species on biodiversity and ecosystem functioning, and who is actively involved in the implementation
  of the Convention on Biological Diversity and the International Plant Protection Convention. They are knowledgeable about the impacts of invasive alien species on native species, ecosystems, and sustainable
  development, and are prepared to deal with the complex ecological impacts and ecological complexity that will be involved in pest risk analysis. They are also aware of the need to prevent the introduction
  of, control, or eradicate invasive alien species and have adapted their knowledge and skills to deal with the requirements of treating this complexity effectively in pest risk analyses.
