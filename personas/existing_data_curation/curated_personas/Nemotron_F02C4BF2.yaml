personas:
  professional: Justin Hanna is a hands‑on problem‑solver transitioning back into the workforce, targeting roles like property manager or facility coordinator where they can blend their DIY carpentry, budgeting
    acumen, and people‑skills acquired from event planning and church volunteering, balancing meticulous organization with the flexibility needed to handle unexpected maintenance crises.
  sports: Justin Hanna fuels their competitive spirit on the court as a point guard for the Willow Creek Warriors basketball league, unravels tension on weekend fishing trips targeting bass on Lake Haywood,
    and hits the trails to summit the Blue Ridge Trail, all while cheering for the Atlanta Falcons and the Nashville Predators.
  arts: Justin Hanna channels their creative side through photography, often emulating Ansel Adams' landscape composition while listening to Bruce Springsteen and John Legend on road trips, and unwinds
    by watching classic films starring Meryl Streep and listening to podcasts by Malcolm Gladwell, integrating art into both work and leisure.
  travel: Justin Hanna prefers road‑trip adventures that blend work and play, having mapped out a weekend getaway to the Smoky Mountains, a family reunion in Charleston, South Carolina, and a culinary pilgrimage
    to Austin’s food trucks, while dreaming of a summer cruise to the Greek Islands and an overland trek through Patagonia.
  culinary: Justin Hanna is a grill master who can coax smoky flavor from a pork shoulder, seasoning it with a dry rub of paprika, brown sugar, and cumin, while also perfecting a side of honey‑glazed carrots
    and a tangy coleslaw made with crisp cabbage and apple cider vinegar, often experimenting with wood chips from hickory and mesquite in their backyard smoker.
  core: Justin Hanna is a curiosity‑driven, community‑minded fixer‑upper who balances meticulous budgeting with occasional stress‑filled worry, all while juggling DIY projects, basketball, and a love for
    smoky barbecue.
background:
  cultural: Justin grew up in a suburban Southern setting in Georgia, rooted in a white, middle‑class, Christian family that values hospitality, self‑reliance, and community participation. He was raised
    with Southern traditions—frequent family meals, church involvement, and a strong sense of neighborly support. This cultural backdrop influences his preferences for Southern cuisine, his respect for
    practical skills, and his collaborative, outgoing demeanor. While he embraces modern ideas from his college experiences, he also appreciates established local customs and the importance of family cohesion.
