  career_goals: Justin aims to re-enter the workforce in a role that leverages both his practical know-how and his people skills, such as property management, facility coordination, or starting his own
    handyman business. He plans to complete his college education—potentially a degree in business administration or a certification in project management—to increase his qualifications. Long‑term, he wants
    to achieve financial stability for his family, reduce personal stress, and eventually mentor younger community members by sharing his DIY expertise and leadership experience.
