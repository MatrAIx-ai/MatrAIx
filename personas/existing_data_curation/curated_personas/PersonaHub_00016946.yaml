persona_description: A researcher from University of Houston who specializes in nanotechnology and has developed a disease diagnostic system using a smartphone and a Rs 1200 lens attachment. The system
  uses precise chemical interactions to form a disease-antibody bond and diagnoses diseases quickly, cheaply and easily. The system is helpful to health care providers across the globe and can be made affordable
  and 'easy to read' with a few changes. The system has the potential to revolutionize the field of disease diagnosis and is a unique and innovative solution to a common problem.
