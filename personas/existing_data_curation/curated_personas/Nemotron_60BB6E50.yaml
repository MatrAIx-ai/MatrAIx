personas:
  professional: An aspiring digital storyteller, Dale Peck blends traditional pencil sketches, tablet illustrations, and Scratch programming to craft whimsical animated shorts that weave Appalachian folk
    motifs with indie rock soundtracks, reflecting their curious, flexible nature and love for collaborative creation.
  sports: An energetic junior athlete, Dale Peck plays forward on the Morgantown Youth Soccer Club, joins after‑school pick‑up games with the Morgantown Park Basketball League, roots for the West Virginia
    Mountaineers basketball team and the Pittsburgh Steelers, and frequently hikes the Monongahela River trail to stay fit.
  arts: A creatively curious teen, Dale Peck sketches fantasy landscapes in a worn sketchbook, strums acoustic renditions of Fleet Foxes and The Avett Brothers while listening to folk tunes at community
    hoedowns, and collects Marvel comics and Neil Gaiman graphic novels, letting these influences shape their storytelling and visual style.
  travel: A weekend adventurer, Dale Peck enjoys hiking local hills and has explored Shenandoah National Park on a school field trip, dreams of backpacking the Appalachian Trail from Georgia to Maine, and
    hopes to one day visit the vibrant streets of New Orleans for its music and street art, balancing modest family finances with a love for immersive experiences.
  culinary: A budding home chef, Dale Peck loves whipping up classic grilled cheese with sharp cheddar and tomato, experimenting with a ramp‑infused pesto on homemade pizza, savoring grandma’s apple pie,
    and often pairs meals with a cold glass of lemonade while occasionally neglecting to wash their dishes promptly.
  core: Dale Peck is a curious, sociable 13‑year‑old who fuses Appalachian storytelling, indie music, and digital art into a lively, slightly disorganized teen life marked by spontaneous sketching, occasional
    procrastination, and a relentless love for jam sessions with friends.
background:
  cultural: Dale grew up in Morgantown, West Virginia, a small city embedded in the Appalachian region. His family’s roots in the area stretch back several generations, giving him a connection to traditional
    Appalachian values such as community solidarity, respect for nature, and a love of folk music. The town’s proximity to West Virginia University adds a modern, academic influence, exposing him to diverse
    ideas and creative opportunities beyond the typical rural setting. Local customs—like attending county fairs, participating in church gatherings, and sharing oral stories about the mountains—inform
    his appreciation for regional heritage. At the same time, he consumes national and global media through the internet, blending his Appalachian upbringing with broader cultural trends.
