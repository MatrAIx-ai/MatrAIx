  career_goals: Dale envisions a future where his love for visual art, music, and community storytelling merges into a career. He hopes to complete high school with a focus on art and technology, then pursue
    a degree in graphic design or interactive media at a nearby university such as West Virginia University. He aspires to become a multimedia creator who designs digital illustrations, short animated videos,
    and interactive experiences that celebrate Appalachian culture and promote social causes. In the longer term, he would like to run workshops for younger kids in his hometown, teaching them to express
    themselves through art and simple coding. He also keeps an open mind about exploring other creative paths like game design or a career in music production, guided by his curiosity for new ideas.
