persona_description: A paleoanthropologist who specializes in the study of ancient human cultures and their environments. The individual is highly interested in the discovery of ancient human remains and
  the evidence of their occupation and lifestyle. They are particularly fascinated by the discovery of the Franklin and Gordon Rivers cave, which is believed to be the oldest known human settlement in Australia.
  The individual is also interested in the preservation of the Franklin and Gordon Rivers region and the UNESCO World Heritage Site it is a part of. They are knowledgeable about the cultural and natural
  values of the area, and are passionate about the impact of human occupation on the environment.
