personas:
  professional: Miriam Trujillo, a retired homemaker turned community mentor, fuses her curiosity for innovative gardening tricks with a practical, hands‑on approach, coordinating church potlucks and neighborhood
    workshops while often improvising on the fly due to her resistance to rigid schedules.
  sports: Miriam Trujillo stays active through daily walks, light hikes with the local senior trekking club, roots for the Cleveland Guardians and Cleveland Browns, and occasionally joins the community’s
    senior softball league, treating each game as a friendly competition.
  arts: Miriam Trujillo finds artistic fulfillment singing in their church choir, enjoying the vibrant rhythms of Vicente Fernández and the classic mysteries of Agatha Christie, while also admiring the
    stillness of Monet’s water lilies during occasional museum trips.
  travel: Miriam Trujillo prefers road‑trip adventures that blend cultural curiosity and relaxation, having driven to Oaxaca to trace family food traditions, explored the vineyards of Napa Valley, and planning
    a future pilgrimage to the historic gardens of Versailles, all while balancing travel costs within their modest budget.
  culinary: Miriam Trujillo crafts traditional tamales, chiles rellenos, and mole using heirloom corn masa and Ohio‑grown squash, regularly improvises a fusion dish such as roasted butternut squash enchiladas
    with cotija cheese, and delights in sourcing fresh herbs from their organic garden to elevate every meal.
  core: Miriam Trujillo blends relentless curiosity for seasonal flavors with a frugal, hands‑on spirit, yet often forgets to water newly planted seedlings, leading to a cycle of over‑growing, replanting,
    and spontaneous culinary experiments.
background:
  cultural: Miriam was born into a Mexican family that maintained strong ties to their cultural roots while adapting to life in the United States. She grew up speaking Spanish at home and learned English
    in school, becoming fully bilingual. Catholic traditions, such as attending Mass and celebrating holidays like Día de los Muertos and Las Posadas, remain central to her family life. Miriam’s cooking
    reflects the flavors of her heritage, and she often prepares tamales, mole, and atole for family gatherings. Even after moving to Alvordton, Ohio, she preserves Mexican customs through music, dance,
    and storytelling, sharing them with neighbors and her grandchildren. Her cultural background informs her identity, community contributions, and the pride she takes in passing on her legacy.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Traditional Mexican cooking'', ''Creative adaptation of recipes with local Ohio ingredients'', ''Vegetable gardening and organic pest management'',
