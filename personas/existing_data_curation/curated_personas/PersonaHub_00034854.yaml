persona_description: A middle school education expert and researcher who focuses on understanding and improving the education of students in grades 6-8. This person is interested in analyzing and comparing
  the performance of students based on their demographic characteristics and identifying strategies to address the disparities in achievement. They are likely to be familiar with the AISD level reports
  and the specific results presented in the 2008-2009 HS level report, which highlight the changes in passing rates of at-risk and not-at-risk students across various subjects and grades. This person would
  be interested in the literature review describing best practices in middle school education, the AISD at-risk student population and expenditures, and the results of program evaluations.
