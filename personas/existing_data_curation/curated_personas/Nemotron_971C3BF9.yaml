personas:
  professional: Illianna Ferdinand, an 81-year-old retired art historian, leverages their deep research and archival expertise to design spontaneous, experience-driven pop-up exhibitions that invite community
    dialogue, while their competitive streak pushes them to mentor emerging creators and seek senior fellowship recognition.
  sports: Illianna Ferdinand enjoys gentle morning walks with the Fort Lauderdale Senior Walking Club, joins a weekly low-impact tai chi class, and avidly follows the Miami Heat basketball team, cheering
    from their living room on game nights.
  arts: Illianna Ferdinand spends afternoons sketching Floridian marshes in watercolor while listening to Nina Simone’s jazz, collects vintage prints by Romare Bearden, and regularly attends spoken-word
    sessions at the local cultural center, channeling those experiences into their curatorial projects.
  travel: Illianna Ferdinand prefers spontaneous, week-long road trips to cultural festivals, having recently driven to New Orleans for Mardi Gras and to Savannah for its St. Patrick’s Day celebration,
    while they keep a scrapbook of postcards from the Caribbean islands they hope to explore on a future cruise.
  culinary: Illianna Ferdinand delights in preparing jerk chicken seasoned with scotch bonnet pepper, slow-cooked collard greens with smoked ham hocks, and sweet potato pie, often improvising with fresh
    herbs from their garden while sharing meals at community potlucks.
  core: Illianna Ferdinand is a curiously spontaneous octogenarian who blends art, music, and garden-grown flavors into a vibrant life of mentorship and cultural preservation, all while they juggle a skeptical
    eye and a competitive spirit.
background:
  cultural: Illianna is a first‑generation American whose parents emigrated from Jamaica to South Florida in the 1950s. Raised in a close‑knit Black community in Fort Lauderdale, she witnessed the civil‑rights
    movement, the rise of the Black Arts Movement, and the vibrant Caribbean diaspora culture that shaped the region. Her upbringing blended Baptist church traditions, Afro‑Caribbean music, and Southern
    culinary heritage, fostering a deep appreciation for rhythmic expression and storytelling. These cultural threads are woven throughout her artistic sensibilities, informing her advocacy for Black representation
    in the arts and her devotion to preserving oral histories of elders in the community. Her lifelong immersion in both African‑American and Caribbean cultural practices guides her curatorial eye and community
    engagement.
attributes:
  skills: '[''Art History and Critique'', ''Exhibition Curation'', ''Oral History Interviewing'', ''Creative Writing – Poetry and Memoir'', ''Public Speaking and Workshop Facilitation'', ''Community Outreach
    and Mentorship'', ''Research and Archival Methods'', ''Digital Art Exploration (AI Tools)'', ''Literary Analysis'', ''Music Appreciation'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Watercolor Painting'', ''Jazz and Gospel Concert Attendance'', ''Reading African‑American Literature'', ''Collecting Vintage Art Prints'', ''Traveling
    to Cultural Festivals'', ''Gardening'', ''Cooking Traditional Caribbean/Southern Dishes'', ''Impromptu Storytelling Sessions'', ''Exploring AI‑Generated Art Platforms'']'
  career_goals: Although retired, Illianna aims to cement her legacy as a champion of under‑represented Black and Caribbean artists in South Florida. She plans to launch a senior‑led artist collective that
    produces pop‑up exhibitions in community centers, libraries, and outdoor public spaces, emphasizing spontaneous, dialogue‑rich experiences over rigid programming. She aspires to publish a memoir intertwining
    personal history with the evolution of Black art movements, positioning herself as a thought leader in regional art discourse. Illianna also seeks to mentor emerging creators, offering informal critique
    sessions and encouraging experimental uses of technology, striving for recognition as a senior fellow at the local university’s art history department.
