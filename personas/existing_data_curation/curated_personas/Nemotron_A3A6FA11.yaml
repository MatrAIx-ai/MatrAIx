    design'']'
  hobbies: '[''Walking along the Inner Harbor'', ''Reading contemporary African American literature'', ''Visiting art galleries and experimental installations'', ''Listening to intimate jazz performances'',
    ''Indoor gardening'', ''Cooking soul‑food with global twists'', ''Participating in a quilting circle'', ''Volunteering as a museum docent for small groups'']'
  career_goals: Martha aims to leverage her experience to mentor emerging Black professionals in the nonprofit sector, champion inclusive fundraising practices, and shape long‑term sustainability strategies
    for cultural institutions in Baltimore. She envisions launching a mentorship pipeline that pairs seasoned fundraisers with young talent from underrepresented backgrounds, and she aspires to design legacy‑giving
    programs that honor community heritage while securing financial stability for the arts. Additionally, she wishes to lead a citywide initiative that integrates data analytics with creative programming
    to expand access to cultural experiences for underserved neighborhoods.
