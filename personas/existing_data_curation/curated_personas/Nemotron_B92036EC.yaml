personas:
  professional: Irma Crews, a veteran elementary and middle‑school STEM teacher, channels her practical, structure‑loving mindset into designing interdisciplinary curricula that fuse coding, hands‑on experiments,
    and data‑driven assessments, while her flexible yet organized classroom management style and assertive collaborative leadership empower both students and fellow teachers to innovate within a predictable
    framework.
  sports: Irma Crews runs with the Fairfax 5K Runners club each Thursday, supports the Washington Commanders and Capitals, and balances her energetic love of competition with a calm yoga practice on weekends,
    though she sometimes skips the post‑run stretch when a busy schedule overwhelms her practical need for predictability.
  arts: Irma Crews contributes to the local community theater crew by designing sets inspired by Tim Burton’s whimsical aesthetic and programming lighting cues reminiscent of Pixar’s vibrant storytelling,
    while also attending a monthly science‑fiction book club that discusses authors like Octavia Butler and Neil deGrasse Tyson, and they occasionally unwind by binge‑watching Broadway livestreams, merging
    structured creativity with social engagement.
  travel: Irma Crews prefers meticulously planned, family‑oriented trips that blend educational experiences—such as visits to the Smithsonian in Washington, D.C., the interactive exhibits at Boston’s Museum
    of Science, and a future research pilgrimage to CERN in Switzerland—with occasional spontaneous weekend getaways to Shenandoah National Park when time and budget allow, reflecting her balance of predictability
    and flexibility.
  culinary: Irma Crews enjoys cooking wholesome meals for her family, favoring quinoa‑stuffed bell peppers, roasted root vegetables with smoked paprika, and homemade whole‑wheat pizza topped with fresh
    basil, showcasing a moderate skill level that blends experimental recipes with reliable comfort dishes, while sometimes indulging in late‑night snack runs for sugary cupcakes, a quirky deviation from
    her otherwise health‑conscious routine.
  core: Irma Crews blends a structured, data‑driven teaching ethos with a sociable, energetic community spirit, a disciplined yet occasionally indulgent financial strategy, and a love for gardening, running,
    theater, and family‑centric cooking, all while navigating occasional health niggles and a penchant for meticulous planning.
background:
  cultural: Irma comes from a white American family with deep roots in the Mid‑Atlantic region, tracing ancestry to European (primarily Irish and German) origins. She was raised in suburban Virginia, where
    a strong emphasis on public education, civic engagement, and community service shaped her values. Growing up near Washington, D.C., she was exposed to a diverse population and a vibrant cultural scene,
    fostering an appreciation for inclusivity and the importance of providing equitable educational opportunities. This background informs her pragmatic problem‑solving style, her commitment to collaborative
    initiatives, and her belief in the role of education as a catalyst for social progress.
attributes:
  skills: '[''Curriculum development (math & science)'', ''Classroom management'', ''Differentiated instruction'', ''Technology integration (Google Classroom, interactive whiteboards)'', ''Project‑based
    learning facilitation'', ''STEM enrichment program coordination'', ''Data analysis for student performance'', ''Collaborative team teaching'', ''Professional development facilitation'', ''Parent communication
    and community outreach'', ''Robotics and coding instruction (Scratch, Python)'', ''Assessment design'', ''Time management and organizational planning'']'
  hobbies: '[''Running (community 5k races)'', ''Vegetable gardening'', ''Volunteer STEM mentor (Girl Scouts)'', ''Science‑fiction book club'', ''Cooking and recipe experimentation'', ''Yoga practice'',
    ''Tabletop strategy games'', ''Community theater crew (set design & technical lighting)'']'
  career_goals: Irma aims to expand her influence beyond her own classroom by becoming a district STEM coordinator and, in the longer term, an instructional leader such as an assistant principal with a
    focus on curriculum innovation. She plans to earn a specialist certification in educational leadership, secure grant funding to scale STEM enrichment programs, and build a regional partnership network
    with local technology firms, museums, and universities. Over the next five years she hopes to mentor a cohort of teachers in project‑based learning, champion policies that increase equitable access
    to hands‑on science education, and ultimately shape district‑wide STEM strategy in Fairfax County.
