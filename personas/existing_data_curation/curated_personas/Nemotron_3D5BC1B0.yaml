  hobbies: '[''Fishing (summer & ice fishing)'', ''Kayaking'', ''Snowmobiling'', ''Snowshoeing'', ''Woodworking'', ''Rotary Club volunteering'', ''Community Center event organizing'', ''Gardening'', ''Yoga
    and Stretching'', ''Gratitude journaling'']'
  career_goals: Although approaching retirement age, Nicholas is committed to advancing within his current organization. He aims to move into a supervisory position, such as Customer Service Team Lead,
    where he can apply his organizational strengths to schedule planning, performance monitoring, and staff development. He also plans to acquire a Certified Customer Service Professional (CCSP) credential
    and a Six Sigma Green Belt to formalize his process‑improvement expertise. Long‑term, he hopes to transition into a training‑focused role that allows him to mentor younger associates while maintaining
    a predictable workload that supports his health and reduces stress.
