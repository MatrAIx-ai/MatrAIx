personas:
  professional: T Hosaka is a seasoned mechanical engineer with fifteen years of product design experience, mastering SolidWorks, CATIA, and FEA while driving sustainable HVAC and wind‑turbine projects,
    and leverages their curious, organized, and sociable nature to lead cross‑functional teams toward AI‑assisted design innovation and green technology leadership.
  sports: T Hosaka thrives on community soccer in the Westside League, cheers for the New York Knicks and the New York City FC, and leads a weekend hiking club that tackles the Hudson Valley’s Breakneck
    Ridge, using these activities to stay fit, socially engaged, and mentally resilient.
  arts: T Hosaka immerses themselves in New York’s contemporary art scene, frequenting MoMA PS1 and the Whitney, drawing inspiration from artists like Olafur Eliasson for their mechanical designs, while
    their self‑taught guitar skills find a home in jam sessions at the Blue Note, where they relish the improvisations of Miles Davis and John Coltrane.
  travel: T Hosaka’s travel style blends purposeful exploration with spontaneous getaways, from annual trips to Berlin’s design fairs and Iceland’s geothermal sites to weekend hikes in the Adirondacks and
    culinary tours of Osaka, always balancing professional growth with personal curiosity.
  culinary: T Hosaka is a curious home cook who experiments with cross‑cultural dishes like Korean kimchi‑tacos, Italian carbonara with yuzu zest, and homemade sourdough, routinely sourcing fresh ingredients
    at Union Square Greenmarket and hosting lively dinner parties where their guitar accompanies the meal.
  core: T Hosaka merges engineering rigor, artistic spontaneity, and community spirit, juggling hackathons, guitar jams, sustainable design goals, and a penchant for high‑tech tinkering with occasional
    coffee‑shop splurges.
background:
  cultural: T. W. Hosaka was raised in a multicultural household in New York City, where his family blends European (Irish/Italian) ancestry with Japanese heritage from his paternal line, giving him a unique
    cross‑cultural perspective while identifying as white American. Growing up in the diverse neighborhoods of Manhattan and Queens, he was immersed in a mosaic of languages, cuisines, and artistic expressions,
    which fostered his appreciation for varied experiences and unconventional ideas. He celebrates traditional American holidays such as Thanksgiving and Fourth of July, while also honoring Japanese customs
    like Obon and enjoying sushi and ramen with his family. This bicultural upbringing informs his open‑minded approach to collaboration and his respect for both precision and creativity in his professional
    and personal pursuits.
