  career_goals: Hosaka aims to transition into a senior leadership role within the next five years, seeking the position of Director of Mechanical Engineering at a forward‑thinking firm that focuses on
    sustainable product development. He aspires to spearhead R&D initiatives that integrate AI‑driven design optimization and eco‑friendly materials, positioning his organization at the forefront of green
    technology. He is also interested in obtaining an MBA to broaden his strategic and financial acumen, enabling him to oversee large‑scale engineering projects and drive corporate growth. In the longer
    term, he envisions founding his own consultancy dedicated to helping startups bring innovative, aesthetically‑pleasing mechanical solutions to market while mentoring the next generation of engineers.
    Publishing technical papers and presenting at industry conferences are also part of his ambition to establish himself as a thought leader in the mechanical engineering community.
