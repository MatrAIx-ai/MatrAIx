  career_goals: Phillip aims to maintain a high academic standing through middle and high school, focusing on STEM courses that prepare him for a future in engineering. His long‑term ambition is to become
    a civil or environmental engineer, designing infrastructure and water‑management solutions that benefit his community in North Florida. He also expresses an interest in emergency services, valuing the
    chance to help others in structured, high‑responsibility roles. In the short term, he plans to join a high‑school engineering club, attend summer STEM camps, and gain hands‑on experience through internships
    or mentorships.
