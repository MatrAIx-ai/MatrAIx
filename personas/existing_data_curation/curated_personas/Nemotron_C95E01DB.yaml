  hobbies: '[''Polynesian dance'', ''Community gardening'', ''Quilting'', ''Bridge'', ''Potluck hosting'', ''Historical fiction reading'', ''Church socials'', ''Volunteer work at senior center'', ''Storytelling'',
    ''Puzzle solving'']'
  career_goals: In retirement, Nympha aims to deepen her impact on the local community by leading intergenerational cultural workshops, preserving Polynesian cooking traditions through classes, and mentoring
    younger volunteers. She hopes to serve on the board of a senior services nonprofit, expand her involvement in the church’s outreach programs, and create a regular storytelling circle that celebrates
    Pacific Islander heritage.
