personas:
  professional: Brianna Mosquera is a project management professional who blends strong analytical skills in Excel and Power BI with a collaborative, harmony‑oriented style, applying both Waterfall and
    Agile Scrum to drive technology implementations while preparing for PMP certification and aiming for senior and program‑manager roles.
  sports: Brianna Mosquera enjoys weekend hikes in the Appalachian foothills, practices yoga and Pilates for core strength, and supports the Atlanta Falcons and Atlanta Hawks, occasionally joining a local
    running club for 5K races.
  arts: Brianna Mosquera cultivates a love for R&B, jazz, and gospel, regularly streaming artists like Erykah Badu, Robert Glasper, and Kirk Franklin, attends live performances at the local music venue
    The Tabernacle, and reads contemporary fiction by authors such as Chimamanda Ngozi Adichie and Yaa Gyasi, allowing these artistic experiences to inspire their cooking and mentoring.
  travel: Brianna Mosquera prefers meticulously planned weekend getaways to nearby nature spots like the Blue Ridge Mountains, dreams of exploring New Orleans for its music and cuisine, and balances travel
    aspirations with a modest budget and family commitments, often using travel reward points to offset costs.
  culinary: Brianna Mosquera experiments with healthier twists on classic Southern dishes, such as collard greens sautéed with smoked turkey and quinoa, baked mac and cheese made with cauliflower, and sweet‑potato
    pie spiced with ginger and cinnamon, showcasing a skillful palate that favors fresh herbs, whole grains, and seasonal produce.
  core: Brianna Mosquera merges a structured project‑management mindset with soulful cooking, community mentoring, and a habit of over‑planning every detail, from budgets to backyard gardens, while occasionally
    indulging in impulsive tech gizmo purchases.
background:
  cultural: Brianna is a second‑generation African American who grew up in the vibrant Atlanta metro area. Her family’s roots trace back to the Great Migration, and she was raised with strong ties to church,
    community service, and Southern Black cultural traditions. The values of resilience, collective uplift, and education were emphasized in her household, influencing her collaborative work style and commitment
    to mentorship. Living in Roswell, a diverse suburb of Fulton County, she navigates a blend of historic Black neighborhoods and newer multicultural environments, which has deepened her appreciation for
    both her heritage and the broader tapestry of American culture. She actively participates in local church gatherings, cultural celebrations, and initiatives that promote economic empowerment for Black
    entrepreneurs.
attributes:
  skills: '[''Project Planning'', ''Scope Definition'', ''Resource Allocation'', ''Budget Management'', ''Risk Assessment'', ''Agile Scrum'', ''Waterfall Methodology'', ''Stakeholder Communication'', ''Team
    Facilitation'', ''Conflict Resolution'', ''Process Improvement (Lean)'', ''Data Analysis (Excel, Power BI)'', ''Project Management Software (MS Project, Asana, JIRA, Smartsheet)'']'
  hobbies: '[''Cooking (Southern & soul‑food)'', ''Yoga'', ''Hiking'', ''Gardening'', ''Reading (leadership, African American history, fiction)'', ''Mentoring youth (after‑school program)'', ''Attending
    cultural festivals'', ''Listening to R&B, jazz, gospel music'']'
  career_goals: Brianna aims to earn her Project Management Professional (PMP) certification within the next year and leverage it to transition into a senior project manager role overseeing cross‑functional
    technology implementations. Over the next five years she envisions moving into program management, where she can coordinate multiple related projects and drive strategic initiatives for her organization.
    She is also committed to championing diversity, equity, and inclusion within project teams, and hopes to mentor emerging Black professionals in the field. Ultimately, she aspires to a director‑level
    position that blends operational oversight with community outreach, allowing her to balance career advancement with her family life.
