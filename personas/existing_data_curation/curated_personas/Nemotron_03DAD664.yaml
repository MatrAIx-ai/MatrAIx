personas:
  professional: Betty Alfaro, a seasoned first‑line supervisor of non‑retail sales teams, leverages data‑driven decision making and a storyteller’s eye drawn from their watercolor hobby to coach representatives,
    craft persuasive presentations, and manage budgets, while their relaxed approach to scheduling sometimes leads to overlooked deadlines but fosters a collaborative, supportive workplace culture.
  sports: Betty Alfaro stays active by strolling through their garden, joining a weekly line‑dancing class, playing casual tennis at the Augusta senior courts, cheering for the Atlanta Braves, Georgia Bulldogs,
    and Augusta GreenJackets, and squeezing in a round of golf during Masters week whenever their schedule permits.
  arts: Betty Alfaro cultivates their creative spirit by painting magnolia‑laden watercolors, visiting the Morris Museum of Art to study works by Georgia O'Keeffe and local painter Brittany Kelly, attending
    live performances by the Augusta Symphony featuring violinist Midori, and volunteering at community art workshops where they mentor youth alongside theater director Karen Lockhart.
  travel: Betty Alfaro prefers relaxed, last‑minute road trips to historic towns such as Charleston, Savannah, and New Orleans—where they explore art festivals and colonial architecture—and dreams of a
    leisurely European art pilgrimage to Paris and Florence, balancing these getaways with garden duties and family commitments.
  culinary: Betty Alfaro, an adept home chef, reimagines classic Southern dishes like shrimp and grits with lemon‑thyme sauce, fried chicken glazed with honey‑pepper, and peach cobbler spiced with cardamom,
    often incorporating fresh herbs and vegetables from their garden and pairing meals with sweet tea or a local craft beer.
  core: Betty Alfaro blends Southern hospitality with a watercolor‑inspired creative flair, turning sales coaching into story‑driven workshops while they juggle a thriving garden, spontaneous travel plans,
    and a penchant for occasional forgotten bill payments.
background:
  cultural: Betty is a white American who grew up in the American South, specifically in the outskirts of Augusta, Georgia. Raised in a close‑knit, Protestant (Baptist) family, she was instilled with Southern
    values of hospitality, community service, and respect for tradition. Her family celebrated regional customs, including seasonal festivals and local culinary traditions, which nurtured her appreciation
    for food and cultural events. She earned a Bachelor of Business Administration from the University of Georgia, where she was exposed to a broader academic environment that sparked her curiosity for
    art and unconventional ideas. Throughout her life, she has maintained strong ties to the Southern heritage of Augusta—its historic neighborhoods, the annual Masters Tournament atmosphere, and a vibrant
    local arts scene—while also embracing diverse experiences beyond her regional roots.
attributes:
  skills: '[''Team leadership'', ''Sales performance coaching'', ''Client relationship management'', ''CRM administration (Salesforce)'', ''Data analysis and reporting'', ''Negotiation and deal closing'',
    ''Conflict resolution'', ''Public speaking'', ''Creative problem solving'', ''Training and onboarding'', ''Budgeting and resource allocation'', ''Event coordination'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Gardening'', ''Southern cooking'', ''Live theatre and music performances'', ''Line dancing'', ''Traveling to historic sites'',
    ''Reading (historical fiction & contemporary novels)'', ''Volunteering at community art programs'', ''Book club participation'', ''Playing bridge'']'
  career_goals: Betty aims to advance to a regional sales manager position where she can oversee multiple teams across the Southeast and influence broader strategic direction. She is passionate about mentoring
    emerging women leaders and hopes to design a formal mentorship program within her organization. To broaden her business acumen, she plans to pursue an executive MBA or a professional certification in
    strategic sales management. Ultimately, she envisions using her love of art and creativity to develop innovative sales training workshops and, later in her career, transition into consulting to help
    small businesses integrate creative thinking into their sales processes while maintaining a flexible schedule that supports her active lifestyle.
