  career_goals: Sterling dreams of exploring the ocean as a marine biologist, traveling to the stars as an astronaut, and painting big murals as an artist. He also imagines helping his community by becoming
    a firefighter or a teacher one day, and he loves the idea of organizing fun events for his friends and family.
