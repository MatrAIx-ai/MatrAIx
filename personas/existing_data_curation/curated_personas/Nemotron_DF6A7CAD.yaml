personas:
  professional: Sterling Jennings is a budding mini‑architect who spends afternoons meticulously arranging Lego bricks into coherent cityscapes, embodying their curious mind, methodical planning, and love
    for organized creativity.
  sports: Sterling Jennings plays forward for the Riverbend Cubs youth soccer club, practices with teammates twice a week, and passionately cheers for the Chicago Cubs during baseball season, dreaming of
    hitting a home run like Cody Bellinger while also rooting for the Chicago Bulls in basketball.
  arts: Sterling Jennings devotes weekend afternoons to drawing vibrant dinosaur scenes inspired by Dr. Seuss and Van Gogh’s swirling skies, eagerly attends storytime at the local library, and sings along
    to the whimsical tunes of "The Wiggles," letting art shape their imaginative play.
  travel: Sterling Jennings loves family road trips to the Grand Canyon and annual vacations to Walt Disney World, prefers guided tours with parents, and now dreams of visiting the Eiffel Tower in Paris
    and snorkeling near the Great Barrier Reef.
  culinary: Sterling Jennings favors creamy mac and cheese, peanut butter and jelly sandwiches, chicken nuggets with ketchup, and proudly mixes batter for chocolate chip cookies, delighting in the sweet
    aroma of vanilla extract and melted chocolate chips while occasionally sneaking an extra cookie before dinner.
  core: Sterling Jennings is a curious, organized five‑year‑old whose energetic enthusiasm for building, saving, and sharing is balanced by a gentle kindness and occasional forgetfulness of bedtime routines.
background:
  cultural: Sterling is raised in a Black family in Pompano Beach, where the warm, multicultural environment blends African American traditions with Caribbean and Southern coastal influences. He participates
    in family gatherings featuring soul food, music, and storytelling, and attends community events such as Juneteenth celebrations and beach festivals. His parents encourage a love for art and learning,
    exposing him to local murals, library story hours, and music ranging from gospel choirs to reggae beats. This cultural tapestry informs his appreciation for rhythm, vivid colors, and community cohesion.
