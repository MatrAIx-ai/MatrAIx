  hobbies: '[''Baseball'', ''Playing the Cuatro'', ''Building LEGO and robotics kits'', ''Coding with Scratch'', ''Hiking in the Central Mountains'', ''Listening to salsa and reggaeton'', ''Volunteer work
    at community events'', ''Drawing comic strips'', ''Cooking traditional Puerto Rican dishes with family'']'
  career_goals: Oscar dreams of turning his love for technology and his desire to help his community into a career as a community‑focused engineer or environmental technologist. He hopes to design affordable
    solar‑powered tools for local farms in the Cayey area, improve water management for his neighborhood, and one day mentor younger students in robotics and coding. In parallel, he also imagines himself
    leading a youth baseball league or music program that brings together kids from different backgrounds, using his cooperative spirit to foster harmony. Though he knows he is still exploring possibilities,
    his long‑term ambition is to combine practical engineering solutions with community service, ensuring his town thrives while preserving Puerto Rican culture.
