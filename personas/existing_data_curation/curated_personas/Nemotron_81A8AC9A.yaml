personas:
  professional: Oscar Gutierrez, a budding young robotics enthusiast, merges a love for LEGO construction and Arduino tinkering with practical problem‑solving by designing simple light‑reactive robots,
    and they eagerly share their Scratch stories with classmates to foster teamwork while keeping a relaxed, flexible schedule.
  sports: Oscar Gutierrez, an enthusiastic member of the San Juan Little Giants youth baseball league who idolizes the Cangrejeros de Santurce, spends Saturday afternoons perfecting his swing on the diamond,
    while on weekends they join the Trail Explorers club to hike the Central Mountain Range, spotting coquí frogs and staying fit through a blend of team sport and nature‑based cardio.
  arts: Oscar Gutierrez, who revels in the rhythms of Marc Anthony’s salsa, Bad Bunny’s reggaetón, and traditional plena beats, often grabs a cuatro at family gatherings to strum along, and they channel
    that creative spark into drawing comic strips inspired by Stan Lee’s superheroes, merging visual storytelling with musical flair.
  travel: Oscar Gutierrez, whose vacation map spots include hiking the misty trails of El Yunque, exploring the bioluminescent bays of Vieques, and family road trips to Cabo Rojo’s lighthouse, while dreaming
    of a future adventure to Tokyo’s tech districts and Orlando’s theme parks, prefers itineraries that blend hands‑on nature exploration with a splash of cultural excitement, all within the modest budget
    of a middle‑schooler’s allowance.
  culinary: Oscar Gutierrez, who proudly assists his grandmother in preparing arroz con gandules seasoned with aromatic sofrito, pigeon peas, and a hint of annatto, enjoys experimenting with sweet fried
    plantains and homemade guava jam, yet admits they sometimes burn the cilantro when trying to garnish a quick snack.
  core: Oscar Gutierrez, a curiosity‑driven twelve‑year‑old who swaps baseball gloves for LEGO bricks, codes playful Scratch tales, and volunteers at neighborhood clean‑ups, balances a laid‑back, sometimes
    chaotic schedule with a heart set on helping others and a knack for turning spontaneous ideas into tiny inventions.
background:
  cultural: Oscar grows up in a close‑knit Puerto Rican family in the mountainous municipalities of Cayey and Caguas, where Spanish is the daily language and English is learned at school. The community’s
    rhythm is shaped by baseball games on dusty fields, the sounds of bomba and plena at fiestas patronales, and the aroma of simmering sofrito in his grandmother’s kitchen. Family gatherings often revolve
    around sharing traditional dishes like arroz con gandules, pasteles, and alcapurrias, while stories of the island’s history and resilience—especially after events like Hurricane Maria—are passed down.
    The region’s legacy of coffee farming and small‑scale agriculture informs Oscar’s respect for the land, and his exposure to both Caribbean island culture and mainland U.S. influences gives him a bicultural
    perspective that he carries into his school and community activities.
