  hobbies: '["sketching", "watercolor painting", "speculative fiction reading", "journal writing", "stargazing", "hiking", "poetry readings", "meditation", "yoga", "indie board games", "vintage postcard
    collecting", "hand‑bound journal making"]'
  career_goals: Thelma aims to complete a Bachelor of Fine Arts degree, followed by a Master’s in Illustration or Creative Writing, to deepen her artistic repertoire and theoretical knowledge. She aspires
    to become a freelance illustrator and narrative designer for independent video game studios, while also contributing editorial pieces to niche literary magazines. Long‑term, she hopes to establish a
    small cooperative art space in Prescott that offers workshops, gallery shows, and a supportive community for emerging creators, providing both creative fulfillment and financial stability to counterbalance
    her tendency toward anxiety.
