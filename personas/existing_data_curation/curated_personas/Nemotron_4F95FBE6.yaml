personas:
  professional: Thelma Easler, an aspiring freelance illustrator and narrative designer, blends their Adobe and Procreate expertise with disciplined project planning to deliver immersive concept art for
    indie video game studios, they also pen editorial pieces for niche literary magazines, channeling vivid imagination and methodical nature into every brief while using mindfulness to keep anxiety in
    check.
  sports: Thelma Easler, an avid solo hiker of the Verde Valley and regular yoga practitioner, belongs to the Verde Valley Hiking Club, they track seasonal trail runs in late spring and early fall, follow
    the Arizona Diamondbacks in baseball and the Phoenix Suns in basketball, and schedule weekly hikes to counterbalance sedentary studio work.
  arts: Thelma Easler, a watercolor and digital illustration enthusiast, draws inspiration from Georgia O’Keeffe’s desert palettes, Ansel Adams’ stark contrasts, and video‑game concept artist Jen Zee’s
    storytelling visuals, they frequently attend poetry readings featuring spoken‑word artists like Sarah Kay, collect vintage postcards showcasing early 20th‑century illustration, and immerse themselves
    in speculative fiction by N. K. Jemisin and classic works by Virginia Woolf, which all feed their narrative design projects.
  travel: Thelma Easler, a meticulous planner of artistic pilgrimages, has trekked the Grand Canyon and painted Sedona’s red rocks, they dream of solo aurora‑watching trips to Iceland’s Reykjavik to sketch
    night skies, and they balance budget constraints by swapping homes with fellow artists and traveling by bus or train whenever possible.
  culinary: Thelma Easler, a moderately skilled home‑cook with a love for Southwest flavors, often prepares chile relleno tacos, prickly pear salsa, and quinoa bowls seasoned with roasted cumin, they relish
    hand‑binding recipe journals for personal use and occasionally experiment with Aeropress coffee brewing to complement creative sessions.
  core: Thelma Easler, a 23‑year‑old imaginative yet meticulously organized creator, channels anxiety into disciplined artistic practice, solitarily sketches desert vistas, writes speculative tales, and
    occasionally grounds themselves with yoga and indie board‑game gatherings, they also dream of a cooperative art space where emerging artists can thrive.
background:
  cultural: Thelma comes from a middle‑class white family with mixed German and Irish ancestry. She grew up in a suburban community near Phoenix before moving to Prescott for college, where she fell in
    love with the town’s blend of Old West heritage, vibrant arts scene, and surrounding natural beauty. Her family traditions include weekend camping trips in the mountains, celebrating classic American
    holidays, and an appreciation for Southwestern folklore and Native American history. The local Frontier Days festival and the Prescott Arts and Thespian Theatre have shaped her sense of community, encouraging
    both respect for regional customs and a curiosity about diverse cultural expressions.
attributes:
  skills: '["digital illustration", "watercolor painting", "creative writing", "research and analysis", "project planning", "Adobe Creative Suite", "Procreate", "basic photography", "event coordination",
