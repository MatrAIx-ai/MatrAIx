persona_description: A music psychologist who specializes in the cognitive psychology of music, particularly the acquisition and development of musical skills. He/She is interested in understanding the
  mental processes involved in listening to, performing, and composing music, as well as in the psychological bases of musical aptitude and skill maintenance. The music psychologist seeks to address questions
  such as how musical skills are acquired and how they are acquired, and how these skills are maintained over time. The music psychologist is also interested in the cognitive processes involved in musical
  performance, as well as the problems of synchrony in ensemble performance and the generation of expression in musical performance. The music psychologist is likely to be a practicing musician who has
  a background in psychology, and who has conducted research in the field of music psychology. The music psychologist is likely to be an expert in the field of music psychology, and is likely to have a
  strong interest in the cognitive processes involved in music. The music psychologist is likely to be interested in the application of research in music psychology to areas such as music education and
  cognitive neuroscience.
