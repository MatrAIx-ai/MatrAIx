  career_goals: While approaching retirement age, Tyler plans to leverage his logistics expertise to launch a small, independent delivery service focused on local artisans and businesses in Smyth County.
    He aims to offer specialized handling for artwork and fragile items, blending his love of art with his professional background. Additionally, he hopes to mentor younger couriers, sharing best‑practice
    route planning techniques, and to generate enough supplemental income to support a modest home studio where he can pursue painting and photography.
