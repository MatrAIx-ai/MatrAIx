  hobbies: '[''Art Gallery Visits'', ''Digital Photography'', ''Reading Contemporary Nonfiction'', ''Yoga'', ''Hiking'', ''Small Dinner Gatherings'', ''Cooking Regional Cuisine'', ''Wine Tasting'', ''Historical
    Preservation Volunteering'']'
  career_goals: Toni aims to advance to a Director of Procurement role within the next five years, where she can lead enterprise‑wide sourcing strategies and embed sustainability into the supply chain.
    She is pursuing the Certified Professional in Supply Management (CPSM) credential to formalize her expertise and plans to spearhead a company‑wide initiative to achieve zero‑waste sourcing. Long‑term,
    she envisions establishing a boutique consulting practice that helps mid‑size manufacturers adopt ethical, cost‑effective procurement models while leveraging innovative design concepts drawn from her
    artistic interests.
