  hobbies: '[''High school football'', ''Competitive multiplayer video gaming'', ''Automotive tinkering and car meets'', ''Organizing social gatherings'', ''Fishing along the Missouri River'', ''Volunteering
    at local fairs and festivals'', ''Playing drums in a garage band'', ''Creating DIY car-maintenance videos for social media'']'
  career_goals: Michael aims to finish his high-school equivalency (GED) within the next year and enroll in a community-college automotive technology program to earn ASE certification. He plans to secure
    an apprenticeship at a local mechanic shop, where he can refine his hands-on skills and learn business operations. His long-term ambition is to become a master automotive technician and eventually manage
    a service department, blending his technical expertise with his people-oriented strengths. He also envisions opening his own small garage that offers routine maintenance services and community workshops
    on basic car care. Parallel to his automotive career, Michael hopes to stay involved in organizing community events, possibly taking a role as a municipal events coordinator to leverage his planning
    abilities and sociable nature. He sets competitive milestones, such as earning top scores on certification exams and leading his future shop to regional service excellence awards.
