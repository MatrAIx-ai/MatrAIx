  career_goals: Giselle hopes to transition from floor sales to a supervisory or assistant manager role where she can mentor newer employees and shape the store’s visual identity, especially by incorporating
    Mexican‑inspired design elements. She dreams of curating a small boutique corner within the department that showcases artisanal crafts from local Mexican‑American makers, merging her love of novelty,
    art, and cultural heritage. In the longer term, she envisions a part‑time position that lets her devote more time to community‑based art workshops and cultural events while still remaining connected
    to the retail environment that fuels her social energy.
