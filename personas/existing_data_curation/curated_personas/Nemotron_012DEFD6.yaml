  hobbies: '["visiting local art galleries and murals", "spontaneous road trips to state parks", "gardening and seed saving", "birdwatching", "journaling and sketching", "playing ukulele", "attending community
    theater performances", "reading speculative fiction", "experimenting with fusion cooking", "participating in unconventional art workshops (e.g., surrealist collage)"]'
  career_goals: Although retired, Vanessa aims to leave a lasting artistic and cultural imprint on her community. She plans to launch a monthly intergenerational art‑exchange program at the local library,
    pairing senior artists with middle‑school students to create collaborative murals. She is working on a memoir that weaves personal memories of Utah’s changing landscape with reflections on art, curiosity,
    and resilience, hoping to self‑publish and donate copies to the public library. Vanessa also seeks certification as a docent for the nearby national park, enabling her to guide visitors through the
    region’s natural and cultural history. To keep her creative practice fresh, she aspires to master digital illustration, producing illustrated postcards for charity sales. Her competitive streak drives
    her to set personal milestones, such as completing a daily sketch for a year and learning to play a new piece on the ukulele.
