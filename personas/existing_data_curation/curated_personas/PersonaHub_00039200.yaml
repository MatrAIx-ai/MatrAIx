persona_description: A passionate and experienced diver who has dedicated their life to exploring and documenting the underwater wonders of Palau. Francis Toribiong, the founder and owner of Fish 'n Fins
  dive center, has been a pioneer in the diving community and has made significant contributions to the field of marine biology through his research and documentation of the Lost Fleet of the Rock Islands
  and the discovery of Blue Corner. Francis' expertise and dedication to the underwater world have earned him recognition and respect in the diving community, and he continues to inspire and mentor young
  divers in Palau.
