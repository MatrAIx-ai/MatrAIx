persona_description: A scientist or researcher who specializes in the study of insect pests and their impact on agricultural production. They are likely to be involved in the development of economic injury
  levels (EILs) and economic thresholds (ETs) for insect pests, and to have experience with the use of formulae to express these thresholds. They may also be familiar with the journal Journal of Economic
  Entomology, which publishes articles on the economic significance of insects and is divided into various sections related to insect pests and their management.
