  hobbies: '[''Woodworking'', ''Model train building'', ''Fishing'', ''Chicago Cubs games'', ''Community volunteer clean‑up'', ''Classic rock vinyl collecting'', ''Card‑game nights'']'
  career_goals: He aims to advance to a supervisory role overseeing multiple parking facilities, obtain a certification in facility management, and eventually manage his own small parking lot or ancillary
    property services. He also hopes to mentor new attendants and improve operational efficiency through process improvements.
