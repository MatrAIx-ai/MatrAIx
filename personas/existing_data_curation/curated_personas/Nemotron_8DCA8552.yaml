    and Día de los Muertos events'', ''Walking in Fort Worth Botanic Gardens'', ''Journaling for stress relief'']'
  career_goals: Although Noemi is not currently in the formal workforce, she aspires to turn her culinary passion into a modest home‑based venture, selling homemade salsas, tamales, and seasonal preserves
    at local farmers’ markets. She also dreams of leading workshops at the Fort Worth community center, teaching traditional crafts and folk cooking to younger generations. On a personal development front,
    Noemi plans to enroll in a part‑time digital photography class to document her family's heritage and the vibrant cultural events she helps organize. Ultimately, she hopes to become a recognized cultural
    liaison, bridging Mexican traditions with the wider Fort Worth community while maintaining a flexible schedule that honors her need for occasional solitude and stress‑relieving creative pursuits.
