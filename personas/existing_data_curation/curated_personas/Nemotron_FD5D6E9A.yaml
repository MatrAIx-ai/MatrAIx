personas:
  professional: Jonathan Rodriguez is a budding community arts coordinator in training, blending graphic design expertise, bilingual communication, and meticulous project‑management skills to launch culturally
    resonant murals, social‑media campaigns, and youth‑focused events for Los Angeles nonprofits, and they thrive on turning community ideas into visual stories.
  sports: Jonathan Rodriguez plays midfield for a local Inglewood soccer league, follows the LA Galaxy closely, hits the community gym twice weekly for strength work, prefers the camaraderie of weekend
    pick‑up games over solitary workouts, and they view the sport as both exercise and social glue.
  arts: Jonathan Rodriguez spends evenings sketching large‑scale murals in Inglewood, captures candid street moments with a Nikon Z6, curates digital art for Instagram featuring influences from indie musicians
    like Mon Laferte and visual artists such as Tatyana Fazlalizadeh, attends gallery openings at LACMA and the Hammer Museum, and they channel these experiences into community workshops.
  travel: Jonathan Rodriguez favors short, budget‑friendly urban escapes, having explored the murals of Mexico City, the food markets of Oaxaca, and the street art scene in Buenos Aires, while dreaming
    of a road trip through the American Southwest’s national parks and a cultural pilgrimage to Barcelona’s Gaudí neighborhoods, and they plan each itinerary down to the last bus schedule.
  culinary: Jonathan Rodriguez loves cooking pupusas and tamales at home, experimenting with unconventional fillings like kimchi and feta, pairing them with fresh avocado salsa and homemade curtido, while
    also seeking out the best pork belly tacos from LA’s food trucks, and they treat each dish as a canvas for cultural fusion.
  core: Jonathan Rodriguez blends restless creativity with methodical community drive, juggling sketchbooks, soccer balls, and budgeting spreadsheets while they habitually worry about future plans.
background:
  cultural: Jonathan was raised in a Salvadoran immigrant family in Inglewood, California. His parents arrived from El Salvador in the early 1990s, bringing with them the language, customs, and culinary
    traditions of their homeland. At home, Spanish is spoken daily, and celebrations such as Las Fiestas Patronales, Día de la Madre, and the annual pupusa‑making festivals are central to family life. He
    grew up attending a local Catholic church, where community solidarity and respect for elders were emphasized. The vibrant Salvadoran diaspora in Los Angeles has provided him with a strong sense of identity,
    while also exposing him to the broader multicultural fabric of the city. This dual exposure influences his artistic sensibilities, food preferences, and his commitment to preserving and sharing Salvadoran
    culture within his neighborhood.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Social media content creation (Instagram, TikTok)'', ''Project management (Trello, Asana)'',
