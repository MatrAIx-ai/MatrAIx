  hobbies: '[''Sketching and mural painting'', ''Street photography'', ''Playing soccer in local leagues'', ''Cooking traditional Salvadoran dishes'', ''Visiting art galleries and museum exhibitions'',
    ''Listening to Latin American indie music and attending live concerts'', ''Volunteering with youth mentorship programs'', ''Exploring digital art tools (Procreate, Adobe Suite)'']'
  career_goals: Jonathan aims to complete his bachelor's degree in Communications or Arts Management within the next two years, leveraging his academic background and community experience. He aspires to
    secure an entry‑level position as a community arts coordinator or outreach specialist with a nonprofit serving the Latino population in Los Angeles. In the medium term, he hopes to advance to a program
    director role where he can design and lead cultural initiatives that blend visual arts, music, and food heritage. Ultimately, he envisions opening his own cultural studio or café that showcases Salvadoran
    cuisine, hosts art workshops, and provides a creative hub for local youth, thereby contributing to economic empowerment and cultural pride in his neighborhood.
