persona_description: A historian who specializes in the study of Dutch immigration to the New World, particularly the early arrivals and their impact on the development of the American colonies. The individual
  is deeply interested in the cultural and social history of the Dutch in the 17th and 18th centuries, and how their arrival and settlement contributed to the growth and development of the United States.
  The historian is also interested in the impact of the Dutch on the development of the American economy and society, and the role that the Dutch played in the formation of the American identity. The individual
  is knowledgeable about the history of the Dutch in the New World, and is skilled in research and analysis of primary sources. The historian is also interested in the impact of Dutch immigration on the
  development of the American legal system, and the role that the Dutch played in the formation of American law.
