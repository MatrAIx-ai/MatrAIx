  hobbies: '[''Pickup basketball'', ''Fishing'', ''DIY woodworking'', ''Car restoration'', ''Video gaming'', ''Live music concerts'', ''Boat outings'', ''Barbecue gatherings'', ''Electronics tinkering'',
    ''Community theater volunteering'']'
  career_goals: Kamal aims to move into a supervisory role within his plant, leveraging his technical expertise and strong interpersonal skills to lead a shift team. Over the next five years, he hopes to
    become a lead technician or production supervisor, and eventually transition into plant operations management where he can influence workflow improvements and introduce newer molding technologies, such
    as hybrid plastic‑metal processes. He also entertains the idea of starting his own small custom‑mold shop to combine his hands‑on skills with entrepreneurial flexibility.
