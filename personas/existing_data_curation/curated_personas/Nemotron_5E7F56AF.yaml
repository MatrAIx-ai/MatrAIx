personas:
  professional: Rylee Kile, a self-appointed 'toy librarian' at home, sorts stuffed animals and blocks by size and color each morning, showcasing a budding knack for organization, reliability, and the assertiveness
    they use to politely correct peers who misplace items.
  sports: Rylee Kile loves chasing a soft soccer ball in the backyard with a small group of toddler friends, proudly wears a tiny jersey of the local community Play Kids Soccer club, and enjoys watching
    the Chicago Cubs on TV with family, embodying a preference for intimate play over large crowds they tend to avoid.
  arts: Rylee Kile giggles to the catchy tunes of 'Baby Shark' and the 'Frozen' soundtrack, claps along to songs by children's performer Raffi, and curls up with picture books illustrated by Eric Carle,
    letting these familiar artists shape early aesthetic preferences and calm the reserved nature they sometimes display.
  travel: Rylee Kile's family weekend trips to the nearby city zoo and a cozy cabin in the mountains satisfy the child's love of predictable routines, while a future visit to Disneyland Paris remains a
    bright, imagined adventure, blending a craving for familiar settings with a spark of wanderlust they occasionally show when flipping through travel books.
  culinary: Rylee Kile prefers the soft texture of banana-pancakes drizzled with a hint of maple syrup, the creamy comfort of avocado mash on toast, and the cheesy stretch of macaroni and cheese, while
    often turning away from broccoli florets, showing a selective palate driven by texture and mild sweetness they seem to favor.
  core: Rylee Kile is a tiny architect of order who lines up toys before bedtime, guards a beloved plush rabbit, and confidently demands a second bedtime story, blending a quiet resolve with occasional
    stubborn bursts they display when bedtime is delayed.
background:
  cultural: Rylee is raised in a suburban white American family in Bensalem, Pennsylvania, within the cultural milieu of the Philadelphia County region. Her household observes typical middle‑class American
    traditions, celebrating holidays such as Thanksgiving, Christmas, and Fourth of July with family gatherings and community events. She frequently attends local library story‑time sessions and participates
    in neighborhood playdates, absorbing the values of politeness, routine, and community involvement common to her environment.
