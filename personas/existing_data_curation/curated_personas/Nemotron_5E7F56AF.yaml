  career_goals: While still early in development, Rylee shows a budding interest in roles that involve caring for others. She often pretends to be a teacher during play, lining up stuffed animals and explaining
    simple concepts, and she also enjoys mimicking animal caretakers by gently handling her plush pets. These imaginative play patterns hint at long‑term aspirations to work with children or animals, such
    as becoming a teacher or a veterinarian, motivated by her natural compassion and desire to help.
