personas:
  professional: Even Burkhead, a seasoned long‑haul and regional truck driver turned mentor, merges four decades of DOT‑safety expertise, precise route planning via maps and GPS, and persuasive client engagement
    with a pragmatic curiosity, making her the go‑to problem‑solver while championing women in trucking.
  sports: Even Burkhead avidly follows the Phoenix Suns and Arizona Diamondbacks, participates in the senior‑center’s weekly shuffleboard league, and joins a local classic‑car club that sponsors a charity
    5K, blending passive fandom with light, community‑oriented activity.
  arts: Even Burkhead enjoys listening to classic folk singer Joan Baez, watching classic westerns starring John Wayne, and attends monthly community theater productions of “Our Town,” often quoting lines
    at potlucks, illustrating how music and drama stitch together her social gatherings.
  travel: Even Burkhead prefers road trips that combine scenic desert routes—like the drive from Tucson to Sedona—with scheduled stops at historic Route 66 diners, while also dreaming of a cross‑border
    tour of Mexico’s Sonora coast, balancing an adventurous spirit with a modest travel budget.
  culinary: Even Burkhead experiments with comfort dishes such as baked mac & cheese seasoned with chipotle and lime, while harvesting fresh basil, cilantro, and heirloom tomatoes from her patio garden
    to pair with a quick carne asada skillet, showcasing a mix of American heartiness and Southwestern zest.
  core: Even Burkhead blends a lifetime of trucking grit with a zest for social dance nights, desert hikes, and herb‑spiced comfort food, all while staying competitively sharp, occasionally skeptical, and
    fiercely championing the next generation of female drivers.
background:
  cultural: Even grew up in a small Midwestern town in the 1940s‑1950s, where her family’s white working‑class roots emphasized hard work, modesty, and community involvement. After moving to Arizona in
    the 1970s to take advantage of expanding freight corridors, she adopted the laid‑back, sun‑rich lifestyle of Phoenix while retaining her Midwestern work ethic and values. She celebrates traditional
    holidays such as Independence Day and Thanksgiving, enjoys regional foods like Sonoran hot dogs and cactus salads, and stays connected to her cultural heritage through church attendance and volunteer
    service.
attributes:
  skills: '["Long‑haul truck driving", "Route planning and optimization", "Vehicle maintenance and minor repairs", "Safety compliance and regulatory knowledge", "Customer negotiation and sales", "Time management",
    "Use of GPS and fleet‑management software", "Mentoring and training new drivers"]'
  hobbies: '["Senior‑center dance nights", "Community potlucks", "Card‑game group (bridge, euchre)", "Guided hikes in the Sonoran desert", "Classic‑car shows", "Cooking fusion recipes", "Patio gardening"]'
  career_goals: Even aims to transition from full‑time driving to part‑time mentorship and safety consulting for her trucking company while also volunteering as a driver for a local senior‑services program.
    She hopes to leave a legacy of professionalism, encourage more women to enter the field, and maintain financial stability and personal health as she approaches retirement.
