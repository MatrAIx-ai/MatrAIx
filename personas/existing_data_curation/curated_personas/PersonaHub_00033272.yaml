persona_description: A conservation biologist who is passionate about the recovery of endangered species and the use of genetic rescue as a tool to increase population size. They have a strong background
  in genetics and conservation biology, and have a particular interest in the effects of inbreeding depression and the importance of genetic variation in species recovery. They are also knowledgeable about
  the impacts of human pressures on endangered species, and have experience implementing conservation efforts to prevent deaths by vehicles or getting shot by people who feel threatened by the species.
  They are likely to be interested in the Florida panther population and the success of the genetic rescue efforts that have been implemented to increase their population size.
