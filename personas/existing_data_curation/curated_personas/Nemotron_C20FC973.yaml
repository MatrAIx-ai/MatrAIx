  hobbies: '[''Traditional Mexican cooking'', ''Herb gardening'', ''Crocheting'', ''Listening to boleros and mariachi'', ''Attending Sunday Mass'', ''Volunteer work at senior center'', ''Watching Mexican
    telenovelas'', ''Walking local nature trails'', ''Collecting Mexican folk art'']'
  career_goals: Aurora aims to continue providing reliable housekeeping services while gradually moving into a supervisory role within her agency, where she can mentor younger cleaners and share her efficient
    methods. She hopes to develop a small side business offering specialized eco‑friendly cleaning for senior residents in Real County, ensuring a steady income for a comfortable retirement. Maintaining
    a predictable schedule and financial stability remain her top priorities, reflecting her practical and routine‑driven outlook.
