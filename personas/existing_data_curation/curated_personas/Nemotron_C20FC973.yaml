personas:
  professional: Aurora Tellez, a seasoned residential and small‑business cleaning specialist, leverages their deep‑cleaning expertise, bilingual communication, and methodical, routine‑driven approach to
    train staff and ensure eco‑friendly services for senior clients, while steadily moving toward a supervisory role.
  sports: Aurora Tellez enjoys weekly leisurely walks on the scenic trails around Camp Wood and participates in the local Senior Walking Club, cheered from the sidelines for the Houston Astros during baseball
    season and the Dallas Cowboys in fall football, and occasionally joins community low‑impact yoga classes to maintain flexibility.
  arts: Aurora Tellez finds solace in listening to classic boleros by José José and mariachi renditions of traditional songs, watches beloved telenovelas featuring actors like Thalía and Lucero, and curates
    a collection of folk art and ceramic pieces that echo the vibrant storytelling of artists such as Diego Rivera.
  travel: Aurora Tellez prefers well‑planned road trips, having driven to San Miguel de Allende and the Hill Country vineyards with their family, while dreaming of a tranquil stay in Oaxaca’s palette‑rich
    colonial streets, prioritizing comfort, safety, and cultural immersion within their modest travel budget.
  culinary: Aurora Tellez expertly prepares tamales and complex mole using fresh cilantro, oregano, and chilies from their herb garden, balances flavors with toasted spices and a hint of chocolate, and
    delights relatives with generous servings, though they sometimes burn the edges of mole when they rush to meet a cleaning schedule.
  core: Aurora Tellez is a routine‑obsessed, caring mentor who mixes meticulous cleaning expertise with heartfelt culinary traditions, balancing predictable work habits with a warm, community‑focused heart.
background:
  cultural: Aurora was born to Mexican immigrant parents who settled in Texas. She grew up in a bilingual household where Spanish was spoken daily, and Mexican cultural traditions were celebrated with fervor.
    Her upbringing emphasized family cohesion, respect for elders, and Catholic values, which she continues to honor through regular church attendance and observance of holidays such as Día de los Muertos
    and Las Posadas. Aurora’s Mexican heritage influences her love of home‑cooked meals, folk music, and community involvement, while her life in Camp Wood, TX, has blended these traditions with local customs,
    creating a rich, bicultural identity.
attributes:
  skills: '[''Deep cleaning techniques'', ''Floor and carpet care'', ''Safe chemical handling'', ''Household organization'', ''Laundry and linen care'', ''Inventory management'', ''Budgeting and expense
