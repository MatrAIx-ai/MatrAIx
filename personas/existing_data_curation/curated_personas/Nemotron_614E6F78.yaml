  hobbies: '[''Abstract watercolor painting'', ''Digital illustration of mathematical patterns'', ''Speculative fiction reading'', ''Philosophical literature'', ''Hiking and nature photography'', ''Puzzle
    solving (Sudoku, jigsaw puzzles)'', ''Cello playing in a community ensemble'', ''Volunteering at a STEM outreach club'', ''Experimental cooking'', ''Herb gardening'']'
  career_goals: Faith aims to become a principal investigator leading a research group that pushes the boundaries of computational mathematics, particularly in areas like climate dynamics and computational
    biology. She aspires to secure a tenure‑track faculty position at a research‑intensive university where she can integrate artistic data storytelling into her curriculum, fostering a new generation of
    scholars who value both analytical rigor and creative expression. Long‑term, she hopes to develop open‑source tools that democratize advanced analytics and to launch community outreach programs that
    encourage girls and underrepresented minorities to pursue STEM pathways.
