persona_description: A radiologist who specializes in performing ultrasound-guided biopsies using fine needle aspiration or core biopsy techniques. They are skilled in using ultrasound images to guide the
  biopsy needle to the site of the suspicious imaging findings, and they have experience with various types of needles, including fine needles for removing cells and hollow needles for taking small pieces
  of tissue samples. They are also skilled in giving numbing medication and placing metal markers to mark the biopsy site in case surgery is needed at a later time.
