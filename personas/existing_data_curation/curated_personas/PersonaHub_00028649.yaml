persona_description: A global advocate and expert on indigenous rights, Mililani Trask. She has extensive experience working in the international arena for the passage of the United Nations Declaration
  on the Rights of Indigenous Peoples and has served as the Pacific representative to the Permanent Forum on Indigenous Issues. Trask is also a founding member of the Indigenous Women's Network and has
  worked in the international arena on the Draft Declaration for Indigenous Peoples and the World Conference on Racism for 15 years. Her work has been cited by the Hawaii Advisory Committee to the U.S.
  Commission on Civil Rights and published by Cultural Survival and IWGIA Magazines on issues relating to native people and human and civil rights.
