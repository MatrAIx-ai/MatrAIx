personas:
  professional: Shayla Gallant, a 39‑year‑old legal secretary with over ten years of experience in Snohomish County law offices, blends meticulous document drafting, docket calendar upkeep, and legal software
    expertise with a cooperative, harmony‑driven demeanor, even as occasional disorganization prompts them to create ad‑hoc workflow systems that keep the office ticking.
  sports: Shayla Gallant, a 39‑year‑old who enjoys light hiking on the Cascade foothills, attends gentle yoga classes at a local studio, and roots for the Seattle Seahawks and Seattle Sounders, occasionally
    joining a community hiking club that meets on weekends to stay active without the pressure of competitive sports.
  arts: Shayla Gallant, an avid reader of Agatha Christie mysteries and Hilary Mantel’s historical sagas, leads a cozy book club, knits sweaters to the rhythm of Norah Jones, and treasures local theater
    productions starring the Seattle Repertory Theatre, letting classic literature and mellow music shape their quiet creative outlet.
  travel: Shayla Gallant, who prefers low‑key weekend getaways, frequently explores the San Juan Islands and Leavenworth’s Bavarian charm, dreams of strolling the historic streets of Bath, England, and
    plans trips around school holidays, balancing family responsibilities with a love for relaxed, culturally rich destinations.
  culinary: Shayla Gallant, a competent home baker, delights in kneading sourdough starter for seasonal rye and pumpkin breads, tosses garden‑fresh tomatoes, basil, and zucchini into a rustic pasta sauce,
    and spices their meals with rosemary and thyme, while occasionally ordering sushi as a treat on stressful weeks.
  core: Shayla Gallant, a 39‑year‑old legal professional with a love for mystery novels, gardening, and gentle yoga, balances meticulous work habits with a relaxed, sometimes disorganized lifestyle, often
    worrying about details while finding calm in knitting and baking.
background:
  cultural: Shayla comes from a middle‑class white Anglo‑American background typical of the Pacific Northwest. She was raised in a small town near Seattle, where community values of modesty, self‑reliance,
    and respect for nature were emphasized. Her family observes traditional American holidays such as Thanksgiving and Independence Day, while also embracing regional customs like the summer farmers’ market
    and local hiking traditions. This cultural upbringing blends a respect for order and practicality with an appreciation for personal space and quiet, aligning with her reserved, cooperative, and slightly
    flexible disposition.
attributes:
  skills: '[''Legal document drafting'', ''Case file organization'', ''Docket calendar management'', ''Client communication coordination'', ''Legal software proficiency (Clio, MyCase, Westlaw)'', ''Data
