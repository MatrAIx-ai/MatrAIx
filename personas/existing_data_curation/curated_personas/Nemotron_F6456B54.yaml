  hobbies: '[''Reading mystery and historical fiction'', ''Small‑group book club'', ''Backyard gardening'', ''Knitting'', ''Light hiking on local trails'', ''Baking seasonal breads'', ''Gentle yoga and
    mindfulness meditation'', ''Volunteering at community garden'']'
  career_goals: Shayla aims to advance from her current legal secretary role to a senior paralegal or legal office manager position within the next five years. She plans to obtain a certified paralegal
    credential and deepen her expertise in civil litigation support. She also seeks to develop more robust workflow systems that provide structure while allowing the flexibility she values, thereby reducing
    the stress associated with occasional disorganization. Additionally, she hopes to mentor junior staff and contribute to a supportive, harmonious office culture, balancing career growth with her family
    responsibilities.
