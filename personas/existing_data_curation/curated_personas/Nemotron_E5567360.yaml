  career_goals: Sergio aims to advance to a detective role within the Greenwood Police Department, eventually earning a supervisory rank such as sergeant or lieutenant. He plans to complete his bachelor's
    degree in criminal justice, acquire specialized training in cybercrime investigation, and develop a department‑wide community outreach program that partners with local schools to mentor at‑risk youth.
    He also hopes to gain SWAT certification and later transition into a consulting role in private security after his law‑enforcement career.
