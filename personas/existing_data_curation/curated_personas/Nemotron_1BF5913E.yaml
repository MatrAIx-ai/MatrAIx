  hobbies: '[''Reading historical nonfiction'', ''Chess'', ''Bridge'', ''Gardening (vegetable and flower)'', ''Woodworking'', ''Quilting'', ''Attending university public lectures'', ''Volunteering at local
    STEM outreach programs'', ''Birdwatching'', ''Jogging on trails'']'
  career_goals: Although retired, Darla aims to leave a lasting intellectual legacy. She plans to mentor high‑school students through local STEM outreach, author a memoir that chronicles her experiences
    as a pioneering woman in a technical field, and contribute volunteer expertise to the East Lansing public library's adult education programs. She also seeks to stay mentally sharp by learning about
    emerging technologies, such as artificial intelligence, and to ensure her estate and family history are well‑documented for future generations.
