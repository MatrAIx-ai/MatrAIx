  hobbies: '[''drawing and sketching'', ''building with LEGO bricks'', ''exploring nature trails'', ''reading graphic novels'', ''playing Scratch coding games'', ''listening to music (hip‑hop, gospel, R&B)'',
    ''playing basketball'', ''participating in church youth choir'', ''helping in family kitchen'']'
  career_goals: Darrell dreams of a future where he can combine his love for art and science, hoping to become a creator‑inventor who designs fun educational games or interactive murals that inspire other
    kids. He also imagines exploring the outdoors as an environmental researcher or a community storyteller who shares local histories. He values flexibility, so he wants a career that lets him explore
    new ideas, work on projects he’s passionate about, and give back to his community.
