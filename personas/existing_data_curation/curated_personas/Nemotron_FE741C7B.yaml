personas:
  professional: Ashley Delriego, a technically versatile computer support specialist, blends a curious eye for emerging tools with a pragmatic, user‑centric approach, diagnosing hardware across Windows,
    macOS, and Linux, automating routine fixes with PowerShell and Bash, and crafting clear documentation while thriving in loosely structured, remote‑friendly environments, and they consistently deliver
    under pressure despite a relaxed stance toward strict planning.
  sports: Ashley Delriego, a paddleboarding enthusiast who joins the Jupiter Paddleboarding Association during summer and the South Florida Snorkel Society in winter, regularly follows the Miami Dolphins
    and Orlando Magic, and squeezes in beach volleyball matches with friends, balancing low‑impact water sports with occasional cardio runs, and they relish the calm after sunrise sessions on the water.
  arts: Ashley Delriego, an avid sci‑fi reader and indie gamer, devours novels by N.K. Jemisin and Andy Weir, immerses in story‑driven games like Oxenfree and Disco Elysium, and captures sunrise seascapes
    with a Canon EOS, while humming along to Bon Iver and M83 playlists during editing sessions, and they often discuss plot twists with fellow meetup members online.
  travel: Ashley Delriego prefers curated, low‑stress trips, having explored the Florida Keys, a weekend getaway to Savannah, a solo backpacking stint in Iceland’s fjords, and a future dream to attend the
    Cherry Blossom Festival in Kyoto, always using a compact carry‑on and a mix of Airbnb stays and local hostels, and they plan each itinerary with a balance of spontaneity and basic budgeting.
  culinary: Ashley Delriego, a self‑taught home chef, blends herbs from their balcony garden—basil, mint, and rosemary—into experimental fusion dishes like miso‑marinated shrimp tacos with lime‑cilantro
    salsa and spicy Korean‑style ramen, and enjoys occasional dining at farm‑to‑table spots such as The Rustic Kitchen while occasionally burning the edges of their focaccia when distracted, and they keep
    a notebook of flavor pairings for future improvisations.
  core: Ashley Delriego balances a curiosity‑driven tech career with a laid‑back, solitary lifestyle, punctuated by sunrise paddleboard sessions, herb‑garden experiments, and a habit of over‑committing
    to side projects while forgetting to file taxes on deadline, and they view each challenge as a chance to iterate on personal systems.
background:
  cultural: Ashley grew up in a middle‑class suburban environment in the greater West Palm Beach area, where the beach lifestyle and a mix of multicultural influences shaped her worldview. Though she identifies
    with a broadly mainstream white American background, she appreciates the cultural diversity of Palm Beach County, from the arts scene to the seasonal influx of visitors from various backgrounds. This
    environment fostered her respect for community involvement, evident in her volunteer work, and nurtured a practical, laid‑back attitude toward life and work. Her upbringing emphasized education and
    self‑reliance, encouraging her to pursue a STEM degree and a career that balances technical rigor with personal flexibility.
attributes:
  skills: '[''Hardware diagnostics'', ''Operating system troubleshooting (Windows, macOS, Linux)'', ''Remote support tools (TeamViewer, AnyDesk)'', ''Ticketing systems (ServiceNow, Jira Service Desk)'',
    ''Network fundamentals (TCP/IP, DNS, DHCP)'', ''Scripting (PowerShell, Bash)'', ''Basic cybersecurity awareness'', ''Technical documentation'', ''User training and onboarding'', ''Empathetic communication'',
    ''Problem‑solving under pressure'', ''Ad‑hoc workflow design'']'
  hobbies: '[''Paddleboarding'', ''Snorkeling'', ''Reading science fiction'', ''Indie video gaming'', ''Coastal photography'', ''Urban herb gardening'', ''Volunteering at animal shelter'', ''Attending small
    tech meetups'', ''Cooking experimental recipes'', ''Listening to tech podcasts'']'
  career_goals: Ashley aims to deepen her technical foundation by earning CompTIA Network+ and Cisco CCNA certifications within the next two years, positioning herself for a transition into network engineering
    or cloud support. She is also pursuing an AWS Cloud Practitioner credential to broaden her understanding of cloud‑based services. Long‑term, she envisions leading a small, collaborative support team
    where she can mentor new hires, develop a comprehensive knowledge‑base, and champion user‑centric service standards. Balancing career growth with personal flexibility, she hopes to secure a remote‑friendly
    role that allows her to continue contributing to local community tech workshops and occasional volunteer IT projects for small businesses in Palm Beach County.
