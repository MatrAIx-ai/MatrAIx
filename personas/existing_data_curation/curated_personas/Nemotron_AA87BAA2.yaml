  career_goals: John aims to move beyond the front‑desk clerk role and obtain a supervisory position within the hospitality industry, leveraging his curiosity for emerging guest‑experience technologies.
    He plans to enroll in a hospitality management certificate program to deepen his operational knowledge and eventually become a boutique hotel manager, ideally overseeing a quieter, resort‑style property
    where he can implement low‑stress, guest‑centric policies. Balancing his desire for autonomy with his need for a calm work environment, he also envisions one day owning a small bed‑and‑breakfast that
    caters to solo travelers seeking tranquility.
