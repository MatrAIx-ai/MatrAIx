personas:
  professional: John Ellithorpe leverages years of front‑desk hospitality at a bustling resort to excel in guest relations, using OPERA and Cloudbeds with calm assertiveness, while dreaming of a supervisory
    role that lets them experiment with guest‑experience tech and eventually manage a tranquil boutique B&B for solo travelers.
  sports: John Ellithorpe enjoys solo hikes in the Oquirrh Mountains, weekly jogs along the Jordan River Parkway, and follows the Utah Jazz and Real Salt Lake while occasionally training with the Wasatch
    Trail Runners club for cross‑country endurance.
  arts: John Ellithorpe devotes evenings to strumming acoustic guitar, photographing night skies with a modest telescope, and immersing themselves in sci‑fi and fantasy novels by Brandon Sanderson and N.K.
    Jemisin, while also watching Christopher Nolan films and listening to the ambient works of Explosions in the Sky.
  travel: John Ellithorpe favors low‑key solo adventures, having trekked Zion and Bryce Canyon during autumn and yearning to stay in a quiet ryokan in Kyoto, balancing a love for remote natural vistas with
    a modest budget that prioritizes off‑peak travel.
  culinary: John Ellithorpe enjoys simple, wholesome cooking, often preparing quinoa bowls with roasted wild mushrooms and herb‑infused olive oil, mastering a decent salmon with dill recipe, and sipping
    hand‑crafted drip coffee from the local Roost Coffee Roasters.
  core: John Ellithorpe is a solitary, anxiety‑prone hospitality professional who channels curiosity into tech‑savvy guest experiences while grounding themselves through meditation, hikes, and a passion
    for sci‑fi storytelling.
background:
  cultural: John grew up in Layton, Utah, a predominantly white, middle‑class community with strong ties to the Church of Jesus Christ of Latter‑day Saints. While his upbringing emphasized modesty, hard
    work, and community service—values that underpin his courteous hospitality style—he later stepped away from organized religion after his divorce, fostering a more individualistic outlook. The local
    culture’s emphasis on outdoor recreation and a growing tourism sector shaped his appreciation for nature and his career choice in resort hospitality. This blend of conservative suburban roots and a
    personal quest for quiet autonomy informs his work ethic, social preferences, and leisure pursuits.
