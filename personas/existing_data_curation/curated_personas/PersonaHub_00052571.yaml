persona_description: A linguist who specializes in the study of the ancient Sudanese/Sudra populations of India and their connections to the Indus Valley civilization. Their research interests include the
  genetic, linguistic, and cultural similarities between the Sudanese and Indian populations, as well as the common motifs and objects found in both regions. They are particularly interested in the connections
  between the ancient Sudanese/Sudra and India, evidenced by objects and motifs common to both the Upper Nile during the Indus Valley period and the Indus Valley civilization.
