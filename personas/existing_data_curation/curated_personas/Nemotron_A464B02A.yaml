  career_goals: Joanthony aims to advance to a senior category manager role within the next five years, leading a regional procurement team and shaping sustainable sourcing strategies that benefit small
    Mexican‑American businesses. He plans to earn a Certified Professional in Supply Management (CPSM) credential and integrate AI‑driven analytics into purchasing decisions to increase efficiency and reduce
    waste. Long‑term, he envisions launching his own consultancy focused on inclusive, ethical supply chains for local retailers, while mentoring underrepresented youth in business and STEM fields.
