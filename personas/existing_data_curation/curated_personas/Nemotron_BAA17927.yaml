personas:
  professional: Vivian Perez, a retired humanities scholar turned community archivist, leverages their expertise in literary analysis, Spanish‑English translation, and genealogical research to curate oral
    histories, lead a senior book‑club, and organize cooking workshops, all while they blend meticulous organization with flexible curiosity to keep events both well‑structured and warmly inviting.
  sports: Vivian Perez enjoys leisurely walks in local parks with their dog, participates in a senior walking club that meets twice weekly, and follows the New York Mets and New Jersey Devils as a casual
    fan, preferring low‑impact activity that aligns with their age‑adjusted mobility.
  arts: Vivian Perez devotes evenings to reading historical novels by authors such as Gabriel García Márquez and poetry by Pablo Neruda, while their soundtrack features classic salsa legends like Celia Cruz
    and bolero crooners such as Los Panchos, enriching their cultural evenings and book‑club discussions.
  travel: Vivian Perez favors slow, organized travel that blends heritage exploration with family visits, having toured historic colonial towns across the Caribbean and the old city of Granada in Spain,
    while dreaming of a quiet pilgrimage through the cobblestone streets of Cartagena, Colombia.
  culinary: Vivian Perez relishes preparing traditional island dishes such as arroz con gandules, pasteles de plátano, and pernil seasoned with adobo, skillfully harvesting fresh cilantro, oregano, and
    thyme from their balcony garden, and delights in sharing these meals at intimate tea parties accompanied by homemade lemon‑honey scones.
  core: Vivian Perez merges scholarly curiosity with a nurturing spirit, often losing track of time while leafing through genealogical records, yet habitually forgetting to water their herbs when a new
    book arrives, embodying a delightful blend of intellectual rigor and endearing absent‑mindedness.
background:
  cultural: Vivian was born to Puerto Rican parents who migrated to the mainland United States in the 1950s. She grew up bilingual, celebrating traditional festivals such as Noche de San Juan and maintaining
    close ties to extended family on the island. The rhythms of salsa, the flavors of sofrito-based cuisine, and the Catholic traditions of her community shaped her values of family, hospitality, and communal
    harmony. Living in Montclair, she integrates her Caribbean heritage with the local multicultural environment, often sharing her culture through cooking classes, storytelling, and participation in the
    town's Hispanic heritage events.
