    in small book clubs'']'
  career_goals: Although retired from formal employment, Vivian aims to remain intellectually active and to give back to her community. She hopes to complete a comprehensive family history project, to lead
    a senior book-club focused on Caribbean literature, and to organize quarterly cooking workshops that teach Puerto Rican dishes to local families. She also aspires to serve as a volunteer archivist at
    the Montclair Public Library, preserving oral histories of the island-born residents.
