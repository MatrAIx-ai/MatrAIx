personas:
  professional: Sharon Morin, a 14-year-old robotics enthusiast and budding marine-technology hobbyist, they blend methodical coding skills with a curiosity-driven love for ocean ecosystems, channeling
    their organized, reliable nature into building functional models for their school's robotics club and planning future underwater-drone prototypes.
  sports: Sharon Morin dives into swimming and snorkeling at Lake Worth Beach each weekend, competes with the local Palm Beach Panthers swim team during the spring season, and follows the Miami Heat and
    Tampa Bay Buccaneers, balancing structured training with casual beach fitness as part of their disciplined yet adventurous athletic routine.
  arts: 'Sharon Morin indulges in speculative fiction from authors like Neal Stephenson and Ursula K. Le Guin, streams music by Billie Eilish and BTS while sketching futuristic marine robots, and volunteers
    at the public library''s storytime where they read passages from the animated series ''Avatar: The Last Airbender'', weaving a love for narrative and visual art into their creative downtime.'
  travel: Sharon Morin dreams of snorkeling the coral reefs of the Florida Keys and the Galapagos Islands, while also planning day trips to the Everglades and a family road trip to Washington, DC's Smithsonian
    museums, preferring well-researched itineraries that balance budget-friendly adventure with their fascination for marine biodiversity.
  culinary: Sharon Morin enjoys cooking simple yet vibrant meals like shrimp tacos with mango salsa, avocado lime crema, and a dash of chili powder, and they are learning to perfect spaghetti carbonara
    using pancetta and pecorino, often experimenting with seaweed snacks as a nod to their marine interests.
  core: Sharon Morin is a methodical teen who juggles coding, marine curiosity, and a secret stash of comic books, never missing a deadline but they occasionally stay up late debugging code while the sound
    of waves crashes outside their window.
background:
  cultural: Sharon grows up in a middle‑class, predominantly white family in Lake Worth, Florida, where her cultural experiences are shaped by a blend of traditional American values and the multicultural
    vibe of the coastal community. Her family celebrates typical U.S. holidays and maintains a modest appreciation for European heritage through occasional family recipes and stories. Living near a vibrant,
    multicultural city exposes her to diverse traditions, food, and languages, which she observes with curiosity while maintaining her own cultural identity. This environment encourages her practical outlook
    and her balanced view of new ideas alongside established customs.
