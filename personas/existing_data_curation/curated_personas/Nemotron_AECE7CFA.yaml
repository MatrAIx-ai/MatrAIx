  career_goals: Sharon aspires to pursue a career in environmental engineering, aiming to design sustainable solutions for coastal communities like Lake Worth. She plans to maintain high academic performance
    in math and science, seek internships with local environmental agencies, and eventually obtain a degree in civil or environmental engineering. Her long‑term ambition includes leading community projects
    that protect the shoreline and improve local water quality, combining her practical problem‑solving skills with her desire to make a tangible, positive impact.
