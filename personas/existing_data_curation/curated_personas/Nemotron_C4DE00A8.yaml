  hobbies: '[''Hiking in the Cascades and Seattle parks'', ''Landscape photography'', ''Strategic video gaming'', ''Puzzle solving (Sudoku, crosswords)'', ''Cooking East Asian fusion dishes'', ''Board‑game
    evenings with friends'', ''Raspberry Pi and home‑automation projects'', ''Volunteering for community first‑aid workshops'']'
  career_goals: Austin aims to advance into a supervisory role within Seattle’s EMS system, eventually becoming a critical‑care or flight paramedic. He plans to earn a Master’s degree in Healthcare Informatics
    or Public Health to merge his STEM expertise with emergency medical services, developing data‑driven models that improve patient outcomes and response times. In the longer term, he hopes to lead community
    outreach programs that train new EMTs and promote public health preparedness, while also pursuing certification as a Critical Care Paramedic.
