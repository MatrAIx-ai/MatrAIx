personas:
  professional: Austin Tsang is a Seattle paramedic who combines ACLS‑certified emergency care and data‑driven protocol optimization with a pragmatic, slightly disorganized streak that keeps them ready
    for unpredictable scenes while still craving structured outcomes.
  sports: Austin Tsang spends weekends hiking the Cascades with the Northwest Outdoor Club, follows the Seattle Seahawks and Sounders with fervor, and logs runs and yoga sessions on Strava, though they
    sometimes skip scheduled gym days for impromptu board‑game evenings.
  arts: Austin Tsang captures sunrise vistas in the style of Ansel Adams while curating playlists featuring Bon Iver and Boards of Canada, and regularly hosts board‑game evenings spotlighting designs by
    Stefan Feld and Stonemaier Games.
  travel: Austin Tsang favors spontaneous weekend getaways to Olympic National Park, the San Juan Islands, and occasional overseas trips to Kyoto for culinary inspiration, planning trips with a flexible
    itinerary but always packing a compact camera and a portable charger.
  culinary: Austin Tsang experiments with East‑Asian fusion at home, often whipping up miso‑glazed salmon with smoked wild‑berry reductions or Sichuan‑spiced dungeness crab, balancing an intermediate cooking
    skill set with a love for fresh Pacific Northwest produce like shiitake mushrooms and pine nuts.
  core: Austin Tsang is a data‑savvy paramedic who trails the mountains with a camera, codes home‑automation gadgets, and secretly hoards board‑game expansions, all while juggling a love for structure and
    a penchant for last‑minute spontaneity.
background:
  cultural: Austin is a second‑generation East Asian American; his parents immigrated from Taiwan in the early 1990s and raised him in a bilingual household in Seattle. He grew up celebrating cultural traditions
    such as Lunar New Year and the Mid‑Autumn Festival while also being immersed in the multicultural fabric of the Pacific Northwest. His family emphasized education, community responsibility, and respect
    for elders, values that still guide his professional dedication and volunteer spirit. Austin speaks Mandarin fluently and has a working familiarity with Taiwanese Hokkien, which he occasionally uses
    when connecting with senior community members.
attributes:
  skills: '[''Advanced Cardiac Life Support (ACLS)'', ''Pre‑Hospital Trauma Assessment'', ''IV Therapy and Medication Administration'', ''Emergency Medical Dispatch Coordination'', ''Medical Equipment Maintenance'',
