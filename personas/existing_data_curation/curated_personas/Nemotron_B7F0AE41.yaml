  hobbies: '[''Reading (non-fiction, mystery)'', ''Journaling'', ''Sketching/drawing'', ''Baking simple desserts'', ''Gardening (vegetable garden)'', ''Pet care (dog)'', ''Puzzle solving (jigsaw, crosswords)'',
