  career_goals: Shirley's primary career ambition is to work in a caring yet structured profession, such as nursing. She plans to complete high school with a solid GPA, attend a community college for a
    nursing assistant program, gain clinical experience, and eventually become a registered nurse. Additionally, she hopes to develop leadership abilities through involvement in student council and other
    school activities to prepare for future responsibilities.
