personas:
  professional: Darnell Nolley, a budding LEGO engineer, they apply a practical, structure‑loving mindset to building intricate brick creations that mirror real‑world architecture, often organizing pieces
    by color and shape before embarking on any project, which showcases early engineering thinking and a reliable, detail‑oriented work style.
  sports: Darnell Nolley, a member of the Parkside Panthers youth soccer league and the Kids’ Swim Club at the community pool, they eagerly practice goal‑scoring drills after school, cheer for the LA Galaxy
    and the Miami Dolphins on game nights, and strive to improve endurance for the upcoming summer swim meet, while also relishing spontaneous beach soccer games during family outings.
  arts: Darnell Nolley, an avid cartoonist and hip‑hop aficionado, they spend afternoons sketching original comic strips featuring a superhero hamster, listen to upbeat tracks by Kendrick Lamar and Ariana Grande
    while building LEGO Ninjago sets, and collect limited‑edition LEGO art bricks, blending visual storytelling with rhythmic inspiration.
  travel: Darnell Nolley, who spends weekends exploring the sandy shores of Outer Banks, North Carolina, they hunt for uniquely patterned shells, visit the nearby lighthouse for panoramic views, and have
    a bucket list that includes a family road‑trip to the Disney World theme parks in Orlando and a future adventure to the Grand Canyon, balancing curiosity with the comfort of staying close to home.
  culinary: Darnell Nolley, who prides themselves on making a perfect peanut‑butter‑banana sandwich and can whip up a cheesy macaroni‑and‑cheese bowl with extra broccoli florets, they also enjoy fresh fruit
    smoothies blended with strawberries, bananas, and a splash of orange juice, and indulge in occasional fish‑taco bites after beach trips, showing a growing enthusiasm for both simple comfort foods and
    playful culinary experiments.
  core: Darnell Nolley, a structured 7‑year‑old with a love for LEGO engineering, soccer, and secretly hoarding beach shells under their pillow, balances meticulous routines with spontaneous bursts of creativity,
    even if they occasionally forget to finish homework before bedtime.
background:
  cultural: Darnell is part of an African American family living in Clearwater, Florida. His family celebrates cultural traditions such as Juneteenth and incorporates soul food and Southern cooking into
    meals. Weekly church attendance introduces him to gospel music and community fellowship. Stories about the civil‑rights movement and family heritage are shared by older relatives, fostering pride in
    his roots. The multicultural environment of Central Florida, with its beaches, wildlife, and diverse arts scene, also influences his upbringing, encouraging curiosity about nature and community involvement
    while honoring his cultural identity.
