  career_goals: Darnell dreams of exploring the ocean as a marine biologist who studies sea turtles and coral reefs, inspired by beach trips and classroom science lessons. He also admires firefighters for
    their bravery and sometimes imagines helping his community in that role. Occasionally, he talks about becoming an astronaut after watching space cartoons, but his current ambition is to excel in his
    school science projects and learn more about marine life.
