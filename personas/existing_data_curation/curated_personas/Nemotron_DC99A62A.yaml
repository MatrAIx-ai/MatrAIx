  career_goals: Denise aims to advance to a senior sales manager role within the next two to three years, overseeing a team of agents and driving regional sales growth. She plans to earn advanced certifications
    such as the Certified Insurance Counselor (CIC) and pursue a bachelor’s degree in Business Administration to broaden her financial advisory skills. Long‑term, she envisions launching her own boutique
    insurance agency focused on serving families and small businesses in San Diego County, becoming a recognized community resource for insurance literacy. Balancing ambition with well‑being, she seeks
    to develop healthier work‑life integration by delegating tasks, incorporating mindfulness practices, and reducing stress.
