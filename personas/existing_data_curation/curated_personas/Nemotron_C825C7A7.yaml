personas:
  professional: Peter Johnson, an 18‑year‑old full‑stack software developer, blends solid Python, JavaScript, and C++ skills with a keen UI/UX eye, uses agile and test‑driven practices to craft interactive
    web experiences, and lets his curiosity for speculative fiction guide unconventional problem‑solving while balancing meticulous organization with a willingness to experiment.
  sports: Peter Johnson follows the LA Lakers and LA Galaxy, enjoys playing pick‑up basketball at a local community court on weekends, and joins monthly beach‑volleyball games with a small group of friends,
    preferring low‑intensity, socially engaging fitness over competitive sports.
  arts: Peter Johnson draws artistic inspiration from contemporary spaces like The Broad and the Museum of Contemporary Art, creates digital illustrations on a Wacom tablet while listening to Flying Lotus,
    St. Vincent, and Tangerine Dream, and regularly hosts board‑game nights featuring Terraforming Mars and Gloomhaven, weaving his love of speculative fiction and philosophy into every creative session.
  travel: Peter Johnson favors short, introspective trips, having backpacked the rugged cliffs of Big Sur and explored minimalist art installations in Osaka, while planning a future visit to Reykjavik’s
    avant‑garde music festivals, all curated to fit a modest student budget and a low‑stress itinerary.
  culinary: Peter Johnson enjoys crafting avocado toast topped with smoked salmon and pickled radish, cooking Japanese ramen bowls with slow‑simmered broth, and indulging in occasional street‑taco nights
    in LA, yet they often forgo meals during late‑night coding marathons, resulting in irregular eating patterns.
  core: Peter Johnson is a curious, art‑driven 18‑year‑old full‑stack developer who balances meticulous coding with spontaneous creativity, wrestles with anxiety, and finds calm through meditation, indie
    beats, and coastal hikes.
background:
  cultural: Peter grew up in Lomita, a suburban enclave of Los Angeles County, within a middle‑class White American family with Anglo‑German roots. The multicultural vibrancy of Southern California exposed
    him early to a spectrum of artistic and technological influences—from local art collectives and indie music venues to the booming tech scene of nearby Silicon Beach. This environment fostered an open‑minded,
    progressive outlook, encouraging a blend of analytical rigor and creative exploration. While he identifies with mainstream American cultural norms, his upbringing also emphasized individualism, self‑directed
    learning, and a respect for diverse perspectives.
