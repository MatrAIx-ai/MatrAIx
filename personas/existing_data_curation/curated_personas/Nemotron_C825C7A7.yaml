  hobbies: '[''Digital illustration'', ''Graphic design experimentation'', ''Photography (street, candid)'', ''Visiting contemporary art galleries'', ''Reading speculative fiction'', ''Listening to indie
    and experimental music'', ''Strategy board games with close friends'', ''Mindfulness meditation'', ''Reflective journaling'', ''Coastal hiking'']'
  career_goals: Peter aims to become a lead full‑stack engineer at a forward‑thinking tech company where he can merge technology and creative expression. He aspires to contribute to products that blend
    art and interactivity, such as immersive media platforms or interactive installations. Over the next five years he plans to deepen his expertise in machine learning and human‑computer interaction, earn
    certifications in cloud architecture, and publish open‑source projects. Ultimately, he envisions founding his own startup that creates experiential digital art tools, while maintaining a work environment
    that supports his need for flexibility and low‑stress balance.
