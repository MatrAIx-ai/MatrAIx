  hobbies: '[''Drama club acting'', ''Debate club'', ''Volunteering at food bank'', ''Volunteering at animal shelter'', ''Creating TikTok videos'', ''Journaling and poetry'', ''Reading self-help/psychology
    books'', ''Planning game nights'', ''Volleyball'', ''Gardening'']'
  career_goals: Salem aims to pursue a career that blends her love for helping others with her strength in structured environments. She plans to study psychology or social work in college to become a school
    counselor or mental‑health advocate for adolescents. Her short‑term goal is to gain experience through volunteer counseling programs and internships in community outreach. Long‑term, she envisions creating
    or leading nonprofit initiatives that provide organized, safe spaces for youth to seek support, develop coping skills, and build community connections.
