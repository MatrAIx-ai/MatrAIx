personas:
  professional: Ashik Park is an aspiring robotics and game design enthusiast who channels a curiosity for puzzle‑driven video games and a practical knack for LEGO robotics into school STEM projects, balancing
    meticulous planning with the flexibility to iterate on prototypes while they occasionally assert leadership in group assignments despite bouts of anxiety.
  sports: Ashik Park, a hometown sports enthusiast, spends afternoons shooting hoops at Sunrise Park, playing for the Sunrise High School varsity basketball team and following the Miami Heat, while they
    also swim at South Beach during summer and cheer on the Miami Dolphins during football season, embodying a balanced, community‑oriented fitness routine that blends competitive play with casual recreation.
  arts: Ashik Park, a budding artist, sketches original comic characters inspired by Stan Lee and Neil Gaiman, writes short stories while listening to Taylor Swift and Bad Bunny, and they attend the annual
    Calle Ocho festival to immerse in street art and live performances, allowing a blend of pop culture and visual storytelling to shape their identity and leisure.
  travel: Ashik Park, a travel‑curious teen, routinely vacations at the Florida Keys and the Everglades, has visited New York City for the Thanksgiving Parade, dreams of exploring San Juan, Puerto Rico,
    and they hope to attend the Tokyo Anime Fair, balancing family‑budget constraints with a desire for both relaxation on sun‑soaked beaches and cultural immersion in vibrant urban festivals.
  culinary: Ashik Park, a food‑enthusiast, favors the classic Cuban sandwich with mojo‑marinated pork, Swiss cheese, pickles, and mustard, loves mango‑lime salsa and guava jam on toast, occasionally helps
    their mom prepare shrimp tacos with cilantro and lime, and they enjoy experimenting with plantain chips, reflecting a palate that fuses local flavors with teen‑friendly comfort foods.
  core: Ashik Park is an introspective teen who juggles a passion for robotics, a love of comic storytelling, and a restless mind that alternates between meticulous planning and sudden bouts of anxiety,
    and they often find solace in meditation and the rhythmic bounce of a basketball.
background:
  cultural: Ashik is a white American teen living in Miami, Florida. His family originally hails from the Midwest but relocated to South Florida for work, exposing him to a richly diverse community. He
    celebrates traditional American holidays like Thanksgiving and the Fourth of July, while also embracing local cultural influences—he enjoys Cuban‑style sandwiches, listens to a mix of pop and reggaeton,
    and participates in neighborhood events such as the Calle Ocho festival. Although English is his primary language, he has a working knowledge of Spanish thanks to school classes and peer interactions.
    His family emphasizes education, community involvement, and outdoor recreation, often spending weekends at the beach or engaging in sports, which shapes his balanced, socially aware outlook.
