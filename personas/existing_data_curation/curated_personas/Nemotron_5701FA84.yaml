  career_goals: Ashik aspires to attend a STEM‑focused high school and later study computer science or environmental engineering. He aims to merge his technical skills with his empathy by developing digital
    tools—such as apps or interactive games—that support mental‑health awareness for teens. Ultimately, he envisions a career as a software developer or tech innovator who creates practical, user‑friendly
    solutions for sustainable living and emotional well‑being, while also giving back to his community through mentorship programs.
