  hobbies: '[''Cooking Vietnamese cuisine'', ''Gardening'', ''Participating in cultural festivals (e.g., Tet)'', ''Playing mahjong and card games with friends'', ''Listening to technology and personal development
    podcasts'', ''Walking his dog'', ''Volunteering transport services for seniors'', ''Singing in church choir'']'
  career_goals: Van aims to transition from full‑time driving to a semi‑retired role where he can mentor younger drivers and potentially launch a small fleet of electric taxis, combining his practical experience
    with his curiosity about green technology. He is interested in completing a short certification in autonomous vehicle safety to stay current with emerging trends and hopes to develop a simple mobile
    app that helps local drivers optimize routes based on real‑time traffic. Additionally, Van plans to deepen his involvement in community safety initiatives, partnering with Montgomery County officials
    to promote safe driving education. While preparing for eventual retirement, he wishes to allocate more time to his family and cultural activities, ensuring a balanced and fulfilling later stage of life.
