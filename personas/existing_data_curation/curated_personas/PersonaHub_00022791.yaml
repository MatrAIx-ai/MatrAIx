persona_description: A conservation biologist and researcher who specializes in the study of amphibian diseases, particularly the effects of fungal infections and the development of protective bacteria.
  His research interests include the use of microorganisms as potential tools for conservation and the development of new treatments for amphibian diseases. He is known for his work in Panama, where he
  discovered the protective bacteria on the skin of mountain yellow-legged frogs that are dying from fungal infections. He is also interested in the potential use of bacteria as a tool for reintroducing
  amphibians to the wild.
