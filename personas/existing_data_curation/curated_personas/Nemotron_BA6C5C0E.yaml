  hobbies: '[''sketching'', ''digital painting'', ''reading speculative fiction'', ''visiting art galleries'', ''listening to experimental music'', ''playing indie video games'', ''writing short stories'',
    ''attending improv workshops'', ''creating art podcasts'', ''practicing meditation'', ''dancing salsa'']'
  career_goals: Claudia aspires to turn her imaginative vision into a professional career as a multidisciplinary visual storyteller. She aims to build a robust online portfolio that showcases her illustration,
    concept art, and narrative projects, attracting freelance commissions and collaborations with indie game developers. In the next few years she plans to enroll in an associate degree program in Graphic
    Design or complete targeted online certifications in UI/UX design to formalize her skill set while preserving her flexible schedule. Ultimately, she hopes to launch her own boutique studio focused on
    socially conscious visual projects that celebrate Nicaraguan heritage and contemporary cultural narratives. Her competitive nature pushes her to pursue local art contests, win recognition in online
    art communities, and secure mentorship from established artists.
