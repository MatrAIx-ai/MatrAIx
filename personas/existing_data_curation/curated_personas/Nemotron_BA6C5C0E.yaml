personas:
  professional: Claudia Molina, a 24‑year‑old multidisciplinary visual storyteller, merges digital illustration, generative Python art, and speculative short fiction to create concept pieces for indie games
    and socially conscious projects, leveraging their boundless imagination and competitive streak while thriving in a loosely structured, flexible workflow.
  sports: Claudia Molina enjoys weekend beach volleyball at South Beach, dances salsa at community events for cardio, follows the Miami Heat and Miami United FC, and participates in a local amateur soccer
    league, favoring social, rhythmic activities over regimented gym routines.
  arts: Claudia Molina frequents Miami’s Wynwood Walls, draws inspiration from muralist Joaquín Torres, collects records by experimental musician Arca, listens to traditional folk group Los Caballeros de
    la Sierra, and reveres the surreal paintings of Frida Kahlo, letting those influences shape their own narrative illustrations.
  travel: Claudia Molina prefers spur‑of‑the‑moment getaways, having explored Key West’s art scene, the historic streets of Cartagena, a solo retreat in Granada, Spain’s Alhambra, and a cultural immersion
    in Tulum, Mexico, yet often balances travel dreams with a student‑budget and family responsibilities.
  culinary: Claudia Molina enjoys cooking gallo pinto, nacatamales, and rosquillas at home, experiments with fusion dishes like ceviche‑topped taco bowls, and has a moderate skill level that shines during
    weekend potlucks, though they sometimes over‑season dishes in a burst of creative spontaneity.
  core: Claudia Molina is a fiercely imaginative visual storyteller who balances competitive ambition with a laid‑back, occasionally disorganized lifestyle, obsessively curating art while snagging their
    next coffee on a whim.
background:
  cultural: Claudia grew up in Opa Locka within a close‑knit Nicaraguan immigrant family. At home she speaks Spanish, shares traditional dishes such as gallo pinto, nacatamales, and rosquilla, and participates
    in cultural celebrations like Día de la Independencia and Semana Santa. Her heritage infuses her artistic perspective, prompting her to incorporate Nicaraguan motifs, color palettes, and folklore into
    her work. Living in the diverse Miami‑Dade region has also exposed her to a mosaic of Caribbean, Latino, and Afro‑American influences, fostering a broad appreciation for multicultural expression while
    grounding her in the values of family loyalty and resilient optimism characteristic of her community.
attributes:
