personas:
  professional: Jacqueline Johnson, a 46‑year‑old veteran healthcare administrator, leverages their two decades of operational expertise and natural curiosity to streamline hospital processes, embed art‑based
    patient wellness initiatives, mentor emerging women leaders, and balance a disciplined, structured approach with flexible, creative problem‑solving.
  sports: Jacqueline Johnson enjoys weekend walks along the Metairie trails, participates in the Bayou St. John Paddle Club, roots for the New Orleans Saints (NFL) and Pelicans (NBA), and occasionally joins
    the Metairie Adult Soccer League, using these activities as a therapeutic counterbalance to their stress‑prone nature.
  arts: Jacqueline Johnson is an enthusiastic patron of Southern arts, regularly attending live jazz performances by Wynton Marsalis at Preservation Hall, exploring contemporary galleries at the Ogden Museum
    of Southern Art, and curating a personal collection of vintage blues vinyls from B.B. King and Etta James, which they credit with nurturing a creative outlook on patient care.
  travel: Jacqueline Johnson favors culturally immersive journeys, having visited the historic French Quarter of New Orleans, the antebellum districts of Charleston and Savannah, and the vibrant music scene
    of Austin, while dreaming of a future pilgrimage to Paris’s Musée d’Orsay to study impressionist garden paintings, and they typically plan trips around mid‑week flight discounts to keep expenses in
    check.
  culinary: Jacqueline Johnson delights in Cajun and Creole cooking, frequently preparing jambalaya with Andouille sausage, shrimp étouffée with a roux of dark flour, and beignets dusted with powdered sugar,
    yet they have a habit of over‑seasoning when stressed, leading to occasional kitchen mishaps that they laugh off.
  core: Jacqueline Johnson is a 46‑year‑old healthcare leader who blends operational rigor with an artistic soul, manages finances prudently while allowing creative indulgences, and they combat chronic
    worry through yoga, community arts, and deliberate self‑care.
background:
  cultural: Jacqueline was raised in a middle‑class, white family in the Greater New Orleans area, where Southern hospitality, French‑Creole culinary traditions, and a vibrant music scene shaped her upbringing.
    The multicultural fabric of Metairie, with its blend of Cajun, Creole, and broader Southern influences, fostered an appreciation for community and cultural diversity. While her family values emphasized
    stability and family cohesion, her own curiosity led her to explore varied artistic and intellectual experiences beyond her immediate environment.
attributes:
