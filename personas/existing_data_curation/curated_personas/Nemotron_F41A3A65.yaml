    trails and Bayou St. John'', ''Participating in local arts and crafts workshops'']'
  career_goals: Jacqueline aims to advance to a senior executive role, such as Director of Clinical Services or Chief Operating Officer, within a regional health system. She plans to earn certifications
    like Certified Medical Manager (CMM) and Certified Professional in Healthcare Quality (CPHQ) to strengthen her leadership credentials. A key ambition is to embed creative arts programs into patient
    care to improve mental well‑being, and to champion staff wellness initiatives that address stress and burnout. She also hopes to mentor emerging women leaders in healthcare administration and eventually
    launch a consultancy that guides hospitals in integrating community‑focused, art‑based health interventions.
