personas:
  professional: Jesse Nelson, a creative technologist who blends data science with surreal visual storytelling, leverages Python, D3.js, and Blender to craft interactive installations and data‑driven illustrations,
    while their methodical project planning and love for solitary focus let them deliver rigorous, imagination‑rich work for research labs and nonprofits.
  sports: Jesse Nelson, a solitary fitness enthusiast who prefers low‑key activities, hikes the banks of the Mississippi River on weekends, cycles alone on the Baton Rouge bike trails, and follows the LSU
    Tigers football and the New Orleans Pelicans basketball teams for a touch of local sports excitement, while avoiding crowded gyms and team sports.
  arts: Jesse Nelson, an immersive digital painter and ambient music producer, draws inspiration from surrealists like Salvador Dalí, speculative illustrators such as Moebius, and ambient pioneers Brian Eno,
    Aphex Twin, and Boards of Canada, regularly attending Baton Rouge art galleries and listening to the latest releases from electronic label Ghostly International while sketching concepts for speculative
    fiction stories.
  travel: Jesse Nelson, a methodical wanderer who blends solitary retreats with artistic inspiration, has explored the Musée d’Orsay in Paris, trekked the basalt columns of Iceland’s Þingvellir National
    Park, and taken weekend road trips to the historic French Quarter of New Orleans, while dreaming of a future extended stay in Kyoto to study traditional Japanese garden design.
  culinary: Jesse Nelson, an experimental home cook who loves crafting dishes that echo their garden’s bounty, frequently prepares shrimp and okra gumbo with fresh bayou spices, sautés locally foraged wild
    mushrooms with garlic and thyme, and enjoys brewing single‑origin Ethiopian coffee while experimenting with molecular gastronomy techniques like espuma.
  core: Jesse Nelson, a solitary, methodical creative technologist who transforms data into surreal art, budgets meticulously, monitors health quirks, hikes alone, and lives by a schedule of ambient beats
    and experimental cooking.
background:
  cultural: Jesse grew up in Baton Rouge, Louisiana, immersed in the distinctive culture of the American South. Raised in a middle‑class white family with strong emphasis on education and self‑reliance,
    he was exposed early to both the academic environment of nearby Louisiana State University and the city’s rich artistic scene. The regional heritage—marked by French‑Creole influences, a tradition of
    Southern hospitality, and a deep appreciation for music such as jazz, blues, and zydeco—shaped his aesthetic sensibilities. Family gatherings often featured Cajun and Creole cuisine, fostering a subtle
    connection to the state’s culinary traditions. Although he identifies primarily with mainstream Southern values, Jesse also appreciates the multicultural tapestry of Baton Rouge, which informs his openness
    to diverse ideas and his exploratory artistic pursuits.
attributes:
  skills: '["Python", "Java", "C++", "Statistical Modeling", "Machine Learning", "Data Visualization (D3.js, Tableau, Plotly)", "3D Modeling (Blender)", "Digital Illustration (Adobe Photoshop, Illustrator)",
    "Hardware Prototyping (Arduino, Raspberry Pi)", "Technical Writing", "Research Design", "Project Planning"]'
  hobbies: '["Digital painting", "Concept art", "Ambient/electronic music production", "Reading speculative fiction and philosophy", "Short story writing", "Chess (online)", "Custom mechanical keyboard
    building", "Gardening (native Louisiana flora)", "Hiking along the Mississippi River", "Visiting art galleries and museums in Baton Rouge"]'
  career_goals: Jesse aims to carve a niche as an independent creative technologist who bridges data science and visual art. Over the next five years, he plans to deepen his expertise in data-driven storytelling
    by earning a master’s credential in Data Visualization or a related interdisciplinary field. He envisions developing a portfolio of interactive scientific illustrations and open‑source tools that make
    complex research accessible to broader audiences. Ultimately, his ambition is to launch a boutique consultancy that partners with educational institutions, research labs, and nonprofit organizations
    to produce immersive visual content—ranging from animated infographics to interactive installations—while maintaining a remote, solitary work style that aligns with his preference for quiet, focused
    environments. He also aspires to author a series of illustrated essays on the intersection of abstract mathematics and visual design.
