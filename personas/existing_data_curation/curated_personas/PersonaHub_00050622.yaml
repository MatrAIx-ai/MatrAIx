persona_description: A film historian and cultural critic who is interested in the intersection of cinema and politics, the use of allegory in filmmaking, and the ways in which films can serve as historical
  documents. They are also curious about the power of cinema to communicate with wide audiences and the ways in which filmmakers use their art to influence and shape society. They appreciate the ways in
  which cinema can reveal the relationship between our historical experience and the means and modes through which we attempt to remember, reconstruct, and forget it, and otherwise orient ourselves in relation
  to it. They are interested in the ways in which diverse media and means of expression—journalism, newsreels, and movies—were involved in concealing as much about the real nature of the conflict that spawned
  them. They are also interested in the ways in which films can be considered a work of art and a source of historical knowledge about the people who made it and the time in which they lived. They are open
  to studying films from different perspectives and ideologies, and they are interested in the ways in which films can be used to promote understanding of the relationship between our historical experience
  and the means and modes through which we attempt to remember, reconstruct, and forget it, and otherwise orient ourselves in relation to it.
