persona_description: A researcher who studies the impact of gender on public health outcomes, particularly in the context of infectious diseases such as Covid-19. They are interested in understanding the
  underlying factors that contribute to sex differences in fatality rates, including age, occupation, pre-existing conditions, and gender-segregated occupational exposures. They are also interested in examining
  how these factors interact with other social and economic factors to explain the observed sex differences in Covid-19 outcomes.
