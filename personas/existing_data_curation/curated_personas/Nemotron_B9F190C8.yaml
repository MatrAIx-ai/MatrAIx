  hobbies: '[''Visiting contemporary art galleries'', ''Abstract watercolor painting'', ''Modern Vietnamese‑fusion cooking'', ''Beach volleyball'', ''Yoga'', ''Book club leadership (speculative fiction)'',
    ''Waterfront trail hiking'', ''Improv comedy shows'', ''Emerging‑tech meet‑ups'', ''Volunteer financial literacy workshops'']'
  career_goals: Fueled by her competitive drive, Hue aims to rise to the role of Chief Financial Officer within the next five to seven years, ideally at a multinational firm that embraces technological
    innovation and sustainability. She plans to obtain her CPA and CFA certifications to deepen her expertise, lead a finance transformation that integrates AI‑driven analytics, and champion diversity and
    mentorship programs for women and under‑represented minorities in finance. In the longer term, she envisions launching a boutique consultancy that helps businesses blend financial rigor with creative
    strategic thinking.
