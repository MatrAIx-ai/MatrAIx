persona_description: A business owner or manager who is interested in understanding the economics of network externalities and the impact of economies of scale and density on the pricing and profitability
  of a business. They are likely to be familiar with the concept of network externalities and the role of economies of scale and density in driving demand and costs. They may also be interested in the potential
  for regulation or public ownership of networks to enforce good behavior on network owners. They may be interested in the specific examples provided in the text, such as the case of transportation and
  communications networks and the example of the Empire State Building. They may also be interested in the potential for space travel and the argument that it may be too costly or unprofitable to supply.
