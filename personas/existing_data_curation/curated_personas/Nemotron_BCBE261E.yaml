  career_goals: Though retired, Michael aims to ensure the family farm remains a sustainable legacy. He plans to complete a refurbished barn for community events, mentor his grandchildren in practical skills,
    document oral histories of Fairchild for the local historical society, and volunteer as a liaison between seniors and the county’s senior services. He also hopes to travel with his wife to the Upper
    Peninsula’s lighthouses and attend the state’s annual county fair, celebrating his region’s agricultural heritage.
