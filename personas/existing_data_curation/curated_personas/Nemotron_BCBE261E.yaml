personas:
  professional: Michael Ong, a retired dairy farmer with decades of hands‑on experience in woodworking, small‑engine repair, and community mediation, now volunteers at the senior center while they mentor
    grandchildren in practical skills and spearhead the refurbishment of the historic barn for local events.
  sports: Michael Ong enjoys seasonal fishing on nearby lakes, follows the Green Bay Packers and Milwaukee Brewers on television, and they participate in the local senior bridge club, treating it with the
    same competitive spirit as a weekend baseball game.
  arts: Michael Ong's evenings are often accompanied by the smooth sounds of Miles Davis and the soaring arias of Maria Callas, while they spend weekday afternoons crafting wooden puzzles that echo the
    intricate designs of traditional folk art.
  travel: Michael Ong dreams of a leisurely road trip with their spouse to explore the lighthouses of Michigan's Upper Peninsula, has already taken seasonal tours of Door County's vineyards, and they eagerly
    await the upcoming state fair in Springfield, Illinois.
  culinary: Michael Ong delights in cooking fresh heirloom tomato sauce for spaghetti, savors cheese curds freshly fried at the county fair, and they occasionally treat themselves to a warm kolache from
    the church bake‑sale, though they admit they can’t resist a second slice of apple pie.
  core: Michael Ong is a calm, community‑oriented elder who blends practical craftsmanship with quiet curiosity, balancing tradition with modest tech adoption while they gently nudge neighbors toward stewardship
    and harmony.
background:
  cultural: Michael’s cultural background is rooted in the rural Midwestern tradition of Wisconsin’s German‑Scandinavian settlement. Raised in a close‑knit farming community, he absorbed values of self‑reliance,
    modesty, and neighborly cooperation. His family has attended a Lutheran church for generations, celebrating holidays with traditional foods like kolaches and cheese curds. The local county fair, church
    potlucks, and volunteer fire department gatherings shape his sense of identity. The region’s strong nature orientation—forests, lakes, and fields—has cultivated a respect for stewardship and seasonal
    rhythms.
