  career_goals: Everett aims to become a senior associate and eventually a partner at his Tucson law firm, specializing in real estate and immigration law to protect the interests of his community. He also
    aspires to serve on the Pima County Bar Association board, mentor junior attorneys, and one day pursue a judgeship, all while maintaining a stable, predictable work routine that aligns with his practical
    values.
