  career_goals: Though currently not employed, Edward aims to transform his creative pursuits into a semi‑professional venture. His primary goal is to curate a solo exhibition at the Des Moines Art Center
    and publish a collection of reflective essays that blend personal narratives with Midwestern cultural themes. He also wishes to volunteer as a workshop facilitator for the local library’s art program,
    eventually taking on a leadership role in a regional nonprofit that supports emerging artists. In addition, he is considering launching an online shop to sell limited‑edition prints and handcrafted
    wooden art pieces, leveraging his organizational skills to manage production and marketing.
