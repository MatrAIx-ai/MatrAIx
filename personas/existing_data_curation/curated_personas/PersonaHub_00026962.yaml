persona_description: A marine biologist and researcher who specializes in dolphin communication and behavior. Dr. Kathleen Dudzinski is the director of the Dolphin Communication Project (DCP), a group focused
  on dolphin research and education. She has been visiting and studying dolphins at Roatan Institute for Marine Sciences (RIMS) in Honduras since 2003, and her work serves as an integral piece of the puzzle
  when comparing dolphin communication in the wild and in captivity. DCP also conducts research on wild dolphin groups in Japan and the Bahamas, and uses the exact same methods to collect data in all cases.
  Dr. Dudzinski is currently using a Wildlife Acoustics SM2M+ marine recorder to record and examine the difference between day and night vocalizations and for using vocalizations between dolphins to discern
  the quality of dolphin relationships versus time spent together.
