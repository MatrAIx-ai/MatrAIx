personas:
  professional: Seth Salvage, a network systems administrator with CCNA, CompTIA Network+ and Security+ certifications, leverages a methodical, documentation‑driven mindset and competitive edge to design,
    automate, and harden enterprise Cisco and Juniper networks, and they guide small technical teams toward measurable SLA improvements.
  sports: Seth Salvage, an avid outdoorsman based near the Smokies, maintains peak fitness through weekly hikes with the Knoxville Hiking Association and seasonal fly‑fishing trips with the Knoxville Fly
    Fishing Club, while cheering on the Tennessee Volunteers football team and following the Nashville Predators NHL franchise for their occasional city‑based sports fix.
  arts: Seth Salvage, a sci‑fi enthusiast, devotes weekend evenings to a Dungeons & Dragons campaign with a close circle of friends, streams The Expanse and Black Mirror on demand, and unwinds listening
    to progressive rock staples like Tool and Pink Floyd, which they credit for sparking creative problem‑solving during their network projects.
  travel: Seth Salvage, a meticulous planner, prefers nature‑rich getaways such as a road trip to Banff National Park and a hiking tour of Iceland’s volcanic trails, balances their tech‑focused career with
    occasional visits to Silicon Valley conferences, and budgets their adventures by booking off‑peak accommodations while keeping a detailed itinerary in Notion.
  culinary: Seth Salvage, a home‑cooking aficionado, delights in grilling bourbon‑glazed salmon and preparing shrimp‑and‑grits using fresh lake‑caught trout, while the occasional late‑night pizza with pepperoni
    and jalapeños fuels their networking sessions, and their moderate cooking skill is polished through YouTube tutorials of Southern BBQ brisket and smoked paprika rubs.
  core: Seth Salvage, a precision‑oriented network engineer who converts their competitive drive into exhaustive documentation and budget spreadsheets, can be found tinkering with custom PCs or escaping
    into a puzzle, yet often forgets to unwind until a spontaneous fishing trip forces a much‑needed reset.
background:
  cultural: Seth grew up in a middle‑class, white family in the Appalachian foothills of East Tennessee, where self‑reliance and a strong work ethic are prized. His grandparents emigrated from Germany and
    Ireland, and oral family traditions emphasize practicality, punctuality, and community involvement. While he identifies with Southern hospitality, he also values the analytical mindset fostered by his
    STEM education. Married to his college sweetheart, he and his wife maintain a modest home in Anderson County, regularly attending local church events and volunteering to teach basic computer skills
    to nearby youth groups. This blend of regional heritage, technical orientation, and family focus shapes his worldview and daily choices.
attributes:
  skills: '[''Cisco routing and switching'', ''Juniper networking'', ''Windows Server administration'', ''Linux system administration'', ''AWS VPC and Azure networking'', ''PowerShell scripting'', ''Python
    automation'', ''Ansible configuration management'', ''Network security hardening'', ''Change management and documentation'', ''CompTIA Network+ certification'', ''Cisco Certified Network Associate (CCNA)'',
    ''CompTIA Security+ certification'', ''Project planning and SLA management'']'
  hobbies: '[''Custom PC building'', ''Home networking lab experimentation'', ''Technical blogging'', ''Logic puzzles and escape rooms'', ''Hiking in the Great Smoky Mountains'', ''Weekend fishing trips'',
    ''Sci‑fi reading and streaming'', ''Monthly tabletop RPG sessions'']'
  career_goals: Seth aims to progress from his current network systems administrator role to a senior network engineer position within the next three years, followed by a network architect or IT infrastructure
    manager role. He plans to earn advanced certifications such as CCNP, AWS Solutions Architect, and PMP to bolster his credentials. Driven by his competitive streak, he seeks opportunities to lead larger
    projects, improve his organization’s network resilience, and gain recognition for cost‑effective, secure designs. Long‑term, he envisions establishing a boutique consulting firm that helps small businesses
    in the Knoxville area modernize their IT infrastructure while maintaining rigorous documentation and security standards.
