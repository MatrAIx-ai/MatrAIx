  career_goals: Fernando aims to advance to the rank of fire captain within the next three years, followed by pursuing a fire chief position. He plans to earn a paramedic certification and complete an associate’s
    degree in fire science to deepen his technical knowledge. Fernando is passionate about integrating new technologies into fire operations, so he wants to lead a specialized hazardous‑materials response
    team that utilizes drones and AI‑driven fire prediction models. Additionally, he aspires to develop a community‑focused fire safety program that provides bilingual education workshops for at‑risk neighborhoods
    in Cook County, fostering greater public awareness and preventive practices.
