  hobbies: '[''drawing'', ''digital painting'', ''short story writing'', ''playing acoustic guitar'', ''listening to indie and Mexican folk music'', ''collaborative mixed‑media projects'', ''volunteering
    at community center'', ''organizing youth art events'', ''playing soccer'', ''exploring murals and cultural festivals'']'
  career_goals: David aspires to turn his passion for art and community into a career. He aims to pursue a degree in graphic design or visual communication, with a long‑term goal of becoming a multimedia
    artist who creates inclusive, culturally resonant content for youth. He also envisions founding a community art workshop in San Antonio that offers free creative classes and mentorship for under‑served
    neighborhoods, merging his artistic drive with his desire to help others.
