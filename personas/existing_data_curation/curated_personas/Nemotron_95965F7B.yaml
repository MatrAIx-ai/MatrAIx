personas:
  professional: Julie Pacheco is a seasoned registered nurse with expertise in wound management, IV therapy, and health informatics, who leverages their natural calm under pressure and meticulous organization
    to lead interdisciplinary teams and drive evidence‑based quality improvement initiatives.
  sports: Julie Pacheco enjoys low‑impact yoga year‑round, hikes with the North Cascades Trail Club during summer, and roots for the Seattle Seahawks in football and the Seattle Mariners in baseball, while
    eschewing high‑intensity gym workouts in favor of gentle strength‑training sessions on the weekends.
  arts: Julie Pacheco captures seasonal scenery through photography inspired by Annie Leibovitz, finds solace in the jazz piano of Nina Simone, and participates in a small book club that discusses works
    by Atul Gawande and Mary Roach.
  travel: Julie Pacheco prefers meticulously planned nature‑focused getaways, has already trekked the Great Smoky Mountains and the Canadian Rockies, and dreams of exploring the vineyards of Tuscany while
    balancing family responsibilities and a moderate travel budget.
  culinary: Julie Pacheco enjoys preparing nutrient‑dense meals such as quinoa‑seeded salads with roasted beets, grilled salmon seasoned with rosemary and lemon, and hearty lentil soup, while their cooking
    skill is solidly intermediate, often experimenting with sous‑vide techniques on weekends.
  core: Julie Pacheco is a methodical, calm‑collected nurse who blends a data‑driven leadership style with a love for gardening, meticulously organized pantry, and a quirky habit of staying up late solving
    crossword puzzles.
background:
  cultural: Julie was raised in a suburban New England family of Irish-Italian descent. Growing up in the Boston metropolitan area, she absorbed the region's emphasis on education, civic responsibility,
    and modest self-reliance. Her cultural upbringing blends traditional holidays such as Thanksgiving, Christmas, and the Fourth of July with a strong community orientation evident in local farmers' markets
    and neighborhood gatherings. Although she identifies as white American, she embraces the multicultural fabric of Wakefield, participating in community health initiatives and respecting the diversity
    of her patients. Her family values, marked by close-knit relationships, church involvement, and an appreciation for nature's seasonal cycles, shape her worldview and inform her compassionate, harmonious
    approach to care.
attributes:
  skills: '["Patient assessment", "Wound care and dressing changes", "IV therapy and medication administration", "Electronic health records (Epic)", "Health informatics and data analysis", "Quality improvement
