    practice implementation"]'
  hobbies: '["Gardening", "Low-impact yoga", "Reading nonfiction", "Crossword puzzles", "Sudoku", "Cooking healthy meals", "Hiking", "Nature photography", "Small book club participation", "One-on-one volunteering
    at community health fairs"]'
  career_goals: Julie aspires to move into a nursing leadership position, specifically as a nurse manager or clinical nurse specialist, within the next three to five years. She plans to obtain certification
    as a Certified Nurse Educator and pursue a Doctor of Nursing Practice with a focus on health informatics. Her long-term ambition is to head a hospital quality-and-safety department, where she can integrate
    data-driven protocols to improve patient outcomes while fostering a supportive, well-structured work environment for staff.
