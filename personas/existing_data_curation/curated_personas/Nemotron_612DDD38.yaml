  career_goals: Garnell aims to transition into a lead engineering role where he can guide multidisciplinary teams to create products that marry technology with artistic expression. He aspires to champion
    diversity and inclusion within the tech community, mentor underrepresented developers, and spearhead open-source initiatives that empower creators. In the longer term, he envisions launching a startup
    that offers a cloud-based platform for artists to collaborate, exhibit, and sell their work. He also seeks to acquire an advanced certification in cloud architecture to deepen his technical expertise
    while cultivating a healthier work-life balance that mitigates his propensity for stress.
