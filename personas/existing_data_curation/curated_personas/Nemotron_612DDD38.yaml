personas:
  professional: Garnell Neyrinck, a seasoned full-stack engineer proficient in JavaScript, React, Node.js, TypeScript, Python, and AWS, leverages a graphic design background to craft intuitive UI/UX while
    leading multidisciplinary teams with calm empathy, curiosity, and a commitment to diversity and open-source empowerment.
  sports: Garnell Neyrinck, an avid hiker with the Hollywood Hiking Club, practices yoga at Flow Yoga Studio, supports the Los Angeles Lakers and Dodgers, and follows the LA Galaxy, often joining community
    runs organized by the Santa Monica Track Club to stay fit.
  arts: Garnell Neyrinck immerses themselves in Los Angeles’s art scene, frequenting LACMA, The Broad, and local gallery openings, captures street photography of murals by artists like Shepard Fairey, and
    draws creative inspiration from jazz legends Miles Davis and John Coltrane, hip-hop icon Kendrick Lamar, and world music pioneers Fela Kuti.
  travel: Garnell Neyrinck balances meticulously planned art-focused trips to Kyoto’s galleries and Berlin’s techno festivals with spontaneous weekend getaways to Big Sur and Joshua Tree, always budgeting
    for cultural experiences while dreaming of exploring Iceland’s auroras and Morocco’s souks.
  culinary: Garnell Neyrinck, an experimental home cook, regularly prepares dishes like miso-marinated black cod, Moroccan tagine with harissa-spiced lamb, and DIY kimchi, delighting in ingredients such
    as black garlic, quinoa, and gochujang, and rates their cooking skill as advanced, often sharing recipes on a personal blog.
  core: Garnell Neyrinck is a 44-year-old tech-savvy artist-advocate who balances code, jazz, and mountain trails while wrestling with chronic worry and an insatiable curiosity.
background:
  cultural: Garnell is a Black American who grew up in South Los Angeles, immersed in the rich traditions of African American culture and the diverse artistic landscape of the city. His upbringing was shaped
    by community solidarity, hip‑hop music, and a strong emphasis on storytelling and resilience. As a member of the local Black tech community, he is keenly aware of the challenges faced by underrepresented
    groups in technology and is motivated to foster inclusion and representation. His cultural heritage influences his collaborative spirit, his appreciation for artistic expression, and his dedication
    to giving back through mentorship and community outreach.
