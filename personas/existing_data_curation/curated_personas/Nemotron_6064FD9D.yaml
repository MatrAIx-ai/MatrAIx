    systems)'']'
  hobbies: '[''Visiting art galleries and museums'', ''Sketching and photography of installations'', ''Experimental cooking / trying new recipes'', ''Reading non‑fiction on innovation and art'', ''Playing
    chess'', ''Mindfulness meditation'', ''Jogging in local parks'', ''Listening to entrepreneurship podcasts'', ''Volunteering at community art center (organizing exhibitions)'']'
  career_goals: Andrew aims to ascend from his current supervisory role to district manager within the next three years, leveraging his strong performance metrics and operational expertise. He plans to
    pursue an MBA part‑time to deepen his strategic management skills and eventually become a regional director overseeing multiple stores. Long‑term, he aspires to open his own boutique that merges retail
    with curated contemporary art, creating immersive shopping experiences. He also wants to be recognized as a thought leader in incorporating innovative visual merchandising practices within the retail
    sector and to mentor emerging retail professionals.
