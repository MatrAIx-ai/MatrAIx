  and prevent BEC schemes, and protecting the supply chain from threats. They are also knowledgeable about IoT devices and their vulnerabilities, and have implemented protective measures to secure their
  organization's networks. They are familiar with the risks of bringing personal devices to work and have implemented policies to secure them. They are also aware of the importance of using social media
  as a business tool and have implemented protective measures to prevent malicious campaigns and fake news. They are skilled in securing their automated assistants, becoming the first line of defense against
  fraudulent BEC campaigns, and adding a layer of protection for their online accounts with 2FA. They are also knowledgeable about the risks of IoT devices and have implemented protective measures to secure
  them.
