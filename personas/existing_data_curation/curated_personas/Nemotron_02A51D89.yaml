  hobbies: '[''Fishing'', ''Woodworking'', ''Cooking'', ''Gardening'', ''Watching High‑School Football'', ''Reading Business Books'', ''Community Volunteering'']'
  career_goals: Robert aims to advance to a senior management position within the next five years, targeting a regional operations director role. He plans to earn an MBA to deepen his strategic expertise
    and to spearhead lean‑process initiatives that boost efficiency and profitability. Ultimately, he seeks to achieve financial stability for his family while possibly launching his own small‑scale business
    in the future.
