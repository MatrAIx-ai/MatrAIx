  career_goals: Jun aims to transition into a part‑time supervisory or mentorship role that lets him share his expertise with younger colleagues while enjoying a predictable schedule. He hopes to become
    a certified retail trainer, develop a small community‑focused convenience store that reflects his cultural heritage, and secure enough financial stability to support his family and charitable activities.
    He also seeks to improve his work‑life balance and incorporate stress‑reduction practices into his routine before retirement.
