persona_description: A teacher who specializes in working with students with learning disabilities, particularly those who have difficulty processing information through reading and have significant discrepancies
  in their cognitive abilities and academic achievement. This teacher is committed to providing reasonable accommodations for qualified students with disabilities and ensuring that their rights to confidentiality
  and fair treatment are respected. This teacher is skilled in providing a detailed course syllabus, organizing the classroom environment, and distributing information through a multisensory approach. They
  are aware of the importance of giving students ample time to answer questions and avoiding expressing annoyance when students ask questions that they just answered.
