  hobbies: '[''Playing soccer with friends'', ''Cooking Mexican dishes and hosting potlucks'', ''Social media video creation and photo editing'', ''Volunteering at local community center'', ''Listening
    to reggaetón, cumbia, and hip‑hop'', ''Attending cultural festivals and concerts'', ''Video gaming'', ''Hiking local trails'', ''Podcast listening'']'
  career_goals: Julio aims to channel his compassion and sociable nature into a career that strengthens his community. In the short term he plans to enroll in a community college program for public health
    or social work while completing an EMT-Basic certification, giving him practical experience in emergency response. His longer-term ambition is to become a community outreach coordinator for a non-profit
    that serves Latino families in Orange County, eventually moving into a program-manager role where he can design and lead youth mentorship initiatives. He also dreams of launching a bilingual health-education
    podcast that blends his curiosity for new ideas with practical tips for everyday wellness.
