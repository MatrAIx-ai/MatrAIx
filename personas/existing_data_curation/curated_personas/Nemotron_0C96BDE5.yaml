  hobbies: '[''Fishing'', ''Woodworking'', ''Reading technical manuals'', ''Home brewing'', ''Beach walks'', ''Car restoration'', ''Volunteer roof maintenance for community church'']'
  career_goals: Craig aims to transition from employee to owner‑operator of a small, family‑run roofing and solar‑integration business in Pinellas County. He plans to earn a professional roofing contractor
    license, obtain NRCA certification, and build a niche in energy‑efficient roofing for the Florida market. Over the next five years he hopes to hire his own crew, secure steady contracts, and establish
    a retirement fund that will allow his family financial security while mentoring the next generation of tradespeople.
