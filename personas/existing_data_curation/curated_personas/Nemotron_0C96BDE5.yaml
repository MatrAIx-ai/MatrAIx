personas:
  professional: A seasoned roofing contractor with over two decades of on‑site experience, Craig Przybylski blends deep expertise in asphalt shingles, metal panels, EPDM membranes, and emerging low‑slope
    green roofs with a practical curiosity for energy‑efficient solutions, leading crews, training apprentices, and navigating Pinellas County codes while laying the groundwork for his own family‑run roofing‑and‑solar
    business.
  sports: An early‑rising fitness enthusiast, Craig Przybylski jogs along the Gulf’s sunrise beaches three times a week, follows the Tampa Bay Buccaneers and Tampa Bay Rays with steadfast loyalty, participates
    in a weekend amateur softball league organized by his classic‑car club, and they treat each fishing excursion as a low‑impact cardio session while keeping an eye on the local golf course tournament
    schedule.
  arts: A hands‑on creator, Craig Przybylski spends evenings listening to Jimmy Buffett and John Prine while fine‑tuning a custom wooden saddle for his classic car, admires the marine photography of Clark Licht,
    and they attend the annual Tampa Bay Brew & Art Festival to mingle with local artisans and draw inspiration for new woodworking projects.
  travel: An organized yet spontaneous traveler, Craig Przybylski meticulously plans weekend getaways to the Florida Keys and the Gulf islands while dreaming of a summer road trip through the rain‑soaked
    forests of the Pacific Northwest to explore cutting‑edge green‑roof technologies, and they balance these trips against family commitments and business budgeting constraints.
  culinary: A modest culinary experimenter, Craig Przybylski favors grilled grouper with a citrus‑herb rub, pairs it with his own hoppy IPA, perfects a Southern‑style smoked brisket on weekend evenings,
    and they keep a well‑stocked pantry of fresh Gulf shrimp, imported malt, smoked paprika, and locally sourced honey for experimentation.
  core: Craig Przybylski, a 46‑year‑old roof and solar specialist, blends quiet curiosity with hands‑on practicality, hoards spare nails for “just‑in‑case” projects, never skips a sunrise beach walk, and
    they often arrive late to family dinners because the next job call always seems more urgent.
background:
  cultural: Craig is a second‑generation Polish‑American raised in a working‑class family that valued hard work, reliability, and community. While English is his primary language, he grew up hearing Polish
    phrases at family gatherings and celebrates traditional holidays such as Wigilia and Śmigus‑Dyngus. Living in Pinellas Park, Florida, he blends his Polish heritage with the coastal Gulf‑coast culture—enjoying
    seafood, beach outings, and a laid‑back lifestyle. He identifies with mainstream American middle‑class values while maintaining a modest connection to his Catholic roots and the friendly, family‑oriented
    spirit of his local community.
attributes:
  skills: '[''Roof installation'', ''Roof repair'', ''Blueprint reading'', ''Estimating materials and labor'', ''Safety compliance'', ''Crew supervision'', ''Basic carpentry'', ''Solar panel mounting'',
