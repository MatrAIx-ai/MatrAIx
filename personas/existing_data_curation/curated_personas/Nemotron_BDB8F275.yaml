personas:
  professional: Ileana Romero is a budding community health advocate who leverages bilingual communication, event planning, and graphic design skills to craft culturally resonant outreach programs, bringing
    their calm, compassionate nature to bridge gaps between at‑risk youth and mental‑health resources.
  sports: Ileana Romero rides early‑morning waves at Fort Myers Beach, practices yoga three times a week at the Cape Coral Community Center, plays beach volleyball in the summer, and cheerfully roots for
    the Tampa Bay Buccaneers, Orlando City SC, and the Tampa Bay Rays while participating in the local Cape Coral Surf Club.
  arts: Ileana Romero spends weekends sketching sunrise scenes, attending pop‑up shows that feature emerging artists like Banksy and local muralist Ana Rivera, drawing inspiration from the color palettes
    of Georgia O'Keeffe and the soulful vocals of Rosalía, and they often create promotional flyers with Canva to support community art projects.
  travel: Ileana Romero prefers thoughtfully planned, budget‑friendly trips that blend coastal relaxation with artistic immersion, such as weekend getaways to Key West and Sanibel Island, cultural explorations
    of Barcelona's Gothic Quarter and Lisbon's street‑art districts, and they often save on airfare by booking during off‑peak seasons and staying in boutique hostels.
  culinary: Ileana Romero is a proficient home cook who delights in preparing mole poblano with ancho chilies, dark chocolate, and cinnamon, hand‑rolling tamales using masa and fresh epazote, and they love
    pairing these dishes with avocado salsa and a chilled hibiscus agua fresca flavored with lime.
  core: Ileana Romero blends quiet resilience with boundless creativity, channeling their love for surf‑side sunrise photography and community murals into a compassionate drive to uplift at‑risk youth,
    all while habitually humming old folk tunes as they sketch and occasionally hoarding extra paintbrushes.
background:
  cultural: Ileana hails from a Mexican-American family that settled in Cape Coral when she was a child. Raised in a bilingual household, she grew up hearing Mexican folklore, celebrating Día de los Muertos
    and Semana Santa with traditional foods, music, and crafts. Her parents emigrated from the states of Oaxaca and Jalisco, imparting a respect for regional customs, communal solidarity, and the value
    of hospitality. While fully integrated into Floridian life—surfing the Gulf beaches and engaging with a diverse neighborhood—she retains a strong connection to her heritage through language, culinary
    traditions, and participation in local Mexican cultural festivals. This blend of Mexican roots and Southern Florida influences shapes her worldview, emphasizing community, empathy, and creative expression.
attributes:
  skills: '[ ''Bilingual Spanish-English communication'', ''Community volunteer coordination'', ''Basic graphic design (Canva, Photoshop)'', ''Art curation and critique'', ''Event planning and logistics'',
    ''First Aid and caregiving'', ''Creative writing and storytelling'', ''Digital photography'', ''Conflict mediation'', ''Time management and organization'' ]'
  hobbies: '[ ''Sketching and watercolor painting'', ''Digital photography'', ''Visiting art galleries and museums'', ''Cooking traditional Mexican dishes'', ''Reading contemporary fiction and art theory'',
    ''Yoga and meditation'', ''Volunteering at local food banks and community gardens'', ''Participating in community mural projects'' ]'
  career_goals: Ileana aims to build on her high school education by pursuing an associate degree in community health or social work, with a long-term goal of becoming a community outreach coordinator for
    a cultural center in Southwest Florida. She envisions creating programs that integrate visual arts and mental-health support for at-risk youth, and eventually founding a non-profit that offers free
    art-therapy workshops in bilingual settings. In the near term, she plans to obtain certification as a peer support specialist and to gain formal training in graphic design to enhance her ability to
    produce culturally resonant outreach materials.
