personas:
  professional: Kerry Wilson, a meticulous telecommunications equipment installer and repair specialist, channels their love of structure, practical problem‑solving and a keen awareness of safety into systematic
    troubleshooting, precise RF testing, detailed documentation, and assertive coordination of junior technicians to keep projects on schedule and within budget.
  sports: Kerry Wilson hits the trails of Red Rock Canyon with their weekend hiking group, roots for the local NFL team during football season, and joins a community softball league every spring to blend
    low‑impact cardio with friendly competition.
  arts: Kerry Wilson unwinds to classic rock legends like Led Zeppelin and The Rolling Stones on their favorite radio stations, occasionally catches a live tribute show at a local venue, and finds inspiration
    in DIY home‑improvement books that blend functional design with artistic flair.
  travel: Kerry Wilson prefers meticulously planned road trips, having already explored the Grand Canyon, Zion, and a weekend getaway to Asheville’s craft breweries, while dreaming of a future tech‑focused
    visit to Tokyo’s Akihabara district once their own contracting business steadies.
  culinary: Kerry Wilson’s culinary routine revolves around batch‑prepping garden‑fresh ratatouille, quinoa salads with roasted bell peppers, and a signature herb‑infused chicken stir‑fry, favoring ingredients
    like fresh basil, garlic, and seasonal squash while occasionally indulging in a slice of pepperoni pizza as a stress‑relief treat.
  core: Kerry Wilson is a detail‑driven telecom technician who balances a structured work ethic, budget‑conscious habits, health‑focused routines, and a love for classic rock, gardening, and planned adventures,
    all while managing occasional stress‑induced worry.
background:
  cultural: Kerry identifies as a White American raised in a middle‑class suburban environment near Las Vegas, Nevada. Her cultural background reflects mainstream American values of hard work, self‑reliance,
    and community involvement, with influences from the desert Southwest’s relaxed yet pragmatic lifestyle. Family traditions emphasize practical trades, responsibility, and modesty, shaping her approach
    to both her career and personal life.
attributes:
  skills: '[''Radio tower installation'', ''Antenna alignment'', ''Cable splicing and termination'', ''Fiber‑optic handling'', ''RF signal troubleshooting'', ''Interpretation of schematics and blueprints'',
    ''FCC regulatory compliance'', ''Electrical safety protocols'', ''Customer service'', ''Technical documentation'', ''Team training and mentorship'', ''Project scheduling and logistics'']'
  hobbies: '[''Gardening'', ''Meal prepping'', ''Puzzle solving (crosswords, Sudoku)'', ''Reading non-fiction (technology, self‑improvement)'', ''Hiking'', ''DIY home improvement projects'', ''Listening
    to classic rock radio'', ''Volunteering teaching electronics'', ''Yoga'']'
  career_goals: Kerry aims to advance to a lead technician role and eventually transition into a supervisory or project‑management position within a reputable telecommunications contracting firm. She plans
    to obtain BICSI certifications (such as the Registered Communications Distribution Designer) and acquire specialized training in emerging 5G infrastructure to stay ahead of industry trends. Long‑term,
    she envisions establishing her own small contracting business that offers a predictable schedule, allowing her to balance family responsibilities while reducing workplace stress. Mentoring the next
    generation of installers and fostering a culture of safety and organization are also key ambitions.
