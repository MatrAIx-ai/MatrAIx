  hobbies: '[''Hiking'', ''Fishing'', ''Cooking Chinese cuisine'', ''Calligraphy'', ''Playing Go'', ''Reading management and technology books'', ''Mentoring high‑school business club'', ''Home‑automation
    tinkering'']'
  career_goals: Haiyang aims to transition from a specialist role to a senior leadership position such as PMO Director or Senior Program Manager, overseeing multi‑site, multimillion‑dollar transformation
    initiatives within the advanced materials industry. He plans to earn a PMP and a Lean Six Sigma Black Belt within the next two years, and to obtain the PgMP certification to broaden his strategic credentials.
    His competitive drive pushes him to achieve recognition through PMI award nominations and to establish a reputation as a go‑to mentor for emerging project managers. In the longer term, he envisions
    launching a boutique consulting firm that helps mid‑size manufacturers implement digital‑first project delivery models, leveraging his blend of practical experience and curiosity about emerging technologies.
