persona_description: A scientist who specializes in the field of allergy research, particularly in the study of the relationship between excessive cleanliness and the development of allergies and autoimmune
  diseases. He/she is a professor at the Université de Montréal Faculty of Medicine and the director of the Laboratory for Allergy Research at the Centre hospitalier de l’Université de Montréal. The scientist
  is concerned about the hygiene hypothesis, which suggests that the lack of exposure to harmful bacteria limits the exposure to beneficial microorganisms, leading to a compromised immune system. The scientist
  recommends probiotics to enrich the intestinal flora and improve the immune system.
