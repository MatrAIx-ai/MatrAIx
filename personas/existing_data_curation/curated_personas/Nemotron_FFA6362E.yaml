  hobbies: '["Gardening","Cooking Southern Soul Food","Reading Biographies","Book Club","Volunteer Teaching","Hiking","Knitting","Gospel Choir"]'
  career_goals: She aims to advance to a senior executive role such as Director of Operations within the next five years, championing sustainable manufacturing practices and fostering an inclusive workplace
    culture. Verlecia also wants to establish a mentorship program for emerging Black professionals in her industry, create a robust succession plan for her current team, and eventually transition to a
    consultancy that helps small Alabama manufacturers adopt modern technologies while preserving local jobs.
