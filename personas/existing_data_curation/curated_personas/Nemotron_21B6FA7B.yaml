personas:
  professional: Solomon Goins, a veteran humanities teacher with three decades of classroom experience, is known for their interdisciplinary curriculum development, storytelling, and oral‑history integration,
    using a culturally responsive lens to build vibrant learning communities, mentor new teachers, and launch a school‑wide program that weaves New Orleans’ history and music into elementary studies.
  sports: Solomon Goins enjoys low‑impact fitness through morning walks along the historic French Quarter, occasional tennis at the City Park Courts, and follows the New Orleans Saints and Pelicans avidly,
    while staying loosely affiliated with the French Quarter Walking Group and a weekend cycling club that meets for leisurely rides along the Lake Pontchartrain shoreline.
  arts: Solomon Goins immerses themselves in the arts by spinning Miles Davis, John Coltrane, and Ella Fitzgerald on vintage vinyl, attending intimate jazz shows at local cafés, devouring historical fiction
    from Hilary Mantel to Ken Follett, and finding inspiration in the storytelling films of Wes Anderson and the stage performances of New Orleans’ own storytellers at the St. Louis Cathedral’s annual literary
    evenings.
  travel: Solomon Goins prefers reflective, low‑key travel itineraries that combine historic city tours and culinary explorations, having cherished walks through the cobblestone streets of Savannah, a weekend
    food pilgrimage to Charleston’s Creole eateries, a serene retreat to the Blue Ridge Mountains in Asheville, and dreaming of a future cultural immersion in Quebec City’s winter festivals.
  culinary: Solomon Goins, a self‑taught Creole enthusiast, skillfully cooks gumbo seasoned with filé powder, jambalaya brimming with Andouille sausage, and red beans and rice flavored by smoked paprika,
    while also enjoying beignets dusted with powdered sugar at local cafés and occasionally treats friends to a rustic wooden‑served seafood boil featuring crawfish, shrimp, and fresh okra.
  core: Solomon Goins is a reflective, garden‑tending educator who balances a love for vintage jazz and handcrafted furniture with a relaxed, sometimes disorganized approach to life, always seeking to weave
    history into everyday moments.
background:
  cultural: Raised in a close‑knit African‑American family in New Orleans, Solomon grew up immersed in the city’s vibrant blend of African, French, and Caribbean traditions. The daily rhythms of jazz, the
    oral‑storytelling legacy of his grandparents, and the communal spirit of Sunday brunches shaped his identity. He celebrates the cultural heritage of the Black Creole community, honors the linguistic
    legacy of French Creole, and frequently brings the city’s music, food, and history into his classroom to help students appreciate both their own roots and the diverse tapestry of New Orleans.
attributes:
  skills: '[''Interdisciplinary curriculum design'', ''Culturally responsive teaching'', ''Storytelling and oral‑history integration'', ''Differentiated literacy instruction'', ''Classroom community building'',
    ''Mentoring and coaching'', ''Community outreach coordination'', ''Basic conversational French'']'
  hobbies: '[''Reading historical fiction'', ''Listening to jazz vinyl records'', ''Cooking Creole dishes'', ''Gardening'', ''Walking the French Quarter'', ''Woodworking'', ''Participating in small community
    book clubs'']'
  career_goals: Solomon aims to develop a school‑wide program that weaves New Orleans' local history, music, and oral traditions into the humanities curriculum, become a lead instructional coach for culturally
    responsive pedagogy, publish a practical guide on integrating storytelling into elementary education, and eventually retire having mentored a generation of at‑risk youth and fostered lasting community
    partnerships.
