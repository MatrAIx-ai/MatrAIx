  hobbies: '[''Pick‑up basketball'', ''Watching NBA games and highlights'', ''Hip‑hop music listening and beat‑making'', ''Video gaming (NBA 2K, Fortnite)'', ''Freestyle rap'', ''Journaling'']'
  career_goals: Dejuan wants to graduate with a GED within the next two years and use his love for basketball to secure a scholarship for a community college where he can study sports management. He dreams
    of one day coaching a youth basketball league in Levittown, while also launching a small side business that trades limited‑edition sneakers and streetwear online. He is motivated by the desire to be
    financially independent, to support his family, and to become a positive role model for other kids who feel caught between school expectations and their own passions.
