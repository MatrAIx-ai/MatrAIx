personas:
  professional: Elizabeth Brown is a self‑taught full‑stack developer who blends clean, test‑driven JavaScript and Python code with generative visual art; they lead agile teams, mentor junior engineers,
    and champion inclusive, user‑centric design while juggling a budding online Computer Science degree.
  sports: Elizabeth Brown spends weekends hiking the Pine Barrens and trail‑running with the Salem County Trailblazers club; they follow the Philadelphia Eagles with fervent loyalty and occasionally join
    a local recreational soccer league, balancing outdoor activity with urban photography sessions.
  arts: Elizabeth Brown immerses themselves in speculative fiction by N.K. Jemisin and Brandon Sanderson, crafts generative visual pieces using p5.js, and captures Philadelphia’s steel‑frame skyline in
    photographs inspired by Andreas Gursky; they also compose experimental synth tracks influenced by Aphex Twin and Kaitlyn Aurelia Smith, often losing track of time tweaking patches and forgetting to
    water their succulents.
  travel: Elizabeth Brown meticulously plans trips, favoring autumn leaf walks in the Catskills, a recent solo adventure to Reykjavik for the northern lights, and family vacations to historic Williamsburg;
    they dream of exploring Kyoto’s zen gardens, always striking a balance between detailed itineraries and spontaneous detours.
  culinary: Elizabeth Brown cultivates tomatoes, basil, and kale in a backyard garden and transforms the harvest into rustic ratatouille, fresh pesto pasta, and occasional vegetarian sushi rolls, while
    sipping a daily pour‑over from a local roaster; they indulge in dark chocolate and craft bold coffee cocktails when coding deadlines loom, though they sometimes over‑season dishes in the rush of inspiration.
  core: Elizabeth Brown is a methodical yet imaginative technologist who fuses code, art, and mentorship while battling stress‑induced perfectionism and a penchant for late‑night synth experimentation.
background:
  cultural: Elizabeth was raised in a modest, middle‑class family in Salem County, New Jersey, an area shaped by a blend of industrial heritage and close‑knit community values typical of the Mid‑Atlantic
    United States. Her upbringing reflected traditional American values such as hard work, community service, and modest religious participation in a predominantly white, suburban environment. Proximity
    to the cultural offerings of nearby Philadelphia exposed her to diverse artistic influences, while local county fairs and community events reinforced a sense of belonging and civic responsibility. These
    experiences fostered her appreciation for both practical problem‑solving and creative expression.
attributes:
  skills: '["Full‑stack web development (JavaScript, React, Node.js)", "Python programming and data analysis (Django, Flask)", "UI/UX design and prototyping (Figma, Adobe XD)", "Generative art and interactive
