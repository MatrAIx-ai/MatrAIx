    (Scrum, JIRA)", "Technical mentorship and code reviews", "Accessible web development (WCAG standards)", "Database design and optimization (PostgreSQL, MySQL)"]'
  hobbies: '["Generative art creation with p5.js and Processing", "Digital painting and illustration (Adobe Photoshop, Illustrator)", "Reading speculative fiction and fantasy literature", "Playing tabletop
    role‑playing games (e.g., Dungeons & Dragons)", "Volunteer coding mentorship for local high school students", "Gardening for relaxation", "Hiking local nature trails", "Urban architectural photography",
    "Experimental music composition and sound design"]'
  career_goals: Elizabeth aims to move into a lead architect role where she can guide the development of innovative, art‑focused software products while championing inclusive, user‑friendly design. She
    plans to obtain a formal Computer Science degree through an online program to complement her practical experience, and she hopes to mentor underrepresented groups in technology through community workshops.
    Over the next five years, she aspires to launch an indie platform that blends generative art with interactive storytelling, achieve a balanced workload that reduces stress, and secure a position that
    offers flexible remote work to better accommodate her family and personal well‑being.
