personas:
  professional: Victoria Lazos, a 28‑year‑old construction specialist in Rockwood, blends solid carpentry and framing expertise with a calming, conflict‑mediating presence on job sites, championing eco‑friendly
    practices while aspiring to supervise community‑focused renovation projects.
  sports: Victoria Lazos channels their love of the outdoors into weekend hikes on the Buffalo Mountain Trail and early‑morning yoga sessions, while rooting for the Rockwood High School Wildcats football
    team and keeping an eye on the Nashville Predators during the hockey season.
  arts: Victoria Lazos captures Appalachian landscapes in watercolor, drawing inspiration from Claude Monet’s impressionist light and local folk artist Mary Pratt’s vibrant palettes, and finds calm listening
    to Sufjan Stevens and The Lumineers while sketching historic Rockwood architecture.
  travel: Victoria Lazos prefers spontaneous weekend road trips along the Blue Ridge Parkway and occasional hikes in Shenandoah National Park, yet they dream of a longer stay exploring Portugal’s Azores
    to photograph sunrise over volcanic craters.
  culinary: Victoria Lazos enjoys farm‑to‑table cooking, often preparing roasted beet and goat cheese salads, quinoa‑stuffed bell peppers, and fresh basil pesto with herbs harvested from their garden, though
    they sometimes neglect to clean the stovetop after a busy cooking session.
  core: Victoria Lazos is a hands‑on construction professional with a creative streak, deep compassion, and an anxious mind that swings between meticulous eco‑project planning and spontaneous artistic bursts.
background:
  cultural: Victoria’s cultural background is rooted in the Appalachian region of East Tennessee. Her family heritage includes English, Scottish, and German ancestry, typical of many white families in Morgan
    County. She was raised with Southern hospitality values—emphasizing neighborly support, modesty, and a strong sense of community. Local traditions such as bluegrass music, church gatherings (she grew
    up attending a Methodist congregation), and seasonal fairs have shaped her outlook. The region’s history of coal mining and small‑town resilience informs her respect for hard work and self‑reliance,
    while also fostering a deep appreciation for preserving the natural beauty and cultural stories of the area.
attributes:
  skills: '["Carpentry", "Basic electrical work", "Plumbing repairs", "Drywall installation and repair", "Blueprint reading (simple)", "Improvisational problem solving", "Team coordination", "Conflict mediation",
