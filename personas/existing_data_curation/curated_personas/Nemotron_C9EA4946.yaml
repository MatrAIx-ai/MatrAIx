  hobbies: '["Watercolor painting", "Sketching", "Hiking", "Gardening (native plants & vegetables)", "Community volunteer work (food bank, animal shelter)", "Journaling", "Listening to DIY and sustainability
    podcasts", "Yoga", "Meditation"]'
  career_goals: Victoria hopes to move from a miscellaneous construction role into a supervisory position where she can blend her technical skills with her passion for community‑focused projects. She plans
    to obtain OSHA certification and enroll in a local community‑college construction management program, aiming to become a foreperson or site manager within the next three years. Long‑term, she dreams
    of establishing her own small‑scale renovation business that specializes in eco‑friendly home upgrades for families in Morgan County, while also partnering with Habitat for Humanity to provide affordable,
    sustainable housing. She wants to mentor other women entering the trades, creating a supportive network that reflects her compassionate and cooperative nature.
