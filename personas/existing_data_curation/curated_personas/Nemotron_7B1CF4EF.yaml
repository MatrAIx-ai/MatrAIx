personas:
  professional: Alina Gonzalez is a budding junior coder and digital illustrator who merges her fascination with marine ecosystems and sci‑fi storytelling into Scratch games and Python scripts, employing
    a methodical yet adaptable workflow that balances curiosity with practicality and often challenges peers in friendly coding competitions.
  sports: Alina Gonzalez trains with the Oceanview Aquatic Club junior swim team, channeling her competitive energy into weekly lap challenges, while rooting for the Miami Marlins and occasionally playing
    pick‑up basketball with a small circle of friends at the neighborhood park.
  arts: Alina Gonzalez spends downtime sketching luminous marine life on her tablet, inspired by digital artists like Loish and marine photographer Cristián Artuso, synchronizing her brushstrokes to the
    beats of Bad Bunny, Shakira, and Taylor Swift while curating a portfolio of park and shoreline photographs reminiscent of Ansel Adams' tonal mastery.
  travel: Alina Gonzalez dreams of exploring the Galápagos Islands and the Great Barrier Reef to study real marine ecosystems, yet she typically sticks to family‑budget road trips to nearby state beaches
    and weekend hikes on the Appalachian Trail, using Google Earth to map each adventure before departure.
  culinary: Alina Gonzalez assists in preparing aromatic arroz con gandules with sofrito and pigeon peas while experimenting with her own shrimp‑taco recipe featuring lime‑marinated shrimp, cabbage slaw,
    and a drizzle of chipotle mayo, reflecting her growing confidence in the kitchen and love for seafood flavors.
  core: Alina Gonzalez is a quiet, competitive, curiosity‑driven 12‑year‑old who blends sci‑fi reading, marine illustration, and game coding into a solitary creative world, yet often forgets homework when
    a new Scratch project sparks excitement.
background:
  cultural: Alina grows up in a bilingual Puerto Rican household on Staten Island, where Spanish and English flow interchangeably at home. Family traditions such as celebrating Noche Buena, Three Kings
    Day, and participating in the local Puerto Rican Day Parade reinforce her cultural identity. She enjoys the flavors of Puerto Rican cuisine—mofongo, arroz con gandules, and plantains—prepared alongside
    her grandparents, and she often shares recipes with friends. Alina participates in community events like the library’s bilingual storytime, where she helps read Spanish‑language books to younger children.
    While embracing her heritage, she also navigates the diverse, fast‑paced environment of New York City, valuing education, resilience, and the close‑knit support of her extended family.
attributes:
