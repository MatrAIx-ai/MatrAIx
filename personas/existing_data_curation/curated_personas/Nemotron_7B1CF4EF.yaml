  hobbies: '["Reading fantasy and sci‑fi novels", "Digital illustration of marine life", "Coding small games (Scratch, Python)", "Nature photography in local parks", "Listening to music (pop, salsa, reggaeton)",
    "Cooking traditional Puerto Rican dishes", "Collecting seashells and marine specimens", "Playing chess in small groups"]'
  career_goals: Alina aspires to become a marine biologist or environmental engineer, motivated by her curiosity about ocean ecosystems and a desire to protect coastal habitats both in Puerto Rico and the
    New York area. She aims to earn a scholarship to a university with a strong marine science program, excel in science fairs, and eventually mentor younger students from her community, encouraging them
    to pursue STEM fields. Alina also envisions using her graphic design and video‑editing skills to create engaging educational content about marine conservation.
