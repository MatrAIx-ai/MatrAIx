  career_goals: Hong aims to progress into senior strategic leadership, eventually becoming a director of business transformation where he can embed creative thinking into corporate strategy. He aspires
    to lead cross‑functional innovation labs that blend data analytics with artistic perspectives, fostering a culture that values both efficiency and employee well‑being. To broaden his impact, he plans
    to earn a professional certification in data science and mentor junior analysts, while also championing mental‑health initiatives within the organization to mitigate stress for himself and his team.
