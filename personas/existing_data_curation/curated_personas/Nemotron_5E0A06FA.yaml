  career_goals: Anne aims to finish her associate’s degree in Business Administration within the next two years, securing a full-time office administrator position in a local agricultural business where
    she can apply her organizational and inventory-control skills. She seeks a career path that offers clear structure, predictable routines, and opportunities for incremental advancement to a supervisory
    or logistics-manager role. In the long term, Anne aspires to obtain her bachelor’s degree and eventually start a consulting service that helps small farms optimize their supply-chain processes, giving
    her personal recognition and financial independence.
