personas:
  professional: Thanh Hoang, a two‑year-old preschooler, excels as a meticulous builder in the classroom sandbox, methodically arranging blocks by color and shape, displaying a strong preference for routine,
    and they show an early competitive edge by swiftly completing simple puzzles ahead of peers.
  sports: Thanh Hoang enjoys structured toddler gymnastics at the local community center, favoring the familiar balance beam routine and competitively timing their jumps against peers, while they also cheer
    for the Springfield Strikers soccer team's mascot during family outings.
  arts: Thanh Hoang delights in scribbling with thick crayons, repeatedly drawing circles and squares in the same order, and they are especially captivated by classic cartoon characters like Mickey Mouse
    and the soothing lullabies of singer Raffi.
  travel: Thanh Hoang has visited Seattle's Pacific Science Center Aquarium and the family’s favored Sunny Cove Beach Resort in Florida, preferring destinations with predictable schedules and familiar snack
    stations, and they feel uneasy when traveling to new hotels that lack a clear bedtime routine.
  culinary: Thanh Hoang prefers simple, bland meals such as plain macaroni and cheese, sliced bananas, and steamed carrots, insisting on having the same plate arrangement each day, and they will throw a
    tantrum if a new sauce appears.
  core: Thanh Hoang is a two‑year‑old routine‑lover whose methodical toy sorting, picky palate, and emotional bursts make every day a careful choreography of comfort and competition, and they thrive on
    predictability while struggling with sudden changes.
background:
  cultural: Thanh is a second‑generation Vietnamese‑American raised in Aurora, Colorado. At home, Vietnamese and English are spoken interchangeably, and family traditions such as celebrating Tet, preparing
    pho and bánh chưng, and honoring elders are central to her upbringing. The household blends practical, industrious values from its Southeast Asian heritage with the structured, community‑oriented lifestyle
    of the local Vietnamese diaspora in the Denver area.
attributes:
  skills: '[''following daily routines'', ''stacking block towers'', ''using crayons with fine‑motor control'', ''identifying basic colors and shapes'', ''solving simple three‑piece puzzles'', ''vocabulary
