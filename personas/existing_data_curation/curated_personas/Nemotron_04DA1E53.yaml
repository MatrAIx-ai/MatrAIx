  hobbies: '[''building block towers'', ''reading picture books'', ''singing nursery rhymes'', ''playing with sensory bins'', ''pretend cooking with toy kitchen'', ''drawing with crayons'', ''visiting the
    playground'', ''celebrating Tet with family'']'
  career_goals: Although still a toddler, Thanh frequently expresses a desire to help others and enjoys role‑play that mimics structured occupations. She often says she wants to be a "teacher" or a "doctor"
    when she grows up, gravitating toward careers that involve routine, practical assistance, and personal interaction. Her parents note that these emergent ambitions align with her organized, reliable
    nature and her competitive streak in games where she strives to be first.
