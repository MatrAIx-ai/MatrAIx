  hobbies: '["Sketching and drawing", "Digital photography", "Visiting art museums and galleries", "Graphic design experimentation", "Listening to eclectic music (Latin, indie, jazz)", "Cooking traditional
    Ecuadorian dishes", "Reading speculative fiction and philosophy", "Volunteering at community cultural events", "Exploring local parks and hiking trails"]'
  career_goals: Carlos aims to enroll in a bachelor’s program in graphic design or visual communications at a community college or university, building a portfolio that blends contemporary digital art with
    his Ecuadorian cultural heritage. He plans to secure an internship at a design studio or cultural organization to gain professional experience, then work as a senior graphic designer or creative director
    focused on multicultural projects. In the longer term, he hopes to launch a community‑based art program that offers workshops and exhibitions highlighting Latin American artists, fostering cross‑cultural
    understanding and providing creative opportunities for youth in his hometown.
