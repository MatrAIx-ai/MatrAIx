personas:
  professional: Carlos Vallejo, an aspiring graphic designer, merges street‑level sketching with digital mastery, using Photoshop and Illustrator to translate urban observations into compelling visual narratives,
    while their curiosity drives them to experiment with new typographic styles and community storytelling.
  sports: Carlos Vallejo enjoys early‑morning hikes on the nearby ridge trail, joins a casual weekend soccer pick‑up league, follows the local professional team Metro City FC, and maintains a flexible workout
    routine that balances cardio runs with sketch‑in‑the‑park sessions.
  arts: Carlos Vallejo frequents the modern art museum to study works by Yayoi Kusama, Banksy, and Frida Kahlo, finds inspiration in indie singer‑songwriter José González, classic jazz legend Miles Davis,
    and electro‑ambient producer Bonobo, and channels these influences into experimental graphic design pieces.
  travel: Carlos Vallejo prefers off‑beat itineraries, planning trips that blend cultural immersion with photo opportunities, having trekked the misty paths of Patagonia, explored the historic streets of
    Barcelona, and taken a weekend road‑trip to a nearby national park for sunrise landscape shoots.
  culinary: Carlos Vallejo loves cooking at home, perfecting a zesty seafood ceviche with lime, cilantro, and red onion, and a hearty tripe stew called guatita simmered with peanuts, plantains, and achiote,
    while experimenting with spice blends and pairing dishes with chilled chicha de jora.
  core: Carlos Vallejo is a curious, organized 21‑year‑old who sketches city life on the go, balances a tight student budget with splurges on art gear, and constantly seeks new visual stories while humming
    indie beats.
background:
  cultural: Carlos comes from an Ecuadorian family that immigrated to the United States. Raised in Wayne, New Jersey, he grew up speaking Spanish at home while attending English‑language schools, creating
    a bicultural identity. His household celebrates Ecuadorian traditions such as Carnaval de Quito and Día de los Difuntos, and regularly prepares cuisine like ceviche, arroz con menestra, and empanadas.
    Exposure to the diverse suburban environment of Passaic County has broadened his cultural perspective, while his family's emphasis on community, family cohesion, and respect for heritage remains central
    to his values. This blend of Ecuadorian roots and American upbringing informs his artistic sensibilities, interpersonal style, and his aspiration to bridge cultures through creative work.
attributes:
  skills: '["Bilingual Spanish-English communication", "Basic graphic design (Adobe Photoshop, Illustrator)", "Digital photography", "Social media content creation", "Event planning and coordination", "Teamwork
