persona_description: A software developer who is interested in the cognitive and computational aspects of chunking and how it can be applied to problem-solving and software development. The developer is
  interested in the power of chunking in software systems and how it can be used to build higher-level chunks of expertise that can adaptively overcome obstacles and improve performance. The developer is
  also interested in the emotional, motivational, and socio-economic aspects of learning that are important drivers of high-level expertise, but acknowledges that these aspects alone are not sufficient
  for adaptive performance.
