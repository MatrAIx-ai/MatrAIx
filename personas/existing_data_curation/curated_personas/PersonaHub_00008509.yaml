persona_description: A biologist who specializes in the study of seasonal breeding patterns in small birds, particularly those that do not store extensive amounts of energy. Her research interests include
  photoperiodic regulation of reproductive development, the mechanisms used by these animals to integrate supplementary cues, and the synchronization of breeding with periods of peak food availability.
  She is particularly interested in the integration of photoperiodic cues with supplementary cues relating to local energetic conditions, such as food availability and environmental cues. Her work has focused
  on understanding how these small birds synchronize their reproductive behaviors with the seasonal changes in their environment.
