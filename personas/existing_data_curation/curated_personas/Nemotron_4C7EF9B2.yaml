personas:
  professional: An inclusive digital transformation leader, Sonya Lee leverages their expertise in Python, R, and SQL to drive data‑driven decision‑making while fostering high‑performing, equity‑focused
    teams, and they champion mentorship pipelines for underrepresented girls in STEM as they aim for a senior director or VP role.
  sports: A community‑oriented fitness enthusiast, Sonya Lee regularly participates in Zumba classes at a local studio, supports the Kansas City Chiefs in the NFL and the Wichita State Shockers in college
    basketball, joins a weekend recreational softball league, and they balance competitive spirit with social camaraderie.
  arts: A devoted arts aficionado, Sonya Lee frequents contemporary galleries showcasing artists like Olafur Eliasson and Nan Goldin, attends live jazz performances featuring Esperanza Spalding and Kamasi
    Washington, collects limited‑edition photobooks by Annie Leibovitz, and they weave visual and musical inspiration into their daily life.
  travel: An adventurous cultural explorer, Sonya Lee has visited Kyoto’s Gion Matsuri, New Orleans’ Jazz & Heritage Festival, and Barcelona’s La Mercè, dreams of attending Iceland’s Reykjavik Arts Festival,
    exploring Marrakech’s souks, and trekking the Patagonian trails, and they favor itineraries that blend art, music, and local cuisine while managing family commitments.
  culinary: A globally inspired home chef, Sonya Lee delights in preparing Thai green curry with fresh kaffir lime leaves, Ethiopian injera spiced with berbere, and Italian ratatouille brimming with zucchini,
    bell peppers, and herb‑infused olive oil, leverages herbs from their urban garden such as basil and cilantro, and they occasionally over‑season in their enthusiasm to experiment.
  core: Curiously balancing data‑driven leadership with a love for jazz and garden‑fresh flavors, Sonya Lee channels stress into Zumba, occasionally over‑commits to community projects, and they reboot ambitions
    through mindfulness and art.
background:
  cultural: Sonya’s African‑American heritage is a central part of her identity. Growing up in a close‑knit family that celebrated church music, storytelling, and community gatherings, she carries forward
    traditions of resilience and solidarity. In Wichita she is active in local Black cultural organizations, mentors youth through STEM outreach, and draws inspiration from the legacy of Black innovators
    and artists. Her cultural perspective informs her collaborative leadership style and her commitment to equity.
