  career_goals: Sonya aims to advance to a senior director or vice‑president role overseeing digital transformation initiatives, where she can blend technology strategy with inclusive leadership. She plans
    to spearhead a mentorship pipeline for Black girls in Wichita pursuing STEM, and eventually launch her own consulting practice that helps mid‑size companies embed equitable innovation practices.
