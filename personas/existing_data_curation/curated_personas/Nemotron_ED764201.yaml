  career_goals: Cristian aims to complete his GED within the next two years and enroll in a vocational program focused on computer hardware repair or automotive technology. He plans to earn industry certifications
    such as CompTIA A+ and ASE to secure a stable technical job that offers clear advancement paths. Parallel to this, he hopes to build a small local e‑sports team and grow a streaming channel, leveraging
    his gaming talent into a side income. Ultimately, he wants to become a reliable technician who can support his family while maintaining the independence and competitive edge that drive him.
