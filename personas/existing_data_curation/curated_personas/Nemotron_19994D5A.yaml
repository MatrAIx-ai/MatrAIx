  hobbies: '["Golf (tournament play)", "Weight training & group fitness", "Community theater acting", "Karaoke hosting", "Smart‑home tech experimentation", "Cooking Southern & Caribbean cuisine", "Attending
    music festivals and jazz concerts", "Traveling to cultural heritage sites", "Mentoring at community college", "Reading entrepreneurship & real‑estate literature"]'
  career_goals: Quinton aims to transform his solo practice into a boutique brokerage that dominates the Orlando vacation‑home segment and champions affordable homeownership for Black families in Orange
    County. Over the next five years he plans to increase his annual sales volume by at least 30 percent, obtain the Certified Residential Specialist (CRS) designation, and earn recognition as a top‑producing
    agent at the regional level. He also intends to launch a mentorship program for aspiring real‑estate professionals from under‑represented backgrounds and to develop a podcast that shares market insights,
    negotiation tactics, and stories of wealth‑building through property ownership.
