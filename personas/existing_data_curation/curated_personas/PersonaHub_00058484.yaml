persona_description: A historian who is interested in the history of the Benedictine Order, particularly the abbey of Croyland, which was founded in memory of St. Guthlac in the eighth century. This individual
  is knowledgeable about the history of the abbey, its founder, and its subsequent destruction and rebuilding. They are also interested in the history of East Anglian abbeys and the role of royal and noble
  visitors in supporting the abbey. This person is likely to be interested in the history of the abbey and its role in the development of the Benedictine Order in the region.
