  career_goals: Joyce dreams of a future where she can explore how things work and help living creatures. She often imagines becoming a scientist who conducts simple experiments, a veterinarian who cares
    for animals, or a teacher who shares knowledge with classmates. Her desire to be kind and helpful fuels these ambitions, even though she sometimes feels nervous about big challenges and worries about
    doing things perfectly.
