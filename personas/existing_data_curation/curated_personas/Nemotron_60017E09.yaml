personas:
  professional: Joyce Forkner is an aspiring junior naturalist who channels their organized curiosity into cataloguing rocks and seashells, keeping meticulous field journals that reflect their methodical,
    reliable nature and their love for adventure books.
  sports: Joyce Forkner plays on the Ironton Youth Soccer League’s under‑8 team, practices kick‑ball after school, and they cheerfully root for the Cincinnati Reds while dreaming of joining a local swimming
    club during the summer.
  arts: Joyce Forkner spends weekends drawing cartoon characters, building LEGO scenes inspired by Roald Dahl’s adventures, and listening to Raffi’s Baby Beluga while they hum along to The Wiggles during
    family sing‑alongs.
  travel: Joyce Forkner enjoys family weekend trips to the Ohio River’s riverfront park, day‑long visits to Hocking Hills State Park, and dreams of exploring the beaches of Virginia and the towering cliffs
    of the Grand Canyon after reading about them in adventure books, and they often sketch maps of each place they visit.
  culinary: Joyce Forkner loves assembling peanut butter and jelly sandwiches, munching on homemade mac and cheese with cheddar, and they love helping their mom bake apple pie using fresh garden apples
    and a pinch of cinnamon for the county fair.
  core: Joyce Forkner blends methodical curiosity with bright imagination, carefully saving every penny for new LEGO bricks while habitually worrying about small setbacks, and they find comfort in drawing,
    gardening, and community sing‑alongs.
background:
  cultural: Joyce was raised in Ironton, Ohio, a close‑knit community in Scioto County where Midwestern values of modesty, hard work, and neighborly cooperation are everyday life. Her family participates
    in local traditions such as the county fair, church celebrations, and community service projects. Growing up white in this small‑town setting, she experiences typical American holidays, a strong sense
    of community, and an appreciation for both the rural landscape and the town’s industrial heritage.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Organizing school materials'', ''Using educational software'', ''LEGO building'', ''Pet care'', ''Drawing and coloring'', ''Basic gardening'']'
