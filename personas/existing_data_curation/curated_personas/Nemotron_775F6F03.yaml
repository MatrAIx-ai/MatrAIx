personas:
  professional: Mayelin Marrero is a disciplined IT support specialist who leverages their strong organizational skills and competitive mindset to swiftly troubleshoot Windows and macOS environments, expertly
    prioritize tickets in ServiceNow, and produce meticulous documentation that reflects their preference for structure and high standards.
  sports: Mayelin Marrero trains for 5K races with the Austin Runners Club, lifts weights at a local CrossFit box, and follows the Austin FC soccer team, the Dallas Mavericks in basketball, and the Houston
    Astros during baseball season, approaching each sport with the same strategic planning they apply to their IT tickets.
  arts: Mayelin Marrero fuels their competitive drive through artistic outlets, regularly streaming strategy‑focused board game podcasts, attending live performances by indie musicians such as Phoebe Bridgers
    and Tame Impala, and curating a vinyl collection that includes classic rock legends like Led Zeppelin and contemporary composers such as Ólafur Arnalds.
  travel: Mayelin Marrero prefers meticulously planned trips, alternating weekend road‑trips to Texas Hill Country towns like Fredericksburg and longer flights to European cities such as Barcelona, balancing
    their love for structured itineraries with the occasional spontaneous detour to explore local food markets.
  culinary: Mayelin Marrero enjoys cooking family‑style dishes like chicken tinga with chipotle peppers, corn tortillas, and fresh cilantro, often experimenting with homemade salsa verde made from tomatillos,
    jalapeños, and lime, while honing their culinary skills through YouTube tutorials and weekend meal‑prepping rituals.
  core: Mayelin Marrero blends a competitive, detail‑oriented mindset with a love for strategic games, disciplined fitness, and methodical planning, turning every challenge—from troubleshooting tickets
    to weekend cooking—into a structured quest for excellence that they pursue with relentless focus.
background:
  cultural: Mayelin's family originates from the coastal state of Veracruz, Mexico, and she grew up in a bilingual household where Spanish was spoken at home while English was used at school and work. Mexican
    traditions—such as celebrating Día de los Muertos, preparing family recipes like tamales and mole, and attending community festivals—remain central to her identity. These cultural influences shape her
    strong work ethic, hospitality, and deep sense of community responsibility. While she embraces her Mexican roots, she also integrates into the Southern Arkansas community, blending cultural pride with
    local customs and values.
attributes:
  skills: '[''Hardware troubleshooting'', ''Software installation and configuration'', ''Operating system support (Windows, macOS)'', ''Network basics (TCP/IP, DHCP, DNS)'', ''Active Directory user management'',
    ''Remote support tools (TeamViewer, Remote Desktop)'', ''Ticketing systems (ServiceNow, Zendesk)'', ''Technical documentation'', ''Time management and task prioritization'', ''Customer service and communication'']'
  hobbies: '[''Chess'', ''Sudoku and crossword puzzles'', ''Competitive strategy video gaming'', ''Running (5K training)'', ''Weightlifting'', ''Cooking traditional Mexican cuisine'', ''Volunteering (basic
    computer literacy classes for seniors)'']'
  career_goals: Mayelin aims to earn CompTIA Network+ and Cisco CCNA certifications within the next two years, positioning herself for a transition into network administration. She plans to enroll in night
    courses toward an associate's degree in information technology, eventually pursuing a bachelor's degree. Long‑term, she aspires to lead a support team as an IT manager, implementing streamlined workflows
    and performance metrics that reflect her love for structure and high standards. She also hopes to mentor other women entering the tech field and become a recognized subject‑matter expert in IT service
    management within her region.
