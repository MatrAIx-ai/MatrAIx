  career_goals: While retired, Linda aims to deepen her legacy in the Whiteland community by establishing a regular intergenerational art workshop series at the senior center, mentoring younger participants
    and showcasing her own work in local galleries. She wants to expand the community garden she helped start, turning it into a therapeutic space for seniors. A personal ambition is to travel with her
    husband to major art museums in Chicago, Washington, D.C., and New York, documenting their experiences in a scrapbook she hopes to share with future generations. Additionally, Linda wishes to compile
    a family memoir that weaves together her genealogy research, recipes, and stories of post‑war Midwestern life.
