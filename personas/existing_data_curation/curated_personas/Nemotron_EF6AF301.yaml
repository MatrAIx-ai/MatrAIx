  career_goals: Building on his business degree and years of frontline retail experience, Garry aims to move into a supervisory or assistant manager position within the next two years, where he can mentor
    younger associates and champion customer-centric policies. In the longer term, he hopes to semi-retire by launching a small community-focused café that doubles as an informal art gallery, providing
    a relaxed gathering place for seniors, students, and local artists. He also plans to volunteer as a financial-literacy coach at the neighborhood community center, helping residents manage budgets and
    develop basic bookkeeping skills.
