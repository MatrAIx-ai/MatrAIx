  career_goals: Gloria aims to share the richness of her life experiences and cultural heritage through artistic and literary projects. She plans to complete a memoir that weaves together family history,
    community memories, and reflections on African‑American life in Delaware, and to publish a small collection of her poems. She hopes to curate a community exhibition that highlights the work of local
    Black artists and to lead an intergenerational storytelling workshop at the senior center. Continuing her love of learning, she intends to take online courses in digital illustration and art conservation,
    and to expand her volunteer mentorship to support emerging writers and community initiatives.
