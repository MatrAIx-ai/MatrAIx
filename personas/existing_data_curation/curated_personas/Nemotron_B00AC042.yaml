personas:
  professional: Carolina Hernandez is a budding pretend‑teacher who organizes tiny classroom lessons at home, balancing a need for routine with sudden bursts of imaginative play, and loves being the center
    of attention while their stuffed‑animal audience watches.
  sports: Carolina Hernandez is a lively member of the local toddler soccer group, cheering on the Chicago Cubs during family game nights and sprinting around the playground with a mini basketball hoop,
    showing a love for both organized team play and spontaneous tag games.
  arts: Carolina Hernandez loves dancing to the songs of Disney’s Frozen soundtrack, drawing pictures of Mickey Mouse and Peppa Pig, and can recite lines from Sesame Street, making the living room their
    stage where they enjoy performing for any audience.
  travel: Carolina Hernandez enjoys family trips to the local zoo and weekend excursions to the beach in Florida, prefers the comfort of their stroller for longer drives, and dreams of seeing the giant
    pandas at the Beijing Research Base when they’re older, balancing curiosity with the need for routine rest stops.
  culinary: Carolina Hernandez favors crunchy chicken nuggets, creamy mac and cheese, and strawberry‑topped pancakes, can make a simple peanut butter‑and‑jelly sandwich with a plastic knife, but stubbornly
    refuses broccoli, often bargaining for extra fruit slices as a reward.
  core: Carolina Hernandez, a talkative 3‑year‑old who oscillates between demanding tidy playtimes and sudden bursts of carefree dance, charms caregivers with endless questions while occasionally throwing
    temper‑taming tantrums over missing toys.
background:
  cultural: Carolina is a Mexican‑American toddler raised in Austin, Texas. Her household blends Mexican traditions—such as Día de los Muertos crafts, posada celebrations, and family meals featuring tacos
    and tamales—with the multicultural vibe of Austin. She hears and speaks both Spanish and English daily, enjoys Mexican folk songs and modern Latin pop, and participates in community festivals at the
    local cultural center, fostering a strong sense of her Mexican heritage while navigating a diverse urban environment.
