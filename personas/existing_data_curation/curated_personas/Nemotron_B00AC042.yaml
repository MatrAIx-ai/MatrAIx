  career_goals: Even at three, Carolina imagines herself in roles that let her share joy and help others. She frequently pretends to be a teacher guiding her dolls, a singer performing for family and friends,
    and occasionally a caring doctor tending to stuffed animals. Her ambitions revolve around being a source of laughter, learning, and comfort for the people she loves.
