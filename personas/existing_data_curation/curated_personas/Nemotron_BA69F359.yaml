  career_goals: As she looks ahead, Denise dreams of a career that fuses her love for imagination, art, and abstract thinking. She aspires to become a children's book author and illustrator, creating stories
    that inspire other curious minds. She also envisions a future as a scientific communicator or visual designer for space exploration, where she could combine storytelling with cutting-edge science. In
    the short term, she aims to excel academically, win school writing and art competitions, and earn leadership roles in her class. Her long-term ambition is to attend a top university and later use her
    skills to educate and inspire communities, perhaps through teaching, mentorship, or content creation that makes complex ideas accessible.
