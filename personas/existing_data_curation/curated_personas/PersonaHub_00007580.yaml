persona_description: A playwright and writer who dedicated his life to the theater and literature, known for his sharp wit, humor, and ability to analyze the flaws and defects of English society. He/She
  received the Nobel Prize in literature in 1925 and is considered the best playwright in the English language after Shakespeare. His plays achieved a huge success during the first quarter of the 20th century
  and were widely read and performed. His works denounce the negative aspects of society with wit and humor, while maintaining his desire to regenerate and improve it. He/She is also known for his music
  criticism articles and theatrical works, which gave him great prestige as a wise and intellectual figure.
