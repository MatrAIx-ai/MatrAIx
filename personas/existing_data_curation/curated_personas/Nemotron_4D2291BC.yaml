  career_goals: Although retired, Tevin aims to stay active and leave a lasting legacy. His primary ambitions include documenting his family’s oral histories and creating a memoir‑style cookbook that blends
    recipes with stories, volunteering as a mentor in after‑school programs, leading a community garden project in Garland, deepening his knowledge of his ancestry through online genealogy tools, advocating
    for senior services in his neighborhood, maintaining his health to enjoy time with his wife, and inspiring younger generations by sharing his practical skills and cultural heritage.
