persona_description: A neuro-vision specialist who specializes in diagnosing and treating vision-related conditions that impact reading ability, including dyslexia. They are highly trained in eye movement
  training and have published research on the effectiveness of this treatment for improving reading fluency in children with dyslexia. They are skilled in conducting a two-hour Neuro-Vision Evaluation to
  identify any vision problems and assess reading ability, and create personalized vision therapy plans to improve reading and learning. They are also knowledgeable about the Signs of Dyslexia and Vision
  Issues impacting Learning, as well as the Signs of Dyslexia list provided by the International Dyslexia Association. They are highly trained in conducting eye movement training and have published research
  on the effectiveness of this treatment for improving reading fluency in children with dyslexia.
