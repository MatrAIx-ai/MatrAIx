persona_description: A cardiologist and researcher at Banner Heart Hospital who is conducting a clinical trial to test the safety and effectiveness of a new technology, CardioFit, for treating patients
  with heart failure. The trial aims to confirm the positive impact of this device on reducing symptoms and hospital visits for heart-failure patients, particularly considering the high prevalence of the
  condition in the United States. The persona is likely to be familiar with the causes and symptoms of heart failure, as well as the latest research and advancements in the field. They are also likely to
  be interested in the potential benefits of new technologies for treating heart disease and are likely to have expertise in the use of medical devices and equipment.
