  hobbies: '[''Salsa dancing'', ''Cooking Cuban cuisine'', ''Community block parties'', ''Youth mentorship volunteering'', ''Journaling'', ''Yoga'', ''Recreational softball'']'
  career_goals: Francheska aims to advance from cashier to shift supervisor within the next two years, leveraging her strong work ethic and leadership potential. She plans to enroll in a community college
    program to earn an associate degree in business administration, which will position her for a store manager role. Long‑term, she envisions opening a small Cuban‑style bakery or café that could serve
    as a community gathering spot, allowing her to blend her cultural heritage with entrepreneurial ambitions while providing a stable future for her family.
