personas:
  professional: Francheska Chauca leverages bilingual cash‑handling expertise, precise inventory management, and a pragmatic curiosity to streamline a bustling retail floor, consistently outpacing peers
    for performance metrics as they eye a shift‑supervisor promotion within two years.
  sports: Francheska Chauca stays active by pitching for the South Beach Softball Club during summer, cheering on the Miami Heat during the NBA season, and squeezing in early morning jogs along the beach
    to balance their competitive edge with stress relief.
  arts: Francheska Chauca immerses themselves in the rhythm of salsa nights, often dancing to classics by Celia Cruz and modern hits from Marc Anthony, while they also attend performances at the Adrienne
    Arsht Center to feed their love for vibrant, community‑driven art.
  travel: Francheska Chauca blends meticulous budgeting with a wanderlust for flavor, planning weekend getaways to Havana for authentic street food, long‑haul trips to Barcelona to study pastry cafés, and
    occasional road trips across Florida’s coastal towns, always hunting affordable Airbnb stays to keep their bakery fund intact while they savor each new locale.
  culinary: Francheska Chauca whips up traditional Ropa Vieja, slow‑roasted Lechón con Mojo, and sweet plantain maduros with the same gusto they reserve for night‑out tapas, proudly seasoning each dish
    with a dash of cumin and fresh cilantro, while they hone their pastry skills by experimenting with guava‑filled puff pastries for future café menus.
  core: Francheska Chauca channels competitive fire, social zest, and a jittery mind into a disciplined routine of retail mastery, salsa spins, budget tutoring, and perpetual planning for a community‑centric
    Cuban bakery, where they dream of mixing entrepreneurship with cultural flavor.
background:
  cultural: Francheska’s Cuban roots are a central part of her identity; she grew up hearing stories of her grandparents’ migration to Florida before settling in Southern California. She speaks fluent Spanish
    at home and celebrates Cuban holidays such as Día de la Cultura Cubana with music, dance, and food. The vibrant Latino community in Lynwood provides her with a strong support network, influencing her
    values of family solidarity, hospitality, and a love for rhythm and cuisine that she incorporates into her daily life and social interactions.
attributes:
  skills: '[''Cash handling'', ''POS system operation'', ''Bilingual customer service (English/Spanish)'', ''Inventory management'', ''Basic bookkeeping'', ''Data entry'', ''Staff training'', ''Conflict
