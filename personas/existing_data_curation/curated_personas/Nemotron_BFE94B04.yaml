  career_goals: Barbara aims to launch a career that merges her love for art with community impact. She plans to secure an entry‑level position in arts administration—such as an arts program coordinator
    or museum assistant curator—in Chattanooga, where she can develop exhibitions, lead educational outreach, and partner with local schools. Over the next five years she hopes to complete a certificate
    in museum studies, build a portfolio of curated community projects, and eventually step into a leadership role that shapes regional cultural programming and supports emerging artists.
