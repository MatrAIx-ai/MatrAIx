personas:
  professional: An aspiring junior illustrator, Iris Morrow channels her boundless imagination into detailed sketches of fantastical characters, blending the storytelling tradition of family gatherings
    with modern fantasy influences while they eagerly experiment with digital tools like Scratch to prototype comic panels, though their relaxed attitude toward deadlines sometimes leaves projects half‑finished.
  sports: An energetic member of the local youth soccer league, Iris Morrow cheers for the Atlanta Braves and the Georgia Bulldogs football team on game days, participates in weekend swim sessions at Lake
    Strom Thurmond, and when not on the field prefers imaginative “LEGO stadium” builds over structured workouts, displaying a competitive spirit more than a cooperative one.
  arts: A creative explorer, Iris Morrow draws inspiration from Hayao Miyazaki’s animated films and the melodic piano pieces of Yiruma, sketches sprawling fantasy maps reminiscent of Tolkien’s Middle‑earth,
    builds stop‑motion stories using LEGO figures and kitchen utensils, and spends afternoons reverently watching Bob Ross while perfecting watercolor techniques.
  travel: A curious adventurer, Iris Morrow loves spontaneous day trips to the nearby Blue Ridge Mountains and picnic outings at Lake Lanier, has visited Savannah’s historic squares to sketch moss‑draped
    oaks, and dreams of exploring the castles of Scotland and the streets of Tokyo, always packing a sketchbook and a LEGO set for creative downtime.
  culinary: A budding foodie, Iris Morrow relishes classic Southern comfort dishes like fried chicken, mac and cheese, and peach cobbler, enjoys helping Mom bake chocolate chip cookies shaped like LEGO
    bricks, and experiments with creating rainbow fruit kebabs using strawberries, blueberries, and melon, while they sometimes sneak extra sugar into the batter for an extra sweet kick.
  core: Iris Morrow is a ten‑year‑old imagination engine who blends Southern storytelling with digital fantasy, builds elaborate LEGO worlds, sketches endlessly, and balances a competitive spark with a
    laid‑back, sometimes forgetful, approach to life.
background:
  cultural: Iris grew up in Sandersville, a small town in Washington County, Georgia, where community gatherings, church activities, and family traditions play a central role. Her upbringing includes Southern
    hospitality, storytelling around family meals, and frequent trips to local lakes and farms, fostering a deep appreciation for nature. While her environment is predominantly white and rooted in regional
    customs—comfort food, school art fairs, and church choirs—she also taps into national pop culture and online platforms, blending Southern folklore with contemporary fantasy and digital media. This mix
    of local heritage and global influences shapes her worldview and creative expression.
attributes:
  skills: '["Imaginative storytelling", "Illustration and drawing", "Basic digital coding (Scratch)", "Puzzle solving", "Creative research", "Oral presentation", "Art competition participation"]'
  hobbies: '["Sketching", "LEGO building", "Creative writing", "Nature exploration", "Playing keyboard", "Stop‑motion animation", "Digital storytelling with Scratch"]'
  career_goals: Iris aspires to become a multidisciplinary artist who blends illustration, animation, and interactive storytelling to create immersive experiences. She dreams of attending a specialized
    arts high school, winning national youth art and writing competitions, and eventually working as a concept artist for video games or as a graphic novelist. She also hopes to design an educational app
    that teaches abstract concepts through visual art, pushing creative boundaries while gaining recognition for her originality and innovation.
