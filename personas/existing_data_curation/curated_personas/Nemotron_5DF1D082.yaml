personas:
  professional: A budding builder‑storyteller named Bernardo Potente blends their curiosity for pirate adventures with practical problem‑solving, assembling elaborate LEGO sets and drawing comic‑style heroes,
    laying early foundations for a future as an engineer or designer.
  sports: An enthusiastic soccer player named Bernardo Potente trains with the Barranquitas Youth Soccer Club ‘Cañones’, cheers for the Puerto Rico national soccer team during matches, and also enjoys dancing
    salsa and plena as a lively warm‑up before games.
  arts: A creative performer named Bernardo Potente dances to salsa legends Marc Anthony and Celia Cruz and plena rhythms by Bobby Sanabria with their cousins, while sketching comic heroes inspired by Stan Lee
    and Alex Ross, turning storybooks about pirates into illustrated adventures.
  travel: An adventurous explorer named Bernardo Potente spends weekends hiking pine‑forested trails around Barranquitas, dreams of trekking El Yunque’s waterfalls, and hopes to visit Barcelona’s Gothic
    Quarter and the Safari Park in South Africa, preferring nature trips over amusement parks.
  culinary: A junior chef named Bernardo Potente eagerly helps their family stir sofrito, shape plantain‑based pasteles, and sprinkle cheese on pastelón during festivals, while also perfecting their own
    chocolate‑chip cookie recipe using butter, vanilla, and dark chocolate chips.
  core: Bernardo Potente is a curious, energetic 7‑year‑old who balances LEGO building, soccer, salsa dancing, and family cooking with a habit of misplacing their allowance in couch cushions.
background:
  cultural: Bernardo is a Puerto Rican boy raised in the mountain town of Barranquitas in the Corozal municipality. He grows up speaking Spanish at home, learning English at school, and participating in
    the town’s vibrant communal celebrations such as the patron saint festivals and the yearly Coquí singing nights. The rhythms of bomba, plena, and salsa fill his home, and dishes like arroz con gandules,
    pasteles, and alcapurrias are part of family gatherings. The natural environment—pine forests, coffee farms, and the call of the coquí—shapes his love for the outdoors, while the close‑knit extended
    family teaches him the values of cooperation, respect, and community harmony.
