  hobbies: '["Playing soccer", "Dancing to salsa and plena", "Hiking in local trails", "Reading adventure books", "Building LEGO sets", "Drawing cartoons", "Helping with family cooking during festivals"]'
  career_goals: Bernardo dreams of becoming someone who can both explore the world and help his community. He imagines himself as a future scientist‑explorer who studies the mountains and wildlife of Puerto
    Rico, or as a soccer coach who teaches teamwork to younger kids. He also thinks about being a teacher who makes learning fun, blending his curiosity for new ideas with a practical desire to support
    others.
