personas:
  professional: Margarita Guevara, a 36‑year‑old compensation analyst at a Southern California tech firm, leverages advanced Excel, SQL, and Python to design data‑driven pay structures while channeling
    their curiosity and methodical nature into meticulous market‑pricing models and their sociable, collaborative style into cross‑functional stakeholder workshops.
  sports: Margarita Guevara hits the waves with the San Diego Surf Club, tackles the Torrey Pines coastal trails each weekend, follows the San Diego Padres and Los Angeles Lakers avidly, and blends their
    disciplined Pilates practice with spontaneous beach volleyball games, treating fitness as a structured yet socially energizing routine.
  arts: Margarita Guevara fuels their creative side by dancing to live salsa bands featuring artists like Carlos Santana and Lila Downs, devouring contemporary sci‑fi novels by N.K. Jemisin and Liu Cixin,
    and listening to podcasts such as The HR Happy Hour and Data Skeptic, which together shape their appreciation for storytelling, rhythm, and tech‑driven narratives.
  travel: Margarita Guevara plans their trips with the same spreadsheet precision they use at work, favoring active getaways like surfing in Baja California, hiking the volcanic trails of Iceland, and cultural
    immersion in Kyoto, while budgeting for weekend escapes to nearby Santa Barbara and dreaming of a future trek through Patagonia's Patagonian Andes.
  culinary: Margarita Guevara, an adept home chef, masters traditional mole poblano and tamales while experimenting with mole‑sriracha tacos and quinoa‑stuffed chiles, and they relish sourcing fresh avocados,
    chiles de árbol, and Oaxaca cheese to blend Mexican flavors with Mediterranean twists during weekend dinner parties.
  core: Margarita Guevara blends data‑driven rigor with a surf‑side spirit, habitually juggling Excel macros while humming salsa beats, and despite a chronic habit of forgetting to water houseplants, they
    never miss a deadline or a wave.
background:
  cultural: Margarita is a first‑generation Mexican American who grew up in a bilingual household, fluent in both Spanish and English. Her family celebrates Mexican traditions such as Día de los Muertos,
    Semana Santa, and Mexican Independence Day, often hosting gatherings that blend these customs with California’s coastal lifestyle. She values the strong sense of community and family responsibility
    instilled by her parents, which informs her collaborative work style and commitment to equity. While deeply rooted in her Mexican heritage, Margarita also embraces the diverse cultural tapestry of Oceanside,
    actively participating in local multicultural events and integrating her cultural insights into her professional advocacy for inclusive workplace practices.
attributes:
  skills: '[''Compensation design'', ''Benefits administration'', ''Job analysis (point‑factor, market pricing)'', ''Advanced Excel'', ''SQL'', ''Python for data analysis'', ''Salary benchmarking'', ''Predictive
    compensation modeling'', ''HRIS (Workday, ADP) management'', ''California labor law compliance'', ''Strategic workforce planning'', ''Project management'', ''Stakeholder communication'', ''Data visualization'']'
  hobbies: '[''Surfing'', ''Coastal hiking (Torrey Pines)'', ''Yoga and Pilates'', ''Cooking Mexican cuisine'', ''Fusion cooking experiments'', ''Salsa dancing'', ''Volunteering at cultural festivals'',
    ''Mentoring youth in schools'', ''Reading contemporary science fiction'', ''Listening to HR tech and data science podcasts'']'
  career_goals: Margarita aims to become a senior compensation strategist overseeing enterprise‑wide pay equity initiatives, with a focus on integrating data‑driven analytics to support diversity and inclusion
    goals. She plans to obtain the Certified Compensation Professional (CCP) designation and pursue a master's degree in Human Resources Management. Long‑term, she envisions leading a regional compensation
    & benefits function, mentoring emerging HR talent, and publishing thought pieces on equitable compensation practices within the tech and healthcare sectors of Southern California.
