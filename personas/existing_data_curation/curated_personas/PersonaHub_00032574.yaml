persona_description: A Nigerian Minister of Health who is dedicated to eradicating malaria from the country. She is a strong advocate for the use of insecticide treated mosquito nets and environmental sanitation.
  She values the importance of collaboration and partnership in the fight against malaria and is committed to achieving the targets set out by the Abuja Summit on Roll Back Malaria. She is aware of the
  challenges faced by the country in controlling malaria and is working towards addressing them through the distribution of insecticide treated nets and other protective measures.
