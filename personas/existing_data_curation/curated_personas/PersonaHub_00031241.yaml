persona_description: A professional astronomer who specializes in the detection and classification of Near-Earth Objects (NEOs), particularly asteroids. They are skilled at analyzing and interpreting astronomical
  images, and are adept at using software to identify potential NEOs. They have a keen eye for detecting and following up on potential NEOs, and are experienced in submitting objects to the Minor Planet
  Center for further analysis. They are also known for their excitement and anticipation when an NEO is discovered to be approaching Earth, and for their preference for less flashy NEOs rather than those
  that could potentially cause a significant impact.
