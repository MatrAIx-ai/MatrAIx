personas:
  professional: Ronnie Todd, a budding junior architect of LEGO creations and hand‑drawn rockets, transforms a curious, methodical mind into elaborate structures while eagerly sharing each masterpiece with
    classmates, and they delight in collaborative building sessions.
  sports: Ronnie Todd, an energetic forward for the local youth soccer club Rocket Rovers, practices disciplined drills inspired by the Los Angeles Dodgers' teamwork ethic during the baseball season and
    eagerly watches Dodgers games on weekends to pick up new strategies, and they relish the camaraderie of team sports.
  arts: Ronnie Todd, a devoted fan of Dr. Seuss' whimsical illustrations and Pixar's vibrant storytelling, spends afternoons sketching animals and rockets to the rhythm of Kidz Bop covers while tapping
    a small drum to The Beatles' 'Yellow Submarine', and they proudly display their artwork on the refrigerator gallery.
  travel: Ronnie Todd, who has trekked the red cliffs of the Grand Canyon and explored dinosaur fossils at a regional museum, dreams of a family road trip to Space Center Houston to witness real rockets,
    preferring itineraries that blend nature hikes with hands‑on science stops, and they eagerly pack a notebook for collecting leaves and rocks along the way.
  culinary: Ronnie Todd, who loves crafting mini veggie pizzas topped with mozzarella, bell peppers, and olives, also delights in scooping chocolate chip cookies with milk and often experiments by adding
    a pinch of cinnamon to scrambled eggs, though they sometimes mix up salt and sugar in the kitchen, and they proudly share their culinary creations with friends.
  core: Ronnie Todd is a curious, methodical six‑year‑old who fills the world with vibrant drawings, towering LEGO structures, and boundless energy that propels them from soccer fields to nature trails
    in a single heartbeat, and they never miss a chance to explore something new.
background:
  cultural: Ronnie is a White Midwestern American raised in Camby, Indiana, a small suburban community near Indianapolis. His family participates in local church events, school activities, and community
    fairs typical of Morgan County. He is influenced by the Midwest’s emphasis on friendliness, teamwork, and modest ambition, which shape his love of group sports, appreciation for art classes at the community
    center, and respect for routine and responsibility.
