  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Soccer'', ''Storytime at the library'', ''Nature walks and collecting leaves'', ''Playing simple musical instruments'', ''Group board games'']'
  career_goals: Ronnie dreams of becoming an astronaut because he loves space books and wants to explore the stars. He also imagines being an artist, creating big murals, and helping animals as a veterinarian.
    In the short term, he aims to be the class monitor, lead group games, and earn stickers for helping friends.
