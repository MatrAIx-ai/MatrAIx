  hobbies: '["Watercolor painting","Visiting art galleries","Knitting and crochet (Puerto Rican patterns)","Cooking traditional Puerto Rican dishes","Listening to plena and salsa music","Gentle yoga and
    meditation","Gardening (raised‑bed vegetables)","Reading poetry","Volunteering at after‑school art program"]'
  career_goals: Although approaching retirement age, Arlene envisions remaining involved in the school transportation community by becoming a part‑time driver trainer, helping new bus operators master safety
    protocols and culturally responsive communication. She aspires to join the district’s transportation advisory committee to advocate for student‑centric policies and to organize annual cultural‑heritage
    awareness days that showcase Puerto Rican art and history. On a personal level, she hopes to travel to Puerto Rico to document family stories, create a small photo‑journal, and publish a memoir that
    blends her experiences as a bus driver with reflections on art and community.
