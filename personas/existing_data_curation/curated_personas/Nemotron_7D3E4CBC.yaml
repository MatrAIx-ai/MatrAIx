personas:
  professional: Physical therapist Kaili Duncan combines their expertise in manual therapy, therapeutic exercise prescription, and functional movement assessment with a structured, detail‑oriented approach,
    ensuring each patient receives a meticulously documented plan while their natural tendency to worry pushes them to double‑check insurance authorizations and follow‑up notes, making them a reliable and
    assertive member of any interdisciplinary team.
  sports: An avid fan of the Texas Rangers and the Dallas Cowboys, Kaili Duncan supports the local high‑school baseball team, participates in a weekend yoga class at the community center, and they maintain
    their own fitness through brisk walks along the San Marcos River and occasional recreational pickleball matches at the county park.
  arts: Quilting‑circle regular Kaili Duncan finds solace in stitching patterns inspired by traditional folk designs while also enjoying the music of Willie Nelson and the storytelling of author Ken Follett,
    and they occasionally attend a local theater's production of The Glass Menagerie, which feeds their appreciation for both craft and classic Americana.
  travel: Travel‑savvy Kaili Duncan prefers well‑planned road trips that blend relaxation with cultural immersion, having explored the historic wineries of the Texas Hill Country, taken a family vacation
    to Munich to attend Oktoberfest, and day‑tripping to New Orleans for its jazz scene, yet they still dream of a quiet retreat in the Austrian Alps to practice yoga.
  culinary: Kaili Duncan delights in cooking Texas‑style brisket, chicken fried steak, and German‑inspired sauerkraut with bratwurst, expertly blending native herbs like Mexican oregano and cilantro into
    their dishes, and they often experiment with a slow‑cooker chili that features black‑eyed peas and fire‑roasted tomatoes, showcasing a confident home‑chef skill set that balances tradition and experimentation.
  core: Kaili Duncan balances a practical, detail‑driven career in physical therapy with a love for gardening, quilting, and structured budgeting, yet they experience chronic worry that sometimes leads
    to late‑night over‑planning and occasional over‑indulgence in specialty seed purchases.
background:
  cultural: Kaili grew up in a small-town Texas environment with a predominantly white, Southern cultural backdrop. The community emphasizes self‑reliance, strong work ethic, and close family ties, which
    have shaped her practical and responsible outlook. Shiner's German roots influence her appreciation for local traditions, such as community festivals and craft-oriented pastimes like quilting. While
    she identifies with the broader American South values of hospitality and community service, she also respects the diverse cultural fabric of Lavaca County, participating in local church events and volunteer
    health initiatives.
attributes:
  skills: '["Manual therapy", "Therapeutic exercise prescription", "Functional movement assessment", "Individualized treatment planning", "Patient education", "Insurance and documentation management", "Interdisciplinary
    team collaboration", "Geriatric and sports injury rehabilitation"]'
  hobbies: '["Gardening", "Cooking Texan and German-inspired meals", "Walking/hiking", "Reading historical fiction", "Quilting", "Community health fair volunteering"]'
  career_goals: Kaili aims to deepen her clinical expertise by obtaining a Certified Orthopedic Specialist credential and eventually opening a modest, community-focused physical therapy practice in Lavaca
    County. She is interested in integrating evidence‑based manual therapy with wellness programs such as yoga and mobility workshops. Additionally, she aspires to mentor newer therapists, lead local health
    outreach initiatives, and contribute to continuing education sessions for healthcare providers in her region.
