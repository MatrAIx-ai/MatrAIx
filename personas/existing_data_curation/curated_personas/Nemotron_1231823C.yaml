  career_goals: Although she is not currently employed, Casa seeks to channel her organizational talents into larger community leadership roles. Her primary ambition is to serve on the Calumet County Board
    of Health, where she can advocate for senior services and preventive health programs. She also aspires to launch a small home‑based catering venture specializing in traditional Midwestern comfort foods
    for local events, leveraging her cooking skills and event planning experience. To support these goals, she plans to complete a short certification in senior caregiving and a workshop on small‑business
    accounting. Additionally, Casa hopes to mentor younger women in her community, volunteering as a career‑readiness coach at the Menasha Area High School, helping them develop resume‑writing, interview,
    and budgeting skills.
