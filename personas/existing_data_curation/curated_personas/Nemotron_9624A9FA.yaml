  hobbies: '[''Watercolor painting'', ''Hiking'', ''Local art festivals'', ''Volunteer work at senior center'', ''Community choir'', ''Cooking'', ''Reading mystery novels'', ''Meditation'']'
  career_goals: Looking ahead, Carol hopes to shift from full‑time cleaning to a part‑time training and mentorship role, helping younger staff learn safe and sustainable cleaning practices. She also aspires
    to volunteer as a liaison for the local arts center, organizing workshops that blend her love of art with community outreach. While planning a comfortable retirement, she dreams of launching a modest
    side business selling hand‑crafted watercolor prints and crocheted goods, using her artistic hobby to support local charities.
