  skills: '[''Vehicle cleaning'', ''Heavy equipment maintenance'', ''Eco‑friendly cleaning techniques'', ''Safety compliance'', ''Customer interaction'', ''Team collaboration'', ''Mentoring'', ''Basic sketching'',
