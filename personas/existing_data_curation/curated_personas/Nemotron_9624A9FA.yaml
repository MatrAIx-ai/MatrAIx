personas:
  professional: Carol Doheny, a seasoned vehicle and heavy‑equipment cleaning specialist, blends eco‑friendly cleaning techniques with a natural talent for mentorship, leveraging their curiosity and compassionate
    nature to train younger staff in safe, sustainable practices while occasionally sharing informal watercolor insights at community workshops.
  sports: Carol Doheny embraces outdoor activity through weekly hikes with the Sumpter Trail Club, supports the Portland Timbers and Trail Blazers as a devoted fan, and participates in low‑impact yoga classes
    at the senior center to stay fit and social.
  arts: Carol Doheny, an avid watercolorist and choir member, draws inspiration from Monet’s pastel landscapes, Bob Ross’s happy little trees, and enjoys the vocal harmonies of the Choral Society, often
    incorporating these influences into community art workshops and local festival displays.
  travel: Carol Doheny prefers relaxed road trips to scenic destinations like Crater Lake, Sedona, and the historic town of Bisbee, planning itineraries loosely around local art fairs and hiking opportunities,
    while budgeting modestly to keep travel affordable in retirement.
  culinary: Carol Doheny, a confident home cook, delights in crafting dishes such as wild mushroom risotto with locally sourced foraged mushrooms, seasonal kale salad tossed with goat cheese and pine nuts,
    and fresh sourdough bread, often experimenting with mountain berry jam as a sweet accompaniment.
  core: Carol Doheny is a compassionate, art‑loving cleaning veteran who balances a flexible, worry‑prone nature with a community‑centric spirit, always ready to mentor, paint, or share a homemade meal.
background:
  cultural: Carol comes from a white Irish‑American family that has lived in eastern Oregon for generations. Raised in a small farming community, she grew up with the pioneer values of self‑reliance, hard
    work, and close community ties. Her upbringing was rooted in a Protestant church that emphasized service and cooperation. The Pacific Northwest's natural beauty, the region's mining heritage, and a
    growing awareness of environmental stewardship have all shaped her outlook, fostering a deep respect for the outdoors and a commitment to sustainable practices.
