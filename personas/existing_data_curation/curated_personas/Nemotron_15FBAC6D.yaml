  hobbies: '[''Surfing'', ''Beachcombing'', ''Coastal hiking'', ''Digital photography'', ''Cooking Mexican-Oregon fusion cuisine'', ''Acoustic guitar playing'', ''DIY home projects'', ''Volunteer beach
    clean-ups'', ''Indie music listening'', ''Travel memoir reading'']'
  career_goals: Jose aspires to turn his love for community interaction and the coastal environment into a flexible career. He aims to complete a bachelor's degree in Sustainable Tourism or Hospitality
    Management while gaining certifications in outdoor leadership. His ultimate goal is to launch a small ecotourism venture in Cannon Beach that offers guided surf tours, cultural cooking workshops featuring
    Mexican-Oregon fusion cuisine, and beach-clean-up events. He also envisions becoming a part-time digital content creator, producing videos that showcase local nature, sustainable living tips, and his
    cultural heritage, allowing him to earn income without sacrificing his desire for flexibility and personal growth.
