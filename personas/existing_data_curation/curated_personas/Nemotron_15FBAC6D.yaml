personas:
  professional: Jose Gaviria is an emerging ecotourism venture founder and community events coordinator who merges a modest business administration background — basic accounting, inventory oversight, and
    bilingual customer service — with a talent for digital photography and social media storytelling, leveraging their relaxed yet sociable temperament to design flexible surf tours, mediate group dynamics,
    and promote sustainable coastal experiences.
  sports: Jose Gaviria is a dedicated surfer and weekend hiker who rides the waves with the Cannon Beach Surf Club, follows the Portland Timbers for soccer inspiration, and maintains fitness through sunrise
    beach runs and community yoga sessions, often cheering on the Seattle Seahawks during the fall football season.
  arts: Jose Gaviria channels their creative side through acoustic guitar performances at local festivals, curates sunrise seascape photo exhibitions, and draws inspiration from indie musicians like Phoebe
    Bridgers and Bon Iver, as well as documentary photographer Sebastião Salgado, while actively supporting emerging Pacific Northwest visual artists at city art fairs.
  travel: Jose Gaviria prefers spontaneous, adventure‑focused travel, often packing for a weekend hike in the Columbia River Gorge before catching a bus to Vancouver for urban exploration, has already surfed
    in San Diego and sampled street food in Oaxaca, and dreams of riding waves at Raglan, New Zealand, and trekking Iceland’s volcanic highlands when budget permits.
  culinary: Jose Gaviria is a confident home chef who blends heritage‑inspired flavors into dishes like smoky chipotle‑marinated fish tacos topped with avocado‑lime crema and freshly foraged seaweed, crafts
    handmade corn tortillas served with citrus‑jalapeño ceviche, and hosts potluck gatherings where friends sample his experimental coastal‑fusion creations.
  core: Jose Gaviria thrives on sunrise surf sessions and spontaneous DIY projects, yet habitually misplaces their camera lens cap and rolls the dice on budget plans, balancing a calm, resilient outlook
    with an unstoppable curiosity.
background:
  cultural: Jose grew up in a Mexican-American household where Spanish was spoken daily and family gatherings centered around food, music, and storytelling. He celebrates traditions such as Día de los Muertos,
    quinceañeras, and Mexican Independence Day, often sharing these customs with his Oregon friends. His bilingual ability and deep familiarity with Mexican culinary techniques give him a unique perspective
    that he blends with the Pacific Northwest’s emphasis on sustainability and outdoor recreation. Living in Cannon Beach has broadened his identity, allowing him to incorporate coastal living, environmental
    stewardship, and the inclusive, laid-back Oregon culture into his daily life while staying rooted in the values of community, hospitality, and resilience inherited from his Mexican heritage.
attributes:
  skills: '[''Basic accounting'', ''Inventory management'', ''Customer service'', ''Bilingual Spanish-English communication'', ''Event planning and coordination'', ''Digital photography'', ''Social media
