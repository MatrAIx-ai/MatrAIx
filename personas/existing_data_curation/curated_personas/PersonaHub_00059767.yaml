persona_description: A researcher with a passion for animal welfare, particularly focused on reducing wild animal suffering. This person is highly knowledgeable about the complexities of wild animal welfare
  and has a strong background in ecology, conservation biology, and epidemiology. They have a unique perspective on the importance of having clear, concrete examples of how to improve nature and have a
  deep understanding of the ethical implications of animal intervention. They are currently working on a series of papers that aim to summarize the evidence about a handful of broad areas of intervention
  into wild-animal suffering, and they are actively seeking to expand research into wild-animal suffering.
