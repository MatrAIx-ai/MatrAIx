  sports: Maria Centeno loves the energy of their toddler gymnastics class at the community center while joyfully clapping for the Boston Celtics whenever a game appears on family TV, blending active play
    with professional sports fandom, and they greet each new activity with boundless enthusiasm.
  arts: Maria Centeno, who delights in the soothing strains of Mozart’s Symphony No. 40 and the playful tunes of Disney’s Frozen soundtrack while turning the vivid pages of Eric Carle’s The Very Hungry
    Caterpillar, weaves these artistic experiences into their daily routine, and they express their sociable spirit through animated gestures and humming along.
  travel: Maria Centeno, after a memorable family trip to the San Diego Zoo where they giggled at playful otters and a sunny weekend at Monterey’s sandy beach, now dreams of one day seeing the Eiffel Tower
    in Paris, balancing their curiosity with a preference for calm, familiar settings, and they often point to travel books with bright, inquisitive eyes.
  culinary: Maria Centeno, who adores the smooth taste of sweet‑potato puree seasoned with a pinch of cinnamon and the buttery softness of ripe avocado slices, often attempts self‑feeding with their tiny
    hands, showcasing growing independence and a methodical approach to trying new flavors, and they occasionally make a mess but smile through it.
  core: Maria Centeno, a one‑year‑old bundle of calm curiosity, methodically sorts toys, saves every coin, and greets each new face with boundless energy, all while maintaining an unusually serene disposition,
    and they embody a resilient, organized spirit.
background:
  cultural: Maria is the daughter of Salvadoran immigrants and was raised in Columbus, Ohio, where she is immersed in a bilingual household. At home, she hears Spanish spoken by her parents, celebrates
