persona_description: A semiconductor engineer who specializes in the analysis and testing of IC devices using photon-based and electron beam-based techniques. They have experience with infrared emission
  analysis (IREM) and time-resolved emission analysis (TRE), and are familiar with laser voltage probing and laser-assisted device alteration (LADA) tools. They have a deep understanding of the physical
  principles involved in these techniques, including the electro-absorption effect and the Franz-Keldysh effect. They are skilled in the use of these tools to analyze the functional sensitivity of IC devices
  and to identify timing shifts and rise and fall times. They are also knowledgeable about the impact of laser interaction on the functional state of IC devices.
