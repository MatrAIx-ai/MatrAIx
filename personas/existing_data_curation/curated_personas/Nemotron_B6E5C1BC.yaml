  career_goals: Even at five, Cam dreams big while staying grounded in what he can see and touch. He often talks about becoming a firefighter because he admires the bravery and the practical tools they
    use, and he imagines himself fixing things like a mechanic or a construction engineer, building sturdy things that last. His immediate ambition is to master reading simple sentences and to be able to
    assemble a small model car on his own, seeing these milestones as stepping stones toward his larger goal of solving real‑world problems and helping others.
