personas:
  professional: Cam Petroff, a curious preschool learner, channels their practical side into meticulously assembling LEGO sets while experimenting with simple science kits, showing early organization, flexibility,
    and a competitive edge when building the tallest tower.
  sports: Cam Petroff, a budding soccer enthusiast, plays with the Mini Rockets soccer club on weekends, idolizes the local NBA team the Golden State Warriors, prefers small‑sided games where they can control
    the ball, and competes fiercely for the goalkeeper's medal, often feeling stress if not selected.
  arts: Cam Petroff, a creative spirit, spends afternoons drawing cartoon characters like Mickey Mouse and painting with watercolors, enjoys the music of The Wiggles, and uses art as a calming outlet for
    their frequent worries and competitive curiosity.
  travel: Cam Petroff, an adventurous kid, loves family trips to Disneyland and the coastal aquarium in Monterey, dreams of exploring Tokyo's kid‑friendly attractions, but prefers short, familiar trips
    where they can plan their own itinerary with a printed map, balancing curiosity with the comfort of known surroundings.
  culinary: Cam Petroff, a picky eater with a growing palate, adores mac and cheese, chicken nuggets, and fruit smoothies with strawberries and banana, enjoys helping stir batter for pancakes on weekends,
    but habitually sneaks extra cookies when no one watches, reflecting a competitive streak and occasional impulsivity.
  core: Cam Petroff is a curious, organized five‑year‑old who balances imaginative play with practical routines, competes fiercely in games, worries about small setbacks, and finds solace in LEGO, art,
    and saving pennies.
background:
  cultural: Cam is raised in a white, Southern family in Swainsboro, Georgia, where community ties and family traditions run deep. He attends a local preschool that incorporates elements of Southern culture,
    such as storytime featuring classic folktales and occasional church‑related events. Family gatherings often feature homemade biscuits, fried chicken, and seasonal barbecues, giving Cam a taste for regional
    cuisine. He participates in weekend church school, where he learns simple morals and songs that emphasize respect and kindness. The rural surroundings also expose him to farm life, giving him an early
    appreciation for nature and the rhythms of small‑town life. While his household embraces modern media—educational cartoons and interactive toys—these are balanced with the region's emphasis on hospitality,
    modesty, and a pragmatic approach to everyday tasks.
