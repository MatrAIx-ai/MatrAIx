personas:
  professional: William Wilson is a pragmatic aspiring maintenance specialist whose hands‑on expertise in home repairs, vehicle upkeep, and gardening, combined with his organized, methodical nature, drives
    his pursuit of a vocational apprenticeship in automotive technology or HVAC and fuels his long‑term vision of launching a dependable handyman service for the Prairieville community.
  sports: William Wilson is a devoted fan of the Prairieville High School Bulldogs football team and the New Orleans Saints, plays summer pickup softball with the Prairieville Home‑Grown Softball Club,
    and maintains low‑impact fitness through weekend fishing trips and light jogs that fit his practical schedule.
  arts: William Wilson spends evenings listening to classic country legends like Willie Nelson, Dolly Parton, and George Jones, attends the local church choir’s gospel performances, and occasionally enjoys
    community theater productions of timeless American plays, finding the storytelling rhythm echoing his own structured life.
  travel: William Wilson favors well‑planned road‑trip adventures in his pickup, taking weekend getaways to Gulf Coast spots such as Grand Isle and Bayou Cocodrie State Park for fishing and camping, and
    a occasional cultural escape to New Orleans for music and cuisine, all while budgeting carefully to balance family responsibilities and his future handyman‑van fund.
  culinary: William Wilson enjoys cooking simple yet flavorful meals using garden‑fresh tomatoes, basil, and chili peppers, often preparing grilled chicken thighs seasoned with smoky paprika, homemade salsa,
    and a side of corn on the cob, while also mastering Southern classics like shrimp étouffée and barbecue pork ribs that showcase his solid yet still developing culinary skills.
  core: William Wilson is a methodical, tool‑obsessed handyman‑in‑training who balances frugal budgeting with occasional splurges on premium power tools, never misses a church clean‑up, yet sometimes forgets
    to water their garden when a new project captures their attention.
background:
  cultural: William is a white Southern American who grew up in Prairieville, Louisiana, a rural community in Ascension Parish with strong Cajun and Creole cultural ties. He was raised in a close‑knit,
    predominantly Roman Catholic environment, attending local church services and community celebrations such as the St. John’s Day festival. The region’s emphasis on self‑reliance, hospitality, and community
    support has shaped his practical outlook and cooperative nature.
attributes:
  skills: '["home repairs", "basic plumbing", "electrical troubleshooting", "vehicle maintenance", "budgeting", "scheduling", "gardening", "lawn care", "hand tool operation", "community coordination"]'
  hobbies: '["fishing", "gardening", "country music", "high school football", "DIY home projects", "tool restoration", "church volunteer work"]'
  career_goals: William aims to secure a stable, hands‑on position that leverages his practical skills and reliability. In the short term, he plans to obtain his GED and enroll in a local vocational program
    for automotive technology or HVAC. He hopes to find part‑time work as a maintenance aide for a school, church, or small business, providing a steady income while he builds formal credentials. Long‑term,
    he aspires to start his own handyman service, offering dependable home‑repair and maintenance solutions to the Prairieville community.
