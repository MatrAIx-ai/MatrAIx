personas:
  professional: Thomas Costas, a retired handyman‑turned‑community organizer, applies his carpentry, basic plumbing, and electrical repair expertise to lead the senior garden program, meticulously drafting
    planting calendars, coordinating volunteers, and documenting each renovation step in a detailed journal that doubles as a practical guide for fellow retirees.
  sports: Thomas Costas enjoys early‑morning walks along the Sarasota shoreline, is a devoted member of the Sarasota Fishing Club where they track tidal patterns and log each catch, and follows the Tampa
    Bay Buccaneers and Tampa Bay Rays, occasionally joining a senior walking group that meets for low‑impact cardio sessions at the local park.
  arts: Thomas Costas finds creative fulfillment in woodworking, drawing inspiration from the clean lines of mid‑century modern designers like Charles and Ray Eames, while also indulging in classic mystery
    novels by Agatha Christie, listening to Frank Sinatra’s big band recordings, and attending quarterly performances at the Sarasota Opera House.
  travel: Thomas Costas plans travel with the same calendar rigor he applies to his garden, having already explored the Florida Keys and New England’s fall foliage on self‑driven road trips, and now they
    are orchestrating a six‑week itinerary to historic coastal towns along the Iberian Peninsula, balancing museum visits, local market tours, and leisurely fishing excursions while adhering to a fixed
    budget and a tight daily schedule.
  culinary: Thomas Costas prefers farm‑to‑table meals, skillfully preparing dishes like grilled snapper with lemon‑dill butter, roasted vegetable ratatouille featuring tomatoes, zucchini, and bell peppers
    from their garden, and hearty split‑pea soup seasoned with smoked ham, while they occasionally experiment with homemade sourdough bread, but they are notorious for forgetting to season dishes until
    after tasting.
  core: Thomas Costas blends a lifelong love of order with a quiet reverence for nature, turning every garden row, fishing log, and woodworking project into a meticulously documented testament to their
    methodical spirit, though they often forget to water indoor plants amid their busy schedule.
background:
  cultural: Thomas is a white American whose family heritage blends Anglo‑American roots with a touch of Mediterranean ancestry from his paternal side (the Costas surname reflects Portuguese origins). He
    grew up in central Florida during the 1960s and 70s, absorbing the region's laid‑back, community‑oriented culture while also celebrating family traditions such as a Christmas Eve seafood feast brought
    from his father's side. In Sarasota, he participates in local festivals that showcase Florida's diverse cultural tapestry, yet he maintains personal customs, like observing Thanksgiving with a structured
    menu planning routine. His upbringing in a modest, working‑class household fostered a practical, self‑reliant ethos that continues to inform his daily life.
attributes:
  skills: '[''Carpentry'', ''Basic Plumbing'', ''Simple Electrical Repairs'', ''Garden Landscaping'', ''Home Maintenance'', ''Budget Planning'', ''Event Coordination'', ''Volunteer Management'', ''First
    Aid Certified'', ''Water Safety'', ''Fishing Techniques'']'
  hobbies: '[''Gardening'', ''Fishing'', ''Woodworking'', ''Volunteerism at local library'', ''Historical non‑fiction reading'', ''Beach walking'', ''Bridge card games'', ''Classic rock music listening'']'
  career_goals: Although officially retired, Thomas aims to channel his structured mindset into community leadership and personal projects. He plans to expand the local senior‑garden program by designing
    a systematic planting calendar and mentoring younger volunteers in reliable maintenance practices. He also aspires to complete a full home‑renovation of his guest cottage, documenting each step in a
    detailed journal that could serve as a guide for fellow retirees. A long‑standing ambition is to travel to his paternal family's roots in Portugal, organizing the trip with a precise itinerary that
    balances cultural exploration with his love of predictable schedules.
