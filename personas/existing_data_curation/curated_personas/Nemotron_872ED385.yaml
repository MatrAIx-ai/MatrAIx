  career_goals: Approaching retirement, Peter aims to transition from full‑time labor to a part‑time handyman service that lets him stay active while honoring his need for routine. He hopes to mentor apprentices
    in his community, preserve the craftsmanship of older building techniques, and ensure a stable income to support his wife’s medical needs. He also wishes to volunteer on local historic‑preservation
    projects, contributing his practical knowledge to maintain the town’s heritage.
