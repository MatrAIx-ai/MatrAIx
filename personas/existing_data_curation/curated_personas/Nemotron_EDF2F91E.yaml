personas:
  professional: Jennifer Reid is an organized aspiring community arts coordinator who leverages her strong planning skills and basic graphic design expertise to prototype mural projects, manage volunteer
    teams, and create social media content that bridges English and Spanish speakers in her hometown.
  sports: Jennifer Reid follows the Fresno State Bulldogs and the LA Dodgers, plays pick‑up volleyball at the community recreation center, hikes the Sierra foothills with the Sierra Vista Hikers club on
    weekends, and practices yoga twice a week to stay flexible and balanced.
  arts: Jennifer Reid immerses themselves in watercolor and acrylic painting of farm landscapes, draws inspiration from artists like David Hockney and Frida Kahlo, captures street moments with a Canon EOS
    in the style of documentary photographer Dorothea Lange, curates weekly visits to the Fresno Art Museum, and fills playlists with indie acts such as Bon Iver and experimental producer Aphex Twin.
  travel: Jennifer Reid prefers budget-friendly road trips, often driving to Yosemite and Sequoia National Parks for weekend hikes, has a wish list that includes Oaxaca, Mexico for its vibrant murals, and
    carefully plans each journey using a spreadsheet to balance time, cost, and artistic inspiration.
  culinary: Jennifer Reid enjoys experimenting with Californian‑Mexican fusion dishes like grilled fish tacos with avocado‑cilantro salsa and roasted corn elote, bakes churro‑style cinnamon‑sugar doughnuts,
    and proudly lists avocados, tomatillos, and fresh coriander as staple ingredients in their modestly skilled kitchen.
  core: Jennifer Reid is a curiosity‑driven, meticulously organized 23‑year‑old who blends art and community service, occasionally over‑schedules their calendar, and can’t resist a late‑night indie vinyl
    while sketching in a coffee shop.
background:
  cultural: Jennifer grew up in Parlier, a small agricultural town in Fresno County characterized by a blend of Anglo-American and Hispanic cultures. Her family has roots in the Central Valley farming community,
    instilling values of hard work, self‑reliance, and community cooperation. Daily life exposed her to bilingual interactions, regional celebrations like the Fresno County Fair and local fiestas, and a
    strong sense of neighborhood solidarity. While she identifies as white, she embraces the cultural mosaic of her environment, appreciating Mexican culinary traditions, Spanish language, and the collective
    spirit of farmworkers and artisans that shape the social fabric of her hometown.
attributes:
  skills: '[''Organizational planning and time management'', ''Project coordination for community events'', ''Basic graphic design (Canva, Photoshop)'', ''Digital photography and composition'', ''Drawing
    and painting (acrylic, watercolor)'', ''Bilingual communication (English-Spanish)'', ''Social media content creation and curation'', ''Volunteer management and outreach'']'
  hobbies: '[''Painting (watercolor, acrylic)'', ''Sketching'', ''Digital photography (street/documentary)'', ''Creative writing and poetry'', ''Reading contemporary literature'', ''Visiting local galleries
    and museums'', ''Volunteering at community garden'', ''Learning conversational Spanish'', ''Cooking and baking fusion dishes'', ''Listening to indie/experimental music'']'
  career_goals: Jennifer aims to enroll in a local community college to earn an associate's degree in visual arts or graphic design, followed by a transfer to a university for a bachelor's in art history
    or creative media. She aspires to become a community arts coordinator, designing programs that bring together diverse residents through collaborative murals, pop‑up galleries, and cultural festivals.
    Long‑term, she envisions opening a modest studio space that doubles as a co‑working hub for local artists, offering workshops, exhibitions, and mentorship opportunities. She also hopes to build a robust
    freelance portfolio to secure sustainable work in graphic design and digital content creation.
