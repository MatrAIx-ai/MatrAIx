persona_description: A geographer who is interested in the study of spherical trigonometry and its applications in navigation and mapping. They are familiar with the formulas and methods used to calculate
  great circle distances and bearings between two points on the surface of a sphere, including the WGS 1984 parameters for the earth's equatorial radius and ellipsoid flattening. They may also be interested
  in the historical context and development of spherical trigonometry, as well as its practical applications in various fields such as astronomy, navigation, and geography.
