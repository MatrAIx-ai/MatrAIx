personas:
  professional: Jason Hughes, a 16‑year‑old aspiring HVAC apprentice, blends his knack for meticulous organization with a hands‑on DIY background—including basic automotive maintenance, woodworking, and
    model kit construction—to excel in structured, goal‑oriented projects as he prepares for his GED and future trade certification in Arizona.
  sports: Jason Hughes enjoys hiking desert trails with family on weekends, follows the Arizona Cardinals, Phoenix Suns, and Arizona Diamondbacks avidly, and plays pickup basketball at the local community
    center using a structured circuit‑training approach that aligns with their love for clear goals and predictable progress.
  arts: Jason Hughes finds creative release in listening to alternative rock bands like The Strokes and classic pop icons such as The Beatles, often having these tracks play while assembling model kits,
    and they occasionally sketch mechanical diagrams inspired by automotive manuals, blending technical precision with artistic expression.
  travel: Jason Hughes prefers low‑key road trips that combine practical sightseeing with quiet moments, has explored the Grand Canyon and Saguaro National Park, and dreams of a future visit to Seattle
    to tour tech museums and attend a live Foo Fighters concert.
  culinary: Jason Hughes's culinary preferences lean toward simple, protein‑rich meals such as grilled chicken tacos with cilantro and lime, homemade spaghetti Bolognese using ground beef and tomato sauce,
    and they have a budding skill in assembling DIY snack kits featuring trail mix and beef jerky.
  core: Jason Hughes is a methodical teen who channels a relentless checklist habit into model building, DIY repairs, and disciplined savings, yet occasionally procrastinates on schoolwork and forgets to
    take allergy meds when distracted.
background:
  cultural: Jason is a White American raised in the suburban community of Gilbert, Arizona, a region characterized by a middle‑class, family‑oriented lifestyle and strong ties to Southwestern culture. The
    local environment emphasizes self‑reliance, practicality, and community involvement through schools, churches, and youth programs. He grew up celebrating mainstream American holidays such as Thanksgiving
    and the Fourth of July, while also being exposed to the diverse cultural mosaic of the Phoenix metro area. His upbringing reflects a blend of traditional American family values, an appreciation for
    the desert landscape, and a practical work ethic that aligns with his preference for routine and predictability.
attributes:
  skills: '["Basic computer literacy", "DIY home repair", "Basic automotive maintenance", "Organizational planning", "Time management"]'
  hobbies: '["Model kit building", "Strategy video gaming", "Non‑fiction reading (practical topics)", "Listening to alternative rock music", "Board game nights with close friends", "Hiking desert trails"]'
  career_goals: Jason aims to obtain his GED within the next two years and then enroll in a trade apprenticeship program, preferably in HVAC or electrical work, where the work is structured, hands‑on, and
    in demand in the Arizona market. He values a clear career path that offers predictable schedules and reliable income, allowing him to support himself and his family. In the longer term he hopes to earn
    industry certifications, become a journeyman technician, and eventually supervise small teams, combining his reliable nature with modest leadership responsibilities.
