personas:
  professional: Carlos Hernandez is a teenage digital sketcher and budding multimedia creator who blends street-photography aesthetics with traditional papel picado motifs, leveraging their bilingual fluency
    to collaborate on community mural projects while still navigating the typical high-school workload with a relaxed, sometimes disorganized approach.
  sports: Carlos Hernandez is a regular at the Tucson Skate Club, spends afternoons perfecting ollies and custom board graphics at the local skate park, supports the Arizona Diamondbacks and Phoenix Suns,
    and occasionally joins pickup soccer games at the community center, reflecting a competitive yet solitary approach to physical activity.
  arts: Carlos Hernandez channels their curiosity into digital sketches, mixed-media collages that incorporate papel picado patterns, and street-photography that captures the desert’s cacti silhouettes,
    while collaborating on mural projects inspired by artists like Frida Kahlo, local street-artist "Sparky," and the lo-fi beats of Tomppabeats, which together shape their creative identity.
  travel: Carlos Hernandez prefers spontaneous road trips to nearby desert oases such as Saguaro National Park and Sunday drives to the border town of Nogales, while dreaming of a future backpacking adventure
    through Oaxaca’s spice markets and the murals of Mexico City, balancing their love for exploration with the constraints of a high-school schedule and a modest teen budget.
  culinary: Carlos Hernandez loves cooking tacos de asada with homemade salsa, hand-rolled tamales seasoned with mole, and experimenting with fusion dishes like pineapple-infused guacamole, often adding
    fresh cilantro, jalapeño, and a dash of lime, while their skill level ranges from confidently grilling meat to occasionally burning a tortilla in the skillet.
  core: Carlos Hernandez is a curious, competitive teen who blends digital art and skateboarding, devours Mexican flavors, roams the desert for inspiration, and navigates life with a laid-back, sometimes
    disorganized vibe and a healthy dose of skepticism.
background:
  cultural: Carlos grew up in a Mexican‑American household in east Tucson, where Spanish was spoken at home and English at school. His family celebrates traditions such as Día de los Muertos, posadas, and
    shared meals featuring tacos, tamales, and mole, which rooted his appreciation for Mexican cuisine and folklore. The surrounding Sonoran desert and the proximity to the U.S.–Mexico border exposed him
    to a blend of Mexican, Indigenous (Tohono O'odham), and Southwestern American cultural influences. He participates in local community events at Centro Tucson, the All Souls Procession, and neighborhood
    mural festivals, where he encounters both traditional Mexican folk art (e.g., papel picado, alebrijes) and contemporary street art. This multicultural environment nurtures his curiosity for art, fuels
    his bilingual communication, and shapes his desire to merge heritage motifs with modern creative expression.
attributes:
  skills: '[''digital illustration'', ''mixed‑media art'', ''basic video editing'', ''bilingual communication (English/Spanish)'', ''basic electronics tinkering'', ''skateboard repair and customization'',
    ''street‑level photography'']'
  hobbies: '[''digital sketching'', ''mixed‑media collages'', ''street and desert photography'', ''skateboarding'', ''exploring desert trails'', ''competitive video gaming'', ''listening to music (traditional
    Mexican, alternative rock, lo‑fi)'', ''cooking Mexican dishes'', ''small‑group mural projects'', ''attending cultural festivals'']'
  career_goals: Looking ahead, Carlos aims to formalize his artistic talents by pursuing a graphic‑design or visual‑arts program at a community college or vocational institute, building a professional portfolio
    that showcases his unique fusion of Mexican cultural imagery and contemporary digital styles. He dreams of working freelance as a visual artist, creating album covers, street murals, and branding for
    local businesses, while also launching a bilingual YouTube channel that offers tutorials and behind‑the‑scenes looks at his creative process. Competitive by nature, he plans to enter regional art contests
    and seek a youth artist residency, using those opportunities to refine his craft and gain recognition. In parallel, he is interested in exploring culinary entrepreneurship centered on modern Mexican
    street food, envisioning a pop‑up kitchen that merges his love for cooking with his visual branding skills.
