personas:
  professional: An experienced community art curator and senior museum advisor, Angela Preudhomme leverages her meticulous research skills, skeptical eye for authenticity, and outgoing nature to mentor
    emerging artists, orchestrate intergenerational exhibitions, and secure funding for a scholarship fund for local high‑school visual‑arts students.
  sports: A devoted fan of the Carolina Panthers and Charlotte Hornets, Angela Preudhomme joins the local walking club that meets at Fairview Park to keep fit, occasionally attends minor‑league baseball
    games at the Rock Hill Baseball Club, and enjoys friendly bridge competitions that double as mental aerobics for her sharp mind.
  arts: Enthralled by the works of Georgia O'Keeffe, local folk painter Mae DePriest, and the theatrical productions of the Rock Hill Community Theatre, Angela Preudhomme regularly attends gallery openings
    at the Harbor Art Space, volunteers backstage for musicals, and spends weekends painting watercolors of historic homes, always critiquing pieces with a skeptical yet appreciative eye.
  travel: An avid explorer of Southern heritage sites, Angela Preudhomme has toured historic Savannah, the battlefields of Gettysburg, and the preserved plantations of Natchez, and dreams of a future visit
    to the art museums of Florence and the gardens of Provence, planning each trip with careful budgeting and a preference for guided, educational tours.
  culinary: A lover of classic Southern fare, Angela Preudhomme delights in cooking shrimp and grits with a dash of smoked paprika, hand‑picking heirloom tomatoes for a fresh garden salad, and experimenting
    with jambalaya that balances Cajun spices, while occasionally indulging in a slice of pecan pie despite a self‑imposed limit on sugary desserts.
  core: Angela Preudhomme, a lively 78‑year‑old arts advocate, balances a competitive drive for excellence with a warm, community‑focused spirit, never missing a bridge game, a watercolor session, or an
    opportunity to mentor the next generation.
background:
  cultural: Angela was raised in mid‑20th century South Carolina, inheriting the region’s values of hospitality, community involvement, and respect for tradition. Though her ancestry includes German‑French
    roots reflected in her surname, she identifies most strongly with the Southern cultural fabric—church gatherings, Southern cuisine, and local historic societies. Over the decades, her curiosity and
    openness to new ideas have led her to embrace broader artistic and intellectual influences, blending her heritage with a progressive appreciation for diverse cultural experiences.
attributes:
  skills: '["Art history knowledge", "Exhibition curation", "Community event planning", "Mentorship and coaching", "Critical analysis", "Digital communication", "Volunteer coordination", "Genealogy research",
