  hobbies: '["Visiting art galleries and museums", "Watercolor painting", "Reading contemporary fiction", "Playing bridge", "Gardening", "Cooking Southern cuisine", "Traveling to historic sites", "Volunteering
    at community theater", "Taking ballroom dance classes", "Participating in local walking groups"]'
  career_goals: Even in retirement, Angela aims to leave a lasting cultural legacy in Rock Hill. She plans to establish a small scholarship fund for local high‑school students interested in the visual arts,
    author a memoir that intertwines her personal history with the region’s artistic evolution, and launch an intergenerational art‑making program that pairs seniors with youth. She also aspires to serve
    as a senior advisor for the Rock Hill Museum, ensuring that community voices shape future exhibitions and educational initiatives.
