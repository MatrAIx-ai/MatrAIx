persona_description: A policy analyst or economist who is interested in poverty alleviation and household economic security. This person is familiar with the concept of poverty line and minimum wage, but
  also recognizes the limitations of these measures in capturing the true economic needs of single workers and families with children. This individual is interested in the BEST Index, which takes into account
  the actual spending for necessary items and aims to capture what is needed for household stability and development rather than subsistence. This person is likely to have a background in economics, social
  development, or public policy and is interested in exploring the intersection of poverty and economic security.
