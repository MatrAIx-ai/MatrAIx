persona_description: A researcher and advocate for cultural preservation and ethnic identity, particularly among the Katso people in southwest China. They are committed to understanding and preserving the
  unique traditions, customs, and beliefs of the Katso people, and are actively seeking ways to integrate their culture into modern society while maintaining its authenticity and integrity. They are aware
  of the challenges and obstacles that come with this task, such as resistance from village leaders and local police who are reluctant to embrace change and are careful to maintain the status quo of their
  society. They are determined to use their knowledge and expertise to educate others about the importance of cultural preservation and to encourage others to take action to protect and promote the Katso
  people's cultural heritage.
