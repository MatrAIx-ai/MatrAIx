    User 2: Oh, that sounds interesting. What does that entail?

    User 1: I work with the media and other government agencies to communicate the National Guard''s mission and activities.

    User 2: That sounds like a lot of work.

    User 1: It can be, but it''s also very rewarding.

    User 2: I''m sure it is. What do you like to do for fun?

    User 1: I love to go skiing and snowboarding.

    User 2: Me too! I used to do it all the time when I lived in Hawaii.

    User 1: That''s awesome. I''m not as good as I used to be, but I still enjoy it.

    User 2: Me too. I miss it so much.

    User 1: Maybe we should go skiing together sometime.

    User 2: That would be so much fun! I would love that.'
