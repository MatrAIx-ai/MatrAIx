  career_goals: Looking ahead, Darbey aims to transition from full‑time analysis to a part‑time consultancy role where he can mentor emerging IT professionals and provide strategic guidance to local non‑profits
    and small businesses. He is also interested in teaching introductory computer systems courses at the community college level, leveraging his practical experience while maintaining the flexibility he
    values. Ultimately, he hopes to leave a legacy of improved tech literacy and collaborative work culture in his community, all while preserving a balanced, low‑stress lifestyle as he approaches retirement.
