  hobbies: '[''Visiting art galleries and museums'', ''Pottery and ceramics'', ''Digital collage and photo editing'', ''Traditional Vietnamese cooking'', ''Reading contemporary fiction'', ''Journaling and
    reflective writing'', ''Nature walks in local parks'', ''Yoga and mindfulness practices'', ''Community volunteer event planning'', ''Gardening'']'
  career_goals: Amber aspires to transform her extensive organizational experience into a part‑time role as a community center coordinator or event planner, focusing on cultural celebrations and arts programs.
    She is exploring certification courses in event management and interior design to broaden her professional toolkit. Additionally, she dreams of launching a home‑based boutique that sells handcrafted
    home décor and custom‑made textiles inspired by her Southeast Asian heritage. By pursuing online courses in project management and mindfulness, she aims to enhance her resilience to stress while building
    a sustainable small business that blends her artistic interests with her disciplined work ethic.
