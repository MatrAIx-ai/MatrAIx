personas:
  professional: Joseph Bledsoe, a full‑stack software engineer who blends business acumen with meticulous Agile practice, channels his love for structured teamwork into leading feature squads, crafting
    robust APIs on AWS, and mentoring junior developers while keeping a keen eye on product‑market fit.
  sports: Joseph Bledsoe, an avid intramural basketball player for the Bloomington Trailblazers and a regular hiker with the Hoosier Outdoor Club, roots for the Indiana Hoosiers men’s basketball team and
    the Indianapolis Colts, and mixes weekly cardio runs with weekend forest treks to balance competition and camaraderie.
  arts: Joseph Bledsoe, a board‑game enthusiast who curates nightly playlists featuring The Lumineers, Sufjan Stevens, and Fleet Foxes, regularly attends Bloomington’s local theater productions and art
    gallery openings, and draws narrative inspiration from Dungeons & Dragons sessions to fuel his creative problem‑solving.
  travel: Joseph Bledsoe, a weekend explorer who prefers meticulously planned road trips to Chicago’s craft‑brew festivals and overnight hikes in the Great Smoky Mountains, dreams of backpacking the New Zealand
    South Island’s trails, and balances his wanderlust with a modest travel budget that prioritizes nature and culinary experiences.
  culinary: Joseph Bledsoe, a self‑taught cook of Midwestern comfort fare, frequently whips up chicken‑fried steak with buttery mashed potatoes, caramelized corn pudding, and jalapeño cheese curds, experimenting
    with locally sourced dairy and seasonal vegetables while pairing dishes with his favorite Indiana‑brewed amber ales.
  core: Joseph Bledsoe, a structured yet socially charged 27‑year‑old who channels his anxiety into disciplined coding, relentless board‑game nights, and weekend hikes, all while obsessively tracking budgets
    and brewing the perfect cheese curd.
background:
  cultural: Joseph grew up in a middle‑class white family in central Indiana, absorbing Midwestern values of community, reliability, and modesty. His upbringing emphasized practicality, hard work, and a
    friendly, cooperative spirit. He celebrates traditional holidays like Thanksgiving and Fourth of July with extended family, often sharing home‑cooked meals and local customs. The proximity to Indiana
    University exposed him to a vibrant, youthful culture, fostering an appreciation for collegiate sports (particularly IU Hoosiers basketball) and academic ambition. While rooted in mainstream American
    culture, Joseph also respects the regional emphasis on modesty and down‑to‑earth networking, which shapes his collaborative approach in both personal and professional realms.
attributes:
  skills: '[''Python'', ''Java'', ''JavaScript'', ''React'', ''Node.js'', ''Spring'', ''SQL'', ''REST API design'', ''AWS cloud services'', ''Agile Scrum'', ''JIRA'', ''Confluence'', ''Test‑Driven Development
    (TDD)'', ''Continuous Integration/Continuous Deployment (CI/CD)'', ''Business Analysis'', ''Data Visualization'', ''Version Control (Git)'']'
  hobbies: '[''Intramural basketball'', ''Board game nights (Settlers of Catan, Dungeons & Dragons)'', ''Hiking in Hoosier National Forest'', ''Craft brewery tastings and tours'', ''Volunteering at Monroe
    County Food Bank'', ''Bloomington Python meetup participation'', ''Cooking Midwestern recipes'', ''Curating personal music playlists'']'
  career_goals: In the next two to three years, Joseph aims to advance to a senior software engineer role where he can lead larger feature teams and mentor junior developers. He plans to obtain AWS Solutions
    Architect certification and deepen his knowledge of micro‑services architecture. Long‑term, he envisions moving into an engineering‑manager or product‑lead position that leverages his business education,
    allowing him to shape product strategy and drive market‑focused technology initiatives. Ultimately, Joseph hopes to launch a SaaS startup that helps small Midwestern retailers integrate inventory management
    with e‑commerce platforms, combining his technical expertise with his passion for pragmatic business solutions. Throughout his trajectory, he seeks a work environment that emphasizes clear processes,
    psychological safety, and a healthy work‑life balance to mitigate his tendency toward stress and worry.
