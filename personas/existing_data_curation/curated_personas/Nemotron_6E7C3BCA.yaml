  career_goals: Osvaldo aims to graduate high school with strong grades in math and science, earn a scholarship to study civil engineering or urban planning, and eventually work on projects that improve
    public spaces and infrastructure in his community, especially for immigrant families. He also hopes to stay involved in youth soccer as a coach or mentor, using his leadership skills to give back to
    the same programs that helped shape his confidence and teamwork.
