personas:
  professional: Osvaldo Antigua is an aspiring eSports team captain and youth soccer midfielder who leverages his natural sociability, love for structured teamwork, and flexible approach to practice schedules
    to lead peers in both virtual and real‑world matches, while still juggling a laid‑back attitude toward obligations.
  sports: Osvaldo Antigua plays midfield for the downtown youth soccer league, cheers for the Los Angeles Galaxy and the Los Angeles Lakers, spends Saturdays skateboarding at the local skatepark with his
    crew, and follows a loosely structured training routine that blends scheduled drills with spontaneous street sessions.
  arts: Osvaldo Antigua strums the guitar to folk tunes and pop hits from Bad Bunny, J Balvin, and Ed Sheeran, sketches vibrant comic‑style illustrations inspired by Marvel heroes, and dances cumbia and
    reggaeton at family gatherings, channeling his outgoing energy into creative expression.
  travel: Osvaldo Antigua loves weekend day trips to nearby beaches and mountain parks, dreams of exploring the ancient ruins of Tikal and the street‑food markets of Mexico City, but his family’s budget
    constraints keep his long‑haul travel aspirations limited to summer camps and occasional road trips.
  culinary: Osvaldo Antigua enjoys helping his family prepare pupusas filled with cheese and loroco, spicy black‑bean soup, and fried plantains, has a modest cooking skill level that lets him whip up a
    decent taco night, and always sneaks a bite of salsa before the plate hits the table.
  core: Osvaldo Antigua is a hyper‑social teen who juggles soccer, gaming, guitar, and sketching, often forgets to finish homework, and can’t resist splurging on the latest sneaker drop.
background:
  cultural: Osvaldo comes from a first‑generation Salvadoran family that settled in Springfield. At home, Spanish is the primary language, and family meals often feature pupusas, tamales, and yuca frita.
    His family maintains Catholic traditions, attending mass on Sundays and celebrating Salvadoran holidays such as Día de la Independencia (September 15) and the Feast of San Salvador with music, dance,
    and community gatherings. Growing up in the Midwest, he blends Salvadoran customs with American school life, acting as a cultural bridge for peers who are curious about his heritage.
