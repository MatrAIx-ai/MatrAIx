personas:
  professional: Jonathan Ricker, a senior market research advisor with four decades of expertise in quantitative and qualitative studies, they bring a meticulous data-driven approach using SPSS, SAS, R,
    and advanced Excel, combined with a healthy dose of skepticism, to deliver strategic insights to Southeast firms while mentoring emerging analysts.
  sports: Jonathan Ricker, a devoted fan of the South Carolina Gamecocks football team and the Charleston Battery soccer club, they keep fit by walking historic Summerville neighborhoods with a senior group,
    occasionally joining a Saturday sunrise golf round at the local country club, and they cheer enthusiastically at the occasional springtime college baseball game.
  arts: Jonathan Ricker, an avid patron of the Charleston jazz scene who regularly attends performances featuring the Charleston Jazz Orchestra and saxophonist Wynton Marsalis, they also immerse themselves
    in Civil War biographies and enjoy occasional community theater productions of classic Southern plays.
  travel: Jonathan Ricker, an enthusiastic road traveler who prefers carefully planned itineraries to historic destinations, they often drive the scenic Blue Ridge Parkway to Asheville for a weekend hike,
    revisit the battlefields of Gettysburg for research inspiration, and cherish annual family trips to the coastal charm of Savannah and Myrtle Beach, balancing adventure with the comfort of familiar Southern
    hospitality.
  culinary: Jonathan Ricker, a passionate home grill master who specializes in hickory‑smoked pulled pork, collard greens, shrimp and grits, and peach cobbler, they skillfully incorporate garden‑fresh tomatoes
    and sweet potatoes into meals, host frequent barbecues for neighbors, and modestly claim their BBQ technique is superior despite occasional over‑salting of brine.
  core: Jonathan Ricker, a methodical yet sociable septuagenarian who blends Southern hospitality with a competitive streak in bridge and market research, they meticulously schedule every activity while
    secretly hoarding spare bridge cards for future games.
background:
  cultural: Raised in a middle‑class white family in the upstate of South Carolina during the 1950s and ’60s, Jonathan’s cultural identity is rooted in Southern hospitality, community service, and a strong
    Methodist faith. He attended a public high school in Charleston before earning a B.A. in Business from the University of South Carolina. His upbringing emphasized respect for tradition, a work‑ethic
    grounded in practicality, and a deep connection to the local community, values that continue to shape his personal and professional interactions.
attributes:
  skills: '[''Market Research Design'', ''Quantitative & Qualitative Analysis'', ''Statistical Software (SPSS, SAS, R, Excel)'', ''Survey Development'', ''Data Visualization'', ''Strategic Planning'', ''Competitive
    Analysis'', ''Project Management'', ''Stakeholder Communication'', ''Team Leadership'', ''Mentoring'']'
  hobbies: '[''Bridge Club'', ''Walking Group'', ''Gardening'', ''Southern Cooking'', ''Barbecue Hosting'', ''Historic District Docent'', ''Reading Civil War History'', ''Local Politics'', ''Jazz Concerts'']'
  career_goals: Approaching retirement, Jonathan aims to transition into a senior advisory role where he can mentor the next generation of analysts while still shaping high‑impact market strategies for
    regional firms. He aspires to lead a thought‑leadership series on consumer behavior trends in the Southeast, publish a handbook on rigorous market research practices, and serve on a local economic development
    board to help attract new businesses to Berkeley County. He also envisions consulting part‑time post‑retirement, offering strategic insights to nonprofit organizations and small businesses that need
    data‑driven guidance.
