  career_goals: Allen aspires to a career that blends his love for people, hands‑on problem solving, and a stable, structured environment. In the short term, he plans to graduate high school with a focus
    on engineering or community service courses and to earn a certification in automotive or mechanical technology. He dreams of eventually designing and building RV components or musical instruments at
    a local manufacturing plant, leveraging his model‑building skills. At the same time, he is interested in becoming a youth coach or mentor—perhaps a basketball coach or a community outreach coordinator—where
    he can use his sociable nature and conflict‑resolution strengths. He envisions attending a technical college or university that offers both engineering labs and opportunities for leadership development,
    and he is open to serving in the local police or fire department after gaining further experience, valuing the clear training pathways they provide.
