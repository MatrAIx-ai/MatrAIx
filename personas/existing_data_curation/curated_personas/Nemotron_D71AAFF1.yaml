personas:
  professional: Allen Stillwell, a 14‑year‑old high‑school sophomore who organizes school‑wide events and leads the town‑library storytelling program, leverages his practical, structured mindset and outgoing,
    cooperative nature to keep projects on track despite his habit of last‑minute planning.
  sports: Allen Stillwell, a 14‑year‑old point‑guard on the Northwest Elkhart County community center basketball squad, avidly follows the Indiana Pacers and the Hoosiers during March Madness, and caps
    his active weeks with weekend hikes along the Grand Elk Trail.
  arts: Allen Stillwell shines as the lead trumpeter in his school’s marching band, rehearsing John Philip Sousa marches and modern pop renditions by Taylor Swift, while off‑stage he scripts and edits short
    comedy sketches inspired by the YouTube duo Key & Peele, blending musical discipline with a playful, collaborative creative streak.
  travel: Allen Stillwell favors spontaneous road trips with his friends, having already explored the Chicago Museum of Science and Industry and the nearby Indiana Dunes, while dreaming of a future group
    adventure to Washington, D.C.'s Smithsonian Museums, balancing modest allowances with a love for on‑the‑fly itineraries.
  culinary: Allen Stillwell enjoys the comforting trio of pepperoni, mozzarella, and fresh basil on his favorite slice of New York‑style pizza, flips chicken nuggets on the stovetop, and occasionally tackles
    a batch of oat‑filled chocolate chip cookies with dark chocolate chips and a sprinkle of sea salt, though his busy schedule often leads to late‑night snack runs.
  core: Allen Stillwell is a sociable, structure‑loving teen who juggles basketball, band, model building, and comedy sketches, balancing a laid‑back approach to obligations with a strong drive for group
    harmony and hands‑on creativity.
background:
  cultural: Allen is a White Midwestern American raised in Elkhart, Indiana, a city known for its RV and musical‑instrument manufacturing heritage. His family shares typical small‑town values rooted in
    a mix of Protestant and Catholic traditions, emphasizing community involvement, modesty, and a strong work ethic. He grew up attending local church events, school sports games, and the Elkhart County
    Fair, fostering a sense of belonging. The region’s emphasis on teamwork, practical skill‑building, and friendly, supportive neighborhoods influences his outlook. He celebrates holidays such as Independence
    Day with fireworks and barbecues, and he values the seasonal rhythms of Midwestern life, from crisp autumn fairs to winter community gatherings.
