personas:
  professional: Maria Rivas, a retired home chef and community steward, leverages decades of culinary expertise, meticulous budgeting, and bilingual translation skills to quietly support fellow seniors,
    applying their routine‑driven, critical eye to every volunteer cooking lesson and budget ledger.
  sports: Maria Rivas follows the Los Angeles Dodgers and the LA Lakers with devoted regularity, participates in the Pasadena Senior Strollers walking club for low‑impact cardio, and maintains a quiet,
    solitary routine of morning garden strolls rather than team sports, embodying their preference for routine and solitary activity.
  arts: Maria Rivas listens to traditional folk groups like Los Hermanos Flores and enjoys the black‑and‑white cinema of Cary Grant and Grace Kelly, finding comfort in the predictable cadence of familiar
    melodies and classic Hollywood dialogue that aligns with their routine‑oriented, emotionally attuned nature.
  travel: Maria Rivas prefers carefully planned, low‑stress trips such as a nostalgic weekend visit to Santa Barbara’s historic Mission district and a meticulously arranged pilgrimage to a family’s hometown
    in central Mexico, favoring familiar routes and group tours that minimize anxiety and match their routine‑driven comfort.
  culinary: Maria Rivas, an accomplished home chef, meticulously crafts pupusas with hand‑pressed masa, aromatic cilantro‑infused curtido, and a secret hint of roasted chaya leaves, treating each dish as
    both a comforting routine and a subtle canvas for quiet culinary exploration.
  core: Maria Rivas is a 91‑year‑old solitary caretaker of tradition, channeling routine, critical precision, and an undercurrent of anxiety into a life of meticulous cooking, budgeting, and quiet community
    service, while hoarding old grocery receipts as a secret comfort.
background:
  cultural: Maria was born in a small rural village in El Salvador and moved to the United States as a teenager during the early 1960s, joining a wave of Salvadoran immigrants seeking work in Southern California.
    Holding tightly to her Catholic faith, she celebrates major Salvadoran holidays such as Día de los Niños and the Feast of Saint John, often preparing festive foods for community gatherings. Spanish
    remains her primary language at home, and she incorporates Salvadoran customs—like sharing pupusas with family and neighbors—into her daily life in Pasadena. Though she never married, Maria maintains
    close ties with a network of fellow Salvadoran seniors, exchanging recipes, stories, and support. Her cultural identity informs her values of practicality, self‑reliance, and the importance of preserving
    familial traditions for future generations.
attributes:
  skills: '[''Traditional Salvadoran cooking'', ''Household budgeting and record‑keeping'', ''Sewing and textile repair'', ''Small‑scale herb gardening'', ''Bilingual Spanish‑English communication'', ''Critical
