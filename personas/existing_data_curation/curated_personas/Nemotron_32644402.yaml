  hobbies: '[''Traditional cooking for herself'', ''Herb gardening'', ''Knitting and crocheting'', ''Listening to Salvadoran folk music and classic films'', ''Crossword puzzles, Sudoku, and jigsaw puzzles'',
    ''Weekly Catholic Mass attendance'', ''Personal journaling'']'
  career_goals: Although retired, Maria’s primary ambition is to preserve her cultural legacy by documenting her family’s recipes and oral histories in a handwritten memoir that she hopes will be passed
    down to future generations. She aims to maintain her independence by managing her health through daily routines, medication adherence, and regular low‑impact exercise such as garden tending. Maria also
    aspires to contribute quietly to her community by offering occasional cooking lessons to younger Salvadoran families at the local senior center, and by volunteering—if only briefly—to help newcomers
    navigate senior services. Finally, she seeks to keep her mind sharp by completing increasingly challenging crossword puzzles and Sudoku, viewing these activities as personal milestones of mental stamina.
