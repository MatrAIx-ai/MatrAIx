persona_description: A zoologist who specializes in the study of animal behavior and physiology, particularly the interactions between animals and their environment. His research interests include, but
  are not limited to, the study of animal communication, the effects of environmental factors on animal behavior, and the evolution of animal behavior. He is particularly interested in the behavior of animals
  that are known to exhibit unusual or unusual behavior, such as the horse throwing up clouds of dust, the wilder breeds of sheep and chamois stamping on the ground, and the musk-ox of the Arctic regions
  stamping on the ground.
