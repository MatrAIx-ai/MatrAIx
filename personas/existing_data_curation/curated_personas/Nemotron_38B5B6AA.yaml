  hobbies: '[''Lego building'', ''Model kit construction'', ''Scratch coding'', ''Strategy video gaming'', ''Reading non-fiction (engineering, space, history)'', ''Piano practice'', ''Basketball'', ''Swimming'',
    ''Exploring nature trails'', ''Collecting baseball cards'']'
  career_goals: Nicholas hopes to pursue a career in civil engineering, drawn by his love for building and structured problem solving. He envisions studying at a university with strong engineering programs
    and eventually designing bridges or sustainable community infrastructure. He also expresses a secondary interest in becoming a software developer, leveraging his coding hobby. His competitive nature
    drives him to excel academically and seek leadership roles in school clubs such as robotics and the math team.
