personas:
  professional: Maria Flores, a teenage culinary apprentice who assists her mother in preparing family meals, merges her love for routine with modest experimentation, using her practical mindset and organizational
    skills to keep core recipes unchanged while they balance school responsibilities.
  sports: Maria Flores, a high‑school student who plays volleyball for the school club and follows the Los Angeles FC soccer team and the Los Angeles Lakers basketball franchise, blends her team spirit
    with regular weekend jogs in the community park to stay fit, and they enjoy the camaraderie of team sports.
  arts: Maria Flores, an avid fan of music and drama who streams songs by Shakira, Juanes, and Los Tigres del Norte and watches telenovelas starring Diego Luna, draws inspiration from these performances
    in her sketchbook, often capturing expressive characters and dynamic scenes, and they frequently translate that energy into quick pencil sketches.
  travel: Maria Flores, a curious teen who has explored the historic plaza of Mexico City on a school trip and trekked the nearby Sierra Madre hills, now dreams of backpacking through Barcelona’s Gothic
    Quarter and the ancient ruins of Machu Picchu, planning each adventure with a frugal budget and a trusted friend, and they approach each trip with meticulous itineraries balanced by spontaneous detours.
  culinary: Maria Flores, a budding home chef, delights in preparing enchiladas with corn tortillas, smoky chipotle sauce, fresh cilantro, and homemade salsa verde, while also experimenting with quinoa
    salads featuring avocado, lime, and pomegranate seeds, and they constantly refine flavors through trial and error.
  core: Maria Flores is a routine‑driven teen who blends culinary curiosity, practical budgeting, and steady self‑care, yet they occasionally trade disciplined planning for spontaneous late‑night snack
    cravings.
background:
  cultural: Maria is a first‑generation Mexican‑American raised in a bilingual household in Los Angeles. Her family maintains strong ties to Mexican customs, including celebrating Dia de los Muertos, honoring
    Catholic holidays, and gathering around the kitchen for large family meals. Spanish is spoken at home, while English dominates school and the broader community. She participates in local cultural events
    such as the annual Mexican heritage parade and community picnics, which reinforce her connection to her roots. The blend of Mexican family values—respect for elders, collective responsibility, and pride
    in culinary traditions—and the multicultural environment of Los Angeles shape Maria's worldview, encouraging both cultural pride and practical adaptation to everyday life.
attributes:
  skills: '[''bilingual communication (Spanish & English)'', ''basic computer literacy (word processing, spreadsheets)'', ''traditional Mexican cooking'', ''event planning and organization'', ''time-management
