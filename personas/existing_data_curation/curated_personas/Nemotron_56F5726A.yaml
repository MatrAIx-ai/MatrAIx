  hobbies: '[''cooking traditional Mexican dishes'', ''listening to regional Mexican music'', ''attending community cultural festivals'', ''gardening (herb balcony garden)'', ''reading practical how-to
    books'', ''sketching in a notebook'', ''practicing yoga'', ''watching telenovelas'']'
  career_goals: Maria aims to finish high school with a strong academic record and then enroll in a community-college culinary program to become a professional chef specializing in authentic Mexican cuisine.
    She hopes to open a small family-run restaurant that offers a consistent menu of traditional dishes, providing a stable source of income for her household. In the meantime, she is considering part‑time
    work as a kitchen assistant or a tutoring aide to gain experience and support her family. Long‑term, Maria envisions a career that blends her love for cooking, her organizational strengths, and her
    desire for a predictable, reliable work environment.
