  hobbies: '[''Gardening'', ''Bridge'', ''Book club'', ''Genealogy'', ''Volunteer mentoring for youth STEM programs'', ''Walking in Cherokee Park'', ''Attending Kentucky Derby events'', ''Cooking Southern
    cuisine'', ''Choral singing'', ''Yoga'']'
  career_goals: Approaching retirement, Lori aims to transition from day‑to‑day operations to a strategic advisory role where she can mentor emerging HR leaders within her organization and the wider Louisville
    community. She plans to obtain the SHRM‑Senior Certified Professional credential and to pilot a pilot wellness program that integrates mindfulness and stress‑reduction techniques for older employees.
    Additionally, she wants to consult part‑time for nonprofit groups, helping them build inclusive hiring practices and leveraging her curiosity about AI‑driven HR tools to streamline their processes while
    maintaining a personal, compassionate touch.
