personas:
  professional: A seasoned HR strategist, Lori Geffert leverages three decades of human‑resources experience and a STEM‑focused analytical mindset to design data‑driven talent‑acquisition strategies, while
    balancing curiosity for AI tools with a practical, people‑centric approach, and prepares to shift into a strategic advisory role mentoring emerging HR leaders.
  sports: Lori Geffert enjoys leisurely walks in Cherokee Park, follows the Kentucky Wildcats men's basketball team, holds a season ticket for the Louisville Bats minor‑league baseball, and participates
    in a senior softball league at the local community center, balancing gentle exercise with social camaraderie.
  arts: Lori Geffert sings in her church choir, frequently listens to the classic country crooner Patsy Cline, attends local historical theater productions featuring works by August Wilson, and draws inspiration
    from historical fiction authors like Philippa Gregory and Ken Follett.
  travel: Lori Geffert prefers road‑trip excursions to historic sites such as the Abraham Lincoln Birthplace and the Great Smoky Mountains, has a bucket‑list item of a week‑long genealogy pilgrimage to
    her ancestral hometown in Kentucky, and enjoys occasional short cruises to the Caribbean to unwind from work‑related stress.
  culinary: Lori Geffert delights in cooking Southern comfort dishes like shrimp and grits, fried green tomatoes, and sweet tea‑braised pork ribs using fresh herbs from her own garden, while experimenting
    with seasonal salads featuring heirloom tomatoes and basil, yet occasionally over‑salts her recipes in the excitement of serving guests.
  core: Lori Geffert blends analytical HR expertise with community‑focused compassion, balancing curiosity for new tech with a practical, garden‑scented calm, though a tendency to worry often fuels both
    meticulous planning and occasional over‑commitment.
background:
  cultural: Raised in Louisville, Lori’s cultural identity blends Midwestern pragmatism with Southern hospitality. She grew up in a close‑knit family that emphasized community service, church involvement,
    and the celebration of local traditions such as the Kentucky Derby and bluegrass music. Her upbringing fostered a strong work ethic, respect for personal responsibility, and a love of shared gatherings.
    While she identifies as white, she values the cultural diversity of Jefferson County and actively seeks inclusive practices in her professional and volunteer activities. Lori’s background also includes
    a lifelong appreciation for regional cuisine, bourbon heritage, and the natural beauty of the Ohio River valley.
