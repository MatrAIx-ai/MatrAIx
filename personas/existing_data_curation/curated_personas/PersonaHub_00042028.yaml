persona_description: A leader or decision-maker in a regional organization or government who is concerned about the plight of the Rohingya people and seeks to protect their human rights within the framework
  of ASEAN's non-intervention policy. This person is aware of the region's deep social and cultural roots and the need for a caring and sharing ASEAN community. They are skilled at negotiating and advocating
  for the Rohingya people's rights, and are committed to finding a solution to the crisis. They are aware of the importance of combining diplomatic talks with non-state initiatives, such as advocacy networks
  and humanitarian organisations, to address the Rohingya crisis effectively.
