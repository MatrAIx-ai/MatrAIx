personas:
  professional: Atul Bedi is an aspiring digital storyboard artist who blends sketching manga‑inspired characters with interactive Scratch narratives, using their curiosity to experiment with new visual
    techniques while often procrastinating on deadlines due to a love of spontaneity.
  sports: Atul Bedi enjoys playing on the school’s soccer team and practices with the local Rising Stars Soccer Club, follows the Los Angeles Lakers basketball games, and participates in weekend badminton
    sessions at the community center, treating fitness as a fun break rather than a regimented routine.
  arts: Atul Bedi immerses themselves in graphic novels by "Alan Moore" and "Stan Lee", draws inspiration from animated films like Spirited Away and Coco, and curates playlists that swing between Bollywood
    film scores and indie rock bands such as The Strokes, fueling both their sketchbook and digital painting projects.
  travel: Atul Bedi loves weekend road trips to nearby historical forts and dreams of traveling to Tokyo for its anime culture, Paris for its art museums, and New York City’s Broadway shows, preferring
    a flexible itinerary that allows spontaneous creative detours.
  culinary: Atul Bedi helps prepare family meals like spiced lentil stew and experiments with fusion dishes such as paneer tacos, using fresh cilantro and cumin to add depth, while also enjoying the occasional
    snack of mango‑laced ice cream after art workshops.
  core: Atul Bedi is a creative whirlwind of sketching, gaming, and experimental cooking who balances bright artistic bursts with bouts of anxiety and a habit of slipping deadlines.
background:
  cultural: Atul comes from a Sikh Indian family that emigrated to the United States a generation ago. Growing up in Long Beach, NY, he balances the values of his South Asian heritage—such as respect for
    elders, community service at the local Gurdwara, and celebration of festivals like Diwali and Vaisakhi—with the diverse cultural influences of his suburban New York environment. His household speaks
    both English and Punjabi/Hindi, and family meals often feature homemade curries, roti, and seasonal American dishes. This bicultural upbringing nurtures his curiosity about global art forms and fuels
    his desire to incorporate multicultural themes into his creative work.
