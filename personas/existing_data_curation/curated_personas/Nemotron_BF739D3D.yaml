  career_goals: Atul dreams of turning his love for art and technology into a career as a concept artist or game designer, where he can blend visual storytelling with interactive experiences. He hopes to
    attend a specialized high school for arts, earn a scholarship, and later study at an art college or a computer science program that emphasizes creative media. In the long term, he wants to create his
    own indie video game that celebrates diverse cultures and includes narratives that promote empathy and mental wellness. He also aspires to mentor younger kids in his community, helping them discover
    creative outlets for coping with stress.
