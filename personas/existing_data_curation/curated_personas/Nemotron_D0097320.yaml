personas:
  professional: Alexander George, though retired from formal employment, devotes his time to mentoring at‑risk youth, coordinating church events, and taking on freelance carpentry projects, applying his
    practical, structured mindset and reliable interpersonal skills to keep programs on schedule while his occasional stress‑driven assertiveness can lead him to overcommit.
  sports: Alexander George plays in a senior basketball league each Thursday, supports the Atlanta Hawks and Atlanta Braves, belongs to the Golden Oak Senior Fitness Club where he mixes light weight‑training
    with morning walks, and despite occasional knee stiffness he remains committed to staying active.
  arts: Alexander George sings baritone in his church’s gospel choir, regularly enjoys live blues shows featuring B.B. King tributes and jazz nights spotlighting Miles Davis recordings, and spends evenings
    reading biographies of notable historical figures to deepen his appreciation of the broader American narrative.
  travel: Alexander George prefers organized group trips that blend historical sightseeing and musical heritage, such as guided tours of Savannah’s historic district, weekend excursions to New Orleans’
    French Quarter, relaxed family vacations in the Great Smoky Mountains, and occasional budget‑friendly cruises to the Bahamas.
  culinary: Alexander George takes pride in cooking Southern staples like crispy fried chicken, smoky collard greens, and sweet potato pie using garden‑fresh vegetables, a seasoned cast‑iron skillet, and
    a secret blend of paprika and cayenne, though he sometimes over‑salts dishes in his enthusiasm to honor family recipes.
  core: Alexander George is a structured yet sociable senior who balances his love of gospel singing, community gardening, and mentorship with a lingering worry over finances and a habit of over‑seasoning
    his beloved Southern meals.
background:
  cultural: Alexander's cultural identity is rooted in the African‑American South. Growing up in Augusta, he was shaped by the strong influence of the Black church, family solidarity, and a legacy of resilience
    stemming from the civil‑rights era. Southern culinary traditions, gospel music, storytelling, and community service are integral to his worldview. He values the intergenerational transmission of heritage,
    the importance of collective uplift, and the celebration of cultural milestones such as Juneteenth and local festivals.
