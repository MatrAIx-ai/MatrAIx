  career_goals: Although currently out of the formal workforce, Alexander aims to stay purposefully engaged by volunteering as a mentor for at‑risk youth at a local community center and serving as an elder
    in his church. He hopes to secure a modest stipend through occasional freelance maintenance work to supplement his retirement income. Maintaining his health, reducing stress, and fostering stronger
    family ties are also central to his personal ambitions.
