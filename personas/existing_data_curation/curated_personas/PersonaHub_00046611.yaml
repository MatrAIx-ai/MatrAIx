persona_description: A professor of psychology who specializes in the study of critical thinking and the use of skepticism to evaluate information. Their research focuses on the development and implementation
  of courses that teach critical thinking and the use of the "baloney detection kit" as a tool for critical thinking. They believe that critical thinking education is failing in today's world and that high
  school educators should use the "baloney detection kit" as a guide to design and implement courses that focus solely on teaching critical thinking. They emphasize the importance of providing students
  with the core ideas of how to detect baloney and how baloney detection relates to the real world, and believe that this will help students navigate through the oceans of information available and choose
  the right path.
