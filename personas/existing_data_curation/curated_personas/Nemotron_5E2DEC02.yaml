  hobbies: '[''Sketching and digital painting'', ''Urban photography'', ''Listening to jazz, soul, and hip‑hop music'', ''Reading speculative fiction and African‑American literature'', ''Journaling and
    reflective writing'', ''Playing narrative‑driven video games'', ''Exploring generative art and tech forums'']'
  career_goals: David aims to build a sustainable freelance career as a digital artist and multimedia content creator, focusing on concept art for indie games, album covers, and social media campaigns.
    He plans to enroll in a community college program for graphic design to formalize his skills, develop a professional portfolio, and secure remote contracts that allow him to work independently in a
    quiet environment. In the longer term, he hopes to combine his artistic passion with his interest in African‑American cultural history by curating digital exhibitions or working as a cultural archivist.
