personas:
  professional: David Slade, a 21‑year‑old aspiring digital artist and multimedia content creator, leverages their self‑taught mastery of Photoshop, Illustrator, and Python automation to deliver concept
    art for indie game studios, album covers, and social media campaigns, while methodically planning each project and maintaining clear deadlines despite a tendency to over‑think client feedback, and they
    often revise drafts late into the night.
  sports: David Slade, a 21‑year‑old introvert, prefers solo cardio such as early‑morning jogs along the city’s waterfront and weekly swimming laps at the community pool, while cheering on the New York
    Knicks and New York Yankees from their apartment and occasionally joining a local pickup basketball group despite finding social play draining, and they use a fitness tracker to log each session.
  arts: David Slade, a 21‑year‑old visual storyteller, spends evenings sketching digital portraits inspired by the ethereal light of James Turrell, listening to Miles Davis’s Kind of Blue, D’Angelo’s Voodoo,
    and Kendrick Lamar’s To Pimp a Butterfly while curating a personal gallery of speculative fiction covers and participating in online generative‑art forums, and they often share their work on Discord
    communities for feedback.
  travel: David Slade, a 21‑year‑old careful planner, prefers low‑key cultural trips that combine photography and research, such as solo weekend explorations of Berlin’s street art districts, a month‑long
    study visit to Kyoto’s historic temples, and annual pilgrimages to New Orleans for jazz festivals, all booked months in advance to stay within a modest freelance budget, and they keep a detailed travel
    journal documenting each city’s visual textures.
  culinary: David Slade, a 21‑year‑old experimental cook, enjoys mastering dishes like rosemary‑infused roasted chicken, spicy miso ramen, and avocado toast topped with smoked salmon, often sourcing fresh
    ingredients at farmers’ markets while also indulging in late‑night takeout sushi to fuel marathon gaming sessions, and they occasionally experiment with molecular gastronomy techniques to add a visual
    twist to their meals.
  core: David Slade, a 21‑year‑old solitary creative, blends meticulous planning with a restless curiosity, turning anxiety into detailed art projects while juggling freelance gigs, budget constraints,
    and a penchant for midnight coffee, and they often find solace in the quiet hum of their studio.
background:
  cultural: David is an African‑American who grew up in Westland, a suburb of Detroit in Wayne County. His family’s roots trace back to the Great Migration, with grandparents hailing from the Deep South.
    He was raised in a close‑knit community where Motown’s legacy, local street art, and African‑American church traditions shaped his cultural identity. He participates in community events such as the
    Detroit Jazz Festival and African World Festival, and he often draws inspiration from the rich musical and artistic heritage of the region while also valuing the importance of self‑reliance and personal
    introspection.
attributes:
  skills: '[''Digital illustration (Adobe Photoshop, Illustrator)'', ''Photography and photo editing (Lightroom)'', ''Video editing (Adobe Premiere)'', ''Basic Python programming for automation and data
