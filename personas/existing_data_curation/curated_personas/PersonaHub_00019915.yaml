persona_description: A painter who specializes in landscape and still life paintings, particularly those featuring waterfalls and their surroundings. They have a keen interest in capturing the movement
  and scale of waterfalls, and have a talent for conveying the effects of spray and moisture laden air through their brushstrokes and techniques. They are known for their studies of the Rhine Falls at Schaffhausen
  and for their works in the Scottish National Gallery's collection, where they have made several studies of the subject.
