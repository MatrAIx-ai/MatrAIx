personas:
  professional: William Wright, a budding mini architect who loves stacking blocks into towering structures, demonstrates early spatial reasoning and methodical organization while flexibly improvising when
    a piece doesn’t fit, embodying a curious yet practical approach to play.
  sports: William Wright, a lively participant in the Little Kickers soccer club and a fan of the Chicago Cubs, dashes through the backyard with boundless energy, enjoys splash‑pad swimming in summer, and
    shows a competitive streak by insisting on winning every toddler game.
  arts: William Wright, enchanted by the melodies of Raffi and the colorful drawings of Dr. Seuss, spends afternoons finger‑painting dinosaurs and dancing to 'Baby Beluga', letting music and art shape their
    energetic identity and providing a soothing outlet for their worries.
  travel: William Wright, who eagerly clings to a stroller on family trips to Disney World in Florida and the zoo in San Diego, prefers bright playgrounds and short car rides, yet becomes fussy on longer
    journeys, reflecting a balance of adventure lust and stress sensitivity.
  culinary: William Wright, a picky eater who adores mac & cheese, peanut‑butter‑banana sandwiches, and the occasional honey‑drizzled pancakes, frequently creates a delightful mess by spilling yogurt, yet
    insists on the exact shape of dinosaur‑shaped chicken nuggets on the plate.
  core: William Wright, a curious yet competitive toddler who builds elaborate block forts, worries when a tower tumbles, and constantly seeks reassurance while demanding endless snack refills, epitomizing
    a blend of imagination, skepticism, and emotional intensity.
background:
  cultural: William grows up in Belfry, a small community in Pike County, Eastern Kentucky, where Appalachian and Southern cultural traditions intertwine. His family attends a local Baptist church, participates
    in community picnics and church-based preschool activities, and celebrates holidays with regional foods such as biscuits, fried chicken, and corn-bread. Music at home often includes bluegrass and country
    tunes, and family gatherings emphasize storytelling, hospitality, and a strong sense of self-reliance. The rural setting provides ample outdoor play opportunities, fostering a connection to the natural
    landscape and local customs.
