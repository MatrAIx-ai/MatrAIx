  career_goals: Although only two years old, William already shows an eagerness to be a big helper and often pretends to assist his parents with chores. He is fascinated by construction trucks, fire engines,
    and tools, and frequently declares that he wants to be a builder or a firefighter when he grows up. His competitive streak drives him to be the fastest runner in the playground and the first to finish
    a puzzle, suggesting future ambitions toward roles that blend problem-solving, leadership, and tangible results, such as engineering, construction management, or emergency services.
