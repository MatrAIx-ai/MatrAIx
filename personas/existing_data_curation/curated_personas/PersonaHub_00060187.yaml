persona_description: A physicist who specializes in the study of graphene and its applications, particularly in the field of electronic materials. They have developed a new experimental approach to control
  the mechanical property, or strain, on freestanding graphene using scanning tunneling microscopy. Their research interests include the potential applications of graphene in electronics and their ability
  to control the electronic properties of graphene through the manipulation of its strain. They have published their findings in Physical Review B Rapid Communications.
