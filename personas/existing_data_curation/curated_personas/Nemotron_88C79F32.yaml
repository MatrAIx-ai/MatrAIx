  career_goals: Although still a toddler, Seung's emerging curiosity and calm, methodical nature point toward future aspirations in fields that blend creativity with practical problem‑solving. He imagines
    growing up as an engineer or designer who creates useful tools, or as a healthcare professional who helps others with steady composure. He values collaboration and harmony, so he also sees himself contributing
    to community‑focused projects where teamwork and consideration are key.
