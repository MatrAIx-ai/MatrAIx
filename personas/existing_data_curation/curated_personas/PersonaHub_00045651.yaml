persona_description: A healthcare professional who is passionate about promoting and supporting breastfeeding practices in hospitals and birthing centers. They are knowledgeable about the Ten Steps to Successful
  Breastfeeding and have experience implementing evidence-based breastfeeding policies and procedures in healthcare settings. They are dedicated to optimizing breastfeeding practices universally and believe
  in the importance of maternal and infant health. They have a deep understanding of obstetric medication and anesthesia and advocate for the use of such medications as sparingly as possible. They are skilled
  in teaching and counseling mothers on how to breastfeed their infants and are passionate about the benefits of breastfeeding for both the mother and the infant. They are committed to supporting the establishment
  of breastfeeding support groups and refer mothers to them on discharge from hospitals or clinics.
