  career_goals: Bobby aims to formalize his artistic abilities and translate his community‑service orientation into a sustainable career. In the next year, he plans to obtain his GED and enroll in a community‑college
    program in graphic design or visual arts. He intends to build a professional portfolio and begin freelancing on platforms such as Upwork and Behance, targeting small businesses and nonprofit organizations
    in the Dallas‑Fort Worth area. Long‑term, he hopes to combine his design expertise with his compassion for others by working as an art therapist or community‑arts coordinator, developing programs that
    use creative expression to support at‑risk youth and adults. He also wants to achieve financial stability that reduces his chronic worry and allows him to maintain a balanced, low‑stress lifestyle.
