personas:
  professional: Bobby Rosario is a budding graphic designer and community organizer whose meticulous project planning and deep artistic curiosity drive them to create thoughtful visual solutions for local
    nonprofits while balancing a disciplined schedule of study and freelance work.
  sports: Bobby Rosario enjoys low‑impact fitness, jogging the scenic trails around Weatherford on sunrise runs, attending local yoga classes, and cheering for the Dallas Mavericks and Texas Rangers while
    occasionally playing pickup soccer with a small group of friends.
  arts: Bobby Rosario immerses themselves in the contemporary art scene, sketching charcoal studies in a weathered notebook, curating playlists of Brian Eno and Aphex Twin, and frequenting the Modern Art
    Museum of Fort Worth to study works by Olafur Eliasson and Yayoi Kusama, all of which shape their own digital illustrations and graphic projects.
  travel: Bobby Rosario prefers meticulously planned solo getaways, often spending weekends exploring the desert art installations of Marfa, the historic streets of Santa Fe, and dreaming of a future trip
    to Kyoto’s quiet temples, balancing a modest travel budget with the desire for low‑stress cultural immersion.
  culinary: Bobby Rosario enjoys cooking simple, nutrient‑dense meals like quinoa‑bowl with roasted salmon, avocado, and cilantro, and occasionally treats themselves to a hearty shakshuka, preferring to
    use fresh herbs such as basil and thyme while following a tidy, routine‑driven kitchen workflow.
  core: Bobby Rosario blends meticulous organization with artistic curiosity, battling chronic worry through disciplined routines, solitary creativity, and a quiet compassion for community and animals.
background:
  cultural: 'Bobby identifies as a white Texan who grew up in Weatherford, a small town known for its historic downtown and strong sense of community. His family background reflects typical middle‑class,
    working‑class values of self‑reliance, respect for neighbors, and modest religious roots, though he never pursued formal religious practice. He was exposed to regional traditions such as the annual
    Chili Cook‑Off, local high‑school football games, and community theater productions, which instilled an appreciation for communal gatherings. At the same time, Weatherford’s proximity to the larger
    Dallas‑Fort Worth metro area introduced him to a broader spectrum of cultural influences, including contemporary art scenes, independent music venues, and diverse culinary experiences. These dual influences
    have shaped his worldview: a blend of small‑town humility and an openness to new, unconventional ideas.'
