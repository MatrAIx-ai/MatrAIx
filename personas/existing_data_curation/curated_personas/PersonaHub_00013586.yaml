persona_description: A researcher and astronomer who specializes in the study of galaxy rotation curves, specifically focusing on the use of the 21-cm line data to derive rotation curves for edge-on galaxies.
  They have developed their own method for deriving rotation curves using the terminal velocity of the profiles along the major axis, and have also used the standard method outlined by Warner et al. (1973)
  and Rots (1974) to derive rotation curves for various galaxies. They have experience with analyzing deviations from the simple model of a disk in circular motion and have made modifications to the standard
  method for various types of non-circular motions described in chapter 5. They have used the method for deriving rotation curves for several galaxies, including NGC 5383, NGC 2403, NGC 4236, and M83.
