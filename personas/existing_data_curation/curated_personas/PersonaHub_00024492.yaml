persona_description: A financial professional who is familiar with governmental accounting and reporting principles. This person has a deep understanding of how governmental funds are managed and how revenues
  and expenditures are recognized and recorded. They are likely to be familiar with the modified accrual basis of accounting and the flow of current financial resources measurement focus used by governmental
  funds. They may have experience in auditing governmental funds and understanding the exceptions to the recognition rules and exceptions to the exceptions.
