personas:
  professional: Mariella Atkinson, a boutique store manager in Lubbock, leverages their methodical planning, data‑driven decision‑making using Excel and Tableau, and their keen eye for visual merchandising
    to optimize inventory and staff schedules while curating art‑inspired in‑store displays, all while competitively benchmarking performance across locations and skeptically vetting vendor promises to
    ensure reliable results.
  sports: Mariella Atkinson, a member of a sunrise yoga class at the Lubbock Community Center and a participant in the local 5K running club, follows the Texas Tech Red Raiders football and basketball teams,
    and they enjoy solo prairie hikes in the cooler months, balancing their competitive nature with low‑key fitness routines that help soothe their worry.
  arts: Mariella Atkinson immerses themselves in contemporary art by attending monthly gallery openings featuring artists like Kehinde Wiley and Gregory Crewdson, curates Instagram photo essays of prairie
    skylines, reads Margaret Atwood and Slavoj Žižek, and they find solace in the ambient sounds of St. Vincent while sketching digital illustrations, all of which feed their curiosity and provide a quiet
    escape from daily stress.
  travel: Mariella Atkinson plans their trips with meticulous itineraries, has explored Santa Fe’s art scene and photographed the desert dunes of Arizona, dreams of a photography‑focused retreat in Oaxaca,
    and they prefer small‑group tours that allow quiet contemplation over spontaneous backpacking, balancing their competitive urge to capture the perfect shot with a need for low‑stress travel.
  culinary: Mariella Atkinson, an avid home cook, experiments with Southwestern flavors by simmering green chile stew, roasting prickly pear cactus, and layering chipotle‑infused mole, yet they often over‑spice
    dishes in their quest for boldness, and they enjoy occasional dinner outings at farm‑to‑table spots like The Ranch House for their heirloom corn tortillas.
  core: Mariella Atkinson is a detail‑obsessed boutique manager who channels their art‑loving curiosity and competitive edge into meticulously curated store experiences, while battling a chronic worry that
    fuels both disciplined planning and occasional over‑indulgence in coffee‑filled late‑night research.
background:
  cultural: Mariella comes from a middle‑class, white Texan family with deep roots in West Texas. Raised in Lubbock, she internalized the region’s values of independence, self‑reliance, and modesty, reinforced
    by a Methodist upbringing and community traditions such as high‑school football, country‑music festivals, and ranching heritage. The juxtaposition of the prairie landscape and a burgeoning local arts
    scene cultivated her appreciation for both rugged regional culture and creative expression. While she identifies strongly with her Texan identity, she also embraces broader American cultural influences,
    especially contemporary art, progressive ideas, and digital media.
attributes:
  skills: '[''Strategic Planning'', ''Budget Management'', ''Team Leadership'', ''Inventory Control'', ''Data Analysis'', ''Customer Relations'', ''Visual Merchandising'', ''Photography'', ''Process Optimization'',
    ''Conflict Mediation'']'
  hobbies: '[''Photography'', ''Visiting Art Galleries'', ''Yoga'', ''Meditation'', ''Reading Contemporary Fiction'', ''Crossword Puzzles'', ''Cooking Southwestern Cuisine'', ''Digital Illustration Courses'',
    ''Journaling'']'
  career_goals: Mariella aspires to move from managing a single boutique to becoming a regional operations manager for a national retail chain, using her competitive drive and methodical approach to improve
    performance across multiple locations. Simultaneously, she wishes to blend her passion for art by eventually overseeing a portfolio of stores that specialize in Texas‑made crafts and artworks, or by
    transitioning into a managerial role at a cultural institution such as a museum or gallery. Over the next three years she plans to complete a bachelor’s degree in Business Administration and earn a
    certificate in Museum Studies, positioning herself for senior leadership that merges commercial success with cultural outreach.
