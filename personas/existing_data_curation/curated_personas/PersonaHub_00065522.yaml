persona_description: A conservation biologist and researcher who studies the impacts of anthropogenic noise on invertebrates, specifically crickets, and is interested in understanding how noise affects
  their communication, development, and overall health. Her research is supported by a grant from the Morris Animal Foundation, which aims to improve our understanding of the health and welfare of animals
  in urban environments. She is particularly interested in the mechanisms behind the effects of noise on crickets and how it may impact other organisms in the ecosystem. Her work is focused on raising multiple
  generations of crickets under different noise conditions and measuring a number of variables over their lifespans to determine how anthropogenic noise alters their fitness. She has already reached out
  to the Jefferson County park system and the National Park Service's Natural Sounds and Night Skies Division to suggest ways to mitigate the impact of noise on wildlife in urban environments.
