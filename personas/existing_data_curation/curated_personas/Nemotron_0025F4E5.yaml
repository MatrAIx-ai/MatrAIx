  career_goals: Eugenio aspires to move into a senior technology leadership role—such as Chief Technology Officer or Director of Digital Innovation—within the next five years, where he can champion digital
    transformation projects that blend cutting‑edge tech with creative expression. He also envisions launching a boutique consulting firm that helps small businesses adopt innovative IT solutions while
    honoring cultural authenticity. Additionally, he aims to strengthen his project‑management discipline to meet deadlines more reliably, balancing his spontaneous nature with greater organizational structure.
