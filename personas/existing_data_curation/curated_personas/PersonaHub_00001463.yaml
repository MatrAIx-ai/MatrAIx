persona_description: A researcher interested in analyzing and interpreting mortality data related to Aboriginal and Torres Strait Islander peoples in Australia, particularly in the context of recent changes
  in the timeliness of birth and death registrations and the over-reporting of deaths for certain years in Western Australia. This person is likely to have expertise in statistical analysis, data interpretation,
  and the use of administrative data sources to gather and analyze data on mortality rates. They may also have a background in public health or social science and be interested in understanding the health
  and welfare of Aboriginal and Torres Strait Islander peoples in Australia.
