personas:
  professional: Gloria is an aspiring young robotics enthusiast who channels their meticulous, achievement‑driven nature into designing precise LEGO Mindstorms projects, solving mystery‑style challenges,
    and dreaming of becoming a future engineer.
  sports: Gloria plays soccer with the Little Stars Youth Soccer Club in the fall, swims at the community pool during summer, cheers for the Dallas Cowboys and the Dallas Mavericks, and follows a disciplined
    training schedule that mirrors their organized approach to schoolwork.
  arts: Gloria creates intricate mandala drawings inspired by M. C. Escher, practices piano pieces by Lang Lang, sings in a bilingual youth choir covering songs by Shakira and Ariana Grande, and draws on
    the vibrant patterns of traditional papel picado for their artistic expression.
  travel: Gloria dreams of wandering the colorful markets of Oaxaca and the tranquil temples of Kyoto, while they currently enjoy weekend excursions to nearby state parks where they gather pinecones for
    their craft projects, balancing their family's budget with their curiosity about world cultures.
  culinary: Gloria loves learning to make tamales with masa dough alongside their mother, spice‑seasoned guacamole, and assembles bright fruit platters inspired by papel picado using mango, papaya, and
    a hint of chili, yet they sometimes sneak chocolate chip cookies from the pantry when homework feels overwhelming.
  core: Gloria is a hyper‑organized 11‑year‑old who blends robotics, mandala art, and piano into a disciplined routine, yet their constant worry drives them to over‑schedule, stash snacks, and occasionally
    procrastinate on school projects.
background:
  cultural: Gloria is the daughter of Mexican immigrants and grew up in a bilingual household where Spanish is spoken alongside English. Her family places a strong emphasis on respect, collectivism, and
    celebrating cultural traditions such as Día de los Muertos, Cinco de Mayo, and family‑centered holidays. These values shape her cooperative nature and her desire to maintain harmony in group settings.
    Living in Pontiac, Michigan, she navigates a blend of Mexican heritage and Midwestern community life, attending a local Catholic parish and participating in neighborhood events that celebrate both her
    cultural roots and American upbringing.
attributes:
  skills: '[''Organizational planning'', ''Time management'', ''Note‑taking'', ''Peer tutoring'', ''Basic digital literacy (Google Classroom, Microsoft Word, spreadsheets)'', ''Block‑based coding (Scratch)'',
    ''Strategic game play (chess)'', ''LEGO building'']'
  hobbies: '[''Mandala drawing and coloring'', ''Papel picado craft'', ''Robotics club (LEGO Mindstorms)'', ''Reading mystery novels'', ''Puzzle solving (jigsaw, Sudoku)'', ''Piano practice'', ''Cooking
    traditional Mexican dishes'', ''Youth choir (bilingual)'']'
  career_goals: Gloria dreams of a future where she can help others succeed. She has expressed a strong interest in becoming a teacher or a community health aide, roles she sees as extensions of her caring
    nature and her love for structure. In the short term, she aims to maintain top grades, earn a scholarship for a STEM summer program, and eventually pursue a degree in education or nursing where she
    can combine her organizational strengths with her desire to support people.
