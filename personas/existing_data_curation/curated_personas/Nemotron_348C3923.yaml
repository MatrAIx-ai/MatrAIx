personas:
  professional: Norma Gude, a 33-year-old insurance sales professional in El Paso, leverages their methodical risk‑analysis skills, bilingual communication, and energetic group‑leadership style to match
    clients with tailored policies while driving data‑informed sales strategies and mentoring junior agents.
  sports: Norma Gude fuels their fitness routine with weekly Zumba classes and salsa dance nights, while cheering on the El Paso Chihuahuas minor‑league baseball team and the El Paso Locomotive FC soccer
    club, and they occasionally volunteer as a scorekeeper for local youth basketball leagues.
  arts: Norma Gude delights in the vibrant sounds of El Paso’s summer music festival, where they regularly applaud performances by regional band Los Hombres Calientes, as well as mainstream artists like
    Beyoncé and Juanes, and they find creative inspiration from the soulful storytelling of Dolly Parton and the rhythmic flair of salsa legend Celia Cruz.
  travel: Norma Gude plans their getaways with meticulous itineraries, favoring weekend road trips to Carlsbad Caverns and cultural excursions to Santa Fe, while dreaming of a future cross‑border culinary
    tour of Oaxaca, Mexico, yet they balance these adventures around a busy client schedule and volunteer commitments.
  culinary: Norma Gude experiments in their patio kitchen, blending Southern comfort foods like shrimp‑and‑grits and smoked brisket with Tex‑Mex staples such as chorizo‑filled tacos, often seasoning dishes
    with smoked paprika, chipotle peppers, and fresh cilantro to serve friends at communal dinner parties.
  core: Norma Gude is a hyper‑organized 33‑year‑old insurance pro who channels their love for community dance floors and spicy Southern‑Tex‑Mex cooking into a disciplined yet occasionally over‑scheduled
    lifestyle, balancing ambition with a penchant for spontaneous salsa moves and a lingering habit of checking their CRM dashboard even at dinner.
background:
  cultural: 'Norma identifies as Black and grew up in the culturally rich, bilingual environment of El Paso, Texas. Her family’s roots trace back to the African‑American migration patterns of the Southwest,
    and she was raised with the values of perseverance, community, and faith often celebrated in Black churches. Living on the border has also exposed her to Hispanic traditions, from sharing meals featuring
    chile‑infused dishes to participating in citywide celebrations like Fiesta de las Flores. She honors Juneteenth alongside local Hispanic holidays, reflecting an inclusive sense of identity. This blend
    of cultural influences informs her worldview: she values solidarity, cherishes multigenerational family ties, and actively seeks to bridge diverse communities through her professional and volunteer
    work.'
attributes:
  skills: '["Effective communication", "Risk assessment", "Policy analysis", "Customer needs identification", "Sales negotiation", "Regulatory compliance", "CRM management", "Event coordination", "Time
