  hobbies: '["Zumba classes", "Salsa dancing", "Cooking Southern soul food and Tex‑Mex fusion", "Reading self‑improvement and business books", "Community volunteering at local food banks", "Gardening",
    "Attending local music festivals"]'
  career_goals: Norma aims to advance to a senior insurance advisor role within the next two years, securing industry certifications such as the Chartered Insurance Professional (CIP) to deepen her expertise.
    She aspires to take on a team‑lead or branch‑manager position, where she can mentor newer agents, design structured training programs, and drive sales performance through data‑driven strategies. Long‑term,
    she envisions launching her own boutique agency focused on serving underserved communities in the El Paso area, offering tailored financial‑literacy workshops and culturally relevant insurance solutions.
