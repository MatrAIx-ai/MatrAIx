persona_description: A geologist who specializes in the study of sedimentary rock formations and their dating methods, particularly radiocarbon dating. Their expertise lies in understanding the processes
  that have shaped the Earth's surface over time, and how these processes have affected the composition of sedimentary rocks. They have conducted extensive research on the western Ross Sea, Antarctica,
  and have used radiocarbon dating to determine the ages of core top sediments, which are then used to address questions about the apparent ages of sediments at or close to the present sediment/water interface,
  the spatial distribution of core top ages, and the 'correction factor' that can be applied to these age determinations to obtain the best possible Holocene (downcore) chronologies.
