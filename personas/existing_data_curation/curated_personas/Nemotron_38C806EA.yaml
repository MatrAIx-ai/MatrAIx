  hobbies: '["Painting", "Sketching", "Digital Illustration", "Attending Art Festivals", "Improv Comedy", "Karaoke", "Dancing", "Hiking", "Photography", "Reading Speculative Fiction", "Cooking Experimental
    Recipes"]'
  career_goals: Rachel aims to become a store manager within the next two years, followed by a district manager role overseeing multiple locations across Arkansas and neighboring states. She envisions eventually
    opening her own boutique that blends contemporary art and fashion, leveraging her creative vision and retail expertise to curate a unique shopping experience. To achieve this, she plans to complete
    her bachelor's degree in Business Administration or Marketing, acquire certifications in visual merchandising, and build a network of local artists and designers. She also aspires to mentor and develop
    future retail leaders, fostering a culture of innovation and employee growth.
