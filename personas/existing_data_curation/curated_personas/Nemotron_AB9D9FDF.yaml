  hobbies: '[''Salsa and merengue dancing'', ''Traditional cooking'', ''Gardening'', ''Dominoes'', ''Church choir'', ''Genealogy research'', ''Public lectures'', ''Health workshops'']'
  career_goals: Although retired from formal employment, Yesenia aims to cement her legacy by leading a senior mentorship program, documenting her family's history in a memoir, and spearheading an annual
    cultural festival that showcases Toa Alta's heritage. She also hopes to secure sustainable funding for a local community garden and continue competing in regional cooking contests to keep her standards
    high.
