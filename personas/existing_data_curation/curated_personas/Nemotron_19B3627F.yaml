  hobbies: '[''Gardening'', ''Community volunteering'', ''Storytelling and oral history'', ''Scale model airplane building'', ''Playing bridge'', ''Cooking classic American dishes'', ''Attending local theater
    productions'', ''Birdwatching'', ''Using tablets for video calls'', ''Walking in neighborhood parks'']'
  career_goals: Although retired, John aims to stay active in his community by establishing a seniors’ technology club where he can teach peers how to use tablets and video‑calling apps. He wishes to document
    oral histories of longtime Placentia residents, compiling them into a local heritage booklet. He also aspires to continue volunteering at the community center, organizing intergenerational events, and
    maintaining his physical health through daily walks and gardening. Ultimately, he hopes to leave a legacy of knowledge sharing, friendship, and civic contribution.
