personas:
  professional: Standley, a 36‑year‑old sustainable‑technology CEO, blends deep technical expertise with organized, data‑driven decision‑making, championing AI‑enabled products while fostering a transparent,
    employee‑first culture rooted in Midwestern community values, and they consistently mentor emerging entrepreneurs.
  sports: Standley, an avid cyclist with the Lawrence River Riders, spends weekend mornings fishing at Tuttle Creek Reservoir, cheers on the Kansas City Chiefs and the University of Kansas Jayhawks, joins
    the local 10K run during the spring marathon series, and they view fitness as a disciplined routine that balances competition with community bonding.
  arts: Standley, a regular at Lawrence Community Theater, enjoys the folk storytelling of Bob Dylan, the introspective indie sounds of Bon Iver, and occasionally crafts minimalist woodworking pieces inspired
    by Donald Judd, finding that artistic pursuits recharge them after strategic planning sessions.
  travel: Standley, a methodical planner, maps trips with spreadsheets and budget apps, has explored the sustainable‑tech scene in Reykjavik, hiked the Swiss Jura’s alpine trails, unwound on Maui’s beaches,
    and always makes time for a weekend road‑trip to nearby Kansas farms where they enjoy potluck meals with local friends.
  culinary: Standley, an adventurous home cook, perfects Korean bibimbap with locally sourced kale, sears fresh trout from the reservoir using smoked paprika, bakes sourdough with heritage wheat, and occasionally
    whips up Peruvian ceviche with lime and a dash of cilantro, all while pairing meals with craft beers from Kansas microbreweries.
  core: Standley, a pragmatic yet curious tech leader, balances spreadsheet‑driven ambition with Midwestern community spirit, obsessively plans everything from investments to weekend rides, yet sometimes
    forgets to step away from the screen for a proper break.
background:
  cultural: Standley is a white American raised in the Midwest, with family roots tracing back to German and Scandinavian immigrants who settled in Kansas. Growing up in Lawrence, he absorbed Midwestern
    values of hard work, humility, pragmatism, and community service. The university town environment fostered his curiosity and respect for higher education, while the surrounding agricultural landscape
    reinforced a practical, grounded outlook. He identifies with a blend of traditional Midwestern culture and the progressive, tech‑centric ethos of the local startup community.
