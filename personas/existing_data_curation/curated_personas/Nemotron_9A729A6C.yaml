  career_goals: Standley aims to scale his company into a national leader in sustainable technology while preserving a culture of transparency, employee well‑being, and community engagement. He plans to
    introduce AI‑enabled solutions, expand into new markets, and achieve a public offering within the next five years. Simultaneously, he aspires to serve on industry boards, mentor emerging entrepreneurs
    in Kansas, and embed corporate social responsibility initiatives that support local education and environmental stewardship.
