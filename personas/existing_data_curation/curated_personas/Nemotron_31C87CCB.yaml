personas:
  professional: Adriana Casas, a three‑year‑old budding storyteller, delights in turning everyday moments into imaginative play, using her curiosity and sociable charm to lead make‑believe “classrooms”
    where she organizes toys and encourages friends to join in creative adventures.
  sports: Adriana Casas kicks around at her neighborhood’s toddler soccer program with the Dandelion Cubs, races a bright orange tricycle on sunny afternoons, and eagerly joins Sunday family hikes, channeling
    her high energy into playful, cooperative activities.
  arts: Adriana Casas spends afternoons finger‑painting with bold colors, sings along to Disney’s “Let It Go” from Frozen, and claps enthusiastically at live puppet shows at the local children’s theater,
    letting music and visual art fuel her boundless imagination.
  travel: Adriana Casas loves weekend trips to the nearby zoo, beach sandcastle building excursions, and the dazzling lights of the city’s children’s museum, preferring short car rides with sing‑along playlists
    over long flights, and dreams of seeing the Eiffel Tower on a future family vacation.
  culinary: Adriana Casas favors buttery macaroni and cheese, crunchy carrot sticks, and bright strawberry slices, proudly helps stir batter for banana muffins, and insists on sprinkling dinosaur‑shaped
    crackers onto her plate for extra fun.
  core: Adriana Casas is a radiant three‑year‑old who blends curiosity, talkativeness, and compassion into a whirlwind of imaginative play, generous sharing, and occasional glitter‑covered messes.
background:
  cultural: Adriana is being raised in a bilingual Spanish-English household by parents of Spanish descent who maintain cultural traditions from Spain. She regularly hears Spanish lullabies, enjoys dishes
    like paella at family gatherings, and celebrates holidays such as Dia de los Reyes and Semana Santa with simple customs appropriate for a toddler. Living in Keystone Heights, Florida, she also experiences
    the warm subtropical environment, often playing outdoors and learning about local wildlife, which blends her Spanish roots with the Floridian way of life.
