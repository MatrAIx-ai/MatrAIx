  career_goals: Adriana often pretends to be a teacher or an artist. She loves showing her drawings to adults and enjoys helping her doll friends feel better when they are sad. When she grows up, she says
    she wants to be a preschool teacher so she can share stories, sing songs, and make other kids happy, or an artist so she can create beautiful pictures that bring joy. She also mentions wanting to be
    a caring person who helps animals, reflecting her compassionate nature.
