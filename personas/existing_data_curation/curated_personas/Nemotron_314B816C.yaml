  hobbies: '[''Photography'', ''Hiking'', ''Visiting art galleries'', ''Live theater'', ''Community theater volunteering'', ''DIY electronics'', ''3D printing'', ''Cooking (Mexican and Mediterranean cuisines)'',
    ''Wine tasting'', ''Chess club'', ''Attending tech meetups'', ''Mentoring STEM outreach'']'
  career_goals: Jeffrey aims to re-enter the workforce as a consultant specializing in data-driven decision making for non-profits and community arts organizations. He aspires to mentor emerging engineers
    and scientists through local STEM outreach programs and to establish a makerspace in La Mesa that blends technology and artistic expression. In the long term, he hopes to author a book that explores
    the intersection of scientific methodology and creative practice, and to serve on the board of a regional arts council.
