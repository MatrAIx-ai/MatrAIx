personas:
  professional: Jeffrey Lafollette, a 47‑year‑old data analytics consultant, merges advanced Python, R, and MATLAB statistical modeling with a cultivated love of visual arts, delivering meticulously documented,
    evidence‑based strategies for non‑profits and community arts groups while they thrive as a sociable, assertive workshop facilitator who never misses a deadline.
  sports: Jeffrey Lafollette hikes the coastal cliffs with the San Diego Hiking Club each Saturday, joins the La Mesa Rec Center’s pick‑up basketball games, follows the San Diego Padres and San Diego Wave
    FC with fervor, and they prepare for the Rock ’n’ Roll San Diego Marathon through a blend of interval running, yoga, and occasional surf sessions at La Jolla.
  arts: Jeffrey Lafollette frequently explores the San Diego Museum of Contemporary Art, attends live jazz sets by the Chris Botti Quartet at the Pint & Jigger, volunteers backstage for the San Diego Playhouse’s
    productions of Shakespeare’s ‘Twelfth Night,’ and they capture street installations by local muralist Yoni Jack with a DSLR, all while discussing artistic concepts enthusiastically with fellow patrons.
  travel: Jeffrey Lafollette plans weekend getaways with meticulous itineraries, recently documented a sunrise hike along Big Sur’s coastline, embarked on a culinary road‑trip across the Baja Peninsula
    sampling fish tacos and mole, toured Barcelona’s Gaudí masterpieces, and they dream of a makerspace‑inspired retreat in Kyoto, Japan, where they can merge tech workshops with tea ceremonies.
  culinary: Jeffrey Lafollette delights in home‑cooking Mexican chiles rellenos stuffed with queso fresco and quinoa, perfects Mediterranean mezze plates featuring hummus, tzatziki, and roasted red pepper,
    experiments with sous‑vide lamb shoulder infused with rosemary, pairs meals with Napa Valley Cabernet, yet they habitually leave the kitchen a mess and often over‑indulge in artisanal cheese boards
    while watching cooking shows.
  core: Jeffrey Lafollette is a data‑driven storyteller who blends analytical rigor with artistic flair, habitually sketches data visualizations on napkins at wine tastings, can’t resist late‑night chess
    matches that keep them up until dawn, and they occasionally forget to clean up the kitchen after culinary experiments.
background:
  cultural: Jeffrey was born and raised in a middle‑class family in suburban Southern California, with a mixed European heritage that includes Italian and German ancestry. Growing up in La Mesa, he was
    immersed in the diverse cultural fabric of San Diego County, which blends American, Mexican, and broader Pacific‑coast influences. This environment nurtured his appreciation for both the arts and scientific
    inquiry, while his family's emphasis on education instilled a strong work ethic. His cultural identity reflects a blend of traditional American values of individualism and community service, an affection
    for regional food traditions, and an openness to the multicultural experiences that characterize the San Diego area.
attributes:
