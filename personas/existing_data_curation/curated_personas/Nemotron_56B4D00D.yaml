personas:
  professional: Mayra Acevedo, a seasoned community elder and volunteer caregiver, leverages decades of budgeting, gardening, and culinary expertise to coordinate the senior outreach program at their parish;
    they prefer predictable routines while flexibly adapting to last‑minute needs, and their skeptical yet competitive nature ensures resources are allocated efficiently.
  sports: Mayra Acevedo enjoys leisurely morning walks to the local market and participates in a weekly senior walking group that cheers on the Rio Grande Valley FC Toros, and they occasionally tune in
    to watch the Dallas Cowboys on Sundays and the Houston Astros during baseball season, reflecting a low‑impact but spirited approach to staying active.
  arts: Mayra Acevedo immerses themselves in regional music, often playing recordings of Vicente Fernández and Los Tigres del Norte while crocheting, enjoys telenovelas such as 'La Reina del Sur' with church
    friends, and they help set up Día de los Muertos altars featuring papel picado, highlighting how cultural arts shape their evenings.
  travel: Mayra Acevedo prefers short, purposeful trips, frequently crossing the border to visit family in Reynosa for Día de Los Muertos celebrations, dreaming of a leisurely tour of Oaxaca’s culinary
    markets, but they often limit travel to nearby San Antonio for its historic missions due to budget constraints and a desire for familiar surroundings.
  culinary: Mayra Acevedo, an expert in tamales, pozole, and enchilada verde, skillfully harvests home‑grown chilies, cilantro, and tomatoes to craft sauces with chiles de árbol and epazote, and they sometimes
    forget to label their homemade salsa jars, leading to occasional surprise spice levels for unsuspecting guests.
  core: Mayra Acevedo blends steadfast routine with spontaneous generosity, wielding a garden‑to‑table philosophy and a competitive streak in Sunday bridge games, and they occasionally misplace their keys
    and forget to water a few herb pots.
background:
  cultural: Mayra was born and raised in the Mexican‑American community of Pharr, Texas, in the Lower Rio Grande Valley. Her family upholds strong Mexican cultural traditions, including Catholic celebrations
    such as Día de los Muertos and Las Posadas, the use of Spanish as the household language, and a rich culinary heritage. Growing up in a modest, close‑knit household taught her the importance of family
    bonds, community support, and resilience. The cross‑border ties between Mexico and Texas, along with the blend of Mexican customs and Texan influences, shape her worldview and daily life.
attributes:
