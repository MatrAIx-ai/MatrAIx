  hobbies: '[''Cooking traditional Puerto Rican cuisine'', ''Salsa dancing'', ''Urban gardening'', ''Walking/hiking in Pelham Bay Park'', ''Bilingual book club'', ''Mentoring youth in business and finance'',
    ''Yoga'']'
  career_goals: Noel aims to progress to a senior procurement director role where she can shape enterprise‑wide sourcing strategies and embed sustainability criteria into supplier contracts. She is passionate
    about expanding supplier‑diversity initiatives that support small businesses in the Bronx and Puerto Rican communities. Mentorship is a key ambition; she plans to formalize a mentorship program for
    emerging procurement professionals, especially women and minorities. Looking ahead, Noel envisions launching a boutique consulting practice focused on risk‑aware procurement and cultural competency
    in supply chains, leveraging her bilingual skill set and deep industry experience.
