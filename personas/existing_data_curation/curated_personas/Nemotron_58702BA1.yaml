  career_goals: Teresa aspires to advance to a senior lead estimator role, overseeing multi‑million‑dollar projects that incorporate green building and renewable energy components. She plans to obtain the
    Certified Cost Professional (CCP) credential from AACE International and leverage that expertise to mentor a new generation of estimators within her firm. Long‑term, she envisions founding her own consulting
    practice that blends cost estimation with educational workshops, helping contractors adopt sustainable cost‑management strategies while fostering a supportive learning environment. Balancing her professional
    drive with personal well‑being, Teresa also aims to implement flexible work arrangements that reduce stress and allow more quality time with her family and community.
