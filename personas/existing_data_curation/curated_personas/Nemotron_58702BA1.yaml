personas:
  professional: Teresa Coltrane, a seasoned cost estimator with a talent for integrating sustainable construction practices into meticulous budget models, utilizes ProEst, Sage Estimating and BIM‑linked
    analytics while they train junior staff through lively workshops, balancing strict organization with the flexibility to pivot estimates as project scopes shift.
  sports: Teresa Coltrane stays active by hiking the Blue Ridge Parkway in spring, playing mixed‑age tennis at the local community club, cheering for the Nashville Predators and the Tennessee Volunteers,
    and they occasionally join a weekend softball league, all while balancing a love for rhythmic folk dancing at regional festivals as a low‑impact cardio outlet.
  arts: Teresa Coltrane immerses themselves in the arts by painting watercolor landscapes of the East Tennessee hills, photographing sunrise vistas on weekend treks, attending gallery openings featuring
    artists like Georgia O’Keeffe and Ansel Adams retrospectives, and supporting community theater productions of ‘Our Town,’ while they also craft pottery pieces inspired by Appalachian folk motifs.
  travel: Teresa Coltrane plans trips with the same precision as a cost estimate, favoring weekend getaways to the Great Smoky Mountains, cultural stops in Asheville’s art district, culinary tours of New
    Orleans’ Creole cuisine, and dreaming of a summer hike through Patagonia, blending structured itineraries with spontaneous detours whenever a local festival appears, and they often adjust plans on the
    fly when new opportunities arise.
  culinary: Teresa Coltrane delights in cooking Southern‑inspired meals such as shrimp and grits, collard greens flavored with smoked ham hocks, and peach cobbler using heirloom fruit from their garden,
    skillfully blending fresh produce with pantry staples like buttermilk and cornmeal, while they also experiment with homemade pottery plates for presenting their dishes.
  core: Teresa Coltrane, a 50‑year‑old cost‑estimation specialist who balances spreadsheets with watercolor brushes, worries about every detail yet thrives on community gatherings, and they secretly collect
    vintage thrift‑store mugs for artistic inspiration.
background:
  cultural: Teresa was raised in a close‑knit Appalachian community in East Tennessee, where Southern hospitality and a strong sense of family are central values. Her family traditions include church involvement,
    weekly gatherings with extended relatives, and a love for Appalachian folk music and storytelling. She grew up surrounded by the natural beauty of the Great Smoky Mountains, fostering an appreciation
    for outdoor activities and sustainable living. While her heritage is primarily of Scotch‑Irish and German descent, Teresa embraces the diverse cultural influences of her region, from traditional bluegrass
    to contemporary Southern cuisine. This background informs her community‑oriented outlook, her respect for tradition, and her curiosity about blending classic crafts with modern innovations.
attributes:
