personas:
  professional: Monica Ruiz, a meticulous office clerk with a knack for data entry and bilingual client communication, leverages their organized, curious nature to streamline workflows and eagerly prepares
    for an office manager role.
  sports: Monica Ruiz, an enthusiastic hiker and salsa-dance enthusiast, spends weekends trekking the nearby ridge trails, plays forward for a co-ed recreational soccer team in the city league, and follows
    the Los Angeles Lakers and the New York Yankees for seasonal sports thrills.
  arts: Monica Ruiz immerses herself in the arts by curating Instagram reels of her favorite contemporary painter Kehinde Wiley, attending live salsa sets featuring local band La Sonora, and collecting
    prints by street artist Banksy to decorate her apartment.
  travel: Monica Ruiz favors spontaneous road trips to nearby mountain towns, dreams of exploring the colorful streets of Cartagena and the historic souks of Marrakech, and carefully plans annual spring
    escapes to the Mediterranean islands of Santorini, balancing travel with a modest budget.
  culinary: Monica Ruiz delights in cooking fragrant island rice with pigeon peas, crispy plantain tostones, and savory sofrito, showcasing a practiced hand at simmering beans and marinating meats while
    they host weekly dinner gatherings for friends.
  core: Monica Ruiz is a curiosity-driven, organized social butterfly whose love of art, salsa rhythms, and meticulous planning blends with occasional coffee-shop splurges and a habit of over-scheduling
    their calendar.
background:
  cultural: Monica’s Puerto Rican heritage is a core part of her identity. Raised in a bilingual household, she grew up celebrating island traditions such as Nochebuena, Día de los Reyes, and the vibrant
    rhythms of bomba and plena. Family gatherings often revolve around sharing stories, music, and food, instilling a strong sense of community and pride in her roots. Living in Buford, GA, Monica blends
    these cultural values with Southern hospitality, actively participating in local Latino festivals and serving as a cultural bridge between her community and the broader region. Her background informs
    her language skills, culinary interests, and her desire to promote inclusive cultural initiatives.
