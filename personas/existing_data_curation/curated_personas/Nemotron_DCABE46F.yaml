  career_goals: Monica aims to advance from her current clerical role to an office manager position within the next three years. She plans to earn a Certified Administrative Professional (CAP) credential
    and enroll in an associate degree program in Business Administration. Long‑term, she envisions a career in operations or community outreach where she can blend her organizational strengths with her
    passion for the arts and Puerto Rican culture, potentially serving as a program coordinator for a cultural nonprofit or an arts center. She also hopes to develop project management skills and lead initiatives
    that foster inclusive community events.
