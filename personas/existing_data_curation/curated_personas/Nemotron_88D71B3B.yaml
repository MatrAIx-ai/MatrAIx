  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Reading contemporary fiction and art history'', ''Listening to design and psychology podcasts'', ''Journaling'',
    ''Hiking in the surrounding mountains'', ''Practicing yoga'', ''Indoor gardening'', ''Participating in a small book club'', ''Volunteering for community art fairs'']'
  career_goals: Christina aims to earn a bachelor's degree in business administration within the next three years, complemented by a Certified Administrative Professional (CAP) credential. She envisions
    progressing to senior operations manager within her organization, overseeing multiple departments. Long‑term, she hopes to integrate her love of art by directing community cultural programs or managing
    a small art gallery, using her administrative expertise to support local artists and foster cultural engagement. She also aspires to mentor young professionals, especially women, in small‑town settings,
    encouraging them to pursue leadership roles.
