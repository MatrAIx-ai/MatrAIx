persona_description: A UCLA scientist working on stem cell gene therapy for HIV infection, specifically focusing on genetically modifying blood-forming stem cells to express chimeric antigen receptors (CARs)
  that target HIV-infected cells. His research is part of a larger effort to develop a life-long, functional cure for HIV infection through the use of patient's own stem cells engineered to produce HIV-specific
  CAR T cells that can destroy existing and new HIV-infected cells. His work has been profiled in the Daily Beast and funded by the California Institute for Regenerative Medicine (CIRM) through a series
  of awards, including a $1.7 million CIRM Discovery Stage Quest award.
