persona_description: 'A scientist who specializes in the study of climate change and environmental change in the Mediterranean region. Prof. Manfred Lange is a member of the Cyprus Institute and serves
  as the Future Earth MENA Regional Center. He has been involved in the MedECC initiative since its inception in 2015 and has provided insights and perspective on climate change in Eastern Mediterranean
  countries. He has also been functioning as the Future Earth MENA Regional Center, and serves as the Regional Node for two of the Future Earth Global Research Projects: the Global Land Project and the
  Integrated Land Ecosystem-Atmosphere Processes Study. He is known for his work in engaging in initiatives with a regional focus and emerging regional centers for Climate Change research and sustainability,
  which enable a refinement of the scientific basis for climate and environmental challenges in the region and facilitate an effective interface between science and policy making.'
