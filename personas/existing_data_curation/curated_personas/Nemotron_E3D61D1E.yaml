  hobbies: '[''Cooking traditional Mexican meals'', ''Gardening'', ''Quilting and embroidery'', ''Church choir participation'', ''Listening to mariachi and norteño music'', ''Watching telenovelas'', ''Evening
    walks'', ''Attending cultural festivals and community fairs'']'
  career_goals: While not seeking formal employment, Imelda aims to deepen her role as a cultural custodian and community mentor. She plans to document her family's recipes in a handwritten cookbook, obtain
    her GED for personal fulfillment, and start a modest home‑based catering service specializing in authentic Mexican dishes for neighborhood events. Additionally, she hopes to enter a local cooking competition
    to benchmark her skills, and to mentor teens at the community center by teaching practical life‑skills and sharing cultural heritage.
