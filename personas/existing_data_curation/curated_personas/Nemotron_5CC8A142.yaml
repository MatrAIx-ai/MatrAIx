  career_goals: Jonathan aims to reposition his company as a regional leader in sustainable manufacturing through digital transformation and circular‑economy practices. Over the next five years he plans
    to expand into adjacent markets, reduce the firm’s carbon footprint, and build resilient supply chains after navigating past economic downturns. He aspires to mentor emerging executives, transition
    to a board‑level role, and launch a philanthropic foundation focused on STEM education and arts enrichment in Appalachia. Ultimately, he dreams of authoring a book that blends analytical rigor with
    creative vision in corporate leadership.
