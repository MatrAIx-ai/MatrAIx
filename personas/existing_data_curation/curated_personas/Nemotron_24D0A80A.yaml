  hobbies: '[''Golf'', ''Competitive Chess'', ''Bridge'', ''STEM Outreach Volunteering'', ''Gardening'', ''Museum Visits'', ''Science Popular Reading'', ''Community Planning Meetings'']'
  career_goals: Although officially retired, Ali aims to channel his expertise into mentorship and community impact. He plans to establish a scholarship fund for local high school students pursuing STEM,
    volunteer as a mentor for senior engineering interns at nearby tech firms, and author a practical guide on bridging theory and real-world engineering applications. He also aspires to serve on the Potomac
    community planning commission, using his analytical skills to shape sustainable neighborhood initiatives. Ultimately, Ali seeks to stay intellectually active, contribute to the next generation of innovators,
    and maintain a visible, influential presence in his community.
