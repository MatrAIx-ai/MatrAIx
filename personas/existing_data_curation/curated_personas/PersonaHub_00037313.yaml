persona_description: A musicologist who specializes in the study of Byzantine hymn-writings and the technique of adapting melodies to the words of hymns. His research interests include the structure and
  the union between the music and the words in hymns, the technique of setting lines to music, and the analysis of the musical accent and metrical accent in Byzantine poetry. He has a keen eye for detail
  and a strong understanding of the principles of harmony and rhythm, which he uses to analyze and interpret the musical and poetic elements in the hymns.
