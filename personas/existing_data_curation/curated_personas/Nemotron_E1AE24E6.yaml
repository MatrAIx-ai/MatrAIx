  hobbies: '[''home improvement projects'', ''watercolor painting'', ''interior design sketching'', ''gardening (native plants)'', ''historical home tours'', ''DIY woodworking'', ''cooking Southern cuisine'',
    ''reading design & architecture books'', ''puzzle solving'', ''local book club'']'
  career_goals: In the next five years, Melissa aims to transition from employee to owner‑operator of a boutique painting and restoration company that specializes in historic homes in Montgomery. She plans
    to obtain the EPA Lead‑Safe Certified Renovator credential, complete a small‑business management course, and add eco‑friendly paint products to her service line. Her long‑term ambition is to become
    a recognized expert in sustainable finishing techniques and to mentor other women entering the trades, while maintaining a balanced schedule that supports her family life.
