  career_goals: Martin imagines a future where he can blend his love for art and invention. He often talks about becoming an artist who designs whimsical illustrations, an inventor who creates fun gadgets,
    or an explorer who discovers new places in nature. He also expresses a desire to help animals, hinting at aspirations to become a veterinarian. At his age, his ambitions are shaped by his curiosity
    and his wish to make others smile through creativity.
