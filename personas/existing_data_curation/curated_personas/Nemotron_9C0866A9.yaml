  hobbies: '[''Visiting Art Galleries'', ''Street Photography'', ''Live Music and Theater'', ''Reading Philosophy and Psychology'', ''Board Games (Chess, Settlers of Catan)'', ''Trivia Competitions'', ''Running'',
    ''Gym Workouts'', ''Collecting Art Prints'', ''Volunteering at Community Arts Festivals'']'
  career_goals: Michael aims to transition from retail salesperson to store manager within the next two years, eventually advancing to district or regional manager overseeing multiple locations. He is pursuing
    a bachelor’s degree in Marketing to broaden his strategic skill set. Leveraging his love of art, he envisions opening a boutique that blends contemporary art with curated retail experiences, featuring
    local artists and limited‑edition merchandise. In the interim, he seeks to become a top‑performing trainer, mentoring colleagues to achieve high sales benchmarks and fostering a competitive yet supportive
    team culture.
