persona_description: A scientist and astrophysicist who specializes in exoplanet research, particularly in the study of small, rocky exoplanets that orbit distant stars. She has expertise in using the Kepler
  space telescope to detect and study these exoplanets, and has published numerous papers on her findings. She is known for her meticulous attention to detail and her ability to identify and analyze subtle
  patterns in data. She is also interested in the technical definition of when an object can be called a true planet and when it's relegated to the second-class status of "dwarf planet," and has written
  about this topic in her research.
