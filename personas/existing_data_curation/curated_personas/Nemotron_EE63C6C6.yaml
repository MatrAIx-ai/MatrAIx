personas:
  professional: David Dominguez, a 39‑year‑old teaching assistant in business administration, blends rigorous financial modeling and data visualization with a creative infusion of art concepts to design
    interdisciplinary curricula and mentor students, positioning themselves for a tenure‑track faculty role that merges curiosity, kindness, and resilience.
  sports: David Dominguez, an avid tennis player at the Jacksonville Community Club, follows the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp, organizes weekly mixed‑doubles matches, incorporates
    morning jogs along the St. Johns River into their fitness regimen, and occasionally skips workouts after late‑night video‑editing marathons, balancing flexibility with reliability.
  arts: David Dominguez, a frequent patron of the Cummer Museum, regularly attends performances of "Hamilton" at the Florida Theatre, participates in improv comedy workshops at the Jacksonville Improv Collective,
    and draws inspiration from artists like Georgia O'Keeffe, Ai Weiwei, and the music of Radiohead for interdisciplinary class projects, reflecting their open‑minded appreciation for unconventional ideas.
  travel: David Dominguez prefers curated, culture‑rich itineraries, having explored the historic streets of Barcelona, the coastal villages of the Amalfi Coast, and weekend road trips to Savannah, Georgia,
    while balancing travel around academic calendars and using a points‑based airline credit card to fund Mediterranean‑inspired culinary explorations, showcasing their sociable curiosity and organized
    flexibility.
  culinary: David Dominguez, a self‑taught home chef, delights in preparing Mediterranean dishes such as grilled branzino with za'atar, spinach‑and‑feta spanakopita, and classic paella, often pairing them
    with a crisp Albariño, regularly experiments with seasonal Florida ingredients like key lime and fresh mango in dinner parties, and uses their talkative nature to turn meals into lively gatherings.
  core: David Dominguez is a sociable, calm, and curiosity‑driven academic who fuses art and business, balances disciplined finances with occasional indulgences, stays active through tennis, and enriches
    their life with Mediterranean cooking, improv humor, and culturally immersive travel.
background:
  cultural: David grew up in a suburban enclave of Jacksonville with a family heritage that blends Anglo‑American traditions and Spanish roots reflected in his surname. Raised in a bilingual household,
    he speaks conversational Spanish and celebrates both Fourth of July barbecues and traditional Spanish festivals, which nurtured his appreciation for diverse cultural expressions. Living in Ponte Vedra,
    an affluent coastal community, he embraces the region’s focus on outdoor activities, community involvement, and a thriving local arts scene, all of which shape his inclusive, harmonious, and culturally
    curious outlook.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Business Research'', ''Financial Modeling'', ''Strategic Planning'', ''Data Analysis (Excel, Tableau, Python)'', ''Project Management'',
    ''Public Speaking'', ''Facilitation'', ''Conflict Resolution'', ''Student Mentorship'', ''LMS Administration (Canvas, Blackboard)'', ''Video Editing'', ''Art Integration in Business Education'']'
  hobbies: '[''Visiting art museums and galleries'', ''Photography'', ''Playing tennis'', ''Hosting dinner parties with Mediterranean cuisine'', ''Improv comedy workshops'', ''Mentoring youth entrepreneurship
    programs'', ''Reading business and creativity literature'', ''Traveling to cultural festivals'', ''Listening to design thinking and art podcasts'', ''Beach jogging and paddleboarding'']'
  career_goals: David aspires to transition from a teaching assistant to a tenure‑track faculty position in business administration within the next five years, focusing on interdisciplinary courses that
    merge creativity, design thinking, and entrepreneurship. He intends to publish research on the impact of artistic practices on innovative business strategies and to secure grants for a campus‑wide initiative
    that pairs art students with business majors on collaborative projects. Long‑term, he envisions taking on a senior academic leadership role, such as department chair or associate dean, while also launching
    a consultancy that helps startups embed artistic perspectives into their branding and product development.
