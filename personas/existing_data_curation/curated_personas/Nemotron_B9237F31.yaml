  hobbies: '["Fishing at Sam Rayburn Reservoir","Reading historical non‑fiction and classic literature","Woodworking","Gardening (tomatoes and herbs)","Barbecue grilling","Playing chess in a local club","Church
    community service"]'
  career_goals: Roberto aims to become a Certified Public Accountant (CPA) within the next two years and then progress to a senior auditor role at his firm. In the medium term, he hopes to manage a regional
    audit team, overseeing small‑to‑mid‑size client portfolios in East Texas. His long‑term ambition is to open his own boutique accounting practice in Lufkin, serving local family‑owned businesses and
    providing reliable, personalized financial guidance. He also plans to deepen his expertise in Texas state tax law through continuing education and to earn an MBA to broaden his strategic leadership
    capabilities, while maintaining a stable work‑life balance for his family.
