    cybersecurity hygiene (malware removal, password policies)","Problem‑solving with creative technical workarounds","Empathetic user support"]'
  hobbies: '["Digital illustration and AI‑generated art","Reading sci‑fi and fantasy novels","Creative short‑story writing","Board‑game nights and tabletop gaming","Community theater and open‑mic events","Hip‑hop
    and African dance workshops","Singing in church choir","Volunteering at STEM outreach programs","Cooking Southern comfort food","Hiking and nature walks","Gardening","Weekend road trips with spouse"]'
  career_goals: Short‑term, Lavita aims to earn certifications such as CompTIA Network+, Security+, and Cisco CCNA to deepen her networking and security expertise and move into a senior support engineer
    role. She also plans to develop her project management skills by pursuing an ITIL Practitioner credential. Long‑term, she envisions transitioning into an IT project management or solutions architecture
    position where she can blend her technical acumen with her imaginative flair to design user‑centric technology solutions. Lavita is passionate about giving back to her community, so she hopes to lead
    a mentorship program that introduces STEM and technology careers to under‑represented youth in Powder Springs, eventually establishing a boutique consulting firm that supports creative professionals
    with tech infrastructure and digital workflow optimization. Throughout her career journey, she seeks workplaces that prioritize mental‑health awareness and collaborative culture to support her emotional
    well‑being.
