personas:
  professional: Lavita Lang is a 27‑year‑old computer support specialist who leverages deep troubleshooting expertise across Windows, macOS, and Linux, coupled with PowerShell and Bash automation, to craft
    imaginative IT solutions while translating complex technical concepts into friendly, relatable explanations that keep users calm and engaged, and they thrive on turning abstract problems into clear,
    actionable steps.
  sports: Lavita Lang fuels their love for movement by hiking the Kennesaw Mountain Trail with a local outdoor club, cheering on the Atlanta Falcons, Hawks, and Braves, and attending weekly community yoga
    classes that blend hip‑hop rhythm with African dance moves, while they also enjoy casual soccer matches with friends on weekend evenings.
  arts: Lavita Lang channels their vivid imagination into digital illustration on an iPad Pro using Procreate, experiments with Midjourney AI to generate sci‑fi landscapes inspired by Octavia Butler and
    Neil Gaiman, sings soul‑rich harmonies in a church choir, and regularly performs spoken‑word pieces at open‑mic nights, all while they draw creative inspiration from Beyoncé’s visual albums and the
    kinetic energy of Lin‑Manuel Miranda’s musical storytelling.
  travel: Lavita Lang plans weekend road trips that weave together Southern charm and artistic discovery, such as wandering the historic streets of Savannah, tasting the spice markets of New Orleans, hiking
    the Blue Ridge Parkway near Asheville, and dreaming of an immersive art residency in Kyoto, Japan, all while they balance a modest travel budget and coordinate itineraries with their spouse via shared
    Google Docs.
  culinary: Lavita Lang loves cooking soulful Southern dishes—like buttermilk‑fried chicken, shrimp and grits with smoky Andouille sausage, collard greens simmered with ham hocks, and sweet‑potato pie—using
    staple ingredients such as hot sauce, smoked paprika, and pecans, and they often experiment with AI‑generated recipe tweaks to give traditional meals a futuristic spin, though they sometimes over‑season
    when stressed.
  core: Lavita Lang is a technically savvy yet wildly imaginative 27‑year‑old who blends code, canvas, choir, and community service into a vibrant life, while riding waves of anxiety that both spark creative
    bursts and provoke occasional impulsive spending and missed appointments, and they constantly seek balance through mindfulness and artistic expression.
background:
  cultural: Lavita is a Black woman raised in Powder Springs, Georgia, where she was immersed in a tight‑knit African‑American Southern community. Her family traditions emphasize warmth, storytelling, and
    collective support, with weekly gatherings anchored by gospel music, Southern cooking, and celebrations of milestones. The local church has been a cornerstone of her upbringing, shaping her values of
    kindness, cooperation, and service to others. She grew up hearing stories of the civil‑rights movement in the South, fostering a deep appreciation for resilience and social justice. Cultural festivals
    such as Juneteenth parades and local art fairs have nurtured her love for Black art, music, and dance, influencing both her aesthetic sensibilities and her commitment to uplifting under‑represented
    voices. This heritage informs her collaborative work style, her dedication to community mentorship, and her blend of technical expertise with creative expression.
attributes:
  skills: '["Hardware troubleshooting","Software installation and configuration","Operating system administration (Windows, macOS, Linux)","Network diagnostics and configuration","Remote support tools (TeamViewer,
