personas:
  professional: Johnathan Perry, a 63‑year‑old logistics veteran with four decades of hands‑on experience in SAP WM and Fishbowl, applies their methodical inventory‑control expertise and OSHA‑savvy safety
    mindset to draft precise SOPs and mentor younger staff, all while maintaining the familiar rhythm of his Baltimore warehouse and humming classic blues in the workshop.
  sports: Johnathan Perry follows the Baltimore Orioles and Ravens with unwavering loyalty, joins a senior pickleball league at the community center every Tuesday, maintains their fitness through daily
    walks along the Inner Harbor and weekend fishing trips on the Chesapeake Bay, and enjoys friendly debates about the local soccer club with their chess mates.
  arts: Johnathan Perry immerses themselves in classic jazz and blues, spinning records by Muddy Waters, Louis Armstrong, and John Coltrane while singing in their Baptist church choir, collects vintage
    vinyl, and regularly reads historical biographies of figures like Theodore Roosevelt, finding inspiration for their woodworking projects.
  travel: Johnathan Perry prefers meticulously planned road trips, revisiting historic sites such as Williamsburg and Shenandoah, dreaming of a New Orleans jazz pilgrimage, and enjoys weekend fishing getaways
    to the Eastern Shore, all while balancing a modest retirement budget that respects the financial goals they have set.
  culinary: Johnathan Perry delights in cooking Maryland crab cakes and grilled trout seasoned with dill and Old Bay, perfects their signature butter sauce, regularly batches homemade pickles, and, despite
    careful recipes, their tendency to over‑salt sometimes surprises their guests.
  core: Johnathan Perry is a methodical, community‑focused logistics expert whose disciplined routine fuels a love for early‑morning fishing, garden care, classic blues, and quiet mentorship, though they
    occasionally over‑indulge in vintage vinyl hunting.
background:
  cultural: Johnathan grew up in Baltimore’s historic African-American neighborhoods, where community, church, and family were central pillars. His upbringing was shaped by the city’s maritime heritage
    and the strong tradition of soul food, gospel music, and civil‑rights activism. He maintains close ties with the local Black community, attending the annual Baltimore African American Heritage Festival
    and supporting neighborhood initiatives. These cultural experiences have instilled in him a deep respect for tradition, a practical outlook, and a commitment to giving back through mentorship and volunteer
    work.
attributes:
  skills: '[''Inventory Management'', ''Shipping and Receiving'', ''Warehouse Management Systems'', ''Data Entry'', ''Microsoft Excel'', ''Safety Compliance'', ''Forklift Operation'', ''Vendor Coordination'',
