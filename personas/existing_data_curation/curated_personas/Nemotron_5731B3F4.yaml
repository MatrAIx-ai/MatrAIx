  hobbies: '[''Fishing'', ''Gardening'', ''Woodworking'', ''Jazz and Blues Music'', ''Reading Historical Biographies'', ''Church Choir Participation'', ''Walking the Inner Harbor'', ''Playing Chess'']'
  career_goals: Approaching retirement, Johnathan aims to secure a stable financial future while leveraging his expertise to mentor younger workers. He plans to obtain a Certified Supply Chain Professional
    credential and transition into a senior logistics consultant role within his current company or a local nonprofit, such as a food‑bank distribution center. He also hopes to streamline inventory processes
    before stepping down, ensuring a smooth handover, and to allocate more time to family and community involvement in Baltimore.
