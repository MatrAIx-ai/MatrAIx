  career_goals: She aims to become a senior process engineer within the next five years, leading a small team focused on developing specialty chemicals for the growing biotech sector in the Southeast. Securing
    her Professional Engineer (PE) license and a Certified Safety Professional (CSP) credential are top priorities, as they will cement her credibility and allow her to influence plant safety culture. Although
    she values routine, she seeks roles that balance predictable operations with opportunities to tackle novel technical challenges, satisfying her competitive drive. Long‑term, she envisions transitioning
    into a plant‑manager track where she can embed a culture of practical safety and efficiency while maintaining a supportive environment for her own emotional well‑being.
