personas:
  professional: Anabel Muniz, a one‑year‑old budding explorer in the field of early childhood sensory development, demonstrates emergent problem‑solving skills through cause‑and‑effect play with stacking
    rings, and their curious, flexible nature lets them shift effortlessly between colorful picture books and free‑form tactile experiments.
  sports: Anabel Muniz, a one‑year‑old who delights in crawling across the living‑room rug and tumbling in weekly parent‑and‑baby gymnastics classes at the community center, enthusiastically cheers for
    the local minor league baseball team, the Springfield Sluggers, during family outings, and treats each trip to the park as a mini‑fitness adventure.
  arts: Anabel Muniz, a one‑year‑old lover of bright visual art, is enchanted by Eric Carle’s vivid picture books, sways to The Wiggles’ upbeat songs, and enjoys the animated short "Feathers," weaving these
    artistic experiences into their daily playtime.
  travel: Anabel Muniz, a one‑year‑old curious explorer, prefers relaxed stroller excursions to the nearby botanical garden and the sea‑spray of the Monterey Bay Aquarium over rigid itineraries, and dreams
    of future trips to the colorful streets of Barcelona, guided by their parents’ flexible travel style.
  culinary: Anabel Muniz, a one‑year‑old with an adventurous palate, adores mashed sweet potatoes, banana‑flavored oatmeal, and avocado puree, often smearing these dishes with extra avocado or banana slices,
    while their parents delight in offering tiny bites of steamed carrots and rice cereal.
  core: Anabel Muniz, a one‑year‑old curious explorer, blends a love for bright colors, tactile discovery, and whimsical music into a delightfully disorganized yet deeply engaging world.
background:
  cultural: Anabel is raised in a Cuban‑American household in Fort Lauderdale. Her family celebrates Cuban traditions, speaks Spanish at home, and fills her environment with Caribbean music, art, and cuisine.
    This cultural richness shapes her early experiences, from dancing to salsa rhythms to tasting sweet plantain purées, fostering a deep appreciation for her heritage.
