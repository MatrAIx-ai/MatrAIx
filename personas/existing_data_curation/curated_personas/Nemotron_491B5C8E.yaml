  hobbies: '["gardening", "quilting", "cooking traditional recipes", "church choir", "volunteering at local hospice", "walking club", "listening to classic country music", "crossword puzzles", "attending
    community potlucks", "birdwatching"]'
  career_goals: Although retired from paid employment, Casey aims to deepen her involvement in the local church and senior center by leading a volunteer outreach program that connects isolated seniors with
    community resources. She hopes to create a weekly “Harmony Circle” where neighbors can share meals, exchange skills, and support one another, fostering a sense of belonging that mitigates her own anxiety.
    Additionally, she aspires to document and teach her family’s traditional recipes and craft techniques to her grandchildren, preserving cultural heritage while reinforcing intergenerational bonds.
