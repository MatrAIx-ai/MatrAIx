  career_goals: Maudie aims to move into a supervisory role within the Rockford Area Bus Services, targeting a senior dispatcher or operations manager position where she can shape policy, improve safety
    standards, and mentor new drivers. She plans to complete her bachelor’s degree in Transportation Logistics through evening courses at a nearby community college. Additionally, she aspires to obtain
    a Certified Transit Professional (CTP) credential and eventually launch a small charter-bus service that focuses on weekend trips to regional attractions. Long-term, she hopes to serve on the local
    transit authority board to advocate for expanded, rider-focused services across Boone County.
