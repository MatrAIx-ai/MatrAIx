  career_goals: He aims to transition from informal artistic work to a recognized professional muralist and community arts facilitator in Del Rio. Over the next few years he plans to obtain his GED and
    enroll in a local community-college certificate program in fine arts, allowing him to refine his technique and gain credentials. He envisions establishing a small community studio where he can teach
    mural techniques, host art-therapy workshops for at-risk youth, and organize cultural events. By securing commissions from local businesses and selling prints of his work, he hopes to generate a sustainable
    income while preserving and celebrating Mexican-Texan heritage. Ultimately, Juan wants his creative practice to serve as a conduit for personal stress management and communal empowerment.
