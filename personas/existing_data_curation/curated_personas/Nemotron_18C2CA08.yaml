personas:
  professional: Juan Botero, a self‑taught muralist and community arts facilitator in Del Rio, blends vibrant street visuals with bilingual storytelling, balancing meticulous planning and spontaneous creativity
    to turn public walls into collaborative canvases while pursuing a fine‑arts certificate to secure a sustainable professional path.
  sports: Juan Botero, an avid weekend hiker, joins the Hill Country Trail Crew for weekly treks, plays pickup basketball at the Del Rio Community Center, follows the Texas Rangers on baseball season, and
    cheers on the Dallas Cowboys during fall, keeping a modest fitness routine alongside a busy artistic schedule.
  arts: Juan Botero, whose creative repertoire spans mural painting, street‑level sketching, acoustic guitar, and poetry, draws stylistic inspiration from Diego Rivera’s monumental narratives, Banksy’s
    subversive stencils, and the lyrical depth of Octavio Paz, while performing cover renditions of Woody Guthrie and John Denver at local folk festivals.
  travel: Juan Botero, a spontaneous traveler who prefers low‑cost road trips over elaborate itineraries, has explored the desert art scene of Marfa, the historic plazas of San Miguel de Allende, the culinary
    markets of Austin, and dreams of a solo backpack trek across Patagonia’s Patagonian steppe, always returning home with fresh visual ideas for new murals.
  culinary: Juan Botero, a home‑cook who experiments with Southwestern flavors, regularly prepares smoky chipotle‑marinated pork carnitas, chiles en nogada with a hint of queso fresco, and quinoa‑stuffed
    enchiladas drizzled with roasted tomatillo salsa, pairing each meal with fresh cilantro, lime, and a side of charred corn.
  core: Juan Botero channels restless imagination into vivid public murals, uses sketchbooks as daily anxiety anchors, sips cold brew while negotiating commissions, and habitually stays up late drafting
    poetry, even as they sometimes procrastinate on paperwork and miss dentist appointments.
background:
  cultural: Juan was raised in a Mexican-American household in Del Rio, Texas, a city that straddles the U.S.–Mexico border. Spanish is the language of his family and home celebrations, while English is
    used in school and daily interactions, giving him full bilingual fluency. His family maintains Mexican traditions such as Día de los Muertos altars, posada processions, and traditional cooking, while
    also embracing Texan customs like barbecue gatherings and local music festivals. He grew up listening to regional norteño and mariachi, and his grandparents originally migrated from northern Mexico,
    passing down stories of the countryside and indigenous folklore. This blend of Mexican heritage and border-region Texan culture informs his artistic sensibility, motivating him to fuse vibrant Mexican
    motifs with contemporary urban art and to celebrate cultural hybridity within his community.
