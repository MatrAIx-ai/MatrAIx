personas:
  professional: Alexandra Serrano, a former engineering researcher turned community data consultant, merges her meticulous analytical skills, bilingual communication, and love for teaching to mentor high‑school
    girls in STEM and help local nonprofits optimize their data workflows with Python and MATLAB.
  sports: Alexandra Serrano, a devoted fan of the San Antonio Spurs and San Antonio FC, participates in a local walking club that meets twice a week along the River Walk, practices yoga at the community
    center to maintain flexibility, and occasionally joins a beginner’s pickleball league at the senior center for light cardio.
  arts: Alexandra Serrano, an avid visitor of the San Antonio Museum of Art, draws inspiration from the works of Frida Kahlo, Diego Rivera, and the contemporary photographer Sebastião Salgado, regularly
    attends Latin‑American film screenings, and curates small cultural exhibitions at the community center that blend visual art and scientific storytelling.
  travel: Alexandra Serrano, whose travel style blends careful planning with spontaneous curiosity, enjoys weekend road trips to the Texas Hill Country wineries, has a yearning to explore Oaxaca’s culinary
    markets, and prefers low‑key stays at historic B&Bs that accommodate her garden‑inspired cooking experiments, all while balancing a modest travel budget.
  culinary: Alexandra Serrano, a passionate home chef, grows cilantro, oregano, and epazote in her backyard, then transforms them into fragrant mole poblano, chiles en nogada, and inventive quinoa‑taco
    fusion bowls, while occasionally indulging in a well‑aged Mexican cheese and fresh salsa trio for friends.
  core: Alexandra Serrano balances a methodical, data‑driven mind with a deep love for gardening, cooking, and community mentorship, yet often wrestles with worry‑driven over‑planning and a stubborn habit
    of checking every detail twice.
background:
  cultural: Alexandra was born and raised in San Antonio within a close‑knit Mexican‑American family. She grew up bilingual, speaking Spanish at home and English at school, and celebrated Mexican traditions
    such as Día de los Muertos, Las Posadas, and quinceañera ceremonies. Her family roots trace back to Jalisco, and she maintains strong connections with relatives across Texas and Mexico. The community’s
    Catholic values, respect for elders, and emphasis on family gatherings have shaped her worldview. She actively participates in local cultural festivals, supports Mexican culinary heritage, and embraces
    the blend of Mexican and American cultures that defines San Antonio’s vibrant identity.
attributes:
