  hobbies: '[''Gardening'', ''Cooking Mexican and fusion cuisine'', ''Reading science and history books'', ''Puzzle solving (crosswords, Sudoku)'', ''Volunteer event organization'', ''Community cultural
    workshops'', ''Walking/hiking'', ''Yoga and meditation'', ''Attending art exhibits'', ''Documenting family recipes'']'
  career_goals: Although not presently in the formal workforce, Alexandra aims to stay intellectually engaged and give back to her community. She aspires to volunteer as a STEM mentor for high‑school girls,
    leveraging her curiosity and practical experience. She plans to enroll in online courses to refresh her programming and explore data science. Long‑term, she hopes to launch a small consulting side‑business
    helping local nonprofits improve data collection and reporting. On a personal level, she seeks to maintain her health to mitigate stress, preserve her cultural heritage by documenting family recipes,
    and possibly write a memoir reflecting her journey as a Mexican‑American woman in STEM.
