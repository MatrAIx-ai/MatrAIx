personas:
  professional: A budding young engineer, Linda Rackley channels her meticulous organization and fierce curiosity into building complex LEGO structures and experimenting with introductory coding games,
    treating each project like a miniature career venture.
  sports: Linda Rackley joins the Saginaw YMCA Swim Club in summer, benches small dumbbells during indoor play, cheers for the Detroit Tigers and the Michigan State Spartans basketball while occasionally
    dribbling an improvised basketball at the park, and approaches each activity with a disciplined, competitive mindset that mirrors her chess strategies.
  arts: Linda Rackley spends afternoons sketching fantastical animal hybrids inspired by James Gurney’s Dinotopia, practices playing ear‑training apps to the works of Mozart and Ludovico Einaudi, and attends
    library art workshops where she recreates Monet’s water lilies with watercolors, merging her love for imagination with classical influences.
  travel: Linda Rackley prefers meticulously planned day‑trips to nearby places like Mackinac Island and the Great Lakes Discovery Center, while daydreaming of a future family vacation to the Kennedy Space
    Center in Florida and a grand tour of the dinosaur museums in Beijing, balancing her love for structured itineraries with boundless curiosity.
  culinary: Linda Rackley delights in crafting homemade macaroni‑and‑cheese topped with crisp bacon bits and sprinkling fresh basil on pepperoni pizza, often assisting her parents in whisking blueberry‑laden
    pancakes, yet she’s notorious for sneaking extra chocolate chips into cookie dough when no one’s looking.
  core: Linda Rackley is a fiercely organized, curiosity‑driven seven‑year‑old who turns every hobby—whether LEGO, chess, or coding—into a disciplined quest for perfection, all while hoarding chocolate
    chips in secret.
background:
  cultural: Linda comes from a White American family rooted in the Midwestern city of Saginaw, Michigan. Her household reflects typical Midwestern values of hard work, modesty, and community involvement,
    while also nurturing her curiosity through library visits, museum trips, and local art programs. The family celebrates national holidays such as Thanksgiving and the Fourth of July, and retains elements
    of European heritage—perhaps German or Irish—through occasional cultural foods, storytelling, and music, shaping her appreciation for diverse artistic expressions.
