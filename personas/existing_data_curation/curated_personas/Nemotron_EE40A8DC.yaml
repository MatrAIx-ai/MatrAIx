  career_goals: Although still young, Linda envisions a future where she leads scientific discovery and artistic expression. She dreams of becoming an astronaut or a research scientist who can explore space
    and solve environmental challenges, and she also imagines herself performing on stage as a pianist. Her competitive streak motivates her to win school science fairs, top her class rankings, and eventually
    attend a prestigious STEM-focused high school.
