personas:
  professional: Will Boyst, a 28-year-old freelance photographer in Birmingham, seamlessly merges portrait and event photography expertise—including studio lighting, natural light manipulation, drone aerial
    shots, and AI-assisted editing in Lightroom and Photoshop—with a spontaneous, flexible workflow, allowing them to produce compelling images while often wrestling with rigid deadline structures.
  sports: Will Boyst channels a love of solitary movement into regular hikes through the Sipsey Wilderness and early-morning runs with a local running group that roots for the Birmingham Legion FC, while
    cheering on the Alabama Crimson Tide football team on Saturdays and catching Birmingham Barons baseball games as a relaxed social outlet.
  arts: Will Boyst curates a vinyl collection steeped in Southern blues legends such as B.B. King, Otis Redding, and contemporary soul artist Leon Bridges, frequents Birmingham galleries showcasing regional
    photographers, and draws artistic inspiration from the black-and-white mastery of Ansel Adams and the candid street vision of Vivian Maier.
  travel: Will Boyst favors spontaneous road trips with a loaded camera bag, having already documented sunrise over Savannah's historic squares and the misty cliffs of the Great Smoky Mountains, while dreaming
    of a workshop tour through Kyoto's shutter-friendly alleys and a photo-focused detour to Reykjavik's glacial landscapes.
  culinary: Will Boyst delights in cooking Southern comfort dishes, mastering buttery buttermilk biscuits, slow-cooked smoked pork ribs, and collard greens sautéed with smoked bacon, often enhancing meals
    with home-grown heirloom tomatoes, fresh basil, and sweet-potato mash for a creative twist.
  core: Will Boyst is a quietly curious lens-man who whispers to subjects, hoards vintage vinyl, forgets bill due dates, and finds bliss in the rustle of leaves as their camera clicks.
background:
  cultural: Will grew up in the suburban outskirts of Birmingham, Alabama, where Southern hospitality and community-oriented values shaped his upbringing. Being white and raised in the Deep South, he absorbed
    a blend of traditional customs—such as church gatherings and family meals centered around Southern cuisine—and a growing appreciation for the regional arts scene, including folk music, street murals,
    and local craft markets. His marriage reinforces a partnership mindset, and his cultural identity is reflected in his photographic focus on everyday Southern life, capturing both its historic roots
    and contemporary vibrancy.
attributes:
  skills: '[''Portrait photography'', ''Event photography'', ''Studio lighting'', ''Natural light techniques'', ''Drone aerial photography'', ''Film photography'', ''Adobe Lightroom'', ''Adobe Photoshop'',
