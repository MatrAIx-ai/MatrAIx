  career_goals: Will aims to transition his freelance work into a boutique studio that specializes in intimate portraiture and cultural storytelling for the Birmingham community. Over the next five years,
    he plans to curate a series of regional exhibitions, publish a photo book documenting Southern everyday life, and earn a reputation as a go-to photographer for small weddings and community events. He
    also aspires to teach quarterly workshops that blend technical mastery with a collaborative, low-pressure learning environment, and eventually expand his services to include personalized visual branding
    for local businesses. Maintaining a balance between creative spontaneity and sustainable business practices drives his ambition to secure steady client relationships while continuing to explore new
    photographic technologies.
