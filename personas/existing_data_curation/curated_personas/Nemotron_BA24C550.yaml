personas:
  professional: Marla Sinbela is a toddler who treats block‑building sessions like a mini project, meticulously arranging each colorful piece, setting clear goals for the tower’s height, and they eagerly
    share the finished structure with family and friends during church picnics, reflecting an early blend of curiosity, practicality, and disciplined organization.
  sports: Marla Sinbela dashes around the Siloam Springs City Park on the little red tricycle, participates in a toddler soccer league at the local community center, watches the Arkansas Razorbacks basketball
    games with family on Sunday, and they proudly wear a miniature Fayetteville Little League baseball cap while splashing in the splash pad, reflecting an energetic and social approach to fitness.
  arts: Marla Sinbela bounces to the cheerful tunes of Raffi and the Frozen soundtrack during preschool music time, loves drawing vibrant crayon pictures of farm animals inspired by Sunday School stories,
    eagerly copies the gestures of her favorite Sesame Street characters, and they dream of performing a little solo at the upcoming church talent showcase, revealing a lively artistic streak.
  travel: Marla Sinbela has explored the trails of Hot Springs National Park on a stroller‑friendly path, giggled at the waterfalls in Ozark National Forest, enjoyed a family road trip to Denver, Colorado
    for a birthday celebration, and they are already asking for a trip to Disney World, preferring trips with a clear itinerary yet delighting in spontaneous ice‑cream stops at roadside stands.
  culinary: Marla Sinbela devours creamy macaroni and cheese, crunchy chicken nuggets with ketchup, and peanut butter‑jelly sandwiches, loves mixing strawberry and banana into a simple smoothie with a plastic
    spoon, can safely stir batter in a play kitchen, and they often throw food when bored, a quirky habit that sometimes leaves a mess on the high chair.
  core: Marla Sinbela blends toddler curiosity with disciplined play, saving coins, managing mild health hiccups, and dreaming big enough to plan a Disney adventure, all while delighting family gatherings
    with energetic, organized fun.
