personas:
  professional: Keisha Cordero, a senior compensation analyst with a STEM background, designs data‑driven total rewards frameworks, translates complex statistical models into clear executive guidance, and
    embeds a disciplined, community‑oriented mindset into pay‑equity initiatives, because they value precision and fairness.
  sports: Keisha Cordero, a rugged solo hiker on desert trails and a member of the Arizona Desert Hiking Club, follows the Phoenix Suns for basketball, occasionally joins a weekend pick‑up tennis match
    but prefers the quiet of the dunes to crowded stadiums, because they seek solitary challenge over social spectacle.
  arts: Keisha Cordero strums classical guitar pieces by Andrés Segovia at home, captures the stark beauty of desert sunsets in Ansel Adams‑inspired black‑and‑white frames, devours non‑fiction works by
    Daniel Kahneman, and occasionally revisits Frida Kahlo’s vivid murals for creative spark, because they find structured artistry a restful counterpoint to analytical work.
  travel: Keisha Cordero plans trips with a spreadsheet, favors low‑key desert escapes like Joshua Tree and Sedona, dreams of a cultural pilgrimage to Oaxaca for its Día de los Muertos celebrations, but
    limits long‑haul flights due to a busy work schedule, because they balance wanderlust with professional obligations.
  culinary: Keisha Cordero cooks authentic mole poblano, chiles en nogada, and tamales with heirloom corn, hand‑picks fresh cilantro and chilies from their succulent garden, and enjoys the ritual of slow‑cooking
    soups, though they sometimes forget to defrost meat ahead of time.
  core: Keisha Cordero blends analytical rigor with solitary creativity, balancing meticulous data work, disciplined finances, and a quiet love for desert hikes, traditional mole and tamale cooking, and
    classical guitar, while battling occasional forgetfulness and a skeptical edge, because they rely on structure to navigate life.
background:
  cultural: Keisha is a Mexican‑American who grew up bilingual, speaking both English and Spanish at home. She maintains close family ties and celebrates cultural traditions such as Día de los Muertos and
    Mexican holidays with her immediate family. Her heritage influences her love for Mexican cuisine, her appreciation for storytelling, and a deep sense of resilience. While her professional life is grounded
    in structured analysis, she integrates the values of perseverance and community from her cultural background into her personal and work ethic.
attributes:
  skills: '[''Compensation strategy development'', ''Job analysis and evaluation (point‑factor, HAY system)'', ''Benefits program design and administration'', ''HRIS management (Workday, SAP SuccessFactors)'',
    ''Advanced data analysis (Excel, SQL, Python, R)'', ''Pay equity modeling and statistical analysis'', ''Regulatory compliance (FLSA, ACA, ERISA)'', ''Budgeting and forecasting for total rewards'', ''Executive‑level
    presentation and reporting'', ''Project management and process improvement'', ''Policy writing and documentation'', ''Targeted stakeholder engagement when required'']'
  hobbies: '[''Solo hiking in desert trails'', ''Gardening with succulents and native plants'', ''Cooking Mexican dishes at home'', ''Reading non‑fiction (economics, psychology)'', ''Playing classical guitar'',
    ''Landscape photography'', ''Puzzle solving (Sudoku, logic puzzles)'', ''Meditation and yoga practice'', ''Learning advanced statistical methods as a hobby'', ''Bilingual literature club (reading Spanish
    novels privately)'']'
  career_goals: Keisha aims to advance to a senior compensation leadership role where she can shape enterprise‑wide total rewards strategies with a focus on equity and data integrity. She plans to obtain
    the Certified Compensation Professional (CCP) designation, lead a cross‑functional pay equity initiative, and eventually become a Director of Total Rewards. Her ambition includes publishing a white
    paper on modern job analysis methodologies and mentoring emerging analysts to adopt systematic, evidence‑based approaches.
