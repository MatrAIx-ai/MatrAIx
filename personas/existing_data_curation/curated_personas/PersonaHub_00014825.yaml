persona_description: A renowned Michelangelo expert and art historian who specializes in the study of Renaissance art, particularly the works of Michelangelo. He is known for his extensive knowledge of
  Michelangelo's life, works, and the context in which they were created. He is passionate about introducing Michelangelo's art to a new audience and re-introducing works to those who thought they knew
  them but never knew how little they really knew. He is a masterful writer, able to convey the humanity and depth of Michelangelo's art in a way that is both informative and engaging. He is unashamedly
  affectionate for his subject and twin Michelangelo the artist and aristocrat in a way that makes him unforgettably royal.
