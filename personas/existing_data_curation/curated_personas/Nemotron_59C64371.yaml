personas:
  professional: Jillian Jerome, a 44‑year‑old maintenance and repair specialist with an associate degree in industrial technology, blends hands‑on expertise in plumbing, electrical troubleshooting, HVAC,
    carpentry, and welding with a flair for artistic, eco‑friendly solutions, leading small teams, training apprentices, and designing preventive maintenance plans that prioritize sustainability and aesthetic
    integration while their sociable, talkative nature fuels collaborative problem‑solving, even as a lingering tendency toward worry drives them to meticulously document every repair.
  sports: Jillian Jerome enjoys weekend paddle‑boarding on the nearby lake in summer, follows the Nashville Predators and the Tennessee Titans passionately, participates in a local adult recreational soccer
    league, and regularly attends the Robertson County Fair’s amateur softball games, using these activities both to stay fit and to nurture community connections.
  arts: Jillian Jerome immerses themselves in the arts by painting abstract canvases inspired by Jackson Pollock and Yayoi Kusama, performing improv theater nights with the quick wit of Tina Fey, belting
    out David Bowie's 'Heroes' at karaoke, drawing philosophical insights from Søren Kierkegaard, and showcasing reclaimed‑material sculptures alongside works by local ceramicist Maya Rivera at maker fairs.
  travel: Jillian Jerome prefers purposeful road trips that blend creativity and relaxation, such as a DIY pottery retreat in Asheville, NC, a weekend at the red‑rock vistas of Sedona, AZ to sketch desert
    landscapes, and a cultural immersion tour of Kyoto’s traditional kilns, while budgeting for frequent visits to nearby state fairs and maker conventions that fuel both professional networking and artistic
    curiosity.
  culinary: Jillian Jerome delights in cultivating heirloom tomatoes, carrots, and purple potatoes, transforming them into roasted vegetable quinoa bowls with lemon‑tahini dressing, experimenting with smoked
    paprika‑infused homemade mozzarella and craft sodas, pairing meals with locally roasted Fair Trade coffee, and occasionally indulging in late‑night pizza topped with artisanal goat cheese and figs after
    a karaoke session.
  core: Jillian Jerome is a charismatic, eco‑conscious maintenance wizard whose boundless curiosity fuels a daily dance between creative art, hands‑on repairs, and community theater, all while wrestling
    with a habit of over‑planning to keep stress at bay.
background:
  cultural: Jillian grew up in Portland, Tennessee, within the close‑knit, Southern Appalachian culture of Robertson County. Her family roots in the area span several generations, instilling values of self‑reliance,
    hard work, and hospitality. Community life revolves around local churches, the county fair, and traditions of storytelling and country/bluegrass music. While the region leans conservative, Jillian’s
    career in a traditionally male‑dominated trade reflects a progressive streak and a growing acceptance of women in skilled trades. She attended a regional community college for her associate degree and
    remains actively involved in local events, from church socials to historical society meetings, blending the region’s rural heritage with her personal drive for novelty, creativity, and community engagement.
