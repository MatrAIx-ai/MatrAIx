  career_goals: Jillian aims to advance into a senior facilities manager role for a regional school district or commercial property, where she can shape maintenance strategies that integrate sustainability
    and innovative design. She is pursuing certification as a Certified Maintenance & Reliability Professional (CMRP) and plans to complete a bachelor's degree in facilities management. Long‑term, she envisions
    launching her own handyman business that emphasizes eco‑friendly solutions and offers workshops for women entering the trades. She also hopes to mentor apprentices, publish a blog showcasing inventive
    repair techniques, and become a recognized voice in her local trade community.
