  career_goals: Although retired from formal employment, Esteban aims to deepen his impact on the local community. He plans to mentor younger adults by teaching practical life‑skill workshops that blend
    DIY home projects with creative art activities. He also hopes to lead a weekly art‑and‑craft circle at the senior center, where participants can share stories and create visual pieces. Completing his
    GED is a personal milestone he wishes to achieve, reinforcing his belief in lifelong learning. Longer‑term, Esteban would like to curate a small travelling exhibition of neighborhood histories and artworks,
    preserving the cultural memory of Trenton’s diverse neighborhoods.
