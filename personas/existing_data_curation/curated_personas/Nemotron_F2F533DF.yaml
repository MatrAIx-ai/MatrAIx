personas:
  professional: Lina Alianelli, a retired community volunteer and seasoned home economist, leverages their deep expertise in traditional island cooking, bilingual translation, and senior‑center event coordination
    to mentor new volunteers while navigating occasional last‑minute schedule changes with a blend of curiosity and practicality.
  sports: Lina Alianelli enjoys gentle walks in the nearby park as part of a seniors’ walking group, follows the local minor‑league baseball team, and plays weekly shuffleboard at the community center,
    keeping active without overexertion.
  arts: Lina Alianelli delights in the rhythms of salsa legends like Celia Cruz and the storytelling of Caribbean novelist Maryse Condé, often dancing at heritage festivals, reading historical novels set
    on the island, and sharing these cultural treasures with grandchildren during cozy evenings.
  travel: Lina Alianelli prefers thoughtfully planned trips, alternating short weekend drives to nearby historic towns with occasional long‑distance flights back to the island for family reunions, all while
    budgeting carefully to ensure their health needs and modest pension cover the costs.
  culinary: Lina Alianelli showcases their culinary mastery by preparing classic island dishes such as arroz con gandules, mofongo, and pasteles using fresh herbs from their garden, sharing the recipes
    during senior‑center demonstrations, and gifting lovingly crocheted table linens to accompany each feast.
  core: Lina Alianelli blends pragmatic curiosity with a warm, sociable heart, tempering occasional worry and penny‑pinching habits with generous storytelling, spontaneous dancing, and a relentless commitment
    to preserving their community’s heritage.
background:
  cultural: Lina was born to Puerto Rican parents who migrated to the mainland United States in the 1940s. Raised in a bilingual household in Trenton, she grew up celebrating traditions such as Nochebuena,
    Three Kings Day, and the vibrant rhythms of bomba and plena. Family ties are central to her identity; she maintains close relationships with her children, grandchildren, and extended relatives across
    the island and the diaspora. The local Puerto Rican community in Mercer County, with its churches, cultural festivals, and senior groups, has shaped Lina's sense of belonging. Her Catholic faith influences
    her values of service and community, while her heritage informs her love for food, music, and storytelling. Lina actively preserves these cultural practices by cooking traditional meals, sharing oral
    histories, and participating in neighborhood celebrations that keep the spirit of Puerto Rico alive in New Jersey.
attributes:
  skills: '["Traditional Puerto Rican cooking", "Spanish-English bilingual communication", "Community event coordination", "Basic computer use (email, video chat)", "Elder care and caregiving", "Budgeting
