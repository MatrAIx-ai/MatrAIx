  hobbies: '["Cooking and sharing family recipes", "Gardening (vegetable and flower beds)", "Knitting and crocheting", "Playing bingo and card games at senior center", "Attending and participating in church
    choir", "Listening to salsa and plena music", "Reading historical novels and Puerto Rican literature", "Volunteering for community cultural events", "Genealogy research", "Walking in local parks"]'
  career_goals: Although retired, Lina aims to document and publish a family cookbook that blends cherished recipes with the stories behind them, ensuring her culinary heritage endures. She strives to mentor
    new volunteers at the local senior center, sharing her event‑planning know‑how and fostering intergenerational connections. Lina hopes to write a memoir of her immigration journey and community involvement,
    contributing to the historical record of Puerto Rican families in Trenton. She remains committed to advocating for improved senior services, especially accessible technology training, and wishes to
    maintain her health so she can travel back to Puerto Rico for family reunions and cultural celebrations.
