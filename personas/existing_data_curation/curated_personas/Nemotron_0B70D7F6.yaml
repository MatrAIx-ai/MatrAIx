personas:
  professional: Janice Allen, a two‑year‑old budding architect, arranges her wooden blocks by size and color before constructing sturdy towers, displaying a practical, hands‑on problem‑solving style while
    asserting their own layout preferences in small‑group play, which reveals a strong need for structure and a tendency toward worry when a tower collapses.
  sports: Janice Allen joins a toddler gymnastics class at the community center twice a week, where they practice balance beams and soft mats with a clear schedule that satisfies their need for predictability,
    and on weekends they cheer quietly from the couch as the family watches the Chicago Cubs play, preferring the small‑group excitement of the living room over noisy stadium crowds.
  arts: Janice Allen loves the cheerful tunes of Raffi and the bright visuals of Sesame Street, often dancing with a plush toy while finger‑painting simple shapes, and they eagerly mimic the characters’
    sing‑along verses, showing how music and visual art provide a structured, yet comforting, avenue for creative expression.
  travel: Janice Allen enjoys family trips to the local zoo, where the scheduled animal feedings and predictable map routes keep them calm, and they dream of a repeat visit to the sunny beaches of Myrtle Beach,
    where the rhythmic waves and gentle sand offer a soothing escape from their everyday worries while still adhering to a familiar itinerary.
  culinary: Janice Allen favors soft, mildly sweet foods such as ripe banana slices, oatmeal with a drizzle of honey, and cheese crackers, skilfully spreading peanut butter on toast with a child‑size spoon,
    yet they consistently push away green peas and broccoli, reflecting a picky palate and a desire for predictable textures and flavors.
  core: Janice Allen is a meticulous, structure‑loving toddler who channels their constant worry into orderly block building, disciplined coin‑sorting, and a preference for calm, small‑group activities,
    while occasionally succumbing to impulsive cravings for sweets.
background:
  cultural: Janice is being raised in a middle‑class white family in Coral Springs, Florida. Her upbringing reflects mainstream American cultural practices such as celebrating holidays like Thanksgiving
    and Christmas, attending a local preschool that emphasizes routine and safety, and participating in community activities at nearby parks and the county library. The family values a private, structured
    home environment and prefers modest social gatherings, shaping Janice’s preference for predictability, small‑group interaction, and a calm daily rhythm.
