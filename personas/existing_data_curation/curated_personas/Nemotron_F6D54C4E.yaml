personas:
  professional: Richard Lee is a biomedical equipment technician whose meticulous maintenance of EKG machines, ultrasound units, and patient monitoring systems reflects their disciplined, organized nature
    and curiosity for emerging diagnostic technologies, while their assertive communication style ensures compliance with health‑safety regulations.
  sports: Richard Lee stays active by captaining a local weekend softball team in the Freeport Recreation League, paddling a kayak at dawn during summer, cheering for the Portland Sea Dogs and the New England
    Patriots, and maintaining a disciplined fitness regimen that blends plyometric drills and weight‑lifting to offset the physical demands of their hands‑on profession.
  arts: Richard Lee unwinds by listening to classic folk singer Bob Dylan, attending community theatre productions of Arthur Miller plays at the local historical society, and studying the maritime paintings
    of Winslow Homer for inspiration in woodworking, though they rarely attempt painting themselves.
  travel: Richard Lee prefers low‑key road trips along the New England coast, having explored Acadia National Park’s rugged cliffs and the cobblestone streets of St. Andrews, Canada, while dreaming of a
    summer sailing adventure in the Greek Cyclades and a winter snowshoe trek across Iceland’s volcanic landscapes.
  culinary: Richard Lee enjoys cooking hearty lobster rolls, creamy New England clam chowder, and pan‑seared cod seasoned with lemon, thyme, and locally sourced sea salt, displaying competent but occasionally
    sloppy kitchen technique that often leaves a burnt garlic garnish when multitasking between a repair job and a simmering pot.
  core: Richard Lee is a pragmatic, detail‑driven health technologist who balances community‑rooted humility with a relentless pursuit of technical mastery, often forgetting to unwind until a stray fishing
    line pulls them back to the shoreline.
background:
  cultural: Richard was raised in a working‑class, white New England family in coastal Maine. His upbringing emphasized self‑reliance, community involvement, and respect for regional traditions such as
    lobster festivals, Fourth of July parades, and church gatherings. He identifies with the pragmatic, modest values common in rural Maine, while also appreciating the close‑knit social fabric of Freeport.
    Though his cultural exposure is primarily local, he values the sense of continuity and pride associated with his New England heritage.
attributes:
  skills: '[''Medical equipment troubleshooting'', ''Preventive maintenance and calibration'', ''Regulatory compliance documentation'', ''Patient data entry and management'', ''Inventory control and asset
    tracking'', ''Infection control procedures'', ''Basic phlebotomy and specimen handling'', ''Technical training and mentorship'']'
  hobbies: '[''Coastal fishing and lobster trapping'', ''Kayaking and marine wildlife observation'', ''Woodworking and furniture building'', ''Reading DIY and tech manuals'', ''Volunteering at community
    health fairs'', ''Attending local historical society events'', ''Playing weekend softball'']'
  career_goals: Richard aims to become a senior biomedical equipment technician and earn the Certified Biomedical Equipment Technician (CBET) credential within the next two years. He aspires to lead a maintenance
    team at the regional hospital, implement more efficient preventive‑maintenance schedules, and introduce data‑driven equipment performance tracking. Long‑term, he hopes to transition into a supervisory
    or managerial role where he can mentor newer staff and influence facility‑wide equipment procurement decisions. He also entertains the idea of starting a small consulting firm to help rural clinics
    across Maine improve their equipment reliability.
