  career_goals: Michael aims to advance to a senior HR leadership role, such as HR Director or Vice President of People Operations, where he can shape the organization’s talent strategy through evidence‑based
    decision making. He hopes to champion a culture of employee well‑being and inclusive collaboration, implement cutting‑edge HR technologies that streamline processes, and mentor the next generation of
    HR professionals in the Mid‑West. Over the next five years, he also plans to earn a certification in HR analytics and lead a regional initiative that integrates STEM‑driven talent pipelines with local
    community colleges.
