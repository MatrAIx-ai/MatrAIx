  hobbies: '[''Reading speculative fiction and philosophy'', ''Sketching urban landscapes and fire‑scene reconstructions'', ''Digital illustration'', ''Chess'', ''Trail running'', ''Weight training'', ''Arduino
    electronics projects'', ''Community risk education volunteering'']'
  career_goals: Charles aims to earn his GED within the next year, followed by certification as a state‑registered EMT and completion of the Firefighter I and II courses at the Virginia Fire Academy. His
    long‑term ambition is to transition from a volunteer position to a full‑time career firefighter in Bedford County, eventually specializing in fire prevention and inspection. He envisions integrating
    emerging technologies—such as drones for real‑time fire mapping and virtual‑reality training simulations—into the department’s operations. Driven by competition, he aspires to rise to the rank of fire
    captain and lead a community education program that blends artistic storytelling with fire safety messaging.
