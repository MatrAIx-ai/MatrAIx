  hobbies: '["Digital photography", "Gardening", "Woodworking", "Reading historical biographies and classic literature", "Attending local art exhibitions and museum talks", "Volunteer docent work", "Birdwatching",
    "Listening to classical and jazz music", "Cooking for family gatherings"]'
  career_goals: Although fully retired, Richard aims to stay intellectually engaged by deepening his knowledge of American regional art and possibly curating a small exhibition at the local museum. He hopes
    to mentor younger volunteers, share his maintenance and organizational expertise with community projects, and compile a memoir that captures the cultural heritage of Linton and Greene County. Additionally,
    he aspires to travel to a handful of nearby art festivals and historic sites, using his photography skills to create a visual chronicle of his journeys.
