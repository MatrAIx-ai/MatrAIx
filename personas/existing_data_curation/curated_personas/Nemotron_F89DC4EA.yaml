  career_goals: Salu dreams of a future where she can blend her love for learning with her desire to help others. She aspires to become a teacher who inspires curiosity in young minds, or a community health
    worker who supports families in her neighborhood. In the short term, she aims to win her school’s spelling bee, lead her class’s science fair project, and earn a leadership badge in Girl Scouts, building
    a foundation for a career that combines knowledge, service, and practical problem‑solving.
