personas:
  professional: An aspiring junior game developer, Salu Pearson turns imaginative adventures from Magic Tree House into simple Scratch games, leveraging meticulous organization, a love for leading group
    projects, and a natural knack for explaining code to friends, and they often volunteer to teach classmates.
  sports: An energetic soccer enthusiast, Salu Pearson plays forward for the Community Cubs youth league, cheers for the local professional team the City Strikers, dances with the Oakwood Ballet Club during
    the spring, and they thrive on group drills that combine fun and competition.
  arts: A budding comic artist, Salu Pearson sketches weekly strips inspired by Stan Lee, Bill Watterson, and the Magic Tree House series, performs lead roles in school theater productions like Annie, and
    they eagerly share their drawings at library story‑time sessions.
  travel: A curious explorer, Salu Pearson enjoys family weekend trips to the nearby science museum in Springfield, dreams of visiting the Grand Canyon and the historic streets of Kyoto, and they meticulously
    plan each outing with a handwritten checklist of must‑see sights.
  culinary: A budding kitchen helper, Salu Pearson loves kneading dough for grandmother’s chocolate chip cookies, mixing fresh strawberries and banana into smoothies, and they proudly perfect a cheesy baked
    mac and cheese using cheddar and mozzarella.
  core: Salu Pearson is an organized, sociable eight‑year‑old who turns curiosity into creative projects, leads group activities, and they balance disciplined routines with a love for playful adventure.
background:
  cultural: Salu is an African‑American child raised in Streamwood, Illinois, a suburb with a rich tapestry of cultural influences. Her family places strong emphasis on community, faith, and the celebration
    of Black heritage, involving her in events like Juneteenth, Black History Month projects at school, and church gatherings. She receives storytelling and culinary traditions from her grandparents, which
    blend Southern African‑American roots with Midwestern experiences. The diverse neighborhood exposes her to a variety of cultures, fostering an inclusive outlook while reinforcing the values of perseverance,
    cooperation, and pride in her heritage.
