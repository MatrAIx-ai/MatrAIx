personas:
  professional: Colin Caldwell leverages deep network security expertise, meticulous documentation, and a knack for translating complex threats into clear guidance, positioning themselves as a rising security
    leader poised to become a SOC manager while championing user‑centred design in creative industries.
  sports: Colin Caldwell competes in a weekly recreational basketball league, follows the Detroit Pistons and Michigan Wolverines with fervor, runs three times a week along the Clinton River Trail for cardio,
    and treats game nights with board games like Catan as both social outlet and strategic exercise, although they occasionally skip workouts after an intense trivia session.
  arts: Colin Caldwell frequents the Detroit Institute of Arts, draws inspiration from modern masters like Yayoi Kusama, Banksy, and Kehinde Wiley, creates digital illustrations and photo edits shared on
    Behance, volunteers at museum outreach programs, and curates monthly art‑themed trivia nights, all while preserving a meticulous sketchbook habit.
  travel: Colin Caldwell plans trips with the same precision as their security audits, favoring off‑season museum tours in Paris, the Van Gogh Museum in Amsterdam, and weekend getaways to Toronto’s Distillery
    District, while balancing a modest travel budget that still allows occasional splurges on unique art workshops abroad.
  culinary: Colin Caldwell enjoys cooking Mediterranean‑inspired dishes like shakshuka with heirloom tomatoes and feta, perfects the art of Japanese ramen using homemade dashi, experiments with sriracha‑glazed
    pork ribs for game night feasts, and meticulously logs recipes and ingredient sourcing in their bullet‑journal, though they admit to over‑indulging on late‑night pizza after marathon gaming sessions.
  core: Colin Caldwell blends a disciplined cyber‑security career with an infectious love for art, community, and mindfulness, juggling meticulous planning with occasional impulsive splurges and a resilient
    yet anxiety‑prone spirit.
background:
  cultural: Colin was raised in the suburbs of Warren, Michigan, within a predominantly white, middle‑class Midwestern community. His upbringing emphasized hard work, self‑reliance, and a strong sense of
    community, values rooted in the region’s automotive and manufacturing legacy. Growing up near Detroit, he absorbed the city’s rich musical heritage—including Motown, jazz, and techno—and an appreciation
    for the arts fostered by the area’s museums and galleries. While his immediate family background is fairly traditional, Colin’s adult life in the culturally diverse Detroit metro area has broadened
    his perspective, giving him exposure to a wide range of ethnicities, cuisines, and festivals. This blend of Midwestern practicality and urban cultural vibrancy shapes his worldview, informing both his
    collaborative work style and his curiosity about unconventional ideas.
attributes:
  skills: '[''Network Security'', ''Threat Detection'', ''Vulnerability Assessment'', ''Incident Response'', ''Security Policy Development'', ''Risk Management'', ''Compliance Auditing (NIST, ISO 27001,
    PCI DSS)'', ''SIEM Administration (Splunk)'', ''Python Scripting for Automation'', ''Security Awareness Training'', ''Cloud Security Fundamentals'']'
  hobbies: '[''Visiting Art Galleries and Museums'', ''Digital Illustration and Photo Editing'', ''Recreational Basketball League'', ''Board Game and Trivia Nights'', ''InfoSec Meetups and Mentoring'',
    ''Morning Runs (Clinton River Trail)'', ''Mindfulness Meditation'', ''Bullet-Journal Organization'', ''Volunteer Work at Food Bank'', ''Community Art Outreach Programs'']'
  career_goals: Colin aims to progress into senior leadership within the cyber security domain, targeting a role as a Security Operations Center Manager or Director of Information Security within the next
    five years. He plans to achieve the CISSP certification and deepen his expertise in cloud security, particularly with Azure and AWS environments. He also envisions mentoring junior analysts, building
    a resilient security culture across his organization, and eventually consulting for creative industries such as museums and design firms where his appreciation for art can intersect with his technical
    expertise. In the longer term, Colin hopes to launch a boutique security consultancy that emphasizes user‑centred design and mental‑wellness aware security solutions.
