persona_description: A tobacco cessation advocate and researcher who is passionate about increasing the demand for and use of evidence-based products and services to help people quit smoking, particularly
  among underserved populations. They are knowledgeable about the challenges and opportunities in tobacco control and are committed to using innovative strategies to improve treatment use and decrease tobacco
  use. They have experience in designing and implementing successful consumer demand initiatives and have a strong understanding of the principles of consumer demand design. They are interested in leveraging
  the 2009 law authorizing the Food and Drug Administration to regulate tobacco products and their marketing to enhance opportunities for helping smokers quit.
