personas:
  professional: Antonin Harlan, a budding mini architect who spends hours arranging LEGO bricks into symmetrical cityscapes, thrives on the predictable snap‑fit of each piece and quietly insists on following
    the building instructions to the letter, showcasing a blend of practical focus, responsibility, and a shy yet assertive streak, and they often hum softly as they align each block.
  sports: Antonin Harlan, a regular at the neighborhood Kids’ Soccer Club’s Tuesday mini‑matches and a swim class at the local YMCA, prefers the small‑group drills that keep the schedule predictable, often
    cheering quietly for the Little Lions while anxiously watching for any sudden rule changes, and they feel most comfortable when the coach outlines each activity in advance.
  arts: Antonin Harlan, a tiny yet meticulous watercolor enthusiast, fills sketchbooks with neat rows of primary‑colored shapes while humming the repetitive tune of “The Wheels on the Bus,” finds comfort
    in the orderly rhythm of Disney’s classic songs such as “When You Wish Upon a Star,” and they delight in tracing the outlines of beloved characters with a steady hand.
  travel: Antonin Harlan, who loves short, well‑planned family outings, has visited the city zoo, the seaside boardwalk in Santa Monica, and dreams of a fjord cruise in Norway, always insisting on a visual
    itinerary and a favorite plush companion to ease the stress of new places, and they feel safest when the trip schedule is printed and displayed beforehand.
  culinary: Antonin Harlan, a picky eater with a fondness for buttery macaroni‑and‑cheese, crisp carrot sticks, strawberry‑yogurt parfait, and the simplicity of a peanut‑butter sandwich, can reliably assemble
    the latter on their own, yet often refuses foods that deviate from the familiar color palette, and they will barter extra raisins for a small extra spoonful of cheese.
  core: Antonin Harlan, a four‑year‑old who turns every activity into a structured ritual, balances quiet curiosity with a touch of anxious perfectionism, and they secretly hoard tiny LEGO bricks for late‑night
    builds.
background:
  cultural: Antonin is raised in a white, middle‑class family in Broken Arrow, Oklahoma, a suburban area of Tulsa County. His upbringing reflects Midwestern values of modesty, community involvement, and
    respect for routine. His family participates in local church activities and community events, fostering a sense of belonging and cultural continuity. Access to neighborhood parks, a public library with
    story‑time sessions, and family‑friendly programs shapes his everyday experiences.
attributes:
  skills: '["following multi-step daily schedules", "organizing toys by category", "completing simple puzzles systematically", "reciting alphabet and counting to twenty", "drawing neat shapes", "building
    LEGO sets from instructions", "assertive yet cooperative communication in small groups", "self‑soothing with a favorite stuffed animal"]'
  hobbies: '["building LEGO sets", "coloring within the lines", "reading picture books about trains and construction", "assembling jigsaw puzzles", "collecting and sorting leaves", "listening to rhythmic
    bedtime stories", "short nature walks with family"]'
  career_goals: Antonin often imagines becoming a firefighter or a construction engineer. He is drawn to roles that have clear rules, teamwork, and the chance to help others in a predictable environment.
    He pictures rescuing people or building sturdy houses, reflecting his desire for practical, structured work that also satisfies his compassionate side.
