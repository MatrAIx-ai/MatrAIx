  hobbies: '[''Watercolor painting'', ''Reading poetry and classic literature'', ''Gardening and birdwatching'', ''Knitting and crocheting'', ''Attending local seafood festivals'', ''Listening to folk and
    bluegrass music'', ''Community theater involvement'']'
  career_goals: Although retired, Jamye’s ambitions center on nurturing community harmony and leaving a creative legacy. She hopes to complete a handwritten memoir that captures the cultural shifts of the
    Lowcountry from the 1930s onward, and to compile a small anthology of poems and sketches for the local library. She aspires to mentor younger volunteers at the senior center, sharing her crafts and
    storytelling techniques. Jamye also wishes to remain open to spontaneous artistic opportunities, such as assisting with impromptu community art projects or local theater productions, while maintaining
    her health and independence.
