personas:
  professional: Kellie Kimura, a budding junior architect in training, channels their love of structure and competition into constructing elaborate LEGO models, which they treat like blueprints and proudly
    showcase to family and classmates.
  sports: Kellie Kimura, an enthusiastic member of the community pool’s beginner swim team and a regular participant in the neighborhood Saturday nature‑walk club, spends weekdays mastering freestyle laps,
    weekends collecting rocks on hikes, and Sunday afternoons cheering for the local youth soccer squad, the Brookside Cubs, while they also enjoy watching the professional basketball team, the Golden State
    Warriors, during school holiday evenings.
  arts: Kellie Kimura, a devoted fan of picture books like Eric Carle’s 'The Very Hungry Caterpillar' and Mo Willems’s 'Don’t Let the Pigeon Drive the Bus!', they enjoy drawing bright reproductions of Carle’s
    collage style, and dancing to the upbeat tunes of children’s musician Laurie Berkner, often staging mini LEGO performances inspired by their favorite story scenes.
  travel: Kellie Kimura, whose family vacations have included building sandcastles at the San Diego beach and a weekend camping trip in the Redwood National Park, prefers itineraries that blend scheduled
    museum visits with free play in nature, and they dream of exploring Tokyo’s interactive kid museums and the bright streets of Paris for a future adventure.
  culinary: Kellie Kimura, who adores the crunchy snap of carrot sticks and the sweet tang of strawberries, enjoys assembling simple snacks like peanut butter and jelly sandwiches or mini pizza bagels topped
    with cheese and pepperoni, often donning a child‑size apron while they practice whisking a strawberry‑banana smoothie, though they sometimes sneak an extra chocolate chip onto the pizza when no one
    is watching.
  core: Kellie Kimura, a six‑year‑old with a competitive edge and a love for order, builds intricate LEGO worlds, saves earnestly for new sets, tackles puzzles with focus, and they rarely show frustration,
    preferring calm routines and occasional bursts of spontaneous dance.
background:
  cultural: Kellie grows up in a white, Southern‑American family in Lynchburg, Virginia. Her family participates in local community traditions such as church gatherings, holiday celebrations like Thanksgiving
    and Christmas, and the annual Lynchburg Festival. They value Southern hospitality, enjoy home‑cooked meals like biscuits and fried chicken, and often take weekend trips to nearby historic sites. While
    her surname hints at a multicultural lineage, her upbringing is rooted in the cultural norms of the American South, emphasizing politeness, community involvement, and a strong sense of local pride.
attributes:
  skills: '[''reading simple sentences'', ''writing short stories'', ''basic arithmetic (addition & subtraction)'', ''jigsaw puzzle solving'', ''LEGO building'', ''spatial reasoning'', ''memory for routines'',
