  hobbies: '[''LEGO building'', ''jigsaw puzzles'', ''reading picture books'', ''strategic board games (Connect Four, checkers)'', ''nature walks'', ''rock collecting'', ''swimming'', ''helping with household
    chores'', ''dance routines'']'
  career_goals: Kellie dreams of becoming a civil engineer because she loves constructing things with LEGO and imagines designing orderly, safe bridges and roads for her community. She is also fascinated
    by animals and sometimes imagines a future as a veterinarian, caring for pets with precision and compassion. Her competitive streak motivates her to set clear goals, while her calm resilience gives
    her confidence that she can overcome challenges in any profession she pursues.
