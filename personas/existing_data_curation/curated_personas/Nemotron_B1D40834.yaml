  career_goals: When she reaches school age and beyond, Vernell aims to channel her vivid imagination and intellectual curiosity into a career that blends artistic creation with analytical rigor. She envisions
    becoming a visual artist, graphic designer, or interdisciplinary researcher where she can innovate, lead projects, and contribute original ideas. Her drive for reliability and methodical execution fuels
    ambitions to attain leadership roles that allow her to mentor others and shape creative fields while maintaining personal authenticity.
