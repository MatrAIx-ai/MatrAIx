personas:
  professional: Selena Mcarthur, a veteran front‑desk coordinator at the tribal community center, blends three decades of customer service mastery, multilingual greeting in basic Menominee phrases, and
    meticulous record‑keeping with a flexible, curiosity‑driven approach that turns each visitor interaction into a chance to share cultural stories and mentor new staff.
  sports: Selena Mcarthur supports the Green Bay Packers and Milwaukee Brewers, participates in a local senior hiking club that explores nearby forest trails each spring, and dedicates weekly low‑impact
    yoga sessions to maintain joint flexibility, balancing team spirit with personal wellness.
  arts: Selena Mcarthur regularly attends exhibits featuring artists like Frida Kahlo, Georgia O'Keeffe, and contemporary beadwork creator Melissa Rushing, while she paints watercolor landscapes of native
    plants, crafts bead‑infused jewelry, and quilts intricate patterns inspired by both traditional motifs and modern design.
  travel: Selena Mcarthur prefers thoughtfully planned trips that blend cultural immersion and relaxation, having journeyed to the historic pueblos of Santa Fe, the wildflower meadows of the Canadian Rockies,
    and the botanical gardens of Kyoto, while dreaming of a future pilgrimage to the Musée du quai Branly in Paris to study indigenous art collections.
  culinary: Selena Mcarthur enjoys cooking rustic dishes such as wild rice pilaf with maple glaze, herb‑infused bean soup featuring sage and sweetgrass, and baking cornbread with local honey, reflecting
    her intermediate culinary skill and a penchant for ingredients that echo her garden’s native harvest.
  core: Selena Mcarthur weaves curiosity, cultural stewardship, and meticulous organization into every facet of life, even if occasional forgetfulness about taking medication reveals a charming, human flaw.
background:
  cultural: Selena is a member of the Menominee Nation, having grown up in an intergenerational household that emphasized respect for nature, community storytelling, and the preservation of tribal language.
    While she lives in De Pere, she maintains strong ties to her tribal community through regular participation in cultural events, such as seasonal ceremonies, powwows, and the annual harvest festival.
    Her upbringing instilled a deep appreciation for traditional arts like beadwork and weaving, as well as a commitment to sharing indigenous knowledge with both tribal members and the broader public.
    This cultural foundation informs her everyday interactions, from greeting visitors with a warm, hospitality-focused approach to incorporating Menominee terms and symbols in the information she provides.
