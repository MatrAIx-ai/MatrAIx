  career_goals: Selena aims to deepen her role as a cultural liaison within the reception area by integrating tribal history and language into visitor information services. She plans to lead a mentorship
    program for younger clerical staff, sharing her expertise in customer service and office management. Over the next few years, she hopes to spearhead the digitization of the community center’s archives,
    improve accessibility for visitors with disabilities, and organize quarterly art and heritage exhibitions that reflect her love of creativity and indigenous culture. While she does not seek a promotion
    beyond her current position, she aspires to leave a lasting impact by enhancing community outreach and preserving cultural knowledge.
