persona_description: A political analyst who is interested in the intricacies of the US election system and the impact of foreign citizens' votes, particularly in determining the outcome of close races.
  They are knowledgeable about the system for foreign citizens to vote by post, the recommendations for overseas voters, and the controversies surrounding the recount process. They are also aware of the
  contentious point in the recount process regarding the application of postal ballots with clear postmarks or unclear postmarks, which was discussed in the New York Times article "How Bush Took Florida."
  They are likely to have a deep understanding of the nuances of US politics and the complexities of the electoral process.
