personas:
  professional: Alexis Perry, an 8‑year‑old aspiring astronomer‑artist, channels their methodical curiosity and competitive streak into meticulously drawing planetary landscapes, building LEGO rockets,
    and leading after‑school science clubs where they apply a disciplined, detail‑oriented approach to every project.
  sports: Alexis Perry enjoys weekend visits to the local rugby league matches of Wakefield Trinity, participates in the school’s after‑school swimming club during summer, and approaches fitness with a
    methodical routine inspired by chess strategies, though they sometimes skip practice when anxiety spikes.
  arts: Alexis Perry, a budding space artist, spends hours emulating the luminous colors of Hubble’s nebulae and the swirling brushstrokes of Vincent van Gogh while listening to the orchestral scores of
    John Williams, and proudly displays a hand‑drawn series of planetary scenes in their bedroom, reflecting a deep intertwining of visual art and cosmic wonder.
  travel: Alexis Perry has taken a school field trip to the Royal Observatory in Greenwich, a family vacation to the Scottish Highlands, and harbors a vivid wish to visit the Kennedy Space Center in Florida,
    but their travel plans are often constrained by parental budget concerns.
  culinary: Alexis Perry prefers classic comfort foods such as cheesy pizza, buttery mac and cheese, and spaghetti bolognese, can assemble a simple avocado toast with a practiced hand, but occasionally
    attempts experimental snacks like homemade rock‑candy using sugar and food‑grade glitter, reflecting a mix of culinary confidence and exploratory curiosity.
  core: Alexis Perry, an 8‑year‑old cosmic dreamer and meticulous planner, balances a fierce curiosity for space with a competitive streak and emotional intensity, turning solitary pursuits into disciplined
    creative projects while navigating anxiety and occasional over‑cautious habits.
background:
  cultural: Alexis grows up in Wakefield, a small town in Dickinson County, Kansas, within a typical Midwestern white family that traces its roots to German and Scandinavian ancestors. The community values
    self‑reliance, modesty, and a close connection to the land, and local traditions such as county fairs, church gatherings, and school events shape his social world. The local public library and school
    extracurricular clubs give him exposure to a wide range of ideas, while his family encourages curiosity, disciplined study habits, and personal achievement, reflecting the pragmatic yet open‑minded
    spirit of the region.
attributes:
  skills: '["Reading comprehension", "Basic arithmetic", "Sketching and drawing", "LEGO design and construction", "Online research using educational sites", "Chess tactics", "Organizational planning"]'
