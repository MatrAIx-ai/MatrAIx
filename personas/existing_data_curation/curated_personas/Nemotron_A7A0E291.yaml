  career_goals: 'Alexis dreams of becoming an astronaut‑engineer who helps design spacecraft, and he also envisions a future as a scientific illustrator who turns complex space and anatomy concepts into
    vivid artwork. To reach these goals he already sets concrete milestones: mastering a beginner robotics kit, winning the school science fair, building a portfolio of space‑themed sketches, and practicing
    chess to earn a top ranking in his grade.'
