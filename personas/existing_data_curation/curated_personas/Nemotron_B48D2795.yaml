  career_goals: Patricia aims to complete her associate degree in Business Administration within the next two years and secure a full‑time administrative assistant position in a stable corporate environment,
    preferably in finance or human resources where clear routines and structured processes are valued. She aspires to become a certified administrative professional and later transition to a supervisory
    role, using her organizational strengths and competitive drive to excel. Long‑term, she envisions establishing a side consultancy offering bookkeeping services to small local businesses, granting her
    financial independence and the ability to maintain a predictable work schedule.
