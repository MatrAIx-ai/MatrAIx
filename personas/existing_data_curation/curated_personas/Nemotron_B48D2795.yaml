  hobbies: '[''Journaling'', ''Reading (fiction & true crime)'', ''Gardening'', ''Cooking'', ''Running'', ''Yoga'', ''Chess'', ''Podcast listening (productivity, economics)'', ''Volunteer at animal shelter'',
