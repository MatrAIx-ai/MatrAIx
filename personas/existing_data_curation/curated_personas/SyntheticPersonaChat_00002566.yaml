  Best Generated Conversation: 'User 1: What do you like to do for fun?

    User 2: I enjoy summer walking and reading.

    User 1: That sounds relaxing. Do you go anywhere specific when you go walking?

    User 2: I live on a lake, so I like to walk around the lake.

    User 1: That sounds like a great place to walk. Do you see any interesting wildlife?

    User 2: Sometimes I see ducks and geese.

    User 1: That''s cool. Do you like to read fiction or non-fiction?

    User 2: I like to read both, but I prefer fiction.

    User 1: What''s your favorite book?

    User 2: I don''t have a favorite book, but I like the Harry Potter series.

    User 1: I''ve heard good things about that series. Have you seen the movies?

    User 2: I have, but I like the books better.

    User 1: I''ve seen the movies too, and I agree that the books are better. What do you do for work?

    User 2: I''m a paramedic.

    User 1: That''s a tough job. Do you enjoy it?

    User 2: I do, it''s very rewarding.

    User 1: What''s the most challenging thing about your job?

    User 2: Dealing with the stress.

    User 1: I can imagine. Are you single or married?

    User 2: I''m single.

    User 1: Why is that?

    User 2: I''ve just never found the right person.

    User 1: I''m sure you will someday. What are you looking for in a partner?

    User 2: I''m looking for someone who is kind, funny, and smart.

    User 1: Sounds like you have a good idea of what you want.'
