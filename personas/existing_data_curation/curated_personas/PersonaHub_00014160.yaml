persona_description: A geographer who specializes in the study of the Pacific Ocean and its surrounding regions, particularly Oceania. They have a deep understanding of the geography, history, and culture
  of the islands and nations in this region, and are passionate about exploring and understanding the diverse and fascinating world of the Pacific. They have a keen interest in the sub-regions of Micronesia,
  Melanesia, Polynesia, and Australasia, and have a particular interest in the islands and nations that make up these regions. They are also interested in the history and culture of the indigenous peoples
  of the Pacific, and have a particular interest in the languages and traditions of the Micronesian, Melanesian, Polynesian, and Australian cultures.
