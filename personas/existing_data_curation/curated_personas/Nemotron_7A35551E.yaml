  hobbies: '[''Cooking and recipe experimentation'', ''Vegetable gardening'', ''Reading historical biographies'', ''Quilting and crocheting'', ''Church choir and gospel music'', ''Bingo nights'', ''Walking
    in local parks'', ''Genealogy research'']'
  career_goals: Although retired from formal employment, Bridget aims to deepen her impact as a community elder. She plans to launch a neighborhood garden project that provides fresh produce to local seniors
    and schools, and to host monthly cooking workshops where she teaches traditional recipes and healthy modifications. She hopes to become a volunteer coordinator at the senior center, organizing inter‑generational
    activities and health‑screening events. Bridget also aspires to record and archive oral histories of longtime Irving residents, preserving the cultural memory of the Black community for future generations.
    In her personal development, she intends to enroll in a community‑college class on digital photography to document these projects and to stay physically active through regular walks in Irving’s parks.
