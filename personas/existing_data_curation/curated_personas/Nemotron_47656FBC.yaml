  career_goals: Colette aims to transition back into the workforce in a role that leverages her strong organizational abilities and community focus. She plans to pursue a certification in project management
    and is exploring part‑time positions such as program coordinator for a local non‑profit, event manager for community festivals, or launching a home‑based catering service. Her long‑term ambition is
    to become a recognized leader in community development, creating programs that enrich families in her county.
