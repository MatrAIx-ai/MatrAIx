  hobbies: '[''Reading contemporary poetry and philosophy'', ''Watercolor and mixed‑media painting'', ''Visiting art galleries and museums'', ''Attending chamber‑music concerts'', ''Senior book club participation'',
    ''Crossword puzzles'', ''Chess'', ''Herb and rose gardening'', ''Docent work at historical society'']'
  career_goals: Although retired from formal employment, William aims to leave a lasting intellectual legacy. He plans to complete a memoir‑essay collection that intertwines personal history with reflections
    on art and literature, submit a series of articles to regional cultural journals, and curate a community‑based exhibition on the evolution of abstract art in the Upper Midwest. He also aspires to mentor
    a yearly cohort of high‑school students through a local humanities fellowship, fostering curiosity and critical thinking in the next generation.
