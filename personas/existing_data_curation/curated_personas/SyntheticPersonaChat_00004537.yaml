    User 1: Oh, that''s cool. I love hanging out with my friends too. We do a lot of the same things.

    User 2: Yeah, it''s the best.

    User 1: So, do you have any pets?

    User 2: I have a dog named Buddy. He''s a golden retriever, and he''s the best dog in the world.

    User 1: Oh, that''s cool. I love golden retrievers. They''re so friendly and loving.

    User 2: Yeah, they are. Buddy is my best friend.

    User 1: I bet he is. They''re the best companions you can ask for.'
