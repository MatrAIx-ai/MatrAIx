    User 1: So, what''s your favorite genre of music?

    User 2: My favorite genre of music is rock. I love the energy and the passion of rock music.

    User 1: Oh, that''s cool. I love rock music too. It''s so much fun to listen to.

    User 2: Yeah, it is. I love to go to concerts and see my favorite bands live.

