  career_goals: She dreams of turning her love for problem-solving and community into a career that blends technology and sustainability. Her primary ambition is to become an environmental engineer or a
    robotics specialist who designs tools for local agriculture, helping Yakima's fruit growers improve water use and reduce waste. To achieve this she plans to pursue advanced STEM courses in high school,
    join robotics competitions, attend coding bootcamps, and eventually study engineering at a university. She also envisions using her bilingual abilities to mentor younger students in her community, bridging
    cultural gaps in STEM education. Driven by a critical and competitive mindset, she aims to lead projects, evaluate solutions rigorously, and become a top performer in her field.
