personas:
  professional: Sandra Garciamontes is a budding junior coder who designs interactive Scratch games, weaving storylines inspired by her favorite science‑fiction novels, and applies the same competitive
    drive and practical organization she shows on the soccer field to debug and refine her projects.
  sports: Sandra Garciamontes leads the forward line for the River Valley Middle School soccer team, trains twice weekly at the community sports complex, follows the US Women’s National Team and Manchester
    United for tactical inspiration, and balances high‑intensity drills with weekend hikes to maintain stamina.
  arts: Sandra Garciamontes draws cartoons influenced by Adventure Time and Steven Universe during lunch breaks, participates in weekly dance lessons that blend contemporary moves with folkloric steps,
    and fuels her creative bursts by listening to Billie Eilish, Mitski, and the Hamilton soundtrack while sketching storyboards for her next Scratch game.
  travel: Sandra Garciamontes prefers day‑trips that mix adventure and learning, such as weekend hikes on the nearby Sierra Trail, orchard picnics, and family road trips to the state park’s waterfall, while
    dreaming of a future summer visit to Tokyo’s bustling districts and a school‑organized field trip to the Grand Canyon.
  culinary: Sandra Garciamontes loves helping her mother knead masa for tamales, simmer mole with chocolate and chilies, and whisk fresh salsa with tomatoes, jalapeños, and cilantro, while also mastering
    simple spaghetti carbonara and blending green smoothies with spinach and mango for her after‑school snack.
  core: Sandra Garciamontes blends a fierce competitive streak on the soccer field with a skeptical curiosity for sci‑fi worlds, turning every coding bug into a puzzle, every snack purchase into a calculated
    gamble, and every dance step into a fusion of tradition and modern flair.
background:
  cultural: Sandra's cultural background is a blend of Mexican heritage and the Pacific Northwest setting of Selah, Washington. At home, Spanish is spoken alongside English, and her family celebrates Mexican
    holidays such as Día de los Muertos, Cinco de Mayo, and Christmas with traditional foods, music, and storytelling. She learns to cook classic recipes from her grandparents, preserving culinary traditions.
    The close-knit Mexican-American community in Yakima County provides her with a sense of belonging, while also exposing her to the region's agricultural lifestyle, where many families work in fruit orchards.
    This environment fosters appreciation for hard work, the land, and seasonal cycles. Sandra balances these cultural influences with the broader American school culture, navigating dual identities and
    often acting as a bridge between her peers and the Latino community.
