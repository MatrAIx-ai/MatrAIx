persona_description: A geologist who specializes in the study of tectonic processes and their effects on the Earth's surface, particularly in coastal areas. This person is likely to be interested in understanding
  the long-term tectonic control on Holocene shelf sedimentation offshore La Jolla, California, and how it relates to the shore-parallel variations in sediment thickness, the transgressive surface, and
  the nearshore bathymetry. They may have expertise in using Compressed High-Intensity Radar Pulse (CHIRP) surveys and have a background in seismology.
