  hobbies: '[''Cooking soul‑food recipes'', ''Quilting'', ''Knitting'', ''Gardening'', ''Attending church choir and outreach'', ''Listening to R&B and gospel music'', ''Reading African‑American biographies'',
    ''Walking local trails'']'
  career_goals: Sherron aims to move up within the retail sector by first becoming a shift supervisor within the next year, then a store manager within three to five years. She plans to enroll part‑time
    at the nearby community college to earn an associate degree in Business Administration, which will position her for a district‑manager role or to eventually open a small convenience store of her own
    in the Phillipsport area. Her long‑term ambition is to combine her practical retail expertise with her love for community service by managing a store that partners with local food‑bank initiatives.
