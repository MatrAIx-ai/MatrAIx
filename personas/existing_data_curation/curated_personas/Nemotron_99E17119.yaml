  hobbies: '[''Reading'', ''Writing in journal'', ''Hiking'', ''Nature photography'', ''Sketching'', ''Cooking/Baking'', ''Listening to music'', ''4-H club (animal care, gardening)'']'
  career_goals: Vera aspires to a career that balances her love of learning with her desire to help others in a stable, low-stress environment. She is particularly interested in becoming a veterinary technician
    or wildlife rehabilitator, where she can apply her curiosity about biology while caring for animals. She also entertains the possibility of studying library science to become a community librarian,
    a role that would allow her to organize information and support local residents. Her plan includes completing high school, obtaining relevant certifications, and attending a community college that offers
    hands-on training.
