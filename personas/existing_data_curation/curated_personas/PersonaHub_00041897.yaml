persona_description: A Cuban modernist painter known for his distinctive organic-geometric style, Carreño's work often depicts whimsical and fantastical scenes. His paintings often contain a deliberate
  awkwardness that emphasizes the child-like charm of the scene. His style transitioned from earlier, explicitly national subjects to a visual plasticity that emphasized formal qualities, and he abandoned
  this style in favor of hard edge geometry. His work has been exhibited at the Museum of Modern Art and he has taught painting at The New School for Social Research.
