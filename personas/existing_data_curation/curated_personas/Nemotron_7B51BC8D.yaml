personas:
  professional: Tonya Smith is a seasoned printing press operator in Naples, leveraging their meticulous organization, technical mastery of offset and digital presses, and keen artistic eye to ensure flawless
    color reproduction while mentoring new staff and championing sustainable ink practices.
  sports: Tonya Smith embraces a coastal fitness routine, joining sunrise beach yoga sessions, kayaking with the Naples Yacht Club, and playing casual beach volleyball in summer, while cheering for the
    Tampa Bay Rays and Miami Heat, and they subscribe to a local running club for weekend 5Ks.
  arts: Tonya Smith immerses themselves in Naples’ arts scene, attending monthly exhibitions at the von Liebig Art Center, collecting vintage vinyl from artists like Fleetwood Mac, Nina Simone, and The Strokes,
    sketching watercolor waterfronts inspired by Winslow Homer, and participating in screen‑printing workshops that echo Andy Warhol’s techniques.
  travel: Tonya Smith prefers low‑key, nature‑focused getaways, planning weekend trips to Sanibel Island’s shell‑covered beaches, a spontaneous road‑trip to the Everglades for an airboat tour, and dreaming
    of a spring visit to Barcelona’s coastal art districts, balancing their love of adventure with a modest travel budget.
  culinary: Tonya Smith enjoys cooking light, seafood‑centric meals such as grilled grouper with citrus‑herb butter, shrimp scampi with fresh basil and cherry tomatoes, and key‑lime pie topped with whipped
    cream, while indulging in Cuban coffee at local cafés and occasionally ordering spicy Caribbean jerk chicken take‑out for a flavorful nightcap.
  core: Tonya Smith blends meticulous print‑shop precision with a restless artistic curiosity, tames anxiety through sunrise yoga, and can’t resist a late‑night vinyl spin, even if it means skipping a few
    chores.
background:
  cultural: Tonya grew up in a middle‑class, white family in the greater Naples area. Her parents, both retirees who arrived from the Midwest in the 1990s, emphasized hard work, community involvement, and
    a love of the outdoors. The family's cultural practices blend traditional American values—such as punctuality, self‑reliance, and volunteerism—with the relaxed, recreational lifestyle of Southwest Florida.
    Growing up near the Gulf of Mexico, Tonya was accustomed to beach outings, boating outings, and seasonal festivals that celebrate the region's natural beauty. The diverse tourist population in Naples
    exposed her to multicultural influences, including Hispanic cuisine and Caribbean music, which sparked her curiosity about varied artistic expressions. Her education at a local community college introduced
    her to graphic design basics, further nurturing her appreciation for visual arts. Today, Tonya identifies with the coastal Floridian culture that prizes environmental stewardship, active social life,
    and a supportive local arts community.
attributes:
  skills: '[''Operating offset and digital printing presses'', ''Color management and calibration'', ''Prepress software (Adobe InDesign, Illustrator, QuarkXPress)'', ''Quality control and inspection'',
    ''Print finishing techniques (binding, die‑cutting, embossing)'', ''Equipment troubleshooting and maintenance'', ''Inventory management and job scheduling'', ''Production documentation and reporting'',
    ''Team training and mentorship'', ''Client communication and order coordination'', ''Adherence to safety and environmental regulations'', ''Artistic visual assessment and design critique'']'
  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting and sketching'', ''Screen‑printing and linocut workshops'', ''Board‑game nights with friends'', ''Local book club'', ''Sunrise
    beach yoga'', ''Kayaking and paddle‑boarding'', ''Collecting vintage vinyl records'', ''Attending live music events'', ''Volunteering to teach printmaking to children'']'
  career_goals: Tonya aims to advance from machine operator to a supervisory and eventually managerial role within the print industry. Over the next two years she plans to earn a Print Production Management
    certification and take additional coursework in graphic design and sustainable printing practices to broaden her expertise. She envisions leading a team of operators, optimizing workflow efficiencies,
    and introducing eco‑friendly inks and waste‑reduction protocols in her shop. Long‑term, Tonya hopes to open a boutique studio in Naples that offers limited‑edition art prints and custom printing services
    for local artists, leveraging her love of visual arts and community engagement. She also wants to develop a mentorship program for young women entering technical trades, combining her leadership aspirations
    with her commitment to supportive collaboration.
