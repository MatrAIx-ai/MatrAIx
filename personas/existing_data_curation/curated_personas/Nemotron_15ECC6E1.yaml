  hobbies: '[''Softball league'', ''Bowling'', ''Community center volunteering'', ''Cooking traditional Southeast Asian meals'', ''Backyard gardening'', ''Listening to music (classic rock and traditional)'',
    ''DIY woodworking'']'
  career_goals: Thang aims to advance from frontline janitorial work to a supervisory or facilities-management role within the next five years. He plans to earn a certified custodial technician credential
    and an OSHA safety certification, and to complete a GED program to strengthen his credentials. Long-term, he hopes to lead a small team of cleaners at a regional office complex or to start his own contract
    cleaning business focused on schools and community centers, allowing him to mentor younger workers and provide a stable income for his family.
