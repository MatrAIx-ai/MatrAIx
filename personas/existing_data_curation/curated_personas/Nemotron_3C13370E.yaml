  hobbies: '["Hiking", "Camping", "Fishing", "Community softball league", "Acoustic guitar playing", "Woodworking", "Gardening", "Birdwatching", "Volunteer tree planting", "Nature photography", "DIY home
    projects", "Sustainability podcasts"]'
  career_goals: Michael’s primary ambition is to earn an ISA Certified Arborist credential within the next two years, positioning himself for a crew‑lead role or the launch of a small, community‑focused
    tree‑care business. He dreams of integrating sustainable practices—such as native‑species planting and urban canopy health monitoring—into his services, and eventually offering free workshops for local
    schools and senior residents to promote tree stewardship across Waterville and surrounding communities.
