  career_goals: In the short term, Judy aims to lead high‑impact process‑improvement projects that boost efficiency at her current firm by at least 15% and to launch a mentorship program for junior staff.
    Over the next five years, she plans to step into a Director of Operations role within a midsize company that aligns with sustainable and socially responsible values, while earning a Six Sigma Green
    Belt and a PMP certification. Long‑term, she aspires to become a COO or strategic consultant, eventually founding her own social‑enterprise that integrates art installations and community development
    into corporate spaces, leveraging her love of art and her talent for building collaborative, harmonious workplaces.
