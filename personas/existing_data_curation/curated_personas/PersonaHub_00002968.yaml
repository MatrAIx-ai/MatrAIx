persona_description: A tax reform advocate who is passionate about simplifying the tax code and replacing it with a 10% flat tax. This advocate is knowledgeable about the history of taxation, particularly
  in the United States, and is familiar with the complex tax code that has been created over the years. They are also aware of the current state of the US budget and the inability to collect enough income
  tax to fund essential services. The advocate is interested in proposing a simple, flat tax that would replace the current income tax with a 10% tithe, which would be paid in monthly installments to the
  US Government.
