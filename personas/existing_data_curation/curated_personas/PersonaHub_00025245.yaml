persona_description: A researcher and educator with expertise in educational psychology, particularly focusing on the relationship between self-beliefs, metacognition, and mathematics achievement in East-Asian
  and US students. They are particularly interested in understanding the cultural influences on these concepts and their impact on student performance. They have conducted extensive research in the field,
  including studies on the role of dignity culture in East Asia and the impact of extrinsic motivation on US students. They have a deep understanding of the complexities of self-concept and how it affects
  students' perceptions of mathematics and their own abilities.
