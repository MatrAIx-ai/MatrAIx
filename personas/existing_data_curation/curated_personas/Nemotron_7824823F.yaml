personas:
  professional: An aspiring UX engineer, Danielle Soberal merges her accelerated STEM degree, fluency in Python, Java, C++, and SolidWorks, and her watercolor illustration talent to design data‑driven,
    aesthetically pleasing interfaces that prioritize inclusivity and collaborative problem‑solving.
  sports: An outdoor enthusiast, Danielle Soberal hikes the trails of Crowders Mountain with the local Trailblazers Club, follows the Carolina Panthers and Charlotte Hornets, and balances her routine with
    weekly yoga sessions, though she sometimes skips her Thursday gym class after a long study night.
  arts: A creative spirit, Danielle Soberal spends weekends watercolor‑painting landscapes, crafting digital illustrations inspired by Beeple, playing piano renditions of Debussy, and attending Mint Museum
    exhibitions featuring Monet, while occasionally binge‑watching indie films starring Greta Gerwig.
  travel: A curious traveler, Danielle Soberal has road‑tripped to Washington, D.C., visited the Art Institute of Chicago, dreams of cherry‑blossom season in Kyoto, and prefers meticulously planned itineraries
    that blend museum visits with local food tours, though her student budget often limits her to weekend getaways.
  culinary: A budding home chef, Danielle Soberal loves slow‑cooking smoky pulled pork with an apple cider vinegar glaze, whipping up miso‑based ramen broth with kombu and shiitake, and perfecting espresso
    latte art with a dash of cinnamon, yet she frequently over‑schedules cooking sessions and resorts to takeout when a deadline looms.
  core: An inquisitive 18‑year‑old, Danielle Soberal blends tech wizardry with artistic flair, balances community‑rooted generosity with occasional impulsive gadget splurges, and maintains a habit of late‑night
    coding marathons that sometimes sacrifice sleep.
background:
  cultural: Danielle was raised in a middle‑class white family in Huntersville, North Carolina, where Southern hospitality and community values are prominent. Her upbringing blended traditional Southern
    customs—such as church gatherings, local festivals, and family barbecues—with a progressive emphasis on education and innovation. The suburban setting provided access to strong STEM programs, community
    arts events, and outdoor recreation. This mix of cultural heritage and forward‑looking environment has cultivated Danielle's appreciation for both artistic expression and scientific inquiry, shaping
    her collaborative, harmonious, and open‑minded worldview.
