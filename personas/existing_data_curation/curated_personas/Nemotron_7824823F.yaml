  career_goals: Danielle aims to pursue a career that merges technology with artistic expression, such as a UX engineer, scientific data visualizer, or robotics developer focused on public outreach. She
    plans to enroll in a master's program in Human‑Computer Interaction or Computational Science to deepen her expertise. Her long‑term ambition is to lead interdisciplinary teams that create inclusive,
    user‑centered tech solutions, while also contributing to STEM education initiatives for underrepresented youth in her community.
