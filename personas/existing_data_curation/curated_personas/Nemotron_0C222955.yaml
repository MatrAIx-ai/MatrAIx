  hobbies: '[''Cooking traditional Salvadoran dishes'', ''Herb balcony gardening'', ''Crossword and Sudoku puzzles'', ''Walking along Alexandria waterfront'', ''DIY home carpentry projects'', ''Listening
    to boleros and Latin pop music'', ''Reading mystery novels'']'
  career_goals: Adelina aims to re‑enter the workforce in a stable, routine‑driven technical role—such as a quality assurance specialist or senior lab technician—within a government agency or healthcare
    organization. Over the next two years she plans to earn a Certified Quality Engineer credential and to lead a small team responsible for consistent testing protocols. In the longer term, she hopes to
    leverage her expertise to improve health outcomes for the Salvadoran community in the D.C. area by coordinating data‑driven outreach programs, while maintaining a work schedule that allows flexibility
    and routine.
