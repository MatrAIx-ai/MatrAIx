personas:
  professional: Adelina Garcia is a data quality assurance specialist who blends her STEM background with a routine‑focused work style, excelling at calibrating laboratory instruments and documenting processes
    in bilingual, repeatable formats, while tolerating her own occasional lax planning and using her competitive edge to lead a small QA team toward consistent testing protocols.
  sports: Adelina Garcia enjoys solitary weekend walks along the historic Alexandria waterfront, follows the Washington Capitals for ice‑hockey excitement, and participates in the Alexandria Walking Club
    to keep a steady cardio routine, while rarely joining team sports due to a preference for small, low‑key activities.
  arts: Adelina Garcia finds comfort in classic boleros by Los Panchos and contemporary Latin pop hits from Bad Bunny, occasionally attending intimate performances at the Atlas Performing Arts Center, and
    she enjoys re‑watching classic films like "Casablanca" as a quiet cultural indulgence.
  travel: Adelina Garcia prefers low‑key, well‑planned trips such as weekend getaways to Shenandoah National Park and day trips to historic Old Town Alexandria, while dreaming of a structured itinerary
    to Granada, Spain, but she avoids spontaneous travel due to her love of predictability and routine.
  culinary: Adelina Garcia is a skilled home cook who dedicates Saturday mornings to preparing pupusas filled with cheese and loroco and tamales wrapped in corn husks, seasoning them with fresh basil, cilantro,
    and mint from her balcony garden, and she treats occasional visits to local taco trucks for authentic chicharrón as a rewarding culinary indulgence.
  core: Adelina Garcia is a routine‑loving, bilingual QA professional who balances meticulous lab work with a relaxed approach to obligations, a competitive streak in personal goals, and a penchant for
    solving puzzles while savoring home‑cooked pupusas and solitary waterfront walks.
background:
  cultural: Adelina was raised in a bilingual Salvadoran household, where Spanish and English were spoken interchangeably. Her family upholds strong ties to Salvadoran customs, celebrating holidays such
    as Día de la Independencia with traditional foods, music, and community gatherings. As a practicing Catholic, she participates in local parish events and values the close‑knit support of the Salvadoran
    diaspora in the Alexandria area. These cultural roots shape her love for cooking, her dedication to family, and her desire to give back to her community.
