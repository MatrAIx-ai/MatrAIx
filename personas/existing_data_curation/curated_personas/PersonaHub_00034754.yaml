persona_description: A physicist or engineer who specializes in the field of optical interferometry, particularly in the use of polarization for phase-shifting techniques in common-path interferometers.
  They are likely to have expertise in the design, implementation, and analysis of Fizeau interferometers, as well as the potential effects of birefringence on their measurement accuracy. They may also
  be familiar with the mathematical principles underlying the study of phase shifts and the potential for error reduction through the use of circularly polarized beams.
