personas:
  professional: Mary Wiggins, a 21‑year‑old public relations specialist in Minneapolis, leverages their methodical project‑management style, curiosity for emerging digital tools, and empathetic communication
    to craft crisis‑ready narratives that resonate across diverse audiences while staying organized and meeting tight deadlines.
  sports: Mary Wiggins, an active 21‑year‑old Minneapolis resident, cycles with the Minneapolis Bicycling Club along the Chain of Lakes, practices yoga three times a week, and roots for the Minnesota Timberwolves
    and Minnesota Twins, channeling their disciplined yet sociable personality into both individual workouts and community sports events.
  arts: Mary Wiggins, a 21‑year‑old culture enthusiast, spends weekends wandering the Walker Art Center, attending Guthrie Theater performances of contemporary playwrights, and photographing candid moments
    at festivals while drawing creative inspiration from Sufjan Stevens, Kehinde Wiley, and the philosophical works of Alain de Botton, reflecting their blend of curiosity and empathy.
  travel: Mary Wiggins, a 21‑year‑old adventure‑mindful traveler, meticulously plans weekend road trips to the North Shore of Lake Superior and city escapes to Chicago, while dreaming of a summer itinerary
    through Iceland’s fjords and Kyoto’s temples, balancing their structured budgeting habit with a craving for spontaneous photo‑journalism moments.
  culinary: Mary Wiggins, a 21‑year‑old brunch aficionado, favors avocado toast with poached eggs, smoked salmon bagels, and seasonal farm‑to‑table dishes like roasted beet salad at The Bachelor Farmer,
    while their modest cooking skills shine in weekend experiments with homemade kimchi and matcha latte, reflecting a blend of comfort and culinary curiosity.
  core: Mary Wiggins, a 21‑year‑old PR enthusiast with a nervous energy that fuels meticulous planning and spontaneous photography, navigates life by balancing disciplined budgeting, yoga‑driven stress
    relief, and a relentless curiosity for digital storytelling, while they constantly double‑check every email before hitting send.
background:
  cultural: Mary was raised in the Twin Cities region of Minnesota, where the cultural ethos of 'Minnesota nice'—courtesy, cooperation, and community‑mindedness—shaped her outlook. Her family traces its
    roots to German and Scandinavian immigrants, traditions reflected in holiday celebrations and an appreciation for seasonal outdoor activities. Growing up in a predominantly white, middle‑class suburban
    environment, she was exposed to a blend of progressive liberal values common in urban Minneapolis and the pragmatic work ethic of the Midwest. This background fostered her blend of curiosity and practicality,
    a strong sense of reliability, and a commitment to inclusive, harmonious social interactions.
