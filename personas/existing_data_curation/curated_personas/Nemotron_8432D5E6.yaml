  career_goals: Mary aims to become a senior communications strategist within five years, focusing on integrating innovative digital storytelling with measurable impact for purpose‑driven organizations.
    She plans to pursue professional certifications such as the APR and a master's degree in strategic communication to deepen her expertise. Ultimately, she hopes to lead a PR team that champions social
    issues like mental health awareness, leveraging her own experiences with stress to create authentic, supportive campaigns. She also envisions mentoring junior colleagues and building a reputation for
    delivering results that balance creative curiosity with practical ROI.
