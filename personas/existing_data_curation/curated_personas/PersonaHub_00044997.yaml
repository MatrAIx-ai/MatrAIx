persona_description: A historian who specializes in the study of Black revolutionary history in the United States, particularly the Civil War, Reconstruction, Black communist history, and the National Question.
  Their research interests include the development of American society, the relationships between different classes, and the pursuit of Black political power and multinational working class solidarity.
  They are knowledgeable about the lessons from historical struggles and provide clarity and a path forward in today's movement.
