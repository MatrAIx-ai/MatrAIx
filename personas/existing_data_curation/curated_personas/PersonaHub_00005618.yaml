persona_description: A climate scientist who is leading a research team to gather precise measurements of clouds using an array of sensors on a HALO research aircraft. The team hopes to resolve discrepancies
  between satellite data and other means of data collection, and develop a more accurate picture of the inner workings of clouds. The science team ultimately aims to refine their understanding of cloud
  dynamics and how they interact with other factors affecting weather and climate.
