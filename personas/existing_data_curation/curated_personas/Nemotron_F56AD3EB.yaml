  hobbies: '[''Vegetable gardening'', ''Woodworking'', ''Model railroading'', ''Crossword puzzles'', ''Chess'', ''Genealogical research'', ''Non‑fiction reading'', ''Volunteer work at community garden'']'
  career_goals: Now retired, Landon aims to stay intellectually active while giving back to his community. He plans to mentor undergraduate engineering students at a local community college and serve as
    a technical consultant for Habitat for Humanity projects, guiding small teams through planning and execution. He also hopes to complete a detailed model‑railroad layout that reflects his love for precision
    and to author a practical guide on home‑maintenance for fellow retirees. Maintaining his health and emotional stability through routine, purposeful activity remains a central ambition.
