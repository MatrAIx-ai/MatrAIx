personas:
  professional: Elizabeth Garcia is a banking onboarding specialist at a regional branch, known for meticulous data‑entry and compliance checks while fluently navigating Finacle and FIS to guide new clients
    through account setup, and their practical mindset drives rapid issue assessment and structured checklists, yet they often lean on a relaxed approach to deadlines, juggling tasks with a friendly, cooperative
    demeanor that makes training new hires feel like a collaborative conversation.
  sports: Elizabeth Garcia enjoys short hikes with the Cidra Mountain Club through the Cordillera Central, occasional casual soccer matches with local friends, and dancing salsa at weekend bachata nights
    as cardio, while they cheer for the Cangrejeros de Santurce baseball team during summer evenings.
  arts: Elizabeth Garcia finds creative renewal in crocheting simple blankets for loved ones, dancing to the rhythms of Celia Cruz and Daddy Yankee at local salsa clubs, and escaping into romance novels
    by Nicholas Sparks and Nora Roberts, all of which color their evenings with a mix of tactile craft, vibrant music, and heartfelt storytelling.
  travel: Elizabeth Garcia plans trips that blend relaxation and discovery, favoring weekend drives to the historic streets of Old San Juan and the sunny beaches of Isla Verde, while dreaming of a cultural
    tour of New York City’s Latin art scene; they usually book budget‑friendly lodgings, pack a reusable water bottle, and rely on a travel checklist that they update only when a festival invitation arrives.
  culinary: Elizabeth Garcia delights in preparing arroz con gandules, pastelón, and pasteles using homemade sofrito, recao, and fresh plantains, seasoning each dish with a pinch of adobo and a splash of
    coconut milk, while also experimenting with tropical fruit smoothies featuring mango, guava, and a drizzle of honey, showcasing a cooking skill level that ranges from confident family‑style meals to
    adventurous flavor pairings, and they often share the dishes with neighbors during community gatherings.
  core: Elizabeth Garcia blends methodical banking expertise with a love for garden‑grown herbs, salsa rhythms, and community‑focused generosity, all while juggling a relaxed approach to deadlines and an
    occasional habit of misplacing their favorite crochet hook.
background:
  cultural: Elizabeth grew up in Cidra, a close-knit town in the central mountainous region of Puerto Rico known as the 'Town of the Purple Mountains.' Raised in a traditional Puerto Rican household, she
    was immersed in the island's blend of Spanish, African, and Taíno heritage. Family gatherings centered around home-cooked meals—mofongo, lechón, arroz con gandules—instilled a love for cooking and communal
    sharing. The annual Fiestas Patronales, featuring plena music, bomba dancing, and community parrandas, fostered her appreciation for rhythmic music and social cohesion. As a bilingual speaker of Spanish
    and functional English, she navigates both local and mainland contexts. The modest, laid-back lifestyle of Cidra, combined with a strong emphasis on mutual support and religious traditions, has shaped
    her cooperative nature and her desire to help neighbors achieve financial stability.
attributes:
  skills: '[''New account onboarding'', ''Precise data entry'', ''Document verification'', ''Regulatory compliance awareness'', ''Banking software (Finacle/FIS)'', ''Microsoft Excel for financial reporting'',
