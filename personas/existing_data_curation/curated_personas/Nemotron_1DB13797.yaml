  hobbies: '[''Gardening'', ''Cooking traditional Puerto Rican cuisine'', ''Salsa and bachata dancing'', ''Hiking in the Cordillera Central'', ''Reading romance novels'', ''Volunteering at the local community
    center'', ''Attending church and barrio festivals'', ''Crochet crafting'']'
  career_goals: Elizabeth aims to deepen her expertise in financial services and advance to a senior accounts clerk or branch supervisor role within the next three to five years. She plans to enroll in
    an associate's degree program in accounting or obtain a Certified Banking Associate certification to expand her analytical skills. She also seeks to improve her personal organization and project-management
    abilities to contribute to more efficient workflow designs. Beyond her own advancement, she hopes to launch a community-focused financial-literacy initiative in Cidra, helping neighbors better understand
    budgeting, savings, and banking tools.
