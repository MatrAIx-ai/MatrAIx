  career_goals: Myung aspires to attend a four‑year university in California, aiming for a degree in computer engineering or biomedical engineering where his analytical mindset and love for structured problem
    solving can flourish. He hopes to become a software developer or a medical device engineer, fields that offer predictable workflows and tangible outcomes. Alongside academic goals, he wants to master
    stress‑management techniques to reduce anxiety and ensure long‑term emotional resilience.
