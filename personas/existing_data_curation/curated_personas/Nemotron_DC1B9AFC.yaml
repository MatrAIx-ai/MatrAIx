personas:
  professional: A diligent teen robotics enthusiast, Myung Kim, they blend methodical journal‑keeping, strategic video‑game planning, and intricate LEGO construction to spearhead their high‑school robotics
    club’s competition entries, leveraging an organized, detail‑oriented mindset to prototype functional mechanisms while balancing cooperative teamwork with occasional assertive direction.
  sports: Myung Kim, they follow the Los Angeles Lakers and the LA Galaxy with avid enthusiasm, play varsity basketball at Rosemead High School, attend weekend Taekwondo classes at a local dojo, and participate
    in a community YMCA swimming league, structuring each practice session to manage their competitive drive and pre‑game nerves.
  arts: Myung Kim, they nurture artistic expression through Korean calligraphy and a love for sci‑fi literature, from Liu Cixin's 'The Three-Body Problem' to the atmospheric scores of Hans Zimmer, while
    also enjoying the indie pop of DAY6 and illustrations by Hayao Miyazaki, weaving these influences into personal journal sketches.
  travel: Myung Kim, they dream of revisiting Seoul each Chuseok to explore traditional markets, have already taken weekend road trips to Santa Barbara’s coastline and a summer family vacation to San Diego’s
    Balboa Park, and now hope to backpack through Japan’s countryside to attend a robotics expo in Kyoto, balancing family expectations with a desire for independent adventure.
  culinary: Myung Kim, they balance a palate that loves pizza and ramen with a deep appreciation for bibimbap, kimchi fried rice, and spicy tteokbokki, enjoying the tactile practice of chopping fresh vegetables
    and whisking gochujang‑infused sauces at home despite occasional burnt toast mishaps that reflect their perfection‑seeking habits.
  core: Myung Kim, they are a structured, emotionally intense teen who journals daily, builds complex LEGO creations, and channels anxiety into disciplined robotics projects, all while juggling a love for
    Korean calligraphy, sci‑fi fantasies, and occasional impulsive spending sprees on collectible sets.
background:
  cultural: Myung is a second‑generation Korean‑American raised in Rosemead, California, a city with a vibrant Korean community. At home, Korean is spoken, and he celebrates traditional holidays such as
    Chuseok and Seollal with his family. His upbringing blends Korean cultural values—respect for elders, emphasis on academic achievement, and community cohesion—with typical American teenage experiences,
    giving him a bicultural perspective that influences his language skills, culinary preferences, and social interactions.
