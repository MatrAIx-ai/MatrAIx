personas:
  professional: Jason Fenwick, a 28‑year‑old aspiring carpenter and horticulture enthusiast, channels their methodical planning, meticulous budgeting, and collaborative project‑coordination skills into
    a growing home‑based woodworking business while prepping for a community‑college trade program in construction carpentry.
  sports: Jason Fenwick hits the trails with the River Valley Runners running club every Saturday, roots for the Midland Ducks minor‑league baseball team, and occasionally joins a co‑ed community soccer
    league, balancing a love for low‑impact cardio with occasional weekend pick‑up basketball games at the local gym, while they also squeeze in a weekend hike to stay fit.
  arts: Jason Fenwick draws creative fuel from the moody realism of Andrew Wyeth, the crisp landscapes of Ansel Adams, the harmonious folk sounds of Fleet Foxes, and the hands‑on craft of local ceramicist
    Miriam Ortiz, regularly attending Willow Creek Players’ community‑theater productions to blend visual and performing arts into their own woodworking designs, and they often experiment with color palettes
    inspired by these influences.
  travel: Jason Fenwick prefers meticulously planned road trips that blend scenic hikes—like the White Mountains and Shenandoah Valley—with visits to regional craft fairs in Asheville, while daydreaming
    about a spring pilgrimage to the lavender fields of Provence and a summer immersion in Kyoto’s garden districts, and they budget each adventure around their modest freelance earnings.
  culinary: Jason Fenwick favors farm‑to‑table meals, often whipping up heirloom tomato bruschetta, roasted root vegetables seasoned with rosemary and garlic, and a seasonal ratatouille featuring zucchini,
    eggplant, and basil, while their modest culinary skill lets them confidently bake sourdough bread and experiment with wood‑smoked brisket on a backyard smoker, and they never miss a chance to sample
    a locally sourced cheese board at the farmer’s market.
  core: Jason Fenwick is a methodical, curiosity‑driven craftsman who obsessively tracks budgets, stacks heirloom seeds, forgets to water succulents when engrossed in a new woodworking joint, and they can’t
    resist ripping through a new podcast episode during a paint‑drying wait.
background:
  cultural: Jason was raised in a predominantly white, rural Midwestern community in Kingman, Kansas. The local culture emphasizes self‑reliance, modesty, and strong community ties, with traditions that
    include church gatherings, county fairs, and seasonal potlucks. Growing up on a small family farm, he developed a practical, down‑to‑earth mindset and a deep respect for the land. While his formal education
    ended after 12th grade without a diploma, he was exposed to broader ideas through traveling art exhibits, regional festivals, and a curiosity for new perspectives. This blend of Midwestern pragmatism
    and openness to diverse experiences shapes his appreciation for honest craftsmanship, community service, and lifelong learning.
