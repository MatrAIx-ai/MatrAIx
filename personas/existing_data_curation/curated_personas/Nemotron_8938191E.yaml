    Games'', ''Podcast Listening'']'
  career_goals: Jason aims to obtain his GED within the next year and enroll in a community‑college trade program focused on construction carpentry or horticulture. He plans to expand his woodworking hobby
    into a small home‑based business selling handcrafted furniture and décor items, leveraging online platforms and local craft fairs. Parallel to this, he intends to scale his garden into a market‑garden
    operation, supplying fresh produce to the county’s farmers market. In the longer term, he envisions establishing a community workshop that offers both custom woodworking services and art‑making classes,
    positioning himself as a local arts and crafts coordinator while achieving stable, family‑supporting income.
