  hobbies: '[''Reading historical non-fiction and classic literature'', ''Genealogy research'', ''Nature walks and birdwatching'', ''Woodworking projects'', ''Gardening (vegetable and flower beds)'', ''Photography
    of local landscapes'', ''Playing chess'', ''Small monthly book‑club'']'
  career_goals: Although retired, Tanvir aims to leave a lasting personal legacy. He plans to complete a memoir that weaves together his family’s stories and the regional history of Hot Springs Village,
    publishing it for future generations. He wishes to expand his contributions to the local historical society by curating exhibits and mentoring younger volunteers interested in heritage preservation.
    Maintaining his health and financial security remains a priority, so he seeks to continue his disciplined budgeting and adopt new wellness routines. He also hopes to develop a modest community garden
    project that provides fresh produce for neighbors and serves as an educational platform for gardening enthusiasts.
