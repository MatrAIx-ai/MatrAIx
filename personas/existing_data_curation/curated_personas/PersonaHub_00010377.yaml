persona_description: A paleontologist and researcher at the University of Liverpool, specialized in the study of early human evolution and the development of bipedal walking. Known for his groundbreaking
  discovery of the earliest known human footprints, dating back 3.7 million years ago, and for his innovative use of a new technique to compare data from studies of footprint formation and under-foot pressures
  generated from walking in modern humans and other living great apes. His research has been funded by the Leverhulme Trust and the Natural Environment Research Council.
