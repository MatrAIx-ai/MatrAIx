  career_goals: Looking ahead, Ronald hopes to attend a college with strong marine science and engineering programs, aiming to combine his love of the ocean with his practical problem‑solving skills. He
    dreams of working on coastal conservation projects or designing equipment for the Coast Guard or Navy, where he can apply engineering knowledge to protect the environment he grew up near. In the short
    term, he plans to earn a robotics certification, join the school's STEM club, and gain a summer internship with a local marine research center.
