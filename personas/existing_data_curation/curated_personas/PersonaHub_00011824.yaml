persona_description: A researcher and technologist who is passionate about developing new technologies for the graphics, vision, and manufacturing communities. They are focused on creating an inexpensive
  device capable of digitizing the shape and external appearance of objects for transmission, display, and numerically controlled fabrication. They have expertise in developing laser-based scanning systems
  that can generate occlusion-free low-level geometric descriptions of the externally visible surfaces of objects. They have also explored methods for merging multiple range images to produce a seamless
  description of the entire object, and fitting curved surface patches to dense meshes. Their current project is the creation of a high-quality 3D archive of the sculptures of Michelangelo for scholarly,
  educational, and commercial purposes.
