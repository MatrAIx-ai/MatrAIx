    ''Critical thinking'']'
  hobbies: '[''Abstract painting'', ''Digital illustration'', ''Speculative fiction writing'', ''Reading philosophy and art theory'', ''Classical guitar'', ''Cooking experimental recipes'', ''Hiking'',
    ''Chess puzzles'', ''Data science side projects'', ''Collecting Latin jazz vinyl records'']'
  career_goals: Melvin aims to become a senior financial executive, targeting a CFO role within the next five to seven years, preferably in an organization that bridges education and finance. He plans to
    obtain CPA certification and pursue an MBA to deepen his strategic expertise. He envisions launching a boutique consultancy that offers innovative financial solutions and literacy programs for Spanish‑speaking
    communities and educational institutions. Additionally, he aspires to publish thought‑leadership articles on the intersection of finance, technology, and education, and to champion the adoption of fintech
    tools that enhance financial decision‑making in nonprofit and academic settings.
