persona_description: A federal government official responsible for overseeing and coordinating efforts to prevent and reduce tobacco use among youth. This person is likely to be part of a department or
  agency within the U.S. government, such as the Department of Health and Human Services (HHS), the Department of Defense (DOD), the Department of Justice (DOJ), or the Department of Education. This person
  is responsible for monitoring federal programs, conducting research, and coordinating with other federal, state, and local government agencies and nongovernmental entities to address the public health
  challenge of reducing tobacco-related deaths and medical expenditures. This person is likely to have experience working with diverse stakeholders and a strong understanding of the complexities of addressing
  tobacco use among youth, including the challenges of preventing and reducing tobacco use among children and adolescents.
