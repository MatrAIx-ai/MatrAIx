  career_goals: Looking ahead, Brenda aims to solidify her legacy by guiding her company through a sustainable transition that diversifies the regional economy beyond its traditional coal base. She plans
    to launch a renewable‑energy venture and partner with local universities to create workforce‑training programs for younger residents. Brenda is also committed to establishing a mentorship fund that
    supports women and underrepresented professionals in executive roles. Over the next five years, she intends to mentor a successor, ensuring a smooth leadership handoff while preserving the company’s
    community‑first values.
