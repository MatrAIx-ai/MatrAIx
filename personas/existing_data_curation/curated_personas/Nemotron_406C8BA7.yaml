  hobbies: '[''Reading historical fiction and philosophy'', ''Hiking local nature trails'', ''Digital photography'', ''Cooking Puerto Rican cuisine'', ''Playing acoustic guitar'', ''Following professional
    soccer (Puerto Rico, MLS)'', ''Participating in a chess club'', ''Exploring emerging sales technologies'', ''Maintaining a productivity blog'']'
  career_goals: Jose aims to advance to a regional sales manager role within the next three years, overseeing multiple sales teams across Florida and eventually moving into a director-level position. He
    plans to earn a Certified Professional Sales Leader (CPSL) certification and possibly pursue an MBA to augment his strategic acumen. His primary ambition is to design and implement a data-driven performance
    framework that consistently delivers double-digit revenue growth while fostering a high-performing, competitively driven culture. He also hopes to mentor emerging sales talent and, long-term, launch
    his own boutique consulting firm that helps Latin-American businesses expand into the U.S. market.
