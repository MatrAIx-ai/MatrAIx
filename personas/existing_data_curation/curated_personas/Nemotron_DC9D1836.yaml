    for translation and customer service'', ''Time management and task prioritization'', ''Customer service – friendly and patient interaction'']'
  hobbies: '[''Model train building'', ''Cooking traditional Mexican dishes (tamales, mole)'', ''Recreational soccer league'', ''Hiking in the Franklin Mountains'', ''Chess'', ''Reading non‑fiction (self‑help,
    history)'', ''Volunteering at local senior center (activity scheduling)'', ''Attending Día de los Muertos celebrations'', ''Listening to mariachi music'', ''Practicing mindfulness meditation'']'
  career_goals: Jorge is focused on obtaining his GED within the next year, followed by a certification in facilities management or commercial HVAC maintenance at El Paso Community College. In the short
    term, he aims to secure a full‑time, structured position—such as a warehouse supervisor, property‑maintenance technician, or entry‑level logistics coordinator—where his reliability and organizational
    strengths can be leveraged. Over the longer term, he hopes to advance into a supervisory role or launch a modest home‑repair service that provides consistent, scheduled work for local families, allowing
    him to achieve financial stability and a predictable daily routine.
