personas:
  professional: Jorge Alfaro, a 26‑year‑old aspiring facilities‑management technician, leverages their hands‑on aptitude for automotive and handyman tasks, razor‑sharp Excel budgeting, and bilingual communication
    to excel in structured roles such as warehouse supervision, where their methodical planning and punctuality shine.
  sports: Jorge Alfaro enjoys playing recreational soccer on a Wednesday night with the El Paso Community League, roots for El Paso Locomotive FC in the USL Championship, follows the El Paso Chihuahuas
    baseball team for off‑season entertainment, and uses weekend hikes in the Franklin Mountains as a low‑impact cardio routine.
  arts: Jorge Alfaro channels their love of precision into building model train layouts while savoring strategic chess matches, finds inspiration in the narrative depth of Malcolm Gladwell and Doris Kearns
    Goodwin, and relaxes to the smooth guitar work of Mark Knopfler and the orchestral compositions of Ludwig van Beethoven.
  travel: Jorge Alfaro plans trips with meticulous itineraries, enjoys short, budget‑friendly road trips to Santa Fe, New Mexico and the Grand Canyon for hiking, dreams of a well‑organized overseas adventure
    to Kyoto, Japan, and prefers lodging in boutique B&Bs where quiet corners allow for meditation.
  culinary: Jorge Alfaro, a confident home cook, often prepares family‑heritage tamales and mole using exact measurements of masa, ancho chilies, and spices, enjoys experimenting with fresh corn tortillas,
    chiles de árbol, and cacao, and balances their kitchen experiments by ordering sushi on nights they feel less disciplined.
  core: Jorge Alfaro is a methodical 26‑year‑old who merges a love for order with creative hobbies, tends toward worry, yet finds calm in measured routines, detailed planning, and quiet moments of reflection.
background:
  cultural: Jorge grew up in a bicultural Mexican‑American household in El Paso, Texas, where Spanish and English were spoken daily. Family gatherings centered around traditional Mexican holidays such as
    Día de los Muertos, Cinco de Mayo, and Christmas, with music, food, and storytelling. The proximity to the US‑Mexico border gave him a strong sense of community and an appreciation for both Mexican
    customs—like making tamales with his grandmother—and American norms—like celebrating the Fourth of July. He identifies proudly with his heritage, stays connected to his extended family in Ciudad Juárez,
    and regularly participates in local cultural festivals, community clean‑ups, and church activities that emphasize service and solidarity.
attributes:
  skills: '[''Basic automotive maintenance (oil changes, tire rotation)'', ''Handyman repairs (minor plumbing, electrical, carpentry)'', ''Microsoft Office suite (Word, Excel, PowerPoint) – spreadsheet
