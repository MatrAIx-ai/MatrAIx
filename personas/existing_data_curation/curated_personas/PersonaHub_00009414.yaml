persona_description: A charismatic and influential civil rights activist and political figure, known for his work in voter registration and building a "rainbow coalition" of disenfranchised, multiethnic
  citizens working for social justice. His prime-time keynote address at the 1984 Democratic Convention in San Francisco's Moscone Center was considered a highlight of his career, and his voter-registration
  efforts helped the Democratic Party regain control of the Senate in 1986. He is a special figure in the history of the Democratic Party and the civil rights movement in the United States.
