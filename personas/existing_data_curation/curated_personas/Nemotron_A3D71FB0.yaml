personas:
  professional: Ricky Olsen, a 23‑year‑old structural metal fabricator in Wichita, blends meticulous welding expertise and CAD drafting with a quiet curiosity for design, and they reliably manage shop‑floor
    projects while sketching custom metal sculptures that hint at a future boutique studio.
  sports: Ricky Olsen enjoys weekend hikes in the Flint Hills and occasional pickup basketball games with friends while cheering on the Wichita State Shockers and the Wichita Thunder, and they belong to
    a small local cycling club that meets for low‑key rides through the prairie.
  arts: Ricky Olsen spends Saturdays wandering the Wichita Art Museum and local galleries, drawing inspiration from the industrial lenses of Andreas Gursky and the sculptural ethos of Richard Serra, while
    quietly strumming acoustic renditions of Neil Young at home and experimenting with black‑and‑white photography of abandoned factories, and they find that each visual encounter fuels fresh design sketches.
  travel: Ricky Olsen prefers self‑planned road trips that balance scenic hiking in the Flint Hills with visits to industrial heritage sites, having recently driven to Detroit’s automotive museums and a
    weekend in Portland’s craft‑brew scene, and they dream of a future pilgrimage to Berlin’s Bauhaus district and the Norwegian fjords, budgeting each outing with a modest travel fund.
  culinary: Ricky Olsen cooks at a modest skill level, regularly whipping up a hearty Kansas‑style brisket with rubs of smoked paprika, garlic, and brown sugar, while they savor craft‑brew pairings and
    occasionally experiment with charcoal‑grilled corn on the cob and homemade apple pie using locally sourced apples.
  core: Ricky Olsen is a quiet, methodical metal‑fabrication wizard who balances a love for industrial art with a habit of obsessively cataloguing every tool, and they tend to lose track of time while sketching
    designs on napkins.
background:
  cultural: Ricky grew up in a middle‑class, white, Midwestern family in Wichita, Kansas. His surname reflects Danish‑Norwegian ancestry, but his upbringing was firmly rooted in Kansas’ agricultural and
    manufacturing heritage. The city’s strong industrial base shaped his practical, methodical work ethic, while local cultural institutions like the Wichita Art Museum, the Riverfest, and community theater
    sparked his appreciation for visual and performing arts. The values of reliability, humility, and community service common to the region influence his cooperative personality. He participates in neighborhood
    clean‑up events and volunteers at the local food bank, embodying the Midwestern spirit of helping others while maintaining a quiet, introspective lifestyle.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Stick welding'', ''Blueprint reading'', ''CNC plasma cutting'', ''Metal bending'', ''Rigging and hoisting'', ''Safety compliance'', ''Basic CAD design'',
    ''Project planning'', ''Team coordination'']'
  hobbies: '[''Scale model building'', ''Woodworking'', ''Visiting art museums'', ''Industrial photography'', ''Playing acoustic guitar'', ''Reading science-fiction'', ''Hiking'', ''Attending small live
    music shows'']'
  career_goals: Ricky aims to become a certified Journeyman Welder within the next two years and to earn a structural steel inspector certification. He aspires to move into a supervisory role, overseeing
    a small crew on commercial construction projects in the Wichita area. Long‑term, he hopes to launch his own boutique metal‑fabrication studio that merges his technical expertise with his love for art,
    creating custom metal sculptures and functional art installations for public spaces and private clients. He also plans to take night courses in advanced CAD and project management to broaden his skill
    set.
