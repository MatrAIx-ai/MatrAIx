  hobbies: '[''Community basketball league'', ''Local trivia nights'', ''Barbecue cooking'', ''County fair attendance'', ''Craft brewery tours'', ''Regional market scouting trips'', ''Vintage vinyl collecting'',
    ''Home brewing'', ''Improv comedy workshops'', ''Hiking along Muskingum River'', ''Volunteer food bank work'', ''Reading business and market‑trend literature'']'
  career_goals: Thomas aims to advance to a regional buying director role, where he can lead a larger category team and shape buying strategy across multiple markets. He wants to integrate predictive analytics
    and AI tools into the purchasing process to stay ahead of consumer trends. In the longer term, he envisions launching his own boutique wholesale venture focused on sustainable and emerging product categories,
    leveraging his network and reputation for innovative sourcing. He is also committed to strengthening his organizational and project‑management skills to complement his natural flexibility and meet tighter
    deadlines.
