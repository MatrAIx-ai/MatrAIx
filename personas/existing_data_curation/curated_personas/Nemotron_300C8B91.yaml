  hobbies: '[''Painting'', ''Photography'', ''Acoustic guitar'', ''Cooking'', ''Hosting dinner parties'', ''Gardening'', ''Hiking'', ''Reading (art history, philosophy, contemporary culture)'', ''Community
    theater'', ''Attending craft fairs'']'
  career_goals: Derick aims to transition from his current period of unemployment into a flexible, people-focused role that leverages his sociability and love of the arts. He dreams of becoming a community
    arts coordinator or manager of a local café-gallery hybrid where he can host events, support emerging artists, and bring neighbors together. In the longer term, he hopes to complete a bachelor's degree
    in Arts Administration to deepen his expertise and eventually mentor younger volunteers in his town.
