  hobbies: '["Visiting Museums and Galleries", "Sketching", "Oil and Watercolor Painting", "Photography", "Reading Contemporary Fiction and Philosophy", "Playing Piano", "Experimental Cooking", "Mindfulness
    Meditation", "Hiking in Hudson Valley", "Volunteering at Community Arts Center"]'
  career_goals: As a seasoned elementary/middle school teacher, Carl aims to transition into a leadership role within his district. He seeks the position of Curriculum Coordinator for Arts Integration,
    where he can scale his interdisciplinary teaching model district‑wide. He plans to pursue an Ed.D. in Curriculum and Instruction to deepen his research on arts‑based learning. He also aspires to author
    a guidebook on integrating visual arts into core subjects. Over the next five years, he hopes to secure recurring grant funding to launch a community arts after‑school program and embed a mindfulness
    curriculum that leverages his calm demeanor to support student well‑being.
