  hobbies: '[''Reading historical biographies'', ''Urdu poetry'', ''Cooking traditional South Asian recipes'', ''Gardening'', ''Playing chess'', ''Walking'', ''Volunteering at community center'', ''Attending
    cultural festivals'', ''Listening to classical Indian and Sufi music'', ''Traveling to South Asia'']'
  career_goals: Although retired, Mrugesh aims to leave a lasting imprint on the Cary community by documenting the stories of South Asian immigrants, establishing a mentorship program that links seniors
    with youth, and serving on the board of a local cultural museum. He hopes to publish a memoir or collection of oral histories, expand his role as a cultural liaison during city festivals, and continue
    learning new technologies so he can help others navigate the digital world.
