  career_goals: Terrance aims to channel his curiosity and sociability into a more formal role within Brooklyn's cultural scene. He plans to volunteer as a program coordinator for a local arts nonprofit,
    eventually leading a monthly community art walk that highlights emerging artists and unconventional venues. He also hopes to mentor younger participants, develop a modest consulting practice that assists
    grassroots groups in event design, and publish a blog that chronicles his explorations of art, philosophy, and urban experiences. Though retired from formal employment, his ambition is to remain an
    influential connector and advocate for creative expression in his neighborhood.
