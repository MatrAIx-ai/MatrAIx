  hobbies: '[''Visiting art galleries'', ''Sketching coastal landscapes'', ''Playing chess'', ''Gardening'', ''Fishing'', ''Reading biographies of innovators'', ''Traveling to cultural festivals'', ''Volunteering
    to teach business basics'']'
  career_goals: Although officially retired, Manuel aims to channel his business acumen and artistic curiosity into mentoring emerging entrepreneurs, creating a scholarship for students pursuing business‑arts
    interdisciplinary studies, and curating a pop‑up gallery that showcases local senior artists. He also hopes to author a memoir reflecting on the evolution of small‑business retail and the role of community
    art in aging populations, and to lead a volunteer initiative that partners high schools with senior volunteers for collaborative projects.
