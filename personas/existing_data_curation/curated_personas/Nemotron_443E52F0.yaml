personas:
  professional: Manuel Bigornia, a retired hardware‑store owner with a business degree, channels decades of strategic planning, financial oversight, and a cultivated eye for visual art into mentoring emerging
    entrepreneurs, curating pop‑up senior‑artist galleries, and leading community workshops, and they apply their competitive chess mindset to negotiate resources and inspire interdisciplinary projects.
  sports: Manuel Bigornia, a devoted fan of the Tampa Bay Buccaneers and Miami Heat, spends mornings walking the Gulf shoreline, joins a senior bowling league at the community center, and dedicates weekends
    to fishing trips that blend solitary reflection with gentle cardio, and they treat fitness as a disciplined routine that balances competitive spirit with low‑impact activity.
  arts: Manuel Bigornia, an avid visitor of the von Liebig Art Center and regular attendee of Naples gallery openings, spends afternoons sketching coastal landscapes, curates exhibitions featuring works
    by Georgia O’Keeffe, Claude Monet, and emerging local artists, and they find inspiration in the music of Miles Davis and the poetry of Pablo Neruda.
  travel: Manuel Bigornia, who plans trips around cultural festivals like the New Orleans Mardi Gras, the Savannah Music Festival, and the Key West Literary Salon, balances meticulous budgeting with a love
    for spontaneous roadside seafood stops, and they prioritize visiting coastal art colonies and historic towns in the Southeast while respecting retirement‑related travel constraints.
  culinary: Manuel Bigornia, an enthusiastic home cook with intermediate skill, delights in preparing shrimp scampi with garlic, lemon, and fresh parsley, simmering a hearty gumbo with okra and Andouille
    sausage, and crafting simple Caprese salads with ripe tomatoes, basil, and mozzarella, and they often savor fresh citrus and olive oil while pairing meals with a glass of Pinot Grigio.
  core: Manuel Bigornia is a 75‑year‑old former hardware‑store owner whose competitive chess mind fuels a relentless curiosity for art and community mentorship, even as they occasionally indulge in midnight
    sketch sessions and forget to water their patio garden.
background:
  cultural: Manuel grew up in the Midwest, raised in a family of European‑American descent that valued hard work, community involvement, and modest religious traditions. His parents emphasized education
    and civic duty, shaping his lifelong interest in business and service. After a career in retail management, he and his wife relocated to Naples, Florida, where they embraced the coastal lifestyle while
    maintaining Midwestern values of hospitality and neighborliness. He participates in local cultural events, supports the arts, and celebrates holidays that blend his family’s traditional customs with
    Florida’s multicultural influences.
