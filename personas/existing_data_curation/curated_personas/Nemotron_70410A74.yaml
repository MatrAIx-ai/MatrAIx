  career_goals: Pegah aims to advance to a senior equipment specialist or supervisory role where she can lead a team in optimizing document production and equipment reliability. She plans to obtain industry
    certifications such as CompTIA A+ and Certified Document Imaging Architect to deepen her technical credentials. Leveraging her competitive drive, she seeks recognition as the top performer in equipment
    uptime and cost‑saving initiatives, with a longer‑term goal of consulting for small businesses on document‑management solutions or establishing a part‑time freelance service for specialized print and
    digital formatting as she approaches retirement.
