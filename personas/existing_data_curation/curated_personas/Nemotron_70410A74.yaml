  hobbies: '[''Reading historical fiction'', ''Crossword puzzles'', ''Sudoku'', ''Herb gardening'', ''Knitting'', ''Birdwatching'', ''Photography of local scenery'', ''Restoring vintage typewriters'', ''Attending
