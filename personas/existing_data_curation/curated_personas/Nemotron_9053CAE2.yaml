personas:
  professional: Robert Travis, a 9-year-old aspiring soccer strategist and LEGO city architect, leverages their methodical planning and love of rules to lead their school's set-plays while meticulously
    designing intricate LEGO districts during free time.
  sports: Robert Travis, a member of the City Youth Soccer Club, idolizes FC Barcelona's midfielders, practices drills with disciplined precision, follows a structured after-school conditioning routine,
    and cheers for the local high school Hawks during weekends.
  arts: Robert Travis, a lively performer in school talent shows, blends joke-telling and simple magic tricks while dancing to the beats of Kendrick Lamar and Beyonce, drawing inspiration from the charismatic
    stage presence of Will Smith.
  travel: Robert Travis, who has trekked to Legoland California and a weekend family getaway in Orlando's Disney World, meticulously maps out each outing with checklists, dreams of exploring the LEGO Store
    in Tokyo, yet sometimes feels jittery about unfamiliar airports.
  culinary: Robert Travis, a self-described 'pizza architect', delights in stacking pepperoni on a classic pepperoni pizza, mixing mac and cheese with hidden broccoli florets, and occasionally experimenting
    with homemade fruit smoothies featuring banana and strawberries.
  core: Robert Travis is an organized, sociable 9-year-old who thrives on structured play, dazzles peers with jokes and magic, yet battles frequent anxiety that fuels both meticulous planning and occasional
    over-cautiousness.
background:
  cultural: Robert is an African American boy growing up in San Antonio, Texas. His family blends traditional African American customs with the multicultural influences of South Texas, sharing meals of
    soul food and Tex-Mex cuisine. He participates in community celebrations such as Juneteenth and Kwanzaa, and is active in his local church’s youth group, which emphasizes service and resilience. The
    diverse neighborhood school environment and local cultural events expose him to both African American and Latino traditions, shaping his values of community, teamwork, and self-expression.
