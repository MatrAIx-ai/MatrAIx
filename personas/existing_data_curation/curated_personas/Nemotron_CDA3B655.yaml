  career_goals: Although officially retired, Earnest’s ambitions center on staying active, sharing his knowledge, and contributing to the fabric of his community. He aims to expand the senior‑skill‑sharing
    program at the Ashland community center, leading workshops on home repair, budgeting, and garden maintenance. He also hopes to mentor younger volunteers at his church, passing on a disciplined work
    ethic. A personal project he’s pursuing is documenting the history of Ashland’s early infrastructure for the local historical society, with the long‑term goal of publishing a concise memoir that preserves
    his generation’s practical legacy for his grandchildren and future residents.
