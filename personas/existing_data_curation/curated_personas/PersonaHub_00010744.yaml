persona_description: A systems engineer who specializes in the design and development of CO2 lasers, focusing on the selection and optimization of substrate materials, coatings, and mirror designs for high-power,
  low-loss systems. They have experience in understanding the requirements of different laser applications, such as windows, output couplers, beamsplitters, parabolic focusing mirrors, and rear mirrors,
  and in selecting the appropriate materials and coatings for achieving the desired performance and efficiency. They are familiar with the properties and limitations of different substrates, coatings, and
  mirror materials, and have the ability to make informed decisions based on technical knowledge and experience. They are also skilled in the use of mathematical and computational tools to analyze and optimize
  laser systems, and in the development of new technologies and materials for improving laser performance.
