personas:
  professional: Wade Cartwright, a consultative sales representative renowned for weaving storytelling into service contracts, leverages their advanced CRM mastery and Canva‑crafted visuals to solve abstract
    client challenges while balancing meticulous pipeline tracking with spontaneous creative brainstorming.
  sports: Wade Cartwright, a fervent supporter of the Kansas City Chiefs and a participant in the local amateur soccer league’s spring season, combines weekly hikes across the Flint Hills with weekend basketball
    games at the community center, using a competitive edge to push personal fitness goals while still enjoying casual tailgate gatherings.
  arts: Wade Cartwright, an abstract painter inspired by the surreal color palettes of Mark Rothko and the lyrical guitar work of Nick Drake, regularly stages mixed‑media installations for the town’s community
    theater, attends indie film screenings featuring directors like Jim Jarmusch, and curates a personal playlist of progressive rock legends such as Pink Floyd.
  travel: Wade Cartwright, an intrepid road‑tripper who prefers crafting detailed itineraries on a whiteboard, has explored the ghost towns of Route 66 in New Mexico, trekked the misty cliffs of the Scottish
    Highlands, and dreams of photographing the aurora borealis over Iceland’s volcanic landscapes.
  culinary: Wade Cartwright, a self‑taught home chef with a taste for farm‑to‑table fare, often prepares grilled corn and heirloom tomato salad drizzled with balsamic reduction, experiments with smoked
    paprika‑rubbed chicken thighs, and balances cooking sessions with sipping single‑origin cold‑brew coffee while editing their latest song recording.
  core: Wade Cartwright, a 29‑year‑old sales strategist with a painter’s imagination, meticulously tracks leads by day, composes midnight acoustic ballads by night, and never passes a chance to sketch a
    texture‑rich photograph of abandoned barns, even when deadlines loom.
background:
  cultural: Wade is a white Midwesterner raised in El Dorado, Kansas, in a family with deep roots in agriculture and small‑town values. His upbringing emphasized self‑reliance, modesty, and community service,
    often through church activities and local volunteer groups. While he embraces traditional Midwestern courtesy and a conservative work ethic, his personality drives him toward artistic and abstract experiences
    that broaden his cultural horizon beyond the typical rural setting. This blend of grounded regional identity and curiosity for novelty shapes his worldview and personal aspirations.
