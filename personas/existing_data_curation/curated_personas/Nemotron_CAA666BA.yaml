  career_goals: Wade aims to progress from a high‑performing sales representative to a regional sales manager, eventually becoming a director of service sales for a Midwestern firm. He is pursuing the Certified
    Professional Salesperson (CPS) credential and plans to enroll in an associate’s program in business management to solidify his leadership foundation. Long‑term, he dreams of launching his own boutique
    consultancy that helps small businesses design innovative service offerings, positioning himself as a thought leader at industry conferences and publishing articles on creative sales strategies. His
    ambition is fueled by a desire to blend his artistic curiosity with measurable business impact.
