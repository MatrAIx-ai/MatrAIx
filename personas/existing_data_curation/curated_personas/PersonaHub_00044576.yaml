persona_description: 'Thomas H. Meyer, a professor at the University of Connecticut, is an expert in geodesy and has written Introduction to Geometrical and Physical Geodesy: Foundations of Geomatics, a
  textbook for students and professionals in the fields of geodesy, geographic information systems (GIS), remote sensing, engineering, natural resources, and earth sciences. Meyer''s goal is to simplify
  geodetic formulas related to surveying and demonstrate how practical problems can be solved by geodetic theory through detailed examples throughout the book. He is likely to be interested in the application
  of spatial analysis to public and private endeavors and the development of complete technical solutions for various platforms. He is also likely to be familiar with the concepts and theories related to
  subgroups, isomorphisms, and group automorphisms in group theory.'
