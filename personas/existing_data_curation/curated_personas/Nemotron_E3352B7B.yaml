  hobbies: '[''Model engine building'', ''Car restoration hobby'', ''Hiking in Lake Hefner park'', ''Mexican cooking (tamales, salsa)'', ''Strategic video games (Civilization)'', ''Watching soccer matches
    (Liga MX)'', ''Gym workouts (weightlifting)'', ''Attending local cultural festivals'']'
  career_goals: Francisco aims to advance from machine set‑up to a supervisory role within the next five years. He plans to earn certifications such as OSHA HAZWOPER, API 570 Mechanical Integrity, and an
    associate degree in Industrial Technology to qualify for a senior shift lead or plant supervisor position. His competitive nature drives him to lead safety‑improvement projects that reduce downtime,
    and he aspires to be recognized for enhancing operational efficiency through lean‑process initiatives. Ultimately, he seeks a stable career path that offers increased responsibility, higher income,
    and the opportunity to mentor newer operators.
