personas:
  professional: Janice Coleman, a 45‑year‑old senior management analyst, leverages her curiosity‑driven mastery of SQL, Python, R, and advanced Excel to design pragmatic Tableau dashboards while navigating
    a competitive climb toward a director role, often juggling flexible deadlines and occasional disorganization with a skeptical eye toward stakeholder motives.
  sports: Janice Coleman enjoys weekend tennis matches at her local club and is a casual fan of the nearby NFL team, occasionally joining community 5K runs, balancing her competitive spirit with a laid‑back
    attitude toward organized sports and a preference for flexible fitness routines.
  arts: Janice Coleman frequents intimate jazz clubs to hear legends like Miles Davis and John Coltrane, while her literary palate spans classic sci‑fi authors such as Ursula K. Le Guin to contemporary
    social‑justice non‑fiction by authors like Rebecca Solnit, reflecting a blend of cultural appreciation and critical curiosity.
  travel: Janice Coleman favors spontaneous weekend road trips to national parks like Shenandoah and dreams of Mediterranean getaways to Barcelona and Santorini, planning itineraries loosely to allow for
    culinary improvisation and mindful relaxation despite occasional last‑minute scheduling lapses.
  culinary: Janice Coleman is an avid home cook who masterfully blends soul‑food staples like collard greens and gumbo with Mediterranean delights such as shakshuka and grilled lamb, experimenting with
    spices like sumac and smoked paprika while sometimes scrambling to finish dishes when her garden or work distractions intervene.
  core: Janice Coleman, a data‑driven strategist, balances curiosity with practicality, wrestles with worry and occasional disorganization, and finds solace in cooking, reading, jazz, and mentoring while
    fiercely pursuing a leadership role in analytics.
background:
  cultural: Janice was born and raised in Baltimore, Maryland, as the second‑generation child of parents who migrated from the Southern United States during the Great Migration. Growing up in a close‑knit
    African‑American community, she was immersed in church traditions, gospel music, and family gatherings that emphasized education and perseverance. Her family placed a strong emphasis on academic achievement,
    steering her toward a STEM bachelor’s degree at a state university. As a Black professional in the predominantly white corporate environment of Reisterstown and Carroll County, Janice has navigated
    subtle biases, which have sharpened her resilience and competitive drive. She remains actively involved in her local Black sorority chapter (Alpha Kappa Alpha), participates in community service, and
    celebrates cultural milestones such as Juneteenth and African American History Month. These experiences shape her worldview, informing her commitment to diversity, mentorship, and community uplift.
attributes:
  skills: '[''SQL'', ''Python'', ''Advanced Excel'', ''R'', ''Tableau'', ''Power BI'', ''Process Optimization'', ''Financial Forecasting'', ''Risk Assessment'', ''Stakeholder Engagement'', ''Cross-functional
    Facilitation'', ''Strategic Planning'']'
  hobbies: '[''Reading (Sci‑Fi & Non‑Fiction)'', ''Home Cooking (Soul & Mediterranean)'', ''Gardening'', ''Yoga & Mindfulness'', ''STEM Mentorship'', ''Jazz Music'', ''Community Cultural Events'']'
  career_goals: Janice aims to transition from a senior management analyst to a director of strategic analytics within the next five years. She wants to lead a multidisciplinary team that drives data‑informed
    decision making across the organization, championing initiatives that improve operational efficiency and profitability. She is also committed to building a mentorship program for underrepresented professionals,
    especially Black women in analytics, and to pursue an MBA or a specialized certificate in data leadership to augment her strategic management capabilities. Ultimately, she aspires to influence corporate
    policy on diversity, equity, and inclusion through data‑driven insights. She seeks roles that let her experiment with emerging analytical techniques while delivering tangible business outcomes, preferring
    environments that value adaptable planning over rigid structures.
