personas:
  professional: Samantha Stoll, a budding naturalist and junior coder, merges her meticulous field‑journal observations of backyard wildlife with Scratch‑based animations that illustrate animal behaviors,
    while volunteering at the local library to catalog nature books and balancing her curiosity‑driven projects with the practical expectations of school assignments.
  sports: Samantha Stoll spends her weekends hiking the creek‑side woods, practices with the Boone County Youth Soccer team, follows the Kentucky Wildcats men’s basketball with family watch‑parties, and
    participates in the local 4‑H Natural Resources Club where she blends field observation with light competition.
  arts: Samantha Stoll often sketches the rabbit and meadow birds while listening to John Denver’s 'Take Me Home, Country Roads' and the folk harmonies of The Avett Brothers, enjoys crocheting small coasters
    for church potluck gatherings, and occasionally attends the community quilting circle where stories are exchanged like living folk art.
  travel: Samantha Stoll prefers quiet, nature‑focused getaways, having camped at the nearby state park and visited the Great Smoky Mountains with her family, while she dreams of traveling to the Galápagos
    Islands to add exotic bird species to her field journal and hopes to one day explore the historic museums of Washington, D.C.
  culinary: Samantha Stoll loves helping her mother prepare homemade chicken and corn‑bread seasoned with sage, enjoys slicing fresh carrot sticks for her rabbit, and often packs a peanut‑butter‑and‑jelly
    sandwich for library volunteering, showing a modest but confident kitchen skill set.
  core: Samantha Stoll, a 12‑year‑old quiet‑minded naturalist, balances a meticulous field‑journal habit with a tendency to lose track of time when coding Scratch animations, often forgetting chores in
    favor of sketching every bird she spots.
background:
  cultural: Samantha was raised in Hebron, a small community in Boone County, Kentucky, where rural Southern values emphasize family ties, church involvement, and a close relationship with the land. Her
    family has lived in the area for generations, participating in county fairs, church potlucks, and community service projects. The local culture nurtures self‑reliance, modesty, and respect for nature—reflected
    in her love for outdoor activities and practical approach to learning. While the region embraces traditional customs, Samantha’s educational environment at school encourages curiosity and exposure to
    STEM subjects, allowing her to balance her community’s heritage with modern aspirations.
attributes:
  skills: '[''Independent research (wildlife/biology)'', ''Reading comprehension'', ''Critical thinking'', ''Basic Scratch coding'', ''Organizational planning (school assignments)'', ''Pet care (rabbit)'',
    ''First‑aid basics'', ''Active listening and empathetic support'']'
  hobbies: '[''Reading nature books'', ''Field journaling'', ''Birdwatching'', ''Pet rabbit care'', ''Sketching wildlife'', ''Scratch coding'', ''Lego Technic building'', ''Library shelving volunteer'',
    ''Journaling'', ''Crocheting'']'
  career_goals: Samantha dreams of becoming a veterinarian or wildlife rehabilitator, driven by her love for animals and desire to help them recover from injuries. She also envisions a future as an environmental
    educator, leading nature walks for younger children in her community. To achieve these goals, she plans to join her high school’s STEM program, pursue a pre‑veterinary track in college, and eventually
    obtain a degree in veterinary medicine or wildlife conservation. Alongside her professional aspirations, she hopes to start a community garden or a modest wildlife sanctuary on family land to engage
    local kids in hands‑on nature learning.
