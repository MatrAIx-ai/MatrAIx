persona_description: A chemist who specializes in the study of the origin of life, particularly the formation of proteins and RNA. His research interests include the development of new tools and methodologies
  to simulate and predict the formation of biomolecules under various atmospheric conditions, and the identification of potential pathways for the synthesis of life's precursors. He is particularly interested
  in the role of water and hydrogen cyanide in the formation of amino acids and RNA, and the potential for heat from ocean waters to drive the reactions. He is also interested in the development of new
  computational tools to simulate and predict the formation of biomolecules under various atmospheric conditions.
