personas:
  professional: A budding toddler architect, Charles Jarvis builds meticulously balanced block towers, blending curiosity for new shapes with a practical streak, and they reliably follow through on their
    construction plans.
  sports: A tiny water‑play enthusiast, Charles Jarvis splashes at the local toddler pool, wears a little Los Angeles Dodgers jersey to cheer their favorite team, and they love racing peers in crawling
    competitions during playdates.
  arts: A nursery‑rhythm aficionado, Charles Jarvis grooves to "Baby Shark" and "Twinkle Twinkle Little Star," channels their curiosity into bold crayon scribbles reminiscent of early Jackson Pollock works,
    and they occasionally hum a Disney lullaby to soothe themselves.
  travel: A stroller‑bound explorer, Charles Jarvis has visited the nearby botanical garden and the sunny seaside town of Santa Monica, preferring bright open spaces, sensory‑rich flora, and the gentle
    hum of waves, and they eagerly anticipate future trips to the Grand Canyon and a distant city known for its lights.
  culinary: A tiny palate adventurer, Charles Jarvis loves the sweet taste of mashed sweet potatoes, the creamy texture of avocado, and the crunchy pop of peas, often smearing bright orange puree on their
    chin as a playful garnish and giggling when they successfully feed themselves with a small spoon.
  core: Charles Jarvis, a one‑year‑old bundle of organized curiosity, sociable energy, and a competitive spirit, methodically stacks toys while occasionally hoarding snacks and doubting strangers, and they
    turn everyday moments into tiny adventures.
background:
  cultural: Charles belongs to a white Anglo‑American family residing in Santa Fe, New Mexico, a city rich in Hispanic and Native American heritage. While his household observes traditional American holidays,
    he is also exposed to the region’s multicultural rhythms through Spanish greetings, Pueblo art, and community festivals such as the Santa Fe Indian Market and Fiesta de Santa Fe. This blend of cultural
    influences shapes his early worldview, offering a tapestry of desert landscapes, vibrant crafts, and diverse musical sounds that enrich his everyday experiences.
