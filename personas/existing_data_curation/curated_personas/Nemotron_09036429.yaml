personas:
  professional: Troy Mazza, an aspiring automobile technician, leverages their hands‑on woodworking and engine repair experience, systematic planning, and calm under pressure to excel in troubleshooting
    complex vehicle issues while transparently communicating repair steps to customers.
  sports: Troy Mazza, an avid weekend angler at Chesapeake Bay, plays pickup basketball at the Hampton community center, follows the Washington Commanders faithfully, and maintains a weekly strength‑training
    routine at a local gym to stay fit for the physically demanding tasks of automotive repair.
  arts: Troy Mazza, who finds inspiration in the raw storytelling of Johnny Cash, the intricate woodcraft of Thomas Chippendale, and the cinematic wonder of Steven Spielberg’s Close Encounters, incorporates
    those artistic influences into their woodworking designs while enjoying occasional trips to the local art museum.
  travel: Troy Mazza, a meticulous planner, prefers budget‑friendly road trips to Shenandoah and the Outer Banks for fishing and hiking, enjoys lodging in modest cabins, and dreams of a self‑guided Icelandic
    tour to study geothermal heating for future automotive innovations.
  culinary: Troy Mazza, a self‑taught chef, frequently prepares garden‑fresh ratatouille, spicy beef chili with fresh chilies, and grilled trout with lemon‑butter, mastering the use of rosemary and thyme,
    yet occasionally relies on cold pizza during late‑night puzzle sessions.
  core: Troy Mazza blends methodical precision with a curiosity for how things work, turning every garage repair and woodworking project into a puzzle, while habitually neglecting lunch breaks and over‑relying
    on caffeine to power through solitary evenings.
background:
  cultural: Troy grew up in a white, working‑class family in rural Spalding County, Georgia. The Southern culture of small‑town community, modesty, and self‑reliance shaped his values. He was raised with
    a mix of traditional Southern hospitality and a pragmatic outlook, reinforced by regular church attendance and community events. While he respects local customs and family ties, his natural curiosity
    drives him to seek knowledge beyond his immediate environment, balancing regional heritage with an interest in broader ideas.
attributes:
  skills: '[''Automotive maintenance'', ''Small‑engine repair'', ''Basic carpentry'', ''Computer hardware troubleshooting'', ''DIY home repairs'', ''Personal finance budgeting'', ''Project planning'']'
  hobbies: '[''Woodworking'', ''Vegetable gardening'', ''Fishing'', ''Scale model construction'', ''Reading non‑fiction (history, technology)'', ''Puzzle solving (crosswords, logic games)'']'
  career_goals: Troy aims to formalize his practical knowledge by enrolling in a community‑college automotive technology program and earn a certified mechanic credential within the next two years. After
    gaining experience at a reputable garage, he plans to open his own small, customer‑focused auto repair shop that emphasizes transparent pricing and reliable service, leveraging his organizational strengths
    to build a trustworthy reputation in the Hampton area.
