persona_description: A researcher and scientist who specializes in the field of ultrasound imaging and cell biology. They are skilled in using ultrasound waves to focus light waves deep in tissue, allowing
  them to visualize and analyze cellular structures. They have a deep understanding of the mechanics and properties of tissues, and are able to design molecules that selectively bind to specific sites on
  cells, allowing them to label and analyze the target cells. They are also skilled in measuring and manipulating the wavefront of light scattered by the target cells, and are able to imprint the reverse
  of that wavefront on a light beam traveling in the opposite direction, allowing them to create focused light waves that can be used for imaging and analysis.
