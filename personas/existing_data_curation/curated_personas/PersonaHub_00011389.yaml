persona_description: An Earth scientist with a specialization in plate tectonics, sedimentary geology, hydrocarbon exploration, and the study of tectonic units. They are particularly interested in the behavior
  of smaller-scale tectonic units, the origin of the Messinian Salinity Crisis, and the integration of various data types to describe spatial clustering of earthquake epicenters. They have a keen interest
  in the study of stress nodes and extension nodes, and have a particular interest in the role of simple shear stress fields in providing space management solutions for low hierarchy crustal fragment interactions.
  They are also interested in the study of kinematic chains and the role of the Coriolis force in orchestrating these chains. They have a unique understanding of the role of microplates in the tectonic
  processes of the Earth, and have proposed a new definition for orogenesis in the GSST approach.
