personas:
  professional: William Rollins, a 15-year-old high-school sophomore, blends curiosity with practical problem-solving as an aspiring robotics enthusiast who leads his school's LEGO robotics club, builds
    autonomous kits, and embraces a laid-back, flexible study style that lets him sprint between coding sessions and impromptu improv rehearsals.
  sports: William Rollins, a devoted fan of the Minnesota Timberwolves and Minnesota United FC, splits his free time between shooting hoops at the local gym, playing midfield for his school's soccer team,
    skating at the Saint Paul skate park, and hiking the Grand Rounds trail, demonstrating an energetic but sometimes disorganized training routine.
  arts: William Rollins, who listens to Kendrick Lamar, Ariana Grande, and local hip-hop DJs while skateboarding, participates in an improv theater class that channels his outgoing energy, and enjoys binge-watching
    music videos from BTS and Lil Nas X, weaving pop culture into his creative identity.
  travel: William Rollins, who spends weekends hiking the Como Park trails and dreams of visiting Tokyo for a robotics expo and the Rocky Mountains for a snowboarding trip, prefers spontaneous, low-budget
    road trips with friends over meticulously planned vacations, often choosing destinations that combine nature and tech curiosity.
  culinary: William Rollins, a self-taught teen chef, whips up simple meals like chicken quesadillas, ramen bowls with pre-made broth, and grilled cheese sandwiches for his friends, experiments with spicy
    Sriracha and fresh cilantro, and enjoys watching YouTube cooking tutorials while occasionally burning toast due to his relaxed timing.
  core: William Rollins is a socially-charged teen who fuses curiosity for robotics with a laid-back, spontaneous lifestyle, juggling sports, gaming, improv, and kitchen experiments while occasionally letting
    disorganization and late-night habits slide.
background:
  cultural: William grew up in Saint Paul, Minnesota, a city known for its blend of Midwestern friendliness and vibrant cultural life. Coming from a white family with roots in the region's common German
    and Scandinavian heritage, he was raised with values such as community involvement, modesty, and a love for the outdoors. The Twin Cities' diverse environment exposed him to a wide range of traditions
    and perspectives, fostering his sociable nature. Local customs—like attending the Saint Paul Winter Carnival, visiting farmers' markets, and participating in school and neighborhood events—have reinforced
    his appreciation for teamwork, seasonal celebrations, and civic engagement. These cultural influences shape his outgoing personality and his desire to contribute to community‑focused projects.
