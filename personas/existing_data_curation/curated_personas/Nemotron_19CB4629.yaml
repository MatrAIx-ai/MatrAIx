  career_goals: William aims to turn his curiosity about technology and his love for working with people into a career that blends creativity with practicality. He plans to attend a STEM‑focused high school
    program, where he hopes to deepen his coding and robotics skills. His long‑term goal is to become a software engineer or robotics technician who designs tools that help his community—such as apps for
    local events or educational robots for school clubs. He also envisions staying involved in youth outreach, perhaps by leading tech workshops or mentorship programs, allowing him to keep his work flexible
    and socially engaging.
