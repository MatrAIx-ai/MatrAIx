  career_goals: Elaina aims to advance to a regional operations director role within the next five years, overseeing multiple production sites and driving enterprise-wide efficiency initiatives. She targets
    measurable improvements such as increasing throughput, reducing downtime by at least 10%, and achieving a zero-incident safety record. She plans to earn a Six Sigma Black Belt certification and later
    transition to a consulting role where she can help small- to mid-size manufacturers implement structured lean systems. Long term, she seeks a stable career that provides financial independence for retirement
    while maintaining a balanced, low-stress lifestyle.
