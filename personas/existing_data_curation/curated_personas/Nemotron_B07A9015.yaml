personas:
  professional: Wiley Kepley, a pastoral counselor and interdisciplinary theologian, weaves abstract painting, poetry, and digital media into sermons that feel like immersive installations, and is currently
    designing a flexible, community‑driven interfaith arts center in Orange County, though they often let the project's adventurous nature outpace their administrative follow‑through.
  sports: Wiley Kepley finds rhythm in early morning hikes with the Laguna Coast Wilderness Club and weekend yoga at a local studio, occasionally joins the Orange County community basketball pick‑up games,
    and passionately roots for the Los Angeles Angels while chanting verses of a favorite poet during halftime.
  arts: Wiley Kepley channels a love of bright, unconventional color schemes into abstract canvases that explore spiritual themes, strums acoustic guitar at community open‑mic nights, curates vinyl listening
    sessions featuring Sun Ra and Nina Simone, and writes poetry that often appears in the opening nights of local galleries, though they habitually misplace their sketchbooks.
  travel: Wiley Kepley favors loosely planned pilgrimages to places that blend art and spirituality—such as a sunrise meditation retreat in Sedona, a week‑long studio‑visit tour of Kyoto's contemporary
    galleries, and spontaneous weekend trips to Joshua Tree's desert art installations—while juggling a modest travel budget that still accommodates a yearly visit to the coastal vineyards of Santa Barbara.
  culinary: Wiley Kepley gravitates toward vegetarian Mediterranean meals, savoring dishes like roasted eggplant with sumac, lemon‑infused quinoa salad, and lavender‑honey drizzled figs, often experimenting
    with bright pigments of turmeric and beetroot in the kitchen, yet they regularly forget to restock pantry staples, leading to improvised ‘pan‑tray surprise’ dinners.
  core: Wiley Kepley is a 41‑year‑old pastoral counselor whose imagination fuels a kaleidoscopic blend of art, spirituality, and community outreach, balanced by a delightfully chaotic approach to organization,
    finances, and self‑care.
background:
  cultural: Wiley grew up in a middle‑class suburban family in Orange County, raised in a Protestant tradition that emphasized communal worship and service. His bachelor's degree in the humanities broadened
    his exposure to diverse cultural narratives, fostering an appreciation for avant‑garde art and global philosophical thought. Living in Tustin, he is constantly influenced by the region's multicultural
    tapestry—Latino, Asian, and Pacific Islander communities shape his inclusive ministry approach. While his white, American background informs his foundational worldview, his experiences in a culturally
    rich Southern California environment have cultivated a progressive, artistic spirituality that bridges traditional evangelical roots with contemporary creative expression.
attributes:
  skills: '[''Pastoral counseling'', ''Sermon preparation and delivery'', ''Theological research integrating arts'', ''Community outreach program design'', ''Interfaith dialogue facilitation'', ''Creative
    writing and spoken word'', ''Public speaking and workshop facilitation'', ''Conflict mediation'', ''Digital media and livestreaming'', ''Improvisational event organization'']'
  hobbies: '[''Abstract painting'', ''Acoustic guitar'', ''Reading speculative fiction'', ''Modern philosophy'', ''Mindfulness meditation'', ''Hiking'', ''Art gallery visits'', ''Poetry writing'', ''Community
    gardening'', ''Collecting vintage vinyl records'']'
  career_goals: Wiley aims to establish a progressive interfaith arts center in Orange County that serves as a hub for creative spirituality, host workshops, and showcase local artists. He plans to author
    a book that fuses contemporary art criticism with spiritual reflection, and to develop a mentorship program for at‑risk youth that combines theological counseling with artistic expression. Long‑term,
    he aspires to become a university chaplain at a nearby research institution, expanding his reach into academic circles while maintaining an inclusive, arts‑focused congregation.
