  hobbies: '[''Hiking'', ''Bird-watching'', ''Gardening'', ''Cooking Southern comfort food'', ''Reading historical fiction'', ''Knitting'', ''Volunteering at the local library'', ''Attending community theater'',
    ''Participating in craft fairs'']'
  career_goals: Diana aims to move from frontline customer service into a specialized training and development role within the same industry, where she can blend her educational background with her practical
    service experience. Over the next five years she hopes to become a Learning & Development Coordinator for a regional call center, designing curriculum, leading workshops, and mentoring staff. Long-term,
    she envisions launching a community education program in Oliver Springs that offers adult-learning courses in digital literacy, financial basics, and personal development, reflecting her commitment
    to helping others and enhancing local resources.
