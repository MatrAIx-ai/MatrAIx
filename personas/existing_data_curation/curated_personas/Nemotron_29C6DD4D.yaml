  hobbies: '["Community center events", "Trivia nights", "Open‑mic performances", "Acoustic guitar playing", "Sing‑alongs", "Reading science‑fiction and historical biographies", "Fishing", "Hiking in Badlands",
    "Habitat for Humanity volunteering", "Following high school football", "Attending Lake County fair"]'
  career_goals: After a period focused on personal development and volunteer work, Bobby aims to re‑enter the workforce in a role that leverages his people‑skills and practical abilities. He plans to pursue
    a bachelor’s degree in public administration or social work within the next two years, with the goal of becoming a community outreach coordinator for the Lake County public health department. In the
    longer term, he dreams of establishing a nonprofit that provides mentorship and resource navigation for young adults in rural South Dakota, helping them access education and job opportunities. He also
    hopes to achieve certification as a professional mediator to assist in conflict resolution within his community.
