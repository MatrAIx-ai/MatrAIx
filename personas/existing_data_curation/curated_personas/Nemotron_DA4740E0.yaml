  hobbies: '[''Drawing and painting'', ''LEGO building'', ''Reading adventure and science books'', ''Playing soccer'', ''Listening to and dancing to music'', ''Exploring nature on family walks'']'
  career_goals: When asked about his future, Cameron shares that he dreams of becoming a teacher who can combine art and science to inspire curiosity in other children. He also mentions a wish to be a scientist
    or explorer, particularly a marine biologist who can study ocean life and share colorful illustrations of his discoveries. His desire to help others, coupled with his organized approach, fuels an ambition
    to become a community mentor or youth guide who creates safe, creative spaces for friends to learn and play.
