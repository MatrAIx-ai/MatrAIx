personas:
  professional: Cameron Smith, a 7‑year‑old budding junior architect, channels their methodical LEGO city construction and vivid animal drawings into early design thinking, using their curiosity and organized
    nature to plan intricate structures while their kindness ensures collaborative play with friends, and they proudly present each finished model at family gatherings.
  sports: Cameron Smith loves playing soccer with the neighborhood’s Tiny Tigers league, idolizes the local professional team the River City Rovers, and practices dribbling after school, though they sometimes
    fret over missing a goal and can be overly cautious during matches.
  arts: Cameron Smith immerses in drawing vibrant wildlife and space scenes inspired by the works of Dr. Seuss and the animated series “Adventure Time”, builds elaborate LEGO narratives while humming to
    Beyoncé’s upbeat tracks, and delights in dancing to hip‑hop beats during family gatherings, where they often spin in circles to the rhythm.
  travel: Cameron Smith enjoys weekend family trips to the nearby wildlife sanctuary, dreams of visiting the Kennedy Space Center to see rockets up close, and regularly explores the local park’s hidden
    trails, collecting leaves for their sketchbook, where they pause to sketch every new find.
  culinary: Cameron Smith favors cheesy pizza, chicken nuggets, and fruit kebabs, loves helping whisk pancake batter with banana slices, and often negotiates extra cheese on spaghetti, though they occasionally
    resist broccoli on their plate, and they proudly claim the title of “official pancake stirrer” at breakfast.
  core: Cameron Smith is a curious, organized, and energetic 7‑year‑old who blends artistic LEGO building with a love for soccer, worries about tiny setbacks, and delights in colorful drawings and upbeat
    music, and they often share their creations with friends.
background:
  cultural: Cameron is an African‑American child raised in Stafford, Virginia, where his family maintains strong ties to Black cultural traditions. He attends a local Baptist church where gospel music,
    storytelling, and community service are integral, fostering his sense of cooperation and kindness. Family gatherings celebrate heritage through soul food dishes like collard greens and macaroni and
    cheese, and his grandparents share stories of the civil‑rights movement and African‑American achievements, which nurture his pride and curiosity. The proximity to Washington, D.C., gives him occasional
    visits to the Smithsonian’s National African American History Museum, deepening his appreciation for art and history. These cultural experiences shape his worldview, encouraging respect for diversity,
    a love for creative expression, and a commitment to uplifting those around him.
