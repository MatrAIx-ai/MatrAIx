  hobbies: '["Soccer (youth league)", "LEGO construction", "Chess", "Exploring farms and parks", "Reading comic books", "Scratch programming", "Helping with Puerto Rican cooking"]'
  career_goals: Although only seven, Isidro dreams big. He aspires to become a structural engineer or astronaut, envisioning himself designing bridges and rockets that help people. He also imagines a future
    as a professional soccer player who can create his own equipment, merging his love for competition with his practical, hands‑on mindset. He frequently talks about leading school projects, planning everything
    down to the smallest detail, and hopes to one day be the person who organizes community events and ensures everything runs smoothly.
