personas:
  professional: Isidro Puentes is a budding youth soccer midfielder whose competitive edge and methodical playbook preparation reflect his organized, skeptical nature, and they channel the same precise
    thinking into LEGO constructions that help them visualize field formations and execute precise passes.
  sports: Isidro Puentes is a dedicated member of the Hoopeston Hawks youth soccer team, thriving in spring league matches while also dabbling in summer baseball with the local Little League, and their
    competitive, organized mindset drives them to practice drills meticulously, although they can become stressed when a game doesn’t go as planned.
  arts: Inspired by the rhythmic bomba and plena beats echoing through family gatherings, Isidro Puentes immerses themselves in building elaborate LEGO sets, flipping through Marvel comic books like Spider‑Man
    and The Avengers, and listening to kid‑friendly versions of classic salsa tracks, which together fuel a creative outlet that balances their analytical LEGO designs with vivid storytelling.
  travel: Isidro Puentes celebrates family trips to San Juan during the holiday season, dreams of exploring the historic streets of Old San Juan, yet prefers the familiar day‑trip adventures to nearby farms
    and the annual Illinois State Fair, always sketching a simple itinerary with colored crayons before departure.
  culinary: Isidro Puentes loves helping their family stir a simmering pot of arroz con gandules, roll pasteles filled with seasoned pork and plantains, and after soccer practice, they treat themselves
    to pepperoni pizza topped with extra mozzarella, while their favorite snack for LEGO sessions is crunchy apple slices dipped in peanut butter.
  core: Isidro Puentes is a meticulous 7‑year‑old whose competitive soccer spirit, love of LEGO engineering, and persistent worry about missing a goal or a payment combine into a uniquely organized yet
    slightly anxious outlook on life.
background:
  cultural: Isidro is a proud Puerto Rican‑American growing up in Hoopeston, Illinois. At home, Spanish is spoken alongside English, and he celebrates cultural traditions such as Three Kings Day, San Juan
    festivals, and family gatherings featuring dishes like arroz con gandules and pasteles. His parents keep him connected to Puerto Rican music, especially bomba and plena rhythms, and he watches bilingual
    cartoons that reinforce his heritage. While he embraces the close‑knit values of his Latino family, he also participates in the small‑town Midwest community, attending the local elementary school, joining
    the town's youth soccer program, and taking part in community events that blend both cultures.
