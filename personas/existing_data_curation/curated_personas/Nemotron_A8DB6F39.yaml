  hobbies: '[''Gardening (Heirloom Tomatoes & Chilies)'', ''Traditional Mexican Cooking'', ''Digital Photography'', ''Reading Mystery Novels'', ''Guided Breathing/Mindfulness'', ''Volunteer at Mexican Cultural
    Association'', ''Spanish Conversation Tutoring'', ''DIY Home Improvement Projects'', ''Listening to Technology Podcasts'', ''Exploring Basic Coding (HTML/CSS)'']'
  career_goals: He aims to re-enter the workforce in a part-time or contract capacity that leverages his organizational talent and community focus. His immediate goal is to obtain a Certified Associate
    in Project Management (CAPM) credential, which would qualify him for volunteer coordinator or small-business project manager roles within local non-profits serving the Mexican community. Long-term,
    he envisions launching a modest home-renovation consulting service that combines his handyman expertise with his budgeting skills, providing affordable solutions to families in the Buffalo Grove area.
    He also hopes to deepen his technical proficiency by completing an online certificate in web design, enabling him to create websites for community organizations.
