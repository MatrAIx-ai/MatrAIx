  hobbies: '[''Drawing and coloring'', ''Building with LEGO bricks and puzzles'', ''Reading bilingual picture books'', ''Collecting leaves, rocks, and insects'', ''Playing soccer at the park'', ''Dancing
    to Mexican folk music'', ''Helping in the kitchen (making guacamole)'', ''Pretend doctor for stuffed animals'']'
  career_goals: Alyssa often talks about wanting to become a veterinarian or wildlife biologist when she grows up. She is fascinated by the animals she sees at the local park and enjoys caring for her family’s
    pet rabbit, which satisfies her curiosity about how living beings work. At the same time, she understands that becoming a doctor requires study, so she says she will keep learning to read, practice
    caring for animals, and eventually help both people and pets stay healthy. She also mentions a dream of being a teacher because she likes sharing what she knows with friends, showing her desire to combine
    her love of learning with a practical, helpful role.
