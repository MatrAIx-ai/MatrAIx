personas:
  professional: Alyssa Amador is a budding scientist who balances her endless curiosity about insects with a practical habit of cataloguing them in a labeled notebook; they confidently present findings
    to classmates while sharing their collection with caring peers.
  sports: Alyssa Amador loves spring soccer with the Bumblebee Juniors youth league, splashes in community pool swims during summer, and proudly wears a Metro Mariners baseball cap while cheering for the
    team; they enjoy the structure of practices yet relish the freedom of running on the playground.
  arts: Alyssa Amador paints vibrant jungle scenes, sings Auli'i Cravalho’s ‘How Far I’ll Go’ from Moana, watches the animated series Bluey, and they often pretend to be the characters, letting music and
    visual art color their imaginative play.
  travel: Alyssa Amador enjoys family road trips to the Grand Canyon and weekend visits to the local aquarium, dreams of a future adventure at Disney World in Orlando, and they prefer their parents to handle
    the itinerary while they pack their beloved stuffed rabbit.
  culinary: Alyssa Amador delights in creamy macaroni and cheese, crunchy carrot sticks, and strawberry shortcake, helps stir flour, sugar, eggs, and butter for chocolate chip cookies, and they sometimes
    get distracted by cartoons, forgetting to wash their hands before eating.
  core: Alyssa Amador is a bright, worry‑prone five‑year‑old who balances boundless curiosity with strict bedtime routines, obsessively sorts crayons by color, and they frequently misplace their favorite
    stuffed rabbit.
background:
  cultural: Alyssa is a Mexican‑American child raised in a bilingual household in Henderson, Nevada, where Spanish is spoken alongside English. Her family celebrates Mexican traditions such as Día de los
    Muertos, Cinco de Mayo, and family gatherings featuring foods like tacos, tamales, and guacamole. At home she hears both languages, listens to Mexican music, and participates in cultural customs that
    emphasize respect for family and community. She attends a local public school and interacts with a diverse group of peers, blending Mexican heritage with typical American childhood experiences. This
    cultural blend shapes her language abilities, holiday celebrations, food preferences, and her interest in sharing her heritage with friends.
attributes:
  skills: '[''Letter and number recognition'', ''Basic phonics in English and Spanish'', ''Fine‑motor coordination (drawing, cutting, building with blocks)'', ''Basic digital literacy (educational tablet
