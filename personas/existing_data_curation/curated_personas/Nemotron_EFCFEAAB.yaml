personas:
  professional: Deon Gibson is a diagnostic medical sonographer whose precise ultrasound imaging and thorough documentation reflect a love of structure, yet their improvisational flair—honed by a weekend
    comedy troupe—lets them pivot quickly when patient needs shift, as they aim for RDMS cardiac certification and a future role as a clinical educator.
  sports: Deon Gibson fuels their fitness by paddling with the Tampa Bay Paddle Club on the weekend, cheering for the Buccaneers and the Lightning, and playing in an intramural basketball league that practices
    at the Orlando Magic community center.
  arts: Deon Gibson channels their storytelling love into writing short fiction inspired by Toni Morrison and performing improv sketches, while soul artists like Leon Bridges and jazz visionary Kamasi Washington
    regularly soundtrack their evenings at Orlando venues.
  travel: Deon Gibson prefers spur‑of‑the‑moment road trips to culturally rich Southern towns such as Savannah and New Orleans, yet dreams of saving for a spring break in New York City to attend a health
    humanities conference and explore Broadway.
  culinary: Deon Gibson delights in cooking soul‑food classics—crispy fried catfish, slow‑simmered collard greens seasoned with smoked paprika, and sweet potato pie—often inviting friends over for communal
    meals that celebrate home‑cooked Southern flavors.
  core: Deon Gibson is a structure‑loving sonographer who secretly thrives on spontaneous comedy, struggles with meeting deadlines, and finds balance in gospel‑infused storytelling, kayaking, and soulful
    cooking.
background:
  cultural: Deon was raised in a tight‑knit African‑American family in the Tampa Bay area, where church, gospel music, and storytelling shaped his worldview. His parents emphasized academic achievement
    and community service, leading him to earn a BA in humanities from a historically Black college before training as a sonographer. He celebrates cultural traditions such as Juneteenth, Southern soul
    food, and local Black arts festivals, and he actively mentors youth from underrepresented backgrounds to pursue careers in healthcare.
attributes:
  skills: '[''Abdominal ultrasound'', ''Obstetric and fetal imaging'', ''Echocardiography'', ''Vascular Doppler studies'', ''Patient positioning and comfort'', ''Medical documentation'', ''Infection control'',
    ''Anatomical knowledge of abdomen, pelvis, cardiovascular system'', ''Interpersonal communication'', ''Cultural competency'', ''Critical thinking'', ''Basic equipment troubleshooting'']'
  hobbies: '[''Jazz and soul concerts'', ''Reading African-American literature'', ''Creative writing (short stories, poetry)'', ''Kayaking in Central Florida lakes'', ''Improvisational comedy'', ''Cooking
    soul food'', ''Sketching and drawing'', ''Rhythm video games'', ''Volunteer tutoring at community center'']'
  career_goals: Deon aims to achieve RDMS certification with a cardiac imaging specialization within three years, pursue a master’s degree in Health Humanities to blend his arts background with clinical
    practice, and eventually move into a supervisory or clinical educator role. He hopes to lead quality‑improvement projects in his department, mentor underrepresented students entering allied health,
    and contribute to community health outreach programs that address disparities in maternal and cardiac care.
