persona_description: A historic figure from the American South who played a significant role in the construction of bridges in Georgia, Alabama, and Mississippi, particularly in the 19th century. King was
  a Republican who served as a representative in the Alabama Legislature and was remembered for his engineering skills and character. He was a bridge builder who passed on his expertise to his children
  and was posthumously inducted into the Alabama Engineers Hall of Fame at the University of Alabama. King's legacy includes the Columbus, Georgia Bridge, the forty cotton warehouses in Apalachicola, Florida,
  and the replacement Columbus, Georgia Bridge.
