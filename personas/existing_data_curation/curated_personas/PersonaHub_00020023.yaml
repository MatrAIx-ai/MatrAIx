persona_description: A computer systems analyst with a bachelor's degree in computer and information systems, management information systems, or a related field, who works in the field of information technology.
  They have experience in consulting with management and end-users to define system objectives, working with software engineers, computer programmers, and other IT professionals to design and implement
  systems to meet these objectives. They oversee the implementation, testing, release, and maintenance of systems, and have knowledge and experience in specific industries such as accounting, healthcare,
  and business. They are expected to work 40 hours or more per week and may work from remote locations. They are interested in a job with a growing demand for information security and a fast-growing field,
  with a focus on technology and information systems. They have a passion for learning and developing new skills, and are willing to take on complex and challenging roles.
