  career_goals: Joseph aims to move from front‑line representation to a supervisory role within the next two years, leveraging his people‑skills to lead a team of agents. He plans to earn a Customer Success
    Management certification and eventually transition into a training or operations‑focused position where he can design workflow improvements. Long‑term, he dreams of using his practical mindset and cultural
    heritage to open a family‑run Mexican restaurant in the Santa Cruz area, combining his love of food with community entrepreneurship.
