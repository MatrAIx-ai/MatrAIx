  career_goals: Mark aims to leverage his extensive operational knowledge to transition into a supervisory or lead logistics role within the next few years. He plans to obtain a Certified Supply Chain Professional
    (CSCP) credential and complete an OSHA forklift certification upgrade. He also aspires to mentor younger coworkers, improve workplace safety protocols, and contribute to the efficiency of the regional
    distribution network, all while preserving a stable work‑life balance for his family.
