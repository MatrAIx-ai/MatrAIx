personas:
  professional: Henry Coulson, a veteran grounds‑keeping master who merges his technical expertise in irrigation design, soil management, and contract budgeting with an avant‑garde artistic vision, they
    use their competitive nature to craft award‑winning, eco‑friendly garden spaces that stay on schedule and within budget.
  sports: Henry Coulson, a devoted supporter of the Philadelphia Eagles, the Philadelphia Phillies, and the Pittsburgh Steelers, they join a local senior softball league on Saturdays, take morning jogs
    along the Susquehanna River Trail, and treat seasonal bird‑watching outings as their personal sport.
  arts: Henry Coulson, whose artistic influences include Claude Monet’s watercolors, Georgia O’Keeffe’s floral abstractions, and Ansel Adams’s black‑and‑white nature photography, they spend evenings painting
    garden scenes, curate a small exhibition of seasonal flora photographs at the town theater, and design set pieces that echo their abstract landscape sketches.
  travel: Henry Coulson, an inquisitive traveler who has explored Kyoto’s cherry‑blossom gardens, the formal terraces of Versailles, and the wildflower meadows of the Great Smoky Mountains, they prefer
    meticulously planned off‑season trips and now dream of visiting the Keukenhof tulip fields in the Netherlands to study horticultural color palettes for their next design.
  culinary: Henry Coulson, a garden‑to‑plate enthusiast, they frequently prepare heirloom tomato gazpacho with fresh basil, cucumber, and a hint of aged sherry vinegar, roast rosemary‑infused carrots alongside
    wild‑foraged mushrooms, and delight in pairing their dishes with locally sourced goat cheese and artisanal sourdough.
  core: Henry Coulson, a 58‑year‑old landscape virtuoso, they fuse imaginative artistry with disciplined horticultural practice, channel a competitive drive into sustainable garden innovations, and confront
    mild hypertension while obsessively cataloguing bird songs during spare moments.
background:
  cultural: Henry grew up in a small Midwestern town in Illinois, raised in a tight‑knit, predominantly white community where family, church, and agricultural roots shaped his values. His ancestry includes
    German and Irish immigrants who settled in the area in the early 1900s. The regional culture of modesty, self‑reliance, hard work, and hospitality informs his work ethic and interpersonal style. He
    maintains strong ties to local traditions such as county fairs, community festivals, and volunteer service, while also embracing the Midwest’s growing interest in sustainable living, outdoor art, and
    community gardening.
