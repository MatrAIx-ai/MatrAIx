  career_goals: Henry aims to move from hands‑on groundskeeping into senior design and project‑management leadership. He plans to earn a Certified Landscape Professional credential, develop a portfolio
    of innovative, eco‑friendly garden installations, and win regional landscaping awards. Within five years he hopes to launch his own boutique landscape‑design firm that emphasizes artistic expression
    and sustainable practices, mentor younger workers in his community, and introduce smart‑irrigation technology to municipal parks in Cumberland County.
