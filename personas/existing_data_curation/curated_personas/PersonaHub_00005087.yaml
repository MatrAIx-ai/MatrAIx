persona_description: A materials scientist who specializes in the research and development of pozzolan-based materials for concrete construction, particularly metakaolin. Their expertise lies in the control
  and quality of metakaolin manufacturing, the application of metakaolin in concrete construction, and the improvement of concrete properties through the use of metakaolin at various levels of replacement
  with cement. They are interested in the potential applications of metakaolin in large-scale construction projects and the environmental impact of their research and development.
