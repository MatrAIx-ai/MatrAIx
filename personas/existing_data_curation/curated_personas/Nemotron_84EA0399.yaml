personas:
  professional: Latoya Hudson is an aspiring teenage visual artist who blends mixed‑media sketches with digital collages, channeling their curiosity and organized yet flexible workflow into after‑school
    art club projects and community mural initiatives, while assertively seeking mentorship from local Brooklyn artists.
  sports: Latoya Hudson enjoys playing pick‑up basketball at Prospect Park and follows the Brooklyn Nets fervently, participates in a weekend swim team at the local community center, and balances these
    activities with a love for yoga sessions streamed at home, albeit they sometimes skip practice when art deadlines loom.
  arts: Latoya Hudson immerses themselves in Brooklyn's creative pulse by sketching in McCarren Park, frequenting the Brooklyn Museum, curating playlists featuring Miles Davis, Kendrick Lamar, and Erykah
    Badu, and devouring graphic novels like "Ms. Marvel" and "Saga," while they also volunteer at neighborhood festivals to showcase emerging street artists.
  travel: Latoya Hudson prefers weekend adventures that blend art and culture, having explored the street murals of Bushwick, taken a family trip to the Metropolitan Museum in Manhattan, and dreaming of
    a future study‑abroad stint in Paris's Montmartre district, though they balance these wanderlust plans with school responsibilities and a modest travel budget.
  culinary: Latoya Hudson enjoys assembling avocado‑toast with cherry tomatoes and feta for breakfast, relishes a slice of pepperoni pizza topped with fresh basil after a sketching session, and experiments
    with making simple ramen bowls seasoned with soy sauce, miso, and a soft‑boiled egg, though they often indulge in sugary bubble tea between art classes.
  core: Latoya Hudson is a curious, organized teen who channels a love of urban art into mixed‑media creations, balances spontaneity with school duties, and occasionally trades late‑night sketch marathons
    for sugary snacks.
background:
  cultural: Latoya is an African‑American teen raised in a close‑knit family in Brooklyn's culturally rich neighborhoods. Her family values storytelling, music, and community activism, drawing from the
    legacy of the Harlem Renaissance, gospel traditions, and the local hip‑hop scene. Growing up amidst vibrant street murals, neighborhood block parties, and the diverse diaspora of black cultures—including
    Caribbean and African influences—has shaped her worldview. She frequently attends church services that blend gospel with contemporary worship, and she participates in community gatherings that celebrate
    black history, social justice, and artistic expression. This cultural tapestry informs her artistic voice, her commitment to uplifting her community, and her resilient yet compassionate outlook.
attributes:
  skills: '[''Digital illustration (Procreate)'', ''Pencil sketching'', ''Basic Scratch programming'', ''Photography'', ''Creative writing'', ''Organizational planning for school projects'', ''Public speaking
