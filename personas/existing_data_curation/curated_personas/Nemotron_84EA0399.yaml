  hobbies: '[''Sketching in parks'', ''Visiting the Brooklyn Museum'', ''After‑school art club'', ''Photography walks in Williamsburg and Bushwick'', ''Listening to jazz, hip‑hop, and neo‑soul'', ''Reading
    graphic novels and diverse YA fiction'', ''Volunteering at community festivals'']'
  career_goals: Latoya dreams of becoming a multidisciplinary artist who uses visual storytelling to highlight community issues and celebrate black culture. She aspires to study graphic design and illustration
    in high school and eventually work as a creative director for a nonprofit focused on youth empowerment. Alongside art, she hopes to mentor younger students in her neighborhood, using workshops and community
    murals to inspire curiosity and self‑expression. Her long‑term ambition includes establishing a youth art collective that bridges traditional African‑American heritage with contemporary digital media.
