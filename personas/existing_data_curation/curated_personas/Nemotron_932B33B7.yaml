personas:
  professional: Angelo Sarchi, a budding automotive technology apprentice, merges methodical mechanical repairs with a flair for people‑centric event planning, turning routine workshop tasks into informal
    teach‑ins while leading youth activities at the local community center.
  sports: Angelo Sarchi, a regular on the downtown pickup basketball courts, cheers for the Milwaukee Bucks and plays in the Lakeshore Community Basketball League, while also spending Saturdays fishing
    on Lake Michigan with his crew, reflecting a love for team spirit and relaxed, unscripted outdoor recreation.
  arts: Angelo Sarchi, an avid concert fan, frequents gigs featuring The Black Keys, Jack White, and local indie outfit The Sorry, while also enjoying classic rock staples like Led Zeppelin and unwinding
    with late‑night film marathons of Quentin Tarantino’s movies.
  travel: Angelo Sarchi prefers road‑trip adventures over long‑haul flights, having driven the Lake Michigan coastline to Door County, Wisconsin, explored Nashville’s music venues, and planning a future
    bike‑tour across Michigan’s Upper Peninsula once his savings for the café‑bistro idea grow.
  culinary: Angelo Sarchi loves cooking hearty comfort dishes, from a slow‑cooked beef chili seasoned with cumin, paprika, and kidney beans to garlic butter mashed potatoes and a homemade Chicago‑style
    deep‑dish pizza topped with mozzarella, pepperoni, and a thick tomato sauce, and they often experiment with new sauces while binge‑watching cooking shows.
  core: Angelo Sarchi is a sociable 19‑year‑old who craves routine yet embraces spontaneous basketball games, fishing outings, and late‑night concerts, all while juggling an apprenticeship, a budding event‑organizing
    streak, and a habit of spilling coffee on their workbench.
background:
  cultural: Angelo is a second‑generation Italian‑American raised in Muskegon, Michigan. He grew up in a middle‑class, Catholic‑influenced household where family meals, holiday celebrations (especially
    Christmas, Easter, and Fourth of July barbecues) and community involvement were central. The Great Lakes region’s practical, work‑oriented culture and seasonal outdoor activities—fishing, boating, and
    backyard gatherings—have shaped his values of tradition, practicality, and sociability.
