  hobbies: '[''Pickup basketball'', ''Lake Michigan fishing trips'', ''Attending local concerts and music festivals'', ''Car meets and DIY auto projects'', ''Cooking comfort food'', ''Multiplayer video
    gaming'']'
  career_goals: Angelo aims to build a career that leverages his love of routine, practicality, and social interaction. In the short term, he plans to complete an apprenticeship in automotive technology
    while volunteering as a youth event organizer at the local community center. Long‑term, he envisions opening a small café‑bistro that doubles as a gathering spot for local music nights and community
    meet‑ups, providing a stable routine and a platform to connect with people.
