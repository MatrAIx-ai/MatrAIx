    and GPS technology'', ''Mentoring and training of junior carriers'', ''Union participation and advocacy'']'
  hobbies: '[''Gardening (chilies, tomatoes, herbs)'', ''Cooking traditional Mexican dishes'', ''Hiking in the Sandia Mountains'', ''Playing acoustic guitar'', ''Reading business and self‑improvement books'',
    ''Volunteering at the local food bank'', ''Mentoring youth through postal outreach'', ''Playing pickleball at the community center'']'
  career_goals: Serafin aims to advance to a supervisory position such as Senior Route Supervisor or Assistant Postmaster at the Albuquerque post office, where he can apply his structured approach to improve
    operational efficiency and integrate new technologies. He wishes to formalize a mentorship program for new carriers, fostering a cooperative and supportive work environment. Over the next five years,
    he plans to lead initiatives that streamline delivery routes, reduce errors, and enhance customer satisfaction. Looking ahead to retirement, he hopes to transition into a consulting role for local small
    businesses, advising on logistics and inventory management, while continuing to volunteer in community outreach programs.
