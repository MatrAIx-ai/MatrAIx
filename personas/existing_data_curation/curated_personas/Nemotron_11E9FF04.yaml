personas:
  professional: Boyd Vogel is a seasoned public relations strategist whose disciplined project management and vivid imagination fuel award‑winning cultural campaigns for nonprofit arts groups, where they
    blend data‑driven messaging with abstract visual storytelling to amplify community impact.
  sports: Boyd Vogel is an avid birdwatcher and hiker who joins the Saint Peter Trails Club for spring treks along the Minnesota River, follows the Minnesota Twins in baseball and the Vikings in football,
    and occasionally casts a line for walleye on the lake during summer weekends.
  arts: Boyd Vogel is a devoted painter of abstract canvases inspired by Jackson Pollock’s drip techniques, a photographer who emulates Ansel Adams’ tonal range in Midwestern landscapes, a piano player
    who repeats Philip Glass’s minimalist motifs for meditation, and a regular attendee of the St. Peter Renaissance Theater where they applaud productions of Shakespeare alongside modern dramatists.
  travel: Boyd Vogel is a thoughtful traveller who plans weekend getaways with detailed itineraries, preferring the rugged allure of the North Shore of Lake Superior and the historic streets of Charleston,
    while dreaming of a slow‑paced road trip through the Canadian Rockies to photograph sunrise over glacial valleys.
  culinary: Boyd Vogel is a competent home cook who transforms garden harvests into roasted beet and goat‑cheese salads, perfects a classic Minnesota walleye with lemon‑butter sauce, and delights in simmering
    French onion soup seasoned with thyme and bay leaf, though they sometimes over‑salt the broth when distracted by a new painting idea.
  core: Boyd Vogel, a 63‑year‑old PR veteran with a painter’s imagination, balances meticulous strategy with boundless curiosity, sprinkling daily life with art, garden solitude, and a disciplined, though
    occasionally indulgent, approach to health and finance.
background:
  cultural: Boyd was raised in a small farming community in southern Minnesota and grew up in a family with German‑Scandinavian roots, reflecting the region’s strong Lutheran heritage. The Midwestern values
    of modesty, hard work, community service, and “Minnesota nice” politeness shaped his worldview. He attended local public schools and later earned an associate’s degree at a community college, where
    he developed an early interest in communications. Throughout his life, Boyd has maintained close ties to his Lutheran church and participates in community events that celebrate regional traditions,
    such as county fairs and harvest festivals. His cultural background emphasizes family, civic engagement, and a respect for both tradition and progressive ideas, which informs his professional ethos
    and personal pursuits.
