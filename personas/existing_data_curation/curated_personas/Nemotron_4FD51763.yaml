  career_goals: Sean dreams of becoming an engineer or architect, attracted by the ability to design functional, well‑organized spaces. He also considers a career in education or community leadership, where
    he can use his organizational skills and sociability to improve his town. In the short term, he aims to earn a scholarship for high school STEM programs, become student council president, and join a
    youth leadership group. He wants to develop his technical skills further while continuing to help others.
