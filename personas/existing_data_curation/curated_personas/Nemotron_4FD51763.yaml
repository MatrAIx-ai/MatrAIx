personas:
  professional: Sean Handy, a 13‑year‑old budding engineer and debate prodigy, leverages meticulous organization and a love for structured argument to spearhead their school’s science club projects, coordinate
    weekly chess lessons at the community center, and relish the spotlight while holding themselves to exacting standards.
  sports: Sean Handy spends afternoons shooting hoops with the Springfield Hoops youth basketball league, follows the Golden State Warriors for strategic inspiration, treats each game as a tactical exercise
    yet sometimes skips warm‑ups, resulting in occasional sore knees that they nervously tap into their injury‑prevention checklist.
  arts: Sean Handy blends technical finesse with creative flair by constructing precision model bridges while immersing themselves in the cinematic scores of Hans Zimmer, the indie pop of Paramore, and
    attending school art fairs to showcase miniature engineering masterpieces, often reciting the backstory of each piece to captivated peers.
  travel: Sean Handy prefers meticulously planned excursions, joining family on weekend road trips to the Grand Canyon and Washington D.C.’s Smithsonian museums, dreaming of an overseas engineering tour
    of Tokyo’s robotics labs, yet limited allowance confines most journeys to destinations within a few hours’ drive.
  culinary: Sean Handy enjoys assembling balanced meals like turkey‑and‑avocado wraps with whole‑grain tortillas, crafting protein‑rich smoothies with banana, spinach, and almond milk, and occasionally
    treats themselves to a pepperoni pizza topped with extra cheese, flaunting a modest knack for cooking that mirrors their methodical approach to model building.
  core: Sean Handy is a hyper‑organized, socially vibrant teen whose passion for structure fuels both academic ambition and a persistent worry that drives them to over‑plan every facet of life, from debate
    scripts to snack schedules.
background:
  cultural: Sean grew up in Morristown, a small town in eastern Tennessee. His family’s roots are in the Appalachian region, with a strong sense of community, church involvement, and appreciation for the
    outdoors. The town’s close‑knit environment emphasizes values such as hospitality, mutual support, and self‑reliance. Local traditions like county fairs, high school football games, and church potlucks
    shape his social life. While he shares broader Southern cultural influences—respect for family, modesty, and hard work—he also benefits from his school’s efforts to promote STEM education and civic
    engagement.
