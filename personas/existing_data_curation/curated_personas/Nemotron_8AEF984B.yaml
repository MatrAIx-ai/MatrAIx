  hobbies: '[''Community theater participation'', ''Gardening'', ''Local history club membership'', ''Volunteering with Habitat for Humanity'', ''Yoga and meditation'', ''Hiking in Blue Ridge Mountains'',
    ''Cooking Southern cuisine'', ''Hosting dinner parties'', ''Book club for mystery novels'']'
  career_goals: Betty aims to become the top‑producing broker in the Shenandoah Valley and to earn the Certified Residential Specialist (CRS) designation within the next three years. She envisions opening
    her own boutique real‑estate firm that focuses on historic and luxury homes in Franklin and surrounding towns. Mentoring younger agents and building a supportive team are core components of her long‑term
    vision. Financially, she seeks to secure enough wealth to retire early while maintaining an active role in the community. Recognizing her emotional reactivity, she also plans to incorporate regular
    professional development on stress management and work‑life balance into her career roadmap.
