personas:
  professional: Erlinda Perez, a veteran elementary STEM educator who blends inquiry‑based curricula with bilingual instruction and technology tools like Scratch, Nearpod, and Google Classroom, leverages
    her organized, methodical planning and sociable, collaborative spirit to create inclusive, hands‑on learning experiences for diverse students in Queens.
  sports: Erlinda Perez, an avid weekend hiker of the Hudson Valley trails and member of a local Queens walking club, roots for the New York Knicks and follows the New York Rangers, while occasionally joining
    community soccer pick‑ups and attending yoga classes to maintain flexibility.
  arts: Erlinda Perez cultivates her artistic side through beginner violin lessons that explore folk melodies, dancing salsa and bachata at community nights, attending performances of Lin‑Manuel Miranda’s
    ‘Hamilton’, and listening to lively marimba ensembles that echo the festive rhythms of her childhood celebrations.
  travel: Erlinda Perez prefers structured trips that blend family reunions in the Andean highlands with relaxed weekend getaways to the Hudson Valley and occasional escapes to the Caribbean, carefully
    budgeting each journey and using detailed itineraries to balance cultural immersion with personal downtime.
  culinary: Erlinda Perez, an adept home cook, regularly prepares hearty encebollado, citrus‑bright ceviche, and slow‑roasted hornado, infusing each dish with fresh cilantro, ají amarillo, and roasted corn,
    and delights in sharing these meals at community potlucks, though she sometimes over‑spices out of enthusiasm.
  core: Erlinda Perez balances meticulous STEM leadership with a zest for salsa dancing, garden‑to‑table cooking, and disciplined budgeting, never missing a chance to blend data‑driven instruction with
    community‑center rhythms.
background:
  cultural: Born in Quito, Ecuador, Erlinda grew up in a household that celebrated Catholic festivals, traditional music such as pasillo and marimba, and the vibrant flavors of Andean cuisine. She immigrated
    to the United States as a teenager and maintains strong ties to the Ecuadorian diaspora in Queens, regularly attending cultural events, Spanish‑language media gatherings, and community potlucks. Her
    upbringing emphasized respect for elders, collective harmony, and a deep sense of community, which inform her inclusive teaching philosophy. In Flushing, she blends her heritage with the multicultural
    fabric of New York City, fostering a classroom environment that honors bilingualism, cultural diversity, and collaborative learning.
attributes:
  skills: '["STEM curriculum development","Inquiry-based teaching","Educational technology integration (Google Classroom, Nearpod, Scratch)","Differentiated instruction","Classroom management","Data-driven
    assessment","Bilingual communication (English/Spanish)","Mentoring and coaching","After-school STEM club coordination","Professional development facilitation"]'
  hobbies: '["Cooking Ecuadorian cuisine","Salsa and bachata dancing","Community gardening","Hiking in the Hudson Valley","Reading popular science books","Volunteer science storytime at the library","Participating
    in a bilingual book club","Traveling to Ecuador","Mentoring youth in robotics"]'
  career_goals: Erlinda aims to become a district STEM program coordinator, where she can scale her bilingual, culturally responsive approach to all schools in Queens. She plans to earn a master's degree
    in educational leadership to qualify for administrative roles such as principal or director of curriculum. Her long‑term ambition is to launch a citywide bilingual STEM initiative that partners with
    local universities, museums, and community organizations, providing under‑represented students with hands‑on research and mentorship opportunities. Additionally, she hopes to continue mentoring teachers,
    publish resources on inclusive STEM pedagogy, and eventually influence policy that supports equitable access to quality science education.
