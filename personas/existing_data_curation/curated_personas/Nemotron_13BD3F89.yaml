  hobbies: '[''Pick-up basketball'', ''Fishing'', ''Woodworking projects'', ''Car restoration'', ''Listening to soul, blues and hip‑hop music'', ''Barbecue cooking'', ''Volunteering at church and community
    events'']'
  career_goals: He aims to translate his practical abilities into a stable career by obtaining a certified maintenance technician credential, eventually launching his own handyman service that can serve
    the Raccoon area. He is also interested in earning a welding certification and leveraging his love of sports to mentor local youth through basketball coaching. His long-term ambition is to achieve financial
    independence while maintaining the flexibility to spend time with his community and pursue personal projects.
