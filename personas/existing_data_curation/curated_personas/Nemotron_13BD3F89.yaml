personas:
  professional: Davone Joseph is a hands‑on maintenance technician‑in‑training who leverages their carpentry, basic automotive repair, and entry‑level welding skills to troubleshoot community projects,
    while their relaxed, sometimes disorganized approach forces them to improvise under pressure and their competitive edge drives them to out‑perform peers in every fix.
  sports: At 31, Davone Joseph dominates local pick‑up basketball at the Raccoon Community Center, competes in the Des Moines Basketball Association’s spring league, follows the Iowa Wolves (NBA G League)
    and Iowa State Cyclones football seasons, and spends weekend afternoons fishing the nearby Raccoon River, balancing competition with community camaraderie.
  arts: Davone Joseph's evenings echo with Al Green soul ballads, B.B. King blues riffs, and Nas hip‑hop verses, and they often collect vintage vinyl, attend occasional open‑mic nights at the local church
    fellowship hall, and dabble in sketching classic‑car silhouettes for fun.
  travel: Davone Joseph prefers short road trips that blend fishing spots with DIY challenges, dreaming of a weekend getaway to the Ozark back‑country for trout, and planning a future summer road‑trip along
    Route 66 to visit iconic auto museums in Oklahoma and Texas, while keeping travel costs low through DIY camping.
  culinary: At home Davone Joseph masters a smoky Kansas‑style barbecue, perfecting a dry‑rubbed pork‑shoulder recipe, grilling Texas‑style brisket, topping with homemade peach BBQ sauce, while their woodworking
    hobby even extends to building a custom smoker out of reclaimed barn wood.
  core: Davone Joseph is a competitive, community‑driven tinkerer who balances a love for hands‑on projects and soulful music with a laid‑back, sometimes stress‑prone outlook that fuels both ambition and
    occasional disorganization.
background:
  cultural: Davone grew up in Raccoon, a small community in Pike County, Kentucky, where his family traces its roots to the Great Migration of Southern Black families who settled in Appalachia for coal‑mining
    work. He identifies with a blend of Southern Black cultural traditions—gospel music, church fellowship, and soul food—and the local Appalachian lifestyle of outdoor recreation and close‑knit neighborly
    support. Though the Black population in his area is modest, he values the strong sense of community, hospitality, and the resilience that his heritage and the region’s history have instilled in him.
