  Aaboe, Alan C. Bowen, Lis Brack-Bernsen, John P. Britton, Bernard R. Goldstein, Gerd Graßhoff, Hermann Hunger, Alexander Jones, Erica Reiner, F. Rochberg, N. M. Swerdlow, Anne Tihon, C. B. F. Walker,
  and have a keen interest in the works of Ptolemy, Theon, and other scholars in the field.
