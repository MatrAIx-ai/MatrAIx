    for mixed‑media pieces'']'
  hobbies: '[''Abstract painting'', ''Sketching architectural forms'', ''Reading speculative fiction and poetry'', ''Photography of natural textures'', ''Hiking in Cuyahoga Valley'', ''Playing acoustic
    guitar'', ''Collecting vintage woodworking tools'', ''Attending local art shows and craft fairs'', ''DIY home improvement projects'', ''Writing short stories'']'
  career_goals: Aime aims to transition from working as a hired carpenter to establishing her own studio workshop where she can produce one‑of‑a‑kind functional art pieces. She envisions a small boutique
    brand known for merging avant‑garde aesthetics with durable craftsmanship, offering custom furniture, sculptural installations, and collaborative projects with local artists. Long‑term, she hopes to
    teach hands‑on workshops, write an illustrated guide on imaginative woodworking, and participate in regional craft fairs and galleries, positioning herself as a thought‑leader in sustainable, design‑driven
    carpentry.
