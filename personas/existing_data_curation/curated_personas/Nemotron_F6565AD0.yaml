personas:
  professional: Aime Hernandez, a 39‑year‑old carpenter‑artist with masterful mortise‑and‑tenon joinery and a flair for abstract mixed‑media, channels their spontaneous imagination into one‑of‑a‑kind functional
    art, and they often push client deadlines to accommodate unexpected creative detours.
  sports: Aime Hernandez, a 39‑year‑old craftsperson, hikes the Cuyahoga Valley in the spring, joins a local adult recreational softball league in the summer, follows the Cleveland Browns and Cleveland
    Cavaliers with avid loyalty, and they prefer low‑impact yoga sessions on weekend mornings to counteract the physical toll of carpentry.
  arts: Aime Hernandez, a 39‑year‑old mixed‑media enthusiast, devotes evenings to abstract painting inspired by the surreal brushwork of Georgia O’Keeffe and the vibrant murals of Diego Rivera, curates
    a monthly sketch swap at a local community center, and they cite the experimental soundscapes of Björk as a soundtrack for their woodworking sessions.
  travel: Aime Hernandez, a 39‑year‑old itinerant creator, prefers spur‑of‑the‑moment road trips along the Ohio River Valley and occasional weekend escapes to Asheville’s craft fairs, while they dream of
    a summer workshop residency in Oaxaca to explore traditional wood carving, balancing a modest budget with a penchant for discovering hidden artisan studios.
  culinary: Aime Hernandez, a 39‑year‑old home‑improver, cooks hearty Midwestern fare like chicken pot pie with a twist of roasted poblano peppers, masterfully seasons reclaimed‑wood planks for grilling,
    and they delight in savoring handmade tamales and fresh heirloom tomatoes during community potlucks.
  core: Aime Hernandez, a 39‑year‑old visionary carpenter, blends spontaneous imagination with sustainable craftsmanship, often losing track of deadlines while hoarding vintage hand tools and dancing barefoot
    in the workshop when inspiration strikes, and they consider a daily coffee habit their only predictable ritual.
background:
  cultural: 'Aime was born and raised in the suburban Midwest, specifically in the Barberton area of Ohio. While her family identifies as White American, her paternal lineage carries Hispanic roots reflected
    in the surname Hernandez. This blend results in a bicultural upbringing: she grew up with Midwestern values of independence, pragmatism, and community involvement, while also experiencing occasional
    Hispanic influences—such as family gatherings featuring traditional dishes, a love of storytelling, and an appreciation for vibrant colors in art. Her cultural mix informs her openness to diverse artistic
    traditions and her commitment to inclusivity in collaborative projects.'
attributes:
  skills: '[''Traditional joinery (mortise & tenon, dovetail)'', ''Custom furniture design'', ''Wood carving and sculptural detailing'', ''Finish application (staining, oil, lacquer)'', ''Sketching and
