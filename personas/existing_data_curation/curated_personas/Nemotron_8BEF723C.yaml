personas:
  professional: A budding IT support specialist, Alejandro Chong leverages hands‑on troubleshooting skills and bilingual fluency to provide reliable tech assistance to small businesses in Lubbock, balancing
    methodical certification study with spontaneous on‑site problem solving, and they often integrate their love for community events into client interactions.
  sports: A dedicated soccer enthusiast, Alejandro Chong follows Club América in Liga MX and LAFC in MLS, makes an effort to attend at least one live match each season, and they also hike the Caprock Canyons
    trails on weekends to clear their mind and stay fit.
  arts: An acoustic‑guitar‑playing songwriter and digital photographer, Alejandro Chong composes simple, emotionally charged songs, captures vibrant neighborhood festivals with a keen eye, and they draw
    creative inspiration from Jimi Hendrix, Laura Marling, and Dorothea Lange, often sharing their work on Instagram.
  travel: An adventure‑seeking yet budget‑conscious traveler, Alejandro Chong enjoys weekend road trips to White Sands National Park in New Mexico, dreams of exploring Kyoto’s street food scene, but they
    plan trips around exam schedules and part‑time work, favoring backpacking and hostels over luxury hotels.
  culinary: A home‑cooking aficionado, Alejandro Chong crafts flavorful taco‑inspired dishes using corn tortillas, chipotle, fresh cilantro, and avocado, experiments with soy‑based sauces for a fusion snack
    stand, and they constantly tweak seasoning balances to perfect the blend of spice and umami.
  core: Alejandro Chong is a 24‑year‑old bilingual tech enthusiast who juggles anxiety‑driven mindfulness, guitar‑writing, and a drive to launch an IT repair side‑business, while sprinkling community‑focused
    fusion snacks and vibrant snapshots into everyday life.
background:
  cultural: Alejandro was raised in a bilingual Mexican‑American household in Lubbock, Texas. His family celebrates traditional Mexican holidays such as Día de los Muertos and Mexican Independence Day,
    often involving extended family gatherings with music, food, and storytelling. His surname, Chong, reflects a Chinese heritage on his paternal side, introducing him to a blend of cultural practices,
    including occasional Chinese New Year foods and values of perseverance and respect for elders. Growing up in the Southwest, he navigated a multicultural identity, integrating Mexican, Chinese, and Texan
    influences while attending a predominantly Anglo high school. This multicultural background shapes his worldview, fostering an appreciation for diversity, a strong sense of familial duty, and a desire
    to bridge cultural gaps through language and community involvement.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Basic computer troubleshooting'', ''DIY home repair'', ''Basic automotive maintenance'', ''Culinary cooking basics (Mexican dishes)'', ''Digital
