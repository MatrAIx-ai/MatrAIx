  hobbies: '[''Playing acoustic guitar'', ''Digital photography'', ''Cooking Mexican and Mexican‑Chinese fusion dishes'', ''Watching soccer (Liga MX and MLS)'', ''Hiking local trails'', ''Mindfulness meditation'',
    ''Participating in online mental‑health support forums'']'
  career_goals: Alejandro aims to translate his curiosity and practical skills into a stable technical career. He plans to enroll in a community college associate‑degree program in Information Technology
    while earning entry‑level certifications such as CompTIA A+ and Network+. His long‑term ambition is to become a certified IT support specialist, providing reliable tech assistance to small businesses
    in Lubbock and eventually launching a freelance side business offering on‑site computer repairs. He also hopes to blend his cultural background by running occasional pop‑up food stands featuring Mexican–Chinese
    fusion snacks, using his culinary skills as an additional income stream and community connection.
