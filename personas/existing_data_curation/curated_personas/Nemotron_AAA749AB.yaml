personas:
  professional: Rosie Kelley brings their strong interpersonal communication and event‑coordination expertise to spearhead community art workshops at the local cultural center, designing inclusive programs
    for seniors and youth, mentoring emerging artists, and navigating occasional disorganization with a flexible, collaborative leadership style.
  sports: Rosie Kelley stays active through weekly salsa dancing lessons with their spouse, regular strolls with the Fresno Walking Club, and cheering on the Fresno State Bulldogs football team, preferring
    a relaxed, fun‑focused fitness routine over rigid training schedules.
  arts: Rosie Kelley immerses themselves in the art world by painting en plein‑air landscapes inspired by Monet and O’Keeffe, crafting pottery during weekend studio sessions, attending productions at Fresno’s
    Tower Theatre, and regularly visiting exhibitions at the Fresno Art Museum and the de Young Museum, often sharing their insights on social media.
  travel: Rosie Kelley prefers loosely planned road trips to art‑centric destinations such as the Santa Fe Indian Market, the Monterey Bay Art Festival, and a weekend getaway to Portland’s vibrant food
    scene, while dreaming of a future cultural immersion in the museums of Paris and the historic streets of Seville.
  culinary: Rosie Kelley delights in farm‑to‑table cooking, skillfully preparing herb‑crusted salmon with rosemary and lemon, rustic roasted beet and goat‑cheese salad, and homemade sourdough bread topped
    with heirloom tomatoes and fresh basil, while occasionally succumbing to the convenience of a ready‑made pesto.
  core: Rosie Kelley is a sociable, curiosity‑driven artist who habitually misplaces their paintbrushes and keys, yet transforms these small chaos moments into spontaneous creative sparks that fuel their
    community workshops.
background:
  cultural: Raised in a middle‑class white family in Fresno’s Central Valley, Rosie grew up amid the region’s agricultural heritage, blending traditional American customs with the diverse cultural influences
    of the Central Valley, including strong ties to the Latino community’s food, music, and festival traditions. She remains active in her local church and community volunteer networks, reflecting a mix
    of agrarian, artistic, and multicultural values that shape her outlook and daily life.
attributes:
  skills: '["Interpersonal communication", "Group event planning", "Facilitation of community workshops", "Basic painting and ceramics", "Gardening and horticulture", "Digital literacy (email, social media,
    basic graphic design)", "Culinary arts (recipe development, cooking)", "Volunteer coordination"]'
  hobbies: '["Painting", "Ceramics", "Visiting art galleries and museums", "Local theater attendance", "Gardening", "Cooking and recipe experimentation", "Community potluck gatherings", "Salsa dancing",
    "Birdwatching", "Photography"]'
  career_goals: Rosie aspires to translate her love of art and community into a leadership role at a local cultural center, where she can design and lead art workshops for seniors and youth, coordinate
    volunteer programs, and launch a modest community garden initiative. She also hopes to develop a home‑based studio offering pottery classes, become a mentor for emerging artists in Fresno, and travel
    to regional art festivals and cultural events to broaden her creative horizons.
