personas:
  professional: Audrey Butler, a 7-year-old budding visual artist, blends their boundless curiosity with an organized yet flexible approach as they create detailed watercolors and imaginative LEGO structures,
    hinting at a future career in design and illustration.
  sports: Audrey Butler, a lively participant in tag games and the after‑school Evanston Kids Soccer Club where they play forward, also cheers for the Chicago Cubs during spring baseball season and follows
    the Chicago Bulls, blending their energetic love of movement with a budding team spirit.
  arts: Audrey Butler, an avid watercolor painter and LEGO builder, draws artistic inspiration from the whimsical illustrations of Dr. Seuss, the serene landscapes of Bob Ross's Joy of Painting episodes,
    and the vibrant animation style of Studio Ghibli's My Neighbor Totoro, while listening to upbeat tracks like Pharrell Williams' Happy as they create.
  travel: Audrey Butler, who prefers spontaneous day trips exploring the Evanston lakefront nature trail and occasional weekend visits to Chicago's Museum of Science and Industry, dreams of visiting Disney
    World in Florida and the Rocky Mountains, balancing their love of familiar local adventures with an imaginative yearning for far-off wonderlands.
  culinary: Audrey Butler enjoys a colorful plate of mac and cheese topped with broccoli florets, builds peanut butter banana sandwiches into fun shapes, and mixes strawberry banana smoothies using fresh
    berries, yogurt, and a splash of honey, proudly stirring the batter themselves while occasionally forgetting to rinse their hands after LEGO play before snack time.
  core: Audrey Butler, a curious, organized-yet-flexible 7-year-old, brightens any room with their boundless energy, art-filled imagination, polite teamwork, and a lovable habit of leaving a trail of LEGO
    bricks wherever they create.
background:
  cultural: Audrey comes from a white, middle‑class family in Evanston, Illinois. Her upbringing includes participation in local community events like the Evanston Art Fair, seasonal library storytimes,
    and school multicultural celebrations. Family traditions such as holiday crafts, weekend visits to nearby museums, and backyard picnics emphasize creativity, community, and kindness, shaping her open‑minded
    and sociable outlook.
attributes:
  skills: '["reading fluency","basic addition and subtraction","drawing and sketching","storytelling","group collaboration","task organization"]'
  hobbies: '["drawing","watercolor painting","reading picture books","building with LEGO","playing tag with friends","nature walks at the lakefront","listening to music while creating art"]'
  career_goals: Audrey dreams of becoming an artist who can bring stories to life on canvas, a teacher who shares her love of books and creativity, or a community designer who builds playful, inclusive
    spaces for kids. She hopes to keep learning new art techniques and to inspire others with her ideas.
