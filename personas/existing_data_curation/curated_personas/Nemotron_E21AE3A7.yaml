  hobbies: '[''Hiking'', ''Landscape photography'', ''Cycling'', ''Softball league'', ''Cooking New England dishes'', ''Volunteering at the historical society'', ''Reading historical biographies'', ''Attending
    community festivals'', ''Traveling for inspiration'', ''Snowshoeing'']'
  career_goals: John aims to become a senior guide manager at a regionally recognized tour company, overseeing a team of guides and crafting specialty experiences such as Revolutionary War heritage tours
    and culinary food‑and‑wine itineraries. Over the next five years, he plans to earn certification through the National Tour Association and launch his own boutique travel agency focused on personalized,
    high‑touch tours for small groups, leveraging his strong customer‑service record and marketing acumen. He also hopes to develop a training curriculum for new guides, reflecting his desire to share expertise
    and raise industry standards.
