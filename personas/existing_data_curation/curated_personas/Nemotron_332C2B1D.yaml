personas:
  professional: Ernesto Linares, a budding soccer enthusiast, blends their curiosity about how games work with a practical habit of cataloguing their cleats and jerseys, routinely assigning positions and
    meticulously planning practice drills, yet frequently frets about missing a goal and letting their teammates down.
  sports: Ernesto Linares, an energetic member of the Little Lions youth soccer club, idolizes professional forwards like Lionel Messi and follows Barcelona matches on TV, eagerly practicing dribbling and
    goal-scoring drills after school, and often feels nervous before big games, fearing a missed opportunity.
  arts: Ernesto Linares, who spends afternoons drawing comic-style firefighting heroes, draws inspiration from Stan Lee's dynamic storytelling and the 'Firefighter Sam' series, while also admiring animated
    heroes like Spider-Man and Pixar's 'Cars,' channeling that excitement into vibrant sketches filled with bold colors and heroic poses.
  travel: Ernesto Linares, who loves family road trips to the lakeside park and weekend visits to the children's science museum, dreams of wandering the historic streets of San Miguel de Allende and experiencing
    the lively carnival in Rio de Janeiro, preferring well-planned itineraries with frequent snack breaks to keep anxiety at bay.
  culinary: Ernesto Linares, who helps their mom prepare guacamole with ripe avocado, lime, and cilantro, enjoys assembling tacos with soft corn tortillas, seasoned beef, fresh salsa, and a sprinkle of
    cheese, and sometimes indulges in extra chips, leading to a bellyache that fuels their worries.
  core: Ernesto Linares, a curious yet organized six-year-old who thrives on group play, creative projects, and caring for friends, balances an energetic imagination with a habit of worrying, often over-preparing
    for soccer drills, saving allowance, and bedtime stories while occasionally getting stuck on snack cravings.
background:
  cultural: Ernesto grows up in a Mexican household in Fresno, where Spanish is spoken daily and Mexican traditions are woven into family life. He celebrates Día de los Muertos by helping create colorful
    altars and enjoys Cinco de Mayo with music, dancing, and foods like tacos and tamales. His family attends Catholic Mass on Sundays, and he participates in school activities that blend bilingual education
    with mainstream American curricula. The local Mexican‑American community in Fresno County provides a vibrant cultural environment, reinforcing his heritage while exposing him to diverse customs, which
    shapes his language use, food preferences, and festive celebrations.
