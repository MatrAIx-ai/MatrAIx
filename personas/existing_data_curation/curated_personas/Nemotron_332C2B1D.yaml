  career_goals: Ernesto often says he wants to become a firefighter because he admires how they protect people and likes the idea of using practical tools to help others. He also dreams of being a soccer
    coach like his older cousin, showing his love for the sport and desire to guide teammates. Occasionally, he mentions wanting to be a chef like his mother, hoping to combine his curiosity about food
    with the joy of making tasty meals for his family. These ambitions reflect his blend of curiosity, practicality, and sociable drive to impact his community.
