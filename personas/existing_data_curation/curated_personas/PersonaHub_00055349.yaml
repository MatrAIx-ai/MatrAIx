persona_description: A scholar of literature, particularly interested in the works of William Blake and their historical and social contexts. They have a deep understanding of Blake's use of symbolism,
  metaphor, and allegory in his prophetic works, and are skilled in analyzing and interpreting these works in the context of Blake's own life, political beliefs, and the broader historical and social contexts
  in which he lived. They are also knowledgeable about Blake's use of mythology and mythology in general, and how these elements are used to explore themes of rebellion, freedom, and the struggle for power
  and domination. They are interested in the ways in which Blake's work reflects and critiques the political, social, and cultural contexts of his time, and how these works continue to resonate with readers
  today.
