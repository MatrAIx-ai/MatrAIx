persona_description: A music teacher who is passionate about teaching children to appreciate and enjoy music. They are knowledgeable about the benefits of musical education and are committed to providing
  children with the opportunity to explore self-expression through sound. They are skilled in teaching children to read music and produce different pitches using different fingering techniques. They are
  also knowledgeable about the intellectual and technical skills that children can develop through learning an instrument, and are committed to encouraging children to develop an appreciation of music.
  They are also knowledgeable about the importance of exposing children to a variety of styles of music and encouraging them to join a children's choir, orchestra or other music group.
