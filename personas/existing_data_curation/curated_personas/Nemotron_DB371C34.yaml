personas:
  professional: Jerry Marx, an 8‑year‑old budding LEGO architect, channels meticulous curiosity into recreating local landmarks like the Henry Doorly Zoo, applying the same methodical planning they use
    for chess openings to design intricate builds, while their competitive streak fuels a drive to out‑engineer peers in the after‑school robotics club.
  sports: Jerry Marx plays soccer on Saturdays with the Omaha Storm youth league, cheering for the Nebraska Cornhuskers during football season and the Kansas City Royals in baseball, while preferring solo
    sketching of mechanical devices during downtime, and their competitive nature often pushes them to practice drills obsessively.
  arts: Jerry Marx devotes free time to drawing technical sketches of imagined machines inspired by Leonardo da Vinci and the whimsical inventions of Studio Ghibli’s "Howl’s Moving Castle", frequently re‑watching
    "The LEGO Movie" and collecting custom LEGO minifigure art pieces, and their organized approach leads them to keep a dedicated sketchbook for each hobby.
  travel: Jerry Marx dreams of visiting the towering dunes of Great Sand Dunes National Park and the interactive exhibits at Space Center Houston, plans family trips with meticulous checklists and map routes,
    yet their anxiety about unfamiliar environments sometimes makes them cling to the familiarity of local park nature walks and the comfort of collecting rocks from known trails.
  culinary: Jerry Marx favors building pizza with pepperoni, olives, and extra cheese at home, enjoys the occasional mac and cheese after soccer practice, and experiments with LEGO‑shaped cookie cutters
    while mastering the art of constructing a perfect peanut butter‑jelly sandwich, though they sometimes forget to eat a balanced snack when engrossed in a new LEGO project.
  core: Jerry Marx is a methodical, competitive eight‑year‑old who blends a love of LEGO engineering, chess strategy, and robotics with a cautious, worry‑prone mindset that drives meticulous planning in
    play, spending, and health.
background:
  cultural: Jerry was raised in a middle-class family in Omaha, Nebraska, where Midwestern values of reliability, community involvement, and practicality are emphasized. His family attends a local Methodist
    church, celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July with community potlucks and parades. He participates in school-run field trips to the Henry Doorly Zoo and the Omaha
    Children’s Museum, which nurture his curiosity about science and engineering. The region’s agricultural heritage influences his interest in designing farm equipment, and the city’s growing tech scene
    provides exposure to coding and robotics programs.
attributes:
  skills: '[''LEGO construction'', ''Mechanical puzzle solving'', ''Basic Scratch programming'', ''Reading non-fiction (space, engineering)'', ''Organizational skills (keeping school supplies orderly)'',
