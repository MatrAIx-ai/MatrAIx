  hobbies: '[''LEGO building'', ''Chess playing'', ''Nature walks & rock collecting'', ''Bird watching'', ''Reading adventure & detective books'', ''Robotics club projects'', ''Soccer (team sport)'', ''Technical
    sketching of machines'']'
  career_goals: Jerry aspires to become a mechanical engineer, dreaming of designing machines that blend creativity with practicality. He aims to win the Nebraska State Science Fair, earn a STEM scholarship,
    and eventually work on sustainable agricultural equipment that helps Midwestern farms. He also hopes to coach his school chess team and compete in national youth tournaments. His long-term ambition
    includes leading a team that builds innovative solutions for community challenges, providing both stability and opportunities to solve problems.
