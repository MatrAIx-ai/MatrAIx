  hobbies: '[''Salsa Dancing'', ''Playing Soccer'', ''Cooking Cuban Cuisine'', ''Volunteering at Community Center'', ''Cycling Exploration'', ''Reading Travel Memoirs'', ''Watching Classic Cuban Films'',
    ''Beach Jogging'', ''Mindfulness Meditation'']'
  career_goals: Rafael aims to transition from his current attendant role into a supervisory or fleet‑management position within the transportation sector. He plans to obtain a Commercial Driver’s License
    (CDL) and enroll in an associate‑degree program in logistics or transportation management. His long‑term ambition is to lead a team where he can mentor new hires, improve operational efficiency, and
    foster a supportive work environment that mitigates stress for himself and colleagues. He also hopes to leverage his curiosity by staying updated on emerging transportation technologies and sustainability
    practices.
