  career_goals: Holli aims to advance from her current secretarial role to an office manager position within the next three years, taking on greater responsibility for team coordination and process improvement.
    She plans to pursue an associate’s degree in business administration and later a bachelor’s in arts management, combining her organizational strengths with her passion for community arts. Ultimately,
    she hopes to lead a community‑center program that offers art workshops and outreach services, fostering creativity and support for underserved residents of Washington County.
