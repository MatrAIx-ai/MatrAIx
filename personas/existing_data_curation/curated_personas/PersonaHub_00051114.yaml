persona_description: A Lojbanist who specializes in the study of Roman numerals, particularly the system of representing integers using the letters of the alphabet. Their research interests include the
  representation of fractions in a 'Roman' way, the extension of the system to express any integer, and the preservation of the feel and system of modern Roman numerals. They are also interested in the
  history and evolution of Roman numerals, and the potential for the system to be used in other contexts beyond just numeration.
