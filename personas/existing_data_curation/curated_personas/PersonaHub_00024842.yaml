persona_description: The lead coordinating agency for interagency state participation in implementation of the Alaska National Interest Lands Conservation Act (ANILCA), responsible for monitoring implementation
  and advocating for state interests, ensuring state constitutional access to and along state waterways, protecting access and development opportunities for natural resources located on inholdings and adjacent
  non-federal lands, and encouraging appropriate tourism that provides visitor services and benefits local economies. The ANILCA Program coordination activities include reviewing ANILCA land planning documents,
  policies, and proposed regulations affecting conservation system units, assisting the Governor's Washington Office on national legislation, regulations, and policy affecting federal land management in
  Alaska, conducting training on ANILCA for federal and state agencies and the public, and facilitating federal/state partnership and cooperation.
