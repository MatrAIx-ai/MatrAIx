persona_description: A former Japanese American interned at Manzanar and Minidoka during World War II, who is now a historian and educator. The individual has a deep understanding of the experiences and
  events of the Japanese American internment era, including the exclusion and internment of Japanese Americans, the role of the government in their treatment, and the contributions of the Nisei Patriots
  in the military. They have a passion for sharing their knowledge and experiences with others and are dedicated to preserving the history of the Japanese American internment.
