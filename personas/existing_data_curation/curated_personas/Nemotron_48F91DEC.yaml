  hobbies: '[''Volleyball'', ''Community dance classes'', ''Health‑fair volunteering'', ''Blood‑drive assistance'', ''Cooking traditional Southeast Asian cuisine'', ''Cultural festival participation'',
    ''Organizing study groups'', ''Charity runs'', ''Strategy board games'']'
  career_goals: Luzviminda aims to complete her associate degree in nursing and obtain RN licensure within the next three years, with a focus on acute‑care or med‑surg units where she can apply her disciplined
    approach. She aspires to earn certifications such as ACLS and become a charge nurse, eventually leading a unit that serves the multicultural community of Austin. Long‑term, she envisions opening a community
    health outreach program that provides culturally sensitive care and health education to Southeast Asian seniors and families.
