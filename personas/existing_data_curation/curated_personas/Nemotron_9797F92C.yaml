personas:
  professional: Betty Bhimsen, a 15‑year‑old high‑school sophomore, blends their love of traditional beadwork and powwow dance with modern media as a budding cultural content creator who documents tribal
    workshops on TikTok while balancing school projects with spontaneous creative bursts.
  sports: Betty Bhimsen is a midfield‑driven player on their local youth soccer league, cheers for the Oklahoma City Thunder and the Tulsa Roughnecks, and spends weekends hiking the Ouachita foothills to
    birdwatch, often swapping soccer stories with teammates at the community park while they stay energized by the fresh air.
  arts: Betty Bhimsen revels in powwow dance circles, perfects beadwork and basket weaving while listening to A Tribe Called Red and R. Carlos Nakai, and finds inspiration in the illustrations of adventure
    author Christopher Paolini, so they channel those influences into vibrant TikTok tutorials.
  travel: Betty Bhimsen has explored Lake Texoma and Hot Springs National Park with family, dreams of trekking Yellowstone’s geysers and visiting the historic Santa Fe plaza, and prefers spontaneous road
    trips over rigid itineraries while saving a part of their allowance for gas, so they often map routes on the fly.
  culinary: Betty Bhimsen loves cooking their grandmother’s fried catfish with cornmeal crust, sweet potato casserole seasoned with pecans and maple syrup, and barley stew with wild berries, proudly sharing
    the recipes on TikTok while experimenting with fresh herbs like cilantro and sage, and they relish the cozy scent of the kitchen after a long hike.
  core: Betty Bhimsen is a trail‑blazing teen who blends cultural crafts, soccer energy, and a laid‑back budgeting style into a lively, community‑focused life, even if they sometimes forget to finish homework.
background:
  cultural: Betty is a member of the Muscogee (Creek) Nation, raised in Muskogee, Oklahoma. Her family maintains strong ties to tribal traditions, including the Muscogee language, seasonal ceremonies, storytelling,
    and arts such as beadwork and basket weaving. She regularly attends cultural programs at the tribal community center, participates in local powwows, and helps preserve oral histories by listening to
    elders. The Muscogee values of community harmony, respect for the natural world, and collective responsibility shape her worldview, fostering her calm resilience and cooperative spirit.
attributes:
