  hobbies: '[''Soccer'', ''Powwow dancing'', ''Beadwork'', ''Basket weaving'', ''Hiking'', ''Birdwatching'', ''Reading adventure and folklore books'', ''Cooking traditional dishes'', ''Social media content
    creation (TikTok)'', ''Photography'']'
  career_goals: Betty envisions a future where she can blend her love for community, culture, and the environment. She hopes to attend a tribal college or university to study environmental science, public
    health, or education, with the goal of becoming a community health worker or environmental steward who protects Muscogee lands and promotes healthy living. At the same time, she aspires to preserve
    and teach Muscogee arts, perhaps as a cultural program coordinator or art instructor. Her practical side seeks a stable career that supports her family, while her curiosity drives her to explore innovative
    solutions for sustainable development within her tribe.
