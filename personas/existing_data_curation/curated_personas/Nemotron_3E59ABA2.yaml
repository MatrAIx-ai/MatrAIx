  hobbies: '[''Tailgating at football games'', ''Pickup basketball'', ''Beat making and freestyle rap'', ''Hip‑hop and gospel music listening'', ''Video gaming/streaming'', ''Fishing trips'', ''Barbecuing'',
    ''Volunteer electrical work with Habitat for Humanity'', ''Attending church events'']'
  career_goals: Antonio aims to earn his journeyman electrician license within the next two years, then advance to a master electrician credential. He plans to complete an associate degree in Electrical
    Engineering Technology, specializing in renewable energy systems, and eventually start his own contracting business focused on residential solar installations in Tuscaloosa. He also aspires to mentor
    other young Black tradespeople, advocate for safer working conditions, and eventually attain a leadership role in a local electrical union.
