persona_description: A teacher who is passionate about teaching reading comprehension and has spent years refining a routine to train the brain to be active and engaged while reading. The teacher is interested
  in the idea of training students to take over the thinking about text processing for themselves and is looking for a course that can help them achieve this. The teacher is interested in the idea of a
  gradual progression through a series of carefully crafted dishes that complement each other and generate a feeling of satisfaction at the end. The teacher is looking for a course that can help them see
  how the course is structured, the type of content they will have access to, and get a feel for the training they will be purchasing.
