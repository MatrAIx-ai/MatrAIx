  hobbies: '[''Reading historical nonfiction'', ''Vegetable gardening'', ''Bird-watching'', ''Quilting'', ''Antique furniture restoration'', ''Genealogy research'', ''Cooking traditional Southern dishes'',
    ''Nature walks'', ''Church choir participation'']'
  career_goals: Judy aims to deepen her involvement in her community by leading financial‑literacy workshops at the local library, mentoring teens interested in business, and assisting her church's outreach
    programs. She hopes to obtain a certificate in nonprofit management to enhance her grant‑writing effectiveness. Although she is not seeking paid employment, she aspires to be a trusted advisor for small
    business owners in Lamar, offering pro‑bono budgeting guidance. She also plans to complete a personal project of documenting the town’s oral histories, combining her research curiosity with her organized
    nature.
