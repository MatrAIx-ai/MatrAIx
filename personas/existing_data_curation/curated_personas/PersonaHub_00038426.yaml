persona_description: A biologist who specializes in the study of butterfly ecology, particularly the host plant preference of the Queen of Spain Fritillary Issoria lathonia in the dunes of the Westhoek
  nature reserve, De Panne (Belgium). His research interests include the impact of habitat loss on butterfly populations and the effectiveness of management measures to prevent further decline. He is particularly
  interested in the role of microclimates and host plant preferences in the butterfly's choice of host plants.
