personas:
  professional: Ashton Sidoti is a logistics veteran with three decades mastering inventory control, RFID scanning, SAP Business One and NetSuite, who channels their curiosity‑driven problem solving and
    competitive edge into meticulous process improvement projects while maintaining a skeptical eye on new tech that doesn't prove its ROI.
  sports: Ashton Sidoti channels fitness into early‑morning fishing trips on Oneida Lake with the local anglers’ club, punctuates winter with a casual senior bowling league, and follows the Buffalo Bills,
    New York Knicks, and New York Mets with a competitive spirit that fuels occasional weekend runs around the neighborhood.
  arts: Ashton Sidoti expresses artistic flair through hand‑crafted scale model ships that echo maritime lore, while listening to Gordon Lightfoot’s folk ballads and The Rolling Stones’ classic rock, and
    occasionally attending the Oneida County Historical Society’s exhibits featuring early American shipbuilding.
  travel: Ashton Sidoti prefers meticulously planned short getaways that combine history and quiet water, having explored the historic port of Newport, Rhode Island, taken a weekend fishing charter in the
    Florida Keys, and dreaming of a slower‑paced tour of the Scottish Hebrides to study ancient shipyards.
  culinary: Ashton Sidoti enjoys cooking hearty lake‑perch fillet with lemon butter, a side of rosemary‑roasted potatoes, and a warm apple‑cinnamon crumble, while their skill level in the kitchen is proficient
    enough for homemade sourdough and occasional grilling of spare‑rib ribeye, though they often add generous dashes of hot sauce for a stress‑relieving kick.
  core: Ashton Sidoti blends meticulous logistics expertise with solitary curiosity, using model ships as both hobby and meditation while wrestling with stress‑driven perfectionism.
background:
  cultural: Ashton’s cultural background reflects his Italian‑American heritage combined with the upstate New York small‑town milieu of Brewerton. Raised in a Catholic household, family gatherings centered
    around hearty Sunday meals featuring traditional Italian dishes, reinforcing values of loyalty, hard work, and modesty. Living in Onondaga County has exposed him to a blend of rural traditions—such
    as seasonal hunting, fishing, and county fair participation—and the industrious spirit of the region’s manufacturing and logistics history. This mix shapes his practical outlook, respect for established
    methods, and a quiet pride in contributing to the local economy.
attributes:
  skills: '[''Inventory management'', ''Shipping and receiving procedures'', ''Barcode/RFID scanning'', ''Warehouse Management Software (SAP Business One, NetSuite)'', ''Advanced Excel data analysis'',
