  hobbies: '[''Woodworking'', ''Model ship building'', ''Fishing on Oneida Lake'', ''Crossword puzzles'', ''Sudoku'', ''Reading non-fiction (logistics, local history)'', ''Competitive board games (chess,
    Scrabble)'', ''Gardening'', ''Home improvement projects'']'
  career_goals: Leveraging his extensive hands‑on experience, Ashton aims to advance into a supervisory or managerial role overseeing inbound logistics for a regional distribution center within the next
    five years. He plans to earn a Certified in Production and Inventory Management (CPIM) credential and to lead initiatives that reduce order processing errors by at least 15 % through technology integration.
    Driven by a competitive streak, he seeks recognition as the top performer in key performance metrics and aspires to mentor junior clerks, passing on his blend of curiosity‑driven learning and practical
    efficiency.
