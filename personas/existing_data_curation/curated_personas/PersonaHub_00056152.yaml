persona_description: A farmer who is interested in agricultural research and development, particularly in the use of herbicides to control resistant weeds in new soybean crops. They are looking for innovative
  and effective ways to manage glyphosate-resistant Palmer amaranth and waterhemp using postemergence herbicides and are interested in learning about the latest research and developments in this field.
  They are also interested in learning about the importance of rotating herbicide mechanisms of action and incorporating appropriate nonchemical controls in weed management.
