  hobbies: '[''woodworking'', ''home improvement'', ''vegetable gardening'', ''reading economic and fintech publications'', ''hiking local trails'', ''fishing on the Sacramento River'', ''volunteering at
    the community food bank'', ''teaching financial literacy at church'', ''meditation'', ''yoga'']'
  career_goals: George aims to advance to a senior executive role, such as Chief Financial Officer, within a regional agricultural or healthcare organization that aligns with his community values. He plans
    to obtain CPA certification to complement his associate degree and deepen his expertise in regulatory matters. In parallel, he dreams of launching a boutique financial consultancy that helps small businesses
    in Tehama County navigate growth and sustainability. George is also committed to fostering a healthier workplace culture by advocating for mental‑health awareness in the finance sector and mentoring
    younger professionals to balance performance with well‑being.
