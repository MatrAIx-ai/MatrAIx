personas:
  professional: Cody Montero, a budding social media coordinator and graphic-design enthusiast, leverages a charismatic public-speaking style, organized event-planning knack, and a flair for visual storytelling
    to amplify community initiatives and capture audiences on TikTok.
  sports: Cody Montero joins weekly pickup basketball games at the Union County Community Center, roots for the Memphis Grizzlies and the New Orleans Pelicans, and spends weekend mornings fishing the Tallahatchie
    River while hiking local trails to stay fit.
  arts: Cody Montero sketches downtown vistas with charcoal, strums indie tunes à la Tame Impala and Phoebe Bridgers on an acoustic guitar, curates mini-exhibitions featuring works by local muralist Jamie
    Rivera, and follows the annual South‑Bend Indie Film Festival to fuel their cinematic taste.
  travel: Cody Montero prefers spur-of-the-moment road trips, having already explored the blues heritage of Clarksdale, the culinary scene of New Orleans, and dreaming of a solo backpacking adventure along
    the Appalachian Trail from Virginia to Georgia with a modest budget.
  culinary: Cody Montero experiments with Southern comfort foods, perfecting biscuits and gravy, shrimp-and-grits, and deep-fried catfish while occasionally swapping recipes on the Food Network app, and
    enjoys pairing their meals with homemade sweet tea and spicy Nashville hot sauce.
  core: Cody Montero blends restless creativity with community hustle, turning every guitar riff, sketch, and TikTok clip into a chance to connect, while juggling a perpetual caffeine habit and a tendency
    to over-commit to volunteer gigs.
background:
  cultural: Cody grew up in New Albany, a small town in Mississippi’s Union County, rooted in a white Southern family with Irish and English ancestry. His upbringing was shaped by the region’s close‑knit
    community values, church attendance, and Southern hospitality. He was exposed early to local traditions such as community barbecues, gospel music, and the annual county fair, while also developing an
    interest in broader cultural currents through internet media and school art programs. The blend of rural Southern life and his curiosity for new ideas informs his open‑minded but grounded worldview.
attributes:
  skills: '["Public speaking and audience engagement","Basic graphic design (Canva, Adobe Spark)","Smartphone photography and candid portraiture","Video editing for social media (mobile apps)","Event planning
    and informal group coordination","Interpersonal mediation and empathy","Self‑taught guitar playing","Basic DIY and handyman tasks"]'
  hobbies: '["Sketching and drawing","Playing guitar","Photography and short‑form video creation","Attending live music events","Pickup basketball games","Fishing and hiking","Cooking Southern dishes","Watching
    indie films and following art blogs"]'
  career_goals: Cody is determined to complete his GED within the next year, enroll in a community college digital media or allied health program, and build a portfolio of graphic design and video work.
    His short‑term goal is to secure a part‑time role as a social media coordinator for a local business or non‑profit, where he can apply his communication and visual storytelling skills. Long‑term, he
    aspires to launch a freelance creative studio that offers branding, photography, and event‑production services for small businesses and community organizations in Union County, while also mentoring
    at‑risk youth.
