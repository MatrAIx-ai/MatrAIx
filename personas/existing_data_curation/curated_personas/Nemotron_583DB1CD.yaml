personas:
  professional: Daniela Layton, a 12‑year‑old aspiring robotics engineer, they channel the structured storytelling they love in mystery novels into methodical code and hardware designs for their school’s
    robotics club, while also integrating gardening know‑how into eco‑friendly prototypes.
  sports: Daniela Layton plays on the middle school soccer team, follows the Kansas City Royals with devotion, and volunteers with the local 4‑H club’s miniature livestock events, they balance competitive
    practice with casual pick‑up games in the prairie’s open fields during summer.
  arts: Daniela Layton finds solace at the piano, practicing pieces by Ludwig van Beethoven and contemporary tunes from Taylor Swift, they fill sketchbooks with Kansas prairie landscapes, and devour historical
    fiction by Kate Mosse, often quoting favorite passages during class discussions.
  travel: Daniela Layton loves weekend trips to the Kansas State Fair in Hutchinson, dreams of exploring the Badlands in South Dakota, and hopes to one day visit the historic colonial town of Williamsburg,
    they balance family‑centered travel budgets with their desire for adventure.
  culinary: Daniela Layton enjoys cooking with fresh garden produce—they often prepare carrot‑and‑zucchini stir‑fry, bake cornbread with honey butter, and savor homemade apple crisp, though they sometimes
    forget to clean the kitchen after baking.
  core: Daniela Layton blends a love of structure with Midwest self‑reliance, they turn mystery‑driven curiosity into robotics projects, disciplined savings, meticulous health tracking, and prairie‑inspired
    art, all while occasionally splurging on video‑game snacks.
background:
  cultural: Daniela was raised in Atchison, Kansas, a small Midwestern town with deep roots in pioneer and agricultural history. Her family’s ancestry includes German and Scandinavian settlers who arrived
    in the Great Plains in the late 19th century. The community places a strong emphasis on self‑reliance, neighborly support, and participation in local traditions such as county fairs, church gatherings,
    and 4‑H events. Growing up, Daniela absorbed these values through family outings to the historic downtown, volunteering at the local library, and celebrating holidays with traditional American customs,
    while also appreciating the wide‑open prairie landscape that shapes the region’s cultural identity.
