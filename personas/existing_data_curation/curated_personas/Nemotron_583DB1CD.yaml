  career_goals: Daniela aspires to finish high school with strong grades, attend a reputable college, and pursue a career as a veterinarian or a science teacher in a small‑town setting. She dreams of combining
    her love for animals, practical problem‑solving, and desire to give back to her community by working at a local animal shelter or teaching science to younger students. In the long term, she envisions
    opening a community outreach program that introduces children to hands‑on science and animal care, reflecting her value for structure, reliability, and community service.
