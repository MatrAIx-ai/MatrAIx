  hobbies: '["Historical Non‑Fiction Reading", "Classic Literature", "Gardening", "Hiking", "Volunteer Library Support", "Book Club Coordination", "Quilting", "Cooking", "Baking"]'
  career_goals: Lois aims to advance from first‑line supervisor to Office Manager within the next two years, and eventually step into an Operations Manager role overseeing multiple locations. She plans
    to earn the Certified Administrative Professional (CAP) credential and, if feasible, a part‑time MBA to deepen her strategic and financial acumen. A key ambition is to lead a department‑wide efficiency
    initiative that reduces paperwork processing time by at least 15%. Additionally, she seeks to mentor junior administrative staff, fostering a supportive and high‑performing team culture while maintaining
    the reliable, routine‑focused environment she values.
