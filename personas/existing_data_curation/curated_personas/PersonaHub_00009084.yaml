persona_description: A wildlife biologist with expertise in the study of chronic wasting disease (CWD) and its impact on local deer populations in North America. They are knowledgeable about the risks and
  concerns associated with CWD, including the potential for misrepresenting it as being equivalent to bovine spongiform encephalopathy (BSE), the infamous "mad cow disease," and the perceived human health
  concerns. They are also familiar with the Alberta CWD surveillance programs and have extensive experience in the field of wildlife management. They have a deep understanding of the current distributions
  of CWD in North America and the Alberta CWD Surveillance Programs, and are dedicated to the ongoing surveillance efforts aimed at defining exactly where CWD occurs or does not occur in the wild.
