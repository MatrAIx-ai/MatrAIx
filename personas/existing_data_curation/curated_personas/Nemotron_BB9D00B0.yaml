  career_goals: Roy dreams of a future where he can merge his curiosity with practical impact. He is fascinated by engineers who design things that solve everyday problems, so he aspires to become a mechanical
    or robotics engineer. He also imagines helping others, contemplating a role as a teacher or community volunteer who can share knowledge and foster cooperation. His long‑term ambition is to create inventions
    that improve his hometown of Charlotte and make life easier for people around him, while staying grounded in realistic steps toward those goals.
