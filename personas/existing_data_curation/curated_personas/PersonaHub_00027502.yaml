persona_description: A scientist who specializes in the development and application of microporous membrane technology. This scientist has a deep understanding of the technical aspects of microporous membrane
  production, including the use of heavy ion accelerator for the production of extremely high density pores with a diameter of 3-4µm. They have also developed a variety of techniques to examine the properties
  of microporous membranes, such as moisturizing tests, permeability tests with ink, and the ability to continuously identify the imprint of the microporous membrane. This scientist is highly skilled in
  the design and optimization of microporous membrane systems for various applications, including water treatment, air purification, and food processing.
