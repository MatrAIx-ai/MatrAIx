  hobbies: '[''Gardening (vegetable and native plants)'', ''Model ship and aircraft building'', ''Reading classic literature and engineering histories'', ''Chess'', ''Birdwatching'', ''Walking his dog'',
    ''Volunteering at STEM outreach events'', ''Listening to jazz and gospel music'', ''Cooking Southern‑inspired dishes'']'
  career_goals: 'Though retired, Aram aims to channel his expertise into community impact: he plans to volunteer four hours per week as a STEM mentor for local high‑school students, especially those from
    underrepresented backgrounds; to author a memoir and a series of technical blog posts that document his engineering experiences; to complete a teaching‑assistant certification to formalize his mentorship;
    to maintain his health through a structured weekly walking and light‑strength routine; and to ensure the financial stability of his household by overseeing budgeting and estate planning.'
