personas:
  professional: Aram Torchon, a retired systems engineer with decades of experience in statistical analysis, Fortran programming, and critical‑path scheduling, now devotes their methodical energy to mentoring
    high‑school STEM students, authoring technical blog posts that chronicle engineering history, and preserving their professional legacy through meticulous documentation.
  sports: Aram Torchon maintains a structured fitness routine that includes four weekly waterfront walks with their Labrador, a light‑weight resistance class at the Clearwater senior center every Tuesday,
    and passionately follows the Tampa Bay Buccaneers and Tampa Bay Rays, attending select games when their schedule permits, while also joining a local bird‑watching walking group that doubles as low‑impact
    cardio.
  arts: Aram Torchon finds artistic nourishment in the soulful sounds of Ella Fitzgerald and Mahalia Jackson at intimate Clearwater jazz nights, relishes reading classic literature such as Herman Melville’s
    *Moby‑Dick* and James Joyce’s *Ulysses*, and channels this inspiration into building intricate model aircraft while occasionally humming gospel hymns during their garden work.
  travel: Aram Torchon prefers carefully planned road trips that blend historical engineering sites and culinary stops, having toured the shipyards of Norfolk, the jazz heritage district of New Orleans,
    and the canals of Amsterdam, and now dreams of a leisurely cruise to the Bahamas that accommodates their mobility needs and their love for birdwatching on tropical islands.
  culinary: Aram Torchon, a proficient home cook, expertly prepares Southern‑style collard greens simmered with smoked turkey, sweet‑potato pie spiced with nutmeg, and fresh garden tomato bruschetta, while
    also mastering the precise timing required for a perfectly browned cornbread crust that becomes the centerpiece of their church gatherings.
  core: Aram Torchon blends a lifelong engineer’s precision with a deep reverence for community traditions, channeling their systematic nature into mentoring, careful budgeting, health monitoring, and soulful
    cooking, all while occasionally obsessively double‑checking details and allowing a quiet worry to linger behind their steady exterior.
background:
  cultural: Aram is an African American who grew up during the civil‑rights era in the South, carrying forward a strong sense of community, resilience, and family legacy. His cultural identity is rooted
    in church traditions, gospel and jazz music, and the oral storytelling of his grandparents, who migrated from the Deep South to Florida in the 1950s. He values intergenerational bonds, community service,
    and the preservation of African‑American culinary traditions, which he incorporates into his cooking and social gatherings. Living in Clearwater, he participates in the local Black Heritage Council,
    attending cultural festivals and supporting initiatives that promote educational equity for Black youth.
attributes:
  skills: '[''Statistical analysis'', ''Systems engineering'', ''Technical writing'', ''Project scheduling'', ''Computer programming (Python, Fortran)'', ''Data modeling'', ''Laboratory instrumentation'',
