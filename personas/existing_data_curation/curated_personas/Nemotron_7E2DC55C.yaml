  hobbies: '[''sketching'', ''photography'', ''social media video creation'', ''dance'', ''indie music listening'', ''nature hikes'', ''DIY crafts'', ''cooking Southern dishes'', ''video gaming'', ''singing'']'
  career_goals: Dal dreams of turning her social charisma and creative eye into a career as a digital content creator or lifestyle influencer focused on art, music, and Southern culture. She hopes to earn
    a GED, then study communications or visual arts at a community college, eventually launching her own online brand that showcases DIY fashion, local art scenes, and community events. In the longer term
    she sees herself hosting live pop‑up events, maybe opening a small boutique or studio where she can mentor other teens who feel outside the mainstream.
