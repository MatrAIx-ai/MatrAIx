personas:
  professional: Dal Smith is a budding digital content creator who channels a lively, talkative charisma and a quick‑thinking improvisational flair into short‑form TikTok videos that spotlight Greenwood’s
    mural scene, local Friday night football socials, and DIY fashion hacks, while a relaxed attitude toward planning sometimes leads to last‑minute scramble but fuels authentic, spontaneous storytelling.
  sports: Dal Smith is an avid fan of Friday night high school football socials and keeps a casual jog on the pine‑filled trails of the nearby state park, while cheering for the Carolina Panthers and the
    Greenville Drive, and occasionally joins a school intramural basketball league that satisfies a competitive urge to win.
  arts: Dal Smith blends a love of sketching downtown murals with a keen ear for indie acts like Phoebe Bridgers, Tame Impala and local folk‑rock band The Revivalists, performing spontaneous dance challenges
    on TikTok and attending weekly open‑mic nights at the church potluck hall, where their improvisational theater skills shine.
  travel: Dal Smith prefers spontaneous road trips to nearby state parks such as Table Rock and occasional weekend getaways to Charleston’s historic district, planning on the fly with a playlist of indie
    tracks, while dreaming of a future cross‑country music tour stop in Nashville, all within a modest family budget.
  culinary: Dal Smith enjoys whipping up Southern comfort foods like flaky biscuits, fried chicken wings and peach cobbler for friends, experiments with spice‑infused mac and cheese using smoked paprika
    and sriracha, and often pairs these dishes with a homemade lemonade while scrolling through food‑inspiration TikToks.
  core: Dal Smith is a curious, socially magnetic teen who turns everyday Southern traditions into vibrant digital stories, juggling a love for spontaneous creativity with a habit of last‑minute planning
    and occasional splurges.
background:
  cultural: Dal is raised in Greenwood, a small town in Abbeville County, South Carolina. Her family participates in Southern Baptist church life and community traditions such as Friday night football socials,
    county fairs, and church potlucks. The regional culture emphasizes hospitality, close family ties, and pride in local history, including Civil War sites and Southern cuisine like biscuits, fried chicken,
    and peach cobbler. While she absorbs these Southern customs, Dal’s curiosity pushes her toward broader artistic influences through the internet, blending the warmth of her hometown with contemporary
    digital culture.
