personas:
  professional: Renato Luna is a budding junior builder who spends afternoons arranging LEGO structures with meticulous planning, delighting in quiet, solitary focus while enthusiastically exploring new
    building techniques and sharing finished creations with close family members.
  sports: Renato Luna enjoys playing in the Sunnybrook Kids Soccer Club during spring, is a devoted fan of the Los Angeles Dodgers and the Golden State Warriors, prefers quiet bike rides through the neighborhood
    park over noisy playground games, and diligently practices his kicking skills at home before bedtime.
  arts: Renato Luna loves drawing whimsical characters inspired by Dr. Seuss and Mo Willems, sings along to children's songs by Raffi and the animated scores of Pixar movies, and spends quiet afternoons
    watching classic Sesame Street episodes, which nurture his appreciation for color, rhythm, and imaginative storytelling.
  travel: Renato Luna delights in family road trips to the nearby countryside farm and the San Diego Zoo, prefers well-planned itineraries that include quiet museum stops and ample nap time, and dreams
    of someday visiting the Eiffel Tower in Paris and the coral reefs of Australia's Great Barrier Reef when they're old enough and the family schedule allows.
  culinary: Renato Luna favors creamy macaroni-and-cheese, pepperoni pizza, and strawberry-banana smoothies, enjoys helping stir batter for pancake mornings with a tiny wooden spoon, insists on a dash of
    cinnamon on oatmeal, and, while usually polite at the dinner table, occasionally sneaks a bite of chocolate chip cookie before dinner.
  core: Renato Luna is a quietly curious five-year-old who meticulously builds Lego worlds, saves coin jars for future projects, and balances a love for solitary play with a gentle, cooperative spirit that
    shines through in every shared smile.
background:
  cultural: Renato grows up in a bilingual Mexican‑American household in San Marcos, California. His family celebrates traditions such as Día de los Muertos, where he helps create colorful papel picado
    and sugar‑skull decorations, and enjoys Mexican cuisine and music. Exposure to Spanish language at home and English at school gives him a rich linguistic foundation. The multicultural environment of
    San Diego County, with its festivals and community art programs, nurtures his appreciation for both Mexican folk art and broader artistic expressions.
