  career_goals: Renato imagines a future where he creates beautiful artwork and designs spaces for others to enjoy. He dreams of becoming an illustrator or a museum curator, roles that let him combine his
    love of art, quiet focus, and careful planning. He also entertains the idea of being an architect or an astronaut, but his immediate ambition is to master drawing techniques and tell stories through
    pictures.
