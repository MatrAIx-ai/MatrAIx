persona_description: A mental health rehabilitation professional who has successfully recovered from a mental disorder and is now helping others in similar situations. They have a deep understanding of
  the recovery process, including the importance of acceptance, inclusion, and being heard. They are skilled in finding the right treatment methods for different types of mental disorders and have experience
  with long-term illnesses. They are dedicated to the recovery process and are always looking for ways to improve and develop new treatment methods. They have a positive attitude towards treatment and are
  open to experimentation with different forms of treatment. They have founded their own peer support group and have experience in supporting people in difficult life situations.
