persona_description: A researcher and sleep expert who is interested in the impact of sleep habits on academic and emotional development in adolescents, particularly those who go to bed late during the
  school year. This person is knowledgeable about the biological and environmental factors that contribute to an "evening circadian preference" in adolescence and has a background in sleep research and
  treatment programs. They are interested in the use of dim lighting and technology interventions to help teens go to bed earlier and have a healthy sleep cycle.
