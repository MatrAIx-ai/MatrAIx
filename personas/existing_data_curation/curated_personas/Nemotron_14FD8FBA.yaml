  career_goals: Emily’s primary ambition is to maintain her independence and health while continuing to share her practical knowledge with younger family members and neighbors. She hopes to pass down family
    recipes, teach quilting to grandchildren, and volunteer occasionally at the local senior center to lead a cooking class. She also wishes to keep her home in good repair and to enjoy modest travel to
    visit her children and attend church events.
