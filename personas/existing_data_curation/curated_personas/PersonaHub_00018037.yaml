persona_description: A technician who specializes in troubleshooting compressors and system issues, particularly those related to the amperage draw and load conditions of compressors. They are familiar
  with the use of compressor rating charts and the importance of accurate amp measurements in determining the correct amperage draw for a particular compressor. They are also aware of the different factors
  that affect the RLA value and how it can be used to determine if a compressor is good or bad. They have experience with various brands of compressors and are able to accurately troubleshoot system problems
  by using amp measurements and the RLA value.
