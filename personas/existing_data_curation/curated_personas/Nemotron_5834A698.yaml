  hobbies: '[''Bridge club'', ''Community gardening'', ''Cooking and recipe sharing'', ''Knitting and quilting'', ''Book club'', ''Church choir volunteer'', ''Local history tours'', ''Volunteer coordination
    at senior center'', ''Traveling to state parks'', ''Family gatherings'']'
  career_goals: Although retired from formal employment, Karen aims to deepen her impact in Ottawa by expanding the senior center’s volunteer program, mentoring younger community members, and leading workshops
    on budgeting and home organization. She aspires to document her life stories in a memoir, learn a new digital skill (such as photo editing), and serve a term on the local planning board to help shape
    neighborhood initiatives that promote inclusivity and safety.
