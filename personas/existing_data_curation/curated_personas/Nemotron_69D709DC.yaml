  career_goals: Martha aims to transition from her current HR generalist role to a strategic HR leadership position within the next five years, ideally as an HR Business Partner or Director of Talent Management
    for a regional organization. She wants to lead data-driven workforce planning initiatives that integrate predictive analytics with the human touch. Her ambition includes establishing a cross-industry
    HR forum in central Iowa to share best practices and mentor emerging HR professionals. She also plans to earn the SHRM-Senior Certified Professional credential and to complete a master's program in
    Organizational Development, positioning herself as a thought leader who can shape workplace culture while delivering concrete business results.
