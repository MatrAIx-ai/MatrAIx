  hobbies: '[''Acoustic guitar'', ''Hiking'', ''Running'', ''Photography'', ''Community theater involvement'', ''Volunteering at local historical museum'', ''Reading contemporary fiction'', ''Cooking fusion
    dishes'']'
  career_goals: Zachary aims to turn his passion for culture and community into a professional career in arts administration or nonprofit community development. He seeks a role as a program manager with
    a regional arts council or a local historical organization where he can design and oversee educational and outreach programs. Over the next five years he hopes to lead a team that connects residents
    with the region's artistic heritage, and eventually launch his own nonprofit focused on preserving local history and providing arts‑education opportunities for underserved youth. He plans to supplement
    his bachelor's degree with certifications in nonprofit management and grant writing to strengthen his qualifications.
