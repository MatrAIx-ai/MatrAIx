personas:
  professional: A budding curator Andrew Fayne leverages strong research and analytical abilities, adept art historical writing, and a flexible yet organized workflow to support museum documentation and
    public programming, and they continuously seek innovative exhibition concepts.
  sports: An outdoor‑enthusiast Andrew Fayne hikes the Blue Hills weekly, joins a Boston running club prepping for the marathon, supports the Celtics, Red Sox, and Patriots, and they also attend local climbing
    sessions at a community gym.
  arts: A culture‑focused Andrew Fayne roams Boston’s galleries for inspiration from photographers Nan Goldin and Wolfgang Tillmans, reads Ocean Vuong’s poetry, attends live shows by The National, and they
    regularly host community art meet‑ups that blend visual and spoken word.
  travel: A wander‑lust driven Andrew Fayne has explored museum corridors in Paris, Berlin, and Florence, prefers spontaneous alleyway discoveries over rigid itineraries, dreams of street‑art tours in Barcelona
    and canal walks in Amsterdam, and they meticulously document each journey on a travel blog.
  culinary: A culinary‑curious Andrew Fayne cooks at a moderate skill level, experiments with Japanese ramen broth, Ethiopian injera, Thai pad thai, loves the umami of miso, the depth of saffron, the tang
    of kimchi, and they often source fresh produce at Boston’s farmer’s markets.
  core: A relentlessly curious Andrew Fayne curates both art and life with meticulous yet adaptable precision, yet they habitually procrastinate bill payments while obsessively updating their Instagram
    feed with daily black‑and‑white city shots.
background:
  cultural: Andrew identifies as a White American with deep New England roots; his family background includes Irish and Italian heritage, which cultivated a strong storytelling tradition and an appreciation
    for music and community gatherings. Raised in the Boston suburbs, he was immersed in the city’s historic and cultural landscape, regularly attending museum events, local festivals, and art workshops.
    This environment nurtured his curiosity about diverse artistic expressions and shaped his inclusive, progressive outlook, while instilling the value of civic participation and lifelong learning.
