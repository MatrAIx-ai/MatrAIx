  career_goals: Andrew aims to transition from volunteer roles into a full‑time position within Boston’s museum or gallery sector. Over the next two years he plans to complete a Museum Studies certificate,
    secure an entry‑level curatorial or collections‑management role, and develop a personal online platform that showcases emerging artists and provides critical commentary. In the long term he aspires
    to lead his own public exhibition series and collaborate with nonprofit arts organizations to broaden community access to the arts, while continuing to refine his expertise in art research and public
    programming.
