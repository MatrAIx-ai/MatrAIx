personas:
  professional: Cynthia Pareja is a seasoned metal-fabrication specialist turned community mentor, leveraging five decades of hands-on assembly expertise, meticulous quality-control habits, and a curiosity
    for emerging tools to teach youth at the Maryville vocational program and to run monthly heritage workshops for seniors, while organizing their workshop with near-military precision.
  sports: Cynthia Pareja stays fit by joining senior-center line-dance sessions, tackling the rugged trails of the Great Smoky Mountains on weekend hikes with a local birdwatching club, and cheering for
    the Tennessee Volunteers football team and the Nashville Predators during the season, embodying a sociable, energetic spirit that blends community camaraderie with personal endurance.
  arts: Cynthia Pareja channels a love of watercolor into serene landscapes reminiscent of Claude Monet, stitches intricate quilts inspired by the patterns of Georgia O'Keeffe’s flowers, sings gospel classics
    by Mahalia Jackson in the church choir, and crafts theatrical set pieces that echo the inventive set design of Audra McDonald’s Broadway productions, weaving together curiosity, social interaction,
    and meticulous craftsmanship.
  travel: Cynthia Pareja prefers purposeful travel that mixes gentle adventure and cultural immersion, having trekked the Appalachian foothills of Asheville, explored the historic squares of Savannah, and
    dreamed of strolling the stone streets of Seville, all while planning trips with a detailed itinerary that balances budget constraints, senior-friendly accommodations, and visits to local craft markets
    where they can source metal accents for their workshop.
  culinary: Cynthia Pareja creates Southern comfort meals like buttery biscuit-topped chicken and dumplings and smoky collard greens, often spicing them with a pinch of cumin and chipotle powder for a subtle
    Hispanic twist, while their kitchen shelves hold jars of locally sourced honey, aged bourbon, fresh peaches, and a well-worn cast-iron skillet that has seen countless family gatherings.
  core: Cynthia Pareja is a methodical, curiosity-driven artisan who blends a lifetime of metal-working precision with vibrant community art, unflinching dedication to mentorship, and an occasional indulgence
    in spicy comfort food.
background:
  cultural: Cynthia’s cultural background is rooted in the Appalachian South. Raised in a modest, blue‑collar household in Blount County, she grew up with Southern hospitality, church‑centered life, and
    a strong work ethic. Community events, county fairs, and seasonal festivals shaped her sense of belonging, while folk music, storytelling, and traditional crafts such as quilting and basket weaving
    were everyday companions. Her marriage introduced a cross‑cultural dimension, bringing occasional Hispanic culinary flavors and an openness to multicultural celebrations into family life. This blend
    of classic Appalachian values—self‑reliance, respect for nature, pride in craftsmanship—and an inclusive, curiosity‑driven outlook informs her daily interactions and community involvement.
