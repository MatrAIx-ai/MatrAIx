  career_goals: Cynthia plans to transition from full‑time factory work to a community‑focused mentorship role. Her primary ambition is to teach practical assembly and metal‑working skills to youth at the
    Maryville vocational program and to organize a monthly "hands‑on heritage workshop" for seniors. She hopes to launch a modest side venture creating handcrafted metal garden art for local shops, blending
    her curiosity about unconventional design with her fabrication expertise. Cynthia also aims to compile an illustrated guide on safe assembly practices for former colleagues and family members. In the
    longer term, she wishes to serve on the advisory board of the Blount County Historical Society, helping to document and celebrate traditional Appalachian manufacturing techniques. While she is not seeking
    a high‑profile career change, she wants to stay engaged, purposeful, and leave a tangible legacy of skill and community service.
