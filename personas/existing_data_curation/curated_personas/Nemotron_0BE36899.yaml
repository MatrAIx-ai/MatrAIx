  hobbies: '[''Hiking'', ''Weight training'', ''Landscape photography'', ''Reading historical non-fiction'', ''Cooking Asian‑Western fusion'', ''Volunteer fire safety education'']'
  career_goals: His immediate career goal is to achieve the rank of lieutenant within the Quincy Fire Department, which will enable him to lead a specialized rescue unit and influence departmental training
    programs. He plans to obtain paramedic certification to expand his emergency medical capabilities, and he aims to develop a community outreach initiative focused on fire safety education for high‑risk
    neighborhoods. Long‑term, Bong aspires to become a fire prevention inspector or a fire training officer, mentoring new recruits while integrating data‑driven risk assessment methods.
