persona_description: A geologist or soil scientist who is interested in understanding the complex interactions between physical processes, environmental factors, and landform evolution over geologic time
  scales. They are looking for a comprehensive guide to constructing numerical models to explain the co-evolution of landforms, soil, vegetation, and tectonics, and are seeking a resource for understanding
  the science of the physical processes involved and how to solve them. They are also interested in assessing the relative importance of different factors at field sites and selecting the appropriate processes
  to model, and are looking for a book that integrates a discussion of the fundamental processes with mathematical formulations and provides a framework through which to study the interaction of soils,
  vegetation, and landforms over time.
