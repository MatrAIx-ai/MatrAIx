personas:
  professional: Jeanette Gallwitz, a senior management analyst with a knack for turning raw data into strategic insights, blends rigorous statistical analysis in Excel, Power BI, Tableau, and SQL with a
    competitive edge and healthy skepticism, and they drive process optimization, budgeting, and forecasting for their mid-sized firm while preparing for a PMP certification.
  sports: Jeanette Gallwitz stays active in the mixed‑gender Shelbyville Spikers volleyball league, hikes the Hoosier National Forest each fall, and they root for the Indianapolis Colts and Indiana Pacers
    while also joining a local Saturday‑morning running club.
  arts: Jeanette Gallwitz nurtures their love for the arts by curating the adult book club’s reading list with titles from Margaret Atwood and Kazuo Ishiguro, attending live performances by the Shelbyville
    Community Theater, and they regularly enjoy concerts by the Lumineers and a weekly jazz session at a downtown lounge.
  travel: Jeanette Gallwitz plans trips with a spreadsheet of costs and itineraries, preferring weekend getaways to Asheville’s Blue Ridge Mountains and the historic streets of New Orleans, and they dream
    of a summer road trip through the Pacific Northwest’s national parks once their consulting practice stabilizes.
  culinary: Jeanette Gallwitz, an intermediate home chef, delights in hosting themed dinner parties featuring dishes like sous‑vide pork belly, homemade mushroom risotto, and spicy Thai pho, often sourcing
    fresh herbs, heirloom tomatoes, and artisan cheeses from the local farmer’s market, and they love experimenting with fusion flavors.
  core: Jeanette Gallwitz balances a data‑driven career with a competitive, sociable streak, turning every volleyball match, book club discussion, and dinner party into a strategic opportunity to connect,
    learn, and out‑perform, and they never miss a chance to benchmark performance, even in leisure.
background:
  cultural: Jeanette grew up in a Midwestern, small‑town environment where practicality, community involvement, and modesty are valued. Her family heritage includes German ancestry, reflected in the Gallwitz
    surname, and she was raised with an appreciation for hard work and straightforward communication. The cultural norm of balancing independence with cooperative community spirit in Indiana has shaped
    her outlook—she values self‑reliance, but also the social bonds formed through local events, church gatherings, and volunteerism. These influences inform both her professional ethos and her active participation
    in Shelbyville’s civic life.
