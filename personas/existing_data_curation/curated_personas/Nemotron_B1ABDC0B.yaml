  career_goals: Jeanette aims to progress from senior management analyst to a director‑level role overseeing corporate strategy and operational excellence within the next five years. She intends to deepen
    her expertise in data‑driven decision making, earn a PMP certification, and lead large‑scale transformation projects that blend innovative ideas with proven methodologies. Long‑term, she envisions establishing
    a boutique consulting practice focused on Midwestern small‑business growth, while mentoring emerging analysts and contributing to regional economic development initiatives in Shelby County.
