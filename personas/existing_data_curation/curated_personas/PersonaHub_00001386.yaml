persona_description: A student who is interested in both Computing and the Arts, particularly those who are interested in the intersection of technology, society, and innovation. They are looking for a
  program that will provide them with the theoretical and historical background necessary to make critical judgements about new approaches to artistic expression and practical knowledge of the challenges
  faced by creative artists in a digital age. They are also interested in careers in the video-game and entertainment industries, art galleries, museums, and multimedia design and production, but also in
  more traditional computer industries as these increasingly adopt multimedia user interface design. They are willing to learn how to direct, develop and use cutting-edge computer software programs for
  Music, Art, Drama, and Film production. They are interested in companies like Apple and Electronic Arts, which often happen to be the most well-rounded coders as well!
