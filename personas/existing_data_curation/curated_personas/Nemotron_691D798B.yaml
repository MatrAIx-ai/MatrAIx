  career_goals: Although retired from formal employment, Mark aims to leave a lasting record of Escambia County’s cultural heritage. He plans to author a series of concise pamphlets on local history, collate
    family genealogies for community members, and mentor a small group of seniors in oral-history interviewing techniques. He also wants to complete a fully functional model‑train layout that reflects historic
    rail routes through rural Alabama, using the project as a teaching tool for local schoolchildren. Maintaining his health and independence, he envisions a self-sufficient garden that supplies fresh produce
    for his household and occasional donations to a neighbor’s food pantry.
