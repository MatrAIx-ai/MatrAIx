persona_description: A software developer who specializes in the creation of scripts for the Semitic alphabet, particularly for use in archaeology. They have experience with MATLAB R2009a and are interested
  in the development of new capabilities for the program, such as the ability to recall saved scripts and give the Semitic symbol any new value, which can open new doors in studies of Semitic fonts and
  the surrounding area's history. They are likely to be interested in the Arabic language and have a strong understanding of the Semitic alphabet and its historical and cultural significance.
