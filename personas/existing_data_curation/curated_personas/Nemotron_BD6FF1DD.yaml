  career_goals: Azra aims to advance to a senior executive assistant or office manager role within the next three to five years, gaining exposure to strategic projects and higher‑level decision‑making.
    She plans to earn the Certified Administrative Professional (CAP) credential and complete an associate’s degree in business administration through a part‑time program, which will deepen her understanding
    of corporate operations and reduce her worry about career stability. Long‑term, she hopes to transition into project coordination or operations management, combining her organized, pragmatic approach
    with a growing interest in innovative workflow solutions, while also mentoring newer administrative staff.
