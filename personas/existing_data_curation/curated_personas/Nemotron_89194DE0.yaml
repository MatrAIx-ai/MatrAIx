personas:
  professional: Carol White, an experienced janitorial specialist with deep expertise in floor care, inventory control, and OSHA compliance, blends a practical love of structure with a relaxed, flexible
    scheduling style, allowing them to mentor new staff while gently nudging others toward greater organization.
  sports: Carol White, an avid participant in their Riverfront Trail walking group and a seasonal player on a senior softball league, cheers on the St. Louis Cardinals during baseball season and the St. Louis
    Blues in hockey, balancing low‑impact cardio with occasional community basketball pick‑up games.
  arts: Carol White finds comfort in classic rock legends like The Eagles and country icons such as Dolly Parton, while immersing themselves in mystery novels by Agatha Christie and historical sagas by
    Ken Follett, and they channel their creativity into knitting blankets for church fundraisers and local charity drives.
  travel: Carol White prefers comfortable, well‑planned road trips to scenic Midwestern spots like the Ozark National Forest and historic Galena, while they dream of a leisurely Mississippi River cruise
    and a cherished family pilgrimage to New Orleans for Mardi Gras.
  culinary: Carol White, a confident home cook, delights in preparing traditional holiday turkey with herb‑infused stuffing, hearty beef stew simmered with garden‑fresh tomatoes and peppers, and buttery
    apple pie, often sprinkling fresh basil from their own garden onto pasta sauces.
  core: Carol White blends a practical Midwestern work ethic with a relaxed, garden‑loving spirit, juggling a meticulous cleaning career and spontaneous knitting bursts, all while they never miss a church
    potluck.
background:
  cultural: Carol comes from a multi‑generational white American family rooted in the St. Louis metropolitan area. Her ancestry includes German and Irish heritage, common among long‑standing residents of
    St. Charles County. Raised in a modest, middle‑class household, she was taught the value of hard work, community service, and regular church attendance. As a lifelong member of St. Peters Catholic Church,
    she celebrates traditional American holidays—Thanksgiving, Christmas, and Fourth of July—with family meals and community events. The Midwestern cultural emphasis on practicality, reliability, and neighborly
    cooperation has shaped her worldview, fostering a strong sense of responsibility and a balanced approach to personal and professional life.
attributes:
  skills: '[''Floor care and carpet cleaning'', ''Restroom sanitation and disinfection'', ''Industrial vacuum and floor scrubbing equipment operation'', ''Minor plumbing repairs'', ''HVAC filter replacement'',
