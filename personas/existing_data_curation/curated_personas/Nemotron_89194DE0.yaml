  hobbies: '[''Knitting and crocheting'', ''Vegetable gardening'', ''Reading mystery and historical fiction'', ''Walking local trails and parks'', ''Cooking and baking family recipes'', ''Volunteering at
    the community food pantry'', ''Attending church potluck gatherings'', ''Listening to classic rock and country music'', ''Watching nature documentaries'']'
  career_goals: Carol aims to transition into a supervisory role within her cleaning team, taking on responsibilities for training new employees, developing efficient cleaning schedules, and overseeing
    health‑and‑safety compliance. She plans to pursue a short certification in facilities management to broaden her skill set, positioning herself for a part‑time facilities coordination role as she approaches
    retirement. Securing a stable retirement benefits package while maintaining a balanced work‑life schedule is also a priority, allowing her to continue supporting her family and community engagements.
