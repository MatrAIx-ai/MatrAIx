persona_description: A geologist who is interested in the study of sedimentary sequences and their reconstruction of past environmental conditions. This person is particularly interested in the changing
  environmental conditions in the Oder Estuary and how these conditions have influenced the evolution of the lagoons. They are skilled in analyzing sedimentary sequences to identify changes in salinity,
  bioproductivity, and sea-level, and are able to use this information to predict future environmental changes. This person is likely to be involved in coastal zone management and is interested in understanding
  the natural evolution of the environment and its forced by ever-changing circumstances.
