  career_goals: Although only a toddler, Crystal’s environment nurtures her imaginative and methodical traits. As she grows, her fascination with colors, patterns, and storytelling may guide her toward
    ambitions such as visual artist, illustrator, or designer of educational media. Her organized disposition suggests future interest in fields requiring precision, like architecture or engineering, while
    her kindness points to potential roles in teaching, community outreach, or cultural preservation.
