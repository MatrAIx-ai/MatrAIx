  career_goals: Jennifer aspires to a future career that combines her love for science, helping others, and her natural knack for organized problem solving. She dreams of becoming a pediatric nurse or a
    biomedical engineer, envisioning herself designing or using medical technologies that improve children's health. In the short term, she aims to maintain top academic performance, earn leadership roles
    in her school’s science clubs, and expand her volunteer work at local health fairs and community centers. She also hopes to develop her leadership abilities by serving as student council president and
    later becoming a community health advocate.
