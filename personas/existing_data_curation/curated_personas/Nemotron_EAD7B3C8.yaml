personas:
  professional: Jennifer King, a 12-year-old budding scientist-coder, marries disciplined experiment design with compassion, using their organized approach to run home-lab projects and code simple games
    that teach environmental stewardship.
  sports: Jennifer King races for the Dallas Youth Track Club's middle-school squad, trains for the 800-meter dash, and spends weekends cheering on the Dallas Cowboys and Dallas Mavericks, balancing competitive
    drive with a collaborative spirit shaped by Girl Scout teamwork that they cherish.
  arts: Jennifer King channels their creativity through piano practice, often performing pieces by Ludovico Einaudi while humming pop anthems from Taylor Swift and Billie Eilish, and they enjoy Saturday
    matinees at the Dallas Children's Theater, which fuel their love for storytelling.
  travel: Jennifer King plans family road trips that blend educational stops like the Johnson Space Center in Houston and music festivals in Austin with adventurous hikes in Big Bend, while dreaming of
    a solo visit to the Kennedy Space Center in Florida, balancing structured itineraries with a love for spontaneous roadside discoveries they eagerly pursue.
  culinary: Jennifer King enjoys hearty Texas-style barbecue, especially brisket tacos with cilantro, lime, and jalapeño, loves making spicy chili con carne and homemade guacamole, and occasionally bakes
    chocolate chip cookies, demonstrating a budding kitchen confidence paired with a taste for bold, smoky flavors they proudly share.
  core: Jennifer King is a hyper-organized 12-year-old science whiz who balances relentless curiosity with a practical streak, never misses a piano practice, yet secretly hoards extra pens and comic books
    in a secret drawer they rarely admit to.
background:
  cultural: Jennifer was raised in a middle‑class white family in Dallas, Texas. Her upbringing blends Southern hospitality with a strong emphasis on education, community involvement, and practical work
    ethic. She celebrates traditional Texan holidays, enjoys local foods such as barbecue and Tex‑Mex, and frequently takes part in school fairs, neighborhood clean‑ups, and community service projects.
    Her family’s values of kindness, cooperation, and diligent effort have reinforced her compassionate and organized personality.
