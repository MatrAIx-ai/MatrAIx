  hobbies: '[''Hiking'', ''Landscape photography'', ''Gardening'', ''Cooking Salvadoran cuisine'', ''Reading (historical fiction, business)'', ''Book club'', ''Yoga and meditation'', ''Volunteer Spanish
    tutoring'']'
  career_goals: Gladys aims to advance to a senior leadership role such as Regional Property Management Director, overseeing a portfolio of mixed‑use and residential communities in the Bay Area. She plans
    to obtain the Certified Property Manager (CPM) designation and deepen her expertise in sustainable community practices, integrating green building standards and resident wellness programs. Over the
    next five years, she hopes to lead a multidisciplinary team, mentor emerging property managers, and spearhead initiatives that improve community cohesion, particularly for Latino and senior residents.
    She also envisions establishing a boutique property‑management firm that emphasizes cultural sensitivity and high‑quality resident services, balancing professional growth with a stable work‑life schedule.
