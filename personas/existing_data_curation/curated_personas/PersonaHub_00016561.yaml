persona_description: A historian who is interested in the evolution of criminal law and its impact on society. They are fascinated by the shift in language used in criminal trials to describe violent versus
  non-violent crimes and the punishments associated with them. They are curious about the underlying signals that drove this shift and the broader cultural and bureaucratic changes that occurred during
  this time period. They are also interested in the role of society, particularly the state and its bureaucracies, in controlling violence and promoting a culture of law and order.
