persona_description: A Finnish geographer who specializes in the study of permafrost and its impact on the landscape. The person is interested in the ongoing changes in the Arctic region due to global warming
  and is particularly focused on the formation and disappearance of unique landforms in permafrost. They are aware of the potential for significant changes in the occurrence of iconic landforms such as
  pingo, ice wedge polygons, and rock glaciers by the end of the century due to the effects of global warming and an increase in rainfall. The person is likely to be involved in research, writing, and advocacy
  related to permafrost and its environmental impact.
