  hobbies: '[''Hiking'', ''Skiing'', ''Trail Running'', ''Organizing Group Outdoor Activities'', ''Volunteering at Community Health Fairs'', ''Science Outreach for Youth'', ''Playing Acoustic Guitar'',
    ''Cooking'', ''Urban Gardening'']'
  career_goals: David aims to lead a translational research program that rapidly converts cutting‑edge discoveries into effective therapies for patients, with a particular emphasis on underserved communities
    in Colorado. He aspires to build strong partnerships between academia, biotech companies, and local health organizations, securing funding to expand his lab’s impact. Over the next decade, he envisions
    taking on a senior scientific leadership role, influencing health policy at the state level, and establishing a mentorship pipeline that empowers the next generation of diverse medical scientists.
