personas:
  professional: A seasoned medical scientist, David Behanna, merges deep expertise in molecular immunology with a pragmatic focus on translational research, they lead multi‑disciplinary clinical trials,
    mentor junior investigators, and forge partnerships with biotech firms and local health agencies to accelerate therapies for underserved Colorado communities.
  sports: An avid outdoor athlete, David Behanna, spends weekends snowboarding at Vail, participates in a weekly trail‑running club at Chautauqua Park, they cheer for the Denver Broncos, Colorado Avalanche,
    and Colorado Rockies, and they volunteer as a junior ski instructor during the winter season.
  arts: An engaged cultural participant, David Behanna, strums acoustic guitar at neighborhood gatherings, they draw inspiration from musicians like John Denver, The Lumineers, and Fleetwood Mac, and they
    regularly attend performances at the Denver Center for the Performing Arts, often contributing to their community outreach programming.
  travel: A purposeful traveler, David Behanna, routinely explores Colorado’s high‑altitude parks such as Rocky Mountain National Park, they plan annual trips to the Swiss Alps to attend biotech conferences
    and enjoy alpine hiking, and they dream of trekking Patagonia’s Torres del Paine once they secure a sabbatical.
  culinary: A wholesome home chef, David Behanna, tends a small rooftop garden for kale, heirloom tomatoes, and herbs, they craft quinoa‑salmon bowls with lemon‑dill vinaigrette and frequently bake spiced
    carrot cake with locally sourced honey, while they occasionally experiment with craft beers from microbreweries in the Front Range.
  core: David Behanna blends scientific rigor with mountain vigor, orchestrating community‑focused translational research while juggling disciplined budgeting, proactive health monitoring, and a penchant
    for late‑night acoustic jam sessions and espresso indulgence.
background:
  cultural: David’s family traces its roots to German and British ancestors who settled in the American Midwest before relocating to Colorado in the early 1970s. Raised in Aurora, he grew up immersed in
    the state’s outdoor culture and the communal spirit of the Denver metropolitan area. His upbringing emphasized hard work, education, and civic responsibility, shaping his commitment to scientific discovery
    and community service. While identifying as white American, David values the diverse perspectives of his neighbors and integrates that appreciation into both his professional collaborations and personal
    interactions.
