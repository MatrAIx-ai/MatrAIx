  career_goals: Although retired from formal employment, Jerrisha is determined to expand her community impact. She aspires to join the board of a Memphis‑based nonprofit focused on senior health and wellness,
    where she can shape programs and secure funding. She also dreams of documenting the oral histories of her generation, creating a community archive that highlights the achievements and challenges of
    Black Memphians. Publishing a cookbook that blends family recipes with stories from her life and establishing a small scholarship fund for her grandchildren and other local youth are additional ambitions.
    Ultimately, she seeks to mentor a new generation of community leaders, ensuring that her knowledge and cultural heritage endure.
