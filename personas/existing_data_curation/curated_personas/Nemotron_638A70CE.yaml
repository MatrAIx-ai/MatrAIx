personas:
  professional: Jerrisha Mohammed, a retired retail manager who now channels their meticulous event‑planning skills and financial savvy into coordinating senior‑center wellness workshops and church fundraisers,
    demonstrates how they blend structure with community spirit in their volunteer leadership.
  sports: Jerrisha Mohammed enjoys walking the riverfront park trails with a local senior walking group, avidly follows the Memphis Grizzlies and the Tennessee Titans, and participates in the church’s intramural
    softball league, where they serve as the dependable shortstop despite occasional knee creaks.
  arts: Jerrisha Mohammed sings powerful gospel harmonies in their church choir, treasures evenings at the Beale Street blues festivals listening to B.B. King tributes, and they spend Sunday afternoons
    quilting with friends while discussing Toni Morrison’s novels, a mix of music, literature, and craft that fuels their creative soul.
  travel: Jerrisha Mohammed prefers organized road trips that blend heritage and relaxation, such as a meticulously planned itinerary visiting Natchez’s antebellum homes, a weekend cruise down the Mississippi
    River, and an annual church group pilgrimage to Washington, D.C.’s National Museum of American History, and they always pack a notebook for spontaneous oral history interviews.
  culinary: Jerrisha Mohammed crafts soul‑food feasts featuring fried catfish, collard greens simmered with smoked turkey, sweet potato pie, and cornbread, thriving on the aromas from their garden’s fresh
    herbs, yet they have a habit of over‑salting jars of pickled okra, much to the amusement of family guests.
  core: Jerrisha Mohammed blends steadfast organization with boundless community energy, and they turn every garden, quilt, and choir rehearsal into a living tribute to shared history and future hope.
background:
  cultural: Jerrisha is a second‑generation African American who grew up in Memphis’s South Memphis neighborhood during the post‑Civil Rights era. Her family’s roots trace back to the Great Migration, when
    her grandparents moved from the Deep South to seek better opportunities. The rich musical legacy of Memphis blues, soul, and gospel has shaped her love for music and community celebration. Church plays
    a central role in her life, providing a supportive network and a platform for service. She embraces Southern hospitality, traditional soul‑food cooking, and storytelling as ways to preserve and transmit
    cultural values. Her experiences as a Black woman in the American South inform her commitment to community empowerment, intergenerational mentorship, and the preservation of Black heritage in Memphis.
