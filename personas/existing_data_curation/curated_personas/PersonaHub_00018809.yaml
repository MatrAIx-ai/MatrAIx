persona_description: An individual who is passionate about open-source mapping projects and is interested in contributing to the growth and development of OpenStreetMap. They are knowledgeable about the
  project's history, the collaborative nature of the map creation process, and the benefits of using OpenStreetMap for mapping and data analysis. They are interested in using OpenStreetMap for humanitarian
  relief efforts and are aware of the Humanitarian OpenStreetMap Team's work to ensure cooperation between the OSM community and humanitarian response agencies during times of crisis. They are also aware
  of the free and editable nature of OpenStreetMap data, its crowd-sourced format, and its potential for organizations and individuals to develop their own tools. Additionally, they are aware of the OpenStreetMap
  Foundation's role in promoting the growth of OpenStreetMap and the for-profit services that companies such as CloudMade use the free data available in OSM to offer.
