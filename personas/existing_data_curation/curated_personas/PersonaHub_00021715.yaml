persona_description: A scientist who specializes in the field of fluid mechanics, particularly in the study of oil flow in oil spills. He has expertise in optical feature tracking and has performed similar
  measurements in the past. He is interested in improving the accuracy of flow rate estimates and has been appointed to a government task force to calculate an official flow rate estimate. He is excited
  to share his findings and insights with the Purdue Physics community. He is looking for ways to improve the accuracy of flow rate estimates and is willing to work through an exercise with the attendees
  to arrive at their own estimates.
