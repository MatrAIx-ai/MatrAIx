persona_description: A team of researchers and engineers at Iowa State University, led by Partha Sarkar, who specialize in studying wind storms, gust fronts, and other atmospheric phenomena. They are supported
  by $1 million from the federal government's 2006 Science, State, Justice, Commerce and Related Agencies Appropriations Act. The research team is made up of experts in aerospace engineering, meteorology,
  geological and atmospheric sciences, and agronomy, and they are supported by faculty members from these departments. The team's goal is to reduce the damage caused by wind storms and to understand how
  terrain and structures affect wind flow.
