personas:
  professional: John Arambula, an 8-year-old aspiring engineer who devours step‑by‑step LEGO manuals, organizes his builds with meticulous spreadsheets, and applies his disciplined, strategic mind to early
    coding projects on Scratch, showcasing a budding talent for systematic problem‑solving.
  sports: John Arambula plays recreational soccer for the local U‑9 Thunderbolts, thriving on the clear rules, scheduled practices, and team camaraderie, while also enjoying weekend chess matches as a strategic
    warm‑up, demonstrating a balanced love of structured physical and mental competition.
  arts: John Arambula, a piano enthusiast, practices Beethoven’s “Für Elise” and the whimsical “Charlie and the Chocolate Factory” soundtrack, listens to the melodic compositions of Ludovico Einaudi, and
    immerses in adventure novels by Jules Verne, blending musical discipline with imaginative storytelling.
  travel: John Arambula enjoys family trips that follow a detailed itinerary, having explored the interactive exhibits at the local science museum, an adventurous weekend at Disneyland, and a nature hike
    in Yellowstone, while dreaming of visiting the Space Center in Houston to experience real rockets.
  culinary: John Arambula, a budding chef in the kitchen, follows step‑by‑step recipes to whip up favorite dishes like spaghetti Bolognese, homemade pizza with pepperoni and mushrooms, and classic chocolate
    chip cookies, relying on precise measurements and a trusty kitchen timer.
  core: John Arambula, an organized eight‑year‑old with a love for Lego, chess, and piano, balances disciplined achievement with an easy‑going curiosity, yet sometimes neglects bedtime in pursuit of new
    builds.
background:
  cultural: John was born and raised in Shawnee, Oklahoma, a small Midwestern town where community, family, and school events play a central role in daily life. His household blends typical American Midwest
    values—hard work, reliability, and modesty—with a touch of Hispanic heritage, reflected in occasional Spanish greetings and family recipes passed down from grandparents. He attends a public elementary
    school that emphasizes teamwork, local traditions, and participation in after‑school programs such as Boy Scouts and youth sports leagues. Church gatherings and neighborhood festivals reinforce a sense
    of belonging and mutual support, shaping his caring and cooperative nature.
