  career_goals: John dreams of becoming an engineer or architect, drawn to the idea of designing structures that are both functional and orderly. He imagines building bridges, skyscrapers, or even robots,
    and often asks his teachers about the math and science that make these projects possible. He also admires firefighters for their bravery and community service, seeing them as role models for helping
    others. John is determined to keep his grades high, join a school robotics club, and continue his piano practice, believing that dedication and disciplined study will open doors to his future career.
