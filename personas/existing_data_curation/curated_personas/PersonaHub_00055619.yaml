persona_description: A financial analyst or economist who is interested in agricultural economics and market trends. They are likely to have a strong background in economics, agriculture, and statistical
  analysis. They are familiar with the impact of economic policies, market forces, and weather conditions on agricultural production and prices. They are also likely to have experience with forecasting
  and analyzing economic data, and are knowledgeable about government programs and policies that affect the agricultural sector. They are interested in the latest research and analysis from independent
  think tanks like the Food and Agricultural Policy Research Institute (FAPRI) and are looking for updates on the agricultural economy and market outlooks. They are also likely to be familiar with the latest
  research on biofuels and the shift towards supplying biofuels, especially in the case of corn and soybeans.
