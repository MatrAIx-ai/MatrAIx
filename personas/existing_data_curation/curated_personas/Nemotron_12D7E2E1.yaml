  hobbies: '[''Gardening (vegetable and herb)'', ''Reading historical fiction and mystery novels'', ''Knitting'', ''Weekly budgeting and personal finance tracking'', ''Hiking local trails (Mount Diablo)'',
    ''Small invitation‑only book club'', ''Baking simple cookies for family'']'
  career_goals: Kelie aims to transition into a senior purser role within the next two years, overseeing cabin operations for long‑haul flights and serving as a primary liaison between flight crew and airline
    management. She aspires to obtain the Airline Operations Supervisor certification and eventually become a cabin crew trainer, leveraging her methodical approach to develop robust training programs.
    In the longer term, Kelie envisions moving into a ground‑operations management position, where she can apply her organizational strengths to scheduling, safety audits, and crew resource planning. Her
    ambition is driven by a desire for professional recognition, increased responsibility, and a stable career trajectory that supports her family life.
