personas:
  professional: Kelie Duplechin, a meticulous flight‑crew professional with six years of airline experience, excels at enforcing FAA safety protocols, delivering calm conflict resolution, and coordinating
    crew briefings, while strategically pursuing a senior purser role and the Airline Operations Supervisor certification to transition into cabin crew training and ground‑operations management.
  sports: Kelie Duplechin, an avid weekend hiker, regularly trails the Mount Diablo paths with the local Diablo Hiking Club, roots for the Oakland Athletics during baseball season, and enjoys occasional
    viewings of the US Women’s National Soccer Team, favoring low‑key participation over large‑scale fan events.
  arts: Kelie Duplechin, an avid reader of historical fiction by Ken Follett and classic mysteries by Agatha Christie, knits scarves inspired by the motifs of “The Crown,” and unwinds with the soothing
    piano compositions of Ludovico Einaudi while occasionally attending intimate productions at the Concord Community Theater.
  travel: Kelie Duplechin, a methodical planner, maps weekend getaways to Napa Valley wineries, Lake Tahoe ski resorts, and yearly hikes in Yosemite National Park in a detailed itinerary spreadsheet, while
    dreaming of a structured European rail tour of historic castles in France and Germany, preferring balanced itineraries over spontaneous trips.
  culinary: Kelie Duplechin, a garden‑to‑table enthusiast, frequently prepares fresh Caprese salads, basil pesto pasta, and lettuce wraps using home‑grown tomatoes, basil, and lettuce, while mastering a
    modest repertoire of simple Italian dishes and occasionally overcooking pasta when juggling a tight schedule.
  core: Kelie Duplechin blends a methodical airline career with a love of orderly garden harvests, precise budgeting, and solitary hikes, yet can’t resist the occasional impulse to splurge on a new knitting
    pattern or a spontaneous mountain summit.
background:
  cultural: Kelie was raised in a middle‑class, suburban family in the East Bay region of California. Her upbringing reflects mainstream American cultural norms—celebrating national holidays, attending
    community events, and valuing self‑reliance and practicality. Her family’s heritage is rooted in European American traditions, and she was taught to prioritize reliability, punctuality, and a strong
    work ethic. Living in Concord, she has been exposed to a diverse yet predominantly suburban culture, which influences her preference for familiar routines, small‑group social settings, and a pragmatic
    outlook on life.
attributes:
  skills: '[''Customer service'', ''Safety and emergency procedures'', ''Conflict resolution'', ''Time management'', ''Schedule coordination'', ''Regulatory compliance (FAA)'', ''First aid and CPR'', ''Basic
