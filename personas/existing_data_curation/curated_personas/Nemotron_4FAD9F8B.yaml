personas:
  professional: Jadiel Brooks is a veteran IT leader who translates business objectives into strategic technology roadmaps, excels at cloud and cybersecurity design, and they infuse the improvisational
    energy of their saxophone jazz sessions into collaborative, people-centric project leadership.
  sports: Jadiel Brooks is a pickup basketball enthusiast who plays weekly at Lawrenceville Park, they cheer for the Atlanta Hawks and Falcons, and they belong to the local Legends Basketball Club, viewing
    fitness as a social ritual that blends competition with community bonding.
  arts: Jadiel Brooks immerses themselves in the local cultural arts scene, performing saxophone with a community jazz ensemble inspired by John Coltrane, attending spoken-word nights featuring artists
    like Sarah Kay, and they curate gallery visits that showcase contemporary painters such as Kehinde Wiley.
  travel: Jadiel Brooks plans their travel with a mix of spontaneous weekend road trips to Savannah’s historic squares and structured overseas itineraries to Kyoto, Japan, they seek a blend of Southern
    hospitality flavors and Asian artistic inspiration while balancing limited vacation days with family commitments.
  culinary: Jadiel Brooks enjoys cooking soul-food staples like shrimp and grits, collard greens, and sweet-potato pie, they often experiment with fusion twists such as jerk-spiced tacos, and they relish
    dining out at the local seafood spot The Optimist where they order a crisp fish po’boy with pickled okra.
  core: Jadiel Brooks fuses the improvisational heart of jazz with strategic tech leadership, they turn community-driven values into bold digital transformation while occasionally struggling to meet rigid
    deadlines.
background:
  cultural: Jadiel is an African‑American man who grew up in the Atlanta metropolitan area, immersed in the rich cultural tapestry of the South. Raised in a close‑knit extended family and a historically
    Black church, he experienced gospel music, storytelling, and a strong emphasis on community service from an early age. His family history traces back to the Great Migration, and he carries forward traditions
    of Southern hospitality, soul food, and a collective responsibility to uplift his community. In Lawrenceville, he actively participates in the vibrant Black arts scene, supports local artists, and contributes
    to cultural festivals that celebrate African‑American heritage. These cultural influences shape his collaborative leadership style, his appreciation for music and visual art, and his commitment to fostering
    diversity and inclusion within the technology sector.
attributes:
  skills: '[''IT strategy development'', ''Enterprise architecture'', ''Network infrastructure management'', ''Cloud migration (AWS, Azure)'', ''Cybersecurity best practices'', ''Budgeting & cost control'',
