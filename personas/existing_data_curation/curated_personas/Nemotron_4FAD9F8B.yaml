    ''Creative problem solving'', ''Diversity and inclusion advocacy'', ''Public speaking'', ''Conflict resolution'']'
  hobbies: '[''Visiting art galleries and museums'', ''Playing saxophone in a community jazz ensemble'', ''Photography (urban and nature)'', ''Cooking Southern cuisine and experimenting with fusion recipes'',
    ''Watching live jazz and hip‑hop performances'', ''Weekend basketball at local parks'', ''Mentoring youth in coding and STEM outreach'', ''Volunteering at cultural festivals and community events'',
    ''Reading science‑fiction and design literature'']'
  career_goals: Jadiel aims to step into a senior executive role—ideally Chief Information Officer—within the next three to five years, where he can steer large‑scale digital transformation projects for
    a healthcare system or a community‑focused nonprofit. He also plans to complete his bachelor's degree in computer science (or an MBA) to formalize his academic credentials. Parallel to his corporate
    ambition, Jadiel is eager to launch a boutique consulting practice that helps small businesses and cultural organizations adopt sustainable technology solutions, blending his tech expertise with his
    passion for the arts. He hopes to become a frequent speaker at tech‑and‑art conferences, mentor the next generation of Black IT professionals, and influence organizational policies that promote equity
    and inclusive innovation.
