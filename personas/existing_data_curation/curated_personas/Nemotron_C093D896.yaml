  hobbies: '[''Reading historical literature'', ''Genealogy research'', ''Gardening'', ''Fishing'', ''Gospel choir participation'', ''Cooking traditional Southern and Gambian recipes'', ''Woodworking projects'',
    ''Small discussion groups at senior center'']'
  career_goals: Although retired, Darryl remains driven by a desire to leave a lasting imprint on his community and family. His primary ambition is to complete a memoir that weaves together his personal
    journey with the broader story of African‑American experiences in Florida. He wants to catalogue his family’s genealogy and donate the records to the local historical society, preserving cultural memory
    for future generations. Darryl also aims to expand his volunteer role at the senior center, leading small discussion groups on local history and encouraging intergenerational dialogue. Keeping his health
    and independence intact is a practical goal that underpins all his other aspirations.
