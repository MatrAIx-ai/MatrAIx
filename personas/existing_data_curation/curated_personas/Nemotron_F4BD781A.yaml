  career_goals: 'Nannette aims to transition into an IT management role within the next three to five years, seeking to lead a small team that supports both local businesses and community organizations
    in Caledonia County. She plans to earn industry certifications such as CompTIA Security+, Cisco CCNA, and Microsoft Certified: Azure Fundamentals to deepen her networking and cloud expertise. Long‑term,
    she envisions launching a freelance consulting practice that offers cybersecurity assessments, network design, and tech education workshops for seniors and youth in her hometown. She also hopes to serve
    as a mentor for women entering STEM fields, using her talkative personality to inspire and advocate for greater diversity in tech.'
