  career_goals: Alyssa aims to transition from front‑line driving to a leadership role within the transportation industry. Her short‑term goal is to become a fleet supervisor, overseeing driver schedules,
    safety programs, and vehicle maintenance while still maintaining a flexible schedule to spend time with her family. Long‑term, she envisions launching a family‑owned boutique trucking company that emphasizes
    sustainable logistics and community engagement, such as sponsoring local art festivals and offering mentorship programs for women entering the trucking field. She also hopes to develop a training curriculum
    that combines safe driving practices with customer service excellence, leveraging her curiosity and love for unconventional thinking to innovate driver education.
