personas:
  professional: Johanna Millan, a seasoned 59-year-old educator, blends three decades of elementary and middle school teaching with a pragmatic curiosity, designing bilingual curricula and mentoring new
    teachers while preparing to step into a district curriculum coordinator role that will champion culturally responsive STEM and language enrichment programs.
  sports: Johanna Millan enjoys leisurely hikes on Hill Country trails, participates in a local senior walking club that meets after the Granbury high school football games, and follows the Dallas Cowboys
    and Texas Rangers with a proud seasonal loyalty.
  arts: Johanna Millan immerses herself in contemporary literature by authors such as Juan Rulfo and Elena Poniatowska, captures the region’s historic adobe architecture through her DSLR, and shares spirited
    discussions in a small book club that often references classic films by Guillermo del Toro and the vibrant mural art of local festivals.
  travel: Johanna Millan prefers thoughtfully planned road trips, having explored Santa Fe’s art scene, the Hill Country vineyards, and a memorable family reunion in Oaxaca, while dreaming of leisurely
    mornings strolling the gardens of Seville and the rice paddies of Chiang Mai.
  culinary: Johanna Millan delights in preparing authentic dishes like mole poblano, tamales de hoja, and chiles en nogada, skillfully balancing traditional corn masa with modern cooking gadgets, and often
    pairs these meals with fresh nopales and locally sourced tomatillos from her garden.
  core: Johanna Millan is a diligent educator‑turned‑curriculum strategist whose love for bilingual storytelling, garden‑grown flavors, and methodical planning shapes a quiet yet purposeful life marked
    by thoughtful routines, occasional indulgent desserts, and a steadfast commitment to community.
background:
  cultural: Johanna’s Mexican roots are a cornerstone of her identity, influencing her language, culinary tastes, and community involvement. Raised in a bilingual household, she seamlessly navigates both
    Spanish and English, which enriches her teaching of language arts and supports her commitment to bilingual education. She celebrates traditional holidays such as Día de los Muertos and Mexican Independence
    Day, often sharing stories and recipes with her students and neighbors. In Granbury, she participates in local cultural festivals, collaborates with the Hispanic community to promote cross‑cultural
    understanding, and maintains strong ties to family traditions that emphasize respect, perseverance, and communal responsibility.
attributes:
  skills: '[''Curriculum design'', ''Differentiated instruction'', ''Classroom management'', ''Bilingual education'', ''Educational technology integration'', ''Assessment and data analysis'', ''Mentoring
    new teachers'', ''Parent‑teacher communication'', ''Project‑based learning'']'
  hobbies: '[''Reading contemporary Mexican literature'', ''Cooking traditional Mexican dishes'', ''Gardening native Texan and Mexican plants'', ''Walking the Hill Country trails'', ''Participating in a
    small book club'', ''Volunteering at the local community center for ESL tutoring'', ''Photography of nature and historic architecture'', ''Practicing yoga and meditation'', ''Genealogy research'']'
  career_goals: Looking ahead, Johanna aims to transition into a curriculum coordinator role within her district, where she can shape bilingual programs and champion culturally responsive teaching. She
    is passionate about creating a sustainable after‑school STEM and language enrichment program for the Granbury community, leveraging her curiosity for new ideas while grounding initiatives in practical
    feasibility. As she approaches retirement, she envisions a mentorship‑focused part‑time position, guiding emerging educators and volunteering her expertise to adult ESL classes at the local community
    center. Her long‑term ambition is to leave a lasting legacy of inclusive, high‑quality education that reflects both her Mexican heritage and the needs of her Texas students.
