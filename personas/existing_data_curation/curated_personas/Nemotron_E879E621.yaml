  career_goals: Kera envisions a stable, community‑focused career. She aims to graduate high school with strong grades, earn a scholarship, and pursue a degree in education or nursing. Her short‑term goal
    is to become a certified teacher’s aide or a youth mentor at her local community center, where she can blend her organizational strengths with her desire to support peers. Long‑term, she aspires to
    be a high school teacher or a school counselor, providing guidance and stability to younger students while serving as a positive role model in Talladega.
