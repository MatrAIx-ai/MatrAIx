  hobbies: '[''Vegetable gardening'', ''Jigsaw puzzles'', ''Crossword puzzles'', ''Historical biography reading'', ''Solo kayaking on the Delaware River'', ''Precision baking'', ''Small book club participation'',
    ''Amateur nature photography'']'
  career_goals: Lilly aims to move into a supervisory role within the county's recreation department, targeting the position of Recreation Program Manager within the next three years. She plans to earn
    an Associate's degree in Recreation Management and complete the Certified Park and Recreation Professional (CPRP) credential to bolster her qualifications. Her long‑term ambition is to design a structured,
    evidence‑based after‑school program that blends physical activity with academic enrichment for underserved youth in Newark. She is motivated by the prospect of leading a small team, championing data‑driven
    program improvements, and establishing measurable community health outcomes.
