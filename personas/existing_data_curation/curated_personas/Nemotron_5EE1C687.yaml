  hobbies: '["Line Dancing", "Cooking (Southern & International Cuisine)", "Gardening", "Book Club", "Community Volunteering", "Traveling to Cultural Festivals", "Board Game Nights", "Local Theater Attendance",
    "Church Choir"]'
  career_goals: Glenda aims to modernize the hospitality curriculum by integrating experiential learning and digital tools, creating flexible pathways for adult learners balancing work and study. She aspires
    to earn a master's degree in higher education leadership to qualify for administrative roles such as program director or dean. Glenda wants to mentor junior faculty and develop a formal mentorship program
    within her college. She seeks recognition as a Texas Higher Education Faculty of the Year and plans to expand community outreach by establishing free workshops for local service‑industry workers, enhancing
    workforce development in Houston.
