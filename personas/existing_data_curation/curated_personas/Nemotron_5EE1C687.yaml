personas:
  professional: Glenda Schonberg, a veteran community‑college instructor in hospitality and tourism, uses three decades of adult‑education expertise—curriculum design, blended‑learning technology, and hands‑on
    industry insight—to build structured yet adaptable programs, and they channel their sociable, outgoing energy into lively classroom debates and collaborative projects.
  sports: Glenda Schonberg enjoys low‑impact fitness through weekly line‑dance nights, occasional pickleball matches at the local community center, and cheering for the Houston Astros, Rockets, and Texans,
    and they blend social camaraderie with staying active during the milder Texas seasons.
  arts: Glenda Schonberg engages with the arts by performing in her church choir, attending productions at Theatre Under the Stars, and discussing works by authors like Chimamanda Ngozi Adichie and August
    Wilson at her book club, while they keep a playlist of Stevie Wonder and Beyoncé for inspiration.
  travel: Glenda Schonberg prefers flexible, group‑oriented trips that balance cultural immersion with comfort, having explored Austin’s live‑music scene, New Orleans’s Mardi Gras celebrations, and Oaxaca’s
    culinary festivals, and they dream of a slow‑paced road trip through the Texas Hill Country to sample local wineries while staying within a modest retirement budget.
  culinary: Glenda Schonberg, an enthusiastic home cook, blends Southern staples like fried chicken and jambalaya with global flavors such as Pad Thai and shakshuka, skillfully using fresh rosemary, cilantro,
    and garden‑grown tomatoes, and they love hosting potluck dinners where each dish tells a story.
  core: Glenda Schonberg is a sociable, structure‑loving educator who balances a passion for line dancing, community cooking, and modest financial spontaneity, while occasionally letting disorganization
    slip into their schedule, and they often rely on a reminder app to stay on track.
background:
  cultural: Glenda Michelle Schonberg descends from German‑American ancestors who settled in Texas in the early 20th century. Her family maintained traditions such as Oktoberfest celebrations and a fondness
    for German pastries, while also embracing the warm hospitality and community focus typical of Houston’s Southern culture. Raised in a modest, middle‑class household, she grew up attending a local Lutheran
    church, which shaped her values of service and community involvement. Living in Houston for most of her adult life, she has been influenced by the city’s multicultural vibrancy, blending her German
    heritage with Texan customs, Southern cuisine, and the diverse artistic scene of the area.
attributes:
