  career_goals: She plans to earn her GED within the next year, then enroll in a community college program in marketing or communications. Velma hopes to land a role as a social-media coordinator for a
    local nonprofit or small business, leveraging her creativity and community-building skills. In the long term she dreams of launching her own youth-focused event planning and digital media boutique that
    blends her love for group activities with practical marketing expertise.
