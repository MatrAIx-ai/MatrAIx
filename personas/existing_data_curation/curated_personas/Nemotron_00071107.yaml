personas:
  professional: Velma Soto is a budding social‑media coordinator and community event planner whose knack for reading social cues, creative flair with TikTok videos, and love of group dynamics drive her
    freelance gigs, while her relaxed attitude toward deadlines sometimes leads to last‑minute scrambles.
  sports: Velma Soto spikes for the Glendale Heights Community League volleyball team during spring, follows the Chicago Bulls passionately year‑round, and keeps her fitness by mixing high‑energy hip‑hop
    dance practices with occasional pick‑up basketball games, though she often pushes herself competitively in team drills and occasionally skips cooldowns.
  arts: Velma Soto channels her creative energy into TikTok choreography inspired by Beyoncé and Megan Thee Stallion, while she unwinds watching Lin‑Manuel Miranda’s musical numbers and Key & Peele’s sketch
    comedy, and she frequently sketches graphics in Canva using color palettes reminiscent of Billie Eilish’s album art.
  travel: Velma Soto prefers spontaneous weekend getaways over meticulous itineraries, often hopping on a train to Chicago’s Navy Pier or driving with friends to Lake Geneva for a mix of lake‑side relaxation
    and impromptu street‑food hunts, while dreaming of a future backpacking trip to Seoul’s K‑pop hotspots once she saves enough from her part‑time gigs.
  culinary: Velma Soto gravitates toward bold street‑food flavors, regularly whipping up quick avocado‑toast‑style breakfast bowls with feta cheese and sriracha, experimenting with upcycled cauliflower‑crust
    pizza topped with mozzarella and pineapple, and treating herself to late‑night gaming sessions over spicy chicken ramen and tacos al pastor from the local taquería.
  core: Velma Soto blends a restless social‑butterfly vibe with a habit of last‑minute hustle, turning every TikTok trend into a DIY project while juggling impulsive spending and occasional procrastination.
background:
  cultural: Velma was raised in a middle-class White family in Glendale Heights, a suburban community in DuPage County, Illinois. Her upbringing reflects typical Midwestern values of friendliness, community
    involvement, and self-reliance, while also exposing her to the diverse cultural offerings of nearby Chicago. Family traditions include holiday celebrations like Thanksgiving, Fourth of July fireworks,
    and attending the local county fair, and she grew up with a mix of traditional American customs and contemporary youth culture.
