personas:
  professional: Justo Garza is a seasoned sales leader in the oil‑field equipment sector who supervises a team of 15‑20 reps, leverages Salesforce and advanced Excel dashboards to drive data‑driven revenue
    forecasts, and uses their empathetic listening and balanced curiosity to blend practical metrics with innovative coaching while navigating high‑stress periods with a cooperative, detail‑oriented style.
  sports: Justo Garza enjoys a weekly pickup soccer match with his teenage son and the Ector County Soccer Club, rallies behind the Midland High School Mustangs football team and the Dallas Cowboys, and
    finds balance through early‑morning fishing trips on Lake Ector, blending competitive spirit with relaxed outdoor recreation.
  arts: Justo Garza unwinds by painting and sketching scenes inspired by the vibrant murals of Diego Rivera while their soundtrack features Tejano legends like Selena and Norteño icons such as Los Tigres
    del Norte, occasionally slipping in a Carlos Santana guitar solo during DIY projects.
  travel: Justo Garza favors modest road‑trip adventures—spending long weekends exploring Texas Hill Country towns like Fredericksburg, taking family visits to Santa Fe and a memorable cultural immersion
    in Mexico City—while nurturing a dream to experience Buenos Aires' tango scene, balancing careful itinerary planning with spur‑of‑the‑moment fishing excursions on Lake Ector.
  culinary: Justo Garza showcases a solid home‑cooking skill set by expertly grilling carne asada and crafting fresh salsa with cilantro, jalapeños, and lime for family barbecues, while occasionally over‑marinating
    rib‑eyes to the point of sogginess, reflecting a love for bold Tex‑Mex flavors and a penchant for culinary trial‑and‑error.
  core: Justo Garza blends meticulous sales leadership with a heartfelt devotion to family barbecues, community Spanish tutoring, and a cautious optimism that often wrestles with lingering anxiety, all
    while juggling a love of soccer, grilling, and impromptu painting sessions.
background:
  cultural: Justo is a second‑generation Mexican‑American whose parents immigrated from Monterrey, Mexico, and settled in Odessa’s close‑knit Hispanic community. Spanish was spoken at home, and he grew
    up celebrating Catholic holidays, Día de los Muertos, and the annual Fiesta de la Raza, where music, food, and community rituals reinforce his sense of identity. He balances traditional values such
    as familismo and respeto with the broader Texan culture, integrating English and Spanish in both his personal life and professional dealings. This bicultural fluency informs his approach to sales—understanding
    the nuances of Hispanic clients while navigating the predominantly Anglo business environment of West Texas.
attributes:
