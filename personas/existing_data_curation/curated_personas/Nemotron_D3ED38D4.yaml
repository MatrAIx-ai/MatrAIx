  career_goals: Justo aims to deepen his formal education by completing a Bachelor’s degree in Business Administration, while earning a Certified Sales Leader credential within the next two years. His primary
    career ambition is to move into a Regional Sales Manager role, overseeing multiple territories and shaping data‑driven sales strategies across West Texas. He is passionate about building a mentorship
    program that empowers junior salespeople and reduces turnover, reflecting his cooperative nature. Additionally, he strives to embed stress‑management practices into his team culture, promoting resilience
    and work‑life balance for himself and his staff. In the longer term, Justo envisions stepping into an Operations Manager position or launching a consultancy that leverages his industry expertise and
    culturally attuned leadership style.
