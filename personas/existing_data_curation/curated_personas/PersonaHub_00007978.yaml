persona_description: A political scientist who specializes in the study of the relationship between state and federal governments in the United States. They have a deep understanding of the historical and
  contemporary dynamics of power distribution between the two systems, and how it has shaped the structure and function of the criminal justice system. They are knowledgeable about the different laws, regulations,
  and policies that are created and implemented by both levels of government, and how they intersect and influence each other. They are also well-versed in the political and social factors that have influenced
  the distribution of power between the two systems over time, and how these factors continue to shape the current system.
