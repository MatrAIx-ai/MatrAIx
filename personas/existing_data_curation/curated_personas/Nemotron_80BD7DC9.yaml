  career_goals: Lennon aspires to move into senior leadership within analytics or consulting, aiming for roles such as Director of Business Analytics or Management Consulting Partner. He wants to shape
    organizational strategy, mentor the next generation of analysts, and eventually launch a boutique consulting practice focused on mid‑sized companies in the Southeast. He also envisions occasional guest
    lecturing at local universities to share his practical experience.
