personas:
  professional: An analytics leader who blends rigorous quantitative analysis with a hands‑on business mindset, Lennon Bedell leverages statistical modeling, BI, and change‑management expertise to translate
    data into strategy while juggling a relaxed, often disorganized schedule that relies on improvisation and collaborative problem‑solving.
  sports: Lennon Bedell fuels his sociable energy by playing midfield for the local Northside Soccer Club, cheering on Atlanta United in MLS matches, and tackling the Blue Ridge Trail system through the
    Georgia Hiking Club each weekend.
  arts: Lennon Bedell strums acoustic guitar at neighborly gatherings, often covering classics by Johnny Cash and contemporary folk hits from Bon Iver, while acting in community theatre productions of August
    Wilson’s plays and admiring performances by Tom Hanks.
  travel: Lennon Bedell prefers spontaneous, off‑peak escapes, having trekked the Great Smoky Mountains, explored the historic streets of Charleston, and dreamed of a literary pilgrimage to Dublin to walk
    James Joyce’s haunts, all while budgeting trips around modest family obligations.
  culinary: Lennon Bedell delights in cooking Southern‑inspired dishes such as shrimp and grits, collard greens spiced with smoked paprika, and peach cobbler, wielding his well‑seasoned cast‑iron skillet
    and sourcing fresh peas and sweet potatoes from the local farmers market.
  core: Lennon Bedell is a data‑driven, community‑oriented analyst who juggles a love for hiking, guitar, and theater with a laid‑back, sometimes chaotic approach to life, turning curiosity into practical
    impact while never missing a chance to mentor the next generation.
background:
  cultural: Lennon grew up in a middle‑class suburban environment in the American South, shaped by Southern hospitality, a strong sense of community, and a pragmatic work ethic. While his ethnic background
    is white, his cultural identity reflects a blend of broader American values—such as individualism and curiosity—with regional traditions that prioritize outdoor recreation, casual social gatherings,
    and an appreciation for Southern culinary and music heritage.
