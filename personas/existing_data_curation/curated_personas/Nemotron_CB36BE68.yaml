  hobbies: '["Gardening", "Historical Non-fiction Reading", "Cooking Traditional Recipes", "Walking Along River Trails", "Small Book Club", "Volunteer Literacy Programs"]'
  career_goals: Her primary career goal is to ensure the long‑term stability and growth of her company while preserving its core values. She aims to embed sustainable practices, strengthen succession planning,
    and mentor emerging female leaders within the organization. Over the next five years she plans to launch a community‑focused initiative that leverages the company's technical expertise to support local
    education and workforce development in Pittsburgh. Ultimately, she seeks a graceful transition toward retirement, leaving a well‑structured, resilient organization behind.
