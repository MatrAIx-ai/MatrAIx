personas:
  professional: Elisa Chari, a 44‑year‑old HVAC, electrical and plumbing specialist, leverages her hands‑on problem‑solving knack and vivid artistic eye to diagnose and repair systems while improvising
    decorative solutions that delight clients, and she uses her sociable, talk‑ative nature to mentor junior techs and build community trust.
  sports: Elisa Chari enjoys playing pick‑up basketball at the local recreation center during summer, volunteers as an assistant coach for the Eastside United community soccer club in the fall, and roots
    for the Chicago Bulls, Chicago Cubs and Chicago White Sox, while preferring low‑impact yoga sessions to keep her flexible for fieldwork.
  arts: Elisa Chari merges her love for painting, mixed‑media and jewelry crafting with an avid appreciation for soul legends like Aretha Franklin and modern jazz saxophonist Marcus Finch, often quoting
    Basquiat while curating vinyl playlists that mix Erykah Badu and Marvin Gaye, and she regularly performs improv sketches at the community theater with fellow artists.
  travel: Elisa Chari prefers spontaneous weekend getaways to culturally rich neighborhoods, such as the historic Old Town district nearby or the vibrant French Quarter in New Orleans, while maintaining
    a bucket list that includes Oaxaca’s mercados, the blue streets of Chefchaouen, Morocco, and a road trip along the Pacific Coast Highway, all with a flexible itinerary that leaves room for impromptu
    art fairs.
  culinary: Elisa Chari’s palate swings from smoky grilled trout seasoned with rosemary and lemon zest to hearty soul‑food stews like braised collard greens with smoked paprika, and she enjoys crafting
    herb‑infused jam and serving fresh garden salads topped with feta and pomegranate seeds at her potluck gatherings, though she often burns the edges of her experimental mixed‑media pastries.
  core: Elisa Chari blends a tradesman's precision with an artist's imagination, turning everyday repairs into pocket‑sized galleries, while juggling a habit of double‑booking community events and a relentless
    curiosity for anything novel.
background:
  cultural: Elisa’s cultural background is rooted in African‑American traditions of Southern California, shaped by a close‑knit extended family, church gatherings, and community solidarity. Growing up in
    San Bernardino, she internalized a strong sense of mutual aid and creativity, celebrating events such as Juneteenth and Black History Month while embracing the region’s multicultural vibrancy. These
    influences inform her emphasis on community service, rhythmic music, storytelling, and a preference for turning practical work into opportunities for artistic expression.
