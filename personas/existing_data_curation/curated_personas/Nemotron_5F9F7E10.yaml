  career_goals: Elisa aims to earn a certified journeyman credential in HVAC or electrical work, positioning herself for a foreman or site‑supervisor role where she can lead and mentor a diverse crew. She
    also dreams of launching a small community‑focused maintenance business that blends reliable service with creative, customized installations—turning ordinary repairs into opportunities for aesthetic
    expression. Additionally, she hopes to develop a mentorship program for local youth, sharing her trade skills and encouraging pathways into skilled professions.
