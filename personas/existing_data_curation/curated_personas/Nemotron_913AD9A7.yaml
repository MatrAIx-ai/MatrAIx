personas:
  professional: Iris Churchill is a seasoned production equipment specialist who leverages fifteen years of hands‑on machining, conveyor maintenance, and lean‑manufacturing expertise to devise quick improvisational
    fixes on the shop floor, while they embrace a relaxed scheduling style and a competitive drive that fuels ambitions to become a shift lead, earn a Six Sigma Green Belt, and eventually launch a consulting
    firm for regional manufacturers.
  sports: Iris Churchill stays fit by hitting the trails with the Hill Country Hikers, competing in marksmanship events at the Wise County Shooting Club, and cheering for the Dallas Cowboys and Texas Rangers,
    while their competitive streak translates into keeping a personal best on the range and setting incremental hiking distance goals each summer.
  arts: Iris Churchill finds creative balance in evenings listening to the folk‑rock of Tyler Childers, rereading David McCullough’s histories, admiring Frederic Remington’s Western canvases at the local
    museum, and occasionally attending the Wise County Community Theatre’s productions of classic plays starring local talent, as these artistic touches offer a quiet counterpoint to their methodical work
    life.
  travel: Iris Churchill prefers short, flexible road trips that slot into production schedules, cutting the drive to Fredericksburg for wine tasting, hiking the rim of Big Bend, and spending a weekend
    in Santa Fe to soak up the art scene, while dreaming of a longer adventure to Patagonia’s glaciers once the consulting venture stabilizes their income.
  culinary: Iris Churchill enjoys a solid home‑cooking skill set, frequently firing up a custom‑built smoker to slow‑cook brisket seasoned with brown sugar, smoked paprika, and garlic, while also whipping
    up homemade carne asada tacos with fresh cilantro, lime, and jalapeño salsa verde, savoring the blend of smoky, spicy flavors that echo their love of Tex‑Mex cuisine.
  core: Iris Churchill blends a pragmatic, hands‑on work ethic with a quietly competitive streak, thriving on DIY projects and improvisation while they often let paperwork pile up and rely on spontaneous
    bursts of focus to meet both personal and professional goals.
background:
  cultural: Iris grew up in the rural parts of Wise County, Texas, in a predominantly white, working‑class community with deep roots in agriculture and small‑scale manufacturing. The local culture emphasizes
    self‑reliance, a strong work ethic, and practical problem‑solving, values that echo throughout her life. Though she was raised within a modest Methodist tradition, she now identifies more with the region’s
    informal community networks—county fairs, local sports events, and neighborhood gatherings. The blend of Southern hospitality and the independent, frontier spirit of West Texas shapes her pragmatic
    outlook, while exposure to nearby Hispanic influences adds an appreciation for Tex‑Mex cuisine and bilingual interactions. This cultural mix informs her sense of duty to family, her preference for modest,
    close‑knit social circles, and her determination to achieve personal stability.
attributes:
  skills: '["Machinery operation", "Forklift certification", "Quality inspection", "Lean manufacturing (5S, Kaizen)", "Basic PLC troubleshooting", "CNC basics", "Equipment maintenance", "OSHA safety compliance",
    "Inventory management", "Process documentation"]'
  hobbies: '["Woodworking", "DIY electronics (Arduino, Raspberry Pi)", "Birdwatching", "Hiking", "Reading non-fiction (history, technology)", "Listening to podcasts", "Marksmanship competitions", "Strategy
    board games"]'
  career_goals: Iris hopes to leverage her production expertise into a supervisory position within the next three years, aiming to become a shift lead or process‑improvement coordinator. She plans to earn
    a Six Sigma Green Belt and complete her associate’s degree in industrial technology, which would qualify her for a production manager role. Ultimately, she aspires to combine her practical skills and
    competitive drive to start a small consulting firm that helps regional manufacturers improve efficiency while offering her a more flexible schedule after her separation.
