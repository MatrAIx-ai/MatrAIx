  career_goals: Exor aims to transition from an independent sales agent to the owner of a boutique brokerage focused on the El Paso border market. In the next five years, he plans to recruit and mentor
    a small team of agents, earn the Certified Residential Specialist designation, and expand his services to include cross‑border residential investment advice. He also wants to develop a niche in sustainable
    home sales, incorporating eco‑friendly property features into his listings. Financially, he targets a steady increase in annual commission volume that will provide the stability to support his children’s
    education and allow for early retirement. Beyond profit, he aspires to give back to the community by sponsoring affordable‑housing workshops and volunteering with local homeless outreach programs.
