personas:
  professional: Micah Lattimore, a 33‑year‑old event coordinator with a knack for digital photography and graphic design, channels their methodical planning, reliable execution, and sociable energy into
    curating immersive cultural events that blend community art shows with strategic partnerships across Naples.
  sports: Micah Lattimore joins the Harbor Beach Volleyball Club for weekly competitions, attends group HIIT classes at a downtown studio, follows the Tampa Bay Buccaneers and Miami Heat on game nights,
    and hikes the Everglades during off‑season weekends to stay fit and connected to nature.
  arts: Micah Lattimore frequents the Naples Museum of Art and The Baker Museum, draws creative inspiration from Ansel Adams’ landscape photography and Georgia O’Keeffe’s vibrant still lifes, captures Florida’s
    coastline in their own digital photos, and eagerly attends live performances by Jack Johnson and the Naples Philharmonic to fuel their artistic sensibilities.
  travel: Micah Lattimore plans weekend getaways to cultural hotspots like New Orleans for Mardi Gras, the Venice Biennale, and Key West’s art festivals, balances spontaneous road trips with careful budgeting
    using Airbnb, and dreams of a future immersive retreat in the Pacific Northwest to merge travel with collaborative art workshops.
  culinary: Micah Lattimore enjoys experimenting in the kitchen, often preparing grilled mahi‑mahi with mango salsa, citrus‑infused ceviche, and homemade gnocchi after attending cooking workshops that teach
    regional flavors and fresh, seasonal ingredients.
  core: Micah Lattimore is a curiosity‑driven, meticulously organized socialite who blends a passion for coastal photography, community arts, and beach volleyball with a habit of over‑booking their calendar
    and occasionally neglecting sleep.
background:
  cultural: Micah grew up in a middle‑class, predominantly white Anglo‑American household in the Midwest, where family gatherings and community events emphasized courtesy, hard work, and a love for traditional
    American holidays. After moving to Naples, Florida, he was drawn by the city’s vibrant art scene, coastal lifestyle, and multicultural atmosphere. The diverse influences of Southwest Florida, including
    Mediterranean-inspired architecture, Latin American cuisine, and a mix of retirees and tourists, have broadened his cultural perspective. While he identifies with mainstream white American cultural
    norms, his experiences in a tourist‑rich environment have fostered an open‑minded, collaborative outlook and an appreciation for varied artistic expressions.
