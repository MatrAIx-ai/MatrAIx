  career_goals: Micah aims to transition from informal volunteer work into a full‑time role in arts administration or cultural event management within the Naples community. He plans to leverage his organizational
    strengths and artistic sensibilities to develop and curate community art programs, collaborate with local galleries and tourism operators, and eventually lead a nonprofit arts organization or launch
    his own boutique event firm focused on immersive cultural experiences. Over the next several years, he also seeks to deepen his expertise in digital media and grant writing to broaden outreach and secure
    sustainable funding for his projects.
