  hobbies: '[''Visiting Art Galleries'', ''Reading Urdu Poetry and Contemporary Fiction'', ''Listening to Hindustani Classical Music'', ''Calligraphy (Nastaliq)'', ''Balcony Gardening'', ''Playing Chess'',
    ''Solving Crossword Puzzles'', ''Volunteer Cultural Advisor'', ''Traveling to South Asia for Historical Research'', ''Attending Museum Lectures'']'
  career_goals: Though officially retired, Adeel aims to solidify his legacy by publishing a comprehensive monograph on Mughal miniature painting and its modern reinterpretations. He aspires to mentor emerging
    curators and scholars through a yearly fellowship at a Washington DC museum, fostering rigorous scholarship and innovative exhibition design. He seeks to digitize and publicly share his personal collection
    of family photographs and rare manuscripts, creating an online archive for researchers worldwide. Adeel also dreams of establishing a scholarship fund for South Asian students pursuing arts and humanities,
    reflecting his competitive drive to inspire excellence. Additionally, he hopes to curate a traveling exhibition that juxtaposes traditional South Asian art with contemporary interdisciplinary works,
    challenging conventional narratives.
