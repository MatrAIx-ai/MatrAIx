personas:
  professional: Adeel Afroz, a retired curator and South Asian art historian in Washington, DC, leverages meticulous archival research, bilingual translation, and grant‑writing expertise to design rigorous
    exhibitions, while their competitive edge drives them to mentor rising curators through a structured fellowship program.
  sports: Adeel Afroz enjoys low‑impact fitness, joining a senior walking club that meets at the National Mall and follows the Washington Capitals and DC United games, faithfully attending home matches
    when possible, though they have a competitive nature that leads them to occasional heated debates over refereeing decisions.
  arts: Adeel Afroz immerses themselves in the vibrant DC gallery scene, and they regularly study works by Ahmad Gulgee, contemporary diaspora artists like Shirin Neshat, and perform original Urdu poetry
    in Nastaliq calligraphy inspired by classical Hindustani ragas, shaping their identity through layered artistic dialogues.
  travel: Adeel Afroz plans travel with meticulous itineraries, favoring culturally rich trips to Lahore’s historic forts, the Taj Mahal, and occasional European museum tours, and they balance budget constraints
    with a desire to document each visit in a personal travel journal.
  culinary: Adeel Afroz prefers aromatic home‑cooked meals, frequently preparing herb‑infused biryani, mint‑chutney, and fragrant jasmine tea, while cultivating basil and cilantro on a balcony garden, yet
    they occasionally over‑spice dishes in a quest for perfect flavor balance.
  core: Adeel Afroz is a curious, methodical 78‑year‑old scholar whose love of art, disciplined finances, and occasional stubbornness drive them to lead a life of quiet ambition and eccentric devotion to
    cultural preservation.
background:
  cultural: Adeel’s cultural background is rooted in a South Asian Muslim family, with his parents having migrated from Pakistan in the 1950s. Raised in a bilingual household, he grew up fluent in Urdu
    and English, absorbing the rich literary traditions of ghazal and Qawwali while also engaging with American educational values. His formative years were marked by a strong emphasis on education, respect
    for elders, and communal celebrations of Eid, Ramadan, and cultural festivals like Basant. After moving to Washington, DC in his early thirties, Adeel integrated into the city’s diverse South Asian
    diaspora, contributing to community arts programs and interfaith dialogues. He continues to draw inspiration from his heritage—its emphasis on poetry, visual storytelling, and hospitality—while embracing
    the pluralistic, innovative spirit of the capital.
