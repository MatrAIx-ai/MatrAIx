personas:
  professional: Weston Utt, a veteran project manager in agri‑technology and manufacturing, blends meticulous cost‑benefit analysis with a relaxed, sometimes disorganized scheduling style, using both waterfall
    and Agile‑Scrum frameworks to drive data‑rich outcomes while quietly mentoring rural teams.
  sports: Weston Utt, an avid fisherman at Clear Lake and birdwatcher in the Iowa State University Experimental Forest, is also a loyal supporter of the Iowa Hawkeyes football team and the Iowa State Cyclones
    basketball squad, joining the local senior baseball league for occasional weekend games.
  arts: Weston Utt, who plays acoustic guitar in an after‑work music circle, finds solace in the folk sounds of Bob Dylan, John Prine, and Joan Baez, while their woodworking projects often echo the craftsmanship
    celebrated by American folk artists like Charles W. G. Duff, and they enjoy attending the Des Moines Community Theatre’s small productions.
  travel: Weston Utt prefers low‑key road trips that blend history and nature, such as a weekend drive to Decorah to explore its Norwegian heritage festivals, a fall visit to the Great Smoky Mountains for
    birdwatching, and a yearly pilgrimage to the Iowa State Fair where they soak in agricultural innovations and sample local foods.
  culinary: Weston Utt enjoys farm‑to‑table cooking, regularly preparing heirloom tomato bruschetta, roasted beet salads with goat cheese, and smoked trout caught at Clear Lake, relying on fresh garden
    herbs like basil, dill, and rosemary to season their dishes.
  core: Weston Utt is a pragmatic yet curious project veteran who balances disciplined data‑driven work with relaxed, solitary hobbies, all while gently nudging themselves toward mentorship and sustainable
    consulting.
background:
  cultural: Weston grew up in a small town near Des Moines in the early 1970s, the son of a high school teacher and a family‑owned corn farm. Immersed in the values of Midwestern community, self‑reliance,
    and practicality, his upbringing emphasized hard work, modesty, and a strong sense of local civic responsibility. He attended Iowa State University in Ames, earning a B.S. in Business, where he was
    involved in the university’s Project Management Club and took elective courses in agricultural economics. The cultural fabric of central Iowa—characterized by close‑knit community gatherings, county
    fairs, and a deep connection to the land—has shaped his worldview, fostering a balanced appreciation of tradition and openness to innovation. While identifying as white and part of the broader American
    cultural mosaic, Weston acknowledges the region’s diverse agricultural heritage and strives to incorporate inclusive practices in his professional collaborations.
attributes:
  skills: '["Project Planning & Scheduling", "Budgeting & Cost Management", "Risk Assessment & Mitigation", "Stakeholder Analysis & Communication", "Agile & Scrum Methodologies", "Waterfall Project Frameworks",
    "Change Management", "Process Improvement & Lean Practices", "Data Analysis & Reporting (Excel, Power BI)", "Negotiation & Conflict Resolution", "Team Leadership & Mentoring", "Procurement & Vendor
    Management"]'
  hobbies: '["Vegetable Gardening", "Reading Historical Non‑Fiction and Technology Journals", "Fishing", "Birdwatching", "Acoustic Guitar Playing in Small Group", "Woodworking and Restoring Vintage Farm
    Tools", "Visiting Local Farmer’s Markets", "Volunteering at Community Library Events"]'
  career_goals: Weston aims to transition from hands‑on project execution to a strategic advisory role within the next five years, positioning himself as a senior PMO consultant for mid‑size agribusinesses
    across the Midwest. He plans to formalize his expertise by attaining a Lean Six Sigma Black Belt and a Certified Scrum Professional credential, enabling him to design hybrid project frameworks that
    blend flexibility with rigorous cost control. Additionally, he is driven to mentor emerging project managers—especially those in rural communities—through workshops and a biannual Project Essentials
    seminar hosted in Ames. Ultimately, Weston envisions establishing a boutique consulting practice that helps local firms adopt sustainable, data‑informed project processes while preserving the practical,
    community‑oriented values that have guided his career.
