personas:
  professional: Wesley Dorricott, a one-year-old, already demonstrates early problem-solving by dismantling plush toys to explore their inner seams, showcasing a budding curiosity for how things work, while
    they resist any imposed schedule, hinting at a future in hands-on design or engineering.
  sports: Wesley Dorricott, a one-year-old, loves the rhythmic flow of movement, attending Tiny Tots Gym at Bright Beginnings where they tumble and crawl, and they proudly wave a miniature New York Knicks
    jersey when the family watches a game together.
  arts: Wesley Dorricott, a one-year-old, is mesmerized by the bright visuals of the Baby Einstein series and hums along to The Wiggles' 'Fruit Salad', while also tapping a tiny xylophone to the simple
    melodies of Mozart, reflecting an early appreciation for unconventional sounds and colors.
  travel: Wesley Dorricott, a one-year-old, experiences travel as sensory adventure, having already explored the nearby botanical garden and enjoyed a beach weekend in Cape Cod, while they gaze curiously
    at pictures of Tokyo, a far-off destination their parents hope to visit as they grow.
  culinary: Wesley Dorricott, a one-year-old, dives enthusiastically into smooth avocado mash and banana oat pancakes, yet stubbornly refuses peas and carrots, preferring the sweet taste of homemade apple
    sauce, and their cooking skill level remains limited to eager self-feeding with a tiny spoon.
  core: Wesley Dorricott, a solitary and curious one-year-old, delights in colorful textures and quiet corners, often sneaking extra nap time and resisting bedtime routines, and they quietly observe the
    world with an open, unconventional mind.
background:
  cultural: Wesley is being raised in a predominantly white, middle‑class family in San Clemente, a coastal city in Orange County, California. The community’s laid‑back beach culture, emphasis on outdoor
    recreation, and proximity to art institutions such as local galleries and museums shape his early exposure to visual arts and nature. His family values independence, quiet reflection, and supports his
    emerging curiosity through visits to the beach, community parks, and occasional trips to cultural events.
