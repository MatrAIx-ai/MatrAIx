persona_description: A poultry veterinarian who specializes in the diagnosis and treatment of diseases in poultry, particularly in the shell gland region of the oviduct. This person is highly trained in
  necropsy examinations and has extensive knowledge of the anatomy and physiology of eggs and the shell gland. They are likely to be involved in the management and treatment of poultry production and are
  familiar with the management conditions, handling, and vaccination practices that can affect egg production and quality. They are also likely to be familiar with the occurrence and causes of various abnormalities
  in eggs, such as soft-shelled eggs, blood spots, and meat spots.
