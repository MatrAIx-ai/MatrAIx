  career_goals: Although retired, Rosana envisions her later years as a period of legacy building and community enrichment. She aims to compile a family cookbook that intertwines traditional Dominican recipes
    with personal anecdotes, ensuring the culinary heritage is passed down to her grandchildren. As a competitive spirit, she plans to enter local cultural cooking contests, hoping to showcase the richness
    of Dominican cuisine. She also aspires to mentor younger members of the Dominican community by leading workshops on event planning and financial stewardship at the Yonkers cultural center. Rosana hopes
    to document her immigrant journey and the resilience of her generation in a memoir, preserving oral histories for future scholars. Finally, she remains committed to expanding her digital fluency, learning
    new platforms to facilitate virtual storytelling sessions for seniors.
