  career_goals: She dreams of growing up to become a children's book illustrator or an animator, using her art to help other kids understand and express strong emotions. Beverly is also fascinated by the
    idea of becoming a museum curator who can bring unconventional ideas to life through interactive exhibits. Her competitive spirit fuels a desire to excel in creative contests, and she hopes someday
    to lead a team of young artists in a community art program. While she is still exploring options, her overarching ambition is to blend her love of art, storytelling, and problem‑solving into a career
    that makes a positive emotional impact.
