personas:
  professional: Beverly Doan, a 7‑year‑old budding illustrator, blends early drawing talent with digital animation on ScratchJr and beginner piano improvisation, and they channel their competitive spirit
    and curiosity into weekly art class projects and LEGO building challenges.
  sports: Beverly Doan plays on the Fort Worth Little League baseball team, kicks the ball with the Fort Worth Soccer Club under‑8 squad, and they cheer loudly for the Dallas Cowboys on Sundays, approaching
    each practice with a competitive edge while sometimes feeling anxious about missing a catch.
  arts: Beverly Doan immerses themselves in the whimsical worlds of Walt Disney films and Dr. Seuss books, practices piano melodies from 'Twinkle Twinkle Little Star', and they draw inspiration from Claude
    Monet's water lilies when experimenting with vibrant color palettes in their own sketches.
  travel: Beverly Doan loves family road trips that whisk them from the bustling Texas State Fair in Dallas to a sun‑kissed weekend camping adventure along the Trinity River, and they dream of exploring
    the Grand Canyon’s vast canyons on a future school field trip.
  culinary: Beverly Doan delights in devouring cheesy macaroni, pepperoni pizza, and crunchy chicken nuggets, while they proudly butter a slice of banana bread at home and sip strawberry‑banana smoothies
    that blend fresh strawberries, banana, and a splash of milk.
  core: Beverly Doan, a fiercely curious 7‑year‑old with a competitive streak, navigates the world through vivid sketches, LEGO battles, and a jittery imagination that flips between exuberant joy and sudden
    waves of anxiety, and they frequently retreat to doodling whenever stress spikes.
background:
  cultural: Beverly was raised in a middle‑class neighborhood of Fort Worth, Texas, where Southern hospitality and Texan pride are part of everyday life. Her family regularly participates in community events
    such as the Fort Worth Stock Show, local library story hours, and the annual Texas State Fair, exposing her to a blend of cowboy heritage, country music, and vibrant local arts. She attends a public
    elementary school that emphasizes both academic achievement and creative expression, and her parents encourage involvement in extracurricular art classes and community service. The cultural environment
    combines traditional American holiday celebrations, a love for outdoor activities in the city’s parks, and a supportive community that values curiosity, independence, and emotional openness.
