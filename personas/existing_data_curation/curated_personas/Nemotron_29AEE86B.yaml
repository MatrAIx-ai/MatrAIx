personas:
  professional: Migdalia Vilchez is a budding LEGO architect who transforms intricate brick sets into towering structures, applying their methodical planning, love for clear rules, and competitive drive
    to perfect each model before bedtime.
  sports: Migdalia Vilchez drills with the Riverdale Rovers youth soccer club every Saturday, favoring organized practices and structured scrimmages, and they root for the Seattle Sounders FC, mirroring
    the team's disciplined play style in their own competitive games on the field.
  arts: Migdalia Vilchez fills sketchbooks with vibrant illustrations inspired by Dr. Seuss’s whimsical characters and colors reminiscent of Van Gogh’s sunflowers, while they sing along to the lively tunes
    of Mariachi Vargas de Tecalitlán and mimic the dance moves of Disney’s 'Coco' soundtrack during family celebrations.
  travel: Migdalia Vilchez prefers carefully planned family trips, delighted by the organized tours at the Grand Canyon and the whimsical rides of Disneyland, and they daydream about exploring the ancient
    ruins of Machu Picchu and the bright streets of Tokyo next summer.
  culinary: Migdalia Vilchez, a budding kitchen helper, proudly chops cilantro, slices jalapeños, and mashes ripe avocados for guacamole, assembles tacos with seasoned beef, shredded cheddar, and fresh
    lime wedges, and enjoys tasting the crunchy corn tortilla shells, though they sometimes forget to wash their hands before handling food.
  core: Migdalia Vilchez is a structured, competitive seven‑year‑old who balances intense puzzle‑building with careful money‑saving, diligent health routines, and a love for organized soccer drills, while
    occasionally worrying about the next challenge.
background:
  cultural: Migdalia grows up in a Mexican‑American household in Fontana, California. Spanish is spoken at home alongside English, giving her bilingual fluency. Her family observes Catholic traditions,
    attending mass and celebrating holidays such as Día de los Muertos, Cinco de Mayo, and upcoming Quinceañera preparations. Community events at the local church and neighborhood festivals reinforce cultural
    ties, with music, dance, and food playing central roles. These traditions shape her values of family unity, respect for elders, and a strong sense of cultural pride while she navigates a diverse Californian
    environment.
attributes:
  skills: '[''Fluent reading (grade‑level)'', ''Basic addition and subtraction'', ''Organizing school supplies'', ''Following daily routines'', ''Puzzle solving (jigsaw, logic puzzles)'', ''Building LEGO
