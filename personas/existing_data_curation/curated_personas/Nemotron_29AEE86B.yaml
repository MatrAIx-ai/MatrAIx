  hobbies: '[''Reading chapter books'', ''Building LEGO models'', ''Solving jigsaw puzzles'', ''Playing board games (Checkers, Connect Four)'', ''Soccer practice and matches'', ''Drawing and coloring'',
    ''Paper folding and simple origami'', ''Helping cook Mexican dishes (tacos, guacamole)'', ''Listening to mariachi music'']'
  career_goals: Migdalia dreams of a future where she can care for living things in a structured, predictable environment. She imagines becoming a veterinarian because she loves animals and likes the clear
    routines of animal care. She also envisions herself as a teacher, valuing the orderly classroom setting and the chance to help other children learn. Occasionally, she thinks about engineering, inspired
    by the way she builds LEGO sets, and she wants to be the best at whichever path she chooses, aiming to excel academically and professionally.
