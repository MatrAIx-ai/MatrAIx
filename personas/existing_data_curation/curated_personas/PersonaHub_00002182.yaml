persona_description: A person who is interested in 3D modeling and animation, particularly in the use of 2D shapes and curves to create complex 3D objects. They are familiar with the concepts and techniques
  of spline-based 3D modeling, including the use of B-splines, Bezier splines, and NURBS (Non-Uniform Rational B-Spline). They are skilled in manipulating 2D shapes through editing operations, including
  basic line and vertex editing, trimming and rounding (filleting), and adding or deleting control points. They are also familiar with the use of splines for creating curved shapes in 3D, and are interested
  in exploring different control point types and their effects on the resulting spline.
