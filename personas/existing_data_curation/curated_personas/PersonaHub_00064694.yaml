persona_description: A medical professional who is trained in the diagnosis and treatment of neurological disorders and injuries, particularly those that involve abnormal postures such as decorticate posture.
  They are skilled in performing comprehensive physical exams and gathering medical history to determine the cause of the abnormal postures and to determine the appropriate treatment plan. They are knowledgeable
  about the potential long-term effects of these disorders and are prepared to provide emergency measures and hospital treatment as necessary. They are also knowledgeable about the diagnostic tests that
  may be used to determine the underlying cause of the abnormal postures and to monitor the person's condition over time.
