personas:
  professional: Terri Groh, a 39‑year‑old social worker in rural North Carolina, blends a humanities foundation with trauma‑informed case management, program evaluation, and grant writing, leveraging her
    curiosity and competitive drive to develop evidence‑based, arts‑integrated mental‑health services while deftly navigating complex bureaucratic systems.
  sports: Terri Groh, a 39‑year‑old outdoor enthusiast, spends weekends hiking the trails of Eno River State Park, supports the Charlotte Hornets and the UNC Tar Heels women's basketball team, and joins
    a local 5K run organized by the community garden, blending a competitive spirit with a love for nature.
  arts: Terri Groh, a 39‑year‑old aficionado of historical fiction and poetry, frequents productions at the Durham Playhouse, enjoys folk‑music festivals headlined by The Avett Brothers, and explores pottery
    on weekends, while immersing herself in works by Hilary Mantel, Mary Oliver, and Tony Kushner to balance work stress.
  travel: Terri Groh, a 39‑year‑old who plans travel with a mix of careful budgeting and spontaneous weekend getaways, has trekked the Blue Ridge Mountains, attended literary festivals in Edinburgh, explored
    Charleston’s historic district, and dreams of a cultural immersion in Kyoto’s Zen gardens.
  culinary: Terri Groh, a 39‑year‑old garden‑to‑table cook, delights in preparing Southern staples like shrimp and grits seasoned with garden‑grown basil, layering roasted beets and goat cheese into salads,
    and occasionally indulging in spicy Thai green curry for a bold culinary escape.
  core: Terri Groh, 39, balances her demanding social‑work career and a competitive edge with a penchant for creative retreats, meticulous budgeting, anxiety‑driven self‑care routines, and a love for hiking
    and pottery, while occasionally slipping into worry‑filled rumination.
background:
  cultural: Terri grew up in a small‑town Southern community in North Carolina, where her family emphasized modesty, self‑reliance, and service to neighbors. Her upbringing was shaped by Appalachian folk
    traditions, church gatherings, and a strong appreciation for local history and the natural landscape of the Piedmont region. While identifying with a predominantly white, rural cultural milieu, she
    values inclusivity and cultural competence, drawing on her humanities education to broaden her perspective and to honor the diverse experiences of the clients she serves.
attributes:
  skills: '[''Case Management'', ''Trauma-Informed Counseling'', ''Program Evaluation'', ''Community Outreach'', ''Advocacy'', ''Grant Writing'', ''Interdisciplinary Collaboration'', ''Crisis Intervention'',
