  hobbies: '[''Reading historical fiction'', ''Attending community theater'', ''Gardening'', ''Hiking in the Eno River State Park'', ''Pottery'', ''Yoga'', ''Journaling'', ''Volunteering at the local community
    garden'', ''Exploring folk music festivals'']'
  career_goals: Terri aims to advance into a supervisory role within the regional mental‑health system, eventually becoming a program director who integrates arts‑based therapeutic approaches into community
    services. She plans to earn her MSW and become a licensed clinical social worker, securing funding for innovative pilot projects that address trauma and substance‑use challenges in rural North Carolina.
    Her long‑term ambition is to influence state policy on child welfare and to mentor emerging social workers, fostering a culture of evidence‑based practice and compassionate advocacy.
