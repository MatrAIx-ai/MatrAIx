personas:
  professional: Hailey Herbert, a three‑year‑old pre‑school explorer, constructs daily schedules of playtime and nap, meticulously sorting building blocks by shape while also thriving on the surprise of
    an impromptu bubble‑blowing session; they embody a budding balance of structure and flexible imagination.
  sports: Hailey Herbert, a three‑year‑old who adores the local junior soccer club’s Saturday practices and cheers for the hometown minor league baseball team the Riverside Rookies, spends afternoons on
    the playground climbing frames, and prefers free‑play tag over structured drills; they reflect a spontaneous yet community‑oriented approach to fitness.
  arts: Hailey Herbert, a three‑year‑old with a vivid imagination, spends hours drawing colorful pictures with Crayola crayons, passionately sings along to the songs of Bluey and reenacts scenes with Elmo
    from Sesame Street, while also attending a weekly toddler dance class that fuels their love for rhythm and storytelling; they blend creative expression with playful performance.
  travel: Hailey Herbert, a three‑year‑old adventurer, enjoys short family trips to the nearby zoo and the seaside boardwalk, feels safest when seated in a car seat with a favorite stuffed animal, and dreams
    of seeing the giant pandas at the city’s wildlife sanctuary; they balance curiosity with a need for routine.
  culinary: Hailey Herbert, a three‑year‑old foodie, prefers classic chicken nuggets with ketchup, mac and cheese, and apple slices, delights in helping whisk batter for pancakes, and asks for extra strawberry
    jam on their toast; they showcase a simple palate with a budding enthusiasm for kitchen participation.
  core: Hailey Herbert blends a love for predictable routines with spontaneous bursts of play, worries about sudden changes, and navigates daily life with endearing curiosity, occasional tantrums, and a
    growing sense of independence; they embody a uniquely balanced toddler perspective.
background:
  cultural: Hailey is raised in a white Southern family in Douglas, Georgia. Her upbringing includes regular church attendance, family gatherings centered around Southern comfort foods like biscuits and
    fried chicken, participation in community events such as the Coffee County Fair, and exposure to local traditions like storytelling and folk music.
