personas:
  professional: Jason Donovan, a 42‑year‑old veteran police officer in the Hudson Valley, they blend forensic expertise, GIS‑based crime mapping, and a data‑driven mindset with a genuine love for community
    art, using disciplined organization and curiosity to lead investigative teams while championing de‑escalation and mentorship.
  sports: Jason Donovan, a true fan of the New York Knicks and New York Yankees, they run with a local weekend club preparing for the Hudson Valley Marathon, play pickup basketball at the community center,
    join a seasonal indoor soccer league in winter, and occasionally hit the Catskills for downhill skiing.
  arts: Jason Donovan, an avid visitor to Storm King Art Center and the Dia:Beacon museum, they draw inspiration from contemporary creators like Banksy, Shepard Fairey, and regional painter Susan Pettes,
    play acoustic guitar at open‑mic nights, curate street‑scene photo exhibits for the community theater, and volunteer as a mentor for the local youth art program.
  travel: Jason Donovan, balancing structured itineraries with spontaneous escapes, they often road‑trip to the Finger Lakes for wine tastings, hike the Adirondacks in summer, dream of an art pilgrimage
    to Barcelona and Florence, and enjoy quick weekend stays in Burlington, Vermont, to explore its craft‑brew scene.
  culinary: Jason Donovan, a home‑cooking enthusiast, they enjoy preparing farm‑to‑table meals featuring Hudson Valley apples in homemade apple crisp, mastering shakshuka, grilled salmon, and occasional
    beef brisket slow‑cooked on weekends, savor a good espresso, smoked Gouda, and craft IPA, though they sometimes forget to defrost meat in time.
  core: Jason Donovan, a disciplined yet curious police leader, they meld forensic precision with a love for art, community, and a modestly adventurous spirit.
background:
  cultural: Jason is a 42‑year‑old white male raised in the Hudson Valley region of New York. His family’s roots trace back to Irish and German immigrants who settled in the area in the late 19th century.
    Growing up in the suburban community of Wappingers Falls, he experienced a blend of small‑town close‑knit values and easy access to the cultural vibrancy of nearby New York City. He attended a public
    high school where he participated in varsity sports and the art club, fostering an early balance between discipline and creativity. After earning a bachelor's degree in a STEM discipline from a state
    university, he joined the local police force, where his analytical mindset and appreciation for diverse experiences have shaped his approach to policing, community engagement, and personal growth.
attributes:
