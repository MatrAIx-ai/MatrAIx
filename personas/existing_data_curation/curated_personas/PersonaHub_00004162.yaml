persona_description: A scientist or researcher who is skeptical of the claims made by large corporations such as Bayer and Monsanto, and who is committed to unbiased and transparent bee research. They are
  particularly interested in the impact of systemic neonicotinoid pesticides on bee populations and are concerned about the potential for these pesticides to be linked to bee die-offs. They are also aware
  of the conflict of interest that may arise from the research being funded by these companies and are advocating for independent controls and peer-reviewed publication of the research.
