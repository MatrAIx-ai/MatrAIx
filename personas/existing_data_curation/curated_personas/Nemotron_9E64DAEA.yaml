personas:
  professional: Kevin Bryant is a licensed massage therapist who blends meticulous intake assessments with a methodical manual therapy approach, leveraging Swedish, deep-tissue, and trigger-point techniques
    while they keep each client session on schedule and their quiet demeanor lets clients feel safe and focused.
  sports: Kevin Bryant enjoys early-morning fishing on the St. Johns River with the St. Johns River Anglers Club, follows the Jacksonville Jaguars and the Jacksonville Jumbo Shrimp, and maintains fitness
    through solo jogging on the Riverside Trail and weekend participation in a community soft-ball league, preferring low-key, routine exercise over crowded gyms; they schedule each session precisely to
    fit their structured day.
  arts: Kevin Bryant finds creative release in woodworking while listening to folk legends like John Prine and classic blues from B.B. King, and unwinds with the occasional film starring Tom Hanks or a
    documentary about maritime history, allowing the music and stories to inform their methodical craftsmanship; they often hum softly while sanding.
  travel: Kevin Bryant plans low-stress getaways with a detailed itinerary, favoring drive-up retreats to the Florida Keys for sunset fishing, weekend hikes in the Ocala National Forest, and a dream vacation
    to the Scottish Highlands to explore remote lochs, all while balancing his wife's schedule and a modest travel budget; they prefer structured travel plans over spontaneous trips.
  culinary: Kevin Bryant prefers fresh coastal fare, regularly preparing grilled grouper with lemon-butter sauce, shrimp po'boys topped with crisp lettuce, and a side salad of home-grown tomatoes, cucumber,
    and basil, and enjoys the bright zest of key lime pie, though their cooking skill hovers at confident home-cook level; they rarely stray from familiar ingredients, preferring the reliability of known
    flavors.
  core: Kevin Bryant is a methodical, solitary wellness professional who balances structured daily routines with a love for quiet fishing, meticulous budgeting, and a penchant for woodworking, but they
    often forget to socialize and sometimes skip flossing.
background:
  cultural: Kevin was raised in a middle‑class white family in the greater Jacksonville region of Florida, where a blend of Southern hospitality and coastal lifestyle shaped his values. His upbringing emphasized
    self‑reliance, punctuality, and respect for community traditions such as holiday gatherings and local festivals. Growing up near the Atlantic coast, he developed an appreciation for outdoor recreation
    and regional cuisine, particularly fresh seafood and citrus. As a married adult, he balances these cultural roots with a desire for quiet home life, valuing family routines and personal space while
    maintaining a cooperative spirit within his community.
attributes:
  skills: '[''Swedish massage'', ''Deep tissue massage'', ''Sports massage'', ''Myofascial release'', ''Trigger point therapy'', ''Structural posture assessment'', ''Client intake and documentation'', ''Business
    scheduling and billing'', ''Basic anatomy and kinesiology'', ''Sanitation and hygiene compliance'']'
  hobbies: '[''Fishing'', ''Birdwatching'', ''Reading non-fiction (health, history, DIY)'', ''Puzzle solving (crosswords, Sudoku)'', ''Woodworking'', ''Gardening'', ''Meditation'', ''Cooking simple, healthy
    meals'', ''Listening to acoustic folk music'']'
  career_goals: Kevin aims to grow his solo practice into a small wellness boutique that offers specialized services for athletes and seniors in the St. Johns area. Over the next three years he plans to
    earn advanced certifications in orthopedic and geriatric massage, integrate evidence‑based stretching protocols, and develop a modest online presence for booking and educational content. He also envisions
    hiring one additional therapist to broaden service hours, enabling him to maintain a balanced workload while continuing to prioritize high‑quality, personalized care.
