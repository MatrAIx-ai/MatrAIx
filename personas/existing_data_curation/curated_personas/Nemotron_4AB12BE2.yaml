  hobbies: '[''Playing soccer'', ''Exploring the woods and collecting natural objects'', ''Building LEGO creations'', ''Reading adventure books'', ''Drawing and painting'', ''Dancing'', ''Helping in the
    family garden'', ''Participating in church children’s activities'']'
  career_goals: Mary imagines a future where she helps others learn and care for animals. She often says she wants to become a teacher because she loves sharing what she discovers, and she also dreams of
    being a veterinarian to care for the neighborhood dogs and farm animals she sees around Altha. Occasionally she talks about astronauts and space, reflecting her fascination with new ideas, but she always
    ties these dreams back to practical ways of helping people, such as becoming a camp counselor or community organizer where she can lead group activities and make friends feel included.
