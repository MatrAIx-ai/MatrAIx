personas:
  professional: Mary Rogers, a budding LEGO architect, constructs towering brick cities with meticulous attention to structural stability while spontaneously inventing new design features on the fly; they
    blend boundless curiosity about engineering with a practical desire to see their creations stand firm, though they often scramble to tidy up the scattered bricks before bedtime.
  sports: Mary Rogers, a spirited youth soccer player for the Riverdale Rovers, dashes across the local park field every Saturday, cheering for Manchester United on TV while practicing free‑kicks with friends;
    they love the roar of the crowd at nearby minor league baseball games for the Maple Leafs and relish spontaneous pick‑up games, even if they sometimes forget to bring their water bottle.
  arts: Mary Rogers, an imaginative creator, delights in drawing bright pictures of dragons and painting smooth river stones, while singing along to Disney’s "Let It Go" and "A Whole New World" during church
    children’s group rehearsals; they also devour adventure tales by Enid Blyton aloud to the family, often acting out scenes with improvised costumes, though they sometimes leave a trail of crayons everywhere.
  travel: Mary Rogers, a curious explorer, loves day trips to the nearby woods where they collect leaves and rocks, has visited the bustling city of Washington, D.C. on a school field trip, and dreams of
    riding the roller coasters at Disneyland; they prefer spontaneous road trips over meticulously planned vacations, yet occasionally need reminders to pack a snack.
  culinary: Mary Rogers, a budding kitchen helper, enjoys spreading creamy peanut butter on whole‑grain toast, munching on homemade pizza topped with fresh garden tomatoes and mozzarella, and stirring a
    pot of apple‑cinnamon crumble using crisp apples from the family garden; they are proud of their growing skill in whisking batter for pancakes but often forget to wash their hands after handling soil.
  core: Mary Rogers, a boundlessly energetic seven‑year‑old, fuses curiosity with hands‑on practicality, thriving in group play and spontaneous creativity while occasionally misplacing belongings and forgetting
    to tidy up, and they always bounce back with a smile.
background:
  cultural: Mary grows up in Altha, a small unincorporated community in Calhoun County, Florida’s Panhandle. The town’s close‑knit atmosphere, Southern hospitality, and strong emphasis on family and church
    shape her daily life. Weekends often involve church services, potluck gatherings, and community events like the county fair, where she’s exposed to local traditions such as live music, craft booths,
    and outdoor recreations. The surrounding pine forests, lakes, and farms nurture her love of nature, while the local elementary school fosters collaborative learning and group projects that suit her
    sociable personality. Her cultural roots blend a generally Anglo‑American background with the regional values of neighborliness, respect for the outdoors, and community participation.
attributes:
  skills: '[''Reading simple chapter books'', ''Basic addition and subtraction (up to 20)'', ''Oral storytelling'', ''Curiosity about nature and simple gardening tasks'', ''Cooperative play and peer mediation'',
