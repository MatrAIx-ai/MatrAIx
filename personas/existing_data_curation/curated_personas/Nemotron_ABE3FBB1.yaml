personas:
  professional: Russell Carter is a construction manager who blends rigorous project scheduling and budgeting expertise with a designer’s eye, using tools like MS Project and Procore to deliver large commercial
    builds in Tampa Bay while infusing sustainable, art-inspired details into every structure, and they lead cross-functional crews with a calm, assertive style.
  sports: Russell Carter hits the waterfront at dawn for a solo jog, cheering on the Tampa Bay Buccaneers, Lightning and Rays on game days, and they dedicate weekend mornings to fly-fishing in the Gulf
    and building model trains with the Tampa Model Railroader Society, a hobby that keeps their hands steady and mind focused.
  arts: Russell Carter frequents the Tampa Museum of Art and the Salvador Dali Museum, captures the city’s Art Deco facades with their camera, paints watercolor seascapes inspired by Monet, and they unwind
    listening to Miles Davis and the Berlin Philharmonic, often citing Georgia O'Keeffe’s bold colors as a visual guide for their woodworking designs.
  travel: Russell Carter prefers meticulously planned road trips that blend quiet nature retreats with architectural tours, having recently driven the Pacific Coast Highway to photograph Big Sur, while
    they dream of a springtime visit to Kyoto’s historic temples and a fishing lodge in the Canadian Rockies, all within a budget that balances their upcoming firm launch.
  culinary: Russell Carter relishes cooking fresh Gulf grouper with a citrus-herb glaze, perfecting key lime pie crusts, and experimenting with Mediterranean olive tapenades, yet their modest kitchen skills
    mean they often rely on a high-quality cast-iron skillet and a trusty sous-vide device for their most ambitious dishes.
  core: Russell Carter is a solitary architect-builder who trades boardroom meetings for quiet sunrise jogs, meticulous project plans for handcrafted furniture, and occasional coffee-shop jazz sessions
    for the hum of a model-train workshop, even as they battle a habit of delayed physiotherapy appointments.
background:
  cultural: Russell is a white American raised in the Gulf Coast region of Florida, where a blend of coastal leisure and hardworking, middle‑class values shaped his outlook. His upbringing emphasized self‑reliance,
    family loyalty, and a practical work ethic, reflected in his high‑school education and steady climb in the construction field. The local culture of Seminole and Pinellas County, with its fishing traditions,
    outdoor activities, and appreciation for regional art scenes, influences his lifestyle and interests. While rooted in mainstream American customs, Russell’s curiosity drives him toward broader artistic
    and sustainable ideas, creating a nuanced cultural identity that balances traditional values with an openness to new experiences.
attributes:
  skills: '["Construction project planning", "Budgeting and cost estimation", "Scheduling with MS Project and Primavera", "On‑site supervision", "Safety compliance (OSHA)", "Subcontractor coordination",
    "Blueprint and technical drawing interpretation", "Construction management software (Procore, Buildertrend)", "Quality control and risk management", "Leadership and team management", "Conflict resolution",
    "Sustainable building practices (LEED basics)", "Integration of design aesthetics"]'
  hobbies: '["Visiting art museums and galleries", "Landscape and architectural photography", "Watercolor painting", "Woodworking and furniture making", "Fishing (freshwater and saltwater)", "Jogging along
    Tampa Bay", "Reading historical fiction and non‑fiction", "Model train building", "Birdwatching", "Listening to jazz and classical music"]'
  career_goals: Russell aims to advance from his current role to a senior executive position overseeing complex commercial developments in the Tampa Bay area. He plans to obtain a General Contractor license
    and pursue LEED accreditation to lead sustainable, design‑focused projects. Over the next five years, he hopes to launch his own boutique construction firm that blends high‑quality craftsmanship with
    artistic design elements, while also mentoring emerging tradespeople and improving safety performance across his projects.
