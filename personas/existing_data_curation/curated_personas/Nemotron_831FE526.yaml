  career_goals: She aims to enroll in a liberal arts college with a strong visual arts program, eventually specializing in concept art and interactive media design. Her long‑term ambition is to become a
    creative director or senior concept artist for video games or immersive installations, using her fascination with abstract ideas to produce thought‑provoking work. Tracy also hopes to develop a professional
    portfolio, secure exhibitions, and possibly pursue graduate studies in art theory or digital media research.
