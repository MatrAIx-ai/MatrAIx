personas:
  professional: Tracy Wells, an aspiring concept artist and digital illustrator, blends their meticulous project planning with a boundless imagination to craft speculative visual narratives for indie video
    games, while they often indulge in late‑night sketch marathons that sometimes disrupt their sleep schedule.
  sports: Tracy Wells, a weekend hiker and member of a local outdoor recreation club, follows the Washington Commanders and the Washington Capitals with modest enthusiasm, prefers low‑impact trail runs
    over team sports, and maintains a disciplined yoga routine that they often prioritize over late‑night gaming sessions.
  arts: Tracy Wells, an avid museum‑goer who reveres the immersive light installations of James Turrell and the ambient compositions of Brian Eno, spends afternoons sketching in the National Gallery of
    Art’s sculpture garden and curates a virtual mood board of surreal digital paintings inspired by H.R. Giger and contemporary anime aesthetics, while they frequently share their discoveries on a personal
    art blog.
  travel: Tracy Wells, whose travel style blends meticulous research with spontaneous detours, has explored Shenandoah’s quiet ridges, lingered in Washington D.C.’s historic museums, and dreams of wandering
    the fjords of Iceland and the buzzing art districts of Barcelona while they save for a solo backpacking trip to Kyoto’s temples.
  culinary: Tracy Wells, a self‑taught home cook who favors experimental fusion, often whips up avocado‑miso ramen bowls and truffle‑infused mac & cheese after an evening of digital painting, yet they admit
    to a lingering sweet tooth that leads to late‑night orders of artisanal churros from a local food truck.
  core: Tracy Wells channels solitary curiosity into vivid digital worlds, balances meticulous planning with night‑owl creativity, and they navigate life with a blend of quiet ambition, occasional over‑indulgence
    in caffeine, and a steadfast love of ambient soundscapes.
background:
  cultural: Tracy grew up in a middle‑class suburban setting in Prince William County, Virginia, within a predominantly white community. Her family emphasized education, community involvement, and a blend
    of Southern courtesy with broader American pop culture. Exposure to local historical sites, regional festivals, and a strong public school system nurtured her curiosity, while the internet and digital
    media expanded her horizons, fostering an appreciation for both American art history and contemporary digital aesthetics.
