    & Agile Planning'', ''Educational Psychology Insight'', ''Cultural Market Insight for Hispanic Demographics'']'
  hobbies: '[''Hiking in the Rocky Mountains'', ''Cooking traditional Spanish cuisine'', ''Yoga and meditation practice'', ''Reading contemporary fiction and educational psychology'', ''Photography of landscapes'',
