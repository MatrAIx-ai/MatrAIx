  career_goals: Giannina aims to advance from her current analyst role to a senior market insights manager within the next three years, overseeing larger research projects and shaping data‑driven strategies
    for brand growth. She plans to deepen her expertise in predictive analytics and machine learning to anticipate consumer trends, while pursuing an MBA or a specialized certification in data science to
    broaden her strategic perspective. In the long term, she aspires to become a Director of Market Research or launch her own consultancy that melds educational insights with marketing, targeting the growing
    Hispanic and EdTech segments. Giannina also seeks to mentor junior analysts, contribute to industry conferences, and publish case studies that highlight the intersection of cultural nuance and consumer
    behavior.
