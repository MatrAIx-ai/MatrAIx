  hobbies: '[''Country line dancing'', ''Zumba classes'', ''College club activities'', ''Student government'', ''Volunteering at local festivals'', ''Horseback riding'', ''Country music concerts'', ''Karaoke
    nights'', ''HIIT workouts'', ''Yoga'', ''Cooking Tex-Mex recipes'', ''Photography of West Texas landscapes'', ''Hiking'', ''Camping'']'
  career_goals: Anita intends to complete her associate degree and transfer to a four‑year university to earn a bachelor's in Business Administration. Her short‑term goal is to secure a marketing coordinator
    position with a regional tourism board or a community development agency where she can apply her event‑planning and communication strengths. Long‑term, she aspires to move into a managerial role, overseeing
    larger projects and teams, or to launch her own boutique event‑planning business that serves West Texas communities. She is driven by a desire to lead efficiently, achieve measurable results, and build
    a reputable professional brand.
