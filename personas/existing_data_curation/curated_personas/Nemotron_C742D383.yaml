  hobbies: '[''Journaling'', ''Piano playing'', ''Debate club'', ''Drama club'', ''Mystery novel reading'', ''Puzzle solving (Sudoku, crosswords)'', ''Volleyball'', ''Community service (food drives)'']'
  career_goals: Ashly aims to graduate high school with honors and secure a scholarship to study Education and Psychology at a university such as the University of Illinois Urbana‑Champaign. She envisions
    a career as a school counselor or future principal, where she can develop structured support systems that promote student well‑being and academic achievement. In the longer term, she hopes to lead initiatives
    that integrate mental‑health resources into school curricula, combining her passion for organization, empathy, and community building.
