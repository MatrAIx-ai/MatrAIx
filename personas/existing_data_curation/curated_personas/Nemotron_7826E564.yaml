personas:
  professional: Angel Torres, a 48-year-old senior phlebotomist at the county health clinic, combines flawless venous and capillary collection expertise with a competitive, data-driven mindset, resulting
    in meticulous specimen labeling, rigorous infection-control audits, and a future-focused design for a streamlined tracking system that mirrors their methodical, skeptical approach to quality.
  sports: Angel Torres, who starts each day with a brisk walk along the Apalachicola River and participates in a local adult softball league, roots for the Florida State Seminoles football team in the fall
    and follows the Tampa Bay Rays during baseball season, and belongs to the Wakulla County Walking Club, maintaining a steady fitness routine that satisfies their need for structured, low-key activity.
  arts: Angel Torres, an admirer of folk guitarist Luis Miguel González, classic Mexican cinema icon Dolores del Río, and contemporary painter José María Ramos, spends evenings listening to acoustic guitar
    playlists while sketching botanical illustrations of garden herbs, allowing the arts to deepen their solitary reflections and satisfy their creative curiosity.
  travel: Angel Torres, who prefers meticulously planned weekend escapes to nature-focused destinations such as the Everglades, Sanibel Island, and the historic streets of New Orleans, often travels solo
    with a garden notebook in tow, while dreaming of a future road trip to Portugal's Algarve coast to sample Atlantic seafood.
  culinary: Angel Torres, a proficient home chef, regularly prepares tamales filled with locally caught shrimp, mole enriched with roasted ancho chilies and dark cocoa, and pozole simmered with smoked pork,
    while experimenting with fresh basil, cilantro, and Florida stone crab, showcasing a skillful fusion of traditional techniques and coastal flavors.
  core: Angel Torres, a meticulous phlebotomist who channels a competitive streak into solitary gardening, crossword puzzles, and exacting lab work, yet occasionally neglects bedtime in pursuit of perfecting
    a specimen-tracking process.
background:
  cultural: Angel was raised in a bilingual household by Mexican immigrant parents who settled in Florida during her childhood. She celebrates Mexican holidays such as Día de los Muertos and Las Posadas,
    while also embracing the relaxed coastal culture of Sopchoppy. Her Catholic upbringing and active participation in the local parish reinforce family bonds and community values. Fluent in Spanish, Angel
    bridges cultural gaps at the clinic, serving both Hispanic and broader populations with empathy and cultural awareness.
attributes:
  skills: '[''Venipuncture'', ''Capillary blood collection'', ''Specimen labeling and handling'', ''Infection control protocols'', ''HIPAA compliance'', ''Electronic health records (EHR) management'', ''Quality
    assurance and specimen auditing'', ''Inventory control for laboratory supplies'', ''Patient communication in English and Spanish'', ''CPR and basic life support'', ''Training and mentoring new phlebotomy
    staff'', ''Point‑of‑care testing (POCT) operation'']'
  hobbies: '[''Gardening'', ''Birdwatching'', ''Cooking Mexican and Floridian cuisine'', ''Reading medical non‑fiction'', ''Crossword puzzles'', ''Sudoku'', ''Volunteer health‑fair education'']'
  career_goals: Angel aims to obtain Certified Phlebotomy Technician (CPT) and Certified Phlebotomy Specialist (CPS) credentials, then advance to a lead phlebotomist position supervising a small team at
    the county health clinic. She plans to design a streamlined specimen‑tracking system that reduces errors and improves turnaround time. Long‑term, she envisions moving into a clinical laboratory supervisor
    role, leveraging her practical curiosity to raise quality standards. She also seeks to expand community outreach by organizing bilingual health‑education workshops in Wakulla County.
