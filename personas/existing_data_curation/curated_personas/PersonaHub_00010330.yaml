persona_description: A senior government official responsible for overseeing and allocating resources for the development of clean-energy technologies, particularly in the areas of offshore wind and nuclear
  power. This person is responsible for making decisions that align with the government's green commitments and ensuring that subsidies for renewable energy technologies are not undermined by cuts to support.
  They are likely to have a deep understanding of the financial and economic implications of investing in clean-energy technologies, and are focused on driving the necessary investment to ensure a stable
  and sustainable energy supply. They may also be interested in the latest research and development in renewable energy technologies and have a passion for promoting a cleaner and more sustainable future.
