  skills: '[''Budget management'', ''Meal planning and cooking'', ''Knitting and quilting'', ''Volunteer coordination'', ''Basic computer literacy'', ''First aid'', ''Gardening'']'
  hobbies: '[''Reading mystery novels'', ''Quilting circle'', ''Gardening'', ''Church choir'', ''Cooking traditional recipes'', ''Volunteer at senior center'', ''Genealogy research'']'
  career_goals: Although retired, Dorothy sets personal goals that reflect her disciplined nature and desire to leave a lasting legacy. She aims to maintain her health through daily walks and regular gardening,
    complete a memoir that records her life and family history for future generations, and mentor younger women in her church's women's ministry on household management and financial stewardship. She also
    wishes to expand her volunteer involvement by organizing monthly food-preparation workshops for seniors, and to achieve greater emotional stability by attending weekly support groups aimed at managing
    anxiety.
