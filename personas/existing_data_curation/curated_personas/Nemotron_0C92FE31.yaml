personas:
  professional: Dorothy Donaldson, a retired homemaker turned community mentor, leverages their meticulous organization and love of routine to coordinate weekly church choir rehearsals, senior center bingo
    nights, and small‑scale food‑preparation workshops, always insisting on clear checklists and timelines.
  sports: Dorothy Donaldson enjoys low‑impact fitness through daily neighborhood walks and a Saturday senior yoga class, follows the local baseball team, the River City Rivermen, and keeps a soft spot for
    the NBA's Los Angeles Lakers, but prefers watching games from the comfort of home rather than attending stadiums.
  arts: Dorothy Donaldson finds artistic fulfillment singing gospel hymns with the church choir, listening to the timeless voice of Mahalia Jackson, reading Agatha Christie mystery novels each evening,
    and admiring the classic films of Cary Grant, while occasionally knitting scarves inspired by Monet’s garden paintings.
  travel: Dorothy Donaldson travels with a carefully plotted itinerary, having enjoyed a relaxed riverboat cruise on the Mississippi, a nostalgic visit to Savannah’s historic squares, and dreaming of a
    guided pilgrimage to Boston’s Freedom Trail, always choosing destinations with moderate climate and easy accessibility.
  culinary: Dorothy Donaldson masters traditional comfort‑food cooking, perfecting dishes like slow‑cooked collard greens, sweet‑potato pie, and seasoned fried chicken, seasoned with fresh garden herbs,
    and meticulously logs each recipe in a family cookbook while occasionally experimenting with a dash of hot sauce for extra kick.
  core: Dorothy Donaldson embodies disciplined routine, juggling quilting, garden harvests, and community service with a shy smile, a habit of over‑checking email, and a lingering anxiety that fuels both
    meticulous planning and occasional sleepless nights.
background:
  cultural: Dorothy is an African-American woman who was born in the early 1950s and grew up during the civil rights era in the Washington, D.C., metropolitan area. Her family migrated from the South to
    Maryland, bringing with them deep-rooted traditions of church fellowship, communal cooking, and storytelling. Living in Prince George's County, a region known for its vibrant Black middle-class community,
    she has internalized values of self-reliance, respect for elders, and the importance of family cohesion. Her faith as a lifelong member of a Baptist congregation shapes much of her daily rhythm, from
    attending Sunday services to participating in church-based outreach. Dorothy's cultural identity is expressed through her preservation of Southern-style soul food, participation in gospel music, and
    dedication to passing down family histories to younger generations.
