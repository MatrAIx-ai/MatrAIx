  hobbies: '[''Jogging in local parks'', ''Yoga and mindfulness meditation'', ''Crossword and Sudoku puzzles'', ''Cooking and recipe experimentation'', ''Community gardening'', ''Reading non‑fiction (sociology,
    public policy, self‑improvement)'', ''Strategic board‑games (e.g., Settlers of Catan)'']'
  career_goals: Driven by a competitive spirit, Diane aims to ascend to a regional director role within the next five years, overseeing multiple community service agencies across southeast Michigan. She
    plans to earn a Certified Community Service Manager (CCSM) credential and eventually complete a bachelor’s degree in public administration to deepen her strategic expertise. Her ambition includes launching
    a city‑wide integrated services platform that leverages technology to streamline case management while maintaining rigorous outcome measurement. Diane also aspires to mentor emerging social service
    professionals, fostering a culture of accountability and continuous improvement within her organization.
