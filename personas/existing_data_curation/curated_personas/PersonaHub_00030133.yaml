persona_description: An astronomer who specializes in the study of exoplanets and their properties, particularly those found in the crowded core of ancient globular clusters. They have expertise in using
  Hubble Space Telescope observations to measure the physical properties of exoplanets, such as their mass, age, and tilt, and have a particular interest in using this information to determine the mass
  and composition of exoplanets. They have experience with the Wide Field and Planetary Camera 2 of the Hubble Space Telescope, which has helped them to discover the identity of a previously unknown planet
  orbiting a burned-out white dwarf star and a rapidly spinning neutron star.
