personas:
  professional: Paige Duhe, a floor manager at a regional home‑improvement retailer, leverages their three decades of staff supervision, inventory control, and process‑improvement expertise to translate
    corporate goals into detailed SOPs while quietly relying on improvisation when unexpected staffing gaps arise, all as they prepare to mentor junior managers and document their operational knowledge
    for a lasting legacy.
  sports: Paige Duhe, who favors low‑impact activity, joins the Clover Senior Walking Club for early morning strolls, follows the Carolina Panthers, Charlotte Hornets, and Charlotte FC loyally, and occasionally
    attends Charlotte Knights baseball games during spring as a modest fan of local sport, finding that the routine energizes them for the workweek.
  arts: Paige Duhe, an avid quilter and historical memoir enthusiast, spends weekends at the York County community theatre for productions by the local playhouse, enjoys the bluegrass twang of Bill Monroe
    recordings, and draws creative inspiration from the intricate patterns of Mary Schafer’s quilting designs, which they incorporate into their own projects.
  travel: Paige Duhe, who prefers methodical road trips over spontaneous flights, has driven the Blue Ridge Parkway each autumn to photograph migrating birds, relishes weekend escapes to Charleston’s historic
    district, and dreams of a tranquil cabin retreat in the Smoky Mountains for their post‑retirement years, allowing them to balance adventure with the comfort of familiar routes.
  culinary: Paige Duhe, an accomplished home cook who cherishes their family’s boiled peanut and fried catfish recipe, cultivates heirloom tomatoes for fresh salsa, seasons dishes with home‑grown sweet
    corn and collard greens, and treats themselves to a slice of pecan pie with a dollop of whipped butter on Sundays, savoring the flavors of their childhood kitchen.
  core: Paige Duhe merges a lifelong farm‑rooted work ethic with a quiet competitive streak, meticulously logging garden yields and bridge scores while habitually postponing doctor appointments until the
    next month’s check‑in, a quirk that reflects both their diligence and their tendency to procrastinate.
background:
  cultural: Paige was born and raised in a small farming community near the Pee Dee River in South Carolina. Her family has lived in the region for generations, and she grew up attending a Baptist church
    where community service and modesty were emphasized. The Southern hospitality and work ethic of her upbringing taught her the value of punctuality, practical problem solving, and self-reliance. Though
    she never pursued higher education beyond high school, she absorbed local traditions—such as cooking from family recipes, seasonal gardening, and participation in county fairs—that continue to shape
    her worldview. Living in Clover, York County, she is deeply familiar with the rhythms of a close‑knit, predominantly white, rural‑suburban community, balancing respect for tradition with an eye toward
    incremental improvement.
