  career_goals: Now that she is 60, Paige is focused on solidifying a smooth transition for her eventual retirement. She aims to mentor at least two younger managers, documenting her operational knowledge
    in a comprehensive handbook that will serve as a legacy for the store. She also wants to improve the store’s profitability by introducing a modest sustainability program that reduces waste and cuts
    utility costs, aligning with her competitive drive to outperform neighboring locations. Additionally, she hopes to negotiate a part-time consulting arrangement that will allow her to stay engaged in
    the industry without the full-time stress that currently weighs on her.
