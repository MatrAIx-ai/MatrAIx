personas:
  professional: Akina Burston, a one-year-old, already demonstrates an innate methodological approach by meticulously arranging building blocks and sorting shape puzzles, hinting at a future career in engineering
    where their curiosity for new ideas blends with practical problem‑solving.
  sports: Akina Burston, a one-year-old, enjoys weekly parent‑child gymnastics at the Little Leapers Club, eagerly watches the Seattle Seahawks games on Sundays, and is a budding fan of the Seattle Sounders,
    often waving a miniature soccer ball during playtime.
  arts: Akina Burston, a one-year-old, is captivated by the lullabies of Mozart, the shimmering melodies of Disney's 'Frozen' soundtrack by Kristen Anderson‑Lopez, and loves to create bold, abstract scribbles
    with Crayola chunky crayons, occasionally dancing to the rhythm of The Wheels on the Bus.
  travel: Akina Burston, a one-year-old, has explored the nearby city zoo and grandparents' countryside cottage, revels in the sensory wonder of the local botanical garden, and dreams—through bedtime storybooks—of
    visiting Disneyland Paris and the cherry blossoms of Kyoto.
  culinary: Akina Burston, a one-year-old, prefers simple purees like mashed sweet potato, ripe avocado, and banana mash, enjoys the texture of soft scrambled egg, insists on keeping foods separated on
    the plate, and delights in the occasional tasting of hummus with pita crumbs, though they have no cooking skills beyond self‑feeding.
  core: Akina Burston blends a toddler's innate curiosity with early‑stage organization, showing a gentle kindness, a methodical love of sorting, and a surprisingly disciplined view of savings, all while
    navigating typical infant health challenges with resilient support.
background:
  cultural: Akina is raised in a Black African‑American family in the Dundalk neighborhood of Baltimore, Maryland. Her home life reflects the rich cultural heritage of Baltimore’s historic Black community,
    including celebrations of milestones such as Juneteenth and family gatherings centered around soul food, crab cakes, and collard greens. Music plays a central role, with gospel, jazz, and contemporary
    R&B featuring in daily routines and lullabies. The family participates in local church activities and community events that emphasize cooperation, harmony, and support for one another—values that align
    with Akina’s kind and considerate nature. Exposure to the city’s vibrant arts scene, local festivals, and intergenerational storytelling fosters her early curiosity while grounding her in a strong sense
    of cultural identity.
