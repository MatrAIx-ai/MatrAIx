  career_goals: At her current age of one year, Akina does not have defined career goals or professional ambitions. Her primary focus is on developmental milestones such as expanding her vocabulary, walking
    confidently, and beginning preschool‑age experiences. Her caregivers encourage her natural curiosity and practical approach, nurturing interests that could later translate into aspirations in caring
    or problem‑solving fields, such as early childhood education, community health, or social services.
