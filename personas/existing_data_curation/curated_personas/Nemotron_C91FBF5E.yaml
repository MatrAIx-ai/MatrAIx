personas:
  professional: Simon Norman, an aspiring comic creator, channels curiosity and a balance of organization and flexibility into daily sketch sessions, water‑color scene studies, and Scratch animation projects,
    treating each panel as a mini‑story that reflects his love for varied ideas.
  sports: Simon Norman thrives on the fast‑paced energy of soccer with the Maplewood Strikers youth league and basketball drills inspired by the Chicago Bulls, practicing daily at the neighborhood park,
    joining weekend pick‑up games, and setting personal goals to improve dribbling and teamwork.
  arts: Simon Norman immerses himself in creative expression, drawing inspiration from the vivid panels of "Adventure Time", the gentle watercolors of Mary Ann Banfield, and the rhythmic beats of hip‑hop
    artists like Kendrick Lamar, while actively participating in his after‑school art club to master mixed‑media collages and character design.
  travel: Simon Norman prefers short, adventure‑filled outings, often exploring the nearby Discovery Center museum, taking family road trips to the historic town of Williamsburg, and hiking local state
    park trails, all while saving allowance for a future summer visit to the National Museum of Natural History in Washington, D.C.
  culinary: Simon Norman enjoys snacking on crunchy carrot sticks with hummus, crafting simple peanut‑butter‑banana sandwiches, and helping his family bake chocolate‑chip cookies with dark chocolate chips
    and a pinch of cinnamon, while his favorite school lunch remains pepperoni pizza with extra cheese.
  core: Simon Norman is a curious, art‑obsessed nine‑year‑old who balances meticulous comic sketching with spontaneous Lego builds, trades allowance for new comic books, darts between soccer drills and
    museum visits, hums hip‑hop beats while dancing, and occasionally forgets homework.
background:
  cultural: Simon is part of an African‑American family in District Heights, Maryland, a close‑knit community that values familial bonds, church gatherings, and local celebrations such as Juneteenth and
    Kwanzaa. He grows up hearing stories about his ancestors, enjoying soulful music ranging from gospel to contemporary R&B, and participating in community block parties and school cultural events. His
    family emphasizes respect, cooperation, and giving back, encouraging him to share his talents with friends and neighbors.
