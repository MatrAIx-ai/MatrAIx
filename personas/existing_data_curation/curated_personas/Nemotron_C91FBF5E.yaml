  career_goals: Simon dreams of becoming a digital artist or animator who can bring his drawings to life on a screen. He is fascinated by how art and technology intersect and hopes to study graphic design
    when he’s older. He also imagines teaching younger kids about art and coding, perhaps as a future community youth mentor in District Heights.
