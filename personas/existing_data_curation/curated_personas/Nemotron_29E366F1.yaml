  career_goals: As she approaches the later stage of her career, Terri seeks advancement that aligns with her reliability and desire to give back. She plans to obtain a Certified Paralegal credential and
    enroll in an associate program to deepen her knowledge of civil litigation and family law. Her ambition includes moving into a senior paralegal or supervisory role where she can mentor newer staff,
    design a structured onboarding program, and streamline office processes. Additionally, Terri hopes to volunteer her expertise with a local legal‑aid nonprofit, ensuring that underserved residents of
    Lafayette have access to organized, compassionate legal assistance, while also preparing for a financially secure early retirement.
