persona_description: A bioethicist who has conducted research on the ethical implications of research in public health and has presented her findings at conferences. She is interested in collaboration and
  networking with other bioethicists in sub-Saharan Africa to build research ethics capacity. She is passionate about highlighting the disproportionate harms of the Zika virus to poor women from endemic
  areas and believes that bioethicists and governments have a significant role to play in reviewing research regulatory guidelines and laws that exclude women from health research. She is eager to learn
  from other experts in bioethics and is interested in hearing about new things she has not learned before.
