personas:
  professional: Marisel White, despite being just one year old, already displays a structured curiosity for cause‑and‑effect toys, methodically arranging blocks by color and size, hinting at a future inclination
    toward systematic problem‑solving and engineering, and they often pause to inspect how each piece fits before moving on.
  sports: Marisel White, a one‑year‑old who delights in crawling after a soft orange soccer ball and enjoys weekly baby swim sessions, proudly wears a bib featuring the New York Yankees logo, blending early
    motor play with a budding affinity for organized sports imagery, and they especially love the feeling of water splashing during swim time.
  arts: Marisel White, who lights up to the gentle lullabies of Brahms, the upbeat tunes of The Wiggles, and the colorful illustrations of Eric Carle’s books, spends quiet moments hand‑picking soft cloth
    books and watching animated Sesame Street clips, shaping a nascent love for music and visual storytelling, and they often hum along with the melodies they hear.
  travel: Marisel White, whose first road trip took the family to the San Diego Zoo where they marveled at the giraffes, now giggles at the thought of a future beach vacation in Maui, while parents plan
    a calm, stroller‑friendly itinerary that balances familiar routines with new sights.
  culinary: Marisel White, a picky eater who adores mashed sweet potatoes with a hint of cinnamon and prefers banana puree while consistently refusing peas, enjoys experimenting with soft avocado slices
    and carefully arranged avocado‑banana mash, reflecting a developing palate that values predictable textures and flavors, and they often smile when they get the sweet potatoes.
  core: Marisel White, a one‑year‑old with a penchant for organized play, predictable routines, and a quiet confidence, balances curiosity with a love for familiar comfort, while they occasionally reject
    new foods in favor of well‑known flavors.
