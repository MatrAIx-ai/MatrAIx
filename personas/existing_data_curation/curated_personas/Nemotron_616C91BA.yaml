  career_goals: Skylar aims to move from a front‑desk role to a supervisory position where she can shape guest experiences with greater autonomy and less constant interaction. Over the next five years she
    plans to complete a hospitality management certificate and eventually launch a boutique bed‑and‑breakfast that showcases regional art, blending her hospitality expertise with her love of visual culture.
    She also aspires to develop an online visual journal highlighting California's hidden artistic sites, positioning herself as a niche travel and culture influencer.
