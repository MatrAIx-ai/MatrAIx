personas:
  professional: Richard Potier is an aspiring game designer, channeling their boundless imagination into Scratch projects that blend fantasy narratives with simple animations, while their methodical planning
    ensures each game meets a personal checklist of story arcs, graphics, and bug fixes.
  sports: Richard Potier enjoys ice‑fishing on White Earth Lake in winter, participates in the elementary school’s cross‑country running team, follows the Minnesota Twins and the Minnesota Vikings, and
    belongs to a local youth scouting group that organizes weekend hikes, favoring low‑key endurance activities over high‑energy team sports.
  arts: Richard Potier thrives in the school art club, where they sketch detailed spaceship blueprints inspired by artists like James Gurney and watch Studio Ghibli films such as Princess Mononoke for visual
    storytelling, while they also pen short sci‑fi stories echoing the style of Anne McCaffrey, using these creative outlets to process emotions.
  travel: Richard Potier prefers small, planned excursions, having camped in Minnesota’s Boundary Waters and visited the Grand Canyon on a family road trip, while dreaming of exploring the International
    Space Station via a virtual reality tour and hoping to trek the ancient ruins of Machu Picchu next summer with their parents.
  culinary: Richard Potier enjoys assembling quirky snack experiments like peanut‑butter‑banana sushi rolls and marshmallow‑topped pizza, adept at baking chocolate chip cookies after watching YouTube tutorials,
    but occasionally over‑indulges in sugary cereal at breakfast, fueling their afternoon energy spikes.
  core: Richard Potier is a thoughtfully organized, day‑dreaming 11‑year‑old whose love for fantastical worlds is balanced by a nervous habit of over‑worrying, a tendency to hoard spare change for rockets,
    and an earnest desire to help friends feel heard.
background:
  cultural: Richard grew up in Ponemah, a small, close‑knit community in northern Minnesota on the edge of the White Earth Indian Reservation. His family’s heritage is primarily German‑Scandinavian, typical
    of the region’s white population, and they value hard work, reliability, and church‑based community life. The local environment—long, cold winters, abundant lakes, and dense forests—shapes his outdoor
    pursuits and his respect for nature. While his household is white, the proximity to Ojibwe culture means he is familiar with local tribal celebrations, the Ojibwe language taught in school, and the
    importance of stewardship of the land, all of which subtly inform his worldview.
