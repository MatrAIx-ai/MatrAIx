    ''Ice‑fishing and winter activities'', ''School art club'', ''Community service'', ''Journaling'']'
  career_goals: Richard envisions a future where he combines his love for art, science, and helping others. He aspires to become an environmental illustrator or a science communicator who creates comic‑style
    educational materials about Minnesota’s lakes and wildlife. He also dreams of studying psychology or counseling so he can design art‑based programs that support kids dealing with stress, reflecting
    his desire to turn his own worries into tools for harmony.
