persona_description: A reader who is interested in computer graphics and mathematics, particularly in the field of geometric modeling. They are familiar with computer graphics and have a background in mathematics,
  including polynomials, matrices, vector operations, and elementary calculus. They are looking for a mathematically easy presentation of geometric modeling and are open to using Mathematica as a tool for
  the presentation. They are also interested in practical examples, exercises, and answers. They may be looking for a book that covers basic theory, linear interpolation, polynomial interpolation, Hermite
  interpolation, spline interpolation, Bézier approximation, B-Spline approximation, subdivision methods, sweep surfaces, and other related topics.
