persona_description: Christopher Sutton, a musician and music educator who has developed a method for teaching ear training that makes it easy, fun, and effective for musicians of all levels. He has used
  his own experiences as a musician to create a system that helps people develop a natural ear for music, making it easier to learn and appreciate music. Christopher Sutton is a passionate advocate for
  ear training and has created a range of tools and resources to help people learn and practice ear training, including apps, eBook guides, and discounted eBooks for ZOEN students.
