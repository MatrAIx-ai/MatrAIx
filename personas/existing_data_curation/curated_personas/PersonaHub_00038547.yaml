persona_description: A researcher or psychologist who is interested in understanding the cognitive and neural mechanisms underlying decision-making processes in free-choice and forced-choice tasks. They
  are particularly curious about the factors that contribute to the difference in performance between the two types of tasks, such as the role of perceptual processing and the impact of stimulus-driven
  or choice-driven decisions. They are also interested in exploring alternative theories and hypotheses that could explain the observed differences, and they seek to identify potential mechanisms underlying
  the performance differences in forced-choice and free-choice tasks.
