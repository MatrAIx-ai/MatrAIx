persona_description: A professional installer and maintenance technician for vortex flow meters. This persona is responsible for selecting and installing vortex flow meters in various industrial applications,
  ensuring accurate flow measurement and ensuring the equipment is properly grounded and maintained. They must consider factors such as flow direction, installation position, and piping requirements, as
  well as the need for temperature and pressure compensation. This persona also has experience with troubleshooting and resolving issues related to vortex flow meters in different environments, such as
  harsh industrial settings.
