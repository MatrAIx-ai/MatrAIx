persona_description: A scientist or researcher who specializes in the study of animal behavior, particularly in the field of animal cognition and behavior. Their research focuses on understanding how animals,
  including dogs, perceive and understand time, as well as their concept of time. They are particularly interested in how dogs use their senses, such as day light, noises on the television, an understanding
  of their normal routine, and their sense of smell, to deduce when it is time for something to happen, such as when they are coming home or what time they normally take them for their walk. They also explore
  how dogs use their implicit and explicit memory to plan for the future and understand the concept of time.
