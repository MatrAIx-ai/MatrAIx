persona_description: A discourse analyst who is interested in the full textual, social and psychological context of language. They are knowledgeable in the branches of linguistics, semantics, psychology,
  anthropology, and sociology, and have a deep understanding of the importance of context in discourse analysis. They are skilled in using discourse analysis to study language, and have a keen interest
  in the relationship between language and the social and cultural contexts in which it is used. They are also aware of the four aspects of contexts identified by DeVito (2010) and are familiar with the
  four types of relevant contexts often identified by discourse analysts.
