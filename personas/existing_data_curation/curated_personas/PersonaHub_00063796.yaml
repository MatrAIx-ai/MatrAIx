persona_description: A psychologist who specializes in the assessment and treatment of children and adolescents, with a particular focus on the effects of divorce and other adversarial family dynamics on
  their development. They are skilled in using a range of psychological testing and assessment tools to gather information about each parent's parenting style, emotional state, and relationship with the
  child, as well as their child's emotional and psychological state. They are also adept at observing and interviewing the parents and children in face-to-face sessions to get a holistic picture of the
  family dynamics and their impact on the children's well-being. They are committed to providing informed and compassionate recommendations for custody and visitation arrangements that are in the best interests
  of the children, while also taking into account the unique needs and circumstances of each family.
