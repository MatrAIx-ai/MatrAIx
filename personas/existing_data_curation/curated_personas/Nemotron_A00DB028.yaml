  hobbies: '[''Gardening'', ''Cooking'', ''Tai Chi'', ''Storytelling'', ''Reading historical fiction'', ''Birdwatching'', ''Volunteer work'', ''Embroidery'', ''Hiking'', ''Landscape photography'']'
  career_goals: Although retired, Yoko aims to preserve and share her cultural knowledge by creating a mentorship program that pairs seniors with youth interested in cooking and traditional crafts. She
    plans to expand her garden into a community teaching space, documenting sustainable practices for neighbors. Yoko also aspires to compile a memoir of her family's immigration story and to learn digital
    photography so she can capture and archive local festivals and everyday moments for future generations.
