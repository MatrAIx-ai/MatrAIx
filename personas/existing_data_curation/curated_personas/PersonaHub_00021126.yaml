persona_description: A University of Exeter archaeologist who specializes in the study of landscape evolution and regional differences in farming, particularly in the South West of England. His work focuses
  on understanding the deep-rooted differences in management practices that still impact the landscape today, and the importance of preserving local identity and distinctiveness in landscape character.
  He uses a three-pronged approach of history, geography, and archaeology to map differences in the landscape and improve understanding of the historic environment. His research interests include the study
  of historic landscapes, regional differences in farming, and the preservation of local identity and distinctiveness.
