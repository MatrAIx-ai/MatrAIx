  hobbies: '[''Desert hiking'', ''Photography of desert landscapes'', ''Beadwork and jewelry making'', ''Southwestern cooking'', ''Pow‑wow participation'', ''Reading historical literature'', ''Community
    garden volunteering'', ''DIY home improvement'', ''Learning indigenous languages'']'
  career_goals: Lisa aims to advance to a regional facilities manager role where she can shape sustainability policies for housekeeping operations across multiple sites. She plans to earn the Certified
    Facilities Manager (CFM) and Certified Professional Housekeeper (CPH) credentials within the next two years. By integrating eco‑friendly cleaning solutions, water‑conservation measures, and waste‑reduction
    programs, she hopes to demonstrate measurable cost savings while supporting the environmental values of her community. Lisa also wants to develop a mentorship program that recruits and trains individuals
    from under‑represented groups, particularly Native American youth, for careers in facilities management. Ultimately, she aspires to launch her own boutique cleaning service that blends modern efficiency
    with culturally informed practices rooted in her tribal traditions.
