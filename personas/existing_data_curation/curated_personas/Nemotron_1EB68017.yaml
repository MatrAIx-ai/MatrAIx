personas:
  professional: Nina Gettys leverages fifteen years of crisis‑intervention expertise as a social worker, blending a competitive edge with a laid‑back, flexible style that lets they improvise community‑resource
    plans while habitually juggling case files in a charmingly disorganized manner.
  sports: Nina Gettys finds fitness in daily walks with their rescued Labrador along the Pasco County trail system, participates in a community softball league, and cheered on the Tampa Bay Buccaneers and
    Tampa Bay Lightning, preferring low‑key, consistent activity over high‑intensity workouts.
  arts: Nina Gettys unwinds with psychological thrillers by Gillian Flynn and Tana French, attends productions at the Florida Studio Theatre featuring actors like Lili Taylor, and they curate playlists
    that blend Jimmy Buffett’s tropical rock with local folk singer Joanna Cotten, shaping a creative outlet that balances suspense with community vibes.
  travel: Nina Gettys prefers spontaneous weekend road trips to Florida’s natural gems—such as the Everglades and the historic streets of Savannah—while dreaming of a longer eco‑tour of Costa Rica’s rainforests,
    they plan just enough to secure affordable lodging but leave plenty of wiggle room for unplanned detours.
  culinary: Nina Gettys delights in grilling fresh‑caught shrimp and snapping peas for a key lime pie at neighborhood potlucks, skillfully herbs their garden‑grown rosemary and basil into citrus‑infused
    marinades, yet they often forget to prep meals ahead, relying on quick, comfort‑food fixes when time runs short.
  core: Nina Gettys balances a competitive drive and community‑centric heart, using curiosity and practical improvisation to solve problems while wrestling with chronic worry and a delightfully messy organizational
    style.
background:
  cultural: Nina grew up in a middle‑class, white suburban community in Central Florida, where Southern hospitality and a strong sense of local identity shaped her values. Family gatherings often featured
    backyard barbecues, church potlucks, and community festivals celebrating Florida's natural heritage. Though her background is largely mainstream American, her career as a social worker has exposed her
    to a wide range of cultures and socioeconomic groups, fostering a respectful appreciation for diversity while retaining her roots in the laid‑back, community‑oriented lifestyle of Land O Lakes.
attributes:
  skills: '[''Case Management'', ''Crisis Intervention'', ''Community Resource Navigation'', ''Client Advocacy'', ''Trauma-Informed Care'', ''Conflict Mediation'', ''Risk Assessment'']'
  hobbies: '[''Gardening'', ''Reading mystery and psychological thrillers'', ''Dog walking'', ''Journaling'', ''Yoga and mindfulness meditation'', ''Volunteering at animal shelter'']'
  career_goals: Nina aims to earn a Bachelor of Social Work within the next three years to qualify for a supervisory role. She aspires to become a program director for a community mental‑health outreach
    initiative focused on at‑risk youth and families in Pasco County. Additionally, she seeks certification in trauma‑informed care and wants to improve her organizational skills to lead a competitive,
    high‑performing team. Long‑term, she envisions shaping policy at the county level to enhance support services for marginalized groups while maintaining a hands‑on presence in direct client work.
