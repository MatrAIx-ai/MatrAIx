  career_goals: Looking ahead, Jose aims to transition into a leadership role within his call center, targeting a team lead or trainer position where he can shape onboarding curricula that emphasize empathy,
    cultural sensitivity, and innovative problem‑solving. He is pursuing a Certified Customer Experience Professional credential and plans to leverage his competitive drive to achieve top‑tier performance
    metrics. Long‑term, he envisions a partial shift toward community outreach, partnering with local arts organizations to create customer‑service‑informed programs that connect seniors and immigrants
    with cultural events, while also preparing for a phased retirement that allows him to devote more time to his artistic interests.
