personas:
  professional: Premnath Winston, a 40‑year‑old master cabinetmaker with a STEM foundation, blends precision joinery and CAD‑driven CNC routing to craft sustainably sourced, technology‑infused furniture
    while mentoring apprentices and juggling meticulous project estimates.
  sports: Premnath Winston regularly hikes the Patapsco Valley State Park trails, supports the Baltimore Ravens and Washington Nationals, and engages in a weekend intramural soccer league with the local
    craftsmen’s club, balancing competitive drive with scenic exercise.
  arts: Premnath Winston frequents contemporary galleries like the Baltimore Museum of Art and Whitney Hall, draws creative sparks from live jazz sessions featuring Kamasi Washington and Nina Simone, and
    studies works by Mark Bradford and Ai Weiwei to inform his furniture aesthetics.
  travel: Premnath Winston prefers purposeful road trips to the Blue Ridge Mountains and curated cultural visits to Barbados and Jamaica, where he explores local woodworking studios and spice markets, yet
    balances this curiosity with family commitments that limit extended travel.
  culinary: Premnath Winston cooks Maryland crab cakes seasoned with Old Bay alongside jerk‑spiced chicken and plantain purée, showcasing a solid intermediate skill level that blends traditional seafood
    comfort with vibrant Caribbean flavors.
  core: Premnath Winston is a fiercely curious, competitively driven artisan who balances meticulous craftsmanship with a healthy skepticism of shortcuts, often over‑engineering projects while indulging
    in jazz, hiking, and culinary experiments.
background:
  cultural: Premnath identifies as African American and grew up in a close‑knit church community in the Baltimore‑Washington corridor. His family heritage includes ties to the historic Black neighborhoods
    of Howard County, as well as Caribbean influences from a maternal grandmother who emigrated from Jamaica. The diverse elements of his name—Premnath, Lee, and Winston—reflect a multicultural lineage
    that blends South Asian, East Asian, and European ancestries, fostering an inclusive worldview. He celebrates African American traditions through music, storytelling, and community festivals, while
    also honoring the culinary and rhythmic legacies of his Caribbean relatives. Living in Ellicott City, he engages with a vibrant, historically diverse suburb that values both preservation of heritage
    and forward‑looking innovation.
