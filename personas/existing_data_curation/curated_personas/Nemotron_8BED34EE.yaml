  career_goals: Premnath aims to transform his passion for craft into a boutique furniture studio that showcases a signature line of sustainably sourced, technologically integrated pieces. He envisions
    expanding his workshop to serve both high‑end residential clients and collaborative designers, while offering apprenticeships that blend traditional woodworking with modern digital tools. Over the next
    five years, he hopes to receive recognition from regional design societies, contribute to community education programs at the local community college, and develop a line of smart furniture that incorporates
    discreet electronics for convenience and accessibility.
