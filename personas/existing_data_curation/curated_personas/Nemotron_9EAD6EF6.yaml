  career_goals: As he approaches the next stage of his career, William aims to transition from day-to-day operational management to a strategic mentorship and advisory role. He plans to earn the Certified
    Supply Chain Professional (CSCP) credential and complete his Lean Six Sigma Black Belt certification to stay at the forefront of industry best practices. Passionate about environmental stewardship,
    he intends to spearhead a company-wide green logistics program that reduces carbon emissions by at least 15% within five years. He also hopes to author a practical guidebook on supply-chain efficiency
    for midsize enterprises, sharing his blend of curiosity-driven innovation and proven methodologies. In addition, William seeks to devote part of his time to volunteering, offering logistics expertise
    to local nonprofits, food banks, and disaster-relief initiatives, ultimately shaping a legacy of reliability, collaboration, and community service.
