persona_description: A paleontologist and microbiologist who specializes in the study of ancient diseases and their relationships with modern organisms, particularly those that cause tick-borne diseases.
  This person has a deep understanding of the fossil record and has documented the ancient presence of diseases such as malaria, leishmania, and others. They have a keen interest in understanding the evolutionary
  history of these diseases and their transmission mechanisms. This person is likely to be interested in the discovery of the oldest fossil evidence of Borrelia, the bacteria that cause Lyme disease, and
  its implications for the spread of these diseases over millions of years.
