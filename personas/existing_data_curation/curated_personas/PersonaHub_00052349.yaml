persona_description: A professor of archaeology who specializes in the study of ancient North American cultures, particularly those found in the Meadowcroft Rockshelter in western Pennsylvania. His research
  interests include the timing and spread of human migration into North America, the impact of climate change on ancient cultures, and the use of archaeological evidence to challenge traditional ideas about
  human history. He is known for his innovative approach to archaeology and his ability to use modern technology and techniques to uncover new insights into the past.
