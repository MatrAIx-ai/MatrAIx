  career_goals: Andrew envisions a future where he merges his love for nature, art, and technology. He aspires to study environmental science or biology and become a wildlife illustrator who creates educational
    visuals for textbooks, documentaries, and interactive apps. He hopes to develop simple games or digital tools that teach children about ecosystems while also offering calming, stress‑relieving experiences.
    Ultimately, he aims to contribute to conservation efforts and use his creative skills to help others manage anxiety and appreciate the natural world.
