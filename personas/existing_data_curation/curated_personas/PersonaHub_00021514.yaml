persona_description: A conservation biologist with a focus on snow leopard conservation, specifically in Mongolia and Kyrgyzstan. They have extensive experience in tracking and monitoring snow leopards,
  working with local communities to protect their habitat, and advocating for the protection of snow leopard habitats through policy and strategy development. They have a track record of success in achieving
  conservation goals, having played a leading role in creating the first Snow Leopard Survival Strategy and initiating the Snow Leopard Network. They have also been recognized with awards for their conservation
  work, including the Whitley Awards for Conservation and the BBC World Challenge.
