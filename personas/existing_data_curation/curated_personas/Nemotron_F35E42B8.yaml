  hobbies: '[''Landscape Painting'', ''Quilting'', ''Gardening'', ''Southern Cooking'', ''Historical Fiction Reading'', ''Community Volunteering'', ''Church Choir'', ''Hiking'', ''Podcast Listening'', ''Traveling
    to Historical Sites'']'
  career_goals: Courtney aims to obtain the Certified Dental Assistant (CDA) credential and pursue a specialized certification in dental radiology within the next two years. She plans to enroll in continuing
    education courses focused on orthodontic assistance and cosmetic dentistry to broaden her clinical scope. Long‑term, she envisions moving into a lead dental assistant or office manager role, where she
    can mentor newer staff and streamline practice operations. Courtney also wishes to expand her impact beyond the clinic by coordinating community outreach programs that provide dental health education
    to local schools and senior centers, and she is considering a future transition to a dental hygienist program to deepen her clinical expertise.
