    art workshops", "Volunteer writing mentor", "Collecting vintage cleaning tools"]'
  career_goals: Looking ahead, Doris aims to transition from employee to entrepreneur by launching a boutique cleaning and home‑organization service that emphasizes eco‑conscious practices and a personalized
    aesthetic. She plans to earn the Certified Professional Organizer (CPO) credential and to acquire a small business management certificate to solidify her leadership capabilities. Parallel to her business
    aspirations, Doris wishes to share her artistic side publicly, targeting local gallery exhibitions for her abstract paintings and publishing a chapbook of her poetry centered on everyday rituals. Ultimately,
    she envisions a balanced retirement where she continues to consult for local households, mentors aspiring cleaners, and maintains an active presence in the regional arts community.
