personas:
  professional: Doris Garubo is a veteran residential cleaning specialist who integrates eco‑friendly disinfectants and advanced stain‑extraction techniques with a designer’s eye for symmetry, managing
    client schedules and inventories with military precision while they prepare to launch a boutique cleaning‑and‑organization firm backed by a Certified Professional Organizer credential.
  sports: Doris Garubo enjoys early‑morning hikes along the Blue Ridge Parkway, participates in a local walking club that meets every Saturday, follows the Atlanta Braves for baseball, and subscribes to
    the Appalachian Trail Conservancy's newsletters, treating each trek as both physical exercise and a photography expedition; they also treat weekly Sudoku as a mental sport, but they avoid high‑intensity
    gym sessions due to joint soreness.
  arts: Doris Garubo channels their vivid imagination into abstract canvases inspired by Jackson Pollock’s drip technique, captures Appalachian sunrise light in photographs reminiscent of Ansel Adams, recites
    poetry by Octavia Butler and Emily Dickinson during community library workshops, and curates vintage cleaning tools as sculptural installations, while they keep a close watch on exhibitions at the Southern
    Appalachian Folk Art Museum and the work of local musician Doc Watson.
  travel: Doris Garubo prefers meticulously planned eco‑friendly trips that blend creative inspiration with relaxation, such as weekend retreats in Asheville’s River Arts District, sunrise hikes in Shenandoah
    National Park, and a month‑long cultural immersion in Kyoto’s tea houses, and they keep a leather travel journal of photo locations, though they sometimes give in to spontaneous road‑trip detours to
    family farms in the Hudson Valley.
  culinary: Doris Garubo experiments with fusion cuisine by pairing Appalachian staples like smoked pork shoulder with miso glaze, crafting succulents‑infused quinoa salads seasoned with rosemary and lime,
    and perfecting blackberry‑sage BBQ sauce for grilled chicken, all while they favor heirloom tomatoes, fermented kimchi, and artisanal goat cheese as pantry favorites.
  core: Doris Garubo is a detail‑obsessed, eco‑conscious cleaning entrepreneur whose imagination fuels abstract art, strategic business planning, and a perpetual quest for order despite occasional bouts
    of worry.
background:
  cultural: Raised in the Appalachian foothills of Kanawha County, West Virginia, Doris embodies the region’s blend of modest, working‑class values and a deep appreciation for folk creativity. Her white
    American heritage reflects a family lineage rooted in European immigrant settlers who emphasized self‑reliance, hard work, and community reciprocity. Local traditions such as mountain music, hand‑crafted
    woodworking, and seasonal celebrations have influenced her aesthetic sensibility and practical skill set. While she identifies with broader American cultural norms, Doris’s upbringing in a close‑knit
    town environment nurtured her independent spirit, resilience in the face of stress, and a respect for both traditional craftsmanship and contemporary artistic expression.
