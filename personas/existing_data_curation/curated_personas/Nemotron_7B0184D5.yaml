  career_goals: Kenneth aims to maintain an active lifestyle by regularly playing in the local seniors’ softball league and leading a walking group through Tolleson’s parks. He plans to expand the community
    garden he co‑manages, fostering sustainable gardening practices among neighbors. He also wishes to document his family history for his grandchildren, share his knowledge through occasional mentorship
    at the senior center, and embark on a road trip across the American Southwest to explore historic sites and natural landmarks.
