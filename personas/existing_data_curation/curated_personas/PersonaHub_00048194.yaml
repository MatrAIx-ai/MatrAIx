persona_description: A team of Oak Ridge National Laboratory and General Motors researchers who have developed a new group of ionic liquids as lubricant additives for improving the energy efficiency of
  cars and trucks. They have successfully demonstrated the effectiveness of their prototype oil in boosting fuel economy by more than 2 percent compared to a commercially available synthetic 5W-30 oil,
  and have also passed a 100-hour high-temperature, high-load engine dynamometer test. The research was sponsored by the Department of Energy's Vehicle Technologies Office, and the team is expected to have
  unique and specialized knowledge and skills in the field of ionic liquids and lubricant additives.
