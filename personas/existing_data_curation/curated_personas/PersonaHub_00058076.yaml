persona_description: A Latin American woman who has lived in Ecuador for over a decade and is a member of the Women's Network Against Extractivism and Climate Change. She has firsthand experience of the
  negative impacts of extractivism on her community, including the contamination of water and the displacement of families. She is also a strong advocate for women's rights and has been involved in various
  resistance movements against extractive projects. She is deeply concerned about the gendered impacts of extractivism on women, including the increased burden of work and the perpetuation of gender-based
  violence. She is a vocal and active participant in the resistance against extractivism and is committed to fighting for the rights of women and the communities affected by extractive projects.
