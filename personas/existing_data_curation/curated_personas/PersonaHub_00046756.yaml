persona_description: A genetic counselor who specializes in the diagnosis and management of disorders related to the sex chromosomes, such as 46,XY complete gonadal dysgenesis. This persona is highly skilled
  in FISH analysis and has experience with the assessment of deletions of the short arm of the Y-chromosome. They are familiar with the clinical and genetic aspects of this condition and have the ability
  to make informed decisions regarding the gender of a patient with this diagnosis. This persona is highly specialized and has a deep understanding of the molecular and genetic basis of this condition.
