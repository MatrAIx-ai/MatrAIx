personas:
  professional: Juan Salinas is a veteran journeyman electrician who leverages deep code knowledge, solar and smart-home expertise, and an artistic eye for lighting to deliver residential and small-commercial
    projects, even though their relaxed attitude toward scheduling often leaves paperwork trailing behind.
  sports: Juan Salinas follows the Washington Commanders and the Wizards, joins a Saturday-morning pick-up basketball game at the community center, and jogs along the Potomac when the weather permits, although
    long workdays often cause them to skip workouts.
  arts: Juan Salinas frequents DC's contemporary art galleries, captures low-light architectural scenes inspired by Ansel Adams, and spends evenings listening to classic rock and mariachi while sketching
    lighting concepts influenced by vibrant mural art.
  travel: Juan Salinas delights in weekend drives to Annapolis' historic waterfront, has toured Oaxaca's culinary festivals, admired Barcelona's Sagrada Familia architecture, and dreams of exploring Iceland's
    geothermal power sites, though family obligations sometimes limit travel time.
  culinary: Juan Salinas enjoys preparing mole poblano, hand-made tamales, and grilled carne asada using fresh chilies and corn masa, often experimenting with a small solar oven for slow-cooked dishes,
    yet they sometimes over-season in a rush before a job.
  core: Juan Salinas blends a seasoned electrician's precision with an artist's love of light, constantly juggling DIY lighting projects, impulsive gear splurges, and a habit of worrying about deadlines
    while chasing sustainable design.
background:
  cultural: Juan is a first‑generation Mexican‑American, born to parents who emigrated from Veracruz in the 1970s. Growing up in a bilingual household in the Washington, D.C. metropolitan area, he retains
    strong ties to Mexican traditions—celebrating Día de los Muertos, preparing family recipes, and listening to mariachi and norteña music. Living in Hyattsville’s multicultural community, he blends his
    heritage with influences from the diverse neighborhoods of Prince George’s County, actively participating in local Latino events and community initiatives. His cultural identity informs his appreciation
    for vibrant visual arts and his commitment to family, which shapes both his personal and professional pursuits.
attributes:
  skills: '[''Residential wiring'', ''Commercial wiring'', ''NEC compliance'', ''Blueprint reading'', ''Electrical troubleshooting'', ''Solar PV installation'', ''Smart home automation'', ''Low‑voltage
    lighting design'', ''Motor control systems'', ''Safety inspections'', ''Apprentice mentorship'']'
  hobbies: '[''Low‑light and architectural photography'', ''Visiting art galleries and Mexican cultural festivals'', ''DIY lighting projects and vintage lamp restoration'', ''Arduino and smart home prototyping'',
    ''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Gardening with solar‑powered lighting'', ''Volunteer electrical safety teaching'', ''Reading about renewable energy and smart tech'', ''Listening
    to classic rock'']'
  career_goals: Juan aims to transition from a staff electrician to a licensed electrical contractor, establishing his own boutique firm that focuses on energy‑efficient lighting design and solar installations
    for residential and small‑business clients. He plans to obtain a master electrician license and certifications in LEED and Energy Star, positioning his business at the intersection of sustainability
    and aesthetics. By leveraging his love of art, he hopes to offer custom lighting solutions that enhance interior spaces, especially for cultural events and home art displays. He intends to structure
    his practice to allow flexible scheduling, reflecting his preference for adaptability over rigid planning. Additionally, he aspires to mentor the next generation of electricians through workshops at
    the local community college, blending his technical expertise with his competitive drive to be recognized as a leading innovator in the Prince George’s County electrical market.
