  career_goals: Shamila aims to advance from her current secretarial role to an executive assistant position supporting senior leadership within a dynamic, multicultural organization. She plans to complete
    a bachelor's degree in Business Administration while obtaining certifications in project management and advanced Excel. Her long‑term ambition is to transition into office management or operations coordination,
    leveraging her organizational expertise to streamline processes and mentor junior administrative staff. She also hopes to contribute to community‑focused initiatives that support South Asian immigrant
    families in the New Jersey area.
