  career_goals: Heather aims to graduate high school and attend a community college where she will study environmental engineering or a related technical field. She hopes to combine her curiosity about
    sustainable solutions with her practical skills to work on local infrastructure projects that improve her hometown. In the longer term, she envisions a role as a project manager or consultant for community
    development, possibly starting her own small business focused on eco‑friendly home improvements.
