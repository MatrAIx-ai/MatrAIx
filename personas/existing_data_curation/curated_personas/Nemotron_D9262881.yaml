personas:
  professional: Heather Smith, a 16‑year‑old aspiring environmental engineer, leverages her knack for organization and hands‑on projects to lead her school's sustainability club, coordinate community garden
    events, and blend methodical problem‑solving with a curiosity for green technology.
  sports: Heather Smith enjoys weekend hikes on the Belmont trail system, participates in the local middle‑school cross‑country team, cheers for the Boston Red Sox and Boston Celtics, and incorporates low‑impact
    cardio and occasional yoga sessions into their routine to stay fit and stress‑free.
  arts: Heather Smith captures the changing seasons through digital photography inspired by Ansel Adams, strums acoustic covers of Joni Mitchell and the Indigo Girls on guitar, sketches tranquil forest
    scenes, and devours mystery novels by Agatha Christie and sci‑fi classics by Isaac Asimov, weaving these artistic influences into her everyday creativity.
  travel: Heather Smith favors short, budget‑friendly road trips to New England coastal towns such as Portland, Maine, and historic Boston, has already visited Acadia National Park, and dreams of a future
    backpacking adventure across Iceland’s volcanic landscapes once college finances allow.
  culinary: Heather Smith experiments with rustic baking, perfecting chocolate‑chip oatmeal cookies and rosemary‑infused focaccia, while also creating farm‑to‑table meals like quinoa‑stuffed bell peppers
    with fresh basil and lemon zest, showcasing a growing confidence in both sweet and savory home cooking.
  core: Heather Smith is a methodical teen juggling green‑tech ambitions, acoustic melodies, and occasional impulsive gadget buys, all while keeping a meticulously organized schedule and a bookshelf overflowing
    with mysteries.
background:
  cultural: Heather was born and raised in Belmont, a small, close‑knit community in Kent County, Michigan. Her family has deep roots in the Midwest, with a blend of German and Scandinavian ancestry that
    shapes her appreciation for seasonal festivals, hearty home‑cooked meals, and community involvement. The values of hard work, modesty, and self‑reliance common in the region are reflected in her everyday
    life, as is the strong sense of local identity fostered by school events, church gatherings, and volunteer activities.
