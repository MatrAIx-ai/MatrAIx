personas:
  professional: John Graham is a seasoned diesel‑engine specialist who combines meticulous diagnostic precision with a relaxed, people‑focused workshop style, mentoring junior mechanics while they juggle
    blueprint reading, EPA compliance, and parts inventory as they aim for a foreman role and eventually a mobile green‑diesel repair service.
  sports: John Graham is a regular participant in recreational soccer leagues and a loyal supporter of the Chicago Bears and Chicago Cubs, often joining neighborhood block‑party pick‑up games and fishing
    on Lake Michigan, activities which they enjoy to stay active and socially connected.
  arts: John Graham strums an acoustic guitar at community gatherings, drawing inspiration from folk‑rock artists like Bob Dylan and local blues bands, while they also appreciate the aesthetic of classic
    car shows and attend regional DIY workshops that blend craftsmanship with creative expression.
  travel: John Graham prefers road‑trip itineraries that combine fishing excursions on Lake Michigan’s shoreline with visits to automotive museums in Detroit and green‑diesel tech expos in Stuttgart, balancing
    a modest budget with a desire to explore both local nature and international industry hubs, which they plan with a mix of structure and spontaneity.
  culinary: John Graham enjoys grilling walleye, smoked bratwurst, and seasonal corn on the cob, often seasoning with hickory smoke and a dash of garlic, and while they can fire up a decent burger, they
    admit to over‑indulging in late‑night chipotle‑spiced ribs after a long day in the shop.
  core: John Graham blends a hands‑on love of diesel mechanics with a community‑first mindset, juggling structured work goals and spontaneous weekend truck restorations while they keep a friendly, reliable
    presence at every block party.
background:
  cultural: John grew up in the Chicago suburbs of Glenview, in a family of German and Irish descent. The Midwestern culture of his upbringing emphasizes practicality, a strong work ethic, and a deep sense
    of community. Neighborhood gatherings, local sports leagues, and church events were a regular part of his life, fostering his sociable and compassionate nature. Family traditions include holiday barbecues,
    volunteer service, and a respect for skilled craftsmanship, all of which continue to influence his personal and professional values.
attributes:
  skills: '["Diesel engine diagnostics", "Heavy‑duty vehicle repair", "Hydraulic system maintenance", "Welding and metal fabrication", "Preventive maintenance scheduling", "Parts inventory management",
    "EPA emissions compliance", "Shop management software (e.g., Mitchell 1)", "Customer service and communication", "Team leadership and mentoring"]'
  hobbies: '["Classic truck restoration", "Recreational soccer", "Fishing on Lake Michigan", "Barbecue grilling", "Volunteer bus safety education", "Attending car shows", "Playing acoustic guitar", "Neighborhood
    block parties", "Hiking in nearby nature preserves", "DIY home improvement projects"]'
  career_goals: John aims to become a shop foreman and later open his own mobile diesel‑repair service that offers affordable, community‑focused maintenance for local bus fleets and small truck owners.
    He plans to obtain ASE Master Technician certification and a diesel‑engine instructor credential, allowing him to train apprentices and lead community workshops on vehicle safety. Long‑term, he hopes
    to incorporate emerging green‑diesel technologies, positioning his business at the intersection of sustainability and reliable transportation.
