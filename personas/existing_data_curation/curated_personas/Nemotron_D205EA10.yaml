  career_goals: 'At 49, Anthony aims to transition into a senior management role where he can influence strategic direction while maintaining a balanced work‑life rhythm. He hopes to lead larger teams,
    oversee multiple locations, and implement sustainability initiatives that align with Hawaii’s environmental values. Mentoring the next generation of managers is a key ambition, and he also plans to
    secure a stable financial foundation for his family’s future retirement.

