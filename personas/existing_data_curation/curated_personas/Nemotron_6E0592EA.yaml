  hobbies: '[''drawing and coloring'', ''building with wooden blocks'', ''collecting leaves and stones'', ''nature walks in the forest'', ''listening to library storytime'', ''solving puzzles'', ''singing
    simple songs'']'
  career_goals: Although only four, Janette already dreams of a future where she can keep things tidy and create beautiful things. She imagines becoming an artist who paints colorful pictures of the forest,
    or a teacher who shares knowledge while keeping her classroom organized. She is eager to learn to read fluently, write stories, and maintain the high standards she sets for herself in school.
