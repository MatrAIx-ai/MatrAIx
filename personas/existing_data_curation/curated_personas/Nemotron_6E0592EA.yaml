personas:
  professional: Janette Hensel, a budding little architect, channels her curiosity for new ideas into meticulously arranging building blocks, turning playtime into disciplined projects that satisfy her
    high standards for achievement.
  sports: Janette Hensel, a member of the ‘Little Lions’ preschool soccer team and the ‘Tiny Titans’ gymnastics club, enjoys short bursts of structured activity, prefers practicing dribbling drills over
    large crowds, and cheers for the Seattle Seahawks as a symbol of teamwork.
  arts: Janette Hensel, an avid young colorist, spends hours recreating Monet’s water lilies in large crayons and delights in listening to Raffi’s ‘Baby Beluga’ while dancing to the playful melodies of
    the Children’s Philharmonic, shaping her identity through vibrant visual and musical experiences.
  travel: Janette Hensel, who loves exploring new playgrounds, has visited the city zoo and a nearby beach, enjoys the sensory adventure of a family road trip to the Grand Canyon, and dreams of one day
    stepping foot in Disneyland for a magical treasure‑hunt.
  culinary: Janette Hensel, a picky yet adventurous eater, favors peanut butter‑banana sandwiches, carrot sticks with hummus, and proudly helps stir pancake batter, often requesting extra blueberries on
    top of her fluffy pancakes.
  core: Janette Hensel, a meticulously organized four‑year‑old explorer, balances boundless curiosity with disciplined routines, turning even simple play into tiny projects while quietly preferring solitary
    adventures.
background:
  cultural: Janette comes from a white, German‑American family that has lived in Twisp, Washington, for several generations. Twisp is a small, rural community in Okanogan County known for its dense forests,
    rivers, and close‑knit neighborly ties. Her family values the Pacific Northwest ethos of self‑reliance, outdoor recreation, and respect for nature, while also celebrating traditional American holidays
    and occasional German customs passed down through her grandparents. Local cultural influences include exposure to Indigenous stories and crafts through school programs and community events, giving her
    an early appreciation for the diverse heritage of her region.
attributes:
