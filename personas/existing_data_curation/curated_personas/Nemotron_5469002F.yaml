personas:
  professional: Herbert Crawford is a budding tech enthusiast who builds Raspberry Pi projects, codes simple games, and volunteers to teach seniors basic computer skills, blending their curiosity with a
    practical, organized approach and assertive yet compassionate communication style.
  sports: Herbert Crawford plays on the Sun City middle school basketball team, follows the Phoenix Suns and Arizona Diamondbacks, and spends weekends hiking the desert trails of the Desert Botanical Garden,
    combining a love for team sport with solo outdoor fitness.
  arts: Herbert Crawford captures desert sunsets with a DSLR, draws inspiration from Ansel Adams and cinematographer Emmanuel Lubezki, and enjoys listening to classic rock legends like Bruce Springsteen
    and country icons like Willie Nelson while working on DIY woodworking projects.
  travel: Herbert Crawford prefers short road trips to nearby natural wonders such as Sedona’s red rocks, the Grand Canyon, and seasonal visits to the Las Vegas Strip, planning trips spontaneously yet ensuring
    there’s enough saved allowance for fuel and snacks.
  culinary: Herbert Crawford relishes backyard barbecues featuring smoky grilled chicken thighs marinated in chipotle, fresh corn on the cob, and homemade guacamole with ripe avocados and lime, while occasionally
    experimenting with a DIY desert‑infused s’mores recipe using prickly pear jam.
  core: Herbert Crawford is a tech‑savvy desert teen who balances curiosity with practicality, channels their energy into Raspberry Pi tinkering, basketball, and community service, yet sometimes overindulges
    in video games and impulsive snack runs.
background:
  cultural: Herbert is a white American teen from the Sun City area of Arizona, a region known for its desert environment and a strong community of retirees. His family roots trace back to the Midwest,
    bringing a blend of traditional American values—self‑reliance, respect for hard work, and community involvement—with the laid‑back, outdoor‑focused lifestyle of the Southwest. He celebrates typical
    American holidays like the Fourth of July with backyard barbecues and enjoys local cultural touchstones such as desert hiking, watching summer baseball, and listening to classic rock and country music
    that echo his community's intergenerational ties.
