personas:
  professional: Dabin Hwang, a 23‑year‑old hospitality attendant, leverages meticulous time‑management, bilingual fluency, and a flair for AV setup to deliver flawless guest experiences while eyeing a shift‑supervisor
    role within a year.
  sports: Dabin Hwang, a 23‑year‑old who relishes weekend hikes on the Billy Baker Trail, follows the Baltimore Ravens and Washington Capitals, and mixes occasional pick‑up basketball at a community gym
    with a regimented morning stretch routine to counteract work‑related stress.
  arts: Dabin Hwang, a 23‑year‑old visual enthusiast, deconstructs BTS music videos for production ideas, captures urban moments through street photography, devours sci‑fi novels by Liu Cixin and N. K. Jemisin,
    and experiments with graphic design inspired by Adobe’s tutorials.
  travel: Dabin Hwang, a 23‑year‑old whose travel style blends meticulous itinerary planning with spontaneous side‑trips, has trekked the Appalachian Trail, explored the bustling streets of Tokyo on a budget
    backpacking trip, and dreams of attending a music festival in Berlin next summer.
  culinary: Dabin Hwang, a 23‑year‑old home‑chef, masters the spicy balance of kimchi‑jjigae and the delicate art of bibimbap using gochujang, sesame oil, and fresh vegetables, while occasionally treating
    friends to experimental fusion plates that pair bulgogi glaze with quinoa.
  core: Dabin Hwang, a 23‑year‑old methodical planner with a competitive edge, channels their love for strategic games into precise work routines, yet constantly battles a habit of over‑thinking that fuels
    both precision and occasional paralysis.
background:
  cultural: Dabin is a second‑generation Korean‑American raised in Ellicott City, Maryland. His household maintained Korean language, cuisine, and celebrations such as Chuseok and Lunar New Year, instilling
    a strong work ethic and respect for family. Fluent in both Korean and English, he navigates the intersection of Korean cultural expectations and American social norms. This dual heritage influences
    his interests in K‑pop, Korean cooking, and community‑focused events, while also shaping his pragmatic, organized approach to both personal and professional life.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Operation'', ''Event Coordination'', ''Audio-Visual Equipment Setup'', ''Bilingual Communication (Korean/English)'', ''Time Management'',
    ''Conflict Resolution'', ''Inventory Management'', ''Stress Management'']'
  hobbies: '[''Playing strategy video games'', ''Listening to K-pop and analyzing music videos'', ''Photography'', ''Cooking Korean cuisine'', ''Graphic design'', ''Reading sci-fi novels'', ''Hiking local
    trails'', ''Meditation'']'
  career_goals: Driven by a competitive streak and a practical outlook, Dabin aims to advance from his current attendant role to a shift supervisor within the next year, then to venue manager. He plans
    to enroll in a part‑time Hospitality Management program to gain formal credentials and eventually pursue a certification in event production. His long‑term ambition is to lead an entertainment venue
    that regularly showcases Korean cultural events, blending his heritage with mainstream entertainment to attract a broader audience. He also hopes to mentor new staff, fostering a disciplined yet innovative
    work culture.
