persona_description: A historian who specializes in the history of the lumber industry in Minnesota, particularly focusing on the early days of commercial lumbering in the state and the impact of steam
  power on the industry. Their research interests include the development of the sawmill industry, the role of steam power in the growth of the industry, the impact of the invention of the band saw on the
  industry, and the growth of logging camps and log drivers in the state. They are also interested in the environmental impact of the industry, particularly the impact of forest fires on northern communities
  and the need for conservation measures.
