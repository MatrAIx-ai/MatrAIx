personas:
  professional: John Wenger is a meticulous cultural program coordinator who leverages a humanities background and expert-level writing to craft inclusive museum exhibitions and community workshops; their
    methodical mindset, strong organizational skills, and high emotional sensitivity translate into detailed project plans, precise content curation, and compassionate stakeholder engagement.
  sports: John Wenger stays active by hiking the Marin Headlands and Muir Woods in the spring, practicing weekly vinyasa yoga with the Bay Area Yoga Collective, and joining a casual Friday night pick‑up
    basketball league that supports the local youth center; they are an avid fan of the Golden State Warriors and San Francisco Giants and follow the San Jose Earthquakes during the MLS season.
  arts: John Wenger frequents the San Francisco Museum of Modern Art and the de Young, draws creative fuel from Ansel Adams' black‑and‑white landscapes and the vibrant installations of Mark Bradford, reads
    contemporary fiction by Colson Whitehead and philosophical essays by Martha Nussbaum, and writes poetry while listening to Bon Iver and the spoken‑word performances of poet Andrea Gibson.
  travel: John Wenger prefers thoughtfully planned trips that balance adventure with downtime, often using public transit and Airbnb rentals to explore places like Napa Valley’s vineyards, Portland’s indie
    art scene, and Kyoto’s historic temples, while dreaming of a future solo trek through Iceland’s volcanic landscapes and a relaxed retreat in New Zealand’s fjord region.
  culinary: John Wenger enjoys experimenting in the kitchen at an intermediate skill level, often preparing Thai green curry with fresh lemongrass and kaffir lime leaves, homemade kimchi fried rice with
    gochujang, and a classic Italian shakshuka using heirloom tomatoes and feta; they savor sourcing ingredients at farmer’s markets and occasionally splurge on a high‑quality Japanese steel knife for precise
    chopping.
  core: John Wenger, a 32‑year‑old Bay Area cultural enthusiast, blends meticulous organization with poetic sensitivity, channeling anxiety into art, community service, and thoughtful living.
background:
  cultural: John grew up in a middle‑class, white‑American family in the Bay Area, with ancestral roots in German and Irish heritage. His upbringing emphasized education, self‑reliance, and community involvement.
    Living in San Francisco has exposed him to a progressive, multicultural environment that values diversity, sustainability, and artistic expression. He aligns with contemporary urban culture—frequenting
    independent coffee shops, supporting local artisans, and advocating for social justice—while maintaining a practical, organized mindset shaped by his family’s work ethic.
