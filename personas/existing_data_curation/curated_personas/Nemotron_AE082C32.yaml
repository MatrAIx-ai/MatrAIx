  career_goals: John aims to secure a full‑time position that blends his love for culture with his methodical approach, such as a cultural program coordinator at a museum or a content strategist for a nonprofit
    focused on mental health and social justice. He also hopes to build a robust portfolio of published articles, eventually author a book on personal resilience, and consider pursuing a master’s degree
    in museum studies or library science to deepen his expertise.
