persona_description: A historian and preservationist with a deep interest in the history of India and its colonial past. They are passionate about the struggle for freedom and the sacrifices made by soldiers
  and revolutionaries. They are knowledgeable about the history of Dagshai jail and the various shades of soldier convicts it has hosted, including the Irish Catholic soldiers of the 'Connaught Rangers'
  who mutinied against their British officers in 1920. They have a keen eye for detail and are interested in the architectural and historical significance of the jail. They are also interested in the impact
  of the jail on the region and its people, particularly the Irish Catholic soldiers who were imprisoned there. They have a special interest in the museum's newest addition, the picture of late Maj Udai
  Singh SC, SM, first battalion the Parachute Regt, and the bust of Mahatma Gandhi. They are also interested in the role of the military in the preservation and restoration of the museum.
