personas:
  professional: Tariq Herman, a retired civil engineer with four decades of experience in road and bridge design, leverages their methodical problem‑solving, community‑first mindset, and knack for mentoring
    to lead intergenerational STEM workshops and guide younger engineers through hands‑on projects, often using their Excel‑Python data analysis skills to illustrate real‑world infrastructure challenges.
  sports: Tariq Herman stays active by walking the town’s historic river trail each morning, cheering on the Chicago Cubs during baseball season, attending Illinois State Redbirds basketball games with
    their bridge club, and volunteering as a scorekeeper for the local senior‑center bowling league, where they enjoy friendly competition and light exercise.
  arts: Tariq Herman finds artistic inspiration in painting watercolors of their heirloom tomato garden, listening to folk legends like Bob Dylan and Joan Baez while building model railways, and attending
    community theater productions featuring local actors such as Susan Miller, which they consider vital to their balanced, reflective life.
  travel: Tariq Herman prefers well‑charted road trips that combine scenic drives along Route 66 with visits to historic sites such as Gettysburg and the Scottish Highlands, often planning itineraries on
    a spreadsheet to maximize time with grandchildren while staying within a modest senior‑friendly budget, and they dream of a leisurely cruise along the Norwegian fjords when health permits.
  culinary: Tariq Herman, an avid gardener, loves cooking fresh heirloom tomato bruschetta with garlic, basil, and mozzarella, enjoys slow‑cooking beef stew enriched with carrots and potatoes, and occasionally
    experiments with homemade sourdough bread, though they sometimes forget to turn off the oven after a long workshop.
  core: Tariq Herman blends seasoned engineering precision with a warm community spirit, turning a love for model railways and heirloom tomatoes into a lifelong mission of mentorship, modest savings, and
    gentle activism—all while occasionally misplacing their reading glasses on the workshop bench.
background:
  cultural: Tariq is a white Midwesterner of German and Irish ancestry, raised in a small town near Springfield during the post‑World War II era. The region's emphasis on community, modesty, and practical
    problem‑solving shaped his values. He regularly attends his local Methodist church, participates in county fairs, and values traditions such as volunteer service and neighborhood cooperation. While
    he respects these longstanding customs, his curiosity drives him to explore new ideas and technologies, integrating them into his daily life in ways that benefit both his family and the broader community.
attributes:
  skills: '["Civil engineering design", "Structural analysis", "Project management", "GIS mapping", "Data analysis (Excel, Python)", "Carpentry and woodworking", "Volunteer coordination", "Public speaking"]'
  hobbies: '["gardening", "model railroading", "woodworking", "historical preservation", "playing bridge", "birdwatching", "reading popular science", "home automation tinkering"]'
  career_goals: Although retired, Tariq aims to give back by mentoring younger engineers and hobbyists through local community college programs and senior‑center workshops. He plans to compile his professional
    experiences into a memoir that highlights practical problem‑solving in public infrastructure, hoping it will serve as a resource for students. He also aspires to lead community sustainability projects,
    such as installing solar panels on the neighborhood garden and renovating the senior center's accessibility features. Supporting his grandchildren's STEM education and staying socially active through
    volunteering and group activities remain top priorities.
