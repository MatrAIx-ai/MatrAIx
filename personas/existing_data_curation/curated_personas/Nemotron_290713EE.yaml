personas:
  professional: Fernando Martinez is a budding graphic designer who blends hand‑drawn murals with digital illustration, leveraging Adobe Photoshop and Illustrator while applying an organized, methodical
    workflow to deliver culturally infused branding projects for community events; they capitalize on bilingual fluency to communicate with diverse clients and plan each assignment with meticulous timelines.
  sports: Fernando Martinez follows the Houston Astros and the Houston Rockets, plays pickup soccer at the local park every Saturday, practices skateboarding during summer break, and they approach fitness
    with a competitive mindset that pushes them to improve their footwork and balance while balancing social time with personal training routines.
  arts: Fernando Martinez immerses themselves in mural sketching, comic panel creation, and street photography, drawing inspiration from the bold colors of Frida Kahlo, the narrative depth of Hayao Miyazaki,
    the rhythmic beats of Tame Impala, and the storytelling of graphic novels like 'Saga', while regularly attending exhibitions at the Houston Museum of Fine Arts to broaden their visual vocabulary, and
    they continuously expand their artistic repertoire through community festivals.
  travel: Fernando Martinez prefers a blend of detailed itineraries and spontaneous detours, having explored Austin’s music scene, San Antonio’s historic River Walk, and a family trip to Mexico City’s vibrant
    street markets, while dreaming of visiting New York’s MoMA and the coastal villages of Portugal when a scholarship or freelance project funds the journey, and they often map out routes using both online
    guides and handwritten notes.
  culinary: Fernando Martinez experiments in the kitchen by fusing family‑heritage recipes with modern flavors, crafting chipotle‑marinated pork tacos topped with avocado‑lime crema and miso‑infused salsa,
    perfecting chilaquiles with a sprinkle of cotija cheese, and occasionally daring to pair kimchi with quesadilla fillings, reflecting an intermediate cooking skill level and a love for bold ingredient
    pairings, and they often tweak recipes on the fly based on seasonal produce.
  core: Fernando Martinez is a methodical teen artist who balances a competitive drive with a curiosity for blending tradition and technology, occasionally splurges on art supplies, battles occasional acne,
    lives by a schedule that mixes mural work, coding experiments, and indie music playlists, and they often lose track of time while sketching.
background:
  cultural: Fernando grew up in a Mexican‑American household in Houston’s vibrant East End, where Spanish was spoken at home alongside English. Family traditions such as Día de los Muertos, Mexican Independence
    Day celebrations, and weekend visits to local taquerías shaped his sense of identity. He often incorporates the bold colors and storytelling style of Mexican muralists into his artwork. The multicultural
    environment of Houston, with its large Latino community and dynamic art scene, has nurtured his appreciation for both his heritage and contemporary global influences.
attributes:
  skills: '["Digital illustration", "Graphic design (Adobe Photoshop, Illustrator)", "Bilingual communication (English, Spanish)", "Basic coding (HTML, CSS, JavaScript)", "Photography and photo editing",
    "Organizational planning", "DIY electronics (Arduino basics)"]'
  hobbies: '["Sketching murals and comic panels", "Visiting art galleries and museums", "Photography of urban and cultural scenes", "Digital photo editing", "Cooking fusion Mexican dishes", "Listening to
    Latin jazz and indie music", "Reading graphic novels and sci‑fi comics", "Building Arduino projects", "Participating in community art festivals"]'
  career_goals: Fernando aims to earn his GED within the next year and enrol in a graphic design certificate program at Houston Community College. He hopes to build a strong portfolio that showcases his
    unique fusion of contemporary illustration and traditional Mexican visual elements, eventually securing a junior designer position at a creative agency or a freelance contract with local cultural organizations.
    Long‑term, he dreams of launching his own boutique studio that offers branding, illustration, and UI/UX design services for start‑ups and community events, while also mentoring other youth from underrepresented
    backgrounds who share his love for art and technology.
