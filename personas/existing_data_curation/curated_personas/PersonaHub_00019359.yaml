persona_description: A geodetic surveyor who specializes in the principles and techniques of open and random traverses, and is skilled in the use of electronic distance-measuring devices for angle measurements
  and azimuth determination. They are experienced in the use of triangulation for measuring angles of triangles, and have a unique ability to compute the direction of a traverse and the position of control
  points using the angles and length of traverse sides. They also have knowledge and experience in the use of astronomical observations for azimuth measurements.
