persona_description: A professional with expertise in remote sensing and photogrammetry, who is interested in the integration of these technologies with digital cartography. This individual is likely to
  be a GIS specialist or a geospatial data analyst who has worked with remote sensing data and has a background in photogrammetry. They may have experience in developing spatial data storage, data merging
  and manipulation methods, and other techniques originally developed for remote sensing applications. This person may also be familiar with the introduction of improved digital processing techniques and
  the ability to digitally mosaick traditional Landsat images into excellent quality 1:250,000-scale image maps.
