  hobbies: '[''Gardening'', ''Reading historical fiction and leadership non‑fiction'', ''Cooking New England cuisine'', ''Volunteering at a food bank'', ''Mentoring middle‑school girls in STEM'', ''Hiking
    coastal trails'', ''Yoga and mindfulness'']'
  career_goals: Felicia aims to transition into a senior executive role, such as Director of Operations or Vice President of Organizational Development, where she can shape a culture of inclusivity, mentorship,
    and operational excellence. She is passionate about launching a company‑wide mentorship program that pairs emerging talent with seasoned professionals, especially encouraging women and underrepresented
    groups in STEM. In the longer term, she envisions leading a community‑focused initiative that links corporate social responsibility with local education, leveraging her managerial expertise to create
    sustainable, measurable impact while preparing for a phased retirement that includes advisory consulting for nonprofit STEM outreach.
