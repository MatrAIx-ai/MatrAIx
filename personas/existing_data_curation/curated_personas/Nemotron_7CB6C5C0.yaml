personas:
  professional: Felicia Darrington, a data‑driven engineering manager with a knack for strategic planning and process optimization, blends structured decision‑making with compassionate mentorship to lead
    cross‑functional teams toward operational excellence.
  sports: Felicia Darrington, a devoted member of the Rhode Island Coastal Hike Club, incorporates weekly trail walks and occasional yoga sessions into her routine, while cheering on the Providence Bruins
    in hockey and the New England Patriots during football season, embodying a balanced, low‑impact approach to fitness.
  arts: Felicia Darrington, an avid reader of historical fiction and admirer of New England cultural heritage, frequently attends Trinity Rep performances, listens to folk‑rock artist Nathaniel Rateliff,
    and finds inspiration in Winslow Homer's seascapes, weaving the arts into her personal and professional creativity.
  travel: Felicia Darrington plans her trips with meticulous itineraries, favoring historically rich destinations such as Boston, Williamsburg, and the English countryside, while also seeking sustainable
    retreats in Costa Rica, balancing purposeful exploration with family‑focused relaxation.
  culinary: Felicia Darrington, a confident home chef, masterfully prepares New England staples like lobster bisque, cedar‑plank salmon, and roasted heirloom tomatoes, pairing each dish with locally sourced
    herbs such as dill and tarragon, and delights in hosting intimate dinner parties for friends and family.
  core: Felicia Darrington blends analytical precision with heartfelt mentorship, cultivating thriving gardens, data‑driven teams, and community connections while occasionally hoarding heirloom seed packets
    like hidden treasures.
background:
  cultural: Felicia was raised in a middle‑class New England family in the Providence suburbs. Her parents, both public‑school teachers, instilled a strong work ethic, respect for education, and a commitment
    to civic duty. The family tradition includes celebrating community events such as Fourth of July parades, Thanksgiving gatherings with extended relatives, and seasonal town clean‑ups. Although she grew
    up in a Protestant (Congregational) setting, she now identifies as spiritually eclectic, valuing the region's emphasis on independence, community service, and pragmatic self‑reliance. Living in Barrington,
    a diverse and affluent town, she has incorporated the multicultural influences of nearby Providence into her collaborative and compassionate approach to both professional and personal life.
