  career_goals: Tien dreams of becoming a scientist or engineer who designs tools to protect the ocean, reflecting his love for Miami's beaches and his practical mindset. He also imagines working as a community
    educator, helping younger kids learn to code. He wants a career that lets him solve real-world problems while providing stability for his family, aligning with his practical side. He aspires to earn
    respect through hard work and to have a job that lets him continue exploring new ideas.
