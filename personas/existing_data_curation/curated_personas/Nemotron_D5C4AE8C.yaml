personas:
  professional: Tien Chow, a budding junior inventor, channels their curiosity and practicality into building elaborate Lego machines, tinkering with chemistry kits, and devising programmable solutions
    for the school robotics club, all while balancing meticulous organization with the flexibility to improvise.
  sports: Tien Chow, an energetic member of the Lakeview Tigers youth soccer team and a regular at the community pool, practices dribbling drills inspired by Manchester United’s playbook, follows the swimming
    techniques of Olympic champion Katie Ledecky, and occasionally cheers on the Los Angeles Lakers, balancing team camaraderie with personal fitness goals.
  arts: Tien Chow, an avid manga‑style illustrator who spends evenings sketching heroes from My Hero Academia while listening to BTS and Taylor Swift, also devours graphic novels like Saga and watches Studio Ghibli
    films for inspiration, blending Western comic storytelling with Japanese visual flair.
  travel: Tien Chow, whose family travel style mixes carefully planned educational stops—such as a weekend visit to the Monterey Bay Aquarium and a road trip to the Grand Canyon—with spontaneous beach days
    at the nearby lake, dreams of snorkeling the Great Barrier Reef but must balance these ambitions with the modest family budget.
  culinary: Tien Chow, a budding home chef who often partners with their parents to roll steamed dumplings, stir‑fry jasmine rice with soy‑ginger sauce, and prep crispy egg rolls using garlic, ginger, and
    scallions, enjoys experimenting with flavors while occasionally over‑seasoning in the excitement.
  core: Tien Chow is a curious nine‑year‑old tinkerer whose love for Lego constructions, chemistry experiments, and manga drawing is tempered by a perpetual worry about perfection, a habit of over‑packing
    school supplies, and a penchant for stealing extra dessert when no one watches.
background:
  cultural: Tien's family comes from an East Asian heritage, maintaining traditions such as celebrating Lunar New Year, speaking Mandarin at home, and sharing family meals that blend Chinese cuisine with
    South Florida's multicultural flavors. Growing up in Miami, he is exposed to a vibrant mix of Latino, Caribbean, and American cultures, influencing his food preferences, music tastes, and social interactions.
    He navigates both his parents' emphasis on academic achievement and the dynamic, outdoor lifestyle of Miami, resulting in a bicultural identity that values respect for elders, community involvement,
    and openness to diverse experiences.
