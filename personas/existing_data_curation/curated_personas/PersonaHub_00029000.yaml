persona_description: A nuclear safety expert who has studied nuclear reactor accidents and researched local nuclear facilities for the New Jersey Department of Environmental Protection. He remains skeptical
  about the ability of existing nuclear plants in the United States to improve safety and is pessimistic about the political pressure to act on improvements that could have made a significant difference
  in the Fukushima disaster. He advocates for improvements to weak containments and the removal of spent fuel from storage pools, which could reduce the likelihood of radioactive release in the event of
  a nuclear disaster.
