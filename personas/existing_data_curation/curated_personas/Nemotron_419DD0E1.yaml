  hobbies: '["Minecraft building","Chess","Fishing with dad","Future Farmers of America (FFA) activities","Trumpet in marching band","Listening to country and bluegrass music","Reading mystery novels","Journaling"]'
  career_goals: The immediate goal for Thomas is to finish high school with a strong academic record and earn a scholarship for an automotive technology program at a community college. He envisions a future
    where he runs his own small auto‑repair shop in Summer Shade, providing dependable service to neighbors. As a backup plan, he is also interested in becoming a state police officer or a local sheriff’s
    deputy, attracted by the clear hierarchy, structured routine, and opportunity to protect his community. Both paths reflect his desire for stability, responsibility, and a predictable career that lets
    him support his family.
