  hobbies: '[''Gardening'', ''Walking on the beach'', ''Cooking Italian recipes'', ''Reading romance novels'', ''Knitting and crocheting'', ''Group fitness classes (Zumba)'', ''Volunteering at the local
    food bank'', ''Attending church gatherings'', ''Yoga and meditation'', ''DIY home décor projects'']'
  career_goals: Catrina aims to advance into a supervisory or managerial role within a reputable cleaning or hospitality company, where she can design standardized cleaning procedures and mentor junior
    staff. She plans to obtain a certification in housekeeping management and eco‑cleaning to broaden her expertise. Over the next five years, she hopes to start her own small, community‑focused cleaning
    business that prioritizes sustainable practices and provides stable employment for other women in the area. Financially, she seeks to achieve a reliable retirement fund and reduce job‑related stress
    by having more control over her schedule.
