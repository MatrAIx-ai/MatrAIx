  hobbies: '[''Vegetable gardening'', ''Canning and food preservation'', ''Reading agricultural guides'', ''Knitting'', ''Birdwatching'', ''Walking/hiking in local woods'', ''Attending small-group church
    Bible study'', ''Listening to classic country music'', ''Maintaining a family photo album'']'
  career_goals: Jessica aims to preserve the legacy of her late husband's farm while gradually shifting toward a low‑stress, market‑garden model that can provide a steady supplemental income. She hopes
    to secure a small parcel of land for her grandchildren, ensuring the family remains rooted in agriculture. Over the next few years, she plans to obtain a certification in small‑farm management from
    a community college, which will help her adopt more efficient, sustainable practices. Jessica also desires to become a trusted mentor for younger women in the local farming community, sharing her knowledge
    and fostering a competitive yet supportive environment. Ultimately, she seeks a balanced routine that safeguards her financial independence and reduces the anxiety that often accompanies farm uncertainties.
