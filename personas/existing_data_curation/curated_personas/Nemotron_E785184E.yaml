  hobbies: '["LEGO building", "Reading adventure books", "Soccer practice", "Nature walks and birdwatching", "Sketching animals", "Educational video games (coding and math)", "Piano practice"]'
  career_goals: Julian dreams of a future where he can blend his love for building, problem‑solving, and helping others. He is fascinated by how bridges and playgrounds are designed, so he imagines becoming
    a civil engineer who creates safe, fun spaces for his community. At the same time, his curiosity about computers leads him to consider a career in software development, especially creating educational
    games that inspire other kids. He wants to attend a STEM‑focused high school, earn scholarships for science competitions, and eventually study engineering at a university. Julian also hopes to take
    on leadership roles in group projects, guiding his peers while listening to new ideas, reflecting his cooperative yet assertive nature.
