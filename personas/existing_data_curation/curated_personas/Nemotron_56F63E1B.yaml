personas:
  professional: Ralph Munro, a veteran Cheyenne police officer with over a decade of front‑line experience, leverages his methodical investigative expertise, crisis‑negotiation skill, and data‑driven crime
    analysis while they balance a structured work ethic with a flexible, compassionate approach that keeps them calm under pressure and effective in community interactions.
  sports: Ralph Munro, an avid outdoorsman, spends spring and summer trekking the Laramie Mountains, casting a fly rod on the North Platte River, and in their downtime follows the Wyoming Cowboys football
    team, the Cheyenne Frontier Days rodeo, while actively participating in the North Platte River Anglers Association and the Cheyenne Hiking Club.
  arts: Ralph Munro, a quiet appreciator of the western canon, dedicates evenings to reading Cormac McCarthy and Louis L’Amour, devours true‑crime works by Ann Rule, finds inspiration in the black‑and‑white
    landscapes of Ansel Adams, and fills their playlist with country legends like Johnny Cash, Willie Nelson, and modern storyteller Chris Stapleton.
  travel: Ralph Munro, who favors low‑key road trips that blend photography and solitude, has driven the Teton Park Loop to capture sunrise over Grand Teton, explored Santa Fe’s historic plaza for a weekend
    cultural immersion, and dreams of a winter fishing expedition on Alaska’s Kenai River, planning each outing with a flexible itinerary that leaves room for spontaneous detours.
  culinary: Ralph Munro, a capable home cook, often prepares hearty dishes such as elk chili seasoned with juniper berries and smoked paprika, fire‑roasted tomatoes, and bison steak served with fence‑lined
    potatoes and locally foraged mushrooms, while they craft custom wooden cutting boards from their woodworking projects to showcase each meal.
  core: Ralph Munro is a disciplined yet laid‑back police veteran who balances meticulous crime analysis with spontaneous fly‑fishing excursions, habitually forgetting to file expense reports on time while
    never missing a chance to photograph Wyoming’s open skies.
background:
  cultural: Ralph is a third-generation White American whose family has lived in Wyoming since the early 20th century. Growing up in the small-town environment of Cheyenne, he absorbed the region's frontier
    ethos of self-reliance, respect for the land, and a strong sense of community responsibility. His upbringing emphasized practical work values, modesty, and civic duty, which naturally led him to a career
    in public service. The local culture of close-knit neighborhoods, outdoor recreation, and a pragmatic approach to problem-solving shapes his worldview. His marriage and ties to the region reinforce
    a commitment to preserving the stable, cooperative atmosphere of his community.
attributes:
  skills: '[''Criminal law fundamentals'', ''Investigative techniques'', ''Crisis negotiation'', ''Firearms proficiency'', ''Defensive tactics'', ''Emergency medical response'', ''Traffic enforcement'',
