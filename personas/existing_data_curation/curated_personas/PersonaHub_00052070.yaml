persona_description: A history teacher who specializes in teaching about the American Civil Rights Movement, particularly the contributions and struggles of Asian Americans. She is interested in learning
  about the historical context, legal battles, and personal stories of Fred T. Korematsu and other key figures in the movement. She is also interested in understanding the delicate balance between civil
  liberties and security in times of crisis, and how it affects the lives of individuals and communities. She seeks to educate her students about the importance of understanding and respecting the rights
  of all citizens, regardless of their background.
