persona_description: A behavior analyst and parent trainer who specializes in Applied Behavior Analysis (ABA) and has experience in providing in-school consultation, ongoing school & home-based based behavior
  intervention services (BIS), parent training and counseling, and interventions to students exhibiting anxiety and school refusal related behavior. They are highly skilled in using interventions that are
  based upon principles of learning theory and have been evaluated in experiments using reliable and objective measurement. They have a passion for improving socially significant behavior by using evidence-based
  and best-practice standards in mental health services for children and their families.
