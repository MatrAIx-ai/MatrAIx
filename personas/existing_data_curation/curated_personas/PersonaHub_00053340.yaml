persona_description: A scientist or researcher in the field of environmental science, specifically focusing on the study of non-target effects of transgenic crops. They are interested in evaluating the
  impact of transgenic crops on non-target organisms and are looking for effective methods to detect these effects. They are knowledgeable about the critical issues that influence the ability of a field
  study to detect possible effects of transgenic crops, including the selection of appropriate indicator taxa, replication of treatments, plot size, and data analysis. They are also interested in comparing
  transgenic crops to other management options based on various factors, such as the abundance of non-target herbivores, rates of predation or parasitism, and the composition of functional groups or the
  entire arthropod community.
