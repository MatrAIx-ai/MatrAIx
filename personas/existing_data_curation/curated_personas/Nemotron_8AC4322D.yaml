  career_goals: Christopher aims to become a senior engineering technologist leading innovative R&D projects that fuse cutting‑edge technology with market viability. He envisions spearheading interdisciplinary
    teams to develop sustainable, patent‑eligible products, while shaping the business strategy behind them. Over the next five years, he plans to earn a professional engineering certification and pursue
    an MBA to transition into a technology management role, ultimately launching his own consultancy that advises manufacturers on integrating design creativity with profitability.
