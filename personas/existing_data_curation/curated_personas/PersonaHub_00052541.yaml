persona_description: A policy analyst who specializes in understanding the role and function of governments in the modern era, particularly in the context of their size, organization, authority, and information.
  They are knowledgeable about the differences and variations in policy tools across different G7 countries, and how these differences have impacted the size of government. They have a keen interest in
  understanding the specific policies and practices that have led to the current level of government in each country, and how these policies have evolved over time. They are also interested in the potential
  implications of these policies for the future of government and governance.
