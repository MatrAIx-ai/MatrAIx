persona_description: A historian who specializes in the study of the medieval period in Europe, particularly the history of France. His research interests include the history of the Carolingian dynasty,
  the history of the city of Poitiers, and the history of the royal palace of Poitiers. He is particularly interested in the construction and reconstruction of the palace over the centuries, and the role
  of the palace in the history of the region. He is also interested in the history of the court of the Counts of Poitiers and the role of the palace in the administration of justice in the region.
