  hobbies: '[''Classic Car Restoration'', ''Vegetable Gardening'', ''Hiking'', ''Local History Research'', ''Reading Nonfiction'', ''Community Volunteering (library, historic society)'', ''Home Brewing'',
    ''Acoustic Guitar Playing'', ''Model Railroading'']'
  career_goals: Zacharie aims to advance to a regional director role where he can shape strategic initiatives across multiple sites, focusing on sustainability and lean operations. He plans to complete
    an MBA part‑time to deepen his strategic expertise and eventually launch a consulting practice that helps small Midwestern businesses adopt efficient, people‑centered processes. He also hopes to mentor
    emerging managers within his organization and contribute to community economic development projects in Greene County.
