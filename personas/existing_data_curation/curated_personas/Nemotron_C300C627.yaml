  hobbies: '[''Gardening'', ''Hiking in the San Bernardino National Forest'', ''Volunteering at local food bank'', ''Robotics tutoring for high-school students'', ''Woodworking'', ''Cooking family recipes'',
    ''Reading historical fiction'', ''Birdwatching in desert habitats'']'
  career_goals: Patricia aims to transition into a senior supervisory role where she can combine her technical expertise with her passion for mentorship. Over the next five years, she plans to obtain a
    Six Sigma Black Belt and lead a continuous-improvement program that reduces waste and enhances product reliability at her plant. She also hopes to launch a company-wide mentorship initiative focused
    on supporting women and underrepresented groups in engineering technology, helping to build a more inclusive and cooperative workplace culture.
