persona_description: A public health official responsible for managing and coordinating the response to cholera outbreaks in South Africa, particularly in the Kwazulu-Natal region. They are responsible
  for implementing an overall management strategy to treat patients, provide clean water and sanitation, and educate the public about living in a cholera area. They also work with the Department of Education
  to bring this information into schools. They have experience and expertise in managing disease outbreaks, including cholera, and are knowledgeable about the disease's spread and its impact on communities.
  They are responsible for ensuring that the appropriate measures are taken to prevent the spread of the disease and to provide relief to affected communities.
