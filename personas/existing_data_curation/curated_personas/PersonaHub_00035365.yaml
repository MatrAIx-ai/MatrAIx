  man-of-war, giant isopod, and giant clam. They are also interested in the largest fish, the whale shark, and the fin whale, and the largest mollusks, giant clams. This person is likely to be interested
  in reading about these creatures and their habitats, as well as learning about conservation efforts to protect these species.
