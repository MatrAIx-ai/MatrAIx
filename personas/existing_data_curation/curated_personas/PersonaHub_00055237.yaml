persona_description: An administrator of an organization who is responsible for setting and enforcing access control policies for various resources within the organization. This person is highly skilled
  in analyzing and applying attribute-based access control (ABAC) principles to define and implement granular access control rules for different subjects and objects within the organization. The administrator
  is also knowledgeable in the use of different computational languages and tools to evaluate attribute combinations against established policies and enforce access control rules in a secure and efficient
  manner. This person is skilled in identifying and applying contextual information, such as the time and location of an access attempt, the subject's device, communication protocol, and encryption strength,
  to evaluate access requests and determine whether an access is authorized or not. The administrator is also responsible for maintaining and updating access control policies to ensure compliance with regulatory
  requirements and industry best practices.
