personas:
  professional: Bobby Forchin, an aspiring automotive technician, blends hands‑on repair expertise—from bike and car maintenance to smartphone troubleshooting—with a methodical, organized mindset that makes
    them a dependable planner for school events and community workshops.
  sports: Bobby Forchin, a regular at the Eastside community park, plays pick‑up basketball while cheering for the LA Lakers, spends weekends skateboarding with the local LA Skate Crew, and follows the
    LA Dodgers in the summer, occasionally joining neighborhood soccer games for a change of pace.
  arts: Bobby Forchin fuels their creative side by curating playlists of Kendrick Lamar, SZA, and Anderson .Paak while scouting vibrant murals by local street artists in the Arts District, and they regularly
    attend cultural festivals like the LA County Fair and the Día de los Muertos parade to soak in live performances by artists such as Childish Gambino and H.E.R.
  travel: Bobby Forchin prefers low‑budget, meticulously planned road trips—day‑tripping to Santa Monica beach, camping near the Grand Canyon, or exploring San Diego's Gaslamp Quarter—and dreams of a solo
    adventure to Tokyo’s Akihabara district to experience its tech and pop‑culture scene.
  culinary: Bobby Forchin enjoys mastering family‑style chicken teriyaki and spicy taco bowls, skillfully seasoning with soy sauce, ginger, cilantro, and jalapeños, while also indulging in late‑night pepperoni
    pizza topped with extra cheese after a skate session.
  core: Bobby Forchin blends a methodical, spreadsheet‑driven mindset with a love for street art, hands‑on tinkering, and late‑night gaming, often juggling spare car parts, a tightly budgeted allowance,
    and a habit of over‑cooking family recipes just to perfect the sauce.
background:
  cultural: Bobby is a Black teenager raised in South Los Angeles, where African‑American cultural traditions shape his daily life. He grew up with strong ties to his extended family and a close-knit neighborhood
    that values mutual support, resilience, and community celebration. Music from hip hop, R&B, and the local jazz scene is a constant backdrop, and family gatherings often feature soul food passed down
    through generations. He participates in cultural events such as Juneteenth parades and community block parties, and he respects the legacy of Black activism in the city, which informs his desire to
    give back through volunteering and future entrepreneurship.
attributes:
  skills: '["basic mechanical repair (bicycles, cars)", "smartphone and tablet troubleshooting", "audio‑visual setup for events", "event organization and planning", "time management and scheduling", "team
