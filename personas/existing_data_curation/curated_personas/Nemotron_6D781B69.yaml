  hobbies: '["playing basketball", "skateboarding", "listening to hip hop and R&B", "strategy video gaming", "tinkering with electronics and DIY projects", "cooking family soul‑food recipes", "volunteering
    at a community youth center", "exploring street art and cultural festivals in Los Angeles"]'
  career_goals: Bobby aims to earn his GED and enroll in a trade program at Los Angeles Trade‑Technical College to become a certified automotive technician. He envisions completing an apprenticeship at
    a local garage, eventually opening his own mobile car‑repair service that combines his mechanical skills with his love for community outreach. He also hopes to develop a side interest in IT support,
    offering basic tech help to neighbors and school peers.
