persona_description: A biologist who specializes in the study of bats and their behavior, particularly in relation to the effects of White-nose Syndrome on their hibernation behavior. She is conducting
  research at the Wyandotte Cave in Indiana's O'Bannon Woods State Park to understand the mechanisms through which the fungus Geomyces destructans invades the skin tissue of the nose, ears, and wings of
  cave-dwelling bats during hibernation, leading to harmful behaviors such as increased activity and abnormal movements. Her research is funded by the Service's White-nose Syndrome Grants to States and
  is part of a collaborative study led by the Indiana Department of Natural Resources to examine the behavior of hibernating bats infected with White-nose Syndrome.
