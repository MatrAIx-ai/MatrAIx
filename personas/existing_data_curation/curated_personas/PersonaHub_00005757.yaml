persona_description: A company's finance department manager who is responsible for managing and coordinating international trade transactions, including the use of documentary credits in ensuring the performance
  of parties involved in global trade, from the importer to the exporter, as well as their banks. The manager must be knowledgeable about the Uniform Customs and Practice for Documentary Credits (ICC 1983),
  the advantages of using documentary credits in international sales contracts, and the different types of documentary credits such as revocable, irrevocable, and confirmed irrevocable documentary credits.
  The manager must also have experience in negotiating and advising on documentary credits to ensure compliance with the terms and conditions stipulated in the credit, and in negotiating and advising on
  the use of EDI/EDIFACT in international transactions.
