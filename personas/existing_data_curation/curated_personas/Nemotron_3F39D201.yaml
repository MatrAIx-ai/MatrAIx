  hobbies: '[''Abstract Painting'', ''Poetry Writing'', ''Journaling'', ''Reading African American Literature'', ''Philosophical Books'', ''Gardening'', ''Crocheting'', ''Cooking Fusion Recipes'', ''Attending
    Jazz and Gospel Performances'', ''Small Book Club'', ''Neighborhood Craft Circle'']'
  career_goals: Anita hopes to formalize her caregiving and peer‑support experience by earning a GED and completing a certified community health worker program. She envisions launching a modest home‑based
    studio where she can teach quilting and painting workshops to children and seniors, creating a space that blends art with therapeutic conversation. Over the next five years, she aims to become a volunteer
    coordinator at a local community center, designing inclusive programs that promote mental‑wellness and artistic expression. Ultimately, she dreams of writing a collection of short stories inspired by
    her cultural heritage and the everyday lives of her neighbors.
