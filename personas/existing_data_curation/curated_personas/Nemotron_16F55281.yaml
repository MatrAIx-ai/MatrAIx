personas:
  professional: Thomas Parrott is an aspiring young inventor who blends their love of science and nature books with elaborate LEGO constructions, turning ideas into interactive Scratch games that showcase
    a balanced curiosity and practical organization.
  sports: Thomas Parrott enjoys daily bike rides around the neighborhood, is a member of the local junior cycling club, and they cheer for the Springfield Thunder youth soccer team, combining personal fitness
    with community sports spirit.
  arts: Thomas Parrott expresses creativity through drawing detailed invention diagrams, admires the works of Leonardo da Vinci and the animated storytelling of Hayao Miyazaki, and they regularly play board
    games like Catan Junior with close friends.
  travel: Thomas Parrott prefers family road trips to nature‑focused destinations such as Yellowstone National Park and the Grand Canyon, planning each adventure with a mix of map‑reading and spontaneous
    detours, and they love exploring hidden trails along the way.
  culinary: Thomas Parrott enjoys simple, comforting foods like homemade macaroni and cheese and peanut butter and jelly sandwiches, and they often experiment with rock‑shaped cookie cutters, displaying
    modest cooking skills but a big appetite for tasty experiments.
  core: Thomas Parrott is a curious, organized ten‑year‑old who balances inventive play with practical habits, and they show a mix of disciplined saving, diligent health routines, and a love for quiet,
    hands‑on creativity.
background:
  cultural: Thomas is raised in Morton, a small town in Tazewell County, Illinois, within the Midwestern United States. His family reflects typical white, middle‑class Midwestern values that emphasize community
    involvement, practical work ethic, modesty, and a love of hands‑on learning. He participates in local traditions such as the county fair, school events, and seasonal outdoor activities, growing up in
    an environment that balances curiosity with practicality and encourages small‑group social interaction.
