  career_goals: Craig aims to earn a Bachelor of Science in Nursing within the next two years, followed by a Master of Science in Nursing with a focus on emergency or community health. He plans to acquire
    certifications such as Certified Emergency Nurse (CEN) and later become a nurse practitioner to deliver primary care to underserved populations in the high-desert region. In the short term, he seeks
    a charge-nurse position where he can mentor new staff and lead a patient-safety committee. Long-term, Craig aspires to develop a telehealth outreach program that connects rural residents with preventive
    services, improving health equity while advancing his professional expertise.
