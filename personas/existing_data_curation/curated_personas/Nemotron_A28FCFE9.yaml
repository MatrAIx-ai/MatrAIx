personas:
  professional: Craig Cornett is a registered nurse in the San Bernardino County acute‑care unit who translates their methodical assessment, IV therapy, and wound‑care proficiency, coupled with fluency
    in Epic and Cerner, into precise, evidence‑based patient care, while they actively mentor new staff, spearhead infection‑control audits, and pursue a BSN and Certified Emergency Nurse credential to
    step into a charge‑nurse role.
  sports: Craig Cornett combines weekend hikes in the San Bernardino National Forest with membership in the Inland Empire Trail Runners club, they also squeeze in pickup basketball games while cheering
    for the Los Angeles Lakers, and they track the Los Angeles Dodgers and Los Angeles Rams for their seasonal baseball and football thrills.
  arts: Craig Cornett unwinds by playing acoustic guitar, drawing inspiration from John Mayer, Ed Sheeran, and Fleet Foxes, they study the works of Ansel Adams and Michael Kenna for desert photography,
    and they regularly attend local gallery openings that showcase muralists blending contemporary and folk motifs.
  travel: Craig Cornett prefers meticulously planned road trips that blend sunrise photography in Sedona, Joshua Tree, and the high desert with spontaneous weekend escapes to Lake Tahoe, they dream of trekking
    Patagonia’s Torres del Paine and exploring Iceland’s volcanic craters, and they balance these adventures with a modest travel budget and occasional work‑related travel to medical conferences.
  culinary: Craig Cornett enjoys crafting Mediterranean‑inspired chicken tacos with tzatziki, quinoa tabbouleh spiced with chipotle, and shakshuka topped with fresh cilantro, they favor ingredients like
    olive oil, feta, roasted corn, and jalapeño, and they often host community‑garden potlucks where they share these fusion dishes.
  core: Craig Cornett merges a methodical nursing career with a love for desert hikes, camera work, and culinary mash‑ups, balancing disciplined budgeting and health monitoring while they occasionally succumb
    to impulse video‑game purchases.
background:
  cultural: Craig grew up in Adelanto, a working-class community in the Inland Empire of Southern California. His family is of Anglo-American heritage, with roots in the Midwest, and his parents moved to
    California for construction and public-sector jobs. The multicultural environment of the high desert, especially the strong Hispanic presence, exposed him to Spanish language and Mexican culinary traditions,
    which he now incorporates into his cooking. He attended the local public high school, where he played varsity football and joined the science club, reinforcing values of teamwork, perseverance, and
    curiosity. Craig’s cultural identity blends traditional American work ethic with appreciation for the diverse cultural fabric of his region, shaping his commitment to community service and health equity.
