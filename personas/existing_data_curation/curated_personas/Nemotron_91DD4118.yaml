  career_goals: Maria dreams of turning her love for art and performance into a future career. She hopes to become an illustrator or a children's book author, combining her drawing skills with storytelling.
    She also envisions herself on stage or in front of a camera, perhaps as a host of a local youth program that encourages creativity. Her competitive streak pushes her to aim for national youth art competitions
    and scholarship programs that can support her ambitions, while her curiosity drives her to keep learning new techniques and subjects.
