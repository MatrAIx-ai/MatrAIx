personas:
  professional: Maria Evans, a budding environmental artist, channels her curiosity and competitive spirit into creating detailed watercolor scenes of local ecosystems, using organized sketchbooks and improvisational
    collages to impress peers during school art fairs.
  sports: Maria Evans plays forward on the Fremont Falcons youth soccer team, practices swimming at the local community pool, and cheers for the Golden State Warriors, approaching each practice with a competitive
    edge while collecting rocks and leaves during post‑game hikes on the surrounding trails.
  arts: Maria Evans immerses herself in watercolor landscapes inspired by Claude Monet, creates collages echoing the street‑art style of Banksy, performs as the lead in school drama productions like "The
    Lion King," and practices the recorder while dancing to pop hits by Taylor Swift, intertwining visual, performing, and musical arts into her daily routine.
  travel: Maria Evans spends weekends exploring the Redwood National Park and Muir Woods, has visited Lake Tahoe on a family trip, and dreams of camping in Yellowstone and hiking the Grand Canyon, favoring
    spontaneous nature‑focused adventures over organized tourist itineraries while budgeting her allowance for travel‑related gear.
  culinary: Maria Evans loves homemade pizza topped with mozzarella and pepperoni, enjoys a bowl of creamy mac and cheese, experiments with fruit smoothies featuring strawberries and banana, and occasionally
    helps her parents bake chocolate chip cookies, reflecting a modest cooking skill set focused on comfort foods and vibrant ingredients.
  core: Maria Evans, a 10‑year‑old curiosity‑driven creator, blends a competitive spark with a love for art, science, and the social stage, while juggling worry‑laden moments and a penchant for collecting
    nature’s treasures.
background:
  cultural: Maria lives in Fremont, a small town in Dodge County, Nebraska, where Midwestern community values shape daily life. Her family participates in local events such as the county fair, church gatherings,
    and school activities, reinforcing a sense of neighborly support and modest pride. The region’s expansive plains and nearby farmlands inspire her appreciation for nature and outdoor exploration, while
    the local public school emphasizes both academic achievement and extracurricular arts. These influences combine to give Maria a grounded, community-oriented upbringing with exposure to both traditional
    rural life and opportunities for creative expression.
