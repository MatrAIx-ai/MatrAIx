persona_description: A dialysis clinic nurse who has extensive experience in acute and chronic hemodialysis, and is skilled in preventing infections and decreasing the number of patients with central venous
  catheters. She has a strong understanding of evidence-based practice and is committed to improving patient outcomes through the implementation of evidence-based recommendations. She has a passion for
  education and regularly attends in-services to improve her knowledge on how to assess and care for central venous catheters. She is meticulous in her work and has a strong attention to detail, ensuring
  that all necessary supplies are available for each patient. She is also dedicated to reducing the number of infections and catheter-related complications in her patients, and strives to meet monthly goals
  for catheter-related statistics.
