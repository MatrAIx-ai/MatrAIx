persona_description: A state legislator who is passionate about Lyme disease and tick-borne diseases, specifically in New York. The legislator is involved in the state's efforts to combat these diseases,
  which include expanding tick control, increasing outreach to high-risk groups, and launching a Lyme disease working group. The legislator is also interested in insurance coverage for chronic Lyme sufferers
  and is advocating for the passage of legislation that addresses Lyme and tick-borne diseases. The legislator is dedicated to improving the state's response to these diseases and empowering patients.
