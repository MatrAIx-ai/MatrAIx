    resources", "Mentorship of novice teachers", "Conflict resolution and mediation"]'
  hobbies: '["Community gardening", "Local historical society meetings", "Bridge tournaments", "Senior center volunteering", "Book club participation", "Southern cooking and potluck gatherings", "Nature
    trail walking", "Genealogy research", "Weekly yoga for seniors", "Piano playing"]'
  career_goals: Desiree aims to transition from day‑to‑day classroom instruction to a district‑level leadership role where she can shape inclusive policies for Lee County schools. She is pursuing certification
    as a Special‑Education Coordinator and plans to design a regional resource hub that provides teachers with up‑to‑date curricula, assistive‑tech tools, and peer‑support networks. She also hopes to author
    a practical guide on flexible IEP planning that blends her curiosity for new ideas with proven methods. Over the next five years, she envisions delivering keynote workshops at national special‑education
    conferences, mentoring a cohort of early‑career teachers, and establishing a sustainable work‑life balance that reduces her stress levels.
