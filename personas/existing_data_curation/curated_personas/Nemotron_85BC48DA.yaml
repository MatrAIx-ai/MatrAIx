personas:
  professional: Desiree Hawks, a veteran special‑education teacher with four decades of classroom experience, blends Southern‑rooted hospitality with data‑driven IEP design, assistive‑technology integration,
    and collaborative co‑teaching, while navigating a relaxed, occasionally disorganized, administrative style as they pursue district‑level leadership.
  sports: Desiree Hawks enjoys gentle yoga, daily walks through historic sites, and tending to their garden as low‑impact exercise, cheers for the Auburn Tigers football team, follows the Atlanta Braves
    in the spring, and treats weekly bridge tournaments at the senior center as a competitive mental‑sport showdown.
  arts: Desiree Hawks participates in an Auburn book club that reads contemporary fiction by Kiley Reid and classic Southern works by Harper Lee, attends performances at the Auburn Little Theatre, and fills
    potluck evenings with gospel favorites like The Staple Singers and blues from B.B. King.
  travel: Desiree Hawks favors organized trips to heritage destinations—such as Gettysburg, Charleston, Savannah, and New Orleans—often traveling with their genealogy group to trace early Alabama roots,
    balancing a modest travel budget with a deep desire for cultural immersion.
  culinary: Desiree Hawks is a confident home cook who lovingly prepares Southern comfort dishes like fried catfish, collard greens, cornbread, and peach cobbler, frequently using garden‑fresh tomatoes
    and okra while sharing treasured family recipes at community potlucks.
  core: Desiree Hawks blends a competitive bridge streak, community gardening enthusiasm, relentless curiosity for inclusive education, and warm Southern hospitality, all underscored by an ever‑present
    worry and a relaxed, sometimes chaotic, approach to life.
background:
  cultural: Desiree grew up in a small town near Montgomery, Alabama, in a family that valued Southern hospitality, church involvement, and community service. Her upbringing in the Baptist tradition instilled
    a strong sense of duty to help others, which later guided her career in special education. While she embraces traditional Southern customs—such as cooking family recipes, attending local festivals,
    and preserving oral histories—her professional experiences have shaped a progressive outlook on inclusion and equity. Living most of her adult life in Auburn, she blends the relaxed, friendly rhythm
    of the Deep South with a lifelong curiosity for new educational approaches, creating a cultural identity that honors heritage while advocating for change.
attributes:
  skills: '["Individualized Education Program (IEP) development", "Behavior management and de‑escalation", "Differentiated instruction", "Assistive technology integration", "Collaborative team teaching",
