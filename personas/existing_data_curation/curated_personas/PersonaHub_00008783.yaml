persona_description: A group of environmentally-conscious students from the University of Southern Denmark who have developed a sustainable disposable sanitary towel from plant fibres, aiming to reduce
  the environmental impact of menstrual products and meet the demands of menstruating women for comfort and hygiene. They are focused on sustainability and are currently testing different plant fibres to
  improve the absorbency of their product. They are also looking for contacts in production to ensure the sustainability of their product and are applying for a patent to protect their idea.
