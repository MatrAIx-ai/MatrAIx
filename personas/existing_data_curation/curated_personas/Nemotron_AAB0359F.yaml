personas:
  professional: Stephen Hobbs, they channel their love of precision and structure into flawless haircutting, advanced color formulation, and event styling while applying their organized, detail‑oriented
    mindset to salon logistics and fiercely competing in regional styling contests.
  sports: Stephen Hobbs, they stay fit by playing pickup basketball at the Lafayette community center, hitting the gym three times a week for weight training, cheering the New Orleans Pelicans and the LSU
    Tigers, and joining a weekend rowing crew on the Atchafalaya Bayou.
  arts: Stephen Hobbs, they nurture artistic flair through regular visits to zydeco shows honoring Clifton Chenier, country gigs featuring Luke Combs, drawing styling cues from hair‑icon Jen Atkin, and
    curating Instagram reels inspired by street artist Banksy, which together shape their visual aesthetic.
  travel: Stephen Hobbs, they plan trips with meticulous itineraries, favoring weekend drives along the Gulf Coast to New Orleans for Mardi Gras, exploring Austin’s SXSW scene for music and tech inspiration,
    and dreaming of a future getaway to Belize’s coral reefs once enough savings accumulate, always balancing cost‑effectiveness with cultural immersion.
  culinary: Stephen Hobbs, they excel at cooking Cajun classics like jambalaya with Andouille sausage and shrimp, gumbo spiked with okra and filé powder, and crawfish étouffée, often experimenting with
    extra cayenne to satisfy a fearless palate, though their habit of over‑seasoning sometimes overwhelms diners.
  core: Stephen Hobbs, they blend a rigorously organized path toward senior stylist status with a competitive edge, a passion for vintage car restoration, Cajun cooking, and gaming, all tempered by occasional
    impulsive splurges and a skeptical yet ambitious outlook on life.
background:
  cultural: Stephen was raised in Broussard, a small town in Lafayette Parish, Louisiana, within a white Southern Catholic family that traces its roots to the Cajun community. He grew up attending local
    church services, family gatherings featuring gumbo and jambalaya, and community celebrations such as Mardi Gras and the Festival International de Louisiane. The region’s emphasis on hospitality, family
    loyalty, and preserving French‑Acadian traditions shapes his values, while the vibrant zydeco and country music scene influences his interests. He embodies the modest, hard‑working ethic of the South
    and integrates its cultural sensibilities into both his personal life and professional hairstyling practice.
