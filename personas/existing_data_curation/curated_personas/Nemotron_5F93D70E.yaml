personas:
  professional: Willie Evans is a budding digital illustrator who translates their vivid comic‑style imagination into pixel‑perfect Minecraft skins and school art club projects, balancing school responsibilities
    with a flair for leading peer workshops and a competitive edge that drives them to constantly outdo their own creations.
  sports: Willie Evans is a fervent supporter of the Carolina Panthers and Charlotte Hornets, plays on the local Union County Wildcats soccer team during spring, and spends weekend mornings tackling drills
    with the Monroe youth basketball league, channeling their competitive streak into rigorous practice while still preferring video‑game battles to real‑field endurance.
  arts: Willie Evans immerses themselves in the world of comic art, drawing inspiration from creators like Alex Ross and manga series such as One Piece, strumming acoustic covers of Green Day on guitar,
    and performing monologues from Shakespeare’s ‘Macbeth’ with the Red Clay Players drama club, all while passionately debating the merits of indie video‑game soundtracks versus mainstream pop.
  travel: Willie Evans dreams of road‑tripping along the Blue Ridge Parkway to the Outer Banks, has already visited the historic district of Wilmington on a family vacation, and meticulously plans future
    visits to the Smithsonian museums in Washington, D.C. using a hybrid of online videos and a handmade travel scrapbook that balances their love of exploration with the budget limits of a middle‑schooler.
  culinary: Willie Evans delights in cooking Southern comfort foods like buttery cornbread and honey‑glazed fried chicken with their grandmother, experiments with pixellated snack designs such as ‘golden
    carrot’ salads after Minecraft sessions, and eagerly orders spicy ramen from the local Korean eatery, all while their cooking skills hover between enthusiastic amateur and occasional kitchen disaster
    when they forget to set a timer.
  core: Willie Evans is a wildly imaginative 13‑year‑old who oscillates between hyper‑focused creative bursts and anxious, stress‑driven cravings for fast food, constantly juggling leadership of art workshops
    with a competitive urge to outshine peers, even as they occasionally neglect self‑care in pursuit of the next big project.
background:
  cultural: Willie grew up in Monroe, a small city in Union County, North Carolina, within a predominantly white, middle‑class community that blends traditional Southern values of hospitality and community
    involvement with modern digital culture. His family’s roots in the American South emphasize close‑knit neighborhood ties, church gatherings, and local events like high school football games and county
    fairs. At the same time, exposure to online media, streaming services, and gaming has broadened his worldview, giving him a mix of regional heritage and contemporary global influences.
