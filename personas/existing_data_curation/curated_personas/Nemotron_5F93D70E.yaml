  career_goals: Willie's long‑term ambition is to fuse his love of art and technology by becoming a video game designer or multimedia storyteller. He aims to study graphic design and computer science, develop
    his own indie game prototypes, and eventually work as a concept artist for animation studios or as a digital content creator who engages audiences through live streams and tutorials. In the near term,
    he hopes to win his middle‑school art competition, publish a collection of his short stories online, and earn a certification in basic game development.
