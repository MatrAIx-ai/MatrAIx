personas:
  professional: Lloyd Allen, a seasoned landscaping supervisor with a solid STEM foundation, merges meticulous CAD and GIS design with hands‑on crew scheduling, budgeting, and safety compliance, championing
    eco‑friendly irrigation and drone site surveys while they mentor junior staff toward sustainable practices.
  sports: Lloyd Allen is a devoted Pittsburgh Steelers fan who attends Saturday night games at Heinz Field, participates in a local charity 5K each spring, spends weekends fishing the Ohio River, and joins
    evening pick‑up basketball games at the community center, weaving team spirit and outdoor activity into they routine.
  arts: Lloyd Allen captures the changing foliage of nearby state parks through photography, curates a small collection of Ansel Adams prints, attends the Three Rivers Arts Festival to watch folk artists
    like Steve Earle, and volunteers at regional craft fairs, letting artistic pursuits balance they technical day job.
  travel: Lloyd Allen prefers road trips that blend nostalgia and nature, having driven their restored 1968 Chevrolet Impala to the Great Smoky Mountains for a weekend hike, they are planning a future drive
    to the Pacific Northwest’s Redwood forests while keeping travel costs within a carefully saved budget and accommodating family commitments.
  culinary: Lloyd Allen enjoys home‑brewing pale ales infused with locally foraged hops, cooks hearty beef and beet stew on Fourth of July barbecues, tends a modest vegetable garden for fresh salad greens,
    and occasionally over‑spices dishes in experimental batches, reflecting they curiosity and practical palate.
  core: Lloyd Allen is a methodical, eco‑focused landscaping leader who channels DIY curiosity into sustainable projects, balances community service with vintage car passion, and keeps a disciplined financial
    routine despite occasional indulgences.
background:
  cultural: Lloyd grew up in a middle‑class, predominantly white suburb of the Pittsburgh metropolitan area, with roots tracing back to German and Irish ancestors common in western Pennsylvania. His upbringing
    emphasized hard work, self‑reliance, and community involvement—values reflected in the region's industrial heritage and the strong sense of neighborly reciprocity. He celebrates traditional American
    holidays such as Thanksgiving and the Fourth of July, and enjoys local customs like summer barbecues and winter caroling. The blend of a practical work ethic, respect for the outdoors, and a modest,
    collaborative mindset defines his cultural lens.
