  career_goals: Lloyd aims to move into a regional operations manager role within the next five years, overseeing multiple landscaping teams across western Pennsylvania. He plans to obtain advanced certifications
    such as Certified Landscape Professional (CLP) and LEED Green Associate to deepen his expertise in sustainable design. He is passionate about integrating emerging technologies—like drone site surveys
    and IoT‑enabled irrigation—into everyday operations to boost efficiency and reduce environmental impact. Ultimately, Lloyd hopes to launch his own eco‑focused landscaping firm that couples high‑quality
    service with community outreach and mentorship programs for young tradespeople.
