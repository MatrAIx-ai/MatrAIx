  hobbies: '[''Running and trail jogging'',''CrossFit and group fitness classes'',''Beach volleyball'',''Seafood cooking'',''Live music festivals'',''Volunteer youth mentorship'',''True crime reading'',''Coastal
    photography'',''Fishing'',''Board game nights'']'
  career_goals: Stephenie aims to advance within the Gulfport Police Department by first completing a bachelor's degree in Criminal Justice, then moving into a detective role specializing in narcotics or
    cybercrime. She envisions earning a promotion to sergeant, leading a community‑relations unit that partners with local schools and businesses. Long‑term, she aspires to become a captain or deputy chief,
    shaping department policy to emphasize data‑driven policing and community trust. She also hopes to mentor new officers and develop training programs that combine practical field skills with innovative
    investigative methods.
