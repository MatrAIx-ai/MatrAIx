personas:
  professional: Stephenie Schmittel, a Gulfport police officer celebrated for methodical patrol operations and data‑driven criminal investigations, blends meticulous report writing, tactical firearms proficiency,
    and assertive crisis negotiation with an organized, curious approach to community policing; they consistently seek innovative investigative techniques while maintaining a steadfast commitment to public
    trust.
  sports: Stephenie Schmittel runs the Gulfport Trail Loop three times a week, participates in CrossFit Gulfport classes, dominates beach volleyball at the Gulf Beach Club, roots for the New Orleans Saints
    and the Biloxi Shuckers, and treats fitness as a disciplined yet socially engaging routine; they thrive on the camaraderie of group workouts and the competitive spirit of beach games.
  arts: Stephenie Schmittel regularly attends the Gulf Coast Music Festival, grooves to the blues of Buddy Guy, sings along to Chris Stapleton, devours true‑crime books by Ann Rule, and captures sunsets
    with a Canon EOS inspired by Ansel Adams, weaving music, literature, and photography into their downtime; they relish the creative spark that fuels their investigative mind.
  travel: Stephenie Schmittel enjoys weekend road trips along the Gulf to Destin and historic New Orleans, dreams of photographing Icelandic auroras and hiking Portugal’s Algarve cliffs, and always crafts
    detailed itineraries in a shared Google doc, balancing adventure with a modest budget; they prioritize experiences that broaden their perspective and feed their curiosity.
  culinary: Stephenie Schmittel loves cooking Gulf Coast seafood, perfecting blackened mahi‑mahi, shrimp and grits with Andouille sausage, and oyster po’ boys, experimenting with fresh lemon, garlic, and
    Cajun spice blends, though they sometimes over‑salt dishes when racing against shift turnover; they view each meal as both a celebration of local flavors and a personal culinary challenge.
  core: Stephenie Schmittel, an organized yet adventure‑seeking Gulfport police officer, balances night‑shift intensity with sunrise runs, beach volleyball, seafood feasts, meticulous budgeting, and a camera‑ready
    eye for coastal sunsets; they embody a blend of discipline, curiosity, and community spirit.
background:
  cultural: Stephenie grew up in a white, Southern family with deep roots in Gulfport, Mississippi. Her upbringing reflects Southern hospitality, a strong sense of community, and values shaped by local
    church traditions, though she identifies more with a pragmatic worldview. The Gulf Coast lifestyle—embracing seafood, Mardi Gras celebrations, and a focus on hurricane preparedness—has influenced her
    love for outdoor activities and community service. Her cultural identity balances respect for law and order with a commitment to fostering trust between the police and the diverse residents of Harrison
    County.
attributes:
  skills: '[''Patrol operations'',''Criminal investigations'',''Crisis negotiation'',''Report writing and documentation'',''Firearms and tactical training'',''Community policing and outreach'',''Conflict
