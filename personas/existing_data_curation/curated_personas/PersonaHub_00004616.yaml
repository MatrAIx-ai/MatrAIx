persona_description: A researcher or educational professional involved in the development and evaluation of educational curricula, particularly in the context of longitudinal studies. This individual is
  likely to be familiar with the Northern Ireland Curriculum Cohort Study and its findings, as well as the broader debates about the efficacy of national curricula. They may have experience working with
  large-scale longitudinal research projects and possess expertise in qualitative research methods such as case-study fieldwork and annual questionnaires. They are interested in the development and implementation
  of effective educational curricula that meet the needs and expectations of young people.
