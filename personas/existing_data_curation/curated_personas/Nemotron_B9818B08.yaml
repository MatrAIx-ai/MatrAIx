  career_goals: Looking ahead, Patricia aims to move into a supervisory role within the next two years, targeting a store manager position where she can shape a supportive team culture. She plans to earn
    a retail management certification and eventually transition to a district‑level leadership role that emphasizes employee well‑being and training. In the longer term, she hopes to combine her retail
    experience with her passion for community service by developing a mentorship program for new retail workers or launching a small boutique that partners with local artisans and offers mental‑health resources
    for staff.
