  career_goals: Maria aims to become a leading primary‑care physician in her home community of Virginia, Minnesota, where she can improve access to comprehensive, preventive health services for rural residents.
    She plans to complete a fellowship in Rural Medicine or Preventive Medicine to deepen her expertise in community health, and eventually take on a leadership role as a medical director for a regional
    health‑center. Her long‑term ambition includes establishing a telemedicine program that connects isolated patients with specialist care while designing burnout‑prevention workshops for fellow clinicians,
    reflecting her commitment to both patient wellness and colleague well‑being. She also hopes to contribute to scholarly articles that translate research findings into practical guidelines for small‑town
    practices.
