personas:
  professional: Gudelia Gomez, an aspiring junior naturalist and budding scientist, channels their curiosity about plants and shells into meticulous field notes and experiments, while their organized, methodical
    approach makes them a reliable leader in school science fairs, balancing creative exploration with practical planning.
  sports: Gudelia Gomez energizes the Wilmington Junior Soccer Club as a midfield strategist, regularly cheering for the Philadelphia Union and the Wilmington Blue Rocks, and blends their love for team
    play with methodical practice sessions in the park, while their balanced social nature lets them enjoy both the camaraderie of the game and quiet solo jogging.
  arts: Gudelia Gomez fills sketchbooks with precise botanical drawings, draws inspiration from the vibrant colors of Frida Kahlo's self-portraits and the rhythmic sounds of Punta music by Grupo Garifuna,
    and uses their creative curiosity to recite Spanish poetry from César Vallejo, balancing artistic expression with disciplined practice.
  travel: Gudelia Gomez loves weekend hikes along the Delaware coast, has explored the historic streets of St. Augustine and the coral reefs of Cozumel, and dreams of visiting the colorful markets of Oaxaca,
    planning each adventure with a detailed itinerary that blends family bonding and independent discovery, while they balance excitement with careful budgeting.
  culinary: Gudelia Gomez enjoys helping prepare baleadas and pupusas on family weekends, perfects the art of seasoning beans with cilantro and cheese, and delights in crafting mango-pineapple smoothies
    and baking chocolate chip cookies, balancing a love for traditional flavors with curiosity to experiment with new recipes, while they proudly share these dishes with friends.
  core: Gudelia Gomez is a curious, organized ten-year-old who blends scientific inquiry, soccer teamwork, and cultural traditions into a lively, methodical life punctuated by a penchant for detailed sketching
    and disciplined saving, while they stay emotionally stable under pressure.
background:
  cultural: Gudelia’s family maintains a strong Honduran heritage while living in Wilmington. At home, Spanish is spoken alongside English, and traditional dishes such as baleadas and pupusas are prepared
    on weekends. She participates in cultural celebrations like Día de la Independencia (September 15) and helps her family decorate for Navidad with lanterns and festive foods. Her parents emphasize values
    of family solidarity, respect for elders, and community involvement, often volunteering at local Hispanic community centers. This bicultural environment enriches her identity, giving her a sense of
    belonging to both her Honduran roots and her American neighborhood.
