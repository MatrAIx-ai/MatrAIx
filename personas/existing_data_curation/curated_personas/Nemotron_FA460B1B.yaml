  career_goals: Gudelia dreams of becoming a marine biologist or environmental engineer, hoping to protect coastal ecosystems like those in Honduras and Delaware. She wants to pursue a career that blends
    scientific curiosity with practical problem‑solving, and she imagines leading community projects that teach children about water conservation. In the longer term, she aspires to earn a scholarship in
    STEM, travel to research marine habitats, and someday mentor younger students.
