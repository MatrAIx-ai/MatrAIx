personas:
  professional: Jeff Shearer, a 22‑year‑old CNC programmer, combines meticulous G‑code optimization with a competitive drive to shave cycle times, leveraging Fusion 360 and Mastercam while skeptically questioning
    any untested process changes to keep the shop floor efficient.
  sports: Jeff Shearer spends weekends hiking the Appalachian foothills, follows the Kentucky Wildcats men's basketball team, volunteers with the local RC‑plane flying club, and fishes the Kentucky River,
    finding the solitary pursuits a counterbalance to the competitive pressure of the shop floor.
  arts: Jeff Shearer’s artistic outlet is the blend of engineering and music, often listening to progressive rock bands like Dream Theater and Tool while tinkering on CNC projects, and they occasionally
    attend local maker fairs where they admire kinetic sculptures by artists such as Theo Jansen.
  travel: Jeff Shearer prefers low‑key road trips to nearby nature spots like Red River Gorge and Mammoth Cave, plans trips with meticulous itineraries saved in a spreadsheet, dreams of a study‑abroad semester
    in Stuttgart to explore German precision engineering, and avoids crowded tourist hubs unless they’re linked to a unique machining workshop.
  culinary: Jeff Shearer enjoys hearty Southern fare—bourbon‑glazed ribs, shrimp and grits, and black‑eyed pea salads—while experimenting with sous‑vide chicken breasts for consistent protein intake, yet
    they often skip breakfast, citing early shift starts as the excuse.
  core: Jeff Shearer is a solitary, detail‑obsessed CNC enthusiast whose competitive edge fuels relentless efficiency, but their anxiety and skepticism can morph into over‑analysis and occasional neglect
    of self‑care.
background:
  cultural: Jeff was raised in Richmond, Kentucky, a community that blends Southern hospitality with a strong work‑ethic rooted in Appalachian traditions. His family comes from a line of blue‑collar workers—many
    of whom were involved in farming, construction, and manufacturing—instilling in him a respect for hands‑on labor and self‑reliance. While he grew up attending local community events and a modest church
    congregation, his reserved nature kept him more focused on personal pursuits than large social gatherings. The cultural emphasis on practicality, loyalty to local industry, and pride in technical craftsmanship
    shapes Jeff's identity, reinforcing his drive to excel in CNC machining while maintaining a cautious, competitive outlook toward opportunities.
attributes:
  skills: '["CNC programming (G-code, M-code)", "Operation of multi‑axis milling and turning machines", "Blueprint and technical drawing interpretation", "CAD/CAM software proficiency (Fusion 360, Mastercam)",
    "Machine maintenance and troubleshooting", "Basic electrical diagnostics", "Metallurgy fundamentals for machining", "Safety compliance (OSHA standards)", "Production data logging and process optimization",
    "Problem solving under time pressure"]'
  hobbies: '["Building and modifying hobbyist CNC and 3D‑printing rigs", "Model aviation (RC plane construction and flying)", "Fishing on local rivers and lakes", "Hiking in the Appalachian foothills",
    "Strategy video gaming (e.g., turn‑based and real‑time strategy)", "Woodworking small projects", "Reading technical manuals and machining literature", "Arduino and electronics prototyping"]'
  career_goals: Jeff aims to transition from a shop‑floor operator to a senior CNC programmer within the next five years, securing an industry‑recognized certification such as the NIMS CNC Programming credential.
    He aspires to lead a small, high‑performance machining team where he can apply his competitive edge to reduce cycle times and improve part quality. Long‑term, Jeff dreams of opening a boutique precision‑machining
    shop that integrates advanced automation with a focus on custom, low‑volume production for local manufacturers, allowing him to blend his practical skill set with his curiosity for emerging technologies.
    He also plans to pursue continuous learning through online courses and trade workshops to stay ahead of industry trends.
