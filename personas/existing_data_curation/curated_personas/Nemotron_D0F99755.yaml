  career_goals: Joseph aspires to turn his artistic passions into a sustainable career. He aims to earn his GED within the next year and enroll in a community college program for graphic design or multimedia
    arts. His long‑term ambition is to work as a visual designer or game artist at a creative studio, where he can blend storytelling, illustration, and interactive media. He also dreams of building a freelance
    portfolio that includes illustration commissions, indie game assets, and short films. Ultimately, Joseph wants a career that allows him to explore novel concepts, maintain a structured workflow, and
    contribute meaningfully to projects that inspire others.
