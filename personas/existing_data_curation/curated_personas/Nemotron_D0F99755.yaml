personas:
  professional: Joseph Stengel is a 17‑year‑old aspiring visual designer who blends self‑taught digital illustration, narrative writing, and basic programming into organized, concept‑driven project prototypes,
    while methodically planning to earn a GED and enroll in a community‑college multimedia arts program.
  sports: Joseph Stengel participates in the Riverdale Rovers youth soccer club on weekends, tracks the State University Wildcats basketball games each season, and maintains a routine of sunrise jogs along
    the town’s river trail to clear their mind before sketching sessions.
  arts: Joseph Stengel immerses themselves in creative expression by sketching in local parks while listening to Tame Impala, studying the animation techniques of Hayao Miyazaki’s Studio Ghibli films, experimenting
    with digital brushwork inspired by Mary Blair, playing acoustic renditions of Simon & Garfunkel songs on guitar, and regularly exhibiting at community art workshops that celebrate emerging indie illustrators.
  travel: Joseph Stengel prefers low‑cost, self‑planned backpacking trips, having camped in the Grand Canyon and explored the vibrant street art of Portland, Oregon, while dreaming of a future solo journey
    to Kyoto’s historic temples and Reykjavik’s Northern Lights, all while saving travel funds from freelance commissions.
  culinary: Joseph Stengel enjoys crafting simple yet flavorful meals like avocado toast topped with feta and chili flakes, mastering ramen broth using miso paste and kombu, and occasionally baking chocolate
    chip cookies with dark chocolate chunks, while their cooking skill remains at a confident home‑cook level, often experimenting with fresh basil, lemon zest, and smoked paprika.
  core: Joseph Stengel is a 17‑year‑old dream‑driven visual artist who meticulously plans their creative projects but can’t resist late‑night gaming marathons that often delay sleep.
background:
  cultural: Joseph grew up in Whitman, Massachusetts, a suburban community in Plymouth County with deep New England roots. His family lineage includes Irish and English ancestry, reflecting the broader
    white American demographic of the area. The town’s culture emphasizes community involvement, modesty, and a strong work ethic, values that have shaped Joseph’s organized and reliable nature. He has
    been influenced by local traditions such as town fairs, Little League baseball, and the public library’s reading programs. At the same time, he is immersed in broader American pop culture through music,
    films, and online media, which feed his imaginative interests. The blend of historic New England sensibility and contemporary media gives Joseph a balanced cultural perspective that informs his artistic
    expression.
