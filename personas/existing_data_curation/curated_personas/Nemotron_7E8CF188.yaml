personas:
  professional: Barbara Iskandar, an 18‑year‑old aspiring nonprofit project manager, blends her Business Administration associate’s degree, QuickBooks bookkeeping, and self‑taught HTML/CSS to orchestrate
    volunteer schedules at the local library and community theater, applying meticulous planning and data‑entry precision to every small project while balancing curiosity for new tools with a practical,
    methodical workflow.
  sports: Barbara Iskandar enjoys weekend hikes with the Cumberland Trail Club, follows the Tennessee Volunteers football team and the Nashville Predators for a sense of local camaraderie, practices yoga
    at the community center to counterbalance the stress of her academic and volunteer load, and prefers low‑impact cardio over competitive sports, viewing fitness as a stress‑relief ritual rather than
    a performance goal.
  arts: Barbara Iskandar channels creative energy into set design for the local community theater, drawing inspiration from Lin‑Manuel Miranda’s dynamic storytelling and the atmospheric soundscapes of Sufjan
    Stevens, while she frequently attends poetry readings of Maya Angelou and views the blend of visual and narrative arts as a therapeutic counterpoint to her organized, analytical routine.
  travel: Barbara Iskandar dreams of exploring historic cities like Edinburgh, Scotland, but currently satisfies wanderlust with annual trips to the Great Smoky Mountains National Park and weekend getaways
    to Asheville, North Carolina, where she plans each hike via trail maps, balances a student budget, and occasionally embraces spontaneous detours to local farmers markets that feed her love of seasonal
    cooking.
  culinary: Barbara Iskandar experiments in the family kitchen with intermediate-level culinary skills, reimagining classic comfort dishes such as fried chicken with lavender‑honey glaze, collard greens
    spiced with smoked paprika, and sweet‑potato bisque topped with fresh thyme, while sourcing seasonal tomatoes, heirloom beans, and locally milled flour from the garden and farmer’s market to create
    vibrant, contemporary twists.
  core: Barbara Iskandar navigates life as a meticulous, curiosity‑driven planner who balances community ambition with anxious perfectionism, often juggling spreadsheets, garden seedlings, and a habit of
    over‑checking her to‑do list before bedtime.
background:
  cultural: Barbara grew up in Clinton, Tennessee, a small town in Anderson County where close‑knit community values and Southern hospitality are central. Her family’s traditions include church gatherings,
    local festivals, and a deep appreciation for the natural landscape of the region. The cultural emphasis on self‑reliance, modesty, and a strong work ethic has shaped her practical outlook and sense
    of responsibility. While she identifies with mainstream White Southern culture, she is open to the region’s evolving diversity and seeks to integrate broader perspectives into her personal and professional
    life.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint)'', ''Basic accounting and bookkeeping (QuickBooks)'', ''Data entry and record‑keeping'', ''Project coordination'', ''Organizational planning'',
