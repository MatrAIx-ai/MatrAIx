  hobbies: '[''Reading historical fiction and non‑fiction'', ''Hiking in the Cumberland Plateau'', ''Gardening'', ''Cooking Southern comfort food with modern twists'', ''Volunteering at the local library'',
    ''Community theater set design'']'
  career_goals: Barbara aims to complete a bachelor’s degree in Business Administration within the next three years, with the long‑term goal of becoming a project manager for a nonprofit focused on community
    development in East Tennessee. She plans to earn a CAPM (Certified Associate in Project Management) certification and eventually launch a small consulting firm that helps local businesses streamline
    operations. In the short term, she seeks an entry‑level administrative position where she can apply her organizational strengths, gain professional experience, and maintain a balanced lifestyle that
    mitigates stress.
