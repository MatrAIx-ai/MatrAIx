personas:
  professional: Jessica Stanley, a seasoned HVAC, electrical, and plumbing specialist, leverages their meticulous blueprint‑reading and safety‑first mindset to lead complex commercial maintenance projects
    while fostering a collaborative apprentice training program that reflects their curiosity for renewable‑energy technologies.
  sports: Jessica Stanley enjoys early‑morning hikes at Wekiwa Springs State Park, plays recreational soccer with the Orlando Community Sports League, follows the Orlando Magic and Orlando City SC, and
    attends weekend yoga classes at the local studio, balancing an energetic workout routine with occasional lapses when a project deadline demands overtime.
  arts: Jessica Stanley channels their love for visual storytelling by curating weekend visits to the Orlando Museum of Art, admiring street murals by local artist Maya Rivera, painting acrylics inspired
    by Frida Kahlo, and attending community theater productions starring veteran actor Clifton Davis, while their eclectic playlist features Janelle Monáe and Vampire Weekend during DIY home‑decor sessions.
  travel: Jessica Stanley prefers meticulously planned weekend escapes to destinations like Key West, the Florida Keys, and Savannah, Georgia, alternating between adventurous kayaking tours and relaxed
    evenings savoring local cuisine, yet they dream of a future eco‑tour of Costa Rica’s rainforests once their boutique business secures financial stability.
  culinary: Jessica Stanley delights in experimenting with multicultural Florida flavors, often cooking key lime pie with fresh graham‑crust, spicing jambalaya with smoked Andouille sausage and okra, and
    crafting mango‑salsa‑topped grilled mahi‑mahi, showcasing a confident intermediate cooking skill while still struggling to perfect sourdough starter consistency.
  core: Jessica Stanley blends a methodical, safety‑obsessed work ethic with a vibrant social streak, yet their habit of over‑planning often collides with a lingering anxiety that fuels both diligent budgeting
    and occasional late‑night salsa practice.
background:
  cultural: Jessica identifies as a white American raised in suburban Lakeland, Florida. Her upbringing reflects Southern hospitality, a strong emphasis on family and community, and an appreciation for
    the diverse cultural mosaic of Central Florida, including the influences of nearby Hispanic and Caribbean communities. She grew up attending a local Protestant church, participating in neighborhood
    festivals, and enjoying outdoor activities typical of the region. This blend of traditional Southern values and exposure to multicultural experiences has shaped her inclusive outlook and her love for
    both local traditions and new artistic expressions.
attributes:
  skills: '[''HVAC system installation and maintenance'', ''Electrical wiring and troubleshooting'', ''Plumbing repairs and pipe replacement'', ''Preventive maintenance scheduling'', ''Blueprint and schematic
    interpretation'', ''Use of hand and power tools'', ''Safety compliance (OSHA)'', ''Customer service and client communication'', ''Team leadership and training'', ''Basic smart‑home device integration'']'
  hobbies: '[''Visiting art galleries and street‑art murals'', ''DIY home‑decor and painting projects'', ''Salsa dancing classes'', ''Volunteering at community clean‑up and food‑drive events'', ''Gardening
    and backyard landscaping'', ''Hiking in nearby state parks'', ''Reading science‑fiction novels'', ''Experimenting with multicultural culinary recipes'', ''Attending live theater and music performances'']'
  career_goals: Jessica aims to become a senior lead technician and eventually a maintenance manager for a large commercial facility in Central Florida. She plans to earn EPA certifications for HVAC, a
    Journeyman Electrician license, and an OSHA trainer credential. With her curiosity for new technologies, she hopes to specialize in solar‑panel installation and other renewable‑energy projects, positioning
    herself to launch a boutique eco‑friendly home services business. Mentoring apprentices and fostering a collaborative team culture are also central to her long‑term career vision, as they align with
    her desire for professional growth and a more stable, less stressful work environment.
