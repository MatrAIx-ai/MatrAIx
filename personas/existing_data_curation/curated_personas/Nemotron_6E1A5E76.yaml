  hobbies: '[''Soccer'', ''Cheerleading'', ''Dancing'', ''Community theater'', ''Socializing with friends'', ''Journaling'', ''Bracelet making'', ''Cooking with family'', ''Reading teen fiction'', ''Casual
    video gaming'']'
  career_goals: Kay aspires to complete her high school education (or obtain a GED) and then pursue a career in nursing, motivated by her desire to help others and work in a structured, predictable environment.
    She also envisions becoming a certified nursing assistant or medical assistant as a stepping stone, and hopes to eventually earn an associate degree in nursing before transferring to a bachelor’s program.
    In the meantime, she plans to volunteer at local health clinics and continue developing her organizational and caregiving skills.
