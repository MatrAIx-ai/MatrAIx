  hobbies: '[''Scale‑model building'', ''Wooden puzzle assembly'', ''Weightlifting'', ''Interval running'', ''Escape‑room participation'', ''Reading cognitive psychology'', ''Self‑improvement literature'']'
  career_goals: Bruce aims to achieve Master Locksmith certification within the next two years and to acquire advanced training in high‑security safes and vault systems. He plans to transition from working
    for a local shop to opening his own boutique locksmith studio in Secaucus, offering specialized services for high‑value assets and corporate clients. In the longer term, he hopes to become a certified
    trainer, sharing his structured approach and stress‑management techniques with apprentices, and eventually to consult for security firms on system design and risk mitigation.
