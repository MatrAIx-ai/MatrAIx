  career_goals: Roinel aims to channel her love of technology and problem solving into a future career as a robotics engineer or software developer focused on educational tools. She dreams of winning science
    fairs, earning a scholarship to a STEM‑focused high school, and eventually studying computer science or engineering at a top university. Her long‑term ambition is to design interactive learning platforms
    that empower other kids to explore science and coding in fun, hands‑on ways.
