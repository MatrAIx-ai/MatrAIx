personas:
  professional: Roinel Bridges is a budding technologist who combines a practical approach to building LEGO creations with a curious drive to code playful animations on Scratch, leveraging their competitive
    streak to troubleshoot bugs and refine projects while staying organized enough to meet school deadlines.
  sports: Roinel Bridges is a pick‑up basketball enthusiast who spends afternoons shooting hoops at the local park, cheering for the Chicago Bulls while playing, and joins a community youth league, balancing
    a competitive drive with a preference for small‑group scrimmages over large crowds.
  arts: Roinel Bridges channels their love of R&B and hip‑hop—listening to Beyoncé, Drake, and Anderson .Paak—into sketching cartoons inspired by Mo Willems' books, while also crafting simple DIY science
    videos for YouTube, demonstrating a critical eye for detail and a creative flair.
  travel: Roinel Bridges dreams of traveling to the Grand Canyon for a geology hike, has visited Disney World on a family vacation, and hopes to explore Tokyo's Akihabara district to see the latest tech
    toys, planning trips with a detailed checklist and a budget set by parents.
  culinary: Roinel Bridges enjoys crafting homemade volcano cupcakes topped with chocolate lava, mixing cocoa powder and marshmallows, and favors pizza with pepperoni and pineapple, often experimenting
    with a mini kitchen set to refine their cooking skills.
  core: Roinel Bridges is a curious, competitive ten‑year‑old who blends a love for LEGO, coding, and mystery books with a penchant for solo reflection and occasional forgetfulness.
background:
  cultural: Roinel is a Black girl growing up in Linden, Michigan, within a close‑knit extended family that values education, community, and cultural heritage. Family gatherings often feature soul food,
    storytelling, and the rhythmic sounds of gospel music from church services. She participates in local celebrations such as Juneteenth, where she learns about African‑American history and the resilience
    of her ancestors. Her parents encourage practical problem‑solving while honoring traditions passed down from her grandparents, who recall the Great Migration and the importance of perseverance. This
    blend of Midwestern community life and proud Black cultural roots shapes Roinel's world view, fostering both a strong sense of identity and an appreciation for diverse perspectives.
