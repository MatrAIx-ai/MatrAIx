  career_goals: Kelly aims to advance to a regional manager role overseeing multiple food service locations, where she can apply her systematic approach to improve efficiency and profitability across a
    larger footprint. She plans to earn advanced certifications in hospitality management and sustainability, positioning herself as a leader in eco‑friendly restaurant practices. Ultimately, she dreams
    of opening her own boutique café that emphasizes locally sourced ingredients and a calm, organized atmosphere, while also creating a supportive work environment that reduces staff turnover and stress.
    Balancing ambition with personal well‑being, Kelly seeks to implement stress‑reduction initiatives for herself and her team, ensuring a healthier work‑life balance.
