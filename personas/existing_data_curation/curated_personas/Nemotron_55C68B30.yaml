personas:
  professional: Kelly Duarte, 45, is a meticulous restaurant operations manager who leverages a business degree, data‑driven budgeting, and strict food‑safety protocols to run a busy Hutto eatery, and they
    excel at designing scalable training programs and stress‑reduction initiatives to prepare for a regional manager role that emphasizes sustainability and employee well‑being.
  sports: Kelly Duarte, 45, enjoys walking their dog along the Hutto trail network for low‑impact cardio, participates in the local Hutto Trail Running Club’s weekend runs, and supports the Houston Astros
    and Houston Texans, while they avoid high‑intensity gym sessions in favor of structured, manageable outdoor activities.
  arts: Kelly Duarte, 45, finds creative fulfillment quilting intricate quilt blocks inspired by Texas folk patterns, reads historical fiction by authors like Ken Follett and Philippa Gregory, and attends
    intimate performances by the Hutto Community Theater, while they relish classic country tunes from George Strait and the soothing piano works of Yiruma.
  travel: Kelly Duarte, 45, prefers well‑planned weekend getaways to nearby Hill Country vineyards and historic Santa Fe, balancing their love for quiet nature walks with a modest budget that prioritizes
    family time, and they dream of a solo retreat to the lavender fields of Provence after securing their café venture.
  culinary: Kelly Duarte, 45, delights in farm‑to‑table cooking that showcases vegetables from their garden—such as heirloom tomatoes, sweet peppers, and kale—paired with Texan staples like smoked brisket
    and fresh salsa verde, and they experiment with seasonal recipes while seldom dabbling in overly complex plating, preferring simplicity and flavor.
  core: Kelly Duarte, 45, merges precise restaurant management with a serene garden sanctuary, yet their tendency to over‑plan often triggers late‑night puzzle marathons and occasional stress‑induced coffee
    overconsumption.
background:
  cultural: Kelly is a white American who grew up in central Texas, where Southern hospitality and a strong work ethic are cultural cornerstones. Her community values emphasize family, self‑reliance, and
    active participation in local events such as farmer’s markets and church gatherings. While she appreciates traditional Texan cuisine and the region’s outdoor lifestyle, she also embraces the diverse,
    growing character of Hutto, blending respect for local customs with an openness to new ideas and sustainable practices.
