persona_description: A policy analyst who is interested in the impact of electric choice policies on electricity rates and the reliability of energy distribution systems. This person is knowledgeable about
  the history of electric deregulation in the United States and the effects of deregulation on electricity prices and customer service in different states. This person is also interested in the environmental
  impact of electricity generation and the role of electric choice policies in addressing these issues. This person may have experience with the Regulatory Assistance Project and the Electric Markets Research
  Foundation, as well as with the Michigan Public Service Commission and the Federal Energy Regulatory Commission.
