personas:
  professional: Grace Perrin, a spirited four‑year‑old, already imagines herself as a future pediatric dentist, obsessively lining up her toy teeth and practicing gentle check‑ups on stuffed animals, showing
    an early knack for organization and practicality while balancing imaginative play with a strong preference for routine.
  sports: Grace Perrin, a happy member of the local Kids’ Soccer Club, proudly wears the blue kit of the Seattle Sounders FC youth team during games, devotes herself to the weekend mini obstacle course
    at the park, and follows a bedtime ritual of stretching her tiny legs, balancing energetic play with a love for predictable routines.
  arts: Grace Perrin, an avid fan of children’s music, sings along to Raffi’s “Baby Beluga” and the “Let It Go” chorus from Frozen, delights in weekly Storytime sessions at the community library where she
    showcases crayon drawings of dragons, and proudly recites Mother Goose rhymes, infusing daily life with creative expression while staying grounded in familiar favorites.
  travel: Grace Perrin, who has already visited the San Diego Zoo and grandparents’ farmhouse in the countryside, loves planning trips with colorful stickers on a wall map, prefers the predictable routine
    of the family car over flying, and dreams of seeing the real‑life Disney castle in Orlando next summer, blending curiosity with a need for stability.
  culinary: Grace Perrin, a self‑declared “mac‑and‑cheese connoisseur,” relishes the creamy elbow pasta topped with a sprinkle of cheddar, can differentiate apple slices from grapes, eagerly helps stir
    the pot with her plastic spoon, and is notorious for sneaking an extra chocolate chip cookie before dinner, showing a mix of culinary enthusiasm and mischievous indulgence.
  core: Grace Perrin is a routine‑loving four‑year‑old with a budding dentist imagination, disciplined piggy‑bank habits, mild allergy vigilance, soccer enthusiasm, a love for child‑friendly music, sticker‑mapped
    travel dreams, and a cheeky mac‑and‑cheese obsession.
background:
  cultural: Grace was born and raised in Willoughby, a small suburban community on the shores of Lake Erie in Lake County, Ohio. Her family is middle‑class and identifies with the broader Midwestern cultural
    milieu, which values community, practicality, and modesty. Weekly family meals, church attendance, and participation in local events such as the Fourth of July parade are regular parts of her upbringing.
    The local preschool emphasizes routine, polite behavior, and group activities, reinforcing her personal preference for familiar structures. Holidays like Thanksgiving and Christmas are celebrated with
    traditional dishes and gatherings that highlight gratitude, togetherness, and a sense of belonging. These cultural influences nurture Grace’s reliable, compassionate, and organized temperament.
