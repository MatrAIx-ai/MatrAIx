  career_goals: Grace’s emerging interests point toward helping roles that fit her love of routine and practical care. She often talks about wanting to become a teacher because she enjoys storytime, the
    predictable rhythm of a classroom, and helping her friends learn new things. She also expresses fascination with animals and says she would like to be a veterinarian one day, where she could apply the
    same reliable, compassionate approach to caring for pets. At this age, her ambitions are expressed through play‑acting in pretend school and animal‑care scenarios, indicating a budding desire for a
    stable, service‑oriented career.
