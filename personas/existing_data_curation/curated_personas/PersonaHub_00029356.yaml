persona_description: A retired lawyer who specializes in civil rights litigation, particularly in cases involving the prosecution of wrongful convictions and the fight against systemic racism. They have
  a deep understanding of the history of the Jim Crow South and the role of the media in shaping public opinion. They are particularly interested in the case of Leo Frank, the former factory worker who
  was wrongly convicted of murder and hanged in 1915, and the subsequent cover-up and corruption that occurred in the years following the trial. They are motivated by a desire to educate the public about
  the importance of justice and the need for systemic change.
