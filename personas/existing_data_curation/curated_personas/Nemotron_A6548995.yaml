personas:
  professional: Franklin Perry, an aspiring junior robotics programmer, applies their methodical mindset and love of clear rules to design and troubleshoot LEGO Mindstorms projects, demonstrating early
    proficiency in Python loops and systematic debugging while leading the school’s robotics club with reliable, organized planning.
  sports: Franklin Perry, a member of the city’s youth track club who excels in 800‑meter runs and avidly follows the U.S. Olympic track and field team, treats each practice as a timed puzzle, prefers structured
    interval training over casual play, and roots for the national soccer team during major tournaments.
  arts: Franklin Perry, who practices piano three times a week, finds inspiration in the disciplined compositions of Ludwig van Beethoven and the crisp electronic scores of Koji Kondo's video game soundtracks,
    and often watches animated series like 'Adventure Time' for its imaginative storytelling and visual style.
  travel: Franklin Perry enjoys meticulously planned family trips, having visited the Smithsonian National Air and Space Museum in Washington, D.C., the Grand Canyon on a summer road trip, and dreams of
    exploring the LEGO House in Billund, Denmark, and the interactive science museum in Tokyo, Japan, always packing a checklist of puzzles and reading material for the journey.
  culinary: Franklin Perry, who prefers predictable flavors, often helps cook simple dishes like cheddar macaroni and cheese, enjoys assembling homemade sushi rolls with cucumber and avocado, and relishes
    sweet treats such as lemon bars made with fresh lemon zest, while occasionally sneaking extra marshmallows into their cereal.
  core: Franklin Perry is a calm, competitive 11‑year‑old who thrives on structure, turning LEGO robotics, chess, and track into precise personal challenges, yet occasionally indulges in spontaneous marshmallow
    snacks.
background:
  cultural: Franklin grew up in Elyria, a mid‑size city in Lorain County, Ohio, immersed in a typical Midwestern environment that values hard work, community involvement, and practical education. His family
    observes mainstream American cultural traditions, celebrating holidays such as Thanksgiving and the Fourth of July, and participates in local community events. The region’s emphasis on school sports,
    STEM programs, and civic responsibility has shaped his organized and goal‑oriented outlook.
