  career_goals: Franklin aspires to become a civil engineer or robotics engineer, drawn by his love for building things and solving practical problems. He dreams of designing bridges, robots, or other structures
    that improve everyday life. He aims to attend a STEM‑focused high school, earn scholarships, and eventually work on large‑scale infrastructure projects or innovative robotics teams.
