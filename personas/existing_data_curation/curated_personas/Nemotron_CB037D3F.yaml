personas:
  professional: Blake is a budding LEGO engineer who spends afternoons constructing detailed structures, demonstrating a practical eye for stability while relishing the flexibility to reconfigure designs
    on a whim.
  sports: Blake is a little soccer enthusiast who practices dribbling with a mini ball in the neighborhood park, cheers for the Nebraska Cornhuskers during Sunday games, and prefers playing in small pickup
    groups rather than large team scrimmages.
  arts: Blake delights in drawing colorful dinosaurs and listening to the playful tunes of The Wiggles, often mimicking the cheerful choreography during family living‑room dance sessions.
  travel: Blake loves short road trips to the State Fair, where they stare wide‑eyed at the giant Ferris wheel, and dreams of visiting Disneyland’s fantasy castle, though they are equally content with a
    family day at the nearby lake for splashy fun.
  culinary: Blake enjoys cheesy macaroni, chicken nuggets, and fresh apple slices, proudly stirring pancake batter with a wooden spoon and insisting on a dash of cinnamon in their oatmeal.
  core: Blake, a four‑year‑old with a love for structured play and spontaneous imagination, often leaves LEGO bricks scattered, clings to bedtime story routines, and can be surprisingly assertive when protecting
    their favorite stuffed rabbit.
background:
  cultural: Blake grew up in a typical Midwestern American setting in Lincoln, Nebraska, within Lancaster County. His family reflects the region’s European ancestry, with influences from German and Scandinavian
    heritage common in the area. He participates in community traditions such as local county fairs, school celebrations, and national holidays like Thanksgiving and Fourth of July. The surrounding agricultural
    landscape, friendly neighborhood ties, and an emphasis on modesty and cooperation shape his cultural outlook.
