  hobbies: '[''LEGO building'', ''Biking and nature walks'', ''Minecraft (creative mode)'', ''Reading graphic novels'', ''Soccer'', ''Jigsaw puzzles'', ''Basic science experiments'', ''Drawing cartoons'']'
  career_goals: In the short term, Peter aims to improve his reading fluency, master the multiplication tables, and finish a simple Scratch game he started with his teacher. He wants to join the school
    robotics club and earn a badge in the local junior fire‑fighter program. Looking ahead, his practical and community‑oriented personality leads him to imagine a future as a mechanical engineer who designs
    safe playground equipment or a firefighter who works on safety solutions for his town. He also harbors a growing curiosity about wildlife, dreaming of becoming a biologist who helps protect Michigan’s
    forests and lakes. Each step reflects his love of clear, structured progress while leaving room for creative flexibility.
