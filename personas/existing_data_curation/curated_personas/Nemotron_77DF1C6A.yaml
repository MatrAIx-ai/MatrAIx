personas:
  professional: Peter Simon is a budding engineer‑in‑training who channels a love for LEGO vehicles and Minecraft creations into designing simple machines, applying a practical, step‑by‑step approach that
    satisfies their need for predictability while allowing the spontaneous, unstructured play they enjoy, and they often improvise new contraptions during free time.
  sports: Peter Simon spends Saturdays playing forward for the Mount Pleasant Wanderers youth soccer team, joins the Creekside Cubs youth baseball league in the summer, and rides their bike along the nearby
    creek trail for solitary exploration, cheering on the Seattle Seahawks on game days, preferring a blend of team camaraderie and unstructured outdoor adventure, and they relish the freedom of choosing
    between organized matches and solo rides.
  arts: Peter Simon devours Dav Pilkey’s "Dog Man" and "Captain Underpants" graphic novels, sketches cartoon characters inspired by Emmet Brickowski from The LEGO Movie, watches the animated series "Adventure
    Time" starring Jeremy Shada, and streams upbeat pop‑rock tracks by Imagine Dragons while building, reflecting a vivid imagination tempered by a preference for visual, bite‑size stories, and they often
    recreate scenes from their favorite comics in LEGO form.
  travel: Peter Simon prefers spontaneous day‑trips with family to the nearby Mount Pleasant State Park’s creek and forested trails, yet dreams of a future vacation to Disney World in Orlando and a pilgrimage
    to the LEGO House in Billund, Sweden, balancing limited allowance with parental planning and a love for both relaxed nature outings and iconic theme‑park excitement, and they often pack a small backpack
    with snacks and a sketchbook for each adventure.
  culinary: Peter Simon loves assembling pepperoni pizza slices like LEGO bricks, enjoys making simple grilled cheese sandwiches with sharp cheddar, and eagerly mixes marshmallows into s’mores, though their
    cooking attempts are limited to microwaving popcorn and occasionally over‑salting spaghetti, showing enthusiasm for food creation paired with a beginner’s lack of precision, and they sometimes forget
    to wash their hands after handling raw ingredients.
  core: Peter Simon blends a methodical love for building with a carefree, spontaneous streak, turning everyday materials into miniature machines while occasionally misplacing soccer cleats and forgetting
    to floss, and they often surprise friends with impromptu contraptions during play.
background:
  cultural: Peter grows up in Mount Pleasant, a small Mid‑Michigan community where Midwestern values of friendliness, modesty, and neighborly help are emphasized. His family participates in local traditions
    such as the Midland County Fair, community baseball games, and seasonal celebrations like Thanksgiving and summer picnics by the local lakes. He attends a public elementary school that encourages involvement
    in after‑school clubs, sports, and community service. The region’s appreciation for outdoor recreation—fishing, hiking, and exploring the surrounding forests—shapes his love of nature. His cultural
    environment blends a respect for hard work, community support, and a stable, family‑centered life while also exposing him to diverse activities through school and local youth programs.
attributes:
