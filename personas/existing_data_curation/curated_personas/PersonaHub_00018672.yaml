persona_description: A neuroscientist or a researcher interested in the study of the brain and its regions, particularly the amygdala and the hippocampus. This person is likely to be interested in the innovative
  use of ultra-high-field magnetic resonance imaging to detect the exact border between the amygdala and the hippocampus, which can reveal differences in personality and medical conditions. They may also
  be interested in the practical applications of these findings, such as measuring the regions individually in each patient to prevent attributing a piece of brain to the wrong region, which can lead to
  a false diagnosis.
