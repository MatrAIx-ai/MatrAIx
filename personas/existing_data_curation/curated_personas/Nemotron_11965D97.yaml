  hobbies: '[''Generative Art Creation'', ''Jazz Saxophone (amateur)'', ''Science Fiction & Speculative Literature Reading'', ''Chess'', ''Weekend Basketball Leagues'', ''Community STEM Mentorship'', ''Urban
