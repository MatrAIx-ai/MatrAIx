personas:
  professional: Marcel Judge, a senior data strategist with deep expertise in statistical modeling, machine learning, and risk analytics, channels his imaginative spark into building data‑driven products
    that blend algorithmic fairness with creative visual storytelling while steering diverse, agile teams toward executive‑level impact.
  sports: Marcel Judge, a competitive member of a local adult basketball league and avid follower of the Boston Celtics, carves out early‑morning runs to offset court wear‑and‑tear, while also indulging
    in strategic chess matches that sharpen his tactical mindset.
  arts: Marcel Judge fuses his love for code and canvas by curating generative art installations at Boston’s SoWa Art Walk, while moonlighting as a saxophonist in a neighborhood jazz combo that reveres
    the sounds of John Coltrane and Miles Davis, and devours speculative novels by N. K. Jemisin and Ted Chiang for creative fuel.
  travel: Marcel Judge balances spontaneous weekend road trips to New England’s historic towns with meticulously planned pilgrimages to New Orleans for live jazz, Ghana to explore ancestral roots, and Tokyo’s
    tech districts, all while navigating family commitments that shape his travel budget and itinerary.
  culinary: Marcel Judge experiments in his kitchen with modern twists on classic soul staples—like collard‑green quinoa salad, sweet‑potato gnocchi with smoky paprika, and bourbon‑glazed chicken wings—while
    occasionally overindulging in fried catfish during family gatherings.
  core: Marcel Judge is a data‑driven storyteller who riffs on numbers like a sax solo, channels competitive fire into every project, hoards vintage vinyl at the expense of a tidy workspace, and never says
    no to a late‑night hackathon.
background:
  cultural: Marcel was raised in Brockton, a city with a strong African-American heritage and a legacy of labor-union solidarity. His parents, who immigrated from the Caribbean and the American South, emphasized
    education, resilience, and community service. Growing up, Marcel was immersed in church music, neighborhood block parties, and local Black literary circles, experiences that cultivated his appreciation
    for rhythm, storytelling, and collective achievement. His identity as a Black professional in a predominantly white analytical field has shaped his determination to excel and to advocate for greater
    inclusion. He actively supports initiatives that bring STEM and the arts to under-represented youth in the Greater Boston area, celebrating his cultural roots while navigating a modern, globally connected
    career.
attributes:
