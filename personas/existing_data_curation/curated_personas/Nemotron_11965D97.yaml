  career_goals: Marcel aims to move into a senior executive role such as chief data officer or chief analytics officer within the next five years, where he can steer the integration of data science and
    creative innovation across the organization. He aspires to publish breakthrough research on algorithmic fairness and develop patents around predictive analytics for sustainable finance. Additionally,
    he plans to launch a boutique consulting firm that partners with culturally diverse startups to leverage data-driven strategies, and to mentor the next generation of Black professionals in STEM through
    structured mentorship programs and community workshops.
