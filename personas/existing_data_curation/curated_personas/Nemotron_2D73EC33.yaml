personas:
  professional: Alberto Herasme, an aspiring interaction designer, fuses advanced digital illustration with Python creative coding to build UI prototypes that weave in motifs from their family’s culinary
    and musical traditions, while they maintain meticulous project organization and a disciplined self‑learning regimen.
  sports: Alberto Herasme, a solitary outdoor enthusiast, spends weekends trekking the White Mountains and participates in the New England Mountain Club’s guided hikes, while keeping a personal fitness
    routine of solo trail runs and occasionally cheering for the Boston Red Sox and Boston Celtics from the comfort of their dorm room, and they occasionally stream game highlights on a laptop after workouts.
  arts: Alberto Herasme, an avid digital painter, draws inspiration from Julie Mehretu’s layered cityscapes, Beeple’s glitch aesthetics, and the rhythmic cadences of traditional marimba ensembles, while
    Aphex Twin’s experimental electronic textures and Brian Eno’s ambient soundscapes pulse through their late‑night sketch sessions, and they often reference philosophical ideas from Heidegger in their
    visual narratives.
  travel: Alberto Herasme prefers meticulously self‑planned solo adventures, having explored the deep foliage of the White Mountains and the historic harbor of Boston, they now dream of backpacking through
    the misty highlands of Central America and wandering the ancient ruins of Copán, prioritizing immersive cultural experiences over luxury accommodation and relying on budget travel apps to keep costs
    low.
  culinary: Alberto Herasme, a self‑taught kitchen experimenter, faithfully recreates traditional family recipes such as pepian and tamales—slow‑cooked stews rich with chilies, roasted tomatoes, and masa‑based
    fillings—while they frequently improvise with locally sourced herbs and spices to fuse bold, familiar flavors with contemporary twists.
  core: Alberto Herasme, an introspective 18‑year‑old digital artist, balances solitary creative marathons with disciplined project planning, and they often lose sleep over intricate sketches while meticulously
    tracking personal finances and health metrics.
background:
  cultural: Alberto is the son of Guatemalan immigrants who settled in rural Vermont. Raised in a bilingual household, he grew up speaking Spanish at home and English at school, absorbing the rhythms of
    Guatemalan folklore, marimba music, bright textile patterns and holiday traditions like Día de los Muertos. The vibrant colors and mythic stories of his heritage heavily influence his artistic style,
    while the quiet, independent ethos of New England aligns with his preference for solitude. He participates in a local Latin American cultural association during community events, but primarily expresses
    his cultural identity through his art, cooking, and personal study of Guatemalan history and literature.
attributes:
  skills: '[''Digital Illustration'', ''Graphic Design'', ''Adobe Photoshop'', ''Adobe Illustrator'', ''Procreate'', ''Python Programming'', ''Creative Coding'', ''Critical Research'', ''Academic Writing'',
    ''Bilingual Spanish-English'', ''Self‑directed Learning'', ''Project Planning'']'
  hobbies: '[''Digital Painting'', ''Sketching'', ''Photography'', ''Experimental Music Listening'', ''Reading Philosophy'', ''Reading Art Theory'', ''Guatemalan Folklore Study'', ''Cooking Traditional
    Guatemalan Dishes'', ''Hiking'', ''Creative Coding'', ''Journaling'', ''Curating Virtual Art Collections'']'
  career_goals: Alberto plans to complete a degree in Interaction Design or Digital Media, aiming to become a UI/UX designer or independent game developer who crafts immersive, culturally resonant experiences.
    He dreams of launching a startup that fuses Guatemalan artistic motifs with cutting‑edge interactive technology, targeting educational and entertainment audiences. In the longer term, he hopes to publish
    research on the intersection of art, technology, and heritage, and to collaborate with museums or cultural institutions to design digital exhibitions that highlight Guatemalan history. He seeks recognition
    for innovative, solitary‑driven projects that push conventional boundaries while achieving commercial success.
