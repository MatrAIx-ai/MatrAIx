  hobbies: '[''Abstract Painting'', ''Desert Landscape Photography'', ''Woodworking'', ''Science Fiction & Philosophy Reading'', ''Chess'', ''Hiking'', ''Cactus Gardening'', ''Visiting Art Galleries'',
