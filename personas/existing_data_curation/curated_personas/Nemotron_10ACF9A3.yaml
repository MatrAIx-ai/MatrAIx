  career_goals: Approaching retirement, Mohammad aims to transition into a consulting role where he can mentor emerging construction professionals and champion the integration of sustainable and artistic
    design principles in large‑scale projects. He aspires to earn LEED Accredited Professional certification, author a guide on creative construction management, and eventually oversee a flagship eco‑friendly
    development in the Phoenix metropolitan area that reflects his blend of practicality and artistic vision.
