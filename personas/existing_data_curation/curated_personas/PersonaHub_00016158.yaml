persona_description: A marine biologist studying the disco clam, a mollusc that creates a dazzling light show at the lip of its mouth. The clam's highly reflective lips allow it to dance underwater, attracting
  prey and potentially repelling predators. The clam's scientific name is Ctenoides ales and it is found at depths of 10 to 150 feet off Indonesia, Australia, and nearby. The clam is red with vermillion
  tendrils and has 40 eyes.
