  career_goals: She aims to transition into a mentorship role, guiding newly licensed nurses through both the technical and interpersonal aspects of care. Additionally, she hopes to lead a community health
    education program focused on chronic disease management for seniors in Alexandria. Balancing her love for routine, she plans to establish a regular workshop series, but remains open to spontaneous outreach
    events when community needs arise. Ultimately, she aspires to leave a legacy of compassionate, resilient nursing practice that blends structured excellence with adaptable care.
