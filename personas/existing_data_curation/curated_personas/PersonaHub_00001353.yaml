persona_description: A sports medicine specialist with expertise in the treatment and management of wrist injuries, particularly those related to carpal instability and wrist fracture-dislocations. This
  individual has extensive knowledge of the anatomy and biomechanics of the wrist, as well as the anatomy and function of the carpal bones and ligaments. They are skilled in the evaluation and treatment
  of patients with wrist injuries, and are highly trained in the use of imaging techniques and physical therapy to manage these conditions. They are also familiar with the Mayfield classification for the
  sequence of ligamentous and carpal disruptions caused by wrist hyperextension, ulnar deviation, and intercarpal supination, and are able to accurately diagnose and treat patients with these injuries.
