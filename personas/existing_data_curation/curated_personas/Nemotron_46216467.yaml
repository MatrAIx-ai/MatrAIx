  career_goals: Fernando often imagines himself as a helper who can combine his curiosity with practical help, dreaming of becoming a firefighter who rescues people, an engineer who builds safe structures,
    or a veterinarian who cares for animals on local farms. He expresses a desire to protect his family and community, showing early ambition to pursue roles that allow him to explore, create, and provide
    safety for others.
