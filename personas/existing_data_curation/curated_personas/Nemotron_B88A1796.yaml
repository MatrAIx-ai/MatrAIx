  hobbies: '["Landscape photography","Acrylic painting","Reading science non-fiction","DIY woodworking projects","Local museum visits","Gardening (native prairie plants)","Hiking on Kansas trails","Homebrewing
    craft beer","Small book‑club gatherings","Listening to indie folk music"]'
  career_goals: Nathaniel aims to move from front‑line production to a supervisory role within the next three to five years, aspiring to lead a shift and mentor newer workers. He plans to earn certifications
    in CNC machining and Six Sigma Green Belt to deepen his technical and process‑improvement capabilities. While advancing his career, he wants to maintain a healthy work‑life balance, ensuring he can
    spend quality time with his spouse and children. He also hopes to develop a modest home studio where he can explore his artistic interests, ultimately marrying his technical skills with creative projects
    like designing custom woodworking pieces for his community.
