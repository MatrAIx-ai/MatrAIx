personas:
  professional: Kerry Johnson leverages strategic HR talent acquisition, data‑driven workforce planning, and charismatic public speaking to build inclusive cultures, while their competitive edge pushes
    continual improvement of HR metrics even as they sometimes let loose‑leaf planning habits cause last‑minute schedule reshuffles.
  sports: Kerry Johnson passionately roots for the Atlanta Falcons, Hawks, and Atlanta United, joins the Piedmont Hiking Club for weekend Appalachian trail treks, and squeezes in evening yoga sessions to
    counterbalance the competitive spirit they bring to the office, even if their gym attendance is irregular.
  arts: Kerry Johnson finds inspiration at Atlanta’s jazz clubs listening to John Coltrane, steals indie vibes at live shows by Tame Impala, and draws on the storytelling of Viola Davis’s theater performances,
    weaving these artistic experiences into their HR workshops and social gatherings.
  travel: Kerry Johnson prefers spur‑of‑the‑moment road trips to nearby Asheville and Austin, while dreaming of a culinary pilgrimage to New Orleans and a scenic escape to Reykjavik, planning just enough
    to secure lodging but leaving the itinerary open for spontaneous detours.
  culinary: Kerry Johnson is an adept home cook who reinvents Southern comfort staples—spicy fried chicken with gochujang glaze, collard greens sautéed with smoked paprika, and cornbread with jalapeño—while
    frequently sourcing fresh herbs from their backyard garden and delighting friends with impromptu brunch spreads.
  core: Kerry Johnson is a sociable HR strategist who mixes competitive drive with relaxed planning, thrives on community and jazz, and occasionally lets impulsive spending and health oversight sneak into
    an otherwise vibrant, people‑focused life.
background:
  cultural: Kerry grew up in a middle‑class white family in the Atlanta metropolitan area, immersed in Southern hospitality and community-oriented traditions. Family gatherings often featured church attendance,
    Sunday potlucks, and outdoor barbecues, fostering a strong sense of belonging and conversational flair. While rooted in these Southern cultural norms, her professional experience in human resources
    has broadened her perspective, leading her to value diversity, inclusion, and progressive workplace practices. She identifies with the cultural blend of classic Southern values—friendliness, resilience,
    and a love for food and music—combined with a modern, inclusive outlook shaped by her career and the multicultural environment of DeKalb County.
