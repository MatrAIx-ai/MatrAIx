  hobbies: '[''Networking mixers'', ''Volunteer work at local food bank'', ''Hosting brunches'', ''Cooking Southern cuisine'', ''Gardening'', ''Yoga'', ''Reading contemporary fiction'', ''Attending live
    music concerts'', ''Salsa dancing'', ''Hiking on Appalachian trails'']'
  career_goals: Kerry aims to advance from HR manager to Director of Human Resources within the next three years, focusing on building a high‑performing, inclusive culture at a growing midsize company in
    the Southeast. She plans to earn her SHRM‑Senior Certified Professional (SHRM‑SCP) credential and lead the rollout of an integrated HRIS platform that combines analytics with employee experience design.
    Long‑term, she envisions stepping into a Vice President of People role, where she can shape organizational strategy, champion innovative talent development programs, and mentor the next generation of
    HR leaders.
