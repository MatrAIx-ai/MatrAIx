persona_description: A dermatologist with expertise in the diagnosis and treatment of skin cancer and other cutaneous diseases. She has a deep understanding of the factors that contribute to the development
  of skin cancer, including solar radiation and individual genetic stress. She has a special qualification in medical tumor therapy, acquired during her time at the Berlin Charité, which enables her to
  provide competent and empathetic advice on the various skin diseases she treats. She is skilled in initiating effective therapy and conducting reliable aftercare examinations to ensure the best possible
  outcome for her patients.
