  career_goals: Matthew dreams of a future that blends his curiosity about nature with his practical love of technology. In the short term, he hopes to join a junior ranger program, attend a summer coding
    camp, and improve his grades in science and math. Long‑term, he aspires to become an environmental scientist or wildlife biologist who works with his tribe to protect the surrounding desert and forest
    ecosystems. He also imagines studying environmental engineering in college, eventually returning to help design sustainable water‑management projects on his reservation. Helping younger kids learn about
    both tribal traditions and STEM subjects is a personal ambition that guides his current effort to volunteer as a mentor in school clubs.
