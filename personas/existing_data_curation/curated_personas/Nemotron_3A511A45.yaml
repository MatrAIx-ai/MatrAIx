personas:
  professional: Matthew Hunter, an 11‑year‑old budding coder and amateur naturalist, channels his curiosity and practical mindset into creating Scratch projects that simulate local ecosystems while organizing
    his school STEM club tasks with a careful balance of structure and spontaneity.
  sports: Matthew Hunter enjoys weekend hikes along the San Pedro River with the Sierra Vista Trail Explorers Club, roots for the Arizona Diamondbacks and the Phoenix Suns, and joins the middle school cross‑country
    team in fall, balancing his love of nature with a lighthearted interest in youth soccer when friends invite him.
  arts: Matthew Hunter finds joy in painting rocks with vibrant tribal patterns, drawing comic strips inspired by the adventures of his favorite hero Tintin, practicing traditional powwow drumming at community
    gatherings, and jamming to the soothing flute melodies of R. Carlos Nakai alongside pop hits from Ariana Grande.
  travel: Matthew Hunter dreams of day‑tripping to the Grand Canyon’s South Rim, exploring the red‑rock formations of Sedona, and someday backpacking through Yosemite’s giant sequoias, preferring carefully
    planned itineraries that leave room for spontaneous wildlife spotting.
  culinary: Matthew Hunter loves the bold flavors of chicken enchiladas topped with sharp cheddar, enjoys whisking together fresh pico de gallo with tomatoes, onions, cilantro, and lime, and can confidently
    bake chocolate chip cookies, though he sometimes forgets to clean up the kitchen, leaving crumbs for his dog.
  core: Matthew Hunter blends a curious mind with practical habits, caring kindness, and a habit of worrying over details, creating a unique mix of disciplined creativity and occasional stress‑driven forgetfulness.
background:
  cultural: Matthew is a member of an American Indian family rooted in the Chiricahua Apache community of southeastern Arizona. Growing up in Sierra Vista, he balances life on the reservation with the broader
    suburban environment near Fort Huachuca. His household upholds tribal values of respect for the land, storytelling, and community service. He learns bits of the Apache language at home, participates
    in seasonal ceremonies, and helps prepare for powwows where he drums and dances. The family also emphasizes modern education, encouraging Matthew to excel in school while staying connected to his heritage.
    This dual perspective informs his sense of identity, his love for the desert landscape, and his desire to use science and technology to benefit his community.
