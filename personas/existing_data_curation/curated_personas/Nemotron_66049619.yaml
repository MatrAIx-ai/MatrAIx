  career_goals: Mason dreams of becoming an artist‑inventor who designs interactive installations that teach kids about nature, or a video‑game developer who creates imaginative worlds. He wants to combine
    his love for drawing, storytelling, and coding to spark curiosity in others. In the longer term, he imagines exploring space or becoming a scientist‑artist, but his immediate ambition is to keep learning
    new creative tools and share his creations with friends.
