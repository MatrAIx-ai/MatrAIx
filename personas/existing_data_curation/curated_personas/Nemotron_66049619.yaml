personas:
  professional: A budding junior artist and inventive builder, Mason Jones channels their curiosity into drawing cartoons, painting landscapes, and crafting elaborate LEGO and Minecraft structures, often
    leading their school’s art club projects despite a tendency to resist rigid deadlines.
  sports: Mason Jones loves cheering for the Indianapolis Colts on Sundays, plays Little League T‑ball in the spring, and rides their bike to the local park for informal soccer games while regularly attending
    the high school basketball games during winter.
  arts: Mason Jones draws inspiration from classic cartoonists like Bill Watterson and modern creators such as Pixar’s animators, spends hours sketching characters while listening to the playful tunes of
    The Beatles and enjoys visiting the Indianapolis Museum of Art during family outings.
  travel: Mason Jones prefers road‑trip adventures, often planning family weekends to nearby Indiana Dunes for beachcombing, dreaming of a future visit to Disneyland and the Grand Canyon, but respects the
    budget constraints of their parents by choosing nearby state parks over long flights.
  culinary: Mason Jones loves classic comfort foods like mac & cheese, pizza, and chocolate chip cookies, takes pride in helping stir batter for banana‑brownie muffins, but often sneaks extra marshmallows
    onto cereal and overlooks veggies unless they’re crunchy carrots from the farm stand.
  core: Mason Jones is a curious, art‑obsessed explorer who balances spontaneous creativity with a love for community traditions, yet occasionally forgets to file their allowance receipts and veggies on
    their plate.
background:
  cultural: Mason is a white American child raised in Hobart, Indiana, a small town in Lake County that blends Midwestern values of community, modesty, and self‑reliance. His family celebrates traditional
    U.S. holidays such as Thanksgiving, Christmas, and Fourth of July, and they attend a local Protestant church, which reinforces a sense of community service. He attends a public elementary school where
    the curriculum introduces basic multicultural awareness while the surrounding community remains largely homogenous. Local traditions like county fairs, high‑school sports games, and neighborhood block
    parties shape his social life. These influences give Mason a grounded Midwestern upbringing, while his parents encourage curiosity, art, and independent learning.
