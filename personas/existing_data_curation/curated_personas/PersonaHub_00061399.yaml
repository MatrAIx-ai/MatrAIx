persona_description: Wen-Mei Hwu, a distinguished electrical and computer engineering professor at the University of Illinois, who is known for his expertise in GPU computing and has presented on the future
  of scalable computing with GPU computing at the Ohio Supercomputer Center's Computational Science Lecture Series. He is an advocate for the education and adoption of GPU programming, and his research
  focuses on developing application algorithms, programming tools, and software for the deployment of next-generation accelerators in science and engineering applications. Hwu is a leader in the Great Lakes
  Consortium, which is working to accelerate the time to discovery in science and engineering through computational science, and is a partner in the Ohio Computational Science Lecture Series.
