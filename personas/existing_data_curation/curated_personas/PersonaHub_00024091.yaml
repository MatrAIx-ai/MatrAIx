persona_description: Kevin Clark is a professor in the division of learning technologies in the College of Education and Human Development at George Mason University. He is also the founder and director
  of the Center for Digital Media Innovation and Diversity. Kevin is known for his work in STEM education, particularly for African American students, and for his efforts to accelerate STEM opportunities
  for underserved communities. He is passionate about using his STEM education to improve educational opportunities for students who are traditionally underserved, and he believes that STEM resources have
  the most educational impact when they are used to accomplish specific tasks and solve relevant problems. Kevin's research interests include the study of group theory, particularly the concepts and theorems
  related to subgroups and isomorphisms. He is also interested in the structure of finite groups, representation theory of groups, isomorphism problems, and the theory of group automorphisms.
