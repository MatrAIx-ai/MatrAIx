personas:
  professional: James Lewis is an aspiring IT support specialist and future certified automotive technician who leverages his self‑taught Python scripting, hardware troubleshooting, and methodical project
    planning to solve tech puzzles while volunteering as a peer tutor, reflecting his blend of curiosity, practicality, and reliability.
  sports: James Lewis enjoys regular hikes on the American River Parkway as a member of the Sacramento Hiking Club, rides a road bike with the Bay Area Cyclists League during summer, streams games of the
    Sacramento Kings (NBA) and the San Francisco 49ers (NFL), and maintains fitness through a structured weekly routine of cardio hikes and bike rides.
  arts: James Lewis is a voracious sci‑fi reader, often delving into works by Isaac Asimov and Andy Weir, captures nature photographs inspired by Ansel Adams, builds artistic model rockets reminiscent of
    the designs in James Gurney’s illustrations, and relaxes to ambient compositions by Brian Eno.
  travel: James Lewis prefers low‑key, nature‑focused travel, having camped in Yosemite, explored Muir Woods, and planning a future visit to the Kennedy Space Center, always mapping itineraries in spreadsheets,
    balancing tight budgets with a desire for hands‑on learning experiences.
  culinary: James Lewis favors quick, protein‑rich meals like chicken teriyaki bowls, spaghetti carbonara, and homemade pepperoni pizza, often cooking on a single‑burner electric skillet, experimenting
    with fresh basil, mozzarella, capers, and occasionally adding a dash of sriracha for extra kick.
  core: James Lewis is a methodical, curiosity‑driven teen who blends solitary tech tinkering with organized community service, always planning the next project while keeping a tight budget and a spreadsheet
    for life.
background:
  cultural: James is a white American raised in the suburban community of Carmichael, California, within Sacramento County. His family heritage includes Irish and German roots, reflecting a Midwestern ancestry
    that values self‑reliance, hard work, and community involvement. Growing up in a middle‑class suburb, he was exposed to the typical American cultural mix of mainstream media, local events such as county
    fairs, farmers' markets, and outdoor recreation opportunities. The regional culture emphasizes practical skills, education (despite his early school exit), and civic responsibility. While his immediate
    environment is predominantly suburban, the broader Bay Area's diversity has fostered an inclusive outlook, encouraging respect for different perspectives and cooperation in community activities.
attributes:
  skills: '["Computer troubleshooting", "Basic Python programming", "Hardware assembly and repair", "Mechanical bicycle maintenance", "Organizational planning", "Peer tutoring (math)", "Volunteer coordination"]'
  hobbies: '["Reading (science fiction & non-fiction)", "Model kit building", "Strategy video gaming", "Hiking", "Nature photography", "Journaling", "Arduino electronics projects", "Volunteer work at food
    bank"]'
  career_goals: James aims to earn his GED within the next year and then enroll in a community college program focusing on information technology or automotive technology. He aspires to secure a stable
    career as an IT support specialist or a certified automotive technician, combining his curiosity for technology with practical, hands‑on work. Long‑term, he hopes to establish his own small service
    business—such as a computer repair or bike repair shop—to provide reliable services to his neighborhood and to become a mentor for younger teens who face similar educational challenges. Financial independence
    and the ability to support his family are central motivations behind his career plans.
