  career_goals: Although retired, Eric aims to remain intellectually active by volunteering as a mentor at the local senior center and offering free educational workshops on learning strategies for lifelong
    learners. He aspires to author a memoir that blends his experiences in education with personal anecdotes, and to contribute occasional op‑eds to the community newspaper on topics of civic engagement
    and intergenerational learning.
