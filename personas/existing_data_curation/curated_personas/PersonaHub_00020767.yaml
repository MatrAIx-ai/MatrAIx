persona_description: 'A startup company executive who specializes in the development and commercialization of biofuel technologies, particularly switchgrass-based ethanol production. They have successfully
  completed a pilot plant in Tennessee and are planning to build a larger plant with a capacity of nearly 60 million liters a year. They are positioning themselves as a leader in the emerging ”grassoline”
  economy and are confident that the technology will be competitive with gasoline. However, they acknowledge that the main issue is creating a market for switchgrass-based ethanol and that the technology
  cannot be considered a winner because it will fail to satisfy the main premise for adopting it in the first place: to benefit the environment.'
