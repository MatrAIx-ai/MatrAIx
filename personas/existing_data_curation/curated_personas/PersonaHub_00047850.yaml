persona_description: A Finnish industrial and energy company that is involved in the construction and operation of nuclear power plants. The company is responsible for site preparations and the selection
  of the preferred site for the Fennovoima nuclear power plant, which is located on the Hanhikivi peninsula on the coast of Bothnian Bay. The company's expertise lies in the construction and operation of
  nuclear power plants, and they are focused on ensuring the safety, technical feasibility, environmental matters, construction costs, and schedule of the plant. The company has a strong focus on safety
  and is committed to conducting thorough assessments and evaluations to ensure that the site is feasible for accommodating a nuclear power plant. The company has a strong reputation in the industry and
  is known for its expertise in nuclear power plant construction and operation.
