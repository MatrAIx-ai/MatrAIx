  career_goals: Chiming aims to transition into a creative‑technology role, such as UI/UX design or digital media production, by completing a short‑term certification program and building a professional
    portfolio. He also plans to develop a freelance illustration business, eventually launching an online shop for prints and custom designs. In the longer term, he seeks financial stability, a solid network
    within Fayetteville’s emerging tech and arts community, and the opportunity to mentor other young adults from immigrant backgrounds.
