personas:
  professional: A detail‑oriented front‑end developer transitioning into UI/UX design, Chiming Teng leverages self‑taught HTML, CSS, and JavaScript skills together with strong project‑management habits
    and a love for visual storytelling, and they apply their organizational precision to structure design sprints while flexibly iterating on interactive prototypes that reflect their curiosity for emerging
    tech.
  sports: A weekend hiker who belongs to the Fayetteville Trailblazers club and joins casual basketball games at the local community center, Chiming Teng roots for the Arkansas Razorbacks during football
    season and follows FC Fayetteville’s women’s soccer matches, and they prefer low‑impact cardio over heavy gym sessions.
  arts: A dedicated sketcher and digital illustrator, Chiming Teng draws inspiration from Yayoi Kusama’s vivid patterns, Brian Eno’s ambient soundscapes, and indie filmmaker Greta Gerwig’s narrative style,
    and they regularly attend downtown gallery openings, film series at the local theater, and collaborative art workshops.
  travel: An avid photographer who plans trips around sunrise hikes, Chiming Teng favors off‑beat destinations like Asheville, NC for mountain vistas, Kyoto for temple gardens and culinary inspiration,
    and Iceland’s waterfalls, and they balance tight budgeting with occasional splurges on boutique hostels when a freelance deadline frees up extra funds.
  culinary: A self‑taught home chef, Chiming Teng experiments with kimchi‑infused collard‑green gratin, miso‑marinated BBQ ribs, and sweet‑potato bao buns, favoring fresh ginger, gochujang, and smoked paprika,
    and they often host intimate dinner parties where dishes are paired with indie vinyl playlists.
  core: A curious introvert who fuels late‑night sketching marathons with strong coffee, Chiming Teng balances meticulous organization with a habit of procrastinating paperwork until deadlines spark a rapid
    surge of creative energy, and they occasionally overindulge in binge‑watching sci‑fi series as a way to unwind.
background:
  cultural: Chiming is a second‑generation East Asian American whose parents immigrated from Taiwan. He grew up in a bilingual household where Mandarin was spoken at home, and traditional celebrations such
    as Lunar New Year and the Mid‑Autumn Festival were observed. These cultural roots instilled values of respect, perseverance, and a strong work ethic. Living in Fayetteville, a city with a prominent
    military presence, he has also embraced Southern hospitality and community spirit. He often blends collectivist influences from his heritage with the individualistic mindset of American culture, a synthesis
    that frequently appears in his artistic and personal pursuits.
