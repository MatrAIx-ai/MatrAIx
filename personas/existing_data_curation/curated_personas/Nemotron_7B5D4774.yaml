  hobbies: '[''Bowling league'',''Hiking Appalachian trails'',''Gardening'',''Cooking traditional Appalachian dishes'',''Quilting'',''Attending church potlucks and county fairs'',''Watching WVU football'',''High‑school
    basketball games'',''Guided meditation'',''Journaling'',''Trivia nights'']'
  career_goals: She aims to become a certified safety officer (CSP) and advance to a foreman or site supervisor role within the next five years, eventually establishing her own small residential renovation
    subcontracting business that emphasizes safety, reliability, and community hiring. Joy also wants to mentor younger workers, secure a more predictable schedule as she ages, and achieve a stable income
    that reduces her financial anxiety.
