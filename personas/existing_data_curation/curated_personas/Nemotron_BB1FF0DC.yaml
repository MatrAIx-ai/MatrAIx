personas:
  professional: Patrick Butler, a veteran aerospace engineer with decades of hands‑on experience in structural and propulsion design, leverages their disciplined, organized approach and mastery of SolidWorks,
    ANSYS, and Agile project management to drive next‑generation sustainable propulsion projects while mentoring junior engineers and preparing for a senior leadership role.
  sports: Patrick Butler, an avid hiker of the Appalachian foothills and member of the local trail club, supports the Pittsburgh Steelers, Penguins, and Pirates, combines weekend treks with quadcopter flights
    to capture aerial shots, and supplements their routine with light weight‑training, preferring low‑impact exercise that fits their age and love of nature.
  arts: Patrick Butler, a quiet connoisseur of classic science‑fiction, frequently revisits Isaac Asimov’s Foundation and Frank Herbert’s Dune, admires the aerospace paintings of Chesley Bonestell, listens
    to Vangelis’ Blade Runner soundtrack while woodworking, and occasionally attends community‑theatre performances of “The Right Stuff”, all of which fuel their imaginative engineering mindset.
  travel: Patrick Butler, who plans each trip with the same precision they apply to CAD models, has explored the Blue Ridge Parkway, Shenandoah National Park, and NASA’s Kennedy Space Center, dreams of
    soaring over the Swiss Alps to test glider concepts, and favors solo, photography‑focused adventures that balance structured itineraries with spontaneous aerial scouting.
  culinary: Patrick Butler, a competent home cook who enjoys crafting chicken pot pie, grilled salmon seasoned with dill and smoked paprika, and occasional craft‑beer pairings, treats each recipe like a
    prototype, fine‑tuning flavors and textures while sometimes over‑indulging in high‑calorie snacks during late‑night model‑building sessions.
  core: Patrick Butler, a 53‑year‑old aerospace engineer, blends meticulous engineering with a love for solitary hobbies, disciplined finances, pragmatic health habits, and a quiet devotion to classic sci‑fi
    and nature, though they occasionally procrastinate on dental appointments and splurge on premium tools.
background:
  cultural: Patrick was raised in a small, tightly knit town in Fayette County, Pennsylvania, within a family of German‑Irish ancestry typical of the region. The Appalachian cultural heritage emphasized
    a strong work ethic, practicality, and community interdependence, values that have guided his disciplined professional life. He grew up attending a Protestant (Methodist) church, where communal service
    and modesty were reinforced. Family gatherings, local fairs, and seasonal hunting trips were central to his upbringing, fostering a respect for nature and a preference for intimate social settings.
    This background shapes his cooperative demeanor, his dedication to family and community, and his appreciation for steady, reliable progress in both personal and professional realms.
attributes:
  skills: '[''CAD modeling (SolidWorks, CATIA)'', ''Computational Fluid Dynamics (ANSYS Fluent)'', ''Finite‑element structural analysis (ANSYS Mechanical)'', ''Aerospace materials selection (composites,
