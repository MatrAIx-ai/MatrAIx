  hobbies: '[''Building scale model aircraft'', ''Flying a quadcopter drone for aerial photography'', ''Hiking in the Appalachian foothills'', ''Woodworking'', ''Reading science‑fiction and aerospace history'',
    ''Volunteering to teach STEM basics to youth'']'
  career_goals: Patrick aims to transition into a senior engineering leadership role where he can oversee multidisciplinary projects focused on next‑generation propulsion and sustainable aerospace technologies.
    He plans to earn his Professional Engineer (PE) license to formalize his expertise and mentor the next generation of engineers within his company and the local community. Over the next five years, he
    hopes to spearhead a reliability‑centered maintenance program that reduces downtime for legacy aircraft fleets, and later, as he approaches retirement, to establish a boutique consulting practice assisting
    small aerospace firms with design validation and regulatory compliance. Throughout, he remains committed to fostering a collaborative, high‑standard work environment that balances innovation with proven
    engineering practices.
