  hobbies: '[''Scale model building (trains & ships)'', ''Vegetable gardening'', ''Reading non-fiction (local history, engineering)'', ''Puzzle solving (crosswords, Sudoku)'', ''Fishing'', ''Volunteer work
    at a community tool-library'']'
  career_goals: Eric aims to re‑enter the workforce by obtaining a certification in home inspection or HVAC maintenance, leveraging his existing handyman skills into a reliable trade. Over the next three
    years he hopes to launch a modest freelance handyman business that allows him to set his own schedule while providing steady income to support his post‑divorce financial stability. He also plans to
    complete a community‑college associate program in facilities management, giving him a pathway to a supervisory role in property maintenance. Long‑term, he envisions a small‑scale, reputation‑driven
    business that serves the Attleboro area and provides a stable platform for possible future mentorship of younger tradespeople.
