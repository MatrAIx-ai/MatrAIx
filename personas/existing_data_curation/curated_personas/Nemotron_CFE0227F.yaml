personas:
  professional: Eric Wilson is a methodical handyman transitioning into a certified home inspector, leveraging his hands‑on expertise in carpentry, small‑engine repair, and electrical troubleshooting to
    meticulously plan and budget renovation projects while confidently guiding small groups of clients through inspection processes.
  sports: Eric Wilson follows the Boston Red Sox, Boston Celtics, and New England Patriots, participates in a local adult softball league through the Attleboro Recreation Department, and maintains fitness
    by early‑morning fishing trips at nearby ponds and weekend hikes with the Attleboro Hiking Club.
  arts: Eric Wilson finds creative solace in model‑building while listening to folk legend Woody Guthrie and the minimalist piano works of Erik Satie, and they regularly attend exhibitions featuring realist
    painter Andrew Wyeth at the New England Art Museum.
  travel: Eric Wilson prefers low‑key, meticulously planned road trips that blend historic exploration with hands‑on activities, such as a weekend tour of the Steamtown National Historic Site in Scranton,
    a DIY‑friendly sailing excursion to Mystic, Connecticut, and a pilgrimage to the Railway Museum in York, England, all while keeping expenses modest to protect cash flow for the growing handyman business.
  culinary: Eric Wilson delights in seasonal, garden‑inspired cooking, frequently preparing roasted root vegetables seasoned with rosemary and thyme, classic New England clam chowder featuring fresh clams
    from local fishermen, and weekend projects like fermenting homemade pickles, though they sometimes over‑salt dishes in their quest for the perfect flavor balance.
  core: Eric Wilson is a detail‑obsessed handyman‑turned‑entrepreneur who balances a love for orderly model kits and community repair work with a disciplined, budget‑first mindset, even if they occasionally
    over‑indulge in hobby spending.
background:
  cultural: Eric grew up in a working‑class, predominantly white New England community in Attleboro, where the legacy of early 20th‑century manufacturing shaped a culture of hard work, thrift, and modest
    independence. His family has roots in Irish‑American and English‑American ancestry, with a cultural emphasis on self‑reliance, practical problem‑solving, and community involvement through local churches
    and neighborhood groups. The region’s seasonal rhythms, love of outdoor recreation, and devotion to regional sports teams (e.g., the Red Sox) have also left an imprint on his values and leisure choices.
attributes:
