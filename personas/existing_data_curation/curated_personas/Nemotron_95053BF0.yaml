  hobbies: '[''Visiting art galleries'', ''Sketching and mixed-media art'', ''Photography'', ''Playing acoustic guitar'', ''Attending indie-folk concerts'', ''Reading contemporary fiction'', ''Following
    design and art blogs'', ''Volunteering at community art workshops'', ''Exploring food trucks'', ''Playing video games'', ''Hiking in state parks'']'
  career_goals: Silas aims to transition from the sales floor to a retail management role within the next three years, focusing on supervising visual merchandising and staff development. To prepare, he
    plans to enroll part‑time at a local community college to earn an associate degree in marketing or retail management. In the longer term, Silas envisions opening a boutique that blends curated contemporary
    art pieces with fashion accessories, creating a community‑focused space where his retail expertise and artistic interests intersect.
