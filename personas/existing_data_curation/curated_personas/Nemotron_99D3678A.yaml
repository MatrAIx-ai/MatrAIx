personas:
  professional: Elba Matthews, a senior audit specialist with a flair for ESG reporting, blends rigorous GAAP and IFRS expertise with artistic data visualizations in Power BI, mentors junior staff, and
    charts a path toward CPA certification and a future leadership role in sustainable finance.
  sports: Elba Matthews, a yoga‑dedicated fitness enthusiast, participates in the Miami Beach Rowing Club’s early morning water workouts, hikes the Everglades Trail on weekends, and cheers for the Miami
    Heat while occasionally joining a local recreational softball league.
  arts: Elba Matthews, an avid gallery pilgrim, sketches contemporary installations at the Pérez Art Museum Miami, captures Wynwood’s urban geometry through photography, paints watercolor tributes to jazz
    icons like John Coltrane, and draws intellectual nourishment from philosophers such as Nietzsche and sustainability scholars like Michael Porter.
  travel: Elba Matthews, a deliberately planned traveler, curates art‑centric itineraries including a gallery marathon in Barcelona, a culinary immersion in New Orleans’ French Quarter, and seasonal kayak
    expeditions through the Everglades, balancing economical flights with occasional boutique hotel splurges.
  culinary: Elba Matthews, a home‑cooking alchemist, melds Southern staples like shrimp étouffée and collard greens with Caribbean flavors such as jerk chicken and plantain mofongo, experiments with turmeric‑infused
    sauces as a meditative practice, and perfects a cherished sweet‑potato casserole passed down through family tradition.
  core: Elba Matthews, a quietly curious CPA‑in‑training, merges accounting precision with artistic flair, juggling numbers, canvases, and coffee with equal poise, yet habitually reorganizes spreadsheets
    at odd hours.
background:
  cultural: Elba grew up in a close‑knit Black family in South Florida, where her upbringing blended African‑American traditions with the vibrant Caribbean influences prevalent in Broward County. Family
    gatherings often featured gospel music, storytelling, and dishes like jambalaya and plantains, reinforcing a strong sense of community and resilience. She participated in local cultural festivals such
    as the Broward African Diaspora Festival and Juneteenth celebrations, which deepened her appreciation for Black history and art. Her cultural identity is marked by a commitment to service, informed
    by the church and community mentorship programs she volunteered with as a teenager. This background fuels her drive to uplift other Black professionals in finance and to incorporate the principles of
    social equity and representation into her work, especially in emerging fields like ESG reporting.
