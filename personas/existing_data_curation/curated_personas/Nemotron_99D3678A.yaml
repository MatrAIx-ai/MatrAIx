  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Urban Photography'', ''Reading Nonfiction'', ''Jazz Listening'', ''Yoga and Meditation'', ''Hiking'', ''Cooking Southern and Caribbean
    Cuisine'', ''Data Visualization Projects'', ''Learning New Software'']'
  career_goals: Elba aims to become a Certified Public Accountant (CPA) within the next two years and later pursue a Master’s in Accounting or an MBA to broaden her strategic perspective. She aspires to
    progress to a senior audit manager role, guiding a team in a Big Four or a forward‑thinking midsize firm that values sustainability and innovation. Long‑term, she envisions leading an ESG reporting
    practice or becoming a chief financial officer for a creative‑industry organization, where she can blend her financial acumen with her appreciation for the arts. Throughout her career, she is committed
    to mentoring Black and other underrepresented professionals in finance, building a pipeline of diverse talent, while maintaining a balanced work‑life rhythm that preserves her need for quiet, reflective
    time.
