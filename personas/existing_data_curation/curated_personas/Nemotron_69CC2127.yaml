  hobbies: '[''Gardening'', ''Yoga and Mindfulness Meditation'', ''Journaling'', ''Reading contemporary fiction and self‑help books'', ''Baking seasonal desserts'', ''Walking local nature trails'', ''Participating
    in small‑group local history lectures'']'
  career_goals: Tara aims to advance to a district manager role within the next three to five years, overseeing multiple store locations while championing employee wellbeing and low turnover. To support
    this, she plans to earn a professional retail management certification and enroll in a part‑time MBA program to sharpen strategic leadership skills. She is also passionate about designing a mentorship
    program for front‑line staff and introducing wellness initiatives to mitigate workplace stress. In the longer term, Tara envisions opening her own boutique that emphasizes community engagement and ethically
    sourced products, allowing her to blend her retail expertise with her commitment to harmony and sustainability.
