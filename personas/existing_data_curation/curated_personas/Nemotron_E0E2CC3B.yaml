personas:
  professional: Beverly Cushion, a 16‑year‑old budding youth‑mental‑health advocate in Newark’s South Ward, leverages her natural empathy and digital savvy to run supportive TikTok videos, mediate peer
    conflicts, and volunteer at a local crisis hotline while planning to earn a GED and a Certified Peer Support Specialist credential.
  sports: Beverly Cushion spends weekends shooting hoops in the local park, joins pick‑up basketball games with friends, follows the New York Knicks and the New Jersey Nets, and blends freestyle hip‑hop
    dance sessions after games as a way to release tension.
  arts: Beverly Cushion curates soulful playlists featuring H.E.R., Kendrick Lamar, and Nina Simone, writes spoken‑word poetry that she records for TikTok, sketches vivid characters in notebook margins,
    volunteers with the youth choir at her church, and regularly attends workshops at the Newark Museum and the annual community film festival that highlights stories from her neighborhood.
  travel: Beverly Cushion’s travel style is spontaneous weekend getaways with friends, ranging from trips to the Jersey Shore for boardwalk pizza to family road trips to New Orleans for a gospel reunion,
    while dreaming of a future visit to New York City’s Broadway for inspiration.
  culinary: Beverly Cushion enjoys whipping up quick soul‑food comfort dishes like collard greens with smoked turkey, cornbread, and sweet potato mash, experiments with DIY smoothie bowls featuring mango,
    kale, and chia seeds, and frequently samples the city’s food‑truck offerings such as jerk chicken tacos and artisanal grilled cheese.
  core: Beverly Cushion is a creatively restless teen who channels intense emotions into poetry, community care, and impromptu dance, juggling a love for soulful music with a habit of last‑minute budgeting
    and occasional sleep‑skipping during creative bursts.
background:
  cultural: Beverly is a Black teenager raised in Newark’s South Ward, a neighborhood shaped by generations of African‑American families and vibrant urban culture. Her family’s roots trace back to the Southern
    United States, and her mother’s side maintains traditions of gospel music and church gatherings that have been central to her upbringing. Growing up amidst Newark’s rich history of civil‑rights activism,
    she’s been exposed to community organizing, the arts scene of the Newark Museum, and local events like the Black Film Festival. The city’s diverse culinary scene, hip‑hop culture, and close‑knit extended‑family
    network have all contributed to her strong sense of identity, resilience, and a commitment to uplifting other Black youth in her community.
