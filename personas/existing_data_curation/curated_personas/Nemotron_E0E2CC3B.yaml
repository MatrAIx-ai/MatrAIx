  hobbies: '[''Listening to R&B, soul, hip‑hop, and jazz'', ''Poetry writing and journaling'', ''Creating TikTok videos'', ''Sketching and illustration'', ''Freestyle dancing'', ''Pickup basketball'', ''Community
    garden volunteering'', ''Youth choir participation'', ''Reading graphic novels and YA fiction'']'
  career_goals: Beverly intends to earn her GED within the next two years and then enroll in a community‑college program focused on social work or counseling. Her long‑term ambition is to become a youth
    mental‑health advocate, working at a community center or school where she can develop peer‑support groups for Black teenagers. In the short term, she plans to obtain a Certified Peer Support Specialist
    credential and volunteer at a local crisis hotline. Ultimately, she hopes to complete a Bachelor’s degree in Social Work and lead a nonprofit that blends mental‑health services with creative‑arts workshops.
    She also aspires to grow her online platform to raise awareness about anxiety and self‑care among her peers.
