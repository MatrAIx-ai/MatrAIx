persona_description: A researcher or analyst who is interested in understanding and comparing different national cultures, using the Hofstede Model as a tool. They are familiar with the cultural dimensions
  and how they vary across different countries and regions. They are analytical, objective, and critical of the data, considering it as a guide to understanding the differences in culture between countries,
  not as law set in stone. They are also aware of the limitations of the data, including its collection methods and the cultural context in which the questions are asked. They are also interested in how
  culture changes over time, either by internal or external influences.
