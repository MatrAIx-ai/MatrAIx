  hobbies: '["Folkloric Dancing", "Cooking Mexican Cuisine", "Hiking", "Gardening", "Soccer Fan", "Karaoke", "Community Volunteering", "Craft Teaching"]'
  career_goals: Luz Marie aims to move into a formal supervisory role on the production line within the next two years, seeking certification in CNC machining and a small‑business management course to eventually
    lead a training program for new hires. She also dreams of opening a modest Mexican‑style food stand on weekends, leveraging her cooking skills while maintaining a stable income. Improving her organizational
    habits and formalizing her job knowledge are top priorities, allowing her to balance a structured work schedule with the flexibility needed for family and community commitments.
