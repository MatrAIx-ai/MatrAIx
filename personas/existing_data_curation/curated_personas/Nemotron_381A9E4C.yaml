personas:
  professional: Theresa Person, an aspiring mini‑architect, channels her love for building LEGO sets into early design thinking, meticulously follows instruction manuals, and applies her preference for
    structure to organize playrooms, hinting at a future career in engineering.
  sports: Theresa Person participates in the Kids’ Soccer League at the community center, loves cheering for the nearby professional baseball team the Seattle Mariners, enjoys the rhythm of ballet class,
    and practices jumping rope on weekends to stay active, though she sometimes gets frustrated when she can’t keep up with faster teammates.
  arts: Theresa Person finds joy in coloring intricate mandala pages from Crayola coloring books, admires the illustrations of Dr. Seuss, practices basic ballet moves to Tchaikovsky’s “Nutcracker” suite,
    and collects LEGO Creator Expert sets that double as artistic sculptures, all of which satisfy her craving for structured creativity.
  travel: Theresa Person loves family trips to the local zoo where she can make a checklist of animals, dreams of a future visit to Disneyland for its predictable rides, prefers itineraries with clear schedules
    and frequent snack breaks, and feels anxious when flights are delayed.
  culinary: Theresa Person enjoys assembling peanut butter and jelly sandwiches on whole wheat bread, arranging sliced strawberries, banana rounds, and grape clusters into colorful fruit plates, and can
    spend extra time perfecting the symmetry of her snack presentations, though she occasionally forgets to wash her hands before cooking.
  core: Theresa Person is a detail‑oriented six‑year‑old who blends structure with creativity, worries about small disruptions, and finds comfort in orderly play, disciplined snack prep, and rhythmic ballet.
background:
  cultural: 'Theresa Ruth Person is a six‑year‑old White child raised in the suburban community of Webster, a quiet town in Monroe County near Rochester, New York. Her family reflects a middle‑class, primarily
    Anglo‑American cultural heritage, with traditions that include celebrating Thanksgiving and Christmas, attending a local church, and participating in community events such as the annual Webster Fall
    Festival. The region''s four seasons shape her activities: leaf‑collecting in fall, building snowmen in winter, and apple picking in early autumn. Her parents emphasize routine, school readiness, and
    social etiquette, aligning with her natural preference for structure. Exposure to public schools and neighborhood playgrounds provides her a familiar social environment typical of upstate New York suburbs.'
attributes:
  skills: '[''Reading (phonics)'', ''Basic addition and subtraction'', ''Handwriting'', ''Organizing personal items'', ''Following step-by-step instructions'', ''Basic tablet navigation'', ''Puzzle solving'',
    ''Cutting with scissors'', ''Shoe tying'']'
  hobbies: '[''Coloring intricate patterns'', ''Building LEGO sets'', ''Completing picture puzzles'', ''Reading picture books with clear storylines'', ''Listening to audiobooks'', ''Simple cooking assistance
    (making sandwiches)'', ''Playing structured games like Simon Says'', ''Attending ballet classes'', ''Collecting stickers'', ''Nature walks with family'']'
  career_goals: Theresa often talks about wanting to help other children learn in a calm, organized way. She imagines herself as a teacher who creates clear daily schedules and a safe classroom where everyone
    knows what to expect. She also loves animals and has expressed a budding dream of becoming a veterinarian, caring for pets and ensuring they stay healthy. Her interest in building neat play spaces has
    led her to say she would like to be an architect or engineer one day, designing playgrounds that are both fun and well‑ordered.
