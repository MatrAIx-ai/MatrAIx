personas:
  professional: Jeremy Floyd, a 35-year-old licensed paramedic in Jefferson Parish, merges curiosity for emerging prehospital technologies with a practical, disciplined approach to advanced cardiac life
    support, trauma stabilization, and meticulous ambulance inventory control, and they actively mentor peers while plotting a path toward EMS leadership.
  sports: Jeremy Floyd devotes mornings to weightlifting at his local gym and long runs with the Lake Pontchartrain Running Club, spends weekends fishing on Lake Pontchartrain and hunting in the bayou,
    and roots for the New Orleans Saints and Pelicans, while also being a member of the Bayou Sportsmen’s Association that organizes seasonal outdoor competitions.
  arts: Jeremy Floyd unwinds by playing acoustic guitar, covering folk-blues numbers by John Prine and Cajun classics by Clifton Chenier, attends Mardi Gras parades featuring the Rebirth Brass Band, and
    finds inspiration in the gritty narratives of true-crime author James Patterson, all of which shape his creative outlook.
  travel: Jeremy Floyd plans trips with detailed itineraries, favoring adventure-rich destinations such as the Florida Keys for deep-sea fishing, the Everglades for swamp tours, and an annual pilgrimage
    to New York City's Mardi Gras-style celebrations, while budgeting carefully to accommodate his family obligations and occasional weekend hunting expeditions across the Gulf Coast.
  culinary: Jeremy Floyd showcases his culinary skill by cooking traditional Cajun dishes like gumbo, jambalaya, and crawfish étouffée using ingredients such as andouille sausage, filé powder, and okra,
    and while his dishes often win compliments at Mardi Gras gatherings, his occasional over-use of cayenne pepper and tendency to forget to rest meat after grilling reveal a playful imperfection in his
    cooking.
  core: Jeremy Floyd, a disciplined 35-year-old paramedic, channels his high-stress career, meticulous nature, and love for Cajun culture into a balanced life of emergency care, mindful self-care, and community-focused
    pursuits, despite his tendency to worry and over-analyze.
background:
  cultural: Jeremy is a white Southern American raised in a working‑class community in Jefferson Parish, Louisiana. He grew up immersed in the Gulf Coast’s Cajun‑Creole cultural milieu, celebrating Mardi
    Gras, enjoying zydeco music, and savoring regional cuisine. Raised in a Methodist family, he also absorbed the hospitality, resilience, and practical outlook characteristic of the area. This blend of
    Protestant roots and multicultural influences shapes his appreciation for both tradition and innovation, informing his disciplined yet curious approach to both his profession and personal life.
attributes:
  skills: '[''Advanced Cardiac Life Support (ACLS)'', ''Prehospital Trauma Life Support (PHTLS)'', ''Airway management and intubation'', ''Rapid patient assessment'', ''Medication administration'', ''IV
    therapy'', ''ECG interpretation'', ''Incident command system (ICS) coordination'', ''Ambulance equipment maintenance'', ''Shift scheduling and inventory management'', ''Peer mentorship and training'',
    ''Community resource navigation'', ''Stress management techniques'', ''Basic vehicle mechanics'', ''Emergency medical documentation'']'
  hobbies: '[''Fishing on Lake Pontchartrain'', ''Hunting in the Louisiana bayou'', ''Weightlifting'', ''Running'', ''Playing acoustic guitar'', ''Cooking Cajun cuisine'', ''Attending Mardi Gras celebrations'',
    ''Reading medical journals and true‑crime books'', ''Woodworking'', ''Volunteering with local fire department'', ''Journaling for stress management'']'
  career_goals: Jeremy aims to obtain his GED and pursue an associate degree in Emergency Medical Services to qualify for senior leadership roles. He aspires to become a paramedic supervisor or EMS operations
    manager within the Jefferson Parish emergency response system, eventually transitioning to an EMS instructor position to mentor new paramedics. He also plans to develop a peer‑support program for first
    responders to address mental‑health challenges. Long‑term, Jeremy is interested in earning certification as a Certified Emergency Manager and exploring community paramedicine initiatives that provide
    preventive care to underserved neighborhoods.
