  hobbies: '[''Hiking'', ''Acoustic guitar'', ''Community gardening'', ''Reading historical biographies'', ''Participating in church choir'', ''Attending county fairs'', ''Organizing potluck gatherings'',
    ''Playing chess'']'
  career_goals: Marvin aims to become the senior pastor of a larger multi‑church network within the Tennessee Conference, leveraging his organized approach to expand outreach programs such as a regional
    food pantry and a youth leadership academy. He plans to pursue a part‑time seminary certificate to deepen his theological foundation while continuing to mentor emerging clergy. Long‑term, he hopes to
    author a devotional guide that blends practical life skills with scriptural insights, positioning himself as a thought leader who balances curiosity with proven ministry practices.
