  hobbies: '["Gardening (vegetables and flowers)", "Cooking and recipe development", "Knitting and quilting", "Bridge and card games", "Church choir singing", "Book club (historical fiction)", "Senior center
    volunteering", "Attending local fairs and festivals", "Walking and nature observation"]'
  career_goals: Though retired from formal employment, Annette aims to deepen her impact on the Saint Clairsville community. She plans to lead the senior center's outreach program, mentor younger volunteers,
    and serve on the board of the Belmont County historical society to preserve local heritage. A personal project she cherishes is compiling a family cookbook that showcases regional recipes and stories.
    Maintaining her health and independence remains central, so she intends to stay active through regular walking, senior‑friendly yoga, and routine health checkups. She also hopes to travel with her husband
    to visit family in neighboring states and attend cultural festivals that celebrate Ohio traditions.
