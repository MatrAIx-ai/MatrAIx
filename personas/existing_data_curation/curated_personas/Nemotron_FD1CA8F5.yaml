personas:
  professional: Annette Flood is a seasoned community organizer and senior-center outreach leader whose meticulous planning, practical budgeting skills, and warm, cooperative nature keep neighborhood events
    running smoothly and foster intergenerational connections.
  sports: Annette Flood enjoys leisurely walks along the Ohio River, participates in a weekly senior-center yoga group, roots for the Cleveland Browns and Cincinnati Reds, and occasionally joins a community
    bridge tournament that keeps their mind sharp while staying physically active.
  arts: Annette Flood expresses creativity through knitting scarves, quilting heirloom blankets, singing gospel hymns in the church choir, and devouring historical fiction by Philippa Gregory and Bernard
    Cornwell, while also savoring the folk melodies of Pete Seeger during craft evenings.
  travel: Annette Flood prefers well-planned road trips with their spouse, relishing visits to Hocking Hills State Park, the historic Riverfront Festival in Cincinnati, and the autumn leaf-colored bluffs
    of Louisville, Kentucky, while balancing travel costs with a modest savings cushion.
  culinary: Annette Flood delights in cooking Midwestern comfort foods like chicken pot pie, cornbread, and tomato-pepper relish, often using garden-fresh tomatoes, sweet corn, and heirloom peppers, and
    while they excel at feeding large potlucks, they sometimes forget to let the dough rise fully.
  core: Annette Flood blends practical organization with a garden-talking habit, a penchant for knitting during phone calls, and a love of community potlucks that sometimes leads to late-night snacking.
background:
  cultural: Annette was raised in a small‑town environment in southeastern Ohio, a region steeped in Midwestern values of practicality, community, and modesty. Her family ancestry is primarily German and
    Irish, reflective of many white families in Belmont County. She grew up within a Protestant tradition—most likely Methodist or Baptist—that emphasized service, family cohesion, and regular church involvement.
    The cultural fabric of Saint Clairsville, with its tight‑knit neighborhoods, local festivals, and mutual support networks, shaped her outlook, fostering a pragmatic, cooperative, and socially engaged
    personality. She cherishes self‑reliance, hard work, and the preservation of local heritage, often sharing stories of the area's history with younger generations.
attributes:
  skills: '["Meal planning and home cooking", "Community event planning and coordination", "Vegetable gardening and horticulture", "Basic computer and digital communication", "Household budgeting and finance",
