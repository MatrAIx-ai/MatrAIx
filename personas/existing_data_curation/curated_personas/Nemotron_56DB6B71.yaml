  hobbies: '[''salsa dancing'', ''cooking traditional Mexican cuisine'', ''community volunteering'', ''gardening'', ''reading self-help and personal development books'', ''hiking in the Sierra foothills'',
    ''participating in neighborhood festivals'', ''painting murals as a hobby'', ''group fitness classes'', ''attending local art galleries'']'
  career_goals: Carmen aims to transition from being a site worker to a small business owner, establishing a community-focused painting and paper hanging service that offers affordable, high-quality work
    to low-income families in Stockton. She plans to obtain certification in lead-safe and eco-friendly painting, expand her services to include decorative murals, and hire apprentices from the local Mexican-American
    community. Long-term, she hopes to develop a mentorship program that helps others gain stable trades employment, while also achieving financial stability and a predictable work schedule to support her
    mental well-being.
