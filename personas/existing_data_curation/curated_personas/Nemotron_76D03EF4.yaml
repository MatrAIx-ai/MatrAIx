personas:
  professional: Marina Andrade, a 21‑year‑old food‑service manager in New Britain, blends bilingual communication, data‑driven scheduling, and an assertive yet cooperative leadership style to keep a high‑pace
    kitchen efficient, and they constantly tweak operations with a curious eye for new efficiency tools.
  sports: Marina Andrade, a fan of the New England Revolution and Boston Red Sox, balances a weekly yoga practice at Sunrise Studio with participation in a local recreational soccer league at the New Britain
    Community Club, favoring steady low‑key movement over intense workouts, and they relish the quiet focus that each session brings.
  arts: Marina Andrade captures quiet city moments through their camera, drawing inspiration from street photographer Vivian Maier and the vibrant murals of Banksy, while also curating playlists that mix
    classic salsa legends like Celia Cruz with contemporary Latin pop such as Bad Bunny, and they find artistic expression a soothing counterpoint to their busy work life.
  travel: Marina Andrade plans trips with spreadsheet precision, favoring culinary pilgrimages to Oaxaca, Mexico and the coastal town of San Juan for authentic island flavors, while also carving out weekend
    escapes to the White Mountains for serene hikes, and they always budget carefully to keep their MBA dreams on track.
  culinary: Marina Andrade, a self‑taught chef, reimagines traditional island staples—mofongo, arroz con gandules, and pernil—by swapping white rice for wild rice, infusing sofrito with smoked paprika and
    cilantro, and incorporating plantain, pork, and citrus into a signature adobo‑glazed pork belly that they meticulously document in a leather‑bound culinary journal.
  core: Marina Andrade, a driven 21‑year‑old bilingual manager, balances a relentless curiosity for culinary innovation with a pragmatic budgeting mindset, yet they habitually lose sleep scrolling through
    food‑delivery apps for late‑night inspiration.
background:
  cultural: Marina’s family emigrated from Puerto Rico to Connecticut when she was a child, preserving a strong sense of island heritage at home. Spanish was spoken alongside English, giving her fluency
    in both languages and a deep appreciation for Puerto Rican music, festivals, and especially the island’s diverse cuisine. Growing up in New Britain, she participated in local cultural events such as
    the annual Puerto Rican Day Parade, which reinforced her connection to a broader diaspora community. These experiences shape her identity, informing both her professional focus on food service and her
    personal desire to celebrate and reinterpret Puerto Rican culinary traditions in an American context.
