  career_goals: Marina aims to advance from her current role as a food‑service manager to a regional operations manager within the next three to five years, overseeing multiple locations across New England.
    She plans to supplement her experience with an MBA focused on hospitality management, which will prepare her to open her own modern Puerto Rican‑inspired restaurant that emphasizes sustainable sourcing
    and community engagement. In the longer term, she envisions establishing a consulting practice that helps independent eateries improve operational efficiency while infusing culturally authentic menu
    concepts.
