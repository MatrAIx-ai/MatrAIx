personas:
  professional: Fanfan Mcbean is a seasoned systems analyst who translates complex business needs into reliable cloud‑based solutions, leads cross‑functional workshops with an assertive yet empathetic style,
    mentors emerging tech talent through community programs, and balances their ambitious push for an AWS Solutions Architect certification with mindfulness practices to manage work‑related anxiety.
  sports: Fanfan Mcbean enjoys seasonal kayaking on the St. Johns River, practices yoga year‑round, occasional runs with a local Jacksonville running club, and cheers for the Jacksonville Jaguars and Tampa
    Bay Lightning, though they often miss scheduled workouts when anxiety spikes, preferring flexible, low‑pressure fitness routines.
  arts: Fanfan Mcbean finds creative release playing piano at home, frequents downtown jazz and blues clubs to hear legends like B.B. King and modern soul artists such as Alicia Keys, attends gospel choirs
    at their church, and reads contemporary fiction by authors like Chimamanda Ngozi Adichie and psychology books by Malcolm Gladwell, weaving these inspirations into their storytelling and mentorship style.
  travel: Fanfan Mcbean dreams of road‑tripping along the Atlantic coast, revisiting historic Savannah and exploring Asheville’s mountain arts scene, while also planning a future getaway to Marrakech for
    its vibrant markets; they balance a desire for cultural immersion with careful budgeting and a flexible itinerary that eases travel‑related anxiety.
  culinary: Fanfan Mcbean is an intermediate home cook who masterfully prepares soulful Southern dishes such as shrimp and grits, collard greens seasoned with smoked paprika, and sweet potato pie, they
    often harvest fresh herbs and okra from their backyard garden to infuse meals with homegrown flavor and occasionally experiment with spice‑infused twists on classic recipes.
  core: Fanfan Mcbean blends tech leadership ambition, community mentorship, soulful cooking, and mindfulness, navigating anxiety‑driven quirks with a flexible, resilient outlook that they maintain through
    mindful practice.
background:
  cultural: Fanfan is an African‑American woman who grew up in Jacksonville’s historic African‑American neighborhoods, attending a local church that emphasized community service and cultural pride. She
    earned her STEM degree at Florida A&M University, a historically Black university, and remains connected to the Black community through church events, family gatherings, and mentorship programs that
    support young Black professionals in technology. Her Southern Black heritage influences her love of soul food, gospel and R&B music, storytelling traditions, and a strong sense of resilience and collective
    responsibility.
