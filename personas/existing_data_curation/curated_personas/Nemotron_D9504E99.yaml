  career_goals: She aspires to move into a lead systems analyst or enterprise‑architecture role that lets her shape technology strategy for her organization, champion the adoption of innovative yet stable
    solutions, and mentor emerging Black talent in tech. To support this path she plans to earn an AWS Solutions Architect certification and possibly a master’s degree in Information Systems, while negotiating
    a flexible hybrid work schedule that respects her need for focused alone time and helps mitigate work‑related anxiety.
