persona_description: 'A systems engineer at NASA''s Jet Propulsion Laboratory in Pasadena, California who specializes in designing metal fabrics for astronaut spacesuits, shielding spacecraft from meteorites,
  and capturing objects on the surface of another planet. He is responsible for creating four essential functions: reflectivity, passive heat management, foldability, and tensile strength, and believes
  that the fabrics could be useful for large antennas and other deployable devices. He is interested in the use of organic and non-linear shapes in spacecraft designs and the potential to manufacture these
  fabrics in space.'
