personas:
  professional: An organized administrative coordinator, Kelly Rodriquez leverages their Excel expertise and meticulous scheduling skills to streamline nonprofit operations, thriving on predictable routines
    while ensuring community events run like clockwork.
  sports: An avid runner, Kelly Rodriquez logs early morning miles along Lake Michigan, participates in the local Grand Haven Running Club, and cheers for the Grand Rapids Griffins and Michigan Wolverines,
    balancing solo fitness with community spirit.
  arts: A culturally curious reader, Kelly Rodriquez devotes evenings to contemporary fiction, knits scarves while listening to Taylor Swift, Mumford & Sons, and occasional Latin rhythms from Juanes, and
    volunteers at the library's author-talk series, weaving storytelling and music into their identity.
  travel: A weekend explorer, Kelly Rodriquez plans day trips to Sleeping Bear Dunes and spontaneous weekend getaways to Chicago's lakefront, while dreaming of a summer road-trip to New Orleans for its
    music and cuisine, always balancing budget limits with a love for lakeside scenery.
  culinary: A modest home chef, Kelly Rodriquez whips up simple meals like lemon-herb grilled chicken and bakes desserts such as cinnamon apple crumble and lemon bars, experimenting with fresh berries,
    avocado toast, and occasional pan dulce for a nod to family traditions.
  core: Kelly Rodriquez is a methodical community-oriented planner who blends quiet lake jogs, spreadsheet budgeting, and a love for knitting into a life that balances reliability with a sprinkle of spontaneous
    music playlists.
background:
  cultural: Kelly grew up in Grand Haven, Michigan, a small lakeside community known for its close‑knit spirit and Midwestern work ethic. Her family blends typical Upper Midwest values—practicality, hospitality,
    and community involvement—with subtle Hispanic cultural touches reflected in family meals and occasional celebrations of traditions from her father's side. She participates in local customs such as
    the summer fireworks, Thanksgiving potlucks, and church gatherings, while also cherishing her family's heritage through music and food. This multicultural yet grounded upbringing informs her reliable,
    organized nature and her desire to contribute to the community she loves.
attributes:
  skills: '["Organizational planning", "Microsoft Office Suite (Excel, Word, Outlook)", "Google Workspace (Docs, Calendar)", "Basic bookkeeping", "Event coordination", "Inventory management", "Clear written
    and verbal communication", "Problem‑solving for household tasks"]'
  hobbies: '["Jogging along Lake Michigan", "Reading contemporary fiction", "Knitting", "Volunteering at the community library", "Attending local festivals (e.g., Waterfront Festival)", "Hiking in state
    parks", "Cooking and baking", "Creating music playlists"]'
  career_goals: Kelly aims to build a stable career in administrative support or project coordination, ideally within a midsize nonprofit or local business where her structured approach can add value. She
    plans to enroll in a community college program for Business Administration to gain formal credentials. In the medium term, she hopes to become an office manager or logistics coordinator, and eventually
    she envisions running her own small boutique or coffee shop that serves as a community hub in Grand Haven.
