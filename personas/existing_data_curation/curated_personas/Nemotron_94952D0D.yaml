personas:
  professional: Felicia Dong, a 43‑year‑old nursing assistant with a decade of bedside experience in Bridgeport hospitals, blends meticulous vital‑sign monitoring and infection‑control rigor with a curiosity
    for holistic health and art‑therapy, delivering compassionate geriatric care while juggling an often‑messy study schedule for her upcoming LPN credential.
  sports: Felicia Dong enjoys early‑morning jogs along the Long Island Sound, follows the New York Yankees, the New England Patriots, and the Brooklyn Nets for a touch of excitement, and participates in
    the Bridgeport Senior Walking Club and a weekly community‑garden yoga stretch group that keeps them gently fit.
  arts: Felicia Dong spends weekends sketching the Bridgeport waterfront in watercolor, is drawn to the vibrant canvases of contemporary painter John Marin, frequently visits pop‑up galleries featuring
    emerging artists like Yvette Miles, and finds solace in listening to Sade and the soft strains of the Avett Brothers while they paint.
  travel: Felicia Dong prefers thoughtfully planned getaways that blend culture and relaxation, having explored the historic squares of Savannah, the coastal charm of Bermuda, and the mosaic streets of
    Barcelona, while dreaming of a serene retreat to the tea fields of Kyoto and a short road‑trip to the Catskill mountains for a weekend of photography.
  culinary: Felicia Dong is a confident home cook who expertly prepares Caribbean‑inspired red beans and rice with coconut milk, adds scotch bonnet heat to collard greens, bakes sweet‑potato pie with a
    flaky crust, and regularly experiments with plantain fufu and fresh herbs like cilantro and thyme.
  core: Felicia Dong, a 43‑year‑old nursing assistant‑turned‑aspiring LPN, merges artful creativity with patient‑centered care, juggling spontaneous artistic impulses against a backdrop of gentle routine
    and occasional budgeting hiccups.
background:
  cultural: Felicia identifies as a Black woman with a mixed Asian lineage, reflected in her surname Dong, and she embraces a blended cultural heritage. Raised in Bridgeport’s vibrant African-American community,
    she grew up attending church services, celebrating holidays such as Kwanzaa and Juneteenth, and participating in local cultural festivals that highlight Black history and arts. Her family also honored
    Asian traditions, including lunar New Year celebrations and culinary customs, giving her a unique perspective on multicultural identity. This dual heritage informs her appreciation for diverse artistic
    expressions, her commitment to community service, and her desire to promote culturally responsive health care for both Black and Asian-American residents of Fairfield County.
attributes:
  skills: '["Patient Care", "Vital Signs Monitoring", "Assistance with Activities of Daily Living", "Basic Wound Care", "Infection Control", "Medical Documentation", "Empathetic Communication", "Active
