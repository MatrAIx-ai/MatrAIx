  hobbies: '["Sketching", "Watercolor painting", "Visiting local art galleries", "Reading contemporary fiction and philosophy", "Journaling", "Balcony gardening", "Cooking Afro-Caribbean dishes", "Volunteering
    at senior center", "Participating in small music jam sessions"]'
  career_goals: Felicia aims to advance her clinical credentials by completing a Licensed Practical Nurse (LPN) program within the next three years, leveraging her existing coursework and hands-on experience.
    She also hopes to specialize in geriatric and hospice care, where she can build deeper relationships with a small group of patients. Inspired by her love of art, she plans to develop a supplemental
    art-therapy program for seniors at a local community center, combining her health background with creative expression. In the longer term, Felicia envisions a role as a patient advocate or community
    health coordinator, focusing on underserved Black and mixed-heritage populations in Fairfield County, and promoting culturally responsive care and wellness initiatives.
