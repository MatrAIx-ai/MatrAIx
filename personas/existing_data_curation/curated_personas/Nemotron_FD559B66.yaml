personas:
  professional: Maria Reckley, a 67‑year‑old data scientist‑engineer, blends quantitative expertise in Python, R, and statistical modeling with a curatorial eye for visual culture, leading community advisory
    boards, designing interdisciplinary mentorship curricula, and consulting local museums on data‑driven audience engagement while they channel their reserved yet competitive drive into innovative project
    leadership.
  sports: Maria Reckley enjoys low‑impact fitness through daily morning walks with her birdwatching group, plays weekly pickleball at the local senior center, and cheers on the Kansas City Royals and Kansas
    City Chiefs, while they occasionally join a gentle yoga class that balances their competitive edge with their preference for solitude.
  arts: Maria Reckley frequents Kansas City’s Nelson‑Atkins Museum to explore exhibitions highlighting historically underrepresented artists, and they find solace in playing Chopin nocturnes on their piano,
    while they regularly attend performances at the Kauffman Center featuring the Kansas City Symphony and contemporary composers like Philip Glass, all of which fuel their reflective writing.
  travel: Maria Reckley prefers curated small‑group tours that blend cultural immersion with comfortable logistics, having visited the historic district of Savannah, the Imperial Palace in Kyoto, and the
    National Museum of African American History in Washington, D.C., and they dream of exploring the ancient libraries of Timbuktu once their health permits.
  culinary: Maria Reckley’s kitchen is a modest laboratory where they masterfully prepare soul‑food staples such as collard greens seasoned with smoked turkey, sweet potato pie, and flaky cornbread, often
    drawing fresh herbs from their garden and experimenting with spice blends while still considering themselves a competent, though occasionally impatient, home cook.
  core: Maria Reckley, a meticulous yet quietly competitive septuagenarian, weaves together data‑driven problem solving, artistic curiosity, and a disciplined garden routine, while they battle a penchant
    for procrastinating memoir chapters and an occasional indulgence in impulsive book purchases.
background:
  cultural: Maria Nicole Reckley is an African American woman whose upbringing in the Midwest is deeply rooted in the vibrant cultural fabric of Kansas City's Black community. She grew up hearing the legacy
    of the city's historic jazz and blues scene, participated in church-based youth programs, and was encouraged by family members to pursue education in science at a time when few Black women entered STEM
    fields. Her cultural identity combines the resilience and communal solidarity characteristic of African American life with a personal appreciation for artistic expression, from African diaspora visual
    arts to jazz improvisation. Throughout her adult life she has navigated the dual expectations of professional achievement and cultural stewardship, and she remains actively involved in community initiatives
    that celebrate Black history, support young scholars, and preserve local artistic heritage.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Research methodology'', ''Python programming'', ''R programming'', ''Advanced Excel'', ''Database management (SQL)'', ''Project management'', ''Mentoring
    and tutoring'', ''Curatorial consulting'', ''Technical writing'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading historical nonfiction and scientific biographies'', ''Gardening'', ''Playing piano'', ''Participating in small-group book clubs'', ''Writing
    memoirs and reflective essays'', ''Volunteering for STEM outreach programs'', ''Birdwatching'', ''Traveling to cultural heritage sites'', ''Cooking soul-food recipes'']'
  career_goals: Maria aims to leverage her STEM expertise and passion for the arts to empower the next generation of underrepresented students, seeking leadership roles on community advisory boards for
    local museums and STEM outreach programs. She aspires to develop a mentorship curriculum that blends scientific inquiry with creative problem-solving, and to publish a series of reflective essays on
    the intersection of Black identity, aging, and technology. Additionally, she is interested in serving as a consultant for local cultural institutions, helping them integrate data-driven strategies for
    audience engagement. Ultimately, she hopes to leave a lasting impact in Kansas City by championing inclusive, interdisciplinary education and by documenting her own journey through a memoir or public
    talks.
