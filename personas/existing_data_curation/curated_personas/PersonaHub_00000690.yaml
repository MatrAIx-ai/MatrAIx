persona_description: A graduate of Master Program in Food Science who has the potential to become a lecturer, a researcher on basic or applied food science and technology, a consultant in government or
  private institutions, and highly skilled and specialized staff in food industries. They have a strong interest in the study of food chemistry, food microbiology, food process engineering, and food biochemistry.
  They are highly qualified and committed to continuously improving the quality of their graduates and their services. They have a diverse background and expertise in the areas of food chemistry, food microbiology,
  food processing, food engineering, food safety, food analysis, flavor chemistry, biotechnology and bioprocessing, food biochemistry and nutrition, and food toxicology. They have a research interest in
  the food industry and have a strong commitment to research and development. They have excellent communication and interpersonal skills and are able to work effectively in a team. They have a passion for
  teaching and have a strong desire to contribute to the development of the food industry.
