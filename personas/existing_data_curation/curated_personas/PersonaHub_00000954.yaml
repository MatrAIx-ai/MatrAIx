persona_description: Eling de Bruin, a physiotherapist who is conducting research into how exercise with computer games can lead to a healthier old age, particularly for elderly people who have limited
  opportunities to exercise. His research involves developing reliable treatments in the form of computer games that include physical and cognitive training to counteract age-related illness. He is interested
  in both preventive treatments for healthy older people and treatments for patients diagnosed with age-related illnesses, such as dementia.
