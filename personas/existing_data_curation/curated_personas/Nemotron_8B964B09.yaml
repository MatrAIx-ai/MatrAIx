    JIRA, Confluence, Adobe FrameMaker'']'
  hobbies: '[''Hiking coastal trails'', ''Landscape photography'', ''Reading sci‑fi and non‑fiction'', ''DIY electronics (Arduino, Raspberry Pi)'', ''Personal tech blogging'', ''Cooking experimental dishes'',
    ''Listening to tech and business podcasts'', ''Board games with small group of friends'', ''Visiting art museums'', ''Bird watching'']'
  career_goals: He aims to transition into a senior documentation leadership role, such as Documentation Manager or Content Strategy Lead, where he can shape documentation processes across multiple product
    lines. Robert wants to develop expertise in an emerging industry—such as autonomous vehicles or renewable energy—leveraging his business insight to bridge technical and market perspectives. He plans
    to earn advanced certification from the Society for Technical Communication, mentor junior writers, and eventually launch a boutique consulting practice that offers flexible, user‑centric documentation
    solutions for small tech startups. Maintaining a balance between professional growth and personal flexibility remains a core ambition.
