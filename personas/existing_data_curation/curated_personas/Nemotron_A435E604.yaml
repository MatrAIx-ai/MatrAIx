  hobbies: '[''Cooking Mexican Cuisine'', ''Gardening'', ''Reading Mystery Novels'', ''Book Club (Small Group)'', ''Community Church Participation'', ''Yoga'', ''Listening to Ranchera Music'', ''Knitting'']'
  career_goals: Digna aims to advance to a senior operations role, such as Director of Operations, within the next five years. She is pursuing Six Sigma Green Belt certification to formalize her process‑improvement
    expertise, and she hopes to lead a company‑wide initiative that streamlines production while maintaining high safety standards. Long‑term, she envisions mentoring emerging managers and possibly launching
    a consulting firm that helps small manufacturers adopt efficient, sustainable practices, all while preserving a balanced family life.
