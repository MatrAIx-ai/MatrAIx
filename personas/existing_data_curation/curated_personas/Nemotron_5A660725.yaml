  hobbies: '[''Backyard gardening'', ''Cooking Mexican cuisine'', ''Attending cultural festivals'', ''Watching football'', ''Fishing'', ''Volunteering for community clean-ups'', ''Listening to regional
    music'', ''Family gatherings'', ''DIY woodworking'']'
  career_goals: Carlos aims to earn a certified irrigation specialist credential within the next year and to step into a foreman role where he can mentor younger crew members. He also hopes to launch a
    modest side business offering eco‑friendly, water‑conserving landscaping solutions for residential clients in Mesa. In the longer term, he wants a stable retirement that still allows occasional hands‑on
    projects and the chance to share his knowledge through community workshops and local trade schools.
