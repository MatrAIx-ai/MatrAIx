  career_goals: Although retired, David aims to channel his competitive spirit into mastering a new craft—building a line of handcrafted wooden toys that could be sold at local fairs. He also aspires to
    complete a personal project of documenting the oral histories of longtime Ballston Spa residents, with the intention of publishing a modest community anthology. Additionally, he plans to deepen his
    involvement with the town’s historical society, taking on a leadership role to preserve and promote Saratoga County’s heritage. He remains curious about emerging home‑automation technologies and hopes
    to integrate one or two practical smart‑home solutions into his house without compromising his pragmatic approach.
