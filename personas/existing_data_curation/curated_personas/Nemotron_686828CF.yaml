personas:
  professional: Lyndora Bell is an aspiring visual storyteller who blends hand‑sketched comic panels with digital art, leveraging their love of structure to meticulously storyboard each scene while allowing
    the flexibility of spontaneous doodles during music‑filled sketch sessions.
  sports: Lyndora Bell shoots hoops with the South LA Wildcats youth basketball club, idolizes the Los Angeles Lakers and follows their games religiously, and spends weekends at the community gym practicing
    free throws while preferring the camaraderie of their small circle over large school scrimmages.
  arts: Lyndora Bell curates playlists featuring Mary J. Blige, D'Angelo, and classic 90s hip‑hop while they sketch characters inspired by street murals and graphic novels, admire the work of comic artists
    like Bryan Hill, and regularly attend local open‑mic art nights at community centers.
  travel: Lyndora Bell dreams of visiting New Orleans for its jazz heritage after a school field trip to the National Civil Rights Museum sparked their curiosity, and they have already explored the Los
    Angeles County Museum of Art and a weekend trip to Santa Barbara, balancing a desire for culture with a limited travel budget.
  culinary: Lyndora Bell enjoys cooking collard greens with smoked turkey, fried chicken seasoned with cayenne, and homemade cornbread, often experimenting with adding smoked paprika to their mac and cheese,
    while they prefer to snack on fresh mango slices after basketball practice.
  core: Lyndora Bell is a structure‑loving teen artist who balances disciplined sketch planning with spontaneous beats, they save money for art supplies while managing asthma, and they find solace in quiet
    basketball courts and soulful kitchen aromas.
background:
  cultural: Lyndora comes from a Black family rooted in South Los Angeles, where community gatherings, church functions, and neighborhood events play a central role. She celebrates cultural milestones such
    as Juneteenth and Black History Month, often participating in school projects that explore African‑American history and local stories. Family meals feature Southern soul food staples, and she enjoys
    learning about the musical legacies of artists from her neighborhood. The vibrant Black arts scene of LA, from street murals to local music venues, influences her creative aspirations and sense of identity.
attributes:
  skills: '[''Digital photo and video editing (mobile apps)'', ''Basic computer literacy (Google Docs, PowerPoint)'', ''Creative writing and journaling'', ''Organizing school materials and maintaining a
