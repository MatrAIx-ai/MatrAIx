    time management with flexibility'', ''Critical thinking and problem solving'']'
  hobbies: '[''Sketching/drawing'', ''Listening to R&B and hip‑hop music'', ''Playing basketball with a small group of friends'', ''Reading graphic novels'', ''Following digital art tutorials online'',
    ''Journal writing'', ''Curating personal music playlists'']'
  career_goals: Lyndora hopes to turn her love of visual storytelling into a career as a graphic designer or digital content creator, focusing on projects that highlight Black culture and everyday life
    in Los Angeles. She plans to enroll in a high school with a strong art program, build a portfolio of sketches and digital pieces, and learn professional software like Adobe Photoshop and Illustrator.
    In parallel, she is interested in mentoring younger students through community art workshops, aiming to combine creative work with community outreach and representation.
