persona_description: A fitness coach who specializes in treating tendinopathy, particularly in the musculotendinous junction, mid-tendon, and tendon insertion at the bone. They have a deep understanding
  of the continuum of tendinopathy, including reactive tendinopathy, tendon dysrepair, degenerative tendinopathy, and tendon tear/rupture. They have experience treating tendinopathy through biomechanics
  assessment, stretching and range of motion exercises, eccentric strengthening programs, and follow-up care. They are passionate about helping athletes recover from tendinopathy and prevent future injuries.
