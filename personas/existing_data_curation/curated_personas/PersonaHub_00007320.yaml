persona_description: A historian who specializes in the study of Native American history, particularly the interactions between the Comanches and the Wichitas in the early years of European settlement in
  Texas. His research interests include the history of the Comanches, the history of the Wichitas, and the history of the Cross Timbers. He is particularly interested in the use of the timber belt and the
  preservation of water in the region. He is also interested in the impact of the region on early settlement and the development of agriculture.
