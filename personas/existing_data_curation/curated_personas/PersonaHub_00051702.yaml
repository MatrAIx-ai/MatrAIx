persona_description: A Brazilian sociologist who specializes in analyzing migration patterns in the country, particularly focusing on the migratory flows within the country and between different regions.
  They have conducted several studies on the migratory process in Brazil and are interested in presenting data-driven insights to support other analytical studies. They have a deep understanding of the
  Brazilian population exchange and the migration patterns between different states, including those that have a significant difference in the number of immigrants and emigrants. They are interested in
  understanding the migratory flows within the Northeast region and the flows that connect it to other states in the country.
