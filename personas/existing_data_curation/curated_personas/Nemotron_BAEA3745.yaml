  career_goals: Carolyn aims to advance from a front-line support role to a senior technical support manager, overseeing a team of specialists and streamlining service processes. She plans to obtain ITIL
    Foundation and CompTIA Security+ certifications within the next two years to deepen her expertise in service management and security. Long-term, she envisions transitioning into an IT operations leadership
    position or launching a boutique consulting firm that helps small businesses implement robust, scalable support infrastructures. Her ambition includes mentoring junior technicians and fostering a culture
    of continuous improvement within her organization.
