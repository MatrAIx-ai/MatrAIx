  career_goals: Victor aims to become a Director of Sales within the next three years, leading a regional sales organization that exceeds revenue targets by at least 20% annually. He plans to deepen his
    expertise in AI-enabled sales enablement tools, earn the Certified Sales Leader (CSL) credential, and spearhead the implementation of predictive analytics across the sales cycle. Long-term, he aspires
    to launch his own consultancy that helps tech startups scale their sales operations using a blend of data-driven methodology and hands-on coaching. Throughout his journey, Victor seeks roles that challenge
    his competitive drive, allow him to mentor emerging talent, and deliver measurable business impact.
