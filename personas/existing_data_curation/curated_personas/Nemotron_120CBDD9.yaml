  hobbies: '[''Salsa dancing'', ''Beach volleyball'', ''Tech meetups and hackathons'', ''Cuban cooking'', ''Fishing on the St. Johns River'', ''Chess'', ''CrossFit group classes'', ''Latin music concerts'',
