  career_goals: Gam aspires to transition into a supervisory role within retail, aiming to become a store manager where she can integrate her organizational strengths and staff training abilities. Simultaneously,
    she plans to pursue a teaching certification to teach adult literacy or ESL classes part‑time, merging her educational background with community service. Over the next five years, she envisions leading
    a community learning center that offers both vocational training and cultural activities.
