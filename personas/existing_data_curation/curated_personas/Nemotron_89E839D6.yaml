personas:
  professional: Gam Hathiramani, a seasoned retail cashier with a bachelor's in education, blends meticulous POS expertise, bilingual instructional design, and a methodical, organized approach to streamline
    inventory, resolve customer conflicts, and mentor new staff, reflecting their practical curiosity and stable, compassionate leadership.
  sports: Gam Hathiramani participates in the local Hillside Hiking Club for seasonal trail treks, attends weekly yoga sessions to maintain flexibility, follows the Chicago Bulls and New York Yankees for
    basketball and baseball excitement, and joins a community soccer league on weekends, illustrating a balanced, low-impact fitness routine that fits their organized lifestyle.
  arts: Gam Hathiramani enjoys the soulful ragas of Ravi Shankar, the indie folk of Bon Iver, attends community theater productions starring local actors, and curates a small collection of contemporary
    prints by Anjuli Sinha, allowing them to weave cultural heritage and modern artistic curiosity into their leisure.
  travel: Gam Hathiramani prefers carefully planned journeys that blend cultural immersion and natural scenery, having trekked the Canadian Rockies and explored the historic streets of Jaipur, while dreaming
    of a solo pilgrimage to Kyoto's tea houses, all balanced against family responsibilities and a modest travel budget.
  culinary: Gam Hathiramani expertly prepares traditional dishes such as butter chicken, chana masala, and sarson da saag with fresh cilantro and cumin, experiments with fusion twists like taco-style aloo
    gobi, yet admits to over-spicing dishes on occasion, reflecting a confident yet playful kitchen style.
  core: Gam Hathiramani merges methodical organization, community-focused compassion, and a zest for cultural cooking into a pragmatic yet curious life rhythm, punctuated by occasional impulse splurges
    and a habit of leaving lights on.
background:
  cultural: Gam Kaur is a first‑generation South Asian American of Punjabi heritage, raised in a household that balances Indian cultural traditions with American life. She celebrates festivals such as Diwali,
    Vaisakhi, and Holi, maintains fluency in Punjabi, and stays connected to extended family in India through regular video calls. Her cultural values of family cohesion, hospitality, and respect for education
    influence her community involvement and career aspirations.
