  hobbies: '[''Fishing'', ''Hunting'', ''Bingo'', ''Card games (Spades)'', ''Gardening'', ''Attending football games'', ''Listening to classic country and blues'', ''Volunteer choir'', ''Barbecue competitions'']'
  career_goals: Although retired, Alexander aims to stay active and purposeful. He plans to mentor younger members of his church’s outreach program in practical trades, preserve his family’s genealogy,
    and keep his home and garden as models of self‑sufficiency. He hopes to win a local barbecue competition, lead the senior council at the community center, and eventually write a brief memoir of life
    in the Mississippi Delta to share with his grandchildren. His goals reflect a blend of routine‑oriented maintenance, a desire for friendly competition, and a commitment to community service.
