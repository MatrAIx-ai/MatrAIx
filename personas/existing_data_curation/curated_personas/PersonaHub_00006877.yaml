persona_description: A veterinarian who specializes in the diagnosis and treatment of skin disorders, particularly Discoid Lupus Erythematosus (DLE). They have extensive knowledge of the disease's symptoms,
  causes, and treatments, and are skilled in applying non-steroidal anti-inflammatory drugs (NSAIDs) and immunosuppressive medications to manage the condition. They are also aware of the disease's potential
  to develop into squamous cell carcinomas and the importance of avoiding prolonged exposure to sunlight and applying a non-zinc-based sunscreen during outdoor activities.
