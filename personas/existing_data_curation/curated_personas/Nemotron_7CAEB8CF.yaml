personas:
  professional: Terence Masters, a 33‑year‑old commercial pilot and flight engineer with advanced instrument and multi‑engine expertise, blends a disciplined, methodical approach with a creative eye for
    aerial photography to excel in crew‑resource‑management training, meticulous flight planning, and mentorship of junior crew, positioning them for a captain’s seat on a major airline and a future in
    aviation safety leadership.
  sports: Terence Masters competes in a Milwaukee amateur basketball league, follows the Milwaukee Bucks and Green Bay Packers religiously, hits the gym for strength training twice a week, and uses a weekend
    jog along Lake Michigan’s shoreline to balance high‑energy social outings, though they sometimes overcommit to multiple games in a single week.
  arts: Terence Masters frequents the Milwaukee Art Museum and contemporary galleries where they sketch and photograph installations, draws inspiration from photographers like Ansel Adams and street artists
    such as Banksy, and unwinds at live jazz sets featuring Miles Davis recordings or hip‑hop shows headlined by Kendrick Lamar, weaving these artistic experiences into their aerial photography style.
  travel: Terence Masters prefers meticulously planned trips that blend aviation enthusiasm with cultural immersion, having photographed the Northern Lights in Reykjavik, sampled street food in Tokyo’s
    Tsukiji market, and trekked the Appalachian Trail, while dreaming of a future photography expedition to Patagonia, yet they balance these adventures with family commitments and a modest travel budget.
  culinary: Terence Masters enjoys a moderately skilled home kitchen where they experiment with smoked paprika‑rubbed bratwurst, craft‑beer‑paired cheese boards, and occasional Vietnamese pho, favors dishes
    like Ethiopian injera and Japanese sushi for their vibrant flavors, and often pairs meals with local Milwaukee microbrews while rarely cooking beyond simple weeknight pastas due to a busy flight schedule.
  core: Terence Masters, a 33‑year‑old pilot who sketches city skylines between flight plans, balances disciplined cockpit routines with a love of craft‑beer evenings, impulsively upgrades drone equipment,
    and can’t resist checking the weather forecast even on a clear day.
background:
  cultural: Terence grew up in a close‑knit African‑American family in Milwaukee’s East Side, where church, music, and community gatherings were central to daily life. His grandparents served in the U.S.
    Armed Forces, and stories of the Tuskegee Airmen sparked his early fascination with flight. Family traditions of soul food, gospel music, and annual celebrations of Juneteenth reinforced his cultural
    pride. He remains active in local Black professional networks, including the Black Pilots Association, and mentors young Black students through community programs. The blend of Midwestern values of
    hard work and the rich cultural heritage of his African‑American roots informs his worldview, giving him a strong sense of identity, responsibility, and a desire to give back.
attributes:
  skills: '[''Instrument flight proficiency (IFR)'', ''Multi-engine aircraft operation'', ''Aircraft systems diagnostics and maintenance'', ''Flight planning and navigation'', ''Meteorology interpretation'',
    ''Crew Resource Management (CRM)'', ''Emergency procedures and crisis management'', ''FAA regulatory compliance'', ''Technical troubleshooting'', ''Leadership and team coordination'', ''Flight instruction
    and mentorship'', ''Aerial photography'', ''Data analysis of flight performance'', ''Project management in aviation'']'
  hobbies: '[''Visiting art museums and contemporary galleries'', ''Aerial photography (drone and cockpit)'', ''Playing basketball in community league'', ''Attending live jazz and hip‑hop concerts'', ''Exploring
    Milwaukee’s craft‑beer festivals'', ''Volunteering for youth STEM and aviation outreach'', ''Reading science‑fiction and aviation history'', ''Traveling and experiencing new cultures and cuisines'']'
  career_goals: Terence aims to secure a captain’s seat on a major U.S. airline within the next five years, targeting type‑ratings on wide‑body aircraft such as the Boeing 787 or Airbus A350. He plans to
    become a certified flight instructor to share his knowledge and to mentor aspiring pilots from underrepresented communities. Long‑term, he aspires to transition into airline operations management or
    safety oversight, where he can influence policy and champion diversity initiatives. He also envisions launching a mentorship program in Milwaukee that combines aviation training with artistic expression,
    encouraging young Black students to pursue STEM careers while exploring creative outlets like aerial photography.
