  career_goals: Zulay aims to complete her associate degree in Hospitality Management within the next year and obtain a ServSafe certification. In the short term, she seeks promotion to shift supervisor,
    where she can apply her organizational strengths to oversee floor operations and mentor new staff. Long‑term, she envisions becoming a restaurant manager or opening a small café that blends Dominican
    flavors with fresh Florida produce, offering a predictable schedule that supports her married life and family responsibilities. She values career stability, clear advancement pathways, and the ability
    to maintain the routine she thrives on.
