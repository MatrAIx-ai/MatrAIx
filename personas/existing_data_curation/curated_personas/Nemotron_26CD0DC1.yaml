personas:
  professional: Zulay Riosmorales is a bilingual restaurant host who leverages her methodical scheduling, conflict‑resolution finesse, and deep knowledge of Caribbean‑Southern cuisine to keep busy dinner
    service flowing smoothly while mentoring new staff.
  sports: Zulay Riosmorales cheers for the Tampa Bay Buccaneers on Sunday afternoons, plays pick‑up soccer at a local park with a co‑ed league, and signs up for quarterly community yoga‑based fitness challenges
    to stay active.
  arts: Zulay Riosmorales bursts onto the dance floor at community festivals to bachata and merengue beats from artists like Celia Cruz, enjoys evenings watching productions at the historic Tampa Theatre,
    and unwinds with self‑help titles by Brené Brown.
  travel: Zulay Riosmorales prefers well‑planned getaways, having sampled the colonial charm of Cartagena and the vibrant streets of Havana on short vacations while dreaming of a relaxed road trip through
    the Florida Keys and a cultural immersion in New Orleans, always booking airfare early to keep costs family‑friendly.
  culinary: Zulay Riosmorales delights in whipping up mangú with sautéed onions, simmering sancocho brimming with root vegetables, and golden pastelitos stuffed with seasoned beef, seasoning everything
    with fresh cilantro, oregano, and lime, while occasionally treating herself to a shrimp po’boy at a beloved Tampa waterfront eatery.
  core: Zulay Riosmorales balances a love for orderly schedules with a penchant for late‑night bachata sessions, yet often forgets to water her herb garden when work gets hectic.
background:
  cultural: Zulay is a first‑generation Dominican American raised in a bilingual household where Spanish was the language of home and English was spoken at school. Dominican cultural values—strong family
    bonds, hospitality, and respect for tradition—are central to her identity. She celebrates Dominican holidays such as Día de la Independencia and Carnaval, and she maintains close ties with a local Dominican
    community in Wesley Chapel, often attending cultural festivals, supporting Dominican‑owned businesses, and participating in church events that reflect her Catholic upbringing. Her love for Dominican
    music, dance, and cuisine blends with the Floridian lifestyle, giving her a rich, dual cultural perspective.
