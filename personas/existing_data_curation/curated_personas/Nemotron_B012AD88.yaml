  career_goals: Jose Luis aims to achieve Master Plumber certification and complete the Florida Steamfitter/Industrial Pipefitter licensing within the next two years. His long‑term ambition is to transition
    from hands‑on field work to owning a small, family‑run contracting firm that specializes in sustainable building retrofits and water‑conservation projects for commercial clients. He plans to develop
    a structured apprenticeship program that blends traditional craftsmanship with modern, eco‑friendly techniques, and he hopes to become a trusted mentor within the local Hispanic trade community. While
    he envisions a gradual reduction in day‑to‑day labor, he intends to remain active as a consultant and quality‑control specialist for at least the next decade.
