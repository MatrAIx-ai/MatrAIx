persona_description: A development economist with expertise in analyzing income inequality trends in sub-Saharan Africa and the implications of these trends for the Sustainable Development Goals. They are
  interested in understanding the structural drivers of inequality and the factors that contribute to the heterogeneity in the level of inequality across the region. They are also interested in policy recommendations
  aimed at promoting more equal economic growth and have a particular focus on the labor-intensive manufacturing, construction, and agriculture industries.
