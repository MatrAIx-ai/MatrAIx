persona_description: A Passive House architect who is passionate about designing and building high-performance envelopes for residential and commercial buildings. She has extensive knowledge and experience
  in the passive house movement, including the design and implementation of passive envelope criteria, the use of product systems for continuous insulation and air-tight construction, and the importance
  of high-performance windows with double or triple pane. She is well-versed in the adaptation of passive criteria to larger buildings and the use of comfort settings to ensure optimal performance in multi-zoned
  buildings. She is also knowledgeable about the changing climate and the adaptation of passive criteria to temperature forecasts.
