  hobbies: '[''Hiking in the Appalachian foothills'', ''Bass fishing'', ''Woodworking'', ''Playing acoustic guitar'', ''Strategy video gaming'', ''Volunteering at the local food bank'', ''Weight training'',
    ''Listening to bluegrass music'']'
  career_goals: In the near term, Anthony aims to complete a certification in construction safety (OSHA 30‑hour) and finish the remaining coursework toward a degree in construction management. He hopes
    to advance to a foreman position within the next two years, where he can blend his practical skill set with more structured leadership responsibilities. Longer‑term, he envisions starting his own small‑scale
    contracting firm that specializes in sustainable residential builds, allowing him to apply both his hands‑on expertise and his desire for predictability in business operations. He also intends to develop
    coping strategies for anxiety, such as regular therapy and mindfulness training, to sustain his career growth.
