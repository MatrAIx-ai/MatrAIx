  hobbies: '[''Book Club Participation'', ''Knitting Circle'', ''Volunteer Event Coordination at Seattle Public Library'', ''Gentle Yoga'', ''Nature Walks in Discovery Park'', ''Genealogy Research'', ''Charity
    Craft Projects'']'
  career_goals: As she approaches retirement age, Shyra aims to transition into a senior administrative or office‑manager role where she can leverage her organizational strengths to oversee broader operational
    functions. She hopes to mentor younger reception staff, share best practices, and possibly lead a small team, while maintaining a predictable work schedule that aligns with her desire for structure.
    Additionally, she is exploring part‑time consulting opportunities for small nonprofits in Seattle, helping them set up efficient front‑desk processes and volunteer coordination. Ultimately, she wishes
    to leave a legacy of reliability and community support within her workplace and beyond.
