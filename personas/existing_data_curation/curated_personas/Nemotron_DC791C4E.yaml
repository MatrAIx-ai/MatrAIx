  career_goals: 'Gena''s near‑term ambitions focus on mastering developmental milestones: walking unaided, expanding her vocabulary to include more everyday words, and participating more actively in group
    activities at her local library’s story‑time. Her family envisions her growing into a confident communicator who loves sharing stories, potentially pursuing a future as a teacher, performer, or community
    organizer where her sociable, energetic nature can shine. In the short term, she aims to build taller block towers, sing along with peers, and assert herself gently by saying "no" when she wants a turn.'
