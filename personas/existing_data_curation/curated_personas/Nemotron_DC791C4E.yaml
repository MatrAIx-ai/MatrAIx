personas:
  professional: Gena Dellefave, a 1‑year‑old with an early fascination for stacking blocks and a love for predictable nap routines, shows budding signs of a future structural engineer, combining practical
    problem‑solving with an energetic, cooperative play style, and they often line up blocks in perfect rows to satisfy their need for structure.
  sports: Gena Dellefave, a 1‑year‑old, enjoys a parent‑child swimming class at the local community pool, frequently watches matches of the New York Yankees on family TV time, and revels in spontaneous
    backyard games that let them sprint and tumble with other toddlers, and they love the exhilaration of splashing in water and racing across the grass.
  arts: Gena Dellefave, a 1‑year‑old, delights in listening to classic children’s songs like Twinkle Twinkle Little Star and the lively tune Baby Shark, loves bright picture books by Eric Carle, and enjoys
    finger painting with non‑toxic finger paints, shaping an early artistic identity, and they happily smear colors across the paper with their tiny hands.
  travel: Gena Dellefave, a 1‑year‑old, has already experienced family trips to the Grand Canyon and a weekend stay at a seaside resort in Florida, preferring short, well‑structured itineraries with frequent
    nap breaks, yet shows curiosity for future adventures to Tokyo and the Swiss Alps, and they enjoy watching the horizon from a car window during road trips.
  culinary: Gena Dellefave, a 1‑year‑old, favors soft pureed carrots, ripe bananas, and small oatmeal bites, can only manage self‑feeding with a baby spoon, and enjoys occasional family meals featuring
    mild chicken soup with noodles, while showing a picky resistance to broccoli, and they often push the green florets away with a determined frown.
  core: Gena Dellefave, a 1‑year‑old bundle of energetic curiosity, thrives on routine yet loves spontaneous play, hoards shiny trinkets, and they negotiate health and snack battles with adorable stubbornness.
background:
  cultural: Gena is a White American child raised in Austin, Texas, a vibrant, multicultural city known for blending Southern hospitality with progressive cultural currents. Her family participates in community
    events such as the Austin Family Festival and local library story‑times, exposing her to diverse music, art, and occasional Spanish greetings. Growing up in Travis County, she experiences a middle‑class
    suburban lifestyle with regular routines—consistent meals, naps, and family walks—while also enjoying flexible, spontaneous playtime. These cultural influences foster her comfort in group settings,
    openness to community engagement, and appreciation for both structure and flexibility.
