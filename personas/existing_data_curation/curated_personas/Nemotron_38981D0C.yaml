personas:
  professional: An experienced arts curator and grant writer, Kurt Stokes leverages their deep knowledge of Midwestern regionalist painting, meticulous project-management skills, and competitive drive to
    design community exhibitions that spotlight neglected local artists while mentoring teenage apprentices.
  sports: An ardent supporter of the Detroit Tigers, Detroit Lions, and the local Grand Rapids Griffins, Kurt Stokes joins the Golden Mile Senior Walking Club for weekly brisk walks, plays casual shuffleboard
    at the senior center, and follows high school basketball with competitive enthusiasm.
  arts: Kurt Stokes immerses themselves in the works of Charles Burchfield, Grant Wood, and Sufjan Stevens, frequents the Detroit Institute of Arts for curated talks, volunteers at the Dimondale Summer
    Arts Fair, and spends evenings sketching the lakeshore while listening to folk ballads from the Irish repertory.
  travel: Kurt Stokes prefers thoughtful road trips that blend art and nature, having explored Michigan’s Upper Peninsula, the historic streets of Mackinac Island, a weekend at the Art Institute of Chicago,
    and a nostalgic pilgrimage to Florence’s Uffizi Gallery, where they plan future visits to the Loire Valley vineyards.
  culinary: Kurt Stokes delights in seasonal Midwestern cooking, often preparing rosemary‑roasted heirloom carrots, fresh lake trout with lemon butter, and a signature strawberry‑rhubarb galette, while
    their garden yields roses for herbal teas and tomatoes that star in their weekend palate‑pleasing sauces.
  core: Kurt Stokes is a meticulous, community‑oriented art enthusiast who balances rigorous grant‑writing with a penchant for daily rose‑water tea, a stubborn reluctance to schedule eye exams, and a competitive
    habit of turning every walking club outing into a subtle chess match.
background:
  cultural: Kurt was born and raised in a small farming community near Lansing, Michigan, to parents of German and Irish ancestry. His family's values of hard work, modesty, and community service shaped
    his worldview. Growing up during the post-war boom, he participated in local fairs, church choirs, and school debate teams, which fostered his sociable and competitive spirit. His education in the humanities
    broadened his appreciation for global artistic traditions, yet he remains deeply connected to Midwestern cultural motifs such as the Great Lakes regional art scene, folk music, and community festivals
    like the Dimondale Summer Arts Fair.
