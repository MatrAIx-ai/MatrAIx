  career_goals: Shekinah dreams of becoming a scientist who can explore space or solve real‑world problems. She is motivated to win her school’s science fair and hopes to one day work on robotics or environmental
    research. Her competitive spirit drives her to aim for top grades and to be recognized as a leader in group projects, while her practical side keeps her focused on building a solid academic foundation
    now.
