personas:
  professional: Shekinah Jatta, an aspiring junior software developer and LEGO architect, merges a curious love of science with methodical problem‑solving; they use an organized approach to break down coding
    challenges and compete in after‑school hackathon projects with friends.
  sports: Shekinah Jatta, a forward for the Eastside Tigers Youth Soccer Club, fiercely competes on the field, supports the Los Angeles Lakers and Manchester United, and they maintain fitness through organized
    weekend trail runs and nature walks with family.
  arts: Shekinah Jatta, who spends afternoons sketching detailed LEGO creations while listening to Taylor Swift and the cinematic scores of Hans Zimmer, draws inspiration from Studio Ghibli’s My Neighbor
    Totoro, and they combine a practical eye for detail with an imaginative storytelling flair.
  travel: Shekinah Jatta, who enjoys planning family weekend trips to local nature trails like the Blue Ridge Trail and has already visited the Grand Canyon, dreams of exploring the pyramids of Giza and
    snorkeling the Great Barrier Reef, and they balance adventurous curiosity with the comfort of familiar routines.
  culinary: Shekinah Jatta, who favors homemade mac and cheese laden with extra cheddar, loves crafting fruit kebabs of mango and strawberries, can reliably follow a simple pizza‑making recipe, but they
    often sneak extra chocolate chips into the batter, reflecting a practical palate punctuated by occasional indulgent quirks.
  core: Shekinah Jatta, an eight‑year‑old with relentless curiosity for science, organized LEGO building, a competitive soccer spirit, and a habit of meticulously tracking allowance while occasionally splurging
    on the newest game, they exemplify a methodical yet adventurous young mind.
background:
  cultural: Shekinah grows up in a close‑knit African American family in Clarksburg, Maryland, where community ties, church gatherings, and family traditions play a central role in her life. Her parents
    celebrate cultural milestones such as Juneteenth and encourage her to learn about Black history through local museum visits and storytelling. The family’s Sunday church services provide a space for
    communal singing, rhythm, and moral lessons that shape her values. She is also exposed to a rich mix of contemporary African American music, art, and literature, which influence her interests in science
    and creativity while reinforcing a strong sense of cultural pride and identity.
