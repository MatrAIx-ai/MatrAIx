persona_description: A politician who has recently been appointed as the prime minister of a newly independent country in the Middle East. The new country is a secular state composed mostly of Moslems,
  plus some Christians and Jews, and seeks to achieve peace and stability in the region without resorting to force. The prime minister is trying to demonstrate statesmanship and leadership while also dealing
  with the complex and often hostile dynamics between Sunni and Shia Moslems, the traditional rivals in the region. The prime minister is also trying to navigate the difficult relationship with Turkey,
  which has been a traditional enemy of the country, and the ongoing conflict in Syria. The prime minister is also aware of the need to address the needs of the Syrian rebels and the need to prevent the
  rise of a militant Iran, while also trying to avoid being drawn into the old Ottoman Empire's burden of administering and policing all the people in the region. The prime minister is also aware of the
  need to address the needs of the Arabs, who have bitter memories of the harsh Turkish rule, and the need to avoid being drawn into a Sunni-Shia conflict. The prime minister is also aware of the need to
  address the needs of the Kurds, who are an ethnic group that has a history of conflict with the government.
