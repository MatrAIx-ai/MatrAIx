personas:
  professional: Lucia Bolas, a budding nonprofit consultant and seasoned community organizer, applies her sharp budgeting acumen, event‑coordination expertise, and personable communication style to help
    small charities streamline operations while infusing her pragmatic curiosity and occasional assertiveness into every advisory session.
  sports: Lucia Bolas stays active through weekly line‑dancing classes, weekend hikes in nearby state parks, and cheering for the St Louis Cardinals, blending her love of movement, nature, and local team
    spirit into a relaxed yet consistent fitness routine.
  arts: Lucia Bolas expresses her creativity through watercolor sketches of park landscapes, drawing inspiration from Georgia O'Keeffe and the folk melodies of Bob Dylan, and often showcases her art at
    book‑club potlucks and community fairs.
  travel: Lucia Bolas prefers short road trips to historic sites like the Lincoln Home National Historic Site and culinary stops such as Wisconsin cheese‑curd shacks, planning itineraries with detailed
    spreadsheets while leaving room for spontaneous detours to local farmers' markets.
  culinary: Lucia Bolas blends Midwestern comfort with global flavors, seasoning garden‑grown tomatoes with fresh basil and oregano, baking flaky apple‑pecan pies, and experimenting with Thai basil chicken,
    all while delighting friends at potluck gatherings and regional fairs.
  core: Lucia Bolas is a pragmatic yet gregarious 55‑year‑old who balances spreadsheets with soil, line‑dances through life’s challenges, and occasionally forgets to floss after a bake‑sale.
background:
  cultural: Lucia grew up in the Midwestern suburb of Chesterfield, Missouri, within a family of mixed German and Irish ancestry that values hard work, modesty, and community service. Her upbringing was
    shaped by the friendly, hospitality‑driven culture of St. Louis County, with traditions like Sunday family meals, participation in local church events, and attending the annual St. Louis Fair. These
    experiences fostered a deep appreciation for Midwestern values of neighborliness, practicality, and a strong sense of civic duty. Exposure to the city’s diverse culinary scene, including German pastries,
    Southern barbecue, and Creole influences, broadened her palate and cultural curiosity. Lucia’s cultural identity blends this Midwestern heritage with a modern, inclusive outlook, encouraging her to
    celebrate both longstanding family customs and contemporary community initiatives.
