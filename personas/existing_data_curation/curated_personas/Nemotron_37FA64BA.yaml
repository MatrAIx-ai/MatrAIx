  career_goals: Lucia aims to translate her business degree and community experience into a part‑time consulting role focused on helping local nonprofits and small family‑owned businesses improve their
    financial and operational practices. She plans to enroll in a nonprofit management certificate program within the next year to deepen her expertise. Additionally, she aspires to serve on the board of
    a regional charity, leveraging her organizational skills to drive strategic initiatives. On the entrepreneurial side, Lucia is experimenting with a home‑based baked goods venture, hoping to turn it
    into a modest storefront that supplies her community events. Ultimately, she envisions a semi‑retired lifestyle where she balances mentorship of younger entrepreneurs with sustained volunteer leadership,
    ensuring both personal fulfillment and financial security.
