personas:
  professional: Almeda Wilson is a seasoned retail leader whose three‑decade track record of building high‑energy sales teams, negotiating deals, and implementing data‑driven CRM strategies is amplified
    by their charismatic, spontaneous style that thrives on live interaction and quick‑thinking problem solving.
  sports: Almeda Wilson stays active by playing co‑ed softball on the historic Hilltop League, attending weekly Zumba classes at Brookside Fitness Center, and cheering loudly for the Chicago Bulls, Blackhawks,
    and Cubs, blending competitive spirit with community camaraderie.
  arts: Almeda Wilson immerses themselves in the arts by front‑rowing live performances from Ella Fitzgerald tributes and B.B. King covers at downtown blues venues, sharpening spontaneous storytelling through
    improv workshops at The Second City, and deriving leadership inspiration from the book Good to Great by Jim Collins.
  travel: Almeda Wilson favors spur‑of‑the‑moment weekend getaways to culinary hotspots like New Orleans' French Quarter Food Festival, Austin's BBQ Bash, and Savannah's historic tea tours, often booking
    last‑minute flights while balancing a modest retirement budget.
  culinary: Almeda Wilson's kitchen is a laboratory where slow‑cooked collard greens meet miso glaze, smoked turkey transforms into chipotle‑aioli tacos, and sweet‑potato pie gets a ginger‑crystallized
    pecan topping, all while perfecting the classic soul‑food flavor profile with fresh herbs and smoked paprika.
  core: Almeda Wilson blends charismatic, quick‑thinking leadership with a love for spontaneous jazz nights and community mentorship, while juggling a rival streak and a harmless habit of misplacing paperwork.
background:
  cultural: Almeda grew up in the heart of Winston‑Salem’s historic African‑American neighborhoods, where the legacy of the civil‑rights movement and the tradition of Southern soul culture shaped her worldview.
    Family gatherings centered on gospel music, storytelling, and home‑cooked meals, instilling a deep appreciation for community solidarity. As a Black woman navigating corporate ladders, she draws strength
    from the resilience of her ancestors and the mentorship of local Black business networks. Her identity is reflected in her love for church fellowship, participation in the North Carolina Black Business
    Alliance, and a commitment to preserving and celebrating the rich culinary and musical heritage of the Piedmont region.
attributes:
  skills: '[''Strategic sales planning'', ''Customer relationship management (CRM)'', ''Team leadership & performance coaching'', ''Negotiation'', ''Public speaking & presentation'', ''Adaptable problem
