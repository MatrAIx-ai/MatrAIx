personas:
  professional: Joshua Barnes is a preschool enthusiast who organizes daily classroom activities with meticulous block arrangements, thriving on routine and practical play, while their outgoing nature makes
    them a natural leader in group games and their deep empathy prompts them to help classmates who feel upset, though they sometimes worry about new transitions.
  sports: Joshua Barnes loves joining the local Little League Tigers' Friday soccer practice, proudly wearing a bright blue jersey while cheering for the Chicago Cubs on game nights, and balances high‑energy
    play with occasional nap‑time tantrums when a schedule changes unexpectedly.
  arts: 'Joshua Barnes delights in drawing colorful dinosaurs inspired by the animated series ''Jurassic World: Camp Cretaceous'', singing along to Raffi''s ''Baby Beluga'' during music time, and re‑enacts
    scenes from Disney''s ''Frozen'' with a prized snowflake costume, while their vivid imagination is sometimes dampened by worry over unfinished art projects.'
  travel: Joshua Barnes dreams of traveling to Disneyland in Anaheim, has already explored the nearby county fairgrounds with their family, and meticulously maps out imaginary treasure hunts on backyard
    sandboxes, but their fear of thunderstorms can make road trips stressful.
  culinary: Joshua Barnes enjoys nibbling on cheesy macaroni, building peanut‑butter‑and‑jelly sandwiches with precise layers, and sipping warm apple juice, often insisting on arranging the food on plates
    like a rainbow, though they occasionally sneak extra chocolate chips when no one looks.
  core: Joshua Barnes is a structured yet sociable five‑year‑old who balances meticulous play with heartfelt compassion, frequently worries about changes, and expresses a quirky habit of lining up crayons
    by color before every drawing session.
background:
  cultural: Joshua is raised in a white, middle‑class family in Lakeland, Florida. His upbringing reflects the warm, community‑oriented culture of Central Florida, with frequent participation in school
    events, local parks, and family gatherings. He is exposed to Southern hospitality, weekend family meals, and occasional church or community service activities, which reinforce values of cooperation,
    kindness, and respect for routine.
