  career_goals: Joshua dreams of becoming a teacher or a community helper, aspiring to guide younger children and ensure a safe, organized environment. He also imagines caring for animals as a veterinarian,
    driven by his compassion. His long‑term ambition is to combine leadership with empathy in a role that supports others and promotes harmony.
