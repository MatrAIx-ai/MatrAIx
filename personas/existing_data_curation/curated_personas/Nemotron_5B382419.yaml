personas:
  professional: Andre Trotter is a market research analyst who blends quantitative rigor with storytelling flair, using SPSS, R, and Tableau to uncover consumer insights while channeling their love for
    community narratives into client presentations that feel like lively town‑hall conversations.
  sports: Andre Trotter is a dedicated pickup basketball player who courts with the Naples Youth Club every Thursday, roots for the Tampa Bay Rays and Miami Heat, and incorporates a blend of HIIT workouts
    and weekend bike rides along the Gulf Coast to stay fit.
  arts: Andre Trotter immerses themselves in contemporary art, frequently attending exhibitions featuring Kehinde Wiley and local muralists, snapping street‑culture photographs inspired by the works of
    Banksy, and fueling their creative spark by performing improv sketches with the South Florida Comedy Lab while vibing to Solange and Kamasi Washington.
  travel: Andre Trotter curates short‑haul adventures that balance cultural immersion and culinary discovery, having explored New Orleans' jazz scene, the historic streets of Cartagena, and the vibrant
    food markets of Miami, preferring to plan itineraries on their phone but leaving room for spontaneous detours to street‑food stalls.
  culinary: Andre Trotter is a home‑cook who elevates classic soul‑food dishes like collard greens and smoked turkey with modern twists such as miso‑glazed okra and quinoa‑based cornbread, experimenting
    with ingredients like smoked paprika, gochujang, and fresh herbs while showcasing their dishes at neighborhood potlucks.
  core: Andre Trotter is a curious, talkative 29‑year‑old who bridges data and culture, over‑commits to networking events, fuels their nights with coffee, and consistently refines their storytelling craft
    through art, sport, and spice.
background:
  cultural: Andre grew up in a close‑knit Black family in the Greater Tampa area before moving to Naples for college and his career. His upbringing emphasized the importance of community, storytelling,
    and resilience. Family gatherings were marked by soulful music, shared recipes, and lively debate, which fostered his love for conversation and cultural expression. As a Black professional in the marketing
    industry, Andre navigates both corporate environments and community spaces, drawing on his heritage to champion inclusive narratives and authentic representation in brand messaging. He remains active
    in local mentorship programs that support youth of color and participates in cultural festivals that celebrate African‑American art, music, and history.
attributes:
  skills: '[''Market research design'', ''Statistical analysis (SPSS, R, Python)'', ''Data visualization (Tableau, Power BI)'', ''Consumer insight synthesis'', ''Digital marketing (SEO, SEM, social media)'',
    ''Content strategy'', ''Public speaking'', ''Presentation design'', ''Stakeholder management'', ''Graphic design basics (Adobe Photoshop, Illustrator)'', ''Brand storytelling'']'
  hobbies: '[''Visiting art galleries'', ''Street photography'', ''Live music events'', ''Hosting networking mixers'', ''Community theater improvisation'', ''Playing basketball'', ''Cooking soul‑food with
    contemporary twists'', ''Traveling for culinary exploration'', ''Reading behavioral psychology'', ''Listening to marketing podcasts'', ''Maintaining a personal blog on culture and insights'']'
  career_goals: Andre aims to progress from a market research analyst to a senior insights strategist and eventually a director of consumer insights within a forward‑thinking brand. He seeks to lead cross‑functional
    research teams, develop data‑driven brand narratives, and integrate emerging technologies like AR/VR into experiential campaigns. Andre also plans to earn a professional certification (e.g., Professional
    Researcher Certification), publish thought‑leadership pieces on inclusive marketing, and mentor emerging Black professionals in the analytics field.
