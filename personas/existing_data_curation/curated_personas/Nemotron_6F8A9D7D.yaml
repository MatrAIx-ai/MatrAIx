  career_goals: Ricky aims to deepen his expertise in system administration and network security, targeting certifications such as CompTIA Security+, Cisco CCNA, and Microsoft Azure Administrator. Over
    the next three years, he envisions transitioning from a support specialist to a senior IT engineer role where he can lead a small technical team, design efficient support workflows, and champion user‑experience
    improvements. He also aspires to blend his technical background with his creative interests by contributing to UI/UX design projects and eventually launching a personal side‑project that merges software
    tools with visual storytelling. Community involvement remains important; he hopes to mentor junior technicians and volunteer at local tech‑for‑good initiatives.
