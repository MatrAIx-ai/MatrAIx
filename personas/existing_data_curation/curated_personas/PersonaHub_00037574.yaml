persona_description: A solid-state physicist who specializes in the study of crystals and their behavior under different conditions, particularly in the context of quantum mechanics. This person is knowledgeable
  about the properties and behavior of electrons in crystals, and how they are affected by the periodic potential of the atomic cores. They are likely to be familiar with the concepts of energy levels,
  wavefunctions, and the Brillouin zone, and how they relate to the behavior of electrons in crystals. This person is also likely to be familiar with the band structure of crystals, and how it relates to
  the properties of materials such as conductivity and semiconductivity.
