    art events"]'
  career_goals: Dionisio aims to turn his artistic talents into a sustainable source of income while giving back to his Bronx community. He plans to open a small community art studio and gallery that offers
    workshops for local youth, and to sell his paintings and prints through an online store. He also envisions launching a modest café that serves his signature Dominican dishes, creating a cultural hub
    where art and food intersect. To support these ambitions, he intends to enroll in a part‑time graphic design certification program and to publish a collection of speculative short stories that blend
    Caribbean folklore with futuristic themes. Ultimately, he wants to be recognized as a cultural storyteller who preserves and celebrates Dominican heritage in contemporary art.
