personas:
  professional: Stephanie Brown is a certified pipefitter and steamfitter whose eight years of hands‑on experience in commercial and industrial plumbing, meticulous blueprint interpretation, and high‑pressure
    MIG/TIG welding translate her love of routine into consistently on‑schedule, high‑quality installations, while her competitive drive fuels her mentorship of apprentices and ambition to become a journeyman
    foreman.
  sports: Stephanie Brown’s primary sport is weekend fishing on the Atchafalaya River, complemented by membership in the Baton Rouge Women’s Anglers Club, casual participation in a spring softball league,
    and avid support of the New Orleans Saints (NFL) and the LSU Tigers (college football), with a disciplined schedule that balances work and fitness.
  arts: Stephanie Brown relaxes to the sounds of classic country icons like Johnny Cash and Dolly Parton and blues legends such as B.B. King while tackling DIY home‑improvement projects, and they occasionally
    attend live performances at the River Center featuring local Cajun fiddlers and blues bands.
  travel: Stephanie Brown favors low‑key road trips that combine scenic drives with fishing opportunities, such as weekend escapes to the Texas Hill Country, the Bayou Teche, and the backwaters of the Atchafalaya,
    keeping travel budgets modest to preserve funds for their future contracting venture while dreaming of a guided fly‑fishing expedition to the Florida Keys.
  culinary: Stephanie Brown’s culinary repertoire centers on traditional Southern Louisiana dishes like gumbo and jambalaya, expertly seasoned with andouille sausage, Holy Trinity vegetables, and filé powder,
    and they take pride in growing fresh okra and tomatoes in their backyard garden to enhance home‑cooked meals.
  core: Stephanie Brown is a methodical pipefitter who balances a love of routine with weekend fishing, garden cultivation, and a competitive drive to lead, all while keeping life grounded in practical
    faith, classic tunes, and humble budgeting.
background:
  cultural: Stephanie grew up in a close‑knit, predominantly white community in Port Allen, Louisiana, where Southern and Cajun cultures intersect. Her family has deep roots in the region, with generations
    of participation in local church life, community festivals, and traditional Southern values such as hospitality, self‑reliance, and respect for routine. She was raised in a Catholic‑Protestant blend,
    celebrating both Thanksgiving family gatherings and Mardi Gras parades. This cultural backdrop emphasizes practical skills, hard work, and a strong sense of family responsibility, which shape her pragmatic
    outlook and dedication to her trade.
attributes:
  skills: '["Pipefitting", "Steamfitting", "MIG/TIG welding", "Blueprint reading", "Hydraulic system maintenance", "Safety compliance (OSHA)", "Troubleshooting", "Project scheduling", "Apprentice mentorship",
    "Customer communication"]'
  hobbies: '["Gardening", "Fishing", "Cooking Cajun/Creole cuisine", "Church attendance", "DIY home improvement", "Listening to country and blues music", "Community volunteer work", "Reading trade magazines"]'
  career_goals: Stephanie aims to become a journeyman foreman within the next three years, overseeing larger industrial projects and standardizing best‑practice procedures for her crew. She plans to earn
    additional certifications in industrial pipe welding and high‑pressure steam systems, and eventually start her own small contracting firm that specializes in reliable, routine‑driven installations for
    local businesses. Her competitive nature fuels a desire to be recognized as one of the top female pipefitters in the Gulf Coast region while maintaining a stable work‑life balance for her family.
