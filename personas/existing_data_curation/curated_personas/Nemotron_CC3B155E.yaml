  hobbies: '[''Visiting art galleries and museums'', ''Digital illustration'', ''Photography'', ''Reading contemporary fiction and philosophy'', ''Hiking in the Boise foothills'', ''Attending live music
    shows'', ''Playing board games with friends'', ''Cooking experimental recipes'', ''Exploring indie video games'', ''Volunteering for community arts workshops'', ''Learning new programming languages
    and tech tools'']'
  career_goals: Cedric aims to become a leader at the intersection of technology and culture, steering the development of innovative digital platforms that make art and heritage accessible to broader audiences.
    In the next five years he hopes to move into a senior product‑manager role for a museum or cultural institution, overseeing interdisciplinary teams that blend software engineering, design, and scholarly
    research. He plans to deepen his expertise in human‑computer interaction through a master's program or professional certifications, and eventually launch his own creative‑tech studio focused on AR/VR
    installations and interactive storytelling. Alongside professional advancement, he wants to maintain a healthy work‑life balance that supports his family and personal creative projects.
