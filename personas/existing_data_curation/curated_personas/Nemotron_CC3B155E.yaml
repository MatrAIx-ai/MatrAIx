personas:
  professional: Cedric Parker, a 32-year-old full‑stack developer with a penchant for the arts, blends technical rigor with creative flair in product design, channeling their curiosity and balanced reliability
    into user‑centred digital experiences for cultural institutions.
  sports: Cedric Parker, an avid hiker and trail‑runner who belongs to the Boise River Trail Club, spends weekends conquering the Sawtooth foothills, follows the Boise State Broncos football team for community
    spirit, and occasionally joins a local adult recreational soccer league.
  arts: Cedric Parker curates personal galleries of digital illustrations inspired by the surreal works of Alex Grey and the atmospheric photography of Ansel Adams, attends live shows featuring folk singer
    Sufjan Stevens and experimental DJ HAAi, and frequently quotes film director Wong Kar‑wai in design discussions.
  travel: Cedric Parker favors meticulously planned road trips across the Pacific Northwest, has trekked the Scottish Highlands, dreams of visiting the ancient temples of Kyoto, and balances wanderlust
    with a budget that prioritizes occasional art residencies over lavish resorts.
  culinary: Cedric Parker enjoys experimental cooking, often whipping up sous‑vide beetroot risotto with smoked goat cheese and a drizzle of aged balsamic, while they also love street‑taco nights featuring
    chorizo al pastor and hand‑rolled matcha pastries.
  core: Cedric Parker, a curiosity‑driven technologist‑artist, navigates life by balancing disciplined code commits with spontaneous midnight sketch sessions, all while perpetually misplacing their keys.
background:
  cultural: Cedric was raised in the Boise metropolitan area of Idaho, where his family has deep roots in the Pacific Northwest. His paternal grandparents emigrated from Ireland and his maternal ancestors
    are of German descent, giving him a mixed European heritage that blends storytelling traditions and a strong work ethic. Growing up in a region known for its rugged outdoors and a vibrant, albeit modest,
    arts community, he absorbed values of independence, environmental stewardship, and community involvement. His upbringing emphasized education and curiosity, encouraging him to pursue both a humanities
    degree and a career in technology. While he identifies with mainstream American culture, his experiences with local art scenes, regional festivals, and collaborative community projects have cultivated
    a broad appreciation for cultural diversity and a willingness to explore unconventional ideas.
