personas:
  professional: Thomas Ros, an aspiring robotics engineer and strategy gamer, leverages his methodical sketching, digital painting, and debate skills to design and program competition‑ready robots while
    approaching problems with a critical, competitive mindset.
  sports: Thomas Ros, a hiking enthusiast from Hoke County, joins the local Trail Runners club for weekend treks, occasionally cheers for the Carolina Hurricanes and follows the NC State Wolfpack basketball
    team, using physical activity as a disciplined counterbalance to his screen‑heavy hobbies.
  arts: Thomas Ros, a budding visual artist, spends free afternoons sketching landscapes and editing digital paintings inspired by the atmospheric tones of Radiohead, the lyrical depth of Mitski, and the
    cinematic flair of indie filmmaker Greta Gerwig, while capturing rural sunsets through a DSLR lens that fuels his creative identity.
  travel: Thomas Ros prefers meticulously planned weekend getaways, often hiking the Blue Ridge Parkway or visiting nearby community art fairs in Asheville, while dreaming of a future tech‑culture pilgrimage
    to Tokyo’s Akihabara district and the ethereal fjords of Iceland, balancing budget constraints with a desire for immersive experiences.
  culinary: Thomas Ros enjoys mastering simple yet bold dishes like garlic butter shrimp pasta, spicy tuna rolls, and cheesy pepperoni pizza, often experimenting with sriracha and matcha in his modest kitchen
    while relying on his parents’ grocery runs for fresh ingredients.
  core: Thomas Ros is a curious, methodical teen who fuses artistic flair with competitive strategy, thrives on structured plans, yet occasionally succumbs to marathon gaming sessions and forgets to unwind.
background:
  cultural: Thomas grew up in Fayetteville, North Carolina, within the predominantly rural setting of Hoke County. The region’s Southern heritage — with its emphasis on community gatherings, high school
    football Saturdays, and family barbecues — mingles with the influence of nearby Fort Bragg’s military families and the growing diversity of the town. He celebrates traditional holidays like the Fourth
    of July with local parades, while also engaging in contemporary youth culture through school clubs and online communities. His upbringing reflects a blend of Southern courtesy, a strong work ethic,
    and an openness to the diverse artistic and technological ideas prevalent in a modern small‑town environment.
