  career_goals: Thomas aims to combine his love for art and technology by pursuing a degree in Computer Science with a focus on Interactive Media. He envisions a career as a UX/UI designer or video game
    developer, creating immersive experiences that blend visual storytelling with user-centered design. He also aspires to lead creative project teams, leveraging his methodical approach and competitive
    drive to deliver innovative products. In the long term, he hopes to secure a scholarship for a STEM-arts magnet program and eventually work for a studio that values both aesthetic excellence and technical
    rigor.
