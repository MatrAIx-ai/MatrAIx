  career_goals: Angellica aims to advance from her current cashier role into a supervisory position, such as shift supervisor or store manager, where she can leverage her people‑skills and strategic thinking.
    She plans to enroll in a GED program and pursue a certificate in retail management or small‑business entrepreneurship. In the longer term, she dreams of opening a community‑focused boutique that showcases
    works by Detroit artists and craftspeople, providing a platform for emerging talent while creating jobs. Alongside her professional aspirations, she seeks to develop healthier coping mechanisms for
    anxiety and emotional distress, aiming for a balanced career that intertwines her passion for art, community, and entrepreneurship.
