personas:
  professional: Angellica Hawthorne, a seasoned Detroit retail associate, channels their keen trend‑spotting eye and empathetic communication into turning everyday checkout interactions into community storytelling
    opportunities, while their spontaneous, competitive streak drives them to chase shift‑supervisor roles even as their aversion to rigid schedules sometimes leads to missed paperwork deadlines.
  sports: Angellica Hawthorne fuels weekend energy by cheering for the Detroit Tigers and Detroit Lions, joining a downtown Zumba squad and a casual Sunday running club at Belle Isle, though their spontaneous
    schedule often causes them to skip scheduled gym workouts.
  arts: Angellica Hawthorne curates an Instagram feed bursting with Detroit’s vibrant street‑art murals, draws creative fuel from Stevie Wonder, Marvin Gaye, and J Dilla’s soulful beats, and often weaves
    spoken‑word lines from Maya Angelou into their DIY collage projects displayed at open‑mic nights.
  travel: Angellica Hawthorne prefers impromptu road trips, loading a camera and a mixtape of Motown classics for weekend escapes to Chicago’s blues bars, sudden detours into the Badlands, while dreaming
    of an art‑laden pilgrimage through Barcelona’s alley‑way murals, though a modest savings cushion sometimes reins in their wanderlust.
  culinary: Angellica Hawthorne blends a love for Detroit‑style pizza and soul‑food staples like collard greens with an emerging talent for turmeric‑infused roasted carrots, swapping recipes at neighborhood
    potlucks and treating themselves to spontaneous brunches of avocado toast paired with a strong espresso.
  core: Angellica Hawthorne, a 43‑year‑old Detroit retail enthusiast, channels restless curiosity into nightly mural hunts and spontaneous karaoke marathons, yet habitually overcommits to projects, leaving
    a trail of half‑finished canvases and lingering credit‑card balances.
background:
  cultural: Angellica is a Black woman raised in Detroit’s historically African‑American neighborhoods, where she was immersed in the city’s rich musical legacy—from Motown to contemporary hip‑hop—and the
    strong community emphasis on resilience, creativity, and mutual support. She identifies with African‑American cultural traditions, celebrating events such as Juneteenth, participating in church gatherings,
    and engaging in local cultural festivals that highlight Black art and history. The city’s history of industrial change and grassroots art movements has shaped her appreciation for urban murals and community
    activism. Her lived experience of navigating systemic challenges informs her commitment to uplift her community through art, entrepreneurship, and mentorship.
