personas:
  professional: Deborah Kendall, a 66‑year‑old retired homemaker turned senior outreach coordinator, leverages their meticulous budgeting, compassionate volunteer leadership, and talkative charm, and they
    design and run community festivals and support groups that stay on schedule and nurture local harmony.
  sports: Deborah Kendall enjoys low‑impact beach walks along the Gulf shores with their sketchpad, participates in the Foley Beach Walkers club, follows the New Orleans Saints for football, and engages
    in weekly bridge tournaments at the senior center, which they treat as a mental sport.
  arts: Deborah Kendall spends afternoons sketching coastal scenes in watercolor, reads Agatha Christie mystery novels for mental stimulation, attends performances at the Gulf Coast Playhouse featuring
    local actors, and knits intricate blankets while listening to blues legends like B.B. King, and they ground their identity in creative expression.
  travel: Deborah Kendall prefers short, organized road trips to nearby Gulf towns such as Destin and Pensacola, enjoys the historic charm of Charleston, South Carolina, and occasionally dreams of a guided
    garden tour at England’s Kew Gardens, and they always plan travel around budget constraints and family commitments.
  culinary: Deborah Kendall delights in cooking gumbo, shrimp and grits, and pecan pie using garden‑grown tomatoes, basil, and fresh herbs, perfecting the balance of cayenne and paprika while they host
    potluck dinners that showcase the comfort of Southern cuisine.
  core: Deborah Kendall blends structured community leadership with a warm, talkative spirit, and they turn garden‑grown ingredients and Southern traditions into vibrant gatherings that celebrate local
    heritage.
background:
  cultural: Deborah was born and raised in the deep South, spending her formative years in Alabama during a time of evolving social change. Her family emphasized hospitality, strong Baptist church involvement,
    and community service—values that have guided her throughout life. As a lifelong resident of Baldwin County, she embraces the coastal culture of Foley, cherishing local traditions such as shrimp festivals,
    Gulf breezes, and Southern cuisine. Her upbringing instilled a respect for tradition, modesty, and perseverance, while also fostering a love for storytelling, shared meals, and collective celebrations.
    These cultural influences shape her compassionate, sociable, and organized approach to everyday life.
