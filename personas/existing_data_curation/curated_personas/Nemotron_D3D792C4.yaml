  hobbies: '[''Reading literature'', ''Watercolor sketching'', ''Photography'', ''Visiting art galleries'', ''Poetry writing'', ''Yoga'', ''Mindfulness meditation'', ''Community theater workshops'', ''Indie
    music concerts'', ''Nature hiking'']'
  career_goals: Terri aims to pursue a Bachelor of Science in Nursing (BSN) and eventually a master’s degree in nursing with a focus on community health and integrative care. She envisions creating a small-scale
    art-therapy program within a rural Texas clinic to help patients cope with chronic illness and stress. Long-term, she hopes to become a nurse educator who can mentor new nurses on blending clinical
    expertise with humanities-based approaches, while also establishing a personal practice that balances patient advocacy with her need for flexible, low-stress work environments.
