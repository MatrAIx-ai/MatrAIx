personas:
  professional: Terri Simmons, a 22‑year‑old licensed practical nurse with a humanities bachelor’s, blends meticulous patient assessment, medication administration, and wound care with narrative‑driven
    health education, channeling their curiosity for art‑based interventions while often letting a relaxed attitude toward scheduling turn into last‑minute scrambles.
  sports: Terri Simmons enjoys solitary hikes on Hill Country trails, practices yoga three times a week, occasionally joins a local running club for weekend 5K runs, and follows the Dallas Cowboys, the
    Houston Astros, and the Dallas Mavericks as a passive fan.
  arts: Terri Simmons spends evenings sketching watercolor scenes of West Texas sunsets, draws inspiration from the poetry of Ocean Vuong and the paintings of Andrew Wyeth, frequents local galleries showcasing
    emerging Texan artists, and attends intimate indie‑music concerts featuring Bon Iver and Sufjan Stevens.
  travel: Terri Simmons prefers low‑key, solo travel, often planning weekend retreats to Hill Country wineries and Big Bend National Park while dreaming of an extended study‑tour of Florence’s Renaissance
    art museums and a mindfulness retreat in Kyoto.
  culinary: Terri Simmons enjoys simple farm‑to‑table cooking, regularly preparing chicken enchiladas with homemade salsa, roasted beets with feta, and avocado‑lime salads, and perfecting watercolor‑inspired
    plating that highlights fresh cilantro, lime zest, and smoked paprika.
  core: Terri Simmons is a curiosity‑driven nurse‑artist who balances clinical rigor with watercolor daydreams, often juggling anxious perfectionism and a delightfully chaotic approach to schedules and
    sketchbooks.
background:
  cultural: Terri grew up in a middle-class white family in central Texas, where Southern hospitality, modest church involvement, and a strong emphasis on education shaped her upbringing. The college-town
    atmosphere of College Station, with its blend of university culture and Texas traditions, reinforced her love for both academic inquiry and local community. Exposure to regional art, music, and outdoor
    recreation, combined with a humanities education, gives her a multicultural curiosity while rooting her identity in the values of self-reliance, modesty, and a pragmatic appreciation for both art and
    practical caregiving.
