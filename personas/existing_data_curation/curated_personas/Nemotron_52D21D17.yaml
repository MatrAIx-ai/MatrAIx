  hobbies: '[''Visiting Contemporary Art Galleries'', ''Photography'', ''Reading Philosophy and Art Theory'', ''Participating in Community Theater'', ''Cooking Experimental Cuisine'', ''Urban Gardening'',
    ''Running Group Fitness Sessions'', ''Traveling to Art Capitals'', ''Volunteer Tutoring'', ''Collecting Vintage Posters'']'
  career_goals: Ray aims to transform his passion for art and community service into a lasting legacy by establishing a nonprofit cultural hub in Brooklyn that offers free workshops, artist residencies,
    and public exhibitions. He plans to secure multi-year grant funding, partner with local schools, and develop a mentorship program that pairs seasoned creators with under-represented youth. In the longer
    term, Ray envisions publishing a guidebook that shares practical strategies for community-driven arts programming and documenting the stories of the artists he supports.
