  hobbies: '[''gardening'', ''knitting'', ''birdwatching'', ''reading historical fiction'', ''genealogy research'', ''bridge'', ''DIY tech projects'']'
  career_goals: Now retired from full‑time employment, Susan aims to stay active in her community by volunteering at the local senior center to teach basic computer literacy, creating easy‑to‑follow guides
    for older adults, and offering informal mentorship to younger staff at the non‑profit where she once worked. She also hopes to document her experiences bridging early personal computing with today’s
    digital world in a memoir and to keep her curiosity alive by exploring emerging consumer technologies such as voice‑activated assistants, all on a flexible, self‑directed schedule.
