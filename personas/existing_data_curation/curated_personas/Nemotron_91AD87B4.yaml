personas:
  professional: Susan Hammond is a retired computer support specialist who now volunteers teaching basic computer literacy to seniors, and they effortlessly translate complex tech jargon into step‑by‑step
    guides, leveraging their three‑decade troubleshooting expertise, PowerShell scripting, and love of flexible problem‑solving while occasionally battling a chaotic schedule.
  sports: Susan Hammond enjoys low‑impact activities such as walking with the local senior walking club and gentle senior yoga classes at the community center, they root for the River City Gliders minor‑league
    baseball team and the Seattle Seahawks during football season, and they count their weekly bridge night as a strategic sport.
  arts: Susan Hammond engages in creative expression through knitting vibrant scarves and blankets, immerses themselves in historical fiction by Ken Follett, classic mysteries by Agatha Christie, and they
    regularly attend community theater productions of Arthur Miller’s ‘The Crucible,’ while their musical taste includes the folk harmonies of Joan Baez and the soothing piano of Ludovico Einaudi.
  travel: Susan Hammond prefers short, well‑planned road trips to historic sites such as Williamsburg, Virginia, enjoys seasonal trips to the Grand Canyon’s South Rim, dreams of strolling the Cotswolds
    in England, and they balance a modest travel budget by traveling with a small group of bridge friends or adult children, often opting for train journeys over long flights.
  culinary: Susan Hammond regularly cooks garden‑fresh dishes like heirloom tomato bruschetta with basil and oregano, rosemary‑infused roasted chicken, and a comforting blueberry crisp topped with oat crumble,
    they consider themselves a competent home cook who often forgets to set the kitchen timer, leading to occasional over‑roasted vegetables.
  core: Susan Hammond blends a lifelong curiosity for technology with a practical love of gardening and knitting, they continuously mentor seniors on digital skills, yet they habitually misplace their spectacles
    and sometimes lose track of appointments.
background:
  cultural: Susan grew up in a small town in Lucas County, Ohio, in the post‑war era, within a predominantly white, middle‑class, Midwestern community. Her family emphasized hard work, modesty, and community
    involvement, often centered around church gatherings and neighborhood events. These values have fostered a deep respect for tradition while also encouraging openness to new ideas, reflected in her later
    embrace of computer technology. She continues to celebrate local customs such as seasonal farmers’ markets, holiday potlucks, and volunteering at the community church, blending her Midwestern roots
    with a lifelong curiosity about the world.
