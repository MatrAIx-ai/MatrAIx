  career_goals: Margaret aims to advance to a Principal Engineer or Sr. Staff Engineer role where she can lead the technical vision for large‑scale fintech platforms. She plans to earn the AWS Certified
    Solutions Architect – Professional certification and deepen her expertise in responsible AI/ML integration, positioning herself to influence product strategy and ethical data practices. Over the next
    five years, she envisions mentoring a cohort of junior developers, driving diversity and inclusion initiatives within her organization, and ultimately transitioning into a VP of Engineering or CTO position
    at a mission‑driven tech firm. Throughout her career progression, she remains committed to maintaining a balanced work‑life rhythm that allows time for family, community volunteering, and continued
    learning.
