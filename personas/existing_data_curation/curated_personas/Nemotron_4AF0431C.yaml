personas:
  professional: Joella Calhoun, a retired senior‑center coordinator turned community gardening workshop leader, combines their hands‑on carpentry know‑how, love of native plants, and warm mentorship style
    to create low‑key, flexible classes that emphasize practical, Florida‑friendly gardening while letting participants savor spontaneous learning moments, and they always encourage a relaxed, curiosity‑driven
    atmosphere.
  sports: Joella Calhoun enjoys leisurely bird‑watching hikes along local nature trails, joins a senior walking club that meets thrice weekly, plays occasional pickleball in the mild winter months, and
    they root for the Tampa Bay Buccaneers while sharing gardening tips with fellow club members.
  arts: Joella Calhoun finds creative solace knitting pastel scarves while listening to classic folk singer Joan Baez, discusses novels by Jane Austen at the monthly book club, attends occasional performances
    of the Florida Symphony Orchestra featuring works by Philip Glass, and they often swap recipes and knitting patterns during community potlucks.
  travel: Joella Calhoun prefers flexible, low‑stress road trips that blend historic town exploration with nature stops, has already driven the scenic Highway 30 to St. Augustine and day‑tripped to Savannah,
    and they dream of a leisurely Gulf‑Coast cruise to historic Pensacola and Mobile, Alabama, budgeting trips around volunteer program stipends.
  culinary: Joella Calhoun relishes cooking garden‑fresh dishes like zucchini‑basil frittata, shrimp and grits with local Gulf shrimp, and seasonal heirloom tomato gazpacho, often improvising with affordable
    pantry staples while they occasionally indulge in a decadent slice of pecan pie made from a family recipe.
  core: Joella Calhoun blends a garden‑rooted curiosity with relaxed practicality, turning senior‑center volunteerism into community workshops, while they juggle modest finances, health monitoring, and
    a love of birdwatching, cooking, and quiet craft time.
background:
  cultural: Joella grew up in a mid‑western white American family that valued community, modesty, and Southern hospitality after moving to Florida in her early adulthood. Her cultural upbringing emphasizes
    kindness, cooperation, and a laid‑back approach to life, which aligns with the relaxed, flexible lifestyle of many retirees in Lady Lake. She maintains ties to local church gatherings and community
    festivals, reflecting a blend of traditional Midwestern work ethic and the leisurely, nature‑oriented culture of central Florida.
attributes:
  skills: '[''gardening (vegetables and ornamental)'', ''basic carpentry and home repair'', ''cost-effective cooking and recipe development'', ''digital literacy (email, video calls, online research)'',
    ''community event coordination'', ''interpersonal communication and mentorship'']'
  hobbies: '[''gardening'', ''birdwatching'', ''cooking and recipe experimentation'', ''knitting and quilting'', ''book club participation'', ''volunteering at animal shelter'', ''local history research'',
    ''nature trail walking'']'
  career_goals: Joella aims to stay engaged and purposeful in her retirement. She plans to expand her volunteer work by leading gardening workshops at the community center, mentor younger volunteers in
    senior services, and perhaps author a small guidebook of Florida-friendly recipes and gardening tips. She also wishes to enroll in a series of lifelong-learning courses on local history and environmental
    stewardship, and eventually travel to visit historic towns along the Gulf Coast.
