personas:
  professional: Lindsey Reischl, a retired applied mathematician and data‑analysis specialist, now volunteers as a STEM mentor for high‑school girls and provides occasional consulting to local manufacturers,
    applying their precise Python‑driven modeling skills alongside the practical, results‑oriented mindset honed from years of gardening and woodworking.
  sports: Lindsey Reischl enjoys low‑impact fitness, playing senior league pickleball at the local YMCA, cheering on the Kansas City Chiefs, and taking weekly bird‑watching hikes along the nearby nature
    trail that double as gentle cardio sessions.
  arts: Lindsey Reischl immerses themselves in folk music by Joan Baez, classic science‑fiction by Isaac Asimov, and the piano works of Claude Debussy while knitting scarves for friends and regularly attending
    the Lawrence Artisans Fair to appreciate handcrafted ceramics.
  travel: Lindsey Reischl prefers leisurely road trips with close friends, having driven historic Route 66 to Santa Fe for its adobe architecture, returning each autumn to the Iowa State Fair, and dreaming
    of a week‑long bird‑watching expedition in the Scottish Highlands.
  culinary: Lindsey Reischl delights in farm‑to‑table cooking, often serving roasted heirloom carrots with rosemary, pan‑seared trout with lemon‑dill butter, and a warm apple crumble made with locally sourced
    Honeycrisp apples, occasionally over‑seasoning when caught up in a crossword puzzle.
  core: Lindsey Reischl balances analytical rigor with hands‑on creativity, favoring structure yet embracing flexibility, and can be found juggling data models, garden beds, and an ever‑growing stack of
    crossword books.
background:
  cultural: Lindsey grew up in a middle‑class white family on the outskirts of Lawrence, Kansas, where Midwestern values of self‑reliance, community service, and straightforward communication were emphasized.
    Her parents encouraged academic achievement, which led her to pursue a STEM degree at a state university during a time when few women entered the field. Living in Lawrence—a college town with a vibrant
    mix of agricultural heritage and progressive academic culture—has shaped her appreciation for both traditional local customs such as county fairs and potluck gatherings, and the forward‑looking spirit
    of the University of Kansas. Her background also includes a strong sense of advocacy for gender equity in science, reflecting the social changes she witnessed in the 1970s.
