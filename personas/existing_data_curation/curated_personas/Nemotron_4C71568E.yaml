  career_goals: Now retired, Lindsey aims to stay intellectually active while preserving a low‑stress, flexible routine. She plans to volunteer as a STEM mentor for high‑school girls in the Lawrence area,
    offer occasional data‑analysis consulting to local small businesses, and complete a personal project documenting her career experiences for a future memoir. She hopes to publish a concise guide on practical
    data‑driven decision‑making for community organizations and to expand her knowledge of emerging data‑science tools like machine‑learning libraries, all while maintaining a balanced, self‑directed lifestyle.
