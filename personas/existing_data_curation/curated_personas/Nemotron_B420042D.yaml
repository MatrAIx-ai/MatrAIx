personas:
  professional: Thomas Coscia, a budding handyman entrepreneur striving for a state license, channels his spontaneous curiosity and competitive edge into inventive repairs and custom mini‑renovations, yet
    often wrestles with keeping projects organized and meeting client deadlines.
  sports: Thomas Coscia fuels fitness with spontaneous neighborhood jogs and weekly pickup basketball at the Willingboro Community Center, roots for the Philadelphia Eagles and follows the Philadelphia
    76ers, while competing as a member of the local Willingboro Hoops Collective.
  arts: Thomas Coscia relaxes to classic rock icons like Led Zeppelin and The Rolling Stones and jazz legends such as Miles Davis and John Coltrane, frequents the Willow Grove Art Gallery for indie photography
    shows, and quotes lines from "The Godfather" while sketching new gadget concepts.
  travel: Thomas Coscia favors low‑key road trips in a future off‑grid RV, having already roamed the flea‑filled streets of Portland, Oregon and the craft markets of Asheville, North Carolina, while day‑dreaming
    about a rugged Patagonia trek, yet current travels stay budget‑conscious with weekend getaways to Atlantic City and Philadelphia.
  culinary: Thomas Coscia delights in hearty fare like pepper‑corn steak, Philly cheesesteak‑style subs, and smoked brisket, seasoning with rosemary, thyme, and smoked paprika, and often roasts surplus
    garden vegetables while experimenting with a sous‑vide setup for precise cooking.
  core: Thomas Coscia is a 42‑year‑old tinkerer whose relentless curiosity fuels a DIY‑centric hustle, yet their spontaneous nature leaves a trail of half‑finished projects, competitive board‑game battles,
    and a perpetual search for the next vintage part.
background:
  cultural: Thomas was born and raised in the suburban outskirts of Willingboro, NJ, into a family of Italian‑American descent. His grandparents emigrated from southern Italy in the 1950s, bringing with
    them traditions of hearty home‑cooked meals, a strong work ethic, and a deep appreciation for DIY craftsmanship—values that have permeated Thomas’s upbringing. Growing up in a working‑class neighborhood
    shaped by the post‑industrial Northeast, he absorbed a community‑focused culture that prized self‑reliance, practical problem solving, and neighborly reciprocity. Annual celebrations such as Fourth
    of July fireworks, local block parties, and Thanksgiving gatherings reinforced a sense of belonging and collective resilience. Though not overtly religious, the cultural threads of Catholic holidays
    and Italian festivals have informed his appreciation for food, family, and communal gatherings. The multicultural tapestry of Burlington County, with its mix of ethnicities and socioeconomic backgrounds,
    has also exposed Thomas to a range of perspectives, fostering his balanced curiosity toward new ideas while remaining rooted in the pragmatic, hands‑on ethos of his heritage.
attributes:
  skills: '[''Basic Carpentry'', ''Plumbing Repairs'', ''Electrical Troubleshooting'', ''Automotive Maintenance'', ''Electronic Prototyping'', ''DIY Home Automation'', ''Improvisational Problem Solving'',
