persona_description: A space enthusiast who is fascinated by the study of Mars and its unique features. They are particularly interested in the Thermal Emission Spectrometer on Mars Global Surveyor and
  its ability to map Mars at longer wavelengths and with a different purpose than earlier atlases. They appreciate the comparison between the data collected by the Thermal Emission Spectrometer and the
  drawings made by Earth-based astronomers, and are curious about the broader implications of this research for our understanding of Mars and its potential for future human exploration.
