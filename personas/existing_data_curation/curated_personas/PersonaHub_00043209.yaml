persona_description: A scientist who is interested in the study of the endocannabinoid system and its role in regulating appetite and weight. Specifically, they are interested in the mechanisms by which
  the CB1 receptor is integrated with signaling by the appetite-suppressing hormone leptin. They are also interested in the effects of the compound rimonabant, which targets the CB1 receptor, and how it
  can be used to treat obesity. They are likely to have a background in neuroscience and pharmacology, and have experience with electrophysiological measurements and electrophysiology research.
