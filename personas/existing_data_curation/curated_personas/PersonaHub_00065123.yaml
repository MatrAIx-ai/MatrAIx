persona_description: A computer scientist and engineer who specializes in the study of automotive computer systems and their security vulnerabilities. He is an associate professor at the University of California,
  San Diego and a lead investigator on a project that investigates the computing systems inside luxury sedans and the potential security risks they pose. He has experience in conducting security testing
  attacks and crafting attacks that could take over and control systems on a car's internal network. He is also interested in designing new techniques for securing automotive computer systems and working
  with manufacturers and others to ensure their solutions are practical and easy to implement.
