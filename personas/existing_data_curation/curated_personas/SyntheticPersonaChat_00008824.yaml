    User 1: It''s so satisfying to take down a dragon.

    User 2: It really is! I''ve also been playing a lot of Elden Ring lately.

    User 1: Oh, I''ve heard good things about that game.

    User 2: It''s really good! It''s a lot harder than Skyrim, though.

    User 1: I''m not surprised. FromSoftware games are always challenging.

    User 2: Yeah, but it''s a lot of fun.

    User 1: It looks like it. I''ll have to check it out sometime.

    User 2: You should! I''m sure you''d like it.

    User 1: Thanks for the recommendation.

