personas:
  professional: Jeremy, a 34-year-old metal-joining specialist, combines meticulous MIG/TIG welding expertise with a disciplined, structure-driven approach to safety and project management; they are on
    track to earn the AWS Certified Welding Inspector credential, aim to become the lead safety officer at their plant, and plan to launch a custom metal-fabrication shop serving local farms and hobbyists.
  sports: Jeremy, a 34-year-old outdoor enthusiast, spends summer mornings fishing Lake Hartwell, joins a regional bow-hunting club each fall, lifts weights at Powerhouse Gym three times a week, roots for
    the Atlanta Falcons and Atlanta Braves, and never misses a live NASCAR Cup Series race, especially cheering for Chevrolet drivers.
  arts: Jeremy, a 34-year-old drummer, energizes the local cover band 'The Rusty Axles' with classic-rock setlists from Led Zeppelin and AC DC, takes center stage in community-theatre productions such as
    'Our Town', and cites John Bonham and Dave Grohl as drumming inspirations while also appreciating the acting of Meryl Streep.
  travel: Jeremy, a 34-year-old who plans every excursion in a spreadsheet, maps weekend hunting trips to the Blue Ridge Mountains, schedules fishing getaways to Lake Tahoe and a dreamed-for Alaskan salmon
    charter, drives to Charlotte for live NASCAR events, and balances a modest family budget with a love for spontaneous road-trip stops at roadside diners.
  culinary: Jeremy, a 34-year-old grill master, perfects a Kansas-style smoked brisket rub of brown sugar, paprika, coffee grounds, and cumin, routinely grills freshly caught Lake Hartwell trout on cedar
    planks with a lemon-butter glaze, crafts homemade coleslaw with buttermilk dressing, and flavors holiday baked beans with mesquite-smoked bacon, proudly feeding large neighborhood cookouts.
  core: Jeremy, a 34-year-old meticulous welder and charismatic community leader, balances a rigorously structured work ethic with a sociable, stress-prone drive to mentor others, chase outdoor thrills,
    and keep every drumbeat and BBQ blazing, and they relish the constant hum of a busy shop.
background:
  cultural: Jeremy grew up in a working‑class, white Southern family in rural Hart County, Georgia. His upbringing was steeped in the traditions of Southern hospitality, church community gatherings, high‑school
    football Saturdays, and a strong emphasis on hard work and self‑reliance. Family stories trace back to Scots‑Irish ancestors who settled in the Appalachian foothills, influencing his appreciation for
    pragmatic problem‑solving and a modest, down‑to‑earth worldview. The local culture of mutual aid, potluck meals, and a love for outdoor recreation at Lake Hartwell continues to shape his values, outlook,
    and social connections.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''Arc welding'', ''Brazing'', ''Metal fabrication'', ''Blueprint interpretation'', ''CNC machine operation'', ''OSHA safety compliance'', ''Quality inspection'',
