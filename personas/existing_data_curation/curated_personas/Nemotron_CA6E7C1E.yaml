  hobbies: '[''Fishing on Lake Hartwell'', ''Hunting'', ''Auto restoration'', ''Woodworking'', ''Playing drums in a local cover band'', ''Barbecue cooking'', ''Weightlifting'', ''Volunteer youth mentoring'',
    ''Participating in community theater'', ''Attending NASCAR events'']'
  career_goals: Jeremy aims to attain the AWS Certified Welding Inspector (CWI) credential within the next two years and to become the lead safety officer at his current plant, leveraging his organized
    approach to eliminate workplace injuries. In the longer term he plans to launch a small custom metal‑fabrication shop serving local farms, construction firms, and hobbyists, positioning himself as a
    sought‑after speaker at regional trade shows and a mentor for the next generation of welders. He also hopes to secure an OSHA 30‑hour trainer certification to formalize his role in workforce development.
