personas:
  professional: Yaime Fajardo is a data‑driven UX researcher who leverages Python, R, and Tableau to translate quantitative insights into intuitive digital experiences, while their relaxed approach to deadlines
    fuels a habit of iterative prototyping and spontaneous brainstorming sessions.
  sports: Yaime Fajardo enjoys weekend hikes with the LA Hiking Club, practices yoga twice a week at a downtown studio, roots for the Los Angeles Lakers and LA Galaxy, and occasionally joins the local running
    group for early‑morning 5Ks, balancing low‑key community fitness with casual fandom.
  arts: Yaime Fajardo immerses themselves in analog photography of urban murals, draws inspiration from the kinetic installations of Philippe Parreno, the subversive street‑art of Banksy, and the emotive
    paintings of Frida Kahlo, while regularly attending opening nights for emerging LA artists such as Tiona Nekk and John Koo.
  travel: Yaime Fajardo plans trips with a sketch‑book in hand, favoring spontaneous weekend getaways to desert landscapes like Joshua Tree and culturally rich cities such as Oaxaca, while dreaming of a
    month‑long art residency in Berlin’s Kreuzberg district, balancing flexible itineraries with modest budget constraints.
  culinary: Yaime Fajardo enjoys experimenting in the kitchen, mastering dishes like chipotle‑infused carnitas tacos, avocado‑lime quinoa salads, and a deconstructed churro cheesecake, while their intermediate
    cooking skills are reflected in weekly dinner parties where they pair mezcal cocktails with artisanal cheeses.
  core: Yaime Fajardo blends analytical rigor with artistic curiosity, thriving on spontaneous projects, occasional budget oversights, yoga‑infused stress relief, and a penchant for late‑night analog photo
    walks.
background:
  cultural: Yaime was raised in a bicultural Mexican‑American household in Southern California, where her family preserved Mexican traditions such as Día de los Muertos celebrations, regional cuisine, and
    Spanish language use, while also embracing the diverse, multicultural environment of Los Angeles. Exposure to Mexican folk art and contemporary American creative scenes fostered her deep appreciation
    for visual storytelling and community‑oriented projects. Her identity blends the warmth, collectivism, and rich cultural heritage of Mexico with the independent, innovative spirit of the Southern California
    art and tech communities.
attributes:
  skills: '["Python programming", "R statistical analysis", "Data visualization (Tableau, PowerBI)", "Experimental design", "Quantitative research", "Laboratory techniques", "Project coordination", "Digital
    illustration", "Analog photography", "Basic UX prototyping", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Street‑art exploration", "Analog photography", "Gallery visits", "DIY kinetic sculpture with Arduino", "Online multimedia coding courses", "Reading contemporary art theory", "Cooking traditional
    Mexican cuisine", "Mindful walking and yoga", "Volunteer teaching coding", "Small‑group book club discussions"]'
  career_goals: Yaime aims to re‑enter the professional arena within the next two years, targeting roles that fuse her analytical background with her artistic curiosity, such as a data‑driven UX researcher,
    a creative technologist for cultural institutions, or a freelance consultant designing interactive installations. She seeks flexible, remote or hybrid positions that honor work‑life balance and allow
    continued personal projects. In the longer term, she aspires to launch a community‑focused platform that leverages technology to celebrate Mexican cultural heritage and promote sustainable local art
    initiatives.
