  career_goals: Although retired from formal employment, Loida remains driven by personal growth and community contribution. She aspires to curate a traveling exhibition of Mexican-American folk art displayed
    in local libraries and senior centers. She wishes to author a memoir that interweaves her childhood memories in Mexico with her immigrant experience in California, and hopes to publish a small collection
    of poems inspired by Mexican folklore. Loida also aims to deepen her digital literacy to create an online archive of her family’s genealogy for future generations. She is committed to volunteering as
    a mentor for young artists, offering workshops that blend abstract concepts with cultural storytelling. Finally, she seeks to cultivate emotional resilience through mindfulness practice and support
    groups, reducing anxiety and enhancing well‑being.
