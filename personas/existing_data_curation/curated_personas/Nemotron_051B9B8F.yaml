  career_goals: She aims to leverage her education background to transition into a role that combines teaching and community outreach, such as a substitute teacher, after‑school program coordinator, or
    community education liaison in the Mesa County School District. To achieve this, she plans to complete a state teaching credential and obtain certification in early childhood education. Simultaneously,
    she seeks a supervisory position in retail, like shift manager, to gain leadership experience and financial stability while she completes her certification. Over the next five years, she envisions herself
    either leading a classroom or directing educational programs that connect local schools with civic resources, thereby merging her practical retail experience with her passion for learning.
