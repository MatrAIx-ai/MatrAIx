personas:
  professional: Lois Park, a seasoned biomedical engineer famed for bridging tissue engineering, biomaterials development, and low‑cost medical device prototyping, leverages computational modeling, FDA
    regulatory expertise, and a relaxed, collaborative style to turn community health challenges into art‑inspired solutions.
  sports: Lois Park sails with the Crestview Sailing Association on Choctawhatchee Bay, competes in local regattas, supports the Tampa Bay Buccaneers and Jacksonville Jaguars on game days, and joins a seasonal
    beach volleyball league at the Gulf Coast community center.
  arts: Lois Park spends afternoons watercoloring marine life inspired by Claude Monet’s seascapes, regularly attends performances of classic plays at the Crestview Community Theater, explores contemporary
    installations by Maya Lin at the Pensacola Museum of Art, and channels that aesthetic energy into DIY bio‑hack projects at the local maker space.
  travel: Lois Park favors low‑key sailing expeditions to the Florida Keys, cultural immersion trips to the Amalfi Coast for Mediterranean culinary inspiration, and short road trips to the Everglades National
    Park, planning most getaways with flexible itineraries that accommodate volunteer health‑fair stops and their modest nonprofit budget.
  culinary: Lois Park enjoys experimenting with Mediterranean dishes such as grilled sardines with lemon‑capers, ratatouille, and spinach‑and‑feta spanakopita, relies on fresh basil, olive oil, eggplant,
    and saffron from their own garden, and exhibits an intermediate cooking skill that blends scientific precision with artistic plating.
  core: Lois Park blends scientific rigor with artistic flair, turning community health challenges into colorful, low‑cost solutions while sailing through life with casual calm and a side of mild disorganization.
background:
  cultural: Lois is a White American raised in the southeastern United States, with roots in a small town near the Florida‑Alabama border. Her upbringing was shaped by Southern hospitality, strong community
    ties, and a family culture that valued gatherings, seasonal festivals, and church involvement. These traditions fostered her cooperative spirit and love for shared experiences. Living now in Crestview,
    Okaloosa County, she continues to engage with local cultural events—such as coastal seafood festivals, regional art fairs, and community service projects—while maintaining a blend of modest Mid‑South
    values and a relaxed Gulf‑Coast lifestyle.
