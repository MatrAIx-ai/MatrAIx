  hobbies: '[''Watercolor painting'', ''Sailing'', ''Volunteer health fair coordination'', ''Yoga'', ''Science fiction reading'', ''Local theater outings'', ''Gardening'', ''Cooking Mediterranean cuisine'',
    ''Attending art museums'', ''Maker space tinkering'']'
  career_goals: Driven by curiosity and a desire to help others, Lois aims to lead a cross‑disciplinary team that creates affordable, user‑friendly medical devices for underserved populations in the Gulf
    Coast region. She envisions integrating artistic design principles to improve patient experience and device usability. Over the next decade, she hopes to become a recognized thought leader in humanitarian
    biomedical engineering, launch a nonprofit that bridges engineering with community health education, and mentor the next generation of compassionate engineers.
