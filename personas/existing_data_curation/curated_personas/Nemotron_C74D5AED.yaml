  career_goals: Although retired from full‑time driving, Zhenya aims to leave a lasting legacy by formalizing best‑practice safety protocols for the school district, serving on the transportation advisory
    board, and creating an oral‑history archive of her experiences for future drivers. She also seeks to mentor a small group of younger bus operators, ensuring they inherit her high standards of discipline
    and reliability while staying engaged in her community through occasional part‑time driving shifts.
