personas:
  professional: A budding kindergarten 'little architect' named Joanne Mercadel loves building block towers, practices patience and organization, and displays a surprisingly practical approach to their
    pretend construction projects, always following step‑by‑step instructions, insisting on tidy layouts, and ensuring that they finish each build before moving on.
  sports: A tiny soccer enthusiast named Joanne Mercadel plays on the 'Little Lions' T‑ball league, idolizes the local professional baseball team the River City Raptors, spends Saturday mornings practicing
    dribbling drills with a bright orange ball, prefers structured practice over free‑play games, and sometimes resists joining big group tag games, reflecting their reserved nature and demonstrating that
    they value routine.
  arts: A budding storyteller named Joanne Mercadel adores watching animated classics like 'Moana' and 'Frozen', sings along to the catchy tunes of Disney Princesses, spends afternoons drawing whimsical
    animals in a sketchbook, often mimicking the style of children's author Dr. Seuss, and lets music and illustration shape their quiet imagination, which they nurture through daily play.
  travel: A small‑world explorer named Joanne Mercadel loves family road trips to the nearby beach at Clearwater Cove, dreams of visiting the magical castles of Disneyland in California, prefers meticulously
    planned itineraries with picture books of each stop, balances the excitement of adventure with the comfort of familiar routines, and often asks their parents to count down the days on a calendar, showing
    that they cherish both structure and wonder.
  culinary: A young food adventurer named Joanne Mercadel delights in crunchy chicken nuggets, creamy mac and cheese, strawberry‑banana smoothies, eagerly helps stir batter for pancake mornings, insists
    on adding a dash of cinnamon to apple slices, enjoys the confidence of cooking while occasionally demanding extra ketchup, and they proudly present their creations to family members.
  core: Joanne Mercadel is a five‑year‑old who blends a love for tidy routines, careful saving, and vivid imagination into a uniquely organized yet playful outlook on life, complete with occasional sticker‑splurges
    and a stubborn refusal to share the last cookie, showing how they balance order and whimsy.
background:
  cultural: Joanne is a Black child raised in Channelview, Texas, within a close‑knit African American family that values community, faith, and cultural heritage. She participates in local church events,
    celebrates Juneteenth and family holidays with soul‑food meals, and is exposed to a blend of Southern Black traditions, contemporary music, and the diverse cultural tapestry of the Greater Houston area.
    These influences shape her sense of identity, resilience, and appreciation for collaborative community life.
attributes:
  skills: '[''following daily routines'', ''recognizing letters A‑Z'', ''basic counting (1‑20)'', ''drawing shapes within lines'', ''organizing toys and personal items'', ''cooperative play and turn‑taking'',
    ''using educational tablet apps'', ''simple block building and problem solving'', ''self‑help skills (tying shoes, dressing)'', ''listening and responding to storytime instructions'']'
  hobbies: '[''drawing and coloring'', ''building with blocks (Legos, wooden blocks)'', ''reading picture books'', ''singing and dancing to children’s songs'', ''small group playdates'', ''solving puzzles'',
    ''watching educational videos'', ''helping with simple cooking tasks'', ''nature walks with family'', ''attending Sunday school activities'']'
  career_goals: Even at five, Joanne often shares that she wants to become a teacher or librarian because she enjoys organized environments where she can help others learn. She also loves animals and imagines
    being a veterinarian. Her ambitions reflect a desire for structured, caring roles where she can support her community.
