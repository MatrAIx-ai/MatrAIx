personas:
  professional: Myle Koh, a 2‑year‑old budding architect-in‑training, displays an early knack for organized, methodical play with building bricks, turning every block into a miniature blueprint while quietly
    observing peers with a skeptical eye.
  sports: Myle Koh, a 2‑year‑old enrolled in the KidFit Tumble Time gymnastics program, loves watching the local professional baseball team the Harbor Hawks and eagerly mimics their celebratory gestures
    while arranging toy athletes in perfect line‑ups during play.
  arts: Myle Koh, a 2‑year‑old who delights in bright crayons and the melodic tunes of Disney’s “Let It Go” performed by Idina Menzel, spends quiet afternoons drawing abstract shapes while humming along
    to The Wiggles, shaping an early appreciation for visual and auditory art.
  travel: Myle Koh, a 2‑year‑old who has explored the city’s botanical garden and taken a weekend ferry trip to Seaside Island, dreams of one day seeing the towering redwoods of California and the lantern‑lit
    streets of Kyoto.
  culinary: Myle Koh, a 2‑year‑old with a burgeoning palate, prefers soft banana slices, mild avocado toast, and occasional spaghetti with tomato sauce, but stubbornly refuses peas, claiming they are “tiny
    green rocks.”
  core: Myle Koh, a 2‑year‑old curious explorer with an organized play style, prefers quiet corners, questions strangers’ motives, and can be stubbornly brilliant when assembling blocks, yet remains emotionally
    steady through diaper changes.
background:
  cultural: Myle is of East Asian descent, with her family preserving traditions such as celebrating Lunar New Year, preparing heritage dishes, and speaking a native language at home (e.g., Mandarin or
    Korean). Growing up in Kalaheo, Kauai, she also embraces Hawaiian cultural influences—participating in local festivals, enjoying island foods like poke and fresh fruit, and spending time outdoors in
    nature. This blend of East Asian roots and Hawaiian island life shapes her values, encouraging openness to varied experiences while maintaining deep family customs.
