persona_description: Betty Edwards, an artist, teacher, and author known for her groundbreaking work on the use of the right brain in drawing and art education. She is a well-known figure in the art world
  and has had a significant impact on the field of art education. Edwards is particularly well-known for her book "Drawing on the Right Side of the Brain," which has been widely adopted and taught in art
  schools around the world. Her method of teaching and drawing is based on the idea that the brain has two ways of perceiving and processing reality, and that the visual and perceptual mode is the dominant
  one. Edwards is also known for her work on the theory of drawing and its relationship to brain function, and for her business consulting work with major corporations to enhance creative problem-solving.
