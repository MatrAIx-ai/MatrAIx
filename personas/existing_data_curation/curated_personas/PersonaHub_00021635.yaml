persona_description: A researcher or observer of urban economies in Papua New Guinea, particularly interested in the economic empowerment of women and the role of small market stalls in their communities.
  This person has conducted fieldwork in Port Moresby and is familiar with the local economic landscape and social dynamics. They are interested in understanding how women's economic engagement is shaped
  by factors such as access to land, family dynamics, and the informal sector. This person is also aware of the potential implications of economic activities on law and order in urban areas.
