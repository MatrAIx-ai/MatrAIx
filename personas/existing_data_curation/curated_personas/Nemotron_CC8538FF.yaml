  hobbies: '[''Sketching'', ''Watercolor Painting'', ''Visiting Art Galleries'', ''Live Music'', ''Reading Contemporary Fiction'', ''Reading Poetry'', ''Psychology & Mindfulness Books'', ''Yoga'', ''Meditation'',
    ''Hiking'', ''Herb Gardening'', ''Volunteering at Library'', ''Leading Reading Groups'', ''Craft Workshops'']'
  career_goals: Jossie aspires to blend her passion for education and the arts by transitioning into a role as an arts education coordinator or community outreach educator, ideally within a local museum
    or cultural center. She plans to obtain a teaching certification or a master's degree in education with a focus on arts integration, while also pursuing a supervisory position in retail to develop leadership
    experience. Long‑term, she hopes to design and deliver inclusive art workshops for youth and adults, and eventually launch a small community art studio that provides a safe, creative space and mental‑health
    support for people coping with anxiety.
