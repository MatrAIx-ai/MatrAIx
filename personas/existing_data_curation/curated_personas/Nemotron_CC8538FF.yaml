personas:
  professional: An aspiring arts education coordinator, Jossie Tumbleston leverages a blend of customer-service acumen, cash-handling precision, and a refined eye for visual arts to design inclusive workshops,
    while their curiosity and occasional anxiety drive meticulous planning tempered by spontaneous creative problem-solving, and they consistently seek to balance structure with flexibility.
  sports: A weekend hiker and club runner, Jossie Tumbleston runs with the Harbor Trails Running Club, follows New England Revolution soccer and Boston Red Sox baseball games, and supplements cardio with
    regular yoga sessions at a local studio, and they often schedule trail hikes to unwind after a busy week.
  arts: A dedicated arts enthusiast, Jossie Tumbleston frequently visits Portland’s galleries, sketches New England shorelines in watercolor, admires the work of Julie Mehretu and Georgia O’Keeffe, and
    enjoys live indie-folk concerts by Bon Iver as well as local poetry readings at community cafés, and they regularly incorporate artistic observation into their community workshops.
  travel: An intentional traveler, Jossie Tumbleston prefers low-key weekend getaways to the White Mountains or Cape Cod, meticulously plans trips using off-season flight deals, dreams of studying Renaissance
    art in Florence, yet balances travel aspirations with a modest budget and community commitments, and they often document each journey in hand‑bound journals.
  culinary: A modest home cook, Jossie Tumbleston loves crafting herb-infused dishes like lemon-basil pasta, simmering classic New England clam chowder with fresh thyme, and skillfully brewing rosemary-pepper
    olive oil for seasonal salads, and they frequently experiment with fresh herbs from their own garden.
  core: Jossie Tumbleston blends an art-centered educational vision with meticulous budgeting, channeling high emotional sensitivity into community-focused creativity while grappling with occasional anxiety-driven
    perfectionism, and they continuously seek balance between professional ambition and personal wellbeing.
background:
  cultural: Jossie grew up in a middle‑class, predominantly white New England family in the suburbs of Connecticut. Her upbringing emphasized the value of education, community involvement, and self‑reliance,
    reflecting the regional cultural norms of modesty, independence, and appreciation for the natural environment. She was raised with a blend of traditional New England values and contemporary liberal
    attitudes, which fostered an openness to diverse ideas while maintaining a strong sense of local identity. The proximity to historic towns, coastal scenery, and a vibrant small‑town arts scene in Middlesex
    County has shaped her appreciation for cultural heritage, public art, and community‑based initiatives.
attributes:
  skills: '[''Customer Service'', ''Cash Handling'', ''POS System Operation'', ''Basic Accounting'', ''Inventory Management'', ''Conflict Resolution'', ''Instructional Design'', ''Tutoring'', ''Art Appreciation'',
