  career_goals: Now retired, Chunghee aims to channel his extensive engineering experience into mentorship and volunteer work. He aspires to mentor young engineers and high‑school students in STEM through
    local after‑school programs, serve as a technical advisor for community non‑profits, and help develop accessible technology curricula for senior learners. Additionally, he hopes to contribute his organizational
    strengths to Korean‑American cultural organizations, facilitating events that blend tradition with modern innovation.
