personas:
  professional: Brae Duffy, a 17‑year‑old aspiring marketer, blends her knack for event coordination and savvy social‑media graphics with a pragmatic, structured approach to her GED studies and community‑college
    marketing coursework, while cautiously building a reputation for reliability in local venue gigs despite her competitive streak and occasional disorganization.
  sports: Brae Duffy plays midfielder for the local youth soccer club, cheers on the LA Galaxy and the New York Knicks, organizes weekend hiking trips to the Blue Ridge Mountains, and participates in casual
    intramural tennis matches for the sheer thrill of competition.
  arts: Brae Duffy regularly headlines improv nights at the Downtown Community Theater, crafts quirky TikTok edits set to Billie Eilish's 'Bad Guy' and Tame Impala's 'The Less I Know The Better,' and frequents
    live shows at The Blue Note, where she absorbs the energy of indie rock acts like The Strokes and rising pop star Olivia Rodrigo.
  travel: Brae Duffy’s travel style mixes impulsive weekend road trips to Asheville’s mountain trails with a bucket‑list dream of attending Coachella in California and exploring the street‑art districts
    of Berlin, planning most outings on‑the‑fly in group chats while keeping an eye on her limited teenage budget.
  culinary: Brae Duffy experiments with quick‑cook dishes like TikTok’s viral feta pasta, spicy ramen bowls, and midnight avocado toast, often improvising with pantry staples like canned beans and frozen
    veggies while proudly perfecting a signature 'cloud bread' that she shares on her TikTok feed.
  core: Brae Duffy is a socially driven, competition‑fueled teen who can flawlessly coordinate a karaoke night yet forgets to submit her GED homework, thriving on spontaneous group fun while juggling a
    skeptical eye toward strangers.
background:
  cultural: Brae was raised in Liverpool, a suburban community in Onondaga County near Syracuse, New York. Her family comes from a predominantly white, middle‑class background, blending mainstream American
    customs with occasional Irish heritage celebrations that reflect the region’s historic immigrant roots. Growing up in upstate New York, she has been shaped by a close‑knit community that values a practical
    work ethic, seasonal outdoor activities like snow‑related sports and summer hikes, and a strong appreciation for local music scenes and high‑school athletics. These influences contribute to her sociable,
    competitive, and adaptable personality.
