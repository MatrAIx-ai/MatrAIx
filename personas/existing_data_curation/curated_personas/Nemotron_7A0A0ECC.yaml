  career_goals: In the short term, Brae plans to obtain her GED within the next year and enroll in a community college program focused on marketing and hospitality management. She aims to secure an entry‑level
    role at a local venue or retail establishment where she can apply her event‑planning and social‑media skills while building a reputation for reliability and authenticity, reflecting her cautious approach
    to trust. Long‑term, Brae aspires to become an event coordinator or brand manager for a regional entertainment company, leveraging her love for group activities, competitive drive, and preference for
    structured yet flexible planning to deliver memorable experiences and drive audience engagement.
