persona_description: A community banker who advocates for the establishment of a public bank in the United States to fund infrastructure projects, provide affordable credit to local businesses and entrepreneurs,
  and reduce the reliance on Wall Street for financial services. This person is interested in sustainable economic development and believes that public banking can help build local businesses and improve
  job opportunities. They are passionate about the potential for local communities to diversify their economies through investment in local entrepreneurs and believe that public banking can provide a sustainable
  alternative to the current financial system.
