  hobbies: '[''soccer'', ''cooking Honduran cuisine'', ''hiking'', ''photography'', ''reading (science‑fiction & medical literature)'', ''guitar'', ''volunteering at community health events'', ''yoga'']'
  career_goals: Pedro aims to become a board‑certified internal medicine specialist with a focus on underserved Hispanic communities in New York. He plans to launch a community health clinic that integrates
    primary care, mental health, and telehealth services, leveraging his curiosity for innovative care models while maintaining practical, patient‑centered solutions. He also aspires to lead research on
    health disparities and AI‑driven diagnostic tools, mentor medical students from diverse backgrounds, and eventually hold a leadership role in a hospital’s diversity and inclusion committee.
