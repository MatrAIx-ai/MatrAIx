personas:
  professional: Inigo Musabhay, an imaginative eight‑year‑old artist‑engineer hybrid, channels curiosity into drawing cartoons, crafting futuristic LEGO vehicles, and experimenting with watercolors, while
    their laid‑back, slightly scattered approach lets ideas flow freely without strict schedules.
  sports: Inigo Musabhay dashes around the school soccer field three times a week with the Lindsay Elementary Lions, cheers for Los Angeles FC during weekend TV marathons, and spends spare afternoons building
    soccer‑themed LEGO sets, preferring quick, energetic bursts of play over long, structured workouts.
  arts: Inigo Musabhay channels a love for graphic storytelling into drawing cartoons inspired by Stan Lee and Mo Willems, while watercolour experiments echo Frida Kahlo’s vivid palettes, and they delight
    in watching Pixar’s Coco and listening to the lively sounds of Los Lobos during family gatherings, enriching their creative identity.
  travel: Inigo Musabhay prefers spontaneous road trips with a sketchbook in hand, eagerly soaking up the towering sequoias at Yosemite and the desert vistas of the Grand Canyon, while dreaming of a future
    family vacation to Mexico City’s bustling markets to study street art and taste authentic tamales.
  culinary: Inigo Musabhay enjoys helping stir fragrant simmering tortilla soup with cumin and chili, loves making tamales with corn husks, but admits they’re terrible at remembering to clean up the kitchen,
    often leaving a trail of flour on the counter.
  core: Inigo Musabhay is a curious eight‑year‑old who blends a love for drawing, LEGO building, and community celebrations into a relaxed, slightly disorganized life that thrives on creativity and spontaneous
    adventure.
background:
  cultural: Inigo grows up in a Mexican-American household in Lindsay, California, where Spanish and English are spoken interchangeably. Family gatherings often feature traditional Mexican dishes such as
    tamales and enchiladas, and he participates in cultural celebrations like Día de los Muertos and Mexican Independence Day, where he helps set up altars and decorate with papel picado. The community
    around him is rooted in agriculture, and he occasionally sees the fields that surround the town, giving him an appreciation for the land his family and neighbors work. His parents emphasize respect
    for elders, storytelling, and a strong sense of community, values that shape his outlook and daily life.
attributes:
  skills: '[''Sketching'', ''Bilingual reading'', ''Bilingual writing'', ''LEGO construction'', ''Simple science experiments'', ''Digital drawing'', ''Spatial reasoning'']'
  hobbies: '[''Drawing'', ''Watercolor painting'', ''LEGO building'', ''Graphic novel reading'', ''Soccer'', ''Garden assistance'', ''Digital coding games'', ''Community cultural festivals'']'
  career_goals: Inigo dreams of a future where he can blend art and imagination, imagining himself as a mural painter who decorates community walls with vibrant stories, or as an illustrator for children's
    books that celebrate diverse cultures. He is also fascinated by space and occasionally talks about becoming an astronaut who draws the planets he explores. While he enjoys these big ideas, he emphasizes
    that he wants to keep his options open, saying he might try many things before deciding. He hopes to keep learning, traveling, and creating, and wishes to use his talents to bring joy to his family
    and neighborhood.
