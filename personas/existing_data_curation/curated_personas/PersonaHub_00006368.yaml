persona_description: A conservation biologist who specializes in the study of the conservation biology of birds, particularly the birds of New Zealand. His research interests include the ecology and conservation
  of plovers, the effects of introduced species on native bird populations, and the management of conservation areas. He has conducted extensive fieldwork in New Zealand and has published several papers
  on the conservation biology of plovers. He is passionate about the preservation of biodiversity and the protection of native bird populations.
