  career_goals: Sarah aims to transition into a store‑manager position within the next two years, leveraging her supervisory experience to oversee all aspects of store performance. She is passionate about
    mentoring younger retail professionals and envisions developing a company‑wide training curriculum that blends operational best practices with creative visual merchandising techniques. Long‑term, Sarah
    hopes to champion a partnership between the retailer and local arts organizations, creating pop‑up exhibitions that bring community culture into the shopping environment. If she chooses to retire from
    full‑time retail, she plans to open a small community art studio where seniors and youth can collaborate on creative projects.
