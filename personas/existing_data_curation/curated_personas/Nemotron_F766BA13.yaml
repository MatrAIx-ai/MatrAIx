personas:
  professional: Daisy Garden, an aspiring junior coder who spends afternoons mastering Scratch, entering online coding challenges, and dreaming of building an interactive story app that merges sci‑fi narratives
    with the logic they learn in school, while balancing their curiosity with a practical eye for keeping projects achievable even if their notebook is a bit chaotic.
  sports: Daisy Garden, a quiet walker who enjoys solitary jogs through Kankakee River State Park, occasionally joins the middle school cross‑country team for the occasional meet, cheers on the Chicago
    Cubs and the Chicago Bulls from home, and records nature shots while maintaining a modest step count goal in a fitness tracker, though they rarely engage in team sports.
  arts: Daisy Garden, a budding digital illustrator who fills sketchbooks with sci‑fi cityscapes and renders them on a tablet while listening to Miles Davis, Erykah Badu, and classic soul ballads, draws
    inspiration from artists like Hayao Miyazaki and the comic series "Saga," and participates in the community center’s after‑school art club where they share their work on a teen art forum, occasionally
    critiquing peers with a competitive edge.
  travel: Daisy Garden, an imaginative explorer who spends weekends hiking in Kankakee River State Park, dreams of visiting the Grand Canyon and the Smithsonian National Museum of American History in Washington,
    D.C., and hopes to experience a live jazz festival in New Orleans, preferring spontaneous road trips with family over meticulously planned itineraries, though budget constraints sometimes limit the
    distance they can travel.
  culinary: Daisy Garden, a modest home chef who loves whipping up mac and cheese topped with crisp breadcrumbs, experimenting with spicy buffalo wings for a game night, blending banana, spinach, and almond
    milk into a green smoothie, and perfecting chocolate‑chip pancakes on Saturday mornings, while often neglecting to clean the kitchen counter after cooking, leading to a stack of dishes.
  core: Daisy Garden is a curious, solitary teen coder who balances digital creativity with practical budgeting, manages mild health quirks, enjoys solo walks and quiet art, and dreams of adventurous trips
    while juggling a competitive streak and a relaxed approach to obligations.
background:
  cultural: Daisy is a Black teenager raised in Kankakee, Illinois, where her family's roots trace back to the Great Migration of African-American families seeking opportunities in the Midwest. Her parents
    emphasize the importance of education, community, and cultural pride. She attends a local middle school that celebrates Black History Month with guest speakers and projects. The local church and community
    center host after-school programs that introduce youth to STEM and the arts, which have nurtured her curiosity. Music from classic soul, jazz, and contemporary R&B fills her home, reflecting her cultural
    heritage. Growing up in a predominantly Black neighborhood, Daisy has observed the resilience and solidarity of her community, shaping her desire to give back through technology and creative expression.
attributes:
  skills: '[''Analytical thinking'', ''Critical source evaluation'', ''Basic Scratch programming'', ''Digital illustration'', ''Competitive puzzle solving'', ''Self-directed learning'']'
  hobbies: '[''Reading science-fiction novels'', ''Sketching and digital illustration'', ''Learning Scratch programming'', ''Playing single-player video games (Minecraft)'', ''Listening to jazz and R&B'',
    ''Nature photography'', ''Competitive puzzle solving (Sudoku, crosswords)'']'
  career_goals: She aspires to become a software engineer or computer scientist, aiming to design tools that address everyday challenges in her community, such as apps for local transportation, health information,
    or educational resources. Daisy wants her work to blend curiosity about emerging technologies with practical solutions that have clear, positive impacts. She hopes to earn a scholarship to a university
    with a strong STEM program, compete in hackathons, and eventually lead projects that empower other young people from similar backgrounds while maintaining independence and flexibility in her workflow.
