  career_goals: Guadalupe aims to transition into a senior software architect role where she can shape high‑level system design while maintaining a remote, quiet work environment that suits her preference
    for solitude. She plans to obtain AWS Solutions Architect and Certified Cloud Security Professional certifications to deepen her expertise in secure cloud infrastructure. In the next five years, she
    aspires to lead a small, focused engineering team, driving projects that emphasize reliability, performance, and security. Ultimately, she envisions launching her own consultancy that offers structured,
    security‑first software solutions to small businesses, leveraging her competitive drive and meticulous work ethic.
