  hobbies: '[''Visiting art galleries and museums'', ''Collecting contemporary African‑American artwork'', ''Acrylic painting'', ''Live jazz and theater performances'', ''Pick‑up basketball'', ''Trivia
    night team participation'', ''Hiking on the Connecticut River Trail'', ''Cooking international dishes'', ''Hosting dinner parties'', ''Yoga and meditation'', ''Financial‑literacy volunteering'']'
  career_goals: Lucius aims to rise to a senior leadership role—such as Director of Research or Chief Investment Officer—where he can shape firm‑wide investment strategy with an emphasis on innovative,
    impact‑driven assets, including cultural and artistic investments. He dreams of launching a boutique fund that blends traditional equity strategies with ESG and art‑market exposure, positioning it as
    a pioneer in socially responsible and culturally aware investing. Mentorship is central to his ambition; he wants to champion diversity in finance by establishing a mentorship pipeline for Black and
    underrepresented analysts. Concurrently, he seeks to cultivate a healthier work‑life balance, incorporating mindfulness practices to manage his intense emotional reactivity while maintaining high performance.
