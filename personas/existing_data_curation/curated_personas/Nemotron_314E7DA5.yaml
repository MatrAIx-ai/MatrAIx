personas:
  professional: Ronald Heaston is a budding young inventor whose curiosity fuels elaborate LEGO engineering, and they blend artwork and basic circuitry experiments from the school science club into imaginative
    prototypes, already mentoring peers on building challenges while dreaming of one day designing interactive video games.
  sports: Ronald Heaston is an energetic youngster who plays on the local youth soccer league, follows the Cleveland Browns and Guardians avidly, and they spend weekends biking along the Lake Erie shoreline
    with the Lakefront Explorers club, while also dabbling in junior kayaking lessons.
  arts: Ronald Heaston is a creative ten‑year‑old artist who sketches original fantasy characters, attends weekly watercolor workshops where they admire the works of Hayao Miyazaki and Beatrix Potter, and
    they eagerly collect limited‑edition comic books featuring artists like Jim Lee and Mike Mignola.
  travel: Ronald Heaston is an adventurous ten‑year‑old who loves exploring the lakeside trails around Sandusky, dreams of visiting Niagara Falls and the Great Smoky Mountains, and they plan family trips
    with detailed maps and sticky notes, yet they prefer short drives over long flights due to school schedule.
  culinary: Ronald Heaston is a budding food explorer who prefers pizza topped with extra cheese, devours strawberry yogurt for snack, can whisk together simple peanut butter banana sandwiches, and they
    delight in decorating cupcakes with themed frosting inspired by their favorite Minecraft biomes.
  core: Ronald Heaston is a curious, art‑loving ten‑year‑old who balances meticulous LEGO constructions with occasional procrastination on homework, runs a secret stash of shell collections, and they constantly
    juggle imagination with the pull of screen time.
background:
  cultural: Ronald is raised in a middle‑class white family in Lorain, Ohio, a city with a mix of industrial history and vibrant lake‑front community life. His upbringing reflects typical Midwestern values
    of politeness, modesty, and community involvement. He celebrates holidays such as Thanksgiving and Christmas with family gatherings, enjoys local traditions like the Lorain Art Festival, and follows
    regional sports teams. The diverse cultural offerings of nearby Cleveland and the Lake Erie shoreline have broadened his appreciation for art, music, and nature.
attributes:
  skills: '[''sketching and illustration'', ''basic Scratch programming'', ''simple science experiments'', ''organization of school supplies'', ''team collaboration'', ''peer mediation and empathy'']'
  hobbies: '[''drawing and sketching'', ''reading adventure novels'', ''building LEGO sets'', ''exploring nature trails'', ''playing Minecraft'', ''attending weekend art workshops'', ''participating in
    school science club'']'
  career_goals: Ronald dreams of combining his love for art and technology to become an innovative product designer or a multimedia artist. He hopes to attend a high school with strong STEM and arts programs,
    eventually studying industrial design or animation. He also wishes to give back to his community by leading youth art workshops in Lorain, fostering creativity in other kids.
