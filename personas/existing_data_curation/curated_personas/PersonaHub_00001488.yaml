persona_description: A team of professionals who collaborate with the Cowlitz Indian Tribe to restore a tidal wetland complex on the Wallooskee and Youngs Rivers. They include civil and geotechnical engineers,
  wetland scientists, and staff from Bonneville Power Authority, the Oregon Department of Fish and Wildlife, the National Marine Fisheries Service, and the Army Corps of Engineers. The team is responsible
  for the design, construction, and permitting of the restoration project, which includes excavating backwater channels, breaching levees, removing tide gates, installing a sheet pile wall, and adding large
  woody debris habitat complexity. The restoration project is aimed at restoring almost 200 acres of agricultural land to a tidal wetland complex, which is a unique and important ecological area that provides
  habitat for a variety of species.
