personas:
  professional: Josefina Morales, an aspiring teen muralist and visual storyteller, blends a love for street art, photography, and strategic problem‑solving into sketching large‑scale community murals,
    while their relaxed, disorganized approach fuels spontaneous creativity and their competitive edge pushes them to experiment with bold, unconventional designs.
  sports: Josefina Morales, a casual urban runner and avid supporter of the Portland Trail Blazers and the Seattle Sounders FC, joins a Saturday street‑ball pick‑up game at the local park, prefers walking
    the city’s murals for fitness, and uses a fitness tracker to log steps, though they often forget to stretch after sessions.
  arts: Josefina Morales, a passionate street‑art enthusiast, spends weekends sketching large‑scale mural concepts inspired by Banksy, Shepard Fairey, and local graffiti legends, curates an ever‑growing
    vinyl collection that includes indie artists like Mitski, Arctic Monkeys, and world‑music icons such as Buena Vista Social Club, and reviews each vinyl’s cover art before listening, reflecting a deep
    intertwining of visual and auditory creativity.
  travel: Josefina Morales, an adventurous teen with a love for vibrant cityscapes, dreams of exploring Berlin’s East Side Gallery, the colorful street‑art lanes of Valparaíso, Chile, and the neon‑lit streets
    of Tokyo, but currently saves pocket money for a school‑organized field trip to New York City’s Museum of Modern Art, balancing a limited family budget with a desire for cultural immersion.
  culinary: Josefina Morales, an experimental home‑cook at fifteen, enjoys refining traditional family recipes such as slow‑cooked pork with chilies, corn‑based tamales, and spiced rice with panela, often
    pairing these dishes with fresh cilantro, lime, and roasted pumpkin seeds, while also challenging themselves to recreate the complex flavors of mole verde and savoring the process as a creative outlet.
  core: Josefina Morales is a curious, slightly disorganized teen who channels a competitive spark into street‑art murals, strategic gaming, and culinary experiments, while wrestling with daily worries
    that both fuel their vivid creativity and spark occasional bouts of procrastination.
background:
  cultural: Josefina is a first‑generation Guatemalan‑American who grew up in a bilingual household in San Bernardino, California. Her family preserves Guatemalan traditions such as celebrating Día de los
    Muertos, cooking dishes like pepián and tamales, and listening to marimba music, while also navigating typical American teenage life. This blend of cultures gives her a rich perspective that informs
    her artistic voice and her desire to represent immigrant experiences in her work.
