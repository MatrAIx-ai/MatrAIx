  career_goals: Josefina aspires to become a professional visual artist or graphic designer who uses her work to highlight social and cultural stories, especially those of the Guatemalan diaspora. She aims
    to secure a scholarship to a reputable art college, win youth art competitions, and eventually open a studio that offers workshops for under‑represented youth. Her competitive drive pushes her to build
    a strong portfolio and network within the creative industry while maintaining the flexibility to explore unconventional projects.
