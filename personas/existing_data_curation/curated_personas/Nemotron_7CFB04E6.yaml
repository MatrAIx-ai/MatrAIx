  career_goals: Lilyan dreams of attending a specialized art high school or a future college program in graphic design or visual arts, hoping to blend her love for creativity with her sociable nature. She
    envisions working as a freelance digital illustrator or a content creator who produces engaging visual stories and tutorials. Long-term, she hopes to lead community art workshops in her hometown, using
    art to inspire peers and celebrate local culture. She also keeps an open mind about exploring careers in media production or museum education.
