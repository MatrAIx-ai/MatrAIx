personas:
  professional: An aspiring visual storyteller, Lilyan Rosario blends sketching, ukulele accompaniment, and quick‑cut video edits to create short narrative clips for friends, channeling their curiosity
    and love of unconventional ideas while thriving in the collaborative, flexible environment of the community art club and high school drama rehearsals.
  sports: An enthusiastic outdoor enthusiast, Lilyan Rosario hikes the Appalachian trails with the local Youth Trail Club, occasionally joins the community center’s recreational soccer team (the Townsville
    Tigers), roots for the Carolina Panthers and the NC State Wolfpack, and prefers low‑key, flexible fitness routines over rigid training schedules.
  arts: An engaged creative, Lilyan Rosario spends afternoons sketching river landscapes while listening to Bon Iver and Fleet Foxes, plays ukulele to Joni Mitchell tunes during drama rehearsals, curates
    short fan‑fiction videos inspired by the visual storytelling of Studio Ghibli’s Hayao Miyazaki, and draws inspiration from the raw lyricism of indie artists like Phoebe Bridgers.
  travel: An impromptu explorer, Lilyan Rosario frequently embarks on weekend hikes to nearby Great Smoky Mountains National Park, has visited Asheville’s Biltmore Estate and Washington D.C.’s museums,
    dreams of backpacking through Iceland’s volcanic trails, and plans trips with minimal itineraries, relying on spontaneity and friends’ suggestions rather than strict schedules.
  culinary: A kitchen novice with a penchant for comfort foods, Lilyan Rosario often recreates avocado toast topped with fresh basil and feta, whips up quick ramen bowls flavored with sriracha and ginger,
    enjoys experimental pizza toppings like arugula and prosciutto at the local pizzeria, and treats herself to seasonal pumpkin soup during autumn fairs.
  core: Lilyan Rosario is a curious, spontaneous teen who fuses sketching, ukulele jams, and quick video edits into a vibrant creative life, even if they misplace sketchbooks, procrastinate on homework,
    and occasionally stay up too late on editing projects.
background:
  cultural: Lilyan grew up in Chester, a small town in Hancock County, West Virginia, within a predominantly white community that values close-knit family ties and local traditions. Her family participates
    in church gatherings, county fairs, and seasonal events that celebrate the region's Appalachian heritage, such as bluegrass music and handcrafted arts. While she respects these customs, Lilyan's curious
    nature leads her to explore contemporary pop culture, global art trends, and digital media, creating a blend of traditional community values with modern, eclectic interests.
