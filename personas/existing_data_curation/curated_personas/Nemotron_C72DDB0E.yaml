  career_goals: At 88, Ola’s ambitions are centered on maintaining her health, independence, and the transmission of her life stories to younger relatives and the broader community. She aims to complete
    a handwritten memoir of her family’s history, digitize and donate old photographs to the Clatsop County Historical Society, and continue her volunteer role at the senior center where she mentors new
    volunteers. Keeping her garden productive and learning a new craft such as pottery are personal growth goals. She also hopes to support the local library’s oral‑history project by sharing recollections
    of Nehalem’s mid‑20th‑century life.
