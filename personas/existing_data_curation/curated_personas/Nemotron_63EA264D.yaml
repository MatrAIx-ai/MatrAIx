  career_goals: Although satisfied with his current role, Jesse aims to move into a supervisory or facilities-management position within the next five years. He plans to earn the Certified Professional
    Cleaner (CPC) credential and the Building Service Technician certification to formalize his expertise. His ambition includes introducing more sustainable cleaning protocols at his workplace, reducing
    chemical waste, and mentoring younger custodial staff to uphold high standards of organization and safety. In the longer term, he entertains the idea of starting a small, environmentally-focused cleaning
    consultancy that serves local businesses and schools in the Norfolk area.
