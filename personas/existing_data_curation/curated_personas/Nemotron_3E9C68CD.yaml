personas:
  professional: A veteran wildlife caretaker, Diana Tinoco blends three decades of hands‑on rehabilitation experience with a curious yet practical mindset, designing enriched habitats, delivering first‑aid
    and species‑specific nutrition, and translating complex animal‑care concepts into bilingual workshops for local schools, and they thrive on hands‑on problem solving.
  sports: Diana Tinoco enjoys low‑impact fitness through weekend hikes in the foothills around Wofford Heights, bird‑watching walks with the Kern County Trails Club, cheering on the Los Angeles Dodgers,
    and occasional community yoga sessions to stay limber, and they find these activities both calming and energizing.
  arts: Diana Tinoco finds artistic fulfillment in weekly salsa dancing at the local community center, listening to folk legends like Joan Baez and corrido groups such as Los Tigres del Norte, and capturing
    hummingbirds on camera inspired by Ansel Adams’ nature photography, and they view each creative outlet as a way to connect with community and nature.
  travel: Diana Tinoco prefers thoughtful road trips to desert marvels like Joshua Tree and the star‑filled skies of Sedona, occasional cultural visits to Mexico’s Yucatán Peninsula, planning journeys around
    volunteer commitments and a modest budget, all while they delight in nighttime stargazing under clear skies.
  culinary: Diana Tinoco often cooks mole, tamales, and pozole using chilies (ancho, guajillo), masa, chocolate, and fresh garden herbs, mastering the molcajete, pairing dishes with tomatillo salsa, and
    they occasionally indulge in extra dulce de leche desserts after a long day of care work.
  core: Diana Tinoco is a curious, hands‑on wildlife caretaker who balances practical animal care with spontaneous gardening, salsa dancing, and a relaxed approach to finances, all while they gently juggle
    retirement planning and occasional disorganization.
background:
  cultural: Diana was born in the Central Valley to Mexican immigrant parents and grew up bilingual, navigating both Mexican traditions and the broader Californian context. She maintains strong ties to
    her heritage through celebrations like Día de los Muertos, where she builds altars with photos of ancestors and offers seasonal foods. Family gatherings often revolve around cooking and sharing homemade
    tamales and mole, a ritual that reinforces community bonds. Diana participates in local Mexican festivals in Bakersfield, such as the annual Fiesta de la Virgen, and she incorporates indigenous reverence
    for animals into her caretaking philosophy, viewing wildlife as spiritual kin. While fully integrated into the rural lifestyle of Kern County, she blends Mexican culinary, musical, and communal values
    with the practical, outdoors‑oriented culture of Southern California.
attributes:
  skills: '["Animal husbandry and daily care", "Veterinary first aid and emergency stabilization", "Wildlife rehabilitation protocols", "Species‑specific dietary formulation", "Habitat enrichment and enclosure
    design", "Behavioral observation and stress assessment", "Bilingual communication (Spanish/English) for outreach", "Basic record‑keeping and data management", "Community education program facilitation",
    "Basic horticulture for habitat creation"]'
  hobbies: '["Native plant gardening", "Hiking and bird‑watching", "Cooking traditional Mexican cuisine", "Salsa dancing", "Listening to folk and corridos music", "Reading nature biographies and documentaries",
    "Volunteering at a food bank", "Woodcraft and DIY home décor", "Stargazing"]'
  career_goals: Diana aims to earn a Certified Wildlife Rehabilitator credential within the next two years and to become the lead caretaker for a regional wildlife rescue network in Kern County. She envisions
    developing a community‑focused animal‑care curriculum that integrates local schools and senior centers, fostering intergenerational learning. Over the longer term, she dreams of establishing a modest
    nonprofit sanctuary dedicated to native desert mammals and birds, where she can mentor younger caretakers and promote culturally resonant conservation practices rooted in both Mexican and Californian
    traditions. Financial stability and a sustainable retirement plan are also important pillars of her ambitions, especially given her separated status.
