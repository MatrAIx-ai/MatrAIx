personas:
  professional: Stephanie Plageman, a 13‑year‑old aspiring naturalist, channels her curiosity and practicality into science club projects on local ecosystems, balancing meticulous data logs with spontaneous
    field sketches.
  sports: Stephanie Plageman follows the Tennessee Titans and Nashville Predators on television, participates in a local middle school hiking club that meets on weekends for trail runs in the Great Smoky
    Mountains, and volunteers as a bird‑watching guide during community nature events.
  arts: Stephanie Plageman draws inspiration from fantasy authors like Patrick Rothfuss and nature illustrators such as John James Audubon, strums acoustic renditions of Joni Mitchell and Bon Iver for personal
    relaxation, and regularly contributes hand‑drawn sketches of native wildflowers to the school art board.
  travel: Stephanie Plageman enjoys meticulously planning day hikes in the Great Smoky Mountains and weekend camping trips to Shenandoah National Park, dreams of backpacking the Appalachian Trail, and cherishes
    family visits to Washington D.C.’s museums as a balance of adventure and cultural enrichment.
  culinary: Stephanie Plageman prefers simple, nature‑themed meals like wildflower honey tea, grilled cheese with heirloom tomatoes, and pasta tossed with fresh basil pesto, proudly cooks these dishes with
    their mother, and experiments with foraging edible berries during hikes.
  core: Stephanie Plageman is a thoughtful, nature‑obsessed teen who blends quiet curiosity with a penchant for careful planning, often worrying about the future while finding solace in sketchbooks, guitar
    chords, and the serenity of the mountains.
background:
  cultural: Stephanie was raised in Maryville, Tennessee, a community rooted in Southern Appalachian culture. Her family observes traditional holidays, attends a local Methodist church, and values close-knit
    relationships with neighbors. The region’s emphasis on outdoor recreation and reverence for the natural landscape has shaped her love for hiking and conservation. Local customs such as helping with
    community events, enjoying Southern cooking, and respecting generational values coexist with her personal curiosity and modern interests.
attributes:
  skills: '["analytical reading", "scientific research", "detailed note-taking", "basic coding (Scratch)", "conflict mediation", "time-management", "basic cooking", "gardening", "animal care"]'
