  career_goals: Stephanie aspires to become a wildlife biologist or environmental conservationist, focusing on protecting the Appalachian forests and local wildlife. She plans to study biology in college,
    seek internships with the Great Smoky Mountains National Park, and eventually work for a nonprofit or state agency that develops habitat preservation programs. Recognizing the importance of a stable
    career for her wellbeing, she also considers a backup path in veterinary technology, where she can apply her hands-on animal-care skills.
