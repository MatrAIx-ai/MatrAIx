  career_goals: Tamera plans to enroll in a community college next fall, completing an associate degree in Graphic Design before transferring to a four‑year university to study Art Therapy. She aims to
    become a freelance illustrator whose work blends contemporary digital aesthetics with Appalachian folk motifs, producing prints, album covers, and therapeutic art kits for teens. In the longer term,
    she envisions opening a community art studio in Corydon that offers workshops on creative coping for young people dealing with anxiety and depression, while also hosting rotating exhibitions that spotlight
    local artists. She hopes her career will allow her to channel her intense emotions into constructive visual narratives and to leverage her competitive drive to secure commissions from regional brands
    and publishing houses.
