  career_goals: Kristopher plans to finish his associate’s degree in engineering technology or information systems within the next two years, then pursue a bachelor’s degree in civil engineering or network
    administration. His goal is to secure a role in a regional manufacturing firm or logistics company where he can apply his technical and organizational skills, eventually moving into a project management
    or supervisory position. He also entertains the possibility of starting his own small‑scale automotive repair and custom‑fabrication shop, leveraging his hands‑on expertise and community ties.
