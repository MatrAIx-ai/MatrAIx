  career_goals: James aims to advance from his current sales‑manager role to a regional sales director position within the next five years, overseeing multiple states and a larger salesforce. He wants to
    champion data‑centric sales processes, introduce AI‑enabled prospecting tools across the region, and build a mentorship program for junior sales staff. Long‑term, he envisions launching his own consultancy
    that helps mid‑size companies modernize their sales operations while preserving the proven, relationship‑focused methods that have served his Southern market well.
