personas:
  professional: Carmen Hezekiah, a 49‑year‑old mental‑health therapist, blends CBT and trauma‑informed care with expressive arts and narrative techniques, leveraging their curiosity and competitive edge
    to pioneer community‑focused, culturally responsive interventions while navigating a flexible, sometimes disorganized schedule.
  sports: Carmen Hezekiah fuels their energetic social life through weekly Zumba and yoga classes at the Greenville Community Center, supports the Carolina Panthers and the Greenville Drive baseball team,
    and participates in a local gardening club that doubles as a modest walking group on weekends.
  arts: Carmen Hezekiah is a regular at the Greenville County Museum of Art, devouring works by Yayoi Kusama and Claude Monet, attends live performances by Kamasi Washington and a local gospel choir, and
    experiments with unconventional storytelling in community theater workshops inspired by Sarah Ruhl and August Wilson.
  travel: Carmen Hezekiah prefers spontaneous, culturally rich trips, having explored Savannah’s historic squares, the music festivals of New Orleans, the coastal charm of Charleston, and the rainforests
    of Costa Rica, while balancing travel costs with their family’s modest budget and the desire to bring back fresh inspiration for community workshops.
  culinary: Carmen Hezekiah enjoys crafting eclectic meals such as heirloom tomato bruschetta, shrimp and grits with fresh basil, and a Mediterranean quinoa salad featuring feta and olives, sourcing ingredients
    at local farmers’ markets and showcasing their intermediate cooking skills at lively potluck dinners.
  core: Carmen Hezekiah, a curious therapist who merges art and science, lives for vibrant social gatherings, embraces flexible planning, and competes fiercely to become a leading voice in community mental‑health
    innovation, even if their schedule sometimes resembles organized chaos.
background:
  cultural: Carmen was raised in a close‑knit African‑American community in the Charleston‑Columbia corridor of South Carolina, where church, family gatherings, and oral storytelling formed the backbone
    of her upbringing. The rich musical heritage of gospel, blues, and jazz, along with Southern culinary traditions, shaped her appreciation for communal experiences and expressive arts. Having witnessed
    the mental‑health disparities affecting Black families in the South, she is deeply committed to culturally responsive care that honors the strengths, histories, and spiritual resilience of her community.
    Her perspective blends Southern hospitality with a critical, skeptical eye toward systemic barriers, informing both her therapeutic practice and her advocacy for equity.
