  hobbies: '[''Visiting Art Galleries'', ''Attending Live Music Performances (Jazz, Gospel)'', ''Participating in Community Theater'', ''Reading Contemporary Fiction and Nonfiction'', ''Exploring New Culinary
    Experiences'', ''Traveling to Cultural Festivals'', ''Group Dancing (Salsa, Zumba)'', ''Book Club Membership'', ''Gardening (Native Plants)'', ''Photography'', ''Volunteering at Community Centers'',
    ''Meditation and Yoga'', ''Cooking and Hosting Potluck Dinners'']'
  career_goals: Looking ahead, Carmen aims to open a community‑center‑based private practice that integrates art therapy, mindfulness, and culturally grounded storytelling for underserved Black families
    in the Upstate region. She plans to complete a master’s program in clinical counseling within the next two years to secure full licensure and become a certified art therapist. Carmen also aspires to
    develop a regional training curriculum for therapists on culturally competent, evidence‑based interventions, present her integrative model at national conferences, and eventually serve on the board
    of a state mental‑health advocacy organization. Her competitive drive pushes her to be recognized as a leading voice in innovative, community‑focused mental health care.
