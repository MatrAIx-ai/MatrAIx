  career_goals: Alexander aims to transition from specialist to senior program manager, overseeing multi-disciplinary portfolios that integrate technology and creative services. He seeks to champion innovative
    project delivery by adopting AI-enabled planning tools and embedding design-thinking practices into his teams. Over the next five years, he plans to lead a corporate Project Management Office, mentor
    emerging PMs, and eventually launch his own consultancy that helps cultural institutions modernize their operations while preserving artistic integrity.
