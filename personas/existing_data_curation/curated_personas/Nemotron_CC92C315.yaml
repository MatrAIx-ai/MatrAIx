personas:
  professional: Trinity Davis leverages over twenty years in the travel industry to design detail‑rich, culturally immersive itineraries, combining GDS mastery, bilingual negotiation, and a skeptical, competitive
    eye for vendor value while charming clients with storytelling flair and a natural ease as the center of attention at networking events.
  sports: Trinity Davis is a devoted Jacksonville Jaguars fan, follows the Tampa Bay Rays during baseball season, and participates in a local tennis club—St. Johns Tennis Association—while practicing yoga
    three times weekly and joining a weekend kayaking group at the nearby Intracoastal Waterway.
  arts: Trinity Davis regularly enjoys live jazz performances by Wynton Marsalis at the St. Augustine Amphitheatre, indulges in blues legends like B.B. King, sings along to gospel icon CeCe Winans, and
    takes the spotlight in community theater productions such as "The Glass Menagerie," where their talkative energy shines.
  travel: Trinity Davis curates a travel blog with photo essays from Havana, New Orleans, Kingston, and a planned sustainable tour of Ghana, favoring meticulously researched itineraries that blend adventure
    with cultural immersion, using AI‑driven tools for personalization while balancing a modest travel budget and family commitments.
  culinary: Trinity Davis masters Creole and Caribbean cuisine, whipping up Jambalaya with andouille sausage and shrimp, preparing Jamaican Jerk Chicken seasoned with scotch bonnet peppers and allspice,
    and cooking Plantain Ropa Vieja, often sourcing fresh herbs and coconut milk from local farmer’s markets for weekend potluck gatherings.
  core: Trinity Davis blends relentless curiosity and disciplined practicality, channeling a talkative, competitive spirit into crafting immersive travel experiences while juggling a disciplined savings
    plan and a penchant for spicy Creole cooking that sometimes leaves the kitchen a mess.
background:
  cultural: Trinity is an African‑American woman whose family roots trace back to the Southern United States and the Caribbean, bringing a blend of Southern hospitality and Afro‑Caribbean traditions into
    her daily life. Growing up in Jacksonville’s vibrant Black community, she was immersed in gospel music, soul food, and the civil‑rights legacy that shaped her sense of resilience and community responsibility.
    In St. Johns County, she actively participates in local Black cultural organizations, celebrates Juneteenth, and supports neighborhood initiatives that preserve African‑American history. Her cultural
    identity informs her professional focus on creating travel experiences that honor Black heritage and diaspora narratives, while also navigating the unique challenges and opportunities of being a Black
    professional in the travel industry.
attributes:
  skills: '["Travel itinerary planning", "Vendor negotiation and rate management", "Customer relationship management", "Multilingual communication (English, Spanish)", "Global Distribution Systems (Sabre,
    Amadeus)", "Budgeting and cost optimization", "Crisis response and contingency planning", "Event coordination", "Social media marketing", "Public speaking and storytelling", "Sales performance analysis",
    "Mentoring junior agents"]'
  hobbies: '["Exploring historic neighborhoods in St. Johns County", "Cooking Creole and Caribbean cuisine", "Attending live jazz, blues, and gospel performances", "Participating in community theater",
    "Volunteering at African American Heritage Festival", "Reading travel memoirs and historical fiction", "Gardening native Floridian plants", "Yoga and meditation", "Travel blogging and photography",
    "Organizing neighborhood potlucks and block parties"]'
  career_goals: Trinity aims to transition from a travel agent to a boutique agency owner within the next five years, focusing on culturally immersive tours for Black and Afro‑Caribbean travelers. She plans
    to obtain the Certified Travel Counselor (CTC) and Sustainable Tourism Specialist certifications, integrate AI‑driven itinerary personalization, and eventually become a regional manager for a national
    travel firm where she can mentor emerging agents. Her ambition includes expanding her network, increasing market share in the Southeast, and championing diversity and inclusion within the travel sector
    while preserving the unique heritage of her clients.
