persona_description: A former Bauhaus student and photographer, known for his innovative and experimental photographic works that captured daily life at the German fine arts and crafts institution. He dabbled
  in photography by utilizing then unpopular techniques such as exaggerated angles, extreme close-ups, and cropping, and sold his photographs to newspapers and periodicals through an agent at Berlin photo
  agency Dephot. He also exhibited his work around Germany and emigrated to the United States, leaving his photographic negatives to disappear in his native land. He continued his artistic pursuits in America
  by teaching at Sarah Lawrence College and the Fogg Museum at Harvard, and had a stint at the Museum of Fine Arts in Boston, where he retired in 1975.
