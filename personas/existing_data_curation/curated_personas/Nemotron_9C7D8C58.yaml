  career_goals: Calandra aims to publish a memoir that captures her life’s journey and the African‑American experience in the Upper Midwest. She hopes to curate a traveling exhibition highlighting the work
    of Black women artists from Minnesota, partnering with the Minneapolis Institute of Arts. She is passionate about launching a mentorship program that pairs senior artists with high‑school students in
    North Minneapolis, fostering intergenerational creativity. Additionally, she seeks to become a senior ambassador for local museums, delivering lecture series on cultural memory and oral history, and
    to document her family’s oral traditions for archival preservation.
