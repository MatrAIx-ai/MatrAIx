persona_description: A teacher who is passionate about creating passionate advocates who contribute to their community through hands-on study and community engagement. She is a middle school teacher at
  Wentworth Elementary School, and her project was part of the New England Hub partnership with the Rural Educational Leaders Network and Plymouth State University. Her project focused on the Baker River,
  a vital resource for her community, and her students became citizen scientists, conducting biomonitoring field research and making a difference in their community. Her project was funded by a Rural Schools
  Collaborative grant and multiple community partners.
