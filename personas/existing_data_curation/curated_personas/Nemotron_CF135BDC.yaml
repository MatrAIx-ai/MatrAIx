personas:
  professional: Janet Azimi is a meticulous teaching assistant in the humanities who designs highly structured lesson plans, leverages Canvas and Blackboard to streamline course delivery, and mentors undergraduate
    students with a compassionate yet disciplined approach that reflects their deep commitment to inclusive education.
  sports: Janet Azimi is a devoted fan of the Carolina Panthers, the Charlotte Hornets, and the UNC‑Chapel Hill Tar Heels who joins the Alamance County walking club for weekly nature walks and practices
    gentle yoga at the local community center to stay active without the pressure of competitive sports, and they relish the occasional camaraderie of the club’s post‑walk coffee.
  arts: Janet Azimi is an avid reader of Jane Austen and Plato, finds solace in the piano sonatas of Beethoven and the folk storytelling of Emmylou Harris, and draws creative inspiration for their knitting
    from the bold color palettes of Kaffe Fassett while occasionally attending performances at the North Carolina Shakespeare Festival.
  travel: Janet Azimi is a meticulous planner who has explored the Blue Ridge Parkway, spent a literary weekend in New York City, and visited historic Savannah, while dreaming of a scholarly pilgrimage
    to Edinburgh’s book festivals and a tranquil garden tour of Kyoto, always booking trips months in advance to align with their academic calendar and budget constraints.
  culinary: Janet Azimi is a seasoned home cook who blends garden‑fresh heirloom tomatoes, basil, and kale into hearty vegetable stews, embraces classic Southern sides like collard greens and cornbread,
    occasionally crafts homemade gnocchi, and relishes the ritual of sipping sweet tea while knitting, all while preferring wholesome, seasonal meals over fast food and they view cooking as a meditative
    extension of their gardening.
  core: Janet Azimi is a methodically organized educator who balances a passion for solitary puzzles and knitting with a steadfast commitment to community literacy, yet they secretly hoard yarn bundles
    for future projects.
background:
  cultural: Janet is a White American raised in the small-town culture of central North Carolina. Her Southern upbringing instilled a respect for community, modesty, and hospitality, while her academic
    family background emphasized the value of education and intellectual curiosity. She blends traditional Southern values of courtesy and cooperation with a progressive, inclusive outlook, which informs
    both her professional ethos and her personal commitment to helping others.
attributes:
  skills: '[''Curriculum Development'', ''Instructional Design'', ''Academic Research Assistance'', ''Learning Management System Administration'', ''Student Mentorship'', ''Data-Driven Assessment'', ''Classroom
    Management'', ''Conflict Resolution'']'
  hobbies: '[''Reading Classic Literature'', ''Reflective Journaling'', ''Puzzle Solving'', ''Gardening'', ''Knitwear Crafting'', ''Volunteering at Literacy Program'', ''Cooking Southern Cuisine'', ''Nature
    Walks'']'
  career_goals: Janet aims to transition from her current role as a teaching assistant to a full-time faculty position in the humanities, eventually pursuing a PhD in Education to specialize in curriculum
    design and inclusive teaching practices. She aspires to lead a departmental program that integrates structured, evidence-based pedagogy with compassionate student support, and to develop community outreach
    initiatives that promote literacy and lifelong learning in Graham and the surrounding Alamance County.
