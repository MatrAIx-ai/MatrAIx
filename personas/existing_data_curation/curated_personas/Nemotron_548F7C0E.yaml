  hobbies: '[''church community involvement'', ''Ethiopian cooking club'', ''local history walking group'', ''gardening'', ''knitting'', ''playing kebero'', ''reading mystery novels'', ''community bake‑offs'',
    ''trivia nights'']'
  career_goals: Although retired from formal employment, Milly aims to leverage her experience by taking on a leadership role at the local senior center, mentoring younger volunteers, and spearheading intergenerational
    cultural programs that celebrate Ethiopian heritage. She aspires to become a recognized community organizer within Fitchburg, expanding her influence by securing grants for neighborhood improvements
    and creating a monthly dialogue series that encourages open, yet critical, discussions among residents. Milly also hopes to complete a short digital‑skills certification to remain current and to mentor
    peers in navigating online resources.
