personas:
  professional: Roberta Walters, a retired aerospace and civil engineer, leverages their expertise in statistical analysis, Python and MATLAB modeling, and meticulous project management to mentor young
    women in STEM, channeling their disciplined, organized nature and competitive drive into crafting precise grant proposals and interdisciplinary museum exhibits.
  sports: Roberta Walters, a lifelong fan of the New England Patriots and Boston Red Sox, joins the Westbrook Senior Walking Club for brisk morning hikes along the shoreline in spring and summer, and practices
    gentle yoga at the local community center during winter months to maintain flexibility and balance.
  arts: Roberta Walters, a dedicated oil painter of botanical subjects inspired by Georgia O’Keeffe and Monet, regularly attends exhibitions featuring contemporary artists like Kehinde Wiley at the New
    Haven Museum, and enjoys listening to Beethoven’s late string quartets and the avant‑garde compositions of Philip Glass while they sketch.
  travel: Roberta Walters, a meticulous planner who favors relaxed itineraries, spends their vacation time exploring New England gems such as the historic streets of Boston, the lighthouses of Maine, and
    the vineyards of the Hudson Valley, while dreaming of a future art‑focused pilgrimage to Florence, Italy.
  culinary: Roberta Walters, an adept home chef, delights in crafting heirloom vegetable ratatouille with fresh rosemary, thyme, and locally sourced tomatoes, savors classic New England clam chowder on
    crisp evenings, and occasionally treats themselves to a slice of dark chocolate after a long day of painting.
  core: Roberta Walters, a disciplined yet curious septuagenarian, balances meticulous project planning with spontaneous brushstrokes, treats their daily crossword as a competitive sport, and habitually
    checks the garden for escaped squirrels before bedtime.
background:
  cultural: Roberta's cultural background is anchored in mid-20th-century New England, raised in a middle-class Anglo-American family in Connecticut. The region's emphasis on rigorous education, self-reliance,
    and community involvement shaped her disciplined work ethic and reserved demeanor. Growing up during the post-war era, she witnessed the expansion of scientific research and the rise of modern art movements,
    which fostered her dual appreciation for analytical rigor and creative expression. While she identifies as a white American, she values the growing diversity of her community and actively seeks inclusive,
    intergenerational dialogue through her volunteer and mentorship activities.
