  career_goals: Even in retirement, Roberta is driven to share her knowledge and leave a lasting intellectual legacy. She aims to mentor young women pursuing STEM fields, offering guidance through volunteer
    tutoring and a community science-art workshop she plans to launch in Westbrook. She also aspires to author a memoir that intertwines her engineering experiences with her lifelong love of art, and to
    curate a public exhibition that showcases local scientific achievements through visual art. Ultimately, she seeks to be recognized as a bridge between science and culture in her town, fostering intergenerational
    learning and appreciation.
