personas:
  professional: Danh Nguyen is a veteran landscaper with over three decades of hands‑on experience who blends horticultural science with visual art, excels at plant identification, soil health assessment,
    and sustainable irrigation planning, and is methodically training crews while pursuing Texas Landscape and Nursery Association certification to launch an eco‑friendly design consultancy.
  sports: Danh Nguyen is an avid hiker who tackles the Lake Waco trails each weekend, roots for the Dallas Cowboys in football and the Dallas Mavericks in basketball, and plays in a local amateur softball
    league that meets at the Waco Community Center.
  arts: Danh Nguyen regularly attends exhibitions at the Waco Arts Center, admires the vibrant murals of local artist Jacek, studies the photography of Annie Leibovitz for composition ideas, and practices
    guitar chords while listening to Willie Nelson and John Mayer for creative inspiration.
  travel: Danh Nguyen prefers road‑trip adventures, having explored the Texas Hill Country wine trail, the historic missions of San Antonio, and a weekend getaway to Sedona’s red rocks, while dreaming of
    a culinary pilgrimage to Oaxaca, Mexico to deepen his fusion cooking repertoire.
  culinary: Danh Nguyen delights in crafting Vietnamese‑Tex‑Mex fusion dishes like bánh mì tacos with pickled daikon, chipotle‑marinated pork pho, and jalapeño‑lime corn on the cob, relying on ingredients
    such as lemongrass, cilantro, tamarind, and smoked paprika, and he enjoys experimenting with fresh herbs from his garden.
  core: Danh Nguyen is a methodical, art‑infused landscaper who balances meticulous garden design with a love for eclectic cooking, modest saving habits, and a penchant for weekend hikes, all while occasionally
    procrastinating on paperwork and hoarding vintage camera lenses.
background:
  cultural: Danh is a second-generation Vietnamese-American whose parents immigrated to Texas in the 1970s. He grew up speaking both Vietnamese and English, celebrating Tet and other Vietnamese traditions
    while also embracing the broader Texan culture. His culinary heritage influences his cooking, and he often shares traditional dishes with neighbors. He maintains ties to the local Vietnamese community
    through language classes, cultural events, and a small choir that performs at community gatherings. This bicultural experience informs his appreciation for blending artistic and natural elements in
    his work.
attributes:
  skills: '[''Landscape design'', ''Plant identification'', ''Soil health assessment'', ''Irrigation system installation and maintenance'', ''Hardscape construction'', ''Equipment operation and maintenance'',
    ''Sustainable landscaping practices'', ''Project budgeting and scheduling'', ''Team leadership and training'', ''Customer communication'']'
  hobbies: '[''Nature photography'', ''Visiting art galleries and museums'', ''Vietnamese-Tex-Mex cooking'', ''Home vegetable gardening'', ''Hiking'', ''Community-garden volunteering'', ''Reading historical
    fiction'', ''Playing guitar'', ''Assisting with Tet festival decorations'']'
  career_goals: Danh aims to transition into a supervisory role within the next two years, seeking certification from the Texas Landscape and Nursery Association to formalize his expertise. He plans to
    launch a small consulting business that offers eco-friendly garden designs for residential clients in Waco, with a focus on integrating local art installations. Additionally, he hopes to mentor apprentices
    from the Vietnamese community, helping them gain stable employment in the trades before he retires.
