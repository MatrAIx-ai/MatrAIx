  career_goals: Brianna aims to secure a supervisory role where she can shape kitchen procedures to align with her preference for predictable, well‑ordered workflows. She plans to obtain an advanced ServSafe
    manager certification within the next year to solidify her expertise and increase job security. Ultimately, she envisions opening a modest, family‑run catering service that specializes in hearty Midwestern
    comfort food, allowing her to exercise full control over menu development and operational standards. Her competitive nature drives her to enter regional cooking contests, seeking recognition as the
    top line cook in the Dayton area. In parallel, she hopes to negotiate a schedule that limits late‑night shifts, reducing stress and giving her more stability for managing her health and family responsibilities.
