persona_description: A soil scientist with expertise in percolation processes, groundwater contamination, and soil sampling techniques. They are interested in quantifying heterogeneous flow at scales between
  individual sampling cells and the entire sampler. They are looking for a versatile instrument that can be used in both laboratory and field experiments to collect water and solute flux observations distributed
  in space and time. They are particularly interested in the performance of different materials (nylon mesh, sintered porous stainless steel plates, and polyamide membrane) and the impact of water application
  methods (irrigation and natural rainfall) on the sampler's performance.
