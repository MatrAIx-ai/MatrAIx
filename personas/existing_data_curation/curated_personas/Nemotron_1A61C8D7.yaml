    design'']'
  hobbies: '[''Cycling around Chicago'', ''Live blues and jazz concerts'', ''Photography'', ''Cooking and recipe experimentation'', ''Yoga and mindfulness'', ''Volunteer coding workshops for girls'', ''Reading
    science-fiction'', ''Tech newsletters'', ''Crossword puzzles'', ''Balcony gardening'']'
  career_goals: Gladys aims to transition from a senior systems analyst to a solutions architect role within the next three years, leading the design of enterprise‑wide cloud migrations and AI‑enabled processes.
    She plans to earn AWS Solutions Architect and Certified Scrum Professional credentials, and to enroll in a part‑time master’s program in Information Systems to deepen her strategic acumen. Long‑term,
    she envisions a leadership position where she can shape technology roadmaps, champion data‑driven decision making, and mentor women and underrepresented groups entering the tech field. She also hopes
    to author a series of practical guides on bridging legacy systems with modern cloud architectures.
