personas:
  professional: Gladys Fenton is a senior systems analyst in Chicago who translates complex business requirements into scalable cloud solutions using SQL, Python, Linux, and AWS/Azure, and they balance
    a practical, cost‑effective mindset with a curiosity for AI/ML integration despite a relaxed approach to strict planning and occasional disorganization.
  sports: Gladys Fenton cycles through Chicago’s neighborhoods as a member of the Chicago Wheelmen club, practices yoga at the local studio, follows the Chicago Cubs, Bulls, and Blackhawks, plays recreational
    basketball on weekends, and they join winter ice‑skating sessions at McCormick Tribune Ice Rink, balancing active pursuits with a laid‑back attitude toward scheduled training.
  arts: Gladys Fenton enjoys live blues and jazz nights featuring Buddy Guy and Kamasi Washington, visits the Art Institute of Chicago for modern art, captures photo walks along the lakefront with her DSLR,
    reads sci‑fi authors like Neal Stephenson, and they watch productions at Steppenwolf Theatre starring Bryan Cranston, weaving artistic appreciation into their weekly routine.
  travel: Gladys Fenton prefers flexible weekend getaways, having biked to the Indiana Dunes, explored Door County’s vineyards, attended a jazz festival in New Orleans, and they dream of a cultural immersion
    trip to Kyoto, Japan, yet balances these adventures with work commitments and a modest travel budget.
  culinary: Gladys Fenton experiments with global cuisines—crafting Thai green curry, Indian biryani, and Ethiopian injera—while perfecting Chicago‑style deep‑dish pizza, sourdough bread, and dishes featuring
    kimchi, saffron, and smoked mozzarella, using fresh basil and cherry tomatoes from her balcony garden, and they indulge in craft beer pairings on Friday night pizza rituals.
  core: Gladys Fenton blends pragmatic tech expertise with a love of blues, bike rides, and spontaneous deep‑dish pizza nights, and they navigate life with flexible plans, curiosity‑driven learning, and
    occasional budgeting disarray.
background:
  cultural: Gladys grew up in a middle‑class white family in the Chicago suburbs, tracing her ancestry to Irish and German immigrants who settled in the Midwest in the early 20th century. The city’s multicultural
    atmosphere and strong community ties shaped her pragmatic yet open‑minded outlook. She embraces Midwestern values such as reliability, straightforward communication, and a sense of civic responsibility,
    which are reflected in her involvement with local volunteer programs. Her cultural experiences blend traditional American holidays—Thanksgiving, Fourth of July barbecues—with the eclectic food, music,
    and art scenes of Chicago, giving her a broad appreciation for diversity while maintaining a grounded, practical approach to life.
