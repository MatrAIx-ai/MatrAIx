  career_goals: Cassie aims to become a Certified Public Accountant (CPA) and advance to a senior audit manager within her firm, leading a regional audit team. She aspires to specialize in forensic accounting
    and sustainability reporting, leveraging data analytics to drive strategic insights. In the long term, she envisions taking on a CFO role for a mid-sized Midwest company or founding her own boutique
    accounting consultancy that serves local nonprofits and arts organizations.
