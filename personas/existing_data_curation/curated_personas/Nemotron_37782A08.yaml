  hobbies: '[''Reading adventure and space books'', ''Building LEGO kits'', ''Hiking and nature exploration'', ''Collecting rocks and leaves'', ''Feeding park ducks'', ''Playing soccer'', ''Drawing comic
    strips'', ''Practicing piano'', ''Conducting simple science experiments'', ''Quiet reading and breathing exercises'']'
  career_goals: Eugene dreams of a future where he can explore his curiosity while helping others. He often says he wants to become an astronaut to discover new worlds, a park ranger to protect the forests
    of West Virginia, and a teacher because he enjoys sharing knowledge and seeing classmates succeed. He also mentions wanting to be a veterinarian after caring for his family’s dog, reflecting his desire
    to nurture living things. Though his ambitions are broad, he consistently ties them to roles that promote harmony, community well‑being, and practical problem‑solving.
