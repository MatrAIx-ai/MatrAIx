personas:
  professional: Eugene Hoye is a budding junior scientist and LEGO engineer who blends a curiosity about space and wildlife with meticulous building of detailed sets before adding imaginative twists, and
    they reliably help classmates during group projects while balancing their own need for quiet reflection.
  sports: Eugene Hoye is an enthusiastic junior soccer player for the Kanawha County Youth Soccer Club who loves dribbling on Saturday mornings, idolizes Lionel Messi of FC Barcelona, cheers for the West
    Virginia Mountaineers during college football season, and balances active play with occasional swimming lessons at the community pool.
  arts: 'Eugene Hoye is a creative comic‑strip artist who draws vibrant panels inspired by Jeff Smith’s Bone and the whimsical worlds of Studio Ghibli, practices simple piano pieces like Yiruma’s River
    Flows in You, and devours illustrated adventure books such as The Magic School Bus: Lost in Space, shaping a colorful artistic identity.'
  travel: Eugene Hoye is a curious little traveler who has explored the nearby New River Gorge on family hikes, visited the National Air and Space Museum in Washington DC, dreams of a future trip to the
    Kennedy Space Center in Florida, and plans weekend adventures to local parks using crayon‑drawn maps.
  culinary: Eugene Hoye is a budding home chef who loves making gooey macaroni‑and‑cheese with cheddar, crafting peanut‑butter and banana sandwiches, topping pizzas with pepperoni and extra mozzarella,
    and experimenting with rock‑candy crystals from science kits, though they often leave the broccoli untouched on their plate.
  core: Eugene Hoye is a bright, curiosity‑driven seven‑year‑old whose love for LEGO, adventure books, and quiet breathing exercises balances a vivid imagination with occasional waves of anxiety, and they
    frequently leave socks scattered across the living room.
background:
  cultural: Eugene was raised in a white, Appalachian family in Charleston, West Virginia. His household blends traditional West Virginian values—self‑reliance, community cooperation, and a love of the
    outdoors—with a modern emphasis on education and technology. Weekly church gatherings and family potlucks reinforce a sense of belonging, while the nearby Bluefield School District encourages participation
    in community service projects and local history clubs. The region’s folk music, storytelling traditions, and appreciation for the nearby Kanawha River shape his worldview, fostering a respect for nature
    and an interest in preserving local heritage. His parents support both structured schoolwork and free‑play exploration, providing a balanced environment that nurtures his curiosity and his desire for
    stability.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic (addition and subtraction)'', ''Navigating educational tablets'', ''Organizing personal school supplies'', ''Collaborative LEGO building'', ''Empathetic
