personas:
  professional: Aaron Hickling is a skilled pipefitter and steamfitter who blends hands-on expertise in high-pressure systems with a curiosity for emerging sustainable technologies, using their strong blueprint
    reading and welding abilities to troubleshoot complex projects while aiming to become a foreman and mentor apprentices.
  sports: Aaron Hickling joins pickup basketball games at the local community center, follows the Chicago Bulls and Chicago White Sox, and occasionally plays in a weekend adult league with the Ridge Runners,
    preferring low-key, social exercise over regimented training.
  arts: Aaron Hickling spends evenings editing street-level photos inspired by Henri Cartier-Bresson while listening to jazz legends like John Coltrane, gospel choirs such as the Chicago Mass Choir, and
    classic hip-hop icons like A Tribe Called Quest, which shape their creative outlook.
  travel: Aaron Hickling enjoys spontaneous weekend road trips to nearby lake towns like Geneva, dreams of exploring the sustainable architecture of Copenhagen, and prefers flexible itineraries over meticulously
    planned tours, balancing a limited budget with a love for urban photography.
  culinary: Aaron Hickling cooks soul-food staples such as collard greens, smoked turkey, and cornbread with a modest skill set, relishes the aroma of smoked paprika and sweet potatoes, and treats dining
    out as a chance to sample Chicago deep-dish pizza and Southern BBQ joints.
  core: Aaron Hickling is a curious yet laid-back pipefitter who juggles solitary photography, DIY electronics, and a love for jazz while occasionally misplacing tools and forgetting appointments, embodying
    a blend of practical skill and creative wandering.
background:
  cultural: Aaron grew up in a close‑knit African‑American family in the Chicago suburbs, where church gatherings, family barbecues, and community solidarity were central. He draws pride from the city’s
    rich Black musical heritage, often listening to blues, jazz, gospel, and hip‑hop that shaped his upbringing. Soul‑food cooking, especially dishes like collard greens and cornbread, connects him to his
    roots. He participates in neighborhood clean‑up events and mentors younger community members through local trade programs, reflecting the collective responsibility valued in his cultural community.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''MIG/TIG Welding'', ''Blueprint Reading'', ''HVAC System Installation'', ''Building Code Compliance'', ''OSHA Safety Standards'', ''Troubleshooting and Diagnostics'',
    ''Project Estimation'', ''Team Collaboration'']'
  hobbies: '[''Urban photography'', ''DIY electronics projects'', ''Basketball (pickup games)'', ''Reading science‑fiction'', ''Cooking soul‑food'', ''Listening to jazz and hip‑hop'', ''Community volunteering'']'
  career_goals: Aaron aims to earn his Master Pipefitter certification within the next two years and move into a foreman or site supervisor role where he can mentor apprentices and lead crews on larger
    commercial projects. He is interested in specializing in sustainable building practices, such as integrating renewable energy piping and energy‑efficient steam systems. Long‑term, he dreams of starting
    his own plumbing and pipefitting firm that focuses on community hires and offers apprenticeship pathways for youth in Chicago’s Black neighborhoods.
