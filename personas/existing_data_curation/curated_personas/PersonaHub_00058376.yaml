persona_description: A linguist who specializes in the study of figurative language, particularly metaphor and idioms. Their research interests include the theory of conceptual metaphor and the spontaneous
  and automatic process of metaphor comprehension in everyday language. They are likely to be familiar with the dual-reference theory and have a deep understanding of the processes involved in creating
  new concepts and categories through the use of figurative language.
