persona_description: A professional who specializes in the design and decoration of glass and ceramic substrates using screen printing, pad printing, and digital printing with sublimation inks. They are
  skilled in understanding the properties and characteristics of both glass and ceramic materials, as well as the various printing processes and inks that can be used to decorate them. They are also knowledgeable
  about the importance of heat and temperature in the printing process and the effects that ambient temperature can have on the curing of ink films. They have experience in working with different types
  of two-component organic inks and are skilled in applying and adjusting the flow characteristics of screen printing. They are also familiar with the potential drawbacks and limitations of these inks and
  are able to identify and address any issues that may arise during the printing process.
