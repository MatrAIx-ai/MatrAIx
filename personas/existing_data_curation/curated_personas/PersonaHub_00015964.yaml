persona_description: A scientist and researcher with expertise in the study of sagebrush ecosystems, greater sage-grouse, and their habitats. This person is likely to be involved in the development and
  implementation of research strategies and plans to protect and conserve these species, as well as to understand the underlying factors contributing to their decline. They are likely to be familiar with
  the complex interrelationships between these species and their habitats, and with the challenges and opportunities presented by the changing conditions in the Western United States. They may be involved
  in conducting research, managing resources, and providing scientific advice to decision-makers and stakeholders.
