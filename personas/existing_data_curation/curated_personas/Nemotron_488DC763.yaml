  career_goals: Even in retirement, Casey seeks to stay intellectually active and give back to her community. She aims to mentor high‑school and college students—particularly encouraging girls to pursue
    STEM careers—by volunteering with local schools and organizations. She hopes to serve on the board of a nearby science museum or nonprofit, develop a community‑based science education program, and perhaps
    author a series of reflective articles or a memoir about the evolution of women in STEM over the past decades. Casey also plans to deepen her understanding of emerging technologies such as artificial
    intelligence through workshops and online courses, and to cultivate a lasting impact by fostering curiosity and practical problem‑solving in the next generation.
