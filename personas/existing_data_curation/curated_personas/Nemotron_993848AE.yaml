  hobbies: '[''Reading historical non-fiction'', ''Jogging in Prospect Park'', ''Chess'', ''Urban photography'', ''Cooking soul‑food'', ''Jazz listening'', ''Meditation'', ''Volunteering at legal clinic'']'
  career_goals: Orlando aims to become a leading trial attorney within the next five years, focusing on civil rights and public interest cases that affect marginalized communities in Brooklyn. He plans
    to earn an LLM in criminal law to deepen his expertise, and ultimately aspires to become a partner at his firm or launch his own boutique practice dedicated to social justice advocacy. He also desires
    to mentor junior lawyers from underrepresented backgrounds, and hopes to serve as a judge or policy advisor to influence systemic reform, while maintaining a balanced lifestyle that mitigates his stress‑prone
    tendencies.
