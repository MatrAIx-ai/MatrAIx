  hobbies: '[''Hiking'', ''Kayaking'', ''Drum circles'', ''Cooking international cuisine'', ''DIY crafts'', ''Photography'', ''Community gardening'', ''Book club'', ''Yoga'', ''Meditation'']'
  career_goals: Mira aims to deepen her expertise by completing a bachelor's degree in psychology or nursing and becoming a certified psychiatric nurse practitioner. She envisions leading a multidisciplinary
    mental health team and developing community outreach programs that integrate mindfulness and creative arts for individuals with serious mental illness. Over the long term, she hopes to influence mental
    health policy at the county level, mentor new technicians, and create flexible, patient‑centered care models that balance innovative ideas with proven practices.
