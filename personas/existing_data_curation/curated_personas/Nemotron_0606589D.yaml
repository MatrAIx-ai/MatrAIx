personas:
  professional: Mira Virani is a psychiatric technician at a community mental health clinic in Ridgefield, and they excel at crisis de‑escalation, therapeutic communication, and interdisciplinary collaboration,
    channeling their outgoing, sociable energy and practical curiosity into empathetic patient assessments while their relaxed attitude toward obligations sometimes leads to a cluttered documentation system
    that they compensate for with quick, adaptive problem‑solving.
  sports: Mira Virani embraces the Pacific Northwest’s active lifestyle by hiking the Ridgefield forest trails, kayaking on the Columbia River, practicing yoga at a local studio, cheering for the Seattle
    Seahawks and Seattle Kraken, and they actively participate in a community climbing club at The Summit gym.
  arts: Mira Virani channels their creative spark into weekly drum circles, experimental photography of misty forest landscapes, and DIY craft workshops, drawing inspiration from Ansel Adams, Bon Iver,
    and Maya Angelou’s spoken‑word performances, while they also enjoy contemporary fiction by authors such as Sally Rooney and Ocean Vuong in their book club.
  travel: Mira Virani favors spontaneous, nature‑focused weekend getaways to the Oregon Coast and Whistler, Canada, while they plan longer, budget‑conscious trips to culturally rich destinations like Kyoto,
    Japan, and the Icelandic highlands, reflecting their love for discovery tempered by occasional disorganization that leads them to rely on friends for detailed itineraries.
  culinary: Mira Virani enjoys experimenting in the kitchen with dishes such as Thai green curry, Ethiopian injera paired with spicy lentils, and homemade Japanese ramen, skillfully blending turmeric, miso,
    and berbere to create bold flavors, often cooking for potluck gatherings yet they admit their pantry can become a chaotic mess due to their relaxed approach to organization.
  core: Mira Virani is a sociable, curiosity‑driven mental health professional who balances practical care with spontaneous creativity, often juggling a thriving community life, a slightly chaotic schedule,
    and they love outdoor adventure.
background:
  cultural: Mira identifies as a white American with deep roots in the Pacific Northwest. Her family ancestry traces back to northern Europe, and she grew up in a suburban community that valued environmental
    stewardship, volunteerism, and progressive attitudes toward social wellbeing. Living in Ridgefield, she embraces the region’s blend of love for nature, community involvement, and a flexible, collaborative
    spirit, which informs both her professional dedication to mental health care and her personal pursuits.
