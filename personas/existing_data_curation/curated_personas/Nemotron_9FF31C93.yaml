  hobbies: '[''Church choir participation'', ''Cooking Southern and Creole dishes'', ''Gardening'', ''Dancing to jazz and blues'', ''Reading historical fiction'', ''Quitting circles'', ''Volunteering at
    community food bank'', ''Attending local music festivals'', ''Spontaneous road trips'']'
  career_goals: Lisa aspires to move into a senior administrative manager role where she can mentor younger staff and shape office policies. She hopes to lead digital transformation projects that modernize
    workflow across her department, and she plans to develop a training program for newcomers to the field. Outside of her primary job, Lisa wants to leverage her organizational skills as a part‑time community
    liaison for local nonprofit groups, coordinating volunteer efforts and outreach events for the Shreveport-Bossier area.
