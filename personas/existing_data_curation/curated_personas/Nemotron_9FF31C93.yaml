personas:
  professional: Lisa Maat, a seasoned office operations manager with over three decades of expertise in calendar coordination, vendor relations, and digital workflow optimization, blends a curious embrace
    of emerging cloud tools with a practical eye for cost‑saving process improvements, while their spontaneous, people‑centric style sometimes clashes with rigid deadlines as they champion collaborative
    event planning, mentor junior staff, and pursue a senior administrative manager role to lead digital transformation projects and develop training programs.
  sports: Lisa Maat roots for the New Orleans Saints on Sundays and the Pelicans during the NBA season, participates in a weekly senior bowling league at the local community center, and embraces low‑impact
    cardio through a community dance class that doubles as a social gathering, reflecting their sociable, spontaneous energy.
  arts: Lisa Maat, a devoted member of her church choir and a regular attendee of the Shreveport Jazz Festival, finds creative solace in quilting with fellow circle members while listening to the timeless
    sounds of Ella Fitzgerald, B.B. King, Nina Simone, and Wynton Marsalis, and draws inspiration from historical fiction spotlighting pivotal moments in American history, shaping their artistic expression
    and community involvement.
  travel: Lisa Maat embraces spontaneous road trips, often charting last‑minute routes to blues‑filled havens like Memphis and Austin or scenic retreats such as Caddo Lake, blending a love of adventure
    with modest budgeting that prioritizes affordable motels and group carpooling with choir friends, while also dreaming of a future pilgrimage to New Orleans' historic French Quarter.
  culinary: Lisa Maat, an avid home chef, transforms fresh herbs from her garden into signature Creole gumbo, jambalaya, and shrimp étouffée, while also mastering Southern classics like fried catfish and
    pecan pie, regularly hosting potluck gatherings where they showcase culinary flair and spontaneous improvisations with ingredients such as okra, cayenne pepper, fresh thyme, and parsley.
  core: Lisa Maat navigates life with a blend of spontaneous generosity, practical ingenuity, and a soulful love for music and community, though they sometimes let impromptu plans derail meticulous budgets
    and deadlines, revealing a charming tension between curiosity and structure.
background:
  cultural: Lisa grew up in a close‑knit African‑American community in Shreveport, where Southern Baptist traditions, Creole culinary heritage, and the rhythms of jazz and blues shaped her worldview. Family
    gatherings, church services, and community festivals fostered a strong sense of solidarity and service. She carries forward the values of storytelling, soulful music, and communal cooking, while also
    embracing the broader cultural tapestry of Bossier Parish, which blends southern hospitality with the resilience and optimism of her Black heritage.
attributes:
