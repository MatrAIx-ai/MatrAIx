  career_goals: While Mateo is only one year old, his caregivers envision a future that nurtures his innate curiosity, appreciation for visual aesthetics, and cooperative nature. They hope he will be encouraged
    to explore creative fields such as visual arts, music, or design, where his love of color and patterns can flourish. At the same time, they value balanced learning that allows flexibility and organization,
