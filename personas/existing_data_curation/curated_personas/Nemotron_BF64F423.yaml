personas:
  professional: Jennifer Bovard, a budding historical fiction enthusiast and aspiring archivist, channels her love for routine and detailed note‑taking into meticulous research projects for her middle‑school
    history club, where her reliability and quiet focus make her the go‑to organizer for archival tasks.
  sports: Jennifer Bovard enjoys the calm cadence of hiking the Columbia River Gorge trails with her local youth nature club, occasionally follows the Oregon State Beavers men’s track and field season,
    and participates in her school’s cross‑country team, preferring low‑impact endurance over competitive sports.
  arts: Jennifer Bovard immerses herself in the art of watercolor landscapes inspired by the serene works of Winslow Homer and the delicate brushwork of contemporary Oregon artist Susan Walker, while listening
    to folk singer Niamh C. Moynihan and rereading classics like Charlotte Brontë and Sir Walter Scott, which together shape her quiet creative identity.
  travel: Jennifer Bovard favors slow travel that allows for reflective journaling, having taken weekend trips to the historic town of McMinnville and dreaming of a future pilgrimage to the castles of the
    English countryside, while her family budget and school schedule keep long‑haul adventures limited for now.
  culinary: Jennifer Bovard enjoys simple, comforting meals such as salmon with rosemary potatoes and fresh garden peas, takes pleasure in baking oat‑raisin biscuits, and can reliably follow a grandma‑handed
    recipe for honey‑glazed carrots, though she often forgets to set timers, leading to occasional burnt edges.
  core: Jennifer Bovard is a quiet, routine‑loving teen who blends a love for historical narratives, meticulous garden‑to‑paper journaling, and steady, dependable habits with occasional spurts of artistic
    impulse and a tiny habit of misplacing her knitting needles.
background:
  cultural: Jennifer comes from a multi‑generational white family of primarily German and Scandinavian ancestry that settled in the Pacific Northwest generations ago. Growing up in Dallas, Oregon, a tight‑knit
    rural community, she has been immersed in modest, Protestant (likely Methodist) cultural traditions that emphasize self‑reliance, community support, and respect for local customs such as county fairs,
    seasonal harvest celebrations, and church gatherings. Her family values practical work, modest living, and the preservation of familial and community harmony, all of which shape her everyday outlook
    and future aspirations.
attributes:
  skills: '[''Organizational skills'', ''Time management'', ''Basic computer literacy (word processing, internet research)'', ''Meal preparation and baking'', ''Gardening and basic plant care'', ''First‑aid
