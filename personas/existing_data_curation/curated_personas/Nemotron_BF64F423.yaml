  hobbies: '[''Reading historical fiction'', ''Sketching and watercolor painting'', ''Knitting and crocheting'', ''Gardening'', ''Hiking local trails'', ''Journaling'', ''Participating in small community
    service projects with church youth group'', ''Baking simple cookies and pastries'']'
  career_goals: Jennifer aims to complete high school with solid grades and then pursue a degree in elementary education, hoping to become a teacher who creates a stable, nurturing environment for young
    learners. She also envisions contributing to her family's agricultural roots by gaining expertise in sustainable farming practices. In the longer term, she dreams of opening a small community bakery
    or a farm‑to‑table café that blends her love for routine, practical work, and serving her local neighborhood.
