  career_goals: 'Joseph’s dreams are filled with wonder: he often says he wants to become an astronaut who explores space, a marine biologist who discovers sea creatures, an artist who paints giant colorful
    pictures, or a firefighter who helps people. He is also fascinated by inventors and sometimes imagines building his own robot. These ambitions reflect his curiosity, love for art, and desire for flexible,
    creative problem‑solving.'
