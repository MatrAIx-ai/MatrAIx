    standards'', ''Proficiency with Microsoft Office, PDF editing, and transcription software'', ''Experience training and mentoring new captioners'']'
  hobbies: '[''Reading legal thrillers and historical fiction'', ''Solving crosswords and Sudoku puzzles'', ''Knitting and quilting'', ''Maintaining a small vegetable garden'', ''Walking along the Salisbury
    coastline and birdwatching'', ''Practicing yoga and mindfulness meditation'', ''Experimenting with new cooking recipes'', ''Participating in a local book club (small group)'', ''Volunteering to caption
    community events'', ''Learning basic Python for workflow automation'', ''Journaling for emotional processing'']'
  career_goals: Jean aims to earn Certified Captioner (CC) and eventually Certified Court Reporter (CCR) credentials, positioning herself as a recognized expert within the Massachusetts judicial system.
    She aspires to transition into a senior captioning or team‑lead role, where she can shape workflow standards, implement automation tools, and advocate for broader accessibility initiatives. Parallel
    to her professional growth, she plans to pursue a bachelor's degree in legal studies or communications to deepen her understanding of the legal field. Long‑term, Jean envisions launching a boutique
    remote‑captioning consultancy that serves both courtrooms and community events, integrating mindfulness‑based stress‑management practices to support captioners' well‑being. She also hopes to author
    a guide on managing anxiety for high‑stakes transcription professionals, merging her personal resilience journey with her technical expertise.
