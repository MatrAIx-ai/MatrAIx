personas:
  professional: Jean Nezami, a veteran real‑time courtroom captioner, channels their 200‑wpm stenography speed, deep legal lexicon, and razor‑sharp attention to detail into flawless transcripts while quietly
    mentoring newcomers and advocating for broader accessibility standards.
  sports: Jean Nezami, an avid walker along the Salisbury coastline and member of the local birdwatching club, watches the Boston Red Sox in the spring, supports the New England Patriots in the fall, and
    participates in the Salisbury Running Club’s weekend 5K runs to stay fit.
  arts: Jean Nezami, an enthusiastic reader of John Grisham legal thrillers, Hilary Mantel’s historical fiction, and a fan of the Boston Symphony Orchestra’s performances of Beethoven, also finds creative
    release in knitting kits inspired by the textile art of Faith Ringgold.
  travel: Jean Nezami, who prefers self‑planned, low‑stress getaways, has explored historic Charleston, walked the rugged cliffs of Maine’s Acadia National Park, and dreams of wandering Kyoto’s temples
    while budgeting trips carefully to balance work commitments and a modest savings plan.
  culinary: Jean Nezami, an intermediate home cook who delights in crafting herb‑crusted salmon, roasted vegetable quinoa bowls, and spiced lentil soup, sources fresh rosemary and basil from their garden,
    and enjoys meal‑planning to experiment with new recipes while swapping baked goodies for quilting friends.
  core: Jean Nezami, a meticulous captioner with a penchant for puzzles, gardening, and mindfulness, turns high anxiety into relentless precision at work, yet sometimes burns the midnight oil while hoarding
    yarn and skipping meals.
background:
  cultural: Jean grew up as a second‑generation New Englander in a modest, middle‑class household near Boston. Her cultural identity reflects the traditional Anglo‑American values of self‑reliance, privacy,
    and a strong work ethic common in the region. The coastal community of Salisbury instilled in her an appreciation for maritime history, seasonal rhythms, and close‑knit neighborhood ties. Though she
    identifies as white, her professional immersion in captioning has exposed her to Deaf and hard‑of‑hearing cultures, fostering a deep respect for accessibility advocacy and inclusive communication. She
    participates in local community events, volunteers at the town library, and values the New England emphasis on education and civic responsibility, all while maintaining a personal ethos that blends
    curiosity with practical, achievement‑oriented goals.
attributes:
  skills: '[''Stenographic typing (200+ wpm)'', ''Real-time captioning using CA and Caption Anywhere platforms'', ''Proficiency with legal terminology and courtroom procedures'', ''Excellent auditory processing
