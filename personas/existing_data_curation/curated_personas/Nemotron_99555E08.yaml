  hobbies: '[''Watercolor painting'', ''Birdwatching'', ''Hiking in local trails'', ''Community gardening'', ''Reading historical fiction'', ''Listening to science podcasts'', ''Volunteering at local museums'',
    ''Playing piano'', ''Attending art shows'', ''Cooking seasonal meals'']'
  career_goals: Though retired from formal employment, April is driven to keep learning and to give back to her community. She aims to volunteer as a STEM mentor for high‑school girls, develop a community
    garden that serves as a living laboratory for ecology lessons, and curate an interdisciplinary exhibition that showcases the connections between local art and scientific discovery at the Grand River
    Museum. She also hopes to author a popular‑science memoir that weaves together her professional journey, personal resilience, and love of art, and to continue attending workshops that push the boundaries
    of conventional thinking.
