personas:
  professional: April Scardino, a retired research scientist turned community STEM‑art facilitator, leverages their data‑analysis mastery in Python and R and a love for watercolor to craft interdisciplinary
    workshops for high‑school girls while their relaxed, flexible nature lets them improvise when plans go awry.
  sports: April Scardino enjoys early‑morning nature walks with the Grand Rapids Birders Club, follows the Detroit Tigers and the West Michigan Whitecaps baseball seasons, and participates in a senior‑friendly
    tennis ladder at the local community center each spring.
  arts: April Scardino finds solace in watercolor painting inspired by Monet’s soft palettes, frequently attends exhibitions featuring local artist Anna Green, plays piano pieces by Chopin for personal
    enjoyment, and collects limited‑edition prints by Georgia O’Keeffe to adorn their studio.
  travel: April Scardino prefers thoughtfully planned trips that blend art and nature, having visited Mackinac Island’s historic sites, the Met’s modern art wing in New York City, the Renaissance gardens
    of Tuscany, and dreams of exploring the cherry blossoms of Kyoto while balancing travel costs on a modest retirement budget.
  culinary: April Scardino delights in cooking seasonal meals such as roasted beet and goat‑cheese salad, wild rice pilaf with fresh herbs from their garden, and hand‑rolled cinnamon scones, boasting a
    confident yet experimental kitchen style that often leads to a slightly over‑salted dish after a good podcast listening session.
  core: April Scardino blends scientific rigor with artistic whims, navigating retirement with a flexible schedule, a penchant for spontaneous woodworking projects, and a gentle tendency to lose track of
    appointments when caught up in a new painting.
background:
  cultural: April was raised in a modest, multi‑generational family of German‑Polish descent in the rural Midwest, near Lansing, Michigan. The community’s emphasis on self‑reliance, hospitality, and a close
    relationship with the land shaped her grounded worldview. While she grew up attending a Protestant church, her upbringing was characterized by a blend of cultural traditions—holiday foods, folk music,
    and an appreciation for the Great Lakes’ natural beauty. The Midwestern values of practicality, neighborliness, and modest ambition coexist with her love for artistic expression, giving her a balanced
    cultural identity that honors both her heritage and her openness to new, unconventional ideas.
attributes:
  skills: '[''Data analysis (Python, R)'', ''Scientific writing'', ''Experimental design'', ''Project coordination'', ''Interdisciplinary collaboration'', ''Technical teaching and tutoring'', ''Digital
