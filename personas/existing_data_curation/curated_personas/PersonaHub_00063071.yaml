persona_description: A documentary filmmaker who specializes in the exploration and representation of women in scientific fields, particularly oceanography. Her work aims to highlight the achievements and
  contributions of women scientists and their role in advancing scientific knowledge. She has a particular interest in the Agulhas Current and its role in global climate, and her films often feature female
  scientists and crew members on research vessels. Her goal is to inspire and empower women to pursue careers in science and technology.
