personas:
  professional: Harriet Igneri, a budding marine explorer, channels her curiosity and meticulous organization into daily beach investigations, sketching tide-pool ecosystems with the ambition of one day
    becoming a marine biologist who documents hidden sea life for scientific journals.
  sports: Harriet Igneri loves splash-filled afternoons with the Coastal Kids Swim Club, eagerly cheers for the local junior soccer team, the Seaside Sparrows, and watches the San Francisco Giants on TV,
    often mimicking their victory dances, while practicing balance on a mini-trampoline to boost her stamina for the upcoming summer beach volleyball camp.
  arts: Harriet Igneri expresses her love for nature through bright watercolor paintings of seashell mosaics, sings the Wiggles' 'Fruit Salad' at playground music time, and draws inspiration from the vivid
    colors of Claude Monet's water lilies, proudly displaying her artwork on the fridge after every beach outing.
  travel: Harriet Igneri prefers short, sand-filled family getaways to nearby tide-pool parks like the Outer Banks, dreams of snorkeling in the Great Barrier Reef and exploring the Galapagos Islands, and
    meticulously draws her travel wish-list in a scrapbook, though her adventures are modestly limited by school schedules and parental planning.
  culinary: Harriet Igneri delights in crunching on fish-shaped crackers, spreading peanut butter on banana slices for a quick snack, helping her mom whip up simple guacamole with ripe avocados and lime,
    and savors strawberry-filled yogurt parfaits topped with granola, though she often forgets to finish her vegetables at dinner.
  core: Harriet Igneri is an organized, worry-prone six-year-old who transforms beach shells into art, meticulously saves pennies, and can't resist a bubble-gum binge before bedtime, all while dreaming
    of becoming a marine scientist.
background:
  cultural: Harriet comes from a traditional white Southern family living in Ocean Isle Beach, North Carolina. Her upbringing blends coastal community traditions—such as family beach outings, local seafood
    festivals, and participation in neighborhood clean‑up events—with Southern hospitality and church‑based community gatherings. These experiences expose her to the natural beauty of the Atlantic coast,
    fostering a deep appreciation for marine environments and encouraging her artistic expression through local crafts and school art programs.
attributes:
  skills: '[''Reading simple books'', ''Basic addition and subtraction'', ''Drawing and painting'', ''LEGO and construction toys'', ''Organizing toys and materials'', ''Leading group play'']'
  hobbies: '[''Collecting shells'', ''Sandcastle building'', ''Exploring tide pools'', ''Drawing and painting'', ''Reading picture books'', ''Dancing and singing'', ''Solving puzzles'']'
  career_goals: Harriet dreams of becoming a marine biologist who explores tide pools and protects ocean ecosystems, inspired by her daily beach life. She also envisions herself as an illustrator, creating
    colorful books about sea creatures for other children. Her strong desire for achievement leads her to aim for top grades in school, to lead a future science club, and to earn recognition for her artwork.
    She hopes to combine her love of science and art to raise awareness about environmental stewardship.
