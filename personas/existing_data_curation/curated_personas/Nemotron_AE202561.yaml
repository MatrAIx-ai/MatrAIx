personas:
  professional: Jande Rainey, a one‑year‑old explorer, balances a budding curiosity about the world with a surprisingly practical streak, often testing toys and household objects while flexibly meandering
    through daily routines, yet displays a competitive spark when vying for attention and they react intensely to new stimuli.
  sports: Jande Rainey, a crawling one‑year‑old, shows a surprising enthusiasm for mini‑football drills in the living room, often dribbling a soft ball while cheering for the local club’s youth academy,
    and their parents enroll them in a toddler gymnastics class to nurture their competitive streak and flexible, relaxed approach to physical activity, and they love the rhythmic bounce of the foam mat.
  arts: Jande Rainey, whose days are filled with sing‑along nursery rhymes and colorful picture books, frequently mimics the gestures of a favorite animated actor from a family‑friendly movie, and a love
    for bright melodies by artists like Baby Mozart inspires them to babble rhythmically while clutching a plush dinosaur, and they often sway to the music as if dancing.
  travel: Jande Rainey, after an adventurous weekend getaway to a beachside resort in Florida and a brief stopover at a nearby natural history museum in Washington, eagerly gazes at picture books of Parisian
    parks, dreaming of future stroller strolls through the Luxembourg Gardens, while their parents balance relaxed itineraries with the flexibility needed for a toddler’s unpredictable schedule, and they
    giggle whenever the car ride offers a new view.
  culinary: Jande Rainey, who delights in smooth, warm pureed sweet potatoes and occasionally refuses the occasional spoonful of peas, shows a nascent palate for mild spices and enjoys watching their mother
    prepare simple, homemade applesauce with cinnamon, while their pragmatic curiosity leads them to experiment with grasping different textures at mealtime, and they often smile when the spoon makes a
    soft splash.
  core: Jande Rainey, a one‑year‑old with a surprisingly practical curiosity, competitive spark, and intense emotional swings, navigates the world with a flexible, sometimes disorganized rhythm, often demanding
    attention with a sudden cry yet calming quickly when a favorite toy is within reach, and they can flip from giggles to tears in the blink of an eye.
background:
  cultural: Jande is raised in Athens, Alabama, within a Black Southern community. Her upbringing reflects African‑American cultural traditions of church gatherings, gospel music, family barbecues, and
    community storytelling. She celebrates holidays such as Juneteenth and Thanksgiving with family, learns Southern dialect nuances, and experiences the warmth of close‑knit neighborhood ties that shape
    her early identity.
