  career_goals: She aims to secure a full‑time position in data analysis or environmental consulting where she can apply her analytical skills within a structured, collaborative environment. She is interested
    in roles that combine technical work with community impact, such as a sustainability analyst for a nonprofit or a data‑driven program coordinator for a local health initiative. In the medium term, she
    plans to pursue a master’s degree in public health or environmental science to deepen her expertise and eventually move into a leadership role that shapes evidence‑based policies and programs.
