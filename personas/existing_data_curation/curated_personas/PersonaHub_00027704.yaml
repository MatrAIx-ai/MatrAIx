persona_description: A conservationist who is deeply concerned about the impact of climate change on wildlife and their habitats. They are a senior global warming specialist at the National Wildlife Federation
  and have been advocating for climate change adaptation and mitigation for over 17 years. They are also a representative for the Sierra Club's Our Wild America campaign in Alaska and have been working
  closely with indigenous Alaskans from Shishmaref, a town on Sarichef Island in the Chukchi Sea, to fight against the threat of sea rise and relocation. They have a unique perspective on the intersection
  of environmental conservation and social justice advocacy.
