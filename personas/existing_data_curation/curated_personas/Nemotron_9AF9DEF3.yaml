  career_goals: Willie aims to advance to a regional sales director role within the next three years, overseeing a multi-state team and driving double-digit revenue growth for his company. He seeks to implement
    robust coaching programs that elevate junior reps and increase retention. In parallel, Willie plans to champion diversity and inclusion initiatives, leveraging his industry experience to mentor emerging
    Black professionals in manufacturing sales. Long-term, he envisions establishing his own consultancy that advises midsize manufacturers on building high-performing sales organizations while promoting
    ethical, community-focused business practices.
