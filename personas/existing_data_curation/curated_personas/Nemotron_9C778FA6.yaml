  career_goals: Randall aims to transition into a supervisory and mentorship role within the next few years. He plans to obtain a Certified Nursing Assistant (CNA) credential and enroll in a health administration
    certificate program to qualify for lead nursing‑assistant or unit‑coordinator positions. He also hopes to launch a small home‑care service that offers personalized support for seniors in Holtwood, allowing
    him to stay active in caregiving while shaping his own schedule for a semi‑retired lifestyle. Additionally, he wants to continue delivering health‑awareness workshops at the community center, leveraging
    his talkative nature to educate and inspire younger staff.
