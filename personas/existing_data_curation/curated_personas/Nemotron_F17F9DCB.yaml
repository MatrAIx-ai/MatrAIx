    ''Adaptability and flexible planning'']'
  hobbies: '[''Visiting museums and galleries'', ''Digital illustration and watercolor painting'', ''Photography'', ''Journaling and creative writing'', ''Listening to music (indie, lo-fi, Southeast Asian
    pop)'', ''Cooking and experimenting with Southeast Asian cuisine'', ''Exploring San Diego’s food scene'', ''Yoga and mindfulness meditation'', ''Hiking coastal trails (e.g., La Jolla)'', ''Volunteering
    at community art projects and cultural festivals'']'
  career_goals: Mimi aims to deepen her understanding of art and culture by completing a bachelor's degree in Art History or Cultural Studies, with a focus on Southeast Asian visual traditions. She envisions
    a career that blends creativity with community impact, such as working as a museum educator, cultural program coordinator, or digital content strategist for a nonprofit arts organization. In the short
    term, she plans to secure internships at local galleries or cultural centers in San Diego to gain hands-on experience in exhibit planning and public programming. She also hopes to develop a personal
    online platform where she can showcase emerging Southeast Asian artists and share curated content that bridges her artistic interests and cultural heritage. Over the longer term, Mimi dreams of establishing
    a community art space that offers workshops, exhibitions, and mentorship programs for young creators, especially those from under-represented backgrounds. She is motivated by a desire to make art accessible,
    to foster cross-cultural dialogue, and to build a sustainable career that aligns with her values of empathy, creativity, and flexible growth.
