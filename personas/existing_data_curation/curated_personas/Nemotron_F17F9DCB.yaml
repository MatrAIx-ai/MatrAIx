personas:
  professional: Mimi Setro is an aspiring museum educator and digital content strategist who blends their digital illustration, research, and bilingual communication abilities to create culturally resonant
    exhibits and online programs, while they navigate a relaxed attitude toward deadlines and occasional disorganization with flexible project tools.
  sports: Mimi Setro enjoys low‑key fitness activities such as sunrise yoga on the La Jolla shoreline and weekend hikes along the coastal trails, while cheering on the San Diego Padres in baseball and following
    the San Diego Wave FC in women’s soccer, yet they rarely participate in organized team sports.
  arts: Mimi Setro draws inspiration from street murals by Banksy, the immersive installations of Yayoi Kusama, indie folk melodies from Bon Iver, lo‑fi beats on YouTube, and contemporary pop artists that
    echo their cultural heritage, and they channel this eclectic mix into digital illustrations, watercolor collages, and short documentary videos for social media.
  travel: Mimi Setro prefers spontaneous yet purposeful trips, often planning weekend road‑trips to the sun‑kissed cliffs of Big Sur or culturally immersive stays in Kyoto, Japan, while they dream of a
    future study‑abroad semester in a capital celebrated for historic temples and bustling street markets, always seeking inspiration for their next artistic project.
  culinary: Mimi Setro loves experimenting in the kitchen, frequently recreating family recipes like aromatic broth noodles and savory rice‑flour pancakes while also crafting fusion dishes such as taco‑styled
    rice rolls and brunch plates inspired by dim sum flavors, and they never miss a chance to sample the city’s taco trucks, dim sum brunches, and artisanal coffee roasters.
  core: Mimi Setro is a creatively restless 18‑year‑old who balances an artistic passion for illustration and cultural storytelling with a relaxed, sometimes disorganized lifestyle, a habit of worrying
    about the future, and they love yoga, coffee, and spontaneous coastal hikes.
background:
  cultural: Mimi comes from a Southeast Asian family—her parents emigrated from Vietnam and maintain strong ties to their cultural heritage. Raised in San Diego’s vibrant multicultural neighborhoods, she
    grew up bilingual, speaking English at school and Vietnamese at home, which gave her a deep appreciation for both cultures. Family gatherings feature traditional celebrations such as Lunar New Year
    (Tet) and Mid-Autumn Festival, with rituals, music, and food that connect her to her roots. At the same time, she participates in typical American customs like Thanksgiving and Halloween, reflecting
    her integration into broader U.S. society. The blend of collectivist family values—respect for elders, communal responsibility—and the independent, exploratory spirit of her Californian environment
    shapes her worldview, fostering a respect for cultural diversity while encouraging personal creativity. The local Southeast Asian community in San Diego, including cultural centers and festivals, offers
    Mimi opportunities to engage with her heritage and share it with peers.
