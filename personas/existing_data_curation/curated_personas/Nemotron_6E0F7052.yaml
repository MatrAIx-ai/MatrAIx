  career_goals: Andres often talks about future jobs that blend his love of caring for living things with his curiosity about the world. He dreams of becoming a veterinarian so he can help animals stay
    healthy, especially dogs and horses he sees at the park. He also expresses fascination with outer space, imagining himself as an astronaut exploring new planets. Additionally, his desire to support
    his family and community leads him to consider roles like a teacher or firefighter, where he could provide safety and guidance to others. While these ambitions are still playful, he repeatedly asks
    his parents for encouragement, showing his need for reassurance that he can achieve his goals.
