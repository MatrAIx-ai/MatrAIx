personas:
  professional: Andres Castellanos, a budding junior architect in preschool, they love constructing block towers, meticulously arranging them before redesigning, displaying a balance of curiosity and practicality
    in play.
  sports: Andres Castellanos, a member of the Little League Tigers soccer team, they enjoy weekend dribbling drills, idolize Lionel Messi, prefer small‑group practice over large games, and often feel nervous
    before matches, balancing cooperation with a desire to assert themselves on the field.
  arts: Andres Castellanos, an enthusiastic kindergarten artist, they spend afternoons drawing dinosaurs, singing along to Sesame Street’s soundtrack, and admire the whimsical melodies of Disney’s “Moana”
    and the playful sketches of Dr. Seuss, though they can become shy performing in front of a crowd.
  travel: Andres Castellanos, a curious explorer, they love family road trips to the nearby state park where they collect pine cones, dream of visiting Disney World, and sometimes feel anxious about unfamiliar
    places, preferring well‑planned itineraries.
  culinary: Andres Castellanos, a budding junior chef, they prefer building mini pizza slices with mozzarella, tomato sauce, and pepperoni, enjoy crunchy carrot sticks, experiment with measuring cups, yet
    can be fussy about broccoli and occasionally hide leftovers for later.
  core: Andres Castellanos is a meticulous, worry‑prone five‑year‑old who balances imaginative play with orderly habits, loses focus when stress spikes, yet delights in collecting rocks and organizing block
    towers.
background:
  cultural: Andres grows up in a Mexican‑American household in San Mateo, California. His family maintains Mexican traditions, speaking Spanish at home, celebrating holidays like Dia de los Muertos and
    Las Posadas with colorful altars, pinatas, and traditional foods such as tacos and tamales. Extended family gatherings are frequent, reinforcing values of respect, community, and shared responsibility.
    At the same time, living in the diverse Bay Area exposes him to a blend of cultures, bilingual preschool programs, and a multicultural community. This hybrid environment nurtures his bilingual abilities,
    introduces him to both Mexican folk music and contemporary American children's media, and shapes a cultural identity that honors his heritage while embracing the broader Californian society.
