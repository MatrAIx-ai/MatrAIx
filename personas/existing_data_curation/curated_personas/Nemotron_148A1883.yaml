  career_goals: In retirement, Santos aspires to channel his lifelong curiosity into meaningful contributions to his community and personal legacy. He aims to author a memoir that intertwines his Mexican
    heritage with his experiences in Silicon Valley, while also curating an online blog that showcases Mexican folk art and DIY woodworking projects. He plans to obtain a certificate in museum studies to
    volunteer as a docent at the San Jose Museum of Art, focusing on multicultural exhibitions. Additionally, Santos wishes to mentor young immigrants interested in the visual arts, offering workshops from
    his home studio. Ultimately, his ambition is to preserve and share cultural narratives, enrich his own understanding through continuous learning, and leave a lasting educational resource for future
    generations.
