personas:
  professional: Surma Alvarez, a 52‑year‑old versatile designer, merges visual communication expertise, bilingual fluency, and a habit of meticulous project planning with a readiness to pivot on the fly,
    channeling their competitive drive and balanced curiosity into leading inclusive brand narratives that honor cultural storytelling.
  sports: Surma Alvarez channels their energetic sociability into weekly hikes along the San Diego coastline, participates in a local beach‑volleyball league, roots for the San Diego Padres and San Diego
    Wave FC, and joins the San Diego Running Club for spring marathons, balancing a competitive streak with a preference for collaborative workouts.
  arts: Surma Alvarez infuses their creative life with community mural projects inspired by the vivid palettes of Diego Rivera, showcases street‑photography at monthly pop‑up galleries, avidly reads contemporary
    authors like Valeria Luiselli, and revels in salsa nights featuring the music of Celia Cruz and Los Ángeles Azules, reflecting an outgoing, culturally rich artistic engagement.
  travel: Surma Alvarez prefers immersive travel that blends artistic discovery and personal curiosity, planning trips to Oaxaca’s crafts markets and Guanajuato’s historic murals while also taking weekend
    road trips to Joshua Tree, yet family obligations sometimes temper their enthusiasm for extended excursions.
  culinary: Surma Alvarez showcases a competitive flair in the kitchen, mastering mole poblano with pasilla and ancho chilies, chiles en nogada garnished with fresh pomegranate seeds, and tamales infused
    with epazote and nopal, often hosting elaborate family feasts that highlight these traditional flavors alongside experimental twists.
  core: Surma Alvarez is a competitively driven, culturally attuned designer who balances meticulous organization with spontaneous creativity, thriving on community involvement, vibrant artistic pursuits,
    and occasional indulgent splurges.
background:
  cultural: Surma was born and raised in San Marcos to Mexican immigrant parents who instilled a deep appreciation for Mexican culture, language, and community values. She grew up celebrating Día de los
    Muertos, listening to mariachi and regional folk music, and participating in neighborhood festivals that blend Mexican traditions with Southern California life. Bilingual and bicultural, she draws on
    her heritage—particularly Mexican folk art, vibrant color palettes, and storytelling motifs—to inform her design work and community involvement, while also embracing the progressive, multicultural atmosphere
    of the San Diego area.
