  hobbies: '[''Cooking traditional Mexican dishes'', ''Hiking coastal trails in San Diego County'', ''Volunteering on community mural projects'', ''Attending local design meetups'', ''Practicing yoga'',
    ''Street photography'', ''Reading contemporary Mexican literature'', ''Traveling to Mexico to explore regional art'', ''Dancing (salsa, cumbia)'', ''Gardening native plants'']'
  career_goals: Surma aims to transition into a senior creative leadership role, such as Creative Director, where she can shape strategic brand narratives for companies seeking culturally resonant design.
    She aspires to launch a boutique consultancy that specializes in inclusive design for diverse communities, mentor emerging designers—particularly those from underrepresented backgrounds—and spearhead
    large‑scale public art initiatives that celebrate Mexican heritage within the San Diego region.
