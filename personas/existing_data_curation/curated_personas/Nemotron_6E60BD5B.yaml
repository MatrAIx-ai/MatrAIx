personas:
  professional: James Mabery, a retired retail manager turned community arts facilitator, leverages decades of inventory control, budgeting, and people‑management expertise to organize senior‑center workshops,
    lead art‑craft events, and improvise solutions for local theater productions, all while embracing their flexible, curious nature.
  sports: James Mabery walks five miles a day with a local historic‑neighborhood walking group, follows the New York Yankees and Boston Red Sox with spirited debates at senior‑center watch parties, participates
    in weekly bridge and chess tournaments, and uses occasional light weight‑lifting at the community gym to keep hands steady for woodworking.
  arts: James Mabery immerses themselves in the visual and performing arts by painting watercolor seascapes of the Connecticut coast, photographing the turn of autumn foliage, volunteering as a docent at
    the town art museum, and acting in community theater productions, drawing inspiration from Monet, Winslow Homer, and contemporary folk musicians like Rhiannon Giddens.
  travel: James Mabery plans spontaneous trips to summer cultural festivals such as the Newport Folk Festival and the Portland Maine Lobster Fest, as well as scheduled visits to major museum exhibitions
    in New York, Washington, D.C., and Boston, balancing a modest travel budget with a love for exploring historic neighborhoods on foot.
  culinary: James Mabery experiments with New England seafood recipes—crafting lobster bisque, pan‑seared scallops with herb butter, and cedar‑plank salmon—while incorporating heirloom tomatoes, fresh rosemary,
    and lavender harvested from their garden, yet they sometimes over‑salt dishes in their enthusiasm for bold flavors.
  core: James Mabery is a curious, sociable 79‑year‑old who blends artistic passions with community leadership, embraces flexibility over strict schedules, and balances a competitive streak with a love
    for collaborative creation.
background:
  cultural: James is a third‑generation Anglo‑American from the Greater New Haven area. Raised in a post‑World War II suburban community, he grew up with traditional New England values of self‑reliance,
    modesty, and a strong sense of civic duty. His family’s roots trace back to early colonial New England settlers, and he was raised in a Congregational church that emphasized community service. The proximity
    to Yale and other cultural institutions fostered his lifelong curiosity about art, history, and new ideas. He celebrates regional traditions such as autumn apple picking, seafood dinners, and local
    folk festivals, while also embracing the diverse cultural influences that have reshaped the Connecticut shoreline over the decades.
