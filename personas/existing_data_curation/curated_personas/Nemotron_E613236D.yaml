  hobbies: '[''Morning beach walks'', ''Yoga'', ''Non‑fiction reading (business, psychology, history)'', ''Gardening'', ''Small‑group book club'', ''Volunteer financial literacy tutoring'', ''Mediterranean
    cooking'']'
  career_goals: Whitney aims to secure tenure and eventually serve as department chair, where she can shape the business program's strategic direction. She hopes to expand experiential learning opportunities
    by establishing a local entrepreneurship incubator that connects students with small businesses in Broward County. Publishing in peer‑reviewed journals on teaching innovation and business ethics is
    a priority, as is presenting her work at regional academic conferences. Whitney also envisions mentoring a cohort of early‑career faculty, fostering a culture of collaboration and continuous improvement
    within the college.
