personas:
  professional: Whitney Mcclory, a senior business education professor, blends their strategic management expertise, curriculum design acumen, and love for organized, predictable classroom environments
    to deliver rigorous case‑driven courses while meticulously overseeing departmental initiatives and fostering collaborative faculty mentorship.
  sports: Whitney Mcclory begins each day with a brisk run along Fort Lauderdale’s beach, attends weekly Pilates sessions at the Seaside Wellness Club, plays doubles tennis at Flamingo Gate Country Club
    on weekends, and quietly roots for the Miami Heat while following the Fort Lauderdale Strikers during the spring soccer season, a routine they find both grounding and energizing.
  arts: Whitney Mcclory enjoys attending performances at the Broward Center for the Performing Arts, listening to piano compositions by Ludovico Einaudi, and regularly visiting exhibitions featuring local
    painter Jillian Stone’s Mediterranean‑inspired canvases, a curated aesthetic experience they consider both soothing and intellectually stimulating.
  travel: Whitney Mcclory prefers meticulously planned trips that blend gardening workshops in Tuscany’s Chianti region with culinary tours of Barcelona’s tapas bars, and they also enjoy occasional weekend
    getaways to the Florida Keys for quiet beach walks and sunset photography.
  culinary: Whitney Mcclory enjoys preparing Mediterranean meals—such as herb‑marinated grilled branzino, roasted vegetable ratatouille seasoned with oregano and fresh basil, and a silky homemade hummus
    flavored with tahini, lemon juice, and plenty of garlic—though they sometimes over‑salt dishes in their quest for bold flavor.
  core: Whitney Mcclory, a detail‑driven business professor who thrives on structured routines, balances their disciplined teaching style with spontaneous Mediterranean cooking experiments, and occasionally
    postpones dental appointments despite a well‑kept budget.
background:
  cultural: Whitney grew up in a predominantly white, middle‑class suburb of the Midwest, where values of self‑reliance and community involvement were emphasized. After completing her graduate business
    degree, she relocated to South Florida, where she has adapted to the region’s multicultural vibe while maintaining her core cultural identity. She appreciates the Southern hospitality she brings from
    her upbringing, which manifests in her warm, cooperative approach to colleagues and students. Living in Fort Lauderdale’s diverse Broward County has broadened her exposure to Latin American and Caribbean
    influences, shaping a cultural perspective that balances traditional American norms with an openness to multicultural collaboration.
attributes:
