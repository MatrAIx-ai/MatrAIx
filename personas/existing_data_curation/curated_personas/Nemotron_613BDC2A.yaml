  hobbies: '[''Reading speculative fiction'', ''Watercolor painting'', ''Urban‑exploration photography'', ''Puzzle‑solving and board games'', ''Mindfulness journaling'', ''Hiking and nature walks'', ''Indie
    folk music listening'', ''Local theater attendance'', ''Art fair participation'']'
  career_goals: Abbey aims to complete her associate degree in Criminal Justice and eventually earn a bachelor's in Security Management or Cyber‑Security. She envisions moving from frontline surveillance
    to a senior analyst role, specializing in predictive analytics for casino security. Long‑term, she hopes to become a security manager who integrates cutting‑edge technology with creative, human‑centered
    protocols. She also dreams of fostering a supportive work environment that prioritizes mental health, reflecting her own sensitivity to stress, and perhaps mentoring younger officers who share her imaginative
    outlook.
