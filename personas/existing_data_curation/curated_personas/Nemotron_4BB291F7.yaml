  career_goals: John aims to transition into a senior technical consultant role within the next two years, focusing on guiding large infrastructure projects toward sustainable and cost‑effective outcomes.
    He is passionate about mentoring the next generation of engineers, planning to establish a structured apprenticeship program at his firm that blends hands‑on learning with emerging digital tools. While
    pursuing these professional milestones, John also seeks a better work‑life balance to reduce stress, intending to allocate more time for strategic planning rather than day‑to‑day operational firefighting.
    Ultimately, he envisions retiring with a reputation for having modernized regional engineering practices while maintaining strong community ties.
