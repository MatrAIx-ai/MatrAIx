persona_description: A water expert who is concerned about the depletion and scarcity of fresh water resources in the United States and is seeking solutions to prevent a potential water war with Canada.
  They are aware of the rising water prices in the US and the deteriorating water infrastructure, and are concerned about the impact of human populations on water resources. They are interested in understanding
  the causes of the water crisis in the US, including decaying infrastructure and reliance on non-renewable water sources. They are also aware of the impact of sprawling human populations on water resources
  in water-scarce areas, and are looking for solutions to address this issue.
