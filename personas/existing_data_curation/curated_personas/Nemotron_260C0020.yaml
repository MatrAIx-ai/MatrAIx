personas:
  professional: Franklin Bedwell, a management analyst transitioning toward senior consulting leadership, leverages Excel and SQL‑driven data analysis, financial modeling, and process‑improvement expertise
    into persuasive presentations, while their talkative, competitive nature and preference for flexible, adaptable approaches make them a natural facilitator who thrives on stakeholder interaction and
    spotting efficiency gains.
  sports: Franklin Bedwell, an avid fan of the Buffalo Bills and Buffalo Sabres, spends Saturday mornings playing pickup soccer with the Upstate Runners club and joins a casual intramural basketball league
    at the local gym, favoring spontaneous weekend workouts over regimented training plans.
  arts: Franklin Bedwell, who thrives on improvisational comedy nights and local music festivals, regularly streams performances by The National, Mumford & Sons, and the improv troupe The Second City, while
    their love for storytelling fuels frequent attendance at off‑Broadway shows featuring Lin‑Manuel Miranda’s work.
  travel: Franklin Bedwell combines a love for cultural immersion and culinary experimentation by backpacking through Kyoto, Portugal’s Porto, and New Orleans—where they perfected a gumbo recipe—while planning
    a future culinary‑focused trek across Morocco’s Marrakech souks and Patagonia’s glacier trails, favoring flexible itineraries over rigid schedules despite a modest travel budget.
  culinary: Franklin Bedwell, a self‑taught home chef, delights in crafting farm‑to‑table dishes such as miso‑based ramen infused with garden‑grown corn, herb‑crusted salmon with dill and lemon, and roasted
    beet salad topped with goat cheese and walnuts, often hosting friends for experimental dinner parties that showcase seasonal ingredients.
  core: Franklin Bedwell, a charismatic 36‑year‑old analyst, turns data into strategy with a talkative, competitive flair, yet habitually misplaces their keys and overbooks their calendar with festivals,
    balancing relentless curiosity with a laid‑back approach to planning.
background:
  cultural: Franklin comes from a middle‑class, white family with mixed Irish, Italian, and German ancestry that has lived in upstate New York for generations. He was raised in the suburban‑rural environment
    of Palmyra, Wayne County, where community ties, self‑reliance, and a practical work ethic are valued. His upbringing included modest Catholic traditions blended with the region’s broader Protestant
    influences, fostering a respect for both tradition and open‑minded curiosity. The local culture of small‑town camaraderie, seasonal farming cycles, and proximity to the Finger Lakes region shapes his
    love for outdoor activities, local food, and community festivals.
attributes:
  skills: '["Data analysis", "Financial modeling", "Project coordination", "Stakeholder communication", "Strategic planning", "Presentation and public speaking", "Negotiation", "Process improvement", "Problem
