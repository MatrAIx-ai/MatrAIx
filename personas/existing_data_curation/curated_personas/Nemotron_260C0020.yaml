  hobbies: '["Attending local festivals and community events", "Live music and concerts", "Improv comedy workshops", "Traveling and cultural exploration", "Reading non‑fiction (business, psychology, technology)",
    "Cooking and recipe experimentation", "Gardening", "Board games and trivia nights", "Volunteering at community events"]'
  career_goals: Franklin aims to advance into senior leadership within the consulting realm, targeting a director‑level role where he can shape enterprise‑wide strategy and mentor junior analysts. He aspires
    to lead cross‑functional teams on high‑impact projects, eventually launching his own boutique consulting practice focused on operational efficiency for mid‑size firms in upstate New York. He also hopes
    to become a recognized speaker at industry conferences, sharing his practical insights on balancing analytical rigor with flexible problem‑solving.
