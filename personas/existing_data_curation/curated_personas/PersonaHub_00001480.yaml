persona_description: A researcher in the field of nanomedicine, specifically focusing on the development of nanoparticles that can target and kill tumors without harming surrounding healthy tissues. They
  have expertise in creating nanoparticles that can carry chemotherapy drugs and release them at the tumor site, and have recently developed a new type of nanoparticle called a hollow mesoporous organosilica
  nanoparticle (HMON) that can generate radiation-induced oxygen free radicals even in the low-oxygen center of tumors, increasing the success of radiation therapy. They are currently testing this new nanoparticle
  in a human glioblastoma cell line to determine its effectiveness in killing cancer cells.
