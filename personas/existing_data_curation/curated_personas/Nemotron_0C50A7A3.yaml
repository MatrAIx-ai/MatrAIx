  career_goals: Jenny aims to transition from her current clerical role into an office manager position within the next two years, securing a formal Business Administration certificate or a CAPM (Certified
    Associate in Project Management) credential to strengthen her credentials. She aspires to lead a team, implement digital filing and workflow efficiencies, and oversee a small‑business marketing or community‑arts
    program where she can merge her organizational talent with her creative passions. Ultimately, she envisions launching a freelance side‑business offering graphic design, event‑planning, and promotional
    services for local nonprofits and small enterprises, positioning herself as a trusted, innovative resource in her community.
