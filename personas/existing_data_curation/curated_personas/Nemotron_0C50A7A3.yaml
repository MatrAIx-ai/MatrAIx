personas:
  professional: Jenny Rikard is a detail‑oriented office professional who uses their Excel expertise and Canva flair to streamline administrative workflows while channeling their imagination into eye‑catching
    event promotions, and they maintain a healthy skepticism toward vague corporate directives as they pursue a Business Administration certificate to step into an office manager role.
  sports: Jenny Rikard enjoys hiking the mist‑covered ridges of the Great Smoky Mountains as a solo endurance challenge, roots for the Tennessee Volunteers football team and the Nashville Predators on Sundays,
    and participates in a local women's recreational tennis league where their competitive streak drives them to improve their serve each season.
  arts: Jenny Rikard paints watercolor scenes inspired by the bluegrass sounds of Alison Krauss, reads Brandon Sanderson fantasy novels, designs flyers featuring a blend of folk motifs and modern typography,
    and volunteers onstage and behind the curtains in community theater productions of "A Streetcar Named Desire", illustrating a deep love for both classic and contemporary artistic expressions.
  travel: Jenny Rikard favors weekend road trips to Appalachian trailheads like Roan Mountain, cherishes past visits to Asheville’s art districts and New Orleans’ jazz festivals, dreams of a cultural pilgrimage
    to Edinburgh’s literary festivals, but balances wanderlust with budget‑conscious planning using travel apps and a modest savings plan.
  culinary: Jenny Rikard delights in cooking traditional Southern dishes such as shrimp and grits and collard greens, often giving them a modern twist with a splash of sriracha or quinoa, and they regularly
    grow heirloom tomatoes, sweet potatoes, and fresh basil in their garden to incorporate into experimental weekly dinner parties.
  core: Jenny Rikard blends Southern hospitality with a restless creative spirit, juggling a meticulous office routine, a competitive edge, daily anxiety, and an endless queue of craft projects that sometimes
    overpower their ability to say no.
background:
  cultural: Jenny grew up in Kodak, a small town in Jefferson County, Tennessee, steeped in Appalachian and Southern cultural traditions. Her family traces its roots to English and Scots‑Irish settlers
    who farmed the hills for generations, instilling a strong sense of hospitality, community, and respect for hard work. Local customs such as church gatherings, county fairs, and storytelling sessions
    shaped her social outlook, while a love for country and bluegrass music provided a soundtrack to her upbringing. The conservative, family‑centered values of the region coexist with her personal drive
    to explore novelty and artistic expression, creating a blend of traditional Southern warmth and a modern, curiosity‑fueled outlook.
