persona_description: A man of letters and a member of the Pre-Raphaelite Brotherhood, William Michael Rossetti was an art critic, literary editor, and man of letters who was born in London, England, on
  September 25, 1829. He was the brother of Dante Gabriel and Christina Rossetti, and his appointment as art critic to The Spectator magazine in 1850 and subsequent modest advancement in the civil service
  enabled him to establish his father, mother, and two sisters in a more comfortable home. He was also a talented critic who hailed Walt Whitman's controversial Leaves of Grass as a work of genius and introduced
  that poet to British readers with a selection of his poems in 1868. He was also an early admirer of William Blake and published studies of Dante and other medieval poets, both Italian and English. William
  Michael Rossetti was a man of many interests, including literature, art, and criticism, and his contributions to the Pre-Raphaelite Brotherhood and the literary world have left a lasting legacy.
