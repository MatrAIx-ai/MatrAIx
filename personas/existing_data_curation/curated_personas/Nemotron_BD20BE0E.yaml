personas:
  professional: Amelia Santos is a veteran HVAC-R technician with over three decades of hands-on experience in Houston's residential and small-commercial sector, leveraging EPA-608 certification, electrical
    diagnostics, and blueprint reading to deliver meticulous, safety-first service while quietly mentoring apprentices and championing low-stress, high-efficiency upgrades for underserved neighborhoods.
  sports: Amelia Santos follows the Houston Astros and the Houston Rockets, plays in a local adult softball league at the Houston Parks & Recreation Center, and sustains personal fitness through early-morning
    walks around Hermann Park and weekend bike rides along the Buffalo Bayou Trail, favoring low-impact activities that suit their solitary preference.
  arts: Amelia Santos finds solace in classic Mexican folk music, regularly listening to Lila Downs, Los Tigres del Norte, and the Mariachi Vargas ensemble, while also diving into science-fiction novels
    by Isaac Asimov and quietly attending Dia de los Muertos altar displays that showcase local artisans.
  travel: Amelia Santos prefers low-key travel, having explored the historic streets of Oaxaca and the serene high desert of White Sands, New Mexico, and now dreams of a solo retreat in a cedar-shaded cabin
    in the Texas Hill Country, always planning trips months in advance to balance budget constraints with a desire for peaceful immersion.
  culinary: Amelia Santos channels garden-grown cilantro, oregano, and other herbs into classic mole poblano, tamales de elote, and salsa verde, constantly experimenting with family recipes that blend tradition
    and personal twists, though they occasionally over-salt dishes while chasing depth of flavor.
  core: Amelia Santos merges quiet curiosity with disciplined craftsmanship, balancing solitary garden rituals, methodical HVAC troubleshooting, and a steadfast commitment to mentoring, even as over-planning
    and an aversion to social gatherings keep their world comfortably contained.
background:
  cultural: Amelia is a first‑generation Mexican American raised in Houston’s East End, a neighborhood steeped in Latino culture. Her family emphasized hard work, respect for elders, and a love for Mexican
    culinary and musical traditions. Bilingual in Spanish and English, she celebrates cultural holidays such as Dia de los Muertos and Cinco de Mayo, often preparing homemade foods for family gatherings.
    Although she left formal schooling before ninth grade, the strong sense of community and the value placed on practical, hands‑on skills have shaped her dependable, cooperative nature while also reinforcing
    her preference for solitary, focused work.
