  career_goals: Amelia aims to transition from full‑time field work to a mentorship and advisory role. She plans to obtain a Master HVAC Technician credential, lead a small, collaborative crew, and establish
    a part‑time consulting practice that helps low‑income Houston neighborhoods adopt energy‑efficient HVAC upgrades. Her ambition includes mentoring apprentices—particularly women and Hispanic youth—while
    preserving the low‑stress, focused work environment she values.
