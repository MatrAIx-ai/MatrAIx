  career_goals: Johnathon aims to turn his artistic passions into a sustainable livelihood by establishing a community-focused art hub in Breckenridge that offers workshops, pop-up exhibitions, and collaborative
    projects. He seeks to secure grants, commissions, and sales of original works to fund the space, while also touring regional festivals as a storyteller and performer. Over the long term he envisions
    becoming a recognized cultural catalyst in Summit County, fostering connections among artists, locals, and visitors and promoting innovative, inclusive creative experiences.
