personas:
  professional: Johnathon Eagan works as a multidisciplinary artist‑organizer, designing murals, conducting open‑mic storytelling sessions, and curating pop‑up exhibitions, using Procreate, Photoshop, and
    woodshop skills, with a charismatic, improvisational style that thrives on spontaneous collaboration despite a habit of loosely structured schedules.
  sports: Johnathon Eagan is an avid hiker and powder skier, a season ticket holder of the Colorado Avalanche, an occasional Denver Broncos fan, and a member of the Breckenridge Alpine Club, which organizes
    weekly trail runs and weekend backcountry expeditions.
  arts: Johnathon Eagan crafts ink sketches of mountain vistas, performs original poetry at open‑mic nights alongside acoustic renditions of Joni Mitchell covers, volunteers at the Breckenridge Arts Festival,
    and draws inspiration from surrealist artists like René Magritte and contemporary digital collagist Beeple.
  travel: Johnathon Eagan prefers spontaneous road trips to high‑altitude destinations—such as a midnight drive to Great Sand Dunes for stargazing, a weekend trek to Banff, and a planned visit to Iceland’s
    Aurora‑rich skies—balancing a modest travel budget with occasional splurges on boutique hostels that double as creative retreats.
  culinary: Johnathon Eagan loves craft breweries like New Belgium and local brews, enjoys cooking Colorado trout with lemon‑caper butter and roasted quinoa, frequently experiments with spicy green chili
    stew and homemade kimchi, and delights in pairing meals with hoppy beers.
  core: Johnathon Eagan is a free‑spirited creative catalyst who seamlessly merges art, community, and nature, yet habitually misplaces deadlines and lives on a steady stream of coffee and craft beer.
background:
  cultural: Johnathon is a white American whose family roots trace back to the Midwest, with Irish-English ancestry. Growing up in a small town, he developed a love for hands-on learning and curiosity about
    the wider world. In his twenties he moved to the mountains of Colorado, drawn by the region's blend of rugged outdoor lifestyle and vibrant arts community. Living in Breckenridge, he embraces the local
    mountain culture that values self-reliance, environmental appreciation, and collaborative creativity. He respects the area's history, including the legacy of mining towns and the traditions of the indigenous
    Ute peoples, and integrates these influences into his artistic perspective.
