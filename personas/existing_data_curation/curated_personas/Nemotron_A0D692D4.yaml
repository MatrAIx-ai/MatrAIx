personas:
  professional: Geoffrey Thompson, a disciplined 56-year-old handyman-fisherman residing along the Chesapeake Bay, leverages his meticulous project-planning, carpentry, and boat-maintenance expertise to
    deliver reliable, schedule-bound repair contracts while pursuing a GED, a home-maintenance certification, and mentoring local youth in trade skills.
  sports: Geoffrey Thompson, an early-morning fisherman on the Patuxent River, follows the Baltimore Orioles and the Washington Capitals, occasionally participates in a senior softball league for gentle
    exercise, and prefers low-impact activities like daily garden walks to sustain stamina.
  arts: Geoffrey Thompson, a quiet aficionado of practical crafts, spends evenings listening to folk legends like Woody Guthrie and the bluegrass trio the Steeldrivers while admiring Winslow Homer's maritime
    paintings, and occasionally visits the Baltimore Museum of Art to study historic furniture design for inspiration in his woodworking.
  travel: Geoffrey Thompson, favoring low-key, well-planned escapades, takes yearly weekend drives to the Shenandoah Valley for hiking, enjoys seasonal trips to the Outer Banks for extended fishing charters,
    and dreams of a modest, budget-friendly cruise to the Bahamas as a retirement milestone.
  culinary: Geoffrey Thompson, a simple-palate home-cook, favors freshly-caught perch pan-fried with lemon and dill alongside a garden-grown ratatouille of heirloom tomatoes, corn, and basil, avoids processed
    foods, and occasionally treats themselves to a cold local craft IPA after a long woodworking session.
  core: Geoffrey Thompson is a methodical, solitary 56-year-old who channels his routine-driven discipline into handyman work, fishing, and woodworking, while quietly wrestling with worry-induced stress
    and a touch of stubborn perfectionism.
background:
  cultural: Geoffrey hails from a long‑standing, working‑class white family rooted in the Mid‑Atlantic Chesapeake Bay region. Raised in a modest household that emphasized self‑reliance, hard work, and community
    involvement, he internalized traditional values and a practical outlook. His cultural identity is tied to the rhythms of the water‑based economy, local church traditions, and the close‑knit social fabric
    of Calvert County’s small towns.
attributes:
  skills: '["Carpentry", "Home Repair", "Mechanical Troubleshooting", "Budget Management", "Project Planning", "Boat Maintenance", "Gardening"]'
  hobbies: '["Fishing", "Gardening", "Woodworking", "Model Boat Building", "Reading Practical Manuals", "Men’s Bible Study", "Volunteer Equipment Maintenance"]'
  career_goals: Although currently not in the formal workforce, Geoffrey aims to formalize his practical skill set by earning a GED and a certification in home maintenance, which would allow him to take
    on occasional paid handyman contracts for neighbors. He also hopes to mentor local youth interested in trades, passing on his meticulous work ethic and routine‑focused approach. Ultimately, he envisions
    running a modest, home‑based repair service that provides a predictable schedule and steady supplemental income for his family.
