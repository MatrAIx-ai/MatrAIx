  career_goals: Per dreams of turning his love for art and curiosity about the world into a future career that blends both, such as becoming an illustrator, animator, or concept artist. He wishes to create
    visual stories that inspire other kids, possibly publishing graphic novels or making educational videos. He also hopes to travel and explore different cultures to enrich his artistic perspective, and
    he imagines one day leading community art workshops in his hometown to help younger children discover their own creativity.
