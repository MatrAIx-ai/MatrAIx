personas:
  professional: Per Raynor, an aspiring junior illustrator and budding Scratch game developer, blends fierce curiosity with a laid‑back, flexible approach, turning sketchbooks of animals, landscapes and
    storybook characters into lively digital adventures while happily letting ideas wander without strict deadlines.
  sports: Per Raynor plays forward for the River Valley Rangers youth soccer club, cheers for the Seattle Seahawks during football season, and spends free weekends cycling, hiking, and climbing trees in
    the nearby woods, preferring spontaneous, fun‑focused activity over regimented training.
  arts: Per Raynor devotes hours to sketching in the style of Shaun Tan, enjoys listening to Yiruma’s piano lullabies while painting murals, and draws inspiration from Hayao Miyazaki’s animated worlds and
    the graphic novel series ‘Amulet’, merging these influences into vibrant personal artwork.
  travel: Per Raynor loves spontaneous weekend trips to state parks like Yellowstone, dreams of backpacking through the Canadian Rockies to see the northern lights, and prefers low‑key, nature‑centered
    adventures over crowded tourist attractions, always packing a sketchbook for on‑the‑go inspiration.
  culinary: Per Raynor favors simple, tasty meals like pepperoni pizza, homemade peanut butter and banana sandwiches, and enjoys crafting fruit salads with apples, strawberries and blueberries, while their
    beginner cooking skills are limited to microwaving popcorn and stirring pancake batter.
  core: Per Raynor is a curious, art‑obsessed 11‑year‑old who balances a love of sketching, LEGO building and Scratch coding with a relaxed attitude toward chores, money and routine, often misplacing pencils
    but never missing a chance to explore nature.
background:
  cultural: Per was raised in a close‑knit, predominantly white community in Texarkana, Arkansas, where southern hospitality and community involvement are central values. His family participates in church
    gatherings, county fairs, and high school football traditions, exposing him to a blend of Arkansas and Texas cultural influences. Local music ranges from country to blues, and he often hears stories
    of the Arkansas Delta’s natural heritage. These experiences foster a strong sense of neighborly support, appreciation for outdoor activities, and curiosity about the broader world, all of which shape
    his outlook and interests.
