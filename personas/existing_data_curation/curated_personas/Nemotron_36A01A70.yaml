personas:
  professional: Hanna Wilson is an aspiring junior architect whose love for structure and imaginative play shines through elaborate LEGO creations, and they channel this practical mindset into meticulously
    planning each build as if drafting blueprints for future skyscrapers.
  sports: Hanna Wilson plays midfield for the local youth soccer club 'Riverdale Rovers,' cheers for Chicago Fire FC in the MLS, admires the strategic brilliance of USWNT forward Megan Rapinoe, and they
    balance set‑piece drills with the camaraderie of after‑practice ice‑cream socials.
  arts: Hanna Wilson draws vibrant comic strips inspired by the humor of Dav Pilkey and the storytelling of Jeff Smith, spends weekends flipping through graphic novels like 'Amulet,' and they channel that
    creativity into LEGO storytelling scenes, often reenacting favorite panels with their builds.
  travel: Hanna Wilson has explored the Redwood National Park on family nature hikes, visited the interactive science museum in San Jose, and they dream of traveling to Billund, Denmark to tour the LEGO
    House and the nearby seaside town of Aarhus for an ultimate LEGO pilgrimage.
  culinary: Hanna Wilson enjoys assembling snack‑time pizza bagels topped with mozzarella, pepperoni, and a dash of oregano, relishes making homemade guacamole with ripe avocados and lime, and they delight
    in trying a bite‑size Icelandic skyr parfait with fresh berries during weekend brunches.
  core: Hanna Wilson is a detail‑obsessed nine‑year‑old who balances LEGO engineering, mystery reading, soccer teamwork, and comic drawing while maintaining a structured allowance routine and a pragmatic
    approach to their mild allergies.
background:
  cultural: Hanna is raised in a middle‑class White family in Dayton, Greene County, Ohio. Her upbringing reflects typical Midwestern values of hard work, community involvement, and modesty. Family traditions
    include celebrating seasonal holidays with potluck gatherings, attending Sunday school at the local church, and participating in community events such as the Ohio State Fair and local farmers’ markets.
    Her school emphasizes a structured curriculum, extracurricular clubs, and a supportive environment, which aligns with her preference for predictability and organized routines.
attributes:
