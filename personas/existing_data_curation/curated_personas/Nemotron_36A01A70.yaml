  hobbies: '[''Building LEGO models'', ''Reading adventure/mystery books'', ''Community soccer'', ''Drawing comic strips'', ''Exploring nature trails'', ''Shelving books at the school library'', ''Kids’
    Sudoku puzzles'']'
  career_goals: Hanna dreams of a future where she can help living things and share knowledge. She is drawn to becoming a veterinarian because she loves caring for animals and enjoys the orderly process
    of diagnosing and treating them. She also imagines herself as a teacher one day, guiding younger children through structured lessons and creating a supportive classroom environment. Her short‑term goal
    is to earn a science badge in the Girl Scouts and keep improving her reading speed.
