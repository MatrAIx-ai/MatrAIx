persona_description: A researcher from RMIT University in Melbourne who specializes in food waste reduction and packaging design. She has conducted research on the role of packaging in minimising food waste
  in the supply chain of the future and has identified opportunities for improvement through innovative and sustainable primary, secondary and tertiary packaging. She has also identified that food waste
  is avoidable through things such as poor inventory management, overstocking of shelves, and product damage during transport and handling.
