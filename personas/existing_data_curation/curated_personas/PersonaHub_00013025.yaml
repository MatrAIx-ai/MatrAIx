persona_description: A musicologist and sociologist who is interested in the intersection of music and urban spaces. They are knowledgeable in the study of musicology, urban geography, and cultural theory,
  and have experience working with urban music and its cultural significance. They are passionate about understanding how music is used to construct social and economic networks, and how it reflects the
  local definition of urban, suburban, or rural environments. They are eager to learn from West Philly students and develop their musical and sociological skills in analyzing how music is a marker of cultural
  identification.
