personas:
  professional: Darthy Martin, a budding preschool explorer, turns every playtime into a mini‑project, using their natural curiosity and practical mindset to sort, build, and share toys, while their compassionate
    nature makes them the go‑to helper for classmates in need.
  sports: Darthy Martin, an energetic littlest member of the Grand Haven Lions Jr. Soccer team, splashes confidently in the shallow lake waters during family beach days, trades high‑fives after every small
    goal, and treats the playground’s climbing net as a personal fitness circuit, though they often forget to stretch before a game, leading to a few wobbling knees.
  arts: Darthy Martin, a pint‑size artist, spends afternoons finger‑painting bright sunrise scenes of Lake Michigan, hums along to Raffi's 'Baby Beluga' and The Wiggles' 'Fruit Salad' while crocheting paper
    chains for the town’s summer festival, collects glittery stickers from the local library’s storytime, channeling their compassion into sharing their creations with classmates, and they proudly display
    their artwork on the classroom wall.
  travel: Darthy Martin, an adventurous four‑year‑old, eagerly packs their favorite stuffed turtle for weekend trips to the sandy shores of Grand Haven beach, dishes out simple maps for family road trips
    to Chicago’s Navy Pier and Dudley Farm for a taste of farm life, and they dream of one‑day sailing on the Great Lakes while their parents budget the vacations with a modest allowance from holiday savings.
  culinary: Darthy Martin, a budding mini‑chef, delights in scooping macaroni into a bowl, arranging chicken nuggets into smiley faces, spreading peanut butter on whole‑grain toast with a tiny plastic spatula,
    and swearing by the crunch of strawberry‑filled rice krispie treats—though they stubbornly refuse any green vegetable unless it’s secretly hidden under cheese.
  core: Darthy Martin navigates the world with childlike curiosity and a heart full of compassion, juggling a love for lakeside adventures and crayons while occasionally worrying over tiny mishaps and forgetting
    to wear their coat on breezy mornings.
background:
  cultural: Darthy is raised in a white, middle‑class family in Grand Haven, Michigan, a small Midwestern community known for its lakeshore lifestyle. Her family participates in typical local traditions
    such as summer beach outings, community festivals, and holiday celebrations rooted in Protestant and secular customs. She attends a local preschool that emphasizes collaborative play, early literacy,
    and respect for the natural environment around Lake Michigan. The community’s values of friendliness, modesty, and helping neighbors shape her compassionate outlook.
