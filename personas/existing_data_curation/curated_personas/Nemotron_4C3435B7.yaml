  career_goals: Although only four, Darthy already expresses a desire to help others. She often says she wants to be a "teacher" or "nurse" because she likes caring for her stuffed animals and friends.
    She dreams of working at the local library or zoo, where she can share knowledge about animals and books, and she imagines growing up as someone who makes people feel safe and happy. Her ambition is
    guided by her compassionate nature and her curiosity about how things work.
