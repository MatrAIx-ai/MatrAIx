  hobbies: '[''Hiking in the Cascades'', ''Kayaking on Lake Washington'', ''Community clean-up volunteering'', ''Tech meetups and hackathons'', ''Improv comedy'', ''Board-game nights'', ''Spin classes'',
    ''Yoga'', ''Reading contemporary science-fiction'', ''Listening to tech podcasts'']'
  career_goals: Neeta aims to secure an entry-level role as a data analyst or software engineer within a company that values structured processes and collaborative culture. She hopes to leverage her analytical
    skills to inform data-driven decisions, while also contributing to projects that have social or environmental impact. In the medium term she intends to pursue professional certifications (e.g., AWS
    Solutions Architect, Certified Data Analyst) and eventually move into a product-management or technical-lead position where she can shape project roadmaps and mentor junior teammates. Additionally,
    she is exploring the possibility of launching a community-focused tech initiative that provides coding workshops for under-represented youth in Seattle.
