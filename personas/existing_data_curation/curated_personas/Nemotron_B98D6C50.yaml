  career_goals: Joey aims to deepen his artistic practice by mastering watercolor and digital sketching, and to document his family’s genealogy and stories in a memoir that he hopes to self‑publish. He
    aspires to design and plant a sustainable pollinator garden on his property, and to create handcrafted furniture pieces that reflect Southern folk art. Although he prefers solitude, Joey wishes to share
    his craft skills occasionally through one‑on‑one mentorship with local youth, and to participate in community art exhibits on his own terms.
