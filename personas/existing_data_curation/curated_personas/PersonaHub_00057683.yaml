persona_description: A geologist who specializes in the study of continental drift and supercontinent formation, Ross Mitchell is a leading expert in this field. He has conducted extensive research on the
  ancient magnetism of geological samples and has proposed a new model for how supercontinents form, which suggests that the next supercontinent, 'Amasia', will not form on the equator but around the North
  Pole. Mitchell's work has implications for our understanding of how continents move and interact, and his research is likely to be of interest to geologists, paleontologists, and other scientists working
  in the field of continental drift.
