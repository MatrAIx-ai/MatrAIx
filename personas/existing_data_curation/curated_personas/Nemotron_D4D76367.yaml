  career_goals: James aims to move from his current supervisory role into a regional sales manager position within the next three to five years, eventually targeting a director-level role that allows him
    to shape sales operations across multiple states. He plans to earn an associate's degree in Business Administration, followed by a bachelor's degree, to strengthen his strategic credentials. He is also
    interested in championing the adoption of emerging sales technologies such as AI-assisted lead scoring while preserving the personal, relationship-focused approach that has driven his team's success.
    Mentoring the next generation of sales leaders and contributing to community economic development initiatives are long-term ambitions.
