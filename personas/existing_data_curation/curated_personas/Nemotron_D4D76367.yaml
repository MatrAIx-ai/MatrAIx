personas:
  professional: James Cole leads a Midwest B2B field‑sales team, blending fifteen years of relationship‑building with a data‑driven curiosity that pushes them to pilot AI‑assisted lead scoring while insisting
    every new tool remains cost‑effective and scalable.
  sports: James Cole plays third base for the Columbus Cyclones adult softball league, coaches a youth soccer team at the Oak Ridge Community Center, follows the Cleveland Browns, Cincinnati Bengals, and
    Cleveland Guardians, and maintains fitness through weekly games and weekend fishing trips on Lake Erie.
  arts: James Cole unwinds by listening to Bruce Springsteen and The Rolling Stones, attends occasional performances by the Cincinnati Symphony Orchestra, and binge‑listens to science‑focused podcasts like
    Reply All while devouring popular‑science titles such as The Gene.
  travel: James Cole prefers spontaneous road trips, having recently fished on Lake Erie and toured Mackinac Island, while dreaming of a cross‑country drive to Austin for its music scene and planning a
    family vacation to the Florida Keys when their budget permits.
  culinary: James Cole enjoys grilling smoked bratwurst and BBQ pulled pork, topping homemade pizza with fresh mozzarella and pepperoni, and often cooks the trout they catch on lake trips, though they occasionally
    over‑season dishes because they love bold flavors.
  core: James Cole is a sociable sales leader who balances a love for team sports, car restoration, and tech tinkering with a laid‑back approach to planning, a tendency to let finances drift occasionally,
    and a habit of confronting challenges head‑on when they matter most.
background:
  cultural: James grew up in a small-town setting in Morrow County, Ohio, where Midwestern values of hard work, modesty, and community involvement are woven into daily life. His family's roots trace back
    to German and Irish immigrants who settled the region in the early 20th century, fostering a blend of cultural traditions that include church gatherings, seasonal fairs, and a strong emphasis on neighborhood
    support. The local culture's pragmatic outlook—favoring practical solutions over flair—complements his own balance of curiosity and practicality. He maintains close ties to his hometown through regular
    participation in town festivals, local high-school sports events, and volunteer initiatives that reflect the region's collaborative spirit.
