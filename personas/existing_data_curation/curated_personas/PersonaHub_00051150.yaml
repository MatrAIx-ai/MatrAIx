persona_description: A historian who specializes in the study of American Indian history, particularly the conflicts and battles between Native American tribes and the United States government. Their research
  interests include, but are not limited to, the tactics and strategies employed by Native American warriors, the causes and effects of military conflicts, and the impact of historical events on Native
  American communities. They have a deep understanding of the cultural and social context of the time period, and are skilled in analyzing primary sources and conducting historical research. They are passionate
  about preserving and sharing the stories of Native American history with the world.
