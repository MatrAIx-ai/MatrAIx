personas:
  professional: Vivian Casianodiaz, a seasoned financial manager with over three decades of experience in Los Angeles County, blends her methodical skepticism with an inquisitive spirit to drive data‑rich
    budgeting innovations, lead cross‑functional teams, and mentor emerging women leaders as they transition toward a strategic advisory role.
  sports: Vivian Casianodiaz enjoys following the Los Angeles Lakers and Dodgers, participates in a weekly salsa class at a local studio, joins a neighborhood walking club that meets at Griffith Park every
    Saturday, and plays recreational softball in a senior league, balancing high‑energy social sport with low‑impact cardio.
  arts: Vivian Casianodiaz frequents the Los Angeles County Museum of Art where they study Monet’s water lilies and O’Keeffe’s desert scenes, sketch watercolor studies of gallery pieces, draw inspiration
    from Frida Kahlo’s self‑portraits and the music of Carlos Santana, and attend monthly talks on digital illustration, weaving visual art into their everyday curiosity.
  travel: Vivian Casianodiaz meticulously plans trips with spreadsheets, preferring culturally immersive experiences like a culinary tour of Granada, Spain, a heritage walk through Kyoto, Japan, and a road
    trip along the Pacific Coast Highway, but balances these ambitions with limited vacation days and a desire to stay close to family for holidays.
  culinary: Vivian Casianodiaz loves cooking family‑style dishes such as pozole, tamales, and mole, experimenting with fusion twists that blend masa‑based staples with ingredients like miso, avocado, and
    chipotle, and often showcases their intermediate watercolor skill by plating meals as edible art.
  core: Vivian Casianodiaz is a disciplined, curiosity‑driven financial veteran who channels their love of art, cooking, and community mentorship into a methodical yet adventurous approach to life, while
    occasionally surrendering to late‑night TV and skipping a workout.
background:
  cultural: Vivian is a first‑generation Mexican‑American whose parents emigrated from Jalisco in the 1960s. Raised in El Monte and the surrounding East Los Angeles neighborhoods, she grew up speaking both
    Spanish and English and maintains strong ties to Mexican customs such as Día de los Muertos, quinceañeras, and weekly Sunday family gatherings. She actively participates in the local Mexican cultural
    center, where she helps organize festivals and mentorship programs for young Latinos. Her bicultural identity shapes her worldview, allowing her to bridge the perspectives of her heritage community
    with the broader corporate environment.
