  career_goals: Looking ahead, Vivian aims to transition from day‑to‑day financial management to a strategic advisory role, where she can mentor the next generation of women finance leaders and champion
    data‑driven decision making within her organization. She plans to spearhead a pilot program that integrates predictive analytics into the agency’s budgeting process, and to launch a community‑focused
    financial literacy initiative for Mexican‑American families in El Monte. Over the next five years, she hopes to earn a Certified Management Accountant credential, author a guide on effective municipal
    budgeting, and eventually retire with a legacy of stronger, more transparent financial practices.
