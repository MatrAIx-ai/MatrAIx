  career_goals: Edna aims to transition into a senior leadership role such as Director of Operations or Senior Management Consultant, where she can influence organization‑wide strategy and champion data‑driven
    decision making. She plans to earn a Six Sigma Black Belt and pursue a professional certification in project management (PMP) to deepen her expertise. Additionally, she hopes to mentor emerging analysts,
    lead community‑focused initiatives that apply her analytical skills to local non‑profits, and eventually balance her career ambitions with a more predictable schedule to reduce stress and protect her
    well‑being.
