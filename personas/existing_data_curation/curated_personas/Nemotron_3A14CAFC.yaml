personas:
  professional: Edna Hunterphillips, a seasoned management analyst with a talent for turning complex data into clear strategic roadmaps, blends meticulous organization with flexible problem‑solving, while
    assertively mentoring junior staff and championing data‑driven decision‑making as she pursues a Six Sigma Black Belt and a PMP to step into a Director of Operations role.
  sports: Edna Hunterphillips rewards herself after a week of data analysis by hiking the limestone trails of Indiana Dunes State Park, while cheering on the Indiana Pacers and the Notre Dame Fighting Irish,
    and participates in a local walking club that meets every Saturday morning.
  arts: Edna Hunterphillips finds inspiration at South Bend's Morris Performing Arts Center, where she often attends exhibitions featuring folk artists like Grandma Moses and enjoys listening to the warm
    crooning of Norah Jones and the storytelling of folk legend Joan Baez, while occasionally discussing the works of novelist Ken Follett at her monthly book club.
  travel: Edna Hunterphillips plans her travel around a balanced mix of structured itineraries and spontaneous stops, having road‑tripped through the Ohio River Valley, explored historic streets in Savannah,
    Georgia, and dreaming of a cross‑country train journey to the Pacific Northwest, all while budgeting for occasional family visits to Chicago.
  culinary: Edna Hunterphillips delights in baking classic apple pie with a lattice crust, perfecting a rosemary‑infused roast chicken, and whisking up fresh herb pesto from basil and mint harvested in
    her garden, though she admits to occasionally over‑salting her tomato soup when multitasking between knitting and blog writing.
  core: Edna Hunterphillips is a data‑driven strategist whose meticulous yet flexible mindset, chronic worry, and love for solitary crafts and community connection shape a life balanced between ambitious
    leadership aspirations and comforting routines.
background:
  cultural: Edna grew up in the Midwest, absorbing the region's blend of practicality, community involvement, and respect for tradition. As a white Midwestern American with roots tracing back to German
    and Irish ancestry, she values reliability, a strong work ethic, and civic engagement. Living in Mishawaka, Indiana, she is influenced by the area's industrial history, proximity to the University of
    Notre Dame, and a tight‑knit local culture that encourages volunteerism and support for local arts. This background informs her balanced outlook—curiosity tempered by pragmatism—and shapes her desire
    to contribute both professionally and in community service.
