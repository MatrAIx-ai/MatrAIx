  hobbies: '[''Abstract painting'', ''Mixed‑media collage'', ''Pottery'', ''Creative writing (short stories, poetry)'', ''Reading contemporary fiction and philosophy'', ''Attending art exhibitions and galleries'',
    ''Community theater participation'', ''Facilitating local art workshops'', ''Yoga and mindfulness meditation'', ''Hiking in the Sonoran Desert'', ''Desert‑native plant gardening'', ''Cooking experimental
    fusion cuisine'', ''Hosting dinner gatherings with friends'']'
  career_goals: As Vanessa approaches the next phase of her professional journey, she aims to deepen her clinical expertise by completing a Master’s degree in Counseling Psychology and obtaining licensure
    as a Clinical Supervisor. She envisions launching a Southwestern‑focused recovery center that integrates expressive‑arts therapy, mindfulness, and community‑based support, positioning the program as
    a model for culturally responsive addiction treatment in Maricopa County. She is driven to mentor emerging counselors, develop evidence‑based curriculum for arts‑infused interventions, and collaborate
    with local health agencies to influence policy around prevention and early intervention. Long‑term, Vanessa hopes to author a handbook that blends creative expression with evidence‑based recovery strategies,
    and to serve on advisory boards that promote resilience and wellness for both clients and practitioners.
