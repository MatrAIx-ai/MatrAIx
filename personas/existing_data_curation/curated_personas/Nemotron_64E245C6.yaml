  career_goals: Seeking to move into a technical leadership role, Mohsin aims to become a lead architect or engineering manager where he can shape product strategy while fostering a supportive, inclusive
    team culture. He aspires to spearhead projects that have measurable social impact—such as platforms that improve digital literacy for seniors or tools that support mental‑health awareness. Over the
    next five years, he plans to earn AWS Certified Solutions Architect and Certified Scrum Professional credentials, expand his expertise in cloud‑native architecture, and mentor underrepresented developers
    through community coding workshops. Ultimately, he hopes to balance high‑impact technical work with a sustainable lifestyle that mitigates stress and preserves his well‑being.
