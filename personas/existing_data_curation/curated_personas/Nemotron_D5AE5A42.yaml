  hobbies: '[''Watercolor painting'', ''Museum visits'', ''Contemporary art openings'', ''Hiking'', ''Volunteering at cultural festivals'', ''Cooking Southeast Asian cuisine'', ''Reading philosophy and
    urban planning'', ''Community choir participation'']'
  career_goals: Boua aspires to take on a senior leadership role within the county revenue department, such as Senior Tax Supervisor or Director of Revenue Services, where he can shape policy and mentor
    junior staff. He is also interested in developing community‑focused tax education programs that demystify the tax system for small businesses and immigrant families. Long‑term, he envisions contributing
    to state‑level fiscal policy as a public‑policy analyst or pursuing a Master’s in Public Administration to broaden his impact on equitable revenue practices.
