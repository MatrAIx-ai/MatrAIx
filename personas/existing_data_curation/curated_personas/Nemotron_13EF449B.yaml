  hobbies: '[''Woodworking'', ''Fishing'', ''Hiking'', ''Reading Non-Fiction (History/Engineering)'', ''Puzzle Solving (Sudoku)'', ''DIY Home Improvement Projects'']'
  career_goals: William aims to advance to a senior project director role, overseeing large‑scale commercial developments across the Southeast. He plans to earn the Certified Construction Manager (CCM)
    designation and possibly an MBA focused on construction finance to strengthen his strategic decision‑making. In the long term, he envisions launching his own consultancy that helps midsize firms improve
    efficiency and profitability through data‑driven project controls.
