  hobbies: '[''Sketching landscapes'', ''Digital painting'', ''Playing acoustic guitar'', ''Exploring hiking trails in the Wasatch Range'', ''Skateboarding at local skate park'', ''Participating in multiplayer
    online games'', ''Creating short videos for TikTok'', ''Attending live music shows'', ''Journaling and poetry'']'
  career_goals: Samuel dreams of turning his passion for art into a career as a concept artist for video game studios or indie developers. He aims to earn his GED, then enroll in a vocational art program
    or community college specializing in graphic design and illustration, eventually building a strong portfolio that showcases his blend of traditional drawing and digital skills. In parallel, he hopes
    to grow his personal brand on social media, leveraging his video‑creation knack to attract freelance commissions. Long‑term, Samuel envisions opening a small studio where he can collaborate with other
    artists and perhaps mentor younger creatives who feel outside the traditional school system.
