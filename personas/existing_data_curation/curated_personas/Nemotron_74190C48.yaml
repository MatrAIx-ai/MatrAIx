personas:
  professional: An aspiring concept artist, Samuel Cappucci blends traditional sketching on hillside easels with digital illustration on a tablet, leveraging self‑taught Python scripts to automate texture
    generation, while their competitive streak drives rapid iteration on designs and a keen desire for peer feedback in close‑knit community art clubs.
  sports: An energetic skateboarder and pickup basketball player, Samuel Cappucci frequents the Pleasant Grove skate park and joins the local youth basketball league, cheering on the Utah Jazz while training
    with a homemade routine of hill sprints and freestyle drills that reflect their love of competition and group camaraderie.
  arts: An eclectic visual creator, Samuel Cappucci draws inspiration from the luminous brushwork of Claude Monet, the fantastical storytelling of Hayao Miyazaki, and the bold color palettes of contemporary
    concept artist Feng Zhu, regularly attending community art fairs and posting short TikTok reels that fuse sketching, digital painting, and quirky humor.
  travel: An adventure‑seeking teen, Samuel Cappucci enjoys weekend hikes in the Wasatch foothills and day trips to Zion National Park, dreaming of future backpacking in Kyoto’s cherry‑blossom pathways
    and a culinary pilgrimage to Florence to taste the authentic pasta that mirrors their Sunday family meals.
  culinary: A home‑cooking enthusiast, Samuel Cappucci loves whipping up homemade pizza with fresh mozzarella and basil, savoring a hearty marinara spaghetti on family Sundays, and experimenting with trail‑mix
    snacks featuring almonds, dried apricots, and dark chocolate for pre‑hike fuel.
  core: Samuel Cappucci is a fiercely curious 16‑year‑old artist who channels competitive energy into sketching, gaming, and community art projects while wrestling with intense anxiety and occasional impulsive
    spending.
background:
  cultural: Samuel comes from an Italian‑American family that maintains traditions like Sunday pasta meals, homemade pizza, and occasional Italian language phrases at the dinner table. Growing up in Pleasant
    Grove, Utah, he has also absorbed the region's strong emphasis on community, outdoor recreation, and a predominantly LDS cultural environment, even though his own household leans more secular and currently
    attends a Catholic parish. This blend of Italian familial warmth and Utah's outdoor, close‑knit community life has fostered his love for group activities, his appreciation for diverse artistic expressions,
    and his competitive yet collaborative outlook.
attributes:
  skills: '[''Digital illustration'', ''Photography'', ''Sketching and figure drawing'', ''Basic Photoshop/GIMP editing'', ''Social media content creation (TikTok, Instagram)'', ''Team basketball'', ''Skateboarding'',
