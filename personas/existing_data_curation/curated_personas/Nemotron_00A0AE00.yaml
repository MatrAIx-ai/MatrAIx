personas:
  professional: Curtis Ciliberti, a veteran parish priest in Saint Johns County, blends their STEM‑trained analytical mindset with pastoral empathy, using data‑driven needs assessments, meticulous budgeting,
    and conflict‑resolution skills to run a tightly organized yet welcoming church community.
  sports: Curtis Ciliberti, an avid recreational fisherman and seasonal runner, trains for community 5K charity races, belongs to a local paddling club, and passionately supports the Jacksonville Jaguars
    and Orlando Magic while squeezing in weekly tennis matches at the community center.
  arts: Curtis Ciliberti, a lover of both sacred and secular arts, fills their evenings with Vivaldi concertos, attends Jacksonville Symphony performances, enjoys classic Italian opera recordings by Enrico
    Caruso, and reads contemporary theological works alongside scientific authors like Carl Sagan.
  travel: Curtis Ciliberti, a methodical planner of pilgrimages and coastal road trips, has explored the Tuscan countryside during a family vacation, enjoys yearly drives down the Florida Keys, and dreams
    of joining a Holy Week pilgrimage to Rome while balancing travel with church duties.
  culinary: Curtis Ciliberti, a competent home cook, frequently prepares garden‑fresh ratatouille, hand‑rolled pasta with basil‑infused tomato sauce, and grilled swordfish tacos seasoned with lemon and
    capers, while treating Sunday family meals as both culinary showcase and communal celebration.
  core: Curtis Ciliberti navigates life with methodical precision, compassionate stewardship, a penchant for detailed spreadsheets, and a lingering habit of sipping coffee late into the night while drafting
    sermons.
background:
  cultural: Curtis is a White American of Italian heritage, raised in a Catholic family that emphasized both tradition and community service. Relocating to Saint Johns County, Florida, he has embraced the
    Southern coastal lifestyle while retaining cultural practices such as celebrating major liturgical feasts, enjoying Mediterranean cuisine, and valuing close‑knit family ties. His background informs
    his inclusive pastoral approach, blending Mediterranean hospitality with the laid‑back rhythm of North‑Florida coastal life.
attributes:
  skills: '["Pastoral counseling","Public speaking and sermon preparation","Strategic planning and budgeting","Data analysis for community needs","Technical support for audiovisual and online streaming","Volunteer
    team leadership","Conflict mediation and resolution","Emergency response coordination"]'
  hobbies: '["Gardening","Reading (science and theology)","Fishing","Volunteer construction projects","Woodworking","Playing chess"]'
  career_goals: Curtis aims to expand his church's impact by launching a regional outreach program that integrates environmental stewardship with social services, reflecting his scientific background and
    Florida's coastal concerns. He plans to earn a master's degree in theological studies to deepen his doctrinal knowledge while mentoring younger clergy in effective church management. Over the next decade,
    he hopes to establish a collaborative network of local faith communities that share resources, best practices, and joint community projects.
