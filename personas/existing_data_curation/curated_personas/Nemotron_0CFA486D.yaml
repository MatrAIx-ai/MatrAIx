  career_goals: Although retired, Quamaine aims to become a living archive of his neighborhood's history by compiling oral histories and writing a memoir that highlights the African‑American experience
    in Columbia. He aspires to lead a local senior mentorship program, offering practical life skills and cultural stories to younger generations. He also hopes to organize an annual community garden festival
    that showcases sustainable gardening and traditional Southern cooking.
