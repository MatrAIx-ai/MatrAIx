personas:
  professional: Marshall Montenegro, an aspiring junior digital artist and robotics enthusiast, blends watercolor techniques with coding to create interactive visual projects, applying their methodical
    planning and competitive drive to school competitions and club showcases.
  sports: Marshall Montenegro, a dedicated middle school basketball player, follows the Philadelphia 76ers and Wilmington’s local youth hoops league, practices three times a week, and incorporates cardio
    routines from a community youth fitness club to maintain a competitive edge, and they aim to improve their free‑throw percentage each season.
  arts: Marshall Montenegro, an avid watercolor sketcher and digital illustrator, draws inspiration from Monet’s impressionist palettes and Beeple’s futuristic concept art, frequently visits the Delaware
    Art Museum, and studies photography legends like Ansel Adams to capture urban landscapes during weekend outings, and they often experiment with mixed media to merge traditional and digital techniques.
  travel: Marshall Montenegro, a curious explorer, plans weekend escapades to Philadelphia’s museum district and Washington, D.C.’s Smithsonian after school, dreams of attending the Tokyo Robotics Expo
    next summer, and balances these trips with family expectations and schoolwork constraints, and they prioritize saving a portion of their allowance for these adventures.
  culinary: Marshall Montenegro, an enthusiastic homecook with intermediate kitchen skills, favors making pepperoni pizza with extra mozzarella and fresh basil, experiments with sushi rolls using soy sauce
    and avocado, and often prepares quick ramen bowls spiced with garlic and chili flakes for late‑night gaming sessions, and they love to add a dash of sriracha for extra heat.
  core: Marshall Montenegro, a methodical teen artist‑engineer, channels competitive curiosity into vibrant digital creations while juggling a disciplined budget and occasional lapses into gaming‑induced
    laziness, and they constantly seek new challenges.
background:
  cultural: Marshall comes from a middle‑class White family in Wilmington, Delaware, where East‑Coast suburban life shapes his daily routine. He grows up celebrating typical American holidays, attending
    public middle school, and participating in community events at local venues such as the Delaware Art Museum. His family values punctuality, reliability, and education, which reinforce his organized
    personality. While predominantly influenced by mainstream U.S. culture, he also appreciates the diverse artistic scene of New Castle County, exposing him to a mix of historical colonial heritage and
    contemporary urban art.
