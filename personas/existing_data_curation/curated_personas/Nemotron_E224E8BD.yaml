personas:
  professional: Lillian Leonard, an emergency department nurse with a flair for health informatics and creative therapeutic interventions, leverages acute patient assessment, data‑driven protocol design,
    and art‑based stress‑relief workshops to blend technology and compassion in fast‑paced clinical settings.
  sports: Lillian Leonard hikes the Weeki Wachee Preserve on weekends, spikes up salsa dancing at the local Latin club, and supports the Tampa Bay Buccaneers and the Orlando Magic while training with the
    Pasco Trail Runners club for 5K races each spring.
  arts: Lillian Leonard paints vivid acrylics inspired by the expressive colors of Frida Kahlo and the abstract energy of Jackson Pollock, attends indie theater productions like "The Flick", and repeatedly
    streams the avant‑garde pop of Björk and Lin‑Manuel Miranda's "Hamilton" to fuel their creative spark.
  travel: Lillian Leonard plans immersive trips that blend art tours of Florence, street‑food explorations in Oaxaca, and museum hops in Kyoto, preferring curated itineraries with fellow creatives but often
    splurging on last‑minute airfare to Barcelona when a compelling exhibition pops up.
  culinary: Lillian Leonard experiments with fusion cooking, mastering dishes like gochujang‑glazed chicken tacos, miso‑infused paella, and cilantro‑lime avocado salsa, favoring ingredients such as sumac,
    smoked paprika, and fresh chilies, while their home kitchen boasts a well‑used wok and a high‑performance sous‑vide.
  core: Lillian Leonard merges a nurse’s precision with an artist’s curiosity, turning every patient encounter, brushstroke, and salsa step into an opportunity for creative healing, even if occasional art‑supply
    splurges and late‑night work emails keep them on a high‑energy treadmill.
background:
  cultural: Lillian identifies as a White American raised in a suburban environment, likely in the Southeast. Her upbringing emphasized self‑reliance, community involvement, and a respect for tradition,
    while her family’s participation in local church and neighborhood events instilled a sense of hospitality typical of Florida’s culture. Growing up amid a growing multicultural population, she developed
    an appreciation for diverse perspectives, which informs her culturally competent approach to nursing. Her exposure to the arts through school programs and community festivals nurtured her lifelong love
    for creative expression. This blend of Midwestern/Southern values, Southern hospitality, and Florida’s vibrant multicultural milieu shapes her worldview and professional ethos.
attributes:
