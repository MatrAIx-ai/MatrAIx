    therapy facilitation'', ''Community health outreach program development'', ''Precepting and mentorship of nursing students'']'
  hobbies: '[''Visiting art galleries and exhibitions'', ''Participating in community theater and set design'', ''Painting and sketching'', ''Salsa dancing'', ''Hiking in Florida nature preserves'', ''Volunteering
    at health fairs and charity runs'', ''Traveling to explore diverse cultures and cuisines'', ''Cooking experimental fusion meals'', ''Reading contemporary fiction and science popular books'', ''Leading
    a group book club'']'
  career_goals: Lillian aims to expand her impact beyond bedside care by pursuing an MSN with a focus on nursing informatics and advanced practice. She envisions becoming a Clinical Nurse Specialist or
    Nurse Practitioner who can design evidence‑based protocols that integrate technology and creative therapies. In the next five years, she plans to lead a hospital‑wide arts‑in‑healing initiative, secure
    certification in wound care, and assume a leadership role as a Nurse Manager overseeing a multidisciplinary unit. Ultimately, Lillian aspires to establish a community health center in Pasco County that
    offers holistic services—including health education, preventive screenings, and art‑based wellness programs—thereby improving health outcomes for underserved populations.
