  career_goals: Although retired, Dana aims to deepen her impact in the community by launching a neighborhood garden that provides fresh produce for local seniors and school programs. She plans to author
    a memoir reflecting her life experiences, focusing on resilience and community service, and hopes to use it as a teaching tool for younger volunteers. Dana also aspires to complete a certificate in
    senior mental‑health first aid to better support friends dealing with anxiety and depression, and she seeks to mentor a new generation of volunteers in event planning and compassionate leadership.
