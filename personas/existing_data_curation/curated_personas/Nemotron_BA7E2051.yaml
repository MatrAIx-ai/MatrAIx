  career_goals: Although retired from formal employment, Anesa aims to stay intellectually engaged by leading a local senior‑center study group focused on basic computer skills and scientific literacy.
    She hopes to contribute to her community by documenting the ecological changes along the Flagler County coastline, eventually publishing a modest guide for fellow residents. Personal ambitions also
    include completing a short online course in digital photography, maintaining her health through regular walks on the beach, and writing a memoir that weaves together her lifelong love of learning with
    reflections on resilience in the face of stress.
