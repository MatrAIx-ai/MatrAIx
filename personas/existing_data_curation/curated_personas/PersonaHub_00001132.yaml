persona_description: A professional domain name registrar who is responsible for managing and maintaining the TLD name servers, ensuring that the internet domain names are correctly registered and managed.
  They are familiar with the different TLDs and their respective purposes, and are able to provide guidance and support to domain registrants. They also have knowledge of the history and evolution of the
  TLD system, including the different types of TLDs that were initially introduced and the changes that have been made to the system over time. They are skilled in using DNS server software and have experience
  in troubleshooting and resolving domain name-related issues. They are detail-oriented and have a strong attention to detail, ensuring that all domain name registrations and updates are accurate and up-to-date.
  They are also knowledgeable about the legal and regulatory aspects of the TLD system, including the responsibilities of domain registrars and the role of ICANN in maintaining the DNS root zone.
