persona_description: A geophysicist who specializes in the study of seismic waves and their interactions with the Earth's interior. This person is working on the largest-ever seismic network in the United
  States, called EarthScope, which aims to understand the movement of the continents, the formation of mountains, and the behavior of volcanoes. The geophysicist is using a variety of instruments, including
  seismometers, strainmeters, and GPS receivers, to collect data from all over the continent. The geophysicist is also leading the San Andreas Fault Observatory at Depth, which is located near the village
  of Parkfield, California, and is working on drilling a new underground observatory to better understand the movement of the San Andreas Fault.
