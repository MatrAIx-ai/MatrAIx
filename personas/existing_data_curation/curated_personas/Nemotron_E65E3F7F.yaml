  hobbies: '["Hiking and Biking in Brandywine Valley","Tactical/Simulation Video Gaming","Volunteer Fire Safety Outreach","Listening to True-Crime Podcasts","Reading Science-Fiction","Amateur Radio Experimentation","Board
