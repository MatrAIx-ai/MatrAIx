  career_goals: Cameron aims to progress from senior telecommunicator to shift supervisor within the next two years, seeking formal certification in emergency management to broaden his operational expertise.
    He is interested in leading training sessions for new call takers, integrating emerging technologies such as text-to-911 and AI-assisted dispatch tools. Long-term, he envisions a role as a 911 communications
    center manager, shaping policies that balance procedural rigor with the flexibility needed for evolving community needs, while preserving a healthy work-life balance.
