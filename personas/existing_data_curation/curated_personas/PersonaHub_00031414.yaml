persona_description: A professor of oncology who is a leading expert in the field of cancer research, particularly in the study of cancer stem cells and their role in cancer development. He is optimistic
  about the potential of understanding cancer stem cells to aid in the development of new cancer treatments and has made significant contributions to the field through his research and teaching. His lecture
  on Wednesday focused on the theory that cancers are driven by cells with stem-cell properties and emphasized the importance of eradicating cancer stem cells in order to eradicate cancer.
