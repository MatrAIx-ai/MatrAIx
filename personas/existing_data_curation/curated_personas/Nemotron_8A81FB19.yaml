  career_goals: Alberto aims to cement his company's position as a trusted regional provider while expanding into adjacent markets through disciplined growth strategies. He is focused on implementing a
    robust succession plan that will preserve the organization’s culture of reliability and routine. Over the next five years he plans to launch a mentorship program for young professionals from underrepresented
    backgrounds, particularly Nicaraguan‑American youth, and to establish a modest philanthropic fund to support literacy and vocational training in his community. Ultimately, he seeks to leave a legacy
    of operational excellence, community impact, and a smooth transition to the next generation of leadership.
