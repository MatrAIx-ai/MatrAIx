personas:
  professional: Alberto Perez is a disciplined chief executive who applies a systematic, process‑driven approach to strategic planning and operational oversight, building high‑performing teams while championing
    mentorship programs for underrepresented youth and fostering community partnerships that reflect they place high value on reliability, routine, and collaborative success.
  sports: Alberto Perez plays forward in a local Hispanic soccer league on Saturdays, tracks fitness with daily jogs through Rock Creek Park, cheers on Washington United in the MLS and the Capitals during
    the NHL season, and they occasionally join pickup basketball games at the community center to stay socially active.
  arts: Alberto Perez enjoys salsa and bachata dance classes where they practice to the rhythms of Marc Anthony and Romeo Santos, attends performances at the Kennedy Center ranging from Broadway revivals
    to contemporary Latin theater productions, and unwinds listening to classic rock legends like Bruce Springsteen while reflecting on the artistic storytelling they find in both music and chess.
  travel: Alberto Perez prefers well‑planned road trips that blend cultural immersion with family time, having recently toured the colonial streets of Oaxaca and the historic district of Savannah, while
    dreaming of a pilgrimage to Machu Picchu and a weekend getaway to the Blue Ridge Mountains for hiking and salsa nights at local venues, and they meticulously map each itinerary to balance adventure
    with routine.
  culinary: Alberto Perez is an accomplished home‑cook who masterfully prepares gallo pinto, nacatamales, and slow‑roasted lechón using nixtamalized corn, achiote, and plantains, yet they sometimes burn
    the edges of the rice while experimenting with a new cilantro‑lime sauce, reflecting a disciplined yet occasionally imperfect culinary process.
  core: Alberto Perez blends executive precision with a vibrant love for community dance, never missing a Sunday soccer match, yet they can become anxious when plans deviate from their strict schedules.
background:
  cultural: Alberto was born to Nicaraguan immigrants who settled in the Washington metropolitan area in the early 1970s. Raised in a bilingual household, he grew up with the values of hard work, family
    solidarity, and respect for tradition that his parents brought from Nicaragua. Although he left formal schooling before completing ninth grade to support his family, he retained a strong connection
    to his heritage through community celebrations such as La Purísima and the Nicaraguan Festival in Silver Spring. He identifies with both his Central American roots and the multicultural fabric of Montgomery
    County, often bridging cultural gaps in both his professional and community roles.
