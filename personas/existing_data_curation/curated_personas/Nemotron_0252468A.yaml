  career_goals: Jorge aims to leverage his customer‑service experience and creative background to move into a supervisory role within the next two years, eventually becoming a Customer Experience Manager
    who can shape service strategies and mentor a diverse team. He plans to obtain a certification in Customer Experience Management and deepen his expertise in digital content creation, with a long‑term
    ambition to transition into a corporate communications or community‑engagement position that blends his humanities education with his passion for Puerto Rican culture. Additionally, he dreams of launching
    a bilingual podcast exploring art, culture, and innovation, positioning himself as a thought leader within his community.
