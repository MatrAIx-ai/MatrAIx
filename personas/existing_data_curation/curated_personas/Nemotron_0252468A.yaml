personas:
  professional: Jorge Orjuela, a bilingual customer service specialist with a flair for graphic storytelling, blends empathetic listening, conflict resolution and creative content creation to turn challenging
    calls into brand‑building moments, and they actively pursue a supervisory role while envisioning a future as a Customer Experience Manager.
  sports: Jorge Orjuela, an avid weekend hiker who explores the nearby Highlands and joins casual pickup basketball games, follows the New Jersey Devils, the New York Giants, and the NYCFC, and treats salsa
    dancing as both a cultural celebration and a cardio workout.
  arts: Jorge Orjuela, a sketch‑loving visual storyteller who spends Saturdays immersed in acrylics, frequents local galleries showcasing artists like Banksy and civic‑focused murals, and draws inspiration
    from salsa legends such as Celia Cruz and Marc Anthony while participating in improv comedy workshops and board‑game nights.
  travel: Jorge Orjuela, a spontaneous explorer who prefers short road trips to the Catskills, culturally‑rich city breaks in places like Barcelona and Lisbon, and occasional island getaways where bomba
    and plena rhythms echo in the streets, balancing a modest travel budget with a desire for new artistic experiences.
  culinary: Jorge Orjuela, an enthusiastic cook whose kitchen often smells of sofrito and caramelized plantains, masters dishes such as arroz con gandules, pasteles and lechón, enjoys experimenting with
    adobo spice blends, and hosts potluck dinners where friends sample both traditional flavors and their own creative twists.
  core: Jorge Orjuela, a creative, socially‑charged problem‑solver who thrives on improv, art, and community gatherings, yet struggles with keeping a tidy schedule and occasionally lets disorganization
    slip into work and life.
background:
  cultural: Jorge’s cultural identity is rooted in his Puerto Rican heritage, which he actively preserves while living in Dover, New Jersey. Raised in a bilingual household, he is fluent in Spanish and
    English and participates in the island’s rich traditions of music—bomba, plena, and salsa—food, and family celebrations. He regularly attends local Puerto Rican events, such as the annual Hispanic Heritage
    Parade and community festivals, and contributes to a neighborhood cultural association that promotes Caribbean arts. His upbringing emphasized close family ties, Catholic values, and a communal spirit,
    shaping his collaborative approach at work and his commitment to sharing Puerto Rican culture with the broader community.
