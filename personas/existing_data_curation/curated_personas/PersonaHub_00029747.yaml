persona_description: A researcher studying cognitive differences in autism, focusing on experimental cognitive psychology and psychophysics, using tasks, electro-encephalography (EEG), and preliminary results
  to understand how autistic people perceive, learn, and process information differently. The researcher aims to contribute to both basic science and applied science, with relevance to teaching autistic
  children, designing work environments for autistic adults, and aiding scientists in subgrouping autistic people based on cognitive and neural biomarkers. The researcher is supported by the Autism Research
  Trust, the Medical Research Council, and the Pinsent Darwin Trust.
