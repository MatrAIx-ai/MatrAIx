  career_goals: Raul dreams of turning his love of building and problem‑solving into a career in robotics or aerospace engineering, ideally contributing to military technology or space exploration. He also
    feels a strong connection to the desert environment and hopes to study environmental science or wildlife biology to protect the local ecosystem. Ultimately he wants to combine his practical skills with
    his curiosity to design innovative machines, whether they are drones for defense or tools for scientific research.
