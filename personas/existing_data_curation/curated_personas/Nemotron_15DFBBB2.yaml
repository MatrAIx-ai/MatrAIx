personas:
  professional: Raul Kelley is an aspiring young robotics enthusiast who builds intricate LEGO machines, tinkers with beginner electronics kits, and channels their curiosity‑practical blend into leading
    the school’s robotics club projects, while their relaxed, slightly disorganized style means they often improvise solutions on the fly.
  sports: Raul Kelley plays forward on the Fort Huachuca youth soccer league, avidly follows the Arizona Cardinals and the Phoenix Suns, often squeezes in solo basketball shooting sessions at the base gym,
    and they let their competitive streak drive them to push for personal bests rather than focusing on team camaraderie.
  arts: Raul Kelley sketches comic strips inspired by Marvel’s Spider‑Man and devours the sci‑fi series The Expanse, while they unwind listening to Imagine Dragons and Linkin Park and practice guitar chords
    from the classic riff of Smoke on the Water, letting their love for storytelling shape both their drawings and weekend playlists.
  travel: Raul Kelley loves spontaneous road trips with their family, having explored Saguaro National Park, taken a weekend drive to the Grand Canyon, and spent a summer vacation on the beaches of San Diego,
    while they dream of chasing the Northern Lights in Alaska and usually plan trips around school breaks and a modest travel allowance.
  culinary: Raul Kelley is a budding home‑cook who can whip up a decent cheese quesadilla, loves the tang of prickly‑pear lemonade, enjoys homemade tacos with cilantro and lime, and while they’re still
    learning to follow recipes, they’ve mastered assembling a layered nacho platter with jalapeños, black beans, and melted cheddar.
  core: Raul Kelley is a curious desert‑dweller who transforms LEGO bricks into engineering experiments, battles Fortnite micro‑spends with a piggy bank, sketches superheroes between bird‑watching hikes,
    and they juggle a competitive streak with a habit of forgetting homework.
background:
  cultural: Raul comes from a White American family that has lived on the Fort Huachuca military installation for several generations. The base’s diverse, transient community has exposed him to a mix of
    cultures, including Hispanic influences common in southern Arizona, as well as the customs and traditions of fellow service members from across the United States. The desert landscape surrounding the
    base shapes his appreciation for the region’s natural history and fuels his interest in local flora and fauna. Growing up in a military environment, he values respect for service, practical problem‑solving,
    and adaptability, while his family maintains typical American middle‑class values and often celebrates holidays such as Thanksgiving and Fourth of July.
