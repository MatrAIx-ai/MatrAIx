  career_goals: Although currently not in the workforce, Ronald aims to channel his expertise into a part‑time role as a freelance art consultant, advising local galleries and collectors. He is working
    on a manuscript that explores the intersection of American regional art and contemporary cultural trends, with a goal of publishing the book within two years. He also hopes to volunteer as a curator
    for the Spanish Fork community art center, develop a series of online courses on visual literacy for adult learners, and eventually open a modest independent gallery that showcases emerging artists
    from Utah and the surrounding Intermountain West.
