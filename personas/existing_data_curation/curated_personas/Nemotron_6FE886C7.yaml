  career_goals: Vincent aims to transfer to a four‑year university within the next year to earn a bachelor's degree in Business Administration with a focus on Information Systems. In the short term, he
    plans to secure an entry‑level project coordinator or technical support role at a technology company or consulting firm in the Seattle metropolitan area. Over the next five to ten years, he aspires
    to advance into senior project management or product management positions, leading cross‑functional teams that deliver innovative solutions. He also hopes to leverage his competitive drive to earn professional
    certifications such as PMP (Project Management Professional) and Agile Scrum Master, positioning himself as a strategic leader who balances pragmatic execution with curiosity about emerging technologies.
