  career_goals: David dreams of combining his love for art and science by becoming a wildlife illustrator or a conservation educator. He envisions creating illustrated field guides that teach kids about
    the prairie ecosystem, and he hopes to one day work at a natural history museum or a wildlife preservation organization. He also imagines inventing simple educational games that make science fun for
    other children.
