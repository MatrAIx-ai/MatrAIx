personas:
  professional: David Sanders, an aspiring junior architect and cartoonist, channels a curiosity for nature and structure into building detailed LEGO habitats and crafting Minecraft worlds while sketching
    vibrant comic panels, balancing meticulous planning with imaginative detours.
  sports: David Sanders plays forward on the town’s under‑12 soccer team, the River Valley Rovers, cheers for the New York Yankees during baseball season and the Chicago Bulls in basketball, and spends
    rainy afternoons exploring the creek near their home, turning it into a natural obstacle course for fitness.
  arts: David Sanders is an enthusiastic member of the school art club, where they sketch cartoons inspired by Mo Willems and classic Disney animation, practice piano pieces such as a simplified Für Elise
    and the Mickey Mouse March after school, and blend these creative pursuits with weekly LEGO building challenges.
  travel: David Sanders dreams of visiting the Kennedy Space Center in Florida to see real rockets, has already taken a family road trip to the Grand Canyon, and hopes to explore the dinosaur fossils at
    the Smithsonian’s National Museum of Natural History, preferring structured day‑trip itineraries that mix adventure with learning.
  culinary: David Sanders favors homemade pepperoni pizza with pineapple, devours chicken nuggets with honey‑mustard, loves a creamy bowl of mac and cheese, and often helps in the farm kitchen preparing
    fresh scrambled eggs with diced tomatoes, occasionally sneaking an extra slice of chocolate cake when nobody watches.
  core: David Sanders is a curious ten‑year‑old who blends sketching, LEGO engineering, and piano practice into a disciplined yet imaginative routine, often losing track of time in the creek or day‑dreaming
    about space while carefully saving allowance for the next big set.
background:
  cultural: David grew up in Arnegard, a tiny rural community in the North Dakota plains, surrounded by wide open fields and a close‑knit farming culture. His family’s heritage traces back to German‑Russian
    and Scandinavian immigrants who settled the region in the early 1900s, and they maintain traditions such as community potlucks, church gatherings, and the annual county fair. The local environment,
    characterized by harsh winters, rolling prairies, and abundant wildlife like bison and migratory birds, shapes his respect for nature and self‑reliance. While predominantly a white Midwestern culture,
    subtle influences from nearby Native American tribes are evident in school lessons about the Lakota history of the area, fostering his appreciation for diverse perspectives.
