  hobbies: '[''Watercolor painting'', ''Visiting art galleries'', ''Reading art magazines and podcasts'', ''Community theater involvement'', ''Backstage event logistics'', ''Hiking'', ''Gardening'', ''Line
    dancing'', ''Cooking Southern cuisine'', ''Book club participation'']'
  career_goals: Driven by her competitive spirit, Tiffany aims to advance from administrative assistant to office manager within the next two years, securing a Certified Administrative Professional (CAP)
    credential to validate her expertise. She envisions leveraging her love of art to transition into an administrative leadership role at a regional arts center or museum, where she can blend organizational
    excellence with community cultural programming. Long‑term, she hopes to oversee a multi‑department office, mentor junior staff, and spearhead initiatives that bring arts and education together for the
    residents of Washington County.
