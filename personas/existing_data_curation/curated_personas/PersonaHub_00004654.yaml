persona_description: A historian who specializes in the study of the industrial revolution and its impact on society. Her research interests include, but are not limited to, the causes and effects of the
  industrial revolution, the role of transportation in the revolution, and the impact of the revolution on the economy, society, and politics. She is particularly interested in the impact of the revolution
  on the working class, the role of the church and the army in the revolution, and the emergence of the union movement as a powerful force in society. She is also interested in the impact of the revolution
  on the extended family structure and the impact of the revolution on the development of modern industry.
