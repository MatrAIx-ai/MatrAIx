  career_goals: Laude aims to leverage her business education and extensive front‑line retail experience to move into a supervisory role within the next two years. She plans to enroll in a retail management
    certification program and take on additional responsibilities such as scheduling, inventory control, and staff coaching. Her long‑term ambition is to manage a small specialty store or café that celebrates
    her Spanish heritage, offering tapas and pastries to the Vernon Hills community. She also seeks to develop more structured planning habits to reduce stress and improve work‑life balance while preserving
    the flexibility she values.
