personas:
  professional: An aspiring junior naturalist and meticulous LEGO architect, Anastasia Barnes blends her love of drawing animals and landscapes with early experiments in observing creek ecosystems, often
    sketching the flora and fauna while daydreaming about dinosaur fossils and space rockets, and they compete quietly to build the most intricate LEGO model during weekend club sessions.
  sports: A budding soccer enthusiast, Anastasia Barnes plays on the De Pere Mini‑Kickers T‑team, eagerly cheers for the Green Bay Packers on Sundays, spends weekend afternoons climbing trees along the
    nearby creek, preferring solo nature hikes over large team games, yet they enjoy family bike rides for cardio and friendly competition.
  arts: A passionate young illustrator, Anastasia Barnes spends hours sketching deer and pine forests inspired by John James Audubon and Claude Monet while listening to Mozart’s piano concertos, loves reading
    Beatrix Potter tales at the local library storytime, and they once performed a short dinosaur poem recital at their LEGO club gathering.
  travel: An adventurous family traveler, Anastasia Barnes delights in weekend trips to the Green Bay Botanical Garden and Wisconsin Dells water parks, explores the creek near home with a magnifying glass,
    dreams of visiting the Smithsonian National Air and Space Museum in Washington, D.C., yet they prefer short, flexible outings that allow plenty of time for drawing and discovering hidden bugs.
  culinary: A budding home‑chef, Anastasia Barnes enjoys blending strawberry‑banana smoothies, assembling peanut‑butter‑and‑jelly sandwiches with carrot sticks and animal‑shaped crackers, proudly bakes
    chocolate‑chip cookies with their mother, but they sometimes refuse broccoli and get anxious when trying unfamiliar dishes.
  core: An imaginative, slightly anxious seven‑year‑old, Anastasia Barnes channels curiosity into sketching wildlife, building elaborate LEGO worlds, and obsessively saving pocket money—yet they often misplace
    crayons and worry about the unknown.
background:
  cultural: Anastasia grows up in De Pere, Wisconsin, a small Midwestern community where family, school, and local traditions intertwine. Her family participates in community events such as the Outagamie
    County Fair, church gatherings, and library storytimes, exposing her to a blend of traditional American values and the region’s natural heritage. The nearby Fox River, forested parks, and seasonal activities
    like sledding and leaf‑collecting shape her love for the outdoors and inspire the themes in her art. While her background is predominantly white Midwestern, she encounters diverse media and cultural
    stories through books, television, and school programs, which broaden her perspectives and feed her curiosity.
attributes:
  skills: '[''Drawing/Sketching'', ''Storytelling'', ''LEGO building'', ''Basic reading'', ''Beginner coding (ScratchJr)'']'
  hobbies: '[''Drawing'', ''Reading picture books'', ''Exploring nature'', ''LEGO building'', ''Listening to classical music'', ''Puzzles'']'
  career_goals: Anastasia dreams of becoming an illustrator who can bring her love of nature and art to life in children's books. She also imagines herself as a wildlife artist who captures animals in the
    forests near her home, and occasionally envisions a future as a scientist or astronaut who discovers new worlds. Her competitive streak pushes her to aim for art contests and science fairs, while her
    curiosity fuels a desire to keep learning and exploring.
