personas:
  professional: A diligent retail professional, Daisy Askew leverages five years of cash‑handling and POS expertise, meticulous inventory tracking, and empathetic customer service to streamline store operations,
    while they actively prepare for a shift‑leader role through a retail management certification and community‑development coursework.
  sports: A community‑oriented fitness enthusiast, Daisy Askew attends weekly gentle yoga classes at the local wellness center, supports the nearby professional baseball team, the Cleveland Guardians, and
    plays as a catcher on a co‑ed adult softball league affiliated with the town’s recreation department, and they relish the sense of teamwork it offers.
  arts: A soulful gospel enthusiast, Daisy Askew sings in her church choir, draws creative inspiration from contemporary novelists like Celeste Ng and self‑help author Brené Brown, and unwinds while knitting
    to the folk sounds of Brandi Carlile and the lyrical storytelling of The Lumineers, and they find these artistic outlets essential for emotional balance.
  travel: A detail‑oriented explorer, Daisy Askew prefers short, well‑planned weekend retreats to garden‑rich locales such as the Biltmore Estate’s historic grounds in Asheville, while dreaming of a culturally
    immersive two‑week pilgrimage to Kyoto’s zen temples, balancing travel ambitions with a modest budget and volunteer commitments, and they often use travel‑planning apps to keep costs in check.
  culinary: A methodical home chef, Daisy Askew enjoys crafting weekly menus centered around seasonal produce—roasting beetroot and goat cheese salad, simmering chickpea tikka masala with cumin and smoked
    paprika, and baking sourdough bread with fresh rosemary—while experimenting with spice blends and honing a solid intermediate cooking skill set, and they relish the calm that comes from precise preparation.
  core: Daisy Askew is a meticulous, compassion‑driven retail professional who balances a love for order, creative crafts, and community service while navigating frequent anxiety, and they constantly strive
    to turn structured efficiency into meaningful impact.
background:
  cultural: Daisy is an African-American woman who grew up in a close-knit Black family in the Intermountain West. Her heritage is a source of pride; she celebrates traditions like Juneteenth and family
    reunions that emphasize storytelling, music, and communal cooking. Living in Layton, UT, where the Black community is relatively small, she has forged strong bonds through her church and local cultural
    groups, finding support in shared faith and cultural events. These experiences have reinforced values of resilience, mutual aid, and collective responsibility, shaping both her compassionate outlook
    and her desire to contribute positively to her neighborhood.
