  hobbies: '[''Reading'', ''Gardening'', ''Cooking'', ''Knitting'', ''Puzzle solving'', ''Volunteer work at food pantry'', ''Gospel choir'', ''Meditation'', ''Yoga'']'
  career_goals: Daisy aims to leverage her reliability and leadership potential to move into a supervisory role within the next two years, such as a shift leader or assistant store manager. She plans to
    complete a retail management certification and enroll in part-time courses in community development, with a longer-term ambition to transition into a community outreach coordinator position at a nonprofit
    organization. Balancing stability with her desire to help others, she seeks a career path that offers predictable hours, opportunities for mentorship, and a direct impact on the well-being of her local
    community.
