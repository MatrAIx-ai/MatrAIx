persona_description: A linguist who specializes in the study of Slavic languages and their history, particularly focusing on the reconstruction of Proto-Slavonic. Their research interests include the analysis
  of morphological reconstruction, the comparison of Slavic languages, and the study of loanwords and their etymological simplifications. They have access to a vast collection of material stored in the
  archives of the 'General Slavic Linguistic Atlas', which they use to analyze the geographical distribution of morphologically reconstructed Proto-Slavonic and loaned forms in the Slavic territories. Their
  findings are presented on an attached map, which they use to illustrate the characteristics of the reflex forms in the West-Slavic and Slovenian linguistic areas, as well as the distribution of the '*pest-6'
  and '*pest-6n-ic-a' forms in Croatia and the '*Sak-a' reflexes in the Serbian and Macedonian areas.
