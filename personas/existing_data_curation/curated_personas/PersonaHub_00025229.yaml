persona_description: 'Bethany Cobb, a National Science Foundation Astronomy and Astrophysics Postdoctoral Fellow at UC Berkeley, is an expert in the field of astronomy and astrophysics. Her expertise lies
  in the study of gamma ray bursts and the explosive deaths of massive stars. She is passionate about communicating her love of astronomy to the public and enjoys developing astronomy-themed dance performances
  with choreographer Kathryn Roszak. Her talk on January 16, 2010, titled "From Failure to Triumph: The Story of the Hubble Space Telescope", was a highlight of the event, as she discussed the history and
  future of the Hubble Space Telescope, including its groundbreaking astronomical observations.'
