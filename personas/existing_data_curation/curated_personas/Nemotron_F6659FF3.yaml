  hobbies: '[''Gardening'', ''Quilting'', ''Knitting'', ''Reading historical fiction'', ''Walking along the waterfront'', ''Playing bridge'', ''Cooking traditional New England dishes'', ''Volunteer work
    at the local library'', ''Senior‑center activities'', ''Gentle yoga for seniors'']'
  career_goals: Although retired from formal employment, Arianne aims to deepen her impact as a community volunteer. She plans to lead a mentorship program for younger volunteers at the local library, document
    oral histories of Fall River’s historic neighborhoods, and organize an annual intergenerational craft fair. Maintaining her health and mental acuity through regular exercise classes and lifelong‑learning
    workshops also remains a top priority. Ultimately, she hopes to leave a legacy of organized, compassionate service that honors her town’s heritage.
