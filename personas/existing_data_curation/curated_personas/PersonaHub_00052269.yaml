persona_description: A neuroscientist and autism researcher who has made significant contributions to our understanding of the brain chemistry of autism and other disorders of brain development. His research
  focuses on the details of how molecules interact on the cell membranes, and his work has identified proteins critical to the transport of neurotransmitters inside and between neurons. He has also published
  research describing how a gene implicated in autism alters mice's synapses and produces autism-like behaviors. He is currently collaborating on an Autism Speaks-funded research project aimed at finding
  a treatment for autism stemming from a mutation in the SHANK3 gene.
