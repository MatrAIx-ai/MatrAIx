  hobbies: '["Building LEGO models", "Reading adventure books", "Playing soccer", "Drawing and coloring", "Practicing Spanish vocabulary", "Helping cook Colombian dishes", "Listening to Latin music and
    dancing"]'
  career_goals: Kemuel is already dreaming about the future with a blend of curiosity and practicality. He is fascinated by how things are built and hopes to become a civil engineer who designs bridges
    and safe playgrounds for his community. At the same time, his caring nature leads him to consider roles where he can help others, such as a teacher or community health worker. He aspires to keep learning,
    stay organized, and eventually lead projects that combine his love for building with his desire to support his friends and family.
