personas:
  professional: Kemuel Suarez is a budding junior engineer who spends his after-school hours piecing together LEGO sets with methodical precision, then improvising his own designs, showcasing his curiosity
    balanced by practicality and his organized, reliable nature.
  sports: Kemuel Suarez is an enthusiastic member of the Thunder Cubs youth soccer league, kicks the ball with his friends at the neighborhood park, and roots for FC Barcelona, admiring their skillful play
    while also enjoying occasional backyard basketball hoops.
  arts: Kemuel Suarez immerses himself in creative expression by drawing vivid adventure maps, coloring comic-style heroes, and dancing to Latin pop icons like Shakira and Bad Bunny, letting rhythm guide
    his imagination during playtime.
  travel: Kemuel Suarez loves family road trips to the science museum in Washington, D.C., backyard camping under the stars, and day-long excursions to the beach, while day-dreaming about exploring the
    Grand Canyon and a future visit to a dinosaur fossil dig site.
  culinary: Kemuel Suarez enjoys helping prepare simple Colombian dishes such as arepas de queso and empanadas, loves the taste of mango salsa, and frequently experiments with drawing smiley faces on pancakes
    before dinner.
  core: Kemuel Suarez blends a methodical LEGO engineer’s mind with a playful love for soccer, music, and cooking, while occasionally forgetting to clean up his bricks and sometimes skipping bedtime routines.
background:
  cultural: Kemuel’s cultural background blends Colombian heritage with the vibrant multicultural landscape of Chicago. At home, Spanish is spoken alongside English, and family traditions such as preparing
    arroz con pollo and sharing stories about his grandparents’ hometown in Colombia enrich his daily life. He participates in local festivals like the annual Colombian Day Parade in the city's Little Village,
    where he experiences traditional music and dance. His community offers connections with other Latino families, bilingual school programs, and access to public libraries that provide both English and
    Spanish literature, fostering his bilingual identity and pride in his roots.
attributes:
