  career_goals: Although retired, Mary aims to leave a lasting legacy by documenting her family's oral history and sharing it through a memoir. She strives to stay mentally active by attending weekly classes
    at the local senior center, learning new crafts, and mentoring younger volunteers in the community garden. Additionally, she hopes to deepen her involvement with the Grand Rapids Historical Society,
    assisting with archival preservation and occasional public talks. Her goals reflect a balance of curiosity—exploring new subjects—and practicality—applying her skills to help others.
