  career_goals: Jill aims to advance to an office manager role within her current organization, leveraging her organizational strengths and leadership potential. She plans to earn the Certified Administrative
    Professional (CAP) credential and an advanced Microsoft Office Specialist certification to deepen her technical expertise. Jill is eager to lead a digital transformation project that implements a cloud‑based
    filing system, improving accessibility and security for the office. She also seeks to mentor newer administrative staff, sharing best practices and fostering a supportive team environment. Longer‑term,
    Jill envisions taking on a community liaison position with Steele County’s economic development office, where she can apply her administrative skills to support local businesses and volunteer initiatives.
