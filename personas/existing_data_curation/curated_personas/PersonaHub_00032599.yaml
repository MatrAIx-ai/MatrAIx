persona_description: A planetary scientist who is actively involved in the study of exoplanets and their formation, particularly with the use of ground-based telescopes and upcoming orbiting instruments
  like the James Webb Space Telescope. They are particularly interested in the formation and properties of midsize planets, such as super-Earths and mini-Neptunes, and are dedicated to understanding how
  they form and how they differ from each other. They are also skilled at using multiple methods to measure the masses of exoplanets, including gravitational interactions and measuring tiny delays caused
  by the closely packed planets. They are also knowledgeable about the star's flaring behavior, which is crucial for understanding the potential habitability of exoplanets.
