personas:
  professional: Carmen Albelo, a seasoned mechanic and mobile equipment specialist in Queens, they blend hands‑on curiosity with practical problem‑solving, diagnosing everything from delivery trucks to
    lawn‑mower engines while their bilingual fluency and skeptical eye for low‑quality parts earn client trust and keep them improvising innovative repairs.
  sports: Carmen Albelo follows the New York Yankees religiously, cheering them on every weekend, they also enjoy playing informal salsa‑style cardio sessions as a form of exercise, and occasionally join
    local pick‑up basketball games at the community center, balancing competitive spirit with a love for social camaraderie.
  arts: Carmen Albelo immerses themselves in merengue and salsa rhythms, regularly dancing to artists like Juan Luis Guerra, Elvis Crespo, and Celia Cruz, they also collect vinyl records and attend live
    performances at local clubs, letting the vibrant beats shape both their social life and creative problem‑solving mindset.
  travel: Carmen Albelo prefers short, affordable getaways such as a weekend at Rockaway Beach, cultural excursions to Old San Juan in Puerto Rico, and occasional road trips to New Orleans for its music
    scene, they plan trips on a flexible schedule but often delay them when workshop responsibilities or financial concerns arise.
  culinary: Carmen Albelo loves cooking hearty dishes like mangú with sautéed onions, bandera of rice, beans, and fried plantains, they relish using fresh plantains, sofrito, and avocado in their kitchen,
    confidently hosting block parties where their skillful grilling and generous portions showcase a blend of comfort and tradition.
  core: Carmen Albelo is a charismatic, improvisational mechanic whose love for community, spontaneous energy, and occasional anxiety fuels a life of hands‑on creativity, relentless skepticism of shortcuts,
    and a habit of dancing through challenges.
background:
  cultural: Carmen was raised in a tightly knit Dominican family that migrated to Queens when she was a child. The household preserved the island’s traditions—Spanish was spoken at home, weekly family meals
    featured plantains and rice, and religious celebrations blended Catholic rituals with Afro‑Caribbean music. Growing up in Arverne, she was surrounded by a vibrant Dominican diaspora that celebrates
    cultural festivals, Dominican Independence Day parades, and street fairs filled with bachata rhythms. Her identity is deeply tied to the values of hard work, community solidarity, and familial loyalty,
    which she carries into both her professional life and her social circles. These cultural roots also shape her warm, outgoing demeanor and her commitment to giving back to the community that supported
    her upbringing.
attributes:
  skills: '[''diagnostic troubleshooting'', ''small‑engine repair'', ''hydraulic system maintenance'', ''welding and metal fabrication'', ''electrical wiring and rewiring'', ''custom vehicle modification'',
    ''bilingual communication (Spanish/English)'', ''customer relationship management'']'
  hobbies: '[''salsa dancing'', ''bachata dancing'', ''cooking Dominican cuisine'', ''DIY home renovation'', ''motorcycle customization'', ''community volunteering'', ''attending neighborhood block parties'',
    ''listening to merengue and bachata music'', ''walking on the beach'', ''watching baseball games'']'
  career_goals: Carmen dreams of opening a community‑focused garage in Arverne that offers affordable repair services and hands‑on training workshops for women and young adults from the local Dominican
    and broader Queens community. She wants to gain formal certification through a community‑college apprenticeship to legitimize her expertise while retaining the flexibility she values. In the long term,
    she hopes to expand the shop into a mobile service unit that can travel to neighborhood events, providing on‑site maintenance for food trucks, street vendors, and small businesses. Her ambition is also
    driven by a desire to achieve financial stability for her family and to create a supportive work environment that balances spontaneity with a sustainable business model.
