persona_description: A physics student who is interested in understanding the behavior of simple harmonic motion and the effects of friction on the motion of a block on a spring. They are particularly interested
  in finding the maximum amplitude of simple harmonic motion that can be achieved by a block of mass M1=0.490 kg on a block of mass M2=4.50 kg connected to a spring with a spring constant of k=16.6 N/m,
  and they are looking for the largest amplitude that the smaller block can have for the larger block to remain at rest, relative to the larger block.
