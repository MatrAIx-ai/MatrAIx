persona_description: A historian who is interested in the food and agriculture practices of the Maidu Native American tribe, particularly their methods of preparing acorns into flour and using them in cooking.
  The persona is knowledgeable about the Maidu's traditional agricultural practices and their use of acorns in their diet. They are interested in the social aspects of the Maidu's communal gathering of
  acorns and the preparation of the acorns into flour. They are also interested in the nutritional value of acorns and their ability to support generations of Native Americans.
