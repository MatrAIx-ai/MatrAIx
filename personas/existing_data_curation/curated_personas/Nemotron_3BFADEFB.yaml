  hobbies: '[''Cooking and Baking'', ''Vegetable and Flower Gardening'', ''Church Choir Singing'', ''Quilting and Knitting'', ''Reading Mystery Novels'', ''Bingo Nights'', ''Walking by the Waterfront'',
    ''Local History Exploration'']'
  career_goals: Although retired, Mary is committed to remaining an active and influential member of her community. She aims to expand her volunteer role at the church and senior center, taking on mentorship
    responsibilities to teach younger volunteers how to plan and execute community events. Mary hopes to compile and preserve her family's traditional recipes in a handwritten cookbook, ensuring that future
    generations retain their culinary heritage. She envisions establishing a weekly craft circle for local seniors where members can share knitting, quilting, and gardening tips. Maintaining her health
    and mobility to continue gardening and attending community gatherings is also a priority. Ultimately, Mary strives to leave a lasting legacy of service, tradition, and connection within Lake Village.
