  hobbies: '[''Woodworking'', ''Scale Model Aircraft Building'', ''Gardening'', ''Chess'', ''Historical Non‑fiction Reading'', ''STEM Mentoring'', ''Walking/Hiking'', ''Classic Car Restoration'', ''Fishing'']'
  career_goals: Although retired from full‑time work, Chavez aims to stay professionally active by offering part‑time consulting for local small‑businesses needing technical guidance, and by leading free
    workshops on data analysis and engineering basics at the community college. He hopes to mentor high‑school students in robotics competitions, author a memoir that captures lessons from his engineering
    career, and maintain a structured volunteer schedule that reinforces his sense of purpose while preserving financial independence.
