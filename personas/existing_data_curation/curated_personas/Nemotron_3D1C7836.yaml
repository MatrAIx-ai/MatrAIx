  hobbies: '[''Landscape drawing'', ''Digital illustration'', ''Photography'', ''Hiking'', ''Reading science fiction'', ''LEGO robotics'', ''Minecraft'', ''Beginner piano'']'
  career_goals: Trevor aspires to merge his love for art, technology, and the environment into a career that designs sustainable spaces. He dreams of becoming an environmental architect or a product designer
    who creates interactive installations for agricultural settings, such as sensor‑enhanced vineyard tours. To achieve this, he plans to attend a STEM‑focused high school, win regional science fairs with
    projects that blend art and data, and later pursue a university degree in architecture or environmental engineering. His long‑term ambition includes establishing a youth studio that encourages other
    kids to explore creative solutions for ecological challenges.
