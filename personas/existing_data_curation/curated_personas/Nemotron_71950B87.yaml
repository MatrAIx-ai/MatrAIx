  hobbies: '[''Adult Soccer League'', ''Community Center Event Volunteering'', ''Book Club'', ''Hiking in the Ozarks'', ''Live Music Shows'', ''Cooking with Friends'']'
  career_goals: Troy aims to advance from his current administrative assistant role to a supervisory position such as Office Manager or Operations Coordinator within the next three to five years. He plans
    to enroll in a community college program for an associate degree in Business Administration to solidify his managerial credentials. Long‑term, he envisions overseeing a team of administrative staff,
    implementing efficiency initiatives, and contributing to strategic planning for a midsized organization in Springfield. He also aspires to become a certified administrative professional (CAP) to validate
    his expertise and open doors to higher‑level corporate support roles.
