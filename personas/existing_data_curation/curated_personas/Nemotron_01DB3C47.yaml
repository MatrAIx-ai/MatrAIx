  career_goals: In the short term, Jane aims to excel academically in high school, earn a leadership position in student council, and expand her involvement in community service projects such as the local
    food bank and environmental clean‑ups. She hopes to develop a portfolio of public‑speaking and multimedia work that could support college applications. Long‑term, she envisions pursuing a degree in
    communications, public health, or education at a university, with the ambition to become a community outreach coordinator or a middle‑school teacher who integrates technology and experiential learning.
    Jane also dreams of starting a youth mentorship program in Lititz that connects high school students with younger peers to foster confidence and civic engagement.
