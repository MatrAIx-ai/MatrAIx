personas:
  professional: Jane Dupont is an aspiring teen media producer who leverages their keen eye for visual storytelling and sociable charisma, and they create upbeat soccer match highlights, theatre rehearsal
    snippets, and ukulele cover videos for the school’s social media, balancing curiosity-driven experimentation with practical deadlines.
  sports: Jane Dupont stars as a midfielder on the Lancaster High School Lady Lancers soccer team, follows the Philadelphia Eagles and Philadelphia 76ers with enthusiastic discussion on game days, and maintains
    fitness through weekend hikes in the rolling countryside of Lancaster County, blending team commitment with a love for outdoor endurance.
  arts: Jane Dupont thrives in the school theatre club, where they channel the comedic timing of Timothée Chalamet and the lyrical storytelling of Lin‑Manuel Miranda into original performances, while their
    ukulele practice features covers of Taylor Swift’s 'All Too Well' and indie folk tunes, and they regularly edit short‑form videos to the beats of Billie Eilish.
  travel: Jane Dupont prefers weekend road trips that combine adventure and relaxation, such as hiking the Appalachian Trail segments near Shenandoah National Park, exploring the historic streets of Williamsburg,
    Virginia, and dreaming of a future study abroad stint in Barcelona, Spain, all while they balance schoolwork and family commitments.
  culinary: Jane Dupont enjoys baking classic chocolate chip cookies and lemon bars for school fundraisers, experimenting with seasonal ingredients like fresh strawberries from the community garden, while
    their cooking skill hovers at a confident home‑chef level, albeit they often get distracted by texting friends, resulting in slightly over‑browned treats.
  core: Jane Dupont is a socially energetic teen who blends creative storytelling, team sports, and a penchant for juggling school responsibilities with occasional forgetfulness, making them the go‑to friend
    for quick video edits and spontaneous snack runs.
background:
  cultural: Jane comes from a white, Mid‑Atlantic American family with deep roots in the Lititz region of Lancaster County. Her ancestry includes German‑American heritage, a legacy reflected in local festivals,
    traditional foods, and the town’s historic architecture. She was raised in a supportive, middle‑class household that values community involvement, education, and seasonal celebrations such as Halloween,
    Thanksgiving, and the Lititz Heritage Days. While she participates in mainstream American cultural practices—like school sports, pop‑culture media, and holiday traditions—her family also honors regional
    customs, such as attending the annual Lancaster County Farm Show and maintaining a modest garden that yields fresh produce for family meals. This blend of broader American culture and local Pennsylvania‑German
    influences shapes Jane’s sense of identity and informs her interest in community‑focused career goals.
