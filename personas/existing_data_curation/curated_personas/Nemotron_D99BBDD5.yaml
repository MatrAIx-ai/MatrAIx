  hobbies: '["Book club participation","Karaoke and community theater","Vegetable gardening","Quilting","Genealogy research","Volunteering at library story‑time","Weekend trips to state parks","Attending
    Peoria Riverfront Festival"]'
  career_goals: Although currently not employed, Glenna aims to obtain a GED within the next year and become a certified volunteer coordinator through a community college program. She hopes to lead a regional
    senior‑center outreach program that combines her love for social interaction, practical problem‑solving, and community service. Long‑term, she envisions writing a memoir of her life in Peoria, highlighting
    the stories of the people she’s met, and using that platform to mentor younger volunteers in the area.
