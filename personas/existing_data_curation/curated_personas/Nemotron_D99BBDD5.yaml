personas:
  professional: Glenna Jones, a seasoned community volunteer coordinator in training, blends meticulous event planning with on‑the‑fly flexibility, leveraging her talkative charm and natural empathy to
    mediate neighborhood disputes and stretch limited budgets for senior‑center programs.
  sports: Glenna Jones is a devoted fan of the Peoria Chiefs baseball team and the Chicago Cubs, joins a weekly pickleball club at the senior center, and spends warm weekends strolling the trails of Starved
    Rock State Park to stay active.
  arts: Glenna Jones regularly dazzles audiences at community theater productions, belts out classics during karaoke nights to the tunes of Dolly Parton and Frank Sinatra, and devotes her book‑club evenings
    to the works of Jane Austen and Toni Morrison.
  travel: Glenna Jones prefers low‑key weekend getaways, having explored Starved Rock and the Shawnee National Forest on road trips, while dreaming of a modest rail‑tour through historic Northeastern towns
    such as Boston and Philadelphia, always planning meticulously to stay within her fixed travel allowance.
  culinary: Glenna Jones, a confident home cook, often prepares fresh garden harvest dishes such as tomato‑basil soup, roasted beet salad with goat cheese, and classic Midwestern apple crisp featuring tart
    Granny Smith apples and a hint of cinnamon.
  core: Glenna Jones combines a neighborly Midwestern work ethic with boundless curiosity, turning every community gathering into a lively, well‑organized celebration while quietly wrestling with age‑related
    aches and a meticulous budgeting habit.
background:
  cultural: Glenna was born and raised in Peoria, Illinois, into a family of mixed German‑American and Irish‑American heritage. The Midwestern culture of modesty, hard work, and neighborly hospitality shaped
    her values, as did the local Catholic parish she attended as a child. She grew up with a strong sense of community responsibility, often helping at the neighborhood church bake sales and riverfront
    clean‑up days. The regional love for baseball, fairs, and river life is reflected in her fondness for local traditions and her desire to preserve Peoria’s communal spirit.
attributes:
  skills: '["Interpersonal communication","Public speaking","Event planning and coordination","Basic computer literacy (email, social media, reservation software)","DIY home maintenance","Gardening and
