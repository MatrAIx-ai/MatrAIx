persona_description: A Chinese economist who is critical of the zero-case strategy and advocates for the importance of economic recovery and the well-being of the Chinese people. They are concerned about
  the negative impacts of the zero-case approach on the Chinese economy and believe that the risks of opening up are substantial. The persona is also interested in the experiences of people during lockdowns
  and the potential economic downturns that accompany them. They are active on Chinese social media and search for evidence from other countries to support reopening.
