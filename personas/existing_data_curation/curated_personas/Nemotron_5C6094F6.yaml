  hobbies: '[''herb gardening'', ''reading Civil Rights history and biographies'', ''family recipe experimentation'', ''listening to gospel and soul music'', ''playing chess at the senior center'', ''fishing
    at Lake Purdy'', ''watching Alabama Crimson Tide football'', ''occasional attendance at small church gatherings'']'
  career_goals: Looking ahead, Kevin aims to leverage his decades‑long operational knowledge into a mentorship and consulting role that helps emerging Black‑owned eateries in the Birmingham metro area streamline
    their operations and achieve sustainable profitability. He plans to obtain an advanced ServSafe Manager certification and develop a short‑course curriculum focused on efficient kitchen workflows, inventory
    reduction, and staff development. Concurrently, Kevin is exploring the launch of a modest catering venture that specializes in Alabama soul‑food classics for church events, family reunions, and community
    festivals, allowing him to maintain a structured schedule while passing on family recipes to the next generation. Ultimately, his ambition is to secure a comfortable retirement that still leaves him
    actively involved in preserving Southern culinary heritage and fostering the growth of local talent.
