  hobbies: '[''LEGO building'', ''Scratch programming'', ''Reading science books'', ''Soccer'', ''Baseball'', ''Robotics club'', ''Stargazing'', ''Piano practice'', ''Nature walks'', ''Journaling'']'
  career_goals: He aspires to become an engineer—especially civil or environmental engineering—to design sustainable infrastructure for his hometown of Columbus. He dreams of winning his school’s science
    fair, earning scholarships, and eventually studying at a top university. He also contemplates a role in teaching or mentoring younger students, using his practical curiosity to help others solve real‑world
    problems. His ambition is to combine his love of technology with a desire to improve community life.
