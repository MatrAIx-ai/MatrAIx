personas:
  professional: Louis Keich, an aspiring robotics enthusiast who builds intricate LEGO models and programs simple Scratch games, channels their curiosity into practical problem‑solving and they reliably
    meet club deadlines while keeping room for spontaneous inventions.
  sports: Louis Keich plays soccer with the Columbus Youth Soccer Club in the spring and baseball for the local YMCA league in the summer, cheering on the Cleveland Guardians and Columbus Blue Jackets,
    and they treat weekend games as both social fun and a disciplined fitness routine.
  arts: Louis Keich practices piano twice a week, enjoys the melodic simplicity of Yiruma and the classic scores of Beethoven, and they channel their creative energy into building LEGO sculptures that echo
    scenes from Star Wars while also devouring adventure books by Chris Columbus.
  travel: Louis Keich loves weekend road trips to Hocking Hills State Park for hiking and stargazing, dreams of visiting the Kennedy Space Center in Florida, and they plan each outing with a rough itinerary
    that balances school obligations, family budget, and a craving for new science museums.
  culinary: Louis Keich favors classic comfort foods like macaroni and cheese, chicken nuggets, and apple pie, delights in homemade cinnamon‑spiced pumpkin pancakes, and they occasionally experiment with
    LEGO‑inspired cupcake decorations while mastering the art of mixing peanut butter sandwiches.
  core: Louis Keich is a calm, curiosity‑driven 11‑year‑old who blends practical project‑building with generous community spirit, even if they sometimes binge on LEGO sets and forget to floss.
background:
  cultural: Louis is raised in a suburban Midwestern setting in Columbus, Ohio, within a white American family that values community, hard work, and modesty. He participates in local youth activities such
    as after‑school sports, school clubs, and occasional church or scouting events. The regional culture of Ohio—its love for baseball, emphasis on education, and community festivals—shapes his outlook,
    fostering a practical yet curious mindset. Family gatherings, neighborhood block parties, and a supportive school environment reinforce the Midwestern ideals of cooperation, resilience, and balanced
    independence.
attributes:
  skills: '[''Mathematics problem solving'', ''Basic programming (Scratch)'', ''Introductory Python'', ''LEGO Technic building'', ''Robotics kit assembly'', ''Reading comprehension'', ''Project organization'',
