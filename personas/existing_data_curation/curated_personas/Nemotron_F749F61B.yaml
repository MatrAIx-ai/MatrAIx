  career_goals: Jorge aspires to pursue a career in technology, aiming to earn a scholarship to attend community college for computer science and eventually transfer to a four‑year university. He hopes
    to become a software engineer or a robotics specialist, with a long‑term ambition of creating tools that help students manage anxiety and improve study habits. While he values practical, stable employment,
    he also entertains the possibility of launching his own tech startup that merges his programming skills with his interest in mental‑health solutions. He sees education as the pathway to financial independence
    and wants to support his family while maintaining a balanced, organized lifestyle.
