personas:
  professional: Jorge Castano, a 15‑year‑old aspiring robotics engineer, channels their meticulous planning and competitive edge into designing Arduino‑controlled RC cars and leading their school’s robotics
    club projects, often balancing innovative concepts with proven engineering methods.
  sports: Jorge Castano, an occasional soccer enthusiast, joins pickup games at the local park with friends on weekends and roots for the city’s professional team, the Riverside Rapids, while they favor
    a structured weekly fitness routine that mixes light cardio with quick agility drills to stay sharp for robotics competitions.
  arts: Jorge Castano, who unwinds by creating digital sketches inspired by sci‑fi illustrator Syd Mead and indie game artist Hideo Kojima, also enjoys listening to playlists that blend regional Mexican
    corridos with contemporary pop icons like Ariana Grande, shaping their visual aesthetic and creative downtime.
  travel: Jorge Castano, who dreams of touring tech hubs such as Tokyo’s Akihabara and Silicon Valley’s Computer History Museum after their high school graduation, prefers meticulously planned itineraries
    that balance museum visits with immersive gaming arcades, though budget constraints often limit trips to nearby cultural festivals within their state.
  culinary: Jorge Castano, a novice home cook with a penchant for flavorful tacos al pastor, often experiments by adding chipotle‑infused marinades and fresh cilantro, while also enjoying quick noodle bowls
    seasoned with soy sauce and ginger, reflecting their blend of practical meal prep and curiosity for bold tastes.
  core: Jorge Castano, a 15‑year‑old tech‑savvy tinkerer with a competitive streak, navigates teenage life between their meticulous robotics projects, impulsive gaming splurges, anxiety‑driven self‑care
    rituals, and a love for digital art and regional music.
background:
  cultural: Jorge comes from a Mexican‑American family that maintains strong ties to its heritage while living in the multicultural environment of Dickinson, Texas. At home, Spanish is spoken daily, and
    family gatherings feature traditional Mexican dishes such as tamales and pozole, as well as celebrations of holidays like Día de los Muertos and Mexican Independence Day. These cultural experiences
    have instilled in him a respect for family, community, and perseverance. At the same time, his upbringing in Galveston County exposes him to a blend of Texan and Hispanic influences, shaping his bilingual
    identity and giving him a broader perspective on both cultures. He often draws inspiration from his heritage in his creative projects and values the support of his extended family network.
