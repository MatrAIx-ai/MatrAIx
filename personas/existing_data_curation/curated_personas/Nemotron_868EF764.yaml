  hobbies: '[''Watercolor painting'', ''Historical fiction reading'', ''Poetry and essay exploration'', ''Canal trail walking and birdwatching'', ''Sketching nature studies'', ''Herb and perennial gardening'',
    ''Creative memoir writing'', ''Knitting scarves and blankets'', ''Participating in a small book club'', ''Volunteering at the community library (art‑themed events)'']'
  career_goals: Although Janel is no longer part of the formal workforce, she remains driven by a desire for personal growth and community contribution. Her primary ambition is to become a regular docent
    at the Rochester Museum of Arts, where she can share her passion for art with visitors in intimate tours. She also hopes to complete a memoir that weaves together her family's genealogy, the history
    of Penfield, and her own reflections on grief and resilience, possibly publishing it through a local press. Janel plans to enroll in a series of adult‑learning courses on digital archiving to preserve
    the stories of her neighborhood. Finally, she aspires to design a quarterly small‑scale art showcase that highlights works of emerging local artists, providing them a supportive platform while satisfying
    her curatorial interests.
