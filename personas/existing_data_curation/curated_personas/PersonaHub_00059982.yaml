persona_description: A researcher and anthropologist who specializes in studying the daily life of communities over time, particularly in Latin American communities. She has a passion for development work
  and has spent nearly 30 years studying the lives of people in a slum settlement in Guayaquil, Ecuador. Her research has been dedicated to Emma Torres, a young community leader in 1978, and she has tracked
  down some of the emigrants to their new lives in Barcelona. She has a unique perspective on the benefits and challenges of living in a slum settlement and has a deep understanding of the socio-economic
  factors that affect the lives of people in these communities.
