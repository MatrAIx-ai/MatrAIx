persona_description: A person who is responsible for ensuring that all drivers meet the required visual acuity and visual field standards, including being able to read a number plate from 20 meters. This
  person is legally responsible for notifying the Driver and Vehicle Licensing Agency (DVLA) of any changes in their health or vision that may affect their ability to meet these standards. This person is
  also responsible for promoting regular eye tests and encouraging drivers to take the number plate test, as well as supporting the Government's recommendation that adults should have their eyes tested
  every two years.
