personas:
  professional: Joel Scigliano, a 14‑year‑old aspiring robotics engineer, spends afternoons building LEGO Technic sets and programming Arduino boards, channeling their curiosity into practical prototypes
    while they mentor younger kids at the community tech club, and they dream of one day designing autonomous rovers for planetary exploration.
  sports: Joel Scigliano plays point guard for the Sandy Storm youth basketball team, follows the Utah Jazz, and rides with the Wasatch MTB Club on weekends, maintaining a personal training log that combines
    hill hikes with interval biking sessions, and they value both teamwork and solo endurance.
  arts: Joel Scigliano devours sci‑fi novels like The Expanse and Dune, streams soundtracks from Interstellar and the Star Wars saga, and frequently listens to Imagine Dragons and The Mountain Goats while
    they sketch LEGO robot designs, letting the blend of literature, music, and visual creativity shape their imagination.
  travel: Joel Scigliano has backpacked through Yellowstone and taken a family road trip to Moab for mountain biking, and they now dream of hiking the Grand Canyon rim and visiting the Kennedy Space Center,
    planning trips with meticulous checklists that balance adventure with school responsibilities.
  culinary: Joel Scigliano enjoys crafting high‑energy trail mix with almonds, dried mango, and dark chocolate chips, often whips up quick avocado toast or chili‑topped nachos after hikes, and they occasionally
    experiment with quinoa salads, though they admit to over‑indulging in sugary energy drinks before gaming sessions.
  core: Joel Scigliano blends a love for outdoor adventure, hands‑on robotics, and sci‑fi storytelling into a balanced teen life, punctuated by disciplined budgeting, modest health routines, and a habit
    of late‑night snack cravings, and they always keep a spare set of mismatched socks for good luck.
background:
  cultural: 'Joel was raised in Sandy, a suburb of Salt Lake City in Utah’s Wasatch Front. His family’s cultural environment reflects typical Mountain‑West values: a strong emphasis on family, community
    service, and enjoying the outdoors. Local traditions such as weekend hikes, participation in youth sports leagues, and involvement in school‑based service projects have shaped his worldview. While his
    family identifies as white American, the regional culture—often influenced by the Church of Jesus Christ of Latter‑day Saints and broader Western American customs—places importance on cooperation, modest
    ambition, and stewardship of the natural environment.'
