  career_goals: He aims to pursue a degree in engineering—preferably mechanical or aerospace—so he can blend his curiosity for how things work with a practical desire to contribute to real‑world projects.
    Joel is interested in designing sustainable infrastructure or future space technologies, and he hopes to gain internship experience at local tech companies or research labs. Long‑term, he envisions
    a career that balances technical innovation with teamwork, allowing him to mentor younger students and lead community‑focused engineering projects.
