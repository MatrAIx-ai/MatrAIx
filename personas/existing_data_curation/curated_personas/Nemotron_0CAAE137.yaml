personas:
  professional: Donald Fontenot, a veteran public safety dispatcher with 25 years of rapid information processing and calm voice communication, channels their practical curiosity into troubleshooting CAD
    and GIS systems while mentoring new staff, often balancing methodical procedures with spontaneous tech tinkering.
  sports: Donald Fontenot, a loyal fan of the Chicago Cubs and Bears who joins the Riverdale Runners walking club for early‑morning jogs and plays occasional weekend softball with the local community center
    league, balances his fitness routine with practical, low‑impact exercises to accommodate his back issues.
  arts: Donald Fontenot, who unwinds by listening to Chicago blues legends like Buddy Guy and classic folk storytellers such as Studs Terkel, frequents the Art Institute’s regional history exhibits and
    volunteers at community theater productions, finding creative inspiration in the city’s rich musical and narrative traditions.
  travel: Donald Fontenot, who prefers well‑planned weekend road trips to Midwestern escapes like Door County and Starved Rock State Park, occasionally splurges on a longer pilgrimage to New Orleans for
    authentic Cajun cuisine, balancing his love for spontaneous ham‑radio contacts abroad with a modest travel budget and family commitments.
  culinary: Donald Fontenot, an adept home cook who enjoys perfecting Cajun staples like shrimp gumbo and jambalaya alongside classic Chicago deep‑dish pizza and grilled bratwurst, often throws in a dash
    of hot sauce and a handful of fresh herbs from his garden, while occasionally treating himself to a slice of New York cheesecake from a beloved bakery.
  core: Donald Fontenot, a practical yet curious community stalwart, juggles a love for ham‑radio chatter and model railways with a habit of postponing paperwork, all while keeping a steady calm under pressure.
background:
  cultural: Donald grew up in Riverdale, a working-class suburb of Chicago, where Midwestern values of practicality, courtesy, and community involvement shaped his outlook. Though his surname reflects French-Acadian
    roots, his family blended those heritage traditions, such as occasional Cajun cooking and Catholic holidays, with the broader cultural fabric of the Midwest. He identifies with the blue-collar, neighbor-helping
    ethos of the region while also appreciating the diverse cultural events of the Chicago metropolitan area. This mixed background informs his cooperative nature and his respect for both established customs
    and new ideas.
