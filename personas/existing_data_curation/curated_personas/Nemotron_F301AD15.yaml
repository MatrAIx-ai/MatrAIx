  career_goals: Looking ahead, Ahmad envisions turning his artistic curiosity into a career that merges visual storytelling with technology. He aims to attend a high‑school program focused on visual arts
    or STEAM, eventually studying multimedia design, animation, or video‑game development at a university. He hopes to create culturally resonant content that reflects his community's experiences, and he
    also keeps an eye on the possibility of earning a basketball scholarship, seeing sport as a parallel path that can teach leadership and discipline. In the long term, he aspires to work as a digital
    creator or interactive media producer who can inspire other young people, especially from under‑represented backgrounds, to explore creative problem‑solving.
