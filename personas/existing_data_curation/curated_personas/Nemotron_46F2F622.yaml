  career_goals: Gloria aspires to combine her love of art, technology, and community into a future career as an exhibition designer for museums or cultural institutions, where she can create interactive
    displays that educate and inspire visitors. In the shorter term, she aims to earn a scholarship to a top high school STEM program, win a regional science fair with a project that merges art and engineering,
    and take on leadership roles in youth art and robotics organizations. Ultimately, she envisions studying interdisciplinary design in college and using her organizational talent to lead collaborative
    projects that blend creativity with innovative technology.
