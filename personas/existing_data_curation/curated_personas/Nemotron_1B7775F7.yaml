    pick‑up soccer in local parks'', ''Attending live music performances'']'
  career_goals: Looking ahead, Jose aims to transition from daily site oversight to a mentorship and consultancy role, leveraging his experience to guide younger managers and promote environmentally responsible,
    art‑centric building. He plans to obtain LEED AP certification and to launch a boutique consulting practice that helps developers embed local cultural art and green technologies in affordable housing
    projects throughout Queens. He also hopes to document his career in a series of articles or a memoir that explores how his Ecuadorian heritage and humanities education have shaped his approach to construction,
    with the long‑term ambition of influencing industry standards toward more inclusive and aesthetically enriched development.
