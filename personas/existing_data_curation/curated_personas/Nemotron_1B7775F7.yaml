personas:
  professional: Jose Prats, a bilingual construction manager with over thirty years of experience overseeing multifamily and commercial projects, blends rigorous budgeting, safety compliance, and code navigation
    with a keen aesthetic sense drawn from his humanities background, and they use flexible, collaborative leadership to embed sustainable design and local artistic elements into developments while transitioning
    toward mentorship and LEED‑certified consultancy.
  sports: Jose Prats enjoys playing pick‑up soccer with the Queens Community Soccer League on Saturdays, cheers for the New York Knicks and Yankees throughout the season, and maintains a modest fitness
    routine that includes weekend jogs along the East River waterfront to balance their energetic social life.
  arts: Jose Prats immerses themselves in the arts by frequenting the Queens Museum, MoMA PS1, and neighborhood galleries, where they sketch Art Deco cornices and photograph vibrant murals inspired by the
    works of Ai Weiwei, Kehinde Wiley, and local street artist JR, using these visual experiences to inform their design sensibility and community projects.
  travel: Jose Prats favors loosely planned trips that blend cultural immersion and artistic discovery, regularly returning to their ancestral homeland every few years, while also exploring the historic
    neighborhoods of Barcelona, the Andean highlands of Patagonia, and the temples of Kyoto, balancing limited retirement savings with a desire for inspiration that fuels their consulting work.
  culinary: Jose Prats, a confident home chef, regularly prepares traditional fish stew with yuca and cilantro (encebollado) and crispy plantain slices (patacones), alongside grilled corn salads and avocado
    salsa, savoring the communal potluck atmosphere where they share these flavors with neighbors while occasionally experimenting with new fusion recipes using locally sourced herbs.
  core: Jose Prats blends a relaxed, sometimes chaotic approach to organization with an insatiable curiosity for art and sustainable design, often juggling sketchbooks, construction plans, and garden pots
    in a single afternoon, and their habit of arriving late to meetings is offset by a warm, collaborative spirit.
background:
  cultural: Jose was born in Ecuador and moved to the United States as a young adult, settling in the vibrant, multicultural neighborhood of Jamaica, Queens. He maintains strong ties to his Andean roots
    through language, family celebrations, and the flavors of his home‑cooked meals. The Ecuadorian values of community, hospitality, and respect for nature subtly inform his approach to both work and life,
    prompting him to prioritize harmonious team dynamics and environmentally conscious building practices. Immersed in the diverse cultural tapestry of Queens, he blends his heritage with influences from
    Caribbean, Latin American, and immigrant communities, fostering a worldview that celebrates artistic expression and collaborative problem‑solving.
