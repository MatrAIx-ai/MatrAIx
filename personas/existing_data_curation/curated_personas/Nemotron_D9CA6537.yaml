personas:
  professional: Elizabeth Perdue, an 83‑year‑old retired volunteer coordinator, channels their lifelong love of storytelling, craft, and local history into curating community workshops, preserving Milford’s
    heritage, and mentoring younger neighbors, while maintaining a careful balance between meticulous planning and a playful improvisational spirit.
  sports: Elizabeth Perdue enjoys daily walks on the Milford Nature Trail with the local senior walking club, attends gentle yoga sessions at the senior center, passionately follows the Boston Red Sox and
    Boston Celtics on television, and occasionally joins a community softball game in the spring.
  arts: Elizabeth Perdue spends afternoons painting watercolors of the Henry Whittemore Bridge, attending concerts featuring the Boston Symphony Orchestra performing Mahler and John Coltrane’s classics,
    visiting exhibitions showcasing Monet and O'Keeffe at the New England Museum of Art, and singing in the Milford community choir where they perform Irving Berlin standards.
  travel: Elizabeth Perdue prefers organized, senior‑friendly day trips by Amtrak to iconic New England coastal towns such as Portland, Maine, Newport, Rhode Island, and Martha’s Vineyard, balancing a love
    of historic architecture with modest budget constraints, and dreams of a relaxed cruise along the Cape Cod shoreline with their husband.
  culinary: Elizabeth Perdue delights in baking classic apple pies with homemade flaky crusts, simmering rosemary‑infused chicken pot pie, tending to fresh basil and thyme for pesto, and preparing New England
    clam chowder using garden‑grown herbs, though they occasionally over‑sweeten the pies and forget to let the dough rest.
  core: Elizabeth Perdue is an imaginative, community‑driven octogenarian who balances meticulous volunteering with an occasional tendency to hoard craft supplies and forget to water houseplants.
background:
  cultural: Elizabeth grew up in post-World War II New England as a white Anglo-American family rooted in the small-town culture of Worcester County. Her upbringing was shaped by the values of hard work,
    community involvement, and a strong sense of family continuity typical of mid-century New England. Regular church attendance and participation in local civic events reinforced a culture of cooperation
    and mutual support. Throughout her life, she has maintained deep ties to Milford's historic neighborhoods, local traditions, and the region's appreciation for arts, crafts, and seasonal celebrations.
