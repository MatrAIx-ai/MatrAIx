  career_goals: Although retired, Elizabeth wishes to remain an active contributor to her community and family. She plans to write a memoir and compile a scrapbook of her family's genealogy and Milford's
    history. She hopes to mentor younger neighbors in her craft skills through a weekly workshop, and she dreams of establishing a small community garden where stories and produce can be shared. She also
    aims to curate a modest exhibit on local history at the town library, and she intends to keep learning by attending senior education courses in art and history. Traveling to see iconic New England coastal
    towns with her husband is another cherished ambition.
