persona_description: A social scientist who is interested in the dynamics of online communities and the factors that contribute to their success. They have a background in sociology or anthropology and
  have conducted research on community formation and organization. They are interested in understanding the role of social norms, systems for transmitting values, methods for monitoring adherence to values,
  and methods for distributing resources to enable participation in online communities. They are also interested in the ways in which online communities differ from face-to-face communities and the potential
  for online communities to achieve great things.
