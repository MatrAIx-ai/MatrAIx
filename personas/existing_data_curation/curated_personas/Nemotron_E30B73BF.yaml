personas:
  professional: Kathleen Niehaus, a budding community organizer in the kindergarten class they attend who coordinates soccer games and choir rehearsals with a simple, color‑coded schedule, blending their
    love of structure with a laid‑back attitude toward strict rules.
  sports: Kathleen Niehaus, an avid member of the local Riverside Cubs youth soccer team who loves sprinting tag during recess and cheers for Manchester United during family game nights, and they always
    approach fitness with high energy and a preference for organized scrimmages that still leave room for spontaneous play.
  arts: Kathleen Niehaus, a creative crayon artist who fills sketchbooks with bright animal scenes inspired by Dr. Seuss, delights in reading adventure tales by Roald Dahl, and sings enthusiastically in
    school choir while humming Taylor Swift’s catchy tunes, letting these artistic influences shape their bright, collaborative personality.
  travel: Kathleen Niehaus, an adventurous traveler who spends Saturdays helping in the community garden and dreams of exploring Yellowstone National Park after family road trips that blend carefully packed
    snacks with spontaneous stops at roadside fruit stands, and they display a love of structure in packing but flexibility in the journey.
  culinary: Kathleen Niehaus, a budding home chef who enjoys assembling peanut butter and jelly sandwiches, crafting mini cheese pizzas, and tossing fresh garden salads with lettuce they helped grow, favoring
    bright ingredients like cherry tomatoes and carrot sticks while occasionally sneaking extra chocolate chips into cookies when no one’s watching.
  core: Kathleen Niehaus, a soccer‑loving, sticker‑collecting, color‑coded crayon enthusiast who balances a need for simple routines with a carefree attitude toward rules, never misses a chance to help
    in the garden, and they occasionally forget homework in the rush of play.
background:
  cultural: Kathleen is a white child raised in Roanoke, Virginia, where Southern Appalachian culture blends with modern suburban life. Her family participates in local traditions such as county fairs,
    holiday gatherings, and community service events. The public school environment emphasizes teamwork and respect, reinforcing her cooperative nature and appreciation for community harmony.
