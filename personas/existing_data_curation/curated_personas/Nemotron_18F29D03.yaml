  skills: '[''X‑ray imaging'', ''CT imaging basics'', ''Radiation safety'', ''Patient positioning'', ''Equipment maintenance'', ''Anatomy and physiology knowledge'', ''Digital imaging workflow (PACS, DICOM)'',
