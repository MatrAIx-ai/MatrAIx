  hobbies: '[''Soccer (local league)'', ''Bachata and salsa dancing'', ''Volunteering at health fairs'', ''Cooking Mexican cuisine'', ''Hiking in Sierra foothills'', ''Strategy video gaming (Civilization
    VI)'', ''Mindfulness meditation'', ''Yoga'', ''Urban photography'']'
  career_goals: Pablo aims to earn his ARRT certification and specialize in advanced imaging modalities such as MRI and interventional radiology within the next three years. He aspires to become a lead
    technologist or department coordinator at a hospital in the Central Valley, where he can mentor new staff and improve imaging protocols. Long‑term, he envisions opening a community imaging center in
    Modesto that offers affordable services to underserved Latino families. He also plans to complete an associate’s degree in radiologic science and eventually pursue a bachelor’s in health administration,
    while developing effective strategies to manage his anxiety and maintain emotional well‑being.
