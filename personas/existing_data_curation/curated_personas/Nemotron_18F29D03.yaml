personas:
  professional: Pablo Hernandez, a 22‑year‑old radiologic technologist, excels at X‑ray and CT imaging, leveraging meticulous documentation and bilingual communication to streamline workflow, while their
    disciplined, organized nature drives them toward ARRT certification and future leadership in advanced imaging.
  sports: Pablo Hernandez plays forward for the Modesto United co‑ed soccer league, follows the San Jose Earthquakes and the Golden State Warriors, and joins local hiking groups for weekend treks in the
    Sierra foothills, where they channel high energy into teamwork and endurance.
  arts: Pablo Hernandez immerses themselves in bachata and salsa nights to the rhythms of Aventura and Celia Cruz, they capture urban street scenes inspired by Henri Cartier‑Bresson with a DSLR, and they
    enjoy the storytelling of director Guillermo del Toro, shaping their creative outlet.
  travel: Pablo Hernandez favors weekend getaways to nearby Yosemite and Lake Tahoe for hiking, dreams of exploring Mexico City’s culinary markets and Barcelona’s architecture, yet plans trips around a
    tight student budget and family commitments.
  culinary: Pablo Hernandez loves preparing mole negro and tamales with family, experimenting with chilies, chocolate, and masa, while they also master quick ramen bowls and avocado toast for late‑night
    study sessions, balancing traditional flavors with modern convenience.
  core: Pablo Hernandez is a disciplined radiology tech with a passion for soccer, salsa, and Mexican cooking, who battles anxiety through mindfulness but sometimes trades sleep for video games.
background:
  cultural: Pablo was raised in a Mexican‑American household in Modesto, where his parents immigrated from Jalisco. Bilingual in Spanish and English, he grew up celebrating Día de los Muertos, Mexican Independence
    Day, and family gatherings centered around food, music, and shared traditions. The close‑knit Hispanic community in Stanislaus County fostered a strong sense of collective responsibility, motivating
    him to serve the health needs of his neighbors. While embracing traditional Mexican values of family, respect, and hard work, he also integrates mainstream American culture through his education, social
    activities, and professional aspirations, creating a bicultural identity that informs his communication style, community involvement, and career goals.
