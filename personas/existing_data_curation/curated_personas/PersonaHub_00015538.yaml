persona_description: A public health researcher interested in understanding the impact of early life exposures on adult health outcomes. They are particularly interested in the effects of season of birth
  on infant mortality rates and the subsequent health outcomes in adulthood, especially in the context of heart disease and diabetes. They are looking for evidence to support the importance of in utero
  (endogenous) causes affecting adult health and are interested in using historical records and linked data to investigate this relationship.
