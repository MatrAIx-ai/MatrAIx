  hobbies: '[''Gardening'', ''Yoga'', ''Hiking'', ''Cooking'', ''Book club'', ''Community theater volunteering'', ''After‑school tutoring'', ''Family travel to national parks'']'
  career_goals: Cassidy aims to advance to a district‑level Director of Counseling Services, where she can design and implement a comprehensive, evidence‑based career readiness curriculum across multiple
    schools. She also seeks to obtain the National Certified Counselor (NCC) credential and to lead a regional initiative that integrates mental‑health support into career advising. Long‑term, she envisions
    establishing a community counseling center in Murrieta that offers free career workshops and mental‑health resources for underserved families, while mentoring the next generation of counselors.
