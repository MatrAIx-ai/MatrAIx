personas:
  professional: Cassidy Arellano, a seasoned career counselor with a business degree, applies data‑driven assessments, meticulous budgeting, and structured program management to guide students, while their
    methodical reliability and outgoing nature make workshops engaging and their anxiety pushes them to over‑prepare every session.
  sports: Cassidy Arellano enjoys regular hikes on the Santa Rosa Plateau, joins the Murrieta Trail Runners for weekend 5‑k runs, practices yoga for flexibility, and cheerfully follows the San Diego Padres,
    Los Angeles Lakers, and U.S. Women’s National Soccer Team, balancing low‑impact activities with occasional weekend bike rides.
  arts: Cassidy Arellano volunteers backstage for the Murrieta Community Theater, curates a weekly book club featuring self‑help authors like Brené Brown and James Clear, and relishes concerts by folk artists
    such as John Denver and contemporary singer‑songwriters like Sara Bareilles, letting creative expression complement their counseling work.
  travel: Cassidy Arellano plans family trips to national parks like Yosemite, Grand Canyon, and Zion with meticulous itineraries, prefers staying in cabin rentals for immersion, dreams of exploring the
    fjords of Norway and the temples of Kyoto, and balances travel budgets by using points earned from a travel rewards credit card while always packing a portable herb garden kit.
  culinary: Cassidy Arellano transforms garden bounty of tomatoes, jalapeños, and basil into fresh tomato‑basil sauce, peppers stuffed with quinoa, and herb‑infused grilled chicken, experiments with dishes
    like Mexican street corn salad and Mediterranean mezze, and enjoys hosting potluck dinners where neighbors swap recipes while they occasionally chase perfection by over‑seasoning and re‑cooking dishes
    until just right.
  core: Cassidy Arellano merges methodical career counseling with garden‑to‑table cooking, community theater leadership, and a relentless quest for order, all while managing a high‑energy anxiety that fuels
    both meticulous planning and occasional over‑commitment.
background:
  cultural: Cassidy was raised in a middle‑class, suburban White family in Southern California, where traditional values such as hard work, community involvement, and family cohesion were emphasized. Growing
    up in the Riverside County region, she experienced a blend of suburban stability and outdoor lifestyle, fostering a strong appreciation for routine, practicality, and local community networks. Her cultural
    upbringing includes participation in a local evangelical church, regular family gatherings centered around home‑cooked meals, and a deep respect for the educational opportunities afforded by her community.
attributes:
  skills: '[''Career counseling'', ''Academic advising'', ''Vocational testing'', ''Student assessment'', ''Program development'', ''Workshop facilitation'', ''Conflict resolution'', ''Crisis intervention'',
