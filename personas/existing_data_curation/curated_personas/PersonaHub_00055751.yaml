persona_description: A former President of the United States, George W. Bush, who was known for his commitment to education and his efforts to improve the nation's education system through federal-state
  partnerships. He invited state governors to a two-day summit to discuss education issues and worked closely with them to develop an agenda and reach a joint statement on setting national education goals.
  The summit was successful in acknowledging the size of the task ahead and in building a relationship of respect and cooperation between the President and the governors. The summit was followed by the
  establishment of six concrete goals and a decade-long series of annual reports on progress toward achieving those goals.
