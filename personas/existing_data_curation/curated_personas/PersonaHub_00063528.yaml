persona_description: A scientist at the National Oceanic and Atmospheric Administration (NOAA) who specializes in weather forecasting and climate prediction. The persona is knowledgeable about high-resolution
  weather models and their impact on the accuracy and lead times of severe weather warnings. The persona is also interested in the use of IBM supercomputers for climate and weather forecasts and is familiar
  with the capabilities of the new system, including its ability to make 69.7 trillion calculations per second and its ability to rapidly refine and update severe weather forecasts as dangerous weather
  develops and threatens U.S. communities. The persona is also interested in the impact of these new supercomputers on NOAA's understanding and prediction of changes in the Earth's environment and conservation
  of coastal and marine resources.
