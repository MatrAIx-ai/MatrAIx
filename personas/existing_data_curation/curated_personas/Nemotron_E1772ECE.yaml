  career_goals: Michael aims to move into a supervisory role within the next two to three years, pursuing certifications in logistics management and OSHA safety coordination. He wants to lead a shift team,
    mentor new workers, and implement small‑scale efficiency projects that reduce errors and improve job safety. Long‑term, he dreams of starting his own locally‑focused moving and delivery service that
    emphasizes community support and fair labor practices. To prepare, he plans to enroll in a community‑college supply‑chain program and take online courses in Lean Six Sigma fundamentals, all while continuing
    to nurture his compassionate leadership style.
