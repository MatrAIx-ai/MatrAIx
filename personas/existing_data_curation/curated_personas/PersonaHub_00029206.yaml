persona_description: A paleontologist or a researcher who specializes in the study of sponges, particularly the Demospongea family. This person is likely to be interested in the history of research on Demosponges,
  their anatomy, and their distribution in different geological periods. They would also be interested in the physical and biological characteristics of Choia, the sponge that is known from the Burgess
  Shale and the Middle Cambrian formations. They would be knowledgeable about the Burgess Shale and its significance in the study of sponges, and they would be interested in the different species of Choia
  and their characteristics. They would also be interested in the geological and paleontological context in which Choia was found, as well as the evolutionary history of Demosponges.
