personas:
  professional: A tiny organizer who transforms the living room into a tidy construction site, Mariangeles Mauricio meticulously arranges building blocks, catalogs stuffed animals by size, and rehearses
    teacher role‑plays that reflect their love of structure and knack for leading peers at playdates.
  sports: An enthusiastic toddler athlete, Mariangeles Mauricio participates in a weekly toddler gymnastics class at the community center, chants along with the Green Bay Packers on Saturdays, proudly wears
    a Milwaukee Bucks T‑shirt while mastering the art of crawling up the playground slide, and eagerly watches the Milwaukee Brewers games on family movie nights.
  arts: A lively cultural performer, Mariangeles Mauricio loves dancing to the rhythmic beats of Carnaval parades at home, mimics the gestures of legendary singer Carlos Vives, hums Shakira’s catchy hooks,
    and spends afternoons finger‑painting to the melodies of piano virtuoso Lang Lang, blending vibrant Latin rhythms with familiar American nursery rhymes.
  travel: A curious little explorer, Mariangeles Mauricio has already taken family road trips to Door County for beach sandcastles, visited the Wisconsin State Fair to ride the Ferris wheel, and joined
    a family vacation to Quito where they collected smooth river stones and delighted in watching colorful street festivals, fueling a love for both nearby nature escapes and distant cultural experiences.
  culinary: A picky yet adventurous eater, Mariangeles Mauricio enjoys spoon‑feeding on arroz con pollo with tender chicken pieces, loves the sweet crunch of plantain fritters, requests mashed sweet potatoes
    tossed with a dash of cinnamon, but consistently refuses broccoli sticks, trading them for small bites of cheddar cheese cubes.
  core: Mariangeles Mauricio is a structured, sociable toddler who orchestrates play, hoards coins, manages tiny health routines, dances to festive beats, and dreams of future adventures while stubbornly
    avoiding greens.
background:
  cultural: 'Mariangeles is raised in a bilingual Ecuadorian household in Trevor, Wisconsin. Spanish is spoken at home, and Ecuadorian customs are woven into daily life: family meals often feature dishes
    like arroz con pollo and plantain fritters, and the household celebrates holidays such as Carnaval, Día de los Muertos, and the New Year with traditional music and stories. Her parents blend South American
    traditions with Midwestern American life, taking her to local community events while also sharing Ecuadorian folklore, dance, and cuisine, creating a rich multicultural environment that shapes her identity.'
attributes:
  skills: '["following daily routines","organizing toys by color","stacking blocks","narrating activities","turn‑taking in play","singing short songs","basic counting","color identification"]'
  hobbies: '["building block towers","dancing to Latin music","listening to storytime","reciting nursery rhymes","outdoor exploration","drawing with crayons","pretend cooking"]'
  career_goals: Even at two, Mariangeles loves to imagine her future. She often says she wants to be a "teacher" or a "storyteller" who can make other children laugh and learn. She dreams of performing
    on a stage, calling herself a "dance star" who dances to lively Latin rhythms. She also expresses a wish to help her family cook traditional Ecuadorian dishes, hoping to become a "kitchen helper" who
    shares food and joy with others.
