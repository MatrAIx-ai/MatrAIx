  hobbies: '[''Watercolor painting'', ''Coastal photography'', ''Bird‑watching'', ''Exploring farmers markets'', ''Collecting vintage cookbooks'', ''Reading speculative fiction'', ''Listening to jazz and
    blues'', ''Home brewing'', ''Community art workshops'', ''Herb gardening'']'
  career_goals: Edward aspires to turn his love of art and food into a boutique pop‑up dining experience that showcases experimental, locally sourced dishes in an intimate setting. He hopes to earn a ServSafe
    Manager certification and take a few evening culinary classes to deepen his technical knowledge, which would help him eventually open a small seaside café where he can curate both the menu and the visual
    ambience. In the longer term, Edward dreams of publishing a memoir‑cookbook that blends his personal reflections, recipes, and sketches, providing a therapeutic outlet for his worries and a way to share
    his unconventional culinary perspective.
