persona_description: A law professor who specializes in the study of conflict of laws and its various theories and systems used to resolve the issue of choosing an applicable law in cases with facts touching
  more than one jurisdiction. His research interests include exploring the variety of approaches used to resolve the conflict of laws question, particularly in cases involving state/state conflicts, as
  well as extending these approaches to other problems such as adjudicatory jurisdiction, judgments, federal subject-matter jurisdiction, and public and private international law. He is likely to have extensive
  knowledge and experience in the field of conflict of laws and would be able to provide detailed insights and analysis on the different theories and systems used to resolve this question.
