  career_goals: Rudi aims to transition into a senior leadership role, such as Principal Engineer or Director of Engineering, where he can steer large‑scale, sustainable product initiatives and mentor the
    next generation of engineers. He is passionate about integrating environmentally responsible materials and additive manufacturing into traditional mechanical systems. Over the next five years, he plans
    to lead a multidisciplinary innovation hub within his company, championing cross‑functional collaboration between engineering, design, and user experience teams. Additionally, he aspires to launch a
    community‑focused STEM outreach program in Clarksville, providing hands‑on workshops for underrepresented youth and fostering a culture of curiosity and creativity.
