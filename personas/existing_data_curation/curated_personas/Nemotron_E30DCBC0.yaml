  hobbies: '[''Bridge'', ''Historical Society Volunteering'', ''Line Dancing'', ''Ballroom Dancing'', ''Community Gardening'', ''Mystery Novel Reading'', ''Book Reviewing'', ''Genealogy Research'', ''Wine
