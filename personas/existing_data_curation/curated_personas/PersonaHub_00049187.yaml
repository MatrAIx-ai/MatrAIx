persona_description: A professional involved in forestry, conservation, and resource management, interested in landscape-scale assessments of forest quality and its implications for biodiversity, ecosystem
  services, and human values. They are likely to be familiar with the concept of forest authenticity, environmental benefits, and social and economic benefits, and have experience in collecting and analyzing
  data for such assessments. They may be involved in the development of a methodology and protocol for assessing forest quality at a landscape scale, and have practical experience using this approach in
  case studies from Europe, Asia, Africa, and Latin America. They are likely to have a background in ecology, conservation, and resource management, and have experience in working on issues related to forest
  conservation, protected areas, and broad-scale approaches to conservation. They are interested in the broader issues and sources of information related to forest quality, and may be involved in developing
  and implementing conservation strategies based on this assessment.
