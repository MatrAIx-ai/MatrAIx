personas:
  professional: Ruth Merhi is a 32‑year‑old sheet metal fabricator who blends meticulous organizational habits with on‑the‑fly problem‑solving, leveraging MIG, TIG and stick welding, CNC programming and
    blueprint reading to lead teams, while they channel a competitive edge into continuous process‑improvement initiatives and mentorship of aspiring women tradespeople.
  sports: Ruth Merhi shows up every Tuesday night for the Boone County Softball League, cycles the 200‑mile Katy Trail each weekend, and hikes the rugged paths of Rock Bridge Memorial State Park, cheering
    on the St. Louis Cardinals and the Kansas City Chiefs while they blend social rivalry with personal fitness goals.
  arts: Ruth Merhi carves metal into kinetic sculptures inspired by Isamu Noguchi and fuels their creative spark at the Tivoli Theatre, where they regularly catch performances by Sturgill Simpson and local
    folk band The Brooks, while weekend DIY woodworking projects echo the functional artistry of Tom Dixon.
  travel: Ruth Merhi prefers road‑trip itineraries that let them test their revived 1970s Harley‑Davidson along iconic routes like Route 66, dreaming of a future trek through the fjords of Norway and already
    logging bike rides through Colorado’s Rocky Mountain trails whenever a long weekend opens up, and they savor each stop with a mix of planned sights and spontaneous detours.
  culinary: Ruth Merhi dominates community potlucks with smoky Kansas City‑style barbecue, mastering a dry rub of smoked paprika, brown sugar, and cayenne that seasons ribs, brisket and grilled corn, while
    they occasionally indulge in craft beer pairings and experiment with wood‑smoked salmon for a gourmet twist.
  core: Ruth Merhi is a hands‑on fabricator who balances a competitive, detail‑driven work ethic with a love for social sports, DIY metal art, and backyard barbecue, yet they sometimes let perfectionism
    spill into late‑night tinkering at the expense of sleep.
background:
  cultural: Ruth grew up in Columbia, Missouri, in a family of German‑Irish descent that values hard work, modesty, and community. The Midwestern culture of practicality and collegialism shaped her pragmatic
    approach to both work and life. She celebrates traditional holidays such as Thanksgiving and the Fourth of July with extended family and participates in local church (United Methodist) gatherings. The
    university‑town atmosphere fostered an openness to new ideas, while her union affiliation reinforced a collective spirit. These cultural influences blend to support her competitive drive, community
    orientation, and curiosity about innovative techniques.
