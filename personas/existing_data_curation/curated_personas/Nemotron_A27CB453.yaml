  hobbies: '[''Softball league'', ''Biking the Katy Trail'', ''Hiking at Rock Bridge'', ''Metal sculpture projects'', ''Vintage motorcycle restoration'', ''Barbecue cooking'', ''Live music events'', ''Food
    bank volunteering'', ''DIY woodworking'', ''Reading technical magazines'']'
  career_goals: Ruth aims to progress from skilled fabricator to senior lead supervisor within the next five years. She plans to earn AWS Certified Welder and CNC Programmer certifications, complete an
    associate degree in Mechanical Engineering Technology, and lead a team of fabricators at a manufacturing plant. Her competitive drive pushes her to develop and test new process improvements carefully
    before adoption, balancing curiosity with practical reliability. Long‑term, she envisions launching a boutique metal‑work studio that designs custom architectural pieces and restores vintage equipment,
    allowing her to blend her technical curiosity with entrepreneurial ambition. She also hopes to mentor women entering skilled trades and champion safety initiatives.
