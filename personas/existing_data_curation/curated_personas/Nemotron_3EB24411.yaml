  career_goals: He envisions a career that combines his love for hands‑on work with a stable, routine‑oriented environment. His immediate goal is to enroll in a vocational high‑school program focused on
    automotive technology, earn certifications, and eventually become a certified automotive technician. He hopes to open a small, family‑run repair shop in Westminster that serves the local community.
    While staying open to the possibility of contributing to his family's restaurant, he aims to develop expertise that provides both financial security and the ability to give back to the neighborhood
    he values.
