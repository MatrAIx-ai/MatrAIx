persona_description: A conservation biologist who works for WWF and the International Snow Leopard Trust, focusing on the protection and conservation of snow leopards and their habitat. He is aware of the
  potential economic pressures on countries that are home to snow leopards, and the increasing demand for their bones due to the scarcity of tiger bones in Asian medicine markets. He is also aware of the
  economic needs of local people in snow leopard habitat and the need to address these needs in order to limit poaching. He is highly knowledgeable about the ecology and behavior of snow leopards, and the
  threats they face from poaching and habitat loss. He is also aware of the economic pressures on countries that are home to snow leopards, and the potential for an increase in trade in snow leopard skeletons.
