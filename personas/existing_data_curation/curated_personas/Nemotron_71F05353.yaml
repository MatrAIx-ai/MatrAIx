  career_goals: Ashton aims to progress into a principal engineer or technical architect role where he can shape the long‑term technology strategy of his organization while championing sustainable development
    practices. He is driven to lead a small, high‑performing team that values psychological safety and work‑life balance, leveraging his empathy to reduce burnout and improve collaboration. In the next
    five years, he plans to obtain advanced cloud certifications (e.g., AWS Solutions Architect), contribute to open‑source projects that emphasize reliability, and eventually explore consulting opportunities
    that allow him to apply his curiosity for emerging technologies without sacrificing his preference for focused, low‑noise work environments.
