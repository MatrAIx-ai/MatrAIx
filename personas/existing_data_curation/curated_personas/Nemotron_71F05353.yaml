personas:
  professional: A full‑stack software developer with a methodical mindset, Ashton Cordova leverages their organized, detail‑oriented approach to design resilient APIs and cloud infrastructure, while their
    preference for quiet, focused work environments drives them to mentor junior engineers in low‑distraction settings and champion sustainable development practices.
  sports: An avid outdoors enthusiast, Ashton Cordova regularly hikes the Bloomington hills with a DSLR in hand, participates in the local Bloomington Trail Running Club for weekend long runs, follows the
    Indiana Hoosiers basketball team and the Indianapolis Colts for seasonal sports excitement, and balances their low‑stimulus preference by keeping their personal fitness regimen centered on solitary
    activities like yoga and solo cycling.
  arts: 'A reflective creative soul, Ashton Cordova finds solace in playing piano pieces by Debussy and Philip Glass, attends screenings of classic science‑fiction films such as Blade Runner and 2001: A
    Space Odyssey, collects limited‑edition prints by surrealist artist Yayoi Kusama, and frequently visits the Eskenazi Museum of Art to draw inspiration for their photography projects.'
  travel: A methodical planner with a penchant for low‑key exploration, Ashton Cordova has trekked Iceland’s volcanic landscapes, camped in Yellowstone’s geyser basins, and dreams of hiking Patagonia’s
    Torres del Paine, but generally limits vacation time to weekend getaways within the Midwest to maintain work‑life balance and keep travel expenses manageable.
  culinary: A modest home chef, Ashton Cordova cultivates heirloom tomatoes, kale, and carrots in a small garden and transforms them into dishes like roasted beet and goat cheese salad, quinoa veggie bowl
    with miso‑glazed tofu, and occasional homemade sourdough bread, savoring the tactile process of fermentation while occasionally indulging in a craft beer at a local brewpub.
  core: A solitary yet empathetic technologist, Ashton Cordova melds meticulous engineering with gentle mentorship, balancing a deep‑rooted worry about burnout with a steadfast commitment to quiet, purposeful
    living.
background:
  cultural: Ashton grew up in a middle‑class Midwestern family with mixed European ancestry—predominantly Irish and German roots, with a distant Spanish lineage reflected in his surname. Raised in the Bloomington
    area, he internalized the region’s values of modesty, community engagement, and a strong work ethic. Family traditions include celebrating St. Patrick’s Day and German Oktoberfest gatherings, while
    also participating in typical American holidays such as Thanksgiving and Fourth of July. His upbringing emphasized education, punctuality, and cooperative spirit, which dovetail with his current professional
    and personal life in McLean County.
