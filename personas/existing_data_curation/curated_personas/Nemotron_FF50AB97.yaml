personas:
  professional: Curtis Wilson, a 19‑year‑old self‑taught full‑stack hobbyist developer who blends Python and JavaScript coding with hardware tinkering and graphic design, they readily lead small freelance
    web projects for local businesses while maintaining a relaxed, flexible schedule and a laid‑back approach to deadlines.
  sports: Curtis Wilson, a casual basketball enthusiast who joins the "Space City Hoops" pickup league at a nearby community center, they root for the Houston Rockets and watch NBA games for strategic inspiration,
    and occasionally stream e‑sports titles like Overwatch for their competitive edge.
  arts: Curtis Wilson, an avid hip‑hop beat‑maker who samples lo‑fi vibes reminiscent of J. Cole and Metro Boomin while editing digital art in Photoshop, they spend weekends photographing Houston’s vibrant
    murals and skyline, and binge‑watch sci‑fi epics like Blade Runner and The Expanse for visual inspiration.
  travel: Curtis Wilson, who prefers low‑cost, weekend‑focused trips, they often road‑trip to Austin’s music scene and New Orleans for the food, dream of a solo backpack adventure to Tokyo’s Akihabara district
    to soak in the tech culture, and plan travel around gaming conventions to maximize both photography opportunities and cheap flights.
  culinary: Curtis Wilson, who enjoys quick, flavor‑packed meals like loaded breakfast burritos with chorizo, cheese, and salsa, they can whip up a decent homemade ramen with miso paste and soft‑boiled
    egg, but often pair gaming marathons with pizzas topped with pepperoni, jalapeños, and extra cheese while sipping on craft cola.
  core: Curtis Wilson, a 19‑year‑old introspective tech hobbyist who balances a love for gaming, music production, and urban photography with a chill, slightly disorganized but highly curious mindset, they
    turn solitary creativity into freelance web gigs and dream of a future digital‑media studio.
background:
  cultural: Curtis is a second-generation African American raised in Houston’s vibrant, multicultural environment. His family roots trace back to the Southern Gulf Coast, and he grew up hearing stories
    of resilience, community solidarity, and the musical heritage of Black Houston—from blues and jazz to contemporary hip-hop. The neighborhood he calls home blends historic Black neighborhoods with newer
    immigrant influences, exposing him to a mosaic of cuisines, dialects, and traditions. Although he is naturally reserved, Curtis values the strong family ties and communal support common in his cultural
    setting, which subtly shape his compassion, self-reliance, and calm demeanor.
