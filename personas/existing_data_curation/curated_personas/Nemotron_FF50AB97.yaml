  career_goals: Curtis aims to translate his technical curiosity into a flexible, location-independent career. His short-term goal is to secure freelance web-development contracts that let him set his own
    schedule and work from home or coffee shops around Houston. Over the next few years, he hopes to deepen his full-stack skills, launch a small digital-media studio focused on serving local small businesses
    and community organizations, and eventually build a modest passive-income stream through a niche SaaS product. He values autonomy, so he prefers remote or gig-based work that accommodates his relaxed
    approach to obligations and desire for creative freedom.
