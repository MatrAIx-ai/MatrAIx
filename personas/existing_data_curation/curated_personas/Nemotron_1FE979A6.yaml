  career_goals: Cristina dreams of applying her curiosity and practical mindset to a future career that blends science with helping people. She hopes to study environmental science or biomedical engineering
    in college, aiming to develop sustainable solutions or medical technologies that improve community health. She also imagines sharing her passion for science through writing, perhaps becoming a science
    communicator or educator, and values the chance to work collaboratively on projects that make a positive impact.
