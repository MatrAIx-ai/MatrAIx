personas:
  professional: A budding game developer, Cristina Eaton channels curiosity and practicality into creating simple Scratch games, balancing organized project steps with spontaneous creative twists while
    they reliably meet weekend coding club deadlines.
  sports: Cristina Eaton shines as a forward on the community youth soccer league, dives into weekly swim practices during the summer, and passionately follows the professional soccer team City FC, cheering
    loudly during matches while they keep a meticulously organized training schedule.
  arts: A creative sketcher and budding musician, Cristina Eaton fills sketchbooks with fantasy characters inspired by the works of J.K. Rowling and C.S. Lewis, practices piano pieces by Ludovico Einaudi,
    and devotes free moments to reading illustrated novels, all while they occasionally stay up late listening to Taylor Swift, a habit that sometimes leaves them short on sleep.
  travel: An eager explorer, Cristina Eaton has visited the vibrant streets of New Orleans during a school field trip, splashed around at the sunny beaches of Clearwater, Florida, and dreams of trekking
    the ancient ruins of Machu Picchu, all while they meticulously plan each trip with a hand‑drawn itinerary that balances adventure and family budget constraints.
  culinary: A budding home chef, Cristina Eaton loves whipping up quick pasta dishes with marinara sauce, crafting colorful fruit smoothies using strawberries and mango, and sharing homemade banana muffins
    with soccer teammates, yet they sometimes forget to eat breakfast before school, relying on a late‑night snack that fuels their gaming sessions.
  core: Cristina Eaton is a balanced, curious twelve‑year‑old who blends organized creativity with teamwork, savvy saving habits, proactive health care, and a zest for exploring both fictional worlds and
    real‑life adventures, while they occasionally stay up late for music or gaming.
background:
  cultural: Cristina is a White American growing up in Malden, a diverse suburb of Boston in Middlesex County, Massachusetts. Her family traces its roots to European ancestors, with a mix of Irish and Italian
    heritage, and embraces typical New England cultural norms such as celebrating Thanksgiving, the Fourth of July, and local community festivals. She attends a public middle school where multicultural
    awareness is emphasized, and her upbringing stresses the value of education, community involvement, and kindness. While primarily English‑speaking, her family occasionally shares traditional recipes
    and stories from their heritage, giving her a modest connection to her ethnic background.
