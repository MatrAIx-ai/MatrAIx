  hobbies: '[''Architectural photography'', ''Scale model building'', ''Hiking'', ''Strategy video gaming'', ''Indie-rock vinyl collection'', ''DIY home-improvement projects'', ''Reading (architecture,
    philosophy, construction)'', ''Mindfulness meditation'']'
  career_goals: Jason aims to build a steady career in commercial and residential interior finishing, first by earning a journeyman-level certification in drywall and ceiling systems. He plans to complete
    an associate's degree in construction management at a local community college, which will enable him to progress into supervisory roles. In the medium term, he aspires to become a lead installer, overseeing
    crews on larger projects, and to specialize in sustainable, low-VOC finishes. Ultimately, he hopes to launch his own small contracting firm that emphasizes quality craftsmanship, environmentally friendly
    materials, and a supportive workplace culture - allowing him to mentor new tradespeople and maintain a work schedule that accommodates his mental-health needs.
