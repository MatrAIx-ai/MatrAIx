personas:
  professional: Jason Wumkes, a 21‑year‑old drywall finisher with a meticulous eye for detail, blends his hands‑on craftsmanship—measuring, cutting, installing ceiling tile systems, and reading blueprints—with
    a pragmatic curiosity that drives him to experiment with low‑VOC finishes while consistently aligning project schedules with safety standards and client aesthetics.
  sports: Jason Wumkes fuels their love for the outdoors by hiking the West Rock Ridge and Sleeping Giant trails with a local outdoor club, cheers on the Boston Red Sox and New England Patriots during the
    baseball and football seasons, and occasionally joins a community recreational soccer league for light cardio, balancing solo trail runs with occasional team sport engagement.
  arts: Jason Wumkes spends evenings developing a personal archive of indie‑rock vinyl—from The National to Mitski—while also capturing the weathered brick façades of historic New England towns through
    black‑and‑white photography, drawing inspiration from Ansel Adams and the moody compositions of Edward Hopper, and they regularly attend local gallery openings that showcase regional maritime art.
  travel: Jason Wumkes prefers modest, purpose‑driven trips, such as weekend stays in Newport, Rhode Island to explore its colonial architecture, a nostalgic rail journey to Boston’s historic Freedom Trail,
    and a long‑awaited pilgrimage to Kyoto to study traditional wooden machiya houses, always budgeting carefully and using travel‑planning apps to keep itineraries flexible yet focused.
  culinary: Jason Wumkes enjoys cooking simple, flavor‑forward meals like herb‑infused roasted chicken, homemade gnocchi with sage butter, and a faithful bowl of New England clam chowder, while they also
    experiment with building their own sourdough starter and pair meals with craft cold‑brew coffee, often sourcing fresh herbs from a nearby community garden.
  core: Jason Wumkes is a detail‑driven drywall finisher who balances a quiet love for historic architecture, solo hikes, and indie‑rock vinyl collecting with a pragmatic drive to master sustainable finishes—all
    while navigating intense anxiety through mindfulness and occasional procrastination on self‑care.
background:
  cultural: Jason was born and raised in Meriden, Connecticut, a city rooted in New England's industrial heritage. His family has a multigenerational tradition in the skilled trades - his father worked
    as a plumber and his grandfather as a carpenter - instilling a strong work ethic and respect for craftsmanship. Though he identifies as white, his ancestry includes Irish and French-Canadian roots that
    are reflected in local family gatherings and community events. Growing up, he attended the local public schools and later took courses at the nearby community college, where he was exposed to a diverse
    student body and a broader cultural perspective. The modest, community-oriented atmosphere of Meriden, combined with its proximity to the cultural amenities of New Haven, shaped Jason's values of reliability,
    cooperation, and a quiet pursuit of personal growth.
attributes:
  skills: '[''Drywall hanging and finishing'', ''Ceiling tile installation'', ''Joint taping and sanding'', ''Blueprint reading'', ''Precise measurement and layout'', ''Power tool operation'', ''Safety
