persona_description: A genealogist who is interested in tracing the genealogy of a family with a common surname, especially those with naming conventions and conventions for first and middle names. They
  are also familiar with the importance of checking spelling variations in old records and are open to searching for someone by another attribute, such as by village or street name. They are not afraid
  to get fixated on searching for their ancestors by name and are willing to explore the possibility of searching by village or street name to find interesting surprises in the records.
