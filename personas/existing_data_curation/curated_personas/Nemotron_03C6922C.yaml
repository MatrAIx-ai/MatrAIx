  hobbies: '[''Reading historical nonfiction'', ''Gardening'', ''Cooking and recipe development'', ''Jazz and blues listening'', ''Photography of local architecture'', ''Walking and nature observation'',
    ''Small‑group book discussions'', ''Volunteer tutoring at community center'']'
  career_goals: Kenneth aims to re‑enter the workforce in a role that bridges his humanities background with community service. He is pursuing part‑time work as a cultural program coordinator for a local
    museum or historical society, where he can design workshops on African American history and curate exhibitions. In parallel, he plans to launch a modest side venture—a coffee‑and‑book nook that doubles
    as a space for neighborhood story‑telling evenings. Over the next few years, he hopes to enroll in a master’s program in public history, deepening his expertise while maintaining flexible hours to stay
    present for his family.
