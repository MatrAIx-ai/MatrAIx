personas:
  professional: Kenneth Arrington is a community‑oriented humanities researcher turned cultural program coordinator, who fuses systematic curiosity with hands‑on DIY aptitude to design museum workshops,
    curate exhibitions on under‑explored histories, and lead neighborhood storytelling nights, and they thrive in a relaxed, flexible work rhythm that lets them pivot as needed.
  sports: Kenneth Arrington enjoys low‑key fitness through weekend trail runs with the Mercer County Outdoors Club, occasional pickup basketball games where their friends cheer for the New York Knicks,
    and follows the Philadelphia Eagles in the fall, and they prefer flexible, self‑paced activity over regimented gym routines.
  arts: Kenneth Arrington immerses themselves in jazz and blues—spinning records by John Coltrane, B. B. King, and Nina Simone—while photographing historic Mercer's architecture, and they regularly attend
    local gallery openings featuring contemporary photographer Carrie Mae James.
  travel: Kenneth Arrington favors purposeful travel that blends historic architecture tours—such as a weekend in Savannah, Georgia, and a day trip to Gettysburg—with spontaneous weekend getaways to Asheville,
    North Carolina, while they budget‑consciously plan trips around school holidays.
  culinary: Kenneth Arrington delights in cooking soul‑food classics like smoked collard greens, black‑eyed pea stew, and sweet‑potato gumbo, often experimenting with fusion twists using smoked paprika,
    fresh okra, and coconut milk, and they proudly serve their family and neighbors at informal dinner gatherings.
  core: Kenneth Arrington balances a restless curiosity with a laid‑back, sometimes disorganized lifestyle, weaving together scholarly research, community storytelling, backyard gardening, and soulful cooking
    into a uniquely grounded yet ever‑evolving personal narrative that they cherish.
background:
  cultural: Kenneth is African American, descending from grandparents who migrated north during the Great Migration, settling first in Newark before his family moved to the quieter community of Pennington.
    His upbringing was steeped in church gatherings, oral storytelling, and Southern culinary traditions that were adapted to New Jersey life. He grew up with a deep appreciation for Black music, especially
    jazz, and for the literary works of African American authors. Community involvement runs in his family; his mother was a public school teacher, and his father was a skilled tradesperson, both emphasizing
    the value of education and self‑reliance. These cultural threads shape his identity and inspire his commitment to preserving and sharing Black heritage within his local community.
