  hobbies: '[''Morning beach walks along Marina del Rey'', ''Reading contemporary fiction and self‑help books'', ''Yoga and mindfulness meditation'', ''Volunteering at the local animal shelter'', ''Cooking
    simple, healthy meals'', ''Tending a balcony herb garden'', ''Listening to podcasts on productivity, mental health, and sustainability'', ''Journaling and occasional creative writing'', ''Participating
    in small‑group book‑club discussions'']'
  career_goals: Keila aims to advance into a senior executive assistant or office manager role where she can leverage her organizational talent and empathetic leadership to support senior leadership and
    foster a supportive office culture. She plans to earn the Certified Administrative Professional (CAP) credential and pursue a project‑management certification to enhance her strategic planning abilities.
    Ultimately, she hopes to design and implement employee‑wellbeing initiatives, such as conflict‑resolution training and mindfulness resources, that promote harmony and productivity. In the longer term,
    Keila envisions launching a boutique virtual‑assistant service that caters to socially‑conscious entrepreneurs, allowing her to combine her administrative expertise with her desire to help others succeed.
