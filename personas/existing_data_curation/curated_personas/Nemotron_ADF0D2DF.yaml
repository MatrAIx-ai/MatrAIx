personas:
  professional: Michael Sutton, a retired mechanical engineer with four decades of experience in process design and reliability engineering, leverages his methodical CAD expertise and meticulous project‑management
    skills to mentor young engineers and orchestrate community art exhibitions, balancing technical rigor with a curiosity for creative expression.
  sports: Michael Sutton, a lifelong fan of the Houston Astros and the Dallas Cowboys, jogs three times a week around his neighborhood, tends to his vegetable garden as low‑impact exercise, and plays weekly
    chess matches at the local senior center, supplementing his routine with occasional pickup basketball games at the community gym where he enjoys the camaraderie.
  arts: Michael Sutton, an avid visitor of the Museum of Fine Arts, Houston, frequently photographs the museum's Beaux‑Arts façade and the Frank Lloyd Wright‑inspired homes in the area, and draws inspiration
    from artists like Georgia O'Keeffe, Ansel Adams, and local painter James Hilliard, while volunteering to curate rotating exhibitions at the Fort Bend Historical Museum.
  travel: Michael Sutton, who plans his trips with a detailed itinerary, enjoys weekend getaways to historic towns such as Galveston and Austin for their music scenes, cherishes a long‑awaited road trip
    to the national parks of Utah, and dreams of visiting the Louvre in Paris, all while balancing his modest travel budget with the occasional volunteer‑guided tour for local school groups.
  culinary: Michael Sutton, a home‑cook who loves using produce from his own garden, regularly prepares grilled Texas‑style brisket with homemade rubs, hearty vegetable chili featuring sweet potatoes and
    black beans, and savors fresh salsa with heirloom tomatoes, while occasionally indulging in a slice of pecan pie at his favorite downtown bistro.
  core: Michael Sutton, a methodical former engineer who gardens, photographs architecture, and mentors students, still occasionally forgets to water his succulents on rainy days.
background:
  cultural: Michael was raised in a Midwestern family that emphasized hard work, self‑reliance, and community service—values that have carried forward into his life in Texas. Living in Missouri City, a
    diverse suburb of Houston in Fort Bend County, he embraces the Southern hospitality and civic pride of his community while maintaining the pragmatic, down‑to‑earth mindset of his upbringing. His cultural
    identity blends Midwestern pragmatism, Southern friendliness, and a lifelong respect for education, the arts, and civic engagement, shaping a worldview that values both tradition and openness to new
    ideas.
