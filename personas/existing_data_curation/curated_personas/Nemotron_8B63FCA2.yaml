personas:
  professional: Cathy Reeves, a 52‑year‑old senior accountant with three decades of audit and financial reporting expertise, leverages her analytical rigor, advanced Excel automation, and CPA‑focused mindset
    to streamline internal controls while fostering competitive mentorship of junior staff, and they champion ESG digital transformation initiatives within her midsized corporation.
  sports: Cathy Reeves stays active through weekly sunrise yoga at the local community center and participates in the Chicago Cubs' fan club trivia nights, while joining a recreational chess league that
    doubles as a mental‑sport workout, and they enjoy occasional seasonal indoor cycling classes during the harsh Midwest winters.
  arts: Cathy Reeves immerses herself in Chicago's cultural scene by strolling through the Art Institute of Chicago to study works by Grant Wood and Kerry James Marshall, attending nightly performances
    at the Steppenwolf Theatre, enjoying concerts by the Chicago Symphony Orchestra, and participating in poetry readings at the Logan Square Book Club, and they often capture these moments with her camera.
  travel: Cathy Reeves and her husband meticulously plan trips that blend museum visits, culinary tours, and photography opportunities, having explored Paris's Louvre, Florence’s Uffizi, Kyoto’s tea houses,
    and Oaxaca’s street markets, while they balance a modest retirement budget, and they dream of future adventures in Marrakech’s souks and Lisbon’s tile‑laden neighborhoods.
  culinary: Cathy Reeves experiments in her kitchen with dishes like saffron risotto, homemade sushi rolls featuring pickled ginger, and heirloom tomato bruschetta, drawing inspiration from her garden’s
    rosemary and basil, and they often pair her meals with an occasional glass of Malbec, while they sometimes over‑season in pursuit of bold flavors.
  core: Cathy Reeves is a curious, competitive accountant who blends a love for art, yoga, and strategic board games with a disciplined approach to finance, while they navigate mild health challenges and
    a penchant for spontaneous travel and culinary experimentation.
background:
  cultural: 'Cathy is a white Midwestern American who grew up in the suburban communities surrounding Chicago and now resides in Schererville, Indiana. Her cultural upbringing reflects classic Great Lakes
    values: a strong work ethic, community engagement, modesty, and a pragmatic outlook. Influenced by both the industrial legacy of the region and its vibrant arts scene, she balances traditional family
    traditions—such as Thanksgiving gatherings and Fourth of July celebrations—with a deep appreciation for contemporary cultural experiences. While her family background is rooted in Protestant Christian
    traditions, she embraces diverse perspectives through travel, art, and continued education, embodying the openness and curiosity characteristic of her generation in the Midwest.'
