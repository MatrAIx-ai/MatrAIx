    webinars'', ''Gardening'', ''Participating in professional networking groups'']'
  career_goals: Cathy aims to advance to a senior audit manager or CFO role within a midsized corporation, leveraging her deep accounting expertise to drive strategic financial decisions. She plans to complete
    her CPA certification within the next two years and to become a recognized leader in implementing digital transformation initiatives, such as automating routine accounting tasks and integrating ESG
    reporting frameworks. Passionate about mentorship, she aspires to create a structured development program for junior accountants at her firm. Long‑term, she envisions launching a boutique consulting
    practice that offers financial stewardship services to arts and cultural nonprofits, merging her professional skills with her love for the arts.
