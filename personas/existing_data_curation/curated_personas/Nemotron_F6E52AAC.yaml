  career_goals: Riley aims to pursue a career that merges his analytical strengths with his love for the environment. He envisions studying environmental engineering or marine biology in college, eventually
    working on sustainable coastal conservation projects. He also hopes to design data‑driven technology tools for ecosystem monitoring and to mentor younger students in STEM through community programs.
