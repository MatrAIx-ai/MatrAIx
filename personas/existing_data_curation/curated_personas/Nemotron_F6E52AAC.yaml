personas:
  professional: A budding engineer and wildlife photographer, Riley Conlon combines their methodical, organized nature and curiosity for nature to design Arduino‑controlled model rockets that capture both
    technical precision and ecological inspiration, and they document Oregon’s coastal ecosystems through the lens of their camera.
  sports: A dedicated member of the Coastline Soccer Club and a regular defender on their middle‑school team, Riley Conlon balances weekly practices with weekend hikes along the Oregon coast, cheering on
    the Portland Timbers while maintaining a disciplined fitness routine that includes sprint drills and strength training to stay agile on the field, and they prioritize teamwork and steady improvement.
  arts: An avid acoustic guitarist and budding songwriter, Riley Conlon draws lyrical inspiration from folk icons like Bob Dylan and modern storytellers such as Mumford & Sons while refining their wildlife
    photography technique under the influence of Ansel Adams and capturing the imagination of science‑fiction lovers like Ursula K. Le Guin through their own lyrical narratives, and they often share their
    songs and photos at school assemblies.
  travel: A methodical planner who loves the rugged Oregon coast and nearby forest trails, Riley Conlon frequently maps out weekend hikes to places like Cannon Beach and Hoh Rainforest, while dreaming of
    future trips to the redwood groves of Northern California and the volcanic landscapes of Iceland, always balancing a modest travel budget with a love for low‑key, nature‑focused adventures, and they
    savor each journey as a learning experience.
  culinary: A modest home‑chef with a penchant for coastal flavors, Riley Conlon often prepares buttery New England clam chowder, grilled salmon seasoned with dill and lemon, and occasional shell‑decorated
    salads, favoring fresh ingredients like Pacific oysters, locally sourced kale, and sea salt, while still honing their culinary skills by following family recipes for pasta alfredo and experimenting
    with simple herb‑infused desserts, and they love to share their dishes with friends during after‑school gatherings.
  core: Riley Conlon is a meticulous 14‑year‑old who balances a fierce curiosity for rockets and wildlife with a habit of cataloguing every shell they find, a love for acoustic melodies, and a penchant
    for budgeting allowance into future projects, all while navigating teenage life with a gentle, cooperative spirit, and they often pause to appreciate a quiet sunrise on the beach.
background:
  cultural: Riley grew up in Florence, a small coastal community in Lane County, Oregon, where daily life is shaped by the Pacific Ocean and surrounding forests. His family, with Irish and English ancestry
    typical of the Pacific Northwest, places a strong emphasis on community involvement, environmental stewardship, and outdoor recreation. Local traditions such as Friday night potlucks, school spirit
    events, and regular beach clean‑ups have fostered in him a deep sense of belonging and respect for the region's natural heritage.
