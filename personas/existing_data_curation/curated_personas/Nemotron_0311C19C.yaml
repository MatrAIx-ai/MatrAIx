  hobbies: '[''Basketball'', ''Hip‑hop and R&B music'', ''Freestyle dancing'', ''Cooking Southern comfort food'', ''Video gaming'', ''Church youth group volunteering'', ''Podcast listening'']'
  career_goals: Mervin aims to build a stable career that blends his hands‑on aptitude with his desire to serve his community. In the next two years he plans to enroll in a community‑college trade program
    to earn an HVAC certification, while also taking courses in nonprofit management. His long‑term ambition is to become a community outreach coordinator for a youth mentorship organization in Suffolk,
    eventually launching his own nonprofit that provides job‑training and after‑school programs for at‑risk Black teens. He also hopes to complete his high‑school diploma equivalency (GED) and secure a
    reliable entry‑level position in the trades to support his future endeavors.
