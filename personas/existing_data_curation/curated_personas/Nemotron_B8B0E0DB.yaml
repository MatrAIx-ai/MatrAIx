  hobbies: '[''Gardening'', ''Cooking'', ''Quilting'', ''Crocheting'', ''Church Choir'', ''Book Club (Mysteries)'', ''Bingo'', ''Bird‑watching'', ''Walking'', ''Community Volunteering'']'
  career_goals: Although retired, Donna wishes to expand her impact on the local community. She aims to create a monthly seniors’ storytelling series at the library, where she can share family histories
    and encourage others to record theirs. She hopes to compile a memoir that captures life in rural Georgia across the decades, combining photographs and oral histories. Donna also plans to launch a small
    home‑canning operation, selling her preserves at the farmers’ market, and to learn digital photography to document her garden and grandchildren’s milestones. Additionally, she wants to master tablet
    use to stay in touch with family abroad and mentor younger volunteers in event organization.
