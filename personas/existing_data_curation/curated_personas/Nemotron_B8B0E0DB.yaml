personas:
  professional: Donna Scott, a retired community organizer and seasoned event coordinator, blends her practical curiosity and competitive spirit to design senior‑center programs, church festivals, and a
    monthly storytelling series, effortlessly commanding attention with her talkative, sociable flair while keeping budgets and volunteer schedules meticulously organized.
  sports: Donna Scott stays active with daily walks alongside her husband and a senior walking club, enjoys water aerobics at the community center, and cheers for the Atlanta Falcons and Atlanta Braves,
    while occasionally joining the local senior softball league, using her competitive edge to keep fit.
  arts: Donna Scott expresses herself through gospel choir performances featuring Mahalia Jackson and Aretha Franklin, quilts inspired by Martha Stewart designs, and a voracious appetite for Agatha Christie
    mysteries, while savoring Dolly Parton’s storytelling songs during her weekend craft sessions.
  travel: Donna Scott prefers organized weekend getaways with her husband, having explored Savannah’s historic squares, the Blue Ridge Mountains’ scenic overlooks, and Charleston’s waterfront, while dreaming
    of a relaxed cruise to the Bahamas that fits her fixed‑budget travel style.
  culinary: Donna Scott, an accomplished Southern cook, perfects biscuits with buttermilk and honey, fries chicken with a cayenne‑spiced crust, simmers collard greens with smoked ham hocks, and crafts preserves
    from garden tomatoes, peaches, and cucumbers, constantly experimenting by adding thyme or ginger to traditional recipes.
  core: Donna Scott melds a talkative, community‑centric energy with skeptical, competitive instincts, turning every garden, kitchen, and choir rehearsal into a stage for sharing, organizing, and quietly
    guarding her beloved traditions.
background:
  cultural: Donna grew up in a white Southern family in rural Georgia, where hospitality, church involvement, and close‑knit family ties were central to daily life. The traditions of Southern cuisine, seasonal
    community gatherings, and a strong work ethic shaped her values. While she respects these roots, her lifelong curiosity has led her to embrace new ideas, such as modern gardening techniques and digital
    communication tools. Her upbringing instilled a sense of responsibility to her neighbors, reflected in her active participation in church activities and local volunteer groups.
attributes:
  skills: '[''Southern Cooking'', ''Gardening'', ''Event Planning and Coordination'', ''Genealogy Research'', ''Public Speaking'', ''Basic Computer Literacy'', ''Budget Management'', ''First Aid'', ''Product
