    and coaching'', ''Conflict resolution and employee wellbeing'', ''Bilingual communication (English, Mandarin)'', ''Risk management for natural disasters'']'
  hobbies: '[''Hiking Makapu’u and Kuliouou trails'', ''Yoga and meditation'', ''East Asian-Hawaiian fusion cooking'', ''Photography of sunrise seascapes and markets'', ''Volunteer work at senior center
    nutrition program'', ''Beach clean‑ups'', ''Urban gardening and sustainable living workshops'', ''Reading business and management books'', ''Playing Go board game'']'
  career_goals: She aims to become a senior executive—Director of Operations or Vice President of Supply Chain—at a regionally influential logistics firm in Hawaii, where she can drive the adoption of sustainable,
    resilient supply chains that balance efficiency with environmental stewardship. She envisions launching a mentorship program for women and underrepresented minorities in logistics, leveraging her experience
    to broaden diversity in the industry. Over the next five years, she plans to earn a certification in sustainable supply chain management and to publish case studies on island logistics resilience. Ultimately,
    she hopes to transition into a consultancy role that helps smaller Hawaiian businesses implement cost-effective, low‑stress logistics solutions, allowing her to share expertise while maintaining a healthier
    personal work‑life balance.
