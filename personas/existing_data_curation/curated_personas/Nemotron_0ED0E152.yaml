personas:
  professional: Sara Martinez blends evidence‑based CBT, DBT, and EMDR with culturally resonant counseling to serve Spanish‑English bilingual clients, and they channel their organized, methodical nature
    into developing community outreach workshops while eyeing a future supervisory role.
  sports: Sara Martinez hikes the Texas Hill Country on weekends with the San Antonio Trailblazers club, practices yoga twice a week, supports the San Antonio Spurs and San Antonio FC, and they occasionally
    play recreational volleyball at the community center.
  arts: Sara Martinez dances salsa and merengue at the local cultural club, draws inspiration from artists such as Celia Cruz, Marc Anthony, and Shakira, and they also volunteer as a music‑themed wellness
    facilitator at church events.
  travel: Sara Martinez favors road trips to Hill Country vineyards, annual visits to a Caribbean island for family reunions, and they dream of exploring the historic streets of Seville, balancing modest
    travel budgets with occasional splurges on cultural festivals.
  culinary: Sara Martinez loves cooking traditional island stews like arroz con pollo and plantain‑based mofongo, perfecting adobo‑marinated pork, and they delight in sourcing fresh cilantro, lime, and
    tropical fruit for vibrant salsas during family gatherings.
  core: Sara Martinez is a driven, community‑focused counselor whose organized mind, sociable spirit, and emotional intensity propel them to blend evidence‑based therapy with cultural celebration, even
    as they battle an anxious inner voice.
background:
  cultural: Sara draws deep pride from her Puerto Rican roots, which shape her values of family closeness, community solidarity, and a vibrant celebration of music and food. Growing up in a bilingual household,
    she seamlessly navigates both Spanish and English, allowing her to bridge cultural gaps in her counseling practice. The strong Catholic traditions and festive spirit of Puerto Rico influence her worldview
    and her commitment to service, while living in San Antonio's diverse Hispanic community adds layers of Texan and Latino cultural integration. This blend informs her therapeutic approach, emphasizing
    cultural humility, respect for familial ties, and the importance of preserving cultural identity in mental‑health healing.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Dialectical Behavior Therapy (DBT)'', ''Eye Movement Desensitization and Reprocessing (EMDR)'', ''Crisis Intervention'', ''Group Facilitation'', ''Psychological
    Assessment'', ''Bilingual Spanish–English Counseling'', ''Cultural Competency'', ''Case Management'', ''Program Development'', ''Research and Evidence‑Based Practice'', ''Professional Ethics'', ''Client
    Documentation and Record Keeping'']'
  hobbies: '[''Salsa and Merengue dancing'', ''Cooking Puerto Rican cuisine'', ''Hiking in the Texas Hill Country'', ''Yoga and mindfulness meditation'', ''Reading contemporary fiction and psychology'',
    ''Journaling'', ''Volunteering at community health fairs'', ''Participating in a book club'', ''Leading wellness workshops'', ''Attending cultural festivals'']'
  career_goals: Sara aims to become a certified clinical supervisor and eventually lead a community mental health center serving underserved Latino families in the Greater San Antonio area. She intends
    to earn advanced certifications in trauma‑informed care, develop a culturally tailored anxiety‑reduction program for Puerto Rican youth, and publish research on the impact of bicultural stress on adult
    mental health. In the long term, she envisions opening a private practice that integrates therapy with community workshops and cultural events, while mentoring new counselors and advocating for systemic
    improvements in mental‑health accessibility.
