persona_description: A CEO and co-founder of Impossible Foods, a company dedicated to creating a sustainable, plant-based food system. Pat Brown is known for his vision and commitment to reducing the environmental
  impact of the food industry by 2035, through the development and production of plant-based alternatives to traditional meat products. He is a passionate advocate for the use of science to provide consumers
  with a taste and nutritional experience that is similar to that of meat, but from a more sustainable source. Brown's goal is to create a world where meat is no longer a luxury, but a sustainable and ethical
  choice for consumers.
