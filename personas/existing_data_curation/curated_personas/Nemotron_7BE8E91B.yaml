personas:
  professional: Javier Rojas is a compliance officer who leverages bilingual fluency, meticulous documentation, and data‑analysis expertise in Excel and PowerBI to translate complex federal and state regulations
    into repeatable risk‑management procedures, while their spontaneous side lets them pivot quickly when regulatory changes demand rapid corrective action.
  sports: Javier Rojas stays active by playing forward for the Methuen Community Soccer League, shooting hoops at the local recreation center where they root for the Boston Celtics, and following the New
    England Revolution during the MLS season, blending structured team practice with spontaneous pickup games.
  arts: Javier Rojas immerses themselves in the rhythm of bachata and merengue, regularly attending dance nights featuring artists like Romeo Santos and Juan Luis Guerra, while also enjoying comedy series
    such as 'The Office' and 'Parks and Recreation' as a relaxing creative outlet.
  travel: Javier Rojas prefers weekend getaways that mix hiking the White Mountain trails, strolling the rocky New England coastline, and occasional cultural trips to Caribbean islands to experience the
    music and cuisine of their heritage, all planned with a spontaneous, last‑minute booking style.
  culinary: Javier Rojas enjoys cooking traditional dishes like mangú with sautéed onions and sancocho brimming with yucca, plantains, and root vegetables, balancing a moderate skill level in the kitchen
    with a love for experimenting with fresh cilantro, garlic, and a pinch of adobo seasoning.
  core: Javier Rojas blends a love for routine compliance work with spontaneous weekend soccer, bachata dancing, and occasional budget splurges, all while juggling mild health quirks and a habit of binge‑watching
    comedies as a stress release.
background:
  cultural: Javier was raised in a bilingual Dominican household, where Spanish and English intertwined daily. His upbringing emphasized family loyalty, Catholic traditions, and a strong sense of community—values
    that continue to shape his worldview. He celebrates Dominican holidays such as Independence Day and Carnaval, often preparing traditional foods and sharing them with friends in Methuen. His cultural
    heritage influences his warm, expressive communication style and his appreciation for music, dance, and flavorful cuisine. While adapting to life in Massachusetts, Javier maintains close ties with relatives
    in the Dominican Republic, visiting regularly and staying connected to events in his ancestral homeland.
attributes:
  skills: '[''Regulatory analysis'', ''Risk assessment'', ''Policy development and implementation'', ''Internal audit'', ''KYC/AML compliance'', ''Data analysis (Excel, PowerBI)'', ''Compliance software
