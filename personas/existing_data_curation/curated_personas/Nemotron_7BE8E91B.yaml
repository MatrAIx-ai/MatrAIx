  hobbies: '[''Soccer (community league)'', ''Basketball'', ''Bachata and merengue dancing'', ''Cooking Dominican cuisine'', ''Volunteering at cultural center'', ''Hiking and exploring New England outdoors'',
    ''Watching comedy series'']'
  career_goals: Javier aims to progress to a senior compliance leadership role, such as Compliance Manager or Director of Regulatory Affairs, within the next five years. He plans to earn professional certifications—including
    CAMS (Certified Anti‑Money Laundering Specialist) and CRCM (Certified Regulatory Compliance Manager)—and complete a bachelor's degree in Business Administration or Finance. His ambition is to build
    a technology‑enabled compliance framework that leverages data‑analytics tools for proactive risk identification. He also hopes to mentor junior analysts, lead cross‑functional compliance training programs,
    and become a community advocate for ethical business practices, using his bilingual skills to support Spanish‑speaking stakeholders.
