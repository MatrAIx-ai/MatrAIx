  career_goals: Anna’s favorite dreams include becoming a teacher who helps classmates learn, a veterinarian who cares for animals, and a community helper like a librarian who creates a calm, organized
    space. She is drawn to roles that let her nurture others and keep things orderly, reflecting her desire for harmony and practical contribution. Though still playful, she often talks about helping her
    family and friends in concrete ways, showing early ambition to make a positive impact.
