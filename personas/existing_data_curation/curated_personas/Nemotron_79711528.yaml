personas:
  professional: Anna Kent is a curious preschool explorer who balances imagination with practical organization, spending afternoons sorting crayons by color and building intricate block towers, hinting
    at a future in engineering or design while always offering help to classmates, and they often share their creations with friends.
  sports: Anna Kent loves her Saturday morning preschool gymnastics class, cheers for the Chicago Cubs during spring baseball games, and plays on the Little Tigers T‑ball team, balancing adherence to rules
    with spontaneous bursts of playful energy, and they often high‑five teammates after a good play.
  arts: Anna Kent spends afternoons humming Raffi's 'Baby Beluga', watching The Wiggles' sing‑along videos, and drawing elaborate picture books inspired by Disney's Frozen, blending her curiosity with a
    gentle, cooperative spirit, and they love sharing their artwork with family.
  travel: Anna Kent cherished the family road trip to the Grand Canyon, dreams of visiting the Eiffel Tower, prefers beach getaways over crowded theme parks, and always packs a tiny backpack of crayons,
    yet they sometimes feel anxious about new places and cling to a favorite stuffed bunny.
  culinary: Anna Kent adores cheesy macaroni, crunchy apple slices, and peanut butter‑and‑jelly sandwiches, can whisk batter with a plastic spoon in her play kitchen, but gets picky about broccoli unless
    it’s cut into fun shapes, showing a practical appetite tempered by occasional whims, and they often request a smiley face garnish to make veggies more appealing.
  core: Energetic yet thoughtful, Anna Kent blends boundless curiosity with practical organization, finds comfort in tidy crayon rows and piggy‑bank tallies, navigates occasional worries with a warm, cooperative
    demeanor, and they often seek reassurance from a favorite stuffed bunny when a new task feels overwhelming.
background:
  cultural: Anna is part of a Black family rooted in the South Bend African‑American community. Her home life includes weekly church gatherings where gospel music and storytelling are celebrated, and family
    meals that feature soul‑food favorites like collard greens and cornbread. She participates in cultural events such as Juneteenth celebrations and enjoys learning about her heritage through family stories
    and community programs at the local cultural center. The Midwestern Midwest setting influences her love of outdoor play in the city’s parks, while her family’s traditions nurture a strong sense of community,
    kindness, and respect for others.
