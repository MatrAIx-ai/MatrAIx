personas:
  professional: Marianette Poncedeleon, a seasoned community program manager, leverages over three decades of retail leadership, bilingual communication, and meticulous budgeting to mentor emerging managers,
    while their competitive drive and structured approach transform volunteer outreach events into precisely coordinated cultural celebrations.
  sports: Marianette Poncedeleon stays fit by leading warm‑up routines for the Golden Age Senior Dance Club, tending their vegetable garden as low‑impact exercise, and they are an avid supporter of the
    San Diego Padres, the San Diego Wave FC, and the local senior walking group that meets each Saturday morning on the historic Mission Trail.
  arts: Marianette Poncedeleon cultivates a love for the arts through choir rehearsals featuring traditional carols, evenings listening to the boleros of José Alfredo Jiménez, devouring Agatha Christie
    mysteries, and admiring the paintings of Frida Kahlo, all of which they discuss animatedly at community potlucks.
  travel: Marianette Poncedeleon prefers meticulously planned trips that blend family bonding with cultural immersion, having explored the historic missions of California, the bustling markets of Oaxaca,
    and the serene cliffs of Big Sur, while they budget carefully to keep travel costs low and always schedule a return to the garden before winter sets in.
  culinary: Marianette Poncedeleon delights in cooking elaborate dishes such as mole poblano, tamales, and pozole, using fresh chilies, corn, and cilantro harvested from their backyard garden, and they
    meticulously organize recipe cards in a binder, though they sometimes over‑salt the sauce in their zeal to perfect flavor.
  core: Marianette Poncedeleon is a fiercely organized matriarch whose talkative spirit and competitive edge drive community projects, yet they wrestle with chronic worry and a habit of over‑committing,
    often sacrificing personal rest for family celebrations.
background:
  cultural: Marianette is a first‑generation Mexican‑American who grew up immersed in the traditions of her parents’ native Veracruz. Fluent in Spanish and English, she maintains a deep connection to her
    heritage through food, music, and religious customs, especially the celebration of Día de los Muertos and Christmas Posadas. Family ties are central to her identity, and she often serves as the matriarchal
    anchor for multigenerational gatherings. Her upbringing in the vibrant Mexican community of San Diego County shaped her values of hard work, community service, and respect for cultural rituals, all
    of which continue to guide her daily life and community involvement.
