  career_goals: Although officially retired, Ambree aims to serve as an advisory mentor for emerging managers at the local community center and to establish a permanent art‑exhibition space that showcases
    regional artists. She aspires to complete a short certificate in art history to deepen her curatorial knowledge, and she hopes to leave a legacy of a self‑sustaining, flexible programming model that
    encourages creative, unconventional ideas while safeguarding the center’s financial stability.
