  hobbies: '[''Competitive strategy video gaming'', ''Sketching and drawing'', ''Cooking Spanish dishes'', ''Reading mystery and sci‑fi novels'', ''Watching automotive repair tutorials'', ''Listening to
    Spanish pop music'', ''DIY small projects'', ''Board game nights with close friends'']'
  career_goals: Mariaelena plans to obtain her high school equivalency (GED) within the next year and then enroll in a technical college to earn an automotive service technician certification. Her short‑term
    goal is to secure an entry‑level position at a local auto repair shop or dealership, where she can apply her practical troubleshooting skills and develop a stable income. Long‑term, she aims to advance
    to a supervisory role or specialize in engine diagnostics. Parallel to this, she nurtures a passion for Spanish cuisine and hopes to launch a small catering or pop‑up food business once she attains
    financial stability. She also aspires to grow a modest side‑streaming presence on platforms like Twitch, turning her competitive gaming talent into a supplementary revenue stream.
