personas:
  professional: Mariaelena, a 16‑year‑old aspiring automotive service technician, applies the strategic precision honed in competitive video games, her meticulous digital organization, and bilingual communication
    skills to diagnose engine problems with methodical confidence, thriving on predictable repair routines while embracing the flexibility of a relaxed schedule and a skeptical eye toward unproven shortcuts.
  sports: Mariaelena, a devoted fan of the Detroit Lions, Red Wings, and Pistons, spends winter afternoons cheering on hockey while also playing on a local youth soccer club, roller‑blading at the community
    rink during spring, and heading to the Upper Peninsula for occasional ski trips, balancing her competitive edge with a preference for low‑key, community‑oriented sports.
  arts: Mariaelena, who sketches urban skylines with graphite, draws creative fuel from the moody realism of Edward Hopper and the streetwise satire of Banksy, and frequently listens to Spanish indie acts
    like Vetusta Morla and Rosalía while working, merging her visual art passion with her bilingual cultural taste.
  travel: Mariaelena, who celebrated Semana Santa with family in Seville and wandered the historic streets of Barcelona, now dreams of a road‑trip from Michigan to the Pacific Coast that blends meticulous
    route planning with spontaneous stops at quirky diners, yet often postpones such journeys in favor of local gaming tournaments.
  culinary: Mariaelena, a budding home chef, perfects paella by carefully toasting chorizo, saffron‑infused rice, and fresh shellfish, crafts chilled gazpacho with crisp cucumbers and sherry vinegar, and
    experiments with tortilla de patatas seasoned with smoked paprika, though her competitive drive sometimes leads to over‑seasoning in pursuit of the perfect flavor.
  core: Mariaelena, a 16‑year‑old competitive gamer turned aspiring auto‑tech, fuses strategic precision, Spanish culinary flair, disciplined budgeting, and a penchant for all‑night gaming marathons into
    a uniquely structured yet flexibly driven life.
background:
  cultural: Mariaelena is of Spanish descent; her parents emigrated from Seville in Andalusia and maintain strong ties to their homeland. The family speaks Spanish at home, celebrates Spanish holidays such
    as Semana Santa and Día de los Reyes, and enjoys traditional foods like tapas and jamón serrano. Growing up in Warren, Michigan, she blends this rich Hispanic heritage with Midwestern American culture,
    participating in local school events while preserving cultural customs. Her bilingual upbringing influences her cooking interests, musical preferences, and communication style, fostering a deep appreciation
    for both Spanish and American traditions.
attributes:
  skills: '[''Microsoft Office (Word, Excel)'', ''Digital literacy'', ''Bilingual Spanish-English communication'', ''Basic cooking (Spanish dishes)'', ''Automotive troubleshooting basics'', ''Competitive
