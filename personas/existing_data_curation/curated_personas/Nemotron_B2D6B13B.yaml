  hobbies: '["Reading science-fiction and nature books", "Sketching and illustrating wildlife", "Hiking local nature trails", "Caring for pets and volunteering at animal shelters", "Playing Minecraft (creative
    building)", "Participating in school drama club", "Gardening and planting seedlings", "Organizing neighborhood clean‑up events"]'
  career_goals: Looking ahead, Karen hopes to combine her love for nature, her desire to help others, and her practical mindset into a career that promotes environmental stewardship and community wellbeing.
    She envisions becoming a wildlife rehabilitator or environmental educator, or possibly a pediatric nurse, where she can apply her calm resilience, empathy, and hands‑on problem‑solving skills. She also
    aspires to lead youth outreach programs that blend scientific discovery with community service.
