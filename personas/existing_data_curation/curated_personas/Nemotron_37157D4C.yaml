  career_goals: Samuel aims to move into a senior strategic HR role—such as Director of Human Resources or Vice President of People—where he can shape organizational culture across multiple sites. He plans
    to obtain the SPHR certification and complete a part‑time master’s program in Organizational Development. Long‑term, he envisions launching a boutique consulting firm that helps small Midwestern businesses
    integrate mental‑health resources and creative‑thinking workshops into their employee experience. He also hopes to mentor emerging HR professionals in Kandiyohi County and author a guide on stress‑resilient
    workplace practices.
