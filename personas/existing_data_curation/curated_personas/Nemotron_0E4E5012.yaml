  hobbies: '["Competitive video gaming (FPS, MOBA)", "Basketball and street skateboarding", "DIY electronics and computer building", "Cooking Mexican cuisine with family", "Attending local maker fairs and
    tech meetups", "Graphic design and t‑shirt illustration"]'
  career_goals: Cesar aims to turn his self‑taught tech abilities into a career in software development or computer hardware support. He plans to earn his GED within the next year, followed by an associate
    degree in Information Technology at a local community college. Ultimately, he envisions working as a junior developer at a Silicon Valley startup where he can continue to innovate while applying practical
    problem‑solving skills. In the longer term, he hopes to launch a side business offering affordable computer repair services to his neighborhood, leveraging his bilingual communication to serve both
    English‑ and Spanish‑speaking clients.
