  career_goals: Though retired from formal employment, Kenneth aims to deepen his involvement in community service by leading a senior‑center gardening club and organizing annual charity fundraisers. He
    hopes to mentor younger retirees on practical life skills and financial planning. He also aspires to complete a memoir of his life in Nebraska, capturing the region’s social history, and to develop
    a small side business selling handcrafted wooden furniture for local markets.
