personas:
  professional: Jaunita Canty, a veteran hazardous‑materials specialist with 25 years of on‑site decontamination experience, leverages her OSHA HAZWOPER certification and practical safety‑first mindset
    to design custom protocols while mentoring junior crews, balancing curiosity for new remediation methods with a disciplined, organized approach.
  sports: Jaunita Canty enjoys low‑impact fitness, hitting the San Bernardino foothills for weekend hikes and joining a local walking club, while cheering on the Los Angeles Dodgers and listening to Los
    Angeles Lakers games on game nights, and they occasionally participate in community yoga classes.
  arts: Jaunita Canty finds creative release in singing gospel hymns with her church choir, quilting traditional patchwork blankets for friends, and immersing herself in the sounds of John Coltrane, Nina Simone,
    and Mahalia Jackson, which shape her evenings after work.
  travel: Jaunita Canty prefers short, purposeful getaways that blend nature and reflection, such as weekend trips to Joshua Tree, a planned visit to Sedona’s red rocks, and occasional pilgrimages to historic
    sites in the Southeast, always budgeting carefully to keep travel affordable while balancing family commitments.
  culinary: Jaunita Canty’s culinary style celebrates soul‑food roots—slow‑cooked collard greens seasoned with smoked paprika, black‑eyed peas, and baked cornbread—while she experiments with quinoa, kale,
    and roasted sweet potatoes from her herb garden, often whipping up a hearty gumbo for church potlucks.
  core: Jaunita Canty is a diligent, safety‑obsessed hazardous‑materials veteran who balances a love for soulful cooking and quiet garden moments with a fierce drive to mentor women in her field, despite
    wrestling with intense anxiety and occasional over‑caffeination.
background:
  cultural: Jaunita is a second‑generation African‑American whose grandparents migrated from the Southern United States during the Great Migration, eventually settling in the Greater Los Angeles area. Growing
    up in a tight‑knit Black community in Moreno Valley, she absorbed traditions of resilience, storytelling, and communal support. Her cultural identity is anchored in the church—she attends services regularly
    and participates in gospel music and community outreach—and in the celebration of African‑American heritage, such as Juneteenth, Black History Month, and family reunions featuring soul‑food cooking
    and spoken‑word poetry. Navigating a predominantly male, often white‑dominated hazardous‑materials field, she draws strength from her cultural background, advocating for representation and safety equity.
    She also embraces the multicultural environment of Riverside County, sharing experiences with Latino neighbors, and values the blend of cultural rhythms that shape the local community.
attributes:
  skills: '["Hazardous Materials Removal", "OSHA HAZWOPER Certification", "Asbestos Abatement", "Lead Paint Renovation", "Site Assessment & Risk Analysis", "Safety Data Sheet Interpretation", "PPE Selection
    & Management", "Mobile Decontamination Unit Operation", "Regulatory Compliance (OSHA, EPA)", "Emergency Response Coordination", "Crew Training & Mentorship", "Recordkeeping & Documentation", "Equipment
    Maintenance", "Small Team Leadership"]'
  hobbies: '["Gardening (herbs, succulents, vegetables)", "Reading mystery and historical fiction", "Journaling", "Gentle yoga", "Soul‑food cooking", "Church choir singing", "Quilting", "Listening to jazz
    and gospel music", "Volunteer safety workshops for youth", "Hiking in the San Bernardino foothills"]'
  career_goals: Jaunita aims to transition from frontline work to a supervisory and training role within the next five years. She is pursuing an associate’s degree in Environmental Health to formalize her
    academic background and plans to obtain certification as a HAZWOPER trainer, enabling her to teach safety courses for both seasoned workers and newcomers. Long‑term, she envisions establishing a boutique
    consulting firm that advises small contractors and community facilities on hazardous‑waste compliance, with a focus on integrating mental‑health support for workers in high‑stress environments. Additionally,
    she seeks to mentor more women of color in the trade, advocating for greater diversity and inclusion in the hazardous‑materials industry.
