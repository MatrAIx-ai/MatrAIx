  hobbies: '[''Drawing and sketching'', ''Digital comic creation'', ''Playing basketball'', ''Listening to hip‑hop and gospel music'', ''Participating in church youth group'', ''Volunteering at the library
    after‑school program'', ''Coding simple games in Scratch'', ''Reading graphic novels'', ''Attending community dance events'', ''Exploring science kits and DIY projects'']'
  career_goals: Leroy dreams of attending a top high school and earning a scholarship to study visual arts and computer science, eventually becoming a multimedia artist or video game developer who tells
    culturally rich stories. He also hopes to use his organizational strengths to launch a community youth program that blends art, technology, and mentorship, giving other kids in Covington opportunities
    to explore creative careers. In the long term, he envisions himself as a creative technologist who partners with local media and nonprofits to produce content that celebrates African‑American heritage
    and inspires social change.
