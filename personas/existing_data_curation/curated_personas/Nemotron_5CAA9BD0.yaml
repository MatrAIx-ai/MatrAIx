personas:
  professional: Leroy Jones is an aspiring digital comic creator who blends hand‑drawn characters with Scratch‑based interactive panels, leveraging meticulous organization and a disciplined work ethic to
    meet tight project deadlines while collaborating with friends in online art forums.
  sports: Leroy Jones is a regular at the community park’s Saturday basketball league, idolizing the NBA’s Los Angeles Lakers and cheering for the local high school Tigers, while also dabbling in seasonal
    soccer during summer camps, and they approach fitness with a disciplined routine of daily dribbling drills and weekend pick‑up games, though they occasionally skip warm‑ups in eagerness to play.
  arts: Leroy Jones channels their love for hip‑hop, jazz, and gospel—spinning tracks by Kendrick Lamar, Miles Davis, and Kirk Franklin—into vibrant comic panels inspired by artists like Alex Ross and manga
    creator Naoko Takeuchi, sharing each new strip on a youth‑focused Instagram feed where they receive both praise and constructive critique, and they spend hours perfecting line work in a meticulously
    organized sketchbook.
  travel: Leroy Jones prefers group‑oriented trips organized through their church youth group, having explored New Orleans during a gospel music retreat, hiked the trails of Shenandoah National Park on
    a family weekend getaway, and visited Washington, D.C.’s museums, while dreaming of a future solo adventure to Tokyo’s Akihabara district to experience anime culture firsthand.
  culinary: Leroy Jones enjoys a mix of kid‑friendly comfort foods and experimental snacks, favoring cheesy pizza, homemade macaroni‑and‑cheese, and spiced buffalo chicken wings, while occasionally whipping
    up simple quinoa bowls with avocado and cherry tomatoes after watching recipe videos, though they often forget to clean the kitchen afterwards.
  core: Leroy Jones is a hyper‑organized teen comic artist who balances a relentless drive for perfect panels with a habit of staying up late listening to jazz, juggling a strict budget, and occasionally
    neglecting chores in pursuit of the next creative spark.
background:
  cultural: Leroy grows up in an African‑American family rooted in Southern traditions of Covington, Georgia. Family gatherings feature soul food, gospel music, and storytelling that connect him to his
    heritage. He attends a local church where communal service and praise shape his values of compassion and perseverance. Community festivals like Juneteenth and local basketball tournaments provide spaces
    for him to celebrate Black culture while forging strong bonds with peers. These experiences reinforce his pride in his identity and inspire him to create art that reflects his community's history and
    aspirations.
attributes:
