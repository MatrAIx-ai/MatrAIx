  career_goals: Crystal aspires to attend a reputable art school where she can major in illustration or visual communication design. She dreams of becoming a concept artist for video games or films, leveraging
    her unique blend of creativity and disciplined workflow. Long‑term, she envisions establishing a freelance studio that offers graphic design services and art workshops for youth, merging her competitive
    drive with a desire to mentor others. She also sees herself contributing to community art initiatives in her hometown, perhaps curating exhibitions that showcase unconventional and emerging talent.
