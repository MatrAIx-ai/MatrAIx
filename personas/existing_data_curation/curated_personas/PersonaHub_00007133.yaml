persona_description: A historian who specializes in the study of Chinese porcelain and its impact on Persian pottery, particularly the forms and designs of the Chinese prototypes inspired by Persian potters.
  His research interests include the history of porcelain production in China, the exchange of porcelain between China and the Middle East, and the cultural and economic impacts of Chinese porcelain on
  Persian society. He is particularly interested in the use of Chinese porcelain in Persian literature and art, and in the development of Persian ceramics in the face of Chinese influence. He has conducted
  extensive research on the export of Chinese porcelain to India, Persia, and the Near East, and has written several articles and books on the topic.
