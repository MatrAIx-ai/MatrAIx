  career_goals: Now retired, Michael’s primary ambition is to stay active and useful within his tight‑knit community. He aims to mentor younger farmers and hobbyists in practical skills such as equipment
    upkeep and basic carpentry, while also expanding his woodworking hobby into a modest side business that provides custom furniture for local families. He wishes to improve his home’s energy efficiency,
    ensure his wife’s comfort, and remain financially self‑sufficient. In the longer term, he hopes to document his family’s farming history in a memoir for future generations.
