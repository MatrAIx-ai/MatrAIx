  career_goals: Ashley plans to secure her Professional Engineer (PE) license within the next 18 months, positioning herself for senior leadership roles. She aims to become a senior project manager overseeing
    large-scale regional infrastructure initiatives, with a focus on integrating cost‑effective, sustainable solutions. Long‑term, she envisions launching a boutique consulting firm that provides data‑driven,
    efficiency‑focused engineering services to municipalities across the Midwest, leveraging her competitive drive to become a recognized authority in pragmatic infrastructure development.
