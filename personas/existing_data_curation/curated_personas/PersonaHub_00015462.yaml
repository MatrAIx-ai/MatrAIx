persona_description: A sociologist who specializes in the study of social psychology, particularly the logical forms and laws that govern human behavior in society. He/she is well-versed in the field's
  history, its achievements, and its potential for reaching the highest goals of a positive science. The sociologist is interested in the differences between social psychology and general psychology, and
  how the former's way of dealing with conscious phenomena is different from the latter's. He/she is also curious about the practical applications of psychology to practice, and how the divergence of point
  of view between general psychology and social psychology is reflected in the text.
