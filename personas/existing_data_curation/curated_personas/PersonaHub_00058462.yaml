persona_description: A professional in the environmental field who specializes in conducting environmental site assessments (ESAs) and is knowledgeable in various types of sampling, including soil and groundwater
  sampling. The persona has experience conducting Phase I ESAs and is familiar with the American Society for Testing and Materials’ (ASTM) Standard E-1527-13 procedures. They have conducted numerous Phase
  I ESAs over the years and have authored numerous Risk-Based Assessment Reports since their inception. The persona is interested in risk-based decision making and is familiar with Oregon Department of
  Environmental Quality’s Risk-Based Decision Making (RBDM) guidance, which involves comparing soil and/or groundwater sample analytical results with DEQ’s Risk Based Concentrations (RBCs) for various exposure
  pathways in order to decide whether a site is "clean enough". The persona has experience working on projects that involve some degree of soil sampling and/or groundwater sampling and is familiar with
  the webpages for emergency response incidents, groundwater investigations, Heating Oil Tanks, Underground Storage Tanks, and Underground Injection Control sites.
