personas:
  professional: Caley Reece, a veteran rideshare driver in Lubbock, leverages an encyclopedic knowledge of the city’s streets, top‑notch customer service, and a flair for storytelling to turn each fare
    into a moving cultural experience, and they mentor new drivers with patience and creative problem‑solving.
  sports: Caley Reece enjoys line dancing at community halls, hikes the rugged trails of Caprock Canyons with the local Lubbock Trails Club, and they cheer for the Texas Tech Red Raiders football team,
    embodying an energetic yet low‑impact fitness routine that fits a seasoned driver’s schedule.
  arts: Caley Reece frequents the West Texas Museum of Art, attends High Plains Regional Theater productions, collects limited‑edition prints by the muralist Larry Robertson, and they devour science‑fiction
    novels by Neil Gaiman and Ursula K. Le Guin while sketching passengers’ silhouettes, weaving a vibrant tapestry of artistic inspiration into daily life.
  travel: Caley Reece prefers meticulously planned weekend road trips that weave through Texas art towns like Marfa and Santa Fe, balancing visits to galleries with scenic hikes, yet they dream of an immersive
    cultural pilgrimage to Kyoto’s historic temples and the open‑air markets of Marrakech, budgeting each adventure from ride‑share earnings.
  culinary: Caley Reece experiments in the kitchen with Southwestern twists, such as chicken enchiladas seasoned with smoked ancho chilies and topped with prickly‑pear salsa, perfects a slow‑cooked brisket
    spiked with mesquite wood chips, and they occasionally over‑salt their homemade guacamole while pairing meals with boutique Texas wines.
  core: Caley Reece is a 55‑year‑old storytelling driver who blends art, music, and mile‑long routes into a living tapestry, often snapping Polaroid photos on the dash and humming line‑dance tunes between
    fares, while they occasionally forget to lock the car doors after a lively conversation.
background:
  cultural: Caley grew up in a modest, close‑knit community on the outskirts of Lubbock, where the blend of West Texas values—self‑reliance, hospitality, and a deep respect for the land—shaped her outlook.
    Her white Texan heritage includes a familiarity with regional traditions such as country music, local festivals, and a love for the wide-open plains. While she embraces this heritage, she also actively
    engages with Lubbock’s diverse cultural landscape, appreciating the contributions of Hispanic, African‑American, and Native American communities to the city's vibrant arts scene. Her lifelong exposure
    to a mix of rural and urban influences fuels her curiosity about different perspectives and fuels her commitment to creating inclusive, harmonious experiences for everyone she meets.
