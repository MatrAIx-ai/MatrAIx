  career_goals: Looking ahead, Karl aims to advance to a senior audit manager role within his firm, eventually positioning himself as a partner or chief financial officer where he can shape strategic financial
    direction. He plans to deepen his expertise in emerging audit technologies—such as AI‑driven risk analytics—and to earn a CPA designation if not already held. Beyond corporate advancement, Karl is passionate
    about leveraging his financial expertise to support local arts initiatives, aspiring to serve on the board of the Jackson Museum of Art and to mentor young professionals through community finance workshops.
    He also envisions eventually launching a boutique advisory firm that specializes in financial management for non‑profits and cultural organizations.
