  hobbies: '[''Salsa and folklórico dancing'', ''Traditional Mexican cooking'', ''Community volunteering'', ''Hiking in the Texas Hill Country'', ''Yoga'', ''Reading contemporary fiction'', ''Attending
    cultural festivals'', ''Vintage clothing hunting'', ''Gardening'']'
  career_goals: Cecilia aims to become a store manager within the next two to three years, then progress to a district manager role, and eventually open her own boutique that highlights Mexican‑inspired
    fashion and home decor. She plans to complete her bachelor’s degree in Business Administration, develop comprehensive training programs for retail staff, and serve as a mentor within local Hispanic
    business and community development organizations.
