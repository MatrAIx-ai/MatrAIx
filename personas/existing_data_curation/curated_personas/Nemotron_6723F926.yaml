personas:
  professional: Cecilia Castaneda is a retail sales specialist celebrated for her meticulous inventory control, bilingual customer rapport, and strategic upselling, who translates her organized, curiosity‑driven
    mindset and compassionate teamwork into a clear trajectory toward store management and eventually opening a boutique showcasing her cultural fashion inspirations.
  sports: Cecilia Castaneda fuels her fitness routine with weekend hikes in the Texas Hill Country through the Austin Trailblazers Hiking Club, weekly yoga sessions at a community studio, and cheering on
    the Dallas Cowboys, Texas Rangers, and Austin FC, blending her energetic sociability with disciplined training.
  arts: Cecilia Castaneda immerses herself in the arts by dancing salsa to the vibrant rhythms of Celia Cruz, exploring folkloric performances, reading contemporary novels by Sally Rooney and Celeste Ng,
    and attending cultural festivals such as SXSW and Austin City Limits, which together shape her vibrant creative outlook.
  travel: Cecilia Castaneda prefers thoughtfully planned weekend escapes to scenic locales like Hill Country vineyards, the art‑filled streets of Santa Fe, and the historic plazas of Oaxaca, while dreaming
    of a spring adventure to Barcelona’s Gothic Quarter, balancing her love of cultural immersion with a modest travel budget.
  culinary: Cecilia Castaneda enjoys cooking heritage dishes such as mole poblano, tamales, and pozole, expertly layering chilies, corn, and fresh cilantro, and showcases her culinary skill by hosting family
    meals where she experiments with roasted cactus and smoky chipotle, reflecting her organized approach to flavor and hospitality.
  core: Cecilia Castaneda is a disciplined, sociable go‑getter who blends practical ambition with a zest for dancing, vintage finds, and community service, yet sometimes splurges on impulsive shopping sprees
    that she later regrets.
background:
  cultural: Cecilia was raised in a Mexican‑immigrant family in Texas, growing up bilingual in Spanish and English. Her upbringing blends Mexican traditions—such as celebrating Día de los Muertos, Día de
    la Independencia, and Catholic holidays—with the multicultural vibrancy of the Greater Houston area. Family ties, community solidarity, and pride in her heritage shape her values, while her Texan environment
    influences her love for outdoor activities and participation in local festivals.
attributes:
  skills: '[''Customer relationship building'', ''Upselling techniques'', ''Product knowledge'', ''Inventory control'', ''Visual merchandising'', ''POS system operation'', ''Data analysis and performance
