  career_goals: Rashaad aims to leverage his experience and disciplined work ethic to advance into supervisory and management roles within the transportation industry. Over the next five years he plans
    to earn advanced endorsements for hazardous‑material transport, obtain a DOT‑approved safety trainer certification, and transition to a route supervisor position where he can mentor new drivers and
    oversee compliance. Ultimately, he aspires to launch his own small‑scale logistics firm focused on reliable local deliveries, using his organized planning skills and customer‑focused approach to build
    a reputation for punctuality and safety.
