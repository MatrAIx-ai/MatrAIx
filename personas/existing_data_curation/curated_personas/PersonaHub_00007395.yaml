persona_description: A geographer and soil scientist who specializes in the evaluation and analysis of soil and land use potential in upland areas of N.E. Scotland. She is interested in the physiographic
  system and its application to land use planning and soil management. Her research focuses on the relationship between soils, land use potential, and physiographic units on three bedrock types in N.E.
  Scotland, specifically in the Bennachie, Clashindarroch, and Strathdon areas. She is also interested in the variation between physiographic units and the use of statistical analyses to validate the findings.
  Her work is significant in understanding the land use potential and the soil characteristics of upland areas in N.E. Scotland.
