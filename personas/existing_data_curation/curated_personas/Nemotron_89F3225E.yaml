  hobbies: '[''Fishing and angling tournaments'', ''Hunting and outdoor navigation'', ''Woodworking and furniture making'', ''Gardening and community garden projects'', ''Bridge and card game nights'',
    ''Classic car shows'', ''Local history society involvement'', ''Church outreach volunteering'']'
  career_goals: Although retired from the formal workforce, Frank aims to remain a pillar of his community. He aspires to lead the senior center’s activity committee, organizing events that blend social
    interaction with purposeful projects, such as a community garden. He hopes to complete a certification as a volunteer firefighter to deepen his emergency‑response role. Frank also dreams of documenting
    his life experiences in a memoir that highlights the evolution of small‑town Michigan, preserving local history for future generations. Maintaining his health and staying physically active through regular
    fishing trips and woodworking projects are also central to his personal ambitions.
