personas:
  professional: Shane Smith is an aspiring game developer who channels their love for structure into building intricate LEGO sets and coding simple Scratch games, while their sociable, energetic nature
    makes them a natural leader during neighborhood soccer matches and group board game sessions.
  sports: Shane Smith is a passionate soccer and baseball player who trains with the Riverside Youth Soccer Club on Saturdays, pitches for the Cityville Little League on weekdays, and cheers for the New
    York Yankees and the Seattle Sounders while idolizing professional athletes like Lionel Messi and Shohei Ohtani.
  arts: Shane Smith is a creative enthusiast who devours graphic novels by artists such as Jim Lee and Alan Moore, builds elaborate LEGO worlds inspired by the architecture of Frank Lloyd Wright, and enjoys
    the soundtracks of composers like Hans Zimmer while regularly playing board games like Catan with friends.
  travel: Shane Smith is an adventurous traveler who prefers spontaneous weekend road trips to nearby state parks like Yellowstone and the local beach, dreams of visiting Tokyo's LEGOland and Disneyland
    in California, and balances family constraints by planning short, budget‑friendly outings with friends.
  culinary: Shane Smith is a budding foodie who loves pepperoni pizza, chicken nuggets, and homemade macaroni and cheese, enjoys experimenting with simple recipes like taco bowls using ground beef and cheddar,
    and often swaps snacks like cheese‑flavored popcorn during board game nights.
  core: Shane Smith is an energetic, structure‑loving 11‑year‑old who blends a love for teamwork in soccer and coding with a habit of occasional impulsive spending and a penchant for collecting baseball
    cards.
background:
  cultural: Shane grew up in the suburban community of Winfield, Illinois, a typical Midwestern town with a strong emphasis on family, school, and local sports. His family's cultural roots are primarily
    Northern European, with German and Irish ancestry reflected in occasional celebrations like St. Patrick's Day. He participates in community events such as the DuPage County fair, neighborhood block
    parties, and Fourth of July parades. The local school and recreation centers provide a structured environment that aligns with his preference for predictable routines, while the open‑air parks and sports
    fields give him the flexibility to be energetic and sociable with his peers.
