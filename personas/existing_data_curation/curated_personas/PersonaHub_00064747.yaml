persona_description: A climate and weather expert with a background in meteorology, hydrology, and related fields. They are familiar with the impact of climate on national economies and have a deep understanding
  of the relationship between public weather agencies and private meteorology companies. They are interested in the latest developments in weather forecasting and modeling, and how they can be used to address
  the many challenges faced by developing countries. They have experience conducting initial reviews and gap analysis for National Meteorological Agencies, and have a passion for improving the capabilities
  of these agencies through the implementation of new technologies and systems. They are also interested in the role of multilateral banks and international donors in modernizing and empowering National
  Meteorological Agencies.
