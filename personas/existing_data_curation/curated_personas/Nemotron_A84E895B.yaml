    into patient care'', ''Staff education and mentorship'', ''Interdisciplinary communication'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Classical piano playing'', ''Black‑and‑white street photography'', ''Hiking coastal trails'', ''Herb gardening'', ''Experimental cooking
    and wine tasting'', ''Reading science‑fiction and medical‑technology literature'', ''Small‑group book club'', ''Volunteering in senior‑center art‑therapy workshops'']'
  career_goals: Carl aims to advance into a nurse‑manager or clinical nurse specialist position within his health system, focusing on geriatric and holistic care. He plans to pursue a Master of Science
    in Nursing with a concentration in health informatics or nursing education to strengthen his ability to develop data‑driven patient‑safety initiatives. Long‑term, he hopes to establish a multidisciplinary
    program that blends conventional nursing with creative therapies—such as visual arts, music, and narrative medicine—to improve patient outcomes and staff well‑being. He also aspires to mentor emerging
    nurses, influence hospital policy toward culturally sensitive, patient‑centered care, and publish research on the impact of artistic interventions in clinical settings.
