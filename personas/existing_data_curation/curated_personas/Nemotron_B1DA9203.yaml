personas:
  professional: Darla Mcintyre, a 54‑year‑old licensed electrician with three decades of hands‑on experience, channels her vivid imagination and competitive drive into a boutique contracting firm that specializes
    in sustainable retrofits and artistic lighting installations, while they mentor apprentices and eye a Master Electrician certification.
  sports: Darla Mcintyre finds balance on solitary hikes through the Blue Ridge foothills, where they birdwatch and log miles with a Garmin, support the Carolina Panthers and the Asheville Tourists, and
    occasionally join a weekend tennis league to satisfy their competitive edge.
  arts: Darla Mcintyre expresses her curiosity through abstract watercolor paintings that echo circuitry patterns, builds kinetic sculptures powered by Arduino, draws inspiration from James Turrell and
    Bridget Riley, and they immerse themselves in speculative fiction by William Gibson and popular science by Neil deGrasse Tyson.
  travel: Darla Mcintyre prefers meticulously planned solo trips that blend technology and nature, having trekked Iceland’s geothermal sites, explored Tokyo’s robotics expos, and driven the Blue Ridge Parkway,
    while they dream of a future visit to the Scottish Highlands for birdwatching and historic home tours.
  culinary: Darla Mcintyre cultivates a modest vegetable garden and relishes dishes like roasted heirloom tomato salad with basil, grilled trout with lemon, and a weekly batch of homemade kombucha, yet
    they occasionally succumb to a late‑night microwaved pizza when a project deadline looms.
  core: Darla Mcintyre is a 54‑year‑old electrician‑artist who fuses circuitry with canvas, runs a sustainable retro‑fit business, mentors apprentices, hikes solo, and balances methodical budgeting with
    occasional impulsive art‑supply splurges, all while they maintain a quiet, competitive edge.
background:
  cultural: Darla grew up in a middle‑class, white family in Hickory, North Carolina, where Southern Appalachian values of self‑reliance, hard work, and community support were central. Her upbringing blended
    the region’s craft traditions—such as folk music and quilting—with a practical, hands‑on work ethic. Although she attended college briefly, she chose the trade path, reflecting a cultural respect for
    skilled labor. As a widowed woman, she participates in her local church’s outreach programs and maintains close ties with a small network of friends and fellow tradespeople, embodying the modest hospitality
    and resilience typical of the Catawba County community.
