  career_goals: Darla aims to obtain her Master Electrician certification and expand her own boutique contracting business focused on sustainable retrofits and artistic lighting projects. She plans to mentor
    a new generation of female electricians, develop a community workshop series on DIY solar and creative electronics, and eventually transition into a consulting role where she advises historic home owners
    on safe, energy‑efficient rewiring. She also hopes to complete her unfinished college coursework in electrical engineering to deepen her technical expertise.
