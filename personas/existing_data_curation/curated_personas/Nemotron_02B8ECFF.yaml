  hobbies: '[''Watercolor painting'', ''Visiting art galleries & museums'', ''Community theater attendance'', ''Gardening'', ''Birdwatching'', ''Historical fiction reading'', ''Chess'', ''Quilting'', ''Genealogy
    research'', ''Traveling to art festivals'']'
  career_goals: Although retired, Caroline is intent on channeling her curiosity and competitive energy into new projects. She aims to curate an annual senior art exhibition in Howard, write and self‑publish
    a memoir that weaves her family’s Scottish roots with Pennsylvania heritage, master digital art tools, launch a weekly discussion circle at the senior center on contemporary ideas, and travel to at
    least three major art museums in the next five years. She also hopes to refine her organizational habits to reduce stress and become a local historian for Centre County.
