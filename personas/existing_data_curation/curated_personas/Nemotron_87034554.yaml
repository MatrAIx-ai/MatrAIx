  career_goals: Ariana aims to solidify her legacy through several personal projects. She plans to write and self‑publish a memoir that weaves her family’s roots with the history of Longview and East Texas.
    She hopes to establish a small scholarship fund for local high school seniors interested in community service. Building on her volunteer experience, she aspires to lead a statewide network of senior
    volunteers, creating training resources and coordinating inter‑community events. Ariana also wishes to master digital photography, capturing the piney woods and historic landmarks of Gregg County, and
    to maintain her health by integrating low‑impact exercise and mindfulness practices to manage stress.
