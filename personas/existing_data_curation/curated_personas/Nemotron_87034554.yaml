personas:
  professional: Ariana Cozart is a senior community event coordinator who applies meticulous planning, disciplined budgeting, and a competitive drive to ensure senior-center functions run smoothly, while
    they also mentor volunteers through their pragmatic curiosity and high standards.
  sports: Ariana Cozart passionately supports the Dallas Cowboys and their local high school football team, participates in a senior bridge league that sharpens their strategic mind, and maintains fitness
    through water-aerobics and early-morning bird-watching walks along nearby nature trails.
  arts: Ariana Cozart spends evenings quilting intricate patchwork, singing in their church choir, and rehearsing for community theater productions, drawing inspiration from folk musician Willie Nelson,
    painter John H. Hays, and classic playwrights discussed in their book club.
  travel: Ariana Cozart enjoys leisurely road trips to historic towns like Nacogdoches and the music festivals of Austin, while they dream of a slow river cruise on the Mississippi, balancing travel plans
    with the modest budget they reserve for their scholarship fund.
  culinary: Ariana Cozart excels at cooking smoky brisket, collard greens, and peach cobbler using garden-grown tomatoes and smoked paprika, occasionally over-indulging in extra gravy as a comfort during
    stressful weeks.
  core: Ariana Cozart is a disciplined, community-focused octogenarian who blends organized pragmatism with a competitive edge, tending their garden, quilting, and genealogy while quietly battling stress
    and a habit of meticulous budgeting.
background:
  cultural: Ariana is a white Texan whose upbringing in Longview during the 1950s and 1960s immersed her in East Texas culture. Raised in a Southern Baptist family, she values community fellowship, hospitality,
    and a strong work ethic. Her family’s roots trace back to early settlers of the piney woods region, fostering a deep appreciation for local history and traditions. The blend of modest Southern values
    with a pragmatic, self‑reliant mindset shapes her worldview. She celebrates regional customs such as Fourth of July parades, county fairs, and holiday church gatherings, and she maintains close ties
    with extended family and longtime neighbors.
