personas:
  professional: Janak Mollah is a 24‑year‑old emerging creative strategist who blends digital illustration, copywriting, and data‑driven social‑media planning with a charismatic, improvisational flair,
    leveraging their methodical project‑management skills and competitive drive to win hackathons and secure junior roles while future‑planning a media‑arts degree and a personal brand of 10 000 followers,
    and they thrive on audience interaction.
  sports: Janak Mollah supports the Houston Dynamo and Houston Rockets, plays pick‑up basketball at a downtown gym, joins a summer ultimate frisbee league, and they follow a disciplined weekly routine of
    morning runs and rock‑climbing sessions, viewing physical competition as a counterbalance to their strategic board‑game pursuits.
  arts: Janak Mollah immerses in abstract sketching, synth‑driven soundscapes inspired by Aphex Twin and Brian Eno, performs at local improv and open‑mic nights, curates playlists of experimental electronic
    artists, and they draw intellectual fuel from speculative fiction authors like N.K. Jemisin and art theorists such as Kandinsky, shaping a distinctive multimedia aesthetic.
  travel: Janak Mollah plans trips with a blend of Trello boards and spontaneous detours, having explored Austin’s music festivals, New Orleans’ jazz scene, and Tokyo’s tech‑art expos, while they dream
    of a cultural immersion in Marrakech’s spice markets and Barcelona’s street art districts, all within a student‑budget framework.
  culinary: Janak Mollah cooks experimental fusion dishes like chipotle‑marinated chicken tacos with garam masala salsa, paneer quesadillas seasoned with cumin and lime, and spiced biryani‑style rice bowls
    topped with avocado, showcasing a love for bold flavors such as cilantro, paprika, and adobo sauce, and they often experiment with new spice combos late into the night.
  core: Janak Mollah is a charismatic, methodical creator who fuses abstract art, synth music, and competitive strategy into a vibrant personal brand, constantly juggling late‑night projects, impulsive
    gear splurges, and they maintain a disciplined drive to turn cultural curiosity into a future boutique agency.
background:
  cultural: Janak is a second‑generation South Asian American; his parents immigrated from Bangladesh and maintain deep ties to Muslim traditions. Growing up in Houston’s vibrant Harris County, he celebrated
    Eid, Ramadan, and community gatherings at the local masjid while also embracing the multicultural energy of the city. Fluent in English and conversational in Bengali, he enjoys listening to classic
    Qawwali, Bangladeshi folk music, and contemporary South Asian pop. His family’s emphasis on education, hospitality, and storytelling influences his creative work, prompting him to blend diaspora narratives
    with modern visual language.
