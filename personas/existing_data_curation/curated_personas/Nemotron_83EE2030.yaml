    at Cultural Festivals'', ''Youth Art Workshop Facilitation'', ''Fusion Cooking'']'
  career_goals: In the next two years Janak plans to enroll in a Bachelor’s program in Media Arts or Advertising at a Texas university while securing a junior creative‑strategist internship at a tech‑savvy
    agency in Houston. He aims to build a personal brand as a digital artist and thought‑leader on the intersection of art, technology, and South Asian culture, growing a following of at least 10,000 on
    Instagram and TikTok. Long‑term, he envisions launching his own boutique creative agency that produces immersive brand experiences for multicultural audiences, positioning himself as a creative director
    who champions innovative storytelling and culturally resonant design.
