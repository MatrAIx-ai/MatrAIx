  career_goals: He aims to advance from his current cashier role to store manager within the next two years, leveraging his business education and leadership abilities. After gaining retail management experience,
    Joshua plans to pursue a regional management position and eventually launch his own boutique that blends local Texas craftsmanship with his own artistic designs. To support these ambitions, he intends
    to earn a professional certification in retail management and possibly an MBA, while continuing to develop his digital marketing and design skills.
