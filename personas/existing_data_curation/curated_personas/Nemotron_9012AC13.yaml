  hobbies: '["Abstract painting", "Landscape photography", "Chess (strategy variants)", "Reading (science fiction, philosophy, medical history)", "Model railroad building", "Gardening (ornamental)", "Woodworking",
    "Listening to classical and jazz music", "Home‑automation tinkering (Raspberry Pi, Arduino)", "Visiting art galleries and museums"]'
  career_goals: Robert aims to lead a hospital‑wide digital transformation that integrates AI‑driven predictive analytics to reduce readmissions and improve patient outcomes. He plans to achieve Lean Six
    Sigma Black Belt certification and apply it to streamline operations. A key ambition is to embed artistic design principles into healing environments, enhancing patient experience through curated visual
    spaces. He seeks to mentor emerging health administrators, publish a thought‑leadership book on innovative health system management, and ultimately ascend to a Chief Operations Officer role within a
    regional health network. Additionally, he intends to establish a scholarship fund for under‑privileged students pursuing STEM fields, leaving a lasting legacy of both professional excellence and community
    impact.
