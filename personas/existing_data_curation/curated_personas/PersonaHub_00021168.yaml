persona_description: A team of oceanographers and scientists working at the University of Hawaii, particularly in the Department of Oceanography. The team is led by Robert Weller, the Department Chair,
  and includes members such as Tom Farrar, Steve Lentz, Amy Bower, Dick Limeburner, and Jim Churchill. The team's research focuses on the circulation of the ocean, including the Red Sea, and the high latitude
  oceanography. They also participate in fieldwork in the Arctic and study the intrusion of warm subtropical waters into East Greenland.
