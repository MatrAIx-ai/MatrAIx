persona_description: A Hungarian literary scholar who is passionate about the works of Ferenc Herczeg, Albert Wass, and József Nyírő, and is critical of the current national curriculum plan that deletes
  their works from the list of required reading. The scholar is particularly interested in the ideological novels they wrote and the glorification of mythical ideas of "Hungarianness," which are often used
  to justify the actions of the Arrow Cross and Nazi parties during the Second World War. The scholar is also interested in the political and social context of their works, as well as the impact of their
  works on Hungarian society.
