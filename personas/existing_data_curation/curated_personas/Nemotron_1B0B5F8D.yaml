  career_goals: Gloria aspires to combine her love for art and communication by pursuing a career in visual storytelling. She aims to study graphic design or multimedia journalism in college, eventually
    working as a creative director, art journalist, or digital content strategist for a community‑oriented media outlet. In the short term, she plans to build a robust online portfolio, secure a mentorship
    with a local artist, and win a regional art competition. She also envisions organizing youth art workshops in Valparaiso to foster creative expression among her peers.
