persona_description: A neuroscientist who specializes in the study of the brain's response to magnetic stimulation and its potential applications in treating vision problems. She is particularly interested
  in the cortex and its role in vision, and has a strong background in transcranial magnetic stimulation and its effects on the brain. She is looking for new ways to improve vision in adults who have lazy
  eye and is interested in exploring the potential of multiple doses and perceptual training as treatment options. She is also interested in exploring the potential of magnetic stimulation to prime the
  brain for a rehabilitation program and is eager to see the results of the study.
