  career_goals: Lauren aims to obtain her GED within the next year, seeing it as a stepping stone toward a certified nursing assistant (CNA) credential, which would allow her to combine her caring nature
    with a stable, community‑focused career. In parallel, she hopes to launch a modest home‑based bakery that supplies baked goods to local farmers' markets and church events, leveraging her cooking talents
    and entrepreneurial spirit. Long‑term, Lauren envisions a role where she can mentor younger community members, perhaps as a volunteer coordinator at the local community center, using her organizational
    abilities to create programs that foster social connection and skill development.
