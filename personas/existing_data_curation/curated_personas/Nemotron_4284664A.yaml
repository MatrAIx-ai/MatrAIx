personas:
  professional: Betty Mcclain, a 48‑year‑old master pipefitter with hardened hands from years of MIG/TIG welding and blueprint reading, leverages their sociable charisma and competitive edge to lead crews,
    negotiate with suppliers, and champion women in the trades while eyeing a forewoman certification and their own contracting firm.
  sports: Betty Mcclain enjoys early morning fishing trips on Lake George, jogs casually around the community garden when spring warms, proudly cheers for the New York Knicks in winter, and they play occasional
    kickball matches with the local trade‑union league.
  arts: Betty Mcclain lights up the stage in their community theater, taking on lively roles reminiscent of June Lockhart’s warm heroines, while their love for classic mysteries fuels heated book‑club debates
    on Agatha Christie and Dorothy L. Sayers, and they keep a record of Broadway hits like Chicago and the folk tunes of Johnny Cash to set the mood for potluck gatherings.
  travel: Betty Mcclain prefers low‑key road trips to the Adirondack Mountains in the fall, where they can combine hiking with tomato‑picking, but they also dream of a summer tour of Tuscany’s vineyards
    and a spontaneous weekend in Kyoto’s historic districts, planning most trips around community events and limited vacation days.
  culinary: Betty Mcclain cooks hearty farm‑to‑table meals like rosemary‑infused lamb stew, pan‑roasted tomatoes with basil, and rustic sourdough grain bread, boasting a solid intermediate skill set that
    balances precise pipe‑fitting measurements with a pinch of improvisation, and they never say no to a good slice of pepperoni pizza during potluck evenings.
  core: Betty Mcclain is a charismatic, pipe‑welding veteran who thrives on being the life of the party, trades their disorganized schedule for spontaneous hand‑crafted projects, and they fight fiercely
    for women in trades while never skipping a chance to showcase a fresh batch of garden tomatoes.
background:
  cultural: Betty grew up in a middle‑class, white, Protestant family in rural upstate New York. Her parents emphasized hard work, self‑reliance, and community involvement. She attended a local public high
    school and later took courses at a community college, where she discovered an interest in industrial trades. The region’s strong union culture and small‑town values shaped her outlook, giving her a
    practical, no‑nonsense approach to life. Her heritage includes influences from New England settlers and a modest, straightforward lifestyle. Though separated, she maintains close ties to family and
    longtime friends, often gathering for holiday meals and local events.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''Industrial Plumbing'', ''MIG/TIG Welding'', ''Blueprint Reading'', ''Hydraulic & Pneumatic System Maintenance'', ''Pressure Testing'', ''Pipe Threading and
    Bending'', ''OSHA Safety Compliance'', ''First Aid/CPR'', ''Team Coordination'', ''Apprentice Training'']'
  hobbies: '[''Community theater acting and set building'', ''Cooking and hosting potluck gatherings'', ''Gardening (tomatoes, herbs)'', ''Fishing'', ''Vintage motorcycle restoration'', ''Attending local
    fairs and trade shows'', ''Book club (practical non-fiction, mysteries)'']'
  career_goals: Betty aims to become a certified journeyman forewoman within the next three years, earn a Master Plumber license, and eventually launch her own small contracting firm specializing in residential
    and light‑commercial pipe installations in upstate New York. She also wants to start a mentorship program for women entering the trades, expand her network within the union, and secure a senior role
    that blends technical work with project management. Financially, she seeks a steady increase in income to support her independence and build retirement savings.
