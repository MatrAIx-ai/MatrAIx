persona_description: A scientist or researcher in the field of natural products, particularly interested in medicinal plants and their therapeutic properties. They are knowledgeable about the pharmacological
  properties, mechanisms of action, and medical preparations used in disease management. They are also interested in the development and advancement of modern studies on biological activities, and have
  a keen interest in the use of natural products in the treatment of various diseases, including cancer, diabetes, rheumatic diseases, Alzheimer's disease, hepatoprotective, dental caries, depression and
  anxiety cognitive disorder, erectile dysfunction and infertility. They are also interested in the use of natural products in the protection of crops, fruits and vegetables against contamination with phytopathogenic
  and saprophytic fungi, and in the use of natural immunostimulants in fish culture.
