  hobbies: '[''Hiking'', ''Landscape Photography'', ''Woodworking'', ''Reading Architecture and Art Books'', ''Gardening (native plants)'', ''Seasonal Cooking'', ''Acoustic Guitar'', ''Attending Gallery
    Openings'', ''Live Music'', ''Volunteering with Habitat for Humanity'', ''Community Design Charrettes'']'
  career_goals: David aims to become a LEED Accredited Professional and lead a regional sustainable‑design consultancy focused on affordable housing and community‑centered projects in the Eugene area. He
    wishes to mentor emerging architects, sharing his blend of artistic curiosity and pragmatic organization. Over the next five years, he plans to collaborate with local artists to create public art installations
    that respond to Oregon’s natural landscape. He also hopes to teach part‑time at the University of Oregon’s School of Architecture and eventually launch a boutique firm that emphasizes environmentally
    responsible, culturally sensitive design while advocating for progressive local zoning policies.
