personas:
  professional: David Hull, a seasoned architect with over three decades of experience, merges artistic curiosity with rigorous sustainable design, leading multidisciplinary teams to deliver LEED‑certified
    projects that honor local cultural narratives while balancing code, budget, and community engagement.
  sports: David Hull regularly hikes the Oregon Coast Trail and joins the Eugene Out‑Back Hiking Club, follows the Portland Timbers and Oregon State Beavers, incorporates weekend bike rides and occasional
    trail running into his routine, and treats his body as a tool for exploring nature rather than a competitive arena.
  arts: David Hull immerses himself in creative expression through photography inspired by Ansel Adams, woodworking that echoes the forms of Olafur Eliasson installations, evening acoustic guitar sessions
    echoing R.E.M., and frequent attendance at gallery openings featuring local Oregon painters like Terry Toedtem.
  travel: David Hull favors eco‑conscious road trips, having driven the Pacific Coast Highway to witness Big Sur’s cliffs, trekked the Alpine Lakes in Washington, explored the ancient temples of Kyoto for
    design inspiration, and plans a future visit to Patagonia’s glaciers, always packing a sketchbook and reusable gear.
  culinary: David Hull enjoys seasonal farm‑to‑table cooking, mastering dishes like smoked salmon with dill, hazelnut pesto using Oregon‑grown hazelnuts, and sourdough bread infused with locally foraged
    mushrooms, while his garden supplies fresh herbs and heirloom tomatoes that he incorporates into his meals.
  core: David Hull is a nature‑driven architect who balances meticulous sustainability with artistic spontaneity, mentors emerging talent, and occasionally forgets to water his garden during a busy design
    sprint.
background:
  cultural: David grew up in a modest white, Midwestern family where community ties and self‑reliance were emphasized. Relocating to the Pacific Northwest for his architectural career, he adopted the region’s
    progressive, environmentally conscious ethos while maintaining respect for the Indigenous histories of the land. In Eugene, he is part of a diverse artistic and sustainability‑focused community, integrating
    those cultural currents into his professional and personal life. His marriage and close relationships with adult children reinforce his values of cooperation, harmony, and intergenerational connection.
