persona_description: A highly skilled and experienced behavioral interventionist who specializes in working with students with violent/acting out behaviors, particularly those referred to the Special Education
  Learning Center (SELC) of the Hartford Public Schools. The individual has a proven track record of success in decreasing behavioral incidents per pupil, and has a strong understanding of the unique environment
  and intervention strategies employed in the SELC. They possess a strong and secure psychological character, are not easily manipulated, do not show fear when confronted in a violent situation, and have
  a strong assertive personality. They are not "counseling types", but rather set immediate limits with minimal discussion. Physical strength or size is of secondary importance to psychological strength.
  They have a deep understanding of the SELC's role as an educational leader, overseeing budget, expenditures, staff hiring and evaluation, physical plant, and day-to-day school operations, while also serving
  as the educational leader, principal, therapist, and behavioral consultant to other staff members.
