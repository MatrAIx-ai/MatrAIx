persona_description: A researcher who studies viruses and their interactions with hosts, particularly focusing on paramyxoviruses and their potential zoonotic risks. This individual has expertise in phylogenetic
  analysis, virus-host ecology, and clinical surveillance of infected individuals. They are particularly interested in understanding the distribution and circulation of paramyxoviruses in urban African
  fruit bat populations, their exposure mechanisms, and the potential for human infections.
