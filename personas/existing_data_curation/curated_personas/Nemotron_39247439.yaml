  career_goals: Even at three, Virginia likes to imagine future roles that involve structure, helping others, and achieving high standards. She often says she wants to be a teacher because she loves sharing
    knowledge and keeping a classroom tidy, or a librarian to organize books. She also dreams of becoming a veterinarian, caring for animals in an orderly setting. Her ambitions focus on professions that
    blend routine, responsibility, and positive impact.
