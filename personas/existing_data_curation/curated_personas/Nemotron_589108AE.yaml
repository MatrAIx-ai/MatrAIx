  hobbies: '[''Watercolor painting'', ''LEGO and wooden block building'', ''Listening to and retelling picture books'', ''Nature walks and bird watching'', ''Singing and dancing in kindergarten choir'',
    ''Organizing art supplies and classroom displays'', ''Participating in simple science experiments'', ''Playing pretend doctor with friends'']'
  career_goals: Although still five, Katarina already imagines a future where she can combine her love of art, learning, and helping others. She dreams of becoming an elementary school art teacher or a
    community librarian, roles that would let her share creative ideas and nurture curiosity in younger children. She also whispers aspirations of being a wildlife illustrator, inspired by the birds she
    watches on the prairie, and enjoys the thought of someday creating books that teach kindness and cooperation. Her strong desire for organization and high standards fuels an ambition to master her skills—whether
    in drawing, reading, or leading group projects—so she can make a positive impact in her Midwestern community.
