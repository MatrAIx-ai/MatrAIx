  career_goals: Weaver aims to turn his love for technology and communication into a career as a tech entrepreneur or product manager. He plans to enroll in a STEM‑focused high school program, eventually
    major in computer engineering or business administration, and launch a YouTube channel that explains DIY tech projects to a broad audience. He envisions leading a startup that creates affordable, modular
    electronics kits for middle‑school students, combining his practical mindset with his desire to educate and inspire peers.
