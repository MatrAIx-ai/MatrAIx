personas:
  professional: Weaver Schade is a teen esports enthusiast and aspiring tech content creator, whose tactical thinking, methodical PC-building skills, and quick-witted debate experience allow them to dissect
    game meta with critical skepticism while their sociable, talkative nature captivates a growing TikTok audience, and they constantly seek feedback to refine their strategies.
  sports: Weaver Schade, a varsity point guard for Livingston County High School, channels their competitive drive onto the basketball court while admiring the Detroit Pistons' strategic play, and they
    transfer the same disciplined stamina into weekend hikes on the Kensington Metropark trails, often streaming their workouts for peers.
  arts: Weaver Schade nabs inspiration from tech YouTubers like Linus Tech Tips and Simone Giertz, while humming to K/DA's POP/STARS and quoting classic sitcom lines from The Office on TikTok, shaping a
    quirky, self-aware creative identity, and they enjoy experimenting with video editing to match the fast-paced humor of their content.
  travel: Weaver Schade dreams of attending PAX East in Boston and the Tokyo Game Show, while already enjoying annual family road trips to the Upper Peninsula's scenic Hiawatha National Forest, and they
    balance budget-wise planning with a love for immersive esports culture.
  culinary: Weaver Schade favors late-night pepperoni pizza and spicy ramen with soft-boiled egg, but occasionally whips up quick garlic-butter shrimp tacos at home, showcasing a moderate cooking skill
    level punctuated by a craving for caffeine-infused energy drinks, and they often experiment with adding a dash of Sriracha for extra heat.
  core: Weaver Schade is a competitively driven, tech-savvy teen who balances methodical planning with a talkative, sociable flair, tackling games, gadgets, and debates with skeptical precision, and they
    occasionally neglect sleep and stretch routines.
background:
  cultural: Weaver grew up in Howell, Michigan, a small Midwestern town with strong community ties and a blend of German, Irish, and broader Anglo‑American heritage. The local culture emphasizes hard work,
    modesty, and participation in community events like county fairs and Fourth of July parades. These values have reinforced his reliable and organized personality while his exposure to a diverse range
    of school clubs and sports has nurtured his sociable and competitive spirit.
