persona_description: A conservation officer who specializes in managing bear conflicts in urban areas, particularly in southern British Columbia. They are responsible for reducing the incentives for hungry
  bears to seek out human populated areas by taking non-lethal measures such as conditioning bears to avoid human areas and calling conservation officers to report bear sightings, conflicts, and wildlife
  attractants. They also provide bear safety resources and guidance to hikers, hunters, and backcountry trail users.
