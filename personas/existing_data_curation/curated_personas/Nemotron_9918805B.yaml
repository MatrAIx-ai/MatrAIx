personas:
  professional: Vivian Abril, a retail logistics associate with a keen eye for visual merchandising, blends methodical inventory management and bilingual communication to keep the stockroom humming while
    they leverage graphic design skills to craft eye‑catching displays that reflect their love for community art.
  sports: Vivian Abril, a recreational midfielder for the Carteret Community Soccer Club, follows the New York Giants and New York Knicks, hits the hiking trails at High Point State Park every other weekend,
    and they treat themselves to occasional basketball pick‑up games at the local park to stay fit.
  arts: Vivian Abril, an avid photographer and gallery‑goer, draws inspiration from street artists like Banksy, paints with colors reminiscent of Frida Kahlo’s palettes, and they curate playlists that include
    Aventura’s bachata hits and Juan Luis Guerra’s merengue, fueling both their social media feeds and community art workshops.
  travel: Vivian Abril, a budget‑savvy explorer, has road‑tripped to the historic streets of Old San Juan, trekked the Blue Mountains of Jamaica, and they dream of a summer stay in Cartagena, always planning
    trips around student discounts and family visits while balancing a modest travel fund.
  culinary: Vivian Abril, a self‑taught home chef, perfects mangú topped with sautéed onions, simmers hearty sancocho for gatherings, rolls pastelitos filled with sweet plantain and cheese, and they experiment
    with quinoa‑infused mofongo, favoring ingredients like ripe plantains, fresh cilantro, and garlic.
  core: Vivian Abril is a curious, organized social dynamo who fuses logistics precision with artistic flair, often juggling study deadlines, community festivals, and they have a secret penchant for late‑night
    sneaker shopping.
background:
  cultural: Vivian is a first‑generation Dominican‑American whose parents emigrated from the Dominican Republic in the early 2000s and settled in Carteret, a town with a vibrant Dominican community. She
    grew up bilingual, speaking Spanish at home and English at school, and her household celebrates Dominican traditions such as merengue and bachata music, Día de la Independencia, and family meals centered
    around dishes like mangú, sancocho, and pasteles en hoja. The close‑knit family structure and collectivist values emphasized respect, hospitality, and community involvement. Her faith background is
    Catholic, with occasional participation in local church events. This cultural grounding fosters a strong sense of identity, pride in her heritage, and a desire to share Dominican art and culture with
    a broader audience.
