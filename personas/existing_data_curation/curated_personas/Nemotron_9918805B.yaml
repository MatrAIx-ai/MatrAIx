  hobbies: '[''Visiting art galleries'', ''Attending cultural festivals'', ''Bachata and salsa dancing'', ''Cooking Dominican cuisine'', ''Photography'', ''Volunteer art workshops'', ''Recreational soccer'',
    ''Hiking'', ''Reading contemporary fiction'', ''Listening to Latin music'']'
  career_goals: Vivian aims to build on her hands‑on retail experience by advancing into a supervisory role within the supply‑chain field. She plans to enroll in a community college to earn an associate
    degree in Business Administration and later a bachelor's degree in Supply Chain Management or Arts Management. In the next three to five years she hopes to become a shift lead or assistant manager at
    her current store and eventually transition to a logistics coordinator position at a larger retailer. Parallel to that, she wants to blend her love of art by working in visual merchandising or as a
    gallery assistant, with a long‑term ambition to open a community art space that showcases Dominican artists and cultural events.
