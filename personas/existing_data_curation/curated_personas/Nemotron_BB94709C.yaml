personas:
  professional: Dale Escanelle, a 12‑year‑old budding engineer and aspiring game developer, channels a blend of curiosity and practicality into building complex LEGO contraptions, wiring simple electronic
    kits, and crafting Scratch games, while their spontaneous nature often leads to inventive shortcuts that occasionally clash with the need for organized code structures.
  sports: Dale Escanelle, a member of the Mortenson Youth Soccer Club who also spends weekends at the local skate park, follows the Chicago Fire (MLS) and Chicago Cubs (MLB) religiously, and balances a
    love for off‑season hiking on prairie trails with spontaneous skateboarding tricks, treating fitness as a fun, social outlet rather than a regimented routine.
  arts: Dale Escanelle channels their love for storytelling into hand‑drawn comic strips inspired by Stan Lee and Neil Gaiman, while their playlist of Billie Eilish, Imagine Dragons, and the score of 'Star
    Wars' fuels imaginative writing sessions that blend sci‑fi and fantasy, making the arts a vibrant backdrop to every LEGO build.
  travel: Dale Escanelle prefers spontaneous weekend getaways over meticulously planned vacations, having camped under the stars at Yellowstone National Park and collected basalt rocks in Iceland, while
    dreaming of a future family trip to Tokyo’s Akihabara district to explore the world of anime and technology.
  culinary: Dale Escanelle, a budding home chef, frequently whips up peanut butter‑banana wraps and customizes pepperoni pizza with extra mozzarella and jalapeños, reveling in the fresh crunch of bell peppers
    and the melty pull of cheese while occasionally attempting (and sometimes burning) a homemade chocolate chip cookie batch during rainy afternoons.
  core: Dale Escanelle is a curiosity‑driven 12‑year‑old whose spontaneous brilliance in LEGO engineering and game coding is balanced by a chronic habit of misplacing tools and forgetting deadlines, yet
    their kind heart and steady composure keep every project—and friendship—on track.
background:
  cultural: Dale is a white Midwestern American raised in Omaha, Nebraska. His family has roots in the Midwest’s agricultural and small‑town traditions, blending German and Scandinavian heritage, which
    influences his appreciation for practical skills and community involvement. Growing up in Douglas County, he often participates in local events such as the Omaha County Fair, neighborhood block parties,
    and volunteer clean‑up days, reflecting the region’s emphasis on neighborly cooperation, modesty, and self‑reliance. The city’s mix of urban amenities and nearby prairie landscapes gives him both a
    love for technology and a deep respect for the natural environment.
