  career_goals: Dale dreams of one day designing robots or machines that help people, so he hopes to become a robotics engineer or an inventor. In the near term, he wants to join the school robotics club,
    win a regional STEM competition, and attend a summer coding camp. He also imagines working outdoors as a wildlife biologist, combining his love of nature with scientific inquiry. Ultimately, he aims
    to pursue a degree in engineering or environmental science and create practical solutions that improve his community.
