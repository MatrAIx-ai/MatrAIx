  hobbies: '["Visiting art galleries and museums", "Attending theater and live music performances", "Watercolor painting", "Cooking traditional Peruvian dishes", "Salsa and bachata dancing", "Bird-watching
    and nature walks", "Playing guitar", "Participating in multicultural festivals", "Reading educational research and podcasts", "Hosting social dinner gatherings"]'
  career_goals: Looking ahead, Marco aims to blend his passion for the arts with inclusive education by creating a district‑wide program that embeds visual and performing arts into special‑education classrooms.
    He plans to pursue an advanced certification in Special Education Administration to take on a leadership role as an Inclusion Coordinator. Additionally, he hopes to develop bilingual resource guides
    for teachers and families, mentor new special‑education educators, and present his innovative practices at national conferences such as the Council for Exceptional Children (CEC) annual meeting. On
    a personal level, Marco wishes to launch a community outreach initiative that celebrates Peruvian culture through workshops and festivals, fostering cultural pride among his students and their families.
