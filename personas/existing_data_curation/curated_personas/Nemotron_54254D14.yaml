personas:
  professional: Marco Gonzalezarellano, a 58‑year‑old bilingual special‑education veteran who designs watercolor‑inspired IEPs and integrates live music into their classroom, pursues a district‑wide arts‑inclusive
    initiative and an advanced certification in Special Education Administration, blending their curiosity for unconventional teaching with a laid‑back, occasionally disorganized workflow while fostering
    collaborative, evidence‑based practices across their school.
  sports: Marco Gonzalezarellano enjoys leisurely runs along the Tampa Riverwalk, fervently roots for the Buccaneers and Lightning, participates in a local bird‑watching hiking club, and keeps fit with
    salsa‑dance evenings, though their laid‑back schedule sometimes causes them to skip the gym.
  arts: Marco Gonzalezarellano, a passionate watercolorist, frequents Tampa’s galleries to admire works by contemporary artists such as Maya B. and Anish Kapoor, delights in theater productions like Hamilton,
    and often spends evenings strumming their guitar to the salsa rhythms of Celia Cruz and the smooth jazz of the St. Petersburg Jazz Collective.
  travel: Marco Gonzalezarellano favors spontaneous, culture‑rich travel, having trekked to Machu Picchu and explored the Florida Keys on a whim, while their bucket list includes a salsa‑filled weekend
    in Barcelona and a bird‑watching expedition in the Everglades, often arranged through casual meet‑ups with fellow educators.
  culinary: Marco Gonzalezarellano, an intermediate home chef, regularly crafts vibrant Peruvian dishes such as ceviche with ají amarillo, lomo saltado, and quinoa‑infused causa, delighting friends at their
    lively dinner parties where salsa music plays and stories flow.
  core: Marco Gonzalezarellano is a charismatic, art‑driven educator who blends boundless curiosity and talkative charm with a delightfully disorganized schedule, often forgetting appointments yet never
    missing a chance to share their stories over coffee, music, and watercolor sketches.
background:
  cultural: Marco was born to Peruvian parents who immigrated to the United States in the early 1970s. He grew up in a bilingual household in Miami, where the rhythms of Andean folk music, the aromas of
    ceviche and ají de gallina, and celebrations such as Inti Raymi and Señor de los Milagros were integral parts of family life. These cultural roots instilled a strong sense of community, respect for
    elders, and pride in his heritage. After moving to Tampa in his thirties, Marco became active in the local Peruvian diaspora, participating in cultural societies, Spanish‑language community events,
    and volunteering at the annual Peruvian Festival. He weaves his heritage into his teaching by incorporating Peruvian stories, art, and music into lessons, fostering cultural awareness and inclusion
    for all students.
attributes:
  skills: '["Special Education Instruction", "Individualized Education Program (IEP) Development", "Bilingual (Spanish-English) Teaching", "Differentiated Instruction", "Arts-Integrated Curriculum Design",
