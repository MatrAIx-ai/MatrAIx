    creative workshops (e.g., pottery, printmaking)'']'
  career_goals: David aims to advance to a senior director role within the cultural sector, eventually becoming an executive director of a regional arts center or museum. He plans to pursue a Master’s in
    Arts Administration to deepen his leadership expertise and to spearhead community‑focused arts initiatives that provide mentorship for at‑risk youth in Riverside County. He also seeks to build a resilient
    workplace culture that supports mental‑health awareness, leveraging his own experiences with anxiety to champion employee well‑being programs. In the longer term, he envisions founding a nonprofit that
    bridges corporate sponsorship and local creative talent, fostering sustainable arts ecosystems.
