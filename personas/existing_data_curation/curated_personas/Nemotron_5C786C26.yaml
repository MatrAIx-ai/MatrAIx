personas:
  professional: David Strickland blends strategic planning and empathetic leadership as a senior project manager at a cultural nonprofit, and they use their strong communication and conflict‑mediation skills
    to steer multidisciplinary teams while infusing creative problem‑solving into every initiative.
  sports: David Strickland is a weekend basketball regular with the Lake Elsinore Hoops Club, a devoted fan of the Los Angeles Lakers and Dodgers, and they hit the hiking trails around Lake Elsinore to
    keep fit, though they occasionally skip workouts after a late night at a gallery opening.
  arts: David Strickland spends evenings painting cityscapes, curates photo series inspired by Ansel Adams, frequents the Getty Center and LACMA, enjoys live shows by the Red Hot Chili Peppers and contemporary
    theater at the Ahmanson Theatre, and they draw creative inspiration from the surreal works of Salvador Dalí.
  travel: David Strickland prefers culturally immersive trips, having explored Kyoto’s temples, Florence’s art museums, and Oaxaca’s culinary markets, while they plan future visits to Marrakech and the
    historic streets of Barcelona, balancing tight travel budgets with a love for off‑the‑beaten‑path experiences.
  culinary: David Strickland loves cooking fusion dishes like shrimp tacos with mango salsa, ramen bowls flavored with miso and fresh basil, and perfecting a classic carbonara, often sourcing avocados,
    jalapeños, and artisanal pasta from local farmers’ markets, and they enjoy pairing each meal with a carefully selected wine.
  core: David Strickland is a curiosity‑driven art manager who juggles strategic leadership with late‑night painting sessions, battles waves of anxiety, and they habitually drink three coffees before sunrise
    to power through meetings.
background:
  cultural: David grew up in a middle‑class suburban community in Southern California, with a family heritage tracing back to Northern European (British and German) ancestors. His upbringing blended typical
    American values of independence and hard work with the eclectic, outdoors‑oriented lifestyle of the Inland Empire. Exposure to the diverse cultural scene of nearby Los Angeles and the natural beauty
    of the Riverside area fostered his love of the arts and outdoor recreation. Though raised in a moderately secular household, he maintains an appreciation for the communal rituals of his European heritage,
    celebrating holidays such as Thanksgiving, Christmas, and occasional St. Patrick’s Day gatherings. His cultural identity is shaped by a combination of West Coast liberal arts education, a strong sense
    of community involvement, and a personal commitment to mental‑health awareness.
