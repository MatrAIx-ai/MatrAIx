persona_description: A legal researcher and policy advocate with expertise in environmental law and water quality management. This persona is likely to have a deep understanding of the complex web of existing
  laws and regulations governing phosphorus pollution in Lake Erie and its tributaries, and the legal tools available to address this problem. They are also likely to be knowledgeable about the best practices
  for reducing phosphorus loading from key sources in Ohio, such as agricultural activities and urban/suburban stormwater runoff. This persona is likely to have experience working with experts from science,
  government, and law to develop recommendations for legal tools and best practices to combat HABs in Lake Erie. They are also likely to have experience in conducting research and public outreach projects
  to raise awareness about the harmful effects of phosphorus pollution on the Great Lakes and the importance of addressing this issue through legal and policy means.
