personas:
  professional: An organized freelance visual artist and community curator, Deysi Soto blends abstract painting, digital illustration, and poetic storytelling with meticulous project planning, leveraging
    their competitive drive and methodical nature to deliver workshops, curate exhibitions, and secure illustration commissions.
  sports: A nature‑loving fitness enthusiast, Deysi Soto enjoys early‑morning hikes in El Yunque and plays competitive adult soccer for the Bayamón FC community team while cheering on the Caciques de San
    Juan basketball squad during the season, balancing solitary endurance with team rivalry.
  arts: A culturally engaged art aficionado, Deysi Soto frequents Bomba and Plena concerts featuring La Tribu de la Perla, studies abstract works by Carmen Herrera, and draws inspiration from the avant‑garde
    installations of Jorge Soto, all of which inform their mixed‑media collages and poetic narratives.
  travel: A meticulously planned explorer, Deysi Soto seeks immersive retreats such as a week‑long eco‑tour of Monteverde’s cloud forest in Costa Rica or a spontaneous weekend in the historic streets of
    Cartagena, booking boutique guesthouses that provide quiet studios for sketching while leaving room for spontaneous street‑food discoveries.
  culinary: A creatively adventurous home cook, Deysi Soto perfects traditional mofongo by adding roasted plantains, smoked chorizo, and lime‑infused aioli, experiments with quinoa salads, and occasionally
    savors artisanal dark chocolate, reflecting moderate cooking skills that blend comfort cuisine with bold flavor twists.
  core: A methodical, imagination‑driven artist, Deysi Soto channels competitive ambition into community workshops, wrestles with chronic worry, and finds solace in solitary hikes and sketchbooks while
    occasionally splurging on premium art supplies.
background:
  cultural: Deysi’s cultural identity is rooted in the vibrant tapestry of Puerto Rican life in Bayamón. Raised in a bilingual household, she grew up speaking Spanish at home and English at school, fostering
    an ability to navigate both local and broader Caribbean contexts. Family traditions, such as celebrated gatherings for Navidad and the inland “Fiestas Patronales,” instilled a deep appreciation for
    music, dance, and food. The rhythms of Bomba, Plena, and salsa, as well as the island’s Afro‑Caribbean heritage, influence her artistic sensibilities. Growing up in a densely populated urban municipality
    has also exposed her to a mix of modern street art and historic architecture, shaping her perspective on community engagement and cultural preservation.
