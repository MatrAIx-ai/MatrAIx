  career_goals: Although currently not in the formal workforce, Deysi aims to transform her artistic passion into a sustainable freelance career. She plans to launch a community‑focused art studio in Bayamón
    that offers workshops, mentorship for emerging creators, and a rotating gallery of local abstract work. In parallel, she aspires to publish a collection of poems and visual essays that explore identity
    and resilience, and to secure commissions for illustration projects that blend Caribbean motifs with contemporary design. Her long‑term ambition is to become a recognized cultural curator who bridges
    traditional Puerto Rican art forms with innovative, interdisciplinary expressions.
