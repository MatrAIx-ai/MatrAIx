  hobbies: '["Surfing", "Beach volleyball", "Coastal photography", "Gallery visits", "Live music concerts", "Pottery", "Urban sketching", "STEM mentoring", "Yoga", "Mindfulness meditation", "Travel", "Cycling"]'
  career_goals: Trevor aspires to advance to a senior leadership role—such as Director of Engineering or Principal Engineer—where he can shape regional infrastructure policy and champion resilient, environmentally‑responsible
    designs. He is keen on integrating public art and community‑centered spaces into civil projects, leveraging his appreciation for the arts to create bridges and promenades that double as cultural landmarks.
    Additionally, he plans to mentor the next generation of engineers through local STEM outreach and to advocate for mental‑health awareness within the industry, drawing on his own experience with anxiety
    and emotional reactivity. In the longer term, Trevor envisions founding a boutique consultancy focused on innovative coastal‑protection strategies and sustainable urban development.
