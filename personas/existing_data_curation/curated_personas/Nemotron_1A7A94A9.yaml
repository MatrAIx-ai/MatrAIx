personas:
  professional: Trevor Lacoste, a senior civil engineer with 15+ years designing transportation and coastal infrastructure in Orange County, combines rigorous structural analysis, LEED‑focused sustainable
    design, and a flair for integrating public art into bridges and promenades, earning a reputation for delivering on‑budget projects while championing resilient, community‑centric solutions.
  sports: Trevor Lacoste rides the waves at Huntington Beach, dominates beach volleyball matches with the Orange County Beach Club, and cheers for the Los Angeles Lakers, balancing a love for sunrise surf
    sessions with weekly strength‑training classes at a local gym.
  arts: Trevor Lacoste immerses themselves in the Los Angeles art scene, attending MOCA openings featuring James Turrell installations, sketching downtown skylines at The Broad, and savoring live acoustic
    sets by Jack Johnson at The Troubadour, all of which feed their creative approach to public‑space design.
  travel: Trevor Lacoste prefers coastal road trips, having photographed the cliffs of Big Sur, surfed in Costa Rica’s Tamarindo, and explored the pottery districts of Mashiko, Japan, while day‑dreaming
    about a future retreat in Iceland’s volcanic landscapes to study geothermal resilience.
  culinary: Trevor Lacoste delights in cooking fresh fish tacos with cabbage slaw, avocado, and a squeeze of lime, experiments with miso ramen using locally sourced mushrooms, and occasionally treats friends
    to grilled shrimp skewers seasoned with smoked paprika and citrus zest.
  core: Trevor Lacoste blends analytical rigor with artistic curiosity, navigating anxiety through mindfulness while passionately surf‑shaping resilient coastal infrastructure and occasional surf‑gear splurges.
background:
  cultural: Trevor grew up in a middle‑class, suburban family of European descent that relocated to Southern California during his childhood, exposing him early to the region's beach‑centric lifestyle and
    diverse cultural fabric of Orange County. The progressive, environmentally‑conscious atmosphere of Huntington Beach—paired with its vibrant art community—has shaped his values of sustainability, community
    engagement, and a broad appreciation for creative expression. While rooted in a traditional American work ethic, he embraces the laid‑back Californian ethos, balancing professional rigor with the region’s
    emphasis on outdoor recreation and cultural openness.
attributes:
  skills: '["Structural analysis", "Transportation engineering", "Coastal engineering", "AutoCAD Civil 3D", "Revit", "GIS mapping", "Project management", "LEED certification", "Sustainable design", "Stakeholder
