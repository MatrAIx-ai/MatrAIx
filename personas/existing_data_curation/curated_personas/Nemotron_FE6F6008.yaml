  hobbies: '[''classic car restoration'', ''fishing'', ''hunting'', ''DIY woodworking'', ''card games (poker)'', ''watching baseball'', ''gardening'']'
  career_goals: Mark aims to turn his hands‑on expertise into a modest but reliable handyman business serving the Elgin area. He plans to enroll in a vocational training program to earn a certification
    in HVAC or electrical work, which would expand his service offerings. Alongside building a client base, he hopes to obtain his GED, save enough for a small retirement fund, and eventually purchase a
    modest rental property that could provide passive income.
