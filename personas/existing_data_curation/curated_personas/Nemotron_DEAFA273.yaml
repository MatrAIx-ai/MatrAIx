    Work'', ''Southern Cooking'']'
  career_goals: David aims to become a senior partner at a regional CPA firm, where he can lead a multidisciplinary audit team and champion the integration of data‑driven technologies into traditional accounting
    practices. He aspires to mentor younger accountants, develop a boutique advisory service focused on small‑business growth in the Mississippi Delta, and contribute to community initiatives that promote
    financial literacy. Over the next five years, he also hopes to author a guide on blending artistic visualization with financial reporting to help organizations communicate complex data more effectively.
