    and R&B music"]'
  career_goals: Daryl dreams of becoming a civil engineer who designs safe bridges and homes, because he loves building things that follow clear plans and help his community. He also imagines working as
    a computer programmer, creating games and tools that let him solve problems in a quiet, focused environment. His long‑term ambition is to combine his love for structure, creativity, and helping others
    into a career that makes a tangible difference.
