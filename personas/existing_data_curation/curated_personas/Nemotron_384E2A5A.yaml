personas:
  professional: Tara Spooner, an aspiring visual storyteller in middle school, channels curiosity and love for fantasy into detailed sketches and short stories, balancing disciplined art club commitments
    with spontaneous mixed‑media experiments, and they often share their work with classmates during library sessions.
  sports: Tara Spooner, a midfielder for the Southside Middle School Tigers soccer team, enjoys the camaraderie of weekly matches, follows the tactics of Manchester City and the US Women's National Team,
    and spends evenings at the local community park practicing drills with friends.
  arts: Tara Spooner, a budding illustrator, spends free afternoons sketching Harry Potter characters while listening to classic rock legends like 'The Beatles', country storytelling from 'Dolly Parton',
    and indie pop tunes from 'Clairo', and they help design sets for community theater productions.
  travel: Tara Spooner, an eager weekend explorer, often hikes the nearby Cedar Creek Woods for birdwatching, dreams of visiting the Wizarding World at Universal Studios Orlando, and hopes to one day trek
    the Scottish Highlands to see the landscapes that inspired their favorite fantasy novels.
  culinary: Tara Spooner, a confident junior baker, loves kneading Southern biscuits with flaky butter and honey, experiments with adding fresh blueberries to the dough, and enjoys pairing the biscuits
    with homemade jam while occasionally sneaking a slice of chocolate cake.
  core: Tara Spooner is a curious, art‑obsessed 12‑year‑old who balances meticulous sketching and soccer teamwork with worry‑prone perfectionism, and they carry an ever‑present appetite for fantasy adventures.
background:
  cultural: Tara grew up in Manchester, a close‑knit town in Coffee County, Tennessee. Her family is part of a longstanding white Southern community where church attendance, family gatherings, and local
    traditions like potluck dinners, high school football games, and the annual county fair play central roles. The region's emphasis on hospitality, modesty, and community service has shaped her values
    of kindness and cooperation. Her parents work locally—her mother part‑time at a family‑owned diner and her father in a nearby farming operation—instilling a strong work ethic and appreciation for the
    land. Tara attends a public middle school that celebrates Southern folk music and crafts, offering her exposure to storytelling traditions, country music, and regional art forms. While she respects
    these cultural roots, she is eager to explore ideas beyond her hometown, blending the warmth of her community with the broader world of art, science, and digital media.
attributes:
  skills: '["drawing (pencil & watercolor)", "digital illustration (tablet)", "basic Scratch programming", "creative writing", "public speaking", "team collaboration", "recorder playing", "basic piano reading"]'
  hobbies: '["drawing", "watercolor painting", "reading fantasy novels", "creative writing", "school art club", "recorder playing", "soccer", "birdwatching", "baking Southern biscuits", "community theater
    set design"]'
  career_goals: Tara dreams of turning her love for art and storytelling into a career as a visual storyteller—perhaps a graphic novelist or an environmental illustrator who uses art to raise awareness
    about nature and community issues. She hopes to attend a specialized arts high school and later study illustration or animation in college. Tara also envisions giving back to her hometown by teaching
    art workshops for younger children, blending creativity with community building. She is curious about science and would love to merge it with art, so a future where she creates educational illustrations
    for scientific topics feels exciting to her.
