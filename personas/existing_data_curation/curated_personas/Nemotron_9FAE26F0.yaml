  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Reading philosophy, history, and art criticism'', ''Book club participation'', ''Woodworking and furniture making'',
    ''Architectural photography'', ''Golf (solo or small group)'', ''Gardening (native plants)'', ''Volunteering as historical society docent'', ''Attending small lectures on sustainable design'']'
  career_goals: He aims to leverage his deep industry knowledge into a consultancy role that focuses on sustainable construction and the adaptive reuse of historic structures in the Atlanta metro area.
    Over the next five years he intends to obtain a PMP certification, mentor emerging construction managers, and lead at least one flagship green‑building project that integrates public art installations.
    He also aspires to author a guidebook on blending humanities‑inspired design thinking with practical construction management, and to serve on the board of the local historic preservation society, thereby
    leaving a legacy that connects his love of art, community, and the built environment.
