personas:
  professional: Zakaria Davis is a veteran construction manager turned sustainability consultant, leveraging three decades of overseeing large commercial and residential projects with MS Project and Primavera
    to champion adaptive reuse of historic Atlanta structures, while mentoring junior managers and weaving artful design insights into every bid.
  sports: Zakaria Davis enjoys early‑morning 18‑hole rounds at the Savannah Country Club, follows the Atlanta Falcons and Atlanta Hawks, and limits golf to two games per week to balance quiet reflection
    with physical activity.
  arts: Zakaria Davis spends Saturdays at the High Museum of Art sketching the angular lines of Philip Johnson’s Glass House and dissecting contemporary installations by Kerry James Marshall, while their
    five‑member book club debates modern philosophy and art criticism, fueling a curiosity that informs their construction designs.
  travel: Zakaria Davis favors meticulously planned heritage tours with small groups to historic towns like Savannah, Charleston, and Williamsburg, while saving for a dream architectural pilgrimage to Barcelona’s
    Sagrada Familia and the Roman aqueducts of Segovia, balancing a modest retirement budget with a love of cultural immersion.
  culinary: Zakaria Davis cooks confident Southern fare, regularly preparing shrimp and grits with smoked paprika, collard greens seasoned with apple cider vinegar, and occasional handmade spinach‑ricotta
    ravioli, drawing fresh herbs like rosemary and thyme from their garden.
  core: Zakaria Davis blends a disciplined construction career with a quiet, art‑obsessed curiosity, a competitive edge in project bidding, and a habit of sketching historic facades while juggling a meticulous
    finance plan and occasional neglect of physiotherapy.
background:
  cultural: Born and raised in the Atlanta suburbs, Zakaria grew up in a middle‑class, white Southern family that valued hard work, modesty, and community ties. The cultural fabric of Smyrna and Cobb County—steeped
    in Southern hospitality, classic cuisine, and a strong sense of local identity—shaped his early worldview. His bachelor's degree in the humanities broadened his perspective, exposing him to diverse
    artistic movements and critical thinking traditions beyond the regional norm. While he maintains the Southern work ethic and a reserved demeanor typical of his generation, his lifelong curiosity has
    led him to embrace broader cultural experiences, from attending jazz performances to exploring global art exhibitions. His divorce has reinforced a self‑reliant outlook, yet he remains engaged in community
    initiatives, particularly those that celebrate the region’s architectural heritage.
