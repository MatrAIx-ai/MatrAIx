personas:
  professional: Robert Tolton, a 42‑year‑old automotive service technician with more than two decades of experience in gasoline, diesel, and hybrid powertrains, applies his methodical, organized mindset
    to meticulous engine overhauls, advanced OBD‑II diagnostics, and systematic mentorship, all while pursuing ASE Master Technician certification and planning a boutique garage that will blend classic
    car restoration with winter‑fleet maintenance.
  sports: Robert Tolton, a resident of the Upper‑Midwest, spends his free weekends ice‑fishing on Lake Superior and snowshoeing through the winter forests, follows the Detroit Lions and the Milwaukee Brewers
    with a loyalty passed down from family gatherings, and belongs to the Lake Superior Ice Anglers Association where he competes in seasonal catch‑and‑release contests.
  arts: Robert Tolton, whose evenings often feature folk‑blues vinyl from Johnny Cash and Bob Dylan while he browses the works of photographer Robert Frank and novelist William Manchester, finds inspiration
    for his woodworking and model‑car projects in the craftsmanship of the American Arts and Crafts movement.
  travel: Robert Tolton plans his trips with the same precision he uses in a shop work order, preferring low‑key road trips to destinations like Mackinac Island, the Apostle Islands, and Norway’s fjord
    region for their rugged water‑front landscapes, yet balances these adventures with family commitments that limit travel to two weeks per year.
  culinary: Robert Tolton, a competent home‑cook, enjoys grilling smoked walleye with fresh dill, brewing an IPA using Cascade hops and caramel malt, and savoring a bowl of hearty beef and barley stew,
    while his palate leans toward hearty Midwestern fare such as bratwurst, cheese curds, and homemade rye bread.
  core: Robert Tolton, a 42‑year‑old methodical mechanic, channels his love for precision into classic‑car restoration and home‑brewing, yet his chronic worry drives nightly spreadsheet updates and an occasional
    over‑caffeinated habit.
background:
  cultural: Robert was raised in Superior, Wisconsin, a city rooted in Upper‑Midwest traditions shaped by German, Scandinavian, and other European immigrant cultures. The local community values practicality,
    self‑reliance, and modesty, with strong ties to outdoor activities like fishing, hunting, and winter sports. Growing up in a Protestant (Lutheran) family, he internalized a work ethic centered on reliability,
    organization, and service to the community. The harsh Lake Superior winters and close‑knit neighborhood have reinforced his preference for structure, predictability, and small‑group interactions.
attributes:
  skills: '[''Engine diagnostics'', ''Transmission rebuilding'', ''Brake service'', ''Suspension repair'', ''Electrical system troubleshooting'', ''Hybrid vehicle maintenance'', ''Welding'', ''Hydraulic
