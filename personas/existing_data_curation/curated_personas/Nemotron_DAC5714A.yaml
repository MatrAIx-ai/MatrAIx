  hobbies: '[''Woodworking'', ''Fishing (including ice fishing)'', ''Classic car restoration'', ''Model car building'', ''Home brewing'', ''Reading technical manuals and historical nonfiction'', ''Hiking
    and snowshoeing'', ''Playing chess'', ''Small community gatherings'']'
  career_goals: Robert aims to achieve the ASE Master Technician certification within the next two years and move into a lead service manager role where he can streamline shop operations and mentor staff.
    In the long term, he plans to open a boutique garage focused on classic car restoration and hybrid vehicle maintenance, offering a predictable schedule and stable income to support his family. He also
    hopes to develop a specialized winter‑fleet maintenance program for local trucking companies, leveraging his knowledge of harsh Upper‑Midwest weather conditions.
