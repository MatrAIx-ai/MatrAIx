  hobbies: '[''visiting art galleries'', ''sketching'', ''photography'', ''reading historical biographies'', ''gardening'', ''cooking traditional Mexican dishes'', ''senior reading club'', ''volunteering
    as a cultural docent'']'
  career_goals: Although retired, Juan remains forward‑looking. He aims to complete a memoir that weaves his family's Mexican heritage with the story of his life in Arizona, preserving photographs and oral
    histories for future generations. He hopes to develop a small community workshop series where seniors learn basic home‑repair skills and share cultural crafts, fostering intergenerational exchange.
    Juan also plans to mentor his grandchildren, guiding them in both academic pursuits and appreciation for the arts. Additionally, he aspires to serve on the board of the local historical society, helping
    document the contributions of Mexican‑American residents to the region's development.
