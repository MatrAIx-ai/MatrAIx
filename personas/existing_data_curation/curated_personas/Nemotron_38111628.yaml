personas:
  professional: Juan Justiniano, a retired facilities coordinator who spent over two decades overseeing school renovations, blends meticulous budgeting and hands‑on carpentry, electrical, and plumbing expertise
    with a curious eye for design, making them the trusted organizer of community art displays and senior workshops.
  sports: Juan Justiniano keeps active by walking three miles daily with the Desert Seniors Walking Club, cheering on the Arizona Diamondbacks during spring baseball season, and playing catch in a weekly
    seniors’ softball league at the local park, and they never miss their Monday low‑impact Pilates session at the senior center.
  arts: Juan Justiniano, a frequent visitor to the regional museum of modern art, curates community exhibitions that spotlight the vibrant works of Georgia O'Keeffe and the striking portraits of Richard
    Avedon, while their evenings are filled with sketching street scenes and listening to the folk ballads of Joan Baez.
  travel: Juan Justiniano prefers meticulously planned road trips, having already driven the scenic Loop through Sedona’s red‑rock vistas and the historic Route 66 stretch to Amarillo, they now dream of
    exploring the adobe towns of Santa Fe and the coastal gardens of Carmel, all while balancing limited mobility and a family caretaking schedule.
  culinary: Juan Justiniano, an enthusiastic home cook, tends a thriving herb garden of cilantro, oregano, and smoked chilies, and delights in preparing herb‑infused chicken stew with roasted poblano peppers,
    fresh salsa verde, and homemade corn tortillas, though they occasionally over‑salt dishes in their quest for bold flavor.
  core: Juan Justiniano, the detail‑obsessed senior who sketches street faces between garden chores, balances a relentless curiosity with frequent worry about missed deadlines, and they can’t resist rereading
    the same historical biography night after night.
background:
  cultural: Juan was born to Mexican immigrant parents who settled in the Sonoran region of Arizona. He grew up bilingual, celebrating Día de los Muertos and Mexican holidays alongside American customs,
    which fostered a hybrid cultural identity. The strong family orientation, respect for elders, and community solidarity characteristic of Mexican culture have shaped his values of cooperation and responsibility.
    His Mexican culinary roots influence his love for cooking and gardening, where he cultivates chilies, corn, and herbs reminiscent of his grandparents' garden. Living in Arizona City, he has been part
    of a vibrant Mexican‑American community, participating in local festivals, supporting Mexican art initiatives, and preserving the Spanish language in everyday interactions.
