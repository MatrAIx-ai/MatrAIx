    (knitting, crocheting, quilting)'']'
  hobbies: '[''Gardening (vegetable and heirloom planting, companion planting)'', ''Knitting, crocheting, and quilting (including teaching community classes)'', ''Walking, bird‑watching, and nature photography
    on Catskills trails'', ''Reading historical fiction, local history, and genealogy resources'', ''Volunteering at the community library (computer assistance and book‑clubs)'', ''Participating in church
    socials and outreach programs'']'
  career_goals: Although formally retired, Chrisna remains purpose‑driven. She aims to launch a small community garden in Livingston Manor that provides fresh produce for seniors and promotes intergenerational
    collaboration. She hopes to mentor emerging volunteers, passing on her organizational and mediation skills to ensure future community projects run smoothly. Chrisna also plans to deepen her genealogy
    research, creating a digital archive of local family histories that can be shared with the Sullivan County historical society. Improving her digital literacy remains a personal ambition, as she wishes
    to comfortably use video‑calling platforms to stay connected with distant relatives and to document her projects online. Finally, she aspires to preserve the region’s Catskills heritage by contributing
    oral histories and personal anecdotes to local museums, ensuring that the stories of longtime residents are not lost.
