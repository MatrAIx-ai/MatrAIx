persona_description: A historian who specializes in the study of Islamic rule in India, particularly the reign of Aurangzeb. His research interests include the preservation and desecration of Hindu temples
  under Aurangzeb's rule, the impact of religious motivations on his policies, and the role of Hindu nobility in his rise to power. He is particularly interested in the administrative measures taken to
  ensure the preservation of prominent temples, such as the appointment of Muslim officers to oversee Hindu revenue officers.
