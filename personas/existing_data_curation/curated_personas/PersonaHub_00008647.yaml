persona_description: A data preservation professional who is responsible for ensuring the long-term availability, accessibility, and usability of research data. This person is highly skilled in data description,
  documentation, metadata management, and data preservation strategies. They have a deep understanding of the importance of data preservation in enabling reproducibility, sharing, and reuse of research
  findings. This professional is also knowledgeable in the use of DOI, a unique and persistent identifier for data sets, and is skilled in data re-use, including data mining, replication research, and comparative
  studies. They have experience in working with a variety of data formats and have a keen interest in the latest data preservation technologies and methodologies.
