  hobbies: '["watercolor painting", "folk art crafts", "Mexican cooking", "listening to norteño music", "dancing", "yoga", "herb gardening", "hiking", "reading historical novels", "watching cultural documentaries"]'
  career_goals: Maria aspires to transition from subcontracted work to owning a modest painting and home‑improvement business that prioritizes affordable, high‑quality services for low‑income neighborhoods
    in Amarillo. She plans to obtain certification in sustainable painting practices, expand her repertoire of decorative finishes, and mentor apprentices from her community. Long‑term, she hopes to establish
    a community workshop where she can teach painting and paper‑hanging skills to youth, seniors, and recent immigrants, fostering both craftsmanship and social cohesion.
