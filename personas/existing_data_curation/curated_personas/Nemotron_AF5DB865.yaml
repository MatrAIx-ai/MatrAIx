personas:
  professional: Maria Leonce, a skilled painter and paperhanger with an associate’s degree in applied arts, blends meticulous surface preparation and custom color mixing with a curiosity for low‑VOC finishes,
    delivering affordable, high‑quality home‑improvement services while juggling occasional disorganization and a deep desire to mentor community apprentices, and they approach each project with practical
    precision tempered by creative experimentation.
  sports: Maria Leonce, an enthusiastic hiker of Palo Duro Canyon and occasional participant in the local yoga studio’s sunrise classes, cheers on the Dallas Cowboys and the Amarillo Sod Squad while joyfully
    joining community pick‑up soccer games, yet their flexible schedule often leads them to postpone a formal gym routine in favor of spontaneous outdoor walks.
  arts: Maria Leonce, a devoted watercolor miniaturist who channels intense emotions into Día de los Muertos‑inspired folk‑art pieces, frequently listens to norteño legends like Los Tigres del Norte and
    corridos by Ramón Ayala while sketching, draws inspiration from Frida Kahlo’s bold palettes, and they often host informal art swaps with friends, though their studio can become cluttered as a side effect
    of their relaxed planning.
  travel: Maria Leonce, an adventurous traveler who prefers budget‑friendly road trips and spontaneous weekend getaways, has explored the colorful streets of Oaxaca City and the colonial charm of San Miguel
    de Allende, dreams of trekking the rice terraces of Chiang Mai, and balances travel planning with their flexible mindset, often booking last‑minute flights but occasionally forgetting to pack their
    sketchbook.
  culinary: Maria Leonce, a passionate home cook who expertly prepares tamales, rich mole with ancho chilies, and hearty pozole with fresh hominy, garnishes each dish with cilantro, epazote, and a squeeze
    of lime, enjoys sharing meals with family and friends around a communal table, and they often experiment with new spice blends while occasionally leaving the kitchen a mess after a late‑night cooking
    session.
  core: Maria Leonce, a creatively driven yet sometimes disorganized painter‑entrepreneur, balances fierce compassion with intense anxiety, finding solace in watercolor miniatures, yoga, and community mentorship,
    while occasionally forgetting appointments and leaving paint splatters on the couch.
background:
  cultural: Maria is a first‑generation Mexican‑American who grew up in a bilingual household where Spanish and English were spoken interchangeably. Mexican cultural values such as familia, respeto, and
    comunidad underpin her compassionate nature and cooperative spirit. She celebrates Día de los Muertos, Navidad, and Mexican Independence Day with elaborate family gatherings, traditional foods, and
    vibrant decorations. Her upbringing in a close‑knit Mexican community in Texas has fostered a love for shared meals, regional music, and folk arts, which she often incorporates into her decorative painting
    projects through bold colors and cultural motifs.
attributes:
  skills: '["interior painting", "exterior painting", "paper hanging", "surface preparation", "color mixing", "decorative faux finishes", "low‑VOC finishing techniques", "project estimation", "client communication",
