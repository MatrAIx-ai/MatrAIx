personas:
  professional: Daniel Masker, a 15‑year‑old aspiring maker, blends his love for strategy games and hands‑on tinkering by designing Arduino‑controlled model kits, dreaming of one day engineering sustainable
    automotive parts while balancing schoolwork with a relaxed, sometimes disorganized schedule.
  sports: Daniel Masker enjoys weekend hikes in Mohican State Park, casts a line at Black Fork Creek, and plays on the Alliance Spartans youth soccer team, cheering for the Cleveland Browns and the Cleveland
    Cavaliers, but often skips a scheduled gym session when a new Arduino project beckons.
  arts: Daniel Masker unwinds by strumming acoustic folk songs inspired by Bob Dylan and The Avett Brothers on his guitar, sketching sci‑fi landscapes reminiscent of Christopher Nolan’s visuals, and diving
    into novels like The Expanse, while they curiously collect vintage vinyl records of Neil Young.
  travel: Daniel Masker prefers spontaneous road trips to nearby attractions such as Hocking Hills and the Amish countryside, dreams of tech‑centric tours of Seattle’s Pike Place Market and Tokyo’s Akihabara,
    but his travel plans stay modest due to limited funds and reliance on the family’s minivan.
  culinary: Daniel Masker favors hearty Midwestern fare, often grilling corn‑crusted salmon, whipping up homemade mac and cheese with sharp cheddar, and baking apple‑cinnamon crumble, while they enjoy experimenting
    with DIY jerky using locally sourced beef and a simple spice blend of salt, pepper, and smoked paprika.
  core: Daniel Masker is a curious, hands‑on teen who balances a love for DIY tech and quiet outdoor escapades with a habit of leaving school projects until the last minute, preferring small‑group jam sessions
    over crowded parties.
background:
  cultural: Daniel grew up in Alliance, Ohio, a modest Midwestern community shaped by an industrial past and rural traditions. His family reflects typical small‑town values of hard work, self‑reliance,
    and strong community ties. Local influences include the region's manufacturing heritage, proximity to Amish neighborhoods that emphasize craftsmanship, and a school culture that balances academics with
    practical skills. Raised in a Protestant household that values modesty and neighborly assistance, Daniel’s upbringing has fostered an appreciation for DIY projects, outdoor recreation, and the quiet
    rhythm of Midwestern life.
attributes:
  skills: '[''Basic computer troubleshooting'', ''Micro‑controller programming (Arduino)'', ''DIY mechanical repairs (bicycles, lawn mower)'', ''Model kit assembly'', ''Sketching and visual design'', ''Collaborative
