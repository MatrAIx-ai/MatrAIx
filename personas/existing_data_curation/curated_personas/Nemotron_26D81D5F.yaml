  hobbies: '[''Strategy video gaming'', ''Model kit building (cars, aircraft)'', ''Arduino and electronics tinkering'', ''Reading science‑fiction and fantasy'', ''Sketching and drawing'', ''Acoustic guitar
    playing'', ''Hiking and nature walks'', ''Fishing'', ''Small‑group board games'', ''Volunteering at community center (homework help)'']'
  career_goals: Daniel plans to complete high school with solid grades and then enroll in a community college program focused on automotive technology or computer science. He aims to become a skilled automotive
    technician who can service modern vehicle electronics, or a software developer specializing in embedded systems. He values a career that allows hands‑on problem solving while offering flexibility for
    personal projects. Long‑term, he hopes to open a small workshop where he can combine vehicle repair with custom electronics design for local clients.
