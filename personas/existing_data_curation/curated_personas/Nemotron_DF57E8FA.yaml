  hobbies: '[''Reading nonfiction'', ''Listening to podcasts (automotive tech, African-American history)'', ''Gardening'', ''Cooking Southern soul‑food'', ''Playing basketball (small group)'', ''Chess'',
    ''Volunteering at food pantry'', ''Attending church gatherings'']'
  career_goals: Dajuan aims to move from a driver‑sales role into a logistics coordinator position within the next three years, overseeing routing, scheduling, and fleet performance for a regional distributor.
    He plans to earn the Certified Transportation Professional (CTP) credential and complete a bachelor’s degree in Supply Chain Management, positioning himself for a future promotion to fleet manager.
    Long‑term, he aspires to launch his own small‑scale logistics service focused on supporting Greensboro’s local, especially Black‑owned, businesses, while achieving greater financial stability and a
    healthier work‑life balance.
