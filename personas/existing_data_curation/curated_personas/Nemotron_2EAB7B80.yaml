  hobbies: '[''drawing and sketching'', ''watercolor painting'', ''digital illustration (Procreate)'', ''reading fantasy and sci-fi novels'', ''visiting museums and art exhibitions'', ''nature journaling
    and hiking'', ''chess'', ''building LEGO sets'', ''photography with smartphone'', ''listening to music'', ''watching animated movies'', ''writing short stories/comic strips'']'
  career_goals: Kristyn aspires to deepen her artistic practice and eventually work as a professional illustrator or concept artist, blending storytelling with visual design. In the short term she aims
    to win a regional art contest, earn a spot in her high school’s advanced art program, and develop a portfolio of digital and traditional works. She also hopes to attend a summer art camp that focuses
    on animation and game design. Long‑term she envisions studying visual arts or graphic design at a college, creating artwork that raises awareness about environmental issues, and perhaps publishing her
    own illustrated children’s books. She also considers a role in community arts education, mentoring younger students.
