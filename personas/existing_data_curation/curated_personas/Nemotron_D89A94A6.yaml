personas:
  professional: Sarojini Reza is a data‑driven investigative journalist who leverages GIS mapping, FOIA expertise, and multilingual interviewing to produce high‑impact stories, and their competitive yet
    collaborative spirit drives them to chase Pulitzer‑level projects while their relaxed approach to deadlines sometimes leads to last‑minute scrambles.
  sports: Sarojini Reza enjoys weekend kayaking with the Bayou Paddle Club, follows the New Orleans Saints and Pelicans with seasonal fervor, and they balance their fitness routine with occasional pickup
    basketball at the local community center, preferring flexible, outdoor activities over rigid gym schedules.
  arts: Sarojini Reza immerses themselves in literary fiction by authors like Margaret Atwood and investigative works by Ta‑Nehisi Coates, attends live jazz performances featuring Trombone Shorty, and curates
    photographic essays of wetlands inspired by Ansel Adams, and they channel these influences into a distinctive creative outlook.
  travel: Sarojini Reza travels to India each spring to visit extended family and celebrate Diwali, frequently explores the Gulf Coast’s bayous and New Orleans’s Mardi Gras festivities, and they dream of
    a future trip to Patagonia for kayak expeditions, favoring spontaneous itineraries over detailed planning.
  culinary: Sarojini Reza is an adventurous home chef who blends cumin‑laden curry spices with Cajun roux to craft dishes like shrimp étouffée with tikka masala flair, and they tend a small herb garden
    of cilantro and thyme while delighting friends with dinner parties that showcase experimental gumbo‑style biryani.
  core: Sarojini Reza is a competitive, curiosity‑driven journalist who balances flexible, last‑minute planning with a love for fusion cooking, kayaking, and vibrant cultural celebrations, and they thrive
    on turning curiosity into stories.
background:
  cultural: Sarojini belongs to a South Asian family of Indian origin that settled in the United States several decades ago. Raised in a bilingual household speaking English and Hindi, she embraces both
    her Indian heritage—celebrating festivals like Diwali, Holi, and participating in cultural dance—and the rich Cajun and Creole traditions of Houma, Louisiana. This blend influences her worldview and
    reporting style, allowing her to navigate and bridge diverse cultural narratives. She is active in the local South Asian community, contributing to cultural events and serving as a liaison between diaspora
    groups and the broader community.
attributes:
  skills: '[''Investigative Reporting'', ''Data Journalism'', ''Multimedia Storytelling'', ''AP Style Editing'', ''Source Verification'', ''FOIA Request Handling'', ''GIS Mapping'', ''Social Media Management'',
    ''Crisis Reporting'', ''Bilingual Communication (English & Hindi)'']'
  hobbies: '[''Fusion Cooking'', ''Reading (Literary Fiction & Investigative Non-Fiction)'', ''Photography'', ''Kayaking in Bayou'', ''Travel to India'', ''Attending Mardi Gras & Diwali'', ''Gardening'',
    ''Yoga'', ''Maintaining a Personal Blog'']'
  career_goals: Sarojini aims to become a senior investigative reporter and eventually an editorial leader at a regional or national news outlet. She is determined to produce a flagship series on climate
    change and oil‑industry impacts on the Gulf Coast, hoping to earn recognition such as a Pulitzer nomination. In the longer term, she plans to launch a community‑focused digital newsroom that gives voice
    to under‑reported groups, including the South Asian diaspora in Louisiana. She also seeks to mentor emerging journalists, develop advanced data‑visualization skills, and possibly pursue a master’s degree
    in journalism to deepen her expertise while maintaining her flexible, curiosity‑driven approach to work.
