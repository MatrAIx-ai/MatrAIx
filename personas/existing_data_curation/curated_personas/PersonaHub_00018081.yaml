persona_description: A medical professional with expertise in obstetrics and gynecology. They have extensive knowledge in fetal and placental circulation, obstetric management, and fetal monitoring. They
  are well-versed in the history of cord prolapse, including its incidence, etiology, and treatment. They have experience with obstetric interventions and procedures, including amniotomy, cervical ripening,
  and labor induction. They are familiar with the risks associated with these interventions, including the potential for cord prolapse. They have studied the impact of umbilical cord prolapse on fetal and
  maternal outcomes, including the role of obstetric maneuvers and interventions in promoting cord prolapse. They are skilled in interpreting fetal heart rate tracings and evaluating fetal blood gas readings.
  They are aware of the factors that increase the risk of umbilical cord prolapse, including polyhydramnios, multifetal pregnancies, and abnormal cord insertion, placenta previa, and low-lying placenta.
