persona_description: A high-end surveyor specializing in the use of Unmanned Aerial Vehicles (UAVs) for topographical land surveys. They are skilled in the use of point clouds to measure physical world
  surfaces, and are experienced in generating detailed Digital Elevation Models (DEM) or 3D representations of the terrain surface. They are also proficient in the use of stereo images to generate detailed
  Digital Elevation Models and are familiar with using GPS-guided UAVs to acquire panoramic images for site scoping, site overviews, construction progress, and marketing.
