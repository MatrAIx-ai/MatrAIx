  career_goals: Jaquan aims to advance from shift supervisor to restaurant manager within the next three years, seeking a role where he can shape staff culture, streamline operations, and introduce a rotating
    “artist’s special” menu that blends his culinary and visual interests. He plans to enroll in a bachelor’s program in Hospitality Management or Culinary Arts to deepen his business acumen and technical
    skills. Ultimately, his long‑term ambition is to open a community‑focused café‑gallery in Prince George’s County that serves locally sourced soul food alongside rotating art exhibitions, providing a
    creative hub for local youth and aspiring chefs. He also hopes to mentor young people from his neighborhood, offering workshops that combine cooking fundamentals with basic design and entrepreneurship.
