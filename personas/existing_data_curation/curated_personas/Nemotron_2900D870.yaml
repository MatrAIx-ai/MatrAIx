personas:
  professional: Jaquan Britton, a 49‑year‑old shift supervisor in a high‑volume fast‑food operation, blends meticulous staff scheduling and POS mastery with a vivid imagination, crafting eye‑catching digital
    posters and rotating “artist’s special” menu concepts that marry soul‑food flavors with contemporary visual art, all while mentoring teammates with calm authority.
  sports: Jaquan Britton follows the Washington Wizards and Baltimore Ravens, participates in a local Sunday pick‑up basketball league at the community center, and schedules early morning jogs along the
    Anacostia River trail, viewing sports as both social glue and personal stress relief.
  arts: Jaquan Britton draws inspiration from Kendrick Lamar’s lyricism, Miles Davis’s improvisational jazz, and the vibrant murals of D.C.’s U Street Corridor, devoting evenings to sketching urban skylines
    and designing flyers for neighborhood art festivals, while their favorite authors—N K Jemisin and Octavia Butler—fuel their speculative storytelling.
  travel: Jaquan Britton’s travel list includes savoring Creole cuisine in New Orleans, exploring the historic streets of Savannah for its storytelling heritage, and planning a future trip to Tokyo to study
    sushi artistry and contemporary gallery spaces, though budget constraints often limit trips to weekend road‑escapes within Maryland.
  culinary: Jaquan Britton’s kitchen experiments blend collard greens with Korean gochujang, craft spicy jambalaya tacos using shrimp, okra, and smoked paprika, and perfect a soul‑food‑inspired peach cobbler,
    reflecting a skill level that ranges from confident grill master to occasional over‑salting when experimenting with new spice blends.
  core: Jaquan Britton fuses disciplined leadership, a relentless creative curiosity, and community‑rooted generosity into a life where every shift, sketch, and spice blend serves a larger story of cultural
    celebration and personal growth.
background:
  cultural: Jaquan is an African‑American who grew up in Capitol Heights and the broader Prince George’s County area, a region steeped in the rich traditions of Black culture in the Washington, D.C. metro.
    His family gatherings, centered around soul‑food meals and storytelling, instilled a deep appreciation for culinary heritage and oral history. He was raised attending a historically Black church, where
    gospel music and community service shaped his values of generosity and collective uplift. The vibrant local scene—Juneteenth celebrations, HBCU homecoming events, and DC’s thriving art and music districts—continues
    to influence his aesthetic sensibilities and his desire to create spaces where culture, food, and art intersect. While he embraces this heritage, Jaquan also navigates the multicultural fabric of Capitol
    Heights, drawing from diverse influences to inform his personal and professional identity.
