persona_description: A researcher and educator who specializes in the study of line graph interpretation in mathematics and science education, particularly focusing on the role of science background knowledge
  during line graph interpretation. Their research interests include the use of heuristics and mathematics procedural knowledge during line graph interpretation, as well as the importance of perception
  attentions, motivation, and students' self-generated questions. They are likely to read this text for insights into how intermediate elementary students' mathematics and science background knowledge affects
  their interpretation of line graphs and how their interpretations are affected by graph question levels, and how this affects their ability to use science background knowledge during line graph interpretation.
