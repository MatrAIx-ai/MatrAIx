persona_description: A professional responsible for managing stormwater runoff and ensuring the quality of water in Stafford County, Indiana. This individual is responsible for implementing stormwater management
  practices, including pervious surfaces, to mitigate the impacts of development on the aquatic environment. The persona is likely to be involved in the NPDES Stormwater Program, which regulates stormwater
  discharges from three potential sources, and is responsible for developing Storm Water Quality Management Plans (SWQMPs) through a phased submittal process. The persona is also likely to be familiar with
  the Town of Cedar Lake SWQMP submittals, which includes the methods for managing the quantity and quality of stormwater entering the Town of Cedar Lake stormwater drainage system. The persona is specialized
  in stormwater management and is responsible for ensuring that the Town of Cedar Lake meets the criteria of a small MS4 entity and has established an Ordinance establishing methods for managing stormwater
  runoff.
