persona_description: Paulo Saldiva, a researcher and medical doctor from the University of São Paulo in Brazil, who is developing a new method for determining the cause of death through minimally invasive
  autopsies using computerized tomography scanning and needle biopsies. This method aims to increase the accuracy of cause of death determinations in low-resource settings, where full autopsies may not
  be feasible or desirable.
