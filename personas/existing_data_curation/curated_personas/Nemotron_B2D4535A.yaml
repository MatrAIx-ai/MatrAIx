personas:
  professional: Salena Aiello is a registered nurse in acute care who combines meticulous patient assessment, rapid response coordination, and evidence‑based teaching with an energetic, collaborative style
    that leverages curiosity and practicality, and they mentor nursing students while championing workflow improvements.
  sports: Salena Aiello fuels their love of movement by running with the Hartford Runners Club on the Farmington River Trail, hitting spin classes at Life Time, dancing through Zumba, and cheering on the
    New England Patriots, Boston Celtics, and the local Hartford Yard Goats during football, basketball, and baseball seasons.
  arts: Salena Aiello finds artistic renewal singing with a community choir that rehearses classics by Andrea Bocelli and modern hits from Taylor Swift, devouring novels by Celeste Ng and Sally Rooney,
    attending Hartford Stage productions of Hamilton, and collecting vinyl records of Bon Iver and classic opera arias, letting music and literature shape their evenings.
  travel: Salena Aiello plans weekend getaways that blend coastal relaxation in Newport, Rhode Island with mountain hikes in Stowe, Vermont and the Berkshires, and dreams of longer trips to Barcelona’s
    tapas bars and Sicily’s sun‑kissed villages, preferring a mix of spontaneous road‑trip planning and meticulous itinerary apps like TripIt.
  culinary: Salena Aiello is an advanced home cook who reimagines classic Mediterranean dishes—such as lemon‑infused risotto with pistachio pesto, pumpkin gnocchi tossed in sage butter, and a deconstructed
    tiramisu layered with mascarpone, espresso‑soaked ladyfingers, and cocoa dust—using ingredients like San Marzano tomatoes, fresh basil, and aged Parmigiano‑Reggiano, while also savoring farm‑to‑table
    dinner outings.
  core: Salena Aiello blends a drive for clinical excellence with a habit of late‑night medical journal scrolling, spontaneous pasta‑making marathons, and a relentless calendar that never quite leaves room
    for idle rest.
background:
  cultural: Salena comes from a second‑generation Italian‑American family that settled in New England. Growing up in West Hartford, she was raised with a blend of traditional Italian customs—such as Sunday
    family meals and a strong emphasis on hospitality—and the broader New England values of independence and community involvement. Her family’s Catholic roots shaped her early experiences, though she now
    identifies as culturally eclectic, embracing both her Italian heritage and the diverse, multicultural environment of the Hartford region. This background informs her love for cooking, community service,
    and her warm, outgoing demeanor.
