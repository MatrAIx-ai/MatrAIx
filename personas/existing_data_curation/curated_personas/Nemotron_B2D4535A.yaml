  career_goals: Salena is working toward completing her Bachelor of Science in Nursing (BSN) within the next two years, with a long‑term goal of earning a Master of Science in Nursing to become a Family
    Nurse Practitioner. She aspires to transition into a leadership role as a charge nurse or clinical educator, where she can mentor new staff and drive evidence‑based practice initiatives. Salena is also
    interested in healthcare informatics, aiming to combine her clinical expertise with data analytics to improve workflow efficiency and patient safety. Ultimately, she hopes to lead community health outreach
    programs in West Hartford, focusing on chronic disease prevention and health literacy, while maintaining a sustainable work‑life balance.
