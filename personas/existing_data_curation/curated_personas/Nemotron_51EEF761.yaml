personas:
  professional: Alva Partin is a diligent student council member who leverages their organized, methodical nature and energetic sociability to coordinate school events, ensuring every detail is accounted
    for and everyone feels included.
  sports: Alva Partin stars as a midfielder on the Willow Creek Youth Soccer Club, follows the LA Galaxy passionately, and also dabbles in weekend basketball with the school’s junior varsity team, preferring
    early‑morning drills to maintain energy for after‑school dance rehearsals.
  arts: Alva Partin crafts vibrant digital illustrations inspired by the street art of Banksy and the bold colors of Yayoi Kusama, while their hip‑hop dance routines are set to the beats of Kendrick Lamar
    and the smooth melodies of H.E.R., and they unwind reading contemporary mystery novels by New York Times bestselling author Lisa Jewell.
  travel: Alva Partin dreams of exploring the historic streets of Kyoto after a recent family road trip to the Grand Canyon, and they prefer meticulously planning itineraries on Google Maps, balancing a
    desire for adventure with the practical need for parental approval and a limited budget.
  culinary: Alva Partin enjoys whipping up crispy garlic parmesan pizza slices for school bake sales, relishes homemade avocado toast topped with chili flakes for breakfast, and experiments with honey‑glazed
    carrot cupcakes, though they often forget to clean the kitchen afterward.
  core: Alva Partin is an organized, energetic go‑getter whose love for group projects is matched only by their habit of double‑checking every checklist and occasionally staying up late scrolling through
    mystery novels.
background:
  cultural: Alva comes from a white, middle‑class family that has lived in the Cary area for several generations. Her upbringing reflects typical suburban North Carolina culture, including participation
    in community events like the Cary Arts Festival, Easter egg hunts, and Fourth of July fireworks. Family traditions emphasize Thanksgiving gatherings, holiday baking, and a love of Southern comfort foods
    such as fried chicken and collard greens. Growing up in a diverse and educated community, Alva is exposed to a mix of American Southern values and the broader multicultural influences of the Research
    Triangle region, shaping her inclusive and cooperative outlook.
