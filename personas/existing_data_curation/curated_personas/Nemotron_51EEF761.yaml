  career_goals: Alva aspires to a career that blends her love for structure with her desire to help others. She dreams of becoming an event planner or community program coordinator, where she can design
    well‑organized activities that bring people together. She is also intrigued by the possibility of a future in education, such as a teacher or school counselor, where her reliability and kindness can
    support student growth. Over the next few years she hopes to develop leadership experience through student council and volunteer projects, laying the foundation for a college degree in business administration
    or education.
