  career_goals: He aims to become a leading innovator in business education by developing interdisciplinary programs that merge entrepreneurship with the arts, securing a tenure‑track position with a focus
    on experiential learning, establishing a campus‑wide incubator for student ventures, and publishing research on flexible, student‑driven curricula. Long‑term, he envisions a role as department chair
    or dean, championing community partnerships and expanding access to creative business training.
