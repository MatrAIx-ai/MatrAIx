personas:
  professional: Surekha, at three, takes on the role of a mini-preschool teacher, meticulously organizing storybook sessions and snack-time routines for playmates, reflecting a love of structure, practical
    focus, and a budding assertiveness when guiding peers, and they delight in the quiet moment after the story.
  sports: Surekha enjoys weekly toddler-sized soccer games with the local Little Leaguers club, watches the San Jose Earthquakes on TV, and delights in splash-time at the community pool, balancing active
    play with a love for team spirit, and they often chant a tiny cheer after scoring a goal.
  arts: Surekha loves to color pictures of Disney princesses, dance to upbeat Bhangra beats at family gatherings, and sing along to A.R. Rahman's movie songs as well as Sesame Street melodies, weaving together
    global pop culture and traditional rhythms, and they proudly display their crayon-filled masterpiece on the fridge.
  travel: Surekha thrills at family trips to Disneyland and the nearby Redwood forests, dreams of seeing the Golden Gate Bridge, and proudly points out the Eiffel Tower souvenir in the living room, favoring
    a mix of whimsical nearby outings and imagined far-away adventures, and they often request a map to trace the next destination.
  culinary: Surekha’s favorite dishes include bite-size samosas with tamarind chutney, butter naan, mango lassi, and classic chicken nuggets with ketchup, while they proudly stir scrambled eggs under supervision,
    showing a budding curiosity in the kitchen but a selective palate for veggies.
  core: Surekha is a three-year-old who balances a love of order and imaginative play, hoards shiny coins, resists medicine without stickers, and delights in dancing, coloring, and cartoon adventures, all
    while navigating toddler-sized challenges with a hint of stubborn charm, and they often giggle at the sound of a rattling coin jar.
background:
  cultural: Surekha comes from a South Asian (Indian) family that maintains strong cultural ties while living in San Jose, California. At home she hears both English and Hindi/Punjabi, celebrates festivals
    such as Diwali, Holi, and Navratri, and enjoys traditional foods like samosas and biryani. Her parents emphasize respect for elders, the value of education, and community involvement through local South
    Asian cultural groups. The multicultural setting of Silicon Valley adds exposure to diverse traditions, fostering a blended identity that balances Indian heritage with American childhood experiences.
