  career_goals: Although only three, Surekha frequently shares imaginative aspirations that reflect her love of orderly, helping‑oriented roles. She says she wants to become a teacher because she likes
    storytime and helping friends learn, and she imagines a future as a veterinarian to care for animals she loves. She also dreams of being a librarian, drawn by the calm, organized environment of books.
    These ambitions are shaped by her desire for structured, purposeful work that benefits others.
