  career_goals: Even in retirement, Joshua aims to stay active, healthy, and mentally engaged while giving back to his community. He plans to preserve the oral histories of Hot Springs and his family's
    heritage, volunteering at the local historical museum to curate exhibits and share stories. He intends to mentor younger neighbors in DIY projects, passing on his practical skills. Maintaining his home,
    garden, and woodworking workshop in top condition is a personal priority. He also hopes to continue learning about the region's flora and fauna, travel occasionally to visit his children and grandchildren
    across the Midwest, and sustain a supportive partnership with his wife.
