personas:
  professional: Brian Singleton, a retired carpenter and small‑engine specialist, channels their organized, curious nature into leading free DIY workshops, mentoring teens, and coordinating community events,
    while their talkative, competitive streak makes them a natural leader on the town council advisory board.
  sports: Brian Singleton enjoys following the Dallas Cowboys and Texas Rangers, participates in the senior center’s weekly shuffle‑board league, and spends weekends fishing the Angelina River, balancing
    low‑impact physical activity with a competitive edge at bridge tournaments.
  arts: Brian Singleton’s love for community‑theater productions, where they occasionally take the lead role in classics like "Our Town," is complemented by a passion for the music of Willie Nelson, the
    paintings of Andrew Wyeth, and an avid collection of vintage playbills, shaping their creative identity and social circles.
  travel: Brian Singleton prefers road‑tripping through Texas Hill Country, with stops in Fredericksburg and the San Antonio River Walk, and dreams of a historic tour of Savannah, Georgia, planning each
    journey months ahead while balancing a modest budget and family obligations.
  culinary: Brian Singleton’s kitchen is a blend of seasoned woodworking precision and sweet indulgence, as they expertly bake pecan pie and apple crumble using garden‑fresh herbs like rosemary, and grill
    river‑caught catfish with a cornmeal crust, showcasing a moderate cooking skill level that delights neighbors at church potlucks.
  core: Brian Singleton is a methodical, talkative retiree who merges a love of hands‑on projects with a competitive edge at bridge, often juggling community leadership with a penchant for splurging on
    vintage car parts and postponing dentist appointments.
background:
  cultural: Brian was raised in East Texas within a working‑class white family, attending public schools in Lufkin and taking courses at Angelina College. The region’s Southern hospitality, self‑reliance,
    and strong community ties have deeply shaped his values. He identifies with traditional Texan culture—love of the outdoors, church involvement, and a close‑knit small‑town identity—while also appreciating
    the broader American cultural diversity that he encounters through his social circles and community activities.
