  hobbies: '[''Oil Painting'', ''Visiting Art Galleries'', ''Reading Science Fiction & Philosophy'', ''Experimenting with Coffee Brewing'', ''Creative Cooking'', ''Hiking'', ''Community Theater Acting'',
    ''Photography'', ''Gardening'']'
  career_goals: In the next five years Alice aims to transition from host to floor manager at a boutique restaurant or café, eventually overseeing a venue that doubles as a community art space. She plans
    to pursue a hospitality management certification to complement her on-the-job experience, and she hopes to curate monthly art and music events that reflect the Hudson Valley’s creative spirit. Long‑term,
    Alice envisions opening her own coffee‑house gallery where she can combine her love of hospitality, visual arts, and local craft food, while mentoring aspiring hospitality professionals.
