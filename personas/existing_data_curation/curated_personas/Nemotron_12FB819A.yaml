  hobbies: '["Reading scientific and historical books", "Solving crossword puzzles and Sudoku", "Organic gardening of native plants", "Preparing traditional Puerto Rican dishes", "Knitting and crocheting",
    "Genealogical research", "Listening to plena and bomba music", "Birdwatching in local habitats", "Digital archiving of family photographs", "Walking in quiet nature trails"]'
  career_goals: Although retired, Raquel remains driven to leave a lasting legacy. She aims to compile a comprehensive oral history of Las Piedras, preserving stories of the island’s agricultural past and
    post‑Operation Bootstrap transformation. She aspires to mentor a handful of young women in her community who show interest in STEM, offering them structured tutoring and guidance on scientific inquiry.
    Additionally, she plans to publish a memoir that intertwines her personal journey with pivotal Puerto Rican historical events, and to master modern digital archiving tools so she can safeguard family
    photographs and documents for future generations.
