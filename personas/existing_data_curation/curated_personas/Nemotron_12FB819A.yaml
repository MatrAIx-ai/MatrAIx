personas:
  professional: Raquel Perez, a retired STEM professional with a sharp analytical mind, leverages her legacy in mathematical analysis, technical writing, and legacy coding to meticulously document oral
    histories of her hometown while mentoring young women in scientific inquiry.
  sports: Raquel Perez enjoys low‑impact activities such as daily nature walks on the local trail, follows the regional baseball club Cangrejeros de Santurce with faithful attendance at home games, and
    participates in a senior‑friendly walking club that meets each Saturday, prioritizing gentle cardio over competitive sports.
  arts: Raquel Perez finds solace in listening to plena and bomba rhythms, studies the paintings of Frida Kahlo and the poetry of Pablo Neruda, and occasionally attends community theater productions featuring
    classic island plays, letting the arts shape her reflective evenings.
  travel: Raquel Perez prefers meticulously planned short trips to historic sites such as Old San Juan, nearby nature reserves, and cultural festivals in neighboring Caribbean islands, balancing her love
    of heritage with the practical limits of her mobility and budget.
  culinary: Raquel Perez delights in preparing traditional island dishes like arroz con gandules, pasteles, and mofongo, expertly blending plantains, sofrito, and pigeon peas, while experimenting with subtle
    herb variations from her garden and proudly serving family recipes to close friends.
  core: Raquel Perez is a methodical centenarian whose relentless curiosity, solitary discipline, and competitive streak fuel a lifelong quest to preserve history, mentor youth, and perfect her garden and
    kitchen.
background:
  cultural: Raquel was born in 1927 in Las Piedras, a town rooted in agricultural traditions. Raised in a modest jíbaro family, she grew up speaking Spanish at home while receiving bilingual schooling that
    introduced her to English. Her youth spanned the era of Operation Bootstrap, witnessing the island’s shift from sugarcane farms to manufacturing, which sparked her curiosity in science and engineering.
    A devout Catholic, she participates in local fiestas, patron saint celebrations, and respects the communal solidarity of Puerto Rican culture. She lived through World War II, the civil rights movements
    of the 1960s, the political changes of the 1970s, and the devastation of Hurricane Maria in 2017, experiences that reinforced her resilience. Throughout, she blended traditional values—family devotion,
    reverence for nature, and cultural music—with a pragmatic, methodical approach to learning and problem‑solving.
