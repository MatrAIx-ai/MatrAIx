personas:
  professional: Edgardo Munoz is a seasoned retail professional with over two decades of expertise in customer service, sales strategy, visual merchandising, and bilingual communication, channeling their
    curious and open‑minded nature into innovative store displays that blend commercial goals with artistic storytelling while balancing meticulous organization with creative flexibility.
  sports: Edgardo Munoz follows FC Dallas avidly, supports the Dallas Mavericks during the NBA season, and participates in a local adult soccer league on Saturday mornings, while also coaching a youth mural‑themed
    fitness class at a community center.
  arts: Edgardo Munoz immerses themselves in the Dallas Arts District, curating personal sketches and digital collages inspired by the bold murals of local artist Jun Zhou and the contemporary installations
    of Kerry James Marshall, while strumming acoustic renditions of Bob Dylan and Sufjan Stevens during informal jam sessions.
  travel: Edgardo Munoz enjoys thoughtfully planned getaways that blend artistic discovery with relaxation, having toured the avant‑garde galleries of Barcelona, attended a tea ceremony in Kyoto, and explored
    the desert art installations of Santa Fe, with a future aim to hike the Patagonia trails.
  culinary: Edgardo Munoz loves preparing heritage‑inspired dishes such as tamales, mole verde, and hand‑made corn tortillas, displaying a moderate cooking skill that shines during holiday gatherings, and
    they savor the smoky flavor of chipotle, fresh cilantro, and roasted corn in their kitchen experiments.
  core: Edgardo Munoz is a curious, art‑driven retail veteran who balances meticulous store management with spontaneous creative projects, often juggling tight budgeting with a love for guitar jams and
    occasional back‑pain from endless standing.
background:
  cultural: Raised in a Mexican‑American household in Dallas, Edgardo grew up bilingual, speaking Spanish at home and English at school. Family traditions such as making tamales, celebrating Día de los
    Muertos, and attending local mariachi events shaped his appreciation for Mexican culture. He maintains strong ties to the vibrant Mexican community in Dallas County, often volunteering at cultural centers
    and supporting Latino-owned businesses. His heritage informs his values of respect (respeto), community responsibility, and the importance of family, while also enriching his artistic sensibilities
    and entrepreneurial spirit.
attributes:
