  hobbies: '[''Visiting Art Galleries and Museums'', ''Sketching and Digital Collage'', ''Playing Acoustic Guitar'', ''Cooking Traditional Mexican Cuisine'', ''Following Professional Soccer'', ''Participating
    in Community Mural Projects'', ''Attending Cultural Festivals (e.g., Día de los Muertos)'', ''Reading Contemporary Art and Design Magazines'']'
  career_goals: Edgardo aims to advance to a store manager position within the next two years, with a long‑term goal of becoming a regional manager overseeing multiple locations in Texas. He is also exploring
    the possibility of launching his own boutique that merges retail with art, offering handcrafted Mexican‑inspired goods and supporting local artists. To support these ambitions, he plans to complete
    his Business Administration degree and acquire certifications in retail management and visual merchandising.
