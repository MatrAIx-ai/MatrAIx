  hobbies: '[''Reading historical fiction'', ''Tending an herb garden'', ''Sketching'', ''Crocheting'', ''Listening to classical and Honduran folk music'', ''Exploring online art galleries'', ''Crossword
    puzzles'', ''Journaling'']'
  career_goals: Even at 80, Luz aims to preserve her family's legacy by compiling a memoir that blends personal anecdotes, recipes, and reflections on art. She hopes to organize a small community workshop
    where she can teach crochet techniques and basic Spanish to interested locals, fostering cultural exchange. Luz also plans to curate her collection of regional folk art and Honduran handicrafts for
    a traveling exhibit at the Blount County Heritage Center, aspiring to win a local craft competition that celebrates cross‑cultural artistry.
