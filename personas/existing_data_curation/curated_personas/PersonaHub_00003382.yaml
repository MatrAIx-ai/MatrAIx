persona_description: A music composer who is interested in jazz, rock, classical, choral, gospel, Barbershop, show tunes music, and electronic music. They are looking for a software that can help them create
  solid and rich harmonic and melodic structures for their compositions. They want to use the software in combination with Pizzicato Choir to harmonize a melody quickly and easily. They want to be able
  to create custom arrangements for their songs and produce beautiful sounding arrangements. They also want to use the software to work with fifth chords, sixth chords, sixth and fourth chords, dominant
  seventh chords, and the other types of seventh chords. They are looking for a harmony assistant that will help them work with the rules of counterpoint and create rhythmic variations to make the bass
  more percussive or add motion and interest to the other instruments or voices.
