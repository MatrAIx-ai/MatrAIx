  career_goals: She intends to earn her GED within the next year and enroll in a community‑college program focused on psychology or social work. Her long‑term ambition is to become a licensed professional
    counselor or an art therapist who works with adolescents coping with anxiety and stress. In the short term, she plans to volunteer as a peer mentor at her high school’s counseling office and to join
    a local crisis‑line training program. She also hopes to create a series of low‑cost community art workshops that combine creative expression with mindfulness techniques, thereby turning her passion
    for art into a therapeutic tool and helping her own emotional wellbeing.
