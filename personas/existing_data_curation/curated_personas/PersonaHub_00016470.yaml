persona_description: A teacher who has recently implemented a new classroom management system in their district, allowing students to create their own classroom norms. The teacher is hands-off and allows
  students to work in table groups to come up with positive norms for the year, such as listening, helping, and raising their hand. The teacher then monitors the students' relations, collaborative skills,
  leadership skills, attitudes, creativity, and computer skills while using Google Draw to create posters of the norms. The teacher's only role is to monitor and print out the results.
