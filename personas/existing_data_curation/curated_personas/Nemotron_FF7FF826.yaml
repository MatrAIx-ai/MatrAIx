  hobbies: '[''Abstract digital illustration'', ''Ambient music composition'', ''Arduino tinkering'', ''Science‑fiction reading'', ''Community tutoring (math & coding)'', ''Hiking and nature walks'', ''Board‑game
    nights'', ''Landscape photography'']'
  career_goals: John aspires to blend his technical acumen with his artistic sensibility by pursuing a career in interactive media and user‑centered design. He aims to secure a role where he can develop
    intuitive digital experiences—such as data visualizations or educational apps—that empower his local community and foster collaborative learning. In the longer term, he hopes to establish a nonprofit
    makerspace in Galesville, offering workshops in coding, robotics, and digital art, thereby merging his compassion for others with his love of innovation.
