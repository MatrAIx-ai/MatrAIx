personas:
  professional: John Holsonback, an aspiring interactive media designer, blends Python programming, data analysis, and digital illustration to craft user‑centered educational apps, leveraging their empathetic
    tutoring experience to prototype intuitive visualizations for the Galesville community.
  sports: John Holsonback follows the Milwaukee Bucks and Green Bay Packers with enthusiastic devotion, plays pick‑up basketball at the Galesville Community Center, hikes the nearby Mississippi River bluffs
    every weekend with the local Trailblazers Club, and occasionally joins a recreational ultimate‑frisbee league that meets at the town park.
  arts: John Holsonback channels their love for abstract digital art by creating glitch‑style illustrations inspired by Kandinsky and James Turrell, composes ambient soundscapes reminiscent of Brian Eno
    and Aphex Twin on their laptop, and regularly attends screenings of classic sci‑fi films like Blade Runner while also listening to the experimental jazz of Kamasi Washington.
  travel: John Holsonback has backpacked through the Driftless Region’s rolling hills, taken a weekend road‑trip to Chicago’s Museum of Contemporary Art, and dreams of exploring the neon‑lit streets of
    Tokyo and the aurora‑filled skies of Tromsø, all while budgeting travel through student discount programs and occasional rideshare pooling.
  culinary: John Holsonback enjoys crafting late‑night ramen bowls with miso broth, soft‑boiled eggs, and fresh bok choy, whips up avocado toast topped with feta and chili flakes for breakfast, and experiments
    with Wisconsin cheddar‑infused mac and cheese, often seasoning dishes with smoked paprika and sriracha for a spicy kick.
  core: John Holsonback is an imaginative 21‑year‑old who merges code and canvas, volunteers as a math tutor, forgets to file taxes on time, and fuels their creative spark with ambient beats and midnight
    hikes.
background:
  cultural: John’s cultural roots are grounded in the Midwestern small‑town ethos of Galesville, Wisconsin. His family lineage traces back to German and Scandinavian immigrants who settled the region in
    the 19th century, and he grew up attending a Lutheran community church and the local public schools. The close‑knit, cooperative spirit of Trempealeau County, with its emphasis on neighborly support,
    outdoor recreation along the Mississippi River, and annual county fairs, has shaped his worldview. While he embraces contemporary digital culture and progressive ideas sparked by his university experience,
    he maintains a strong appreciation for the region’s agricultural heritage, modesty, and communal solidarity.
