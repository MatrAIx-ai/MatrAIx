  career_goals: Luis dreams of becoming a marine biologist or a teacher in the future. He is fascinated by the ocean life he sees on Jupiter's beaches and loves learning about animals in a systematic way.
    He also enjoys helping classmates understand topics, so he imagines a career where he can share knowledge and maintain a structured learning environment.
