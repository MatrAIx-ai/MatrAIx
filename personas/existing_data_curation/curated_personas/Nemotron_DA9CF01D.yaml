personas:
  professional: Luis Gonzalez, a systematic 8‑year‑old student who leads the class LEGO club, meticulously plans the weekly after‑school soccer roster, and always volunteers to set up art supplies because
    they value order and reliability.
  sports: Luis Gonzalez is a dedicated member of the neighborhood under‑8 soccer team that practices on Tuesdays and Thursdays, frequently swims laps at the community pool, and cheers for the local professional
    soccer club, the Coastal Strikers, while collecting unique shells during weekend beach trips.
  arts: Luis Gonzalez enjoys drawing cartoon characters during school art projects, listening to lively traditional folk band Los Hermanos Banda while sketching, and idolizing animator Brad Bird, often
    re‑creating scenes from their favorite adventure movies in LEGO form.
  travel: Luis Gonzalez loves short family trips to the nearby shoreline where they hunt for seashells, dreams of snorkeling in the Caribbean, and meticulously plans each excursion with a hand‑drawn itinerary
    that includes snack breaks and a designated ‘shell‑spotting’ hour.
  culinary: Luis Gonzalez proudly helps prepare tacos with corn tortillas, seasoned beef, fresh avocado, cilantro, and lime, mastering the art of guacamole and occasionally sneaking extra salsa, though
    they sometimes over‑salt the mixture in their enthusiasm.
  core: Luis Gonzalez is an organized, routine‑loving 8‑year‑old who balances soccer, LEGO building, and shell‑collecting with a methodical approach to allowance, health, and family cooking, though they
    can be a tad obsessive about keeping their toys in perfect order.
background:
  cultural: Luis comes from a Mexican family that maintains strong cultural traditions while living in Jupiter, Florida. At home he speaks Spanish with his parents and grandparents, celebrates Dia de los
    Muertos, Cinco de Mayo, and other Mexican holidays, and helps prepare traditional foods. He attends a bilingual after-school program and participates in local Mexican community events, blending his
    heritage with the multicultural environment of Palm Beach County.
