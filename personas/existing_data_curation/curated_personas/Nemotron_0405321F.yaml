  career_goals: Jimmy dreams of a future where his imagination can shape the world. He aspires to become an artist who paints bright, fantastical scenes, an explorer who discovers new places and creatures,
    or an inventor who creates innovative gadgets. He hopes to combine art and invention in a career that lets him keep learning, experimenting, and sharing his creations with others.
