personas:
  professional: Katherine Percle channels her lifelong community involvement into a volunteer coordinator role at the local senior center, where they organize weekly art workshops, curate genealogy talks,
    and apply their meticulous research skills to preserve town histories while maintaining the flexible, imaginative spirit that keeps each event fresh despite a healthy dose of friendly rivalry with neighboring
    clubs.
  sports: Katherine Percle enjoys leisurely walks along the Huron River and occasional birdwatching hikes in the county park while cheering for the Detroit Tigers and the Michigan Wolverines, they join
    the senior center's low-impact tai chi class each Thursday and keep a friendly scoreboard rivalry with fellow members for the most steps logged on their pedometer.
  arts: Katherine Percle devotes afternoons to creating abstract watercolors inspired by Monet and O'Keeffe, they attend the Ann Arbor Art Fair, volunteer as a docent for the community theater's production
    of 'Our Town', and lose themselves in classic poetry by Emily Dickinson and sci-fi by Philip K. Dick, all while knitting intricate quilts that double as conversation pieces.
  travel: Katherine Percle plans low-key trips to historic sites like Mackinac Island and the Henry Ford Museum, they favor train rides and senior-discount tours that allow ample time for sketching landscapes,
    but they sometimes delay booking due to a tendency to over-pack tea bags and forget their walking cane.
  culinary: Katherine Percle prepares hearty Midwestern meals grounded in garden harvests - such as tomato-basil soup, roasted root vegetables, and apple-cinnamon crumble - while favoring the traditional
    Sunday stew simmered with smoked ham, they relish experimenting with heirloom seeds but often misplace the handwritten recipes in a stack of old letters.
  core: Katherine Percle blends a fiercely curious mind with a disciplined community spirit, they chase artistic novelty, guard their finances with disciplined frugality, and occasionally let skepticism
    spark a friendly competition at senior events.
background:
  cultural: Katherine grew up in post‑war Michigan as part of a white, Midwestern family with German and Irish roots. The values of self‑reliance, community involvement, and modesty typical of the Great
    Lakes region shaped her worldview. Her upbringing in a small town near Ann Arbor exposed her to both the agricultural rhythm of the countryside and the intellectual currents of the nearby university
    town. Raised in a Protestant Christian environment common to many Midwestern families, she participated in church gatherings and seasonal celebrations, fostering a sense of ritual that she now honors
    through family holiday customs. Over the decades she has witnessed the cultural shifts of the civil‑rights era, the rise of digital media, and the revitalization of local arts, which have all informed
    her eclectic tastes and her commitment to preserving local history.
