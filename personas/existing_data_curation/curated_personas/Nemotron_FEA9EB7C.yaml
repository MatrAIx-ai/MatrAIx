  career_goals: Looking ahead, Margarita aims to lead a pilot program that integrates AI‑enhanced video analytics into the city’s security infrastructure, improving predictive threat detection while maintaining
    privacy standards. She is passionate about mentoring emerging supervisors, establishing a formal certification pathway for security leaders at a local community college, and crafting a region‑wide emergency
    coordination framework that links municipal services, private security firms, and volunteer responders. In the longer term, she envisions transitioning to a senior consultant role that allows her to
    share her expertise while dedicating more time to community art initiatives and personal well‑being.
