    with friends in community spaces'']'
  career_goals: Sean hopes to graduate high school and obtain a certification as an automotive technician, eventually opening his own small auto repair shop to serve his community. He also dreams of leveraging
    his social media savvy to build a following that could promote his business and showcase Mexican-American car culture. In the long term, he envisions mentoring younger teens in his neighborhood, teaching
    them practical skills and encouraging positive group involvement, aligning his desire for structure with his love for flexible, community‑focused activities.
