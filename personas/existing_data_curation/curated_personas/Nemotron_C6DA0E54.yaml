  hobbies: '[''Gardening (heirloom vegetables)'', ''Birdwatching'', ''Knitting and crocheting'', ''Reading historical fiction'', ''Book club participation'', ''Volunteering at senior center (craft teaching,
    potluck organization)'', ''Walking in local parks'', ''Genealogy research for family history'']'
  career_goals: As a retiree, Dominique’s primary ambition is to leave a lasting legacy for her children and grandchildren. She aims to compile a detailed family history book that blends her genealogical
    research with stories from her upbringing, mentor younger members of her church and senior center on practical life skills, and stay active in community volunteer projects that preserve East Hartford’s
    local heritage. Maintaining her health and continuing to learn new technologies at a comfortable pace are also key personal goals.
