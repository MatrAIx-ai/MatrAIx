  hobbies: '[''Cooking experimental fusion dishes'', ''Watercolor painting'', ''Visiting local art galleries'', ''Reading historical fiction'', ''Gardening'', ''Walking in neighborhood parks'', ''Listening
    to Latin music'', ''Volunteering at the senior center'']'
  career_goals: Although retired, Omayra is driven by personal fulfillment goals. She aims to document her family’s culinary heritage in a small recipe blog, volunteer as a cultural liaison at the local
    community center to showcase Colombian art and music, and take a weekly watercolor class to explore new artistic techniques. Her long‑term ambition is to organize an annual multicultural food festival
    that celebrates the blend of Colombian and Texan traditions for her grandchildren and the wider Katy community.
