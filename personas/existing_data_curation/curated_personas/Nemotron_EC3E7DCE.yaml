  hobbies: '[''Hiking'', ''Fishing'', ''DIY Furniture Building'', ''Electric Guitar'', ''Barbecue Cooking'', ''Community Events'', ''Basketball'', ''Home Brewing'', ''Video Gaming'', ''Habitat for Humanity
    Volunteering'']'
  career_goals: Travis aims to become a licensed general contractor and eventually launch his own construction firm that specializes in eco‑friendly residential builds. He plans to complete his unfinished
    college coursework in construction management, earn a Green Building Council certification, and develop a reputation for high‑quality, innovative workmanship. Long‑term, he hopes to mentor apprentices,
    speak at local trade events, and expand his business to serve a broader region of Yolo County and neighboring communities.
