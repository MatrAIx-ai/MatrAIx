personas:
  professional: Travis Mcclaran, a 28‑year‑old carpenter with a talent for framing, custom cabinetry, and deck construction, blends his practical curiosity and competitive drive to lead small crews on eco‑friendly
    residential builds, all while embracing a relaxed, sometimes disorganized approach to planning and thriving as the charismatic center of any project discussion.
  sports: Travis Mcclaran, a 28‑year‑old outdoor enthusiast, spends weekends hiking the Sacramento Delta trails and fishing local reservoirs, joins a pickup basketball league at the Yolo County YMCA, roots
    for the Sacramento Kings and Sacramento Republic FC, and occasionally laces up trail‑running shoes for early‑morning runs along the American River.
  arts: Travis Mcclaran, a 28‑year‑old DIY carpenter and guitar hobbyist, routinely plugs his electric guitar into community jam sessions, covering classic rock staples like Led Zeppelin and Jimi Hendrix
    while also enjoying local indie folk acts such as The Oarsmen, and unwinds by streaming indie films by directors like Greta Gerwig and Denis Villeneuve.
  travel: Travis Mcclaran, a 28‑year‑old adventure‑seeker, prefers spontaneous road trips that combine hiking in Yosemite and camping along the Oregon Coast with weekend getaways to Napa’s vineyards, while
    dreaming of an Icelandic road‑trip to chase waterfalls and a culinary tour of Japan’s craft‑brew scene, all balanced against a modest travel budget and occasional work‑related constraints.
  culinary: Travis Mcclaran, a 28‑year‑old home‑brew enthusiast, loves grilling smoked brisket with a rub of smoked paprika and brown sugar, whipping up homemade sourdough pretzels, and tinkering with his
    own pale‑ale recipes featuring Cascade hops and citrus zest, yet admits his culinary confidence peaks only when the grill is hot and his toolbox is within reach.
  core: Travis Mcclaran, 28, blends a competitive carpenter’s drive with a laid‑back, talkative charm, constantly juggling DIY projects, backyard barbecues, and a dream of green‑building entrepreneurship
    while occasionally letting disorganization and skepticism peek through.
background:
  cultural: Travis grew up in a rural part of Yolo County, California, within a primarily white, middle‑class community that valued hard work and self‑reliance. His father was a carpenter, and family tradition
    introduced him early to the trade. The region's agricultural roots and proximity to the Bay Area fostered a blend of traditional Americana and progressive Californian attitudes, especially regarding
    sustainability and community involvement. He attended local community college before focusing on his carpentry career, and he maintains close ties to neighborhood gatherings, county fairs, and the diverse
    agricultural heritage of the area.
