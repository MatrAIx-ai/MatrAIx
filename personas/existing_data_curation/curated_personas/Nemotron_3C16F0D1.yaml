  career_goals: Although retired, Samuel remains driven to contribute to his community. His primary ambition is to ensure the continuation of local traditions by mentoring younger volunteers and preserving
    the farm heritage of Baca County. He hopes to expand his involvement with the volunteer fire department, organize an annual senior‑center health‑screening day, and support his wife in maintaining their
    homestead. Keeping physically active and healthy for his grandkids' gatherings is also a personal goal.
