persona_description: A historian who is interested in the history of Boston and its role in the American Revolution, particularly the role of the St. Andrew's Lodge of Freemasons in the Boston Tea Party.
  The individual is knowledgeable about the life and work of John Johnson, the painter who painted the Green Dragon Tavern in 1773, and has a particular interest in the details of the painting and its context.
  The individual is also interested in the history of Boston addresses and street numbers, as they relate to the painting and its creation.
