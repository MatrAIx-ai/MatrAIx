persona_description: A historian or legal scholar who specializes in the study of Jewish law and legal literature, particularly the Sasanian period. They have a deep understanding of the oral traditions
  and pedagogic environments of the time, and are familiar with the processes of oral transmission and the composition of legal literature. They have a particular interest in the discursiveness of legal
  texts and the role of sages in transmitting the teachings of their master. They are skilled in analyzing and interpreting legal texts and have a keen interest in the context in which these texts were
  composed.
