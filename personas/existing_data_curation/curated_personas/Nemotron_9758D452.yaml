  career_goals: Jack wants to build a stable, community‑oriented career that lets him interact with people daily while applying his practical skills. In the next two years he plans to enroll in a community‑college
    program in hospitality management or business administration, aiming for a position as a front‑of‑house manager at a local restaurant or a coordinator for community events in Des Moines. His longer‑term
    ambition is to run his own small business—such as a neighborhood coffee shop or a farm‑stand—that blends routine operations with the social atmosphere he thrives in. He also hopes to develop a regular
    slot as a local radio or podcast host for community news and events, leveraging his talkative nature and love of storytelling.
