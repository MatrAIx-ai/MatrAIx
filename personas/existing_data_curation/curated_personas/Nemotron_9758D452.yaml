personas:
  professional: Jack Goins is an aspiring hospitality professional who leverages his natural charisma and hands‑on practicality to coordinate community events and front‑of‑house operations, while his love
    of routine keeps the venue running smoothly even as his spontaneous side nudges him to inject surprise pop‑up performances into the nightly schedule.
  sports: Jack Goins is a devoted Iowa Hawkeyes football fan who also laces up for the Des Moines Indoor Soccer Club on Tuesdays and heads to Saylorville Lake for weekend trout fishing, mixing passive fandom
    with modest physical activity.
  arts: Jack Goins channels his love for acoustic storytelling by performing nightly at the Open Mic Café, drawing inspiration from folk legends like John Prine and contemporary indie acts such as Mumford
    & Sons, while sharpening his improvisational wit at the Community Theater’s improv troupe led by local comic Sarah Carr.
  travel: Jack Goins prefers short, affordable road trips that combine camping under the stars with a solid plan for local eats, having already explored the Great Lakes shore in Michigan and dreaming of
    a spring road‑trip to New Orleans to soak up the music scene while still budgeting for tuition.
  culinary: Jack Goins enjoys cooking hearty Midwestern comfort dishes like chicken‑and‑dumpling soup, skillet cornbread, and barbecued pork ribs, often seasoning with fresh herbs such as rosemary and thyme
    while experimenting with a twist of smoked paprika on classic recipes to impress friends at weekend potlucks.
  core: Jack Goins is a sociable 19‑year‑old who thrives on routine‑driven community work, yet habitually bursts into spontaneous guitar riffs and impromptu jokes, juggling a love for classic comfort food
    with a tendency to procrastinate on chores.
background:
  cultural: Jack grew up in a middle‑class white family in Des Moines, Iowa, steeped in Midwestern values of friendliness, modesty, and hard work. His upbringing included regular church attendance at a
    local Methodist congregation, family gatherings centered around home‑cooked meals, and participation in community events such as county fairs and high‑school sports games. The local culture emphasizes
    practical skills, self‑reliance, and a strong sense of community, all of which shaped Jack’s pragmatic outlook and his love for social interaction. He speaks with a gentle Midwestern accent and feels
    a deep connection to the region’s agricultural roots, even though he lives in the city.
