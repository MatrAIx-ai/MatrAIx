persona_description: A researcher and scientist who specializes in dendrochronology, specifically focusing on the study of tree-ring chronologies to reconstruct past climate conditions in the Asian Monsoon
  region. They are responsible for developing quantitative, high-resolution reconstructions of important monsoon indices over the past several centuries to millennia. The ultimate product will be a valuable
  resource of information on the processes that have impacted the past behavior and variability of Asian monsoon climate dynamics. The persona is likely to be involved in conducting within- and between-region
  analyses of centuries-long climate reconstructions developed from their 'Monsoon Asia' tree-ring network, and will engage in tree-ring research in various parts of Asia and Australia for more than a decade.
  They will be directly involved in this effort, and will establish laboratories and train students and scientists in a variety of countries in monsoon Asia in the science of dendrochronology. The persona
  is also likely to be working on developing quantitative, high-resolution reconstructions of important monsoon indices over the past several centuries to millennia, and will use these data to develop and
  investigate various analyses to address the over-arching research question.
