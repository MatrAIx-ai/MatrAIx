persona_description: An historian or a genealogist who is interested in the history of African-American communities in Brooklyn during the Civil War era. The person is likely to be interested in the economic,
  social, and cultural aspects of the African-American community in Brooklyn during that time period. They may also be interested in the impact of slavery and the Civil War on the African-American community
  in Brooklyn. The person may have a particular interest in Weeksville, a community in Brooklyn that was once a thriving African-American community, and may want to compare the information in the Brooklyn
  City Directory of 1863-4 with the work of Rioghan Kirchner on Weeksville.
