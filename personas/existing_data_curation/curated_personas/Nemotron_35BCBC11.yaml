  career_goals: Looking ahead, Omar aims to move into a store‑manager role within the next two years, where he can shape the daily routine of his team and reinforce a harmonious work culture. In the longer
    term, he dreams of opening a boutique that highlights Ecuadorian artisanal products, blending his retail expertise with his cultural heritage. He plans to enroll in a retail‑management certification
    program to sharpen his strategic planning skills while preserving the flexibility he values.
