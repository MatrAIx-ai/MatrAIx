  career_goals: She aims to become a senior data science leader within a public-policy think-tank or a federal agency where she can shape evidence-based decisions, particularly on issues affecting immigrant
    communities. Over the next five years, Zoila plans to complete a master's in applied statistics, publish interdisciplinary research bridging quantitative analysis and cultural studies, and mentor underrepresented
    students in STEM. Ultimately, she aspires to launch a nonprofit that provides data-driven consulting for small Salvadoran businesses and fosters STEM education in low-income neighborhoods.
