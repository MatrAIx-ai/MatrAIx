personas:
  professional: Zoila Dillard is a data scientist at a Washington, D.C. think‑tank where they combine statistical modeling, machine‑learning expertise, and a sharp eye for contemporary art to craft evidence‑based
    policies for immigrant communities, while their organized, competitive nature drives them to lead interdisciplinary project teams and mentor underrepresented STEM talent.
  sports: Zoila Dillard tackles the outdoors as a member of the Washington D.C. Hiking Club, logging weekly treks on the Shenandoah and Potomac trails in spring and fall, while cheering on the Washington
    Capitals in hockey, DC United in soccer, and maintaining a disciplined salsa‑practice routine that doubles as cardio, reflecting their competitive spirit and methodical approach to fitness.
  arts: Zoila Dillard spends weekends immersed in the National Gallery’s contemporary exhibits, drawing inspiration from artists like Yayoi Kusama and Kehinde Weaver, while their salsa evenings echo the
    rhythms of Celia Cruz and Rubén Blades, and evenings unwind to science‑fiction audiobooks by N.K. Jemisin, weaving a vibrant tapestry of visual, musical, and literary influences into their identity.
  travel: Zoila Dillard meticulously plans a blend of art‑focused city trips and rugged hikes, having already explored Mexico City’s Frida Kahlo Museum, Barcelona’s MACBA, and the Appalachian Trail in West
    Virginia, while they dream of a future trek through Patagonia’s Torres del Paine and a culinary tour of Oaxaca, balancing a tight work schedule with a competitive desire to check each destination off
    their bucket list.
  culinary: Zoila Dillard is an adventurous home chef who perfects family‑style pupusas stuffed with queso fresco and adds a Korean kimchi twist, while also mastering Mexican street‑taco al pastor with
    pineapple and chipotle, regularly hosting dinner parties where they pair the dishes with craft cerveza and discuss museum exhibits, reflecting a blend of cultural fusion and meticulous recipe experimentation.
  core: Zoila Dillard blends analytical rigor with a love for contemporary art, using salsa rhythms to troubleshoot data puzzles, while juggling a competitive edge, a budget‑tracking habit, occasional hackathon‑induced
    caffeine binges, and a penchant for late‑night museum visits.
background:
  cultural: Zoila grew up in a bilingual Salvadoran-American household in the Washington, D.C. metro area. Her parents immigrated from El Salvador in the 1990s, preserving traditions such as Dia de los
    Muertos celebrations, pupusas, and folk music while embracing American cultural norms. She is fluent in Spanish and English, and her cultural identity blends Salvadoran family values - close-knit extended
    family, community solidarity, and respect for elders - with the individualistic and competitive drive characteristic of her professional environment. Participation in local Salvadoran community events
    and volunteering at cultural festivals informs her worldview and fuels her commitment to give back to the diaspora.
