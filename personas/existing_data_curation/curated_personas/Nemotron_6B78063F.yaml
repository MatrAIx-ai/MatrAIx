personas:
  professional: Salaheddin Jean is a 24‑year‑old visual communication student who blends graphic design, digital illustration, and community‑focused event coordination into freelance projects, leveraging
    their curiosity and meticulous organization to turn speculative ideas into socially‑charged multimedia installations while they juggle part‑time internships.
  sports: Salaheddin Jean enjoys playing pickup basketball at the local community court, cheering for the New York Knicks and following the Newark Express in the American Basketball Association, and they
    participate in a weekly rec league that balances their love for competition with a low‑key social vibe.
  arts: Salaheddin Jean immerses themselves in the Newark art scene, frequenting the Newark Museum of Art and street‑mural tours, curating playlists that fuse Miles Davis, Kendrick Lamar, and Fela Kuti,
    while they sketch in a pocket notebook and draw inspiration from artists like Kehinde Wiley and Jean‑Michel Basquiat.
  travel: Salaheddin Jean prefers short, culturally immersive trips, having explored the vibrant murals of Detroit, the jazz festivals of New Orleans, and the historic neighborhoods of Philadelphia, while
    they plan a future pilgrimage to Mexico City’s Riad Norte district to study its vibrant street art, balancing budget constraints with a craving for artistic inspiration.
  culinary: Salaheddin Jean cooks soulful, spice‑laden meals such as spicy goat stew with plantains, coconut rice with pigeon peas, and citrus‑marinated fish, demonstrating a moderate skill level that blends
    family recipes with experimental flavor pairings, and they view the ritual of cooking as a therapeutic counterbalance to daily stress.
  core: Salaheddin Jean is a creatively driven, anxiety‑prone 24‑year‑old who channels artistic curiosity into community projects, juggling budget worries, occasional sleeplessness, and a love for basketball
    and vibrant flavors while they constantly seek meaning in visual storytelling.
background:
  cultural: Salaheddin is a Black American of Haitian descent, raised in a bilingual household where Haitian Creole and English were spoken. His family’s roots in Port‑au‑Prince, combined with the vibrant
    African‑American community of Belleville and Newark, have shaped his cultural identity. He grew up attending a mosque where he learned Arabic prayers, reflecting the Muslim influence suggested by his
    first name, while also participating in Caribbean celebrations such as Haitian Independence Day. This intersection of African, Caribbean, and American cultures informs his artistic sensibilities, food
    preferences, musical tastes, and his commitment to uplifting marginalized voices.
attributes:
  skills: '[''Graphic design (Adobe Photoshop, Illustrator)'', ''Digital illustration'', ''Video editing (Adobe Premiere)'', ''HTML/CSS basics'', ''Public speaking and workshop facilitation'', ''Community
    outreach and event coordination'', ''Research and data analysis'']'
  hobbies: '[''Visiting galleries and street art installations'', ''Sketching and digital illustration'', ''Photography (urban and portrait)'', ''Listening to jazz, hip‑hop, and Afro‑Caribbean music'',
    ''Playing basketball at local courts'', ''Cooking Haitian and soul food recipes'', ''Reading speculative fiction, philosophy, and poetry'', ''Mentoring high‑school students in visual arts'']'
  career_goals: He aims to complete his bachelor's degree in visual communication or media arts within the next two years, leveraging scholarships and part‑time internships. His long‑term ambition is to
    become a multimedia artist and cultural program director for a nonprofit that provides arts education to underserved Black and immigrant youth in the Newark‑Belleville area. He also envisions launching
    a freelance studio that offers graphic design services while curating pop‑up exhibitions highlighting local talent. Ultimately, he hopes to use his creative work to spark dialogue around identity, mental
    health, and social justice.
