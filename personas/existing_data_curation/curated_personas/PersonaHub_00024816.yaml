persona_description: A professional engineer who specializes in the design and development of high-frequency amplifiers, specifically using FETs for their high input impedance, low noise characteristics,
  and large dynamic range. They have experience with both the junction field effect transistor (JFET) and insulated gate field-effect transistor (MOSFET), and are skilled in using them for applications
  such as RF amplifiers, mixers, demodulators, and gain control amplifiers. They are also familiar with the shape and characteristics of FETs, and are able to apply their knowledge to various circuit designs.
