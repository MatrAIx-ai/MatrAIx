data:
  user 1 personas: 'I live on a pig farm.

    I wish that i lived in the city.

    I have allergies.

    I dislike animals.

    I am a vegetarian.'
  user 2 personas: 'I drive a red car.

    I like to wear red shoes also.

    I use red lipstick.

    I like to wear red.'
  Best Generated Conversation: 'User 1: Hi! What do you like to do for fun?

    User 2: I like to go for walks in the city and admire all the red things.

    User 1: That''s cool! I''m actually a vegetarian and I live on a pig farm.

    User 2: Oh, that''s interesting! I''ve always wanted to visit a pig farm.

    User 1: You should! It''s really interesting to see how they live and what they eat.

    User 2: I would love to! Do you have any pigs that you like to show off?

    User 1: Sure! I have a pig named Wilbur and he''s the cutest thing ever.

    User 2: I love the name Wilbur! Do you have any pictures of him?

    User 1: Sure! Here''s one of him eating a carrot.

    User 2: Aww! He''s so cute! I''m definitely going to have to visit your pig farm sometime.

    User 1: You''re welcome to come anytime! I''ll be sure to give you a tour.

    User 2: Thanks! I appreciate it!

    User 1: No problem!

    User 2: Do you like to go to the city much?

    User 1: Not really, I''m more of a country girl. But I do like to go for walks in the city sometimes.

    User 2: Why not?

    User 1: I don''t know, I guess I just prefer the peace and quiet of the country.

    User 2: I get that. I like the city for the excitement, but I also like to go to the country for the peace and quiet.

    User 1: Yeah, it''s nice to have both options.

    User 2: It is.

    User 1: So, what do you like to do for fun in the city?

    User 2: I like to go shopping, see movies, and eat at nice restaurants.

    User 1: That sounds like fun! I like to go shopping too, but I don''t really like going to the movies.

    User 2: Why not?

    User 1: I don''t know, I guess I just don''t like sitting in a dark room for two hours.

    User 2: I get that. I like to go to the movies for the experience, but I understand why some people don''t like it.

    User 1: Yeah, it''s not for everyone.

    User 2: So, what are you doing later?

    User 1: I''m not sure. What are you doing?

    User 2: I''m going to go shopping. Do you want to come with me?

    User 1: Sure! I could use a new pair of shoes.

    User 2: Great! We can meet at the mall in an hour.

    User 1: Perfect! I''ll see you there.

    User 2: See you!'
