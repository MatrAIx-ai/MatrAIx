personas:
  professional: Georgia Austin, a senior research coordinator‑to‑be, blends a STEM foundation with social‑science expertise to design mixed‑methods studies on digital tools and community engagement, leveraging
    R, Python, SPSS, and Tableau to produce actionable visual reports while battling a penchant for spontaneous project pivots that sometimes threatens deadline adherence.
  sports: Georgia Austin enjoys low‑impact fitness, frequenting the Chain of Lakes for walking and joining a senior‑friendly rowing club, while cheering for the Minnesota Twins and the Minnesota Vikings,
    and occasionally playing in a local senior bowling league that satisfies her competitive streak.
  arts: Georgia Austin immerses herself in the Minneapolis arts scene, attending lectures at the Walker Art Center, listening to folk‑rock icons like Bob Dylan, savoring contemporary orchestral works by
    composers such as Philip Glass, and collecting vintage photography books that fuel both her curiosity and her penchant for meticulous detail.
  travel: Georgia Austin favors spontaneous, budget‑conscious trips that blend culinary discovery with cultural insight, often jet‑setting to cities like Copenhagen for its bike‑friendly streets and innovative
    food markets, while also exploring nearby national parks on weekend drives, always packing a crossword book for downtime.
  culinary: Georgia Austin, an adept home cook, favors seasonal Midwestern produce, frequently preparing dishes like wild‑rice‑and‑mushroom pilaf, pan‑seared salmon with dill and lemon, and pumpkin‑spice
    oatmeal, while experimenting with spice blends such as za’atar, and never misses a chance to sample the city's ever‑changing food trucks.
  core: Georgia Austin is a fiercely curious, competitively driven senior researcher who balances solitary intellectual pursuits with spontaneous culinary adventures, yet often wrestles with disorganization
    and stress‑induced impulse spending.
background:
  cultural: Georgia grew up in a middle‑class white family in the Upper Midwest, with deep ties to the region’s Scandinavian‑American heritage. The local culture’s emphasis on self‑reliance, community involvement,
    and egalitarian values shaped her practical outlook. Living in Minneapolis, she identifies with the city’s progressive, academically oriented atmosphere, while maintaining family traditions such as
    holiday gatherings, outdoor activities year‑round, and a fondness for regional foods like lutefisk and wild rice.
attributes:
  skills: '["Quantitative data analysis", "Qualitative research methods", "Mixed-methods design", "Survey design and implementation", "Statistical programming (R, Python, SPSS)", "Data visualization (ggplot2,
    Tableau)", "Critical literature review", "Experimental design", "Research ethics compliance", "Community stakeholder interviewing"]'
  hobbies: '["Reading science‑policy books", "Crossword puzzles", "Sudoku", "Woodworking", "Attending public lectures", "Exploring local food scene", "Mindfulness meditation", "Nature walks around Chain
    of Lakes", "Trivia nights", "Balcony gardening"]'
  career_goals: Georgia aims to advance into a senior research coordinator role where she can lead interdisciplinary, grant‑funded projects that bridge technology and social behavior. She seeks to publish
    a series of peer‑reviewed articles on digital tools and community engagement, and is contemplating a master's or PhD in sociology of technology to deepen her theoretical foundation. Her competitive
    drive pushes her toward academic recognition, while she strives to develop stronger time‑management habits to reduce stress and meet project deadlines.
