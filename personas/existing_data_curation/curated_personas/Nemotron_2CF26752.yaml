  career_goals: Donny aims to progress to a senior software engineer role within the next two years, targeting leadership on high‑availability backend projects. He plans to earn AWS Solutions Architect
    and Certified Kubernetes Administrator certifications, and eventually move into a technical lead or architecture position where he can design robust systems and mentor junior developers. In the long
    term, he envisions founding a boutique consultancy that helps small businesses in the Research Triangle area adopt reliable cloud infrastructure, while maintaining a stable work‑life rhythm to keep
    stress manageable.
