personas:
  professional: Bonnie Steiner, a meticulous 9‑year‑old budding naturalist, they channel their love of structured learning into scientific inquiry through detailed LEGO models, chess strategies, and Scratch
    animations, demonstrating early research skills and an achievement‑driven mindset.
  sports: Bonnie Steiner, a member of the Silver Spring YMCA youth soccer team, they support the Washington Capitals and the Washington Wizards while preferring structured practice drills and they enjoy
    weekend swimming at the local pool, balancing team collaboration with their quiet, focused demeanor.
  arts: Bonnie Steiner, the viola player in the school orchestra, they find inspiration in the works of Yo‑Yo Ma and Ludwig van Beethoven, attend occasional children’s theater productions, and create simple
    stop‑motion animations of nature scenes in Scratch, merging their scientific curiosity with artistic expression.
  travel: Bonnie Steiner, a planner of family outings, they have visited the Smithsonian National Museum of Natural History, hiked family‑friendly trails in Shenandoah National Park, and they dream of exploring
    the Grand Canyon, always arranging itineraries with checklists and map‑marked routes to ensure a predictable, enriching adventure.
  culinary: Bonnie Steiner, who enjoys helping in the backyard garden, they love cooking spaghetti with homemade marinara sauce seasoned with fresh basil, munch on carrot sticks and apple slices, and they
    occasionally treat themselves to pepperoni pizza, showcasing a palate that balances wholesome ingredients with kid‑friendly comfort foods.
  core: Bonnie Steiner is a structured, achievement‑oriented nine‑year‑old; they love science, practice disciplined habits, and their quiet confidence shapes every facet of life, from LEGO building to careful
    money‑saving.
background:
  cultural: Bonnie comes from a white, middle-class family in Blacksburg, a university town in southwestern Virginia. Her family places a high value on education; many relatives have attended or work at
    Virginia Tech, giving her early exposure to academic life. She participates in community activities typical of the region, such as county-fair events, library storytimes, and local nature hikes. The
    cultural atmosphere blends Appalachian heritage—appreciation for the outdoors and seasonal traditions—with the progressive, research-oriented environment of a college town. Her household celebrates
    common American holidays and emphasizes civic responsibility, reflected in her involvement with Girl Scouts and school service projects.
