  career_goals: Bonnie dreams of a future where she can combine her love of structure with her curiosity about the world. In the long term she hopes to become a scientist or engineer who tackles real-world
    problems through systematic research, perhaps focusing on environmental science at Virginia Tech. She also envisions a role as a teacher or librarian, where she can share her passion for organization
    and learning with others. In the near term she aims to win her school's science fair, stay on the honor roll, earn the student council representative position, and continue expanding her Scratch programming
    skills to design educational games.
