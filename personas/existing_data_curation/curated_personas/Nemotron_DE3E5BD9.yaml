personas:
  professional: Brenda Theberge is a senior‑level end‑user support specialist who blends robust hardware diagnostics and software troubleshooting with a natural talent for demystifying tech concepts, and
    they leverage PowerShell and Bash automation to cut ticket resolution times while mentoring junior staff toward CompTIA and Cisco certifications.
  sports: Brenda Theberge hikes the Ruby Mountains weekly, participates in a local Master Trail Runners club during summer, enjoys weekend snowshoeing in winter, and they proudly root for the Las Vegas
    Raiders and the Reno Aces while attending community yoga sessions to stay flexible.
  arts: Brenda Theberge frequents the Reno‑Tahoe art corridor, volunteers backstage at the community theater, admires the night‑sky photography of William Anders while painting acrylics inspired by the
    desert’s magenta and turquoise hues, and they regularly discuss the works of Ansel Adams, Banksy, and the novels of Margaret Atwood at local book clubs.
  travel: Brenda Theberge plans trips around photography opportunities, having captured the aurora borealis in Tromsø, Norway, and the Milky Way over Death Valley, while they balance budget constraints
    by using points for airline upgrades and dream of a future road trip along the Pacific Coast Highway to explore hidden desert galleries.
  culinary: Brenda Theberge loves experimenting in group cooking classes, often blending smoky chipotle with fresh rosemary in a desert‑inspired quinoa bowl, perfecting a hand‑tossed sourdough crust topped
    with caramelized figs and goat cheese, and they delight in sourcing heirloom tomatoes and exotic spices like sumac for their eclectic recipes.
  core: Brenda Theberge is a tech‑savvy photographer and community‑focused mentor who balances meticulous budgeting with spontaneous art‑fuelled splurges, paints desert landscapes with both brush and lens,
    and never misses a trivia night, even if it means pulling an all‑night espresso.
background:
  cultural: Brenda is a white American of French‑Canadian descent, tracing her family roots to Quebec immigrants who settled in Nevada generations ago. Growing up in McGill, a small high‑desert town in
    White Pine County, she was raised with a blend of French‑Canadian family traditions—occasionally sharing classic recipes like tourtière and celebrating storytelling evenings—and the rugged, neighborly
    spirit of the American West. The expansive landscape fostered a deep connection to nature and a pragmatic, community‑oriented outlook. This mixed heritage informs her appreciation for art, music, and
    collaborative gatherings, while her upbringing instilled values of self‑reliance, cooperation, and a warm, inclusive approach to social interactions.
attributes:
  skills: '[''Hardware diagnostics and repair'', ''Software installation and troubleshooting'', ''Operating system support (Windows, macOS)'', ''Network troubleshooting (Wi‑Fi, TCP/IP)'', ''Ticketing system
    management (ServiceNow, Zendesk)'', ''Remote assistance and support tools'', ''Documentation and knowledge‑base creation'', ''Basic scripting (PowerShell, Bash)'', ''System imaging and deployment'',
    ''User training and onboarding'', ''Effective communication and empathy'', ''Cross‑functional collaboration'']'
  hobbies: '[''Landscape and night‑sky photography'', ''Acrylic painting'', ''Visiting art galleries and exhibitions'', ''Community theater participation'', ''Board‑game nights and trivia clubs'', ''Group
    cooking and culinary experiments'', ''Makerspace DIY electronics (Raspberry Pi)'', ''Hiking in the Ruby Mountains'', ''Reading contemporary fiction and science'', ''Volunteering for local arts events'']'
  career_goals: Brenda aims to earn industry certifications such as CompTIA Network+ and Security+, followed by Cisco CCNA, to deepen her networking expertise. She envisions advancing to a senior support
    specialist role and eventually moving into an IT service manager position where she can lead a small support team, implement process improvements, and mentor junior technicians. Passionate about community
    outreach, she hopes to launch a local tech‑literacy program and partner with the town’s makerspace to offer digital media workshops that blend her love of technology and the arts. Long‑term, she dreams
    of integrating her artistic interests with tech by coordinating community digital art exhibitions and supporting creative tech initiatives in rural Nevada.
