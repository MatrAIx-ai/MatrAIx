  hobbies: '[''LEGO building'', ''Scratch coding'', ''Science-fiction reading'', ''Strategy video games'', ''Chess'', ''Nature walks'', ''Rock collecting'', ''Puzzle solving'']'
  career_goals: He aims to pursue a career in robotics or software engineering, with the ambition to design autonomous machines or develop his own video games. He hopes to attend a specialized STEM magnet
    program in middle school, win local robotics competitions, and eventually study engineering at a university. Long-term, he envisions creating technology that solves real-world problems while allowing
    him to work independently.
