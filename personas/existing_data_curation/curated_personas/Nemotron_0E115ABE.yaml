personas:
  professional: Travis Larsen, a budding LEGO architect and young Scratch programmer, channels their love for structure and predictability into designing intricate, gear‑driven builds and interactive sci‑fi
    stories, thriving on solitary, hands‑on problem solving.
  sports: Travis Larsen, a member of the local Adventure Riders bike club, enjoys solo cycling through nearby trails and cheers for the Seattle Mariners baseball team while also participating in a youth
    chess league that treats the mental game like sport, but they rarely join team ball games, preferring individual challenges.
  arts: Travis Larsen immerses themselves in sci‑fi graphic novels like 'Saga' and 'Akira', collects LEGO‑themed fan art, and regularly watches Studio Ghibli films—especially 'Spirited Away'—while they
    experiment with simple digital music creation in Scratch, shaping an artistic identity rooted in imaginative storytelling and meticulous craftsmanship.
  travel: Travis Larsen prefers low‑key, nature‑focused trips, having camped in Yosemite National Park and eager to explore the geysers of Yellowstone, they plan adventures using grid maps and checklist
    notebooks, balancing a modest allowance with parental permission, and dreaming of a future trek through the Rocky Mountains.
  culinary: Travis Larsen favors bite‑size, hands‑on meals like homemade mini‑pizza rolls and peanut‑butter‑banana sandwiches, enjoys experimenting with LEGO‑shaped fruit skewers, and can expertly microwave
    a bowl of ramen, but they often skip vegetables unless cleverly presented as colorful building blocks.
  core: Travis Larsen is a meticulous, solitary 10‑year‑old who blends gears, code, and comic worlds into creative pursuits, obsessively catalogues their allowance, battles mild allergies, and they occasionally
    forget to stretch after marathon gaming sessions.
background:
  cultural: Travis was raised in Gainesville, a small city in Hall County, northern Georgia. His family follows a blend of traditional Southern customs and modern, technology-oriented values. They celebrate
    holidays like Thanksgiving and Christmas with community gatherings and Southern foods such as peach cobbler, but also emphasize education and self-reliance. The local community encourages participation
    in school clubs, church youth groups, and regional events like the county fair. While the area is predominantly white, his school includes classmates from diverse backgrounds, exposing him to a range
    of perspectives. The region’s slower pace, emphasis on personal responsibility, and growing interest in STEM initiatives shape his outlook and daily life.
