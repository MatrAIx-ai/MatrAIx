personas:
  professional: Eric Jenson is a versatile literary architect whose graduate training in the arts equips them with rigorous research and critical analysis, and whose organized, charismatic nature drives
    meticulous editing, dynamic workshop facilitation, and ambitious goals to publish an experimental novel, win an NEA fellowship, and champion Chicago’s literary community through a youth‑focused nonprofit
    and a cross‑disciplinary podcast.
  sports: Eric Jenson fuels fitness through urban walking tours with a street‑photography lens, occasional runs with the Chicago Running Club, and a casual membership in a community yoga studio, while passionately
    cheering the Chicago Bulls, Cubs, and Blackhawks, and joining the city's summer pick‑up basketball leagues whenever time permits.
  arts: Eric Jenson immerses themselves in Chicago’s arts pulse, frequenting the Art Institute, catching avant‑garde jazz at the Green Mill featuring Sun Ra tributes, attending experimental performances
    by local collectives, hosting literary salons inspired by Langston Hughes and Ocean Vuong, and honing improvisational wit at The Second City workshops.
  travel: Eric Jenson curates literary pilgrimages, having traced James Joyce’s steps in Dublin, wandered the cafés of Paris’s Left Bank, and explored Shakespeare’s birthplace in Stratford‑upon‑Avon, while
    dreaming of future visits to Kyoto’s haiku gardens and Edinburgh’s Fringe, always planning itineraries around affordable hostels and local writer’s meet‑ups.
  culinary: Eric Jenson channels their eclectic palate into cooking dishes like fragrant paella, spicy kimchi‑fried rice, and vibrant Ethiopian injera, using herbs from their balcony garden—basil, cilantro,
    and mint—to elevate meals, while their occasional over‑reliance on wine and oversalted sauces reflect a stress‑induced quest for comfort in the kitchen.
  core: Eric Jenson is a socially radiant, methodical writer whose boundless curiosity and compassionate drive are balanced by a persistent undercurrent of anxiety that fuels both creative brilliance and
    occasional over‑indulgence.
background:
  cultural: Eric grew up as a white Midwesterner in the Chicago suburbs, rooted in a family with German and Irish ancestry. His upbringing combined a classic Midwestern work ethic with early exposure to
    the city’s diverse cultural tapestry—its blues clubs, theater districts, and the historic Chicago School of literature. Attending public schools with vibrant arts programs and later earning a graduate
    degree in the arts and humanities, he absorbed the city’s legacy of social activism, labor solidarity, and community storytelling. This background instilled in him a deep appreciation for inclusive
    community building, progressive values, and the power of narrative to bridge cultural divides, shaping both his personal identity and his professional mission as a writer and advocate.
