    ''Cooking eclectic international dishes'', ''Participating in improv comedy workshops'', ''Street photography'', ''Balcony gardening'', ''Writing sessions at coffeehouses'', ''Traveling to historic
    literary sites'', ''Local arts activism'']'
  career_goals: Eric aims to publish a critically acclaimed novel that interweaves social commentary with experimental narrative techniques, followed by a series of essay collections exploring contemporary
    art and cultural intersections. He aspires to become a leading voice in Chicago’s literary scene, securing a regular column in a major newspaper or magazine while also teaching creative writing at the
    university level. Driven by his compassion, he plans to launch a nonprofit that offers free writing workshops to underserved youth and to develop a podcast series that blends literary analysis with
    interviews of diverse artists. He seeks fellowships and grants, such as an NEA fellowship, to support his research and multimedia storytelling projects, and he wishes to mentor emerging writers and
    curate community literary events that foster inclusive dialogue.
