persona_description: A person who is responsible for guiding and directing others, particularly in situations where they need assistance or support. This person is skilled in leading, helping, or directing
  someone or something to stay away from a specific location or situation, such as a busy street, a dangerous area, or a group of people. They may be a teacher, a coach, a mentor, or a professional who
  regularly provides guidance and support to others. This person is often seen as a reliable and trustworthy source of information and advice, and is well-versed in the art of guiding and directing others
  towards their goals and objectives.
