  career_goals: Though only three, Marjorie already expresses a desire to help and care for others. She often says she wants to become a teacher who reads stories to children and a veterinarian who looks
    after animals. Her fascination with how things work, such as watching adults fix toys, hints at a budding interest in engineering. In the short term, her goals focus on learning to read simple books,
    mastering potty training, and continuing to nurture kindness toward friends.
