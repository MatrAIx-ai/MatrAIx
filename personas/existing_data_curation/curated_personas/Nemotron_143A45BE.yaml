personas:
  professional: Marjorie Marrocco, a three‑year‑old participant in early childhood education, showcases budding problem‑solving skills by building block towers, merges curiosity with practical play by favoring
    simple, repeatable constructions, and instinctively supports peers in small group activities despite a preference for quiet solitude because they thrive in gentle collaboration.
  sports: Marjorie Marrocco, a three‑year‑old who dashes around the neighborhood with the Little Lions Soccer Club on weekends, cheers for the River Pirates in baseball, and practices basic balance on a
    low‑height beam at preschool, embraces fitness through spontaneous bursts of energy rather than structured workouts, and often pauses for a quiet nap because they prefer brief, low‑key activity.
  arts: Marjorie Marrocco, a three‑year‑old who lights up while singing Disney’s How Far I’ll Go from Moana, imitates Beyoncé’s dance moves from a kid‑friendly rendition of Single Ladies, and giggles at
    Sesame Street with favorite character Elmo, weaves music and visual storytelling into daily play, and quietly hums tunes while drawing because they find rhythm soothing.
  travel: Marjorie Marrocco, a three‑year‑old who delights in family trips to the local zoo, the sandy beach, and Disneyland, dreams of seeing the Grand Canyon’s vast cliffs and the Eiffel Tower in Paris,
    and prefers short car rides with a beloved stuffed rabbit and a picture book guiding imagination, because they feel most comfortable with familiar comforts during travel.
  culinary: Marjorie Marrocco, a three‑year‑old who adores creamy macaroni and cheese, bananas, and peanut butter‑jelly sandwiches, can spread butter on toast with a tiny spoon, and relishes dipping whole‑grain
    crackers in hummus or avocado mash, often hiding a bite for later because they enjoy collecting small pleasures.
  core: Marjorie Marrocco, a three‑year‑old explorer who balances bright curiosity with practical simplicity, loves small‑group play, quietly observes, and habitually hides tiny treasures in a pocket for
    later because they relish secret collections.
background:
  cultural: Marjorie is raised in the small town of Saratoga Springs, Utah County, within a family that identifies as white Italian‑American. Her household blends the values of the local Utah community—outdoor
    recreation, close‑knit family bonds, and participation in community preschool events—with subtle family traditions from her Italian heritage, such as occasional homemade pasta meals and celebrating
    holidays like Christmas and Easter with both religious and cultural customs. This multicultural environment provides a warm, supportive setting for her development.
