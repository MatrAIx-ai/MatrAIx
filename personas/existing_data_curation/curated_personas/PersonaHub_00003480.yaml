persona_description: A literary critic and editor who specializes in anthologies of women's poetry from the late 19th and early 20th centuries, focusing on the barriers women face in publishing and critical
  consideration. The persona has a deep interest in the literary movements and groupings of poetic styles, and is dedicated to refocusing current definitions of literary quality by presenting a broad range
  of women's work from a particular time period. The persona is also interested in the history and context of women's poetry and its impact on public discourse.
