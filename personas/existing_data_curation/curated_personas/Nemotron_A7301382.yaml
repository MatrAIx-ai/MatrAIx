personas:
  professional: Rosemary Coleman, a budding explorer of colors and shapes, delights in drawing whimsical creatures and often imagines becoming a future artist or scientist, though they resist structured
    art lessons and prefer free‑play scribbles.
  sports: Rosemary Coleman tips into soccer at the Tiny Turtles club, loves splash sessions at the local pool with the Mini Ducks, and cheers for the hometown Little League Wildcats, although they prefer
    quiet backyard play with a soft ball over noisy stadium crowds.
  arts: Rosemary Coleman loves the bright collages of Eric Carle, sings along to The Wiggles' 'Fruit Salad,' and watches Pixar's 'Toy Story' starring Tom Hanks, often drawing scenes inspired by those works
    in crayon, which nourishes their creative imagination.
  travel: Rosemary Coleman’s travel diary includes sunny days at the nearby beach playground, a weekend visit to the National Zoo in the capital, a memorable trip to Disney World in Florida, and an exciting
    family vacation to the Grand Canyon, all approached with spontaneous stroller routes and a love for gentle car rides over crowded airports.
  culinary: Rosemary Coleman prefers soft macaroni and cheese with a sprinkle of cheddar, delights in banana slices drizzled with honey, enjoys occasional chicken nuggets seasoned with ketchup, and attempts
    to stir mixing bowls in the kitchen, yet often insists on extra peas, sometimes leaving a mess of crumbs on the floor.
  core: Rosemary Coleman is a curious, artistic toddler who oscillates between wonder and worry, thriving in solitary crayons and small‑group play while occasionally fretting over lost crayons or spilled
    juice.
background:
  cultural: Rosemary is raised in a white, Midwestern family in Mankato, Minnesota. Her upbringing blends typical Midwestern values—politeness, community cooperation, and a love for simple outdoor activities—with
    exposure to local arts through community centers and school programs. Family traditions include celebrating seasonal holidays with modest gatherings, attending local festivals, and emphasizing kindness
    and harmony in daily life.
attributes:
  skills: '["Fine‑motor coordination (drawing, block building)", "Basic vocabulary and storytelling", "Color and shape recognition", "Empathy and caring for others", "Cooperative play in small groups",
    "Exploratory, cause‑and‑effect play", "Sensitivity to emotional atmosphere"]'
  hobbies: '["Crayon doodling", "Building with wooden blocks", "Listening to storytime", "Singing simple songs", "Backyard nature exploration", "Pretend play with stuffed animals", "Solitary, quiet play"]'
  career_goals: Even at three, Rosemary imagines herself as a caregiver who fills the world with gentle, colorful moments—dreaming of someday becoming a teacher who paints bright pictures for children or
    a nurturing helper who looks after animals. She aspires to bring joy and peace to those around her, hoping her future work will combine creativity, kindness, and an inclusive, stress‑free environment.
