  career_goals: Reinaldo aims to finish his high school diploma and then enroll in a vocational technical program, focusing on either information technology support or automotive/mechanical technology.
    He envisions obtaining certifications such as CompTIA A+ or an automotive service technician license, allowing him to secure a stable, structured career that offers clear responsibilities and advancement
    pathways. Long‑term, he hopes to combine his technical skills with entrepreneurial spirit by opening a community repair shop that serves both his neighborhood and local Mexican‑American families, providing
    reliable service while preserving cultural ties. He also values contributing to his family’s financial security and plans to use his earnings to support his younger siblings’ education.
