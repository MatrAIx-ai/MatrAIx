  career_goals: Jeremy imagines a future where he can combine his love of building and his desire to help living things. He often talks about becoming an engineer who designs useful gadgets or a veterinarian
    who cares for animals. His ambition is to work in a career that lets him solve practical problems, collaborate with others, and maintain a balanced, low‑stress lifestyle while continuing to learn new
    things.
