personas:
  professional: Jeremy Lemieux is an aspiring young inventor who constructs elaborate LEGO creations, experiments with hands‑on science kits, and designs simple Scratch games, weaving his curiosity and
    practicality into projects while his relaxed, sometimes disorganized approach adds a playful, improvisational flair.
  sports: Jeremy Lemieux is a forward for the Riverside Rangers Junior Soccer Club, bursts onto the local park for weekly pick‑up games, follows Manchester United in the Premier League with enthusiasm,
    and, while eager to train, often forgets to pack his shin guards, relying on teammates' reminders.
  arts: Jeremy Lemieux spends free hours sketching cartoons inspired by Charles M. Schulz’s Peanuts and Bill Watterson’s Calvin and Hobbes, while listening to upbeat pop tracks from Dua Lipa and Shawn Mendes,
    and occasionally creates simple digital drawings on his tablet, though his sketchbooks are a charming mix of detailed panels and scribbled‑out drafts.
  travel: Jeremy Lemieux loves weekend hikes in nearby Willow Creek State Park, remembers a sunny summer at Myrtle Beach, dreams of spotting Old Faithful in Yellowstone National Park and exploring the neon
    streets of Tokyo, preferring family‑planned trips that balance adventure with familiar comforts.
  culinary: Jeremy Lemieux enjoys pepperoni pizza, chicken nuggets, and macaroni‑and‑cheese, proudly assembles his own tacos with ground beef, shredded lettuce, cheddar, and salsa, can mix cupcake batter
    without burning it, yet often forgets the timing on toast, and always asks for extra strawberries on his breakfast cereal.
  core: Jeremy Lemieux is a curious, slightly disorganized 10‑year‑old who blends a love for building, science, and soccer with a gentle, worry‑prone heart, often juggling creative bursts with occasional
    forgetfulness.
background:
  cultural: Jeremy comes from a middle‑class, Midwestern family in Columbus, Ohio. His surname reflects a French‑Canadian ancestry, though his household primarily identifies as American and embraces typical
    U.S. traditions such as Thanksgiving, the Fourth of July, and local community events. He attends a public elementary school that emphasizes inclusivity and values education, kindness, and community
    involvement.
