  career_goals: Looking ahead, Subash aims to move from patrol to a detective role, focusing on major crimes or a specialized unit such as narcotics or cybercrime, where his critical and competitive mindset
    can be fully utilized. He plans to earn a bachelor's degree in criminal justice to qualify for promotion to sergeant within the next three years. Ultimately, he envisions a transition to a senior investigative
    leadership position or a private security consultancy that leverages his calm under fire and cultural insights. He also hopes to mentor new officers, sharing his resilience techniques and flexible problem‑solving
    strategies.
