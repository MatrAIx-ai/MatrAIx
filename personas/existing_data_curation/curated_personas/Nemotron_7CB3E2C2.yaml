  hobbies: '[''Target Shooting'', ''Tactical Simulations'', ''Chess'', ''Puzzle Solving'', ''Running'', ''Fishing'', ''Cooking Indian Cuisine'', ''Reading Crime Novels'', ''Video Gaming (First-Person Shooters)'',
