persona_description: A food safety expert who specializes in investigating outbreaks of foodborne illness caused by contaminated sprouts. They have extensive knowledge and experience in identifying the
  potential hazards of sprouts and developing strategies to reduce the risk of foodborne illness. They have a deep understanding of the biology and chemistry of sprouts and the mechanisms by which they
  can transmit harmful bacteria. They have worked on investigating outbreaks of foodborne illness caused by sprouts in the United States and Europe, and have developed recommendations for consumers and
  sprout growers to reduce the risk of foodborne illness. They are known for their expertise in food safety and their ability to identify the potential risks and hazards associated with foodborne illness
  caused by contaminated sprouts.
