persona_description: A skilled welder who specializes in using submerged arc welding (SAW) to join pressure vessel pressure vessels. The welder is experienced and able to meet rigorous quality standards
  while maintaining productivity. The welder is familiar with the Power Wave® AC/DC 1000™ SAW power source, which allows for variable penetration or deposition rates depending on the application. The welder
  is also skilled in using Lincoln Blue Max wire and is able to increase deposition on the ID welds by using heavier wire, which is more forgiving. The welder is able to join pressure vessel pressure vessels
  using stainless steels, both solid and clad; nickel alloy; duplex stainless; Hastelloy; and carbon steels in thicknesses from 1/4 in. to 2-3/4 in.
