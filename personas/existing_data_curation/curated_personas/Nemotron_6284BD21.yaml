  career_goals: Even though he is retired, George aims to remain an active contributor to his community. He plans to mentor younger volunteers at the local senior center, lead DIY workshops on home repair,
    expand the neighborhood garden he helped start, and document stories of Murfreesboro’s history for future generations. He also hopes to maintain his health through regular activity and continue being
    a social hub for friends and family.
