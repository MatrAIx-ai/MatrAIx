personas:
  professional: Marieo Scott, a retired community volunteer with a lifelong knack for orchestrating small‑scale events, leverages her meticulous organizational talent and disciplined work ethic to serve
    on local museum advisory boards, where her reserved yet collaborative style ensures programs run on schedule and reflect the nuanced histories she loves to research.
  sports: Marieo Scott enjoys low‑impact fitness such as morning walks in the Cleveland Metroparks and weekly yoga classes, while cheering on the Cleveland Browns, the Cavaliers, and the Guardians from
    her living room, and she occasionally joins a local senior softball league for friendly competition.
  arts: Marieo Scott spends quiet afternoons at the Cleveland Museum of Art while absorbing works by Kerry James Marshall and contemporary pieces, fills her home with the sounds of Miles Davis and Nina
    Simone, and participates in intimate book‑club discussions that often reference Maya Angelou's poetry.
  travel: Marieo Scott prefers well‑planned cultural trips, having visited Washington D.C.’s National Museum of History, the historic campus of Tuskegee Institute, and the vibrant jazz festival in New Orleans,
    while dreaming of a pilgrimage to the heritage districts of Charleston and Savannah, all balanced against her modest travel budget and family commitments.
  culinary: Marieo Scott experiments in the kitchen by re‑imagining collard greens with a dash of smoked paprika and quinoa, perfecting a low‑sugar sweet potato pie, and simmering herb‑infused chicken broth
    using rosemary, thyme, and kale, all while maintaining a love for occasional indulgent fried catfish and cornbread.
  core: Marieo Scott blends a meticulous, worry‑prone mind with a quiet passion for art, history, and garden‑to‑table cooking, turning her organized habits into community service, while occasionally letting
    stress drive her to over‑schedule and forget self‑care.
background:
  cultural: Marieo is a Black woman whose family participated in the Great Migration, moving from the rural South to Cleveland in the 1940s. She was raised in the city’s West Side, a vibrant hub of African
    American culture, faith, and community activism. Her upbringing was shaped by the strong ties of her church, where music, storytelling, and mutual support were central. She carries forward traditions
    of soulful cooking, oral history, and a deep respect for African American artistic expression. Over the decades, she has witnessed and contributed to Cleveland’s evolving cultural landscape, from civil‑rights
    marches to local jazz festivals. This heritage informs her values of resilience, community harmony, and a commitment to preserving and sharing the stories of her ancestors.
