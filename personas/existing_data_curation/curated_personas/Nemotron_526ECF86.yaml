  career_goals: He dreams of becoming an artist or animator who can bring his stories to life, perhaps designing video games or cartoons. He also enjoys helping his friends, so he imagines being a teacher
    or community leader who uses art to inspire others. In the near term, he aims to join after‑school art clubs, learn more about coding, and improve his soccer skills, seeing these as stepping stones
    toward a future where he can create and share joyful experiences.
