  career_goals: Carrie aims to progress from a general office clerk to an Office Manager or Administrative Supervisor within the next three to five years. She plans to earn a Bachelor's degree in Business
    Administration, complemented by a Certified Administrative Professional (CAP) credential. Her ambition includes leading a digitization project to replace paper filing with an electronic records system,
    creating stress-reduction initiatives for staff, and mentoring junior clerical team members. Long-term, she envisions establishing a small consulting practice that assists local non-profits in optimizing
    their office operations while maintaining a balanced, predictable work environment.
