personas:
  professional: Alberto Cuba, a retired community handyman and cultural storyteller, leverages fluency in Spanish and English, culinary expertise, and practical carpentry skills to mentor seniors at the
    local center, where his relaxed approach and insatiable curiosity turn workshops into lively, informal gatherings.
  sports: Alberto Cuba enjoys leisurely strolls through Pelham Bay Park, joins a friendly Sunday pick‑up basketball game at the Bronx recreation center, follows the New York Yankees and New York Knicks
    on TV, and participates in a community garden club that also meets for light exercise and socializing.
  arts: Alberto Cuba frequents the Bronx River Art Center’s exhibitions, admires murals by local artist David Choe, listens to recordings by Miles Davis and Celia Cruz, and contributes rhythmic claves and
    bongos to the church choir that performs works by beloved poets and classic composers, blending visual and musical arts into his daily life.
  travel: Alberto Cuba prefers low‑key travel that balances adventure and relaxation, often taking short train trips to the Hudson Valley, planning a cruise to the Caribbean island of his ancestors, and
    dreaming of exploring historic neighborhoods in Madrid and tasting wines in Tuscany, all while keeping expenses modest due to his fixed income.
  culinary: Alberto Cuba is an accomplished home cook who expertly prepares arroz con gandules, pasteles, and mofongo with fresh cilantro, achiote, plantains, and sofrito, delights in sharing these dishes
    at community potlucks, and occasionally leaves leftovers unrefrigerated, leading to harmless food waste.
  core: Alberto Cuba blends a quiet curiosity with a love for communal cooking, impromptu music, and storytelling, yet his habit of misplacing receipts and occasional over‑worry make his daily rhythm surprisingly
    unpredictable.
background:
  cultural: Alberto was born to Puerto Rican parents and grew up in the vibrant, multicultural environment of the Bronx. His upbringing was steeped in the traditions of Puerto Rican culture—Spanish language,
    Catholic faith, and a strong emphasis on family and community. He celebrates cultural holidays such as Three Kings' Day and the Puerto Rican Festival, and he actively preserves Puerto Rican culinary
    and musical heritage within his neighborhood. The Bronx's rich tapestry of Latin American influences, combined with his personal experiences of migration and adaptation, has shaped a bicultural identity
    that honors his island roots while embracing the diversity of his urban surroundings.
attributes:
  skills: '["Spanish-English bilingual communication", "Traditional Puerto Rican cooking", "Storytelling and oral history", "Basic carpentry and home repairs", "Urban gardening and horticulture", "Community
