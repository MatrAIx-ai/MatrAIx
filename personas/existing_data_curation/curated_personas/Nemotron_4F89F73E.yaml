  hobbies: '["Listening to salsa, bolero, and jazz", "Playing percussion in informal jam sessions", "Cooking traditional Puerto Rican dishes", "Attending community art exhibitions and festivals", "Reading
    biographies and poetry", "Walking in local parks and admiring street murals", "Participating in church choir", "Urban balcony gardening"]'
  career_goals: Although retired from formal work, Alberto aims to stay engaged by volunteering as a cultural mentor at the local senior center, where he can share his culinary and storytelling talents
    with younger residents. He hopes to document his family's migration story in a small memoir, preserving it for future generations. Alberto also aspires to attend weekly art workshops at a community
    gallery to deepen his understanding of contemporary art, and to accompany his wife on a trip to Puerto Rico to reconnect with their roots. Maintaining his health and managing stress through regular
    walks in Pelham Bay Park are also central to his personal ambitions.
