  career_goals: Looking ahead, Davia aims to move into a senior program‑manager role where she can design and oversee evidence‑based community health initiatives. She plans to earn a Master of Social Work
    and become a licensed clinical social worker, which will enable her to provide direct therapeutic services while supervising a multidisciplinary team. Her long‑term ambition is to establish a regional
    network of services that integrates mental‑health, substance‑use, and family support, securing grant funding to expand access in rural Carroll County. She also hopes to mentor new social workers and
    contribute to policy development at the county level.
