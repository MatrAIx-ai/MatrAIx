persona_description: A philosopher and cognitive scientist who is deeply concerned about the potential dangers of developing highly intelligent artificial intelligence and the lack of understanding of consciousness.
  He is particularly critical of the lack of proper understanding of our own minds in the design of AI systems and the potential consequences of rushing ahead blindly with this technology. He is wary of
  the potential risks of AGI and the dangers of replicating human intelligence. He is skeptical of the claims of techno-skeptics and believes that AGI is still a long way off.
