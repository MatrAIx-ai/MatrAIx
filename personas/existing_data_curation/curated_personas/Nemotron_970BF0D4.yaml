personas:
  professional: Cory Wade, a seasoned high‑speed packaging and filling machinery technician with three decades of hands‑on experience, they leverage their meticulous, organized approach and deep safety
    knowledge to keep production lines humming while mentoring new operators, coordinating shift schedules, and driving lean improvements, and they aim to move into a supervisory lead‑technician role, planning
    to earn a Six Sigma Green Belt and OSHA trainer certification within the next two years.
  sports: Cory Wade channels their competitive spirit into a local bowling league, weekend freshwater fishing on the Chesapeake Bay, regular target‑shooting at the county range, while cheering for the Baltimore
    Ravens in football and the Washington Capitals in hockey.
  arts: Cory Wade finds artistic fulfillment restoring vintage model trains and hand‑crafting custom wooden furniture, they unwind to classic rock legends like Led Zeppelin and folk storyteller Bob Dylan,
    and they occasionally attend community theatre productions at the local Arts Center.
  travel: Cory Wade prefers meticulously planned road trips to destinations such as the Outer Banks for fishing, the Pennsylvania Railroad Museum for train history, and the Appalachian Trail’s scenic overlooks,
    yet they dream of a short workshop tour in Germany’s Black Forest to master traditional woodworking techniques.
  culinary: Cory Wade enjoys simple, hearty meals like grilled Chesapeake perch seasoned with garden‑fresh dill, Maryland crab cakes made from locally sourced crab, and roasted root vegetables, they cook
    at an intermediate level and often pair their dishes with a craft IPA.
  core: Cory Wade embodies disciplined precision at work, frugal financial planning, vigilant health monitoring, quiet competitiveness, and a deep‑seated love for crafting and fishing that defines a methodical
    yet occasionally stress‑laden lifestyle.
background:
  cultural: Cory grew up in the Tidewater region of Virginia in a working‑class white family that emphasized hard work, self‑reliance, and close family bonds. After completing high school locally, he entered
    the manufacturing sector, a common career path in the Norfolk‑Suffolk‑Chesapeake area. His upbringing fostered a respect for Southern hospitality, participation in his Methodist church, and appreciation
    for regional traditions such as Chesapeake Bay seafood festivals and historic reenactments, reflecting the maritime and Civil War heritage of his community.
attributes:
  skills: '[''operating high-speed packaging machines'', ''preventive maintenance'', ''mechanical troubleshooting'', ''electronic troubleshooting'', ''quality control inspection'', ''safety compliance (OSHA)'',
