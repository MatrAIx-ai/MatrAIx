  hobbies: '[''woodworking'', ''model train restoration'', ''freshwater fishing'', ''bowling league'', ''target shooting'', ''gardening'', ''reading technical manuals'', ''volunteering at church youth group'']'
  career_goals: Cory aims to move into a supervisory or lead‑technician position where he can set operational standards, drive continuous‑improvement projects, and mentor younger staff. Over the next two
    years he plans to earn a Six Sigma Green Belt and an OSHA trainer certification to broaden his expertise in process improvement and workplace safety. He also seeks performance‑based bonuses that reflect
    his high standards and hopes to secure a stable early retirement for his family while leaving a legacy of efficiency and safety in his plant.
