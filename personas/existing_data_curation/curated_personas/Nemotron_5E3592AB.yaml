personas:
  professional: Mattea Salas, a budding junior artist and improvisational storyteller at preschool, channels boundless curiosity into vivid crayon sketches and spontaneous tales, yet they consistently resist
    tidying up and meeting any imposed schedule, preferring free‑form play over structured deadlines.
  sports: Mattea Salas, an energetic member of the "Tiny Turtles" preschool soccer club, idolizes FC Barcelona and the Chicago Cubs, dashes through playground games with relentless zeal, constantly competing
    to be the fastest runner, even when it means ignoring safety cues.
  arts: Mattea Salas is enchanted by Pixar’s Toy Story, the whimsical illustrations of Dr. Seuss, and the cheerful folk songs of Raffi, often reenacting movie scenes with stuffed animals while they hum
    "You Are My Sunshine" at every opportunity.
  travel: Mattea Salas dreams of a family road trip to the Grand Canyon, a magical visit to Disneyland Paris, and a sunny day building sandcastles on a Maui beach, preferring travel packed with snacks,
    frequent bathroom breaks, and scavenger‑hunt style adventures.
  culinary: Mattea Salas adores buttery peanut‑butter‑and‑jelly sandwiches, cheesy pepperoni pizza, and crisp apple slices, skillfully spreading jam with a plastic knife and insisting on ketchup on everything,
    yet they often protest eating vegetables and forget to finish their meals.
  core: Mattea Salas, a five‑year‑old whirlwind of curiosity, art‑loving imagination, and fierce competitiveness, constantly asks "why", hoards glitter stickers, frets over missing a beat, and refuses tidy
    routines.
background:
  cultural: 'Mattea is a white child raised in Eureka, a small town in Greenwood County, Kansas. Her family reflects typical Midwestern values: close‑knit community ties, appreciation for nature, and participation
    in local traditions such as county fairs, church gatherings, and school events. Her ancestry likely includes German, Irish, or Czech roots common in the region. Growing up, she has access to a public
    elementary school, a community library, and a local community center that offer art, music, and storytime programs. The surrounding farmland and open spaces nurture her curiosity about the natural world,
    while the supportive small‑town environment encourages her sociable and outgoing personality.'
