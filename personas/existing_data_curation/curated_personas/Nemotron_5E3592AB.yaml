  career_goals: Mattea dreams of becoming a vibrant artist who can paint bright worlds and share them with friends, and she imagines performing on stage as a singer or dancer. She also talks about wanting
    to be a teacher who helps other kids explore new ideas. Occasionally she mentions space exploration, reflecting her love of new concepts. Her competitive streak pushes her to aim to win the school talent
    show or be the fastest in a race, while her occasional worry makes her hope to be trusted and respected by peers and teachers.
