personas:
  professional: Osmin Algarin is a seasoned electrician who blends six years of residential wiring expertise with a burgeoning specialization in solar PV and smart‑home automation, leading crews with methodical
    precision, documenting every job per the National Electrical Code, and mentoring apprentices in both English and Spanish while quietly worrying about missing a detail that could compromise safety.
  sports: Osmin Algarin fuels their weekend adrenaline by playing forward for the Alamosa Thunder soccer league, cheering for the Colorado Rapids, and tackling the Sangre de Cristo trails with the local
    hiking club, a routine that balances competitive team spirit with solitary mountain climbs.
  arts: Osmin Algarin strums an acoustic guitar in a community folk ensemble that reinterprets traditional Mexican ballads alongside the songs of Lila Downs and Juan Gabriel, and they regularly attend Denver’s
    Red Rocks Amphitheatre shows featuring folk and indie acts like The Lumineers, letting music shape their evenings after a day’s work.
  travel: Osmin Algarin plans low‑budget road trips that weave through the Rocky Mountains, having hiked up to Crestone Peak, visited the turquoise waters of Lake Powell, and dreamt of exploring the ruins
    of Chichén Itzá, balancing wanderlust with a careful eye on fuel costs and limited vacation days.
  culinary: Osmin Algarin’s kitchen is a laboratory where classic tamales and chilaquiles meet Colorado lamb and heirloom corn, they love layering chipotle‑smoked pork with Pueblo green chile in a mole
    that whispers of home, and despite their meticulous planning they often forget to set the timer, leading to occasional burnt edges.
  core: Osmin Algarin is a methodical electrician and community volunteer whose restless curiosity for renewable tech, love for outdoor sports, and passion for folk music drive a disciplined yet worry‑prone
    lifestyle.
background:
  cultural: Osmin grew up in a Mexican-American household in Colorado. His parents emigrated from Jalisco, Mexico, and he was raised bilingual, speaking Spanish at home and English at school. He maintains
    strong ties to his Mexican heritage through celebrations of Día de los Muertos, Las Posadas, and family gatherings centered around traditional food and music. While embracing the outdoors-oriented lifestyle
    of Alamosa, he serves as a cultural bridge in his community, assisting Spanish‑speaking neighbors with navigating local services and sharing Mexican folk music at community events. The values of family
    solidarity, respect, and community service familiar in Mexican culture shape his cooperative and considerate nature.
attributes:
  skills: '["Residential wiring", "Commercial electrical installation", "Circuit troubleshooting", "NEC code compliance", "Solar photovoltaic system installation", "Smart home automation", "Electrical safety
    inspections", "Project planning and documentation", "Team leadership and mentorship", "Bilingual communication (Spanish/English)"]'
  hobbies: '["Hiking and trail exploration", "Community soccer league", "Playing acoustic guitar", "Cooking Mexican cuisine", "DIY electronics and home-improvement projects", "Reading about renewable energy
    and smart-home technology", "Volunteering for community electrical repairs", "Participating in cultural festivals and dancing"]'
  career_goals: Osmin aims to become a Master Electrician within the next four years and to earn a NABCEP PV Installation Professional certification, positioning himself as a specialist in renewable-energy
    retrofits. He plans to enroll in an associate-degree program in electrical engineering technology to deepen his technical foundation. Ultimately, he envisions launching his own contracting business
    that prioritizes energy-efficient upgrades and solar installations for homes throughout Alamosa County, while also offering free safety workshops for the local community. Achieving these goals will
    provide him with greater financial stability, reduce his long-term stress about job security, and allow him to support family members back in Mexico.
