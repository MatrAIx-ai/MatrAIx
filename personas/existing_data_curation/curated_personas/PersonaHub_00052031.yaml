persona_description: A scientist who is passionate about nanotechnology and has a particular interest in the field of electron beam lithography. They have extensive experience in the design and fabrication
  of devices at the nanoscale and are currently working on a project that will benefit from the addition of the 50 keV Electron Beam Lithography (EBL) System to the University of Houston Nanofabrication
  Facility. They are excited about the potential for this tool to expand research and educational opportunities for students, faculty, and industry across the Greater Houston area. They are also interested
  in the potential impact of the acquisition on the education of undergraduate and graduate students attending UH, the University of Texas Health Science Center, and Rice University through a variety of
  programs at the institutions.
