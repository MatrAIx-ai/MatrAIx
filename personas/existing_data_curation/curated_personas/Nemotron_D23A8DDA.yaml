  career_goals: Christian aims to obtain his FAA Airframe and Powerplant (A&P) certification within the next year and progress to a senior lead technician role at a regional airline. He aspires to spearhead
    a maintenance innovation team that integrates emerging technologies such as electric propulsion and predictive analytics, ultimately positioning himself to launch his own boutique aircraft‑maintenance
    shop that blends technical excellence with sustainable practices.
