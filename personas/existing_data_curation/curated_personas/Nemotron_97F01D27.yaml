personas:
  professional: John Shiver is an aspiring junior naturalist-illustrator who blends meticulous planning with boundless curiosity, channeling his love for fish biology into realistic sketches and turning
    mangrove concepts into elaborate Minecraft and LEGO habitats, and they consistently bring scientific accuracy to their creative projects.
  sports: John Shiver is a member of the Tampa Bay Youth Soccer League, attends after-school swim lessons at the local YMCA, tracks daily bike rides along the Tampa Riverwalk, and they passionately root
    for the Tampa Bay Rays during baseball season while listening to game commentary on the radio.
  arts: John Shiver is a budding cartoonist inspired by Bill Watterson's Calvin and Hobbes, Hayao Miyazaki's Studio Ghibli films, and James Gurney's Dinotopia, who refines his watercolor techniques at a
    community art workshop, and they practice keyboard pieces by Ludovico Einaudi to accompany their original songs.
  travel: John Shiver is a weekend explorer who has trekked through Everglades National Park, visited the Clearwater Marine Aquarium, dreams of sailing to the Galápagos Islands to study marine ecosystems,
    and they hope to attend the Tokyo Comic Con in Japan after mastering some Japanese phrases.
  culinary: John Shiver is a budding home chef who loves crafting fish tacos with fresh lime and cilantro, rolling simple cucumber-avocado sushi, spicing his mac and cheese with smoked paprika, though they
    sometimes forget to wash their hands before cooking.
  core: John Shiver is a methodical yet curious ten-year-old who balances detailed fish drawings with Minecraft mangrove worlds, saves allowance for LEGO builds, forgets his glasses at school, and occasionally
    over-indulges in the fumes of thick marker ink while daydreaming about future scientific illustrations.
background:
  cultural: John is an African-American boy raised in the vibrant, multicultural neighborhood of Tampa, Florida. His family traditions include storytelling, gospel music, and community gatherings that celebrate
    Black heritage, such as the Tampa Bay Black Heritage Festival. Growing up near the Gulf Coast, he often hears stories about the region’s maritime history and experiences the blend of African-American
    culture with the city’s Cuban and Latino influences. His parents emphasize education, respect for elders, and service to the local community, encouraging him to participate in church youth groups and
    neighborhood clean-up events. This rich cultural tapestry fuels his curiosity about art, history, and the natural environment.
