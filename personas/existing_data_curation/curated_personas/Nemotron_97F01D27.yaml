    practice'']'
  career_goals: John envisions a future where he can blend his love for art and science. He hopes to become a marine-focused illustrator or an environmental educator who creates vivid visual stories about
    the Gulf Coast’s ecosystems. He also dreams of studying marine biology to help protect local waters, and imagines using his organizational skills to lead community science projects for kids. Ultimately,
    he wants a career that lets him explore new ideas, share his creativity, and make a positive impact on his community.
