personas:
  professional: Caroll Clifton, a three‑year‑old budding architect who meticulously assembles LEGO towers using simple hand‑drawn blueprints, channels their curiosity for new ideas into elaborate play structures,
    and follows a strict daily schedule to ensure each project is completed before snack time, revealing a competitive streak that pushes them to finish ahead of peers.
  sports: Caroll Clifton, a member of the neighborhood Mini‑Tigers soccer club who idolizes the local professional team City FC, spends afternoons dribbling a size‑3 ball, favors solo skill drills over
    large group scrimmages, and competes fiercely in the weekly toddler dash at the playground, often striving to be the first to cross the finish line.
  arts: Caroll Clifton, an avid collector of Crayola crayons who spends hours drawing abstract shapes inspired by Yayoi Kusama and listening to Baby Mozart recordings, enjoys quiet art sessions at the easel
    with a favorite playlist of "Twinkle, Twinkle Little Star," and shows a deep appreciation for both classic children’s songs and modern visual art.
  travel: Caroll Clifton, a tiny explorer who has visited the interactive Children’s Museum in Chicago, the sunny beaches of Clearwater, Florida, and dreams of seeing the giant pandas at Chengdu, plans
    each trip with a coloring‑book itinerary, and insists on bringing a familiar stuffed rabbit for comfort during new adventures.
  culinary: Caroll Clifton, a picky eater who loves buttery macaroni and cheese, crunchy apple slices with almond butter, and homemade chicken nuggets seasoned with rosemary, while refusing blended vegetables,
    often negotiates an extra serving of fruit to finish meals and delights in helping stir batter with a tiny wooden spoon.
  core: Caroll Clifton, a three‑year‑old who blends high curiosity with meticulous planning, competes aggressively even in play, and carries a constant undercurrent of worry that shapes every adventure
    into a tightly organized quest.
background:
  cultural: Caroll is raised in a white, middle‑class family in Hayward, Wisconsin, a small town known for its lakes, forests, and outdoor recreation. Her family celebrates traditional Midwestern holidays
    such as Thanksgiving and Christmas, often with communal meals and local church gatherings. She is exposed to the region’s cultural emphasis on nature, fishing, and hunting, and she occasionally joins
    family trips to the nearby Chequamegon‑Nicolet National Forest. The community’s values of self‑reliance, modesty, and neighborly cooperation shape her upbringing, while her parents encourage a love
    for art and curiosity about the natural world.
