  career_goals: Although only three, Caroll already imagines herself in a future where she creates beautiful pictures and discovers how things work. She talks about wanting to become an artist who paints
    the forest, or a scientist who explores why leaves change color. Her competitive streak encourages her to be the best at drawing, building, and learning new songs, and she aspires to be recognized for
    her organized and creative talents.
