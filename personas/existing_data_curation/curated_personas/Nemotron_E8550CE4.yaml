  career_goals: Patrick aims to transition into a senior product development role where he can lead interdisciplinary teams to create innovative, sustainable consumer products that marry form and function.
    He hopes to earn his Professional Engineer (PE) license within the next three years, deepen his expertise in sustainable design, and eventually launch his own boutique engineering consultancy that offers
    flexible, creativity‑focused solutions for startups. Balancing his desire for flexibility, he seeks positions that allow for autonomous project work and opportunities to explore emerging technologies,
    while also prioritizing better stress management and work‑life balance.
