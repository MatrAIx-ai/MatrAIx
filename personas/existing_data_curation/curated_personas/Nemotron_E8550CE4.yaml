personas:
  professional: Patrick Cooksey, a 38‑year‑old mechanical engineer with expertise in CAD and Python, blends his systems‑thinking rigor with an artist’s eye, leading small interdisciplinary teams on sustainable
    product prototypes while preferring fluid project structures over strict timelines.
  sports: Patrick Cooksey cycles with the Detroit Cycling Club on weekend trail rides, hikes the Porcupine Mountains in the off‑season, and roots for the Detroit Lions, while maintaining a modest home gym
    for bodyweight workouts despite often skipping scheduled training sessions.
  arts: Patrick Cooksey curates his evenings with street‑art tours of Eastern Market, captures Detroit’s industrial architecture through a Nikon Z6, strums acoustic renditions of John Mayer and Joni Mitchell
    at intimate open‑mic nights, and draws inspiration from the works of Tyree Guyton and photographer Andreas Gursky.
  travel: Patrick Cooksey plans spur‑of‑the‑moment getaways to places like Mackinac Island, the art‑laden town of Marfa, and the misty forests of the Pacific Northwest, favoring road trips that blend hiking,
    local gallery visits, and affordable camping over elaborate itineraries, though budget constraints sometimes curtail longer overseas trips.
  culinary: Patrick Cooksey experiments with dishes such as rosemary‑infused grilled salmon, smoked paprika‑spiced sweet potatoes, and homemade sourdough focaccia, wielding a decent command of sous‑vide
    and cast‑iron skillet techniques while occasionally burning the edges of their culinary creations during late‑night recipe trials.
  core: Patrick Cooksey is a curiosity‑driven engineer‑artist who balances sustainable product dreams with a habit of late‑night tinkering, occasional disorganization, and a lingering worry about meeting
    both creative and professional expectations.
background:
  cultural: Patrick grew up in a middle‑class suburban family in Oakland County, Michigan, with Anglo‑American roots tracing back to English and German ancestors. The Midwestern values of hard work, community
    friendliness, and modesty shaped his upbringing, while the region’s rich automotive and manufacturing heritage sparked his early interest in engineering. Exposure to Detroit’s vibrant music and contemporary
    art scenes broadened his cultural palate, fostering an appreciation for both traditional American holidays and global artistic expressions. He identifies with the regional culture of loyalty to local
    sports teams, love of the outdoors, and a growing embrace of creative, tech‑driven subcultures.
