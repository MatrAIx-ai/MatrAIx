persona_description: A legal historian who is interested in exploring the intersection of race, law, and activism in the United States. She is particularly interested in the experiences of African American
  activists in major American cities and how their struggles intersect with legal and social movements. She is interested in analyzing the role of teachers, real estate agents, students, shopowners, and
  single mothers in the civil rights movement and how they influenced the legal and racial geography of Atlanta. She is also interested in the competing demands of the legal profession and the power of
  social movements in the postwar struggle for racial equality.
