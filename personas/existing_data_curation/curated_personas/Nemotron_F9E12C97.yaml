personas:
  professional: Mary Jones is a methodical engineering technologist who leverages their expertise in SolidWorks CAD modeling, PLC programming, and lean process optimization to design sustainable manufacturing
    systems, habitually drafting thorough documentation with the precision that reflects their love of structure, while occasionally wrestling with a perfectionist tendency to over‑engineer solutions.
  sports: Mary Jones jogs three times a week along the Birmingham Riverwalk, is a member of the Birmingham Trail Runners club, hikes the oak‑covered paths of Oak Mountain State Park each month, roots for
    the Alabama Crimson Tide football team and the Birmingham Barons baseball squad, and balances their structured workout routine with spontaneous weekend bike rides.
  arts: Mary Jones enriches their evenings by singing in their church choir, devotes weekends to reading works by Toni Morrison and James Baldwin, attends live performances of August Wilson's plays at local
    theaters, and collects vinyl records of Aretha Franklin, Nina Simone, and contemporary painter Amy Sherald's portraits, allowing the arts to fuel both their creative cooking experiments and community
    engagement.
  travel: Mary Jones plans trips months in advance, favoring road‑trip itineraries that blend cultural immersion and outdoor adventure; they have explored the historic French Quarter of New Orleans, hiked
    the Blue Ridge Parkway, dream of wandering Kyoto's Zen gardens for inspiration, and balance their limited vacation budget by choosing affordable domestic getaways over costly overseas flights.
  culinary: Mary Jones treats their kitchen as a laboratory, skillfully preparing Southern comfort dishes like shrimp‑and‑grits infused with miso, collard greens sautéed with smoked paprika, and buttermilk
    biscuits laced with jalapeño cheddar, while regularly experimenting with heirloom tomatoes, sweet potatoes, and fresh basil to create a modern twist on classic flavors.
  core: Mary Jones blends structured engineering precision with a love for Southern‑inspired cooking, community volunteering, and disciplined fitness, yet battles a perfectionist streak that sometimes leads
    to late‑night CAD revisions and occasional neglect of self‑care.
background:
  cultural: Mary’s cultural roots are deeply tied to the African‑American community of Birmingham, a city with a rich civil‑rights legacy. Raised by parents who emphasized both education and community service,
    she grew up attending church events, family gatherings featuring soulful music, and neighborhood barbecues that celebrated shared heritage. Her grandparents participated in the 1960s movement for equality,
    instilling in her a sense of resilience and pride. These experiences shape her values of teamwork, mentorship, and a commitment to giving back, while her Southern upbringing influences her love for
    food, hospitality, and the natural environment.
attributes:
  skills: '[''CAD modeling (SolidWorks)'', ''PLC programming and troubleshooting'', ''Electrical schematics and wiring'', ''Mechanical system design'', ''Process optimization (Lean Manufacturing)'', ''Quality
    control and inspection'', ''Technical documentation'', ''Safety compliance (OSHA)'', ''Data analysis for performance metrics'', ''Cross‑functional team coordination'']'
  hobbies: '[''Southern cooking and recipe development'', ''Gardening (heirloom vegetables and native plants)'', ''Jogging and hiking'', ''Reading historical fiction and African‑American literature'', ''STEM
    outreach volunteering'', ''Church choir participation'']'
  career_goals: Mary aims to become a senior engineering technologist overseeing a major manufacturing line, where she can implement sustainable design practices and lead continuous‑improvement initiatives.
    She intends to earn professional certification as an Engineering Technologist (PE) and pursue advanced training in renewable energy systems. Long‑term, she aspires to mentor emerging Black women in
    STEM, develop outreach programs in Birmingham schools, and eventually influence corporate policy on diversity and inclusive engineering leadership.
