  hobbies: '["community gardening", "reading business biographies", "listening to jazz and blues", "watching Chicago sports teams", "playing chess", "woodworking", "cooking soul-food recipes", "attending
    church events", "participating in local cultural festivals", "walking the lakefront"]'
  career_goals: James aims to transition from senior sales associate to store manager within two years, using his organizational talent to boost operational efficiency and staff performance. In the longer
    term, he aspires to become a district manager overseeing several locations, where he can implement standardized best-practice frameworks and mentor emerging Black retail professionals. He plans to earn
    a Retail Management Professional certification, build a modest retirement fund, and eventually open a community-focused grocery or convenience store that serves his neighborhood and provides job training
    opportunities for local youth.
