persona_description: A theologian who specializes in Trinitarian theology and has written extensively on the nature, role, and relationship of the three persons of the Trinity. Their writings on the trinity
  are often considered authoritative and influential in the Christian tradition. They are particularly known for their defense of the trinity against Oneness and Modalist interpretations, and for their
  contributions to the understanding of the nature and relationship of the three persons of the Trinity. They are likely to be interested in the debate between the Oneness and Modalist interpretations of
  the Trinity, and in the history and development of Trinitarian theology.
