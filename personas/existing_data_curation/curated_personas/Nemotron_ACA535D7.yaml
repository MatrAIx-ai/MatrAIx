personas:
  professional: Sonya Morgan, a seasoned humanities teaching assistant transitioning to a part‑time adjunct professor, channels their analytical skepticism and love of solitary deep‑dive research into crafting
    interdisciplinary art‑history‑philosophy courses, while they embrace a relaxed attitude toward obligations that lets them improvise lesson plans on the fly, even if it sometimes leaves paperwork a bit
    chaotic.
  sports: Sonya Morgan enjoys low‑impact fitness through weekly walking groups at the West Bloomfield Nature Preserve, roots for the Detroit Tigers during baseball season, and, despite their competitive
    chess streak, they prefer leisurely spectating the Detroit Red Wings rather than intense physical workouts.
  arts: Sonya Morgan immerses herself in the works of Monet, O’Keeffe, and Edward Hopper, frequently reproducing their palettes in her watercolors, while they attend local poetry circles featuring voices
    like Naomi Shihab Nye and listen to classical piano recitals by Lang Lang to fuel their creative spirit.
  travel: Sonya Morgan favors low‑key, museum‑centric getaways, often planning weekend trips to historic sites like the Frank Lloyd Wright‑designed Taliesin estate in Wisconsin or the French Quarter in
    New Orleans, and while they rarely draft elaborate itineraries, they meticulously map out the art galleries they’ll explore before departure.
  culinary: Sonya Morgan enjoys home‑cooked, herb‑forward meals—like a quinoa and heirloom tomato salad dressed with basil and lemon zest or rosemary‑roasted potatoes paired with lavender‑infused shortbread—yet
    they occasionally treat themselves to a dinner at Detroit’s Selden Standard for hand‑made tagliatelle with wild mushroom ragù.
  core: Sonya Morgan blends scholarly skepticism with a quiet competitive streak, crafting interdisciplinary art‑philosophy lessons while they habitually misplace their sketchbook and opt for loose calendars
    over strict schedules.
background:
  cultural: Sonya is a white Midwesterner raised in the Detroit metropolitan area during the post‑war era. Her family emphasized education, community involvement, and an appreciation for cultural institutions
    like the Detroit Institute of Arts, which sparked her lifelong love of visual culture. Growing up in a predominantly suburban environment, she internalized the region’s value of independence and self‑reliance
    while also developing an openness to diverse artistic expressions through museum visits and local arts festivals. Now residing in West Bloomfield, an affluent suburb with strong public schools and a
    vibrant cultural scene, she continues to engage with both the broader community and intimate gatherings, balancing her reserved nature with a curiosity for new ideas and unconventional thinking.
attributes:
  skills: '[''Curriculum Design Support'', ''Academic Writing Coaching'', ''Small-Group Facilitation'', ''Art History Expertise'', ''Educational Technology Integration'', ''Community Arts Program Development'']'
  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Reading art history and philosophy'', ''Photography of local architecture'', ''Gardening'', ''Playing chess'',
    ''Writing memoirs'', ''Attending small-group poetry readings'', ''Participating in community arts workshops'', ''Traveling to historic sites'']'
  career_goals: Sonya aims to transition her extensive teaching‑assistant background into a part‑time adjunct faculty position where she can design and teach an interdisciplinary course blending art history
    with philosophical inquiry. She intends to develop a community arts outreach initiative that offers guided museum visits and hands‑on workshops for senior residents of West Bloomfield and nearby neighborhoods.
    To stay current, she plans to earn a certificate in digital humanities, integrating new media tools into her pedagogy, and to author a scholarly article exploring the relationship between visual art
    and existential thought in early‑20th‑century American painters. Her long‑term ambition is to mentor emerging humanities educators, foster a sustainable local arts program, and leave a lasting educational
    legacy while maintaining a flexible schedule that respects her preference for low‑key obligations.
