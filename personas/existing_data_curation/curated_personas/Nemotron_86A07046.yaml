  career_goals: As she approaches retirement, Stephanie aims to transition into a lead‑stocker or assistant supervisor role within the next two years, where she can formalize her training program for new
    hires and spearhead efficiency initiatives. She plans to earn a certification in supply‑chain operations to deepen her expertise and strengthen her résumé. Beyond the workplace, Stephanie aspires to
    volunteer as a docent at the local historical museum and to help organize a monthly art‑showcase for senior artisans in Chehalis, blending her professional discipline with her passion for the arts.
