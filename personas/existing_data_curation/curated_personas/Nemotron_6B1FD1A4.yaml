  hobbies: '[''Reading (educational psychology, non‑fiction)'', ''Gardening'', ''Hiking'', ''Chess'', ''Bread baking'', ''Volunteer tutoring in small groups'', ''Local history research'']'
  career_goals: Raleigh aims to expand his impact by establishing a small, community‑focused tutoring center in Wake County that emphasizes evidence‑based methods and individualized support. He plans to
    pursue a master’s degree in Educational Leadership to strengthen his administrative skills, with a long‑term goal of becoming an educational consultant who designs curricula for schools serving diverse
    learners. Additionally, he hopes to author a guidebook on practical tutoring techniques for parents and educators.
