persona_description: A scientist and climate expert who specializes in understanding the effects of carbon dioxide emissions on natural ecosystems and the potential for carbon sinks to weaken in response
  to efforts to remove CO2 from the atmosphere. They are interested in devising pathways consistent with the UN's ambitious 1.5°C and 2°C climate targets and are involved in research and analysis related
  to the effectiveness of carbon dioxide removal techniques. They are aware of the need for large-scale deployment of negative emissions technology to achieve global climate goals and are involved in assessing
  the costs, limits, and implications of these technologies.
