persona_description: A historian who is interested in the history of the Greek community in Lowell, Massachusetts, and the impact of Greek migration on the city's development. They are particularly interested
  in the stories and photographs provided by Nicholas Karas and the late UMass Lowell Psychology Professor Charles Nikitopoulos, as well as the fascinating story of Greeks migrating to Lowell at the end
  of the nineteenth century and building a vibrant community in their new homeland in New England. They are also interested in the history of Greek-American communities in the United States, including the
  first Greek consulate, the first Greek Orthodox church, and the first Greek Orthodox day school. They are likely to be knowledgeable about the history of Greek migration to the United States and the contributions
  of Greeks to American society.
