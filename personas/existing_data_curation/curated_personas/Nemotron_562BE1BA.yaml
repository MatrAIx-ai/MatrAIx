  hobbies: '["Playing bridge with friends", "Attending church choir rehearsals", "Volunteering at the local food bank", "Gardening (herbs and tomatoes)", "Listening to jazz and blues music", "Cooking Southern
    cuisine with Tex‑Mex influences", "Traveling to historic African‑American sites", "Participating in senior debate clubs", "Engaging in community festivals"]'
  career_goals: Although retired, Charles aims to remain a vibrant voice in the local business community by mentoring young Black entrepreneurs and serving on the board of a nonprofit that supports minority‑owned
    startups. He hopes to author a memoir that blends his business insights with personal stories from the Civil Rights era, thereby preserving cultural heritage for future generations. Additionally, he
    aspires to travel with his wife to historic African‑American sites across the South, while maintaining his health and emotional well‑being through regular social engagement.
