personas:
  professional: Jose Martinez, an aspiring game designer and digital artist at age 13, leverages his love for strategy video games and meticulous model kit assembly to craft intricate level concepts in
    his quiet bedroom, and while they enjoy the freedom of solitary creation, they sometimes let school assignments slip due to their relaxed stance on obligations.
  sports: Jose Martinez follows the Los Angeles Lakers and the Seattle Seahawks on TV, and though they prefer watching games from the solitude of their bedroom, they occasionally attend the neighborhood
    YMCA’s Saturday morning basketball club to stay active, balancing a laid‑back fitness routine with a preference for structured solo workouts like push‑ups and stretching.
  arts: Jose Martinez immerses themselves in creative worlds by sketching digital art inspired by Ross Tran, strumming acoustic renditions of John Mayer and Ed Sheeran songs from YouTube tutorials, and
    devouring fantasy epics by Brandon Sanderson and Ursula K. Le Guin, which together shape a solitary yet vivid artistic identity.
  travel: Jose Martinez enjoys meticulously planned family trips to places like the National Air and Space Museum in Washington, D.C., and the USS Midway Museum in San Diego, while dreaming of a solo adventure
    to the tech districts of Tokyo and the volcanic landscapes of Iceland, balancing a love for predictable itineraries with a yearning for quiet, off‑beat exploration.
  culinary: Jose Martinez, a novice cook who enjoys watching cooking shows featuring Central American flavors, frequently attempts simple dishes like nacatamales made with corn masa and plantains or gallo
    pinto seasoned with cilantro and onions, and they delight in experimenting with fresh herbs while often forgetting to clean up the kitchen promptly.
  core: Jose Martinez is a meticulously curious teen who blends solo strategy gaming with digital art and guitar practice, savors structured routines yet embraces occasional disarray, and quietly navigates
    life’s challenges with a mix of practicality, compassion, and a penchant for solitary creativity.
background:
  cultural: Jose's family maintains strong ties to Nicaraguan culture while living in Miami's vibrant Latino community. He speaks Spanish at home and celebrates traditional holidays such as La Purísima
    and Fiesta de San Juan, where he enjoys family gatherings featuring dishes like gallo pinto and nacatamales. The multicultural environment of Miami exposes him to diverse music, food, and art, influencing
    his appreciation for both his heritage and broader American culture. He often helps his grandparents with Spanish‑language correspondence, reinforcing his bilingual abilities.
