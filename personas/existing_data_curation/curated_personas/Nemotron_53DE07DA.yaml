personas:
  professional: Shahla Terrell is a veteran IT network administrator and cybersecurity specialist who blends a routine‑driven, detail‑oriented mindset with a competitive edge to design repeatable processes,
    meticulously document solutions for both technical staff and senior users, and lead small project teams while they passionately deliver digital security workshops to seniors at the public library.
  sports: Shahla Terrell enjoys low‑impact cardio, strolling the trails of Cuyahoga Valley National Park as a regular member of the Cleveland Hiking Club, roots for the Cleveland Browns, Guardians, and
    Cavaliers, and dabbles in community pickleball leagues each summer, all while they approach fitness with a pragmatic schedule that mirrors their professional routines.
  arts: Shahla Terrell channels their artistic curiosity through a weekly women’s book club where they dissect novels by Toni Morrison and classic works by Jane Austen, and they regularly attend community
    theater productions of 'Our Town' and 'The Glass Menagerie,' while also listening to folk music from Gillian Welch and savoring classic films directed by Alfred Hitchcock.
  travel: Shahla Terrell plans trips with the same checklist mindset they use at work, favoring well‑structured weekend getaways to nearby destinations like Mackinac Island and Niagara Falls, while they
    dream of a slow‑paced road trip along Route 66 and a cultural tour of Edinburgh, balancing a modest travel budget with occasional splurges on boutique B&Bs.
  culinary: Shahla Terrell delights in cooking traditional Midwestern comfort foods such as chicken pot pie, homemade cornbread, and apple crisp, skillfully incorporating fresh tomatoes, beans, and kale
    harvested from their garden, yet they occasionally over‑salt dishes in a quest for bold flavor and they relish hosting potluck dinners that showcase seasonal produce.
  core: Shahla Terrell orchestrates their days like a well‑documented network, balancing meticulous spreadsheets, weekly bridge tournaments, and garden‑fresh meals, while they remain stubbornly skeptical
    of flashy tech and occasionally over‑cook to impress friends.
background:
  cultural: Shahla is a White Midwestern American who grew up in suburban Ohio, with family roots in farming and manufacturing that instilled a strong work ethic and appreciation for practical solutions.
    The local culture emphasizes community involvement, reliability, and modesty, values she carries in both her professional and personal life. She is active in her church and participates in civic events
    such as the annual fall harvest festival, reflecting a deep connection to regional traditions. Her upbringing in Independence, Ohio, has shaped a worldview that balances individual responsibility with
    a commitment to volunteer service and neighborly support.
