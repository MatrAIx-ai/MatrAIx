personas:
  professional: Holly Cimaglia, an aspiring junior game developer, blends her love for soccer strategy and storytelling by designing interactive Scratch projects that let players manage a virtual team while
    practicing coding logic and narrative pacing.
  sports: Holly Cimaglia thrives on the school soccer field, captaining the varsity team and training twice weekly, also attending contemporary dance classes for flexibility, while cheering for the local
    MLS club, the Metro United, and avidly following the US Women’s National Soccer Team; she balances her athletic routine with seasonal track meets and a membership at the community swimming pool.
  arts: Holly Cimaglia expresses creativity through friendship bracelets, scrapbook collages, and digital animation, drawing inspiration from Studio Ghibli’s films, the music of Ariana Grande, and the whimsical
    world of J.K. Rowling’s Harry Potter series, which also fuels her love for fantasy storytelling in her Scratch games.
  travel: Holly Cimaglia dreams of visiting the Harry Potter studio tour in London, a family road trip to Niagara Falls, and an adventure camping weekend in the Great Smoky Mountains, preferring a mix of
    structured itineraries with spontaneous nature hikes when time and parental budgets allow.
  culinary: Holly Cimaglia loves homemade pepperoni pizza, mango‑smoothie bowls sprinkled with granola, and crafting her own trail‑mix snack with dried cranberries, roasted almonds, and dark‑chocolate chips,
    often experimenting with simple no‑bake energy bites after soccer practice.
  core: Holly Cimaglia is a structure‑loving, socially vibrant 11‑year‑old who channels worry into creativity, balancing organized soccer tactics with spontaneous crafting, while occasionally overindulging
    in impulse purchases and snack cravings.
background:
  cultural: Raised in a suburban neighborhood of Raleigh, North Carolina, Holly’s family reflects a middle‑class, predominantly white American background typical of the area. She participates in local traditions
    such as celebrating Thanksgiving with family meals, attending the NC State Fair, and enjoying community sports leagues. The diverse community of the Research Triangle exposes her to a mix of cultural
    influences, while her upbringing emphasizes education, community involvement, and outdoor activities.
