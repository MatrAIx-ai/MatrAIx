  career_goals: She aspires to become a veterinarian, motivated by her love for animals and desire to care for them. She plans to focus on science and biology classes, seek volunteer opportunities at local
    animal shelters, and eventually pursue a veterinary degree. Holly also hopes to mentor younger students in STEM clubs and lead community projects that promote pet safety and adoption.
