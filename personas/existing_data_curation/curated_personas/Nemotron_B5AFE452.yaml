  career_goals: Kathi aims to transition from being a solo driver to owning a small, independently operated taxi fleet in Cecil County. She plans to acquire additional vehicles, develop a structured dispatch
    system, and train new drivers using her methodical approach. Her goal is to achieve financial stability and reduce stress by scheduling consistent shifts and possibly moving into a supervisory or logistics
    role within the local transportation network. Long‑term, she envisions establishing a community‑focused transportation service that caters to seniors and disabled residents, leveraging her knowledge
    of local routes and her commitment to reliable service.
