  faster and more accurately than other tools. They are looking for a comprehensive and automated workflow process that can streamline the simulation and optimization process for their projects. This persona
  is likely to be interested in attending Altair's webinar on how to use the Virtual Wind Tunnel for an external aerodynamics simulation and may be interested in learning more about Altair's open architecture
  HyperWorks CAE simulation suite.
