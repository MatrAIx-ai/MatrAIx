  career_goals: Erick aims to become a Customer Service Team Lead within the next two years, leveraging his reliability and planning skills to mentor newer agents. He plans to obtain a Certified Customer
    Service Professional credential and later transition into a quality‑assurance or user‑experience role where his artistic curiosity can shape service design. Long‑term, he hopes to earn an associate
    degree in graphic design and lead community art‑outreach initiatives that combine his professional expertise with his love for creative expression.
