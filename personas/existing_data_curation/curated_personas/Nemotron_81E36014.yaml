  hobbies: '[''Traditional Peruvian cooking'', ''Gardening (vegetables & herbs)'', ''Fishing in Biscayne Bay'', ''Playing dominoes and card games'', ''Watching soccer matches'', ''Attending local cultural
    festivals'', ''Volunteer work at senior center'', ''Walking and light hiking'', ''Reading historical biographies'', ''Salsa dancing'']'
  career_goals: Although Carlos is no longer part of the formal workforce, he remains goal‑oriented and seeks to channel his experience into meaningful community involvement and a modest entrepreneurial
    venture. His primary ambition is to formalize his volunteer role at the local senior center, eventually becoming a senior‑program coordinator where he can mentor other retirees and help newcomers navigate
    immigration resources. He also hopes to launch a home‑based catering service that showcases authentic Peruvian recipes for small events and cultural festivals in Miami. Maintaining his health through
    regular walking, gardening, and occasional fishing trips is a personal priority, as is planning a family trip back to Peru to reconnect with his hometown before he reaches his seventies.
