personas:
  professional: Carlos Santiago, a seasoned community volunteer turned aspiring senior‑program coordinator, leverages their practical home‑maintenance know‑how and they apply their organized mindset to
    coordinate senior‑center programs while also laying the groundwork for a modest home‑based catering business showcasing authentic high‑altitude recipes.
  sports: Carlos Santiago, an avid soccer enthusiast, follows their homeland’s national team and local Inter Miami CF, joins weekend pick‑up games at the community field, and they stay fit through daily
    walks, gardening, and occasional fishing trips on Biscayne Bay, embodying their structured yet social approach to fitness.
  arts: Carlos Santiago, a lively participant in salsa nights, sways to the rhythms of Celia Cruz and Marc Anthony, celebrates traditional Andes folk music by Los Kjarkas at cultural festivals, and they
    appreciate vibrant paintings by Fernando de Szyszlo, reflecting their love for community‑centered artistic expression.
  travel: Carlos Santiago, who favors well‑planned, budget‑conscious trips, enjoys weekend getaways to the Florida Keys and occasional cruises to the Bahamas, and they eagerly anticipate a family pilgrimage
    to the mountain village where they grew up before turning seventy, blending their structured planning with a desire for cultural reconnection.
  culinary: Carlos Santiago, an accomplished home cook, masterfully prepares ceviche, ají de gallina, and causa with fresh cilantro, aji amarillo, and quinoa, often adding inventive twists like mango‑pico
    de gallo, and they relish sharing these meals at community potlucks and aspire to feature them in a home‑based catering venture.
  core: Carlos Santiago blends meticulous organization with spontaneous garden experiments, often forgetting to water their herbs while never missing a Sunday salsa dance, a quirk that underscores how they
    balance structure with lively social moments.
background:
  cultural: Carlos was born in the highland region of Peru, where family gatherings, Catholic celebrations, and the rhythms of Andean music shaped his early worldview. He emigrated to the United States
    in his early thirties, settling in Miami’s vibrant multicultural district. Over the past three decades, he has blended his Peruvian heritage with the diverse influences of South Florida, maintaining
    fluency in Spanish while adopting English for daily life. He remains actively involved in the local Peruvian diaspora, participating in traditional celebrations such as Fiesta de la Candelaria, sharing
    home‑cooked meals, and supporting newer immigrants. At the same time, he embraces the broader Miami community, attending salsa events, volunteering at multicultural senior centers, and celebrating American
    holidays with his family. His identity is anchored in a respect for family, community harmony, and the practical values of hard work and adaptability learned both in Peru and in his adopted home.
attributes:
