personas:
  professional: Donald Wray, a 45‑year‑old audiovisual installation specialist, leverages two decades of hands‑on expertise in sound reinforcement, digital signage, and networked AV systems, applying his
    love of meticulous documentation and cable‑management precision to keep projects on schedule while his reserved yet assertive demeanor guides junior technicians toward reliability.
  sports: Donald Wray, a devoted fan of the Green Bay Packers, spends Saturdays cheering on the team, joins a local amateur golf club for weekend rounds, fits in early‑morning jogs along the lake, and heads
    out on seasonal fishing trips on Lake Michigan, while occasionally playing pickup basketball with his church crew.
  arts: Donald Wray nurtures his creative side by volunteering with his church’s tech crew at high‑school theater productions, where he admires the lighting designs of Lin‑Manuel Miranda, fills his evenings
    with classic rock from Led Zeppelin and Neil Young, and enjoys rewatching movies starring Tom Hanks for a touch of nostalgia.
  travel: Donald Wray plans his trips with spreadsheet precision, favoring low‑key, family‑oriented road trips to national parks such as Yellowstone and the Grand Canyon, while his bucket list includes
    a meticulously scheduled two‑week adventure to New Zealand’s South Island to fish its famous trout and capture its dramatic fjords.
  culinary: Donald Wray enjoys moderate‑skill home cooking, often grilling fresh lake trout with lemon‑dill butter or slow‑cooking smoked pork ribs using a dry rub of brown sugar, paprika, and garlic, and
    he proudly crafts a handcrafted wooden cheese board for his favorite cheddar, gouda, and assorted charcuterie.
  core: Donald Wray is a methodical, hands‑on problem‑solver who channels his love for precise AV installations into quiet hobbies like fishing and woodworking, yet habitually hoards tools and half‑finished
    projects, leaving a cluttered garage as evidence of his relentless tinkering.
background:
  cultural: Donald is a White Midwestern American raised in rural Indiana, with ancestry primarily of German and Anglo‑American roots. His upbringing emphasized self‑reliance, hard work, and community involvement
    typical of small‑town life in Orange County. He values family stability, respects local traditions such as county fairs and church picnics, and maintains a modest, practical lifestyle. While not overtly
    religious, he participates in his local Protestant congregation’s activities, viewing them as an anchor for community connection and mutual support.
attributes:
  skills: '[''AV system installation'', ''Audio signal routing and mixing'', ''Video projection and screen setup'', ''Digital signage configuration'', ''Networked AV integration (IP‑based)'', ''Cable management
    and conduit installation'', ''Troubleshooting and repair of audio/video equipment'', ''Electrical safety compliance and code adherence'', ''Client communication and service'', ''Project scheduling and
    coordination'']'
  hobbies: '[''Fishing'', ''Woodworking'', ''Model train building'', ''Vintage audio gear tinkering'', ''Church tech volunteering'', ''Watching NFL games'', ''Reading DIY manuals'']'
  career_goals: Donald aims to formalize his expertise by earning a Certified Technology Specialist (CTS) credential and later an Advanced CTS certification. He hopes to progress into a lead technician
    or field supervisor role within his current firm, overseeing larger commercial installations and mentoring junior installers. Long‑term, he envisions launching his own small AV contracting business
    to serve the Mid‑western community, focusing on reliable service and custom home‑theater solutions, while ensuring a stable income and retirement security for his family.
