persona_description: A historian who specializes in the study of African history, particularly the period of official segregation in the United States. His research interests include, but are not limited
  to, the history of African exploitation and enslavement, the creation and dissemination of racist and stereotypical images of Africans, the psychological and real damage against Africans, and the psychological
  and real damage caused by African regimes since the era of independence in the 1960s. He is known for challenging the racist representations of African people in his writings and pronouncements and for
  invoking pride in Africa's history and culture.
