personas:
  professional: James Sorto, an aspiring comic creator and junior game designer, blends hand‑drawn sketches, Minecraft world‑building, and a love for indie rock into storytelling, and their talkative, curiosity‑driven
    nature makes them the go‑to collaborator in school projects even though they often lose track of deadlines.
  sports: James Sorto channels boundless energy into playing forward for the local youth soccer team at the Bucks Soccer Club, cheered on by friends while humming the Baltimore Ravens fight song, and they
    stay fit by joining after‑school pick‑up games, though their relaxed attitude sometimes leads them to skip warm‑ups.
  arts: James Sorto crafts whimsical comic strips inspired by the visual humor of Calvin and Hobbes and the dynamic panels of Spider‑Man, draws musical inspiration from indie rock legends like Radiohead
    and The Strokes while performing short skits in the school drama club, and they eagerly share their creations during lunchtime show‑and‑tell sessions.
  travel: James Sorto’s travel adventures mix spontaneous weekend trips to Baltimore’s Inner Harbor and the Maryland Science Center with a dream of exploring the historic streets of Boston’s Freedom Trail
    and the rugged cliffs of County Antrim, though their itineraries often shift due to school responsibilities and parental permission.
  culinary: James Sorto delights in the buttery crust of Irish soda bread and the hearty comfort of a slow‑cooked beef and cabbage stew served at family Christmas gatherings, while they also love experimenting
    with making pizza topped with pepperoni and rainbow sprinkles shaped like Minecraft blocks, despite their occasional mess in the kitchen.
  core: James Sorto is a curious, talkative 11‑year‑old who balances bursts of comic‑making creativity with bouts of anxiety‑driven overthinking, thriving on social energy and often misplacing art supplies
    while obsessively listening to indie rock.
background:
  cultural: James is raised in an Irish‑American family that has lived in Dundalk, Maryland for several generations. His household observes Catholic traditions, celebrating holidays such as St. Patrick’s
    Day and Christmas with family gatherings and church activities. Growing up near Baltimore City, he is exposed to the region’s diverse cultural scene—including the city’s historic maritime heritage,
    multicultural neighborhoods, and seasonal festivals—shaping his open‑minded view of the world while maintaining a strong connection to his Irish roots.
