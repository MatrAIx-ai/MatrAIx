  career_goals: James dreams of turning his love for art and storytelling into a career as a multimedia creator—perhaps a comic‑book artist, animator, or video‑game designer. He also imagines one day directing
    school plays or community events where he can bring people together. While he values the freedom to explore many interests, he hopes to eventually combine technology and art to produce interactive experiences
    that spark curiosity in others.
