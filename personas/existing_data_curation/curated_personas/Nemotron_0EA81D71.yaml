  hobbies: '[''Fishing'', ''Beach walks'', ''Reading self-help books'', ''DIY home improvement'', ''Barbecue cooking'', ''Attending local community events'', ''Watching football games'', ''Volunteer work
    at community center'']'
  career_goals: Daniel aims to move beyond his current representative role into a supervisory position within the next two to three years, hoping to lead a small team of agents and mentor new hires. He
    plans to obtain a Certified Customer Service Professional (CCSP) credential and attend leadership workshops to strengthen his management and organizational skills. Long‑term, he envisions a stable career
    in customer experience management where he can design service procedures that prioritize both efficiency and employee well‑being, allowing him to reduce workplace stress while contributing to a harmonious
    company culture.
