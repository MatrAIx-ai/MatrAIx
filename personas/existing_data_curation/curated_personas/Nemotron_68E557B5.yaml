personas:
  professional: Chantal Lyons, a marketing strategist with over a decade of agency and in‑house experience, merges rigorous data‑driven analysis, SEO/SEM mastery, and agile project leadership into narrative‑focused
    campaigns, while they prefer structure and quiet collaboration to ensure every brand story is delivered on schedule and within budget.
  sports: Chantal Lyons fuels their love of the outdoors by hiking the Columbia River Gorge each weekend, participates in the Portland Road Runners club for occasional 5K runs, follows the Portland Trail
    Blazers and Portland Timbers closely, and balances these activities with a disciplined yoga practice at a local studio that satisfies their need for structured, low‑impact exercise.
  arts: Chantal Lyons cultivates their creative side through nightly literary fiction reads—favoring authors like Toni Morrison and Haruki Murakami—writes poetry inspired by place, curates forest‑themed
    photography reminiscent of Ansel Adams, volunteers with the nonprofit ArtReach to support emerging visual artists, and regularly attends intimate gallery openings featuring works by Yayoi Kusama and
    regional painter Sarah Clements.
  travel: Chantal Lyons prefers thoughtfully planned trips that blend cultural immersion with natural beauty, having explored Portland’s food scene, the misty cliffs of Cannon Beach, a weekend getaway to
    Vancouver, and a solo hiking expedition in New Zealand’s South Island, while dreaming of a future journey to Iceland’s volcanic landscapes for midnight sunrise photography.
  culinary: Chantal Lyons enjoys cooking seasonal meals with a moderate skill level, favoring dishes like cedar‑plank salmon with dill and lemon, roasted beet and arugula salad with goat cheese, and wild
    mushroom risotto using locally foraged chanterelles, and they relish dining at farm‑to‑table restaurants that showcase Oregon’s fresh herbs and heirloom vegetables.
  core: Chantal Lyons balances a detail‑oriented marketing career with solitary creative pursuits, structured financial habits, and a love for nature‑infused hobbies, all while occasionally indulging in
    spontaneous art purchases that betray their otherwise disciplined demeanor.
background:
  cultural: Chantal was raised in a middle‑class family in the Pacific Northwest, where a strong appreciation for the natural environment, civic engagement, and independent arts is woven into everyday life.
    Her white American heritage reflects a mixture of European ancestries, and family traditions emphasize modest celebrations of holidays, a commitment to education, and a sense of responsibility to the
    broader community. Living in Portland has reinforced values of sustainability, progressive social ideas, and support for local creators—all of which shape her personal worldview, professional ethos,
    and everyday choices.
