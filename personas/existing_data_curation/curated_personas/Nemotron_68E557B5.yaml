  career_goals: Looking ahead, Chantal aims to step into a senior leadership role—such as Director of Marketing—where she can shape the long‑term brand vision for a company that values sustainability and
    community impact. She plans to spearhead initiatives that embed data‑driven insights into creative storytelling, mentor emerging marketers, and champion inclusive, socially responsible campaigns that
    resonate with diverse audiences. Over the next five years, she also hopes to develop a regional network of small businesses to collaboratively promote local culture and environmentally conscious practices.
