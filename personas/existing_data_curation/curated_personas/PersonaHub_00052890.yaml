persona_description: A scientist who specializes in the study of plant biology, particularly the interactions between plants and their microbiota. Their research interests include, but are not limited to,
  the effects of herbicides and pesticides on plant and animal systems, the mechanisms of microbial colonization, and the ecological impacts of insecticides and herbicides. They are particularly interested
  in the use of glyphosate as a herbicide and its effects on the honey-bee microbiota.
