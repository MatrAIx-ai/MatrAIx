  hobbies: '[''Organic gardening'', ''Hiking in the Hudson River Valley'', ''Yoga'', ''Reading historical fiction and contemporary non‑fiction'', ''Participating in book clubs'', ''Wine tastings and art
    gallery visits'', ''Cooking experimental recipes'', ''Volunteering at the community food bank'']'
  career_goals: Heba aims to advance to a senior leadership role such as Director of Procurement or Head of Category Management within the next five years, where she can shape the buying strategy for a
    regional retail chain. She is passionate about integrating sustainable and ethical sourcing practices into the supply chain, and she hopes to spearhead initiatives that reduce environmental impact while
    preserving profitability. Additionally, she aspires to mentor emerging buyers, sharing her balanced, data‑driven approach and calm leadership style, and she is open to transitioning into boutique consulting
    to help smaller retailers improve their procurement efficiency.
