  career_goals: Donna aims to advance into a supervisory role within the transit authority, such as a senior driver trainer or route planner, where she can apply her organizational strengths and competitive
    drive to improve service reliability. She plans to obtain a Certified Transportation Professional (CTP) credential and complete an associate degree in transportation logistics. Longer‑term, she aspires
    to move into operations management, overseeing scheduling, safety programs, and driver development, while also seeking a more predictable shift pattern to reduce personal stress.
