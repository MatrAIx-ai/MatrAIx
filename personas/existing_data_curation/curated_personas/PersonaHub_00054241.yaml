persona_description: A Peruvian water utility executive who is responsible for implementing natural infrastructure strategies in the Piuray-Ccorimarca watershed, as well as working with local communities
  to introduce soil conservation practices in farmlands and pastures, and to allow natural vegetation to begin to repopulate degraded grazing lands. The persona is passionate about the importance of water
  quality and the role of water utilities in financing conservation projects, and is committed to making a positive impact on the communities around Lake Piuray.
