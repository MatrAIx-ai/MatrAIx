personas:
  professional: Amanda Fisher is a senior retail supervisor with three decades of hands‑on experience, leveraging her curiosity for visual art and her balanced blend of organization and flexibility to drive
    innovative merchandising and mentor diverse teams, while her critical, competitive edge keeps store performance metrics sharply in focus.
  sports: Amanda Fisher is a dedicated fan of the Atlanta Hawks and Braves, regularly attending games at State Farm Arena and Truist Park, while maintaining personal fitness through low‑impact activities
    such as weekly pickleball at the community center and leisurely morning walks in her garden, preferring small‑group exercise over high‑intensity gyms.
  arts: Amanda Fisher immerses herself in the visual and performing arts, frequenting the High Museum to study works by Kehinde Wiley and Georgia O'Keeffe, attending intimate jazz sessions featuring Wynton
    Marsalis and Norah Jones, and channeling that aesthetic sensibility into DIY home‑decor projects inspired by Kelly Wearstler’s bold textures.
  travel: Amanda Fisher favors meticulously planned, culturally immersive trips, having explored New Orleans’ jazz heritage and Savannah’s historic squares, and now dreams of a curated art pilgrimage to
    Florence’s Uffizi Gallery and a weekend retreat in the Blue Ridge Mountains, balancing a love for quiet exploration with modest travel budgets.
  culinary: Amanda Fisher, an avid home‑chef, blends Southern soul‑food staples such as collard greens and fried chicken with global twists like miso‑marinated pork belly and kimchi‑glazed shrimp, often
    seasoning dishes with smoked paprika, pimento cheese, and fresh herbs, while also savoring occasional dinner outings at Atlanta’s The Optimist for its cedar‑plank oysters.
  core: Amanda Fisher is a curious, art‑obsessed retail veteran who meticulously curates both store displays and her garden, but can’t resist a nightly episode of true‑crime podcasts that often keeps her
    up past her intended bedtime.
background:
  cultural: Raised in a close‑knit Black community in DeKalb County, Amanda’s family traces its roots to the Great Migration, blending Southern traditions with the vibrant cultural renaissance of modern
    Atlanta. Church, gospel music, and soul food have shaped her sense of identity, while the city’s rich African‑American art scene, from street murals to historic theater productions, nurtured her appreciation
    for creative expression. She honors her heritage by supporting local Black artists, participating in community festivals, and mentoring younger generations to navigate both professional and cultural
    landscapes. This cultural grounding informs her leadership style, emphasizing resilience, pride, and a commitment to uplift her community.
attributes:
  skills: '[''Team leadership'', ''Sales performance analysis'', ''Staff training and development'', ''Inventory management'', ''Visual merchandising'', ''Customer service coaching'', ''Scheduling and labor
    budgeting'', ''Conflict resolution'', ''Loss prevention'', ''Community mentorship'']'
  hobbies: '[''Visiting art galleries and museums'', ''Reading art history and contemporary fiction'', ''Gardening in her backyard'', ''Playing chess'', ''Participating in small book clubs'', ''Exploring
    new culinary recipes'', ''Mentoring youth in local community programs'', ''Attending jazz concerts'', ''DIY home décor projects'']'
  career_goals: While preparing for a phased retirement, Amanda aims to secure a district‑manager promotion within the next two years, allowing her to mentor supervisors across multiple stores and embed
    her art‑focused visual merchandising concepts company‑wide. She plans to complete her bachelor's degree in Business Administration, a goal she deferred during her early career. Beyond corporate advancement,
    she envisions launching a community partnership that showcases local Black artists in retail spaces, and she hopes to formalize a mentorship program for emerging Black women leaders in retail. Post‑retirement,
    Amanda intends to work as a part‑time consultant, sharing best‑practice frameworks on inclusive leadership and dynamic store design while continuing her volunteer work with youth job‑training initiatives.
