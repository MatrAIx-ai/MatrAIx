  career_goals: Although officially retired, Triana aspires to leave a lasting legacy by establishing a scholarship for Hispanic students pursuing degrees in education, volunteering as a mentor for first‑generation
    college teachers, and publishing a reflective memoir that weaves together her teaching philosophy with Mexican cultural values. She also hopes to expand the local senior‑citizen literacy program she
    coordinates, ensuring it adopts evidence‑based methods and reaches underserved neighborhoods in Houston.
