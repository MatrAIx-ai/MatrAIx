personas:
  professional: Bruce Lee is an aspiring junior engineer who channels their love for constructing LEGO vehicles into early robotics projects, applying practical, hands‑on problem solving within organized
    school clubs while their competitive streak drives them to lead group builds, though they can get frustrated when plans shift unexpectedly.
  sports: Bruce Lee is a forward for the Rocky Mountain Youth Soccer League and a point guard for the North Denver Youth Basketball Club, idolizing the Colorado Rapids and the Denver Nuggets, and they combine
    competitive drills with weekend hikes along the Colorado River trail, balancing structured team play with spontaneous outdoor fitness.
  arts: Bruce Lee is a budding digital storyteller who creates animated adventures on ScratchJr, drums along to tracks by Imagine Dragons, and draws inspiration from Pixar films and the LEGO Master Builder
    series, often sharing their creations during playdates and school talent shows.
  travel: Bruce Lee dreams of trekking the red rocks of Sedona, witnessing geysers at Yellowstone, and exploring Tokyo’s neon streets, while they already cherish family trips to Colorado Springs’ Garden
    of the Gods and weekend hikes along the Arkansas River, favoring hands‑on adventures over long, leisurely vacations.
  culinary: Bruce Lee prefers hearty meals like cheese pizza with pepperoni, loaded nachos with jalapeños, and classic macaroni‑and‑cheese, enjoys assembling mini‑sandwiches using peanut butter and honey,
    and occasionally helps their parents whip up a simple trail‑mix with dried cranberries, almonds, and chocolate chips.
  core: Bruce Lee is an energetic, structure‑loving 8‑year‑old who blends a competitive spirit with creative play, racing between LEGO builds and soccer drills while battling sudden anxiety that prompts
    snack cravings.
background:
  cultural: Bruce comes from a white American background rooted in the western Colorado region. His family participates in community events in Grand Junction, such as the local farmers market, outdoor festivals,
    and school field trips that emphasize the natural beauty of Mesa County. The regional culture values outdoor recreation, self‑reliance, and close‑knit community ties, which shape Bruce’s love for sports,
    exploration, and group activities.
