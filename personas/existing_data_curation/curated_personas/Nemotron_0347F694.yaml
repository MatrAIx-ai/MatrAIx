  career_goals: Even at eight, Bruce dreams big and is driven by his competitive spirit. He envisions himself as a future professional soccer player who leads a team, a wildlife ranger who protects the
    Colorado outdoors, or a video‑game champion who masters strategy games. His ambition is to be recognized for his skill, leadership, and ability to work with others, and he often talks about coaching
    a junior soccer team or leading a nature‑exploration club at school.
