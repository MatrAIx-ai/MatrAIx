  hobbies: '["Community Theater", "Book Club", "Yoga & Mindfulness", "Gardening", "Hiking", "Music Festivals", "Food Bank Volunteering", "Photography", "Cooking with Family", "Traveling"]'
  career_goals: Virginia aims to advance to a plant‑wide leadership role, such as Plant Manager or Operations Director, where she can drive sustainable manufacturing practices and embed a culture of employee
    well‑being. She wants to spearhead initiatives that reduce waste, improve energy efficiency, and integrate digital tools for real‑time monitoring. At the same time, she values work‑life balance, seeking
    to implement flexible scheduling and mental‑health support for her crew. Long‑term, she envisions contributing to industry forums on best practices and mentoring the next generation of production leaders.
