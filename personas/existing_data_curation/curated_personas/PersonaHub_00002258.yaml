persona_description: A hematologist who specializes in the study of acute myeloid leukemia (AML), particularly in its etiology, epidemiology, clinical presentation, diagnosis, treatment, and prognosis.
  Their research interests include the molecular and genetic basis of AML, the mechanisms of therapy-related AML, the clinical outcomes of AML in different populations, and the development of new therapeutic
  strategies for AML. They are also interested in the role of chemotherapy and radiotherapy in the development of AML, and the potential use of targeted therapies and immunotherapy in the treatment of AML.
