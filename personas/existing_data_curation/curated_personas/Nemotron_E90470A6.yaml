  career_goals: Zady aims to enroll in a local community college to earn an associate degree in health administration or social services, with the long‑term goal of securing a stable administrative position
    at a community health center where she can work within a structured environment. She also seeks certification as a peer support specialist to help individuals coping with anxiety and depression, and
    hopes to develop a balanced career that allows her to maintain her mental‑wellness routine.
