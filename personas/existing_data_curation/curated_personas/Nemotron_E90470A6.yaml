personas:
  professional: Zady Graciani is a detail‑oriented aspiring health administrator who leverages strong scheduling, record‑keeping, and bilingual communication skills to streamline community health center
    operations while embracing a structured yet flexible work style that balances compassion with efficiency.
  sports: Zady Graciani enjoys regular walks on local nature trails, participates in a weekend hiking club called GreenPath Explorers, and follows the regional baseball team the River City Runners as well
    as the national soccer squad FC Barcelona for their strategic play style.
  arts: Zady Graciani immerses themselves in salsa, bomba, and reggaeton, frequently streaming artists like Celia Cruz, Bad Bunny, and Marc Anthony, while also devouring mystery novels by Agatha Christie
    and contemporary self‑help titles from Brené Brown, finding both music and literature essential to emotional balance.
  travel: Zady Graciani prefers low‑key, nature‑focused getaways, often planning weekend trips to the Blue Ridge Mountains or the serene lakeside cabins of Lake Placid, while dreaming of a future cultural
    immersion trip to Oaxaca, Mexico, balancing travel costs with a modest savings plan.
  culinary: Zady Graciani cooks with moderate skill, delighting friends with aromatic arroz con pollo, savory mofongo, crisp tostones, and sweet guava pastries, while sourcing fresh plantains, cilantro,
    and achiote to preserve authentic flavors in every dish.
  core: Zady Graciani blends meticulous organization with a love for solitary creative pursuits, managing anxiety through routine, cooking, and community support, while navigating finances with disciplined
    budgeting and a modest appetite for adventure.
background:
  cultural: Zady is a first‑generation Puerto Rican American raised in a bilingual household. She grew up celebrating traditions such as Nochebuena, San Juan festivals, and the musical rhythms of bomba
    and salsa. Her family places great emphasis on close‑knit relationships, Catholic values, and the hospitality typical of Caribbean culture. Living in Sorrento, Florida, she stays connected to the broader
    Puerto Rican diaspora through community events, cooking authentic dishes, and speaking Spanish at home, which deeply influences her identity and daily life.
