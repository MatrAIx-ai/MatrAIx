  career_goals: Ethel aims to transition into a senior advisory role where she can mentor younger apprentices and share her extensive knowledge of sustainable maintenance practices. She hopes to secure
    a flexible, part‑time position with a community center or historic landmark in Saint Paul, allowing her to focus on high‑impact projects such as retrofitting old buildings for energy efficiency. In
    the longer term, she envisions launching a modest consulting business that offers specialized repair services for vintage appliances, positioning herself as the go‑to expert in Dakota County.
