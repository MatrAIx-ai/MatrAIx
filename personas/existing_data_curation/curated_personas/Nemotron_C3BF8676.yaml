personas:
  professional: Manuel Cruz, a seasoned cleaning and maintenance specialist with over 40 years of hands‑on experience, leverages their bilingual communication and deep knowledge of OSHA standards to mentor
    staff and streamline operations, yet their relaxed planning style means they often improvise solutions on the spot.
  sports: Manuel Cruz follows the New York Yankees with particular enthusiasm for players from their family's island, watches Copa América matches, participates in a casual over‑50s baseball league at Flushing
    Meadows, and occasionally cheers on the Staten Island football club during weekend games.
  arts: Manuel Cruz spends evenings listening to classic merengue hits by Juan Luis Guerra, contemporary bachata from Romeo Santos, and salsa rhythms by Celia Cruz, while they also attend occasional performances
    at the Queens Theatre and enjoy classic Spanish‑language films starring Antonio Banderas.
  travel: Manuel Cruz prefers low‑key, short‑duration trips, often flying to the Caribbean island that their family calls home for holiday reunions, while they also indulge in weekend drives to the Catskill
    Mountains or historic tours of Washington, D.C., balancing wanderlust with a careful budgeting approach.
  culinary: Manuel Cruz enjoys cooking traditional stews like sancocho with root vegetables and perfecting mangú with ripe plantains, pork cracklings, sofrito, cilantro, and diced yucca, showcasing an intermediate
    cooking skill but sometimes skipping steps due to their laid‑back nature.
  core: Manuel Cruz is a pragmatic veteran of building maintenance who balances a love of family‑centered traditions with a relaxed, occasionally forgetful approach to planning, always keeping a crossword
    puzzle at hand.
background:
  cultural: Born to Dominican parents who immigrated to New York, Manuel grew up immersed in Dominican traditions while navigating life in Queens. He celebrates Dominican holidays such as Independence Day
    and Carnaval with family gatherings, music, and food. His Catholic faith and involvement in the local parish provide a strong community network. Fluent in both Spanish and English, he bridges cultures
    by sharing Dominican stories, recipes, and customs with neighbors, preserving his heritage while contributing to the multicultural fabric of Whitestone.
attributes:
  skills: '["Commercial floor care (strip, wax, buff)", "Carpet and upholstery cleaning", "Basic plumbing repairs", "HVAC filter replacement", "Minor electrical troubleshooting", "OSHA safety compliance",
