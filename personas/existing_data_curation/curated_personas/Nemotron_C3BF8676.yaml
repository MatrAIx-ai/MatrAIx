  hobbies: '["Listening to merengue and bachata music", "Cooking traditional Dominican cuisine", "Watching baseball and soccer", "Walking in Flushing Meadows–Corona Park", "Gardening on his balcony", "Participating
    in church and community events", "Reading Spanish‑language newspapers", "Doing crossword puzzles"]'
  career_goals: Approaching retirement, Manuel aims to transition into a supervisory role where he can oversee cleaning operations for multiple properties, applying his practical knowledge to improve efficiency
    and safety. He hopes to earn a GED and a certified janitorial supervisor credential to formalize his expertise. Long‑term, he dreams of launching a modest, family‑run cleaning service that serves the
    Dominican community in Queens, providing reliable work for younger relatives while ensuring financial stability for his own household.
