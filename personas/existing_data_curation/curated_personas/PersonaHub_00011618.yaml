persona_description: A principal investigator who is interested in exploring the ways that students with disabilities can improve their mathematical learning. She is a researcher with expertise in action
  research and has worked with mainstream classroom teachers and special education teachers to examine how these students learn mathematics best and what is needed to develop their mathematical thinking.
  She is passionate about disseminating successful strategies to other practitioners and is eager to learn more about the Accessible Math project.
