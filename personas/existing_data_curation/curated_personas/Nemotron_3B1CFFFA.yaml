  career_goals: Bernard dreams of becoming a firefighter because he admires the bravery and teamwork involved, and he also imagines exploring space as an astronaut, fascinated by science and discovery.
    He expresses an interest in helping others, whether by rescuing pets, assisting teachers, or someday teaching kids about the stars. His curiosity about how things work fuels a budding ambition to become
    a scientist who conducts fun experiments and shares findings with his friends.
