personas:
  professional: Bernard Baxter is a budding Lego architect who loves turning imaginative ideas into sturdy structures, using his curious‑practical mindset to plan intricate builds while rallying friends
    with his talkative confidence.
  sports: Bernard Baxter dashes across the local youth soccer field as a forward for the West Frankfort Tigers, cheering loudly for the Chicago Fire and the St. Louis Cardinals, and uses his natural leadership
    to organize after‑practice drills that keep the team’s energy high.
  arts: Bernard Baxter devours adventure books by Enid Blyton and watches Disney Pixar movies like 'Toy Story,' often staging mini‑plays for family gatherings where he mimics characters such as Buzz Lightyear,
    blending his love of storytelling with a flair for the spotlight.
  travel: Bernard Baxter prefers weekend road trips to the county fair in Marion and occasional family vacations to Chicago’s Navy Pier, planning his itineraries with a crayon‑drawn map and dreaming of
    a future trip to Yellowstone National Park after saving enough allowance for the train ticket.
  culinary: Bernard Baxter favors cheesy pizza slices, chicken nuggets, and peanut butter‑jelly sandwiches, enjoys helping his mom stir mac and cheese while sprinkling extra parmesan, yet frequently sneaks
    a handful of chocolate chips into the batter when no one is watching.
  core: Bernard Baxter is a talkative, Lego‑loving soccer enthusiast who balances daring curiosity with picky saving habits, often leading games and skits while occasionally neglecting bedtime routines
    for a new build.
background:
  cultural: Bernard grows up in West Frankfort, a close‑knit Midwestern town in Illinois, where community values, family gatherings, and local traditions are central to daily life. His household reflects
    typical small‑town American customs, including attending Sunday school, participating in school fairs, and celebrating holidays with communal potlucks. The town’s emphasis on neighborly support, church
    involvement, and pride in local events like the county fair shape his sense of belonging and reinforce his sociable, cooperative demeanor.
