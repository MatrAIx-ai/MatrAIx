  hobbies: '[''Abstract Painting'', ''Generative Art Coding'', ''Jazz Listening'', ''Birdwatching'', ''Hiking'', ''Vegetable Gardening'', ''Jigsaw Puzzles'', ''Philosophical Reading'', ''Cooking Fusion
    Cuisine'']'
  career_goals: Joi is aiming to transition into a semi‑retirement role that lets her focus on interdisciplinary research at the nexus of mathematics and visual art. She plans to author a monograph on fractal
    geometry in contemporary painting, secure a small research grant to develop educational modules that introduce high‑school students—especially underrepresented minorities—to mathematical thinking through
    art, and serve as a consultant for regional biotech firms. She also aspires to mentor a cohort of Black women entering STEM, helping them navigate academic and professional pathways.
