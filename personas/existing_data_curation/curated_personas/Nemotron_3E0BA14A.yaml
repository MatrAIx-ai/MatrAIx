personas:
  professional: Joi Trice, a seasoned computational mathematician and data scientist, weaves advanced statistical modeling with abstract visual metaphors to produce interdisciplinary research that bridges
    biomedical analytics and environmental simulation, and they leverage their skill in Python, R, MATLAB, and Julia to mentor emerging scholars while flexibly navigating semi‑retirement projects.
  sports: Joi Trice, an avid birdwatcher and solo hiker, follows the local walking club's seasonal trails, supports the Charlotte Hornets and the Carolina Panthers from the comfort of their garden balcony,
    and practices gentle tai chi in the early mornings to maintain flexibility without the pressure of team sports.
  arts: Joi Trice, an abstract painter who draws on fractal geometry and improvisational jazz influences like John Coltrane and Thelonious Monk, creates generative art code in Julia, curates a personal
    collection of vintage vinyl, and finds quiet inspiration in church choir harmonies and communal storytelling evenings.
  travel: Joi Trice, a contemplative traveler with a penchant for immersive cultural experiences, prefers leisurely trips to historic jazz festivals in New Orleans, botanical gardens in England, and heritage
    sites in coastal Carolina where they can explore oral history traditions, often planning trips months in advance but leaving room for spontaneous detours.
  culinary: Joi Trice, a home cook who cultivates collard greens, sweet potatoes, and okra in a sustainable garden, delights in preparing low‑oil, spice‑rich Southern dishes like gumbo and black‑eye pea
    stew accompanied by fresh herbs, and while they seldom follow recipes to the letter, they regularly pair meals with a curated playlist of classic jazz standards.
  core: Joi Trice blends mathematical rigor with artistic spontaneity, prefers solitary, flexible routines, mentors underrepresented scholars, and sometimes lets disorganization tip the balance between
    brilliance and missed deadlines.
background:
  cultural: Joi grew up in a close‑knit Black community in North Carolina, the daughter of parents who migrated from the rural South during the Great Migration. Her family’s roots trace back to the Gullah‑Geechee
    culture of the coastal Carolinas, and she was raised with a strong sense of oral history, church music, and communal storytelling. Throughout her life she has been active in local Black cultural organizations,
    such as the Winston‑Salem Black Arts Council, and she maintains ties to historically Black colleges and professional societies like the National Association of Mathematicians. Her cultural identity
    informs her advocacy for greater representation of Black women in STEM and her desire to blend mathematical rigor with the visual aesthetics of African‑American artistic traditions.
