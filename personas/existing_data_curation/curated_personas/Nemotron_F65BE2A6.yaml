  career_goals: Alwyn’s immediate ambition is to transition from a full‑time development role to a senior advisory and mentorship position where he can shape the next generation of engineers. He plans to
    lead a small, collaborative team to build an open‑source platform that digitizes and showcases local visual‑arts collections, marrying his technical skill with his love for art. Over the next five years
    he hopes to publish a technical memoir that chronicles his journey through evolving software ecosystems, and to serve as a part‑time consultant helping small nonprofits modernize legacy IT infrastructure.
    While he values independence, he also seeks to create lasting impact through community‑focused tech initiatives and by donating his time to local youth coding workshops.
