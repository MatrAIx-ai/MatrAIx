personas:
  professional: Wanda Hewitt, a 30‑year‑old café host with a talent for precise shift scheduling and inventory control, channels her curiosity for visual arts into curating intimate gallery displays within
    the coffee shop while handling busy rushes with calm, assertive poise and they quietly prefer the quiet moments behind the espresso machine.
  sports: Wanda Hewitt enjoys low‑key fitness pursuits such as early‑morning trail runs on the rolling hills near her hometown and weekend pick‑up volleyball at the community center, cheering for the Kentucky
    Wildcats basketball team and the Louisville Cardinals football squad while occasionally joining a small local running club for seasonal races, and they proudly wear the team colors.
  arts: Wanda Hewitt blends her love of acrylic painting inspired by the Kentucky countryside with a keen ear for folk legends like Bill Monroe and contemporary bluegrass artists such as Rhiannon Giddens,
    frequently visiting the Lexington Art League exhibitions and curating small displays of local artisans, while drawing creative inspiration from the works of Andrew Wyeth and the poetry of Robert Frost,
    and they often host informal sketch nights for fellow art lovers.
  travel: Wanda Hewitt prefers quiet, self‑planned road trips that balance scenic serenity with artistic discovery, having explored Mammoth Cave National Park, the historic streets of Asheville, NC, and
    the vineyards of Napa Valley, while dreaming of a cultural immersion in Paris, France, yet she budgets travel carefully, often opting for off‑season visits to stretch her savings, and they keep a journal
    of each destination's artistic highlights.
  culinary: Wanda Hewitt, an enthusiastic home barista, loves brewing pour‑over coffee with Ethiopian Yirgacheffe beans, experiments with herb‑infused dishes like rosemary‑lemon roasted chicken and fresh
    garden pesto, whips up simple Southern comforts such as fried chicken and collard greens, and can skillfully prepare a flaky herb shortbread, though they sometimes over‑brew coffee in pursuit of the
    perfect flavor.
  core: Wanda Hewitt is a solitary‑spirit coffee‑enthusiast who blends meticulous organization with artistic curiosity, quietly curates local art, saves methodically for a dream café‑gallery, and they occasionally
    neglect social obligations in favor of a perfect espresso shot.
background:
  cultural: Wanda was raised in Stanford, a small rural community in Casey County, Kentucky, within a white, Appalachian‑influenced cultural setting. Her family’s roots are tied to the region’s farming
    and labor traditions, and she grew up attending a local Baptist church, where community gatherings and modest hospitality were emphasized. The local culture values self‑reliance, close‑knit family ties,
    and a deep appreciation for the natural landscape. Folk music, Southern cooking, and crafts such as quilting are part of her heritage. While she respects these traditions, her curiosity has led her
    to explore broader artistic and culinary ideas, blending her rural upbringing with a modern, individualistic outlook.
attributes:
  skills: '["Customer service", "Guest seating management", "Conflict resolution", "POS operation", "Shift scheduling", "Inventory management", "Barista skills", "Specialty coffee brewing", "Art curation",
    "Event coordination", "Time management", "Emotional self‑regulation", "Assertive communication", "Attention to detail", "Adaptability"]'
  hobbies: '["Acrylic painting", "Sketching", "Landscape photography", "Reading (fiction, poetry, art history)", "Herb gardening", "Nature walks/hiking", "Home coffee brewing experiments", "Attending local
    art exhibitions", "Listening to folk and bluegrass music", "Journaling"]'
  career_goals: Wanda aims to obtain her GED within the next year and enroll in a community‑college certificate program in hospitality management. She hopes to advance from host to shift supervisor and
    eventually to café manager, where she can shape the ambience to reflect her love of art and quiet spaces. Long‑term, she dreams of opening a small independent coffee shop that doubles as a gallery for
    local artists, offering a tranquil retreat for solitary patrons and a platform for community creativity. She also plans to achieve a professional coffee certification (e.g., Q‑Grader) to deepen her
    expertise in specialty coffee.
