  career_goals: Carlos aims to advance from an operator role to a supervisory position within the next three years, pursuing a certified safety trainer credential and a bachelor’s degree in logistics or
    industrial engineering part‑time. He wants to become a fleet manager responsible for scheduling, equipment maintenance, and staff development, ensuring a safe and efficient operation. Long‑term, he
    hopes to own a small logistics consulting firm that helps local businesses streamline their supply chains, providing him financial stability and the ability to support his family.
