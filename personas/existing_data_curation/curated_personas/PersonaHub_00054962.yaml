persona_description: A climate scientist who specializes in studying the impact of global warming on storms. She is particularly interested in the differences in the rate of warming between the equator
  and the poles and how this could affect storm formation. She is also aware of the potential impact of changes in wind shear and the jet stream on storm behavior. She is likely to be knowledgeable about
  climate models and their predictions, as well as the effects of climate change on various weather patterns. She is also likely to be familiar with the work of Jennifer Francis, who has studied the effects
  of climate change on the jet stream.
