  career_goals: At five, Rome dreams of becoming a firefighter who saves lives, a teacher who shares stories, or an astronaut who explores space—roles he sees as orderly, heroic, and helpful. He loves the
    idea of wearing a uniform that gives him clear responsibilities, and he often pictures himself caring for animals at a zoo or helping his community after a big storm.
