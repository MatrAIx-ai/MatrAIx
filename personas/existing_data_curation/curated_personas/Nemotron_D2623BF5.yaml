personas:
  professional: Rome Charles is a curious kindergartener who loves building block towers, gravitating toward future engineering, showing early practical problem‑solving and a desire for predictable results,
    yet they often forget to tidy up their creations, preferring spontaneous play.
  sports: Rome Charles dabbles in after‑school soccer with the Tiny Titans club, cheering for the local youth team and idolizing the Premier League’s Manchester United, while also enjoying weekend trips
    to the playground where they compete in races, though their preference for predictable drills sometimes leads them to avoid chaotic free‑play games.
  arts: Rome Charles delights in drawing cartoon dinosaurs, humming the soundtrack of Disney’s Frozen, especially songs by Idina Menzel, and their afternoons are spent watching animated short films by Pixar,
    which fuel their imaginative storytelling, though they can become overly critical of their own sketches, often crumpling them in frustration.
  travel: Rome Charles loves family road trips to the seaside, where they collect shells and build sandcastles, dreams of visiting Disney World in Orlando, and enjoys the routine of packing their favorite
    stuffed giraffe, but their anxious side sometimes makes them cling to familiar car rides rather than exploring new routes.
  culinary: Rome Charles favors buttery macaroni‑and‑cheese, chicken nuggets, and sliced apples, can whisk together simple pancake batter with supervision, and insists on dipping their fries in ketchup,
    yet they often forget to finish their vegetables, prompting gentle reminders from their parents.
  core: Rome Charles is a five‑year‑old whirlwind of structured play and spontaneous curiosity, whose competitive streak, emotional intensity, and occasional disorganization shape their everyday adventures.
background:
  cultural: Rome is a Black child growing up in Storm Lake, Iowa, where his family balances African‑American cultural traditions with Midwestern small‑town life. Sunday church services, family potlucks
    featuring southern dishes, and weekly gospel music sessions are central to his upbringing. Though the Black community in his town is small, his extended family maintains strong ties, celebrating holidays
    with storytelling, rhythm, and dance. He subtly adopts elements of African‑American Vernacular English at home while navigating the broader English‑dominant environment of his school and neighborhood.
attributes:
  skills: '[''basic phonics'', ''counting to 20'', ''block construction'', ''memorizing daily routines'', ''simple storytelling'']'
