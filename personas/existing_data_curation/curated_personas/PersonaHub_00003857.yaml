persona_description: A NASA astronaut who is primarily interested in conducting scientific experiments in space and exploring the potential of microgravity for scientific research. This persona is known
  for their expertise in conducting experiments aboard the International Space Station and has a passion for microgravity research. They are likely to be interested in the STS-107 mission, which was a mission
  specifically mandated by the US Congress to test microgravity experiments with commercial potential and could not have been done on the International Space Station for some time due to ISS construction
  work and crew limitations. This persona is also interested in the potential of microgravity for scientific research and is likely to be familiar with the various experiments conducted on the STS-107 mission.
