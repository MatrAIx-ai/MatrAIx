persona_description: A historian who is deeply interested in the history of the United States and the impact of European colonization on Native American tribes. They are also fascinated by the figure of
  Buffalo Bill, who is portrayed as a complex and conflicted character in Arthur Kopit's play "Indians." The persona is likely to be interested in the historical context of the play, the themes of genocide,
  and the complex relationship between the U.S. government and Native American tribes. They may also be interested in the role of Buffalo Bill as a figure of both victim and victimizer in the conflict.
