  career_goals: Inspired by her love of art, structure, and discovery, Dian aspires to become an architect who can merge creative design with rigorous planning. She also dreams of one day curating exhibitions
    at a museum, where she can share her appreciation for varied artistic expressions. Her long‑term ambition includes pursuing higher education in design or museum studies, aiming to achieve excellence
    and make meaningful contributions to cultural institutions.
