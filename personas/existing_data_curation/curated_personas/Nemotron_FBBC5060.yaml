personas:
  professional: Betty Jefferson, a seasoned food service manager with three decades of overseeing an Indianapolis cafeteria, leverages their knack for meticulous staffing schedules, cost control, and food‑safety
    compliance while allowing themselves enough flexibility to improvise menus with seasonal produce and mentor younger staff, embodying a practical yet adaptable leadership style.
  sports: Betty Jefferson supports the Indianapolis Colts and Indiana Pacers, jogs with the local ‘Riverwalk Runners’ club on weekends, and plays on their church’s casual softball team, blending a love
    for community sports with a low‑key fitness routine that fits their flexible schedule.
  arts: Betty Jefferson sings in their church choir, quilts intricate patterns inspired by works of Georgia O’Keeffe, reads contemporary novels by authors like Celeste Ng, and enjoys listening to Dolly
    Parton and John Legend, weaving creative expression into their daily life.
  travel: Betty Jefferson takes quarterly road trips to attend regional festivals such as the Kentucky Derby in Louisville, the Nashville Country Music Festival, and the Savannah Music Festival, balancing
    an organized packing checklist with spontaneous detours to local diners and historic sites.
  culinary: Betty Jefferson excels at cooking Southern comfort dishes like buttermilk fried chicken, candied yams, and smoked pork shoulder, while experimenting with seasonings such as smoked paprika, rosemary,
    and thyme during weekend bake‑offs, and growing fresh basil and heirloom tomatoes in their garden to enhance their recipes.
  core: Betty Jefferson blends decades of cafeteria management expertise with a love for Southern cooking, community choirs, and modest yet strategic financial habits, all while navigating health check‑ups
    and spontaneous road trips with a pragmatic, slightly disorganized flair.
background:
  cultural: Betty is an African‑American woman who grew up in the historic Hartford‑West and Indiana Avenue neighborhoods of Indianapolis. Her family legacy includes stories of the Great Migration and a
    deep involvement in the local Black church and civic organizations. These roots shape her appreciation for community, tradition, and collective uplift. She celebrates Juneteenth, participates in Black
    History Month events, and incorporates family recipes passed down through generations into her cooking. Betty’s cultural identity also informs her commitment to mentoring young Black professionals and
    supporting Black‑owned suppliers.
