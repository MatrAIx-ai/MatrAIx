  career_goals: Betty aims to leverage her extensive experience to step up as a regional manager overseeing multiple food service locations within the Midwest. She plans to obtain an Advanced Food Safety
    Manager certification and enroll in a community college culinary arts program to deepen her technical knowledge. Long‑term, she dreams of opening a family‑owned soul‑food restaurant that sources ingredients
    from local Black farmers and provides apprenticeship opportunities for youth in her community.
