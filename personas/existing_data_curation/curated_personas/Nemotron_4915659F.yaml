personas:
  professional: Ivona Jones, a seasoned construction specialist with fifteen years of hands-on framing, concrete finishing, and heavy-equipment operation, translates her meticulous documentation, methodical
    scheduling, and competitive drive into on-site leadership, while her outgoing nature fuels effective crew communication and mentorship of aspiring women tradespeople.
  sports: Ivona Jones stays active through a weekly line-dancing class at the community center, competes in a senior pickleball league that faces off against the Georgia Tech Alumni team, and cheers passionately
    for the Atlanta Falcons and Atlanta Hawks, using these outlets to channel their competitive edge and ease anxiety.
  arts: Ivona Jones finds creative fulfillment singing gospel classics popularized by Mahalia Jackson and contemporary hymns by Kirk Franklin, and they regularly stitch intricate Log Cabin quilts inspired
    by fiber artist Faith Ringgold during their quilting circle, blending hands-on artistry with community storytelling.
  travel: Ivona Jones plans trips with meticulous checklists, favoring historic Southern towns like Charleston, SC, Savannah, GA, and St. Augustine, FL for weekend getaways, while dreaming of a cultural
    tour of Paris, France, balancing their love of heritage with a modest travel budget that reflects their pragmatic yet curious nature.
  culinary: Ivona Jones cultivates heirloom tomatoes and cooks garden-to-table meals such as fresh heirloom tomato gazpacho, shrimp and grits with Andouille sausage, and a sweet-potato casserole topped
    with marshmallows, while swapping butter for olive oil in their famous zucchini bread, showcasing a practical palate that loves both traditional Southern flavors and experimental twists.
  core: Ivona Jones is a highly organized, competitive construction veteran whose relentless pursuit of project perfection coexists with anxiety-driven late-night binge-watching of home-renovation shows
    and an occasional dependence on strong coffee.
background:
  cultural: Ivona grew up in a small town on the Georgia coast, raised in a family that valued hard work, community, and faith. Her upbringing in the American South, within a predominantly white Protestant
    environment, instilled a respect for tradition, hospitality, and close‑knit neighborhood ties. While she embraces these cultural roots, her career in construction—a traditionally male‑dominated field—has
    shaped a progressive outlook, encouraging her to break gender norms. She remains active in her local church, participates in community festivals, and supports regional crafts, reflecting a strong connection
    to Southern heritage while staying open to new ideas and diverse perspectives.
attributes:
  skills: '[''Framing'', ''Concrete finishing'', ''Drywall installation'', ''Heavy equipment operation'', ''Blueprint reading'', ''OSHA safety compliance'', ''Material estimation'', ''Project scheduling'',
