  hobbies: '[''Gospel choir'', ''Volunteer at food pantry'', ''Line dancing'', ''Gardening'', ''DIY home‑improvement reading'', ''Workshops on sustainable building materials'', ''Traveling to historic Southern
    towns'', ''Quilting circle'', ''Yoga'', ''Community fitness classes'']'
  career_goals: Ivona aims to transition into a foreman or site‑supervisor role within the next three years, seeking certification as a Construction Safety Officer (OSHA 30‑hour) to enhance her credibility.
    She plans to leverage her competitive drive to lead larger projects and eventually start her own modest renovation business focused on affordable housing upgrades for seniors in coastal Georgia. Mentoring
    younger workers—especially women entering the trades—is a key personal ambition, as is securing financial stability for her family’s retirement while maintaining a balanced work schedule that accommodates
    her health considerations.
