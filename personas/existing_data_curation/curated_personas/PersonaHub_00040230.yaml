persona_description: A historian and social scientist who specializes in the study of the decline of Protestantism in the southern state of Ireland during the period of Irish independence. His research
  interests include the causes and consequences of the decline of Protestantism, the role of religion in the political and social life of Ireland, and the impact of the struggle for independence on the
  Protestant community. He is interested in understanding the reasons for the decline of Protestantism, the experiences of those who left the south of Ireland, and the ways in which the struggle for independence
  affected the Protestant community. He is also interested in the impact of peace and the end of the struggle for independence on the Protestant community, and the ways in which the end of British rule
  in Ireland affected the identity of the Protestant community.
