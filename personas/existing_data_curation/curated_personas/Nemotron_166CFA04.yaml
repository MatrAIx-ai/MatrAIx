personas:
  professional: Lynn Riddle, a sophomore visual arts major who blends digital photography, graphic design, and narrative writing into community‑focused projects, leverages their calm resilience and competitive
    edge to lead collaborative exhibitions while embracing a relaxed, flexible approach that often leaves deadlines in the dust.
  sports: Lynn Riddle fuels their love of the outdoors by joining the Stevens County Trailblazers hiking club for weekend treks across prairies and lakes, dabbles in casual ultimate frisbee during spring
    with the local Spokane Spirits league, roots for the Seattle Seahawks and Seattle Sounders while swapping game day snacks for post‑match trail runs, and they often chronicle each outing in a weather‑stained
    sketchbook.
  arts: Lynn Riddle immerses themselves in the indie music scene, frequently catching shows by bands like Mitski and The National, flicks experimental visuals from director David Lynch, and draws inspiration
    from speculative fiction authors such as N.K. Jemisin while curating mixed‑media installations that echo the tactile aesthetics of Yayoi Kusama, and they often share behind‑the‑scenes sketches on Instagram.
  travel: Lynn Riddle prefers spontaneous, budget‑friendly road trips over rigid itineraries, having already chased sunrise over Mount Rainier and explored the street art of Portland, while day‑dreaming
    about a rugged backpacking adventure through Iceland’s volcanic landscapes once they can afford the flight.
  culinary: Lynn Riddle, a decent home cook who loves whipping up avocado‑feta toast and quick miso ramen with shiitake mushrooms, often experiments with pickled beet and carrot salads after a hike, yet
    they frequently burn the edges of their mixed‑media‑inspired bento bowls when distracted by a new playlist.
  core: Lynn Riddle navigates life with an artist’s curiosity, a competitively skeptical mind, and a habit of misplacing deadlines while they never miss a chance to sketch a sunrise over a prairie lake.
background:
  cultural: Lynn comes from a White American background rooted in the Upper Midwest’s small‑town culture. Growing up in Morris, Minnesota, she has been shaped by the region’s tight‑knit community values,
    a strong appreciation for the natural environment, and a modest, self‑reliant work ethic. While her family traditions reflect broader Midwestern customs—such as seasonal festivals, volunteerism, and
    an emphasis on education—Lynn’s personal interests in art and unconventional thinking push her toward broader cultural experiences beyond her hometown.
attributes:
  skills: '["Digital photography", "Basic graphic design (Adobe Photoshop/Illustrator)", "Creative writing and journaling", "Critical research and analysis", "Public speaking", "Adaptable problem solving"]'
  hobbies: '["Landscape photography", "Sketching and mixed‑media art", "Reading speculative fiction", "Attending indie concerts and open‑mic events", "Hiking and nature walks", "Volunteer work at local
    community centers", "Journaling and idea brainstorming"]'
  career_goals: Lynn aspires to transform her passion for art and ideas into a career that merges creativity with community impact. She plans to complete her bachelor's degree in visual arts or communications,
    followed by a graduate program or professional apprenticeship in museum education or arts administration. Long‑term, she envisions establishing a regional arts hub in her hometown, curating exhibitions
    and workshops that introduce unconventional artistic experiences to rural audiences. She also aims to build a portfolio that could lead to freelance design work, granting her the flexibility she values
    while maintaining a competitive edge in the creative industry.
