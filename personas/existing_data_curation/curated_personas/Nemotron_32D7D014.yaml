    ''Strategic Workforce Planning'', ''Change Management'', ''Effective Communication & Storytelling'']'
  hobbies: '[''Abstract watercolor painting'', ''Photography (urban and nature)'', ''Visiting art galleries and museums'', ''Reading speculative fiction and philosophy'', ''Creative writing (short stories,
    poetry)'', ''Small‑group theater attendance'', ''Book club participation'', ''Yoga and mindfulness meditation'', ''Nature walks and lake kayaking'', ''Volunteering at community arts programs'', ''Playing
    chess'', ''Exploring new culinary recipes'']'
  career_goals: Michelle aims to move into senior HR leadership—ideally as an HR Director or Vice President of People—within an organization that values creativity, such as a museum, arts nonprofit, or
    a forward‑thinking corporate culture. She wants to champion innovative talent‑development initiatives that blend artistic expression with professional growth, embed inclusive and compassionate workplace
    policies, and cultivate a culture of continuous learning. Additionally, she seeks to mentor emerging HR professionals and eventually launch a consultancy focused on integrating creative thinking into
    organizational culture transformation.
