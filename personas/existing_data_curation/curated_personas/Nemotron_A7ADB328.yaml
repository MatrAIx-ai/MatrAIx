personas:
  professional: Alicia Mcintyre, a retired administrative coordinator turned community archivist, leverages her budgeting, carpentry, and computer troubleshooting skills to organize small historical society
    events, mentor senior center volunteers, and meticulously document local Colorado genealogies, balancing curiosity with pragmatic project execution.
  sports: Alicia Mcintyre follows the Denver Broncos and Colorado Rockies avidly, participates weekly in a gentle walking group organized by the Rocky Mountain Birding Club, and joins a seasonal senior
    shuffleboard league at the local community center, favoring low‑impact activities that keep her active without overexertion.
  arts: Alicia Mcintyre finds creative solace in quilting circles where she recreates patterns inspired by the works of William Morris, attends local museum exhibits of Georgia O'Keeffe, and enjoys listening
    to Bob Dylan and signing up for virtual workshops by the National Quilters Circle, weaving art into her everyday life.
  travel: Alicia Mcintyre prefers purposeful, low‑key trips, often planning weekend drives to Rocky Mountain National Park for flora photography and a multi‑day visit to Mesa Vert National Park to research
    ancestral Pueblo sites, while jotting down future aspirations to explore Cinque Terre, Italy, and Kyoto, Japan, constrained by a modest travel budget and a need for medical accessibility.
  culinary: Alicia Mcintyre delights in cooking classic Colorado comfort dishes such as green‑chile enchiladas, hearty beef stew with root vegetables, and fresh rosemary‑infused chicken pot pie, while experimenting
    with new recipes like quinoa‑crusted salmon topped with pomegranate seeds, and she insists on using locally sourced heirloom tomatoes, wild mushrooms, and Santa Fe chile powder.
  core: Alicia Mcintyre blends razor‑sharp curiosity and down‑to‑earth practicality, turning retired life into a tapestry of community archives, precise budgeting, cautious health monitoring, low‑impact
    fitness, and quiet artistic pursuits, all seasoned with a competitive streak and occasional skepticism.
background:
  cultural: Alicia grew up in a mid‑western, white Protestant family that emphasized self‑reliance, modesty, and community service. After moving to Colorado Springs, she embraced the mountain lifestyle,
    valuing outdoor recreation, respect for the natural environment, and a blend of traditional values with a curiosity about new ideas. Her cultural background reflects a mix of mid‑western pragmatism
    and the progressive, environmentally aware ethos of the Colorado Front Range.
