  hobbies: '[''Visiting Art Galleries and Museums'', ''Independent Film and Documentary Viewing'', ''Cooking Traditional Mexican Cuisine with Regional Twists'', ''Reading Cultural History and Nonfiction'',
    ''Listening to Creativity Podcasts'', ''Gardening'', ''Yoga and Mindful Exercise'', ''Participating in Community festivals (e.g., Día de los Muertos events)'', ''Sketching and Journal Writing'', ''Casual
    Card Games with Family'']'
  career_goals: Ana aims to transform her passion for art and culture into a community‑focused role. She plans to obtain a certificate in Community Arts Education and volunteer as a workshop facilitator
    at the New Bedford Cultural Center, teaching Mexican folk art and cooking to children and adults. Over the next few years, she hopes to launch a small home‑based studio where she sells handcrafted items
    and offers private lessons, eventually expanding to an after‑school program that blends artistic expression with bilingual education. Simultaneously, she strives to mentor younger Latina women in the
    area, encouraging them to pursue creative and leadership opportunities.
