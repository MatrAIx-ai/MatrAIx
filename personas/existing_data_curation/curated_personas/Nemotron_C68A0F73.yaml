personas:
  professional: Eli Curry, an aspiring junior robotics engineer, channels their fierce competitive streak and love of solitary problem‑solving into building Arduino sensor bots, preferring flexible, ad‑hoc
    project timelines over rigid planning and they often question collaborative ideas from peers.
  sports: Eli Curry, a self‑described hiking aficionado, spends weekends exploring the Great Smoky Mountains with the local Youth Trail Club, keeps an eye on the Nashville Predators (NHL) and the Tennessee
    Titans (NFL) from home, but they shun organized team sports in favor of solo cardio walks and occasional indoor rock‑climbing sessions at the Knoxville gym.
  arts: Eli Curry, an avid sci‑fi aficionado, devours novels by Isaac Asimov, watches Christopher Nolan's films like Interstellar, and playlists electronic scores by Hans Zimmer and Daft Punk while they
    sketch Lego Technic designs, treating these creative sparks as fuel for their engineering imagination.
  travel: Eli Curry, who prefers the quiet of nature over bustling airports, has trekked the Appalachian Trail’s segment near the Great Smoky Mountains and dreams of visiting the Kennedy Space Center in
    Florida and the aurora‑rich skies of Iceland once they’re old enough to travel solo, and they always plan trips with a loose itinerary that leaves room for spontaneous detours.
  culinary: Eli Curry, a self‑taught kitchen experimenter, can whip up a decent pepperoni pizza with a homemade crust, loves the simplicity of spaghetti carbonara featuring pancetta and Pecorino, and they
    enjoy snacking on chocolate‑covered pretzels while tinkering with a sensor‑controlled smart fridge that reminds them to restock ingredients.
  core: Eli Curry is a solitary, competition‑driven tech tinkerer who balances restless curiosity with a relaxed, sometimes messy approach to life, they thrive on self‑directed projects and quiet hikes.
background:
  cultural: 'Eli grows up in a middle‑class white family in Loudon County, near Knoxville, Tennessee. His upbringing reflects a blend of Southern Appalachian cultural traits: a respect for self‑reliance,
    an appreciation for the outdoors, and exposure to regional music and folklore. While his community values tradition and close‑knit family ties, Eli’s school and neighborhood also provide access to modern
    technology and extracurricular programs that nurture independent learning. He attends a public middle school where STEM clubs and computer labs support his interests, and his family encourages a balance
    of practical hands‑on activities and academic curiosity.'
attributes:
  skills: '[''basic Python programming'', ''strategic chess play'', ''DIY electronics with Arduino'', ''Lego Technic model building'', ''competitive video gaming (real‑time strategy)'']'
  hobbies: '[''reading science‑fiction and popular science'', ''Arduino electronics projects'', ''chess (online and offline)'', ''Lego Technic model building'', ''competitive real‑time strategy video gaming'',
    ''hiking in the Great Smoky Mountains'']'
  career_goals: Eli envisions a future where his practical problem‑solving skills translate into a career in software engineering or robotics design. In the short term, he wants to win a regional coding
    competition and qualify for a national e‑sports tournament. Long‑term, he aims to earn a scholarship for a computer science or engineering program, eventually contributing to the development of autonomous
    devices or innovative gaming software. His competitive nature drives him to set clear milestones, while his emotional stability helps him stay focused on long‑term goals.
