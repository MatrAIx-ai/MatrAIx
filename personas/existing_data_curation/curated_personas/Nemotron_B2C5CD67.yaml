    ''Traveling to explore cross‑cultural festivals'']'
  career_goals: Nancy aims to become a district‑wide early‑learning director within the next five years, championing a city‑wide model that places arts at the core of preschool and kindergarten curricula.
    She plans to earn a Master’s in Educational Leadership and publish research on the impact of multicultural arts programming on social‑emotional development. Her ambition includes establishing a network
    of community‑based art labs that collaborate with local museums, cultural centers, and immigrant families, thereby creating inclusive spaces where South Asian storytelling and other traditions enrich
    children’s learning experiences. She also seeks to mentor rising educators, especially women of color, and to influence New York City’s early‑education policy to secure sustained funding for creative‑learning
    initiatives.
