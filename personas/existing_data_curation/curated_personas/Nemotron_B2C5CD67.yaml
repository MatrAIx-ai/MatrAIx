personas:
  professional: Nancy Huda, a veteran early‑learning program director in Manhattan, blends eight years of curriculum design and grant‑writing expertise with a data‑driven, evidence‑based mindset, while
    their skeptical eye and competitive drive push them to constantly benchmark program outcomes against city standards, and their organized‑yet‑flexible style lets them pivot quickly when community needs
    shift.
  sports: Nancy Huda participates in a Thursday night yoga class at a local studio, jogs along the East River during brisk walks, follows the New York Knicks and Brooklyn Nets closely, and has a casual
    membership in the Astoria Running Club, where they occasionally challenge teammates in friendly 5k races.
  arts: Nancy Huda immerses themselves in the Astoria and Williamsburg art scenes, regularly attends gallery openings featuring artists like Kehinde Wiley and Ai Weiwei, features experimental theater productions
    at the Knockdown Center, and cites spoken‑word poet Sarah Kay and contemporary painter Julie Mehretu as constant sources of creative inspiration for their mixed‑media collages.
  travel: Nancy Huda prefers curated weekend getaways that blend art and culture, having explored the mural districts of Philadelphia, the museums of Berlin, and the tea houses of Kyoto, while planning
    a future visit to Oaxaca to study traditional textile workshops, and relies on detailed itineraries to balance travel costs with their tight schedule.
  culinary: Nancy Huda enjoys cooking at home, often preparing vegetarian dishes like chana masala, roasted cauliflower tacos with quinoa, and a signature avocado‑lime salsa, but admits to over‑indulging
    in artisanal coffee and occasional late‑night pizza deliveries after long workdays, and they keep a small herb garden on their balcony for fresh basil and mint.
  core: Nancy Huda is a fiercely curious early‑learning advocate whose competitive edge fuels relentless program improvement, yet a streak of anxiety and a habit of over‑splurging on art supplies keep them
    constantly walking a tightrope between ambition and self‑care.
background:
  cultural: Nancy’s cultural identity is rooted in a South Asian (Bangladeshi‑Indian) immigrant family that settled in Queens in the early 1990s. She grew up bilingual, speaking Bengali and English at home,
    and celebrates festivals such as Eid, Diwali, and Pahela Baishakh with traditional music, dance, and culinary rituals. This multicultural upbringing fostered an early appreciation for storytelling and
    visual arts, from classical tabla rhythms to contemporary Indian cinema. In Astoria’s diverse community, she blends her heritage with the borough’s mosaic of cultures, often curating multicultural arts
    programming that highlights South Asian art forms alongside Caribbean, Latinx, and European traditions. Her background influences her commitment to inclusive education and her desire to give children
    a sense of belonging through shared cultural experiences.
