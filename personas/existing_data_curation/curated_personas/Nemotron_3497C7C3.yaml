  hobbies: '[''portrait and landscape painting'', ''abstract and experimental art'', ''custom woodworking projects'', ''growing heirloom vegetables and herbs'', ''reading philosophy, poetry, and art theory'',
    ''listening to salsa, Bomba, jazz, and blues music'', ''cooking traditional Puerto Rican dishes'', ''tracing family genealogy'', ''volunteering at the community garden'', ''digital photography of nature
    and still life'']'
  career_goals: Jesus aims to curate a traveling exhibition of his paintings and photographs that juxtapose Puerto Rican cultural motifs with the rural Tennessee landscape, ultimately debuting at the Lauderdale
    County Community Center. He aspires to write and self-publish a memoir that weaves together his life story, artistic journey, and reflections on cultural identity. Another goal is to launch an online
    portfolio and modest e-commerce site to sell limited-edition prints and handcrafted wooden items. He also hopes to mentor a small group of local youth in basic art techniques and gardening, establishing
    a quarterly workshop series that promotes creativity, discipline, and cross-cultural appreciation. Finally, he plans to obtain a basic horticulture certification to improve the community garden’s sustainability
    and educational outreach.
