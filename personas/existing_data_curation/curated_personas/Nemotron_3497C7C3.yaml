personas:
  professional: Jesus Germoso, a senior visual artist and community arts facilitator, leverages their disciplined organization, bilingual fluency, and meticulous woodworking and painting skills to curate
    exhibitions that fuse abstract landscapes with island-inspired motifs while coordinating volunteer workshops and local events with quiet precision.
  sports: Jesus Germoso enjoys gentle morning walks in the community garden and follows the Tennessee Titans football season with avid enthusiasm, rarely joining organized sports but cheering at local high
    school baseball games and occasionally playing casual shuffleboard at the senior center.
  arts: Jesus Germoso immerses themselves in abstract painting inspired by Wassily Kandinsky and Frida Kahlo, captures still‑life scenes with a vintage Nikon, and finds rhythmic inspiration from the salsa
    beats of Tito Puente, the Bomba drums of neighborhood musicians, and the soulful blues of B.B. King.
  travel: Jesus Germoso prefers meticulously planned road trips that blend cultural immersion with natural scenery, having toured the historic streets of a coastal Caribbean town where their family roots
    lie, and dreaming of exploring the Andalusian villages of southern Spain.
  culinary: Jesus Germoso delights in crafting traditional dishes such as arroz con gandules seasoned with sofrito, lechón slow‑roasted with adobo, and fresh heirloom tomato salads dressed with basil and
    oregano, while also experimenting with new herb blends harvested from their garden’s bounty.
  core: Jesus Germoso, a disciplined dreamer, balances a love for abstract color experiments with a habit of meticulously labeling garden seeds, creating a life that feels like a carefully composed painting
    of two worlds while habitually humming salsa tunes as they sand wood.
background:
  cultural: Jesus is a first-generation Puerto Rican American who grew up bilingual in a household that celebrated island traditions while adapting to life in the American South. He retains fluency in Spanish
    and regularly uses it in conversations with family and the local Latino community. Puerto Rican cultural expressions—such as music (salsa, Bomba), cuisine (sofrito‑based dishes), and oral storytelling—are
    central to his identity and often surface in his art and community activities. After relocating to Halls, Tennessee, he integrated Southern hospitality and values of neighborly cooperation into his
    daily life, creating a unique blend of Caribbean vibrancy and Southern warmth. He participates in local Catholic parish festivals, observes Puerto Rican holidays like Three Kings Day, and frequently
    shares cultural recipes and folk stories with neighbors, fostering cross‑cultural understanding in Lauderdale County.
attributes:
  skills: '[''watercolor painting'', ''abstract acrylic art'', ''woodworking and custom furniture building'', ''organic gardening'', ''bilingual communication (Spanish/English)'', ''community event planning
