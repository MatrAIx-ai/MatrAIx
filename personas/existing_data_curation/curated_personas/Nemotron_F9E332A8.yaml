  hobbies: '[''gardening (heirloom vegetables)'', ''cooking traditional Mexican dishes'', ''reading historical fiction and biographies'', ''walking and birdwatching on local trails'', ''quilting and crocheting'',
    ''listening to regional Mexican music'', ''volunteering at church and senior center'', ''solving crosswords and Sudoku'', ''attending small cultural events'', ''participating in community gardening
    projects'']'
  career_goals: Yaritssa aims to advance to a shift supervisor or senior material mover position within her current facility, leveraging her experience to improve workflow efficiency. She plans to obtain
    advanced certifications, such as the OSHA Safety Trainer credential, to formalize her role as a trainer for new employees. By introducing small process improvements, she hopes to contribute to cost
    savings and safer operations. Long‑term, she envisions a gradual transition to part‑time consulting or training, allowing her to share her expertise while maintaining a stable retirement income and
    continuing to support her family.
