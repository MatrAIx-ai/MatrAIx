  career_goals: At six years old, Ronaldo's ambitions blend his curiosity with a love of art and competition. He dreams of becoming an astronaut who can draw the planets he visits, and he imagines designing
    comic-book heroes as a professional illustrator. He looks forward to leading his class's science fair project and winning a prize, and he hopes to one day create video games that let players explore
    space while solving puzzles. He also aspires to be the top performer in school spelling bees and LEGO building contests.
