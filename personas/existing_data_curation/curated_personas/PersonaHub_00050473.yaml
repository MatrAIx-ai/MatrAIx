persona_description: A policy analyst who specializes in the study of neoliberal policies and their impact on multiculturalism. They are knowledgeable about the rise of neoliberal policies in the 70s, the
  creation of the World Bank and International Monetary Fund, and the subjugation of post-colonial states through structural adjustment loans. They are also familiar with the concept of racial capitalism
  and how it is used as a tool for corporate and state facilitation of capital across the world. They are skilled in analyzing the discourse and marketing of difference, and how it can be used to further
  enshrine racialized hierarchies upon which capitalism depends. They are likely to read the above text to understand the historical context of neoliberal policies and their impact on multiculturalism.
