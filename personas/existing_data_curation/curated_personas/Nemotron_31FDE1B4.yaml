personas:
  professional: Shane Palma, a retired carpenter turned community storyteller, leads senior‑center storytelling circles, organizes oral‑history projects, runs trivia nights and mentors younger locals in
    public speaking; their talkative, competitive nature fuels an energetic yet occasionally disorganized approach that makes them a beloved cultural archivist in their small Midwestern town.
  sports: Shane Palma competes in a local bowling league, joins Sunday senior yoga classes, and follows the Chicago Cubs and Chicago Bears closely; they also play weekly poker tournaments, walk neighborhood
    trails with their dog for low‑impact cardio, and enjoy occasional community center table‑tennis matches, channeling their competitive streak into both physical and mental sports.
  arts: Shane Palma paints watercolor landscapes of the Illinois countryside, plays acoustic guitar improvising folk and classic‑rock tunes, and collects vintage vinyl spanning Miles Davis, The Beatles
    and Muddy Waters; they regularly attend productions at the Champaign‑Urbana Center Stage, host intimate listening parties featuring Don McLean’s ‘American Pie’, and display selected artworks at the
    county library, weaving music and visual art into their social life.
  travel: Shane Palma favors short cultural excursions, such as trips to Chicago’s Art Institute to explore Impressionist pieces and weekend drives to Shawnee National Forest for sketching sessions; they
    dream of spending a week in New Orleans for jazz festivals and Creole cuisine, but travel plans usually hinge on senior‑center schedules and modest budgeting.
  culinary: Shane Palma enjoys cooking farm‑to‑table meals that highlight heirloom tomatoes, such as fresh Caprese salads, sun‑dried tomato pesto pasta and grilled cheese with basil, pairing dishes with
    chilled Riesling while their favorite vinyl spins; they have moderate cooking skills, rely on handwritten family recipes, but occasionally over‑salt foods, a habit from years of snacking on salty crackers.
  core: Shane Palma is a talkative, competitive 71‑year‑old who blends storytelling, watercolor painting, vinyl collecting, and garden‑grown tomatoes into a vibrant community presence, juggling occasional
    forgetfulness and health worries with a zest for social games and artistic expression.
background:
  cultural: Shane’s cultural background is rooted in the rural, white Midwestern community of Edgar County, Illinois. His ancestors were German and Irish immigrants who settled the area in the late 19th
    century, bringing traditions of hearty hospitality, community fairs, church gatherings, and high‑school sports. Growing up in Paris, IL, he internalized the region’s practical, self‑reliant mindset
    while also developing an appreciation for broader artistic influences through trips to larger cities and a well‑stocked public library. He celebrates traditional holidays such as St. Patrick’s Day and
    Oktoberfest, values the modesty and neighborliness of the heartland, and combines that heritage with an eager curiosity for new ideas, art, and unconventional experiences.
