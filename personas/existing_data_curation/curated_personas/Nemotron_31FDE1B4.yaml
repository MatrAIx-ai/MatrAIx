  hobbies: '[''Playing Acoustic Guitar'', ''Watercolor Painting'', ''Attending Local Theater'', ''Participating in Trivia Nights'', ''Playing Poker and Card Games'', ''Gardening Heirloom Vegetables'', ''Collecting
    Vintage Vinyl Records'', ''Volunteering at the Senior Center'', ''Hosting Storytelling Circles'', ''Exploring Regional Art Museums'', ''Bowling League Participation'', ''Photography of Illinois Landscapes'']'
  career_goals: As a septuagenarian, Shane's main ambitions revolve around leaving a personal legacy, staying socially active, and continuing his learning. He aims to compile a memoir of local history and
    his life, create a small exhibition of his watercolor and photography work at the county library, and establish a monthly storytelling circle for seniors. He also hopes to mentor younger community members
    in public speaking and to win the annual county card‑games tournament. Staying mentally sharp and feeling valued in his community are his guiding goals.
