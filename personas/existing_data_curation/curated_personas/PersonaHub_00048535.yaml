persona_description: A historian who specializes in the study of the British Indian Army and its role in the Indian subcontinent during the early 20th century. He is particularly interested in the Imperial
  Service Troops and their role in China and British Somaliland during the first decade of the 20th century. His research interests include the history of the Indian Army, the evolution of the British Indian
  Army, and the impact of the army on the development of India. He is also knowledgeable about the treaty arrangements that bound the armies of the Native States and the restrictions imposed on them. He
  has a deep understanding of the history of the British Indian Army and its role in the Indian subcontinent during the early 20th century.
