personas:
  professional: Donovan Nguyen is a 17-year-old aspiring UI/UX designer and multimedia artist who blends a disciplined workflow with a curious eye for visual storytelling, leveraging Adobe Photoshop, Illustrator,
    GIMP, and front-end HTML/CSS skills to craft prototype interfaces while volunteering to tutor peers and help younger children with art projects.
  sports: Donovan Nguyen is a 17-year-old who channels kinetic energy into weekend soccer matches with the local youth club, cheers for the LA Galaxy during the MLS season, and maintains personal fitness
    through early-morning jogging in the nearby state park, balancing a love of team camaraderie with solitary runs that double as photo-ops for landscape shots.
  arts: Donovan Nguyen is a 17-year-old visual creator who fills sketchbooks with original characters inspired by the cinematic worlds of Hayao Miyazaki and the graphic storytelling of Alan Moore, strums
    acoustic renditions of John Mayer while experimenting with lo-fi beats, curates a YouTube channel where they edit short narrative videos using DaVinci Resolve, and spends evenings practicing brush calligraphy
    of traditional characters, blending modern indie aesthetics with ancient line work.
  travel: Donovan Nguyen is a 17-year-old who prefers weekend road trips to nearby national parks like Yosemite for sunrise photography, dreams of a spring pilgrimage to Japan's cherry-blossom festivals,
    and balances school obligations by planning trips around school breaks, often saving travel funds through a dedicated explore account while swapping travel tips on teen travel forums.
  culinary: Donovan Nguyen is a 17-year-old who enjoys cooking family-style rice cakes (bánh chưng) for Lunar New Year celebrations, perfects a pho broth with star anise, ginger, and cilantro, and experiments
    with fusion dishes like kimchi-topped bánh mì, all while juggling moderate kitchen confidence with occasional over-salting that they laugh off and correct in subsequent batches.
  core: Donovan Nguyen is a meticulously organized teen artist whose curiosity fuels a disciplined pursuit of UI/UX design, balanced by quiet guitar sessions, occasional procrastination on laundry, and
    a habit of sketching on napkins during class.
background:
  cultural: Donovan is a second‑generation Vietnamese‑American raised in Waxhaw, North Carolina. At home he speaks Vietnamese and participates in cultural traditions such as Tet, cooking pho and bánh chưng,
    and observing the values of respect for elders and community support. His family places a strong emphasis on education and perseverance, which influences his disciplined approach to personal projects.
    While integrating into the local Southern community, he balances his dual heritage by sharing Vietnamese art and cuisine at school events and community festivals, fostering cross‑cultural understanding.
