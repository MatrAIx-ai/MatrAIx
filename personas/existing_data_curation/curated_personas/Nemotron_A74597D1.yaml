  career_goals: Donovan aspires to turn his passion for art and technology into a career as a UI/UX designer or multimedia artist. He aims to attend a community college program in graphic design, secure
    an apprenticeship with a local design studio, and eventually work on interactive media projects that blend cultural storytelling with modern digital experiences. He also hopes to develop a personal
    brand and showcase his work at regional art exhibitions, while possibly pursuing a scholarship to study visual communications.
