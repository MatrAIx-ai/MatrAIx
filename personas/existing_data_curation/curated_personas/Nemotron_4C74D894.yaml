  career_goals: He aims to combine his hands‑on aptitude with a community‑focused career. Brandon is interested in becoming an agricultural mechanic or pursuing automotive technology at a community college,
    with the long‑term goal of managing his family’s farm or serving as a volunteer firefighter. He also envisions taking on leadership roles in local youth or sports programs, allowing him to stay engaged
    with peers while contributing to the town’s well‑being.
