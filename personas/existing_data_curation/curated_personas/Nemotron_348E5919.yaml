  hobbies: '[''Cooking traditional Honduran dishes'', ''Listening to music (cumbia, punta, classic Honduran songs)'', ''Watching soccer'', ''Gardening'', ''Attending church services'', ''Community festivals'',
    ''Fishing'', ''Family gatherings'']'
  career_goals: While approaching retirement, Arturo hopes to transition to a part‑time supervisory role where he can share his experience with younger staff and ensure a friendly, harmonious store atmosphere.
    He also dreams of opening a small weekend stall selling traditional Honduran dishes like baleadas and tamales, using his cooking skills to bring a taste of his heritage to Garland. Additionally, he
    wishes to continue volunteering, perhaps leading a neighborhood after‑school program that supports Spanish‑speaking families.
