personas:
  professional: Arturo Perez, a seasoned retail veteran with over three decades of cash handling and POS expertise, blends his practical problem-solving with a compassionate, cooperative approach to train
    new staff and aspires to a part-time supervisory role that nurtures a harmonious store atmosphere.
  sports: Arturo Perez, an avid soccer fan who never misses a match of the national side or FC Dallas and cheers for the Dallas Cowboys on Sundays, occasionally joins a neighborhood recreational soccer
    league and enjoys fishing trips on Lake Texoma as his off-season sport.
  arts: Arturo Perez, who fills his evenings with classic folk ballads from his upbringing, attends local church choir rehearsals, participates in community festivals featuring traditional dance troupes
    like the Marimba Ensemble, and also enjoys classic Cuban boleros by artists such as Benny Moré.
  travel: Arturo Perez, a modest traveler who prefers spontaneous weekend drives to nearby fishing spots on Lake Texoma and day trips to the historic San Antonio River Walk, dreams of exploring the coastal
    towns of Guanacaste in Costa Rica, but balances his wanderlust with family commitments and a fixed retirement budget.
  culinary: Arturo Perez, a skilled home cook who lovingly prepares family staples like pupusas, sopa de frijoles, fried plantains, baleadas, and tamales using fresh corn masa, black beans, ripe plantains,
    and cilantro, enjoys experimenting with spicy salsa roja, and often shares his dishes at neighborhood potlucks while planning a weekend stall to showcase these flavors.
  core: Arturo Perez blends a practical retail mind with a compassionate heart, letting his love for cooking, gardening, and community festivals color a life seasoned by gentle disorganization, spontaneous
    kindness, and a penchant for late-night soccer.
background:
  cultural: Arturo was born in Honduras and moved to Texas as a young adult, bringing with him a deep respect for family, Catholic traditions, and Honduran culinary heritage. In Garland, he maintains a
    bilingual household, speaking Spanish at home while navigating English in his work and community. He celebrates Honduran holidays such as Independence Day and Semana Santa, and often shares these customs
    with neighbors. His identity blends the warmth of Central American community values with the multicultural tapestry of Dallas County, influencing his compassionate outlook and desire to help others.
