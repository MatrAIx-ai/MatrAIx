  career_goals: As he approaches retirement, Dean aims to transition into a supervisory role where he can mentor younger workers and lead safety initiatives. He hopes to be promoted to shift lead or foreman
    within the next year, focusing on streamlining inventory processes and enhancing workplace safety. Additionally, he plans to obtain a certification in logistics management to broaden his understanding
    of modern warehouse technology, ensuring he leaves a lasting, organized legacy before stepping back to a part‑time consulting capacity.
