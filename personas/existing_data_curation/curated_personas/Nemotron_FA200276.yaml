  career_goals: Michael aims to combine his curiosity for technology with a practical career path. In the short term, he plans to graduate high school, deepen his programming knowledge, and join the school's
    robotics team to compete in regional contests. Over the next five to ten years, he aspires to earn a bachelor's degree in computer engineering or software development, secure an internship at a tech
    firm, and ultimately work as a software engineer designing interactive applications or gaming platforms. He also dreams of starting his own small tech startup that creates educational coding tools for
    middle school students, allowing him to blend his competitive drive with his desire to help others.
