personas:
  professional: Michael Powell is an aspiring robotics engineer who leads his high school robotics club’s programming efforts, blending his competitive drive with a pragmatic knack for troubleshooting hardware,
    which makes him both a reliable team organizer and a critical problem solver.
  sports: Michael Powell balances school soccer and weekend pickup basketball with frequent hikes in the Wasatch foothills, cheering on the Utah Jazz and Real Salt Lake while treating fitness as both a
    competitive outlet and a social ritual.
  arts: Michael Powell unwinds by strumming acoustic guitar covers of John Mayer and Ed Sheeran, immerses in sci‑fi classics like Frank Herbert’s Dune, and streams indie film festivals, letting artistic
    expression fuel the same curiosity that drives their robotics projects.
  travel: Michael Powell prefers adventure‑heavy trips that blend outdoor challenges with tech culture, having camped in Yellowstone and dreaming of a Tokyo esports tour, while budget constraints keep longer
    stays abroad to yearly school breaks.
  culinary: Michael Powell cooks at a solid intermediate level, often whipping up protein‑packed smoothies, spicy ramen, and DIY pizza topped with fresh basil and pepperoni after a late night of gaming,
    showing a palate that loves bold flavors and quick, energy‑boosting meals.
  core: Michael Powell is a tech‑savvy teen who juggles competitive gaming, robotics, and acoustic guitar; they fiercely balance ambition with occasional impulsive spending and a love for rugged hikes.
background:
  cultural: Michael grows up in Pleasant Grove, Utah, a suburban community in the heart of Utah County. His family background reflects the typical middle‑class, predominantly White demographic of the Intermountain
    West. Community life here emphasizes strong family bonds, participation in school and LDS‑affiliated youth programs, and frequent outdoor recreation such as hiking, skiing, and camping in the nearby
    mountains. While his family attends a local Latter‑Day Saint congregation, they also celebrate broader American holidays and values of self‑reliance, volunteerism, and community service, which shape
    Michael's outlook and activities.
