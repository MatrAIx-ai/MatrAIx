persona_description: A scientist who is interested in plant biology, genetics, and molecular biology. They are familiar with the Human Genome Project and its goals of discovering the complete set of human
  genes and determining the complete sequence of DNA bases in the human genome. They are likely to be involved in research on the Arabidopsis thaliana plant, which has a small physical size and relatively
  small genome. They are also likely to be interested in the gene function project and the electronic form of the newsletter, which facilitated HGP communication and prevented duplication of research effort.
