  hobbies: '[''Community Soccer League'', ''Cooking Traditional Mexican Cuisine'', ''Participating in Neighborhood Festivals'', ''Volunteering at the Local Senior Center'', ''Family Gatherings'', ''Gardening'',
    ''Hiking in Santa Monica Mountains'', ''Photography'', ''Listening to Regional Mexican Music'', ''Attending Weekly Mass'']'
  career_goals: Victor aims to transition from a support role to a senior administrative leadership position within the next five years. He plans to earn the Certified Administrative Professional (CAP)
    credential and become proficient in project‑management platforms such as Asana and Trello to oversee cross‑departmental initiatives. His long‑term ambition is to serve as an Office Manager or Facilities
    Coordinator, where he can mentor younger staff, implement efficiency‑driven workflows, and contribute to community outreach programs that support local small businesses, especially those owned by fellow
    Mexican‑American entrepreneurs. He also envisions occasional consulting work that blends his administrative expertise with his cultural insight to help organizations improve their customer‑service strategies
    for diverse populations.
