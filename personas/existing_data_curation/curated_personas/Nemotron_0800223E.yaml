  career_goals: He dreams of turning his love for imagination and technology into a future career as a video game designer or multimedia artist who creates interactive worlds. He also feels fascinated by
    space and sometimes imagines becoming an astronaut or astrophysicist, exploring new frontiers. He wants to use his methodical planning to lead creative projects and hopes to one day produce stories
    and games that inspire other kids, promote kindness, and bring people together.
