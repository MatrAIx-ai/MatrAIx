  career_goals: Although formally retired, Mandy aspires to create a personal legacy through a series of intertwined projects. She plans to finish a memoir that weaves together her family history with reflections
    on the cultural evolution of Oconomowoc. She also hopes to curate a small exhibition of her artwork at the local library and to lead workshops for seniors interested in watercolors and storytelling.
    Additionally, Mandy aims to expand her digital photography skills to document local nature and heritage sites, sharing these images in community newsletters and online archives.
