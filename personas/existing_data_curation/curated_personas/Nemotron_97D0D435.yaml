personas:
  professional: Marc Jenkins is a senior software architect with three decades of full‑stack development, cloud infrastructure, data engineering, and cybersecurity experience, who channels their competitive
    edge and pragmatic curiosity into leading secure, scalable projects while mentoring junior engineers.
  sports: Marc Jenkins is a co‑ed basketball league regular, an avid weekend golfer competing in Huntsville Country Club amateur tournaments, a seasonal fisherman targeting bass on Lake Guntersville, and
    a loyal fan of the Atlanta Falcons, Atlanta Braves, and New Orleans Saints.
  arts: Marc Jenkins enjoys classic‑rock concerts featuring the Rolling Stones and Lynyrd Skynyrd, collects vintage vinyl, attends performances at the Alabama Shakespeare Festival, and occasionally dabbles
    in playing electric guitar at community jam sessions.
  travel: Marc Jenkins favors road trips that blend outdoor adventure with family time, having hiked the Appalachian Trail segment in North Carolina, fished in Patagonia's lakes, and dreaming of a summer
    sail in the Greek Islands while juggling a modest travel budget.
  culinary: Marc Jenkins is a confident grill master who perfects smoked pulled pork, shrimp and grits, and bourbon‑glazed ribs using hickory chips and smoked paprika, while they also appreciate a good
    bowl of pho from a local Vietnamese restaurant for its bold flavors.
  core: Marc Jenkins blends Southern hospitality with a data‑driven mindset, turning community gatherings into networking opportunities, while their competitive streak fuels both career ambition and occasional
    impulsive spending.
background:
  cultural: Marc was raised in a small town outside Birmingham, Alabama, in a family that emphasized Southern hospitality, church involvement, and a strong work ethic. Growing up in the heart of the American
    South, he carries a deep appreciation for community gatherings, traditional Southern cuisine, and the region’s emerging tech scene—especially the aerospace and defense industries that surged around
    Huntsville. His cultural identity blends conservative values with a pragmatic, curiosity‑driven outlook shaped by a STEM education and a career in technology.
