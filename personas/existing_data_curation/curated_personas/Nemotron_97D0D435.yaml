  career_goals: Marc aims to transition from hands‑on architecture to a technology‑director or CTO role within the next five years, where he can shape the strategic roadmap for digital transformation in
    the aerospace and defense sector that dominates Madison County. He also wants to champion AI‑driven analytics for local businesses, launch a boutique consulting practice focused on secure cloud migrations,
    and devote more time to mentoring junior engineers through university partnership programs.
