persona_description: A scientist with a focus on ecological research, specifically studying the impacts of anthropogenic disturbances and invasive species on natural ecosystems, particularly in the Southern
  Appalachian Mountains. The individual is interested in the recovery of Fraser fir stands from high rates of mortality caused by the balsam woolly adelgid (BWA). They have conducted detailed field surveys
  and analyzed aerial photographs to understand the spatial and temporal trends of spruce-fir forest cover change and stand structure, mortality, and infestation levels. The researcher is likely to have
  a background in forestry, botany, and ecology, and is experienced in using statistical methods and GIS software to analyze data.
