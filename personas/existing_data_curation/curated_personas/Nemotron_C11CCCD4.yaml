    communication and service professionalism'', ''Cultural crafts (beadwork, basket weaving)'']'
  hobbies: '[''Gardening (vegetable and Three Sisters planting)'', ''Birdwatching'', ''Walking nature trails'', ''Reading historical fiction and DIY guides'', ''Quilting circle'', ''Traditional cooking
    (frybread, stew)'', ''Attending small tribal gatherings and powwow drumming circles'', ''Beadwork jewelry making'']'
  career_goals: Bebe aims to transition from individual housekeeping to a supervisory role, such as lead housekeeper for a local senior living facility or boutique inn, where she can apply her methodical
    approach to larger operations. She is working toward obtaining a green‑cleaning certification and an OSHA safety course to bolster her credentials. Long‑term, she plans to launch a small, community‑focused
    cleaning business that offers employment opportunities to other women from her tribal community, providing mentorship and training. Financially, she seeks to build a solid retirement fund and possibly
    invest in a modest rental property to ensure stable income in her later years. Additionally, she hopes to preserve and share her cultural crafts by teaching beadwork classes at the local community center.
