personas:
  professional: Bebe Patel is an experienced housekeeper with over three decades of expertise in systematic deep cleaning, chemical safety, inventory control, and minor home repairs, and they channel their
    organized, competitive nature into streamlining operations and mentoring junior staff as they pursue a supervisory role at a local senior living facility.
  sports: Bebe Patel enjoys daily solitary walks on nature trails, participates in a local senior walking club, follows the River Valley Rangers minor league baseball team, competes in a weekly senior bowling
    league, and occasionally joins a community pickleball group, balancing low‑impact exercise with a competitive spirit.
  arts: Bebe Patel actively cultivates creativity through a monthly quilting circle, crafts intricate beadwork jewelry sold at craft fairs, attends powwow drumming circles, and finds inspiration in the
    historical novels of Philippa Gregory and the folk music of Joan Baez, all of which shape their artistic identity.
  travel: Bebe Patel prefers meticulously planned road trips that combine visits to national parks such as Yellowstone and the Great Smoky Mountains with stops at regional craft fairs in Santa Fe and Sedona,
    favoring modest motels and budget‑friendly itineraries while dreaming of a future cultural pilgrimage to the historic sites of Kyoto.
  culinary: Bebe Patel relishes cooking traditional frybread and hearty vegetable stew using home‑grown corn, beans, and squash, expertly seasons dishes with cumin, chili powder, and fresh cilantro, balances
    simple, nutritious meals with occasional indulgent cornbread, and enjoys sharing recipes at community gatherings.
  core: Bebe Patel is a methodical, competition‑driven housekeeper turned aspiring entrepreneur who balances quiet gardening, beadwork, and solitary walks with a pragmatic, skeptical outlook on life.
background:
  cultural: Bebe identifies as an American Indian from Oklahoma, with roots in the Cherokee Nation. Her upbringing immersed her in the community's values of respect for the land, storytelling, and intergenerational
    knowledge sharing. She regularly participates in tribal cultural events, such as seasonal harvest celebrations and powwow gatherings, where she engages in traditional dance, music, and craftwork. These
    experiences reinforce her connection to nature, which influences her gardening practices and choice of environmentally friendly cleaning methods. Bebe also maintains family recipes passed down through
    generations, preserving culinary traditions while adapting them to modern household needs.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning and sanitization'', ''Laundry and fabric care'', ''Floor care (hardwood, tile, carpet)'', ''Window and glass cleaning'', ''Inventory management of cleaning
