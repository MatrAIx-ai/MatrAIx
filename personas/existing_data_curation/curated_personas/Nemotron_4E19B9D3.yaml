  career_goals: Ronnie aspires to become a civil engineer who designs resilient, flood‑proof infrastructure for communities like Houston and the regions of Venezuela that are vulnerable to climate‑related
    challenges. He envisions himself winning his middle school’s science fair, then advancing to regional robotics competitions, and ultimately earning scholarships for a top STEM program. His long‑term
    ambition includes collaborating with humanitarian NGOs to develop affordable, sustainable housing solutions, while also mentoring younger students in organized study techniques.
