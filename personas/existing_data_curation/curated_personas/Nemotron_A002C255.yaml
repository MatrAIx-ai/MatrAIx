  hobbies: '[''Intramural Soccer'', ''Live Music Concerts'', ''Improvisational Comedy Workshops'', ''Spontaneous Road Trips'', ''Hiking (Middlesex Fells)'', ''Experimental Cooking'', ''Woodworking'', ''Mindfulness
