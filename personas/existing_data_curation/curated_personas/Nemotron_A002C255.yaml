  career_goals: Frederick aims to secure tenure at his institution within the next three to five years, using that stability to focus on building a signature course on sustainable entrepreneurship that
    blends routine classroom structure with occasional spontaneous field projects. He plans to author a textbook that presents practical, step-by-step guidance for small-business owners, positioning himself
    as a leading voice in applied business education. Leveraging his competitive drive, he seeks to lead his department to national teaching excellence awards and to develop a regional student-business
    mentorship network. Simultaneously, he hopes to maintain a flexible consulting practice with local startups, allowing him to indulge his spontaneous side while preserving the security of a tenured academic
    career. Finally, he aspires to improve his own emotional resilience through professional development, so he can model healthier stress-management strategies for his students.
