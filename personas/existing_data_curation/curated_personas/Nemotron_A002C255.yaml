personas:
  professional: Frederick Sabouni, a 34‑year‑old business professor at a Massachusetts university, blends rigorous quantitative expertise in Excel, SPSS, and Tableau with a hands‑on teaching style that
    balances structured curricula and spontaneous field projects, yet his competitive drive sometimes clashes with his habit of over‑booking social events, making deadline management a recurring challenge.
  sports: Frederick Sabouni, an avid member of Medford’s intramural soccer league and a youth basketball coach, cheers for the Boston Celtics and follows the New England Revolution, combining regular weekend
    hikes in the Middlesex Fells with spontaneous beach runs along the New England coastline, though his competitive nature sometimes fuels intense post‑game debriefs that can spill over into his personal
    life.
  arts: Frederick Sabouni, a regular at Boston’s House of Blues and improv workshops at Improv Asylum, draws creative inspiration from bands like Vampire Weekend and comedians such as John Mulaney, integrating
    spontaneous artistic experiences into his social gatherings, while occasionally over‑indulging in after‑show drinks that disrupt his evening meditation routine.
  travel: Frederick Sabouni, a weekend wanderer, plans impromptu drives to coastal towns like Portsmouth, NH and Cape Cod, while dreaming of a future trek to Acadia National Park, balancing his love for
    spontaneous road trips with a pragmatic budgeting approach that limits overseas vacations until tenure provides financial security.
  culinary: Frederick Sabouni, an experimental home cook, loves crafting lobster mac and cheese with smoked paprika and rosemary, perfecting a stout‑braised short rib dish, and incorporating fresh clams
    into a New England clam chowder twist, all while juggling a modest skill level in woodworking that sometimes steals time from his culinary adventures.
  core: Frederick Sabouni, a tenured‑aspiring professor who juggles a love for routine classroom rigor with spontaneous road trips, competitive sports, and anxiety‑driven mindfulness, often overcommits
    socially, leaving deadlines to scramble, yet channels his quirks into community‑focused mentorship.
background:
  cultural: Frederick was raised in a middle-class, white Anglo-American family in the Boston suburbs. His cultural upbringing reflects traditional New England values of punctuality, practicality, and community
    involvement. Family traditions include celebrating Thanksgiving with an extended family feast, attending local church services, and participating in neighborhood sports leagues. While his ancestry includes
    Irish and Italian roots, his primary cultural identity aligns with the broader Anglo-American academic and professional culture of Massachusetts, emphasizing rigorous education, civic engagement, and
    a pragmatic approach to problem-solving.
