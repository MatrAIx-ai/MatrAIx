  professional: Christina Fragala, a two‑year‑old, displays a methodical love for stacking blocks and solving simple shape puzzles, reflecting early problem‑solving and spatial‑organization skills that
    point toward a future in architecture or engineering, and they already show the curiosity and organized approach that will serve them well in a professional setting.
  sports: Christina Fragala delights in chasing a bright orange ball at the community park while proudly chanting the name of the Chicago Cubs, and they channel that energy into a Sunday morning Tiny Tots
    gymnastics class that builds balance and coordination.
  arts: Christina Fragala loves splashing non‑toxic paint on paper while listening to Raffi’s ‘Baby Beluga’, and they often point to the bright colors of Van Gogh’s ‘Sunflowers’ in picture books, showing
    an early appreciation for music and visual art.
  travel: Christina Fragala’s favorite family outing is a weekend trip to the San Diego Zoo, where they enthusiastically point out the giraffes while clutching a small map of the park, and they dream of
    one day seeing the Eiffel Tower in Paris during a family vacation, though current trips are limited by toddler‑friendly schedules.
  culinary: Christina Fragala prefers smooth mac and cheese topped with a sprinkle of cheddar, delights in sweet banana slices on toast, and they proudly assist their caregiver by stirring the pot of mild
    lentil soup, showing a budding curiosity for flavors and textures.
  core: Christina Fragala, a two‑year‑old with a relentless curiosity, an unusually organized play routine, and a habit of sorting everything from crayons to coins, navigates the world with methodical wonder
    and occasional stubborn refusals.
background:
