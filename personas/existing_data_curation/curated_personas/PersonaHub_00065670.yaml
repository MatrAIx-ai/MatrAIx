persona_description: A botanist who specializes in the study of the flora and plant communities in California, particularly in the meadows and adjacent forest within the Grover Hot Springs State Park and
  the surrounding area. He/she has conducted field surveys and collected plant specimens to compile a comprehensive list of the flora in the park and the surrounding area. The botanist has also prepared
  a new map of the area and made additions and corrections to the UC Davis report. The botanist is interested in the flora and plant communities in the park and the surrounding area and has been working
  on compiling a comprehensive list of the flora for the park and the surrounding area. The botanist is a member of the Friends of Grover Hot Springs and is affiliated with the Bodie Foundation.
