persona_description: A dedicated environmental educator and conservationist who is passionate about wildlife and forest preservation. Poh Kao has a background in environmental education and has worked with
  schools and communities to promote environmental awareness and wildlife protection. She has a strong understanding of local wildlife and conservation issues, and has developed effective programs and activities
  to address these challenges. She is a skilled facilitator and has successfully implemented programs in schools and communities, reaching thousands of students and community members. Her work has resulted
  in significant changes in hunting practices, the reduction of bushmeat trade, and an increase in environmental education and wildlife protection awareness.
