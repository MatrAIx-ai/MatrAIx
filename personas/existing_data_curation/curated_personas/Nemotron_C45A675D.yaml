  hobbies: '[''gardening (heirloom vegetables, native wildflowers)'', ''cooking Southern cuisine'', ''canning and pickling'', ''reading historical fiction and mystery novels'', ''knitting and crocheting'',
    ''birdwatching'', ''hiking local trails'', ''attending community fairs and crafts workshops'', ''participating in church choir'', ''spontaneous day trips to state parks and antique stores'']'
  career_goals: Devlyn aims to translate her practical knowledge into a modest, community‑focused venture. Over the next few years she plans to earn her GED, complete a local horticulture certificate, and
    launch a small‑scale community‑supported agriculture (CSA) program that supplies fresh produce to neighbors and local markets. She also hopes to start a weekend stand selling homemade preserves and
    pickles, and to volunteer as a mentor for adult‑education learners at the county library. Long‑term, she envisions a stable, self‑sufficient lifestyle that allows her to remain financially independent
    while contributing to the social fabric of Newport.
