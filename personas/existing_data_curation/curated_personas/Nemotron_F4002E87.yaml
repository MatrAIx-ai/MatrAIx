  hobbies: '[''Scale Model Building'', ''Landscape Photography'', ''Hiking'', ''Reading Engineering History'', ''Classical Guitar Practice'', ''Woodworking'', ''Traditional Mexican Cooking'', ''Mentoring
    at Technical School'']'
  career_goals: Christopher aims to transition from regional manager to a senior director role where he can influence firm‑wide strategy on sustainable building practices. He is planning to earn his Professional
    Engineer (PE) license and a LEED Accredited Professional credential to bolster his technical credibility. In the longer term, he envisions launching a boutique consulting firm that offers specialized
    project risk mitigation and green‑building solutions, while also mentoring emerging engineers from underrepresented backgrounds.
