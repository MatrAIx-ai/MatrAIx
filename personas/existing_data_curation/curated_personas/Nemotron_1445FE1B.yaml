  hobbies: '[''Backyard gardening'', ''Fishing'', ''Acoustic guitar playing'', ''Food memoir reading'', ''Home fermentation projects'', ''Volunteer cooking at community soup kitchen'', ''Hiking and nature
    photography'', ''Country music listening'']'
  career_goals: Dean aims to transition from his current head‑cook role at the local diner to owning a farm‑to‑table restaurant that showcases the bounty of Stephens County while offering affordable meals
    to the community. He plans to enroll in a culinary arts program to earn a formal associate degree and to obtain a Certified Executive Chef designation. He also wants to establish a mentorship apprenticeship
    for high‑school graduates in Duncan, providing them with culinary training and life‑skill support. A long‑term ambition is to partner with the local food bank to create a community kitchen that reduces
    food waste and provides nutritious meals for families in need, reflecting his deep compassion.
