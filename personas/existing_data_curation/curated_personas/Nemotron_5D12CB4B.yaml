personas:
  professional: Sarah Rizzotto is a budding environmental science student who leverages her strong interpersonal skills, event‑organizing talent, and certified first‑aid knowledge to coordinate eco‑tourism
    tours and volunteer outreach programs while studying marine conservation at a community college.
  sports: Sarah Rizzotto's sports persona sees her as a beach‑volleyball enthusiast playing in a local co‑ed league, a regular member of the Crystal River Paddlers Club for kayaking and paddle‑boarding,
    a seasonal runner who signs up for the Florida Half Marathon in winter, and a devoted fan of the Tampa Bay Lightning and the Florida Gators.
  arts: Sarah Rizzotto's arts persona blends her love for visual storytelling—capturing manatee silhouettes in golden hour like Ansel Adams—with her hands‑on role in a community theater where she designs
    sets and costumes for productions ranging from Lin‑Manuel Miranda’s "Hamilton" to local adaptations of Shakespeare, while she unwinds reading Celeste Ng and listening to Bon Iver on repeat.
  travel: Sarah Rizzotto's travel persona favors spontaneous weekend getaways to Florida's hidden gems such as the Keys and the Everglades, while dreaming of a summer research trip to Costa Rica's marine
    reserves and a future excursion to the Galápagos Islands, balancing a modest student budget with a penchant for eco‑tourism and a habit of documenting each trip in a hand‑crafted scrapbook.
  culinary: Sarah Rizzotto's culinary persona showcases a budding home chef who transforms garden‑fresh zucchini, heirloom tomatoes, and basil into vibrant Mediterranean veggie pastas, experiments with
    Gulf‑coast shrimp gumbo and fish tacos topped with mango salsa, and occasionally bakes manatee‑shaped sugar cookies for her theater crew, all while rating recipes on Instagram stories.
  core: Sarah Rizzotto is a socially vibrant, nature‑driven 20‑year‑old who balances spontaneous curiosity with practical ambition, juggling kayaking trips, community theater, and marine conservation studies,
    all while occasionally misplacing her planner.
background:
  cultural: Sarah was raised in a middle‑class white family in central Florida, where a blend of Southern hospitality and coastal lifestyle shaped her values. Family gatherings centered around home‑cooked
    meals, church activities, and outdoor recreation. Her parents emphasized community service, leading her to join local 4‑H projects and volunteer at environmental clean‑ups. Growing up near the springs
    and the Gulf Coast gave her a strong connection to Florida’s natural environment, and she embraces the laid‑back, friendly spirit of her hometown while also appreciating broader American cultural traditions
    such as holiday celebrations, high school sports, and summer music festivals.
