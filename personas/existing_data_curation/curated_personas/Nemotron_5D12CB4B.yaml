  career_goals: Sarah intends to enroll full‑time at a nearby community college to pursue an associate degree in environmental science with a focus on marine conservation, hoping to later transfer to a
    four‑year program in marine biology. She dreams of working as a wildlife education specialist at the Crystal River National Wildlife Refuge, combining her love for nature with her talent for engaging
    groups. In the short term, she aims to secure a part‑time position at a local eco‑tourism company to gain hands‑on experience, and she plans to launch a volunteer‑led outreach program that teaches younger
    students about manatee protection and local ecosystems.
