  career_goals: As she grows, Kathleen hopes to blend her love of art and curiosity about the world. She dreams of becoming an artist or museum guide who can share stories through visual creations, and
    she imagines exploring science projects that help her community. She also sees herself leading small, collaborative art projects at school or in local clubs, using her organized nature to bring ideas
    to life.
