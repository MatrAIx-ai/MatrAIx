personas:
  professional: Kathleen Parodi is an aspiring naturalist who loves sketching forest scenes, organizing her rock and leaf collections, and applying her methodical curiosity to school science projects.
  sports: Kathleen Parodi enjoys playing Little League baseball for the Middleton Tigers, cheering on the Tennessee Titans on Saturdays, and spending weekend afternoons exploring nearby hiking trails with
    friends, preferring small‑team drills over large crowds.
  arts: Kathleen Parodi delights in drawing wildlife inspired by John James Audubon, listening to Disney soundtracks like 'Let It Go' from Frozen, and practicing simple piano tunes from Aladdin, often crafting
    friendship bracelets while humming her favorite songs.
  travel: Kathleen Parodi loves weekend trips to the Great Smoky Mountains for leaf‑collecting hikes, family vacations to Washington, D.C. to see the National Air and Space Museum, and dreams of visiting
    the Eiffel Tower in Paris someday, planning each outing with a hand‑drawn map and a checklist of must‑see treasures.
  culinary: Kathleen Parodi favors homemade mac and cheese with a sprinkle of cheddar, enjoys helping bake chocolate chip cookies using fresh vanilla extract, and can expertly make peanut butter & jelly
    sandwiches, though she often forgets to wash her hands before cooking.
  core: Kathleen Parodi is a curious, organized seven‑year‑old who balances a love for nature sketches, meticulous allowance saving, and a habit of getting lost in puzzles, all while cherishing quiet moments
    with close friends.
background:
  cultural: Kathleen grows up in Middleton, Tennessee, a close‑knit rural community where Southern hospitality, family gatherings, and church activities shape daily life. The town's slower pace encourages
    appreciation of nature, local traditions like folk music and community picnics, and respect for neighbors. While rooted in these values, Kathleen's family supports her curiosity and openness to new
    ideas, encouraging visits to nearby museums, library story hours, and school art programs that broaden her worldview.
