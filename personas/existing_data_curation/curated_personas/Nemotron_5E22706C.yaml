    in school band"]'
  career_goals: Brandon aspires to become an engineer—ideally a civil or environmental engineer—so he can help design and maintain safe, sustainable spaces in his hometown of Traverse City. In the near
    term, he aims to excel in math and science, earn the top spot in his school’s robotics club, and secure a place in a STEM‑focused middle school program. He also hopes to continue mentoring younger scouts
    and classmates, using his organizational skills to run community service projects and youth activities.
