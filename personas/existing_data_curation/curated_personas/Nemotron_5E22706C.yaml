personas:
  professional: Brandon Mccarthy, a 10-year-old aspiring game developer and community organizer, channels his love of structure and teamwork into crafting Scratch games and planning neighborhood scavenger
    hunts, and they use meticulous planning, reliability, and sociable energy to rally friends and keep every detail on track.
  sports: Brandon Mccarthy, a 10-year-old soccer enthusiast, plays forward for the Oak Creek Youth Soccer League, follows the Chicago Fire FC in MLS and supports the Chicago Cubs and Chicago Blackhawks,
    they also jog along the Lake Michigan shoreline for conditioning and keep a daily stretch routine to stay fit.
  arts: Brandon Mccarthy, a 10-year-old drummer in the school band, drums along to The Beatles and Imagine Dragons, devours adventure novels by Rick Riordan and listens to Pixar movie soundtracks, and they
    often sketch LEGO cityscapes inspired by the art style of Studio Ghibli.
  travel: Brandon Mccarthy, a 10-year-old explorer who loves detailed itineraries, enjoys family road trips to Mackinac Island and the Chicago Museum of Science and Industry, has visited Toronto and dreams
    of seeing the Eiffel Tower in Paris, and they always pack a homemade treasure map to turn each outing into a scavenger hunt.
  culinary: Brandon Mccarthy, a 10-year-old with a growing appetite for cheese pizza, pepperoni rolls, mac and cheese, and homemade peanut‑butter‑and‑jelly sandwiches, can confidently make no‑bake chocolate
    oat cookies and assemble a simple fruit salad with apples, grapes, and yogurt, and they often experiment with adding extra cheddar to boost flavor.
  core: Brandon Mccarthy, a 10-year-old who meticulously color‑codes every LEGO brick and school notebook, channels his boundless energy into organizing neighborhood hunts, yet sometimes forgets to eat
    while perfecting his next treasure map.
background:
  cultural: Brandon grows up in a Midwestern white American family rooted in the Great Lakes region. His household values community involvement, modesty, and a strong work ethic, reflecting the traditional
    cultural norms of northern Michigan. He celebrates typical American holidays and participates in local traditions such as the National Cherry Festival in Traverse City, weekend trips to the lake for
    fishing or beach outings, and winter activities like snowshoeing. His upbringing emphasizes appreciation for the natural environment, local history, and community service through scouting and school
    volunteer programs.
attributes:
  skills: '["Organizational planning and time management", "Basic Scratch programming", "Soccer team leadership", "Group project coordination", "LEGO engineering and construction"]'
