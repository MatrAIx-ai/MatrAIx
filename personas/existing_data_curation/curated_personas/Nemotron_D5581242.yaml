personas:
  professional: Charles Waggoner, a 4‑year‑old budding builder, loves constructing block towers at home and in preschool; they plan each piece methodically, follow through on their designs, and show early
    signs of a future in architecture or engineering.
  sports: Charles Waggoner enjoys weekend soccer at the Middletown community field, they cheer for the Cleveland Browns and Cleveland Guardians on game nights, and they are a member of the local Little
    League tee‑ball team where they display a competitive spirit on the field.
  arts: Charles Waggoner loves storytime at the Middletown library and drawing with crayons, they admire artists like Bob Ross and musicians such as Raffi, and they often recreate favorite scenes from Sesame
    Street on paper, reflecting a deep appreciation for creative expression.
  travel: Charles Waggoner prefers family road trips to nearby parks like Caesar Creek State Park and seasonal visits to the Cincinnati Zoo; they plan each adventure with a simple map they color themselves
    and dream of a future vacation to Disney World.
  culinary: Charles Waggoner favors mac and cheese with a sprinkle of cheddar and chicken nuggets, they enjoy helping stir batter for pancakes on Sunday mornings, and they are picky about green beans but
    love apple slices with peanut butter.
  core: Charles Waggoner is a curious, methodical 4‑year‑old who balances solitary LEGO construction with a shy love for library storytime, careful piggy‑bank savings, and a competitive streak on the playground.
background:
  cultural: Charles is raised in Middletown, Ohio, a Midwestern community in Butler County known for its close‑knit neighborhoods and family‑centered activities. His upbringing includes regular visits to
    the local library for storytime, trips to community parks, family outings to county fairs, and participation in school events that reflect typical American Midwest cultural values such as practicality,
    modesty, and community cooperation. These experiences provide a supportive environment that nurtures his curiosity and appreciation for varied ideas.
