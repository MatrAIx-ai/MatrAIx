persona_description: A scientist or researcher who specializes in studying the effects of climate change in the Arctic and its potential impact on the lower 48 states. They are particularly interested in
  the role of the Arctic as an early warning zone for lands far south and the complex interplay between rot, reflection, and warming. They are knowledgeable about the local environment, the processes that
  contribute to warming, and the potential consequences of these changes for plants and animals. They are cautious about projections of how warming might play out in the lower 48 and are open to the idea
  that some species may be winners and losers in a warmer planet.
