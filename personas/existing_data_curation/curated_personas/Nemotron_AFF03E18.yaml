personas:
  professional: Judith Neeley is a budding curator‑in‑training whose keen research ability, meticulous organization, and fluent academic writing translate into expertly crafted exhibition proposals and
    community‑focused museum programs; they naturally blend curiosity with methodical planning to design inclusive displays.
  sports: Judith Neeley is an avid hiker who regularly joins the Provo Trail Runners, enjoys weekend ski trips to Park City, and follows the Utah Jazz and Real Salt Lake, balancing solo adventure with occasional
    team‑spirit fandom.
  arts: Judith Neeley devotes weekends to sketching watercolors of canyon vistas, curates pop‑up gallery shows featuring emerging Utah artists like Maya Larkin, and attends indie shows by The National and
    Phoebe Bridgers, drawing inspiration from Monet and O'Keeffe to shape her curatorial vision.
  travel: Judith Neeley favors thoughtful itineraries, having explored the arches of Moab, the geysers of Yellowstone, and the street art of Portland, while dreaming of a weeklong art pilgrimage to Florence,
    Italy, and often uses Notion to organize travel plans around museum openings.
  culinary: Judith Neeley enjoys cooking intermediate‑level dishes such as miso‑glazed salmon with quinoa, beet and goat cheese tart, and homemade fry sauce‑topped fries, favoring fresh seasonal produce
    and experimenting with spices after long hikes.
  core: Judith Neeley blends methodical curation with a restless curiosity, juggling art‑centered ambitions, spontaneous concert fixes, and an occasional habit of forgetting to water their houseplants.
background:
  cultural: Judith was raised in Provo, Utah, within a predominantly white, middle‑class community that values family, education, and service. While her upbringing reflects many of the region’s LDS cultural
    norms—emphasizing modesty, self‑reliance, and community involvement—she has also been exposed to a vibrant local arts scene, the university’s intellectual environment, and the outdoor lifestyle of the
    Intermountain West. These influences have shaped her appreciation for both traditional cultural values and contemporary artistic expression, fostering a balanced worldview that blends modest community
    roots with a curiosity for new ideas and diverse experiences.
