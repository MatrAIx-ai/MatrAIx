  hobbies: '[''Visiting art museums and galleries'', ''Sketching and watercolor painting'', ''Landscape photography'', ''Reading contemporary literature'', ''Hiking and outdoor exploration'', ''Live indie
    music concerts'', ''Yoga and mindfulness practices'', ''Journaling'', ''Volunteer work at community art events'']'
  career_goals: Judith aims to complete a bachelor’s degree in Art History or Museum Studies and later pursue a master’s in Curatorial Practice. In the short term, she seeks an internship or volunteer role
    at a local museum or cultural institution in Provo or Salt Lake City to gain hands‑on experience in collection management, exhibition design, and public programming. Her long‑term ambition is to become
    a curator or director who creates community‑focused exhibitions that highlight underrepresented artists, develop educational outreach programs, and lead a regional museum’s strategic vision.
