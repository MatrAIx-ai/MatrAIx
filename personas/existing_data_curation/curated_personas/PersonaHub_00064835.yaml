persona_description: A Norwegian scientist with expertise in studying bee brains and their brain cells' similarity to humans. She has a strong interest in the social order of her bee community and has changed
  the routine to improve the memories of the older bees. Her research has shown that social stimulation can have positive effects on health and brain functioning, especially in older people. She is also
  interested in the proteins involved in the brain's functioning and has identified differences in the levels of eight proteins in the brains of bees who improved their memories, versus those who didn't.
  Her next phase of research will involve new research partners who are protein experts.
