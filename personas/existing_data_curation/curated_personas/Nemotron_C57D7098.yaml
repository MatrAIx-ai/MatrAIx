  career_goals: As she approaches the latter stage of her career, Ianthia aims to transition from a support role to a leadership position within the department by establishing a comprehensive mentorship
    program for new teaching assistants, publishing a guide on effective humanities instruction, and securing a small grant to develop an interdisciplinary digital humanities lab that blends traditional
    textual analysis with emerging technologies. She also hopes to present her innovative instructional strategies at regional conferences and, ultimately, to leave a lasting impact on student success and
    faculty collaboration before her planned retirement.
