personas:
  professional: Ianthia Singh, a 62‑year‑old higher‑education support specialist, blends three decades of curriculum design and data‑driven student analytics with an organized, people‑oriented approach,
    leveraging Canvas and Blackboard to mentor teaching assistants while anxiously perfecting every assessment rubric.
  sports: Ianthia Singh, an avid supporter of the Alabama Crimson Tide football team and a regular participant in Dothan’s senior intramural pickleball league, integrates weekly sunrise walks through her
    vegetable garden as low‑impact cardio, while occasionally joining a local walking club that meets at the Dothan Civic Center’s fitness room.
  arts: Ianthia Singh, a devoted volunteer at the Dothan Civic Center’s rotating art exhibitions, immerses themselves in blues legends like B.B. King and folk icon Odetta, regularly stages community theater
    productions of Arthur Miller’s 'The Crucible', and finds solace sketching watercolor landscapes of Southern gardens after each performance.
  travel: Ianthia Singh, whose travel style blends meticulous itinerary planning with spontaneous genealogical digs, has explored the historic streets of Savannah and the jazz‑laden French Quarter in New
    Orleans, dreams of tracing family roots in Bath, England, yet often postpones adventurous trips due to budget constraints and caregiving duties.
  culinary: Ianthia Singh, a confident home cook, delights in preparing shrimp and grits with smoked paprika, collard greens seasoned with apple cider vinegar, and baking sweet potato pie using fresh thyme,
    while occasionally over‑indulging in late‑night biscuit experiments that leave the kitchen a flour‑covered mess.
  core: Ianthia Singh, a meticulous yet worry‑prone educator, balances a love for community theater, gardening, and blues music with a habit of over‑planning and occasional stress‑induced snack binges.
background:
  cultural: Ianthia was born and raised in the deep‑South of Alabama, growing up in a close‑knit, multi‑generational family that prized Southern hospitality, church fellowship, and community service. Her
    ancestry is primarily of British and Irish descent, reflected in family traditions such as weekly church gatherings, seasonal picnics, and the preparation of classic Southern dishes like fried chicken
    and peach cobbler. The cultural emphasis on politeness, storytelling, and a strong sense of place shaped her communication style and love for literature. While her upbringing grounded her in regional
    customs, her graduate studies in arts and humanities exposed her to diverse artistic traditions and global perspectives, fostering a balanced appreciation for both her Southern roots and broader cultural
    narratives.
