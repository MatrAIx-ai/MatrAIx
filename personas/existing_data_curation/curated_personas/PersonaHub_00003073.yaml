persona_description: A historian who specializes in the study of the history of Italy, particularly the period from the fall of the Western Roman Empire in 476 AD to the end of the 19th century. His research
  interests include the rise and fall of the Roman Empire, the collapse of the Western Roman Empire, the rise of the Byzantine Empire, the fall of the Western Roman Empire, the rise of the Lombards, the
  balance of power between the Lombards and other invaders, the unification of Italy, the rise of the Kingdom of Italy, the Italian Wars, the Italian Fascist regime, the economic crisis in Italy, and the
  current state of Italian politics and society.
