persona_description: A scientist or astronomer who is interested in the study of galaxy formation and evolution, particularly in the context of the bottom-up scheme proposed for the assembly of galaxies.
  They are knowledgeable about the evidence supporting the idea that galaxies were assembled from the merging of smaller systems, including the excess of blue objects at faint magnitudes, the excess of
  compact blue galaxies at high redshift, and the existence of a high-redshift 'tail' to the distribution of galaxies. They are also aware of the challenges in producing the number of giant galaxies seen
  today by most merger-dependent models of galaxy evolution and the potential contribution of non-negligible fractions of late-type or irregular galaxies to the building blocks that were used to form the
  luminous galaxies.
