personas:
  professional: Betty Hunter, a seasoned food‑service supervisor, leverages her methodical, organized nature and ServSafe certification to streamline kitchen operations, mentor staff, and implement cost‑efficient
    menu planning while preparing to step into a regional management role.
  sports: Betty Hunter enjoys low‑impact fitness through regular walks along the Arkansas River Trail with her Riverwalk Runners walking club, attends Arkansas Razorbacks basketball games each season, and
    participates in a community softball league, favoring consistent, modest exercise over high‑intensity training.
  arts: Betty Hunter immerses herself in the arts by delving into historical fiction by Toni Morrison and Zora Neale Hurston, listening to classics like Miles Davis and Mahalia Jackson, and attending live
    performances of local jazz quartets and gospel choirs, which together shape her reflective leisure time.
  travel: Betty Hunter favors purposeful travel, often choosing cultural and historical trips such as a guided tour of the National Civil Rights Museum in Memphis, a weekend in New Orleans to explore Creole
    cuisine, and she plans to visit Savannah’s historic district, all while relying on careful budgeting and a structured itinerary.
  culinary: Betty Hunter, an adept home cook, blends traditional Southern dishes like smoked pork shoulder, collard greens seasoned with smoked ham hocks, and sweet‑potato pie, while incorporating garden‑fresh
    okra, heirloom tomatoes, and fresh herbs into inventive recipes that she showcases at family gatherings and church potlucks.
  core: Betty Hunter is a methodical, community‑driven culinary professional who channels her love for Southern comfort food, reflective reading, and quiet leadership into building a sustainable catering
    venture, all while juggling a penchant for meticulous budgeting and an occasional over‑yearning for perfection.
background:
  cultural: Betty’s cultural identity is rooted in Southern African‑American traditions. She was raised in a close‑knit black community in Little Rock, where church life, family gatherings, and shared meals
    have been central. Her family preserves recipes passed down through generations, emphasizing soul food staples such as collard greens, cornbread, and smoked meats. She actively participates in the local
    African Methodist Episcopal (AME) congregation, which provides both spiritual support and community service opportunities. Betty is deeply aware of Little Rock’s civil‑rights history, often sharing
    stories of the 1957 school integration with her children and mentees. This background informs her value of hospitality, resilience, and mentorship, shaping both her professional approach and personal
    interests.
