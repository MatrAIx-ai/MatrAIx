  hobbies: '[''Reading Historical Fiction'', ''African‑American Literature'', ''Home Cooking & Recipe Development'', ''Vegetable Gardening'', ''Volunteer Work at Local Food Bank'', ''Church Choir Participation'',
    ''Knitting/Quilting'', ''Walking on Arkansas River Trail'', ''Listening to Jazz and Gospel Music'', ''Attending Cultural Festivals'', ''Exploring Civil‑Rights History Tours'']'
  career_goals: Betty aims to advance from first‑line supervisor to a regional kitchen manager or director of food services within the next five years. She plans to obtain a Certified Food Safety Manager
    certification and pursue a bachelor’s in business administration or a master’s in hospitality management to broaden her strategic expertise. Long‑term, she envisions opening a community‑focused catering
    venture that highlights Southern African‑American cuisine and creates mentorship opportunities for aspiring black culinary professionals. She also hopes to champion sustainable sourcing and waste‑reduction
    practices across her organization and to serve as a trainer for food‑safety compliance in multiple locations.
