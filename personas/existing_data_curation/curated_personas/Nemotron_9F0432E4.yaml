  hobbies: '["building Duplo towers", "crayon drawing", "listening to music", "dancing", "group playdates", "picture book reading", "pretend play with animals", "watching animated shows"]'
  career_goals: Although still a toddler, Ankur often says he wants to be a "doctor" who helps people and an "artist" who creates bright pictures, reflecting his early desire to care for others and express
    creativity. His ambitions are shaped by a love for exploring new things, building structures, and sharing with friends, pointing toward future interests in problem‑solving, artistic expression, and
    community service.
