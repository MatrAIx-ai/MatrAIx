personas:
  professional: Ankur Mehrotra, a two‑year‑old explorer of cause‑and‑effect, spends hours arranging blocks into orderly towers and willingly shares them with peers, revealing a nascent methodical mindset
    and a budding love for organized play.
  sports: Ankur Mehrotra adores sprinting across the community park’s splash pad, proudly wears a miniature Orlando City SC jersey, and participates in a toddler soccer class where they practice kicking
    soft balls while enthusiastically cheering with other little teammates.
  arts: Ankur Mehrotra delights in dancing to lively Bollywood beats like A.R. Rahman’s “Jai Ho,” scribbles vivid pictures with crayon while humming Shreya Ghoshal’s melodies, and eagerly joins family sing‑along
    sessions that blend familiar nursery rhymes with rhythmic clapping.
  travel: Ankur Mehrotra’s favorite adventure to date has been a family road‑trip to Walt Disney World, where they marveled at the fireworks, and they dream of exploring the towering red rocks of Sedona,
    hoping one day to ride a camel on a desert safari.
  culinary: Ankur Mehrotra shows a palate for soft rice mixed with dal and a sweet spoonful of kheer, while also reaching for chicken nuggets and apple slices, often demanding the bright red spoon for self‑feeding,
    and they happily help stir batter in the kitchen, though they sometimes get distracted by the shiny lid.
  core: Ankur Mehrotra is a two‑year‑old whirlwind of imagination, organized play, and social charm, who balances a love for saving pennies with occasional candy cravings, embraces vivid music and dance,
    and navigates toddler health with a blend of curiosity and gentle resilience.
background:
  cultural: Ankur is being raised in a South Asian (Indian) family in Orlando, Florida. At home, he hears both English and Hindi, celebrates Diwali and other Indian festivals with lights, sweets, and traditional
    songs, and enjoys family meals that include rice, dal, and seasonal vegetables. His parents introduce him to Bollywood music and simple classical dance steps, fostering an early appreciation for rhythmic
    movement. The household values education, hospitality, and community, while also embracing the multicultural environment of his neighborhood, blending Indian customs with American childhood experiences.
