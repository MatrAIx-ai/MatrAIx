  career_goals: Karthikeyan aims to advance to a lead millwright or maintenance supervisor role, leveraging his competitive drive to become a benchmark for speed and quality on the shop floor. He plans
    to earn advanced certifications in industrial automation and PLC systems, eventually branching into robotics maintenance. Long‑term, he envisions starting his own independent maintenance consultancy
    to gain greater flexibility and control over his schedule, while mentoring apprentices in a small, focused setting.
