personas:
  professional: Karthikeyan Shah is a seasoned millwright who leverages a methodical problem‑solving mindset, hands‑on expertise in hydraulic, pneumatic and MIG/TIG welding, and a budding proficiency in
    PLC programming to outpace peers on the shop floor, and they channel a competitive edge into a fast‑track toward a lead maintenance supervisor role.
  sports: Karthikeyan Shah hits the local Queens gym for weightlifting three times a week, cheers on the New York Knicks and New York Mets on game nights, and they join a casual weekend basketball league
    at Astoria Park, balancing competitive drive with a relaxed attitude toward long‑term fitness goals.
  arts: Karthikeyan Shah captures gritty street scenes around Queens with a vintage 35mm camera, builds intricate model train layouts, loses hours to Civilization VI strategies, and they draw inspiration
    from sci‑fi author Isaac Asimov and electronic musician Daft Punk, weaving technical precision into their creative pursuits.
  travel: Karthikeyan Shah prefers spur‑of‑the‑moment trips to tech hubs like Tokyo and Berlin, balances a modest travel budget with a love for exploring industrial museums, enjoys weekend getaways to the
    Catskills, and they dream of a road trip across the American Southwest to photograph abandoned factories.
  culinary: Karthikeyan Shah cooks South Indian dishes such as dosa, sambar, and coconut chutney with an experimental twist, mixes in high‑protein quinoa salads for gym recovery, and they enjoy sourcing
    fresh curry leaves and mustard seeds at local farmers’ markets while still relying on takeout pizza for late‑night cravings.
  core: Karthikeyan Shah is a detail‑oriented millwright whose restless curiosity fuels a competitive work ethic, a habit of anxiety‑driven improvisation, and a penchant for solitary hobbies that blend
    engineering with art.
background:
  cultural: Karthikeyan is a second‑generation South Asian (Tamil) American whose family emigrated from India to Queens. He grew up bilingual, speaking Tamil at home and English elsewhere, and was immersed
    in Indian festivals such as Diwali and Pongal. While he respects traditional values of hard work and community, his reserved nature and competitive streak have led him to chart an independent path,
    remaining unattached and focusing on his craft. He balances his Indian culinary heritage and occasional temple visits with the multicultural rhythms of Queens, using food, music, and occasional community
    gatherings to stay connected to his roots.
