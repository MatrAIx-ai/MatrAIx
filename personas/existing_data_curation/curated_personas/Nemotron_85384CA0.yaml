  career_goals: Although retired, Rigoberto aims to keep his mind active and his independence intact. He hopes to complete a memoir that records his family’s migration story, volunteer occasionally as a
    mentor for younger members of a local community center, and maintain his home so he can continue living independently. He also aspires to pass on his cooking and woodworking skills to his grandchildren,
    ensuring his cultural heritage lives on. Managing his finances prudently and staying physically healthy are ongoing personal goals.
