  career_goals: Although retired from full‑time work, Mical aims to stay professionally active by volunteering on local nonprofit boards, mentoring emerging entrepreneurs, and offering occasional consulting
    to small businesses in Scottsdale. He also hopes to author a memoir that intertwines his business experiences with his Spanish heritage, and to pass down traditional Spanish culinary recipes to his
    grandchildren.
