personas:
  professional: Kim Gobin is a seasoned janitor in Hedrick, IA, whose mastery of systematic cleaning protocols, floor care, chemical safety, and meticulous record‑keeping fuels her ambition to become a
    facilities manager overseeing sustainable cleaning programs for a community arts center.
  sports: Kim Gobin enjoys early‑morning jogs along the Hawkeye Trail during spring, participates in a local garden‑fitness club's low‑impact HIIT sessions, and cheers on the Iowa Hawkeyes football team,
    while avoiding high‑impact sports to protect their back.
  arts: Kim Gobin frequently explores the Ames Museum of Art and the Des Moines Art Center, sketches pastel watercolors of Impressionist landscapes inspired by Monet and O'Keeffe, curates craft displays
    for community festivals, and finds solace in the works of contemporary Iowa artist Carrie McRae.
  travel: Kim Gobin prefers meticulously planned road trips, such as a weekend getaway to the Amana Colonies to sample German‑style pretzels, a summer visit to the Portland Japanese Garden for sustainable
    design inspiration, and dreams of a cultural immersion tour of the Louvre and the Uffizi, balancing travel with budget constraints.
  culinary: Kim Gobin delights in preparing herb‑infused quinoa salads with fresh basil, rosemary, and thyme harvested from their own garden, enjoys simmering lentil soups with carrots and kale, and treats
    themselves to artisanal cheese plates while occasionally forgetting to set the timer on the slow‑cooker.
  core: Kim Gobin blends a calm, methodical mindset with a quiet love for art and sustainability, turning meticulous cleaning into a canvas for environmental stewardship while indulging in solo creative
    pursuits and careful budgeting.
background:
  cultural: Kim was raised in a tight‑knit Midwestern community in Iowa, where values such as hard work, modesty, and a strong sense of neighborliness are deeply ingrained. Her upbringing emphasizes self‑reliance,
    respect for nature, and a pragmatic approach to daily life. Family and church gatherings have reinforced her cooperative and harmony‑seeking temperament. This cultural backdrop shapes her reliable work
    ethic, her appreciation for simple pleasures like gardening, and her commitment to contributing positively to her small‑town environment.
attributes:
  skills: '["Commercial cleaning", "Floor care (stripping, waxing, buffing)", "Chemical safety management", "Inventory control", "Scheduling and time management", "Green cleaning practices", "Minor repairs
    and maintenance", "OSHA safety compliance", "Attention to detail", "Team coordination", "Art space maintenance", "Record keeping"]'
  hobbies: '["Visiting local art galleries and museums", "Sketching and watercolor painting", "Reading books on art history and sustainable living", "Gardening (vegetable and herb garden)", "Solving jigsaw
    puzzles", "Knitting and crochet", "Participating in community craft workshops", "Cooking new recipes", "Maintaining a personal journal"]'
  career_goals: Kim aims to advance from her current role to a facilities management position within the next five years, focusing on implementing sustainable cleaning programs and overseeing larger building
    operations. She plans to complete her associate degree in facilities management and obtain the Certified Professional Cleaner (CPC) certification. Ultimately, she hopes to combine her expertise in maintenance
    with her passion for aesthetics by managing the upkeep of a community arts center or museum, where she can ensure both functional cleanliness and a supportive environment for artistic expression.
