personas:
  professional: L Bonner is a seasoned nonprofit arts administrator with three decades of experience in strategic planning, grant writing, and digital archiving, whose reserved yet competitive nature drives
    meticulous program development and a measured mentorship style aimed at building a sustainable community arts hub in Baileyville.
  sports: L Bonner enjoys hiking the Acadia National Park trails, participates in the local senior walking club, follows the Portland Sea Dogs baseball team, and volunteers as a scorekeeper for the Bangor
    High School basketball games, combining low-impact exercise with modest community sports involvement.
  arts: L Bonner immerses themselves in classic literature like Melville's Moby-Dick, composes poetry for the town book club, captures rugged Maine coast scenes inspired by Ansel Adams, and attends intimate
    chamber-music concerts featuring the Portland Symphony's string quartet, all while crafting handcrafted picture frames for their photographs.
  travel: L Bonner prefers low-key road trips to New England lighthouses, has explored Bar Harbor, the historic streets of Boston, and Mackinac Island, and dreams of a summer pilgrimage to the Scottish
    Highlands, planning each journey around health appointments and a modest travel budget.
  culinary: L Bonner enjoys cooking lobster bisque, baked haddock seasoned with garden rosemary and thyme, and blueberry crumble, but often forgets to stir the pot, resulting in occasional burnt edges,
    while also preparing seasonal vegetable stews with kale, carrots, and heirloom tomatoes from their own plot.
  core: L Bonner is a curious, reserved arts veteran who balances meticulous planning with solitary creativity, frugal finances, modest health challenges, and a competitive drive to leave a lasting cultural
    legacy.
background:
  cultural: Lawrence is a lifelong resident of rural Maine, raised in a small, close‑knit town where self‑reliance and modesty are prized. His family traces its roots to early New England settlers, and
    the maritime history of Washington County has shaped his appreciation for coastal life and local folk traditions. Though raised in a Protestant (Congregationalist) environment, his adult years have
    been marked by a secular, humanistic outlook informed by his arts‑humanities education. This blend of New England stoicism, community stewardship, and a deep respect for cultural heritage informs both
    his professional ethos and personal pursuits.
