persona_description: A historian who specializes in the study of American Catholicism, particularly the early years of the church's presence in the United States. Her research interests include the role
  of the Catholic Church in American society, the development of Catholicism in the United States, and the impact of the church's vestments and attire on American culture. She has conducted extensive interviews
  with Catholic leaders and scholars, and has published extensively on the topic.
