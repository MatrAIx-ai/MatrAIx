persona_description: An advocate for merit-based military selection, emphasizing the importance of college education and its potential for developing leaders. The author believes that the government should
  choose the best talent for military careers, irrespective of their economic situation, and that such a scheme would open a military career to talented individuals regardless of their background. The author
  also advocates for a widespread system of military scholarships, carefully allotted to various areas and impartially administered, as a means of widening the basis for selection.
