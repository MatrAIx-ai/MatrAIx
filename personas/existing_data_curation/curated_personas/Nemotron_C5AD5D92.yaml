  career_goals: Jane’s near-term goal is to advance from front-line packing to a shift-lead position within the next two years. She plans to complete a Certified Warehouse Manager (CWM) program and enroll
    in evening courses in supply-chain logistics to qualify for a logistics coordinator role. Long-term, she aspires to become a warehouse manager overseeing multiple shifts, where she can implement structured
    process improvements and mentor a larger team. Achieving a higher, stable income will also enable her to purchase a home in Macomb County and establish financial security for future personal goals.
