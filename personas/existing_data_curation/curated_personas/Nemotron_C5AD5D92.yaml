personas:
  professional: Jane Richie, a certified forklift operator and packer at a Sterling Heights distribution center, applies rigorous inventory management with Fishbowl and SAP WMS, consistently exceeds pick‑and‑pack
    quotas, trains new hires on systematic packing techniques, and leverages their competitive drive toward a shift‑lead promotion within two years.
  sports: Jane Richie, a three‑times‑a‑week jogger at Lakeside Park, is a devoted Detroit Lions fan, a member of the Lakeside Runners club, and competes in the local adult soccer league Sterling Strikers
    during the summer, using these activities to satisfy their competitive nature while staying structured.
  arts: Jane Richie relaxes after a shift by solving Sudoku and crossword puzzles, immerses themselves in strategy gaming like Civilization, and fuels their creative side with the music of indie folk artist
    Phoebe Bridgers, the classic rock sounds of Fleetwood Mac, and the cinematic scores of Hans Zimmer, occasionally attending community theatre productions of 'Our Town'.
  travel: Jane Richie prefers meticulously planned weekend road trips, having already explored Traverse City’s wineries, toured the Henry Ford Museum in Dearborn, and earmarked a future visit to Windsor,
    Canada, all while balancing travel costs with their tight budget and using discount travel apps.
  culinary: Jane Richie’s culinary routine centers on budget‑friendly, nutrition‑dense meals like quinoa bowls with roasted sweet potatoes, kale, and chickpeas, hearty lentil soup seasoned with cumin and
    bay leaf, and occasional homemade basil pesto on whole‑grain pasta, drawing fresh ingredients from their own vegetable garden.
  core: Jane Richie is a methodical, competitively driven 22‑year‑old who blends warehouse precision with low‑cost gardening, puzzle‑solving, and strategic gaming while diligently saving for a future home.
background:
  cultural: Jane grew up in a middle-class, white family in Sterling Heights, a Detroit suburb with deep ties to the region’s manufacturing legacy. Her parents, of mixed German-Polish ancestry, emphasized
    hard work, reliability, and community involvement, values that echo the broader Midwestern work ethic. She participated in local church events, community clean-up days, and the annual town fair, fostering
    a sense of belonging. The practical, modest culture of Macomb County, with its focus on steady progress and self-reliance, shapes Jane’s preference for structure, predictability, and a competitive yet
    cooperative approach to both her career and personal life.
