  career_goals: In the near term, Alexa plans to earn her high‑school equivalency diploma and obtain certifications in CPR and youth mentorship. She hopes to secure a part‑time role as a camp counselor
    or volunteer coordinator at the Richland Community Center, where she can apply her teamwork and event‑planning skills. Over the next several years, she aims to pursue a community‑college program in
    recreation or hospitality management, ultimately working toward a position as a community‑youth programs coordinator who designs structured yet flexible activities for local teens.
