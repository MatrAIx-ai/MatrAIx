  hobbies: '[''Gardening'', ''Farm‑to‑table cooking'', ''Quilting and hand‑embroidery'', ''Historical fiction reading'', ''Art‑history lectures'', ''Hiking'', ''Farmers’ market visits'', ''Design workshops
    for youth'', ''Book club'']'
  career_goals: Molly aims to transition from senior graphic designer to art director within the next three years, taking on responsibility for guiding a multidisciplinary creative team. She wants to deepen
    her UI/UX expertise, obtain a certification in interaction design, and lead the development of a boutique agency focused on sustainable branding for local Indiana businesses. Additionally, she is interested
    in mentoring junior designers, teaching introductory design courses at a community college, and contributing thought pieces to design publications that explore the intersection of visual culture and
    Midwestern heritage.
