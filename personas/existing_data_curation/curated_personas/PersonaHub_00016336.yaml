persona_description: A maritime historian who is fascinated by the tales of survival and adventure from the 18th and 19th centuries. They are particularly interested in the stories of shipwrecks and the
  remarkable individuals who survived them, such as Jack Renton and the crew of the Bobtail Nag. They have a keen interest in the role of shipwrecks in shaping the history of the time and how they have
  influenced our understanding of social, political and economic factors of the period. They are also interested in the broader implications of these stories for our current understanding of maritime history
  and the role of the sea in shaping the world.
