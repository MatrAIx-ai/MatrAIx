  hobbies: '[''preparing and sharing Mexican cuisine'', ''gardening'', ''weekly church services and choir participation'', ''senior‑center dance classes'', ''embroidery and crochet'', ''volunteering at
    local Hispanic festivals'', ''watching classic Mexican telenovelas'', ''listening to traditional Mexican music'']'
  career_goals: Although retired, Mairelis aims to stay actively engaged by expanding her volunteer leadership role at the local Hispanic community center, mentoring younger volunteers in event planning
    and cultural preservation, and leading a monthly cooking workshop that shares family recipes with neighbors. She also hopes to learn simple smartphone photography to document community events and family
    moments, ensuring her cultural heritage is recorded for future generations.
