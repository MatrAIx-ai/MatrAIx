  hobbies: '[''Reading historical non‑fiction'', ''Birdwatching'', ''Gardening (vegetables and berries)'', ''Fishing (trout)'', ''Woodworking small projects'', ''Digital photography of nature'', ''Crossword
    and jigsaw puzzles'', ''Model building (scale ships)'', ''Volunteering at local historical museum'']'
  career_goals: Sean aims to stay healthy and active while continuing to learn new subjects such as digital photography and local history. He hopes to share his woodworking skills through informal community
    workshops, assist the Roseburg historical society with research and preservation projects, compile a family memoir that captures his Irish‑Scottish heritage, and support his wife in traveling to scenic
    locations across the Pacific Northwest.
