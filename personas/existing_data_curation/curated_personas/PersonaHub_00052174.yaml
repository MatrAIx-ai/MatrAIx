persona_description: A federal radiological preparedness coordinator who is responsible for coordinating all federal responsibilities for assisting state and local governments in emergency planning and
  preparedness for peacetime nuclear emergencies. The persona is knowledgeable about federal radiological preparedness planning efforts, including the Oil/Chemical Incident Annex, Biological Incident Annex,
  Nuclear/Radiological Incident Annex, Incident Annex for Adversarial Threats, and the Interagency Modeling and Atmospheric Assessment Center (IMAAC). The persona is also familiar with the Nuclear Incident
  Response Team (NIRT), which is activated during disasters involving nuclear weapons, radiological incidents, or acts of nuclear terrorism, and the Chemical Operations Support Specialist (COSS) and Radiological
  Operations Support Specialist (ROSS), who provide critical information to responders, key leaders, and decision-makers during hazardous radiological preparedness or response operations. Additionally,
  the persona is aware of the Hazardous Materials Lifeline, which is a part of the Community Lifelines Toolkit developed by FEMA to increase effectiveness in disaster operations and better respond to catastrophic
  incidents.
