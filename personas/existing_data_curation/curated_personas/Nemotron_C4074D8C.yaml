personas:
  professional: Viet Nguyen is a budding business analyst who channels a data-driven market research skill set, developing Excel dashboards and introductory SQL queries, while adding a flair for visual
    storytelling and culturally sensitive communication to socially responsible projects, reflecting their curious, organized yet flexible nature and strong compassion for community stakeholders.
  sports: Viet Nguyen embraces an active outdoor lifestyle, joining a local hiking club for monthly trips in the Cascades, playing casual soccer on Saturday mornings with friends, cheering for the Seattle
    Seahawks, Seattle Kraken, and Seattle Sounders, while balancing fitness with occasional yoga sessions at a downtown studio.
  arts: Viet Nguyen immerses in Seattle's vibrant arts scene, frequenting the Seattle Art Museum and Frye Art Museum, creating digital illustrations inspired by the moody photography of Gregory Crewdson
    and the bold street statements of Banksy, and curating personal photo series that capture ordinary moments in the city's rain-soaked streets.
  travel: Viet Nguyen gravitates toward nature-focused travel, having trekked the alpine trails of Banff, explored the cherry blossoms of Washington's Skagit Valley, and planning a future solo trip to Chiang
    Mai to study local crafts, while usually opting for budget-friendly itineraries that combine spontaneous detours with a modest spreadsheet of must-see spots.
  culinary: Viet Nguyen enjoys cooking traditional dishes such as pho broth, bun cha, and banh mi with fresh herbs like cilantro and Thai basil, mastering the balance of lemongrass, fish sauce, and star
    anise, while also experimenting with fusion plates that pair rice noodles with Mexican salsa, and frequently seeks out hidden eateries serving authentic ramen and specialty coffee.
  core: Viet Nguyen is a curiosity-driven, compassion-rich twenty-year-old who balances meticulous data work with spontaneous art projects, occasional overspending on gear, and a disciplined yet slightly
    lax approach to dental hygiene.
background:
  cultural: Viet is a second‑generation Vietnamese American raised in the greater Seattle area. His household is bilingual, speaking both English and Vietnamese, and family life has been shaped by values
    of respect for elders, community solidarity, and a strong emphasis on education. He participates in cultural traditions such as Tet (Lunar New Year) celebrations, traditional music, and Vietnamese cooking,
    often sharing these experiences with friends from diverse backgrounds. The vibrant Vietnamese diaspora community in Kent provides him with social ties to local temples, language schools, and small businesses,
    reinforcing his sense of cultural identity. This heritage informs his collaborative, compassionate approach to both personal relationships and professional endeavors, and fuels his aspiration to give
    back to immigrant and refugee communities.
attributes:
  skills: '["Market Research", "Data Analysis (Excel, SQL)", "Project Management", "Business Communication", "Digital Marketing Basics", "Cross‑Cultural Communication", "Event Planning", "Volunteer Coordination",
