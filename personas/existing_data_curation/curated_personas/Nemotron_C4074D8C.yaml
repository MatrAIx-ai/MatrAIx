  hobbies: '["Visiting art galleries and museums", "Digital illustration and photography", "Cooking Vietnamese cuisine", "Hiking in the Pacific Northwest", "Volunteer work at community centers", "Playing
    strategy board games", "Reading business and psychology books"]'
  career_goals: Viet aims to launch his career as a business analyst or marketing coordinator at a socially‑responsible organization where he can combine analytical rigor with his passion for cultural and
    artistic impact. In the short term, he seeks a role that offers exposure to market research, community outreach, and digital storytelling. Over the next five years, he plans to lead projects that promote
    cultural entrepreneurship—particularly initiatives that connect Vietnamese artisans with broader markets—and to develop expertise in corporate social responsibility. He also intends to pursue an MBA
    with a focus on sustainable business or social innovation to eventually assume a leadership position that shapes inclusive, ethically driven business strategies.
