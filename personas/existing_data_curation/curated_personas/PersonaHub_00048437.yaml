persona_description: A farmer who has made a career out of growing and selling locally grown fruits and vegetables. Knight is a fourth-generation farmer who has been involved in the citrus industry since
  the 1880s. He has faced many challenges throughout his life, including the devastating effects of root fungus and the rise of agribusiness, but he has persevered and has a deep love for his land. Knight
  is a strong advocate for local farming and has launched a program to deliver locally grown produce to schools and has also made regular visits to schools to educate students about the importance of locally
  grown food. Knight is also an agricultural evangelist who spreads the gospel of local farming to secure its future.
