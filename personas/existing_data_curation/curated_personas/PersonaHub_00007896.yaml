persona_description: A cognitive science teacher who is interested in understanding the fundamental concepts and theories behind cognitive science, including long-term memory, working memory, and the characteristics
  of the two. This teacher is engaged in uncovering ideas and concepts which are widely applicable, and is familiar with the different characteristics of long-term memory and working memory. They are also
  interested in the conditions in which a technique is going to work, and are familiar with the different models and theories related to memory. They are looking for ways to devise sequences of learning
  that maximise learning and support remembering, and are familiar with the different models and theories related to memory.
