personas:
  professional: Michelle Molina is a budding junior illustrator who combines meticulous sketching of coastal festivals with early digital animation projects, showcasing an organized, methodical approach
    and a curiosity that drives them to explore art history and astronomy for fresh visual ideas.
  sports: Michelle Molina spends Saturday mornings kayaking in the mangrove waterways and plays forward for the Coastal Dolphins junior soccer team, preferring small group practices over large school sports
    events and cheering quietly for the local junior swimming club in regional meets.
  arts: Michelle Molina draws inspiration from Claude Monet's impressionist seascapes, animates whimsical shorts in the style of Hayao Miyazaki, and practices piano pieces by Ludovico Einaudi, weaving these
    influences into a personal sketchbook that captures the town's festivals with meticulous detail.
  travel: Michelle Molina dreams of exploring the historic lighthouse on the nearby island, has already taken a family trip to the bustling seaside market town, and hopes to someday witness the Aurora Borealis,
    planning each adventure with a careful checklist and a sketchbook for visual notes.
  culinary: Michelle Molina loves the bright flavors of grilled fish tacos topped with mango salsa, often tries to perfect coconut rice at home, and mixes colorful fruit smoothies while occasionally overindulging
    in sugary gummies during study breaks.
  core: Michelle Molina is a methodical, curious ten-year-old artist who balances meticulous sketching with impulsive snack cravings, prefers quiet group workshops over loud crowds, and keeps a secret stash
    of glitter pens for spontaneous doodles.
background:
  cultural: Michelle comes from a proud Puerto Rican family in Santa Isabel, a town known for its sugar‑cane heritage and vibrant coastal festivals. She grew up listening to plena and bomba music, celebrating
    the town’s patron saint feast with family and neighbors. Her household speaks both Spanish and English, and she learns about traditional crafts such as vejigante masks and local culinary dishes like
    arroz con gandules. The close‑knit community, the island’s natural landscapes, and the blend of Afro‑Caribbean and Spanish influences shape her worldview and artistic sensibility.
attributes:
  skills: '[''drawing'', ''watercolor painting'', ''basic Scratch programming'', ''bilingual Spanish‑English communication'', ''organizing school projects'', ''beginner piano'', ''creative writing'']'
  hobbies: '[''sketching and painting'', ''reading art and science books'', ''creating Scratch animations'', ''playing piano'', ''exploring mangrove trails'', ''participating in small craft workshops'',
    ''attending local festivals'']'
  career_goals: She dreams of becoming a professional visual artist or graphic designer who can blend Puerto Rican cultural motifs with modern digital media. Michelle also hopes to study environmental science
    to help protect the mangroves and beaches near Santa Isabel, and she envisions a future where she can teach art and sustainability to younger children in her community.
