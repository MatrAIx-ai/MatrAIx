  career_goals: Amy aims to complete her residency in family medicine and become board‑certified, with a long‑term vision of establishing a community health clinic that incorporates medical humanities and
    art‑based interventions for mental well‑being. She plans to pursue a fellowship in adolescent health to better serve youth, and eventually secure a faculty appointment at a teaching hospital where she
    can mentor future physicians. Her ambition includes publishing research on the impact of creative arts on patient recovery and leading outreach programs that provide free preventive care to underserved
    neighborhoods in Montgomery County.
