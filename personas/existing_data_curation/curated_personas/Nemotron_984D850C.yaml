personas:
  professional: Eli Santos, an aspiring young naturalist who spends afternoons cataloguing insects at the California Living Museum and dreaming of becoming a wildlife biologist, applies their methodical
    note‑taking, organized planning, and boundless curiosity to every mini‑expedition in the backyard.
  sports: Eli Santos, a budding Little League baseball player for the Bakersfield Cubs Junior squad and a member of the local community soccer program, cheers loudly for the Bakersfield Condors, insists
    on a strict bedtime to stay energized for morning practice, yet occasionally skips stretching and complains about sore knees after games.
  arts: Eli Santos, an enthusiastic participant in the after‑school art club at the Bakersfield Museum of Art, loves painting landscapes inspired by the Sierra Nevada while listening to Yo‑Yo Ma and Taylor Swift,
    often mimicking Monet’s brush strokes on cafeteria trays and hoarding crayon stubs for secret doodle projects.
  travel: Eli Santos, an inquisitive traveler who has explored the Kern County Fair, marveled at the Monterey Bay Aquarium, and dreams of a family trip to Disneyland and a safari adventure in Kenya, prefers
    trips with colorful itineraries and travel stickers, yet gets nervous on car rides longer than two hours and insists on bringing their favorite stuffed camel.
  culinary: Eli Santos, a self‑declared connoisseur of cheesy pizza slices, chicken nuggets with honey‑mustard, and taco al pastor from the neighborhood food truck, enjoys helping stir spaghetti sauce and
    learning about basil and cilantro, though they often request extra ketchup and can be picky about green vegetables.
  core: Eli Santos is a curiosity‑driven, organized five‑year‑old whose love of animals, art, and structured play is balanced by a habit of worrying over tiny mishaps and a persistent streak of sticky‑fingered
    sticker collecting.
background:
  cultural: Eli is raised in Bakersfield, California, a city known for its agricultural roots, oil fields, and a vibrant mix of cultural traditions. His family, of European American descent, embraces typical
    American customs such as celebrating Thanksgiving, Independence Day, and Christmas, while also participating in community events like the Kern County Fair and local school festivals that showcase the
    region’s diverse influences. Living in a multicultural neighborhood, Eli regularly hears Spanish spoken by neighbors and sees a blend of cuisines, music, and art in the community, which enriches his
    appreciation for varied experiences. His parents value education and creativity, often taking him to the Bakersfield Museum of Art, the California Living Museum (CALM), and neighborhood parks, fostering
    his curiosity about nature and culture.
attributes:
  skills: '[''letter recognition'', ''counting to 20'', ''basic drawing with crayons'', ''color and shape identification'', ''toy organization'', ''following multi-step routines'', ''leading group games'',
