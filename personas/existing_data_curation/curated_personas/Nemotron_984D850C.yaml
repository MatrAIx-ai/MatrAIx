  hobbies: '[''drawing and painting'', ''building with LEGO'', ''story time at the library'', ''visiting art and science museums'', ''nature walks and collecting rocks'', ''group music and dance class'',
    ''playing organized games like tag and T‑ball'', ''exploring new craft projects'']'
  career_goals: Eli often talks about becoming an astronaut who can explore space and draw the planets he discovers, reflecting his love for art and curiosity about new ideas. He also imagines being an
    artist who creates colorful paintings that tell stories, and occasionally mentions wanting to be a teacher so he can share his knowledge and help friends learn. These aspirations combine his desire
    for discovery, creativity, and the satisfaction of guiding others, and he frequently expresses a wish to grow up in a job where he can stay organized, solve problems, and make a positive impact.
