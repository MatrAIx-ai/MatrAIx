  career_goals: Although retired, Dyana aims to leave a lasting interdisciplinary legacy that bridges science and art. She is working on a manuscript that explores the visual representation of abstract
    scientific theories, which she hopes to publish and present at small academic and community gatherings. She intends to establish a modest scholarship fund in memory of her late husband to support local
    high‑school girls pursuing STEM fields. Dyana also seeks to continue mentoring aspiring scientists and artists, offering quarterly workshops at the Coeur d'Alene library, and to remain engaged with
    emerging scientific developments such as artificial intelligence and quantum computing through lifelong learning courses.
