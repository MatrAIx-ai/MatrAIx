personas:
  professional: Dyana Lee, a retired data scientist and interdisciplinary educator, applies her advanced statistical analysis, computational modeling, and data‑visualization expertise to craft abstract
    watercolor and digital illustrations that translate complex scientific theories into accessible visuals, while her obsessive organization, evidence‑driven skepticism, and competitive drive shape rigorous
    mentorship and meticulous workshop planning.
  sports: Dyana Lee is an avid hiker who joins the Coeur d'Alene Hiking Club for weekly treks in the summer and takes up light cross‑country skiing with the Idaho Ski Association in winter, while cheering
    quietly for the Seattle Seahawks and the Spokane Indians from her living room, using a disciplined routine to walk five thousand steps daily and maintain a modest cardio regimen.
  arts: Dyana Lee channels her imagination into abstract watercolors reminiscent of Mark Rothko’s color fields and delicate landscape studies à la Claude Monet, creates digital illustrations influenced
    by Beeple’s futuristic motifs, practices classical piano repertoire ranging from Debussy’s Clair de Lune to Beethoven’s Moonlight Sonata, and finds inspiration in literary works by Virginia Woolf and
    Albert Camus, which together shape her reflective artistic identity.
  travel: Dyana Lee prefers meticulously planned, low‑stress travel itineraries that combine leisurely photography hikes in nearby national treasures like Glacier and Grand Teton with occasional international
    cultural immersions such as a curated museum tour of Paris and a serene garden stroll in Kyoto, always traveling with a small companion or solo to maintain independence while accommodating a modest
    budget and the occasional health precaution.
  culinary: Dyana Lee enjoys a modest yet discerning palate, skillfully preparing fresh lake trout glazed with lemon‑dill sauce, wild mushroom risotto seasoned with sage and tarragon, and blueberry scones
    that showcase locally foraged berries, while often indulging in herbal tea blends featuring chamomile and lavender after a session of watercolor painting, and occasionally splurges on a fine cheese
    plate from a local artisan farm.
  core: Dyana Lee is a fiercely organized, imaginative 79‑year‑old who weaves scientific rigor into artistic expression, mentors budding minds, and balances disciplined frugality with occasional lavish
    indulgences in art and travel.
background:
  cultural: Dyana belongs to the post‑World War II generation of white Americans who grew up valuing education, self‑reliance, and community service. Her formative years were shaped by the optimism and
    scientific progress of the mid‑20th century, fostering a deep respect for rational inquiry and a curiosity about emerging technologies. Relocating to Coeur d'Alene, Idaho, she embraced the region’s
    strong connection to the outdoors, modest town life, and appreciation for independent thought. This setting reinforced her preference for solitude, small gatherings, and a lifestyle that balances intellectual
    pursuits with an intimate relationship to nature. While rooted in broader American cultural ideals of perseverance and continuous learning, Dyana’s personal identity reflects a blend of disciplined
    academic rigor, artistic imagination, and a commitment to nurturing the next generation within her local community.
