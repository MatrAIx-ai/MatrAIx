personas:
  professional: Helen Sabet, an enthusiastic mini‑architect, uses LEGO bricks to construct tidy, color‑coded cityscapes, demonstrating an early kna ck for organization, methodical planning, and a preference
    for predictable structures, and they often insist on arranging each piece before play begins.
  sports: Helen Sabet, a spirited member of the ‘Tiny Tigers’ preschool soccer club, loves the rhythmic sprint drills at the local park and cheers for the local professional baseball team, the Chicago Cubs,
    while keeping a disciplined practice schedule, and they often challenge classmates to see who can score the most goals during recess.
  arts: Helen Sabet, a budding storyteller, passionately reenacts scenes from Disney’s ‘Moana’, draws vivid characters with Crayola markers, idolizes animators like Hayao Miyazaki, filling her sketchbook
    with meticulous details, and they sometimes stage impromptu puppet shows for family gatherings.
  travel: Helen Sabet, the itinerary‑obsessed explorer, enjoys family trips to the nearby Children’s Museum in Boston and dreams of a structured visit to the Grand Canyon, always demanding a printed schedule
    before boarding the car, and they meticulously check off each planned activity on a colorful checklist.
  culinary: Helen Sabet, a budding chef in her play kitchen, delights in making bite‑size macaroni‑and‑ cheese cups topped with shredded cheddar, meticulously arranging peas in neat rows, while refusing
    anything messy like spaghetti, and they proudly serve each creation to stuffed animal guests with a smile.
  core: Helen Sabet is a four‑year‑old who thrives on tidy routines, counts every coin, wrestles with intense emotions, channels her methodical mind into LEGO cities, sticker savings, and perfectly plated
    pasta bites, and they often seek reassurance from caregivers when plans go awry.
background:
  cultural: Helen is a white child growing up in Greenville, North Carolina, a small city in the coastal plain of the American South. Her family lives in a middle‑class neighborhood where Southern hospitality,
    community gatherings, and respect for local traditions shape daily life. She participates in church events, family barbecues, and school activities that emphasize politeness, togetherness, and a love
    of the outdoors. The region's emphasis on routine, courtesy, and close‑knit community ties influences her structured outlook and her desire for predictable environments.
attributes:
  skills: '[''Sorting objects by color, shape, and size'', ''Fine‑motor skills: drawing within lines, cutting with safety scissors, building block structures'', ''Counting to twenty'', ''Recognizing letters
