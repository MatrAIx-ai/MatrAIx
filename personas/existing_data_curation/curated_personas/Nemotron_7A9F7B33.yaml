  hobbies: '[''Puzzle solving'', ''Building block towers'', ''Coloring within lines'', ''Sticker album arranging'', ''Storytime at the library'', ''Singing nursery rhymes'', ''Playing organized games (e.g.,
    Simon Says)'', ''Watching educational videos about animals and space'']'
  career_goals: Helen often imagines future roles that provide clear structure, predictability, and the chance to help others. She frequently says she wants to become a teacher because she enjoys guiding
    classmates through schedules and lessons. She also expresses interest in being a librarian, where she could organize books and maintain a calm environment, and a pediatric nurse, where she could care
    for children in a safe, routine‑driven setting. Occasionally, her competitive side leads her to picture herself as a police officer, enforcing rules and protecting her community. Overall, she aspires
    to occupations that offer organized routines, allow her to be methodical, and help reduce her anxiety by providing stable, predictable surroundings.
