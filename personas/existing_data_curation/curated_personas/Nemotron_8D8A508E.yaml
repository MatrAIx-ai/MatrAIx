  hobbies: '[''Visiting art galleries'', ''Reading art history'', ''Gardening'', ''Quilting'', ''Knitting'', ''Cooking'', ''Bird watching'', ''Bridge (card game)'', ''Community volunteering'', ''Digital
    photography'']'
  career_goals: Although retired, Kirtley aims to deepen her contribution to the Barron community by establishing a small local art exhibition that showcases the work of senior artists and preserves traditional
    crafts. She also hopes to mentor younger volunteers in event organization, document oral histories of longtime residents, and learn digital photography to record her garden and local landscapes. In
    the longer term, she aspires to travel to regional museums and galleries, especially those highlighting American folk art.
