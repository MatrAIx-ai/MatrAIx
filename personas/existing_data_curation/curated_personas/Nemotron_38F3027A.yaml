personas:
  professional: Guadalupe Estradarodriguez is a retired community organizer who now channels fluent bilingual communication, meticulous budgeting, and step‑by‑step event planning into senior‑center programming,
    and they assertively mediate volunteer groups with calm compassion.
  sports: Guadalupe Estradarodriguez enjoys low‑impact fitness by walking the Richland County Forest Preserve trails with the local Senior Hiking Club, cheers the Wisconsin Badgers football team and the
    Milwaukee Brewers baseball club, and they balance seasonal outdoor activity with occasional seated yoga at the senior center.
  arts: Guadalupe Estradarodriguez expresses creativity through quilting heirloom blankets, playing traditional folk guitar at community dances, and they draw inspiration from artists like Frida Kahlo,
    musician Lila Downs, and the storytelling of Juan Rulfo.
  travel: Guadalupe Estradarodriguez favors thoughtfully planned road trips to nearby Driftless Area towns and cultural sites such as the historic town of Mineral Point, while dreaming of a reunion in Jalisco,
    Mexico, but they schedule travel around a fixed retirement budget and family commitments.
  culinary: Guadalupe Estradarodriguez cooks authentic dishes such as pozole, tamales, and fresh salsa using garden‑grown corn, chilies, cilantro, and tomatoes, and they love hosting potluck gatherings
    where they showcase their skillful blending of traditional techniques with Wisconsin produce like carrots and potatoes.
  core: Guadalupe Estradarodriguez blends organized community leadership, garden‑fresh cooking, and a habit of meticulously noting bird sightings, while occasionally hoarding quilting supplies and forgetting
    to water her lettuce for a day.
background:
  cultural: Guadalupe grew up in a Mexican immigrant household in Wisconsin, where Spanish was spoken daily and Mexican traditions were celebrated alongside Midwestern customs. Her parents instilled respect
    for family, community, and Catholic faith, which she carries into her involvement with the local church and cultural festivals. She maintains fluency in Spanish, preserving the language through cooking,
    storytelling, and volunteering to help new Latino immigrants navigate services. Guadalupe honors Mexican holidays such as Día de los Muertos and Semana Santa, often inviting neighbors to share meals
    and traditions. At the same time, she has embraced the values of her Wisconsin community—self‑reliance, volunteerism, and appreciation for the outdoors—creating a bicultural identity that blends the
    warmth of Mexican heritage with the practicality of Midwestern life.
attributes:
  skills: '[''Spanish‑English bilingualism'', ''Budgeting and financial management'', ''Community event planning'', ''Basic computer skills (email, Zoom, Microsoft Office)'', ''Traditional Mexican cooking'',
    ''Organic gardening and seasonal planting'', ''Quilting and needlework'', ''Volunteer coordination'', ''Conflict resolution and assertive communication'', ''Senior‑center program facilitation'']'
  hobbies: '[''Gardening'', ''Cooking Mexican cuisine with local ingredients'', ''Walking and birdwatching in nature preserves'', ''Reading historical and travel memoirs'', ''Quilting and needlework'',
    ''Listening to/playing traditional Mexican music'', ''Volunteering at the senior center teaching Spanish'', ''Genealogy research'', ''Participating in local folk‑dance events'']'
  career_goals: Although retired from formal employment, Guadalupe aims to deepen her impact on the Richland Center community. She aspires to join the board of the local Senior Services agency, launch a
    bilingual community‑garden program that pairs seniors with youth volunteers, and publish a small family cookbook that weaves personal migration stories with recipes. She plans to complete an online
    certificate in Senior Adult Education to lead workshops on health, technology, and cultural heritage. In the longer term, she hopes to organize an annual Mexican‑heritage day at the high school and,
    when possible, travel back to her family’s hometown in Jalisco, Mexico, for a reunion that reconnects her with her roots.
