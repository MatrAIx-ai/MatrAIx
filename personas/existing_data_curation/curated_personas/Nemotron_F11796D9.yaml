  hobbies: '[''Abstract Watercolor Painting'', ''Sketching'', ''Gallery Visits'', ''Indie Film & Improv Theatre'', ''Speculative Fiction Reading'', ''Poetry Writing'', ''Short Story Writing'', ''Hosting
    Themed Dinner Parties'', ''Fusion Cooking'', ''Hiking'', ''Yoga'', ''Volunteer Art Workshops for Youth'', ''Juneteenth and Kwanzaa Celebrations'', ''Supporting Black‑Owned Businesses'', ''HR Mentorship
    Meet‑ups'']'
  career_goals: In the short term, Yvonne aims to earn her SHRM‑CP certification and lead a cross‑functional DEI task force that blends artistic expression with inclusion strategies at her company. She
    wants to pilot an "Art in the Workplace" series of workshops that encourages staff to explore creativity as a tool for problem‑solving and team‑building. Over the next five to ten years, she aspires
    to become an HR Director or VP of People, shaping organizational culture at a regional or national level. Ultimately, Yvonne envisions launching her own consultancy that partners with small‑to‑mid‑size
    businesses to develop culturally resonant, arts‑focused employee experience programs, while mentoring emerging HR professionals from underrepresented backgrounds.
