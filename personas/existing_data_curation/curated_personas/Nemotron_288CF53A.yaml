    about teen life'', ''reality TV binge‑watching'']'
  career_goals: Robin aims to earn her high‑school equivalency (GED) within the next year and enroll in a community‑college automotive technology program. Her immediate goal is to become a certified mechanic
    and later open a modest mobile auto‑repair service that caters to Belton residents. Parallel to this, she wants to grow a small Twitch channel focused on strategy games, using her competitive edge and
    editing skills to generate supplemental income. Long‑term, she envisions a balanced career where she can sustain financial independence while maintaining a flexible schedule that allows her to stay
    engaged with her friends and community projects.
