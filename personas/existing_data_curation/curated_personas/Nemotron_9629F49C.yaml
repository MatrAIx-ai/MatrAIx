personas:
  professional: Malcolm Franks, a veteran theater technician with a mathematics and physics background, blends meticulous safety protocols with a storyteller's eye for preserving Charleston's stage history,
    and now seeks a part-time advisory role where they can mentor younger staff while maintaining a low-stress schedule.
  sports: Malcolm Franks, a lifelong fan of the Charleston RiverDogs and a member of the local senior walking club, enjoys gentle morning walks along the waterfront and watches college basketball and baseball
    games on TV, favoring low-impact activity that aligns with their preference for solitary, calm exercise.
  arts: Malcolm Franks, an avid collector of jazz and blues records from legends like Miles Davis and B.B. King, spends evenings listening to vinyl while photographing historic Charleston architecture and
    occasionally attends solo screenings of classic films such as Casablanca, finding solace in the narratives without the pressure of social interaction.
  travel: Malcolm Franks, who favors meticulously planned, low-key trips to historic towns like Savannah and New Orleans for their music scenes, chooses off-season travel to avoid crowds and budgets each
    journey through a mix of savings and a modest travel rewards credit card, always returning home refreshed yet occasionally fretting over missed work deadlines.
  culinary: Malcolm Franks, a modest home cook who cherishes soul-food staples such as shrimp and grits, collard greens, and sweet potato pie, frequently harvests fresh herbs from their garden and delights
    in experimenting with a slow-cooked gumbo, though they sometimes over-salt dishes in a quest for nostalgic flavor.
  core: Malcolm Franks, a 69-year-old theater veteran with a quiet curiosity, balances meticulous work habits, a love for jazz and historic architecture, and a tendency to worry, all while preferring solitary
    pursuits and a modest, low-stress lifestyle.
background:
  cultural: Malcolm is an African‑American who grew up in Charleston’s historic black neighborhoods and was raised with the traditions of the Gullah community, including oral storytelling, soul‑food cooking,
    and a strong sense of familial responsibility. He earned his STEM degree during the post‑civil‑rights era at a historically black college, an experience that reinforced his commitment to perseverance
    and community service. His cultural identity remains closely tied to local African‑diaspora heritage, church gatherings, and community events that celebrate the rich history of Black South Carolinians.
attributes:
  skills: '[''Technical troubleshooting of lighting and sound equipment'', ''Routine equipment maintenance'', ''Event logistics planning and scheduling'', ''Safety compliance monitoring'', ''Inventory management
    for concessions and stage props'', ''Ticketing system operation'', ''Data entry and performance metrics analysis'', ''Basic programming in Python for automation'']'
  hobbies: '[''Reading historical nonfiction'', ''Scale model ship building'', ''Historical architecture photography'', ''Gardening'', ''Crossword puzzles'', ''Jazz and blues listening'', ''Solo film screenings'']'
  career_goals: He aims to transition into a mentorship and advisory role where he can train new staff on best practices for safety and efficiency, streamline venue operations, and document the history
    of Charleston’s local theater scene. Malcolm hopes to secure a low‑stress, part‑time consulting position that allows him to contribute his expertise while maintaining a balanced, quiet lifestyle and
    gradually preparing for retirement.
