  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital illustration'', ''Visiting museums and galleries'', ''Youth art collective murals'', ''Hiking and landscape photography'', ''Reading speculative
    fiction'', ''Listening to indie/alternative music'', ''Cooking and experimenting with recipes'', ''Volunteering at the public library (art displays, teaching kids)'']'
  career_goals: Carmen aims to complete her high‑school education by obtaining a GED and then enroll in a community‑college program in graphic design or visual communications. Her long‑term ambition is
    to work as a graphic designer and eventually transition into a creative director role where she can combine her artistic talent with her strong organizational abilities to lead interdisciplinary projects.
    She is particularly interested in socially‑focused design work, such as creating visual campaigns for environmental nonprofits or community arts initiatives. In the future, she also hopes to curate
    local art exhibitions and perhaps start a freelance studio that offers branding and illustration services for small businesses in the Denver area.
