persona_description: A rehabilitation physiotherapist who specializes in the treatment of stroke survivors, particularly those with motor impairment, balance and gait deficits. She has published literature
  on aquatic exercise interventions and has a proven track record in creating a reputation in the field. The research involves a single blind randomised controlled trial of hydrotherapy on walking ability
  and balance in chronic stroke survivors. The study is a level two evidence RCT with several limitations, including a small sample size and lack of follow-up to evaluate the long-term effect of hydrotherapy.
