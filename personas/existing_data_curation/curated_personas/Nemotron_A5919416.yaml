personas:
  professional: Briana Moore, a veteran community police officer in Pinellas County, combines fifteen years of law‑enforcement expertise with a humanities background to design data‑driven outreach programs
    that use art workshops as a bridge to at‑risk youth, while her methodical planning and assertive yet compassionate demeanor prepares her to step into a supervisory role shaping department policy on
    mental‑health awareness.
  sports: Briana Moore, an early‑morning beach‑walker and casual kayaker who values solitude, complements her low‑impact yoga sessions with a yearly 5K run for the Pinellas County Police Run, and joins
    a local paddle‑board club during summer, preferring individualized fitness activities over team sports and cheering on the Tampa Bay Buccaneers from a quiet home viewing spot.
  arts: Briana Moore, an avid patron of the Salvador Dalí Museum and regular participant in pottery and watercolor workshops, deepens her creative expression through teaching basic art techniques to middle‑schoolers
    at a community center, curates a personal collection of surrealist postcards, and devotes weekly evenings to reading investigative journalism with her book club, often quoting Frida Kahlo and contemporary
    photographer Gregory Crewdson.
  travel: Briana Moore, a meticulous planner with a love for cultural immersion, enjoys weekend road trips to Sarasota’s Ringling Museum and annual visits to New Orleans for its jazz and historic architecture,
    while dreaming of a summer pilgrimage to the Uffizi Gallery in Florence; she favors solo travel itineraries that balance museum tours with quiet beachside retreats, always booking accommodations near
    local art districts.
  culinary: Briana Moore, a modest home cook who favors fresh Gulf seafood, frequently prepares grilled grouper with lemon‑herb quinoa salads and occasionally experiments with Mediterranean dishes like
    shrimp paella, while her weekend brunch rituals include avocado toast and cold‑brew coffee, and she delights in sampling local oyster shacks during beach walks.
  core: Briana Moore, a methodical community police officer with a quiet love of surrealist art, balances disciplined career ambitions with solitary beach walks, yoga, and a penchant for late‑night historical
    biographies, all while navigating occasional latte indulgences and a stubborn habit of forgetting to water houseplants.
background:
  cultural: Briana grew up in a middle‑class suburban community in the Midwestern United States, the daughter of second‑generation Irish‑American parents. Her family celebrated traditional American holidays
    with a blend of cultural customs, such as Irish music at St. Patrick’s Day and classic Thanksgiving gatherings. During college, she studied American literature and cultural history, which deepened her
    appreciation for diverse artistic expressions. After relocating to Saint Petersburg, Florida, she embraced the city’s vibrant coastal culture, participating in local festivals like the Mainsail Art
    Festival and adopting the laid‑back, community‑oriented lifestyle of Pinellas County. While she identifies with mainstream American values of independence and civic duty, her professional role has heightened
    her sensitivity to the multicultural demographics of the area, including the sizable retiree, Hispanic, and Caribbean communities.
attributes:
  skills: '[''Community Policing'', ''Crisis Intervention'', ''De‑escalation Techniques'', ''Investigative Report Writing'', ''Evidence Collection'', ''Crime‑Pattern Analysis (GIS)'', ''Public Speaking
    & Training'', ''Program Development (Art‑Based Youth Outreach)'', ''Logistical Planning'', ''Inter‑Agency Coordination'']'
  hobbies: '[''Visiting art museums (e.g., Salvador Dalí Museum)'', ''Pottery and watercolor classes'', ''Reading historical biographies and contemporary literature'', ''Morning beach walks and solo kayaking'',
    ''Small‑group investigative journalism book club'', ''Volunteer art workshops for youth'', ''Yoga'', ''Running (5K events)'']'
  career_goals: She aims to progress to a supervisory role, such as sergeant or lieutenant, where she can shape departmental policies that prioritize community engagement and mental‑health awareness. Briana
    is particularly interested in establishing a formal arts‑in‑policing initiative within the Pinellas County Sheriff’s Office, partnering with local museums and schools. She plans to pursue a Master’s
    in Public Administration within the next three years to strengthen her strategic leadership skills. In the longer term, she envisions a position as a policy advisor or trainer at the state level, advocating
    for evidence‑based policing reforms and culturally competent practices.
