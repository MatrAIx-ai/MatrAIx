persona_description: A scientist with expertise in electrochemical devices and materials, particularly focusing on the development of advanced technologies for energy storage and conversion. They are interested
  in gaining fundamental understanding of the physical phenomena governing charge transfer in electrochemical devices, and are skilled in using synchrotron-based x-ray techniques to directly observe local
  surface potential, chemical composition, and elemental oxidation states at surfaces, interfaces, and in the bulk of high-temperature electrochemical devices during operation. Their research interests
  include developing optimally designed electrode/electrolyte materials and interfaces, and thus more efficient or robust technologies. They collaborate with the Advanced Light Source (located at Lawrence
  Berkeley National Laboratory) to devise an experimental platform to use synchrotron-based soft x-ray techniques to observe local surface potential, chemical composition, and elemental oxidation states
  at surfaces, interfaces, and in the bulk of high-temperature electrochemical devices during operation.
