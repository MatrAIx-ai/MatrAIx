  career_goals: Tham Aaron aspires to combine his love for technology and his desire to help others by pursuing a future in software or robotics engineering. He dreams of designing educational games or
    assistive devices that make learning more engaging for kids. In the short term, he aims to win his school’s science fair, join a robotics club, and earn a scholarship to study computer science in college.
    He also envisions volunteering as a youth mentor to share his skills with peers, reflecting his compassionate yet self‑driven ambition while managing his natural worry about meeting expectations.
