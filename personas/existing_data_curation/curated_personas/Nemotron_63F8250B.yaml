personas:
  professional: Tham Nguyen is an aspiring young technologist who participates in the school science club, building LEGO robotics kits that blend curiosity and practicality, often organizing group build
    sessions and troubleshooting with a mix of methodical planning and spontaneous creativity, and they thrive on guiding peers through collaborative projects.
  sports: Tham Nguyen is a spirited member of the Eastside Strikers youth soccer league, training twice weekly, cheering for the local professional MLS team Chicago Fire, and approaches fitness with an
    energetic but occasionally anxious mindset, they often lead warm‑up drills for their teammates, always pushing to improve while worrying about missing a goal.
  arts: Tham Nguyen immerses themselves in anime series like My Hero Academia, draws vibrant cartoon characters inspired by graphic novels such as Bone, enjoys listening to J‑pop tracks, and channels this
    creative spark into building LEGO sets, showing a vivid artistic side that balances structured building with free‑form sketching, and they love sharing their drawings with friends online.
  travel: Tham Nguyen loves short family trips to nearby national parks for hiking, dreams of visiting Japan to attend an anime convention, plans itineraries with parents using map apps, they eagerly research
    each destination on YouTube, and they balance a desire for adventure with school responsibilities and limited pocket money.
  culinary: Tham Nguyen helps roll fresh spring rolls with rice paper, shrimp, vermicelli, and herbs, enjoys the tangy dip of nuoc cham, can confidently make a simple fried rice dish, relishes the occasional
    pizza slice, and they take pride in perfecting the dipping sauce, showcasing a growing cooking skill set that blends family recipes with favorite Western comfort foods.
  core: Tham Nguyen is a curiosity‑driven, energetic 12‑year‑old who blends inventive LEGO robotics with soccer, anime fandom, and a habit of worrying about school stress, often juggling organized plans
    with spontaneous bursts of creativity, and they frequently check their schedule to stay on track.
background:
  cultural: Tham Aaron comes from a Vietnamese‑American family that settled in San Antonio. At home, Vietnamese language, traditions, and cuisine are central, with celebrations of Tet and a strong emphasis
    on education and family respect. Living in Bexar County, he also experiences the vibrant Texan and Hispanic cultures of the city—attending local festivals, tasting Tex‑Mex food, and forming friendships
    across diverse backgrounds. This bicultural environment shapes his worldview, blending Southeast Asian values of community and perseverance with the openness and social dynamism of his Texas surroundings.
