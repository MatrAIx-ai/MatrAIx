  career_goals: David aims to advance to a senior executive position—such as Director of Operations or Vice President of Engineering—where he can shape strategic initiatives that integrate sustainable technologies
    and improve organizational efficiency. He seeks to foster a culture of continuous learning and to mentor the next generation of engineers. Additionally, he plans to partner with local schools to expand
    STEM outreach programs and eventually serve on the board of a nonprofit focused on community development and education.
