persona_description: A scientist or engineer working for the National Ocean Service's National Geodetic Survey (NGS) at NOAA, responsible for maintaining and updating the National Spatial Reference System
  (NSRS). This individual is involved in the general readjustment of the NSRS, which involves updating the coordinates, accuracies, and data included in the system to improve its accuracy and consistency.
  The individual is also involved in the height modernization program, which uses GPS technology to provide accurate height information. They work on projects that involve using GPS data for various purposes,
  such as identifying obstructions and hazards, identifying subsidence and flood plane areas, and improving the accuracy of environmental monitoring and modeling.
