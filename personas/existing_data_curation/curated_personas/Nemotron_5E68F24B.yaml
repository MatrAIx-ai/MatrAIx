personas:
  professional: Nhat Wongmanee, a retired carpenter and community organizer with a penchant for spontaneous creativity, leverages their hands‑on woodworking, event‑planning, and bilingual translation skills
    to spearhead a Southeast Asian‑inspired community art space in Kansas City that offers teen workshops, while often wrestling with deadlines and paperwork due to their love of flexible, open‑ended projects.
  sports: Nhat Wongmanee, an avid park‑walker and senior pickleball player, spends mornings strolling through Loose Park, competes in the Kansas City Senior Pickleball Club’s weekly matches, cheers for
    the Kansas City Chiefs during football season, and joins a local senior bowling league at the Fortune Bowling Center for social exercise.
  arts: Nhat Wongmanee, a lifelong watercolorist, potter, and calligrapher, immerses themselves in weekend workshops at the Kemper Museum, volunteers in community theater productions, draws creative fuel
    from traditional Vietnamese and Thai poetry, and cites Frida Kahlo, Bernard Leach, and contemporary artist Ai Weiwei as pivotal artistic influences.
  travel: Nhat Wongmanee, a methodical yet spontaneous traveler, favors culturally immersive trips, having recently explored Hanoi’s historic Old Quarter and Chiang Mai’s lantern festivals, while also taking
    annual weekend getaways to the Great Smoky Mountains, and plans a future photography pilgrimage to Luang Prabang’s ancient temples to document fading traditions.
  culinary: Nhat Wongmanee, an adventurous home chef, delights in crafting multi‑course family feasts featuring pho with star‑anise‑infused broth, bánh xèo stuffed with heirloom herbs from their garden,
    and innovative fusion dishes like lemongrass‑marinated pork ribs glazed with Kansas City‑style barbecue sauce, while obsessively sourcing fresh cilantro, kaffir lime leaves, and locally grown heirloom
    tomatoes.
  core: Nhat Wongmanee, a curious and spontaneous septuagenarian, blends a love for watercolor, calligraphy, and community storytelling with a penchant for lavish family meals, a skeptical eye on deadlines,
    and an occasional tendency to forget appointments.
background:
  cultural: Nhat was born in Vietnam to a family of mixed Vietnamese‑Thai heritage and immigrated to the United States in the late 1970s as a refugee. He grew up in a close‑knit Southeast Asian enclave
    in Kansas City, preserving traditions such as Tet (Lunar New Year), Songkran (Thai New Year), ancestor worship, and Buddhist ceremonies. Over the decades, he has blended these customs with Midwestern
    American life, celebrating holidays like Thanksgiving while maintaining culinary and linguistic ties to his roots. His bilingual abilities and deep appreciation for his cultural heritage shape his community
    involvement and personal identity.
