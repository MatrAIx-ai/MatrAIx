  career_goals: Although retired from formal employment, Nhat aspires to create a lasting cultural legacy. He aims to establish a community art space in Kansas City that showcases Southeast Asian art and
    provides workshops for teenagers. He plans to mentor local youth in creative expression and to publish a memoir recounting his family's refugee journey and adaptation to Midwestern life. Nhat also hopes
    to travel back to his ancestral homeland to document traditional practices, and to support his grandchildren's education by setting up a scholarship fund for arts studies.
