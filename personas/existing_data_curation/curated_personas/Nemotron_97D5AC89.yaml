  career_goals: Lois aims to transition into a senior HR leadership role within the next five years, aspiring to become an HR Business Partner or HR Manager for a mid‑sized organization. She plans to obtain
    the SHRM‑CP and later the SHRM‑SP certification to deepen her strategic HR knowledge. Her long‑term ambition includes shaping inclusive workplace cultures, spearheading employee wellness initiatives,
    and integrating advanced HR analytics to drive business outcomes. Eventually, she envisions founding a boutique HR consultancy that helps small businesses in her region develop robust talent management
    and compliance frameworks, allowing her to blend her love of practical problem‑solving with her desire to make a tangible community impact.
