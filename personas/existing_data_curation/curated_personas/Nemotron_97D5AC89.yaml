personas:
  professional: Lois Hood is a seasoned HR professional who leverages strategic workforce planning, conflict resolution, and HR analytics to craft data‑driven policies, while their organized, calm demeanor
    ensures meticulous execution of complex employee‑relations initiatives.
  sports: Lois Hood enjoys low‑impact hikes on the Oak Ridge trail, volunteers as a timekeeper for a community running club, roots for the River Valley Rovers semi‑pro soccer team, and follows the Boston
    Celtics for occasional basketball excitement.
  arts: Lois Hood regularly attends author talks featuring historians like David McCullough, enjoys the folk melodies of Joni Mitchell and the poetic recitations at the local library, and captures sunrise
    landscapes inspired by Ansel Adams with a vintage Nikon D3500.
  travel: Lois Hood prefers carefully planned, small‑group trips—such as a genealogy‑focused weekend in Williamsburg, Virginia, a photography excursion to Grand Teton National Park, and a cultural immersion
    in Québec City’s Old Town—balancing adventure with a modest travel budget.
  culinary: Lois Hood experiments with seasonal recipes, often turning garden harvests of kale, beets, and carrots into rustic ratatouille and sourdough bread, while their favorite comfort dish is a slow‑cooked
    chicken pot pie spiced with rosemary and thyme, and they occasionally over‑salt their soups in pursuit of flavor.
  core: Lois Hood is a methodical HR strategist with a quiet curiosity, who blends disciplined budgeting with a love for solitary gardening, historic reading, and precise knitting, while staying calm under
    pressure and occasionally indulging in over‑spiced meals.
background:
  cultural: Lois grew up in a middle‑class, suburban setting in Virginia, shaped by the region's blend of Southern hospitality and Mid‑Atlantic pragmatism. Her family has deep roots in the area, with generations
    of involvement in local community organizations, churches, and civic events. This upbringing emphasized education, self‑reliance, and a respect for both tradition and progressive change. While identifying
    with contemporary American values of individualism and practicality, she also values the modest, community‑oriented culture of Prince William County, often participating in local historical preservation
    efforts and neighborhood initiatives.
