personas:
  professional: Sandra Prusak is a seasoned front‑line rental shop associate who expertly handles cash, credit processing, inventory management and staff mentorship, applying their blend of practical efficiency
    and curious willingness to trial new digital tools, and they assertively champion sustainable, eco‑friendly workflow redesigns.
  sports: Sandra Prusak enjoys daily beach walks along Saco, occasional paddle‑board kayaking with the Saco Kayak Club, and they follow the Portland Sea Dogs and Boston Red Sox, embodying a low‑impact fitness
    routine that balances seasonal outdoor activity with local team loyalty.
  arts: Sandra Prusak enriches their leisure time by participating in a historic‑fiction book club that often debates works by Mary Ann Shaffer and Erica Bauermeister, and they frequently attend folk concerts
    featuring Bob Dylan tributes and local art shows highlighting the paintings of Andrew Wyeth.
  travel: Sandra Prusak plans their trips meticulously, using spreadsheets to budget and schedule visits to Acadia National Park, Bar Harbor, and the D‑Day beaches of Normandy, and they favor off‑season
    travel that blends adventure with relaxed cultural exploration while staying within a comfortable retirement budget.
  culinary: Sandra Prusak experiments in cooking classes, perfecting dishes like lobster pierogi with dill cream sauce and clam‑infused krupnik, drawing on fresh Atlantic cod, wild Maine blueberries, and
    traditional Polish herbs, and they create comforting yet innovative meals that reflect both tradition and seaside freshness.
  core: Sandra Prusak blends pragmatic efficiency with curious creativity, channeling their community‑focused spirit into eco‑friendly rental management, careful financial stewardship, proactive health
    habits, and a love of gardening, reading, and cooking that reflects both tradition and innovation, and they often share their homemade treats with neighbors.
background:
  cultural: Sandra’s ancestry traces back to Polish immigrants who settled in New England during the early 1900s. Growing up, she celebrated traditional Polish holidays—preparing pierogi for Christmas Eve
    and attending services at a nearby Catholic parish—while also absorbing the maritime culture of coastal Maine, which values self‑reliance, modesty, and close community ties. This blend of heritage gives
    her a strong appreciation for family gatherings, hearty home‑cooked meals, and a deep respect for the local sea and its traditions.
