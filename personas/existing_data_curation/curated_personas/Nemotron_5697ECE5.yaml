  career_goals: Sandra aims to move into a supervisory or managerial role within her rental operation, where she can redesign workflow processes for greater efficiency and implement environmentally friendly
    practices, such as offering biodegradable equipment accessories. She plans to enroll in a community‑college certification program in hospitality or small‑business management to strengthen her leadership
    skills. Long‑term, she envisions opening a modest, family‑run rental business that focuses on eco‑tourism along the Maine coast, while also creating mentorship opportunities for younger workers and
    establishing community outreach programs that introduce seniors to recreational activities.
