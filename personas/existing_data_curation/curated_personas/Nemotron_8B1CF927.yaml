personas:
  professional: Adrian Soto, a seasoned facilities maintenance technician with two decades of hands‑on experience in HVAC, electrical, and plumbing systems, leverages an associate degree in industrial maintenance
    and a methodical, step‑by‑step problem‑solving style to deliver cost‑effective solutions while mentoring junior staff and steering projects toward on‑time completion.
  sports: Adrian Soto stays active by catching early morning swells at Huntington Beach, a habit that complements their occasional membership in a local surf club and loyalty to the Los Angeles Dodgers
    and Lakers, while they also favor low‑impact weekend hikes through Griffith Park to balance surf‑induced muscle fatigue.
  arts: Adrian Soto cultivates a creative outlet by restoring classic cars whose sleek lines evoke the artistry of designers like Harley Earl, listening to the soulful guitar work of Carlos Santana and
    the storytelling of musicians such as Los Lobos, and admiring the vivid canvases of Frida Kahlo and the evocative photographs of Ansel Adams during quiet evenings.
  travel: Adrian Soto plans travel like a maintenance schedule, meticulously mapping weekend road trips to nearby destinations such as Santa Barbara and Joshua Tree while saving for longer escapades to
    the historic streets of Seville, the coastal cliffs of Big Sur, and the bustling souks of Marrakech, always blending adventure with a realistic budget and family considerations.
  culinary: Adrian Soto, an avid home‑cook, perfects traditional mole, hand‑rolled tamales, and grilled fish tacos by layering roasted chilies, chocolate, and heirloom tomatoes, while experimenting with
    fusion twists that incorporate fresh herbs from their garden and the smoky notes of mesquite grilling.
  core: Adrian Soto blends a methodical work ethic with a love for surf, classic car restoration, and bold home‑cooked flavors, all while juggling a disciplined financial plan, proactive health monitoring,
    and a quiet determination to mentor the next generation of facility technicians.
background:
  cultural: Adrian was born to Mexican immigrant parents in the Los Angeles area and grew up immersed in both Mexican traditions and the multicultural environment of Southern California. He is bilingual,
    speaking Spanish at home and English at work, which has helped him build rapport with a diverse workforce and community. Family gatherings, celebrations of Día de los Muertos, and Sunday meals featuring
    dishes like pozole and arroz con pollo reinforce his cultural identity. Living in Huntington Beach, he blends his Mexican roots with the laid‑back beach culture, participating in community festivals
    that celebrate both his heritage and the local Californian spirit. This dual cultural perspective informs his collaborative approach at work and his commitment to community service.
attributes:
  skills: '[''HVAC system maintenance and repair'', ''Electrical wiring and troubleshooting'', ''Plumbing installation and repair'', ''Preventive maintenance scheduling'', ''Equipment diagnostics and testing'',
