    and on-the-job training'']'
  hobbies: '[''Surfing at Huntington Beach'', ''Cooking Mexican cuisine'', ''Classic car restoration'', ''DIY woodworking projects'', ''Gardening (heirloom tomatoes and chilies)'', ''Community volunteer
    work (home-repair workshops)'', ''Bilingual tutoring (Spanish ↔ English)'', ''Calisthenics and fitness training'']'
  career_goals: Adrian aims to transition into a senior facilities manager role within the next three years, seeking certifications such as Certified Facility Manager (CFM) and LEED Green Associate to deepen
    his expertise in sustainable building operations. He also hopes to mentor a new generation of maintenance workers, leveraging his experience to improve team efficiency. In the longer term, he envisions
    launching his own small contracting firm that offers comprehensive maintenance services to residential and commercial clients in Orange County, blending his practical knowledge with innovative, eco‑friendly
    solutions.
