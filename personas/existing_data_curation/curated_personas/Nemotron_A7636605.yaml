background:
  cultural: Peter is a White child raised in Social Circle, Georgia, a small‑town community in Newton County. His family participates in typical Southern traditions such as church gatherings, community
    potlucks, and holiday celebrations with regional foods like fried chicken and peach cobbler. He experiences a blend of rural and suburban life, where neighborly friendliness, hospitality, and strong
    family ties are emphasized. These cultural influences reinforce his cooperative, kind nature and provide a supportive environment that helps him manage his tendency toward worry and sensitivity.
