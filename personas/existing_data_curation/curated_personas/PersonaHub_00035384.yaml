persona_description: Mary Benbow, MS, OTR\L, is a highly experienced and knowledgeable educator who specializes in teaching cursive handwriting to students with learning disabilities and perceptual delays.
  She is known for her innovative and engaging approach to teaching handwriting, which uses kinesthetic learning techniques to help students visualize and memorize letter formations. Her programs are designed
  to be easy to remember and understand, and are available in two levels of booklets for students of different ages. Her multi-packs of materials are not eligible for free or reduced shipping.
