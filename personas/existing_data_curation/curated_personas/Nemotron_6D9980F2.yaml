  career_goals: Colby hopes to graduate high school with a strong academic record, then pursue a bachelor's degree that merges visual art and interactive technology, such as a BFA in Game Design or a BS
    in Computer Science with an emphasis on multimedia. He dreams of becoming a video game artist and designer, creating games that explore mental‑health themes, and eventually establishing a non‑profit
    that offers art‑based workshops for teens struggling with stress and anxiety. In the short term, he wants to win the state art competition, land an internship at a local media studio, and develop a
    portfolio that showcases his interdisciplinary work.
