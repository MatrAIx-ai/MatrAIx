personas:
  professional: Colby Lee, a budding visual storyteller and teenage coder, blends comic‑style drawing, digital painting, and guitar riffs into experimental multimedia projects, channeling their curiosity
    and meticulous organization into a self‑run art‑tech blog while wrestling with occasional self‑doubt and stress.
  sports: Colby Lee, an enthusiastic hiker and casual basketball player, spends weekends trekking the Meeman Preserve with the Memphis Youth Hiking Club, roots for the Memphis Grizzlies and Tennessee Titans,
    and balances solitary trail runs with improvised pick‑up games at school, using physical activity as both a creative reset and a stress‑relief outlet.
  arts: Colby Lee, a dedicated comic‑artist and guitar enthusiast, draws inspiration from manga masters like Katsuhiro Otomo, the raw emotion of B.B. King's Memphis blues, and indie singer‑songwriter Phoebe
    Bridgers, curates a personal playlist while sketching murals in the city’s art districts, and frequently attends local gallery openings to network with fellow creators.
  travel: Colby Lee, an adventure‑seeking teen, prefers spontaneous day trips to nearby natural spots like the Hatchie River and weekend road trips to Nashville’s music scene, dreams of a future backpacking
    tour through Japan’s anime districts, and plans each journey using a blend of school‑project research and handwritten maps, while navigating parental constraints on budget and distance.
  culinary: Colby Lee, a budding home chef, loves whipping up buttery grilled cheese with tomato soup, experimenting with spicy ramen bowls topped with a soft‑boiled egg, and occasionally attempts simple
    BBQ ribs after watching cooking tutorials, yet often forgets to clean the kitchen afterward, resulting in a pile of dishes that fuels their procrastination.
  core: Colby Lee, a creatively restless teen who fills school margins with comic sketches while obsessively worrying about upcoming tests, balances art‑fuelled ambition with bouts of anxiety, and can’t
    resist a late‑night gaming session or a fresh set of colored pencils.
background:
  cultural: Colby grew up in a middle‑class neighborhood of Memphis, Tennessee, where Southern traditions blend with a vibrant, multicultural city life. His family celebrates holidays with Southern cuisine
    like barbecue and attends a local Baptist church, reflecting the region’s religious roots. At the same time, the city’s rich musical heritage—especially Memphis blues, soul, and the legacy of Stax Records—has
    shaped his taste in music. The yearly Memphis in May International Festival and the city's diverse murals exposed him to a wide range of cultural expressions, fueling his curiosity about different ideas
    and peoples. He is aware of the city’s civil‑rights history and the Mississippi River’s role in shaping the local economy, which he often learns about in school. These experiences give him a cultural
    identity that values Southern hospitality, community involvement, and an openness to global influences.
