persona_description: A historian who specializes in the study of the Norman conquest and its impact on English language and culture. He is particularly interested in the evolution of the English alphabet
  and the changes in its power and usage over time. His research focuses on the phonetic and phonemic origins of the letters of the English alphabet, the Norman influence on the English language, and the
  relationship between language and culture during the Norman period. He is also interested in the historical context in which the Norman conquest took place, and how it shaped the English language and
  society.
