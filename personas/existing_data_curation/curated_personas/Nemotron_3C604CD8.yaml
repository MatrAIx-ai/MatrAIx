personas:
  professional: Anna Callaway, a curious two‑year‑old, treats LEGO building as a miniature architecture internship, showcasing early spatial reasoning, organizational flair, and a delight in leading play‑time
    storytelling sessions.
  sports: Anna Callaway, an energetic two‑year‑old, attends the Tiny Tots Gymnastics Club on Saturdays, enjoys splash‑time at the neighborhood toddler pool, and cheers loudly for the nearby Milwaukee Brewers
    whenever a game is on television.
  arts: Anna Callaway, who sings along to the classic tune "The Wheels on the Bus" and refuses to miss an episode of Sesame Street featuring Lin‑Manuel Miranda’s cameo, loves finger‑painting to the rhythms
    of Disney’s "Let It Go" by Idina Menzel, and curiously imitates the dancing style of ballerina Misty Copeland.
  travel: Anna Callaway, who prefers car rides with the family and insists on stopping at every rest‑area playground, has delighted in trips to the San Diego Zoo, the towering Redwood National Park, and
    a photo‑filled day at the local aquarium, while her future wish list includes a toddler‑friendly safari in Kenya.
  culinary: Anna Callaway, a picky eater with a sweet spot for creamy mac and cheese, peanut butter toast, and strawberry‑banana smoothies, often helps stir the pot under supervision, but refuses broccoli
    unless it’s cut into tiny trees and paired with cheese.
  core: Anna Callaway, a sociable two‑year‑old with a competitive spark, balances boundless curiosity and practical play, thrives on being the center of attention, yet can be skeptical of new toys until
    she tests them herself.
background:
  cultural: Anna is raised in a white, Southern‑American family in Palmyra, Fluvanna County, Virginia. Her upbringing includes weekly church attendance, community celebrations such as Fourth of July picnics
    and Thanksgiving potlucks, and frequent participation in farm‑related chores on a nearby family property. The local culture values hospitality, close‑knit community ties, and practical skills, all of
    which shape her curiosity, sociability, and competitive spirit.
