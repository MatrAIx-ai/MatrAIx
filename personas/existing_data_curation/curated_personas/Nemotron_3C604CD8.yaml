  career_goals: Anna often imagines future roles where she can share knowledge and care for others, such as becoming a preschool teacher who inspires curiosity, a veterinarian who helps animals, or helping
    on her family’s farm. Her competitive streak fuels a desire to be the best storyteller or game leader among her peers, and she looks forward to a career that combines her sociable energy with practical,
    hands‑on work.
