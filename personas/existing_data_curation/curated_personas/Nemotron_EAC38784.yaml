  career_goals: Approaching retirement, Orlando aims to secure a regional director role that will allow him to implement digital transformation initiatives across multiple facilities, positioning the organization
    for long‑term competitiveness. He is driven to mentor emerging managers, establishing a structured leadership development program within his company. Beyond corporate advancement, he envisions launching
    a community arts hub in Garnett that blends his love for abstract art with his organizational expertise, leaving a lasting cultural and economic legacy before he transitions to a semi‑retired, advisory
    capacity.
