personas:
  professional: Rita Mclean is a budding visual storyteller who blends sketching of Rocky Mountain light with narrative writing, leveraging their curiosity and flexible, sometimes chaotic schedule to juggle
    after‑school art workshops, indie‑music‑inspired digital illustrations, and occasional community mural projects, hinting at a future creative career.
  sports: Rita Mclean enjoys hiking the foothills of the Rockies on weekends, follows the Colorado Avalanche for hockey excitement, and participates in the school's outdoor adventure club, but their laid‑back
    approach often means forgetting a water bottle or proper footwear.
  arts: Rita Mclean spends hours sketching mountain light, draws inspiration from the Denver Art Museum’s teen program featuring works by Ansel Adams and Frida Kahlo, listens to indie artists like Mitski
    and Tame Impala while creating experimental short videos, and regularly contributes to community mural projects, shaping a vibrant creative identity.
  travel: Rita Mclean prefers spontaneous weekend day trips to nearby scenic spots such as Red Rocks Park and occasional family drives to Glacier National Park, while dreaming of a budget backpacking adventure
    through Japan’s art towns like Takayama and Kanazawa, balancing a limited allowance with a love for photography and exploration.
  culinary: Rita Mclean enjoys crafting avocado toast topped with feta and cherry tomatoes, experimenting with DIY sushi rolls and dairy‑free smoothies featuring blueberries and oat milk, but often forgets
    to clean up the kitchen, leaving a cluttered countertop after snack sessions.
  core: Rita Mclean is a curious, slightly disorganized teen who channels worries into sketchbooks and sandbox worlds, constantly seeking fresh inspiration while battling occasional self‑doubt and impulse
    spending.
background:
  cultural: Rita comes from a white, middle‑class family that has lived in Denver for several generations. Her upbringing blends the suburban values of independence and community involvement with the outdoor‑oriented
    culture of the Rocky Mountain region. She has been exposed to a mix of traditional American holidays and the city’s multicultural festivals, which has nurtured an appreciation for diverse artistic expressions.
    Her family emphasizes education, curiosity, and staying connected to nature, and they often take weekend trips to nearby mountains and attend local art fairs, shaping Rita’s love for both creativity
    and the natural landscape.
