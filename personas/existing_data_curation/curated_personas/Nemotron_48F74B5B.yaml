  career_goals: Rita dreams of turning her artistic curiosity into a career that lets her explore ideas while making a meaningful impact. She envisions herself as a multimedia artist or graphic designer
    who blends visual storytelling with digital media, possibly working on projects that raise awareness about mental health and environmental stewardship. She is also drawn to creative writing, hoping
