  career_goals: Eager to advance beyond her current receptionist role, she plans to complete a bachelor's degree in Business Administration or Communications within the next three years and earn a Certified
    Administrative Professional (CAP) credential. Her short-term goal is to become an office manager, overseeing a team, streamlining office procedures, and mentoring new hires. Long-term, she aspires to
    blend her administrative expertise with her artistic passions by taking on a front-desk or program-coordination position at a cultural institution such as a museum, art gallery, or community arts center.
    She also hopes to launch a freelance graphic-design side business, creating promotional materials for local small businesses and nonprofit events.
