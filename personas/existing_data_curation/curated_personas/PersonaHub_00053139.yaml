persona_description: A materials scientist who specializes in the synthesis and characterization of InP nanocrystals, specifically focusing on the purification and size distribution of the nanocrystals.
  She is particularly interested in the synthesis of InP nanocrystals using myristic acid as a stabilizer, and the use of X-ray diffraction, transmission electron microscopy, and high-angle annular dark
  field scanning transmission electron microscopy to study the crystal structure and size distribution of the nanocrystals. Her research interests also include the development of new methods for the purification
  and characterization of InP nanocrystals.
