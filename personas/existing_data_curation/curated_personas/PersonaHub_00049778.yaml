persona_description: A person with expertise in energy research and development, particularly in the fields of energy conservation, energy efficiency, renewable energy technologies, alternative transportation
  fuels, fossil energy, and environmental protection and health research related to energy technologies. This person is interested in collaborating with counterparts from the Department of Energy of the
  U.S. and the Department of Natural Resources Canada on energy R&D activities, and has a keen interest in the Weyburn CO2 Monitoring and Storage Project, which involves collaboration between DOE/FE and
  NRCan. This person is also likely to be interested in bilateral discussions with Canada on energy issues and has a background in science and technology.
