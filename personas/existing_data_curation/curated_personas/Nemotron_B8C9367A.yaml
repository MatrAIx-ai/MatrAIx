personas:
  professional: A budding visual storyteller, Ashlyn Daquila merges digital illustration, photography, and video editing to craft eclectic freelance portfolios while navigating the chaotic rhythm of an
    18‑year‑old’s flexible schedule, and they channel competitive drive into landing gigs at forward‑thinking agencies.
  sports: Ashlyn Daquila spends weekends trekking the waterfalls of the Finger Lakes, competes in a local ultimate frisbee league, and roots for the Rochester Red Wings and Buffalo Bills, balancing active
    pursuits with casual fandom while they stay relaxed about structured training regimens.
  arts: Ashlyn Daquila immerses in indie music at Rochester Music Hall, draws inspiration from photographer Nan Goldin and musician Mitski, sketches in parks while they sip matcha lattes, and channels that
    eclectic aesthetic into resin art and handmade jewelry.
  travel: Ashlyn Daquila curates spontaneous road trips to Finger Lakes vineyards, weekend escapes to Toronto, and dreams of studying art in Berlin, favoring flexible itineraries and last‑minute inspiration
    over rigid planning, even if they sometimes forget to book accommodation early.
  culinary: Ashlyn Daquila loves a robust espresso at Karma Café, experiments with avocado‑sprinkled sourdough toast and quick ramen bowls after photo shoots, and occasionally burns toast in a rush, yet
    they relish discovering new café menus while they journal culinary impressions.
  core: Ashlyn Daquila is a curiosity‑driven, slightly disorganized 18‑year‑old visual artist who balances spontaneous creativity with an easygoing attitude toward obligations, while they remain competitively
    ambitious and skeptically discerning of others’ motives.
background:
  cultural: Ashlyn grew up in a middle-class white family in Canandaigua, a small city on the eastern shore of Canandaigua Lake in the Finger Lakes region of upstate New York. Her upbringing reflects a
    blend of suburban American values and the region’s strong sense of community, with typical celebrations of national holidays and occasional family gatherings that feature local traditions such as apple
    picking and wine tasting at nearby vineyards. The cultural landscape of the area, rich in agricultural heritage and arts festivals, nurtured her appreciation for art, outdoor recreation, and independent
    thought.
attributes:
  skills: '["Digital illustration", "Graphic design (Adobe Photoshop, Procreate)", "Photography", "Video editing (Adobe Premiere)", "Creative writing", "Public speaking and debate", "Basic web design (HTML/CSS)",
