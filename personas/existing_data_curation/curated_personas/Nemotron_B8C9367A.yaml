  hobbies: '["Sketching and drawing", "Photography", "Attending indie concerts", "Café hopping and journaling", "Reading speculative fiction", "Improv theater", "Hiking in the Finger Lakes region", "DIY
    crafting (resin art, jewelry)"]'
  career_goals: Ashlyn intends to pursue a Bachelor of Fine Arts or a degree in Media Studies at a liberal arts college where she can explore interdisciplinary art forms. She aims to develop a freelance
    portfolio that blends illustration, photography, and digital content creation, eventually securing a role as a senior visual designer for a forward-thinking agency or starting her own creative studio.
    She values flexible work environments and hopes to travel to artistic hubs to gather fresh inspiration.
