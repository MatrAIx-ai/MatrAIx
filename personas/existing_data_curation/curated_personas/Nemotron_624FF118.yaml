  hobbies: '[''Watercolor painting'', ''Reading speculative fiction and philosophy'', ''Gardening'', ''Cooking Mexican cuisine'', ''Senior trivia competitions'', ''Volunteer storytelling at the library'',
    ''Walking along the Yakima River'']'
  career_goals: Maria aims to be honored as a senior safety champion by the Yakima County School District and to formalize a mentorship program that pairs veteran drivers with newcomers. She also seeks
    to lead a community arts initiative that showcases the blend of Mexican and Pacific Northwest cultural motifs, and hopes to publish a short memoir that intertwines her experiences on the bus routes
    with stories of her heritage and the evolving landscape of rural Washington.
