personas:
  professional: Dominick Song, a 17-year-old aspiring automotive-tech apprentice and budding IT specialist, channels their meticulous project-planning skills into weekend car upgrades and custom PC builds
    while polishing basic Python scripts to automate diagnostics, all driven by a disciplined work ethic and a high-standard mindset that they uphold with precision.
  sports: Dominick Song, a 17-year-old Texas teen, follows the Dallas Cowboys and the Houston Rockets, plays pick-up basketball at the local community center, participates in a weekend karting league for
    automotive thrills, and keeps a disciplined workout schedule that balances strength training with cardio, yet they occasionally skip leg day when a new car project demands extra time.
  arts: Dominick Song, a 17-year-old enthusiast of classic rock and country, regularly streams Lynyrd Skynyrd, ZZ Top, and George Strait, attends occasional live shows at the local venue, creates custom
    car-themed playlists, and collects vintage car-related artwork, while they admit to procrastinating on learning to play guitar despite a strong desire to jam with friends.
  travel: Dominick Song, a 17-year-old adventure-seeking teen, plans road trips from Austin to Detroit to attend the North American International Auto Show, dreams of a weekend hike in Big Bend National
    Park, and prefers budgeting travel through a mix of saved allowance and occasional family rideshare, yet they often postpone trips when a new car modification project looms.
  culinary: Dominick Song, a 17-year-old who loves Texas barbecue, regularly grills smoked brisket, chicken-fried steak, and homemade mac and cheese, enjoys experimenting with rubs that include paprika
    and brown sugar, but they admit to a limited dessert repertoire and a habit of over-salting sauces when exhausted after late-night garage work.
  core: Dominick Song is a disciplined teen tinkerer who merges car mods, tech projects, and classic rock into a structured, achievement-driven lifestyle, all while they juggle a meticulous budget and a
    habit of late-night snack cravings.
background:
  cultural: Dominick was raised in suburban Dallas, Texas, within a predominantly white, middle‑class environment that blends traditional Texan values of independence, self‑reliance, and community service
    with broader mainstream American culture. His upbringing exposed him to regional customs such as high school football gatherings, country and classic rock music, and a pragmatic work ethic emphasized
    in the local community. These cultural influences shape his practical outlook, collaborative spirit, and respect for both established methods and innovative ideas.
attributes:
