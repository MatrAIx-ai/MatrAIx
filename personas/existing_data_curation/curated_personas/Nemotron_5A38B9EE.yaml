    music'', ''Community volunteer work (park clean‑ups, food‑bank drives)'']'
  career_goals: Dominick aims to earn his GED within the next year and pursue an apprenticeship in automotive technology, while simultaneously exploring a path toward an associate degree in information
    technology at a local community college. He aspires to achieve industry certifications—such as ASE for automotive service and CompTIA A+ for IT—and ultimately launch a boutique custom car modification
    shop that integrates advanced electronics and smart‑device integration. His long‑term ambition is to become a recognized specialist who blends hands‑on craftsmanship with modern tech solutions, leveraging
    his high standards and disciplined work ethic.
