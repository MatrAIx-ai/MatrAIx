  career_goals: Colleen dreams of turning her love for art and storytelling into a career as a multimedia illustrator and children's book author. She envisions creating vibrant picture books that blend
    her drawings with engaging narratives. She also aspires to study graphic design or animation in college, hoping to work in a creative studio where she can collaborate with diverse teams. Inspired by
    her community, she hopes to design youth art programs in Lebanon, fostering creativity in other kids. While she worries about balancing her imaginative pursuits with practical responsibilities, she
    is determined to develop the discipline needed to succeed.
