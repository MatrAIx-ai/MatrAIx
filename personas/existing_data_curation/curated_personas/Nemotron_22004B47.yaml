personas:
  professional: An aspiring comic artist and storyteller, Colleen Watts combines vibrant watercolors, digital sketching, and a knack for dramatic performance to craft whimsical narratives, yet often leaves
    her sketchbook pages disorganized as she jumps from one creative project to the next; they thrive on spontaneous collaboration with their drama club friends.
  sports: An energetic member of the County Fairville Youth Soccer Team and a regular rider with the local Trail Blazers Bike Club, Colleen Watts balances afternoon soccer drills with weekend bike rides
    along the Pine Ridge Trail, and they cheer as a fan of the state’s professional basketball team, the River City Raptors.
  arts: A budding visual storyteller, Colleen Watts draws inspiration from the watercolor palettes of Georgia O'Keeffe, the digital fluidity of Procreate, and the narrative pacing of Rebecca Sugar’s Steven
    Universe comics, while crooning to pop icons like Taylor Swift during piano practice and performing in school drama productions that mirror the whimsical charm of Studio Ghibli films, and they relish
    blending these influences into original comic strips.
  travel: An enthusiastic explorer, Colleen Watts has trekked the misty trails of Redwood State Park, camped on a family weekend trip to Yellowstone, and dreams together with friends to visit the animated
    streets of Tokyo’s Akihabara district, opting for spontaneous road trips over meticulously planned itineraries because they love the freedom of surprise.
  culinary: A self‑proclaimed snack connoisseur, Colleen Watts adores building cheesy pepperoni pizza slices, crafting strawberry‑banana smoothies with fresh berries, and experimenting with quick watercolor‑inspired
    cupcakes topped with pastel frosting, though they often forget to clean up the kitchen after their snack‑making marathons.
  core: Colleen Watts is a 12‑year‑old imagination powerhouse who juggles sketchbooks, soccer balls, and anxiety in equal measure, thriving on spontaneous art bursts while they occasionally misplace their
    allowance and let worry linger before the lights go up.
background:
  cultural: Colleen grows up in Lebanon, a small town in Boone County, Indiana, where Midwestern values of community, modesty, and friendliness are prominent. Her family is middle-class, with strong ties
    to local churches and school activities. The town's calendar revolves around school sports, the annual county fair, and community gatherings, which give her many opportunities to socialize and volunteer.
    While the local culture emphasizes practicality and straightforwardness, Colleen's home encourages curiosity and artistic expression, exposing her to music lessons, art supplies, and library visits.
    This blend of supportive community and creative encouragement shapes her outlook, fostering both a love for collaboration and a desire to explore ideas beyond her hometown.
