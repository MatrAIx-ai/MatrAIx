  career_goals: Looking ahead, Jennifer aims to build a stable, caring career that leverages her practical abilities and her desire to help others. She plans to enroll in a Certified Nursing Assistant (CNA)
    certification program at a nearby community college within the next six months, complete the training, and secure a part-time position at the local nursing home to gain hands-on experience. After gaining
    confidence in patient care, she hopes to pursue an associate's degree in nursing or health sciences, ultimately working toward a registered nursing license. In the meantime, she also considers part-time
    roles in a medical office or a community health clinic that would allow her to stay close to her family in Council Bluffs while developing professional skills and financial independence.
