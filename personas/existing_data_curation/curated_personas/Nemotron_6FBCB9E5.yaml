personas:
  professional: Jennifer Allard, a 24‑year‑old aspiring certified nursing assistant, blends her practical DIY confidence and empathetic listening skills honed at the animal shelter to excel in patient care
    while meticulously organizing shift schedules and medication charts, all while quietly battling the occasional worry that they might miss a detail.
  sports: Jennifer Allard, an avid weekend hiker on the Missouri River trail, volunteers as a dog‑walker with the local animal shelter, proudly roots for the Omaha Storm Chasers and the Kansas City Chiefs,
    and participates in a community 5K run each spring to stay active while preferring the solitude of nature over crowded gyms.
  arts: Jennifer Allard, a quiet literary devotee, spends evenings devouring Haruki Murakami and Jane Austen while sipping chamomile tea, knits scarves to the soft strums of Sufjan Stevens and the raw poetry
    of Leonard Cohen, and occasionally helps backstage at the local community theater, finding comfort in the gentle cadence of classic and indie art.
  travel: Jennifer Allard, who prefers low‑key road trips, has explored the Badlands and the Black Hills on weekend getaways, dreams of a spring pilgrimage to Japan’s tea gardens and Kyoto’s historic temples,
    and enjoys occasional visits to Chicago’s museums, always planning trips around budget constraints and the need for quiet reflection.
  culinary: Jennifer Allard, a competent home cook, often blends fresh basil, rosemary, and thyme from their garden into family‑favorite chicken pot pie, experiments with sourdough starter for crusty loaves,
    bakes cinnamon‑swirl coffee cake for friends, and treats themselves to aromatic jasmine tea after a successful batch of homemade granola bars.
  core: Jennifer Allard, a pragmatic introvert with a habit of over‑thinking, channels curiosity into careful caregiving, tight budgeting, and solitary creativity while quietly battling worry and occasional
    impulsive splurges.
background:
  cultural: Jennifer is a white Midwestern American raised in Council Bluffs, Iowa, a small river-front community with strong ties to agriculture and local industry. Her family comes from a working-class
    background, valuing modesty, self-reliance, and community support. She grew up attending a local public high school, participating in community events such as the county fair and church gatherings,
    which fostered a sense of neighborliness and collective responsibility. While she respects traditional Midwestern values of hard work and humility, she is also open to new ideas, reflecting the region's
    gradual embrace of diverse perspectives and digital connectivity.
