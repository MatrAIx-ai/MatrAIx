  hobbies: '[''Visiting art museums'', ''Watercolor painting'', ''Digital illustration'', ''Urban photography'', ''Live jazz concerts'', ''Experimental cooking'', ''Reading science‑fiction and tech literature'',
    ''Volunteering for tech‑literacy workshops'', ''Community gardening'', ''Traveling to art galleries and tech conferences'']'
  career_goals: Looking ahead, Joan aims to leverage her depth of technical knowledge and her sociable, talk‑driven style to become a senior IT consultant focused on digital equity in Philadelphia. She
    plans to design and lead community‑based tech‑literacy programs that merge her love for art and technology, offering workshops on digital media creation for seniors and underserved youth. Joan also
    aspires to mentor the next generation of support specialists, formalizing a mentorship curriculum at her organization and serving as an adjunct lecturer at a local community college. Long‑term, she
    hopes to author a guidebook on best practices in technical support that emphasizes organized documentation and user‑centric communication, and to partner with local nonprofits to create sustainable
    technology outreach initiatives. Her ambition balances personal achievement with a desire to give back, reflecting both her disciplined drive and her compassionate, assertive nature.
