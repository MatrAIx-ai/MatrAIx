    ''Data entry and record keeping'', ''Organizational discipline'']'
  hobbies: '[''Morning workouts (weight‑lifting & cardio)'', ''Off‑road driving on desert trails'', ''Watching Mexican soccer (Liga MX)'', ''Listening to corridos and rock music'', ''Cooking family recipes
    (tacos al pastor, salsa)'', ''Documenting workouts and recipes in a journal'', ''Restoring vintage automotive parts'']'
  career_goals: Eugenio aims to secure a Commercial Driver’s License with advanced endorsements within the next year and complete his associate’s degree in logistics or business administration. He plans
    to advance to a supervisory role, such as fleet manager, where he can apply his competitive drive to improve efficiency metrics and lead a high‑performing team. Long‑term, he aspires to launch his own
    cross‑border trucking company that emphasizes technology‑driven route planning and reliable service for small Mexican‑American businesses. He is motivated by measurable performance targets, seeks to
    rank among the top drivers in his company, and intends to reinvest earnings into professional certifications and a modest fleet of trucks.
