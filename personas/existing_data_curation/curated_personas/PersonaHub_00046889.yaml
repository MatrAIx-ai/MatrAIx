persona_description: A scientist who specializes in the study of geology and oceanography. Their expertise lies in the exploration and analysis of the deep ocean floor, including the detection and mapping
  of natural gas and fossil oil reserves. They are particularly interested in the potential for new land formations to be formed in response to tectonic activity, and the implications of this for resource
  extraction and population settlement. They are also knowledgeable about the challenges of developing sustainable agriculture and food production on a new land mass, and the potential for conflict and
  resource competition with existing nations.
