personas:
  professional: Stephanie Rangel is a budding junior community organizer who volunteers at a youth center, using her natural charisma and love for collaborative projects to coordinate arts‑and‑crafts workshops
    and lead spontaneous dance sessions for peers.
  sports: Stephanie Rangel follows the Miami Heat and the Miami Marlins on TV, plays beach volleyball with friends at South Beach, and occasionally joins a local youth soccer club that practices on weekends,
    favoring spontaneous pick‑up games over structured league schedules.
  arts: Stephanie Rangel mixes her love of drawing cartoons with listening to classic Latin swing legends like Celia Cruz and contemporary pop icons such as Billie Eilish, often re‑creating favorite scenes
    in sketchbooks while humming along to the beats.
  travel: Stephanie Rangel dreams of exploring Key Biscayne’s shoreline, visiting New York City’s Broadway theaters, and traveling to Barcelona to see its famous mosaics, but prefers short weekend road
    trips with friends over long‑haul planning.
  culinary: Stephanie Rangel enjoys experimenting in the kitchen by baking pastelitos filled with guava and cheese, frying crispy empanadas with ground beef, and seasoning them with a pinch of cumin and
    cilantro, though she often forgets to clean up the kitchen afterward.
  core: Stephanie Rangel is a sociable, spontaneous 13‑year‑old who balances a love for dance, doodling, and video games with a compassionate streak that fuels her volunteer work, yet she sometimes lets
    disorganization and occasional skin woes derail her plans.
background:
  cultural: Stephanie grew up in a bilingual Cuban-American household in Miami's Little Havana neighborhood. At home, Spanish is spoken alongside English, and family gatherings often revolve around traditional
    dishes like ropa vieja, black beans and rice, and sweet pastelitos. She celebrates cultural holidays such as Cuban Independence Day and participates in the annual Calle Ocho festival, where music, dance,
    and community pride come to life. Her parents' immigrant experience and the vibrant Caribbean influences of her community shape her identity, fostering a strong sense of family responsibility, love
    for rhythm and food, and a desire to give back to the local Cuban diaspora.
attributes:
  skills: '[''Empathetic listening and peer support'', ''Public speaking and group facilitation'', ''Conflict mediation'', ''Digital content creation'', ''Basic cooking and family recipes'', ''Bilingual
