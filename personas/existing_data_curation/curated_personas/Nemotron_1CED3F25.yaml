  hobbies: '[''Salsa and reggaeton dancing'', ''Listening to Cuban and pop music'', ''Drawing and cartoon illustration'', ''Creative writing and short story crafting'', ''Baking and cooking family recipes'',
    ''Beach outings and swimming'', ''Playing video games with friends'', ''Volunteering at community youth center'', ''Participating in school theater or drama club'']'
  career_goals: Stephanie dreams of turning her love for helping others into a future career. She hopes to become a community-focused professional, such as a teacher, youth counselor, or social worker,
    who can create safe spaces for kids in Miami's diverse neighborhoods. She prefers roles that allow her to interact directly with people and adapt to evolving needs. In the short term, she aims to take
    on leadership roles in her school, like student council president, and volunteer regularly at the local community center. In college, she plans to study education or social work, with the long-term
    ambition of launching outreach programs that celebrate Cuban-American culture and promote peer mentorship.
