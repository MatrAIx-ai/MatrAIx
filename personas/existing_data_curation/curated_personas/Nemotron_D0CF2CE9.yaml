    ''Fishing tournaments'']'
  career_goals: Approaching retirement, Thomas aims to transition from frontline firefighting to a mentorship and advocacy role. He aspires to become a senior fire‑safety consultant for Cedar County, developing
    flexible, community‑driven fire‑prevention strategies that incorporate new technologies such as drone surveillance and predictive risk modeling. He also hopes to establish a local mental‑health peer‑support
    program for firefighters, leveraging his own experience with anxiety to improve emotional resilience among his colleagues. On a personal level, Thomas wishes to gain recognition for his contributions
    to both public safety and community arts, perhaps by curating a traveling exhibition that blends fire‑service history with regional folk art.
