  hobbies: '[''visiting museums and historic sites'', ''debate club participation'', ''soccer'', ''reading classic literature'', ''photography'', ''volunteering at community events'', ''traveling to historical
    destinations'', ''playing acoustic guitar'']'
  career_goals: Victor aims to build a career that leverages his humanities background and his talent for organized, people‑focused work. He plans to pursue a master’s degree in public policy or international
    relations and eventually secure a role as a program coordinator or policy analyst within a government agency, think‑tank, or cultural nonprofit in Washington, D.C. His long‑term ambition is to design
    and manage community‑engagement initiatives that promote cultural heritage and civic participation, while maintaining a clear, structured workflow and measurable outcomes.
