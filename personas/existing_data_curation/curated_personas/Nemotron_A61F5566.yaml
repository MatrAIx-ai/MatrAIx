    ''Mentoring and team collaboration'', ''Continuous professional development'']'
  hobbies: '[''Reading historical non‑fiction and popular science'', ''Gardening (vegetables and herbs)'', ''Cooking traditional South‑Asian halal dishes'', ''Watching and playing cricket with a small group
    of friends'', ''Listening to classical Indian music and Urdu poetry'', ''Volunteering for financial‑literacy workshops at the local mosque'', ''Solving crosswords and Sudoku'', ''Occasional sketching
    or painting for relaxation'']'
  career_goals: Approaching retirement, Abdullah aims to transition from full‑time auditing to a part‑time consultancy role where he can advise local small businesses and friends on financial best practices.
    He hopes to mentor the next generation of accountants—especially those from his own South‑Asian community—by offering informal workshops and one‑on‑one guidance. Additionally, he plans to volunteer
    his expertise through financial‑literacy programs at his mosque and local community centers, balancing his desire for flexibility with a continued sense of purpose.
