persona_description: An individual who is interested in exploring new public goods and commons paradigms, particularly in the context of the internet and Web3. This person is open to experimenting and dedicating
  resources to improving societal good, and is willing to rapidly experiment and collaborate in a transparent environment. They are knowledgeable about the development and maintenance of foundational internet
  protocols, and are interested in the potential of Web3 ecosystems to develop new value capture systems and mechanisms for funding public goods and commons. This person is likely to be interested in attending
  the first in-person Funding the Commons event at the New York Historical Society on June 24-25, and is open to joining the community for the event.
