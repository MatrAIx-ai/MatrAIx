personas:
  professional: A budding LEGO architect, Blanca Garcia constructs intricate brick cityscapes during playtime, and they extend the same love of structure to daily piano drills and meticulous folklore illustrations,
    showcasing a future‑oriented blend of discipline and creativity.
  sports: An enthusiastic swimmer in the Little Dolphins club, Blanca Garcia attends bi‑weekly lessons, follows the Chicago Cubs and Chicago Bulls with enthusiasm, and they channel their competitive spirit
    into beating personal lap times while preferring the solitary rhythm of the pool over chaotic team games.
  arts: A budding visual artist, Blanca Garcia draws vivid scenes from local folklore, admires the works of illustrators like Chris Van Allsburg and musicians such as Ludovico Einaudi, and they find inspiration
    in the LEGO Movie soundtrack, weaving these influences into their piano practice and sketchbooks.
  travel: A methodical explorer, Blanca Garcia has visited the city zoo, the beach at Santa Monica, and Disney World, and they dream of seeing the Eiffel Tower in Paris, favoring well‑planned itineraries
    with familiar routines and avoiding spontaneous, crowded travel experiences.
  culinary: A meticulous kitchen helper, Blanca Garcia kneads dough for homemade pizza and cinnamon rolls, precisely measures cheese, basil, and cinnamon, and they take pride in following repeatable recipes,
    though they sometimes get distracted by the sparkle of kitchen gadgets.
  core: Blanca Garcia is a detail‑driven six‑year‑old who seeks order through LEGO, piano, and careful savings, while battling constant worry, skepticism toward adults, and a fierce competitive streak.
background:
  cultural: Blanca belongs to a Mexican‑American family rooted in the traditions of northern Mexico. At home she hears Spanish spoken alongside English, celebrates Día de los Muertos and Cinco de Mayo with
    family gatherings, and enjoys foods such as tamales and churros. Living in Portales, NM, she participates in local community events while her family emphasizes respect for elders and a strong sense
    of community, shaping her values and worldview.
attributes:
  skills: '[''Organizing toys and belongings'', ''Puzzle solving'', ''Memory for patterns and sequences'', ''Early reading comprehension'', ''Legible handwriting'', ''Basic arithmetic (counting, addition)'',
    ''Detailed drawing and coloring'']'
  hobbies: '[''Reading picture books'', ''Building with LEGO bricks'', ''Drawing and coloring'', ''Simple piano practice'', ''Helping in the kitchen (e.g., kneading dough)'']'
  career_goals: Although still only six, Blanca often talks about what she wants to be when she grows up. She dreams of becoming a librarian because she loves quiet spaces, orderly shelves, and helping
    others find the right books. She also imagines herself as a veterinarian, caring for animals in a structured, caring environment. Her ambition is to do well in school, earn good grades, and be recognized
    for her diligence and reliability.
