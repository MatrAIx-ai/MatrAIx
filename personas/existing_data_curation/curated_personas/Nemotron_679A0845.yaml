  hobbies: '["Sketching cityscapes", "Lake Michigan photography", "Basketball", "Indie video games", "Sci‑fi and fantasy reading", "Eclectic music listening", "Attending local art festivals", "Robotics
    club", "Creative writing"]'
  career_goals: Oscar aspires to combine his love for art and technology. He dreams of attending a specialized arts high school and eventually earning a degree in visual communications or interactive media.
    His long‑term goal is to become a multimedia designer or video game developer, creating immersive visual experiences. He also hopes to contribute to community art projects in North Chicago and mentor
    younger kids through creative workshops and after‑school programs.
