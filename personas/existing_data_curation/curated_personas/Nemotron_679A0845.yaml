personas:
  professional: Oscar Linn, an aspiring robotics engineer and visual storyteller, merges methodical planning with boundless curiosity by designing autonomous lake‑front drones that capture panoramic cityscapes,
    thriving in the school robotics club and eagerly sharing progress on online maker forums.
  sports: Oscar Linn, a passionate basketball player on the North Chicago Middle School team, practices at the community center three times a week, follows the Chicago Bulls and Chicago White Sox, and they
    mix structured drills with spontaneous street‑ball games to stay fit and maintain a strong sense of teamwork.
  arts: Oscar Linn, an avid sketcher and museum enthusiast, draws inspiration from Edward Hopper’s cityscapes, the vibrant murals of Chicago’s Wabash Arts Corridor, and the indie folk sounds of Bon Iver
    and Sufjan Stevens, and they often swap notes with peers after Art Institute exhibitions while experimenting with mixed‑media collages.
  travel: Oscar Linn, an enthusiastic traveler who loves weekend road trips to Milwaukee’s lakefront breweries and annual family visits to Lake Geneva, dreams of exploring Copenhagen’s historic canals and
    Tokyo’s neon districts, and they prefer carefully planned itineraries over spontaneous getaways due to school constraints.
  culinary: Oscar Linn, a budding home chef, prefers crafting deep‑dish pizza topped with smoked mozzarella and caramelized onions, experiments with sushi rolls featuring tuna and avocado, relishes Thanksgiving
    turkey with cranberry sauce, and they often cook alongside their parents while listening to classic rock playlists.
  core: Oscar Linn, a curious and organized teen who balances a love for city‑scape sketching, basketball, and indie storytelling with occasional midnight gaming sessions, navigates life with a blend of
    Midwestern community values and a flair for creative experimentation, and they consistently seek new ways to merge art and technology.
background:
  cultural: Oscar was raised in a white, middle‑class family in North Chicago, Illinois. His family traces its roots to German and Scandinavian immigrants, which brings a modest Midwestern sensibility and
    an appreciation for community traditions such as Thanksgiving, Christmas, and local neighborhood gatherings. Growing up near Chicago's lakefront, he has been exposed to the city's vibrant multicultural
    arts scene, from murals and street performances to museum exhibitions. He frequently visits the Art Institute of Chicago with his family and takes part in community center programs that emphasize creativity,
    inclusion, and civic engagement.
attributes:
  skills: '["Digital illustration", "Basic Python programming", "Project planning and time management", "Public speaking", "Team sports (basketball)", "Creative writing (short stories, poetry)", "Graphic
