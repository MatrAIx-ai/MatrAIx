personas:
  professional: Diana Valdez is a budding soccer enthusiast who channels her inquisitive and organized nature into creating comic-style match recaps for her youth league’s bulletin, dreaming of becoming
    a sports journalist, and they eagerly share their sketches with teammates.
  sports: Diana Valdez bolts around the field on her local youth soccer team, the Houston Dynamo Jr. Club, cheers for the Houston Astros during baseball season, and models her fitness routine after the
    training drills of the Houston Rockets, balancing playful games with disciplined warm-ups.
  arts: Diana Valdez draws comic-style characters while listening to Selena’s cumbia hits and Taylor Swift’s pop anthems, studies folkloric dance set to the rhythms of Lila Downs, and immerses themselves
    in adventure books by Rick Riordan and science titles by DK, letting these artistic influences shape their imaginative sketches.
  travel: Diana Valdez loves exploring Hermann Park’s nature trail with her magnifying glass, dreams of strolling through the ancient pyramids of Teotihuacan, hopes to experience Disney World’s magical
    rides, and plans each trip with a hand-drawn map and a modest family budget.
  culinary: Diana Valdez helps roll masa for tamales and stir pozole broth, proudly claims their guacamole beats the store-bought version, occasionally swaps LEGO bricks for a slice of cheesy pizza, and
    enjoys the bright flavors of cilantro, lime, and jalapeño in their kitchen experiments.
  core: Diana Valdez is a curious nine-year-old who juggles soccer, LEGO engineering, and sketching, yet often worries about missing a goal or forgetting their inhaler, turning boundless energy into organized
    bursts of creativity.
background:
  cultural: Diana grows up in a Mexican‑American household in Houston, where Spanish is spoken alongside English and family gatherings revolve around traditional celebrations such as Día de los Muertos
    and Cinco de Mayo. Her parents emphasize 'familismo'—strong family bonds and mutual support—and she often helps with cultural activities at the local community center. She attends a bilingual elementary
    school that incorporates Mexican history and customs into the curriculum, and she enjoys sharing tacos and tamales with friends at school events. The vibrant Hispanic community in Harris County provides
    her with a sense of pride and connection to her roots while also exposing her to the multicultural fabric of the city.
