  career_goals: Diana dreams of becoming a veterinarian because she loves caring for neighborhood pets and wants to understand animal health through science. She also imagines herself as a future environmental
    scientist, exploring how ecosystems in Texas parks stay healthy. Her curiosity drives her to ask many 'why' questions, while her practical side leads her to plan steps toward those careers, such as
    reading animal books and joining school science clubs. In the longer term, she hopes to help her community by combining her love for animals, science, and leadership, perhaps by volunteering at local
    shelters or leading a peer‑support group for younger kids dealing with stress.
