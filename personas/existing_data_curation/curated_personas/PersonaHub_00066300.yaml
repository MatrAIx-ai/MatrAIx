persona_description: A sedimentologist who specializes in the study of floodplain sediments and floodplain geomorphology. They are particularly interested in the formation and evolution of floodplain bedforms,
  including antidunes, and their impact on sedimentary structures and sedimentary geology. They have conducted fieldwork in a variety of fluvial environments, including small streams, rivers, and coastal
  areas, and have published research on the topic. They are also interested in the link between the formation and climate of floodplain bedforms, and have observed that floodplain bedforms are more likely
  to form in climates with extreme rainy seasons, resulting in higher flow velocity and increased ability for upper flow regime structures to form.
