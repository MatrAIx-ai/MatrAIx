    and fabrication'', ''Use of hand and power tools'']'
  hobbies: '[''Arduino projects'', ''Woodworking'', ''Home brewing'', ''Hiking in Sonoran Desert'', ''Listening to soul and hip‑hop music'', ''Strategic video gaming'', ''Casual basketball with friends'',
    ''Barbecue cooking'']'
  career_goals: Anthony aims to advance from machine setter/operator to a supervisory role within the next three years, targeting a shift supervisor or lead technician position at his plant. He plans to
    obtain certifications such as OSHA 30‑hour, NIMS Level II, and a PLC programming credential, and eventually pursue an associate degree in industrial technology to qualify for process engineering support
    roles. Long‑term, his ambition is to lead continuous‑improvement projects that boost plant productivity and safety, and eventually transition into a plant manager role where he can shape operational
    strategy.
