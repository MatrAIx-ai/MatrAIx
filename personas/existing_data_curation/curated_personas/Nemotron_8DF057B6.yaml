personas:
  professional: Charles Banks is a first-line police supervisor in Casper, Wyoming, who leverages his forensic science background, digital forensics expertise, GIS crime mapping, and calm, resilient demeanor
    to blend data-driven innovation with proven investigative protocols while mentoring at‑risk youth and championing community‑oriented policing.
  sports: Charles Banks is an avid outdoor athlete who hikes the Medicine Bow Mountains, snowmobiles on public trails, and fly‑fishes the North Platte River, while also playing weekly pickup basketball
    at the community center, supporting the Wyoming Cowboys football team, cheering the Denver Broncos, and riding with the local Wyoming Mountain Bikers Association during summer.
  arts: Charles Banks cultivates his creative side through landscape photography inspired by Ansel Adams, collects recordings of western swing legends like 'The White Buffalo', attends the annual Frontier
    Days cowboy poetry gathering, and volunteers as a chess mentor where he occasionally shares classic noir crime novels with fellow players.
  travel: Charles Banks favors rugged road‑trip adventures, planning meticulous itineraries for hiking in Yellowstone and Grand Teton, weekend getaways to Banff’s alpine lakes, and an aspirational summer
    trek across Patagonia’s Torres del Paine, always balancing his love of remote wilderness with the practical constraints of his family’s ranch responsibilities.
  culinary: Charles Banks enjoys rustic Western fare, frequently grilling bison steaks seasoned with rosemary and juniper berries, pan‑searing his own trout fillets with lemon‑caper butter, and whipping
    up hearty beans‑and‑cheese chili topped with huckleberry jam for a sweet twist, while his moderate cooking skills keep him comfortable preparing both campfire meals and occasional fine‑dining nights
    at Casper’s Mercury Cafe.
  core: Charles Banks merges a calm, community‑first mindset with a relentless curiosity, documenting every trail and crime scene in a pocket notebook and GIS app, yet often stays up late debugging drone
    firmware at the expense of a healthy sleep schedule.
background:
  cultural: Charles was raised in a multi-generational family that settled in the high plains of Wyoming in the early 20th century, with ancestry tracing back to German and English homesteaders. The frontier
    ethos of self-reliance, respect for the land, and tight-knit community values shaped his upbringing. Local traditions such as Independence Day parades, county fairs, and rodeo celebrations are central
    to his family's social life. While he identifies as secular, he grew up attending a small-town church that served as a communal gathering place, reinforcing a sense of mutual support. These cultural
    influences combine with his professional commitment to public service, giving him a deep appreciation for the balance between individual freedom and collective responsibility that defines contemporary
    Wyoming life.
