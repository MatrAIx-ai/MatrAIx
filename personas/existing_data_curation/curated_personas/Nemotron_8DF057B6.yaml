    mentoring'', ''Stargazing'', ''Attending the Casper Rodeo and county fairs'']'
  career_goals: Charles aims to progress to a mid-level command role, such as lieutenant or captain, where he can shape policy and expand specialized units. He is particularly interested in establishing
    an analytics-driven crime-prevention unit that leverages machine learning and geographic information systems to anticipate hotspots, and in integrating advanced body-camera and digital-evidence workflows
    across the department. He also plans to pursue a master's degree in Criminal Justice or Public Administration to deepen his strategic management knowledge. Beyond rank advancement, Charles is committed
    to fostering a culture of mental-health awareness, de-escalation training, and community partnership, and he hopes to mentor the next generation of officers while maintaining a balanced home life with
    his wife.
