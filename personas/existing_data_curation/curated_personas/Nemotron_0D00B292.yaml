  career_goals: Maria wishes to continue contributing her expertise while transitioning into a mentorship role, guiding younger cashiers and sharing best practices. She hopes to volunteer as an art workshop
    assistant at the local senior center, blending her love for art with community service. Additionally, she aspires to document her family's migration story and Puerto Rican culinary traditions in a small
    memoir, ensuring her cultural legacy for future generations. Maintaining her health and financial stability for a comfortable retirement remains a priority.
