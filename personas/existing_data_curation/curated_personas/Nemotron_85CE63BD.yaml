  hobbies: '["Playing soccer at the park", "Drawing and coloring", "Building with LEGO bricks", "Watching animated adventure shows", "Listening to Latin music and dancing", "Solving simple jigsaw puzzles",
    "Reading picture books in Spanish and English", "Helping prepare gallo pinto with family"]'
  career_goals: Juan dreams of becoming a professional soccer player, often imagining himself scoring the winning goal for his favorite team. He also talks about being an astronaut who explores space, and
    occasionally pretends to be a superhero who saves the day. His competitive streak pushes him to aim for the "best" in any game or activity he tries, reflecting a personal ambition to be recognized for
    his skills.
