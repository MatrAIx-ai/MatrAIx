personas:
  professional: Juan Ruiz, a four-year-old budding engineer who spends his afternoons arranging LEGO sets into precise, repeatable structures, shows early problem-solving aptitude, and approaches each build
    with a critical eye and a competitive drive to outdo his last creation.
  sports: Juan Ruiz, a member of the Little Tigers Soccer Club, dashes onto the field with a structured warm-up routine, idolizes the LA Galaxy star forward, and balances his love for soccer with a seasonal
    interest in swimming at the community pool where he competes to beat his personal lap times.
  arts: Juan Ruiz, an enthusiastic little drawer, recreates characters from Pixar's Toy Story and sings along to Raffi's Baby Beluga, using bright crayons to organize his drawings by color and shape, and
    critiques his own work with a skeptical eye before proudly displaying his favorite pieces on the fridge.
  travel: Juan Ruiz, who dreams of visiting the Grand Canyon's rugged cliffs after his family's weekend trip to the nearby beach, enjoys meticulously planning his travel adventures with colorful stickers
    on a crayon-drawn map, and balances his desire for exciting new sights with the comfort of familiar bedtime routines.
  culinary: Juan Ruiz, a picky yet surprisingly adventurous eater, loves the predictability of creamy macaroni and cheese spiced with a pinch of paprika, delights in dipping carrot sticks into hummus, and
    proudly insists on adding fresh strawberries to his yogurt for a burst of sweet texture.
  core: Juan Ruiz, a structure-loving four-year-old with a competitive streak, navigates life by turning playtime into mini-projects, budgeting his coins, and mastering his health routine while sprinkling
    in bursts of artistic and athletic flair.
background:
  cultural: Juan is raised in a bilingual Costa Rican‑American household in Tulsa, Oklahoma. At home, Spanish is spoken and Costa Rican customs are celebrated, such as enjoying gallo pinto for breakfast,
    dancing to salsa and merengue during family gatherings, and observing holidays like Día de la Independencia with festive foods and music. He attends a local preschool that incorporates multicultural
    lessons, allowing him to share his heritage with classmates. Frequent visits to community parks and participation in neighborhood events help him blend his family's traditions with the broader American
    culture, fostering a sense of belonging in both worlds.
attributes:
  skills: '["Fine motor coordination with crayons and blocks", "Counting to 20", "Early letter recognition and picture‑book reading", "Bilingual speech (Spanish/English)", "Following multi‑step routines",
