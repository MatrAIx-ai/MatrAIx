persona_description: A geologist who is fascinated by the topography and geology of Mars, specifically the differences in elevation between the northern and southern hemispheres. They are particularly interested
  in the fretted terrain, mesas, knobs, and flat-floored valleys, and have a keen eye for identifying and analyzing the features of Mars. They have studied the Mars Orbiter Laser Altimeter data and are
  familiar with the zero elevation datum for Mars, which was defined in 2001. They have a strong background in geology and have a passion for exploring the mysteries of the Martian landscape.
