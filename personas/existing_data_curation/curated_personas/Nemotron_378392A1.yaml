  career_goals: Jason aims to re‑enter the workforce in a role that leverages his creative and community‑focused strengths. Over the next two years he plans to complete a digital‑marketing certification
    and expand his freelance portfolio in graphic design and photography. He aspires to secure a position as a community arts coordinator or marketing specialist for a local nonprofit or small business
    in the Pinckney area, where he can organize workshops, promote local artists, and increase public engagement with the arts. In the longer term, he envisions opening a collaborative art space that offers
    classes, exhibitions, and mentorship programs for youth, while also taking on a leadership role that allows him to influence cultural development and economic revitalization in his hometown.
