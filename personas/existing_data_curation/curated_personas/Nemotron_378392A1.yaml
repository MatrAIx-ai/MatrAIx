personas:
  professional: Jason Mcintyre, a community‑focused creative strategist, blends event planning, graphic design, and photography to amplify local arts initiatives, leveraging their curiosity and talkative
    flair to build networks while juggling deadlines with a flexible, sometimes over‑committed, schedule.
  sports: Jason Mcintyre, an avid supporter of the Michigan Wolverines, hikes the Pinckney State Recreation Area monthly, kayaks on Kent Lake on weekends, and plays pickup soccer with the local “Pinckney
    United” league, but their busy schedule often leads to skipped gym days and reliance on the occasional run to the trailhead for cardio.
  arts: Jason Mcintyre, a watercolor enthusiast and digital illustrator, frequents the Ann Arbor Art Museum and indie film screenings, draws inspiration from artists like Yayoi Kusama and photographers
    like Ansel Adams, strums guitar at open‑mic nights, and regularly performs improv with the Pinckney Improv Collective, while occasionally procrastinating on finishing personal art projects.
  travel: Jason Mcintyre, a weekend‑road‑trip aficionado, has explored the Upper Peninsula’s Pictured Rocks, spent a long weekend in Chicago’s art districts, dreams of photographing Kyoto’s temples, and
    plans future trips to Florence for Renaissance art, all while balancing travel‑budget constraints with a desire for spontaneous cultural immersion.
  culinary: Jason Mcintyre, a home‑cooking enthusiast, loves preparing Michigan‑inspired dishes such as cherry‑glazed pork tenderloin, beet and goat‑cheese salad, and a creamy wild‑rice risotto, experimenting
    with global flavors like Thai green curry, and often hosts dinner gatherings where they over‑season dishes while juggling an indie‑folk playlist.
  core: Jason Mcintyre, a sociable creative at 28, weaves community, art, and curiosity into a vibrant, if occasionally over‑committed, life marked by spontaneous music sessions, budget‑tuned finances,
    and a penchant for hiking, cooking, and dreaming of international art pilgrimages.
background:
  cultural: Jason was raised in Pinckney, a small Midwestern town in Livingston County, Michigan, within a predominantly white, middle‑class community. His upbringing emphasized hard work, modesty, and
    strong community ties. Family life centered around holiday meals, church gatherings, and local fairs, reflecting a Protestant (United Methodist) cultural environment that valued service and fellowship.
    The town’s proximity to Detroit exposed him to a mix of urban cultural influences, such as diverse music and contemporary art scenes, while his hometown retained a sense of small‑town solidarity, love
    of the outdoors, and appreciation for regional traditions like county fairs and high school sports. These cultural roots have fostered his collaborative spirit, his appreciation for community arts,
    and his desire to blend traditional Midwest values with modern creative expression.
