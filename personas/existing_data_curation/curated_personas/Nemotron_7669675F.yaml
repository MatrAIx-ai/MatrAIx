  hobbies: '[''Zumba Dance Classes'', ''Cooking Mexican Cuisine'', ''Volunteering at Community Centers'', ''Participating in Cultural Festivals'', ''Gardening'', ''Hiking in the Riverside Mountains'', ''Embroidery
    and Papel Picado Crafting'', ''Reading Self-Help and Personal Development Books'', ''Journaling'', ''Yoga and Mindfulness Practices'']'
  career_goals: Ana aims to transition into a professional role that leverages her organizational talent and community spirit. She plans to pursue a certification in Project Management or Community Health
    Work to qualify for a community outreach coordinator position at a local non-profit serving the Mexican-American population. In the medium term, she wants to lead the planning and execution of cultural
    festivals and health education events, becoming a recognized advocate for culturally responsive services. Long-term, Ana aspires to launch her own event-planning business focused on celebrating Mexican
    heritage while maintaining a balanced, stress-managed lifestyle.
