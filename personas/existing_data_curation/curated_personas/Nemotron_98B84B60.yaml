  career_goals: Gloria aims to advance to a regional sales director role within the next five years, positioning her team among the top five percent of national performers. She intends to design an award‑winning
    sales‑training curriculum that becomes a model for the organization, and to lead a cross‑functional strategic planning unit that leverages data analytics to optimize market expansion. Long‑term, she
    envisions transitioning into a senior consulting capacity focused on sales operations efficiency, while mentoring the next generation of Mexican‑American women in STEM and sales leadership.
