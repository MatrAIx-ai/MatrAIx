persona_description: A person who is interested in learning and understanding statistics, particularly in the field of psychology and sociology. They are likely to be curious about the correlation-causation
  fallacy, post hoc fallacy, bandwagon fallacy, and the other logical fallacies mentioned in the text. They may also be interested in cognitive biases, confirmation bias, and the bias blind spot. They appreciate
  the WikiPremed MCAT Course and are familiar with its policies on Privacy, Shipping & Returns, and Contact Us. They are aware of the limitations of the WikiPremed Course and its relationship to the Association
  of American Medical Colleges. They are also aware of the Creative Commons Attribution NonCommercial ShareAlike License and the use of GNU General Public License works.
