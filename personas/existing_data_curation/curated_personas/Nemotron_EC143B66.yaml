  career_goals: Norma aims to step into a senior leadership role, such as Director of Events for a major corporation or conference center, where she can shape strategic direction and champion innovative
    hybrid formats. She also envisions launching her own boutique consultancy that specializes in environmentally sustainable and inclusive events for non‑profits and cultural organizations. Mentorship
    is a core ambition—she plans to develop a local training program to guide emerging planners, especially women in the industry. Over the next five years, Norma seeks industry recognition through awards
    from professional bodies like the International Live Events Association, while preserving a balanced lifestyle that allows more quality time with her family.
