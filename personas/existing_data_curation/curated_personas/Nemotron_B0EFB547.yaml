personas:
  professional: Jashley Fickling, a seasoned arcade machine technician with three decades of hands‑on expertise in mechanical diagnostics, electrical troubleshooting, and preventative maintenance, blends
    curious exploration of new gaming tech with a practical, organized approach, and now channels that know‑how into mentorship and community consultancy, confidently guiding aspiring technicians while
    preserving proven repair traditions.
  sports: Jashley Fickling, an enthusiastic fan of the Sacramento Kings and a regular participant in a senior bowling league, channels their love of movement into weekly ballroom dancing classes and seasonal
    gardening work, balancing low‑impact fitness with community sports socials.
  arts: Jashley Fickling finds creative fulfillment in the soulful harmonies of gospel choirs, the pixel art of classic arcade cabinets designed by Shigeru Miyamoto, and the evocative paintings of Jacob
    Lawrence, while also curating a growing collection of vintage arcade memorabilia that fuels their appreciation for retro gaming culture.
  travel: Jashley Fickling prefers purposeful travel that blends cultural immersion with relaxation, having explored the historic streets of New Orleans during Mardi Gras, hiked the Grand Canyon’s South
    Rim, and savored the islands of Maui, and now dreams of visiting Savannah’s historic district to study its preservation tours.
  culinary: Jashley Fickling, an accomplished home cook, excels at preparing soul‑food classics such as collard greens simmered with smoked turkey, sweet potato pie, and cornbread, while also experimenting
    with fresh garden produce like heirloom tomatoes and zucchini, often sharing dishes at neighborhood block parties and senior center potlucks.
  core: Jashley Fickling blends a calm, resilient mindset with a lively social spirit, mentoring future arcade technicians, dancing through block parties, and meticulously tending both vintage machines
    and a community garden, all while keeping an eye on retirement savings and health.
background:
  cultural: Jashley grew up in California's Central Valley during the civil‑rights era, shaped by a close‑knit African‑American community that emphasized resilience, mutual support, and faith. Her family
    was active in a historically Black church where gospel music, storytelling, and community service were central to daily life. Family gatherings featured soul‑food cooking and the sharing of oral histories
    that instilled a strong sense of identity and responsibility. This cultural heritage informs her commitment to mentoring younger Black technicians, her participation in local cultural festivals, and
    her ongoing involvement in church outreach programs.
attributes:
  skills: '[''Mechanical repair of coin-operated machines'', ''Electrical diagnostics and circuit troubleshooting'', ''Preventative maintenance scheduling'', ''Calibration of payout and token mechanisms'',
    ''Inventory management of spare parts'', ''Customer service and technical communication'', ''Training and mentorship of junior technicians'', ''Knowledge of compliance standards for amusement equipment'']'
  hobbies: '[''Ballroom dancing'', ''Community gardening'', ''Collecting vintage arcade memorabilia'', ''Attending local historical tours'', ''Cooking soul-food recipes'', ''Reading historical fiction'',
    ''Volunteering at the senior center'', ''Participating in neighborhood block parties'']'
  career_goals: Jashley aims to transition from daily repairs to a mentorship and consultancy role. She plans to establish a small workshop that trains the next generation of technicians, with a focus on
    attracting women and minorities. She also hopes to partner with local community centers to provide affordable maintenance programs for small arcade venues and to develop accessible modifications for
    machines so they can be used by people with disabilities. Over the next few years she wants to be recognized as a trusted regional consultant while ensuring a stable retirement income and giving back
    to her community.
