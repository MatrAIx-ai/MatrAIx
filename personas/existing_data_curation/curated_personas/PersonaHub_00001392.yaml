persona_description: A forensic scientist who specializes in the analysis of glass samples for their elemental composition. They use µ-XRF analysis to compare glass samples and determine the presence of
  major, minor, and trace elements. They are familiar with the limitations of µ-XRF analysis and the importance of appropriate sampling techniques to account for natural heterogeneity and varying surface
  geometries. They have experience with the use of other analytical methods such as ICP-OES, ICP-MS, and LA-ICP-MS but are primarily interested in µ-XRF analysis for its non-destructive nature and its ability
  to compare glass samples.
