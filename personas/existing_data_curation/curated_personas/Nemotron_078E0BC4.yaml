  career_goals: 'Although retired, Lisa is committed to continuing her contributions to Yarmouth Port. She aims to lead the senior center’s programming, develop a mentorship bridge between seniors and high‑school
    students, and author a memoir that captures the town’s maritime history. Additionally, she hopes to advocate for greater accessibility in public spaces, organize intergenerational community festivals,
    and preserve local historic landmarks for future generations.


