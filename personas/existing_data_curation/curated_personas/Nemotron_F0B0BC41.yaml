  career_goals: Missey aims to transition into a senior advisory role where she can shape nursing policies and mentor the next generation of nurses in her community. She plans to earn a Certified Nurse
    Manager (CNM) credential to solidify her leadership presence and to champion structured, evidence‑based practice standards at her hospital. At the same time, she is negotiating a phased retirement that
    guarantees a predictable schedule, allowing her to maintain a steady income while dedicating more time to volunteer health education and family commitments.
