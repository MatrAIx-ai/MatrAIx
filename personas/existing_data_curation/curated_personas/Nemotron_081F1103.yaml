personas:
  professional: David Harris, an 18-year-old junior facilities supervisor at a local property management firm, leverages their detail-oriented routine, competitive drive, and hands-on cleaning expertise
    to streamline shift schedules, enforce OSHA safety, and coach new crew members, while constantly worrying about meeting performance benchmarks.
  sports: David Harris plays pickup basketball at the community center, lifts weights at the local gym, spikes in a weekend volleyball league with the Catskill Cyclones, follows the New York Knicks and
    the New York Mets, and hikes the Catskill foothills each Saturday to balance competitive intensity with outdoor calm.
  arts: David Harris frequently catches live shows by up-and-coming rock acts like The Midnight Howlers, queues for Foo Fighters and Green Day tickets, curates a personal playlist of high-energy tracks
    for gaming sessions, and occasionally tries their hand at amateur guitar riffs during downtime.
  travel: David Harris favors short, budget-friendly road trips to nearby natural spots like the Catskills and the Hudson Valley, plans each outing using Google Maps and a spreadsheet, yearns to backpack
    through the Canadian Rockies after graduation, but currently balances travel with a part-time job and college prep.
  culinary: David Harris enjoys high-protein meals such as grilled chicken breast with quinoa, loves pepperoni pizza and buffalo wings from the local sports bar, can whip up a quick protein pancake for
    post-gym fuel, and tends to skip meals when caught up in a gaming marathon.
  core: David Harris is a routine-driven, competitive teen who balances a disciplined work ethic in facilities management with high-energy gaming and sports, yet often battles stress-induced overthinking
    and occasional impulsive snack binges.
background:
  cultural: David grew up in a suburban part of Albany County in upstate New York, raised in a working‑class family of European descent—primarily Irish and English ancestry. The community emphasized self‑reliance,
    practical skills, and traditional values, which reinforced his preference for routine and straightforward problem‑solving. He was brought up with an American English accent typical of the Capital Region
    and participated in local school and church activities that stressed responsibility and camaraderie. This cultural setting, combined with the region’s mix of industrial and academic influences, shaped
    his pragmatic outlook and his comfort with both structured work environments and social group activities.
attributes:
