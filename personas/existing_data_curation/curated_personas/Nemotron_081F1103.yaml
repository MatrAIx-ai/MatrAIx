  hobbies: '[''Basketball (pickup games)'', ''Weightlifting'', ''Competitive video gaming (strategy and shooter titles)'', ''Live rock music concerts'', ''Hiking in the Catskills'', ''Neighborhood clean-up
    volunteering'', ''Watching professional sports (basketball, football)'']'
  career_goals: David aims to leverage his early supervisory experience into a long-term career in facilities management. Over the next five years he plans to complete a bachelor’s degree in Business Administration
    or Hospitality Management, earn certifications such as OSHA 30‑hour and the Certified Facility Manager (CFM) credential, and advance to a facilities supervisor role. Ultimately he hopes to launch his
    own regional cleaning and maintenance service, combining his competitive drive with his preference for structured, reliable operations. He also wants to strengthen his leadership and financial-management
    skills to eventually become a facility director or regional manager, while developing stress‑management techniques to handle his sensitivity to pressure.
