personas:
  professional: Kristy Fonseca, a retired archival researcher and community volunteer, blends meticulous genealogical expertise with an organized event‑planning flair, turning each senior‑center gathering
    into a well‑budgeted celebration of local heritage while they use basic digital skills to coordinate volunteers and share digital copies of historic photographs.
  sports: Kristy Fonseca enjoys low‑impact strolling through Patterson Park to spot warblers, participates in the Baltimore Senior Walking Club’s morning walks, follows the Baltimore Ravens in fall and
    the Orioles in summer on TV, and incorporates gentle yoga sessions at the senior center twice a week, while they also keep a modest journal of observed bird species.
  arts: Kristy Fonseca spends afternoons painting watercolor scenes of the Inner Harbor, draws inspiration from Winslow Homer and Claude Monet, attends the Baltimore Museum of Art’s weekly lecture series,
    collects limited‑edition prints by local artist Mary Ingraham, and fills their living room with recordings of Beethoven’s Symphony No. 9 and Amália Rodrigues’ fado, while they often hum the melodies
    as they paint.
  travel: Kristy Fonseca prefers relaxed, senior‑friendly travel, taking frequent day trips on the MARC train to Annapolis and the Chesapeake Bay for garden tours, cherishing a pilgrimage to Lisbon in 2015
    to explore family roots, and looking forward to a sing‑along Potomac river cruise with grandchildren, while they also enjoy quiet afternoons at local historic inns.
  culinary: Kristy Fonseca’s kitchen blends fresh rosemary, thyme, and lilac tea as they expertly prepare bacalhau à Brás, caldo verde, and pastel de nata, while tending a modest herb garden and occasionally
    leaving flour smudges on watercolor canvases after baking for family gatherings.
  core: Kristy Fonseca, a 95‑year‑old archivist‑turned memoirist, balances relentless curiosity with a disciplined ledger, a habit of humming fado while painting, and an occasional tendency to misplace
    glasses atop fresh lilac bouquets, while they often find themselves searching for lost spectacles in the garden.
background:
  cultural: Kristy is a second-generation Portuguese-American who grew up in Baltimore's historic Little Italy neighborhood. Raised in a Catholic household, she celebrates Portuguese festas and enjoys fado
    music, while also embracing the broader Mid-Atlantic cultural scene of the city. Her upbringing during the mid-20th century, shaped by the Great Depression, World War II, and the civil rights era, gave
    her a strong work ethic and a deep appreciation for diverse artistic expressions. Though she identifies as white, her cultural identity blends Portuguese traditions with the rich, multicultural tapestry
    of Baltimore.
