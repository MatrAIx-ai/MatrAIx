  career_goals: Although retired, Kristy aims to complete a memoir that weaves together her family's stories, Baltimore's changing neighborhoods, and her reflections on art and culture. She plans to digitize
    and organize her extensive photograph collection for future generations, mentor her grandchildren and great-grandchildren in research and storytelling, and continue attending art lectures at the Baltimore
    Museum of Art. Kristy also hopes to advocate for senior-friendly policies at the city level, ensuring that older residents remain engaged and respected in the community.
