  career_goals: Myleen aims to attend a top STEM‑focused high school and compete in state and national science fairs, with the long‑term goal of studying computer science at a university that offers strong
    scholarships for high‑achieving students. She envisions becoming a software engineer who designs educational technology tools that support bilingual learners, merging her technical curiosity with her
    Mexican heritage. While pursuing a stable, impactful career, she also hopes to give back to her community by mentoring younger students in coding and robotics, and perhaps one day develop an app that
    preserves and shares traditional Mexican recipes with a modern audience.
