persona_description: A healthcare provider, especially a doctor or a medical professional, who is concerned with the accuracy of diagnoses and the potential consequences of misdiagnosis in the medical field.
  They are likely to be involved in the treatment of respiratory conditions and are aware of the importance of proper diagnosis in ensuring the best possible care for their patients. They are also aware
  of the common causes of respiratory conditions and the potential for misdiagnosis due to the lack of attention to detail and the rush to see as many patients as possible. They are interested in learning
  about cases where doctors have made mistakes in diagnosing pneumonia and are looking for ways to improve the accuracy of diagnoses in the medical field.
