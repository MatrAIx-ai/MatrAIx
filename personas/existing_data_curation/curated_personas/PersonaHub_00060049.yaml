persona_description: A political figure who served as the mayor of Little Rock, Arkansas, in 1903. He had previously served a decade on the City Council and had expressed his desire to run for mayor in
  July 1902. He was a banker and real estate developer and won the Democratic primary with a large majority of votes. He was re-elected in April 1905 and April 1907 and served until he resigned in April
  1908 because of expanding responsibilities in the private sector.
