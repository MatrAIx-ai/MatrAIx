  career_goals: Even at two, Irvin frequently expresses a desire to "fix things" and "help people," echoing his practical curiosity. He often points to tools on TV and says he wants to be a firefighter
    or a builder when he grows up. His competitive streak shows up in wanting to be the "biggest" or "fastest" in simple games, indicating early ambition to excel and to bring order to his surroundings.
