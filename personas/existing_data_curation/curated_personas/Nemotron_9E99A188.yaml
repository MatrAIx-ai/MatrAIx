  hobbies: '["Reading contemporary and classic literature","Gardening (vegetable and flower beds)","Hiking local trails in Kettle Moraine","Knitting and crocheting","Baking homemade pies","Volunteer at
    the Oakfield community center","Nature photography","Playing acoustic guitar"]'
  career_goals: Andrea aims to earn the Child Development Associate (CDA) credential within the next year and later pursue an associate degree in early childhood education. Her long‑term ambition is to
    become a lead teacher and eventually a center director at a reputable childcare facility in Fond du Lac County, where she can implement evidence‑based practices and mentor new staff. She also envisions
    opening a small family‑run daycare that emphasizes both structured learning and creative play, allowing her to blend her practical expertise with her curiosity for innovative early‑learning methods.
    Additionally, Andrea hopes to advocate for higher childcare standards at the community level, contributing to policy discussions and parent‑education workshops.
