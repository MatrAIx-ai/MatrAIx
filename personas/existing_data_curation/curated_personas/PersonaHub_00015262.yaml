persona_description: A transplant surgeon who specializes in kidney transplantation and has extensive experience with desensitization therapy. He is highly skilled in using solid phase assays to predict
  which patients are most likely to benefit from desensitization and which are at high risk for acute rejection. He has published numerous articles on this topic and has made significant contributions to
  the field of transplant medicine. He is known for his expertise in the use of IVIG therapy as a modulator of the immune system and has developed laboratory protocols using antigens and patient blood that
  are useful in predicting which patients are most likely to benefit from desensitization. He is also involved in conducting safety and efficacy trials of desensitization therapy and has published articles
  on this topic.
