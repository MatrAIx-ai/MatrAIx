personas:
  professional: Xiaohui Poudel is an aspiring little scientist who spends afternoons turning cardboard boxes into makeshift labs, constantly asking "why?" and sketching wild hypotheses, and they demonstrate
    a natural curiosity and love for unconventional ideas while preferring spontaneous, unstructured play over rigid schedules.
  sports: Xiaohui Poudel loves sprinting around the playground and dribbling a mini soccer ball with a few close friends on the local "Sunnyvale Sprouts" youth soccer team, and they cheer passionately for
    the professional "Los Angeles Dodgers" during family game nights, preferring low-key, small-group activity over large-scale organized sports.
  arts: Xiaohui Poudel enjoys bubbling with imagination while drawing colorful scenes inspired by Eric Carle's picture books and dancing to the upbeat tunes of The Wiggles, and they often spend quiet afternoons
    examining the whimsical animation of Hayao Miyazaki's films, reflecting their deep appreciation for art and unconventional storytelling.
  travel: Xiaohui Poudel delights in family road trips to the nearby zoo and the sunny beaches of Santa Monica, as well as day-long adventures at the local children's museum, and they dream of someday seeing
    the giant pandas in Chengdu, balancing a love for short, relaxed excursions with a vivid imagination that turns any destination into a storybook adventure.
  culinary: Xiaohui Poudel loves the cheesy stretch of macaroni and cheese, the sweet crumb of strawberry shortcake, and the simple joy of spreading peanut butter on whole-grain bread, and they often help
    stir pancake batter with a wooden spoon, showing a budding cooking skill that leans toward familiar, comforting flavors.
  core: Xiaohui Poudel is a curious, art-loving five-year-old who flits between solitary sketching and small-group play, feels waves of anxiety that can turn a simple outing into a dramatic adventure, and
    clings to a pink piggy bank while dreaming of far-off wonders.
background:
  cultural: Xiaohui is raised in Honolulu in a multicultural household that blends East Asian (Chinese) and Nepali heritage. At home she hears Mandarin songs, celebrates Chinese New Year with red lanterns
    and dumplings, and participates in Nepali festivals such as Dashain, where she enjoys music and sweets. The Hawaiian environment influences her love of the ocean, beach walks, and occasional family
    outings to learn about hula and lei‑making. This mix of traditions gives her a broad appreciation for diverse art forms and a respect for nature, shaping her curious and open‑minded personality.
attributes:
  skills: '["basic reading and sight words", "counting to twenty", "drawing and coloring with detail", "simple clay modeling", "bilingual phrases in Mandarin and Nepali", "singing short songs", "creative
    storytelling", "early emotional self‑regulation"]'
  hobbies: '["drawing and coloring", "watercolor painting", "collecting shells and stones", "building block towers", "playing with LEGO", "reading picture books", "listening to Hawaiian ukulele music",
    "pretend‑play storytelling", "watching educational videos about animals and art"]'
  career_goals: She often talks about becoming an "artist who paints happy stories" or a "nature explorer who draws the ocean and the mountains". Xiaohui dreams of creating pictures that make people smile
    and hopes one day to travel to far‑away places to collect shells and draw the places she visits. She also imagines helping animals, saying she wants to be a "friend of all creatures" who can protect
    sea turtles and teach them about kindness.
