  hobbies: '[''playground games'', ''library storytime'', ''dancing to music'', ''building with DUPLO bricks'', ''drawing and coloring'', ''nature walks and collecting small items'']'
  career_goals: 'Even at three, Ellene imagines future roles: she often says she wants to be a teacher because she enjoys leading group games and helping friends learn new things, and she also dreams of
    being a veterinarian after watching family pets at home. She shows an ambition to be “the best” at puzzles and to be recognized by her peers for her abilities.'
