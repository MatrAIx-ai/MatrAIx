personas:
  professional: Ellene Dawood, a three-year-old preschool assistant, channels their curiosity and methodical nature into organizing story‑time books, reliably handing out crayons, and delighting in the
    practical challenge of tidying up the play area after each activity.
  sports: Ellene Dawood, a budding three‑year‑old member of the Sunny Sprouts Soccer Club, spends Saturdays chasing the ball in the local park, idolizes the LA Dodgers, and enthusiastically competes in
    the mini‑relay games, preferring energetic play over calm activities.
  arts: Ellene Dawood, a tiny art enthusiast, spends afternoons with Crayola crayons sketching whimsical Dr. Seuss characters, sings along to "Baby Shark" by Pinkfong, and proudly displays a finger‑painted
    masterpiece of a rainbow tiger on the fridge, reflecting their sociable, outgoing spirit.
  travel: Ellene Dawood, who loves family road trips, recently visited the Grand Canyon’s rim with a stroller‑friendly tour, dreams of a future adventure to Tokyo’s Disneyland, and prefers meticulously
    planned itineraries that include a playground stop at every rest area.
  culinary: Ellene Dawood, a picky but adventurous eater, devours mac and cheese with extra cheddar, squeals over honey‑drizzled banana slices, and insists on sprinkling mini marshmallows onto their oatmeal,
    while occasionally demanding a bite of Mom’s homemade chicken nuggets.
  core: Ellene Dawood, a curious three‑year‑old with a methodical streak, balances relentless energy and competitive play with a surprisingly organized love for sorting toys, even if they sometimes throw
    tantrums when a favorite sticker is out of reach.
background:
  cultural: Ellene is raised in a white, middle‑class family in Dallastown, Pennsylvania, a suburban community in York County. Her family participates in local traditions such as the York County Fair and
    community church events, and they observe typical American holidays like Thanksgiving and Christmas. The area’s emphasis on community, school‑age programs, and backyard play has shaped her sociable
    and organized nature.
attributes:
  skills: '[''toy organization'', ''sorting and matching'', ''basic counting (1-10)'', ''recognizing shapes and colors'', ''following multi-step instructions'', ''simple storytelling'', ''hand-eye coordination
