personas:
  professional: Thu Jun, a sustainable HVAC specialist who blends meticulous thermodynamic expertise with a painter’s eye for aesthetic integration, consistently delivers energy‑efficient climate solutions
    while championing safety and advocating for environmentally conscious standards within their team.
  sports: Thu Jun, an avid cyclist who rides the Lake Washington shoreline with the Lake Washington Cyclists Club, enjoys weekend pickup soccer games, closely follows the Seattle Sounders FC and Seattle
    Seahawks, and occasionally joins a local indoor climbing group to balance strength training with cardio.
  arts: Thu Jun, an abstract painter and digital illustrator who draws inspiration from Kandinsky and Yayoi Kusama, curates photobooks of industrial textures reminiscent of Edward Burtynsky, regularly contributes
    to the Seattle maker‑space art showcases, and performs occasional live‑drawing sessions at local cafés.
  travel: Thu Jun, a purposeful traveler who combines meticulous itinerary planning with spontaneous detours, has explored Iceland’s geothermal sites, toured Copenhagen’s sustainable architecture, frequently
    escapes to the San Juan Islands and Vancouver for weekend getaways, and dreams of a future work‑exchange in Sweden’s eco‑villages.
  culinary: Thu Jun, a home chef who expertly prepares bibimbap, kimchi jjigae, and bulgogi using gochujang, sesame oil, and perilla leaves, frequently experiments with fusion dishes like kimchi tacos,
    sources fresh Pacific salmon from local markets, and hosts weekly dinner gatherings where art and food intersect.
  core: Thu Jun, a 35‑year‑old sustainable HVAC technologist whose blend of meticulous engineering and vibrant artistic sensibility drives a relentless pursuit of green design, even as they juggle stress‑induced
    worry, yoga‑fueled balance, and occasional splurges on art supplies.
background:
  cultural: Thu is a second‑generation East Asian American, born to parents who immigrated from South Korea. Raised in the Seattle metropolitan area, she grew up bilingual, speaking both English and Korean,
    and celebrates cultural traditions such as Lunar New Year and Chuseok with her family. Her heritage instilled a strong work ethic, respect for communal responsibility, and an appreciation for both modern
    technology and traditional craftsmanship. Thu enjoys sharing Korean cuisine and cultural stories with friends, and she integrates the disciplined, collaborative values of her upbringing with the open,
    innovative spirit of her Pacific Northwest environment. This bicultural perspective informs her approach to work, where she balances meticulous technical precision with creative, people‑centered solutions.
attributes:
  skills: '["HVAC system installation and commissioning", "Refrigeration cycle analysis and troubleshooting", "Blueprint and schematic interpretation", "Energy‑efficiency auditing and retrofitting", "Smart
    thermostat and IoT integration", "Building automation system (BAS) programming", "CAD drafting (AutoCAD, SketchUp)", "Electrical wiring and controls for HVAC", "Safety compliance (OSHA, EPA)", "Customer
    communication and service", "Project scheduling and time management", "Creative problem solving with abstract design concepts", "Bilingual communication (English and Korean)"]'
  hobbies: '["abstract painting", "digital illustration", "urban photography", "DIY home‑automation projects", "indoor gardening (succulents, bonsai)", "yoga and meditation", "reading speculative fiction
    and philosophy", "biking on waterfront trails", "cooking traditional Korean meals", "volunteering at sustainability workshops"]'
  career_goals: Thu aims to become a recognized specialist in sustainable HVAC design, earning NATE Master Specialist certification and an EPA 608 certification for refrigerants. She plans to lead an advanced
    green‑building division within her current company, focusing on carbon‑neutral climate solutions for boutique commercial spaces such as art studios and co‑working hubs. In the longer term, Thu envisions
    launching her own consulting firm that blends technical expertise with artistic installation aesthetics, offering custom climate‑control designs that are both efficient and visually striking. She also
    hopes to mentor emerging technicians, particularly women and minorities, and to contribute to industry standards on integrating smart‑home technologies with traditional HVAC systems.
