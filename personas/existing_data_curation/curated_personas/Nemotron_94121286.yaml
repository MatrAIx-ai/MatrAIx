personas:
  professional: Ramon Angueira is a budding robotics and indie game creator who merges hands‑on LEGO Technic and Mindstorms constructions with early‑stage coding in Scratch and Python to prototype interactive
    toys and simple video games. They balance curiosity with practicality, using methodical schematics while staying flexible enough to experiment, and their competitive streak fuels a drive to out‑engineer
    peers' projects.
  sports: Ramon Angueira is a member of the neighborhood junior cross‑country team and cycles with the "Trailblazers" club on weekends, while cheering for the Los Angeles Lakers and the New York Yankees
    as their favorite pro teams. They enjoy strategic e‑sports titles like Rocket League, but when it comes to physical activity they prefer solitary hikes on local trails such as Pine Ridge Loop, occasionally
    challenging friends to a timed ascent, reflecting a balance between teamwork in organized youth sports and the solitude they relish.
  arts: Ramon Angueira savors the melodic storytelling of regional Mexican artists like Vicente Fernández and José Alfredo Jiménez, and they teach themselves guitar chords from YouTube tutorials between
    coding sessions. Their bookshelf is filled with sci‑fi classics such as "Dune" and "Neuromancer," and they spend free time sketching circuit diagrams as a form of visual art, treating each schematic
    like a miniature masterpiece.
  travel: Ramon Angueira explores the nearby Sierra foothills on weekend hikes, having already trekked the Echo Canyon Trail and dreaming of summiting the Grand Canyon’s South Rim next summer. They favor
    meticulously planning routes on Google Maps, yet they love the spontaneity of discovering hidden waterfalls, and they hope to travel abroad to Tokyo’s Akihabara district to soak up anime culture, as
    well as to the historic streets of Barcelona for its architecture.
  culinary: Ramon Angueira spends Saturday mornings helping to assemble tacos al pastor and steaming tamales, learning the balance of smoky pork and sweet pineapple from family tradition. Their culinary
    curiosity extends to experimenting with fresh salsa verde, adding diced avocado, and occasionally attempting a homemade quesadilla with Oaxaca cheese; they also enjoy the occasional sushi roll, though
    their cooking skill level hovers at "enthusiastic beginner," often resulting in slightly over‑cooked rice.
  core: Ramon Angueira is a 13‑year‑old tech‑savvy builder who fuses LEGO robotics, early coding, and strategic gaming with a love for regional music, quiet hiking, and family cooking, all while juggling
    a frugal allowance, mild myopia, and a habit of staying up late to perfect his next project.
background:
  cultural: Ramon is a second‑generation Mexican‑American raised in the suburban community of Hacienda Heights, California. His household is bilingual, with Spanish and English spoken interchangeably. Family
    traditions such as Día de los Muertos, weekly Sunday tamales, and celebration of Mexican holidays are integral to his upbringing. He participates in local cultural events hosted by the vibrant Mexican
    community in Los Angeles County, which reinforce his heritage while his school environment exposes him to mainstream American culture. This dual cultural framework shapes his identity, fostering pride
    in his Mexican roots alongside an adaptive, pragmatic outlook.
