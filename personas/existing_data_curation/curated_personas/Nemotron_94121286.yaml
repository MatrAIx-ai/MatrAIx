  career_goals: Ramon aims to earn a scholarship in Computer Science or Engineering and attend a top university where he can join a competitive robotics team. He dreams of designing consumer technology—particularly
    educational apps that blend his technical skills with his cultural heritage. Long‑term, he envisions a career as a software or robotics engineer at a leading tech firm or innovative start‑up, where
    he can solve real‑world problems while staying grounded in his community. He also hopes to mentor younger students from similar backgrounds, encouraging them to pursue STEM fields.
