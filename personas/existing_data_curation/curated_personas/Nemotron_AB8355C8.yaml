  hobbies: '[''Pickup basketball'', ''Strategy and FPS video gaming'', ''Cooking traditional Mexican dishes'', ''DIY automotive maintenance'', ''Reading personal development and finance books'', ''Volunteering
    at community center events'', ''Attending local cultural festivals'', ''Gym workouts'']'
  career_goals: Alejandro aims to finish his associate degree in business administration or a technical certification in automotive technology within the next two years. He plans to obtain an ASE (Automotive
    Service Excellence) certification and secure a stable position as a service technician at a reputable garage, where the structured work environment aligns with his preference for predictability. In
    the longer term, he aspires to become a shop foreman or start his own small auto‑repair business that also offers a side service of catering traditional Mexican food for local events. He seeks a career
    path that rewards reliability, allows for measurable progress, and provides opportunities for leadership, reflecting his competitive drive.
