personas:
  professional: An aspiring community outreach and event management professional named Bertin Smalls leverages their knack for public speaking, improvisational planning, and social media storytelling to
    connect local youth with resources, while balancing a practical, curiosity‑driven approach to turning ideas into actionable projects.
  sports: A neighborhood basketball enthusiast named Bertin Smalls dominates pickup games at the local park, cheers for the Minnesota Timberwolves during NBA season, follows the Vikings' NFL campaigns,
    and keeps fit through informal drills and occasional gym sessions rather than a regimented training plan.
  arts: An avid curator of hip‑hop and R&B culture, Bertin Smalls builds playlists featuring Kendrick Lamar, SZA, and Anderson .Paak, mixes tracks on their laptop, produces TikTok videos set to the latest
    beats, and draws inspiration from street art and indie film soundtracks to fuel their creative side.
  travel: A spontaneous weekend wanderer, Bertin Smalls plans low‑cost trips to nearby hotspots like the Boundary Waters, explores the Twin Cities' neighborhoods on foot, has a bucket‑list stop in Chicago
    for its music scene, and relies on ride‑share apps and student discounts to stretch their travel budget.
  culinary: A self‑taught home chef named Bertin Smalls whips up budget‑friendly meals such as chicken‑wing tacos, quick ramen bowls with fresh bok choy, and avocado toast topped with hot sauce, while experimenting
    with spice blends and occasionally ordering pizza after a long gaming session.
  core: Bertin Smalls is a talkative, curiosity‑driven social butterfly who thrives on community connections, yet often feels overwhelmed by worry, juggles a loose schedule, and habitually forgets where
    they placed their phone.
background:
  cultural: Bertin grows up as a Black teenager in the North End of Saint Paul, with family roots that trace back to both the African‑American community of the Twin Cities and Caribbean (his grandparents
    emigrated from Haiti). His upbringing blends church gatherings, family barbecues featuring soul food and Caribbean dishes, and participation in local cultural events such as Juneteenth celebrations
    and St. Paul Winter Carnival. The neighborhood’s rich mix of languages and traditions has given him a broad appreciation for diverse music, cuisine, and storytelling, and he often draws on these experiences
    when connecting with peers or creating content for his social‑media projects.
