  hobbies: '[''Pickup basketball'', ''DJing and music curation'', ''TikTok video creation'', ''Multiplayer gaming'', ''Streetwear fashion'', ''Community center volunteering'', ''Journaling'', ''Guided breathing
    exercises'']'
  career_goals: Driven by his love for connecting with people, Bertin aims to pursue a bachelor's degree in communications or public relations at a Minnesota university. He envisions a career in community
    outreach or event management, where he can blend his creative ideas with practical execution. In the long term, he hopes to launch a small media production venture that highlights stories from the Twin
    Cities’ Black youth, while also advocating for mental‑health resources to help peers manage stress and anxiety. Securing scholarships and part‑time work in campus media are immediate steps toward these
    ambitions.
