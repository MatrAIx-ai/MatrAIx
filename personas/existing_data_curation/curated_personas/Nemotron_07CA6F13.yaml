  hobbies: '[''soccer'', ''Guatemalan folk dance'', ''drawing comic illustrations'', ''reading graphic novels'', ''cooking traditional Guatemalan dishes'', ''robotics club'', ''multiplayer video gaming'']'
  career_goals: Cristina aspires to finish high school with strong grades and then pursue a degree in education or social work so she can become a bilingual counselor or teacher who supports other Guatemalan
    families in the Bay Area. In the short term, she hopes to join the student council, lead a community service project, and earn a certification in first aid. She also dreams of eventually managing youth
    programs that blend cultural heritage with academic support, providing structure and mentorship for younger students.
