personas:
  professional: Cristina Fresse is an aspiring young robotics hobbyist who spends afternoons after school in the school’s robotics club, learning to solder, program Arduino micro‑controllers, and design
    simple mechanisms, and they channel that hands‑on ingenuity into future plans of studying mechanical engineering with an eye toward building affordable sports equipment for youth teams.
  sports: Cristina Fresse is a dedicated midfielder on her middle‑school soccer team, drills daily after class, idolizes Alex Morgan and follows the Los Angeles FC women's matches, while also participating
    in community floor‑ball games and cheering for the local minor‑league baseball club the Riverhaven Hawks.
  arts: Cristina Fresse taps into comic‑book artistry by drawing panels in a sketchbook that echo the dynamic style of Alex Ross and the storytelling depth of Marjane Satrapi, frequently re‑reading titles
    like "Saga" and "Watchmen" for inspiration, and also delights in performing traditional folk dances with her family to the rhythms of Los Pajaritos, a regional ensemble.
  travel: Cristina Fresse prefers short, organized trips with friends, such as weekend camping at Lake Silverwood and a family road trip to the historic city of Antigua, where they explore colonial plazas
    and sample street‑food markets, while dreaming of a future visit to Japan’s cherry‑blossom festivals and the vibrant streets of Buenos Aires.
  culinary: Cristina Fresse loves cooking tamales and pepian with her grandparents, mastering the blend of roasted chiles, tomatoes, and toasted sesame seeds, but also experiments with making homemade pizza
    dough topped with mozzarella and fresh basil, and they never miss a chance to sample a spicy elote from the neighborhood food truck with a squeeze of lime.
  core: Cristina Fresse is an organized yet socially energetic teen who balances a love for robotics, soccer, and comics with a cautious pocket‑book, a vigilant health routine, and a heartfelt commitment
    to family traditions and community gatherings, though they sometimes let worry hijack their focus.
background:
  cultural: Cristina comes from a Guatemalan immigrant family that maintains strong ties to their cultural roots while living in Daly City, California. At home, Spanish is spoken alongside English, and
    family gatherings often feature traditional foods such as tamales, pepian, and atol, as well as celebrations of Guatemalan holidays like Día de la Independencia and Semana Santa. She participates in
    community events organized by local Latino cultural centers and attends a bilingual church where she learns about both American and Guatemalan customs. This bicultural upbringing gives her a deep appreciation
    for her heritage and a desire to bridge her two worlds through community involvement and service.
attributes:
  skills: '[''basic mathematics'', ''bilingual Spanish-English communication'', ''digital literacy'', ''basic coding in Scratch'', ''team collaboration'', ''organizational planning'', ''artistic drawing'',
