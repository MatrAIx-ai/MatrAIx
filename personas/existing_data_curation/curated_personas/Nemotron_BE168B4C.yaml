  hobbies: '[''Reading non-fiction'', ''Hiking'', ''Scale model building'', ''Precision cooking'', ''Guided meditation'', ''Board gaming with close friends'']'
  career_goals: Clinton aims to progress from a specialist role to senior program management, overseeing multi‑disciplinary portfolios that integrate emerging technologies such as IoT and renewable energy
    systems. He plans to achieve PMP certification within the next year, mentor junior project coordinators, and eventually launch his own consultancy focused on sustainable infrastructure projects in the
    Northeast. Balancing ambition with his need for stability, he also prioritizes building resilience strategies to manage stress and maintain work‑life equilibrium.
