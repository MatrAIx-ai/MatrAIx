personas:
  professional: An aspiring young writer and digital illustrator, Starnesha Garmany channels her love for mystery and adventure into meticulously plotted short stories and pixel‑perfect sketches, often
    organizing her creative workflow with colorful checklists that satisfy her need for structure.
  sports: A budding athlete, Starnesha Garmany plays forward for the Riverdale Tigers youth soccer club, swims laps at the local community pool every Thursday, and enthusiastically roots for the Chicago
    Cubs and the Chicago Bulls, favoring team spirit as a quiet source of motivation.
  arts: A creative enthusiast, Starnesha Garmany delights in drawing whimsical characters with Procreate, crocheting cozy blankets during calm afternoons, and filling her headphones with R&B legends like
    H.E.R. and gospel favorites such as Kirk Franklin, often humming along while sketching storyboards for her own mystery tales.
  travel: A structured explorer, Starnesha Garmany prefers meticulously planned family trips—revisiting Disney World’s Magic Kingdom, touring the historical museums of Washington, D.C., and dreaming of
    a future adventure to Kyoto’s bamboo forest—while packing a personal itinerary notebook to balance organized sightseeing with spontaneous reading breaks.
  culinary: A budding food connoisseur, Starnesha Garmany favors comforting classics like creamy macaroni‑and‑cheese with extra cheddar, homemade chicken noodle soup, and strawberry‑topped pancakes, occasionally
    trying her hand at simple crocheted cookie‑shaped ornaments while helping her mother whisk batter, yet she often skips vegetables unless they’re in the form of carrot sticks.
  core: Starnesha Garmany, an 11‑year‑old mystery‑loving, puzzle‑solving, quietly creative soul, balances a love for structure with a shy kindness, and secretly hoards crayons in a hidden drawer, occasionally
    forgetting to finish unfinished stories.
background:
  cultural: Starnesha is an African‑American girl growing up in Brunswick, Georgia, a coastal community with a strong Southern Black cultural heritage. She experiences family traditions that emphasize respect
    for elders, community solidarity, and storytelling. Weekly church services bring gospel music and communal fellowship into her life, while local festivals celebrate African‑American history and Southern
    cuisine like collard greens and cornbread. These cultural influences shape her values of kindness, cooperation, and a desire to give back to her neighborhood.
