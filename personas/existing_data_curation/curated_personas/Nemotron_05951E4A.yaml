  career_goals: Starnesha dreams of becoming a teacher or educator, motivated by her love for structure and her desire to help other children succeed in a supportive environment. She also imagines working
    as a school counselor or youth mentor, where she can use her listening skills and empathy. Long‑term, she hopes to study education or child development and eventually lead community programs that provide
    organized enrichment activities for kids in Brunswick.
