personas:
  professional: Herbert Gilbert, an aspiring interactive storyteller, leverages Scratch to craft branching narratives while rallying friends to test his creations, blending his curiosity for new ideas with
    a practical focus on coding basics, and his relaxed, sociable nature makes collaborative brainstorming sessions feel like a game.
  sports: Herbert Gilbert, a basketball enthusiast playing for the Downtown Youth Hoops League, idolizes LeBron James and follows the Los Angeles Lakers, shoots hoops after school, and balances his love
    of sports with the occasional video‑game marathon, preferring informal pick‑ups over rigid training schedules.
  arts: Herbert Gilbert, a hip‑hop and R&B aficionado who streams Drake, Kendrick Lamar, and Beyoncé while binge‑watching Adventure Time, channels that rhythm into his Scratch storyboards and eagerly attends
    local community festivals where street performers showcase dance and graffiti art, shaping his creative identity.
  travel: Herbert Gilbert, who prefers spontaneous family road trips to places like Yellowstone National Park and the thrill of Orlando’s Walt Disney World, dreams of exploring Akihabara in Tokyo for its
    gaming culture, plans travel on a loose schedule guided by school holidays, and balances his wanderlust with the reality of a modest family travel budget.
  culinary: Herbert Gilbert, a self‑declared pizza and chicken‑nugget connoisseur who also loves sushi rolls and taco bowls, can whip up a quick grilled cheese and occasionally helps bake chocolate chip
    cookies, favoring bold flavors like pepperoni and teriyaki while still craving comfort foods such as mac and cheese.
  core: Herbert Gilbert, an energetically curious 12‑year‑old who codes Scratch adventures, dominates basketball courts, and still forgets to finish his homework, lives by a laid‑back motto that blends
    spontaneous fun with a relaxed approach to planning.
background:
  cultural: Herbert was raised in a Black family in Vineland, New Jersey, where African‑American cultural traditions blend with the diverse suburban setting. Family gatherings often feature soul food, gospel
    music, and storytelling about Black history, while community events at the local recreation center and church provide opportunities for mentorship and cultural expression. He draws pride from his heritage,
    stays connected to the neighborhood’s rhythm, and values the supportive network of friends, relatives, and elders who model resilience and community stewardship.
attributes:
  skills: '[''Basic Scratch coding'', ''LEGO building and basic robotics'', ''Basketball fundamentals'', ''Peer mediation and teamwork'', ''Creative problem solving'', ''Clear oral communication'']'
  hobbies: '[''Basketball'', ''Fortnite gaming'', ''Scratch animation creation'', ''LEGO building'', ''Hip‑hop and R&B music'', ''Church youth group activities'']'
  career_goals: Herbert dreams of turning his love for building and problem solving into a future in engineering, ideally as a mechanical or aerospace engineer who designs sustainable technology for his
    community. He also hopes to stay connected to sports, possibly becoming a coach or community program organizer that merges STEM education with team activities. He aims to attend a STEM‑focused high
    school, earn scholarships, and later give back by mentoring younger kids in his neighborhood.
