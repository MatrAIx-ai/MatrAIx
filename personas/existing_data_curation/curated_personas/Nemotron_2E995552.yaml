    Dialogue Facilitation'']'
  career_goals: Michele aims to transition from her current managerial role to a senior director position overseeing operations and culture initiatives within a forward‑thinking organization. She envisions
    creating a mentorship program that cultivates emerging talent, especially from diverse backgrounds, and championing sustainability practices that align with Seattle's environmental ethos. To prepare,
    she plans to pursue a professional certification in change management and attend executive leadership workshops that blend practical frameworks with innovative thinking. Long‑term, she hopes to leverage
    her experience to consult for nonprofit organizations seeking to scale impact while maintaining community roots.
