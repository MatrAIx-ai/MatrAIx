personas:
  professional: Michele Ovando leads cross‑functional teams in Seattle’s tech sector as a project manager, leveraging agile and lean methods alongside a people‑centric, improv‑inspired communication style
    that turns spontaneous brainstorming into structured action plans, even if their desk tends to resemble creative chaos.
  sports: Michele Ovando fuels weekend hikes in the Cascades, joins a local kayaking club on Lake Washington, supports the Seattle Seahawks, Seattle Sounders FC, and Seattle Kraken, and balances this with
    a weekly yoga class that doubles as a meditation break.
  arts: Michele Ovando thrives on Seattle’s indie arts scene, performing improv comedy at the Unexpected Productions stage, attending gallery openings featuring artists like Yayoi Kusama and local photographer
    James Kilgore, and curating playlists that shuffle between Phoebe Bridgers and Macklemore.
  travel: Michele Ovando prefers spontaneous weekend road trips to nearby gems like the San Juan Islands and Olympic National Park, while dreaming of a spring immersion in Kyoto’s tea houses; they often
    book last‑minute budget flights, using a flexible travel fund that balances wanderlust with a modest salary.
  culinary: Michele Ovando experiments in the kitchen with dishes such as Thai green curry with kaffir lime leaves, homemade ramen topped with chashu and soft‑boiled eggs, and Pacific Northwest pan‑seared
    salmon with dill, showing solid intermediate cooking skill while still ordering takeout on nights of comedy performance.
  core: Michele Ovando is a sociable, improv‑driven leader who mixes creative chaos with practical execution, embraces flexible finances, and balances a love for outdoor adventure with a penchant for late‑night
    culinary experiments.
background:
  cultural: Raised in the Pacific Northwest, Michele’s cultural identity blends classic American individualism with the region’s progressive, community‑focused values. Growing up in a predominantly white,
    middle‑class family, she was encouraged to pursue education and self‑growth while also embracing the diverse, multicultural fabric of Seattle. This environment nurtured her appreciation for environmental
    stewardship, social equity, and the city's rich arts scene. Her upbringing emphasizes open‑mindedness, inclusivity, and a strong work‑life balance, shaping her worldview and interpersonal style.
