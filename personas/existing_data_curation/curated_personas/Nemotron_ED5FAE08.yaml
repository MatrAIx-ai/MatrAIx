  career_goals: Shirley aims to move into a senior leadership role where she can shape strategic decision‑making across the organization, such as Director of Analytics or Head of Operations Research. She
    plans to earn a Six Sigma Black Belt and an INFORMS Certified Analytics Professional credential, publish case studies on data‑driven process improvements, and mentor junior analysts. Additionally, she
    hopes to apply her analytical expertise to community initiatives in Waxhaw—optimizing local transportation planning and supporting nonprofit resource allocation—while maintaining a balanced, family‑centered
    lifestyle.
