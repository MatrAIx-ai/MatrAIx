personas:
  professional: Andy Sheridan, a 9-year-old aspiring engineer, loves building LEGO sets, creating Scratch projects, and shadowing a family friend at a local tech workshop where they apply their practical,
    rule-driven mindset to systematic problem solving.
  sports: Andy Sheridan plays for the San Diego Youth Baseball League’s Coastline Cubs, looks up to the San Diego Padres, practices pitching drills after school, and also enjoys weekend sand volleyball
    at Mission Beach, where they relish the competitive environment.
  arts: Andy Sheridan dives into adventure series like Percy Jackson and The Hardy Boys, sketches comic-style characters inspired by LEGO builds, listens to Imagine Dragons while programming Scratch, and
    participates in a local kids' theater workshop where they perform in a Mystery Night production.
  travel: Andy Sheridan frequently visits La Jolla Cove and Pacific Beach with family, prefers the familiar boardwalk promenade route, but dreams of a structured road trip to Balboa Park and hopes to one
    day explore a guided tour of Disney World's Magic Kingdom.
  culinary: Andy Sheridan enjoys cheesy pepperoni pizza, fish tacos with fresh cilantro, and chocolate chip pancakes, can follow a step-by-step recipe for a fruit smoothie, yet they often forget to clean
    up the kitchen after cooking, leaving a messy workspace.
  core: Andy Sheridan is a routine-loving, competitive 9-year-old who blends methodical LEGO engineering, baseball rivalry, and a meticulous allowance-saving habit into a structured, slightly skeptical
    but earnest outlook on life.
background:
  cultural: Andy comes from a white, middle‑class family living in San Diego, California. His upbringing reflects mainstream American values that emphasize practicality, punctuality, and community involvement.
    He celebrates typical U.S. holidays such as Independence Day, Thanksgiving, and Halloween, and attends a local public elementary school where he interacts with a diverse student body, giving him exposure
    to the multicultural atmosphere of Southern California while maintaining his family's traditional routines and values.
attributes:
  skills: '[''Reading comprehension'', ''Basic arithmetic'', ''Routine organization'', ''LEGO building'', ''Scratch programming'', ''Baseball fundamentals'']'
  hobbies: '[''LEGO building'', ''Scratch programming'', ''Baseball'', ''Adventure book reading'', ''Science kits'', ''Beach outings'']'
  career_goals: Andy dreams of a future where he can apply his love for structure, teamwork, and competition. He is fascinated by the idea of becoming a firefighter because the job offers clear procedures,
    practical problem‑solving, and an opportunity to protect his community. He also imagines playing baseball at a high school level, hoping to earn a scholarship, and is curious about engineering—especially
    designing simple machines—since it aligns with his enjoyment of building and practical thinking.
