  hobbies: '[''Sketching and digital illustration'', ''Playing guitar'', ''Attending live‑music events'', ''Weekend basketball games'', ''Community dance nights'', ''Trivia competitions'', ''Reading sci‑fi
    and philosophy'', ''Listening to podcasts on abstract concepts'', ''Cooking Mexican cuisine with modern twists'', ''Participating in cultural festivals (e.g., Día de los Muertos)'']'
  career_goals: Nestor aims to move beyond entry‑level administrative roles into a position that blends his organizational experience with his passion for creativity, such as a project coordinator for community
    arts programs or a marketing assistant for a culturally focused nonprofit. He hopes to earn a certificate in digital media or event management within the next two years, leveraging his bilingual skills
    to take on leadership responsibilities that allow him to design innovative outreach initiatives. Ultimately, he envisions launching his own pop‑up art and cultural events in the Inland Empire, merging
    his administrative expertise with his love for novelty and artistic expression.
