personas:
  professional: Katrina Fellig, a seasoned librarian and emerging education consultant, channels four decades of expertise in curriculum design, digital resource integration, grant writing, and community
    outreach into pragmatic yet forward-thinking literacy initiatives, and they balance their curiosity for new technologies with a reliable, organized approach that still leaves room for flexibility.
  sports: Katrina Fellig enjoys weekend hikes along the Hill Country trails, follows the Texas Rangers during baseball season and the Dallas Cowboys in the fall, and stays active year-round as a member
    of the Zilker Park walking club, which meets every Saturday for a two-mile circuit.
  arts: Katrina Fellig immerses themselves in the arts through lively book-club debates on historical fiction by Ken Follett, a monthly quilting circle inspired by Frida Kahlo’s patterns, and regular attendance
    at live performances by Kacey Musgraves and the Austin Symphony Orchestra.
  travel: Katrina Fellig prefers well-planned road trips that blend historical sightseeing with nature photography, having explored the Alamo in San Antonio, the historic missions of Santa Fe, and the vibrant
    markets of Mexico City, while dreaming of a future wildlife safari in Kenya to capture African fauna.
  culinary: Katrina Fellig, an enthusiastic home cook, experiments with Tex-Mex favorites such as chili con carne, chicken enchiladas, and homemade salsa verde made from fresh tomatillos, cilantro, and
    jalapeños, skillfully balancing flavors despite an occasional habit of over-seasoning when excitement runs high.
  core: Katrina Fellig blends scholarly rigor with community heart, turning curiosity into practical literacy projects while never missing a quilting stitch or a sunrise hike.
background:
  cultural: Katrina comes from a Midwestern white American background, with family roots tracing back to German and Irish immigrants who settled in the Midwest. Raised in a household that prized education,
    community service, and self‑reliance, she brings those traditions to her life in Austin. The city’s progressive, creative vibe combined with Texas’s emphasis on hospitality and local pride has shaped
    her worldview, fostering a blend of Southern hospitality, a love for outdoor activities, and a steadfast commitment to lifelong learning.
