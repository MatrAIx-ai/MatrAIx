  career_goals: Approaching retirement, Katrina aims to transition into a consulting role where she can advise school districts and public libraries on blending technology with traditional teaching methods.
    She hopes to launch a statewide adult literacy initiative that leverages community partnerships, and she aspires to author a guidebook on information literacy for seniors. Additionally, she plans to
    mentor emerging educators and librarians, serving on advisory boards to shape the future of library services in Texas.
