  career_goals: Although retired, Rex aims to channel his practical curiosity into personal and community projects. He plans to complete a comprehensive renovation of his 1950s farmhouse, including adding
    an energy‑efficient kitchen and a workshop space for woodworking. He wants to establish a small vegetable garden and a chicken coop to supplement his meals, reflecting his interest in sustainable living.
    Rex is also keen to compile oral histories of long‑time Coffeyville residents, creating a modest archive that he can share with the local historical society. On the community side, he hopes to expand
    his role as a mentor by leading a "hands‑on" workshop series at the senior center, teaching basic automotive and home‑repair skills to younger neighbors. Finally, he aspires to improve his digital photography
    skills so he can document his projects and local scenery for family albums and community newsletters.
