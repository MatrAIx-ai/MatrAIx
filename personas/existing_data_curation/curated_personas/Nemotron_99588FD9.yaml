  hobbies: '["Painting", "Visiting Art Museums", "Attending Live Concerts", "Latin Dance Events", "Cooking Dominican Cuisine", "Gardening", "Reading Historical Fiction", "Traveling to the Dominican Republic",
    "Genealogy Research", "Volunteering at Community Centers"]'
  career_goals: Even in retirement, Leslie aims to serve as an advisory board member for adult‑learning nonprofits, shaping programs that bridge generations. She aspires to launch a community oral‑history
    archive preserving Dominican elders' stories, and to mentor emerging educators through workshops at local cultural centers. Leslie also hopes to expand intergenerational art projects that celebrate
    Caribbean creativity while fostering lifelong learning among seniors and youths alike.
