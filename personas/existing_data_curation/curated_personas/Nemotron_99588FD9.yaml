personas:
  professional: Leslie Herrera, a retired bilingual‑education architect, leverages a lifetime of curriculum development and community‑outreach expertise to mentor emerging teachers, orchestrate intergenerational
    art exhibitions, and guide a nascent oral‑history archive for Caribbean elders, all with the methodical planning, sociable energy, and assertive yet collaborative spirit that defined their career.
  sports: Leslie Herrera enjoys low‑impact fitness through morning walks with the local senior walking club, follows the New York Yankees and New York Knicks with spirited game‑day gatherings, and participates
    in a community tennis league for seniors, blending a love for gentle activity, team camaraderie, and seasonal sports enthusiasm.
  arts: Leslie Herrera paints luminous Caribbean seascapes inspired by visits to New York's Metropolitan Museum and the MoMA, delights in live salsa with Celia Cruz recordings and jazz by Dizzy Gillespie,
    occasionally joins Latin dance socials, and draws creative spark from artists such as Frida Kahlo and Diego Rivera, weaving art, music, and movement into a vibrant personal tapestry.
  travel: Leslie Herrera relishes purposeful travel, having revisited the Dominican Republic to reconnect with family roots, eagerly plans a cultural pilgrimage to Spain’s Granada to explore Moor‑inspired
    architecture, and balances future trips with a modest travel budget that favors off‑peak flights and staying with relatives, reflecting a blend of curiosity, organized planning, and a love for heritage
    tourism.
  culinary: Leslie Herrera is a seasoned home chef who lovingly prepares mofongo with crispy plantains and pork, hearty sancocho brimming with yucca, corn, and chicken, and crunchy tostones with garlic
    aioli, proudly sourcing fresh cilantro, sofrito, and lime, while occasionally over‑salting dishes in the quest for the perfect flavor.
  core: Leslie Herrera blends a lifelong passion for bilingual education, vibrant art, and community stewardship with disciplined planning, a zest for intergenerational connection, and a modest, health‑aware
    lifestyle that keeps curiosity alive at 89.
background:
  cultural: Leslie was born in the Dominican Republic and immigrated to New York as a young adult, carrying with her the island's rich traditions of music, food, and Catholic celebrations. She grew up in
    a close‑knit Dominican neighborhood in Manhattan's Washington Heights, where Spanish was spoken at home and English at school. Her identity blends Caribbean rhythms with the multicultural tapestry of
    New York City, and she remains actively involved in Dominican cultural festivals, community churches, and diaspora organizations that preserve heritage while embracing the city's diversity.
attributes:
  skills: '["Curriculum Design", "Bilingual Education", "Instructional Coaching", "Community Outreach", "Event Planning", "Mentorship", "Art Curation", "Genealogy Research", "Senior Technology Coaching",
