personas:
  professional: Bao Yuen, a senior librarian and digital archivist at a major public institution, merges meticulous cataloging expertise with a forward‑thinking embrace of AI‑driven discovery tools, balancing
    their curiosity for new technologies with the practical demands of preserving under‑represented collections, and they lead bilingual outreach programs that reflect both community responsibility and
    personal passion for cultural stewardship.
  sports: Bao Yuen, an avid cyclist, rides the Hudson River Greenway and Brooklyn Waterfront every weekend with the local Ride NYC club, follows the New York Yankees and Knicks, joins a seasonal intramural
    basketball league in the summer, and balances this athletic routine with occasional yoga sessions to maintain flexibility.
  arts: Bao Yuen, a dedicated calligrapher and brush‑painter, regularly attends workshops at the Asian Cultural Center, draws inspiration from contemporary authors like Haruki Murakami and Han Kang, admires
    the works of Ai Weiwei and Zao Wou‑Kong, and spends evenings watching independent films by directors such as Bong Joon‑ho, weaving these artistic influences into a personal creative practice.
  travel: Bao Yuen plans trips that blend structured itineraries with spontaneous discovery, favoring off‑peak travel to destinations like Kyoto for its historic temples, Berlin for its literary festivals,
    and the coastal town of Hoi An for its lantern celebrations, while balancing family obligations by using airline miles and budgeting for occasional weekend getaways to nearby state parks.
  culinary: Bao Yuen, a moderately skilled home cook, loves preparing mapo tofu with Sichuan peppercorns, steaming jiaozi filled with pork and chives, and brewing long‑steeped pu‑erh tea, while also enjoying
    New York bagels and Italian pizza, often pairing meals with a splash of soy sauce or a drizzle of olive oil to honor both traditional and contemporary flavors.
  core: Bao Yuen blends a love of meticulous archival work with a curious embrace of emerging tech, balances disciplined budgeting with occasional cultural indulgences, and finds equilibrium between solitary
    calligraphy sessions and vibrant community cycling rides, all while maintaining a steady, adaptable outlook on life.
background:
  cultural: Bao is a second‑generation Chinese‑American whose parents immigrated to the United States in the 1980s. Raised in a multilingual household in Queens, he grew up speaking Mandarin at home and
    English at school, fostering a bicultural perspective. His upbringing emphasized respect for education, communal responsibility, and preservation of cultural heritage, which now informs his work in
    curating and promoting East Asian collections. Living in New York's diverse environment, Bao actively engages with both the broader Asian diaspora and the city's multicultural landscape, incorporating
    these experiences into his professional and personal life.
attributes:
  skills: '["Cataloging (Dewey Decimal, Library of Congress)", "Archival management", "Metadata creation and curation", "Digital preservation and digitization", "Integrated library systems (ILLiad, Alma)",
    "Digital asset management (Omeka, CONTENTdm)", "Research and reference services", "Program development and community outreach", "Bilingual communication (English, Mandarin)", "Data analysis using Excel
    and Python for collection analytics"]'
  hobbies: '["Reading contemporary and classic literature", "Calligraphy and brush‑painting", "Cycling around New York City", "Volunteer library literacy workshops", "Attending cultural festivals (e.g.,
    Chinese New Year)", "Collecting rare poetry books"]'
  career_goals: Bao aims to advance into a senior leadership role within a major public or academic library, ultimately becoming Head of Special Collections or Director of Digital Services. He seeks to
    spearhead initiatives that integrate emerging technologies—such as AI‑driven discovery tools, immersive digital exhibits, and enhanced metadata standards—while preserving the cultural heritage of under‑represented
    communities. Additionally, Bao hopes to mentor junior staff, contribute to professional standards in digital archiving, and publish articles on best practices for culturally responsive collections management.
