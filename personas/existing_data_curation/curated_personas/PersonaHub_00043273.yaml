persona_description: A professional biologist or ecologist who specializes in the study of aquatic ecology and the impacts of climate change on aquatic systems, particularly in the context of river ecosystems.
  They are interested in conducting baseline assessments of salmonid habitat characteristics, water temperature patterns, and the effects of climate change on aquatic ecosystems. They may have expertise
  in using tools such as stream temperature sensitivity to climate warming and seasonal aquatic macrophytes to quantify water quality conditions for returning adult Chinook salmon. They may also have experience
  in using streamflow data to assess the effects of in-stream flows on water quality and habitat.
