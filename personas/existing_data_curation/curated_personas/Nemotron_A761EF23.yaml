  core: Kristen Mccoy is a curious, methodical two‑year‑old who balances gentle kindness with a love for organized play, vibrant art, and tiny adventures, all while occasionally insisting on mismatched
    socks for good luck.
background:
  cultural: Kristen is raised in a white, middle‑class family in Hendricks County, Indiana. Her upbringing reflects Midwestern values such as community involvement, family gatherings, modesty, and a strong
