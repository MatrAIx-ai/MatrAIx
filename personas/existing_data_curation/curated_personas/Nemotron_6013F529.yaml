personas:
  professional: Desiree White, a 65‑year‑old master fabricator and community artist, leverages three decades of welding, CNC programming, and injection‑molding expertise to mentor apprentices while fusing
    precise engineering with vibrant sculptural concepts, balancing meticulous safety standards with a curious, open‑minded approach that they bring to every project.
  sports: Desiree White enjoys low‑impact fitness such as sunrise walks along Lake Michigan, weekend pickleball matches with the local senior club, and cheering on the Milwaukee Brewers and Bucks, and they
    blend competitive spirit with gentle, social exercise by occasionally joining a community rowing crew in summer.
  arts: Desiree White is a regular at the Milwaukee Art Museum, where they study the kinetic sculptures of Alexander Calder, the immersive installations of Anish Kapoor, and the colorful abstracts of Yayoi
    Kusama, while evenings find them immersed in the smooth saxophone lines of John Coltrane, the blues guitar of B.B. King, and the avant‑garde soundscapes of Brian Eno, all of which inspire their watercolor
    landscapes and hand‑crafted metal mini‑sculptures.
  travel: Desiree White prefers thoughtfully planned trips that combine cultural immersion with comfortable accommodations, and they relish weekend getaways to Chicago’s museum districts, leisurely drives
    to Door County’s lighthouses, annual pilgrimages to Asheville, North Carolina’s craft‑brew scene, while dreaming of a summer art residency in Siena, Italy.
  culinary: Desiree White, an adept home cook, loves preparing Wisconsin cheddar‑infused mac and cheese, smoked trout with fresh dill, and honey‑glazed carrots tossed with thyme and wild mushrooms, they
    often pair meals with a locally brewed hoppy ale, yet they sometimes indulge in late‑night slices of chocolate cake after a new project call.
  core: Desiree White is a seasoned fabricator turned community mentor who blends meticulous engineering with a restless artistic curiosity, they channel their love for metalwork and jazz into vibrant workshops
    while juggling occasional procrastination on paperwork and a penchant for late‑night sketching.
background:
  cultural: Desiree is a lifelong resident of Milwaukee’s North Side, raised in a close‑knit African‑American community where church, family, and neighborhood solidarity were central. Her grandparents were
    part of the Great Migration and brought Southern culinary traditions, gospel music, and a strong sense of civic engagement. Growing up, she was exposed to the rich cultural tapestry of Milwaukee’s Black
    neighborhoods, including Juneteenth celebrations, blues clubs, and community arts programs. As a Black woman in the traditionally male‑dominated metal and plastics trades, she has navigated both gender
    and racial barriers, fostering resilience and a commitment to mentorship. Her cultural identity is reflected in her love for soul food, jazz, and storytelling, and informs her desire to preserve and
    share the contributions of Black artisans in the region.
attributes:
  skills: '["Manual welding (TIG/MIG)", "Metal sheet fabrication", "CNC machining and programming", "Blueprint and technical drawing interpretation", "Injection molding operation", "Thermoplastic forming",
    "Equipment maintenance and troubleshooting", "Quality control and inspection", "Workshop safety management", "Team leadership and mentorship", "Creative design integration"]'
  hobbies: '["Watercolor painting", "Metal sculpture creation", "Visiting art museums and galleries", "Jazz and blues concerts", "Gardening (raised‑bed vegetables)", "Knitting and quilting", "Reading African‑American
    literature", "Volunteering in DIY workshops for youth", "Experimenting with 3D printing and digital design", "Attending local craft fairs"]'
  career_goals: Desiree aims to transition from full‑time production to a mentorship‑focused, small‑business model that fuses her technical expertise with her love of art. She plans to open a community
    studio where she can teach metal‑and‑plastic art techniques, collaborate on public art installations, and preserve traditional fabrication skills for younger generations. She also intends to document
    her knowledge through instructional videos and a guide on safe, sustainable small‑scale manufacturing practices. Additionally, she seeks to become a consultant for local manufacturers interested in
    integrating artistic design into functional products and to volunteer with Milwaukee’s historical societies to showcase the contributions of Black artisans in the region.
