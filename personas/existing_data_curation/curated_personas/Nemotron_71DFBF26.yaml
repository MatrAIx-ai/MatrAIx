  career_goals: Although retired from formal employment, Kodi remains driven by a desire to give back and leave a lasting legacy. Her primary ambition is to document the oral histories of long‑time residents
    in Jonesboro and surrounding Jackson Parish, creating a community archive that future generations can access. She hopes to mentor younger neighbors in sustainable gardening practices and traditional
    crafts, fostering intergenerational learning. Kodi also aspires to coordinate a weekly community garden where locals can share produce and knowledge, and she dreams of compiling a family cookbook that
    blends cherished Southern recipes with the stories behind them. Embracing her curiosity, she plans to explore simple digital tools for preserving these records while staying grounded in the practical,
    hands‑on approach that defines her life.
