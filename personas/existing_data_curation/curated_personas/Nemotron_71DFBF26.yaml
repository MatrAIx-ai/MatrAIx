personas:
  professional: Kodi Ortiz, a retired rural caretaker turned community archivist, leverages a lifetime of gardening, traditional cooking, and hand‑craft expertise—paired with a compassionate, flexible,
    and occasionally disorganized approach—to coordinate a weekly garden, mentor younger neighbors in sustainable practices, and compile an oral‑history archive of Jonesboro’s long‑time residents.
  sports: Kodi Ortiz enjoys low‑impact morning walks through their garden and occasional bird‑watching hikes, while cheering on the New Orleans Saints during football season and following the Louisiana
    State Tigers’ spring baseball games, and they regularly play gentle shuffleboard at the local senior center as their primary form of exercise.
  arts: Kodi Ortiz finds artistic solace in devouring historical novels by Philippa Gregory and Ken Follett, listening to the warm croon of Dolly Parton and the gentle piano of Erik Satie while knitting
    a quilt, and joining the church choir to sing hymns by Fanny J. Cobb, weaving these cultural threads into a quiet yet vibrant creative life.
  travel: Kodi Ortiz prefers slow, purposeful road trips with their husband, often stopping at historic sites like Savannah, Georgia, and the National Archives in Washington, D.C., while their limited budget
    and desire for family time keep them from extensive overseas travel, though they dream of a pilgrimage to the ancestral hometown of their great‑grandparents in Asturias, Spain.
  culinary: Kodi Ortiz, a seasoned Southern home‑cook, delights in perfecting biscuits and fried catfish, canning heirloom tomato jam, pickling okra, and brewing sweet tea, constantly experimenting with
    fresh garden herbs like thyme and sage to elevate classic dishes such as shrimp and grits and pecan pie.
  core: Kodi Ortiz, a garden‑loving genealogical sleuth, they blend southern cooking with a habit of misplacing their glasses, epitomizing a compassionate, curiously practical soul who thrives on quiet
    community connections.
background:
  cultural: Kodi Alexis Ortiz was raised in a modest farming family in Jackson Parish, Louisiana, a region steeped in Southern traditions and a subtle blend of cultural influences. Though her ancestry is
    primarily Anglo‑American, the local heritage of French‑Creole cuisine, gospel music, and community storytelling has left an imprint on her upbringing. She grew up attending a Baptist church, where values
    of hospitality, modesty, and service were emphasized. The rhythms of rural life—seasonal planting, church picnics, and neighborhood potlucks—shaped her worldview, fostering a deep respect for tradition
    and a cooperative spirit. While she honors these roots, Kodi also embraces curiosity, often seeking new ideas in gardening, cooking, and genealogy, thereby weaving together a cultural tapestry that
    balances reverence for the past with an openness to the present.
