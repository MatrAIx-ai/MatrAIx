personas:
  professional: Vanessa Mccants is a pragmatic visual artist who runs a home studio in Katy, seamlessly blending traditional oil painting, watercolor, and mixed-media collage with digital illustration,
    and they use strong project-management and bookkeeping skills to design community art workshops, develop curricula, and maintain a reliable revenue stream from commissions and class fees.
  sports: Vanessa Mccants enjoys leisurely evening walks with their dog through Katy’s parks, supports the Houston Astros and Houston Rockets, participates in a local co-ed softball league on Saturdays,
    and they attend occasional Houston Texans games, viewing sport as a relaxed community outing rather than a competitive pursuit.
  arts: Vanessa Mccants draws artistic inspiration from Georgia O’Keeffe’s desert palettes, Frida Kahlo’s bold storytelling, and Yayoi Kusama’s immersive installations, frequently visits the Houston Museum
    of Fine Arts, curates seasonal exhibition themes for their studio, and they mentor youth in watercolor techniques through the local library’s art program.
  travel: Vanessa Mccants prefers well-planned road trips that combine cultural immersion and culinary exploration, having driven to Santa Fe for its art scene, toured Oaxaca to study regional spices for
    Tex-Mex cooking, and they dream of a spring pilgrimage to Sedona’s red-rock retreats while balancing a modest travel budget and family obligations.
  culinary: Vanessa Mccants is an enthusiastic Tex-Mex home chef who cultivates cilantro, oregano, and jalapeños in their garden, regularly prepares street-style tacos with grilled carne asada, smoky chipotle
    chile rellenos, and fresh guacamole, and they enjoy experimenting with homemade masa and occasionally baking artisanal sourdough to round out their modest culinary repertoire.
  core: Vanessa Mccants is a routine-driven, community-focused artist who balances meticulous studio management with garden-fresh cooking, quietly battles occasional back pain, and they delight in quiet
    walks that feed both their creative mind and compassionate heart.
background:
  cultural: Vanessa comes from an Anglo-American background rooted in suburban Texas culture. Raised in a family that emphasizes community, reliability, and modest celebrations of traditional holidays,
    she embraces Southern hospitality while maintaining a practical, down-to-earth worldview. Her white cultural heritage blends with the diverse artistic milieu of the Greater Houston area, giving her
    an appreciation for both local customs and the broader American arts scene.
