  career_goals: Vanessa aims to transform her home studio in Katy into a modest commercial space that hosts regular art classes, seasonal exhibitions, and a small boutique selling limited-edition prints
    and handcrafted ceramics. She hopes to secure a steady stream of commission work from local businesses while obtaining a regular teaching contract at the nearby community college. Over the next five
    years, she plans to earn a reputation as a dependable regional artist who contributes to the arts council’s outreach programs, balancing creative fulfillment with financial stability.
