persona_description: A historian and arborglyph researcher who specializes in the study of Basque history and culture, particularly the carvings left by Basque sheepherders in aspen groves throughout the
  American West. He is passionate about documenting the unique and little-known Western way of life and preserving it for future generations. He is a ruggedly handsome man in his 70s with a rakish black
  beret and auburn goatee, and he is on a mission to record the engravings left by Basque men in aspen groves. He is also a college instructor of Basque history and language and has recorded over 27,000
  carvings over two decades.
