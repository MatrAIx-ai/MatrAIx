persona_description: A former employee of the Short Brothers Aviation Company, who has a deep appreciation for the history and legacy of the Rochester Airport and the aviation industry in general. They
  have a strong connection to the local community and are passionate about preserving the airport's heritage. They are knowledgeable about the aviation history of Rochester, the development of the Short
  Brothers company, and the significant contributions made by the airport to British Aviation. They have a keen interest in the future of the airport and its potential for revitalization and expansion.
  They are also interested in the ongoing challenges and controversies surrounding the airport's closure and the potential for a new lease under the Rochester Airport Masterplan 2013.
