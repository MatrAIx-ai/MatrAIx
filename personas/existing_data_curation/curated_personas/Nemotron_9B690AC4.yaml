  career_goals: Rita often talks about becoming a teacher when she grows up because she loves helping friends learn new things and enjoys the order of a classroom. She imagines herself leading storytime,
    setting up learning stations, and making sure everyone feels included and safe. She also sometimes mentions wanting to be a veterinarian, caring for animals she sees at the park. Overall, her ambition
    is to be a helpful, organized adult who supports others in a friendly, structured environment.
