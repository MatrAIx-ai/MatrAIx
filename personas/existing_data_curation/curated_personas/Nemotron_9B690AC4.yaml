personas:
  professional: Rita Helgason loves to play 'pretend teacher' during imaginative play, arranging their stuffed animals in tidy rows, assigning simple tasks, and keeping a clear daily schedule that reflects
    their preference for structure while making sure their friends join in.
  sports: Rita Helgason plays on the Little Lions Soccer Club, cheers for the local professional baseball team the Springfield Cardinals, and enjoys weekly swimming lessons where they practice the butterfly
    stroke with the same energetic enthusiasm they bring to group games.
  arts: Rita Helgason spends afternoons drawing bright dinosaurs, dancing to the tunes of the animated film 'Moana', and attending a weekend kindergarten arts and crafts class where they proudly display
    their finger‑painted rainbows alongside posters of their favorite singer Taylor Swift.
  travel: Rita Helgason loves family road trips to the seaside boardwalk, has a scrapbook page for each visit to the zoo and the nearby mountain cabin, and dreams of one day visiting Disneyland, all while
    preferring trips that follow a familiar itinerary they can anticipate.
  culinary: Rita Helgason favours peanut butter and banana sandwiches, enjoys making smiley‑face pancakes with blueberries, and insists on arranging their fruit slices into neat patterns before eating,
    though they stubbornly refuse broccoli.
  core: Rita Helgason is a bright, routine‑loving five‑year‑old who thrives on organized play, social fun, and tiny budgets, yet they occasionally rebel against bedtime and unexpected changes.
background:
  cultural: Rita is a five‑year‑old white girl raised in Boise, Idaho, in a family with Icelandic heritage suggested by her surname Helgason. Her household blends typical American cultural practices—celebrating
    holidays such as Thanksgiving, Christmas, and birthday parties—with occasional Scandinavian touches, like playing Icelandic children’s songs during family gatherings and learning a few basic words from
    the Icelandic language. Growing up in the Pacific Northwest, she is accustomed to outdoorsy family outings, visits to local parks, and community events at the Boise Public Library, which foster a strong
    sense of community and respect for nature. Her parents encourage both independence and cooperation, aligning with her personality’s balance of structure and sociability.
attributes:
