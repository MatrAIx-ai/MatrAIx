persona_description: A historian who specializes in the study of Yoruba history, particularly the stories and legends of the Oloori Moremi. Her research interests include the cultural and historical significance
  of the Oloori Moremi story, its impact on the Yoruba people, and the ways in which the story has been preserved and celebrated in contemporary Nigeria. She is also interested in the legacy of the Oloori
  Moremi story and its relevance to contemporary issues such as slavery, gender equality, and the power of the spirit in human affairs.
