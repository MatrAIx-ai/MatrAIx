  career_goals: Elizabeth aims to transition from a solo contractor to the owner of a small, reputable painting and paper‑hanging firm that specializes in sustainable, low‑VOC finishes. She plans to obtain
    her Arizona contractor's license, secure a certification in green interior finishes, and build a trusted crew of three to five skilled workers. Over the next five years she hopes to win at least two
    commercial contracts (e.g., boutique hotels or office spaces) and become a recognized mentor for apprentices in local trade schools. A personal ambition is to streamline her workflow enough to reduce
    stress, allowing more predictable hours for family and self‑care.
