persona_description: A pediatrician who specializes in the treatment of allergic conditions in children, particularly in the case of milk allergy. She has conducted research on the desensitization process
  for milk allergy and is working on finding ways to accelerate the process using Xolair, an asthma drug that blocks immunoglobulin-E antibodies from attaching to allergens. Her research has been funded
  by various organizations and is part of a larger project called the Bunning Food Allergy Project.
