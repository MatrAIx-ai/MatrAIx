  hobbies: '["Lake kayaking","Landscape sketching","Beginner yoga","Journaling","Strategy video games","DIY home‑repair projects","Reading psychological thrillers","Community gardening"]'
  career_goals: Yasmin aims to advance from production worker to shift‑lead within the next two to three years, leveraging her competitive drive to become one of the top performers on key metrics like overall
    equipment effectiveness. She plans to complete an associate’s degree in industrial technology and earn a Lean Six Sigma Green Belt, positioning herself for a future role as production planner or safety
    coordinator. Simultaneously, she seeks to strengthen her emotional resilience through stress‑management training, allowing her to handle high‑pressure environments without the intense anxiety she currently
    experiences.
