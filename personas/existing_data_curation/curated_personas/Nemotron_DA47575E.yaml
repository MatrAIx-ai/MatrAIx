personas:
  professional: Yasmin Aveyard leverages her hands‑on CNC stamping expertise, Lean Six Sigma training, and a competitive yet cautious mindset to streamline production lines, mentor new hires, and chase
    top OEE scores as she works toward a shift‑lead promotion.
  sports: Yasmin Aveyard paddles the lakes of northern Minnesota each summer, follows the Minnesota Twins and Vikings avidly, and belongs to a local kayak club that meets on crisp autumn mornings, while
    occasionally joining a community gym for weight‑training to counter back strain.
  arts: Yasmin Aveyard spends evenings drawing detailed lakeside landscapes inspired by Ansel Adams, unwinds while listening to Sufjan Stevens and the folk duo The Milk Carton Kids, and enjoys a weekly
    viewing of classic thriller films like Se7en for creative inspiration.
  travel: Yasmin Aveyard favors modest road trips across the Midwest, has explored the Boundary Waters Canoe Area and a weekend getaway to Duluth's historic Canal Park, and dreams of a summer sailing excursion
    through the fjords of Norway, balancing adventure with a strict travel budget.
  culinary: Yasmin Aveyard prefers hearty home‑cooked meals like walleye fish fry with lemon‑butter sauce, creamy potato casserole, and garden‑fresh herb pesto, cooks at a confident amateur level, and enjoys
    sourcing local ingredients from the farmer’s market while occasionally indulging in a slice of chocolate cake.
  core: Yasmin Aveyard blends a practical hard‑working Midwestern ethos with a competitive drive and high emotional sensitivity, using kayaking and sketching to calm anxiety while meticulously tracking
    work metrics and finances, even as occasional disorganization and skeptical instincts keep her on her toes.
background:
  cultural: Yasmin is a white Midwesterner of German‑Norwegian ancestry who grew up in a small town near Detroit Lakes, Minnesota. Her family emphasized hard work, frugality, and a strong connection to
    the outdoors, fostering her practical, self‑reliant outlook. Community values of modesty and mutual support shaped her competitive yet cautious nature, while regional traditions like seasonal lake activities
    and Lutheran cultural influences contribute to her balanced blend of social engagement and solo reflection.
attributes:
  skills: '["CNC stamping machine operation","Forklift certification (ANSI)","Preventive equipment maintenance","Quality inspection using micrometer and calipers","ERP inventory tracking (Epicor)","Lean
