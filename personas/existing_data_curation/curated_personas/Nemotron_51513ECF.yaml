  hobbies: '[''Gardening (native Texas roses, herbs)'', ''Book club (contemporary fiction and biographies)'', ''Volunteering at local food bank and senior center'', ''Cooking Texan cuisine (health-focused)'',
    ''Group fitness classes (Zumba, yoga)'', ''Road trips to historic towns'', ''Attending local music festivals'']'
  career_goals: Helen aims to transition into a senior director role within the next two years, focusing on strategic brand expansion into emerging markets while championing sustainable and socially responsible
    marketing. She is passionate about mentoring the next generation of marketers, especially women and underrepresented groups, and plans to develop a formal mentorship program within her company. As she
    approaches retirement, she envisions a phased shift to consulting for local non‑profits, helping them craft compelling narratives and reach broader audiences. Additionally, she wants to lead a company‑wide
    initiative to embed wellness practices into marketing teams to reduce stress and improve work‑life balance.
