  career_goals: Andrew aims to advance to a Security Supervisor or Shift Lead position within the next two years, overseeing a team of surveillance officers and shaping department policies. He plans to
    earn the Certified Protection Professional (CPP) credential and to champion the integration of AI‑driven video analytics to enhance threat detection. Long‑term, he envisions transitioning into private
    security consulting for regional casinos, leveraging his deep industry knowledge. Parallel to his professional trajectory, he hopes to compile a collection of short stories that blend his surveillance
    experiences with his love of abstract and speculative concepts, ultimately publishing a memoir that reflects his unique perspective on risk, human behavior, and creativity.
