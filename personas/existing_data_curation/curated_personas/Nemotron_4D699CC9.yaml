personas:
  professional: Andrew Johnston, a 64‑year‑old veteran of casino security, blends his deep surveillance expertise with his educator’s talent to craft AI‑driven video‑analytics protocols, mentor junior officers,
    and spearhead policy development, all while they maintain a competitive edge sharpened at the community chess table.
  sports: Andrew Johnston competes in a senior bowling league every Thursday, cheers for the Dallas Cowboys and Houston Astros on game days, they supplement their routine with weekend walks along the Hill
    Country trails and occasional light weight‑training at the community center to stay limber for woodworking projects.
  arts: Andrew Johnston channels his abstract painting passion by emulating Jackson Pollock’s splatter techniques and Mark Rothko’s color fields, they capture the stark contrast of casino interiors reminiscent
    of Edward Hopper in black‑and‑white photographs, and they contribute set designs to the local community theater while penning speculative short stories inspired by Philip K. Dick.
  travel: Andrew Johnston prefers meticulously planned road trips across Texas, having visited Marfa’s art installations and Santa Fe’s historic plaza, they long to explore the Renaissance museums of Florence
    and the lantern‑lit streets of Kyoto, yet they balance wanderlust with a modest travel budget and the need for regular medical appointments.
  culinary: Andrew Johnston delights in smoking brisket with a rub of cumin, paprika, and brown sugar, they savor chicken‑fried steak with jalapeño gravy, enjoy a side of chili‑laden black beans, and often
    pair their meals with a bold glass of Texas Zinfandel, while they occasionally treat themselves to shrimp cocktail at casino buffets after late‑night poker sessions.
  core: Andrew Johnston, a 64‑year‑old security veteran with a painter’s soul, balances disciplined surveillance work with competitive chess, speculative storytelling, and an ever‑present love for bold
    colors, all while they occasionally forget to water their houseplants and indulge in a midnight poker hand.
background:
  cultural: Andrew is an Anglo‑Texan whose upbringing in a small town near Roanoke, Texas, instilled a strong sense of regional identity and community responsibility. Raised in a middle‑class family with
    a parent who taught in the public‑school system, he internalized the value of education and public service. His cultural fabric weaves together Southern hospitality, a love for Texas football Saturdays,
    and an appreciation for local traditions such as barbecue and country music, while also embracing the diverse clientele he encounters in the casino world. Active in his local church and community volunteer
    groups, he values cooperation, yet his competitive nature reflects the independent spirit often celebrated in Texas folklore. This blend of rural roots and exposure to the bustling gambling scene informs
    his balanced worldview—grounded yet open to novelty and artistic expression.
