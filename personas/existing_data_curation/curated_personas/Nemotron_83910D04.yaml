  career_goals: Tracy aims to move from a first‑line supervisor role to a facilities manager position overseeing multiple properties within her region, where she can apply her business acumen to drive cost‑efficiency
    and sustainability. She plans to lead a project that achieves LEED Gold certification for her current building, develop a standardized training program for housekeeping staff, and eventually mentor
    emerging supervisors before transitioning into a consulting role that helps small‑to‑mid‑size property owners streamline housekeeping operations.
