  career_goals: Jordan is fascinated by how things work and dreams of becoming an engineer—either a mechanical engineer who designs machines or a software developer who creates video games. He hopes to
    join a school robotics club or a LEGO League team to gain hands‑on experience, and he plans to keep improving his baseball skills to possibly earn a spot on his middle‑school varsity team. Ultimately,
    he wants a career that blends his curiosity for building with practical problem‑solving.
