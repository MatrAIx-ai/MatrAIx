personas:
  professional: Jordan Thompson, an 8‑year‑old student, is an aspiring junior coder and LEGO architect who creates intricate builds and writes simple Scratch programs, blending curious experimentation with
    a practical, organized mindset while quietly competing with friends to solve puzzles faster.
  sports: Jordan Thompson, a member of the Madisonville Youth Baseball League who avidly watches Kentucky Wildcats basketball and Louisville Cardinals football on weekends, loves practicing pitching and
    fielding, approaches each game with a competitive edge while still valuing teamwork taught at the community church’s youth sports program.
  arts: Jordan Thompson, a budding LEGO sculptor who devours The LEGO Movie and Minecraft adventures, also enjoys listening to country singer Chris Stapleton, reading sci‑fi classics like Ender's Game,
    and drawing inspiration from the melodic twang of local bluegrass fiddler Ashley McBryde.
  travel: Jordan Thompson has explored the Great Smoky Mountains on family hikes, visited Washington, D.C. to see the Smithsonian, dreams of seeing the Jurassic Coast in England and the dinosaur fossils
    at the Field Museum in Chicago, and prefers day‑trip itineraries that fit around school and a short budget.
  culinary: Jordan Thompson loves crispy fried chicken with honey‑butter biscuits, mac and cheese with sharp cheddar, and sweet tea made with a splash of lemonade, often helping stir batter and expertly
    spotting the subtle hint of smoked paprika in his favorite BBQ ribs.
  core: Jordan Thompson is a curious, quietly competitive 8‑year‑old who blends a love for building, coding, and nature with a practical streak, a modest thrift habit, and a tendency to forget sunscreen
    on sunny adventures.
background:
  cultural: Jordan grew up in Madisonville, a small city in western Kentucky with strong Appalachian influences. His family follows a Southern Baptist tradition, attends community church services, and participates
    in local events such as the county fair and school fundraisers. The region’s emphasis on hard work, modesty, and close‑knit community life shapes his values. He enjoys typical Southern foods like fried
    chicken, biscuits, and sweet tea, and his upbringing blends rural outdoor activities—fishing, hiking, and backyard gardening—with a respect for school and family.
