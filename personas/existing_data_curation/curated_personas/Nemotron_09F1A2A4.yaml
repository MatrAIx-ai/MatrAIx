  hobbies: '[''Abstract Painting'', ''Acoustic Guitar (Folk & Bluegrass)'', ''Hiking in the Appalachian Mountains'', ''Speculative Fiction Reading'', ''Chess'', ''Digital Art & Storyboarding'', ''DIY Woodworking
    for Sports Equipment'']'
  career_goals: In the short term, Robert aims to become the head coach of Lewisburg High School's varsity baseball team, establishing a reputation for developing well-rounded athletes and implementing
    cutting‑edge scouting protocols. He plans to earn a certification in sports management and deepen his expertise in analytics. Over the next five to ten years, he aspires to move into a collegiate director
    of player development role, where he can shape recruitment strategies, mentor a network of coaches, and eventually launch his own sports performance consultancy focused on integrating artistic creativity
    with athletic excellence.
