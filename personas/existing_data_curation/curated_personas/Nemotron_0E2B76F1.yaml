  career_goals: Devin aims to transition into a senior executive role, such as Chief Financial Officer, where he can drive both profitability and social impact. He is particularly motivated to spearhead
    ESG initiatives, positioning his organization as a leader in sustainable investing. Over the next five years, he plans to obtain a CFA certification, deepen his expertise in impact finance, and launch
    a community‑focused financial literacy program in Columbus. Ultimately, Devin envisions establishing a social‑impact investment fund that channels capital toward local startups addressing environmental
    and social challenges, aligning his professional success with his compassionate values.
