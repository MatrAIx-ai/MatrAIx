personas:
  professional: Devin Berning, a 30‑year‑old senior financial manager in Columbus, blends rigorous corporate finance expertise with an artist’s eye for unconventional solutions, turning complex budgets
    into ESG‑focused strategies while championing a collaborative team culture.
  sports: Devin Berning enjoys weekend hikes in Hocking Hills, weekly rides on the Olentangy Trail with the Columbus Cycling Club, follows the Columbus Blue Jackets and Ohio State Buckeyes, and occasionally
    joins a local recreational soccer league, approaching fitness with a measured but enthusiastic mindset.
  arts: Devin Berning frequents the Columbus Museum of Art, draws inspiration from contemporary creators such as Yayoi Kusama and Jeff Koons, dabbles in street photography echoing Henri Cartier‑Bresson,
    and unwinds with acoustic renditions of John Mayer and Simon & Garfunkel, weaving visual and musical appreciation into daily life.
  travel: Devin Berning blends purposeful planning with spontaneous curiosity, favoring weekend escapes to Hocking Hills, a yearly cultural deep‑dive into Barcelona’s architecture, and occasional solo trips
    to Kyoto to capture sunrise street scenes, all while balancing travel costs against professional development budgets.
  culinary: Devin Berning’s kitchen experiments range from crafting spicy Thai Pad Thai and Moroccan shakshuka to mastering Japanese ramen, favoring fresh basil, miso paste, and harissa, and while they
    can flawlessly perfect a roux, they often over‑salt dishes in a quest for bold flavor.
  core: Devin Berning, a finance‑savvy art enthusiast, balances spreadsheets with camera lenses, sacrifices sleep for guitar chords, and habitually over‑books weekend hikes to chase both data‑driven insights
    and sunrise panoramas.
background:
  cultural: Devin was raised in a suburban neighborhood of Columbus, Ohio, within a white, European‑American family with roots in the Midwest. His upbringing emphasized practicality, community involvement,
    and a strong work ethic—values common to the region’s cultural fabric. While his household honored traditional Midwestern modesty and reliability, his parents encouraged curiosity and exposure to diverse
    ideas, leading him to appreciate both local traditions and global perspectives. He attended Ohio State University for his undergraduate studies and earned his MBA locally, reinforcing his connection
    to the Columbus business community. The city’s vibrant arts scene, progressive initiatives, and emphasis on civic engagement have shaped Devin’s worldview, fostering a blend of conventional responsibility
    with an openness to unconventional thinking.
