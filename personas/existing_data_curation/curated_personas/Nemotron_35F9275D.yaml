    Service Practices'', ''Community‑Focused Customer Service'']'
  hobbies: '[''Painting and Sketching'', ''Visiting Art Galleries'', ''Listening to Indie Latin Music'', ''Yoga, Meditation, and Journaling'', ''Cooking Salvadoran Dishes (e.g., Pupusas)'', ''Cumbia and
    Salsa Dancing'', ''DIY Natural Hair‑Care Experiments'', ''Thrifting Vintage Clothing'', ''Graphic‑Design Tutorials'', ''Reading Fashion and Trend Publications'']'
  career_goals: Guadalupe aims to become a Master Stylist with a specialization in artistic color work within the next three years. She plans to enroll in advanced colorist certification programs and attend
    national hair-fashion shows to refine her technique and gain industry recognition. Her long-term ambition is to open a boutique salon in Longview that blends contemporary hair art with Salvadoran cultural
    motifs, eventually launching a line of natural hair-care products inspired by ingredients from El Salvador such as neem oil and coconut. She also hopes to mentor other young stylists from immigrant
    backgrounds, build a collaborative team, and leverage her social-media presence to attract a clientele that appreciates bold, unconventional looks. Recognizing her tendency toward worry, she intends
    to incorporate mindfulness and financial-planning training into her business plan to ensure stability and personal well‑being.
