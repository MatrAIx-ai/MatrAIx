personas:
  professional: Guadalupe Rosua, a 22‑year‑old hair‑stylist in Longview, blends precision cutting, advanced color theory, and avant‑garde sculptural techniques with bilingual client consultations, and they
    channel their curiosity and competitive drive into bold, culturally‑inspired looks while meticulously balancing salon organization and creative flexibility.
  sports: Guadalupe Rosua prefers low‑impact fitness, practicing yoga three times weekly at the community center, occasionally joining a casual indoor soccer league with friends, and they cheer enthusiastically
    for the Dallas Cowboys and Houston Astros on weekends.
  arts: Guadalupe Rosua immerses themselves in the East Texas Arts Council scene, draws inspiration from Frida Kahlo and contemporary muralist Shepard Fairey, curates Instagram reels set to indie Latin
    bands like Bomba Estéreo and Café Tacvba, and they channel that energy into vibrant hair‑art designs.
  travel: Guadalupe Rosua favors meticulously planned weekend getaways, often traveling to Austin for its live music and street art, exploring San Miguel de Allende’s colonial plazas, and they dream of
    a solo adventure to Oaxaca’s bustling markets while balancing a modest travel budget with occasional splurges on boutique hostels that spark their creativity.
  culinary: Guadalupe Rosua enjoys crafting homemade pupusas stuffed with loroco and cheese, experimenting with avocado‑aloe smoothies that double as natural hair‑care treatments, and they savor street‑taco
    al pastor topped with fresh cilantro and lime, reflecting an eclectic palate that blends comfort foods with bold flavor combos.
  core: Guadalupe Rosua is a fiercely curious, artistic 22‑year‑old who channels their competitive spirit and lingering worry into vibrant hair‑art creations, and they meticulously plan a future boutique
    salon that fuses cultural motifs with modern style.
background:
  cultural: Guadalupe is a second-generation Salvadoran raised in Longview, Texas, in a bilingual household where Spanish and English flow interchangeably. Her family maintains strong ties to Salvadoran
    traditions, celebrating holidays such as Día de la Independencia with festive food, music, and community gatherings at the local cultural center. The vivid colors and rhythmic vitality of Salvadoran
    festivals have shaped her aesthetic, prompting her to incorporate bright, cultural motifs into her hair‑art. She often serves a client base that includes fellow immigrants and prideful locals, offering
    a welcoming environment that reflects her community‑oriented upbringing. Periodic visits to El Salvador keep her connected to her roots, reinforcing a sense of identity that blends Central American
    heritage with Texan sensibilities.
attributes:
  skills: '[''Precision Hair Cutting'', ''Creative Color Techniques (Balayage, Ombré, Avant‑garde dyeing)'', ''Hair Sculpting and Updos'', ''Bilingual Client Consultation (Spanish/English)'', ''Chemical
