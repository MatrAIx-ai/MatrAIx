persona_description: A materials scientist or engineer who is interested in the performance of clothing materials in arc exposure and is familiar with the ASTM F1959/F1959M standard for determining the
  arc rating of materials for clothing. They are likely to have experience with fabric construction and fiber properties, as well as an understanding of the significance of the ATPV and EBT ratings in the
  context of garment protection. They may also be interested in the practical implications of these ratings in the design and testing of clothing for arc exposure.
