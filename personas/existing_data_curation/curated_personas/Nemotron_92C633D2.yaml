personas:
  professional: Angel Benavides is a budding coder who builds interactive Scratch projects after school, channeling curiosity and practicality into collaborative game design while often leaving files unsaved
    due to a relaxed attitude toward deadlines.
  sports: Angel Benavides is a lively midfielder for Burbank United youth soccer, cheers for the Chicago Fire FC during MLS season, and joins after‑school dance drills, though they often skip warm‑ups in
    favor of jumping straight into games.
  arts: 'Angel Benavides creates vivid digital drawings on a tablet inspired by Marvel’s Spider‑Man: Miles Morales and the colorful murals seen at local festivals, while dancing to a mixtape that blends
    Luis Miguel’s ballads with contemporary pop hits.'
  travel: Angel Benavides loves weekend trips to Millennium Park’s interactive science exhibits, dreams of visiting the historic markets of Mexico City, and plans family vacations to Lake Tahoe, preferring
    a mix of adventure and relaxed beach time within the budget set by their parents.
  culinary: Angel Benavides helps their mom roll tamales, sizzle carnitas for tacos, and garnish guacamole with fresh cilantro, proudly experimenting with a pinch of lime and a dash of chipotle while occasionally
    burning the tortilla edges due to impatience.
  core: Angel Benavides is a sociable, curiosity‑driven 12‑year‑old who mixes tech tinkering with cultural storytelling, yet often misplaces homework and forgets chores, balancing lively energy with a laid‑back
    approach to obligations.
background:
  cultural: Angel comes from a Mexican-American family rooted in Burbank, Illinois. Spanish is spoken at home, and the household celebrates cultural milestones such as Día de los Muertos and family quinceañera
    preparations. Her family places a strong emphasis on community, often participating in local Hispanic festivals and school Spanish clubs. The blend of Mexican traditions with the diverse environment
    of Cook County gives Angel a rich cultural perspective that she shares through food, music, and stories passed down from her grandparents.
