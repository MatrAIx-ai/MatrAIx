  career_goals: She dreams of becoming a veterinarian one day because she loves caring for animals, and she also thinks about teaching science to inspire younger kids. Angel plans to focus on high school
    science courses, join the school’s STEM club, and maintain a flexible path that lets her explore both animal health and education while balancing her love for new ideas with practical steps. She hopes
    that her bilingual ability will allow her to serve diverse communities in the future.
