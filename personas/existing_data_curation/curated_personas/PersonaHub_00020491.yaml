persona_description: A human being who is passionate about expanding life in the universe and is interested in the principles and implications of life-centered biotic ethics. This person is dedicated to
  the cause of securing the future of life in space and is willing to cooperate on cosmic scales of space and time based on compassion, truth, justice, peace, and a firm respect for life. This person is
  a strong advocate of the axioms of ethics and the course of ethical behavior, and is committed to nurturing the young, assisting life where it falters, advancing the richness of living patterns, conserving
  and enhancing the diversity of living species, and planting life where it is absent. This person is also interested in the prospects for life in the solar system and far beyond, and is eager to secure
  the cosmic purpose of life's expansion in space.
