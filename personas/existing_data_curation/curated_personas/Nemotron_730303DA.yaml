personas:
  professional: A veteran STEAM educator, Felix Dryden leverages four decades of classroom experience to blend abstract painting, acoustic guitar, and Arduino robotics into interdisciplinary curricula that
    ignite curiosity in elementary and middle‑school students, while championing flexible, inquiry‑based learning and mentoring new teachers.
  sports: A casual fitness enthusiast, Felix Dryden enjoys weekend hikes in Armstrong Redwoods, follows the San Francisco Giants baseball team, participates in a local senior cycling club that meets on
    Saturdays, and prefers low‑impact yoga sessions over high‑intensity workouts.
  arts: An abstract landscape painter, Felix Dryden draws inspiration from Sonoma vineyards while listening to Nick Drake on acoustic guitar at open‑mic nights, performs improv with the community theater
    troupe, and cites artists like Wassily Kandinsky and musician David Bowie as creative touchstones.
  travel: A nostalgic explorer, Felix Dryden frequently drives up the Pacific Coast Highway to visit Mendocino’s art galleries, dreams of a culinary tour of Tuscany’s vineyards, and favors carefully planned
    week‑long road trips that balance scenic stops with opportunities to volunteer at local schools.
  culinary: A culinary experimenter, Felix Dryden loves cooking heirloom tomato bruschetta with fresh basil, pairing it with a chilled Pinot Noir from a Sonoma boutique winery, and often improvises recipes
    inspired by classic science‑fiction novels, while occasionally over‑indulging in late‑night cheese platters.
  core: A retired STEAM visionary, Felix Dryden blends art, music, and tech into everyday life, wandering from garden to stage with a palette of curiosity, a modest budget, and a penchant for spontaneous
    creativity.
background:
  cultural: Felix was born to second-generation American parents of English-Scottish descent who settled in the Bay Area after World War II. Growing up during the cultural shifts of the 1960s, he internalized
    the West-coast values of individuality, environmental stewardship, and community activism. Living in Santa Rosa, he embraces the region's blend of agricultural heritage, wine-country culture, and progressive
    civic life. He celebrates traditional American holidays while also participating in local festivals that honor the diverse heritage of Sonoma County, including the Spanish-Mexican history and the indigenous
    Pomo influences. His worldview is shaped by a lifelong commitment to education, curiosity, and inclusive community engagement.
attributes:
  skills: '["Curriculum Design", "Inquiry-Based Learning", "STEAM Integration", "Educational Technology (coding platforms, interactive whiteboards)", "Project-Based Science Labs", "Mentorship & Teacher
    Coaching", "Community Outreach & Partnerships", "Science Communication", "Outdoor & Environmental Education", "Creative Arts Integration"]'
  hobbies: '["Abstract Painting", "Acoustic Guitar & Community Open-Mic Sessions", "Improv Theater", "Hiking (Redwoods, Sonoma County trails)", "Birdwatching", "Organic Gardening", "Wine Tasting & Culinary
    Experimentation", "Reading Science-Fiction", "DIY Electronics (Arduino, Raspberry Pi projects)", "Volunteering for After-School STEM Clubs"]'
  career_goals: As he approaches retirement, Felix aims to leave a lasting impact on his district by institutionalizing a cross-disciplinary STEAM program that blends visual arts, music, and engineering.
    He hopes to author a children's science-art book that encourages imagination in young learners. Felix also aspires to serve as a consultant for fellow educators, lead professional-development workshops,
    and collaborate with local wineries and museums on experiential learning projects. Ultimately, he envisions continuing to mentor emerging teachers and speak at regional education conferences, while
    remaining an active volunteer in community after-school programs.
