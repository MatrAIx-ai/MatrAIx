persona_description: A polar explorer and adventurer who achieved the first surface traverse of the Arctic, the longest traverse across the Arctic Ocean, and reached the northern pole of inaccessibility
  and the north geographic pole. His achievements were recognized with awards from the Royal Geographical Society and other institutions. His book, Across the Top of the World, was published in 1969, and
  he made a film about the Inuit hunters with his wife, Marie McGaughey. He also lectured extensively and made a study of the north pole controversy. His literary and artistic career began to dominate,
  and he was knighted in 2000. He is survived by his wife, Marie, and their elder daughter, Kari.
