personas:
  professional: Sara Small, a construction specialist whose OSHA‑certified safety mindset, knack for coordinating small crews, and hands‑on mastery of power tools and blueprint reading blend with a practical
    curiosity that drives her to pilot sustainable building methods, they leverage their sociable, talkative nature to mentor teammates and push toward a foreman certification and future green‑renovation
    firm.
  sports: Sara Small stays active by pitching for the co‑ed “Bluegrass Bats” softball league, hiking the Bernheim Arboretum trails on weekends, and cheering for the Louisville City FC soccer team and the
    Lexington Legends baseball club, they relish the camaraderie these activities foster while maintaining a balanced fitness routine.
  arts: Sara Small cultivates artistic expression by singing alto in the Bluegrass Community Choir, attending regional music festivals like Hangout and Shaker Village, and collecting vinyls from folk legends
    such as Old Crow Medicine Show, they often incorporate these musical inspirations into community gatherings.
  travel: Sara Small favors spontaneous weekend road trips to nearby gems like Mammoth Cave National Park and Nashville, Tennessee, while meticulously budgeting for a once‑yearly spring getaway to the Appalachian
    Trail and a future European cultural tour, they balance a love for outdoor adventure with the financial realities of upcoming certifications.
  culinary: Sara Small is an intermediate home cook who delights in preparing Southern comfort staples such as crispy fried chicken, buttery biscuits, collard greens sautéed with smoked pork, and homemade
    peach cobbler, often incorporating garden‑fresh herbs like thyme and rosemary to add a personal twist to each dish, they also love sharing these meals at choir rehearsals and community potlucks.
  core: Sara Small, a talkative construction enthusiast who hums while wielding a drill and habitually over‑schedules community events, they blend a practical curiosity for sustainable building with a deep
    commitment to teamwork, forging a life where work and social engagement are inseparably intertwined.
background:
  cultural: Sara grew up in a close‑knit, white working‑class family in Bullitt County, where Southern hospitality and Midwestern pragmatism intersect. Her upbringing emphasized community service, church
    involvement (she attends a local Baptist congregation), and a love for country and bluegrass music. Family gatherings often featured home‑cooked meals and storytelling, reinforcing values of cooperation,
    hard work, and helping others. These cultural roots shape her everyday interactions, from her commitment to teamwork on construction sites to her dedication to volunteering and maintaining harmony in
    her social circles.
attributes:
  skills: '[''Operating power tools (drills, saws, nail guns)'', ''Concrete mixing and finishing'', ''Framing and basic carpentry'', ''Reading and interpreting simple blueprints'', ''Construction site safety
    protocols (OSHA certified)'', ''Team coordination and communication'', ''Heavy equipment assistance (backhoe, forklift)'', ''Material handling and inventory management'', ''On‑site problem solving'',
    ''Basic customer service'']'
  hobbies: '[''Singing in the local community choir'', ''Volunteering with Habitat for Humanity'', ''Cooking Southern comfort food for friends and family'', ''Gardening and working with native Kentucky
    plants'', ''Playing softball in a co‑ed league'', ''Hiking at Bernheim Arboretum'', ''Attending regional music festivals'', ''DIY home improvement projects'', ''Participating in church youth group activities'']'
  career_goals: Sara aims to move into a supervisory role within the next three years, pursuing a foreman certification and gaining experience in project planning. She envisions one day launching her own
    small‑scale contracting firm that focuses on energy‑efficient home renovations for families in Bullitt County. Mentorship is a core ambition—she wants to create a supportive apprenticeship program for
    young workers, especially women entering the trades. Additionally, Sara hopes to integrate green building practices into her projects, blending her practical mindset with her curiosity for innovative,
    sustainable techniques.
