personas:
  professional: Betty Neff is a meticulous medical services manager who leverages their expertise in Epic and Athenahealth, precise scheduling, and workflow protocol design to keep the Savannah clinic running
    like a well‑tuned clock, while their empathic listening and clear written communication help them resolve staff conflicts and mentor junior colleagues as they work toward a CMM credential.
  sports: Betty Neff enjoys low‑impact fitness by strolling the historic Savannah squares, attending weekly yoga classes at the historic Forsyth Park studio, and playing on the Georgetown Gardens Pickleball
    Club, while cheering on the Savannah Bananas and keeping a casual eye on the Atlanta Hawks during the NBA season.
  arts: Betty Neff finds creative solace in knitting intricate shawls while listening to the folk melodies of the Avett Brothers and the piano works of Ludovico Einaudi, and they regularly read historical
    fiction by Philippa Gregory and self‑help productivity guides by Cal Newport, often discussing favorite passages at the Savannah Theatre’s post‑show gatherings.
  travel: Betty Neff prefers meticulously planned weekend getaways, having already toured the historic streets of Charleston and the coastal charm of Tybee Island, and they dream of a structured pilgrimage
    to Edinburgh’s Old Town, where they can combine their love for history with their habit of journaling each day’s itinerary.
  culinary: Betty Neff’s weekly meal plans revolve around dishes that showcase the herbs they cultivate, such as lemon‑rosemary grilled chicken, shrimp and grits with fresh thyme, and lavender‑infused scones,
    and they delight in preparing a hearty chicken noodle soup when a cold front triggers their seasonal cravings.
  core: Betty Neff is a detail‑obsessed, garden‑loving health‑admin whiz who balances a love for orderly bullet‑journaling with an undercurrent of anxiety that fuels their relentless quest for efficiency
    and calm.
background:
  cultural: Betty Ann was raised in Savannah, Georgia, in a family that values Southern hospitality, community involvement, and modesty. Her upbringing emphasized respect for tradition, courtesy, and close‑knit
    family ties, often reflected in gatherings centered around home‑cooked meals and church activities. She maintains an appreciation for Southern cuisine, historic architecture, and the slower pace of
    life in the Lowcountry, while also embracing the progressive health‑care initiatives growing in the region.
attributes:
  skills: '[''Health care administration'', ''Medical office management'', ''Appointment scheduling'', ''Electronic health record (EHR) systems (Epic, Athenahealth)'', ''Medical billing and coding'', ''HIPAA
    and regulatory compliance'', ''Inventory control'', ''Staff training and onboarding'', ''Conflict resolution'', ''Process improvement and quality metrics'', ''Written communication'', ''Data analysis
    for performance indicators'']'
  hobbies: '[''Bullet journaling'', ''Herb gardening'', ''Reading historical fiction'', ''Self‑help productivity books'', ''Crossword puzzles'', ''Sudoku'', ''Walking historic Savannah squares'', ''Knitting'',
    ''Volunteering at community health fairs'']'
  career_goals: Betty Ann aims to earn a bachelor's degree in health administration within the next three years and obtain the Certified Medical Manager (CMM) credential. She aspires to advance to a senior
    manager or director of operations role at a larger health‑care facility in Savannah, where she can lead larger quality‑improvement initiatives and mentor junior staff. Long‑term, she envisions becoming
    a hospital administrator focused on creating patient‑centered, efficient environments while maintaining a balanced workload to manage her own stress levels.
