  hobbies: '["Hiking and trail walking", "Landscape and wildlife photography", "Reading scientific and musicology books", "Playing piano and saxophone", "Home recording and sound design", "Woodworking",
    "Cooking and recipe experimentation", "Strategic board games (chess)", "Attending local jazz and folk concerts"]'
  career_goals: He aims to compose a large-scale orchestral piece that captures the sweeping landscapes of Wyoming and secure a recording contract to release an album of his works. Over the next five years,
    Jerry hopes to obtain a composer‑in‑residence fellowship, expand his role as music director to a regional symphony, and develop a youth music outreach program in Lincoln County that combines music education
    with technology. He also aspires to score documentaries about the American West and to earn recognition from national composer societies, thereby establishing a sustainable career that balances artistic
    integrity with financial stability.
