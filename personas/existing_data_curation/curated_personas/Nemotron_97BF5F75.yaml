personas:
  professional: Jerry Powell is a mid‑career composer‑conductor who blends rigorous classical training with algorithmic sound design, leveraging his STEM background and competitive drive to craft orchestral
    works that echo Wyoming’s sagebrush horizons while managing projects with meticulous structure.
  sports: Jerry Powell embraces the frontier fitness ethic by hiking the Green River Trail weekly, joining the Kemmerer Alpine Ski Club for winter runs at Sun Valley, cheering the Denver Broncos and Wyoming
    Cowboys, and occasionally playing pick‑up basketball at the community center to stay active.
  arts: Jerry Powell immerses themselves in the local music scene, attending Saturday night jazz gigs featuring the likes of vibraphonist Bill Curry, while also devouring the recordings of Miles Davis and
    folk storyteller Gillian Welch; they frequently study Stravinsky’s ballets and experiment with Max/MSP to fuse electronic textures with acoustic ensembles.
  travel: Jerry Powell prefers road‑trip itineraries that blend rugged adventure with quiet reflection, having driven the Blue Ridge Parkway and trekked the backcountry of Grand Teton, they dream of a winter
    photography expedition to Iceland’s volcanic landscapes and a cultural tour of the Scottish Highlands, always budgeting carefully to keep travel within their modest discretionary fund.
  culinary: Jerry Powell enjoys a hearty frontier kitchen, often cooking bison stew seasoned with juniper berries and rosemary, perfecting sourdough starter for artisanal bread, and experimenting with wild
    mushrooms in a creamy risotto, while their occasional indulgence is a craft‑brew stout paired with smoked salmon.
  core: Jerry Powell is a disciplined, competitive composer who balances frontier self‑reliance with a love for jazz, hiking, and meticulous budgeting, all while battling a chronic back ache and a penchant
    for late‑night recording sessions.
background:
  cultural: Jerry grew up in a small Midwestern town before moving to Kemmerer, Wyoming as a young adult. His family’s Anglo‑American roots emphasize self‑reliance, community involvement, and a respect
    for the outdoors—values that are common in the American West. Although his ethnic background is white, his cultural identity blends the practical, straightforward ethos of rural America with the artistic
    sensibilities of a classical music tradition. The local frontier culture, the sagebrush landscape, and the close‑knit community of Lincoln County shape his worldview, fostering a blend of individualism,
    competitiveness, and a modest, pragmatic approach to life and art.
attributes:
  skills: '["Music composition", "Conducting", "Orchestration and arranging", "Music theory and analysis", "Audio engineering", "Digital signal processing", "Music production software (Logic Pro, Pro Tools,
