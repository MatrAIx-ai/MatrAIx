    idea sharing"]'
  hobbies: '["sketching and watercolor painting", "reading adventure chapter books such as Magic Tree House", "collecting natural objects for crafts", "LEGO building and creative construction", "community‑center
    mixed‑media art classes", "cooking traditional Filipino dishes with family", "beginner piano practice", "playing educational video games such as Minecraft Education", "participating in school art club
    projects"]'
  career_goals: Flordeluna often dreams about turning her love of drawing into a future where she can paint murals that brighten her community and illustrate storybooks for children. She imagines studying
    art in high school and later at a university fine‑arts program, while also keeping an eye on environmental science so she can create illustrations that raise awareness about local wildlife. In the short
    term she hopes to become the art helper for her school library, assisting teachers with visual displays, and she aspires to volunteer at the local animal shelter to learn about caring for pets, which
    could lead her to consider a career as a veterinarian‑artist who combines caring for animals with artistic advocacy.
