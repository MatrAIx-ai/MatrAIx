personas:
  professional: Flordeluna Van is an aspiring junior illustrator whose boundless curiosity fuels daily watercolor sketches and mixed‑media experiments, blending meticulous organization of her art supplies
    with the flexible spontaneity to redesign community mural sections, and she confidently asserts her creative ideas during art club collaborations while occasionally fretting over meeting expectations.
  sports: Flordeluna Van delights in the weekend soccer clinic at the community centre, proudly wearing a junior jersey of the Los Angeles Dodgers while also sneaking quiet bike rides through the neighborhood
    park to balance her energetic play with moments of calm.
  arts: Flordeluna Van draws inspiration from Hayao Miyazaki’s whimsical animation, the catchy beats of BTS, and the vibrant brushstrokes of Vincent van Gogh, weaving these influences into her mixed‑media
    sketches while delighting in her mother’s traditional lullabies that echo softly during quiet drawing sessions.
  travel: Flordeluna Van loves weekend trips to the nearby botanical garden and the sandy shore where she collects shells, dreams of exploring the terraced rice fields of Bali, and prefers family vacations
    that combine a simple itinerary with spontaneous leaf‑collecting adventures.
  culinary: Flordeluna Van eagerly helps roll homemade lumpia, savors the sweet tang of mango sticky rice, and enjoys crafting simple peanut butter‑banana sandwiches, often experimenting with bright ingredients
    like strawberries and a dash of coconut milk to enhance her snack creations.
  core: Flordeluna Van is a curious eight‑year‑old artist who fills sketchbooks with vivid dreams, balances meticulous organization with spontaneous LEGO builds, worries over tiny imperfections, and finds
    comfort in the rhythm of folding lumpia and humming lullabies.
background:
  cultural: Flordeluna is the daughter of Filipino immigrants who moved from Manila to the Rio Grande Valley seeking work in the healthcare sector. Raised in a bilingual household she speaks English at
    school and Tagalog at home, and she has picked up conversational Spanish from her neighbors in Donna Texas, a city with a strong Hispanic presence. Her family observes Catholic traditions such as Christmas
    and Holy Week while also celebrating Filipino holidays like the Feast of the Black Nazarene and Lunar New Year. Community gatherings often feature a blend of Filipino dishes such as adobo, sinigang,
    and lumpia and Texas‑style foods like tacos and barbacoa. She attends a local elementary school where cultural festivals showcase both Mexican and Filipino performances, giving her exposure to folk
    dances, music, and storytelling from both her heritage and the surrounding community. This multicultural environment nurtures her appreciation for diverse artistic expressions and informs her evolving
    identity.
attributes:
  skills: '["reading fluency (grade-3 level)", "basic arithmetic and multiplication tables up to 12", "hand drawing with colored pencils and watercolors", "digital illustration using kid-friendly tablet
