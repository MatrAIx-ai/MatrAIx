  hobbies: '["Digital photography", "Watercolor painting", "Reading contemporary literature", "Attending art galleries and museums", "Hiking and exploring nature trails", "Fishing", "Gardening", "Woodworking",
    "Experimental cooking", "Listening to jazz and indie music", "Participating in a local book club", "Volunteering at community events"]'
  career_goals: Jimmy hopes to transition back into the workforce by launching a freelance photography and design business that serves local artisans, community organizations, and small businesses in the
    Sanilac County area. He also envisions partnering with a regional nonprofit to develop public art projects and workshops, allowing him to combine his love of art with community service. Completing his
    bachelor's degree in visual arts or communications is a key step toward these goals. In the medium term, he aims to achieve a steady income that offers both financial security and the flexibility to
    continue his creative pursuits, while also building a modest reputation as a reliable handyman for supplemental work.
