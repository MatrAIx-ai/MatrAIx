personas:
  professional: Lisa Reasso is a retired community historian and senior‑center bookkeeper who channels her love of genealogical research and classic literature into leading local reading circles, organizing
    county history exhibits, and offering gentle mentorship to teens, and they apply a practical, structured mindset to every volunteer project.
  sports: Lisa Reasso enjoys leisurely walks through the Iowa countryside with the Madison County Senior Walking Club, roots for the Iowa Hawkeyes football team during fall weekends, and they occasionally
    attend the Des Moines Women’s Softball League games as a supportive spectator.
  arts: Lisa Reasso finds solace in listening to Beethoven’s Ninth Symphony on her vintage record player, reading poetry by Emily Dickinson, and admiring the landscape paintings of Grant Wood, and they
    often share these cultural delights during low‑key craft circles at the senior center.
  travel: Lisa Reasso prefers relaxed, car‑based trips to nearby historic towns like Williamsburg, Virginia, and the covered bridges of Madison County, and they dream of a gentle river cruise along the
    Mississippi River in spring, balancing limited mobility with a love of scenic history.
  culinary: Lisa Reasso expertly prepares Iowa comfort classics such as chicken and dumplings, corn casserole, and apple butter preserves, delighting in heirloom tomatoes, fresh dill, and locally sourced
    honey, and they often knit a new apron while the stew simmers.
  core: Lisa Reasso blends meticulous garden planning with a habit of misplacing knitting needles, cherishes quiet afternoons of classic literature, and quietly defies modern tech by favoring her old record
    player over streaming services.
background:
  cultural: Lisa was raised in a white, Midwestern family with roots tracing back to German and Irish immigrants who settled in Iowa’s farming communities. Her upbringing emphasized modesty, self‑reliance,
    and close community ties. She grew up participating in county fairs, church potlucks, and seasonal harvest celebrations, absorbing a cultural ethos that values hard work, hospitality, and respect for
    the land. Her humanities education broadened her perspective, allowing her to blend a love for classic literature and the arts with the practical sensibilities of rural life. This combination shapes
    her identity as a quiet steward of both her family's legacy and her town’s cultural heritage.
