  hobbies: '[''Reading classic literature and poetry'', ''Seasonal gardening'', ''Birdwatching'', ''Knitting, crochet, and quilting'', ''Cooking traditional Iowa meals'', ''Attending church services'',
    ''Participating in senior center craft circles'', ''Walking in the countryside'', ''Listening to classical music'', ''Exploring local history archives'']'
  career_goals: Although retired, Lisa remains purposeful. She aims to compile a family memoir that preserves her ancestors' stories and the local history of Madison County. She hopes to volunteer regularly
    at the Winterset public library, leading a small reading group focused on classic literature. Lisa also wishes to continue mentoring grandchildren and nearby teens in writing, sharing her love of storytelling.
    Maintaining her health and independence so she can tend her garden and host occasional, intimate gatherings for friends and family is a personal priority. She quietly aspires to contribute a quilt to
    the county historical society’s exhibit, celebrating the region’s cultural heritage.
