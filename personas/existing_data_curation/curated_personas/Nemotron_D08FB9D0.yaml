  career_goals: Looking ahead, Raja aims to lead a multidisciplinary team that tackles large‑scale urban revitalization projects in the Greater Los Angeles area, integrating cutting‑edge sustainability
    with context‑sensitive design. He aspires to win a nationally recognized architecture award and to secure a partnership position in his current firm, eventually leveraging that experience to launch
    his own boutique practice focused on adaptive reuse of historic buildings. Raja wants to mentor younger architects, channeling his competitive spirit into constructive feedback and fostering a culture
    of thoughtful innovation. To address his sensitivity to stress and deadline pressure, he plans to adopt a more structured project‑management workflow, balancing his flexibility with reliable delivery
    timelines.
