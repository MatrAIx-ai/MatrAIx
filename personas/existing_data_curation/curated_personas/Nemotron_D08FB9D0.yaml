personas:
  professional: Raja Binns, a 51‑year‑old architect, merges a spontaneous curiosity for parametric design with a pragmatic command of code‑compliant documentation, juggling AutoCAD, Revit, Rhino, and Grasshopper
    while often battling deadline anxiety and channeling a competitive edge into rigorous design‑build volunteer work, and they consistently produce high‑quality spatial narratives despite occasional disorganization.
  sports: Raja Binns, an avid weekend hiker, frequents the coastal trails of Malibu for sunrise treks, holds season tickets for the Los Angeles Dodgers and supports the LA Lakers, and they engage in fiercely
    competitive chess matches at a downtown café, reflecting a love of both physical endurance and mental sport.
  arts: Raja Binns immerses themselves in the arts by watercolor‑sketching downtown LA skylines, photographing contemporary architecture for a personal blog, improvising jazz piano evenings with standards
    by Bill Evans, and curating a vintage vinyl collection that includes Thelonious Monk’s Blue Note releases, and they often discuss concepts at local gallery openings.
  travel: Raja Binns favors meticulously planned road trips along the Pacific Coast Highway to Santa Barbara and up to Big Sur, while daydreaming about a future immersion in Kyoto’s historic temples, and
    they balance a desire for solitary scenery with budget constraints that limit frequent international travel.
  culinary: Raja Binns enjoys moderate cooking, often crafting Mediterranean‑inspired dishes such as grilled branzino with lemon‑oregano drizzle and a side of roasted heirloom carrots, while their palate
    also craves a well‑crafted espresso and a slice of classic New York‑style cheesecake, and they sometimes skip meals during intensive design phases.
  core: Raja Binns is a 51‑year‑old architect whose restless curiosity fuels daring design experiments, whose competitive spirit drives both chess and project excellence, yet whose tendency toward stress
    and occasional improvisational neglect keeps them juggling deadlines, health, and a lifelong love of art.
background:
  cultural: Raja was raised in a middle‑class Anglo‑American household in the suburbs of Los Angeles, where the multicultural fabric of Southern California left an early imprint on his worldview. His parents,
    both college‑educated, encouraged a liberal arts education that fostered a lasting love for literature, philosophy, and visual arts—interests that later informed his architectural sensibility. Growing
    up near the vibrant neighborhoods of Culver City and the broader Los Angeles County exposed him to West Coast modernism, historic preservation efforts, and diverse cultural expressions. While he identifies
    as white, he actively engages with the region’s cultural dynamism, integrating those influences into both his professional practice and personal life.
