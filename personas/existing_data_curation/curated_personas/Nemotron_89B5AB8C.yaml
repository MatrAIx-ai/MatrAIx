personas:
  professional: Maria Esquivias is a budding structural play engineer who loves constructing towers and bridges from wooden blocks, applying their curiosity and practicality to test stability, while their
    organized yet flexible nature lets them adapt designs on the fly and they proudly share their creations with peers.
  sports: Maria Esquivias is a weekend soccer enthusiast who joins the Lake County Rockets youth league, cheers for the San Francisco Giants during warm‑up games, rides a bright red bike around the park,
    and collects smooth stones as trophies of outdoor play.
  arts: Maria Esquivias dives into mandala coloring books featuring intricate patterns by artist Julie Taymor, sings along to bilingual children’s songs like “Los Pollitos Dicen” by Cantinflas Kids and
    “Baby Beluga” by Raffi, and enjoys listening to cuentos narrated by storyteller Ana María Fernández, weaving these artistic experiences into their daily imagination.
  travel: Maria Esquivias loves weekend trips to the lake’s shoreline to hunt for smooth stones, dreams of exploring the colorful streets of Barcelona and the geysers of Yellowstone, prefers parents to
    handle itineraries but eagerly chooses kid‑friendly museums and playgrounds, and balances a love of adventure with the comfort of familiar family routines.
  culinary: Maria Esquivias helps stir batter for banana‑cinnamon pancakes, savors cheese quesadillas with freshly diced tomatoes and avocado, delights in tasting strawberry‑mango smoothies, and while their
    cooking skills are still beginner‑level, they proudly claim responsibility for sprinkling chocolate chips on cupcakes.
  core: Maria Esquivias is a curious, emotionally vibrant six‑year‑old who builds block towers, colors mandalas, and navigates big feelings with a mix of anxious bursts and practical calm.
background:
  cultural: Maria was born to Mexican immigrant parents who maintain strong ties to their heritage. At home she hears Spanish spoken daily, celebrates Día de los Muertos and Cinco de Mayo with family traditions,
    and enjoys Mexican dishes like tamales and quesadillas prepared together. Living in Schererville, Indiana, she attends a bilingual preschool where she learns both English and Spanish, and she participates
    in a local Hispanic community center’s cultural events. These experiences give her a bicultural identity that blends Mexican family values of respect, community, and celebration with the Midwestern
    environment of her hometown.
attributes:
  skills: '[''Basic reading and storytelling in English and Spanish'', ''Counting and simple addition'', ''Fine‑motor coordination for drawing, cutting, and building with blocks'', ''Following multi‑step
