  hobbies: '[''Coloring and drawing mandala‑style pictures'', ''Building with wooden blocks and LEGO'', ''Listening to Spanish cuentos and children’s songs'', ''Helping with simple cooking tasks'', ''Playing
    soccer in the neighborhood park'', ''Bicycle riding'', ''Collecting stones and shells at the lake'']'
  career_goals: Maria often says she wants to become a teacher who can help kids learn to read in both Spanish and English, creating a classroom where every child feels safe and organized. She also dreams
    of caring for animals as a veterinarian because she likes to comfort pets that seem sad or scared. These ambitions reflect her desire to combine her curiosity for learning with a practical way to support
    others, and they provide her with a hopeful focus that helps reduce her anxiety.
