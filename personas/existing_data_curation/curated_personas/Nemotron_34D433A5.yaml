personas:
  professional: Bobby Idell is an aerospace engineer who combines deep expertise in CFD, CAD, and propulsion systems with a calm, flexible problem‑solving style that lets them troubleshoot complex launch‑vehicle
    integrations without rigid planning.
  sports: Bobby Idell fuels fitness through early‑morning hikes on the Transylvania County trails, occasional mountain‑bike rides with the Brevard Trail Riders club, and casual attendance at Charlotte Hornets
    games, while they keep a modest membership in a local ultimate frisbee league each summer.
  arts: Bobby Idell finds artistic balance in astrophotography at night, woodworking projects inspired by the clean lines of Scandinavian designers like Alvar Aalto, and listening to the ambient soundscapes
    of Brian Eno and the folk blues of The Carolina Chocolate Drops, which together shape a tranquil creative outlet.
  travel: Bobby Idell prefers self‑planned, low‑key road trips that blend nature and space history—such as a sunrise hike along the Blue Ridge Parkway followed by a weekend visit to Cape Canaveral’s Space Coast,
    and they long to trek the highlands of Scotland’s Isle of Skye for its night‑sky clarity.
  culinary: Bobby Idell enjoys crafting rustic meals like cedar‑smoked trout, heirloom tomato bruschetta, and hand‑rolled sourdough, with a kitchen skill level that comfortably blends precise woodworking‑inspired
    plating and experimental spice blends, often accompanied by a strong pour‑over coffee.
  core: Bobby Idell is a calm, curiosity‑driven aerospace engineer who merges a love of the night sky with hands‑on woodworking, while habitually juggling meticulous design work with occasional disorganized
    hobby splurges.
background:
  cultural: Bobby grew up in the small, close‑knit community of Brevard, North Carolina, a town nestled in the Appalachian foothills known for its waterfalls and artistic vibe. His family traces its roots
    to English and German settlers who have lived in the region for generations, giving him a sense of continuity with Appalachian cultural traditions such as an appreciation for the outdoors, self‑reliance,
    and community gatherings. Although he identifies as culturally white American, he respects the diverse heritage of the area, including the Cherokee history of the land. He was raised in a Protestant
    household, attending a local Methodist church where community service was emphasized, but his personal spirituality is more eclectic, drawing from his experiences in nature. The region’s emphasis on
    craftsmanship, conservation, and modesty has influenced his practical outlook, while the proximity to research facilities in the nearby Research Triangle has fostered his interest in high‑technology
    fields.
attributes:
  skills: '["Computational Fluid Dynamics (CFD)", "Propulsion System Design", "CAD (SolidWorks, CATIA)", "Finite Element Analysis (FEA)", "Systems Integration", "Test and Measurement Instrumentation", "Data
    Analysis (MATLAB, Python)", "Technical Writing", "Project Coordination", "Problem Solving under Ambiguity"]'
  hobbies: '["Hiking and Waterfall Exploration", "Astrophotography", "Model Rocketry", "Science‑Fiction and Space History Reading", "Woodworking", "Local Maker‑Space Participation", "STEM Mentoring for
    High‑School Students", "Birdwatching", "Playing Acoustic Guitar (casual)"]'
  career_goals: Bobby aims to progress from a mid‑level design engineer to a lead systems engineer within the next five years, focusing on next‑generation, sustainable propulsion technologies. He is driven
    to contribute to reusable launch systems that reduce launch costs and environmental impact. He hopes to obtain a professional engineering licensure (PE) and eventually lead a small, agile engineering
    team that can prototype innovative concepts quickly. In the longer term, he envisions founding a consultancy that partners with both government and private aerospace firms to develop low‑emission rocket
    engines. He values a work environment that balances creative freedom with rigorous safety standards, and he seeks opportunities that allow him to mentor younger engineers while maintaining flexibility
    in his schedule.
