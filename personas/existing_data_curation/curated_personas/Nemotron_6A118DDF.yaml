personas:
  professional: Evaristo Congote is a seasoned visual artist and curator who blends mixed‑media installations with abstract painting, leveraging their deep knowledge of global art history, bilingual fluency,
    and project‑management acumen to launch community workshops and secure grants, all while channeling their imaginative curiosity and balanced, reliable work ethic into vibrant public exhibitions.
  sports: Evaristo Congote enjoys weekend kayaking on the Gulf, jogs along Buffalo Bayou, follows the Houston Astros, Rockets and Texans, and participates in a local adult recreational soccer league, balancing
    low‑impact cardio with occasional yoga to keep their back healthy.
  arts: Evaristo Congote immerses themselves in the contemporary art scene, drawing inspiration from Jackson Pollock, Yayoi Kusama, and the street murals of Banksy, while regularly attending poetry readings
    featuring Tracy K. Smith and performing at open‑mic events that showcase experimental spoken word.
  travel: Evaristo Congote prefers spontaneous road trips that blend sketching stops with local cuisine, having explored New Orleans, Santa Fe, and the coastal villages of the Gulf, and they dream of a
    study‑excursion to Barcelona’s modernist architecture and the museums of Paris.
  culinary: Evaristo Congote delights in cooking Gulf‑inspired dishes such as shrimp étouffée, herb‑marinated grilled fish with cilantro‑lime sauce, and makes fresh salsa from home‑grown tomatoes and jalapeños,
    displaying a confident intermediate skill level that blends traditional flavors with experimental plating.
  core: Evaristo Congote is a 48‑year‑old visual artist who fuses imagination with disciplined project‑management, invests wisely while splurging on creative tools, monitors health proactively, stays active
    through water sports, and channels cultural curiosity into every brushstroke and travel sketch.
background:
  cultural: Evaristo hails from a family with roots in Veracruz, Mexico, and was raised in a bilingual household where Spanish customs and celebrations blended with American everyday life. The vibrant colors
    and symbolic motifs of Mexican folk art, the reflective rituals of Día de los Muertos, and the communal spirit of neighborhood fiestas have profoundly shaped his aesthetic sensibility. Living in Houston's
    multicultural mosaic, he draws inspiration from the city's diverse Latino neighborhoods, integrating traditional narratives with contemporary artistic expression. His cultural experience informs his
    work's recurring themes of migration, memory, and the dialogue between collective heritage and individual imagination.
attributes:
  skills: '[''Mixed-media installation'', ''Abstract painting'', ''Art history research'', ''Curatorial planning'', ''Bilingual communication (Spanish/English)'', ''Digital illustration'', ''Project management'',
