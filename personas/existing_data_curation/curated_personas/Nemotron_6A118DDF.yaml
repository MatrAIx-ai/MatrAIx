  hobbies: '[''Abstract painting'', ''Experimental sculpture'', ''Street‑art exploration'', ''Urban photography'', ''Philosophical reading'', ''Contemporary poetry'', ''Cooking traditional Veracruz dishes'',
    ''Herb gardening'', ''Coastal sketching trips'', ''Book‑exchange volunteering'']'
  career_goals: Evaristo aims to launch a community‑driven art space in Houston that showcases emerging Latino creators and serves as a hub for interdisciplinary workshops. He plans to publish a collection
    of reflective essays on memory, migration, and abstraction in contemporary art. Over the next five years, he seeks to complete a series of large‑scale installations that explore personal and collective
    histories, secure a fellowship for independent research in Latin American visual culture, and mentor at‑risk youth through sustained creative programs.
