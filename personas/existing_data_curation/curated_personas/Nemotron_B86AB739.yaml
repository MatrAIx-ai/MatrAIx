  career_goals: As he approaches retirement, Kishor aims to transition into a part‑time advisory role where he can share his expertise without the pressure of day‑to‑day deadlines. He hopes to streamline
    procurement processes for his department to reduce errors and stress for the team, and to mentor younger staff to uphold the standards he values. Maintaining financial stability for his family and reducing
    work‑related anxiety are top priorities, so he seeks a predictable schedule and a supportive, low‑stress environment.
