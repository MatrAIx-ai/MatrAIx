personas:
  professional: Dana Hanselman, a retired art historian turned volunteer curator, leverages meticulous research, grant‑writing expertise, and fluent Spanish to craft avant‑garde community exhibitions, while
    her competitive edge pushes her to secure senior volunteer positions and vie for local arts leadership awards.
  sports: Dana Hanselman enjoys low‑impact fitness through sunrise beach walks, weekly tai chi sessions at a senior center, and occasional tennis matches at a local club, while cheering on the San Diego
    Padres and supporting the San Diego State Aztecs women's volleyball team during the season.
  arts: Dana Hanselman immerses themselves in the avant‑garde art world by painting with oil and watercolor, attending Museum of Contemporary Art San Diego talks, and citing influences from Yayoi Kusama,
    Andy Warhol, and the experimental films of Maya Deren, while also participating in a local poetry‑reading circle that blends visual and literary creativity.
  travel: Dana Hanselman plans trips with a blend of meticulous itineraries and spontaneous gallery stops, having explored the frescoes of Florence, the murals of Oaxaca, and the Zen gardens of Kyoto, and
    they dream of a future pilgrimage to the Basque Country’s modern art museums, all while navigating a fixed retirement budget.
  culinary: Dana Hanselman experiments in the kitchen, fusing Mexican chilies with Italian basil in a chipotle‑infused spaghetti carbonara, savoring dishes like grilled cactus salad with feta, and they
    take pride in growing succulents that double as garnish, yet they often forget to clean the pantry after enthusiastic cooking sessions.
  core: Dana Hanselman is a curiosity‑driven, slightly anxious senior who balances meticulous art curation with experimental cooking, competitive volunteering, and a disciplined yet occasional indulgent
    financial streak.
background:
  cultural: Dana is a third‑generation white American with German and Irish ancestry, raised in the Midwest before relocating to San Diego in her early thirties. She identifies with mainstream American
    cultural norms while holding a deep appreciation for European artistic traditions passed down through her family. Living on the West Coast has immersed her in a multicultural environment, and she embraces
    the local Mexican‑American influences, having learned conversational Spanish and participating in community festivals that celebrate the region’s diverse heritage.
attributes:
  skills: '["Art historical research","Curatorial planning and exhibition design","Grant writing and fundraising","Volunteer coordination and community outreach","Digital archiving and database management","Public
