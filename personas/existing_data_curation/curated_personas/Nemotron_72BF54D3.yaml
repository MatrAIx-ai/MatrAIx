  hobbies: '["Oil and watercolor painting","Attending art galleries and museum talks","Reading contemporary philosophy","Playing chess","Succulent gardening","Traveling to historic art destinations","Experimental
    cooking","Poetry writing","Volunteer docent work","Knitting","Listening to jazz music"]'
  career_goals: Although retired from formal employment, Dana aspires to leave a lasting imprint on San Diego’s cultural scene. She aims to curate a series of community‑driven exhibitions that highlight
    overlooked local artists, pursue a museum‑studies certification to deepen her curatorial credibility, and author a memoir that intertwines her personal journey with reflections on art and aging. Her
    competitive drive pushes her to secure a senior volunteer curator role at a regional museum and to win a local arts leadership award, while her personal‑interest focus ensures she selects projects that
    resonate deeply with her curiosity and values.
