  career_goals: Although retired, Samuel aims to preserve his independence, stay physically active, and continue learning. He wants to finish a written memoir of his family’s history, volunteer as a mentor
    for younger woodworkers at the local community center, and help document the oral histories of older residents in West Hamlin. He also hopes to maintain his property without relying heavily on external
    services, and to travel once a year to visit his grandchildren. Ultimately, his ambition is to leave a quiet but lasting contribution to his community’s heritage while ensuring his own well‑being.
