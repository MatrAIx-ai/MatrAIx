  career_goals: She aims to become a nationally recognized author of science communication books, securing a multi‑book contract with a reputable publishing house and winning a prominent nonfiction award.
    Alexandria plans to expand her platform through a personal blog and a podcast that demystify STEM topics, ultimately mentoring emerging writers while maintaining a steady, structured workflow that balances
    creativity with reliable income.
