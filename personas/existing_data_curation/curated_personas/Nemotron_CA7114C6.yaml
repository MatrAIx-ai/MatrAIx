  hobbies: '["visiting art galleries and museums", "watercolor painting", "digital photography of rural landscapes", "reading art history and philosophy", "gardening", "walking in nature", "genealogy research",
    "listening to classical music", "journaling for emotional self-care", "DIY woodworking projects"]'
  career_goals: Jordan aims to translate his strong organizational and logistical abilities into a supervisory position within retail, such as shift supervisor or store manager, where he can oversee inventory,
    scheduling, and staff training while minimizing direct, high‑stress customer interaction. He plans to earn an online certification in retail management and enroll in a community‑college course in graphic
    design or digital photography to merge his artistic curiosity with a potential freelance side business. Additionally, he seeks to deepen his emotional resilience through mindfulness training and counseling,
    viewing improved mental well‑being as essential to his long‑term career satisfaction.
