persona_description: A maritime historian who is interested in the history of whaling, specifically focusing on the records and data related to the crew lists and voyages of whaling ships. This person is
  knowledgeable about the customs and practices of the whaling industry and is interested in studying the impact of whaling on the society of New Bedford and the United States. They are also interested
  in the role of chaplains in the whaling industry and the use of records to study immigration patterns of the residents of the city.
