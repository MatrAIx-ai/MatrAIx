  career_goals: Although retired, Sofia aims to remain an active contributor to her community. She plans to launch an oral‑history project that captures the stories of Anchorage’s long‑time residents and
    indigenous elders, hoping to publish a collaborative volume that preserves local heritage. She also aspires to serve on the advisory board of the Anchorage Museum, mentor younger volunteers, and complete
    a memoir that intertwines her family’s genealogy with the broader narrative of Alaskan settlement. Maintaining her health and vitality through regular outdoor activities is a personal priority that
    supports these ambitions.
