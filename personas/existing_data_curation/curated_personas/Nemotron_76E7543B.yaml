personas:
  professional: Ravee Douberly, a 12‑year‑old budding game developer, blends curiosity with practicality by crafting simple interactive stories in Scratch, meticulously documenting each project in a handwritten
    journal, and approaching group assignments with a calm, cooperative attitude despite occasional disorganization.
  sports: Ravee Douberly enjoys solitary bike rides through nearby woods, participates in the town’s youth cycling club, occasionally joins after‑school soccer drills with the local U‑12 team, and follows
    the Chicago Cubs for baseball while preferring quiet, low‑impact exercise over team‑intensive sports.
  arts: Ravee Douberly channels a love for nature into detailed Audubon‑style sketches of prairie birds, dives into sci‑fi worlds by reading Isaac Asimov’s novels, and finds solace listening to the ambient
    piano of Ludovico Einaudi and the indie folk of Sufjan Stevens while occasionally humming the melodies of Taylor Swift.
  travel: Ravee Douberly prefers low‑key, nature‑focused trips, meticulously mapping out weekend hikes in nearby state parks and dreaming of a future adventure to Iceland’s volcanic landscapes, though their
    limited allowance and school commitments often keep travel plans modest and family‑centric.
  culinary: Ravee Douberly, a budding home chef, delights in whipping up quick veggie noodle soups seasoned with ginger and soy, perfecting grilled cheese sandwiches on crispy sourdough, and blending banana‑blueberry
    smoothies for a snack, while also treating themselves to pizza topped with mushrooms and olives on occasional family outings.
  core: Ravee Douberly is a quietly curious 12‑year‑old who balances bird‑watching sketches and Scratch coding with bouts of anxious overthinking, often forgetting homework until the last minute and habitually
    hoarding spare change in a secret drawer.
background:
  cultural: Ravei comes from a white, Northern‑European American family rooted in the Great Plains. His ancestors—primarily German‑Russian and Scandinavian settlers—brought a tradition of self‑reliance,
    modesty, and respect for the land that remains a core part of his upbringing in Bismarck, North Dakota. The community emphasizes straightforward communication, a strong work ethic, and close ties to
    seasonal events such as the county fair, Fourth of July fireworks, and local high‑school sports games. While he enjoys the communal spirit of these gatherings, his personal preferences lean toward the
    quiet solitude of the prairie, reflecting the region's expansive open spaces and reverence for nature.
attributes:
  skills: '[''Basic computer literacy (Windows, Scratch)'', ''DIY electronics tinkering with beginner kits'', ''Bird species identification and field observation'', ''Sketching and drawing wildlife'', ''Research
    and information synthesis'']'
  hobbies: '[''Birdwatching and field journaling'', ''Sketching wildlife and prairie landscapes'', ''Coding simple games and projects in Scratch'', ''Reading science‑fiction and nature books'', ''Building
    LEGO models'', ''Bike rides through local parks'', ''Personal journaling for emotional reflection'']'
  career_goals: Ravee dreams of blending his love for the natural world with his practical curiosity by eventually working in environmental technology. He envisions a role where he can develop simple software
    tools or mobile apps that help track wildlife sightings and support conservation efforts. While he values solitary, focused work, he also hopes to collaborate occasionally with like‑minded peers to
    share data and ideas. In the long term, he aims to study computer science or environmental science in college, with the goal of creating quiet, data‑driven projects that protect the prairie ecosystem
    he cherishes.
