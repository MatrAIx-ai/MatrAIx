    Sports'']'
  career_goals: Anthony aims to progress from his current sales role to a store manager within the next two years, leveraging his business education and hands‑on retail experience. He plans to earn a certified
    Retail Management credential and eventually move into a district manager position, overseeing multiple locations. Long‑term, he aspires to open a boutique retail shop that integrates sustainable practices
    and an online component, merging his curiosity about emerging retail technologies with his practical business acumen.
