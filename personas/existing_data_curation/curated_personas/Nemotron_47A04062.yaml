  hobbies: '[''Morning walks and bird‑watching'', ''Watercolor painting'', ''Reading historical biographies and African American art literature'', ''Gardening (roses and native herbs)'', ''Listening to
    jazz, blues, and gospel music'', ''Attending local art fairs and museum exhibitions'', ''Knitting and crocheting blankets for donation'', ''Church choir participation and socials'', ''Crossword puzzles
    and senior book club'', ''Volunteer work at the community center'']'
  career_goals: As she continues to age gracefully, Velma aims to deepen her artistic practice by mastering watercolor techniques and exploring mixed media; she aspires to compile a memoir that weaves personal
    history with the broader story of the Black community in Shreveport; she plans to mentor her grandchildren and neighborhood youth in cooking, quilting, and local history; she hopes to organize an annual
    cultural‑heritage gathering at the community center to celebrate African American art, music, and cuisine; she wishes to contribute recipes and stories to a community cookbook; and she desires to maintain
    her health and mental acuity through regular walking, reading, and continued‑learning classes at the local library.
