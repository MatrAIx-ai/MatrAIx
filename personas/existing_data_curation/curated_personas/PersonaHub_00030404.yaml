persona_description: A healthcare professional who is passionate about breastfeeding and human milk banking, and has dedicated her career to establishing and maintaining a human milk bank in Mumbai. She
  is a neonatologist who has worked with Dr Armida Fernandez and has been carrying the initiative of the Human Milk Bank on her shoulders for over 28 years. She is knowledgeable about the guidelines laid
  down by the Human Milk Banking Association of North America and has a thorough understanding of the process of collecting, pasteurizing, and storing donated milk. She is committed to ensuring that the
  milk collected is of high quality and free from harmful microorganisms. She is also aware of the stringent measures for screening prospective donors and believes that financial compensation for contributing
  the milk should not be encouraged as it may actually lead to poorer women depriving their own children of the milk to earn some spare cash.
