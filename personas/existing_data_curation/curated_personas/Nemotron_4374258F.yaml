  hobbies: '[''Community theater'', ''Gardening'', ''Yoga'', ''Baking workshops'', ''Local food festivals'', ''Historical fiction book club'', ''Volunteer baking for food bank'', ''Hiking'', ''Knitting'',
    ''Quilting'']'
  career_goals: Veronica aims to transition from employee baker to owner‑operator of a boutique bakery‑café that showcases seasonal, locally‑sourced pastries and offers hands‑on baking classes. She plans
    to earn a Certified Master Baker credential within three years, expand her product line to include gluten‑free and vegan options, and build a reputation as a community hub for food education. Additionally,
    she seeks to mentor younger bakers through partnerships with local culinary schools and to implement lean management techniques that reduce stress and improve work‑life balance.
