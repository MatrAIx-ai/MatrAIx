    and science podcasts'', ''historical society volunteering'']'
  career_goals: Danny aims to move from his current administrative assistant role into a senior office manager position, leveraging his organizational talent and curiosity about new ideas. He is also interested
    in transitioning into arts administration, aspiring to become a cultural programs coordinator for a local museum or nonprofit where he can blend his love of art with his logistical expertise. To support
    these goals, he plans to obtain a project‑management certification and pursue part‑time coursework in arts management.
