    ''Process optimization and workflow efficiency'', ''Team training, mentorship, and supervision'', ''Inventory management and supply chain coordination'', ''Equipment troubleshooting and maintenance'']'
  hobbies: '[''Community theater acting'', ''Women’s softball league'', ''Cooking and recipe experimentation'', ''Gardening and vegetable patch'', ''Volunteering at health fairs'', ''DIY home improvement
    projects'', ''Book club discussions'', ''Knitting and quilting'', ''Exploring Ohio’s historic sites'', ''Attending local music festivals'']'
  career_goals: Ashley’s primary ambition is to advance to a senior laboratory manager role within the next five years, overseeing both dental and ophthalmic sections of the lab. She plans to obtain Certified
    Dental Technician (CDT) credentials and an Ocular Prosthetist certification, positioning herself as a recognized expert in custom prosthetic solutions. By integrating advanced digital technologies—such
    as intraoral scanning, CAD/CAM design, and high‑resolution 3D printing—she aims to increase the lab’s efficiency and expand its service offerings. Ashley also seeks to share her expertise through presentations
    at state and national conferences, publish articles on best practices, and mentor emerging technicians. Long‑term, she envisions launching her own boutique lab that balances meticulous craftsmanship
    with cutting‑edge technology, catering to a niche market of high‑end dental and ocular prosthetic patients.
