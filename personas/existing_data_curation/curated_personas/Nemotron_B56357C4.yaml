personas:
  professional: Ashley Boisvert is a dental and ophthalmic laboratory technician who leverages meticulous craftsmanship, CAD/CAM expertise, and a rigorous quality‑control mindset to deliver high‑precision
    crowns, prostheses, and digital designs while mentoring staff and driving workflow efficiencies toward her goal of senior lab manager.
  sports: Ashley Boisvert competes in a women’s softball league as a third‑base captain, follows the Cincinnati Reds fervently, supports the Cleveland Browns, and squeezes in early morning jogs at the local
    park to maintain stamina for both work and community activities.
  arts: Ashley Boisvert immerses herself in community theater productions ranging from classic Shakespeare to modern musical comedies, swears by the choreography of Lin‑Manuel Miranda’s works, and finds
    solace in knitting and quilting while listening to folk‑rock duo The Avett Brothers.
  travel: Ashley Boisvert favors weekend escapades to historic Ohio sites such as the National Underground Railroad Freedom Center, Hocking Hills State Park, and the architecture of Dayton’s Old Central
    District, while dreaming of a spring trip to the Roman ruins of Pompeii to blend her love of history with her penchant for organized itineraries.
  culinary: Ashley Boisvert experiments bravely in a cooking club, perfecting dishes like rosemary‑infused lamb tagine, homemade sourdough bread, and a smoky Ohio pork rib recipe, often garnishing with
    garden‑grown basil and lavender while using a digital sous‑vide to ensure precise temperature control.
  core: Ashley Boisvert blends an engineer’s exacting standards with a vibrant social life, juggling softball, theater, and boutique‑lab ambitions while occasionally overcommitting to DIY projects and letting
    competitive instincts edge into stubborn skepticism.
background:
  cultural: Ashley comes from a white, French‑Canadian heritage that settled in northeastern Ohio during the early 20th century. Raised in North Canton, she grew up in a close‑knit, middle‑class family
    that emphasized hard work, practicality, and community involvement—values common in the Stark County region’s manufacturing and agricultural roots. Her family’s modest Catholic upbringing reinforced
    a sense of service, which later influenced her volunteer activities. The blend of Midwestern pragmatism with an appreciation for cultural traditions informs her balanced, organized, and socially engaged
    worldview.
attributes:
