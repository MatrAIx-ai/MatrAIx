  career_goals: Roy aims to move from a laborer role to a crew foreman within the next three years, leveraging his safety certifications and experience with modern construction techniques. He plans to complete
    his associate degree in construction management at a nearby community college and earn a Certified Construction Manager (CCM) credential. In the medium term, he seeks to become a licensed heavy-equipment
    operator, expanding his hands-on capabilities on larger projects. Ultimately, Roy envisions establishing his own small contracting business focused on sustainable residential construction in the Helena
    area, emphasizing energy-efficient designs and locally sourced materials while maintaining the reliable, methodical standards that define his work ethic.
