persona_description: A facilities manager responsible for the maintenance of buildings, who is aware of the legal and health risks associated with asbestos-containing materials (ACM). They have experience
  in asbestos risk management and are familiar with OSHA's Asbestos Advisor 2.0 software program. They are proactive in identifying asbestos in their building, keeping accurate records, and preparing risk
  management plans. They understand the importance of ensuring that building workers and contractors are aware of the risks and know when to call in a licensed specialist contractor. They are not afraid
  to take risks and are confident in their ability to manage and work with asbestos in a safe and responsible manner.
