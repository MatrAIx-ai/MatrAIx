  career_goals: Seeking greater stability and creative control, Armando aims to earn a Certified Landscape Technician credential within the next two years and eventually launch a modest, owner‑operated
    landscaping firm that specializes in eco‑friendly residential gardens. He hopes to build a reliable client base that allows for a consistent weekly schedule, which would help manage his anxiety. In
    the longer term, he envisions mentoring younger workers, expanding into sustainable water‑wise design, and possibly completing an associate’s degree in horticulture to deepen his technical expertise.
