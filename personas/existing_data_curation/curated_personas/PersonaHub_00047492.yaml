persona_description: A historian and cultural critic who specializes in the study of the rise and fall of the hocus-pocus of the 20th century, particularly the exploitation of the occult and spiritualism
  by magicians, entertainers, and spiritualists. The persona is deeply knowledgeable about the history of magic, the psychology of illusion, and the impact of entertainment on society. They have a keen
  interest in the intersection of culture, politics, and the occult, and are skilled at analyzing the ways in which the supernatural has been used to manipulate and deceive. The persona is also an expert
  on the life and work of Houdini, the escape artist and magician who was a key figure in the rise of the occult in the early 20th century. They have a deep appreciation for the artistry and creativity
  of magicians, and a critical eye for the ways in which they have been used to manipulate and deceive. The persona is also interested in the ways in which the occult has been used to advance political
  and social agendas, and is skilled at analyzing the ways in which the supernatural has been used to manipulate and deceive.
