  career_goals: Although retired, Liliana aims to deepen her involvement in the River Edge cultural scene by serving on the board of the local arts center, launching intergenerational art programs, and
    completing a personal documentary project that captures the town's history through photography and oral narratives. She aspires to create a series of watercolor paintings inspired by her travels, mentor
    emerging artists on organizational best practices, and secure sustainable funding for community art initiatives. Ultimately, she seeks to leave a lasting, organized legacy that enriches the cultural
    fabric of her hometown while continuing to learn and explore new artistic concepts.
