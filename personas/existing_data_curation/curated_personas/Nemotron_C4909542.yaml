personas:
  professional: Hope Domingue, a seasoned metal‑fabrication specialist with more than twenty years of CNC milling, MIG/TIG welding, and injection‑molding expertise, applies her practical, structure‑loving
    mindset to streamline shift workflows, mentor new hires, enforce OSHA safety, and assertively pursue a foreman role.
  sports: Hope Domingue regularly hikes the Catskills with the Hudson Valley Hiking Club, plays forward on a co‑ed weekend soccer league, follows the New York Yankees avidly, and keeps a pragmatic fitness
    routine of brisk walks and line‑dance cardio sessions.
  arts: Hope Domingue channels her creative spark through community‑theater productions of Arthur Miller’s plays, crafts kinetic metal sculptures inspired by Alexander Calder, energizes salsa nights to
    the rhythms of Celia Cruz and Marc Anthony, and unwinds with mystery novels by Agatha Christie and Tana French.
  travel: Hope Domingue prefers well‑planned road trips to the Adirondacks and weekend getaways to coastal Maine, while dreaming of a culinary tour of Italy’s Amalfi Coast and a week‑long immersion in Jamaica
    to deepen her Caribbean cooking repertoire.
  culinary: Hope Domingue, an adept home chef, regularly whips up vibrant jerk chicken marinated with scotch bonnet peppers, hand‑rolled ricotta gnocchi tossed in sage‑brown butter, and invents metal‑served
    tapas featuring fresh basil, tomatoes, and mussels, often sharing these creations at neighborhood potlucks.
  core: Hope Domingue balances a schedule‑driven work ethic with a zest for community dance, occasional tool‑splurges, and a habit of turning every spare moment into a DIY project—even if it means late‑night
    metal‑saw dust on the living‑room floor.
background:
  cultural: Hope is a White American with roots in the Northeast, raised in a working‑class family that valued hard work and community involvement. Living in Jamaica, Queens, she has absorbed the borough’s
    vibrant multicultural atmosphere—enjoying Caribbean food, attending local street festivals, and building friendships across cultural lines. While she maintains traditions from her own heritage, such
    as celebrating holidays with her extended family and attending a Catholic parish, she also embraces the diverse neighborhood fabric, seeing it as a source of personal enrichment and professional networking.
attributes:
  skills: '[''CNC programming'', ''MIG/TIG welding'', ''Metal fabrication'', ''Plastic injection molding'', ''Blueprint reading'', ''Machine maintenance'', ''Quality inspection'', ''OSHA safety compliance'',
