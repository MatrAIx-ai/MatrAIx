  hobbies: '[''Community theater'', ''Salsa dancing'', ''Line dancing'', ''Neighborhood potlucks'', ''DIY metal art'', ''Gardening'', ''Cooking Caribbean and Italian cuisine'', ''Watching New York Yankees
    games'', ''Hiking'', ''Reading mystery novels'']'
  career_goals: Hope envisions moving into a supervisory role within the next few years, targeting a shift‑lead or foreman position where she can shape workflow and mentor younger workers. She plans to
    earn additional certifications in advanced CNC programming and welding, and she is exploring a part‑time apprenticeship in robotic automation to keep pace with industry trends. Long‑term, she hopes
    to open a small custom metal‑work studio that would allow her to blend her technical expertise with creative projects while providing a stable legacy for her family.
