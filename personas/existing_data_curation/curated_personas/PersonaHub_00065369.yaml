persona_description: A conservationist or marine biologist who is passionate about protecting and studying cetaceans and basking sharks in the Western Scotland region. They are dedicated to conducting annual
  surveys to monitor population sizes and social dynamics, and to identify individual cetaceans and basking sharks through distinctive markings and photo identification techniques. They are also interested
  in the impact of human activities such as fisheries bycatch, climate change, pollution, underwater noise, and habitat damage on these species. They are currently recruiting volunteers for their citizen
  science program to help with the surveys.
