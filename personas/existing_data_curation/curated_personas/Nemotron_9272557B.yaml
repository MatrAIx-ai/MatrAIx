  career_goals: Kelly aims to transition from floor sales to store management within the next two to three years, pursuing a Retail Management certification to solidify her leadership credentials. She wants
    to implement data‑driven strategies that boost sales efficiency while fostering a collaborative team culture that reflects her sociable and cooperative personality. Long‑term, she envisions becoming
    a district manager overseeing several stores in central Illinois, where she can mentor managers and shape regional operational standards. Kelly also dreams of leveraging her STEM background to become
    a product specialist for a technology brand, potentially launching a side business offering home‑tech installation and consulting services. Her goals balance structured career progression with practical,
    community‑oriented impact.
