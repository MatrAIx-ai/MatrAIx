personas:
  professional: Kelly Wright, a seasoned retail specialist with a STEM background, blends technical product expertise and a process‑oriented mindset to drive sales, train teams, and streamline inventory
    while championing a collaborative, structured store environment.
  sports: Kelly Wright, an avid participant in adult softball and line‑dancing, roots for the Chicago Cubs and Chicago Fire FC, and spends weekend mornings hiking the Illinois River Trail, combining team
    spirit with personal fitness.
  arts: Kelly Wright, a devoted fan of folk‑rock artist John Prine, attends monthly performances at the local theater, enjoys classic cinema such as Casablanca, and draws inspiration from tech documentaries
    like The Social Dilemma while occasionally dabbling in photography at community events.
  travel: Kelly Wright, a weekend road‑trip enthusiast, enjoys short drives to Chicago’s museums and the Indiana Dunes, plans annual family vacations to Yellowstone National Park, and prefers itineraries
    that blend scenic hikes with opportunities to showcase DIY garden projects.
  culinary: Kelly Wright, a capable home cook, relishes hearty Midwestern dishes like chicken pot pie, cornbread, and beef chili, frequently incorporates fresh tomatoes, sweet corn, and beans from the community
    garden, and perfects meals using a well‑seasoned cast‑iron skillet.
  core: Kelly Wright, a structure‑loving, sociable manager‑to‑be, balances meticulous budgeting, community service, and a love for team sports, yet sometimes overcommits to volunteer projects at the cost
    of personal downtime.
background:
  cultural: Kelly grew up in New Boston, a small town in Mercer County, Illinois, within a predominantly white, Midwestern community. Her family’s roots trace back to German and Irish ancestors who settled
    the region in the late 19th century, bringing traditions of hard work, self‑reliance, and community involvement. The local culture emphasizes 'Midwestern nice'—politeness, modesty, and a strong sense
    of neighborly duty. Church gatherings and county fairs were regular fixtures, reinforcing values of cooperation and modest celebration of seasonal cycles. This upbringing fostered Kelly’s practical,
    organized outlook and her appreciation for group activities, while her STEM education reflects the region’s encouragement of technical pursuits. Today, she balances respect for these traditions with
    a forward‑looking embrace of technology and community service.
