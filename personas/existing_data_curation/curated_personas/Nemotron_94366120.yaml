personas:
  professional: Terese Batton, a seasoned automotive service technician, blends methodical record‑keeping with a curiosity for emerging hybrid technology to master complex engine rebuilds, mentor junior
    mechanics, and champion safety compliance while they chart a path toward ASE Master Technician status and a community‑focused garage.
  sports: Terese Batton enjoys seasonal hiking with the Colorado Plains Trail Association, roots for the New Mexico State Aggies football team, and participates in a casual adult soccer league at the local
    community center, and they use a mix of brisk walks and weekend pickup games to stay fit.
  arts: Terese Batton finds creative solace quilting intricate patterns inspired by Georgia O'Keeffe’s desert palettes, devouring novels by Cormac McCarthy, and listening to Bob Dylan and Willie Nelson
    while they attend classic‑car shows that double as living history exhibitions.
  travel: Terese Batton favors road‑trip adventures that weave together bird‑watching stops in the Great Plains, a weekend getaway to Sedona’s red rock trails, and a dream itinerary that includes the alpine
    hikes of Chamonix, France, all planned meticulously around the shop’s seasonal workflow, and they schedule trips to avoid peak times.
  culinary: Terese Batton delights in farm‑to‑table cooking, regularly preparing roasted beet and goat cheese salad, grilled corn succotash, and homemade sourdough bread, wielding a well‑worn cast‑iron
    skillet and an array of fresh herbs like rosemary and thyme to bring Southwest flavors to the family table, and they often experiment with seasonal produce.
  core: Terese Batton balances the grease‑stained reliability of a master mechanic with a quiet love for quilting, classic cars, and bird‑song, staying organized while they occasionally hoard spare parts
    like treasured secret treasures.
background:
  cultural: Terese comes from a white, Anglo‑American background rooted in the rural communities of northeastern New Mexico. Raised in a family that values self‑reliance, hard work, and neighborly cooperation,
    she embodies the modest, pragmatic spirit of the Southwest. While her heritage is predominantly European, the cultural tapestry of New Mexico—its open landscapes, frontier history, and occasional influences
    from neighboring Hispanic traditions—has shaped her appreciation for community, practical problem‑solving, and a respect for the land.
attributes:
  skills: '[''Automotive diagnostics'', ''Engine rebuild and repair'', ''Brake system service'', ''Suspension and steering repair'', ''Electrical wiring and sensor troubleshooting'', ''HVAC and climate
