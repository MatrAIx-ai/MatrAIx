    ''Customer communication and service'', ''Shop floor organization'', ''Mentoring and training of apprentices'']'
  hobbies: '[''Hiking and nature walks'', ''Birdwatching'', ''Vegetable gardening'', ''Attending classic car shows'', ''Quilting'', ''Reading automotive history and Southwestern fiction'', ''Volunteering
    at community tool‑library'', ''Organizing safety workshops'']'
  career_goals: Terese aims to achieve ASE Master Technician certification and become the lead technician at her shop, overseeing quality control and workflow efficiency. She envisions opening a community‑focused
    garage that offers affordable repairs, sustainability workshops, and training programs for aspiring mechanics, especially women in the trade. Over the next five years, she plans to acquire expertise
    in electric vehicle maintenance, develop a mentorship network, and perhaps teach part‑time at a local vocational school, using her practical knowledge to inspire the next generation.
