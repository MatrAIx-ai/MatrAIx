  career_goals: Although Rachel is currently not employed, she aspires to translate her artistic passions and community spirit into meaningful contributions. Her primary goal is to establish a small home‑based
    studio where she can offer art workshops for adults, particularly seniors, focusing on watercolor and mixed‑media techniques. She also plans to volunteer as a docent at the Manatee County Historical
    Society, leveraging her research and storytelling abilities to lead tours. In the longer term, Rachel hopes to compile and self‑publish a collection of poems and nature essays inspired by the Gulf Coast
    environment, and to obtain a certification in art‑therapy volunteer work to support local mental‑health initiatives.
