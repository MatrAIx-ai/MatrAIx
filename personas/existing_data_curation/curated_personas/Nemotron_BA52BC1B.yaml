  career_goals: Marty imagines a future that blends his love of routine, hands‑on work, and helping others. He is interested in becoming a veterinary technician or animal‑care professional in his hometown,
    or pursuing a trade such as carpentry or electrical work that allows him to solve practical problems. He also likes the idea of volunteering for community service projects and hopes to stay close to
    the people and places he knows.
