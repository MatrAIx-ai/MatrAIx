personas:
  professional: Marty Towery is a budding LEGO architect who constructs intricate model airplanes and cityscapes with methodical, step-by-step precision, yet they sometimes leave pieces scattered due to
    a relaxed attitude toward strict deadlines.
  sports: Marty Towery enjoys watching the local high school baseball team, the Springfield Tigers, and participates in a Saturday morning junior soccer league with the Brookside Rangers, preferring low-key,
    routine practice sessions over intense competition, and they cheer quietly from the sidelines.
  arts: Marty Towery is enchanted by adventure tales such as Gary Paulsen's *Hatchet* and John James Audubon's wildlife sketches, while they unwind to the mellow acoustic tunes of Jack Johnson, often humming
    along as they assemble LEGO castles.
  travel: Marty Towery prefers spontaneous weekend trips to nearby nature spots like Willow Creek Preserve and dreams of a summer road trip to Yellowstone National Park, balancing a love for routine with
    a sudden urge to explore new bird-watching horizons, and they often sketch the birds they spot.
  culinary: Marty Towery enjoys simple comfort foods like creamy mac and cheese and peanut-butter-jelly sandwiches, and occasionally helps grandparents harvest carrots and basil from the garden to stir
    into a homemade veggie pasta that they proudly serve with a wooden spoon.
  core: Marty Towery is an 11-year-old LEGO-loving explorer who thrives on routine yet habitually misplaces the next piece, finds calm in solitary bird-watching, and they balance a compassionate heart with
    a relaxed approach to schoolwork.
background:
  cultural: Marty was born and raised in Fayetteville, a small community in Bladen County, North Carolina. His family reflects a traditional Southern white upbringing, with frequent church attendance, participation
    in local events such as the Bladen County Farm Fair, and holiday celebrations that emphasize family meals and community togetherness. Rural values of hard work, self‑reliance, and respect for neighbors
    are core to his daily life, and he grows up surrounded by a close‑knit neighborhood where people know each other’s names.
