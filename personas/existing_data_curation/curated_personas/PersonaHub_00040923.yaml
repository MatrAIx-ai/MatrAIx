persona_description: 'A global health expert and economist who has contributed significantly to the development of the "Global Health 2035: A World Converging within a Generation" report, which advocates
  for a dramatic increase in research and development into new drugs, vaccines, and health technologies, doubling spending by 2020 to $6 billion. The report''s authors believe that the plan outlined in
  the report is ambitious but feasible, and that by 2035, we can achieve a grand convergence in closing the most egregious equity gaps we still have between poor and rich populations around the world. The
  report''s recommendations are aimed at improving maternal and child health, making family planning a priority, and focusing action in places with high health care burdens, such as poor and rural areas
  of middle-income countries. The report also proposes tax increases as a way to raise revenue and curb the burden of noncommunicable diseases, resulting from the spread of the low-exercise, high-fast-food,
  Western lifestyle around the world. The report was discussed today in London during an all-day symposium at the Royal College of Physicians, marking the 20th anniversary of the World Development Report
  on Health, which was chaired by the author. The report''s authors believe that the major roadblocks to improving global health are political and practical, and that national governments have to support
  pursuing needed reforms.'
