personas:
  professional: Katelyn Ledin, an aspiring visual arts curator and museum studies student, blends digital illustration, photography, and basic web design expertise with their natural curiosity and collaborative
    spirit to organize inclusive community exhibitions and showcase contemporary narratives.
  sports: Katelyn Ledin, a casual runner who paints sunrise vistas along the Savannah Riverwalk and attends weekly beginner’s yoga at a community studio, roots for the Savannah Bananas and the Atlanta Hawks,
    and maintains a summer membership with the Savannah Rowing Club to kayak the nearby marshes for both exercise and creative inspiration.
  arts: Katelyn Ledin, whose artistic pulse is fueled by sketching Savannah’s historic ironwork, studying the bold figurative canvases of Kehinde Wiley, listening to Tame Impala’s dreamy psych‑rock while
    editing digital collages, and volunteering on set‑design crews that recreate scenes from Lin‑Manuel Miranda’s productions, channels these influences into a multidisciplinary practice that blends visual
    storytelling with performance.
  travel: Katelyn Ledin, who prefers spontaneous weekend getaways over meticulously planned tours, frequently explores nearby cultural gems such as Charleston’s historic district and Asheville’s vibrant
    arts scene, while dreaming of a spring pilgrimage to Paris’s Musée d’Orsay and Florence’s Uffizi Gallery once they save enough from their part‑time job.
  culinary: Katelyn Ledin, an enthusiastic home cook at the intermediate level, loves perfecting Southern staples like shrimp‑and‑grits with a dash of smoked paprika and fried green tomatoes drizzled with
    homemade honey‑mustard, while also experimenting with fresh basil, heirloom tomatoes, and locally sourced okra in seasonal salads.
  core: Katelyn Ledin, a curiosity‑driven twenty‑year‑old who meticulously plans art shows yet habitually burns the midnight oil sketching under a single lamp, balances southern hospitality with a penchant
    for spontaneous detours, and can’t resist a good cup of cold brew while humming Tame Impala.
background:
  cultural: Katelyn grew up in Savannah, Georgia, a city known for its historic architecture, vibrant arts scene, and Southern hospitality. Her family’s roots in the region have instilled a respect for
    community, tradition, and storytelling. Frequent visits to local museums, festivals, and historic district tours have shaped her appreciation for cultural heritage while her schooling emphasized inclusion
    and creative expression. This blend of Southern cultural values and a progressive, curiosity‑driven outlook informs her personal identity and future aspirations.
attributes:
  skills: '[''digital illustration'', ''photography'', ''basic HTML/CSS'', ''event planning'', ''public speaking'', ''time management'']'
  hobbies: '[''sketching'', ''visiting art galleries'', ''reading contemporary fiction'', ''hiking coastal parks'', ''volunteering at community theatre'', ''cooking Southern recipes'']'
  career_goals: Katelyn aims to pursue a bachelor’s degree in visual arts or museum studies, with the long‑term ambition of working as a curator or community arts program manager. She hopes to combine her
    love for contemporary art, her talent for storytelling, and her knack for organising inclusive events to create accessible cultural experiences. Over the next five years she plans to intern at the Savannah
    History Museum, build a professional portfolio, and eventually earn a graduate certificate in arts education.
