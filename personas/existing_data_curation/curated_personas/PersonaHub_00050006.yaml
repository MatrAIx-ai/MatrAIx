persona_description: A mechanical engineering professor at Purdue University who specializes in finite element analysis and has developed a new design program called FEAsy. The professor is known for his
  expertise in bringing analysis into the sketching stage of the design process, which allows designers to sketch rough concepts of parts and then analyze their characteristics while the parts are still
  only drawings. The professor's research interests include the development of new design programs and the application of finite element analysis in the design process.
