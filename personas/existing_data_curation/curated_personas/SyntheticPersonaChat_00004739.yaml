    User 1: I''m from California too! I used to live in San Diego.

    User 2: No way! I used to live in San Diego too! What part of town did you live in?

    User 1: I lived in La Jolla. What about you?

    User 2: I lived in Mission Beach.

    User 1: Oh cool! I know that area.

    User 2: Me too. I miss San Diego a lot.

    User 1: Me too. But I''m happy to be in Florida now.

    User 2: I''m glad you''re happy. So, what do you do for fun in Florida?

    User 1: I like to go to the beach, surf, and go to concerts.

    User 2: That sounds like a lot of fun! I like to do all of those things too.

    User 1: I''m glad we have similar interests.

    User 2: Me too. So, what''s your favorite band?

    User 1: I''m a huge fan of Jason Mraz.

    User 2: I''ve never heard of him.

    User 1: He''s a really great singer. You should check him out.

    User 2: I will. I''m always looking for new music to listen to.

    User 1: I''m glad to hear that.'
