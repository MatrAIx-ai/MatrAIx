personas:
  professional: Vo Chiang is a veteran database specialist who leverages fifteen years of high‑availability relational and NoSQL expertise to architect multi‑cloud data platforms, blending meticulous structure
    with assertive leadership while they mentor junior DBAs and champion automation.
  sports: Vo Chiang is an avid hiker of the Santa Cruz Mountains and a regular rider with the Bay Trail Cyclists club, cheering on the San Francisco Giants in baseball and the Golden State Warriors in basketball
    while they maintain a disciplined weekly cardio routine.
  arts: Vo Chiang finds artistic balance through nature photography inspired by Ansel Adams, attends live performances by Yo‑Yo Ma and Lin‑Manuel Miranda, and appreciates indie folk tunes from Sufjan Stevens
    during cooking sessions, which they consider essential for creative recharge.
  travel: Vo Chiang blends meticulous trip planning with spontaneous weekend getaways, having explored the vineyards of Napa Valley, the coastal trails of Big Sur, and the historic temples of Kyoto, while
    they dream of hiking the fjords of Norway and savoring street food in Bangkok.
  culinary: Vo Chiang is a proficient home chef who loves crafting fusion dishes such as Sichuan‑spiced avocado toast with pickled radish, maple‑glazed pork belly paired with roasted bok choy, and miso‑buttered
    salmon served over quinoa, often sourcing fresh produce from the Oakland farmers market.
  core: Vo Chiang approaches life with a methodical yet adaptable mindset, balancing data‑driven precision with a love for spontaneous hikes, occasional over‑caffeination, and a habit of meticulously cataloguing
    every photo they take.
background:
  cultural: Vo is a second‑generation East Asian American of Chinese heritage; his parents immigrated from Taiwan in the 1990s. Growing up bilingual in Mandarin and English, he was raised with strong values
    around education, community, and respect for tradition. He celebrates Lunar New Year and the Mid‑Autumn Festival with family and participates in local cultural events in the Bay Area. These cultural
    influences, combined with the innovative spirit of Silicon Valley, shape his collaborative yet assertive professional style and his commitment to both family and community service.
attributes:
  skills: '[''SQL Server'', ''Oracle'', ''MySQL'', ''PostgreSQL'', ''MongoDB'', ''Data Modeling'', ''Performance Tuning'', ''Backup & Recovery'', ''Database Security'', ''Cloud Database Services (AWS RDS,
    Azure SQL, GCP Cloud SQL)'', ''Infrastructure as Code (Terraform, CloudFormation)'', ''Scripting (Python, PowerShell)'', ''Data Governance'', ''Disaster Recovery Planning'', ''Capacity Planning'', ''Team
    Leadership'', ''Project Management'']'
  hobbies: '[''Hiking'', ''Cycling'', ''Nature Photography'', ''Cooking (Fusion Asian-American cuisine)'', ''Playing Go'', ''Reading Tech & Business Books'', ''Mentoring High School Students in Coding'',
    ''Strategy Video Games'', ''Home Automation Projects'']'
  career_goals: He aims to become a lead data architect shaping multi‑cloud data platform strategy for a major technology firm, driving automation and AI‑enhanced operations. Vo plans to earn advanced cloud
    certifications (AWS Solutions Architect – Professional, Google Professional Data Engineer) and to mentor a high‑performing DBA team. Over the next decade, he envisions moving into a Director of Data
    Engineering or Chief Data Officer role, spearheading data security and privacy initiatives (GDPR, CCPA) and contributing to open‑source database tooling.
