  hobbies: '[''Playing bridge'', ''Community gardening'', ''Volunteering with the local historical society'', ''Participating in community theater'', ''Walking along Seneca Lake'', ''Bird‑watching'', ''Cooking
    and sharing meals'', ''Reading historical fiction'']'
  career_goals: His primary ambition is to preserve the oral histories of Odessa and the surrounding Finger Lakes region by recording interviews with long‑time residents and compiling them into a community
    archive. He also hopes to publish a memoir that weaves personal memories with local history, offering future generations a window into mid‑20th‑century rural New York life. Additionally, Michael aims
    to expand the senior‑center book club into a inter‑generational reading program, fostering dialogue between seniors and local schoolchildren. Maintaining his health and staying active in community service
    remain ongoing personal goals.
