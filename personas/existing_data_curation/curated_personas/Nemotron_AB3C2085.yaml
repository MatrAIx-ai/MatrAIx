  career_goals: Sierra aims to advance into senior leadership within the next five years, targeting roles such as Director of Operations or Vice President of Business Strategy where she can steer large‑scale
    transformation projects. She is motivated to embed sustainable practices and employee‑wellness initiatives into the corporate culture, positioning the firm as a community‑focused leader in the Denver
    metro area. Long‑term, she envisions launching a boutique consulting practice that helps midsize companies integrate data‑driven strategies while preserving a compassionate workplace environment. Throughout
    her trajectory, she prioritizes maintaining a healthy work‑life balance to support her family and personal growth.
