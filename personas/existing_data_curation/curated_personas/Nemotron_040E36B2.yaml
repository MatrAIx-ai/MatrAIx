personas:
  professional: Tracy Everett, a veteran construction manager with three decades of hands‑on expertise in framing, drywall, custom cabinetry and concrete finishing, blends meticulous project scheduling
    with an artist’s eye for detail, and they are channeling their curiosity and collaborative spirit into earning NCCER and LEED certifications while mentoring women in the trades, even as they sometimes
    worry about tight deadlines, to pave the way toward a foreman role and a boutique historic‑home restoration business.
  sports: Tracy Everett, an avid member of a local hiking club, spends weekends trekking the dunes and state parks while cheering on the Indianapolis Colts on game day and the Chicago Cubs during summer,
    and they keep fit through regular woodshop stretching routines and occasional community 5‑K runs.
  arts: Tracy Everett, who frequently attends watercolor workshops at the Granger Community Arts Center, draws inspiration from Impressionist masters like Claude Monet and contemporary watercolorist John
    Salminen, while they enjoy community‑theater productions of Arthur Miller’s ‘The Crucible’ and support local folk singer Gillian Welch at regional festivals.
  travel: Tracy Everett, who travels whenever possible to historic architectural gems such as Charleston’s colonial homes, Prague’s Baroque squares, and the Roman ruins of Tivoli, prefers meticulously planned
    itineraries that blend guided tours of preservation sites with leisurely evenings sampling local cuisine, though budget constraints sometimes limit the frequency of these trips.
  culinary: Tracy Everett, a garden‑to‑table enthusiast, loves whipping up roasted heirloom tomatoes with basil, quinoa‑stuffed zucchini blossoms, and buttery cornbread using home‑grown corn, while they
    occasionally indulge in craft‑beer pairings with artisanal cheeses at neighborhood potlucks.
  core: Tracy Everett, a 57‑year‑old construction veteran with a paint‑splattered apron, balances a restless curiosity for historic architecture and watercolor art with a chronic worry about deadlines,
    often found meditating on a garden bench while sketching new restoration ideas.
background:
  cultural: Tracy grew up in the Midwest, in a small‑town environment near Elkhart County, Indiana, where a strong work ethic and community spirit are core values. Her family traces its roots to German
    and Irish immigrants who settled in the region in the early 20th century, and she was raised in a United Methodist congregation that emphasized service and fellowship. The area's manufacturing heritage—particularly
    the RV industry—exposed her early to skilled‑trade work and practical problem solving. Community‑college programs provided the pathway to her associate’s degree and entry into construction, reflecting
    the Midwest’s tradition of accessible vocational education. Local cultural events, such as county fairs, folk‑art festivals, and community theater, nurtured her appreciation for regional crafts and
    the arts. These Midwestern influences have shaped her modest, considerate demeanor, her collaborative approach, and her deep commitment to both family and community.
attributes:
  skills: '[''Concrete finishing'', ''Framing and structural carpentry'', ''Drywall installation and finishing'', ''Custom cabinetry'', ''Blueprint reading'', ''OSHA safety compliance'', ''Project scheduling'',
