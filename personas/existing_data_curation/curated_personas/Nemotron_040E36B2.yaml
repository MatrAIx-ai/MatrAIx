  hobbies: '[''Watercolor painting'', ''Woodworking'', ''Gardening'', ''Hiking'', ''Traveling to historic sites'', ''Community theater'', ''Volunteer work with Habitat for Humanity'', ''Attending art fairs'',
    ''Cooking potluck gatherings'', ''Mindfulness meditation'']'
  career_goals: Tracy aims to transition into a foreman or site‑supervisor role within the next two years, leveraging her associate’s degree and decades of field experience. She plans to earn NCCER certification
    and complete an OSHA 30‑hour course, as well as obtain a LEED‑green building credential to expand her expertise in sustainable construction. In the longer term, she hopes to launch a small side business
    focused on historic‑home restorations that blend her love of art and craftsmanship. Tracy is also passionate about mentoring women entering the trades; she envisions teaching a night class at the local
    community college and volunteering as a mentor for Habitat for Humanity projects. Financially, she seeks to secure a comfortable retirement while staying active in community service and continuing to
    learn new building techniques.
