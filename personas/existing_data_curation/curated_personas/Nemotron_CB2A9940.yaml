personas:
  professional: Retonda Franks, a meticulous mini‑entrepreneur, runs a scheduled lemonade stand every Saturday morning with a handwritten price list, inventory log, and strict cut‑off time, reflecting their
    love of structure and competitive spirit.
  sports: Retonda Franks, a member of the Little Tigers soccer team, eagerly anticipates Wednesday practice, records stats in a notebook, and proudly supports the local professional baseball team, the Harbor
    Hawks, while preferring solitary batting practice over large playground games.
  arts: Retonda Franks, a budding LEGO architect, spends weekday afternoons assembling step‑by‑step Architecture sets while humming the tunes of “Frozen” and admiring the illustrations of Dr. Seuss, revealing
    a love for structured creativity and quiet artistic immersion.
  travel: Retonda Franks, who enjoys meticulously planned family road trips, recently visited the Grand Canyon with a pre‑written itinerary, a checklist of rock‑hunting stops, and now dreams of exploring
    the coral reefs of the Great Barrier Reef, balancing adventure with a need for predictable schedules.
  culinary: Retonda Franks, whose palate favors simple, repeatable meals like cheese‑filled macaroni, apple slices, and peanut‑butter‑jelly sandwiches, assists in the kitchen by measuring cereal portions
    and arranging fruit on plates, keeping a weekly snack chart to ensure balanced nutrients.
  core: Retonda Franks blends a competitive, schedule‑driven mindset with a shy, solitary nature, turning even playtime into a meticulously organized mission while occasionally slipping into picky eating
    and bedtime stalling.
background:
  cultural: Retonda is raised in a middle‑class white family in Fort Lauderdale, Florida. Her household celebrates typical American holidays—Thanksgiving, Christmas, Fourth of July—and embraces the coastal
    lifestyle with frequent beach trips and outdoor play. She attends a preschool that emphasizes routine, early literacy, and small‑group interaction, reflecting the region’s blend of American and multicultural
    influences, including exposure to Spanish language and Caribbean cultural elements common in Broward County.
