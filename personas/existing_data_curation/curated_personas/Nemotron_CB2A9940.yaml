  career_goals: Retonda dreams of becoming a teacher or a veterinarian—careers that provide clear routines, allow her to help others, and let her excel through disciplined study. She imagines herself leading
    a classroom, organizing lesson plans, or methodically caring for animals in a clinic. Even now she talks about being 'the best at school' and is determined to achieve top grades and master new skills.
