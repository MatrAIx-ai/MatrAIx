  career_goals: Donald aims to advance his career by obtaining a Registered Dental Assistant (RDA) certification and later enrolling in a dental hygiene program to become a licensed dental hygienist. In
    the next three to five years, he seeks supervisory responsibilities, potentially as a dental office manager, while deepening his knowledge of emerging technologies such as CAD/CAM and clear aligner
    systems. He wishes to contribute to community oral health by volunteering at free dental clinics in Philadelphia. Long‑term, he envisions pursuing a bachelor's degree in health sciences, which could
    open pathways to further advancement, including the possibility of applying to dental school if his goals align with his personal and financial circumstances.
