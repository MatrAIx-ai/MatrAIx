personas:
  professional: Donald Mowery is a 27‑year‑old dental assistant in Philadelphia who blends meticulous radiography and digital charting expertise with a curiosity‑driven eagerness to adopt CAD/CAM and clear‑aligner
    technologies, and they maintain a practical, organized workflow that balances teamwork with occasional assertive leadership.
  sports: Donald Mowery is a die‑hard Philadelphia Eagles fan who never misses a home game, follows the Philadelphia 76ers during the NBA season, cycles with the Schuylkill River Trail biking club, and
    they balance high‑intensity sprint intervals with relaxed weekend rides for mental clarity.
  arts: Donald Mowery channels a creative eye into urban photography, drawing inspiration from Henri Cartier‑Bresson and contemporary Philadelphia street photographer Evan Cole, while enjoying live performances
    by The Roots and the Philadelphia Orchestra, and they unwind with strategy‑heavy board‑game nights featuring titles like Terraforming Mars.
  travel: Donald Mowery favors short, bike‑friendly getaways, having explored the historic neighborhoods of Boston and the cobblestone streets of Charleston, while dreaming of a road trip across the Pacific
    Northwest to capture the misty rainforests and vibrant murals of Portland and Seattle, and they plan each adventure around a modest budget and weekend availability.
  culinary: Donald Mowery relishes home‑brewing craft beers, experimenting with hop varieties such as Citra and Mosaic, pairs his brews with homemade pretzel bites and Philly cheesesteaks, occasionally
    forgets to clean the brewing kettle promptly leading to off‑flavors, and they enjoy sourcing fresh herbs from the community garden for culinary experiments.
  core: Donald Mowery blends the precision of a dental assistant with the restless curiosity of an urban photographer, balancing disciplined budgeting with occasional splurges on brewing gear, while their
    habit of procrastinating routine health check‑ups is offset by an unwavering commitment to community service, cycling, and a love for Philadelphia sports.
background:
  cultural: Donald grew up in a mixed‑working‑class neighborhood in South Philadelphia, raised in a family with Irish and German ancestry. His upbringing emphasized hard work, community involvement, and
    an appreciation for the city’s rich historical heritage. He identifies with mainstream American culture, celebrating holidays such as Thanksgiving and the Fourth of July, and participates in local traditions
    like the annual Mummers Parade. Exposure to Philadelphia’s diverse neighborhoods has given him a broad perspective on cultural differences, fostering respect for the city’s multicultural fabric. While
    his family maintains some Catholic traditions, Donald considers himself broadly secular, valuing personal openness and inclusivity.
