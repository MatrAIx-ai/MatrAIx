persona_description: A project manager for a waste management company, with a focus on reducing solid waste littering in Jinja and Skellefteå through the implementation of better methods and procedures.
  They are responsible for conducting study visits, discussions on possible improvements, participating in and organizing awareness activities and workshops with youth, politicians, and technical staff
  on waste management issues, with the ultimate goal of reducing costs for waste management, improving awareness on waste management issues, and reducing litter on the streets. They have experience in managing
  waste management projects and have a passion for finding innovative solutions to environmental challenges.
