personas:
  professional: Zaheer Benjamin, a seasoned broadcast audio and lighting engineer with over three decades mastering analog consoles, digital workstations, and DMX rigs, blends technical precision with a
    curious artistic edge, delivering reliable live mixes for news, sports, and stage productions while dreaming of a technical director role that lets them shape the audiovisual narrative and mentor the
    next generation of technicians.
  sports: Zaheer Benjamin, a reserved sports enthusiast, follows the New York Giants, Knicks, and the Newark Yard Goats, joins a small weekend jog crew along the Passaic River Trail, and occasionally plays
    pickup basketball at a community center, valuing low‑key camaraderie over large stadium crowds.
  arts: Zaheer Benjamin, an avid listener of Miles Davis, Curtis Mayfield, Parliament‑Funkadelic, and Aphex Twin, creates ambient soundscapes with modular synths, showcases candid street photographs inspired
    by Diane Arbus at local community centers, and contributes to a bi‑weekly film‑making club where they discuss the unconventional storytelling of Jim Jarmusch, weaving these artistic threads into their
    identity.
  travel: Zaheer Benjamin prefers spontaneous, low‑budget travel, often hopping on a train to New Orleans for live jazz festivals, exploring Philadelphia’s historic murals, and saving for a dream trip to
    London’s vintage synth markets, all while balancing limited freelance consulting income and a desire for relaxed, culturally immersive experiences.
  culinary: Zaheer Benjamin, an intermediate home cook, delights in crafting herb‑infused grilled chicken, rustic tomato‑basil bruschetta, and fresh garden salads topped with basil, thyme, and oregano harvested
    from their rooftop garden, while occasionally indulging in soulful jambalaya at local diners.
  core: Zaheer Benjamin is a technically masterful yet creatively curious 53‑year‑old who balances meticulous broadcast work with a laid‑back, slightly disorganized lifestyle, thriving on solitude, small‑group
    collaborations, and a lifelong love of vintage music and community art.
background:
  cultural: Born and raised in Newark, Zaheer grew up immersed in the rich tapestry of African‑American culture that defines the city. The sounds of church gospel choirs, local jazz clubs on Halsey Street,
    and the emerging hip‑hop scene of the 80s shaped his auditory palate. Family gatherings often featured spoken‑word poetry and community storytelling, reinforcing a respect for oral tradition and collective
    expression. He attended a predominantly Black high school where he discovered an early fascination with electronics, building basic radio kits in a hobby club. The city's resilience—reflected in its
    post‑civil‑unrest revitalization efforts—instilled in him a pragmatic optimism and a commitment to contributing to the community through his technical talents. While he never married, he maintains close
    ties with a network of longtime friends and mentors from church and the local broadcast union, which continue to influence his worldview and artistic sensibilities.
attributes:
  skills: '[''Audio mixing'', ''Live sound reinforcement'', ''Digital audio workstation operation'', ''DMX lighting programming'', ''Cue lighting design'', ''Equipment maintenance and repair'', ''Signal
    routing and RF distribution'', ''Troubleshooting under pressure'', ''Broadcast workflow optimization'', ''Team coordination'']'
  hobbies: '[''Jazz and soul music collection'', ''Modular synthesizer experimentation'', ''Ambient soundscape creation'', ''Street photography'', ''Community art exhibitions'', ''Reading biographies of
    innovators'', ''Rooftop gardening'', ''Film‑making club discussions'']'
  career_goals: As he approaches a senior stage of his career, Zaheer aims to move into a technical director role where he can shape the overall visual and sonic aesthetic of productions. He also wants
    to mentor younger technicians, sharing the practical knowledge he accumulated before formal training became common. He is exploring certification through the Society of Broadcast Engineers and planning
    to offer freelance consulting for community arts events, helping local schools and grassroots theater groups create professional‑grade sound and lighting. Long‑term, he hopes to curate an interdisciplinary
    audio‑visual installation that reflects Newark’s cultural history, using his technical expertise to bring artistic concepts to life.
