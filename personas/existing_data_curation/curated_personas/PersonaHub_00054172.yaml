persona_description: A geoscientist who is interested in the study of coastal erosion and the impact of climate change on Louisiana's coastal wetlands. They are particularly concerned with the loss of land
  in South Louisiana due to shoreline erosion, land subsidence, anthropogenic influences, and sea level rise, and the importance of Louisiana's coastal wetlands in terms of oil and gas infrastructure, shipping,
  fisheries, hurricane protection, and waterfowl. They are also interested in the research and teaching methods of NAGT/DLESE On the Cutting Edge project.
