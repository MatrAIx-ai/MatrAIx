  career_goals: Gonzalo aims to advance to a regional sales manager position within the next three years, overseeing a team of representatives and shaping sales strategy for a larger manufacturing portfolio.
    He seeks to earn a Certified Professional Sales Leader designation to formalize his expertise. While ambitious, he also wants to create a more predictable schedule that reduces chronic stress and allows
    him to plan for home ownership and eventual retirement. Mentoring younger Latino professionals is a personal ambition, as he hopes to give back to the community that shaped his work ethic.
