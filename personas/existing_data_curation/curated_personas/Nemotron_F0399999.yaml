  career_goals: Looking ahead, Jesus aims to transition into a supervisory or safety officer role where he can leverage his extensive field experience to improve operational efficiency and workplace safety.
    He plans to obtain a certified safety trainer credential and a commercial driver's license (CDL) to broaden his qualifications. Over the next five years, he hopes to mentor younger workers, implement
    a preventive maintenance program at his current facility, and eventually explore the possibility of starting a small equipment‑rental or consulting business that serves local construction and warehousing
    firms in the Jacksonville area.
