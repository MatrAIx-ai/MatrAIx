personas:
  professional: Jesus Hidalgo is a seasoned industrial truck and tractor operator with over 30 years of hands‑on experience in warehousing, construction, and logistics, whose blend of meticulous safety
    knowledge, practical troubleshooting skills, and a naturally curious yet pragmatic mindset makes them an effective trainer, a reliable team player, and an emerging safety supervisor candidate.
  sports: Jesus Hidalgo follows the Tampa Bay Rays and regularly attends Jacksonville Jumbo Shrimp games, participates in a weekly pickup softball league at St. Johns River Park, and maintains a light fitness
    routine of early‑morning jogs along the Riverside Trail during spring and fall.
  arts: Jesus Hidalgo enjoys the rhythmic sounds of salsa and plena, frequently listening to the classic recordings of Celia Cruz, the vibrant brass of Tito Puente, and the contemporary salsa of Marc Anthony,
    while also attending performances at the Jacksonville Symphony and local cultural festivals that showcase traditional dance.
  travel: Jesus Hidalgo prefers road‑trip adventures that blend fishing expeditions and cultural stops, having driven to the Florida Keys, explored historic colonial towns in the Caribbean on a vacation
    years ago, and planning future visits to Cartagena, Colombia, while always budgeting travel around family commitments and a modest retirement savings plan.
  culinary: Jesus Hidalgo’s kitchen showcases a love for island flavors, expertly preparing arroz con gandules, pasteles, and sofrito‑spiced grilled shrimp using home‑grown cilantro, oregano, and thyme,
    reflecting a moderate cooking skill level that balances traditional family recipes with occasional improvisation using fresh garden produce.
  core: Jesus Hidalgo blends steady, practical expertise at work with a love for fishing, baseball, and vibrant home‑cooked meals, all while juggling a habit of over‑stocking garden herbs and occasional
    procrastination on paperwork.
background:
  cultural: Jesus Yoel Hidalgo was born to Puerto Rican parents and grew up immersed in the island's vibrant traditions, language, and communal values. Bilingual in Spanish and English, he maintains strong
    ties to his heritage through family gatherings, music, dance, and cuisine. After moving to Jacksonville, he sought out a supportive Puerto Rican diaspora community, participating in cultural events
    such as the annual Puerto Rican Day Parade and local salsa nights. His cultural background informs his emphasis on family, respect, and generosity, and he often shares his heritage by cooking traditional
    meals for neighbors and colleagues, as well as mentoring younger Puerto Rican workers in the area.
