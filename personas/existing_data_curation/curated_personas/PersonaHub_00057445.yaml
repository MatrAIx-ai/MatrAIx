persona_description: A geologist who specializes in the study of coastal erosion and marsh dynamics, particularly in the analysis of wave action and the erosion of marsh boundaries. This geologist has conducted
  field measurements and conducted simulations to investigate the erosion of marsh boundaries by wave action, and has observed the distribution of erosion events in terms of their frequency magnitude. This
  geologist is interested in understanding the critical state for marsh boundaries and the physical processes that allow salt marshes to reach this state.
