  career_goals: Looking ahead, Feliberto aims to leverage his blend of curiosity and practicality into senior leadership roles within technology. In the next three to five years he plans to earn a TOGAF
    certification and an AWS Solutions Architect credential, positioning himself for a transition to enterprise architecture or a senior systems analyst position overseeing cross‑functional digital transformation
    initiatives. He is also interested in pursuing a part‑time master’s in Data Science or Business Analytics to deepen his strategic decision‑making capabilities. Long‑term, he envisions either guiding
    a technology consulting practice focused on process optimization for mid‑size firms or taking on a product management role where he can shape user‑centric solutions while mentoring junior analysts.
