personas:
  professional: Feliberto Albornoz is a systems analyst who transforms business requirements into robust technical designs, leveraging advanced SQL, Python, and BPMN while applying Agile and ITIL practices,
    and their methodical yet curious mindset ensures they balance innovative solutions with reliable documentation.
  sports: Feliberto Albornoz follows professional soccer passionately, rooting for the national football team of his homeland, and occasionally joins local running clubs to train for the Bellingham Half
    Marathon, while they also support the Seattle Seahawks as a casual NFL fan.
  arts: Feliberto Albornoz expresses artistic flair through landscape photography inspired by Ansel Adams and street shots echoing Henri Cartier‑Bresson, while they also appreciate the folk melodies of
    Violeta Parra and the contemporary guitar work of John Mayer during downtime.
  travel: Feliberto Albornoz plans trips with an itinerary‑first mindset, having trekked the Andes in Patagonia and explored the historic streets of Seville, yet they crave a future road‑trip along the
    Pacific Coast to blend scenic drives with spontaneous photo stops.
  culinary: Feliberto Albornoz loves cooking empanadas and pastel de choclo, often adding smoked paprika or caramelized onions for a twist, and their culinary experiments are balanced by a habit of ordering
    sushi on weekends when they’re too exhausted to cook.
  core: Feliberto Albornoz blends analytical rigor with creative curiosity, channeling meticulous planning into tech leadership while occasionally over‑organizing their hobby projects and neglecting sleep
    on marathon photo edits.
background:
  cultural: Feliberto was born and raised in Chile before moving to the United States for college, and he carries a bicultural identity that informs his worldview. He is fluent in Spanish and English, often
    switching languages depending on context, and he participates in local Chilean community events such as the annual Fiesta Patrias, where he shares traditional foods and folk music. His upbringing emphasized
    family solidarity and respect for collective effort, values that translate into his collaborative yet assertive approach at work. While living in Bellingham, he blends Chilean customs—like celebrating
    Día de los Muertos with a personal twist—and Pacific Northwest lifestyle, enjoying outdoor recreation and sustainability practices. This cultural blend enriches his perspective, allowing him to navigate
    diverse teams and bring a global sensibility to problem‑solving.
