persona_description: A researcher at Oregon Health & Science University School of Dentistry who specializes in the study of neurodegenerative diseases, specifically ALS and neurodegenerative diseases such
  as Alzheimer's and Parkinson's. The researcher has discovered that TDP-43, a protein linked to these diseases, plays a role in synaptic transmission, synaptic release, and endocytosis, and has uncovered
  a potential novel regulation of several pathways, many targets of which appear to be conserved. The researcher's work has implications for understanding and possibly treating these diseases.
