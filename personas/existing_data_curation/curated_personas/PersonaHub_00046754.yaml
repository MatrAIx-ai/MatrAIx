persona_description: A software developer who specializes in the development of scientific and engineering software, particularly for use in the fields of physics, chemistry, and computer graphics. They
  are proficient in using C/C++, Fortran 77 and Fortran 90/95, Perl, Python, Java, Ruby, TCL, and the C/C++ interpreter Ch. They are familiar with the features and capabilities of the DISLIN software package,
  including its support for graphic terminals, metafiles, file formats, and graphical user interface (GUI) routines. They are interested in using DISLIN for scientific and engineering applications, particularly
  in the areas of plotting curves, legends, and business graphics. They are also interested in using DISLIN for 3D graphics and geographical projections.
