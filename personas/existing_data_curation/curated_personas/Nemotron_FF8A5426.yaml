  career_goals: Although he is no longer employed full‑time, Josue aims to continue expanding his technical knowledge and to share it with his community. His primary ambition is to develop a series of interactive
    art‑science workshops at the Oakland Public Library, blending his engineering background with his love for visual art. He also hopes to mentor a small group of high‑school students through the local
    STEM outreach program, guiding them in creating community murals that incorporate kinetic elements. Additionally, he intends to author a modest guidebook on DIY electronics for seniors, emphasizing
    accessibility and creative expression.
