personas:
  professional: Josue Riveramartinez is a retired mechanical engineer and avid maker who blends his analytical expertise with a vibrant artistic sensibility, channeling his curiosity into interactive art‑science
    workshops at the local library while navigating occasional disorganization and a love for flexible, unstructured planning.
  sports: Josue Riveramartinez enjoys low‑impact fitness through weekly walks with the Oakland Senior Walking Club, occasional salsa dancing at local festivals, and cheering on the Oakland Athletics and
    Golden State Warriors, while occasionally joining a community bocce league that blends social interaction with gentle competition.
  arts: Josue Riveramartinez immerses themselves in the visual arts by attending exhibitions at the Oakland Museum of California, creating mixed‑media collages inspired by the vibrant colors of traditional
    folk motifs, photographing urban street scenes in the style of Annie Leibovitz, and listening to live Mariachi performances featuring the spirited melodies of Antonio Torres.
  travel: Josue Riveramartinez favors culturally rich travel, having explored the historic plazas of San Miguel de Allende, trekked the red‑rock canyons of Sedona, and revisited their hometown near Guadalajara
    for family gatherings, while planning future trips to the coastal villages of Monterey Bay to capture sunrise photography and to participate in an international electronics maker fair in Berlin.
  culinary: Josue Riveramartinez enjoys cooking dishes like chiles en nogada, tamales wrapped in corn husks, and avocado‑lime salsa, expertly blending fresh cilantro, epazote, and roasted chilies from their
    garden, while their modest kitchen skills allow them to experiment with 3D‑printed food molds for artistic plating during community potlucks.
  core: Josue Riveramartinez is a curious, community‑focused senior who fuses engineering precision with artistic flair, embraces flexible planning, and balances occasional disorganization with a steadfast
    commitment to sharing knowledge.
background:
  cultural: Josue was born in a small town near Guadalajara and moved to the United States with his family as a teenager. He grew up in a bilingual household where Spanish language, Mexican cuisine, and
    folk traditions shaped his worldview. In Oakland, he remains active in the local Latinx community, participating in Día de los Muertos celebrations, supporting mariachi performances, and volunteering
    at community centers that provide bilingual STEM outreach. His cultural identity informs his artistic sensibility, often incorporating vibrant colors, symbolic motifs, and storytelling elements rooted
    in Mexican folklore into his creative projects.
