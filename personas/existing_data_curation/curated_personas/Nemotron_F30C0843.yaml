  hobbies: '["woodworking", "fishing on the Hoosic River", "hiking the Appalachian Trail", "playing acoustic guitar", "volunteering at community center (tool safety workshops)", "attending local craft fairs",
    "reading engineering magazines", "home-brewing craft beer"]'
  career_goals: Jose aims to advance to a senior maintenance supervisor role within the next five years, overseeing a small team of millwrights at a manufacturing plant. He plans to earn additional certifications
    such as the Certified Maintenance & Reliability Professional (CMRP), advanced welding credentials, and PLC programming. He also hopes to spearhead a workplace safety initiative that emphasizes collaborative
    hazard identification and peer-to-peer training. Long-term, he envisions either starting his own small-scale equipment repair business or transitioning into a manufacturing engineering role that lets
    him blend his practical experience with emerging green-technology processes.
