personas:
  professional: Jose Sharp is a seasoned millwright in a New England manufacturing plant, combining meticulous mechanical expertise with a curious knack for experimenting with new tools, while leveraging
    their collaborative spirit to mentor junior techs and champion a peer‑driven safety program as they eye a senior supervisor role.
  sports: Jose Sharp is a dedicated fan of the New England Patriots, Boston Bruins and Worcester Red Sox, regularly hikes with the Berkshire Trail Club, competes in a local fishing league on the Hoosic
    River, and they sign up for occasional 5K charity runs organized by the community center.
  arts: Jose Sharp plays acoustic guitar at the Williamstown Community Center’s open‑mic nights, favoring folk classics by Townes Van Zandt and Gordon Lightfoot, enjoys listening to Bob Dylan and Neil Young,
    and they attend productions at the Williams College Theatre, especially when they stage timeless New England plays like 'Our Town.'
  travel: Jose Sharp loves weekend road trips to Vermont’s Green Mountains, has explored Acadia National Park and the historic streets of Dublin on a college‑break study abroad, and they dream of trekking
    Iceland’s volcanic landscapes, favoring spontaneous itineraries that balance a few planned stops with off‑the‑beaten‑path detours.
  culinary: Jose Sharp relishes cooking New England clam chowder, smoking pork shoulder low‑and‑slow, and grilling fresh trout from the Hoosic River, while their home‑brew hobby produces crisp IPAs featuring
    Citra and Simcoe hops, and they often craft rustic serving boards from reclaimed wood for their meals.
  core: Jose Sharp is a pragmatic millwright with a curious mind, a laid‑back approach to planning, and a community‑first heart that shows up in their woodworking, guitar strings, and safety mentorship,
    and they constantly seek ways to blend practicality with compassion.
background:
  cultural: Jose grew up in the rural-suburban setting of Williamstown, Massachusetts, a region that blends New England's historic farming roots with a vibrant college-town atmosphere. His family heritage
    is primarily Irish and English, typical of many white New England households. The local culture emphasizes self-reliance, modesty, and community cooperation—values reflected in his compassionate and
    collaborative nature. Seasonal community events, town meetings, and a strong appreciation for the outdoors shape his worldview, while proximity to Williams College exposes him to a modest intellectual
    curiosity that complements his practical, hands-on approach.
attributes:
  skills: '["machine installation", "preventative maintenance", "hydraulic system repair", "pneumatic troubleshooting", "CNC machine operation", "MIG/TIG welding", "electrical wiring and troubleshooting",
