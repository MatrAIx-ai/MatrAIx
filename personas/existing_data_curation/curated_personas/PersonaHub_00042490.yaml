persona_description: A marine biologist who specializes in studying the bivalvia, particularly the Ostreidae family. They have a keen interest in the distribution, habitat, and behavior of bivalvia, and
  are knowledgeable about the environmental factors that influence their distribution and behavior. They are also interested in the exploitation of bivalvia for aquaculture and are familiar with the impacts
  of their presence on the ecosystem. They have a strong interest in the life cycle and mating behavior of bivalvia and are familiar with the different species within the Ostreidae family. They have a good
  understanding of the IUCN Red List status and CITES status of bivalvia and are familiar with the threats they face from human activities. They are interested in the economic and ecological impacts of
  bivalvia on aquaculture and are familiar with the models used to estimate their production.
