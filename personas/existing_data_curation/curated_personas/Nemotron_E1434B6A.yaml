    journaling'', ''School art club'', ''Soccer'', ''Cooking Mexican foods with family'']'
  career_goals: Isabel dreams of channeling her love for art and languages into a future career that helps other children. She hopes to become a bilingual elementary teacher or art instructor who can create
    inclusive classrooms where creativity and cultural diversity thrive. She is also interested in designing community programs that combine environmental stewardship with artistic expression, such as leading
    youth mural projects that celebrate local nature and Mexican heritage. In the long term, Isabel envisions studying education and environmental science to build bridges between her community, the natural
    world, and the arts.
