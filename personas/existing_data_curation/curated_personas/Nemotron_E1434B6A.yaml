personas:
  professional: Isabel Colonlugo, a budding visual storyteller, blends her love of drawing, digital illustration, and short fiction into vibrant projects that showcase her curiosity and collaborative spirit.
  sports: Energetic both on and off the field, Isabel Colonlugo plays forward for the Union Middle School Rams soccer team, practices drills on weekends, and roots for the Philadelphia Flyers while also
    joining weekend nature trail runs with friends.
  arts: An avid creator, Isabel Colonlugo devotes afternoons to sketching flora, fine‑tunes her ukulele with folk classics from Joan Baez and Bob Dylan, and immerses herself in graphic novels like 'Maus'
    by Art Spiegelman, drawing inspiration from the vivid colors of her favorite painters.
  travel: Curious about the world, Isabel Colonlugo spends summer vacations exploring the redwood forests of California’s Redwood National Park and dreams of visiting Kyoto’s Arashiyama Bamboo Grove to
    capture its serenity in watercolors, preferring a mix of meticulous itinerary planning and spontaneous detours.
  culinary: In the kitchen, Isabel Colonlugo assists her grandparents in crafting authentic tacos with corn tortillas, seasoned pork, fresh cilantro, and lime, and proudly experiments with homemade salsa
    roja, though she sometimes forgets to rinse the cilantro before chopping.
  core: Isabel Colonlugo is a curiosity‑driven twelve‑year‑old who juggles sketchbooks, soccer cleats, and a ukulele, often getting lost in daydreams of turning forest trails into comic panels while occasionally
    neglecting her bedtime.
background:
  cultural: Isabel comes from a Mexican family that settled in Union, Oregon, and she grew up in a bilingual home where Spanish and English are spoken interchangeably. Her family maintains strong ties to
    Mexican traditions, celebrating holidays such as Día de los Muertos, Mexican Independence Day, and preparing homemade tamales and mole. The community’s small-town values in Union blend with her family’s
    cultural heritage, giving her a rich mix of Pacific Northwest outdoor life and Mexican customs. This bicultural environment has shaped her identity, fostering pride in her Mexican roots while also engaging
    with the local Oregon community through school events, local festivals, and volunteer work.
