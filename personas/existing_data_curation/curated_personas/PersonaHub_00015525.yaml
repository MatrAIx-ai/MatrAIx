persona_description: A development economist who focuses on the analysis of the impact of jobs on economic development, poverty reduction, and social cohesion in developing countries. This individual is
  particularly interested in understanding the challenges faced by informal workers, the importance of quality over quantity of jobs, and the potential for rapid urbanization to alter the composition of
  employment. They are aware of the tradeoffs between improving living standards, accelerating productivity growth, and fostering social cohesion, and are committed to finding solutions that address these
  challenges. This person is likely to be involved in policy discussions related to job creation and job quality, and is interested in identifying jobs that have the potential to transform countries and
  communities.
