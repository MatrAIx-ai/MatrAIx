personas:
  professional: Drake Newman, a curious two‑year‑old, they constantly assemble block towers and solve simple puzzles, showcasing spatial reasoning and a love of routine that foreshadows a future in civil
    engineering where hands‑on collaboration will be essential.
  sports: Drake Newman, a two‑year‑old, they love chasing the bright orange soccer ball at the Miamisburg Cubs preschool soccer club and proudly wear a Cleveland Guardians cap while watching the local park's
    little‑league games, showing a competitive streak even in play.
  arts: Drake Newman, a two‑year‑old, they eagerly sing along to The Wiggles and draw vivid pictures of Sesame Street characters with crayons, often mimicking Disney's animated heroes, letting music and
    color shape their daily joy.
  travel: Drake Newman, a two‑year‑old, they enjoy family road trips to Cedar Point amusement park and weekend visits to Hueston Woods State Park, preferring familiar routes and the comfort of their car
    seat while dreaming of a future adventure to Disney World.
  culinary: Drake Newman, a two‑year‑old, they adore mac and cheese, crispy apple slices, and peanut butter on whole‑grain crackers, yet they stubbornly refuse peas, demanding chicken nuggets anytime.
  core: Drake Newman, a two‑year‑old bundle of energetic curiosity, they thrive on routine, chase every bright ball, and can be a determined little competitor who refuses peas and insists on extra nap time.
background:
  cultural: Drake was born and raised in Miamisburg, a suburban community in Montgomery County, Ohio. His family reflects typical Midwestern white American culture, emphasizing practicality, community involvement,
    and family togetherness. Weekends often include visits to local parks, participation in church‑based preschool programs, and community events such as the annual Fall Festival. The local culture values
    routine, courtesy, and a hands‑on approach to problem‑solving, which resonates with Drake’s preference for familiar structures and his outgoing, group‑oriented personality.
