  career_goals: Even at two, Drake imagines future roles that align with his love of structure, helping others, and vehicles. He frequently pretends to be a firefighter, shouting “Fire!” while holding a
    toy hose, and dreams of driving a big red truck. He also enjoys arranging his toy cars in orderly rows, hinting at a fascination with organization. In play, he often declares himself the ‘leader’ of
