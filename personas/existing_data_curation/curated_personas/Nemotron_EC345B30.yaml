personas:
  professional: Hieu Chess is a budding chess prodigy who solves puzzles daily, participates in the school chess club, and applies methodical planning and a competitive drive to every rapid match, treating
    each game as a strategic problem to master.
  sports: Hieu Chess plays on a local youth soccer team, follows the Louisville Cardinals football games on weekends, and keeps a disciplined routine of bike rides after school to stay fit, treating each
    practice as a strategic puzzle similar to a chess endgame.
  arts: Hieu Chess spends weekends building intricate LEGO models inspired by Star Wars sets, sketches comic characters in the style of Stan Lee, and frequently visits the Speed Art Museum to study Monet’s
    water lilies, letting those experiences shape a creative expression that blends precise construction with vivid imagination.
  travel: Hieu Chess loves weekend trips to the Science Museum of Kentucky and the Louisville Mega Cavern adventure tours, dreams of a family vacation to Washington, D.C.’s National Air and Space Museum,
    but relies on parents’ planning and school field trips for most travel experiences.
  culinary: Hieu Chess prefers classic chicken nuggets and mac and cheese, yet delights in crafting LEGO‑shaped pancakes topped with strawberries and maple syrup, and they eagerly collect novelty cereal
    flavors while occasionally sneaking a bite of a hidden candy stash during study breaks.
  core: Hieu Chess is a meticulous young strategist who balances a fierce competitive streak with a quiet curiosity, turning chess puzzles, LEGO builds, and comic art into a personal universe where methodical
    planning meets creative play.
background:
  cultural: Hieu is the son of Vietnamese immigrants who settled in Louisville’s Jefferson County. At home, Vietnamese is spoken alongside English, and the family celebrates Tet with traditional foods like
    bánh chưng, spring rolls, and mooncakes. He participates in the local Vietnamese cultural club, where he learns calligraphy and participates in Lunar New Year parades. While embracing his heritage,
    Hieu also enjoys Kentucky’s local festivals, such as the Louisville Derby, and blends Southern comfort foods with his family’s recipes. The blend of Vietnamese family values—respect for elders, emphasis
    on education, and communal harmony—shapes his disciplined, organized approach to school and hobbies.
