persona_description: A scientist or researcher with expertise in Earth science, specifically in remote sensing and environmental monitoring. They are likely to be interested in the use of satellite imagery
  and spaceborne thermal emission and reflection radiometry (ASTER) for monitoring and mapping of wildfires, dynamic conditions, and temporal change. They may also be interested in applications of ASTER
  in areas such as glacial advances and retreats, potentially active volcanoes, crop stress, wetlands evaluation, thermal pollution monitoring, coral reef degradation, and surface temperature mapping of
  soils and geology. They are also likely to be familiar with the U.S. science team located at NASA's Jet Propulsion Laboratory, Pasadena, Calif.
