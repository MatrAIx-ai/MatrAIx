  career_goals: In the short term, Evelyn aims to maintain strong grades in science and mathematics, earn a leadership role in her school’s marine‑science club, and secure a summer internship with a local
    conservation or sea‑turtle rescue organization. She hopes to receive a scholarship that will support a college degree in environmental science or marine biology. Looking farther ahead, she envisions
    a career as a marine conservation scientist who designs and implements coastal‑habitat restoration projects, works on policy advocacy for climate‑resilient coastal communities, and educates the public
    about sustainable stewardship. Because of her personal experience with anxiety, she is also drawn to the idea of integrating mental‑health support into youth outreach programs, possibly pursuing a joint
    degree in environmental health and counseling.
