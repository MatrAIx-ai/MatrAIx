personas:
  professional: Evelyn Caruso, a budding marine conservation advocate and high school junior, blends their curiosity about marine ecosystems with practical organizational skills as they lead peer‑led beach
    clean‑up projects, document shoreline changes through photography, and contribute articles to the school’s environmental club newsletter.
  sports: Evelyn Caruso, an avid kayaker who belongs to the Pawleys Island Youth Paddle Club, enjoys weekend beach volleyball with friends, follows the Charleston RiverDogs minor league baseball team and
    the South Carolina Gamecocks football program, and they maintain a modest fitness routine of sunrise jogs along the coast.
  arts: Evelyn Caruso, who sketches watercolor seascapes and strums acoustic guitar to the tunes of folk legends like Joni Mitchell and contemporary singer‑songwriter Brandi Carlile, regularly visits the
    local art gallery to admire works by coastal painters such as Winslow Homer, and they find inspiration in the storytelling tradition of regional oral histories.
  travel: Evelyn Caruso, who prefers low‑key, nature‑focused trips, dreams of snorkeling among coral reefs in the Bahamas, has already explored historic Savannah, Georgia and the barrier islands of the
    Gulf Coast, and they plan to save for a summer backpacking adventure through the Outer Banks, balancing the desire for adventure with the constraints of school and family budget.
  culinary: Evelyn Caruso, a fan of Lowcountry cuisine, enjoys cooking shrimp and grits with fresh Gulf shrimp, Old Bay seasoning, and a splash of lemon, often adds locally harvested oysters to a steamed
    lowcountry boil, experiments with sweet corn hushpuppies, and they occasionally indulge in a guilty‑pleasure of cheesy pizza rolls during late‑night study sessions.
  core: Evelyn Caruso, a 15‑year‑old coastal conservation enthusiast, balances a quiet, introspective nature with a fierce dedication to protecting wetlands, often over‑thinking decisions, hoarding shells
    as tiny trophies, and they struggle with anxiety that fuels both their creativity and occasional sleepless nights.
background:
  cultural: Evelyn grew up in the Lowcountry of South Carolina, where the rhythm of life is closely tied to the Atlantic Ocean, marshes, and the traditions of Southern hospitality. Her family celebrates
    local customs such as shrimp‑and‑grits gatherings, barrel‑fish festivals, and seasonal breezes that signal the start of beach‑clean‑up days. Although she identifies as white, she has been raised with
    an awareness of the diverse cultural heritage of the region, including the historic Gullah communities that have shaped the area’s language, cuisine, and storytelling traditions. This blend of coastal
    environment, community‑oriented values, and respect for the natural world informs her worldview and fuels her desire to protect the places she loves.
