personas:
  professional: Russell Fox, a veteran machinist with 35 years of precision manual and CNC experience, leverages his skeptical curiosity and meticulous mindset to mentor apprentices, integrate lean‑manufacturing
    principles, and launch a boutique shop specializing in custom metal parts for historic boats and vintage motorcycles.
  sports: Russell Fox, a low‑key fitness enthusiast, rises for early sunrise fishing trips along the St. Johns River, joins the St. Johns River Anglers Association, follows the Jacksonville Jaguars and
    the Tampa Bay Buccaneers on game days, and maintains a modest routine of weekly resistance‑band workouts and occasional senior softball games with the Riverside Legends club.
  arts: Russell Fox, an understated aficionado of maritime history and classic Americana, spends evenings listening to the folk storytelling of Woody Guthrie, admiring Winslow Homer’s seascapes, and attending
    local Civil War reenactments where the authenticity of period costumes and brass bands echo his reverence for the past.
  travel: Russell Fox, a methodical planner who prefers quiet, historically rich locales, has explored the colonial streets of St. Augustine, the naval museums of Portsmouth, New Hampshire, and dreams of
    a slow‑boat cruise through the Norwegian fjords, balancing his trips around his consulting schedule and family commitments.
  culinary: Russell Fox, a competent home chef, transforms his garden’s heirloom tomatoes, fresh basil, and sweet corn into rustic ratatouille and grilled trout tacos, while occasionally treating himself
    to a perfectly seared filet mignon paired with a sauce made from locally sourced rosemary and red wine.
  core: Russell Fox, a meticulous yet quietly competitive retiree, merges his lifelong love of metalworking with a penchant for early‑morning solitude, a tendency to over‑schedule mentorship sessions, and
    a habit of hoarding vintage motorcycle manuals.
background:
  cultural: Russell comes from a mid‑20th‑century white, working‑class family rooted in the American Southeast. Raised in a community that prized self‑reliance, craftsmanship, and practical education over
    formal credentials, he learned trade skills early through apprenticeships rather than a high‑school diploma. The coastal culture of Saint Augustine—steeped in Spanish colonial history and maritime traditions—has
    shaped his appreciation for historical preservation, fishing, and outdoor pursuits. He identifies with Southern values of modesty, independence, and a skeptical, competition‑driven mindset that drives
    him to excel personally while respecting proven methods. His cultural identity blends a modest Protestant upbringing with the local Floridian ethos of enjoying nature and valuing hard, honest work.
attributes:
  skills: '["Manual lathe operation", "CNC milling", "Blueprint interpretation", "Metal welding (MIG/TIG)", "Precision measuring (CMM, micrometers)", "Tool and die making", "Preventive maintenance", "Lean
