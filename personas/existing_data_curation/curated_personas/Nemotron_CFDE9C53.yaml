  hobbies: '["Fishing", "Woodworking", "Model railroading", "Historical reading", "Vintage motorcycle restoration", "Gardening", "DIY home improvement projects", "Local history reenactments"]'
  career_goals: Approaching retirement, Russell aims to transition from full‑time shop work to a part‑time mentorship and consulting role, passing his practical knowledge to the next generation of machinists.
    He plans to earn a NIMS Master Machinist certification, establish a small boutique shop that specializes in custom metal parts for historic boat and vintage motorcycle restorations, and develop a series
    of instructional videos that blend his skeptical, evidence‑based perspective with his love of new ideas. Additionally, he hopes to secure a stable retirement by leveraging his expertise for freelance
    projects and occasional contract work for local marine manufacturers.
