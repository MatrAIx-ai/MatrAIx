personas:
  professional: A diligent preschool architect, Alyson Pires constructs elaborate LEGO cities with systematic layouts, insisting on matching bricks by color and shape, which satisfies their curiosity for
    new ideas while honoring tried‑and‑true building methods.
  sports: An enthusiastic mini‑soccer defender, Alyson Pires attends weekly practices with the Tiny Tigers Soccer Club, loves dribbling a soft foam ball on the neighborhood field, and proudly wears a cap
    bearing the logo of the hometown baseball team, the Oakridge Owls.
  arts: A creative finger‑paint enthusiast, Alyson Pires emulates Claude Monet’s water lilies by dab‑dabbing turquoise and green on large paper, and sings along to The Wiggles while dancing to Pharrell
    Williams’ "Happy", letting the music guide their brushstrokes.
  travel: An inquisitive junior traveler, Alyson Pires has explored the sandy beaches of Clearwater, Florida with their family and stood in awe at the Grand Canyon’s rim, and now pins a postcard of Disneyland
    Paris to a wall, preferring trips that are carefully scheduled with plenty of nap time.
  culinary: A budding food explorer, Alyson Pires adores cheesy macaroni, builds banana‑and‑peanut‑butter sandwiches with extra honey, and sprinkles cinnamon on oatmeal, yet stubbornly turns away from broccoli
    unless it’s hidden in a cheese sauce.
  core: Alyson Pires is a four‑year‑old who blends unbridled curiosity with meticulous organization, thrives in small‑group creativity, saves every coin, and vigilantly tends to mild health woes while dreaming
    of grand adventures.
background:
  cultural: Alyson was born and raised in Bolingbrook, Illinois, an affluent suburban community in Will County. Her family has Portuguese heritage, reflected in occasional Portuguese phrases at home, traditional
    dishes like pastel de nata during holidays, and celebrations of cultural festivals. She participates in typical Midwestern American customs such as Halloween trick‑or‑treating, Thanksgiving gatherings,
    and community fairs. Her upbringing blends the values of organization, courtesy, and community involvement common in the Midwest with subtle Portuguese cultural influences from her family.
