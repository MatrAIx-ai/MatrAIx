  career_goals: Even at her young age, Alyson expresses a desire to help and organize, often talking about wanting to become a teacher who keeps the classroom tidy or a librarian who arranges books neatly.
    She also shows interest in caring for animals, dreaming of being a veterinarian. Her ambitions are shaped by her love for practical tasks, curiosity about how things work, and a wish to assist others
    in small, orderly ways.
