    pedagogy'']'
  hobbies: '[''Gardening'', ''Community theater acting and set design'', ''Cooking traditional Mexican cuisine'', ''Celebrating cultural festivals (e.g., Día de los Muertos)'', ''Hiking in Sonoma County'',
    ''Wine tasting with friends'', ''Volunteering at senior center (Spanish story circles)'', ''Crossword puzzles'', ''Knitting'', ''Reading historical fiction'']'
  career_goals: Maru Maria aims to mentor newly certified special-education teachers within the Sonoma County district, sharing her practical strategies and resilient mindset. She plans to lead a district-wide
    initiative to develop a bilingual resource hub that supports Spanish-speaking families and students. As she approaches retirement, she hopes to transition into a part-time advisory role, helping schools
    integrate technology-assisted learning tools while preserving proven, hands-on approaches. Ultimately, she wishes to leave a legacy of stronger community partnerships that ensure every child, regardless
    of ability or language, receives equitable educational opportunities.
