personas:
  professional: Maru Watters, a veteran special‑education teacher with three decades of experience, designs meticulous individualized education plans, blends bilingual communication with data‑driven instruction,
    and leverages their calm, organized, and collaborative nature to mentor peers while championing inclusive curricula.
  sports: Maru Watters enjoys regular hikes through the Sonoma County hills, participates in the Petaluma Community Walking Club, roots for the San Francisco Giants in baseball season, and joins occasional
    local senior softball leagues to stay socially active and fit.
  arts: Maru Watters brings stories to life on stage with the Petaluma Community Theater, designs vibrant sets inspired by traditional festivals, finds solace in the music of Lila Downs and Juan Gabriel,
    and devours historical fiction by Isabel Allende during quiet evenings.
  travel: Maru Watters prefers well‑planned, moderate‑budget trips that blend wine‑country tours in Napa and leisurely exploration of historic towns like Oaxaca, while they often use senior travel discounts
    to join group excursions that balance cultural immersion with relaxed sightseeing.
  culinary: Maru Watters excels at cooking homemade tamales, mole with dark chocolate and chilies, and fresh pozole using garden‑grown corn and tomatoes, often pairing these dishes with a crisp Sonoma Chardonnay
    while sharing the bounty with neighbors.
  core: Maru Watters blends steadfast practicality with a curious spirit, orchestrating inclusive classrooms, community theater, and vibrant garden gatherings while maintaining a remarkably calm demeanor
    and a habit of meticulously planning every detail.
background:
  cultural: Born to Mexican immigrant parents, Maru Maria grew up immersed in both Mexican traditions and the broader Californian culture. Fluently bilingual, she weaves Spanish language and Mexican folklore
    into her teaching, fostering a classroom environment that honors her heritage. Her family-centered values emphasize community, respect, and mutual support, influencing her collaborative approach with
    colleagues and families. Living in Petaluma, she blends the region’s agricultural roots and wine-country lifestyle with her cultural celebrations, participating in local festivals while maintaining
    Mexican customs such as Día de los Muertos, traditional cooking, and intergenerational storytelling.
attributes:
  skills: '[''Individualized Education Plan (IEP) development'', ''Behavior intervention and de-escalation'', ''Classroom management'', ''Bilingual communication (English–Spanish)'', ''Data-driven instruction
