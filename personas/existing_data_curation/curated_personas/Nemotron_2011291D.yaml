  career_goals: Although comfortably retired, Beatrice aims to stay mentally vibrant and socially connected. She hopes to complete a personal memoir that captures her family's stories, volunteer as a guest
    instructor for an intergenerational art program at the local community center, and deepen her digital fluency by taking an online course in digital photography. She also aspires to travel modestly within
    the American Southwest to visit art museums and natural sites, while continuing to nurture her garden and providing support to her family.
