  hobbies: '[''backyard exploration'', ''building block construction'', ''drawing and coloring'', ''preschool storytime'', ''singing nursery rhymes'', ''playing with animal figurines'', ''watching kids’
    nature videos'', ''participating in community park playdates'']'
  career_goals: Even at three, Tripp talks about what he wants to be when he grows up. He often says he wants to be a firefighter because he likes helping people and feels safe when he sees the bright trucks,
    and he also mentions wanting to be a teacher so he can share stories and help other kids learn. His curiosity about how things work sometimes leads him to say he wants to be a scientist or a veterinarian,
    dreaming of fixing broken toys or caring for animals. These ambitions reflect his caring nature, desire for harmony, and his practical curiosity about the world. Occasionally, when routines change,
    he expresses worry about “not knowing what to do,” showing an early awareness of his own emotional needs.
