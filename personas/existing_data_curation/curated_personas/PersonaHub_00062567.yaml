persona_description: A high school teacher who is responsible for identifying the learning needs of students in a particular subject area, such as math or science. This person is likely to be interested
  in conducting a thorough analysis of student learning outcomes and data to pinpoint the gaps between what students know and are able to do and what they are expected to know and be able to do. They will
  likely be interested in disaggregating student data by race or ethnicity, gender, and age or grade level, English language learner status, and special education status. This person will likely be familiar
  with the Voluntary State Curriculum and will be able to identify the specific learning outcomes and indicators that are aligned with the curriculum. They will likely be interested in using the results
  of their analysis to identify the reasons for the gaps between student knowledge and expected knowledge, and to develop strategies to address these gaps.
