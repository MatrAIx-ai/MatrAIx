  career_goals: 'At ten, Gabriela imagines a future where she can help others: she dreams of becoming a teacher who can support bilingual children in her community, or a veterinarian caring for neighborhood
    pets. She is drawn to roles that combine her love for structure—such as organized lesson plans—and her natural kindness toward people and animals. Her ambition is fueled by a desire to give back to
    the Honduran and broader Chicago community.'
