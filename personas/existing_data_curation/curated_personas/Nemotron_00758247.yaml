personas:
  professional: Gabriela Torres, an aspiring young game designer, uses Scratch to build simple interactive stories and puzzles, blending their love for structured coding with spontaneous creativity, even
    though they sometimes forget to save their projects.
  sports: Gabriela Torres, a spirited member of the Chicago Fire Youth Soccer Club, improvises new dribbles on the field and loves cheering for the Chicago Fire, while also dancing to Latin beats in after‑school
    classes, and they never miss a chance to practice a new move.
  arts: Gabriela Torres, an avid doodler, draws cartoons inspired by Calvin and Hobbes and animates short scenes in Scratch, listening to Shakira and Bad Bunny for inspiration, and they often add speech
    bubbles that reveal quirky jokes.
  travel: Gabriela Torres, an eager explorer of Chicago’s parks such as Millennium Park and the Lincoln Park Zoo, also dreams of seeing the Grand Canyon and the seaside of Barcelona, and they save pocket
    money for future family trips.
  culinary: Gabriela Torres, who helps prepare the family’s beloved baleadas alongside pizza and peanut butter‑jelly sandwiches, enjoys experimenting with cilantro and lime on burritos, and they proudly
    claim the title of 'sauce boss' in the kitchen.
  core: Gabriela Torres is a structured yet playful ten‑year‑old who balances coding, soccer, and family cooking, often forgetting homework but always keeping a spare sock for good luck, and they thrive
    on routine mixed with surprise.
background:
  cultural: Gabriela was born to Honduran immigrant parents and grew up in a bilingual household in Chicago’s Pilsen neighborhood. At home, Spanish is spoken daily, and she celebrates Honduran traditions
    such as Día de la Madre, the Feria de San Isidro, and enjoys foods like baleadas and tamales with her extended family. The local Honduran community center provides cultural dance classes and soccer
    leagues where she connects with peers who share her heritage. This blend of Central American roots and Chicago urban life shapes her identity, fostering a strong sense of community, resilience, and
    pride in her cultural background.
