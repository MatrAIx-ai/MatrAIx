personas:
  professional: A detail-oriented car‑wash specialist, Cory Graham leverages their expertise in paint correction, ceramic coating, and inventory management to streamline operations, while they prefer structure
    and teamwork, driving them to pursue a supervisory role in the industry.
  sports: A community‑driven athlete, Cory Graham plays pickup basketball at Griffith Park three nights a week, follows the Los Angeles Lakers and Dodgers, and joins a weekend hiking group that explores
    Malibu’s coastal trails, while they balance workouts around their shift schedule to stay fit.
  arts: A classic‑rock enthusiast, Cory Graham spins Led Zeppelin, The Rolling Stones, and Fleetwood Mac vinyls, catches live shows at the Hollywood Bowl when possible, and appreciates the vibrant street‑art
    murals of the Arts District, while they occasionally share their sketches on social media.
  travel: A structured weekend explorer, Cory Graham plans concise road trips like a two‑day hike in Joshua Tree or a coastal drive to Santa Barbara, and they rely on a detailed itinerary app, while they
    aspire to a longer eco‑tour down the Pacific Coast Highway to Oregon once financial stability is achieved.
  culinary: A pragmatic home chef, Cory Graham whips up simple, healthy dishes such as quinoa bowls with grilled salmon, avocado, and roasted sweet potatoes, favors olive oil, lemon zest, and fresh herbs,
    and they occasionally indulge in brunch outings for avocado toast and cold brew.
  core: Cory Graham is a disciplined detailer who balances a love for structure with spontaneous basketball games, a penchant for classic‑rock vinyls, and an eco‑friendly entrepreneurial dream, while they
    occasionally forget to lock the garage door.
background:
  cultural: Cory grew up in a middle‑class, predominantly Anglo‑American family in Los Angeles. His upbringing combined the relaxed West Coast lifestyle with a strong work ethic, shaped by his parents'
    emphasis on responsibility and cooperation. While his household primarily celebrated mainstream American holidays and traditions, the multicultural environment of Los Angeles exposed him to a variety
    of cuisines, music, and community events, fostering an appreciation for diversity without altering his core cultural identity. His partial college experience and everyday interactions in the city have
    reinforced values of independence, practicality, and respect for collaborative harmony.
attributes:
  skills: '[''Vehicle detailing'', ''Paint correction'', ''Interior shampooing'', ''Ceramic coating application'', ''Safe chemical handling'', ''Pressure‑wash equipment maintenance'', ''Inventory management'',
    ''Time management'', ''Workflow optimization'', ''Customer service'', ''Basic business administration'']'
  hobbies: '[''Playing basketball'', ''Watching automotive shows'', ''DIY car restoration'', ''Hiking in Griffith Park'', ''Cooking healthy meals'', ''Listening to classic rock'', ''Solving puzzles (Sudoku,
    jigsaw)'', ''Volunteering for community clean‑up events'']'
  career_goals: Cory aims to advance from his current role to a supervisory position within the car‑wash industry, eventually becoming an operations manager responsible for multiple locations. He plans
    to obtain professional certifications such as I‑CAR's Certified Detailer and pursue additional coursework to complete his associate degree in business administration. In the long term, Cory aspires
    to launch his own mobile detailing service that emphasizes eco‑friendly cleaning practices and reliable, structured service delivery, leveraging his organizational strengths and customer‑focused mindset.
