personas:
  professional: Aaron Krone is a 20‑year‑old high‑speed packaging machine operator who excels at troubleshooting PLCs, performing routine maintenance, and logging quality data, and their curiosity‑driven
    tinkering and laid‑back, flexible attitude help them devise practical, on‑the‑fly improvements despite occasional disorganization.
  sports: Aaron Krone stays active by hiking the state forest trails, fishing at Lake Willow, jogging with the local Trailblazers running club, and cheering for the Green Bay Packers and Milwaukee Brewers
    on game days, though they prefer solitary workouts and seldom join organized team sports.
  arts: Aaron Krone, a 20‑year‑old acoustic‑guitar enthusiast, spends evenings playing covers of John Mayer and Mumford & Sons while devouring the sci‑fi novels of Isaac Asimov and the synth‑driven scores
    of Vangelis, and they rarely attend large concerts, preferring intimate open‑mic nights at the neighborhood coffee house.
  travel: Aaron Krone, a 20‑year‑old who favors low‑key getaways, maps spontaneous weekend trips to nearby Yosemite and the Appalachian Trail, enjoys fishing at Lake Superior, and harbors a dream of solo
    backpacking through Norway’s fjords and exploring Tokyo’s tech districts, balancing a modest budget with a desire for quiet adventure.
  culinary: Aaron Krone, a 20‑year‑old amateur cook, often whips up quick comfort foods such as garlic‑buttered spaghetti, chili con carne with cumin and black beans, and pan‑seared trout with lemon and
    dill for his close circle of friends, relying on a modest set of kitchen tools and a well‑worn cast‑iron skillet, while occasionally treating himself to a midnight ramen topped with a soft‑boiled egg.
  core: Aaron Krone is a 20‑year‑old pragmatic tinkerer whose love for low‑key hobbies and steady work ambition is constantly tempered by a stress‑prone, disorganized streak that fuels both creative DIY
    projects and lingering worries.
background:
  cultural: Aaron was raised in Simpsonville, a small town in upstate South Carolina, where Southern hospitality, a strong work ethic, and community ties are central. His family attended a local Baptist
    church, participating in church events and neighborhood gatherings that emphasized kindness, cooperation, and respect for tradition. The region’s manufacturing heritage, with many plant jobs, shaped
    his practical outlook, while the local cuisine—fried chicken, barbecue, and biscuits—infused his appreciation for comfort food. These cultural influences blend with his personal values of harmony, curiosity,
    and a preference for modest, close‑knit social circles.
