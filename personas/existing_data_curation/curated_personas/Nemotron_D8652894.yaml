  career_goals: Aaron aims to advance to a lead machine operator position within the next two years, then move into a shift‑supervisor role. He plans to earn certifications in industrial maintenance and
    PLC programming, and eventually complete an associate’s degree in industrial technology. Long‑term, he hopes to become a maintenance technician or automation specialist who can design and implement
    lean‑manufacturing improvements, possibly launching his own small‑scale equipment‑service business. He values a stable income that allows flexibility to manage his stress‑prone nature while continuing
    to learn.
