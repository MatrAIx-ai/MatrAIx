  career_goals: Vanessa aims to obtain the Certified Bookkeeper credential within the next year and enroll in an associate degree program in accounting at a community college. Her long‑term ambition is
    to become a licensed Certified Public Accountant (CPA) and eventually secure a senior auditing position at a reputable firm. She is also considering launching her own boutique bookkeeping service catering
    to small artistic enterprises and cultural organizations in Los Angeles, leveraging her love for the arts and her competitive desire to build a successful business.
