  hobbies: '[''Vegetable gardening with heirloom seeds'', ''Historical walking tours of Youngstown'', ''Reading biographies of civil‑rights figures'', ''Playing bridge at the senior center'', ''Woodworking
    and furniture crafting'', ''Singing in the church choir'', ''Fishing on the Mahoning River'', ''Road trips to family and heritage sites'']'
  career_goals: Although formally retired, Travante aims to stay active and purposeful. His primary goals are to preserve the stories of Youngstown’s African‑American community through a memoir and oral‑history
    project, to volunteer as a mentor in the local youth center, to contribute his organizational skills to the city’s historic preservation committee, and to maintain his health so he can continue learning
    new crafts such as digital photography. He also hopes to foster intergenerational connections within his church and neighborhood.
