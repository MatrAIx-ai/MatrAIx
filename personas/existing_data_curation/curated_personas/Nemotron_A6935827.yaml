  career_goals: Amber aspires to attend a specialized high school for visual arts, such as the High School of Art and Design, where she can refine her portfolio and deepen her technical skills. Her long‑term
    ambition is to earn a BFA in Graphic Design or Illustration from a college like Pratt Institute and eventually work as a freelance illustrator and multimedia designer. She dreams of publishing her own
    graphic novel, creating concept art for video games, and curating a solo exhibition in a local Queens gallery. Amber also hopes to develop an online platform where she can share her creative process,
    offer tutorials, and connect with like‑minded artists worldwide.
