personas:
  professional: Amber Starling, a fifteen‑year‑old self‑taught visual artist, blends traditional sketching with digital painting and generative coding, channeling their curiosity and disciplined yet flexible
    work habits into ambitious art‑theory projects that often culminate in solo online exhibitions, and they proudly showcase each piece on a personal website.
  sports: Amber Starling enjoys low‑impact solo activities such as weekend yoga sessions in Sunnyside Gardens Park, follows the New York Knicks for basketball inspiration, and participates in a community
    skateboarding club where they practice tricks after school, balancing physical activity with their preference for quiet, personal space.
  arts: Amber Starling immerses themselves in graphic novels like "Saga" and the illustrations of James Jean, listens to ambient composers Brian Eno and Tycho while sketching, frequently attends virtual
    tours of the Louvre and MoMA for artistic inspiration, and they often reference Hayao Miyazaki's animation style in their own digital paintings.
  travel: Amber Starling prefers thoughtfully planned trips that blend quiet exploration with artistic inspiration, having visited the historic streets of Kyoto for its temples and tea houses, dreaming
    of a future pilgrimage to Paris's Musée d'Orsay after saving for a family‑sponsored exchange program, and they habitually map out itineraries months in advance to ensure each journey feels both calming
    and creatively rewarding.
  culinary: Amber Starling experiments with simple, flavor‑forward dishes such as avocado toast, miso soup, and homemade matcha latte, honing basic cooking skills in the kitchen while listening to lo‑fi
    beats, and they often sketch the plating before tasting to capture the visual harmony of each meal.
  core: Amber Starling is a solitary, curiosity‑driven teen who fills notebooks with art, budgets meticulously for creative supplies, and they balance disciplined productivity with a love for quiet contemplation.
background:
  cultural: Amber was raised in Corona, Queens, a vibrant, multicultural enclave of New York City. While her family identifies as white and maintains traditions rooted in Italian‑American heritage—celebrating
    holidays with homemade pastas and seasonal festivals—her daily life is interwoven with the diverse cultures surrounding her. She frequently encounters Spanish, Chinese, and South Asian languages on
    the streets, enjoys sampling foods from the local night market, and participates in community events at the Queens Library that celebrate a wide array of cultural heritages. This blend of a close‑knit
    family background and an inclusive, eclectic neighborhood has fostered Amber's open‑minded curiosity and appreciation for varied artistic expressions.
