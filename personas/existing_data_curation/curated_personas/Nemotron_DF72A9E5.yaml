personas:
  professional: Gonzalo Santos, an aspiring visual communications student, channels his bilingual fluency, self‑taught digital illustration skills, and methodical event‑planning talent into leading his
    high‑school art club exhibitions while envisioning a future designing culturally resonant campaigns for brands and nonprofits.
  sports: Gonzalo Santos, a midfield stalwart for the Las Vegas Knights youth soccer team and a frequent rider at the downtown skate park, idolizes the Vegas Golden Knights and follows Los Angeles FC, blending
    tactical on‑field vision with freestyle skate tricks while organizing neighborhood pickup games on weekends.
  arts: Gonzalo Santos, a budding street‑artist who fuses folkloric motifs with contemporary graffiti, draws inspiration from Banksy, C215, and the vibrant murals at the Neon Museum, while remixing Bad Bunny
    and J Balvin on his acoustic guitar and curating a growing Instagram feed of his digital and analog creations.
  travel: Gonzalo Santos, an adventurous teen whose wanderlust includes dreaming of strolling through Antigua Guatemala’s cobblestone streets, sampling Oaxacan mole in Mexico, and tagging Berlin’s East
    Side Gallery, yet stays grounded with weekend trips to Red Rock Canyon and family outings to Los Angeles for cultural festivals.
  culinary: Gonzalo Santos, a food lover who proudly prepares pupusas stuffed with cheese and loroco, savors tamales smothered in salsa verde, crafts pepper‑spiced guacamole, and occasionally indulges in
    a cheesy pepperoni pizza slice after long skate sessions.
  core: Gonzalo Santos is a culturally rooted, creatively restless teen who blends art, tech, and community spirit, often staying up late perfecting digital sketches while juggling school, soccer, and skateboarding.
background:
  cultural: Gonzalo is the son of Salvadoran immigrants who settled in the Las Vegas area when he was a child. He grew up in a bilingual household where Spanish is spoken at home and English at school,
    giving him strong cultural fluency. Family gatherings feature traditional Salvadoran dishes like pupusas and festive celebrations such as Las Posadas and Día de los Farolitos, which have shaped his
    sense of community and identity. He participates in a local Latino youth club that preserves Salvadoran music, dance, and folklore, and he often incorporates these cultural motifs into his artwork.
    The immigrant experience has taught him resilience and the value of mutual support, which he carries into his friendships and collaborative projects.
attributes:
  skills: '[''Bilingual Spanish-English communication'', ''Digital illustration (Procreate, Photoshop)'', ''Basic HTML/CSS'', ''Introductory Python'', ''Event planning and coordination'', ''Leadership in
