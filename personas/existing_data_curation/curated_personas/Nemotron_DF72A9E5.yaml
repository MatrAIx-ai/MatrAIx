  hobbies: '[''Digital drawing and painting'', ''Acoustic guitar – Latin pop covers'', ''Soccer (youth league)'', ''Skateboarding'', ''Visiting art museums and street-art sites'', ''Reading sci-fi graphic
    novels'', ''Volunteering at community art workshops'']'
  career_goals: Gonzalo aims to study Visual Communications or Multimedia Arts at a university where he can merge his love for art, technology, and his Salvadoran heritage. He envisions a career as a graphic
    designer or creative director who creates culturally resonant campaigns for brands and nonprofit organizations. Long‑term, he wants to launch a community‑based arts program that offers free workshops
    in digital art and coding for Latino youth in Las Vegas, fostering cultural pride and economic opportunity.
