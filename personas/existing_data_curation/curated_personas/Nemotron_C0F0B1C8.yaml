  hobbies: '[''Gardening'', ''Quilting'', ''Baking Bread and Pastries'', ''Reading Mystery and Historical Fiction'', ''Volunteer Work at Local Library'', ''Walking Her Dog'', ''DIY Home Improvement Projects'',
    ''Listening to Classic Rock'', ''Crocheting'', ''Family Game Nights'']'
  career_goals: Brandi aims to deepen her expertise in education while maintaining a stable, predictable work schedule that fits her family life. In the next two years she plans to complete an Associate’s
    degree in Early Childhood or Elementary Education at a community college near Troy, followed by a teaching certification that will allow her to transition to a full‑time classroom teacher. She also
    hopes to take on a lead teaching‑assistant role, where she can mentor newer staff and help design systematic support structures for special‑needs students. Long‑term, Brandi envisions opening a small
    after‑school tutoring program that leverages her organizational skills and provides structured academic help for local children, especially those who thrive in a predictable learning environment.
