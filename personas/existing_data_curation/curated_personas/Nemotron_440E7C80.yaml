  career_goals: Luisa aims to transition from a nursing assistant to a licensed practical nurse (LPN) and eventually a registered nurse (RN) with a focus on holistic and community health. She plans to enroll
    in a bridge program that allows her to complete her associate degree while continuing to work part-time, capitalizing on her competitive drive to graduate at the top of her class. Long-term, she envisions
    creating a community-based wellness hub that blends conventional nursing care with art-therapy workshops for seniors and individuals coping with chronic illness. She is also interested in obtaining
    a certification in health coaching to better support patients' mental well-being and to develop stress-management programs for staff. Flexibility and personal autonomy are important to her, so she hopes
    to secure a role that offers a balance between clinical responsibilities and the freedom to design patient-centered programs.
