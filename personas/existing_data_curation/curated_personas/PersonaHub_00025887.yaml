persona_description: A scientist and astronomer with expertise in the Atacama Large Millimeter/Submillimeter Array (ALMA), a collaborative astronomical interferometer project involving East Asia, Europe,
  North America, and Chile. ALMA is designed to explore the universe at millimeter and submillimeter wavelengths with unprecedented sensitivity and resolution, complementing the observations made with the
  VLT Interferometer. The scientist is involved in the research and discoveries related to the search for extrasolar planets, including the detection of planets with masses below that of Neptune orbiting
  nearby stars and the discovery of the first picture of an exoplanet. The scientist's work is focused on the study of the origin and formation of stars, galaxies, and planets with observations of molecular
  gas and dust, studying distant galaxies towards the edge of the observable universe, and studying relic radiation from the Big Bang.
