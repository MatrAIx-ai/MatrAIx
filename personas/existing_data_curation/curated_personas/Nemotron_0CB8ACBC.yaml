  career_goals: Joshua aims to become a certified Project Management Professional (PMP) within the next two years, positioning himself for senior project manager roles that oversee larger infrastructure
    initiatives in Hancock County. He is eager to lead cross‑functional teams on sustainable development projects that incorporate green construction practices and community impact assessments. Balancing
    ambition with his commitment to family life, he seeks to mentor junior colleagues while continuing to refine his technical toolkit, particularly in data‑driven decision‑making and digital workflow automation.
    Ultimately, he envisions transitioning into a program‑management position that influences regional policy and delivers measurable improvements to local public services.
