  career_goals: Even at her young age Florentina imagines future roles that blend her love of routine with her spontaneous spirit. She often says she wants to be a teacher because she enjoys the orderly
    rhythm of storytime and helping friends learn, and she also dreams of being a veterinarian to care for animals she sees at the park. Occasionally she pretends to be a dancer, spinning to music in the
    living room, showing her desire for expressive, unstructured activity. Her practical outlook steers her toward careers that involve helping others in a predictable setting, while her playful side keeps
    the door open for creative professions.
