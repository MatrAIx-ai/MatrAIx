persona_description: A children's literature scholar who is particularly interested in the representation of second-generation memory in contemporary children's literature, and the potential of such representations
  to challenge conventional Western notions of selfhood and ethics. This person is likely to have a deep understanding of the relationship between second-generation memory and contemporary children's literature,
  as well as an interest in the representation of memory in books for young people. They may have expertise in trauma and memory studies, Holocaust studies, and the fields of children's literature and literature
  for young people. They are likely to be familiar with the works of authors such as Lois Lowry and Judy Blume, and may have a particular interest in their representations of second-generation memory.
