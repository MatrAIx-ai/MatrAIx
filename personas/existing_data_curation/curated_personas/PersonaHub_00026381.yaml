persona_description: A conspiracy theorist who is deeply interested in the JFK assassination and is particularly skeptical of the Warren Commission's explanation. They believe that the assassination was
  not the result of ignorance but rather a deliberate cover-up by the US government. They are also aware of the CIA's involvement in the assassination and believe that the agency was transformed into a
  rogue organization during the Eisenhower years. They are a die-hard supporter of JFK and believe that the US government was responsible for his murder. They are also a fan of James Douglass' book "JFK
  and the Unspeakable" and are familiar with the unspeakable concept.
