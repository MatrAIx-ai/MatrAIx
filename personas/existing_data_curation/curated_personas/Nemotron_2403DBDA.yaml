personas:
  professional: Morgan Bula is a seasoned metalworking and plastics manufacturing specialist whose expertise spans MIG/TIG welding, CNC machining, composite molding, and quality‑control inspections, and
    whose curious yet competitive nature drives them toward senior supervisory roles, mentorship of apprentices, and the eventual launch of a boutique workshop that fuses technical precision with coastal‑inspired
    sculpture.
  sports: Morgan Bula hits the shoreline each morning for solitary beach jogs, enjoys seasonal salt‑water fishing for red drum, cheers on the Myrtle Beach Pelicans minor‑league baseball team and the South
    Carolina Gamecocks football squad, and participates in a local charity 5K run twice a year, balancing a competitive edge with a preference for low‑key physical activity.
  arts: Morgan Bula frequents the Myrtle Beach Art Museum and local galleries, paints impressionistic sunrise seascapes inspired by Claude Monet and Winslow Homer, captures coastal light in black‑and‑white
    photographs echoing Ansel Adams, and builds scale model boats that echo the maritime spirit of historical marine art, all while devouring art‑history tomes on Georgia O'Keeffe and contemporary outsider
    artists.
  travel: Morgan Bula plans trips with a mix of meticulous research and spontaneous impulse, having explored the historic streets of Charleston, the sun‑kissed cliffs of Cinque Terre, and the vibrant markets
    of Marrakech, and they yearn to kayak the turquoise waters of the Maldives while balancing family commitments and a modest travel budget.
  culinary: Morgan Bula delights in lowcountry cuisine, regularly preparing shrimp and grits, she‑crab soup, and grilled Mahi‑Mahi seasoned with fresh lemon, Old Bay, and local herbs, cooking at a moderate
    skill level that shines in weekend BBQs, yet when stress spikes they opt for take‑out at the beloved local seafood shack, The Bowery.
  core: Morgan Bula is a meticulous metalworking supervisor who channels a competitive drive into artistic metal‑and‑plastic sculptures, finds solace in sunrise photography, and constantly battles a worry‑prone
    mind that fuels both disciplined budgeting and relentless self‑improvement.
background:
  cultural: Morgan grew up in a modest, white, Southern-American family in coastal South Carolina. Her upbringing reflects traditional Southern values—close‑knit family, community church (Methodist), and
    a love for the beach lifestyle, including fishing and local festivals. While she respects these roots, her curiosity and exposure to diverse art scenes have given her a more open, progressive outlook,
    blending Southern hospitality with a contemporary appreciation for creativity and independent thought.
attributes:
  skills: '[''MIG welding'', ''TIG welding'', ''CNC machining'', ''Sheet metal fabrication'', ''Composite plastic molding'', ''Blueprint reading'', ''Technical drawing'', ''Equipment maintenance'', ''Quality
    control'', ''Safety compliance'', ''Small-team supervision'', ''Problem solving'']'
  hobbies: '[''Painting'', ''Photography'', ''Visiting art galleries'', ''Scale model boat building'', ''Jogging on the beach'', ''Reading art history'', ''Book club'', ''Gardening'', ''Volunteering at
    community art workshops'']'
  career_goals: Morgan aims to advance to a senior supervisory position where she can mentor apprentices and lead process-improvement projects. She plans to earn an AWS Certified Welding Specialist credential
    and deepen her expertise in composite materials to design custom marine components. Ultimately, she envisions launching a boutique workshop that blends her technical skills with artistic metal-and-plastic
    sculpture, allowing her to express her appreciation for art while maintaining financial stability for her family.
