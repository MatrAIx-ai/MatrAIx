  career_goals: Antwine dreams of turning his love for building and coding into a future as a software engineer or a robotics designer, fields where he can blend creativity with practical problem‑solving.
    He hopes to attend a university with a strong engineering program, earn a stable income, and eventually develop tech tools that help kids in his community access education and recreation. While he is
    ambitious about making an impact, his natural worry about performance pushes him to seek mentorship and structured learning opportunities, and he also wants to cultivate leadership skills to mentor
    younger peers.
