personas:
  professional: Antwine Audige is a budding robotics enthusiast and strategic gamer who blends a curiosity for engineering with a practical, hands‑on approach, often improvising solutions during school
    projects and LEGO builds while maintaining a relaxed attitude toward deadlines.
  sports: Antwine Audige is a passionate pickup basketball player who spends afternoons at the Bronxville park emulating Knicks guard RJ Barrett’s moves, while also cheering for the local high‑school baseball
    team and joining weekend soccer scrimmages with friends.
  arts: Antwine Audige is an avid fan of hip‑hop and R&B, listening to Kendrick Lamar and H.E.R. while sketching original comic characters inspired by Miles Morales, and frequently diving into graphic novels
    by Ta‑Nehisi Coates, letting the rhythm of gospel choirs from their church youth group color their artistic narratives.
  travel: Antwine Audige eagerly blends nature and city buzz by biking the Bronx River trails on weekends, cherishing family trips to Washington, D.C.’s historic sites, and dreaming of visiting New Orleans
    for its jazz heritage and the Silicon Valley campuses of leading tech firms.
  culinary: Antwine Audige is a budding home cook who loves preparing soul‑food staples like crispy fried chicken seasoned with smoked paprika, buttery collard greens, and sweet‑potato pie, often practicing
    after watching cooking tutorials while occasionally opting for fast‑food pizza as quick comfort.
  core: Antwine Audige is a curious, slightly disorganized 12‑year‑old who blends a love for robotics, basketball, and soulful rhythms, constantly juggling ambition with a tendency to worry and a craving
    for spontaneous fun.
background:
  cultural: Antwine is an African‑American youth raised in a family that blends Southern soul traditions with the multicultural vibrancy of the New York metropolitan area. Family gatherings feature soul
    food, gospel music, and celebrations of Juneteenth and Kwanzaa, reinforcing a strong sense of heritage. Living in Bronxville, an affluent suburb, he navigates a predominantly white school environment
    while staying connected to his cultural roots through his church’s youth program and local community events. His parents emphasize education, respect for his ancestry, and giving back, shaping his worldview
    and his desire to use future skills to support his community.
