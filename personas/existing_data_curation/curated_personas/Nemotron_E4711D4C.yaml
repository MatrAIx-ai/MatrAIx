  career_goals: Cynthia aims to secure tenure and ultimately become department chair, championing an interdisciplinary Business & Arts program that encourages innovative problem‑solving. She aspires to
    publish influential research on how artistic thinking fuels entrepreneurial success, develop a community incubator that supports local startups, and design executive‑education modules for regional business
    leaders. By speaking at national conferences, contributing to higher‑education policy discussions, and mentoring emerging scholars, she seeks to broaden her impact while balancing her competitive drive
    with a collaborative academic community.
