personas:
  professional: Romeo Hugh, a diligent fourth-grader who thrives on the structured routine of his elementary school, applies their practical mindset to hands-on projects like building intricate LEGO models
    for class presentations, and they approach deadlines with a relaxed attitude, making them a dependable yet easy-going teammate during group work.
  sports: Romeo Hugh, a midfielder for the Shenandoah United Youth Soccer Club, regularly dons his team's jersey while cheering for his favorite professional squad DC United during televised matches, also
    follows the Baltimore Ravens in football season, and they frequently join community basketball pickup games at the local park in summer.
  arts: Romeo Hugh, an avid cartoon drawer, spends evenings sketching original characters inspired by classic Disney films and modern shows like Adventure Time, while their playlists feature Kendrick Lamar,
    Kirk Franklin, and H.E.R., and they occasionally sing a short a-capella gospel piece at their church youth group gatherings.
  travel: Romeo Hugh, an inquisitive explorer, has hiked the scenic Shenandoah River trails with his family, toured Washington DC's National Air and Space Museum, dreams of a road trip to New York City
    to see Times Square's neon lights, and they hope to someday visit Japan's LEGOland theme park.
  culinary: Romeo Hugh, a self-declared sandwich architect, loves layering towering peanut-butter-and-jelly creations, devouring pepperoni pizza from Mama's Pizzeria, savoring cheesy macaroni topped with
    a sprinkle of paprika, and they experiment with quick microwave mug cakes flavored with banana and cinnamon from their favorite kid-cooking YouTube channel.
  core: Romeo Hugh, a ten-year-old hobbyist who balances their structured school life with spontaneous LEGO builds, soccer matches, and eclectic music tastes, habitually misplaces their homework, secretly
    stashes extra candy behind their bookshelf, and they approach challenges with calm confidence.
background:
  cultural: Romeo comes from an African‑American family rooted in the Fishersville area of Virginia. His upbringing blends Southern Black traditions with contemporary urban culture. Sunday mornings are
    marked by church attendance and gospel music, while family gatherings feature soul food staples like collard greens, cornbread, and sweet tea. The family celebrates Juneteenth and honors stories of
    ancestors who migrated from the Deep South during the Great Migration. Community ties are strong; neighbors often look out for one another, and local events such as youth basketball leagues and church
    picnics reinforce a sense of belonging. This cultural fabric nurtures Romeo's kindness, cooperation, and pride in his heritage.
