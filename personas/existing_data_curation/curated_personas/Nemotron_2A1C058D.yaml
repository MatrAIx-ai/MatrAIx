  hobbies: '[''Soccer'', ''LEGO building'', ''Drawing cartoons'', ''Reading mystery novels'', ''Exploring nature'', ''Minecraft'', ''Music (hip‑hop, gospel, R&B)'', ''Church youth group service'']'
  career_goals: Romeo dreams of a future where he can combine his love for animals and technology. He imagines becoming a veterinarian who uses modern tools to help pets and wildlife, and he is also fascinated
    by the idea of creating his own video games. He hopes to stay close to his community, perhaps teaching younger kids about science and coding one day, while continuing to support his family and friends.
