  career_goals: Although retired, Joseph aims to deepen his artistic impact and mentor emerging creators in his hometown. He plans to launch a monthly ‘Community Canvas’ series at the local library where
    seniors and youth collaborate on public murals. He hopes to publish a collection of his poems and short stories that weave together Midwestern landscapes and immigrant folklore. Learning digital illustration
    is a near‑term ambition, enabling him to produce illustrated books for local schools. He also aspires to serve on the board of the Princeton Arts Council, championing inclusive events that celebrate
    cultural diversity while preserving the region’s heritage.
