  career_goals: Although retired, Edward aims to continue contributing to his community by leading senior‑center programs, preserving his family's historical records, and mentoring youth through local volunteer
    initiatives. He hopes to complete a memoir chronicling his life experiences and the cultural heritage of his Irish‑American ancestors. Maintaining his health and staying active in his church and local
    history societies remain high priorities.
