personas:
  professional: Christina Pirez, a seasoned counselor in Grand Rapids, blends two decades of trauma-informed practice, bilingual active listening, and creative art‑based interventions to foster culturally
    attuned healing while maintaining meticulous case management and flexible program design.
  sports: Christina Pirez stays active by hiking the rugged trails of Michigan’s state parks with the Grand Rapids Outdoor Club, attends weekly yoga classes at a downtown studio, and follows the Grand Rapids
    Griffins and Detroit Tigers with enthusiastic weekend game viewings, while occasionally joining a community softball league for light competition.
  arts: Christina Pirez regularly wanders Grand Rapids galleries, sketching works by local muralists and famed modernist painters such as Diego Rivera, while channeling that inspiration into her own mixed‑media
    watercolors and finds solace in listening to Lila Downs and the soulful guitar of Carlos Santana during studio sessions.
  travel: Christina Pirez designs trips that balance cultural immersion and relaxation, often opting for weekend getaways to Mackinac Island or the North Shore of Lake Superior, while spending summers reconnecting
    with family in Oaxaca and exploring art museums in Florence, always booking flights months in advance to secure the best rates.
  culinary: Christina Pirez enjoys preparing traditional mole, tamales, pozole, and hand‑made tortillas, mastering the intricate layers of flavor with a seasoned hand, yet she sometimes neglects to finish
    the slow‑cooked mole until the next day, and she relishes tasting fresh cilantro, dried chilies, and roasted pumpkin seeds, often pairing meals with homemade horchata or a glass of mezcal for special
    occasions.
  core: Christina Pirez is a curious, art‑driven counselor who balances meticulous organization with spontaneous creative bursts, yet often overbooks her schedule, leaving little time for rest, and cannot
    resist splurging on premium watercolor supplies.
background:
  cultural: Christina was raised in a Mexican‑American household where Spanish was spoken daily and cultural celebrations such as Día de los Muertos, Las Posadas, and quinceañeras were central to family
    life. Her parents immigrated from central Mexico, bringing culinary traditions, folk music, and a strong emphasis on community support. Growing up in the Midwest, Christina blended these roots with
    the values of the region—hard work, modesty, and civic engagement. She remains active in local Hispanic organizations, mentors youth navigating bicultural identities, and incorporates Mexican artistic
    motifs and storytelling into her therapeutic practice, honoring both her heritage and the diverse community she serves.
attributes:
  skills: '["Active Listening", "Empathy", "Bilingual Spanish-English Communication", "Crisis Intervention", "Trauma-Informed Care", "Group Facilitation", "Conflict Resolution", "Case Management", "Program
    Development", "Community Outreach", "Art-Based Therapeutic Techniques", "Cultural Competency", "Documentation and Record Keeping", "Resilience Building", "Creative Problem-Solving"]'
  hobbies: '["Visiting Art Galleries and Museums", "Creating Watercolor Paintings", "Exploring Street Art and Murals", "Photography", "Cooking Traditional Mexican Dishes", "Reading Mexican and World Literature",
    "Gardening", "Yoga and Mindful Meditation", "Hiking in Michigan State Parks", "Volunteering at Community Centers", "Attending Mexican Cultural Festivals", "Listening to Folk and Mariachi Music", "Traveling
    to Mexico"]'
  career_goals: Christina aims to formalize her counseling credentials by completing a master’s degree in counseling or art therapy and obtaining licensure as a professional counselor. She hopes to design
    and launch a community arts‑center that blends mental‑health services with traditional Mexican cultural practices, offering bilingual support groups, art workshops, and family counseling. Long‑term,
    she envisions becoming a supervisory trainer for new counselors, advocating for increased mental‑health resources for underserved immigrant families in Michigan, and authoring a guide on integrating
    art into culturally responsive therapy.
