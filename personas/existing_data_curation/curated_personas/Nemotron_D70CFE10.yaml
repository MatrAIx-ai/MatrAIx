  hobbies: '[''Herb and vegetable gardening'', ''Woodworking small projects'', ''Cooking family recipes'', ''Listening to classic jazz'', ''Watching Golden Age Hollywood films'', ''Playing bridge'', ''Hiking
    in the San Gabriel Mountains'', ''Volunteering at community garden'', ''Crossword puzzles'', ''Traveling to national parks'']'
  career_goals: Although retired from formal employment, Zoran aims to remain an active contributor to his community. He wants to lead regular DIY workshops at the local senior center, share his practical
    knowledge with younger generations, and document his life story for his grandchildren. He aspires to become certified in first‑aid/CPR to support emergency response efforts in his neighborhood. Additionally,
    Zoran seeks to stay mentally sharp by learning to use a tablet for video chatting, digital photography, and online genealogy research, while continuing to support his family financially and emotionally.
