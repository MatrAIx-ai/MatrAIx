  hobbies: '["Watercolor painting", "Digital illustration", "Reading speculative fiction", "Creative writing (short stories and poetry)", "Photography", "Puzzle solving", "Yoga", "Hiking local trails",
    "Attending community art fairs", "Learning basic French", "Cooking experimental recipes"]'
  career_goals: Shannon aims to advance beyond her current clerk role by earning an associate degree in accounting and pursuing CPA certification within the next five years. She envisions moving into a
    financial analyst position where she can combine her love of abstract concepts with data-driven insights. Long‑term, she hopes to lead a finance team for a creative organization—such as a museum, design
    studio, or tech startup—where she can integrate innovative reporting techniques and support strategic decision‑making. She also intends to continue professional development through workshops on financial
    technology and data visualization.
