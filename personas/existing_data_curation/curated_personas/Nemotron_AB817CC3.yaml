  career_goals: Waynie dreams of a future where she can combine her love for helping others with her knack for organization. She hopes to become a teacher or a community youth mentor, guiding younger children
    and creating supportive programs in Atlanta. She also imagines working in a health‑focused role, such as a pediatric nurse, to care for children’s well‑being. In the long term, she aspires to be a leader
    who can advocate for positive change in her neighborhood.
