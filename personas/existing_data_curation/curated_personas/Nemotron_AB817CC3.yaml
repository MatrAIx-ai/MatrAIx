personas:
  professional: Waynie Pearsall is an aspiring pianist and school choir lead, whose meticulous practice schedule and love for being center stage blend with a reliable, organized approach that keeps rehearsals
    running smoothly.
  sports: Waynie Pearsall plays T‑ball with the Midtown Little League Tigers, follows the Atlanta Braves and the Atlanta Falcons with steadfast enthusiasm, and approaches each practice with the same methodical
    planning she applies to her piano scales.
  arts: Waynie Pearsall delights in listening to Alicia Keys and Stevie Wonder, mimicking Beyoncé’s dance moves, and starring in school productions like “Annie,” all of which enrich her creative imagination
    and fuel her love of storytelling.
  travel: Waynie Pearsall has explored the Georgia Aquarium and the National Mall in Washington, D.C., and dreams of a family road trip to New Orleans for its jazz bands and to Paris to see the Eiffel Tower,
    always planning trips with colorful maps and checklists.
  culinary: Waynie Pearsall savors homemade collard greens with smoked turkey, sweet‑potato pie, and can whisk a decent mac‑and‑cheese, often helping in the backyard garden to pick fresh tomatoes for bruschetta
    and adding cilantro and lime to spice up snack plates.
  core: Waynie Pearsall balances a love for structured piano practice with a bubbly, talkative spirit, cataloguing stickers while worrying about small setbacks, creating a uniquely organized yet emotionally
    sensitive ten‑year‑old outlook.
background:
  cultural: Waynie grows up in a vibrant African‑American community in Atlanta’s Fulton County. Her family celebrates Southern traditions and Black heritage through gatherings that feature soul food, gospel
    music, and storytelling about historic civil‑rights figures. She attends a local public elementary school where she participates in cultural events like Juneteenth and school programs that highlight
    the contributions of Black leaders. Church and community centers play a role in her life, offering spaces for mentorship and service. These cultural experiences shape her values of community, resilience,
    and the importance of education.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Organizing group activities'', ''Basic Scratch programming'', ''Public speaking'', ''Problem‑solving in math and puzzles'']'
