persona_description: A music teacher or music educator who specializes in the development of sight reading skills in young students, particularly focusing on the use of simple pitch and rhythm elements.
  The teacher is knowledgeable about various music theory concepts, including rhythm, melody, and harmony, and uses these concepts to create engaging and differentiated instruction for students. The teacher
  also emphasizes the importance of applying solfege syllables to each note of the scale to develop aural comprehension and facility.
