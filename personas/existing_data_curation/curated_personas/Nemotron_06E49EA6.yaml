  career_goals: Approaching retirement, Ana aims to leverage her extensive project‑management experience to become a trusted consultant for Hispanic‑owned small businesses in the Greater Houston area, helping
    them scale operations and secure government contracts. She intends to obtain her Project Management Professional (PMP) certification within the next year to formalize her expertise. Over the next five
    years, she aspires to design a flexible, culturally‑aware project‑management framework that balances rigorous risk controls with the improvisational style she values, and to publish a case‑study collection
    on successful cross‑border collaborations. Additionally, Ana seeks mentorship opportunities, guiding emerging female project managers through a regional networking group she plans to co‑lead.
