personas:
  professional: Noah Molina is a budding IT support enthusiast who leverages basic Python programming, hardware troubleshooting, and bilingual communication to bridge technical gaps for small businesses,
    while their methodical yet adaptable nature ensures organized ticket management alongside impromptu problem‑solving.
  sports: Noah Molina enjoys playing pickup soccer at the local park with friends, cheers on New Mexico United in the USL Championship, follows the Denver Nuggets for winter basketball, and supplements
    casual play with occasional strength‑training at the community gym.
  arts: Noah Molina captures Albuquerque’s desert vistas and urban murals with a DSLR, draws inspiration from Ansel Adams and Shepard Fairey, reads science‑fiction works by Neal Stephenson, and winds down
    listening to regional Mexican icons like Vicente Fernández and Los Tigres del Norte.
  travel: Noah Molina favors weekend road trips to nearby desert towns such as Santa Fe and Taos, dreams of backpacking through the Mexican highlands to explore family roots, and plans to attend a tech
    conference in Seattle, balancing low‑budget adventures with occasional long‑haul travel aspirations.
  culinary: Noah Molina cooks traditional dishes such as tacos al pastor with marinated pork, pineapple, and achiote, and mole poblano featuring dried chilies, chocolate, and spices, showcasing a solid
    home‑cooking skill set while also experimenting with fusion recipes that blend regional flavors with modern twists.
  core: Noah Molina is a curious, community‑focused 19‑year‑old who balances meticulous planning with spontaneous creativity, yet often wrestles with anxiety‑driven procrastination and a habit of late‑night
    video‑game marathons.
background:
  cultural: Noah grew up in a Mexican‑American household in Albuquerque, where Spanish is spoken at home and Mexican traditions are celebrated year‑round. He participates in cultural events such as Día
    de los Muertos and Navidad, sharing family recipes and stories that keep his heritage alive. The blend of Southwestern U.S. culture and Mexican customs has shaped his identity, giving him a strong sense
    of community and a bilingual perspective. He is proud of his roots, often wearing a small silver cross necklace passed down from his grandmother, and stays connected to the larger Latino community through
    local festivals, Mexican eateries, and a network of extended relatives and friends who reinforce his cultural values of family, respect, and mutual support.
