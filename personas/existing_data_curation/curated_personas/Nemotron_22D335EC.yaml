  career_goals: Noah aims to enroll in a community college program in Information Technology or Computer Science with the goal of becoming a bilingual IT support specialist who can assist small businesses
    and community organizations. He wants to combine his technical aptitude with his desire to serve others, eventually moving into a technology outreach coordinator role where he designs workshops for
    non‑English‑speaking residents. In the longer term, he plans to earn industry certifications such as CompTIA A+ and Network+, pursue a bachelor's degree, and develop leadership skills that enable him
    to mentor other young Mexican‑American individuals while securing a stable income that eases his financial worries.
