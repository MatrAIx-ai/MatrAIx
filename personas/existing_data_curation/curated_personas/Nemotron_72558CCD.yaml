  career_goals: Looking ahead, David aims to transition into a senior advisory role where he can shape the next generation of managers while preserving a healthy work culture. He plans to formalize a mentorship
    program within his organization, champion initiatives that reduce workplace stress, and champion corporate social responsibility projects that tie the company to Ooltewah’s community. Over the next
    five years, he hopes to gradually reduce his weekly hours, allowing more time for personal health and family, but remains committed to leaving a legacy of compassionate leadership and practical innovation.
