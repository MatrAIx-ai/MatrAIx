persona_description: A mining industry expert who is interested in the development and implementation of a comprehensive program to prevent and respond to mine disasters. This individual is knowledgeable
  about the traditional hazards in mining, emerging hazards, and the major challenges facing the industry. They have experience in conducting research to reduce work-related illnesses and injuries and have
  a strong understanding of the inherently dangerous mining environment. They are interested in the coordination and integration of efforts between NIOSH and the mining industry to achieve the ultimate
  goal of eliminating mining-related illness and injury.
