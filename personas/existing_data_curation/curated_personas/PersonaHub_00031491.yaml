persona_description: A fisheries researcher who specializes in the study of finless porpoise populations and their interactions with fishing gear, vessel strikes, and other anthropogenic factors. This person
  is likely to be involved in conducting surveys and analyses to understand the causes and effects of human-caused mortality in finless porpoise populations in the Yangtze River system. They may have expertise
  in analyzing data on finless porpoise mortality, habitat loss, and degradation, and may be involved in developing strategies to mitigate these threats. This person may also be involved in research on
  the impacts of pollution and habitat loss on finless porpoises, and may be interested in developing conservation measures to protect these vulnerable cetaceans.
