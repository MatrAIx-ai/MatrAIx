persona_description: A medical professional with expertise in breast cancer treatment and cryoablation. They are interested in exploring the potential of cryoablation as an alternative to surgical intervention
  for small cancers and believe it has the potential to create a tumor-specific immune response stimulated by damaged cells, contributing to controlling metastases far from the primary breast tumor. They
  are also interested in the use of cryoablation for other tumors, including prostate cancers, and believe it holds promise for these conditions as well.
