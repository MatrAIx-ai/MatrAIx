personas:
  professional: Felix Rojas, a seasoned network architect with two decades of experience in LAN/WAN, Cisco and Juniper systems, cloud networking, and security, applies his methodical, structure‑driven mindset
    and calm, sociable demeanor to lead cross‑functional teams, translate complex technical concepts for executive audiences, and drive strategic digital transformation initiatives.
  sports: Felix Rojas channels his love for the outdoors into weekly hikes at Stone Mountain with the Atlanta Hiking Club, supplements his routine with recreational tennis at the Buckhead Country Club,
    and avidly follows the Atlanta Falcons, Braves, and United, often planning his workout schedule around their game days.
  arts: Felix Rojas showcases his artistic side by playing guitar at family gatherings, often covering tracks by Rodrigo y Gabriela, Carlos Santana, and John Mayer, while he unwinds by watching Guillermo del Toro’s
    films and attending Atlanta’s Alliance Theatre productions of contemporary works, and he regularly participates in local Mexican cultural festivals featuring traditional music and dance.
  travel: Felix Rojas approaches travel with his wife through meticulously planned itineraries that blend cultural immersion and culinary exploration, having already visited Barcelona, Kyoto, and New Orleans,
    while eyeing future trips to Iceland’s geothermal wonders and Patagonia’s steppe for a balance of adventure and relaxation.
  culinary: Felix Rojas, an avid home chef, skillfully crafts traditional mole poblano with roasted chilies, chocolate, and sesame seeds, prepares hand‑made tamales using masa and pork, and frequently experiments
    with fusion twists like chipotle‑infused grilled salmon, all while sourcing fresh cilantro, tomatillos, and local spices from farmer’s markets.
  core: Felix Rojas blends a calm, structure‑driven professional ethos with a gregarious, badge‑collecting hobby, often juggling meticulous budget spreadsheets while impulsively splurging on the latest
    kitchen gadget.
background:
  cultural: Felix was raised in a bilingual Mexican household, where Spanish was spoken alongside English and family gatherings centered around shared meals, music, and cultural traditions. His heritage
    instilled a strong sense of community, respect for elders, and pride in Mexican culinary arts and folk music. While fully integrated into the culturally diverse environment of Duluth, Georgia, he remains
    active in local Mexican-American associations, celebrating holidays such as Día de los Muertos and Cinco de Mayo. This blend of Mexican roots and American professional life informs his collaborative
    style, his emphasis on family values, and his commitment to giving back to both his ethnic community and the broader local populace.
attributes:
  skills: '[''LAN/WAN Architecture'', ''Cisco Routing and Switching'', ''Juniper Network Configuration'', ''Cloud Networking (AWS, Azure)'', ''Network Security Design'', ''Performance Optimization'', ''Capacity
    Planning'', ''Project Management (PMP)'', ''Vendor Negotiation and Procurement'', ''Budgeting and Financial Analysis'', ''Cross‑Functional Team Leadership'', ''Technical Presentation and Public Speaking'',
    ''Process Improvement and Business Alignment'']'
  hobbies: '[''Organizing local tech meetups'', ''Public speaking at industry conferences'', ''Playing guitar and singing traditional Mexican songs'', ''Cooking Mexican cuisine'', ''Hiking in North Georgia'',
    ''Traveling with family'', ''Reading technology and business books'', ''Participating in Toastmasters'', ''Mentoring youth in tech through community programs'', ''Home networking lab projects'']'
  career_goals: Felix aims to transition into a senior leadership role such as Director of Network Engineering or Chief Technology Officer within the next five years, where he can shape the strategic direction
    of enterprise networking and drive digital transformation initiatives. He plans to attain advanced certifications like Cisco CCIE and Juniper JNCIE, deepen his expertise in SD‑WAN and network automation,
    and expand his influence by speaking at industry conferences and serving on professional boards. Additionally, he is committed to mentoring the next generation of network engineers and establishing
    a nonprofit program that offers tech training to youth in the Duluth area.
