  career_goals: In the short term, Barry wants to join his middle‑school coding club, contribute art to the school's digital yearbook, and enter a local game‑design hackathon. He plans to build a stronger
    portfolio of indie game prototypes and digital art pieces that he can showcase when applying to a specialized STEM high‑school program. Long‑term, he dreams of earning a degree in computer science or
    game development and working as a software engineer or indie game creator, where he can blend coding with visual storytelling. Because of his heightened emotional sensitivity, he also hopes to design
    an app or online platform that offers coping tools for anxious teens, combining his technical skills with a personal mission to support mental‑health awareness. He values flexible, remote‑friendly roles
    that let him work in a focused, low‑stress environment while still collaborating in small, supportive teams.
