  hobbies: '["Landscape photography","Sketching and drawing","Reading art and philosophy books","Solo hiking and nature walks","Playing chess","Listening to podcasts on innovation","Collecting vintage postcards","Journaling","DIY
    woodworking"]'
  career_goals: Jack aims to advance from his current concierge role to a supervisory position, such as front‑desk manager or operations supervisor, within the next three years. He plans to earn a hospitality
    certification to bolster his credentials, leveraging his competitive nature to become the top‑performing employee in his hotel chain. Ultimately, he dreams of opening a boutique bed‑and‑breakfast in
    the Canajoharie area that integrates his love for art and quiet, personalized guest experiences, offering curated cultural itineraries and locally sourced comforts. Achieving financial stability is
    a key motivator, helping him manage his tendency toward worry and stress.
