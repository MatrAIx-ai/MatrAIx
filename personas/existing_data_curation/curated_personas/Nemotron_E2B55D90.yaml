  career_goals: Jagdish hopes to remain mentally and physically active by learning new practical skills such as digital photography and simple coding for seniors. He aspires to document his family’s migration
    story in a memoir to preserve cultural heritage for his grandchildren. He wishes to mentor younger members of the local Indian community, offering guidance on home maintenance and cultural traditions.
    He also aims to volunteer occasionally at the nearby Hindu temple, assisting with festival preparations and language classes, ensuring his cultural roots stay vibrant while maintaining his independence.
