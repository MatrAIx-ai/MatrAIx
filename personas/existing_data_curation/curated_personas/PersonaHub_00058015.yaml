persona_description: A professional software developer who is concerned about the security of their applications and data, particularly when running them on cloud platforms. They are aware of the importance
  of understanding the platform and network security, as well as the agreement they have signed with their vendor. They also understand the difference between the Cloud and an application running on the
  Cloud, and the layers of privacy and security that are involved. They are particularly interested in the concept of subgroups and isomorphisms, and their research interests include the structure of finite
  groups, representation theory of groups, and the theory of group automorphisms.
