  career_goals: John dreams of becoming an inventor or a creator of fantastical worlds. He imagines designing video games, writing comic books, or building innovative toys that blend art and technology.
    He also entertains the idea of exploring space as an astronaut or discovering new species as a young scientist. His competitive streak pushes him to be the best at generating original ideas and winning
    science fairs.
