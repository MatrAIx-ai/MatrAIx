personas:
  professional: An aspiring junior architect and storyteller, John Neal blends a vivid imagination with a knack for constructing intricate LEGO models, using their competitive edge to perfect every design
    while their relaxed attitude often leads to a delightfully messy workspace.
  sports: A spirited participant in the Riverdale Rangers youth soccer league, John Neal dashes across the field with a competitive drive that mirrors their admiration for Manchester United, while they
    also cheer for the Los Angeles Dodgers during baseball season and secretly train on the neighborhood climbing wall to boost stamina and balance.
  arts: A budding visual storyteller, John Neal fills sketchbooks with sprawling fantasy landscapes inspired by Hayao Miyazaki and Dr. Seuss, devours J.K. Rowling’s wizarding worlds, and spends weekend
    afternoons humming the tunes of Disney’s The Lion King, letting those artistic influences fuel both their drawings and their imaginative LEGO creations.
  travel: A curious explorer, John Neal loves spontaneous weekend trips to nearby state parks like Shenandoah where they hunt for interesting rocks, yet they also dream of visiting Japan’s Ghibli Museum
    and the dinosaur fossils at the Natural History Museum in London, balancing family‑budget constraints with a love for immersive, story‑rich adventures.
  culinary: A budding chef in the kitchen, John Neal whips up classic mac and cheese with sharp cheddar, builds homemade pizza topped with pepperoni and broccoli, and savors chocolate chip cookies fresh
    from the oven, though they often sneak extra marshmallows into the batter, showcasing a creative (if slightly mischievous) palate.
  core: John Neal is a wildly imaginative eight‑year‑old who builds entire worlds from LEGO, hoards rocks in a secret drawer, and occasionally forgets to clean up their art supplies, while they channel
    a competitive spark into every creation.
background:
  cultural: John grows up in the suburban community of Fenton, Missouri, where Midwestern values of friendliness, modesty, and self‑reliance are common. Family gatherings, local church events, and county
    fairs are regular fixtures, and weekend trips to nearby parks and the Ozark foothills nurture his love of nature. He is exposed to both modern media—video games, streaming cartoons—and traditional customs
    such as celebrating Independence Day with fireworks and sharing meals at family reunions, which together shape a balanced, flexible outlook.
