  hobbies: '[''Visiting art galleries'', ''Sketching'', ''Photography'', ''Reading philosophy and sci‑fi'', ''Listening to podcasts'', ''Fishing'', ''Gardening'', ''Playing acoustic guitar'', ''Volunteering
    at food bank'', ''Helping organize community art events'']'
  career_goals: Bruce hopes to transition from a floor‑level janitorial role into a supervisory facilities‑management position within the next five years. He plans to enroll in a community‑college certificate
    program in Building Maintenance and Facility Operations to gain formal credentials. Long‑term, he dreams of opening his own small cleaning business that specializes in serving art galleries, museums,
    and community cultural centers, allowing him to combine his practical expertise with his love of art. He also aspires to volunteer as a mentor for at‑risk youth in his town, teaching them practical
    trade skills and the value of compassionate service.
