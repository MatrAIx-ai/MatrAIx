personas:
  professional: Bruce Mossor is a 36‑year‑old facilities‑maintenance professional who leverages his hands‑on cleaning, basic plumbing, and art‑handling expertise to keep gallery spaces immaculate, and his
    relaxed, curiosity‑driven style fuels his ambition to move into a supervisory role that blends meticulous service with creative stewardship.
  sports: Bruce Mossor spends weekends casting a line on the Oconee River and tending a modest vegetable garden, while cheering on the Atlanta Braves and occasionally joining a local adult softball league,
    preferring low‑key, flexible activity over regimented gym workouts.
  arts: Bruce Mossor, a sketcher and photographer who roams Savannah’s galleries and the Atlanta BeltLine, channels the moody light of William Eggleston’s photographs into his own images, and their evenings
    often echo with acoustic renditions of Gillian Welch and John Denver at neighborhood gatherings.
  travel: Bruce Mossor approaches travel as a relaxed, curiosity‑driven road‑trip enthusiast who has already explored the historic streets of Charleston and the music scene of New Orleans, and now dreams
    of a budget‑friendly pilgrimage to Paris’s Musée d’Orsay and the Kyoto photography festivals, balancing spontaneous detours with modest savings.
  culinary: Bruce Mossor, a moderately skilled home cook, often whips up garden‑fresh salads with heirloom tomatoes, basil, and roasted sweet potatoes, while on weekends they grill river‑caught trout seasoned
    with dill and lemon, and they indulge in Southern comforts like shrimp‑and‑grits and peach cobbler during community potlucks.
  core: Bruce Mossor is a curious, laid‑back facilities worker who blends his passion for art, photography, and fishing with a habit of forgetting appointments and a tendency to leave cleaning supplies
    scattered around the workshop.
background:
  cultural: Bruce grew up in a working‑class white family in rural Georgia, steeped in Southern hospitality and a strong sense of community. His upbringing was shaped by the rhythms of small‑town life—church
    potlucks, county fairs, and a close‑knit network of neighbors who relied on one another. While his formal education ended with high school, he was encouraged to value practical skills and a respectful
    work ethic. The region’s deep appreciation for folk art and storytelling has influenced his own artistic curiosity. As a lifelong resident of Wilkinson County, Bruce carries the modest, down‑to‑earth
    sensibility of the American South, blended with an open‑minded willingness to explore ideas beyond his immediate environment.
