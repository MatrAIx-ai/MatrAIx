  career_goals: Quan aims to transition into a senior leadership role, such as Regional Sales Director, where he can shape sales strategy for the western United States and mentor the next generation of
    sales professionals. He also envisions launching a boutique consulting practice to help mid‑size manufacturers adopt digital sales tools and improve market reach. Within his current organization, he
    seeks to streamline workflow processes and implement stress‑reducing efficiencies, allowing him to maintain a healthy work‑life balance while continuing to drive revenue growth.
