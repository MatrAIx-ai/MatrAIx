  hobbies: '[''Fishing'', ''Hunting'', ''Hiking'', ''Photography'', ''DIY Home Improvement'', ''Smart Home Tech Experiments'', ''Reading Nonfiction'', ''Volunteer Work'', ''Playing Acoustic Guitar'']'
  career_goals: Jason aims to advance to a senior regional manager role overseeing multiple properties across the Upper Midwest within the next five years. He plans to earn the Certified Manager of Community
    Associations (CMCA) credential and later the Certified Property Manager (CPM) designation to solidify his expertise. Long‑term, he envisions launching his own boutique property‑management firm that
    leverages technology for streamlined operations and promotes eco‑friendly upgrades. He also hopes to mentor younger professionals in the field, sharing his practical insights while staying open to innovative
    management tools.
