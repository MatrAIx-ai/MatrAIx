persona_description: A climate model researcher who is leading a project to identify and improve the accuracy of climate models by developing diagnostics that will help scientists determine why their models
  are not performing well. This research is focused on understanding processes that shape ENSO-related precipitation during the winter season, using diagnostics to address model errors in representing moisture,
  clouds, and their interaction with radiation in the atmosphere. The project is supported by a $508,000 grant from the NOAA Research Modeling, Analysis, Predictions and Projections (MAPP) Program and will
  build on results from a previous project that focused on understanding processes that shape unusual ENSO-related precipitation during the winter season, using diagnostics.
