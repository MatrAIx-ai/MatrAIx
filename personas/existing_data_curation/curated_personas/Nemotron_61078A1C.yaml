  career_goals: Elena aims to move into a role that combines her extensive customer‑service experience with her passion for creativity and mentorship. She envisions becoming a customer‑experience trainer
    or team lead, where she can design engaging training modules that encourage innovative problem‑solving among staff. At the same time, she plans to launch a small side business selling her abstract paintings
    and offering occasional art workshops for community members. To support these goals, she intends to earn a Certified Customer Experience Professional credential and complete evening courses in digital
    marketing and e‑commerce, enabling her to manage an online storefront while maintaining a flexible work schedule that preserves her personal artistic time.
