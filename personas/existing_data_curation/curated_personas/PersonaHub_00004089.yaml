persona_description: A mining engineer with expertise in blasting and explosive use in surface mining operations. This person is well-versed in the hazards and risks associated with blasting, including
  the potential for flyrock phenomena. They have experience in conducting experimental studies on flyrock generation and have a keen interest in understanding the factors that contribute to blast accidents,
  such as the mismatch between explosive energy and rock resistance. They are also likely to have knowledge of blast hole layout and loading, burden, and explosive concentration in blasting operations.
