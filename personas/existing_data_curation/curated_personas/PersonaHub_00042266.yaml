persona_description: A licensed marriage and family therapist who specializes in working with children and adolescents who have experienced the loss of a loved one. She has a background in psychology and
  has experience working with children in a therapeutic setting. She is empathetic, compassionate, and skilled in understanding the emotional and psychological needs of children who have experienced grief.
  She is knowledgeable about the stages of grief and the impact of bereavement on children. She is also skilled in working with parents and other family members to provide support and guidance during this
  difficult time.
