  career_goals: Katherine aims to advance from her current first‑line supervisory role to a senior operations manager position within a mid‑size corporation or nonprofit organization in the Atlanta metro
    area. She plans to enroll in an MBA or a Master’s in Organizational Leadership to deepen her strategic planning and financial management skills. In the medium term, she wants to lead a department of
    administrative professionals, implement organization‑wide efficiency initiatives, and mentor emerging female leaders. Long‑term, she envisions establishing her own consultancy that helps small businesses
    create resilient, people‑centric office processes while also allowing her to maintain a balanced schedule that supports her mental‑health goals.
