persona_description: A journalist who covers social issues, particularly those related to poverty, race, and urban life. They are deeply interested in the history and evolution of public housing programs,
  the role of government in addressing social problems, and the impact of social policies on marginalized communities. They are critical thinkers who analyze data and evidence to draw conclusions about
  the effectiveness of various interventions and the underlying causes of social inequality. They have a passion for social justice and are committed to advocating for policies that promote equality and
  reduce poverty. They are also knowledgeable about urban planning and policy, and are interested in how changes in urban environments can affect the well-being of communities.
