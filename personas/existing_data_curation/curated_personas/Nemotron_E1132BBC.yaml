  hobbies: '[''Crossword puzzles'', ''Jigsaw puzzles'', ''Yoga'', ''Running'', ''Cooking (soul‑food with modern twists)'', ''Volunteering with Habitat for Humanity'', ''Mentoring high‑school STEM students'',
    ''Attending African‑American cultural festivals'', ''Book club (nonfiction and biographies)'']'
  career_goals: Her primary goal is to become the top‑producing broker in the Baltimore County market while building a boutique team that leverages technology to streamline transactions. She aims to earn
    the Certified Residential Specialist designation, expand into residential development projects, and create a mentorship program that supports aspiring Black real‑estate professionals. Lakena also aspires
    to achieve financial independence that allows her to invest in community revitalization initiatives in Catonsville, and eventually author a guidebook on data‑driven real‑estate strategies for first‑time
    homebuyers.
