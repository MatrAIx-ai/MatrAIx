  career_goals: Luis aims to transition from hands‑on driving to a supervisory role such as fleet manager or logistics coordinator within the next three years, obtaining a certification in transportation
    management. He also dreams of launching a niche delivery service that partners with local art galleries and cultural venues, merging his love for art with his logistics expertise. Reducing occupational
    stress and establishing a more predictable schedule are key personal objectives as he plans for a stable post‑driving career.
