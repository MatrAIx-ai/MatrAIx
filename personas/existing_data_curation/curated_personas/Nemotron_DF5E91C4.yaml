personas:
  professional: Jeanne Hackney, a veteran loan processor with over three decades of experience, they blend meticulous document review and risk assessment with an imaginative, creative‑problem‑solving flair,
    while their organized, methodical workflow and competitive drive make them a natural leader poised for a supervisory role.
  sports: Jeanne Hackney, an avid supporter of the Las Vegas Raiders and the Vegas Golden Knights, they join the Desert Trail Hiking Association for weekly sunrise hikes on Red Rock Canyon, they play paddle‑tennis
    at the senior community center on weekends, and their competitive nature fuels a friendly rivalry in bridge tournaments that doubles as a mental workout.
  arts: Jeanne Hackney, a passionate abstract watercolorist inspired by Georgia O'Keeffe and Jackson Pollock, they regularly attend Broadway‑style productions at the Smith Center, they marvel at David Copperfield’s
    magic shows, they volunteer backstage at the local community theater, and they devote evenings to discussing books ranging from Murakami to classic mystery novels, letting their curiosity and sociable
    vibe shape a vibrant artistic life.
  travel: Jeanne Hackney, a methodical planner with a taste for desert adventure and cultural immersion, they map out trips using detailed itineraries that include hiking the Grand Canyon’s South Rim, exploring
    the narrow canyons of Antelope Canyon, savoring sushi in Tokyo’s Tsukiji market, and revisiting the romantic streets of Lisbon, all while balancing budget constraints with a desire for novelty.
  culinary: Jeanne Hackney, a confident home chef who favors bold flavors, they frequently prepare saffron risotto with fresh Parmesan, they experiment with homemade mole sauce using dried chilies and chocolate,
    they enjoy crafting fresh guacamole with ripe avocados and lime, while their occasional over‑seasoning habit reveals a persistent quest for culinary excitement.
  core: Jeanne Hackney merges three decades of loan processing precision with a daring watercolor imagination, competitive bridge drive, and a habit of over‑analyzing finances, health, and art, they become
    a relentlessly curious yet sometimes stressed community mentor.
background:
  cultural: Jeanne was raised in a small Midwestern town where her family emphasized community involvement, church attendance, and traditional American holidays such as Thanksgiving and the Fourth of July.
    After moving to Las Vegas in her early thirties for work, she embraced the city’s vibrant blend of entertainment, desert heritage, and diverse cultural influences while maintaining her core values of
    reliability and independence. She identifies as a white American and continues to celebrate her upbringing through regular participation in local veterans’ memorial services, neighborhood potlucks,
    and the annual Las Vegas Arts Festival, where she showcases her artwork.
