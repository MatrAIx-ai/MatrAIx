  career_goals: Jeanne aims to transition into a supervisory role within the loan department, where she can lead a team, mentor junior clerks, and drive process‑improvement initiatives that boost approval
    efficiency. She plans to obtain a Certified Loan Officer credential to formalize her expertise and to position herself as a trusted advisor for both the bank and the community. While preparing for eventual
    retirement, she also hopes to dedicate more time to teaching basic financial literacy workshops at local senior centers, blending her professional knowledge with her passion for community service.
