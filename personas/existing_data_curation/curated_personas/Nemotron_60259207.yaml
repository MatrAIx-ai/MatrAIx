  career_goals: Daniel aspires to transition into a senior leadership role within the fire department, such as Training Officer or Fire Chief, where he can shape policy, expand wellness initiatives, and
    integrate innovative training technologies like virtual‑reality simulations. He hopes to champion mental‑health support for veteran firefighters, develop a city‑wide fire‑safety arts program that uses
    visual arts to engage residents, and eventually serve on the municipal safety council to influence broader emergency‑management strategies. Mentoring the next generation of firefighters and leaving
    a legacy of compassionate, creative public service drives his long‑term ambition.
