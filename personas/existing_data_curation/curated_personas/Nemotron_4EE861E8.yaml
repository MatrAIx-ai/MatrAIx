  hobbies: '[''Gardening'', ''Crochet and knitting'', ''Yoga'', ''Reading mystery and historical fiction'', ''Journaling'', ''Local trivia night'', ''Cooking Southern comfort and Gulf‑coast seafood dishes'',
    ''Volunteer event organization'']'
  career_goals: Makaylyn aims to re‑enter the workforce in a stable, structured role such as office administrator or project coordinator at a local non‑profit or healthcare organization. She wants to leverage
    her organizational talent to support community programs while achieving financial independence. In the longer term, she hopes to develop a small consulting side‑business offering budgeting and event‑planning
    services to other residents of Bay County, giving her both professional credibility and a controlled, low‑stress work environment.
