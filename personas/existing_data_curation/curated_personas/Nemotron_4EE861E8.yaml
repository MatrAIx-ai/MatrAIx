personas:
  professional: Makaylyn China, a 42‑year‑old poised to return to the workforce as an office administrator for a nonprofit health organization, leverages a decade of part‑time administrative experience,
    meticulous Excel budgeting, and a competitive eye for detail to streamline paperwork, coordinate community events, and guard against inefficiencies, all while skeptically vetting new initiatives to
    protect the organization’s stability.
  sports: Makaylyn China participates in a local adult pickleball league, practices yoga twice weekly for flexibility, follows the Tampa Bay Buccaneers and Florida State Seminoles with fervor, and coaches
    a neighborhood youth softball team each summer, balancing competitive drive with community involvement.
  arts: Makaylyn China is an avid reader of mystery and historical fiction—favoring Agatha Christie, Hilary Mantel, and Tana French—while crocheting intricate gifts inspired by folk patterns, attending
    the Bay County Community Theatre’s productions of classic plays, and listening to the soulful blues of B.B. King and the storytelling songs of Dolly Parton, which together shape her creative escape
    from daily stress.
  travel: Makaylyn China prefers relaxed road trips along the Gulf Coast, having explored Charleston’s historic district, Savannah’s cobblestone streets, and the vibrant music scene of New Orleans, while
    planning future visits to Asheville’s mountain retreats and the coastal villages of the Irish Sea, all within a modest budget that accommodates her volunteer commitments.
  culinary: Makaylyn China excels at cooking Southern comfort dishes—such as fried chicken, collard greens, and creamy mac & cheese—and experiments with Gulf‑coast seafood recipes like shrimp & grits, blackened
    catfish, and gumbo, using fresh vegetables from her garden, garlic, paprika, and a dash of hot sauce to infuse each meal with bold flavor.
  core: Makaylyn China blends a love of meticulous structure with a competitive edge at trivia nights, channels stress into garden‑to‑table cooking and yoga, yet frequently worries about deadlines and can
    be skeptical of new ideas, creating a uniquely disciplined yet slightly anxious life rhythm.
background:
  cultural: Makaylyn is an African‑American woman whose family roots trace back to the Deep South, with grandparents who migrated from Mississippi to the Gulf Coast during the 1970s. Growing up in a close‑knit
    Black church community in Panama City, she internalized values of resilience, mutual aid, and celebration of music and cuisine. Church services, gospel choirs, and Sunday potlucks have shaped her sense
    of identity, while the coastal culture of Florida has added a love for seafood, beach outings, and a relaxed yet purposeful lifestyle. She honors her heritage through storytelling, participation in
    local cultural festivals, and by passing down family recipes that blend Southern soul food with Caribbean influences.
attributes:
  skills: '[''Administrative support'', ''Budgeting and financial planning'', ''Event coordination'', ''Customer service'', ''Microsoft Office Suite (Excel, Word, Outlook)'', ''Data entry'', ''Community
