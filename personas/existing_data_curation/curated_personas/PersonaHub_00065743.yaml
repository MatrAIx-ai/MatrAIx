persona_description: Andrew V. Z. Brower, a researcher and author specializing in the study of butterflies and their classification, particularly focusing on the genus Cupitha. He is known for his work
  on the taxonomy and biology of the Wax Dart, Cupitha purreea, which is the only representative of his genus. Brower's contributions to the field of butterflies have been recognized through his work on
  the annotated checklist of the butterflies of Sulawesi and his involvement in the Butterflies of the World project. His research interests include the identification, distribution, and conservation of
  butterfly species, as well as the development of taxonomic and biological databases for butterfly studies.
