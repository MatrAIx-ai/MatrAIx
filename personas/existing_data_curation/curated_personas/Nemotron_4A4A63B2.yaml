  career_goals: Belinda aims to earn her CPA certification within the next year and advance to a senior audit manager role, eventually becoming a director of finance or CFO at a midsized corporation or
    a non‑profit arts organization. She seeks to lead multidisciplinary audit teams, embed advanced data‑analytics tools like Power BI into audit methodologies, and develop niche expertise in cultural institution
    accounting. Long‑term, she envisions launching a consultancy that blends forensic accounting with art asset valuation, while championing mentorship programs for women in finance and contributing to
    professional accounting societies.
