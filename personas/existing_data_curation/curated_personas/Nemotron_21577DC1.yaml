  hobbies: '["Salsa and bachata dancing", "Cooking traditional Dominican cuisine", "Playing basketball at local rec centers", "Volunteering at community youth programs", "Exploring Boston''s neighborhoods
    and food scene", "Listening to business and tech podcasts", "Hiking in New England state parks"]'
  career_goals: Alcibiades aims to advance from a sales representative to a regional sales manager within the next three to five years, leading a team and shaping sales strategy across multiple territories.
    He seeks consistent top‑performer status, targeting a 20% annual revenue growth benchmark. Long‑term, he envisions launching his own distribution venture that leverages his industry contacts and cultural
    network, while also pursuing a bachelor's degree in business administration to solidify his managerial credentials.
