personas:
  professional: Alcibiades Cruz, 29, is a bilingual sales representative who leverages their easy‑going charisma and quick rapport‑building to close deals in wholesale manufacturing, using CRM analytics
    and adaptable tactics to meet a personal target of 20% annual revenue growth while dreaming of a future regional management role.
  sports: Alcibiades Cruz, 29, is a weekend basketball enthusiast who shoots hoops at the local community court, avidly follows the Boston Celtics and Boston Red Sox, and belongs to a casual streetball
    league that meets after work for late‑night games.
  arts: Alcibiades Cruz, 29, finds rhythm in dancing bachata and merengue at the downtown salsa club, regularly streams performances by Romeo Santos and Shakira, and attends Boston’s live‑music venues to
    catch indie folk acts like Fleet Foxes and contemporary jazz evenings.
  travel: Alcibiades Cruz, 29, prefers spur‑of‑the‑moment road trips to New England state parks such as Acadia in Maine and the White Mountains in New Hampshire, balancing a modest travel budget with a
    love for Boston’s historic neighborhoods like the North End, and they keep a spontaneous itinerary on a shared Google Doc.
  culinary: Alcibiades Cruz, 29, enjoys cooking traditional dishes like mangú with sautéed onions and fried cheese, pairs them with fresh avocado, and showcases a growing skill in the Boston food scene
    by hunting down lobster rolls at Legal Sea Foods and trying Korean BBQ tacos at a local fusion spot.
  core: Alcibiades Cruz, 29, is a charismatic, adventure‑driven sales pro whose love for dance, basketball, and impromptu road trips is tempered by a relaxed, sometimes disorganized approach to planning
    and finances.
background:
  cultural: Alcibiades was raised in a close‑knit Dominican household in Roxbury, where Spanish is spoken daily and Dominican customs are celebrated, from merengue music to family gatherings during Carnaval.
    His heritage instills a strong sense of hospitality, respect for elders, and pride in Caribbean cuisine. While fully integrated into Boston's urban environment, he continues to honor his roots by participating
    in local Dominican festivals, maintaining ties with relatives in the Dominican Republic, and blending Caribbean rhythms with the city's multicultural vibe.
