persona_description: A network administrator who is familiar with the concepts and terminology related to the asynchronous transfer mode (ATM) protocol used in telecommunication networks. They are proficient
  in understanding the switching techniques, encoding, and decoding processes involved in ATM. They have knowledge of the differences between ATM and Ethernet or the Internet, and are able to explain these
  differences to others. They are also familiar with the software protocols used in ATM, such as Diameter, SIGTRAN, and SS7.
