personas:
  professional: Rui Lum, a 26‑year‑old community‑focused visual artist and budding cultural heritage coordinator, they leverage self‑taught photography, sketching, ukulele playing, and surfboard design
    while applying strong organizational skills to orchestrate youth art workshops, document local festivals on social media, and prototype surfboards adorned with traditional island motifs, balancing creative
    spontaneity with reliable project delivery.
  sports: Rui Lum, a 26‑year‑old wave rider, they hit the surf at Waikiki every morning, belong to the Honolulu Surf Club, trail the volcanic slopes on weekends, and support the Hawaii Rainbow Warriors
    basketball team, while using a mix of yoga and strength training to stay limber for surf‑board repairs.
  arts: Rui Lum, a 26‑year‑old cultural enthusiast, they immerse themselves in the island’s art scene by attending exhibitions at the Honolulu Museum of Art, drawing inspiration from local painter Ka‘iu
    and internationally‑renowned photographer Steve McCurry, while performing ukulele renditions of Israel Kamakawiwoʻole’s songs and practicing hula under the guidance of kumu hula Liko Kealoha.
  travel: Rui Lum, a 26‑year‑old explorer, they prefer spontaneous weekend trips to remote hiking trails on Maui, dream of snorkeling the Great Barrier Reef in Australia, and plan a cultural immersion tour
    of Bali’s temples, but balance their wanderlust with a modest budget that limits flights to once a year.
  culinary: Rui Lum, a 26‑year‑old home chef, they enjoy cooking intermediate‑level dishes such as poke with fresh ahi tuna, laulau wrapped in ti leaf, and kalua pork, experiment with ingredients like taro,
    coconut milk, and pineapple, and often pair their meals with a chilled mauli (coconut water) while occasionally ordering sushi on nights when their camera batteries are dead.
  core: Rui Lum, 26, they fuse surf‑side spontaneity with meticulous community‑project planning, channel a restless curiosity into island art, and balance late‑night coffee‑fuelled editing marathons with
    an occasional habit of forgetting to pay bills on time.
background:
  cultural: Rui’s family traces its roots to both Native Hawaiian and Samoan ancestry, and he was raised in a household where the values of aloha, respect for elders, and 'ohana' were central. Growing up
    in Honolulu, he was immersed in the island’s vibrant cultural scene – from attending luau celebrations and learning traditional chants to participating in community clean‑up projects that protect the
    ocean he loves. He is fluent in everyday conversational Hawaiian phrases and celebrates cultural holidays like Makahiki and Lei Day, which shape his identity and outlook.
