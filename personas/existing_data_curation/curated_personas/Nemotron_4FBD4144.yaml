  hobbies: '[''Surfing'', ''Hula Dancing'', ''Ukulele Playing'', ''Photography'', ''Hiking'', ''Cooking Hawaiian/Polynesian Cuisine'', ''Attending Art Exhibitions'', ''Reading Pacific History'', ''Volunteering
    in Community Art Workshops'']'
  career_goals: Rui aspires to turn his passion for Polynesian art and community engagement into a meaningful career. He plans to enroll in a community college program in visual arts or cultural studies,
    eventually working as a cultural heritage coordinator for a museum or tourism board, or starting his own venture that designs and sells surfboards and apparel featuring traditional Polynesian motifs.
    He also hopes to mentor youth in Honolulu, promoting cultural pride and creative expression.
