personas:
  professional: Shamanda Fleming uses her cash‑handling expertise, POS fluency, and business‑degree‑backed analytical skills to deliver flawless checkout experiences, train new cashiers, and streamline
    shift schedules, all while leveraging their sociable charisma to build rapport and assertively pursue a promotion to shift supervisor.
  sports: Shamanda Fleming participates in weekly Zumba Fusion Club sessions, cheers on the Houston Rockets and Houston Astros during game nights, and joins a casual adult softball league, treating fitness
    as a lively group activity rather than a rigid schedule.
  arts: Shamanda Fleming lights up karaoke nights belting out Beyoncé and H.E.R., pumps energy into Zumba classes with Kendrick Lamar and classic soul from Aretha Franklin, devours contemporary novels by
    Colson Whitehead and Brit Bennett, and crafts DIY accessories inspired by runway trends to showcase a vibrant blend of music, literature, and fashion.
  travel: Shamanda Fleming favors spontaneous weekend escapes to music‑rich cities like Austin, soulful New Orleans, and occasional Caribbean island stops, maximizing credit‑card points for budget‑friendly
    Airbnbs while still curating must‑see local venues to satisfy both their adventurous spirit and modest travel budget.
  culinary: Shamanda Fleming whips up soulful Southern plates like shrimp and grits and collard‑green‑laden fried chicken alongside fiery Caribbean jerk chicken flavored with scotch bonnet peppers and sweet‑potato
    mash, showcasing intermediate cooking chops while hosting lively potluck brunches for friends.
  core: Shamanda Fleming thrives on structured leadership and spontaneous social sparkle, deftly connecting with others while occasionally misplacing shift schedules and succumbing to last‑minute plans.
background:
  cultural: Shamanda is an African‑American woman raised in Houston’s vibrant black community. Her upbringing was shaped by Southern traditions, church life, and the city’s multicultural environment, fostering
    a deep appreciation for soul food, gospel music, and community solidarity. She celebrates Juneteenth and participates in local cultural events that honor African‑American heritage, while also embracing
    the diverse influences of Houston’s Caribbean and Latin neighborhoods. Family and faith instilled in her a strong work ethic and the value of education, reflected in her pursuit of a business degree.
    These cultural ties inform her social outlook, culinary tastes, and dedication to giving back through mentorship and community engagement.
attributes:
  skills: '["Cash handling", "POS system operation", "Customer service", "Conflict resolution", "Sales upselling", "Inventory management", "Basic bookkeeping", "Financial reporting", "Team training", "Shift
