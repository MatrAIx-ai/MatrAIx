  hobbies: '["Karaoke", "Group Zumba", "Hip‑hop and soul dancing", "Cooking Southern and Caribbean cuisine", "Community festival participation", "Church choir and gatherings", "Youth mentorship volunteering",
    "Reading contemporary fiction", "Fashion trend scouting", "DIY accessory crafting"]'
  career_goals: Shamanda aims to transition from a cashier to a shift supervisor within the next year, leveraging her business education to demonstrate leadership and operational efficiency. She plans to
    complete a retail‑management certification program and eventually secure a store manager position, where she can design staff development programs that blend compassion with assertive performance standards.
    Long‑term, she dreams of opening a boutique that showcases culturally inspired fashion and beauty products, creating a community space that offers mentorship opportunities for young entrepreneurs from
    her neighborhood. Her ambition is to combine her practical retail experience with her entrepreneurial vision, making a positive impact on both the business and the local community.
