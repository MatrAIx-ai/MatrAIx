  hobbies: '[''Birdwatching'', ''Gardening'', ''Knitting and quilting'', ''Reading historical fiction and biographies'', ''Local history research and maritime heritage societies'', ''Community festivals
    and church events'', ''Senior walking groups'', ''Crossword puzzles'', ''Genealogy research'']'
  career_goals: Although approaching traditional retirement age, April aims to continue contributing to her community while transitioning to a lighter workload. She hopes to mentor younger bus drivers,
    sharing her practical knowledge of safety and route efficiency. She also wants to serve on the municipal transportation advisory board to advocate for better senior mobility options, such as demand‑responsive
    shuttles. Learning a formal first‑aid certification and possibly assisting at local senior centers are additional ambitions that blend her curiosity with her desire to remain practical and helpful.
