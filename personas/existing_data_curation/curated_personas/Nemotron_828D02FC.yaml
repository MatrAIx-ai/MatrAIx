personas:
  professional: Megan Kellem, a 21-year-old building inspector in the Atlanta metro area, they leverage a sharp eye for detail and thorough knowledge of the International Residential Code to produce clear
    inspection reports while quietly mentoring newer colleagues, reflecting a blend of curiosity, practicality, and reserved reliability.
  sports: Megan Kellem enjoys hiking the trails of Kennesaw Mountain and joining the Peachtree Runners club for weekend 5K runs, follows the Atlanta Braves and Atlanta Falcons passionately, and they squeeze
    in occasional pickleball matches at the local community center during the summer.
  arts: Megan Kellem spends evenings strumming acoustic guitar to folk tunes inspired by Bob Dylan and Phoebe Bridgers, writes simple melodies while listening to the storytelling of Brandi Carlile, and
    they regularly attend community theater productions of Tennessee Williams' plays, weaving these artistic experiences into their quiet creative outlet.
  travel: Megan Kellem prefers low-key road trips that blend hiking and cultural stops, having explored Asheville's Blue Ridge vistas and Savannah's historic squares, and they dream of trekking the Milford
    Track in New Zealand while carefully budgeting each adventure through a detailed spreadsheet.
  culinary: Megan Kellem cooks with a confident yet experimental hand, often slow-smoking pork shoulder for a sweet-spicy barbecue, perfecting collard greens with smoked turkey, and they love finishing
    meals with peach cobbler baked with fresh, locally sourced peaches and a pinch of cinnamon.
  core: Megan Kellem is a quietly curious building inspector who balances meticulous code work with spontaneous guitar jams, occasional subscription-fee oversights, and a habit of losing their keys on every
    weekend hike.
background:
  cultural: Megan grew up in Hiram, a small‑town community in Cobb County, Georgia, where Southern hospitality and a strong work ethic are woven into daily life. Her family values modesty, community involvement,
    and respect for tradition, which were reinforced through church gatherings, neighborhood block parties, and seasonal family cookouts featuring fried chicken, collard greens, and peach cobbler. While
    rooted in these Southern customs, Megan’s curiosity has led her to explore diverse perspectives through her job, interacting with contractors, homeowners, and colleagues from various cultural backgrounds
    across the Atlanta metropolitan area. This blend of local heritage and openness to new ideas shapes her respectful yet inquisitive outlook.
attributes:
  skills: '["Interpretation of building codes", "Structural integrity assessment", "Safety hazard identification", "Blueprint reading", "Measurement and surveying", "Digital inspection software (e.g., e‑Inspect,
    PlanSwift)", "Report writing and documentation", "Effective communication with contractors and homeowners", "OSHA 30‑hour safety training", "First‑aid certification", "Time management and scheduling",
    "Adaptable problem‑solving"]'
  hobbies: '["Hiking local trails (Kennesaw Mountain, Chattahoochee River)", "Architectural photography", "Acoustic guitar playing", "Reading historical fiction and construction‑technology non‑fiction",
    "Volunteering with Habitat for Humanity", "Cooking Southern cuisine", "Solving crosswords and Sudoku", "DIY home improvement projects"]'
  career_goals: Megan aims to become a certified senior building inspector within the next five years, pursuing the Georgia State Building Inspection License and a bachelor's degree in construction management.
    She seeks to specialize in sustainable building practices and energy‑efficiency inspections, eventually leading a team of inspectors for a regional construction firm. Long‑term, she envisions opening
    her own consultancy that advises developers on code compliance and green building certification, while mentoring entry‑level inspectors.
