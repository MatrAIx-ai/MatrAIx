persona_description: A policy advocate and energy expert who is passionate about promoting clean, renewable energy sources and reducing dependence on foreign fossil fuels. They are knowledgeable about the
  historical subsidies provided to the fossil fuel industry and are committed to investing tax dollars in a balanced and strategic manner to support the establishment and growth of renewable energy technologies.
  They are interested in the potential for domestic shale gas to revolutionize the energy markets and are advocating for state government to implement the provisions of the state Comprehensive Energy Plan
  and form public-private partnerships to follow through with the expansions of natural gas pipelines. They are also interested in the potential for tri-generation energy plants fueled by trucked-in compressed
  natural gas and liquefied natural gas to provide immediate energy cost relief to Maine's businesses and residents.
