  career_goals: Jaimie aims to earn a scholarship to study computer engineering or environmental science at a university, with the long‑term goal of designing sustainable technology solutions for the outdoors
    community. She hopes to combine her technical expertise with leadership roles, such as leading a robotics team or managing environmental projects. In the future, she also considers joining the Air Force
    as an officer to merge service with her engineering interests. Ultimately, she envisions entrepreneurship, potentially launching a startup that creates low‑cost, user‑friendly tools for outdoor enthusiasts.
