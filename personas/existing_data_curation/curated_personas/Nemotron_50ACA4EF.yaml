personas:
  professional: Jaimie Strunz is a budding computer engineer and environmental enthusiast who blends Python programming and data analysis with hands‑on outdoor projects, channeling their methodical planning
    and competitive drive into leading the high school robotics team and designing low‑tech prototypes for sustainable trail gear.
  sports: Jaimie Strunz powers through weekend hikes up Pikes Peak and rock climbs at the local Alpine Edge gym, trains with the high school cross‑country team, and roots for the Denver Broncos and Colorado
    Avalanche while keeping a disciplined fitness regimen that mixes cardio, strength, and strategic board‑game style goal‑setting.
  arts: Jaimie Strunz dives into sci‑fi worlds by devouring works by Isaac Asimov and Anne Leigh, captures Colorado sunsets through a Nikon, draws inspiration from the ambient soundscapes of Explosions
    in the Sky, and unwinds with board‑game nights featuring Terraforming Mars, all of which shape their creative problem‑solving mindset.
  travel: Jaimie Strunz plans trips with a spreadsheet, has trekked through Rocky Mountain National Park and explored the Alpine Lakes of Washington, dreams of backpacking the fjords of Norway and the volcanic
    landscapes of Iceland, and balances family budget limits with a craving for high‑altitude adventure.
  culinary: Jaimie Strunz prefers protein‑rich meals like quinoa‑black bean bowls, loves cooking Colorado green chili with fresh chilies and corn, can whip up a campfire stew of dehydrated vegetables and
    jerky, and often snacks on homemade trail mix with almonds, dried cranberries, and dark chocolate.
  core: Jaimie Strunz is a competitive, methodical teen who fuses outdoor passion with tech savvy, channels anxiety into meticulous planning, and dreams of engineering sustainable solutions while occasionally
    letting stress slip into late‑night gaming marathons.
background:
  cultural: Jaimie's cultural background reflects her white, Mid‑American ancestry blended with the distinctive Colorado Springs environment. Growing up in a family that values self‑reliance, outdoor recreation,
    and service—partly influenced by the region’s strong military presence—she has been taught to respect nature, pursue practical education, and contribute to the community. Her household celebrates traditional
    holidays and incorporates a modest appreciation for German craftsmanship passed down through generations, while also embracing the progressive, environmentally conscious ethos of the Colorado Front
    Range.
