  hobbies: '[''Gardening'', ''Quilting'', ''Cooking and baking'', ''Reading historical fiction'', ''Genealogy research'', ''Walking nature trails'', ''Church choir participation'', ''Volunteer at food bank'',
    ''Knitting'', ''Listening to classic country music'']'
  career_goals: Although currently not in the formal workforce, Michelle aims to translate her extensive household and community management experience into meaningful engagement. She plans to acquire a
    caregiving certification to assist elderly neighbors, volunteer more intensively with the church outreach program, and possibly start a modest home‑based catering service specializing in traditional
    Southern dishes for local events. Additionally, she seeks to attend counseling and mindfulness workshops to better manage her anxiety, with the long‑term ambition of achieving a balanced, purposeful
    lifestyle that honors her routine‑oriented nature.
