personas:
  professional: A community‑oriented caregiver in training, Michelle Bray leverages her decades of household management, budgeting, and event coordination to orchestrate church gatherings, volunteer drives,
    and a budding home‑based Southern catering service, all while navigating her strong preference for routine and her keen empathy that can turn anxiety into meticulous planning.
  sports: An avid walker on the local river trail, Michelle Bray joins the senior walking club "River Runners" for gentle cardio, showcases her team spirit by cheering the Kentucky Wildcats basketball and
    the Nashville Predators hockey teams, and occasionally participates in community garden fitness events.
  arts: While quilting and knitting for church gifts, Michelle Bray finds artistic inspiration in the folk patterns of William Morris, the gospel harmonies of CeCe Winans, the classic country storytelling
    of Dolly Parton, and the silver screen elegance of Bette Davis, weaving these influences into her creative projects.
  travel: A meticulous planner, Michelle Bray has explored historic Charleston, SC and Savannah, GA on weekend trips, dreams of strolling the gardens of Versailles in France, and prefers organized small‑group
    tours that fit her modest budget and allow time for quiet reflection between destinations.
  culinary: An accomplished Southern cook, Michelle Bray expertly prepares shrimp and grits, fried chicken with buttermilk brine, collard greens simmered with smoked turkey, and a signature peach cobbler
    spiced with cinnamon and nutmeg, while delighting in fresh basil, thyme, and a pinch of cayenne to elevate each dish.
  core: Michelle Bray is a routine‑loving, community‑centered nurturer whose gentle garden walks, meticulous budgeting, and heartfelt quilts mask a persistent undercurrent of anxiety that she channels into
    careful planning and heartfelt service.
background:
  cultural: Michelle was raised in a small, predominantly white, Southern community in Owensboro, Kentucky. Her upbringing was steeped in Baptist traditions and rural Kentucky values of self‑reliance, hospitality,
    and close‑knit community ties. She embraces regional customs such as church potlucks, county fairs, and the importance of family and neighborly support. The cultural environment emphasizes practicality,
    modesty, and a respect for longstanding traditions, which aligns with her preference for routine and familiar settings.
attributes:
  skills: '[''Household management'', ''Budgeting and basic accounting'', ''Event planning'', ''Community volunteering'', ''Gardening'', ''Cooking and meal planning'', ''Interpersonal conflict mediation'',
