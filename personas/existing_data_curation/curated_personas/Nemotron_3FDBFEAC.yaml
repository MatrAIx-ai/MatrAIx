  career_goals: Edward dreams of a career that lets him help living things and solve practical problems. He is fascinated by animals and hopes to become a veterinarian, where his caring nature and curiosity
    about biology can thrive. He also expresses interest in engineering, imagining building inventions that make everyday life easier for his family and community. He seeks a stable, community‑oriented
    role that values reliability and teamwork.
