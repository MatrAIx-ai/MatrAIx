personas:
  professional: Nick Molina, a one‑year‑old with an inquisitive mind, loves to sort his colorful blocks by shape and hue, and they already display a methodical approach that hints at a future in engineering.
  sports: Nick Molina enjoys toddler gymnastics at the community center, where they enthusiastically navigate soft obstacle courses, and they proudly cheer for the local minor league baseball team, the
    Portland Sea Dogs, during family outings.
  arts: Nick Molina is captivated by the vivid illustrations of Eric Carle's books and the playful melodies of the Beatles' 'Yellow Submarine' in cartoon form, and they often mimic Sesame Street characters,
    showing an early appreciation for visual and musical arts.
  travel: Nick Molina has already explored the interactive children's museum in Chicago and the sandy playground of Miami Beach with their family, and they dream of a future adventure to Costa Rica's Monteverde
    Cloud Forest, preferring stroller‑friendly trips that balance discovery with nap time.
  culinary: Nick Molina shows a particular fondness for mashed sweet potatoes, refuses broccoli, and they only try new foods when a favorite Disney song from 'Frozen' plays during mealtime, making their
    palate both selective and surprisingly negotiable.
  core: Nick Molina, a chatty one‑year‑old, blends unbounded curiosity with a surprising urge to line up toys by color, and they transform any quiet room into a lively playground with their sociable babbles.
background:
  cultural: Nick is raised in a Mexican‑American household in Perris, California. He hears both English and Spanish at home, celebrates traditions such as Día de los Muertos and Mexican Independence Day,
    and enjoys Mexican cuisine like tacos and tamales. The local community includes many families of Mexican heritage, reinforcing cultural identity through music, dance, family values, and a blend of Mexican
    customs with the diverse Californian environment.
