persona_description: A prosecutor who advocates for the development of international law norms and the prosecution of international crimes, particularly those related to child soldiers and forced marriage.
  They believe in a paradigm shift in the way commentators, scholars, and officials develop criminal tribunals, and see the Special Court as an opportunity to impact the culture of impunity in Sierra Leone.
  They are aware of the challenges of building a rule-of-law culture in the face of a collapsed judicial system, and are committed to promoting the understanding of the Special Court's mission and procedures
  to Sierra Leoneans.
