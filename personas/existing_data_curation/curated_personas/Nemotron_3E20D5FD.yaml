personas:
  professional: Jose Mercado, a seasoned construction project coordinator in Ohio, leverages bilingual fluency and a talent for translating blueprints into efficient site operations to lead diverse crews,
    blending a preference for structured schedules with a relaxed attitude toward paperwork, and now mentors younger supervisors while championing sustainable, culturally inclusive building practices.
  sports: Jose Mercado, a regular on the Springfield over‑40 soccer league team, drills on weekends with the Strikers, roots for the Cleveland Browns on football Sundays and the Cincinnati Reds during summer,
    and maintains a relaxed yet consistent fitness routine that blends competitive matches with gardening as low‑impact cardio.
  arts: Jose Mercado immerses themselves in the local arts scene by attending live performances of Los Lobos and the Ohio Symphony Orchestra’s Beethoven concerts, enjoys reading regional history through
    works by Howard Zinn, and winds down with classic films by Pedro Almodóvar, integrating artistic appreciation into community gatherings.
  travel: Jose Mercado favors low‑pressure travel that mixes cultural immersion with family time, having explored Oaxaca and Mexico City to reconnect with their roots, toured historic Williamsburg, VA,
    and dreaming of a road trip along the Pacific Northwest to Seattle and Portland, all while planning itineraries loosely to allow spontaneous detours.
  culinary: Jose Mercado delights in preparing traditional Mexican fare such as tamales, mole poblano, and pozole for family reunions, skillfully blends dried ancho chilies, tomatillos, and masa harina
    in the kitchen, yet often forgets to clean the stovetop promptly, preferring to savor the flavors of their dishes over housekeeping.
  core: Jose Mercado is a sociable, structured‑yet‑flexible mentor who juggles construction leadership, community volunteering, and heartfelt cooking, all while occasionally neglecting paperwork and household
    chores in favor of spontaneous generosity.
background:
  cultural: Jose was born to Mexican immigrant parents who settled in Ohio in the 1970s. Growing up in a bilingual household, he retained strong ties to Mexican traditions—celebrating Día de los Muertos,
    preparing mole and tamales, and speaking Spanish at home—while also absorbing Midwestern values of hard work and community involvement. His bachelor's degree in arts and humanities reflects his family's
    emphasis on education and cultural expression. He identifies as Mexican‑American, actively participates in local Latino organizations, and blends his heritage with everyday life in Canal Winchester,
    fostering a sense of belonging for both his family and the broader community.
