  career_goals: Jose aims to transition from daily site oversight to a strategic advisory role over the next few years, focusing on mentorship of younger supervisors, implementing sustainable building practices,
    and possibly launching his own consulting firm that emphasizes culturally inclusive project management. He also hopes to contribute to local community development projects, especially affordable housing
    initiatives that support immigrant families, while maintaining a healthy work‑life balance as he approaches retirement.
