  hobbies: '[''watercolor painting'', ''visiting art galleries and museums'', ''gardening (roses and herbs)'', ''reading historical fiction'', ''southern cooking with health-conscious adaptations'', ''attending
    community theater'', ''participating in senior book club'', ''yoga and meditation'', ''listening to jazz and blues'', ''volunteering at local art therapy workshops'']'
  career_goals: Elisha aims to transition into a mentorship and education role within her healthcare facility, securing a charge nurse or clinical educator position where she can shape the next generation
    of practical nurses. She plans to obtain a Certified Gerontological Nurse (CGN) credential and, if feasible, complete a bachelor's degree in nursing through an online program. Additionally, she aspires
    to develop a small community workshop that blends art therapy with health education for seniors, fostering creativity and emotional well-being. Her ultimate ambition is to leave a lasting legacy of
    compassionate, high-quality care while continuing her own growth through lifelong learning.
