  hobbies: '[''Reading (Mystery/Thriller)'', ''Gardening'', ''DIY Home Projects'', ''Hiking'', ''Cooking'', ''Puzzles (Crossword, Sudoku)'', ''Local Community Events'', ''Journaling'', ''Listening to 80s
    Pop Music'']'
  career_goals: Megan aims to progress from cashier to shift supervisor and ultimately store manager, leveraging her practical experience and curiosity about retail operations to introduce efficiency improvements.
    She plans to pursue a retail management certification or associate degree in business while maintaining a balanced schedule for her family. In the longer term, she is interested in exploring roles in
    logistics or procurement that combine her organizational talents with a broader perspective on supply‑chain processes.
