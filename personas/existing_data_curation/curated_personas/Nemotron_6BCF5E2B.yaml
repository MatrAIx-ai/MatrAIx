personas:
  professional: Julia Killian is a finance professional who leverages advanced Excel, Power Query, and Tableau to build data‑driven budgeting dashboards, leads cross‑functional month‑end closing projects
    with a deadline‑centric yet collaborative style, and injects her structured, detail‑oriented mindset into mentoring colleagues while keeping the office vibe lively through her outgoing personality.
  sports: Julia Killian is a regular participant in Zumba and HIIT classes at a downtown studio, runs the Hermann Park trail with the Houston Running Club for charity 5K events, enjoys cheering for the
    Houston Rockets, Astros, and Texans, and keeps a flexible fitness schedule that blends high‑energy group workouts with occasional salsa dance cardio sessions.
  arts: Julia Killian immerses herself in Latin arts, frequently attends community salsa nights featuring musicians like Carlos Vives and Celia Cruz, enjoys listening to Beyoncé’s Houston‑rooted pop, visits
    the Houston Ballet for occasional performances, and collects prints of Frida Kahlo, all of which nourish her creative side and provide social connection.
  travel: Julia Killian plans weekend getaways that balance cost and culture, often escapes to Galveston’s beach for relaxation, has trekked to Mexico City to explore street‑food markets and historic sites,
    dreams of hiking the Rocky Mountains in Colorado, and uses a combination of budget airlines and rideshare apps to stretch her modest travel fund.
  culinary: Julia Killian loves cooking Tex‑Mex dishes such as chicken tinga tacos, carne asada burritos, and homemade guacamole, hones her skills with a well‑used cast‑iron skillet, hosts brunches featuring
    chilaquiles and avocado toast paired with fresh‑squeezed orange juice, and occasionally over‑spices meals when experimenting with new chilies.
  core: Julia Killian is a structured, socially driven finance analyst who channels stress into high‑energy group workouts, obsessively tracks every cent while splurging on brunches, and combats anxiety
    with meditation, though they sometimes skip dentist appointments.
background:
  cultural: Julia grew up in a middle‑class family in the Houston suburbs, where the blend of Southern hospitality and the city’s multicultural vibrancy shaped her outlook. Her parents, originally from
    the Midwest, instilled values of hard work, punctuality, and community involvement. Living in Houston exposed Julia to a diverse array of cultures—Mexican, African‑American, Asian, and more—which fostered
    her appreciation for group activities and inclusive events. She celebrates traditional American holidays like Thanksgiving and the Fourth of July, often gathering with extended family and friends. At
    the same time, she participates in local festivals such as the Houston Livestock Show and Rodeo and enjoys the city's thriving food scene, which reflects its cultural mosaic. This background informs
    her collaborative work style and her desire to give back through community‑focused financial education.
