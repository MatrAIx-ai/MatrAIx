  hobbies: '[''Zumba and HIIT group classes'', ''Running in Hermann Park and charity 5K events'', ''Salsa dancing at community events'', ''Volunteer financial literacy workshops for teens'', ''Cooking Tex‑Mex
    meals and hosting brunches'', ''Reading personal‑development literature'', ''Mindfulness meditation'', ''Traveling to explore new cultures'', ''Attending live music and cultural festivals'', ''Mentoring
    junior colleagues'']'
  career_goals: Julia's short‑term goal is to secure a senior financial manager role within the next three years, where she can oversee larger budgeting cycles and lead a finance team. She plans to earn
    her Certified Public Accountant (CPA) designation and enroll in an MBA program focused on strategic finance, which will strengthen her strategic planning abilities. In the medium term, Julia aspires
    to become a chief financial officer of a midsize enterprise, driving data‑driven decision making and building resilient financial processes that support growth. She also hopes to mentor junior analysts
    and contribute to corporate social‑responsibility initiatives, especially programs that improve financial literacy in the Houston community. Recognizing her stress‑prone nature, Julia intends to integrate
    wellness practices into her leadership style, promoting a balanced and supportive work environment.
