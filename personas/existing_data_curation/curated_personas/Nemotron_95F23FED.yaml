personas:
  professional: Lina Zeledon, a senior market research strategist based in New Jersey, merges curiosity‑driven insight gathering with practical, data‑rich surveys and storytelling presentations for brands
    targeting Spanish‑speaking and multicultural audiences, they leverage bilingual fluency and a naturally sociable, talkative style to build rapport and guide cross‑functional teams, while preferring
    flexible, sometimes disorganized workflows that keep them adaptable.
  sports: Lina Zeledon stays active through weekly yoga classes, they dance salsa and bachata at local Latin‑dance socials, cheer for the New York Knicks and New Jersey Nets, and occasionally play recreational
    soccer with the Newark Community Soccer Club during the spring season.
  arts: Lina Zeledon immerses themselves in the arts by attending the New Jersey Symphony Orchestra, they perform karaoke to classics by Gloria Estefan and Marc Anthony, and draw creative inspiration from
    the paintings of Frida Kahlo and the vibrant street art of Jean‑Michel Basquiat, channeling their outgoing personality into artistic appreciation.
  travel: Lina Zeledon favors spontaneous yet purposeful travel, they plan relaxed weekend getaways to nearby beach towns like Asbury Park while dreaming of immersive cultural tours of tropical island destinations
    and vibrant European cities such as Barcelona, balancing family visits with a modest travel budget and a love for spontaneous itineraries.
  culinary: Lina Zeledon is a confident home chef, they expertly prepare traditional Caribbean stews like sancocho, experiment with fusion dishes that marry plantains and Korean gochujang, and delight in
    sourcing fresh cilantro, Scotch‑bonnet peppers, and ripe avocados at farmer’s markets for family gatherings.
  core: Lina Zeledon is a charismatic, talkative market researcher, they fuel their energy through salsa, karaoke, and community involvement, navigating life with curious practicality and a relaxed, occasionally
    disorganized approach that makes them both a compelling storyteller and a spontaneous spender.
background:
  cultural: Lina’s Dominican heritage shapes much of her worldview and professional lens. Raised in a bilingual household, she grew up celebrating traditions such as Carnaval, merengue music, and family‑centered
    gatherings that emphasize community and hospitality. The resilience and adaptability of her parents—who immigrated to the United States—instilled in her a pragmatic curiosity about how culture influences
    consumer behavior. Living in Fanwood, NJ, she balances Caribbean cultural practices, like cooking and dance, with the diverse mosaic of the Greater New York area. This dual cultural fluency enables
    her to navigate both mainstream American markets and the nuanced needs of Latino consumers, making her an asset in multicultural marketing and research initiatives.
attributes:
  skills: '[''Survey design'', ''Focus group moderation'', ''Qualitative and quantitative analysis'', ''Consumer behavior insight'', ''Brand strategy development'', ''Competitive intelligence'', ''Digital
