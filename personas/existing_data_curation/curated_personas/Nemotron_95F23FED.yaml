    consulting'', ''Project coordination with flexible timelines'']'
  hobbies: '[''Cooking Dominican cuisine'', ''Salsa and bachata dancing'', ''Traveling to the Dominican Republic'', ''Book club (historical fiction & memoirs)'', ''Yoga'', ''Volunteering at cultural festivals'',
    ''Hosting karaoke nights'', ''Gardening'', ''Attending theater performances'']'
  career_goals: Lina aims to advance to a senior leadership role—such as Director of Market Research or Head of Consumer Insights—where she can shape strategic direction for brands targeting Caribbean and
    Latino audiences. She envisions launching a boutique consultancy that advises companies on culturally resonant marketing, leveraging her Dominican heritage and deep network in New Jersey’s Hispanic
    community. Additionally, Lina seeks to earn the Professional Researcher Certification (PRC) and to become a guest lecturer at regional universities, mentoring the next generation of diverse market researchers.
    She also hopes to author white papers that highlight the purchasing power and cultural preferences of diaspora consumers, positioning herself as a thought leader in multicultural market intelligence.
