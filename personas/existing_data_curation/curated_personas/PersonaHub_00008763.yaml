persona_description: A person who is interested in environmental science, particularly noise and its effects on human health and wildlife. They are likely to be concerned with the measurement and mitigation
  of noise pollution, and may have expertise in noise measurement techniques, muffler design, and the effects of noise on hearing and speech communication. They may also be interested in the physical injury
  associated with noise exposure, and the factors that contribute to the development of temporary threshold shifts and permanent hearing loss. Additionally, they may have an interest in the discussion of
  vibration in 2-stroke cycle internal combustion engines and the distribution of vibration amplitude over a chain saw operator's arm, as well as the distinction between disagreeable and injurious vibrations.
