persona_description: A geologist who specializes in the study of the Earth's atmosphere and its impact on life, particularly the role of ozone depletion and the use of nitrogenous compounds in the atmosphere.
  Ward is the chair of the Department of Geosciences and has expertise in understanding the complex interactions between the atmosphere and the ocean, and how they impact the environment and life on Earth.
  She is interested in the use of microbes in the production and consumption of nitrogenous compounds, and how it affects the chemistry of the ocean and its impact on the Earth's atmosphere. Ward is also
  interested in the complex interactions between the atmosphere and the ocean, and how they impact the environment and life on Earth.
