  hobbies: '[''Hiking'', ''Sailing'', ''Home Renovation DIY'', ''Chess'', ''Running'', ''Yoga'', ''Reading Business Non‑Fiction'', ''Landscape Photography'', ''Attending Red Sox Games'', ''Volunteering
    at Community Garden'']'
  career_goals: Glen aims to transition from site‑level management to a regional director role within the next five years, where he can shape large‑scale development strategies across Greater Boston. He
    is pursuing PMP certification and a LEED Accredited Professional credential to deepen his expertise in both project execution and green construction. His long‑term ambition is to launch his own consultancy
    that advises contractors on integrating innovative, eco‑friendly technologies while maintaining tight cost controls. Glen also hopes to mentor emerging managers, using his competitive drive to foster
    high‑performance teams that balance flexibility with disciplined processes, and to implement workplace wellness initiatives that address his own sensitivity to stress.
