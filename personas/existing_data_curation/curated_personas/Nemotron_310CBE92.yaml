personas:
  professional: Glen Carrasquillo, a construction‑management veteran with a decade of hands‑on experience, blends strategic project planning, BIM analytics, and a skeptical, competitive edge to deliver
    cost‑effective, sustainable builds while eyeing a regional director role and eventual consultancy.
  sports: Glen Carrasquillo sails with the Boston Sailing Club on the harbor, runs with the Boston Running Club through city routes, practices yoga at a local studio, and never misses a Red Sox home game
    at Fenway Park, embodying a balanced mix of competitive team spirit and solitary fitness pursuits.
  arts: Glen Carrasquillo captures New England’s cliffs and foliage through a DSLR, showcases select prints in a Cambridge community gallery, enjoys evenings at the Boston Symphony Orchestra, and listens
    to folk storytellers like Gillian Welch and classic rock legends such as Bruce Springsteen, weaving visual and musical appreciation into their leisure.
  travel: Glen Carrasquillo’s travel log includes rugged hikes in Acadia National Park, a sailing trip to the Virgin Islands, cultural weekends in Dublin, and a future bucket‑list goal of glacial trekking
    in Iceland, all planned with a blend of meticulous itineraries and spontaneous detours when budget permits.
  culinary: Glen Carrasquillo favors New England staples such as lobster rolls, creamy clam chowder, and roasted Brussels sprouts tossed with herbs from the community garden, experiments with sous‑vide
    and smart‑oven recipes for a perfect steak, and pairs meals with locally brewed Trillium IPA, reflecting an intermediate cooking skill and a love for farm‑to‑table flavors.
  core: Glen Carrasquillo is a curiosity‑driven yet pragmatic builder who wrestles with chronic stress, balances competitive ambition with sustainable living, and channels worry into disciplined fitness,
    meticulous finances, and hands‑on DIY projects.
background:
  cultural: Glen is a third‑generation white American raised in the suburban neighborhoods of Milton, Massachusetts. His family background blends Irish and Spanish (Catalan) ancestry, a heritage reflected
    in occasional cultural celebrations such as St. Patrick’s Day and traditional Spanish holiday feasts. Growing up in New England, he absorbed the region’s emphasis on practicality, self‑reliance, and
    community involvement, values that dovetail with his business education and construction career. He identifies strongly with the local Boston sports culture, especially the Red Sox, and participates
    in regional volunteer initiatives, reinforcing a blend of Mid‑Atlantic work ethic and multicultural family traditions.
