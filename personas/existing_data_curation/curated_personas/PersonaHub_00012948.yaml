persona_description: A landscape architect who specializes in designing public and private outdoor spaces such as parks, college campuses, businesses, recreational facilities, homes, and gardens. They are
  often involved in planning real estate developments and large commercial and urban spaces. They may also be involved in reclaiming neglected land and creating useful, sustainable landscapes that can support
  a habitat for animals or become a beautiful park. A landscape architect's workday can vary dramatically from day to day or week to week, and they often have a say in where buildings and other features
  are placed. They use computer-aided design and drafting (CADD) programs to make a visual rendering of their designs and rely heavily on technical skills in their daily work. They must first earn a high
  school diploma and then complete a landscape architecture bachelor's degree program to work in their field.
