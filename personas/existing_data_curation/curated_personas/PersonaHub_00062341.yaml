persona_description: A veterinarian who specializes in the treatment of cats with oral squamous cell carcinoma, particularly those who are resistant to traditional chemotherapy. The veterinarian has worked
  closely with researchers at the University of Illinois Cancer Care Clinic and Comparative Oncology Laboratory to develop a new anti-cancer agent called isobutyl-deoxynyboquinone (IB-DNQ) that targets
  a specific enzyme, NQO1, found across many tumor types, including feline oral squamous cell carcinomas. The veterinarian is conducting a fully funded clinical trial for pet cats with oral squamous cell
  carcinoma, offering a promising treatment option for these patients. The veterinarian is also exploring other types of veterinary cancers that may be a good target for this drug.
