    ''Conflict resolution'']'
  hobbies: '[''Barbecuing and recipe development'', ''Fishing'', ''Church choir participation'', ''Listening to gospel and classic R&B'', ''Vegetable gardening'', ''Reading historical biographies and African‑American
    literature'', ''Community cooking workshops'']'
  career_goals: Rony seeks to leverage his operational expertise into a broader leadership role within the regional food‑service industry. Over the next five years he aims to become a regional manager for
    a multi‑unit restaurant chain where he can implement standardized training programs and cost‑saving initiatives across locations. Simultaneously, he is exploring the possibility of opening a family‑owned
    soul‑food restaurant that celebrates his heritage while applying his proven efficiency practices. He plans to earn an advanced hospitality management certification and to mentor emerging managers, ensuring
    a stable future for his family and a lasting impact on his community.
