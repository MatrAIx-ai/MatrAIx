personas:
  professional: Rony Thomas, a 47‑year‑old operations manager in casual dining, leverages two decades of data‑driven scheduling, cost‑control, and ServSafe expertise to keep kitchens humming while balancing
    routine with occasional menu experimentation, and their calm, organized demeanor makes them a trusted conduit between staff and upper management.
  sports: Rony Thomas enjoys seasonal fishing on Kentucky’s Lake Cumberland, follows the Kentucky Wildcats basketball team and the Indianapolis Colts NFL franchise, and participates in a local adult softball
    league on Saturdays, valuing the camaraderie but keeping the commitment low‑key to preserve routine.
  arts: Rony Thomas, a regular choir member at their local church, finds solace in gospel classics by Aretha Franklin and Marvin Gaye, often listening to the soulful stylings of Sam Cooke while cooking,
    and attends occasional performances at the Louisville Center for the Arts featuring resident playwrights.
  travel: Rony Thomas prefers road‑trip travel that blends familiar comfort with modest adventure, having explored Mammoth Cave National Park, the blues‑rich streets of New Orleans, and a family vacation
    to Asheville’s Blue Ridge mountains, always planning itineraries around affordable lodging and opportunities to sample regional cuisines.
  culinary: Rony Thomas spends weekends perfecting a signature smoked pork shoulder with a honey‑chipotle glaze, tending a modest garden of tomatoes and collard greens to complement soul‑food staples like
    cornbread and black‑eyed peas, and delights in hosting potluck barbecues where neighbors swap recipe tips.
  core: Rony Thomas blends disciplined operational expertise with a love for backyard barbecues and quiet lake fishing, channeling routine into both career and community, while occasionally letting perfectionism
    edge into over‑planning.
background:
  cultural: Rony grew up in a close‑knit African‑American community in the Louisville metropolitan area, where family meals and church gatherings were central to social life. His grandparents migrated from
    the rural South during the Great Migration, bringing with them traditions of Southern cooking, storytelling, and mutual support. These roots instilled in him a deep respect for hospitality, communal
    responsibility, and the preservation of cultural recipes. Living in La Grange, he continues to blend these heritage influences with the local Kentucky culture, participating in neighborhood events,
    supporting local black‑owned businesses, and celebrating holidays with a mix of Southern soul‑food and regional Appalachian flavors.
attributes:
  skills: '[''Staff scheduling'', ''Inventory management'', ''Food safety compliance (ServSafe)'', ''Cost control and budgeting'', ''Vendor negotiation'', ''Team leadership and mentoring'', ''Customer service
