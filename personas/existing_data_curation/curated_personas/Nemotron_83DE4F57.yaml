  hobbies: '[''Competitive video gaming'', ''Car restoration'', ''Woodworking'', ''Weightlifting'', ''Fishing'', ''Reading non-fiction'', ''High school football fan'']'
  career_goals: He plans to attend a state university on a scholarship to study mechanical engineering, with the long‑term goal of becoming a field service engineer for heavy‑equipment manufacturers. He
    is also considering an enlistment in the US Navy as an electronics technician, seeing the structured environment and clear advancement pathways as a good fit. Ultimately, he aims to combine his technical
    expertise with his leadership abilities to open his own automotive repair and customization shop within the next decade, providing reliable services to his community while managing a disciplined team.
