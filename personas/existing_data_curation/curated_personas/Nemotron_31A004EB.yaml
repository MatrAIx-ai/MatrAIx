  career_goals: Yadi aims to advance from senior drafter to lead BIM coordinator within the next five years, obtaining certifications such as Certified Professional Drafter (CPD) and Autodesk Certified
    Professional. She aspires to guide multidisciplinary design teams, mentor junior drafters, and integrate sustainable design practices into her work. Long-term, she envisions launching a boutique drafting
    consultancy focused on local infrastructure and residential projects in Indiana, leveraging her practical expertise and community connections to improve regional development.
