personas:
  professional: Yadi Mejia, a senior drafter with advanced proficiency in AutoCAD, SolidWorks, and Revit, leverages a meticulous yet flexible workflow to turn engineering specifications into sustainable,
    code‑compliant designs, and envisions scaling these practices as a future BIM coordinator while mentoring junior team members.
  sports: Yadi Mejia enjoys weekend hikes on the Hoosier National Forest trails and participates in the Greenfield Trail Runners club, while cheering for the Indiana Pacers during the NBA season and the
    Indianapolis Colts on Sundays; they also join a local community softball league in the summer, blending low‑impact activity with social camaraderie.
  arts: Yadi Mejia nurtures a love for historical narratives through the Greenfield Historical Fiction Book Club, favoring authors like Hilary Mantel, Ken Follett, and Philippa Gregory, and relaxes with
    folk‑rock playlists featuring The Avett Brothers and local Indiana singer‑songwriter Sam Byrne; occasional visits to the Indianapolis Museum of Art and the Indy Fringe Festival theater productions round
    out their cultural palate.
  travel: Yadi Mejia plans trips with a blend of research and spontaneity, having explored the colonial streets of Williamsburg, the medieval charm of Prague, and a weekend road‑trip through the Great Smoky
    Mountains; they dream of a spring pilgrimage to Kyoto’s gardens and a summer cycling tour of the Colorado Rockies, balancing these ambitions against a modest family budget and work commitments.
  culinary: Yadi Mejia, an enthusiastic home cook, frequently prepares garden‑fresh dishes such as heirloom tomato gazpacho, rosemary‑infused roasted beet salad with goat cheese, and zucchini lasagna layered
    with fresh basil, while experimenting with 3D‑printed herb‑stripping tools; they favor locally sourced produce, artisan rye bread, and pair meals with a curated selection of Indiana craft beers.
  core: Yadi Mejia marries methodical design expertise with a green‑thumbed curiosity, navigating life through organized spontaneity, community stewardship, and a penchant for practical creativity.
background:
  cultural: Yadi was raised in a middle‑class Midwestern family in Indiana, where community ties, self‑reliance, and a strong work ethic are valued. Her upbringing emphasized the importance of education,
    particularly in science and mathematics, which guided her toward a STEM degree. While her cultural roots are broadly American, she embraces local traditions such as county fairs, farmers’ markets, and
    volunteer service, reflecting a blend of practical sensibility and curiosity that shapes her personal and professional life.
