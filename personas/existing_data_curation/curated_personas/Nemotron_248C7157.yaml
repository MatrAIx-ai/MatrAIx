personas:
  professional: Rosalie Ford, a senior chemical process engineer with three decades of hands‑on experience, blends rigorous expertise in thermodynamics, HAZOP studies, and process simulation with a vivid
    artistic curiosity, leading interdisciplinary teams to craft sustainable manufacturing solutions while mentoring women engineers through a mental‑health‑aware program.
  sports: Rosalie Ford stays fit through weekly yoga classes at a Brooklyn studio, joins a community garden’s weekend walking group, plays recreational tennis at the Prospect Park Club, and cheers for the
    Brooklyn Nets and New York Knicks while also following the New York City FC season.
  arts: Rosalie Ford frequents Brooklyn galleries like the Brooklyn Museum, sketches the city’s brownstone facades in a pocket notebook, paints watercolors inspired by Georgia O'Keeffe, throws pottery at
    the Brooklyn Clay Studio, and draws creative fuel from reading Kim Stanley Robinson’s 'The Ministry for the Future' and biographies of Marie Curie, while admiring installations by Ai Weiwei and the
    kinetic works of Theo Jansen.
  travel: Rosalie Ford prefers thoughtfully curated cultural trips, having explored the Irish countryside, the Tuscan vineyards, and Kyoto’s Zen temples, and now dreams of a sustainable eco‑tour of Iceland’s
    geothermal sites, balancing meticulous itinerary planning with spontaneous day‑long hikes when anxiety levels allow.
  culinary: Rosalie Ford enjoys home‑fermented kombucha and sourdough bread, experiments with herb‑infused olive oil using rosemary, thyme, and basil from their balcony garden, cooks Mediterranean‑style
    dishes like grilled branzino with lemon‑oregano glaze, and occasionally prepares a hearty Irish stew for friends, reflecting a moderate cooking skill honed through pottery‑inspired patience.
  core: Rosalie Ford is a curious, anxiety‑prone engineer who fuses scientific rigor with watercolor and pottery, mentors emerging talent, and stewards sustainable chemistry while navigating the delicate
    balance between meticulous planning and spontaneous creativity.
background:
  cultural: Rosalie is a white American with Irish‑Italian ancestry, raised in a Midwestern suburb before moving to New York for her engineering career. Growing up in a culturally modest family, she was
    encouraged to value education and hard work, while her exposure to New York’s vibrant, multicultural Brooklyn neighborhood broadened her appreciation for diverse artistic and social perspectives. This
    blend of a rooted, modest upbringing and an urban, culturally rich environment informs her inclusive worldview, her openness to unconventional ideas, and her commitment to bridging scientific rigor
    with creative expression.
attributes:
  skills: '[''Process Design'', ''Process Simulation (Aspen HYSYS, COMSOL)'', ''Hazard and Operability (HAZOP) Studies'', ''Regulatory Compliance (EPA, OSHA)'', ''Thermodynamics'', ''Reaction Engineering'',
    ''Materials Safety'', ''Data Analysis (Python, MATLAB)'', ''Statistical Process Control'', ''Creative Experiment Design'', ''Technical Communication'', ''Mentorship and Team Leadership'']'
  hobbies: '[''Watercolor Painting'', ''Pottery'', ''Visiting Art Galleries and Museums'', ''Reading Science Fiction and Biographies'', ''Home Fermentation (Kombucha, Sourdough)'', ''Yoga and Mindfulness
    Practice'', ''Community Theater Workshops'', ''Balcony Gardening (Herbs, Succulents)'', ''STEM Outreach Volunteering'', ''Participating in Neighborhood Art Fairs'']'
  career_goals: Growing from her extensive engineering career, Rosalie aims to transition into a senior advisory role focused on green chemistry and sustainable manufacturing, seeking to reduce environmental
    footprints of legacy chemical plants in the Northeast. She is driven to mentor the next generation of engineers, especially women and under‑represented groups, by establishing a mentorship program that
    integrates technical training with mental‑health awareness. Rosalie also aspires to launch community‑based interdisciplinary projects that blend science with public art, such as interactive installations
    that illustrate chemical processes. Ultimately, she hopes to author a series of articles or a book on integrating creative thinking into engineering practice and to serve on advisory boards shaping
    sustainable industrial policy.
