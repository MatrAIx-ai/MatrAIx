  career_goals: Aquila aspires to channel his practical talents into a technical trade. He aims to earn an automotive technician certification through a vocational program, eventually working at a local
    garage while continuing to mentor younger teens in his community. He also envisions completing an associate degree in information technology, blending his mechanical aptitude with growing digital skills,
    and hopes one day to open a small repair shop that offers both automotive and computer services to residents of Fairfield County.
