personas:
  professional: Glenda Edwards, a retired community historian, leverages her bookkeeping precision and horticultural know‑how to lead volunteer workshops at the local historical society, where they blend
    meticulous organization with a flexible, hands‑on teaching style that welcomes both tradition and fresh ideas.
  sports: Glenda Edwards favors low‑impact exercise, walking the ridge trails near her home and participating in the local senior walking club, while cheering on the Nashville Predators and the Tennessee
    Titans on game days, and they attend the annual county baseball tournament to support the Sequatchie County Tigers youth team.
  arts: Glenda Edwards immerses herself in regional folk music, spinning her vintage record player to play The Carter Family, Doc Watson, and Gillian Welch while knitting, and they often attend the community
    theater’s productions of classic plays and enjoy listening to the soulful ballads of Loretta Lynn during quiet evenings.
  travel: Glenda Edwards enjoys planning relaxed road trips, having explored the Great Smoky Mountains, Asheville’s historic downtown, and Charleston’s waterfront, while dreaming of a pilgrimage to the
    Scottish Highlands to trace family roots, and they prefer paper itineraries with ample time for spontaneous bird‑watching stops.
  culinary: Glenda Edwards relishes Southern comfort cooking, frequently preparing cornbread, herb‑infused chicken and dumplings, and blackberry cobbler using fresh thyme, rosemary, and sage from her garden,
    and they savor dining at the local church potluck where homemade pickled cucumbers and honey‑glazed ham are staples.
  core: Glenda Edwards, a garden‑loving genealogy enthusiast who still writes notes on napkins and constantly misplaces knitting needles, balances relentless curiosity with a steady, practical outlook on
    life.
background:
  cultural: Glenda was raised in a small Appalachian community in Tennessee, steeped in Southern and Appalachian traditions. Her upbringing in a Methodist household emphasized church participation, hospitality,
    self‑reliance, respect for nature, and storytelling. These cultural values shape her practical curiosity, community‑oriented mindset, and balanced approach to tradition and new ideas.
attributes:
  skills: '["Household budgeting", "Basic computer use (email, video calls, online banking)", "Gardening (native plants, herb cultivation)", "Quilting and hand‑sewing", "Genealogy research", "Community
    volunteer coordination", "First‑aid basics", "Cooking traditional Southern dishes"]'
  hobbies: '["Gardening", "Knitting", "Reading mystery novels", "Crossword puzzles", "Birdwatching", "Church fellowship", "Library volunteer work", "Appalachian folk music"]'
  career_goals: Although retired, Glenda seeks to remain actively engaged by mentoring younger volunteers at the local historical society, completing a family memoir that weaves together her genealogical
    findings, establishing a seasonal garden‑teaching program for elementary students, mastering a tablet for digital photo archiving of community events, and occasionally serving as a bridge between longtime
    residents and newer families moving into Sequatchie County.
