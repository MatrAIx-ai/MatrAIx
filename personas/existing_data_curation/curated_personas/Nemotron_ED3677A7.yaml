  hobbies: '[''Woodworking and custom furniture building'', ''Vintage radio restoration'', ''Fishing on Cayuga Lake'', ''Hiking in the Catskills'', ''Volunteering with the local historical society'', ''Volunteer
    fire department service'', ''Home brewing craft beer'', ''Reading upstate New York history'']'
  career_goals: William aims to obtain his master electrician license within the next two years and transition his freelance work into a small, family‑owned contracting firm that specializes in renewable‑energy
    retrofits for local homes and schools. He hopes to mentor at least two apprentices annually, eventually offering formal training workshops through the regional community college. Long‑term, he envisions
    serving as an electrical inspector or consultant for Tompkins County, leveraging his blend of curiosity and practicality to improve safety standards while maintaining a balanced workload that allows
    more quality time with his wife and community.
