personas:
  professional: Shantell Bacchus, a budding kindergarten teacher in rehearsal, excels at sorting crayons by color and arranging storybooks in tidy rows, using her love for routine to keep classroom play
    organized while they occasionally indulge in spontaneous storytelling bursts.
  sports: Shantell Bacchus loves cheering for the Baltimore Ravens and Baltimore Orioles on weekends, participates in the Pikesville Little League baseball team, and attends weekly preschool soccer sessions
    with the Baltimore Kids Soccer Club, favoring playful, unstructured activity over regimented workouts.
  arts: Shantell Bacchus enjoys drawing bright pictures inspired by Sesame Street characters like Elmo, listening to gospel hymns at church, and dancing to Beyonce's upbeat songs, letting their vivid imagination
    flow during free-play art time.
  travel: Shantell Bacchus has explored the sandy shores of Ocean City, Maryland, visited the historic monuments of Washington, D.C., and dreams of a family trip to Disney World in Florida, preferring short
    car rides with a beloved stuffed bunny for comfort.
  culinary: Shantell Bacchus loves helping stir batter for banana pancakes, delighting in macaroni and cheese topped with cheddar, sweet potato pie, and fried chicken with crisp skin during Sunday family
    meals, while they eagerly request extra peas and corn on the side.
  core: Shantell Bacchus is a routine-loving five-year-old whose days blend organized play, spontaneous bursts of curiosity, and joyful family traditions, all while navigating the world with a pocketful
    of crayons and a head full of sticky-note dreams.
background:
  cultural: Shantell is a Black child raised in Pikesville, Maryland, within a close‑knit African‑American family that values community, education, and cultural heritage. Her family celebrates traditions
    such as gathering for Sunday meals, attending a local church where she hears gospel music and participates in child‑friendly services, and taking part in Baltimore’s annual Juneteenth events. These
    experiences give her a sense of belonging and expose her to stories and music that reflect her cultural roots while she also enjoys the diverse neighborhoods of the Baltimore metropolitan area.
