  career_goals: Although still very young, Shantell frequently talks about wanting to help other children and enjoys the idea of a steady, caring role. She imagines herself as a preschool teacher or a school
    librarian—jobs that involve routine, organization, and direct interaction with kids her age. She also mentions wanting to become a nurse someday, reflecting her practical desire to take care of others
    in a structured environment.
