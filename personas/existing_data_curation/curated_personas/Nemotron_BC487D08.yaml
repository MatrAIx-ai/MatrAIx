  career_goals: Timothy aims to expand his impact by creating a regional maritime leadership certificate program that integrates safety, emergency management, and community service. He hopes to author a
    practical handbook on civilian port emergency response and to secure a senior advisory role within the state’s maritime safety council. Over the next five years, he plans to mentor at least five junior
    faculty members, increase the proportion of hybrid and online courses in his department, and transition toward an emeritus status that still allows him to teach occasional seminars and continue community
    outreach.
