  career_goals: Ernesto aims to turn his passion for art and community into a professional career. In the short term, he seeks a role as a digital content creator or marketing assistant for a local arts
    organization or tourism office, where he can promote Puerto Rican culture through social media and event promotion. Over the next few years, he plans to complete his degree in communications or arts
    management and eventually launch his own boutique cultural tour company that offers immersive experiences of Dorado’s heritage, music, and cuisine.
