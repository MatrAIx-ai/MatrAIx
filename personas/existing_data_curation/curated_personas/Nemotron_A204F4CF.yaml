personas:
  professional: Ernesto Hernandez, a 22‑year‑old digital marketing enthusiast, leverages their Adobe Photoshop and Lightroom expertise, bilingual fluency, and love for island art to craft vibrant social‑media
    campaigns for local cultural venues, while their easygoing, spontaneous nature sometimes leads to last‑minute content roll‑outs and a delightfully improvised storytelling style.
  sports: Ernesto Hernandez kicks the ball for the Dorado Beach Soccer Club, follows the Cangrejeros de Santurce baseball season closely, and roots for the Capitanes de Arecibo basketball team, balancing
    casual beach play with a laid‑back fitness routine that favors early‑morning jogs along the shoreline over rigid gym schedules, and they cherish the camaraderie of post‑game gatherings.
  arts: Ernesto Hernandez, a regular at Dorado’s galleries, finds inspiration in the vibrant murals of local street artist Ludo Viera, the rhythmic bomba group Bomba y Plena, the reggaetón hits of Daddy
    Yankee, and the classic salsa stylings of Victor Manuelle, and they often blend these influences into their own photography and social‑media storytelling.
  travel: Ernesto Hernandez’s travel style blends spontaneous road‑trip bursts to hidden gems like the bioluminescent bay in Vieques and the historic streets of Old San Juan, with occasional weekend pilgrimages
    to New York City’s Latin art exhibitions, and they also dream of trekking the colorful streets of Cartagena, Colombia.
  culinary: Ernesto Hernandez loves to experiment in the kitchen, mastering mofongo with plantains, chicharrón, and garlic, whipping up arroz con gandules seasoned with sofrito, and tossing fresh pomelo
    and avocado salads, while they also hunt for ripe breadfruit at local farmers’ markets to add a tropical twist to their culinary creations.
  core: Ernesto Hernandez is a curiously social creative who swaps structured plans for spontaneous, art‑filled adventures, and they juggle a love of community, photography, and flavor with a laid‑back
    habit of occasional disorganization.
background:
  cultural: Ernesto identifies strongly with his Puerto Rican roots, a cultural tapestry woven from Spanish colonial history, Taíno indigenous heritage, and African influences. Growing up in the coastal
    town of Dorado, he was immersed in vibrant community celebrations such as the fiestas patronales and San Sebastián, where music, parrandas, and traditional dishes play central roles. Fluent in Spanish
    and comfortable in English, he embraces the island’s rhythmic traditions—bomba, plena, and contemporary reggaetón—while also valuing family bonds, Catholic traditions, and the emerging street art scene
    that reflects Puerto Rico’s evolving identity.
