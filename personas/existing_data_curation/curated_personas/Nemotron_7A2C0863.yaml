  hobbies: '[''card games (bridge, poker)'', ''bingo'', ''shuffle-board'', ''line dancing and country dancing'', ''community festivals'', ''gardening (tomatoes, peppers, herbs)'', ''home cooking (Tex-Mex
    fusion)'', ''watching high-school football and Dallas Cowboys'', ''listening to classic rock and country music'', ''volunteering at the library reading program'', ''participating in local history tours'']'
  career_goals: Although retired from formal employment, Antonio aims to stay productive and socially engaged. He plans to expand his role as a volunteer coordinator at the local senior center, organizing
    weekly card-games and fitness sessions for peers. He hopes to launch a small community garden that provides fresh produce for a nearby food-bank and serves as a gathering spot for neighbors. Antonio
    also wants to deepen his digital literacy, learning to use video-calling platforms and social media to keep in touch with family and share his life stories. In the longer term, he envisions writing
    a short memoir that captures the changes he has witnessed in South Texas over the past six decades, hoping it might inspire younger residents.
