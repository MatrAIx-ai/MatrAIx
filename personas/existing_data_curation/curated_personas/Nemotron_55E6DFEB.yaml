personas:
  professional: Miriam Romano, a seasoned construction veteran with over twenty years of hands‑on experience operating excavators, skid‑steers, and concrete mixers, channels her practical curiosity and
    gregarious leadership into mentoring crews, rigorously enforcing OSHA safety, and championing energy‑efficient renovations as she pursues a forewoman position.
  sports: Miriam Romano finds her stride on the trails with the Clarksville Hiking Club, cheering on the Tennessee Volunteers football team and the Nashville Predators during the season, while her weekend
    hikes in state parks serve as her primary cardio, supplementing occasional weekend softball games at the community center.
  arts: Miriam Romano lights up community‑theater stages and karaoke nights, drawing inspiration from country legends like Dolly Parton and Chris Stapleton as well as classic Broadway hits such as "Oklahoma!",
    while her love of vintage hand tools fuels a creative DIY aesthetic in set design.
  travel: Miriam Romano prefers spontaneous road trips that blend nature and Southern charm, having explored the Great Smoky Mountains, the jazz‑filled streets of New Orleans, and the art‑laden lanes of
    Asheville, yet she balances these getaways with budget‑friendly stays at family cabins and occasional pilgrimages to historic Civil War sites.
  culinary: Miriam Romano’s kitchen is a hybrid of Southern comfort and garden freshness, where she regularly whips up fried chicken with a crispy buttermilk coating, slow‑cooked collard greens seasoned
    with smoked paprika, and peach cobbler using home‑grown peaches, all while experimenting with energy‑efficient cooking methods like induction stovetops.
  core: Miriam Romano is a talkative, tool‑obsessed forewoman‑in‑training whose boundless community spirit often outpaces her organizational skills, leading her to juggle spontaneous barbecues, vintage
    tool hunts, and DIY projects while occasionally forgetting to file paperwork on time.
background:
  cultural: Miriam was raised in a Southern, middle‑class working‑class environment typical of Central Tennessee. Her family emphasized hospitality, faith, and strong community ties, often gathering around
    the dinner table for home‑cooked meals and church events. The region’s cultural rhythms – country music, baseball, barbecues, and a respect for practical craftsmanship – have shaped her values and daily
    life. Though she identifies as white and has roots in the Anglo‑American tradition of the area, she embraces the diverse cultural fabric of Clarksville, engaging with neighbors from various backgrounds
    and contributing to local community initiatives.
attributes:
  skills: '[''Heavy equipment operation (excavators, skid‑steers, forklifts)'', ''Power tool proficiency (drills, saws, concrete mixers)'', ''Construction site safety and OSHA compliance'', ''Blueprint
    reading and basic structural interpretation'', ''Crew coordination and on‑site communication'', ''Basic construction project management and cost estimation'', ''Problem‑solving and improvisation in
    the field'', ''Mentoring and training of new laborers'', ''Knowledge of sustainable/green building materials'', ''First‑aid and emergency response on job sites'']'
  hobbies: '[''Community theater acting and stage crew work'', ''Karaoke evenings with friends'', ''DIY home‑improvement and renovation projects'', ''Gardening and vegetable‑patch cultivation'', ''Cooking
    and sharing Southern comfort food'', ''Volunteering with church outreach and community service'', ''Hosting backyard barbecues and potluck gatherings'', ''Hiking in local state parks and nature trails'',
    ''Collecting and restoring vintage hand tools'', ''Attending country‑music concerts and festivals'']'
  career_goals: Miriam’s immediate goal is to move into a supervisory role as a crew forewoman or foreman within the next two years. To support this, she plans to complete an OSHA 30‑hour certification
    and enroll in a construction‑management certificate program at a nearby community college, finishing the coursework she began in her earlier college years. She also dreams of launching a small, owner‑operated
    contracting business that specializes in energy‑efficient residential renovations and community improvement projects in Clarksville. Long‑term, Miriam hopes to become a mentor and advocate for younger
    workers, promoting safety culture and sustainable building practices.
