  career_goals: Vijaya aims to become a senior research scientist leading an interdisciplinary AI‑for‑health team that delivers clinically actionable insights while adhering to the highest ethical standards.
    She envisions securing a tenure‑track faculty position where she can combine cutting‑edge research with teaching, mentor underrepresented students, and shape university‑wide initiatives on responsible
    AI. Long‑term, she wants to launch an open‑source platform that democratizes advanced analytics for small‑scale healthcare providers, influence public policy on data privacy, and establish a community
    outreach program in the Pacific Northwest that brings hands‑on STEM experiences to girls from immigrant families.
