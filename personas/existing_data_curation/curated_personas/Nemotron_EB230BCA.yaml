  career_goals: Although retired, Ruby remains focused on leaving a lasting impact on her community. She aims to complete a memoir that chronicles her journey as one of the early Black women in engineering,
    hoping to inspire future generations. Ruby also plans to establish a modest scholarship fund for Baltimore high‑school students from underrepresented backgrounds who wish to study STEM. Maintaining
    her health and independence, she wants to stay active in local mentorship programs and continue sharing her practical knowledge with eager learners.
