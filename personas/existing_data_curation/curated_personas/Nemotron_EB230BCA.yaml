personas:
  professional: Ruby Jackson, a 90‑year‑old retired mechanical engineer, leverages her decades of municipal infrastructure design and Fortran‑based data modeling to mentor underrepresented students, craft
    precise technical grant drafts, and diligently work on a memoir that blends engineering rigor with the practical storytelling of Baltimore’s historic projects.
  sports: Ruby Jackson follows the Baltimore Ravens and Orioles with quiet devotion, joins the senior center’s weekly chess matches for strategic exercise, and keeps fit through daily strolls in Patterson
    Park, treating her garden plot as the only “team” she needs.
  arts: Ruby Jackson’s evenings are filled with the smooth improvisations of John Coltrane, the uplifting chants of Mahalia Jackson, and the pages of historical fiction by Isabel Wilkerson, all of which
    shape her reflective yet competitive spirit in both hobbies and mentorship.
  travel: Ruby Jackson prefers short, purposeful trips—like her annual ferry ride to Annapolis for a historic lighthouse tour and occasional visits to the Smithsonian museums in Washington, D.C.—while dreaming
    of a leisurely river cruise along the Mississippi before age curtails further wandering.
  culinary: Ruby Jackson delights in cooking collard greens simmered with smoked ham hocks and cornbread made from a family‑passed recipe, while her knitting sessions often double as cooking experiments
    where she tests new spice blends on her garden’s fresh tomatoes.
  core: Ruby Jackson, a 90‑year‑old retired engineer with a love for routine, jazz, and gardening, balances a competitive mentoring drive with a laid‑back, occasionally forgetful approach to life’s details.
background:
  cultural: Ruby grew up in a close‑knit African‑American neighborhood on the east side of Baltimore during the era of segregation. Her family placed a strong emphasis on church involvement, storytelling,
    and the celebration of Black culinary traditions, such as collard greens, cornbread, and seasoned pork. The civil‑rights movements of the 1950s and 60s shaped her determination to pursue higher education
    in a field where few Black women were represented. Throughout her life, Ruby has drawn strength from the legacy of Baltimore’s Black community—its churches, historically Black schools, and neighborhood
    barbershops—while also valuing the practical, resilient mindset passed down from her grandparents, who taught her the importance of self‑reliance and perseverance.
