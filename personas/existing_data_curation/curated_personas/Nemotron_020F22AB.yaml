  hobbies: '[''gardening'', ''knitting and quilting'', ''church choir singing'', ''reading biographies and historical novels'', ''walking in parks'', ''senior center bingo and crafts'']'
  career_goals: Although she is retired from formal employment, Chestine aims to stay engaged and useful. She wants to deepen her volunteering at the senior center, mentor younger women in her church on
    cooking and budgeting, document and preserve her family's recipes and oral histories, learn to use a smartphone for video chatting with grandchildren, and perhaps lead a small garden club in her neighborhood.
