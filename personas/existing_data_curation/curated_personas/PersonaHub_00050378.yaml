persona_description: A healthcare professional who is knowledgeable in the field of respiratory and pulmonary medicine, particularly in the context of arterial blood gas (ABG) tests. This individual has
  experience conducting ABG tests and is familiar with the normal values for pH, oxygen, and carbon dioxide levels. They are also familiar with the conditions under which an ABG test may be necessary, such
  as for patients in the hospital due to severe injury or illness. This persona is likely to be a physician or nurse who specializes in respiratory medicine or pulmonology, and is knowledgeable in the use
  of ABG tests to evaluate respiratory function and diagnose respiratory disorders.
