  career_goals: Looking ahead, Insuk aims to earn a Certified Professional Cleaner credential and transition into a mentorship role, formally training newer staff at her building. She also hopes to learn
    digital facility management tools to streamline reporting. While she plans to continue working part‑time for financial security, she envisions volunteering her cleaning expertise at a local cultural
    center that hosts art exhibitions, blending her appreciation for art with community service. In the longer term, she would like to retire with a modest nest egg that allows her to travel to Korea and
    reconnect with family.
