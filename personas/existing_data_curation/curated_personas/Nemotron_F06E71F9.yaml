personas:
  professional: Insuk Dong is a seasoned commercial cleaning specialist whose three decades of mastering high‑traffic floor care, meticulous chemical handling, and OSHA compliance are amplified by their
    organized, reliable nature, and their innate curiosity pushes them to adopt new digital facility‑management tools and mentor younger staff.
  sports: Insuk Dong embraces low‑impact fitness by joining a weekday birdwatching walk at Loudoun County parks, cheering on the Washington Capitals during the hockey season and DC United soccer matches
    on weekends, while modestly avoiding high‑intensity gyms in favor of gentle stretching routines that accommodate their arthritic joints.
  arts: Insuk Dong cultivates artistic appreciation through quiet visits to small gallery openings in Washington, D.C., where they often linger over works by Glenn Ligon and Yayoi Kusama, practice traditional
    Korean calligraphy as a meditative hobby, and find inspiration in contemporary fiction authors like Kazuo Ishiguro, weaving these influences into their personal aesthetic.
  travel: Insuk Dong prefers meticulously planned, low‑stress trips that blend cultural immersion and natural beauty, having already explored the historic streets of Annapolis and the Blue Ridge Parkway,
    while eagerly saving to journey to Korea’s countryside to reconnect with family roots and to sample regional tea traditions once their nest egg allows.
  culinary: Insuk Dong delights in cultivating a modest vegetable garden that yields fresh kale, carrots, and heirloom tomatoes, which they incorporate into simple, health‑focused dishes such as bibimbap‑inspired
    grain bowls and miso‑glazed tofu, while also savoring Western classics like roasted vegetable quinoa and curating tea sessions featuring Korean green tea, fragrant Earl Grey, and jasmine blossoms.
  core: Insuk Dong is a curiosity‑driven, methodical cleaner who balances disciplined budgeting with occasional tea‑spending splurges, tends a tidy garden, enjoys early‑morning birdwatching, and occasionally
    forgets to schedule essential health check‑ups.
background:
  cultural: Insuk was born to Korean immigrant parents who settled in the Mid‑Atlantic region in the 1960s. Though raised primarily in English, she maintains a strong connection to Korean culture through
    language, food, and holidays such as Chuseok and Seollal. Her upbringing emphasized diligence, respect for elders, and the value of education, shaping her methodical work ethic. Living in Ashburn, she
    balances these traditions with an American lifestyle, participating in local community events while preserving family customs at home.
