  career_goals: Brion is focused on advancing to a supervisory role within his current plant, seeking to obtain a Certified Welder credential and an OSHA 30-hour safety certification within the next two
    years. He wants to lead a production team, improve efficiency through lean practices, and mentor younger assemblers. Long-term, he hopes to open a modest custom metal-fabrication workshop serving local
    businesses and hobbyists, allowing him to leverage his hands-on expertise while maintaining a steady income for his family as he approaches retirement.
