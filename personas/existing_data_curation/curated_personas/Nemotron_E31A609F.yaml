  hobbies: '[''Bowling league'', ''Weekend barbecues'', ''Classic car restoration'', ''NFL game watching'', ''Community fairs'', ''Youth workshop volunteering'', ''Fishing'', ''Darts'', ''Poker'', ''DIY
