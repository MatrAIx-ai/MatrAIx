personas:
  professional: Glennys Hernandez is a data‑driven HR leader who blends statistical analysis in Python and R with Lean process‑improvement to craft people‑centric policies, yet often battles a spontaneous
    streak that makes meeting tight deadlines a challenge.
  sports: Glennys Hernandez hits the Space Coast trails for weekend hikes, follows the Orlando Magic and the Tampa Bay Rays with enthusiastic fandom, and practices salsa dancing at a local studio with a
    tight‑knit group of friends, balancing cardio with rhythmic movement.
  arts: Glennys Hernandez immerses themselves in contemporary fiction by Malcolm Gladwell and Chimamanda Ngozi Adichie, enjoys the soulful rhythms of salsa and Latin‑jazz legends like Tito Puente, and attends
    occasional indie theater productions at the Space Coast Playhouse.
  travel: Glennys Hernandez favors low‑key solo or small‑group trips, recently backpacked through the Azores to chase cliffside views, and is planning a culinary pilgrimage to Oaxaca to explore regional
    mole sauces while staying within a modest travel budget.
  culinary: Glennys Hernandez blends heritage‑inspired cooking with experimental twists, mastering dishes such as mojo‑marinated pork shoulder, plantain‑crusted fish tacos, and a citrus‑infused black bean
    risotto, while constantly adding unexpected spice blends to keep their kitchen adventures lively.
  core: Glennys Hernandez is a curiosity‑driven, compassionate HR analyst who balances spontaneous creativity with occasional disorganization, channeling their love of people and food into both work and
    life.
background:
  cultural: Glennys grew up in a bilingual Cuban‑American household, celebrating traditions such as music, dance, and communal meals while navigating life in Florida's multicultural environment. Her family
    emphasizes close‑knit relationships, hospitality, and a strong sense of community, which informs her compassionate approach at work and her dedication to volunteerism. She maintains fluency in Spanish
    and English, enjoys sharing Cuban folklore with colleagues, and incorporates the vibrant, resilient spirit of her heritage into both her personal and professional identity.
attributes:
  skills: '[''Talent acquisition'', ''Employee relations'', ''HR analytics'', ''Data-driven decision making'', ''HRIS administration'', ''Conflict resolution'', ''Performance management'', ''Compliance
