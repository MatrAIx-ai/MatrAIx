  hobbies: '[''Cooking Cuban cuisine'', ''Salsa dancing'', ''Reading contemporary fiction'', ''Volunteer tutoring'', ''Hiking in the Space Coast nature trails'', ''DIY home gardening'']'
  career_goals: Glennys aims to become a strategic HR leader who bridges technology and people. In the next five years she plans to earn an HR analytics certification, spearhead a company‑wide employee
    well‑being program, and take on senior‑level responsibilities such as HR Director or Chief People Officer. She is also interested in championing diversity, equity, and inclusion initiatives that reflect
    her Cuban heritage, and eventually launching a consultancy that helps midsize tech firms embed data‑driven HR practices while preserving a humane, collaborative culture.
