  career_goals: Even at five, Luis already pictures a future that blends his love of exploration, creativity, and problem solving. He is fascinated by rockets and stars, so he says he wants to become an
    astronaut who discovers new planets, a dream that fuels his competitive drive to build the best model rockets in school projects. His deep appreciation for bright colors and murals leads him to imagine
    a career as an artist who paints vibrant scenes inspired by Mexican heritage and the landscapes of the Pacific Northwest. Luis also enjoys figuring out how things work, and he often pretends to be a
    detective who follows clues to solve mysteries, satisfying his skeptical side. Because he is organized and methodical, he sets small, achievable targets such as winning the class art contest, completing
    a beginner science experiment, or building the tallest LEGO tower. These early milestones help him feel confident and reduce the worry he sometimes feels about making mistakes, laying a foundation for
    a future that combines exploration, artistry, and logical inquiry.
