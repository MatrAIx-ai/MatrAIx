personas:
  professional: Luis Fuentes is an aspiring junior architect, displaying early fascination with building blocks and sketching floor plans, channeling their methodical nature and competitive drive to outdo
    peers in construction games.
  sports: Luis Fuentes plays on the town's Little League baseball team in spring, enjoys soccer with the local kids' club in fall, cheers for the New York Yankees as their favorite professional team, and
    channels competitive energy into weekly practice while sometimes fearing loss.
  arts: Luis Fuentes delights in finger painting bright dinosaurs, listens to The Wiggles and Pixar soundtracks, and routinely enters class art contests to win stickers, showcasing curiosity and a competitive
    edge.
  travel: Luis Fuentes loves weekend trips to the zoo and dreams of visiting Disneyland, preferring outings planned with a checklist of favorite snacks and a stuffed bear, yet sometimes feels anxious about
    new environments.
  culinary: Luis Fuentes favours mac and cheese with extra cheese, enjoys helping bake chocolate chip cookies, and meticulously arranges food on a plate like a tiny artist, although they occasionally overindulge
    on sugary treats.
  core: Luis Fuentes is a curious, methodical five-year-old who balances competitive play with a streak of worry, often turning everyday chores into meticulous challenges while seeking comfort in art and
    routine.
background:
  cultural: Luis grows up in a Mexican‑American household in Pasco, Washington, where Spanish is spoken at home alongside English at school. His family maintains strong ties to their heritage, celebrating
    Día de los Muertos with homemade altars, cooking traditional dishes like tacos al pastor and tamales on weekends, and attending the local Catholic parish for Mass and community festivals. He participates
    in a weekend Mexican cultural program that teaches folk dances, mariachi songs, and the art of papel picado. The vibrant colors and patterns of Mexican murals inspire his own drawings, and the rhythmic
    beats of ranchera music fill his playtime. Living in Franklin County’s sizable Hispanic community, Luis often joins neighborhood soccer games and cultural celebrations at the Pasco Hispanic Center,
    which reinforces his bilingual abilities and pride in his roots. This blend of Mexican traditions and American upbringing shapes his values of family unity, respect for elders, and a love for storytelling
    through both words and visuals.
