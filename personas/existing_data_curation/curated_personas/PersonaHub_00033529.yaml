persona_description: An historian of yellow fever in the 19th-century American South, focusing on the social, economic, and racial impacts of recurrent epidemics. She has authored a paper on the topic in
  The American Historical Review and has a research focus on 19th-century America, particularly the antebellum South, Greater Caribbean, slavery and disease. Her expertise lies in understanding the impact
  of immunity on society and the economy, and how it influenced New Orleans' economy. She is interested in learning from past outbreaks and how they can generate new social norms in their fatal wakes.
