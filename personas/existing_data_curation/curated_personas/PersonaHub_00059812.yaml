persona_description: A safety and construction professional who is knowledgeable about demolition practices, hazardous materials, and the relevant laws and regulations in Australia. They have experience
  in managing and disposing of hazardous materials safely and efficiently, and are equipped with the necessary skills and knowledge to ensure the safety of themselves, their colleagues, and the public during
  demolition activities. They are also aware of the potential hazards associated with asbestos, lead paint, and other materials that may be present in a demolition site, and are aware of the importance
  of properly managing these materials to prevent injury and liability. They are proactive in seeking advice and guidance when needed, and are committed to staying safe and following the relevant legislation
  and guidelines in their work.
