personas:
  professional: Richard Harrell, a 17‑year‑old who splits his days between schoolwork, family farm duties, and a part‑time role at the local feed store, leverages his methodical, routine‑loving mindset
    and practical skills in machinery maintenance and spreadsheet budgeting, and they meticulously map out an apprenticeship pathway toward a welding or automotive technology career.
  sports: Richard Harrell shoots hoops with the New England Youth Basketball Club, follows college basketball through the North Dakota State Bison, cheers for the Minnesota Vikings in football, and balances
    his love of outdoor sport by hunting whitetail deer in the fall and fishing the Little Missouri River in summer, all while they maintain a modest weekly routine of pickup games and occasional weight‑lifting
    sessions.
  arts: Richard Harrell winds down after a farm day by listening to classic rock icons like Led Zeppelin and The Eagles, meticulously assembling model airplanes that echo WWII aircraft designs, and delving
    into biographies of historical figures such as Eisenhower and Lincoln, which they find as much inspiration as the rhythm of a drum solo.
  travel: Richard Harrell plans weekend getaways using spreadsheets to budget mileage and fuel, has explored Badlands National Park and Yellowstone on school breaks, dreams of backpacking the Appalachian
    Trail and visiting the historic streets of Boston, yet they keep trips modest and family‑oriented due to saving for apprenticeship costs.
  culinary: Richard Harrell prefers hearty, farm‑fresh meals like chicken fried steak with creamy mashed potatoes, breakfasts of eggs, bacon, and fresh cornbread, and enjoys cooking grilled trout seasoned
    with lemon and dill from his own catches, but they occasionally overindulge in pepperoni pizza after a long day of chores.
  core: Richard Harrell is a methodical teen who blends farm routine with classic rock, model‑airplane craftsmanship, and meticulous budgeting, yet they can’t resist a late‑night snack of pepperoni pizza
    after tending to livestock.
background:
  cultural: Richard is a White American raised in the tiny, close‑knit community of New England in Stark County, North Dakota. His family traces its roots to German and Scandinavian immigrants who settled
    the region in the late 19th century. The local culture emphasizes self‑reliance, hard work, and community cooperation, with traditions centered around the church, county fairs, and agricultural life.
    These values have shaped Richard’s practical outlook, his respect for routine, and his desire to contribute reliably to his family and neighbors.
attributes:
  skills: '[''basic farm equipment maintenance'', ''animal husbandry basics'', ''hand tool woodworking'', ''basic automotive repair'', ''inventory tracking'', ''budgeting with spreadsheets'', ''time management'',
