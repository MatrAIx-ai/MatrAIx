  hobbies: '[''fishing'', ''hunting'', ''model airplane building'', ''reading historical non-fiction'', ''basketball'', ''gardening'', ''volunteering at church events'', ''listening to classic rock'']'
  career_goals: Richard aims to finish his GED within the next year and then enroll in a technical college program that offers welding or automotive technology. He hopes to secure an apprenticeship where
    he can refine his mechanical skills and eventually obtain a certification. Long‑term, he envisions either taking over the maintenance and equipment side of his family’s farm or opening a small auto
    repair shop that serves the rural community of New England, ND. He also considers a short stint in the U.S. Army to gain discipline and access to further training benefits, but his primary focus remains
    on building a stable, practical career that supports his family and community.
