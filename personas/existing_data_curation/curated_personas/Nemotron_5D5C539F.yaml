personas:
  professional: Zoe Hilliard, a seasoned community volunteer coordinator with a knack for hands‑on problem solving, blends curiosity about local history with practical DIY skills to lead neighborhood garden
    projects and mentor library volunteers, while they occasionally let disorganized paperwork slip through in favor of flexible, on‑the‑spot improvisation.
  sports: Zoe Hilliard, a dedicated early‑morning walker who joins the Riverside Strollers hiking club, follows the Midtown Monarchs minor‑league baseball team, and they treat birdwatching at the nearby
    wetlands as a gentle sport that keeps them fit and connected to nature.
  arts: Zoe Hilliard, an avid reader of historical fiction such as Hilary Mantel’s works, a devoted knitter who recreates patterns inspired by folk artist Mary Cassatt, and a participant in evening photography
    walks capturing the town’s heritage, often finds inspiration in the melodies of Joan Baez and the local community theater’s productions, and they regularly share these artistic discoveries at neighborhood
    art swaps.
  travel: Zoe Hilliard, a methodical planner of weekend road trips who prefers small‑group tours of historic towns like Savannah, Georgia, and Bruges, Belgium, balances a love for quiet garden‑cooking retreats
    with occasional genealogical research trips to ancestral archives, and they often travel on a modest budget, returning home refreshed.
  culinary: Zoe Hilliard, a competent home cook who harvests rosemary, thyme, and basil from their garden to craft dishes such as herb‑roasted chicken and rustic ratatouille, experiments with fermented
    kimchi and seasonal soups, and they enjoy sharing homemade jam gifts at community events, often delighting in the aroma of freshly baked bread.
  core: Zoe Hilliard, a curious yet practical garden‑savvy community volunteer who balances solitary hobbies with small‑group collaborations, occasionally lets disorganization slip, and they find joy in
    nurturing both plants and people.
background:
  cultural: Zoe comes from a white, Mid‑Atlantic American background with ancestry tracing back to early English and Irish settlers in Delaware. Raised in a small‑town environment, she values self‑reliance,
    community support, and modest traditions such as church gatherings, farmer’s markets, and seasonal fairs. Her upbringing emphasized practicality, respect for nature, and a quiet appreciation for history,
    all of which shape her current lifestyle and outlook.
