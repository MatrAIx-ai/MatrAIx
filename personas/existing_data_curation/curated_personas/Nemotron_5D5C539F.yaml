    photography walks"]'
  career_goals: Although Zoe is not currently in the formal workforce, she aims to deepen her community involvement by leading a neighborhood garden project and mentoring younger volunteers at the local
    library. She hopes to document her life experiences in a memoir and to acquire a certification in senior‑citizen first aid, allowing her to contribute more confidently in emergency situations. Learning
    digital photography is also a personal ambition that would support her interest in preserving local history and sharing it online.
