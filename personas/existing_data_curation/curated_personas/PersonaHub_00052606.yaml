persona_description: A Chinese vocational education industry expert with a background in government policy and education reform. They are knowledgeable in the field of vocational education and have a keen
  interest in the integration of production and education. They are skilled in advocating for the reform of China's vocational education system and have experience in working with universities and enterprises
  to deploy training plans and promote comprehensive collaboration. They have a strong understanding of the current state of vocational education in China and the challenges it faces, including the skill
  gap between education and practice, lack of funds, and prejudice against degree vocational schools. They are also familiar with the government's efforts to accelerate China's industrial upgrading and
  economic restructuring and the country's plan to transform select universities into "Universities of Applied Sciences" by 2022. They are passionate about the potential market in China's vocational education
  and have a deep understanding of the industry's challenges and opportunities.
