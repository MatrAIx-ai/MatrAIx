persona_description: A veteran of the U.S. Army Signal Corps who worked as the supervisor of the color photographic laboratory of the Far East Command during the Occupation of Japan, 1947-1952. He is known
  for his talent in using the art form of scissorette photography to gain instant affinity with his photographic subjects, as well as his mastery of the black and white form. He is also a prolific photographer,
  donating over 30,000 images to the MacArthur Archives. His work captured the culture, society, and history of Japan, particularly during the Allied Occupation of Japan.
