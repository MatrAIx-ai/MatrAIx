  hobbies: '[''Watercolor painting'', ''Gardening'', ''Bird watching'', ''Knitting and quilting'', ''Reading literature and poetry'', ''Digital photography'', ''Local history and genealogy research'', ''Journaling'',
    ''Attending art lectures and museum tours'', ''Cooking and trying new recipes'']'
  career_goals: Although retired, Miranda aims to deepen her contributions to the cultural life of Clinton. She plans to lead art workshops for seniors at the public library, mentor youth in community mural
    projects, and complete a series of landscape paintings that depict the Iowa countryside. She also hopes to publish a memoir that weaves her family history with the town’s heritage, and to assist the
    Clinton County Historical Society in securing grants for preserving historic buildings.
