personas:
  professional: Miranda Hill, a retired liberal arts scholar and community arts advocate, blends their watercolor painting, digital photography, and grant‑writing expertise to lead senior art workshops
    at the Clinton Public Library, mentor youth on mural projects, and curate a series of landscape paintings that capture Iowa’s river bluffs; they navigate the occasional bout of self‑doubt that stems
    from their tendency toward worry.
  sports: Miranda Hill, an avid bird‑watcher and garden enthusiast, maintains fitness through daily walks along the Mississippi River bluffs, occasional yoga sessions at the local senior center, and friendly
    cheering for the Iowa Hawkeyes football team and the Quad Cities River Bandits baseball club, while they avoid high‑impact sports that aggravate their arthritis.
  arts: Miranda Hill, a devoted watercolorist and digital photographer, draws creative fuel from Claude Monet’s impressionist techniques and Ansel Adams’ black‑and‑white landscapes, regularly visits the
    Cedar Rapids Museum of Art to study works by Grant Wood, and they find solace in knitting and quilting while listening to Joni Mitchell and Leonard Cohen on their vintage record player.
  travel: Miranda Hill, a methodical planner with a penchant for historic river towns, enjoys weekend road trips to Dubuque’s historic district, a seasonal train ride to Chicago’s Art Institute, and dreams
    of a spring pilgrimage to the English countryside’s Cotswolds, all while they balance a modest travel budget that allocates funds for boutique B&B stays and local culinary experiences.
  culinary: Miranda Hill, a garden‑to‑table home chef, frequently prepares roasted beet and goat‑cheese salads, creamy corn chowder with fresh thyme, and sourdough loaf topped with rosemary, while they
    indulge their curiosity by experimenting with sous‑vide carrots and occasionally over‑salting dishes when distracted by a new photography project.
  core: Miranda Hill, a solitary yet curious senior artist, balances meticulous organization with bouts of worry, channels their creative passions into community art, and they occasionally let nostalgia
    and a stack of unfiled receipts dictate their daily rhythm.
background:
  cultural: Miranda comes from a Midwestern white family with roots in German and Irish immigrants who settled in Iowa in the early 20th century. She grew up in small‑town Iowa, absorbing values of self‑reliance,
    community service, and a deep respect for the land. Her cultural life is shaped by local traditions such as county fairs, church gatherings, and the region’s folk art heritage. She maintains a strong
    connection to the historical narratives of Clinton County, often participating in preservation efforts and celebrating the simple, modest aesthetic characteristic of the Midwest.
