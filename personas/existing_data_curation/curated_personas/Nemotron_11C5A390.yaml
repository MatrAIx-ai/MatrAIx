personas:
  professional: Xiomara Obregon, a seasoned engineering technologist, leverages her expertise in CAD, PLC programming, and preventive‑maintenance design to lead methodical, safety‑first projects, while
    her organized, reliable nature and occasional worry drive her to double‑check every detail before implementation.
  sports: Xiomara Obregon enjoys hiking the nearby Blue Ridge trail network in spring, plays weekly recreational softball with a local co‑ed league, and follows the Atlanta Falcons and Chicago Cubs, integrating
    her love of gentle cardio with occasional competitive spirit while balancing solo and social exercise.
  arts: Xiomara Obregon frequents the regional art museum to view works by Monet and Kehinde Wiley, participates in weekend sketching circles where she draws botanical studies, and finds inspiration in
    the music of Juan Luis Guerra, blending visual and auditory arts into her creative downtime.
  travel: Xiomara Obregon prefers structured, moderate‑pacing trips, often planning weekend getaways to historic towns like Savannah and cultural festivals in Cartagena, balancing her curiosity for nature
    with the comfort of pre‑booked accommodations, while family obligations sometimes limit longer vacations.
  culinary: Xiomara Obregon is an adept home chef who masters traditional Dominican dishes such as sancocho and mangú, while also experimenting with fresh herbs like cilantro and oregano in grilled fish,
    and enjoys sourcing ingredients at farmers' markets for her weekend family feasts.
  core: Xiomara Obregon blends meticulous engineering precision with a love for gardening, bachata, and occasional budget‑splurges, all while wrestling with a chronic worry that fuels both diligent planning
    and occasional over‑analysis.
background:
  cultural: Xiomara’s Dominican heritage is a core part of her identity. She grew up in a bilingual household where Spanish and English were spoken interchangeably, fostering strong family ties and a deep
    appreciation for Caribbean rhythms, food, and festivals. The Dominican values of resilience, community support, and hospitality influence how she relates to coworkers and neighbors in Rahway, NJ. She
    often incorporates cultural traditions—such as preparing plantains for neighborhood gatherings or sharing stories of Dominican history—into her personal life, helping her maintain a sense of belonging
    while navigating the demands of her engineering career. Her cultural background also fuels her commitment to giving back, particularly through mentoring programs that aim to uplift other first‑generation
    Latino professionals.
