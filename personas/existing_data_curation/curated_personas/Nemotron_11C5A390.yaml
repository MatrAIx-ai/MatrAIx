  career_goals: Xiomara aims to advance into a senior technologist or project‑lead role within the next five years, eventually overseeing a multidisciplinary engineering group that drives sustainability
    initiatives in manufacturing. She plans to earn a Certified Manufacturing Technologist (CMfgT) credential and enroll in a part‑time master's program in Engineering Management to strengthen her leadership
    and strategic planning skills. Long‑term, she hopes to mentor junior technicians, champion workplace safety improvements, and contribute to community outreach programs that encourage STEM education
    among underrepresented youth, leveraging her organized, compassionate approach while learning to better manage her stress and worry through mindfulness practices.
