    and legal counsel'', ''Time management and case prioritization'', ''Emergency response and disaster claim handling'']'
  hobbies: '[''Hiking in the Utah red-rock canyons'', ''Co-ed volleyball league'', ''Bike riding with friends'', ''DIY home-improvement projects'', ''Food photography and experimental cooking'', ''Reading
    true-crime literature'', ''Escape-room challenge participation'', ''Community disaster-preparedness volunteer work'']'
  career_goals: Brianna aims to progress into a senior leadership role within the insurance industry, targeting a position such as Claims Department Manager or Director of Claims Operations. She plans to
    earn professional certifications like the Chartered Property and Casualty Underwriter (CPCU) and a Certified Fraud Examiner (CFE) designation to deepen her expertise. Over the next five years, she envisions
    leading a high-performing claims team, implementing data-driven process improvements, and developing training programs that blend investigative rigor with compassionate customer service. She also aspires
    to contribute to industry best-practice guidelines for disaster-related claims, leveraging her experience in the Utah Southwest's unique risk environment.
