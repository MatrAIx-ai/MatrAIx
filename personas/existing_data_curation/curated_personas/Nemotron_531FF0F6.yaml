personas:
  professional: Rebecca Sparks is a meticulous food‑processing veteran with over two decades of experience managing large‑scale production lines, mastering HACCP and USDA safety protocols, troubleshooting
    equipment, and training crews, while they pursue a ServSafe manager certification and part‑time studies in food science to transition into a supervisory quality‑assurance role and eventually launch
    a home‑based catering venture.
  sports: Rebecca Sparks stays active by walking the Maumee River trail most mornings, joining a local adult softball league in the spring, and cheering for the Toledo Mud Hens and Walleye while they also
    follow the Cleveland Browns during football season.
  arts: Rebecca Sparks expresses their creativity through quilting intricate patterns while listening to classic‑rock staples like The Rolling Stones and Fleetwood Mac, and they frequently attend performances
    at the historic Toledo Playhouse and discuss mystery novels at their monthly book club.
  travel: Rebecca Sparks prefers modest, well‑planned road trips that blend culinary discoveries and cultural stops, having explored Chicago’s deep‑dish scene, Nashville’s music venues, and the Great Lakes
    shoreline, while they dream of a future visit to Asheville’s Blue Ridge Mountains for its artisanal markets.
  culinary: Rebecca Sparks combines practical home‑cooking skill with garden‑fresh ingredients, regularly preparing family‑favorite chicken pot pie and cornbread while they experiment with roasted tomato‑basil
    soup, zucchini stir‑fry, and sourdough rye loaves seasoned with rosemary and sea salt.
  core: Rebecca Sparks is a pragmatic, detail‑oriented plant veteran who balances a disciplined work ethic with a love for quilting, garden‑to‑table cooking, and community service, all while they quietly
    battle a tendency to over‑schedule themselves and a nostalgic craving for classic‑rock anthems.
background:
  cultural: Rebecca grew up in a working‑class white family in the Toledo suburbs, where Midwestern values of hard work, modesty, and community involvement were emphasized. Her upbringing was shaped by
    the local Methodist church, school events, and family gatherings centered around home‑cooked meals. The regional culture of Ohio, with its focus on practicality, self‑reliance, and neighborly support,
    has informed her pragmatic outlook and cooperative nature. While her divorce introduced a period of personal challenge, it also reinforced her independence and focus on resilience, aligning with the
    cultural narrative of persevering through change.
attributes:
  skills: '["Batch Production Management", "Food Safety & HACCP Compliance", "Equipment Operation & Maintenance", "Quality Assurance & Inspection", "Inventory Control", "Standard Operating Procedures Documentation",
    "Team Training & Supervision", "Time Management", "Problem Solving", "Production Data Entry"]'
  hobbies: '["Gardening", "Quilting", "Reading Mystery and Historical Fiction Novels", "Book Club Participation", "Cooking", "Food Bank Volunteering", "Walking Along the Maumee River", "Classic Rock Listening",
    "Community Theater Attendance"]'
  career_goals: Rebecca aims to leverage her extensive floor‑level expertise into a supervisory or quality‑assurance role within the plant over the next three to five years. She plans to obtain a ServSafe
    food‑safety manager certification and enroll in a part‑time associate program in food science or business administration at a local community college. In the longer term, she envisions launching a small
    home‑based catering service focused on wholesome, locally sourced dishes, providing a flexible income stream as she approaches retirement while maintaining financial stability for herself.
