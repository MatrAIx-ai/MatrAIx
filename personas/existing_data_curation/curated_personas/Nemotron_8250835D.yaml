  hobbies: '[''Weekly book club'', ''Bi‑weekly quilting circle'', ''Monthly senior bridge tournament'', ''Community gardening'', ''Pastry cooking for festivals'', ''Hiking local trails'', ''Church socials'',
    ''Saturday senior yoga'', ''Vintage postcard collecting'', ''Digital photography of local history'']'
  career_goals: Although retired from formal employment, Julia aims to deepen her leadership role at the Reardan Senior Center by overseeing a new intergenerational community garden and establishing a mentorship
    program for younger volunteers. She plans to obtain a certification in senior wellness coaching, learn digital photography to document the town’s seasonal festivals, and travel to visit her siblings
    along the Washington and Oregon coasts. Long‑term, she wishes to create a small scholarship fund for local high‑school students interested in community service, ensuring her legacy supports the practical,
    service‑oriented values she cherishes.
