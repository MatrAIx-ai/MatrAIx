personas:
  professional: Merri Pearrell, a seasoned housekeeper with over 25 years of hands‑on experience in residential and small‑scale commercial settings, applies their meticulous routine, deep‑cleaning expertise,
    floor‑care mastery, and detailed inventory management to train staff, design efficient cleaning schedules, and champion environmentally friendly practices as they pursue a supervisory role or launch
    a green‑focused cleaning business.
  sports: Merri Pearrell, a lively line‑dancer at the local community center and an enthusiastic member of the Sandia Hiking Club, roots for the Albuquerque Isotopes during baseball season, joins casual
    church softball games, and uses the rhythmic cardio of line dancing as a fun way to stay fit.
  arts: Merri Pearrell, whose creative outlet flourishes in a weekly quilting circle, often pairs needlework with listening to the folk melodies of Gillian Welch and reading the classic mysteries of Agatha
    Christie, and eagerly attends the annual Albuquerque Folk Arts Festival to watch acts like Old Crow Medicine Show.
  travel: Merri Pearrell, who values both adventure and family commitments, plans weekend road trips to nearby gems such as Santa Fe, Taos, and the Colorado Rockies, dreams of a summer drive to the Grand
    Canyon, but usually prioritizes budget‑friendly trips that fit around church duties and quilting gatherings.
  culinary: Merri Pearrell, an enthusiastic home cook who delights in experimenting with traditional New Mexican dishes like green‑chile enchilada casserole, carne adovada, and posole, seasons with roasted
    green chiles, piñón nuts, and cumin, and also bakes crowd‑pleasing apple pies and churro‑style cinnamon rolls for church potlucks, displaying a competent, if not professional, culinary skill set.
  core: Merri Pearrell blends a love for routine with community spirit, turning line‑dancing, green‑cleaning, and quilting into a well‑orchestrated lifestyle punctuated by modest budgeting, health‑conscious
    habits, and a steady pursuit of sustainable success.
background:
  cultural: Merri grew up in a close‑knit, predominantly Anglo‑American family in the Southwest, where family, faith, and hard work were central values. Raised in a Protestant (or Catholic) household, she
    participates regularly in church activities and community gatherings. Living in Belen, New Mexico, she has embraced the blend of American and regional New Mexican customs—enjoying local foods, seasonal
    festivals, and the strong sense of neighborly support. Her cultural outlook is practical, tradition‑oriented, and focused on maintaining reliable, everyday relationships.
attributes:
  skills: '["Deep cleaning techniques", "Floor care (hardwood, tile, carpet)", "Laundry and fabric care", "Cleaning chemical safety and proper use", "Inventory management and supply ordering", "Time management
    and scheduling", "Customer service and clear communication", "Training and mentoring new staff", "Basic home maintenance (light repairs, plumbing)", "Record‑keeping and budgeting"]'
  hobbies: '["Church volunteer work (kitchen, potlucks)", "Line dancing at community center", "Gardening", "Cooking traditional New Mexican dishes", "Quilting circle", "Weekend hikes in the Sandia Mountains",
    "Reading light mystery novels"]'
  career_goals: Merri aims to move into a supervisory role, such as head housekeeper for a local hotel, senior‑living facility, or a large private residence, where she can design cleaning schedules, oversee
    a team, and implement efficiency improvements. She also envisions starting her own small cleaning business that emphasizes green, environmentally friendly practices. To support these ambitions, she
    plans to earn certification from the Institute of Professional Cleaning Services (IICRC) and attend workshops on sustainable cleaning methods, leveraging her extensive network in Belen and the surrounding
    county.
