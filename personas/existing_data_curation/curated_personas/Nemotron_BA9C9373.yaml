personas:
  professional: Chikela Brown, a bright 5‑year‑old kindergartner, showcases a natural knack for organizing class projects, reliably leads group art activities with a structured approach, and eagerly volunteers
    as class monitor, blending practicality with energetic sociability.
  sports: Chikela Brown is an avid fan of the Riverdale Rookies junior soccer team, loves watching the New York Yankees on TV, participates in after‑school gymnastics classes, and practices a daily 20‑minute
    backyard obstacle course, channeling their competitive spirit and love for structured group play.
  arts: Chikela Brown eagerly sketches cartoon characters during free play, constantly hums the upbeat tunes of Disney’s Frozen soundtrack, proudly recites the lyrics to Taylor Swift’s Shake It Off, and
    enjoys molding clay figures, showcasing a lively blend of structured creativity and outgoing performance.
  travel: Chikela Brown has explored Disneyland in Anaheim, enjoyed a family road trip to the Rocky Mountains, dreams of visiting the Eiffel Tower in Paris, prefers trips with a clear itinerary and plenty
    of scheduled playground time, yet always insists on adding a souvenir to their growing travel collection.
  culinary: Chikela Brown loves spaghetti with marinara sauce, crunchy apple slices, and chicken nuggets, can proudly make a peanut butter and jelly sandwich unaided, tends to spill milk when excited, and
    delights in tasting new fruits like kiwi and mango whenever a family member cooks them, reflecting a mix of independent culinary curiosity and occasional messiness.
  core: Chikela Brown, a structured yet exuberant 5‑year‑old, balances a love for order and competitive play with a restless curiosity that drives them to organize toys, save pennies, and tackle every challenge
    with boundless energy.
background:
  cultural: Chikela is raised in a Black family in Capitol Heights, Maryland, a community with deep ties to African‑American traditions and strong neighborhood networks. Her family celebrates cultural events
    like Juneteenth, Black History Month, and holiday gatherings with soul food and music. She frequently participates in church‑based children’s programs that emphasize community service and storytelling.
    Local community centers offer after‑school arts and sports programs where she interacts with peers from similar backgrounds, reinforcing values of resilience, mutual support, and pride in her heritage.
