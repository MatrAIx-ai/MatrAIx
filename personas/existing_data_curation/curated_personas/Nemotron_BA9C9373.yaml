  career_goals: Although still young, Chikela dreams of becoming a teacher because she loves sharing stories with her friends and helping them learn new things. She also expresses excitement about being
    a veterinarian, inspired by her love for animals at the local park. Recently, she has voiced an interest in becoming a soccer player, enjoying the competitive spirit of team games and imagining herself
    on the field. Her ambition reflects a blend of caring for others, curiosity about the natural world, and a drive for competition.
