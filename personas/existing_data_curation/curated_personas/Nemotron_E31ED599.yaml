  hobbies: '[''sketching and digital illustration'', ''landscape photography'', ''playing indie video games'', ''online art challenges'', ''reading sci‑fi and philosophy'', ''manga and anime appreciation'',
    ''calligraphy with brush pens'', ''listening to experimental electronic music'', ''hiking in Anchorage'']'
  career_goals: Kin aspires to attend a specialized art and design program to become a professional concept artist for video games or immersive media. He envisions building a freelance career that blends
    his love for East Asian aesthetic motifs with the rugged natural beauty of Alaska, eventually publishing a graphic novel and offering limited‑edition prints online. In the longer term, he hopes to experiment
    with augmented reality installations that merge traditional brushwork with interactive digital experiences, positioning himself at the intersection of cultural art and emerging technology.
