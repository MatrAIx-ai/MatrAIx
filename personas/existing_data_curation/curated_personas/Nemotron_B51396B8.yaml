personas:
  professional: Wanda Danos, a 47‑year‑old early childhood educator with a bachelor’s in education, leverages their methodical organization and curiosity for art to design Montessori‑inspired, arts‑integrated
    curricula while confidently leading staff and engaging parents in community‑centered initiatives.
  sports: Wanda Danos follows the Dallas Cowboys fervently, plays pick‑up volleyball with the Big Spring Women’s Recreational League each summer, and hikes the Guadalupe Mountains as part of the West Texas
    Trailblazers club, balancing team spirit with personal fitness.
  arts: Wanda Danos immerses themselves in creative expression by painting oil canvases inspired by Georgia O’Keeffe, crafting pottery after watching studio sessions by contemporary artist Beth McCormick,
    attending community theater productions starring local actor James DeWitt, and studying the music of Kacey Musgraves and the poetry of Maya Angelou.
  travel: Wanda Danos prefers carefully planned road trips that blend cultural immersion and natural wonder, having explored Carlsbad Caverns, the historic streets of Santa Fe, and a culinary tour of Oaxaca,
    while dreaming of a future visit to Barcelona’s art districts and the Japanese cherry‑blossom festivals.
  culinary: Wanda Danos enjoys cooking Tex‑Mex dishes such as chicken fajitas with fresh cilantro, roasted poblano salsa, and homemade guacamole, and they excel at blending traditional spices with a modern
    presentation, often pairing meals with locally sourced prickly pear sorbet.
  core: Wanda Danos is a curiosity‑driven, organized educator whose love for art fuels community building, yet they battle coffee‑induced insomnia and a stubborn habit of over‑committing to extracurricular
    projects.
background:
  cultural: Wanda is a white Texan who grew up in a small West Texas town, embodying the region's blend of Southern hospitality and frontier independence. Her upbringing emphasized close‑knit community
    values, church involvement, and a strong work ethic. While rooted in traditional Texan culture—family gatherings, country music, and outdoor recreation—she actively embraces the area's cultural diversity,
    especially the Hispanic influences that shape local cuisine, language, and celebrations. This cultural awareness informs her inclusive approach to childcare, ensuring that each child's background is
    respected and celebrated.
