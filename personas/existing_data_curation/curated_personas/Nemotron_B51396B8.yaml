  hobbies: '[''Oil painting'', ''Pottery'', ''Visiting art galleries'', ''Reading educational literature'', ''Community theater'', ''Gardening'', ''Hiking'', ''Cooking Tex-Mex recipes'', ''Quilting'', ''Hosting
    parent potlucks'', ''Book club'', ''Volunteering at local festivals'']'
  career_goals: Wanda aims to advance to a supervisory role, such as center director, where she can shape program policy and mentor new staff. She plans to pursue a master's degree in early childhood education
    to deepen her expertise in inclusive, arts‑based curricula. Long‑term, she hopes to launch a community‑focused early learning hub in Big Spring that offers affordable childcare, after‑school art workshops,
    and family engagement programs. Additionally, she aspires to become a certified trainer in Montessori and Reggio Emilia methods, advocating for innovative teaching practices across regional childcare
    centers.
