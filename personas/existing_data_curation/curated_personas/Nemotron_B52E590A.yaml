personas:
  professional: Gerald Noble, a seasoned culinary veteran with over four decades of high‑volume kitchen leadership, orchestrates menu design around Midwestern comfort foods, mentors staff with a structured
    yet adaptable approach, and they enforce rigorous food‑safety standards while balancing budgets like a seasoned accountant.
  sports: Gerald Noble spends Saturday mornings fishing on the Missouri River, joins the local senior bowling league, proudly roots for the Kansas City Chiefs and St. Louis Cardinals, and they participate
    in the county's seasonal elk‑hunting club, balancing low‑impact fitness with community camaraderie.
  arts: Gerald Noble channels their love of folk music by playing a silver harmonica at informal jam sessions featuring tunes by Bob Dylan and Johnny Cash, collects vintage woodworking manuals, and they
    enjoy occasional screenings of classic westerns starring John Wayne, all of which enrich their sense of regional heritage.
  travel: Gerald Noble prefers well‑planned road trips that blend culinary exploration with nature, having driven to Yellowstone and the Badlands for trout‑fishing pilgrimages, and they dream of a culinary
    tour of the Swiss Alps to learn Alpine cheese‑making.
  culinary: Gerald Noble boasts masterful skill in smoked pork shoulder, prairie turnip stew, and wild‑rice pilaf, regularly incorporating locally sourced heirloom tomatoes, corn, and juniper berries into
    their repertoire, and they relish the occasional indulgence of a fiery Kansas City‑style burnt‑end sandwich.
  core: Gerald Noble is a pragmatic, community‑oriented culinary elder who balances meticulous kitchen discipline with a habit of over‑seasoning every dish and a soft spot for early‑dawn river fishing,
    and they never miss a chance to share a story over a potluck.
background:
  cultural: Gerald descends from German‑Scandinavian ancestors who settled in the Great Plains during the early 1900s. He was raised on a family farm near Divide County, where Lutheran values of modesty,
    hospitality, and communal responsibility were central. This upbringing cultivated his appreciation for hearty, farm‑fresh meals and a strong sense of community service that permeates both his professional
    cooking and his personal life.
