  career_goals: Marcel aims to convert his practical abilities and sociable nature into a stable, community‑focused career. In the short term, he plans to enroll in a community‑college trade program to
    earn certification as an electrician or HVAC technician, or to start a small handyman service that serves Saint Marys and surrounding towns. Long‑term, he hopes to expand the business into a storefront
    offering home‑improvement supplies and to become a recognized local leader who advocates for neighborhood development projects and organizes community events.
