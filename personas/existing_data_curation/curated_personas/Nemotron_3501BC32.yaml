  career_goals: Jason aims to ascend to a regional director role overseeing multiple health‑care facilities in the Mid‑Atlantic, where he can champion large‑scale innovation such as telehealth expansion,
    AI‑enabled analytics, and patient‑centered care models. He intends to establish a center for health‑service innovation within his community, mentor the next generation of health‑services managers, and
    eventually launch a consulting practice that helps organizations embed creativity and abstract thinking into their operational strategies. Additionally, he is passionate about influencing health policy
    to improve access for underserved populations in rural Maryland.
