  career_goals: Lisa aims to transition from a teaching assistant to a fully credentialed elementary teacher within the next three years, planning to complete her state teaching license and pursue a master's
    degree in curriculum and instruction. She also hopes to specialize in special education to better support diverse learners, and she envisions taking on a mentorship role for new teaching assistants
    while contributing to school-wide initiatives that strengthen community-parent partnerships.
