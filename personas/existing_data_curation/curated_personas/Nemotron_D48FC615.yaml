personas:
  professional: Lisa Waters, a dedicated teaching assistant at a small elementary school in western Pennsylvania, blends a routine‑focused mindset with tech‑savvy skills on Google Classroom and SMART Boards,
    delivering individualized literacy and math support while quietly streamlining lesson preparation and fostering a cooperative classroom environment.
  sports: Lisa Waters follows the Pittsburgh Steelers with fervent weekly game nights, jogs along the Ohio River Trail as a member of the local River Runners club during spring and summer, and participates
    in a community adult softball league, blending competitive spirit with a preference for familiar, routine‑based activities.
  arts: Lisa Waters finds comfort in classic literature, routinely re‑reading Jane Austen and Charles Dickens while also attending performances by the Aurora Theater and singing in the Methodist church
    choir, and they unwind by knitting scarves inspired by traditional patterns for the senior center.
  travel: Lisa Waters enjoys modest weekend escapes to nearby historic sites such as Gettysburg and the Amish country farms, occasional trips to New York City for a Broadway show, and they prefer planned
    itineraries that balance familiar comforts with a touch of adventure, always budgeting carefully to keep travel within a modest discretionary allowance.
  culinary: Lisa Waters delights in baking classic comfort foods like apple pie with a flaky crust and homemade sourdough bread, savors fresh tomato salads seasoned with basil, oregano, and mozzarella,
    often sharing these dishes with church neighbors and the local senior center, and they rely on herbs from their garden to flavor many of their meals.
  core: Lisa Waters is a routine‑loving, community‑centered teaching assistant who balances practical pragmatism with gentle flexibility, nurturing both classroom learning and neighborhood ties while quietly
    indulging in gardening, baking, and classic literature.
background:
  cultural: Lisa grew up in the steel-town region of western Pennsylvania, where generations of families worked in manufacturing and valued hard work, practicality, and mutual support. Her family’s heritage
    includes Irish and German ancestry, and she was raised in a close-knit, Protestant (Methodist) community that emphasized service, modesty, and celebration of local traditions such as the annual community
    fair and the Pittsburgh Steelers fandom. The economic shifts of the late-20th century taught her resilience and a collaborative spirit, shaping her belief in education as a pathway to stability and
    community revitalization.
