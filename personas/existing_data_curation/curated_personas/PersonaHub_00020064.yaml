persona_description: A postdoctoral assistant working in MIT's Distributed Robotics Lab, specializing in swarm robotics and its applications in precision agriculture. He has experience in creating robots
  capable of tending to small gardens of tomatoes, and has a keen interest in the potential of this technology to reduce the carbon footprint of agriculture and automate tasks for older adults with low
  mobility in residential care facilities. He is optimistic about the future applications of this technology and its potential to collaborate between humans, the natural world, and their machines.
