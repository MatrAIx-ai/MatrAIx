  career_goals: Kyle aims to transition from a teaching assistant to a full-time faculty position, eventually becoming a lecturer or associate professor in the humanities. He aspires to develop interdisciplinary
    courses that bridge classic literature with contemporary social issues, publish scholarly articles, and lead community outreach programs that promote lifelong learning and mental health awareness among
    students.
