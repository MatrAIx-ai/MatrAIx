  hobbies: '[''Painting'', ''Sketching'', ''Visiting art galleries'', ''Reading contemporary fiction'', ''Quilting'', ''Gardening'', ''Cooking'', ''Yoga'', ''Meditation'', ''Journaling'', ''Listening to
    folk/indie music'', ''Attending community theater'', ''Volunteering at local senior center arts program'', ''Participating in book club'']'
  career_goals: Amy aims to deepen her professional qualifications by earning a Certified Nursing Assistant (CNA) credential and enrolling in a part-time associate's program in health sciences. She is especially
    interested in specializing in dementia and memory-care, where she hopes to integrate art-therapy techniques she has informally used with clients. Over the next five years, she aspires to advance into
    a care coordinator or supervisory role within her agency, leveraging her organizational strengths and her knack for balancing structure with individualized flexibility. Long-term, Amy dreams of launching
    her own small home-care business that emphasizes holistic, creativity-focused services for seniors and individuals with disabilities, while also offering peer-support groups for caregivers. She also
    seeks professional development in trauma-informed care to better address the emotional distress she often encounters both in herself and in those she serves.
