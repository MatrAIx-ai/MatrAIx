  career_goals: Rebecca aims to advance within the hospitality field by earning a ServSafe certification and moving into a shift‑supervisor role that allows her to mentor junior staff while maintaining
    a flexible schedule. She also hopes to develop a small side venture—such as a weekend home‑baked goods stall at the local farmer’s market—leveraging her love of cooking and community spirit. Long‑term,
    she envisions a gradual transition to part‑time work, giving her more time to pursue personal interests and volunteer with local charitable organizations that provide meals to seniors.
