    User 1: That sounds fun! I''m more of a technical person. I like working with robots and building things.

    User 2: That''s cool too! I wish I was more technical.

    User 1: It''s not too hard to learn. You just have to be willing to put in the time.

    User 2: I''m sure I could do it. I''m just not sure if I''d be very good at it.

    User 1: You''d be surprised. I thought I was terrible at it when I first started, but now I''m pretty good at it.

    User 2: I''ll have to take your word for it.

