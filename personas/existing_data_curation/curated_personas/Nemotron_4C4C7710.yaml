personas:
  professional: Robert Lillie, a seasoned casino compliance specialist who transitioned from floor associate to compliance support, leverages his meticulous cash-handling, slot-machine maintenance, and
    procedural documentation skills alongside a structure-driven, competitively skeptical mindset to train staff, manage shift schedules, and produce detailed risk-assessment reports while quietly battling
    the pressure of regulatory oversight.
  sports: Robert Lillie follows the Detroit Lions and Michigan State Spartans, participates in a local adult basketball league at the Brighton YMCA, places modest wagers on games, and treats early-morning
    fishing trips as low-impact cardio while occasionally hitting the gym to counter workplace tension.
  arts: Robert Lillie channels creative energy into woodworking inspired by Scandinavian minimalism and Martha Stewart's craft tutorials, while also enjoying classic rock legends like Fleetwood Mac, attending
    occasional performances at the Brighton Arts Center, and finding solace in the narrative complexity of Agatha Christie mysteries.
  travel: Robert Lillie prefers meticulously planned road trips that intertwine fishing expeditions with cultural visits, having explored trout-rich streams in Michigan's Upper Peninsula, taken a weekend
    to Asheville's artisan scene, and now yearning for a guided fly-fishing adventure on New Zealand's South Island.
  culinary: Robert Lillie is a competent home cook who delights in grilling freshly caught lake trout with dill and lemon, crafting hearty vegetable stews from their raised-bed garden harvest, and savoring
    a perfectly seared ribeye steak finished with rosemary-infused butter.
  core: Robert Lillie balances a relentless craving for structure with a quiet rebellious streak, compulsively solving puzzles and double-checking every transaction in their head long after leaving work,
    while habitually pacing the kitchen at night to unwind.
background:
  cultural: Robert grew up in a middle‑class white family in the broader Detroit metro area, steeped in Midwestern values of hard work, reliability, and community involvement. His upbringing was rooted
    in a Protestant (Methodist) tradition, with regular church attendance and participation in church‑sponsored service projects. The cultural atmosphere emphasized modesty, practical problem‑solving, and
    a respect for rules—traits that align with his preference for structure. Living in Brighton, he enjoys local traditions such as the annual county fair, fish‑fry dinners, and supporting the Detroit Tigers.
    The region's strong automotive legacy and nearby lakes shape his appreciation for both industriousness and outdoor recreation, influencing his hobbies and his pragmatic outlook on life.
