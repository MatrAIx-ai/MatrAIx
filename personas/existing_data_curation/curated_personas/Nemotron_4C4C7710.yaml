  hobbies: '[''fishing'', ''woodworking'', ''chess'', ''puzzle solving'', ''sports betting'', ''gardening'', ''volunteering with community safety program'']'
  career_goals: The near‑term goal is to complete his bachelor's degree in business administration through night courses at a community college, while earning the Certified Gaming Compliance Professional
    (CGCP) credential. He aims to leverage his detail‑oriented background to become a floor supervisor within the next two years, overseeing a team of dealers and ensuring regulatory compliance on a larger
    scale. In the longer term, Robert aspires to transition into a compliance manager position with the Michigan Gaming Control Board or a major casino operator, where he can shape policy, mentor staff,
    and implement systematic improvements that reduce operational risk and enhance player safety. Achieving these milestones would provide a clear career progression, greater stability, and a work environment
    that aligns with his preference for structure while helping to mitigate the stress he experiences at work.
