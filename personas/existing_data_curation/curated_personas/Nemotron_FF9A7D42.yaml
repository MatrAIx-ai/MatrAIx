personas:
  professional: Jules Blue is a methodical, innovative chef who leverages advanced knife skills and rigorous food-safety protocols to run a high-volume, farm-to-table kitchen, and they channel their curiosity
    and competitive spirit into menu engineering that showcases Montana's bison, trout, and huckleberries while meticulously planning staff shifts and inventory.
  sports: Jules Blue is an avid outdoors enthusiast who spends weekends trail-hiking in the Rocky Mountains, fly-fishing on the Missouri River, and back-country skiing with the local Rocky Mountain Alpine
    Club, and they cheer for the Great Falls Voyagers baseball team in summer and the Denver Broncos in football, while maintaining a disciplined cross-country ski regimen each winter.
  arts: Jules Blue blends culinary creativity with visual art, routinely photographing plates and Montana landscapes in the style of Ansel Adams, crafting handcrafted wooden spoons inspired by Scandinavian
    folk design, and they unwind by listening to the folk-rock sounds of The Avett Brothers and the storytelling of actress Frances McDormand's films.
  travel: Jules Blue favors immersive road-trip adventures, having mapped a two-week culinary pilgrimage through the Pacific Northwest's oyster farms and Oregon's wine country, backpacked the trails of
    Banff National Park, and they keep a travel journal to plan future trips to Kyoto's markets for sushi inspiration and the Scottish Highlands for whisky tasting, balancing limited vacation time with
    a love for both rugged exploration and food-centric experiences.
  culinary: Jules Blue is a seasoned chef with advanced knife techniques who relishes fermenting sauerkraut and kombucha, perfects dishes like bison carpaccio with huckleberry reduction and trout almondine
    with wild herbs, and they host elaborate murder-mystery dinner parties where guests solve clues while sampling seasonal heirloom grain risottos, all while constantly experimenting with ingredients like
    maitake mushrooms, cedar plank, and locally sourced rattlesnake pepper.
  core: Jules Blue is a competitively curious chef who organizes everything from menus to finances with precision, yet occasionally lets perfectionism turn into late-night snack binges and a reluctance
    to delegate.
background:
  cultural: Jules grew up in a small‑town environment in the Mountain West, raised in a family with deep roots in agriculture and a practical, self‑reliant ethos characteristic of the American frontier.
    Her white, primarily German‑Scandinavian heritage blends with the regional culture of Great Falls, where community, outdoor life, and respect for the land are central values. She embraces the local
    culinary tradition of hearty, resourceful cooking while also drawing curiosity from world cuisines, creating a hybrid style that honors Montana’s indigenous ingredients and the broader, diverse food
    landscape.
attributes:
  skills: '[''Advanced knife skills'', ''Menu engineering'', ''Food safety (ServSafe) certification'', ''Inventory control & costing'', ''Seasonal ingredient sourcing'', ''Catering event planning'', ''Team
    leadership'', ''Recipe development'', ''Sustainable kitchen practices'', ''Culinary instruction'']'
  hobbies: '[''Hiking in the Rocky Mountains'', ''Fly fishing on the Missouri River'', ''Attending culinary festivals'', ''Home fermentation experiments'', ''Hosting dinner parties'', ''Participating in
    local cooking competitions'', ''Landscape and food photography'', ''DIY woodworking for kitchen tools'']'
  career_goals: In the next two years Jules aims to earn her Certified Executive Chef credential and move into a chef‑de‑cuisine role at a farm‑to‑table restaurant in Great Falls, where she can deepen the
    use of locally sourced produce. Her mid‑term ambition is to open a boutique restaurant that blends contemporary Western cuisine with the culinary traditions of the American West, featuring a seasonal
    menu and a small‑scale cooking school. She also plans to compete in regional cooking contests, publish a cookbook highlighting Montana‑inspired recipes, and become a recognized community food leader
    who promotes sustainable sourcing and culinary education.
