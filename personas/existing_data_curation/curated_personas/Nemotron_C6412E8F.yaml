  career_goals: Approaching retirement, Ingrid aims to leverage her organizational expertise to mentor younger administrative staff and ensure a seamless handover of institutional knowledge before she steps
    back. She is interested in obtaining a short‑term certification in office management to formalize her experience, and she hopes to transition into a part‑time advisory role where she can support local
    nonprofits with their administrative needs. Ingrid also envisions volunteering as a coordinator for community events at the Hunt senior center, using her event‑planning skills to create harmonious gatherings
    that respect both tradition and practical constraints.
