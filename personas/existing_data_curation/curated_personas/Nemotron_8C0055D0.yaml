  hobbies: '[''Gardening'', ''Jigsaw Puzzle Solving'', ''Historical Non‑Fiction Reading'', ''Nature Walks'', ''Yoga'', ''Volunteer at Local Library'', ''Adult Literacy Program'', ''Small‑Group Book Club'',
