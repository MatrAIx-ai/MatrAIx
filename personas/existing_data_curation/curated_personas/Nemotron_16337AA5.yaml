  career_goals: Although retired, Francis aims to channel his competitive spirit into community projects and personal mastery. He plans to organize a local exhibition showcasing historic oil‑region folk
    art and his own watercolor paintings, hoping to win a regional heritage award. He also aspires to write a memoir that documents his family's generational story and the transformation of Clarion County,
    and to mentor a younger neighbor in woodworking techniques. Continuing to expand his knowledge of digital tools for preserving photographs and records remains a key ambition.
