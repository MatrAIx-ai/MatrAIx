personas:
  professional: Georgie Eller, a seasoned administrative specialist with a knack for precise record‑keeping and calm conflict resolution, leverages their curiosity and practicality to streamline front‑desk
    operations while fostering a collaborative office culture.
  sports: Georgie Eller energizes mornings with the Ashland Trail Runners, joins a weekly historic‑neighborhood run, cheers the Boston Red Sox in summer and the New England Patriots in fall, and embraces
    seasonal cross‑country skiing to stay fit.
  arts: Georgie Eller cultivates a love for storytelling through the local community theater where they perform in adaptations of Arthur Miller, devours contemporary novels by Sally Rooney in the women's
    book club, and finds solace in the folk melodies of Brandi Carlile during yoga.
  travel: Georgie Eller prefers carefully planned weekend getaways to New England gems like Cape Cod and Acadia National Park, while dreaming of a spring pilgrimage to the historic streets of Kyoto, balancing
    a modest travel budget with the desire for cultural immersion.
  culinary: Georgie Eller enjoys baking seasonal apple crisp and rosemary‑infused focaccia using herbs from their backyard garden, wields an intermediate cooking skill set to craft farm‑to‑table meals,
    yet occasionally succumbs to late‑night orders of spicy ramen for convenience.
  core: Georgie Eller is an organized, sociable 47‑year‑old who channels curiosity into community service, but habitually hoards receipt piles while secretly binge‑reading mystery novels at midnight.
background:
  cultural: Georgie is a white American with deep New England roots; her family background includes Irish and English ancestry passed down through several generations. Raised in a close‑knit suburban community,
    she internalized values of self‑reliance, civic participation, and a strong work ethic. Seasonal traditions such as Thanksgiving gatherings, local Fourth of July parades, and town meetings have shaped
    her sense of belonging. While her religious upbringing was modestly Protestant, she now identifies more with community‑based cultural practices, celebrating regional holidays, supporting local arts,
    and maintaining a connection to the historical heritage of Middlesex County.
attributes:
  skills: '[''Customer Service'', ''Phone Etiquette'', ''Office Administration'', ''Data Entry'', ''Scheduling'', ''Microsoft Office Suite'', ''Google Workspace'', ''Conflict Resolution'', ''Multitasking'',
