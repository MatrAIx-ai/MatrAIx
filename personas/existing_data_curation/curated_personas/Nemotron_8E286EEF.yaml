  hobbies: '[''Hiking'', ''Book Club'', ''Volunteering'', ''Gardening'', ''Baking'', ''Yoga'', ''Community Theater'', ''Crafting (Knitting/Quilting)'', ''Running Club'', ''Local History Exploration'']'
  career_goals: Georgie aims to leverage her experience into a supervisory role, such as Office Manager or Community Liaison, within the next three to five years. She plans to complete a Certified Administrative
    Professional (CAP) credential and enroll in an associate‑degree program in Business Administration to strengthen her leadership and strategic planning skills. Her ambition includes mentoring junior
    staff, championing the integration of new digital tools to improve office efficiency, and eventually consulting part‑time for small businesses in the Ashland area, providing expert administrative support
    while achieving greater financial independence after her separation.
