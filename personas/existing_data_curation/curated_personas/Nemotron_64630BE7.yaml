personas:
  professional: Taylor Gagliani, an aspiring junior architect in the making, spends afternoons sketching imaginative houses and bridges with crayons, channeling their curiosity for abstract concepts into
    organized yet whimsical designs they proudly display at the community art workshop.
  sports: Taylor Gagliani, an enthusiastic member of the Hobart Tots soccer club who also loves cheering for the Indianapolis Colts and the Indiana Pacers, spends weekends darting across the park for a
    game of tag, balancing their love of structured team practice with spontaneous backyard obstacle courses that keep them fit and giggling.
  arts: Taylor Gagliani, a prolific little artist who crafts glitter-laden collages, builds LEGO towns, and recreates scenes from Studio Ghibli's 'My Neighbor Totoro' while humming the soundtrack of Disney's
    'Frozen', draws inspiration from Dr. Seuss books and the whimsical paintings of Mary Blair, and eagerly attends community art workshops where they share their vivid imagination with peers.
  travel: Taylor Gagliani, a curious traveler who loves day-tripping to the Indiana Dunes, exploring the nearby state park's sand dunes and lake shoreline, and dreams of seeing the geysers of Yellowstone
    and the lights of Disney World, prefers spontaneous backyard camping over rigid itineraries, and often packs a small backpack with crayons, a magnifying glass, and a sturdy water bottle for the adventure.
  culinary: Taylor Gagliani, a budding kitchen helper who adores mac and cheese with crunchy breadcrumbs, peanut butter-banana sandwiches, and Grandma's apple pie, enjoys sprinkling edible glitter on cupcakes,
    can reliably whisk cereal into a bowl without spilling, and eagerly tastes new flavors like sweet potato fries while insisting on a side of ketchup.
  core: Taylor Gagliani is a six-year-old dreamer who blends meticulous glitter-craft routines with spontaneous backyard expeditions, often forgetting to clean up but always leaving a trail of colorful
    imagination wherever they go.
background:
  cultural: Taylor is raised in Hobart, Indiana, a small Midwestern town in Lake County. Her family practices typical American traditions such as celebrating Thanksgiving, Christmas, and the Fourth of July,
    and they often attend community events like the local county fair and library story hours. The Midwest’s emphasis on friendliness, practicality, and community service shapes her upbringing. She attends
    a neighborhood elementary school where she learns about local history and values cooperation. Outdoor activities like visiting nearby parks, fishing, and hiking are common family pastimes, reinforcing
    a connection to nature and a culture of modesty, kindness, and respect for others.
