  career_goals: Taylor dreams of becoming an artist who can paint magical worlds, a scientist who discovers how things work, an author of whimsical stories, an astronaut who travels to space, a teacher
    who helps friends learn, or a veterinarian who cares for animals. Her ambitions are driven by her love of novelty, abstract ideas, and a desire to keep exploring and creating.
