personas:
  professional: Andrew Diaz, a seasoned nursing assistant with over three decades of direct patient care, combines meticulous vital‑sign monitoring, expert infection‑control protocols, and a competitive
    drive that pushes them to exceed performance metrics and mentor new aides, even as they prefer flexibility over strict planning and sometimes shift schedules at the last minute.
  sports: Andrew Diaz stays fit through weekend hikes along the Crystal Cove coastal trail, plays in the Orange County Silver Hoops recreational basketball league, and passionately follows the Los Angeles
    Lakers and San Diego Padres, while they also join a community softball team each summer.
  arts: Andrew Diaz finds creative release in classic rock, regularly playing Led Zeppelin and Fleetwood Mac vinyls while cooking, and immerses themselves in the local arts scene by attending productions
    at the Orange County Performing Arts Center, collecting strategy board games like Twilight Struggle, and enjoying mariachi music at neighborhood festivals.
  travel: Andrew Diaz prefers a blend of adventure and relaxation, planning road trips along the Pacific Coast Highway to Big Sur and Santa Barbara, dreaming of a culinary tour of Oaxaca’s markets, and
    using credit‑card travel points to offset costs while balancing family duties and a modest retirement budget.
  culinary: Andrew Diaz’s culinary passion shines in the kitchen where they expertly prepare chicken enchiladas with homemade salsa verde, carne asada tacos topped with fresh cilantro and jalapeños from
    their backyard garden, and occasional grilled barbecue ribs, all while listening to classic rock and savoring a cold craft beer.
  core: Andrew Diaz is a 57‑year‑old nursing assistant whose competitive streak, love for Mexican‑spiced family meals, and anxiety‑driven mindfulness practice intersect with a habit of occasional schedule
    disarray, and they maintain a relentless drive to mentor younger staff.
background:
  cultural: Andrew grew up in Southern California in a working‑class family of European descent, with a surname that reflects Mexican heritage. While he identifies as white and was raised with Anglo‑American
    values, the diverse cultural tapestry of Orange County has influenced his appreciation for Latino food, music, and community gatherings. His upbringing emphasized hard work, family loyalty, and community
    involvement, shaping his sociable yet pragmatic outlook.
attributes:
  skills: '[''vital signs assessment'', ''basic wound care assistance'', ''medical documentation'', ''infection control'', ''geriatric patient support'', ''patient communication'', ''de‑escalation techniques'',
