  hobbies: '[''coastal hiking'', ''recreational basketball'', ''senior center volunteering'', ''cooking Mexican‑inspired meals'', ''listening to classic rock'', ''mindfulness meditation'', ''journaling'',
    ''board‑game club'', ''gardening'']'
  career_goals: He aims to obtain a Certified Nursing Assistant (CNA) credential and eventually transition to a Licensed Practical Nurse (LPN) role, leveraging the college coursework he has begun. Andrew
    also hopes to move into a supervisory or shift‑lead position where he can mentor younger staff and influence care protocols. Long‑term, he envisions starting a small home‑health agency that provides
    reliable, structured care for seniors in Orange County, balancing his desire for predictability with the flexibility needed for his family.
