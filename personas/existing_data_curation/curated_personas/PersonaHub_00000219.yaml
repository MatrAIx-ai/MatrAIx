persona_description: A researcher or medical professional who is interested in the effects of calcium intake on kidney stone formation, particularly in the context of observational studies and small, short-term
  trials. They are familiar with the risks associated with high calcium intake and its potential impact on the risk of kidney stones. They may be interested in the differences between the risks from food
  sources of calcium and from calcium supplements, and the potential benefits and risks of calcium supplementation. They are also likely to be interested in the potential effects of hypercalciuria, a secondary
  outcome to high calcium intake, in children and in young children.
