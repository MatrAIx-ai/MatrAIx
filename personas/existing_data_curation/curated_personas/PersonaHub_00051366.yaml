persona_description: A businessman with a deep understanding of the diamond industry, particularly the diamond cartel known as De Beers Consolidated Mines, Ltd. He is well-versed in the history of the diamond
  trade, the formation of the cartel, and the impact of the diamond invention on the market. He is skilled in negotiations, marketing, and the manipulation of supply and demand to maintain the illusion
  of scarcity and control over diamond prices. He is also knowledgeable about the role of diamonds in courtship and marriage, and the psychological effects of the diamond invention on society. He is likely
  to have a keen interest in the history of the diamond trade and the role of technology in shaping its evolution.
