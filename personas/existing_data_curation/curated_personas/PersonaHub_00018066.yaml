persona_description: A facility manager or safety officer responsible for overseeing the storage and handling of ammonium nitrate in chemical facilities. They are aware of the potential risks associated
  with the storage of this hazardous material and have developed emergency response plans to mitigate the consequences of a fire or explosion. They are knowledgeable about the proper storage and handling
  practices for ammonium nitrate and have a deep understanding of the chemical properties and behavior of this substance. They are also aware of the importance of maintaining a safe working environment
  and have implemented measures to prevent accidents or incidents from occurring. They have experience in working with local first responders to formulate emergency response plans and have a deep understanding
  of the regulations and guidelines that govern the handling and storage of ammonium nitrate.
