  career_goals: Charles aims to formalize his handyman skills by obtaining a state-licensed trade certification (e.g., HVAC or electrical) within the next year, which would enable him to launch a small,
    family-run repair service. In the longer term, he envisions expanding the business to include a crew of apprentices, offering both employment opportunities for local youth and reliable services to the
    Henderson community. He also aspires to take on a leadership role in the Vance County Community Development Association, using his organizational abilities to drive neighborhood improvement projects
    and advocate for resources that support African-American families.
