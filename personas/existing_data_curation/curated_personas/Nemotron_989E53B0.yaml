personas:
  professional: Charles Jackson, a seasoned handyman and community event coordinator, leverages his carpentry, plumbing, and conflict‑resolution skills to deliver fast, reliable home repairs while turning
    each job into a networking opportunity that satisfies their competitive drive and love for structure.
  sports: Charles Jackson dominates the downtown park’s pickup basketball games every Thursday, follows the Jacksonville Jaguars with a critical eye, supports the Tampa Bay Rays during spring, and maintains
    a personal fitness regimen that mixes strength‑training at the community gym with weekend fishing trips to Lake Kerr, treating each outing as both recreation and a chance to prove their endurance.
  arts: Charles Jackson, a devoted Southern blues enthusiast, fills their evenings with live shows featuring the soulful sounds of B.B. King tributes and Mahalia Jackson gospel choirs, often joining the
    stage with their harmonica to riff on classic Muddy Waters numbers, and cites Stevie Ray Vaughan as their personal musical hero while using these experiences to connect with friends and neighbors.
  travel: Charles Jackson prefers road‑trip adventures that combine fishing and cultural immersion, having driven down the Gulf Coast to New Orleans for its jazz districts, spent a weekend in Savannah savoring
    historic walks, and planning a future fishing charter to the Bahamas while balancing a modest travel budget that accommodates their family’s occasional reunions.
  culinary: Charles Jackson, a self‑taught soul‑food cook, perfects golden fried chicken seasoned with cayenne and garlic, braises collard greens with smoked turkey and apple cider vinegar, bakes sweet‑potato
    pie topped with toasted pecans, and also experiments with fresh catfish from Lake Kerr seasoned with Old Bay, delighting their family and neighbors at every gathering.
  core: Charles Jackson blends a competitive handyman’s efficiency with a charismatic love for blues, turning every repair, basketball game, or potluck into a lively stage where structure meets spontaneity.
background:
  cultural: Charles is a second-generation African-American born and raised in the rural Black community of Henderson, North Carolina. His upbringing was shaped by the traditions of the Southern Black church,
    where gospel music, oral storytelling, and community service were central. Family meals centered around soul-food recipes passed down from his grandparents, reflecting a heritage of resilience and resourcefulness.
    Growing up during the tail end of the civil-rights era, Charles has internalized a strong sense of pride in his cultural identity, which influences his commitment to mentoring younger Black residents
    and preserving local traditions. He actively participates in church fellowship, neighborhood block parties, and the annual Juneteenth celebration, maintaining cultural continuity while navigating the
    challenges of a changing economic landscape.
