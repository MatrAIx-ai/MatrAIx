  career_goals: Although retired, Marcela aims to deepen her impact within the Jane Lew community. She hopes to lead a senior outreach program that pairs retirees with young families for skill exchange,
    organize an annual heritage food festival showcasing Appalachian recipes, and author a memoir of local history and family stories. She also aspires to become proficient with smartphones and social media
    to document community events, and to compete in regional bridge tournaments, possibly achieving a senior master rank. Ultimately, her ambition is to stay socially active, maintain health, and leave
    a lasting legacy of community connection and cultural preservation.
