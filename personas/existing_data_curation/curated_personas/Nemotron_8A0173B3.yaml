personas:
  professional: Marcela Hickey is a retired community organizer who leverages their practical home‑management expertise, charismatic people‑skills, and competitive drive to coordinate senior outreach programs,
    a heritage food festival, and bridge tournaments, and they maintain a relaxed, sometimes disorganized planning style that keeps events flexible.
  sports: Marcela Hickey enjoys low‑impact fitness through weekly walks along the Appalachian Trail, cheers on the West Virginia Mountaineers football and the Pittsburgh Steelers, and they participate in
    the Jane Lew Senior Softball Club’s spring league, preferring gentle competition over intense training.
  arts: Marcela Hickey immerses themselves in the choir’s renditions of Mahalia Jackson and folk tunes by Doc Watson, draws inspiration from Ansel Adams’s black‑and‑white Appalachian photography for their
    own digital snapshots, and they find creative solace in pottery classes modeled after the studio of renowned ceramist Bernard Leach.
  travel: Marcela Hickey prefers spontaneous, budget‑friendly road trips that blend scenic drives along the Blue Ridge Parkway, weekend stays in Charleston WV, and a recent pilgrimage to Dublin, Ireland
    for genealogical research, while they dream of a future pilgrimage to the Cliffs of Moher and always plan a flexible itinerary rather than rigid bookings.
  culinary: Marcela Hickey expertly prepares Appalachian staples such as smoked pork shoulder with apple‑cider glaze, collard greens simmered with smoked ham hocks, buttery corn‑meal cornbread, and homemade
    apple butter, while they often experiment with local herbs like sage and thyme and share their dishes at community potlucks.
  core: Marcela Hickey is a community‑centric, competitively spirited septuagenarian who balances a love for spontaneous social gatherings with a relaxed, occasionally chaotic approach to planning, and
    they never miss a bridge game or birdwatching session.
background:
  cultural: Marcela’s cultural background is rooted in the Appalachian traditions of central West Virginia. Raised in a white, rural household, she grew up with a strong emphasis on self‑reliance, hospitality,
    and community solidarity. Family gatherings often featured home‑cooked meals like pepperoni rolls and sourdough cornbread, and music ranging from bluegrass to gospel hymns. The local church has been
    a central social hub, and she carries forward the region’s storytelling heritage by sharing family histories and local legends. While she respects long‑standing customs, her curiosity also drives her
    to explore modern adaptations, such as using technology to connect with distant relatives and preserving regional recipes in a digital archive.
