  career_goals: Linzi aspires to combine her curiosity about science with her practical love of the outdoors by pursuing a career in environmental science or wildlife conservation. She aims to attend a
    strong STEM-focused high school, earn scholarships, join an ecology or robotics club, and eventually study environmental engineering in college. In the longer term, she hopes to launch a community garden
    initiative in Silas that teaches sustainable practices to neighbors and promotes local food security.
