personas:
  professional: Linzi Hochstetler, a budding coder who creates simple interactive games on Scratch, blends their curious love of sci‑fi worlds with a practical eye for clean code and uses their organized
    notebook to sketch game concepts before turning them into functional prototypes, all while quietly collaborating with a small circle of friends and confidently presenting ideas when needed.
  sports: Linzi Hochstetler, an avid hiker who joins the Silas Sprouts youth soccer club for weekend matches and cheers on the Seattle Seahawks during game nights, prefers solitary trail runs with a sketchbook
    in a backpack to stay fit, while still valuing the camaraderie of small‑team practices.
  arts: Linzi Hochstetler, a quiet musician who strums acoustic versions of Bob Dylan and Joni Mitchell at dusk while sketching misty forest scenes inspired by the works of John Muir and fills their spare
    time with reading the imaginative worlds of Octavia Butler and Arthur C. Clarke, allowing their artistic side to weave together music, visual art, and speculative literature.
  travel: Linzi Hochstetler, who prefers low‑key weekend camping trips to nearby state parks like the Whispering Pines Reserve and has already explored Yellowstone National Park with their family, dreams
    of trekking the Amazon rainforest one day, always planning routes and sketching potential birdwatching spots while staying within their modest family travel budget.
  culinary: Linzi Hochstetler, a budding home chef who delights in tossing fresh garden tomatoes, crisp cucumbers, and basil into a simple caprese salad and whipping up carrot‑ginger soup using home‑grown
    carrots, often snacks on apple slices while practicing chord progressions on their guitar, and occasionally experiments with making homemade pesto for spaghetti.
  core: Linzi Hochstetler, a curious yet practical 12‑year‑old who balances solitary creativity with small‑group collaboration, meticulously organizes their hobbies from coding to gardening, and quietly
    navigates daily life with steady emotional composure and a sprinkle of end‑of‑day guitar strums.
background:
  cultural: Linzi grew up in Silas, a close‑knit rural community in Choctaw County, Alabama. The town’s Southern heritage emphasizes family, church involvement, hospitality, and a deep connection to the
    land. Local traditions such as county fairs, church picnics, and seasonal planting cycles have shaped her appreciation for community and nature. While the area is predominantly white, the region’s history
    includes Choctaw influences, which Linzi encounters through school projects and community storytelling, giving her a broader sense of the cultural tapestry of her hometown.
