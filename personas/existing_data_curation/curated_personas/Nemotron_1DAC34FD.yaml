  career_goals: Monica aims to transition into a senior engineering role where she can lead cross‑functional teams in delivering innovative web experiences that blend technology with art. Over the next
    five years she plans to become a lead full‑stack architect, mentor junior developers, and spearhead projects for cultural institutions and creative startups that require immersive, interactive interfaces.
    She also aspires to speak at industry conferences about inclusive design, contribute to open‑source creative‑coding libraries, and eventually launch her own boutique agency that partners with visual
    artists to produce site‑wide installations and digital storytelling platforms.
