personas:
  professional: Rosalina Santos, a bilingual inventory control specialist certified to operate forklifts, blends meticulous time‑management with creative storage layout designs, using their curiosity and
    calm under pressure to mentor new hires and push Lean Six Sigma improvements toward a shift‑supervisor role.
  sports: Rosalina Santos cheers for the New York Yankees, participates in a local co‑ed recreational soccer league, and incorporates salsa dancing at a downtown Latin club into their weekly cardio routine,
    treating fitness as a social outing that balances competitive spirit with community connection.
  arts: Rosalina Santos paints vivid watercolors inspired by Newark’s street murals, frequents gallery openings featuring artists like Kehinde Wiley, enjoys live performances by Celia Cruz tribute bands,
    and volunteers at cultural festivals, letting their love of color and rhythm shape both their leisure and community engagement.
  travel: Rosalina Santos prefers spontaneous weekend road trips to nearby art‑laden towns such as Philadelphia’s Mural Arts district and the Hamptons, has taken a longer journey to San Juan for family
    reunions, and dreams of exploring Barcelona’s vibrant street art scene, planning trips with friends while balancing budget constraints and a desire for cultural immersion.
  culinary: Rosalina Santos cooks arroz con gandules, mofongo, and pastelón for family gatherings, infuses each dish with homemade sofrito, adobo, and ripe plantains, while also experimenting with ramen
    broth and homemade tiraditos, showing an intermediate skill level that sometimes leads to over‑seasoning when excitement peaks.
  core: Rosalina Santos is a sociable, detail‑oriented warehouse pro who blends creativity with efficiency, invests wisely yet splurges on art, manages health with yoga, stays active through dance and sport,
    and channels cultural passion into cooking and community art ventures.
background:
  cultural: Rosalina is a first‑generation Puerto Rican American who grew up in a bilingual household in Passaic, where a vibrant Caribbean community preserves traditions of music, dance, and cuisine. Her
    family celebrates holidays such as Three Kings Day and Fiesta de San Juan, and the aromas of arroz con gandules and mofongo fill family gatherings. She maintains strong ties to her heritage through
    Spanish language, regular visits to local Puerto Rican churches, and participation in diaspora events that emphasize family solidarity, communal support, and pride in island culture.
attributes:
  skills: '["Inventory Management", "Order Fulfillment", "Forklift Operation (Certified)", "Warehouse Management Software", "Bilingual Communication (Spanish/English)", "Team Training & Onboarding", "Problem
    Solving under Pressure", "Safety Protocol Compliance", "Space Optimization", "Time Management"]'
  hobbies: '["Salsa and Bomba dancing", "Watercolor painting", "Cooking Puerto Rican cuisine", "Visiting art galleries and street murals", "Volunteering at cultural festivals", "Attending live music performances",
    "Reading about contemporary art and design", "Yoga and mindfulness practice", "Organizing neighborhood potluck gatherings"]'
  career_goals: Short‑term, Rosalina aims to earn a shift‑supervisor role at her current distribution center, complete a GED, and pursue a Lean Six Sigma Yellow Belt to sharpen her process‑improvement skills.
    Over the next five years she plans to transition into a warehouse manager position, overseeing a team while introducing tech‑driven efficiencies. Long‑term, she dreams of opening a community‑focused
    boutique that showcases Puerto Rican artists and sells handcrafted goods, merging her love of art, culture, and entrepreneurship.
