persona_description: A scientist who specializes in the study of natural materials and their applications in oil spill cleanup, particularly focusing on the use of low-grade cotton as a crude oil sorbent.
  This scientist has conducted research at the Nonwovens and Advanced Materials Laboratory at Texas Tech's Institute of Environmental and Human Health (TIEHH) and has published findings in the American
  Chemical Society journal Industrial & Engineering Chemistry Research. This scientist is supported in part by Cotton Incorporated and has found that low-micronaire cotton, which is the least valuable cotton,
  can absorb as much crude oil as it does, making it an excellent tool for cleanup of shorelines, animals, and ecologically sensitive areas.
