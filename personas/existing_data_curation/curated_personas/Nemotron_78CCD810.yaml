  career_goals: Although no longer in formal employment, Mary aims to leave a lasting impact on her community by establishing a sustainable intergenerational art program that pairs senior artists with local
    school students. She hopes to secure a regional arts grant to fund traveling exhibitions of senior‑created artwork and to publish a memoir that chronicles the cultural evolution of Rockport’s waterfront.
    Mary also aspires to mentor emerging volunteers, to serve on the town’s historic preservation board, and to champion mental‑health initiatives that address the stress and anxiety she knows can affect
    older adults.
