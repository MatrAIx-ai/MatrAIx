  career_goals: Although retired from formal employment, Christian aims to stay active by volunteering as a community event coordinator at the local senior center, running DIY workshops for neighbors, and
    mentoring younger volunteers. He hopes to document his family’s genealogical history in a small booklet, restore a vintage 1965 Ford Mustang with his wife, and take occasional road trips across Michigan
    to visit historic sites and family gatherings.
