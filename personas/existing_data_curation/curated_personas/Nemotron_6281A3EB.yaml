personas:
  professional: Angelica Lafortune, a 32‑year‑old information security architect, blends a highly organized, detail‑oriented mindset with strong business acumen to design and implement structured security
    programs, conduct thorough risk assessments, and translate complex technical risks into clear executive strategies, while their assertive yet cooperative communication style bridges technical teams
    and senior leadership.
  sports: Angelica Lafortune starts each day with a sunrise jog along Rock Creek Park, attends bi‑weekly yoga classes, follows Washington, D.C.’s Capitals, Wizards, and DC United, and stays motivated by
    participating in the DC Road Runners club’s monthly long‑distance runs.
  arts: Angelica Lafortune spends weekends at Smithsonian exhibitions, draws creative energy from the works of Basquiat, O'Keeffe, and contemporary muralist Maya Hayuk, and sets the mood for cooking with
    the jazz tones of Kamasi Washington and classic Motown melodies from Diana Ross.
  travel: Angelica Lafortune crafts travel itineraries after meticulous research, having visited cultural heritage sites like Savannah’s historic district and St. Augustine’s colonial forts, while aspiring
    to explore the Inca ruins of Machu Picchu and the bustling souks of Marrakech for an immersive culinary adventure.
  culinary: Angelica Lafortune, an intermediate home chef, reimagines classic soul food by adding global twists such as smoked paprika‑infused collard greens quinoa bowls, chipotle crema‑topped sweet potato
    black‑bean enchiladas, and shrimp gumbo seasoned with ginger and lemongrass, and never misses their Saturday Ethiopian coffee ceremony.
  core: Angelica Lafortune is a disciplined security professional who balances relentless productivity with early‑morning runs, yoga, and inventive cooking, yet sometimes over‑schedules their day, leaving
    little margin for spontaneous downtime.
background:
  cultural: Angelica was raised in Washington, DC, in a close‑knit Black family with Haitian roots. Her parents emphasized the value of education, community service, and cultural pride. Growing up, she
    participated in local African American cultural festivals, church gatherings, and community outreach events, which instilled a strong sense of collective responsibility. She maintains ties to the Haitian
    diaspora through family traditions, language, and culinary practices, and she actively engages with Black professional networks such as Black Women in Cybersecurity to support diversity in her field.
attributes:
  skills: '[''Risk Assessment'', ''Security Policy Development'', ''Incident Response'', ''Vulnerability Management'', ''Compliance (NIST, ISO 27001, HIPAA, GDPR)'', ''Security Awareness Training'', ''SIEM
    Operations (Splunk, QRadar)'', ''Threat Intelligence Analysis'', ''Network Security Fundamentals'', ''Data Privacy Management'', ''Project Management (Agile, Waterfall)'', ''Stakeholder Communication'',
    ''Vendor Risk Management'', ''Business Continuity Planning'']'
  hobbies: '[''Morning jogs in Rock Creek Park'', ''Yoga and mindfulness practice'', ''Reading non-fiction (history, business strategy)'', ''Cooking soulful cuisine with a modern twist'', ''Volunteering
    for STEM mentorship programs for Black youth'', ''Traveling to explore cultural heritage sites'', ''Playing strategy board games'', ''Visiting art exhibitions at the Smithsonian'']'
  career_goals: Angelica aims to advance to a senior security architect role within the next three years, followed by a strategic path toward becoming a Chief Information Security Officer. She plans to
    earn CISSP, CISM, and CISA certifications to deepen her expertise and credibility. Her long‑term ambition is to lead an enterprise‑wide security governance program that integrates risk management with
    business strategy, while championing diversity and mentorship initiatives that increase representation of Black women in cybersecurity. She also hopes to influence public‑policy discussions on data
    privacy and cyber resilience at the federal level.
