persona_description: A Māori language user who has reached level 5 of the Five-level Proficiency Framework. The user is a skilled and proficient speaker of Māori, able to communicate easily, confidently,
  and spontaneously in almost all everyday situations. They have a good command of grammar, vocabulary, and idiomatic language, enabling them to interact in a sustained manner, rarely having to switch to
  English or use English terms. The user is familiar with many dialectal variations and can participate appropriately and effectively in interactions with other very competent users of Māori. They are able
  to communicate in Māori effectively in the workplace for many tasks and discuss issues related to their own field of specialisation. The user can communicate effectively in many formal and informal situations,
  but at times they have to use simple language to convey their thoughts. The user makes very few errors and can usually make themselves understood.
