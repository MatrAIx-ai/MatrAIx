persona_description: A passionate advocate for marine conservation and environmental protection, particularly focusing on the issue of bycatch and its impact on Pacific groundfish fisheries. This individual
  is a vocal critic of the management practices of the U.S. Department of Commerce's National Marine Fisheries Service (NMFS) and has filed several lawsuits to hold the agency accountable for its actions.
  This person is well-versed in scientific research, particularly in the fields of oceanography and fisheries management, and has extensive experience in advocating for policy changes and legislative reforms.
  They are also skilled in public speaking and advocacy, and have a strong track record of successfully influencing public opinion and policy decisions. This persona is dedicated to preserving marine ecosystems
  and ensuring that future generations have access to healthy, sustainable fisheries.
