personas:
  professional: Lindsey Koch, a rural social worker with a flair for arts‑based interventions, leverages case assessment, crisis intervention, and grant writing while injecting mixed‑media collage into
    group counseling to keep clients engaged and drives herself to exceed performance metrics in hopes of leading a multidisciplinary team.
  sports: Lindsey Koch, a member of the Flathead Trail Runners club, tackles seasonal 10‑km trail‑run challenges, cheers on the Missoula Osprey baseball team, and mixes in weekend yoga sessions to balance
    the competitive edge with mindful recovery.
  arts: Lindsey Koch, an active participant in the Kalispell Art Walk, frequently creates mixed‑media collages inspired by the surrealism of Mark Rothko and the experimental sounds of Björk, attends productions
    by the local Experimental Theatre Company, and reads speculative fiction by N.K. Jemisin and Ted Chiang for creative fuel.
  travel: Lindsey Koch prefers spontaneous road trips, often mapping routes on the fly, has explored the rugged coast of Iceland and the tranquil temples of Kyoto, but tends to postpone booking flights
    for distant journeys until the last minute due to their relaxed stance on obligations.
  culinary: Lindsey Koch, an enthusiastic home cook, blends garden‑fresh heirloom tomatoes, wild mushrooms, and locally caught trout into dishes like lemon‑dill grilled trout and wild mushroom risotto,
    enjoys experimenting with new flavor combos but sometimes forgets to season properly and relies on friends for occasional tasting feedback.
  core: Lindsey Koch is a fiercely curious, arts‑infused social worker who channels a competitive spark into community advocacy while juggling a love of spontaneous adventure and a habit of letting deadlines
    slip.
background:
  cultural: Lindsey is a second‑generation white American raised on a small family farm in the Midwest before relocating to Arlee, Montana. Her upbringing emphasized self‑reliance, community service, and
    a strong work ethic rooted in rural values. Living on the edge of the Flathead Indian Reservation, she has developed a respectful awareness of Blackfeet and Salish cultural traditions, regularly attending
    tribal powwows and learning about indigenous approaches to healing. Her cultural identity blends Midwestern modesty with a Montana love of the outdoors, and she actively seeks to integrate diverse cultural
    perspectives—particularly Indigenous and artistic ones—into her social‑work practice.
attributes:
  skills: '[''Case assessment'', ''Crisis intervention'', ''Family and child counseling'', ''Arts‑based therapeutic techniques'', ''Community resource navigation'', ''Advocacy and grant writing'', ''Program
    development'', ''Conflict resolution'', ''Documentation and reporting'', ''Cultural competency'', ''Evidence‑based program evaluation'']'
  hobbies: '[''Hiking'', ''Landscape photography'', ''Watercolor painting'', ''Mixed‑media collage'', ''Attending gallery openings'', ''Experimental theater'', ''Reading speculative fiction'', ''Yoga'',
    ''Gardening'', ''Trail running'', ''Board games (e.g., Settlers of Catan)'', ''Volunteering at youth art program'']'
  career_goals: In the next five years, Lindsey plans to earn a Bachelor of Social Work (BSW) and achieve LCSW licensure, enabling her to provide clinical services and supervise a multidisciplinary team.
    She aspires to design a county‑wide, arts‑integrated mental‑health program for at‑risk youth, secure sustainable funding, and become a recognized leader in innovative rural social‑work practice. Long‑term,
    she envisions influencing state policy to improve resource allocation for families on the Flathead reservation and beyond, while also pursuing opportunities to teach workshops on creative therapeutic
    methods.
