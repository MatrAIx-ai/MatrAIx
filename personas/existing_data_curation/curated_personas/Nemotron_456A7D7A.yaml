  career_goals: Kenneth imagines a future where he can explore space as an astronaut, create new gadgets as an inventor‑engineer, and lead his soccer team as captain. He wants to build things that help
    his friends, such as a simple robot or an elaborate fort, and someday become a teacher who shares his love of discovery with other kids. His ambition blends his curiosity about how things work with
    his practical talent for building, all while staying part of a team that works together.
