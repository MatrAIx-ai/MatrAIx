  career_goals: Martin aims to enroll in a community college program in network administration or information technology, with the short‑term goal of securing an entry‑level IT support position at a local
    business where he can apply his structured problem‑solving approach and reliable service mindset. Over the next five years, he plans to obtain industry certifications such as CompTIA A+ and Network+,
    and eventually transition into a cybersecurity analyst role that offers clear protocols and defined responsibilities. He is also interested in exploring a parallel path in logistics coordination, leveraging
    his organizational strengths to manage supply‑chain operations for a regional retailer. Throughout his career, Martin seeks stable, predictable work environments that value teamwork, reliability, and
    continuous skill development.
