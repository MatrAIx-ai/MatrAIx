personas:
  professional: Maulene Kelley is a biomedical engineering graduate who leverages their expertise in cell culture, PCR, and statistical programming (Python, R, Tableau) to transform complex data into clear
    visual narratives, thriving as the charismatic coordinator of multi‑disciplinary research teams where their love for structure and knack for engaging audiences keep projects on track and stakeholders
    invested.
  sports: Maulene Kelley channels their kinetic energy into weekly ballroom and swing dance sessions with the Southern Swing Society, bleeds orange for the New Orleans Saints in fall and supports the Pelicans
    on winter nights, and they keep their fitness routine anchored by Saturday morning yoga at Eclipse Studio.
  arts: Maulene Kelley cultivates their artistic side by devouring contemporary novels by Sally Rooney and Celeste Ng, penning reflective blog entries on their STEM journey, and they move to the swing rhythms
    of Ella Fitzgerald and the modern jazz stylings of Kamasi Washington whenever they hit the dance floor.
  travel: Maulene Kelley prefers meticulously planned weekend getaways to nearby cultural hotspots like the Mississippi Delta blues trail and the historic French Quarter, while they dream of a summer immersion
    in Barcelona’s tapas scene and a spring trip to Kyoto’s cherry blossoms, balancing budget constraints with their love for rich culinary experiences.
  culinary: Maulene Kelley delights in cooking Southern‑ and Creole‑inspired gumbo with Andouille sausage, okra, and a homemade file powder blend, and they spice up jambalaya with a secret mix of cayenne,
    paprika, and thyme, often experimenting with fresh crawfish and a splash of sherry to elevate family meals.
  core: Maulene Kelley is a socially magnetic, structure‑loving biomedical engineer who juggles rigorous data analysis, vibrant ballroom dance nights, and spontaneous culinary experiments, all while obsessively
    budgeting and occasionally over‑committing to club leadership roles, where they thrive on the buzz of group dynamics.
background:
  cultural: Maulene identifies as African‑American and grew up in Lafayette, Louisiana, a city where Black culture intertwines with Cajun and Creole traditions. Her family places a strong emphasis on community,
    church, and storytelling, shaping her values of compassion and collective progress. She celebrates cultural heritage through music, foods like collard greens and jambalaya, and participates in local
    Juneteenth celebrations and Black History Month events. The rich tapestry of Southern Black history informs her commitment to educational equity and community empowerment, while her upbringing in a
    close‑knit neighborhood nurtured her sociable and assertive personality.
attributes:
  skills: '[''Molecular biology techniques (PCR, gel electrophoresis, cell culture)'', ''Statistical analysis with R and Python'', ''Data visualization (Tableau, Matplotlib, Seaborn)'', ''Technical writing
    and scientific communication'', ''Project management and organizational planning'', ''Public speaking and community outreach'']'
  hobbies: '[''Study circles and peer tutoring'', ''Ballroom and swing dancing'', ''Cooking Southern and Creole cuisine'', ''Reading contemporary fiction'', ''Blogging about STEM experiences'', ''Mentoring
    high school girls in STEM'']'
  career_goals: Maulene aims to pursue a master’s degree in bioinformatics or data science to deepen her analytical expertise while maintaining a focus on health‑focused research. She envisions a career
    as a research scientist or data analyst in a biotech firm where she can lead projects that have tangible community impact. Long‑term, she aspires to bridge science and public engagement by developing
    outreach programs that inspire under‑represented youth in STEM, leveraging her sociable nature and leadership abilities. Her drive for structured career progression is balanced by a desire to remain
    flexible and responsive to emerging scientific challenges.
