persona_description: An astrologer who specializes in the practice of horoscopic judgement, using the seven spheres of the planets above to translate airy theory into fiery practice on earth below. Their
  expertise lies in the interpretation of horoscopes, which involves the seven modes of horoscopic judgement, including the kindly Moon, trickster Hermes, Venus, the Golden Sun, Mars, Jove, and Saturn.
  Their knowledge and skills are highly sought after in the astrological community, and they are known for their ability to accurately predict and understand the future based on the positions of the planets
  and their influence on the Earth.
