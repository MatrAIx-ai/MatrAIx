personas:
  professional: Weiping Wong is a budding multimedia designer who fuses solitary sketching of sci‑fi characters with intricate LEGO model building, using early exposure to simple robotics videos to imagine
    a future career in video‑game design and animation.
  sports: Weiping Wong loves wandering local nature trails and collecting leaf specimens, participates in an after‑school cycling club, and avidly supports the nearby youth soccer team, the Greenfield Tigers,
    while occasionally watching the professional baseball team, the Harbor Hawks, on TV.
  arts: Weiping Wong draws inspiration from Hayao Miyazaki’s animated worlds, the graphic‑novel storytelling of Neil Gaiman’s *The Sandman*, and the precise aesthetics of LEGO Architecture sets, spending
    free evenings sketching original sci‑fi scenes and constructing detailed LEGO dioramas.
  travel: Weiping Wong dreams of camping under the stars in Yellowstone National Park, revisits the local city museum of natural history, and hopes to attend a space‑center open day in Cape Canaveral to
    see a rocket launch up close.
  culinary: Weiping Wong favors simple yet tasty meals like chicken teriyaki rice bowls, loves slurping miso ramen topped with a soft boiled egg, and experiments with fruit smoothies blending mango, banana,
    and a handful of spinach.
  core: Weiping Wong is a solitary nine‑year‑old architect of imagined worlds who sketches sci‑fi heroes, assembles complex LEGO cities, and balances a skeptical, competitive mindset with occasional bursts
    of cooperative board‑game strategy.
background:
  cultural: Weiping grows up in a bicultural home in Wooster, Ohio. His parents immigrated from Taiwan and speak Mandarin at home, celebrating Lunar New Year, Mid‑Autumn Festival, and teaching traditional
    calligraphy. At school and in the community, he experiences Midwestern American customs, participates in local events, and balances his heritage with his everyday life in Ashland County. This blend
    of East Asian family values—emphasis on curiosity, self‑improvement, and respect for tradition—and the open, flexible culture of his Ohio neighborhood shapes his worldview.
