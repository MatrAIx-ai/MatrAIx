  career_goals: Andrea aims to build on her cashier experience and bilingual abilities by obtaining her GED and pursuing vocational training in supply chain management or business administration. She aspires
    to secure a supervisory or logistics role in retail that offers autonomous responsibilities and flexible scheduling. Long‑term, she plans to launch an online boutique featuring Guatemalan artisanal
    products, leveraging e‑commerce platforms and her competitive drive to become a top performer in sales metrics. Her resilience and calm demeanor fuel her ambition to transition into a role that balances
    practical work with entrepreneurial independence.
