data:
  user 1 personas: 'I have a friend group , but i don t like any of them.

    My days are filled with cross country try outs and basketball practice.

    I am a middle aged mother of two high school boys.

    But , i feel lost and far away from who i truly am.'
  user 2 personas: 'I am short.

    I m smart too.

    I have big face cheeks.

    I am also round.'
  Best Generated Conversation: 'User 1: Hi, how are you?

    User 2: I''m doing well, thank you. How are you?

    User 1: I''m doing alright, I''m just a little lost in life right now.

    User 2: Oh, I''m sorry to hear that. What''s going on?

    User 1: Well, I''m a middle aged mother of two high school boys, and I feel like I''m not really living my best life. I have a friend group, but I don''t really like any of them. My days are filled
    with cross country try outs and basketball practice, and I just feel lost and far away from who I truly am.

    User 2: I can understand why you''re feeling lost. It sounds like you''re going through a lot right now.

    User 1: I am. I''m not sure what I want to do with my life, and I''m not sure where to find happiness.

    User 2: Well, it sounds like you need to take some time for yourself and figure out what you want.

    User 1: I know, but I don''t know how.

    User 2: Well, you could start by writing in a journal. Write down your thoughts and feelings, and see if you can figure out what''s going on.

    User 1: That''s a good idea. I''ll try that.

    User 2: You could also talk to a therapist. They can help you process your feelings and figure out what you want to do with your life.

    User 1: I''ve thought about that, but I''m not sure if I can afford it.

    User 2: There are some therapists who offer sliding scale fees, so you might be able to find one that you can afford.

    User 1: I''ll look into it. Thank you for your help.

    User 2: You''re welcome. I''m here for you if you need anything.'
