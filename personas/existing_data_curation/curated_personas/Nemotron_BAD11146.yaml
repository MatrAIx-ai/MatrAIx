personas:
  professional: Estebana Martinez, a retired civil engineer turned community STEM mentor, leverages her analytical mind, CAD expertise, and meticulous project‑planning habits to design youth workshops and
    garden initiatives while maintaining a competitive edge in weekly senior chess tournaments.
  sports: Estebana Martinez enjoys low‑impact fitness through daily garden walks, seasonal participation in senior softball leagues, avidly follows Austin FC and the Texas Longhorns football team, and uses
    her competitive nature to set personal step‑count challenges each spring.
  arts: Estebana Martinez immerses herself in the arts by dancing to mariachi performances of Vicente Fernández, attending local theater productions of classic regional tales, collecting Frida Kahlo prints,
    and devouring biographies of historical engineers like Emily Warren Roebling, which fuel her own sense of purpose.
  travel: Estebana Martinez prefers structured travel itineraries, revisiting Oaxaca for family recipes, taking scenic road trips through Texas Hill Country, and dreaming of a pilgrimage to the historic
    city of Seville, all while balancing a limited travel budget with occasional visits to her grandchildren in Austin.
  culinary: Estebana Martinez, a culinary craftsman, prepares tamales al pastor, rich mole poblano with ancho chilies, and hearty pozole using fresh corn from her garden, expertly juggling precise timing
    and traditional spice blends, yet occasionally forgets to refrigerate leftovers, leading to occasional food‑borne mishaps.
  core: Estebana Martinez blends engineering precision with heartfelt tradition, turning every garden row, chess move, and kitchen simmer into a structured ritual that masks a lingering anxiety and fierce
    competitive streak.
background:
  cultural: Born in a small town in Jalisco, Mexico, Estebana grew up immersed in the traditions of family gatherings, Catholic holidays, and regional culinary practices. She immigrated to the United States
    in her early twenties, first living in Houston before moving to Austin with her husband, where they raised three children. She retains fluency in both Spanish and English, often translating for relatives
    and community members. Her cultural identity is expressed through cooking family recipes, participating in Día de los Muertos celebrations, and supporting local Mexican‑American organizations. She values
    education, hard work, and intergenerational responsibility, and she strives to preserve Mexican heritage within the multicultural fabric of Austin.
attributes:
  skills: '[''Scientific analysis'', ''Engineering design'', ''Project management'', ''Budgeting'', ''Spanish-English technical translation'', ''Mentoring in STEM'', ''Community garden coordination'', ''Traditional
