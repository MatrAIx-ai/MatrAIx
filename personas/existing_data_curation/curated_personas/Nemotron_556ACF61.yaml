    games'']'
  career_goals: Ingrid aims to combine her practical mindset with her love for learning by pursuing a vocational program in sustainable agriculture and animal care after graduating high school. She hopes
    to become a certified veterinary technician or a farm manager for a small family‑run farm, allowing her to work hands‑on with animals while applying her organizational skills to maintain healthy livestock
    and gardens. In the longer term, she dreams of opening a community garden and a small farm‑stand that supplies fresh produce to Carriere and neighboring towns, providing a stable, low‑stress livelihood
    that also gives back to her community. She also keeps the option open to study environmental science at a community college if she discovers a deeper interest in conservation.
