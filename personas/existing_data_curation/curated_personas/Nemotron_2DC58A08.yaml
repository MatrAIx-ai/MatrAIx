  career_goals: Looking ahead, Tomas aims to move into a lead‑fabricator or shift‑supervisor role within the next few years, leveraging his hands‑on experience and interpersonal skills to guide a team.
    He plans to obtain AWS welding certification and deepen his CNC machining knowledge, which will open doors to more specialized projects. A long‑term ambition is to launch a small side business creating
    custom metal art and automotive accessories that blend his technical skill with his love for contemporary art. He also seeks a work schedule with greater predictability to lower stress, allowing him
    to devote more time to personal projects and to provide financial support for his family back in Mexico. Mentoring younger coworkers and fostering a collaborative, low‑pressure environment are central
    to his professional vision.
