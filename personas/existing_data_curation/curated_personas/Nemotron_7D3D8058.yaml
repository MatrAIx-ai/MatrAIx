personas:
  professional: A budding multimedia designer named Paul Rapp combines self‑taught Python scripting, digital illustration in Procreate, and acoustic songwriting to craft indie game prototypes while meticulously
    organizing project assets in spreadsheets, reflecting their curious and organized nature.
  sports: An avid skateboarder and weekend hiker named Paul Rapp spends Saturdays at the local skate park mastering new tricks, hikes the Appalachian foothills for nature photography, and roots for the
    Appalachian State Mountaineers football team, reflecting their love for both kinetic and scenic challenges.
  arts: A dedicated creative explorer named Paul Rapp attends community art fairs, draws inspiration from the surreal canvases of James Jean, the digital kaleidoscopes of Beeple, and the emotive folk melodies
    of Bon Iver, while regularly sketching in a battered notebook and experimenting with digital painting tools, showcasing their open‑minded curiosity.
  travel: An adventure‑seeking teen named Paul Rapp plans low‑budget road trips to the Great Smoky Mountains and Asheville for hiking and photography, dreams of a Japan pilgrimage to study traditional ukiyo‑e
    art and modern game design, and prefers spontaneous itineraries over rigid schedules, balancing school obligations with wanderlust.
  culinary: A budding Southern‑flavored cook named Paul Rapp often whips up shrimp and grits, collard greens simmered with smoked ham hocks, and peach cobbler topped with a dash of cinnamon, experimenting
    with fresh garden herbs like thyme and basil while occasionally burning the edges of a cornbread batch when distracted by a half‑finished illustration.
  core: Paul Rapp is a 17‑year‑old visual‑arts enthusiast who blends curiosity, disciplined organization, and a love for nature’s textures into a hybrid of digital design, indie game creation, and Southern‑style
    cooking, all while juggling school, a part‑time job, and the occasional burnt pancake.
background:
  cultural: Paul grew up in Canton, Georgia, a small Southern town where community ties and traditional Southern values intersect with modern influences. His family is White with deep roots in the American
    South, participating in local church services, county fairs, and church outreach programs. The region's Southern hospitality, appreciation for country and blues music, and love of outdoor activities
    like hiking and fishing have shaped his worldview. At the same time, his curiosity and access to online art communities and multicultural media have broadened his perspective, allowing him to blend
    local cultural heritage with contemporary artistic expression.
