  career_goals: Paul aims to earn his GED and enroll in a community college program focused on art and design, building a professional portfolio for freelance graphic design work. He aspires to secure a
    scholarship that will allow him to pursue a degree in Multimedia Design or Game Development, eventually working as a visual designer for a local agency or launching his own boutique design studio. He
    is also interested in creating indie video games that combine storytelling and visual art, and he sees an apprenticeship in carpentry as a way to integrate craftsmanship with his design sensibility.
