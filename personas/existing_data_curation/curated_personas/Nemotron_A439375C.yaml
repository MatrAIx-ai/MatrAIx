    in Dallas'', ''Cooking Southern-inspired meals with artistic plating'']'
  career_goals: Crystal aims to transition from a pure administrative role into a hybrid position that leverages her organizational expertise and artistic passion. Over the next three years she plans to
    complete a bachelor’s degree in Arts Administration, develop a portfolio of community‑focused art projects, and secure a leadership role as a coordinator for the Penelope cultural heritage program.
    She envisions creating annual art fairs, curating traveling exhibitions for local schools, and mentoring younger administrative professionals on integrating creativity into workflow. While pursuing
    these aspirations, she also intends to maintain a part‑time consultancy offering virtual office support, allowing her to balance financial stability with the flexibility she values. Reducing work‑related
    stress and building a supportive network are central to her long‑term professional fulfillment.
