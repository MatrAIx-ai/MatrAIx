persona_description: A Russian composer and pianist, known for his contributions to the Russian Romantic movement and his works based on Russian history and folklore. His compositions are characterized
  by their use of folk melodies and his unique style of harmonization. He is also known for his contributions to the development of the symphonic poem and the piano cycle. Rimsky-Korsakov's works were published
  in drastically edited form after his death, but his original versions were made available in 1928.
