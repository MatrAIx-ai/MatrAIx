  hobbies: '["Gardening", "Crossword puzzles", "Sudoku", "Listening to classic rock", "DIY home improvement", "Walking on neighborhood trails", "Volunteering at a food bank"]'
  career_goals: Robert aims to secure a stable, predictable role that allows him to leverage his organizational strengths while minimizing unnecessary stress. He hopes to obtain a supervisory or office
    manager position within the next two years, possibly earning a Certified Administrative Professional (CAP) credential to formalize his expertise. Long‑term, he wishes to transition to a part‑time role
    that offers a balanced work schedule, enabling him to focus on personal well‑being and gradual retirement planning.
