personas:
  professional: Melanie Brisard, a curious toddler who loves building block towers, shows early signs of an engineering mindset by balancing imaginative experimentation with a practical eye for stability,
    even as they happily dismantle their creations in spontaneous play.
  sports: Melanie Brisard participates in parent‑child gymnastics classes at the local community center and enjoys watching the nearby River City Rapids baseball team, cheering with a foam finger during
    games, while preferring water play over organized sports, reflecting their disorganized yet flexible approach to activity.
  arts: Melanie Brisard delights in drawing simple shapes with Crayola crayons, dancing to the whimsical tunes of Disney’s “Frozen” soundtrack and the rhythmic beats of Sesame Street songs, and occasionally
    watching animated short films by Pixar, illustrating their gentle, solitary artistic exploration.
  travel: Melanie Brisard has visited the sunny beaches of Florida with her family, giggling in the sand, and explored the magical world of Disneyland Paris, where they were mesmerized by the fireworks,
    showing a preference for short, family‑oriented trips rather than long solo adventures.
  culinary: Melanie Brisard favors soft, familiar foods such as macaroni and cheese, banana slices, and strawberry yogurt, can stir a bowl with a child‑size spoon, and enjoys occasional bites of avocado
    toast, though they can be picky, rejecting peas with a stubborn frown.
  core: Melanie Brisard is a gentle, curious toddler who balances imaginative play with practical tinkering, prefers cozy family settings over crowds, and navigates daily routines with occasional bouts
    of disorganization and endearing stubbornness.
background:
