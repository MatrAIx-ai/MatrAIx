  career_goals: Baxter dreams of turning his love for building things and helping his community into a career. He aims to attend a STEM‑focused high school and later study civil engineering or urban planning,
    hoping to design safe bridges, community parks, and sustainable infrastructure for small towns like Brownstown. Inspired by his empathetic side, he also wants to be an advocate for teen mental‑health,
    planning school programs that combine practical problem‑solving with emotional support. In the long term, Baxter envisions a role where he can lead collaborative projects—whether constructing public
    facilities or organizing community events—while mentoring younger students and promoting a culture of resilience.
