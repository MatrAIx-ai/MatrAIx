personas:
  professional: Baxter Skeet, a junior robotics enthusiast, designs and programs simple robots for his middle school club, applying methodical planning and a flair for teamwork that shines in his reliable,
    talkative leadership style.
  sports: Baxter Skeet, a point guard on the Westside Middle School Warriors basketball team, lives for after‑school games that cement friendships, idolizes the NBA’s Boston Celtics, and joins the neighborhood
    youth basketball league for extra drills, channeling competitive energy into structured practice.
  arts: Baxter Skeet, a charismatic lead in his school drama troupe, devotes weekends to rehearsals of musicals like The Lion King, idolizes Lin‑Manuel Miranda’s songwriting, and collects cast album recordings,
    letting performance fuel his sociable confidence.
  travel: Baxter Skeet, who loves scouting local bird‑watching trails and museums, has visited the National Air and Space Museum in Washington, DC, dreams of seeing the robotics showcase at Tokyo’s Miraikan,
    and plans a summer road trip to the Grand Canyon to combine nature with photo‑journalism.
  culinary: Baxter Skeet, an enthusiastic bake‑sale volunteer, enjoys crafting chocolate chip cookies, assembling crunchy taco shells with seasoned beef, and whipping up mac‑and‑cheese bites, though they
    often forget to clean the kitchen afterwards, leaving a trail of leftover cheese.
  core: Baxter Skeet is a talkative teen engineer who juggles robotics, drama, and basketball while silently wrestling with anxiety and an unquenchable appetite for new gadgets.
background:
  cultural: Baxter grew up in Brownstown, a small town in southern Indiana, immersed in the Midwestern values of community, reliability, and modesty. His family has deep roots in the area, with generations
    who worked in local manufacturing and farming, instilling a strong work ethic and appreciation for practical skills. The town’s close‑knit social fabric—centered around the local high school football
    games, county fairs, and church gatherings—has shaped his sociable nature and love for being part of group activities. Regional traditions emphasize helpfulness, hands‑on craftsmanship, and straightforward
    problem‑solving, which align with Baxter’s organized and methodical demeanor. While predominantly white, his community is inclusive of diverse viewpoints through volunteer programs and youth groups,
    giving him exposure to broader perspectives while maintaining his small‑town identity.
