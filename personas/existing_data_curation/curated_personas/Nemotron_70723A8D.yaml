personas:
  professional: Steven Ferguson is a seasoned public safety telecommunicator who leverages his calm under pressure, decisive multitasking, and data‑driven mindset to excel in dispatch coordination while
    maneuvering his relaxed attitude toward rigid scheduling as he pursues CPST certification and supervisory roles.
  sports: Steven Ferguson stays active through weekend hikes with the Ozark Trailblazers, weekday basketball games for the Benton County Barons, and avidly follows the Arkansas Razorbacks football and St. Louis
    Cardinals baseball teams, treating fitness as a structured yet flexible routine.
  arts: Steven Ferguson expresses his creative side through meticulous woodworking projects inspired by Roy Underhill, unwinds with strategy video games like Civilization VI, and fills spare moments listening
    to folk‑rock storytellers such as Bob Dylan and contemporary outlaw country voice Colter Wall.
  travel: Steven Ferguson favors spontaneous weekend getaways to nearby Ozark lakes, plans DIY road trips to the waterfalls of Hot Springs, Arkansas, and dreams of backpacking the Milford Track in New Zealand,
    balancing limited vacation days with a love for nature‑focused adventures.
  culinary: Steven Ferguson, an intermediate home‑cook, often prepares fresh‑caught catfish grilled with a lemon‑herb rub, hearty Arkansas‑style barbecue ribs, and occasionally experiments with smoked trout
    using a backyard smoker, pairing meals with local craft beers like Mother Earth Brewing’s IPA.
  core: Steven Ferguson blends a methodical, data‑driven mindset with a laid‑back, sometimes disorganized approach to life, channeling his competitive edge into both dispatch metrics and strategy games
    while occasionally letting a cluttered spreadsheet betray his love for spontaneous fishing trips.
background:
  cultural: Steven grew up in a small town in Arkansas, shaped by Southern and Midwestern values of self‑reliance, community involvement, and practicality. His upbringing in a predominantly white, Protestant
    environment emphasized hard work, modesty, and a down‑to‑earth outlook. Now residing in Bentonville, a rapidly expanding city influenced by Walmart's presence, he blends traditional rural sensibilities
    with exposure to a more diverse, business‑oriented culture. He participates in local church gatherings and community events, values neighborly hospitality, and maintains a strong regional identity tied
    to the Ozarks.
attributes:
