  career_goals: Steven aims to move from a front‑line public safety telecommunicator to supervisory and eventually managerial positions within the communications system. He plans to obtain Certified Public
    Safety Telecommunicator (CPST) certification and complete the Incident Command System (ICS) training series. Leveraging his business degree, he seeks to lead initiatives that improve dispatch efficiency
    through data‑driven scheduling, develop advanced analytics dashboards, and negotiate cost‑effective technology upgrades for the Benton County communication center. In the long term, he aspires to become
    the Director of Public Safety Communications for a regional agency or transition into emergency management consulting, helping municipalities design resilient emergency communication plans. His competitive
    nature drives him to be a top performer in call resolution metrics and to mentor new telecommunicators.
