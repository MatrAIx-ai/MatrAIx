  career_goals: Marquita’s primary career ambition is to secure a stable, routine‑oriented position that offers clear advancement steps. Over the next few years she hopes to be promoted from stocker to
    shift supervisor, then to department manager, where she can help design and enforce efficient workflow plans. She is considering completing her associate degree in business or supply‑chain management
    to qualify for a logistics coordinator role in a larger distribution center. Ultimately, she wants a job that provides regular hours, reliable income, and the opportunity to mentor newer employees while
    still allowing occasional flexibility for personal commitments.
