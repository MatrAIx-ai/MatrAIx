personas:
  professional: Marquita Johnson works as a warehouse stock associate, applying her sharp inventory‑management skills and business coursework to keep shelves orderly, they thrive on the familiar rhythm
    of daily restocking while occasionally flexing to help teammates and quietly eyeing a shift‑supervisor role.
  sports: Marquita Johnson enjoys watching the Orlando Magic and cheering on local high‑school basketball teams, they also participate in weekly walks at Lake Eola Park and tend a small backyard garden
    for light exercise, and they occasionally join a casual weekend basketball pick‑up league.
  arts: Marquita Johnson finds solace in R&B legends like Beyoncé and classic hip‑hop from Tupac, they sing in their church choir during gospel rehearsals, read contemporary romance novels by authors such
    as Nicholas Sparks, and spend weekend afternoons crafting DIY home‑decor projects inspired by the vibrant colors of Caribbean art.
  travel: Marquita Johnson prefers short road trips that blend cultural festivals and family gatherings, they have explored New Orleans during Mardi Gras and dream of a future visit to Kingston, Jamaica
    for its spice markets, while budgeting their travels around pay‑day cycles and occasional community fundraisers.
  culinary: Marquita Johnson delights in cooking Southern staples like fried chicken, collard greens, and cornbread alongside Caribbean favorites such as jerk chicken, rice and peas, and plantains, they
    use ingredients like smoked paprika, Scotch bonnet peppers, and fresh okra, and they consider themselves an intermediate home chef who follows cherished family recipes while experimenting with new flavor
    twists.
  core: Marquita Johnson balances a love for routine work, soulful music, and communal cooking with a laid‑back approach to planning, they often swap a rigid schedule for spontaneous family gatherings and
    the comfort of familiar flavors.
background:
  cultural: Marquita grew up in a close‑knit African‑American community in Orlando, Florida, where family, church, and neighborhood bonds shaped her values. Her parents emphasized practical responsibility,
    respect for tradition, and the importance of giving back to the community. Celebrations like Juneteenth, Black History Month, and church picnics reinforced her cultural pride and sense of belonging.
    The vibrant music scene and culinary traditions of the Black diaspora in the South have influenced her tastes and social habits. Although she embraces the modern, diverse culture of Orlando, Marquita
    remains rooted in the oral storytelling, hospitality, and resilience that characterize her heritage.
