  hobbies: '[''Gardening (data‑driven vegetable and ornamental)'', ''Woodworking (furniture making, radio restoration)'', ''Model Railroading'', ''Reading (science history, engineering biographies, mystery
    fiction)'', ''Puzzle solving (crosswords, Sudoku, logic puzzles)'', ''Bird‑watching and nature photography'', ''Volunteer STEM tutoring'', ''Small‑group book club'', ''Exploring sustainable home technology'']'
  career_goals: Nathan aims to remain intellectually active by volunteering his engineering expertise to local STEM outreach programs, mentoring high‑school students in robotics clubs, and contributing
    practical articles to community newsletters on energy‑efficient home technologies. He is working on authoring a concise guide for senior citizens on safe IoT integration in their homes. Additionally,
    he seeks to broaden his knowledge of sustainable energy systems and emerging AI tools, while prioritizing personal health, stress reduction, and quality time with his spouse.
