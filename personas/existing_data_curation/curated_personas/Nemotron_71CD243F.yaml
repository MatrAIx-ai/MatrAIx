personas:
  professional: Tomas Mairena, a bilingual social studies teacher who thrives on routine and hands‑on learning, structures his classroom with predictable schedules, uses real‑world examples like gardening
    and cooking to teach civics, and serves as a cultural bridge between the school and the local Spanish‑speaking community while balancing a relaxed attitude toward obligations.
  sports: Tomas Mairena, a weekend fisherman with the Lakeview Anglers club, follows the Houston Astros and Dallas Cowboys, plays occasional pickup basketball at the community center, and encourages their
    teenage son to join the local youth soccer league, all while preferring low‑key, family‑oriented activities over large stadium crowds.
  arts: Tomas Mairena, an avid listener of regional norteño music from Los Tigres del Norte and Vicente Fernández, plays acoustic guitar on quiet evenings, watches films by Alfonso Cuarón and Gael García
    Bernal, and attends local mariachi performances during holiday celebrations, letting these artistic moments shape their personal expression.
  travel: Tomas Mairena, who favors road trips that blend cultural immersion and relaxation, has visited Oaxaca and San Miguel de Allende for culinary inspiration, enjoys annual family stays at the Grand
    Canyon, and dreams of exploring the archaeology of Costa Rica while staying within a modest travel budget.
  culinary: Tomas Mairena, a competent home cook who regularly prepares tamales, pozole, and chili relleno using ancho chilies, epazote, and fresh tomatoes from their garden, enjoys experimenting with salsa
    verde, and often trades recipes with neighbors at church gatherings.
  core: Tomas Mairena blends steadfast routine with a relaxed approach to obligations, wielding a garden spade, a guitar, and a chalkboard to nurture both their students and their family, and they occasionally
    let disorganization slip through.
background:
  cultural: Tomas is a first‑generation Mexican‑American whose family emigrated from Michoacán in the 1970s. He grew up in a bilingual household, celebrating Catholic holidays, Día de los Muertos, and Mexican
    festivals alongside American holidays. His upbringing emphasized family loyalty, respect for elders, and community responsibility. He retains strong ties to Mexican culinary traditions, folk music,
    and storytelling, which he shares with his students and neighbors. Living in Beaumont, he blends his heritage with Southern Californian culture, acting as a cultural bridge for his students and fostering
    a sense of belonging for Mexican‑American youth.
attributes:
  skills: '[''Classroom routine design'', ''Bilingual instruction (English‑Spanish)'', ''Practical lesson planning'', ''Informal assessment methods'', ''Student mentorship'', ''Community outreach'', ''Conflict
    resolution'', ''Basic educational technology'', ''Cultural competency'']'
  hobbies: '[''Gardening (heirloom vegetables, chilies)'', ''Cooking traditional Mexican dishes'', ''Playing acoustic guitar'', ''Reading Mexican history biographies'', ''DIY woodworking'', ''Fishing at
    local reservoirs'', ''Participating in church holiday events'', ''Organizing neighborhood Día de los Muertos altar'']'
  career_goals: Tomas aims to solidify his credentials by completing a teaching credential and earning his high‑school diploma, which will open the path to a lead teacher or department coordinator role
    at his school. He wants to formalize the Mexican‑heritage program he informally runs, mentor newer teachers in culturally responsive pedagogy, and eventually serve as a liaison between the school and
    the local community. While he values stability, he also hopes to increase his influence in curriculum development for practical subjects and maintain a balanced workload that respects his need for routine.
