  hobbies: '[''Kayaking on Puget Sound'', ''Hiking the Hood Canal Trail'', ''Community gardening'', ''Bridge tournaments'', ''Senior tennis'', ''Quilting circles'', ''Volunteer reading at the Kingston library'',
    ''Nature photography'', ''Woodworking projects'', ''Birdwatching'']'
  career_goals: Although retired from formal employment, Ann remains driven to apply her expertise to benefit her community. She aims to serve on the board of the Kitsap County Environmental Coalition,
    where she can guide local watershed restoration projects. She also plans to launch a monthly STEM outreach program at the Kingston senior center, teaching basic computer skills and fostering curiosity
    among older adults. Competitive by nature, Ann is training for the senior tennis league and hopes to win the regional championship within the next two years. Additionally, she aspires to earn a certification
    in horticulture to expand her sustainable gardening initiatives and to author a guidebook on Practical Home Projects for Active Seniors.
