  hobbies: '[''Cooking traditional Mexican dishes'', ''Dancing cumbia and salsa'', ''Street photography'', ''Volunteering at a community garden'', ''Playing soccer'', ''Watching documentaries on social
    issues'', ''Listening to Latin pop and reggaeton music'', ''Sketching'', ''DIY crafts'', ''Bilingual poetry writing'']'
  career_goals: Yadira plans to complete her associate's degree in Health Sciences at the local community college, followed by a Medical Assistant certification. She aims to secure an entry‑level position
    as a patient services coordinator at a community health clinic, where she can apply her structured approach to administrative tasks while helping Spanish‑speaking patients navigate the healthcare system.
    In the longer term, she aspires to earn a bachelor's degree in Public Health, focusing on health equity for Mexican‑American communities, and eventually lead outreach programs that bridge cultural gaps
    and improve preventive care.
