personas:
  professional: Audrey Black is a detail-oriented management analyst who transforms massive datasets into actionable strategies for senior leadership, leveraging advanced Excel, Power BI, Tableau, SQL,
    and emerging Python tools, while their curiosity and love for unconventional ideas drive them to embed storytelling and inclusive decision‑making into every project.
  sports: Audrey Black stays active by attending early‑morning yoga sessions at a community studio in Sunnyside, joining the Queens County Runners club for weekend long-distance runs, and cheering on the
    New York Knicks during basketball season and the New York Yankees in summer, while they occasionally play pick‑up basketball at local courts to blend social interaction with cardio.
  arts: Audrey Black curates vibrant street‑photography showcases on Instagram featuring murals by local collectives such as Queens Love, attends gallery openings for contemporary visual artists like Kehinde
    Wiley and performance pieces by choreographer Kyle Abraham, frequently enjoys the theatrical genius of Lin‑Manuel Miranda’s Hamilton and the soulful sounds of Alicia Keys, while drawing rhythmic inspiration
    from Caribbean legends like Arrow and contemporary saxophonist Kamasi Washington.
  travel: Audrey Black plans trips with a blend of meticulous itineraries and spontaneous detours, favoring weekend getaways to nearby cultural hubs like historic Philadelphia and the vibrant festivals
    of Puerto Rico, while dreaming of a two‑week immersion in Barcelona’s art districts and the island of Jamaica, balancing adventurous exploration with a modest travel budget that relies on strategic
    use of reward points.
  culinary: Audrey Black delights in blending soul‑food and Caribbean flavors, regularly preparing jerk chicken, collard greens, and plantain fufu with a deft hand at balancing smoked paprika, allspice,
    and scotch bonnet peppers, while they also treat themselves to occasional upscale dining at Le Bernardin where they savor a perfectly seared sea bass with a citrus beurre blanc.
  core: Audrey Black navigates life with a data‑driven curiosity that fuels both their analytical career and weekend mural‑photography, yet they often procrastinate on dental appointments while binge‑watching
    documentaries on social justice.
background:
  cultural: 'Audrey identifies as African American with deep ties to the rich cultural tapestry of Queens. Growing up in a multigenerational Black household, she celebrated traditions such as Juneteenth,
    church gatherings, and family storytelling, while also absorbing Caribbean influences from neighbors and community events in Sunnyside. Her daily life reflects a blend of these heritages: she participates
    in neighborhood block parties, supports local Black artists, and volunteers at cultural centers that preserve and promote Black and Caribbean art forms. This multicultural environment fuels her appreciation
    for diverse perspectives and informs both her professional ethos of inclusive decision‑making and her personal commitment to community empowerment.'
attributes:
  skills: '["Data Analysis", "Process Improvement", "Project Management", "Stakeholder Communication", "Financial Modeling", "Advanced Excel", "Power BI", "Tableau", "SQL", "Risk Assessment", "Strategic
    Planning", "Agile Methodologies", "Python for Data Science"]'
  hobbies: '["Photography (street and mural art)", "Visiting art galleries and performance spaces", "Exploring NYC street art tours", "Reading contemporary fiction and social‑justice non‑fiction", "Cooking
    soul food and Caribbean cuisine", "Yoga", "Facilitating youth arts workshops", "Urban gardening", "Attending community cultural festivals"]'
  career_goals: Audrey aspires to move into a senior strategic consulting role where she can lead large‑scale transformation projects for both private firms and community‑focused organizations in New York
    City. She aims to earn a PMP certification and a Certified Business Analysis Professional (CBAP) credential within the next two years, positioning herself for a directorship in operations or a chief
    analytics officer track. In the long term, she envisions launching an advisory boutique that helps under‑served neighborhoods in Queens develop data‑informed economic development plans, while also mentoring
    black women entering the analytics field.
