persona_description: A medical professional with expertise in treating esophageal burns caused by chemicals. They are skilled in diagnosing and treating chemical burns of the esophagus through various diagnostic
  methods and treatment options. They are also aware of the potential complications and risks associated with chemical burns and are prepared to provide emergency care and treatment in the acute and intermediate
  stages. They are knowledgeable in esophageal endoscopy, X-ray, and other diagnostic tools and techniques to assess the extent of damage and identify the stage of the esophageal burn. They are also skilled
  in treating chemical burns through appropriate chemical treatment regimens and in the prevention of complications such as esophageal perforation and narrowing of the esophagus.
