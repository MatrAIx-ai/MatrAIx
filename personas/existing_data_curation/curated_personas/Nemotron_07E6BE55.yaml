  hobbies: '[''Lego building'', ''Reading adventure books'', ''Soccer'', ''Biking'', ''Drawing'', ''Collecting rocks and insects'', ''Playing educational tablet games'']'
  career_goals: Skyler dreams of becoming a firefighter because he admires the clear structure, teamwork, and the chance to help others in a predictable environment. He is also fascinated by engineering,
    imagining himself designing and constructing things like the LEGO models he builds. Occasionally, he expresses a desire to be a veterinarian, inspired by caring for his family dog and his love for animals.
    These ambitions reflect his preference for organized, practical roles where he can see tangible results of his efforts.
