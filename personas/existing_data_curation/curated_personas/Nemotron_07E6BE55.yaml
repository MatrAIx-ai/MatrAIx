personas:
  professional: Skyler Frost, a 7‑year‑old budding LEGO architect, follows instructions step‑by‑step before improvising new designs, showcasing a methodical mind, strong spatial reasoning, and a practical
    focus that translates into reliable, detail‑oriented teamwork in school projects.
  sports: Skyler Frost plays forward for the Maple Grove Youth Soccer Club, rides a red bike to the neighborhood park for after‑school drills, and cheers for the nearby professional baseball team, the Riverdale
    Raptors, blending team spirit with personal fitness routines.
  arts: Skyler Frost draws comic‑style panels inspired by Stan Lee and Noelle Stevenson, sketching heroes during lunch breaks while listening to movie soundtracks, thereby channeling structured storytelling
    into vibrant visual art.
  travel: Skyler Frost loves weekend explorations of Pine Ridge State Park, collecting rocks and insects, and dreams of visiting Washington, D.C.’s National Museum of Natural History and the dinosaur halls
    of New York’s American Museum of Natural History, balancing local adventure with big‑city curiosity.
  culinary: Skyler Frost favors cheesy pizza and homemade macaroni and cheese, adds crunchy carrot sticks as a side, and proudly helps stir cupcake batter, though they often forget to wipe the flour spill
    they create.
  core: Skyler Frost mixes meticulous LEGO building with spontaneous comic doodles, thrives on predictable routines yet sneaks in creative experiments, and balances a sweet tooth and occasional sneezes
    with a pragmatic, slightly assertive charm.
background:
  cultural: Skyler grows up in a suburban neighborhood of Austin, Texas, within a family of European ancestry (primarily German and Irish roots) that values traditional American holidays like Thanksgiving
    and Christmas. The family participates in local community events such as the Austin City Limits Festival and enjoys outdoor activities typical of Texas culture, like weekend trips to Zilker Park and
    hiking the Hill Country. He attends a public elementary school where multicultural awareness is part of the curriculum, and his household practices a moderate Christian faith, attending Sunday services
    occasionally. These cultural influences blend a classic Midwestern family atmosphere with the vibrant, eclectic vibe of Austin.
