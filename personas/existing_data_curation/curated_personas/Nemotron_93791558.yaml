  career_goals: Although retired from formal employment, Joy aims to leave a lasting imprint on Park City's cultural landscape. She aspires to mentor emerging artists and writers through a community mentorship
    program, curate a traveling exhibition of local histories, and complete a memoir that weaves personal narratives with the town's evolution. Joy also hopes to secure a leadership role on the Park City
    Arts Council, where she can influence arts funding and ensure sustainable, high-impact projects.
