  career_goals: In the short term, Alexander aims to earn his Professional Engineer (PE) license and lead a company-wide safety improvement project that integrates ergonomic design with lean manufacturing.
    Over the next five years he plans to advance into a senior industrial engineering or safety management role, where he can shape policies on sustainability, worker well-being, and innovative process
    design. He intends to pursue a master’s degree in Engineering Management to deepen his strategic planning and leadership abilities. Long-term, Alexander envisions launching his own consultancy that
    blends engineering efficiency with artistic design, helping manufacturers create safe, productive, and aesthetically compelling work environments. He aspires to become a recognized thought leader, publishing
    articles and speaking at industry conferences on the intersection of safety, lean processes, and creative problem solving.
