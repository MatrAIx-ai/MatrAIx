  hobbies: '["Gardening", "Baking", "Knitting", "Crocheting", "Bridge", "Bingo", "Card games", "Walking in parks", "Church socials", "Classic movie screenings", "Genealogy research", "Big-band jazz listening",
    "Reading historical fiction"]'
  career_goals: Kathleen's primary ambition is to remain active, healthy, and independent for as long as possible. She aims to keep expanding her digital fluency so she can video-chat with grandchildren
    and assist them with school projects. She is working on a written memoir to capture family history and Pittsburgh's mid-century stories for future generations. Locally, she hopes to launch a small community
    garden plot that brings neighbors together and to mentor newer seniors in bridge and basic computer skills. Travel to visit her children and grandchildren remains a cherished goal, as does continuing
    to share her recipes and crafted gifts with the community.
