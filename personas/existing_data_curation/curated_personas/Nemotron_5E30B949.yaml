  hobbies: '["Playing piano", "Cooking Asian and Southern dishes", "Volunteering at community events", "Reading technology and business books", "Jogging and basketball", "Strategy video gaming", "Photography",
    "Learning Mandarin and basic Japanese"]'
  career_goals: In the short term, Wong plans to enroll at a community college and then transfer to the University of Mississippi to pursue a Bachelor’s degree in Supply Chain Management with a minor in
    Information Systems. He aims to combine his organizational strengths, technical curiosity, and bilingual abilities to secure an internship as a logistics coordinator with a regional distribution company.
    Over the next five years, he envisions advancing to a project manager role, overseeing cross‑border supply chains that connect Asian manufacturers with Southern retailers. Ultimately, Wong aspires to
    launch his own e‑commerce platform that imports specialty Asian food products to the Gulf Coast, using his disciplined approach to operations and his commitment to cultural exchange.
