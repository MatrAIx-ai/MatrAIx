personas:
  professional: Wong Zhao, an aspiring supply chain analyst, leverages meticulous Excel spreadsheets, bilingual communication, and disciplined project planning to coordinate campus logistics and volunteer
    events, while channeling their curiosity about technology into troubleshooting hardware issues and optimizing process flows.
  sports: Wong Zhao, an avid jogger who hits the trails at LeFleur Park three times a week and joins pick-up basketball games at the community center, roots for the Ole Miss Rebels men's basketball team
    and follows the New Orleans Pelicans, while also playing in a local intramural league where they are known for their reliable defense.
  arts: Wong Zhao, a piano enthusiast who practices the Debussy Prelude daily, enjoys capturing candid moments of community festivals with a vintage Fujifilm camera, streams strategy games like Civilization
    VI for their artistic world-building, and draws inspiration from Lang Lang's performances and photographer Vivian Maier's street photography.
  travel: Wong Zhao, a thrifty explorer who has backpacked through Tokyo to practice Japanese, road-tripped to New Orleans for its music scene, spent a weekend at the Great Smoky Mountains, and plans a
    future culinary tour of Osaka and the Gulf Coast, preferring meticulously planned itineraries balanced with spontaneous local experiences.
  culinary: Wong Zhao, a home chef who blends traditional soy-ginger marinated pork ribs with Southern bourbon-glazed collard greens, whips up a Sichuan-spiced shrimp and grits, experiments with mapo tofu-style
    fried chicken biscuits, and delights friends with their signature dish of honey-soy chicken wings, always keeping a stocked pantry of soy sauce, ginger, bourbon, and hot sauce.
  core: Wong Zhao is a disciplined, bilingual planner who balances rigorous supply-chain studies with piano practice, culinary experiments, community volunteering, strategic gaming, and a meticulous approach
    to budgeting and health.
background:
  cultural: Wong’s family originates from the Guangdong province of China, and his parents immigrated to the United States in the early 1990s. Growing up in Horn Lake, he was raised in a bilingual household
    where Mandarin was spoken alongside English, and traditional celebrations such as Lunar New Year and Mid‑Autumn Festival were observed with family meals, red decorations, and storytelling. At the same
    time, the family embraced Southern customs—attending church, participating in community barbecues, and enjoying regional dishes like fried catfish and biscuits. This blend of East Asian values—respect
    for elders, emphasis on education, and collectivist harmony—and Southern hospitality has shaped Wong’s worldview, fostering both cultural pride and a strong sense of community involvement.
attributes:
  skills: '["Organizational and time-management", "Microsoft Office and Google Workspace proficiency", "Basic computer hardware troubleshooting", "Mathematics (algebra, geometry) and introductory physics",
