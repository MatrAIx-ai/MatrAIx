  career_goals: Julie dreams of a future where she can help others while keeping a clear routine. She often says she wants to become a teacher because she likes sharing knowledge and having a structured
    classroom, or a veterinarian because she enjoys caring for animals. She also imagines leading a soccer team as a captain, reflecting her competitive spirit. Her short‑term goals include mastering second‑grade
    reading, improving her math, and earning a spot on the school soccer squad.
