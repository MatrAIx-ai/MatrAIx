personas:
  professional: Brandon Mckay is a seasoned warehouse operative who leverages meticulous inventory control skills and a natural knack for mentoring to keep the floor running like clockwork, and they now
    set their sights on a shift supervisor role while planning to earn a GED and a supply‑chain certification.
  sports: Brandon Mckay is a die‑hard Alabama Crimson Tide fan who never misses the Saturday night high‑school football games in the local county, tailgates with the same crew every season, and stays fit
    by fishing trips and occasional hunting outings, while supporting the Birmingham Barons for baseball.
  arts: Brandon Mckay finds creative release strumming acoustic guitar at family gatherings, enjoys listening to Garth Brooks and the Allman Brothers, and occasionally flips through woodworking magazines
    featuring artists like Sam Maloof for project inspiration.
  travel: Brandon Mckay prefers short, road‑trip getaways to nearby state parks such as Little River Canyon for fishing, balances family duties with a dream of a spring visit to New Zealand’s trout streams,
    yet plans all trips months in advance to fit around work schedules.
  culinary: Brandon Mckay gravitates toward Southern comfort foods, regularly cooks shrimp and grits, smokes catfish, and seasons his vegetable garden’s collard greens with smoked paprika, while their DIY
    spirit shines when they experiment with homemade pickles and cornbread from scratch.
  core: Brandon Mckay is a routine‑driven, community‑first logistics enthusiast who swaps warehouse pallets for fishing poles on weekends, and they never say no to a tailgate, though they sometimes forget
    to file their taxes on time.
background:
  cultural: Brandon was raised in Madison County, Alabama, within a working‑class, white Southern family that values tradition, community, and hospitality. His upbringing emphasized strong family ties,
    regular church attendance (Southern Baptist), and participation in local events such as county fairs and high school sports. He grew up cooking and enjoying classic Southern cuisine, learning a respect
    for routine and practicality that carries into his work ethic. These cultural influences shape his preference for stable, familiar environments and his commitment to helping others in his community.
attributes:
  skills: '[''Inventory Management'', ''Stock Replenishment'', ''Order Picking'', ''Handheld Scanner Operation'', ''Warehouse Management System (basic) Use'', ''Forklift Operation (certified)'', ''Safety
