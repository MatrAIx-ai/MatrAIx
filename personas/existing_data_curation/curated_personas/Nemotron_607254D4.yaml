  hobbies: '[''Attending local football games'', ''Tailgating'', ''Fishing'', ''Hunting'', ''Church volunteer work'', ''Food bank assistance'', ''Community clean‑up events'', ''DIY home improvement'', ''Woodworking'',
    ''Vegetable gardening'', ''Watching Alabama Crimson Tide football'', ''Playing acoustic guitar'']'
  career_goals: Brandon aims to advance within the logistics field by first securing a shift supervisor position at his current warehouse, leveraging his organizational skills and team‑leadership abilities.
    Over the next five years, he plans to obtain a GED and complete a community‑college certification in supply chain management, positioning himself for a logistics coordinator role. He is motivated to
    create a more efficient, harmonious work environment and eventually mentor other workers, while ensuring a stable income to support his family and maintain the routine he values.
