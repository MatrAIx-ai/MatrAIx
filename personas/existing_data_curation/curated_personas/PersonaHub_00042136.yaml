persona_description: A historian of early modern Europe, particularly interested in the zoological collections of the time. This persona is fascinated by the unusual animals found in medieval and early
  modern Europe and the ways in which they were imagined and collected. They are drawn to the works of William Savery, who painted many images of these animals, and are curious about the ways in which they
  reflect the ways in which animals have been imagined in collections over time. They are also interested in the extinction of these animals and the ways in which they are still remembered and celebrated
  today.
