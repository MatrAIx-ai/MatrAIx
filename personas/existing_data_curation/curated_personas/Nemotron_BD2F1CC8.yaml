personas:
  professional: Rita Etheridge, a 23‑year‑old budding arts administrator, leverages her basic graphic design skills, volunteer event‑planning experience, and innate Southern hospitality to coordinate community
    art fairs and youth workshops, meticulously scheduling volunteers while staying flexible enough to improvise when unexpected changes arise.
  sports: Rita Etheridge enjoys early morning jogs along nearby nature trails, passionately supports the Carolina Hurricanes during hockey season, and plays in a mixed‑gender community softball league on
    Saturdays, though she frequently skips post‑game stretching, leading to occasional knee soreness.
  arts: Rita Etheridge, an avid visual creator, spends weekends sketching pastoral scenes inspired by county fairs, showcases her acrylic paintings at the town’s folk‑art gallery, follows contemporary painter
    Kehinde Wiley and folk‑songstress Gillian Welch for inspiration, and curates Instagram reels that blend vintage Southern motifs with modern digital aesthetics.
  travel: Rita Etheridge favors short road trips to historic Southern towns like Asheville and Charleston to explore art museums and savor local cuisine, while dreaming of a solo backpacking trek through
    the Scottish Highlands that would satisfy her curiosity for new cultural landscapes beyond her familiar community comforts.
  culinary: Rita Etheridge delights in cooking Southern comfort dishes such as shrimp‑and‑grits and collard greens, often adding her garden‑grown basil and thyme for freshness and a splash of hot sauce
    for heat, yet she sometimes burns the edges of her cornbread when her phone distracts her with a new Instagram post.
  core: Rita Etheridge is a socially‑driven art enthusiast who blends Southern hospitality with modern creativity, juggling stress‑induced worry while championing community‑building projects.
background:
  cultural: Rita grew up in Stedman, a small town in Sampson County, North Carolina. Her upbringing reflects the close‑knit culture of rural Southern communities, where family ties, neighborly support,
    and community gatherings are central. Local traditions such as county fairs, church socials, and folk‑art events have shaped her appreciation for handmade crafts and storytelling. While rooted in these
    traditions, her exposure to digital media and contemporary art gives her a broader perspective, allowing her to blend classic Southern hospitality with modern creative expression.
attributes:
  skills: '[''Effective communication'', ''Event coordination'', ''Basic graphic design'', ''Social media management'', ''Volunteer leadership'', ''Time management'', ''Adaptability'']'
