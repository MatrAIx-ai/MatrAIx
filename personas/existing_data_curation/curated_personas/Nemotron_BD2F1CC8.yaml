  career_goals: Rita aims to turn her passion for community arts and event planning into a professional path. She plans to enroll in a community college program in arts administration or hospitality management
    within the next year, with the goal of securing a role as a community outreach coordinator for a local cultural center or nonprofit organization. She hopes to blend her artistic interests with her knack
    for organizing group activities by leading local arts festivals, workshops, or youth programs. Rita also wants to gain experience through internships or apprenticeships, and in the longer term she dreams
    of creating a small community space where residents can create, display, and share art while fostering connection.
