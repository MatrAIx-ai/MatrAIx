  career_goals: Safia dreams of becoming someone who can blend creativity with real‑world impact. She expresses a strong desire to be a scientist‑engineer who designs fun, practical inventions for kids,
    like interactive toys or educational games. She also imagines a future as a community leader—perhaps a youth theater director or a presenter on a kids’ science TV show—where she can use her charisma
    to inspire and entertain peers. Her competitive nature fuels an ambition to participate in science fairs and middle‑school robotics competitions.
