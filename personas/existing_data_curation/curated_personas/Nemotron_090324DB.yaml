  hobbies: '["Visiting local art galleries and museums","Sketching and food plating design","Hiking in the Ozarks","Food photography","Collecting vintage vinyl records","Home brewing and fermentation experiments","Traveling
    to culinary festivals","Playing guitar","Reading art‑history and design books","Exploring farmers’ markets"]'
  career_goals: Dylan aims to become an executive chef at a renowned farm‑to‑table restaurant in the Midwest within the next five years. He wants to launch his own pop‑up dining concept that blends visual
    art installations with seasonal Missouri produce, eventually turning it into a permanent venue. He also hopes to earn a regional Chef of the Year award, appear as a guest chef on local food television,
    and mentor aspiring chefs through community workshops. Long‑term, he envisions a culinary studio that doubles as an art gallery and culinary incubator.
