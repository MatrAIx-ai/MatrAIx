personas:
  professional: Dylan Asher, a 27‑year‑old culinary professional, blends meticulous butchery, sous‑vide precision, and eye‑catching plating with a relaxed, improvisational leadership style that encourages
    their kitchen crew to experiment while staying grounded in farm‑to‑table fundamentals.
  sports: Dylan Asher enjoys weekend hikes on the Ozark Trail with the local Trail Runners Club, follows the St. Louis Cardinals and the Kansas City Chiefs passionately, and occasionally joins a recreational
    soccer league at the Jefferson City YMCA, all while they maintain a laid‑back attitude toward structured fitness routines.
  arts: Dylan Asher frequents the Jefferson City Art Center, draws inspiration from Edward Hopper’s pastoral scenes and contemporary illustrator James Jean, and curates a vintage vinyl collection featuring
    Bob Dylan, The War on Drugs, and local folk artist Gillian Welch, weaving these artistic threads into their menu concepts.
  travel: Dylan Asher prefers spontaneous road trips that blend culinary discovery with landscape photography, having recently explored the farm markets of Asheville, North Carolina, and dreaming of a food
    pilgrimage to Oaxaca, Mexico, while they balance a modest travel budget with occasional splurges on boutique B&B stays.
  culinary: Dylan Asher’s culinary palate revels in reimagining Midwest classics like crisp fried catfish with a miso‑buttermilk glaze, pairing heirloom tomatoes, smoked paprika, and fermented kimchi to
    create dishes that marry comfort with avant‑garde flair, and they execute these creations with expert knife work, sous‑vide precision, and artistic plating.
  core: Dylan Asher is a curious, art‑obsessed chef who sketches menu ideas on napkins, hoards vintage vinyl, forgets to file taxes until the last minute, and thrives on spontaneous kitchen experiments,
    often relying on their intuition over strict schedules.
background:
  cultural: Dylan was raised in a small town on the outskirts of Jefferson City, Missouri, in a middle‑class white family with German‑Irish roots. His parents, both teachers, emphasized curiosity, community
    involvement, and appreciation for local traditions. Growing up he participated in county fairs, church potlucks, and seasonal harvest celebrations, which cultivated his love for regional ingredients
    and communal dining. He earned an Associate of Applied Science in Culinary Arts from Ozarks Technical Community College, immersing himself in Midwestern farm‑to‑table culture. His Midwestern upbringing
    blends modesty and self‑reliance with an openness to artistic expression, shaping his culinary voice that balances comfort‑food nostalgia with avant‑garde experimentation.
attributes:
