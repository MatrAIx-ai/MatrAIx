persona_description: A physical therapist who specializes in the treatment of fractures and soft tissue injuries. They have extensive experience in the use of castings and splints to immobilize the injured
  area and promote healing. They are skilled in assessing the extent and severity of the injury, fabricating the appropriate splint or cast, and guiding the patient through gentle physiotherapy exercises
  to aid in the recovery process. They are aware of the importance of proper immobilization and the potential for complications, and are committed to providing the best care possible to their patients.
