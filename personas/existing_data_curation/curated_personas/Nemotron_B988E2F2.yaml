personas:
  professional: Shawntel Gatson is a senior internal auditor who blends two decades of GAAP expertise, forensic accounting, and data‑analytics mastery in Python and Tableau with a curiosity‑driven yet practical
    approach, staying meticulously organized while flexibly adapting audit plans and using their cooperative nature to mentor teams, even as their emotional reactivity pushes them to seek supportive environments.
  sports: Shawntel Gatson keeps fit by cycling the Indiana Central Canal Trail with the South Bend Cycle Club, attending weekly yoga classes, and cheering on the Indiana Pacers while occasionally joining
    a casual pick‑up basketball game at the local community center during spring.
  arts: Shawntel Gatson nurtures a deep appreciation for jazz and soul, regularly spinning Miles Davis, John Coltrane, Aretha Franklin, and Stevie Wonder on their vintage turntable while hosting intimate
    listening evenings that blend those sounds with the rhythmic cadence of their custom‑built furniture projects.
  travel: Shawntel Gatson favors thoughtfully planned travel that mixes cultural immersion and outdoor adventure, having cycled through the historic streets of New Orleans, kayaked on Lake Michigan’s Mackinac
    Island, and long‑awaiting a solo retreat to Kyoto’s Zen gardens to deepen their mindfulness practice.
  culinary: Shawntel Gatson enjoys cooking at an intermediate level, often preparing collard greens simmered with smoked ham hocks, sweet‑potato casserole spiced with nutmeg, and occasional shrimp étouffée,
    while savoring a slice of fresh cornbread drizzled with honey and a splash of bourbon.
  core: Shawntel Gatson blends analytical precision with a hands‑on creative streak, navigating a career in audit while battling anxiety through yoga, coffee‑fueled woodworking sessions, and a habit of
    obsessively cataloguing every screw and spreadsheet alike.
background:
  cultural: Shawntel’s cultural identity is rooted in the African‑American experience of the Midwest. His grandparents migrated from the South during the Great Migration, settling in Indiana where they
    built a close‑knit community centered around church, family, and mutual support. Growing up, Shawntel absorbed the values of resilience, education, and service that were emphasized in his household
    and local Black churches. He remains active in the South Bend chapter of the National Association of Black Accountants, mentoring young professionals and advocating for greater representation in finance.
    Traditional celebrations such as Juneteenth and annual church gatherings keep him connected to his heritage, while his love of soul food, jazz, and storytelling reflects a deep respect for the cultural
    rhythms that have shaped his worldview.
