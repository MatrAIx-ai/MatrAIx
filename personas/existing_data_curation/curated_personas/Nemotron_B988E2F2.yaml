  career_goals: Shawntel aims to ascend to a senior leadership role within the next five years, targeting a manager or partner position at his accounting firm where he can guide the adoption of AI‑driven
    audit analytics. He plans to obtain the Certified Public Accountant (CPA) license if not already held, and pursue Certified Information Systems Auditor (CISA) certification to deepen his expertise in
    technology risk. In parallel, he wants to establish a mentorship program for aspiring Black accountants in South Bend, partnering with local universities and the National Association of Black Accountants.
    Long‑term, he envisions launching a boutique advisory practice focused on financial literacy and small‑business consulting for underserved communities, balancing professional impact with a schedule
    that supports his mental‑health needs.
