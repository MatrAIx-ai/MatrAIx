personas:
  professional: James Mendiola, a budding digital artist and indie game concept creator, fuses the oral storytelling traditions he absorbs at community gatherings with his love for sci‑fi tropes, turning
    sketchbook doodles and Minecraft builds into prototype characters while navigating schoolwork with a relaxed, improvisational attitude.
  sports: James Mendiola, who cuts loose on the soccer field with the Norman Youth Soccer Club during the fall and hikes local trails in spring, stays loosely fit by playing pickup basketball while cheering
    on the Oklahoma City Thunder and the Oklahoma Sooners football team, preferring spontaneous activity over rigid workouts.
  arts: James Mendiola infuses his digital art practice with the hyper‑realistic flair of Beeple, Loish's fluid character designs, and the storytelling elegance of Hayao Miyazaki, while his playlists feature
    indie singer‑songwriter Mitski, synth‑driven tracks by Childish Gambino, and the resonant drum patterns of powwow musicians he admires at community gatherings, creating a hybrid visual language that
    honors both modern pop culture and traditional narrative forms.
  travel: James Mendiola, who favors spontaneous, nature‑focused trips over meticulously planned vacations, has explored the red rocks of Sedona and the expansive trails of the Wichita Mountains, dreams
    of wandering through ancient temples in Kyoto and the glittering auroras of Reykjavik, and balances his wanderlust with a modest budget that keeps family road trips within reach.
  culinary: James Mendiola, an intermediate home cook who loves experimenting with bold flavors, often whips up crunchy tacos al pastor with fresh pineapple, tames his palate with buttery bison chili seasoned
    with roasted garlic and corn masa, and indulges in snack bowls of wild berries, quinoa, and honey‑glazed pumpkin seeds, all while occasionally burning the edges of his pizza when distracted by an online
    gaming match.
  core: James Mendiola navigates teenage life with a comic‑book imagination, a love for tribal storytelling, a habit of leaving school projects half‑finished, and a relentless curiosity that fuels every
    doodle and game idea.
background:
  cultural: James identifies as American Indian, belonging to a tribal community with deep roots in Oklahoma. He regularly attends tribal gatherings and cultural events at the local community center, where
    he learns traditional stories, languages, and crafts from elders. His family emphasizes respect for the land, storytelling as a way of preserving history, and the importance of community solidarity.
    These values influence his artistic expression, as he often integrates Indigenous motifs and themes into his drawings and future game concepts.
attributes:
  skills: '["Drawing","Digital illustration","Storytelling","Basic programming (Scratch/Python)","Beadwork and traditional craft","Strategic video gaming"]'
  hobbies: '["Sketching and digital illustration","Competitive video gaming","Hiking and nature exploration","Reading sci‑fi books and listening to podcasts","Participating in powwow workshops","LEGO building","Minecraft
    world creation"]'
  career_goals: James aspires to blend his love for art and technology by becoming a video game designer or digital animator, creating games that incorporate Indigenous narratives and aesthetics. He dreams
    of attending a specialized art or media program where he can refine his illustration skills and learn advanced coding. In the long term, he hopes to produce a graphic novel that celebrates his cultural
    heritage and perhaps mentor younger tribal members in artistic and tech pursuits.
