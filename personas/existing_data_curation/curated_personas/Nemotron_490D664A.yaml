personas:
  professional: Bruce Mccormack, a two‑year‑old block enthusiast, spends hours stacking wooden cubes into sturdy towers, channeling their curiosity and practical streak into early engineering play while
    delighting in the rhythmic clack of the pieces.
  sports: Bruce Mccormack, a two‑year‑old who loves chasing a bright orange ball during Little Kickers soccer sessions at the neighborhood park, also enjoys watching New Mexico United matches on family
    TV nights, and they emulate the Arizona Diamondbacks’ pitching stance while playing with a tiny baseball glove in the backyard, reflecting their energetic and sociable nature.
  arts: Bruce Mccormack, a two‑year‑old who delights in finger‑painting to the upbeat tunes of The Wiggles and Raffi, watches Pixar’s Toy Story and Paw Patrol, and they curl up with picture books illustrated
    by Eric Carle, letting these colorful experiences shape their budding imagination.
  travel: Bruce Mccormack, a two‑year‑old who enjoys sunny family road trips to Carlsbad Caverns and the sand dunes of White Sands National Park, and they dream of future visits to Disneyland’s Magic Kingdom
    and a beach holiday in Puerto Vallarta, balancing their love for local desert adventures with fascination for far‑off fireworks and palm trees.
  culinary: Bruce Mccormack, a two‑year‑old who prefers soft cheese quesadillas, chicken nuggets with avocado slices, and honey‑drizzled pancakes, often helps their mom stir batter with a wooden spoon while
    proudly insisting on extra sprinkles on vanilla yogurt, though they can be stubborn about finishing their veggies.
  core: Bruce Mccormack is a bright, socially‑savvy toddler who balances boundless curiosity with a surprisingly organized play style, loves community gatherings, and they occasionally throw a tantrum over
    missing snack crumbs.
background:
  cultural: Bruce is raised in a white American family in Rio Rancho, New Mexico. His cultural environment blends the suburban Southwest lifestyle with regional traditions such as Fourth of July parades,
    community barbecues, and occasional exposure to Hispanic influences through neighborhood festivals and Spanish language greetings. The desert landscape, warm climate, and family‑centered activities
    shape his everyday experiences.
