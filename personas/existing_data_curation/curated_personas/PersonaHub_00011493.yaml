persona_description: A biotechnology researcher who specializes in environmental biotechnology and has expertise in the analysis and tracing back of antimicrobial ingredients found in environmental samples.
  His research focuses on the persistence and persistence patterns of antimicrobial ingredients in the environment and their potential impacts on aquatic life. He is particularly interested in the use of
  antimicrobial personal care products and their effects on bottom-dwelling organisms in the environment. He is also interested in the potential long-term consequences of persistent antimicrobial compounds
  on the environment.
