personas:
  professional: Santiago Arboleda, a seasoned warehouse operations specialist with over two decades of expertise in shipping, receiving, and inventory control, leverages bilingual communication, proficiency
    in Manhattan Associates and SAP MM/WM, and hands‑on equipment skills to troubleshoot delays, while their curiosity‑driven yet pragmatic nature lets them improvise solutions despite a natural resistance
    to rigid schedules.
  sports: Santiago Arboleda, an avid follower of Liga MX who never misses Club América matches with his friends, joins the neighborhood pick‑up soccer group “Los Guerreros” for Saturday games and keeps
    fit with home‑based HIIT workouts, though they sometimes skip warm‑up stretches due to a spontaneous mindset.
  arts: Santiago Arboleda, a community‑center volunteer and part‑time acoustic guitarist, regularly performs classic corridos and serenades cherished by fans of Vicente Fernández and Los Tigres del Norte,
    and they also collect traditional papel picado while enjoying late‑night vinyl sessions of Carlos Santana.
  travel: Santiago Arboleda, a spontaneous road‑trip enthusiast, favors unplanned weekend escapes to destinations such as Santa Fe’s historic plaza, the pine‑covered trails of Cedar Falls State Park, and
    the vibrant streets of Guadalajara, balancing family commitments with a love for open‑road freedom.
  culinary: Santiago Arboleda, a proficient home cook, dedicates Saturday afternoons to perfecting authentic Mexican tamales and rich mole poblano using masa harina, ancho chilies, Mexican chocolate, and
    a blend of cinnamon and cloves, and they take pride in sharing these fragrant meals with family while occasionally experimenting with a fish‑taco‑style twist.
  core: Santiago Arboleda balances a meticulous warehouse mind with a spontaneous, community‑focused heart, juggling demanding logistics, weekend guitar sessions, and impromptu road trips while habitually
    mixing spreadsheets with spices.
background:
  cultural: Santiago is a first‑generation Mexican‑American whose parents emigrated from Jalisco. He grew up bilingual, speaking Spanish at home and English at school, which cultivated a deep respect for
    both cultures. Family traditions and community celebrations—such as Día de los Muertos, Navidad posada, and quinceañeras—remain central to his identity. He preserves Mexican culinary customs and values
    hospitality, mutual support, and strong family ties, while also embracing the Midwestern work ethic of Aurora, Illinois. His heritage shapes his warm, inclusive interpersonal style, enabling him to
    navigate both Mexican and American social settings comfortably. He actively engages with local Mexican-American networks, blending cultural pride with a broader suburban community perspective.
attributes:
  skills: '[''Inventory Management'', ''Warehouse Management Systems (WMS)'', ''ERP (SAP MM/WM)'', ''Forklift Operation'', ''Cycle Counting'', ''Shipping Documentation'', ''Bilingual Spanish-English Communication'',
    ''Problem Solving'', ''Spreadsheet Data Analysis'', ''Process Improvement'']'
  hobbies: '[''Cooking Mexican cuisine'', ''Playing acoustic guitar'', ''Watching Liga MX soccer'', ''Spontaneous road trips'', ''DIY home improvement'', ''Volunteering at cultural center'']'
  career_goals: Santiago aims to advance into a supervisory role within the next three to five years, such as Warehouse Lead or Inventory Control Manager, where he can mentor newer staff and drive workflow
    improvements. He plans to complete an associate's degree in logistics or supply chain management to build on his some‑college background, and to obtain a Certified Supply Chain Professional (CSCP) credential.
    Additionally, he envisions starting a small consulting side‑business that assists local Mexican‑American entrepreneurs with import regulations and warehousing strategies. He seeks a position that offers
    stable hours to balance family responsibilities while still allowing occasional flexibility for spontaneous projects and community involvement.
