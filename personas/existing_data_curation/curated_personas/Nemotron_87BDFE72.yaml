  hobbies: '[''Visiting art galleries and museums'', ''Reading philosophy and contemporary sociology'', ''Hiking in the Berkshires'', ''Fishing at local lakes'', ''Photography (urban and nature scenes)'',
    ''Playing piano (self‑taught)'', ''Attending Red Sox games'', ''Listening to true‑crime podcasts'', ''DIY woodworking projects'', ''Exploring avant‑garde art installations'']'
  career_goals: William aims to ascend to a precinct commander role within the next five years, leveraging his business acumen to modernize departmental budgeting and promote data‑centric policing practices.
    He is interested in spearheading a Specialized Investigation Unit that integrates technology and unconventional investigative methods. Ultimately, he envisions transitioning into a consulting position
    after retirement, advising municipal law‑enforcement agencies on strategic reforms and community‑focused initiatives, while maintaining a competitive stance that places him at the forefront of innovative
    policing.
