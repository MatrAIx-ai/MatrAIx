  career_goals: Federico aims to step into senior executive leadership within the next five years, ideally as a regional Vice President of Construction overseeing cross‑border projects. He is driven to
    champion sustainable building practices, expand the use of digital construction technologies, and build a mentorship pipeline for young professionals—especially those from Hispanic backgrounds. Obtaining
    PMP and LEED AP credentials, and eventually founding his own boutique construction firm that prioritizes community development and worker well‑being, are key milestones on his horizon.
