personas:
  professional: Federico Navia, a 38-year-old construction manager with over a decade of on-site leadership, leverages their bilingual communication, curiosity for emerging tech like BIM, drones, and IoT,
    and their compassionate, collaborative approach to guide multidisciplinary crews toward cost-controlled, safety-first projects—though they often worry about meeting aggressive timelines.
  sports: Federico Navia, a dedicated member of the El Paso Soccer Club, plays forward in a community league on Saturday mornings, cheers for the El Paso Locomotive FC and the Texas Rangers, and they balance
    the high-intensity matches with weekend hikes in the Franklin Mountains to stay fit and relieve stress.
  arts: Federico Navia immerses themselves in the vibrant rhythms of Carlos Santana and the soulful ballads of Selena, participates in traditional danza circles during Día de los Muertos celebrations, admires
    mural work inspired by Frida Kahlo, and unwinds with indie films by Alfonso Cuarón, which they consider essential to their sense of community and cultural pride.
  travel: Federico Navia favors meticulously planned road trips that blend adventure and family time, recently driving a caravan from El Paso to Santa Fe for a mural workshop and dreaming of exploring the
    historic streets of Granada, Spain, while they balance their travel budget against the ambition to fund their future boutique firm.
  culinary: Federico Navia, a seasoned grill master, routinely prepares smoky carne asada tacos with hand-pressed corn tortillas, fresh tomatillo salsa verde, and roasted poblano peppers, occasionally experiments
    with quinoa-filled enchiladas, and they enjoy sipping fine Tequila cocktails after dinner with friends, reflecting their love for authentic flavors and culinary creativity.
  core: Federico Navia balances a relentless drive to modernize construction with a lingering worry that each deadline could slip, often losing sleep over spreadsheets, yet they burst into spontaneous salsa
    steps at community events, reminding everyone that work and joy can coexist.
background:
  cultural: Federico is a first‑generation Mexican‑American raised in El Paso, Texas, a city that straddles the U.S.–Mexico border. He grew up bilingual, navigating both English and Spanish daily, and his
    family maintains strong ties to Mexican traditions, celebrating holidays such as Día de los Muertos, Cinco de Mayo, and Semana Santa. His cultural identity is reflected in his culinary passions, community
    involvement, and a deep sense of responsibility toward helping his neighborhood thrive. This bicultural perspective informs his collaborative work style and his commitment to fostering inclusive, harmonious
    project teams.
