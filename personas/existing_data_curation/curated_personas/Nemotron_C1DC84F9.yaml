  hobbies: '[''Car restoration'', ''Photography of urban and automotive subjects'', ''Visiting art galleries and street‑art tours'', ''Playing guitar and exploring jazz/salsa music'', ''Cooking Puerto Rican
    cuisine'', ''Hiking and lake kayaking'', ''Reading science‑fiction and business literature'', ''Strategy video games'']'
  career_goals: Sergio aims to progress from his current sales position to a parts manager role within the next two to three years, overseeing a broader inventory and leading a team of sales associates.
    He plans to complete his bachelor’s degree in Business Administration with a focus on supply‑chain management, and to earn a Certified Supply Chain Professional (CSCP) credential. Long‑term, he envisions
    launching an online marketplace that curates specialty performance parts for the growing Latin American enthusiast community, positioning himself as a market leader who combines technical expertise
    with cultural insight. Throughout his career, he is driven by competitive benchmarks, striving to rank consistently in the top 5% of sales performers and to implement data‑driven process improvements
    that boost profitability.
