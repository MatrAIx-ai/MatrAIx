  hobbies: '["Drawing characters from books", "Painting landscapes", "Reading adventure/science-fiction novels", "Playing soccer", "Dancing (pop and country choreography)", "Nature exploration (collecting
    leaves and stones)", "Crafting friendship bracelets", "Scratch coding (games and animations)", "Drama club performances"]'
  career_goals: Driven by her curiosity and love of art, Irene aspires to become an environmental illustrator who creates vibrant murals and picture books that teach children about wildlife and conservation.
    She aims to attend a high school with strong visual‑arts and science programs, then study graphic design or biology at a university where she can merge these fields. In the near term, she plans to refine
    her drawing techniques, take advanced art classes, and join a youth leadership club to develop organizational skills for future community projects. Ultimately, she hopes to work in a community center
    or museum in Kentucky, leading workshops for peers, organizing local art festivals, and using her creative talents to promote environmental stewardship.
