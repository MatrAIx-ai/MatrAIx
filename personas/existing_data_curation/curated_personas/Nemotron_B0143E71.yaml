  career_goals: Steve’s ambition is oriented toward careers that combine structure, problem‑solving, and tangible results. He dreams of becoming a civil engineer or architect, because he enjoys designing
    buildings and drawing plans. He also shows interest in computers and hopes to one day be a software developer, where he can apply his logical thinking and love for organized coding.
