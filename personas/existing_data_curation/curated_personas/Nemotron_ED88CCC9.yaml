  career_goals: Although Kamala is not currently part of the formal workforce, she is driven to channel her expertise into purposeful, low-profile projects. Her primary ambition is to launch a modest online
    boutique that sells her handmade knitwear and crocheted accessories, allowing her to monetize her craft without the stress of a traditional job. She also aims to obtain a community-based certification
    in elder-care volunteering, so she can offer practical assistance to senior neighbors while reinforcing her competitive streak by excelling in the program. A long-term personal goal is to complete a
    memoir chronicling her family’s Great Migration story, blending her curiosity about history with her desire to leave a tangible legacy for her grandchildren. Financially, she seeks to build a small
    emergency fund through disciplined savings, ensuring peace of mind and reducing stress.
