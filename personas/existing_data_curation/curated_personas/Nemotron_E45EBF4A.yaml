personas:
  professional: Diane Moskal, a 22‑year‑old full‑stack developer, blends their mastery of Python, React, and Node.js with a painter’s eye for UI/UX to craft clean, responsive web apps while championing
    agile practices and mentoring high‑school girls at a community coding workshop.
  sports: Diane Moskal, a devoted follower of the Kansas City Chiefs and Royals, spends their weekends hiking the Flint Hills with the Sunflower Trail Runners club, supplements their outdoor routine with
    occasional yoga sessions, and prefers low‑impact cardio over competitive sports, viewing fitness as a meditative complement to their coding life.
  arts: Diane Moskal channels their love for the Kansas prairie into vivid digital illustrations inspired by the color fields of Georgia O'Keeffe and the atmospheric brushwork of Andrew Wyeth, frequently
    visits local galleries featuring mid‑century modern art, playlists Sufjan Stevens and Bon Iver while sketching, and unwinds playing narrative‑driven indie games like Journey and Hades.
  travel: Diane Moskal, a thrifty wanderer, plans their trips with meticulous Google spreadsheets, favors solo adventure trips to natural wonders such as Yellowstone and the Badlands in summer and cultural
    immersions like a weekend in Kyoto during cherry blossom season, always packing their sketchbook to capture new vistas.
  culinary: Diane Moskal, an experimental home cook with moderate skill, often whips up quinoa‑kale salads drizzled with lemon‑tahini, bison chili seasoned with smoked paprika and fresh sage, and savors
    artisanal avocado toast topped with radish and microgreens, while occasionally treating themselves to a steaming bowl of Tonkotsu ramen at their favorite downtown ramen bar.
  core: Diane Moskal, a quiet tech‑savvy artist, balances code and color, spends midnight debugging under soft LED lights, and can’t resist buying a fresh set of watercolor paints the moment a new indie
    game releases.
background:
  cultural: Diane grew up in Saline County, Kansas, within a white Midwestern family that values community, hard work, and modesty. Her upbringing was shaped by small‑town traditions such as county fairs,
    church picnics, and a close‑knit school environment where robotics and art clubs were both prominent. This background instilled in her a practical work ethic, an appreciation for understated, functional
    design, and a collaborative spirit that prioritizes harmony. While she connects to the region's agricultural heritage, her curiosity and openness to new ideas reflect a blend of classic Midwestern values
    and a modern, globally aware mindset.
