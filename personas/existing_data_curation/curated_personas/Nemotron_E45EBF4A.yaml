  career_goals: Diane aims to advance to a senior full‑stack developer role within the next three years, eventually leading a small team that merges technical excellence with artistic design. She plans
    to earn an AWS Certified Solutions Architect credential to broaden her cloud expertise and to deepen her UI/UX capabilities through a specialized Human‑Computer Interaction certificate. Long‑term, she
    hopes to launch an open‑source project that empowers artists to create interactive web experiences, and she aspires to mentor more women entering the tech field, especially in her Midwest community.
