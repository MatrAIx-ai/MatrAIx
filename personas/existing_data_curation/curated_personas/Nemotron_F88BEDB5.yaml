personas:
  professional: Sheila Moreno, a bilingual teaching assistant in a diverse Bay Area school district, leverages their curiosity for avant‑garde art and competitive drive to integrate visual and performing
    arts into core curricula, delivering differentiated instruction through Google Classroom and SMART Boards while maintaining an organized yet flexible classroom management style.
  sports: Sheila Moreno enjoys weekend hikes along the Golden Gate National Recreation Area’s coastal trails, follows the San Francisco Giants baseball season and the Golden State Warriors basketball games,
    and participates in a local yoga studio’s sunrise classes to stay flexible and grounded.
  arts: Sheila Moreno frequents contemporary galleries showcasing artists like Yayoi Kusama, Kehinde Wiley, and James Turrell, sketches watercolors inspired by their installations, and captures candid street
    moments with a Fujifilm X‑100, and they find that the avant‑garde works of Jeff Koons and Marina Abramović fuel both their teaching philosophy and personal expression.
  travel: Sheila Moreno prefers meticulously planned trips that blend artistic immersion and natural exploration, having recently photographed the murals of Valencia, trekked the redwood forests of Humboldt
    County, and dreaming of a future study tour of the Studio Ghibli Museum in Mitaka, Japan, and they savor the surprise of spontaneous street‑photography moments wherever they go.
  culinary: Sheila Moreno delights in preparing family‑heritage dishes such as pupusas stuffed with cheese and refried beans, crisp yuca frita, and sweet pastelitos filled with guava, while experimenting
    with seasonal produce like heirloom tomatoes and fresh basil, often pairing meals with a glass of crisp Sauvignon Blanc, and they take pride in sharing these plates with friends during intimate dinner
    gatherings.
  core: Sheila Moreno blends a competitive, art‑driven mindset with disciplined budgeting, a habit of obsessively arranging watercolor palettes at night, and a penchant for turning every classroom lesson
    into a visual gallery, even if it means they occasionally neglect dental floss.
background:
  cultural: Sheila was raised by Salvadoran immigrants in the San Francisco Bay Area, growing up bilingual in Spanish and English. Her family maintained strong ties to Salvadoran traditions—celebrating
    Christmas posadas, listening to cumbia and marimba music, and preparing home‑cooked meals that highlight the flavors of her parents’ homeland. She actively participates in local Salvadoran community
    events, such as the annual Fiesta Salvadorena, and volunteers with organizations that support Latino youth education. While embracing her American identity, she draws on her heritage to inform her teaching
    style, incorporating multicultural perspectives and fostering an inclusive classroom environment that honors diverse cultural narratives.
attributes:
  skills: '[''Lesson material preparation and adaptation'', ''Differentiated instruction support'', ''Bilingual communication (Spanish-English)'', ''Arts integration into curriculum'', ''Educational technology
