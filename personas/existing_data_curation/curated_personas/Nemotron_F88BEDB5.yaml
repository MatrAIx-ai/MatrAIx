    and feedback'', ''Intercultural competence'']'
  hobbies: '[''Visiting contemporary art galleries'', ''Watercolor painting'', ''Cooking Salvadoran cuisine'', ''Hiking coastal trails in the Bay Area'', ''Yoga and meditation'', ''Reading educational theory
    and avant‑garde art books'', ''Volunteer ESL tutoring for immigrants'', ''Street photography'']'
  career_goals: Sheila aims to transition from a teaching assistant to a fully credentialed bilingual teacher within the next three years, completing a bachelor’s degree in elementary education and obtaining
    California’s Multiple Subjects Teaching Credential. She is driven to become an arts‑integration specialist, designing curricula that weave visual and performing arts into standard subjects to boost
    engagement and critical thinking. Long‑term, she envisions leading a district‑wide multicultural curriculum initiative and launching a community outreach program that partners local galleries with Salvadoran‑American
    youth, providing mentorship, exhibition opportunities, and cultural pride. Her competitive nature fuels her pursuit of professional awards and leadership positions that acknowledge innovative educational
    practices.
