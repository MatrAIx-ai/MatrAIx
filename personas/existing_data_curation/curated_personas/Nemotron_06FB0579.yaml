  hobbies: '[''Cheerleading'', ''Teen drama club'', ''Volunteering at the animal shelter'', ''Hiking local trails'', ''Playing competitive online games'', ''DIY crafts and jewellery making'', ''Baking desserts'',
    ''Listening to pop music'', ''Reading fantasy novels'', ''Photography of rural scenery'']'
  career_goals: Jessica wants a career that blends her love of people, hands‑on work, and practical stability. She is considering enrolling in a community‑college program for veterinary technology because
    she enjoys caring for animals at the local shelter, while also exploring culinary arts to eventually open a small bakery that could double as a community gathering spot. Simultaneously, she dreams of
    building a modest online presence where she shares DIY craft tutorials and baked‑good reviews, hoping to turn that platform into a side business. Long‑term, she hopes to mentor other teens in her town,
    helping them navigate school and mental‑health challenges, and sees herself either as a youth program coordinator or a guidance counselor after further education.
