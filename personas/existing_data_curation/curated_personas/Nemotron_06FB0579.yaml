personas:
  professional: Jessica Scoville, a high‑school student who channels their outgoing spirit into coordinating the drama club, cheering for the basketball team, and organizing animal‑shelter volunteering,
    blends practical DIY skills, beginner web‑design know‑how, and a competitive edge into budding leadership that foreshadows a future as a veterinary‑tech‑café entrepreneur, and they manage to pull it
    off despite a habit of last‑minute planning.
  sports: Jessica Scoville rallies as a cheerleader for the Riverton High School Raptor basketball squad, roots for the St. Louis Cardinals and the Kansas City Chiefs, hikes the Ozark Trail with the local
    outdoor club, and squeezes in weekend pick‑up soccer games, balancing their competitive drive with a love for group sport, and they thrive on the community spirit these activities provide.
  arts: Jessica Scoville curates their Instagram feed with indie‑pop tracks from Tame Impala, Billie Eilish, and Phoebe Bridges, swaps fantasy reads like The Name of the Wind for after‑school drama rehearsals,
    strings acoustic guitar chords at church gatherings, and crafts friendship bracelets inspired by the vibrant art of Hayley Leigh, and they eagerly share each creation with their online followers.
  travel: Jessica Scoville prefers spur‑of‑the‑moment road trips to nearby Lake of the Ozarks and weekend hikes at Hot Springs National Park, while dreaming of a culinary pilgrimage to Paris’s patisseries
    and a cultural immersion in Tokyo’s gaming districts, and they balance budget constraints with a yearning for new scenery.
  culinary: Jessica Scoville delights in baking soft chocolate‑chip cookies sprinkled with flaky sea‑salt, velvety red‑velvet cupcakes topped with tangy cream‑cheese frosting, and whipping up simple herb‑infused
    focaccia, proudly sharing these treats at school and the animal shelter, and they rate each recipe on Instagram.
  core: Jessica Scoville is a sociable, competitively‑driven teen who juggles spontaneous creativity and occasional anxiety, often trading last‑minute plans for fresh ideas while they indulge in binge‑gaming
    and late‑night baking marathons.
background:
  cultural: Jessica grew up in Marble Hill, a small town in Bollinger County, Missouri, within a close‑knit Midwestern community that values family, faith, and local tradition. Her family has deep roots
    in the area, attending a Methodist congregation where she sings in the youth choir and participates in church‑hosted service projects. Community events like the annual county fair, high‑school sports
    games, and church picnics shape her social life and reinforce a sense of belonging. While she embraces the modest, practical sensibilities of her rural upbringing—self‑reliance, hard work, and respect
    for established customs—Jessica also absorbs modern digital culture through social media, blending local heritage with contemporary ideas.
attributes:
