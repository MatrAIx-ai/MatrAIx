  hobbies: '[''Gospel choir singing'', ''Pick‑up basketball'', ''Backyard gardening'', ''Listening to classic R&B and jazz'', ''Cooking Southern comfort food'', ''Road trips to national parks with his wife'',
    ''Attending live comedy shows'', ''Participating in the Twin Cities African American Festival'']'
  career_goals: Ernest aims to secure a senior leadership role—such as Audit Director or Controller—within the next five years, leveraging his extensive experience to influence strategic decision‑making.
    He plans to attain CPA certification if not already held, and is exploring the possibility of launching a boutique audit consultancy focused on midsize firms in the Twin Cities. Mentoring the next generation
    of accountants is a key ambition, as is establishing a structured retirement plan that balances continued professional engagement with increased personal flexibility.
