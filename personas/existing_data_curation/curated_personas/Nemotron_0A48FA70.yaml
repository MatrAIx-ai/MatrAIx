  hobbies: '["Gardening and plant care","Baking pies and Southern cooking","Knitting and crocheting","Quilting","Storytelling and sharing family history","Attending church services and ladies’ group","Crossword
    puzzles and large‑print reading","Walking and bird‑watching","Visiting farmers’ market"]'
  career_goals: At 98, Pearl’s ambitions focus on staying healthy, maintaining her independence, and enriching the lives of her family and community. She hopes to keep her garden flourishing through each
    season, preserve her family’s culinary heritage by compiling a handwritten cookbook of treasured recipes, and mentor younger relatives in traditional crafts like quilting and cooking. Pearl also wishes
    to remain an active volunteer at her church, assisting with senior‑citizen outreach programs and sharing her stories with local history groups. Ultimately, she aims to leave a lasting legacy of warmth,
    generosity, and practical wisdom for future generations.
