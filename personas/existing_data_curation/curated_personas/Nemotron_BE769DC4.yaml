  career_goals: Although retired, David’s ambition is to remain self‑sufficient and physically healthy, ensuring his daily routines stay predictable and purposeful. He aims to mentor younger family members
    in woodworking and practical home‑repair skills, document his life story for future generations, and continue volunteering at his church’s outreach program, where his disciplined planning can benefit
    small‑group initiatives.
