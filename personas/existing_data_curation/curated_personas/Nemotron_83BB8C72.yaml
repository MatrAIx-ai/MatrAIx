  hobbies: '[''Visiting Art Galleries (Albright‑Knox, Buffalo Museum of Science exhibits)'', ''Photography (urban and nature)'', ''DIY Electronics (Arduino, Raspberry Pi)'', ''Hiking and Snowshoeing in
    the Erie County trails'', ''Reading Science Fiction and Contemporary Philosophy'', ''Playing Acoustic Guitar'', ''Home Brewing Craft Beer'', ''Cooking experimental recipes'', ''Strategy Board Games
    (e.g., Settlers of Catan, Terraforming Mars)'']'
  career_goals: In the next two to three years, Zacheriah aims to advance to a regional sales manager role, overseeing a larger territory and driving at least a 15% year‑over‑year revenue increase. He plans
    to champion the adoption of digital sales tools and earn a Lean Six Sigma Green Belt to further enhance operational efficiency. Medium‑term, he envisions becoming head of sales operations for a manufacturing
    firm, shaping go‑to‑market strategies and influencing product development. Ultimately, his long‑term ambition is to attain a VP of Sales or Chief Commercial Officer position, where he can integrate
    his disciplined, data‑driven approach with his creative, art‑inspired perspective. Personal goals include securing financial stability for his family, purchasing a home in the Buffalo suburbs, and cultivating
    a healthier work‑life balance to mitigate stress.
