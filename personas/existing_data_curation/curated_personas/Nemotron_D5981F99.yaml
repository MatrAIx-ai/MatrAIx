  hobbies: '[''Personal coding projects'', ''Arduino electronics'', ''Woodworking'', ''Science and philosophy reading'', ''Stargazing'', ''Hiking'', ''Logic puzzles'', ''Tech podcasts'']'
  career_goals: Robert aims to complete a bachelor’s degree in Computer Science or Electrical Engineering while continuing his self‑directed learning. He aspires to secure a remote software development
    or data‑analysis role that lets him work independently, apply his methodical approach, and deliver tangible results. Over the longer term, he hopes to launch a side venture creating custom CNC‑cut furniture
    or electronic accessories for local customers, blending his technical expertise with his woodworking hobby.
