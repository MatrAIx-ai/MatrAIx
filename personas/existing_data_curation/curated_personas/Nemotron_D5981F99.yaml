personas:
  professional: Robert Novak is a methodical budding software engineer who leverages Python and JavaScript skills, solid data analysis with Excel and SQL, and hands‑on hardware tinkering to deliver remote,
    independent projects while meticulously planning each sprint and documenting progress in clear technical writing.
  sports: Robert Novak is a quiet outdoor enthusiast who hikes the Rocky Mountain foothills with the Boulder Hiking Club, follows the Denver Broncos, Colorado Rockies, and Denver Nuggets on game day, and
    occasionally joins a local pick‑up ultimate frisbee match for cardio.
  arts: Robert Novak finds creative solace in listening to progressive rock bands like Pink Floyd and instrumental post‑rock groups such as Explosions in the Sky, while they also attend indie film screenings
    featuring directors like Jim Jarmusch and peruse science‑fiction short stories by Ted Chiang.
  travel: Robert Novak prefers meticulously planned solo trips, having already backpacked through Yosemite and the Grand Canyon, and now dreams of chasing the aurora borealis in Iceland, balancing travel
    costs with a part‑time job and a modest travel fund.
  culinary: Robert Novak enjoys cooking simple, protein‑rich meals like teriyaki salmon with quinoa, homemade ramen with miso broth, and often experiments with smoked cedar chips on grilled vegetables,
    while their culinary skill level sits at confident home‑cook but not a chef.
  core: Robert Novak is a solitary, methodical tech tinkerer who obsessively budgets, safeguards health with disciplined routines, and channels curiosity into quiet hobbies while occasionally neglecting
    social engagements and regular meals.
background:
  cultural: Robert grew up in Jasper, a small town in northern Alabama, within a close‑knit white working‑class community. His family’s roots are in the Appalachian‑influenced part of the state, and he
    was raised with Southern hospitality, a strong sense of duty to family, and an appreciation for local traditions such as church gatherings, community barbecues, and high school football weekends. While
    he respects these customs, his exposure to the internet and academic environments has broadened his worldview, blending traditional Southern values with a modern, tech‑savvy perspective.
