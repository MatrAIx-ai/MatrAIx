  career_goals: Alan aspires to become an astronaut who explores space, a museum curator who showcases art, or an inventor who creates new gadgets. He hopes to win science fairs and art competitions, and
    later design interactive games that blend storytelling and technology. His calm resilience and love for new ideas motivate him to pursue careers that require curiosity, creativity, and disciplined learning.
