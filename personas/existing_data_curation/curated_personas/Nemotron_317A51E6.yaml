personas:
  professional: A budding young game developer, Alan Shoner channels the strategic thinking of chess and the structural creativity of LEGO into designing simple, colorful Scratch games that often feature
    birdwatching themes.
  sports: Alan Shoner follows the Los Angeles Lakers and New York Yankees with the same competitive zeal they bring to chess, participates in the local youth soccer club "Falcon FC", and spends weekend
    mornings biking to the neighborhood park for birdwatching jogs.
  arts: Alan Shoner spends Saturday mornings at the city museum and the community gallery ArtSpace, sketching inspirations from Van Gogh’s swirling skies and the graphic storytelling of Alex Ross while
    collecting limited‑edition graphic novels by Jeff Smith.
  travel: Alan Shoner enjoys short, well‑planned road trips to nearby state parks for birdwatching, has visited Legoland California and the Grand Canyon with family, and dreams of exploring the museums
    and cherry‑blossom festivals of Kyoto during a future summer vacation.
  culinary: Alan Shoner loves building edible “LEGO” sandwiches with crunchy carrots, devouring pepperoni pizza, and baking chocolate chip cookies with the help of a parent, all while insisting on adding
    extra mozzarella to their favorite spaghetti carbonara.
  core: Alan Shoner is a calm, competitively minded eight‑year‑old who blends artistic curiosity with tactical play, never misses a sketch session, and saves every spare cent for the next LEGO masterpiece.
background:
  cultural: Alan grows up in a white, middle‑class American family in Passaic, New Jersey. His household observes traditional U.S. holidays such as Thanksgiving, Christmas, and Independence Day, while also
    participating in the city’s multicultural festivals that expose him to diverse foods and customs. Family stories trace roots to European ancestry (e.g., Irish and German), and his neighborhood’s ethnic
    mix encourages an appreciation for varied cultural expressions, which complements his love for art and new ideas.
