personas:
  professional: Maria Piza is an aspiring junior game creator who uses Scratch to craft short, vivid animations of bright nature scenes and imagined worlds, channeling their curiosity, artistic flair, and
    competitive spirit to out‑do classmates in school coding challenges, even though they sometimes resist the structured deadlines those projects demand.
  sports: Maria Piza is an energetic soccer enthusiast who plays forward for the local Junior Strikers club, idolizes the U.S. women’s national team, and frequently challenges friends in park matches, balancing
    their competitive drive with occasional impromptu games of checkers on the sidelines, and they delight in celebrating each goal with a triumphant fist pump.
  arts: Maria Piza is a vivid visual storyteller who fills sketchbooks with bright, nature‑inspired scenes and fantastical realms, draws inspiration from artists like Frida Kahlo, Georgia O’Keeffe, and
    contemporary cartoonists, and channels their curiosity into experimenting with watercolors, markers, and collage, and they often enter school art contests where their competitive edge shines.
  travel: Maria Piza is a curious explorer who has trekked the nearby state park’s waterfall, built sandcastles on the sunny beach of Santa Cruz, and dreams of wandering the redwood forests of California
    and the historic plazas of San Miguel de Allende, favoring family‑guided trips that blend nature hikes with hands‑on craft workshops, and they often sketch travel journals during each adventure.
  culinary: Maria Piza is a budding kitchen helper who loves to assist in making simple quesadillas with melty cheese, squeeze fresh mango and lime for bright agua fresca, and toss colorful fruit salads
    featuring strawberries, pineapple, and kiwi, while occasionally sneaking a bite of chocolate chip cookies, reflecting their spontaneous approach to cooking.
  core: Maria Piza is an eight‑year‑old whirlwind of curiosity and competition who paints bright worlds, codes playful animations, scores goals on the soccer field, saves allowance with disciplined pockets,
    calmly manages mild allergies, and turns everyday chores into creative adventures.
background:
  cultural: Maria is raised in a Mexican‑American household in Oakwood, GA. At home, Spanish is spoken alongside English, and the family celebrates traditions such as Día de los Muertos, Cinco de Mayo,
    and Christmas posadas with vibrant decorations and homemade foods like tamales, tacos, and atole. She attends a local elementary school that offers a bilingual program, allowing her to strengthen both
    languages. Family gatherings often include storytelling, folk music, and dance, connecting her to her Mexican roots while also embracing Southern community events and church festivals. This blend of
    cultures shapes her identity, fostering a love for art, food, and shared celebrations.
