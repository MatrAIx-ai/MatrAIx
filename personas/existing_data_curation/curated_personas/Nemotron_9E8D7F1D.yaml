personas:
  professional: Rajeev Sola is a 28‑year‑old logistics driver turned aspiring fleet coordinator who leverages their CDL expertise, meticulous route‑optimization skills, and budding graphic‑design talent
    to streamline deliveries for local art galleries while positioning themselves for a supervisory role.
  sports: Rajeev Sola is a 28‑year‑old devoted Steelers fan who hosts Saturday game watch parties with friends, hikes the rugged trails of Raccoon Creek State Park on weekends, plays pickup basketball at
    the local community center, and cheers for the Pittsburgh Riverhounds soccer club, blending competitive spirit with a love for the outdoors.
  arts: Rajeev Sola is a 28‑year‑old street photographer who roams downtown Pittsburgh capturing steel‑mill silhouettes, frequents the Carnegie Museum of Art to study works by Andy Warhol and Robert Qualters,
    sketches in a battered sketchbook after visiting galleries, and draws inspiration from the indie musician St. Vincent as a soundtrack to their creative process.
  travel: Rajeev Sola is a 28‑year‑old weekend traveler who often drives to Ohiopyle State Park for white‑water rafting, plans annual trips to New York City’s contemporary art fairs, dreams of a future
    European tour of Renaissance museums, yet balances these ambitions with a modest travel budget and the need to maintain their delivery schedule.
  culinary: Rajeev Sola is a 28‑year‑old home cook who masters pierogi fillings for neighborhood potlucks, experiments with spicy Korean bibimbap and occasional homemade sushi rolls, boasts an intermediate
    skill level in plating dishes but habitually over‑salts the ramen broth, reflecting both culinary curiosity and a penchant for bold flavors.
  core: Rajeev Sola is a methodical logistics professional who blends a love for steel‑town football, street photography, and experimental cooking into a balanced life, occasionally over‑schedules themselves
    yet always finds time to snap a perfect shot of a rusted bridge at dusk.
background:
  cultural: Rajeev grew up in a working‑class family in the greater Pittsburgh area, with roots in Irish and German ancestry common among the white population of Allegheny County. His father worked in the
    regional steel industry while his mother taught at a local public school. The community’s emphasis on hard work, reliability, and loyalty to local sports teams shaped his values. He was raised with
    a blend of Mid‑western pragmatism and an appreciation for the city’s industrial heritage and burgeoning arts scene. Attending a community college in the region exposed him to a diverse student body,
    fostering his open‑mindedness toward new ideas and unconventional thinking. Local customs—such as Saturday Steelers gatherings, sharing pierogies at neighborhood potlucks, and a love for outdoor recreation
    in the nearby state parks—remain integral to his identity.
