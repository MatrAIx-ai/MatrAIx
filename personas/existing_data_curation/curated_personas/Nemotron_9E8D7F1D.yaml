  career_goals: Rajeev aims to advance from hands‑on driving to a supervisory role within logistics. Over the next three years he plans to obtain an advanced certification in fleet management and transition
    to a fleet coordinator position, overseeing route assignments and driver performance. He also envisions launching a niche delivery service that caters to local artists and small galleries, combining
    his love for art with his logistics expertise. Ultimately, he hopes to become a regional logistics manager, implementing sustainable transportation practices and possibly integrating electric vehicles
    into the fleet. He is also interested in pursuing further education—perhaps an associate degree in business administration—to solidify his managerial credentials.
