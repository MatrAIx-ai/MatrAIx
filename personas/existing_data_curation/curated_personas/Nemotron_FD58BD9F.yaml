  career_goals: Thavone aims to become a senior maintenance supervisor for the Bethel regional hub, overseeing repair and infrastructure projects across multiple villages. He envisions establishing a community‑run
    repair co‑op that blends modern technical training with traditional Alaska Native knowledge, providing affordable services and mentorship for youth. Long‑term, he hopes to create annual cultural‑arts
    festivals that showcase local crafts and contemporary art, while continuing his own artistic development and possibly exhibiting his work in regional galleries.
