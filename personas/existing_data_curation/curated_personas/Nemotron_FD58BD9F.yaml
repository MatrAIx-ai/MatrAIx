personas:
  professional: Thavone Baker combines a hands‑on mastery of electrical, HVAC, plumbing, and carpentry with a charismatic flair for leading community workshops, making them the go‑to troubleshooter and
    trainer in remote villages while ambitiously pursuing a senior maintenance supervisor role overseeing regional infrastructure projects.
  sports: Thavone Baker stays fit by cross‑country skiing in winter, fishing and hunting in summer, participates in a local ice‑fishing league, cheers on the Seattle Seahawks, Seattle Kraken, and the Alaska
    Anchorage Seawolves, and they are an active member of the Bethel Community Hiking Club.
  arts: Thavone Baker blends traditional carving with digital illustration, drawing inspiration from light artist James Turrell, indie folk musician Sufjan Stevens, photographer Sebastião Salgado, and the
    storytelling rhythms of local throat singers, while regularly attending community drum‑dancing events and midnight sketch sessions.
  travel: Thavone Baker prefers meticulously planned road trips that combine photography opportunities with cultural immersion, having captured auroras over Iceland, wildlife in Yellowstone, and the midnight
    sun in Norway, and they dream of a guided canoe expedition through the Amazon rainforest.
  culinary: Thavone Baker delights in cooking salmon baked with maple glaze, reindeer stew with root vegetables, and bannock topped with wild berry jam, while also savoring spicy miso ramen at a local Japanese
    eatery and experimenting with smoked trout pâté for friends.
  core: Thavone Baker is a relentless tinkerer and imaginative storyteller who can be found late at night calibrating drones, sketching auroras, and occasionally forgetting to water houseplants or pay a
    utility bill on time.
background:
  cultural: Thavone is a Yup'ik Alaska Native raised in Akiak, a small village on the Kuskokwim River. He grew up immersed in a subsistence lifestyle, learning hunting, fishing, and gathering while speaking
    Yup'ik fluently. His cultural values emphasize community interdependence, respect for the natural environment, and oral tradition. He actively participates in seasonal celebrations, drum dances, and
    potlatch gatherings, and incorporates Yup'ik motifs into his artwork. Aware of the challenges his community faces—from climate change to limited resources—he strives to blend modern technical skills
    with his heritage to support and preserve his people’s way of life.
