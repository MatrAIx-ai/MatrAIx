persona_description: A space shuttle astronaut who is part of a multi-national crew and is tasked with assembling and installing the Japanese Kibo science module at the International Space Station. The
  astronaut is responsible for carrying out spacewalks, moving the module aboard the station, and assisting with the assembly of Dextre, the Canadian robot arm. The astronaut is also involved in the checkout
  of the Japanese module and will be working alongside a team of astronauts from other countries. The astronaut is expected to be physically and mentally exhausted after the mission, but is confident that
  they can complete the task despite the challenges.
