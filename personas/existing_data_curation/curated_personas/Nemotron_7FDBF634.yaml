  hobbies: '["Reading historical biographies and African American literature","Genealogical research using online archives","Backyard gardening (herbs and vegetables)","Hiking local trails in Harriman State
    Park","Listening to jazz, blues, and soul music on vinyl","Knitting and crocheting handmade gifts","Cooking Southern-inspired dishes with contemporary twists","Participating in a small book club","Attending
    community lectures and museum exhibits"]'
  career_goals: Antonia aims to remain actively engaged in lifelong learning and to give back to her community through mentorship and knowledge sharing. She plans to volunteer as a mentor for early‑career
    teachers at the local school district, offering practical guidance drawn from her experience. She seeks to develop and lead a series of workshops on African American genealogy and local history targeted
    at senior residents, combining her curiosity for new ideas with her practical teaching background. Antonia also aspires to author a memoir or collection of essays recounting her journey as a Black educator,
    hoping to contribute to the representation of Black voices in regional literature. Continuing her personal curiosity, she intends to explore basic digital photography and introductory coding, not to
    pursue formal employment but to enrich her creative projects. Ultimately, she hopes to foster intergenerational connections in her neighborhood through small reading circles and shared community projects.
