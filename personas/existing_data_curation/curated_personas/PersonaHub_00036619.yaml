persona_description: A scientist who specializes in the study of groundwater quality and the factors affecting it, particularly in the context of natural and human-affected factors. This scientist uses
  ground-water geochemical analyses and mathematical models to identify the factors that determine the concentration of contaminants in groundwater, especially where the concentration is different at the
  surface than at depth, and where pumping varies with time. They are interested in the electric power generation potential from identified geothermal systems, the Gulf of Mexico Integrated Science program
  that evaluates the transport and sedimentation of contaminates through the Mississippi River and Atchafalaya River delta to the near-shore Gulf of Mexico, and the Atlas recording spawning and nursery
  areas of fish in the Great Lakes and associated rivers listed by area and then by species.
