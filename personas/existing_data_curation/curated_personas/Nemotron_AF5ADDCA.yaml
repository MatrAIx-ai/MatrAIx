  hobbies: '[''Soccer'', ''Street dance'', ''School choir'', ''Volunteering at community center'', ''Reading graphic novels'', ''Science kits (building circuits, chemistry experiments)'', ''Cooking and
    baking with family'', ''Participating in cultural events (Juneteenth, African Meeting House tours)'', ''Learning Scratch coding'']'
  career_goals: Maya's career aspirations blend her love of science with her desire to give back to her community. She dreams of becoming a biomedical engineer who can design affordable medical devices
    that improve health outcomes for families in Dorchester and similar neighborhoods. Inspired by her curiosity about how things work, she also envisions a future as a STEM teacher, sharing her enthusiasm
    for discovery with younger students. To achieve these goals, Maya plans to attend a STEM-focused high-school program, join robotics clubs, and seek mentorship from local engineers and teachers. She
    hopes to earn a bachelor's degree in biomedical engineering at a university known for community health research, and eventually use her expertise to develop practical solutions that bridge technology
    and public health.
