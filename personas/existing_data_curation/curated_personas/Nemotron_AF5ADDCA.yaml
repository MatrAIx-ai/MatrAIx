personas:
  professional: Maya Green, an aspiring young community organizer and STEM enthusiast, leverages their soccer teamwork, street‑dance rhythm, and coding experiments to lead school art workshops and create
    interactive Scratch stories that teach peers basic circuitry.
  sports: Maya Green, a spirited middle‑school soccer player for the Eastside United youth league, also follows the LA Galaxy and the New York Knicks, attends after‑school conditioning sessions, and balances
    competitive matches with neighborhood pick‑up games, maintaining a disciplined warm‑up routine learned from their coach.
  arts: Maya Green, a vibrant participant in street‑dance club and school choir, draws inspiration from Beyoncé’s dynamic performances and Lin‑Manuel Miranda’s storytelling, immerses themselves in graphic
    novels like “Ms. Marvel”, and organizes community art workshops that showcase local muralists’ styles reminiscent of Basquiat.
  travel: Maya Green, an eager weekend explorer, loves day trips to historic sites like the African Meeting House, has visited Washington, D.C. to see the National Museum of African American History and
    Culture, and dreams of traveling to New Orleans for Mardi Gras and to Tokyo for a tech‑cultural exchange, where they hope to document their journey with Scratch animations.
  culinary: Maya Green, a budding home chef, delights in baking fudgy brownies using cocoa powder, butter, and dark chocolate chips, and mastering soul‑food staples such as collard greens seasoned with
    smoked paprika and smoked turkey, often experimenting with sweet‑savory combos at family gatherings, where they proudly serve the finished dishes.
  core: Maya Green, a sociable twelve‑year‑old who blends curiosity with practical teamwork, balances soccer, dance, coding, and community service while occasionally forgetting their inhaler and impulsively
    buying the latest graphic novel.
background:
  cultural: Maya grows up in Dorchester, a historically diverse Boston neighborhood with a vibrant African-American community. Her family's roots trace back to the Great Migration, with grandparents who
    moved from the rural South and brought traditions such as soulful cooking, gospel music, and oral storytelling. In Dorchester, Maya attends a public elementary school and participates in after-school
    programs at the local community center, where she learns about the neighborhood's rich African-American history, including the African Meeting House and the legacy of the Civil Rights movement in Boston.
    Family gatherings often feature soul-food dishes like collard greens, cornbread, and fried catfish, while holidays such as Juneteenth and Kwanzaa are celebrated with community events, music, and cultural
    workshops. Maya's family is active in a Baptist church, where she experiences gospel choirs and community service projects. This blend of Southern heritage, New England urban life, and strong community
    involvement shapes Maya's values of resilience, cooperation, and pride in her cultural identity.
attributes:
