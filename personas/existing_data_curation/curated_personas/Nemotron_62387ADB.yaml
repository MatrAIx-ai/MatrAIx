personas:
  professional: Sophie Green is a budding little scientist who spends afternoons turning picture books about space and animals into hands‑on LEGO Duplo experiments, and their meticulous yet imaginative
    nature lets them organize each tiny project while staying open to new ideas.
  sports: Sophie Green enjoys the local Little Kickers soccer club on Saturday mornings, cheers quietly for the hometown baseball team the City Bears, and combines a love for outdoor play with a habit of
    collecting interesting rocks during recess, all while preferring structured games over chaotic tag matches.
  arts: Sophie Green dives into drawing with a box of Crayola crayons, often emulating the bold lines of Dr. Seuss and the bright colors of Disney’s “Frozen,” while listening to gospel greats like Kirk
    Franklin and R&B classics from Alicia Keys as a soothing soundtrack to their art sessions.
  travel: Sophie Green dreams of exploring the natural wonders of the Grand Canyon and the interactive exhibits at the Boston Children’s Museum, but prefers short, family‑planned trips where they can bring
    along a magnifying glass to investigate bugs at the local state park.
  culinary: Sophie Green loves the sweet crunch of apple slices with peanut butter, eagerly helps stir homemade mac & cheese, and feels proud when they can correctly name fresh basil, cherry tomatoes, and
    mozzarella on a simple Caprese salad they helped assemble.
  core: Sophie Green is a curious, detail‑oriented six‑year‑old who balances a love for structured LEGO builds with a gentle worry about new experiences, finding comfort in quiet creative moments and small‑group
    nature adventures.
background:
  cultural: Sophie comes from an African-American family rooted in the Manassas community of Prince William County. Her family participates in local church gatherings where gospel music and communal meals
    are central. They celebrate cultural milestones such as Juneteenth and Kwanzaa, sharing stories of African-American heritage and cooking traditional soul-food dishes like collard greens, baked beans,
    and cornbread. Sophie’s mother volunteers at the neighborhood community center, exposing her to after-school enrichment programs that highlight Black history and STEAM activities. Through these experiences
    Sophie has absorbed a strong sense of community, a love for music, and an appreciation for the resilience and contributions of African-American culture.
attributes:
  skills: '[''early reading and sight-word recognition'', ''basic counting and addition'', ''fine-motor drawing and cutting'', ''LEGO Duplo building and spatial reasoning'', ''simple science experimentation'',
