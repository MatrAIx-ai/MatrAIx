  hobbies: '[''reading picture books about animals and science'', ''drawing and coloring'', ''LEGO Duplo building'', ''puzzle solving'', ''small-group park playdates and nature observation'', ''attending
    library story time'', ''watching educational cartoons'', ''listening to gospel and R&B music'']'
  career_goals: Sophie dreams of a future where she can combine her love of animals with her curiosity about how things work. She often tells her teachers she wants to become a veterinarian so she can help
    sick pets and learn about biology in a hands-on way. At the same time, she enjoys explaining new ideas to her younger cousins during playtime, which fuels her ambition to become a kindergarten teacher.
    Sophie’s career vision balances her inquisitive nature with a practical desire for a stable, caring role that involves both organized routines and opportunities to explore new concepts.
