  career_goals: Loan aims to become a senior laboratory technician or lead technician within the next five years, overseeing a small team and managing workflow. She plans to obtain Certified Dental Technician
    (CDT) and Certified Ophthalmic Lab Technician credentials to deepen her technical credibility. She is interested in mastering advanced digital dentistry platforms, such as intraoral scanning and 3‑D
    printing, and hopes to integrate these technologies into her current lab to improve efficiency and patient outcomes. Additionally, she aspires to mentor new technicians, especially those from immigrant
    backgrounds, and eventually explore opening her own boutique lab that offers customized, culturally sensitive dental and vision solutions for the diverse community in Denton County.
