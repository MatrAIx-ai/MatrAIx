    management'', ''Basic IT troubleshooting (printer, network, software)'', ''Adaptable time‑management and prioritization'', ''Collaborative communication with occasional assertiveness'']'
  hobbies: '[''Hiking and nature walks in North Texas'', ''Attending local live music shows and festivals'', ''Playing strategy and simulation video games'', ''Reading non‑fiction on technology and productivity'',
