  career_goals: Michael aims to advance from his current secretarial role to an office manager position within the next two to three years. He plans to enroll in a community‑college certificate program
    in Business Administration to formalize his knowledge of operations and human resources. Long‑term, he is interested in transitioning to a project coordinator role where he can combine his practical
    organizational skills with his curiosity for new workflows and technology. He also hopes to mentor newer administrative staff, fostering a collaborative environment while maintaining the flexible, low‑stress
    work culture he values.
