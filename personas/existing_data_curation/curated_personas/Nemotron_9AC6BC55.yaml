  hobbies: '[''Hiking and fishing in local parks'', ''Pickup basketball'', ''Church choir participation'', ''Cooking Southern cuisine'', ''Following NFL football'', ''Listening to hip‑hop and R&B'', ''Building
    custom motorcycle parts'']'
  career_goals: Antwawn aims to earn his GED and pursue an associate degree in business administration within the next two years. He aspires to advance from his current store manager role to a district
    manager overseeing multiple locations in eastern North Carolina. In the long term, he hopes to open his own community‑focused convenience store that partners with local producers, incorporates modern
    inventory technology, and provides mentorship opportunities for at‑risk youth. He also wishes to become a trusted voice in local economic development initiatives.
