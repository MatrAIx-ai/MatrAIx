personas:
  professional: Zong Bowen is a methodical civil engineer who leverages advanced structural analysis software, data‑driven decision making, and a steady focus on sustainable infrastructure to lead multidisciplinary
    project teams in the Atlanta metro area, while balancing curiosity about green technologies with the practical demands of tight construction schedules.
  sports: Zong Bowen rides with the Spoke & Pedal Club on the Chattahoochee River trail, follows the Atlanta Falcons, Braves, and United games, and they add early‑morning hikes in Stone Mountain State Park
    to their fitness routine, preferring endurance training over weightlifting.
  arts: Zong Bowen enjoys playing the guzheng at cultural gatherings, draws inspiration from composer Tan Dun and pianist Lang Lang, and they attend occasional performances by the Atlanta Symphony Orchestra,
    while their artistic palate includes streaming soundtracks by Hans Zimmer and watching indie films by director Chloe Zhao.
  travel: Zong Bowen prefers meticulously planned trips that blend sustainable design tours with outdoor adventure, having explored Copenhagen’s bike‑friendly cityscape, hiked the volcanic landscapes of
    Iceland, and they dream of a weekend retreat in Kyoto’s historic temples, all while budgeting for future consulting firm seed money.
  culinary: Zong Bowen is an avid home chef who experiments with Asian‑fusion dishes like miso‑glazed salmon with kimchi fried rice and Szechuan peppercorn‑spiced bao, they skillfully plate meals with micro‑greens
    and edible flowers, and they frequently source fresh herbs from the community garden they volunteer at.
  core: Zong Bowen is a detail‑obsessed civil engineer who cycles, cooks, and composes on the guzheng, balancing a relentless drive for sustainable design with a habit of splurging on kitchen tech and occasional
    dental neglect.
background:
  cultural: Zong was raised in a Chinese‑American household in Fulton County, where Mandarin was spoken alongside English. His parents instilled values of respect for education, family cohesion, and community
    service, reflecting traditional East Asian cultural ideals. He celebrates Lunar New Year and the Mid‑Autumn Festival with his family, participates in local cultural festivals, and maintains a strong
    sense of filial responsibility. Bilingual in Mandarin and English, Zong often bridges cultural gaps in professional settings, leveraging his heritage to foster inclusive teamwork and client relationships.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Civil 3D'', ''SAP2000'', ''GIS Mapping'', ''Structural Analysis'', ''Project Management'', ''Sustainable Design'', ''Python scripting for engineering calculations'',
    ''BIM Coordination'', ''Client Communication'', ''Regulatory Compliance'']'
  hobbies: '[''Cycling'', ''Trail Hiking'', ''Cooking (Asian fusion)'', ''Playing guzheng'', ''Reading engineering and tech publications'', ''Volunteering in community garden projects'', ''Photography of
    natural landscapes'']'
  career_goals: Zong aims to obtain his Professional Engineer (PE) license within the next three years and progress to a senior project manager role overseeing large-scale transportation and water management
    projects in the Atlanta metro area. He is passionate about leading initiatives that incorporate resilient, low-impact development practices and hopes to eventually launch his own consulting firm focused
    on sustainable urban infrastructure solutions while mentoring junior engineers.
