personas:
  professional: Angela Ostland, a seasoned elementary teacher in Seattle, leverages her imagination and interdisciplinary flair to craft project‑based STEAM lessons that blend literature, visual arts, and
    coding, while nurturing student curiosity and classroom harmony.
  sports: Angela Ostland embraces the Pacific Northwest outdoors by hiking the Cascade trails, paddling with the Seattle Kayak Club, and cheering on the Seattle Seahawks and Sounders FC, while maintaining
    a gentle yoga practice three times weekly to stay limber.
  arts: Angela Ostland immerses herself in the Seattle art scene, drawing inspiration from the vivid abstracts of Yayoi Kusama, the moody landscapes of J.M.W. Turner, and local gallery exhibitions at the
    Frye Art Museum, while performing improv at the Seattle Improvisation Lab and writing poetry influenced by Mary Oliver.
  travel: Angela Ostland prefers spontaneous weekend getaways, often road‑tripping to the Oregon coast, exploring the historic Alki Beach in Seattle, and dreaming of a cultural immersion tour of Kyoto's
    art districts, balancing limited vacation days with a modest travel budget and occasional stay‑cations at nearby cabins.
  culinary: Angela Ostland delights in Pacific Northwest flavors, frequently cooking Dungeness crab with fresh dill, whipping up salmon poke bowls with avocado and sesame seeds, and perfecting miso‑glazed
    eggplant, though she admits to over‑indulging in artisanal coffee lattes during her gallery visits.
  core: Angela Ostland is a free‑spirited educator who weaves art into learning, splurges on creative supplies, navigates health with a mix of yoga and occasional neglect, and finds balance between community,
    nature, and personal imagination.
background:
  cultural: Angela identifies as a white American with deep roots in the Pacific Northwest. Her family background includes Northern European ancestry (German and Scandinavian) that values modesty, hard
    work, and a close connection to nature. Growing up in Kent, WA, she was shaped by the region’s progressive education ethos, environmental consciousness, and vibrant arts community. She embraces the
    local culture of outdoor recreation, community involvement, and an inclusive mindset that supports diverse learning styles and collaborative creativity.
attributes:
  skills: '[''Curriculum Development'', ''Differentiated Instruction'', ''Project‑Based Learning'', ''Classroom Management'', ''Educational Technology Integration'', ''Art Integration'', ''Mentoring New
