  hobbies: '[''Watercolor Painting'', ''Mixed‑Media Collage'', ''Visiting Art Galleries'', ''Reading Contemporary Fiction'', ''Philosophy'', ''Science Popular Books'', ''Yoga'', ''Cascades Hiking'', ''Kayaking'',
    ''Creative Writing'', ''Improv Theater'', ''Community Gardening'']'
  career_goals: Angela aims to transition into a curriculum specialist role within her district, where she can design and promote arts‑integrated learning models across multiple schools. She plans to pursue
    a Master’s degree in Curriculum and Instruction to deepen her expertise in educational research. Over the next five years, she hopes to lead a professional learning community focused on innovative teaching
    methods, secure grant funding for interdisciplinary STEAM initiatives, and eventually move into an instructional coaching position that allows her to mentor peers while maintaining a flexible schedule
    that supports her creative pursuits.
