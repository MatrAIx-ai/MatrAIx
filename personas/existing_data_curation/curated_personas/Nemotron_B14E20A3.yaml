  career_goals: Stacie aims to secure a lead assembler position within the next two years, where she can formalize her mentorship of junior colleagues and champion process‑standardization initiatives. She
    plans to obtain a Certified Production Technician (CPT) credential and deepen her knowledge of PLC programming to support equipment upgrades. Long‑term, she envisions a smooth transition into a quality‑assurance
    or training specialist role that allows her to maintain a predictable schedule, contribute to workplace safety, and help her team sustain high morale while preserving the harmonious work environment
    she values.
