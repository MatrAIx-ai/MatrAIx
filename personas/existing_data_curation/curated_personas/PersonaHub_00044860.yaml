persona_description: A military historian who is interested in the Italian Royal Army's role in World War II, particularly the events leading up to and following the Italian armistice with the Allies. The
  individual is knowledgeable about the Acqui Division, General Antonio Gandin, and the German reinforcement of the Italian forces in Greece. They are interested in the negotiations between Gandin and the
  Germans, the decision to surrender to the Allies, and the aftermath of Italy's occupation of Corsica and the Alpes-Maritimes. They may also be interested in the background of the Acqui Division and the
  reasons for Gandin's command of the division.
