  career_goals: In the next five years Sylvia aims to transition into a leadership role such as curriculum coordinator or assistant principal, where she can apply her business acumen to improve school budgeting,
    resource allocation, and program evaluation. She wishes to design and implement a STEAM enrichment program that integrates real-world business concepts, encouraging students' curiosity while maintaining
    practical outcomes. Additionally she aspires to mentor newer teachers, lead professional-development workshops, and earn a Master’s degree in Educational Leadership to strengthen her administrative
    capabilities. Her long-term ambition is to contribute to a school culture that values harmony, collaborative decision-making, and balanced innovation.
