  hobbies: '[''Community Dance Classes'', ''Cooking Club (fusion Chinese cuisine)'', ''Volunteering at Immigrant Support Center'', ''Yoga'', ''Journaling'', ''Urban Gardening'', ''Reading Business Development
    Books'', ''Listening to Productivity Podcasts'']'
  career_goals: She aims to advance from her current first‑line supervisory role to an office manager position within the next three to five years, eventually targeting a senior operations manager role
    in a mid‑size company. To support this trajectory, Hui Gia plans to obtain professional credentials such as the Certified Administrative Professional (CAP) and Project Management Professional (PMP).
    She also aspires to mentor junior administrative staff, implement scalable workflow automation, and lead organization‑wide efficiency initiatives while preserving a healthy work‑life balance with her
    family.
