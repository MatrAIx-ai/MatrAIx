persona_description: A researcher with expertise in the study of protein degradation and its applications, particularly in the context of Bovine Spongiform Encephalopathy (BSE) and its link to the BSE prion.
  This researcher has collaborated with North Carolina State University, BioResource International, and the Central Institute for Animal Disease Control in the Netherlands to conduct research on the enzyme
  keratinase, which degrades the BSE prion in test-tube conditions. The researcher is also interested in determining the effectiveness of keratinase in decontaminating equipment that processes animal byproducts.
