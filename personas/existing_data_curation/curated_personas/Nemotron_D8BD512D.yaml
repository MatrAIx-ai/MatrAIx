personas:
  professional: Katie Corbett, a 45‑year‑old bookkeeping specialist, combines advanced Excel, QuickBooks, and Sage 50 expertise with a competitive drive to lead month‑end close cycles, automate audit workflows
    using VBA, and craft visual financial reports that merge data rigor with artistic flair, positioning them for a CPA credential and future independent consulting for arts nonprofits.
  sports: Katie Corbett, a 45‑year‑old hiking enthusiast, spends weekends on the Wabash Heritage Trail with their solo trekking club, follows the Indianapolis Colts and Indiana Pacers loyally, participates
    in a local 5K charity run each spring, and practices yoga twice a week to counterbalance the sedentary nature of their accounting work.
  arts: Katie Corbett, a 45‑year‑old watercolorist, curates a private collection of impressionist prints featuring Monet, Renoir, and T.C. Steele, frequents the Purdue Art Museum and downtown galleries
    alone, draws inspiration from philosophy podcasts while sketching Indiana cornfields, and occasionally experiments with digital illustration of financial data in the style of Saul Bass; they fuse analytical
    precision with artistic spontaneity.
  travel: Katie Corbett, a 45‑year‑old solitary traveler, prefers meticulously planned art‑focused trips such as a weekend in Paris to visit Musée d'Orsay and Giverny’s Monet gardens, a summer road‑trip
    through the Indiana Dunes, and a future wish to explore Kyoto’s zen gardens, balancing limited vacation days with a modest travel budget; they relish quiet immersion over crowded itineraries.
  culinary: Katie Corbett, a 45‑year‑old garden‑to‑table cook, delights in preparing grilled trout with lemon‑thyme butter, roasted heirloom carrots, and a summer salad of native wild arugula and edible
    flowers, while their culinary confidence lies in simple plating that mirrors their watercolor palette; they regularly enjoy a glass of pinot noir with dinner but admit to over‑indulging in artisanal
    cheese plates on quiet evenings.
  core: Katie Corbett, a 45‑year‑old accountant‑artist hybrid, channels a fiercely competitive, solitary curiosity into precise financial visualizations and quiet watercolor landscapes, all while juggling
    a habit of late‑night puzzles and occasional neglect of social commitments; they constantly balance order with creative freedom.
background:
  cultural: Katie grew up in a modest, middle‑class family in White County, Indiana, reflecting the region’s largely white, Midwestern heritage. Her community valued hard work, self‑reliance, and modesty,
    typical of small‑town Indiana. While her upbringing emphasized practical skills and stability—qualities that shaped her reliability—she was also exposed to school art programs and community theatre,
    sparking her lifelong appreciation for the arts. The cultural milieu blended a Protestant work ethic with a quiet, private lifestyle, which resonates with her preference for solitude. Her divorce and
    subsequent independence have reinforced a strong sense of personal agency within this cultural context.
attributes:
  skills: '["Advanced Microsoft Excel (pivot tables, macros, VBA)", "QuickBooks and Sage 50 proficiency", "GAAP compliance and financial reporting", "Internal audit procedures and risk assessment", "Data
    reconciliation and discrepancy analysis", "Process optimization and workflow automation", "Critical analysis and skeptical review of financial statements", "Basic graphic design for data visualization
    (Canva, Adobe Photoshop)", "Independent work habits and strong organizational skills", "Continuous self-learning of accounting updates"]'
  hobbies: '["Watercolor sketching of Indiana landscapes", "Visiting local art museums and galleries", "Nature photography", "Hiking on the Wabash Heritage Trail", "Gardening native plants", "Crossword
    and Sudoku puzzles", "Reading art‑history books", "Listening to philosophy podcasts", "Digital illustration with tablet", "Journaling reflections"]'
  career_goals: She aims to earn her Certified Public Accountant (CPA) credential within the next two years, positioning herself for senior accountant or audit manager roles. Leveraging her competitive
    drive, she seeks opportunities to lead month‑end close cycles and oversee internal audit projects for midsize companies. Long‑term, Katie plans to transition to independent consulting, offering specialized
    bookkeeping and financial‑statement services to local small businesses and nonprofit arts organisations, where she can blend her financial expertise with her passion for the arts. She also hopes to
    develop a niche in visual financial reporting, creating compelling data visualizations that help clients understand their finances at a glance.
