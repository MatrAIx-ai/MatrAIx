personas:
  professional: Brent Gallagher, an organized sophomore with a talent for coordinating school events, they channel their love of structure and teamwork into a budding role as the student council’s logistics
    lead, ensuring every detail of every fundraiser runs like clockwork.
  sports: Brent Gallagher is a point guard on the high‑school basketball team, a dedicated member of the local hiking club, and a fervent fan of the Denver Nuggets, they often coordinate weekend scrimmages
    with classmates and log trail mileage in a worn leather notebook.
  arts: Brent Gallagher immerses themselves in the drama club, performing in community theater productions of The Crucible and Hamilton, they draw inspiration from actors Lin‑Manuel Miranda and Viola Davis,
    and they spend quiet evenings sketching set designs for upcoming school plays.
  travel: Brent Gallagher enjoys weekend hikes in the Bighorn Mountains, has taken a school field trip to Yellowstone National Park, and dreams of backpacking through the Canadian Rockies, they prefer meticulously
    planned itineraries that balance adventure with familiar comfort zones.
  culinary: Brent Gallagher’s palate favors hearty trail‑friendly meals like chili‑mac, homemade granola bars with dried berries, and they have become proficient at preparing campfire s’mores, often seasoning
    the marshmallows with a pinch of smoked paprika for a surprising twist.
  core: Brent Gallagher is a detail‑driven teen who blends disciplined organization with a love for team sports, drama, and model trains, they battle a persistent undercurrent of anxiety that fuels both
    meticulous planning and occasional stress‑induced procrastination.
background:
  cultural: Brent was raised in Fort Laramie, Wyoming, a small frontier town with deep ranching roots and a strong sense of community. His family, of European descent, has lived in the area for several
    generations, valuing self‑reliance, hard work, and respect for the open landscape. Local traditions such as county fairs, rodeos, and outdoor recreation are a regular part of his life, and the town’s
    blend of pioneer history and proximity to Native American heritage influences his appreciation for both land stewardship and community cooperation.
attributes:
  skills: '["Project planning","Time management","Basic computer proficiency","Ranch animal care","Fence repair and equipment maintenance","First‑aid certification"]'
  hobbies: '["Basketball","School drama club","Community center volunteering","Hiking in Bighorn Mountains","Team‑based video gaming","Model train building"]'
  career_goals: Brent aims to complete his high school diploma and enter a technical apprenticeship, preferably in diesel mechanics or agricultural engineering, so he can eventually own a service shop that
    supports the local ranching community. He is also driven to join the volunteer fire department, with a long‑term ambition to take on a leadership role that combines his organizational strengths with
    community safety. Ultimately, he envisions a career that blends practical, hands‑on work with structured, team‑oriented responsibilities.
