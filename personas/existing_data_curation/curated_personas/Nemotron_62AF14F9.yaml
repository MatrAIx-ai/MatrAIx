  hobbies: '[''Visiting art museums'', ''Reading historical biographies'', ''Gardening'', ''Cooking traditional Mexican cuisine'', ''Attending small literature discussion groups'', ''Listening to classical
    piano music'', ''Volunteering as a community center docent'', ''Documenting oral histories'']'
  career_goals: Although retired, Luz aims to stay intellectually active by mentoring younger educators, documenting oral histories of older Mexican-American residents, and curating a traveling exhibition
    of Mexican folk art for local schools. She aspires to publish a memoir that weaves her educational career with her cultural heritage, and to lead a small intergenerational reading circle at the Ann
    Arbor community center.
