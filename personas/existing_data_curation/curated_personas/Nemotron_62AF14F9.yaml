personas:
  professional: Luz Vazquez, a retired elementary educator turned curriculum designer, leverages thirty years of classroom leadership, bilingual fluency, and grant‑writing expertise to mentor younger teachers,
    craft inclusive multicultural programs, and coordinate community workshops with methodical precision.
  sports: Luz Vazquez enjoys low‑impact walking with the Ann Arbor Senior Strollers club, follows the Detroit Tigers in spring and the Detroit Red Wings in winter, and attends weekly gentle yoga sessions
    to preserve flexibility while steering clear of high‑intensity workouts.
  arts: Luz Vazquez spends mornings at the university art museum dissecting works by Frida Kahlo and Diego Rivera, engages in a small discussion group that delves into Gabriel García Márquez’s narratives,
    and habitually listens to Vladimir Horowitz’s piano recordings, allowing these artistic experiences to shape her reflective worldview.
  travel: Luz Vazquez prefers meticulously planned cultural trips, having recently revisited Oaxaca to study regional folk art and now aspiring to explore Granada’s Alhambra on a slow‑travel itinerary that
    balances museum visits with leisurely strolls through historic neighborhoods.
  culinary: Luz Vazquez, a confident home cook, delights in preparing mole poblano and chiles en nogada using heirloom oregano, epazote, and freshly harvested rosemary from her herb garden, frequently sharing
    these dishes with friends at intimate gatherings, though they sometimes over‑salt the sauces when nostalgic for childhood flavors.
  core: Luz Vazquez embodies a quietly curious, methodical elder who balances a love for art, herbs, and traditional cuisine with a habit of over‑scheduling her days, occasionally forgetting to pause for
    a mid‑afternoon nap.
background:
  cultural: Luz was born in a small town in central Mexico and moved to the United States in her early twenties. Her upbringing was steeped in Mexican traditions—celebrating Día de los Muertos, weaving,
    and folkloric music—while her education and career in the U.S. fostered a bicultural perspective. She maintains strong ties to the Mexican-American community in Ann Arbor, participating in cultural
    festivals and teaching Spanish language classes at the local library. Her Mexican heritage informs her values of family, respect, and communal harmony, which she integrates into her interactions and
    community work.
