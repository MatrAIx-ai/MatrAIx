  hobbies: '["Attending local art galleries and museum exhibitions", "DIY upcycling projects (furniture, decor)", "Karaoke and improv comedy nights", "Community theatre (acting or backstage)", "Photography
    (urban and nature)", "Exploring new cuisines and cooking", "Spontaneous road trips to nearby cities (Chicago, Ann Arbor)", "Playing board games and social trivia nights", "Yoga and meditation for relaxation",
    "Volunteering at community art workshops"]'
  career_goals: Carmen aims to advance within the manufacturing sector, seeking a promotion to lead assembler and eventually into a production supervisory role where she can champion lean practices and
    foster a collaborative workplace culture. She plans to obtain a Certified Welder credential and enroll in community-college courses on CNC programming to deepen her technical expertise. Concurrently,
    she dreams of launching a side venture that marries her fabrication skills with her love of art, creating one-of-a-kind upcycled furniture and decorative pieces for the Detroit area.
