personas:
  professional: Carmen Henderson, a Detroit-based mechanical assembler and fabricator, leverages expert CNC and MIG/TIG welding skills along with a keen artistic eye to devise unconventional production
    solutions, while their relaxed approach to planning and talkative, collaborative nature make them a natural mentor and future production supervisor championing lean practices.
  sports: Carmen Henderson, an avid participant in Detroit’s community basketball league and a seasonal member of the Motor City Runners 5K club, enjoys cheering on the Lions, Pistons, and Tigers while
    fitting in nightly pull‑ups at the local gym to counter the physical demands of their fabrication job.
  arts: Carmen Henderson, a regular at the Detroit Institute of Arts and a fan of gallery openings featuring artists like Kerry James Marshall and Nina Chanel Abney, channels their love for performance
    into karaoke nights and improv shows at Second City Detroit, often drawing inspiration from musicians Janelle Monáe and Stevie Wonder.
  travel: Carmen Henderson, who favors spontaneous road trips to Chicago’s skyline, Ann Arbor’s music scene, and the shoreline of Mackinac Island, plans future getaways to New Orleans for its jazz heritage
    and to Barcelona for its vibrant street art, balancing limited vacation days with a love for low‑budget, experience‑driven travel.
  culinary: Carmen Henderson, an experimental home cook who reheats leftover bread into panzanella salad, perfects Detroit‑style pizza with pepperoni and smoked mozzarella, and whips up kimchi fried rice
    using gochujang and scallions, often sourcing fresh sweet potatoes and smoked paprika from the local farmer’s market.
  core: Carmen Henderson blends mechanical precision with artistic improvisation, turning workshop challenges into upcycled masterpieces while thriving on social energy and a calm, resilient outlook despite
    a habit of loosely organized schedules.
background:
  cultural: Carmen was raised in Redford, a working-class suburb of Detroit, within a family of Irish-German heritage. The region's strong ties to the automotive industry and the broader cultural mosaic
    of Wayne County instilled in her Midwestern values of hard work, humility, and neighborly friendliness. Exposure to Detroit's rich musical legacy, local art festivals, and community-center activities
    fostered an open-minded outlook that blends traditional Midwestern sensibility with an appreciation for artistic expression and diverse experiences.
attributes:
  skills: '["Mechanical assembly", "MIG/TIG welding", "Blueprint reading", "CNC machine operation (basic)", "Quality inspection and troubleshooting", "Hand and power tool proficiency", "Team communication
