personas:
  professional: Esther Jackson, at the newborn stage, is already specializing in sensory exploration, honing hand‑eye coordination and auditory discrimination, with their innate curiosity driving them to
    investigate new stimuli while their practical comfort with routine ensures they settle quickly into familiar patterns.
  sports: Esther Jackson, despite being an infant, enjoys the rhythmic bounce of a soft, plush basketball during tummy‑time and often watches family members root for the nearby Chicago White Sox, illustrating
    an early, playful connection to sports.
  arts: Esther Jackson loves listening to lullabies by Norah Jones and classical pieces by Beethoven, often reaching for a mobile featuring miniature dancers, which shapes their early artistic sensibility.
  travel: Esther Jackson has been taken on weekend getaways to a lakeside cabin and a recent family trip to San Diego’s zoo, where bright animal displays captured their attention, showing a balance between
    adventurous curiosity and the need for familiar caregivers.
  culinary: Esther Jackson’s diet consists of breastmilk or formula supplemented with pureed carrots, peas, and occasional banana mash, and they display a particular fondness for the sweet smoothness of
    mango puree.
  core: Esther Jackson is a curious, socially driven newborn who balances a love for new experiences with a comforting need for routine, exhibiting early signs of competitive spirit and emotional steadiness.
background:
  cultural: Esther is born into an African American family in Indianapolis, Indiana. Her cultural upbringing is shaped by the rich traditions of the Midwest Black community, including ties to local churches,
    family gatherings centered around soul food and barbecue, and a deep appreciation for gospel, jazz, and contemporary R&B music. Community resilience, storytelling, and supportive extended family networks
    are integral aspects of her cultural environment, fostering a sense of identity and belonging from an early age.
