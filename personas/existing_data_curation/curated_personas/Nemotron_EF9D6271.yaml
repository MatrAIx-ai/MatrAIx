  hobbies: '[''Model railway construction'', ''Vintage radio restoration'', ''Herb gardening'', ''Bridge (card game)'', ''Historical nonfiction reading'', ''Walking historic Salem'', ''Church choir participation'']'
  career_goals: Ferdie's current ambitions center on staying intellectually engaged and giving back to his community. He aims to mentor high‑school students in STEM through a local after‑school program,
    volunteer as a technical advisor for preservation projects at the Salem Historical Society, and fulfill a personal project of building a functional model steam locomotive for his workshop. Additionally,
    he seeks to maintain his health through a structured exercise routine and manage his tendency toward worry by practicing mindfulness and regular health check‑ups.
