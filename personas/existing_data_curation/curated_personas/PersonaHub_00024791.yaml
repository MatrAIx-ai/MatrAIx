persona_description: A violin maker who is passionate about restoring and enhancing the natural illumination of old Stradivari and Guarneri instruments using the Balsam Ground process. He values the antique
  look of the instruments and the ability to maintain and enhance the illumination. He is knowledgeable about the history and techniques of the Cremonese instruments and uses this knowledge to create a
  unique and authentic look for his instruments. He is detail-oriented and enjoys experimenting with different color combinations to achieve the desired effect. He is also interested in the impact of varnish
  and other treatments on the wood and the importance of maintaining and enhancing the natural illumination of the wood.
