  career_goals: Teairra aims to pursue a bachelor’s degree in visual arts or communications with a focus on community‑engaged art. She envisions a career that merges her creative talents with social impact,
    such as working as a cultural program manager for a nonprofit, a museum educator, or a freelance graphic designer who partners with community organizations. Long‑term, she hopes to lead large‑scale
    public art projects that celebrate Black culture and foster dialogue, while mentoring young artists from under‑represented backgrounds.
