personas:
  professional: Sheila Smith, a methodical UI/UX and graphic designer known for marrying curiosity about emerging design trends with disciplined project management, consistently delivers brand-aligned visual
    solutions while mentoring junior teammates and positioning herself as the strategic partner every cross-functional team needs.
  sports: Sheila Smith hits the trails of Pikes Peak for weekly hikes, climbs the local rock-climbing gym, follows the Colorado Avalanche for hockey, and they are a member of the Denver Trail Runners club,
    balancing their love of solitary outdoor exercise with occasional group runs to satisfy their modest competitive streak.
  arts: Sheila Smith frequents the Denver Art Museum for its rotating contemporary exhibitions, collects prints by Agnes Martin and Olafur Eliasson, devotes evenings to knitting intricate scarves inspired
    by geometric patterns, and they immerse themselves in contemporary literary fiction by authors like Sally Rooney and Zadie Smith during their book club meetings.
  travel: Sheila Smith prefers curated weekend getaways that blend scenic adventure with design inspiration, such as a sunrise trek in Banff, a weekend workshop in Copenhagen's sustainable design district,
    and they budget travel carefully, often using points from a travel rewards credit card while balancing family commitments at home.
  culinary: Sheila Smith enjoys crafting plant-based meals like quinoa-black bean bowls with roasted beets, experimenting with Himalayan pink salt and fresh cilantro, but they sometimes over-season dishes
    in an attempt to quell anxiety, and they unwind by slow-brewing Ethiopian coffee while sketching new typography concepts.
  core: Sheila Smith is a meticulously organized designer who channels their worry-fueled perfectionism into sustainable, inclusive visual work, yet forgets to turn off work notifications at night, causing
    occasional insomnia.
background:
  cultural: Sheila grew up in a suburban setting near Colorado Springs, part of a predominantly white, middle‑class American community that values independence, self‑reliance, and a close connection to
    the outdoors. Her family’s cultural roots are primarily Anglo‑American, with a modest appreciation for classic American folk traditions and a respect for the Western frontier spirit that permeates Colorado
    life. This background, combined with her humanities education, informs her design aesthetic—clean, functional, and subtly narrative—while her personal values emphasize community involvement, environmental
    stewardship, and a balanced, low‑key lifestyle.
