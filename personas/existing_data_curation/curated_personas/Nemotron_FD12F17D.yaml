  career_goals: Sheila aims to transition into a senior design leadership role within the next three years, positioning herself as a strategic partner who can guide cross‑functional teams from concept through
    execution. She wants to deepen her expertise in sustainable and inclusive design, lead larger brand‑rebranding projects for local businesses, and eventually launch her own boutique design studio that
    balances creative autonomy with stable client work. A key personal ambition is to cultivate a mentorship program for junior designers while maintaining a healthy work‑life balance to mitigate stress.
