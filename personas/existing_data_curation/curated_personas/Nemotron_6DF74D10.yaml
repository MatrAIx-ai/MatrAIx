personas:
  professional: Daliana Lara is a budding home‑based caterer who leverages two decades of household budgeting, bilingual communication, and event coordination to design intimate gatherings featuring traditional
    family recipes, balancing a love of structure with spontaneous bursts of creative menu experimentation while preferring small, familiar client circles.
  sports: Daliana Lara enjoys leisurely walks along Clearwater Beach and the Pinellas Trail, participates in a local walking club on weekend mornings, occasionally joins friends for beach volleyball, and
    roots for the Tampa Bay Rays, Lightning, and Buccaneers as their favorite pro‑sports teams.
  arts: Daliana Lara immerses themselves in classic boleros by Los Panchos and salsa legends like Celia Cruz, reads historical novels such as Ken Follett's "The Pillars of the Earth" and memoirs in both
    Spanish and English, and occasionally attends performances at the Clearwater Playhouse, letting music and literature shape their evenings.
  travel: Daliana Lara prefers relaxed road trips with a carefully curated playlist, having visited the Florida Keys and New Orleans for culinary inspirations, while dreaming of a cultural tour of Cartagena
    to explore family‑style markets and seaside plazas.
  culinary: Daliana Lara masters the art of making arepas, empanadas, and hallacas using fresh tomatoes, peppers, and herbs from their patio garden, blending traditional family recipes with seasonal produce
    to create comforting meals that are the cornerstone of their emerging catering business.
  core: Daliana Lara blends disciplined budgeting with spontaneous culinary creativity, savoring solitary walks and bolero melodies while nurturing a quiet yet resilient community spirit.
background:
  cultural: Daliana’s cultural identity is rooted in her Venezuelan heritage. Born and raised in a modest town in Venezuela, she grew up surrounded by the vibrant customs of her family, including music,
    dance, and cuisine. She speaks Spanish fluently and maintains the use of Venezuelan idioms at home, passing them on to her children and grandchildren. The family celebrates traditional holidays such
    as Día de los Santos Inocentes, Carnaval, and especially the festive season of Navidad with special dishes like hallacas and pan de jamón. Her Catholic upbringing informs her participation in church
    activities and community service. Since moving to Clearwater in her early thirties, she has blended her Venezuelan roots with the coastal Floridian lifestyle, preserving her cultural rituals while adapting
    to local customs. Daliana often serves as a cultural bridge, sharing Venezuelan recipes and stories with neighbors, and she actively supports Venezuelan diaspora groups in the area.
attributes:
  skills: '["Household budgeting", "Meal planning and preparation (Venezuelan cuisine)", "Bilingual communication (Spanish/English)", "Small-group event coordination", "Basic computer literacy (email, online
