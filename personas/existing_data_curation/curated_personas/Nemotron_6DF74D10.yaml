  hobbies: '["Cooking traditional Venezuelan dishes", "Patio vegetable gardening", "Reading historical novels and memoirs", "Listening to boleros and salsa music", "Walking on Clearwater Beach and Pinellas
    Trail", "Knitting and crocheting", "Participating in a small community book club"]'
  career_goals: While currently not engaged in formal employment, Daliana aspires to transform her culinary passion into a modest home‑based catering business specializing in authentic Venezuelan dishes
    for small events in the Clearwater area. She also plans to complete a GED program to formalize her education, which could open doors to part‑time roles in community outreach or senior services. Moreover,
    she hopes to expand her volunteer work at the local church, eventually taking a leadership role in organizing cultural heritage events that celebrate Venezuelan traditions. Ultimately, Daliana seeks
    a balanced life where she can contribute her practical skills to her community while preserving ample time for family and personal well‑being.
