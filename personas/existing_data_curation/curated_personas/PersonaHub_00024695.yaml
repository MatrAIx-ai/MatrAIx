persona_description: A Renaissance artist who is interested in the study of architecture and sculpture, particularly Greek and Roman works. They are skilled in the use of linear perspective and chiaroscuro,
  and are known for their ability to create equilibrate and harmonious works. Their works are often endowed with a clever message with veiled codes, and they are known for their exploration of the divine
  proportion based on the human figure. They are also skilled in the use of expressive gesture and use of chiaroscuro to create a sense of depth and three-dimensional figures.
