  career_goals: Duane’s primary career ambition is to ascend to an executive HR leadership role—such as Director of Human Resources or Chief Human Resources Officer—within the next five years. He aims to
    drive innovative employee-experience programs that fuse art, culture, and technology to enhance engagement and retention. Additionally, he seeks to become a mentor and thought leader in the HR community,
    publishing articles on unconventional talent management and eventually launching a boutique consultancy focused on strategic workforce planning and inclusive culture transformation.
