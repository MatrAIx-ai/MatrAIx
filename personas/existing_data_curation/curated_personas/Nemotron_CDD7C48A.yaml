  career_goals: Kieu often talks about growing up to be a kindergarten teacher because she loves the idea of creating a gentle, organized classroom where children feel safe and can learn together. She also
    dreams of becoming a veterinarian, hoping to care for animals and provide them with comfort, reflecting her compassionate nature and desire to help others in a predictable, nurturing way.
