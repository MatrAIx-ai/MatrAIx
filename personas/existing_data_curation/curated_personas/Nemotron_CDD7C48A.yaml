personas:
  professional: Kieu Khorn, a precocious five-year-old, they imagine themselves as a future kindergarten teacher who meticulously organizes story-time circles, creates color-coded lesson plans, and delights
    in ensuring every classmate feels included and safe.
  sports: Kieu Khorn, an energetic five-year-old, they enjoy playing T-ball at the community center on Saturday mornings, cheer for the Chicago Cubs with a stuffed bear, follow Los Angeles Lakers highlights
    for inspiration, and attend a little-league soccer clinic to maintain a predictable weekly schedule of activity.
  arts: Kieu Khorn, a creative youngster, they love drawing vibrant pictures of Disney's Moana, listening to The Wiggles, reenacting Toy Story scenes with friends, and starring as a friendly dragon in the
    preschool drama club's puppet show.
  travel: Kieu Khorn, a curious five-year-old, they treasure family road trips to the nearby state park's stroller-friendly nature trail, dream of traveling to Paris to see the Eiffel Tower and eat croissants,
    yet their parents keep plans low-key and budget-friendly.
  culinary: Kieu Khorn, a picky yet enthusiastic eater at five, they prefer chicken nuggets, macaroni-and-cheese, and strawberry yogurt, delight in sprinkling shredded cheddar on every bite, help stir batter
    for banana pancakes under close supervision, and often demand extra ketchup as a guilty-pleasure indulgence.
  core: Kieu Khorn is a structured yet gentle five-year-old who turns everyday routines into playful projects, worries about tiny mishaps, and channels that energy into caring for friends, saving pennies,
    and dreaming of big-screen adventures.
background:
  cultural: Kieu is a Vietnamese‑American child raised in a bilingual household in Syracuse, New York. At home, her parents speak Vietnamese, and she hears stories of family life in Vietnam, while at school
    she uses English. The family celebrates Tet (Lunar New Year) with traditional foods such as bánh chưng and spring rolls, and they attend a local Vietnamese community center where Kieu participates in
    cultural festivals, language lessons, and folk dance. This blend of Southeast Asian heritage and American upbringing shapes her identity, giving her a strong sense of family, respect for tradition,
    and comfort navigating two cultural worlds.
