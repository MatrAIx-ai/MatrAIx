  hobbies: '[''Reading fantasy and sci‑fi novels'', ''Sketching and drawing'', ''Digital illustration (Procreate)'', ''Minecraft world building'', ''LEGO construction'', ''Creative writing (short stories,
    poetry)'', ''Journaling'', ''Piano playing'', ''Hiking in nature'', ''Watercolor painting of flora/fauna'', ''Mandala coloring'', ''Yoga'', ''Science fair projects'']'
  career_goals: Patricia dreams of becoming a children’s book author and illustrator, where she can weave her vivid stories and illustrations into books that spark imagination and comfort anxious readers.
    She hopes to attend a fine‑arts college to refine her visual storytelling and later work as a concept artist for video games or an educational content creator, blending art with science communication.
    In the long term, she envisions leading creative workshops for kids, using art and story‑making as tools for emotional resilience, and possibly launching a small publishing imprint dedicated to inclusive,
    imaginative narratives.
