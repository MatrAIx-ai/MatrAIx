  career_goals: Thomas’s ambitions are whimsical and reflect his love of novelty and art. He often says he wants to become an astronaut who paints the stars, a painter who creates pictures that move, or
    a storyteller who brings magical worlds to life. While these goals are playful, they reveal his desire to explore creative and abstract fields and to inspire wonder in others.
