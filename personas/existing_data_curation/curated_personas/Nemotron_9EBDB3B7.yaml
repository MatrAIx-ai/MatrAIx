  hobbies: '[''Organic gardening'', ''Sailing'', ''Reading classic literature'', ''Writing poetry'', ''Nature photography'', ''Birdwatching'', ''Golf'', ''Theater and concert attendance'', ''Wine tasting'',
    ''Local history research'', ''Volunteer community projects'']'
  career_goals: Although retired from formal employment, David aims to complete a memoir that weaves together his academic journey and personal reflections, and to publish scholarly articles on 20th‑century
    American literature. He aspires to curate a traveling exhibition highlighting the cultural history of the Hamptons, serve on the board of the local historical society, and mentor emerging scholars through
    informal workshops. Additionally, he hopes to advance sustainable practices on his property and deepen his involvement in community preservation projects.
