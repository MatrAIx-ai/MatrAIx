  hobbies: '["Gardening", "Reading historical biographies", "Quilting", "Walking on local nature trails", "Volunteer work at senior center", "Cooking traditional New England dishes", "Canning and preserving",
    "Attending church gatherings", "Participating in local historical society", "Watching classic films"]'
  career_goals: Approaching retirement, Baleigh aims to transition into a mentorship and advisory role, helping younger sales professionals at her company and within the local business community. She plans
    to document her proven sales processes and best practices to create a legacy handbook for future managers. Additionally, she hopes to serve on a community board or local historical society, leveraging
    her organizational skills to support community projects while maintaining a balanced, low‑stress lifestyle.
