personas:
  professional: Baleigh Bennett, a seasoned sales manager with three decades of experience, leverages her methodical planning, data‑driven forecasting, and calm negotiation style to mentor upcoming reps
    while meticulously documenting her proven processes for future managers.
  sports: Baleigh Bennett enjoys weekly nature‑trail walks with the local Sagebrook Senior Walkers club, cheerfully follows the Boston Red Sox and Boston Celtics on game nights, and participates in a low‑impact
    community senior softball league, reflecting her love of steady, familiar activity and community spirit.
  arts: Baleigh Bennett finds solace in quilting classic patterns while listening to the Boston Symphony Orchestra, watches golden‑age cinema like Hitchcock’s "Rear Window" and Garbo’s performances, and
    devours historical biographies and New England literary classics by Hawthorne and Stowe, weaving these cultural threads into her creative pursuits.
  travel: Baleigh Bennett prefers low‑stress, itinerary‑driven trips that celebrate New England’s heritage, having toured the historic streets of Salem, the lighthouses of Cape Cod, and a weekend getaway
    to Martha’s Vineyard, and she hopes to explore the colonial charm of St. Augustine, Florida, and the ancestral villages of County Cork, Ireland.
  culinary: Baleigh Bennett delights in cooking and canning New England staples such as clam chowder, lobster rolls, and baked beans, expertly preserving garden‑grown carrots and heirloom tomatoes while
    seasoning with fresh rosemary, thyme, and bay leaves, and she proudly serves her church potluck signature apple‑cinnamon crumble.
  core: Baleigh Bennett, a meticulous 66‑year‑old sales veteran, blends routine, calm authority, and a love for New England traditions into every facet of life, from garden‑to‑ledger and quilting‑to‑community
    service, even if she occasionally forgets to water her begonias.
background:
  cultural: Baleigh is a lifelong New Englander with deep ties to the White, middle‑class community of Hampton, New Hampshire. Her upbringing emphasized self‑reliance, practicality, and community involvement—values
    reflected in her love of seasonal gardening, participation in local church and historical societies, and commitment to volunteer service. She carries forward the region's traditions of modesty, respect
    for routine, and appreciation for the natural environment, integrating these cultural influences into both her professional demeanor and personal pursuits.
