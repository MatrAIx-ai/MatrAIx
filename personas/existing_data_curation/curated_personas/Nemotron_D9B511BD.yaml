personas:
  professional: Michelle Scurry is a veteran mechanical engineer specializing in product design, finite element analysis, and lean manufacturing, and they channel their love of structure and heightened
    emotional intelligence into leading cross‑functional teams, mediating conflicts, and embedding mental‑health support into sustainable product development initiatives.
  sports: Michelle Scurry energizes themselves on weekends by leading hikes with the Pocono Trail Hiking Club, sweeps the dance floor at the Scranton Salsa Social, cheers for the Philadelphia Eagles, and
    they keep a balanced fitness routine that includes bodyweight circuits and weekly yoga sessions.
  arts: Michelle Scurry immerses themselves in the vibrant sounds of Celia Cruz and Tito Puente during salsa nights, relishes classic rock icons like Fleetwood Mac while restoring a 1965 Chevrolet, and
    they support local theater productions featuring works by August Wilson, which together shape their creative outlet and social gatherings.
  travel: Michelle Scurry meticulously plans road trips in their restored classic car to destinations such as Pennsylvania Dutch Country, the Adirondack mountains, and the historic streets of Savannah,
    while they day‑dream about a solar‑powered expedition to Iceland to study geothermal energy sites once their schedule allows.
  culinary: Michelle Scurry delights in cooking Pennsylvania Dutch staples like chicken pot pie, shoofly pie, and scrapple, seasoning them with farm‑fresh apples, heritage herbs, and locally sourced pork,
    and they often showcase their culinary creations at dinner parties where they pair each dish with a thoughtfully selected craft brew.
  core: Michelle Scurry blends a rigorously structured engineering mindset with a lively community spirit, balancing anxiety‑driven meticulousness in budgeting and project planning with spontaneous salsa
    spins, vintage car polishing marathons, and an unwavering commitment to mentoring the next generation of women engineers, and they always manage to keep a sense of humor about their own quirks.
background:
  cultural: Michelle is a white American who was born and raised in Scranton, Pennsylvania, a region characterized by a mix of Irish, German, and broader European ancestry. She grew up in a middle‑class,
    close‑knit family that emphasized hard work, education, and community involvement. Her upbringing combined Catholic traditions with secular community celebrations, such as St. Patrick's Day parades,
    Fourth of July fireworks, and local harvest festivals. The industrial heritage of Scranton, along with its resilient, cooperative spirit, has shaped her practical outlook, collaborative nature, and
    strong sense of regional identity. These cultural influences are evident in her dedication to teamwork, community service, and maintaining a structured yet flexible approach to both professional and
    personal life.
attributes:
