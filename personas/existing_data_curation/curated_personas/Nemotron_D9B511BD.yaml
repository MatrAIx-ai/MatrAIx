    and documentation'', ''Public speaking and presentation'']'
  hobbies: '[''Community gardening'', ''Hiking in the Pocono trails'', ''Salsa dancing'', ''STEM outreach mentoring for middle school girls'', ''Book club (contemporary fiction & personal development)'',
    ''Yoga and mindfulness meditation'', ''Classic car restoration'', ''Cooking and hosting dinner parties'', ''Trivia nights'', ''Volunteer work at local senior center'']'
  career_goals: Michelle aims to transition into a senior engineering management role where she can shape sustainable product development strategies within the renewable energy sector. She envisions leading
    a multidisciplinary team that prioritizes both technical excellence and employee well‑being, integrating mental health support into the engineering culture. She plans to earn an engineering management
    professional certification and become an active member of ASME, using her platform to champion mentorship programs for women and underrepresented groups in STEM. Long‑term, she hopes to contribute to
    regional economic growth by collaborating with local universities and industry partners in Scranton, eventually moving into a consulting or adjunct teaching role that allows her to share her expertise
    while maintaining a balanced, structured lifestyle.
