  career_goals: Ian intends to earn a bachelor's degree in Business Administration, focusing on operations and entrepreneurship. He aspires to become a regional operations manager for a retail chain and
    eventually launch his own boutique that merges retail with a curated art space, showcasing local artists and providing a community gathering spot. He aims to develop leadership skills that emphasize
    team harmony and resilience, and to leverage his technical abilities to implement sustainable practices in future ventures.
