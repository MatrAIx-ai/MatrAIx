  career_goals: Steven dreams of a future where he can explore the unknown and create things. He is fascinated by space and often says he wants to become an astronaut or a scientist who studies the oceans,
    inspired by his beach outings. He also imagines building his own video games, so a career in game design or software engineering appeals to him. Additionally, his competitive spirit fuels a desire to
    become a professional soccer player. Overall, his ambition blends his love of discovery, hands‑on creation, and competition.
