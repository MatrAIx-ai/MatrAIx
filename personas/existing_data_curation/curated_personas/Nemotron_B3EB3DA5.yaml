  career_goals: Sonja aims to progress within the call-center field, targeting a team lead or supervisory position within the next two to three years. She plans to enroll in a local community college to
    earn an associate degree in Business Administration, which will broaden her qualifications for managerial roles. Long-term, she is interested in moving into a role that blends her customer-focused experience
    with her compassion, such as a client success manager in the nonprofit sector or a human-resources coordinator. She also hopes to develop a formal certification in conflict resolution or customer experience
    management to enhance her expertise.
