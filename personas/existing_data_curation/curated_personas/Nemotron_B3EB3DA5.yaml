personas:
  professional: A dedicated call‑center specialist, Sonja Tran leverages their strong interpersonal communication, empathy‑driven problem solving, and calm multitasking under pressure to de‑escalate high‑volume
    customer calls, while their penchant for structure fuels a goal of becoming a team lead within two years despite occasional worry‑induced over‑analysis.
  sports: An enthusiastic fitness participant, Sonja Tran attends weekly Zumba classes at the Montgomery YMCA, cheers for the Alabama Crimson Tide football team and the local Montgomery Biscuits baseball
    club, and belongs to a community dance night group that doubles as a low‑key cardio workout.
  arts: A lively karaoke enthusiast, Sonja Tran enjoys belting out hits by Ariana Grande and classic country tunes from Garth Brooks, streams Fortnite sessions with friends, and reads contemporary fiction
    by Sally Rooney and self‑help titles from Brené Brown, finding artistic inspiration in both modern pop culture and Southern storytelling.
  travel: A spontaneous weekend explorer, Sonja Tran has road‑tripped to New Orleans for its jazz and gumbo, dreamed of a Southern culinary tour of Charleston and Savannah, and hopes to one day study cultural
    history in Dublin, preferring budget‑friendly stays with friends over meticulously planned itineraries.
  culinary: A budding Southern chef, Sonja Tran frequently experiments with homemade BBQ ribs seasoned with smoked paprika, brown sugar, and apple cider vinegar, perfects fluffy buttermilk biscuits paired
    with honey‑glazed fried chicken, and enjoys occasional brunches featuring avocado toast with poached eggs, showcasing a moderate cooking skill set blended with a love for comfort food.
  core: Sonja Tran is a socially vibrant, worry‑prone 22‑year‑old who balances compassionate call‑center work with spontaneous karaoke, community service, and a love for Southern BBQ, all while juggling
    a loosely kept budget and a habit of over‑thinking every decision.
background:
  cultural: Sonja grew up in Montgomery, Alabama, within a middle-class white family of German and Irish ancestry. Her upbringing reflects Southern traditions—frequent church attendance, a strong emphasis
    on hospitality, and community involvement. The city’s rich civil-rights history has given her an appreciation for social justice, which informs her compassionate outlook and volunteer work. She celebrates
    typical Southern holidays with family gatherings, enjoys regional foods like fried chicken, biscuits, and BBQ, and speaks with a gentle Southern drawl. While she identifies with mainstream Southern
    culture, she also values the diverse perspectives present in Montgomery’s multicultural environment, often integrating them into her social and professional interactions.
