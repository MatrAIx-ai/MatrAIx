personas:
  professional: Kasandra Gonzales, an aspiring digital marketing strategist, leverages bilingual fluency, Canva and Photoshop savvy, and event‑planning chops to craft spontaneous, culturally resonant campaigns,
    while her competitive edge and healthy skepticism keep her constantly testing ideas against real‑world metrics.
  sports: Kasandra Gonzales squeezes pick‑up soccer and basketball games into her schedule, plays forward for the local Lincoln Community League team, roots for the Nebraska Cornhuskers and follows the
    Chicago Bulls, and treats each match as a competitive arena where quick decisions mirror her analytical mindset.
  arts: Kasandra Gonzales captures candid moments at festivals with a DSLR, curates short reels set to the salsa rhythms of Marc Antonio and the folk beats of Los Lobos, and regularly attends live shows
    at the Riviera Theatre to soak in performances by The Lumineers and local folk bands, letting music and visual art fuel her creative projects.
  travel: Kasandra Gonzales alternates between spontaneous road trips to the Sandhills and meticulously planned summer visits to Oaxaca’s vibrant markets, budgeting her travel through a dedicated spreadsheet
    while dreaming of hiking Patagonia’s Torres del Paine after graduation.
  culinary: Kasandra Gonzales, a confident home cook, perfects tamales and mole using masa harina, pasilla chilies, and chocolate, experiments with plating for Instagram, yet often forgets to defrost the
    chicken for taco nights and relies on late‑night delivery from the campus food truck for quick meals.
  core: Kasandra Gonzales blends a love for spontaneous cultural celebrations with a sharp, competitive mind, juggling bilingual digital projects, soccer scrimmages, and a habit of over‑committing to events
    while occasionally overlooking deadlines.
background:
  cultural: Kasandra was raised in a Mexican-American household, where Spanish was spoken alongside English and family traditions blended both cultures. She celebrates Día de los Muertos, Mexican Independence
    Day, and traditional Catholic holidays, while also partaking in Midwestern customs such as Thanksgiving and local community fairs. Growing up in Lincoln's Latino community, she has been active in cultural
    clubs that promote Mexican heritage, and she often serves as a bridge between her community and the broader city events. Her bicultural identity informs her worldview, giving her a strong appreciation
    for family cohesion, respect for elders, and the value of hard work. At the same time, she embraces the openness and friendly spirit of the Nebraskan Midwest, integrating both sets of values into her
    personal and professional aspirations.
attributes:
  skills: '["Bilingual communication (English/Spanish)", "Public speaking and group facilitation", "Social media management", "Basic graphic design (Canva, Adobe Photoshop)", "Event planning and coordination",
    "Critical thinking and analytical assessment", "Adaptability and rapid learning", "Team collaboration and leadership"]'
  hobbies: '["Salsa dancing", "Pick-up soccer and basketball games", "Volunteering at cultural festivals", "Cooking Mexican cuisine", "Photography and short-form video creation", "Hiking and exploring Nebraska
    state parks", "Attending live music and local concerts"]'
  career_goals: Kasandra aims to complete her Bachelor's degree in Marketing or Communications and secure a role as a digital marketing strategist for a brand that values multicultural outreach. She aspires
    to become a community-focused brand manager, leveraging her bilingual skills and cultural insight to design inclusive campaigns that resonate with both Latino and broader Midwestern audiences. In the
    longer term, she envisions launching her own boutique event-planning agency that specializes in culturally themed festivals, pop-up experiences, and experiential marketing, where her spontaneous creativity
    and competitive drive can thrive. She is also interested in taking on leadership positions within student organizations to build a strong professional network before entering the workforce.
