  career_goals: Blanca aims to progress into a senior office manager or director of administrative services position, where she can shape workflow policies and mentor junior staff. She plans to earn the
    IAAP Certified Administrative Professional credential and to develop expertise in remote executive support, allowing her to maintain a predictable schedule while enjoying greater solitude. Over the
    next five years, she also hopes to lead initiatives that streamline executive communication and improve workplace wellbeing, reducing stress for herself and her colleagues.
