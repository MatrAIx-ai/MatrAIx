  hobbies: '[''Hiking in the Adirondacks'', ''Reading wellness and dermatology literature'', ''DIY skincare experimentation'', ''Blogging about skin health'', ''Yoga and meditation'', ''Nature photography'',
    ''Community garden volunteering'']'
  career_goals: Doris aims to transition from working in a local salon to opening her own boutique spa that emphasizes natural, science‑backed skincare. She plans to earn a professional aesthetician certification
    and eventually pursue a certificate in cosmetic chemistry to develop her own line of cruelty‑free skincare products. Her competitive drive pushes her to become a recognized brand ambassador for a reputable
    clean‑beauty line, while her curiosity fuels a long‑term goal of authoring a guidebook on practical, at‑home skin health routines.
