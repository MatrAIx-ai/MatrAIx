  hobbies: '[''Fishing'', ''Snowmobiling'', ''Community event hosting'', ''Trivia nights'', ''Vintage truck restoration'', ''Trucking expos'', ''Adult‑league basketball'', ''Volunteer work'']'
  career_goals: Jonathan aims to leverage his extensive driving and sales experience to move into a supervisory or managerial role within a regional transportation firm. He is working toward obtaining a
    CDL-Class A endorsement and completing a logistics management certification, with the long‑term ambition of owning a small fleet of trucks that specializes in local and regional deliveries. He also
    hopes to mentor younger drivers, sharing his calm, structured approach to safety and customer service.
