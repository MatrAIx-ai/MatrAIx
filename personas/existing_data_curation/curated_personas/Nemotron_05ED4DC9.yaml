  career_goals: Although Doris is currently out of the formal workforce, she aims to remain an active catalyst for cultural preservation and community enrichment. Over the next few years she hopes to spearhead
    the creation of a small local historical archive that documents Shippenville’s early settlers, oral histories, and regional folklore. She envisions securing a modest grant to fund this archive and to
    organize a quarterly public lecture series. Additionally, Doris aspires to mentor younger volunteers in grant‑writing and archival techniques, publish a collection of locally sourced stories and genealogies,
    and join the board of the Shippenville public library. Her ambitions are grounded in a desire to leave a lasting, tangible contribution to her town while continuing her own learning through workshops
    on digital archiving and advanced genealogy research.
