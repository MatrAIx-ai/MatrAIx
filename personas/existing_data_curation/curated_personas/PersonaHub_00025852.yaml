persona_description: An astronomer who is interested in the transfer of a research-based conceptual course in university-level introductory astronomy from its original setting to another institution. This
  person is likely to be familiar with the principles of astronomy, the methodology of research-based education, and the effectiveness of cooperative learning teams in enhancing conceptual understanding.
  They may also have experience with teaching at state institutions with scarce teaching resources and are interested in replicating the successful outcomes of the original implementation at the University
  of New Mexico.
