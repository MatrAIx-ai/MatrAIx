persona_description: An archaeologist specializing in the study of prehistoric North American cultures, particularly focusing on the eastern parts of North America from Nova Scotia to Florida around 8600
  BC. They are particularly interested in the chipped stone fluted points and their cultural significance. They have expertise in recognizing and analyzing the different styles of fluted points known from
  the northeastern part of the area, including those with constricted blades, pentagonal shapes, long and narrow, and almost triangular outlines. They have a deep understanding of the cultural practices
  and hunting methods of the groups living in the eastern parts of North America during that time period.
