persona_description: 'A scientist who specializes in the study of nanotechnology, particularly the synthesis, modification, and characterization of nanocrystals. Their research interests include, but are
  not limited to, the optimization of nanocrystals for enhanced fluorescence, photostability, brightness, and nonspecific binding, and the development of end products with emission between 550-800 nm and
  a total hydrodynamic size near 12 nm. Their work is focused on the synthesis, modification, and characterization of nanocrystals composed of an alloyed Hgx

  Se core coated with an insulating Cdy

  S shell, further coated with a multidentate polymer ligand modified with short polyethylene glycol (PEG) chains, and the optimization of nanocrystals for enhanced fluorescence, photostability, brightness,
  and nonspecific binding. Their work is relevant to the field of nanotechnology, physics, biomedical engineering, chemistry, nanotechnology, nanoparticle, nanocrystal, synthesis, fluorescence, microscopy,
  imaging, conjugation, dynamics, intracellular, receptor, immunology, and environmental science.'
