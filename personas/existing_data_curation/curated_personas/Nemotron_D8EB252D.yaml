  career_goals: Christie plans to move into a senior shift lead or safety‑coordinator position within the next three to five years, aiming to earn a Lean Six Sigma Yellow Belt and an OSHA trainer certification.
    She wants to mentor younger workers, streamline routine processes on the floor, and negotiate a part‑time schedule that will allow a gradual transition toward retirement while preserving a steady income
    for her family’s future.
