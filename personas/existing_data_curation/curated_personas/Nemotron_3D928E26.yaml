personas:
  professional: Sara Cusido, a retired mechanical engineer turned community STEM mentor, leverages her solid foundation in industrial equipment design, statistical analysis, and Python scripting to coordinate
    hands‑on workshops, while her practical curiosity and considerate nature ensure projects are both innovative and accessible.
  sports: Sara Cusido, a member of the Chicago Hiking and Birdwatching Club, enjoys gentle trail walks in the Cook County forest preserves, follows the Chicago Cubs baseball season, and partakes in weekly
    yoga classes at a local community center to stay limber.
  arts: Sara Cusido, who spends evenings listening to the acoustic guitar of José Alfredo Jiménez, watching classic films starring Rita Hayworth, and knitting scarves while humming folk tunes by Pete Seeger,
    finds inspiration for her memoir in the storytelling traditions of both the Southwest and the Midwest.
  travel: Sara Cusido, who plans relaxed road trips with her husband, has already visited Oaxaca’s historic center and the Grand Canyon, and now dreams of a pilgrimage to her hometown in the Yucatán Peninsula
    to reconnect with family while photographing cultural festivals along the way.
  culinary: Sara Cusido, a confident home cook, blends spicy jalapeño‑infused salsa verde with Midwest corn mash to create dishes like chilied enchilada casserole and herb‑scented carne asada tacos, favoring
    fresh cilantro, queso fresco, and heirloom tomatoes while experimenting with DIY fermentation.
  core: Sara Cusido balances retired engineer’s analytical mind with hands‑on creativity, nurturing community, garden, and family while navigating age‑related health quirks and a disciplined yet occasional
    indulgent lifestyle.
background:
  cultural: Sara was raised in a Mexican‑American household where family, respect, and hospitality were central. She grew up bilingual, celebrating traditions such as Día de los Muertos, Las Posadas, and
    quinceañeras, while also integrating the customs of the Midwestern United States. Her cultural identity is reflected in the food she prepares, the Spanish language she maintains, and her active involvement
    in the local Mexican community association. Sara values intergenerational connections, often sharing stories and recipes with her grandchildren, and she believes in giving back through community service,
    a principle rooted in the collective spirit of her heritage.
attributes:
  skills: '["Mechanical engineering fundamentals", "Statistical data analysis", "Project planning and coordination", "Technical troubleshooting", "Bilingual communication (Spanish/English)", "Community
    outreach and volunteer coordination", "DIY home repair and maintenance", "Basic programming (Python)", "Technical documentation writing"]'
  hobbies: '["Organic gardening (chiles, herbs, vegetables)", "Cooking Mexican and Midwestern fusion dishes", "Woodworking and small DIY home projects", "Volunteering in school STEM outreach programs",
    "Reading historical fiction and science biographies", "Traveling to Mexican heritage sites and family visits", "Attending community cultural festivals (e.g., Día de los Muertos)", "Walking and birdwatching
    in Cook County preserves", "Knitting scarves and blankets for charity", "Learning photo editing and data visualization software"]'
  career_goals: Although retired from full‑time employment, Sara is devoted to staying intellectually active and giving back to her community. She aims to mentor middle‑school students in her neighborhood’s
    STEM outreach program, sharing her engineering experience and encouraging more girls—especially those of Hispanic heritage—to pursue technical fields. Sara also aspires to complete a short‑term certificate
    in data visualization for personal enrichment, write a memoir that chronicles her journey as a Mexican‑American woman in engineering, and travel to her hometown in Mexico to reconnect with family roots.
    Maintaining her health and the ability to support her grandchildren’s education remain central to her long‑term ambitions.
