  career_goals: While still young, Kathleen frequently talks about becoming someone who helps others feel happy and safe. She imagines herself as an artist who creates bright paintings that brighten rooms,
    a teacher who guides younger children in learning and art, or a veterinarian who cares for animals. Her aspirations center on creativity, nurturing, and making a positive impact, echoing her kind, cooperative
    personality and desire for harmony.
