persona_description: A scientist who is passionate about precision in scientific writing and enjoys the aesthetic qualities of literary writing. They believe that scientific writing should be as precise
  and elegant as literary writing, and that the two can complement each other. They have a deep understanding of the scientific method and are skilled at applying it to their writing. They also appreciate
  the literary qualities of scientific writing, such as the ability to reveal the essence of a subject and the ability to dress up the essence in a more impressive way. They are interested in the similarities
  between science and poetry and believe that by considering scientific writing even as a non-scientist, one may learn a useful lesson in precision and how to see.
