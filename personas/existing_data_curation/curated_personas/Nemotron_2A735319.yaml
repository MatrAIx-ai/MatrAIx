personas:
  professional: Linda Dawson is a data‑driven procurement specialist who blends rigorous cost‑benefit analysis with a competitive edge, consistently out‑performing quarterly savings targets while flexibly
    juggling multiple vendor contracts through SAP Ariba and Coupa, even when their to‑do list feels chaotic.
  sports: Linda Dawson is an avid hiker of the Wasatch foothills, a seasonal skier who hits the slopes at Deer Valley each winter, follows the Utah Jazz and Real Salt Lake passionately, and belongs to a
    local weekend trail‑running club where they secretly compete for the best pace.
  arts: Linda Dawson captures the Utah landscape through a Nikon D5600, drawing inspiration from Ansel Adams and the hushed tones of Bon Iver, while debriefing board game nights with friends by quoting
    favorite Christopher Nolan films.
  travel: Linda Dawson prefers adventure‑focused road trips, having explored Zion and Grand Canyon National Parks and dreaming of Iceland's Northern Lights, but balances that wanderlust with a limited vacation
    budget, often planning weekend escapes to nearby mountain cabins.
  culinary: Linda Dawson experiments with Mediterranean‑inspired dishes like shakshuka and quinoa tabbouleh, enjoys mastering the perfect ramen broth, and despite a moderate cooking skill level, often improvises
    with fresh herbs, kale, and goat cheese to impress friends at trivia night gatherings.
  core: Linda Dawson is a competitive, curiosity‑driven procurement pro who swaps spreadsheets for mountain trails, balances a flexible yet occasionally chaotic schedule, and never misses a chance to snap
    a sunrise photo before diving back into spreadsheet‑heavy vendor negotiations.
background:
  cultural: Linda grew up in a suburban community near Salt Lake City, raised in a family that blends traditional Utah values with a pragmatic, middle‑class work ethic. While her heritage is predominantly
    white with some Mormon cultural influences, she identifies more with the region's strong outdoors ethos and community-oriented mindset than with any strict religious practice. Her upbringing emphasized
    self‑reliance, family gatherings, and a respect for practical solutions, all of which shape her balanced, curiosity‑driven yet results‑focused approach to both professional and personal life.
attributes:
  skills: '[''Strategic Sourcing'', ''Vendor Negotiation'', ''Cost Analysis'', ''Procurement Software (SAP Ariba, Coupa)'', ''Contract Management'', ''Inventory Forecasting'', ''Data Analytics'', ''Supply
    Chain Risk Assessment'', ''Market Research'', ''Project Management Basics'']'
  hobbies: '[''Hiking'', ''Landscape Photography'', ''Mystery Novel Reading'', ''Cooking'', ''Yoga'', ''Trivia Nights'', ''Board Games'', ''DIY Home Projects'', ''Skiing'', ''Volunteering at Food Bank'']'
  career_goals: Linda aims to progress from purchasing agent to senior procurement manager within the next three to five years, leading a cross‑functional sourcing team focused on sustainability and technology
    integration. She plans to obtain the Certified Professional in Supply Management (CPSM) credential and to champion AI‑driven demand forecasting tools in her organization. Ultimately, she envisions influencing
    company‑wide supply‑chain strategy, mentoring junior buyers, and achieving annual cost‑reduction benchmarks that outpace industry averages.
