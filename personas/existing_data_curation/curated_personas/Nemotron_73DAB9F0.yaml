  career_goals: Justin aims to transition into a senior technical leadership role, such as Lead Architect or Chief Technology Officer, where he can shape technology strategy that aligns with business objectives.
    He wants to leverage his business background to drive digital transformation initiatives for mid‑size companies and mentor the next generation of developers. Over the next few years, he plans to contribute
    to open‑source projects, publish thought pieces on integrating business insight with software design, and possibly teach part‑time at a community college to share his blended expertise. He also envisions
    establishing a boutique consultancy that helps local businesses modernize their tech infrastructure while maintaining pragmatic, cost‑effective solutions.
