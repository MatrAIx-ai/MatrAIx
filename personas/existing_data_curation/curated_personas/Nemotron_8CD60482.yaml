  hobbies: '[''Soccer'', ''Latin dancing'', ''Hiking'', ''Cooking Mexican dishes'', ''Volunteer work at animal shelters'', ''Trivia nights'', ''Guitar playing'', ''Reading science fiction'']'
  career_goals: Javier aims to become a leading clinic manager in his region, eventually opening his own veterinary practice that serves both urban pet owners and the surrounding agricultural community.
    He plans to pursue board certification in internal medicine, develop a bilingual outreach program for Spanish‑speaking clients, and become a regular speaker at veterinary conferences. Mentoring younger
    veterinarians and creating partnerships with local animal shelters are also key components of his long‑term professional vision.
