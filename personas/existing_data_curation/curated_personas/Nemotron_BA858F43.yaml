personas:
  professional: Thomas Lee, a budding marine‑themed coder and LEGO engineer, applies their boundless curiosity and competitive edge to design submarine models and solve elementary programming challenges,
    merging artistic sketching of sea creatures with systematic problem‑solving in a self‑directed ‘future marine biologist’ role.
  sports: Thomas Lee, a forward on the Virginia Beach Youth Soccer Club, thrives on competitive weekend matches, idolizes Christian Pulisic, and balances soccer with attending Washington Capitals hockey
    games and cheering for the Virginia Cavaliers during the football season.
  arts: Thomas Lee, an enthusiastic participant in community art workshops, fills sketchbooks with detailed marine illustrations inspired by Wyland and the vivid colors of Hokusai’s wave prints, and eagerly
    watches Pixar’s Finding Nemo and Disney’s The Little Mermaid for artistic inspiration.
  travel: Thomas Lee, a curious explorer of the Atlantic coast, spends summer vacations beachcombing at Virginia Beach, has taken day trips to the National Aquarium in Baltimore and the Smithsonian Museums
    in Washington, D.C., and dreams of visiting the Great Barrier Reef to compare coral species firsthand.
  culinary: Thomas Lee, a budding home cook, loves assembling fish tacos with fresh tilapia, cabbage, and lime, slurps bowls of New England clam chowder topped with crisp bacon, and proudly perfects a simple
    shrimp scampi using garlic, butter, and parsley, though they often forget to wash their hands after handling shells.
  core: Thomas Lee, a 9‑year‑old kinetic curiosity, blends competitive soccer, LEGO engineering, and marine‑themed art into a whirlwind of organized chaos, driven by a love of discovery and a habit of occasionally
    overspending on hobby kits.
background:
  cultural: Thomas comes from a middle‑class white family in Virginia Beach, a city known for its coastal lifestyle and proximity to military installations. His upbringing blends typical suburban American
    culture—school sports, community events, family holidays—with strong regional influences from the Atlantic shoreline. Frequent visits to the local aquarium, beach festivals, and enjoying seafood dishes
    have deepened his appreciation for marine environments. While his family celebrates broader U.S. traditions, they also encourage exposure to diverse cultural experiences through school field trips,
    library programs, and multicultural community events in the city.
attributes:
  skills: '["Reading comprehension", "Elementary mathematics", "Observational naturalist", "Drawing and illustration", "LEGO construction", "Basic digital literacy", "Team coordination in sports", "Strategic
    games (chess, trivia)"]'
  hobbies: '["Beachcombing and shell collecting", "Marine‑themed drawing and painting", "LEGO building and design", "Soccer", "Beginner coding and programming puzzles", "Reading adventure and science books",
    "Visiting museums and aquariums"]'
  career_goals: Thomas dreams of combining his love for the ocean, art, and problem‑solving in his future career. He aspires to become a marine biologist or marine engineer, designing tools to study and
    protect sea life, and hopes to document his discoveries through sketches and videos. In the near term, he aims to be the captain of his elementary school soccer team and to win a regional science fair
    with a project about local marine ecosystems.
