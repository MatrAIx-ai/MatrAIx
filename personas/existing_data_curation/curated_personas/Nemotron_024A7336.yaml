  career_goals: Jennifer hopes to formalize her love of art and compassion by launching a small community art‑therapy program at the local senior center, where she can lead workshops that blend painting,
    storytelling, and mindfulness. She aspires to publish a collection of short stories that explore fantastical themes inspired by her New England surroundings. To deepen her supportive role, she plans
    to pursue a certification in grief counseling or art therapy, allowing her to offer guided sessions for people coping with loss. While maintaining a flexible schedule that honors her preference for
    spontaneity, Jennifer aims to generate a modest income by selling original artwork, handcrafted herbal products, and limited‑edition prints at regional markets. Ultimately, she wants to balance personal
    creative growth with a meaningful contribution to her close‑knit community.
