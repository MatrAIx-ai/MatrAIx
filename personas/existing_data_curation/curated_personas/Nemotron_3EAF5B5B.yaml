personas:
  professional: Abigail Terry, a part‑time community program manager, leverages their methodical project‑management skills, budgeting expertise, and calm conflict‑mediation style to keep volunteer teams
    on track while preserving the inclusive, beach‑town spirit they cherish.
  sports: Abigail Terry spends Saturday mornings playing beach volleyball with their neighborhood league, follows the Washington Commanders football team and the Washington Capitals hockey club on TV, and
    they belong to a local walking club that meets at the boardwalk for sunrise cardio sessions each spring.
  arts: Abigail Terry relishes community‑theater productions, often performing in local adaptations of Stephen Sondheim’s shows, while their book‑club evenings pull them into discussions of Toni Morrison
    and Michael Chabon, and they unwind listening to the soulful crooning of Norah Jones and the classic rock of Bruce Springsteen.
  travel: Abigail Terry prefers thoughtfully planned road‑trip itineraries that blend relaxation on the Virginia Beach shoreline with cultural stops like the historic streets of Charleston and the vibrant
    markets of Oaxaca, budgeting each adventure in advance while they leave a flexible day for spontaneous beach clean‑ups.
  culinary: Abigail Terry enjoys cooking‑class experiments, crafting their own she‑crab soup with fresh Chesapeake Bay crab, perfecting a lemon‑basil focaccia, and savoring occasional nights out for shrimp
    and grits at a beloved waterfront restaurant, while they keep a secret stash of dark chocolate for late‑night study sessions.
  core: Abigail Terry is a meticulously organized, community‑driven planner who balances a love for beach volleyball and theater with a pragmatic approach to finances, and they have a habit of over‑scheduling
    their volunteer calendar.
background:
  cultural: Abigail comes from a middle‑class, Anglo‑American background typical of the Mid‑Atlantic coastal region. Raised in Virginia Beach, she grew up with Southern hospitality values, a love for beach
    and maritime culture, and a strong sense of community involvement. Her family has generational ties to the area, with traditions of church participation (United Methodist) and engagement in local festivals
    such as the Neptune Festival. While she identifies as white American, she embraces the diverse population of Virginia Beach and prioritizes inclusive community engagement.
