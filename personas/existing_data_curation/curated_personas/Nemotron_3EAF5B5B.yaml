  hobbies: '[''Beach Volleyball'', ''Community Theater'', ''Book Club'', ''Cooking Classes'', ''Gardening'', ''Puzzle Solving'', ''Volunteer Work at Animal Shelter'', ''Boardwalk Walking'', ''Yoga'', ''Neighborhood
    Clean‑up'']'
  career_goals: Abigail aims to re‑enter the workforce in a part‑time or flexible role that leverages her organizational talent, such as nonprofit event coordination or community program management. She
    plans to earn a certification in project management or community health to formalize her expertise. Long‑term, she envisions launching a boutique event‑planning service focused on local celebrations
    and charitable fundraisers, while mentoring younger volunteers and fostering inclusive community spaces.
