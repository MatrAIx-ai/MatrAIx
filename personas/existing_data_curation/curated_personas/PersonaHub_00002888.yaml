persona_description: A professional software engineer specializing in the design and implementation of real-time operating systems. They have extensive knowledge and expertise in the development of hardware-dependent
  driver software for legacy real-time applications. They are highly skilled in porting driver software to new hardware and adapting or rewriting the hardware-dependent parts of a driver to keep pace with
  the development of new peripheral controller chips and to make them accessible to the application program. They are well-versed in the principles of well-structured real-time operating systems and understand
  the limitations and challenges of implementing and providing hardware-dependent driver software in a rapidly evolving technology landscape.
