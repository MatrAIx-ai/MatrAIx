personas:
  professional: Carlos Perez, a retired handyman and seasoned community mentor, leverages their mechanical repair expertise, woodworking precision, and bilingual communication skills to run budgeting and
    basic‑repair workshops for seniors, reflecting their organized, reliable, and methodical nature.
  sports: Carlos Perez enjoys low‑impact fitness through daily walks in the neighborhood and tends the garden as exercise, participates in a senior chess club for mental stamina, and they follow the local
    minor‑league baseball team, the Riverside Rattlers, while watching the national basketball league during the winter season.
  arts: Carlos Perez embraces creative expression by reading classic Spanish literature such as Don Quixote, capturing family gatherings and local landscapes through digital photography, listening to flamenco
    guitar recordings by Andrés Segovia, and crafting decorative wooden pieces inspired by the works of Joaquín Sorolla, and they often share these creations at community events.
  travel: Carlos Perez prefers relaxed, well‑planned road trips that combine scenic drives through national parks like Shenandoah with visits to historic European cities, a dream they hope to fulfill by
    exploring the architecture of Seville and sampling local markets, all while keeping travel costs within their modest retirement budget.
  culinary: Carlos Perez delights in cooking traditional dishes like paella and tortilla Española, seasoning them with saffron and smoked paprika harvested from their garden’s peppers, and showcases their
    skill by improvising new sauces using fresh tomatoes, basil, and thyme.
  core: Carlos Perez is a methodical, curiosity‑driven retiree who blends hands‑on craftsmanship, meticulous budgeting, and quiet community service, and they have a love for gardening, photography, and
    preserving family stories.
background:
  cultural: Carlos’s cultural background is rooted in his family’s Spanish heritage, tracing back to ancestors from Andalusia who settled in Texas during the 1950s. Though raised in Amarillo, he grew up
    bilingual, speaking both Spanish and English at home. He upholds Spanish traditions such as celebrating Semana Santa, Día de los Muertos, and preparing family recipes passed down through generations.
    Living in West Texas, he also embraces local customs—enjoying Texas BBQ, participating in community rodeos, and valuing the independent, self‑reliant spirit of the region. His Catholic faith, reinforced
    by regular church attendance, further shapes his values of family solidarity and service.
