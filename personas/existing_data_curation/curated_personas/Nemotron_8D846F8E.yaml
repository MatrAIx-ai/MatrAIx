personas:
  professional: Richard, an aspiring junior robotics engineer, channels their methodical planning and preference for structure into designing Arduino-based robots for their school robotics club, meticulously
    documenting each build as precisely as they follow LEGO Architecture instructions.
  sports: Richard, a committed player on the Houston Hurricanes Little League baseball team and a middle-school football member of the Houston Tigers, balances rigorous practice schedules with a strategic
    focus on teamwork, while cheering for hometown professional teams like the Astros and Rockets for inspiration, and they constantly apply the same methodical mindset from LEGO building to their athletic
    training.
  arts: Richard, a devoted fan of adventure novels such as Percy Jackson, draws creative energy from LEGO designer Nathan Sawaya, enjoys the cinematic scores of John Williams and the pop tunes of Billie
    Eilish, and they let these artistic influences shape their Minecraft builds and LEGO projects.
  travel: Richard, who prefers carefully plotted road trips, has explored Space Center Houston and Disneyland with their family, organized a LEGO-themed scavenger hunt during a weekend visit to Austin,
    and dreams of wandering Kyoto’s historic streets to hunt for rare Pokémon cards, always mapping itineraries in advance to maximize adventure, and they relish the hybrid excitement of planned exploration
    and spontaneous discoveries.
  culinary: Richard, a budding home chef with a knack for following step-by-step recipes, favors building pepperoni pizza towers, crafting chicken-and-cheese quesadillas with mozzarella and avocado, and
    indulging in occasional sugary cereal like Frosted Flakes, yet they admit to over-consuming soda during extended gaming sessions.
  core: Richard blends the disciplined mindset of a LEGO architect with the imaginative spark of a sci-fi reader, channeling that mix into methodical robotics projects, strategic Pokémon trades, and a relentless
    quest for well-planned fun, even if they sometimes forget to finish homework before a game.
background:
  cultural: Richard was raised in Channelview, Texas, a suburban community in Harris County near Houston. His family reflects a typical White American Texan upbringing, valuing punctuality, hard work, and
    community involvement. They celebrate national holidays with regional flavor—Fourth of July fireworks, Thanksgiving with turkey and pecan pie, and summer barbecues featuring brisket and Tex‑Mex tacos.
    The family attends a local Protestant church, where fellowship and service projects are a regular part of life. At school, Richard interacts with a diverse peer group, including Hispanic and African
    American classmates, fostering a broader cultural awareness. He enjoys outdoor activities along the nearby Galveston Bay, family trips to the Gulf Coast, and community festivals that highlight the blend
    of Southern, Gulf, and multicultural influences of the Greater Houston area.
attributes:
  skills: '[''Organization'', ''Time Management'', ''Basic Computer Literacy'', ''Introductory Coding (Scratch)'', ''Problem Solving (Logic Puzzles)'', ''LEGO Model Building'', ''Responsibility (Household
