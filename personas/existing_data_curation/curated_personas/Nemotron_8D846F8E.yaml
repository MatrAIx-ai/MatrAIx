  hobbies: '[''Reading adventure & sci‑fi books'', ''LEGO architectural model building'', ''Little League baseball'', ''Middle school football'', ''Robotics club'', ''Introductory coding (Scratch)'', ''Collecting
    Pokémon cards'', ''Minecraft creative building'', ''Watching nature documentaries'', ''Attending local community events (e.g., Houston Rodeo)'']'
  career_goals: Inspired by his love for building and systematic work, Richard envisions a future as a civil engineer designing bridges, roads, or community parks where clear structure and predictability
    are paramount. He is also fascinated by technology and imagines becoming a software developer or robotics engineer, creating programs and machines that solve real‑world problems. To achieve these goals,
    he plans to maintain top grades, aim for honor roll in high school, join a competitive robotics team, and eventually attend a university with strong engineering and computer science programs. He hopes
    to contribute to his hometown’s development projects, combining his teamwork skills with his methodical approach.
