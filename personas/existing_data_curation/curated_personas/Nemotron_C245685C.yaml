  career_goals: Thomas aims to transition from senior developer to technical lead or software architect, guiding the design of enterprise‑grade systems that blend legacy stability with modern scalability.
    He plans to earn advanced cloud certifications (AWS Solutions Architect, Certified Kubernetes Administrator) and to contribute to open‑source projects that align with his interest in secure, performant
    code. Over the next five years, he hopes to mentor a cohort of junior developers, publish a technical guide on building resilient microservices, and potentially launch a consulting side‑business focused
    on helping Midwest small businesses adopt cloud technologies. While ambitious, he values a balanced lifestyle that allows him to maintain his personal interests and financial security as he approaches
    retirement.
