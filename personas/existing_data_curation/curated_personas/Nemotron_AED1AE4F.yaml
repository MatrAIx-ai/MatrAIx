  career_goals: She aims to graduate high school and pursue further education, ideally studying culinary arts at a community college to blend her love for Mexican cooking with innovative, health‑focused
    cuisine. Long‑term, she envisions opening a family‑run taquería in Santa Rosa that showcases traditional recipes while incorporating sustainable practices. She also expresses interest in becoming a
    bilingual community outreach coordinator, helping local farms and agricultural businesses communicate effectively with Spanish‑speaking workers.
