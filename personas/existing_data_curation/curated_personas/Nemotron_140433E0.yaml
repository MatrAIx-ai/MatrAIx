personas:
  professional: Roger Bevis, a 35-year-old telecommunications field technician, leverages their meticulous cable-splicing expertise and methodical project planning to deliver reliable fiber-to-the-home
    installations while patiently translating technical jargon for rural customers, a habit forged by years of community volunteering and a deep sense of neighborly responsibility.
  sports: Roger Bevis, an avid weekend hiker of the Eno River trails, supports the Carolina Hurricanes and the local high-school football team, and belongs to the Benson Trail Runners club, preferring low-impact
    cardio over competitive sports to preserve their back.
  arts: Roger Bevis, an analog photography enthusiast, spends evenings developing film of abandoned textile mills while listening to Miles Davis, Odetta, and Aphex Twin, and volunteers at the county fair's
    bluegrass stage, blending their love for vintage audio tinkering with a curiosity for experimental sound.
  travel: Roger Bevis, a planner-oriented road-tripper, has explored Asheville's art scene, the Outer Banks' lighthouse trails, and New Orleans during Mardi Gras, and dreams of chasing the Northern Lights
    in Iceland, always mapping routes months ahead to balance budget and family obligations.
  culinary: Roger Bevis, who enjoys cooking Southern classics like smoked catfish and collard greens with a dash of chipotle, also experiments with Thai green curry using lemongrass and kaffir lime, yet
    sometimes defaults to late-night pizza when their analog camera batteries run out.
  core: Roger Bevis merges a solitary, detail-driven mind with community-centered compassion, channeling their love for vintage tech and rural landscapes into a life of methodical service, occasional impulse
    buys, and quiet artistic pursuits.
background:
  cultural: Roger grew up in Benson, a close‑knit community in Johnston County, North Carolina, where Southern hospitality and a strong sense of neighborly responsibility are ingrained. His family’s generational
    ties to the region fostered an appreciation for local traditions, church gatherings, and communal events like county fairs and blue‑grass concerts. While identifying as white, he is mindful of the diverse
    histories of the area and values inclusivity, often supporting initiatives that bring technology and education to underserved groups. His upbringing emphasized hard work, modesty, and the importance
    of giving back, shaping his compassionate outlook and dedication to improving his hometown’s connectivity and quality of life.
attributes:
  skills: '[ ''Fiber optic splicing'', ''Coaxial cable installation'', ''Radio broadcast equipment maintenance'', ''Network troubleshooting'', ''Electrical schematics interpretation'', ''Project planning
    and coordination'', ''Technical documentation'', ''Customer service and education'', ''Safety compliance'', ''DIY electronics repair'' ]'
  hobbies: '[ ''Analog photography'', ''Model radio building'', ''Hiking in nature'', ''Reading science‑fiction'', ''Listening to jazz, folk, and experimental music'', ''Volunteer tech workshops for seniors'',
    ''Restoring vintage audio equipment'' ]'
  career_goals: Roger aims to advance from field technician to senior project supervisor within the next five years, seeking certifications such as BICSI Installer / Integrator and IEEE Certified Technician.
    He is passionate about expanding broadband access in rural North Carolina, hoping to lead community‑focused fiber‑to‑the‑home projects that bridge the digital divide. Long‑term, he envisions starting
    his own small contracting firm that specializes in sustainable, energy‑efficient telecom installations and offers training workshops for local residents and veterans. Continued education, perhaps completing
    an associate’s degree in electrical engineering technology, is also a key part of his professional growth plan.
