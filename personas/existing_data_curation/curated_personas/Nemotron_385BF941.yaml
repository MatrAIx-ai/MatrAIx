  career_goals: Although retired, Amitkumar aims to stay active and purposeful by mentoring his grandchildren in practical skills and financial literacy, and by volunteering as a reliable organizer for
    his local church’s outreach programs. He seeks to preserve his health through a disciplined routine, ensure his household remains financially secure, and support his wife by sharing household responsibilities.
    His long‑term ambition is to leave a legacy of order, kindness, and cultural pride for the next generation of his family.
