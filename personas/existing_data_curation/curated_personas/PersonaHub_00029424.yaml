persona_description: A conservation biologist who specializes in the study of whitebark pine, an endangered species in British Columbia, Canada. She is particularly interested in the effects of white pine
  blister rust, an exotic fungus that has killed millions of white pine trees in the western United States and Canada. Her research involves identifying and breeding resistant trees, maintaining unlogged
  tracts of forest, and developing strategies to save the species. She is known for her expertise in the field of forest conservation and her commitment to protecting endangered species.
