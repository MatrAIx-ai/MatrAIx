  hobbies: '["Sketching cityscapes and street murals","Visiting art galleries and museums","Collecting and listening to jazz, soul, and hip‑hop vinyl","Road trips along the East Coast","Photography of urban
    and coastal scenes","Creative writing (short essays and reflections)","Volunteering with youth mentorship and road‑safety programs","Cooking traditional Southern recipes"]'
  career_goals: While Virginia finds satisfaction in the day‑to‑day rhythm of driving, she is motivated to leverage her experience into a leadership role within the Wilmington‑based transit authority. Over
    the next five years she aims to complete the Certified Transit Operations Trainer program, mentor apprentices, and eventually move into a supervisory position such as Driver Operations Manager or Safety
    Coordinator. She is also interested in participating in pilot projects for electric buses, using her hands‑on perspective to shape policy and training curricula. At a broader level she hopes to advocate
    for more inclusive, community‑focused transportation planning that reflects the needs of underserved neighborhoods.
