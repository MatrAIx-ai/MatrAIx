  hobbies: '[''sketching and drawing'', ''digital painting'', ''reading speculative fiction'', ''listening to Mexican folk music'', ''photography of natural scenes'', ''cooking traditional Mexican dishes'',
    ''participating in community mural projects'', ''basic Python coding for generative art'']'
  career_goals: Octavio aims to transform his passion for visual arts and storytelling into a professional career. After completing his GED, he plans to enroll in a community‑college program in graphic
    design or visual communication, eventually transferring to a university to specialize in illustration and interactive media. His long‑term ambition is to become a multidisciplinary artist who creates
    immersive digital experiences—such as video games, virtual exhibitions, or multimedia installations—that blend Mexican cultural motifs with contemporary design. He also envisions using his organizational
    strengths to establish a community art studio in the East Bay, offering workshops for youth and preserving cultural heritage.
