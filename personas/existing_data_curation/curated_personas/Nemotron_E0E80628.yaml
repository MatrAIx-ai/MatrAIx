personas:
  professional: Hilda Pruett is a dedicated airline cabin crew professional who blends rigorous safety certification and conflict‑de‑escalation expertise with an artistic eye for in‑flight ambience, designing
    themed cabin experiences, mentoring new attendants, and balancing meticulous procedural compliance with inventive service concepts, all while they maintain a calm, collaborative presence.
  sports: Hilda Pruett enjoys a balance of outdoor adventure and mindful movement, hiking with the Idaho Trailblazers club on weekend afternoons, attending Crossroads Yoga sessions to counteract long‑haul
    flight fatigue, supporting the Idaho Vandals basketball team and Boise State football, and they occasionally join a local recreational soccer league for a burst of camaraderie.
  arts: Hilda Pruett immerses themselves in the visual and performing arts, drawing inspiration from watercolor masters like John Singer Sargent and Winslow Homer, listening to indie folk artists such as
    Sufjan Stevens and Bon Iver while painting, attending Pocatello Art Center workshops, and they find narrative cues in Studio Ghibli films and the storytelling of author N. K. Jemisin.
  travel: Hilda Pruett's travel style blends spontaneous adventure with thoughtful planning, they leverage crew discounts to explore coastal cities like Seattle and San Francisco, jet‑set to Tokyo to practice
    Japanese, hike Yellowstone and Glacier National Parks, and dream of trekking Patagonia and chasing the midnight sun in Iceland, all while balancing a modest travel budget and occasional family commitments.
  culinary: Hilda Pruett's culinary preferences favor seasonal, locally sourced ingredients, from preparing miso‑glazed salmon and rosemary‑infused Idaho potatoes to crafting wild mushroom risotto and a
    soothing matcha latte; they consider themselves a competent home cook who delights in experimenting with Japanese flavors yet often indulge in farm‑to‑table eateries for fresh trout almondine when traveling.
  core: Hilda Pruett is an imaginative cabin crew member who habitually sketches each landing, balances a disciplined budget with impulsive watercolor splurges, and they find calm in nightly yoga, while
    they can’t resist a late‑night sci‑fi novel before sleep.
background:
  cultural: Hilda grew up in Pocatello, Idaho, within a predominantly white, middle‑class, small‑town American environment. Her upbringing blended Midwestern values of modesty and community cooperation
    with the outdoors‑oriented culture of the Mountain West. She was raised with an appreciation for the region's natural beauty, which nurtured her love for hiking and landscape art. While firmly rooted
    in mainstream American traditions, she also respects the diverse cultural heritage of the area, including nearby Native American histories, and embraces inclusivity through her interactions with travelers
    from around the world.
attributes:
  skills: '[''Customer Service'', ''Safety Procedures'', ''First Aid Certification'', ''Conflict De‑escalation'', ''Basic Spanish Communication'', ''Time Management'', ''Creative Problem Solving'', ''Digital
