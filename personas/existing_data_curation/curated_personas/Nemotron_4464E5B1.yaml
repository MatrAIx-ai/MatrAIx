  hobbies: '["Painting and sketching", "Visiting art galleries and museums", "Attending live music performances (jazz, hip‑hop, gospel)", "Reading contemporary literature and poetry", "Creative writing
    (journaling, short stories)", "Photography (urban and nature)", "Cooking traditional African American and Caribbean dishes", "Traveling to experience new cultures", "Dancing (hip‑hop, Afrobeat)", "Playing
    basketball in community leagues", "Volunteering at local youth arts programs", "Yoga and mindfulness meditation", "Hiking in nearby state parks"]'
  career_goals: Nazim aims to become a Certified Addictions Counselor (CAC) and later pursue a Licensed Clinical Social Worker (LCSW) credential to expand his clinical authority. He is passionate about
    launching an arts‑integrated recovery program that partners with local community centers and schools in Orange County, providing creative workshops for teens and adults battling substance use. Over
    the next five years, he envisions leading a multi‑disciplinary behavioral health clinic as its director, contributing research on the efficacy of expressive therapies, publishing articles in peer‑reviewed
    journals, and presenting at national conferences. He also aspires to mentor junior counselors, advocate for culturally responsive mental‑health policies, and eventually open a private practice that
    blends traditional counseling with holistic, art‑based healing modalities.
