personas:
  professional: Nazim Brown, a 33‑year‑old licensed substance‑abuse and behavioral‑disorder counselor, blends evidence‑based modalities like Motivational Interviewing, CBT, and DBT with art‑based and music‑infused
    interventions, leveraging their curiosity and calm resilience to design expressive‑therapy programs that empower clients while simultaneously steering multidisciplinary teams and writing grant proposals.
  sports: Nazim Brown stays active by playing pickup basketball with the Orlando Community Center League, dancing to Afro‑beat at local studios, and practicing morning yoga at the Lake Eola Yoga Club, all
    while cheering for the Orlando Magic and following Orlando City SC’s season with a friendly rivalry mindset.
  arts: Nazim Brown channels creative curiosity into oil paintings of Florida’s wetlands, sketching street scenes after attending live shows by Kamasi Washington, Kendrick Lamar, and gospel ensembles, and
    participating in spoken‑word open‑mic nights that echo the rhythms of poet Rupi Kaur, while also curating visits to Orlando galleries featuring contemporary voices.
  travel: Nazim Brown prefers purposeful weekend getaways that combine cultural immersion and natural beauty, meticulously planning trips to New Orleans for its jazz heritage, the Everglades for kayaking,
    Savannah’s historic squares, and occasionally jetting off to Marrakesh’s vibrant souks, balancing a modest travel budget with a love for spontaneous photo‑walks.
  culinary: Nazim Brown enjoys cooking soul‑food inspired meals at an intermediate skill level, perfecting dishes like shrimp and grits seasoned with smoked paprika, collard greens slow‑cooked with smoked
    turkey, and sweet potato pie infused with Florida orange zest, while sourcing fresh local produce and occasionally ordering artisanal hot sauce online.
  core: Nazim Brown, a calm, curiosity‑driven counselor‑artist, balances a disciplined professional life with late‑night sketch marathons, a habit of forgetting to water houseplants, and an occasional splurge
    on premium art supplies that leaves the credit card balance flirting with its limit.
background:
  cultural: Nazim was raised in a close‑knit African‑American family in the Southeast, where church music, storytelling, and community service were daily staples. His parents emphasized the importance of
    cultural pride, resilience, and giving back, instilling in him a deep respect for the civil‑rights legacy and the Black Arts Movement. Relocating to Orlando exposed him to a multicultural tapestry that
    includes Caribbean, Latinx, and other minority communities, broadening his worldview and reinforcing his appreciation for diversity. He regularly incorporates culturally affirming practices—such as
    gospel music, Afro‑centric art, and narratives of empowerment—into his counseling work, ensuring that clients see their heritage reflected in the therapeutic process. His cultural identity shapes his
    commitment to addressing systemic inequities in mental‑health access and to celebrating the richness of Black creativity within a broader, inclusive community.
attributes:
  skills: '["Motivational Interviewing", "Cognitive Behavioral Therapy", "Dialectical Behavior Therapy", "Crisis Intervention", "Group Counseling Facilitation", "Individual Counseling", "Substance Abuse
