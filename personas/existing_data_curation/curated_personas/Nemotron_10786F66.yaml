personas:
  professional: Steven Yarbrough, a veteran long‑haul truck driver with over 35 years of experience and a spotless safety record, uses their Class A CDL, mastery of route‑optimization tools like McLeod
    and TruckMate, and sales acumen to mentor younger drivers, coach safety practices, and consult regional logistics firms on efficient routing and DOT compliance.
  sports: Steven Yarbrough, an avid fisherman and weekend boater, spends mornings on Lake Havasu casting for bass, follows the Arizona Diamondbacks and Denver Broncos for their occasional victories, and
    they also participate in a senior canoe club that meets bi‑weekly on the Colorado River.
  arts: Steven Yarbrough, a watercolor enthusiast who captures desert sunsets and lake reflections, draws artistic inspiration from Georgia O’Keeffe’s desert palettes and Ansel Adams’ tonal mastery, regularly
    visits the Havasu Arts Center for regional exhibitions, and they enjoy intimate folk‑music performances featuring artists like John Koerner.
  travel: Steven Yarbrough, a methodical road‑trip planner, prefers sunrise drives through the Southwest’s national parks—having already visited the Grand Canyon, Zion, and Sedona—and they are saving for
    a summer cruise along the Pacific Coast Highway to photograph Northern California’s misty redwoods.
  culinary: Steven Yarbrough, a competent home cook, favors grilled lake trout, spicy carne asada tacos, and prickly‑pear salsa, and they often pair meals with a strong cup of locally roasted coffee and
    a splash of lime.
  core: Steven Yarbrough, a road‑seasoned watercolorist who channels diesel‑engine rhythms into their art, never skips their 5 am coffee before sunrise, hoards bottle caps from truck stops as "inspiration
    tokens", and they occasionally forget to stretch after long drives.
background:
  cultural: 'Steven is a white American whose family roots trace back to Midwestern farm communities, where values of hard work, self-reliance, and community service were emphasized. Growing up during the
    1960s and 1970s, he absorbed classic American folk and rock music and a modest, pragmatic worldview. His decades as a truck driver exposed him to a broad spectrum of regional cultures across the United
    States, fostering an openness to new ideas and unconventional thinking. Settling in Lake Havasu City introduced him to Southwestern influences: a deep appreciation for desert landscapes, Native American
    art motifs, and a relaxed, water-oriented lifestyle centered around the lake. He blends his Midwestern work ethic with the laid-back, nature-focused vibe of Arizona, resulting in a cultural identity
    that honors his heritage while embracing the diverse experiences encountered on the road.'
attributes:
  skills: '[''Class A Commercial Driver License (CDL)'', ''Route Planning & Optimization'', ''Freight Contract Negotiation'', ''Customer Relationship Management'', ''Vehicle Maintenance & Mechanical Troubleshooting'',
    ''DOT Safety Compliance'', ''Logistics Software (McLeod, TruckMate)'', ''Digital Photography & Basic Photo Editing'', ''Inventory Management'']'
  hobbies: '[''Watercolor painting'', ''Landscape photography'', ''Boating & fishing on Lake Havasu'', ''Reading nonfiction (history, transportation, technology)'', ''Small-group book club'', ''Visiting
    local art galleries'', ''Hiking desert trails'', ''Attending community heritage festivals'']'
  career_goals: As he approaches retirement, Steven aims to transition from full-time long-haul driving to a mentorship role, offering part-time driver training and safety coaching for younger colleagues
    at his current company. He also plans to launch a small consulting service that advises regional logistics firms on efficient route design and compliance best practices. On a personal level, his ambition
    is to compile a photo-essay book that captures the unique light and geography of the Arizona desert and Lake Havasu, with the goal of exhibiting the work at the local community center. He wants to maintain
    a steady income, stay physically active, and allocate more time to his family and artistic pursuits while preserving the financial security built over his career.
