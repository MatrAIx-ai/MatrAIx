persona_description: A geologist who specializes in the study of glacial processes, particularly the effects of climate change on ice sheets and glaciers. He is a professor at the University of Tromsø and
  is working on a flagship project to study the connection between climate in the ocean and the spread of glaciers. The project aims to collect sediment samples from the sea floor between Svalbard and Greenland
  and study the content of shell from small single-celled microorganisms in these sediment samples. The research findings from the flagship project will be disseminated internationally, and the project
  also promises the dissemination of information on a new level through mobile exhibitions, collaboration with the science centres, and computer-based tools. The geologist believes that the models which
  are utilised to make prognoses about the future climate changes consider palaeoclimate only to a minor degree and that the flagship project will provide new inspiration for climate research for many years
  to come. He is also collaborating with the Polaria Museum and the Svalbard Museum on international exhibitions and participating in the Geology World Congress in Oslo in 2008.
