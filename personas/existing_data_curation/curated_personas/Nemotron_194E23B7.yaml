personas:
  professional: Norma Sleeth is an aspiring game developer who creates simple Scratch games, applying her methodical planning and curiosity for puzzles to design interactive adventures while her organized
    nature ensures she meets project deadlines for school assignments.
  sports: Norma Sleeth is a dedicated member of the Willowbrook Wolves U13 soccer team, practices twice weekly, follows the Premier League's Manchester United fervently, and balances her love for outdoor
    hikes with structured cardio drills, showing her methodical yet enthusiastic approach to fitness.
  arts: Norma Sleeth immerses herself in mystery novels by Agatha Christie and adventure series by Rick Riordan, sketches whimsical characters inspired by animator Hayao Miyazaki, and listens to upbeat
    pop tracks from Billie Eilish while building LEGO dioramas, all of which shape her imaginative identity.
  travel: Norma Sleeth enjoys family weekend trips to nearby state parks such as Yellowstone, dreams of visiting the interactive Miraikan Science Museum in Tokyo, and prefers meticulously planned itineraries
    over spontaneous road trips, balancing her curiosity with her organized nature.
  culinary: Norma Sleeth is a budding home chef who loves crafting pepperoni pizza with a homemade crust, experimenting with rainbow fruit kebabs using strawberries, blueberries, and pineapple, and can
    reliably whip up a quick grilled cheese, though she often forgets to clean the kitchen after cooking.
  core: Norma Sleeth blends a detective’s curiosity with a builder’s precision, juggling LEGO bricks, soccer drills, and secret snack stashes while meticulously planning every adventure.
background:
  cultural: Norma comes from a middle‑class white family that has lived in the Dallas‑Fort Worth metroplex for several generations. Her parents value education, community involvement, and practical skills,
    encouraging her curiosity while emphasizing responsibility. Family traditions include celebrating holidays like Thanksgiving and the Fourth of July with backyard barbecues, attending a local Methodist
    church on Sundays, and supporting her school's events and sports teams. Growing up in Arlington, Texas, she experiences a blend of suburban life and regional Texan culture, shaping her respectful, collaborative,
    yet self‑assertive outlook.
