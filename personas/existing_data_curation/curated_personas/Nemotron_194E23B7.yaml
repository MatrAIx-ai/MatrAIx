  career_goals: Norma aspires to pursue a career that blends her love for animals and interest in science. She envisions becoming a veterinarian, focusing on wildlife rehabilitation, or exploring biomedical
    engineering to design medical devices. In the near term, she aims to excel in her science and math courses, join the school's robotics club, and attend summer STEM programs. She also hopes to take on
    leadership roles in school clubs, demonstrating her organized and cooperative nature while championing community‑service projects.
