  career_goals: Viral aims to leverage his deep analytical experience to transition into a senior advisory role within his organization or as an independent consultant, focusing on guiding strategic initiatives
    that improve operational efficiency and financial performance. He aspires to mentor junior analysts, fostering a culture of evidence‑based decision‑making while emphasizing the importance of work‑life
    balance and mental wellbeing. Over the next five years, he hopes to lead a cross‑functional project team that implements data‑driven sustainability practices within the company, aligning his professional
    ambitions with his personal values of responsibility and resilience.
