persona_description: A conservationist who is interested in natural habitats and their management, particularly in the context of arable margins. This person is knowledgeable about the benefits of wildflower
  margins and cultivated margins in protecting and encouraging rare arable plants. They are interested in the use of technology to aid in the identification of rare arable plants and the management of these
  areas to ensure productive land is not impacted. They are also interested in the potential for rare arable plants to populate field margins and are looking for ways to enhance the color and biodiversity
  of these areas.
