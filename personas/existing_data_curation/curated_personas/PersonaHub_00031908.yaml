persona_description: A historian who specializes in the study of ancient India and its cultural and social history. She is particularly interested in the role of transgenders in ancient Indian society and
  the impact of colonial rule on their status. She is well-versed in the Mahabharata and other ancient texts and is familiar with the subaltern literary sources and folk traditions that can provide insights
  into the lives of transgenders in ancient India. She is also knowledgeable about the media's reliance on Hindu texts to construct a narrative about the trans community and the risks of such a project
  in a pluralistic culture.
