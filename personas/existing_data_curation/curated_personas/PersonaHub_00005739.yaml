persona_description: A conservationist and advocate for sustainable fishing practices, particularly in the Southern Ocean, who is passionate about reducing illegal fishing and protecting endangered species,
  including seabirds, through the development and implementation of management measures and the promotion of responsible fishing practices. They are knowledgeable about the history and current state of
  illegal fishing in the Southern Ocean, including the rise of IUU fishing, and have a deep understanding of the impact of illegal fishing on marine ecosystems and the livelihoods of coastal communities.
  They are committed to working with international organizations, such as the CCAMLR and CITES, to develop and enforce effective management measures and are willing to engage in public education and advocacy
  efforts to raise awareness about the importance of sustainable fishing practices and the need for increased surveillance and enforcement efforts to combat illegal fishing.
