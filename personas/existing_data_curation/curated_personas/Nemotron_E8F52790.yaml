personas:
  professional: Ashley Owens, a civil engineer specializing in structural design, site development, and sustainable infrastructure, leverages their methodical planning, reliability, and outgoing collaborative
    style to lead large-scale flood mitigation projects while championing mentorship for women and underrepresented groups in engineering.
  sports: Ashley Owens energizes their fitness schedule with sunrise hikes on the Neuse River Trail, weekly yoga sessions at the downtown community studio, membership in the Raleigh Trailblazers running
    club, and a loyal fandom for the Carolina Hurricanes in hockey and the NC State Wolfpack football team each fall.
  arts: Ashley Owens expresses their love for storytelling by attending live‑music events featuring Leon Bridges, Robert Glasper, and Rapsody, curating a cherished collection of African‑inspired pottery,
    and reading historical fiction by Colson Whitehead and Toni Morrison during quiet evenings.
  travel: Ashley Owens plans trips with a blend of meticulous research and spontaneous curiosity, favoring weekend photography hikes in Shenandoah National Park, annual cultural journeys to New Orleans
    for Mardi Gras, and a long‑term dream of exploring Ghana’s historic forts and vibrant markets.
  culinary: Ashley Owens showcases confident culinary chops by mastering soul‑food classics like smoked pork shoulder and collard greens seasoned with suya spice, crafting sweet‑potato cornbread infused
    with coconut milk, and creating gumbo‑style jambalaya that blends Southern comfort with West African aromatics for neighborhood potlucks.
  core: Ashley Owens fuses analytical precision with Southern hospitality, obsessively organizing project schedules while never turning down an invitation to host late‑night cook‑outs, even if it means
    sacrificing a few hours of sleep.
background:
  cultural: Ashley identifies as African American and draws strength from her family's legacy of perseverance and community service. Raised in a close-knit household that valued education, she celebrates
    cultural traditions such as Juneteenth, Kwanzaa, and church gatherings that emphasize fellowship and mutual support. Her upbringing in the South has blended Southern hospitality with rich African American
    heritage, influencing her love for soulful cuisine and community storytelling. Ashley remains actively involved in local Black professional networks, supports initiatives that empower minority women
    in engineering, and uses her platform to highlight the contributions of Black engineers to North Carolina's built environment.
