  hobbies: '[''STEM Outreach Volunteering'', ''Mentoring Youth'', ''Hiking'', ''Landscape Photography'', ''Yoga'', ''Cooking (Southern-African Fusion)'', ''Reading Historical Fiction'', ''Live Music Festivals'',
    ''Community Cultural Events'']'
  career_goals: Ashley aims to obtain her professional engineering (PE) license within the next two years and advance to a senior civil engineer role overseeing large-scale infrastructure projects, such
    as flood mitigation systems and community bridges in eastern North Carolina. She aspires to lead multidisciplinary teams, shape sustainable design standards, and influence regional policy on resilient
    water management. Long-term, she envisions becoming a director of engineering or founding a consulting firm that prioritizes equity and mentorship, creating pathways for underrepresented groups in engineering.
