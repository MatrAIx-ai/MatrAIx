  skills: '[''Structural Design'', ''Site Development'', ''Sustainable Infrastructure'', ''AutoCAD'', ''Revit'', ''GIS'', ''Project Management'', ''Budgeting'', ''Scheduling (MS Project)'', ''Risk Assessment'',
