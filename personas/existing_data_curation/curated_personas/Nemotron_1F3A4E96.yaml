personas:
  professional: Karla Lazard, a budding Certified Nursing Assistant student, leverages their meticulous budgeting, home‑management expertise, and natural mediation skills to prepare for a home‑based catering
    venture that will supply soul‑filled Gulf‑Coast seafood meals to churches and community events while campaigning for a board seat at the local community center.
  sports: Karla Lazard stays fit by walking along Sabine Lake each sunrise, cheering the Houston Astros from a well‑worn cap, and playing in a community adult‑softball league on Saturday afternoons, preferring
    low‑impact activity over high‑intensity workouts that suit their balanced lifestyle.
  arts: Karla Lazard finds creative solace in the church choir, where they lift gospel hymns by Mahalia Jackson and blues classics by B.B. King, while devouring historical fiction by Toni Morrison and Maya
    Angelou during quiet evenings, letting literary rhythm shape their worldview.
  travel: Karla Lazard favors road‑trip adventures along the Gulf Coast, having explored the historic streets of New Orleans and the oak‑lined squares of Savannah, while dreaming of a cultural pilgrimage
    to Washington, D.C.’s museum district, always planning trips around school calendars and modest budget constraints that suit their pragmatic nature.
  culinary: Karla Lazard crafts hearty meals that marry soul‑food classics with Gulf‑Coast bounty, expertly preparing collard greens seasoned with smoked turkey, shrimp étouffée with freshly caught Gulf
    shrimp, and okra gumbo simmered with home‑grown herbs, showcasing their intermediate culinary skill and love for experimental flavor pairings.
  core: Karla Lazard, the garden‑tending, choir‑singing planner, balances a disciplined home‑management routine with a habit of losing track of time in the pages of historical novels and a penchant for
    splurging on fresh oysters that leave their credit card slightly breathless.
background:
  cultural: Karla is an African‑American woman whose family lineage traces back to the Great Migration, settling in the Gulf‑Coast region of Texas. Growing up in Port Arthur, she was immersed in a faith‑centered
    community where church, family gatherings, and shared meals created a strong sense of belonging. Her cultural identity blends Southern soul‑food traditions with coastal seafood influences, reflecting
    the culinary heritage of the region. Music, storytelling, and oral history are integral to her upbringing, reinforcing values of resilience, mutual support, and respect for elders. Living in a multicultural
    town that includes Mexican, Asian, and other immigrant communities, Karla embraces cultural inclusivity while honoring the core traditions of Black Southern heritage.
attributes:
  skills: '[''Home budgeting'', ''Meal planning & Southern cooking'', ''Vegetable gardening'', ''Basic DIY home repair (carpentry, plumbing, electrical)'', ''Sewing and textile repair'', ''Family conflict
    mediation'', ''Volunteer coordination for church and community center'', ''Digital literacy (email, online learning)'']'
  hobbies: '[''Reading (historical fiction, African‑American literature, self‑improvement)'', ''Vegetable gardening'', ''Soul food & Gulf‑Coast cooking'', ''Knitting and quilting'', ''Church choir participation
    (gospel and blues)'', ''Morning walks along Sabine Lake'', ''Genealogy research'']'
  career_goals: Karla aspires to turn her culinary talent into a small home‑based catering service that supplies traditional soul food and Gulf‑Coast seafood meals for local churches, community events,
    and family gatherings. She plans to enroll in a Certified Nursing Assistant (CNA) program to gain formal caregiving credentials, enabling her to provide part‑time support to elderly neighbors while
    earning additional income. Karla also aims to earn a seat on the board of the Port Arthur community center, where she can advocate for safer environmental practices amid the oil industry and develop
    after‑school programs for youth. Long‑term, she hopes to secure sufficient college funds for her children and eventually compile a memoir that preserves her family’s oral history and cultural legacy.
