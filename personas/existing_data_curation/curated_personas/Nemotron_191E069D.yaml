  career_goals: Waleska aims to turn her passion for Mexican culinary traditions into a series of community cooking workshops, fostering cultural exchange in Powhatan. She aspires to take on a larger volunteer
    leadership role within the local cultural festival committee, using her event‑planning expertise to showcase Mexican heritage. Additionally, she plans to obtain a certified first‑aid instructor credential
    to enhance her caregiving contributions and to explore a modest home‑based catering venture that could provide supplemental income while allowing her to stay engaged with friends, family, and neighbors.
    To support these ambitions, she intends to deepen her digital marketing skills, enabling her to promote her workshops and services effectively.
