personas:
  professional: Lyndon Mattocks is a municipal water and wastewater treatment operator who merges his methodical SCADA monitoring and quick‑fix troubleshooting with a cooperative shift‑handing style, all
    while they wrestle with the anxiety of upcoming certification exams and slip into spontaneous guitar jam sessions during break times.
  sports: Lyndon Mattocks dominates intramural basketball and ultimate frisbee evenings, casts the line for bass on the Iowa River each weekend, and cheers on the Iowa Hawkeyes football team while holding
    season tickets for the Iowa Wolves G‑League squad, all while they relish the camaraderie of team sports and community clean‑up events.
  arts: Lyndon Mattocks strums acoustic guitar at local brewpub open‑mic nights, cites John Mayer and Sufjan Stevens as musical inspirations, and unwinds by streaming indie films like 'Moonlight' and 'The
    Grand Budapest Hotel' with friends, while they use music as a coping tool for stress.
  travel: Lyndon Mattocks favors spontaneous road trips to natural retreats such as the Loess Hills and Door County, mixing fishing stops with craft‑brew tastings, plans itineraries on a student‑friendly
    travel app, and keeps an eye on carbon‑offset options for future European canal tours, while they balance adventure with a modest travel budget.
  culinary: Lyndon Mattocks loves pairing fresh river‑caught walleye with corn‑bread crumbles and a locally brewed IPA, crafts go‑to fish‑taco recipes with cilantro, lime, and jalapeños, yet often skips
    meal prep after long shifts, opting for late‑night pizza, while they claim the best flavor is the one that eases post‑work stress.
  core: Lyndon Mattocks is a socially driven water‑tech who fixes pumps by day, worries about certification by night, and finds solace in guitar strings and craft‑brew hops when stress peaks.
background:
  cultural: Lyndon grew up in a traditionally white, Midwestern household in the Iowa City area, with deep roots in the region’s farming and small‑town culture. His family’s heritage includes German and
    Scandinavian ancestry, which is reflected in local customs such as county fairs, church gatherings, and a strong emphasis on community service. Living near the University of Iowa exposed him to a vibrant
    college‑town atmosphere, blending progressive ideas about environmental stewardship with the region’s classic work ethic and self‑reliance.
attributes:
  skills: '["Water treatment plant operation", "SCADA system monitoring", "Water quality testing", "Chemical dosing and adjustment", "Preventive maintenance of pumps and valves", "Equipment troubleshooting",
    "Regulatory compliance (EPA, IWQA)", "Safety protocol implementation", "Shift coordination and handover", "Data logging and reporting"]'
  hobbies: '["Intramural basketball", "Ultimate frisbee", "Fishing trips", "Community stream clean‑ups", "Acoustic guitar playing", "Craft‑brew tasting", "Multiplayer video gaming", "Hiking in local parks"]'
  career_goals: Lyndon aims to earn his Certified Water Operator license within the next two years and eventually pursue an associate’s degree in environmental technology. His long‑term ambition is to become
    a senior plant supervisor and later a plant manager, where he can lead a team in adopting energy‑efficient processes and low‑impact treatment technologies. He is also interested in spearheading community
    outreach programs that educate residents about water conservation, while working to reduce his own stress through leadership training and mentorship opportunities.
