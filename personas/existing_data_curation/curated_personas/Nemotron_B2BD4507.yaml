personas:
  professional: Ruby Sweeney, a 55‑year‑old telecommunications veteran with three decades of hands‑on experience in copper and fiber‑optic line work, blends meticulous cable splicing expertise with a natural
    flair for rallying crews, delivering clear briefings, and mentoring newcomers, while advocating for a structured mentorship program and a predictable shift schedule that dovetails with their community‑centered
    lifestyle.
  sports: Ruby Sweeney is a devoted fan of the Tennessee Volunteers football team, enjoys cheering at Saturday games with a home‑cooked spread, participates in a local senior bridge club that doubles as
    a low‑impact mental exercise, and sways to country line‑dance socials for cardio, while they occasionally join a community hike along the Appalachian Trail during fall.
  arts: Ruby Sweeney immerses themselves in the arts through a weekly quilting circle where they craft heirloom blankets inspired by traditional patterns, lead karaoke nights featuring classics by Dolly Parton
    and Johnny Cash, and attend local gospel concerts at the church, finding that the rhythmic sing‑along fuels their sociable spirit.
  travel: Ruby Sweeney favors short, scenic road trips along the Blue Ridge Parkway, stopping at beloved family‑run diners like The Yellow Diner in Greeneville for homemade biscuits, planning each getaway
    around church events and gardening seasons, and they dream of a weekend pilgrimage to the historic Nashville Country Music Hall of Fame to soak in musical heritage.
  culinary: Ruby Sweeney’s culinary world revolves around their vegetable garden’s bounty—tomatoes, beans, and hot peppers—used to whip up hearty tomato basil soup, bean chili, and pepper relish, complemented
    by Southern staples such as fried chicken, cornbread, and collard greens, and they proudly host potluck nights where each dish showcases a homegrown ingredient.
  core: Ruby Sweeney is a talkative, routine‑loving telecom specialist who blends community leadership with a garden‑fueled kitchen, a penchant for karaoke, and a relaxed‑yet‑responsible approach to health
    and money.
background:
  cultural: Ruby grew up in Lexington, Tennessee, a small town nestled in the foothills of the Appalachian region. Her family’s roots trace back to English and Scotch‑Irish settlers who long valued self‑reliance,
    practical skills, and tight‑knit community ties. She was raised in a Southern evangelical environment—regularly attending church services and participating in church‑based charitable activities—which
    reinforced a sense of duty to neighbors and an appreciation for shared traditions. The local culture emphasizes hard work, modesty, and a strong commitment to family and community gatherings, all of
    which have shaped Ruby’s pragmatic outlook, reliable work ethic, and love of sociable, routine‑centered activities.
attributes:
  skills: '["Telecommunications line installation", "Cable splicing and termination", "Fiber optic troubleshooting", "Electrical safety compliance", "Customer communication", "Team coordination", "Mentoring
