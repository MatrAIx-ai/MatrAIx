  hobbies: '["Potluck dinner host", "Karaoke enthusiast", "Community center singer", "Vegetable gardening", "Quilting", "Bridge club participant", "Volunteer fire department safety trainer", "Line‑dance
    participant", "Road‑trip explorer"]'
  career_goals: Ruby aims to move into a crew‑lead or supervisory position within her utility, where she can combine her technical knowledge with her natural ability to motivate and organize people. She
    wants to design a structured mentorship program for new installers, creating a dependable pipeline of skilled workers. While she values job stability, she is also looking to negotiate a more predictable
    shift schedule that supports her personal routine and community activities. In the longer term, Ruby is considering part‑time consulting or starting a small contracting business focused on line maintenance
    for rural customers in Henderson County, leveraging her extensive local network and reputation.
