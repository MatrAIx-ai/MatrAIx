persona_description: A historian who specializes in the study of the history of the Armenian people and their struggle for independence from the Ottoman Empire. The historian has a deep understanding of
  the events leading up to the Armenian genocide and the subsequent establishment of the Republic of Armenia. They are also knowledgeable about the Treaty of Sevres and its impact on the Armenian people.
  The historian is deeply interested in the history of the Armenian diaspora and the impact of the genocide on the Armenian community in the West. They are also interested in the ongoing struggle for Armenian
  independence and the role of the Armenian diaspora in promoting the cause of Armenian sovereignty.
