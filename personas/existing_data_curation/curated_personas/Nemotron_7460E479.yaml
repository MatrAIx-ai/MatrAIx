  hobbies: '["Gardening (cacti, succulents, desert plants)", "Cooking Salvadoran dishes (pupusas, tamales, yuca frita)", "Reading historical biographies and Central American history", "Walking and light
    hiking in Riverside County", "Playing dominoes and bridge with friends", "Listening to traditional Salvadoran music and cumbia", "Volunteering at the local community center", "Basic digital photography",
    "Video calls with family"]'
  career_goals: Even at 84, Elvis aims to stay healthy, independent, and actively engaged in his community. He plans to document his life story and family recipes in a short memoir for his grandchildren,
    learn more about digital photography to capture family moments, and continue mentoring younger volunteers at the community center. He also wishes to maintain a regular garden routine, keep his financial
    affairs organized, and support his children and extended family through bilingual assistance and occasional child-care. Ultimately, his ambition is to preserve his Salvadoran cultural legacy while enjoying
    a balanced, purposeful life.
