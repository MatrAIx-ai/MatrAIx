persona_description: A policy analyst who specializes in the study of non-tariff barriers, particularly their classification, types, and effects on trade. Their research interests include, but are not limited
  to, the impact of administrative and bureaucratic delays at the border, embargoes, foreign exchange restrictions, and administrative regulation of capital movements. They have experience in analyzing
  and interpreting data on these non-tariff barriers, and are skilled in developing policy recommendations to address their impact on trade.
