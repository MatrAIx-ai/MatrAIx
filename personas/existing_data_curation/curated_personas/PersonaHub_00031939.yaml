persona_description: Jacob Hooker, a chemist at the U.S. Department of Energy's (DOE) Brookhaven National Laboratory and resident of Mount Sinai, NY, who is recognized as the "Inventor of the Year" by Battelle
  for his work on the development of new radiotracers for PET scanners. Hooker is a resident of Mount Sinai, NY, and a chemist at the U.S. Department of Energy's (DOE) Brookhaven National Laboratory, where
  he is known for his work on the development of new radiotracers for PET scanners. Hooker received his B.S. at North Carolina University and his Ph.D. from the University of California, Berkeley, and has
  won several scholarships and teaching awards. Hooker has co-authored more than 20 peer-reviewed papers and his research has been highlighted in scientific news briefs and popular media.
