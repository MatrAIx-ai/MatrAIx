  hobbies: '["Playing soccer", "School dance club (Bharatanatyam basics)", "Reading aloud and reciting poems", "Building LEGO structures", "Drawing", "Cooking simple snacks with family", "Science experiment
    kits"]'
  career_goals: She dreams of becoming a teacher like her mother, helping children learn, or a doctor to care for others, influenced by her family's emphasis on education and service. She also imagines
    working in a lab as a scientist, intrigued by the practical aspects of problem‑solving. While her ambitions are still forming, she consistently talks about wanting a stable, respected profession that
    allows her to help people and reflect the values of her community.
