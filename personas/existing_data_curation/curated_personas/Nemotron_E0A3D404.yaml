  career_goals: At 81, Jeanine’s primary ambition is to preserve her autonomy and health while leaving a modest legacy for her family and neighbors. She aims to complete a handwritten memoir recounting
    her life and the lessons she has learned, compile a small guide of gardening tips for local seniors, and establish a butterfly garden in her front yard that can be enjoyed by the community. Financially,
    she strives to maintain a balanced budget that covers her medical expenses without overreliance on external aid. Calmly, she seeks to keep her mind sharp through daily puzzles, reading, and occasional
    low‑key volunteer work such as sorting donations at the nearby senior center.
