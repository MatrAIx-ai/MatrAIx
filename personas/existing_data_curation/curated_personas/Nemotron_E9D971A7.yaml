  career_goals: Mark intends to translate his hands-on expertise into a stable, structured career. After obtaining his GED, he plans to enroll in a community college automotive technology program, aiming
    for certifications such as ASE (Automotive Service Excellence). His long-term ambition is to work as a certified automotive technician at a reputable service center, eventually gaining enough experience
    to open his own garage serving the Leavenworth community. The disciplined environment of the trade appeals to his love of predictability and responsibility. Additionally, Mark is considering the U.S.
    Army as a backup path, drawn by the regimented lifestyle and the opportunity to apply his mechanical skills in a military setting. Regardless of the route, he is motivated to secure a reliable income
    that allows him to support his family and continue his involvement in local sports coaching.
