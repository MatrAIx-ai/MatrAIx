  hobbies: '[''Art gallery visits'', ''Watercolor painting'', ''Photography'', ''Historical walking tours'', ''Garden tending'', ''Bridge'', ''Community theater'', ''Volunteer art‑therapy'', ''Travel to
    cultural festivals'', ''Reading about art history'']'
  career_goals: Jacob aims to channel his lifelong curiosity and love for the arts into a more formal role within his community. He plans to become a volunteer curator for the Attleboro Historical Society's
    rotating exhibit program, organize interdisciplinary workshops that blend art, local history, and hands‑on craft for seniors and youth, and eventually serve on the board of a regional arts council.
    He also hopes to publish a modest guidebook of Attleboro’s overlooked artistic landmarks, and to mentor younger volunteers in event planning and community engagement.
