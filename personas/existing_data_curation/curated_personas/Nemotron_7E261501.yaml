  career_goals: Alysa dreams of attending a specialized art program or college where she can refine her visual storytelling skills. She hopes to become a professional illustrator or visual artist who can
    blend traditional art with digital media. Inspired by her community's vibrant culture, she also imagines working on public art projects or community art workshops that bring joy and healing to others,
    especially those dealing with stress and anxiety. In the long term, she is open to exploring roles in arts education or therapeutic art programs that combine her creative talents with her caring nature.
