  career_goals: Yumi aspires to become a technical leader—first as a principal engineer and later as an engineering manager—where she can steer interdisciplinary teams toward innovative, user‑centric IoT
    solutions that emphasize sustainability and accessibility. She aims to secure patents for novel sensor‑fusion architectures, mentor junior engineers, and champion inclusive design practices. In the
    longer term, Yumi dreams of launching a boutique startup that merges technology with interactive art installations, creating immersive public experiences that spark curiosity. Recognizing her sensitivity
    to stress, she also prioritizes establishing a balanced work environment that supports mental well‑being for herself and her team.
