  career_goals: James aims to transition from a first‑line supervisory role to a senior sales operations or regional director position within the next five years. He is pursuing certifications in data analytics
    and sales automation to deepen his expertise in AI‑driven sales tools. His long‑term ambition is to shape a high‑performing, resilient sales organization that balances aggressive targets with employee
    well‑being. He also envisions establishing a mentorship program that leverages his humanities background to foster clear communication and ethical selling practices.
