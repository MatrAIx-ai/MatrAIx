  hobbies: '[''Reading Historical Non-Fiction'', ''Classic Literature'', ''Coastal Hiking'', ''Kayaking'', ''Photography'', ''Journaling'', ''Mindfulness Meditation'', ''Chess'', ''Strategy Board Games'',
