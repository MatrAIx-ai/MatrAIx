  hobbies: '[''Gallery Visits'', ''Jazz and Soul Concerts'', ''Street‑Art Tours'', ''Photography'', ''Trivia Nights'', ''Karaoke'', ''Church Fellowship Leadership'', ''Recreational Basketball'', ''Creative
    Cooking'', ''Community Gardening'']'
  career_goals: Building on his associate's degree in health sciences, Derrick aims to earn a Licensed Practical Nurse (LPN) certification within the next two years, followed by a Registered Nurse (RN)
    qualification. He envisions advancing to a charge nurse role in a community hospital or long‑term care facility, where he can influence patient‑care policies. Long‑term, he hopes to develop a community‑health
    outreach program in Milwaukee that integrates art‑therapy workshops and preventive health education for underserved Black neighborhoods, leveraging his passion for art and public engagement.
