personas:
  professional: Arletty Capote, an emerging community art therapist and event coordinator in Santa Monica, fuses her art‑history expertise, bilingual communication, and compassionate facilitation into weekly
    workshops that empower at‑risk youth and seniors through creative expression and mindfulness.
  sports: Arletty Capote, a devoted fan of the Los Angeles Lakers and LA Galaxy, joins a local Saturday morning beach volleyball league at Santa Monica and participates in a weekly community yoga class,
    while also hiking with the Santa Monica Mountains Trail Club during the spring to stay active.
  arts: Arletty Capote immerses herself in the arts by creating mixed‑media paintings that echo the vibrancy of Frida Kahlo and the experimental edge of Yoko Ono, curating monthly pop‑up galleries featuring
    folk artists, and regularly performing original poetry at open‑mic nights alongside spoken‑word peers like Anis Mojgani.
  travel: 'Arletty Capote’s travel style blends purposeful artistic exploration with budget‑friendly planning: she has toured the murals of Oaxaca, wandered the galleries of Florence’s Uffizi, and taken
    a week‑long road trip along California’s Pacific Coast Highway to attend the annual Sunset Cultural Festival, all while saving for a future retreat in Kyoto’s traditional crafts districts.'
  culinary: Arletty Capote enjoys cooking at an intermediate level, often preparing rich mole sauce with dried chilies and chocolate, steaming homemade tamales stuffed with pork and masa, and carefully
    assembling chiles en nogada with fresh walnuts and pomegranate seeds, while favoring ingredients like ancho chilies, poblano peppers, and Mexican oregano to honor her culinary roots.
  core: Arletty Capote is a compassionate, art‑driven community builder who balances meticulous organization with spontaneous creativity, yet constantly wrestles with worry and occasional impulse spending.
background:
  cultural: Arletty is a first‑generation Mexican American who grew up in a bilingual household where Spanish was spoken daily and Mexican traditions were celebrated with enthusiasm. She honors Día de los
    Muertos, Cinco de Mayo, and regional holidays by preparing family recipes, crafting papel picado, and sharing folk stories with friends. Her cultural identity is a tapestry woven from the rich colors
    of Mexican folk art, the storytelling traditions of her grandparents, and the eclectic, multicultural environment of Southern California. Living in Santa Monica, she blends her heritage with the coastal
    city's vibrant arts scene, participating in both Mexican community events and broader Pacific‑Northwest cultural initiatives. This hybrid perspective informs her worldview, fostering a deep respect
    for diversity and a desire to create spaces where multiple cultures can intersect and be celebrated.
attributes:
  skills: '[''Art History'', ''Cultural Studies'', ''Creative Writing'', ''Spanish-English Bilingual Communication'', ''Event Planning'', ''Community Outreach'', ''Volunteer Coordination'', ''Mindfulness
    and Stress‑Management Facilitation'', ''Digital Media Content Creation'', ''Basic Counseling Techniques'']'
  hobbies: '[''Visiting art museums and galleries'', ''Creating mixed‑media paintings and sketches'', ''Writing poetry and short stories'', ''Cooking traditional Mexican cuisine'', ''Practicing yoga and
    meditation'', ''Facilitating mindfulness workshops'', ''Organizing book clubs'', ''Participating in cultural festivals and community potlucks'', ''Attending live music and dance performances'', ''Traveling
    to explore diverse artistic traditions'']'
  career_goals: Arletty aims to turn her love of art and her commitment to helping others into a sustainable career that serves the Santa Monica community. Her short‑term goal is to obtain a certification
    in art therapy and to begin facilitating weekly art‑making workshops for at‑risk youth and seniors. In the longer term, she envisions founding a nonprofit cultural hub that offers free classes, exhibitions,
    and mentorship programs spotlighting Mexican and broader Latin American artistic traditions. She also hopes to become a program director for a regional arts organization, where she can design inclusive,
    interdisciplinary events that foster dialogue, creativity, and mental‑wellness. Throughout her professional journey, she wants to continue learning and to integrate new, unconventional ideas into community
    programming.
