  career_goals: Hamdi dreams of becoming a multimedia artist who creates video games or animated stories that explore abstract concepts and emotions. He hopes to attend an arts‑focused high school, study
    graphic design or game development in college, and eventually work as a video game designer or concept artist. His curiosity also drives an interest in psychology, so he may combine art with an understanding
    of human emotions to craft meaningful interactive experiences.
