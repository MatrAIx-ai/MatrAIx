personas:
  professional: Hamdi Rothenburg, an aspiring young storyteller who blends hand‑drawn fantastical creatures with beginner‑level Scratch coding to craft mini‑games, leverages their vivid imagination and
    disciplined project‑tracking to produce weekly comic strips for the school’s online bulletin.
  sports: Hamdi Rothenburg, a midfielder on the Meadowbrook Youth Soccer Club, spends weekends cycling along the lakefront trail, cheers for the Chicago Cubs in spring and the Chicago Bulls year‑round,
    and they occasionally join a beginner’s ice‑skating class in winter to channel restless energy.
  arts: Hamdi Rothenburg, an avid fan of Hayao Miyazaki’s animated worlds and the piano compositions of Yiruma, spends afternoons sketching whimsical creatures inspired by Studio Ghibli, listens to indie
    pop artist Billie Eilish while polishing comic panels, and regularly attends the downtown community theater’s productions of ‘Alice in Wonderland,’ which fuels their storytelling imagination.
  travel: Hamdi Rothenburg, who has trekked the nearby lakefront trails and visited the Science Museum in Chicago, dreams of exploring Tokyo’s Akihabara district and Norway’s fjord‑lined hikes, but currently
    plans a family road trip to the Grand Canyon, balancing meticulous itinerary sketches in their journal with a desire for spontaneous snack‑stops.
  culinary: Hamdi Rothenburg, an enthusiastic junior cook, loves assembling simple sushi rolls with cucumber, avocado, and nori, perfecting spaghetti carbonara with pancetta and pecorino, and baking chocolate
    chip cookies sprinkled with sea‑salt, often experimenting with matcha powder in smoothies while they still master knife skills.
  core: Hamdi Rothenburg, a 12‑year‑old whirlwind of imagination, balances intense emotions with disciplined creativity, hoarding LEGO bricks, sketching fantastical beasts, and journaling anxieties while
    they dream of distant sci‑fi worlds.
background:
  cultural: Hamdi is raised in a typical Midwestern American family in Oklahoma City, with German‑American ancestry. His household values community involvement, church activities, and education, while also
    encouraging creative pursuits. The regional culture, including exposure to Native American art, country music, and local festivals, adds a rich tapestry of influences that shape his worldview and artistic
    sensibilities.
