  career_goals: Eugene often pretends to be a doctor or a firefighter when playing, showing a budding desire to help others. He also loves building with blocks and sometimes talks about becoming an architect
    or a builder, reflecting his preference for clear steps and tangible results. Occasionally, he imagines being a superhero who can jump into action without planning, hinting at his aspirational side
    that values flexibility and immediate impact.
