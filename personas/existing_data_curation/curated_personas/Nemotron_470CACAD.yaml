personas:
  professional: Eugene Johnson, a budding block‑building enthusiast who treats his playroom like a miniature construction site, meticulously lines up wooden bricks in precise patterns yet whimsically swaps
    them out when a colorful truck catches their eye, reflecting a love of structure balanced with a playful need for flexibility.
  sports: Eugene Johnson, a spirited member of the Little Lions preschool soccer team who dashes after a bright orange ball during afternoon games, they cheer for the New York Yankees while watching on
    TV, and they enjoy splashing in the community pool on warm days, yet they prefer the free‑play chaos of tag over rigid drills.
  arts: Eugene Johnson, an imaginative fan of Disney’s animated classics like Moana and a budding crayon artist who fills sketchbooks with dinosaur doodles while eagerly lip‑syncing to Taylor Swift’s upbeat
    songs during playtime, they find that the arts shape their vibrant leisure world.
  travel: Eugene Johnson, a curious explorer who has visited their grandparents’ countryside farm, the local aquarium, and a magical day at Disneyland, dreams of future trips to the Grand Canyon and Japan’s
    cherry blossom parks, and they prefer parent‑planned day‑out adventures that blend structured itineraries with spontaneous playground discoveries.
  culinary: Eugene Johnson, a picky yet enthusiastic eater who adores creamy mac and cheese made with sharp cheddar, crunchy chicken nuggets dipped in ketchup, and bright strawberry‑banana smoothies blended
    with fresh berries, they can proudly spread peanut butter on toast all by themselves, though they stubbornly refuse broccoli.
  core: Eugene Johnson, a structured‑yet‑flexible four‑year‑old who balances meticulous block building with spontaneous play, they save coins in a piggy bank while occasionally splurging on crayons, they
    manage mild allergies with a mix of routine and occasional forgetfulness, they love soccer and Disney, they dream of big‑scale adventures, and they delight in familiar comfort foods while navigating
    occasional picky‑food rebellions.
background:
  cultural: Eugene is part of an African‑American family in Irving, Texas. His home life blends Southern hospitality with the multicultural vibrancy of the Dallas‑Fort Worth area. Family gatherings often
    include soulful music, such as gospel and contemporary R&B, and celebrate traditions like Juneteenth and family reunions that emphasize community and shared history. He is exposed to a variety of foods,
    from classic soul dishes to Tex‑Mex flavors, and hears stories of resilience and achievement from relatives, shaping his sense of identity and belonging.
