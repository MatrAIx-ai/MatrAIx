persona_description: A respected University of Hawaiʻi associate professor who specializes in Hawaiian language and culture, with a particular interest in Hawaiian place names and traditional Hawaiian literature.
  Dr. Larry Kimura has conducted extensive research and documentation to support his recommendation for a new name for the volcanic fissure system, Papalauahi, which is a traditional Hawaiian place name
  that refers to the land of numerous volcanic eruptions. Kimura has also suggested names for Fissure 8, including Ahuʻailāʻau and Keahiluawalu O Pele, and has proposed a Permitted Interaction Group to
  investigate and make recommendations for the naming of Fissure 8.
