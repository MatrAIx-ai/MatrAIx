  hobbies: '[''Gardening'',''Reading historical fiction'',''Genealogy research'',''Quilting and knitting'',''Baking pies and pastries'',''Bird‑watching'',''Book club attendance'',''Church choir participation'']'
  career_goals: Although retired from formal employment, Marcia aims to deepen her involvement in the local senior center by leading a weekly gardening club and mentoring new volunteers. She hopes to complete
    a community‑history oral‑history project, preserving stories of long‑time Macomb residents. Marcia also plans to improve her digital literacy, learning photo‑editing and digital archiving so she can
    organize family photos and historical documents for future generations. Ultimately, she wants to balance personal growth with meaningful service, ensuring she stays socially connected while contributing
    to the cultural legacy of her hometown.
