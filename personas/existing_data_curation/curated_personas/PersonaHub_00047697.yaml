persona_description: An individual interested in the history of African slavery in the Americas, particularly the English, French, Spanish, Portuguese, and Dutch slave systems. They are likely to be a historian,
  social scientist, or researcher who is passionate about understanding the complex and multifaceted nature of the slave trade and its impact on the development of the New World. They may also have a background
  in comparative history, international relations, or African studies. They are interested in the cultural, economic, and social aspects of African slavery and its legacy, and are eager to learn about the
  experiences of enslaved people and the role of women and children in slave societies. They are also likely to be interested in the apogee of the slave trade and the impact of abolitionism and the persistence
  of slavery in the Americas.
