  career_goals: Bessie dreams of becoming a teacher who can share stories and help children discover the world, or a veterinarian caring for the animals she loves. She also imagines exploring space as an
    astronaut and enjoys the idea of helping her community as a future community helper or firefighter. Her ambition is to keep learning, solve puzzles, and use her creativity to make a positive difference.
