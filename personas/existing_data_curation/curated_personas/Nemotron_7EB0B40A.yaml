  career_goals: Roberta aims to transition into a senior advisory role where she can shape product strategy that blends technology with artistic expression, such as developing interactive digital installations
    for public spaces. She plans to deepen her expertise in data visualization and machine learning to create tools that empower creators. Over the next five years, she hopes to lead a small, collaborative
    team focused on inclusive design, championing accessibility and mental well‑being in the development process. She also aspires to establish a mentorship program for older adults entering tech, leveraging
    her experience to bridge generational gaps. Maintaining a balanced schedule, she seeks positions that allow flexibility for her personal art projects and community volunteering, while continuing to
    contribute to open‑source initiatives.
