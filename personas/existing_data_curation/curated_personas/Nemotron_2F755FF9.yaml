  career_goals: He aims to advance to a senior art director role within a boutique branding agency, eventually leading a multidisciplinary design team. In the longer term, Yi Cong envisions launching his
    own studio that blends sustainable branding with culturally resonant visual storytelling for eco‑focused startups. To support this path, he plans to earn an Adobe Certified Expert credential, pursue
    a master's degree in design management, and build a portfolio of cross‑cultural projects that leverage both his East Asian heritage and Western business acumen.
