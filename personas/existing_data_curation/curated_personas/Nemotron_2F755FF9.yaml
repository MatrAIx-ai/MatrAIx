personas:
  professional: Yi Le, a 23‑year‑old visual designer who fuses brand identity expertise with a data‑driven marketing mindset, leverages Adobe Creative Suite, UI/UX design, and disciplined time‑boxing to
    deliver polished deliverables while staying adaptable to client feedback, reflecting they prefer structured workflows balanced with creative flexibility.
  sports: Yi Le, an avid surfer who catches dawn waves at Manhattan Beach with their close‑knit surf crew, maintains fitness through weekend beach volleyball at the Hermosa Beach club, and follows the Los
    Angeles Lakers, Dodgers, and Rams for their seasonal excitement, while they enjoy the camaraderie of team sports.
  arts: Yi Le, a digital illustration enthusiast, draws inspiration from classic brush masters like Qi Baishi, contemporary designers such as Paula Scher, and lo‑fi music icons including Nujabes and Tom
    Misch, curating playlists that set a mellow vibe for their design workflow, and they often experiment with hybrid techniques in their art.
  travel: Yi Le, a purposeful traveler, prefers short, well‑planned trips that blend adventure and inspiration, having trekked the coastal trails of Big Sur, explored the night markets of Taipei, and eyeing
    a creative retreat in Copenhagen’s design scene, while they balance travel aspirations with a modest budget.
  culinary: Yi Le, a home‑cooking aficionado, frequently prepares dishes like ramen with homemade miso broth, spicy Sichuan mapo tofu, and bok choy stir‑fry, enjoying the tactile process of kneading dumpling
    dough and experimenting with ingredients such as gochujang, lemongrass, and toasted sesame oil, and they often pair meals with curated lo‑fi playlists.
  core: Yi Le, a structured yet creatively curious designer, balances disciplined work habits with solitary brush‑painting experiments, early‑morning surf sessions, and a disciplined financial routine,
    all while they occasionally succumb to caffeine‑driven late nights.
background:
  cultural: Born to East Asian (Chinese) immigrant parents, Yi Cong grew up navigating a bicultural environment in Southern California. His household emphasized academic achievement, respect for elders,
    and communal celebrations such as Lunar New Year and the Mid‑Autumn Festival. Mandarin was spoken at home, and traditional customs—like tea ceremony and calligraphy—were woven into family rituals. Living
    in the culturally diverse Los Angeles area, he also absorbed American individualism and a forward‑looking entrepreneurial spirit. This blend of Eastern heritage and Western experience informs his design
    sensibility, giving him an appreciation for clean, minimalist aesthetics combined with subtle cultural motifs.
