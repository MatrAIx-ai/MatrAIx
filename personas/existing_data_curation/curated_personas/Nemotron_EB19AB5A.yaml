  career_goals: John aspires to move from first‑line supervision to senior project management, eventually earning a PMP certification and becoming a licensed construction manager. He envisions launching
    his own boutique construction firm that specializes in sustainable, tech‑enabled building practices, integrating innovative design elements inspired by his artistic interests. He also aims to become
    a mentor and safety champion within the industry, fostering a culture of continuous learning and creative problem solving among younger tradespeople.
