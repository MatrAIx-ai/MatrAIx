personas:
  professional: Todd Rey, a retired auto shop owner and seasoned mechanical repair specialist, channels their meticulous budgeting expertise, bilingual communication, and knack for organizing community
    events into leading senior advisory board initiatives and hands‑on workshops that blend structured planning with lively, sociable mentorship.
  sports: Todd Rey avidly follows the Houston Astros, the Dallas Cowboys, and the local Lakeview Anglers Club, regularly joining senior fishing outings for bass on Lake Travis while also participating in
    a weekly senior center bowling league that keeps them active and socially engaged.
  arts: Todd Rey finds joy in the classic ranchera of Vicente Fernández, the vibrant brass of Mariachi Vargas de Tecalitlán, the silver‑screen charm of Humphrey Bogart, and the storytelling evenings at
    the community hall where they savor the oral histories of regional folklore.
  travel: Todd Rey dreams of revisiting their hometown in Oaxaca, Mexico to reconnect with extended family and record oral histories, while also planning modest road trips to the Grand Canyon and the historic
    missions of San Antonio, balancing a desire for adventure with a fixed retirement budget.
  culinary: Todd Rey expertly prepares traditional dishes such as chicken pozole, pork carnitas, and tamales al pastor, seasoning them with fresh chilies, cilantro, and roasted cumin, and delights in sharing
    these meals at family gatherings where their cooking skill level is revered as a culinary heritage keeper.
  core: Todd Rey is a structured yet sociable retiree who blends hands‑on craftsmanship, precise budgeting, and a lively love for community storytelling into a vibrant, occasionally stubborn, daily rhythm.
background:
  cultural: Todd grew up in a Mexican‑American household in Kansas, where Spanish was spoken alongside English and family traditions from Veracruz were preserved. His parents instilled strong Catholic values,
    and he celebrates holidays such as Día de los Muertos, Christmas posadas, and Cinco de Mayo with family and community. The blend of Midwestern work ethic and Mexican cultural customs shaped his identity,
    giving him a deep appreciation for community gatherings, respect for elders, and a pride in sharing his heritage through food, music, and storytelling.
attributes:
  skills: '["Mechanical repair", "Agricultural equipment maintenance", "Budgeting and bookkeeping", "Event planning and coordination", "Bilingual communication (English/Spanish)", "Public speaking", "Mentoring",
    "Woodworking", "Basic computer literacy", "Traditional Mexican cooking"]'
  hobbies: '["Gardening", "Cooking Mexican cuisine", "Playing dominoes", "Listening to ranchera music", "Church attendance", "Woodworking", "Fishing", "Classic movies", "Storytelling evenings"]'
  career_goals: Although retired, Todd aims to stay active in his community. He hopes to serve on the local senior advisory board, mentor retirees and youth in practical trades, help organize the annual
    Cinco de Mayo celebration, and learn digital photography to document his family’s history. He also wishes to travel to his hometown in Mexico to reconnect with extended family and record oral histories
    for future generations.
