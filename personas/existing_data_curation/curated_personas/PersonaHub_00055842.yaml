persona_description: A marine biologist who specializes in the study of loggerhead sea turtles, their behavior, habitat, and conservation. This individual has extensive knowledge of the species' natural
  lifespan, diet, and geographical range, as well as their threats to their survival. They are passionate about improving the conservation outcomes for loggerheads through monitoring, partnerships, and
  the use of Turtle Excluder Devices. They are also knowledgeable about the benefits of protections, such as the SPAW (Specially Protected Areas and Wildlife) Protocol to the Cartagena Convention, CITES
  Agreement, and the Convention on Migratory Species.
