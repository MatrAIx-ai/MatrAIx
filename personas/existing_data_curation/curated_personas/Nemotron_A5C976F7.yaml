    comedy and open‑mic nights", "Dance classes (salsa, hip‑hop)", "Spontaneous road trips to cultural festivals", "Exploring food trucks and trying new cuisines", "Volunteering on community mural projects",
    "Watching documentaries on art and design"]'
  career_goals: Kathleen aims to turn her creative passion into a professional career in the visual communication field. In the short term, she plans to complete her associate degree in graphic design or
    visual arts, build a robust portfolio, and secure internships at local design agencies or museums in Detroit. She also wants to develop a personal brand on platforms like Instagram and TikTok, showcasing
    her artwork and photography. Long‑term, she aspires to become a creative director or art director for a cultural organization, lead interdisciplinary projects that blend technology and art, and eventually
    launch her own boutique studio that supports emerging artists and community‑focused installations. Her competitive streak drives her to achieve recognition in regional art competitions and aim for scholarships
    or fellowships that enable her to study abroad or attend specialized workshops.
