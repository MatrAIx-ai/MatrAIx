personas:
  professional: Kathleen Everett, an aspiring visual communicator, leverages Adobe Photoshop and Illustrator expertise, a sharp eye for composition, and a natural knack for rallying creative collaborators
    into a freelance graphic design practice where they channel a curious, competitive streak into bold, unconventional campaign concepts despite a habit of loosely organized project timelines.
  sports: Kathleen Everett stays active by joining a weekend co‑ed recreational soccer league, hitting the local skate park with the Detroit Skate Crew, and cheering on the Detroit Lions and Red Wings,
    while they balance a laid‑back yoga practice that satisfies a love for flexible movement and community vibes.
  arts: Kathleen Everett immerses themselves in Detroit’s artistic pulse by curating Instagram stories of Basquiat‑inspired murals, attending live sets that range from Stevie Wonder tribute bands to Tycho’s
    ambient electro‑pop, and frequenting the Detroit Institute of Arts to study works by Frida Kahlo and contemporary installations, while they channel these experiences into mixed‑media collages and graphic
    design projects.
  travel: Kathleen Everett prefers impromptu road‑trip adventures that fit a student budget, often cruising to the Ann Arbor Art Fair or the Chicago Loop’s vibrant street‑art scene, while they day‑dream
    about a future backpacking stint through the murals of Lisbon and the color‑splashed alleys of Oaxaca.
  culinary: Kathleen Everett thrives on the eclectic flavors of Detroit’s food‑truck culture, regularly ordering Korean‑style tteokbokki with gochujang, Mexican elote topped with cotija cheese, and vegan
    jackfruit tacos, while they experiment at home with avocado toast and charcoal‑infused pizza dough, showcasing a budding but slightly impatient cooking style.
  core: Energetic, curiosity‑driven, and slightly chaotic, Kathleen Everett channels a love for Detroit’s streets into bold visual storytelling, and they juggle spontaneous art projects with a habit of
    leaving notebooks half‑filled and deadlines loosely defined.
background:
  cultural: Kathleen grew up in Detroit, Michigan, a city known for its industrial legacy, Motown music heritage, and thriving street‑art culture. Her family traces its roots to Midwestern European immigrants
    (German and Irish ancestors), and she was raised with a blend of traditional Midwestern values—friendliness, hard work, and a sense of community—paired with the city’s diverse cultural influences. Detroit’s
    revitalization efforts, its bustling arts districts like Corktown and Midtown, and the presence of the Detroit Institute of Arts have shaped her appreciation for visual arts and community‑driven projects.
    Exposure to the city’s multicultural neighborhoods and its history of social activism informs her open‑minded worldview, while local traditions such as attending Detroit’s annual festivals, enjoying
    classic Coney dogs, and engaging in neighborhood block parties are a familiar part of her everyday life.
