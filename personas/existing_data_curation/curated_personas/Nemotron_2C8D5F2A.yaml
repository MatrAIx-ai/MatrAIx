personas:
  professional: Marilyn Mccall, a nine‑year‑old aspiring visual storyteller, blends a love for bright landscape painting, sketching beloved book characters, and creating simple tablet animations into a
    disciplined hobby that feels like a miniature studio where they meticulously plan each project, schedule daily drawing sessions, and eagerly share the results with their church youth group and soccer
    teammates.
  sports: Marilyn Mccall dazzles on the midfield for the Eva Elementary Soccer Club, practices drills before school, cheers for the Birmingham Barons during summer baseball nights, and idolizes the University
    of Alabama Crimson Tide football team, all while insisting on wearing their lucky cleats for every match.
  arts: Marilyn Mccall spends afternoons painting sunlit hills, sketching dragons from their favorite fantasy novels like 'Harry Potter' and 'Percy Jackson', and humming along to folk‑rock legends such
    as Dolly Parton and Sturgill Simpson, a habit that fuels their imagination and provides the soundtrack for their simple stop‑motion animations.
  travel: Marilyn Mccall dreams of weekend road trips to the Great Smoky Mountains for leaf‑collecting hikes, longs to visit Disney World’s Magic Kingdom with their cousins, and cherishes annual trips to
    the county fair where they ride the Ferris wheel and scout new pottery for their craft projects.
  culinary: Marilyn Mccall loves helping bake golden pecan pie and buttery sugar cookies for church potlucks, can’t resist a crispy piece of fried chicken at family gatherings, and often experiments with
    blending crushed rock candy into homemade lemonade, though they occasionally over‑sweeten the drink in their enthusiasm.
  core: Marilyn Mccall is a meticulous nine‑year‑old who pairs boundless creative curiosity with a community‑centered, slightly anxious spirit, always planning the next art project while worrying about
    missing a soccer practice.
background:
  cultural: Marilyn was raised in the small, close‑knit community of Eva in Cullman County, Alabama. Her family follows Southern Protestant traditions, attending church services and participating in community
    gatherings such as potlucks, youth group outings, and the annual county fair. The region’s emphasis on hospitality, family bonds, and a love for the outdoors influences her daily life. She enjoys Southern
    culinary staples like fried chicken and pecan pie, listens to local folk and country music, and takes pride in regional crafts such as quilting and woodworking that she sometimes sees at community events.
