    ''baking'']'
  career_goals: Even at nine, Marilyn dreams of turning her love of art into a future career as an illustrator or children’s book author, hoping to bring stories to life with her pictures. She also imagines
    caring for animals as a veterinarian, inspired by the farm animals she sees around her hometown. Ultimately, she wants a role that lets her help others—whether through visual storytelling, community
    outreach, or caring for pets—while staying organized and reliable in her work.
