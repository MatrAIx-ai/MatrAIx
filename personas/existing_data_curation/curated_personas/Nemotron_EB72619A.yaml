  hobbies: '[''Soccer'', ''Basketball'', ''LEGO building'', ''Scratch programming'', ''Reading adventure novels'', ''Camping and hiking with family'', ''Playing piano'', ''School theater'']'
  career_goals: Bryan aspires to pursue a career that blends his love for structure, problem solving, and helping others. He dreams of becoming an environmental engineer or sustainable architect, designing
    community spaces and water management systems that protect Colorado’s natural landscape. He plans to attend a high school STEM program, then study engineering or architecture in college, with the long‑term
    goal of leading collaborative projects that improve his hometown of Erie and the broader Boulder County.
