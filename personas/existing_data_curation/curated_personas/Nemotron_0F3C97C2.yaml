personas:
  professional: Moreno James, a retired carpenter and handyman with solid skills in home repair, basic plumbing, electrical troubleshooting, and routine automotive maintenance, now channels their practical,
    structured mindset into coordinating senior-center workshops while they mentor at-risk youth and share financial literacy with a warm, community-focused approach.
  sports: Moreno James, an early-morning walker in Zephyrhills parks and avid bass-fisher who spends weekends with the Zephyrhills Anglers Association, follows the Tampa Bay Buccaneers and Tampa Bay Rays
    faithfully, and they occasionally join a senior bowling league at the community center.
  arts: Moreno James, a gospel-choir singer who finds solace in classic R&B and jazz recordings by Otis Redding, Aretha Franklin, Marvin Gaye, and Miles Davis, regularly attends community festivals and
    the local theater for live performances, and they fill evenings with the smooth sounds of Ella Fitzgerald.
  travel: Moreno James, who prefers low-key road trips in their aging sedan, enjoys day-long excursions to nearby Orlando's theme parks, the historic streets of St. Augustine, and the Gulf Coast's sandy
    beaches, while they dream of a soul-stirring weekend in New Orleans to soak up its jazz heritage, all balanced against a modest retirement budget and a need for relaxed pacing.
  culinary: Moreno James, a capable home cook who frequently whips up Southern staples such as fried catfish with homemade tartar sauce, collard greens seasoned with smoked ham hocks, and buttery cornbread,
    often garnished with fresh basil and thyme from their garden, while they indulge in sweet tea and occasionally treat themselves to a store-bought pecan pie for special occasions.
  core: Moreno James, a 73-year-old retired handyman turned community mentor, blends practical hands-on expertise with a warm, sociable spirit, navigating health worries and modest finances while they cherish
    gardening, fishing, gospel music, and Southern cooking.
background:
  cultural: Moreno’s cultural identity is rooted in African‑American traditions of the American South. He was born during the early 1950s and came of age amid the civil‑rights movement, experiences that
    instilled a strong sense of resilience and community responsibility. The church has been a central pillar of his life, shaping his values of service, fellowship, and music. Family gatherings featuring
    soul food, storytelling, and gospel music are regular fixtures, and he carries forward the legacy of oral history and mentorship that he received from older relatives. Living now in Zephyrhills, he
    remains connected to a network of Black retirees who share similar heritage, celebrating holidays and cultural events that honor their shared history.
attributes:
  skills: '[''Carpentry'', ''Plumbing'', ''Electrical Troubleshooting'', ''Automotive Maintenance'', ''Household Budgeting'', ''Meal Preparation'', ''Event Coordination'', ''Mentoring'', ''Conflict Mediation'',
    ''Active Listening'']'
  hobbies: '[''Gardening'', ''Walking'', ''Fishing'', ''Bingo'', ''Card Games'', ''Gospel Choir'', ''Listening to R&B/Soul'', ''Cooking Southern Cuisine'', ''Attending Community Festivals'', ''Church Potlucks'']'
  career_goals: Although retired, Moreno remains driven to contribute to his community. He hopes to expand his role as a volunteer coordinator at the local senior center, establishing a weekly workshop
    on basic home‑repair skills for fellow seniors. He also aspires to mentor at‑risk youth through his church’s outreach program, sharing practical life skills and financial literacy. On a personal level,
    Moreno aims to maintain his health through regular walks and low‑impact exercise, reduce his anxiety by practicing mindfulness, and eventually compile a memoir of his experiences growing up as a Black
    man in the South during the civil‑rights era.
