  hobbies: '[''drawing'', ''reading comics'', ''building Lego'', ''playing soccer'', ''listening to music'', ''digital doodling on tablet'', ''family cooking (pupusas)'', ''exploring nature trails'', ''watching
    cartoons'']'
  career_goals: Celso dreams of growing up to become a visual storyteller—perhaps a comic‑book artist or illustrator—who can share stories from his Salvadoran heritage. He is also fascinated by technology
    and imagines designing simple video games or interactive apps that combine his art with coding. In the longer term, he hopes to travel and see how art looks around the world, maybe even visit El Salvador
    to learn traditional crafts.
