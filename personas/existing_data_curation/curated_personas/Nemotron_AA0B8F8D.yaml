personas:
  professional: Celso Gonzalez, an eight‑year‑old budding illustrator, channels a curious mind into sketching superheroes on paper, building imaginative worlds with Lego, and creating vibrant digital doodles
    on a tablet, all while embracing a flexible, unstructured play style.
  sports: Celso Gonzalez, eight, laces up for the Riverside Tigers U‑8 soccer team, spending afternoons at the local park perfecting dribbles with a close‑knit group of friends, and they are an enthusiastic
    supporter of the city’s professional basketball squad, the Skyhawks.
  arts: Celso Gonzalez, eight, devotes free time to drawing comic heroes inspired by Stan Lee, devouring picture books like Jeff Smith’s 'Bone', animating digital doodles to Latin pop beats from Shakira
    while humming traditional marimba rhythms, and they eagerly binge‑watch Pixar's 'Toy Story' series for creative spark.
  travel: Celso Gonzalez, eight, prefers spontaneous weekend hikes along the nearby Redwood Ridge Trail and treasure hunts at the local zoo, but dreams of a family road trip to Disney World in Orlando,
    a destination they picture through colorful travel brochures and animated movies.
  culinary: Celso Gonzalez, eight, helps roll thin corn dough to make cheese‑filled pupusas with their family, enjoys crunchy tortilla chips dipped in creamy avocado salsa, and experiments with banana‑mango
    smoothies, proudly presenting each dish with a splash of bright‑colored imagination.
  core: Celso Gonzalez, an eight‑year‑old curiosity‑driven doodler, balances a love for sketching heroes with a habit of scattering Lego bricks across the living room, turning everyday moments into spontaneous
    art projects.
background:
  cultural: Celso lives in a bilingual Salvadoran household in Cockeysville, Maryland. At home he speaks Spanish with his parents and grandparents, and English at school. He celebrates Salvadoran traditions
    such as Día de los Santos, enjoys foods like pupusas and tamales, and participates in community events at the local Salvadoran cultural center. These cultural experiences shape his art, often featuring
    bright colors and motifs inspired by his heritage while he also embraces the diverse influences of his American neighborhood.
