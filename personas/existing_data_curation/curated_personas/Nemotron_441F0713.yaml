personas:
  professional: Felix Reyes is a data-driven restaurant supervisor who blends kitchen operations with Python scripts and Excel dashboards to cut waste by 15%, meticulously schedules shifts for a five-person
    team, trusts hard data over gossip when evaluating staff, leverages their competitive streak to benchmark performance against nearby eateries, and they are planning the next step toward an operations-manager
    role.
  sports: Felix Reyes follows the Phoenix Suns and Arizona Cardinals, runs with the Sonoran Trail Runners on weekend desert hikes, competes in local 5K races where they push for personal best times, skeptically
    evaluates trendy fitness apps before adopting them, and they occasionally join a pick-up soccer game at a community field to satisfy a competitive itch.
  arts: Felix Reyes binge-watches culinary competition shows like MasterChef, reveres the soundtrack of the film Coco, enjoys the storytelling of Isaac Asimov and reads The Expanse series, plays strategy
    video games such as Civilization VI, and they remain skeptical of overly commercialized art while preferring authentic regional norteño bands like Los Tigres del Norte during cooking experiments.
  travel: Felix Reyes has trekked the Grand Canyon, visited Oaxaca to taste authentic mole and honor family traditions, attended a tech conference in Seattle, dreams of a culinary-tech immersion in Tokyo,
    prefers budget-friendly hostels and meticulous itineraries, and they skeptically avoid tourist traps by consulting niche travel blogs.
  culinary: Felix Reyes experiments with mole poblano-infused sous-vide pork shoulder, perfects carnitas tacos using pasilla chilies and a touch of mezcal, meticulously documents each recipe in a digital
    lab notebook, skeptically tests new food-science techniques before integrating them, and they enjoy pairing dishes with avocado-lime salsa and roasted corn for a familiar family-style meal with a modern
    twist.
  core: Felix Reyes is a methodical, competitive kitchen technologist who fuses data analytics with traditional flavors, juggling anxiety-driven perfectionism, a skeptical eye on shortcuts, and a love for
    solo hikes.
background:
  cultural: Felix is a second‑generation Mexican‑American raised in Tolleson, AZ, a community with a strong Mexican heritage. He grew up bilingual, speaking Spanish at home and English at school, and maintains
    close ties to his extended family. Cultural traditions such as celebrating Día de los Muertos, enjoying family‑style Mexican meals, and listening to regional music are central to his identity. While
    he embraces his heritage, he also navigates the broader American cultural landscape, blending Mexican culinary roots with the innovative, data‑driven mindset fostered by his STEM education.
attributes:
  skills: '["Food safety compliance (ServSafe)", "Inventory management and cost control", "Shift scheduling and team coordination", "Lean Six Sigma‑style process improvement", "Data analysis with Excel
    and Python", "Recipe development and nutritional analysis", "Equipment maintenance and troubleshooting", "POS and kitchen display system operation", "Basic culinary techniques (grilling, sautéing, plating)",
    "Customer service supervision"]'
  hobbies: '["Cooking traditional Mexican dishes", "Experimenting with food‑science recipes", "DIY smart‑kitchen gadget projects", "Running and hiking in the Sonoran Desert", "Reading science‑fiction and
    tech blogs", "Playing competitive strategy video games", "Watching culinary competition shows", "Practicing mindfulness meditation for stress reduction"]'
  career_goals: Felix aims to move from first‑line supervision to a restaurant operations manager role, eventually overseeing multiple locations or launching his own Mexican‑fusion eatery that integrates
    smart‑kitchen technology. He plans to earn a hospitality‑management certification, deepen his expertise in food engineering, and build a reputation for efficiency and quality that sets him apart in
    the competitive restaurant industry.
