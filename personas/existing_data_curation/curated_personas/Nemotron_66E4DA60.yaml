  hobbies: '[''Hiking and trail photography'', ''Astrophotography'', ''Acoustic guitar playing'', ''Woodworking'', ''Reading speculative fiction'', ''Experimental cooking'', ''Volunteer photography for
    community events'', ''Drone piloting'', ''Attending art exhibitions'']'
  career_goals: Thomas aims to transition from freelance commissions to owning a boutique studio that merges fine‑art photography with cutting‑edge technology. He plans to publish a photo book that documents
    the changing landscape of rural Pennsylvania, and to exhibit his work in regional galleries and possibly a national museum. He also aspires to develop immersive storytelling projects using VR/AR, offering
    interactive experiences that blend his technical expertise and artistic vision. Teaching is another priority; he wants to run workshops that teach both creative composition and the technical underpinnings
    of modern photography, helping emerging photographers in his community. Long‑term, he hopes to establish a sustainable business that supports local artists and environmental initiatives.
