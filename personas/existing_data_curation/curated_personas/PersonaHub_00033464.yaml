persona_description: A genealogist who is skeptical of the legalistic imposition of terminology from the legal field onto genealogical research and proof. This persona is knowledgeable about the complexities
  of genealogy, including the lack of definitive documentation, the subjective nature of historical conclusions, and the importance of documenting sources. They are also aware of the potential impact of
  online family trees on genealogical research and the need to address the lack of source documentation. This persona is interested in exploring alternative approaches to genealogy, such as using more subjective
  methods and documenting sources, rather than relying solely on legalistic terminology.
