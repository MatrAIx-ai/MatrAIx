personas:
  professional: Adrian Dulaney is a retired senior manager turned community business consultant who leverages three decades of financial analysis, strategic planning, and project‑management expertise to
    mentor start‑ups, serve on nonprofit boards, and run workshops for the Austin Small Business Incubator, blending their love of structure with a sociable, hands‑on approach.
  sports: Adrian Dulaney is an avid follower of Austin FC and the Texas Longhorns, sustains fitness by leading a weekday walking club through the Hill Country trails, participates in weekly pickleball matches
    at the local community center, and enjoys occasional low‑key golfing outings with friends at the Barton Creek Club.
  arts: Adrian Dulaney immerses themselves in Austin’s vibrant music scene, regularly attending live performances by Leon Bridges at Stubb’s BBQ, enjoying acoustic sets by local folk singer Carrie Rodriguez,
    and catching the Austin Symphony Orchestra’s pops concerts, while also dedicating weekend afternoons to photographing historic landmarks for the Austin Historical Society.
  travel: Adrian Dulaney prefers meticulously planned road trips, favoring weekend getaways to Hill Country vineyards, spring explorations of New Mexico’s Pueblo festivals, and occasional overseas cruises
    to the Mediterranean, though their travel budget is tempered by a commitment to local volunteer activities.
  culinary: Adrian Dulaney combines modest cooking skills with a love for fresh garden produce, often preparing heirloom tomato gazpacho, Texas‑style smoked brisket with jalapeño cornbread, and a seasonal
    roasted beet and feta salad, while occasionally indulging in a shrimp‑and‑grits bowl at Franklin Barbecue as a treat.
  core: Adrian Dulaney is a structured, socially‑minded retiree who thrives on leading community activities, meticulously budgets every expense, and—despite a disciplined routine—has a secret habit of binge‑watching
    classic westerns before bed.
background:
  cultural: Adrian grew up in a mid‑western white, middle‑class family that emphasized hard work, self‑reliance, and community service. After relocating to Austin in his early thirties, he embraced the
    city’s eclectic, inclusive culture while maintaining a Southern‑influenced work ethic and a practical, straightforward communication style. He identifies with a blend of classic Texan hospitality and
    the progressive, collaborative spirit of Austin’s creative neighborhoods.
