  career_goals: Now retired from formal employment, Adrian aims to stay actively engaged in Austin’s business ecosystem by mentoring start‑ups, serving on nonprofit boards, and contributing his expertise
    to a local small‑business incubator. He hopes to author a practical guide on sustainable budgeting for small enterprises and to volunteer as a financial coach at a senior‑focused community center. He
    also aspires to broaden his digital literacy so he can share his knowledge through webinars and online workshops.
