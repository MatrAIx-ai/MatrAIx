  career_goals: In the near term, Janinne aims to advance to a regional food‑service manager role, overseeing multiple locations while implementing standardized training programs and sustainability initiatives.
    Over the next five years, she envisions opening a boutique café that doubles as an intimate gallery space, showcasing local artists and offering a menu inspired by art movements and her Southern‑Middle
    Eastern culinary influences. Ultimately, she aspires to become a director of hospitality for a regional chain, championing inclusive staffing policies, sustainable sourcing, and mentorship programs
    for women in the industry, while maintaining a balanced, steady growth trajectory.
