personas:
  professional: Janinne Naraghi, 44, leads multi‑site food‑service operations with a data‑driven eye for cost control and an artist’s instinct for visual presentation, blending assertive yet compassionate
    leadership to inspire staff and ensure compliance while they turn menu concepts into gallery‑like plate designs.
  sports: Janinne Naraghi, 44, maintains fitness through early‑morning hikes with the local Green Trail Club, weekend pickleball at the community center, occasional yoga sessions, and they follow the Atlanta
    Falcons (NFL) and Atlanta United FC (MLS) for a dash of competitive inspiration.
  arts: Janinne Naraghi, 44, engages deeply with visual arts, regularly touring exhibitions featuring Georgia O'Keeffe, Monet’s water lilies, and contemporary street works by Banksy, while they also curate
    personal watercolor still‑life studies inspired by the chiaroscuro of Caravaggio.
  travel: Janinne Naraghi, 44, plans travel with the same meticulous eye they use for menu design, favoring culturally rich, off‑beat destinations like Asheville’s art colonies, New Orleans’ jazz districts,
    Marrakech’s souks, and Barcelona’s modernist architecture, often traveling with a small group of like‑minded friends and budgeting carefully to keep culinary experiments abroad affordable.
  culinary: Janinne Naraghi, 44, blends Southern comfort food with aromatic spice palettes, crafting dishes such as shrimp and grits seasoned with za'atar, smoked brisket glazed with pomegranate molasses,
    and herb‑infused ratatouille, while they hone their watercolor plating photography to capture the final presentation.
  core: Janinne Naraghi, 44, merges a chef’s precision with an artist’s imagination, steering food‑service teams with calm authority, day‑dreaming through watercolor and spices, yet they occasionally splurge
    on premium art supplies while forgetting to floss.
background:
  cultural: Janinne was born and raised in Madison, Mississippi, a close‑knit Southern community where hospitality and food are central to everyday life. Though she identifies as White, her surname reflects
    a family heritage that includes Middle Eastern roots, giving her a broad palate and an appreciation for cross‑cultural flavors. This blend of Southern American traditions and Middle Eastern influences,
    combined with a liberal arts education, has shaped a worldview that values both community customs and global artistic expressions. Her upbringing instilled a respect for Southern culinary traditions
    while her academic background fostered curiosity about diverse cultural ideas, which she integrates into her professional and personal pursuits.
