  career_goals: Howard aims to translate his creative passion and organizational talent into a career that centers on community enrichment. In the next few years, he plans to obtain his GED and enroll in
    a community‑college program in visual arts or arts administration. His ultimate ambition is to become a community arts coordinator or freelance graphic illustrator who designs public murals, runs creative
    workshops for youth, and curates local art events. He also envisions developing a modest freelance practice providing branding and illustration services for small businesses, allowing him to maintain
    a flexible schedule that supports his sociable nature while reducing financial stress. Long‑term, he hopes to combine his empathy and creativity into a role such as an art therapist or creative facilitator,
    helping individuals manage stress through artistic expression.
