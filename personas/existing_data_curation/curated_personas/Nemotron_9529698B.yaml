  hobbies: '[''Fishing'', ''Target shooting at the range'', ''Model train building'', ''Playing poker'', ''Reading true‑crime books'', ''Hiking in the Pine Barrens'']'
  career_goals: Nathaniel aims to move into a supervisory position within the base’s security department, eventually becoming a Senior Surveillance Manager where he can design and implement comprehensive
    security protocols for the gambling facilities. He plans to obtain the Certified Protection Professional (CPP) credential and a specialized certification in casino‑floor security. Over the next five
    years he hopes to lead a small team of surveillance officers, mentor newer guards, and contribute to policy development that balances strict safety standards with operational flexibility. In the longer
    term he envisions starting a boutique security‑consulting firm focused on risk‑assessment services for small‑scale casinos and gaming venues, leveraging his competitive drive and deep industry knowledge.
