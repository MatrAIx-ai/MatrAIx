  hobbies: '[''Hunting'', ''Fishing'', ''Pickup basketball'', ''Barbecue grilling'', ''Volunteer fire department'', ''Community festival organization'', ''Guitar playing'', ''Country music jam sessions'',
    ''Home-renovation projects'', ''Vegetable gardening'']'
  career_goals: He aims to turn his practical expertise into a small, owner-operated home-repair business that serves Jacksonville and the surrounding Lonoke County area. Over the next two years he plans
    to obtain a journeyman carpenter certification, expand his client base through community networking, and eventually hire a few apprentices from local high-school programs. He also hopes to become a
    regular speaker at the local Chamber of Commerce workshops on DIY safety and budgeting, positioning himself as a trusted community resource.
