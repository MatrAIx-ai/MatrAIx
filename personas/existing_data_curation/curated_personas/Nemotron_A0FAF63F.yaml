personas:
  professional: Richard Dunn is a hands‑on handyman turned aspiring entrepreneur who leverages his carpentry, budgeting, and people‑management skills to launch a community‑focused home‑repair business,
    balancing his love of structure with a laid‑back, flexible approach to scheduling and project planning.
  sports: Richard Dunn plays in a weekly pickup basketball league at the Jacksonville Community Center, roots for the Arkansas Razorbacks men's basketball team and follows the Arkansas Travelers minor‑league
    baseball club, and is an occasional fan of the Memphis Grizzlies NBA team.
  arts: Richard Dunn enjoys playing acoustic guitar at a local country‑music jam, often covering classics by Johnny Cash and modern hits by Garth Brooks, while also watching the film O Brother, Where Art
    Thou? and reading novels by Larry McMurtry during quiet evenings.
  travel: Richard Dunn favors road‑trip adventures that blend camping and fishing, having taken weekend getaways to Hot Springs, Arkansas, a hunting lodge in the Canadian Rockies, and a music festival in
    Nashville, while dreaming of a Patagonia fly‑fishing expedition next summer.
  culinary: Richard Dunn loves slow‑cooking pork shoulder with a homemade dry rub of brown sugar, paprika, cumin, and garlic, topping it with apple sauce and serving it alongside grilled corn on the cob,
    baked beans, and a fresh heirloom tomato, basil, and feta salad straight from his modest vegetable garden.
  core: Richard Dunn is a pragmatic, community‑oriented 39‑year‑old who balances a competitive, hands‑on work ethic with a laid‑back love of backyard barbecues, basketball, and a perpetual hunt for the
    next DIY challenge, despite occasional forgetfulness and a tendency to over‑promise.
background:
  cultural: Richard grew up in a traditional Southern, white, rural community in central Arkansas. His upbringing emphasized self-reliance, neighborly hospitality, and participation in church and local
    civic events. He carries the values of Southern hospitality and a strong work ethic, while also being shaped by the agrarian and small-town culture of Lonoke County, where community ties and practical
    skill-sharing are prized.
attributes:
  skills: '[''Carpentry'', ''Basic construction'', ''Automotive maintenance'', ''Budgeting and cost estimation'', ''Event coordination'', ''Volunteer team leadership'', ''Customer service'', ''Sales'',
