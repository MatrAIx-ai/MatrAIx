  career_goals: Although only eight, Karen already imagines a future where she designs spaces for learning and art. She dreams of becoming an architect, creating quiet, thoughtfully organized buildings
    that inspire creativity. She is also fascinated by museums and hopes to work as a museum curator, selecting and presenting artworks for others to enjoy. Her long‑term goal is to blend her artistic talent,
    love of organization, and curiosity for new ideas into a career that allows independent work while contributing to cultural enrichment. She plans to keep improving her drawing, learn more advanced coding,
    and explore design concepts as she grows.
