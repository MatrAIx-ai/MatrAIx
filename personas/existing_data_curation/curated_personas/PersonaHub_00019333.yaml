persona_description: A scientist who specializes in ecological research, particularly on the study of montane water voles and their microbial communities. She is involved in monitoring their populations,
  reproduction parameters, weight, relative age, and microbial community composition. Her research is part of the Petra Villette project and the QUALILAC project. She has also worked on the monitoring of
  small mammals and their predators, as well as the origin, quantity, and quality of organic matter available at the water column and benthic level. Her fieldwork includes collecting biological samples,
  monitoring small mammals, and conducting hydrogeochemical monitoring of karst springs in the Jura mountains.
