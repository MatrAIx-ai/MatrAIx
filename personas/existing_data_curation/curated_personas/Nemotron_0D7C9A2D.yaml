  career_goals: Inspired by her love of animals and curiosity about how the natural world works, Linda aspires to become a veterinarian one day, hoping to combine her compassionate nature with practical
    problem‑solving skills. She also entertains the idea of a future in science education, envisioning herself as a teacher who can inspire other children to explore new ideas while providing reliable guidance.
