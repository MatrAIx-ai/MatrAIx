personas:
  professional: Linda Saleem, an aspiring junior scientist and storyteller, blends a practical love of organized experiment logs with boundless curiosity, turning everyday observations into mini‑research
    projects while assertively leading her friends in comic‑style illustration sessions.
  sports: Linda Saleem, a dedicated midfielder for the Sunnyvale Junior Soccer Club, practices three times a week, cheers for Manchester United during televised matches, and idolizes England forward Marcus
    Rashford, while also following the local high‑school girls’ basketball team for inspiration.
  arts: Linda Saleem expresses creativity through comic‑style sketches inspired by Brian K. Vaughan and Studio Ghibli, listens to pop hits from Ariana Grande and BTS while drawing, and practices beginner
    piano pieces by Ludwig van Beethoven during quiet evenings.
  travel: Linda Saleem enjoys weekend nature walks in Redwood Preserve, dreams of exploring the dinosaur fossils at Dinosaur National Monument, and hopes to visit Tokyo’s Akihabara district to experience
    anime culture and the massive LEGO store there.
  culinary: Linda Saleem loves pepperoni pizza, caramel‑drizzled apple pie, and often prepares simple avocado toast with lime, while experimenting with rainbow fruit kebabs made of strawberries, grapes,
    and pineapple chunks, though she frequently forgets to wash her hands before cooking.
  core: Linda Saleem is a ten‑year‑old whose curiosity is balanced by practicality, juggling LEGO builds, soccer practice, comic drawing, pop music, and disciplined allowance saving, all while navigating
    mild allergies with a resilient, organized spirit.
background:
  cultural: Linda grows up in a predominantly white, middle‑class family in Waterloo, Illinois, a small Midwestern town where community and family are central. Her household observes typical American cultural
    practices, celebrating holidays such as Thanksgiving, Christmas, and the Fourth of July with family gatherings and local community events. She attends a public elementary school where she experiences
    a blend of Midwestern values—politeness, self‑reliance, and a strong sense of teamwork—while also being exposed to modest diversity through school programs and community festivals. Her cultural environment
    encourages both curiosity about the world and practicality in everyday life, reinforcing the balance highlighted in her personality profile.
