  career_goals: Flor aims to become a certified painting contractor within the next three years, obtaining a journeyman license and completing a professional trade apprenticeship. She hopes to eventually
    launch her own home‑improvement business that specializes in historic home preservation and eco‑friendly finishes in the Williamsburg area. In the longer term, she aspires to expand her services to
    include custom mural art for commercial spaces, mentor apprentices, and become a recognized leader in sustainable interior renovation practices.
