personas:
  professional: A 20‑year‑old aspiring painting contractor named Flor Montiel blends meticulous surface preparation skills with a curiosity for eco‑friendly finishes, managing small renovation projects
    for historic homes in Williamsburg while coordinating with family‑rooted community events and always double‑checking blueprints before a brushstroke.
  sports: Flor Montiel, 20, enjoys weekend soccer matches with neighborhood friends, hikes along the James River for cardio, follows the Washington Commanders and Washington Capitals for football and hockey
    thrills, and maintains a disciplined routine of stretching and body‑weight exercises to stay agile for both painting work and dance classes.
  arts: Flor Montiel, 20, spends free afternoons wandering the Virginia Museum of Fine Arts, drawing inspiration from contemporary painter Kehinde Wiley and the vibrant murals of Detroit artist Logan Hicks,
    while also attending live folk gigs featuring The Milk Carton Kids and dancing to salsa legends like Celia Cruz, weaving these artistic threads into her own acrylic canvases.
  travel: Flor Montiel, 20, plans trips with meticulous checklists, preferring culturally rich escapes like Oaxaca’s street food markets, Barcelona’s historic neighborhoods, and weekend road trips to Shenandoah
    National Park, yet often postpones overseas adventures due to apprenticeship costs and a desire to stay close to community projects.
  culinary: Flor Montiel, 20, cooks traditional pupusas stuffed with queso fresco and refried beans and fries crispy yuca with garlicky mojo, while also experimenting with seasonal roasted chayote salads,
    showing a moderate cooking skill that balances family recipes with occasional culinary experiments using fresh cilantro and plantains.
  core: Flor Montiel, a 20‑year‑old painting enthusiast, merges a methodical work ethic with a love for salsa, crochet, and community clean‑ups, but often forgets to water houseplants, leading to a jungle
    of wilted succulents.
background:
  cultural: Flor comes from a Salvadoran family that preserves many traditions from Central America while embracing life in Virginia. She grew up speaking both Spanish and English, celebrating holidays
    such as Día de los Faroles and Semana Santa with family gatherings, music, and traditional foods. Her cultural identity emphasizes community support, respect for elders, and a strong work ethic, which
    influence her collaborative approach at work and her commitment to local cultural events. Flor also participates in a Salvadoran diaspora network that hosts cultural workshops, dance nights, and language
    exchange programs, keeping her heritage vibrant in her everyday life.
