    postcards'']'
  career_goals: Although she is not formally employed, Vilma dreams of establishing a modest home‑based studio where she can produce and sell her artworks, especially pieces that blend Mexican motifs with
    contemporary Chicago scenes. She hopes to become a volunteer docent at the Chicago Art Institute, guiding small groups through exhibitions and sharing her unique perspective on cross‑cultural symbolism.
    Long‑term, she would like to launch a community art workshop for seniors, fostering creativity and cultural exchange while building a supportive network of fellow art enthusiasts.
