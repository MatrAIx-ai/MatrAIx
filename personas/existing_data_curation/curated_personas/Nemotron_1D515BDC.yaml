personas:
  professional: Alejandro Rojas, a 64‑year‑old veteran commercial truck driver and bilingual sales representative, combines meticulous route planning, on‑the‑spot vehicle maintenance, and persuasive client
    outreach to mentor younger drivers while eyeing a part‑time instructor role and a community‑focused micro‑logistics venture, driven by a competitive streak that pushes them to become the top trainer
    in the region.
  sports: Alejandro Rojas, an enthusiastic participant in neighborhood soccer pick‑up games and a loyal fan of the Cangrejeros de Santurce baseball team, blends weekly sunrise jogs along the Salinas coast
    with weekend fishing excursions, though their competitive nature sometimes leads them to overexert and experience knee discomfort.
  arts: Alejandro Rojas expresses his artistic curiosity by painting sun‑drenched harbor scenes and photographing vibrant patron saint festivals, drawing inspiration from the historic canvases of José Campeche
    and the salsa rhythms of Willie Colón and Héctor Lavoe, while they attend local gallery openings whenever time permits.
  travel: Alejandro Rojas balances purposeful road trips to nearby agricultural towns like Aguadilla for fresh produce scouting with occasional pilgrimages to historic Old San Juan, and they dream of wandering
    the cobblestone streets of Seville, Spain, all while planning travel within a modest budget that reflects their age‑aware financial prudence.
  culinary: Alejandro Rojas delights in preparing traditional dishes such as mofongo stuffed with crab, arroz con gandules, and pastelón de pescado, expertly seasoning with sofrito, recaito, and fresh cilantro
    from their herb garden, though they sometimes reward themselves with a late‑night slice of quesito after a long driving shift.
  core: Alejandro Rojas is a competitive, art‑loving truck veteran who balances community‑centric ambitions with a worry‑prone, meticulous approach to life, often swapping a disciplined schedule for spontaneous
    salsa spins.
background:
  cultural: Born and raised in Salinas, Santa Isabel Municipio, Alejandro embodies the rich tapestry of Puerto Rican culture. He grew up in a close‑knit, Catholic family where Spanish was the language of
    daily life, and traditional values of hospitality and community solidarity were paramount. The coastal town’s blend of agricultural heritage and maritime traditions shaped his love for fresh seafood,
    plantains, and dishes like mofongo. Afro‑Caribbean rhythms of bomba and plena, along with salsa music, influence his social life and dance passions. Alejandro participates in local patron saint festivals,
    where food, music, and dance reinforce his sense of identity. His cultural roots also inform his work ethic—valuing reliability, hard work, and a collaborative spirit—even as he balances a competitive
    drive to excel.
attributes:
  skills: '[''Safe Commercial Driving'', ''Route Planning & Optimization'', ''Vehicle Maintenance & Troubleshooting'', ''Customer Service & Sales Negotiation'', ''Bilingual Communication (Spanish/English)'',
