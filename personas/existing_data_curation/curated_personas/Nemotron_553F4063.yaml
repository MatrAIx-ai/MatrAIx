  professional: Sabrina Mahmood, a four‑year‑old budding engineer, demonstrates an early aptitude for building intricate block structures, blending boundless curiosity with a practical eye for stability,
    and they often lead their sandbox peers in experimental play while delighting in spontaneous rule‑making.
  sports: Sabrina Mahmood, a member of the toddler gymnastics club at the community center, favors the balance beam for its blend of challenge and fun, eagerly competes in weekly tumble‑off contests, and
    they root for the city’s professional soccer team, the Riverhawks, during family game‑day outings.
  arts: Sabrina Mahmood, an avid doodler who emulates the bold collage style of Eric Carle and sings along to Raffi’s 'Baby Beluga', channels their critical eye into perfecting the symmetry of each drawn
    animal while occasionally indulging in freeform scribbles during quiet moments, and they proudly display their artwork on the refrigerator door.
  travel: Sabrina Mahmood, who loves weekend trips to the nearby botanical garden and a yearly family vacation to Orlando’s theme parks, prefers spontaneous itineraries over strict schedules, packs a tiny
    backpack with snacks and a beloved stuffed bunny, and they dream of visiting the ancient ruins of Machu Picchu someday.
  culinary: Sabrina Mahmood, a fan of peanut butter and banana sandwiches, carefully spreads the peanut butter with their bright plastic knife, insists on crunchy apple slices for texture, and they occasionally
    experiment by sprinkling a pinch of cinnamon onto oatmeal for extra flavor.
  core: Sabrina Mahmood, a four‑year‑old explorer with a competitive spark, balances relentless curiosity with practical problem‑solving, remains unfazed by setbacks, and they manage a playful chaos of
    toys, allowances, and ambitions.
background:
