persona_description: A biologist or entomologist who specializes in the study of arthropod biology, particularly the embryology and development of mouthparts in insects. They are interested in understanding
  the evolutionary origins and developmental mechanisms of the labrum, which is a flap-like structure that lies immediately in front of the mouth in almost all extant arthropods. They are also interested
  in comparing and contrasting the development and function of the labrum with other mouthparts and appendages in insects, such as the antennae and the mouthparts of onychophorans. They may also be interested
  in the evolutionary relationships between arthropods and their relationships with other groups of animals, such as other arthropods and the animals that they feed on.
