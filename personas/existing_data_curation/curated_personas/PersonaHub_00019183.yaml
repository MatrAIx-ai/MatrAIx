persona_description: A political analyst who specializes in the study of armed conflicts and their impact on civilians, particularly in the context of the Lord's Resistance Army (LRA) in Uganda. This individual
  has extensive knowledge of the conflict's history, tactics, and the role of children and youth in the recruitment and deployment of the LRA. They are knowledgeable about the conflict's regional implications
  and the government's counterinsurgency tactics in the 1980s and 1990s, which led to the displacement of 90% of the Acholi and the use of children and youth in the Ugandan armed conflict. They are also
  knowledgeable about the LRA's terror tactics, recruitment methods, and the impact of their actions on civilians.
