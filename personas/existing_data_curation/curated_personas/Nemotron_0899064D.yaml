  hobbies: '["Watercolor painting", "Sketching", "Acoustic guitar", "Community basketball", "Reading science-fiction", "Exploring virtual reality tech", "Volunteering at animal shelter"]'
  career_goals: David aims to transition from patrol duties to a detective role within the next three years, focusing on homicide and cold-case investigations where his analytical mindset can thrive. He
    also hopes to spearhead a pilot program that blends art‑based community engagement—such as mural projects and youth sketch‑clubs—with crime‑prevention education. Long‑term, he envisions joining a specialized
    unit (e.g., SWAT or K‑9) and eventually serving as a lieutenant overseeing training initiatives that emphasize empathy, cultural competence, and technological innovation in policing.
