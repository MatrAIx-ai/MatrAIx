persona_description: A geoscientist who specializes in the study of atmospheric and oceanic processes, particularly those related to climate change and weather patterns. She has a background in meteorology
  and atmospheric sciences, and has worked on various projects related to satellite observations of terrestrial water storage and subsidence monitoring on Kilauea Volcano, Hawaii. Her expertise includes
  developing and analyzing satellite data to detect early warning signs of drought and fire season severity in the Amazon, as well as monitoring surface deformation in the area around the new vent on Kilauea
  Volcano using interferometric synthetic aperture radar (InSAR) from the TerraSAR-X satellite.
