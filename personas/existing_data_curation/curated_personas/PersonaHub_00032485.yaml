persona_description: A molecular biologist who specializes in the development and application of fluorescent in situ hybridization (FISH) technology for gene and chromosome analysis in cancer research.
  She is familiar with the CAP/ASCO directives on HER2 testing and the use of array comparative genomic hybridization (CGH) for determining copy number variations. She is interested in the global genomic
  view provided by array CGH and its complementarity with immunohistochemistry (IHC) and fluorescence in situ DNA hybridization (FISH) for subtyping breast cancer. She is also aware of the potential disadvantages
  of array CGH and its limitations in the initial diagnostic workup of cancer patients.
