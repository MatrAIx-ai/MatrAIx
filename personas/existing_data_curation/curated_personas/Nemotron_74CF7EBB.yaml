  hobbies: '["Reading historical novels and biographies","Gardening (vegetables and herbs)","Knitting scarves, shawls, and quilts","Cooking and hosting multicultural potlucks","Attending theater and community
    art workshops","Watercolor painting","Listening to classical music and jazz","Volunteer reading at the library"]'
  career_goals: Even at 91, Sheela aims to leave a lasting legacy for her family and community. She plans to compile a memoir and a digital oral‑history collection that captures her family's migration story
    and cultural traditions. She hopes to establish a multicultural cooking workshop at the local senior center, where she can teach both South Asian and Midwestern recipes. Mentoring younger volunteers
    and fostering intergenerational dialogue are key ambitions, as is supporting charitable food‑bank initiatives through organized drives. Ultimately, she seeks to promote cultural understanding and harmony
    within her community while ensuring her own health and well‑being for as long as possible.
