personas:
  professional: Sheela Virani, a 91‑year‑old community historian and senior‑center organizer, they combine meticulous planning, compassionate mediation, and deep knowledge of traditional festive cooking
    to coordinate multicultural events, mentor volunteers, and preserve oral histories, embodying an organized, sociable, and curiosity‑driven professional presence.
  sports: Sheela Virani, a lifelong fan of the Chicago Cubs and the local high school basketball team, they participate in the Edwards Women’s Walking Club's weekly 2‑mile strolls, enjoy chair yoga at the
    senior center, and tend their garden as low‑impact exercise, balancing seasonal activity with a love of community sport.
  arts: Sheela Virani, who attends the community theater's monthly productions, they study watercolor techniques inspired by Monet and Frida Kahlo, and listen to Beethoven's Ninth Symphony and Miles Davis'
    Kind of Blue while knitting, finding artistic expression woven into daily life.
  travel: Sheela Virani, who enjoys well‑planned road trips and garden‑tour days, they have visited New York City’s Broadway district, Washington D.C.’s Smithsonian museums, and Niagara Falls, and dream
    of a gentle cruise to the historic towns of the English countryside, all while balancing mobility and budget considerations.
  culinary: Sheela Virani, a master of festive biryani, crisp samosas, aromatic kheer flavored with cardamom and saffron, and equally adept at Midwestern apple pie and corn casserole, they approach cooking
    as a communal ritual, often sourcing fresh herbs like cilantro, mint, and basil from their own garden to share at potluck gatherings.
  core: Sheela Virani, a curiosity‑driven, organized centenarian who knits scarves while humming jazz, they obsessively catalogue family photos and insist on baking sweet treats for every neighbor’s birthday,
    epitomizing compassionate community stewardship with a dash of endearing forgetfulness.
background:
  cultural: Sheela was born in 1934 in a Gujarati Muslim family in pre‑partition British India. Her early years were shaped by vibrant community life, Urdu and Gujarati language, and celebrations of Eid,
    Ramadan, and family festivals that blended Islamic and cultural customs. After marrying in her twenties, she and her husband immigrated to the United States in the early 1970s, eventually settling in
    Edwards, Illinois. While embracing Midwestern values of neighborliness and community service, Sheela has retained a strong connection to her South Asian roots through cooking traditional dishes, teaching
    younger relatives Urdu phrases, and observing religious holidays. She participates in local cultural events, sharing stories of her heritage and fostering cross‑cultural understanding among her diverse
    neighbours.
attributes:
  skills: '["Traditional South Asian cooking","Knitting and textile crafts","Community event coordination","Conflict mediation and peer counseling","Basic digital literacy (email, video calling, photo archiving)","Gardening
