  hobbies: '[''Jogging'', ''Mindfulness Meditation'', ''Scale Model Building'', ''Reading Science‑Fiction'', ''Home Cooking'', ''Board‑Game Nights'', ''DIY Home Improvement'']'
  career_goals: Nicholas aims to move into a supervisory role within the next two years, overseeing a team of representatives and shaping service standards. He plans to earn a certification in Customer
    Experience Management and eventually transition to a quality‑assurance or training specialist position, where he can apply his analytical mindset to design more efficient workflows. Long‑term, he envisions
    becoming a department manager, leveraging his organized nature and curiosity to drive continuous improvement while balancing work with personal well‑being.
