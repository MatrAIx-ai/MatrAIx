persona_description: A historian who is deeply interested in the early American history of the Plymouth Colony, specifically the Mayflower Compact and its significance in establishing guidelines outside
  of previous government structures. The individual is fascinated by the sociological implications of this covenant and how it changed the colonists' view on government. They are also interested in the
  religious factors that contributed to the colonists' willingness to establish a covenant and how this experience could have shifted their view on government altogether.
