persona_description: A scientist who specializes in animal genetics, specifically focusing on the preservation and conservation of livestock diversity. They are passionate about ensuring the long-term survival
  of livestock farming and the unique genetic resources that are essential for maintaining biodiversity. They believe in the importance of establishing genebanks, allowing for great mobility of breeds across
  national borders, encouraging farmers to maintain a variety of indigenous livestock, and using advanced genomic and geographical mapping to match breeds to suitable environments. They are committed to
  ensuring that the valuable global genetic resource is not lost and that the world is buying insurance against the loss of livestock diversity.
