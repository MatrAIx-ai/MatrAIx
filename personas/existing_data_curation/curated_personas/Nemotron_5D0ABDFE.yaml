personas:
  professional: Pratima Patel is a budding problem‑solver who channels a love of Sudoku and chess into a growing interest in coding, regularly attending their community center’s tech club where they create
    simple puzzle‑solving scripts and digital sketches, and their methodical, competitive nature drives them to perfect every line of code, even if it sometimes leads to endless revisions.
  sports: Pratima Patel enjoys playing badminton after school at the community center, is a member of the local youth soccer club, cheerfully follows the Chicago Cubs in baseball and the New York Knicks
    in basketball, and they treat weekly Garba practices as a high‑energy cardio workout, though they rarely join large school sports teams due to their preference for small‑group activities.
  arts: Pratima Patel immerses themselves in digital illustration, frequently creating intricate cultural motifs and sketching scenes from favorite mystery novels, drawing inspiration from concept artist
    Syd Mead, animator Hayao Miyazaki, and composer Hans Zimmer’s film scores, while they also dabble in traditional sketching with graphite pencils during quiet evenings.
  travel: Pratima Patel prefers well‑planned short trips that balance cultural immersion with clear itineraries, having visited the historic forts of Jaipur, the bustling souks of Marrakech, and the alpine
    lakes of Banff, they dream of a solo backpacking journey through the Japanese countryside but must navigate family budget limits that confine recent travel to school field trips and weekend visits to
    nearby state parks.
  culinary: Pratima Patel loves cooking meals that blend their family’s traditional spiced lentil cake (dhokla) and tangy khandvi with modern twists like avocado toast, skillfully seasoning dishes with
    fresh lemon, mustard seeds, and cilantro, yet their cooking skill remains beginner level, occasionally resulting in burnt edges on a curry when they rush to finish homework.
  core: Pratima Patel is a methodical, puzzle‑loving 14‑year‑old who balances competitive chess, digital art, and cultural dance while navigating a disciplined yet sometimes impulsive approach to money,
    health, and everyday life.
background:
  cultural: Pratima comes from a Gujarati Indian family that settled in Houston, Texas. Her household blends Indian traditions—such as celebrating Diwali, Navratri, and participating in community gatherings
    at the local temple—with typical American suburban life. Bilingual in English and Gujarati, she balances respect for her elders and cultural customs with the independent mindset fostered by her American
    schooling. The Patel family places a strong emphasis on education, community service, and maintaining cultural ties, which shapes Pratima's values of responsibility, reliability, and a competitive drive
    to excel academically.
