  career_goals: Pratima aims to build on her love for structured problem‑solving by pursuing a career in software engineering or data analysis. She plans to excel in high school STEM courses, earn a scholarship
    to a reputable university, and eventually work on technology solutions that support immigrant families and community organizations. In the short term, she hopes to win a regional science fair, deepen
    her coding skills, and secure a mentorship with a local tech professional.
