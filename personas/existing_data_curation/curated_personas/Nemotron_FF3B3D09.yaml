personas:
  professional: Janet Small, a 31‑year‑old retail supervisor in the Bay Area, blends data‑driven performance tracking with an artist’s eye to curate immersive store displays, mentors staff through conflict
    mediation, and pushes for community‑based art collaborations while battling a competitive streak that sometimes makes them skeptical of colleagues’ motives and a spontaneous nature that can derail strict
    deadlines.
  sports: Janet Small follows the Golden State Warriors and San Francisco Giants with a competitive edge, participates in weekend hikes through Marin’s redwoods, attends a local climbing gym for low‑pressure
    strength training, and practices yoga to stay flexible, preferring workouts that accommodate their spontaneous schedule.
  arts: Janet Small immerses themselves in the Bay Area’s vibrant art scene, regularly visiting SFMOMA, the de Young, and pop‑up street‑art exhibitions, paints acrylic cityscapes inspired by Yoko Ono’s
    conceptual works, collects pieces by Mark Bradford, enjoys live shows by St. Vincent, and frequents improv comedy nights at the Upright Citizens Brigade, constantly seeking cutting‑edge collaborations.
  travel: Janet Small’s travel style mixes meticulous research of emerging art hubs—like Berlin’s contemporary galleries, Oaxaca’s craft markets, and Detroit’s revitalized museum scene—with spontaneous
    weekend getaways to the Marin headlands, and they budget for both airfare and modest lodging while dreaming of attending the Venice Biennale.
  culinary: Janet Small, an experimental home chef, delights in Mediterranean flavors such as shakshuka, grilled octopus with preserved lemon, and homemade focaccia topped with rosemary and sea salt, often
    sourcing fresh herbs and olive oil at the local farmer’s market and plating dishes as if they were mini‑canvases, though their occasional over‑seasoning sometimes leaves a salty surprise.
  core: Janet Small fuses a retail leader’s strategic mind with a painter’s spontaneity, turning stores into living galleries while juggling disciplined finance with impulsive art indulgences, all underpinned
    by a competitive edge and a healthy dose of skeptical curiosity.
background:
  cultural: Janet grew up in a middle‑class family in the San Francisco Bay Area, where progressive values, environmental awareness, and a strong support for the arts were part of everyday life. Her white
    ethnic background is intertwined with the region’s cultural mosaic, giving her a nuanced appreciation for diversity while recognizing her own privilege. She earned a BA in Arts and Humanities from a
    local liberal arts college, which deepened her curiosity about history, literature, and visual culture. Living in Mill Valley, she embraces the community’s blend of natural beauty, sustainability initiatives,
    and a thriving creative scene, which informs both her personal interests and professional approach to retail as a platform for cultural expression.
