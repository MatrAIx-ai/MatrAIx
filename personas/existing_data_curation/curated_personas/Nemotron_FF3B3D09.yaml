  career_goals: In the near term, Janet aims to move from first‑line supervisor to store manager of a flagship location, where she can embed her artistic vision into the retail environment. Within five
    years she hopes to become a district manager overseeing multiple stores, launching a regional visual‑merchandising program that partners with local artists and sustainable suppliers. Long‑term, she
    envisions opening her own boutique‑gallery concept that blurs the line between commerce and cultural experience, potentially supported by an MBA or a master’s in arts administration. Across all stages
    she wants to mentor emerging retail talent, champion inclusive workplace practices, and experiment with innovative, flexible store formats that reflect her love of spontaneity.
