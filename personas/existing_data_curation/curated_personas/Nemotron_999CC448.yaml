  hobbies: '[''Jazz keyboard playing'', ''Abstract painting'', ''Pick‑up basketball'', ''Science‑fiction reading'', ''Cooking Caribbean cuisine'', ''Improv theater'', ''Financial‑literacy mentorship'',
    ''Mindfulness meditation'', ''Reflective journaling'']'
  career_goals: Andre aims to become a senior audit manager within the next five years, eventually rising to a partner‑level role where he can shape the firm’s strategic direction. He is passionate about
    integrating advanced data‑science techniques into traditional auditing to create more predictive and value‑added services. Andre also intends to mentor junior colleagues, especially those from underrepresented
    backgrounds, and to champion diversity initiatives within the accounting profession. In the long term, he envisions launching a boutique consultancy that blends financial advisory with creative problem
    solving for tech‑driven startups.
