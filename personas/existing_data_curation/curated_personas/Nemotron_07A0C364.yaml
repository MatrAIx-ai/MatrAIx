  hobbies: '[''Mexican cooking'', ''Gardening'', ''Hiking'', ''Birdwatching'', ''Reading historical fiction'', ''Playing acoustic guitar'', ''Crocheting'', ''Volunteering at community library'', ''Participating
    in cultural festivals'', ''Journaling'']'
  career_goals: Jessica plans to transition into a mentorship and leadership role within her school district, developing a comprehensive bilingual curriculum guide for elementary and middle school teachers.
    She aims to lead professional‑development workshops on culturally responsive teaching and to collaborate with local community organizations on literacy initiatives. While preparing for retirement, she
    intends to continue volunteering as a reading tutor and to organize cultural events that celebrate Mexican heritage in South Bend.
