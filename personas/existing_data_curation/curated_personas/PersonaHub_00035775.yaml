persona_description: A healthcare professional who is interested in improving the quality of maternal and child healthcare in low and middle-income countries. They are committed to ensuring that women and
  their newborns receive high-quality and respectful postnatal care after giving birth, and they believe that the length of stay in hospitals should be optimized to achieve this goal. They are aware of
  the challenges in achieving this goal, including the variability in hospital stays across different countries and the factors that contribute to the length of stay, and they are open to exploring potential
  solutions to address these issues.
