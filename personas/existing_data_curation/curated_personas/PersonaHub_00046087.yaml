persona_description: A disaster historian who specializes in researching and analyzing major disasters, particularly those involving explosive materials such as ammonium nitrate. They are interested in
  understanding the causes, consequences, and potential causes of these disasters, as well as the factors that contributed to the success or failure of rescue efforts. They are also interested in the broader
  societal impact of these disasters, including the psychological and emotional toll on the affected communities and the legacy of these events in the public consciousness.
