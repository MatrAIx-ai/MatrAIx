persona_description: 'Dr. Sharon Schleigh, a Science Education faculty member in the MSITE program, has received recognition from the American Association for the Advancement of Science (AAAS) for her outstanding
  contribution to science education. This recognition is a testament to her expertise and dedication in teaching science to students. Dr. Schleigh''s book "Scientific Argumentation in a Biology: 30 Classroom
  Activities" has been recognized as an outstanding science book in the category of life science, and listed in the AAAS 2014 Best Science Books & Films List. This book is also a top-selling NSTA book for
  middle school and high school teachers across the nation. Dr. Schleigh''s recognition by AAAS is a great honor for her and the MSITE Department, and it shows the impact she has on science education in
  our community.'
