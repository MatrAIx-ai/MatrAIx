  hobbies: '[''Reading Latin American literature'',''Cooking Colombian cuisine'',''Playing chess online'',''Listening to Cumbia, Vallenato and salsa music'',''Mindfulness meditation'',''Keeping a reflective
    journal'',''Volunteer translation at community health clinic'']'
  career_goals: Alejandro aims to progress to a senior leadership role within a healthcare organization, such as Director of Operations or Vice President of Patient Services. Over the next three years he
    plans to earn a Master of Health Administration or an MBA with a healthcare focus to deepen his strategic expertise. He is passionate about expanding culturally competent care for Latino communities
    in New York and hopes to lead projects that reduce language barriers, improve patient navigation, and increase health equity. Additionally, he intends to launch a mentorship program for bilingual young
    professionals entering health services management.
