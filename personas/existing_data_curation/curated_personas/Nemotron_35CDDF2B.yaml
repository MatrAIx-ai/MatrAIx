  hobbies: '[''sketching and watercolor painting'', ''reading illustrated fantasy novels'', ''creative writing'', ''rock collecting and mineral identification'', ''exploring nature and bird‑watching'',
    ''piano practice'', ''church children’s choir singing'', ''Scratch programming'', ''jigsaw puzzle solving'', ''watching art documentaries'', ''baking with family'']'
  career_goals: Inspired by her love of art and her disciplined nature, Marie Ann dreams of a future where she can combine creativity with structure. She hopes to become a museum curator or an architect,
    roles that allow her to preserve artistic heritage and design inspiring spaces. She also envisions herself as a wildlife illustrator, capturing the natural beauty of Kentucky’s hills and streams. To
    achieve these goals, she plans to study art and environmental science, work hard to meet high standards, and eventually create community art workshops that give other children the chance to explore
    their own creativity.
