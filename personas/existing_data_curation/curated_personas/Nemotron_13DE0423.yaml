  career_goals: 'Adriana aims to transition into a senior leadership role, such as Audit Director or Partner, where she can shape firm‑wide audit strategies and drive digital transformation through analytics.
    She plans to obtain her CPA license (if not already held) and pursue a Certified Information Systems Auditor (CISA) credential to deepen her technology audit expertise. Mentoring is a core ambition:
    she wants to establish a formal mentorship program for women and under‑represented minorities in accounting, especially within the Salvadoran community in New York. Additionally, she hopes to spearhead
    a community‑based financial‑literacy initiative that offers tax‑preparation workshops and budgeting seminars for recent immigrants. Balancing professional growth with family time remains a priority,
    so she seeks flexible leadership opportunities that honor work‑life harmony.'
