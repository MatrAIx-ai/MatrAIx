personas:
  professional: Jeremy is an aspiring game developer and comic creator who fuses sketching, watercolor illustration, and Scratch programming into interactive stories, often leading classmates in collaborative
    art projects while balancing meticulous detail with spontaneous ideas.
  sports: Jeremy is a dedicated member of the McKinney Stars U10 soccer team, regularly competing in Texas youth leagues, and passionately follows the Dallas Cowboys (NFL), Dallas Mavericks (NBA), and FC
    Dallas (MLS), using their competitive nature to push teammates while also enjoying backyard basketball with friends.
  arts: Jeremy's artistic world is inspired by Brian K. Vaughan's graphic novels, Hayao Miyazaki's whimsical watercolors, Keith Haring's bold line work, and Lin‑Manuel Miranda's theatrical flair, and they
    frequently attend performances at the McKinney Arts Center, where they also contribute to set design for school productions.
  travel: Jeremy loves family road trips to Austin's music scene, Disney World in Orlando, and the Grand Canyon, while dreaming of exploring Tokyo's anime districts and London's Harry Potter Studio Tour;
    they plan outings using colorful maps, relish discovering hidden playgrounds, but trips are limited by school schedules and a modest budget for souvenirs.
  culinary: Jeremy enjoys creating spaghetti Bolognese with ground turkey, pizza topped with mozzarella, pepperoni, and pineapple, and a favorite snack of chocolate chip pancakes drizzled with maple syrup;
    they can safely chop soft vegetables under supervision, love experimenting with avocado toast and rainbow fruit skewers, and often add extra cheese to meals for extra flavor.
  core: Jeremy is a curious, talkative ten‑year‑old who turns every spare moment into a creative project—be it a comic strip, a Scratch game, or a LEGO masterpiece—while competitively leading their soccer
    team and energetically sharing vivid ideas with friends.
background:
  cultural: Jeremy was raised in a middle‑class, suburban white family in McKinney, Texas. His upbringing blends traditional Texan values—such as community involvement, appreciation for local festivals,
    and a love for outdoor activities—with a modern, media‑savvy environment that exposes him to a wide range of cultural influences through the internet. Family outings often include visits to the McKinney
    Performing Arts Center, the Collin County Library’s storytimes, and regional fairs where he experiences both classic Texas barbecue and diverse artistic performances. His parents encourage curiosity
    and support his artistic pursuits, while also emphasizing the importance of education and personal responsibility. This combination of local Texas culture and global media exposure shapes Jeremy’s open‑minded
    worldview and his drive to blend art with technology.
