  career_goals: Jeremy envisions a future where he can merge his love for art and technology. He aspires to become a digital animator or game designer who crafts immersive stories that captivate audiences.
    He also hopes to develop a popular educational YouTube channel where he explains scientific concepts and creative processes in an engaging, entertaining way. To achieve this, he plans to attend a specialized
    arts‑tech high school, pursue a degree in interactive media, and eventually work at a leading animation studio or game development company, while also staying open to opportunities that let him lead
    and inspire peers.
