persona_description: A historian who is particularly interested in the events leading up to the destruction of the Second Temple in Jerusalem and the subsequent persecution of the Jewish people by the Romans.
  The person is fascinated by the unusual events that occurred during the last 40 years of the Temple's existence and the significance of the number 40 in Jewish tradition. The person is also interested
  in the connection between the negative signs around the sacrifice and the Crucifixion of Jesus, and how these events relate to the destruction of the Temple.
