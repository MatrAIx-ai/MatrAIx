    ''Volunteer for Arts Organizations'', ''Experimental Cooking'', ''Board Game Nights'']'
  career_goals: Maria aims to advance to a senior program manager role within the next five years, eventually overseeing a portfolio of high‑impact initiatives at the intersection of technology and the
    Austin arts community. She plans to earn her PMP certification and pursue an MBA focused on innovation management to blend her practical project expertise with strategic business insight. Long‑term,
    she envisions leading a PMO that champions sustainable practices, fosters cross‑sector collaboration, and creates a supportive environment for mental‑health awareness in the workplace. Mentoring emerging
    project managers and championing inclusive, empathetic leadership are also central to her career aspirations.
