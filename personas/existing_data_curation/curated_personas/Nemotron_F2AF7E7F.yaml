personas:
  professional: Maria Rao is a project manager in Austin’s tech‑arts crossover scene, blending methodical Agile planning with a storyteller’s flair to drive cross‑functional initiatives, while their organized,
    curiosity‑driven approach lets them experiment with digital tools like Notion and Monday.com without losing sight of budgets and timelines, and their high emotional reactivity pushes them to champion
    mental‑health‑aware work cultures.
  sports: Maria Rao fuels their energy by trail‑hiking the Hill Country and racing with the Austin Trail Runners 5K club, cheering on Austin FC during soccer season and the Texas Longhorns for football,
    while also attending local swing dancing nights as a fun cardio workout.
  arts: Maria Rao immerses themselves in Austin’s vibrant arts scene by performing in community theater productions of Lin‑Manuel Miranda’s 'Hamilton,' snapping candid street photography at the annual Austin
    City Limits festival, and curating board‑game nights featuring titles like 'Catan' while listening to the eclectic sounds of St. Vincent and Janelle Monáe as a soundtrack for their experimental cooking
    sessions.
  travel: Maria Rao prefers spontaneous road trips across Texas, from the blue‑bonnet fields of Hill Country to the vibrant food markets of New Orleans, while also dreaming of a cultural pilgrimage to Barcelona’s
    modernist architecture and the historic streets of Dublin, balancing a modest travel budget by using points from their Chase Sapphire Preferred card and planning trips around long‑weekend festival schedules.
  culinary: Maria Rao enjoys experimenting in the kitchen with a moderate skill set, often crafting smoky Texas‑style brisket tacos with pickled jalapeños and fresh cilantro, perfecting a sous‑vide rosemary‑infused
    pork tenderloin, and indulging in sweet churros dusted with cinnamon and served with espresso, while they regularly attend local farmer’s markets for heirloom tomatoes and pomegranates to inspire their
    next dish.
  core: Maria Rao blends methodical project mastery with restless curiosity, turning anxiety into artistic energy while juggling impulsive concert splurges, meticulous budgeting, and a penchant for late‑night
    board‑game marathons.
background:
  cultural: Maria is a white American raised in Texas, drawing on a blend of traditional Southern hospitality and the progressive, eclectic vibe of Austin. Her family’s European ancestry—rooted in Irish
    and Italian heritage—instilled a respect for education, community, and storytelling, which she integrates with the local culture’s emphasis on individuality, creativity, and tech‑forward thinking. Growing
    up amid Austin’s vibrant music scene, thriving tech sector, and strong arts community, she balances classic values of reliability and hard work with an openness to new ideas and diverse cultural experiences.
