personas:
  professional: Dionysos Jackson, a seasoned medical secretary with over twenty years of experience in high‑volume Queens outpatient clinics, channels a practical curiosity into mastering Epic and streamlining
    billing while using a people‑centric, flexible style that balances warm patient communication with occasional disorganized paperwork.
  sports: Dionysos Jackson cheers on the New York Knicks and New York Yankees, joins a local Queens weekend running group at Flushing Meadows, and plays pick‑up basketball at a community center, using these
    low‑pressure activities as stress‑relief outlets.
  arts: Dionysos Jackson frequents reggae and dancehall venues to enjoy the sounds of Bob Marley and Buju Banton, watches documentary series on medical breakthroughs narrated by Morgan Freeman, and captures
    urban scenes through photography inspired by Gordon Parks.
  travel: Dionysos Jackson favors spontaneous weekend trips to nearby parks like Van Cortlandt and the Hudson Valley for nature walks and photography, while dreaming of immersive visits to Jamaica and a
    relaxing retreat in the Dominican Republic, balancing limited vacation time with a modest travel budget.
  culinary: Dionysos Jackson delights in preparing jerk chicken marinated with scotch bonnet peppers, allspice, and thyme, as well as curry goat flavored with cumin and garam masala, and, despite a moderate
    cooking skill level, they relish sharing these hearty dishes with friends around a lively kitchen table.
  core: Dionysos Jackson blends two decades of medical admin expertise, a love for reggae rhythms, spontaneous park photography, and a habit of juggling mindfulness journaling amid bouts of anxiety‑driven
    overthinking.
background:
  cultural: Dionysos identifies as Black with deep roots in the Jamaican diaspora of Jamaica, Queens. He grew up surrounded by a vibrant Caribbean community where the rhythms of reggae, the flavors of jerk
    seasoning, and the close‑knit family gatherings shaped his worldview. The neighborhood’s strong church presence and community solidarity reinforced values of cooperation, respect, and mutual support.
    While he also embraces broader African‑American cultural influences of New York City, his personal traditions—such as celebrating Emancipation Day, participating in Caribbean Carnival, and speaking
    Jamaican Patois with relatives—remain central to his identity.
attributes:
  skills: '["Electronic Health Record (Epic) Management", "Medical Terminology", "Patient Scheduling and Triage", "Insurance Verification and Billing", "HIPAA Compliance", "Data Entry and Records Management",
