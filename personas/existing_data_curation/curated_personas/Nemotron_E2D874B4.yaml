    "Multilingual Communication (English, Jamaican Patois)"]'
  hobbies: '["Reggae and Dancehall Music Appreciation", "Cooking Caribbean Cuisine", "Mindfulness Meditation and Journaling", "Volunteering at Community Health Fairs", "Watching Medical Documentary Series",
    "Exploring Health-Tech Apps", "Photography on Nature Walks", "Attending Local Cultural Festivals"]'
  career_goals: He aims to earn a Certified Medical Administrative Assistant (CMAA) credential within the next year, positioning himself for a supervisory office manager role in a community health center
    that serves underserved Black and Caribbean populations. Long‑term, he aspires to transition into health informatics, leveraging his curiosity for emerging digital health tools to improve patient outcomes.
    He values a flexible schedule that allows him to maintain his mental health and to continue volunteering in local health outreach programs.
