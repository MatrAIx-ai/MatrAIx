  career_goals: Cynthia aims to earn the SHRM‑CP certification within the next year to formalize her extensive practical knowledge. She hopes to advance from her current assistant role to a senior HR coordinator
    or manager position at the regional healthcare facility where she works, where she can design and lead employee‑well‑being initiatives that address stress and mental health. She also aspires to mentor
    younger HR staff, establish a structured onboarding mentorship program, and eventually transition to part‑time consulting for local small businesses and nonprofit organizations, helping them navigate
    employment law and build supportive workplace cultures while maintaining a balanced, low‑stress lifestyle.
