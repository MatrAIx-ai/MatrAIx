  hobbies: '[''Attending tech meetups and networking events'', ''Playing basketball at local gyms'', ''Hiking Minnesota state parks and lake trails'', ''Cooking and experimenting with new recipes'', ''Participating
    in improv comedy workshops'', ''Board games and tabletop RPG nights'', ''Streaming video games on Twitch'', ''Volunteering at community coding workshops'']'
  career_goals: James aims to evolve from a junior developer into a technical product leader who can shape product vision at a fast‑growing tech company or his own startup. Over the next five years, he
    plans to deepen his expertise in product management, lead cross‑functional teams, and launch a SaaS solution that solves a niche problem in the Midwest retail sector. He values workplaces that blend
    structured processes with flexible, collaborative cultures, and he seeks mentorship opportunities to sharpen his strategic and leadership abilities.
