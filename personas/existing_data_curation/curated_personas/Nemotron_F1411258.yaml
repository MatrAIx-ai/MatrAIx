  hobbies: '[''Exploring tide pools'', ''Collecting shells, rocks, and insects'', ''Building forts from driftwood and sand'', ''LEGO city construction'', ''Competitive video games'', ''Jigsaw and strategic
    board games'', ''Reading adventure books'', ''Drawing comic strips'', ''Short hikes with a small group'']'
  career_goals: Michael dreams of turning his curiosity into real-world inventions. He hopes to become an inventor of simple, useful gadgets like a tide-powered flashlight or a marine biologist who explores
    the tide pools near his home. He also imagines competing as an e-sports player in age-appropriate video-game tournaments. His short-term ambition is to win the school science fair with a solar-powered
    model boat, be the top player in his class's puzzle challenge, and later lead a team that creates tools to protect the coastal environment. He values personal achievement and competition over group
    recognition.
