personas:
  professional: An aspiring marine explorer and budding engineer, Michael Maldonado builds driftwood forts and LEGO cities with meticulous detail, harnessing practical curiosity to devise clever solutions
    while often abandoning structured plans in favor of spontaneous tinkering.
  sports: Michael Maldonado loves splashy tide‑pool swims, plays forward on the Brookings Youth Soccer Club, and roots for the Seattle Seahawks and Portland Timbers while favoring quick, competitive games
    of tag over organized team drills.
  arts: Michael Maldonado sketches vibrant comic strips inspired by adventure novels and Pixar’s 'Finding Nemo', listens to upbeat Imagine Dragons songs during LEGO builds, and enjoys weekly storytime at
    the local library featuring maritime tales.
  travel: Michael Maldonado relishes spontaneous weekend trips to Yaquina Head tide pools, dreams of a family adventure to Hawaii’s volcanic beaches, and prefers short, nature‑focused outings over long,
    structured vacations due to school commitments.
  culinary: Michael Maldonado delights in fish tacos topped with fresh cilantro and lime, pairs them with crunchy sea‑salted tortilla chips, favorites homemade macaroni‑cheese, and can confidently assemble
    a peanut‑butter‑banana snack while remaining picky about trying new vegetables.
  core: Michael Maldonado is a fiercely curious six‑year‑old who builds elaborate forts, competes relentlessly in games, hoards shells like treasure, and sometimes forgets to tidy up or finish tasks, yet
    remains unfazed by setbacks.
background:
  cultural: Michael was raised in a predominantly white, middle-class household in Brookings, Oregon, a coastal town in the Pacific Northwest. His family has Portuguese and English ancestry, reflected in
    occasional family dishes like fish tacos and the use of Portuguese greetings, but most of his daily life follows mainstream American customs—celebrating holidays such as Thanksgiving and Fourth of July,
    attending a local public elementary school, and participating in community activities like beach clean-ups. The region's strong connection to the ocean, forests, and outdoor recreation shapes his appreciation
    for nature, while the local culture's value of self-reliance and practicality reinforces his practical curiosity.
attributes:
  skills: '[''LEGO construction'', ''Basic woodworking projects'', ''Reading at second-grade level'', ''Simple mental math (up to 100)'', ''Educational tablet app navigation'', ''Competitive board and puzzle
