personas:
  professional: Shedrick Butler, a four‑year‑old enthusiast of building blocks and pretend‑office play, balances an innate curiosity for new inventions with a practical reliance on familiar LEGO sets, turning
    playtime into an early sandbox for design thinking while often scattering pieces in a delightfully disorganized fashion.
  sports: Shedrick Butler is a lively participant in the neighborhood preschool soccer program and attends a weekly toddler gymnastics class, cheering loudly for the Chicago Cubs during family TV nights
    and idolizing the energy of the Chicago Bulls, while their competitive spirit often leads them to aim for the first place in any playground race.
  arts: Shedrick Butler delights in singing along to The Wiggles and dancing to Sesame Street’s Elmo, loves drawing dinosaurs with Crayola crayons, and frequently watches Disney’s Frozen, mimicking Elsa’s
    gestures, while occasionally insisting on playing “pretend stage” with a plastic microphone and reaches for Toy Story’s Buzz Lightyear for inspiration.
  travel: Shedrick Butler enjoys family trips that blend excitement and familiarity, having explored the local zoo in their hometown, taken a short road trip to a nearby beach with sandcastle competitions,
    and dreaming of a future visit to Disney World in Florida, where they plan to brave the rides with a grown‑up’s hand.
  culinary: Shedrick Butler favors comfort foods such as chicken nuggets, macaroni and cheese, and apple slices, loves to dip carrots in ranch dressing, has a sweet spot for peanut butter and jelly sandwiches,
    and often attempts to "help" in the kitchen by sprinkling shredded cheese on pizza, albeit creating a delightful mess.
  core: Shedrick Butler is an energetic four‑year‑old whose curiosity fuels creative play, whose competitive streak and occasional worry drive both spirited games and occasional meltdowns, and whose love
    of simple pleasures—candy, cartoons, and building blocks—reveals a sweetly disorganized yet heartfelt approach to life.
background:
  cultural: Shedrick is raised in a close‑knit Black family in Savannah, Georgia, where Southern hospitality and African‑American heritage intertwine. His family celebrates traditions such as church gatherings,
    Sunday meals featuring dishes like collard greens and cornbread, and community events like Juneteenth and local music festivals. He frequently hears stories from grandparents about Savannah's historic
    neighborhoods and African‑American contributions to the city, fostering a sense of pride and cultural awareness. The vibrant local culture, including visits to the historic district, the Savannah African
    Art Museum, and neighborhood picnics, shapes his worldview while his family emphasizes values of resilience, community support, and lifelong curiosity.
