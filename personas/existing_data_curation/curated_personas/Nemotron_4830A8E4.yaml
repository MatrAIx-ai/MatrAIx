    trucks'']'
  career_goals: He frequently shares his dreams of becoming a firefighter because he loves the bright trucks and helping others, imagines traveling to space as an astronaut to explore the stars, and sometimes
    pictures himself as a teacher who can share his favorite stories. His ambitions blend his curiosity about the unknown with a desire for practical, community‑focused roles. He often draws pictures of
    fire trucks, rockets, and a classroom, showing a growing excitement for future possibilities.
