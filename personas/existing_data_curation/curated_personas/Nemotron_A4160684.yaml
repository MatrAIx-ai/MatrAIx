  career_goals: Alexis aims to launch a community workshop in Brooklyn that blends STEM education with artistic expression, giving older adults and local youth hands‑on experience in creative tech projects.
    She aspires to mentor the next generation of Black women in STEM through scholarships, speaking engagements, and informal tutoring. She plans to compile and self‑publish a collection of essays and short
    stories that weave scientific concepts with personal and cultural narratives. Additionally, she hopes to serve on a neighborhood advisory board focused on cultural preservation and to stay intellectually
    agile by taking online courses in emerging technologies like AI and quantum computing, while maintaining the flexibility that suits her lifestyle.
