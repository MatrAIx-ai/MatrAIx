personas:
  professional: A community workshop founder, Alexis Brown merges advanced data analysis, Python programming, and abstract painting to design interdisciplinary STEM‑arts labs, channeling a competitive,
    improvisational spirit into mentoring while thriving on flexible, loosely‑structured project timelines.
  sports: An active waterfront walker and bridge enthusiast, Alexis Brown joins a local senior yoga class, competes in weekly bridge tournaments at the Brooklyn Bridge Club, follows the New York Knicks
    and Yankees with spirited debates, and plays casual pickleball at the community center, maintaining fitness through regular strolls while treating competition as a mental sport.
  arts: An interdisciplinary artist, Alexis Brown creates abstract canvases inspired by Kandinsky’s color theory and the cosmos, writes speculative short stories echoing Octavia Butler’s narrative depth,
    plays improvisational jazz piano reminiscent of Thelonious Monk at friends’ gatherings, and performs with a Brooklyn improv troupe, citing Miles Davis and Joni Mitchell as musical muses.
  travel: A spontaneous explorer, Alexis Brown has taken day trips to the Hudson Valley’s historic estates, visited the Smithsonian’s National Air and Space Museum in Washington, D.C., yearned to chase
    the northern lights in Iceland, and enjoys spontaneous weekend ferry rides to Governors Island, preferring flexible itineraries over rigid schedules.
  culinary: A culinary experimenter, Alexis Brown harvests fresh basil, rosemary, and thyme from a small herb garden to craft herb‑pesto pasta and rosemary‑infused grilled salmon, loves assembling Mediterranean
    mezze plates with olives and feta, bakes slightly over‑crusted banana bread for brunch, and occasionally over‑salts a soup, attributing the mishap to their habit of multitasking while improvising tunes
    on the piano.
  core: A 79‑year‑old inventive polymath, Alexis Brown stitches data, art, and community together with a relaxed, competitive spark, even if they sometimes misplace glasses or forget a bill.
background:
  cultural: Alexis is an African‑American woman who grew up in Brooklyn’s Bedford‑Stuyvesant neighborhood during the civil‑rights era. Her upbringing was steeped in Black cultural traditions—gospel music,
    soul, and jazz—alongside a strong emphasis on education and community activism. She witnessed the neighborhood’s transformation over the decades, experiencing both the solidarity of the 1970s Black
    empowerment movements and the challenges of recent gentrification. These experiences fostered her commitment to mentorship, cultural preservation, and intergenerational dialogue, while her Black heritage
    informs her artistic sensibilities and her dedication to uplifting under‑represented voices in STEM.
