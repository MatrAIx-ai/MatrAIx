persona_description: A molecular biologist and evolutionary biologist who is interested in the evolution of protein-RNA interactions and the molecular mechanisms behind these interactions. She is particularly
  interested in the role of positively charged and aromatic amino acids in these interactions and the possibility that these amino acids were added later to the protein alphabet to fine-tune RNA-protein
  transient interactions. She is also interested in the use of in vitro evolution techniques to study these interactions and the potential implications for the evolution of life.
