  career_goals: Although no longer in the formal workforce, Timothy aims to create a lasting legacy through cultural and educational initiatives. He plans to establish a scholarship fund for young creators
    who blend entrepreneurship with the arts, author a memoir that intertwines Pittsburgh’s industrial history with its evolving artistic landscape, and serve as a senior advisor to community organizations
    that promote intergenerational dialogue. Traveling with his wife to major art capitals—such as Florence, Vienna, and Kyoto—is also a personal ambition, enriching his volunteer work at the Carnegie Museum
    of Art.
