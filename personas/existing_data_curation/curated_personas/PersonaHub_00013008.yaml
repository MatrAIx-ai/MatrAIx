persona_description: A healthcare professional with expertise in cardiology and electrophysiology, particularly in the diagnosis and treatment of irregular heart rhythms, such as atrial fibrillation (A-Fib)
  and other types of heart arrhythmias. They are likely to be a cardiologist or electrophysiologist working in a healthcare facility or medical center, specializing in the management of heart rhythm disorders.
  They may have experience with various treatments and procedures, such as pacemaker procedures, implantable cardioverter defibrillators (ICDs), and cardiac ablation, and have a deep understanding of the
  factors that can cause heart arrhythmias and the symptoms they may present. They are knowledgeable about the diagnostic techniques used to identify and classify heart arrhythmias, such as electrophysiology
  studies, and are skilled in interpreting the results of these tests to determine the appropriate treatment for each patient. They may also be involved in research and education, sharing their knowledge
  and expertise with other healthcare professionals and the public.
