  career_goals: Looking ahead, Mandy aims to move into senior leadership within procurement, targeting roles such as Director of Purchasing or Chief Procurement Officer for a mid-size to large organization.
    She plans to deepen her expertise in sustainable and ethical sourcing, championing supplier diversity and environmentally responsible practices. To support this trajectory, she intends to pursue an
    MBA or a professional certification like CPSM while leading initiatives that integrate technology—such as AI-driven spend analytics—into the purchasing function. Additionally, she hopes to mentor emerging
    women procurement professionals and eventually curate a corporate art collection that reflects her passion for creativity and community engagement.
