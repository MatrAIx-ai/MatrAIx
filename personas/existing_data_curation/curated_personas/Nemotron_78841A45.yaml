personas:
  professional: Soli Castro is an aspiring cartoonist; they channel their practical, structure‑loving mindset into meticulous storyboard layouts while tolerating occasional disarray in their sketchbook
    routine and using their cooperative spirit to seek feedback from friends.
  sports: Soli Castro plays midfield for the local Parkside United youth soccer club, enjoys cheering on the national men’s team during World Cup qualifiers and follows the city’s professional basketball
    squad, the Metro Raptors, but prefers spontaneous park games over regimented training, reflecting their need for predictable teamwork yet love of flexible play.
  arts: Soli Castro spends evenings sketching cartoon strips inspired by fantasy novels and the whimsical art style of Studio Ghibli, while their playlists feature Latin pop stars like Shakira and Juanes
    alongside traditional marimba rhythms, and they eagerly rewatch animated series such as Adventure Time, which together shape their vibrant artistic identity.
  travel: Soli Castro dreams of exploring the volcanic landscapes of Costa Rica and has already visited the sunny shores of Playa Blanca on a family beach vacation, preferring itineraries that blend a few
    planned museum stops with ample free time for wandering, though modest allowance and school commitments sometimes limit longer journeys.
  culinary: Soli Castro loves cooking alongside their mother, mastering the rhythm of stirring gallo pinto rice and beans, shaping pupusas with fresh masa and cheese, and experimenting with cilantro, lime,
    and plantain chips, a culinary habit that grounds them in family tradition while they eagerly share samples with friends at school.
  core: Soli Castro is a detail‑oriented yet delightfully disorganized 12‑year‑old who calms worries through sketching, soccer, and cooking, but often forgets homework and over‑indulges in late‑night Minecraft
    sessions.
background:
  cultural: Soli was born to Nicaraguan immigrant parents and grew up in Dyer, Indiana. At home, Spanish is spoken daily, and the family celebrates Nicaraguan holidays such as La Purísima, Independence
    Day, and traditional Catholic feasts, often with music, dance, and homemade foods. While she attends a typical Midwestern middle school and participates in local community events, she also maintains
    strong ties to her heritage through family gatherings, bilingual storytelling, and cooking. This bicultural experience enriches her language abilities, culinary interests, and her emerging desire to
    support other bilingual children in navigating both cultures.
attributes:
  skills: '["Spanish‑English bilingual communication", "Reading comprehension", "Basic arithmetic and introductory algebra", "Science basics (earth and life sciences)", "Digital literacy (typing, educational
    apps, online research)", "Team collaboration in school projects", "Cooking traditional Nicaraguan dishes", "Creative drawing and sketching", "Using color‑coded organization tools"]'
  hobbies: '["Drawing and sketching", "Soccer", "Cooking Nicaraguan dishes (gallo pinto, pupusas)", "Reading fantasy novels", "Playing Minecraft", "Listening to Latin pop and marimba music", "Journaling",
    "Participating in school cultural club"]'
  career_goals: Soli aspires to a career that blends her love for helping others with her bilingual background. She dreams of becoming a school counselor or community health advocate who can support other
    kids dealing with stress and anxiety, especially those who navigate two languages and cultures. She values the predictability of a structured profession, wants to continue learning about mental wellness,
    and hopes to create safe spaces where children feel heard and understood.
