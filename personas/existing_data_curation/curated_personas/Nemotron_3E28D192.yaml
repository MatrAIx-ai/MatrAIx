personas:
  professional: Ashley Woodard, a full‑stack software developer, leverages their methodical, competitive nature to build reliable, high‑performance applications using JavaScript, Python, Java, and cloud
    services, while rigorously vetting third‑party libraries and championing robust engineering processes.
  sports: Ashley Woodard runs three times a week, participates in the Queens Running Club, follows the New York Knicks and New York Rangers for winter camaraderie, and cheers for the Yankees, using running
    as structured stress relief.
  arts: Ashley Woodard captures the organized chaos of Astoria's streets through urban photography inspired by Vivian Maier, while unwinding to Radiohead and Ludovico Einaudi and attending occasional indie
    film screenings at the Museum of the Moving Image.
  travel: Ashley Woodard meticulously plans trips with detailed itineraries, preferring short city escapes like a weekend in Lisbon, an art‑focused week in Tokyo, and a nature‑laden adventure to Reykjavik,
    while balancing a modest travel budget and occasional work‑related travel constraints.
  culinary: Ashley Woodard, an avid home chef, follows precise recipes to master dishes like Japanese ramen, Greek moussaka, and Ethiopian injera, favoring ingredients such as miso, tahini, and harissa,
    and enjoys testing new flavor combos at local farmers' markets before replicating them in their kitchen.
  core: Ashley Woodard blends a competitive, structure‑driven mindset with a love for puzzles and precise cooking, though they sometimes over‑optimize code at the expense of simplicity and can’t resist
    a late‑night board‑game marathon.
background:
  cultural: Ashley grew up in a middle‑class, white family in the suburban New York area before moving to Astoria, Queens, a culturally diverse neighborhood. Her upbringing emphasized self‑reliance, a strong
    work ethic, and pragmatic problem‑solving, values that align with typical American middle‑class norms. Living in Astoria has exposed her to a vibrant mix of cultures, especially Greek, Italian, and
    Middle‑Eastern communities, influencing her appreciation for diverse cuisines and community events. She celebrates traditional American holidays such as Thanksgiving and Independence Day, while also
    partaking in neighborhood festivals that reflect the borough’s multicultural fabric. This blend of an individualistic cultural background with the inclusive atmosphere of Queens shapes her worldview,
    fostering both independence and openness to diverse perspectives.
