  career_goals: Ashley aims to become a lead engineer or software architect within the next five years, steering the design of scalable, secure systems for a tech company that values data‑driven decision
    making, such as fintech or healthcare. She plans to earn an AWS Certified Solutions Architect certification and deepen her expertise in distributed systems and micro‑services. Her competitive drive
    pushes her to deliver high‑performance solutions, while her preference for structure motivates her to implement robust engineering processes. Eventually, she envisions transitioning to a senior technical
    leadership role where she can mentor junior developers, shape product strategy, and influence organizational culture. Long‑term, she harbors the ambition to launch her own SaaS product that automates
    code review and testing, leveraging her experience in automation and her desire for measurable impact.
