personas:
  professional: Frederick Wood, an aspiring young cartoonist‑engineer, merges a love for sketching whimsical comics, constructing detailed LEGO worlds, and solving puzzles in Chess and Scratch, channeling
    their organized, competitive, and slightly skeptical nature into meticulous storyboards and systematic project planning.
  sports: Frederick Wood plays forward for the Eastside Elementary Soccer Club, emulating Minnesota United FC’s star forward with a fiercely competitive attitude, while also joining weekend fishing trips
    at Leech Lake to boost endurance and enjoy nature.
  arts: Frederick Wood immerses in art by sketching cartoons inspired by Bill Watterson’s Calvin and Hobbes, painting watercolors reminiscent of Claude Monet’s lily pads, and watching Studio Ghibli films
    like My Neighbor Totoro, which fuel their creative storytelling and love for detailed visuals.
  travel: Frederick Wood loves planning weekend excursions to Leech Lake for rock hunting and to Voyageurs National Park for camping, while dreaming of a future trip to the Kennedy Space Center in Florida,
    their methodical map‑drawing and weather‑checking habits reflecting their organized, curious nature.
  culinary: Frederick Wood relishes cheese pizza, chicken nuggets, and assembling fruit kebabs with strawberries and grapes, often helping stir pancake batter in the kitchen, though they can be messy and
    occasionally sneak extra chocolate chips into the mix when no one watches.
  core: Frederick Wood is a curious, methodical eight‑year‑old whose competitive spirit drives elaborate LEGO universes, detailed cartoons, and relentless soccer drills, while a healthy dose of skepticism
    keeps them questioning every rule and story.
background:
  cultural: Frederick was born and raised in Walker, a small town on the shores of Leech Lake in Cass County, Minnesota. His family follows typical Midwestern white cultural patterns, valuing community
    involvement, self‑reliance, and appreciation for the outdoors. Seasonal activities such as ice fishing in winter, kayaking and swimming in summer, and attending the local county fair are regular parts
    of his upbringing. School and church gatherings emphasize teamwork, courtesy, and respect for nature. These community traditions, combined with his family's encouragement of curiosity and artistic expression,
    shape his worldview and daily life.
