  career_goals: Although still eight, Frederick already envisions a future where he combines his love for art and science. He dreams of becoming a wildlife illustrator who can capture animals and habitats
    with accuracy, or an environmental scientist who conducts experiments to protect the local lakes. He is also intrigued by robotics and hopes one day to design interactive toys or robots that can teach
    other kids. His competitive drive pushes him to aim for excellence, and he imagines winning science fairs or art contests as stepping stones toward his ambitions.
