  hobbies: '[''Gardening'', ''Reading (legal thrillers, historical fiction)'', ''Birdwatching'', ''Hiking local trails'', ''Crossword and Sudoku puzzles'', ''Baking and cooking'', ''Knitting/Crocheting'',
    ''Volunteering at the local library'', ''Participating in a book club'', ''Attending community history talks'']'
  career_goals: Gloria aims to advance to a senior paralegal or legal office manager role within the next three years. She plans to earn the NALA‑certified paralegal credential and to specialize in probate
    and family law, areas with growing demand in her community. Her competitive drive pushes her to lead process‑improvement initiatives, mentor junior staff, and become the go‑to expert for legal technology
    adoption in her firm. Long‑term, she envisions launching a boutique legal‑consulting service that assists small businesses and individuals with document preparation, compliance reviews, and basic legal
    guidance.
