personas:
  professional: Ruben Ortiz, a retired maintenance supervisor turned community heritage advocate, blends meticulous carpentry, small‑engine expertise, and logistical precision with a compassionate, organized
    approach to mentoring teens and preserving Lake Arthur’s oral histories.
  sports: Ruben Ortiz combines early‑morning fishing on the Atchafalaya Basin with steadfast fandom for the New Orleans Saints and LSU Tigers, and participates in the Lake Arthur Senior Softball League
    each spring as a light‑impact exercise routine.
  arts: Ruben Ortiz channels curiosity into watercolor paintings of bayou landscapes, drawing inspiration from the works of George Rodrigue and the jazz rhythms of Louis Armstrong, while showcasing pieces
    annually at the parish art fair and volunteering to teach basic sketching to youth at the senior center.
  travel: Ruben Ortiz prefers low‑key road trips that blend cultural immersion and natural scenery, planning weekend drives to the historic French Quarter of New Orleans for Mardi Gras festivities, day
    excursions to the Audubon Swamp Garden, and daydreaming about a future pilgrimage to France’s Loire Valley to study its historic gardens.
  culinary: Ruben Ortiz, a confident home cook, delights in preparing authentic Cajun dishes like gumbo brimming with andouille sausage, crawfish étouffée thickened with file powder, and blackened catfish
    seasoned with cayenne and thyme, often sourcing fresh okra and bell peppers from their own garden.
  core: Ruben Ortiz is a methodical, community‑focused septuagenarian who balances meticulous budgeting and gentle stewardship of health with a creative streak for watercolor art, all while occasionally
    worrying about missed appointments and letting the garden overrun with weeds.
background:
  cultural: Ruben grew up in a close‑knit, predominantly white Southern family in Lake Arthur, Louisiana. His upbringing was steeped in the values of hospitality, church involvement, and community service
    typical of the region. Although his ancestry is largely Anglo‑American, the pervasive Cajun and Creole influences of southwestern Louisiana shaped his appreciation for local music, cuisine, and festivals,
    such as Mardi Gras and the Crawfish Festival. He attended a Baptist congregation but participates in many parish-wide events, reflecting the ecumenical spirit of the area. Ruben’s cultural identity
    mixes traditional Southern modesty and work ethic with an openness to the vibrant, eclectic customs of his Louisiana homeland.
