  hobbies: '[''social dancing'', ''group fitness (Zumba)'', ''community mural volunteering'', ''coastal hiking'', ''yoga'', ''hosting game nights'', ''DIY home décor'', ''mixed‑media art'']'
  career_goals: Sharon aims to become a certified lead painter and eventually start her own painting and paperhanging business in the Greater Boston area. She plans to obtain professional certifications
    from the Painting Contractors Association, develop a reputation for high-quality, client-focused work, and expand into commercial projects such as office spaces and boutique hotels. Long‑term, she hopes
    to combine her trade skills with her artistic interests by taking on community mural commissions and offering design‑consultation services.
