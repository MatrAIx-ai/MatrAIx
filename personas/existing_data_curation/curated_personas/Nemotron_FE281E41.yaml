  career_goals: William aspires to become a sales leader within the next five years, targeting a role as Sales Manager or Regional Director where he can mentor a high‑performing team and shape the company’s
    growth strategy. He aims to consistently rank in the top percentile of sales performance, earn industry certifications, and pursue an MBA to broaden his strategic acumen. Long‑term, he envisions launching
    his own boutique consulting firm focused on helping service‑based businesses adopt innovative, customer‑centric sales models, while also achieving financial stability to support his family’s future.
