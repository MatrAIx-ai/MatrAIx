  career_goals: Kevin aims to earn a bachelor’s degree in computer engineering or electrical engineering at a university in the Research Triangle, leveraging scholarships and mentorship programs. He hopes
    to specialize in sustainable technology and eventually work on renewable‑energy systems or smart‑grid projects that benefit his community. In the short term, he plans to secure a summer internship or
    apprenticeship with a local tech firm or a community‑focused nonprofit to gain practical experience and build a professional network.
