personas:
  professional: Kevin Viltz is an aspiring computer engineering student who channels their meticulous project‑planning mindset and hands‑on hardware expertise into building custom PCs and experimenting
    with sustainable tech prototypes, balancing curiosity with a practical, detail‑oriented approach to problem‑solving.
  sports: Kevin Viltz enjoys early‑morning jogs around Cary’s Lake Crabtree Park, plays pickup basketball with the Cary Community Center’s youth league, roots for the Carolina Panthers and watches the Tar
    Heels during March Madness, and stays tuned to the Charlotte Hornets for NBA action, using each session as a way to balance sedentary study time with physical release.
  arts: Kevin Viltz immerses themselves in hip‑hop and jazz, regularly streaming Kendrick Lamar, J. Cole, Miles Davis, and John Coltrane, while dabbling with FL Studio to produce lo‑fi beats that blend
    soulful samples with electronic synths, and occasionally attends local open‑mic nights at the church’s cultural events.
  travel: Kevin Viltz prefers structured road trips that combine cultural immersion and tech inspiration, having explored Washington, D.C.’s historic museums during Black History Month, backpacked through
    the Appalachian Trail in Virginia, and dreaming of a future visit to Copenhagen to study renewable‑energy innovations, all while budgeting each trip with a spreadsheet to stay within a modest student
    allowance.
  culinary: Kevin Viltz enjoys cooking simple comfort dishes like collard greens with smoked turkey, buttery cornbread, and homemade ramen bowls seasoned with miso, soy sauce, and fresh basil, often experimenting
    with spice blends while still relying on their basic cooking skill set to whip up quick meals between study sessions.
  core: Kevin Viltz balances a curiosity‑driven love for building tech with a disciplined, community‑oriented mindset, occasionally splurges on hardware upgrades, but always returns to their small circle,
    steady routines, and a playlist of hip‑hop and jazz for motivation.
background:
  cultural: Kevin identifies as African American and grew up in the suburban environment of Cary, North Carolina, where he experienced a blend of Southern traditions and a diverse, growing community. His
    family places a strong emphasis on education, church involvement, and mutual support, which has shaped his collaborative and considerate nature. He celebrates his cultural heritage through participation
    in local Black History Month events, soul‑food gatherings, and community service at the church youth group, while also engaging with the broader multicultural fabric of the Triangle region.
