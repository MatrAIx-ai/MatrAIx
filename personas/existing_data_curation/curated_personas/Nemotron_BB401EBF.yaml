  career_goals: Ross aims to secure stable, skilled employment that leverages his practical abilities and disciplined work ethic. He plans to obtain an HVAC certification within the next two years, with
    the long‑term ambition of launching his own home‑services business to provide reliable maintenance for families in Johnston County. In parallel, he hopes to enroll in night courses for an associate’s
    degree in business management, strengthening his entrepreneurial prospects. Ross’s primary career drive is to create financial security for his wife, build a reputable local brand, and eventually take
    on a leadership role within his community’s homeowners association.
