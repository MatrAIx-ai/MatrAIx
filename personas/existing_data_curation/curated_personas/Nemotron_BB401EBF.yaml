personas:
  professional: Ross Bennett is a disciplined aspiring HVAC technician whose methodical approach to small‑scale home projects, budget management, and community coordination showcases their knack for structured
    execution and leadership in a future home‑services business.
  sports: Ross Bennett enjoys weekend fishing trips on nearby lakes, maintains a disciplined weight‑training schedule at the local gym, and roots for the Carolina Panthers, the Durham Bulls, and the North
    Carolina FC, often tracking game stats while planning seasonal hikes.
  arts: Ross Bennett’s creative outlet is board‑game nights, where they champion strategy games like Settlers of Catan and collaborate with friends while admiring the classic rock sounds of The Beatles,
    modern folk of John Mayer, and the storytelling films of Christopher Nolan.
  travel: Ross Bennett prefers meticulously planned road trips, having mapped out weekend getaways to the Outer Banks and Asheville, while dreaming of a month‑long cultural immersion in Kyoto, Japan, balancing
    the desire for adventure with a modest travel budget and a need for familiar routine.
  culinary: Ross Bennett favors hearty, home‑cooked meals, often grilling fresh lake trout seasoned with rosemary and smoked paprika, whipping up a sweet‑potato and kale stew, and they consider themselves
    an intermediate cook who relishes seasonal vegetable garden harvests.
  core: Ross Bennett’s life is a disciplined blend of DIY projects, meticulous budgeting, and strategic board‑games, punctuated by a chronic habit of over‑organizing grocery lists that sometimes leaves
    the pantry overstocked.
background:
  cultural: Ross grew up in the rural‑suburban South of North Carolina, steeped in traditional Southern values. Raised in a Baptist household, he embraces the region’s emphasis on family, hospitality, and
    community involvement. The cultural fabric of Johnston County—marked by its agricultural heritage and growing suburban character—influences his appreciation for modest living, seasonal cooking, and
    participation in local church and civic events. His upbringing reflects a blend of Southern pragmatism, respect for tradition, and a strong sense of neighborly responsibility.
