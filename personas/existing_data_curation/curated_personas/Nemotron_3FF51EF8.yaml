  hobbies: '[''Desert photography'', ''Watercolor painting'', ''Digital illustration'', ''Hiking and geology exploration'', ''Succulent gardening'', ''Yoga and mindfulness meditation'', ''Journaling'',
    ''Volunteer tutoring in computer basics'', ''Attending local art gallery openings'', ''Collecting vintage postcards'']'
  career_goals: Mykayla aims to channel her analytical expertise and meticulous organization into a part‑time consulting practice that helps local small businesses in Kingman leverage data for marketing
    and operational decisions. She also aspires to launch a community‑driven art initiative that showcases the intersection of science and creativity, curating exhibitions and workshops that invite unconventional
    thinking. To support these goals, she plans to complete a master's degree in data science through an online program, obtain a certification in yoga instruction to deepen her stress‑relief practices,
    and eventually author a memoir that reflects on her journey blending STEM, art, and desert life.
