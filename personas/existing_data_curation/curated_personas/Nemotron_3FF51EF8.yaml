personas:
  professional: Mykayla Mcdonald, a 50‑year‑old data‑science consultant in Kingman, leverages her meticulous project‑management style and a love for visual storytelling to help local small businesses turn
    raw sales data into vibrant dashboards, while simultaneously curating interdisciplinary art‑science workshops that feature desert photography alongside statistical visualizations.
  sports: Mykayla Mcdonald, a member of the Kingman Hiking Club, trails less‑traveled Mojave paths each spring, supports the Arizona Cardinals and Phoenix Suns, and joins a seasonal adult recreational volleyball
    league to balance cardiovascular fitness with social interaction.
  arts: Mykayla Mcdonald regularly paints watercolor abstractions of desert sunsets, creates digital illustrations inspired by Hopi and Hualapai motifs, and frequently visits the S.E. California Art Institute
    to view works by contemporary desert artists like Eric Gabarreta and photographer Anselmo Ortega.
  travel: Mykayla Mcdonald plans her travel around scenic desert journeys, having driven Route 66 to the Grand Canyon, explored the red rocks of Sedona, and dreamt of an extended cultural immersion in Oaxaca,
    Mexico, where she hopes to study traditional weaving techniques and local cuisine.
  culinary: Mykayla Mcdonald enjoys preparing southwestern dishes such as chiles rellenos, prickly‑pear‑glazed pork, and cactus‑nopal salads, favors ingredients like mesquite flour, sage, and roasted jalapeños,
    and often experiments with succulents as garnish in her week‑night meals.
  core: Mykayla Mcdonald blends analytical rigor with desert‑inspired creativity, balancing a high‑achieving consulting career, meticulous budgeting, and a disciplined wellness routine while wrestling with
    chronic worry and a penchant for spontaneous art purchases.
background:
  cultural: Mykayla is a third‑generation American of Anglo‑Celtic ancestry. Raised in a suburban Midwestern community, she relocated to Kingman, Arizona, in her thirties, where she embraced the Southwest’s
    rugged, self‑reliant ethos. While her cultural identity aligns with mainstream white American traditions, she has developed a deep respect for the region’s Native American heritage, regularly attending
    Hopi and Hualapai cultural events and integrating their artistic motifs into her own creative work. Her marriage and community involvement reflect a blend of traditional family values and a progressive
    curiosity about diverse ideas and experiences.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Technical writing'', ''Project management'', ''Event planning'', ''Budgeting and personal finance'', ''Digital arts design'', ''Research methodologies'',
