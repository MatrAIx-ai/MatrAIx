  career_goals: Michelle aspires to become a veterinarian, motivated by her love for animals and her desire to combine scientific knowledge with hands‑on care. In the short term, she aims to join her middle
    school’s science club, participate in a summer wildlife camp, and earn a certification in pet first aid. She also hopes to start a small neighborhood initiative that educates younger children about
    responsible pet ownership, using her strong communication abilities to raise awareness. Ultimately, she envisions attending a high‑school with a strong pre‑veterinary program, followed by a university
    degree in animal science and veterinary medicine.
