personas:
  professional: Kimetha Harris, a 66‑year‑old construction veteran, leverages three decades of hands‑on building expertise to mentor apprentices, champion safety, and pursue a foreman role that blends assertive
    leadership with a collaborative, curiosity‑driven approach to problem‑solving.
  sports: Kimetha Harris joins a Saturday walking club that tours Birmingham’s historic neighborhoods, enjoys cheering on the Birmingham Barons minor‑league baseball team, and participates in line‑dancing
    sessions at the community center, staying active despite occasional joint stiffness.
  arts: Kimetha Harris sings in her church choir, delights in blues nights featuring classics by B.B. King and Etta James, attends local civil‑rights history talks, and collects reproductions of Southern
    folk art that echo her heritage.
  travel: Kimetha Harris prefers organized road trips to historic sites, has explored New Orleans’ French Quarter, Charleston’s historic homes, and the National Archives in Washington D.C., and dreams of
    a leisurely march to Savannah’s riverfront while balancing a limited travel budget.
  culinary: Kimetha Harris expertly prepares collard greens seasoned with smoked turkey, crisp fried chicken, buttery cornbread, and sweet potato pie, often sourcing heirloom vegetables from the community
    garden and experimenting with a pinch of smoked paprika for extra depth.
  core: Kimetha Harris blends seasoned construction know‑how with a love for soulful music and genealogy, navigating retirement worries with a pragmatic yet community‑centric spirit, even if occasional
    stress sparks a tendency to over‑schedule herself.
background:
  cultural: Kimetha was raised in Birmingham’s historically Black neighborhoods, where church, family, and community festivals shaped her worldview. She grew up during the civil‑rights era, witnessing the
    struggle for racial equality, which instilled a strong sense of resilience and pride. Her family’s culinary traditions, gospel music, and storytelling have been central to her identity. She maintains
    close ties to the African‑American church community, celebrates Juneteenth and Kwanzaa, and actively supports local initiatives that preserve Black heritage in the South. Her experience as a Black woman
    in a male‑dominated construction field informs her commitment to mentorship and advocacy.
