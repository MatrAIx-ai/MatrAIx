  hobbies: '["Soccer (playing and coaching)", "Hiking and outdoor recreation", "Cooking Mexican dishes", "Community volunteering", "Traveling with family", "Listening to music (Latin rock, regional Mexican)",
    "Photography", "Board games and group gatherings"]'
  career_goals: Brandon aims to advance from his current retail salesperson role into store management within the next two years, leveraging his leadership and organizational strengths. He plans to pursue
    a bachelor’s degree in Business Administration part‑time to broaden his strategic understanding. Long‑term, he envisions becoming a regional manager overseeing multiple locations, and eventually launching
    his own boutique that blends contemporary retail concepts with Mexican cultural elements, such as a curated line of artisanal goods and a small café serving traditional cuisine. He also hopes to mentor
    younger employees and contribute to community development programs in Umatilla.
