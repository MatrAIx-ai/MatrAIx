personas:
  professional: Hector Aguilar is a bilingual pharmacy professional who leverages meticulous medication therapy management, compounding expertise, and a passion for watercolor illustration to create culturally
    resonant patient education materials while they methodically pursue board certification and telepharmacy expansion.
  sports: Hector Aguilar enjoys weekend hikes in the Boise Foothills, participates in the Meridian Trail Runners club, follows the Boise State Broncos football team, and they occasionally join the Idaho
    Steelheads hockey watch parties, balancing a steady cardio routine with occasional yoga for flexibility.
  arts: Hector Aguilar channels curiosity into watercolor landscapes inspired by Ansel Adams, captures Idaho’s wildflower fields with a vintage Nikon, and they serenade small gatherings with acoustic renditions
    of José González and Frida Kahlo’s iconic songs, while devouring sci‑fi novels by Ursula K. Le Guin for creative sparks.
  travel: Hector Aguilar prefers meticulously planned road trips, having explored the historic streets of Santa Fe and the rugged beauty of Patagonia, yet they often dream of a tranquil retreat in the Japanese
    Alps, balancing adventure with occasional budget‑conscious staycations in nearby Sawtooth Lakes.
  culinary: Hector Aguilar is a confident home chef who reimagines classic chilaquiles with chipotle‑infused salsa verde, perfects mole using roasted ancho chilies and dark chocolate, and they experiment
    with avocado‑lime guacamole, all while sourcing local Idaho potatoes for a fusion twist.
  core: Hector Aguilar blends methodical pharmacy expertise with artistic flair, turning every prescription into a canvas of cultural empathy while they quietly juggle a habit of late‑night watercolor sessions.
background:
  cultural: Hector was raised in a Mexican‑American household where family gatherings, Día de los Muertos celebrations, and traditional cuisine were central to his identity. Bilingual from childhood, he
    maintains strong ties to Mexican heritage while embracing the outdoor, community‑oriented lifestyle of Meridian, Idaho. His cultural perspective informs his professional ethos, prompting him to advocate
    for culturally competent care and to blend Mexican artistic sensibilities with his pharmacy practice, fostering trust and harmony with patients from diverse backgrounds.
attributes:
  skills: '[''Medication therapy management'', ''Pharmaceutical compounding'', ''Patient counseling'', ''Bilingual communication (Spanish/English)'', ''Regulatory compliance'', ''Inventory control'', ''Clinical
    data analysis'', ''Health informatics'', ''Community health outreach'', ''Creative health education design'']'
  hobbies: '[''Watercolor painting'', ''Photography'', ''Hiking'', ''Cooking Mexican cuisine'', ''Acoustic guitar'', ''Reading science fiction and philosophy'', ''Mindfulness meditation'', ''Volunteering
    at health fairs'']'
  career_goals: Hector aims to complete his PharmD and obtain board certification in pharmacotherapy, positioning himself for a pharmacy manager role within the next three years. He aspires to expand telepharmacy
    services to rural communities in Idaho, develop culturally tailored medication adherence programs for Spanish‑speaking patients, and eventually open a community‑focused pharmacy that blends clinical
    excellence with health‑literacy initiatives. His long‑term ambition includes publishing research on the impact of visual design in patient education and mentoring new pharmacists, especially those from
    underrepresented backgrounds.
