  hobbies: '[''Watercolor painting'', ''Pottery'', ''Quilting'', ''Gardening'', ''Participating in local art fairs'', ''Senior book club'', ''Playing banjo'', ''Volunteering at food pantry'', ''Creative
    writing'', ''Birdwatching'']'
  career_goals: Although retired from formal employment, Hannah aspires to expand her impact as a community arts advocate. She aims to develop a weekly intergenerational art workshop at the Bell Buckle
    Community Center, mentor younger volunteers, and curate a traveling exhibition of local crafts that can travel to regional festivals. She also hopes to author a memoir of her life in rural Tennessee,
    focusing on themes of imagination and community, and to become a certified volunteer caregiver to support homebound seniors.
