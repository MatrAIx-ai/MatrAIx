  hobbies: '[''Community gardening'', ''Cooking Southern cuisine'', ''Hiking'', ''Church choir'', ''Reading historical fiction'', ''Volunteer tutoring'', ''Quilting'', ''Knitting'', ''Playing piano'']'
  career_goals: Annie aims to advance to a senior operations management role where she can lead county‑wide process transformation initiatives, mentor emerging supervisors, and champion digital workflow
    solutions. She also envisions establishing a consulting practice after retirement to help small businesses and nonprofit organizations streamline their administrative functions, and contributing to
    community workforce development programs that empower local residents.
