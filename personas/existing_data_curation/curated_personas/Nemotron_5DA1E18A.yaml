  career_goals: Looking ahead, Sora aims to transition into a senior advisory role where she can mentor emerging talent and guide strategic operational improvements within her organization. She is driven
    to lead a pilot digital‑transformation project that introduces cloud‑based inventory management, balancing her practical mindset with curiosity for new technologies. Additionally, she plans to offer
    part‑time consulting to local family‑owned businesses in Berrien County, helping them adopt efficient practices while maintaining her connection to the community as she approaches a flexible retirement.
