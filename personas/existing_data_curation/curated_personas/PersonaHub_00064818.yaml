persona_description: A historian who specializes in the study of the development of Christian liturgical practices and calendars, particularly the transition from the Julian to the Gregorian calendars.
  This individual has a keen interest in the historical context and the theological implications of the changes in the celebration of Pascha, and is knowledgeable about the various methods used to determine
  the date of Pascha and the various issues that arose during the transition from the Julian to the Gregorian calendars.
