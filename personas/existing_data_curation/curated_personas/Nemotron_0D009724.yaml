    and history'', ''tinkering with electronics and smartphones'']'
  career_goals: Although retired from formal employment, Alphonso aims to formalize his mentorship by launching a free weekend workshop series on DIY home repair and cooking at the local community center.
    He hopes to compile his life stories, recipes, and anecdotes into a self‑published memoir that celebrates his Miami roots. He also dreams of traveling to Jamaica and Haiti to connect with his ancestral
    heritage and to bring back culinary influences that he can share with his community.
