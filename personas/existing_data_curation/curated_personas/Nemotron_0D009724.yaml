personas:
  professional: Alphonso Mitchell, a retired home‑repair specialist, channels decades of carpentry, electrical, and plumbing expertise into spontaneous yet practical community workshops, leveraging their
    curiosity‑driven mindset to turn jam‑session energy into hands‑on mentorship for neighborhood youth.
  sports: Alphonso Mitchell cheers for the Miami Heat and the Dolphins, plays weekly pick‑up basketball at a community court, joins the Over​town Community Softball league in the spring, and occasionally
    attends beach volleyball tournaments during the Caribbean Carnival celebrations.
  arts: Alphonso Mitchell, an avid vinyl collector, spins classic soul and reggae from Marvin Gaye, Aretha Franklin, and Bob Marley on a vintage turntable, often joining impromptu jam sessions with friends,
    and regularly attends the Overtown Jazz Festival and local theater productions featuring Jasmine Rochelle.
  travel: Alphonso Mitchell dreams of exploring Jamaica’s Blue Mountains and Haiti’s Jacmel art scene, while recalling past trips to New Orleans for Mardi Gras, preferring flexible itineraries and boutique
    guesthouses over rigid tours, and often packs his suitcase at the last minute, sometimes missing early flights.
  culinary: Alphonso Mitchell specializes in fusing Southern collard‑green stew with Caribbean jerk seasoning, crafting dishes like Jerk‑spiced chicken with sweet‑potato grits, and delights in chopping
    scotch bonnet peppers, plantains, and okra from his community garden for flavorful, community‑shared meals.
  core: Alphonso Mitchell blends hands‑on practicality with spontaneous curiosity, turning vintage soul grooves, garden harvests, and DIY repairs into vibrant community mentorship, all while juggling a
    love for unstructured plans and occasional forgetfulness.
background:
  cultural: Alphonso is a Black man raised in Miami’s historic African‑American neighborhoods, where his upbringing was shaped by a blend of Southern U.S. traditions and the vibrant Afro‑Caribbean culture
    of South Florida. He grew up attending church choirs, neighborhood block parties, and the annual Overtown Jazz Festival, and he regularly celebrates Caribbean holidays such as Carnival and Juneteenth.
    His cooking reflects a fusion of soul food, Cuban, Haitian, and Jamaican flavors, and he maintains strong ties to the local Black community through volunteer work, storytelling, and mentorship.
