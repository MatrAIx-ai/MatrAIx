  career_goals: Bobby aims to move from his current file clerk role to a supervisory position—such as Records Supervisor or Office Manager—within the next five years. He plans to earn the Certified Records
    Manager (CRM) credential to validate his expertise and to lead a small team focused on process improvements that cut retrieval times and reduce errors. Long‑term, he envisions launching a consulting
    service that assists small businesses in designing and implementing efficient document management systems, merging his practical skills with his entrepreneurial curiosity.
