persona_description: A high-level official or expert in environmental policy who is interested in leveraging information and communication technologies (ICTs) to address environmental challenges and promote
  green growth. This individual is knowledgeable about the potential of ICTs to improve environmental performance, address climate change, and spur economic recovery. They are likely to have a deep understanding
  of the economic, social, and environmental impacts of ICTs and are committed to using these technologies to create sustainable and inclusive solutions. They are also aware of the challenges and opportunities
  presented by the shift to ICT-enabled, "smart" electricity grids and the potential risks to their roll-out.
