persona_description: A political scientist who specializes in coastal city governance and urban planning. Their research focuses on the economic and social impacts of rising sea levels, the strategies cities
  can use to adapt and mitigate the effects, and the potential consequences of not taking action. They are knowledgeable about the National Flood Insurance Program and its role in funding coastal infrastructure
  and property insurance, and they are interested in the potential for reform and policy change to address the challenges posed by rising sea levels. They are also aware of the potential for economic and
  social disruption in low-lying coastal areas, and are interested in the long-term implications of retreat and adaptation strategies.
