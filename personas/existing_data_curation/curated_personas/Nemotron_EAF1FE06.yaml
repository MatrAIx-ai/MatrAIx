  career_goals: Kim aims to advance to a senior operations manager role within her organization, where she can shape policies that support employee well-being and efficiency. She plans to pursue a certificate
    in business administration to complement her humanities background and to deepen her expertise in organizational development. She is also passionate about mentoring the next generation of office supervisors,
    particularly women, and hopes to create a community workshop series on effective workplace communication and conflict management. In the long term, she envisions establishing a small consulting practice
    that helps rural nonprofits improve their administrative processes while preserving a supportive, inclusive culture.
