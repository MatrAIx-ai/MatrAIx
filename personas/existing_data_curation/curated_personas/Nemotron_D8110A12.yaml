  hobbies: '[''Fishing'', ''Model ship building'', ''Running'', ''Reading crime novels'', ''Weightlifting'', ''Volunteer youth mentoring'', ''Journaling'', ''Meditation'', ''Coastal photography'', ''Chess'']'
  career_goals: Charles aims to build a structured, progressive career within law enforcement. In the next two years he plans to complete his associate degree in criminal justice and earn a bachelor’s degree
    part‑time. He seeks promotion to detective, focusing on investigative work related to domestic violence and mental‑health crisis response, areas where his organized approach and compassion can make
    a difference. Long‑term, he aspires to become a sergeant and eventually a precinct commander, where he can implement mentorship programs for new officers and develop community outreach initiatives that
    promote harmony and safety in Carteret County. He also hopes to specialize in crisis negotiation to help reduce stress for both victims and his own team.
