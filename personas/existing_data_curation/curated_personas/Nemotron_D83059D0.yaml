personas:
  professional: Keith Mathis, a 22‑year‑old retail sales associate in New York City, blends strong customer‑service, upselling expertise, and a keen eye for visual storytelling to transform store displays
    into immersive art‑infused shopping experiences while they actively pursue an Assistant Store Manager role and a Certified Retail Management Professional credential.
  sports: Keith Mathis, a devoted fan of the New York Knicks and New York Giants, joins local pick‑up basketball games at the community center three evenings a week, hits the gym for strength training on
    weekends, and they follow the New York City Marathon updates to stay motivated.
  arts: Keith Mathis, a regular visitor to MoMA and the Jersey City Museum, draws creative fuel from abstract expressionist Joan Mitchell, street photographer Jamel Shabazz, and a soundtrack that blends
    Miles Davis, Kendrick Lamar, and Erykah Badu, integrating these influences into their sketches and visual merchandising concepts.
  travel: Keith Mathis’s travel style mixes spontaneous weekend trips to Bushwick’s murals and Queens’ food markets with planned overseas escapes to Berlin’s art districts, Lisbon’s historic neighborhoods,
    and New Orleans’ jazz clubs, favoring cultural immersion over luxury resorts while they navigate a modest student‑loan budget.
  culinary: Keith Mathis, an adventurous palate, loves crafting shakshuka with tomatoes, feta, and harissa at home, often orders spicy pork ramen with a soft‑boiled egg for lunch, and they never pass up
    a classic New York‑style pizza slice topped with buffalo mozzarella, fresh basil, and a drizzle of olive oil.
  core: Keith Mathis, a 22‑year‑old art‑obsessed retail associate, balances disciplined budgeting, a love for basketball and jazz, and a relentless curiosity that drives both their career ambitions and
    their weekend explorations of the city’s cultural corners.
background:
  cultural: Raised in a close‑knit African‑American family in Jersey City, Keith grew up with a strong sense of community, church involvement, and an appreciation for Black cultural traditions such as music,
    storytelling, and social activism. The multicultural fabric of Hudson County exposed him to a blend of Caribbean, Latinx, and urban cultures, influencing his palate for diverse foods and artistic expression.
    His upbringing emphasized education and perseverance, shaping his resilient yet compassionate outlook, and motivating him to give back to the community that supported his growth.
attributes:
  skills: '["Customer Service", "Sales & Upselling", "Inventory Management", "POS Systems (Lightspeed, Shopify)", "Visual Merchandising", "Data Analysis (Excel)", "Market Research", "Effective Communication",
