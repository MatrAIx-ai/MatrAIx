  hobbies: '["Visiting art galleries and museums", "Sketching and drawing", "Photography", "Listening to jazz, hip‑hop, and R&B", "Playing basketball", "Working out at the gym", "Exploring new cuisines",
    "Reading non‑fiction (psychology, technology, philosophy)", "Traveling to new cities", "Mentoring youth through local community programs"]'
  career_goals: Keith aims to advance from his current sales associate role into store management within the next two years, targeting a position as Assistant Store Manager and eventually Store Manager.
    He plans to earn a Certified Retail Management Professional credential and later pursue an MBA to broaden his strategic business knowledge. Long‑term, he hopes to launch his own boutique or e‑commerce
    brand that blends his love for contemporary art and fashion, creating a platform that highlights emerging Black artists and designers while fostering community mentorship programs.
