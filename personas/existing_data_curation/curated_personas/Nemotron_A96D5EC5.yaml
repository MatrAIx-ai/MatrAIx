personas:
  professional: Joi Mclean, a seasoned journeyman electrician with over four decades of experience, blends deep technical mastery of the National Electrical Code and renewable energy systems with a vivid
    imagination, designing lighting installations that turn ordinary spaces into interactive art while mentoring apprentices and planning a transition to part‑time teaching.
  sports: Joi Mclean, a member of the Chesterfield Senior Walking Club, enjoys low‑impact morning walks along the James River, plays occasional senior league pickleball, follows the Washington Commanders
    and the Washington Capitals with spirited enthusiasm, and uses a standing desk at home to stay active between projects.
  arts: Joi Mclean, an abstract painter who incorporates LED lighting into mixed‑media canvases, draws inspiration from Kandinsky and Rothko, captures urban textures in black‑and‑white photography reminiscent
    of Vivian Maier, plays piano renditions of Aretha Franklin’s gospel classics, and volunteers at the local museum to spotlight historic electricians, melding art and engineering in every creative pursuit.
  travel: Joi Mclean, who prefers meticulously planned road trips, has explored historic neighborhoods in Boston, the colonial streets of Williamsburg, and the cherry‑blossom festivals of Kyoto, dreams
    of a guided tour of the Scottish Highlands to study ancient stonework, and balances travel with a limited budget by staying with family and using senior discount programs.
  culinary: Joi Mclean, a confident home cook, loves preparing roasted collard greens with smoked ham hocks, experimenting with a beet‑and‑goat‑cheese salad drizzled with a honey‑lavender vinaigrette, and
    often seasons dishes with fresh rosemary and sage from their garden, while occasionally over‑indulging in sweet maple‑glazed biscuits during weekend brunches.
  core: Joi Mclean, a 63‑year‑old electrician‑artist, fuses inventive lighting design with community mentorship, worries about health and finances, but finds solace in paint, plants, and piano, even if
    they sometimes forget to water their succulents.
background:
  cultural: Joi’s cultural background is rooted in the African-American community of Richmond and Chesterfield County. Growing up during the post-civil-rights era, she was inspired by the legacy of Black
    tradespeople who broke barriers in skilled trades. Family traditions of church involvement, gospel music, and communal gatherings have shaped her values of cooperation and service. She cherishes Southern
    cuisine—especially dishes like collard greens, fried catfish, and sweet potato pie—and participates in local celebrations such as Juneteenth and the Richmond Folk Festival. Her identity as a Black woman
    electrician informs her advocacy for diversity in the trade, and she often mentors young Black women interested in STEM and vocational pathways.
attributes:
