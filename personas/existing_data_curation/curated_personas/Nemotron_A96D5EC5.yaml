  hobbies: '[''Abstract painting and mixed-media art'', ''Photography (urban and historic scenes)'', ''Reading speculative fiction and popular science'', ''Playing piano and singing in a gospel choir'',
    ''Gardening (native Virginia plants)'', ''Woodworking and crafting furniture with custom lighting'', ''Volunteering at the local historical museum'']'
  career_goals: Looking ahead, Joi aims to transition from full-time field work to a part-time role as a trainer and mentor at a local community college or trade school, where she can share her deep technical
    knowledge and foster the next generation of diverse electricians. She aspires to obtain a Master Electrician designation, lead community projects that bring affordable solar power to low-income neighborhoods
    in Chesterfield County, and author a practical guide on integrating creative lighting design with energy efficiency. In addition, she hopes to serve on advisory boards that promote inclusion and safety
    standards within the electrical trade.
