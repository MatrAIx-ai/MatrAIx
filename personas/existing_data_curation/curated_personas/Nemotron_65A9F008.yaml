  career_goals: Although still an infant, Roosevelt's emerging personality suggests future ambitions centered on creative leadership. He envisions himself as a multidisciplinary artist—combining visual
    arts, digital media, and performance—to explore abstract concepts and challenge conventional narratives. Driven by a competitive edge, he aims to earn recognition for innovative work that amplifies
    Black cultural stories within the Nantucket community, and eventually to mentor younger creators through workshops and community art projects.
