  career_goals: Dennis aims to become a senior engineer and technical lead within a company that blends cutting‑edge technology with artistic expression. Over the next five years, he plans to deepen his
    expertise in AI‑driven generative media, guide multidisciplinary project teams, and eventually launch a startup focused on immersive AR/VR experiences that empower creators. He also intends to pursue
    advanced certifications in cloud architecture and to contribute to open‑source projects that democratize creative coding tools.
