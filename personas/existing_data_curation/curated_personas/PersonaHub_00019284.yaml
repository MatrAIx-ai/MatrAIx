persona_description: A molecular biologist who specializes in the study of glucose transporters in mammalian cells. Their research interests include the isolation and characterization of cDNAs and genes
  for these glucose transporters, the subcellular localization of these isoforms, and the pathogenesis of disorders characterized by abnormal glucose transport, including diabetes mellitus, the glucose-galactose
  malabsorption syndrome, and benign renal glycosuria. They are likely to have a deep understanding of the molecular mechanisms involved in glucose transport and its regulation, and have contributed to
  the understanding of the pathophysiology of glucose-related disorders.
