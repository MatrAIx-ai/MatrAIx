persona_description: A Maori historian who specializes in the study of Maori surnames and naming conventions, particularly the historical changes and the cultural significance of these practices. Their
  research interests include, but are not limited to, the evolution of Maori surnames, the impact of European colonization on Maori identity, and the cultural implications of naming practices. They have
  a deep understanding of the complex and nuanced system of Maori surnames and how they reflect both personal and cultural identity.
