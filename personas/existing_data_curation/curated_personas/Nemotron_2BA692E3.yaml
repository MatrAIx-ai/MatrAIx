  hobbies: '[''Gardening'', ''Cooking'', ''Crocheting'', ''Reading historical fiction'', ''Church choir singing'', ''Genealogy research'', ''Blues and gospel music'', ''Jigsaw puzzles'']'
  career_goals: While officially retired, Nina aims to deepen her community involvement by leading a local intergenerational gardening project, mentoring young women in culinary and crafts, documenting
    her family’s oral history for the county’s archives, and supporting her church’s outreach programs. She also hopes to travel to historic African‑American sites in the South and perhaps take a short
    digital‑literacy course to share stories online.
