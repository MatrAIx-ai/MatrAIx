personas:
  professional: Nina Thibodeaux, a retired community organizer and seasoned home economist, leverages their horticultural expertise, soulful cooking, and event‑coordination savvy to lead an intergenerational
    gardening initiative while mentoring young women in culinary crafts, balancing meticulous planning with a willingness to improvise when the garden or kitchen throws a curveball.
  sports: Nina Thibodeaux enjoys low‑impact fitness routines such as walking the neighborhood trail and participating in the local senior softball league, cheerfully roots for the nearby university’s basketball
    team, the State Wildcats, and the regional professional baseball club, the River City Mariners, and they tend to incorporate stretching after gardening as part of their daily regimen.
  arts: Nina Thibodeaux delights in the soulful sounds of the Delta Blues Festival in nearby Baton Rouge, sings harmony in their church choir alongside fellow alto vocalist Marlene, reads historical fiction
    like 'The Winter of Our Discontent' and biographies of civil‑rights leaders such as Rosa Parks, and they often revisit the classic paintings of Jacob Lawrence for creative inspiration.
  travel: Nina Thibodeaux prefers purposeful travel, having visited the historic Selma National Historic Trail and the National Museum of Civil Rights History in Washington, D.C., while planning a future
    road trip to the civil‑rights museums of Alabama and Georgia, balancing their love for pilgrimage with a modest travel budget and the occasional need for childcare arrangements for their grandchildren.
  culinary: Nina Thibodeaux transforms classic soul‑food staples such as collard greens, smoked turkey, and cornbread by adding unexpected ingredients like pomegranate molasses or smoked chipotle, expertly
    cans their summer harvest of tomatoes and okra for winter stews, and they delight in cooking for church potlucks where dishes like sweet potato soufflé and spiced black‑eyed pea salad earn them the
    informal title of 'Kitchen Maestro'.
  core: Nina Thibodeaux is a garden‑loving, choir‑singing, puzzle‑solving retiree who blends curiosity with practicality, mentors their community, and occasionally forgets to water the begonias while dreaming
    up the next culinary twist.
background:
  cultural: Nina’s cultural background is rooted in the African‑American community of rural Mississippi. Growing up in Jackson County, she was shaped by the central role of the Baptist church, the oral
    storytelling tradition, and the cuisine of Southern soul food. Her family name, Thibodeaux, reflects French‑Creole ancestry that arrived in the Gulf Coast during the Great Migration, adding a layer
    of Creole culinary influence to her cooking. She carries forward the values of resilience, communal support, and respect for elders that define the local Black heritage, while also embracing contemporary
    expressions of Black culture through music, art, and community activism.
attributes:
  skills: '[''Southern cooking'', ''Seasonal food preservation'', ''Gardening and horticulture'', ''Event coordination'', ''Home maintenance and repairs'', ''Caregiving'', ''Household bookkeeping'', ''Sewing
