  hobbies: '[''Knitting'', ''Crochet'', ''Quilting'', ''Garden maintenance'', ''Reading historical fiction'', ''Listening to classic radio dramas'', ''Church Bible study'', ''Volunteering (senior center,
    church events)'', ''Family genealogy research'']'
  career_goals: Even at 93, Juanita's ambitions focus on staying independent, preserving her family’s legacy, and remaining a valued member of her community. She aims to complete a memoir that captures
    her life’s milestones and the histories of her ancestors, continue teaching knitting and quilting to grandchildren and neighborhood kids, and maintain her volunteer work at the local church and senior
    center. Maintaining health, engaging socially on her own terms, and ensuring her stories are passed on are her primary goals.
