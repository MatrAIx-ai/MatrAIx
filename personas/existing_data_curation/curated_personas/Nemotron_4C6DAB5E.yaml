personas:
  professional: Gabriela Manzanilla is a veteran project management professional with three decades of leading cross‑functional initiatives in education, non‑profit and community development, leveraging
    bilingual fluency, Agile and Waterfall expertise, and a methodical, competitive edge to mentor emerging managers and design culturally inclusive programs, while eyeing a Lean Six Sigma Black Belt to
    cement her process‑optimization credentials.
  sports: Gabriela Manzanilla enjoys solitary walks along the Potomac River and seasonal hikes on the Blue Ridge Trail, is a member of the Washington D.C. Hiking Club, follows the Washington Nationals for
    baseball, occasionally plays tennis on weekends at the local community center, and maintains a low‑impact fitness routine to manage joint health.
  arts: Gabriela Manzanilla frequents the Smithsonian American Art Museum, curates a modest collection of Central American folk art, participates in a book club reading works by Gabriel García Márquez and
    Isabel Allende, and finds inspiration in the music of Astor Piazzolla, all of which fuel her appreciation for diverse artistic expressions.
  travel: Gabriela Manzanilla prefers thoughtfully planned trips that blend cultural immersion with family visits, having explored Mexico City’s historic center and the colonial streets of Antigua Guatemala,
    while dreaming of a pilgrimage to Oaxaca’s mezcal distilleries and a weekend getaway to the Blue Ridge’s mountain lodges, balancing a modest travel budget with a love for authentic experiences.
  culinary: Gabriela Manzanilla delights in preparing traditional Central American dishes such as pupusas stuffed with quesillo and pork, and tamales wrapped in plantain leaves, using masa harina, fresh
    cilantro, and roasted chilies, while honing a moderate cooking skill that shines during neighborhood potlucks and family gatherings.
  core: Gabriela Manzanilla is a methodical, culturally curious project veteran who balances disciplined budgeting, diligent health monitoring, solitary nature walks, and a passion for folk art and traditional
    cooking, all while navigating a competitive drive and occasional skepticism.
background:
  cultural: Born in El Salvador, Gabriela immigrated to the United States in the early 1990s and settled in the Washington, D.C., metro area. She maintains Salvadoran customs such as celebrating Día de
    los Faroles, preparing pupusas for family gatherings, and observing Catholic holidays. Her bilingual upbringing reinforces values of community solidarity, respect for elders, and strong familial duty.
    Living in Loudoun County, she actively participates in the local Salvadoran diaspora network, promoting cultural exchange, supporting new immigrants, and integrating the region’s emphasis on civic engagement
    and outdoor recreation.
attributes:
  skills: '[''Strategic Planning'', ''Risk Management'', ''Budget Management'', ''Stakeholder Engagement'', ''Program Evaluation'', ''Bilingual Communication (Spanish/English)'', ''Agile Methodologies'',
    ''Waterfall Project Management'', ''Process Improvement'', ''Change Management'', ''Training Design and Facilitation'', ''Data Analysis'', ''Compliance Documentation'']'
  hobbies: '[''Visiting Art Museums'', ''Collecting Salvadoran Folk Art'', ''Reading Latin American Literature'', ''Book Club Participation'', ''Gardening (Native Orchids)'', ''Hiking and Nature Walks'',
    ''Cooking Traditional Salvadoran Cuisine'', ''Volunteer Spanish Language Instruction'', ''Exploring Genealogy'', ''Attending Small Classical Concerts'']'
  career_goals: Gabriela aims to transition into a senior advisory role where she can mentor emerging project managers and shape culturally inclusive education programs for the Salvadoran diaspora. She
    plans to obtain a Lean Six Sigma Black Belt certification to deepen her process‑optimization credentials, and to publish a practical guide on project management best practices for non‑profits. Ultimately,
    she envisions establishing a boutique consultancy that bridges U.S. and Salvadoran educational initiatives, while serving as a speaker at regional conferences on cross‑cultural project leadership.
