persona_description: A health-care provider who conducts community-based surveys to evaluate the prevalence of pruritic rash among residents of Crawford County. The provider uses a modified cluster-sampling
  method to select households for interview and collects demographic, rash, and environmental exposure data. The provider also collects household-specific data and health-care provider evaluation data to
  assess the effectiveness of treatment options for the rash.
