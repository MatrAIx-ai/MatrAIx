personas:
  professional: Angelo Leary, a 23‑year‑old automotive technology educator, leverages meticulous instructional design skills and a charismatic improv background to deliver hands‑on workshops that blend
    vintage engine tinkering with cutting‑edge online platforms, while driving competitive student performance metrics.
  sports: Angelo Leary, a regular participant in the Midtown Hoopsters pickup basketball league, roots for the Chicago Bulls, and follows the Detroit Pistons during the season, using weekly games to stay
    fit while balancing a love for classic car shows with a competitive edge on the court.
  arts: Angelo Leary, a standout performer in the City Improv Collective and co‑host of the ‘TechEd Talk’ podcast, draws creative inspiration from comedians like Tina Fey, enjoys listening to The Strokes,
    and frequently attends local theater productions to sharpen their storytelling chops.
  travel: Angelo Leary favors spontaneous weekend road trips to iconic car events such as the Woodward Dream Cruise in Michigan and the Pebble Beach Concours d'Elegance, planning routes with the help of
    Google Maps while balancing a student budget that limits longer overseas adventures.
  culinary: Angelo Leary, an avid grill master, loves crafting classic cheeseburgers with smoked cheddar, whipping up a side of loaded baked potatoes, and indulging in homemade espresso while occasionally
    succumbing to late‑night pizza slices during exam weeks.
  core: Angelo Leary blends a competitive drive with sociable charisma, turning vintage engine projects and improv comedy into a high‑energy, slightly stress‑prone lifestyle that never lets a budget or
    a bad night stop them.
background:
  cultural: Angelo grew up in Allen Park, a suburban community in Wayne County with a strong Irish‑American heritage. His family’s roots trace back to Irish immigrants who settled in Detroit’s industrial
    neighborhoods, and he was raised in a Catholic household that emphasized community service, hard work, and pride in one’s craft. The Midwest’s pragmatic outlook and the region’s automotive legacy have
    shaped his practical, methodical approach to both his profession and personal pursuits.
attributes:
  skills: '[''Public Speaking'', ''Lesson Planning'', ''Curriculum Development'', ''Instructional Technology (LMS, video editing)'', ''Classroom Management'', ''Student Mentorship'', ''Assessment Design'',
