  hobbies: '[''Improv Comedy'', ''Podcasting (Tech & Education)'', ''Pickup Basketball'', ''Attending Classic Car Shows'', ''Engine Restoration'', ''Journaling'', ''Meditation'', ''Mentoring High‑School
    Apprentices'']'
  career_goals: Angelo aims to complete a bachelor’s degree in Applied Technology within the next two years and subsequently pursue a master’s in Higher Education Administration. He strives to become a
    tenured faculty member and eventually serve as the Director of Curriculum for the automotive program at his community college, where he can shape statewide vocational training standards. He also hopes
    to earn recognition for innovative teaching practices, present at national conferences, and publish a guide on integrating hands‑on labs with online learning platforms.
