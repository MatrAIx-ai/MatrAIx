  hobbies: '[''Book club participation'', ''Community theater acting and hosting'', ''Gardening'', ''Cooking and meal planning'', ''Historical walking tours'', ''Attending folk festivals and concerts'',
    ''Volunteer work at art museum'', ''Brunch gatherings with friends'', ''Craft workshops'', ''Cincinnati Reds games'']'
  career_goals: Kari aims to transition her extensive volunteer experience into a part‑time role as a community arts coordinator for a local museum or cultural nonprofit in the Cincinnati area. She plans
    to complete a nonprofit management certificate within the next year, expand her grant‑writing portfolio, and eventually lead a regional arts outreach program that provides workshops for families and
    seniors. Long‑term, she envisions founding a community arts studio that offers affordable classes and showcases local artists, leveraging her organizational strengths and love for public engagement.
