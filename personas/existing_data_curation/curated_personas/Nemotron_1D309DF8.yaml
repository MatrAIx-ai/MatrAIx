  hobbies: '[''Reading'', ''Scale model building'', ''LEGO Technic building'', ''Hiking'', ''Nature photography'', ''Book club'', ''Board game nights'', ''Cooking'']'
  career_goals: Peter aims to translate his organizational strengths into a stable full‑time role as an administrative assistant or office coordinator within a mid‑size company, where he can support daily
    operations and contribute to smooth workflow. He intends to complete his bachelor’s degree in Business Administration within the next two years, using evening classes at a nearby community college.
    Long‑term, he aspires to become a certified project manager, leading small teams on community development initiatives. He also hopes to deepen his involvement in local non‑profits, eventually taking
    on a leadership role in the community garden committee.
