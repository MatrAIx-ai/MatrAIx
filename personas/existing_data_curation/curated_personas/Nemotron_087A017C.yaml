  hobbies: '[''Restoring classic trucks and cars'',''Fishing'',''Road trips to upstate New York'',''Woodworking'',''Watching baseball (NY Yankees)'',''Attending Brooklyn community festivals'',''Strength
    training'',''Playing chess'']'
  career_goals: Daniel aims to advance into a senior service manager role overseeing a large fleet of construction and municipal vehicles in New York City. He plans to obtain ASE Master Technician certification
    and a NATEF specialization in hydraulic systems to formalize his expertise. Long‑term, he envisions opening a modest, family‑run workshop that offers custom retrofitting and restoration services for
    heavy equipment, allowing him to blend his mechanical skill with entrepreneurial aspirations. He also seeks to mentor the next generation of technicians and secure a stable financial future for his
    wife and children, including retirement savings and possible consulting work later in life.
