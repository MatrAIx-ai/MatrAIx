    at Food Bank'', ''Line Dancing'']'
  career_goals: Mary aims to transition into a lead stocker or shift‑supervisor role within the next two years, leveraging her extensive experience to improve workflow efficiency and mentor younger staff.
    She plans to complete a short certification in supply‑chain fundamentals to reinforce her leadership credentials. As she approaches retirement, she also hopes to balance work with community involvement,
    possibly volunteering her logistical expertise at the local food pantry or senior center, while maintaining a steady, predictable schedule that supports her family’s financial stability.
