personas:
  professional: A budding visual designer, Hung Vo channels their love for manga and sandbox world‑building into digital illustrations, mastering free tools like Krita to create concept art that fuses Eastern
    motifs with Western pop culture; they thrive in spontaneous brainstorming sessions but often scramble to meet deadlines, balancing school assignments with freelance commissions and community art workshops.
  sports: An avid skateboarder, Hung Vo spends afternoons at the town park mastering ollies and kickflips, occasionally riding with the local Attica Youth Skaters crew; they root for the Buffalo Bills in
    football and the Buffalo Sabres in hockey, following each season’s schedule obsessively, yet they often skip organized sports practices in favor of solo skate sessions that fuel their spontaneous energy.
  arts: An eclectic art aficionado, Hung Vo sketches manga characters, creates lo‑fi visual loops set to beats from Lofi Girl, and listens to BTS, BLACKPINK, and indie acts like Tame Impala while studying
    the works of Hayao Miyazaki; they attend community art workshops where they experiment with mixed media, and their favorite inspiration comes from both traditional water‑color scrolls and modern Western
    graphic novels.
  travel: A wanderlust‑driven teen, Hung Vo has explored the bustling streets of a Southeast Asian metropolis during a family visit, captured sunrise at Niagara Falls, and taken a road trip to the Adirondacks
    for landscape photography; they prefer spontaneous, last‑minute planning, often hitching rides with friends or using budget rideshares, dreaming of future trips to Tokyo’s Akihabara district and the
    ancient town of Hoi An.
  culinary: A culinary explorer, Hung Vo enjoys prepping aromatic pho broth with star anise, fish sauce, and lemongrass alongside classic pepperoni pizza and ramen bowls; they have moderate cooking skill,
    comfortable following family recipes for banh mi sandwiches while also experimenting with DIY sushi rolls topped with avocado and sriracha, often balancing traditional flavors with Western comfort food
    cravings.
  core: Hung Vo is a restless 17‑year‑old visual storyteller who fuels their imagination with manga, skateboarding, and late‑night coding; they battle chronic procrastination and anxiety while dreaming
    of turning art into a career.
background:
  cultural: Hung is a second‑generation East Asian American; his parents emigrated from Vietnam before his birth. Growing up in Attica, New York, he balances a rural American lifestyle with his family's
    cultural traditions, such as celebrating Lunar New Year, speaking Vietnamese at home, and cooking traditional dishes. This bicultural upbringing gives him a blended perspective that influences his artistic
    sensibility, often merging Eastern motifs with Western pop culture. He navigates both the expectations of his community and the values of his heritage, shaping his identity and creative expression.
attributes:
  skills: '[''Digital illustration (Krita)'', ''Photo and video editing (mobile apps)'', "Basic Python programming", ''Scratch visual programming'', ''Bilingual communication (English/Vietnamese)'', ''Creative
    brainstorming and problem solving'', ''Social media content creation'']'
  hobbies: '[''Sketching and digital illustration'', ''Urban and nature photography'', ''Minecraft and creative video games'', ''Skateboarding'', ''Listening to music (lo‑fi, K‑pop, indie)'', ''Reading
    sci‑fi and fantasy novels'', ''Cooking Vietnamese dishes'', ''Attending community art workshops'']'
  career_goals: Hung aims to turn his passion for art and technology into a career as a visual designer or concept artist. He plans to enroll in a community college art program or secure an apprenticeship
    in graphic design, building a freelance portfolio that showcases his digital illustrations and mixed‑media projects. Ultimately, he hopes to work for an indie game studio or a local creative agency,
    using his art to convey stories that blend Eastern motifs with Western pop culture. Hung also wants to raise awareness about mental‑health challenges among his peers through art workshops and become
    a mentor for other at‑risk teenagers.
