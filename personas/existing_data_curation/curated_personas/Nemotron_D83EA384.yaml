  career_goals: Although still very young, Fernando often talks about wanting to become a firefighter or a teacher when he grows up, inspired by the orderly nature of fire stations and the idea of helping
    others. He also dreams of learning to read by the time he starts preschool, mastering numbers up to ten, and mastering riding a tricycle. His competitive streak shows in his desire to win the upcoming
    sandbox building contest at the local park.
