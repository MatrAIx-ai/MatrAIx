persona_description: A political leader who played a significant role in the Progressive party and served as the U.S. Senator from California, known for his efforts in breaking the political domination
  of the Southern Pacific RR and securing much reform legislation. He was a founder of the Progressive party and was Theodore Roosevelt's running mate on the unsuccessful Progressive ticket of 1912. Johnson
  also refused to support Charles E. Hughes, the Republican presidential candidate, and later became the bitter opponent of the Hoover administration.
