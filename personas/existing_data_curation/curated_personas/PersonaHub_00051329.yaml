persona_description: A person who is responsible for managing and coordinating disaster response efforts, ensuring that all necessary resources are available and organized to help communities affected by
  natural disasters. They are knowledgeable about federal, state, and local government agencies, information and referral centers, professional societies, voluntary associations, academic and research institutions,
  and regulatory bodies, and have experience in preparing for and responding to disasters. They are also fluent in communication with the deaf and hard of hearing community, and have a deep understanding
  of the needs and concerns of this population.
