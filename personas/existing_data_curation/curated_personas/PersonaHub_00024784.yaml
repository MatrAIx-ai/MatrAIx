persona_description: A paleoanthropologist and paleoecologist who specializes in the study of ancient polar bear populations and their interactions with brown bears and other animals in Alaska during the
  Last Glacial Maximum (LGM) period, focusing on the genetic and evolutionary aspects of these interactions. They are particularly interested in the possibility of hybridization between polar bears and
  brown bears in SE Alaska during the LGM, and the implications of this for our understanding of the history of polar bear populations and the evolution of the species.
