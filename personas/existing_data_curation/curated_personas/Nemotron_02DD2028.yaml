personas:
  professional: Megan Register is a casino surveillance officer and security guard who leverages their keen situational awareness, meticulous incident‑reporting skills, and growing criminal‑justice knowledge
    to monitor CCTV feeds, identify suspicious behavior, and mentor new staff, while balancing a practical, structured work style with a willingness to adapt to unexpected threats.
  sports: Megan Register stays active by hiking the trails around Lake Keystone, attending evening yoga classes at Zen Flow Studio, and cheering for the Oklahoma City Thunder and Dallas Cowboys, while participating
    in the local Keystone Trail Club that organizes seasonal group hikes and occasional community runs.
  arts: Megan Register immerses themselves in the arts through a voracious consumption of mystery and true‑crime novels by Agatha Christie and Gillian Flynn, regular trips to country music concerts featuring
    Luke Bryan and Carrie Underwood, and occasional visits to local theater productions that satisfy their curiosity for narrative intrigue.
  travel: Megan Register favors spontaneous road‑trip adventures, often planning last‑minute escapes to nearby gems like the Texas Hill Country and New Mexico’s high desert while dreaming of a future Yellowstone
    National Park expedition, balancing a modest travel budget with a love for both relaxation and outdoor exploration.
  culinary: Megan Register enjoys cooking comfort food at an intermediate level, regularly perfecting pulled pork and smoked brisket recipes that feature bourbon‑infused hickory glaze, chipotle‑spiced barbecue
    sauce, and homemade coleslaw, while also dabbling in quick weeknight meals when shifts run late.
  core: Megan Register is a detail‑oriented surveillance professional who channels their anxiety into disciplined hobbyist pursuits—hiking, yoga, DIY security gadgets, and experimental barbecue—while juggling
    spontaneous video‑game escapes and a penchant for over‑planning their future.
background:
  cultural: 'Megan grew up in a suburban community near Tulsa, Oklahoma, within a predominantly white, middle‑class environment that values hard work, family, and community involvement. Her upbringing was
    shaped by Midwestern cultural norms: regular church attendance at a non‑denominational Christian congregation, participation in school and community events like the State Fair and local high‑school
    football games, and a strong appreciation for Southern hospitality and barbecue cuisine. While she identifies with mainstream American culture of the region, she is open to diverse perspectives and
    values the inclusive ethos of her workplace and civic volunteer activities.'
attributes:
  skills: '["CCTV operation and video‑analytics", "Real‑time surveillance monitoring", "Incident reporting and documentation", "Conflict de‑escalation", "First aid/CPR", "Knowledge of gambling regulations",
    "Physical security patrol", "Risk assessment", "Basic self‑defense", "Customer service", "Stress‑coping techniques"]'
  hobbies: '["Hiking", "Yoga", "Reading mystery and true‑crime novels", "Cooking (especially barbecue and comfort food)", "Playing video games (puzzle and casino‑themed)", "Volunteering at an animal shelter",
    "DIY home‑security projects", "Listening to country music", "Attending the Oklahoma State Fair"]'
  career_goals: Megan aims to move from front‑line surveillance to a supervisory role within the next three years. She plans to complete her associate degree in criminal justice, earn the Certified Protection
    Officer (CPO) credential, and lead a shift team in a casino environment. Long‑term, she hopes to transition into corporate security management, integrating physical security with emerging cyber‑security
    technologies. Throughout her career progression, she seeks a stable schedule that supports her marriage and eventual family plans, while continuing to develop skills that allow her to handle high‑stress
    situations with confidence.
