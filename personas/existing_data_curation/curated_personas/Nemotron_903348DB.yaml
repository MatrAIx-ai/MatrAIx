personas:
  professional: Travis Van is a budding architect in the making, channeling a love for routine and order into meticulous LEGO constructions, displaying early spatial reasoning while often shuffling play
    plans at the last minute and becoming anxious when familiar structures are altered.
  sports: Travis Van plays T‑ball with the Little Lions club, watches the Chicago Cubs on TV with wide‑eyed fascination, and prefers the comfort of a small batting lineup over the roar of a big stadium
    crowd.
  arts: Travis Van spends afternoons humming the tunes of The Wiggles and Baby Shark by Pinkfong, drawing colorful crayon scenes of Moana’s island adventures, and they cherish re‑watching Sesame Street
    episodes featuring Elmo as a source of quiet delight.
  travel: Travis Van has explored Disneyland in Anaheim and taken a family road trip to the Grand Canyon, preferring trips that follow a predictable schedule with familiar faces, yet they dream of building
    sandcastles on Florida’s Gulf Coast during a future vacation.
  culinary: Travis Van adores creamy mac and cheese, crunchy chicken nuggets, and sweet strawberry slices, can spread peanut butter on toast unaided, yet they stubbornly refuse broccoli unless it’s cut
    into dinosaur shapes, finding comfort in the familiar taste of cheese pizza.
  core: Travis Van is a routine‑loving, worrier four‑year‑old who finds safety in orderly play, familiar faces, and predictable routines, while their occasional anxious bursts make them both endearing and
    occasionally challenging.
background:
  cultural: Travis was born and raised in Arnold, Missouri, a suburban community in Jefferson County with a predominantly white, Midwestern cultural setting. His family follows a modest, community‑oriented
    lifestyle, celebrating traditional American holidays and participating in local events such as county fairs and library story hours. The environment emphasizes practical skills, personal responsibility,
    and a close‑knit neighborhood network, which shapes his preference for routine, familiarity, and small‑group interactions.
