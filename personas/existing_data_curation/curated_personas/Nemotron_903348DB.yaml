  hobbies: '[''playing with wooden train sets'', ''building Lego bricks'', ''coloring'', ''reading picture books'', ''watching educational cartoons'', ''visiting the park with familiar peers'']'
  career_goals: At his age, Travis often talks about wanting to be a "helper" — he imagines being a firefighter, a police officer, or a builder. He is drawn to roles that involve hands‑on work and clear,
    practical outcomes. He enjoys watching his dad fix things around the house and says he would like to "fix things" when he grows up. His current ambition is to become a mechanic or a builder, reflecting
    his love for building toys and fixing broken objects, though his ideas are fluid and subject to change.
