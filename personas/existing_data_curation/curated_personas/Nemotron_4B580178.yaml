  hobbies: '[''Visiting Art Galleries'', ''Amateur Photography (Coastal Landscapes)'', ''Birdwatching'', ''Gardening (Native Plants)'', ''Creative Writing (Poetry)'', ''Reading Science and Art Books'',
    ''Puzzle Solving (Crosswords, Jigsaw)'', ''DIY Home Projects'', ''Cooking (Exploring Global Cuisines)'', ''Volunteer at Local Museum (Art Exhibits)'', ''Stargazing'', ''Collecting Vintage Postcards'']'
  career_goals: Mary aims to channel her scientific background and artistic curiosity into community‑focused projects that respect her need for flexibility and low pressure. She plans to volunteer as a
    science educator and exhibit coordinator at the Mattapoisett Historical Museum, develop a citizen‑science marine‑water quality monitoring program, and offer occasional consulting for local environmental
    groups using GIS tools. She also hopes to complete an online certificate in digital illustration to create personal art projects, and to write a memoir that weaves together her experiences in research,
    art, and New England coastal life. Her overarching ambition is to leave a lasting, positive imprint on her community while maintaining a balanced, self‑caring lifestyle.
