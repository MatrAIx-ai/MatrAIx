  hobbies: '[''Attending art exhibitions'', ''Visiting museums'', ''Painting classes'', ''Reading science‑fiction and popular‑science'', ''Traveling to historic and cultural destinations'', ''Playing bridge'',
    ''Senior tennis'', ''Gardening native Floridian plants'', ''Woodworking projects'', ''Volunteering for STEM outreach and cultural events'']'
  career_goals: Although retired from full‑time work, John aims to stay intellectually active by mentoring young engineers through local STEM outreach programs, serving on the board of a regional art museum,
    and completing a memoir that explores the intersection of technology and creativity. He aspires to lead occasional workshops on DIY electronics for seniors, provide occasional consulting advice to start‑ups,
    and travel to world‑renowned art festivals, all while maintaining a balanced lifestyle that manages his worries through regular mindfulness practice and social engagement.
