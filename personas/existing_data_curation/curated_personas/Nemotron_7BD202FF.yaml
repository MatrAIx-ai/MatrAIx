  career_goals: Richard aims to transition from hands‑on driving to a supervisory role in logistics. Over the next three years he plans to obtain a professional driver’s license (CDL) for larger tractor‑trailer
    rigs and complete a certificate in Supply Chain Management at a local community college. His long‑term ambition is to become a fleet manager for a regional distribution company, where he can apply his
    practical driving experience to optimize route efficiency, coach new drivers, and improve safety standards. He also hopes to eventually launch his own small‑scale delivery service that focuses on reliable,
    community‑oriented shipments across the San Juan metropolitan area.
