persona_description: A researcher and scientist who specializes in the study of antifungal bioactivity of medicinal plants used in the treatment of fungal infections in the Lake Victoria Basin, Kenya. She/He
  is likely to be interested in exploring the potential of these plants as alternatives to commonly used antifungal drugs. The individual is knowledgeable about the pharmacological properties of the plants,
  their chemical composition, and their antifungal activity. They would be interested in the mechanisms of action of the active compounds found in the plants and how they interact with the fungal cells.
  The researcher would be able to identify the compounds responsible for the antifungal activity using methods such as silica gel Thin Layer Chromatography (TLC) and appropriate spraying agents.
