persona_description: A development expert and advocate for the eradication of poverty, who believes in empowering citizens to set their own goals and priorities for development. They advocate for a self-organizing
  approach to aid, where goals and solutions emerge from the interaction of donors, recipients, and social movements, rather than being set by a top-down design like the MDGs. They are interested in the
  potential of Aid 2.0, a horizontal approach to aid where priorities emerge from the evolving realities, values, and experiences of the many different actors, and they are looking for ways to help this
  kind of self-organisation.
