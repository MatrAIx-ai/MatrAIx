persona_description: A senior history major who is passionate about historical research, writing, and editing methods. This person is dedicated to mastering these skills and displaying their work for the
  public. They are highly organized and detail-oriented, as evidenced by their experience compiling an extensive bibliography of sources and their ability to manage and organize a class archive. This person
  has a strong interest in the history of Organ Pipe Cactus National Monument and is eager to learn more about the park's landscape, history, and surrounding areas and peoples. They are also interested
  in conducting original archival research and have experience with the National Archives and the National Park Service.
