  hobbies: '["Vegetable gardening", "Woodworking and furniture repair", "Genealogical research", "Reading historical nonfiction", "Reading classic mystery novels", "Crossword puzzles", "Quilting", "Birdwatching",
    "Journaling", "Nature walks"]'
  career_goals: In her post-retirement years, Kimberli seeks to translate her organized, detail-oriented mindset into community impact. She plans to volunteer as a financial-literacy mentor at Evans' library,
    offering workshops on budgeting and simple tax filing for seniors. She also intends to compile her genealogical findings into a family history memoir for future generations. Additionally, she aspires
    to launch a modest community garden, coordinating volunteers and managing resources to promote sustainable, locally grown produce, thereby leaving a tangible, lasting legacy.
