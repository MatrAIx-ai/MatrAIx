  hobbies: '[''Exploring food markets and street stalls'', ''Urban rooftop herb gardening'', ''Reading culinary books and watching food documentaries'', ''Practicing Tai Chi'', ''Volunteering at community
    cooking workshops'', ''Chinese calligraphy'', ''Running short distance races (5K) for fitness'']'
  career_goals: Yun aims to move from line-cook to sous chef within the next two years, leveraging his organizational strengths to oversee broader kitchen operations. He aspires to open a modest, family-oriented
    restaurant in Flushing that showcases a thoughtful blend of traditional East Asian dishes and contemporary American flavors, reflecting his balance of curiosity and practicality. Over time, he hopes
    to author a cookbook that highlights seasonal ingredients and efficient cooking methods, and to mentor aspiring cooks from his community, fostering harmony and skill development.
