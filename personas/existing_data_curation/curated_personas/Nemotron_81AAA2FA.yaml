personas:
  professional: Yun Zheng is a meticulous line cook in a bustling Flushing kitchen, leveraging deep expertise in Cantonese and Sichuan techniques alongside classic Western operations to design systematic
    menus, enforce precise ingredient sourcing, and mentor junior staff with a methodical, curiosity‑driven approach.
  sports: Yun Zheng practices Tai Chi three mornings a week in Flushing’s Kissena Park, occasionally joins a community softball league, and avidly follows the New York Knicks and the New York Islanders,
    cheering them in local sports bars after shifts.
  arts: Yun Zheng indulges in traditional calligraphy on rainy evenings, enjoys Chef’s Table documentaries, attends live performances by the Queens Symphony, and finds inspiration in musicians like Yo‑Yo Ma
    and Ryuichi Sakamoto.
  travel: Yun Zheng’s travel itinerary includes culinary pilgrimages to Kyoto’s Nishiki Market, a weekend farm stay in Tuscany’s Chianti region, and annual visits to New Orleans for Cajun flavors, all planned
    with detailed spreadsheets to balance budget and family time.
  culinary: Yun Zheng’s cooking repertoire blends fragrant Sichuan peppered chicken with modern plating of herb‑infused dumplings, incorporates ingredients such as bok choy, shiitake mushrooms, cilantro,
    and sesame oil, and regularly experiments with fusion dishes that pair braised pork belly with a citrus‑yuzu glaze, reflecting a balance of tradition and innovation.
  core: Yun Zheng is a curiosity‑driven yet methodical culinary professional who balances disciplined budgeting, health mindfulness through Tai Chi, and an ever‑evolving palate, all while nurturing community
    ties and dreaming of a modest family restaurant.
background:
  cultural: Yun was raised in a Chinese-American household in Flushing, Queens, where Mandarin (and Cantonese) was spoken alongside English. His family observes traditional customs such as celebrating Lunar
    New Year, preparing holiday meals, and valuing communal harmony. Growing up amid a vibrant immigrant community, Yun internalized a blend of East Asian culinary heritage and the multicultural influences
    of New York City. He respects his ancestors’ cooking traditions while embracing the diversity of flavors around him, and actively participates in local cultural festivals, bridging his personal identity
    with his professional craft.
attributes:
  skills: '[''Cantonese and Sichuan cooking techniques'', ''Western culinary fundamentals'', ''Menu planning and cost control'', ''Food safety and sanitation compliance'', ''Inventory management and waste
