personas:
  professional: Angel Hernandez is a bilingual administrative coordinator at a local nonprofit, leveraging their associate’s degree in Business Administration, meticulous record‑keeping, and calm, resilient
    demeanor to orchestrate community programs and mediate multicultural team dynamics with precision.
  sports: Angel Hernandez enjoys weekly walks with the Peachtree Corners Senior Strollers club, follows the Atlanta Falcons, Hawks, and United with fervor, and occasionally joins a local salsa‑dance fitness
    class that keeps them moving during the summer heat.
  arts: Angel Hernandez finds inspiration in the vibrant rhythms of Celia Cruz, the lyrical storytelling of Marc Anthony, and the visual boldness of Frida Kahlo, often attending community theater productions
    of “West Side Story” and curating a collection of hand‑painted tiles for their kitchen.
  travel: Angel Hernandez prefers a blend of purposeful road trips to nearby Asheville for craft fairs, nostalgic visits to the family’s seaside hometown abroad, and cultural pilgrimages such as the historic
    basilica in Antigua, planning each journey around a modest budget and school‑year volunteer commitments.
  culinary: Angel Hernandez excels at preparing authentic pupusas stuffed with loroco and cheese, slow‑cooked mariscada featuring shrimp and fish, and sweet tres leches cake, balancing a home‑cooked skill
    level of seasoned chef with a habit of over‑seasoning dishes to please a large circle of friends.
  core: Angel Hernandez merges an affection for orderly schedules with a love for spontaneous community feasts, never missing a Sunday mass while secretly hoarding extra pens for the next event.
background:
  cultural: Angel’s Salvadoran heritage is a central thread in her identity, reflected in her fluency in Spanish, Catholic traditions, and strong family‑oriented values even as she resides in Peachtree
    Corners. She maintains close ties with relatives in El Salvador, regularly sending remittances and celebrating holidays such as Día de la Independencia with community potlucks and traditional music.
    The Salvadoran emphasis on collective well‑being influences her cooperative approach to group activities and her commitment to community service. While embracing American cultural norms, she also preserves
    culinary customs, frequently preparing pupusas, tamales, and mariscada for friends and neighbors. Her bicultural experience enriches her perspective, enabling her to bridge cultural gaps and advocate
    for immigrant families in the Gwinnett County area.
attributes:
  skills: '["Bilingual Spanish-English communication", "Administrative office management", "Event planning and coordination", "Volunteer supervision", "Conflict mediation", "Time management and scheduling",
