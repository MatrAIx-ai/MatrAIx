  hobbies: '["Cooking Salvadoran cuisine", "Salsa and cumbia dancing", "Walking club in local parks", "Community gardening", "Spanish tutoring for children", "Attending cultural festivals", "Reading contemporary
    fiction", "Yoga and meditation"]'
  career_goals: Angel seeks a stable, part‑time role that leverages her bilingual and organizational strengths, such as an administrative assistant or program coordinator within a local non‑profit serving
    the Salvadoran and broader immigrant community. She aims to complete a bachelor’s degree in Social Work or Public Administration within the next three years to broaden her impact in community development.
    Long‑term, she envisions launching a small home‑based catering venture featuring authentic Salvadoran dishes, combining her culinary passion with her entrepreneurial drive. In all pursuits, she values
    roles that offer clear structure, predictable routines, and opportunities to foster harmony among diverse groups.
