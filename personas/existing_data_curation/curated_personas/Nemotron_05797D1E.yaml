personas:
  professional: Patrick Thompson, a 36-year-old production technician renowned for advanced welding, CNC machining, and Six Sigma problem-solving, leads their crew with meticulous documentation, data-driven
    efficiency gains, and a competitive edge that fuels their ambition to become shift supervisor and eventually plant manager.
  sports: Patrick Thompson, a devoted Orlando Magic fan who never misses a home game, spends Sundays fishing at Lake Louisa, hikes the Ocala National Forest trails for cardio, and follows the Florida Gators
    football season, while they maintain a disciplined workout routine that includes occasional weightlifting at the garage.
  arts: Patrick Thompson, a self-taught metal artist who showcases their custom car restorations at local shows, finds inspiration in the sleek lines of classic industrial designers like Raymond Loewy,
    unwinds with classic rock icons such as AC/DC and Led Zeppelin, and dedicates evenings to sketching blueprints while listening to John Carpenter film scores.
  travel: Patrick Thompson plans their trips with the same precision as their CNC programs, favoring weekend road trips to the Florida Keys for fresh seafood, annual pilgrimages to Detroit’s Woodward Dream
    Cruise, and a recent four-day excursion to Munich to attend the International Motor Expo, blending their love of automotive culture with a penchant for tightly scheduled itineraries.
  culinary: Patrick Thompson, a competent grillmaster, relishes searing a perfectly charred steak, whipping up fresh fish tacos with catch-of-the-day catfish, savoring a side of homemade coleslaw, and pairing
    their meals with locally brewed IPAs, while occasionally attempting a smoky brisket that tends to be overly seasoned when their competitive streak kicks in.
  core: Patrick Thompson balances a schedule-obsessed, methodical professional life with a garage-filled hobbyist’s soul, obsessively cataloguing every car part like a spreadsheet, never missing an Orlando
    Magic game, and often trading sleep for late-night Factorio sessions that fuel their competitive fire.
background:
  cultural: Patrick grew up in a middle‑class, predominantly white suburb of Orlando, Florida. His family traces its roots to Irish and German immigrants, and he was raised with a blend of Protestant (Baptist)
    values and a strong emphasis on self‑reliance, punctuality, and community service. He celebrates traditional American holidays—Thanksgiving, Independence Day—and embraces cultural customs such as St.
    Patrick’s Day gatherings with extended family. While living in a diverse Florida city has broadened his cultural awareness, his personal identity remains anchored in mainstream American work‑ethic culture,
    balanced by a practical, competitive spirit inherited from his heritage.
attributes:
  skills: '["MIG/TIG welding", "CNC machine operation", "Blueprint interpretation", "Metal fabrication", "Plastic injection molding", "Composite material handling", "Quality inspection", "Lean manufacturing",
