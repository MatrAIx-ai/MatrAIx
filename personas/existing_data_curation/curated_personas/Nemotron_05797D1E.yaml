    leadership"]'
  hobbies: '["Classic car restoration", "Scale model building", "DIY home improvement", "Woodworking", "Fishing", "Orlando Magic basketball games", "Strategy video gaming (Factorio)", "Reading technical
    magazines", "Hiking", "Habitat for Humanity volunteering", "Local car shows"]'
  career_goals: Patrick aims to move from a production technician role to a shift supervisor within the next three years, and eventually to plant manager. He plans to earn a Six Sigma Green Belt and a Certified
    Welding Engineer credential, and to spearhead the integration of robotic cell automation and IoT monitoring at his current facility. In the long term, he hopes to launch a boutique custom metal and
    plastic fabrication shop that serves local artisans and small manufacturers, leveraging his curiosity for new materials and his practical, lean‑process mindset while competing for industry awards for
    efficiency and innovation.
