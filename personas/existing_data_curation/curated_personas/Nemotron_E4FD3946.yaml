  career_goals: Although retired from formal employment, Kiet is driven by legacy‑oriented ambitions. She aspires to author a memoir that weaves together personal history, artistic reflections, and cultural
    narratives, preserving her family’s story for future generations. She aims to curate a community art exhibit in San Jose that showcases collaborative works of senior artists and local youth, celebrating
    Southeast Asian aesthetics. Additionally, Kiet wishes to develop a small mentorship program at the senior center, teaching digital sketching and storytelling techniques to older adults who are eager
    to explore new creative outlets.
