personas:
  professional: Maria Guirado is a seasoned registered nurse who blends acute care expertise—IV therapy, wound management, BLS/ACLS certification—and bilingual documentation skills with their organized,
    detail‑oriented nature, channeling their curiosity into art‑based patient education tools while consistently stepping up to lead team briefings and quality‑improvement audits.
  sports: Maria Guirado fuels their competitive spirit by training for local 5K races with the San Antonio Runners Club, enjoys weekend hikes in the Texas Hill Country, participates in a community salsa
    dance group for cardio, and follows the San Antonio Spurs and Texas Rangers with the same enthusiasm they bring to their nursing shift.
  arts: Maria Guirado channels their love of vibrant folk‑inspired acrylics into weekly art classes, draws creative inspiration from the bold colors of Vincent van Gogh, the storytelling of Lin‑Manuel Miranda,
    and the experimental edge of Banksy, and regularly attends community theater productions starring local talents such as Sarah Ramos.
  travel: Maria Guirado plans trips with a mix of structured itineraries and spontaneous detours, having trekked the Hill Country’s Enchanted Rock, explored the historic San Antonio River Walk, and dreamed
    of visiting Kyoto’s temples and Barcelona’s mosaics to study how regional art influences wellness practices.
  culinary: Maria Guirado combines a strong home‑cooking skill set with a flair for fusion, mastering traditional family recipes like slow‑cooked pork shoulder, reimagining them with an Asian‑style glaze,
    expertly using ingredients such as smoked chili peppers, fresh cilantro, and miso, and often hosts dinner parties where they pair dishes with locally brewed beers.
  core: Maria Guirado is a driven, art‑loving nurse who balances a meticulous, competitive work ethic with a lively social calendar, often turning their worries into creative projects while occasionally
    over‑indulging in late‑night cooking marathons.
background:
  cultural: Maria grew up in a bilingual Mexican‑American household in Texas, where Spanish and English were spoken interchangeably. Her family places a high value on close‑knit relationships, religious
    traditions, and cultural celebrations such as Día de los Muertos and quinceañeras. These customs have shaped her worldview, fostering a deep respect for family‑centered decision‑making and community
    solidarity. Maria’s Mexican heritage influences her culinary tastes, love for vibrant art, and rhythmic music preferences, while her Texan upbringing adds a pragmatic, independent spirit. This blend
    of cultures informs her empathetic approach to patient care, allowing her to bridge traditional health beliefs with modern clinical practice.
