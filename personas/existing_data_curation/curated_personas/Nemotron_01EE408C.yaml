  career_goals: Maria aims to advance her nursing career by obtaining a Bachelor of Science in Nursing (BSN) within the next two years, followed by a Master’s degree in Nursing Education or Community Health.
    She aspires to become a charge nurse and eventually a nurse manager, where she can champion quality‑improvement projects and mentor junior staff. Driven by her competitive spirit, she seeks certification
    as a Certified Nurse Educator (CNE) and plans to develop a community outreach program that integrates art therapy and culturally tailored health education for the Mexican‑American population in Bexar
    County. Her long‑term ambition is to open a low‑cost wellness center that offers preventive care, nutrition counseling, and creative workshops.
