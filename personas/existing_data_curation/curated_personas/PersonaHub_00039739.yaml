persona_description: A psychology enthusiast who is interested in the differences between emotions and moods. This person is curious about the scientific explanations for emotions and how they are perceived
  and experienced by the brain. They are drawn to the cognitive appraisal theory and William James's arguments about emotions as perceptions of changes in the body. They are eager to learn more about the
  six universal emotions identified by Paul Ekman and to understand the difference between moods and emotions.
