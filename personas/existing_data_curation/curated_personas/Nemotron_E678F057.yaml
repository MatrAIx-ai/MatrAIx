  hobbies: '[''Salsa and folkloric dancing'', ''Playing soccer'', ''Sketching and manga illustration'', ''Watching DIY cooking videos on YouTube'', ''Listening to regional Mexican and pop music'', ''Playing
    mobile games with friends'', ''Volunteering as a reading buddy at the local library'', ''Cooking and experimenting with family recipes'']'
  career_goals: Brenda hopes to earn a scholarship that will let her attend a university where she can study bilingual education. She dreams of becoming an elementary school teacher who can mentor other
    Mexican‑American children, helping them navigate both languages and cultures. In the short term, she aims to improve her academic record, join the school's leadership council, and volunteer as a reading
    buddy at the local library. She also wants to develop a community garden project in Riverside to promote sustainable living and provide fresh produce for her neighborhood. Over the next decade, she
    envisions balancing her career with continued involvement in cultural events, possibly organizing a youth dance troupe that showcases both contemporary and traditional Mexican dance.
