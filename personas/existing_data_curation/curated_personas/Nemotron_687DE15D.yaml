  career_goals: Short-term, Amy aims to earn a PMP certification and lead a high-impact process-optimization project within her current firm. Over the next five years she hopes to advance to a senior analyst
    role, then transition into a management consulting position where she can shape strategic initiatives for multiple organizations. She also plans to enroll in a part-time MBA program to broaden her business
    acumen and eventually target a director-level role in operations or strategy, with an emphasis on measurable efficiency gains and sustainable growth.
