persona_description: A scientist who specializes in water quality monitoring, specifically focusing on the effects of stress factors on smallmouth bass in the Susquehanna River and major tributaries of
  Pennsylvania. This scientist has expertise in continuous monitoring of dissolved oxygen, water temperature, pH, specific conductance, nutrient concentrations, and the national criterion for dissolved
  oxygen. They have collaborated with the U.S. Geological Survey, Pennsylvania Fish and Boat Commission, Pennsylvania Department of Environmental Protection, and PPL Corporation to monitor water quality
  and identify the critical period when dissolved oxygen concentrations are significantly lower than the national criterion for smallmouth bass survival and development. The scientist is interested in understanding
  the effects of dissolved oxygen and environmental conditions on smallmouth bass mortality and how elevated temperature magnifies these effects in the Susquehanna River at Harrisburg compared to other
  tributaries.
