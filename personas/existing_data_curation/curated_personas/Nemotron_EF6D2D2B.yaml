  hobbies: '["Philosophical reading", "Abstract painting", "Digital photography", "Urban gardening", "Mexican folk music collection", "Experimental cooking", "Art gallery visits", "Vintage radio restoration"]'
  career_goals: Although currently not employed, Alvaro aims to formalize his self‑taught skills and transition them into a community‑focused role. He plans to obtain a GED and pursue a certificate in design
    or woodworking at a local community college. His ambition is to launch a modest home‑based studio that produces custom furniture and artwork, selling pieces at local markets and online. He also wishes
    to mentor at‑risk youth in his neighborhood by teaching practical crafts, offering workshops on basic carpentry and digital art. Additionally, Alvaro hopes to compile his reflections on art, culture,
    and personal resilience into a memoir or series of essays that could be shared through a self‑published blog or local literary events. Competing in regional woodworking contests is a personal benchmark
    he uses to gauge progress and stay motivated.
