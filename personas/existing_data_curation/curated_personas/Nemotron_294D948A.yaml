  hobbies: '[''Gardening (vegetables & herbs)'', ''Hiking in Sonoma County trails'', ''Wine tasting and viticulture study'', ''Reading historical non‑fiction and tech magazines'', ''Woodworking (furniture
    and small projects)'', ''Volunteering at community garden'', ''Participating in local farmers market'', ''Bicycle riding'', ''DIY home improvement'']'
  career_goals: Looking ahead, Daniel hopes to move into a supervisory or management position within a small grocery or specialty food store in Sonoma County, where he can apply his extensive frontline
    experience to staff leadership and operational oversight. He is also interested in part‑time work in a local winery’s tasting room, using his product knowledge and curiosity about viticulture to deepen
    his expertise. To support these goals, he plans to complete a short‑term retail management certification through a community college and earn a WSET Level 1 certification in wine. Ultimately, he envisions
    a modest side business—such as a weekend pop‑up stall selling home‑grown herbs and handcrafted wooden kitchen tools—that blends his retail skills with his horticultural and woodworking passions, providing
    both supplemental income and personal fulfillment before retirement.
