persona_description: A person who is interested in philosophy, particularly in the concept of non-competition and its implications for human behavior and existence. They are a 6th Dan Aikido instructor
  and member of various Aikido organizations, with expertise in the arts and sciences of aikido and iaido. They are also an author, artist, and historian of ideas, and have written extensively on aikido,
  aikibatto, qi, and Tao Te Ching. They have a unique perspective on the nature of human competition and non-competition, and their work is influenced by their study of group theory and subgroups, isomorphisms,
  and the structure of finite groups.
