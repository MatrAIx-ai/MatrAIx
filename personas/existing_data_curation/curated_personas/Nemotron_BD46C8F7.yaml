  career_goals: John aims to become a master electrician and earn additional certifications in renewable energy technologies, particularly solar PV and energy‑efficient lighting. Over the next five years
    he plans to enroll in an associate program in electrical engineering technology to deepen his technical knowledge. His long‑term ambition is to launch his own contracting business that specializes in
    green building projects and artistic lighting installations for homes and community spaces in Detroit. He also hopes to mentor apprentices, take on a leadership role within his local union, and contribute
    to neighborhood revitalization efforts by providing affordable, sustainable electrical solutions.
