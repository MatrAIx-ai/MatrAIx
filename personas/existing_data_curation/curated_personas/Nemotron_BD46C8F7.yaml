personas:
  professional: John Thomas, a 28‑year‑old journeyman electrician who blends precise code‑compliant wiring expertise with an artistic eye for illumination, leverages his curiosity and assertive collaboration
    to lead smart‑home and solar projects while mentoring apprentices toward master certification.
  sports: John Thomas, a 28‑year‑old basketball enthusiast, spends Friday evenings joining pickup games at the local YMCA, roots for the Detroit Pistons and Detroit Lions, and balances his fitness routine
    with runs along the RiverWalk, though he admits to skipping weekend yoga sessions when a new lighting project looms.
  arts: John Thomas, a 28‑year‑old night‑time photographer and hobbyist musician, roams Detroit’s alleyways to capture murals inspired by Shepard Fairey and Banksy, strums acoustic renditions of Miles Davis’
    So What while layering J Dilla‑style beats on his laptop, and cites the improvisational spirit of The Bad Plus as a guiding influence on his DIY LED installations.
  travel: John Thomas, a 28‑year‑old electrician with a penchant for immersive urban exploration, plans weekend road trips to the Great Lakes shoreline and annually saves for a tech‑focused pilgrimage to
    Tokyo’s Akihabara district, preferring self‑guided itineraries that blend street‑art tours in Berlin with off‑grid solar camping in the Upper Peninsula, though budget constraints sometimes keep the
    overseas adventure on hold.
  culinary: John Thomas, a 28‑year‑old home chef, loves crafting Southern‑style comfort meals such as smoked chicken thighs with hot‑cooked collard greens and creamy shrimp and grits, experimenting with
    cane‑sugar‑glazed okra and a dash of smoked paprika, yet routinely orders take‑out pizza after late‑night shoots, citing a lack of patience for cleaning up as a recurring kitchen quirk.
  core: John Thomas, a 28‑year‑old electrician‑artist hybrid, balances meticulous code compliance with spontaneous night‑time photo walks, habitually hoarding spare LED strips despite limited storage, and
    channels his curiosity into every project, even when it means juggling a guitar solo and a circuit schematic in the same evening.
background:
  cultural: John is an African‑American who grew up in a tight‑knit Black community in Detroit’s Wayne County. His upbringing was shaped by the city’s legacy of Motown music, the auto‑industry workforce,
    and a strong tradition of community solidarity. Family gatherings often featured gospel choirs, soul food, and stories of resilience, instilling values of hard work, respect, and mutual support. He
    participates in cultural celebrations such as Juneteenth parades, Black History Month events, and local block parties that showcase the city’s vibrant murals and hip‑hop culture. This blend of industrial
    grit and artistic rebirth informs his personal identity, motivating him to fuse technical skill with creative expression in both his work and his hobbies.
