persona_description: An inventor who specializes in developing mechanical computing machines, particularly those that are spring-driven and have a clockwork mechanism. He has a deep understanding of the
  workings of such machines and has developed several prototypes that he has presented to the Royal Society in London. His machine is a spring-driven mechanical computing machine that is mounted on a baroque
  table and is capable of cranking out sophisticated gunnery tables that would make England win the war. He is skilled in developing and testing the machine and is confident in its ability to meet the demands
  of the war effort.
