  career_goals: Although Nilda is currently not in the formal workforce, she aims to remain engaged and contributive within her community. She hopes to expand her volunteer leadership by organizing cultural
    workshops that teach traditional Mexican cooking and crafts, and she is considering a modest home-based venture selling homemade tamales and embroidered textiles to support her grandchildren's college
    fund. Additionally, she aspires to mentor younger Mexican-American families in navigating bilingual education and to maintain a stable, organized home environment that honors her heritage while embracing
    the Pacific Northwest lifestyle.
