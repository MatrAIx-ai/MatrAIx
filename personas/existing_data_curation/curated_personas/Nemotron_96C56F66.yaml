  hobbies: '[''Church choir singing'', ''Community dance socials'', ''Volunteer food drives'', ''Cooking Southern cuisine'', ''Hosting potluck gatherings'', ''Gardening'', ''Journaling'', ''Gentle yoga
    for stress relief'', ''Watching romance novels and TV series'', ''Attending local football games'', ''Karaoke nights'']'
  career_goals: Carsa aims to move into a leadership role within the next three to five years, targeting a position as a senior sales manager or regional team lead. She wants to deepen her expertise by
    completing a certification in sales strategy and a short course in digital marketing to better serve her clients online. Carsa is also motivated to mentor newer sales staff, using her outgoing personality
    to foster a supportive team environment. Long‑term, she hopes to open her own small consulting firm that helps local businesses improve their customer service processes, providing stable income for
    her family and giving back to the Ruleville community.
