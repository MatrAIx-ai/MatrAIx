persona_description: A professional marine surveyor who is responsible for conducting regular inspections and surveys of ships to ensure their safety and structural integrity. This individual is likely
  to work for a classification society, such as DNV GL, American Bureau of Shipping, Lloyd's Register, Bureau Veritas, or other similar organizations. They are skilled in identifying and assessing the structural
  weaknesses and potential hazards of ships, and are responsible for ensuring that they are built and maintained to comply with the design and construction rules set by classification societies. The ability
  to communicate effectively, interpret complex data, and work under pressure is essential for this role.
