  hobbies: '[''Historical Non-Fiction Reading'', ''Educational Research'', ''Vegetable Gardening'', ''Hiking in Angeles National Forest'', ''Chess Club'', ''Woodworking'']'
  career_goals: Ferdinand aims to transition into a curriculum coordinator role within his district, where he can design interdisciplinary programs that blend entrepreneurship and financial literacy into
    the core curriculum. He plans to pursue a master's degree in Educational Leadership to position himself for future school administration opportunities, such as becoming a vice principal. Simultaneously,
    he aspires to mentor younger teachers, lead professional development workshops, and launch an after-school entrepreneurship club that empowers students with practical business skills while maintaining
    a balanced, student-centered approach.
