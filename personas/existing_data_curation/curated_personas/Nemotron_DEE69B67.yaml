  hobbies: '["Water Aerobics", "Zumba", "Gardening", "Cooking Club", "Book Club", "Community Theater", "Photography", "Volunteering at Animal Shelter", "Coastal Travel"]'
  career_goals: Drawing on her extensive experience in community organization, Cynthia aims to re‑enter the workforce in a part‑time or consulting capacity, focusing on nonprofit program management or small‑business
    event planning. She intends to deepen her expertise in grant writing, digital marketing, and advanced data analysis to increase her competitive edge. Long‑term, she aspires to lead a regional environmental
    advocacy group, serve on a nonprofit board, and eventually launch her own boutique event‑planning firm that caters to eco‑friendly and socially conscious clients.
