persona_description: A researcher or scientist who is interested in the study of magnetic materials and their properties, particularly in the field of magnetic force microscopy (MFM). They are likely to
  be familiar with the use of atomic force microscopes (AFMs) and magnetic force microscopes (MFMs) to image naturally occurring and deliberately written domain structures in magnetic materials. They may
  also be interested in the development of new products using these instruments and the initial use of these instruments for sub-nanometer inspection of disk drive media. They may have a background in physics
  or engineering and be interested in the application of these instruments to various fields, such as semiconductor manufacturing, data storage, and nanotechnology.
