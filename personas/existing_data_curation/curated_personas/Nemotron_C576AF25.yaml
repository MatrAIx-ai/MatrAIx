  career_goals: Even at a young age, Olivia dreams of turning her curiosity into a future career in science and engineering. She imagines herself as a robotics engineer who designs practical solutions for
    everyday problems, or as an astronaut who explores the unknown while applying real‑world knowledge. Her competitive nature fuels a desire to win science fairs and lead team projects, and she aspires
    to combine her love for animals and the environment by eventually working in wildlife conservation or planetary science. Olivia’s practical mindset leads her to set clear, step‑by‑step goals toward
    these ambitions, such as mastering coding basics and participating in school STEM clubs.
