personas:
  professional: Olivia Scott is an aspiring junior scientist who blends their love for LEGO engineering, simple kitchen chemistry, and the adventure stories of Magic Tree House to solve everyday mysteries,
    and they approach each experiment with a practical yet curious mindset and a competitive drive to outdo their own previous projects.
  sports: Olivia Scott thrives on the soccer field as a forward for the River Valley Junior Soccer Club, cheering on the Seattle Mariners during family game nights and channeling their competitive spirit
    into scoring goals while also enjoying occasional community game days at the local park.
  arts: Olivia Scott channels their creative energy into drawing cartoon characters like Dora the Explorer and sketching woodland scenes inspired by nature walks, while listening to Kidz Bop renditions
    of pop hits and admiring the animation style of Studio Ghibli's My Neighbor Totoro, and they also admire the whimsical storytelling of Pixar's Toy Story.
  travel: Olivia Scott prefers organized family outings, having explored the nearby Evergreen State Trail, the National Museum of Natural History in Washington, D.C., and dreaming of a future adventure
    to the Grand Canyon, and they balance curiosity with the comfort of familiar routines.
  culinary: Olivia Scott delights in baking chocolate chip cookies with their mother, experimenting with a pinch of cinnamon and crushed pretzel bits, and they love assembling rainbow fruit kebabs featuring
    strawberries, pineapple, and grapes after weekend LEGO builds.
  core: Olivia Scott is a curious, competitive seven-year-old who balances indoor LEGO inventions with outdoor nature hunts, keeps a meticulous savings chart, and they navigate mild allergies with a practical,
    skeptical eye toward everyday challenges.
background:
  cultural: Olivia is raised in a middle‑class, primarily German‑Irish family in Allentown, Pennsylvania. Her upbringing blends typical American traditions—celebrating Thanksgiving, the Fourth of July,
    and Christmas—with occasional European customs like Easter egg hunts and St. Patrick's Day festivities passed down from grandparents. She attends a local public elementary school and participates in
    community programs at the Allentown Art Museum and Lehigh Valley Heritage Museum, exposing her to the region's rich cultural tapestry. The diverse Lehigh Valley community, with its mix of ethnic neighborhoods
    and nearby universities, nurtures her curiosity while reinforcing a strong sense of American identity and community involvement.
