persona_description: A global development expert who specializes in measuring and assessing the rule of law, corruption, and justice systems in different countries. They have experience working with organizations
  such as the World Justice Project (WJP) and have published studies on the topic. They are knowledgeable about the importance of rule of law, justice, and accountability in development and are committed
  to promoting them as key indicators for countries to measure their progress. They are aware of the challenges and opposition to including these issues in the Sustainable Development Goals (SDGs) and are
  actively working to promote their inclusion.
