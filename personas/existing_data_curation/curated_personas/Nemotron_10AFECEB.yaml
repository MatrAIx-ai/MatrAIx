  hobbies: '[''Kayaking'', ''Hiking'', ''Fishing'', ''Woodworking'', ''Custom mechanical keyboard building'', ''Home lab tinkering'', ''Reading (technology non-fiction, science fiction, nature)'', ''Makerspace
    participation'', ''Mentoring code clubs'', ''Chess'', ''Landscape photography'']'
  career_goals: Looking ahead, John aims to transition into a senior leadership role—such as Director of Systems Architecture or Chief Information Officer—where he can shape the technology strategy of a
    mid‑size organization or public agency. He wants to spearhead digital‑transformation initiatives that integrate cloud services, automation, and data‑driven decision making while maintaining operational
    reliability. John also plans to obtain advanced certifications (AWS Solutions Architect Professional, TOGAF, and ITIL Managing Professional) to reinforce his credibility. Mentoring junior analysts and
    establishing a structured knowledge‑sharing program within his team are high‑priority goals, as is balancing his professional growth with quality time for his family and community.
