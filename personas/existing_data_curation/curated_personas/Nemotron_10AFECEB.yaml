personas:
  professional: John Trahan translates complex business challenges into streamlined IT architectures, leveraging two decades of systems analysis, Python automation, and cloud expertise while they methodically
    chart a path toward senior leadership through advanced certifications and mentorship.
  sports: John Trahan paddles a kayak on Lake Stevens each summer, hikes the Cascades with the Evergreen Hiking Club in autumn, follows the Seattle Seahawks, Seattle Kraken, and Seattle Sounders, and they
    maintain baseline fitness by jogging the lake trail three times a week.
  arts: John Trahan devotes evenings to building custom mechanical keyboards while listening to Pink Floyd and Vangelis, reads classic sci‑fi by Isaac Asimov, attends occasional Seattle Symphony performances,
    and they draw creative inspiration from Pacific‑Northwest nature writing, especially Barry Lopez.
  travel: John Trahan favors road‑trip adventures that blend kayaking on the San Juan Islands, hiking in Olympic National Park, and a yearly pilgrimage to Kyoto’s Arashiyama bamboo grove, planning itineraries
    months ahead with a spreadsheet while they balance family time.
  culinary: John Trahan enjoys cooking cedar‑plank salmon with a honey‑soy glaze, whipping up mushroom risotto, and brewing pour‑over coffee from a local roaster, and they often experiment with smoked meats
    on a home‑built smoker inspired by their woodworking projects.
  core: John Trahan is a methodical systems analyst who balances a curiosity for emerging tech with a love for lake‑side woodcraft, disciplined finances, and a quiet, strategic approach to life, and they
    rarely miss a chance to mentor a junior colleague.
background:
  cultural: John grew up in a middle‑class white family in the Midwest before moving to the Seattle metropolitan area in his early twenties. His cultural identity reflects mainstream American values of
    hard work, self‑reliance, and community service. Living in Lake Stevens has reinforced the Pacific‑Northwest ethos of environmental stewardship and an active, outdoors‑oriented lifestyle. He celebrates
    traditional holidays such as Thanksgiving and the Fourth of July, participates in local volunteer events, and values the region’s blend of tech‑savvy innovation with a relaxed, nature‑focused rhythm.
