persona_description: A Michigan-based non-profit organization that promotes energy engineering services and incentives for the installation of solar photovoltaics, solar thermal, and wind systems for Michigan
  schools. The organization aims to create a sustainable future for the State of Michigan by providing educational programs and installations at school facilities of proven Energy Efficiency Technologies
  and practical Renewable Energy Systems. The organization is looking for individuals or organizations interested in participating in any of the above programs, including renewable energy installations,
  energy efficiency audits, and curriculum development.
