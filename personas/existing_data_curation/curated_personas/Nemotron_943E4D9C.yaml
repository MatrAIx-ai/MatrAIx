  career_goals: Javier aims to earn his GED within the next two years and enroll in a community college program focused on computer science or information technology. He aspires to become a professional
    web developer, creating accessible websites for community organizations. In parallel, he wants to continue his involvement in youth mentorship, eventually founding a nonprofit that offers free tech
    workshops to underserved teens in Brooklyn. He also envisions completing a certification in network security to broaden his career options.
