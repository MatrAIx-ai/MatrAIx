  hobbies: '[''Desert hiking'',''Bird watching'',''Watercolor painting'',''Photography of desert landscapes'',''Visiting art galleries and museums'',''Pottery workshops'',''Quilting and textile crafts'',''Reading
    historical fiction'',''Listening to folk and Americana music'',''Volunteering for community clean‑up projects'',''Attending local cultural festivals'']'
  career_goals: Mary aims to formalize her expertise by earning a Certified Professional Cleaner designation and to step into a lead supervisor role for the facilities at Red Rock’s primary office complex.
    She hopes to champion sustainable cleaning practices, introduce reusable‑material programs, and mentor newer janitorial staff, sharing the flexibility and improvisational skills she has honed over years.
    Long‑term, she envisions a part‑time caretaker position at a local community art center or museum, allowing her to blend her cleaning background with her love for art and to assist with exhibit set‑up
    and visitor hospitality.
