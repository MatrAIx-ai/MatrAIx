persona_description: Hankyu Kim, a PhD student in OSU's Department of Forest Ecosystems and Society, who studies birds, microclimate, and forest vegetation as part of ongoing long-term ecological research
  on songbird populations at the Andrews Forest. His research interests include the interaction of forest composition and structure in regulating bird population trends and studying the migration ecology
  of Hermit Warblers, a bird that needs mature coniferous forests for breeding. Additionally, Hankyu has studied terrestrial breeding bird population change in South Korea, linking their population dynamics
  with large-scale land-use change and climate change in the past two decades.
