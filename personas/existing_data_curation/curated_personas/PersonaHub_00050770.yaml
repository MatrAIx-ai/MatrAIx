persona_description: A researcher in the field of biomedical imaging, particularly focused on the use of nanotubes as a tool for deep tissue imaging. They have published a paper describing the use of single-walled
  carbon nanotubes (SWNTs) for imaging internal organs of mice. The researcher has experience with selecting and fine-tuning the wavelength of the nanotubes to enhance their fluorescence and imaging capabilities.
  They have a unique understanding of the properties and limitations of nanotubes, including their ability to emit in a specific region and the fact that they do not scatter light as much as other dyes.
  They are skilled in using digital video footage to enhance image quality and have a passion for advancing the potential uses of fluorescence imaging beyond the surface and near-surface applications.
