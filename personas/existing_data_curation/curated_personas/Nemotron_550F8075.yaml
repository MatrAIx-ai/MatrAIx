  career_goals: Tina often dreams of becoming a teacher because she enjoys helping friends learn, or a veterinarian because of her love for animals. She also imagines herself as an artist who can illustrate
    books. Her long‑term ambition is to finish school with good grades, make her family proud, and later work in a career that lets her care for others and express her creativity.
