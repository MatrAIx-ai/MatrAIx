personas:
  professional: Tina Negron is a budding junior naturalist who spends weekends drawing forest creatures and quietly envisions turning her wildlife sketches into a future wildlife illustrator career.
  sports: Tina Negron is a quiet participant in the Little Woodland Guardians hiking club, enjoys gentle trail walks with the elementary school’s nature‑explorer group, occasionally cheers for the nearby
    junior soccer team, the Riverbend Raccoons, but ultimately prefers low‑key activities like leaf‑collecting races over high‑energy games.
  arts: Tina Negron is an enthusiastic bird‑watcher‑turned‑artist who fills sketchbooks with water‑color owls and squirrels, idolizes illustrators like Beatrix Potter and Eric Carle, and spends free time
    drawing characters from favorite cartoons such as Peppa Pig and Bluey.
  travel: Tina Negron is a careful little explorer who loves family trips to the nearby state park’s lake trail, dreams of visiting the towering redwoods of California’s Redwood National Park, and prefers
    staying at cozy cabins where they can collect pine cones and sketch the scenery.
  culinary: Tina Negron is a budding chef who delights in nibbling carrot sticks and cucumber slices—favorites of their pet rabbit—mixes simple banana‑oat muffins, and enjoys helping to prepare bunny‑shaped
    sandwiches with whole‑grain bread and cheddar.
  core: Tina Negron is a gentle, structure‑loving dreamer who finds solace sketching wildlife while quietly wrestling with everyday worries.
background:
  cultural: Tina comes from a White, Southern‑American family in Burnsville, North Carolina, a rural community in Mitchell County. Her family values close‑knit relationships, weekly church attendance, and
    traditional celebrations such as Thanksgiving, Christmas, and Fourth of July picnics. The local culture includes country music, outdoor activities like fishing and hiking, community fairs, and a relaxed
    pace of life. Her upbringing features Southern dialect influences, family recipes for barbecue and biscuits, and a strong appreciation for nature and community harmony, all of which shape her cooperative
    and caring nature.
