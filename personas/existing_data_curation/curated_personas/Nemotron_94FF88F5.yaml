  career_goals: Even at ten, Joel dreams of a future where he can blend his love for hands‑on work with his desire to help his community. He imagines becoming a firefighter, attracted by the clear routine
    of shifts, the practical training, and the chance to respond spontaneously to emergencies. He also thinks about becoming an automotive mechanic, a trade he already enjoys practicing with his dad. Occasionally,
    he pipes up that he’d love to play baseball at the professional level, reflecting his spontaneous side and love for sports. For now, his biggest goal is to earn a badge in his Boy Scouts’ community‑service
    program, which he sees as a stepping stone toward any of these paths.
