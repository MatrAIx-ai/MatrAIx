personas:
  professional: Joel Giles is a budding team leader on his middle‑school baseball squad who applies the same methodical routine he loves to his hobby of reconstructing LEGO sets, often improvising new designs
    that showcase his knack for problem‑solving and collaborative play, while occasionally leaping into spontaneous game‑design ideas during after‑school programming sessions.
  sports: Joel Giles is a spirited shortstop on his school baseball team, practicing batting drills three times a week, cheering for the local Waco High School Cougars during Friday night basketball, and
    dreaming of one day playing for the Texas Rangers.
  arts: Joel Giles is a LEGO architect and cartoon doodler who mixes step‑by‑step builds with creative twists, enjoys country music on family drives, and spends weekends listening to artists like Luke Bryan
    while drawing comic‑style heroes to unwind.
  travel: Joel Giles is an adventurous weekend explorer who fishes at Lake Waco with his dad, has taken a family road trip to Austin for live music, and hopes to visit Disney World next summer to experience
    themed rides and meet characters.
  culinary: Joel Giles is a kid who loves greasy pizza, chicken nuggets, and mac & cheese, but also revels in barbecued ribs at local fairs and enjoys snacking on apple slices and carrot sticks when building
    LEGO marathons.
  core: Joel Giles is a routine‑loving yet spontaneously energetic 10‑year‑old who channels worries into LEGO creativity, baseball drills, and cartoon sketches while juggling occasional forgetfulness and
    over‑enthusiastic video‑game sessions.
background:
  cultural: Joel grew up in a middle‑class family in Waco, Texas, where Southern hospitality, community gatherings, and a strong faith tradition are everyday parts of life. He regularly attends a local
    Baptist church, participating in Sunday school and youth group activities that emphasize service, respect for elders, and practical values. The family often enjoys Texas‑style BBQ, trips to the Texas
    State Fair, and cheering for the Baylor Bears, especially during football season. These cultural experiences have shaped Joel’s appreciation for routine, practicality, and community involvement, while
    the diverse mix of classmates and regional events have nurtured his outgoing, sociable nature.
