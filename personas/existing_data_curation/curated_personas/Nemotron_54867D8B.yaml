personas:
  professional: An experienced janitorial professional, Amanuel Culbreath blends three decades of facility maintenance expertise—commercial floor care, eco‑friendly carpet cleaning, and basic HVAC and plumbing
    repairs—with a competitive, hands‑on curiosity, leading training sessions for new hires while prioritizing flexibility over rigid schedules.
  sports: Amanuel Culbreath spends his weekends fishing on Lake St. Clair and playing in the local adult softball league, while cheering for the Detroit Lions, Tigers, and Red Wings; they treat fitness
    as functional, preferring light jogging and occasional weight‑lifting over strict training regimens.
  arts: Amanuel Culbreath relaxes to the soulful sounds of B.B. King, Muddy Waters, and Mahalia Jackson while he sands wooden boards, and he attends the annual blues festival in Ann Arbor and his church’s
    gospel choir rehearsals, allowing music to shape his quiet yet competitive spirit.
  travel: Amanuel Culbreath favors low‑key road trips to nearby fishing spots like the Apostle Islands and seasonal family reunions in the Appalachian foothills, though he dreams of an eco‑tour of the Costa
    Rican rainforests, always booking with the cheapest flights to keep his budding cleaning‑business fund intact.
  culinary: Amanuel Culbreath enjoys simple, garden‑fresh meals such as herb‑roasted chicken, fresh tomato‑basil soup, and grilled trout seasoned with dill and lemon, cooking with a modest set of cast‑iron
    pans and a favorite West End stove, while he often grills burgers at church potlucks and indulges in a secret habit of adding a splash of hot sauce to sweet tea.
  core: Amanuel Culbreath is a hands‑on, eco‑conscious janitor‑turned‑mentor who balances a love for fishing, woodworking, and gospel blues with a laid‑back, sometimes disorganized approach to life, occasionally
    neglecting paperwork in favor of the next DIY project.
background:
  cultural: Amanuel is an African-American man raised in the rural South, deeply rooted in the traditions of the Black community in Alabama. He grew up hearing stories of the civil-rights era and the resilience
    of his grandparents, which instilled a strong sense of perseverance and community responsibility. His cultural identity is expressed through gospel music, church participation, and Southern cuisine.
    He values the close-knit extended family network and often contributes to neighborhood events, reinforcing ties with other Black families in St. Clair County. While he has faced the subtle biases that
    can accompany being a Black janitor in a predominantly white area, his practical outlook and competitive spirit have helped him carve out a respected position in the local workforce.
attributes:
