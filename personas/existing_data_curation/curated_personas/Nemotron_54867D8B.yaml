  hobbies: '[''Fishing'', ''Woodworking'', ''DIY home-improvement projects'', ''Gardening'', ''Listening to blues and gospel music'', ''Reading about sustainable cleaning'', ''Playing chess'', ''Volunteering
    at church clean-up events'']'
  career_goals: Amanuel hopes to leverage his extensive hands-on experience into a supervisory role within the facilities department of a larger organization. He is working toward obtaining his GED and
    plans to enroll in a community-college certification program in building operations or green cleaning. In the longer term he dreams of starting his own small cleaning business that specializes in environmentally
    safe services for schools and churches in St. Clair County. He also wants to be recognized as a go-to mentor for younger workers, using his practical know-how and competitive drive to help improve standards
    across the industry.
