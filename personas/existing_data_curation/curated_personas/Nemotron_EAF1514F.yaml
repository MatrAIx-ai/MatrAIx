    and caring for houseplants", "Listening to world music and podcasts"]'
  career_goals: 'Nurun aims to transition from a specialist role to a senior IT support engineer and eventually an IT operations manager within the next five years. She plans to earn industry certifications
    such as CompTIA Network+, Security+, and Microsoft Certified: Azure Administrator Associate to broaden her technical expertise. Her long‑term ambition includes leading a regional help‑desk team, shaping
    service‑delivery strategies, and mentoring women and underrepresented groups entering the tech field. Nurun also envisions launching a boutique consulting practice that offers affordable IT services
    and technology training for small businesses in Lake County, leveraging her practical problem‑solving skills and community‑focused mindset.'
