    "Data analysis and reporting (Excel, SQL)", "Vendor liaison and hardware procurement", "Process improvement and workflow optimization"]'
  hobbies: '["DIY home automation projects (Raspberry Pi, Arduino)", "Hiking at Indiana Dunes State Park", "Gardening (vegetable and herb garden)", "Yoga and mindfulness meditation", "Cooking Indian‑American
