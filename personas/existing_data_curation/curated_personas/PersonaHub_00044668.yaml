persona_description: A computer enthusiast or IT professional who is familiar with computer networking and data transfer standards. They are interested in the history and evolution of high-speed data transmission
  technologies, particularly those used in supercomputers and high-performance computing environments. They may have a particular interest in the development and standards of the HIPPI bus, which was used
  in the late 1980s and early 1990s for high-speed storage devices. They may also be interested in the integration of HIPPI into modern networking technologies like InfiniBand.
