personas:
  professional: Darlene Roach, a front‑of‑house specialist in a bustling Omaha eatery, leverages meticulous multitasking, POS expertise, and a practical reliability to smoothly coordinate orders while they
    quietly question new service trends, balancing curiosity with a no‑nonsense work ethic.
  sports: Darlene Roach, an avid hiker of the Nebraska prairie and a regular participant in 5K races with the Omaha Running Club, roots for the Nebraska Cornhuskers football team and the Kansas City Royals,
    and they treat fitness as a disciplined routine that balances competitive timing goals with the calm of solitary trail walks.
  arts: Darlene Roach, a weekend acoustic‑guitar player who strums songs by Bob Dylan and Joni Mitchell, enjoys framing prairie sunsets with her DSLR while listening to The Lumineers, and they find solace
    in true‑crime novels by Gillian Flynn and the atmospheric films of David Fincher, letting these artistic influences shape their reflective solitude.
  travel: Darlene Roach, who prefers meticulously planning low‑key road trips and weekend getaways, they have explored the Nebraska Sandhills and taken a short flight to Chicago for a culinary weekend,
    yet they dream of hiking Yellowstone’s geysers and watching the auroras of Iceland as a solo adventure once a few savings milestones are met.
  culinary: Darlene Roach, an intermediate home cook with a modest herb garden of rosemary and thyme, they often prepare seasonal dishes like roasted beet and goat‑cheese salad, lemon‑garlic grilled asparagus,
    and pan‑seared salmon topped with fresh dill, while they also savor classic turkey chili on cozy evenings.
  core: Darlene Roach, a practicality‑driven dreamer, they balance a competitive edge with a love for solitary hikes, often over‑plan budgets while neglecting daily floss, embodying a quietly ambitious
    Midwestern spirit.
background:
  cultural: Darlene grew up in a middle‑class family in the Omaha metropolitan area, where Midwestern values of modesty, reliability, and neighborly support are prominent. Her community emphasizes straightforward
    communication, small‑group gatherings, and participation in local events such as county fairs and volunteer projects. While her upbringing includes some Protestant cultural traditions that shaped her
    sense of responsibility, she primarily identifies with the broader regional ethos of hard work, practicality, and a strong connection to the surrounding natural landscape.
