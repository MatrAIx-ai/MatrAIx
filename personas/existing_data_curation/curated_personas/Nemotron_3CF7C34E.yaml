  career_goals: Darlene aims to progress from waiter to shift supervisor within the next two years, leveraging her organizational skills and competitive drive. She plans to pursue a hospitality management
    certificate to qualify for a restaurant manager position, where she can shape staff training and service standards. Long‑term, she hopes to open a small, community‑focused café that highlights locally
    sourced ingredients and sustainable practices, combining her practical business sense with her curiosity about culinary trends.
