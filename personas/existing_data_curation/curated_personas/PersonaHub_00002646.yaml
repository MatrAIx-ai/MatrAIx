persona_description: A wildlife ecologist with expertise in conservation biology, specifically focusing on the ecology and management of sensitive and endangered species. The individual is highly knowledgeable
  about the study of terrestrial organisms and communities, and has conducted research in a variety of ecosystems, temporal and spatial scales, and taxonomic groups. They are skilled in developing and testing
  survey and monitoring protocols, and have a strong interest in improving understanding of the factors affecting biological diversity and ecosystem structure and function, including the role of human activity.
  The individual is also adept at developing and testing alternative and tools for conservation of biological diversity, including viability assessments for species of concern, development of broader ecosystem-based
  strategies, and analysis of functional roles of species and assemblages of species. They have a strong background in conducting research within the west side of the Cascades, extending to the coast in
  Oregon and Washington, and have a diverse geographic coverage that extends beyond the Westside to other areas as warranted.
