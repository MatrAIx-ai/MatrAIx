  hobbies: '[''Sketching and photography'', ''Visiting art museums'', ''Listening to jazz and experimental music'', ''Attending local theater'', ''Hiking and nature walks'', ''DIY home improvement'', ''Furniture
    restoration'', ''Craft beer brewing'', ''Reading mystery novels'', ''Journaling'']'
  career_goals: Joni aspires to move into a foreperson or site supervisor role within the next three years, leveraging her on‑the‑ground experience to lead crews and improve project efficiency. She is pursuing
    an OSHA 30‑hour certification and plans to complete a certification in sustainable construction (LEED Green Associate) to position herself at the forefront of eco‑friendly building practices in Minnesota.
    Her competitive nature fuels a desire to be recognized as the most reliable and innovative laborer on her company’s roster. At the same time, she wants to keep enough flexibility to manage family responsibilities
    and mitigate the stress that often accompanies high‑pressure construction deadlines.
