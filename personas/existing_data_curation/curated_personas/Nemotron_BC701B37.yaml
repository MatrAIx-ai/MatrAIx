personas:
  professional: Joni Wolfe, a seasoned construction specialist in the Twin Cities with a decade of hands‑on experience operating backhoes, forklifts and interpreting blueprints, blends a curiosity for green‑building
    technologies with a competitive drive to lead crews, often improvising logistics to keep projects on schedule despite an occasionally relaxed approach to strict planning, and they turn their skeptical
    eye into proactive hazard mitigation.
  sports: Joni Wolfe conquers the Boundary Waters and Lake Como trails whenever weekends permit, mixes occasional trail‑running with a membership at a local climbing gym, and they cheer for the Minnesota
    Wild, Timberwolves, and Vikings while occasionally joining a pick‑up volleyball game at a community center.
  arts: Joni Wolfe immerses themselves in the Weisman Art Museum’s modernist collection—often sketching under the influence of Mark Rothko’s color fields and Georgia O’Keeffe’s botanical forms—while evenings
    find them at experimental jazz clubs listening to Kamasi Washington on vinyl, and they regularly attend fringe theater productions by the Minneapolis Playwrights Center.
  travel: Joni Wolfe’s travel log reads like a hybrid of scenic hikes and craft‑brew pilgrimages, from photographing the terraced shores of Lake Como to backpacking the Boundary Waters, and they now dream
    of a weekend road‑trip to Portland’s hop sanctuaries and a summer escape to Reykjavik’s geothermal pools, usually booking flights a week ahead without a rigid itinerary.
  culinary: Joni Wolfe balances a love of home‑brewed pale ales with a kitchen repertoire that includes slow‑cooked pork carnitas tacos topped with pickled red onions, flaky mushroom‑soy chive scones, and
    a weekend ritual of perfecting a sourdough starter using malted barley and rye flour, and they often pair these meals with their own hop‑infused brews.
  core: Joni Wolfe is a competitively spirited construction veteran who sketches crane silhouettes on coffee‑stained napkins, worries about every deadline, brews experimental lagers in the garage, and still
    finds solace in solitary hikes and impromptu jazz jams.
background:
  cultural: Joni grew up in a middle‑class white family in the suburbs of Saint Paul, with deep German‑Irish roots that are reflected in family gatherings centered around holiday feasts, Lutheran community
    events, and a strong work ethic. The Midwestern emphasis on practicality, self‑reliance, and community service shaped her straightforward approach to life. She embraces local traditions such as the
    Minnesota State Fair, lake fishing trips, and the “supper club” culture of hearty, shared meals. While she respects her cultural heritage, Joni also values the diverse arts scene of Saint Paul, which
    broadens her perspective beyond the conventional. Her background informs her blend of hands‑on pragmatism and an openness to new, unconventional ideas.
attributes:
  skills: '[''Heavy equipment operation'', ''Blueprint reading'', ''Concrete finishing'', ''Framing'', ''Drywall installation'', ''Basic electrical work'', ''Basic plumbing work'', ''OSHA safety compliance'',
