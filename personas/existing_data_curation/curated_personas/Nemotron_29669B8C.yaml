personas:
  professional: Steve Neely, a budding junior game designer who sketches comic panels, builds LEGO prototypes, and programs simple Scratch games, channels their curiosity and talkative nature into constantly
    brainstorming ideas, though their aversion to structure often leads to unfinished projects.
  sports: Steve Neely, a frequent participant in the community junior basketball league and a self‑appointed fan of the city’s professional team the Metro Raptors, prefers fast‑paced pick‑up games in the
    park and embraces snowshoeing as a winter endurance exercise, while often bragging about scoring the most points in recess.
  arts: Steve Neely, an avid comic‑strip creator who idolizes the whimsical humor of Adventure Time and the vibrant visuals of Steven Universe, spends weekends sketching superheroes while blasting pop hits
    from artists like BTS and Ariana Grande, and frequently exchanges jokes and trading cards with friends to fuel a lively creative community.
  travel: Steve Neely prefers spontaneous weekend outings to quiet riverbanks and snowy trails, but dreams of a future road trip to Disney World in Florida and a summer adventure at the Grand Canyon, balancing
    a modest budget through a carefully saved allowance while often leaving packing to the last minute.
  culinary: Steve Neely, a budding chef who can whip up a decent pepperoni pizza and a peanut‑butter‑jelly sandwich, loves snacking on mac and cheese with crunchy pretzels and chocolate chips, and enjoys
    experimenting with cookie cutters shaped like LEGO bricks while insisting on adding extra cheese to every dish.
  core: Steve Neely, a curious, talkative nine‑year‑old who juggles comic drawing, LEGO building, and impromptu jokes, thrives on social energy, yet frequently leaves projects half‑finished due to a love
    of spontaneity and a competitive streak.
background:
  cultural: Steve was raised in a typical Midwestern white family in Sauk Rapids, Minnesota. His heritage includes German and Scandinavian roots common to the region, and his family participates in a local
    Lutheran church. Community events like the county fair, ice‑fishing tournaments, and Minnesota Twins and Vikings games are regular parts of his life. The close‑knit community, love of outdoor activities,
    and emphasis on modesty, friendliness, and volunteerism shape his worldview.
attributes:
  skills: '[''spontaneous storytelling'', ''social communication'', ''basic cartoon drawing'', ''beginner drum playing'', ''LEGO building'', ''Scratch coding basics'', ''competitive basketball'', ''sprint
