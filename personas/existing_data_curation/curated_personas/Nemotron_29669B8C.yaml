  hobbies: '[''drawing comics'', ''building LEGO sets'', ''playing basketball'', ''improvisational games'', ''watching cartoons'', ''listening to pop music'', ''exploring nature trails'', ''collecting trading
    cards'', ''making up jokes'', ''learning Scratch coding'']'
  career_goals: Steve dreams of turning his love of art and humor into a career as a comic‑book creator and a stand‑up comedian who could host his own kids' show on a streaming platform. He also hopes to
    make the high‑school basketball team and eventually play college basketball. Additionally, he imagines inventing fun gadgets that surprise and delight his friends.
