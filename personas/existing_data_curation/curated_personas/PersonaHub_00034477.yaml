persona_description: A historian who specializes in the study of African American education in the region, particularly focusing on the contributions of Thomas Cardozo, Wiley Lane, and Rook Turner. He is
  passionate about uncovering the history and legacy of these educators and their impact on the region's education system. His research interests include the development of schools, the education of African
  Americans, and the impact of the Civil War on education in the region.
