  career_goals: Shirley aims to transition from full‑time bedside work to a part‑time nursing educator role at the local community college, where she can share her decades of clinical knowledge with aspiring
    nurses. She plans to earn a certification in gerontological nursing to deepen her expertise in senior care, and she hopes to formalize an art‑therapy program that blends her creative passion with patient
    wellness for the elderly in Vinton. Additionally, she wants to lead community health workshops that address chronic disease prevention and mental well‑being, and she aspires to mentor the next generation
    of nurses to foster a collaborative, patient‑centered culture in Calcasieu Parish.
