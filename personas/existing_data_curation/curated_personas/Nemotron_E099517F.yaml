personas:
  professional: Shirley Mccoy is a seasoned acute‑care and community nurse who combines expert patient assessments, IV therapy, and wound management with a curious, art‑infused approach to healing, and
    despite a relaxed attitude toward strict scheduling they energize their ward with sociable mentorship and creative therapy sessions for seniors.
  sports: Shirley Mccoy stays active by joining the Vinton senior walking club for bird‑watching hikes along the Creole Nature Trail, cheering the New Orleans Saints and Houston Astros on game days, and
    occasionally playing in a community softball league, favoring low‑impact exercise that fits their flexible schedule.
  arts: Shirley Mccoy expresses their vibrant spirit through watercolor paintings of bayou marshes displayed at the Lake Charles Art Museum, singing in a church choir that performs Creole classics by Clifton Chenier
    and Dr. John, and drawing inspiration from Monet’s light and local Cajun muralists, weaving art into daily life.
  travel: Shirley Mccoy prefers spontaneous road trips that blend cultural festivals and natural scenery, often winding from Calcasieu Parish to the French Quarter of New Orleans for Mardi Gras, venturing
    to the historic plantations of Natchez, or exploring the Gulf islands of Grand Terre, while they balance travel with a modest retirement budget.
  culinary: Shirley Mccoy delights in simmering gumbo with homemade roux, shrimp étouffée seasoned with file powder and holy‑trinity vegetables, and jambalaya spiked with smoked sausage, using fresh basil,
    thyme, and tomatoes from their backyard garden, cooking with confidence but occasionally forgetting to deglaze the pan.
  core: Shirley Mccoy is a community‑centered nurse‑educator who paints, sings, and cooks with the same generous heart, juggling a relaxed approach to schedules with a deep curiosity that fuels creative
    health initiatives and occasional late‑night festival planning, and they inspire others through their boundless energy.
background:
  cultural: Shirley grew up in the small town of Vinton, steeped in the warm hospitality of South‑Louisianian culture. Her family’s roots trace back to generations of Southern settlers who embraced the
    region’s French‑Acadian (Cajun) and Creole influences, blending traditions of church community, neighborhood gatherings, and a love for local music, food, and festivals. While identifying as white,
    she has always been exposed to the multilingual, multicultural tapestry of Calcasieu Parish, participating in Mardi Gras parades, church potlucks, and community celebrations that honor both Anglo‑Southern
    and Acadian customs. This environment fostered a deep respect for communal harmony, an appreciation for artistic expression, and a lifelong commitment to serving her neighbors through health care and
    volunteerism.
