persona_description: A forensic scientist who specializes in the identification of human remains using DNA analysis. They have worked on the International Commission on Missing Persons' DNA-led identifications
  project, which has led to the identification of over 10,000 missing persons in the former Yugoslavia. They have refined the ICMP system to achieve a higher output and have DNA profiles for over 80,000
  family members of missing persons from the former Yugoslavia on their blood sample database. They have helped to identify victims of the Asian tsunami and Hurricane Katrina and are currently working on
  the DNA-led identifications for victims of the 2004 Asian tsunami and last year's Hurricane Katrina.
