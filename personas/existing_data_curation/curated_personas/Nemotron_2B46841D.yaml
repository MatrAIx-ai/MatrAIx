personas:
  professional: Manon Snyder, a diligent mechanical and structural engineering graduate, they translate their methodical problem‑solving skills and mastery of SolidWorks, Python, and risk assessment into
    precise design work while charting a clear path toward a PE license and future team leadership.
  sports: Manon Snyder, an avid runner and budding cyclist, they log weekly trail jogs with the Allegheny Trail Runners club, cheer for the Philadelphia Eagles in the NFL season, and follow the Pittsburgh
    Steelers for their historical grit, while also participating in a local pick‑up volleyball league each summer.
  arts: Manon Snyder, a classical piano aficionado, they regularly practice Chopin Nocturnes and Beethoven Sonatas, attend annual performances at the Kimmel Center, and unwind with science‑fiction novels
    by Isaac Asimov, Liu Cixin, and Ann Leckie, while occasionally sketching engineering concepts inspired by M.C. Escher’s impossible constructions.
  travel: Manon Snyder, a structured traveler, they meticulously plan trips using spreadsheets, favoring weekend getaways to the Pocono Mountains for hiking and a long‑awaited solo expedition to Iceland’s
    geothermal sites to study renewable energy, though budget constraints keep overseas adventures to a one‑year‑out horizon.
  culinary: Manon Snyder, a precise home chef, they excel at baking sourdough bread with a disciplined starter schedule and crafting ratatouille that showcases rosemary, thyme, and fresh zucchini, while
    experimenting with molecular gastronomy techniques for dessert plating, but they sometimes burn the edges of a lasagna when distracted by a looming deadline.
  core: Manon Snyder, a methodical 22‑year‑old engineer with a penchant for puzzles, rigorous budgeting, proactive anxiety management, disciplined fitness, classical music, and meticulous cooking, they
    blend relentless precision with occasional guilty‑pleasure indulgences.
background:
  cultural: Manon was raised in Chambersburg, a small town in Franklin County, Pennsylvania, in a middle-class family of primarily German, Irish, and English ancestry. Her upbringing reflects the region’s
    blend of Appalachian and Pennsylvania Dutch cultural influences, including family gatherings featuring traditional foods like pretzels and sauerkraut, and participation in community events such as the
    annual Chambersburg Fall Festival. Her family values education, hard work, and community service, often volunteering at the local church and town clean-up initiatives. Growing up near historic Civil
    War sites, she developed an appreciation for local history and the preservation of regional heritage.
attributes:
  skills: '["Computer-Aided Design (CAD)", "Finite Element Analysis (FEA)", "Python programming", "MATLAB programming", "Data analysis and visualization", "Project planning and scheduling", "Quality assurance
    and testing", "Technical writing", "Risk assessment", "Problem solving"]'
  hobbies: '["Logic puzzles and jigsaw puzzles", "Reading sci-fi and technical non-fiction", "Yoga and mindfulness meditation", "Jogging on local trails", "Gardening (vegetable patch)", "Cooking and baking",
    "Playing piano (classical repertoire)"]'
  career_goals: Manon aims to obtain her Professional Engineer (PE) license within the next three years, focusing on infrastructure and sustainable design projects in Pennsylvania. She aspires to lead a
    multidisciplinary design team, overseeing the development of resilient structures that meet stringent safety standards. She seeks to specialize in renewable energy integration within civil projects,
    aiming to become a recognized expert in green engineering solutions. To support these goals, she plans to earn a Project Management Professional (PMP) certification and pursue continued education in
    advanced structural analysis. She also desires to mentor junior engineers, fostering a culture of precision and accountability.
