  hobbies: '[''Fishing'', ''Hunting'', ''Woodworking'', ''Truck restoration'', ''Attending local football games'', ''Classic rock music'', ''Playing tactical video games'', ''Volunteer work at church'']'
  career_goals: Fidel aims to earn a Certified Heavy‑Equipment Operator credential and a Commercial Driver’s License (CDL) within the next two years, positioning himself for a shift‑supervisor role at his
    current plant. He aspires to lead a small team, improve safety metrics, and eventually transition into a logistics management position where he can oversee equipment fleets. In the longer term, Fidel
    hopes to start his own locally‑focused trucking or equipment‑rental business, providing stable employment for his community and securing a steady income for his future family.
