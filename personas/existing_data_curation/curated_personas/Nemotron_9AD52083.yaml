  hobbies: '[''Reading speculative fiction'', ''Creative writing'', ''Photography'', ''Digital illustration'', ''Hiking'', ''Listening to experimental music'', ''Indie video gaming'', ''Journaling'', ''Attending
    local art events'']'
  career_goals: Brian aspires to become a multidisciplinary artist who fuses visual art, narrative, and interactive technology. He plans to complete a BFA in Visual Arts or Media Arts, focusing on experimental
    installations and digital storytelling. He hopes to work freelance as an illustrator and concept artist for indie game studios, eventually moving into a creative director role where he can lead innovative
    projects. In the long term, he dreams of curating immersive exhibitions that explore mental health, anxiety, and the human psyche, using his personal experiences as artistic fuel. He also keeps open
    the possibility of pursuing graduate studies in art therapy to combine his creative practice with helping others manage emotional distress.
