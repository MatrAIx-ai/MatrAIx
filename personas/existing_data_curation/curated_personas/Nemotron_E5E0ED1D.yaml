    crews'']'
  hobbies: '[''Reading mystery and thriller novels'', ''Cultivating a herb and succulent garden'', ''Crocheting blankets'', ''Cooking authentic Mexican dishes'', ''Building model airplane kits'', ''Listening
    to regional Mexican music'', ''Mindfulness meditation'', ''Hiking local trails with small groups'']'
  career_goals: Viviem aims to become a certified lead technician by obtaining EPA Section 608 certification and pursuing a bachelor’s degree in Engineering Technology. She envisions moving into a supervisory
    role where she can oversee preventive‑maintenance programs for residential and light‑commercial properties and eventually launch her own contracting business that emphasizes safety, reliability, and
    culturally sensitive service for the Mexican‑American community. A key part of her ambition is to secure a more predictable work schedule that supports her mental‑health goals and to develop leadership
    skills that balance assertiveness with compassion.
