  career_goals: She dreams of combining her love for science and animals by becoming a wildlife biologist or veterinarian, hoping to work on conservation projects in Colorado’s mountains. At the same time,
    she wants to keep her creative side alive, perhaps designing educational videos that explain scientific concepts to peers. Her competitive spirit also fuels an ambition to earn a scholarship for soccer,
    using the sport as a platform to promote environmental awareness. Long‑term, she sees herself leading community outreach programs that blend bilingual education with environmental stewardship.
