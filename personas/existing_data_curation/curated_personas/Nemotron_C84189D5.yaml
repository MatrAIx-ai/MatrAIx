personas:
  professional: Marielli Pena, a 13‑year‑old aspiring digital storyteller, blends their love for soccer, comic‑style sketches, and science experiments into short Instagram videos that turn match highlights
    into hand‑drawn narratives, using curiosity to experiment with editing software, practicality to keep content simple, a relaxed planning style that yields spontaneous uploads, and a competitive edge
    that drives them to chase higher view counts.
  sports: Marielli Pena plays for the Denver Youth Soccer Club’s U‑14 team, avidly follows the Colorado Rapids and the Denver Broncos, joins a local mountain‑bike group that rides Red Rocks trails on weekends,
    and maintains a competitive training routine that mixes soccer drills with biking laps, though they often skip scheduled stretching due to a laid‑back approach to fitness.
  arts: Marielli Pena creates comic‑style sketches inspired by Stan Lee and Hayao Miyazaki, edits short fantasy‑themed video mashups featuring series like The Witcher and Stranger Things, and draws daily
    doodles while listening to the indie band Tame Impala, channeling a curious mindset into artistic experimentation despite a tendency to leave projects half‑finished.
  travel: Marielli Pena explores nearby hiking spots such as Mount Falcon and the Garden of the Gods on spontaneous weekend trips, dreams of backpacking through Barcelona and Granada to see the architecture
    that inspires their family’s recipes, prefers flexible travel plans over rigid itineraries, and often uses Instagram to document each adventure with a mix of scenic photos and goofy video clips.
  culinary: Marielli Pena enjoys cooking tortilla española with potatoes, eggs, and chorizo alongside their family, experiments with adding jalapeños for extra kick, can whip up a decent homemade guacamole
    using avocados, lime, and cilantro, and finally indulges in late‑night pizza while binge‑watching fantasy series, showcasing an intermediate cooking skill set mixed with a playful spirit.
  core: Marielli Pena is a curiosity‑driven teen who mixes soccer, sketching, and spontaneous video edits into a competitive yet relaxed creative hustle, constantly balancing impulsive spending, mild health
    quirks, and a knack for turning everyday adventures into Instagram moments.
background:
  cultural: Marielli comes from a Spanish‑heritage family; her parents emigrated from Seville and keep many Andalusian traditions alive at home. She grew up speaking both Spanish and English, celebrating
    holidays such as Día de los Muertos, San Fermín, and Spanish Christmas customs while also participating in Denver’s multicultural festivals. Her household blends traditional Spanish cuisine—paella,
    gazpacho, and churros—with Colorado’s love for outdoor activities. This bicultural upbringing gives her a strong sense of identity, a respect for family ties, and a curiosity about how her Spanish roots
    intersect with her American community.
