  hobbies: '[''Reading classic literature'', ''Gardening'', ''Birdwatching'', ''Woodworking'', ''Playing bridge'', ''Attending church services'', ''Listening to jazz'', ''Local history tours'', ''Writing
    poetry'']'
  career_goals: Even in retirement, Michael aims to compile a memoir that weaves his personal story with the broader history of Cape Girardeau. He plans to author a comprehensive local‑history manuscript
    and establish a digital archive of recorded oral histories. He wishes to mentor younger volunteers at the historical society, ensuring his practical knowledge and curiosity are passed on. In honor of
    his late wife, he hopes to create a small scholarship for regional arts students, and he remains committed to preserving his family genealogy for future generations.
