personas:
  professional: Michael Corkern, a retired historical archivist and community volunteer in Cape Girardeau, they combine meticulous research skills with hands‑on woodworking, delivering engaging talks on
    local history while mentoring younger volunteers with a blend of curiosity, practicality, and gentle assertiveness.
  sports: Michael Corkern, a faithful supporter of the St Louis Cardinals and St Louis Blues, they follow the teams' seasons religiously, enjoy leisurely walks along the Mississippi River as low‑impact
    exercise, and participate in a seniors’ bowling league at the local community center.
  arts: Michael Corkern, an avid listener of Ella Fitzgerald, Louis Armstrong, and Duke Ellington, they volunteer as a choir tenor in their church, collect and restore vintage swing records, and pen occasional
    nature‑inspired poems that appear in the county historical newsletter.
  travel: Michael Corkern, who favors organized group tours to historic river towns such as St Louis, New Orleans, and Natchez, they enjoy the comfort of riverboat cruises that offer their favorite corn
    chowder, yet dream of a quiet pilgrimage to the Smithsonian National Museum of American History.
  culinary: Michael Corkern, who delights in cultivating heirloom tomatoes for fresh salsa, they prepare classic Midwestern comfort foods like chicken and dumplings and apple pie, and occasionally treat
    themselves to a slice of homemade banana nut bread while experimenting with smoked paprika in their garden‑grown beans.
  core: Michael Corkern, who blends diligent historical stewardship with a love for garden‑grown food, jazz, and modest community‑focused finances, they navigate age with curiosity, a touch of stubbornness,
    and a quietly resilient spirit.
background:
  cultural: Michael grew up in the heart of the American Midwest, in a small‑town environment typical of Cape Girardeau County. His family heritage blends German and Anglo‑American roots common to the region,
    fostering values of hard work, modesty, community involvement, and a strong religious faith. Throughout his life, he witnessed the post‑World War II boom, the social transformations of the 1960s and
    70s, and the rise of digital connectivity, adapting to each era while maintaining a deep appreciation for Midwestern traditions, local history, and neighborly solidarity.
attributes:
  skills: '[''Historical research'', ''Archival preservation'', ''Oral history interviewing'', ''Public speaking'', ''Community program coordination'', ''Genealogy research'', ''Woodworking'', ''Gardening'',
