personas:
  professional: Alma Rios is a veteran records clerk with three decades of experience mastering both paper filing and digital archiving, leveraging expert-level Excel, Access, and SharePoint skills while
    applying their practical curiosity and collaborative spirit to train staff and streamline municipal document workflows, and they take pride in mentoring new hires.
  sports: Alma Rios enjoys weekly hill walks in Toa Alta, participates in a local walking club, follows the baseball season of the Cangrejeros de Santurce, and occasionally joins community salsa dance nights
    as a lively cardio alternative, while maintaining a casual membership with the municipal senior fitness program, and they view these activities as essential balance to desk work.
  arts: Alma Rios cultivates their creative side through digital photography of island landscapes, savors salsa music from artists like Marc Anthony and Eddie Palmieri, and immerses themselves in historical
    novels by Isabel Allende and Ken Follett, all of which enrich their sense of heritage and storytelling, and they often share their photos at community events.
  travel: Alma Rios prefers thoughtful weekend getaways to historic sites such as Old San Juan and the El Yunque rainforest, plans trips meticulously to fit around work and family commitments, and dreams
    of a heritage tour through Spain’s Andalusian towns to trace ancestral roots, and they often seek travel deals that allow for cultural immersion without compromising their budget.
  culinary: Alma Rios is an adept home chef who lovingly prepares classic island dishes like arroz con gandules, mofongo, and pasteles, skillfully using plantains, sofrito, and adobo seasoning, while often
    hosting potlucks that showcase their talent for marrying traditional flavors with modern presentation, and they enjoy experimenting with new spice blends.
  core: Alma Rios blends disciplined record‑keeping expertise with a warm, community‑oriented spirit, punctuated by a love for salsa, garden solitude, and a habit of over‑stocking spice racks, and they
    often juggle several projects at once.
background:
  cultural: Alma Lea is a proud Puerto Rican who grew up in Toa Alta and now lives in Bayamón. Her upbringing was steeped in the island's family‑centric values, Catholic traditions, and vibrant community
    celebrations such as the Fiestas de la Calle San Antonio. Bilingual in Spanish and English, she maintains strong ties to her extended family and participates regularly in local church activities, neighborhood
    festivals, and cultural events featuring bomba and plena music. This cultural grounding shapes her cooperative, harmony‑seeking approach at work and her desire to preserve Puerto Rico's heritage through
    record‑keeping and community service.
attributes:
  skills: '[''Records management'', ''Data entry'', ''Document indexing and retrieval'', ''Microsoft Office Suite (Word, Excel, Outlook)'', ''Database software (Access, SharePoint)'', ''Digital archiving'',
