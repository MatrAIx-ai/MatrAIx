  hobbies: '[''Salsa dancing'', ''Cooking traditional Puerto Rican cuisine'', ''Gardening'', ''Reading historical novels'', ''Genealogy research'', ''Walking/hiking in the Toa Alta hills'', ''Volunteering
    at the local library'', ''Digital photography'', ''Knitting'']'
  career_goals: Alma aims to transition into a supervisory role within the municipal records department, eventually becoming a senior records manager who leads the digitization of historic municipal documents.
    She plans to complete a bachelor's degree in Information Management and earn the Certified Records Manager (CRM) credential. Her long‑term ambition is to spearhead a community‑wide data‑governance initiative
    that improves accessibility, security, and preservation of public records while mentoring younger employees and fostering a collaborative workplace culture.
