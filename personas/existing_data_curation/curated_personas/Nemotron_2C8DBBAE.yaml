personas:
  professional: Steven Hasty, a newborn, shows nascent signs of a future career in architecture where his vivid imagination and strict organizational habits will blend to create innovative, meticulously
    planned designs.
  sports: Steven Hasty, a newborn who delights in the rhythmic clatter of his nursery’s baby gym, is enrolled in the Little Lions Soccer Club and idolizes the Los Angeles Dodgers, foreshadowing future participation
    in youth soccer and baseball leagues.
  arts: Steven Hasty, a newborn captivated by the soft strings of Mozart’s "Eine kleine Nachtmusik" and the pastel murals of Claude Monet in his nursery, often coos in sync with the melodies, hinting at
    an early affinity for classical music and visual art.
  travel: Steven Hasty, a newborn who took his first short journey from the hospital to his family’s suburban home, already has a planned road trip to the Grand Canyon and a future summer dream of exploring
    the cherry blossoms in Kyoto, Japan.
  culinary: Steven Hasty, a newborn nourished by organic formula and occasional pureed sweet potato and apple, shows a preference for the natural sweetness of carrots and a curiosity when his parents experiment
    with cinnamon‑spiced oatmeal.
  core: Steven Hasty, a newborn whose boundless curiosity, rigid routine, dazzling sociability, skeptical streak, and emotional intensity combine into a uniquely precocious personality that already alerts
    caregivers to every tiny irregularity.
