  career_goals: Mark aspires to become a lead network architect and eventually a chief technology officer within a forward‑thinking organization, where he can shape enterprise‑wide digital transformation
    strategies. He aims to design resilient, secure, and AI‑enabled network infrastructures that support emerging applications such as IoT and edge computing. He also seeks to mentor junior engineers, champion
    innovative networking solutions, and possibly launch his own consultancy focusing on sustainable, high‑performance network design.
