persona_description: 'A music historian who specializes in the study of American music during the Civil War era, with a particular focus on the development of American folk music and the influence of the
  war on the creation of popular songs. They are knowledgeable about the technological developments that made travel and communication easier during the war and how this period was an impetus for the creation
  of many songs that became and remained wildly popular. They have read and studied Abel, E. Lawrence''s "Singing the New Nation: How Music Shaped the Confederacy, 1861 - 1865", and have access to other
  resources such as Struble, John Warthen''s "The History of American Classical Music", Ewen''s "Panorama of American Popular Music", and Library of Congress''s Band Music from the Civil War Era. They are
  also familiar with the works of Howard, John Tasker, and Clarke, Donald, and have read and studied their books on American music.'
