  hobbies: '["Beach outings", "Salsa and folk dancing", "Recreational soccer", "Cooking Mexican cuisine", "Volunteering at a food pantry", "Attending cultural festivals (e.g., Día de los Muertos)", "Hiking
    in local nature reserves", "Game nights and trivia contests", "Social gatherings with friends and coworkers"]'
  career_goals: Torri aims to advance from a building cleaner to a supervisory role within the next three years, eventually becoming a certified facility manager. She plans to enroll in a community college
    program for facilities management and obtain the Certified Facility Manager (CFM) credential. In the longer term, she dreams of launching her own small cleaning business that serves both commercial
    properties and residential clients in Orange County, leveraging her bilingual skills and strong work ethic to build a reputable, client‑focused brand.
