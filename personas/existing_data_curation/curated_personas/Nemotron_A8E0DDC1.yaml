personas:
  professional: Torri Pico, a 21‑year‑old commercial cleaning specialist, blends meticulous floor‑care expertise—stripping, polishing, and waxing—with bilingual communication and OSHA‑savvy safety practices,
    channeling their love of structured checklists into a flexible, people‑focused work style that keeps office spaces spotless while earning the respect of diverse occupants.
  sports: Torri Pico plays recreational soccer with the Orange County United club, cheers on LA Galaxy matches, hikes with the San Juan Trail Club in the fall, and joins sunset beach volleyball games, treating
    fitness as a social ritual rather than a strict regimen.
  arts: Torri Pico sways to the beats of Celia Cruz and Carlos Vives at salsa nights, enjoys folk dancing to traditional mariachi tunes during community festivals, and never misses a live performance by
    local indie band The Gardeners, weaving music and movement into their weekly social calendar.
  travel: Torri Pico favors spontaneous weekend road trips to Joshua Tree and Big Sur, budgeting for cheap hostels and surf rentals while dreaming of a spring backpacking adventure through the Yucatán coast
    once their savings grow enough to cover flights.
  culinary: Torri Pico, a confident home cook, perfects tamales and chiles en nogada for family feasts, experiments with quinoa‑infused salsas, and loves adding smoked chipotle to guacamole, while also
    mastering the quick skillet‑seared fish tacos that win over friends at game nights.
  core: Torri Pico is a socially energized planner who hoards spare cleaning supplies, loses track of their own calendar, yet thrives on beach breezes, salsa rhythms, and a competitive edge that turns every
    group activity into a chance to lead.
background:
  cultural: Torri was raised in a bilingual Mexican‑American household in Irvine, where her parents immigrated from central Mexico. Family gatherings often revolve around shared meals, traditional music,
    and holiday celebrations such as Día de los Muertos and Mexican Independence Day, which foster a strong sense of cultural pride. Growing up in a diverse community, she balances Mexican customs with
    Southern Californian influences, fluently switching between Spanish and English. Her cultural heritage emphasizes hard work, community support, and respect for elders, values that shape her diligent
    approach to work and her commitment to giving back through volunteerism.
attributes:
  skills: '["Commercial cleaning", "Floor care (stripping, waxing, polishing)", "Industrial vacuum operation", "Waste sorting and recycling", "Health & safety compliance (OSHA)", "Bilingual communication
