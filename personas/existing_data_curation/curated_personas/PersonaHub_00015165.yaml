persona_description: A group of hospitals and health centers from over 16 countries, led by Health Care Without Harm, have come together to pledge to reduce their carbon footprint, become climate resilient
  anchors in their communities, and pursue political and economic solutions to protect public health from climate change. The hospitals and health systems are committed to transitioning to clean, renewable
  energy and reducing their carbon emissions by 30 to 80 percent. This initiative is part of the 2020 Health Care Climate Challenge, which is a global effort to address the global health emergency caused
  by climate change. The hospitals and health systems are represented by Health Care Without Harm, a non-profit organization that works to transform the health sector worldwide, without compromising patient
  safety or care, so that it becomes ecologically sustainable and a leading advocate for environmental health and justice.
