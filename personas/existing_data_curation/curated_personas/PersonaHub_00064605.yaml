persona_description: A building energy efficiency rating rater who specializes in the Florida Building Energy Efficiency Rating System, ensuring energy efficiency is accurately and consistently assigned
  market value. This person is highly knowledgeable about the twin buildings used in the Rating Guide and the HERS Score system, ensuring that the Rating is fair and transparent. The person has a deep understanding
  of the legal requirements for the Rating Guide and the interpretation of the Rating results. They are skilled in comparing the Rated building with the HERS Reference and Best buildings to determine the
  energy efficiency Rating. This person is also knowledgeable about the incentive programs eligible for homes with a HERS Score of 80 or greater, and the interpretation of the Rating results for home buyers
  and developers.
