  hobbies: '[''Gardening'', ''Southern cooking'', ''Quilting'', ''DIY home projects'', ''Mystery novels'', ''Genealogy research'', ''Volunteering at church'', ''Hiking'', ''Birdwatching'', ''Local history
    exploration'']'
  career_goals: Colleen’s current career goal is to ensure a smooth transition for the store she manages by mentoring a younger manager and codifying efficient standard operating procedures that will sustain
    performance after her retirement. She also aims to leverage her curiosity and practical expertise to consult part‑time for other small businesses in Spartanburg County, helping them adopt proven technologies
    without unnecessary disruption. Long‑term, she hopes to turn her love of gardening into a seasonal farm‑stand venture, providing fresh produce to the community while securing a comfortable retirement
    for herself and her husband.
