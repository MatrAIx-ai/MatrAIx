  hobbies: '["video gaming (strategy & RPG)", "model kit building", "photography of local parks and historic sites", "cycling on New City trails", "reading speculative fiction and science‑fiction novels",
    "listening to tech and self‑improvement podcasts", "small‑group board‑game meetups", "basic coding practice"]'
  career_goals: Eddie plans to complete his GED within the next year and then enroll in a community‑college program that offers a certification in IT support or network administration. His short‑term goal
    is to secure an entry‑level help‑desk or technical support position where he can work independently while still providing assistance to coworkers and customers. Long‑term, he hopes to become a junior
    systems administrator or a reliable technical specialist for a small firm or local government office that offers a stable schedule and a collaborative but low‑pressure environment. He also aspires to
    build enough confidence to take on occasional freelance tech‑help projects for neighbors, blending his practical skills with his desire for flexibility.
