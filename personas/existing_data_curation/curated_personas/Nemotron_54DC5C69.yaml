personas:
  professional: Eddie Jones, a 19‑year‑old aspiring IT support technician, blends a practical knack for troubleshooting computers, routine auto maintenance, and home repairs with a calm, listener‑focused
    demeanor, seeking entry‑level help‑desk work that lets them operate independently while quietly supporting teammates in low‑pressure environments.
  sports: Eddie Jones, a member of the New City Trailblazers Cycling Club, favors low‑key fitness through weekend rides on the Greenway Trail, follows the New York Knicks for basketball and the New York
    Yankees for baseball, and participates in occasional pick‑up basketball games at the community center, preferring solitary endurance over competitive team sports.
  arts: Eddie Jones, who captures the quiet charm of local parks with a DSLR, enjoys the ambient scores of Hans Zimmer and the synth‑driven soundscapes of Daft Punk, and occasionally attends indie board‑game
    nights where they admire the intricate artwork of game designers like Stonemaier Games, letting these creative outlets shape their reflective yet structured personality.
  travel: Eddie Jones, who prefers meticulously planned micro‑adventures, spends free weekends exploring nearby state parks such as Redwood Creek Reserve and dreams of cycling through Amsterdam’s canals
    and visiting the historic temples of Kyoto, balancing a love of solitary discovery with a modest travel budget.
  culinary: Eddie Jones, a modest home‑cook, often whips up quick ramen bowls with soy sauce, miso, and soft‑boiled eggs, enjoys customizing pizza with pepperoni and fresh basil, and occasionally treats
    themselves to gourmet burgers from a local food truck, while relying on energy bars and coffee during late‑night gaming marathons.
  core: Eddie Jones is a quietly ambitious tech‑savvy introvert who balances a love of structured problem‑solving with a relaxed, slightly disorganized lifestyle punctuated by solitary hobbies, modest spending,
    and a steady pursuit of stability.
background:
  cultural: Eddie grew up in a predominantly white, middle‑class suburb of Rockland County, New York. His family’s values reflect typical American suburban life—emphasis on personal responsibility, modest
    ambition, and community involvement. Though his immediate social circle has remained fairly homogenous, living near New York City exposed him to a broader cultural mix, giving him an appreciation for
    diversity while his daily life stays rooted in suburban traditions. He celebrates mainstream American holidays, follows local sports teams, and enjoys the blend of quiet neighborhood life with the occasional
    buzz of the nearby metropolitan area.
attributes:
  skills: '["basic computer troubleshooting", "routine automobile maintenance", "DIY home repairs", "active listening", "conflict de‑escalation in small groups", "GED preparation", "proficiency with Microsoft
