persona_description: A physician who specializes in the treatment of hypertension and has experience with patients with peripheral arterial disease (PAD). This physician is interested in the effects of
  anti-hypertensive drugs in patients with PAD, particularly in terms of the rate of cardiovascular events, symptoms of claudication and critical leg ischaemia, and progression of atherosclerotic PAD as
  measured by ankle brachial index (ABI) changes and the need for revascularisation (reconstructive surgery or angioplasty) or amputation. This physician is likely to be interested in the Cochrane review
  on the effects of anti-hypertensive drugs in patients with both raised blood pressure and symptomatic PAD, and is likely to be looking for studies that compare different classes of anti-hypertensive drugs
  in this population.
