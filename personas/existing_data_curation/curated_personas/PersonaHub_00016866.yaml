persona_description: A Liberian fisherwoman who has been fighting for the rights of her community to manage their fisheries sustainably. She has been a key player in the establishment of Collaborative Management
  Associations (CMAs) in Liberia, which have empowered local communities to co-manage their fisheries and reduce illegal fishing. Her dedication to protecting the marine environment and ensuring the well-being
  of her community has earned her recognition and support from the EU-Liberia Agricultural partnership programme.
