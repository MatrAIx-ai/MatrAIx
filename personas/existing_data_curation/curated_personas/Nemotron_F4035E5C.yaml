  hobbies: '[''Art gallery visits'', ''Painting and sketching'', ''Cooking and experimenting with fusion recipes'', ''Gardening (succulents and desert herbs)'', ''Reading historical fiction and travel memoirs'',
    ''Attending cultural festivals (Diwali, Holi, etc.)'', ''Yoga and meditation'', ''Volunteer teaching basic computer skills'']'
  career_goals: Lopa aims to deepen her involvement with the local arts scene by volunteering as a docent at the Las Vegas Museum of Art, where she can share her enthusiasm for visual culture. She plans
    to enroll in a community college art history course to expand her knowledge. Additionally, she hopes to organize a monthly cultural showcase that highlights South Asian music, dance, and cuisine for
    seniors in her neighborhood. Lopa also aspires to document her family's migration story in a memoir that blends personal reflections with historical context, preserving her heritage for future generations.
    Finally, she intends to travel to Gujarat to revisit ancestral sites and bring back stories and artifacts for community education.
