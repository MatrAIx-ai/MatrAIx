  career_goals: Audrey aims to channel her technical background and passion for service into leadership roles within nonprofit and community‑focused organizations. Over the next five years she plans to
    become a senior advisor for a STEM education nonprofit, designing curricula and mentorship programs for under‑represented youth in New York City. She also aspires to author a guidebook on integrating
    data‑driven decision making with community development, and to serve on the board of local cultural institutions where she can advocate for inclusive programming. Ultimately, she seeks to leave a lasting
    impact by fostering pipelines that connect scientific literacy with civic engagement.
