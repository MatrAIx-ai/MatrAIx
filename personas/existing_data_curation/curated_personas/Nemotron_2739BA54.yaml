  hobbies: '[''Salsa and cumbia dancing'', ''Attending mariachi concerts'', ''Cooking traditional and experimental Mexican dishes'', ''Community potluck hosting'', ''Organic gardening (herbs, tomatoes,
    peppers)'', ''Senior book club (Mexican literature and memoirs)'', ''Teaching basic smartphone and tablet use to seniors'', ''Gentle yoga and mindfulness practice'']'
  career_goals: Although retired from formal employment, Rosendo remains driven to deepen her contribution to the local Mexican‑American community. She aims to lead a senior‑center mentorship program that
    pairs older adults with high‑school students interested in cultural heritage, using her bilingual skills and life experience. She also hopes to compile a family cookbook that blends classic recipes
    with the healthier twists she has experimented with, publishing it through a community grant. Continuing her curiosity, she plans to take a short art‑therapy workshop to better channel her intense emotions
    and eventually assist fellow seniors in expressive arts groups. Maintaining her independence is a core ambition, so she seeks to master new technology such as tablet apps for health monitoring and to
    advocate for better senior services in Anaheim.
