persona_description: A UC Merced professor who specializes in developing robotic technologies for first-responders in disaster scenarios. He is working on a project to develop software/hardware modules
  for mobile robots to solve the localization problem in unstructured environments. His team plans to use off-the-shelf hardware components to implement and improve an innovative algorithm they have developed.
  The goal is to create a first working prototype of the system and provide extensive experimental data to better understand the problem and stimulate further theoretical investigations to produce more
  accurate localization results. The team is implementing and evaluating the proposed algorithm in a realistic search and rescue scenario to identify further needs for theoretical investigations. They will
  then develop a ready-to-use hardware/software module to outfit mobile rescue robots.
