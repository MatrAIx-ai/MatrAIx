  career_goals: Darlene aims to turn her love of visual storytelling into a career as a concept artist or graphic novelist, fields that allow independent, quiet work and creative autonomy. In the short
    term she plans to join a specialized high‑school art program, build a professional‑grade portfolio, and secure a summer mentorship at a local museum or design studio. Long‑term she envisions earning
    a BFA, freelancing for video‑game studios or publishing houses, and eventually curating exhibitions that showcase unconventional artistic perspectives while maintaining the flexibility to work remotely.
