personas:
  professional: Darlene Templeton, a 15‑year‑old aspiring digital artist and budding JavaScript developer, blends meticulous sketching of cityscapes with experimental interactive art, channeling their curiosity
    and love for solitude into focused freelance projects for school clubs while maintaining flexible deadlines.
  sports: Darlene Templeton enjoys low‑intensity solo workouts such as early morning runs along the Mississippi River and weekday yoga sessions, while cheering quietly for the St. Louis Blues and the St.
    Louis Cardinals from home, and occasionally joins a local skate‑park community for short skateboarding sessions that satisfy their curiosity for kinetic movement.
  arts: Darlene Templeton immerses themselves in sketching Edward Hopper‑style cityscapes, curating playlists featuring Brian Eno, Max Richter, and Sufjan Stevens for focus, attending the St. Louis Art
    Museum’s contemporary exhibit on digital media, and drawing inspiration from the surreal paintings of Salvador Dalí and the pixel art of Bee Bee Bee Bee (Beeple), while occasionally playing acoustic
    renditions of Nick Drake songs on guitar.
  travel: Darlene Templeton prefers quiet, contemplative trips, having documented weekend hikes through the Ozark Trail and a family visit to the historic streets of New Orleans, while dreaming of a solo
    sketch‑café stay in Kyoto to capture narrow alleys and atmospheric light, planning each journey with detailed Google Maps itineraries and a modest budget.
  culinary: Darlene Templeton enjoys experimenting in the kitchen with simple yet bold dishes like avocado toast topped with radish and smoked salmon, homemade ramen bowls flavored with miso and ginger,
    and occasionally indulges in St. Louis‑style thin‑crust pizza, while still relying on the occasional candy‑filled snack aisle for a quick energy boost during late‑night art sessions.
  core: Darlene Templeton is a quietly curious 15‑year‑old who stitches together art, code, and solitary exploration into a uniquely introspective creative life, often fueled by ambient music, meticulous
    sketchbooks, and a habit of over‑thinking the next artistic experiment.
background:
  cultural: Darlene is a White American raised in the urban‑suburban blend of St. Louis, Missouri, with German and Irish ancestry common to the region. Her upbringing in a modest Midwestern community emphasizes
    independence, reliability, and respect for diverse cultural expressions. The city’s vibrant mural art, jazz legacy, and strong museum presence have nurtured her appreciation for unconventional art.
    She participates in local traditions such as spring visits to the Missouri Botanical Garden, celebrates holidays with a mix of Catholic and secular customs, and enjoys regional foods like toasted ravioli
    and gooey butter cake, all of which reinforce her blend of quiet introspection and community awareness.
