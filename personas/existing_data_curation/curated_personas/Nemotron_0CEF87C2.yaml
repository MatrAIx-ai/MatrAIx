  career_goals: She aspires to study graphic design or visual communication at a university and eventually work as a creative director or UX/UI designer, where she can blend her love of art, technology,
    and cultural storytelling. Maria hopes to create visually compelling campaigns that celebrate Mexican heritage while appealing to global audiences. In the shorter term, she aims to lead her high school’s
    art club, win regional debate competitions, and build a portfolio of digital artwork to showcase on platforms like Behance and Instagram. She also imagines launching a bilingual lifestyle blog that
    merges design tips with cultural recipes.
