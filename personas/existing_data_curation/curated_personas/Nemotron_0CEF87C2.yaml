personas:
  professional: Maria Dominguez, a teenage digital illustrator and budding debater, blends meticulous sketch planning with quick-witted argumentation, channeling their curiosity and competitive drive into
    weekly TikTok art tutorials that captivate peers.
  sports: Maria Dominguez channels their competitive spirit into weekly co-ed soccer drills with the Denver Youth Soccer Club, while cheering on the Denver Broncos on Sundays and maintaining a disciplined
    morning jog routine that doubles as inspiration for new character sketches.
  arts: Maria Dominguez curates a vibrant art life, sketching street murals inspired by Diego Rivera's bold colors, rehearsing playlists that blend Billie Eilish, Café Tacvba, and Lila Downs while dissecting
    exhibitions at the Denver Art Museum and channeling the storytelling flair of Pixar's Inside Out into their TikTok tutorials.
  travel: Maria Dominguez prefers meticulously planned weekend getaways, having explored the vibrant murals of Santa Fe and the sci-fi inspired installations at Seattle's Museum of Pop Culture, while dreaming
    of a future art pilgrimage to Mexico City's Frida Kahlo Museum and a teen-sized adventure through Tokyo's Akihabara district.
  culinary: Maria Dominguez, a budding home chef, swaps greasy pizza for fresh avocado toast topped with cherry tomatoes and feta, experiments with homemade sushi rolls featuring tuna, cucumber, and wasabi,
    and treats family taco nights as a creative laboratory for perfecting salsas with jalapeño, lime, and cilantro.
  core: Maria Dominguez is a curiosity-driven, talkative teen who compulsively organizes their art supplies by color, debates every viewpoint, and occasionally hoards limited-edition sketchbooks while forgetting
    to brush their teeth after late-night TikTok edits.
background:
  cultural: Maria comes from a Mexican immigrant family that maintains strong ties to its heritage. She speaks Spanish at home and celebrates traditions such as Día de los Muertos, quinceañera gatherings,
    and Mexican holidays with vibrant food, music, and art. Her grandparents share stories of Mexico’s regional crafts, which inspire her own artistic style, often incorporating bright colors and symbolic
    motifs reminiscent of Frida Kahlo and contemporary Mexican muralists. Living in the Denver metropolitan area, she also participates in local Latino community events, blending her Mexican roots with
    the multicultural environment of Broomfield County.
