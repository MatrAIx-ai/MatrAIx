  hobbies: '[''Photography'', ''Visiting art galleries'', ''Vintage road‑sign collecting'', ''Classic car restoration'', ''Bowling league'', ''Bridge (card game)'', ''Barbecue gatherings'', ''Live rock/blues
    concerts'', ''Community volunteer speaking'']'
  career_goals: Approaching retirement, Johnnie aims to transition from hands‑on driving to a consultancy role where he can design efficient route networks for small carriers in the Atlanta metro area.
    He aspires to obtain his own modest fleet of 5–10 trucks, leveraging his organizational strengths to run a boutique logistics firm that emphasizes on‑time delivery and driver safety. Additionally, he
    hopes to secure a regional award for driver‑safety innovation by introducing a peer‑review safety program, and to mentor younger drivers through local community colleges and vocational schools.
