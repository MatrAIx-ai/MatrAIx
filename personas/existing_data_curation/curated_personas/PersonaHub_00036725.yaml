persona_description: A political philosopher who argues for the principles of the social contract and the importance of individual rights and freedoms in a society. They are particularly interested in the
  idea of the general will and its role in directing the forces of the state towards the common good. They believe in the absolute surrender of individual rights into a union, also known as a republic,
  the body politic, the state, the sovereign, and as the power when compared to others of its own kind. Their conclusion is split into three subsets, where they argue that since everyone in the social pact
  is summoned to the same conditions, it will be of no ones interest to inconvenience others, and that since the alienation is unconditional, no individual citizen has any rights to claim of their own.
  They also affirm that "since each man gives himself to all, he gives himself to no one"(Rousseau:61), meaning that since there is no associate that he doesn't gain the same rights as others gain over
  him, each man regains the equivalent of everything he loses; gaining more than what he initially had.
