personas:
  professional: A preschool explorer, Saira Valiente, blends boundless curiosity with a surprising knack for applying simple practical solutions to everyday puzzles, like sorting blocks by size while still
    forgetting where the crayons are kept.
  sports: A playground enthusiast, Saira Valiente spends afternoons on the local community park's slides and swings, participates in the 'Little Lions' preschool soccer club, and cheers loudly whenever
    the Chicago Cubs win a game, though they often forget to bring a water bottle.
  arts: A budding art lover, Saira Valiente spends rainy afternoons coloring pictures of Disney Princesses while humming the 'Let It Go' song from Frozen (written by Kristen Anderson-Lopez) and eagerly
    rewatching episodes of Sesame Street featuring the beloved character Elmo.
  travel: A curious traveler, Saira Valiente has already taken a family trip to the San Diego Zoo and the Monterey Bay Aquarium, and dreams of one day stepping onto the magic carpet of Disneyland in Anaheim,
    though long car rides still make them fidget.
  culinary: A tiny gourmand, Saira Valiente prefers buttery mac and cheese, crispy chicken nuggets with ketchup, strawberry slices, and occasionally indulges in a classic peanut butter and jelly sandwich,
    while insisting on using the cookie cutter shaped like a star for their sandwich cuts.
  core: A wonder‑curious yet worry‑prone preschooler, Saira Valiente balances a love for hands‑on discovery with an unexpected streak of competitiveness, preferring solitary play yet secretly dreaming of
    big‑team adventures.
background:
  cultural: Saira grows up in a Mexican‑American household in Universal City, Texas, where Spanish is spoken at home and English is used at preschool. Her family celebrates Mexican traditions such as Día
    de los Muertos, Las Posadas, and Mexican Independence Day with colorful decorations, traditional foods like tamales and pan dulce, and music that fills the house. Weekly visits to a nearby Hispanic
    community center expose her to folkloric dance classes and Spanish‑language story circles. These cultural experiences shape her identity, giving her a strong sense of belonging to both her Mexican heritage
    and the vibrant Texan community she calls home.
attributes:
