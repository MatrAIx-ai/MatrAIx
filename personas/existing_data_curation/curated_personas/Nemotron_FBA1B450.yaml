  career_goals: When asked about the future, Saira often says she wants to be a teacher or a veterinarian, because she loves learning how things work and helping others, especially animals. She imagines
    herself leading a small group of friends in fun activities, reflecting her competitive streak and desire to be organized in a way that feels comfortable to her. She also dreams of becoming a bilingual
    preschool helper who can teach songs in both English and Spanish, a goal that blends her curiosity, practicality, and cultural heritage while allowing her to stay in familiar, supportive environments.
