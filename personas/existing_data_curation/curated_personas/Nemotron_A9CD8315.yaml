  career_goals: Although retired, Ines remains driven to continue lifelong learning and to share her rich cultural heritage. She aspires to compile a memoir that intertwines her family’s Puerto Rican roots
    with her experiences in Michigan, including a collection of cherished recipes and stories. Ines seeks to mentor younger seniors in using digital tools, fostering intergenerational connections through
    language and art. She hopes to expand local art programs by coordinating exhibitions that showcase diverse cultures, and she plans to make an annual trip to Puerto Rico to stay connected with her extended
    family and to bring fresh inspiration back to her community.
