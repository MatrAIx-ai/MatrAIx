personas:
  professional: A retired community organizer and bilingual elder named Ines Suarez leverages their methodical event‑planning skills to coordinate intergenerational art workshops, senior language circles,
    and local cultural exhibitions, balancing meticulous preparation with a natural curiosity about new ideas.
  sports: A leisurely exerciser named Ines Suarez enjoys walking in local parks with a small senior‑center group, follows the Lansing Lugnuts baseball season for social outings, and participates in gentle
    yoga classes at the community center, staying active without competitive pressure.
  arts: A passionate arts aficionado named Ines Suarez frequents the Lansing Art Gallery where they admire watercolor exhibitions, collects prints by contemporary painter Ana Rodríguez, and enjoys listening
    to salsa and jazz records, often humming along while stitching intricate quilts.
  travel: An adventurous yet budget‑conscious traveler named Ines Suarez plans annual trips to their family's Caribbean island home, combines these visits with exploring historic districts in Old Town Lansing,
    and dreams of a culinary tour of Spain’s coastal towns, always balancing travel‑insurance costs against the desire for authentic cultural immersion.
  culinary: A devoted home chef named Ines Suarez specializes in traditional island dishes such as arroz con gandules, mofongo‑style plantain mash, and sofrito‑infused stews, skillfully seasons with adobo
    and sazón, and often hosts potluck gatherings where they serve these flavors alongside fresh garden herbs they grow themselves.
  core: Ines Suarez is a methodical, bilingual elder who weaves heritage, art, and community service into a vibrant tapestry of lifelong learning, stubbornly clinging to old habits like hoarding grocery
    coupons while never missing a chance to paint a sunrise.
background:
  cultural: Ines was born to Puerto Rican parents and grew up bilingual, immersing herself in the island’s vibrant traditions of music, dance, and cuisine. After moving to the mainland United States, she
    blended her heritage with the Midwestern values of community service and self‑reliance. She celebrates cultural milestones such as Three Kings Day and the Puerto Rican Festival, often sharing these
    customs with neighbors in Grand Ledge. Her cultural identity informs her cooking, storytelling, and dedication to preserving Puerto Rican history within a diverse American context, while also embracing
    the inclusive spirit of her local community.
