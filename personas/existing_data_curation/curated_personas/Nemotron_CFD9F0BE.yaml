  career_goals: Jeremy aims to deepen his caregiving credentials by obtaining a Certified Nursing Assistant (CNA) credential and eventually moving into a supervisory role within his agency. He would like
    to become a lead aide who designs and maintains consistent care routines for clients, leveraging his strength in practical, routine‑oriented work. Over the longer term, he envisions starting a small,
    family‑run home‑care business in the Gardner area that emphasizes reliable, personalized service for the local community. He also hopes to secure a stable income that supports his family’s future and
    to earn recognition as a dependable, top‑performing aide.
