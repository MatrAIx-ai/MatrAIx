personas:
  professional: Carla Rylee, a teaching assistant at a Texas elementary school, leverages her curiosity and vibrant social energy to weave oil‑painting techniques and digital tools into lesson plans while
    juggling a disorganized schedule, using her competitive drive to refine conflict‑resolution strategies and champion art‑infused curricula as she prepares for a future classroom teacher certification.
  sports: Carla Rylee, a 43‑year‑old teaching assistant, energizes herself with weekly Zumba sessions at the Amarillo Community Center and line‑dancing nights with the local line‑dance crew, joins a seasonal
    intramural soccer league in spring, and passionately cheers for the Dallas Cowboys and the Amarillo Sod Poodles, yet their competitive streak occasionally drives them to overexert during workouts while
    their relaxed attitude toward scheduling sometimes results in missed classes.
  arts: Carla Rylee, a 43‑year‑old teaching assistant, immerses herself in oil‑painting experiments inspired by Georgia O'Keeffe’s desert palettes and Frida Kahlo’s introspective self‑portraits, attends
    gallery openings featuring works by contemporary street artist Banksy, and finds creative rejuvenation listening to the folk‑rock sounds of Lila Downs and the soulful blues of Bonnie Raitt, weaving
    these artistic influences into her lesson plans and weekend sketch sessions.
  travel: Carla Rylee, a 43‑year‑old teaching assistant, favors spontaneous road‑trips across the Texas Panhandle and into New Mexico’s high desert, often planning itineraries on a whim with a GPS and a
    playlist of classic road‑trip tunes, while also dreaming of a cultural pilgrimage to Mexico City’s Frida Kahlo Museum and a weekend art‑focused getaway to Barcelona’s Picasso Museum, balancing these
    adventures with a cautious eye on her budget and occasional anxiety about over‑committing to travel expenses.
  culinary: Carla Rylee, a 43‑year‑old teaching assistant, experiments in the kitchen with Tex‑Mex fusion creations such as chipotle‑marinated carne asada tacos topped with fresh pineapple salsa, smoky
    roasted poblano‑filled enchiladas drizzled with cilantro‑lime crema, and succulent‑infused cactus‑and‑succulent garden salads featuring prickly pear and lime zest, showcasing a moderate cooking skill
    level that swings between meticulous plating and occasional over‑spicing when they get caught up in a new recipe.
  core: Carla Rylee, a 43‑year‑old teaching assistant, is a curious, art‑obsessed, socially vibrant yet occasionally disorganized soul who balances a competitive drive with a habit of worrying, turning
    every classroom, canvas, and spontaneous road trip into a colorful experiment.
background:
  cultural: Carla identifies as white and grew up in the Texas Panhandle, where the blend of cowboy heritage, strong community bonds, and a flourishing local arts scene shapes her worldview. In Amarillo,
    she was exposed to traditional country music, rodeo culture, and the region’s noticeable Hispanic influence in food, festivals, and art. This multicultural environment nurtured her appreciation for
    varied artistic expressions and reinforced values of self‑reliance, hospitality, and resilience—traits that continue to guide her personal and professional life.
attributes:
  skills: '[''Lesson planning support'', ''Differentiated instruction'', ''Art integration'', ''Educational technology integration'', ''Group activity facilitation'', ''Student mentorship'', ''Parent communication'',
