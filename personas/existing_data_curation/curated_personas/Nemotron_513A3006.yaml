  hobbies: '[''Oil painting'', ''Sketching'', ''Visiting art galleries'', ''Zumba classes'', ''Line‑dancing'', ''Trivia contests'', ''Road trips across Texas'', ''Cooking Tex‑Mex fusion'', ''Succulent gardening'',
    ''Mindful journaling'']'
  career_goals: Carla aims to move from her current teaching‑assistant role to a fully credentialed classroom teacher within the next two years, with a focus on art‑infused curricula. She plans to earn
    a Master’s degree in Curriculum and Instruction, and eventually pursue a leadership position such as instructional coordinator or art program director at her school district. Additionally, she hopes
    to launch a community‑based arts outreach initiative that offers workshops for families, and she is committed to strengthening her organizational skills to better manage stress and responsibilities.
