  hobbies: '[''watercolor painting'', ''jazz music listening'', ''gardening'', ''Southern cooking'', ''reading contemporary fiction'', ''volunteering as a museum docent'', ''visiting art galleries'', ''attending
    community theater productions'']'
  career_goals: Jacqueline aims to leverage her clinical expertise and love of art to design and lead a community‑based health‑and‑creativity program that serves under‑served neighborhoods in St. Louis
    County. She is pursuing certification in art therapy and plans to secure grant funding to integrate creative workshops into chronic‑disease management clinics. Concurrently, she aspires to transition
    into a part‑time faculty role at a local nursing school, where she can mentor the next generation of nurses and embed evidence‑based, culturally responsive curricula. Ultimately, she envisions retiring
    from bedside work while remaining an influential advocate for holistic, patient‑centered care.
