personas:
  professional: Jacqueline Gray, a veteran registered nurse with over forty years in acute, long‑term, and community care, leverages her expertise in nursing informatics and a calm, resilient demeanor to
    lead interdisciplinary case conferences and integrate art‑based therapeutic activities into chronic disease management.
  sports: Jacqueline Gray, a devoted fan of the St. Louis Cardinals and the St. Louis Blues, joins a senior walking club that meets twice weekly along the Mississippi River Trail, and participates in seasonal
    community gardening contests that double as low‑impact fitness activities.
  arts: Jacqueline Gray, an avid watercolorist who paints the St. Louis riverfront, curates a vintage record collection featuring Miles Davis, John Coltrane, and Bill Evans, and regularly attends live performances
    at BB’s Jazz, drawing inspiration from the improvisational spirit for her therapeutic art workshops.
  travel: Jacqueline Gray, who prefers spontaneous weekend getaways over rigid itineraries, loves day trips to the Ozark National Forest for sketching sessions, has toured New Orleans to soak up its jazz
    heritage, and dreams of visiting the Musée d’Orsay in Paris to study Impressionist techniques.
  culinary: Jacqueline Gray, an experimental home cook with intermediate skill, frequently prepares Southern‑inspired dishes such as shrimp étouffée, collard greens with smoked turkey, and sweet‑potato
    pie, using garden‑fresh okra, fresh herbs, and a dash of hot‑sauce.
  core: Jacqueline Gray blends decades of nursing expertise with a zest for watercolor art and jazz, while a relaxed, competitive streak and occasional disorganization color their approach to finances,
    health, and lifelong learning.
background:
  cultural: Jacqueline was raised in a close‑knit African‑American family in the Greater St. Louis area, where church, community service, and education were core values. She attended an HBCU for her undergraduate
    science degree, which deepened her sense of stewardship and the historical legacy of Black nurses like Mary Eliza Mahoney. Throughout her career, she has been active in the local chapter of the National
    Black Nurses Association, advocating for health equity and culturally responsive care. Her cultural identity informs her compassionate approach to patient care, her commitment to mentorship, and her
    passion for integrating African‑American artistic expression into health‑promotion initiatives.
attributes:
  skills: '[''clinical assessment'', ''wound care'', ''medication administration'', ''nursing informatics'', ''health data analytics'', ''chronic disease management'', ''patient education'', ''art therapy
