personas:
  professional: An experienced high school physics and mathematics teacher, Tia Edwards creates interdisciplinary STEAM curricula that combine data‑driven assessments, virtual lab simulations, and oil‑painting
    visuals inspired by coastal landscapes, leveraging her calm, organized yet flexible approach to mentor introverted students and novice teachers alike.
  sports: An avid early‑morning beach walker and occasional paddleboarder, Tia Edwards follows the Miami Heat and the Miami Dolphins, participates in a local seniors’ walking club that meets thrice weekly,
    and prefers low‑impact workouts such as yoga to sustain flexibility while avoiding high‑intensity gym sessions.
  arts: Passionate about solitary oil painting, Tia Edwards frequently renders the Miami shoreline in muted tones, draws inspiration from Georgia O'Keeffe and local artist Carlos Alfonzo, attends solo exhibitions
    at the Pérez Art Museum Miami, and finds solace in playing Debussy's Clair de Lune on piano while listening to steel‑drum jazz by the Caribbean Jazz Project.
  travel: Preferring meticulously planned solo getaways, Tia Edwards often escapes to the Florida Keys for quiet sunrise meditations, has visited New Orleans for its jazz heritage, dreams of exploring the
    historic streets of Cartagena, Colombia, and seeks to schedule a cultural immersion trip to Haiti to practice Creole language skills and experience local cooking.
  culinary: As a proficient home cook, Tia Edwards delights in preparing Caribbean‑inspired dishes like griot‑marinated fish with plantain mash, pairs them with fresh Florida citrus salads featuring avocado
    and lime, and regularly enjoys a simple breakfast of espresso, whole‑grain toast with almond butter, and a side of mango slices.
  core: At 49, Tia Edwards blends a tranquil, introvert‑friendly teaching style with a deep love for art, mindful routines, and meticulous planning, channeling cultural celebrations and solitary creativity
    into a career dedicated to inclusive STEAM education while quietly wrestling with stress‑induced worry.
background:
  cultural: 'Tia identifies as African American with deep roots in both the Southern United States and the Caribbean diaspora that is vibrant in Miami‑Dade County. Growing up in a multicultural neighborhood,
    she was exposed to Haitian Creole, Spanish, and Southern Black traditions. Her cultural background informs her teaching philosophy: she actively incorporates African American scientific contributions,
    celebrates Juneteenth and Kwanzaa in the classroom, and draws on the rhythmic heritage of Caribbean music to create engaging, culturally responsive lessons. Tia participates in local Black educators’
    networks, volunteers at community art programs for youth, and values intergenerational storytelling as a means to preserve her heritage while fostering an inclusive environment for her students.'
attributes:
  skills: '[''Advanced physics and mathematics instruction'', ''Interdisciplinary STEAM curriculum design'', ''Educational technology integration (coding platforms, virtual labs)'', ''Data-driven student
    assessment'', ''Differentiated instruction for introverted learners'', ''Creating supportive classroom environments'', ''Mentoring and coaching junior teachers'', ''Professional development facilitation
    on inclusive pedagogy'', ''Scientific research methodology for classroom projects'', ''Multicultural and inclusive teaching practices'']'
  hobbies: '[''Oil painting'', ''Reading literary fiction and science non-fiction'', ''Solo visits to art museums and galleries'', ''Early morning beach walks'', ''Gardening native Floridian plants'', ''Playing
    piano'', ''Mindfulness meditation'', ''Exploring educational technology tools'', ''Journaling and reflective writing'', ''Listening to classical and jazz music'']'
  career_goals: She aspires to become a STEM curriculum coordinator for Miami‑Dade County Public Schools, leading the development of interdisciplinary STEAM programs that integrate visual arts and music
    into science lessons. Tia plans to earn a Ph.D. in Educational Technology to research effective strategies for supporting quiet, introverted learners in high‑school labs. She also aims to publish a
    guidebook on fostering calm, inclusive science classrooms and to present her work at national education conferences. Long‑term, she envisions influencing district policy to ensure equitable access to
    advanced STEM opportunities for under‑represented students.
