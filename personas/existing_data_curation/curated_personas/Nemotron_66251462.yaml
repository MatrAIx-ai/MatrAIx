  career_goals: James aims to complete his BSN within the next year and pursue an MSN by age 27, targeting certification as a Certified Critical Care Nurse (CCRN) and later a Nurse Practitioner specializing
    in acute/critical care. He intends to secure a charge‑nurse position within three to four years, lead a unit‑wide patient safety initiative, and publish research on reducing central line‑associated
    bloodstream infections. His competitive drive pushes him toward leadership roles in nursing administration or health‑policy advising, while his disciplined nature ensures he models a balanced, health‑focused
    lifestyle for his team.
