personas:
  professional: Leanna Webster, a two-year-old pretend boutique owner who arranges her stuffed animals for sale on a tiny table, meticulously enforces opening hours and price tags, and fiercely defends
    her role as the sole manager; they love routine, critique any unsorted toys, and show an early competitive streak.
  sports: Leanna Webster, a two-year-old who joins the Tiny Tigers Soccer Club every Saturday for mini-soccer practice, idolizes the New York Yankees during family game nights and mimics their victory gestures
    with a plush baseball bat, prefers the structured routine of warm-up stretches over free-form play, also enjoys indoor toddler gymnastics during winter months, and competes for a tiny plastic trophy
    for 'best kick'; they approach fitness with a solitary, routine-driven, yet competitive mindset.
  arts: Leanna Webster, a two-year-old who endlessly loops the chubby-voiced songs of Raffi and reenacts scenes from Disney's Mickey Mouse cartoons with a plush mouse, draws the same simple house over and
    over in her crayon book, and critiques any new melodies as 'too loud'; they show a strong preference for familiar artistic experiences and a critical, solitary appreciation of creative expression.
  travel: Leanna Webster, a two-year-old who took her first airplane trip to Orlando, Florida to visit a theme park, loves the predictable schedule of early morning hotel breakfast and afternoon nap, dreams
    of a family vacation to Paris to see the Eiffel Tower, prefers carefully planned itineraries over spontaneous adventures, and enjoys quiet moments on the beach sand; they gravitate toward routine-centric
    travel experiences that balance relaxation with brief, familiar exploration.
  culinary: Leanna Webster, a two-year-old who eats only plain pasta with butter, apple slices, and banana, refuses broccoli or spicy foods, insists on the same blue bowl for every meal, and occasionally
    indulges in a tiny scoop of vanilla yogurt as a treat; they are a notoriously picky eater who finds comfort in familiar taste and texture, yet will surprise caregivers by reaching for a strawberry slice
    on a sunny day.
  core: Leanna Webster is a two-year-old who thrives on routine, prefers solitary play, shows an early competitive streak, and insists on the same meals and toys day after day, often turning even minor
    disruptions into tiny tantrums; they also guard their tiny piggy bank fiercely.
background:
  cultural: 'Leanna is raised in a white, Midwestern‑American family in Wellington, Colorado, a small town in Weld County surrounded by farmland and open plains. Her family follows a practical, routine‑driven
    lifestyle typical of rural Colorado: early rising, family meals, and involvement in community events such as county fairs, church gatherings, and holiday celebrations like Thanksgiving and Independence
    Day. The cultural environment emphasizes self‑reliance, respect for nature, and straightforward values, which reinforce Leanna’s preference for familiar routines and quiet, solitary play. Parental influences
    include exposure to agricultural work and local crafts, fostering a modest, down‑to‑earth outlook that shapes her everyday experiences.'
attributes:
  skills: '["block stacking", "simple puzzle solving", "basic vocabulary", "counting to ten", "following routines", "color and shape identification"]'
  hobbies: '["building block towers", "reading picture books", "coloring with crayons", "listening to nursery rhymes", "exploring nature in the backyard", "simple puzzle solving"]'
  career_goals: Even at two, Leanna frequently whispers about caring for the animals she sees on the family’s farm and sometimes pretends to be a teacher during storytime. She enjoys watching her parents
    type on a laptop and mimics their actions, indicating an early fascination with learning and helping. While she does not yet have concrete career plans, her emerging interests point toward roles that
    involve caring for living things and sharing knowledge, such as a veterinarian or a preschool teacher. As she grows, she is likely to pursue these personal passions with the same focus and determination
    she shows in her play.
