  hobbies: '[''Surfing'', ''Paddle‑boarding'', ''Acrylic painting'', ''Sketching'', ''Yoga'', ''Reading contemporary fiction'', ''Design theory'', ''Volunteering in youth art programs'', ''Live music'',
    ''Healthy cooking'', ''Traveling to art festivals and historic cities'']'
  career_goals: Amanda aims to progress from senior graphic designer to art director within the next five years, eventually leading a multidisciplinary creative team at a progressive agency or boutique
    studio. She plans to deepen her expertise in UI/UX and sustainable design, building a portfolio of environmentally conscious branding projects. Long‑term, she envisions launching her own freelance studio
    that blends graphic design with community‑focused art initiatives, while mentoring emerging designers and contributing to industry panels on inclusive visual communication.
