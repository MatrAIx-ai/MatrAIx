personas:
  professional: Amanda Dupree is a senior graphic designer who leverages advanced Adobe Creative Suite skills, a methodical project management style, and a curiosity for sustainable branding to deliver
    polished visual narratives while calmly asserting their ideas in client meetings.
  sports: Amanda Dupree is a devoted beach‑culture athlete who surfs at sunrise, practices paddle‑boarding twice weekly, plays on a local beach volleyball club, follows the Miami Heat and Tampa Bay Rays,
    and schedules structured yoga and strength‑training sessions to maintain balanced fitness.
  arts: Amanda Dupree cultivates their creative side by painting acrylics, sketching travel journals, attending live gigs by Hozier and local folk bands at coastal venues, curating mood boards inspired
    by Banksy and Yayoi Kusama, and volunteering with youth art programs, which together shape their inclusive visual storytelling.
  travel: Amanda Dupree prefers thoughtfully planned weekend getaways to historic towns like Savannah and Charleston, occasional long‑haul trips to the Venice Biennale or Marrakech for design inspiration,
    balances adventure with a modest travel‑reward credit card budget, and always reserves a day for spontaneous beach walks wherever they land.
  culinary: Amanda Dupree enjoys cooking nutrient‑dense dishes such as grilled shrimp tacos with mango salsa, quinoa bowls with avocado, and kale salads topped with pomegranate seeds, experiments with coconut
    oil and fresh herbs, but occasionally succumbs to late‑night pizza cravings during binge‑watch sessions.
  core: Amanda Dupree blends Southern hospitality with beach‑side spontaneity, turning disciplined design work into vibrant community art, while juggling a love for early‑morning surf, meticulous budgeting,
    and a stubborn habit of misplacing their own sketchbooks.
background:
  cultural: Amanda was raised in a middle‑class suburban family in the southeastern United States, where Southern hospitality and a strong sense of community blended with the laid‑back beach culture of
    Panama City Beach, FL. Her White American heritage is complemented by a liberal arts education that fostered an appreciation for diverse artistic traditions and critical thinking. Family traditions
    such as Sunday barbecues, holiday gatherings, and community involvement remain central, while her exposure to the multicultural tourist environment and frequent travel has cultivated a broad, inclusive
    worldview that she brings to both her professional work and personal life.
