persona_description: A scientist and researcher in the field of stem cell research, particularly focusing on spinal-cord repair and related treatments. She is concerned with the ethical and safety implications
  of clinical trials, and the potential for commercial influences to bias research. She is interested in the experiences of patients and the importance of informed consent in stem cell research. She is
  also interested in the potential for stem cells to divide forever and the uncertainty surrounding the research. She is concerned about the potential for hype and alarm to be spread in the field, and the
  need for a broader discussion than the usual polarised debate between "the fervent religious person, the outspoken scientist and the patient in the wheelchair".
