  career_goals: She hopes to study psychology or social work in college, aiming to become a school counselor or mental‑health advocate, where she can apply her listening skills and desire to create harmonious
    environments. She also is intrigued by graphic design as a complementary skill, dreaming of a role that merges visual communication with community outreach.
