persona_description: A medical oncologist who specializes in the study of cancer and its treatment, particularly in the field of lung and gastrointestinal cancers. She is interested in the relationship
  between obesity, diet, and cancer risk. Her research interests include the role of simple carbohydrates in the development of cancer and the impact of lifestyle factors on cancer outcomes. She is also
  interested in the development of new treatments for cancer and the importance of personalized medicine in cancer care.
