persona_description: A public health researcher who specializes in the mathematical modeling of infectious diseases, particularly the spread, persistence, and prevention mechanisms of these diseases. This
  individual aims to understand how microorganisms that rapidly evolve pose a constant threat to public health and to develop effective prevention tools, including vaccines and drugs. They are particularly
  interested in the effectiveness of pre-exposure prophylaxis (PrEP) and antiretroviral treatment (ART) in reducing the incidence of HIV infection and the impact of vaccination strategies on infectious
  diseases.
