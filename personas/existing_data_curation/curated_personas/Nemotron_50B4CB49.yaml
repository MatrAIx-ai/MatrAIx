  hobbies: '[''Mixed‑media painting'', ''Nature photography'', ''Coastal hiking'', ''Miniature sculpture'', ''Art gallery visits'', ''Design meetups'', ''Journaling'', ''Contemporary fiction reading'',
    ''Yoga'', ''Volunteer teaching graphic design'', ''Mediterranean cooking'']'
  career_goals: Mallory aspires to evolve from senior graphic designer to art director within a forward‑thinking agency or to launch her own boutique design studio that emphasizes socially responsible and
    experimental visual storytelling. She wishes to lead multidisciplinary teams, champion inclusive design practices, and integrate emerging media like augmented reality into brand experiences. Additionally,
    she aims to teach part‑time at a local university’s visual arts department, sharing her industry insights while continuing her own research into sustainable materials and the intersection of design
    with environmental advocacy. Balancing ambition with personal well‑being, she plans to embed regular wellness retreats into her professional calendar to mitigate stress and maintain creative clarity.
