personas:
  professional: Mallory Fitzgerald, a seasoned graphic designer with two decades of expertise in Adobe Creative Suite, UI/UX, and motion graphics, leverages their curiosity and methodical workflow to turn
    unconventional client briefs into cohesive visual narratives while assertively mentoring junior designers.
  sports: Mallory Fitzgerald, a dedicated member of the Palos Verdes Hiking Club, spends weekends traversing coastal trails while cheering on the Los Angeles Dodgers in spring, the LA Lakers during the
    NBA season, and fitting in sunrise yoga sessions at the beach to maintain flexibility and manage stress.
  arts: Mallory Fitzgerald, an avid mixed‑media painter, regularly attends gallery openings featuring artists like Yayoi Kusama and David Hockney, draws inspiration from Sufjan Stevens’ indie folk album
    'Carrie & Lowell' while sketching, and finds creative renewal in re‑reading contemporary fiction authors such as Ocean Vuong.
  travel: Mallory Fitzgerald, a meticulous planner who favors off‑beat cultural retreats, has hiked Iceland’s volcanic landscapes and explored the narrow alleys of Cinque Terre, but prefers future solo
    trips to the Japanese island of Naoshima for its art installations, balancing travel budgets with their design studio ambitions.
  culinary: Mallory Fitzgerald, a competent home chef, delights in preparing Mediterranean‑style dishes such as grilled branzino with preserved lemons, roasted lamb shoulder seasoned with rosemary and sumac,
    and a vibrant tabbouleh featuring bulgur, parsley, mint, and pomegranate seeds, while occasionally splurging on a single‑origin Ethiopian coffee to accompany their meals.
  core: Mallory Fitzgerald blends methodical precision with restless curiosity, channeling anxiety into meticulous design work and nightly yoga, yet habitually procrastinates on personal art projects while
    hoarding a growing collection of shells for miniature sculptures.
background:
  cultural: Mallory comes from a white American background with Irish and English ancestry, raised in the culturally diverse environment of Southern California. Her family values emphasize education, hard
    work, and community involvement, traits reflected in her graduate studies in the humanities and her long‑standing commitment to local arts initiatives. Growing up near Los Angeles exposed her to a vibrant
    blend of artistic movements—from mid‑century modernism to contemporary street art—shaping an appreciation for both classic and avant‑garde aesthetics. She celebrates traditional holidays such as Thanksgiving
    and Easter while also embracing inclusive, progressive community traditions typical of the Los Angeles County region, such as cultural festivals and sustainability events. This multicultural exposure
    informs her collaborative approach and her desire to create designs that resonate across diverse audiences.
