persona_description: A Miami-based shark researcher who specializes in the study of predator feeding behaviors and has been featured on Discovery Channel's Daily Planet. His work has been covered in the
  past by WLRN, and he has led shark research and tagging expeditions out of Miami and the Keys. He is known for his observations of communal feeding frenzies among great white sharks, which have been published
  in PLOS ONE. His research interests include the ecology of apex predators and the role of white sharks in shaping the ecosystem.
