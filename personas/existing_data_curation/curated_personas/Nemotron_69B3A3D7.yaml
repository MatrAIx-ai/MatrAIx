  hobbies: '[''Gardening (vegetable and herb)'', ''Knitting'', ''Quilting'', ''Reading historical fiction'', ''Bridge and canasta'', ''Birdwatching'', ''Church choir participation'', ''Volunteer backstage
    helper for community theater'']'
  career_goals: Alicia aims to stay active, independent, and mentally sharp. She plans to mentor younger volunteers at the local senior center, document and preserve family histories for the Decatur Historical
    Society, and compile a memoir that captures her post‑war experiences and community memories. She also seeks to become proficient in online genealogy platforms and to serve as a volunteer guide for historic
    tours, while maintaining a regular yoga routine and making occasional trips to visit her grandchildren in the Midwest.
