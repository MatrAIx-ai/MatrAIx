personas:
  professional: Alicia Hodge combines a lifetime of budgeting expertise and community‑event planning to serve as the senior center’s volunteer coordinator, where her practical bookkeeping meets a flexible,
    sometimes unstructured, scheduling style that fuels her competitive edge in organizing bridge tournaments and church potlucks.
  sports: Alicia Hodge is a devoted fan of the Chicago Cubs who joins a senior walking club at Riverside Park for daily bird‑watching of cardinal sightings, maintains a light stretch routine, and cheers
    on the local senior softball league, preferring low‑impact activity over competitive sport.
  arts: Alicia Hodge weaves traditional quilt blocks inspired by vintage Midwest patterns while humming Handel chorales in church choir, volunteers backstage for community theater productions of 'Our Town'
    and 'The Music Man', and collects vintage bobbins featuring designs by Dorothy Bray.
  travel: Alicia Hodge favors organized, low‑stress road trips, taking grandchildren to the historic lighthouses of Mackinac Island and the colonial streets of Williamsburg, while dreaming of a leisurely
    wine‑tasting journey through Napa Valley, always booking senior‑friendly accommodations that allow flexible return dates.
  culinary: Alicia Hodge transforms her home‑grown tomatoes, red bell peppers, and fresh basil into a simmering marinara sauce, pairs it with her signature cornbread casserole and a spoonful of homemade
    apple butter, yet she sometimes overcooks quinoa salads when distracted mid‑bridge game.
  core: Alicia Hodge is an 81‑year‑old garden‑guru, competitive bridge strategist, and community champion whose structured budgeting meets a flexible, sometimes disorganized zest for life.
background:
  cultural: Alicia was born and raised in Decatur, Illinois, into a family of German‑Irish descent that settled in the Midwest during the 19th century. Raised in a Methodist community, she internalized
    values of modesty, hard work, and communal support. The post‑World War II industrial boom of Decatur, with its manufacturing plants and agricultural heritage, reinforced her practical and self‑reliant
    outlook. She has long participated in regional traditions such as the Decatur State Fair, county fairs, and church potlucks. Her cultural identity blends classic Midwestern traits—frugality, neighborly
    generosity, and a respect for tradition—with an openness to new ideas shaped by the social changes of the 1960s and 1970s, contributing to her skeptical yet adaptable mindset.
