personas:
  professional: A budding builder, Jonathan Smith loves stacking LEGO bricks and pretending to design skyscrapers, using their curious yet practical mindset to test shaky towers while happily ignoring the
    mess left in the playroom.
  sports: A lively little athlete, Jonathan Smith dashes around the backyard playing soccer with the Portland Youth Soccer Club, cheers for the Portland Timbers during weekend matches, and mimics the Portland
    Trail Blazers’ slam dunks in the living room during the winter season.
  arts: A budding performer, Jonathan Smith sings along to The Wiggles and dances to Sesame Street’s Elmo, often reenacting scenes from Disney’s Frozen starring Idina Menzel, while also enjoying the gentle
    folk tunes of Raffi during bedtime.
  travel: A curious traveler, Jonathan Smith enjoys family road trips to the Grand Canyon and beach days in San Diego, eagerly anticipates a future visit to Disneyland in Anaheim, but prefers short, stroller‑friendly
    outings over long airplane flights.
  culinary: A budding foodie, Jonathan Smith prefers creamy macaroni and cheese loaded with extra cheddar, delights in peanut butter and strawberry jam sandwiches, and loves dipping apple slices in caramel
    sauce, though they often create a flour‑covered kitchen after ‘helping’ with dinner.
  core: Jonathan Smith is a sociable, curious 4‑year‑old who balances imagination with practicality, leaving a trail of toys, stickers, and occasional messes wherever they go.
background:
  cultural: Jonathan was born and raised in Aliso Viejo, a suburban community in Orange County, California. His family follows a typical American middle‑class lifestyle, celebrating holidays such as Thanksgiving,
    Christmas, and Halloween with community events and family traditions. He attends a local preschool that emphasizes inclusive play and introduces multicultural ideas through music, books, and art projects.
    Weekend outings often include trips to nearby beaches, nature preserves, and the county’s family‑friendly museums, giving him exposure to the diverse cultural fabric of Southern California while maintaining
    his family's white American heritage.
