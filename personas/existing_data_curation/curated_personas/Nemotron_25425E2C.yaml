  career_goals: Though only four, Jonathan already talks about future dreams. He imagines becoming a firefighter because he loves helping people, wants to explore space like an astronaut after watching
    cartoons about rockets, and envisions being a teacher who can share stories with other kids. His short‑term ambitions focus on mastering kindergarten skills—reading simple books, counting beyond ten,
    and learning to tie his shoes—while his long‑term goal is to use his natural friendliness and curiosity to make a positive impact in a community‑oriented career.
