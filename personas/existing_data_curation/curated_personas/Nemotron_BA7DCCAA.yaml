personas:
  professional: Carley Pleiman, a methodical high‑volume food‑service manager, leverages their arts background to design immersive, gallery‑inspired menus; they excel at staff scheduling, POS‑driven cost
    analysis, and waste reduction, positioning themselves for a regional supervisory role and eventually a boutique café‑gallery.
  sports: Carley Pleiman, an avid solo hiker and occasional jogger, trains on quiet forest trails during spring and fall; they participate in the Pine Creek Trail Running Club, follow the Portland Trail
    Blazers and Timbers from home, and prefer low‑key, self‑paced workouts over team sports.
  arts: Carley Pleiman, a contemplative art aficionado, spends weekends sketching installations by Olafur Eliasson and photographing Yayoi Kusama exhibitions; they listen to Bach's Brandenburg Concertos
    and Philip Glass's Glassworks while practicing watercolor, and indulge in contemporary fiction by Haruki Murakami to fuel their creative theories.
  travel: Carley Pleiman, a meticulous planner, prefers low‑key, art‑focused trips such as solitary autumn walks through Kyoto's temples, winter treks in the Scottish Highlands, and spring visits to Santa
    Fe's galleries; they carefully budget each journey to preserve funds for their future café‑gallery venture.
  culinary: Carley Pleiman, an experimental home chef, perfects sous‑vide beetroot tartare with saffron threads, crafts fermented miso ramen infused with kelp and sumac, and creates a basil‑foam garnish
    using liquid nitrogen; they document each trial in a meticulously organized recipe journal.
  core: Carley Pleiman, a solitary, art‑driven operations strategist, channels a competitive precision into every restaurant metric while habitually over‑documenting recipes and sketches; they sacrifice
    social outings for quiet creative pursuits.
background:
  cultural: Carley was raised in the Greater Boston area, a region steeped in colonial history and rich in cultural institutions. Her family, of mixed English and Irish ancestry, emphasized education, self‑reliance,
    and an appreciation for the arts. Growing up near museums, historic sites, and a vibrant culinary scene fostered her love of art, literature, and food. She earned her arts‑humanities degree at a liberal‑arts
    college in Massachusetts, which reinforced her curiosity and critical thinking. This New England upbringing blends a pragmatic work ethic with a deep respect for cultural heritage, shaping her professional
    and personal outlook.
attributes:
  skills: '[''Restaurant Operations Management'', ''Staff Scheduling and Training'', ''Inventory and Supply Chain Management'', ''Food Safety Compliance (ServSafe)'', ''Budgeting and Cost Control'', ''Menu
