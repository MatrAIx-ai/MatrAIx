  hobbies: '[''Visiting Art Galleries and Museum Exhibits'', ''Sketching and Watercolor Painting'', ''Reading Contemporary Fiction and Art Theory'', ''Experimental Home Cooking'', ''Solo Wine and Brewery
    Tastings'', ''Hiking Quiet Nature Trails'', ''Journaling and Reflective Writing'', ''Classical Music Listening'', ''Photography (Urban and Nature)'', ''Attending Lectures on Cultural History'']'
  career_goals: Carley aims to progress from managing a single location to a regional supervisory role within the next three years, overseeing multiple sites and shaping company‑wide service standards.
    Long‑term, she envisions launching her own boutique café that doubles as a rotating art gallery, where menu design and visual art intersect to offer a unique cultural experience. To support these ambitions,
    she plans to obtain advanced certifications such as Certified Hospitality Supervisor and attend industry conferences to network with innovative restaurateurs.
