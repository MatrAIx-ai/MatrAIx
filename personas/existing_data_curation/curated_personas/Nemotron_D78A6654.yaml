personas:
  professional: Andrew Cox is a 28‑year‑old EMT in Lee County who leverages rapid patient assessment, airway management, and hands‑on problem‑solving skills while exploring tele‑medicine tools and lightweight
    AED drones, balancing a curiosity for new technology with a pragmatic, low‑key approach to emergency response.
  sports: Andrew Cox balances fitness and fun by casting early‑morning fishing lines on the Gulf, paddling with the Gulf Coast Kayak Club on weekends, cheering on the Tampa Bay Buccaneers, and playing in
    a casual rec‑soccer league affiliated with Fort Myers United.
  arts: Andrew Cox unwinds after a shift by streaming the podcasts 'Medical Tech Talk' and 'Science Vs', while their music playlists swing between classic rock legends like The Rolling Stones, ambient electronica
    from Tycho, and occasional live shows at the Funky Buddha Brewery, and they enjoy catching indie films at the historic Saenger Theatre.
  travel: Andrew Cox prefers spontaneous, low‑cost road trips on their vintage motorcycle, having already explored the Florida Keys and the Gulf Islands National Seashore, and they dream of a future ride
    through Iceland’s coastal routes to combine water‑based adventure with a break from routine.
  culinary: Andrew Cox, a moderately skilled home chef, frequently experiments with Gulf seafood dishes like blackened grouper tacos topped with mango salsa and homemade garlic‑butter shrimp, while they
    treat themselves to fresh oysters at a local bar and never pass up a perfectly seared ribeye seasoned with rosemary.
  core: Andrew Cox blends a pragmatic EMT mindset with restless curiosity, juggling morning fishing trips, vintage motorcycle tinkering, and late‑night gaming binges, all while habitually misplacing their
    keys in the organized chaos of a relaxed life.
background:
  cultural: Andrew grew up in a middle‑class, suburban family in Southwest Florida, absorbing a blend of Gulf‑Coast lifestyle and broader American cultural norms. The region’s laid‑back, community‑oriented
    atmosphere has shaped his relaxed approach to obligations, while the practical, self‑reliant values common in the area reinforce his focus on flexibility and hands‑on problem solving. He identifies
    with mainstream White American traditions, enjoys local seafood cuisine, participates in neighborhood events that reflect Southern hospitality mixed with coastal leisure, and values community involvement
    as a core part of his identity.
