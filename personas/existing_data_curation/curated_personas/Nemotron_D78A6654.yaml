  career_goals: Andrew aims to earn paramedic certification within the next two years and subsequently pursue a bachelor’s degree in emergency management or health services administration. Over the next
    five years, he envisions moving into a supervisory role—such as EMS field supervisor or training officer—where he can influence protocol development and integrate new technologies like drone‑delivered
    AEDs into Lee County’s response system. He also hopes to expand community health initiatives, lead CPR training programs, and mentor newer EMTs while maintaining the flexibility that fits his relaxed
    lifestyle.
