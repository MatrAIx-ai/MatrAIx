personas:
  professional: Susan Dodson, a veteran operations manager who now channels her analytical prowess and love of creativity into a boutique consulting practice, designs workshops that fuse lean process improvement
    with artistic brainstorming for Litchfield’s emerging entrepreneurs and nonprofits, all while mentoring staff with a hands‑on, detail‑oriented yet flexible approach.
  sports: Susan Dodson stays fit through low‑impact activities, leading a weekly senior pickleball league at the community center, joining a walking group that traverses the Litchfield countryside each
    Saturday, and attending yoga classes that blend gentle stretching with mindfulness; a devoted fan, she roots for the New England Patriots in football, the Boston Red Sox in baseball, and never misses
    the local high‑school basketball night.
  arts: Susan Dodson immerses herself in the arts by frequenting the Litchfield Art Association gallery, volunteering backstage at the community theater to ensure seamless productions, and curating a photo‑walk
    series that captures the town’s seasonal textures; she draws inspiration from Monet’s water lilies, Georgia O'Keeffe’s desert blooms, and the contemporary work of local painter Claire Jenkins, while
    regularly attending performances by the folk trio "The Riverfolk".
  travel: Susan Dodson plans travel with a blend of curiosity and structure, favoring organized senior group tours to historic sites such as Colonial Williamsburg, Boston’s Freedom Trail, and the Edinburgh
    Festival, while dreaming of a solo autumn pilgrimage to Kyoto’s temples and a culinary road‑trip through Tuscany’s vineyards; she balances adventure with budget by booking off‑season river cruises and
    weekend getaways to nearby apple orchards.
  culinary: Susan Dodson’s kitchen is a garden‑to‑table atelier where heirloom tomatoes, rainbow carrots, and fragrant basil are transformed into a signature heirloom tomato‑basil salad with aged balsamic,
    roasted root‑vegetable medleys, and a seasonal apple crumble; she enjoys experimenting with fresh goat cheese, locally milled flour for sourdough, and occasionally indulges in a glass of Pinot noir
    from a nearby vineyard after a successful workshop.
  core: Susan Dodson blends a competitive, detail‑driven mind with a vivacious love for community art, turning every spreadsheet, garden plot, and workshop into a vibrant social experiment.
background:
  cultural: Susan grew up in a mid‑western, white American family with deep roots in Michigan’s farming and small‑business communities, tracing ancestry to German and Irish immigrants who settled the region
    in the early 1900s. The values of hard work, self‑reliance, and neighborly cooperation that define the Midwestern ethos shaped her worldview, while church involvement and annual county fairs reinforced
    a sense of collective responsibility and celebration of local heritage. Her upbringing fostered an appreciation for practical craftsmanship alongside cultural pursuits such as folk art and community
    storytelling, a blend that continues to inform her balanced approach to both professional challenges and personal interests.
