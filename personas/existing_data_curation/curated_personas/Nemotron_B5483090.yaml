personas:
  professional: Omar is a budding junior architect in training, channeling their methodical love for step‑by‑step LEGO builds and strategic board games into early design thinking that shines through every
    meticulously constructed model.
  sports: Omar participates in the Little Kickers neighborhood soccer practice, idolizes the Dallas Cowboys and keeps up with the Houston Astros, and approaches each drill with a competitive, notebook‑toting
    rigor that records progress and sets personal performance goals.
  arts: Omar delights in building intricate LEGO creations while humming to folk melodies, flipping through Mo Willems picture books, and watching Pixar’s "Coco" for its vibrant storytelling, weaving these
    influences into a personal artistic rhythm that balances precise construction with imaginative narratives.
  travel: Omar enjoys family trips to the Grand Canyon, where they follow a printed itinerary and love spotting layered rock formations, and dreams of a future visit to Paris to see the Eiffel Tower, meticulously
    sketching travel plans with crayons and stickers despite their young age.
  culinary: Omar loves helping in the kitchen by measuring flour for homemade tortillas, assembling tacos al pastor with seasoned pork, fresh cilantro, and lime, and tasting the salsa verde they mixed,
    yet often sneaks an extra chocolate chip cookie after meals despite the house rule limiting sweets.
  core: Omar is a meticulous, competition‑driven LEGO enthusiast who thrives on routine and strategic play, yet secretly hoards extra cookies in their backpack when no one watches.
background:
  cultural: Omar grows up in a Mexican‑American household in Roseville, California, where Spanish is spoken daily alongside English. He attends a bilingual preschool that reinforces his fluency in both
    languages. His family celebrates Mexican traditions such as Día de los Muertos and enjoys cooking tacos, tamales, and other classic dishes together. He frequently visits the local Hispanic cultural
    center for community events, participates in school activities that highlight his heritage, and embraces the values of hard work, discipline, and respect for order that are emphasized by his extended
    family. This blend of cultural richness and structured environment shapes his worldview and daily practices.
