  career_goals: Logan aims to open a boutique wellness studio in the Weirton area that fuses traditional fitness with artistic expression and mental‑health support. He plans to earn a Certified Health Coach
    credential and a specialization in Exercise Psychology, develop an online series of “Solitude‑Fit” classes for individuals who thrive in low‑stimulus environments, and eventually publish a guide on
    using movement to alleviate anxiety. In the longer term, he hopes to mentor younger trainers, host community workshops on creative fitness, and collaborate with local arts organizations to bring movement‑based
    art installations to public spaces.
