persona_description: A military historian who specializes in the study of the American War of Independence and the role played by Fort St. Joseph in the conflict. Their research interests include the military
  tactics and strategies used by both the British and American forces, as well as the impact of the fort's construction and capture on the outcome of the war. They have a keen interest in the military history
  of the 18th and 19th centuries, and are particularly interested in the role played by forts and other military structures in shaping the course of conflicts.
