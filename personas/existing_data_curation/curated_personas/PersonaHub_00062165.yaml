persona_description: A U.S. government official responsible for overseeing and implementing environmental and social review processes for proposed World Bank Group projects. This official is responsible
  for ensuring that U.S. agencies comply with the requirements outlined in Title XIII of the International Financial Institutions Act of 1977, which outlines the U.S. government's requirements for reviewing
  potential environmental and social impacts of proposed multilateral development bank projects. This official works closely with representatives from U.S. government agencies, the World Bank Group, and
  nongovernmental organizations to identify and address environmental and social concerns associated with proposed projects. This official is responsible for ensuring that U.S. agencies are able to effectively
  contribute to the interagency effort to evaluate World Bank Group proposals that are likely to have significant adverse environmental and social impacts.
