personas:
  professional: Darshan Wilkes, a seasoned electrical engineering technologist, blends meticulous analog‑digital circuit design, rigorous compliance testing, and advanced automation scripting to streamline
    high‑stakes projects, while eyeing a senior technologist role that will let them lead a reliability lab and shape industry‑wide design standards.
  sports: Darshan Wilkes, a disciplined fitness enthusiast, hikes the Santa Monica Mountains weekly with the Santa Monica Trail Runners, cycles on weekends as part of the Silverlake Cycling Club, and keeps
    a loyal following of the Los Angeles Dodgers and Los Angeles Lakers, cheering their victories from the comfort of their home office.
  arts: Darshan Wilkes, an avid photographer, captures architectural geometry with a focus on lines and shadows inspired by Julius Shulman and Ansel Adams, curates a personal collection of prints from contemporary
    sculptor Kiki Smith, and unwinds to instrumental post‑rock albums like Explosions in the Sky while refining their own dark‑room techniques.
  travel: Darshan Wilkes, a meticulous planner, prefers solo trips that blend technical curiosity with nature, having mapped drone flight paths over Patagonia’s Torres del Paine, explored the kinetic installations
    at Hakone Open Air Museum in Japan, and now aiming to tour Germany’s renewable‑energy hubs in the Ruhr Valley for professional inspiration.
  culinary: Darshan Wilkes enjoys precise cooking, regularly preparing sous‑vide salmon with dill and quinoa, perfecting espresso shots using a barista‑grade machine, and experimenting with spice‑laden
    tacos al pastor, all while favoring copper‑lined pots that guarantee exact temperature control for their culinary experiments.
  core: Darshan Wilkes is a calm, detail‑obsessed engineer whose competitive streak fuels solitary hobbies, disciplined financial planning, and exacting DIY projects.
background:
  cultural: Darshan is a White American who grew up in a middle‑class family in Los Angeles, with European‑American ancestry traced to English and German roots. His upbringing blended a strong work ethic
    and individualist values with exposure to the city’s diverse cultural landscape. He celebrates typical American holidays and has an appreciation for the region’s innovative spirit, often participating
    in local maker fairs and small‑scale tech meetups. While he prefers solitude, he respects the collaborative ethos of Southern California’s tech community, integrating its emphasis on continuous learning
    and sustainability into his personal and professional life.
attributes:
  skills: '["Analog circuit design", "Digital signal processing", "PCB layout using Altium Designer", "Troubleshooting with oscilloscopes and spectrum analyzers", "PLC programming (Ladder Logic)", "Embedded
    C programming", "Compliance testing (CE, FCC)", "Technical documentation and reporting", "Quality assurance and process improvement", "Project scheduling (MS Project)", "Data acquisition and analysis
    (MATLAB)", "Safety standards (NEC, IEC)", "Soldering and component rework", "Test automation using Python"]'
  hobbies: '["Model rocket building", "RC drone flying", "Chess", "Technical non‑fiction reading", "Home automation projects", "Architectural photography", "Hiking", "Vintage electronics restoration", "Classic
    car electrical tinkering", "Science fiction movies"]'
  career_goals: Darshan aims to advance to a senior technologist role where he can lead a dedicated reliability lab and influence design standards for high‑performance electronic products. He plans to obtain
    certifications such as Certified Electronics Technician (CET) and IPC IPC‑2221 compliance specialist. Over the next five years, he seeks to deepen his expertise in renewable energy power electronics
    and aerospace avionics, positioning himself as a subject‑matter expert. While he values stability, he also aspires to launch a boutique consulting practice focused on process optimization and regulatory
    compliance, mentoring a small team of junior technicians along the way.
