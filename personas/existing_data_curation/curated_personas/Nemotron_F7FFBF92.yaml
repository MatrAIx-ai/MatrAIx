  career_goals: Margaret aims to transition from a front‑line janitorial role to a supervisory position, such as a cleaning manager or facilities coordinator, where she can mentor newer staff and implement
    more efficient, environmentally friendly cleaning protocols. She is considering earning a certification in facilities management to strengthen her credentials. While she values job stability, she also
    hopes to carve out a part‑time role that allows her to support local art initiatives, combining her curiosity about art with her organizational strengths.
