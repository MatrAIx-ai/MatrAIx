  hobbies: '["Recreational basketball", "Country line dancing", "Hunting and fishing", "Camping and hiking in Carlsbad Caverns region", "Barbecue cooking", "DIY car restoration", "Attending local live music
    events", "Volunteer work with community food bank", "Playing guitar", "Participating in a local Toastmasters club"]'
  career_goals: Emmett aims to advance from his current clerk position to a warehouse supervisory role within the next two to three years, eventually targeting a logistics manager position for an oil‑field
    supply company in the Permian Basin. To support this trajectory, he plans to earn an APICS CPIM certification, complete an associate degree in business administration at a local community college, and
    improve his Spanish proficiency. He also hopes to mentor newer employees, contributing to a more collaborative and efficient workplace while building a reputation as a reliable leader.
