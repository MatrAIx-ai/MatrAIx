persona_description: A researcher in environmental science, specifically studying the survival and growth of Mesua and Dipterocarpus species in a lowland rain forest in Sri Lanka. The study aims to test
  the concept of co-existence of ecologically similar canopy tree species within a forest and to understand the differences in survival and growth rates among and within canopy openings of different size.
  The researcher is likely to be a forest scientist or a forester with expertise in environmental science, specifically in the field of canopy tree species. They may have a background in environmental science,
  forestry, or related fields. They are likely to be interested in the interaction between disturbance and canopy tree species, specifically in the context of lowland rain forest.
