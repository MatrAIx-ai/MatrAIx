persona_description: A political philosopher who holds a unique perspective on the formation and purpose of government, particularly in contrast to the Enlightenment philosophy. They reject the notion of
  a social compact and the idea that government is formed on principles of social compact. They argue that the State's purpose and power are coterminous and that there is no such thing as the "purpose"
  for forming society and government. They reject the idea of a contractual relation between government and its people and claim that the State's absolute power is the "Idea of ethical life." They believe
  that the formation of society and government has a defined purpose, which is a lens through which to judge government actions, and that the rationale and basis for this purpose rests on the inheritance
  of rights and the authority to enforce and protect those rights. They believe that in a state of nature, individuals are unable to protect their God-given freedom and rights due to the problems posed
  by individuals being able to protect their rights. Therefore, people form government to serve as their common will and force of protecting those rights from within and without.
