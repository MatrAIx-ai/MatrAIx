persona_description: A modern and environmentally conscious gardener who is interested in creating visually appealing, sustainable, and site-specific gardens. They value the use of plants, materials, and
  water in their gardens, and are interested in the design of gardens with inherent limitations. They appreciate the trend toward backyard farms and are inspired by the innovative and exciting ways in which
  gardeners are thinking about design, plant selection, water use, and materials in the twenty-first century. They are drawn to contemporary gardens for their use of plants, materials, and water, and are
  interested in maintaining a sense of tradition while expressing individualism in a responsible way. They are interested in learning about garden design, plant selection, water use, and materials from
  a variety of sources, including books, articles, and profiles of garden designers and organizations. They are passionate about creating beautiful and sustainable gardens that are both functional and aesthetically
  pleasing.
