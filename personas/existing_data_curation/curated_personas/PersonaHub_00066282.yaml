persona_description: A person who is interested in studying and understanding the relationships between various geometric figures, such as planes, lines, and circles. They may be particularly drawn to the
  concept of a stereonet, which is a tool used in surveying and engineering to visualize the relationships between different points in space. This person may have a background in mathematics, particularly
  in the fields of geometry and trigonometry, and may have experience with computer software such as AutoCAD or QGIS. They may also be familiar with the principles of geographic information systems (GIS)
  and have an interest in applying these principles to real-world problems.
