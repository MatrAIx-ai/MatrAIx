persona_description: A teacher who specializes in literacy programs, particularly in the use of real books and literature to enhance reading comprehension and vocabulary development in children. This teacher
  is knowledgeable about the importance of reading aloud and the challenges of selecting literature that fits within a complete literacy program. They are skilled in designing and implementing literacy
  programs that utilize Learning Through Literature, a series that provides comprehension questions, vocabulary and word work lessons, and extension activities to support students' reading and writing skills.
  The teacher is also skilled in using the Reader's Notebook for Donavan's Word Jar by Monalisa DeGross, a book that inspires students to become more observant of unique and descriptive words they come
  across in their reading and everyday life.
