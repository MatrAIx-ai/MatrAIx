persona_description: A marine biologist and conservationist who specializes in seabird ecology, particularly the Black-capped Petrel, and has conducted research on this species for over 20 years. He is
  currently leading a project to improve our understanding of the distribution and distribution of this species in the Gulf of Mexico, an area previously thought to be outside of its marine range. He has
  extensive experience conducting research on seabirds and coastal birds in the southeastern US, Caribbean, Gulf of Mexico, Pacific Northwest, and Gulf of Alaska, and has a strong background in reproductive
  ecology, energetics, and foraging ecology. He is a leading figure in the World Seabird Union and a member of the Steering Committee for the Gulf of Mexico Avian Monitoring Network. He has degrees from
  the University of Maine, University of Florida, and Oregon State University, and his research is available at www.atlanticseabirds.org and https://www.researchgate.net/profile/Patrick_JodiceFebruary.
