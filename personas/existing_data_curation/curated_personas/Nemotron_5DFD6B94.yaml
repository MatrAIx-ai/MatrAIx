  career_goals: Mark aims to transition from warehouse work into a role that blends his logistical expertise with his passion for the arts. His short term goal is to become a visual merchandiser or retail
    associate in a museum gift shop or cultural venue, where he can design engaging displays and interact with visitors. In the medium term, he hopes to complete his undergraduate studies in arts administration
    or business, earn a certification in retail management, and move into a supervisory or curatorial support position that allows him to contribute to community arts programming while maintaining a flexible
    schedule.
