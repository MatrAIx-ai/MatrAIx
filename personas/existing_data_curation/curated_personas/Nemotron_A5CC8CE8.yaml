personas:
  professional: Debra Coarsey is a seasoned mental health counselor whose expertise in humanistic and trauma‑informed therapy is amplified by a pragmatic curiosity that drives them to test emerging modalities
    while rigorously measuring outcomes, balancing their competitive drive with meticulous case documentation and boundary‑setting.
  sports: Debra Coarsey combines weekly hikes along Laguna Coast Wilderness Park with a membership in the Orange County Trailblazers running club, follows the LA Lakers and Anaheim Ducks for their seasonal
    thrills, and attends Saturday morning yoga classes that complement their fitness regimen, all while maintaining a competitive edge that pushes them to log personal bests in weekend 5K runs.
  arts: Debra Coarsey channels her love of classic literature—revisiting Virginia Woolf and Tolstoy—into watercolor renditions of the Southern California coastline inspired by John Singer Sargent, regularly
    attends live jazz nights featuring Miles Davis tributes at Tustin’s The Cellar, and curates art‑therapy sessions that incorporate works by Frida Kahlo to help at‑risk teens explore identity.
  travel: Debra Coarsey prefers purposeful travel that blends nature retreats with cultural immersion, meticulously planning road trips to Big Sur and Sedona for hiking, while allocating a yearly budget
    for a solo week‑long study tour of Kyoto’s Zen gardens and a culinary weekend in Oaxaca, balancing adventure with the practical need to schedule sessions around client caseloads.
  culinary: Debra Coarsey embraces farm‑to‑table cooking, skillfully preparing dishes like herb‑marinated grilled swordfish tacos with mango salsa, quinoa and roasted beet salads tossed in a lemon‑tahini
    dressing, and occasional miso‑based ramen using locally sourced kombu, while they often experiment with seasonal heirloom tomatoes and fresh basil on weekend dinner parties.
  core: Debra Coarsey is a borderline perfectionist who balances a fiercely analytical mind with a soulful creative streak, habitually over‑scheduling yet squeezing in spontaneous watercolor sessions when
    the mood strikes.
background:
  cultural: Debra grew up in a middle‑class Anglo‑American family in Southern California, with Irish and German ancestry. Her upbringing emphasized self‑reliance, education, and community involvement. Living
    in the multicultural environment of Orange County, she has been exposed to Latino, Asian, and Pacific Islander cultures, which informs her inclusive counseling style. While she identifies with mainstream
    Western values such as individualism and personal growth, she practices cultural humility and integrates clients’ cultural traditions into therapy. She celebrates holidays like Thanksgiving and the
    Fourth of July and enjoys health‑focused gatherings that reflect the eclectic lifestyle of the region.
attributes:
  skills: '[''Cognitive Behavioral Therapy (CBT)'', ''Dialectical Behavior Therapy (DBT)'', ''Trauma-Informed Care'', ''Motivational Interviewing'', ''Crisis Intervention'', ''Group Counseling Facilitation'',
    ''Psychosocial Assessment'', ''Treatment Planning'', ''Case Management'', ''Mindfulness-Based Stress Reduction'', ''Documentation and HIPAA Compliance'', ''Cultural Competence'', ''Professional Supervision'']'
  hobbies: '[''Hiking in Laguna Coast Wilderness Park'', ''Yoga practice'', ''Reading classic literature and psychology'', ''Watercolor painting'', ''Farm-to-table cooking'', ''Volunteer art-therapy workshops
    for at-risk teens'', ''Book club participation'', ''Live jazz concerts'']'
  career_goals: Debra aims to obtain her Licensed Professional Counselor (LPC) credential and, within the next two years, complete a Master’s in Counseling Psychology to deepen her theoretical foundation
    and research skills. She plans to earn advanced certifications in trauma and PTSD treatment, positioning herself as a specialist for underserved populations in Orange County. Long‑term, she aspires
    to open a boutique private practice that blends evidence‑based therapy with community outreach and mental‑health education programs. Her competitive drive fuels a desire to publish a guidebook on adult
    women’s anxiety, speak at regional conferences, and become a recognized thought leader in the field.
