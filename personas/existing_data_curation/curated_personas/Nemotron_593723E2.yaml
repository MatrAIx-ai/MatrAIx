    assertive communication'',''Small-group facilitation for community events'']'
  hobbies: '[''Watercolor painting of cityscapes'',''Urban photography'',''Reading philosophy and modern art books'',''Attending small gallery openings'',''Listening to live jazz and blues'',''Weekly chess
    club'',''Balcony herb gardening'',''Poetry writing'',''Volunteer set design for community theater'']'
  career_goals: Although nearing traditional retirement age, Richard aims to transition into a supervisory role as a building manager or facilities coordinator, earning a Certified Facility Management Professional
    (CFMP) credential. He hopes to integrate his love of art by establishing a modest community art space within his building, where he can curate rotating exhibitions and host small workshops. Additionally,
    he aspires to mentor younger custodial staff, share his knowledge of safety practices, and eventually compile his reflections and photographs of Chicago's architecture into a memoir that bridges his
    practical work with his imaginative interests.
