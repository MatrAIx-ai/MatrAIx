personas:
  professional: Ebony King is a seasoned landscaping and groundskeeping specialist who leverages decades of plant‑identification expertise, hands‑on equipment mastery, and sustainable irrigation design
    to deliver client‑focused garden solutions; they balance a relaxed scheduling style with assertive yet compassionate crew leadership, blending curiosity for eco‑friendly innovations with a practical,
    results‑driven mindset.
  sports: Ebony King enjoys leisurely walks through Montgomery’s historic parks and leads a senior walking club, while cheering for the Montgomery Biscuits and the Alabama Crimson Tide; they rarely engage
    in competitive sports but stay active by tending to community‑garden plots and participating in occasional birdwatching hikes.
  arts: Ebony King finds artistic solace in the soulful melodies of B.B. King, Etta James, and Mahalia Jackson, they regularly join a church choir that performs hymns by Thomas A. Dorsey, and escape into
    historical fiction by Ken Follett and Hilary Mantel during quiet afternoons.
  travel: Ebony King prefers relaxed road trips to historic Southern towns like Savannah, Charleston, and New Orleans, blending spontaneous detours to local gardens with occasional stays at modest bed‑and‑breakfasts;
    they dream of visiting the Great Smoky Mountains for a nature‑focused retreat but balance such plans against a modest travel budget and occasional health flares.
  culinary: Ebony King delights in preparing Southern comfort dishes such as shrimp and grits, fried catfish, collard greens with smoked ham hocks, and sweet potato pie, often incorporating home‑grown tomatoes,
    basil, and okra, and while their cooking skill balances seasoned confidence with occasional over‑seasoning, they relish sharing the meals over tea with neighbors.
  core: Ebony King is a nature‑driven mentor who blends spontaneous curiosity with a practical green thumb, yet they experience high emotional reactivity and occasional disorganization that turn steady
    routines into a gentle challenge.
background:
  cultural: Ebony grew up in Montgomery, Alabama during the civil‑rights era, shaping a resilient identity rooted in the Black Southern community. Her upbringing was steeped in church traditions, gospel
    music, and a strong sense of communal responsibility. Family gatherings centered around soulful cooking and storytelling, reinforcing values of hospitality, perseverance, and respect for elders. These
    cultural influences inform her work ethic, her love for nurturing living spaces, and her dedication to giving back through community gardening and mentorship. While navigating systemic challenges, Ebony
    maintains pride in her heritage and draws strength from the supportive networks of friends, family, and church congregants.
attributes:
  skills: '[''Plant identification'', ''Soil preparation and amendment'', ''Irrigation system installation and maintenance'', ''Landscape design and planning'', ''Equipment operation (mowers, trimmers,
