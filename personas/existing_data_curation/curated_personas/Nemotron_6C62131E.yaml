  hobbies: '[''Gardening'', ''Birdwatching'', ''Reading historical fiction'', ''Church choir participation'', ''Cooking Southern cuisine'', ''Knitting'', ''Volunteering at community garden'', ''Walking
    in local parks'', ''Listening to blues and gospel music'']'
  career_goals: At 60, Ebony aims to transition from full‑time labor to a part‑time consulting role where she can mentor younger landscapers and share her knowledge of native Southern plants. She hopes
    to earn a certification in sustainable landscape design, launch a small community‑garden consulting service, and eventually secure a steady income that allows her more flexibility for personal well‑being.
    Reducing the stress of disorganized scheduling is a priority, so she plans to adopt a simple planning system that balances her love of spontaneity with reliable client commitments.
