  hobbies: '["Sketching and painting", "Reading speculative and fantasy literature", "Playing tabletop role‑playing games (e.g., Dungeons & Dragons)", "Listening to experimental and indie music", "Photography
    (nature and street)", "Organizing community art meet‑ups"]'
  career_goals: John aspires to build a career as an independent visual artist and graphic designer, creating comics, album artwork, or local brand identities. He plans to earn his GED, develop a portfolio,
    and eventually open a small studio in Sunfield where he can both produce art and host workshops for other youth. He also has a long‑term goal of becoming a community cultural organizer, using his organized
    nature to curate events that celebrate diverse creative expression.
