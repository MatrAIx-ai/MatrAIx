personas:
  professional: John Garcia, a newborn participant in pediatric sensory research, demonstrates an innate fascination with abstract patterns and a methodical response to structured play, foreshadowing a
    future career in cognitive design or experimental psychology, and they often stare intently at colorful mobiles during testing sessions.
  sports: John Garcia, despite being an infant, eagerly participates in parent‑guided infant yoga and splash‑time swimming sessions, while his family bonds over watching the Chicago Cubs on television during
    his playtime, and they often clap enthusiastically at the sight of water splashes.
  arts: John Garcia's artistic world is shaped by the comforting strains of Brahms' Lullaby, the vivid pastel mobile inspired by Van Gogh's Starry Night, and weekly exposure to the gentle melodies of folk
    singer Jack Johnson, and they visibly light up whenever the music swells.
  travel: John Garcia's travel experiences so far consist of his parents' family‑friendly road trip to the Grand Canyon, a week‑long stay at a beachfront resort in Maui, and his first airplane flight to
    visit relatives in Toronto, all carefully scheduled around his nap times, and they often gaze entranced at passing clouds from the window seat.
  culinary: John Garcia's diet revolves around smooth formula and carefully pureed foods like avocado, sweet potato mash, and carrot‑apple stew, with occasional introductions of mild cinnamon in homemade
    banana pancakes to broaden his palate, and they seem to smile contentedly after each new flavor is tried.
  core: John Garcia, a newborn imbued with vivid imagination and methodical curiosity, balances sociable energy with intense emotional reactivity, turning every diaper change into a lively group ritual
    that can suddenly spiral into anxiety when his favorite lullaby stops, and they often seek comfort in the rhythmic rocking of a cradle.
background:
  cultural: John is a white male with partial Hispanic heritage, reflected in his surname Garcia, and grew up in Sunfield, a small town in Ionia County, Michigan. The Midwestern setting instilled in him
    values of self‑reliance, community involvement, and an appreciation for seasonal traditions such as county fairs, Thanksgiving, and local religious gatherings. At home, his family also celebrated aspects
    of their Hispanic roots, including weekend meals featuring dishes like tamales and observances of cultural holidays such as Día de los Muertos. This blend of Midwestern and Hispanic influences shaped
    his open, sociable demeanor and his appreciation for diverse artistic expressions.
attributes:
  skills: '["Conceptual ideation", "Sketching and illustration", "Basic graphic design (Adobe Photoshop, Canva)", "Community event planning", "Team coordination and facilitation", "Critical analysis of
