personas:
  professional: Bau Duong's nascent love for building block towers reveals budding engineering curiosity, as they delight in experimenting with shapes and colors, often rearranging their play area with
    a relaxed, improvisational style.
  sports: Bau Duong channels boundless energy into a toddler gymnastics class at the community center and splashes happily in a kiddie pool, while cheering on the Los Angeles Lakers during family game nights
    and proudly wearing the jersey of the local Little Rascals Soccer Club.
  arts: Bau Duong engages in finger‑painting sessions, splashing colors on large sheets while humming along to the playful tunes of Sesame Street's cast and the classical melodies of Mozart's Eine kleine
    Nachtmusik, reflecting a budding artistic sensibility that shapes their playtime.
  travel: Bau Duong eagerly explores nearby attractions, having giggled through a recent visit to the local zoo and a sunny day at Santa Monica Beach, and now looks forward to a family vacation to Disneyland
    Paris, balancing the comfort of familiar car trips with the excitement of new, whimsical destinations.
  culinary: Bau Duong delights in buttery chicken nuggets with a side of sweet potato fries, loves creamy avocado mash, and often requests banana slices, showing a developing palate that favors soft textures
    and mild flavors while occasionally turning up their nose at broccoli.
  core: Bau Duong is a curious, art‑loving toddler whose playful disorganization, gentle assertiveness, and love for sensory exploration color every bite, splash, and block they stack, all while maintaining
    a sweet‑tooth for spontaneity.
