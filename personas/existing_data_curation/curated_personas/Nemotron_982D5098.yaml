personas:
  professional: A budding architect in the making, Leah Goins channels their love for drawing detailed, colorful pictures and building elaborate LEGO structures into a methodical, organized approach to
    design, impressively planning each brick placement like a tiny construction project while delighting classmates with confident presentations.
  sports: Leah Goins storms the field as a forward for the Oak Creek Jr. Soccer Tigers, proudly dons the team’s bright green jersey, eagerly watches the professional baseball team, the River City Bees,
    during weekend games, and whips up cheer routines for their little league matches, channeling their sociable energy into team spirit.
  arts: Leah Goins thrives as a young performer in the school drama club, brings Dr. Seuss’s whimsical characters to life on stage, sings along to the catchy tunes of The Wiggles, and fills sketchbooks
    with vibrant illustrations inspired by Studio Ghibli’s films and the bold palettes of Disney’s ‘Frozen.’
  travel: Leah Goins embraces family road trips that combine scenic hikes in the nearby forest where they collect leaves and rocks, excitedly recounts their visit to the Grand Canyon, dreams of a future
    adventure at Disneyland, and prefers trips with structured itineraries that balance exploration with the comfort of familiar bedtime routines.
  culinary: Leah Goins delights in crafting simple yet colorful meals, confidently spreads peanut butter and jelly on toast, decorates cupcakes with rainbow sprinkles, favors macaroni‑and‑cheese and pizza,
    and relishes the fresh crunch of apple slices dipped in caramel.
  core: Leah Goins, a meticulously curious six‑year‑old with a flamboyant flair for storytelling, LEGO architecture, and organized creativity, balances a playful imagination with a reliable, teamwork‑driven
    spirit—occasionally forgetting an inhaler or a budgeted snack.
background:
  cultural: Leah is a White child growing up in Falling Waters, a small community in Berkeley County, West Virginia. Her family participates in local church gatherings, county fairs, and community picnics,
    where stories about Appalachian heritage and the region’s natural beauty are shared. The close‑knit neighborhood fosters a strong sense of belonging, respect for tradition, and an appreciation for outdoor
    activities like hiking, fishing, and seasonal festivals.
