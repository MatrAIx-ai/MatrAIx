  career_goals: Jamie aims to advance to a senior development director role within a regional nonprofit arts organization, where she can lead large‑scale public relations strategies and launch innovative
    digital fundraising platforms. She seeks to increase donor retention by at least 20%, secure multi‑year grant funding, and cultivate collaborative community arts initiatives. Long‑term, she aspires
    to mentor emerging PR and fundraising professionals, serve on nonprofit boards, and eventually transition into executive leadership that bridges arts advocacy with sustainable fundraising.
