persona_description: A natural resource management professional with expertise in river ecology, environmental impact assessment, and river basin management. This person has a deep understanding of the
  complex interactions between human activities and natural systems, and is skilled in identifying and mitigating potential conflicts and impacts. They are particularly interested in the Upper Mississippi
  River and Illinois Waterway, and have experience working on feasibility studies and integrated management plans for river systems. They are also knowledgeable about the legal and legislative framework
  governing river management, and are skilled in navigating the challenges of balancing multiple user interests and sectors while maximizing the value of the river system to the nation.
