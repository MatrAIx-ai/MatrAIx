  hobbies: '[''Oil Painting'', ''Visiting Local Art Galleries'', ''Birdwatching'', ''Cooking Southern Seafood'', ''Collecting Antique Postcards'', ''Reading Mystery and True‑Crime Books'', ''Volunteering
    at Veterans Center'']'
  career_goals: Molly aims to move into a supervisory role within the sheriff’s office, such as shift commander or training officer, where she can mentor newer deputies and shape procedural standards. She
    plans to earn an associate’s degree in criminal justice and later a certification in emergency management, positioning herself for a future in municipal emergency planning or a specialized community‑outreach
    unit. Long‑term, she hopes to combine her love of public safety with her passion for the arts by establishing a city‑run program that uses art workshops and gallery tours to engage at‑risk youth, reducing
    crime through creative expression.
