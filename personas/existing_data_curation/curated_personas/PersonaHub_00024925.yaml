persona_description: A historian who specializes in the study of Algerian history, particularly the period from the independence of Algeria in 1962 to the present day. She is particularly interested in
  the experiences of French nationals who were repatriated from Algeria during this period, and the impact of this exodus on the French population in Algeria and on the French government's response to it.
  She is also interested in the role of the Organisation armée secrète (OAS) in the conflict and the use of terrorism by the OAS to hinder the implementation of the Evian Agreement. She is looking for information
  on the experiences of the French nationals who were repatriated from Algeria, including their motivations for leaving, the difficulties they faced in leaving, and the impact of the exodus on the French
  population in Algeria and on the French government's response to it. She is also interested in the role of the European population of Algeria in the conflict and the impact of the conflict on their lives.
