personas:
  professional: Joshua Hamilton, a 29‑year‑old teaching assistant in a Texas engineering department, combines meticulous lesson planning and data‑driven teaching with a curiosity for interdisciplinary curricula,
    using Python and MATLAB to design lab experiments while mentoring underrepresented students, and they aim to become a full‑time lecturer and eventually a department chair.
  sports: Joshua Hamilton hikes the Texas Hill Country weekly with the Dallas Trail Runners, plays casual pick‑up basketball on weekends, follows the Dallas Cowboys, Dallas Mavericks and Texas Rangers,
    and they supplement outdoor activity with a regular 5 k run and occasional yoga to keep their back flexible.
  arts: Joshua Hamilton indulges in contemporary science‑fiction works by N.K. Jemisin and Liu Cixin, curates a jazz playlist featuring Miles Davis, John Coltrane and Kamasi Washington, and they practice
    urban‑architecture photography inspired by Andreas Gursky and Ansel Adams during weekend outings.
  travel: Joshua Hamilton prefers structured weekend getaways, having trekked the Blue Ridge Mountains, explored Kyoto’s historic temples, and they hope to photograph Iceland’s glacial lagoons while balancing
    travel costs via alumni discount programs and meticulous planning spreadsheets.
  culinary: Joshua Hamilton enjoys cooking Tex‑Mex dishes like chicken enchiladas with fresh cilantro and chipotle salsa, experiments with sous‑vide salmon, and they often over‑season meals due to their
    meticulous taste‑testing habit, while also appreciating dark chocolate as a post‑dinner treat.
  core: Joshua Hamilton is a disciplined 29‑year‑old STEM educator who blends strategic curiosity, community‑focused mentorship, and modest indulgences into a life of organized growth, and they consistently
    seek ways to improve both their teaching and personal habits.
background:
  cultural: Joshua is an African‑American raised in the Dallas‑Fort Worth metroplex, where his family placed a strong emphasis on education and community service. He grew up attending a historically Black
    church that celebrated cultural milestones such as Juneteenth and Black History Month, fostering a deep appreciation for his heritage. Family gatherings often featured soulful music, storytelling, and
    discussions about social justice, which shaped his cooperative and considerate nature. He maintains close ties with extended family members who have careers in healthcare and engineering, reinforcing
    a blend of practical ambition and curiosity. Joshua participates in local cultural events, mentors younger Black students in STEM, and values the collective progress of his community.
attributes:
  skills: '[''Teaching Assistance'', ''Laboratory Instruction'', ''Data Analysis'', ''Python Programming'', ''R Programming'', ''MATLAB'', ''Statistical Software (SPSS, SAS)'', ''Curriculum Development'',
    ''Academic Mentoring'', ''Project Coordination'', ''Technical Writing'', ''Time Management'']'
  hobbies: '[''Reading Science Fiction'', ''Chess'', ''Hiking in Texas Hill Country'', ''Community Tutoring'', ''Cooking'', ''Jazz Listening'', ''Photography'']'
  career_goals: Joshua aims to transition from a teaching assistant role to a full-time lecturer in a college of engineering or science, eventually earning a Ph.D. in STEM education. He is passionate about
    developing interdisciplinary curricula that blend theory with hands‑on experimentation, and he hopes to lead research initiatives on effective teaching strategies for underrepresented minorities in
    STEM. Long‑term, he aspires to become a department chair or director of an outreach program that expands access to high‑quality science education for K‑12 students in the Dallas area, particularly those
    from low‑income backgrounds.
