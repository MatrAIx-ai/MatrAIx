  career_goals: Although still in kindergarten, Suzy dreams of becoming an astronaut who can explore distant worlds, or a visual artist who creates fantastical illustrations. She is also fascinated by inventing
    new gadgets and imagines leading a team of young innovators to design interactive art installations. Her ambitions are shaped by a desire to explore novel ideas and to be recognized for her unique creations.
