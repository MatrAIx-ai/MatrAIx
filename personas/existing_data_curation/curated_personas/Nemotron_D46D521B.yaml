personas:
  professional: Suzy Carter is a budding child illustrator whose whimsical sketches, love for space and magical realms, and knack for building narrative LEGO scenes showcase their highly imaginative mind,
    while their spontaneous, structure‑averse nature pushes them to create free‑form art rather than follow rigid lessons.
  sports: Suzy Carter darts around the neighborhood park on a tiny scooter during spring, plays on the local 'Parkside Tigers' junior soccer team in the fall, cheers for the MLB's Chicago Cubs during baseball
    season, and prefers solo nature hikes over organized team sports, reflecting their love of independence.
  arts: Suzy Carter fills sketchbooks with Dr. Seuss‑inspired characters, reenacts scenes from Hayao Miyazaki's 'My Neighbor Totoro' with LEGO, draws inspiration from Mary Blair's vibrant palettes, and
    listens to Yiruma's piano piece 'River Flows in You' while crafting stories, weaving these influences into a unique artistic voice.
  travel: Suzy Carter prefers spontaneous day trips to the nearby coastal beach to collect shells for art, has explored the city zoo and the state’s natural history museum, and dreams of a future adventure
    to the Grand Canyon and the Smithsonian National Air and Space Museum, balancing curiosity with the comfort of familiar family routines.
  culinary: Suzy Carter delights in creamy mac and cheese speckled with cheddar, whips up banana‑spinach smoothies with honey, savors fruit salad featuring strawberries, grapes, and kiwi, can assemble a
    perfect peanut butter and jelly sandwich, yet stubbornly refuses broccoli, turning dinner into a playful negotiation.
  core: Suzy Carter, a six‑year‑old imagination engine, channels boundless creativity into sketches and LEGO worlds while fiercely guarding an independent streak and stubbornly skirting bedtime routines.
background:
  cultural: Suzy is raised in a suburban family in Orange, California, within a predominantly middle‑class American environment. Her household celebrates common U.S. holidays such as Thanksgiving, Halloween,
    and Christmas, and she participates in community events at local parks and libraries. The diverse cultural tapestry of Orange County provides occasional exposure to a variety of traditions, while her
    family emphasizes educational enrichment, independent play, and artistic expression.
