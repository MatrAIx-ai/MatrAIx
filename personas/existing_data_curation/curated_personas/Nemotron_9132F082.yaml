  career_goals: Robert aims to enroll in a STEM‑focused high school and later pursue an engineering degree, with a particular interest in civil or computer engineering that can address practical challenges
    in desert communities. He hopes to earn a robotics competition certification, secure a summer internship at a local engineering firm, and eventually launch a tech startup that provides solar‑energy
    monitoring solutions for homes in Tolleson.
