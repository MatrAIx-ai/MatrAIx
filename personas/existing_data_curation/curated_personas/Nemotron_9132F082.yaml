personas:
  professional: Robert Tollison, a budding robotics enthusiast at his middle school, merges his curiosity for popular science with a disciplined, organized approach to designing and programming LEGO‑based
    robots, often taking the lead on club projects while balancing teamwork and personal initiative.
  sports: Robert Tollison, a dedicated member of the Junior Hoops Club, devotes after‑school hours to basketball, idolizing the Phoenix Suns and emulating their fast‑break strategies, while also trekking
    the nearby desert trails on weekends, treating fitness as both structured team play and solitary endurance.
  arts: Robert Tollison channels his creative side through desert photography inspired by Ansel Adams, binge‑watches the sci‑fi series "Stranger Things," and collects vinyl records of Billie Eilish, blending
    visual and auditory arts into his leisure routine.
  travel: Robert Tollison dreams of exploring the Grand Canyon’s rim and Zion’s canyon walls, while his desert‑hiking habit fuels a wish to trek Patagonia’s trails, and he hopes to attend the International
    Robotics Expo in Tokyo next summer.
  culinary: Robert Tollison, a novice chef, enjoys assembling pepperoni pizza slices with extra cheese, mastering quick ramen bowls, and experimenting with chocolate chip cookie dough, often citing the
    quality of fresh mozzarella and crunchy corn chips as key ingredients.
  core: Robert Tollison is a curiosity‑driven, highly organized teen who balances meticulous LEGO robotics projects with spontaneous desert hikes, disciplined budgeting, occasional allergy neglect, and
    a habit of over‑packing snacks for every adventure.
background:
  cultural: Raised in Tolleson, Arizona, a city with a strong Hispanic influence, Robert grows up experiencing a blend of Southwestern American and Mexican cultural traditions. Family gatherings often feature
    southwestern cuisine such as tacos and grilled meats, and community events include Fourth of July parades, local farmer’s markets, and neighborhood clean‑up projects. While his family identifies as
    white, he is exposed to bilingual neighbors and Spanish phrases in daily life, fostering an appreciation for cultural diversity and community cooperation.
