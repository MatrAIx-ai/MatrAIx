persona_description: A lawyer or legal professional who is interested in understanding the complexities of discovery and production rules in the military context, particularly in the context of the 2009
  term of cases. They are looking for easy frameworks and tools to evaluate these rules and may be seeking guidance on how to distinguish between different definitions of material used in these rules. They
  are likely to be familiar with the terms "material" and "prejudice" and may be seeking guidance on how to apply these concepts in the context of discovery and production rules. They may also be interested
  in learning about the differences between the definitions of material used in the Brady v. Maryland analysis and the definition used in RCM 701(a)(2).
