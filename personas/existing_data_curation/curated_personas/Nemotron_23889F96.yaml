  career_goals: Courtenay aims to become a senior technical leader in the renewable‑energy sector, eventually overseeing the development of next‑generation power conversion systems for grid‑scale storage
    and electric‑vehicle charging infrastructure. She plans to obtain a professional engineering (PE) license within the next two years and to contribute peer‑reviewed publications on wide‑bandgap semiconductor
    converters. Her competitive nature drives her to pursue challenging projects that push efficiency and reliability boundaries. Long‑term, she envisions founding a boutique engineering consultancy that
    delivers innovative solutions to startups focused on sustainable electronics while mentoring young engineers—especially women—through university outreach programs.
