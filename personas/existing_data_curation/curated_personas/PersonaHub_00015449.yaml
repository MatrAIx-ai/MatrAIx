persona_description: A medical professional who specializes in burn care, particularly in the management of fluid resuscitation and the use of IV fluids in burn patients. They have experience with the use
  of Ringer's lactate over normal saline for managing fluid loss in burn patients, and have knowledge of the signs and symptoms of burn injuries, including rapid onset of signs of hypovolemic shock. They
  are aware of the differences in the paths followed through the body by low-voltage and high-voltage current, and are prepared to ask relevant questions if they suspect that a patient may have inhaled
  smoke or another toxic gas.
