personas:
  professional: Minhchau Truong blends hands‑on mechanical expertise with people‑management flair, diagnosing HVAC and plumbing issues, coordinating crews with OSHA compliance, and leveraging CMMS and basic
    CAD to integrate energy‑efficient retrofits, all while mediating conflicts, negotiating vendors, and occasionally forgetting to file paperwork on time because they prefer to stay on the job site.
  sports: Minhchau Truong rides the waves at La Jolla surf break and hikes the Torrey Pines trails with friends, supports the San Diego Padres and the LA Galaxy, belongs to a local surf club that meets
    every Saturday for early‑morning sessions, and maintains a weekly strength‑training routine to stay injury‑free, though they sometimes miss work calls when caught in a perfect swell.
  arts: Minhchau Truong captures urban street art through a vintage Leica, attends gallery openings in the Gaslamp Quarter, participates in mural tours, and strums acoustic guitar at community gatherings
    during Lunar New Year celebrations, drawing creative inspiration from indie folk artists like Sufjan Stevens and contemporary visual artists such as Banksy, while occasionally splurging on limited‑edition
    prints beyond the budget.
  travel: Minhchau Truong prefers weekend road trips to coastal towns like Santa Barbara and spontaneous surf‑focused escapes to Hawaii, while dreaming of a sustainable backpacking adventure across Iceland’s
    geothermal sites, planning most trips with a travel app but allowing room for impromptu detours to discover local music scenes, often overpacking extra gear for photography.
  culinary: Minhchau Truong enjoys cooking traditional Lunar New Year dishes such as herb‑infused broth with rice cakes and preparing fish tacos with fresh cilantro, showcases a moderate cooking skill set
    that shines during community gatherings, delights in experimenting with new spices, and sometimes burns the tops of delicate pastries when rushing to finish before a surf session.
  core: Minhchau Truong is a 27‑year‑old mechanical supervisor who fuses a love of surf, street photography, and community mentorship into a vibrant, slightly impulsive lifestyle that balances sustainable
    ambition with a penchant for spontaneous creativity.
background:
  cultural: Minhchau is a second‑generation Vietnamese‑American. Raised in a bilingual household in San Diego, he grew up speaking both English and Vietnamese and was immersed in Vietnamese customs such
    as Tet, family‑centered meals, and respect for elders. The close‑knit Vietnamese community in the city shaped his values of harmony, cooperation, and giving back, which he expresses through regular
    participation in local cultural festivals, volunteering at the Vietnamese community center, and sharing traditional recipes with friends. At the same time, his American upbringing fostered an independent,
    open‑minded outlook, allowing him to blend both cultural perspectives in his personal and professional life.
attributes:
  skills: '["Mechanical troubleshooting", "HVAC and plumbing systems", "Team leadership", "Project scheduling", "Safety compliance (OSHA)", "Technical documentation", "Vendor management", "CMMS software",
