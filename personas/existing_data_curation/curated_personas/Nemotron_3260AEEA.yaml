  hobbies: '["Surfing", "Hiking", "Urban photography", "Visiting art galleries and murals", "Acoustic guitar", "Cooking Vietnamese cuisine", "Community volunteering (youth mentorship)", "Attending Vietnamese
    cultural festivals"]'
  career_goals: Over the next five years, Minhchau aims to move from first‑line supervision to an operations manager role, overseeing multiple trade crews across larger commercial projects. He plans to
    earn the Certified Maintenance & Reliability Professional (CMRP) credential and complete advanced OSHA training. He is also interested in spearheading green‑retrofit initiatives that reduce energy consumption
    in building systems, positioning his team as leaders in sustainable mechanical solutions. Long‑term, he envisions launching his own boutique mechanical service firm that blends technical excellence
    with a commitment to community mentorship, offering apprenticeships to recent high‑school graduates from his neighborhood.
