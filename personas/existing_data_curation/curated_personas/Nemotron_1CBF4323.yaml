  career_goals: Grant envisions a future where he designs and builds things that explore the unknown. He dreams of becoming an aerospace engineer who helps launch rockets, or a detective who cracks intricate
    puzzles. He also hopes to join a school robotics team and, one day, work on developing video games that challenge players' strategic thinking. His ambition is driven by curiosity, a love for hands‑on
    creation, and a desire to excel in competitive settings.
