personas:
  professional: Grant Lanphere, an aspiring engineer who builds intricate LEGO robots and studies strategy video games, channels his practical curiosity and love of problem‑solving into early design thinking,
    while his relaxed attitude toward chores sometimes leaves parts scattered around the bedroom.
  sports: Grant Lanphere plays for the Meadowbrook Tigers youth soccer club and cheers for the Chicago Cubs whenever a game is on, applying his competitive drive to both the field and the scoreboard, while
    his preference for small groups leads him to focus on one‑on‑one drills with the coach.
  arts: Grant Lanphere devours mystery books like the Enid Blyton Secret Seven series and the Nancy Drew novels, sketches insects with an earnest eye for detail, and regularly listens to cinematic scores
    by Hiroyuki Sawano, letting his reserved side explore worlds of imagination.
  travel: Grant Lanphere enjoys weekend trips to Willow Creek State Park, where he maps trails on a pocket‑sized notebook, and dreams of a future visit to the LEGO House in Billund, balancing his love of
    structured exploration with occasional spur‑of‑the‑moment camping adventures.
  culinary: Grant Lanphere prefers classic chicken nuggets and pepperoni pizza, but experiments with building LEGO‑styled fruit skewers using grapes, melon, and pineapple, showing a playful approach to
    food while sometimes neglecting vegetables unless they’re cut into recognizable shapes.
  core: Grant Lanphere is a curious, competitive eight‑year‑old who builds LEGO machines, scores goals, reads mysteries, and balances a love of order with a habit of leaving projects half‑finished.
background:
  cultural: Grant was raised in a middle‑class, suburban family in Greenville, South Carolina. His household reflects a blend of Southern cultural values—such as a strong sense of community and appreciation
    for local traditions—combined with an emphasis on independence and self‑directed learning. Family gatherings often include backyard barbecues and church events, providing occasional social interaction,
    though Grant generally prefers quieter, smaller settings. The region's emphasis on outdoor activities and a supportive school environment has nurtured his curiosity and practical problem‑solving skills.
