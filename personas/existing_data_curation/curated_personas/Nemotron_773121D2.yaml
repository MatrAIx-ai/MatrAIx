    film watching'', ''Street photography'', ''Solo hiking'', ''Micro‑hackathons'', ''Local maker meet‑ups'', ''Journaling'', ''Mindfulness meditation'']'
  career_goals: Mario aims to become a lead creative technologist within a forward‑thinking studio where he can steer the development of immersive AR/VR narratives and experimental web applications. He
    hopes to launch an indie game label that fuses abstract art with procedural storytelling, positioning himself at the intersection of technology and avant‑garde design. Long‑term, he aspires to contribute
    to open‑source projects that empower under‑represented developers and to mentor emerging coders from the Black tech community, all while maintaining a work environment that values flexibility over strict
    deadlines.
