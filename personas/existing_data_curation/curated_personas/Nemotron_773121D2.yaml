personas:
  professional: Mario Grant is a 25‑year‑old full‑stack creative technologist who blends rapid‑prototype coding, UI/UX design, and generative visual art to craft immersive AR/VR experiences, while their
    spontaneous, competitive nature drives them to constantly push boundaries despite a tendency to resist rigid deadlines.
  sports: Mario Grant enjoys solo trail hikes in the nearby mountains and occasionally joins a weekend pickup basketball league with the downtown community center, cheering on the Chicago Bulls during the
    NBA season and supporting the Chicago Cubs as their favorite MLB team.
  arts: Mario Grant channels their imaginative drive into digital painting inspired by Bee & Pablo, composes glitch‑heavy synth tracks echoing Aphex Twin and Boards of Canada, cites Denis Villeneuve and
    Hayao Miyazaki as cinematic muses, and frequently quotes poet T.S. Eliot in their speculative short stories.
  travel: Mario Grant prefers low‑key, self‑planned micro‑adventures, having trekked the Icelandic Highlands and explored the neon‑lit streets of Tokyo’s Akihabara district, while dreaming of a future retreat
    at the remote Scottish Isle of Skye to sketch and prototype in solitude.
  culinary: Mario Grant’s palate leans toward bold, experimental flavors, often cooking vegan ramen with miso broth, smoked tofu, and fermented kimchi at home, while indulging in occasional craft beer pairings
    with spicy Ethiopian injera dishes when dining out.
  core: Mario Grant lives at the intersection of code and canvas, constantly chasing avant‑garde ideas but habitually missing deadlines, hoarding synth modules, and battling a restless mind that fuels both
    brilliant prototypes and late‑night overthinking.
background:
  cultural: Mario grew up in Ontario, California, as part of a close‑knit African‑American family that emphasized both academic achievement and cultural expression. He was exposed early on to the rich traditions
    of Black music, spoken‑word poetry, and community storytelling, which shaped his artistic sensibility. At the same time, the multicultural fabric of Southern California introduced him to a wide array
    of artistic subcultures, from street art to tech‑driven creativity. This blend of heritage and regional influences fuels his drive to create technology that reflects diverse narratives while navigating
    the unique challenges faced by Black professionals in the tech industry.
