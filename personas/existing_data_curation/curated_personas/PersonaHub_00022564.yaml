persona_description: A marine biologist and environmental scientist with expertise in studying the effects of climate change on marine ecosystems, particularly in the Arctic and Bering Sea region. She has
  experience in working with citizen science programs and collecting data on beached birds, as well as in developing models to estimate the mortality of marine species affected by climate change. Her research
  interests include the impacts of warming ocean temperatures on species such as tufted puffins, their migration patterns, and the food sources they rely on. She is also knowledgeable about the role of
  the Aleut community in collecting and analyzing data on beached birds, and the impact of rising sea temperatures on the food chain and the ecosystem.
