personas:
  professional: Morgan Portanova is an aspiring Certified Nursing Assistant who leverages meticulous organization, basic computer proficiencies, and a naturally empathetic listening style to thrive in clinical
    rotations, balancing a predictable schedule with responsive patient care amidst occasional anxiety-driven overthinking.
  sports: Morgan Portanova is a casual fitness enthusiast who hikes the trails of Radnor Lake on weekends, attends weekly yoga sessions at a downtown studio, and supports the Nashville Predators and Tennessee
    Titans while occasionally joining a community 5K run group in the spring.
  arts: Morgan Portanova is a devoted fan of Americana and country music, regularly listening to artists like Sturgill Simpson, Kacey Musgraves, and Jason Isbell, attending intimate shows at The Bluebird
    Cafe and Exit/In, and capturing sunrise moments on nature photography outings as a creative outlet.
  travel: Morgan Portanova is a modestly adventurous traveler who has road‑tripped to Asheville and Savannah, dreams of exploring the culinary streets of New Orleans and the national parks of Utah, and
    carefully plans each trip around student budget constraints using discount student travel portals.
  culinary: Morgan Portanova is a home‑cook who blends Southern comfort with health by perfecting dishes such as baked collard greens with smoked paprika, quinoa‑crusted catfish, sweet‑potato biscuits,
    and incorporating fresh herbs like basil and cilantro from their garden into weekly meal plans.
  core: Morgan Portanova is a 21‑year‑old chronic planner who journals every night, feeds anxiety with structured routines, occasionally procrastinates on self‑care, and finds peace in cooking, yoga, and
    the occasional live country‑music show.
background:
  cultural: Morgan was raised in a middle-class, predominantly white suburb of Nashville, Tennessee. Her upbringing reflects a blend of traditional Southern values—hospitality, community involvement, and
    a strong emphasis on family and politeness—alongside the progressive, music-focused culture of Music City. She grew up attending local church services and participating in community events such as the
    Nashville Farmers' Market, the Tennessee State Fair, and neighborhood block parties, which fostered her cooperative spirit. Exposure to Nashville's vibrant country, gospel, and indie music scenes has
    shaped her taste in music and her appreciation for live performance. The region's culinary traditions, featuring Southern comfort foods, inspired her interest in cooking and gardening. While she respects
    the cultural expectations of modesty and reliability common in Southern culture, she also embraces the more open, inclusive attitudes prevalent among younger residents of Nashville, especially regarding
    mental health awareness.
attributes:
  skills: '["Organizational planning", "Time management", "Basic Microsoft Office and Google Workspace proficiency", "Active listening", "Empathy and peer support", "Basic first aid and CPR certification",
    "Meal planning and cooking", "Budgeting and personal finance management", "Event coordination for community volunteer projects", "Reflective journaling and writing"]'
  hobbies: '["Journaling", "Baking and cooking (healthy Southern-inspired recipes)", "Garden maintenance (herbs and vegetables)", "Puzzle solving (crosswords, jigsaw puzzles)", "Yoga and guided meditation",
    "Listening to country and Americana music", "Attending live music shows in Nashville", "Volunteer work at community food bank", "Neighborhood clean-up participation", "Hiking and nature photography
    at local parks", "Reading self-help and mental health books"]'
  career_goals: Morgan aims to build a stable, caring career that aligns with her desire for structure and her passion for helping others. She plans to enroll in a community college to earn an Associate's
    degree in Health Sciences and obtain a Certified Nursing Assistant (CNA) credential. Working as a CNA in a supportive healthcare setting will allow her to apply her practical skills, empathy, and reliability
    while maintaining a predictable schedule. Over the next five years, she hopes to pursue further education to become a Registered Nurse, specializing in mental health care, so she can combine her personal
    experience with anxiety with professional expertise. In parallel, Morgan is interested in developing a small weekend catering service focused on nutritious, comfort foods, providing an additional creative
    outlet and supplemental income.
