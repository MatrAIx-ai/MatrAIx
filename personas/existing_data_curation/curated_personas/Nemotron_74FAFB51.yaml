personas:
  professional: Sonalys Rodriguez, a licensed practical nurse with a STEM graduate background, blends advanced wound‑care expertise, health‑informatic proficiency, and meticulous organizational skills to
    lead data‑driven quality‑improvement initiatives while channeling her competitive drive and curiosity into bridging clinical care with emerging technology.
  sports: Sonalys Rodriguez stays active by participating in a Chicago Park District salsa dancing class that doubles as cardio, joining a weekend hiking group at Starved Rock State Park, cheering the Chicago
    White Sox in spring, the Chicago Bears in fall, and the Chicago Fire during summer, while occasionally playing casual volleyball at the community center.
  arts: Sonalys Rodriguez, an avid visitor of the Art Institute of Chicago and the Museum of Contemporary Art, finds inspiration in the bold colors of Frida Kahlo, the street‑wise abstractions of Jean‑Michel
    Basquiat, and the rhythmic pulse of salsa legend Eddie Santiago, often sketching her own interpretations in a battered sketchbook while attending nightly performances at the Chicago Cultural Center.
  travel: Sonalys Rodriguez prefers meticulously planned cultural getaways that blend history and cuisine, such as weekend trips to the historic streets of Old San Juan, a culinary tour of Madrid’s tapas
    bars, a soulful immersion in New Orleans’ jazz scene, and seasonal hikes through the Wisconsin dunes, balancing adventure with a limited budget that favors off‑peak travel.
  culinary: Sonalys Rodriguez, an accomplished home cook, modernizes classic island staples like mofongo, arroz con gandules, and pastelón by experimenting with smoked pork shoulder, fresh cilantro, and
    roasted plantains, while hosting communal meals where guests savor her signature sofrito‑infused sauces alongside creative twists on avocado toast.
  core: Sonalys Rodriguez, a fiercely organized, curiosity‑driven nursing informatics aspirant, channels her competitive edge into relentless health‑equity advocacy, even as chronic worry and an occasional
    late‑night salsa binge betray her otherwise disciplined demeanor.
background:
  cultural: Sonalys was raised in a vibrant Puerto Rican household in Chicago's Little Village neighborhood, where Spanish is spoken daily and family gatherings are anchored by music, food, and storytelling.
    Her parents instilled a strong sense of community responsibility and pride in Puerto Rican traditions, from celebrating La Fiesta de San Juan to preserving the art of bomba and plena. This cultural
    foundation informs her compassionate approach to patient care, especially for Spanish‑speaking residents. She actively participates in local cultural festivals, volunteers with organizations that promote
    health literacy among Latino populations, and incorporates Puerto Rican artistic motifs into her community outreach projects, bridging her heritage with her professional aspirations.
attributes:
  skills: '[''Advanced wound care'', ''IV therapy'', ''Comprehensive patient assessment'', ''Electronic health record optimization'', ''Health informatics analysis'', ''Bilingual patient education (English/Spanish)'',
