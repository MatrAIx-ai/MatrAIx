  hobbies: '[''Visiting art museums and galleries'', ''Sketching urban street art'', ''Salsa dancing'', ''Attending interdisciplinary workshops'', ''Yoga and mindfulness meditation'', ''Journaling'', ''Cooking
    fusion Puerto Rican cuisine'', ''Organizing community potlucks'', ''Participating in hiking clubs'', ''Competing in trivia and board game nights'', ''Volunteering at health education events'']'
  career_goals: Sonalys aims to obtain her Registered Nurse (RN) licensure within the next two years, followed by a specialization in nursing informatics to bridge clinical care and technology. She aspires
    to lead a hospital-wide quality improvement program focused on reducing health disparities in the Latino community of Chicago. Long‑term, she envisions serving as a Nurse Manager or Clinical Informatics
    Specialist, mentoring junior staff while launching a community outreach clinic that integrates health education with culturally resonant art and music programs. Her competitive drive fuels a desire
    to earn national certifications in wound care and informatics, positioning her as a thought leader at healthcare conferences.
