  hobbies: '[''Watercolor painting'', ''Quilting and embroidery'', ''Reading art history and literature'', ''Gardening (herbs and chilies)'', ''Playing traditional Mexican music on keyboard'', ''Participating
    in small-group craft workshops'', ''Volunteer work at community senior center'']'
  career_goals: While approaching retirement, Ana aims to transition to a mentorship role, sharing her practical knowledge with younger maintenance staff at her current workplace and at local community
    college programs. She plans to obtain a Certified Maintenance Manager credential to formalize her expertise and to volunteer part-time at the Garland senior center, where she can oversee facility upkeep.
    Additionally, she dreams of launching a small side venture selling hand-painted ceramic tiles and embroidered textiles, blending her technical precision with her love for art and Mexican folk designs.
