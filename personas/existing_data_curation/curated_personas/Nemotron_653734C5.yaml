personas:
  professional: Frances Scully, a senior market researcher with a STEM graduate background, merges rigorous statistical modeling in Python and R with a curiosity-driven quest for emerging data sources,
    crafting predictive consumer insights that balance methodological rigor with flexible project planning as she pursues a Director of Market Insights role.
  sports: Frances Scully, a member of the Cape Fear Trail Hikers Club, spends Saturday mornings trekking the Cape Lookout coastal trail, supports the UNC Wilmington Seahawks basketball team on game nights,
    and enjoys low-impact kayaking on the Intracoastal Waterway as both exercise and solitude.
  arts: Frances Scully, an avid reader of historical nonfiction, leads spirited discussions of David McCullough and Mary Roach at her book club, attends folk concerts featuring the Avett Brothers and Chris
    Stapleton, and volunteers as a docent at the Wilmington Maritime Museum where she shares stories of shipbuilding while humming classic Southern gospel tunes.
  travel: Frances Scully, a spontaneous planner who maps trips in a worn notebook, favors short coastal escapes to Cape Hatteras and Savannah, dreams of a kayaking expedition in the Azores and a cultural
    immersion in Kyoto, and balances budget constraints with a love for local festivals and farmers’ markets.
  culinary: Frances Scully, a self-taught baker, perfects pecan pie, lemon poppy-seed scones and flaky biscuits using locally sourced honey and organic butter, experiments with garden-fresh heirloom tomatoes
    in shrimp-and-grits, and relies on her stand mixer and cast-iron skillet to showcase her advanced pastry skills.
  core: Frances Scully blends data-driven rigor with garden-fresh curiosity, balancing a competitive edge in research with a relaxed, occasionally disorganized lifestyle that fuels her love for pastries,
    paddles, and perpetual learning.
background:
  cultural: Frances is a white American whose family roots trace back to mid-Atlantic English and Irish ancestry, giving her a blend of Northeastern pragmatism and Southern hospitality. Raised in the Mid-Atlantic
    region before relocating to Wilmington, NC, she absorbed a strong work ethic and a value for practical problem-solving typical of her STEM upbringing. Living on the coast of North Carolina, she has
    adopted local customs such as a love for maritime history, community festivals, and a slower-paced lifestyle that emphasizes flexibility and personal connections. Her cultural identity balances respect
    for tradition with an openness to new ideas, reflecting her personal curiosity tempered by practical experience.
attributes:
  skills: '["Statistical analysis (Python, R, SPSS)", "Advanced Excel modeling", "Survey design and execution", "Predictive modeling and forecasting", "Data visualization (Tableau, Power BI)", "Consumer
    behavior analysis", "Competitive intelligence", "Brand positioning strategy", "Report writing and presentation", "Cross-functional collaboration", "Project management with flexible scheduling"]'
  hobbies: '["Gardening (vegetable & heirloom plants)", "Coastal hiking and birdwatching", "Kayaking", "Historical non-fiction reading", "Book club participation", "Baking Southern pastries", "Attending
    farmers'' markets", "Volunteering at local museum", "Community trivia nights"]'
  career_goals: Frances aims to step into a senior research leadership role within the next three years, such as Director of Market Insights, where she can shape the company's strategic direction and mentor
    junior analysts. She hopes to champion the integration of emerging data sources—social media analytics, IoT-driven consumer signals—while preserving methodological rigor. Obtaining the Professional
    Researcher Certification (PRC) and speaking at industry conferences are on her agenda, as is publishing a white paper on balancing innovative research techniques with practical business outcomes. Ultimately,
    she envisions leveraging her expertise to consult for mid-size firms in the Southeast, offering flexible, insight-driven solutions that drive growth and allow a balanced work-life rhythm.
