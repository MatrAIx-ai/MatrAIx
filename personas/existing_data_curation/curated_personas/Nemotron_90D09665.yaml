  hobbies: '["Sketching city murals", "Reading graphic novels", "Exploring street art", "Bilingual poetry writing", "Creating Scratch animations", "Playing chess", "Participating in school science fairs",
    "Cooking Mexican dishes", "Urban photography", "Collecting vintage comic books"]'
  career_goals: Belkys aspires to study visual arts and computer science at a university where she can merge technology with creative expression. Her long‑term ambition is to become a multimedia artist
    and interactive designer who builds immersive installations that reflect Mexican‑American cultural narratives. She also hopes to create a community‑focused art space in San Francisco that showcases
    emerging artists from diverse backgrounds and provides workshops that blend art, technology, and cultural heritage. Ultimately, she envisions a career that allows her to innovate, challenge conventional
    ideas, and give voice to underrepresented stories.
