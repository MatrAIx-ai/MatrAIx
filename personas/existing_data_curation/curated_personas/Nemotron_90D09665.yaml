personas:
  professional: Belkys Perez is an aspiring digital storyteller who blends bilingual poetry with Scratch animations and mural sketches, channeling a curious yet competitive mindset into meticulously planned
    yet spontaneously creative projects.
  sports: Belkys Perez competes in the local library chess club, follows the San Francisco Giants and Golden State Warriors passionately, and joins a weekend community soccer team at the Mission playground,
    approaching each match with the same strategic intensity and competitive edge they bring to the chessboard.
  arts: Belkys Perez draws inspiration from Frida Kahlo’s vibrant self‑portraits, Diego Rivera’s epic murals, and contemporary street artist Shepard Fairey, while devouring graphic novels such as "Saga"
    and "Ms. Marvel," turning these influences into city‑scape sketches and bilingual poems that echo traditional motifs.
  travel: Belkys Perez dreams of wandering Mexico City’s Coyoacán alleys and exploring Tokyo’s Akihabara for anime inspiration, yet currently spends weekends riding the MUNI to Muir Woods and taking guided
    Mission mural tours, balancing family budget constraints with a love for vibrant street art.
  culinary: Belkys Perez delights in helping her family prepare tamales, pozole, and chilaquiles, mastering the art of hand‑rolling masa, perfecting salsa verde with fresh cilantro and jalapeños, and experimenting
    with plating that mirrors the bold colors of the Mission’s murals.
  core: Belkys Perez is a curious, solitary teen who blends bilingual art with strategic competition, saves every spare cent, battles seasonal allergies, and infuses everyday life with vivid cultural colors
    while habitually double‑checking every detail.
background:
  cultural: Belkys comes from a Mexican‑American family that maintains strong ties to their heritage while living in San Francisco’s vibrant Mission District. She grows up bilingual, speaking Spanish at
    home and English at school, and celebrates cultural traditions such as Día de los Muertos, posadas, and family gatherings centered around Mexican cuisine. The local Latino community, with its murals,
    music, and festivals, profoundly influences her artistic sensibility and fuels her desire to incorporate Mexican cultural motifs into her creative work. Her background provides both a sense of cultural
    pride and a nuanced perspective on navigating multiple identities in a diverse urban environment.
attributes:
