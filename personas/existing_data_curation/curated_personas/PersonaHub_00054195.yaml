persona_description: An educational researcher with expertise in the study of cultural behaviors and their impact on educational outcomes in multicultural contexts. They are interested in exploring the
  differences between two culturally distinct groups, the indigenous Fijians and the Indo-Fijians, and how their cultural behaviors serve different values within each culture. They are likely to use a grounded
  theory methodology to develop a three-construct model of these different values and then use it to predict culturally determined behaviors and educational outcomes in similar multicultural contexts.
