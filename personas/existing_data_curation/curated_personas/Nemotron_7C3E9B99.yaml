  hobbies: '[''Vegetable gardening'', ''Classic car restoration'', ''Historical fiction reading'', ''Crossword and jigsaw puzzles'', ''Bird watching'', ''Listening to bluegrass music'', ''Cataloguing books
    at the library'']'
  career_goals: Michele aims to obtain an ASE Master Technician certification within the next year, solidifying her expertise and opening pathways to a supervisory role at the local auto shop. She envisions
    eventually transitioning to a part‑time consulting position, offering specialized diagnostic services to small garages in Preston County. Long‑term, she hopes to open a modest, women‑friendly workshop
    that provides reliable service while fostering a supportive environment for other under‑represented technicians, allowing her to balance work with a slower pace as she approaches retirement.
