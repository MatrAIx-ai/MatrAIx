personas:
  professional: Michele Plancon, a seasoned automotive technician with over 30 years of expertise in gasoline, diesel and hybrid engine diagnostics, leverages their ASE Master certifications and methodical
    documentation habits to run a highly organized repair workflow while calmly mentoring apprentices, turning the inevitable shop stress into precise, predictable outcomes.
  sports: Michele Plancon enjoys gentle early-morning walks along the Monongahela River, follows the Pittsburgh Steelers, Penguins and Pirates with quiet loyalty, and participates in the Preston County
    Walking Club, favoring low-impact activity that accommodates their arthritis and satisfies their preference for solitary exercise.
  arts: Michele Plancon immerses themselves in historical fiction by authors such as Philippa Gregory and Ken Follett, finds comfort in the bluegrass melodies of Bill Monroe and Alison Krauss during occasional
    jam sessions, and delights in solving intricate jigsaw puzzles that mirror the layered narratives they cherish.
  travel: Michele Plancon plans methodical road trips that blend historic sites and natural scenery, having already visited Colonial Williamsburg, Gettysburg, and the Blue Ridge Parkway, while dreaming
    of a tranquil autumn journey to the Scottish Highlands to photograph ancient castles and local wildlife.
  culinary: Michele Plancon cultivates heirloom tomatoes, sweet corn, and basil in their backyard garden, then crafts vibrant ratatouille, rosemary-infused grilled chicken, and tangy homemade pickles, showcasing
    a confident kitchen style that balances comfort food nostalgia with fresh, seasonal flavors.
  core: Michele Plancon is a meticulous, garden-tending auto veteran who solves engine puzzles and crosswords with equal fervor, prefers quiet mornings of bird-watching over chatter, yet habitually frets
    over every detail from fuel trims to retirement savings.
background:
  cultural: Michele grew up in the Appalachian region of West Virginia, a cultural setting characterized by a strong work ethic, self‑reliance, and close‑knit community ties. Her white, rural heritage includes
    traditions of storytelling, folk music, and a reverence for nature, reflected in her love of the outdoors and bluegrass music. Raised in a modest, faith‑oriented household, she values humility, modesty,
    and practical problem solving. The economic shifts in the coal‑dependent area have reinforced her pragmatic approach to life and career, while her long‑standing ties to Preston County keep her rooted
    in local customs and a sense of regional identity.
attributes:
  skills: '[''Engine diagnostics'', ''Brake and suspension repair'', ''Electrical system troubleshooting'', ''Diesel and hybrid vehicle maintenance'', ''Heavy equipment servicing'', ''ASE certification
