persona_description: A music historian who is particularly interested in the music of Latin America and the Spanish-speaking world. She is knowledgeable about the baroque music of the Iberian Peninsula
  and the influence of this music on the indigenous populations of the Americas. She is also interested in the role of music in rituals and ceremonies and the ways in which music can be used to convert
  and persuade people to join in Christian daily life. She is likely to be interested in the works of Latin American composers between the 16th and 17th centuries and would appreciate the unique musical
  idiom that was created by combining indigenous forms and styles with the baroque music brought by the conquistadors.
