persona_description: David Chiesa, a clinical assistant professor in the department of language and literacy education and coordinator of the online TESOL and world language education program, is a seasoned
  educator who has adapted to the rapidly changing educational landscape due to the COVID-19 pandemic. He is known for his expertise in language teaching and learning, particularly in the context of online
  environments. Chiesa's work involves teaching undergraduate and graduate students how to effectively use technology in the classroom, while also improving the language skills of elementary school students.
  He is an advocate for the importance of technological pedagogical content knowledge and the need to reconceptualize teaching and learning in an era of online spaces.
