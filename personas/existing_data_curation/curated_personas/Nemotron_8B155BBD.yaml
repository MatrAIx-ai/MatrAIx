  career_goals: Michael aims to advance to a regional sales manager role within the next three to five years, overseeing a team and shaping strategic initiatives for new market segments. He aspires to lead
    digital transformation of the sales cycle, integrate advanced analytics into customer outreach, and eventually step into a director‑level position overseeing nationwide business development. To support
    this trajectory, he plans to earn a Certified Sales Professional designation and consider an MBA focused on sales leadership.
