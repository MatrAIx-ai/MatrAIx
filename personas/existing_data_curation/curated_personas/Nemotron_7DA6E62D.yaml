  hobbies: '[''Urban Photography'', ''Visiting Art Galleries and Museums'', ''Cooking Traditional Mexican Cuisine'', ''Hiking in the San Gabriel Mountains'', ''Listening to Indie Rock and Latin Fusion Music'',
    ''Reading Non-fiction on Psychology and Entrepreneurship'', ''Attending Community Cultural Festivals'', ''Creating Digital Mood Boards'']'
  career_goals: Rafael aims to transition from the retail floor to a marketing or brand-management role within the next three to five years. He plans to complete his bachelor's degree in Marketing or Communications,
    enroll in digital-marketing certifications, and leverage his art-focused perspective to work for a lifestyle brand or contemporary art gallery. Ultimately, he envisions opening his own boutique that
    blends Mexican heritage craftsmanship with modern design, combining his retail experience, artistic sensibility, and entrepreneurial drive.
