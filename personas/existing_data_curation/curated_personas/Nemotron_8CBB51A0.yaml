  career_goals: Looking ahead, Imtiaz aims to secure a stable, hands‑on career that leverages his technical aptitude and competitive drive. He plans to enroll in a vocational program after high school to
    earn certifications in computer networking or automotive technology, with the goal of becoming a certified network technician or automotive technician. Over time, he hopes to take on supervisory roles
    where he can lead a small team, apply his problem‑solving skills, and provide reliable support for his community.
