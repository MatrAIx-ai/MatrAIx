personas:
  professional: Imtiaz Biju is a budding tech enthusiast who spends afternoons tinkering with custom gaming PCs and dabbling in beginner-level game development, channeling their competitive streak and love
    for structure into meticulous code and level design while balancing high‑school coursework.
  sports: Imtiaz Biju hustles on the school’s basketball court and joins a local youth soccer league, idolizing the NBA’s Golden State Warriors and the English Premier League’s Manchester United, while
    preferring spontaneous pickup games over regimented training routines.
  arts: Imtiaz Biju’s musical taste blends Bollywood hits by AR Rahman with contemporary hip‑hop tracks from Travis Scott, and they spend weekends streaming Bollywood dance videos while crafting custom
    gaming soundtracks, allowing rhythmic influences to shape their creative expression.
  travel: Imtiaz Biju dreams of wandering through Tokyo’s neon districts and strolling the historic streets of Istanbul after high school, yet currently favors short weekend trips to nearby mountain resorts
    for skiing, planning each outing loosely while leaving room for spontaneous detours.
  culinary: Imtiaz Biju enjoys cooking family recipes such as spiced rice pilaf, marinated grilled chicken seasoned with cumin and paprika, and a hearty lentil stew, boasting a moderate skill level that
    lets them experiment with flavor pairings while often burning the edges of a pizza crust when multitasking between gaming and cooking.
  core: Imtiaz Biju is a competitively driven, socially lively teen who balances a passion for gaming hardware and team sports with a tendency to worry, impulsive spending, and occasional over‑cooking.
background:
  cultural: Imtiaz is a second‑generation South Asian American whose parents emigrated from Kerala, India, and settled in Goochland, Virginia. At home, Malayalam and English are spoken, and the family observes
    cultural celebrations such as Onam and Diwali alongside American holidays. Growing up in a predominantly rural area, he balances the traditional values of his heritage—emphasis on education, family
    cohesion, and respect for elders—with the social dynamics of his local community, participating in school activities and neighborhood events while maintaining ties to the local South Asian cultural
    center.
