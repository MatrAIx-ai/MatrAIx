  hobbies: '[''Gardening'', ''Church choir singing'', ''Bridge club'', ''Reading historical fiction'', ''Genealogy research'', ''Weekend road trips to Great Lakes destinations'', ''Cooking and hosting potluck
    dinners'', ''Community theater'', ''Walking along the St. Clair River trail'']'
  career_goals: As she approaches the final phase of her career, Carly aims to solidify her legacy as a sales leader and mentor within her organization. She is working toward achieving the company's Senior
    Sales Advisor designation and plans to earn a Certified Professional Sales Leader (CPSL) credential. Carly intends to lead a regional mentorship program that equips younger reps with the skills and
    ethical standards she values. Over the next two years, she hopes to maintain a top-10 sales ranking for her territory while also increasing the average contract value through strategic upselling. Long-term,
    she envisions transitioning to a part-time consulting role, helping small businesses in the St. Clair County area develop effective service-selling strategies, and ultimately ensuring a financially
    secure retirement for herself and her family.
