personas:
  professional: Carly Mears, a veteran consultative sales representative who masters Salesforce and Microsoft Dynamics, blends their innate curiosity with meticulous organization to craft tailored service
    solutions, leverages their charismatic, talk‑heavy presence to dominate client meetings, and channels their competitive edge and healthy skepticism into a rigorous pipeline management that consistently
    lands them in the top‑10 sales rankings.
  sports: Carly Mears, a devoted Detroit Lions fan who also cheers for the Detroit Tigers, stays fit through daily walks along the St. Clair River as a member of the River Explorers Walking Club and joins
    the local senior bowling league each winter, treating both cardio and camaraderie as essential components of their active lifestyle.
  arts: Carly Mears, an enthusiastic church‑choir soprano, regularly attends productions at the St. Clair County Community Theater featuring classics like *Our Town* and relishes performances by Lin‑Manuel
    Miranda, while their playlist of Ella Fitzgerald, Frank Sinatra, and contemporary folk artist Brandi Carlile fuels their potluck gatherings and reflects the timeless artistry that shapes their social
    world.
  travel: Carly Mears, who prefers meticulously planned road trips along the Great Lakes—already driving the historic shoreline from Saugatuck to Mackinac Island and dreaming of a scenic cruise through
    the Norwegian fjords—balances their love for leisurely lake‑side picnics with a desire to explore cultural sites like Edinburgh’s Old Town, all while staying within a modest retirement budget and coordinating
    visits with their adult children.
  culinary: Carly Mears, a confident home‑cook who transforms garden‑fresh heirloom tomatoes, sweet corn, and rosemary into signature dishes like their summer vegetable lasagna and garlic‑infused roasted
    chicken, delights guests with classic apple‑cinnamon pie, and enjoys the communal spirit of potluck dinners where they swap recipes and stories over familiar comfort fare.
  core: Carly Mears, a charismatic yet competitively sharp 71‑year‑old sales veteran, blends their endless curiosity with a love for community gardening, choir singing, and weekly bridge games, while occasionally
    hoarding discount coupons and debating every new health recommendation they encounter.
background:
  cultural: Carly grew up in Goodells, a small township in St. Clair County, Michigan, surrounded by a close-knit Midwestern community that values hard work, self-reliance, and neighborly support. Her family
    traces its roots to German and Irish immigrants who settled the region in the late 19th century, and the traditions of those heritages—such as holiday gatherings, church participation, and community
    service—have shaped her worldview. The local culture emphasizes modesty, practicality, and a strong sense of civic duty, which is reflected in Carly's organized approach to work and her commitment to
    giving back through volunteer activities. The seasonal rhythms of the Great Lakes area, from summer lake outings to autumn harvest festivals, further influence her appreciation for nature, seasonal
    cooking, and community celebrations.
