  hobbies: '["Tango dancing", "Watching and playing soccer", "Cooking Argentine cuisine", "Running and beach volleyball", "Photography", "Traveling to South America", "Reading sci‑fi novels", "Listening
    to tech and business podcasts", "Learning new languages (Portuguese, Italian)"]'
  career_goals: Jose aims to transition from a purchasing agent to a strategic sourcing manager within the next three years, eventually stepping into a director‑level procurement role overseeing a regional
    portfolio that includes North and South American suppliers. He plans to earn professional certifications such as CPSM (Certified Professional in Supply Management) and deepen his expertise in AI‑driven
    spend analytics. Long‑term, he envisions launching a consultancy that helps midsize companies build flexible, ethically sourced supply chains, leveraging his Argentine network and curiosity for innovative
    procurement practices.
