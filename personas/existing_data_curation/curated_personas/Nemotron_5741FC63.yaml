personas:
  professional: Jose Bellon is a data‑driven purchasing professional who leverages advanced Excel, Power BI, and SAP to negotiate with Latin American suppliers, embedding sustainable sourcing while balancing
    curiosity for AI‑driven analytics with a pragmatic, sometimes disorganized, approach to project planning, and they frequently prototype new spend‑analysis tools.
  sports: Jose Bellon is a devoted fan of Inter Miami CF, regularly chanting at home games while they also play beach volleyball on the Miami shoreline and fit early‑morning runs along the coast into their
    schedule, balancing competitive spirit with a love for laid‑back beach culture.
  arts: Jose Bellon immerses themselves in tango nights at local milongas, spins Astor Piazzolla records while cooking, and they devour sci‑fi novels by Neal Stephenson and Liu Cixin, melding the rhythm
    of Argentine storytelling with a tech‑savvy curiosity for futuristic narratives.
  travel: Jose Bellon prefers spontaneous weekend getaways, often hopping on a short flight to Buenos Aires to visit family and scout emerging market trends, while they dream of sailing the Patagonian fjords
    and exploring the vibrant street festivals of Cartagena, balancing budget‑consciousness with the occasional splurge on boutique hotels.
  culinary: Jose Bellon loves mastering traditional asado, seasoning ribs with chimichurri and smoked paprika, then creatively fusing Miami seafood by grilling snapper with a citrus‑marinated chimichurri
    glaze, a skill that reflects their comfort in the kitchen yet they have an occasional habit of burning the grill when distracted.
  core: Jose Bellon blends data‑driven precision with a breezy, sometimes forgetful lifestyle, juggling tango steps, beach volleyball, and ambitious procurement goals while they constantly chase the next
    fusion recipe.
background:
  cultural: Born and raised in Buenos Aires, Jose grew up immersed in the vibrant Argentine traditions of family gatherings, tango music, and a deep love for fútbol. His upbringing emphasized conversational
    Spanish, a strong work ethic, and a communal sense of hospitality. After moving to Miami, he integrated into the city’s multicultural tapestry, blending his Latin American roots with the cosmopolitan
    rhythm of South Florida. He remains fluent in Spanish, frequently connects with the Argentine expatriate community, and celebrates cultural holidays like Día de la Patria and Carnaval. This bicultural
    experience informs his professional approach, allowing him to navigate both Argentine and U.S. business environments with ease.
attributes:
