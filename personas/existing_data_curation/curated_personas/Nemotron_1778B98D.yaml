  hobbies: '[''Live Music Events'', ''Culinary Exploration'', ''Home Coffee Brewing'', ''Community Gardening'', ''Hiking'', ''Hosting Dinner Parties'', ''Book Club'', ''Southern Literature'']'
  career_goals: Pamela aims to transition into a management role within the hospitality sector, such as a floor manager or regional supervisor for a coffee‑shop chain, where she can leverage her people‑skills
    and operational insight. She is also interested in opening a boutique coffee lounge that showcases locally roasted beans and hosts community events, blending her love for social interaction with her
    competitive drive to build a reputable brand. Additionally, she wishes to develop a mentorship program for emerging hospitality workers in Knoxville, sharing practical knowledge while staying engaged
    with the evolving industry.
