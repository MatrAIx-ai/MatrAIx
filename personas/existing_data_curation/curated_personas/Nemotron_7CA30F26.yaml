  career_goals: Donna aims to pursue a career that combines her love for helping others with her natural inclination for structure. She envisions becoming a teacher or a school counselor, where she can
    create supportive learning environments and develop organized curricula. In the long term, she is interested in studying education or child psychology, with the ambition of later contributing to community‑based
    youth programs.
