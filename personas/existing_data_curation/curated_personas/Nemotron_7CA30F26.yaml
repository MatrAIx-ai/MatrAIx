personas:
  professional: Donna Short, a driven 12‑year‑old aspiring wildlife researcher, channels her love of non‑fiction animal science books and methodical mindset into school projects and weekend volunteer work
    at the local animal shelter, where they meticulously document animal behavior and draft structured reports for their science club.
  sports: Donna Short thrives on the regimented practice schedule of the middle school soccer team, idolizes the disciplined play of the United States Women’s National Team and local club, the Charlotte
    Independence, and they spend after‑school hours honing footwork drills and recording personal performance stats in a notebook.
  arts: Donna Short channels creative energy into friendship‑bracelet weaving and small‑scale knitting, drawing inspiration from the bright pop‑art of Yayoi Kusama and the catchy tunes of BTS, and they
    often curate homemade scrapbook pages showcasing their crafts alongside annotated animal fact cards.
  travel: Donna Short prefers structured family trips that balance learning and leisure, such as the annual spring visit to the Smithsonian National Zoo and a meticulously planned weekend hike in the Great
    Smoky Mountains, where they keep a travel journal with checklists and photo logs.
  culinary: Donna Short enjoys cooking simple, nutritious snacks like banana‑peanut butter wraps and oatmeal muffins, carefully following step‑by‑step recipes from kid‑friendly cookbooks, and they savor
    the occasional treat of homemade pizza topped with mozzarella, spinach, and pepperoni.
  core: Donna Short is a methodical young animal enthusiast who blends compassion with a love for structure, turning every hobby—from soccer to crafting—into a well‑organized pursuit while they keep a mild
    allergy checklist at the ready.
background:
  cultural: Donna grew up in Chico, a small city in the northern part of California’s Central Valley. Her family’s heritage is rooted in the region’s agricultural community, with frequent visits to local
    farms and farmers’ markets. The community values of cooperation, environmental stewardship, and civic participation are evident in local events like the Chico Farmers Market, the annual Chico Wildflower
    Festival, and school‑led community service projects. Though her cultural background is primarily white, Midwestern‑American, she is exposed to the broader multicultural influences of California through
    school curricula and community programs, fostering an appreciation for diversity while maintaining the traditions of her family, such as celebrating Thanksgiving, Fourth of July parades, and local county
    fairs.
