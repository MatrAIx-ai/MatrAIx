persona_description: A pediatrician or allergist who specializes in the diagnosis and treatment of asthma and allergic diseases in children. They are interested in the epidemiological factors that contribute
  to these conditions, such as allergen sensitization and family history of atopy. They are likely to have a keen interest in the prevalence of asthma and allergic disease in Chinese schoolchildren from
  three southeast Asian populations, and how these factors vary among different regions and populations. They are also likely to be familiar with common inhalant allergens such as house dust mite and cockroach,
  and the impact of their sensitization on respiratory and allergic symptoms.
