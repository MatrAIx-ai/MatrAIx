  career_goals: Although only two, Iris often pretends to be a teacher or a caring veterinarian during play, expressing a budding desire to help others and animals. She loves drawing and sometimes says
    she wants to become an artist when she grows up. Her curiosity drives her to explore new ideas, and she shows an early ambition to learn to read, count beyond three, and eventually perform on a small
    stage for her family, reflecting her organized and confident personality.
