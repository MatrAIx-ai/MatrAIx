personas:
  professional: Jose Madrigal is a budding robotics enthusiast who channels their methodical curiosity into constructing Arduino‑based projects for their school’s robotics club, and they balance strategic
    planning with a fierce competitive drive to top the tournament leaderboard.
  sports: Jose Madrigal captains the Beaumont United youth soccer team, chronicling each practice in a detailed training journal while cheering for the LA Galaxy in the MLS, and they channel their competitive
    spirit into both the season’s league matches and local weekend pickup games.
  arts: Jose Madrigal blends their love for regional Mexican corridos by Los Tigres del Norte and banda music with a voracious appetite for science‑fiction novels like Ender’s Game, often sketching futuristic
    robots in the margins of their notebooks, and they sharpen their rhetorical skills through the school debate club.
  travel: Jose Madrigal enjoys family road trips to coastal attractions such as San Diego’s beaches and Disneyland, meticulously planning each itinerary with a spreadsheet, and they dream of a future pilgrimage
    to Mexico City’s historic Zócalo to experience its vibrant street art and culinary scene.
  culinary: Jose Madrigal eagerly assists their family in preparing tacos al pastor and hand‑rolled tamales, perfecting their guacamole with ripe avocados, lime, and a pinch of chile, and they even experiment
    with a simple Arduino temperature sensor to gauge the ideal salsa heat.
  core: Jose Madrigal, a 13‑year‑old tech‑savvy soccer enthusiast, balances a relentless competitive streak and meticulous planning with a chronic worry that fuels both their drive to excel and frequent
    overthinking, and they often channel that energy into late‑night coding sessions.
background:
  cultural: Jose comes from a Mexican-American family that maintains strong ties to Mexican traditions while embracing life in Southern California. He speaks both Spanish and English fluently and celebrates
    cultural events such as Dia de los Muertos, Mexican Independence Day, and family gatherings featuring traditional foods like tacos and tamales. His Catholic upbringing influences his values of community,
    respect (respeto), and family (familia). Growing up in Beaumont, he experiences a blend of Mexican cultural heritage and the broader American context, which shapes his identity and outlook.
