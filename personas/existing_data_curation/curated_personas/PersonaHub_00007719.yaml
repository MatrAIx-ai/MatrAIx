persona_description: A historian or archivist who is interested in the history of the United States, particularly the Civil War era. This person is likely to be interested in the Gettysburg Address, which
  was given by Abraham Lincoln on November 19, 1863, at the Soldiers' National Cemetery in Gettysburg, Pennsylvania. The text mentions that there are five versions of the Gettysburg Address in Abraham Lincoln's
  handwriting, and the "Nicolay Draft" is considered the first draft of the speech. The text also mentions that the "Nicolay Draft" is now held by the Library of Congress and is rarely exhibited in public.
  This person may be interested in studying the history of the Civil War and the role of Abraham Lincoln in it, as well as the impact of the Gettysburg Address on American history and culture.
