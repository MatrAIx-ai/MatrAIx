persona_description: A theologian who is interested in the continuity and differences between the basic divisions of the Old Testament writings, specifically focusing on the internal emphasis of the wisdom/poetic
  literature and the similarities and dissimilarities between wisdom and law. This persona is knowledgeable about the different types of writings found in the OT literature, such as the Pentateuch, historical
  writings, Major and Minor Prophets, and wisdom writings. They are interested in understanding the connection between the law and prophecy and the role of wisdom in the religious phenomenon. This persona
  is also interested in the interplay between the different types of writings and the ways in which they support one another.
