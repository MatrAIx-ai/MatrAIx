persona_description: A neuroscientist with expertise in the study of muscle function, particularly in the use of TMS (Transcranial Magnetic Stimulation) to investigate the human neuromuscular system. They
  have a strong interest in understanding the mechanisms of muscle contraction and the development of neuromuscular disorders. They are skilled in using TMS to study muscle groups such as the FCR and ES,
  and are experienced in using TMS to study the human neuromuscular system. They are also interested in the role of inhibitory synapses in muscle function and the development of neuromuscular disorders.
