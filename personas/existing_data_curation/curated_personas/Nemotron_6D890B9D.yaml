  hobbies: '[''Pickup basketball'', ''Soccer'', ''Trivia nights'', ''E‑sports gaming'', ''Hiking in Columbia River Gorge'', ''River fishing'', ''Live‑music concerts'', ''Karaoke'', ''Woodworking projects'',
    ''Tool tinkering'']'
  career_goals: Edward aims to advance beyond the labor floor into a supervisory or logistics coordination role within the next three to five years. He plans to obtain certifications in forklift safety,
    supply chain management, and eventually pursue a bachelor's degree in logistics or business administration. His long‑term ambition is to become a warehouse manager overseeing multiple sites, and later
    to launch his own freight brokerage or logistics consultancy, leveraging his curiosity for emerging supply‑chain technologies while applying his practical, results‑driven approach.
