personas:
  professional: Jonie Berger, a budding micro‑engineer at two, constructs intricate towers from wooden blocks, meticulously sorting pieces by size and hue while occasionally improvising new designs, reflecting
    a balance of curiosity and practical organization.
  sports: Jonie Berger, an enthusiastic backyard soccer enthusiast, practices dribbling with a soft foam ball while cheering for the Riverdale Rovers junior team, preferring one‑on‑one play over large group
    games.
  arts: Jonie Berger, a budding vocalist, belts out Raffi's "Baby Beluga" and sketches simple stick‑figure scenes of beloved characters like Peppa Pig, finding solace in quiet, solitary creative sessions.
  travel: Jonie Berger, a curious explorer, has already delighted in a day at the city zoo and a weekend at the nearby botanical garden, and eagerly awaits a family trip to Disneyland to experience the
    magic of the iconic castle.
  culinary: Jonie Berger, a selective little gourmand, relishes crunchy peanut butter on whole‑grain toast, bites of ripe banana, and bite‑sized avocado cubes, while politely turning down peas and broccoli.
  core: Jonie Berger, a calm and curious two‑year‑old, balances methodical play with spontaneous imagination, prefers quiet moments with a few close companions, and displays an early knack for organized
    sorting and cautious saving.
background:
