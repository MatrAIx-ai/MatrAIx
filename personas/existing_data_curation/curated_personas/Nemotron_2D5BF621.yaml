  career_goals: Patricia aims to transition into a senior supervisory or training role within the air traffic control environment, where she can lead safety initiatives, develop standardized operating procedures,
    and mentor the next generation of controllers. She hopes to obtain an FAA Advanced Trainer certification and contribute to regional emergency preparedness programs, ultimately shaping a more reliable
    and harmonious airfield operation culture before planning for a phased retirement.
