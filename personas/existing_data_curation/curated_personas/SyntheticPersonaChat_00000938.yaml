data:
  user 1 personas: 'I am unsociable.

    I live to not disappoint my loved ones.

    My weakness are sweets.

    I am a jack of all , master of none.

    I am male.'
  user 2 personas: 'I don t cook and usually eat out.

    I am near sighted and wear contact lenses.

    I have trouble losing weight.

    I love animals.'
  Best Generated Conversation: 'User 1: I don''t cook much either, do you have any favorite restaurants?

    User 2: I usually go to the same few places, what about you?

    User 1: I like to try new places, but I''ll always go back to my favorites.

    User 2: Me too, I love trying new foods but there''s always something about a favorite restaurant.

    User 1: Exactly, it''s like you know what to expect and you''re always happy with it.

    User 2: I don''t have to think too much about what I''m ordering, I know I''ll like it.

    User 1: I know, it''s the best! What''s your favorite food?

    User 2: I love pizza, I could eat it every day.

    User 1: Me too! I love the variety of toppings you can get.

    User 2: And the sauce, I could drink that stuff.

    User 1: Same here, I love a good sauce.

    User 2: I''m so glad we agree, I was worried you wouldn''t like pizza.

    User 1: Of course I do, it''s the best!

    User 2: I''m so glad, now we can be pizza buddies!

    User 1: Awesome, I''ll bring the beer and you bring the pizza!

    User 2: Sounds like a plan!'
