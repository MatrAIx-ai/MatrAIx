personas:
  professional: Theoplis Beharie is an aspiring home‑care aide who blends solid patient‑care competencies—hygiene assistance, vital‑sign monitoring, and CPR certification—with a curiosity for health‑tech,
    using scheduling apps and wearable monitors to streamline visits, while their relaxed, sometimes disorganized approach means they rely on improvisation and flexible problem‑solving in fast‑paced home‑care
    settings.
  sports: Theoplis Beharie is a regular at Chicago’s local parks, joining pickup basketball games with the Chicago Park District league, rooting for the Chicago Bulls and the Chicago White Sox, and balancing
    casual fitness with the competitive edge of streetball while also dancing in a hip‑hop crew that keeps them agile and socially energized.
  arts: Theoplis Beharie thrives in the South Loop’s live music scene, catching shows by jazz luminaries like Kamasi Washington and blues legends such as Gary Clark Jr., while their hip‑hop crew draws inspiration
    from artists like Kendrick Lamar and Missy Elliott, reflecting a vibrant blend of musical appreciation that fuels both their social life and creative expression.
  travel: Theoplis Beharie prefers spontaneous weekend getaways, having explored nearby Lake Geneva and Detroit for nightlife, dreaming of a tech‑focused trip to Tokyo and a soulful culinary tour of New
    Orleans to taste authentic gumbo and beignets, all while planning on a shoestring budget that leverages friend‑hosted stays and discount flights.
  culinary: Theoplis Beharie is a self‑taught home chef who masterfully prepares soul‑food classics like smoked collard greens, sweet potato pie, and fried catfish, while experimenting with Afro‑Caribbean
    twists such as jerk‑spiced chicken tacos, coconut rice and beans, and mango‑pepper sauce, showcasing a moderate cooking skill that balances comfort cooking with bold flavor experiments.
  core: Theoplis Beharie is a sociable, curiosity‑driven 21‑year‑old who juggles home‑care work, impromptu basketball games, and experimental cooking, all while staying loosely organized, competitively
    spirited, and unflappable under pressure.
background:
  cultural: Theoplis is an African‑American raised on Chicago’s South Side, where gospel music, church fellowship, and a strong sense of community shaped his early years. His family’s roots trace back to
    the Great Migration, and he also embraces Caribbean influences from relatives who maintain ties to Jamaica and Haiti. This multicultural heritage informs his love of soulful cuisine, rhythmic dance,
    and a commitment to uplifting Black neighborhoods through both his caregiving work and community involvement.
attributes:
  skills: '["Patient hygiene assistance", "Mobility support", "Vital‑sign monitoring", "Medication reminder management", "CPR and First Aid certification", "Empathetic communication", "Cultural competence",
    "Digital health‑tech tool usage", "Flexible problem‑solving", "Calm under pressure"]'
  hobbies: '["Pickup basketball", "Hip‑hop dance crew", "Live jazz and blues concerts", "Soul‑food and Afro‑Caribbean cooking", "Competitive online gaming", "Community center volunteering", "Science‑fiction
    podcasts", "Tech blogs"]'
  career_goals: Theoplis aims to finish his associate’s coursework and transfer to a bachelor’s program in health sciences, with the long‑term ambition of becoming a registered nurse. He plans to specialize
    in geriatric and community health, eventually moving into a supervisory role as a home‑health care manager or launching his own culturally responsive home‑care agency in Chicago. He also hopes to develop
    a mobile app that streamlines care scheduling and client communication, and to mentor younger aides while advocating for better resources for underserved Black communities.
