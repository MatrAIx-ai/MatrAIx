  hobbies: '[''Gardening'', ''Birdwatching'', ''Knitting'', ''Reading mystery novels'', ''Family genealogy research'', ''Nature walks'', ''Pottery'', ''Community cooking'', ''Digital photography (learning)'']'
  career_goals: In her later years, Donna aims to remain physically active and mentally sharp while deepening her connection to family and community. She plans to continue tending her garden as a source
    of health and satisfaction, and she wishes to pass on her gardening and cooking knowledge to her grandchildren through hands‑on lessons. Donna is motivated to document her family’s history and favorite
    recipes in a small memoir that could be shared at future family reunions. She also hopes to expand her volunteer role at the senior center by mentoring new volunteers and leading a weekly “Heritage
    Crafts” workshop where participants learn knitting, sewing, and simple food‑preservation techniques. Learning basic digital photography to capture garden moments is another personal ambition she is
    pursuing.
