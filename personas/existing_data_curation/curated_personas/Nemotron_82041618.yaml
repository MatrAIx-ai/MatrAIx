  career_goals: Looking ahead, Mary aims to transition into a supervisory or mentorship role within the retail setting, such as a shift lead or trainer, where she can share her knowledge and foster a supportive
    team culture. She also plans to obtain a short-term certification in retail management to formalize her expertise. As she approaches retirement, she wishes to balance work with increased community involvement,
    perhaps volunteering as a coordinator at a local food-bank or senior center. Maintaining a stable income while carving out more time for her hobbies and family is a central ambition.
