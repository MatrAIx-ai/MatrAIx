personas:
  professional: Mary Minger, a seasoned retail cashier with over three decades of expertise in cash handling, point‑of‑sale systems, and inventory management, leverages her practical mindset and compassionate
    demeanor to mentor new hires and aspires to transition into a shift‑lead role where her structured approach fosters a calm and supportive shop floor.
  sports: Mary Minger, an avid walker who joins a senior walking club in White River State Park and a devoted fan of the Indianapolis Colts and Indiana Pacers, channels her love of routine into weekly cardio
    sessions while also enjoying casual bingo nights at the local senior center.
  arts: Mary Minger, who sings alto in her church choir, immerses herself in classic cinema such as "Casablanca" and "Singin' in the Rain," and participates in a historical‑fiction book club that often
    discusses works by Hilary Mantel and Ken Follett, allowing her to blend community, nostalgia, and literary exploration into her leisure.
  travel: Mary Minger, who prefers thoughtfully planned itineraries, enjoys weekend road trips to Chicago’s museums and Nashville’s music scene, and has a longstanding wish to embark on a Mediterranean
    cruise visiting Italy and Greece as a rewarding retirement adventure, balancing her love for accessible travel with budget considerations.
  culinary: Mary Minger, an enthusiastic home cook, delights in preparing traditional soul‑food classics such as slow‑cooked collard greens, buttery cornbread, and sweet‑potato pie, skillfully blending
    herbs like thyme and smoked paprika, and frequently shares these meals at Sunday gatherings, though she occasionally over‑season dishes in her quest for bold flavor.
  core: Mary Minger, a 64‑year‑old who balances meticulous organization with heartfelt community service, is known for double‑checking every receipt, humming hymns while quilting, and the occasional habit
    of over‑stocking her pantry with canned goods.
background:
  cultural: Mary is an African-American woman who grew up in Indianapolis during the civil‑rights era, a period that shaped her values of community, resilience, and mutual support. Her family’s roots trace
    back to the Great Migration, and they have maintained strong ties to the local Black church, where gospel music, fellowship, and service are central. She embraces cultural traditions such as soul-food
    cooking, storytelling, and participation in city events like the Indiana Black Expo. Mary’s cultural identity informs her compassionate outlook, her dedication to helping neighbors, and her pride in
    contributing to the vibrant Black community of Marion County.
