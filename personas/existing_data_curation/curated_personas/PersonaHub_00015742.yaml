persona_description: A scientist at the University of Birmingham who specializes in the study of bone tissue, particularly in the development of new bone tissue in a lab setting. They are particularly interested
  in studying the effects of drugs on bone formation and the potential to use a lab-grown model to study the synthesis and organisation of bone tissue. They are also interested in the potential of using
  such a model to screen agents for promoting new bone formation and gaining a better understanding of how bone tissue is synthesised and organized into the complex structure that protects and supports
  the function of soft tissues within the body.
