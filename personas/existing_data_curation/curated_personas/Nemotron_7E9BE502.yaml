    Optimization & SOP Documentation'', ''Mentorship & Training'']'
  hobbies: '[''Visiting Art Galleries'', ''Watercolor Painting'', ''Reading Art History and African-American Literature'', ''Crossword Puzzles'', ''Journaling Travel Experiences'', ''Volunteering with Arts
    Council'', ''Teaching Youth Art Workshops'', ''Attending Jazz and Gospel Concerts'', ''Swimming'', ''Nature Walks in Lakeland Lakes'']'
  career_goals: Barbara aims to transform her current lodging property into a boutique destination that serves as a living gallery for regional Black artists, pursuing a sustainability certification (LEED)
    while boosting occupancy to 95% across peak seasons. She plans to secure a grant to fund an artist‑in‑residence program, and to mentor a younger manager who will succeed her. Within the next five years,
    she hopes to become a regional hospitality consultant, sharing her model of integrating arts and community engagement with other independent hotels in Central Florida. Ultimately, she envisions authoring
    a guidebook on curating cultural experiences in lodging, solidifying her legacy in the industry.
