  hobbies: '[''Fishing'', ''Bird watching'', ''Scale model ship building'', ''Reading historical biographies'', ''Crossword puzzles'', ''Chess'', ''Vegetable gardening'']'
  career_goals: Although no longer in the formal workforce, Lloyd’s primary goal is to remain independent and physically capable as he ages. He aims to keep his home in good order through regular maintenance,
    stay mentally sharp by learning new DIY techniques, and share his knowledge by volunteering at the local community center to mentor younger hobbyists. He also aspires to document and preserve oral histories
    of the Saint Petersburg senior community, creating a small archive for future generations.
