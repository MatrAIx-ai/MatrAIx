personas:
  professional: Angela Brister is a precision-oriented hair stylist who fuses advanced balayage and custom color formulation with a fine-art eye, using their organized scheduling habits to keep the boutique
    running smoothly while allowing quiet, solo moments for experimental styling that showcase their assertive yet compassionate client consultations.
  sports: Angela Brister cheers for the Washington Wizards and the Baltimore Ravens, belongs to a local hiking club that meets for weekend treks in the Catoctin Mountains, and practices yoga twice a week
    at a boutique studio to maintain flexibility and stress relief.
  arts: Angela Brister draws artistic inspiration from watercolorist John Singer Sargent, contemporary sculptor Anish Kapoor, and playlists featuring Sufjan Stevens and Lykke Li, regularly attends exhibitions
    at the Smithsonian American Art Museum and intimate gallery openings that blend visual art with their styling concepts.
  travel: Angela Brister prefers low-key, nature-rich getaways, having trekked the Scottish Highlands and explored the lavender fields of Provence, and now dreams of a solo retreat to Japan’s Shikoku island
    to study traditional indigo dyeing while budgeting carefully to fund their future eco-friendly boutique salon.
  culinary: Angela Brister enjoys crafting simple plant-based meals such as quinoa bowls with roasted beetroot, walnut pesto, and avocado, is skilled at making lavender-infused honey, often skips breakfast
    in favor of a strong espresso, and occasionally experiments with homemade natural hair masks that double as culinary-inspired spa treatments.
  core: Angela Brister is a solitary, art-obsessed hair stylist who balances meticulous organization with eco-friendly creativity, channeling their curiosity and occasional anxiety into a vision of a sustainable
    boutique salon.
background:
  cultural: Angela grew up in a middle‑class white family in the suburban corridors of Montgomery County, Maryland. Her upbringing combined Mid‑Atlantic values—emphasis on hard work, community involvement,
    and respect for personal space—with frequent visits to Washington‑area museums and galleries that nurtured her curiosity about art. Family traditions include celebrating seasonal holidays with homemade
    meals and supporting local small businesses, shaping her appreciation for craftsmanship, personal connection, and the quiet dedication needed for artistic pursuits.
attributes:
  skills: '[''Precision Hair Cutting'', ''Balayage & Ombre Coloring'', ''Chemical Texturizing (Perms, Relaxers)'', ''Color Theory & Custom Color Formulation'', ''Client Consultation & Personalized Styling'',
    ''Salon Scheduling & POS Management'', ''Sanitation & Hygiene Protocols'', ''Basic Makeup Application'', ''Nail Grooming'', ''Social Media Marketing for Salon'']'
  hobbies: '[''Watercolor Painting'', ''Sketching'', ''Art History Reading'', ''Design & Fashion Podcasts'', ''Mindfulness Journaling'', ''Hiking in Local Parks'', ''DIY Natural Hair Care Experiments'',
    ''Photography of Textures'', ''Independent Film Watching'', ''Volunteer at Community Art Workshops'']'
  career_goals: Angela aims to obtain a master cosmetology license and open her own boutique salon in Montgomery County within the next five years. She plans to specialize in eco‑friendly, cruelty‑free
    hair treatments, develop a line of natural hair‑care products, and become a mentor for aspiring stylists. She also hopes to host intimate art‑focused events in her salon, blending her love of visual
    arts with hairstyling, and ultimately be recognized as an innovative trend‑setter who balances creativity with sustainable practices.
