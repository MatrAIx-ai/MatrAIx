  career_goals: John aims to complete his associate's degree in facilities management and earn certifications in OSHA safety and HVAC maintenance. He envisions progressing to a facilities manager role at
    a cultural institution, such as a museum or university gallery, where he can blend his operational expertise with his love for art. Long‑term, he hopes to own a small studio space that serves both as
    a creative hub and a model of sustainable building maintenance.
