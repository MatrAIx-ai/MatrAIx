personas:
  professional: John Olsen is a facility maintenance specialist who blends meticulous OSHA compliance with a creative eye for design, using their knack for organization to keep cultural spaces humming while
    their curiosity drives them to prototype sustainable cleaning methods.
  sports: John Olsen enjoys weekend hikes through the Iowa Loess Hills, mid‑summer road‑bike rides with the Des Moines Cycling Collective, and seasons the excitement of cheering on the Iowa Hawkeyes football
    team in the fall and attending Iowa Cubs baseball games in the spring.
  arts: John Olsen spends evenings sketching cornfield panoramas inspired by Grant Wood, curates Instagram photo series echoing Monet’s pastel palettes, and relaxes with acoustic renditions of Bob Dylan,
    while regularly attending community theater productions featuring local playwrights.
  travel: John Olsen prefers low‑key road trips to nearby state parks such as Ledges State Park and spontaneous weekend adventures in Chicago’s museum districts, but dreams of a study‑away in Santa Fe to
    soak up its adobe architecture and Southwest light.
  culinary: John Olsen enjoys cooking hearty Midwestern meals like pork tenderloin with apple‑cider glaze, skillet corn succotash, and herb‑infused roasted beets, relying on fresh farmer‑market produce
    and a trusty cast‑iron skillet while pairing dishes with locally roasted coffee and maple syrup.
  core: John Olsen is a facility‑savvy art lover who balances cleaning checklists with sketchpads, can’t resist a sunrise hike, and sometimes forgets to water houseplants while daydreaming about sustainable
    studio spaces.
background:
  cultural: John was raised in Peosta, a small Midwestern community in Iowa with strong values of hard work, modesty, and community service. His family traces its roots to Norwegian immigrants, giving him
    a modest Lutheran heritage blended with local Catholic and Protestant influences common in Dubuque County. He grew up attending county fairs, church gatherings, and local school events, which fostered
    a respect for tradition while his curiosity encouraged openness to new ideas, especially in the arts. This blend of Midwestern pragmatism and cultural curiosity shapes his outlook and daily life.
