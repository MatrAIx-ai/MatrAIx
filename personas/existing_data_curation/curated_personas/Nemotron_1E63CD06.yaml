personas:
  professional: Diane Kane is an aspiring junior robotics coder who blends their love for science fiction with meticulous garden planning, using simple programming languages like Scratch to prototype game
    concepts and miniature rockets, while their methodical and calm nature ensures every project follows a detailed step‑by‑step checklist.
  sports: Diane Kane enjoys low‑impact fitness, spending weekends hiking the nearby woods with the local nature club, following the high school cross‑country team, and cheering for the regional baseball
    squad, the Riverdale Raptors, while keeping a personal log of distance run and heart‑rate trends.
  arts: Diane Kane finds artistic inspiration in the pixel art of indie game developer Henk Boom, the lyrical storytelling of songwriter Taylor Swift, and the animated worlds of Studio Ghibli’s 'Spirited
    Away', often sketching scene concepts while listening to Einaudi’s piano suites to fuel their creative brainstorming.
  travel: Diane Kane prefers meticulously planned trips that blend education and adventure, having camped in Yosemite National Park and explored the historic streets of Boston, while dreaming of a future
    family vacation to the cherry blossoms of Kyoto and the aurora borealis in Iceland.
  culinary: Diane Kane delights in preparing simple, garden‑fresh meals like basil‑pesto pasta and roasted carrot‑ginger soup, demonstrating a budding cooking skill that balances precise measurement with
    experimental seasoning, and they relish tasting fresh herbs harvested from their own backyard.
  core: Diane Kane is a calm, curiosity‑driven teen who organizes every hobby—from coding to gardening—into tidy journals, rarely lets anxiety intrude, and occasionally forgets to reply to texts because
    they’re lost in a puzzle.
background:
  cultural: Diane was raised in Willis, Texas, a close‑knit, predominantly white community where Southern hospitality and neighborly support are everyday values. Her family participates in local church
    gatherings, community clean‑up events, and county fairs, fostering a sense of collective responsibility. The regional culture emphasizes practical skills, respect for the outdoors, and a modest, self‑reliant
    ethos that aligns with her calm and resilient nature. Traditions such as celebrating the Fourth of July with fireworks, enjoying backyard barbecues, and attending high school football games have shaped
    her appreciation for community rituals and the rural Texan way of life.
attributes:
  skills: '[''Organizational planning and time management'', ''Research and information synthesis'', ''Basic programming (Scratch, Python)'', ''Digital presentation design (Google Slides)'', ''Gardening
