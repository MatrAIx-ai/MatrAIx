  hobbies: '[''Reading (science fiction and non‑fiction)'', ''Nature walks and birdwatching'', ''Gardening'', ''DIY model building (LEGO, model rockets)'', ''Basic coding and game design'', ''Journaling
    and planning'', ''Puzzle solving (Sudoku, crosswords)'']'
  career_goals: Diane aspires to pursue a career in civil engineering with a focus on sustainable community infrastructure, aiming to design safe, eco‑friendly spaces for small‑town environments like her
    own. She hopes to deepen her STEM knowledge in high school, participate in robotics and environmental clubs, and earn internships that blend technical problem‑solving with community service. Long‑term,
    she envisions leading projects that create local green spaces and mentorship programs that encourage other young students to explore practical, hands‑on learning.
