personas:
  professional: Wayne Horton, a 30‑year‑old bartender and aspiring beverage director, blends technical mixology with a keen eye for Midwestern art, using spontaneous creativity and empathetic service to
    tailor each drink while often sidestepping strict inventory protocols in favor of on‑the‑fly improvisation.
  sports: Wayne Horton enjoys solo hikes on the Kettle Moraine trails and tranquil fishing trips with the Fox River Anglers Club, follows the Milwaukee Bucks and Green Bay Packers avidly, but prefers low‑impact
    cardio over team sports, often slipping into a weekend routine of early‑morning runs to reset after busy shifts.
  arts: Wayne Horton immerses themselves in the local art scene, sketching murals inspired by the works of muralist Brian Hargreaves, collecting vintage jazz vinyl from Miles Davis and indie records from
    Bon Iver, and curating Instagram reels that pair cocktail creations with visits to the Milwaukee Art Museum and neighborhood galleries.
  travel: Wayne Horton favors spontaneous road trips to nearby craft‑beer havens like Grand Rapids, plans occasional weekend getaways to the shores of Lake Michigan, dreams of exploring the street‑art alleys
    of Berlin and the hiking trails of Iceland, yet balances travel with a modest budget and limited leave from the bar.
  culinary: Wayne Horton cooks simple, farm‑to‑table meals such as wild‑rice risotto with smoked sage and local honey‑glazed pork chops, perfects homemade rosemary‑elderflower syrups for cocktails, and
    revels in tasting craft beers like New Glarus Mocha Light, often experimenting late into the night while neglecting to clean the kitchen promptly.
  core: Wayne Horton is a restless bartender‑artist who channels spontaneous creativity into cocktails and murals, hoards vinyl and craft‑brew finds, procrastinates on paperwork, and finds solace in quiet
    hikes and late‑night kitchen experiments.
background:
  cultural: Wayne grew up in the Upper Midwest, raised in a modest, middle-class family of German-Polish ancestry in Brown County, Wisconsin. The region's strong brewing tradition, seasonal farm produce,
    and tight-knit community values have shaped his appreciation for craft drinks and local art. He was taught to respect hard work, modesty, and cooperation, while his parents encouraged curiosity and
    exposure to diverse ideas, leading to his love for unconventional thinking. Regular participation in town fairs, church gatherings, and community theater introduced him to a blend of tradition and creative
    expression that continues to influence his personal and professional life.
