  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Photography'', ''Listening to Vinyl Records'', ''Experimenting with Homemade Infusions'', ''Hiking'', ''Fishing'', ''Cooking with Local Ingredients'',
    ''Craft Beer Tasting'', ''Board Games with Close Friends'', ''Attending Small Live-Music Shows'']'
  career_goals: Wayne aims to deepen his expertise by earning a Certified Specialist of Spirits credential and completing his undergraduate degree in hospitality management. In the medium term, he hopes
    to become a beverage director for a boutique restaurant or open his own intimate bar that blends seasonal Midwestern ingredients with art-themed cocktail experiences. He also dreams of publishing a
    small recipe collection that highlights his signature drinks and the stories behind local artworks, and eventually mentoring aspiring bartenders, helping them balance creativity with the practical demands
    of the industry.
