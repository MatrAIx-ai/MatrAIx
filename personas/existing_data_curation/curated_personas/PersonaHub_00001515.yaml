persona_description: A seasoned emergency planner and manager who is interested in developing and implementing effective emergency plans for various types of disasters. They are looking for a comprehensive
  and systematic primer on emergency planning that covers the basics of emergency management, including strategies, protocols, and procedures. They are also seeking a reference source and manual that can
  help them extract ideas, suggestions, and pro-forma methodologies to design and implement emergency plans. They are familiar with the concept of a comprehensive all-hazards approach and appreciate the
  importance of considering the most important individual hazards and the planning and management needs that they create. They are likely to be a member of the new generation of emergency planners and managers
  who are emerging as a result of increased governmental interest in disaster preparedness. They are also likely to have a practical interest in how disasters are planned for and managed, and to be interested
  in the professional workers and trainees who will eventually have to participate in disaster plans.
