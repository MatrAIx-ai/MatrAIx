  career_goals: Even in her eighties, Corine remains motivated to make a meaningful impact. She aims to expand intergenerational art workshops that bring seniors and youth together, documenting and sharing
    Tulsa’s oral histories to preserve the city’s cultural legacy. Maintaining personal health is a priority, so she plans to continue a low‑impact walking routine and learn advanced watercolor techniques.
    Ultimately, she hopes to compile her memoirs of mid‑century Tulsa life and mentor emerging volunteers, ensuring that her experience benefits future generations.
