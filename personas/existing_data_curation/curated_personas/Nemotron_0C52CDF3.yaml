personas:
  professional: Corine Sharkey, an 82‑year‑old community organizer and veteran volunteer coordinator, leverages meticulous event‑planning, budgeting, and oral‑history interviewing skills to run intergenerational
    art workshops and preserve Tulsa’s cultural legacy, all while maintaining a calm, compassionate demeanor; they channel their curiosity into experimenting with digital storytelling tools.
  sports: Corine Sharkey enjoys low‑impact fitness through daily walks in the Tulsa Botanical Garden, participates in a senior yoga class at the local community center, and remains a loyal fan of the Oklahoma
    City Thunder and the Tulsa Roughnecks, often watching games at the nearby sports bar while cheering quietly with a small circle of friends; they keep a printed schedule of their walks and yoga sessions
    in a small notebook to stay organized.
  arts: Corine Sharkey spends afternoons painting watercolor vistas of the Oklahoma prairie, attends exhibitions at the Philbrook Museum featuring artists like Grant Wood and contemporary Indigenous creators,
    and regularly knits and crochets pieces inspired by regional quilting traditions, sharing them with shelter volunteers; they nurture their compassionate side by inviting local youth to view their work
    and exchange creative ideas.
  travel: Corine Sharkey prefers short, well‑planned road trips to culturally rich destinations such as Santa Fe’s art markets and the historic town of Guthrie, where they stay in family‑run B&Bs, enjoy
    leisurely sightseeing over hectic itineraries, and always bring a notebook to sketch scenes for later watercolor studies; they carefully map each route in a physical planner, avoiding crowded airports
    and large tour groups to preserve their reserved comfort.
  culinary: Corine Sharkey loves cooking farm‑to‑table meals using vegetables from their own garden, frequently preparing dishes like roasted beet salad with goat cheese, chicken‑fried steak with homemade
    gravy, and peach cobbler topped with fresh basil‑infused whipped cream, while occasionally indulging in Southern comfort foods like fried catfish and collard greens; they experiment with new herbs out
    of curiosity yet sometimes forget to set the timer, resulting in an occasional over‑baked casserole.
  core: Corine Sharkey is an organized, art‑loving octogenarian who balances meticulous volunteer work with quiet garden walks, a love of watercolor painting, and a steadfast habit of precise budgeting,
    all while occasionally forgetting to water their succulents and misplacing their reading glasses, yet they remain emotionally stable and compassionate.
background:
  cultural: Corine grew up as a white American in mid‑century Tulsa, shaped by the city’s blend of Midwestern steadiness, Southern hospitality, and a post‑World War II emphasis on community and self‑reliance.
    Her upbringing in a close‑knit, church‑centered neighborhood fostered values of compassion, cooperation, and modest ambition. Throughout her life, the region’s rich Native‑American heritage, the legacy
    of the oil boom, and the vibrant local arts scene have informed her appreciation for diverse artistic expressions and her commitment to preserving local history.
