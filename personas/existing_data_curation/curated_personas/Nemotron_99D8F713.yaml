personas:
  professional: Jose Colon is a maintenance technician hopeful who leverages hands‑on automotive repair, basic carpentry, and meticulous budgeting skills to thrive in structured, predictable work environments
    where their methodical reliability is prized.
  sports: Jose Colon is an avid weekend fishing enthusiast who quietly enjoys the predictability of casting at Lake Meredith, supports the Dallas Cowboys and Texas Rangers from afar, and occasionally joins
    a local adult softball league for a few games each spring; they appreciate the routine of early‑morning outings.
  arts: Jose Colon channels his love for precision into painting model cars after the detailed kits of Revell, admires documentary filmmaker David Attenborough, enjoys the folk storytelling of Townes Van
    Zandt, and they balance these pursuits with occasional evening board‑game nights featuring strategic titles like Settlers of Catan.
  travel: Jose Colon prefers low‑key, well‑planned trips, having explored the Palo Duro Canyon and Austin's craft market, while dreaming of a fishing charter in Alaska's Kenai River and a weekend woodworking
    retreat in the Appalachian hills; they meticulously map routes and budgets before each journey.
  culinary: Jose Colon favors hearty, simple meals such as chili con carne made with cumin, black beans, and ground beef, enjoys grilling fresh perch caught on lake trips, and they can reliably assemble
    a satisfying shrimp and corn tortilla quesadilla when friends gather.
  core: Jose Colon is a methodical, solitary planner who values predictable work, disciplined finances, and quiet hobbies, yet they occasionally battle back‑pain and a skeptical streak.
background:
  cultural: Jose was raised in a bilingual Mexican‑American household where Spanish was spoken at home and Mexican traditions were celebrated. He grew up attending local Catholic services and partaking
    in cultural events such as Día de los Muertos and Cinco de Mayo. His family emphasizes close‑knit relationships, modesty, and hard work—values that continue to shape his daily life in Amarillo, Texas.
    While he has adapted to the broader Texan culture, he retains a fondness for Mexican cuisine, music, and community gatherings within the local Hispanic community.
attributes:
  skills: '[''automotive maintenance'', ''basic carpentry'', ''home repair'', ''budget management'', ''inventory tracking'', ''basic computer literacy'']'
