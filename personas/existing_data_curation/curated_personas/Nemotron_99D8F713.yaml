  career_goals: Jose aims to secure a stable, full‑time position that offers clear structure and predictable responsibilities, such as a maintenance technician or warehouse supervisor role. He plans to
    obtain his GED within the next year to broaden his employment options and eventually start a modest handyman business serving the Amarillo community. Providing reliable income for his wife and future
    children is his primary motivation, and he hopes to advance into a leadership position where his reliability and methodical approach are valued.
