  career_goals: Although still a toddler, Svetlana’s developmental milestones point toward long‑term aspirations shaped by her parents’ encouragement of creativity and learning. She is eager to expand her
    vocabulary, learn to write her name, and explore drawing with more intentional strokes. Her parents hope she will nurture her love for art and music, eventually pursuing paths such as a visual artist,
    musician, or storyteller. In the near future, her goals focus on gaining confidence in social settings, mastering basic self‑care tasks, and participating in community preschool programs that foster
    curiosity and flexibility.
