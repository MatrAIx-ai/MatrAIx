personas:
  professional: Svetlana Walker, a two‑year‑old with an insatiable curiosity, amasses a collection of toy doctors, kitchen sets, and construction blocks, turning everyday moments into imaginative 'work'
    where they practice kindness, negotiate with stuffed colleagues, and embrace the messiness of spontaneous play.
  sports: Svetlana Walker, a two‑year‑old who splashes in the local park's toddler splash pad, participates in a weekly parent‑led indoor gymnastics class, cheers for the Chicago Cubs on a small cardboard
    cutout, and prefers free‑form movement over structured play, often leaving a trail of tiny sneakers as they dart about.
  arts: Svetlana Walker, a two‑year‑old who hues the world with crayons, they love the whimsical melodies of Raffi and the vibrant illustrations of Dr. Seuss, spend hours finger‑painting butterflies, and
    frequently request storytime with Sesame Street characters, finding peace in the colorful chaos.
  travel: Svetlana Walker, a two‑year‑old who has journeyed to Grandma’s farm in the countryside, a weekend adventure at the beach in Santa Monica, and a magical day at Disneyland, they prefer car trips
    with a favorite blanket and meticulously arrange their stuffed companions for each outing, despite occasional tantrums over long waits.
  culinary: Svetlana Walker, a two‑year‑old whose palate gravitates toward creamy mac and cheese, sweet banana slices, and the occasional bite of peanut butter on apple wedges, they proudly mix peas into
    their yogurt, yet habitually refuse broccoli and throw temper tantrums when presented with new textures.
  core: Svetlana Walker, a curious two‑year‑old who delights in crayon masterpieces, they frequently worry over misplaced socks and leave a delightful chaos of toys wherever they roam.
background:
  cultural: Svetlana is a White child raised in a middle‑class, suburban family in Downingtown, Pennsylvania. Her given name reflects her family’s Eastern European (likely Russian) heritage, and while English
    is her primary language, she occasionally hears Russian lullabies and simple words spoken at home. She participates fully in mainstream American traditions—Thanksgiving, Halloween, Fourth of July celebrations,
    and local community events—while her family also observes cultural customs such as Easter egg decorating and Russian holiday foods. The region’s strong emphasis on early childhood education and access
    to library storytimes, art classes, and music programs supports her curiosity for art and new ideas.
