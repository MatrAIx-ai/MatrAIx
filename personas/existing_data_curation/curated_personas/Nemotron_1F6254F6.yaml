personas:
  professional: Sharlene Hupper, a 23‑year‑old taxi driver in Casper, combines an associate’s degree in Business Administration with expert route planning and conflict de‑escalation skills to excel as a
    senior driver‑trainer while laying the groundwork for a boutique cultural shuttle service that will showcase local art and natural attractions.
  sports: Sharlene Hupper fuels her love for the outdoors by trekking the Medicine Bow Trail and training with the Casper Outdoor Adventure Club, while cheering on the Wyoming Cowboys football team and
    the Denver Broncos on weekends, and they squeeze in weekly yoga sessions at a downtown studio to stay limber.
  arts: Sharlene Hupper spends weekends immersed in contemporary art, photographing installations by Banksy and local photographer Maya Hernandez at the National Historic Trails Interpretive Center, attending
    indie screenings of films like 'Portrait of a Lady on Fire', and they regularly cite Frida Kahlo while curating pop‑up shows for the Casper Arts Collective.
  travel: Sharlene Hupper plans her escapes with meticulous spreadsheets, favoring weekend drives to Yellowstone and the Bighorn Mountains for sunrise photography, while dreaming of a spring backpacking
    trek through Norway’s fjords and a cultural immersion in Kyoto’s Gion district, all while balancing a modest budget that prioritizes experience over luxury.
  culinary: Sharlene Hupper, a modest home‑chef, whips up bison chili seasoned with smoked paprika and a three‑bean medley for friends, savors a perfectly crisp avocado toast drizzled with extra‑virgin
    olive oil for breakfast, and they never say no to a plate of tuna sushi rolls with cucumber and a dab of wasabi at the downtown Asian fusion spot.
  core: Sharlene Hupper blends a calm, methodical mind with a vibrant social pulse, turning every taxi ride into a curated cultural tour while moonlighting as a board‑game host and never missing her Sunday‑morning
    yoga.
background:
  cultural: Sharlene comes from a multi‑generational white American family with deep roots in the Intermountain West. Her grandparents migrated from the Midwest in the 1960s, drawn by the open spaces and
    ranching lifestyle of Wyoming. Growing up in Casper, she was immersed in a blend of frontier self‑reliance, community‑oriented small‑town values, and a growing appreciation for the state’s emerging
    arts scene. Her family’s modest, working‑class background emphasized hard work, independence, and neighborly reciprocity, while her parents' involvement in local cultural events fostered her curiosity
    for artistic expression. This mix of Western pragmatism and cultural openness shapes her worldview and daily interactions.
attributes:
  skills: '[''Route planning and navigation (Casper and Natrona County)'', ''Customer service and conversational engagement'', ''Conflict resolution and de‑escalation'', ''Basic vehicle maintenance and
    troubleshooting'', ''Cash handling and digital payment processing'', ''Time management and schedule coordination'', ''Knowledge of local arts, entertainment, and tourist sites'', ''Use of ride‑hailing
    and dispatch software'', ''Simple bookkeeping and expense tracking'']'
  hobbies: '[''Visiting art galleries and museums'', ''Landscape and street photography'', ''Organizing and participating in board‑game meet‑ups'', ''Volunteering as a guide for community art walks'', ''Yoga
    and mindful hiking'', ''Reading nonfiction on philosophy, urban planning, and tech trends'', ''Exploring local music venues and indie film festivals'']'
  career_goals: Sharlene aims to transition from a taxi driver to a transportation entrepreneur. She plans to complete a bachelor’s degree in Business Management within the next three years, after which
    she would launch a boutique shuttle service that offers curated cultural tours of Casper and nearby natural attractions. In the short term, she seeks a senior driver‑trainer role to mentor new drivers
    and shape service standards, while also exploring certification as a commercial driver to broaden her professional options. Ultimately, she hopes to create a sustainable, community‑focused mobility
    business that supports local artists and provides reliable transport for seniors and tourists alike.
