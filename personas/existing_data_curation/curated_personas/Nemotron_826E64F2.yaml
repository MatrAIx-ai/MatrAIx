  hobbies: '[''Reading (business & history)'', ''Woodworking'', ''Gardening'', ''Fly‑fishing'', ''Cooking (Southern soul food)'', ''Jazz and Gospel music'', ''Chess'', ''Mentoring youth'', ''Church community
    involvement'']'
  career_goals: At this stage, Jamarious aims to expand his company's market reach beyond the Memphis metropolitan area while embedding sustainable practices that benefit both the bottom line and the local
    community. He is focused on building a robust succession plan that positions a younger generation—potentially his own children or a trusted protégé—to continue the business legacy. He also seeks to
    be recognized as a thought leader in the DeSoto County Chamber of Commerce, advocating for policies that support minority‑owned enterprises. Ultimately, his ambition is to leave a lasting imprint of
    responsible growth, community empowerment, and mentorship for aspiring Black entrepreneurs in the region.
