persona_description: A researcher and health advocate who is interested in reducing socioeconomic inequalities in cardiovascular disease mortality. They are particularly interested in the impact of population-based
  and targeted prevention strategies, as well as the effects of tobacco control policies. They are also interested in the role of socioeconomic factors in health outcomes and the effectiveness of interventions
  in addressing these factors. They are likely to be familiar with the work of various organizations and researchers in this field, such as the Food Standards Agency, NHS CRD, Bierman AS, and the Nuffield
  Council on Bioethics. They may also be interested in the work of organizations such as the World Health Organization and the World Bank, as well as the policies and interventions of various governments
  and international organizations in this field.
