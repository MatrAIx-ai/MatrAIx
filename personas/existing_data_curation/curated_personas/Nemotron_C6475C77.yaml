  hobbies: '["photography of historic sites", "visiting art galleries", "community theater", "vintage radio restoration", "woodworking crafts", "fly‑fishing", "gardening", "volunteering at the historical
    society"]'
  career_goals: Kenneth aims to transition from a pure production role into a supervisory position where he can shape workflow improvements and mentor younger workers. He aspires to lead a small cross‑functional
    team focused on integrating newer technologies, such as simple automation tools, into the plant while preserving the flexibility he values. Simultaneously, he hopes to develop a modest side venture
    selling handcrafted wooden art pieces and photographic prints, leveraging his artistic interests and allowing him to work on his own schedule.
