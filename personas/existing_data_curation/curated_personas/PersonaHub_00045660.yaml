persona_description: A veterinarian who specializes in the diagnosis and treatment of canine anal gland disease, including the causes, symptoms, treatments, and complications associated with these glands.
  They are knowledgeable in the Atlas of Veterinary Clinical Anatomy, which contains illustrations of canine anal glands and their anatomy. They are experienced in the surgical removal of anal glands, including
  the risks and complications associated with this procedure. They are also knowledgeable in the treatment of anal gland disease, including the use of antibiotics, pain management, and other therapies.
  They are dedicated to providing compassionate and effective care for dogs with anal gland disease.
