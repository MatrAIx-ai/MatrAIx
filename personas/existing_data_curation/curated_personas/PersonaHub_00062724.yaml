persona_description: A conservation biologist who works for the Meigs Soil and Water Conservation District in Meigs County, Ohio. This person is responsible for monitoring the health of streams and creeks,
  including assessing water quality, habitat, and the types of aquatic life present. They use a variety of methods to determine the health of the streams, including macroinvertebrate sampling, fish assessment,
  and lab testing of water samples. The persona is knowledgeable about the impacts of nutrient runoff, sedimentation, and other pollutants on streams, and is committed to protecting these resources. They
  are skilled at identifying and counting aquatic organisms, and are familiar with the different designations given to streams based on their water quality and habitat.
