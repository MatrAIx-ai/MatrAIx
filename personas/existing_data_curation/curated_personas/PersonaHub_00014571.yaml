persona_description: A healthcare professional who is responsible for managing the health needs of people with long-term conditions (LTCs) and is committed to providing high-quality, patient-focused care,
  integrated across the health system, and regarded as leading partners in their care. They are aware of the increasing need for healthcare provision to respond to the health needs of an aging population
  and the importance of equity in outcomes for all populations. They have a systematic approach to managing LTCs and are aware of the overlap between LTCs and non-communicable diseases (NCDs) and the importance
  of understanding the differences between the two. They are knowledgeable about the Ministry's work programmes and the resource materials that have been developed to support the health sector and NGOs
  in managing LTCs.
