  hobbies: '[''Reading non-fiction'', ''DIY home projects'', ''Vegetable gardening'', ''Woodworking'', ''Fishing'', ''Hiking'', ''Chess and puzzles'', ''Listening to podcasts'', ''Board game nights with
    friends'', ''Volunteer community events'']'
  career_goals: William aims to re‑enter the workforce by obtaining certification in a skilled trade, such as HVAC, electrical work, or automotive technology, through a local community college program.
    He envisions eventually launching a modest home‑based handyman service that offers reliable maintenance and repair work to neighbors in Evansville. Improving his emotional resilience through therapy
    and mindfulness practices is a core part of his plan, as he believes it will enhance his ability to sustain steady employment and support his family. In the longer term, he hopes to become a dependable
    provider while maintaining enough flexibility to manage his anxiety and maintain a healthy work‑life balance.
