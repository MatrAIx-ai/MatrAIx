personas:
  professional: William Prosser, a 33‑year‑old DIY enthusiast turned aspiring tradesperson, leverages his self‑taught home‑repair, electrical and automotive skills and his methodical research habit to provide
    reliable handyman services while balancing his natural reserve with occasional assertive client communication.
  sports: William Prosser enjoys low‑key outdoor pursuits—seasonal fishing with the Evansville Anglers Association, weekend hikes on the Ohio River Trail, and occasional jogs—while faithfully cheering on
    the Indianapolis Colts and Indiana Pacers on game nights.
  arts: William Prosser channels his love for craftsmanship into simple Scandinavian‑style furniture, unwinds with folk acoustic albums by Iron & Wine, follows Ken Burns’ documentaries, and routinely hosts
    intimate board‑game evenings featuring titles from Stonemaier Games.
  travel: William Prosser prefers meticulously planned solo road trips to nature retreats, having hiked the Great Smoky Mountains and fished in the Boundary Waters, while dreaming of a low‑key Icelandic
    adventure to chase waterfalls and the midnight sun, balancing modest travel budgets with a yearning for quiet escape.
  culinary: William Prosser cooks with pragmatic flair, regularly preparing garden‑fresh dishes such as rosemary‑infused roasted chicken, cilantro‑topped quinoa bowls, and hearty vegetable stew, while occasionally
    indulging in a perfectly grilled trout caught from a local lake.
  core: William Prosser is a quietly curious handyman who turns anxiety into meticulous projects, juggling tool inventories, budgeting spreadsheets, and therapy notes with equal dedication.
background:
  cultural: William grew up in a middle‑class, white, Midwestern family in Indiana. His upbringing reflects traditional Midwestern values such as practicality, modesty, self‑reliance, and a strong sense
    of community responsibility. He was exposed to Protestant Christian traditions, which influence his appreciation for holidays and community gatherings, though his personal beliefs are now more secular.
    The local culture of Evansville—emphasizing neighborly support, a solid work ethic, and regional customs like Thanksgiving, Fourth of July parades, and high school sports—shapes his worldview. His culinary
    preferences include classic Midwestern fare such as fried chicken, BBQ, and corn, further reflecting his cultural background.
