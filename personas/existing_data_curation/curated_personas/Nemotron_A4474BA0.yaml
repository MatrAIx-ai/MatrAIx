  career_goals: Although retired, Theresa aims to leave a lasting legacy in her community by mentoring younger volunteers at the senior center, creating a comprehensive local history archive for the Gwinnett
    County library, and publishing a memoir that recounts her experiences and the evolution of Lawrenceville. She aspires to be recognized as a local historian and to secure a small grant to establish a
    community garden that reflects her love of horticulture. Maintaining her independence and mental well‑being is a top priority, so she also seeks to stay actively engaged in artistic and cultural activities
    that challenge her intellect and satisfy her high personal standards.
