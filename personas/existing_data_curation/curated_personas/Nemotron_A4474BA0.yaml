personas:
  professional: Theresa Seidita, a retired community event planner and senior-center program director, leverages her razor-sharp organization and budget expertise to coordinate volunteer schedules, historic
    oral-history recordings, and annual festivals, while her competitive nature drives her to exceed fundraising targets and she remains skeptical of any sponsor agenda that doesn't align with Lawrenceville's
    heritage.
  sports: Theresa Seidita, a dedicated early-morning walker, tracks her steps with a pedometer, participates in the Lawrenceville Seniors Bridge Club's weekly low-impact tai-chi sessions, avidly follows
    the Atlanta Braves in spring and the Atlanta Hawks in winter, and joins the community's spring gardening marathon to stay active, approaching each activity with a disciplined schedule that rivals a
    training plan, though she occasionally skips a walk when a crossword tournament runs late.
  arts: Theresa Seidita, an enthusiastic patron of the arts, spends her Saturdays wandering the High Museum of Art to admire works by Monet, O'Keeffe, and local Georgia artists, attends the Atlanta Symphony
    Orchestra's performances of Beethoven and Brahms, never misses a community production of August Wilson's plays at Theatre in the Park, and keeps a scrapbook of sketches from gallery tours, balancing
    her refined taste with a competitive desire to out-remember fellow volunteers on art-trivia nights.
  travel: Theresa Seidita, a methodical traveler who charts each trip on a paper calendar months in advance, prefers slower-paced cultural pilgrimages over adrenaline adventures, has visited Savannah's
    historic squares, the National Archives in Washington, D.C., and the gardens of Monticello, dreams of strolling through the cobblestone streets of Bath, England, and relies on senior discounts and a
    modest travel stipend from her community grant to fund these journeys, while occasionally splurging on a boutique B&B in New Orleans when a literary festival aligns with her love of biographies.
  culinary: Theresa Seidita, a seasoned home cook celebrated for preserving her family's chicken and dumplings recipe and for baking sourdough loaves with a crisp crust, delights in adding fresh rosemary
    and locally sourced heirloom tomatoes to her rosemary focaccia, whips up peach cobbler using Georgia peaches in the summer, and while her kitchen skills are immaculate, she sometimes over-salts her
    vegetable soups when absorbed in a crossword puzzle.
  core: Theresa Seidita, the 83-year-old archivist-planner who balances a fiercely organized mind and competitive spirit with bouts of anxiety, lives by meticulous schedules, hoards handwritten ledgers,
    and never lets a missed crossword defeat her sense of purpose.
background:
  cultural: Theresa is a white American of likely Italian descent, raised in a Catholic household in the southeastern United States during the mid‑20th century. Her upbringing emphasized family traditions,
    community involvement, and respect for craftsmanship—values reflected in her love of quilting, cooking, and gardening. Growing up in the South, she experienced the regional hospitality and church-centered
    social life, while also maintaining cultural ties to her Italian heritage through food, holiday celebrations, and storytelling. After moving to Lawrenceville, Georgia, she integrated into the suburban
    Gwinnett County community, blending Southern and suburban influences with her longstanding appreciation for European art and classical music.
