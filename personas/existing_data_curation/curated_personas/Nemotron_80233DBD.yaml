  career_goals: Leon aims to become a top‑performing sales professional within the next three years, targeting promotion to senior sales associate and then to a sales manager role. He plans to earn industry
    certifications such as Certified Professional Sales Person (CPSP) and deepen expertise in sustainable manufacturing products. Over the medium term, Leon aspires to a regional sales director position,
    overseeing a team across multiple states. Ultimately, he envisions launching his own consultancy that helps emerging manufacturers enter wholesale channels, merging his sales acumen with his passion
    for innovative, eco‑focused solutions.
