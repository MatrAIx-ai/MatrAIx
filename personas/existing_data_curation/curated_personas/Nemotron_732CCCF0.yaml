personas:
  professional: Olga Lee, a retired community organizer and lifelong watercolorist, leverages their gentle mediation skills and horticultural expertise to run informal art workshops and heritage events,
    favoring a relaxed, improvised schedule over strict planning.
  sports: Olga Lee enjoys low‑impact exercise through the Henderson County Senior Walking Club’s weekly Blue Ridge trail walks, participates in seasonal bird‑watching hikes, follows the Charlotte Hornets
    and Carolina Hurricanes for community camaraderie, and favors gentle gardening as her primary fitness routine over high‑intensity workouts.
  arts: Olga Lee draws artistic inspiration from the landscapes of Winslow Homer and the bold colors of Georgia O’Keeffe, frequents the Hendersonville Arts Council’s exhibitions, volunteers for community
    theatre productions of classics like 'Arsenic and Old Lace,' and spends evenings listening to folk legend Joan Baez while sipping tea.
  travel: Olga Lee’s travel style blends careful planning for cultural pilgrimages—such as trips to New York’s Metropolitan Museum, Washington, D.C.’s Smithsonian, and a historic weekend in Florence, Italy—with
    spontaneous short road trips to nearby Asheville’s River Arts District and the Great Smoky Mountains, always balancing budget constraints with a thirst for fresh artistic inspiration.
  culinary: Olga Lee, a confident home cook, specializes in Southern comfort meals like fried chicken with buttermilk, shrimp and grits, and apple pie, often seasoning dishes with rosemary, thyme, and sage
    harvested from their garden, while enjoying occasional outings to local diners for a taste of barbecue ribs and collard greens.
  core: Olga Lee is a curious, garden‑loving watercolorist who blends art, heritage, and gentle community stewardship, yet occasionally misplaces their sketchbook and forgets to file taxes on time, revealing
    a whimsical yet disorganized charm.
background:
  cultural: Olga Kay Lee grew up in a middle‑class white family in the foothills of the Blue Ridge Mountains of western North Carolina. The region’s blend of Southern hospitality, Appalachian folk traditions,
    and close‑knit community spirit shaped her values of kindness, cooperation, and reverence for heritage. Family celebrations often featured seasonal festivals, apple‑picking, church gatherings, and homemade
    meals, fostering her appreciation for community and the arts. She attended a local community college where she studied liberal arts before focusing on raising a family. The cultural landscape of Henderson
    County—its historic downtown, vibrant arts scene, and natural beauty—has continually nurtured her love for painting, gardening, and exploring new ideas. While she identifies as white, her marriage introduced
    the surname Lee, reflecting the diverse personal histories common in the area.
