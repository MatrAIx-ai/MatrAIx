personas:
  professional: Robert Porter is a methodical emergency medical technician who leverages their BLS expertise, structured documentation, and strong leadership to excel in high‑stress calls, while they strategically
    pursue paramedic certification and an associate in emergency management to transition into supervisory and data‑driven quality‑improvement roles.
  sports: Robert Porter dominates the local intramural basketball league as a point guard, cycles the Ohio River Trail on weekends with the Columbus Cycling Club, cheers for the Cleveland Browns and Cincinnati
    Reds, and they incorporate strength‑training sessions at a community gym to maintain endurance for both sports.
  arts: Robert Porter lends their powerful tenor to the church gospel choir, draws inspiration from legends like Mahalia Jackson and B.B. King, spends evenings listening to Miles Davis’s ‘Kind of Blue’
    and Stevie Ray Vaughan, and occasionally writes simple gospel harmonies that they share with choir members.
  travel: Robert Porter prefers short, well‑planned road trips that balance adventure with budget, having explored Memphis for its blues heritage, New Orleans for jambalaya and jazz, and planning a future
    mountain‑biking getaway in Asheville, while they always check the fuel range before heading out on the Ohio River Trail loop.
  culinary: Robert Porter enjoys mastering Southern comfort dishes such as fried chicken with a crisp buttermilk crust, smoky collard greens simmered with ham hocks, and creamy mac and cheese, often seasoning
    with smoked paprika and hot sauce, and they regularly host neighborhood potlucks where their secret‑family‑style barbecue sauce steals the show.
  core: Robert Porter is a structured, competitive EMT who channels their love for teamwork into basketball, gospel singing, and data‑driven EMS improvements, while balancing meticulous budgeting with occasional
    indulgences in video games and Southern cooking.
background:
  cultural: Robert grew up in the West End of Cincinnati, a predominantly African American neighborhood where community ties and church involvement were central. His family emphasized resilience, hard work,
    and pride in his heritage, encouraging him to give back through service. Exposure to the city’s rich blues and jazz scene, combined with participation in church youth groups and local cultural celebrations
    like Juneteenth, reinforced his sense of identity. These experiences shaped his commitment to helping others as an EMT and keep him connected to a supportive network of mentors and extended family within
    the local African American community.
attributes:
  skills: '[''Basic Life Support (BLS)'',''Advanced Cardiac Life Support (ACLS) certification'',''Trauma triage and assessment'',''Emergency vehicle navigation and logistics'',''Medical documentation and
