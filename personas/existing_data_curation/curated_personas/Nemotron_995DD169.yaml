    responder crisis de‑escalation'']'
  hobbies: '[''Intramural basketball'',''Cycling along the Ohio River Trail'',''Volunteering at community health fairs'',''Singing in a gospel choir'',''Cooking Southern cuisine'',''Listening to blues and
    jazz music'',''Playing tactical video games'']'
  career_goals: Robert aims to earn paramedic certification within the next two years and subsequently move into a supervisory role such as shift manager or training officer. He plans to pursue an associate
    degree in emergency management to qualify for a municipal EMS coordinator position. Long‑term, he hopes to develop a data‑driven quality‑improvement program for his ambulance service and eventually
    launch a community‑focused medical transport business that emphasizes reliability and patient safety.
