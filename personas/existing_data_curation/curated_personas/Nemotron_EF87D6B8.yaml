  hobbies: '[''Oil Painting'', ''Community Theater'', ''Bridge'', ''Historical Fiction Reading'', ''Gardening'', ''Birdwatching'', ''Road Trips to Art Museums'', ''Digital Photography'', ''Cooking'', ''Volunteer
    Storytelling'']'
  career_goals: Roy aims to author a memoir that weaves together his personal history with reflections on art and community life, and to curate a monthly exhibition featuring works created by Sun City residents.
    He hopes to mentor younger seniors in public speaking and digital storytelling, deepen his proficiency in digital photography, and travel to iconic art museums and national parks across the United States.
    Additionally, he aspires to serve as a volunteer docent at the local historical museum and to launch an intergenerational program that links retirees with schoolchildren for shared learning experiences.
