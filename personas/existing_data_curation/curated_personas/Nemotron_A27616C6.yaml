  career_goals: William dreams of becoming a robotics engineer or astronaut, driven by his fascination with how machines work and his desire to solve real‑world problems. He is eager to design robots that
    can help his community, and he likes the idea of leading a team in future science contests. His competitive streak pushes him to aim for top positions in school science fairs and coding challenges,
    while his practical mindset focuses on creating useful, reliable technology.
