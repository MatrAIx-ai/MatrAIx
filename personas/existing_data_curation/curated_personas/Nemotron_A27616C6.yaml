personas:
  professional: A budding engineer, William Khanna uses block‑coding games and intricate LEGO sets to design miniature machines, applying meticulous planning and a competitive drive to solve each challenge
    methodically, while balancing curiosity with practical constraints, and they always document the process in a colourful notebook.
  sports: A spirited soccer player, William Khanna dribbles for the Little Strikers youth club at the neighborhood park, cheers on Manchester United for inspiration, and they approach each practice with
    a competitive edge, favoring swift passes and scoring goals while still enjoying the teamwork aspect of the game.
  arts: A budding musician, William Khanna practices simple melodies on a small keyboard, drawing inspiration from A. R. Rahman's film scores and the rhythmic patterns heard at Diwali festivals, while they
    also enjoy sketching sci‑fi scenes with colored pencils during quiet moments.
  travel: An eager explorer, William Khanna loves weekend road trips to nearby state parks like Redwood National Forest, dreams of visiting the Taj Mahal someday, and they plan each adventure with a printable
    map and a snack checklist, balancing family budget and school schedule.
  culinary: A junior chef, William Khanna helps prepare spiced lentil stew with cumin, turmeric, and chickpeas, as well as sweet fried dough balls flavored with cardamom, skillfully chopping vegetables
    under adult supervision while they often add an extra pinch of spice just for fun.
  core: William Khanna meticulously builds LEGO towers, hoards spare bricks in a secret drawer, devours puzzles faster than bedtime, and their competitive streak fuels every game, even when it means a stubborn
    refusal to share the remote.
background:
  cultural: William is a second‑generation South Asian (Indian) American living in the diverse neighborhood of Corona, Queens. At home, his family speaks English and Punjabi (or Hindi), and they celebrate
    festivals such as Diwali, Holi, and occasionally Eid, reflecting an inclusive multicultural environment. His parents emphasize education, respect for elders, and community service, which nurtures his
    organized and goal‑oriented approach. Interaction with a multicultural community in Queens gives him exposure to many cultures, enhancing his curiosity while maintaining strong ties to his South Asian
    heritage.
