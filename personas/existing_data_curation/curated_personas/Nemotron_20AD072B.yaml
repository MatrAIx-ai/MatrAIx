  hobbies: '[''Watercolor painting'', ''Sketching local scenery'', ''Quilting'', ''Community theater'', ''Reading speculative fiction'', ''Book club'', ''Philosophy podcasts'', ''Walking/hiking'', ''Road
    trips to historic towns'', ''Volunteering at library'']'
  career_goals: Felecia aims to move from a hands‑on driver‑sales role into a supervisory position such as route manager or logistics coordinator within the next five years, leveraging her on‑the‑road experience
    and customer‑service expertise. She also dreams of launching a modest home‑based studio where she can sell her watercolor paintings, sketches, and quilts, allowing her to blend transportation management
    with creative entrepreneurship. Long‑term, she hopes to mentor younger drivers in the Reading area, secure a stable retirement for her family, and maintain a balanced life that honors both her practical
    skills and artistic passions.
