  hobbies: '[''Gardening'', ''Tai chi'', ''Cooking traditional Chinese dishes'', ''Calligraphy'', ''Walking tours of historic neighborhoods'', ''Reading architectural history'', ''Volunteering as a guest
    lecturer'', ''Participating in Chinese cultural association events'']'
  career_goals: Yiju aims to solidify her legacy as a trusted architect who delivers practical, high‑quality environments that enhance community harmony. Over the next five years she plans to achieve LEED
    Accredited Professional status, lead a series of neighborhood‑scale redevelopment projects that incorporate green spaces and senior‑friendly design, and serve as a senior mentor to emerging architects
    in her firm. She also hopes to publish a practical guide on blending traditional East Asian spatial concepts with contemporary New Jersey residential design, and eventually transition to a part‑time
    consulting role that allows her to continue contributing to projects while enjoying more personal time.
