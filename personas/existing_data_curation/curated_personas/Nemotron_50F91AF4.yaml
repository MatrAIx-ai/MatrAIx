personas:
  professional: Yiju Lu is a seasoned architect who leverages three decades of expertise in residential and low‑rise commercial design, employing advanced BIM workflows in Revit and AutoCAD to deliver cost‑effective,
    code‑compliant, and sustainably oriented projects, while their strong preference for routine and emphasis on community harmony shape a pragmatic client‑liaison style and a protective mentorship approach
    despite a occasionally relaxed attitude toward strict deadlines.
  sports: Yiju Lu enjoys low‑impact fitness, practicing tai chi in the local park and walking with the Princeton Historical Walking Club, while cheering for the New Jersey Devils in hockey and the New York
    Mets in baseball on weekends.
  arts: Yiju Lu engages with the arts by teaching calligraphy at a cultural association, attending concerts featuring Yo‑Yo Ma and Beethoven’s Ninth Symphony, admiring Monet’s water lily paintings, and
    appreciating films by Ang Lee, all of which inform their aesthetic sensibilities in design work.
  travel: Yiju Lu prefers meticulously planned trips mixed with spontaneous exploration, having visited historic Boston, the gardens of Kyoto, and Tuscan vineyards, while dreaming of a restorative retreat
    in the Hudson Valley that balances cultural immersion with architectural inspiration.
  culinary: Yiju Lu skillfully blends traditional Chinese flavors with seasonal New Jersey produce, regularly preparing mapo tofu with locally harvested bok choy, hand‑rolled pumpkin‑filled dumplings, and
    ginger‑garlic roasted carrots, often using fresh cilantro, Chinese five‑spice, and locally sourced tomatoes.
  core: Yiju Lu fuses a love of routine, garden stewardship, and timeless design principles into daily life, even as a habit of misplaced keys and relaxed deadlines adds a charming, human twist.
background:
  cultural: Yiju was born to Chinese immigrant parents who settled in the United States in the 1970s. Her upbringing emphasized respect for elders, the value of education, and the importance of communal
    harmony. Bilingual in Mandarin and English, she maintains cultural traditions such as celebrating the Lunar New Year, preparing festival foods, and attending community gatherings at the local Chinese
    cultural association. While fully integrated into American life in Princeton, she draws upon her East Asian heritage to inform a design sensibility that values balance, simplicity, and respect for context,
    often incorporating subtle references to traditional Chinese spatial organization in her projects.
attributes:
  skills: '[''Conceptual design'', ''BIM (Revit, AutoCAD)'', ''Construction documentation'', ''Code compliance (NJ Uniform Construction Code)'', ''Sustainable design (LEED AP principles)'', ''Historic preservation'',
