personas:
  professional: John Gelb, an aspiring museum exhibit designer currently finishing a B.A. in Art History, blends meticulous project‑planning skills with a vivid imagination to craft immersive gallery experiences,
    leveraging Photoshop, Illustrator, and InDesign while they coordinate collaborative art projects with the precision of a seasoned curator.
  sports: John Gelb, an avid hiker of Columbia River Gorge and member of the Washington County Hiking Club, follows the Portland Timbers and the Portland Trail Blazers, occasionally joins an intramural
    ultimate frisbee league, and spends weekend runs training for a half‑marathon despite a tendency to skip the post‑run stretch, which they justify as saving time for sketching.
  arts: John Gelb, a dedicated sketcher who admires the surreal compositions of René Magritte, the vibrant illustrations of James Jean, and draws narrative inspiration from Denis Villeneuve’s films and
    N.K. Jemisin’s speculative fiction, regularly attends indie film screenings and contributes to a local writers’ workshop, integrating these influences into experimental watercolor and digital paintings,
    which they exhibit in community pop‑up galleries.
  travel: John Gelb, a budget‑conscious explorer who has backpacked through the Oregon Coast, photographed abandoned steel mills in the Pacific Northwest, dreams of trekking the Scottish Highlands and visiting
    Kyoto’s historic temples, prefers meticulously planned itineraries with a mix of solitary hiking and occasional group art retreats, yet sometimes overbooks to the point of missing flights, a mishap
    they attribute to over‑optimizing their travel schedule.
  culinary: John Gelb, a moderately skilled home cook who loves experimenting with beetroot risotto, miso‑glazed salmon, and homemade kimchi, often incorporates fresh thyme, smoked paprika, and kombucha
    in sauces, but sometimes forgets to set timers, resulting in charred edges on ambitious dishes that they later laugh off while sipping cold brew.
  core: John Gelb, a hyper‑organized dreamer who sketches at 2 a.m. while sipping cold brew, obsessively plans museum layouts, and habitually forgets to water their plants, embodying a blend of meticulous
    discipline and restless creativity, traits they attribute to their love of solitary contemplation.
background:
  cultural: John grew up in Washington, Pennsylvania, a small city with a legacy of steel manufacturing and a close‑knit community. His family is of German‑Irish descent, and while he identifies with mainstream
    American culture, he appreciates regional traditions such as local folk music, community festivals, and the emphasis on hard work and mutual support. Attending a public high school and later a community
    college exposed him to diverse viewpoints, reinforcing his collaborative and harmonious outlook. He values the modest, self‑reliant ethos of his hometown while also seeking broader cultural experiences
    through art and literature.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator, InDesign)'', ''Creative writing'', ''Research and analysis'', ''Project planning'', ''Time management'', ''Photography'',
