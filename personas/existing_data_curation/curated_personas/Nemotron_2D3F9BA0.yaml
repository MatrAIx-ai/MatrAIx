  hobbies: '[''Sketching'', ''Watercolor painting'', ''Digital painting'', ''Reading speculative fiction and philosophy'', ''Photography'', ''Chess'', ''Indie film screenings'', ''Local writers’ workshop'',
    ''Hiking'', ''Experimental cooking'', ''Scale model building'']'
  career_goals: John aims to complete his bachelor's degree in Art History or Visual Arts within the next two years, followed by a master's in museum studies. He envisions a career as a museum exhibit designer
    or cultural program coordinator, where he can merge his love for abstract concepts with his disciplined project‑management style. In the shorter term, he plans to take freelance illustration contracts,
    build a professional portfolio, and volunteer as a docent at the local history museum to gain curatorial experience. Ultimately, he hopes to lead interdisciplinary art‑education initiatives that foster
    community engagement and support emerging artists.
