  hobbies: '[''Painting'', ''Pottery'', ''Creative writing'', ''Book club'', ''Community theater'', ''Hiking'', ''Yoga'', ''Tai chi'', ''Cooking Southeast Asian cuisine'', ''Attending art exhibitions'',
    ''Photography'', ''Board games'', ''Meditation'']'
  career_goals: Maria aims to transition into a senior executive role, such as Executive Director of a regional arts council or cultural nonprofit, where she can shape inclusive, innovative programming
    that bridges Southeast Asian heritage with the broader Monterey community. She plans to pursue a graduate certificate in arts administration, mentor emerging leaders, and launch a collaborative arts-tech
    initiative that expands access to creative experiences for underserved populations. Balancing her ambition with her sensitivity to stress, she also intends to integrate wellness practices into organizational
    culture to foster a supportive work environment.
