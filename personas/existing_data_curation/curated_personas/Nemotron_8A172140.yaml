personas:
  professional: Maria Ong, a seasoned arts nonprofit manager with a talent for strategic planning and creative program design, blends meticulous budget oversight with a vivid imagination to craft inclusive
    community initiatives while rallying volunteers and staff through her outgoing, collaborative style.
  sports: Maria Ong hikes the Monterey coastal trails every weekend, participates in a local yoga studio’s sunrise class, and is a die‑hard fan of the Monterey Bay Baseball Club, cheering loudly at home
    games while swapping strategic board‑game tips with fellow fans.
  arts: Maria Ong spends evenings painting abstract watercolors inspired by the Pacific sky, shapes pottery at the community studio, contributes short stories to her book club’s anthology, and volunteers
    as stage manager for the coastal theater, drawing artistic inspiration from the works of Yayoi Kusama and Anselm Kiefer.
  travel: Maria Ong prefers thoughtfully planned getaways, having explored the misty coasts of Nova Scotia, the historic streets of Lisbon, and the tea‑plantation hills of Sri Lanka, while dreaming of a
    road trip along the Pacific Northwest’s scenic byways for her next creative recharge.
  culinary: Maria Ong delights in cooking aromatic laksa broth, mastering the balance of lemongrass and coconut milk, and often hosts board‑game evenings where she serves homemade spring rolls with shrimp,
    mango salsa, and a side of roasted cauliflower.
  core: Maria Ong fuses a meticulous, stress‑prone mind with an exuberant love for arts, community, and coastal adventures, juggling budget spreadsheets by day and watercolor palettes by night, all while
    hoarding seashells as talismans against anxiety.
background:
  cultural: Maria’s family originated from the Philippines, bringing a rich blend of Catholic traditions, Filipino language, and vibrant culinary customs into her upbringing. Growing up in a bilingual household,
    she learned to navigate both Filipino cultural values—such as respect for elders, community cohesion, and hospitality—and the broader American context of her California upbringing. She regularly celebrates
    Filipino holidays like Sinulog and participates in local Asian festivals in Monterey County, which keeps her connected to her heritage. These cultural influences shape her emphasis on harmony, cooperative
    teamwork, and the importance of storytelling through art, which she weaves into both her professional initiatives and personal life.
