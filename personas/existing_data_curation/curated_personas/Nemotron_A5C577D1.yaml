personas:
  professional: A seasoned electrician with over four decades of experience, Joyce Graham leverages deep code knowledge, safety expertise, and a competitive yet collaborative spirit to lead complex residential,
    commercial, and industrial projects while mentoring aspiring women tradespeople in Polk County, and they are known for meticulous project budgeting and personable client communication.
  sports: A dedicated participant in Lakeland’s senior pickleball league and a regular at the line‑dancing club, Joyce Graham roots for the Tampa Bay Buccaneers, Tampa Bay Lightning, and Orlando Magic,
    and they schedule weekly cardio circuits with the Polk County Senior Fitness Club to stay competitive on the court.
  arts: Joyce Graham devotes evenings to reading historical fiction by Philippa Gregory and Ken Follett, enjoys the soulful country hits of Patsy Cline and Dolly Parton while line‑dancing, and attends the
    Orlando Repertory Theatre’s productions of classic dramas, which they cite as an essential balance to the technical rigor of their trade.
  travel: A methodical planner with a love for coastal charm, Joyce Graham has visited Key West and Charleston, dreams of a leisurely cruise through the Caribbean’s Virgin Islands, and they prioritize trips
    that blend scenic gardens with opportunities to exchange sustainable landscaping ideas with fellow retirees.
  culinary: A seasoned home cook who harvests home‑grown citrus and heirloom tomatoes, Joyce Graham frequently prepares grilled snapper with lime‑mint glaze, classic key lime pie, and a occasional Cuban‑inspired
    black‑bean and rice casserole, and they relish experimenting with solar‑powered, Arduino‑controlled induction cooking devices.
  core: Joyce Graham blends a lifelong dedication to reliable craftsmanship with a competitive love of pickleball, a weekend habit of tinkering with smart‑home gadgets, and a slight skepticism that fuels
    their relentless pursuit of excellence.
background:
  cultural: Joyce grew up in a middle‑class white family in central Florida during the 1950s‑60s, steeped in a culture that prized hard work, self‑reliance, and community service. A Methodist upbringing
    and participation in local civic clubs fostered a strong sense of responsibility and teamwork. The region’s tourism boom and growing retiree population highlighted the importance of reliable electrical
    infrastructure, steering her toward a stable skilled trade. As a widowed senior, she values intergenerational connections and channels her competitive spirit into mentoring younger workers, especially
    women, while maintaining a pragmatic approach to new ideas and established practices.
attributes:
  skills: '[''Residential wiring'', ''Commercial electrical maintenance'', ''Circuit troubleshooting'', ''NEC and Florida Electrical Code compliance'', ''Blueprint reading and load calculations'', ''Smart‑home
