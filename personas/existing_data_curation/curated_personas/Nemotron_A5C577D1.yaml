  hobbies: '[''Pickleball'', ''Line dancing'', ''Volunteer building maintenance'', ''Arduino home automation projects'', ''DIY workshops'', ''Reading historical fiction and trade magazines'', ''Gardening
    (citrus and native plants)'', ''Community sustainability outreach'']'
  career_goals: Joyce aims to achieve a Master Electrician certification and transition into consulting for energy‑efficiency retrofits in senior housing. She plans to launch a mentorship program that encourages
    more women to enter the trades, and to serve as a volunteer safety instructor for local vocational schools. Additionally, she seeks recognition as a thought leader in Polk County’s electrical community,
    hoping to influence sustainable building practices while maintaining her competitive edge by setting high performance standards for herself and her protégés.
