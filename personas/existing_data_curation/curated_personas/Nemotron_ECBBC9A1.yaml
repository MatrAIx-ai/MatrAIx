personas:
  professional: Julie Brassell, a seasoned construction assistant in Rhode Island’s maritime community, blends solid carpentry and masonry skills with a background in environmental design, using their calm
    composure and spontaneous problem‑solving to keep crews safe, mentor new workers, and weave sustainable, aesthetic details into every build.
  sports: Julie Brassell enjoys early‑morning rides on the East Bay Bike Path, occasional softball games with the Providence Community League, follows the New England Patriots, Boston Red Sox, and Boston
    Celtics, and maintains a casual membership with the Providence Cycling Club, balancing community team spirit with solo fitness hikes.
  arts: Julie Brassell frequents the RISD Museum and local galleries, sketches coastal sunsets in the style of Edward Hopper, captures grainy textures with a vintage Nikon reminiscent of Ansel Adams, and
    finds inspiration in the folk tunes of The Avett Brothers and the theatrical improvisations of the Providence Fringe Festival, letting these creative currents color their DIY upcycling projects.
  travel: Julie Brassell plans trips that blend sea‑air breezes with historic charm, often taking spontaneous weekend ferry rides to Block Island and weekend road trips to Portland, Maine, while dreaming
    of a summer study tour of the maritime towns of Cornwall, UK, and a Mediterranean escape to Naples for its coastal markets, all while budgeting through a travel savings account.
  culinary: Julie Brassell cooks seasonal New England fare with a confident hand—whipping up clam chowder, lobster rolls, roasted root vegetables with rosemary and thyme, and a weekly grain‑bowl featuring
    quinoa, kale, and locally foraged seaweed—while experimenting with upcycled vegetable scraps into hearty soups, though they sometimes forget to refrigerate leftovers, leading to occasional food‑safety
    mishaps.
  core: Julie Brassell is a calm, art‑driven tradeswoman who mentors crews, loves spontaneous seaside sketches, and reliably saves for the future, yet habitually postpones filing taxes until the last minute.
background:
  cultural: Julie was born and raised in Warwick, Rhode Island, in a working‑class family with deep roots in the New England maritime region. Growing up near the Narragansett Bay, she was immersed in a
    community that values hard work, neighborly cooperation, and a rich cultural scene that includes seasonal festivals, historic preservation, and a strong local arts presence. Her parents encouraged practical
    skills and community service, leading her to pursue hands‑on work after completing some college courses in environmental design. While her ethnic background is white, her cultural identity blends the
    pragmatic, down‑to‑earth sensibilities of New England with an appreciation for the region’s artistic and ecological heritage.
attributes:
  skills: '["Site preparation and cleanup", "Basic carpentry and framing assistance", "Masonry support", "Power tool operation", "Reading and interpreting simple blueprints", "Safety compliance and OSHA
    guidelines", "Material inventory management", "Sustainable building practices", "Team coordination and conflict resolution", "Mentoring and training of new crew members"]'
  hobbies: '["Visiting art galleries and museums", "Sketching and painting coastal scenes", "Photography of architecture and nature", "DIY home improvement and woodworking", "Gardening on balcony", "Hiking
    and biking on local trails", "Volunteering with Habitat for Humanity", "Yoga and meditation", "Cooking seasonal meals", "Playing the ukulele"]'
  career_goals: Julie aims to transition from a helper role to a certified tradesperson, securing NCCER and OSHA certifications within the next two years. She aspires to become a foreman or site supervisor
    where she can champion safety, teamwork, and sustainable building practices. Her long‑term ambition is to lead community‑focused construction projects, such as affordable housing initiatives and collaborative
    art installations that blend her appreciation for design with her commitment to helping others. She also hopes to mentor younger workers, fostering a supportive and harmonious work environment.
