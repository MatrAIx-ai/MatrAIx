    & Historic Architecture Photography", "Hiking Appalachian Foothills", "Museum Docent & Local History Volunteering", "Travel to Historic Sites", "Yoga for Stress Management", "Community Networking Events"]'
  career_goals: Looking ahead, Cheryl aims to transition from her current role as Marketing Manager to a senior executive position—ideally Vice President of Marketing or Chief Marketing Officer—where she
    can shape the strategic direction of a regional or national brand. She is eager to champion data-driven storytelling that integrates sustainability and social responsibility, positioning the company
    as a purpose-focused leader. Cheryl also hopes to build a mentorship program for mid-career women in marketing, leveraging her collaborative style to foster a supportive network. Additionally, she envisions
    establishing a boutique consultancy that helps small businesses in the Atlanta metro area develop flexible, community-centric marketing plans. Her career ambitions reflect a blend of curiosity for emerging
    trends, practical ROI focus, and a desire to maintain a flexible, people-oriented work environment.
