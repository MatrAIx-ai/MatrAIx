personas:
  professional: Cheryl Noonan, a seasoned marketing manager, blends integrated branding strategy with humanistic storytelling in data‑driven campaigns, leveraging their sociable, talkative nature to rally
    cross‑functional teams while championing flexible agile workflows that still deliver measurable ROI for regional brands.
  sports: Cheryl Noonan stays active by joining the Lakeside Racquet Club’s weekly tennis matches, logging sunrise runs with the Marietta Running Club, cheering on the Atlanta Falcons, Hawks, and Braves
    on game nights, and tackling seasonal hikes in the Appalachian foothills, while they treat fitness as a sociable outlet rather than a rigid regimen.
  arts: Cheryl Noonan immerses herself in the arts by attending weekly productions at the Fox Theatre, participating in improv workshops with the Marietta Players, devouring books by contemporary author
    Sally Rooney and Southern storyteller Jesmyn Ward, and curating playlists that blend The Avett Brothers, Kacey Musgraves, and classic gospel hymns, letting these cultural touchstones shape their storytelling
    flair.
  travel: Cheryl Noonan prefers spontaneous weekend escapes to historic Southern gems like Charleston and Savannah, blends organized road trips to the Blue Ridge Parkway with occasional overseas pilgrimages
    to Edinburgh’s literary festivals, and balances their love of adventure with family commitments by scheduling short, budget‑friendly stays at boutique B&Bs rather than extended luxury vacations.
  culinary: Cheryl Noonan, a confident home baker and Southern‑cuisine enthusiast, whips up low‑country boil, peach cobbler, and heirloom tomato gazpacho for friends, seasons dishes with fresh basil, thyme,
    and pecans from their garden, and they relish exploring Atlanta’s food scene for farm‑to‑table spots like Miller Union and vibrant international eateries.
  core: Cheryl Noonan blends Southern hospitality with a data‑driven marketing mind, thrives on lively conversation, embraces flexible chaos, and they secretly hoard vintage recipe cards while occasionally
    forgetting to pay a bill.
background:
  cultural: Cheryl’s cultural background is rooted in the Southern United States, specifically the Georgian tradition of hospitality and community. Raised in a multigenerational, Anglo-American family with
    deep roots in the Atlanta-Cobb County region, she grew up attending Methodist church services, family reunions, and local festivals that celebrated Southern food, music, and storytelling. Her academic
    immersion in the arts and humanities expanded her appreciation for broader cultural narratives, prompting a lifelong interest in literature, theater, and historic preservation. This blend of Southern
    values—emphasis on personal connection, modesty, and an appreciation for regional heritage—combined with her professional exposure to diverse consumer cultures, equips her with a nuanced perspective
    on how cultural context shapes brand perception and communication.
