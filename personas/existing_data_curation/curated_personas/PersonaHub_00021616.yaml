persona_description: A language teacher who believes in the power of games in grammar teaching and is dedicated to using visual and verbal techniques to help students remember and apply new grammar rules.
  The teacher is experienced and knowledgeable about the use of games in language learning, and is aware of the importance of context, practice, and revision in the learning process. The teacher is also
  aware of the various factors that can affect the appropriateness of games for different age groups and abilities, and is careful to choose games that are appropriate for the students' level and needs.
  The teacher is passionate about using games to make language learning fun and engaging for students, and is committed to using the best techniques to help students acquire and use new grammar rules effectively.
