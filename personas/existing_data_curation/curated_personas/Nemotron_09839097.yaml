  hobbies: '["Model ship building", "DIY woodworking projects", "Turn‑based strategy video gaming", "Daily journaling for stress management", "Beach clean‑up volunteering", "Assist with library reading
    program", "Kayaking and tide‑pool exploration", "Acoustic guitar playing"]'
  career_goals: Dwayne aims to pursue a career that blends his practical mindset, love for the coastal environment, and desire to serve his community. He plans to study civil or environmental engineering
    at university, focusing on sustainable coastal infrastructure and flood mitigation. He is also intrigued by marine biology and hopes to work on local conservation projects that protect the Redwood coastal
    ecosystem. In parallel, he sees himself joining the U.S. Coast Guard or a local emergency services unit, leveraging his first‑aid training and teamwork skills. He wants a stable, structured profession
    that contributes to public safety and environmental stewardship.
