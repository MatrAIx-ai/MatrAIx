personas:
  professional: Dwayne Keel, a budding junior marine engineer with a knack for model ship construction and DIY woodworking, channels his love for structure and step‑by‑step problem solving into hands‑on
    projects while using his strategic gaming mindset to prototype efficient designs, and his cooperative nature ensures he often mentors younger peers in the school makerspace.
  sports: Dwayne Keel, an enthusiastic junior kayaker who spends weekends paddling calm bays with family, is a member of the Coastal Youth Kayak Club, follows the high school soccer team, the Riverdale
    Rams, for community spirit, and rounds out training with after‑school swimming sessions at the town pool.
  arts: Dwayne Keel, an amateur acoustic guitarist who strums folk tunes by artists like John Mayer and Jack Johnson while sketching model ships, finds solace in the lyrical storytelling of The Beatles
    and channels that inspiration into crafting detailed wooden miniatures, reflecting a blend of musical and tactile creativity.
  travel: Dwayne Keel, a nature‑oriented teen traveler, has explored the nearby tide pools of Seaside Cove, dreams of kayaking through the mangroves of the Everglades, and keeps a travel journal that lists
    future destinations like the Monterey Bay Aquarium and the Great Barrier Reef, balancing school commitments with family‑planned weekend getaways.
  culinary: Dwayne Keel, a budding home cook, prefers simple yet fresh meals such as grilled salmon with lemon‑dill sauce, fish tacos with corn tortillas, cilantro, and avocado, enjoys making trail‑mix
    snack bars for beach clean‑ups, and often experiments with seasoning blends while still wrestling with the occasional burnt toast.
  core: Dwayne Keel, a structured yet imaginative teen, balances a love for meticulous DIY projects and strategic gaming with a thoughtful journal habit that helps tame their frequent worries.
background:
  cultural: Dwayne is a White American from a family that has lived in Crescent City for generations, with ancestry rooted in Irish and German immigrants. His household reflects a blend of classic American
    coastal community values—emphasis on self‑reliance, neighborly cooperation, and respect for the Pacific shoreline. He participates in local traditions such as the Annual Redwoods Fourth of July Parade
    and the town’s seasonal fish‑hook festival, giving him a sense of cultural continuity. At school, he experiences a diverse mix of students, including peers of Native American heritage from nearby tribes,
    which has broadened his perspective on regional cultural history. The town’s modest size fosters close‑knit relationships and a collaborative spirit that shapes his considerate and community‑oriented
    outlook.
attributes:
  skills: '["Organizational planning and task management", "Basic Python programming (robotics basics)", "Model kit construction (marine models, scale ships)", "First‑aid certification and basic emergency
