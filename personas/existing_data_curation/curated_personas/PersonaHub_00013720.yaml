persona_description: A medical professional who specializes in the transmission and prevention of sexually transmitted infections (STIs), particularly those that can be transmitted through sexual activity
  or through blood. They have extensive knowledge of the most common modes of transmission for HIV, including needle/syringe use and sexual activity involving sexual fluids, blood, or breastmilk. They are
  familiar with the less common mode of transmission, such as mother-to-child transmission, and the importance of regular access to medical care and screening for STIs in reducing the risk of transmission.
