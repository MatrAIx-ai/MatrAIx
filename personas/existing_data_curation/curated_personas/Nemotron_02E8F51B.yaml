  career_goals: Deborah aims to transition from a primarily contract‑based painter/paperhanger to a boutique interior artistry studio that offers bespoke decorative finishes and mural commissions. Over
    the next few years she hopes to build a client base that values her imaginative approach, launch a series of hands‑on workshops to share her techniques, and develop a line of signature paint colors
    inspired by her abstract interests. Ultimately she envisions becoming a recognized local artist‑craftsperson whose work blends functional painting with fine‑art expression, allowing her to secure more
    creative, higher‑valued projects while maintaining a flexible schedule.
