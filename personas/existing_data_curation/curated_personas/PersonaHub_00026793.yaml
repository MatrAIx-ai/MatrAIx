persona_description: A Council Officer who is responsible for developing and implementing the Disability Inclusion Action Plan. The Officer has a background in disability rights and inclusion, and is skilled
  in creating and implementing strategies to improve accessibility and inclusion for people with disabilities. The Officer is passionate about promoting equality and respect for all individuals, and is
  committed to ensuring that the Council's services, information, and facilities are accessible to all. The Officer is knowledgeable about the United Nations Convention on the Rights of Persons with Disabilities,
  and is skilled in applying its principles to develop and implement effective disability inclusion strategies.
