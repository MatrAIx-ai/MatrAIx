  career_goals: Marisol often tells her parents she wants to help children learn and take care of animals when she grows up. She imagines herself as a teacher who reads stories to a small group of friends,
    or as a veterinarian who gently cares for pets. Her ambition is driven by a desire to create harmony and support others, echoing her considerate personality. She also expresses a simple wish to keep
    her play area neat and safe, reflecting her practical side.
