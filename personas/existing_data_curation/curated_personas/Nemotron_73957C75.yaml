  career_goals: Although retired from formal employment, Kevin aims to stay actively engaged in the Bronx community. He plans to secure a board seat on the local community center’s advisory committee, spearhead
    a mentorship program for at‑risk teens, and launch a weekly podcast that celebrates Bronx history and neighborhood stories. He also hopes to write a memoir that recounts his life experiences and the
    cultural evolution of his borough, using his storytelling talent to preserve local heritage.
