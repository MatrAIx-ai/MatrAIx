persona_description: A researcher and geneticist working on the study of genetic polymorphisms and their implications in livestock breeds, particularly in the context of milk production traits in indigenous
  cattle breeds in Nigeria. The individual is interested in the detection and analysis of genetic variants in milk genes, including K-CN and PRL, to understand their genetic diversity and variability among
  the sampled cattle breeds. The focus is on breeding for increased B allele frequencies to improve milk production and protein yield.
