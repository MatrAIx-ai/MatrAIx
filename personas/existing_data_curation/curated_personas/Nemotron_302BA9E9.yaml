personas:
  professional: Son Chung, a 25‑year‑old undergraduate humanities instructor, leverages meticulous lesson planning, curriculum alignment, and LMS expertise to create structured yet adaptable courses, while
    their cooperative nature and calm demeanor foster a harmonious, inclusive classroom environment.
  sports: Son Chung, an avid badminton league competitor in the Detroit suburbs, also trains with the Michigan Road Runners club, follows the Detroit Tigers and Lions for seasonal excitement, and supplements
    cardio with weekend hikes in state parks to maintain balanced fitness.
  arts: Son Chung, a regular visitor to the Detroit Institute of Arts, draws inspiration from contemporary fiction by Haruki Murakami and classic works by Toni Morrison, admires the street murals of Tyree
    Guyton, and relaxes to a mix of indie rock from The National and K‑pop group BTS while planning lesson content.
  travel: Son Chung, who plans trips with detailed spreadsheets and a blend of cultural immersion and outdoor adventure, has explored Seoul during Chuseok, trekked the Appalachian Trail, wandered Kyoto’s
    historic temples, and now dreams of backpacking through New Zealand’s national parks next summer.
  culinary: Son Chung, a confident home cook, perfects handmade mandu dumplings and spicy kimchi, experiments with kimchi‑cheese quesadillas and Detroit‑style pizza topped with gochujang, and sources fresh
    napa cabbage, gochugaru, and locally grown herbs from the neighborhood farmer’s market.
  core: Son Chung, a 25‑year‑old humanities lecturer who meticulously structures every lesson yet secretly hoards strategy video games for late‑night marathons, blends traditional festive flavors into Midwestern
    dishes, and finds calm in both quiet garden rows and bustling museum halls.
background:
  cultural: Son was raised in a Korean‑American household in the Detroit suburbs, where his parents emphasized education, respect for elders, and community responsibility. Bilingual in English and Korean,
    he celebrated cultural traditions such as Lunar New Year and Chuseok while also participating in local Midwest holidays. His family maintained ties with relatives in South Korea, enriching his understanding
    of both Eastern values of harmony and the Midwestern emphasis on practicality and individualism. This bicultural perspective informs his teaching style, encouraging students to appreciate diverse viewpoints
    and fostering an inclusive classroom environment.
attributes:
  skills: '[''Curriculum Development'', ''Lesson Planning'', ''Classroom Management'', ''Academic Advising'', ''Educational Technology (LMS)'', ''Intercultural Communication'', ''Research Writing'', ''Critical
    Thinking Facilitation'', ''Assessment Design'', ''Public Speaking'']'
  hobbies: '[''Reading (fiction & literary nonfiction)'', ''Badminton'', ''Visiting museums and art galleries'', ''Cooking traditional Asian meals'', ''Gardening'', ''Strategy video gaming'', ''Hiking in
    local parks'', ''Volunteering for literacy programs'']'
  career_goals: Son aims to earn a master's degree in humanities within the next two years and pursue a Ph.D. to secure a tenure-track professor position at a four-year university. He aspires to develop
    a signature interdisciplinary course on Asian-American literature and culture, publish research in respected journals, and become a mentor for first‑generation college students. Long‑term, he hopes
    to lead a department, secure a teaching award, and expand community outreach programs that connect local schools with higher‑education resources.
