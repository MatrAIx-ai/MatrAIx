  hobbies: '[''Jazz and soul music outings'', ''Dancing'', ''Community financial‑literacy volunteering'', ''Mentoring women in STEM'', ''Cooking Tex‑Mex and Southern fusion cuisine'', ''Yoga and mindfulness
