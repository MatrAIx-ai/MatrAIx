  career_goals: Marie aims to ascend to a senior executive role such as Chief Financial Officer within the next five years, leveraging her curiosity for innovative financial technologies and her practical
    experience in corporate finance. She plans to obtain her CPA and CFA certifications to deepen technical credibility, and to spearhead ESG and sustainable finance initiatives that align with her values
    of community uplift. Additionally, she envisions establishing a mentorship program for underrepresented professionals in finance, fostering diversity and inclusion while expanding her network through
    industry conferences and professional associations.
