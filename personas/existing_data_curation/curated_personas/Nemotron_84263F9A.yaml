personas:
  professional: Marie Jones is a seasoned financial manager who leverages advanced Excel, Power BI, SAP, Python, and SQL to drive data‑driven budgeting and risk assessments, while her sociable, assertive
    nature lets her translate complex financial concepts into clear narratives for cross‑functional teams and negotiate high‑stakes contracts with confidence.
  sports: Marie Jones follows the Houston Astros and Rockets, joins the Sunday morning CrossFit class at Houston’s Powerhouse Gym, runs with the local Houston Jazz Running Club during the cooler fall evenings,
    and squeezes in weekend pickleball matches at the community center when the weather permits.
  arts: Marie Jones regularly dances to live jazz and soul at Houston’s Continental Club, drawing inspiration from legends like Miles Davis, Etta James, and contemporary artist Lalah Delia, while also attending
    The Alley Theatre’s productions and exploring the Houston Museum of Fine Arts’ rotating exhibits on contemporary African‑American art.
  travel: Marie Jones favors spontaneous weekend road trips that take her along the Gulf Coast to New Orleans’ French Quarter, through Austin’s music district, and into the Hill Country’s wineries, while
    dreaming of a future cultural immersion in Oaxaca, Mexico, and keeping an eye on budget‑friendly airfare alerts for a spring visit to Kyoto.
  culinary: Marie Jones experiments with Tex‑Mex and Southern comfort food, perfecting chipotle‑marinated chicken enchiladas topped with smoked brisket and a side of jalapeño‑infused cornbread, while also
    mastering buttery buttermilk biscuits seasoned with smoked paprika and fresh cilantro, often sourcing ingredients from Houston’s vibrant farmers’ market.
  core: Marie Jones balances a high‑stakes CFO trajectory with nightly jazz outings, community mentorship, and a perpetual quest for inner calm, even as anxiety sometimes drives them to double‑check spreadsheets
    at 2 a.m.
background:
  cultural: Marie identifies as African American and grew up in a vibrant, multi‑generational household in Houston. Her family traditions blend Southern culinary heritage with the rich musical legacy of
    Black culture, including gospel choirs and jazz festivals. Influenced by the city's diversity, she actively participates in Juneteenth celebrations and supports local Black professional networks. Her
    cultural roots emphasize resilience, community solidarity, and the pursuit of excellence, shaping both her professional drive and her dedication to uplifting others through mentorship and community
    service.
