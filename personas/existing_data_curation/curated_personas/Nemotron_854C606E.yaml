  career_goals: Jessie aims to progress to a senior regional manager or director of operations role within the next five to seven years, overseeing multi‑site teams and spearheading company‑wide transformation
    initiatives. She is committed to shaping a collaborative culture that values continuous improvement and employee development. A longtime advocate for gender equity in leadership, she aspires to take
    on a corporate diversity and inclusion portfolio, mentoring emerging women leaders. Ultimately, she envisions launching her own consulting boutique focused on operational efficiency for mid‑size enterprises,
    leveraging her practical experience and strategic insight.
