personas:
  professional: Cynthia Rickel, an experienced educator, leverages their decades of classroom teaching, curriculum development, and meticulous organization to mentor new teachers, design senior-friendly
    technology curricula, and orchestrate community events with calm authority and a pragmatic eye for detail.
  sports: Cynthia Rickel enjoys low-impact exercise, joining a senior walking group that explores the Santa Fe River trail, cheering on the New Mexico Lobos during basketball season, participating in a
    local senior yoga class, and occasional community softball games organized by the Santa Fe community center, while staying mindful of their osteoarthritis.
  arts: Cynthia Rickel finds creative fulfillment playing the dulcimer at community dance nights, listening to folk legends like Joan Baez and Doc Watson, admiring the works of Georgia O'Keeffe at the local
    museum, and stitching quilts inspired by the colors of desert flora, which together nurture their sociable spirit and love for tradition.
  travel: Cynthia Rickel prefers thoughtfully planned trips, revisiting the historic pueblos of Northern New Mexico and the Grand Canyon, while dreaming of a quiet photography pilgrimage to Kyoto's Zen
    gardens and a culinary adventure in Oaxaca, balancing travel costs with a modest pension and a desire for cultural immersion.
  culinary: Cynthia Rickel, an avid farm-to-table cook, delights in preparing New Mexican staples like chiles rellenos stuffed with roasted Pueblo cheese, hearty posole brimming with hominy and green chile,
    and roasted squash blossoms seasoned with cumin and cilantro, often sharing these dishes at neighborhood potlucks and savoring the fresh heirloom tomatoes from their garden.
  core: Cynthia Rickel blends a meticulous, community-focused mindset with a warm, sociable heart, balancing structured volunteer work and gardening with lingering worries that fuel their dedication to
    lifelong learning and intergenerational harmony.
background:
  cultural: Cynthia grew up in a Midwestern white‑American family where education, community service, and self‑reliance were core values. After a career in teaching, she relocated to Corrales, New Mexico,
    where she embraced the region's blend of Anglo, Hispanic, and Native American influences. She loves the outdoors, the local agricultural heritage, and the vibrant arts scene, regularly attending the
    Albuquerque International Balloon Fiesta and nearby cultural festivals. Her upbringing instilled a respect for tradition and a pragmatic approach to life, while her years in New Mexico have deepened
    her appreciation for multicultural cooking, communal gardening, and intergenerational cooperation.
