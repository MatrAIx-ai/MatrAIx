  hobbies: '["Gardening", "Birdwatching", "Reading historical fiction", "Cooking Southern cuisine", "Walking nature trails", "Volunteer tutoring at the local library", "Participating in small church group
    gatherings"]'
  career_goals: Looking ahead, Deborah aims to advance into a senior director or vice‑president role where she can shape regional marketing strategy for a multi‑state organization. She wants to lead a high‑performing
    team, implement predictive analytics to anticipate market shifts, and establish a mentorship program that prepares younger marketers for leadership. In the longer term, she envisions launching a boutique
    consulting practice focused on helping small businesses in the Piedmont area develop disciplined, ROI‑focused marketing plans. Her ambition is balanced by a desire for stability, so she seeks positions
    that offer clear structures, measurable outcomes, and opportunities to leave a lasting professional legacy.
