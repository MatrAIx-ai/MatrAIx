  hobbies: '[''Fishing'', ''Deer hunting'', ''Camping'', ''DIY home improvement'', ''Woodworking'', ''Restoring vintage pickup trucks'', ''Watching classic Western films'', ''Listening to country‑rock music'',
    ''Following Texas Rangers baseball'', ''Following Dallas Cowboys football'']'
  career_goals: James aspires to move into a supervisory role, such as foreman or site manager, within the next three to five years. He plans to earn OSHA 30‑hour certification and obtain a commercial driver’s
    license to qualify for equipment‑leadership positions. Eventually, he hopes to launch his own small general‑contracting business, focusing on residential remodels that incorporate energy‑efficient practices.
    While he values flexibility, he also wants to develop stronger organizational habits to manage crews more effectively, balancing his competitive nature with a collaborative leadership style.
