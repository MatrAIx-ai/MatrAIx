  hobbies: '[''Basketball'',''Hip‑hop dance classes'',''Community gardening'',''Soul food cooking'',''Live music festivals'',''Journaling'',''Yoga'',''Volunteering at food banks'',''Exploring farmers markets'']'
  career_goals: Kiara aims to move beyond miscellaneous labor to a supervisory role, eventually becoming a farm manager for a midsized diversified operation or launching her own community‑supported agriculture
    (CSA) venture in Greensboro. She plans to enroll in a bachelor’s program in agribusiness or sustainable agriculture while obtaining certification as a Certified Crop Adviser. Long‑term, she hopes to
    create a training program that offers youth in her neighborhood hands‑on experience in modern farming techniques, combining her competitive drive with a desire to give back to her community. She also
    seeks to develop better stress‑management habits so she can balance ambitious career goals with personal wellbeing.
