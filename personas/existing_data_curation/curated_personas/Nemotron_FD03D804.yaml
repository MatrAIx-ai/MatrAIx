  hobbies: '[''Hiking'', ''Birdwatching'', ''Fishing'', ''Woodworking'', ''Gardening'', ''Reading historical non-fiction'', ''Playing acoustic guitar'', ''Community volunteering'']'
  career_goals: Hayes aims to complete a bachelor's degree in Recreation Management within the next two years, followed by earning the Certified Park and Recreation Professional (CPRP) credential. He aspires
    to move into a senior recreation manager position for the Grady County Parks and Community Services Department, where he can design inclusive, evidence‑based programs for underserved populations, integrate
    technology for streamlined registration, and secure grant funding. Long‑term, he envisions launching a community‑focused outdoor adventure business that offers guided hikes, nature workshops, and therapeutic
    recreation services, while mentoring young recreation workers.
