  hobbies: '[''Garden cultivation (tropical and citrus plants)'', ''Reading historical nonfiction and science periodicals'', ''Chess puzzles and Go problem solving'', ''Traditional Korean cooking and fermentation'',
    ''Scale model ship building'', ''Bird‑watching in nature preserves'', ''Attending Korean cultural luncheon gatherings'', ''Participating in a seniors’ book club'']'
  career_goals: Although retired, Feng aims to keep his mind sharp by mastering advanced horticultural techniques, completing a personal cookbook that blends Korean recipes with Florida ingredients, and
    documenting his family’s immigration story for future generations. He plans to volunteer part‑time at the local senior center teaching basic computer skills, occasionally consult on small home‑renovation
    projects for friends, and eventually travel to Korea for a family reunion while ensuring continued financial stability for his wife.
