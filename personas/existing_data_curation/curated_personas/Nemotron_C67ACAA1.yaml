personas:
  professional: Feng Kwon, a retired mechanical troubleshooter turned community tech mentor, leverages a pragmatic, detail‑oriented mindset to deliver hands‑on computer and home‑maintenance workshops while
    quietly satisfying a lifelong curiosity through gardening, model‑ship building, and historical research; they balance new ideas with proven methods and prefer small‑group settings for teaching.
  sports: Feng Kwon, an avid bird‑watching enthusiast who enjoys leisurely walks through local nature preserves, follows the Miami Marlins and the Florida Gators with quiet loyalty, participates in a senior
    softball league on weekends, and keeps a low‑impact exercise routine to manage arthritis; they value low‑stress physical activity over competitive sports.
  arts: Feng Kwon, an accomplished calligrapher and brush‑painter who also builds intricate scale model ships, finds inspiration in the works of Pablo Picasso, the classical piano of Ludwig van Beethoven,
    and folk songs by Joni Mitchell, and spends evenings sketching while listening to vinyl jazz records; they channel their meticulous nature into artistic expression.
  travel: Feng Kwon, a methodical traveler who balances careful budgeting with a yearning for cultural reconnection, has explored the Everglades and Charleston, dreams of a pilgrimage to their ancestral
    homeland in East Asia, and prefers small‑group tours that allow ample time for photography and quiet contemplation; they plan trips with an eye on financial stability for their wife.
  culinary: Feng Kwon, a dedicated home chef, perfects a fermented cabbage side dish paired with locally caught grouper, crafts citrus‑infused pickles, experiments with hibiscus‑glazed shrimp, and routinely
    prepares a fusion seafood stew that melds spicy fermented vegetables with Florida orange zest, while admitting a habit of over‑salting when excited; they view cooking as both a scientific experiment
    and a cultural bridge.
  core: Feng Kwon, a solitary‑minded polymath with a green thumb, meticulous budgeting, health‑watchful habits, and a penchant for fermented flavors, channels meticulous curiosity into gardening, cooking,
    and community mentorship, all while wrestling with a lingering streak of worry.
background:
  cultural: Feng was born to Korean immigrant parents who moved to the United States in the early 1960s. Raised in a bilingual household in the Midwest before relocating to Florida in his 40s, he grew up
    with a strong Confucian emphasis on respect for elders, education, and family responsibility, while also adopting the pragmatic, individualistic aspects of American culture. His upbringing blended traditional
    Korean customs—such as celebrating Chuseok, practicing calligraphy, and preparing kimchi—with the Floridian lifestyle of outdoor recreation and multicultural community involvement, shaping his disciplined
    yet curious approach to life.
