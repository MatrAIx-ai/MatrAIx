  hobbies: '[''Baking and cooking'', ''Indoor herb gardening'', ''Knitting and crocheting'', ''Reading contemporary romance and historical fiction'', ''Watching streaming TV series'', ''Volunteering at
    church events'', ''Walking on local desert trails'', ''Spending time with close friends'']'
  career_goals: She plans to enroll in a community college program in health administration or office management within the next year, aiming to secure a full‑time administrative assistant position at a
    local medical clinic or school district. Over the next five years, Dorina hopes to become a certified medical records specialist, achieving a stable, routine‑driven career that offers predictable hours
    and the opportunity to support her family. She also dreams of eventually opening a small home‑based bakery offering custom cakes for community events, balancing her professional ambitions with her love
    for cooking.
