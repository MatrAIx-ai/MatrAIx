personas:
  professional: Dorina Bannister, a 21‑year‑old aspiring medical records specialist, channels her love for routine and meticulous organization into a supportive administrative role at a local health clinic,
    where she excels at schedule coordination, precise data entry, and courteous patient communications while sprinkling in occasional flexibility to accommodate unexpected demands.
  sports: Dorina Bannister stays active by joining the Desert Horizons Hiking Group for weekend walks along the Sonoran dunes, runs a weekly yoga class at the community center, and follows the Arizona Cardinals,
    Phoenix Suns, and Arizona Diamondbacks with the same steady enthusiasm she brings to her personal fitness routine.
  arts: Dorina Bannister indulges her creative side by binge‑watching series such as ‘Virgin River’ and ‘Bridgerton,’ devouring romance novels by Nora Roberts and historical sagas by Ken Follett, and knitting
    intricate shawls while listening to folk‑pop artist Agnes Obel, all of which nourish her love for storytelling and gentle artistry.
  travel: Dorina Bannister plans her getaways around modest budgets and a need for tranquility, favoring road trips to nearby desert marvels like Sedona and the Grand Canyon, reminiscing about a weekend
    in Santa Fe’s artisan markets, and dreaming of a future culinary pilgrimage to Tuscany’s countryside villages.
  culinary: Dorina Bannister’s culinary comfort zone revolves around baking simple pastries—flaky cinnamon rolls, buttery banana bread, and custom vanilla cakes topped with fresh berries—while she experiments
    with herb‑infused dishes like rosemary focaccia and lemon‑thyme grilled chicken using the basil, mint, and oregano she cultivates in her indoor garden.
  core: Dorina Bannister is a predictably organized, quietly ambitious twenty‑one‑year‑old who balances a love for spreadsheets with a habit of over‑baking for friends, yet occasionally forgets to prioritize
    her own rest.
background:
  cultural: Dorina comes from a middle‑class white American family with roots in the Midwest that settled in the Southwest. Her upbringing reflects mainstream U.S. customs—celebrating holidays such as Thanksgiving,
    Christmas, and Fourth of July with family gatherings, attending a Protestant church, and valuing community service. Living in Chandler, Arizona, she is familiar with the desert climate, local festivals,
    and enjoys the region’s blend of Southwestern and Mexican culinary influences while maintaining her family's traditional values.
attributes:
  skills: '[''Organizational and time‑management'', ''Microsoft Office (Word, Excel, PowerPoint)'', ''Customer service and telephone etiquette'', ''Basic bookkeeping and budgeting'', ''Event planning for
