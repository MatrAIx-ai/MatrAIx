persona_description: A field biologist who specializes in conducting research on regenerative agriculture and its impact on the ecology of farms. They are interested in assessing the resilience of farms
  to major natural disturbances, the potential supply of nutrients in the soil, the biological activity in the soil, the physical properties of the soil, changes in plant reproduction, the extent of tree
  cover, and the status of ground cover. They are looking for ways to improve the ecological function of the soil and to build or rebuild the reproductive potential of plants and pastures.
