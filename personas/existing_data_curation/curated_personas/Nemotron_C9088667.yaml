  hobbies: '["Soccer","LEGO building","School theater/acting","Competitive video gaming (Minecraft, Fortnite)","Reading adventure books","Drawing comics","Collecting baseball cards","Organizing backyard
    games"]'
  career_goals: Terrence dreams of a future where he can combine his love for leading, helping others, and performing. He hopes to become a teacher or school principal to shape a structured learning environment,
    or a community firefighter because of his desire to serve responsibly. He also imagines being a TV host or sports commentator, where he can be at the center of attention, talk to audiences, and share
    his competitive spirit. In the short term, he aims to win school spelling bees, earn the captaincy of his soccer team, and lead neighborhood game sessions.
