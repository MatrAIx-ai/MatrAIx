personas:
  professional: Terrence Mcbride, an 8-year-old budding engineer, channels a love for LEGO building and structured play into simple prototype machines while their competitive spirit and love for the spotlight
    push them to organize school science fairs and lead collaborative projects.
  sports: Terrence Mcbride stars as a forward for the Willow Creek Youth Soccer Club, idolizes Lionel Messi, and they cheer loudly for the New York Yankees while trading baseball cards, often spending weekends
    at local parks practicing dribbling drills and watching Dallas Cowboys games.
  arts: Terrence Mcbride thrives on stage in school plays, delivers dramatic monologues reminiscent of Lin-Manuel Miranda's rhythm, and they fill sketchbooks with comic strips inspired by Stan Lee and Miyazaki's
    whimsical worlds, while frequent visits to the local museum fuel their imagination.
  travel: Terrence Mcbride loves planning family road trips with hand-drawn maps, dreams of exploring Yellowstone National Park's geysers, and they eagerly anticipate a future visit to Tokyo's interactive
    Lego Discovery Center, balancing excitement with the reality of school schedules.
  culinary: Terrence Mcbride enjoys building edible LEGO brick sandwiches, devours pepperoni pizza topped with extra mozzarella, and they often experiment with making strawberry-banana smoothies, though
    they habitually snack on sugary cereal before bed.
  core: Terrence Mcbride is an 8-year-old with a competitive edge, a love for structured play, and a magnetic talk-at-the-front personality that fuels soccer victories, LEGO creations, and lively school
    performances, even if they sometimes overindulge in video-game snacks.
background:
  cultural: Terrence is raised in a white, middle‑class family in Cordova, a suburban community in Shelby County, Tennessee. His upbringing reflects Southern cultural traditions, including attendance at
    a local Baptist church, participation in neighborhood barbecues and community events, and appreciation for country music and Southern cuisine. He attends a public elementary school where values such
    as hospitality, respect for elders, and a strong sense of community pride are emphasized.
