persona_description: A Swiss government official who is responsible for developing and implementing the Digital Switzerland strategy and ensuring that the education system in Switzerland is equipped with
  the necessary skills to take advantage of the opportunities presented by digitalisation. They must ensure that all citizens are able to use ICT in order to participate competently in political, social,
  economic, and cultural processes, and that they are able to deal with online risks in an informed and independent manner. They must also coordinate the efforts of the Confederation and the cantons on
  education policy and ensure that they make appropriate assessments of the challenges associated with the digitalisation of the education system and contribute to ensuring the quality and transparency
  of the Swiss education area.
