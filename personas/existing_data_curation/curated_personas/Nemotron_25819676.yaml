personas:
  professional: Jocelyn Oneill, a licensed practical nurse in Pittsburgh, blends meticulous clinical expertise with a vivid imagination by creating hand‑drawn medical illustrations for patient education
    while meticulously managing chart documentation and spearheading telehealth triage for pediatric oncology patients.
  sports: Jocelyn Oneill, an avid follower of the Pittsburgh Steelers and Penguins, joins a local sunrise running club along the Three Rivers Heritage Trail each spring, practices weekly yoga to counterbalance
    long shifts, and prefers solo treadmill sessions over team sports, finding the rhythmic pacing a meditative complement to her analytical mind.
  arts: Jocelyn Oneill immerses herself in the visual and literary arts by curating a private collection of abstract works inspired by Mark Rothko and contemporary folk motifs, attending monthly readings
    of speculative fiction at the Carnegie Library featuring authors like N. K. Jemisin, and listening to ambient compositions by Brian Eno while sketching anatomically stylized portraits.
  travel: Jocelyn Oneill, who meticulously plans trips using a detailed itinerary spreadsheet, has trekked the Appalachian Trail’s southern terminus, explored the historic districts of Dublin and Berlin
    to connect with her ancestral roots, and dreams of a quiet solo retreat in Kyoto’s Arashiyama bamboo grove, balancing her love for discovery with a modest travel budget.
  culinary: Jocelyn Oneill, an experimental home cook with intermediate skills, enjoys crafting beet‑infused risotto and sous‑vide salmon paired with rosemary‑scented potatoes, frequently sourcing fresh
    herbs from the Strip District farmer’s market and documenting each recipe in a hand‑bound culinary journal.
  core: Jocelyn Oneill, a methodical nurse‑artist, channels quiet curiosity into detailed patient education art, balances a disciplined budget with occasional splurges on paint supplies, and manages mild
    allergies with a regimented self‑care routine while preferring solitary walks along the river over bustling social scenes.
background:
  cultural: Jocelyn was raised in a middle‑class, ethnically white family with roots in Irish and German ancestry, reflective of Pittsburgh's historic immigrant neighborhoods. Growing up in the Squirrel
    Hill area, she was exposed to a blend of working‑class values, strong community ties, and a vibrant cultural scene anchored by the city's museums, theaters, and public libraries. The city’s reputation
    as a healthcare hub, anchored by renowned institutions like UPMC, reinforced her commitment to nursing, while the local arts district fostered her passion for visual and literary arts. This confluence
    of industrious heritage and artistic vitality shapes her identity as a diligent, compassionate professional who seeks to weave creativity into the fabric of patient care.
