  hobbies: '[''Oil painting'', ''Sketching'', ''Creative writing (short stories and poetry)'', ''Reading speculative fiction and philosophy'', ''Visiting art museums and galleries'', ''Nature walks along
    river trails'', ''Photography'', ''Puzzle solving'', ''Experimental cooking'', ''Listening to ambient and classical music'']'
  career_goals: Jocelyn aspires to advance her nursing career by completing an RN‑to‑BSN program within the next three years, with a long‑term goal of becoming a clinical nurse specialist in pediatric oncology,
    a field that aligns with her curiosity about complex disease processes and her compassion for vulnerable patients. She also aims to integrate her artistic talents into healthcare by developing visual
    education tools and possibly collaborating with the hospital’s art therapy department to create therapeutic workshops for patients. Ultimately, she envisions a leadership role where she can mentor new
    nurses, champion innovative patient‑centered care models, and influence policy that supports holistic, creative approaches to healing.
