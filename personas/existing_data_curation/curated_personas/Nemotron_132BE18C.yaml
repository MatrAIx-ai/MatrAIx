  hobbies: '[''Boating'', ''Fishing'', ''Beach volleyball'', ''Woodworking'', ''DIY home projects'', ''Volunteer work at senior center'', ''Karaoke'', ''Classic rock concerts'', ''Pool and darts'', ''Attending
    local festivals'']'
  career_goals: Wayne aims to move into a senior supervisory or safety‑trainer role within the next two years, seeking certification as an OSHA trainer and completing a Lean Six Sigma Green Belt to boost
    plant efficiency. He hopes to lead a project that reduces energy consumption by at least 10% and to be recognized for an outstanding safety record. As he approaches retirement, he plans to transition
    into a consultant or part‑time instructor, mentoring the next generation of operators while staying actively involved in his industry.
