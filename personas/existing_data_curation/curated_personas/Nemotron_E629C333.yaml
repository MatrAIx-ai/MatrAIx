personas:
  professional: A budding hospitality professional, Erika Elliott leverages her front-of-house experience, rapid POS skills, and calm, assertive demeanor to train new staff and keep restaurant flow organized
    while eyeing a shift-supervisor role.
  sports: An enthusiastic weekend athlete, Erika Elliott plays pick-up basketball at the local community park, follows the Prince George’s County high school team and the Washington Wizards, and participates
    in a community league that meets every Saturday.
  arts: A devoted fan of live R&B and neo-soul, Erika Elliott frequently attends concerts by artists like H.E.R., Ari Lennox, and Jorja Smith, while also channeling rhythm into hip-hop and contemporary
    R&B dance workshops and devouring contemporary fiction that explores modern urban narratives.
  travel: A budget-conscious explorer, Erika Elliott enjoys day trips to historic Annapolis, weekend hikes in Shenandoah National Park, and dreams of a culinary pilgrimage to New Orleans, often planning
    trips around school breaks and part-time work schedules.
  culinary: A creative home cook, Erika Elliott masters family staples such as fried chicken and collard greens, adds a modern twist with mango-chili glaze, delights friends with banana pudding cupcakes,
    and experiments with spices like smoked paprika and sumac in her baking.
  core: Erika Elliott is an organized, socially vibrant 18-year-old who balances structured ambition with a love for community dance, basketball, and culinary experiments, though they sometimes stretch
    themselves thin with overlapping commitments.
background:
  cultural: Erika grew up in Riverdale, a suburb of Prince George’s County that is home to a vibrant Black middle‑class community. Her family maintains traditions of shared meals, church gatherings, and
    community service, which have instilled a strong sense of collective responsibility and pride in her African‑American heritage. The cultural environment of the county—marked by historic Black churches,
    local festivals celebrating African‑American art and cuisine, and a network of supportive family and neighborhood ties—has shaped her values of cooperation, assertiveness, and resilience. Erika’s exposure
    to both the rich cultural legacy of Maryland’s Black community and the diverse, urban influences of nearby Washington, D.C., informs her appreciation for music, food, and community engagement.
