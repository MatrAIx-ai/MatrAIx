  career_goals: Erika aims to turn her practical experience in hospitality into a formal career in restaurant management. She plans to enroll in a community college program in hospitality or business administration
    within the next year, leveraging scholarships available to local students. Her short‑term goal is to become a shift supervisor and gain leadership experience, while her long‑term ambition is to manage
    a family‑friendly restaurant in Prince George’s County that emphasizes community engagement and provides job training for youth. She also envisions opening a small café that offers a blend of Southern
    comfort food and contemporary twists, creating a space that reflects her cultural heritage and invites social gatherings. Erika seeks mentorship from seasoned managers and intends to complete a certified
    food safety course to bolster her qualifications.
