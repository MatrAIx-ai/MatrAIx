  hobbies: '[''Woodworking'', ''Gardening'', ''Reading historical nonfiction'', ''Listening to technology podcasts'', ''Biking/walking'', ''Fishing'', ''Volunteering at food bank'', ''Chess'', ''Attending
    local fairs and community gatherings'']'
  career_goals: Nicholas aims to advance within the United States Postal Service by moving into supervisory roles such as senior carrier or postmaster of his local branch. He wants to lead a team, mentor
    newer carriers, and improve community outreach through initiatives like sustainable delivery practices and the adoption of electric vehicles. To support these ambitions, he plans to earn a certification
    in logistics or supply chain management, possibly completing an associate degree. He also aspires to influence regional postal policy, leveraging his practical knowledge while preparing for a comfortable
    early retirement that still allows him to volunteer and stay engaged in community service.
