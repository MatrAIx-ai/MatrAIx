  hobbies: '[''Art Gallery Visits'', ''Watercolor Painting'', ''Historical Reading'', ''Gardening'', ''Woodworking'', ''Nature Photography'', ''Local History Society'', ''Birdwatching'', ''Cooking'', ''Community
    Theater'', ''Chess'']'
  career_goals: As he approaches retirement, Joshua aims to transition into a part‑time advisory capacity where he can mentor younger administrative professionals and help streamline office practices for
    small nonprofits in his area. He hopes to author a practical handbook on workflow optimization drawn from his decades of experience, and to obtain a Certified Administrative Professional (CAP) credential
    as a personal milestone. Additionally, Joshua aspires to serve on the board of the local arts council, using his appreciation for art to support community cultural projects while ensuring a smooth succession
    plan for his current supervisory role.
