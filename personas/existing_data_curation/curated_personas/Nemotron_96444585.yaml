personas:
  professional: Sarvani Garcha, a five‑year‑old classroom helper in training, blends a love for exploring new ideas with a practical knack for neatly arranging crayons, books, and block towers, making them
    the go‑to child assistant for teachers who value reliability and adaptable organization.
  sports: Sarvani Garcha, a member of the Little Lions under‑6 soccer team, spends sunny Saturday mornings dribbling a bright orange ball at the community field in spring, splashes in the local pool during
    summer, and they proudly don a Chicago Cubs cap to cheer on the hometown baseball heroes, blending structured team play with spontaneous outdoor fun.
  arts: Sarvani Garcha, who loves drawing vibrant scenes from Dr. Seuss books and singing along to Disney's "Let It Go" performed by Idina Menzel, channels their creativity through Play‑Doh sculptures and
    a well‑worn sketchbook, and they often reenact favorite Pixar characters like Buzz Lightyear during imaginative play, highlighting how artistic expression shapes their joyful identity.
  travel: Sarvani Garcha, who proudly displays a sticker‑filled passport cover from family trips to Disneyland in California, a beach adventure in Myrtle Beach, and a short hike in the nearby state park,
    prefers itineraries that combine scheduled meet‑and‑greets with plenty of free time to explore playgrounds and sandcastles, and they eagerly map out future destinations like the Grand Canyon in a colorful
    travel journal.
  culinary: Sarvani Garcha, who delights in scooping extra cheese onto their mac‑and‑cheese and constructing peanut‑butter‑banana sandwiches with a child‑safe plastic knife, enjoys blending mango and banana
    smoothies for snack time, yet they habitually forget to finish their vegetable side, a quirky habit their parents gently nudge them to improve.
  core: Sarvani Garcha, a five‑year‑old who balances vivid curiosity with tidy habits, spends mornings arranging crayons by color before launching into imaginative adventures, and they occasionally leave
    a trail of Lego pieces behind, a charming reminder of their playful spontaneity.
background:
  cultural: Sarvani's family originates from India and she grows up in a bilingual household where English and Hindi are spoken. The family celebrates Diwali, Holi, and Raksha Bandhan with traditional sweets,
    rangoli designs, and stories about mythology, while also taking part in American holidays like Thanksgiving and Halloween. Meals often feature rotis, rice, dal, and occasional biryani, introducing her
    to rich flavors. Community gatherings at the local Sikh Gurdwara and Indian cultural center deepen her connection to heritage. This blend of South Asian customs and Midwestern American life shapes her
    values of respect, education, and community.
