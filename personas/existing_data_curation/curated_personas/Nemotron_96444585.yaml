  career_goals: Although only five, Sarvani already talks about wanting to help others and explore the world. She dreams of becoming a teacher who can share stories, a doctor who cares for sick people,
    or an astronaut who discovers new places, reflecting her blend of curiosity and practicality. She also imagines caring for animals as a veterinarian because she loves the family dog and neighborhood
    cats. These aspirations are shaped by her desire to be kind, reliable, and to make a positive impact.
