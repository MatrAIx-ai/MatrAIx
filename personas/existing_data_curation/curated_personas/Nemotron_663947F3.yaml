  hobbies: '["Visiting art galleries and museums", "Reading contemporary fiction and art theory", "Playing acoustic guitar", "Participating in community theater", "Organizing monthly art walks", "Gardening
    and outdoor sketching", "Creating mixed-media collages", "Cooking experimental dishes", "Attending regional cultural festivals", "Hosting book-club discussions", "Practicing mindfulness and journaling",
    "Volunteering at local arts nonprofits"]'
  career_goals: Matthew aims to translate his passion for the arts and his empathic nature into a sustainable career that supports both his family and his personal well-being. In the short term, he plans
    to secure a part-time position as a community arts coordinator or a volunteer‑lead instructor for local workshops, focusing on programs that use creative expression to promote mental health. He intends
    to pursue a certification in art therapy within the next three years, allowing him to integrate therapeutic techniques with his artistic expertise. Long-term, he hopes to launch a nonprofit art-wellness
    centre in East Texas that offers free classes, exhibitions, and counseling services, and to author a guidebook on using mixed-media art for anxiety relief. He also seeks to develop reliable income streams
    through grant writing, freelance content creation, and occasional teaching contracts, while maintaining the flexibility to stay engaged with his local community and family.
