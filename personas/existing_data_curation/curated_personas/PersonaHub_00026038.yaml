persona_description: A researcher and policy analyst specializing in labor market and skills data analysis. They are particularly interested in understanding the role of human capital, particularly skills,
  across different economies and in different stages of life. They have a strong background in econometrics and econometric modeling, and are skilled in using data from international surveys such as the
  Panel International Assessment of Adult Competencies (PIAAC). They are interested in the implications of their findings for policy and practice, particularly in relation to skills development and the
  labor market. They are likely to be based in a research institution or think tank and have expertise in international labor market research.
