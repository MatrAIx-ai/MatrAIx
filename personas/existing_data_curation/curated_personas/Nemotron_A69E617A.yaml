personas:
  professional: Manuel Duran, a 16‑year‑old aspiring automotive technician, channels his methodical planning and bilingual communication skills into coordinating his youth soccer team's practice schedules,
    leading volunteer projects at the Brownsville community center, and building remote‑controlled car prototypes that showcase his hands‑on mechanical aptitude.
  sports: Manuel Duran, a 16‑year‑old midfielder for the Brownsville FC youth soccer team, trains five days a week, follows the Dallas Cowboys, Houston Astros, and San Antonio Spurs, and incorporates weekend
    pick‑up basketball games at the local community center to stay fit and socially engaged.
  arts: Manuel Duran, a 16‑year‑old who loves dancing to regional Mexican beats from Los Tigres del Norte and Banda El Recodo, frequently creates playlists for team warm‑ups, enjoys playing Civilization
    VI for its strategic storytelling, and watches films like Roma and Coco to stay connected to cultural narratives.
  travel: Manuel Duran, a 16‑year‑old budget‑conscious traveler, has explored South Padre Island and a family road‑trip to San Antonio’s River Walk, dreams of visiting Mexico City’s automotive museums and
    the Tokyo Motor Show, and prefers meticulously planned itineraries over spontaneous trips due to his love of structure.
  culinary: Manuel Duran, a 16‑year‑old enthusiastic home cook, prepares tacos al pastor with pineapple‑marinated pork, achiote, and cilantro, rolls tamales using corn husks and masa, and experiments with
    homemade salsa verde featuring tomatillos and serrano peppers, though he often forgets to clean the kitchen afterward.
  core: Manuel Duran, a 16‑year‑old organized and sociable teen, balances hands‑on mechanical projects, community leadership, disciplined finances, and a structured approach to health while occasionally
    losing sleep to marathon strategy video games and snack runs.
background:
  cultural: Manuel is a first‑generation Mexican‑American raised in Brownsville, Texas, a city that straddles the U.S.–Mexico border. His household embraces Mexican traditions, speaking Spanish at home,
    celebrating Día de los Muertos and other cultural festivals, and enjoying regional foods. The close‑knit Hispanic community and daily cross‑border interactions shape his worldview, reinforcing values
    of family loyalty, respect, hard work, and community involvement. He attends a local Catholic parish and participates in community events that blend Mexican folklore with Texan influences.
attributes:
  skills: '[''Organizational planning'', ''Bilingual communication (Spanish/English)'', ''Basic carpentry'', ''Automotive maintenance'', ''Team leadership'', ''Conflict resolution'', ''Project coordination'']'
