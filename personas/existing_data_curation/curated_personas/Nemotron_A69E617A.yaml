    video games'']'
  career_goals: Manuel aims to complete his high school equivalency and enroll in a Texas community college to study mechanical engineering technology or automotive technology. He aspires to become a skilled
    automotive technician or work in logistics, leveraging his methodical approach and practical skills. Long‑term, Manuel envisions opening a small automotive repair shop in Brownsville that can provide
    jobs for local youth and serve his neighborhood. He also hopes to mentor younger community members, helping them stay in school and acquire hands‑on skills.
