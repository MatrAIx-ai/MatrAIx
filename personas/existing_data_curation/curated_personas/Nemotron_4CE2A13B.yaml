  career_goals: Even at six, Ha F Wang frequently shares imaginative career dreams that blend her love for animals, problem‑solving, and exploration. She often says she wants to become a veterinarian to
    care for pets and wildlife, reflecting her compassion and self‑interest in helping living beings. She also dreams of designing simple gadgets that make everyday tasks easier for kids, inspired by her
    curiosity about how things work. Occasionally she imagines traveling to space as an astronaut, sparked by the planets she sees in storybooks. These goals illustrate her desire to combine practical help
    with creative invention.
