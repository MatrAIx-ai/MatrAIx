personas:
  professional: Ha Wang is a budding little scientist who turns curiosity into hands‑on experiments, from decoding simple coding puzzles on a tablet to exploring insects in the park, applying a practical
    mindset to every new idea.
  sports: Ha Wang enjoys weekend soccer drills with the neighborhood junior league, loves splashing in the community pool during summer, proudly wears the tiny jersey of the local baseball team the Tigers,
    and participates in a kids’ rock‑climbing club at the community center.
  arts: Ha Wang spends afternoons drawing cats and turtles in vivid colors inspired by Eric Carle and Dr. Seuss, builds imaginative scenes with LEGO art sets, listens to songs from the movie Frozen, and
    treasures collecting limited‑edition animal stickers.
  travel: Ha Wang loves family trips to the city zoo, weekend beach outings at Sunny Cove, exploring the nearby botanical garden, and dreams of one day seeing the towering castles of Europe after watching
    a travel documentary with a parent.
  culinary: Ha Wang helps roll dumplings during Lunar New Year festivities, mixes peanut butter with banana slices for a favorite sandwich, enjoys a steaming bowl of chicken noodle soup made with a grown‑up’s
    help, and can’t resist strawberry ice cream on warm afternoons.
  core: Ha Wang is a reserved, curiosity‑driven six‑year‑old who builds LEGO worlds, sketches animal friends, saves diligently for new projects, sometimes lets disorganization show, and navigates life with
    a blend of practicality and imagination.
background:
  cultural: Ha F Wang is a second‑generation Chinese‑American living in Hacienda Heights, a suburb of Los Angeles known for its vibrant Asian community. At home, Mandarin is spoken alongside English, and
    the family observes traditional Chinese customs such as Lunar New Year, the Mid‑Autumn Festival, and weekly tea rituals. They frequently shop at local Asian markets for fresh produce and specialty items,
    and attend community events at the nearby Chinese cultural center. This bicultural environment blends her heritage’s emphasis on family cohesion, respect for elders, and communal celebrations with the
    diverse, multicultural influences of Southern California, providing a rich tapestry of cultural experiences that shape her daily life.
