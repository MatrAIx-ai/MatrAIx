  career_goals: Although retired from formal employment, Moss aims to deepen his role as a community elder. He wants to mentor younger residents in practical trades, document and preserve local history
    through oral interviews and written memoirs, and expand his volunteer work with the town’s senior center and fire department. He also hopes to learn a new musical instrument (such as the harmonica)
    to add to his community performances, and to travel to nearby historical sites in Pennsylvania to enrich his personal knowledge and share those experiences with his social circles.
