    Photoshop/Canva)'', ''Project coordination'']'
  hobbies: '[''Visiting local art galleries and museums'', ''Reading contemporary art books and art history'', ''Painting watercolors'', ''Photography of rural landscapes'', ''Hiking and nature walks'',
    ''DIY home improvement projects'', ''Gardening'', ''Cooking experimental recipes'', ''Listening to classic rock on vinyl records'', ''Playing strategic board games with a small group of friends'']'
  career_goals: Luke aims to move from a first‑line supervisory role into a senior operations or office manager position within the next three to five years. He plans to complete a bachelor’s degree in
    Business Administration, possibly followed by an MBA, to solidify his qualifications for higher‑level leadership. His ambition includes spearheading digital transformation initiatives—such as automating
    routine tasks with AI tools—and establishing a culture of data‑driven decision making across his department. Luke also hopes to mentor emerging supervisors, leveraging his competitive drive to create
    a high‑performance team that consistently exceeds company targets.
