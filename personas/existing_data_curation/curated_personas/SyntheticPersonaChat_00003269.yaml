    User 1: That''s cool. I''m a graduate student at the University of California, Berkeley.

    User 2: Oh, that''s awesome. What are you studying?

    User 1: I''m studying computer science.

    User 2: That''s cool. I''ve always been interested in computer science.

    User 1: It''s a lot of fun. I''m glad I chose it.

    User 2: I''m glad you''re happy with it.

    User 1: I am. It''s a great field.

    User 2: It sounds like it. I''m glad I met you.

