  career_goals: In the near future, Helen aims to win a regional youth art competition and to launch an after‑school art club at her middle school, where she can mentor peers and create a supportive space
    for creative expression. She also hopes to improve her soccer skills enough to make the school varsity team. Looking further ahead, Helen dreams of becoming a professional illustrator or animation artist,
    using her work to convey emotions and stories that help others, especially children coping with anxiety. She is intrigued by the idea of combining art with therapeutic practices, envisioning a career
    that could blend illustration, teaching, and child‑focused art therapy.
