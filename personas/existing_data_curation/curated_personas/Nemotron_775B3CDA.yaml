personas:
  professional: Helen Gillotti, an aspiring set designer and visual storyteller, combines their curiosity for new ideas with a disciplined yet flexible approach to craft detailed miniature sets for school
    productions, channeling their competitive spirit and emotional intensity into every creative project, and they hope to one day design sets for the town’s community theater.
  sports: Helen Gillotti, a dedicated member of the Sumter Youth Soccer League, dribbles with a competitive edge on the fields after school while cheering for Charlotte FC and the local high school Panthers,
    balancing their love for teamwork with a strong drive to win, and they relish the post‑game celebrations with friends.
  arts: Helen Gillotti, an enthusiastic participant in their school drama club and an avid sketcher, immerses themselves in fantasy series by authors like Sarah J. Maas while they draw inspiration from
    indie pop icons such as Billie Eilish and the cinematic worlds of Studio Ghibli, often translating these influences into vibrant set pieces and digital illustrations.
  travel: Helen Gillotti, who loves weekend hikes on the nearby nature trails and family road trips to Charleston’s historic downtown and Myrtle Beach, they dream of exploring the ancient ruins of Rome
    and the museums of Washington, D.C., preferring carefully planned itineraries that balance adventure with school responsibilities and limited pocket money.
  culinary: Helen Gillotti, who delights in weekend family pizza nights topped with fresh basil and mozzarella and savors Southern classics like buttery biscuits and creamy mac & cheese, they often experiment
    with simple recipes such as lemon‑mint infused water and collect colorful fresh berries for art‑inspired snack plates.
  core: Helen Gillotti, an 11‑year‑old creative soul, they blend Southern hospitality and family storytelling into a fierce yet tender pursuit of art, soccer, and self‑discovery, navigating anxiety with
    journal‑filled resilience and a pocketful of sketchbooks.
background:
  cultural: Helen grew up in Sumter, South Carolina, a small Southern town with a close‑knit, predominantly white community. Her family carries an Italian heritage reflected in occasional family recipes
    and a love for storytelling, while also embracing typical Southern values such as hospitality, church participation, and community events like the county fair and local parades. She attends a public
    middle school where she is involved in the art and drama programs, and she often spends weekends at the community center's youth workshops. The blend of Southern tradition, Italian family customs, and
    contemporary American pop culture shapes her worldview and influences her creative pursuits.
