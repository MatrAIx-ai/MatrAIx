  hobbies: '["Visiting contemporary art galleries", "Sketching and watercolor painting", "Landscape photography", "Salsa dancing", "Cooking Mexican cuisine", "Hiking in the San Gabriel Mountains", "Yoga
    and meditation", "Reading science-fiction and design theory", "3D printing and maker space projects", "Traveling to explore cultural heritage sites"]'
  career_goals: Brianna aims to advance to a senior drafting role within the next two years, followed by a BIM Manager position where she can lead a multidisciplinary team and drive sustainable design initiatives.
    She plans to earn a LEED Accredited Professional certification and pursue a master's degree in Construction Management to broaden her strategic perspective. Ultimately, she aspires to spearhead large‑scale,
    environmentally‑responsible projects in Southern California, gaining recognition for innovative drafting solutions and mentoring emerging talent in her field.
