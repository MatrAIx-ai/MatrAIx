personas:
  professional: An experienced senior drafter, Brianna Cruz leverages precise 2‑D and 3‑D CAD expertise, BIM coordination, and Python automation to deliver code‑compliant building models, and they maintain
    a meticulous, disciplined workflow and critical eye that drive continuous quality improvement on complex construction projects.
  sports: As an avid weekend hiker in the San Gabriel Mountains and a member of a local trail club, Brianna Cruz roots for the Los Angeles Lakers, follows the Los Angeles Dodgers, and supports Los Angeles
    FC, and they regularly attend yoga classes at a downtown studio to blend fitness with mindfulness.
  arts: Brianna Cruz cultivates creative expression through watercolor sketches of downtown skylines, frequent visits to contemporary galleries featuring artists like Ai Weiwei and Yayoi Kusama, and a deep
    appreciation for the ambient electronic sounds of Tycho and the cinematic scores of Ennio Morricone, and they often let these visual and auditory inspirations inform their technical drafting work.
  travel: Brianna Cruz prefers meticulously planned trips, often escaping to coastal retreats such as Santa Barbara or international destinations like Iceland for its glaciers, yet they balance this with
    spontaneous weekend hikes in Big Bear, driven by a love for both adventure and structured exploration.
  culinary: Brianna Cruz enjoys cooking family‑style dishes like spiced corn dough dumplings with chipotle salsa, mastering the balance of earthy chilies, fresh cilantro, and roasted pumpkin, while they
    experiment with 3‑D printed kitchen tools to elevate their intermediate culinary skill set.
  core: Brianna Cruz is a detail‑obsessed drafting professional who merges technical precision with artistic flair, channels competitive drive into every project, yet they secretly hoard novelty coffee
    mugs and often sacrifice sleep for late‑night sketching sessions.
background:
  cultural: Brianna is a first‑generation Mexican American raised in Diamond Bar, California. She grew up bilingual, speaking Spanish at home and English at school, and maintains close ties to her family's
    traditions, from celebrating Día de los Muertos with handmade altars to Sunday family meals featuring her grandmother's recipes. Her cultural roots foster a deep appreciation for Mexican art, music,
    and community values, while her Californian upbringing exposes her to a diverse, multicultural environment. This blend of cultures informs her work ethic, creativity, and commitment to honoring her
    heritage through both her professional and personal pursuits.
attributes:
  skills: '["AutoCAD", "Revit", "SolidWorks", "BIM coordination", "Technical drafting", "Construction documentation", "Building code compliance", "Project scheduling (MS Project)", "Quality assurance",
