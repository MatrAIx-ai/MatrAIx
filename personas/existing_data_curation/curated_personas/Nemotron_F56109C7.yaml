personas:
  professional: Kathy Santamaria, a retired art historian and seasoned exhibition curator in Tulsa, channels her relentless curiosity and meticulous budget‑tracking into launching a traveling showcase of
    regional artists, mentoring aspiring curators through a competitive volunteer program, and authoring a monthly online art‑history column, all while maintaining a healthy skepticism toward donor motives
    and a drive to outdo her previous projects, and they approach each endeavor with organized flexibility.
  sports: Kathy Santamaria, a devoted fan of the Tulsa Oilers and the Oklahoma City Thunder, walks briskly along the Arkansas River five mornings a week, competes in a senior walking club’s monthly mileage
    challenges, and attends gentle yoga sessions for flexibility, though she sometimes skips a class when arthritis pain spikes, revealing her competitive spirit tempered by health concerns, and they enjoy
    the camaraderie of the club while staying mindful of their limits.
  arts: Kathy Santamaria, an avid attendee of the Tulsa Performing Arts Center’s productions starring actors like Jeffery Catton, draws artistic inspiration from Georgia O’Keeffe’s watercolors, collects
    Jackson Pollock prints, and writes essays dissecting the works of contemporary Indigenous artist Raye St. John, while occasionally indulging in Emily Dickinson poetry recitals during her book club,
    reflecting her deep appreciation and critical eye, and they often channel this insight into curating thoughtful exhibitions.
  travel: Kathy Santamaria, who dreams of strolling the Musée d’Orsay in Paris and exploring the vibrant Santa Fe art scene, plans trips with meticulous itineraries, prefers guided museum tours over spontaneous
    wandering, balances her love for urban galleries with quiet retreats at historic bed‑and‑breakfasts in the Ouachita Mountains, yet her competitive desire to “see more than anyone else” sometimes leads
    her to overbook activities, and they relish the enrichment of each journey despite occasional fatigue.
  culinary: Kathy Santamaria, a confident home cook who harvests basil, thyme, and heirloom tomatoes from her garden, delights in preparing rosemary‑infused roasted chicken, zucchini‑squid ink risotto,
    and spiced peach cobbler—always finishing with a pinch of smoked paprika for depth—and while she enjoys occasional fine‑dining at Tulsa’s Crown Plaza, she can’t resist sneaking a spoonful of her homemade
    jam when stress spikes, and they delight in sharing recipes with friends at her weekly book club.
  core: Kathy Santamaria is a fiercely curious, detail‑driven art enthusiast who balances competitive ambition with gentle yoga, cautious budgeting, and a lifelong habit of turning every museum visit into
    a personal research project, though they often find themselves tangled in over‑thinking and worry.
background:
  cultural: Kathy grew up in the Midwestern United States and settled in Tulsa, Oklahoma, where the blend of European‑American traditions and the rich Native American artistic heritage shaped her worldview.
    Her family’s roots trace back to Irish and German immigrants who valued education, self‑reliance, and community service. The diverse cultural landscape of Oklahoma, especially its appreciation for folk
    art and muralism, deepened her curiosity about varied artistic expressions and informed her lifelong commitment to the arts.
