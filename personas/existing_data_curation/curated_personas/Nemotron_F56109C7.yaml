  career_goals: Although retired, Kathy aims to continue contributing to the Tulsa arts community. She plans to curate a traveling exhibition showcasing regional artists, launch a monthly online art‑history
    column, and mentor emerging curators through a local volunteer program. Additionally, she hopes to complete a series of graduate‑level art‑history courses online and publish a memoir intertwining her
    personal journey with reflections on art.
