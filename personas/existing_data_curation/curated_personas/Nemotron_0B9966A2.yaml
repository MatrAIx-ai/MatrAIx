  career_goals: Felix intends to progress to a regional director position overseeing multiple territories, where he can shape a collaborative and ethically grounded sales culture. He aspires to mentor emerging
    sales leaders, especially those from underrepresented backgrounds, by creating a mentorship program in partnership with local Hispanic community colleges. In the long term, he envisions establishing
    his own consultancy that helps small technology firms enter the Texas market, combining his technical expertise with his sales acumen. Throughout his advancement, he seeks to maintain a healthy work-life
    balance, prioritize family time, and remain active in community service.
