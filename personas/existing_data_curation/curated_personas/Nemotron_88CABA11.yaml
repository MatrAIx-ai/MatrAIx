  hobbies: '["Hiking","Watercolor Painting","Music Curation","Healthy Cooking","Art Gallery Visits","Scientific Reading","Tai Chi","Beach Surfing","Volunteer Community Workshops"]'
  career_goals: Over the next five years Kiet aims to earn the Certified Strength and Conditioning Specialist (CSCS) credential and launch a boutique studio in Kahului that blends functional training with
    artistic movement, such as dance‑infused HIIT and mindful yoga. She also plans to develop a community outreach program offering free wellness workshops for seniors and low‑income families, leveraging
    her organizational skills to secure local grant funding. Long‑term, she envisions authoring a bilingual guide that integrates Southeast Asian nutrition principles with modern fitness practices, positioning
    herself as a thought leader in culturally‑responsive health coaching.
