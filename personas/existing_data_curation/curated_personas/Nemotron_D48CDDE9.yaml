  career_goals: Reinaldo aims to earn a bachelor’s degree in criminal justice or public administration within the next three years, positioning himself for promotion to Deputy Chief or to lead a regional
    investigative unit. He also wishes to develop a community‑based art outreach program that uses visual arts and music to engage at‑risk youth, reduce crime, and strengthen cultural ties between Hispanic
    residents and the broader Lexington community. Long‑term, he envisions a senior leadership role where he can influence policy, implement innovative investigative methods, and mentor the next generation
    of officers.
