  career_goals: Robert aims to obtain his full Utah insurance license within the next year and achieve top-tier sales performance in his agency. He plans to earn the CPCU and CLU certifications to deepen
    his expertise in property, casualty, and life insurance. In the medium term, he aspires to become a senior sales consultant or team leader, mentoring new agents and shaping sales strategies. Long‑term,
    he envisions launching his own boutique agency that offers specialized coverage for art collectors and environmentally conscious clients, merging his sales acumen with his passion for art and sustainability.
