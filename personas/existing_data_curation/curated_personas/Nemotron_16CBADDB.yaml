  hobbies: '[''Hiking'', ''Landscape Photography'', ''Sketching'', ''Watercolor Painting'', ''Reading Science Fiction'', ''Reading Non‑Fiction on Technology and Psychology'', ''Playing Acoustic Guitar'',
