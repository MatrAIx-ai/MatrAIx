  hobbies: '[''Visiting art galleries and museums'', ''Sketching and drawing'', ''Street photography'', ''Editing photos in Lightroom'', ''Playing acoustic guitar'', ''Listening to diverse music genres'',
    ''Cooking traditional Latino dishes'', ''Volunteering at cultural festivals'', ''Reading philosophy and contemporary literature'', ''Meditation and journaling'']'
  career_goals: Carlos aims to secure an entry‑level position as a junior graphic designer or visual content creator within a community arts organization, leveraging his self‑taught design skills and cultural
    perspective. Over the next year, he plans to complete his GED and enroll in a certificate program in digital media or graphic design to formalize his expertise. In the longer term, he aspires to open
    a hybrid gallery‑café that showcases Latino artists and serves as a cultural hub, while also becoming an advocate for arts funding and community‑based creative projects.
