personas:
  professional: A budding junior architect, Trang Hoang meticulously builds LEGO skyscrapers and sandcastles, blending their natural curiosity for new ideas with a methodical, organized planning style that
    impresses teachers and peers alike.
  sports: An enthusiastic mini-soccer player, Trang Hoang participates in the Little Stars Soccer Club's Saturday games, cheers for the Metro City Hawks basketball team, and enjoys watching the annual youth
    baseball league, balancing active team play with quiet observation of professional sports.
  arts: Trang Hoang delights in drawing animated characters from Studio Ghibli's My Neighbor Totoro, singing along to The Wiggles' upbeat songs, and admiring the whimsical illustrations of Dr. Seuss, which
    together shape their creative expression and playtime narratives.
  travel: After a family excursion to the downtown aquarium and a weekend adventure in the nearby national park, Trang Hoang dreams of visiting Tokyo's kid-friendly science museum and building sandcastles
    on the sunny beaches of Bali, blending curiosity for new cultures with comfort in familiar havens.
  culinary: Trang Hoang prefers the comforting taste of cheese-filled macaroni, the crisp snap of apple slices, and the sweet aroma of banana pancakes, often helping stir batter with a wooden spoon, while
    occasionally sneaking a bite of honey-glazed carrots when no one watches.
  core: A curious, organized five-year-old who thrives in quiet solo play, Trang Hoang channels their love for building, saving, and caring into meticulous projects while quietly navigating life's big ideas.
background:
  cultural: Trang is a second‑generation Vietnamese‑American. Her parents emigrated from Vietnam and maintain traditions like celebrating Tet, cooking pho and spring rolls at home, and speaking Vietnamese.
    Growing up in San Marcos, California, she is also exposed to the diverse multicultural fabric of Southern California, participating in community events at the local Vietnamese cultural center and school
    multicultural fairs. This blend of Vietnamese heritage and Californian lifestyle shapes her language, food preferences, and appreciation for both Eastern and Western artistic expressions.
