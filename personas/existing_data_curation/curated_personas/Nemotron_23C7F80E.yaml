  career_goals: Although only eight, Lydia envisions a future where she uses her creativity to bring joy and understanding to others. She dreams of becoming a children’s author and illustrator whose books
    celebrate diverse cultures and teach kindness. She also imagines designing environmentally friendly inventions and, one day, leading community art programs that give children safe spaces to express
    themselves. Her ambitions reflect her desire to merge imagination with a purpose of helping people feel included and cared for.
