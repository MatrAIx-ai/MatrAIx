personas:
  professional: Lydia Huntsberry, an eight-year-old budding digital artist, blends her love of fantasy illustration, LEGO world-building, and Scratch Jr. animation to create vibrant storyboards, and they
    eagerly share their creations with classmates and teachers, showcasing early design thinking.
  sports: Lydia Huntsberry, a lively participant in after-school gymnastics and weekend kids' soccer practice, cheerfully supports the local minor-league baseball team the River City Ravens and follows
    the national soccer squad, and they also enjoy seasonal activities like summer swimming and nature hikes with their family.
  arts: Lydia Huntsberry, a vibrant creator who spends afternoons drawing whimsical dragons inspired by Studio Ghibli and reading J.K. Rowling's fantasy novels, listens to Ella Fitzgerald, Louis Armstrong,
    and Mahalia Jackson while playing a recorder, and they love studying the bright brushstrokes of Claude Monet to inform their own paintings.
  travel: Lydia Huntsberry, an enthusiastic explorer who has visited the nearby state park, the city zoo, and a family road trip to Disney World, dreams of seeing the Grand Canyon and Paris, and they prefer
    guided family tours that balance adventure with the comfort of familiar routines.
  culinary: Lydia Huntsberry, a budding kitchen assistant, can whisk together banana pancakes with honey, craft colorful fruit kebabs of grapes, strawberries, and melon, and they eagerly add shredded cheddar
    to macaroni and cheese while experimenting with sprinkles on homemade cupcakes.
  core: Lydia Huntsberry, an eight-year-old imagination powerhouse who constantly sketches magical worlds, worries about unfinished projects, hums gospel tunes while drawing, and has a habit of organizing
    LEGO bricks by color before bedtime.
background:
  cultural: Lydia comes from an African‑American family rooted in Cleveland’s vibrant Black community. Her parents instill pride in her heritage through Sunday church gatherings, storytelling evenings where
    family elders share folktales from the African diaspora, and celebrations of Juneteenth and local cultural festivals. She often visits the Cleveland Museum of Art’s kids’ programs, where she is exposed
    to works by Black artists. The interplay of Midwestern warmth, community support, and rich Black cultural traditions shapes her perspective, fostering a deep appreciation for music, art, and collective
    harmony while also providing a framework for navigating the challenges she sometimes feels.
