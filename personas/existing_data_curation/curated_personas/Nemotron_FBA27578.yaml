  hobbies: '[''Reading science‑fiction'', ''Historical biographies'', ''Listening to bachata and salsa'', ''Cooking innovative Dominican dishes'', ''Raspberry Pi electronics projects'', ''Balcony herb gardening'',
    ''Strategy video gaming'', ''Journaling'', ''Street photography'']'
  career_goals: Carlos wants to transition into a stable, remote‑friendly role where he can apply his technical and culinary interests. In the short term he plans to study for and earn a CompTIA A+ certification
    to qualify for entry‑level IT support positions that offer flexible hours and the possibility of remote work. Over the longer term he dreams of opening a small home‑based catering service that specializes
    in healthy, modern takes on Dominican cuisine, allowing him to work independently while supporting his family. By combining a part‑time remote IT job with weekend catering, he hopes to achieve financial
    stability, build a reputation within the Bronx community, and eventually expand his venture into a full‑time culinary business.
