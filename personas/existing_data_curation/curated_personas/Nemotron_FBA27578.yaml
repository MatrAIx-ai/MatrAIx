personas:
  professional: Carlos Bosa, a 29‑year‑old aspiring remote IT support specialist, blends self‑taught computer troubleshooting and networking know‑how with a spontaneous, curiosity‑driven mindset, delivering
    creative fixes for users while occasionally missing ticket‑closure deadlines due to a dislike of rigid structure.
  sports: Carlos Bosa, a 29‑year‑old Bronx resident, prefers solitary early‑morning runs along the Harlem River while cheering the New York Yankees and Knicks from home, and joins a weekend pick‑up basketball
    game with the local Bronx Hoops Club, balancing low‑key cardio with occasional competitive spirit despite a tendency to skip scheduled gym workouts.
  arts: Carlos Bosa, a 29‑year‑old fan of salsa legends like Marc Anthony and bachata icons such as Romeo Santos, captures candid Bronx street moments inspired by Vivian Maier and Henri Cartier‑Bresson,
    and unwinds with science‑fiction classics like Neuromancer and biographies of revolutionary leaders, weaving a rich tapestry of auditory and visual influences into their solitary evenings.
  travel: Carlos Bosa, a 29‑year‑old who favors low‑key, self‑planned trips, has explored the historic streets of Old San Juan and hiked the Catskills, and dreams of a budget‑friendly solo adventure to
    Barcelona’s Gothic Quarter and Kyoto’s temples, carefully mapping itineraries on Google Maps while balancing family commitments and a part‑time remote IT gig.
  culinary: Carlos Bosa, a 29‑year‑old home cook, expertly prepares classic island comfort foods like mangú, sancocho, and suero using fresh plantains, yucca, and a medley of herbs, while experimenting
    with healthier twists such as quinoa‑infused arroz con pollo and grilled pepper‑stuffed fish, often sourcing ingredients from the Bronx farmers market and testing new flavor combos during late‑night
    kitchen sessions.
  core: Carlos Bosa, a 29‑year‑old solitary tech enthusiast and culinary tinkerer, balances curiosity‑driven projects with chronic procrastination, often staying up late gaming while neglecting routine
    chores, yet always finds solace in the aroma of simmering pepper‑rich stews and the click of a Raspberry Pi booting up.
background:
  cultural: Carlos was born and raised in the Bronx to parents who emigrated from the Dominican Republic in the 1990s. He grew up in a close‑knit Dominican community where Spanish was spoken at home and
    English at school. Family gatherings centered around music, food, and Catholic celebrations, embedding in him a strong sense of cultural pride. He maintains close ties to his extended family and frequently
    participates in local Dominican festivals, such as the annual Dominican Day Parade in New York City. His bicultural identity influences his language, cuisine, and community involvement, and he values
    contributing to the vitality of the Bronx Dominican diaspora.
attributes:
  skills: '[''Computer troubleshooting'', ''Home network setup'', ''Linux basics'', ''DIY automotive repair'', ''Bicycle maintenance'', ''Traditional Dominican cooking'', ''Bilingual translation (Spanish/English)'',
