personas:
  professional: Jose Quan, a budding mechanical tinkerer, channels his love of gears and puzzles into elaborate LEGO cities that function like tiny factories, and they thrive on the freedom of unstructured
    play while often leaving construction sites in delightful disarray.
  sports: Jose Quan, a lively member of the Minneapolis United Soccer Club and a regular at the community ice rink during winter, cheers for the Minnesota Wild and Minnesota United FC, and they approach
    training with a competitive edge yet favor spontaneous drills over rigid practice schedules.
  arts: Jose Quan, who fills sketchbooks with dinosaurs and robots while humming the catchy tunes of The Wiggles and the soundtrack from 'Coco', frequently attends weekend folk dance classes where they
    admire the lively strings of local Mariachi groups, weaving music and art into their imaginative play.
  travel: Jose Quan, an avid explorer of Minnehaha Falls and the icy trails of Lake Superior, enjoys family road trips to the Grand Canyon and, while dreaming of strolling among the ancient pyramids of
    Teotihuacan, they favor relaxed weekend adventures over heavily planned vacations.
  culinary: Jose Quan, who eagerly helps roll tortillas for tacos al pastor and mash avocado for guacamole, delights in the sweet crunch of churros and the cheesy pull of quesadillas, yet they stubbornly
    reject plain broccoli unless it’s hidden in a cheesy wrap.
  core: Jose Quan, a gear‑obsessed, puzzle‑loving 7‑year‑old, balances boundless curiosity with a laid‑back, sometimes messy approach; they turn LEGO bricks into mini‑engineering labs while savoring tacos
    al pastor and dreaming of distant pyramids.
background:
  cultural: José grows up in a Mexican‑American household where Spanish is spoken daily and family traditions from Mexico are celebrated. His parents prepare dishes like tacos al pastor and tamales, and
    they observe holidays such as Día de los Muertos and Mexican Independence Day with homemade altars and music. The family participates in a local Mexican cultural center in Minneapolis, attending weekend
    dance classes and community festivals that blend Mexican folk customs with the city’s northern climate. This bilingual, bicultural environment gives José a strong sense of heritage while also adapting
    to the winters and multicultural life of Hennepin County.
attributes:
