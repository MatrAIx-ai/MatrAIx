  hobbies: '[''LEGO building'', ''puzzle solving (jigsaw, kid Sudoku, riddles)'', ''watching educational nature and science shows'', ''drawing/painting dinosaurs and robots'', ''playing strategy video games
    with a small friend group'', ''exploring parks and observing wildlife'']'
  career_goals: José dreams of turning his curiosity into a future career in engineering or invention. In the next few years he hopes to join a school robotics club and win a science‑fair project, eventually
    becoming a robotics engineer who designs gadgets that help people. He is also competitive about being the best at problem‑solving contests, so he aspires to earn a place on a regional math competition
    team. While still young, he imagines a future where he can create his own inventions and maybe work on sustainable technology for his community.
