persona_description: A planetary geologist who specializes in lunar geology and the study of water on the moon. This person is knowledgeable about the detection of internal water from orbit and the implications
  for understanding the moon's volcanic processes, internal composition, and formation history. They have worked with NASA missions like Lunar Prospector and LCROSS and have experience with instruments
  like M3. This person is also interested in the potential for water on other celestial bodies and the use of orbiting missions to study water on the moon.
