  hobbies: '[''Reading non‑fiction (probability, economics, history)'', ''Puzzle solving (Sudoku, crosswords)'', ''Online strategy video games'', ''Home brewing'', ''Fishing at the Ohio River'', ''Woodworking'']'
  career_goals: Jerry aims to move into a supervisory role on the casino floor within the next three years, focusing on operational oversight, staff training, and compliance enforcement. He plans to obtain
    a gaming‑compliance certification to qualify for higher‑level regulatory positions. Long‑term, he envisions launching a consulting business that helps smaller gaming venues streamline operations and
    maintain regulatory compliance, while possibly completing an associate degree in information technology to deepen his technical expertise.
