personas:
  professional: Jenifer Strasburg, a veteran elementary and middle school STEM educator in Vanderburgh County, leverages her meticulous organizational skills, data-driven assessment expertise, and compassionate
    communication to design integrated curricula, mentor teachers, and lead an after-school robotics club, embodying her balance of curiosity and practicality in every lesson.
  sports: Jenifer Strasburg enjoys hiking the trails at Patoka Lake and Hoosier National Forest, participates in a local 5K run organized by the community center each spring, follows the Evansville Purple
    Aces basketball team, and maintains a weekly yoga session at the senior center to balance strength and flexibility.
  arts: Jenifer Strasburg, an avid reader of historical fiction by Philippa Gregory and fan of popular science author Bill Bryson, finds inspiration in the paintings of Georgia O'Keeffe, unwinds listening
    to John Denver's folk classics, and regularly attends performances by the Oldenburg Theatre Company, which shape her creative outlook.
  travel: Jenifer Strasburg prefers meticulously planned road trips, having explored Chicago's museums, the Great Smoky Mountains' scenic overlooks, and a weekend getaway to the Amish Country of Ohio, while
    her future bucket list includes a family-friendly adventure to Yellowstone National Park, balancing exploration with budget consciousness.
  culinary: Jenifer Strasburg, an enthusiastic home baker, experiments with sourdough starter, seasonal corn focaccia, and apple-cinnamon crumble, frequently incorporates Indiana-grown heirloom tomatoes
    and fresh rosemary into savory dishes, and delights neighbors with her signature triple-berry cheesecake.
  core: Jenifer Strasburg blends methodical planning with a love for hands-on creativity, turning backyard gardening and robotics mentoring into community pillars, yet often forgets to water her succulents
    while remembering every student's project deadline.
background:
  cultural: Jenifer was raised in a mid‑western, white family with deep roots in Indiana, tracing ancestry to German and Irish immigrants who settled the area in the late 19th century. The regional culture
    emphasizes self‑reliance, community involvement, and a strong work ethic, which align with her organized and practical nature. Growing up in a modest small‑town environment fostered an appreciation
    for straightforward, hands‑on problem solving and a commitment to helping neighbors, a value she carries into her teaching career. Her upbringing in the Evangelical Christian tradition, though now more
    privately practiced, instilled a sense of compassion and cooperative service that informs her personal and professional relationships.
attributes:
  skills: '[''STEM curriculum development'',''Hands‑on experiment design'',''Project‑based learning facilitation'',''Educational technology integration'',''Classroom management'',''Differentiated instruction'',''Data‑driven
