  hobbies: '[''Gardening'',''Reading historical fiction'',''Reading popular science'',''Hiking in local parks'',''Volunteering at community center'',''Leading after‑school robotics club'',''Baking'',''Participating
    in book clubs'']'
  career_goals: Jenifer aims to become a district STEM coordinator, leading the development of a cohesive STEM pathway across elementary and middle schools in Vanderburgh County. She plans to pursue a master's
    degree in curriculum and instruction to deepen her expertise and to mentor new teachers through a formal instructional coaching role. Over the next five years, she hopes to launch a community‑based
    science outreach program that partners local businesses and the university with her school, and eventually to be recognized as an advocate for equitable STEM education in Indiana.
