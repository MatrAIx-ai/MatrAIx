personas:
  professional: Carlos Cruz, a retired handyman and volunteer workshop instructor, leverages decades of hands‑on electrical, carpentry, and budgeting expertise to methodically organize community senior‑center
    classes while preserving a meticulous record‑keeping habit that reflects his love of structure.
  sports: Carlos Cruz enjoys low‑impact morning walks around the Gainesville neighborhood, follows the University of Florida Gators football team, participates in the local senior center’s weekly bowling
    league, and tends to avoid high‑intensity workouts, preferring the predictability of gentle stretching routines.
  arts: Carlos Cruz immerses himself in classic boleros by Julio Jaramillo, joropo by Simón Díaz, and the occasional film noir starring Humphrey Bogart, while spending evenings reading biographies of Simón
    Bolívar and listening to the church choir, which together shape his reflective artistic palate.
  travel: Carlos Cruz favors relaxed road trips to coastal towns like St. Augustine and Savannah, plans visits to family reunions in Miami with a detailed itinerary, dreams of a nostalgic pilgrimage to
    his birthplace’s historic plaza, yet limits long‑haul flights due to health concerns.
  culinary: Carlos Cruz prepares arepas with hand‑milled cornmeal and hallacas stuffed with seasoned pork, plantains, and olives, often growing his own cilantro and bell peppers, and while his cooking is
    flavorful, he sometimes over‑salts dishes in his quest for authenticity.
  core: Carlos Cruz is a methodical, solitary octogenarian who blends precise woodworking, disciplined gardening, and a love of traditional music into a life anchored by routine, quiet competitiveness,
    and a stubborn resistance to disorder.
background:
  cultural: Carlos was born and raised in Caracas, Venezuela, in a Catholic, middle‑class family that valued education, hard work, and close family ties. He grew up celebrating Venezuelan holidays such
    as Día de la Independencia and enjoying traditional music and dance. Political and economic instability in the 1990s prompted his migration to the United States, where he settled in Gainesville, Florida,
    alongside his wife. He maintains strong ties to his heritage through language—speaking Spanish at home—and by preparing Venezuelan cuisine for his family. Carlos participates in local Venezuelan community
    events, sharing stories of his homeland and preserving cultural practices for his grandchildren, while also integrating into the broader Floridian community through his volunteer work and church involvement.
attributes:
