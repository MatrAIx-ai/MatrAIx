  career_goals: Nancy aims to become a Certified Public Accountant within the next two years and advance to a senior auditor or audit manager role at her firm, where she can lead multidisciplinary teams.
    She envisions integrating her data-analytics expertise to develop innovative audit methodologies that reduce manual effort and increase insight for clients, particularly in the growing arts and nonprofit
    sector of New Mexico. Long-term, she hopes to transition into a financial leadership position—such as CFO—at a midsize organization that values flexibility and creative thinking, allowing her to shape
    strategic financial planning while maintaining a balanced, supportive work environment for her family. Alongside her professional growth, she seeks mentorship opportunities to support other women entering
    the accounting field.
