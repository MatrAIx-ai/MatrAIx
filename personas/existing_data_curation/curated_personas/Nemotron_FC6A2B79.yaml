  career_goals: Enrique aims to become a certified journeyman lineworker within the next two years, then progress to a crew-leader or foreman position where he can mentor newer workers and oversee larger
    projects. He plans to enroll in an associate program in electrical technology to deepen his understanding of renewable-energy systems and eventually start his own small contracting business focused
    on sustainable power-line solutions. He also seeks to contribute to safety training programs in his company and maintain a balanced life that allows time for stress-relief activities.
