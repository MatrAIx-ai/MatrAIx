  career_goals: Guadalupe’s immediate goal is to obtain her GED within the next two years and then enroll in a Certified Nursing Assistant (CNA) program at a nearby community college. She is drawn to the
    steady routine, direct impact, and compassionate nature of healthcare work, and aims to secure a stable position at a local clinic serving her town’s residents. In the longer term, she aspires to become
    a Licensed Practical Nurse (LPN) so she can provide consistent, reliable care for her community while also supporting her family’s financial needs.
