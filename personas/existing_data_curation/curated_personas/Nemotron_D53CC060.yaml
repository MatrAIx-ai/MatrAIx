personas:
  professional: Guadalupe Beltran is a diligent high school junior who volunteers in the church kitchen, leveraging their strong organizational skills and routine‑driven nature to keep meal prep orderly
    while preparing for a future Certified Nursing Assistant career.
  sports: Guadalupe Beltran enjoys casual morning jogs around the family garden, cheers for the local soccer club Atlético de la Ciudad on weekends, and participates in the church’s bi‑monthly community
    cleanup as their primary form of exercise.
  arts: Guadalupe Beltran finds solace in knitting patterned scarves while listening to classic ranchera crooner Vicente Fernández, and spends evenings immersed in contemporary YA novels like 'They Both
    Die at the End', which quietly fuel their imagination.
  travel: Guadalupe Beltran prefers low‑key, family‑oriented trips, having explored nearby historic missions on school field trips and dreaming of a future pilgrimage to Puerto Escondido to experience its
    renowned seafood festivals.
  culinary: Guadalupe Beltran excels at preparing traditional dishes such as pozole rojo, sweet corn tamales, and chicken mole, favoring ingredients like dried chilies, corn masa, and fresh cilantro while
    experimenting with new garnish ideas during weekend family meals.
  core: Guadalupe Beltran is a routine‑loving, calm teen who channels their meticulous nature into perfecting family recipes, maintaining a tidy garden, and quietly preparing for a caring career in nursing.
background:
  cultural: Guadalupe was raised in a close‑knit Mexican‑American household in Elgin, Texas, where bilingualism, family loyalty, and Catholic traditions are central. Her upbringing emphasized respect for
    elders, participation in cultural celebrations such as Día de los Muertos and Navidad, and the passing down of culinary and craft skills. The rural environment and strong community ties have reinforced
    values of hard work, practicality, and modesty, shaping her identity as a resilient, tradition‑oriented young woman.
attributes:
