  hobbies: '[''Journaling'', ''Puzzle solving (Sudoku, crosswords)'', ''Gardening'', ''Knitting'', ''Baking'', ''Robotics club'', ''Volunteer mentoring'', ''Nature walks'', ''Listening to classic pop/folk
    music'']'
  career_goals: Jessica plans to attend a four‑year university to major in Business Administration with a concentration in Project Management, aiming to become a project coordinator or health‑services administrator
    in a government or healthcare organization where structure, reliability, and calm decision‑making are valued. She also remains open to pursuing a degree in Health Sciences to combine her caring nature
    with administrative expertise, ultimately seeking a stable, purpose‑driven career that offers predictability and community impact.
