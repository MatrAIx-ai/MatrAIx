personas:
  professional: Jessica Lima, a senior high school student with a penchant for structure, leads the robotics club's project timelines while coordinating school events, leveraging their Microsoft Office
    mastery, meticulous planning, and calm conflict-resolution style to keep teams on track.
  sports: Jessica Lima, a member of the school's intramural volleyball team and a weekend hiker with the local Outdoor Explorers Club, maintains fitness by jogging the foothills while cheering on the Denver
    Broncos, Denver Nuggets, and Colorado Rockies as their go-to professional teams.
  arts: Jessica Lima, who fills downtime with classic pop and folk tunes from The Beatles, Simon & Garfunkel, and Joni Mitchell, attends community theater productions and curates a small scrapbook of favorite
    song lyrics, allowing music and performance art to soothe their methodical mind and inspire their journaling.
  travel: Jessica Lima, an organized planner who drafts detailed itineraries in Google Docs, spends their summer breaks hiking the Appalachian Trail and exploring the historic streets of Boston, while dreaming
    of a future cultural immersion trip to Kyoto and the fjords of Norway.
  culinary: Jessica Lima, an intermediate baker who perfects their sourdough starter and whips up buttery lemon bars, often uses garden-grown rosemary and fresh strawberries to craft seasonal quiches and
    fruit tarts that they share at community center potlucks.
  core: Jessica Lima is a methodical teen who balances a love for puzzles and gardening with a calm, dependable leadership style, yet secretly hoards planner stickers and can't resist late-night binge-watching
    crime dramas.
background:
  cultural: Jessica is a second‑generation Portuguese‑American raised in Randallstown, Maryland. Her parents’ family originated from the Azores, and she grew up with a blend of Portuguese traditions—such
    as holiday meals featuring bacalhau, celebrating the Festa do Senhor Santo Cristo, and occasional Portuguese language use at home—alongside mainstream American customs. Living in the diverse environment
    of Baltimore County, she has been exposed to a variety of cultural experiences, shaping a broad yet grounded cultural identity.
