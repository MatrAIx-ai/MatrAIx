  career_goals: Although retired from formal employment, Nancy aims to deepen her impact as a volunteer leader within Springfield’s senior center. She hopes to become the chair of the community events committee,
    mentor younger volunteers, and launch a quarterly “Tradition Day” that celebrates classic recipes, music, and crafts. Additionally, she plans to complete a short certification in senior health advocacy
    and learn digital tools to stay connected with her grandchildren and broader community.
