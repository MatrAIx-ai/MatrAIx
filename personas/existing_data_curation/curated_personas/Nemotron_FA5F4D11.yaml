  career_goals: Nathaniel aspires to obtain a certification as an automotive service technician after completing high school, viewing the trade as a stable, structured career with clear progression. He
    plans to enroll in a local community college’s automotive technology program where he can deepen his mechanical knowledge and earn industry‑recognized credentials. Long‑term, he hopes to work at a reputable
    dealership or garage in the Fayetteville area, eventually advancing to a supervisory role where he can mentor younger apprentices. He also keeps the option of enlisting in the U.S. Army’s mechanical
    corps open, attracted by the disciplined environment and guaranteed benefits, but his primary focus remains on mastering a skilled trade that offers predictability and tangible results.
