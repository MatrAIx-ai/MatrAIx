persona_description: A science teacher at a girls' day school who is passionate about promoting science among girls and breaking records to encourage more girls to pursue physics at college and university.
  The teacher is dedicated to creating an inclusive and supportive environment for girls to explore and pursue their interests in science, and is committed to breaking records to show that science is not
  just for boys. The teacher is also interested in studying the factors that affect peer pressure and how to overcome them in order to encourage more girls to take up physics at college and university.
