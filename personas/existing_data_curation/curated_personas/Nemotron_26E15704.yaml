personas:
  professional: A budding junior illustrator and storyteller, Victoria Burgess blends a love for sketching fantasy worlds, reading adventure novels, and crafting simple interactive tales in Scratch, while
    their organized, methodical nature leads them to schedule weekly art challenges, volunteer at the local library’s story hours, and they rally classmates for collaborative drawing sessions.
  sports: A dedicated youth soccer player, Victoria Burgess trains twice a week with the Long Island United Soccer Club’s U12 squad, enjoys weekend matches on the local field, supports the New York Islanders
    in the NHL and the New York Yankees in MLB, and they balance competitive play with daily park kick‑ball games that satisfy their sociable, energetic spirit.
  arts: An enthusiastic art explorer, Victoria Burgess fills sketchbooks with charcoal portraits inspired by Vincent van Gogh’s swirling skies, watches Studio Ghibli films for narrative ideas, sings a cappella
    renditions of Taylor Swift hits in the school choir, and they regularly attend local gallery openings where they discuss pieces by emerging young artists.
  travel: A curious weekend traveler, Victoria Burgess explores Long Island’s nature trails like the Hempstead Plains, has taken day trips to the historic sites of Boston and the museums of New York City,
    dreams of a future family vacation to Paris’s Louvre, and they plan each outing using colorful bullet‑journal maps to balance school responsibilities with adventure.
  culinary: A budding junior baker, Victoria Burgess loves whisking up batch after batch of chocolate‑chip cookies using dark chocolate chips, melted butter, and a pinch of sea salt, experiments with mini
    pizza rolls topped with mozzarella and fresh basil, and they occasionally volunteer to set up snack tables at the library’s reading events, where their sweet treats become a popular ice‑breaker.
  core: Victoria Burgess mixes boundless artistic curiosity, organized soccer teamwork, and a calm, sociable spirit into daily adventures, and they turn each sketch, game, and cookie batch into a shared,
    harmonious experience.
background:
  cultural: Victoria grew up in a middle‑class suburban family in Lynbrook, Long Island, with Northern European (English and Irish) ancestry. Her household values education, community involvement, and appreciation
    for the arts, reflecting typical white American cultural norms of the region. She attends a public elementary school that integrates arts and multicultural awareness into its curriculum, and she frequently
    participates in local events such as fairs, museum trips, and volunteer projects throughout Nassau County. The diverse cultural landscape of the New York metropolitan area has broadened her perspective
    and nurtured her openness to new ideas and unconventional thinking.
