  career_goals: Victoria dreams of a future where she can blend her love of art and science. She aspires to become a museum curator who designs engaging exhibitions, or a marine biologist who studies ocean
    life and shares discoveries with the public. She also imagines leading community arts programs that bring creative experiences to other children, hoping to inspire curiosity and cooperation in her community.
