persona_description: A researcher who focuses on developing low-cost diagnostic tests for parasitic diseases, particularly cryptosporidiosis and giardia. The individual has expertise in recombinase polymerase
  amplification (RPA) and has developed a new diagnostic test that can detect the presence of very few parasites in a sample. The researcher is currently working to package the components for use in low-resource
  settings and is seeking funding from the National Institute of Allergy and Infectious Diseases of the National Institutes of Health and the National Science Foundation Graduate Research Fellowship Program.
