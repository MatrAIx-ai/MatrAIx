    User 1: College is a great option. It gives you a lot of opportunities to learn and grow.

    User 2: Yeah, I think so too. I''m just not sure what I want to do with my life.

    User 1: Well, you have plenty of time to figure it out. Just take your time and don''t rush into anything.

