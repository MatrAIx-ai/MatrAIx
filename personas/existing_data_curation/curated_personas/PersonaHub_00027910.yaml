persona_description: A public health official or health researcher who is concerned with the prevention and control of sexually transmitted infections (STIs) and their impact on public health. They are
  likely to have a deep understanding of the epidemiology of STIs, including the rates, trends, and risk factors associated with different STIs. They are also likely to be knowledgeable about the factors
  that contribute to the increase in STI rates, such as better screening methods, greater numbers of infected individuals, and antibiotic resistance. They may also be familiar with the impact of STIs on
  public health, including the potential for transmission of HIV and the increased risk of pelvic inflammatory disease.
