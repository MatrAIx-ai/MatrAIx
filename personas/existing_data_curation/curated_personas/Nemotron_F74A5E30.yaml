personas:
  professional: Victor Coverstone, an 8‑year‑old prodigy who crafts interactive Scratch stories and designs intricate LEGO kingdoms, channels their vivid imagination and disciplined attention to detail
    into early software logic and spatial‑design skills while preferring solitary work sessions.
  sports: Victor Coverstone, a quiet enthusiast of the local Rivertown Dolphins youth swim team and a fan of the Metro Hawks basketball squad, spends free time practicing strokes at the community pool and
    tracks birdwatching hikes as their personal fitness regimen.
  arts: Victor Coverstone, a budding illustrator who spends hours sketching fantastical realms inspired by the works of J.K. Rowling and Neil Gaiman, collects LEGO minifigures as muse, and enjoys the cinematic
    scores of John Williams while listening to the ambient tracks from the video game Minecraft.
  travel: Victor Coverstone, an adventurous planner who has explored the nearby Willow Creek nature preserve for birdwatching, dreams of a family road trip to the Grand Canyon’s stargazing sites, and can
    plan a weekend visit to the National Air and Space Museum to see real spacecraft up close.
  culinary: Victor Coverstone, a budding junior chef who can expertly assemble a pepperoni pizza with mozzarella, basil, and a drizzle of olive oil, loves nibbling on sea‑salted popcorn and clam chowder
    after a day of shell collecting, yet habitually forgets to clean the kitchen counters.
  core: Victor Coverstone, an eight‑year‑old solitary architect of imagined realms, blends fierce discipline with boundless curiosity, often losing sleep perfecting LEGO blueprints while begrudgingly tackling
    chores.
background:
  cultural: 'Victor was raised in a middle‑class, predominantly white neighborhood of Cape Coral, Florida. His family embraces the typical Gulf‑Coast lifestyle: weekend fishing trips on the intracoastal
    waterways, visits to nearby nature preserves, and participation in community events like the Cape Coral Festival. The local school emphasizes STEM and the arts, giving him access to a well‑equipped
    library and a technology lab where he discovered Scratch. Cultural influences include the sunny, outdoor‑focused environment of the Gulf Coast, broader American suburban values, and occasional exposure
    to the diverse multicultural community of Lee County through school activities and local festivals. This upbringing reinforces his self‑discipline, drive for personal achievement, and appreciation for
    nature.'
attributes:
  skills: '["Advanced logical reasoning","Strategic chess player (junior tournament level)","Detailed fantasy illustration and visual storytelling","Digital art creation using Tux Paint and Scratch","Meticulous
