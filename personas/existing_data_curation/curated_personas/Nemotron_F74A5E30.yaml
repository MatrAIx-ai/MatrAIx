  hobbies: '["Fantasy illustration","Reading sci‑fi/fantasy novels","LEGO building","Solo chess practice","Scratch programming","Journaling and project notebook keeping","Seashell collection and cataloguing","Stargazing
    with a telescope","Birdwatching"]'
  career_goals: Victor dreams of one day designing futuristic buildings as an architect, crafting immersive video games that blend art and code, and developing environmentally friendly marine technologies
    inspired by the Gulf Coast. He aims to win a national chess tournament, publish a fantasy short‑story collection before high school, and create a popular Scratch game by the time he turns twelve. His
    long‑term ambition is to become a creative problem‑solver who merges imagination with technical skill.
