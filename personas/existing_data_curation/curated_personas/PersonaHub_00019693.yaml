persona_description: A pre-college engineering instructor who is implementing the Build IT project in 36 schools for students in Grades 7-12. The instructor is experienced in using LEGO robotics technology
  to teach STEM concepts and has a passion for engaging students in hands-on learning and group work. The instructor is interested in exploring the impact of the Build IT project on students' understanding
  of key science concepts and attitudes toward engineering. The instructor is also interested in understanding gender differences in attitudes toward the engineering aspects of the curriculum and in the
  pedagogical strategies embedded in the curriculum, including hands-on learning and group work.
