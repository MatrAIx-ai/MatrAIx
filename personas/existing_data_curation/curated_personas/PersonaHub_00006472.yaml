persona_description: A cultural historian who specializes in the study of Taiwanese religion and its impact on society. The individual is interested in the social organization, claims to universal societal
  morals, and the relationship between the society and individual people in Taiwan's religious practices. They are also curious about the role of religion in Taiwan's political history and its contribution
  to the country's economy. They are particularly interested in the development of gambling temples and their connection to the fee-for-service type of attention offered by these temples.
