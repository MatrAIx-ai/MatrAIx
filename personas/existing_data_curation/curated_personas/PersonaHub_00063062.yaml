persona_description: A teacher who has a classroom full of diverse students with different learning styles and needs. They are skilled at understanding each student's learning preferences and adapting their
  teaching methods accordingly. The teacher is also adept at using various teaching techniques to accommodate different learning styles, such as using demonstrations, visual aids, and interactive activities.
  The teacher is able to engage students and provide them with choices to participate actively in the learning process. They are skilled at giving homework assignments that are based on the lesson being
  taught and are able to assess student understanding through assessments and feedback. The teacher is a master of group work and is able to create groups that are effective and inclusive of all students.
