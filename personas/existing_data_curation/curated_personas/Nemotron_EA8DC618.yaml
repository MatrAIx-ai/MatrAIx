personas:
  professional: Rebecca Lichtman, a 20‑year‑old delivery courier in upstate New York, leverages sharp navigation skills, real‑time route‑optimization software and a hands‑on knack for bike maintenance to
    meet tight delivery windows, while their competitive and critically analytical mindset constantly pushes them to benchmark performance and refine logistics processes for maximum efficiency.
  sports: Rebecca Lichtman cycles the Lakeside Trail in spring, hikes the Niagara County parks in summer, joins the seasonal Adirondack Cycling Club for group rides, plays pick‑up basketball with the Syracuse
    Swish crew in autumn, and passionately follows the Buffalo Bills, New York Knicks, and the local Adirondack Thunder hockey team during the winter season.
  arts: Rebecca Lichtman captures everyday moments on a Canon EOS M50 for their Instagram series 'Courier Chronicles,' curates a collection of black‑and‑white street shots inspired by Henri Cartier‑Bresson,
    unwinds to the indie sounds of Tame Impala, Fleet Foxes, and lo‑fi beats from ChilledCow, and regularly attends the quarterly Niagara Art Walk, where they admire contemporary works by local photographer
    Dylan Pelton.
  travel: Rebecca Lichtman prefers spontaneous, bike‑friendly road trips over meticulously planned tours, often charting routes through the Finger Lakes and the Adirondack High Peaks, has already explored
    Montreal’s vibrant street art scene on a weekend excursion, and is saving to embark on a spring pilgrimage to Kyoto’s cherry‑blossom gardens, balancing budget hostel stays with occasional boutique B&B
    splurges.
  culinary: Rebecca Lichtman enjoys whipping up a quick pesto pasta tossed with sun‑dried tomatoes, goat cheese, and pine nuts after a long shift, experiments with homemade granola bars blending oats, honey,
    chia seeds, and almond butter for on‑the‑go energy, treats themselves to sushi rolls with spicy tuna and avocado on rare evenings, and always starts the day with a cold brew coffee flavored with oat
    milk and a sprinkle of cinnamon.
  core: Rebecca Lichtman’s restless curiosity drives relentless route‑hacking and gadget tinkering, yet they hoard spare bike parts they rarely use and can’t resist tackling a late‑night Sudoku puzzle even
    when a delivery deadline looms.
background:
  cultural: Rebecca grew up in a middle‑class, predominantly white suburb of Clarence Center, NY. Her family emphasizes a strong work ethic, self‑reliance, and community involvement—values that reflect
    the broader upstate New York culture of practical independence and neighborly support. She celebrates typical American holidays such as Thanksgiving and Independence Day, and has been exposed to the
    region’s mix of Italian, Irish, and German heritages through local festivals and school events. Proximity to the Canadian border adds a modest cross‑border awareness, while occasional trips to Buffalo
    and Niagara Falls immerse her in the area's industrial history and natural beauty. Although culturally mainstream, she carries a subtle appreciation for her European ancestry, which informs her love
    of DIY projects and outdoor activities.
