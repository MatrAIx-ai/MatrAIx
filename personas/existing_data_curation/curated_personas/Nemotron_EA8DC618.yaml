  hobbies: '[''Cycling'', ''Hiking'', ''Reading Non-fiction'', ''Strategy Board Games'', ''Puzzles'', ''Street Photography'', ''DIY Tech Projects'', ''Video Games (Strategy)'', ''Cooking Simple Meals'',
    ''Community Volunteering'']'
  career_goals: Rebecca aims to leverage her hands‑on delivery experience into a logistics or supply‑chain role within the next five years. She plans to enroll in a community‑college program focused on
    logistics management and obtain a certification in transportation planning. Her ambition is to become a logistics coordinator for a regional distribution center, eventually moving into a supervisory
    position where she can design efficient routing strategies and mentor new couriers. Long‑term, she envisions launching a small technology‑focused delivery service that integrates real‑time data analytics
    to improve last‑mile efficiency in upstate New York.
