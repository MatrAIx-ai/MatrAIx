  career_goals: Joshua dreams of a career that blends his love for art, technology, and helping others. He envisions becoming an art therapist or a user experience designer who creates inclusive digital
    experiences for youth. He also aspires to lead community mural projects and mentor younger students through the local youth center, using his creativity to foster connection and wellbeing.
