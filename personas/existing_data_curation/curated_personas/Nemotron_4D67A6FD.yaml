personas:
  professional: A budding multimedia creator, Joshua Houston blends curiosity and a knack for organized flexibility as they sketch landscapes, develop Scratch games, and co‑create digital art with friends,
    all while reliably meeting school duties.
  sports: An enthusiastic soccer player, Joshua Houston captains the middle‑school team, they train with the Harbor Youth Soccer Club, follow the New England Revolution and Boston Celtics avidly, and spend
    weekends hiking local trails to stay fit and unwind.
  arts: A passionate arts aficionado, Joshua Houston spends free time sketching Monet‑inspired landscapes, creates digital collages echoing Banksy’s style, strums guitar to John Mayer’s bluesy riffs, and
    draws inspiration from Hayao Miyazaki’s animated films while they attend Boston’s Museum of Fine Arts exhibitions.
  travel: A curious explorer, Joshua Houston enjoys spontaneous weekend hikes to the Blue Hills Reservation, plans family road trips to Cape Cod, dreams of studying art in Paris and anime culture in Tokyo,
    and they balance budget‑conscious travel with occasional splurges on museum passes.
  culinary: A budding home chef, Joshua Houston whips up pepperoni pizza with fresh basil, perfects spaghetti carbonara using pancetta, and savors chocolate‑chip pancakes on lazy Saturdays, while they also
    indulge in sushi rolls during occasional outings with friends.
  core: Joshua Houston’s world is a vibrant blend of sketchbooks, LEGO bricks, and guitar strings, peppered with a habit of doodling on soccer jerseys and a tendency to procrastinate on homework while they
    day‑dream about art galleries.
background:
  cultural: Joshua's cultural background is rooted in a typical New England small‑town white family, with generational ties to Massachusetts. Community involvement, outdoor recreation, and respect for local
    history are core values in his upbringing. He celebrates regional traditions such as the Fourth of July fireworks, town fairs, and Thanksgiving family gatherings, and he often participates in volunteer
    activities through his school and local community organizations.
