personas:
  professional: Matthew Hernandez is a hands‑on landscaping professional in Houston who blends turf‑management expertise with an artist’s eye; they design water‑wise native gardens while juggling client
    expectations with a relaxed, improvisational work style that often leads to creative on‑site problem‑solving despite occasional disorganization.
  sports: Matthew Hernandez is a fan of the Houston Astros, Rockets, and Texans, regularly joins the Houston Hiking Club for weekend treks in the Brazos Bend State Park, and plays casual soccer with a community‑garden
    league, approaching fitness with a spontaneous mindset that mirrors their flexible work approach, which they embrace.
  arts: Matthew Hernandez immerses themselves in the local art scene, frequenting the Menil Collection and Project Row Houses, sketching murals inspired by Banksy and Frida Kahlo, and drawing creative energy
    from listening to Fleet Foxes and the films of Chloe Zhao, which they incorporate into their garden designs and personal aesthetic.
  travel: Matthew Hernandez prefers spur‑of‑the‑moment road trips, often escaping to New Mexico’s desert or the Texas Hill Country for weekend hikes, while dreaming of a horticultural pilgrimage to Japan’s
    Kyoto gardens, balancing limited vacation days with a modest travel budget that prioritizes nature over luxury, which they plan loosely to accommodate spontaneous departures.
  culinary: Matthew Hernandez enjoys cooking smoky brisket tacos with homemade pico de gallo, brewing seasonal kombucha, and experimenting with herb‑infused grilled vegetables, yet their culinary confidence
    fluctuates, leading them to alternate between elaborate dinner parties for friends and quick, budget‑friendly avocado toast breakfasts, which they sometimes improvise with whatever is on hand.
  core: Matthew Hernandez is a creatively restless landscaper whose curiosity fuels artistic garden projects, but whose emotional intensity and laid‑back habits often swing between inspired bursts and anxious,
    disorganized bouts, which they find both exhilarating and exhausting.
background:
  cultural: Matthew grew up in the suburban community of Katy, Texas, immersed in a blend of Southern hospitality and the multicultural vibrancy of the Greater Houston area. While identifying as white,
    his family background includes both Midwestern roots and Hispanic influences, giving him exposure to traditions like weekend barbecues, country music, and occasional celebrations of Hispanic holidays.
    This mixture has fostered an appreciation for diverse artistic expressions, from Texas folk art to contemporary urban murals. The regional emphasis on outdoor living and community events has shaped
    his comfort with hands‑on work and his desire to create shared green spaces.
