  career_goals: Matthew aims to transition from day‑to‑day groundskeeping to a more design‑focused role, eventually earning certification as a Landscape Technician and pursuing coursework toward a landscape
    architecture credential. He envisions launching his own small, eco‑conscious landscaping firm that specializes in native plant installations and water‑wise garden designs for residential clients in
    the Houston area. In the short term, he wants to expand his portfolio with creative design projects, secure mentorship from a seasoned landscape architect, and develop a reputation for combining practical
    upkeep with artistic flair. Improving his emotional resilience and work‑life balance are also personal goals that will support his professional growth.
