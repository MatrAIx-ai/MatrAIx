  career_goals: Pauline aspires to study animal science or veterinary medicine at a university in Kansas, aiming to become a veterinarian who combines scientific inquiry with compassion for animals. She
    plans to earn scholarships through strong academic performance and science fair projects, and later hopes to lead community outreach programs that educate local youth about animal welfare and sustainable
    farming practices. In the longer term, she envisions working in a collaborative research environment that balances her curiosity with practical applications.
