  hobbies: '[''Woodworking and furniture restoration'', ''Landscape photography'', ''Reading (art history, philosophy, classic literature)'', ''Watercolor painting of natural scenes'', ''Organic gardening'',
    ''Scale model train building'', ''Birdwatching'', ''Crossword and puzzle solving'', ''Classical music listening'', ''Writing personal essays and poetry'']'
  career_goals: Although not currently employed, Rolando aims to transform his hobby expertise into a modest side venture. He plans to launch an online store showcasing his restored furniture and handcrafted
    items, while also publishing a series of essays and photo essays that explore the intersection of rural Midwestern life and modern art. He hopes to become a recognized contributor to his local historical
    society, delivering occasional talks on regional art and heritage. Long‑term, he aspires to travel to major art museums in Chicago, New York, and Washington, D.C., expanding his knowledge and feeding
    his curiosity about unconventional artistic movements.
