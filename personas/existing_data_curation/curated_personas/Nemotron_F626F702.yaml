  career_goals: Scott aims to keep working part‑time at the restaurant to provide steady income while preserving the flexibility that suits his spontaneous nature. He plans to earn a food‑handler certification
    to deepen his expertise and to mentor younger staff members, helping them develop the same courteous, patient approach he values. Long‑term, he dreams of co‑running a modest seasonal kiosk that serves
    fresh, locally caught fish alongside simple home‑cooked sides—a venture that would let him blend his love of the Pacific Northwest waters with his hospitality skills. He also hopes to allocate more
    time for short trips with his wife along the coast before fully retiring.
