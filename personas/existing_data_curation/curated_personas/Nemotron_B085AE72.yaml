  hobbies: '["fishing", "deer hunting", "woodworking", "vegetable gardening", "church community service", "attending country‑music concerts", "reading Missouri history", "DIY home repairs"]'
  career_goals: Although nearing retirement age, Gregory aims to secure a state‑licensed general contracting permit so he can run his own small remodeling business, focusing on energy‑efficient retrofits
    for older homes. He hopes to complete a GED program, attend a weekend course on green building practices, and mentor a younger apprentice through a local trade union. Long‑term, he would like to establish
    a modest family‑run service that can provide steady work for his children and eventually pass the business to his grandson.
