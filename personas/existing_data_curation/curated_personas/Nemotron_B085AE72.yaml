personas:
  professional: Gregory Shetler, a seasoned drywall specialist turned aspiring general contractor, leverages his 40‑year mastery of sheetrock installation, blueprint reading, and OSHA compliance with a
    curious yet pragmatic mindset to integrate energy‑efficient upgrades into older homes while mentoring apprentices and navigating the path to a state‑licensed contract permit.
  sports: Gregory Shetler, a devoted fan of the St. Louis Cardinals and Kansas City Chiefs, enjoys seasonal deer hunting, maintains a membership at the Ozark Outdoor Sports Club for target shooting, and
    joins a casual pick‑up softball game at the community park each spring to stay active.
  arts: Gregory Shetler, who finds solace in the twang of Garth Brooks and the storytelling of Dolly Parton at local country‑music venues, immerses himself in Missouri pioneer history through works by authors
    such as Carl L. Ziegler, and occasionally sketches woodworking designs inspired by the folk art of the Ozarks.
  travel: Gregory Shetler prefers low‑key road trips that combine his love for the Lake of the Ozarks with weekend visits to Branson’s music theaters, while his long‑term wish list includes a modest family
    getaway to the Great Smoky Mountains and an aspirational cruise to the Caribbean, both planned around his modest retirement budget and seasonal availability.
  culinary: Gregory Shetler, an avid gardener and self‑taught home cook, delights in preparing grilled catfish seasoned with fresh garden herbs, pairing it with a buttery corn succotash and a side of vine‑ripped
    tomatoes, and occasionally treats himself to a slice of store‑bought cherry pie despite his preference for wholesome, farm‑to‑table meals.
  core: Gregory Shetler, a 62‑year‑old hands‑on craftsman who balances a love of quiet lake fishing with a stubborn appetite for new lures, occasionally forgets to file his tax paperwork on time, but always
    leaves a fresh cup of coffee for his apprentices.
background:
  cultural: Gregory was born and raised in a working‑class family on the outskirts of Farmington, Missouri. His upbringing emphasized hard work, self‑reliance, and community involvement typical of the Midwestern
    Ozark region. He grew up attending a Protestant church, celebrating local traditions such as county fairs and Fourth‑of‑July picnics, and values family loyalty and modesty. The cultural mix of rural
    Missouri and the broader American heartland shapes his practical outlook, respect for tradition, and openness to incremental improvements.
attributes:
  skills: '["drywall installation", "drywall taping and finishing", "ceiling tile installation and alignment", "blueprint reading", "material estimating", "basic carpentry", "tool maintenance and safety",
