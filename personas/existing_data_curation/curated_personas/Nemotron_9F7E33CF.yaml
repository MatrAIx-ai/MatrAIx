  hobbies: '[''Visiting art galleries'', ''Photography'', ''Woodworking'', ''DIY furniture making'', ''Community theater'', ''Podcast listening (science & culture)'', ''Cooking new cuisines'', ''Reading
    contemporary fiction'', ''Journaling'', ''Hiking'', ''Board-game nights'', ''Attending town fairs'']'
  career_goals: Lia aims to advance from production worker to shift supervisor within the next two years, leveraging her hands‑on experience and lean‑manufacturing knowledge. She plans to earn Lean Six
    Sigma Green Belt and OSHA supervisory certifications to qualify for a floor‑manager role. Long‑term, she envisions either moving into a continuous‑improvement specialist position where she can apply
    her creative mindset to process redesign, or launching a small boutique workshop that blends her production expertise with artistic woodworking and custom décor, allowing her flexibility and artistic
    expression.
