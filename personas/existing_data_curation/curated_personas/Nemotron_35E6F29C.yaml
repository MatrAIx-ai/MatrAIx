  career_goals: Ravneet aims to advance into a supervisory or specialist role within the next three to five years, such as Team Lead or Senior Customer Experience Analyst. He plans to obtain a Certified
    Customer Service Professional (CCSP) credential and pursue targeted training in customer‑experience strategy and data‑driven service improvement. Leveraging his artistic curiosity, he aspires to transition
    into a role that blends customer service with the arts—perhaps as a community outreach coordinator for a local museum or cultural center—where he can design inclusive visitor experiences and mentor
    new staff. Financial stability and the ability to support his family remain central motivations as he navigates life after divorce.
