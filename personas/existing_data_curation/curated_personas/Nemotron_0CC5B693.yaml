  hobbies: '[''golf'',''woodworking'',''gardening'',''listening to jazz and blues music'',''reading historical biographies'',''cooking Southern cuisine'',''volunteering at free tax‑preparation clinics'',''attending
    church choir events'',''watching Toledo Mud Hens baseball games'']'
  career_goals: Willie aims to obtain his CPA license within the next two years, positioning himself for promotion to senior audit manager at his firm. He envisions leading a cross‑functional risk‑based
    audit team that leverages data analytics to improve efficiency and insight. In five to eight years, he hopes to transition into a CFO role for a mid‑size manufacturing company in the Toledo area, where
    he can combine his financial acumen with strategic decision‑making. Beyond corporate advancement, Willie is committed to establishing a community‑focused financial‑literacy program for local schools
    and churches, and eventually plans to start a boutique consulting practice that offers audit and tax services to minority‑owned businesses.
