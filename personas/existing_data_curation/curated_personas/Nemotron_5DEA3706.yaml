personas:
  professional: Deepak Saravanan is a 39‑year‑old DIY‑savvy household manager transitioning to IT support or HVAC maintenance, leveraging hands‑on repair skills, budget‑tight project coordination, and bilingual
    communication to bridge technical gaps in community settings.
  sports: Deepak Saravanan competes in badminton at the Connecticut Badminton Club, favoring fast footwork and strategic smashes, while supplementing fitness with daily garden chores and weekend hikes in
    local state parks, and they root for the Hartford Yard Goats during the baseball season.
  arts: Deepak Saravanan enjoys listening to classical regional instrumental music while cooking, devours personal‑growth non‑fiction from authors like James Clear, and attends occasional community theater
    performances at the local cultural center, letting these artistic touches color their everyday routine.
  travel: Deepak Saravanan prefers low‑key road trips to New England gems such as Mystic, Portland, and the White Mountains, planning itineraries around family gatherings and budget constraints, yet they
    dream of a train‑powered journey to the Pacific Northwest to explore sustainable living communities.
  culinary: Deepak Saravanan blends heritage spices with New England produce, creating dishes like lobster rasam, pumpkin sambar stew, and maple‑infused chapati, and while their cooking skill is solid,
    they still fumble with perfecting the perfect tempering of mustard seeds.
  core: Deepak Saravanan balances pragmatic curiosity with a competitive badminton streak, a garden‑obsessed DIY ethic, and a skeptical eye toward motives, all while navigating the challenges of mid‑life
    career transition.
background:
  cultural: Deepak comes from a Tamil-Indian family that migrated to the United States in the early 1990s. He grew up speaking Tamil at home while attending school in Connecticut, giving him a blend of
    South Asian traditions and American cultural norms. He celebrates festivals such as Pongal, Diwali, and Thaipusam, and participates in local temple events. His cultural upbringing emphasizes family
    cohesion, respect for elders, and community service, which influence his cooking, language use, and involvement in the Manchester CT South Asian community.
