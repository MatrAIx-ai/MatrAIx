  hobbies: '[''Gardening'', ''Cooking Indian and Fusion Dishes'', ''Reading Non-fiction'', ''Playing Badminton'', ''DIY Home Projects'', ''Volunteering at South Asian Cultural Center'', ''Listening to Classical
    Tamil Music'', ''Hiking'', ''Puzzle Solving (Crosswords, Sudoku)'']'
  career_goals: Deepak aims to re-enter the workforce by earning a certification in IT support or HVAC maintenance, leveraging his hands-on experience. He also envisions starting a small home-based catering
    service that showcases South Indian dishes, gradually expanding to local events. In the long term, he wants to become a recognized community liaison, helping newer immigrant families settle in Connecticut
    while maintaining a stable income to support his family.
