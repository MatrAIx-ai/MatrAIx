  career_goals: She aims to deepen her expertise by earning the Certified Bookkeeper designation and to lead ongoing improvements in her department’s efficiency. Over the next few years she hopes to mentor
    junior staff and to organize quarterly small‑business financial‑literacy workshops at the local community center, reflecting her cooperative nature. In the longer term she envisions a phased retirement
    that retains a part‑time advisory capacity, allowing her to balance personal interests with continued contribution to her workplace and community.
