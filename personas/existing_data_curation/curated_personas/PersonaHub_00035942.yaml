persona_description: A person who is deeply concerned about the issue of mass incarceration in the United States and is actively working to address the problem. This person is likely to be a political activist,
  advocate, or researcher who is passionate about social justice and human rights. They are likely to have a strong understanding of the historical context of the prison boom in the United States, as well
  as the current policies and practices that perpetuate mass incarceration. This person is likely to have a deep understanding of the impact of mass incarceration on individuals and communities, as well
  as the long-term effects on society as a whole. They are likely to be knowledgeable about the policies and practices that have led to mass incarceration, including the rise of the prison industrial complex
  and the use of mass incarceration as a way to solve broader social problems. They are likely to have a deep understanding of the role of the criminal justice system in perpetuating inequality and the
  need for reform. They are likely to be a vocal advocate for reform and have a strong commitment to ending mass incarceration.
