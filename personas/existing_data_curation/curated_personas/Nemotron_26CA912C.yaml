personas:
  professional: Janette Quintana, a 15-year-old high school student, merges her curiosity for new ideas with practical skills by creating TikTok videos showcasing inventive taco and tamale recipes while
    simultaneously sketching original comic characters and coordinating volunteer shifts at the local food pantry.
  sports: Janette Quintana enjoys hiking the Sonoma County trails with the Ridge Runner Club, occasionally joins the Santa Rosa Youth Soccer Club's weekend practices, and roots for the San Francisco Giants,
    but her spontaneous schedule often leads to missed workouts.
  arts: Janette Quintana immerses herself in creative pursuits by drawing comic strips inspired by artists like Mike Mignola, crafting pottery in the community art club, listening to Bad Bunny and Tame
    Impala while sketching, and curating a modest jewelry collection that reflects indie-rock aesthetics.
  travel: Janette Quintana prefers spur-of-the-moment road trips, spending weekends exploring nearby Napa Valley vineyards and the Redwood forests, while dreaming of backpacking through Oaxaca's street-food
    markets and visiting Barcelona's art districts when finances allow.
  culinary: Janette Quintana's culinary style fuses traditional street food with modern twists, deftly preparing tacos al pastor with pineapple, hand-rolled tamales stuffed with roasted corn and chipotle,
    and experimental snack bites featuring avocado-lime crema and masa-based crusts, while her cooking skill hovers between enthusiastic home-chef and budding food-stylist.
  core: Janette Quintana thrives on spontaneous creativity, balancing TikTok kitchen experiments, comic sketches, and community volunteering, yet frequently battles anxiety, procrastination, and the urge
    to splurge on the latest gadgets.
background:
  cultural: Janette comes from a Mexican‑American family that immigrated to California from a small town in Jalisco. Spanish is spoken at home, and family gatherings revolve around traditional foods such
    as mole, pozole, and tamales, which she learned to prepare alongside her mother and grandparents. Celebrations like Día de los Muertos and Cinco de Mayo are important, and she helps set up altars and
    decorate the house with papel picado. At the same time, growing up in Rohnert Park exposes her to a diverse suburban environment, where she adopts American teen culture—school clubs, social media trends,
    and local sports. This dual cultural identity gives her a strong sense of community responsibility and a willingness to blend Mexican heritage with contemporary influences, evident in the fusion recipes
    she creates and the bilingual content she shares online.
attributes:
  skills: '[''bilingual Spanish‑English communication'', ''basic cooking and recipe improvisation'', ''short‑form video creation and editing (TikTok/Instagram)'', ''digital illustration using Canva and
    Procreate'', ''peer mediation and conflict resolution'', ''time‑management via phone reminders'', ''basic first‑aid knowledge'', ''DIY craft and jewelry making'']'
  hobbies: '[''experimenting with Mexican cooking and creating recipe videos'', ''listening to reggaeton and indie music while sketching'', ''hiking and nature photography in Sonoma County'', ''journaling
    and writing poetry/lyrics'', ''DIY jewelry making and pottery in community art club'', ''volunteering at local food pantry'', ''creating short TikTok/Instagram reels'']'
  career_goals: Janette aims to graduate high school and earn a GED if needed, then enroll in a community‑college culinary arts program or a digital media certification. She dreams of turning her love for
    Mexican cuisine into a career as a chef‑content creator, running a YouTube channel or Instagram page where she shares quick, affordable recipes that blend traditional flavors with modern twists. She
    also hopes to use her bilingual skills to work as a community outreach coordinator for local nonprofit organizations that support immigrant families, helping them navigate resources and celebrate cultural
    events. In the longer term, Janette envisions opening a small food‑truck or pop‑up kitchen that serves her signature fusion dishes while also offering cooking workshops for teens who want to explore
    culinary creativity. She is motivated to achieve financial independence for her family and to become a positive role model for younger siblings.
