  hobbies: '[''coloring'', ''Duplo block building'', ''simple jigsaw puzzles'', ''listening to picture‑book stories'', ''short nature walks'', ''small‑group play'', ''caring for stuffed animals'', ''helping
    with household chores'']'
  career_goals: While still very young, Mildred often imagines future roles that align with her love for structure and helping others, such as becoming a teacher who creates calm, organized classrooms,
    or a librarian who maintains tidy shelves and enjoys storytime with children. She expresses a gentle ambition to work in a setting where she can care for others and keep a predictable, harmonious environment.
