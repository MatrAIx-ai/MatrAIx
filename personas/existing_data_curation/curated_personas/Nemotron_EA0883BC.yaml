  hobbies: '[''Watercolor painting'', ''Knitting'', ''Native plant gardening'', ''Birdwatching'', ''Reading modernist poetry'', ''Attending local art exhibitions'', ''Journaling'', ''Guided meditation'',
    ''Volunteer tutoring at senior center'']'
  career_goals: Although retired from formal work, Susan remains driven by personal growth and contribution. She aspires to curate a small traveling exhibition that showcases artwork by senior artists in
    Sussex County, blending her love of unconventional ideas with community building. She plans to complete a memoir that weaves together her family history, artistic insights, and strategies for coping
    with anxiety, aiming to help others feel less alone. Susan also hopes to enroll in evening art‑history courses at a local community college to deepen her knowledge, and to mentor a few younger adults
    in a weekly art‑appreciation discussion group at the senior center.
