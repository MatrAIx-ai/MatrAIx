personas:
  professional: Alex Chivis, a senior strategic leader in a Louisville nonprofit, blends meticulous project management, data‑driven decision making, and design‑thinking flair to guide operational efficiency
    while championing community storytelling and inclusive entrepreneurship.
  sports: Alex Chivis, a devoted Louisville Cardinals basketball fan and Louisville City FC supporter, rides a road bike along the Ohio River Trail each spring, jogs with the local River Runners club, and
    joins a weekend pickup basketball league despite a preference for solitary pastimes.
  arts: Alex Chivis, an abstract painter who curates jazz‑blues‑hip‑hop playlists featuring Miles Davis, B.B. King, and Kendrick Lamar, attends the First Friday art walks at the Louisville Art Museum, and
    draws creative inspiration from Mark Rothko and Yayoi Kusama.
  travel: Alex Chivis, an intentional traveler who spends weekends exploring Asheville’s mountain art scene and Nashville’s songwriting studios, plans annual trips to Reykjavik for the Northern Lights and
    Kyoto for its culinary heritage, but balances these adventures with a modest travel budget and family commitments.
  culinary: Alex Chivis, a confident home cook who reimagines Southern staples like shrimp and grits with miso glaze and collard greens sautéed in smoked paprika, frequently incorporates bourbon and sweet
    potatoes into dishes, and loves sourcing fresh okra at the local farmers market.
  core: Alex Chivis, a methodical visionary who merges strategic spreadsheets with splattered canvases, thrives on quiet reflection yet habitually overbooks their calendar and fuels late nights with endless
    coffee.
background:
  cultural: Alex is an African‑American who grew up in Louisville’s historic West End, a community shaped by the city’s civil‑rights legacy and vibrant Black cultural institutions. He maintains strong ties
    to his family, church, and local Black arts scene, drawing inspiration from the resilience, storytelling traditions, and musical heritage of his community. His experiences as a Black professional in
    the Midwest inform his commitment to diversity, mentorship, and community empowerment.
