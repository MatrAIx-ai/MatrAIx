  career_goals: He aims to grow his organization sustainably while deepening its social impact in Louisville, particularly by expanding arts and education programs for underserved youth. Over the next five
    years he envisions establishing a community fund, securing board positions in regional nonprofits, and becoming a recognized advocate for Black entrepreneurship and inclusive leadership.
