personas:
  professional: Nancy Bain, a 31‑year‑old industrial sewing machine operator, leverages meticulous organization and a curious eye for design to excel in straight‑stitch, overlock, and buttonhole work while
    actively mentoring teammates and driving workflow improvements in a fast‑paced apparel plant.
  sports: Nancy Bain, an avid hiker, spends weekends trekking the trails of the Great Smoky Mountains, participates in a local mountain‑bike club during summer, and roots for the Nashville Predators and
    Tennessee Titans, while fitting yoga classes into their schedule to counterbalance the physical demands of their sewing job.
  arts: Nancy Bain, a watercolor enthusiast, regularly paints the rolling hills of rural Tennessee inspired by Georgia O'Keeffe and Mary Cassatt, frequents regional craft fairs to source unique textiles,
    and attends bluegrass concerts featuring Alison Krauss and The Infamous Stringdusters, which fuel their sketchbook ideas for bespoke garments.
  travel: Nancy Bain prefers short, purpose‑driven road trips, often escaping to Asheville, North Carolina for its vibrant arts scene, while dreaming of a future fashion‑focused pilgrimage to Paris and
    a relaxing week at the Gulf Coast beaches when their budget allows.
  culinary: Nancy Bain, a confident home cook, delights in crafting Southern comfort dishes such as crispy fried chicken, buttery biscuits, and peach cobbler, often experimenting with smoked paprika, buttermilk,
    and locally sourced honey to give each recipe a personal twist.
  core: Nancy Bain blends a meticulous, anxiety‑driven work ethic with a boundless curiosity for art and fabric, hoarding colorful scraps in every drawer while occasionally over‑booking their calendar with
    sewing meet‑ups and yoga classes.
background:
  cultural: Nancy was born and raised in Rutherford County, Tennessee, in a white, Southern working‑class family. Her upbringing was shaped by the values of community, hospitality, and modesty emphasized
    by church and small‑town life. Family traditions include Southern cuisine, country and bluegrass music, and participation in local fairs and community events. While she maintains these regional roots,
    Nancy’s curious personality drives her to explore broader artistic scenes, often traveling to nearby cities for museum exhibits and concerts. Her high‑school education emphasized practical skills, steering
    her toward a career in manufacturing and textile work. She identifies with a blend of traditional Southern values and an open‑minded appreciation for diverse creative expressions.
