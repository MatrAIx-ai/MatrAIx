  hobbies: '[''Local sewing club participation'', ''Group quilting projects'', ''Art gallery and museum visits'', ''Craft fair exploration'', ''Watercolor painting and sketching'', ''Reading fashion and
    art literature'', ''Hiking and nature photography'', ''Southern cooking and recipe experimentation'', ''Live bluegrass and folk music attendance'', ''Mindfulness journaling'', ''Yoga practice'']'
  career_goals: Nancy aims to earn a Certified Sewing Machine Operator credential and advance to a lead‑operator or shift‑supervisor role where she can mentor teammates and shape workflow schedules. Over
    the next few years she plans to enroll in part‑time courses in fashion design or textile technology to broaden her creative capabilities. Long‑term, she hopes to transition into a design‑focused position,
    developing a small line of bespoke garments that blend her technical skill with her love for art. Eventually, she envisions opening a home‑based sewing studio that offers custom alterations, handmade
    apparel, and workshops for community members, while maintaining a balanced work schedule that supports her mental‑health needs.
