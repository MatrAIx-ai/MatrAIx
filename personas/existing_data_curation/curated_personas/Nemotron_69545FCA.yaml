personas:
  professional: Kelly Herbert, a two-year-old, transforms the living room into a makeshift startup incubator, spontaneously assembling block towers, experimenting with cause-and-effect, and fiercely competing
    with the family cat for the title of 'Best Tower Engineer' while defiantly rejecting any rigid play schedule, as they cherish the freedom of open‑ended play.
  sports: Kelly Herbert, a two-year-old, loves darting after rolling balls in the backyard, cheerfully chanting for the Chicago Cubs during occasional TV games, and proudly participates in the 'Little Explorers'
    tumble‑time class at the community center, as they prefer spontaneous sprints over structured drills.
  arts: Kelly Herbert, a curious two-year-old, immerses in a world of crayons, repeatedly mimicking Van Gogh’s Sunflowers on the kitchen fridge, humming along to Disney’s ‘Moana’ soundtrack, and occasionally
    pauses to admire a tiny clay dinosaur sculpture in the playroom, as they let art shape each moment of play.
  travel: Kelly Herbert, a two-year-old, embarks on spontaneous family road trips to the beach in Santa Monica, squeals with delight at the zoo in San Diego, and dreams of one‑day toddling through Disneyland
    Paris, as they prefer short, sensory‑rich outings over long, planned vacations.
  culinary: Kelly Herbert, a two-year-old, delights in creamy macaroni and cheese, loves dipping banana slices in peanut butter, insists on crunchy sweet‑potato fries with a sprinkle of sea salt, and often
    demands a sip of warm milk before bedtime, as they savor familiar textures and flavors.
  core: Kelly Herbert, a two-year-old whirlwind of curiosity, blends relentless block‑building competition with spontaneous sensory explorations, hoards shiny coins while fiercely guarding personal play
    rituals, and occasionally rebels against routine, as they make every day an unpredictable adventure.
background:
  cultural: Kelly is being raised in a predominantly White, middle‑class family in Henderson, Nevada, a suburban community within the Las Vegas metropolitan area. Her upbringing reflects typical Southern
    Nevada cultural influences, including frequent visits to the Children's Museum of Las Vegas and local parks that showcase the desert landscape. The family celebrates widely observed American holidays
    such as Thanksgiving, Fourth of July, and Christmas, while also attending occasional community art festivals and cultural events that introduce her to broader artistic perspectives. The multicultural
    environment of Clark County, with its blend of Hispanic, Asian, and indigenous influences, subtly informs her exposure to diverse music, foods, and visual arts, shaping an early appreciation for varied
    experiences.
