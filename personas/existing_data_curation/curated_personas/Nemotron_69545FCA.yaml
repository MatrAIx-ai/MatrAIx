  career_goals: At her current age, Kelly's career aspirations are still forming, but she already displays a desire to master expressive creativity and independence. She frequently insists on continuing
    her drawing sessions, hinting at a future ambition to become a skilled artist. Her fascination with animals and outdoor exploration suggests she may one day pursue roles such as a veterinarian or wildlife
