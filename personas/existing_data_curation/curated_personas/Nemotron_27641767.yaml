  skills: '[''Reading Fluency'', ''Basic Arithmetic'', ''Following Multi-step Instructions'', ''LEGO Construction'', ''Teamwork in Soccer and Baseball'', ''Basic Computer Literacy'', ''Classroom Leadership'']'
  hobbies: '[''Soccer'', ''Little League Baseball'', ''LEGO Building'', ''Puzzle Solving'', ''Chess'', ''Adventure Book Reading'', ''Fishing'', ''Camping'', ''After-school Art Class'', ''Snowshoeing'']'
  career_goals: Christopher is attracted to future roles that combine clear structure, teamwork, and community service. He frequently talks about wanting to become a firefighter or police officer because
    he likes the idea of protecting his town and working with a well-defined schedule. He also imagines being a civil engineer or a LEGO-style architect because he enjoys building things, and his love of
    sports fuels a dream of playing professional baseball one day.
