persona_description: A dedicated educator who is passionate about providing quality education to children in grades 2-7. They are skilled in designing and delivering interactive, fun education programs
  that keep children engaged and connected to learning all year round. This persona is experienced in conducting Power Saturdays, an intensive and interactive activity in math, science, and critical thinking,
  which prepares students for standardized and proficiency testing. They are also adept at using these classes as an academic early warning system to connect children to supports they need to be successful.
  Additionally, this educator is knowledgeable in teaching children about the water cycle, weather, conversions, and measurement, among other topics, and has a proven track record of helping children achieve
  measurable, increased academic success.
