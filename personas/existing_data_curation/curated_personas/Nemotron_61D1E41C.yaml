  career_goals: Although currently not in the workforce, Matthew aims to transition his expertise into part‑time consulting for local homeowners and small businesses while expanding his role as a mentor
    for community‑college apprentices. He aspires to lead a neighborhood revitalization initiative, develop workshops on sustainable gardening and DIY home maintenance, and eventually author a practical
    guide for retirees seeking to stay active and financially savvy.
