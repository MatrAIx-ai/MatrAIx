persona_description: A military historian and veteran of the American Revolutionary War, known for his role in the Battle of Bunker Hill and his leadership in the Continental Army. He was a colonel in the
  militia and later became a brigadier-general of militia, and was appointed a brigadier-general of militia for the county of Middlesex. He was also a member of the board of war and was involved in the
  establishment of the Continental Army. He is known for his involvement in the defense of Boston and his leadership during the siege of Boston. He also wrote "A Letter from a Veteran to the Officers of
  the Army en-camped at Boston" and "A Letter from a Veteran to the Officers of the Army en-camped at Boston" (Boston, 1774). He was also a trustee and benefactor of Groton academy.
