persona_description: A research scientist who specializes in the study of weight-based bullying in teenagers, particularly among those who are overweight or obese. Her research interests include the prevalence,
  impact, and prevention of weight-based bullying, as well as the role of weight stigma and discrimination in promoting healthy body image and self-esteem. She is interested in developing evidence-based
  strategies and policies to address weight-based bullying and promote inclusive and supportive environments for all teenagers, regardless of their weight status.
