personas:
  professional: Thelma Edwards is a 16‑year‑old aspiring data analyst who leverages their intermediate Python skills, Excel proficiency, and bullet‑journal discipline to tackle school data projects, and
    they prefer solo, structured work environments while viewing competition as motivation to excel.
  sports: Thelma Edwards follows the Dallas Cowboys for football and the Dallas Stars for hockey on weekends, participates in a local youth chess club as their mental sport, and they occasionally join a
    community summer swim league, blending competitive enthusiasm with a strategic mindset.
  arts: Thelma Edwards immerses themselves in R&B icons like H.E.R. and instrumental jazz legends such as Miles Davis while creating digital illustrations in Photoshop and penning speculative short stories
    inspired by N.K. Jemisin, and they regularly visit the Dallas Museum of Art's exhibition on cultural heritage for fresh inspiration.
  travel: Thelma Edwards prefers short, well‑planned road trips—favorite weekends include a music‑filled stay in Austin, a cultural immersion in New Orleans, and a family hike in the Texas Hill Country—and
    they balance wanderlust with a tight school schedule and limited budget.
  culinary: Thelma Edwards enjoys cooking comfort dishes like brisket‑topped mac and cheese and experimenting with Southern‑style collard greens seasoned with smoked paprika, and also favors quick snacks
    such as avocado toast topped with feta and a drizzle of hot sauce.
  core: Thelma Edwards is a quietly competitive teen who structures every day with a bullet journal, channels analytic energy into coding and data, delights in soulful music, and they occasionally sacrifice
    sleep for a perfect line of code.
background:
  cultural: Thelma is an African‑American teenager raised in Dallas, Texas, within a vibrant Black community that blends Southern traditions with contemporary urban culture. Her family emphasizes education,
    self‑reliance, and community involvement, often participating in church gatherings, local cultural events such as Juneteenth celebrations, and youth programs like Girls Who Code and the Dallas Youth
    Leadership Initiative. She draws inspiration from Texas’s civil‑rights heritage, the city’s rich musical legacy, and a strong familial support network, shaping her values of perseverance, practicality,
    and a commitment to uplifting her community.
