  career_goals: Thelma aims to earn a scholarship to study Computer Science or Data Analytics at a university, secure a part‑time internship in a technology firm, and eventually work as a data analyst or
    software engineer focusing on tools that improve community services. In the short term, she plans to build a portfolio of small coding projects and explore freelance web‑development opportunities. She
    also envisions using her analytical skills to contribute to civic‑tech initiatives that address local challenges in Dallas.
