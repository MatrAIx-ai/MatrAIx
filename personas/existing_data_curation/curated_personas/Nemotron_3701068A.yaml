personas:
  professional: Connie Pearson, a seasoned community pharmacy technician with a decade of expertise in prescription verification, sterile compounding, and inventory management using PioneerRx, channels
    her curiosity and love of art into innovative patient counseling and is currently pursuing the Certified Pharmacy Technician credential to move into a supervisory role that blends health education with
    creative workshops.
  sports: Connie Pearson regularly hikes the red‑wood trails of Sonoma County with the Redwood Trail Hikers club, practices yoga at the Sonoma Yoga Studio, follows the San Francisco Giants and Golden State
    Warriors on game days, and plays recreational soccer for the local Sonoma County Women's Soccer League during the spring season.
  arts: Connie Pearson immerses herself in the local art scene by attending gallery openings at the Healdsburg Art Center, joining mural walks in Santa Rosa, creating pottery at the Sonoma Art League, and
    singing in a community choir that frequently covers artists like John Legend, Nina Simone, and contemporary jazz vocalist José James.
  travel: Connie Pearson prefers flexible, low‑key travel, often taking spontaneous weekend trips to Napa Valley wineries and the Mendocino Coast, while dreaming of immersive cultural tours of Kyoto, Japan
    and the vineyards of Bordeaux, France, all planned around her work schedule and occasional family commitments.
  culinary: Connie Pearson’s kitchen is a fusion of Southern comfort and African‑inspired flavors, where she regularly prepares shrimp and grits with Cajun seasoning, collard greens simmered with smoked
    turkey, Jollof rice with tomato‑based broth, and berbere‑spiced lamb stew, complemented by locally sourced Sonoma Cabernet Sauvignon.
  core: Connie Pearson is a curious, art‑driven pharmacy technician who balances community health advocacy with spontaneous wine‑tasting outings, yet often feels the pressure of her own high expectations
    and occasional disorganization.
background:
  cultural: Connie is an African‑American woman whose family’s roots trace back to the Southern United States, where storytelling, gospel music, and strong communal ties were central. Growing up in California’s
    diverse Bay Area, she absorbed a blend of Black cultural traditions—soul food, spoken‑word poetry, and activism—while also being shaped by the progressive, health‑focused environment of Sonoma County.
    Her identity as a Black professional in pharmacy fuels a deep commitment to health equity, and she often draws on the resilience and collective spirit of her heritage when navigating workplace challenges
    and community outreach. Living in Cloverdale with her spouse, Connie balances cultural celebrations such as Juneteenth gatherings and church events with the wine‑country lifestyle, integrating both
    worlds into her personal and professional life.
attributes:
  skills: '[''Prescription verification'', ''Medication compounding (sterile and non-sterile)'', ''Pharmacy inventory management'', ''Pharmacy software (PioneerRx, QS/1)'', ''Pharmaceutical calculations'',
    ''Drug interaction analysis'', ''Patient counseling'', ''HIPAA compliance'', ''Health information system navigation'', ''Cross-cultural communication'', ''Community health outreach'', ''Creative problem
    solving'', ''Interpersonal communication'', ''Team facilitation'']'
  hobbies: '[''Visiting art galleries and murals'', ''Wine tasting and vineyard tours'', ''Community theatre (acting/backstage)'', ''Pottery and painting classes'', ''Hiking in Sonoma County'', ''Yoga and
    mindfulness meditation'', ''Cooking Southern and African-inspired cuisine'', ''Book club (contemporary fiction & African‑American literature)'', ''Volunteering at local health fairs'', ''Singing in
    a community choir'']'
  career_goals: Connie aims to obtain the Certified Pharmacy Technician (CPhT) credential and progress into a supervisory or pharmacy‑manager role where she can shape patient‑centered practices. She is
    passionate about reducing health disparities in underserved Black communities in Sonoma County, so she plans to launch a community‑based medication‑education program that blends health information with
    art‑based workshops. Long‑term, Connie envisions opening a small wellness studio that offers yoga, nutrition counseling, and creative art sessions for seniors, providing a flexible schedule that supports
    her family life while continuing her professional growth.
