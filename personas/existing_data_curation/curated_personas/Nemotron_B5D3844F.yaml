personas:
  professional: Mario Morales, a 20‑year‑old construction management student and hands‑on builder, blends systematic planning, bilingual communication, and a curiosity for sustainable practices to coordinate
    small crews, interpret blueprints, and incorporate eco‑friendly innovations on community housing projects, all while honoring family traditions like weekend gatherings and Día de los Muertos celebrations
    that reinforce his collaborative spirit.
  sports: Mario Morales anchors the forward line for the San Bernardino Strikers community soccer league, follows the LA Galaxy and LA Dodgers with fervor, and regularly hikes the San Bernardino Mountains,
    balancing structured team training with solo trail runs to maintain fitness.
  arts: Mario Morales fuels his creative side by listening to regional Mexican legends like Vicente Fernández, Jenni Rivera, and Los Tigres del Norte, while also constructing intricate scale model houses,
    a hobby that satisfies his methodical eye and love for visual storytelling.
  travel: Mario Morales enjoys weekend road trips to Big Bear for snowboarding, cultural visits to Tijuana, and dreams of exploring Oaxaca’s historic markets and Scandinavia’s sustainable building showcases,
    planning each journey with detailed itineraries to maximize experiences within his limited student budget.
  culinary: Mario Morales expertly prepares family‑favorite tamales, pozole, and chiles en nogada, skillfully handling corn masa, chipotle, and fresh cilantro, and often experiments with fusion tacos while
    pairing meals with homemade salsa verde and a side of freshly squeezed lime.
  core: Mario Morales is a practical, community‑focused builder who balances a compassionate heart, a love for soccer and regional music, and a disciplined drive toward sustainable growth and personal responsibility.
background:
  cultural: Mario grew up in a Mexican‑American household in San Bernardino, where Spanish was spoken at home and community ties were strong. His family celebrates Mexican traditions such as Día de los
    Muertos, quinceañeras, and weekly family meals, while also embracing the multicultural fabric of Southern California. This bicultural upbringing nurtured his respect for heritage, strong sense of community,
    and bilingual fluency, shaping his compassionate outlook and collaborative work style.
attributes:
  skills: '[''Blueprint reading'', ''Concrete mixing and finishing'', ''Basic carpentry'', ''Power tool operation'', ''Construction site safety (OSHA)'', ''Material handling and logistics'', ''Team coordination'',
    ''Bilingual communication (Spanish/English)'', ''Systematic task planning'', ''Problem solving'']'
  hobbies: '[''Soccer'', ''Cooking Mexican cuisine'', ''Hiking in the San Bernardino Mountains'', ''DIY home‑improvement projects'', ''Building scale model houses'', ''Listening to regional Mexican music'',
    ''Volunteering at youth construction workshops'']'
  career_goals: Mario aims to leverage his practical experience and college studies to advance into a supervisory role within the next three years, becoming a foreman or site supervisor. He plans to complete
    a degree in Construction Management, obtain certifications such as OSHA 30‑hour and a Certified Construction Manager (CCM) credential, and specialize in sustainable building practices. Ultimately, he
    envisions launching his own small‑scale construction company focused on affordable housing projects in the Inland Empire, where he can mentor younger workers and give back to his community.
