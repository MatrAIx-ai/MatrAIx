  hobbies: '[''Landscape painting'', ''Wood carving (artistic)'', ''Fiddle playing'', ''Hiking on Appalachian trails'', ''Pottery workshops'', ''Attending local art and craft fairs'', ''Gardening'', ''Cooking
    Appalachian recipes'', ''Reading historical fiction'', ''Knitting'']'
  career_goals: Looking ahead, Debra hopes to transition from full‑time construction work to running a boutique woodworking studio that blends functional carpentry with artistic sculpture. She plans to
    secure a roster of historic‑home restoration contracts in the Appalachian region, create a line of handcrafted furniture that showcases reclaimed local timber, and publish a memoir‑style guide on carving
    and building for women entering the trade. Additionally, she wants to formalize her mentorship by teaching part‑time at the local community college and leading a women‑in‑trades apprenticeship program.
