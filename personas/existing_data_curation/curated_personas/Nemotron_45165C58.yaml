personas:
  professional: Debra Wilke, a veteran carpenter with over three decades mastering both structural framing and fine‑detail finish work, leverages her methodical blueprint reading, precise cost estimating,
    and safety‑first crew leadership to weave reclaimed‑wood artistry into every project, reflecting her curiosity and organized nature.
  sports: Debra Wilke tackles the Appalachian trails each weekend with the local 'Mountain Ramblers' hiking club, joins a spring community softball league, and avidly follows the Kentucky Wildcats basketball
    team, blending consistent outdoor activity with modest team‑spirit enthusiasm.
  arts: Debra Wilke paints Appalachian vistas in a lyrical style echoing Andrew Wyeth, plays fiddle alongside bluegrass legends reminiscent of Bill Monroe at local jam sessions, and refines her craft in
    pottery classes inspired by studio ceramist Karen Kunkel, letting artistic curiosity permeate every facet of her life.
  travel: Debra Wilke favors meticulously mapped road trips, having journeyed the historic timber‑framed villages of England’s Cotswolds, the curving vistas of the Blue Ridge Parkway, and the Kentucky Bourbon
    Trail, while now dreaming of a spring pilgrimage to Germany’s Black Forest to study its ancient oak woodworking traditions.
  culinary: Debra Wilke savors cooking traditional Kentucky burgoo, bourbon‑glazed ham, and crusty fried cornbread, often seasoning with garden‑grown heirloom tomatoes, sweet potatoes, and a splash of smoky
    hickory‑infused barbecue sauce for extra depth.
  core: Debra Wilke is a disciplined artisan who merges rugged Appalachian carpentry with painterly imagination, channeling her organized curiosity into every reclaimed‑wood masterpiece while occasionally
    overcommitting to too many projects and neglecting her own rest.
background:
  cultural: Debra grew up in the heart of eastern Kentucky’s Appalachian region, where generations of her family have lived and worked in coal‑mining towns. The community’s emphasis on self‑reliance, craftsmanship,
    and storytelling shaped her pragmatic yet creative outlook. While she completed high school locally, she entered a union apprenticeship after graduation, learning carpentry from seasoned tradespeople
    in a male‑dominated field. Her cultural identity is steeped in Appalachian traditions—bluegrass music, folk art, and a strong church presence—yet she also embraces contemporary influences, allowing
    her to blend heritage techniques with modern design. This background informs her commitment to historic preservation, mentorship of women in trades, and the value she places on community collaboration.
