persona_description: A herpetologist who specializes in the study of snakes and their behavior. She has conducted research on the defensive habits of R. tigrinus snakes, including the source of their bufadienolides.
  Her research interests include the evolution of defensive mechanisms in snakes, the relationship between snakes and their predators, and the role of toxins in snake behavior. She has published her findings
  in scientific journals and presented her research at international conferences.
