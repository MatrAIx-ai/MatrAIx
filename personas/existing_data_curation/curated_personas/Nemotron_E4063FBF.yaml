  hobbies: '[''Reading historical nonfiction and classic literature'', ''Attending live theater'', ''Playing tennis'', ''Cycling along coastal paths'', ''Chess club participation'', ''Balcony gardening
    (herbs and tropical flowers)'', ''Cooking Caribbean-inspired dishes'', ''Volunteering at the Miami Historical Society'']'
  career_goals: Robert aims to advance to a senior administrative leadership role, such as Operations Manager or Director of Administrative Services, within the next five years. He plans to obtain a Certified
    Administrative Professional (CAP) credential and complete a leadership development program focused on digital transformation of office processes. His ambition includes mentoring the next generation
    of office supervisors, implementing lean management practices to reduce operational waste, and contributing to strategic initiatives that improve overall organizational efficiency. He also hopes to
    leverage his experience to consult for small businesses in Miami, helping them modernize their administrative functions.
