  hobbies: '[''Reading mystery novels'', ''Solving jigsaw puzzles'', ''Journaling'', ''Knitting'', ''Gardening'', ''Listening to jazz and instrumental music'', ''Watching documentaries'', ''Cooking simple
    meals'', ''Walking in local parks'']'
  career_goals: Aubretta aims to advance within the laundry industry by first securing a shift‑supervisor position, where she can apply her organizational strengths to oversee staff and streamline operations.
    Over the next few years, she plans to obtain a certification from the Institute of Inspection, Cleaning and Restoration (IICRC) and pursue a community‑college associate degree in business administration.
    Her long‑term ambition is to launch her own eco‑friendly laundry and dry‑cleaning service that offers reliable, affordable care for local families while providing a stable income to support her married
    life and future children.
