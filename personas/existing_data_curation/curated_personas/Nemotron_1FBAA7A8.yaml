  career_goals: Patrick aims to finish his GED within the next year and enroll in a vocational program for automotive technology at a nearby community college. He hopes to become a certified mechanic, gain
    experience working in a reputable shop, and eventually open his own small auto‑repair business that serves the Flushing community. He envisions his shop as a friendly, dependable place where neighbors
    can trust his honesty and reliability. In parallel, he wants to stay involved in local youth programs, perhaps as a mentor or community‑center organizer, using his organisational strengths to plan events
    and provide guidance. Long‑term, he aspires to be a respected community leader who balances practical trade work with service to others.
