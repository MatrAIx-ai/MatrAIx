    to teach art'']'
  career_goals: Edwin aims to earn a GED within the next year and enroll in a community college program in Graphic Design or Visual Communications. He aspires to build a portfolio that blends street‑art
    aesthetics with digital media, eventually securing an internship at a local design agency or a marketing department. His long‑term ambition is to become a creative director, leading multidisciplinary
    teams to produce innovative campaigns for socially conscious brands. He also hopes to start a community art collective in Pensacola that offers mentorship to other youth, especially from underrepresented
    backgrounds.
