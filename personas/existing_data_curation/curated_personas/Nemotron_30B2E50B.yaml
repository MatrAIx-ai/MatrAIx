personas:
  professional: Edwin Stephens, an aspiring graphic designer and digital storyteller, blends street‑art aesthetics with Adobe Photoshop, Illustrator, and Premiere Pro to create kinetic cityscape illustrations
    and short animated clips, while leveraging Trello‑driven project planning and public‑speaking flair to lead community art workshops and coordinate school club events.
  sports: Edwin Stephens, a regular participant in Pensacola’s basketball pick‑up courts, follows the Miami Heat and the Tampa Bay Buccaneers, and joins a local weekend league to hone strategic play, while
    also streaming competitive first‑person shooters and MOBAs that sharpen reflexes and tactical thinking.
  arts: Edwin Stephens, a dedicated sketcher and digital animator, draws inspiration from graffiti legend Banksy, animator Hayao Miyazaki, and spoken‑word poet Sarah Kay, regularly attends open‑mic nights
    to perform original hip‑hop‑infused poetry, and volunteers teaching basic illustration techniques to children at the community center.
  travel: Edwin Stephens, an enthusiastic road‑trip planner, has explored Miami Beach’s art deco district, soaked in New Orleans’ live jazz scene, and dreams of wandering Barcelona’s street murals and Tokyo’s
    anime galleries, favoring budget hostels and careful itinerary mapping to stretch a modest travel fund.
  culinary: Edwin Stephens, a self‑taught kitchen experimenter, favors quick‑fire dishes like shrimp‑and‑grits, chicken shawarma wraps, and pepperoni pizza while gaming, often adds hot sauce for a flavor
    kick, and occasionally tries to replicate street‑food flavors in their tiny apartment kitchen.
  core: Edwin Stephens is an imaginative yet methodical teen who channels competitive energy into art, gaming, and community leadership, while juggling a disciplined savings habit, occasional late‑night
    pizza binges, and a relentless drive to blend street culture with digital design.
background:
  cultural: Edwin is a Black teenager raised in Pensacola’s historically African‑American neighborhoods, where church, family, and community events have shaped his identity. He grew up surrounded by Southern
    Black cultural traditions, from gospel music and soul food to the legacy of civil‑rights activism in the region. Family gatherings often feature stories about ancestors from the Deep South and the Great
    Migration, and he participates in local Juneteenth celebrations and the annual Pensacola African American Heritage Festival. These experiences inform his artistic voice, which blends contemporary urban
    culture with the rich history of his community.
