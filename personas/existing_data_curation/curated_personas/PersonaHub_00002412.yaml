persona_description: A historian who specializes in the study of European exploration and colonization, particularly the impact of diseases on the indigenous populations. Has a particular interest in the
  role of scurvy as a contributing factor to the collapse of La Isabela, and the broader implications of the study for understanding the historical context of European expansion in the Americas. Is knowledgeable
  about the work of Vera Tiesler and her team, and the methodology used in their study. Has a keen interest in the history of the Caribbean and the role of indigenous populations in the development of the
  New World. Is familiar with the work of scurvy experts George J. R. Maat and Charles Mann. Is interested in the broader implications of the study for understanding the historical context of European expansion
  in the Americas, and the role of indigenous populations in the development of the New World.
