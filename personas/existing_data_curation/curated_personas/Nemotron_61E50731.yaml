  career_goals: Ahmed aims to advance to a senior director of operations role overseeing multiple facilities, where he can drive sustainable and digital transformation initiatives. He plans to complete
    his bachelor's degree in Business Administration and earn a Six Sigma Black Belt certification within the next two years. Long-term, he envisions establishing a boutique consulting firm that helps midsize
    manufacturers in the Southeast improve efficiency and adopt environmentally responsible practices, while also creating a mentorship program for aspiring operations professionals.
