personas:
  professional: Sharon Mcmullen is a senior architectural drafter whose expert command of AutoCAD, Revit, and parametric tools like Grasshopper drives a meticulous yet imaginative drafting workflow that
    blends rigorous code compliance with abstract design exploration, and they use their competitive streak to push their team toward tight deadlines while mentoring junior staff.
  sports: Sharon Mcmullen fuels their love of movement by joining the Madison Active Trails running club for weekend 10‑k runs, tackling Wisconsin’s rolling hills on hikes with a local hiking group, hitting
    the slopes for cross‑country skiing at Devil’s Lake in winter, and cheering on the Milwaukee Brewers and Green Bay Packers from their balcony while sporting a vintage Packers snapback.
  arts: Sharon Mcmullen channels their creative pulse into vibrant abstract watercolors inspired by the color fields of Mark Rothko and the geometric dynamism of Wassily Kandinsky, while their street photography
    nods to the chiaroscuro of Henri Cartier‑Bresson, and evenings are often spent at local showcases featuring jazz saxophonist Kamasi Washington, spoken‑word poet Sarah Kay, and experimental theater performances
    by the Bad Seed Theatre Company.
  travel: Sharon Mcmullen plans travel as a curated series of architectural pilgrimages, having trekked through Barcelona’s Sagrada Família, wandered the zen gardens of Kyoto, and explored the vibrant souks
    of Marrakech, while also treating themselves to weekend road trips across Wisconsin to Door County’s waterfront cottages and the historic streets of Milwaukee, always balancing a modest budget with
    a craving for immersive, design‑centric experiences.
  culinary: Sharon Mcmullen delights in a palate that blends soulful Southern comfort—think jambalaya, collard greens, and sweet potato pie—from the African American festivals they frequent with experimental
    forays into Ethiopian injera and homemade sushi rolls, cooking most dinners in their modest kitchen with a confident hand at sautéing and a lingering habit of forgetting to restock pantry staples until
    the next week’s grocery run.
  core: Sharon Mcmullen fuses abstract watercolor imagination with precision drafting, juggling competitive ambition and occasional skepticism, while nurturing a habit of late‑night piano improvisations
    that spark their most innovative design ideas.
background:
  cultural: Sharon grew up in Madison in a Black family with roots in the Southern United States and Caribbean ancestry. Her upbringing blended Midwestern community values with the rich oral storytelling,
    gospel, and jazz traditions of the African diaspora. Family gatherings often featured music, food, and discussions about social justice, fostering a strong sense of community responsibility. Participation
    in local Black cultural festivals and civic volunteerism instilled in her a commitment to inclusive design and equitable spaces. These cultural influences shape her architectural perspective, prompting
    her to prioritize community‑oriented projects, celebrate cultural diversity, and integrate sustainable, locally resonant elements into her work.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''ArchiCAD'', ''BIM coordination'', ''Wisconsin building codes'', ''Structural drafting'', ''SketchUp'', ''Rhino'', ''Lumion'', ''Grasshopper'', ''Python scripting'',
    ''Geometric analysis'', ''Project coordination'', ''Technical illustration'', ''Sustainable design research'']'
  hobbies: '[''Abstract watercolor painting'', ''Urban sketching'', ''Architectural photography'', ''Hiking'', ''Speculative fiction reading'', ''African American cultural events'', ''Maker‑space workshops'',
    ''Piano playing'']'
  career_goals: Sharon aims to advance to a senior design drafter or BIM manager role within a forward‑thinking architecture firm, where she can guide complex projects and mentor junior staff. She plans
    to obtain LEED Green Associate and eventually LEED AP credentials to embed sustainability into her drafting workflow. Long‑term, she intends to pursue the additional licensure steps required for becoming
    a licensed architect, including the NCARB ARC exam. She aspires to lead multidisciplinary teams focused on innovative, culturally inclusive public projects in Madison, such as community centers and
    affordable housing developments. By building a portfolio of speculative designs that blend abstract art with functional architecture, she hopes to exhibit her work at regional design festivals. Ultimately,
    Sharon envisions launching a boutique consultancy offering parametric design and visualization services for socially responsible projects, while championing diversity by mentoring underrepresented drafters.
