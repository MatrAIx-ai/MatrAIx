  hobbies: '[''Hiking and trail walking'', ''Skiing during winter'', ''Birdwatching'', ''Gardening'', ''Cooking and baking'', ''Reading historical fiction and memoirs'', ''Participating in community book
    clubs'', ''Knitting and quilting'', ''Volunteering at local library events'', ''Yoga and mindfulness practice'']'
  career_goals: She aims to become the director of a community‑run childcare center that emphasizes nature‑based learning and cultural storytelling. Over the next five years, Laura plans to earn a Child
    Development Associate credential and complete a graduate certificate in early childhood education. She also hopes to design a boutique preschool program that integrates local environmental education,
    mentor new staff, and advocate for affordable, high‑quality childcare options in Truckee and surrounding rural areas.
