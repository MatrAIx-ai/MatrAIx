  career_goals: Barbara aims to turn her love of art and community service into a career by pursuing a certificate in nonprofit management or event planning. Her short‑term goal is to secure a part‑time
    position as a program assistant at the Galveston County Cultural Center, where she can apply her organizational talents and expand her knowledge of museum operations. Long‑term, she envisions herself
    as a community arts coordinator, designing inclusive programs that bring together diverse residents of Dickinson and the greater Houston area. She also hopes to eventually launch a small pop‑up gallery
    space that showcases emerging local artists while offering workshops that merge creativity with social outreach.
