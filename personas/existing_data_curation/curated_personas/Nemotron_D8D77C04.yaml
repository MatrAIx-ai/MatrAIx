  career_goals: Katia aspires to become a visual storyteller—dreaming of a future as a graphic novelist or concept artist for video games. She is fascinated by the way images can convey complex ideas, and
    she hopes to combine her love for art with her curiosity about science, eventually studying environmental illustration to raise awareness about marine life in the San Diego Bay. Though still young,
    she sets short‑term goals to improve her drawing techniques, build a portfolio on a personal website, and enter local art contests.
