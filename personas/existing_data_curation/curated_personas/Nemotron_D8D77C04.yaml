personas:
  professional: Katia Alvarez, an aspiring digital illustrator and budding coder, channels their curiosity and love for solitary, detailed sketching into creating vibrant fantasy characters on Scratch,
    while their balanced mix of organization and flexibility ensures they meet project timelines and revise their designs with precision.
  sports: Katia Alvarez, an avid supporter of the San Diego Padres and the LA Galaxy, enjoys weekend nature walks and tide‑pool explorations at Chula Vista Bayfront Park, participates intermittently in
    their school’s swimming club, and occasionally joins a local youth soccer practice with the Chula Vista Soccer Club, balancing their love for quiet outdoor activity with occasional team sport involvement,
    and they also relish cheering for their favorite teams from the sidelines.
  arts: Katia Alvarez, whose artistic soul is inspired by Frida Kahlo’s vivid self‑portraits, the imaginative storytelling of Guillermo del Toro’s films, and the soulful ballads of Luis Miguel, spends evenings
    sketching papel picado designs while listening to traditional mariachi, weaving cultural motifs into their fantasy notebooks, and they often experiment with digital art tools to bring their sketches
    to life.
  travel: Katia Alvarez, who prefers carefully planned family trips that blend adventure with relaxation, routinely explores the tide pools of La Jolla and enjoys weekend visits to the historic plazas of
    San Miguel de Allende, while dreaming of future voyages to the Galápagos Islands and Kyoto’s cherry‑blossom festivals once their family's budget permits, they often sketch travel itineraries in their
    journal, revealing a balance between familiar coastal escapes and far‑off cultural curiosity.
  culinary: Katia Alvarez, a budding junior cook, delights in assisting their abuela with making pork‑filled tamales and simmering pozole flavored with hominy and cilantro, experiments with avocado‑lime
    salsa and roasted poblano peppers on homemade fish tacos, and proudly prepares fresh mango slices for dessert, showcasing a developing culinary skill set rooted in family recipes, and they often share
    their creations with friends during school potlucks.
  core: Katia Alvarez, a quiet 11‑year‑old dreamer, fuses their love for solitary sketching, coding experiments, and cultural celebrations into a unique worldview that balances meticulous organization with
    occasional bouts of worry‑driven procrastination, and they often retreat to their sketchbook when stress builds.
background:
  cultural: Katia is raised in a Mexican‑American household where Spanish is spoken daily and cultural traditions are celebrated. Her family observes Día de los Muertos and Las Posadas, and they enjoy cooking
    homemade tamales and pozole together. She has a strong sense of familismo, often helping her abuela with household chores and learning traditional crafts like papel picado. Growing up in Chula Vista’s
    vibrant Mexican community, she participates in local festivals at the Chula Vista Recreation Center and feels connected to the broader heritage through music, dance, and stories passed down by her grandparents.
