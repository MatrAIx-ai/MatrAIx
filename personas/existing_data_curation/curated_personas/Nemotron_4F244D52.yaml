  career_goals: Jamahl aims to move into a supervisory or managerial position within the chemical manufacturing sector, where he can lead small, high‑performing teams and drive continuous improvement projects.
    He is working toward obtaining a Professional Engineer (PE) certification to bolster his technical credibility. Long‑term, he envisions launching a boutique consulting firm that leverages his dual expertise
    in chemistry and business to help midsize manufacturers adopt lean processes and sustainable practices. He also hopes to mentor younger technicians, particularly from underrepresented backgrounds, to
    broaden diversity in the field.
