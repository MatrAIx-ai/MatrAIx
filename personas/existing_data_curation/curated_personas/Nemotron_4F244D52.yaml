  hobbies: '[''Abstract Painting'', ''Science Fiction Literature'', ''Home Brewing (Kombucha & Coffee)'', ''Hiking in the San Bernardino Mountains'', ''Jazz and Ambient Music Appreciation'', ''Puzzle Solving
