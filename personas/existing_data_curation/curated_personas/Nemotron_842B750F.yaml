personas:
  professional: Robert Borja, age 7, is a budding engineer who channels his love for structured creativity into building intricate LEGO sets, drawing detailed cartoon characters, and organizing backyard
    projects, displaying a practical, reliable, and focused mindset even at a young age.
  sports: Robert Borja, 7, participates in a small‑group after‑school soccer program with the City Kids Soccer Club, proudly wears the jersey of the Los Angeles Galaxy, and practices drills at home to improve
    footwork, yet they can be overly competitive during friendly matches.
  arts: Robert Borja, 7, expresses creativity through drawing cartoon heroes inspired by classic Disney films and Dr. Seuss, listening to folk ballads narrated by grandparents, and building LEGO models
    that mimic scenes from their favorite adventure books, while they occasionally stay up late to finish a sketch.
  travel: Robert Borja, 7, enjoys family road trips to the Grand Canyon and occasional visits to Disneyland, prefers well‑planned itineraries with scheduled breaks for LEGO playtime, but dreams of exploring
    the ancient ruins of Machu Picchu someday.
  culinary: Robert Borja, 7, loves assisting in the kitchen by preparing homemade quesadillas, shaping tortilla shells, and sprinkling cinnamon sugar on churros, showing a growing skill in measuring ingredients,
    though they sometimes sneak extra chocolate chips into the batter.
  core: Robert Borja, a 7‑year‑old with a penchant for structured play, meticulous LEGO building, and quiet creativity, balances a disciplined routine with occasional spontaneous snack raids, revealing
    a thoughtful yet occasionally mischievous spirit.
background:
  cultural: Robert comes from a Mexican‑American family that keeps strong cultural traditions alive. At home, Spanish and English are spoken interchangeably, and meals often feature tacos, tamales, and
    other classic dishes. He celebrates Día de los Muertos and other Mexican holidays, participating in community events at a local cultural center in Simi Valley. His parents emphasize values such as respect
    for elders, community solidarity, and hard work, fostering a bicultural identity that blends Mexican heritage with the broader American environment.
