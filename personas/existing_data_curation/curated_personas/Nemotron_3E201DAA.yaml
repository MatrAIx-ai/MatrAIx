  skills: '["Python", "JavaScript", "React", "Node.js", "Express", "HTML/CSS", "TypeScript", "PostgreSQL", "MySQL", "Git", "GitHub", "Docker", "AWS (EC2, S3, Lambda, CloudFormation)", "Test-Driven Development
    (pytest, Jest)", "CI/CD (GitHub Actions)", "Agile Scrum", "Technical mentoring", "Documentation"]'
  hobbies: '["Cooking and baking", "Hiking in Patapsco Valley State Park", "Reading science-fiction and mystery novels", "Playing acoustic guitar", "Board-game nights", "Volunteer coding mentor for youth",
    "Vegetable gardening", "Journaling"]'
  career_goals: Kittie aims to advance to a senior software engineer role within the next three years, focusing on deepening her expertise in cloud‑native architecture and scalable micro‑services. She plans
    to earn the AWS Certified Solutions Architect – Associate credential and to lead a small development team where she can foster a collaborative, quality‑first culture. In the longer term, Kittie hopes
    to transition into a technical lead or engineering manager position that balances hands‑on coding with mentorship and strategic planning. She is also interested in contributing to open‑source projects
    and developing a side product that leverages technology to support local non‑profits in Baltimore County.
