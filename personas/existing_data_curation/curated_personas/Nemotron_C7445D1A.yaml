  career_goals: Michael aims to step into a senior quality assurance role within the next five years, targeting ASQ Certified Quality Engineer certification and formal training in lean manufacturing. He
    hopes to lead a small QA team, champion data‑driven process improvements, and introduce automated inspection systems that reduce manual errors. Long‑term, he envisions launching a boutique consulting
    practice that helps small coastal manufacturers streamline their quality processes while preserving flexibility for his family life and personal interests.
