    R&B and hip‑hop music'', ''Participating in church youth group activities'']'
  career_goals: Melvin dreams of a future where he can combine his love for structure, problem‑solving, and community service. He is fascinated by space and engineering, often describing a goal to become
    an astronaut or aerospace engineer who designs reliable rockets and spacecraft. At the same time, he admires role models who protect and help others, so he also envisions becoming a firefighter or police
    officer, careers that offer clear procedures, teamwork, and a tangible impact on his neighborhood. His ambitions reflect his practical mindset, desire for dependable pathways, and a wish to give back
    to the Laurel community.
