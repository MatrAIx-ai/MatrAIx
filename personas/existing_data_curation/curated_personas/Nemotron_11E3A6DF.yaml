personas:
  professional: Melvin Argaw is a budding junior coder who turns Scratch puzzles into mini‑games, builds intricate LEGO models as practice for future engineering, and approaches each project with a methodical,
    checklist‑driven mindset that reflects their love for structure and practical problem‑solving.
  sports: Melvin Argaw darts across the field as a forward for the Eastside Juniors soccer team, hones dribbling skills with the Youth Hoopsters basketball club, and spends weekends racing a mountain bike
    through Pine Creek Park, all while cheering for the hometown basketball franchise the City Eagles and the MLS side Seattle Sounders FC.
  arts: Melvin Argaw immerses themselves in adventure novels by authors like Brandon Sanderson, builds narrative worlds with LEGO, sways to contemporary R&B and hip‑hop tracks from artists such as Drake,
    Kendrick Lamar, and H.E.R., and occasionally sketches superhero scenes inspired by the Marvel movies they adore.
  travel: Melvin Argaw prefers well‑planned family trips that balance scheduled museum visits—like the Smithsonian National Air and Space Museum in Washington, D.C.—with free‑play time at theme parks such
    as Disney World, and dreams of cycling through the historic streets of Kyoto while saving up allowance for future adventures.
  culinary: Melvin Argaw loves homemade pepperoni pizza, can whip up a banana‑strawberry smoothie with almond milk, and shows budding kitchen confidence by baking simple chocolate chip cookies using cocoa
    powder and vanilla extract, yet frequently sneaks extra cheese on pizza when no one’s watching.
  core: Melvin Argaw is a structured, curious 10‑year‑old who balances LEGO engineering, Scratch coding, and soccer with a disciplined allowance plan, mild allergy management, and a playlist of R&B beats,
    all while dreaming of future travels and chocolate‑chip cookies.
background:
  cultural: Melvin is an African‑American boy raised in Laurel, Maryland, a community with a rich blend of urban and suburban influences. His family celebrates cultural traditions such as Juneteenth gatherings,
    soul‑food cooking with dishes like collard greens and fried chicken, and attending local festivals that honor black heritage. Regular visits to the nearby Smithsonian National Museum of African American
    History and Culture and involvement in school’s Black History Month projects reinforce his awareness of historical contributions and role models. The supportive church community provides mentorship
    and emphasizes values of perseverance, collective responsibility, and pride in his cultural identity.
