  hobbies: '[''cooking Salvadoran cuisine'', ''balcony gardening'', ''crocheting'', ''listening to Latin music'', ''park walking'', ''reading mystery novels'', ''volunteering as a Spanish tutor'']'
  career_goals: Margarita seeks to stabilize her employment by moving into a lead or supervisory position on the assembly line, where she can apply her experience to improve workflow and safety standards.
    She plans to obtain certifications in CNC machining and welding to broaden her technical skill set. Long‑term, she hopes to transition to a part‑time mentorship role, guiding younger workers while achieving
    financial security for retirement. She also dreams of starting a modest home‑based venture, selling homemade Salvadoran pastries and handcrafted woven items to supplement her income.
