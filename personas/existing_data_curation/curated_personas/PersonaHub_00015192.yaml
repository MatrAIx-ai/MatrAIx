persona_description: A dedicated and passionate individual with a mission to find treatment and a cure for Ehlers Danlos Syndrome (EDS). They are committed to researching and coordinating various research
  projects related to the condition, including those focusing on the vascular type of EDS, which has a significantly shorter life expectancy and more severe symptoms. They are knowledgeable about the genetic
  nature of EDS, the potential for rupture of internal organs due to the condition, and the importance of research in finding a cure.
