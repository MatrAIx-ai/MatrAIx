  career_goals: Jonathan aims to enroll in a community college or trade program to study mechanical engineering or become a certified automotive technician. He envisions gaining deeper technical knowledge
    while keeping a practical focus, eventually opening his own small repair workshop that serves his hometown. He wants a career that blends his curiosity for how things work with reliable, community‑oriented
    service, allowing him to continue learning new technologies while staying grounded in hands‑on work.
