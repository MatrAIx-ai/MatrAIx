personas:
  professional: An aspiring mechanical engineer and future automotive technician, Jonathan Wenck leverages their hands‑on problem‑solving abilities, love for building model kits, and natural teamwork skills
    to lead school projects and consistently meet deadlines, and they are known for delivering results on time.
  sports: An enthusiastic outdoor athlete, Jonathan Wenck rides with the local junior cycling club, competes on the Riverdale High School cross‑country team, follows the Milwaukee Bucks for basketball and
    the Chicago Bears for football, and they end each hike with a quick stretching routine to stay limber.
  arts: A creative sci‑fi aficionado, Jonathan Wenck devours novels by Isaac Asimov and Andy Weir, streams classic films like *Blade Runner*, listens to The Beatles while meticulously assembling RC car
    model kits, and they occasionally sketch futuristic vehicle designs in their notebook.
  travel: A budget‑conscious explorer, Jonathan Wenck plans weekend camping trips to the nearby Ozark trail system, has already trekked the Grand Canyon on a school field trip, and they dream of backpacking
    through Japan’s countryside, especially the historic town of Kyoto, while saving their travel fund through part‑time work.
  culinary: A budding home cook, Jonathan Wenck enjoys perfecting spaghetti carbonara with pancetta, crafting grilled cheese sandwiches with sharp cheddar, and experimenting with trail‑mix snack bars made
    from oats, honey, and dried cranberries after their outdoor adventures, and they often share the results with friends at the community garden.
  core: Jonathan Wenck is a pragmatic, curiosity‑driven teen who blends hands‑on tinkering with community service, balancing reliable routines with an adventurous spark, and they never shy away from a new
    challenge.
background:
  cultural: Jonathan grew up in Harrisburg, a small town in Cabarrus County, North Carolina. His family has deep regional roots, valuing community, self‑reliance, and a connection to the outdoors. He was
    raised in a household that blends traditional Southern values—such as hospitality, respect for neighbors, and a love of local foods like barbecue—with modern influences from the internet and popular
    culture. Attending a local middle school, he participated in community events, church gatherings, and seasonal festivals that emphasize cooperation and shared heritage, shaping his considerate and harmonious
    outlook.
