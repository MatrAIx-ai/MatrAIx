  career_goals: George aims to deepen his financial expertise and progress toward senior leadership within corporate finance. Over the next five years, he plans to earn his CFA designation, pursue an MBA
    focused on finance, and transition into a senior financial analyst role, eventually targeting a Director of Finance position at a regional mid-sized manufacturing firm. He also harbors a long‑term ambition
    to launch his own boutique advisory practice that integrates financial analysis with ethical and cultural considerations, drawing on his humanities background. He seeks to be recognized for innovative,
    data‑driven decision making while maintaining his independent, results‑oriented work style.
