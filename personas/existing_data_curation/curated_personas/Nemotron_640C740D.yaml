personas:
  professional: Judith Cragg is a meticulous custodian; they apply their hands‑on expertise in floor care, chemical safety, and inventory management, and their calm, organized demeanor translates into reliable
    team scheduling and conflict resolution, making them a natural candidate for a supervisory position.
  sports: Judith Cragg enjoys low‑impact fitness, joining the Lakeside Walking Club for weekend strolls, cheering for the hometown City Bears minor‑league baseball team during summer, and attending a weekly
    beginner’s yoga class to stretch sore muscles after long cleaning shifts, all of which they schedule into their meticulous weekly planner.
  arts: Judith Cragg finds creative solace in knitting while listening to folk singer Brandi Carlile, immerses themselves in classic novels by Jane Austen during book‑club meetings, and supports the local
    community theater’s seasonal productions of plays like 'Our Town', all of which they cherish as a quiet escape from daily chores.
  travel: Judith Cragg prefers carefully planned weekend getaways that blend relaxation with modest adventure, such as a recent road trip to Asheville’s Blue Ridge Parkway and a spring visit to the fragrant
    gardens of Kyoto, Japan, always opting for eco‑friendly accommodations and budgeting the trip within their savings plan to avoid financial stress, which they find essential for peace of mind.
  culinary: Judith Cragg enjoys cooking simple, garden‑fresh meals—like roasted vegetable quinoa tossed with basil, thyme, and a lemon‑olive‑oil dressing, or hearty lentil soup seasoned with oregano and
    garlic—while their intermediate skill level lets them experiment with homemade pesto and occasional sourdough baking, though they sometimes over‑salt dishes when stressed.
  core: Judith Cragg is a detail‑driven, eco‑conscious custodian who balances a love for orderly routines with quiet curiosity, often worrying about the next checklist while finding calm in knitting, garden
    herbs, and meticulously budgeting for a future family‑run cleaning venture.
background:
  cultural: Judith grew up in the suburban South of Georgia, where Southern hospitality and a strong work ethic are valued. Her upbringing emphasized community involvement, church participation, and family
    cohesion. As a white American from Fulton County, she has been shaped by the region's blend of suburban life and proximity to Atlanta's multicultural influences, but she retains traditional Southern
    values such as politeness, modesty, and a respect for personal space. These cultural cues reinforce her preference for small‑group interactions, cooperative attitudes, and a practical approach to everyday
    challenges.
