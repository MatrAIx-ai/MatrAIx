  hobbies: '[''vegetable gardening'', ''indoor herb windowsill'', ''DIY cleaning solution experiments'', ''home‑improvement shows'', ''crossword puzzles'', ''knitting'', ''reading short‑form how‑to articles'',
    ''small book‑club'', ''church volunteer work'']'
  career_goals: Judith aims to advance to a supervisory or lead custodian role within the next two to three years, overseeing a small cleaning crew and managing shift schedules. She plans to obtain a Certified
    Professional Cleaner (CPC) credential and possibly a facility‑management certificate offered by local community colleges, which would broaden her qualifications for a facilities coordinator position.
    Long‑term, she envisions starting a family‑run cleaning service that emphasizes eco‑friendly products, giving her more control over her work hours and reducing physical strain as she ages.
