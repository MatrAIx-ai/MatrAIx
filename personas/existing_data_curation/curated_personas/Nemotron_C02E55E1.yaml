  career_goals: Arlene loves talking about future jobs that involve order and helping others, such as becoming a teacher who keeps a classroom organized, a librarian who arranges books, or a 'puzzle master'
    who creates games. She also dreams of building big structures with blocks, imagining herself as an engineer. Her competitive streak leads her to want to be the best at counting games or spelling contests
    at preschool.
