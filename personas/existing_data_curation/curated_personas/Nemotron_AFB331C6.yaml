personas:
  professional: Rodney Habib is an aspiring software developer with a solid foundation in Python, JavaScript, Linux, and hardware tinkering, who balances curiosity with practicality, delivering organized
    yet flexible code while competitively targeting open‑source contributions and coding contests.
  sports: Rodney Habib enjoys watching Nebraska Cornhuskers football on Saturdays, follows the local Omaha Storm Chasers baseball team, rides a road bike with the Omaha Cycling Club during spring, and hikes
    the trails at Indian Creek State Park for personal fitness, preferring low‑key, solo activities over team sports.
  arts: Rodney Habib immerses himself in science‑fiction novels by authors like Philip K. Dick, streams electronic music from Daft Punk and Odesza while building PCs, attends occasional indie film screenings
    at the historic Orpheum Theatre, and appreciates the detailed craftsmanship of model train displays at the local county fair.
  travel: Rodney Habib plans budget‑friendly trips with a penchant for tech conferences in San Francisco, road‑trip adventures to the Badlands and Sioux Falls, and dreams of visiting Japan’s Akihabara district
    for its electronics culture, balancing his love for exploration with the financial limits of a student lifestyle.
  culinary: Rodney Habib favors hearty Midwestern dishes like bratwurst with sauerkraut and a side of corn on the cob, but also enjoys crafting spicy chicken ramen at home, experimenting with a sous‑vide
    set‑up controlled by an Arduino, and indulging in protein‑rich trail mix during hikes.
  core: Rodney Habib is a tech‑savvy, puzzle‑loving introvert who blends Midwestern pragmatism with a competitive drive, channeling solitary curiosity into building custom PCs, tackling coding contests,
    and exploring nature on bike trails.
background:
  cultural: Rodney grew up in Omaha, Nebraska, a Midwestern city where practicality and community are deeply valued. His family’s European ancestry (German and Irish roots) and the region’s agricultural
    heritage gave him a modest, self‑reliant outlook. He’s been shaped by local traditions such as high school football culture, county fairs, and a strong emphasis on education and hard work. While he
    identifies with the broader Midwestern American culture, his interests in technology and online communities reflect a modern, globally connected perspective.
