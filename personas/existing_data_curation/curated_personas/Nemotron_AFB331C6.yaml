  career_goals: Rodney aims to secure an entry‑level role as a software developer or systems analyst after completing a bachelor’s degree in Computer Science. He is driven to work on innovative tech projects
    that blend practicality with cutting‑edge ideas, and he hopes to eventually launch his own freelance consulting business focused on automation and custom hardware solutions. Competitive by nature, he
    also aspires to contribute to open‑source projects and win coding competitions, using those achievements as stepping stones toward leadership positions in a tech startup.
