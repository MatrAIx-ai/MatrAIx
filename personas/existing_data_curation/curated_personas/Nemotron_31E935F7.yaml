personas:
  professional: An aspiring concept artist, Robert Dinkins channels his love for sketching characters and landscapes into creating detailed storyboard panels for story-driven video games like Hollow Knight,
    leveraging his curiosity for new ideas while thriving in the solitude of his bedroom studio, though they tend toward disorganization that often leaves their art supplies scattered across the desk.
  sports: An occasional skater, Robert Dinkins spends weekends at the local skate park practicing tricks, follows the high school basketball team the Riverside Raptors, and is a devoted fan of the Seattle
    Sounders FC, preferring low‑key, solo jogs through city streets to capture sunset textures rather than organized team sports, yet they still enjoy the occasional pickup basketball game with a close
    friend.
  arts: A dedicated creative hobbyist, Robert Dinkins immerses themselves in indie folk music from Fleet Foxes, experimental electronica by Jon Hopkins, and practices guitar while sketching scenes inspired
    by graphic novels like Saga and the works of Studio Ghibli, frequently editing their photos of urban textures with Adobe Lightroom and experimenting with stop‑motion animation after watching online
    tutorials.
  travel: An imaginative teen explorer, Robert Dinkins favors spontaneous road trips to nearby state parks for sunrise photography, dreams of visiting the cherry‑blossom festivals in Kyoto and the volcanic
    landscapes of Iceland, but they usually plan their weekend outings piecemeal, letting their curiosity dictate the destination rather than a strict itinerary.
  culinary: A curious teenage foodie, Robert Dinkins enjoys whipping up quick ramen bowls with sliced soft‑boiled eggs, crafting avocado toast topped with radish sprouts, and experimenting with homemade
    pizza topped with pesto and smoked mozzarella, while they often end late‑night gaming sessions with a bag of salty chips and a cold soda.
  core: Robert Dinkins, a 14‑year‑old sketch‑loving introvert, blends solitary art creation with occasional impulsive gaming marathons, they often forget to keep their room tidy, and they balance a modest
    savings habit with a penchant for late‑night snacks and vivid imagination.
background:
  cultural: Robert grew up in a middle‑class family in Franklin, Tennessee, a historic suburb of Nashville. The community blends traditional Southern values—hospitality, close‑knit family ties, and occasional
    church attendance—with a growing exposure to contemporary arts and music from nearby Nashville's vibrant creative scene. He has attended local events like the Franklin Main Street Festival, visited
    the Franklin Theatre, and enjoys exploring the natural trails around the area. His family celebrates holidays with Southern culinary traditions such as barbecue and biscuits, and his upbringing reflects
    both the modest, community‑oriented lifestyle of the Tennessee countryside and the modern, eclectic influences that come from living near a major cultural hub.
