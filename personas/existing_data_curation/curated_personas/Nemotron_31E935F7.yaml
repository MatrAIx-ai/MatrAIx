  career_goals: Robert hopes to turn his passion for visual storytelling into a career. He aims to attend a specialized high school or college program in illustration or graphic design, eventually working
    as a concept artist or freelance illustrator for video games, comics, or animated films. Valuing flexibility and independent work, he also envisions creating his own graphic novels or illustrated stories
    and building a personal brand that merges his drawing, writing, and occasional programming skills.
