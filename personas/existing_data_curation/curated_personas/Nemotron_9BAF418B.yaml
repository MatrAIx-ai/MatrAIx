personas:
  professional: Antonio Perez, a disciplined painter and paperhanger in Brownsville, leverages meticulous surface preparation and precise material estimation while using their sociable nature to build strong
    client relationships and lead a coordinated crew.
  sports: Antonio Perez plays weekly pickup soccer with the Brownsville Strikers club, follows the Houston Astros and Dallas Mavericks religiously, and balances their fitness routine with early‑morning
    fishing trips that serve as active recovery.
  arts: Antonio Perez expresses their creativity through vibrant murals inspired by the bold colors of Los Ángeles Azules and the storytelling of Jorge Drexler, while regularly attending local art fairs
    where they admire works by regional muralist Carlos Ruiz.
  travel: Antonio Perez prefers spontaneous weekend road trips, having already explored the Gulf Coast beaches of South Padre Island and the historic streets of San Antonio, and they dream of a summer road‑trip
    along Route 66 ending in the national parks of Utah and Arizona.
  culinary: Antonio Perez enjoys cooking grilled fish tacos with fresh lime, cilantro, and jalapeño, perfecting homemade salsa roja, while also indulging in the occasional plate of carne asada nachos at
    local taquerías, though they admit to over‑seasoning their dishes with extra chili powder.
  core: Antonio Perez is a sociable, structured DIY‑enthusiast who balances meticulous work as a painter with lively community gatherings, an occasional over‑reliance on caffeine, and a habit of humming
    cumbia while they measure walls.
background:
  cultural: Antonio was born and raised in Brownsville, Texas, a city where Mexican culture is woven into everyday life. He grew up speaking Spanish at home and English at school, celebrating holidays such
    as Día de los Muertos, Cinco de Mayo, and the local Charro Days festivities. Family gatherings feature traditional foods like tamales and menudo, and the sounds of mariachi and norteña music fill his
    childhood. The close‑knit neighborhood, barbershops, churches, and community centers provide a strong sense of belonging, reinforcing values of hard work, hospitality, and pride in his Mexican heritage
    while also embracing the Texan spirit.
