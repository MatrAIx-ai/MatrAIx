  hobbies: '[''Soccer'', ''Community festivals'', ''Listening to regional Mexican music'', ''Cumbia dancing'', ''Mural painting'', ''Volunteer home‑repair workshops'', ''Fishing'', ''Beach outings'', ''Classic
    car shows'']'
  career_goals: Antonio aims to become a licensed general contractor within the next five years and to expand his own painting and paper‑hanging business in Brownsville. He plans to earn certifications
    in OSHA safety and lead‑safe handling, and to complete an associate degree in construction management. By building a reputation for reliable, high‑quality finishes, he hopes to attract both residential
    and small commercial clients, eventually hiring a dedicated crew and mentoring other young workers from his community. Long‑term, he envisions offering specialty finishes such as decorative plasterwork
    and becoming a trusted contractor for local home‑renovation projects.
