  career_goals: He aims to transform his artistic curiosity into a professional career as a multidisciplinary creative, targeting a role in digital media or user experience design. Over the next few years,
    he plans to enroll in a community college program in graphic design while building a freelance portfolio that showcases culturally infused visual work. His long-term ambition is to secure a full-time
    position at a marketing agency or tech company where he can lead campaigns that merge art and technology, eventually launching his own boutique studio that promotes Latin American visual narratives.
    He also hopes to travel to Peru to deepen his cultural ties and integrate authentic Peruvian motifs into his design practice.
