personas:
  professional: Carmen Perez is a budding LEGO architect who dreams of designing safe playgrounds for her neighborhood, merging their meticulous step‑by‑step building style with a practical love of routine
    and an assertive knack for organizing play spaces.
  sports: Carmen Perez spends Saturday mornings playing soccer with the Little Strikers club in the local park, cheering for the Los Angeles Galaxy youth team while idolizing the Los Angeles Dodgers on
    TV, balancing an organized practice schedule with the flexibility to join spontaneous backyard games.
  arts: Carmen Perez fills sketchbooks with colorful drawings of family and animals, delights in coloring within lines, and sings along to the 'Coco' soundtrack and classic lullabies taught by their abuela,
    while admiring the illustrations of Dr. Seuss and Mo Willems and humming the tunes of children's singer Raffi, weaving their love of tradition and structure into vibrant creative expression.
  travel: Carmen Perez enjoys weekend family outings to Griffith Park’s Observatory and the Pacific Ocean’s Santa Monica Pier, and dreams of visiting Mexico City’s historic Plaza de la Constitución, preferring
    planned trips with familiar routes but occasionally yearning for spontaneous beach sandcastle adventures.
  culinary: Carmen Perez assists their mother in kneading masa for tacos al pastor, carefully arranging cilantro, onions, and salsa roja on corn tortillas, and eagerly nibbles mango slices, showing a budding
    cooking skill that combines methodical following of recipes with a playful sprinkle of extra cheese.
  core: Carmen Perez is a routine‑loving, detail‑oriented six‑year‑old who blends building, drawing, and community traditions into a stable, cooperative personality, though they sometimes get stuck perfecting
    a single Lego piece before moving on.
background:
  cultural: Carmen grows up in a Mexican‑American household in Los Angeles, where both English and Spanish are spoken daily. Family gatherings revolve around shared meals like tacos and tamales, and cultural
    celebrations such as Día de los Muertos and Cinco de Mayo are marked with music, traditional dresses, and homemade decorations. Her parents emphasize respect for elders, the importance of community,
    and the value of hard work, which she sees reflected in her school environment. The vibrant local Mexican community provides opportunities for cultural workshops, dance classes, and festivals that reinforce
    her connection to her heritage while she also participates in the broader, multicultural landscape of Los Angeles.
