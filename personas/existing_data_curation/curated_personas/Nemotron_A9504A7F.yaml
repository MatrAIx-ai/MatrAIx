  hobbies: '[''drawing and coloring'', ''building with Lego sets'', ''reading bilingual picture books'', ''singing Mexican lullabies'', ''learning folkloric dance steps'', ''helping with simple cooking'',
    ''nature walks and leaf collecting'']'
  career_goals: Carmen often talks about growing up to be a teacher because she enjoys the structure of a classroom and likes helping other children learn in a clear, organized way. She also loves animals
    and imagines becoming a veterinarian, caring for pets and wildlife with the same reliability she shows at home. Occasionally, she dreams of cooking delicious meals for her family as a chef, combining
    her practical skills with a love of family traditions.
