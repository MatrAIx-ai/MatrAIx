personas:
  professional: Sandrine Denny, a veteran elementary and middle school teacher with over 20 years of experience, designs structured, standards‑aligned lesson plans that seamlessly blend technology and differentiated
    instruction while leveraging their conflict‑mediation skills and community outreach to champion inclusive STEM and arts programs as they pursue instructional leadership.
  sports: Sandrine Denny, an enthusiastic supporter of the Clemson Tigers football team and the Charleston RiverDogs minor‑league baseball club, maintains a gentle fitness routine by walking the Pee Dee
    River trails five times a week, participates in a community yoga class, and joins a local recreational tennis league at the city recreation center.
  arts: Sandrine Denny, a dedicated member of her church choir and an avid volunteer in community theater productions, finds inspiration in the storytelling of Maya Angelou, the soulful voice of Aretha
    Franklin, and the lyrical country charm of Dolly Parton, often incorporating these influences into classroom art projects and potluck playlists.
  travel: Sandrine Denny, a lover of road‑trip nostalgia, has explored historic Charleston, the Blue Ridge Parkway in Asheville, and the jazz‑filled streets of New Orleans, and dreams of a future pilgrimage
    to the coastal town of Dubrovnik to combine cultural immersion with scenic walking tours.
  culinary: Sandrine Denny, an intermediate Southern‑cuisine cook, delights in crafting shrimp and grits, fried chicken with a buttery buttermilk brine, fresh garden tomatoes for homemade sauce, and a fragrant
    pecan pie spiced with cinnamon and nutmeg, often sharing these dishes at community potlucks where they also showcase their skillful knitting of embroidered napkins.
  core: Sandrine Denny, a structured yet sociable 49‑year‑old educator, blends meticulous planning with a love for community gatherings, mindfulness practices, and Southern comfort food, while occasionally
    battling worry‑induced overthinking.
background:
  cultural: Sandrine was raised in the Lowcountry of South Carolina, steeped in Southern hospitality, church‑centered community life, and a strong sense of local tradition. Her family has lived in Georgetown
    County for several generations, with roots in small‑scale farming and family‑owned businesses. She grew up hearing stories of the region’s history and Gullah culture, which she respects, while identifying
    with the broader Anglo‑American Southern heritage. This background influences her love of communal meals, emphasis on courtesy, participation in church activities, and appreciation for the natural landscape
    of the Pee Dee region.
