  career_goals: Sandrine aims to move into instructional leadership within the next five years, seeking a role such as department chair or curriculum specialist. She plans to complete her bachelor’s degree
    and pursue a master’s in Educational Administration, positioning herself for an assistant principal position. Her ambitions include expanding the school’s STEM and arts after‑school offerings, mentoring
    new teachers, and integrating mindfulness and social‑emotional learning into the daily schedule. She also hopes to champion inclusive practices that reduce stress for both students and staff, and to
    strengthen community partnerships with local churches and businesses.
