persona_description: A nuclear plant operator who is looking for reliable and efficient methods to monitor and detect corrosion within storage tanks, particularly in the challenging environment of a nuclear
  power plant. This person is interested in finding a solution that can effectively address the constraints and limitations of traditional NDT inspection methods, such as extended downtime, inaccurate data,
  complicated operator use, and varying data. This person is seeking a solution that offers an alternative method that provides an inspection method with many advantages, such as increased efficiency, reduced
  downtime, more accurate maintenance planning, a lowered risk of emergency repairs, and ease of operation.
