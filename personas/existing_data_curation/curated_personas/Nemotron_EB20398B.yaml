personas:
  professional: Willie Rice, a meticulous and curious handyman‑in‑training, plans to earn a GED and state certification within the year while launching a low‑cost home‑repair service for seniors and low‑income
    households, and also volunteers as a docent at the local arts center where they curate modest exhibitions that spotlight regional artists.
  sports: Willie Rice, a pragmatic fitness enthusiast, walks the river trail each morning with members of the Little Rock Pickleball Club, follows the Arkansas Razorbacks football season religiously, and
    occasionally joins a local senior softball league, preferring low‑impact activities that complement their hands‑on work style, a routine they maintain to balance physical stamina with their demanding
    repair jobs.
  arts: Willie Rice, an avid gallery‑goer, collects reproductions of Georgia O'Keeffe and Ansel Adams, studies art theory texts by Arthur Danto while listening to Miles Davis and B.B. King, and documents
    each exhibition with meticulous notes and photographs, a practice they consider both creative expression and scholarly research.
  travel: Willie Rice, a methodical planner, enjoys road trips to historic Southern towns such as Savannah, Charleston, and Natchez, often staying at modest B&Bs while sketching architectural details, and
    dreams of a future pilgrimage to the art museums of Barcelona and the jazz districts of New Orleans, itineraries they map out with spreadsheets and a well‑worn travel journal.
  culinary: Willie Rice, a home‑cooking enthusiast, frequently prepares shrimp and grits, collard greens seasoned with smoked paprika and fresh thyme, and sweet‑potato casserole topped with pecan crumble,
    while experimenting with sous‑vide techniques for occasional weekend feasts, a kitchen routine they relish alongside a constant jazz soundtrack.
  core: Willie Rice, a 56‑year‑old organized tinkerer with a photographer’s eye and a competitive curiosity, juggles a budding handyman business, community art curation, and a stubborn vegetable garden,
    all while never missing a chance to debate the perfect lighting for a sunrise scene, a habit they pursue with meticulous enthusiasm.
background:
  cultural: Willie grew up in North Little Rock's historically Black neighborhoods during the late-1960s and 1970s, a period marked by the lingering effects of school integration and the civil-rights movement.
    His family emphasized church attendance, gospel music, and communal gatherings at local barbershops, fostering a strong sense of solidarity and cultural pride. He internalized the storytelling tradition
    of his grandparents, who often recounted the struggles and achievements of the local Black community. This background informs his appreciation for African-American art, his commitment to preserving
    local heritage, and his desire to give back through mentorship and community service. While he navigated economic challenges typical for many Black families in the region, he drew resilience from the
    cultural resilience and creativity exhibited in neighborhoods, church choirs, and neighborhood festivals.
attributes:
  skills: '[''auto repair'', ''small-engine maintenance'', ''basic plumbing'', ''basic electrical work'', ''home-maintenance'', ''budgeting and financial planning'', ''event planning and coordination'',
    ''African-American art history research'', ''digital photography'', ''computer literacy'']'
  hobbies: '[''visiting galleries and museums'', ''photography'', ''reading African-American history'', ''reading contemporary art theory'', ''reading science magazines'', ''gardening'', ''woodworking'',
    ''playing chess'', ''listening to jazz and blues'', ''cooking Southern cuisine'']'
  career_goals: Willie aims to formalize his practical abilities by earning a GED and obtaining a state-issued handyman certification within the next year. He plans to launch a modest, community-focused
    home-repair service that offers reduced rates for seniors and low-income households, positioning himself as a reliable, organized contractor. Simultaneously, he hopes to become a volunteer docent at
    the Arkansas Arts Center, curating occasional mini-exhibitions that highlight Black artists from the region. Over the longer term, he aspires to document and publish a photographic and written chronicle
    of North Little Rock's African-American cultural landmarks, establishing himself as a trusted local historian.
