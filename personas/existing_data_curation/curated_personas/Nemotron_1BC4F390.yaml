  career_goals: Although retired, Jhon aims to compile a memoir of Isabela's oral histories and family genealogy, ensuring that younger generations have access to their cultural roots. He wishes to mentor
    his grandchildren and local youth in artistic techniques and traditional cooking, while organizing an annual community art fair that showcases local talent. He also aspires to maintain his health through
    regular gardening and learning about astronomy, and to become a trusted cultural resource for his town's historical society.
