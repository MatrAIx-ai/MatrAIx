personas:
  professional: Jhon Rodriguez, a 73‑year‑old retired visual artist and community storyteller, blends masterful oil and watercolor techniques with meticulous event planning to preserve local folklore and
    mentor youth, channeling his imaginative curiosity and methodical nature into every project.
  sports: Jhon Rodriguez enjoys low‑impact fitness through daily shoreline walks, follows the local baseball team the Seaside Mariners, participates in the senior walking club “Coastal Steps,” and keeps
    agile by tending their garden and occasional bird‑watching hikes in the wetlands.
  arts: Jhon Rodriguez draws artistic inspiration from the impressionist canvases of Claude Monet, the lyrical verses of José Martí, the vibrant rhythms of plena performed by Los Soneros del Faro, and the
    soulful cuatro melodies of regional folk groups, weaving these influences into their own oil paintings of rugged coastlines and short stories of local legends.
  travel: Jhon Rodriguez has explored the historic cobblestone streets of Cartagena, savored the sunrise over the Azores, and dreams of one day witnessing the aurora borealis in Iceland, preferring modest,
    well‑planned journeys that balance cultural immersion with comfortable accommodations.
  culinary: Jhon Rodriguez delights in reimagining traditional island fare such as coconut‑infused rice, slow‑cooked pork with adobo spices, and sweet plantain mofongo, skillfully blending local ingredients
    like guava, yucca, and fresh snapper into creative twists that they share at neighborhood potlucks.
  core: Jhon Rodriguez, a disciplined yet whimsical elder, channels their boundless imagination into art, storytelling, and community stewardship while navigating the gentle challenges of aging with humor
    and a love for routine.
background:
  cultural: Jhon’s life is deeply rooted in Puerto Rican culture, shaped by a Catholic upbringing, strong family bonds, and the vibrant traditions of Isabela’s agricultural community. He grew up listening
    to parrandas and learning the rhythms of bomba and plena, which continue to influence his artistic expression. Fluent in Spanish with a functional grasp of English, he values communal solidarity, respect
    for elders, and the preservation of local folklore and culinary heritage. His connection to the island’s natural environment—its beaches, wetlands, and tropical flora—feeds both his gardening passion
    and his artistic inspiration.
