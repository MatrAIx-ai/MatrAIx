personas:
  professional: Jason Royer is a budding LEGO architect who meticulously follows instruction manuals, transforms each build into a mini‑project with timelines, and proudly showcases the finished sets to
    friends, channeling their disciplined and achievement‑driven nature into early engineering play.
  sports: Jason Royer plays forward on the local River Ridge Rovers U‑8 soccer team, follows a structured practice schedule set by the coach, idolizes Lionel Messi’s dribbling, and balances competitive
    drive with occasional anxiety that makes them replay the game in their head after each match.
  arts: 'Jason Royer devotes afternoons to sketching comic strips in a spiral‑bound notebook inspired by Adventure Time and Spider‑Man: Into the Spider‑Verse, reads the Magic Tree House adventure series
    before bedtime, collects rocks to create miniature geological displays, and they often arrange the stones by color and size, reflecting a blend of creativity and a love for organized collections.'
  travel: Jason Royer enjoys family road trips that follow a printed itinerary, has explored the Grand Canyon’s rim, visited the interactive science museum in Chicago, and they dream of camping near the
    Rocky Mountains to collect more unique rocks and photograph sunrise vistas.
  culinary: Jason Royer prefers classic kid‑friendly dishes like cheese pizza, macaroni and cheese, and apple slices with peanut butter, proudly assembles a LEGO‑shaped sandwich for lunch, and they enjoy
    helping their parents stir pancake batter while carefully arranging the toppings in symmetrical patterns.
  core: Jason Royer is an organized, achievement‑focused 7‑year‑old whose love for structured play coexists with intense anxiety, leading them to meticulously arrange toys, routines, and projects while
    constantly seeking reassurance.
background:
  cultural: Jason grows up in Renfrew, a close‑knit community in Butler County, Pennsylvania. His family’s heritage includes German and Irish roots, and they attend a local Protestant church where community
    events like the county fair and school volunteer days are celebrated. The small‑town atmosphere emphasizes reliability, hard work, and mutual support, shaping Jason’s preference for predictable routines
    and his desire to contribute in organized ways. These cultural values reinforce his disciplined nature while also providing a supportive environment for his emotional sensitivities.
attributes:
  skills: '[''Excellent at following daily schedules'', ''Highly organized school backpack and workspace'', ''Strong memory for routines and checklists'', ''Proficient at building LEGO models'', ''Above‑grade‑level
    reading comprehension'', ''Skilled at solving jigsaw and logic puzzles'', ''Responsible care of a family pet'', ''Basic arithmetic (addition and subtraction)'']'
  hobbies: '[''Building LEGO sets'', ''Reading adventure books'', ''Playing soccer'', ''Drawing and sketching cartoons'', ''Collecting rocks and minerals'', ''Solving jigsaw and logic puzzles'', ''Playing
    board games like Chess'', ''Helping with household chores'']'
  career_goals: Even at seven, Jason dreams of a future where his day is predictable and his contributions are clear. He is fascinated by firefighters because the job has set procedures, teamwork, and a
    strong sense of community service, and he wants to help keep people safe. He is also intrigued by engineers and builders, imagining himself designing the structures he loves to construct with LEGO.
    His short‑term ambition is to master reading and math so he can earn the "most improved" award at school and keep his personal checklists perfect, laying a foundation for a disciplined, reliable career
    later on.
