persona_description: A university administrator responsible for overseeing water conservation efforts at the University of Texas at Austin, specifically targeting dorm residents. Markus Hogue is a water
  conservation coordinator at UT, and the University has already implemented several water-saving technologies, including an irrigation system that reduced water usage by 66 percent in 2013. Hogue is working
  on a project that will have real-time data of the water usage of every building and area on campus, and he is working with other universities and associations who are interested in making similar changes.
  The University has installed retrofits in dormitories with the hope of using less water, and Hogue is working on a project that will have real-time data of the water usage of every building and area on
  campus.
