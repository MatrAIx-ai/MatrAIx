  hobbies: '[''drawing comics'', ''LEGO building'', ''Scratch programming'', ''reading adventure & sci-fi books'', ''hiking and nature observation'', ''soccer'', ''music listening'']'
  career_goals: Lawrence dreams of becoming a creator‑inventor, combining his love for art and technology. He aspires to be a video-game designer or a young engineer who builds innovative gadgets, and he
    hopes to attend a STEM‑focused high school where he can further develop his coding and design skills. In the longer term, he imagines working on projects that blend storytelling, visual art, and interactive
    technology, such as creating educational games that inspire other curious kids.
