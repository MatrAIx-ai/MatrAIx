persona_description: A scientist who is interested in the development of monoclonal antibodies (mAbs) as a potential treatment for prion diseases such as CJD and vCJD. The scientist is excited about the
  potential of mAbs to prevent the development of prion disease and is eager to explore the possibility of using mAbs to treat specific prion diseases in mice. The scientist is also interested in the potential
  of mAbs to be used in the clinic and is looking for ways to achieve higher mAb concentrations in the brain when neurological symptoms and signs develop.
