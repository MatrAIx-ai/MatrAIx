personas:
  professional: Aileen Iglesias, a curious three‑year‑old, already runs a miniature classroom at home where they arrange crayons, blocks, and picture books with the precision of a future early‑childhood
    educator while weaving spontaneous stories that reflect a delightful balance of organization and creative freedom.
  sports: Aileen Iglesias, a three‑year‑old who prefers small‑group play, shines on the tiny soccer field as a member of the Miami Juniors Football Club, cheers for the Miami Heat during family basketball
    night, practices simple yoga poses from a kids’ video, and enjoys the rhythm of a backyard tag game, all while staying away from noisy crowds.
  arts: Aileen Iglesias, a three‑year‑old who delights in drawing bright mariposas during quiet moments, sways to the lively beats of salsa, merengue, and reggaetón songs by artists such as Shakira, Bad Bunny,
    and Marc Anthony at neighborhood festivals, and spends Saturday mornings flipping through picture books featuring the colorful works of Frida Kahlo and Diego Rivera, melding visual art with music in
    their imaginative play.
  travel: Aileen Iglesias, a three‑year‑old who loves short family excursions, enjoys sunny days at South Beach, has marveled at the colorful altars of a Día de los Muertos celebration in a nearby park,
    and dreams of exploring the bustling markets of Mexico City with her parents, favoring carefully planned day trips that blend familiar routines with new sights.
  culinary: Aileen Iglesias, a three‑year‑old with a growing appetite for flavors, eagerly reaches for bite‑size empanadas filled with seasoned chicken, savors fragrant arroz con gandules spiced with sofrito,
    proudly helps her mother mash ripe mango for smoothies, and insists on a pinch of cumin on her snack, showcasing a budding palate that celebrates both sweet and savory traditions.
  core: Aileen Iglesias, a curious three‑year‑old who blends quiet contemplation with vivid imagination, balances orderly play with spontaneous creativity, and finds harmony in the colors, rhythms, and
    flavors of family traditions.
background:
  cultural: Aileen is raised in a bilingual Hispanic household in Miami, where Spanish is spoken alongside English. She participates in family traditions such as celebrating Día de los Muertos, enjoys Cuban
    and Puerto Rican foods like empanadas and arroz con gandules, and is exposed to salsa, merengue, and reggaetón at community festivals that highlight Latin art and music.
