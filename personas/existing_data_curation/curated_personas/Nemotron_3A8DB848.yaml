  career_goals: Flo aims to pursue a career that blends her love of animals with her methodical nature; she aspires to become a veterinarian, planning to excel in science courses and earn a scholarship
    to a university with a strong pre‑veterinary program. She also envisions herself contributing to wildlife conservation research, where her attention to detail and organized approach can support data
    collection and analysis. Her competitive drive motivates her to seek academic awards and leadership roles in science clubs, viewing these achievements as stepping stones toward a stable, respected profession.
