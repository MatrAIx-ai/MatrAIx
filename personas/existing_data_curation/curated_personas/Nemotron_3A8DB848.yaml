personas:
  professional: Flo James, an aspiring junior game developer, blends strategic thinking from chess with the narrative depth of fantasy novels to create Scratch projects that showcase meticulous coding,
    organized workflows, and a competitive drive to outshine peers.
  sports: Flo James, a member of the Oak Vale Youth Soccer Club, channels her competitive spirit into Saturday morning drills while cheering on the Kansas City Chiefs and the St. Louis Cardinals, and spends
    free time hiking local trails to observe wildlife.
  arts: Flo James, a devoted listener of Dolly Parton, Bill Monroe, and the folk‑rock duo The Avett Brothers, weaves the storytelling of J.K. Rowling into her own miniature wooden bird models, finding inspiration
    in lyrical narratives and carrying a small notebook for song lyrics and book quotes.
  travel: Flo James, who has explored the red rocks of Sedona and the towering sequoias of Yosemite, dreams of a guided wildlife trek to the Galápagos Islands and a family vacation to the historic castles
    of Scotland, preferring meticulously planned itineraries over spontaneous trips.
  culinary: Flo James, an eager home‑chef, loves whipping up carrot‑and‑goat‑cheese salad with fresh kale from her garden, experimenting with a simple rabbit stew seasoned with rosemary, and baking perfect
    chocolate chip cookies whenever she needs a comforting snack after a long chess match.
  core: Flo James is a meticulous, quietly competitive twelve‑year‑old who balances a love for strategic games, hands‑on crafting, and wildlife lore with a tendency toward worry and a modest obsession with
    perfecting every detail.
background:
  cultural: Flo grew up in Ferrum, a close‑knit Appalachian community in western Virginia. Her family has deep roots in the area, with generations of farming, church involvement, and participation in county
    fairs and local homestead traditions. The community values self‑reliance, modesty, and strong family ties, and it celebrates outdoor activities like hiking, hunting, and bluegrass music. While identifying
    as white, Flo’s upbringing reflects a blend of rural Appalachian customs, conservative family values, and a reverence for practical, hands‑on skills passed down through generations.
