  career_goals: Although retired, Monique aims to stay mentally and physically active while leaving a lasting legacy for her family and community. She hopes to compile her family’s recipes and genealogical
    findings into a small handbook for future generations, mentor younger women in budgeting and cooking, and continue supporting the church’s fellowship and the senior center. Maintaining her health, learning
    one new skill each year, and fostering intergenerational connections are central to her personal ambitions.
