personas:
  professional: Monique Johnson, a retired community organizer, blends their practical budgeting skills, seasoned vegetable gardening, and intricate quilting talent to mentor younger women and quietly coordinate
    church fellowship events with steady, organized flexibility.
  sports: Monique Johnson, an avid birdwatcher with a gentle morning walking routine along local trails, supports the Mississippi State Bulldogs basketball team and the New Orleans Saints, and participates
    in a low‑impact senior fitness class at the community center while occasionally playing shuffleboard with fellow church members.
  arts: Monique Johnson, a devoted quilter, spends afternoons stitching intricate patchwork inspired by gospel hymns from Mahalia Jackson and classic jazz melodies of Louis Armstrong, enjoys attending the
    regional theater’s production of To Kill a Mockingbird, and reads historical fiction by Philippa Gregory.
  travel: Monique Johnson, who favors small‑group road trips, has visited the historic streets of Savannah and the riverfront of New Orleans, dreams of exploring the Civil War battlefields at Gettysburg,
    and plans a relaxing stay at a coastal cottage in the Gulf Islands next summer, always traveling with a well‑packed garden‑to‑table cookbook.
  culinary: Monique Johnson, a seasoned Southern cook, delights in preparing fried catfish with a hint of lemon pepper, slow‑cooked collard greens seasoned with smoked turkey, and sweet potato pie topped
    with crushed pecans, all enhanced by fresh herbs from their garden and occasional experiments like quinoa‑infused cornbread.
  core: Monique Johnson, a quietly curious 77‑year‑old, balances deep community roots with a modern thirst for learning, nurturing garden beds, quilts, genealogy, and intergenerational mentorship while
    maintaining gentle steadiness and occasional forgetfulness about daily chores.
background:
  cultural: Monique’s cultural background is rooted in rural Mississippi’s Deep South tradition. Raised in a white, Baptist family in Columbia, she grew up amid seasonal agriculture, Southern hospitality,
    and close‑knit church life. These influences fostered a respect for community, family storytelling, and the rhythms of planting and harvest. While she values these traditions, her innate curiosity has
    led her to embrace modern tools such as online genealogical databases and digital communication, blending heritage with contemporary learning.
