  hobbies: '[''Gardening'', ''Cooking'', ''Visiting farmers\'' markets and community fairs'', ''Reading historical fiction'', ''Home improvement projects'', ''Quilting circle'']'
  career_goals: Carin aims to advance into a supervisory or lead inspector role where she can mentor junior staff and shape quality assurance processes. She plans to obtain ASQ Certified Quality Inspector
    credentials and complete a Lean Six Sigma Yellow Belt course to broaden her operational improvement toolkit. Over the next five years, she hopes to transition into a quality audit position that offers
    more strategic influence while allowing her to maintain a balanced work schedule that respects her need for flexibility and personal time.
