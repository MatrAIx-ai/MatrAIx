personas:
  professional: Nicholas Herndon is a seasoned telecommunications field technician turned mentor, mastering RF antenna installation, fiber-optic splicing, and satellite alignment, and they channel a blend
    of practical curiosity and relaxed improvisation into reliable, safety-first solutions across Wyoming's rugged terrain.
  sports: Nicholas Herndon spends weekends hiking the Bighorn Mountains and fly-fishing the Shoshone River, follows the Denver Broncos and Colorado Rockies passionately, and belongs to the Cody Outdoor
    Club and the Wyoming Alpine Club, treating fitness as a natural extension of his love for the backcountry rather than a structured gym regimen.
  arts: Nicholas Herndon captures the shifting light of the high plains with a Nikon D850, admires Ansel Adams' iconic landscapes, listens to Woody Guthrie's folk narratives while restoring vintage radios,
    and enjoys board-game evenings featuring Stonemaier Games' Terraforming Mars, weaving visual, auditory, and playful arts into his solitary downtime.
  travel: Nicholas Herndon favors spontaneous road trips that pair rugged hikes in Yellowstone and Banff with leisurely stops at local hot springs, dreams of a summer expedition to Iceland's volcanic coast
    to test antenna setups, and balances his modest budget by camping in state parks rather than staying in hotels.
  culinary: Nicholas Herndon favors hearty ranch fare, regularly grilling fresh Shoshone River trout with lemon and dill, simmering a signature bison chili seasoned with smoked paprika and beans, and boasts
    a respectable wood-fire cooking skill that shines at community potlucks where they swap recipes for huckleberry jam and smoked pork ribs.
  core: Nicholas Herndon blends rugged telecom expertise with a quiet love for wilderness, solving technical puzzles amid mountain trails while juggling a relaxed, sometimes scatter-brained, but fundamentally
    pragmatic approach to life.
background:
  cultural: Nicholas grew up in a small, tight‑knit community on the edge of the Wind River Range, where the frontier spirit of self‑reliance and respect for the land is woven into daily life. His family’s
    roots trace back to early 20th‑century homesteaders of European descent who blended farming and ranching with a love of practical trades. The rural western Wyoming culture—marked by a strong work ethic,
    modesty, and a close connection to outdoor recreation—shapes his values and worldview. While he identifies with the broader American middle‑class narrative, he also holds a deep appreciation for the
    region’s Native American heritage, often learning from local Crow and Shoshone communities about land stewardship. This blend of frontier independence and community responsibility informs his pragmatic
    yet curious approach to both his career and personal life.
