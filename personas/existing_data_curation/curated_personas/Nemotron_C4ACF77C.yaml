  hobbies: '[''Amateur (ham) radio operation and antenna experimentation'',''Hiking and backcountry camping in the Bighorn Mountains'',''Fly fishing on the Shoshone River'',''Landscape photography'',''Woodworking
    and furniture building'',''Restoring vintage radios and electronics'',''DIY IoT projects with Raspberry Pi and Arduino'',''Reading technical non-fiction and telecommunications history'',''Small‑group
    board game evenings'',''Community potluck participation'']'
  career_goals: Nicholas aims to move from a field technician role into a senior field‑service supervisor position within the next five years, overseeing multi‑team projects that bring broadband to remote
    ranches and small towns. He plans to earn BICSI Installer 2 and FCC General Radiotelephone Operator certifications, and to develop a niche expertise in 5G small‑cell deployments for rural areas. Long‑term,
    he hopes to launch his own boutique contracting firm that offers turnkey telecom solutions, renewable‑energy‑powered tower installations, and training workshops for local apprentices. His ambition balances
    his curiosity for emerging tech with his desire for a flexible schedule that lets him continue exploring Wyoming’s backcountry.
