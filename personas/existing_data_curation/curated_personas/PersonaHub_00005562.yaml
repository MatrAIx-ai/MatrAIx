persona_description: A genetic counselor at the Center for Prenatal Pediatrics, who is available to discuss the potential implications of abnormal ultrasound or screening results for an unborn baby and
  its pregnancy. The genetic counselor provides information and support to individuals who are at risk for genetic disorders, have had miscarriages, have had children with genetic disorders, or are pregnant
  after age 35. They combine their knowledge of basic science, medical genetics, and counseling theory with their skills in genetic risk assessment, education, and interpersonal communication to help patients
  understand the implications of genetic disease.
