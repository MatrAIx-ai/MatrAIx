personas:
  professional: Luis Larraga, a seasoned graphic designer with four decades mastering Adobe Creative Suite, typography, and brand storytelling, channels his meticulous, skeptical mindset into delivering
    flawless print and UI/UX work while mentoring junior designers and bridging cultural nuances between Spanish and English markets.
  sports: Luis Larraga keeps fit by walking the trails of Reston’s Lake Fairfax Park and joining the Reston Hiking Club for weekend hikes, follows the Washington Capitals for hockey and the Washington Wizards
    for basketball, and satisfies his competitive spirit through regular participation in a local chess club.
  arts: Luis Larraga immerses himself in the legacy of muralists like Diego Rivera, Jose Clemente Orozco, and David Alfaro Siqueiros, frequently visits exhibitions at the National Gallery of Art, collects
    prints by contemporary graphic artists such as Shepard Fairey, and enjoys live performances by pianist Lang Lang and the Martha Graham modern dance troupe.
  travel: Luis Larraga prefers curated cultural journeys, having explored the historic neighborhoods of Guanajuato, the vibrant street art alleys of Valparaíso, and the Renaissance museums of Florence,
    while planning a future solo trip to Kyoto’s traditional tea houses and a family road‑trip through the Blue Ridge Mountains, balancing budget‑conscious planning with occasional splurges on boutique
    hotels.
  culinary: Luis Larraga, a confident home chef, masterfully prepares mole poblano with dried chilies and chocolate, hand‑rolled tamales filled with seasoned pork and masa, and fresh salsa cruda using tomatillos,
    jalapeños, and cilantro, while experimenting with oregano and cumin to fuse traditional flavors with modern plating.
  core: Luis Larraga blends disciplined design expertise with a love for heritage cuisine, a competitive chess mind, and a penchant for meticulous spreadsheets, all while juggling a critical eye, occasional
    over‑indulgence in art‑history books, and a habit of hoarding design journals.
background:
  cultural: Born to Mexican parents, Luis grew up immersed in the rich traditions of Día de los Muertos, familial storytelling, and a deep appreciation for Mexican visual arts. After relocating to the United
    States, he adapted to the multicultural environment of Fairfax County while maintaining fluency in Spanish and English. His design philosophy reflects a synthesis of Mexican muralist boldness and American
    pragmatic minimalism, and he remains actively involved in local Mexican community events, bridging his dual heritage in both his professional and personal life.
attributes:
  skills: '[''Adobe Photoshop'', ''Adobe Illustrator'', ''Adobe InDesign'', ''Typography'', ''Brand Identity Development'', ''Print Production'', ''UI/UX Design'', ''HTML/CSS'', ''Color Theory'', ''Project
    Management'', ''Bilingual Communication (Spanish/English)'']'
  hobbies: '[''Reading Art‑History (Mexican Muralists)'', ''Sketching and Personal Illustration'', ''Chess (Club Member)'', ''Cooking Traditional Mexican Cuisine'', ''Walking/Hiking in Local Parks'', ''Attending
    Cultural Festivals'', ''Salsa Dancing'']'
  career_goals: Looking ahead, Luis aims to transition from hands‑on design work to a mentorship and consultancy role, establishing a boutique studio that focuses on culturally resonant branding for Latinx
    businesses. He aspires to curate a digital archive of Mexican graphic art that can serve as a resource for designers worldwide, and he hopes to lead workshops that blend traditional Mexican aesthetics
    with contemporary design practices. While planning for a comfortable retirement, he also seeks to secure a legacy by publishing a series of design essays that merge his scholarly interests in art history
    with practical design insights.
