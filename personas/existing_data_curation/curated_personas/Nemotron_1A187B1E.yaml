  career_goals: Rhae aims to transition from independent contracting to owning a fully licensed painting and paper‑hanging business in the Atlanta‑Dacula region within the next three years. She plans to
    obtain a contractor’s license and pursue a bachelor’s degree in construction management to broaden her expertise. Her ambitions include hiring and mentoring two apprentices, expanding services to include
    eco‑friendly and low‑VOC finishes, and establishing a reputation for reliability and high‑quality workmanship on local home‑owner and commercial projects. Long‑term, she hopes to achieve a stable income
    that supports a healthier work‑life balance and reduces stress, while becoming a recognized member of the local trade community and a trusted advisor for home‑improvement clients.
