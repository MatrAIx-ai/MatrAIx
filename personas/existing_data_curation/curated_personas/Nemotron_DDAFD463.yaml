    and supply management'', ''Problem solving under pressure'']'
  hobbies: '[''Cooking traditional Salvadoran dishes'', ''Gardening'', ''Knitting'', ''Attending weekly church services'', ''Volunteering at the Salvadoran community center'', ''Reading historical biographies'',
    ''Walking in local parks'', ''Listening to Cumbia and folk music'', ''Participating in cultural festivals'', ''Genealogy research'']'
  career_goals: Although approaching retirement, Cheryl’s ambition remains focused on leaving a lasting impact on the mining operation and her community. She aims to champion enhanced safety standards,
    particularly those that protect older workers, and to codify her troubleshooting techniques into training manuals. Cheryl hopes to transition into a part‑time safety advisory role where she can mentor
    younger operators and serve as a liaison between the union and management. Simultaneously, she plans to secure a stable financial foundation for her family and allocate more time to community service
    at the local Salvadoran cultural center.
