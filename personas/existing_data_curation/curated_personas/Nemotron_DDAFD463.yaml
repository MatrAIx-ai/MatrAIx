personas:
  professional: Cheryl Diaz, a veteran underground mining machine operator, leverages decades of hands‑on equipment expertise, meticulous record‑keeping, and a disciplined safety mindset to mentor new crews,
    and they quietly champion proven methods over untested tech.
  sports: Cheryl Diaz, an avid fan of the Colorado Rockies and the New York Yankees, joins the Saturday senior walking club at the local park, enjoys gentle garden‑based yoga, and they keep a modest step‑count
    goal while avoiding high‑impact sports due to joint aches.
  arts: Cheryl Diaz, who finds solace in the rhythmic strains of La Sonora Dinamita and the folk ballads of Carlos Vives, spends quiet evenings listening to classic Cumbia, while they keep a bookshelf overfilled
    with biographies of Frida Kahlo and Nelson Mandela, shaping a reflective artistic taste.
  travel: Cheryl Diaz, who prefers well‑planned, low‑stress trips, cherishes day‑long visits to the nearby historic mining town of Silverton, dreams of a pilgrimage to the colonial streets of Granada, Spain,
    and they enjoy occasional family cruises to the Caribbean, balancing limited retirement income with a yearning for cultural discovery.
  culinary: Cheryl Diaz, an accomplished home cook, perfects pupusas stuffed with cheese and loroco, loves simmering slow‑cooked frijoles negros with cilantro, and they delight in baking sweet corn empanadas,
    yet admit to over‑salting dishes when nostalgia overwhelms careful seasoning.
  core: Cheryl Diaz melds disciplined mining expertise with a nostalgic love for traditional cooking, meticulous budgeting, cautious health vigilance, and a quiet yearning for cultural travel, all while
    wrestling with lingering worries and a penchant for over‑salting their pupusas.
background:
  cultural: Cheryl’s cultural identity is rooted in her Salvadoran heritage, which she has preserved through language, cuisine, and community involvement. Born to immigrant parents who arrived in California
    during the 1960s, she grew up hearing stories of El Salvador’s villages and participating in family celebrations of Las Posadas and the feast of Saint John the Baptist. Spanish remains her first language,
    and she often switches seamlessly between Spanish and English, acting as a cultural bridge for coworkers and family members. The Catholic faith, a strong sense of family solidarity, and a dedication
    to mutual aid are central to her worldview, guiding her commitment to harmony at work and in her neighborhood. Despite living in Inglewood, Cheryl maintains close ties with the local Salvadoran diaspora,
    attending festivals, supporting the community center, and passing down traditions to younger generations.
