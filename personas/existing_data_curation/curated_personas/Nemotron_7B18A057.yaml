personas:
  professional: Bradley Jones is an aspiring junior builder who spends hours assembling LEGO structures, demonstrating early engineering curiosity, spontaneous imagination, and strong collaborative instincts,
    which show up in his habit of sketching free-form designs that often defy the usual step-by-step instructions.
  sports: Bradley Jones enjoys kicking a ball in the neighborhood park, playing on the Swanton Little League tee-ball team each spring, and cheering on the Cleveland Browns and Ohio State Buckeyes while
    wearing a purple cap, treating every game as a cooperative play-date.
  arts: Bradley Jones spends afternoons coloring scenes from Dr. Seuss books, drawing insects he observed at the county fair, and watching nature documentaries narrated by Sir David Attenborough, which
    inspire him to blend whimsical art with realistic details.
  travel: Bradley Jones loves spontaneous weekend trips to nearby Cedar Point amusement park and the local county fair, while his imagination wanders toward a future family vacation to Disney World in Florida
    and a road-trip adventure across the Grand Canyon, preferring short drives that end with a picnic at a familiar park.
  culinary: Bradley Jones favors creamy macaroni-and-cheese topped with buttered breadcrumbs, crispy chicken nuggets with honey-mustard dip, and strawberry-jam sandwiches, and can proudly assemble a simple
    fruit salad of sliced bananas, blueberries, and grapes using a plastic spoon, though they often forget to wash hands before eating.
  core: Bradley Jones is a curious, compassionate six-year-old whose love for LEGO, insects, and imaginative storytelling fuels a spontaneous, community-oriented outlook that sometimes clashes with their
    need for structure.
background:
  cultural: Bradley is raised in a white, middle‑class family in Swanton, Ohio, a small city in Lucas County near Toledo. His upbringing reflects typical Midwestern values of community, politeness, and
    modesty, with frequent participation in local school events, neighborhood gatherings, and celebrations such as Thanksgiving, the Fourth of July, and the county fair. He is exposed to mainstream American
    media, enjoys school‑based activities, and often attends community programs at the local library and park.
attributes:
  skills: '[''drawing'', ''coloring'', ''imaginative storytelling'', ''curiosity-driven questioning'', ''empathetic listening'', ''cooperative play'', ''flexible problem solving'']'
  hobbies: '[''drawing'', ''coloring'', ''building with LEGO'', ''exploring nature'', ''listening to storytime'', ''cooperative board games'', ''watching nature documentaries'']'
  career_goals: Bradley dreams of growing up to become someone who can use his love of art and caring nature to help others, such as an artist who creates uplifting illustrations for children's books or
    a teacher who fosters a supportive classroom. He envisions a future where he can share his creativity and compassion to make his community a happier place.
