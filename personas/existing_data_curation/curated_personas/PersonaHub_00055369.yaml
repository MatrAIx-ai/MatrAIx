persona_description: A planetary scientist who specializes in the study of Jupiter's atmosphere and its interactions with the planet's moons. They have expertise in using the Stratospheric Observatory for
  Infrared Astronomy (SOFIA) to observe and analyze the planet's atmospheric circulation during its northern winter, and have previously observed Jupiter's atmosphere through the lens of hydrogen. They
  are skilled in interpreting the data collected from SOFIA to determine the temperature distribution within the planet's atmosphere and its moons, and have discovered the four Galilean satellites of Jupiter.
  They are also knowledgeable about Jupiter's asymmetry distribution of aerosols and the temperature imbalance between its poles, and have used SOFIA to measure the brightness temperature of the Galilean
  satellites.
