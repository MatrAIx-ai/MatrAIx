personas:
  professional: Claudina Chung, an aspiring LEGO architect, translates their love for structured building and meticulous attention to detail into designing complex sets for school projects and the environmental
    club, often coordinating group builds with a clear step‑by‑step plan.
  sports: Claudina Chung, a midfield enthusiast on her middle school soccer team, balances practice drills and weekend matches with cheering for the local youth club, the Riverdale Rovers, and follows the
    professional exploits of FC Barcelona's senior squad, especially admiring the playmaking of Frenkie de Jong.
  arts: Claudina Chung channels their creative energy into drawing vibrant cartoons inspired by the whimsical humor of Bill Watterson and the dynamic storytelling of Studio Ghibli, while also practicing
    traditional salsa steps to lively tunes from Celia Cruz, finding that rhythm fuels their artistic flow.
  travel: Claudina Chung prefers meticulously planned weekend getaways, often choosing family trips to nearby historic towns like Williamsburg, Virginia, where they explore museums on a schedule, while
    also dreaming of a solo adventure to the tropical island of Costa Rica to experience rainforest hikes and beach snorkeling.
  culinary: Claudina Chung enjoys baking chocolate chip cookies and banana bread, mastering the perfect crumb by measuring flour and sugar with a digital scale, while also experimenting with simple family
    recipes like homemade pizza topped with mozzarella, basil, and sliced olives.
  core: Claudina Chung is a detail‑oriented 11‑year‑old who blends a love for structured LEGO builds, organized soccer play, and rhythmic salsa dancing with a steady, kindhearted approach to both school
    responsibilities and personal hobbies.
background:
  cultural: Claudina comes from a vibrant Puerto Rican family that maintains strong ties to island traditions while living in Kissimmee, Florida. She speaks both Spanish and English at home, celebrates
    holidays such as Navidad, Three Kings Day, and the Puerto Rican Festival, enjoys music like reggaetón and salsa, helps prepare classic dishes like arroz con gandules and alcapurrias with her grandparents,
    and participates in local Puerto Rican community events and church gatherings, fostering a sense of cultural pride and connection.
