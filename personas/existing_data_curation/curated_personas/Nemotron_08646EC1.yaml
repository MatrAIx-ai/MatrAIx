personas:
  professional: A budding tech tinkerer, Arturo Vizcaino combines a practical curiosity and organized approach to building Scratch animations and complex LEGO structures, often leading his peers in collaborative
    projects while balancing creativity with methodical planning.
  sports: A spirited young soccer player, Arturo Vizcaino plays midfield for the local Tigers youth club, cheers for the national team during World Cup matches, practices drills after school, and stays
    active by joining weekend pick‑up games at the community field, reflecting his energetic sociable nature.
  arts: An enthusiastic creative, Arturo Vizcaino draws comic‑style heroes inspired by his favorite graphic novels, strums guitar riffs learned from his cousin while dancing to cumbia legends like Los Ángeles
    Azules and hip‑hop beats from artists such as Kendrick Lamar, and attends community art fairs to admire murals by local street artists.
  travel: An inquisitive explorer, Arturo Vizcaino has visited the nearby desert state park on a family road trip, dreamed of seeing the pyramids of Teotihuacán, hopes to one day roam the streets of Tokyo's
    Akihabara district, and prefers budget‑friendly stays with relatives, balancing adventure with familial responsibilities.
  culinary: A junior kitchen helper, Arturo Vizcaino loves prepping masa dough for tamales during holidays, enjoys assembling tacos with shredded chicken, cheese, and fresh cilantro, experiments with making
    guacamole using ripe avocados and lime, and frequently snacks on pepperoni pizza while practicing his guitar, reflecting his diverse palate and hands‑on approach to cooking.
  core: A curious, energetic 11‑year‑old named Arturo Vizcaino blends a love for building, music, and community service with a habit of occasionally leaving LEGO pieces scattered around his room, embodying
    a balanced mix of organized creativity and playful spontaneity.
background:
  cultural: Arturo was raised in a Mexican‑American household in Houston, where Spanish is spoken at home and English at school. Family gatherings revolve around traditional Mexican foods such as tacos,
    tamales, and pozole, and celebrations of Día de los Muertos and Cinco de Mayo are important cultural touchstones. He attends a bilingual elementary school that incorporates Mexican history and folklore
    into its curriculum, fostering a strong sense of pride in his heritage. Houston’s vibrant Hispanic community, with its festivals, music, and parades, provides Arturo with ample opportunities to experience
    both Mexican and Texan cultural influences, shaping his identity as a proud Mexican‑American.
