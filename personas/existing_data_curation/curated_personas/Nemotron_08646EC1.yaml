  career_goals: Arturo dreams of becoming an engineer who designs machines that help people, inspired by his love for building things with LEGO and coding simple robots. He also hopes to give back to his
    community by mentoring younger kids in after‑school programs, teaching them basic coding and Spanish. In the long term, he imagines working on projects that combine technology and his cultural heritage,
    such as developing apps that celebrate Mexican traditions for families in Houston.
