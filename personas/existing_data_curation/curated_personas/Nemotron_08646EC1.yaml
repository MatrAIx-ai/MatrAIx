  hobbies: '[''Soccer'', ''Guitar'', ''Dancing (cumbia & hip‑hop)'', ''LEGO building'', ''Scratch programming'', ''Reading adventure/science-fiction books'', ''Comic drawing'', ''Cooking traditional Mexican
