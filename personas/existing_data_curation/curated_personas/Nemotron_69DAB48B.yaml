  career_goals: Although retired from formal employment, Raven aims to ensure the continuity of her cultural heritage by documenting elders' stories and creating a community archive. She aspires to teach
    younger members of the Akwesasne Nation traditional crafts and herbal practices through informal workshops, fostering self‑sufficiency and environmental stewardship. She also hopes to mentor her grandchildren
    academically, supporting their aspirations while preserving family harmony. In the longer term, she envisions writing a memoir that intertwines personal history with tribal narratives, contributing
    to broader understanding of Mohawk life.
