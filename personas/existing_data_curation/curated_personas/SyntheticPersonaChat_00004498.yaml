    User 1: You don''t have any hobbies?

    User 2: No, not really. I''m not really interested in anything.

    User 1: That''s too bad. You should find something to do for fun. It''s important to have a life outside of work.

    User 2: I know, I know. I''ll try to find something.

    User 1: Good! I''m sure you''ll find something you enjoy.'
