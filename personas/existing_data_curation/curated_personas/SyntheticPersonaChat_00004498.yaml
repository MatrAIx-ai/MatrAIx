    User 2: You should! It''s a great way to live.

    User 1: I know, I know. I''ve just been too lazy to make the change.

    User 2: It''s not that hard. There are so many great vegetarian options available now.

    User 1: I know, I know. I''ll get to it eventually.

    User 2: Good! I''m sure you''ll love it.

    User 1: I hope so.

    User 2: So, what do you do for fun?

    User 1: I play the drums.

    User 2: Cool! I''ve always wanted to learn how to play the drums.

    User 1: You should! It''s a lot of fun.

    User 2: I know, I know. I''ll get to it eventually.

    User 1: Good! I''m sure you''ll love it.

    User 2: I hope so.

    User 1: So, what do you do for fun?

