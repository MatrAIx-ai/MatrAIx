persona_description: A government official who is responsible for implementing policies and regulations related to nutrition labelling, food ethics, and health education. They are knowledgeable about the
  implementation of nutrition labelling in different countries and the effectiveness of nutrition labelling on promoting healthy eating habits. They are also familiar with the impact of socio-economic factors
  on food choices and the need for education and intervention programs to promote healthy eating habits. They have experience in working with stakeholders, such as manufacturers, consumers, and officials,
  to implement policies and programs that promote healthy eating and nutrition. They are committed to reducing the chronic disease burden in their country and are dedicated to promoting healthy eating habits
  among the population.
