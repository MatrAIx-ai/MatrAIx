persona_description: A scientist with a focus on genetic research in the field of plant biology, specifically investigating the interaction of grapevines with light and its impact on their environmental
  adaptation and fruit quality. The scientist is interested in identifying molecular markers linked to QTL controlling phenotypic variation in grape for environmental adaptation and fruit quality, as well
  as developing grape germplasm with novel phenotypes for fruit quality traits. The scientist's research also includes mapping the genetic control of day-length sensitivity and conducting an association
  genetics screen for grape aroma in a subset of the USDA grape germplasm collection.
