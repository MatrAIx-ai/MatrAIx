persona_description: A professional educator who is responsible for implementing and integrating social and emotional learning (SEL) into the curriculum of Washington State schools. This person is likely
  to have experience in working with teachers, administrators, and school staff to understand the importance of SEL and how to implement it in a culturally responsive manner. This individual may have a
  background in education, psychology, or social work and may have expertise in SEL theory and research. They are likely to have a passion for creating a positive and supportive learning environment for
  students and may have a strong desire to make a difference in the lives of their students.
