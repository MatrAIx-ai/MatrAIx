  hobbies: '[''Herb gardening'', ''Hiking'', ''Traditional calligraphy'', ''Family cooking'', ''Culinary reading'', ''Knitting'', ''Volunteer baking'', ''Beach walks'']'
  career_goals: Lan aims to open her own boutique bakery in Honolulu that blends East Asian pastries with Hawaiian flavors, creating a signature line of croissants infused with macadamia and taro, and mooncakes
    featuring pineapple rum. She aspires to earn a Certified Baker Specialist credential, become a recognized head pastry chef at a premier resort, and later mentor aspiring bakers through workshops and
    a teaching studio. Balancing her love for routine with creative growth, Lan intends to build a sustainable business that maintains high standards while fostering community connections.
