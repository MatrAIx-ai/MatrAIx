  career_goals: Donald aims to transition into a senior advisory role where he can shape company‑wide sales strategy and institutionalize a robust mentorship program for emerging sales talent. He aspires
    to author a guide on ethical, high‑performance sales leadership, and eventually launch a consulting practice that helps midsize firms adopt data‑centric, people‑first sales models. Throughout, he seeks
    to leave a legacy of inclusive, achievement‑driven culture that balances rigorous performance standards with genuine employee well‑being.
