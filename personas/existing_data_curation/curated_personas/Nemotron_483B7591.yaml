  hobbies: '[''Visiting Art Museums (Art Institute of Chicago)'', ''Watercolor Painting'', ''Reading Contemporary Art and Design Books'', ''Playing Chess'', ''Urban Gardening'', ''Hiking the Indiana Dunes'',
