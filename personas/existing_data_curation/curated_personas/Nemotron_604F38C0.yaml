personas:
  professional: John Anderson is an aspiring automotive technician, currently preparing for his GED, who leverages his knack for step‑by‑step procedures, basic engine diagnostics, and woodworking to excel
    in hands‑on tasks and aims to earn industry certifications at Nashville State Community College.
  sports: John Anderson enjoys low‑impact physical activities, such as weekend fishing at Percy Priest Lake, weekly bowling nights with the church group, and casual workouts at a local gym; they cheer for
    the Nashville Predators and Tennessee Titans, and occasionally support the Nashville SC, favoring structured, predictable routines over intense competitive sports.
  arts: John Anderson finds creative fulfillment in building model airplane kits and reading historical non‑fiction by authors like Stephen Ambrose, while also appreciating the storytelling of Ken Burns
    documentaries; their music taste includes classic country legends like Johnny Cash and folk singer John Denver, which often plays softly while they work on woodworking projects.
  travel: John Anderson prefers budget‑friendly road trips in their reliable sedan, favoring destinations within a few hours' drive such as Great Smoky Mountains National Park and the historic streets of
    Nashville; they dream of a future fishing expedition to Minnesota’s Boundary Waters and an educational visit to Washington, D.C., balancing adventure with the constraints of a student budget.
  culinary: John Anderson enjoys straightforward comfort foods such as grilled chicken, homemade burgers, and fish tacos seasoned with lime and cilantro, often cooking for themselves using fresh ingredients
    like potatoes, cheddar cheese, and barbecue sauce; they also indulge in quick snacks like pizza and chips during long gaming sessions and pride themselves on preparing a reliable trail‑mix snack for
    fishing outings.
  core: John Anderson is a methodical, 18‑year‑old aspiring tradesperson who balances solitary hobbies, disciplined budgeting, modest health care routines, low‑key sports fandom, nostalgic music tastes,
    practical travel plans, and comfort‑food cooking, all while occasionally procrastinating on sleep and splurging on collectibles.
background:
  cultural: John was born and raised in Franklin, Tennessee, a suburban community with deep Southern roots. His family has lived in Williamson County for several generations and identifies with the region’s
    emphasis on hospitality, community involvement, and modest, hard‑working values. He grew up attending a local Baptist church, where church events, high school football games, and county fairs were central
    social gatherings. Southern cuisine, country music, and a respect for tradition shape his everyday life, while the close‑knit nature of his neighborhood reinforces his preference for small‑group interactions
    and cooperative, harmonious relationships.
attributes:
  skills: '[''Microsoft Office (Word, Excel, PowerPoint)'', ''Basic computer troubleshooting'', ''Automotive maintenance (oil changes, tire rotation, minor diagnostics)'', ''Woodworking (basic furniture
