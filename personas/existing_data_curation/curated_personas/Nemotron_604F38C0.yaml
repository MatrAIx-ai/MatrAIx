  hobbies: '[''Reading non‑fiction (history, mechanics, self‑help)'', ''Model airplane building'', ''Fishing at local lakes'', ''Strategy video gaming'', ''Volunteer work at church food bank'', ''Bowling
    with a small group'']'
  career_goals: John’s immediate goal is to obtain his GED within the next six months. After that, he plans to enroll in a vocational program at Nashville State Community College, focusing on automotive
    technology or HVAC systems. He aims to earn industry certifications and secure a stable, full‑time position as a skilled tradesperson, where the work schedule is predictable and the tasks are clearly
    defined. Long‑term, he envisions advancing to a supervisory role or possibly starting his own small service business, allowing him to combine his practical skills with his preference for structured,
    reliable work environments.
