personas:
  professional: Jose Elhallak, a veteran painter and paperhanger with 35 years of hands‑on experience, merges meticulous surface preparation, decorative finishes, and newly acquired historic restoration
    methods to secure high‑quality contracts for private homes and culturally significant tribal buildings, while mentoring an apprentice and maintaining a structured schedule to keep their anxiety in check.
  sports: Jose Elhallak enjoys early‑morning fishing on the Milk River, participates in a seniors’ walking club that meets weekly on prairie trails, avidly follows the regional baseball team the Great Falls
    Explorers and the provincial football squad the Calgary Stampeders, and competes in an annual community fly‑fishing tournament.
  arts: Jose Elhallak listens to Native American flute virtuoso R. Carlos Nakai while beadworking, draws inspiration from Diego Rivera’s murals for his own community‑center murals, teaches basic painting
    techniques to youth, and relaxes with western novels by Louis L’Amour and historical sagas by Howard Zinn.
  travel: Jose Elhallak favors relaxed road trips to scenic destinations like Badlands National Park, Banff National Park, and the historic pueblo ruins of Mesa Verde, plans each itinerary around fishing
    spots and local cultural festivals, and balances travel with a modest budget that prioritizes family visits over luxury accommodations.
  culinary: Jose Elhallak prefers simple, hearty meals such as pan‑seared trout with sage butter, bison chili with beans and corn muffins, enjoys making wild berry jam from locally foraged berries, cooks
    at an intermediate skill level in a modest kitchen, but often forgets to turn off the stovetop before stepping away.
  core: Jose Elhallak is a meticulous painter‑artisan who balances a structured work life, cultural stewardship, and a love of fishing with mindful breathwork to soothe an ever‑present undercurrent of anxiety.
background:
  cultural: Jose is a member of the Northern Cheyenne Nation, raised on the nearby reservation before moving to Hays, MT. His upbringing blended traditional tribal customs—storytelling, respect for the
    land, and seasonal ceremonies—with the practical, self‑reliant values of rural Montana life. These influences shape his aesthetic sensibility, work ethic, and community involvement. He maintains close
    ties with his tribal community, participating in seasonal gatherings, contributing to cultural preservation projects, and honoring his heritage through art and daily practice.
attributes:
  skills: '["Interior Painting", "Exterior Painting", "Paper Hanging", "Surface Preparation", "Color Consultation", "Decorative Finishes", "Lead Paint Safe Removal", "Estimating and Budgeting", "Customer
