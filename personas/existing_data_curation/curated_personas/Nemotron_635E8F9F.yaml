personas:
  professional: Simon Chamblee, a 12-year-old aspiring digital illustrator, blends hand-drawn cartoons, watercolor painting, and Procreate wizardry into vivid fantasy comics while channeling the same curiosity
    that fuels their LEGO and Minecraft creations, even as they delight in flexible, unstructured project timelines.
  sports: Simon Chamblee dabbles in after-school swimming with the River Rapids Swim Team, enjoys occasional backyard bike rides, and passionately supports the Detroit Tigers and Los Angeles Lakers while
    preferring unstructured play over regimented training.
  arts: Simon Chamblee's artistic soul is fueled by sketching Marvel-style superheroes, experimenting with watercolor techniques inspired by Hayashi Kiyoshi, binge-watching Studio Ghibli animated classics,
    and humming original melodies while playing the keyboard to Tame Impala-style synth loops.
  travel: Simon Chamblee prefers spontaneous weekend getaways, having already explored the magical realms of Disney World in Orlando and the towering cliffs of the Grand Canyon, while dreaming of a future
    family adventure to Kyoto's historic shrines, balancing curiosity with the comfort of familiar family routines.
  culinary: Simon Chamblee enjoys cheesy pepperoni pizza, crafts rainbow cupcake frosting with vanilla extract and sprinkles, and occasionally tries homemade sushi rolls with avocado and cucumber under
    parental supervision, reflecting a budding culinary curiosity mixed with a love for sweet snacks.
  core: Simon Chamblee, a 12-year-old imagination engine, leaps from sketchpads to LEGO forts, fuels fantasies with digital art and Minecraft, embraces flexible chaos, yet sometimes forgets homework in
    favor of midnight superhero marathons.
background:
  cultural: Simon is a white Midwestern American raised in Conway, a small town in Laclede County, Missouri. His family has deep roots in the region, with generations who have worked in farming, local manufacturing,
    and community service. He grew up attending a public elementary school and participating in town traditions such as the annual county fair, Fourth of July parades, and church picnics. The local culture
    emphasizes modesty, self‑reliance, and a strong sense of community, which has shaped his cooperative yet assertive demeanor. While exposed to mainstream American media, he also appreciates the folkloric
    stories and natural landscapes of the Ozarks, often drawing inspiration from the nearby forests and rivers for his artistic projects.
