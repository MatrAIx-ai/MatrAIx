  career_goals: Simon hopes to become a concept artist or a game designer, creating imaginative worlds and characters that blend visual art and interactive storytelling. He envisions a future where he can
    work on animated films or indie video games, allowing him to explore novelty and abstract concepts while maintaining the flexibility to experiment with new mediums. In the longer term he is open to
    interdisciplinary roles that combine art, technology, and storytelling, such as a multimedia creative director.
