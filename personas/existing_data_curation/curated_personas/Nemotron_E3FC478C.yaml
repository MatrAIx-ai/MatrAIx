  career_goals: William aims to advance within the Wheat Ridge Police Department by attaining the rank of detective within the next five years, focusing on investigative work and complex case resolution.
    He plans to complete a bachelor’s degree in criminal justice or public administration to qualify for supervisory roles such as sergeant or lieutenant. Ultimately, he hopes to lead a specialized unit—such
    as a tactical response or community‑outreach team—and to contribute to policy development that improves public safety and trust between law enforcement and Denver’s diverse communities.
