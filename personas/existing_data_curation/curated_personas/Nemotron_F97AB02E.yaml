  hobbies: '["Cooking traditional Mexican dishes","Herb gardening","Puzzle solving (crossword, Sudoku)","Reading mystery and thriller novels","Attending local cultural dances and festivals","Journaling
    for stress management","Guided meditation","Volunteering at community food pantry"]'
  career_goals: Vannessa aims to secure a stable administrative role at a local nonprofit or community organization where her structured approach and reliability can be fully utilized. She plans to obtain
    a certification in office administration within the next year to enhance her qualifications. Simultaneously, she aspires to launch a small home‑based catering service that offers wholesome Mexican comfort
    foods, using her cooking skills and cultural heritage to create a niche market. Her long‑term ambition is to achieve financial security, reduce daily stress, and build a career path that blends her
    organizational talents with her passion for cooking and community service.
