personas:
  professional: An efficient nonprofit administrator, Vannessa Larrea leverages bilingual fluency, meticulous spreadsheet management, and a competitive drive to streamline grant reporting and community
    outreach, while strategically laying the groundwork for a health-focused Mexican-style catering side business.
  sports: A seasonal sports enthusiast, Vannessa Larrea roots for the Chicago White Sox in spring, follows the Bulls during basketball season, joins the co-ed 'Pilsen Pumas' soccer league on Sundays, and
    balances these activities with weekly yoga classes at a local community center to maintain flexibility and stress relief.
  arts: A culturally-immersed arts lover, Vannessa Larrea frequents local folk dance festivals featuring mariachi bands, draws inspiration from Frida Kahlo’s paintings, enjoys listening to Los Tigres del
    Norte and Luis Miguel, devours thriller novels by Gillian Flynn, and attends performances by the Chicago Symphony Orchestra whenever possible.
  travel: A careful planner, Vannessa Larrea regularly returns to Oaxaca for family reunions and authentic culinary explorations, dreams of a gastronomic tour through Barcelona’s tapas bars, and enjoys
    budget-friendly weekend road trips along the Great Lakes, always balancing cultural immersion with her modest travel budget.
  culinary: A seasoned home chef, Vannessa Larrea perfects mole poblano with roasted chilies, toasted almonds, and Mexican chocolate, crafts low-sodium pozole using lean pork, hominy, and fresh cilantro
    from her balcony garden, and experiments with cauliflower-rice tacos seasoned with epazote, while occasionally indulging in cheesy quesadillas as a guilty-pleasure treat.
  core: Vannessa Larrea is a 40-year-old organized perfectionist who channels her competitive spirit into community service, meticulous budgeting, and daily meditation, all while balancing a love for vibrant
    home-cooked meals with a lingering worry about the future.
background:
  cultural: Vannessa is a first‑generation Mexican‑American who grew up immersed in the vibrant Mexican community of Chicago's Pilsen and Little Village neighborhoods. She speaks both Spanish and English
    fluently, which connects her to her family’s traditions and the broader Hispanic community. Her cultural roots are evident in her love for Mexican cuisine, celebration of holidays such as Día de los
    Muertos and Cinco de Mayo, and participation in local church events. These experiences have fostered a strong sense of cultural pride, influencing her cooking, social engagements, and desire to give
    back through community service.
attributes:
