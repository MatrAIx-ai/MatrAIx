    calculations and energy efficiency optimization'']'
  hobbies: '[''Fishing'', ''Vintage radio restoration'', ''Home‑automation tinkering'', ''Chess'', ''Watching NFL football'', ''Neighborhood barbecues'', ''Community clean‑up projects'', ''Reading technical
    manuals'']'
  career_goals: Myles aims to earn the master electrician certification and expand his freelance contracting business to focus on high‑efficiency solar installations in St. Lucie County. He hopes to secure
    a supervisory role with a reputable contractor that offers a predictable schedule and stable income, reducing his financial stress. Long‑term, he envisions opening a small, employee‑owned electrical
    firm that provides mentorship opportunities for younger Black tradespeople and emphasizes safety and reliability.
