personas:
  professional: Myles Remarais, a seasoned electrician with three decades of hands‑on experience in residential and commercial wiring, now adds solar PV and low‑voltage security systems to his repertoire,
    and they channel their competitive, detail‑oriented nature into mentoring apprentices while juggling a preference for structured safety protocols and an occasional chaotic schedule.
  sports: Myles Remarais, a devoted Miami Dolphins fan who never misses a Sunday game, also joins a weekly pick‑up basketball league at the community center and spends quiet weekends fishing the St. Lucie
    River, balancing competitive spirit with a love for relaxed outdoor sport.
  arts: Myles Remarais, who restores vintage radios while listening to B.B. King, Aretha Franklin, and Mahalia Jackson, finds solace in blues and gospel melodies that echo their church upbringing, and they
    often attend local jazz nights at a downtown lounge after a long workday.
  travel: Myles Remarais, an avid weekend angler who has charted the waters of the St. Lucie River and taken road trips to the Florida Keys, dreams of a cultural pilgrimage to New Orleans for its music
    and cuisine while balancing family responsibilities and a modest travel budget.
  culinary: Myles Remarais, a competent home cook who perfects collard greens, smoked catfish, and sweet‑potato cornbread for neighborhood barbecues, enjoys experimenting with smoked paprika and okra in
    gumbo, yet occasionally resorts to quick microwave meals when a project runs late.
  core: Energetic yet slightly disorganized 52‑year‑old electrician Myles Remarais blends a competitive drive and deep community roots with a love for blues, fishing, and barbecues, all while they juggle
    financial worries and a relentless quest for work‑life balance.
background:
  cultural: Myles was raised in a close‑knit African‑American community in Central Florida. His parents migrated from the rural South during the 1970s, bringing traditions of church fellowship, soul‑food
    cooking, and a strong work ethic. He attended a historically Black high school, where he learned the value of self‑reliance and community support. The local Black church remains a central part of his
    life, providing spiritual guidance and a network of fellow tradespeople. He embraces the broader African‑American cultural heritage of resilience, storytelling, blues and gospel music, and he often
    listens to these genres while working. His cultural identity drives his commitment to mentor younger Black electricians and give back to his community.
attributes:
  skills: '[''Electrical wiring and conduit installation'', ''Residential and commercial circuit troubleshooting'', ''Blueprint and schematic interpretation'', ''NEC compliance and code updates'', ''Solar
