  hobbies: '[''Fishing'', ''Gardening'', ''Bridge (card games)'', ''Community theater'', ''Genealogy research'', ''Volunteer storytelling'', ''Senior community center activities'', ''Church choir'', ''Local
    history workshops'']'
  career_goals: Approaching retirement, David aims to solidify his legacy by earning the Certified Payroll Professional (CPP) credential within the next year, demonstrating his commitment to staying current
    with evolving payroll regulations and technologies. He aspires to lead a small team of clerks, introducing an automated time‑tracking system that streamlines workflows and reduces errors. David also
    hopes to mentor younger employees, sharing practical knowledge while fostering a collaborative culture. Beyond the workplace, he plans to transition to part‑time consulting for local small businesses,
    offering expertise in payroll compliance and cost‑effective solutions, ensuring a stable financial foundation for his family and a continued sense of purpose.
