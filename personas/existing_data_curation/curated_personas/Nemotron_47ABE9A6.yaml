personas:
  professional: David Smaltz, a senior payroll specialist approaching retirement, leverages four decades of meticulous payroll and timekeeping expertise while championing a collaborative, talk‑driven mentorship
    style as he pilots an automated time‑tracking system and pursues his Certified Payroll Professional credential.
  sports: David Smaltz, a devoted fan of the Tampa Bay Buccaneers and the Orlando Magic, spends his Saturdays fishing at Lake Brooklyn with the Mid‑Florida Senior Anglers Club and joins a community bridge
    league that keeps his mind sharp while he strolls with the local senior walking group to stay fit.
  arts: David Smaltz, an enthusiastic member of his Methodist church choir and a regular storyteller at the town’s historical society, frequently volunteers in community theater productions where his loquacious
    personality shines, and he enjoys listening to classic country legends like Willie Nelson and folk icons such as Johnny Cash.
  travel: David Smaltz prefers relaxed, well‑planned road trips that blend genealogy research and culinary stops, having already toured Savannah’s historic squares and Charleston’s waterfront, and now dreams
    of a leisurely cruise to New Orleans and a heritage pilgrimage to Edinburgh, Scotland, while keeping travel costs within his modest retirement budget.
  culinary: David Smaltz, a competent home chef, delights in slow‑cooked pork ribs glazed with honey‑brown sugar, fresh heirloom tomato salads tossed with basil and feta, and a Sunday pot of jambalaya spiced
    with smoked paprika and Andouille sausage, often pairing meals with homemade sweet tea.
  core: David Smaltz is a talkative, community‑centric retiree whose blend of Southern hospitality, meticulous payroll expertise, and restless curiosity fuels both his advocacy for financial accuracy and
    his penchant for storytelling, even as he wrestles with occasional worry and a love for late‑night fishing trips.
background:
  cultural: David was raised in a middle‑class White family in the southeastern United States, spending most of his adult life in Clay County, Florida. The region’s Southern hospitality, emphasis on community
    involvement, and respect for tradition have shaped his outlook. He grew up attending Methodist services, participating in neighborhood block parties, and embracing regional customs such as weekend barbecues
    and seasonal fishing trips. The blend of rural Floridian lifestyle, Southern values of hard work and self‑reliance, and his exposure to the diverse, growing population of Middleburg informs his worldview,
    fostering a balanced appreciation of both longstanding customs and new ideas.
