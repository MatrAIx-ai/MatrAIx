  career_goals: Jeffrey aims to transition from front‑of‑house duties to a supervisory role within the next two years, seeking a restaurant manager position where his organizational strengths can improve
    operational efficiency. He plans to complete his Bachelor’s degree in Business Administration at a local community college to solidify his managerial knowledge. Long‑term, he hopes to open a small,
    community‑focused café in Wallkill that offers locally sourced dishes and a welcoming space for neighborhood events, blending his love for hospitality with a desire to give back to his town.
