personas:
  professional: An organized fast‑food counter associate, Mary Blanco applies meticulous cash‑handling and inventory‑tracking skills to streamline operations, and they mentor new hires with a calm, step‑by‑step
    approach that reflects their disciplined, structure‑seeking mindset.
  sports: An early‑morning runner and yoga enthusiast, Mary Blanco participates in local 5K events, joins a Bay Area running club for structured group workouts, follows the San Jose Sharks and San Jose
    Earthquakes avidly, and they celebrate Fourth of July by attending stadium fireworks displays whenever possible.
  arts: Mary Blanco balances solitary reading of classic literature like Jane Austen with listening to piano compositions by Ludovico Einaudi, attends occasional performances at the San Jose Center for
    the Performing Arts, and they appreciate the disciplined artistry that mirrors their own meticulous planning habits.
  travel: With a preference for meticulously planned itineraries, Mary Blanco has explored Yosemite National Park and the coastal towns of Santa Cruz and Monterey, dreams of a cultural immersion in Kyoto
    to study precise culinary techniques, and they schedule future trips around holiday breaks to maximize family time.
  culinary: Mary Blanco enjoys crafting simple, well‑executed meals such as lemon‑garlic chicken piccata, quinoa‑veggie bowls, and roasted salmon with basil, relying on measured ingredients and precise
    recipes, and they find the process of perfecting each dish as satisfying as checking off a bullet‑journal task.
  core: Mary Blanco merges an obsessive love for order with a quiet, cooperative nature, turning bullet‑journaling, early runs, and precise cooking into a disciplined lifestyle that occasionally slips into
    coffee‑bean splurges and missed flossing, and they always double‑check locks before leaving.
background:
  cultural: Mary Marie grew up in a middle‑class, predominantly Anglo‑American household in San Jose, California. Her family observes mainstream American traditions such as Thanksgiving, Fourth of July
    celebrations, and Christmas, while also being mindful of the multicultural diversity of the Bay Area. Although her surname suggests some Hispanic heritage, her cultural upbringing is rooted in typical
    American suburban life, with an emphasis on education, punctuality, and community involvement. Living in a diverse region has given her an appreciation for various cultures, though she identifies primarily
    with a white American cultural background.
attributes:
  skills: '["Cash handling", "POS system operation", "Food safety compliance (ServSafe)", "Inventory management", "Shift scheduling", "Team training and onboarding", "Multitasking during high-volume periods",
