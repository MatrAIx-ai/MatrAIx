  hobbies: '["Bullet journaling", "Sudoku and crossword puzzles", "Home cooking with precise recipes", "Morning running", "Weekly yoga", "Reading self-improvement and classic literature", "Volunteering
    at a local food pantry"]'
  career_goals: Mary Marie aims to leverage her disciplined work ethic into a career in restaurant management. In the short term, she plans to attain a shift‑supervisor role within the next year, followed
    by a restaurant manager position within three years. To support these goals, she intends to enroll in a community‑college program in Business Administration or Hospitality Management while pursuing
    her Associate’s degree. Long‑term, she aspires to become a regional operations manager for a national fast‑food chain and eventually own a small neighborhood café that emphasizes efficient service and
    high quality standards. Her career aspirations are guided by a desire for structured environments, measurable performance metrics, and opportunities to mentor junior staff.
