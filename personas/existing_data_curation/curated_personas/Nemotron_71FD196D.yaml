  career_goals: Although approaching retirement age, Caleb aims to transition into a supervisory or consulting role where he can leverage his cleaning expertise and passion for the arts. He hopes to become
    a facilities manager for a small museum or cultural center, overseeing preservation‑friendly maintenance and mentoring younger custodial staff. He also plans to complete his associate degree in environmental
    studies, which would enable him to offer consultancy on sustainable cleaning practices to local businesses. Ultimately, Caleb wants to secure a stable pension while finding personal fulfillment through
    contributing to the upkeep of artistic spaces and sharing his knowledge through workshops.
