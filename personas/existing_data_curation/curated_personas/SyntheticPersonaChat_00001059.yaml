    User 2: Me too! He''s one of my favorite musicians.

    User 1: So, what do you do for fun besides fishing and listening to Charlie Daniels?

    User 2: I like to play video games, go to the movies, and hang out with my friends and family.

    User 1: Sounds like you have a pretty active social life.

    User 2: Yeah, I try to keep busy.

    User 1: I like that. I''m kind of the opposite. I like to stay home and relax.

    User 2: That''s cool too. To each their own.

    User 1: Exactly. So, what do you like about fishing?

    User 2: I like the challenge of it. I also like being out in nature.

    User 1: Yeah, I can see how that would be relaxing.

    User 2: It is. And it''s a good way to get exercise.

    User 1: That''s true. I''ve never been fishing before, but I''ve always wanted to try it.

    User 2: You should! It''s a lot of fun.

    User 1: Maybe I will. I''ll have to find someone to teach me.

    User 2: I''d be happy to teach you.

    User 1: Really? That''s so nice of you!

    User 2: No problem. I''m always happy to help someone get into fishing.

    User 1: Thanks! I really appreciate it.

    User 2: You''re welcome!'
