personas:
  professional: Manuel Castillo is a budding automotive technician who combines hands‑on troubleshooting skills, bilingual communication, and meticulous schedule‑keeping to excel in part‑time volunteer
    work at a local garage, where they consistently organize parts inventory and follow step‑by‑step repair procedures.
  sports: Manuel Castillo plays midfield for the Riverside Rangers, a small community soccer club, and follows Los Angeles FC and the Chicago Cubs on TV, balancing weekly matches with a personal fitness
    routine of jogging after school and routine car‑check workouts that keep them both physically and mechanically tuned.
  arts: Manuel Castillo channels his love for pattern‑based hobbies into building detailed scale model kits of classic cars while listening to regional Mexican musicians like Banda Los Recoditos and classic
    rock guitar legends such as Eric Clapton, and they occasionally unwind by playing strategic video games like XCOM that reward careful planning.
  travel: Manuel Castillo dreams of road‑tripping along Route 66 to visit the Henry Ford Museum in Dearborn and the Petersen Automotive Museum in Los Angeles, but currently confines travel to weekend family
    outings at nearby state parks and occasional trips to the city’s auto‑repair expos, budgeting each adventure through a prepaid travel card.
  culinary: Manuel Castillo enjoys cooking traditional Mexican dishes such as chiles en nogada, mole poblano, and street‑style tacos al pastor, expertly using fresh cilantro, dried chilies, and corn masa,
    while their cooking skill level hovers between enthusiastic home chef and disciplined apprentice, often perfecting recipes before school deadlines.
  core: Manuel Castillo is a routine‑driven teen mechanic‑in‑training who blends a love for precise model building, strategic gaming, and family cooking with a disciplined financial plan and a quiet, dependable
    personality.
background:
  cultural: Manuel is a Mexican‑American raised in a bilingual household in East Los Angeles. His family maintains strong ties to Mexican traditions, celebrating Día de los Muertos, Christmas Posadas, and
    weekly family meals centered on homemade tacos and tamales. Raised Catholic, he participates in church activities and community events that emphasize respect, hard work, and mutual support. While immersed
    in the multicultural fabric of Los Angeles, he balances his heritage with the city’s diverse influences, often visiting local Mexican markets and sharing his culture with friends from various backgrounds.
attributes:
  skills: '[''Computer troubleshooting'', ''Spreadsheet management (Google Sheets/Excel)'', ''Household organization'', ''Basic automotive maintenance'', ''Cooking traditional Mexican dishes'', ''Bilingual
