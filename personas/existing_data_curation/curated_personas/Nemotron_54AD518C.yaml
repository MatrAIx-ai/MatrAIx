    automotive repair tutorials'']'
  career_goals: Manuel plans to earn his GED within the next year and enroll in a community‑college automotive technology program to become a certified mechanic. He aims to secure a steady entry‑level position
    at a local auto repair shop, gain hands‑on experience, and eventually achieve ASE certification and a supervisory role. In the long term, he hopes to open a small family‑run garage that offers affordable
    services to his neighborhood, providing financial stability for his family while preserving his practical, routine‑oriented work style.
