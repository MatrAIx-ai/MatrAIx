persona_description: A philosopher or historian of philosophy who is interested in the development of naturalism in British intellectual history, particularly in the works of David Bourget, David Chalmers,
  Rafael De Clercq, Jack Alan Reynolds, and the works they have influenced. They are likely to have a deep understanding of the philosophical and historical context of these thinkers, as well as an interest
  in the role of skepticism and belief in action in the development of naturalistic responses to skepticism. They may also be familiar with the works of Christopher Hookway, Henrik Lagerlund, Louis E. Loeb,
  Richard Joyce, Peter Millican, Stanley Tweyman, J. L. Schellenberg, and M. Jamie Ferreira, and may be interested in the topics of doubt and religious commitment, the role of the will in Newman's thought,
  and the philosophy of religion. They may also have an interest in the works of William R. Fey, Colin Heydt, and Henry G. Leeuwevann.
