personas:
  professional: Anh Nguyen, a 28‑year‑old creative technologist, merges Python data‑analysis prowess with Adobe Photoshop and D3.js craftsmanship to produce interactive visual narratives, and they thrive
    in flexible freelance gigs while habitually juggling multiple prototypes in a delightfully disorganized home studio.
  sports: Anh Nguyen enjoys low‑impact fitness, attending a weekend beach‑volleyball club with a small group of friends, practicing sunrise yoga on Santa Monica beach, and cheering for the Los Angeles Dodgers
    while they prefer solitary hikes along the coastline over crowded gyms.
  arts: Anh Nguyen spends evenings crafting surreal digital illustrations inspired by the atmospheric music of Bonobo, the vibrant color palettes of Alex Ross, and the immersive installations of Olafur
    Eliasson, regularly visiting downtown LA galleries such as Hauser & Wirth to soak in contemporary mixed‑media narratives.
  travel: Anh Nguyen favors spontaneous solo road trips along the Pacific Coast Highway, having already explored the misty cliffs of Big Sur and the granite domes of Yosemite, and they dream of an artistic
    retreat in Iceland’s volcanic landscapes, balancing a limited freelance budget with a craving for immersive natural wonder.
  culinary: Anh Nguyen experiments in the kitchen by fusing bold Asian‑inspired flavors—like lemongrass, gochujang, and kaffir lime—with fresh Californian ingredients such as avocado, heirloom tomatoes,
    and citrus, frequently reinventing classics like pho broth into surf‑infused ramen bowls while they juggle a moderate cooking skill level with occasional over‑salting mishaps.
  core: Anh Nguyen is a dreamy data‑slinger who converts code and anxiety into vivid visual stories, constantly battling disorganization and worry while channeling that energy into art, food, and spontaneous
    coastal hikes.
background:
  cultural: Anh’s family originates from Vietnam and raised her in a bilingual home where both Vietnamese and English were spoken. Family gatherings include traditional dishes such as phở and bánh mì, and
    celebrations of Tết blend Vietnamese customs with the multicultural atmosphere of Orange County. Her parents emphasized education, community respect, and kindness, shaping her cooperative and harmonious
    outlook. While she actively maintains her heritage through language, cuisine, and occasional participation in local Vietnamese community events, she also identifies strongly with the broader Southern
    Californian culture, enjoying the region’s artistic diversity, outdoor lifestyle, and progressive social values.
attributes:
  skills: '[''Python programming'', ''JavaScript'', ''Data analysis with pandas'', ''Data visualization (D3.js, Tableau)'', ''Digital illustration (Adobe Photoshop, Illustrator)'', ''3D modeling (Blender)'',
