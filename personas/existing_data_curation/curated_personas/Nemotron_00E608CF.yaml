  hobbies: '[''Speculative fiction reading'', ''Digital painting and illustration'', ''Photography of coastal landscapes'', ''Fusion cooking (Vietnamese‑California)'', ''Yoga and mindfulness meditation'',
    ''Reflective journaling'', ''Board game sessions with close friends'', ''Indie music concerts'', ''Visiting art galleries and museum exhibits'']'
  career_goals: Anh aspires to a career that blends her technical strengths with her love of abstract visual expression, such as a creative technologist, data storytelling designer, or interactive media
    artist. She plans to build a portfolio of projects that convey complex ideas through immersive visuals, pursue a UX design certification, and eventually work in a flexible, remote-friendly environment
    or as a freelancer. Over the next three to five years she hopes to launch a personal digital‑art platform, collaborate on community tech‑art initiatives that make science accessible, and mentor underrepresented
    youth in STEM‑creativity workshops, aligning her professional path with her caring and harmonious values.
