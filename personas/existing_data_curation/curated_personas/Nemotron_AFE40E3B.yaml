  career_goals: While no longer employed full-time, Katrina aims to continue contributing to education through volunteer tutoring, serving on her local school board, and mentoring new teachers. She aspires
    to author a guidebook on effective teaching practices for community educators, and to develop a small intergenerational learning program at the neighborhood library. Additionally, she wishes to deepen
    her knowledge of local history and share it through guest lectures at the senior center. Her long-term ambition includes fostering stronger ties between schools and the broader community in Durham.
