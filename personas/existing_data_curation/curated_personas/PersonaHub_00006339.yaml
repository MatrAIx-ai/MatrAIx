persona_description: A historian who specializes in the study of the Chinese community in San Luis Obispo, particularly the Chinese settlement on Palm Street during the 1870s. His research interests include
  the economic, social, and cultural impact of Chinese immigration on the local community, and the role of Chinese labor in local economic development. He is particularly interested in the interactions
  between the Chinese community and the white community, and the ways in which mutual economic needs and cultural exchange have shaped the community's history. His work has been published in academic journals
  and presented at conferences on the history of Chinese immigration in the West.
