personas:
  professional: Alexis Sobie, a veteran elementary and middle school teacher transitioning toward a district instructional coach role, leverages deep humanities expertise, differentiated instruction, and
    technology fluency while their relaxed, occasionally disorganized approach fuels flexible curriculum design that converts worry into meticulous planning.
  sports: Alexis Sobie, an avid hiker who joins the Castlewood Trails Hiking Club and casually follows the St. Louis Cardinals and St. Louis Blues, prefers low-impact cardio on weekend treks at Castlewood
    State Park and uses community yoga classes to stay flexible, while often skipping the gym due to occasional back discomfort.
  arts: Alexis Sobie, a passionate patron of the St. Louis Art Museum and community theatre, regularly attends productions like the St. Louis Community Theatre's 'Our Town', collects works by American regionalist
    painters, and finds solace in knitting patterns inspired by the quilts of Gee's Bend while listening to folk legends such as Woody Guthrie and contemporary singer-songwriter Brandi Carlile.
  travel: Alexis Sobie, a history-enthusiast traveler, meticulously plans weekend road trips to sites such as the Gateway Arch and nearby historic neighborhoods, has visited the Gettysburg Battlefield and
    Colonial Williamsburg, and dreams of guided tours of Boston's Freedom Trail and the French Quarter in New Orleans, balancing budget constraints with a love for immersive historic experiences.
  culinary: Alexis Sobie, an experimental home cook who blends classic Midwestern comfort with global twists, enjoys crafting rosemary-infused sourdough loaves, perfecting shrimp étouffée with smoked paprika,
    and regularly pickling cucumbers and beets, while occasionally over-seasoning dishes during late-night kitchen sessions.
  core: Alexis Sobie, a curious yet slightly disorganized educator, worries about classroom outcomes, habitually hoards craft supplies, and finds calm in gardening while juggling a love for historic novels
    and spontaneous art-inspired meals.
background:
  cultural: Alexis grew up in a white, Midwestern family with German‑Irish roots in suburban St. Louis. Her upbringing emphasized community involvement, modesty, and a strong work ethic typical of the region.
    She attended a Catholic elementary school, where traditions like seasonal festivals and parish gatherings reinforced a sense of belonging. Throughout her life, she has embraced St. Louis cultural staples
    such as the annual Fourth of July fireworks over the Mississippi River, visits to the Gateway Arch, and the vibrant local music scene. This background informs her teaching philosophy, blending respect
    for tradition with a curiosity for new ideas, and fosters her dedication to fostering inclusive, culturally aware classrooms.
attributes:
  skills: '["Curriculum Development","Arts Integration","Project‑Based Learning","Differentiated Instruction","Literacy Coaching","Classroom Management (Flexible/Relationship‑Focused)","Technology Integration
