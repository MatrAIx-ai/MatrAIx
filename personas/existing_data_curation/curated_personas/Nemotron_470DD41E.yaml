  hobbies: '["Reading historical fiction and classic literature","Participating in a local book club","Visiting the St. Louis Art Museum","Attending community theater productions","Gardening","Experimenting
    with new cooking recipes","Hiking in Castlewood State Park","Knitting and crocheting","Volunteering at the St. Louis Public Library","Traveling to historic sites"]'
  career_goals: Alexis aims to transition into a district instructional coach role where she can shape humanities curricula across schools and champion the inclusion of arts in daily instruction. She hopes
    to develop a mentorship program for early‑career teachers that emphasizes collaborative lesson planning and stress‑management strategies. Long‑term, she envisions authoring a guidebook on flexible,
    curiosity‑driven teaching methods and leading professional‑development workshops that blend practical classroom techniques with innovative, inquiry‑based approaches. Additionally, she wants to advocate
    for stronger mental‑health support systems for both students and staff, drawing on her own experiences with stress and worry.
