  hobbies: '["Visiting art galleries and street murals","Listening to jazz, R&B, and blues","Playing chess","Fishing at local lakes","Cooking soul-food and Caribbean dishes","Watching documentaries on history
    and game theory","Attending community basketball games","Exploring new cuisines","Participating in Opa Locka cultural festivals"]'
  career_goals: Dave aims to transition from floor staff to a supervisory role, targeting a shift-manager position within the next two years. He plans to earn his GED and enroll in an associate program
    in hospitality management to qualify for a casino operations manager track. Long-term, he dreams of opening a small community café that doubles as an art gallery, using his love of art and desire to
    give back to Opa Locka. He also hopes to leverage his analytical bent to become a data-analytics consultant for gaming trends, allowing more flexibility and a chance to mentor younger workers from his
    neighborhood.
