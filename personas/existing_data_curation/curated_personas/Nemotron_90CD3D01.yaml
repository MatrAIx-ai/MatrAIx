  hobbies: '[''Reading'', ''Reflective journaling'', ''Hiking'', ''Nature photography'', ''Jazz listening'', ''Acoustic guitar'', ''Experimental cooking'', ''Puzzle solving'', ''Genealogy research'', ''Library
    volunteering'']'
  career_goals: Dexter aims to transition into a sustainable remote career that leverages his humanities background while honoring his preference for solitude. He plans to obtain a certification in Library
    and Information Science to expand his expertise in digital curation and archival work. In the short term, he is building a freelance portfolio as a writer, editor, and grant‑writing consultant for non‑profit
    organizations. Long‑term, Dexter hopes to publish a collection of essays exploring Black cultural identity and to launch a niche podcast that blends scholarly discussion with storytelling, providing
    both intellectual fulfillment and a steady income stream for his family.
