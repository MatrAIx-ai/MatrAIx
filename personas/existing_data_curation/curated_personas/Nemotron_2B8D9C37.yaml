personas:
  professional: Edgar Rubio is a data-driven marketing strategist who leverages Python, SQL, Tableau, and Agile tools to design ROI-focused campaigns, balancing analytical rigor with a competitive drive
    to outperform benchmarks while staying flexible enough to pivot when market conditions shift, and they thrive on turning raw numbers into compelling narratives.
  sports: Edgar Rubio is a regular member of the Austin Trail Runners, logging weekend runs through the Hill Country and cheering on Austin FC during MLS season while also keeping an eye on the Texas Longhorns
    football team for a burst of camaraderie, and they use hiking as both exercise and a chance to practice landscape photography.
  arts: Edgar Rubio immerses themselves in indie video games like Civilization VI and Hades for strategic depth, curates playlists that blend the soulful strains of Los Tigres del Norte with the ambient
    synths of Tame Impala, and captures Hill Country vistas in a style reminiscent of Ansel Adams, finding artistic refuge in these eclectic influences.
  travel: Edgar Rubio prefers meticulously planned road trips that combine hiking in the Texas Hill Country with culinary pit stops for authentic regional tacos, and they dream of exploring the high deserts
    of Patagonia and the historic streets of Kyoto, balancing budget constraints with a desire for immersive cultural experiences.
  culinary: Edgar Rubio is an adept home cook who perfects slow-cooked pozole using hominy and smoky chipotle, experiments with al pastor marinated in pineapple and achiote, and delights in pairing these
    meals with craft mezcal, yet they often order takeout from a local ramen shop when time runs short.
  core: Edgar Rubio is a data-obsessed introvert who transforms personal metrics into visual stories, runs at sunrise to clear the mind, binge-watches sci-fi series into the early morning, and hoards vintage
    video game cartridges, all while juggling a competitive streak in their marketing career.
background:
  cultural: Edgar is a first‑generation Mexican‑American who grew up in a bilingual household in the greater Austin area. His family preserves core Mexican traditions—celebrating Día de los Muertos, cooking
    regional dishes like pozole and tacos al pastor, and listening to norteño and mariachi music—while also embracing the independent, entrepreneurial spirit of Texas. Fluent in both English and Spanish,
    he often navigates between the two cultures, using his heritage as a source of creative inspiration in his marketing work. The cultural mix informs his appreciation for community gatherings, yet his
    reserved nature leads him to favor small, close‑knit circles over larger festivals. This blend of Mexican roots and Texan sensibility shapes his worldview, work ethic, and personal interests.
