  career_goals: Edgar aims to ascend to a senior leadership role such as Director of Marketing or VP of Growth within the next five to seven years. He plans to deepen his expertise in data science and earn
    an MBA or a specialized analytics certification to bolster his strategic capabilities. His ambition is to lead a high‑performing, data‑driven marketing team that consistently outpaces industry benchmarks,
    and eventually to launch his own boutique consultancy that helps tech startups achieve scalable growth through evidence‑based marketing. He is also driven to become a recognized thought leader in performance
    marketing, speaking at conferences and publishing case studies on ROI‑focused strategies.
