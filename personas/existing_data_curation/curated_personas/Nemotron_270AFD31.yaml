personas:
  professional: Henry Willig, a 49‑year‑old operations strategist at a mid‑size technology firm, leverages his methodical planning, advanced Excel modeling, and calm assertiveness to drive cross‑functional
    efficiency projects while mentoring emerging managers and championing sustainable practices.
  sports: Henry Willig, a member of Wellington Country Club, plays golf every Saturday, follows the Miami Heat and Miami Dolphins avidly, enjoys weekend fishing trips for snook on the St. Lucie River, and
    maintains his fitness with low‑impact treadmill walks and occasional swimming to accommodate his back.
  arts: Henry Willig spends his spare evenings at the Palm Beach Fine Art Show, admiring the realism of Andrew Wyeth, listening to Miles Davis's Kind of Blue on his smart‑home system, and watching Ken Burns
    documentaries, while occasionally quoting classic lines from actor Gregory Peck.
  travel: Henry Willig plans his vacations months ahead, favoring upscale, low‑key destinations such as the Exuma Cays in the Bahamas for sailing, St Andrews in Scotland for golf, and weekend getaways to
    the Florida Keys for fishing, all while balancing travel costs against his family's college savings plan.
  culinary: Henry Willig enjoys grilling marinated flank steak with rosemary and thyme harvested from his garden, preparing pan‑seared snapper with a citrus‑butter sauce, and indulging in upscale brunches
    featuring avocado toast topped with poached eggs and smoked salmon, reflecting his solid intermediate cooking skills and love for fresh, seasonal ingredients.
  core: Henry Willig blends pragmatic efficiency with quiet curiosity, obsessively fine‑tuning his smart‑home routines while occasionally neglecting to unplug his night‑stand charger, and balances a disciplined
    work ethic with a penchant for solitary weekend fishing trips.
background:
  cultural: Henry grew up in a middle‑class white American family in the Southeast, with roots tracing back to German and Irish ancestry. He embodies mainstream American values of hard work, self‑reliance,
    and community involvement. Living in Wellington, he is immersed in the affluent, leisure‑oriented culture of Palm Beach County, which emphasizes outdoor activities like golf and boating, as well as
    a seasonal social calendar. He celebrates traditional holidays with his family, participates in local charitable events, and maintains a pragmatic, yet open‑minded outlook shaped by both his upbringing
    and his professional environment.
