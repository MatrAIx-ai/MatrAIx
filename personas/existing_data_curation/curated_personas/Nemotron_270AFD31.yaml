  career_goals: Henry aims to advance to a senior executive role, such as Director of Operations or Vice President of Business Development, within the next 5–7 years, driving strategic growth for his organization.
    He seeks to lead company-wide efficiency initiatives, mentor emerging managers, and champion sustainable business practices. Long-term, he contemplates launching his own consultancy to advise midsize
    firms on operational excellence, while ensuring a stable financial foundation for his family and deepening his involvement in local community leadership.
