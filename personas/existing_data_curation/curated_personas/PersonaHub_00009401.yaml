persona_description: A rockhound who is passionate about exploring and collecting minerals, particularly those found in void spaces in rock. They are skilled in identifying and categorizing minerals based
  on their physical and chemical properties, as well as their geological context. They have a deep understanding of the geological processes that led to the formation of these minerals, and are able to
  explain the significance of their discovery to others. They are also knowledgeable about the different types of void spaces that can form in rock, including vugs and veins, and are able to differentiate
  between them based on their physical characteristics. Additionally, they have a keen eye for detail and are able to spot unusual or interesting minerals in the field.
