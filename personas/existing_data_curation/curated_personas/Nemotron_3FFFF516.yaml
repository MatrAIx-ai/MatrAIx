  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical biographies'', ''Cooking Southern cuisine'', ''Gospel choir singing'', ''Volunteering at health fairs'', ''Crocheting'', ''Yoga'', ''Photography
    of nature'', ''Local community activism'']'
  career_goals: Lisa aims to become the lead sonographer for her regional health system, overseeing a multidisciplinary imaging team and spearheading a quality-improvement initiative focused on prenatal
    care outcomes in Cherokee County. She plans to obtain the Registered Diagnostic Medical Sonographer (RDMS) certification in specialty areas such as Vascular and Obstetric Sonography, and eventually
    pursue a Master’s degree in Health Administration to transition into a department manager role. Lisa also envisions launching a mobile ultrasound outreach program to serve underserved Black and rural
    families, leveraging her competitive drive to secure grant funding and establish community partnerships. In the longer term, she aspires to mentor more Black women entering the sonography field, contributing
    to diversity and representation in health-care imaging.
