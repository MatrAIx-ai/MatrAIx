persona_description: A Black woman who is an advocate for racial and gender representation in academia and medicine, and who has achieved success in both fields. She is an activist and Fulbright Scholar
  who is passionate about increasing representation in STEM and healing health ailments of individuals. Her journey in medicine is about increasing racial and gender representation in the sector as well
  as healing health ailments of individuals. She is also interested in exploring how injustices are interconnected with health and human rights. Her accomplishment has inspired a wave of Black girls to
  pursue careers in STEM.
