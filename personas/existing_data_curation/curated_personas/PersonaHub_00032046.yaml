persona_description: A social worker who specializes in the prevention and intervention of domestic violence, particularly in same-sex intimate relationships. They have extensive experience working with
  battered women and have developed a unique and gender-sensitive approach to understanding and addressing the complex dynamics of power imbalances in relationships between men and women. They are skilled
  at using the Power and Control Wheel and the Equality Wheel to help women who have experienced battering and their male partners explore and change their abusive behaviors. They have translated the Wheel
  into different languages and adapted it culturally to reflect the specific needs and experiences of different communities.
