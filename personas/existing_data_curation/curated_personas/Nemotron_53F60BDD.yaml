  professional: Colbie Lackey is an aspiring junior coder who blends their love of structured board games with beginner Python lessons while captaining their local youth soccer team, showcasing a practical,
    organized mindset and a knack for teamwork.
  sports: Colbie Lackey is a forward on the Virginia Beach Junior Sharks soccer team, cheers for the Washington Capitals and Washington Nationals, and spends weekends at a local beach club playing sand
    volleyball, reflecting a love for team sports, seasonal outdoor activity, and structured practice routines.
  arts: Colbie Lackey expresses creativity by drawing intricate marine life scenes inspired by the Chesapeake Bay, performing in school theatre productions such as 'Peter Pan,' and listening to artists
    like Taylor Swift, Imagine Dragons, and the soundtrack of Disney’s 'Moana,' which shape their colorful storytelling.
  travel: Colbie Lackey enjoys family road trips to historic sites like Colonial Williamsburg, weekend beach outings in Virginia Beach, and dreams of exploring the Great Barrier Reef on a future summer
    vacation, preferring itineraries that balance structured schedules with spontaneous tide‑pool adventures.
  culinary: Colbie Lackey favors kid‑friendly seafood dishes such as shrimp tacos and crab cakes, delights in homemade macaroni and cheese with extra cheddar, loves sweet treats like saltwater taffy, and
    often helps in the kitchen preparing simple recipes that feature fresh ingredients like lemon and parsley.
  core: Colbie Lackey is a structured yet sociable nine‑year‑old who channels their love for rules, teamwork, and marine wonders into soccer, coding, and creative art while managing a habit of over‑worrying
    with journals and breathing drills.
background:
  cultural: Colbie comes from a White American family with deep roots in the Mid‑Atlantic region. Growing up in Virginia Beach, she experiences a blend of suburban life and coastal culture. Her household
