personas:
  professional: A seasoned nursing assistant with over three decades of direct patient support, Sasmita Persaud leverages meticulous vital‑sign measurement, precise medication assistance, and bilingual
    communication, and they mentor junior staff while driving quality‑improvement projects, all the while preserving a competitive edge and a structured workflow.
  sports: A regular participant in the local Golden Age walking club, Sasmita Persaud enjoys brisk nature‑trail hikes along the Kalamazoo River, they follow the Kalamazoo Wings hockey team and the Michigan
    State Spartans basketball squad, and they occasionally join a senior softball league, preferring structured routines over spontaneous sports.
  arts: An avid crocheter and classical music enthusiast, Sasmita Persaud spends evenings crafting intricate shawls to the strains of Raga Yaman by Pandit Ravi Shankar while reading historical biographies
    such as Walter Isaacson's "Steve Jobs," they also attend performances by the Kalamazoo Symphony Orchestra, finding solace in disciplined artistic expression.
  travel: A purposeful traveler, Sasmita Persaud has visited the Gujarat region in India to experience Diwali celebrations with family, explored Caribbean islands during a health‑outreach trip, and enjoys
    weekend road trips to Mackinac Island, yet they prefer well‑planned itineraries and tend to avoid last‑minute trips.
  culinary: A meticulous home cook, Sasmita Persaud prepares authentic biryani and dal makhani by timing each spice—cumin, coriander, cardamom—precisely, they often use fresh vegetables from their garden
    and serve aloo gobi alongside warm naan, while occasionally over‑seasoning when caught up in a nostalgic mood.
  core: Sasmita Persaud blends a lifelong devotion to structure with a love for cultural rituals, channeling their competitive spirit into precise caregiving, disciplined gardening, and exacting spice timing,
    even if occasional skepticism and a tendency to over‑plan sometimes slow them down.
background:
  cultural: Sasmita was born into an Indo‑Guyanese family; her grandparents migrated from India to Guyana before her parents moved to the United States in the early 1970s. Growing up in a multicultural
    household, she retained Hindi language skills and observed South Asian festivals such as Diwali and Phagwa while embracing Midwestern American customs. The blend of South Asian values—respect for elders,
    community service, and a strong work ethic—shapes her identity, and she remains active in Kalamazoo's Caribbean‑South Asian community, participating in cultural events and volunteer health outreach.
attributes:
