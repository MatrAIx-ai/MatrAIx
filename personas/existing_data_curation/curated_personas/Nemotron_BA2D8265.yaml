  hobbies: '[''Gardening (vegetable and flower beds)'', ''Crocheting/Knitting'', ''Reading historical and biographical novels'', ''Cooking South Asian cuisine'', ''Walking on local nature trails'', ''Listening
    to classical Indian music (sitar, tabla)'', ''Journaling'']'
  career_goals: Approaching retirement, Sasmita aims to transition into a part‑time supervisory role where she can lead quality‑improvement projects, mentor newer employees, and formalize her expertise
    by obtaining a Certified Nursing Assistant (CNA) credential. She also aspires to volunteer at community health fairs targeting the South Asian senior population in Kalamazoo, using her experience to
    promote preventive care and culturally competent health education. Her goal is to leave a structured, lasting impact on patient safety and staff development before fully stepping back from the workforce.
