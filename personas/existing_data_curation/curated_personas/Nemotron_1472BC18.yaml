personas:
  professional: Mercedes Rivera is an aspiring hospitality professional who leverages her bilingual communication, meticulous event coordination skills, and charismatic public speaking to run seamless campus
    festivals while simultaneously building a portfolio of social media content that showcases her knack for turning organized plans into engaging guest experiences.
  sports: Mercedes Rivera’s athletic routine blends sunrise yoga, competitive beach volleyball with the Myrtle Beach Beach Volleyball Club, and salsa dancing for cardio, and she cheers on the Coastal Carolina
    Chanticleers during basketball season, embodying a balanced, community‑focused fitness lifestyle.
  arts: Mercedes Rivera channels her creative energy through salsa and contemporary dance, captures coastal sunsets inspired by Annie Leibovitz’s storytelling style, and curates her Instagram feed with
    a soundtrack of Shakira and Gianna Francesca’s eclectic beats, making the arts a central thread of her personal brand.
  travel: Mercedes Rivera indulges her wanderlust by planning spontaneous road trips to coastal gems like Santorini and Key West, while she also documents local sunrise vistas at Myrtle Beach, favoring
    budget‑friendly itineraries that leave room for impromptu photo sessions of cultural festivals.
  culinary: Mercedes Rivera loves cooking family‑inspired shrimp‑infused corn‑tortilla tacos and citrus‑marinated fish ceviche, often adding a dash of chipotle to create bold, seaside flavors, and she rates
    her culinary experiments on a color‑coded page in her bullet journal.
  core: Mercedes Rivera is a talkative, hyper‑organized 18‑year‑old who seamlessly blends her love for dance, beach volleyball, and meticulous planning into a calm, resilient personality that relentlessly
    pursues a future boutique event venue while occasionally over‑booking her calendar with social events.
background:
  cultural: Mercedes is a first‑generation Mexican‑American raised in a bilingual household, where Spanish and English are spoken interchangeably. She grew up celebrating Mexican traditions such as Día
    de los Muertos, Cinco de Mayo, and family gatherings featuring authentic cuisine, while also embracing the Southern hospitality and beach culture of Myrtle Beach, South Carolina. Her cultural identity
    blends Mexican values of family, community, and festive celebration with the relaxed, service‑oriented ethos of the coastal South. This hybrid background informs her love for food, music, and community
    events, and fuels her ambition to integrate Mexican cultural flair into the hospitality industry she hopes to lead.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Event coordination and planning'', ''Public speaking and group facilitation'', ''Customer service in hospitality settings'', ''Problem solving
    and conflict resolution'', ''Crisis management and calm under pressure'', ''Social media content creation'', ''Basic bookkeeping and budgeting'', ''Digital photography'']'
  hobbies: '[''Salsa and contemporary dancing'', ''Beach volleyball'', ''Sunrise yoga'', ''Travel and landscape photography'', ''Cooking Mexican cuisine with coastal influences'', ''Volunteer event organization'',
    ''Bullet journaling'', ''Reading business and self‑development books'', ''Social media content creation'', ''Attending local concerts and festivals'']'
  career_goals: Mercedes aims to complete an associate’s degree in Business Administration with a focus on Hospitality Management at Horry‑Georgetown Technical College, followed by a bachelor’s degree.
    She plans to secure an internship at a Myrtle Beach resort to gain hands‑on experience in operations and guest services. In the next five years, she aspires to become a front‑desk supervisor and then
    a hotel manager, leveraging her organizational skills and sociable nature to lead a team. Long‑term, she envisions launching her own boutique event venue that blends Mexican cultural flair with Southern
    coastal hospitality, offering curated experiences for both locals and tourists. She also hopes to mentor other young, bilingual professionals entering the hospitality industry.
