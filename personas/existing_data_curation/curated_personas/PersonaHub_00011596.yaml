persona_description: A professional electrician or a facility manager who is responsible for maintaining and managing power systems in industrial, commercial, and residential settings. They are familiar
  with the principles of power quality, current flow, and grounding issues, and are skilled in troubleshooting and identifying the sources of unwanted current flow in power systems. They are aware of the
  importance of safety and reliability in power systems and are trained to use current transformers and flexible current probes to accurately measure and trace the source of unwanted current flow. They
  are also aware of the challenges of tracking down the source of unwanted ground current in facilities and the potential consequences of grounding a facility carrying large amounts of current.
