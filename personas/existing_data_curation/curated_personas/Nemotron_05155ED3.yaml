personas:
  professional: Abdul Fields is an aspiring junior game developer who blends meticulous LEGO engineering with vivid cartoon sketches and early piano melodies; they use Scratch to craft simple games while
    applying a disciplined, achievement‑focused mindset to every creative project.
  sports: Abdul Fields dribbles enthusiastically for the Seattle Youth Soccer Association U10 team, cheers on the Seattle Sounders FC during family outings, and spends weekends hiking the trails of Discovery
    Park to build stamina; they balance a love of team play with personal fitness goals.
  arts: Abdul Fields immerses themselves in cartoon creation inspired by classic Disney characters, draws tranquil landscapes reminiscent of Bob Ross, practices piano pieces by Ludwig van Beethoven and
    improvises to jazz legends like Miles Davis and soulful tracks from Aretha Franklin; they weave these influences into a vibrant personal artistic identity.
  travel: Abdul Fields enjoys family road trips to the misty cliffs of the Olympic Peninsula, weekend excursions to the iconic Space Needle, and dreams of exploring the neon streets of Tokyo to sketch towering
    skylines and taste authentic sushi rolls; they cherish each adventure as a chance to blend curiosity with cultural discovery.
  culinary: Abdul Fields loves homemade pepperoni pizza and often perfects a simple mac‑and‑cheese on the stovetop; they delight in helping bake chocolate chip cookies, favoring fresh basil, mozzarella,
    and a dash of oregano in their favorite dishes.
  core: Abdul Fields is a curiosity‑driven nine‑year‑old who balances meticulous LEGO building, sketching cartoon heroes, and composing piano snippets, yet they can be stubbornly detail‑oriented, sometimes
    turning a simple game project into an all‑night coding marathon.
background:
  cultural: Abdul is an African‑American boy raised in Seattle. His family honors Black cultural traditions such as storytelling, music, and community gatherings while also embracing the Pacific Northwest
    lifestyle of outdoor exploration and multicultural events. He celebrates Juneteenth and Kwanzaa, participates in local community‑center art programs, learns about civil‑rights history through school
    projects, enjoys a blend of soul food and regional dishes like salmon, and draws inspiration from both his heritage and the diverse Seattle community.
