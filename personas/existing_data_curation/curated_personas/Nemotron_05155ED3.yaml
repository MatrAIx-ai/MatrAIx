  career_goals: Abdul dreams of becoming an astronaut or aerospace engineer who designs devices that help people explore space safely. He also imagines himself as a museum curator or artist who shares stories
    of scientific discovery and cultural heritage, hoping to inspire other kids to appreciate both art and science.
