    education'']'
  hobbies: '[''Vietnamese cooking and recipe innovation'', ''Yoga and mindfulness meditation'', ''Hiking in Blue Hills and coastal trails'', ''Community volunteering for financial literacy'', ''Karaoke
    and cultural gatherings'', ''Exploring indie art galleries'', ''Reading non‑fiction on personal finance and self‑improvement'']'
  career_goals: Violeta aims to advance to a senior loan officer or branch manager position within the next three years, leveraging her structured approach to boost team performance and portfolio health.
    She plans to earn the Certified Credit Counselor (CCC) and Certified Financial Planner (CFP) designations to deepen her expertise. Long‑term, she aspires to develop a community‑focused financial‑literacy
    program for Southeast Asian immigrant families in Boston, marrying her competitive drive with a desire to create measurable credit‑score improvements for underserved borrowers.
