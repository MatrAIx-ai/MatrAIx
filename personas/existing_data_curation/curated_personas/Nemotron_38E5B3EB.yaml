  hobbies: '["Fishing", "Birdwatching", "Reading historical non‑fiction", "Reading business strategy books", "Classic car restoration", "Gardening", "DIY home improvement"]'
  career_goals: Daniel aims to transition from frontline courier work into a supervisory logistics role, such as a dispatch manager or regional operations coordinator, where he can apply his organizational
    strengths to improve fleet efficiency and service reliability. He is pursuing a supply‑chain management certification to bolster his credentials and is exploring the possibility of launching a small,
    family‑owned courier business that emphasizes punctuality and personalized service. Ultimately, his ambition is to secure a stable, higher‑earning position that provides financial security for his wife
    and allows him to mentor younger drivers.
