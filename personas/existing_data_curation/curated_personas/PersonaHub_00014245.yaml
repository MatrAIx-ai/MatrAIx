persona_description: A scientist or researcher interested in the study of mycobacteria, particularly the biology and biochemistry of mycobacterial biofilms and their tolerance to environmental stress. They
  are interested in developing methods for culturing and studying mycobacterial biofilms and are looking for a clear and concise protocol for growing mycobacterial biofilms in a bottle and a 12-well plate
  format. They are also interested in understanding the molecular mechanisms underlying the characteristic phenotype of M. tuberculosis and Mycobacterium smegmatis, which require specific conditions to
  form mature biofilms. They are looking for a method that can be extended to grow biofilm of other culturable mycobacterial species.
