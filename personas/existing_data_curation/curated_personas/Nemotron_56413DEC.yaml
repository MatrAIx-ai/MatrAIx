  career_goals: Shequita aspires to a career that merges her desire to help others with her practical skills. She hopes to become a mental health counselor or social worker focused on youth, using her empathy
    to support peers through emotional challenges. She also considers nursing as a path that blends caregiving with scientific curiosity. In the short term, she aims to graduate high school with a strong
    academic record, earn a scholarship, and join mentorship programs that support Black girls in STEM and health fields. She is motivated to develop coping strategies for her anxiety, envisioning herself
    as an advocate for mental health awareness within her community.
