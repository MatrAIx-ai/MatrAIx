personas:
  professional: Shequita Riverarojas is a budding speculative fiction writer who channels their curiosity into daily journal entries and short stories, weaving themes of identity and self‑discovery while
    balancing a pragmatic school schedule with a quiet, organized workspace.
  sports: Shequita Riverarojas enjoys casual jogging on the local park’s paved trail and participates in the middle school’s cross‑country team, cheering for the hometown high school basketball squad, the
    Oakridge Tigers, while also tending to the community garden, which provides low‑impact cardio and a sense of grounding.
  arts: Shequita Riverarojas actively sketches characters inspired by the works of Becky Chambers and Octavia Butler, plays acoustic guitar chords to the tunes of early Taylor Swift and indie folk artist
    Sufjan Stevens, and attends an after‑school art club where they experiment with digital illustration on a tablet, enriching their creative identity.
  travel: Shequita Riverarojas dreams of exploring the misty forests of the Pacific Northwest after reading The Martian, has visited the nearby coastal state park for weekend hikes, and hopes to attend
    the annual sci‑fi convention in San Diego, balancing a small travel budget with parental permission for trips.
  culinary: Shequita Riverarojas bakes cupcakes with their mother, experimenting with flavors like lavender honey, matcha white chocolate, and salted caramel swirl, while moderating editing on cooking videos
    for a school club, yet they often forget to clean the kitchen promptly, resulting in occasional clutter.
  core: Shequita Riverarojas is a curious, organized teen who channels intense emotions into writing, art, and gentle guitar strums, balancing a cautious approach to money with occasional impulsive splurges,
    and finds comfort in solitary pursuits while navigating anxiety.
background:
  cultural: Shequita is a Black teenager raised in High Point, North Carolina, where the African‑American community blends Southern traditions with a vibrant cultural renaissance. Her family is active in
    a historically Black church, where gospel music, storytelling, and community service are central. She celebrates Juneteenth and local Black heritage festivals that emphasize resilience and pride. Southern
    cuisine—collard greens, cornbread, sweet‑potato pie—features in weekly family meals, linking her to intergenerational cooking practices. A close‑knit extended family provides emotional support, shaping
    her cooperative and harmony‑seeking nature. Growing up in Guilford County, she is also influenced by the city’s arts scene, public libraries, and youth programs such as the Boys & Girls Club, which
    encourage academic achievement and cultural expression. These influences nurture her curiosity, practical outlook, and deep empathy while grounding her identity within a supportive Black community.
