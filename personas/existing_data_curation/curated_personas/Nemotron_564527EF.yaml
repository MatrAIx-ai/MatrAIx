personas:
  professional: Sebastian Mena is a budding digital artist and aspiring game designer who merges his passion for LEGO construction with tablet‑based drawing apps to prototype fantastical worlds, yet often
    procrastinates on saving projects because they resist rigid schedules.
  sports: Sebastian Mena darts across the playground dribbling a soccer ball for the Peach Springs Desert Rovers youth club, cheering on the Arizona Cardinals and Phoenix Suns on weekends, and treats each
    game as a creative improv session rather than a rigid drill.
  arts: Sebastian Mena loses themselves in drawing epic fantasy scenes inspired by Hayao Miyazaki films and the vibrant rhythms of Shakira, while also mimicking their favorite Roblox creators and performing
    in school drama productions that echo the theatrical flair of Lin‑Manuel Miranda.
  travel: Sebastian Mena dreams of camping under the stars at Grand Canyon’s rim after weekend hikes in Peach Springs, while also yearning to explore Tokyo’s neon districts and the sand dunes of Morocco,
    but their family’s modest budget makes spontaneous trips rare, so they plan detailed day‑trips with a hand‑drawn itinerary.
  culinary: Sebastian Mena loves the bold zest of tacos al pastor and the cheesy comfort of mac & cheese, often experimenting with guacamole and mango salsa while wielding a child‑sized kitchen knife to
    slice strawberries for a snack, yet their cooking skill remains at the enthusiastic‑beginner level, relying heavily on their mom’s recipes.
  core: Sebastian Mena’s boundless imagination fuels relentless creation in art and games, yet a habit of misplacing school worksheets and forgetting medication reveals a charmingly chaotic side.
background:
  cultural: Sebastian grows up in a mixed cultural environment that blends his Hispanic heritage with the unique community of Peach Springs on the Hualapai reservation. At home, Spanish is spoken alongside
    English, and family traditions such as Día de los Muertos, quinceañera celebrations, and weekend meals featuring tacos, tamales, and arroz con pollo are common. He participates in local community events,
    where he learns about the desert landscape and Hualapai customs, fostering a respect for indigenous art and storytelling. This multicultural backdrop informs his creative expression, often incorporating
    vibrant colors, symbolic patterns, and folklore from both his Latino roots and the surrounding Native American culture.
