  career_goals: Sebastian imagines a future where he can turn his vivid ideas into visual stories, aiming to become an animator or digital artist. He is also fascinated by new technologies and virtual worlds,
    expressing interest in game development or robotics design. He hopes to use his creativity to inspire others, perhaps as a teacher or community arts leader on the reservation, blending his cultural
    heritage with innovative art forms.
