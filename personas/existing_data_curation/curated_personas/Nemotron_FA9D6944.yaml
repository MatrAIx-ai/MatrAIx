personas:
  professional: Quentin Johnson, a budding architect in the making, spends hours stacking wooden blocks and sketching simple floor plans, channeling their natural curiosity and practical mindset into playful
    creativity while delighting in the flexibility of unstructured play, and they often share their tower creations with peers.
  sports: Quentin Johnson, a lively three-year-old, darts around the Havre de Grace waterfront park with a bright orange toddler soccer ball, proudly dons a miniature Baltimore Ravens jersey, and they join
    a local preschool soccer circle that practices every spring.
  arts: Quentin Johnson, a budding artist, loves splashing vibrant colors on Crayola sketchbooks while humming along to Stevie Wonder and Marvin Gaye, and they often reenact playful dance moves from the
    family’s soulful playlists during preschool performances, delighting in the rhythmic energy that fuels their imagination.
  travel: Quentin Johnson, an adventurous toddler, eagerly anticipates weekend trips to the nearby historic waterfront and the Baltimore National Aquarium, while they daydream about a future family vacation
    to Disney World and the sandy shores of the Bahamas, preferring the spontaneity of park picnics over meticulously scheduled itineraries.
  culinary: Quentin Johnson, who adores the comforting flavors of mac & cheese, fried chicken, and sweet-potato fries, proudly helps stir batter for banana pancakes under their parents' watchful eye and
    they request extra collard greens at family gatherings, often smearing sauce on their cheek with a delighted grin.
  core: Quentin Johnson, a curious yet delightfully disorganized three-year-old, they balance boundless energy with a penchant for hoarding shiny coins in their pockets, occasionally forgetting to keep
    their toys tidy.
background:
  cultural: Quentin is raised in an African‑American family in Havre de Grace, Maryland. His parents incorporate cultural traditions such as soulful music, family meals that feature Southern-inspired dishes,
