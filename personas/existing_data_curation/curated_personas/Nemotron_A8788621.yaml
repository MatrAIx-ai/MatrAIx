personas:
  professional: Jennifer Stein, a senior IT professional with deep expertise in legacy mainframe, database administration, and network infrastructure, channels their love of routine into meticulously crafted
    standard operating procedures, Lean‑driven process improvements, and detailed documentation, positioning themselves for a future Director of IT role while mentoring women in tech.
  sports: Jennifer Stein spends Saturday mornings hiking the Oswego County Nature Preserve with their spouse, is an active member of the Syracuse Outdoor Hiking Club, and passionately supports the Buffalo
    Bills during football season and the New York Mets in baseball, while occasionally joining a senior walking group for low‑impact cardio.
  arts: Jennifer Stein nurtures their creative side by knitting intricate scarves while listening to folk legends like Bob Dylan and classical arias by Maria Callas, and they draw inspiration from the timeless
    paintings of Norman Rockwell, which often influence the nostalgic family recipes they bake each evening.
  travel: Jennifer Stein prefers meticulously planned weekend getaways, often exploring the Finger Lakes wine trail or hiking the Adirondack peaks with their spouse, and they aspire to join a small, guided
    culinary tour of Tuscany in Italy, balancing their love of routine with occasional adventurous flair.
  culinary: Jennifer Stein, an avid home baker, delights in preparing classic apple pie and rosemary‑infused roasted vegetables harvested from their garden, while their intermediate cooking skills enable
    them to craft hearty mushroom risotto and seasonal vegetable stews that reflect a practical yet nostalgic palate.
  core: Jennifer Stein blends meticulous routine with quiet creativity, steering their senior IT career and community service with methodical precision while savoring the comfort of gardening, baking, and
    small‑group hikes.
background:
  cultural: Jennifer grew up in a modest, middle‑class family in upstate New York, rooted in a Protestant (largely Methodist) community that values hard work, practicality, and modesty. Her ancestry traces
    back to Northern European (German and English) immigrants who settled the region in the early 20th century. The cultural emphasis on self‑reliance, community involvement, and respect for tradition shaped
    her preference for routine and her practical outlook. Living in the small hamlet of Phoenix, NY, she maintains strong ties to local customs, participates in seasonal town gatherings, and embraces the
    close‑knit, neighborly spirit characteristic of rural Oswego County. As a white woman in a traditionally male‑dominated STEM field, she also carries a sense of responsibility to mentor future generations,
    blending her cultural heritage of service with her professional dedication.
attributes:
  skills: '[''Legacy System Maintenance'', ''Database Administration (SQL Server, Oracle)'', ''Network Infrastructure Management (Cisco, VLAN, Firewall)'', ''Structured IT Project Management (Waterfall/Hybrid)'',
