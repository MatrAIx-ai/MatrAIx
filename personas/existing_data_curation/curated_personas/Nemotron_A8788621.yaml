    Management and Negotiation'', ''Team Leadership and Mentorship'']'
  hobbies: '[''Vegetable Gardening'', ''Baking Traditional Recipes'', ''Crossword Puzzles'', ''Sudoku'', ''Knitting'', ''Hiking Local Trails'', ''Small‑Group Volunteer Teaching (Computer Literacy)'', ''Reading
    Historical Fiction and Biographies'']'
  career_goals: Jennifer aims to transition into a strategic technology leadership role, such as Director of IT or Chief Information Officer, where she can guide the organization’s digital transformation
    while preserving the reliability of existing infrastructure. She is focused on building a formal mentorship program for women and underrepresented groups in her company, ensuring a pipeline of talent
    that reflects her commitment to inclusion. Over the next five years, she plans to obtain certifications in Cloud Architecture (AWS) and Advanced Cybersecurity (CISSP) to broaden her expertise. Ultimately,
    she envisions a phased move toward consulting, offering her practical, routine‑driven approach to small‑to‑mid‑size firms in upstate New York, while maintaining a balanced work‑life rhythm that supports
    her family and community commitments.
