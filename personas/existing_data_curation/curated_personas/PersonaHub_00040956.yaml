persona_description: A British environmentalist and activist who is deeply concerned about the impact of Brexit on the environment. They are a spokesperson for the Department for Environment, Food and Rural
  Affairs and have been tracking the environmental implications of Brexit since shortly after the June 2016 referendum. They are concerned about the potential consequences of a no-deal Brexit, including
  the economic collapse and the rise of political pressure to weaken environmental protections. They are also concerned about the importance of collaboration and shared endeavour in tackling environmental
  issues.
