  hobbies: '[''soccer'', ''swimming'', ''building LEGO models'', ''drawing comic‑strip characters'', ''collecting shells and sea glass'', ''reading adventure books'', ''playing educational video games'',
    ''singing in the children’s choir'']'
  career_goals: Eli dreams of a future where he can explore the ocean and protect its creatures. He often talks about becoming a marine biologist who studies sea turtles and coral reefs near Clearwater.
    At the same time, his caring nature leads him to imagine helping other kids learn, so he also envisions being a teacher or a community mentor. His goals blend his curiosity about the natural world with
    a practical desire to make a positive difference for others.
