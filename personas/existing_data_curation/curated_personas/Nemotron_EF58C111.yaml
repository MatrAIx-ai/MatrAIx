personas:
  professional: Eli Johnson is an aspiring junior mechanical engineer who loves constructing LEGO machines, applying their practical problem‑solving skills and easygoing, collaborative spirit to turn imaginative
    designs into tangible creations.
  sports: Eli Johnson dashes onto the local park’s soccer field each Saturday for the Mapleleaf United youth league, eagerly shoots goals while cheering for the Chicago Cubs during baseball season, and
    spends summer afternoons swimming laps at the community pool, often imagining themselves as a future Olympian diver.
  arts: Eli Johnson sketches daring comic‑strip heroes inspired by Stan Lee’s Marvel characters and Jim Davis’s Garfield, while their voice rings out in the church choir alongside gospel legends like Kirk
    Franklin and contemporary pop icons such as Ariana Grande, weaving a vivid tapestry of visual and musical influences into their playtime.
  travel: Eli Johnson loves spontaneous family road trips to the shoreline of Myrtle Beach where they hunt for shells, dreams of kayaking through the turquoise waters of New Zealand’s Bay of Islands, and
    eagerly watches travel videos of Yellowstone’s geysers, preferring relaxed, hands‑on adventures over rigid itineraries.
  culinary: Eli Johnson is a budding kitchen helper who can whisk up buttery macaroni‑and‑cheese, assemble fish tacos seasoned with lime, cilantro, and a dash of sea salt, and loves munching on fresh pineapple
    chunks and chocolate‑chip cookies, though they sometimes forget to wash their hands before cooking.
  core: Eli Johnson is an endlessly energetic, playful explorer who blends a love for building LEGO machines, scoring soccer goals, and singing gospel, all while juggling a delightfully disorganized habit
    of leaving projects half‑finished in pursuit of the next adventure.
background:
  cultural: Eli is a Black boy growing up in Clearwater, Florida, where his family maintains close ties to the local African‑American community. He attends a historically Black Baptist church, where he
    participates in youth gatherings, gospel music, and community service projects. Family traditions include weekend meals featuring soul food dishes, storytelling sessions about their Southern heritage,
    and celebrating events such as Juneteenth and Kwanzaa. The multicultural, tourist‑rich environment of Clearwater also exposes him to a diverse range of cultures, but he remains rooted in the values
    of mutual respect, cooperation, and community harmony that are emphasized in his cultural upbringing.
