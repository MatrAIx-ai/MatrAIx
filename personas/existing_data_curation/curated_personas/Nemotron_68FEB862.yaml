  hobbies: '[''watercolor painting'', ''reading contemporary fiction and poetry'', ''herb and flower gardening'', ''experimental cooking and fusion cuisine'', ''participating in a senior book club'', ''volunteering
    with craft workshops'', ''attending virtual art and cultural talks'', ''light yoga and meditation'']'
  career_goals: Although retired from formal employment, Sushilaben aims to leave a lasting cultural imprint on her community and family. She plans to compile a family cookbook that blends South Asian recipes
    with Midwestern flavors, preserving culinary heritage for future generations. She aspires to mentor grandchildren and local youth in storytelling and basic art techniques, fostering intergenerational
    creativity. Sushilaben also hopes to organize an annual multicultural art exhibit at the Oxford senior center and to volunteer regularly at the local library's language outreach program, helping new
    immigrants adjust to life in Michigan. Maintaining personal health and continuing to explore new artistic mediums remain central to her long‑term personal ambitions.
