  hobbies: '["visiting art galleries and street murals", "sketching and fabric dyeing", "community dance classes (salsa, folkloric Nicaraguan)", "reading art history and design blogs", "cooking traditional
    Nicaraguan meals", "listening to acoustic music", "reading poetry", "exploring local farmers markets"]'
  career_goals: Jacqueline wishes to move from line cutter to a supervisory role where she can mentor newer cutters and influence workflow decisions, while still preserving some flexibility to attend community
    art workshops. She is also interested in obtaining her GED and taking a short course in computer‑aided design (CAD) for apparel, hoping to one day design her own line of culturally inspired clothing.
    A secondary ambition is to start a modest side business creating custom‑cut garments for friends and local markets, blending her cutting expertise with her love of art.
