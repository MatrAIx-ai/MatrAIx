personas:
  professional: Tommy Avant, a high‑school senior and emerging visual communicator, leverages self‑taught illustration, digital art tutorials, and adept project‑management to spearhead his school’s art‑club
    murals and showcase events, reflecting his organized curiosity and outgoing leadership style.
  sports: Tommy Avant plays pickup basketball at the Severn community park every Saturday, cheers for the Washington Wizards and the Maryland Terrapins during televised games, and participates in the school’s
    intramural league as a point guard, channeling their energetic sociability into fast‑break drills and team camaraderie.
  arts: Tommy Avant immerses themselves in comic‑book illustration, digital painting tutorials on YouTube, and street photography, drawing inspiration from artists like Alex Ross and musicians such as Mac
    DeMarco and Tame Impala, while curating murals with the school art club and organizing monthly showcase events.
  travel: Tommy Avant enjoys weekend photo‑walks in Baltimore’s Inner Harbor and day trips to Washington, D.C., dreams of attending the Tokyo Comic‑Con to meet manga creators, and plans a budget‑friendly
    road trip to Shenandoah National Park for a blend of nature and sketching sessions.
  culinary: Tommy Avant prefers quick comfort foods like pepperoni pizza and chicken teriyaki ramen, experiments with avocado toast topped with toasted sesame seeds, and enjoys matcha lattes while sketching,
    but frequently forgets to eat regular meals, leading to late‑night snack binges of chips and chocolate.
  core: Tommy Avant fuses a restless creative spark with disciplined organization, turning teenage anxiety into prolific art, community leadership, and a constant quest for calm.
background:
  cultural: 'Tommy was raised in a middle‑class, predominantly White suburban neighborhood in Severn, Maryland. His family’s cultural traditions blend typical Mid‑Atlantic American customs with regional
    influences from the Chesapeake Bay area, such as summer trips to the shoreline and participation in community fairs. He grew up attending a local public school where the curriculum emphasized civic
    duties and community service, fostering a sense of local pride. Though his immediate environment is relatively homogeneous, the proximity to Baltimore and Annapolis has exposed him to a modest degree
    of cultural diversity, including occasional interactions with African‑American, Hispanic, and immigrant families during community events and library volunteer work. His upbringing emphasized hard work,
    respect for personal responsibility, and an appreciation for the arts, reflected in family outings to regional museums and concerts. This background shapes his worldview: a blend of suburban American
    values, an affinity for community engagement, and an openness to new artistic ideas.'
attributes:
