  hobbies: '[''drawing/comic art'', ''digital art tutorials'', ''photography'', ''school art club participation'', ''organizing art showcases'', ''basketball'', ''listening to indie music'', ''reading science‑fiction'',
    ''guided meditation'', ''mindfulness journaling'', ''volunteering at public library youth art workshops'', ''exploring video game design (Unity)'']'
  career_goals: Tommy aspires to turn his passion for art and organization into a career in visual communication. He aims to enroll in a community college program in graphic design or multimedia arts within
    the next two years, eventually transferring to a four‑year university to earn a Bachelor of Fine Arts. He dreams of working as a junior designer at a creative agency where he can blend his artistic
    skills with project‑management duties. In the long term, Tommy hopes to lead a creative team, develop branding campaigns for local businesses, and perhaps launch his own freelance studio that offers
    both design services and community workshops. He also wants a stable income that allows him to manage his stress and support his family, so he is exploring internship opportunities in design firms and
    part‑time roles in local museums or cultural centers.
