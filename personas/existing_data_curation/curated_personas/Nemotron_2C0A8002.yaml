personas:
  professional: Hansel Quesada, a retired community event planner turned volunteer cultural archivist, blends meticulous organization with boundless imagination to coordinate a grassroots archive of the
    Puerto Rican diaspora, and they mentor youth storytellers while shaping programming at the local cultural center.
  sports: Hansel Quesada, a dedicated member of the Central Florida Walking Club, explores the natural trails around Casselberry on most mornings, follows the Orlando Magic and Orlando City SC with avid
    enthusiasm, and they enjoy occasional pickleball games at the senior community center, using light stretching to balance their joint concerns.
  arts: Hansel Quesada, an abstract watercolor painter who regularly attends performances at the Orlando Repertory Theatre, draws inspiration from the bold colors of Frida Kahlo and the rhythmic energy
    of Celia Cruz's salsa, and they create digital storytelling videos that weave Caribbean folklore with historic imagery, showcasing their love for both visual and performing arts.
  travel: Hansel Quesada, an avid traveler who has toured historic San Juan, explored the rainforests of Puerto Rico's El Yunque, taken a day trip to the Everglades, and they dream of visiting Havana's
    Old City and the Galapagos Islands, they prefer moderate-budget itineraries with family or volunteer groups, and they meticulously plan each journey with a detailed itinerary and a backup train ticket.
  culinary: Hansel Quesada, a master of classic Puerto Rican cuisine, expertly prepares arroz con gandules, lechon asado, and mofongo seasoned with sofrito and adobo, boasts a proficient skill level in
    the kitchen, and they delight in sourcing fresh plantains, ripe mangoes, and locally roasted coffee beans for family gatherings.
  core: Hansel Quesada, a 72-year-old imaginative organizer who paints, tells stories, mentors volunteers, and they hoard watercolor tubes like treasure, living by a blend of disciplined routine and spontaneous
    creativity.
background:
  cultural: Hansel was born in Puerto Rico and moved to Florida in his early adulthood, bringing with him strong family ties, Catholic traditions, and a deep appreciation for island festivities such as
    Noche de San Juan and the yearly San Sebastián parade. He maintains bilingual fluency, preserving Puerto Rican idioms and customs while also embracing the multicultural environment of Seminole County.
    His cultural identity informs his love of music, dance, food, and storytelling, and fuels his commitment to fostering a vibrant Puerto Rican presence in the local community.
