  career_goals: He aims to transition from his current role as an industrial production manager to a senior operations leadership position, such as Director of Manufacturing or Vice President of Operations,
    where he can drive large-scale digital transformation initiatives and embed sustainable, eco-efficient practices across multiple facilities. He also aspires to spearhead the adoption of smart-factory
    technologies, mentor emerging engineers, and eventually establish a cross-continental production network that leverages both U.S. and East Asian expertise. Long-term, he envisions contributing to industry
    standards bodies and publishing case studies on resilience-focused manufacturing.
