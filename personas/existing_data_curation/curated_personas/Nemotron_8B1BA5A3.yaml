  hobbies: '[''cooking Spanish cuisine'', ''community folk dancing'', ''watching soccer matches'', ''fishing'', ''gardening'', ''playing card games'', ''volunteering at church and senior center'', ''listening
    to classic Spanish music'', ''walking/hiking'']'
  career_goals: Santos aims to transition into a part‑time supervisory or mentor role where he can pass on his practical knowledge to younger staff while reducing the physical strain of full‑time material
    moving. He also hopes to secure a stable retirement income, possibly by starting a small weekend venture selling traditional Spanish dishes at local fairs. Maintaining good health, staying socially
    active in his community, and ensuring his family’s financial security are also top priorities.
