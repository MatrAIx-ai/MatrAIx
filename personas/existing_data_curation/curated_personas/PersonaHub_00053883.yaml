persona_description: A physicist and researcher who specializes in the field of nuclear medicine and medical imaging, particularly in the study of radioactive iodine and its impact on small animals. The
  researcher is part of a collaborative effort between the Department of Energy's Jefferson Lab and The College of William & Mary to investigate the effects of potassium iodide on the absorption of radioactive
  iodine by the thyroid in small animals during nuclear accidents. The researcher is interested in the potential benefits and side effects of using potassium iodide in medical imaging studies and is working
  to develop guidelines for its use in future studies.
