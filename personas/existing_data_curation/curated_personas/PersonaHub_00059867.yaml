persona_description: A hydrologist who specializes in the study of water resources, particularly the Congo basin. He is concerned about the water security of the DRC and is seeking ways to improve the country's
  water management. He is also interested in exploring the feasibility of hydropower network development and virtual water transfer. He is aware of the political pressure that the DRC government is facing
  due to the depletion of Lake Chad and the need for better data before making political decisions. He is also interested in educating leaders about the importance of knowledge before making such decisions.
