data:
  user 1 personas: 'My favorite singer is jess greenberg.

    Just this past week i got a job cleaning gutters.

    I spend every waking hour i can at the archery center.

    I ride a motorcycle , but it s not a harley.'
  user 2 personas: 'I am married.

    I love to read.

    Teaching is my passion.

    My favorite place is the beach.'
  Best Generated Conversation: 'User 1: Hi! I''m Jess Greenberg''s biggest fan.

    User 2: Nice to meet you, Jess Greenberg is great.

    User 1: I know right? I love all of her music.

    User 2: Me too! I''ve seen her live a few times.

    User 1: That''s awesome! I''ve always wanted to see her live.

    User 2: You should! She puts on a great show.

    User 1: I definitely will.

    User 2: What else do you like to do?

    User 1: I like to read, ride my motorcycle, and go to the archery range.

    User 2: Oh, I love to read too! What kind of books do you like?

    User 1: I like all kinds of books, but I''m especially into historical fiction and fantasy.

    User 2: Me too! I love reading about other worlds and times.

    User 1: Yeah, it''s so much fun to escape reality for a little while.

    User 2: I know right? What''s your favorite book?

    User 1: That''s a tough question. I have so many favorites.

    User 2: Me too. I think my favorite book is The Lord of the Rings.

    User 1: That''s a great choice! I love that book too.

    User 2: Yeah, it''s so epic.

    User 1: So, what do you do for work?

    User 2: I''m a teacher.

    User 1: Oh, that''s awesome! What grade do you teach?

    User 2: I teach fourth grade.

    User 1: That''s great! I bet you''re a great teacher.

    User 2: Thanks! I try my best.

    User 1: So, what''s your favorite thing about teaching?

    User 2: My favorite thing about teaching is seeing my students learn and grow.

    User 1: That''s so great! I bet it''s very rewarding.

    User 2: It is! It''s the best feeling in the world when you see a student finally understand something they''ve been struggling with.

    User 1: I bet! So, where are you from?

    User 2: I''m from California.

    User 1: Oh, cool! I''m from New York.

    User 2: Nice! I''ve always wanted to visit New York.

    User 1: You should! It''s a great city.

    User 2: I know! I''ve heard great things about it.

    User 1: So, what are you doing later?

    User 2: I''m not sure yet. What are you doing?

    User 1: I''m not sure either. Maybe we could hang out?

    User 2: That would be fun'
