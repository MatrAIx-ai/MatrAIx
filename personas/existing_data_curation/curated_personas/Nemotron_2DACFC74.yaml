  hobbies: '[''Home gardening (peppers, tomatoes, herbs)'', ''Horse riding'', ''Fishing'', ''Cooking traditional Mexican dishes'', ''Volunteering at the community garden'', ''Attending agricultural fairs'',
    ''Woodworking'', ''Listening to ranchera and mariachi music'']'
  career_goals: Carlos aims to sustain and expand his family’s farm while integrating environmentally friendly practices such as drip‑irrigation and organic pest management. He plans to acquire adjacent
    acreage to diversify into specialty crops like heirloom beans and chilies, honoring his Mexican heritage. Over the next five years, he hopes to mentor younger farmers in the community, sharing his practical
    expertise through workshops and a seasonal mentorship program. Ultimately, he envisions transitioning part of his operation into a value‑added product line—such as artisanal cheese or salsa—to create
    a legacy that blends tradition with modern market opportunities.
