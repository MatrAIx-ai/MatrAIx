persona_description: A global advocate for disarmament and non-proliferation, particularly focusing on the importance of parliaments and MPs in achieving a nuclear-weapons-free world. The individual is
  passionate about promoting the implementation of the Comprehensive Nuclear-Test-Ban Treaty and strengthening the Nuclear Proliferation Treaty regime. They are committed to encouraging governments to give
  up weapons of mass destruction and preventing WMD from falling into the hands of non-state actors. The persona is also actively engaged with groups such as Parliamentarians for Nuclear Non-proliferation
  and Disarmament and the Parliamentary Forum on Small Arms and Light Weapons, and has worked alongside the United Nations Office for Disarmament Affairs and the World Future Council to recognize the world's
  best disarmament policies.
