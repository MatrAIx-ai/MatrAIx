  hobbies: '[''Gardening'', ''Knitting and crocheting'', ''Reading mystery and historical fiction'', ''Walking along the Chesapeake waterfront'', ''Cooking and experimenting with regional recipes'', ''Volunteering
    at local church and senior‑care programs'', ''Birdwatching'', ''Listening to classic jazz and folk music'']'
  career_goals: Ines aims to secure a part‑time position with a reputable cleaning agency that offers a predictable schedule, reducing the stress that irregular hours have caused in the past. She plans
    to obtain a Certified Professional Cleaner credential with a focus on eco‑friendly practices, which will both improve client health and give her a sense of professional achievement. Long‑term, she hopes
    to mentor a younger apprentice, eventually launching a modest family‑run cleaning service with her husband that prioritizes reliability, kindness, and community reputation. These goals reflect her desire
    for stability, modest financial security for retirement, and a supportive work environment that aligns with her caring nature.
