personas:
  professional: Ines Kuykendall, a seasoned residential housekeeping specialist with over three decades of systematic deep‑cleaning expertise, uses eco‑friendly cleaning agents and detailed checklists to
    deliver meticulous service, and they are pursuing Certified Professional Cleaner credentials while mentoring a younger apprentice for a future family‑run cleaning venture.
  sports: Ines Kuykendall enjoys low‑impact fitness, regularly walking along the Chesapeake waterfront with the Chesapeake Bay Waters Walkers club, cheering on the Baltimore Orioles and Baltimore Ravens,
    and they occasionally join a senior‑friendly yoga class at the local community center to maintain flexibility.
  arts: Ines Kuykendall finds creative fulfillment in knitting and crocheting blankets for church drives while they unwind with mystery novels by Agatha Christie and historical fiction by Mary Beard, regularly
    attend performances by the Chesapeake Chamber Orchestra, and enjoy listening to folk musician Elizabeth Cotten, all of which shape their appreciation for tradition and storytelling.
  travel: Ines Kuykendall favors relaxed, well‑planned road trips to historic coastal towns such as Annapolis, Colonial Williamsburg, and the Cape Cod peninsula, and they dream of a gentle cruise to the
    Azores, balancing a desire for new scenery with the comfort of predictable itineraries and a modest travel budget.
  culinary: Ines Kuykendall delights in preparing classic Maryland seafood dishes like Old Bay‑seasoned crab cakes, steamed blue crabs, and crab soup, often pairing them with fresh garden vegetables such
    as heirloom tomatoes and zucchini, and they consider themselves an intermediate home chef who occasionally over‑season dishes due to an enthusiastic love of Old Bay.
  core: Ines Kuykendall, a meticulous yet occasionally scattered garden‑loving retiree, balances eco‑friendly cleaning mastery with chronic worry that fuels careful budgeting, nightly knitting marathons,
    and a steadfast commitment to predictability in both work and life.
background:
  cultural: Ines was raised in a middle‑class, white family in the Mid‑Atlantic region, where community ties, modesty, and a strong work ethic were emphasized. Her upbringing included regular church attendance,
    participation in local festivals, and a appreciation for regional cuisine such as crab cakes and Old Bay-seasoned dishes. These cultural influences fostered her cooperative spirit, respect for tradition,
    and a practical, hands‑on approach to everyday responsibilities.
attributes:
  skills: '[''Residential cleaning'', ''Deep cleaning'', ''Laundry and ironing'', ''Floor care (vacuuming, mopping, polishing)'', ''Window washing'', ''Stain and spot removal'', ''Organization of storage
