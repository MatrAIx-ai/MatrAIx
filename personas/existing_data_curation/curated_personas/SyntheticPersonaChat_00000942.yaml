    User 1: Thanks! What do you like to do for work?

    User 2: I work at Scrubway. It''s a crummy job, but it pays the bills.

    User 1: I''m sorry to hear that. I hope you can find a better job someday.

    User 2: Thanks. Me too.

    User 1: What do you do for college?

