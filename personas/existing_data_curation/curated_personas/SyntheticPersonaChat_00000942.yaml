    User 1: That''s cool! I''m a computer science major too!

    User 2: Really? That''s awesome! What year are you in?

    User 1: I''m a sophomore.

    User 2: Me too! What''s your favorite class so far?

    User 1: I really like my data structures class.

    User 2: Me too! That''s my favorite class too.

    User 1: It''s so interesting to learn about how data structures work.

    User 2: I know, right? It''s so cool to think about how we can store data in different ways to make it more efficient.

    User 1: It''s definitely cool! I''m glad we''re in the same class.

    User 2: Me too! It''s nice to have someone to talk to about it.'
