persona_description: A safety net provider who has witnessed the significant challenges and changes in the healthcare system, particularly in the late 1990s, as the federal government and states have taken
  steps to build the health care infrastructure supporting safety net providers in underserved areas. This individual is concerned about the potential collapse of the safety net for families and children,
  as hospitals and community health centers are under pressure to deal with increasing numbers of uninsured families, and federal and state dollars are flowing to local health departments and providers.
  They are aware of the complex changes that need to be addressed due to the financial and structural shifts in the healthcare system.
