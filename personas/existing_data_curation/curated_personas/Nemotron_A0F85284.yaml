personas:
  professional: Shannon Smith is a budding sandbox architect who meticulously lines up building blocks into neat towers, and they relish the predictability of each structure's stability.
  sports: Shannon Smith loves the toddler play area at the local YMCA, especially the mini slide and soft ball pit, and they cheer on the Chicago Cubs during cartoon baseball segments on Saturday morning
    TV.
  arts: Shannon Smith adores watching The Wiggles and dancing along to 'Fruit Salad', and they spend afternoons finger-painting with vibrant watercolors, proudly displaying abstract masterpieces on the
    refrigerator.
  travel: Shannon Smith has explored the sandy shoreline of the family's Florida beach house and loves splashing in shallow tide pools, while dreaming of a stroller-friendly visit to the Grand Canyon's
    visitor center.
  culinary: Shannon Smith prefers soft, mild foods like mac and cheese, banana slices, and chicken nuggets, yet they occasionally surprise their parents by nibbling on a bite of avocado toast with gusto.
  core: Shannon Smith is a calm, structure-loving toddler who balances predictable play with spontaneous bursts of curiosity, often turning routine into tiny adventures.
background:
  cultural: Shannon is raised in a Black family in Winston‑Salem, North Carolina, where her parents weave African‑American cultural heritage into everyday life. Family gatherings often feature soulful music,
    storytelling, and shared meals that reflect Southern Black culinary traditions. She is introduced to culturally resonant children's literature and songs that celebrate Black history and community values.
    The local community church and neighborhood events provide a supportive environment where she observes celebrations such as Juneteenth and Kwanzaa, fostering a sense of identity and belonging. Through
    these experiences, Shannon develops an appreciation for her cultural roots while also engaging with the broader, diverse community of Davidson County.
attributes:
  skills: '["Developing vocabulary (~150 words)", "Following simple instructions", "Fine motor coordination (stacking blocks, turning pages, scribbling)", "Gross motor abilities (walking, running, climbing,
    kicking a ball)", "Cooperative social play", "Assertive communication", "Adaptable to routine and spontaneous play", "Early problem‑solving (shape sorting)", "Calm, resilient temperament"]'
  hobbies: '["Reading picture books", "Listening to lullabies and gospel music", "Building block towers", "Playing with shape sorters", "Dancing to children''s songs", "Outdoor exploration (collecting leaves,
    feeling grass)", "Playdates with peers", "Coloring with crayons"]'
  career_goals: Although still in early childhood, Shannon shows a budding curiosity about helping and creating. She often pretends to be a caregiver, 'feeding' her stuffed animals, and enjoys singing along
    to her mother's favorite gospel tunes. These playful interests hint at an early ambition to become someone who nurtures others—perhaps a teacher, a nurse, or a community storyteller. As she grows, her
    preference for structured, predictable activities suggests she may gravitate toward careers that offer clear routines and opportunities to support others, such as early childhood education or health
    care, while her natural resilience will help her pursue these goals.
