  career_goals: Loyce aims to advance to an Operations Manager position within the next three years, focusing on streamlining administrative processes and championing flexible work policies. She plans to
    earn a certified administrative professional credential and attend leadership workshops to sharpen her strategic planning skills. Long‑term, she hopes to mentor younger employees, especially women of
    color, and eventually launch a community art space that offers workshops and exhibition opportunities in Columbus.
