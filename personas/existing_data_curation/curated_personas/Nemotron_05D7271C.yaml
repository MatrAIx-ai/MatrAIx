personas:
  professional: Verena Sbrilli, an aspiring junior engineer, delights in building simple LEGO structures and solving jigsaw puzzles, applying a practical curiosity to every project while remaining relaxed
    about strict schedules and preferring the freedom to explore ideas at her own pace.
  sports: Verena Sbrilli enjoys informal games of tag and short nature walks at the neighborhood park, often collecting leaves and rocks for her own 'nature museum,' while cheering for the Chicago Cubs
    on TV and occasionally attending a community kids' gymnastics class on Saturdays.
  arts: Verena Sbrilli finds joy in coloring pages of jungle animals, sketching squirrels and birds, listening to The Wiggles and Sesame Street songs, and proudly displaying her drawings alongside beloved
    picture books by Eric Carle and Dr. Seuss.
  travel: Verena Sbrilli loves family trips to kid‑friendly destinations like Disney World and the National Mall, where she collects souvenir rocks, but dreams of exploring the gentle waterfalls of Iceland
    on a future family vacation.
  culinary: Verena Sbrilli prefers simple comfort foods such as mac and cheese, peanut‑butter and jelly sandwiches, and apple slices, enjoys helping stir pancake batter with a tiny wooden spoon, and often
    debates whether strawberry jam or honey tastes sweeter.
  core: Verena Sbrilli is a gentle, curious six‑year‑old who balances imaginative building with a relaxed, slightly disorganized approach to routines, always seeking harmony and small joys in everyday play.
background:
  cultural: Verena was raised in a predominantly white, Midwestern community in Fargo, North Dakota. Her family values modesty, community cooperation, and a close connection to the changing seasons—snowy
    winter play, summer fairs, and autumn harvest festivals. She attends a local public elementary school, participates in community events like the Fargo Farmers' Market, and experiences family traditions
    that emphasize politeness, respect for nature, and shared celebrations such as Thanksgiving and church gatherings.
attributes:
  skills: '[''Reading simple picture books'', ''Basic counting and addition'', ''Puzzle solving'', ''LEGO building'', ''Drawing and coloring'', ''Using educational apps on a tablet'', ''Showing empathy
