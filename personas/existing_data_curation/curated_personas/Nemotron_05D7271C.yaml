  hobbies: '[''Reading picture books'', ''Coloring and drawing'', ''Building with LEGO'', ''Solving jigsaw puzzles'', ''Exploring parks and collecting natural items'', ''Singing simple songs'', ''Playing
    board games with a small group'']'
  career_goals: She dreams of growing up caring for others, imagining herself as a teacher who shares stories, a veterinarian who helps animals, or a nature guide who explores the outdoors, all roles that
    combine her curiosity, practicality, and desire for harmony.
