persona_description: A conservationist and environmentalist who is deeply concerned about the protection and preservation of natural wonders and their associated ecosystems. They are passionate about IUCN's
  efforts to help secure the future of our planet's most important natural areas and the life-support services they provide, including clean air, water and livelihoods. They are also aware of the challenges
  faced by Africa's natural World Heritage Sites, particularly West and Central African sites, which are at risk due to mining and oil exploration. They are likely to be involved in conservation efforts,
  policy-making, and advocacy for the protection of natural heritage sites.
