personas:
  professional: Debra Killip, a retired humanities scholar turned senior‑center program director, blends meticulous grant writing with an improvisational flair for community events; they use their conflict‑mediation
    expertise to link seniors with university students while nurturing the town’s historic narrative.
  sports: Debra Killip, an avid walker and birdwatcher, participates in the Chapel Hill Arboretum senior walking club, cheers for the UNC Tar Heels basketball team and follows the Carolina Hurricanes, and
    they schedule daily gentle stretches to keep osteoarthritis at bay.
  arts: Debra Killip, a lifelong lover of classic literature and folk music, attends PlayMakers Repertory productions, sings in a community choir performing the songs of Woody Guthrie and Joan Baez, and
    they spend evenings reading poetry by Emily Dickinson while sipping chamomile tea.
  travel: Debra Killip, a meticulous planner with a penchant for historic road trips, revisits the Blue Ridge Parkway each fall, has toured colonial Williamsburg and London, dreams of attending the Edinburgh
    Festival, and they occasionally join spontaneous family visits to the Gulf Coast when a relative calls.
  culinary: Debra Killip, a proficient home cook who favors low‑sodium Southern comfort, regularly prepares collard greens with smoked turkey, roasted sweet‑potato casserole, and her signature pecan‑banana
    bread, yet they sometimes forget to set the oven timer, resulting in a charred crust.
  core: Debra Killip, a compassionate 75‑year‑old who balances structured community leadership with whimsical garden splurges, they weave Southern hospitality, literary devotion, and a love of folk song
    into every facet of their life.
background:
  cultural: Debra is a white American who grew up in the post‑war Midwest before moving to North Carolina for graduate studies in the humanities. She was shaped by the social movements of the 1960s, valuing
    community service, equality, and cultural enrichment. Living in Chapel Hill, a vibrant college town, she blends Southern hospitality with a lifelong appreciation for the arts, literature, and local
    history. Her background includes a Catholic upbringing, involvement in church charity work, and a deep connection to the region's literary and gospel music traditions.
attributes:
  skills: '[''Community outreach'', ''Conflict mediation'', ''Event planning for senior programs'', ''Literary analysis'', ''Grant writing'', ''Volunteer coordination'', ''Digital archiving'', ''Basic computer
