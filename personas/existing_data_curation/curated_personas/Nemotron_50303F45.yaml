  hobbies: '[''Reading classic literature'', ''Gardening'', ''Birdwatching'', ''Quilting'', ''Cooking'', ''Playing bridge'', ''Attending local theater'', ''Volunteering at the library'', ''Leading historical
    walking tours'', ''Singing in a community folk‑music choir'']'
  career_goals: Although retired, Debra aims to mentor younger volunteers at the local senior center, preserve and share Chapel Hill's history through oral‑history projects, and expand intergenerational
    programs that connect seniors with university students. She hopes to publish a memoir reflecting her life experiences and to see the community garden she helped design flourish, providing fresh produce
    for local residents.
