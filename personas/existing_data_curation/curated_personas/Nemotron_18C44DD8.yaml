personas:
  professional: George Hilton, a 45‑year‑old service sales representative, leverages their inquisitive yet practical mindset to deliver consultative deals using Salesforce and HubSpot for data‑driven prospecting
    while thriving on the competitive thrill of beating quotas and mentoring a high‑energy team, and they stay calm and resilient under pressure.
  sports: George Hilton leads his local amateur basketball league, shooting hoops for the Wichita Wildcats while cheering on the Dallas Mavericks and Texas Rangers, regularly joining fishing outings on
    Lake Wichita, hitting the gym three times a week to stay in shape for their competitive poker nights and video‑game marathons, and they love the friendly rivalry of weekly team scrimmages.
  arts: George Hilton, a country‑music aficionado, fills weekends with live shows by Luke Bryan and Miranda Lambert, gathers with friends at community barbecues featuring local bluegrass jam sessions, enjoys
    reviving classic rock on their vintage car stereo while flipping through biographies of sales legends for inspiration, and they often share their favorite tracks with the gathering crowd.
  travel: George Hilton prefers spontaneous road trips across Texas, charting routes on a rugged SUV that lets them drop into Hill Country wineries, the historic Fort Worth Stockyards, and the Gulf Coast
    beaches, all while they keep an eye on fuel expenses and eye‑ball the next stop on a weather‑aware app.
  culinary: George Hilton delights in Texas‑style BBQ, perfecting a brisket rub with smoked paprika, brown sugar, and coffee grounds, while also cooking fish tacos with fresh catch from Lake Wichita seasoned
    with lime and cilantro, though they occasionally neglect portion control after a night of poker.
  core: George Hilton channels their energetic curiosity into high‑stakes sales and weekend adventures, balancing laid‑back flexibility with a fierce competitive edge that fuels both their career ascent
    and love for basketball, fishing, and DIY projects, though they tend to procrastinate on detailed planning, leaving their calendar a chaotic collage.
background:
  cultural: George grew up in Wichita Falls, Texas, within a middle‑class white family rooted in the region's blend of Southern hospitality and Texan independence. His upbringing emphasized self‑reliance,
    a strong work ethic, and active community involvement—values reflected in his outgoing personality and dedication to teamwork. He embraces Texas traditions such as pride in the state, love of the outdoors,
    early‑morning barbecues, and straightforward communication. While his heritage includes typical European American lineage (likely Irish and English), his cultural identity is shaped by the everyday
    rhythms of small‑town Texas life, combining regional pride with an openness to diverse ideas and experiences.
