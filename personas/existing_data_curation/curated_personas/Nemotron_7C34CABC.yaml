personas:
  professional: Dearo Butler, a veteran structural engineer with three decades of experience, leverages expertise in advanced CAD/BIM tools, rigorous risk assessment, and LEED-focused sustainable design
    to steer large-scale public infrastructure projects in Baltimore County, while their methodical planning, innate curiosity, and compassionate mentorship style foster collaborative teams and community-oriented
    outcomes.
  sports: Dearo Butler is an avid hiker who spends Saturday mornings trekking the trails of Patapsco Valley State Park, supports the Baltimore Ravens and Orioles, and participates in a weekly low-impact
    strength class that blends woodworking projects with functional fitness, while their methodical nature leads them to track steps with a smartwatch and schedule rest days to manage osteoarthritis.
  arts: Dearo Butler immerses themselves in jazz legends like Miles Davis and John Coltrane, soul icons such as Aretha Franklin, while the church choir interprets classics by Mahalia Jackson, and their
    weekend hobby of street photography captures the brick facades of Baltimore's historic districts, often inspired by the chiaroscuro style of Henri Cartier-Bresson.
  travel: Dearo Butler plans trips with the same precision applied to project schedules, favoring short getaways to historic Southern cities such as Charleston and Savannah, annual visits to the National
    Cherry Blossom Festival in Washington, DC, and occasional overseas journeys to Edinburgh's castle festivals, always booking early to secure affordable lodging and allocating a modest budget for local
    culinary experiences.
  culinary: Dearo Butler delights in preparing Southern comfort fare such as fried chicken, shrimp and grits, collard greens sautéed with smoked turkey, and cornbread baked with heirloom cornmeal harvested
    from their garden, often pairing these dishes with fresh okra, heirloom tomatoes, and a dash of hot sauce, while their competent but occasionally lab-like approach to seasoning reveals a predilection
    for precise measurements that sometimes stifles spontaneous culinary improvisation.
  core: Dearo Butler is an eternal planner and compassionate mentor who balances a love of sustainable infrastructure with meticulously measured Southern cooking, late-night worries over spreadsheets, and
    the occasional obsessive habit of cataloguing every garden seed in a spreadsheet.
background:
  cultural: Dearo identifies as African‑American and grew up in the Baltimore suburbs of Pikesville, where his family emphasized education, faith, and community service. The legacy of the civil‑rights era
    and the rich cultural tapestry of Baltimore’s black neighborhoods shaped his values of solidarity, resilience, and social responsibility. Family gatherings feature storytelling, soul food, and music
    that connect Southern roots to broader African diaspora traditions. He maintains close ties to local institutions such as the Reginald F. Lewis Museum, the Baltimore African‑American community organizations,
    and his church, which together inform his commitment to equity, mentorship, and collaborative problem‑solving in both his personal and professional life.
attributes:
  skills: '[''Structural Analysis'', ''AutoCAD'', ''Revit'', ''Project Management (PMI)'', ''Agile Engineering Practices'', ''Risk Assessment'', ''Safety and Code Compliance'', ''Sustainability Planning'',
    ''LEED Certification'', ''Stakeholder Engagement'', ''Mentoring and Coaching'', ''Cross-cultural Communication'']'
  hobbies: '[''Reading African-American literature'', ''Mentoring youth in STEM'', ''Community gardening'', ''Jazz and soul music appreciation'', ''Hiking in Patapsco Valley State Park'', ''Woodworking'',
    ''Cooking Southern cuisine'', ''Church choir participation'', ''Photography of historic Baltimore neighborhoods'', ''Playing board games with family'']'
  career_goals: Dearo aims to transition into a senior leadership role such as Principal Engineer or Director of Public Infrastructure within Baltimore County, where he can steer large‑scale, sustainable
    projects that directly benefit underserved neighborhoods. He is committed to embedding equity and green design into transportation, water, and housing initiatives. To strengthen his strategic impact
    he plans to earn a Master’s in Engineering Management while developing a mentorship program that connects high‑school students from the black community with real‑world STEM experiences. Post‑retirement
    he envisions consulting on community‑driven infrastructure and continuing volunteer work that promotes resilience and social cohesion.
