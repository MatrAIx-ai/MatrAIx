persona_description: An expert in the field of digital video coding, particularly within the ITU-T, with a focus on the development and standards of H.120, H.26x-series, and related standards. They have
  extensive knowledge of the history and evolution of these standards, as well as their applications in various areas such as video conferencing, audiovisual services, and low bit rate communication. They
  are actively involved in the production of new standards and the improvement of existing ones, and are known for their contributions to the development of the JPEG and JBIG2 standards. They are also involved
  in the development of collaborative standards with ISO/IEC JTC1 SC29/WG11 and are known for their expertise in the advanced video coding rapporteur group and the JVT. They are likely to be involved in
  the development of new standards and the improvement of existing ones, and are also involved in the development of collaborative standards with ISO/IEC JTC1 SC29/WG11 and the JVT.
