  hobbies: '[''Building LEGO models'', ''Simple science experiments (volcano kit, magnet sets)'', ''Reading about space, inventions, and animals'', ''Playing basketball'', ''Strategic video games (Minecraft,
    puzzle apps)'', ''Drawing comic strips'', ''Nature exploration (collecting leaves, insects)'', ''Church youth group activities'']'
  career_goals: Stanley dreams of a future where his curiosity and practicality combine, aiming to become a mechanical engineer, robotics designer, or even an astronaut who builds and tests devices for
    space missions. He also imagines mentoring younger kids in a STEM club or becoming a teacher, channeling his competitive drive into academic excellence. He hopes to earn a scholarship, attend a strong
    high school STEM program, and eventually study engineering at a university, using his problem-solving skills to create tangible solutions for his community.
