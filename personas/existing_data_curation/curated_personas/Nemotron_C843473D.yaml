personas:
  professional: Stanley Sutton is an aspiring junior engineer who spends afternoons meticulously assembling LEGO sets, conducting backyard science experiments, and sketching imaginative comic schematics,
    channeling their curiosity and practical mindset into hands‑on problem‑solving while juggling school responsibilities with a competitive edge.
  sports: Stanley Sutton is a starter on the local Junior Hoops Wildcats basketball team, idolizing the Los Angeles Lakers and emulating LeBron James’s moves during after‑school drills, while also joining
    weekend free‑throw challenges at the community center, balancing a fierce competitive drive with occasional frustration when teammates miss a well‑organized play.
  arts: Stanley Sutton draws comic strips featuring a brave space squirrel, drawing inspiration from classic creators like Stan Lee and modern YouTube illustrators such as Draw with Jazza, while also diving
    into picture books by Dr. Seuss and listening to Disney animated soundtracks, weaving these artistic influences into their after‑school doodles.
  travel: Stanley Sutton dreams of a road‑trip to the Grand Canyon and a weekend camping adventure in the nearby state forest, has already logged a family visit to the Smithsonian National Air and Space
    Museum in Washington, D.C., and prefers trips that blend hands‑on science exhibits with the chance to collect leaves and insects for their nature journal.
  culinary: Stanley Sutton favors pepperoni pizza, homemade mac and cheese, and crunchy carrot sticks paired with ranch dip, often bragging about their secret ingredient—shredded cheddar cheese—in grilled
    cheese sandwiches, yet they tend to overindulge in sugary gummy bears after a successful LEGO build, leading to occasional stomachaches.
  core: Stanley Sutton is a curious, competitive eight‑year‑old who channels boundless LEGO energy into experiments and comics, worries about every detail, and balances a practical streak with a hint of
    skepticism toward shortcuts.
background:
  cultural: Stanley is an African-American boy growing up in the small town of McKenzie, Butler County, Alabama. His family blends Southern hospitality with African-American cultural traditions, including
    weekly church services featuring gospel music, family barbecues with dishes like fried chicken, collard greens, and cornbread, and storytelling evenings that celebrate the history of the civil‑rights
    movement. He attends a largely integrated elementary school, where he navigates both the broader Southern culture and his own community’s values of resilience, mutual support, and respect for elders.
    These cultural influences shape his identity, his love for music, food, and community gatherings, and his desire to give back to his neighborhood.
attributes:
