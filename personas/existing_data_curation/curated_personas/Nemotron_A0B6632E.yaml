  career_goals: Christopher aspires to combine his love of technology with his hands-on practicality by pursuing a degree in computer science or software engineering, with a focus on game development and
    interactive media. He aims to secure a junior developer role at a tech startup that values flexible work arrangements, while continuing to offer freelance PC repair and custom-build services to support
    his financial independence. In the longer term, he hopes to launch an indie game studio that creates narrative-driven titles, and to become an advocate for mental-health awareness among young tech enthusiasts.
