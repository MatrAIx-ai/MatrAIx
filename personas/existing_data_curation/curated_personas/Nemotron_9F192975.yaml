  hobbies: '[''Watercolor painting'', ''Pottery'', ''Experimental cooking'', ''Hydroponic gardening'', ''Birdwatching'', ''Reading science and art books'', ''Journaling'', ''Community theater participation'',
    ''Visiting art galleries'', ''Listening to jazz and blues'', ''Yoga and meditation'']'
  career_goals: Cheryl aims to transition from full‑time engineering work to a senior advisory role where she can mentor the next generation of engineers, especially women and people of color entering STEM
    fields. She dreams of launching a community outreach program that combines chemistry with art—offering workshops on chemical pigments, sustainable materials, and hands‑on experiments for local schools.
    Additionally, she hopes to consult on sustainable process improvements for small manufacturers in the Deep South, allowing her to apply her expertise while maintaining a flexible schedule that reduces
    stress. On a personal level, Cheryl seeks to achieve a healthier work‑life balance that supports her emotional well‑being and gives her more time for creative pursuits.
