personas:
  professional: Cheryl Upshaw, a veteran chemical process engineer turned senior advisor, leverages their safety‑focused expertise in pilot‑scale design and their knack for translating technical concepts
    into colorful, art‑inspired teaching, and they thrive on flexible, collaborative projects despite a habit of occasional disorganization.
  sports: Cheryl Upshaw, a devoted fan of the New Orleans Saints, the Memphis Grizzlies, and the Mississippi State Bulldogs, stays active by walking with the Magnolia Wetland Walkers club, practicing gentle
    yoga with the Senior Yoga Circle, and occasionally joining a community pickleball league during the spring, and they love cheering for their teams at local bar gatherings.
  arts: Cheryl Upshaw, who paints with natural pigments and shapes clay in their home studio, they immerse themselves in the music of Miles Davis, B.B. King, and Mahalia Jackson, regularly visit the Magnolia
    Playhouse for community theater, and draw inspiration from Jacob Lawrence’s canvases and local mural projects.
  travel: Cheryl Upshaw, whose favorite trips include river‑front weekend getaways to New Orleans’ Mardi Gras and a scenic road‑trip through Savannah and Asheville, now dreams of an eco‑tour of Costa Rica’s
    rainforest hydroponic farms and a tranquil cultural immersion in Kyoto, and they balance adventure with a modest retirement budget and a love for leisurely planning.
  culinary: Cheryl Upshaw, an avid home chef, fuses classic Southern dishes like gumbo, collard greens, and smoked turkey with food‑science twists—using hydroponically grown basil and cilantro to craft
    a honey‑glazed sweet‑potato bisque and employing precise pH balancing for perfect cornbread crusts—while they proudly master both stovetop and sous‑vide techniques.
  core: Cheryl Upshaw blends a chemist’s precision with an artist’s free spirit, channeling their curiosity and occasional disorganization into vibrant pigment experiments and mentorship, and they navigate
    life’s anxieties with gentle yoga, heartfelt jazz, and a steadfast commitment to community.
background:
  cultural: Cheryl is rooted in the African‑American heritage of the Deep South. Raised in Magnolia, she grew up surrounded by the rhythms of gospel choirs, the storytelling traditions of family gatherings,
    and the soulful flavors of Southern cooking passed down through generations. Her community ties are reinforced by active participation in the local church, where she both volunteers and finds emotional
    support. She values the resilience and creativity of her ancestors, which inform her appreciation for African‑American visual art and music. Cheryl also maintains connections with regional Black professional
    networks, such as the National Association of Black Engineers, and she often mentors young Black students interested in science, aiming to honor and extend the legacy of those who paved the way before
    her.
attributes:
  skills: '[''Process design'', ''Safety compliance'', ''Quality assurance'', ''Laboratory analysis'', ''Troubleshooting'', ''Instrumentation & control'', ''Pilot plant operations'', ''Environmental regulations'',
