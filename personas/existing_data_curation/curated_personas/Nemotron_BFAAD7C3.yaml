personas:
  professional: Vicente Rowe, a seven‑year‑old budding creator, blends a love of LEGO constructions with interactive coding apps to prototype whimsical robots and story‑telling gadgets, showcasing an early
    knack for problem‑solving, organization, and artistic flair.
  sports: Vicente Rowe energetically plays for the Silverdale Juniors Soccer Club, roots for the Seattle Seahawks and Seattle Kraken, and spends weekends exploring the tide pools of Port Townsend and collecting
    shells, fostering a love for team spirit, outdoor adventure, and healthy physical activity.
  arts: Vicente Rowe’s evenings are filled with sketching fantastical creatures inspired by mythology, dancing to lively mariachi melodies and pop hits from artists like Selena Gomez, and re‑creating favorite
    animated scenes, merging youthful imagination with a deep appreciation for rhythmic storytelling.
  travel: Vicente Rowe dreams of revisiting the misty forests of Olympic National Park, plans a family road trip to San Diego’s beach boardwalk, and hopes one day to sail to the historic plaza of a distant
    city where their grandparents once lived, balancing curiosity with family‑centered vacation budgeting.
  culinary: Vicente Rowe loves whisking masa dough for tacos, sprinkling fresh cilantro over tamales, experimenting with mini‑chef banana‑cinnamon pancakes, and often sneaks a handful of gummy bears while
    the sauce simmers, showcasing both culinary enthusiasm and a playful snack habit.
  core: Vicente Rowe is a wildly inventive seven‑year‑old who balances imagination with a tidy piggy bank, a love for creative play, and a sneaky habit of hoarding extra candy when no one’s watching.
background:
  cultural: Vicente is raised in a bilingual Mexican‑American household in Silverdale, WA. He speaks both Spanish and English at home, celebrates cultural holidays such as Día de los Muertos and Cinco de
    Mayo, and learns traditional stories, songs, and recipes from his grandparents. While embracing his Mexican heritage, he also enjoys the Pacific Northwest environment, blending cultural traditions with
    local outdoor activities.
