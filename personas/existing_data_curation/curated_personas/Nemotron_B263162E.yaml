personas:
  professional: Paula Desorbo, a 31‑year‑old Computer Support Specialist, leverages meticulous documentation and data‑driven process improvements to troubleshoot Windows and macOS environments, and they
    quietly position themselves for senior IT support and operations leadership by championing automation scripts and service‑level agreements.
  sports: Paula Desorbo logs regular 5‑kilometer trail runs before sunrise, tracks progress on Strava, and when not on the trail they root for the Riverbank Cardinals minor‑league baseball team, occasionally
    joining a weekly pick‑up basketball game at the local recreation center to stay agile.
  arts: Paula Desorbo spends quiet evenings immersed in the prose of Jane Austen and the histories of Doris Kearns Goodwin, while they refine black‑and‑white landscapes in the style of Ansel Adams through
    digital photo editing, and they reserve Sunday afternoons for listening to Beethoven’s Ninth Symphony on their high‑fidelity speakers.
  travel: Paula Desorbo prefers meticulously planned solo getaways that blend historic charm with quiet reflection, such as a weekend stroll through the cobblestone lanes of Bruges, a solo hiking retreat
    in the Blue Ridge Mountains, and a month‑long culinary immersion in Kyoto’s traditional tea houses, and they always book flights and accommodations well in advance to avoid surprise disruptions.
  culinary: Paula Desorbo, an adept home baker, measures each gram for their sourdough loaf and rosemary focaccia, seasons garden‑grown heirloom tomatoes with basil and olive oil for a fresh bruschetta,
    and they treat themselves to an occasional indulgence of truffle‑infused mushroom risotto at a quiet downtown bistro.
  core: Paula Desorbo, a meticulous 31‑year‑old IT support specialist, balances a love for solitary precision with a competitive drive, and they find calm in routine tasks, measured baking, and early‑morning
    runs while quietly charting a path toward leadership.
background:
  cultural: Paula grew up in a middle‑class family in Dayton, Ohio. Her cultural background reflects Midwestern values of practicality, reliability, and community involvement. While her ancestry includes
    German and Irish roots, her upbringing emphasized traditional family rituals, church participation, and a strong focus on education and steady work. The local culture of modesty, politeness, and a solid
    work ethic aligns with her preference for routine and practicality, and her marriage and close family ties reinforce a sense of stability and continuity.
