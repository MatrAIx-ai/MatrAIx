    cost optimization'', ''IT asset inventory management'', ''CompTIA A+ certification knowledge'']'
  hobbies: '[''Reading classic literature'', ''Vegetable gardening'', ''Knitting'', ''Jigsaw puzzles'', ''Morning trail running'', ''Bread baking'', ''Digital photo editing'', ''Quiet book club participation'']'
  career_goals: Paula aims to advance from her current role as a Computer Support Specialist to a senior IT support position and eventually into an IT Operations Manager role where she can combine her technical
    expertise with her business acumen. Over the next five years she plans to obtain ITIL Foundation and CompTIA Network+ certifications, lead a small team responsible for service‑level agreements, and
    spearhead initiatives to automate routine support tasks using scripting. She is also interested in designing and optimizing support workflows, improving service efficiency, and possibly consulting for
    small businesses on IT cost management.
