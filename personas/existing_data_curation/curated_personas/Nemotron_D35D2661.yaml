  career_goals: Ling aims to transition from full-time shop work to a part-time mentorship role where she can pass her extensive knowledge to the next generation of mechanics. She hopes to obtain a certified
    master mechanic credential, start a small community workshop that offers affordable repairs for seniors, and eventually compile a practical handbook on maintaining light-duty fleet vehicles in cold
    Midwest climates. Although she is considering retirement, she wants to stay active in the local automotive community and perhaps serve as a safety advisor for municipal vehicle fleets.
