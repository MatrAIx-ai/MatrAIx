persona_description: A Polish-American military officer who fought for the independence of Poland and the United States, and later for the freedom of Belarus. He is known for his contributions to the construction
  of fortifications for the Continental Army, his role as a chief engineer and strategist for the American Revolutionary War, and his efforts to abolish serfdom and reduce the corvee in Poland. His legacy
  includes being given the name "Kosciuszko" by the United States, and his statue being placed in Lafayette Park in Washington, D.C.
