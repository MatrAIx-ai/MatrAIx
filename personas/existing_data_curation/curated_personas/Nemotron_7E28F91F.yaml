  hobbies: '[''Intramural basketball league'', ''Hiking in the Finger Lakes region'', ''Cooking and exploring new recipes'', ''Reading business, leadership, and personal development books'', ''Volunteering
    as a tutor for adult learners'', ''Participating in board game nights and trivia contests'', ''Attending live music and local theater performances'']'
  career_goals: John aims to achieve tenure as an associate professor within the next three years and eventually become a full professor and department chair of Business Studies. He plans to design and
    launch an interdisciplinary entrepreneurship incubator that provides hands‑on consulting projects for local nonprofits and start‑ups in Rochester. By securing external funding—such as NSF or state education
    grants—he hopes to expand experiential learning opportunities and publish research on the impact of collaborative, project‑based pedagogy in business education. Additionally, John aspires to mentor
    a diverse cohort of students, increase the department’s regional engagement, and develop online supplemental courses that can reach adult learners beyond the campus.
