  career_goals: Norah aims to translate her early managerial experience into a trajectory that leads to senior leadership within a regional retail chain. In the next three to five years she plans to pursue
    an MBA focused on strategic management and sustainability, positioning herself for a director‑level role overseeing multiple stores. She aspires to spearhead initiatives that integrate technology and
    eco‑friendly practices, such as implementing data‑centric inventory systems and reducing waste. Ultimately, she envisions launching her own boutique retail concept that blends curated fashion with community‑focused
    events, leveraging her business acumen and creative curiosity.
