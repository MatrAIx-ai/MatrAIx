  hobbies: '[''Sketching'', ''Acrylic and watercolor painting'', ''Visiting galleries and museums'', ''Street‑art tours'', ''Listening to jazz, neo‑soul, hip‑hop'', ''Open‑mic poetry nights'', ''Improv
    workshops'', ''Community dance events'', ''Yoga'', ''Volunteering at youth art program'', ''Urban photography'']'
  career_goals: Avalon aims to become a celebrated muralist and interior finishing specialist in Detroit, merging community storytelling with high‑quality craftsmanship. She plans to complete her associate
    degree in interior design, earn a certified decorative painting credential, and launch a boutique firm that offers custom murals, sustainable finishes, and design consulting for residential and commercial
    clients. Long‑term, she envisions creating a community art hub that provides workshops, apprenticeship programs, and mentorship for young artists and tradespeople, especially those from underrepresented
    backgrounds. Avalon also aspires to take on leadership roles within her local union, advocate for environmentally responsible practices, and speak at industry conferences to share her innovative approaches.
