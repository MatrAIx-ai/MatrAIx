personas:
  professional: Avalon Gooden, a 22‑year‑old muralist and interior finishing specialist, blends precision in surface preparation with vibrant storytelling on walls, leveraging their knack for organization
    and spontaneous creativity to deliver eco‑friendly, community‑focused designs that celebrate Detroit’s street culture.
  sports: Avalon Gooden fuels their energy by shooting hoops at the neighborhood gym, cheering for the Detroit Pistons, and participating in community dance‑fit classes, while they also attend Detroit City
    FC matches and practice sunrise yoga at Belle Isle to stay limber.
  arts: Avalon Gooden immerses themselves in the arts scene, drawing inspiration from muralist JR, jazz saxophonist Kamasi Washington, and the soulful poetry of Maya Angelou, while regularly attending openings
    at the Museum of Contemporary Art Detroit and collaborating on street‑art tours that spotlight local visual storytellers.
  travel: Avalon Gooden’s travel style blends urban exploration with cultural immersion, having documented the East Side Gallery in Berlin and the vibrant murals of Mexico City, while dreaming of a road
    trip along the Great Lakes to capture sunrise reflections on waterfront walls.
  culinary: Avalon Gooden enjoys crafting comfort dishes like smoked collard greens, honey‑glazed BBQ ribs, and shrimp‑and‑grits, often experimenting with fresh thyme, smoked paprika, and locally sourced
    hot sauce, while they still order takeout pho on busy studio nights.
  core: Avalon Gooden is a talkative, detail‑driven muralist who balances disciplined budgeting with spontaneous pigment hunts, uses yoga to manage a restless mind, and channels community stories into every
    brushstroke.
background:
  cultural: Avalon grew up in a close‑knit African‑American community in Detroit, where music, visual art, and neighborhood solidarity are woven into everyday life. Her family’s roots trace back to the
    Great Migration, and stories of perseverance and creativity have shaped her worldview. The city’s legacy of Motown, vibrant mural culture, and grassroots activism influence her artistic expression and
    work ethic. Avalon embraces the tradition of oral storytelling, incorporating themes of resilience, heritage, and urban identity into her murals and designs. She values collaboration with fellow Black
    artists and tradespeople, using her craft to celebrate and uplift her cultural heritage while contributing to Detroit’s ongoing renaissance.
