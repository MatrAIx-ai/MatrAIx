persona_description: A researcher who studies the development and dynamics of intelligence differences between different racial groups, particularly focusing on the early childhood stages and the potential
  growth or stability of those differences. This researcher is interested in the methodology and data analysis used in previous studies on this topic, as well as the potential for growth or stability in
  intelligence test scores. They are looking for evidence that the gap between black and white children's IQ scores is growing or stable over time, and are evaluating different models and datasets to support
  their analysis. This researcher is likely to be interested in Fryer & Levitt's (2004; 2006) dataset, as well as the Stanford-Binet and Wechsler Intelligence Scales, as these are the most recent norms
  for these tests and are likely to provide the most relevant and recent evidence on the growth or stability of intelligence test scores.
