    Adobe Photoshop)'', ''Research and Information Sourcing'', ''Critical Thinking and Skeptical Analysis'', ''Adaptability and Flexible Problem‑Solving'']'
  hobbies: '[''Watercolor sketching'', ''Visiting local art galleries and museum exhibitions'', ''Reading art history and Latin American literature'', ''Cooking traditional Mexican cuisine'', ''Hiking in
    the Boise foothills'', ''Listening to podcasts on creativity and culture'', ''Practicing yoga for mindfulness'']'
  career_goals: Lilian aims to deepen her administrative expertise by earning a Certified Administrative Professional (CAP) credential within the next year. Over the next three to five years, she aspires
    to progress to an Office Manager role, preferably within a cultural institution such as a museum, gallery, or community arts nonprofit where she can blend her organizational skills with her love of
    art. Long‑term, she envisions launching a boutique virtual‑assistant service that supports independent artists and cultural projects, allowing her to champion Mexican and broader Latin American artistic
    initiatives in the Boise‑Ada County region.
