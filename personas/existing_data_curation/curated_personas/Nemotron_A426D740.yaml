personas:
  professional: Lilian Rivera, a 21‑year‑old administrative professional with a knack for bilingual communication, leverages meticulous document management and eye‑catching visual design in presentations
    while they aim for a Certified Administrative Professional credential and eventually manage an art‑focused nonprofit, balancing a competitive drive with a reserved, detail‑oriented work style.
  sports: Lilian Rivera, a hiking enthusiast, spends weekends trekking the Ada County foothills with a local outdoor club, supports the Boise State Broncos football team, and supplements their cardio routine
    with weekly yoga classes, all while they keep a casual membership in a community running group that meets on Saturday mornings.
  arts: Lilian Rivera curates a personal collection of art prints, sketches watercolor studies of local landscapes infused with folk motifs, and frequently visits the Boise Art Museum to admire works by
    Frida Kahlo and Diego Rivera, while they also enjoy listening to Lila Downs and reading novels by Gabriel García Márquez, shaping their creative identity.
  travel: Lilian Rivera plans trips with the same precision as their spreadsheets, favoring budget‑friendly adventures that blend cultural immersion and nature, such as weekend road trips to Portland’s
    art districts, a recent visit to Oaxaca’s vibrant market stalls, and an upcoming pilgrimage to Santa Fe’s Pueblo art scene, all while they balance travel costs against savings goals.
  culinary: Lilian Rivera loves cooking traditional dishes like mole poblano, chiles en nogada, and tamales, experimenting with ingredients such as ancho chilies, epazote, and fresh tomatillos, and they
    often host small dinner gatherings where they pair the meals with homemade agua de jamaica, while occasionally over‑seasoning in their enthusiasm.
  core: Lilian Rivera, a meticulous yet adventurous 21‑year‑old administrator, blends a competitive edge with a love for art, precise budgeting, health mindfulness, and creative cooking, all while they
    navigate a reserved, skeptical personality.
background:
  cultural: Lilian was raised in a Mexican‑American household where Spanish was spoken daily and cultural celebrations such as Día de los Muertos and Mexican Independence Day were central to family life.
    The family’s migration story instilled in her a strong sense of resilience and pride in Mexican heritage, which she expresses through her cuisine, music preferences, and a deep appreciation for Mexican
    folk art. In Meridian, she actively participates in the local Mexican cultural association, volunteering at events that showcase Mexican art and traditions, and she often incorporates this bicultural
    perspective into both her professional communication and personal creative projects.
attributes:
