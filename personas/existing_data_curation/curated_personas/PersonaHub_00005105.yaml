persona_description: A British novelist who is known for her unique and radical works, particularly her novels Agnes Grey and The Tenant of Wildfell Hall, which reflect on women's independence and portray
  the effects of alcoholism. She is also known for her family tragedies, including the deaths of her brother and sister, and for her early death at the age of 29. Her works have been re-evaluated by today's
  critics and readers as the most radical work among her sisters and she is valued as a major literary figure of her time.
