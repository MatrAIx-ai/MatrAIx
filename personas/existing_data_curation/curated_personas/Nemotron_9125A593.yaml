personas:
  professional: Ofelia Roque, a 34‑year‑old events specialist, blends a rigorously structured approach to budget development and vendor negotiation with a compassionate, flexible mindset that lets them
    pivot gracefully when last‑minute changes arise, leveraging tools like Cvent and Asana to orchestrate seamless, inclusive conferences while mentoring junior team members.
  sports: Ofelia Roque enjoys solo hiking on nearby mountain trails, participates regularly in a local women's hiking club, practices Vinyasa yoga twice a week for fitness, and supports the city’s professional
    soccer team, the River City FC, while preferring low‑impact cardio over competitive sports.
  arts: Ofelia Roque immerses themselves in literary worlds, devouring historical fiction like Ken Follett’s "Pillars of the Earth" and contemporary works by authors such as Juan Gabriel Vásquez, while
    drawing inspiration from John Singer Sargent’s watercolors and Ansel Adams’ black‑and‑white nature photography, and they unwind to the mellow indie folk sounds of Fleet Foxes.
  travel: Ofelia Roque prefers thoughtfully planned, low‑key escapes that blend nature and culture, having trekked the Patagonian Andes and soaked in the colonial charm of Antigua Guatemala, while dreaming
    of a solo adventure to the candle‑lit streets of Granada, Spain, and always books flights with flexible “open‑ticket” options to accommodate last‑minute work demands.
  culinary: Ofelia Roque, an eager home chef, experiments with traditional Colombian dishes such as arepas de queso, ajiaco with corn and chicken, and empanadas stuffed with ground beef, seasoning them
    with cilantro, panela, and roasted cumin, while tending a balcony garden of basil, rosemary, and hardy succulents that supply fresh herbs for their weekend cooking rituals.
  core: Ofelia Roque is a methodical event planner with a love for solitary hikes, yoga, and cooking comfort foods, who balances meticulous budgeting with a habit of forgetting minor deadlines, and who
    channels compassion into mentoring emerging female planners.
background:
  cultural: Ofelia was born to Colombian immigrants who settled in the Bay Area, and she grew up immersed in both Colombian and American cultures. Bilingual in Spanish and English, she celebrates Colombian
    holidays such as Día de los Reyes and Carnaval de Barranquilla, and she maintains family traditions like sharing arepas and listening to vallenato music. Her upbringing emphasized community solidarity,
    hospitality, and the importance of helping others, shaping her compassionate, cooperative nature. Living in Pleasant Hill, she stays connected with the local Latinx community through cultural festivals,
    Spanish‑language book clubs, and neighborhood volunteer initiatives, which reinforce her cultural identity while informing her inclusive approach to event planning.
attributes:
  skills: '[''Event coordination'', ''Budget development and financial oversight'', ''Vendor sourcing and negotiation'', ''Contract drafting and compliance'', ''Risk assessment and contingency planning'',
    ''On‑site logistics and operations management'', ''Event management software (Cvent, Social Tables)'', ''Project management tools (Asana, Trello)'', ''Bilingual communication (Spanish/English)'', ''Client
    relationship building'', ''Conflict mediation and teamwork facilitation'', ''Data analysis and post‑event reporting'']'
  hobbies: '[''Reading historical fiction'', ''Cooking Colombian dishes'', ''Balcony gardening'', ''Yoga and meditation'', ''Solo hiking'', ''Nature photography'', ''Watercolor sketching'', ''Volunteering
    at immigrant support center'']'
  career_goals: Looking ahead, Ofelia aims to obtain the Certified Meeting Professional (CMP) credential and step into a senior events manager role within a mid‑size corporation, where she can shape large‑scale
    conferences with a focus on sustainability and inclusivity. Long‑term, she envisions launching her own boutique event‑planning firm that specializes in culturally resonant, socially responsible gatherings
    for nonprofit and community organizations. She also hopes to mentor emerging female event planners and to develop a mentorship program that supports Latinx professionals entering the industry.
