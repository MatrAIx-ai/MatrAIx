  career_goals: Driven by her curiosity and desire to merge engineering rigor with creative expression, Samantha aims to progress into a senior safety‑engineer role within the next three years, overseeing
    safety strategy for a multi‑site manufacturing network. She plans to earn a Master’s in Engineering Management to deepen her leadership and business acumen, and to spearhead an internal Innovation Lab
    that experiments with AR/VR safety training and sustainable manufacturing practices. Long‑term, she envisions launching her own consulting boutique that helps companies embed human‑centered design and
    artistic elements into production spaces to boost worker wellbeing and environmental performance. Samantha also aspires to become a visible mentor for women in STEM, speaking at industry conferences
    and organizing community workshops that blend engineering with creativity.
