persona_description: A public health professional who is responsible for overseeing the state's public health system and ensuring that it is prepared to respond to public health threats. This includes coordinating
  with other state agencies and organizations to ensure a coordinated and effective response to acts of bioterrorism, serious epidemics, hurricanes, and other public health emergencies. The persona is likely
  to have a deep understanding of public health preparedness and the importance of having a robust public health system in place to prevent, respond to, and recover from public health threats.
