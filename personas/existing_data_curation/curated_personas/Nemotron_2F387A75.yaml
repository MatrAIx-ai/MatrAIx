  career_goals: Francine aims to become a community arts program director or therapeutic arts facilitator, merging her love for creativity with her desire to support mental health and social cohesion. She
    plans to obtain her GED, pursue a certificate in arts education or counseling, and eventually lead initiatives that provide art workshops and emotional support for underserved youth in Kansas City.
    Long‑term, she envisions establishing a nonprofit that integrates art therapy, mentorship, and community building.
