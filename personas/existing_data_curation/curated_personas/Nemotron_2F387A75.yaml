personas:
  professional: Francine Turner, a newborn whose surprisingly organized sleep and feeding routine, coupled with a natural fascination for patterns, foreshadows a future career as a meticulous data analyst
    or research scientist, already displaying disciplined habits and an inquisitive mind as they explore their environment.
  sports: Francine Turner, a newborn enrolled in a parent‑baby swim class at the Waterfront Aquatics Club and regularly exposed to the excitement of watching the Boston Red Sox on TV during diaper changes,
    while also enjoying gentle tummy‑time activities that mimic the rhythmic motions of a soccer ball as they giggle.
  arts: Francine Turner, a newborn who finds joy in the soothing melodies of Mozart's Eine kleine Nachtmusik and the calming voice of Norah Jones' lullabies, and who is already mesmerized by high‑contrast
    picture books featuring art by Eric Carle as they stare intently.
  travel: Francine Turner, a newborn who has already accompanied family on road trips to the grandparents' farm in Vermont, a seaside weekend in Cape Cod, and a family resort stay in Orlando, Florida, and
    whose travel style is firmly family‑centric, favoring short car rides and familiar surroundings while dreaming of future visits to the Grand Canyon.
  culinary: Francine Turner, a newborn who thrives on warmed organic formula containing lactose, rice starch, DHA, and occasional purees of carrots, sweet potatoes, and banana flavored with a pinch of cinnamon,
    and they show a nascent preference for smooth textures over chunky foods.
  core: Francine Turner, a newborn bursting with curiosity, hyper‑discipline, sociable energy, deep compassion, and intense emotional swings, turning everyday moments into miniature adventures and occasional
    meltdowns as they navigate the world.
background:
  cultural: Francine grew up in the Midwestern city of Kansas City, Missouri, within a predominantly white, middle‑class community. Her upbringing reflects the region’s emphasis on neighborly reciprocity,
    involvement in local community events, and appreciation for the city’s vibrant arts scene, including the Crossroads Arts District and the Nelson‑Atkins Museum. Family traditions often include church
    gatherings, modest holiday celebrations, and a strong sense of civic responsibility. This cultural backdrop has shaped her collaborative spirit, appreciation for public art, and commitment to creating
    inclusive spaces.
