persona_description: A blues musician who is known for his contributions to the development of the 12 bar blues form and his role in popularizing the genre. His musical style was heavily influenced by the
  sounds of the natural world and his religious upbringing. He was deeply religious and his music was often accompanied by the sounds of nature. He was born in Florence, Alabama and was deeply influenced
  by the church music he sang and played as a youth. He moved to Chicago in 1892 and became the bandmaster of the Mahara's Colored Minstrels, a successful band that toured throughout the United States.
  He later organized the Lauzetta Quartet and played the cornet in the Chicago World's Fair in 1893.
