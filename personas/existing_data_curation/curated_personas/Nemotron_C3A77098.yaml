personas:
  professional: Raymond is a budding junior LEGO architect who volunteers to lead the after‑school building club at their elementary school, channeling their love for step‑by‑step instructions while injecting
    spontaneous, imaginative twists into each project, even though they sometimes misplace their building plans.
  sports: Raymond is a lively midfielder for the Rogers Youth Soccer Club and a devoted fan of the Arkansas Razorbacks football team and the Kansas City Chiefs, and they spend weekends playing pickup games,
    attending local high‑school football matches, and cheering loudly at the state fair’s soccer tournament.
  arts: Raymond is an avid doodler of cartoon heroes, a regular listener of Luke Bryan and Taylor Swift on family road trips, and a frequent viewer of Pixar films like 'Toy Story' that inspire their latest
    LEGO space creations.
  travel: Raymond is a curious explorer who has camped in the Ozark National Forest, visited the Arkansas State Fair and Hot Springs, and dreams of a school field trip to Washington D.C. and a summer vacation
    at Disney World, balancing family‑planned itineraries with spontaneous weekend bike rides to nearby lakes.
  culinary: Raymond is a picky but enthusiastic eater who swears by crispy fried catfish, smoky barbecue ribs, and buttery mac and cheese, loves to help their grandparents bake chocolate chip cookies, and
    insists on adding extra hot sauce to their taco night, though they often forget to finish their vegetables.
  core: Raymond is a structure‑loving yet spur‑of‑the‑moment ten‑year‑old who balances their LEGO precision, soccer energy, and endless curiosity with occasional worry, impulsive spending, and a habit of
    misplacing their soccer cleats.
background:
  cultural: 'Raymond is a white American child raised in Rogers, Arkansas, a growing suburb in the Ozark region of the South. His family reflects typical Mid‑Southern values: a strong sense of community,
    hospitality, and an appreciation for outdoor recreation. They likely attend a local church, celebrate holidays such as Thanksgiving, Independence Day, and local events like the Arkansas State Fair,
    and enjoy regional foods like fried catfish and barbecue. The community emphasizes school involvement, youth sports, and scouting, providing Raymond with many opportunities to engage in group activities.
    While rooted in traditional Southern culture, his household also embraces modern technology, allowing him to blend classic outdoor experiences with digital hobbies.'
