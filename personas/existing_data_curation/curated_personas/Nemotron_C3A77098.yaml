  career_goals: Raymond frequently imagines a future where he can blend structure with creativity. He is drawn to the idea of becoming a firefighter because the job offers clear routines, teamwork, and
    a chance to protect his community – values that appeal to his practical side. At the same time, he loves video games and dreams of designing his own games, giving him the freedom to create rules and
    also allow spontaneous player choices. He hopes to develop his teamwork, problem‑solving, and communication skills now so that he can pursue a career in emergency services or technology that balances
    order with imagination.
