persona_description: A teacher or educator who is responsible for creating and implementing literacy programs for students in primary schools. This person is skilled in identifying and teaching the most
  commonly used words in English, as well as creating engaging and effective teaching materials to help students learn to read, spell, and write fluently. This person is likely to be familiar with the Magic
  200 Words Literacy Resource Manual and the Magic 200 Words Playing Cards, and may have experience using them in the classroom.
