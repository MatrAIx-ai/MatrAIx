persona_description: A humanitarian organization dedicated to reducing the impact of PTSD in African communities. This organization plans to provide the Transcendental Meditation (TM) technique to 5,000-10,000
  Africans suffering from PTSD, and aims to rapidly scale up its efforts over the following years. The organization supports David Lynch Foundation and is also the collective Africa projects of PTSD Relief
  Now Corporation, a 501C3 non-profit charitable corporation. The organization's full web site includes a wide range of research studies, projects, endorsements, videos, TV and radio shows, newsletters,
  blogs, Facebook and other social media sites, and more.
