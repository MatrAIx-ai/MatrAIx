  career_goals: Charles aims to advance from his current general office clerk role to an office manager position within the next three to five years, ideally at a reputable engineering or technology firm
    where he can apply his STEM knowledge. He plans to obtain a Certified Administrative Professional (CAP) credential and attend leadership workshops to build supervisory skills. Long‑term, he envisions
    moving into operations coordination, helping streamline workflows while fostering a supportive, low‑stress work environment for his team. Financial stability for his family and a balanced work‑life
    schedule are top priorities in his career planning.
