personas:
  professional: June Jung is a seasoned interpreter and translator specializing in medical, legal, and community contexts, leveraging fluency in English, Spanish, and conversational Korean alongside mastery
    of SDL Trados and MemoQ to deliver precise, deadline‑driven projects, and they channel their disciplined, detail‑oriented nature into meticulous quality checks and structured mentorship for junior translators
    in the Mountain Home region.
  sports: June Jung follows the St. Louis Cardinals baseball team and the Arkansas Razorbacks basketball squad, participates in the Ozark Trail Hikers Club for seasonal hikes, and integrates low‑impact
    cardio like brisk walking into their routine, balancing a love of nature with a structured approach to staying fit.
  arts: June Jung finds creative solace in quilting intricate patterns while listening to folk legends such as The Carter Family, enjoys reading historical fiction by Philippa Gregory and biographies of
    Maya Angelou, and attends local performances of the play 'Our Town' featuring regional actors like Susan Clarke, allowing the arts to enrich their disciplined yet reflective life.
  travel: June Jung prefers meticulously planned trips that blend cultural immersion and relaxation, having explored the historic streets of Savannah, the jazz scene of New Orleans, and the scenic trails
    of Hot Springs National Park, while dreaming of a guided tour through Seville's Alcázar and the garden terraces of Kyoto, always budgeting carefully to accommodate their modest fixed income.
  culinary: June Jung excels at preparing traditional Southern fare such as crispy fried chicken, collard greens simmered with smoked turkey, and creamy cornbread, often incorporating garden‑fresh tomatoes,
    okra, and sweet potatoes into dishes like shrimp and grits, and they take pride in perfecting each recipe with the precision of a well‑threaded quilt.
  core: June Jung blends disciplined organization with a love for solitary, nature‑infused hobbies, turning meticulous translation work into community service while quietly humming folk tunes during quilting
    sessions, even if they occasionally hoard extra quilting needles.
background:
  cultural: June was raised in a modest, predominantly white rural community in Mountain Home, Arkansas, where Southern hospitality, church involvement, and close‑knit family ties shaped her values. Her
    ancestry includes German roots on her paternal side and a Korean lineage through her mother, which sparked an early fascination with languages and cross‑cultural communication. The blend of Midwestern
    practicalism and an appreciation for diverse cultural perspectives informs both her professional work as a translator and her personal commitment to community service.
attributes:
  skills: '["English fluency", "Spanish fluency", "Conversational Korean", "Simultaneous interpretation", "Consecutive interpretation", "Medical translation", "Legal translation", "Computer‑assisted translation
    (SDL Trados, MemoQ)", "Project management", "Quality assurance and proofreading"]'
  hobbies: '["Gardening", "Quilting", "Knitting", "Birdwatching", "Reading historical fiction", "Hiking in the Ozarks", "Small book club participation", "Cooking Southern cuisine"]'
  career_goals: June aims to obtain ATA certification within the next year to formalize her credentials, and to transition into a senior consultancy role where she can mentor emerging translators in the
    Mountain Home region. She plans to launch a small boutique translation service focused on local healthcare providers and small businesses, ensuring culturally accurate communication. Additionally, she
    hopes to author a guide on best practices for community interpreting and to volunteer her expertise for non‑profit organizations serving immigrant and senior populations.
