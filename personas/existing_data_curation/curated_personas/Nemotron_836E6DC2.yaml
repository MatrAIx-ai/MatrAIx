  skills: '[''Python'', ''JavaScript'', ''TypeScript'', ''Node.js'', ''React'', ''Java'', ''AWS'', ''Google Cloud Platform'', ''Docker'', ''Kubernetes'', ''Terraform'', ''PostgreSQL'', ''MySQL'', ''MongoDB'',
