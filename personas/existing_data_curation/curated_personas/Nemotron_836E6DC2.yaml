  hobbies: '[''Hiking in the East Bay hills'', ''Photography of natural and urban scenes'', ''Cooking traditional Mexican dishes and experimenting with modern cuisine'', ''Playing acoustic guitar and exploring
    Mexican folk music'', ''Reading science‑fiction and technology non‑fiction'', ''Participating in small, focused coding meetups'', ''Mentoring high‑school students in programming'']'
  career_goals: Juan aims to transition into a technical leadership role over the next five years, targeting positions such as Lead Engineer or Solutions Architect where he can shape system design while
    still writing code. He plans to obtain AWS Professional and Google Cloud Professional certifications to solidify his cloud expertise. Juan is also interested in founding a small startup that leverages
    technology to address challenges faced by the Latino community in the Bay Area, such as educational access and workforce development. He seeks to mentor emerging developers, contribute to open‑source
    projects focused on accessibility, and eventually balance technical leadership with product strategy, all while maintaining the work‑life balance that supports his family commitments.
