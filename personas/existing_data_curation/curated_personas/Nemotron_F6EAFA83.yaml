personas:
  professional: Matthew Trombley, a 22‑year‑old aspiring shift supervisor in Fort Myers’ lively bar‑and‑restaurant scene, leverages his quick reading of group dynamics, hands‑on bar‑service experience,
    and knack for troubleshooting to keep the floor humming while balancing a relaxed attitude toward schedules that sometimes leads to last‑minute rushes.
  sports: Matthew Trombley is a regular at Fort Myers Beach Volleyball Club, joins pickup basketball games at the Southwest Florida Gym, roots for the Tampa Bay Buccaneers and the Florida Gulf Coast Eagles,
    and enjoys weekend hikes in the nearby state parks while occasionally nursing a sprained ankle.
  arts: Matthew Trombley curates playlists featuring The Killers, Hozier, and local surf‑rock group The Beach Bums for his bar‑trivia nights, practices casual photography inspired by Annie Leibovitz’s sunset
    compositions, and unwinds with true‑crime podcasts like Serial, all of which feed his curiosity and social flair.
  travel: Matthew Trombley prefers spontaneous weekend road trips, having explored Key West, New Orleans, and the Everglades on a modest budget, while dreaming of a future backpacking adventure to Costa Rica’s
    Pacific coast once his college tuition is secured.
  culinary: Matthew Trombley enjoys cooking fish tacos with fresh cilantro, lime, and avocado, often experimenting with shrimp po'boys and key‑lime pie for friends, yet his kitchen skills hover at a confident
    hobbyist level, relying on quick recipes after late‑night shifts.
  core: Matthew Trombley thrives on high‑energy social scenes, balances a competitive edge with a laid‑back approach to planning, and often lets anxiety fuel his last‑minute bursts of productivity while
    occasionally slipping into procrastination.
background:
  cultural: Matthew grew up in a middle‑class family in Fort Myers, a coastal city in Southwest Florida. His upbringing reflects a typical white American household that blends Southern hospitality with
    the laid‑back, tourism‑driven vibe of the Gulf Coast. Being in a region with a steady flow of visitors and a diverse local population, he has absorbed a relaxed attitude toward different cultures while
    maintaining the family‑oriented and community‑focused values of his own background. This environment has contributed to his sociable nature, his appreciation for flexibility, and his awareness of the
    broader cultural mosaic that surrounds him.
