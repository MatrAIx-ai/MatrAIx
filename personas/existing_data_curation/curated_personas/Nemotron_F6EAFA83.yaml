  career_goals: Matthew aims to obtain his GED within the next year and enroll in a community‑college program focused on business administration or hospitality management. He envisions starting as a shift
    supervisor at a local restaurant or bar, leveraging his customer‑service experience to move into a management role. Over the next five years, he hopes to combine his love of social environments and
    entrepreneurship by opening a small beachfront coffee‑bar or a sports‑gear shop that also hosts community tournaments. Throughout this journey, he wants to improve his organizational habits, reduce
    anxiety through structured routines, and develop leadership skills that balance his competitive drive with collaborative teamwork.
