  hobbies: '[''Sketching and drawing'', ''Urban photography'', ''Visiting art galleries and murals'', ''Listening to jazz, hip‑hop, and blues music'', ''Reading science‑fiction and African‑American literature'',
    ''Playing basketball in local community courts'', ''Blogging about art and culture'', ''Volunteer work at the community library'']'
  career_goals: Shawn aims to enroll in a community‑college associate program in graphic design while securing a part‑time apprenticeship in carpentry to support himself financially. He envisions combining
    his artistic talent with his hands‑on experience by working as a visual designer for community organizations, creating murals, branding, and digital media that celebrate African‑American heritage in
    the Chicago area. In the longer term, he aspires to launch a freelance creative studio that offers design services, community art workshops, and collaborative projects that foster cultural expression
    and empowerment.
