personas:
  professional: Cassia Rivera, a 20‑year‑old bilingual insurance associate, melds curiosity with pragmatic risk assessment by using Salesforce and HubSpot to translate complex policy language into relatable
    guidance for underserved families, while balancing meticulous organization with the flexibility needed for dynamic client interactions, all rooted in the community‑centric values of hospitality and
    respect.
  sports: Cassia Rivera, an energetic twenty‑year‑old, joins co‑ed basketball pick‑up games at the Lake Arrowhead Community Center, follows the Los Angeles Lakers and the LA Galaxy, hikes the San Bernardino
    mountain trails year‑round with the Mountain Mavericks running club, and balances competitive spirit with the laid‑back joy of nature.
  arts: Cassia Rivera, a sociable twenty‑year‑old, immerses herself in salsa and bachata nights dancing to Victor Manuelle and Celia Cruz, draws inspiration from Ansel Adams’ black‑and‑white landscapes
    for her nature photography, and curates playlists that blend indie folk artist Phoebe Bridgers with Latin pop icons like Juanes.
  travel: Cassia Rivera, a curious twenty‑year‑old, favors spontaneous weekend road trips to mountain towns such as Big Bear, has trekked through Quito’s historic streets and the Galápagos Islands to reconnect
    with family traditions, and dreams of backpacking Patagonia’s Torres del Paine before mapping a budget‑friendly solo adventure to Kyoto.
  culinary: Cassia Rivera, a passionate home cook at twenty, modernizes traditional encebollado by adding avocado and coconut milk, crafts ceviche using fresh Lake Arrowhead trout seasoned with aji limo
    pepper and cilantro, and occasionally over‑salts her creations in a spirited quest for bold flavor.
  core: Cassia Rivera, a twenty‑year‑old who balances color‑coded spreadsheets with a habit of forgetting her water bottle on hikes, fuses disciplined planning, community‑focused empathy, and a love for
    salsa rhythms into a pragmatic yet vibrant approach to life.
background:
  cultural: Cassia was raised in a bilingual household by Ecuadorian immigrant parents who originated from the coastal province of Manabí. She grew up celebrating traditional festivals such as Carnaval
    de Guaranda and Día de los Difuntos, preserving strong ties to her heritage while embracing the active, outdoor lifestyle of Southern California. Family values of cohesion, hospitality, and respect
    for elders shape her interpersonal approach. She frequently blends Ecuadorian culinary traditions with fresh Californian ingredients and actively participates in local Latinx community events, bridging
    her cultural roots with her Lake Arrowhead surroundings.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Insurance product knowledge'', ''Customer relationship management (CRM) – Salesforce, HubSpot'', ''Risk assessment'', ''Negotiation and persuasive
    sales'', ''Active listening and interpersonal communication'', ''Organizational and time‑management'', ''Basic financial literacy'', ''Compliance documentation'']'
  hobbies: '[''Hiking in the San Bernardino Mountains'', ''Co‑ed basketball'', ''Salsa and bachata dancing'', ''Bilingual tutoring'', ''Cooking Ecuadorian cuisine'', ''Nature photography'', ''Traveling'',
    ''Reading contemporary fiction'', ''Community sustainability projects'']'
  career_goals: Cassia aims to become a senior insurance consultant within the next three to five years and to earn the Chartered Property‑Casualty Underwriter (CPCU) designation. She plans to complete
    a bachelor's degree in Business Administration or Finance while specializing in life and health insurance solutions for underserved Latino families. Long‑term, she envisions opening her own boutique
    agency in Lake Arrowhead that emphasizes community‑centric financial protection, mentoring new agents, and developing digital sales channels to broaden reach.
