  hobbies: '[''desert hiking'', ''birdwatching'', ''nature photography'', ''reading (science‑fiction and non‑fiction)'', ''yoga and meditation'', ''journaling'', ''volunteering at a community food‑bank'',
    ''community gardening'']'
  career_goals: Tasha aspires to move into a senior communications leadership role within a research institute or nonprofit focused on environmental health or public science education. She aims to build
    a department that integrates data‑driven storytelling with community‑centered outreach, mentor emerging communicators, and develop a comprehensive crisis‑communication framework that emphasizes transparency
    and compassion. Long‑term, she hopes to author a guide on ethical science communication and eventually transition into consulting to help smaller organizations amplify their impact sustainably.
