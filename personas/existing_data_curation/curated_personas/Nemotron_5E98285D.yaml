  career_goals: He often says he wants to become an astronaut who can draw the stars, a cartoonist who creates his own comic worlds, or an inventor of new toys that surprise his friends. He dreams of building
    a rocket out of cardboard and painting it, or designing a video game where he can explore endless fantasy lands.
