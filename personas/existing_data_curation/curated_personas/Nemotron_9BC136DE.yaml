  hobbies: '[''walking'', ''gardening'', ''fishing'', ''model ship building'', ''bridge'', ''community theater technical work'', ''church choir'', ''charitable outreach'']'
  career_goals: Michael aims to stay active by mentoring aspiring engineers through a community‑college apprenticeship and by chairing his neighborhood sustainability committee, where he plans to implement
    rain‑garden and solar‑panel projects. He also hopes to document his professional experiences in a series of articles for a local senior magazine, preserving the lessons of his generation for younger
    readers.
