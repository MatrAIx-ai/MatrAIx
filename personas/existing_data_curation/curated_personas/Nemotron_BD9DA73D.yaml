personas:
  professional: Juan Cordero, a board‑certified physician with a flair for visual storytelling, merges diagnostic precision with artistic creativity as they design community health programs, mentor junior
    staff, and pursue an integrative clinic that blends evidence‑based medicine with art‑based therapies.
  sports: Juan Cordero, an avid Sandia Mountain hiker and weekend trail‑runner, roots for New Mexico United in MLS and follows the Albuquerque Isotopes, while they also coach a local “couch‑to‑5K” group
    for beginners.
  arts: Juan Cordero, who sketches desert horizons in the style of Georgia O'Keeffe and captures chiaroscuro scenes reminiscent of Ansel Adams, strums acoustic guitar to folk tunes by John Denver at local
    salsa nights, and draws inspiration from speculative fiction authors like Neal Stephenson.
  travel: Juan Cordero, who prefers flexible road trips that combine art festivals in Santa Fe with hikes in the Grand Canyon, dreams of wandering the historic alleys of Barcelona and the cherry‑blossom
    gardens of Kyoto, planning each adventure around their clinic’s on‑call schedule.
  culinary: Juan Cordero, an enthusiastic home chef, experiments with Spanish‑inspired dishes like Paella Valenciana spiced with saffron and smoked paprika, and enjoys crafting gazpacho with locally sourced
    heirloom tomatoes, desert figs, and a drizzle of extra‑virgin olive oil.
  core: Juan Cordero, a 40‑year‑old physician‑artist, thrives on spontaneous creativity, often juggling clinic rounds with impromptu sketch sessions, yet habitually misplaces their keys and lets laundry
    pile up in the name of flexibility.
background:
  cultural: Juan’s cultural identity is rooted in his Spanish heritage, passed down through family traditions of flamenco music, tapas gatherings, and a deep appreciation for both classical and modern Spanish
    art. Living in Albuquerque, he has woven Southwestern influences—Native American ceramics, Pueblo storytelling, and the desert’s vibrant palette—into his daily life. His bilingual upbringing enables
    him to bridge Spanish‑speaking patients with the broader community, fostering trust and cultural continuity. He celebrates holidays such as Semana Santa and Fiesta de San Juan while also participating
    in local New Mexican festivals, reflecting a hybrid cultural lens that informs both his personal and professional outlook.
