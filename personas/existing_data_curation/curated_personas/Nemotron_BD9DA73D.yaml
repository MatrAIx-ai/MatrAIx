  hobbies: '[''Visiting art galleries'', ''Sketching and painting'', ''Photography'', ''Acoustic guitar'', ''Hiking'', ''Spanish cooking'', ''Salsa dancing'', ''Volunteering at community health fairs'',
    ''Reading speculative fiction'', ''Attending science-art talks'']'
  career_goals: Juan aims to develop an integrative health clinic that merges evidence‑based medicine with artistic therapies, become a regional leader in patient‑education initiatives that use visual storytelling,
    publish research on the impact of art on patient outcomes, and mentor the next generation of culturally aware physicians. He also seeks a leadership role in his hospital’s community health department
    to advocate for underserved populations in Bernalillo County.
