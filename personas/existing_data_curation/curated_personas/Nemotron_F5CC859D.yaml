    at community garden projects'', ''Off‑road desert trips with a small group of friends'', ''Exploring new ideas through design‑thinking podcasts'']'
  career_goals: Looking ahead, Barbara aims to formalize her expertise with recognized credentials. She plans to complete an OSHA 30‑hour construction safety certification and pursue a Certified Construction
    Manager (CCM) or a community college associate degree in construction management within the next two years. Her immediate career ambition is to move into a supervisory role—such as crew foreman—where
    she can blend her practical knowledge with leadership, ensuring safety, quality, and efficient workflow. In the longer term, Barbara dreams of launching her own small‑scale remodeling business focused
    on environmentally friendly home upgrades that incorporate artistic design elements, reflecting her love of art and unconventional ideas. She envisions taking on projects that merge construction with
    community art installations, allowing her to stay flexible, explore varied experiences, and maintain a schedule that supports her independent lifestyle.
