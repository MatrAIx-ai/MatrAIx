  hobbies: '[''DIY home improvement'', ''Gardening'', ''Fishing'', ''Hiking'', ''Reading non-fiction'', ''Cooking'', ''Board-game nights'', ''Volunteering at food bank'', ''Attending local music events'',
    ''Running charity 5Ks'']'
  career_goals: Michael aims to translate his practical and interpersonal strengths into a flexible part‑time role in community services or a small consulting venture that assists neighbors with home maintenance
    and budgeting. Over the next two years he plans to earn a certification in Community Health Work or Volunteer Management. His long‑term ambition is to become a trusted local resource, possibly establishing
    a nonprofit that offers free home‑repair workshops and financial‑literacy classes for low‑income families while maintaining the autonomy that suits his personality.
