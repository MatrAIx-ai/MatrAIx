  hobbies: '[''Vegetable gardening'', ''Traditional Khmer cooking'', ''Bridge club'', ''Puzzle solving (Sudoku, crosswords)'', ''Reading historical biographies'', ''Quilting'', ''Volunteer mentorship at
    senior center'', ''Walking along the Boise River'', ''Church attendance'']'
  career_goals: Although retired from formal employment, Chantha aims to deepen her impact within her community. Over the next few years she plans to become the senior advisory treasurer for the Meridian
    Southeast Asian Cultural Association, formalizing the organization’s financial practices with transparent reporting. She also intends to document and publish a collection of family recipes and oral
    histories, preserving her cultural heritage for future generations. Recognizing the digital divide among seniors, Chantha aspires to complete an online certification in senior digital-literacy training
    so she can lead workshops that teach elders how to use smartphones, video-calling, and health-tracking apps. A personal ambition is to expand her community garden into a shared plot that provides fresh
    produce to low-income families, a project she will manage with clear milestones and measurable outcomes.
