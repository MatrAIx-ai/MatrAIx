personas:
  professional: An organized community financial steward, Chantha Supan leverages their bookkeeping expertise and methodical event‑planning skill to serve as senior advisory treasurer for a cultural association,
    where they apply their calm, competitive edge to drive transparent reporting and precise budgeting.
  sports: A seasonal walker and light‑cardio enthusiast, Chantha Supan enjoys leisurely strolls along the Boise River in spring and summer, roots for the Boise State Broncos football team, and participates
    in a local seniors’ pickleball club for gentle exercise, viewing each session as a structured ritual that balances competition with social connection.
  arts: A meticulous quilter and music aficionado, Chantha Supan draws design inspiration from traditional textile motifs while listening to Joan Baez and John Coltrane, stitching intricate patterns that
    echo the geometry of their garden beds, and they often spend evenings perfecting a new block before a bridge game.
  travel: A methodical planner of modest adventures, Chantha Supan prefers organized group tours that combine gentle sightseeing with cultural immersion, having visited the ancient Angkor temple complex,
    the Canadian Rockies and the tranquil gardens of Kyoto, and they dream of a future road trip through the American Southwest's national parks while keeping a detailed itinerary.
  culinary: A disciplined home chef, Chantha Supan perfects the balance of spices in fish amok by timing the simmer of coconut milk, lemongrass, and kaffir lime leaf, while also crafting hearty Idaho potato
    gratins and seasonal quinoa salads infused with fresh basil and mint from their garden, and they relish sharing these dishes at community potlucks.
  core: Chantha Supan, a 68‑year‑old pragmatic gardener‑chef and community steward, blends meticulous planning with a quiet competitive streak; they often keep a ledger on the kitchen counter, solve Sudoku
    before bedtime, and refuse to let a stray weed or a misplaced stitch go unchecked.
background:
  cultural: Chantha Thanh Supan was born in Cambodia and grew up immersed in Khmer culture, where Buddhism, respect for elders, and communal harmony are core values. Her family emigrated to the United States
    in the early 1990s, settling eventually in Meridian, Idaho. The transition blended her Southeast Asian heritage with the rhythms of the American West, shaping a bicultural identity. She carries forward
    traditional customs such as celebrating Khmer New Year, preparing festive dishes like Amok and Nom Banh Chok, and practicing Buddhist rituals that emphasize mindfulness and compassion. Fluency in both
    Khmer and English allows her to bridge generational gaps within her community, translating official documents and assisting new immigrants. While adapting to Idaho’s climate and lifestyle, Chantha incorporates
    local traditions—such as participating in community potlucks and volunteering at the county’s senior services—into her routine, creating a unique hybrid of Southeast Asian and Western values.
