  career_goals: As he approaches retirement age, Juan aims to transition gradually from full-time sales to a mentorship and advisory role within his company, sharing his decades-long experience with younger
    representatives. He hopes to earn a senior sales advisor or team-lead position that allows him more flexibility and time for his personal interests. Juan also intends to secure a stable financial foundation
    for his family, potentially supplementing his income with a small side venture that merges his love of art and Salvadoran cuisine, such as a pop-up gallery-cafe. He is interested in pursuing a professional
    sales certification and attending workshops on emerging service technologies, so he can stay relevant and continue to contribute valuable insights even after reducing his workload.
