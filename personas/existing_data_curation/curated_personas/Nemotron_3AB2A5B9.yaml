  career_goals: Long-term, Sandra aims to become a director of scouting for a professional sports organization, where she can shape talent pipelines using innovative analytics. In the next three years,
    she plans to earn a master's degree in sports management, obtain advanced certification in sports performance, and develop a proprietary scouting algorithm that leverages machine learning. She also
    hopes to mentor emerging female coaches in the Southeast, establishing a regional network that champions evidence-based coaching practices.
