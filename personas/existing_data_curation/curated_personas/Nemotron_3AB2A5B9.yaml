personas:
  professional: Sandra Lane, a 28‑year‑old data‑driven scouting specialist, blends biomechanics expertise, Python‑based statistical modeling, and an abstract‑artist’s imagination to craft innovative athlete‑performance
    dashboards that win over skeptical coaches while thriving under last‑minute deadlines.
  sports: Sandra Lane, an avid hiker of the Blue Ridge foothills and weekend pick‑up basketball player, follows the Atlanta Braves and the Carolina Panthers, coaches a local youth soccer clinic, and designs
    experimental drill circuits that fuse VR simulations with biomechanics data to keep athletes engaged.
  arts: Sandra Lane’s evenings are spent painting abstract canvases inspired by Jackson Pollock’s drip technique while editing experimental photographs that echo the surreal narratives of David Lynch, and
    they regularly attend performances by Marina Abramović and concerts featuring Tame Impala.
  travel: Sandra Lane prefers spontaneous, budget‑conscious road trips, having trekked the Appalachian Trail, explored Kyoto’s Gion district for its pastel gardens, and dreaming of Iceland’s volcanic landscapes
    for a future immersive VR‑enhanced hike.
  culinary: Sandra Lane experiments with fusion cuisine, frequently whipping up Korean‑Mexican tacos with kimchi salsa, miso‑glazed salmon, and quinoa‑based salads, skillfully balancing a moderate cooking
    proficiency with a penchant for daring ingredient pairings like sriracha‑infused chocolate.
  core: Sandra Lane is a curiosity‑driven sports analyst who mixes abstract art, adventurous travel, and disciplined skepticism into a flexible, creatively competitive life.
background:
  cultural: Sandra grew up in the small-town environment of Anderson County, South Carolina, within a middle-class, Protestant family that valued education and community involvement. The region’s strong
    high-school sports culture sparked her early interest in coaching, while Southern hospitality shaped her interpersonal style. She retains a love for traditional Southern cuisine and regional festivals,
    yet her STEM education and exposure to diverse ideas have given her a progressive outlook. This blend of Southern roots and analytical curiosity informs both her professional approach and personal life.
