  hobbies: '[''Visiting art galleries and museums'', ''Reading (science, history, poetry)'', ''Gardening (herbs, heirloom vegetables, succulents)'', ''Cooking Mexican‑Pacific Northwest fusion dishes'',
    ''STEM mentorship volunteering'', ''Participating in small book clubs'', ''Birdwatching'', ''Digital photography'', ''Attending cultural festivals (e.g., Día de los Muertos, Cinco de Mayo)'', ''Traveling
    to Mexican heritage sites with small groups'']'
  career_goals: Although retired from her formal engineering role, Maria aims to leverage her expertise to mentor the next generation of STEM learners, especially women and underrepresented minorities,
    through community workshops and school partnerships in the Beaverton area. She aspires to curate small‑scale art exhibitions that celebrate Mexican heritage and contemporary ideas, develop a memoir
    that intertwines her scientific background with her cultural roots, and refine her digital photography skills to document local landscapes and cultural events. Additionally, Maria hopes to travel to
    Mexico to reconnect with familial ties and eventually establish a scholarship fund for low‑income STEM students in the Pacific Northwest, thereby leaving a lasting legacy of education and cultural exchange.
