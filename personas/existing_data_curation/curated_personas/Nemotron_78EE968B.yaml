personas:
  professional: Maria Amparo, a retired engineer who now channels her analytical expertise into mentoring budding STEM students and curating community art shows, leverages her methodical planning and bilingual
    communication to bridge technical concepts with cultural expression.
  sports: Maria Amparo enjoys low‑impact activities such as birdwatching hikes in Forest Park, occasional senior‑league pickleball matches at the community center, and follows the Portland Timbers with
    modest fan enthusiasm, while avoiding high‑intensity sports that strain their joints.
  arts: Maria Amparo spends weekends at the Portland Art Museum and the contemporary gallery the Portland Institute for Contemporary Art, where they frequently cite the works of Yayoi Kusama, local avant‑garde
    painter Natalie Cameron Taylor, and sculptor David Klabunde as inspirations for their own curatorial projects.
  travel: Maria Amparo prefers thoughtfully planned road trips to small‑town festivals—such as the Oregon Wine Country Harvest Celebration and the historic lantern festival in Santa Rosa—while dreaming
    of a return visit to the vibrant markets of Oaxaca, Mexico, balancing wanderlust with a budget and the need for frequent rest stops.
  culinary: Maria Amparo delights in cooking dishes that marry home‑grown heirloom tomatoes, freshly foraged Oregon mushrooms, and spice blends reminiscent of their family’s heritage, producing signature
    plates like roasted tomato‑sage soup topped with jalapeño‑infused crema and grilled salmon with mole‑style sauce.
  core: Maria Amparo blends disciplined engineering precision with a quiet curiosity for art and nature, turning a love of gardening, mentorship, and cultural storytelling into a uniquely methodical yet
    creatively rich retirement.
background:
  cultural: Maria was born into a Mexican family and grew up immersed in the language, traditions, and communal values of Mexico. She maintains close relationships with her extended family, celebrates holidays
    such as Día de los Muertos, Navidad, and Cinco de Mayo with traditional foods, music, and altar‑building, and carries these customs into her life in Beaverton, Oregon. Her bilingual upbringing enables
    her to bridge Mexican and American cultures, and she actively shares Mexican art, cuisine, and stories with the local Hispanic community and broader multicultural events. The strong family cohesion,
    respect for elders, and work ethic ingrained from her Mexican heritage inform her organized, reliable, and compassionate personality, while her appreciation for new ideas and unconventional thinking
    reflects the melding of her cultural roots with the diverse, progressive environment of the Pacific Northwest.
attributes:
  skills: '[''Analytical problem solving'', ''Data analysis (Excel, Python)'', ''Project planning and management'', ''Technical writing'', ''STEM education and mentoring'', ''Bilingual communication (Spanish
