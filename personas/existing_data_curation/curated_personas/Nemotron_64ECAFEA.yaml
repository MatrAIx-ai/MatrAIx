personas:
  professional: Javonda Mcclellan is a seasoned long‑haul driver and sales associate with three decades of experience, leveraging expert route optimization, regulatory compliance, and a methodical, customer‑focused
    approach to negotiate transport contracts while positioning herself for a supervisory logistics coordinator role.
  sports: Javonda Mcclellan hits the Appalachian Trail every weekend with the local Shenandoah Trailhikers club, watches the Washington Commanders and Washington Capitals religiously, and competes in a
    bridge club that doubles as her strategic mind‑sharpening sport.
  arts: Javonda Mcclellan lifts her voice in the seniors’ choir, drawing inspiration from gospel legends like Mahalia Jackson and contemporary soul artists like Alicia Keys, while enjoying classic films
    such as "Driving Miss Daisy" and attending local performances by the Martinsburg Community Theater.
  travel: Javonda Mcclellan has explored Savannah’s historic squares, trekked the Blue Ridge Parkway, and plans a road trip to New Orleans to sample its jazz scene, balancing her love of spontaneous detours
    via smartphone navigation with tight budgeting to keep family expenses in check.
  culinary: Javonda Mcclellan’s kitchen is a fragrant blend of Southern comfort and garden harvests, where she perfects dishes like shrimp‑and‑grits, smoked catfish with collard greens, and pepper‑spiked
    tomato jam using home‑grown heirloom tomatoes, peppers, and native herbs such as rosemary and sage.
  core: Javonda Mcclellan combines a lifelong love of road logistics with a curiosity for new tech, a fiercely organized mindset, and a competitive yet calm demeanor that makes her the reliable anchor of
    any community event—though she’ll admit to hoarding spare change for a future courier venture.
background:
  cultural: Javonda is a first-generation Black woman whose family has deep roots in the Appalachian region of West Virginia. Growing up in Martinsburg she experienced a blend of African-American church
    traditions, Southern culinary heritage, and the close-knit community values of rural Appalachia. Her upbringing emphasized perseverance, self-reliance, and mutual support, which inform her calm resilience
    and strong work ethic. She maintains close ties to her church and local Black cultural organizations, participates in annual Juneteenth celebrations, and takes pride in passing down family stories and
    recipes to younger generations.
