  hobbies: '[''church seniors choir'', ''volunteering at the local food bank'', ''gardening'', ''cooking Southern cuisine'', ''attending electric-vehicle workshops'', ''hiking Appalachian trails'', ''bridge
    club'', ''genealogy research'', ''community potluck organization'']'
  career_goals: Javonda aims to transition from frontline driving to a supervisory role within her transport company, leveraging her extensive on-the-road experience to become a logistics coordinator or
    fleet safety manager. She also plans to obtain an advanced CDL endorsement for hazardous materials to broaden her service offerings. In parallel, she hopes to mentor younger drivers—especially women
    and people of color—through a community apprenticeship program she intends to develop locally. Long-term, she envisions launching a small courier business focused on reliable deliveries for local businesses
    in Martinsburg, combining her sales acumen with her logistical expertise.
