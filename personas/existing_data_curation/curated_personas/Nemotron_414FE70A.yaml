personas:
  professional: Juan Behar is a methodical IT support hopeful who leverages his bilingual communication and hands‑on troubleshooting skills to streamline workflows in mid‑size firms; they regularly document
    procedures in spreadsheets while dreaming of launching a sustainability‑focused landscaping venture.
  sports: Juan Behar is an avid desert hiker and off‑road biker who clubs with the Saguaro Trail Riders and follows the Phoenix Suns and Arizona Diamondbacks, preferring early‑morning workouts in the Sonoran
    heat and using fitness trackers to log mileage.
  arts: Juan Behar is a devoted participant in local Dia de los Muertos festivities, crafting elaborate papel picado and altar offerings inspired by the works of Frida Kahlo, while listening to the folk‑rock
    sounds of Café Tacuba and the acoustic ballads of Jack Johnson during his workshop sessions.
  travel: Juan Behar is a planner‑oriented traveler who enjoys weekend road trips to the Grand Canyon and Saguaro National Park, has visited Mexico City for Día de los Muertos celebrations, and dreams of
    trekking Patagonia’s Torres del Paine once financial stability allows longer stays.
  culinary: Juan Behar is a home‑cooking enthusiast whose pantry shelves oregano, epazote, and dried chilies, and who frequently prepares sustainable dishes like grilled cactus tacos, chiles en nogada,
    and roasted quinoa bowls, while also mastering the art of simmering traditional tamales for family gatherings.
  core: Juan Behar is a curiosity‑driven, methodical planner whose love of order fuels a hobby‑rich life punctuated by spreadsheet‑obsessed budgeting, meticulous health tracking, and occasional coffee‑induced
    over‑planning.
background:
  cultural: Juan is a first‑generation Mexican‑American whose family roots trace back to the state of Jalisco. Growing up in a bilingual household, he learned Spanish at home and English at school, giving
    him a deep appreciation for both cultures. He observes Mexican traditions such as Día de los Muertos, Navidad posadas, and enjoys cooking dishes like tamales and pozole with his family. Living in Arizona,
    he blends this heritage with the regional desert culture, often attending community festivals that celebrate the confluence of Mexican and Southwestern influences. His cultural identity shapes his values
    of family solidarity, respect for elders, and a strong work ethic.
attributes:
  skills: '[''Technical troubleshooting'', ''Data management'', ''Project coordination'', ''Bilingual communication (Spanish/English)'', ''Workflow optimization'', ''Inventory control'', ''Basic automotive
    maintenance'', ''Landscaping'', ''Small‑scale construction'']'
  hobbies: '[''Reading non-fiction (technology, sustainability)'', ''Electronics repair'', ''Arduino programming'', ''Home workshop projects'', ''Hiking Sonoran Desert trails'', ''Stargazing'', ''Off‑road
    biking'', ''Participating in local Mexican cultural events'']'
  career_goals: He aims to translate his practical skill set into a stable, full‑time role in operations or IT support within a mid‑size company. Over the next three years, he plans to complete his associate
    degree in information systems and earn certifications such as CompTIA A+ and Project Management Professional (PMP). He also dreams of eventually launching a small, community‑focused landscaping service
    that incorporates sustainable desert‑native planting, allowing him to combine his technical aptitude with his love for the local environment.
