    visual communication'']'
  hobbies: '[''Watercolor painting'', ''Wildlife photography'', ''Hiking'', ''Knitting'', ''Quilting'', ''Community theater participation'', ''Book club reading (art & design)'', ''Teaching graphic-design
    workshops'', ''Yoga and mindfulness meditation'', ''Experimenting with digital illustration'', ''Attending local craft fairs'', ''Cooking traditional Alaskan recipes'']'
  career_goals: Janet aims to leverage her decades-long design experience to mentor emerging artists in her remote Alaskan community, establishing a small cooperative studio that offers graphic design services
    to local businesses and tribal organizations. She aspires to create a series of visually compelling storytelling projects that document the region's natural environment and cultural narratives, integrating
    new media such as interactive web platforms and augmented-reality installations. Over the next five years she hopes to complete advanced training in motion graphics and inclusive design, and to serve
    as a consultant for state-level public-information campaigns, ensuring that visual communications are clear, accessible, and culturally sensitive. Ultimately, she envisions leaving a lasting visual
    legacy that blends contemporary design with the unique aesthetic of Alaska's frontier.
