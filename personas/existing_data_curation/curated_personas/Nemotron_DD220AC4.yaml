  career_goals: Richard aims to advance to a foreman or production manager role within the next three years, leveraging his hands‑on experience to oversee larger teams and more complex projects. He plans
    to earn his AWS Certified Welder credential and a CNC programming certification to broaden his technical credibility. Long‑term, he dreams of launching a boutique custom‑fabrication shop that serves
    regional agricultural and construction clients, providing a stable financial foundation for his family while maintaining the structured, high‑standard work environment he values.
