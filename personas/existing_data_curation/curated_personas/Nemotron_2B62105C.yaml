    ''Volunteer teaching automotive basics'']'
  career_goals: Looking ahead, Santo aims to achieve ASE Master Technician certification and become a certified specialist in electric‑vehicle service. He plans to mentor apprentices in his current shop,
    eventually opening a boutique garage that focuses on restoring classic American muscle cars while offering community workshops on sustainable vehicle maintenance and basic car care. He hopes to integrate
    his love of art by curating an inviting workshop space that showcases local artwork and serves as a gathering spot for both mechanics and enthusiasts.
