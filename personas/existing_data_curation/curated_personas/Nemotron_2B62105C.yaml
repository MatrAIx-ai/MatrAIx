personas:
  professional: Santo Burtch is a veteran automotive service technician with over three decades of hands‑on experience, excelling in everything from gasoline and diesel engines to modern hybrid and electric
    powertrains, and they leverage their meticulous shop‑management skills, advanced diagnostic tool mastery, and love of classic‑car restoration to mentor apprentices while planning a boutique garage that
    will double as a community art space.
  sports: Santo Burtch enjoys early‑morning fishing trips to Lake Red Rock, weekend hikes across the Loess Hills at a comfortable pace, and follows the Iowa Hawkeyes football team and the Chicago Bulls
    closely; they also join a local senior softball league a few times each summer, using the light exercise to offset long hours standing in the shop.
  arts: Santo Burtch spends Saturdays oil‑painting impressionistic Iowa landscapes inspired by Monet and Wyeth, exhibits their work alongside local Regionalist pieces by Grant Wood, captures classic cars
    in the golden hour using a Nikon D850 in a style reminiscent of Ansel Adams, and unwinds listening to Tom Petty, Miles Davis’s "Kind of Blue," and classic Hollywood films like Hitchcock’s "Rear Window,"
    often sharing their art at community center events.
  travel: Santo Burtch prefers road‑tripping along historic routes such as the Great River Road and U.S. Route 66 on a restored vintage motorcycle, has explored the Henry Ford Museum in Michigan, the National
    Automobile Museum in Nevada, and dreams of attending the Goodwood Festival of Speed in England; they typically book modest motels, savor local diners, and plan trips around garage downtime to keep the
    business running smoothly.
  culinary: Santo Burtch enjoys grilling Iowa pork chops with apple chutney, pan‑frying catfish caught from nearby lakes, simmering a hearty corn chowder, and making Sunday banana pancakes drizzled with
    maple syrup; they are comfortable at the grill and stovetop, favor a crisp local craft beer with meals, and occasionally treat themselves to a glass of bourbon while painting.
  core: Santo Burtch blends masterful mechanic craftsmanship with an artist’s eye, balancing the roar of engines and the hush of Iowa hills while keeping meticulous spreadsheets, a slight over‑caffeinated
    habit, and an unshakable love for classic cars.
background:
  cultural: Santo grew up in a small farming community in northern Iowa, raised in a family of German‑Scandinavian descent that emphasized hard work, self‑reliance, and community involvement. The Midwest’s
    stoic pragmatism and modest hospitality shaped his dependable, courteous demeanor, while the region’s rich tradition of local fairs and art events nurtured his appreciation for creative expression.
    Though now divorced and living alone in Forest City, he remains connected to the area’s close‑knit social fabric through his participation in the local garage, volunteer teaching, and regular attendance
    at community art shows. His cultural identity blends rural practicality with a quiet curiosity for new ideas and aesthetic experiences.
