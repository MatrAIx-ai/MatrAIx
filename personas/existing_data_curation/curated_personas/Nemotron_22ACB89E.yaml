personas:
  professional: Tony Burns, a seasoned Emergency Medical Technician with over two decades of rural Oklahoma experience, blends rapid trauma assessment with a creative, art‑inspired problem‑solving approach,
    delivering calm, coordinated emergency care while mentoring new responders and eyeing a paramedic upgrade.
  sports: Tony Burns, a devoted fan of the Oklahoma City Thunder and a seasonal participant in the local senior hiking club, spends weekends fishing at Lake Thunderbird, hiking the Wichita Mountains with
    their teenage children, and joining a casual Sunday soccer pickup league with colleagues, while keeping an eye on the Oklahoma State Cowboys football schedule.
  arts: Tony Burns, an avid patron of the Oklahoma City Museum of Art and regular at community theater productions, channels drumming skills into a garage band called “Midwest Echo,” curates a vinyl collection
    featuring Miles Davis’s Kind of Blue and The Velvet Underground’s White Light/White Heat, and showcases prairie‑barn photography in the Oklahoma Photography Club.
  travel: Tony Burns, who plans trips with a blend of loose itineraries and spontaneous detours, loves weekend road‑trips to the Tallgrass Prairie and annual family camping in the Ozarks, dreams of photographing
    the cherry blossoms in Kyoto, and keeps an eye on a future classic‑car rally vacation in the Scottish Highlands.
  culinary: Tony Burns, a competent home cook who favors Southern comfort flavors, frequently grills chicken‑fried steak with homemade gravy, whips up smoked catfish with hush puppies using fresh okra and
    jalapeños, and experiments with a cast‑iron skillet to perfect a signature sweet‑potato and cornbread casserole.
  core: Tony Burns blends a steady EMT career, a zest for art and music, and a laid‑back, family‑centered lifestyle, punctuated by classic‑car tinkering, spontaneous road trips, and a habit of juggling
    responsibilities with a relaxed, creative flair.
background:
  cultural: Tony is a White American raised in the small‑town community of Wanette, Oklahoma. His family roots trace back to Midwestern farming families, with a mix of German and Irish ancestry that emphasized
    hard work, self‑reliance, and community service. The local culture blends traditional values—church involvement, country music, and a strong sense of neighborliness—with a growing appreciation for regional
    arts and outdoor recreation. Growing up in a rural setting gave Tony an intimate understanding of the healthcare challenges faced by underserved populations, shaping his commitment to emergency medical
    service and community health. His openness to new ideas and art reflects a personal desire to broaden the cultural horizons of his hometown while staying grounded in its close‑knit, supportive spirit.
attributes:
  skills: '[''Basic Life Support (BLS)'', ''CPR and AED certification'', ''Trauma assessment and stabilization'', ''Airway management and ventilation'', ''Wound care and immobilization'', ''Medical equipment
    operation (defibrillator, portable ventilator)'', ''Emergency scene coordination'', ''Community first‑aid instruction'', ''Adaptable problem‑solving'', ''Strong interpersonal communication'']'
  hobbies: '[''Visiting art museums and galleries'', ''Community theater attendance'', ''Photography of rural landscapes'', ''Playing drums in a garage band'', ''Collecting vintage vinyl records'', ''Hiking,
    fishing, and camping'', ''Teaching first‑aid workshops'', ''Improv comedy participation'', ''Classic car restoration'', ''Cooking new recipes'']'
  career_goals: Tony aims to upgrade his EMT certification to a full paramedic license within the next two years, followed by Advanced Cardiac Life Support (ACLS) and Pediatric Advanced Life Support (PALS)
    credentials. He plans to become a certified emergency medical instructor to train new EMTs and volunteers. Long‑term, he envisions launching a Rural Health & Arts Outreach program that pairs health‑education
    workshops with local art exhibitions, helping residents engage with both wellness and culture. He also hopes to take on a supervisory role within the Cleveland County EMS system, coordinating emergency
    response training and disaster‑preparedness drills. Eventually, he would like to open a small urgent‑care clinic in Wanette that offers both medical services and community art events.
