personas:
  professional: Yvonne Bernal, a 25‑year‑old biomedical engineer, applies their strong command of cell culture, tissue engineering, and SolidWorks CAD to design reproducible biomaterial devices, turning
    routine lab processes into reliable R&D outcomes while calmly mentoring junior engineers and navigating FDA compliance with a methodical, practical mindset.
  sports: Yvonne Bernal hits the Tallahassee Trail for early‑morning jogs three times a week, rounds out the routine with a brief yoga session, participates in the local Tallahassee Running Club, and cheers
    for the Florida State Seminoles football team while occasionally catching a Miami Dolphins game on TV.
  arts: Yvonne Bernal finds solace in the soulful sounds of Alicia Keys and the classic grooves of Stevie Wonder, appreciates the powerful narratives of playwright August Wilson and the vibrant collages
    of Romare Bearden, and frequently attends performances at the Tallahassee Little Theatre, where they especially enjoy productions that explore Southern heritage.
  travel: Yvonne Bernal prefers low‑key road trips that balance a loose itinerary with predictable checkpoints, having already explored Savannah’s historic squares and the culinary streets of New Orleans,
    while they dream of snorkeling in the Dominican Republic’s clear waters and hiking the Blue Ridge Parkway, all within a modest travel budget that leaves room for spontaneous stops.
  culinary: Yvonne Bernal cooks Southern‑Caribbean dishes with a pragmatic flair—stir‑frying jerk‑seasoned chicken, simmering gumbo with garden‑fresh okra and cilantro, and plating collard greens seasoned
    with thyme—showcasing moderate cooking skills that blend their love of fresh herbs like basil and mint with occasional takeout nights when work deadlines spill over.
  core: Yvonne Bernal is a routine‑driven biomedical engineer who balances meticulous lab work with a relaxed, slightly disorganized lifestyle, finding peace in gardening, jogging, and knitting while quietly
    nurturing a drive to mentor others and launch affordable medical solutions for underserved communities.
background:
  cultural: Yvonne grew up in a close‑knit Black family in Tallahassee, where church gatherings, community picnics, and celebrations of Juneteenth reinforced a sense of cultural pride and solidarity. Her
    mother, a registered nurse, emphasized the importance of practical education and service to the community, while her father, an electrician, modeled hands‑on problem solving. This upbringing nurtured
    Yvonne’s appreciation for both Southern Black traditions—such as soul food, gospel music, and storytelling—and her Caribbean heritage, which surfaces in the spices and cooking techniques she uses at
    home. She remains actively involved in local cultural events, mentors younger Black students interested in STEM, and draws inspiration from pioneers like Dr. Charles Drew and Dr. Mae Jemison, embedding
    a sense of responsibility to advance representation in biomedical engineering.
attributes:
  skills: '[''cell culture'', ''tissue engineering'', ''biomedical device prototyping'', ''SolidWorks CAD'', ''MATLAB data analysis'', ''lab safety compliance'', ''FDA regulatory standards'', ''interdisciplinary
    teamwork'', ''technical documentation'']'
  hobbies: '[''gardening'', ''cooking Southern and Caribbean cuisine'', ''jogging'', ''yoga'', ''reading historical biographies'', ''volunteering in STEM mentorship programs'', ''knitting'']'
  career_goals: Yvonne aims to secure a senior biomedical engineer position at a medical‑device company where she can lead a small, focused R&D team developing implantable scaffolds and wearable health
    monitors. She wants a role that offers a stable daily routine, clear project milestones, and the opportunity to mentor junior engineers. Over the next five years she plans to obtain her Professional
    Engineer (PE) license and file at least two patents on innovative biomaterial designs. Ultimately, she hopes to launch a modest startup that provides low‑cost, high‑quality medical accessories to underserved
    communities in the Southeast, leveraging her technical expertise and commitment to practical, impact‑driven solutions.
