  hobbies: '[''Painting'', ''Sketching'', ''Visiting art galleries'', ''Reading contemporary fiction'', ''Hiking along the Rio Grande'', ''Gardening'', ''Cooking Tex-Mex fusion dishes'', ''DIY crafts'',
    ''Digital photography'', ''Participating in board‑game competitions'', ''Yoga'']'
  career_goals: Esperanza aims to complete her GED within the next year and enroll in community college courses in visual arts and business management. She dreams of launching a small boutique studio where
    she can sell her own artwork and handmade crafts, and host community workshops that blend Anglo‑American and Mexican‑American artistic traditions. In the medium term, she hopes to become a freelance
    photographer for local events and cultural festivals, while using her competitive drive to enter regional art contests. Long‑term, she envisions establishing a cultural liaison program that bridges
    the English‑speaking and Spanish‑speaking communities in Val Verde County, promoting cross‑cultural understanding through art.
