personas:
  professional: Faye Torres, a meticulous technical support specialist who blends deep expertise in Windows, macOS, and Linux troubleshooting with instructional design skills, consistently drives rapid
    ticket resolution while charting a strategic path toward an IT Operations Manager role through certifications and a master’s in Educational Technology.
  sports: Faye Torres, an avid hiker of the Florida Panhandle’s nature trails and a member of the local bird‑watching club, also runs the occasional 5 K race, streams Miami Dolphins games, and participates
    in a weekend adult volleyball league at the community center, blending structured cardio with relaxed team play.
  arts: Faye Torres, an enthusiastic acoustic guitarist who teaches herself John Mayer solos via online tutorials, captures sunrise landscapes using a Canon EOS 90D, and curates board‑game nights featuring
    Terraforming Mars and Catan, finds creative balance between disciplined practice and spontaneous jam sessions.
  travel: Faye Torres favors self‑planned road trips along the Gulf Coast, having explored the historic streets of Savannah and the bird‑rich wetlands of Everglades National Park, while dreaming of a field‑study
    excursion to Costa Rica’s cloud forests, balancing her love of nature with a budget that prioritizes short‑haul flights and modest lodging.
  culinary: Faye Torres, a competent home cook, delights in preparing shrimp and grits with locally sourced Gulf shrimp, grows native herbs like rosemary and sage in her garden to flavor dishes such as
    lemon‑herb roasted chicken, and indulges in occasional brunches featuring avocado toast topped with poached eggs and a dash of hot sauce.
  core: Faye Torres is a competitive, detail‑driven tech educator who channels curiosity into methodical problem‑solving, balances disciplined routines with spontaneous creativity, and never misses a puzzle
    night despite occasional coffee‑fuelled insomnia.
background:
  cultural: Faye grew up in Marianna, a small town in the Florida Panhandle, within a family that blends Italian‑American and Cuban‑American roots. Although she identifies as white, her household celebrated
    both Southern traditions and Hispanic customs, giving her a nuanced cultural perspective. She was raised in a close‑knit Methodist community, participating in church gatherings, high‑school football
    Fridays, and local festivals that feature country music and traditional Southern cuisine. Her mother’s Cuban heritage introduced her to Spanish language basics, Latin rhythms, and celebrations such
    as Carnaval, while her father’s Italian background brought a love for family meals and holiday gatherings. This multicultural upbringing instilled in Faye a respect for community service, a strong work
    ethic, and an appreciation for diverse educational approaches, which now inform her professional and personal life.
attributes:
  skills: '[''Hardware troubleshooting (PC, laptop, peripheral devices)'', ''Software troubleshooting (Windows, macOS, Linux, Office suites)'', ''Network configuration and basic routing (LAN, Wi‑Fi, VLANs)'',
    ''Help desk ticketing (ServiceNow, Zendesk) and SLA management'', ''Remote support tools (TeamViewer, AnyDesk, Remote Desktop)'', ''Instructional design for educational technology'', ''Training and
    onboarding of teachers and staff'', ''Documentation and knowledge‑base authoring'', ''Project coordination using Agile fundamentals'', ''Data security and privacy compliance (FERPA, GDPR basics)'',
    ''Root‑cause analysis and continuous improvement'', ''Learning management systems (Canvas, Moodle) support'']'
  hobbies: '[''Hiking and birdwatching in Florida nature preserves'', ''Gardening native plants'', ''Acoustic guitar practice'', ''Logic puzzles and jigsaw puzzles'', ''Reading science and tech non‑fiction'',
    ''Digital photography'', ''Volunteer adult literacy tutoring'', ''Board‑game evenings'']'
  career_goals: Faye aims to leverage her technical and educational skill set to move into a leadership role within the K‑12 district’s technology department. In the next three years she plans to earn the
    CompTIA Network+ and Cisco CCNA certifications, followed by an ITIL Expert credential, positioning herself for a role as an IT Operations Manager. She also intends to complete a master’s degree in Educational
    Technology to design district‑wide digital learning initiatives. Ultimately, she aspires to become a Director of Technology Integration, overseeing the deployment of unified instructional platforms,
    establishing data‑driven support metrics, and mentoring a team of support specialists. Her competitive drive pushes her to achieve measurable improvements in system uptime and user‑satisfaction scores.
