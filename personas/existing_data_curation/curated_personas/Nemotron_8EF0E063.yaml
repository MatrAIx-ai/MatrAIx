personas:
  professional: Santos Ramirez is an 18‑year‑old budding robotics and software engineer who merges Python, C++, and Arduino expertise with a community‑focused mindset, turning DIY prototypes into low‑cost
    health‑monitoring devices while they volunteer as a bilingual STEM tutor.
  sports: Santos Ramirez shoots hoops at the West Side community courts, playing pickup basketball with friends while rooting for the Chicago Bulls, follows the Chicago Cubs during the summer, and they
    occasionally join a local robotics club’s intramural volleyball league.
  arts: Santos Ramirez strums acoustic guitar at neighborhood open‑mic nights, draws inspiration from folk legends like Joan Baez and indie artists such as Mitski, and they visit the Art Institute of Chicago
    to study murals and contemporary installations.
  travel: Santos Ramirez enjoys weekend road trips to the Great Lakes, dreams of a backpacking adventure through Oaxaca to explore culinary roots, and they plan a spring study‑abroad stint in Berlin to
    attend a tech hackathon.
  culinary: Santos Ramirez loves cooking mole verde with pumpkin seeds, chilies, and chocolate, perfects homemade tamales on weekends, and they experiment with fusion dishes like avocado‑lime tacos topped
    with roasted beets.
  core: Santos Ramirez is an 18‑year‑old tinkerer with a big heart, whose blend of curiosity, practicality, and community spirit drives them to craft low‑cost tech, strum guitar, and cook spicy meals while
    they occasionally stay up late debugging code.
background:
  cultural: Santos is a first‑generation Mexican‑American raised in Chicago’s vibrant Pilsen neighborhood. His parents emigrated from Jalisco and preserved strong family ties, bilingual communication, and
    cultural traditions such as Día de los Muertos celebrations and cooking home‑cooked Mexican meals. Growing up between the close‑knit Mexican community and the broader Midwestern city has given him a
    bicultural perspective, a deep sense of responsibility toward his community, and fluency in both Spanish and English.
