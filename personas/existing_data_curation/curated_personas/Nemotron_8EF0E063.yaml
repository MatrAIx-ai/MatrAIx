  career_goals: Santos plans to leverage his STEM degree to create technology that directly benefits underserved communities in Chicago. In the short term, he aims to secure an internship or entry‑level
    position in a socially‑focused tech company or nonprofit where he can work on low‑cost health‑monitoring devices or renewable‑energy solutions. He also intends to pursue a master’s degree in biomedical
    or environmental engineering, with a research focus on affordable, community‑driven innovations. Long‑term, he envisions leading a multidisciplinary team that designs and deploys scalable solutions,
    while mentoring Mexican‑American youth to pursue STEM careers.
