  career_goals: Willie dreams of becoming a marine biologist or an engineer who designs safe playgrounds for his community, inspired by his love of the Gulf Coast beaches and his curiosity about how things
    work. He also imagines helping others as a teacher or community volunteer, reflecting his caring nature and desire to make a positive impact.
