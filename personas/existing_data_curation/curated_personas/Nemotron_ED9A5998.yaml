  career_goals: Margot aims to advance to a senior correctional administration role where she can shape facility‑wide rehabilitation strategies and integrate innovative, arts‑based therapeutic programs.
    She aspires to lead the development of a statewide correctional education network, influence policy on inmate learning and restorative justice, and eventually pursue a doctorate in educational leadership
    or criminal justice to deepen her impact on systemic reform. In the longer term, she envisions founding a nonprofit focused on providing high‑quality educational and creative opportunities for incarcerated
    individuals.
