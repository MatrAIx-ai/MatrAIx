personas:
  professional: An imaginative correctional administrator, Margot Cashio leverages their expertise in security protocols and adult-learning theory to design data-driven, arts-infused rehabilitation programs
    while navigating complex institutional politics with a critical, competitive edge.
  sports: A dedicated fitness enthusiast, Margot Cashio follows the Los Angeles Lakers and Dodgers loyally, joins the Orange County Trail Runners for sunrise hikes along the Dana Point coastline, practices
    weekly yoga sessions at a local studio, and occasionally plays competitive beach volleyball with a small group from the Dana Point Surf Club during the summer months.
  arts: A fervent creator and connoisseur, Margot Cashio paints seascapes inspired by Claude Monet, captures dramatic coastal light a la Ansel Adams, writes speculative short stories echoing Margaret Atwood,
    curates experimental playlists featuring Aphex Twin and Björk, and regularly attends intimate workshops on immersive AR art installations.
  travel: A purposeful solo traveler, Margot Cashio has trekked the rugged cliffs of Big Sur, explored the volcanic landscapes of Iceland’s South Coast, wandered the historic streets of Kyoto, and dreams
    of painting the pastel villages of Italy’s Amalfi Coast, always planning trips around local art festivals and using a mix of budget hostels and occasional boutique stays.
  culinary: An adventurous home chef, Margot Cashio enjoys crafting Mediterranean-inspired dishes like saffron-infused paella and grilled octopus with a miso glaze, frequently prepares spicy tuna poke bowls
    with avocado and sesame seeds, and experiments with fresh herbs such as rosemary and dill while occasionally indulging in a decadent chocolate ganache tart when a creative mood strikes.
  core: Margot Cashio blends a disciplined correctional leadership career with a restless imagination, channeling solitary artistic rituals, meticulous budgeting, and a habit of late-night speculative reading
    into a uniquely balanced yet competitively driven life.
background:
  cultural: Margot grew up in a middle‑class suburban setting in Southern California, absorbing mainstream American cultural norms while being shaped by the progressive, outdoor‑oriented lifestyle of Orange
    County. Her white ethnic background includes European ancestry, but she identifies primarily with a broader American identity rooted in values of public service, self‑reliance, and community involvement.
    Her education in teaching and career in corrections reflect a commitment to both order and personal development, and her artistic and nature‑based interests draw from the rich cultural and natural resources
    of the Pacific coastal region.
