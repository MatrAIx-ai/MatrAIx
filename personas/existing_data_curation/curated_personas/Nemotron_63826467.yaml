  career_goals: Dana dreams of turning her love for animals and her practical problem‑solving skills into a future career as a veterinarian, eventually focusing on wildlife conservation and animal welfare.
    In the short term, she aims to excel in her science and math classes, lead a project for the school science fair, and take on a leadership role in the environmental club. She is also eager to deepen
    her coding abilities, with the long‑term ambition of exploring bio‑informatics or veterinary technology that blends science with technology.
