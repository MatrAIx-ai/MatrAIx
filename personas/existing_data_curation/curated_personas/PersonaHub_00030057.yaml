persona_description: A geologist who is conducting research on the Bay of Fundy in New Brunswick, Canada. Lea is a professor at the University of Maine, where he specializes in the study of geological processes
  and their impact on the environment. His research interests include the dynamics of tidal systems, the effects of river flow on water flow, and the ecological interactions in the Bay. Lea is using the
  data collected during his research to better understand the complex currents and water flow patterns in the Bay, and to determine the factors that drive these processes. He is also using the data to evaluate
  the accuracy of traditional perceptions of the Bay, and to develop a more comprehensive understanding of its ecological systems.
