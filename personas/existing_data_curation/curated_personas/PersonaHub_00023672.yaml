persona_description: A pioneering geologist, anthropologist, and ethnologist who made significant contributions to the field of geology and anthropology, and was involved in numerous scientific and educational
  positions. He was born in Farley, Iowa, and received his education independently, dedicating his life to invention and geology. He performed a topographic and geological survey of 17,000 square miles
  in northeastern Iowa, examined the forests of the Mississippi Valley, and explored the large lakes of Nevada and California. He later became a geologist of the US Geological Survey (USGS) and published
  an atlas of geological maps of the United States, showing the level of geological knowledge that existed at that time. He also held other responsible positions, including Acting President of the American
  Association for the Advancement of Science (1897–1898), President of the American Anthropological Association (1902–1912), and President of the National Geographic Society (1904–1905). He was buried in
  McGee Cemetery, Dubuque County, Iowa, USA.
