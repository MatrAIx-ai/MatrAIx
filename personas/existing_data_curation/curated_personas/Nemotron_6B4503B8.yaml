  hobbies: '[''Basketball'', ''Hiking'', ''DIY woodworking'', ''Playing guitar'', ''Cooking'', ''Live music concerts'', ''Sustainability projects'', ''Community clean‑ups'']'
  career_goals: Joel aims to earn a certified facility‑management credential within the next two years and enroll in a community‑college program for HVAC or building maintenance. He envisions moving up
    to a shift‑supervisor role and eventually becoming a building‑maintenance manager. Parallel to this, he dreams of launching his own environmentally‑focused cleaning business, leveraging his curiosity
    about new cleaning technologies and his strong interpersonal skills to attract and retain clients while promoting greener practices.
