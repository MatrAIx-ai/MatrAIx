personas:
  professional: Joel Campopiano, a 20‑year‑old custodial specialist, blends OSHA‑certified cleaning expertise with an outgoing, hands‑on approach to coordinate tenant services, troubleshoot equipment, and
    champion eco‑friendly floor care in commercial buildings, and they thrive on teamwork and quick problem‑solving.
  sports: Joel Campopiano hits the local recreation center for pickup basketball in the winter, joins group hikes in the Blue Hills during spring, follows the Boston Red Sox and Celtics, and they maintain
    fitness through a mix of casual team sports and trail runs, preferring group workouts over solitary gym sessions.
  arts: Joel Campopiano casually strums an acoustic guitar while diving into indie‑rock shows at Boston venues, citing The Strokes, Arctic Monkeys, and local act Turnstile as favorites, and they sketch
    DIY furniture designs between gigs, blending creative expression with hands‑on craftsmanship.
  travel: Joel Campopiano favors spontaneous weekend road trips over meticulous itineraries, often cruising to coastal Maine towns like Portland, exploring Vermont’s autumn foliage, and dreaming of a future
    bike‑tour through Italy’s Tuscan countryside, and they tend to pack light, relying on improvisation rather than detailed planning.
  culinary: Joel Campopiano experiments with farm‑fresh recipes such as roasted beet and goat‑cheese salad, homemade pesto pasta, and seasonal apple crisp, leaning on ingredients like locally sourced honey,
    heirloom tomatoes, and smoked salmon, and they treat cooking as a fun, trial‑and‑error hobby rather than a polished craft.
  core: Joel Campopiano is a curious yet easy‑going do‑er who juggles woodworking projects, basketball games, and eco‑cleaning gigs, but they often forget to file paperwork while always remembering to replace
    every light bulb in a building.
background:
  cultural: Joel grew up in Plainville, Massachusetts, a suburban town in Bristol County steeped in New England traditions. His family background includes roots in Italian and Irish immigrant communities,
    typical of many white working‑class families in the region. He attended the local high school, where he participated in sports and community service activities. Growing up, he celebrated New England
    customs such as Fourth of July parades, Thanksgiving gatherings with classic New England fare, and the Boston Red Sox season. The region's emphasis on practicality, modesty, and community involvement
    has shaped his work ethic, his collaborative spirit, and his appreciation for both tradition and new ideas.
