  career_goals: Raul aims to transition from employment as a carpenter to owning a boutique woodworking studio that showcases artistic, sustainable pieces for the Detroit‑area market. He dreams of becoming
    a recognized master craftsman, winning local craft‑and‑design awards, and hosting workshops that blend practical carpentry with creative design. Over the next five years, he hopes to expand his business
    to include historic home restoration projects and collaborate with local artists on large‑scale installations, ultimately leaving a legacy of craftsmanship that blends function and art.
