personas:
  professional: Raul Drury, a seasoned carpenter with three decades of hands‑on experience, they fuse masterful joinery and a modern‑sculpture sensibility to create award‑winning, sustainable furniture,
    while their spontaneous flair sometimes clashes with the rigid timelines of client contracts and deadline‑driven project management.
  sports: Raul Drury, a 57‑year‑old fixture in the Motor City Hoops Club adult basketball league, they passionately follow the Detroit Pistons, play weekly pick‑up games at Belle Isle, and balance court
    time with weekend gardening, though their competitive edge often results in heated bench talk and a reluctance to concede defeat on the court.
  arts: Raul Drury, a devoted patron of modern sculpture, they spend weekends at the Detroit Institute of Arts and the Museum of Contemporary Art, drawing inspiration from works by Alexander Calder and
    Anish Kapoor, while also performing improvisational sketches at a local community theater and strumming classic‑rock anthems by Led Zeppelin and The Rolling Stones on an old acoustic guitar during gatherings.
  travel: Raul Drury, a seasoned fair‑hopper, they plan trips around regional craft fairs, having trekked to the Ohio Earthworks Expo, the Chicago Artisans Market, and the Asheville Folk Festival, while
    dreaming of a summer workshop tour through the wood‑carving villages of Tuscany, though budget constraints and family commitments often keep their adventures within the Midwest.
  culinary: Raul Drury, a garden‑to‑table enthusiast, they grow heirloom tomatoes, rainbow carrots, and kale, loving to roast them with rosemary and garlic in a cast‑iron skillet, and they relish the smoky
    flavor of grilled cedar‑plank trout, but their busy schedule sometimes leads to a reliance on quick sandwiches and the occasional midnight pizza while they sketch new furniture designs.
  core: Raul Drury is a curiously artistic, competitively driven carpenter whose spontaneous spirit fuels award‑winning sustainable furniture, yet their worry‑prone nature and occasional disorganization
    keep both their studio and personal life in a lively, imperfect balance.
background:
  cultural: Raul grew up in the Detroit suburbs as a third‑generation Irish‑American, immersed in the Midwestern blue‑collar ethic of hard work, community, and self‑reliance. His upbringing in a post‑war,
    middle‑class neighborhood fostered a respect for craftsmanship tied to the region’s automotive and manufacturing heritage. Married and now living in the affluent Bloomfield Hills area, he blends his
    traditional work‑centered values with exposure to the local arts scene, allowing him to appreciate both the practicality of his trade and the creative possibilities that come from the cultural richness
    of Oakland County.
