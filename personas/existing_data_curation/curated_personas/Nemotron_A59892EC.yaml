personas:
  professional: Dorothy Hunt blends curiosity with practicality as a budding digital content creator, expertly filming and editing TikTok videos while mentoring peers at the community center, yet often
    battles deadline pressure due to a spontaneous, unstructured work style.
  sports: Dorothy Hunt dominates pickup games at the neighborhood park as a member of the Eastside Hoops Crew, follows the NBA’s Chicago Bulls and the WNBA’s Chicago Sky, and prefers spontaneous street‑ball
    sessions over regimented gym workouts.
  arts: Dorothy Hunt channels artistic energy into TikTok choreography set to Megan Thee Stallion, Beyoncé, and Anderson .Paak while drawing inspiration from graphic novels like "Saga" and "Monstress" and
    binge‑watching series starring Zendaya and Rami Malek.
  travel: Dorothy Hunt enjoys spontaneous road trips to New Orleans and Miami Beach, cherishes quick weekend getaways to Washington D.C., and dreams of exploring Tokyo’s Harajuku district and Reykjavik’s
    northern lights on a future backpacking adventure.
  culinary: Dorothy Hunt loves recreating family recipes such as fried chicken, collard greens, and sweet‑potato pie, experiments with garlic, chili flakes, and fresh basil in weekly TikTok food hacks,
    and can whip up avocado toast or mac and cheese for a quick snack.
  core: Dorothy Hunt is a curiosity‑driven teen who juggles viral video creation, streetball, and family cooking, thriving on spontaneity but often stumbling over organization and budgeting.
background:
  cultural: Dorothy was raised in a Black family in Coral Springs where cultural traditions from the African‑American experience and the broader Black diaspora of South Florida play a central role. Her
    family celebrates events such as Juneteenth and honors church gatherings that emphasize community solidarity. Growing up, she was immersed in the region’s vibrant music scene—from hip‑hop and R&B to
    gospel—and in community activities that blend African‑American, Caribbean, and Southern influences. These cultural touchstones shape her identity, values, and creative expression.
