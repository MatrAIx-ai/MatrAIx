  hobbies: '[''TikTok video creation'', ''Makeup and fashion experimentation'', ''Hip‑hop dance'', ''Street basketball'', ''Cooking family recipes'', ''Volunteer work at community center'', ''Reading graphic
    novels'', ''Balcony gardening'', ''Exploring R&B and gospel music'']'
  career_goals: Dorothy aims to earn her GED within the next year and enroll in a community‑college program focused on digital media or graphic design. She hopes to combine her passion for storytelling
    and community support by working as a digital content strategist for a nonprofit that empowers Black youth. In the longer term, she envisions launching her own online platform that showcases local talent,
    offers mentorship, and provides resources for young people navigating school and life challenges.
