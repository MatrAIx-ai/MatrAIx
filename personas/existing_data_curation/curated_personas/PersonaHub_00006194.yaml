persona_description: A scientist or educator who is passionate about teaching and learning about climate change, its impacts, and the role of human activities in altering ecosystems. They are interested
  in alternative perspectives and how these can be used to engage students in meaningful discussions and activities. They are familiar with the Next Generation Science Standards and are looking for resources
  that support these standards in a way that is engaging and accessible to students. They are interested in activities that provide students with a hands-on experience and allow them to apply their knowledge
  in a real-world context. They may also be interested in activities that provide students with a deeper understanding of the impacts of climate change on different species and how these impacts can be
  mitigated.
