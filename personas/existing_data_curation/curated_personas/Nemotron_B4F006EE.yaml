  hobbies: '[''Gardening'', ''Reading Historical Fiction'', ''Quilting'', ''Book Club'', ''Volunteering at Community Center'', ''Walking/Hiking'', ''Cooking Southern Cuisine'', ''Genealogy Research'', ''Yoga'']'
  career_goals: Elaine aims to advance to a regional director role within the next five years, overseeing multiple sites and driving continuous improvement initiatives. She is interested in mentoring emerging
    managers, leading cross‑functional sustainability projects, and eventually shaping company policy on employee development and community engagement. Balancing career growth with family life remains a
    priority.
