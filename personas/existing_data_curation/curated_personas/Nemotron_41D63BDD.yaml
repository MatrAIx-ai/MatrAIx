  career_goals: Andrew dreams of merging his love for art and technology by becoming a video game designer or interactive media developer. He plans to attend a specialized high school that emphasizes STEM
    and visual arts, then pursue a degree in computer science and digital animation. In the future he hopes to create educational games that spark curiosity in other children and to work at a game studio
    or tech company in the Seattle area. He also aspires to travel, learn about different cultures, and contribute to projects that blend Eastern artistic traditions with modern technology.
