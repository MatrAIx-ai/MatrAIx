personas:
  professional: Andrew To is an aspiring digital artist and junior robotics programmer who merges Minecraft architecture, LEGO Mindstorms creations, and Scratch coding to explore imaginative worlds, balancing
    meticulous planning with spontaneous creativity.
  sports: Andrew To rides their bike on the Redmond Trails, plays midfield for the Redmond Rockets youth soccer team, and cheers for the Seattle Seahawks and Seattle Kraken while aspiring to join a local
    junior cycling club.
  arts: Andrew To immerses themselves in sketching original characters, draws inspiration from Studio Ghibli’s Hayao Miyazaki, practices piano pieces by Claude Debussy, and participates in community art
    workshops that celebrate both traditional Mandarin calligraphy and contemporary graffiti, often admiring works by Banksy.
  travel: Andrew To enjoys weekend hikes to Olympic National Park and day trips to Seattle’s Space Needle, dreams of exploring the futuristic neighborhoods of Tokyo and the historic streets of Kyoto, and
    prefers family‑friendly itineraries that balance adventure with gaming time.
  culinary: Andrew To loves crafting sushi rolls—especially California rolls with avocado and crab—devouring spicy miso ramen, munching on pepperoni pizza, and whipping up quick stir‑fried noodles with
    soy sauce and scallions, while occasionally snacking on bubble tea and chocolate chip cookies.
  core: Andrew To is a curious 11‑year‑old who blends digital art, robotics, and fantasy storytelling into every project, juggling a love for organized creation with spontaneous bursts of imagination, and
    a tendency to procrastinate homework for the next Minecraft build.
background:
  cultural: Andrew is a second-generation Chinese-American raised in Redmond, Washington. His parents immigrated from Mainland China and keep cultural traditions alive at home, such as celebrating Lunar
    New Year, cooking family recipes, and speaking Mandarin. Growing up in the multicultural Pacific Northwest, he experiences both Eastern and Western influences through school, community events like the
    Seattle Chinese Cultural Festival, and a diverse friend group. This blend of cultures nurtures his appreciation for art, calligraphy, technology, and values of hard work, respect for elders, and curiosity
    about the world.
