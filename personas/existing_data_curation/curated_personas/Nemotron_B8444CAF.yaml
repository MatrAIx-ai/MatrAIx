    and documentation'']'
  hobbies: '[''Salsa and bachata dancing'', ''Cooking traditional Puerto Rican meals'', ''Volunteer tutoring at community center'', ''Beach walks along Rockaway'', ''Listening to Latin music'', ''Reading
    personal development books'', ''Yoga and mindfulness meditation'', ''Balcony herb gardening'']'
  career_goals: Mirian aims to formalize her expertise by earning a Child Development Associate (CDA) credential within the next year and subsequently completing an associate’s degree in Early Childhood
    Education. She aspires to step into a lead teacher or program coordinator role at a community center, where she can mentor junior staff and shape curriculum that integrates cultural relevance. Long‑term,
    Mirian dreams of opening her own licensed daycare in Far Rockaway that offers bilingual immersion and celebrates Puerto Rican heritage through music, dance, and cooking. She also hopes to become an
    advocate for affordable, high‑quality childcare policies in Queens, partnering with local nonprofits to expand access for low‑income families.
