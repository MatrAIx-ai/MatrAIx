personas:
  professional: Nichola Ka is a seasoned graphic designer with two decades of experience who leverages a strong STEM foundation and a meticulous project‑management style to lead cross‑functional design
    teams, develop compelling brand identities, translate complex scientific concepts into clear visuals, and mentor emerging talent toward senior creative leadership.
  sports: Nichola Ka is the energetic captain of a women’s 5K charity running group that meets thrice weekly, a devoted fan of the Carolina Panthers and Charlotte Hornets, and an occasional member of the
    Columbia Fireflies fan club, balancing cardio runs with seasonal yoga sessions to stay fit and competitive.
  arts: Nichola Ka blends her passion for visual storytelling with a love for photography inspired by Gordon Parks, regular attendance at live jazz nights featuring classics by Nina Simone, and a dedicated
    reading of contemporary playwrights such as August Wilson, all of which inform her culturally resonant design aesthetics and community workshops.
  travel: Nichola Ka prefers meticulously planned cultural getaways, often booking week‑long tours of historic Southern cities like Savannah and Charleston or weekend retreats to Barbados to experience
    local music festivals, while balancing travel costs with her budgeting routine and occasionally dreaming of a solo pilgrimage to the art museums of Paris.
  culinary: Nichola Ka is a proficient home cook who delights in preparing soulful Southern dishes such as shrimp and grits, collard greens seasoned with smoked turkey, and sweet potato pie, while experimenting
    with heirloom tomatoes and locally sourced okra in garden‑to‑table meals, and they relish sharing these plates at community potlucks and festivals.
  core: Nichola Ka is a methodical yet lively community leader who channels her competitive drive into polished design work, balances a tightly scheduled life with spontaneous group runs, and occasionally
    indulges in a secret stash of hot sauce as a personal energizer.
background:
  cultural: Nichola is a Black woman with deep Southern roots, having grown up in a close‑knit African American community in South Carolina. She earned her STEM degree at a historically Black university,
    where she cultivated both technical rigor and cultural pride. Her design aesthetic often weaves traditional African motifs and Southern storytelling elements, reflecting her heritage. Active in her
    local church and involved with organizations like the NAACP, she leverages her cultural background to champion representation and equity in visual media, particularly supporting Black entrepreneurs
    and community-driven projects in Blythewood and the broader Richland County area.
attributes:
  skills: '["Adobe Photoshop", "Adobe Illustrator", "Adobe InDesign", "Figma", "Sketch", "UI/UX design", "Brand identity development", "Print production management", "Project scheduling", "Data visualization",
    "HTML/CSS basics", "Team collaboration"]'
  hobbies: '["Digital art workshops volunteer", "Book club member", "Running group leader", "Photography", "Gardening", "Soul food cooking", "Attending cultural festivals", "Community design meetups"]'
  career_goals: Nichola aims to transition into a senior leadership role such as Creative Director or Art Director within a regional marketing agency, where she can mentor emerging designers and shape the
    visual strategy for high‑impact campaigns. She plans to obtain Adobe Certified Expert credentials and deepen her UI/UX expertise to intersect her STEM background with healthcare and scientific illustration
    projects in the Richland County research sector. Long‑term, she envisions launching her own boutique design studio focused on empowering Black‑owned businesses and community nonprofits through culturally
    resonant branding and visual storytelling.
