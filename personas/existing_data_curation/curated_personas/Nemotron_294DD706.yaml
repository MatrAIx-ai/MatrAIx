  hobbies: '["visiting art galleries and street murals", "urban photography", "digital drawing", "reading philosophical and art‑history books", "playing turn‑based strategy video games", "listening to diverse
    music (plena, salsa, jazz, electronica)", "collecting vintage vinyl records", "attending intimate live‑music sessions", "exploring abandoned industrial sites", "maintaining a personal journal"]'
  career_goals: Gabriel aims to convert his artistic passions into a sustainable freelance career. Within the next twelve months, he plans to enroll in an online visual‑arts certificate program to formalize
    his skills, develop a polished digital portfolio, and secure illustration and photography commissions. He envisions launching a modest e‑commerce site offering limited‑edition prints that fuse contemporary
    urban aesthetics with motifs from Puerto Rican culture, leveraging his bilingual abilities to reach both local and diaspora audiences. Long‑term, he hopes to stage a solo exhibition in San Juan, collaborate
    with community arts collectives, and eventually teach workshops for self‑taught artists, allowing him to maintain flexibility while earning a stable income.
