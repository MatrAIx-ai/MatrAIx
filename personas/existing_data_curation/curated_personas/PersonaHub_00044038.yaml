persona_description: A historian who specializes in the history of the United States and Mexico, particularly during the period of the Mexican-American War. Their research interests include the causes and
  outcomes of the war, the role of the United States in the war, and the impact of the war on both countries. They are particularly knowledgeable about the battle of Puebla and the events leading up to
  it, and have a deep appreciation for the cultural and historical significance of Cinco de Mayo. They are also interested in the contributions of Mexican soldiers to the war and the impact of the war on
  Mexican culture.
