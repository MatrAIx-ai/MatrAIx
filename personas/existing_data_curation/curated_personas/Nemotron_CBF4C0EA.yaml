personas:
  professional: Emma Mora, a 1‑year‑old burgeoning baby‑product reviewer, leverages an early love of novelty and imagination to craft playful, well‑structured Instagram Reels that showcase bright toys while
    effortlessly drawing family and friends’ attention with her infectious chatter.
  sports: Emma Mora, enrolled in the “Little Sprinters” toddler gymnastics class and a weekly baby‑swim session at the community pool, enthusiastically waves a tiny Dodgers cap while the family watches
    the Los Angeles Dodgers on game day, blending her innate curiosity for movement with a budding love for organized play and team spirit.
  arts: Emma Mora, a bright‑eyed 1‑year‑old who collects plush versions of The Wiggles and sings along to Raffi’s “Baby Beluga,” revels in finger‑painting with non‑toxic finger paints while being mesmerized
    by Disney’s “Moana” on family movie nights, channeling her vivid imagination into early artistic expression.
  travel: Emma Mora, who prefers stroller‑friendly, family‑oriented trips, has delightfully explored the sensory gardens of Disneyland and the sandy shores of San Diego’s La Jolla beach, while her parents
    plan a future breezy weekend in Paris’s Jardin du Luxembourg to nurture her curiosity for new textures and sights.
  culinary: Emma Mora, an enthusiastic eater of smooth avocado mash, sweet potato puree with a hint of cinnamon, and occasional banana‑infused oatmeal, often creates a delightful mess by splattering her
    spooned portions, while showcasing a budding preference for mild, naturally sweet flavors.
  core: Emma Mora, a 1‑year‑old whirlwind of imagination, talkative charm, and organized play, constantly seeks novel toys, thrives as the center of attention, and habitually lines up her blocks while occasionally
    flinging snacks in joyous rebellion.
background:
  cultural: Emma is raised in a Mexican-American household in Chula Vista, California. Spanish is spoken alongside English at home, and family traditions such as Día de los Muertos, Las Posadas, and sharing
    tacos, tamales, and other Mexican dishes are central to her upbringing. She participates in local cultural festivals, hears bilingual storytelling, and experiences a blend of Mexican cultural values—family
    solidarity, community celebration—and the diverse influences of the San Diego region.
