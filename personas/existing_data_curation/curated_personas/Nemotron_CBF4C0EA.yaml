  hobbies: '[''Bright picture books'', ''Mexican folk music'', ''Dancing with family'', ''Stacking blocks'', ''Water play'', ''Crayon scribbling'']'
  career_goals: As she grows, Emma hopes to channel her vivid imagination and love of art into a career that allows her to inspire others—such as becoming a visual artist, muralist, children's author, or
    educator who incorporates Mexican cultural themes. She envisions using her sociable nature to lead workshops, create community art projects, and share stories that celebrate her heritage.
