persona_description: A conservation biologist who specializes in the study of macrofungi, particularly their importance as indicators of habitat health and their decline in European ecosystems. This person
  has conducted fieldwork in Ireland and has published research on the decline of fungi and the need for conservation efforts. They are aware of the threats to fungi and have identified and designated protected
  areas, developed species action programmes, included fungi in monitoring programmes, and produced management guidelines.
