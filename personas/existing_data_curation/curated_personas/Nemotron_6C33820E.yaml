personas:
  professional: Leila Buchanan is a proactive community volunteer coordinator who blends her practical budgeting knack and basic first‑aid expertise to run the church’s monthly food‑bank drives, and she
    is currently preparing to earn a GED and enroll in a community‑college nursing‑assistant program, aiming to transition into early‑childhood education while eventually opening a home‑based daycare.
  sports: Leila Buchanan finds fitness in quiet nature walks along the nearby streams, supports the Kentucky Wildcats basketball team, participates in the church’s seasonal 5K charity run, and practices
    gentle yoga at a local community center to stay flexible and calm.
  arts: Leila Buchanan devotes evenings to knitting and crocheting blankets inspired by Appalachian folk motifs, reads historical fiction novels by Ken Follett and Philippa Gregory, and streams acoustic
    folk duos like The Avett Brothers while attending local craft fairs to showcase her work.
  travel: Leila Buchanan favors budget‑friendly road trips to regional gems such as Mammoth Cave, the historic streets of Nashville, and the Blue Ridge Mountains near Asheville, plans trips during quiet
    school periods to minimize stress, and dreams of a tranquil retreat cabin in a mountain valley.
  culinary: Leila Buchanan prepares classic Kentucky comfort foods—fried chicken, bourbon‑glazed ham, and hot‑brown sandwiches—enhanced with fresh herbs like rosemary, thyme, and sage from her garden, and
    she experiments with seasonal twists such as a watermelon‑chili salsa for summer barbecues.
  core: Leila Buchanan is a 23‑year‑old garden‑loving, knit‑enthusiast who balances meticulous budgeting with lingering anxiety, turning her compassion into community service while dreaming of a home‑based
    daycare and a small craft boutique.
background:
  cultural: Leila is a white woman raised in Georgetown, Kentucky, a small town in the heart of Bourbon County. Her upbringing reflects the rural Appalachian‑Southern cultural tapestry of the region, characterized
    by strong family ties, community cooperation, and a deep appreciation for local traditions such as church gatherings, farm‑to‑table cooking, and seasonal festivals. Her family values emphasize hospitality,
    modesty, and a work ethic grounded in agricultural and small‑business life. The local culture, with its blend of Southern hospitality and Appalachian resilience, shapes her approach to community, generosity,
    and practical problem‑solving.
attributes:
  skills: '["Home budgeting and financial planning", "Meal planning and Southern cooking", "Basic first aid and emergency preparedness", "Childcare and toddler assistance", "Community volunteer coordination",
