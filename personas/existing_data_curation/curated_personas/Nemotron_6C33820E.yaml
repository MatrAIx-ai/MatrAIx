    and scheduling", "Crafting (knitting, crocheting)"]'
  hobbies: '["Gardening (herbs, vegetables)", "Cooking Southern cuisine", "Knitting and crocheting", "Church volunteering and outreach programs", "Reading (historical fiction, self‑help)", "Nature walks
    and hiking", "Yoga and mindfulness meditation", "Journaling"]'
  career_goals: Leila intends to complete her GED within the next twelve months and then enroll in a community‑college program that will qualify her for a part‑time role in early childhood education or
    nursing assistance, allowing her to contribute financially while still caring for her family. In the longer term, she dreams of opening a home‑based daycare or a small boutique where she can sell her
    handmade quilts and crocheted items, creating a modest income stream that aligns with her love for nurturing children and craftsmanship. Throughout her career journey, she hopes to become a trusted
    resource in Georgetown, offering support to other families and strengthening community ties.
