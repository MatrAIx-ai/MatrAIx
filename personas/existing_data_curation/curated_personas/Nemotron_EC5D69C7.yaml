personas:
  professional: Michael Collins, a seasoned civil engineer with a flair for structural analysis and urban design, blends advanced AutoCAD, Revit, and GIS expertise with an artistic eye for public spaces;
    they drive sustainable, community‑centered infrastructure projects while meticulously managing budgets, schedules, and stakeholder expectations.
  sports: Michael Collins, an avid hiker who climbs the North Georgia ridgelines with the Atlanta Hiking Club, plays in a co‑ed recreational soccer league, follows the Atlanta Falcons, Braves, and Hawks
    with fervor, and squeezes in weekly tennis sessions at the local community center, they maintain a balanced fitness regimen that blends endurance, agility, and team sport camaraderie.
  arts: Michael Collins, who spends weekends sketching modernist structures inspired by Frank Lloyd Wright, painting abstract canvases reminiscent of Jackson Pollock and Mark Rothko, and photographing cityscapes
    in the style of Ansel Adams, also volunteers in community theater workshops with the Atlanta Stage Arts troupe, they weave visual storytelling and performance into their creative identity.
  travel: Michael Collins, an adventurous planner who meticulously maps out road trips to Asheville’s Blue Ridge vistas, weekend getaways to Savannah’s historic squares, and occasional overseas escapes
    to Reykjavik for Northern Lights photography and Kyoto for temple gardens, they balance family budget considerations with a love for both rugged hiking expeditions and culturally immersive city tours.
  culinary: Michael Collins, an intermediate‑level home chef who regularly whips up soul‑food‑inspired fusion dishes like shrimp and grits with harissa glaze, collard greens sautéed with miso and ginger,
    and sweet potato pie spiced with cardamom, they relish experimenting with ingredients such as okra, smoked paprika, and gochujang to create flavorful, cross‑cultural meals for family gatherings.
  core: Michael Collins, an imaginatively disciplined engineer who fuses art with infrastructure, volunteers to mentor emerging engineers, and occasionally sacrifices sleep for sketching or late‑night coding,
    they embody a balanced blend of rigor, creativity, and community spirit.
background:
  cultural: Michael grew up in a close‑knit African‑American family in the Atlanta metropolitan area, where church fellowship, gospel music, and community solidarity were central to his upbringing. His
    parents emphasized the importance of education and perseverance, instilling in him a strong sense of responsibility toward his community. He maintains ties to historic Black neighborhoods in Fulton
    County and regularly participates in cultural events such as Juneteenth celebrations, local jazz festivals, and African‑American heritage workshops. Michael's cultural identity informs his professional
    commitment to equity in infrastructure, and he draws inspiration from the resilience and creativity of Black architects and engineers who have shaped the region's built environment.
attributes:
  skills: '[''Structural analysis'', ''Transportation planning'', ''Site development'', ''AutoCAD'', ''Revit'', ''GIS'', ''Sustainable design'', ''Construction inspection'', ''Technical writing'', ''Project
