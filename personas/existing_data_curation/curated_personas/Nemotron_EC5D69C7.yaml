  hobbies: '[''Sketching'', ''Painting'', ''Architectural photography'', ''Reading sci‑fi and design books'', ''STEM mentorship volunteering'', ''Community theater'', ''Hiking'', ''Chess'', ''Cooking soul‑food
    fusion dishes'']'
  career_goals: Michael aims to become a licensed Professional Engineer (PE) and eventually transition into senior leadership roles such as Principal Engineer or Director of Infrastructure Development.
    He aspires to lead large‑scale, sustainable projects that integrate green technology and community‑centered design, especially in underserved neighborhoods of Atlanta. Michael also plans to pursue a
    Master’s degree in Urban Planning to deepen his expertise in equitable city development. Long‑term, he hopes to establish his own consultancy focused on innovative, environmentally responsible civil
    engineering solutions and to mentor the next generation of Black engineers through outreach programs and scholarships.
