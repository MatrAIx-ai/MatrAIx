personas:
  professional: Joseph Kepner is a hands‑on rebar specialist who translates complex construction drawings into precise reinforcement assemblies, leverages emerging prefabricated systems and BIM tools with
    a practical curiosity, and routinely coordinates crews with an outgoing, assertive style that balances reliability and flexibility as they work toward a foreman role.
  sports: Joseph Kepner fuels his competitive edge by playing pickup basketball at the Oldtown community gym, joining a weekend soccer league with the Potomac United club, cheering on the Baltimore Ravens
    and Washington Capitals, and hitting the Appalachian foothills for hikes that blend endurance training with nature appreciation as they balance team dynamics and personal fitness.
  arts: Joseph Kepner finds creative release strumming acoustic renditions of John Denver and The Avett Brothers on their guitar, admires the woodworking craftsmanship of Sam Maloof, occasionally attends
    a local community theater production of 'Our Town,' and curates a modest vinyl collection featuring Neil Young and folk classics as they unwind after a shift.
  travel: Joseph Kepner enjoys weekend road trips that blend adventure and relaxation, often driving to Shenandoah National Park for backcountry hikes, exploring Washington D.C.’s historic monuments, and
    dreaming of a future trek along Iceland’s volcanic trails and the full Appalachian Trail, all while balancing a tight construction schedule and limited travel budget as they plan trips around work shifts.
  culinary: Joseph Kepner prefers hearty, locally sourced meals such as grilled Potomac catfish with lemon‑dill sauce, smoked brisket tacos topped with fresh cilantro and avocado, and Sunday cornbread made
    with stone‑ground cornmeal, while their cooking skill sits at a confident home‑cook level enhanced by a love for outdoor grilling, and they often experiment with new spice blends.
  core: Joseph Kepner is a sociable, hands‑on rebar technician who balances a practical curiosity for new construction tech with a love for team sports, woodworking, and occasional impulsive spending, all
    while navigating the occasional back pain of a young tradesperson as they chart a path toward leadership.
background:
  cultural: Joseph grew up in Oldtown, MD, a small, close‑knit community in Allegany County with deep Appalachian‑Mid‑Atlantic roots. His family is of mixed German and Irish ancestry and reflects the region’s
    working‑class values of hard work, self‑reliance, and community support. He was raised attending a local public high school, participates in typical American holidays, and maintains a strong sense of
    regional identity tied to the outdoors, local music, and the traditions of Western Maryland.
attributes:
  skills: '[''Rebar cutting and bending'', ''Rebar tying'', ''Interpretation of construction drawings'', ''Operation of pneumatic and electric tools'', ''OSHA safety compliance'', ''Basic structural principles'',
    ''On‑site communication and coordination'', ''Prefabricated reinforcement knowledge'', ''Basic welding (MIG/TIG)'', ''DIY woodworking'']'
  hobbies: '[''Pickup basketball'', ''Pickup soccer'', ''Hiking in the Appalachian foothills'', ''Fishing the Potomac River'', ''DIY woodworking'', ''Playing acoustic guitar'', ''Watching professional sports'',
    ''Online video gaming'', ''Community clean‑up volunteering'']'
  career_goals: He aims to become a foreman within the next three years, earning OSHA certifications and an associate’s degree in construction management from a nearby community college. In the longer term,
    Joseph aspires to become a project manager or start his own small‑scale construction company focused on sustainable building practices in Western Maryland. He is motivated by the desire to lead teams,
    improve efficiency, and provide stable income for his family.
