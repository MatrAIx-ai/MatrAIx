personas:
  professional: Sandra Acevedo, a budding junior illustrator, blends her love for vibrant folklore-inspired characters with a meticulous, organized approach to school art assignments, turning every sketch
    into a story that reflects her curious mind and occasional worry about perfection.
  sports: Sandra Acevedo enjoys weekend explorations at the neighborhood park, where she collects leaves for nature sketches, participates in a community soccer team for under-10s, and eagerly roots for
    the local minor league baseball club, the River Raptors, balancing active play with her artistic passions.
  arts: Sandra Acevedo immerses herself in creative expression by painting sugar-skull characters reminiscent of a day-of-the-dead celebration, folding intricate origami cranes after listening to folk ensemble
    'La Danza de los Espiritus' and pop hits by Ariana Grande, while drawing inspiration from the bold colors of Frida Kahlo's self-portraits.
  travel: Sandra Acevedo's travel aspirations include revisiting the rugged canyon she explored on a school field trip to the Grand Canyon, planning a family adventure to a historic town renowned for its
    illuminated altars during an annual solemn celebration, and dreaming of strolling beneath Kyoto's cherry blossom canopies in spring, reflecting her blend of nature curiosity, cultural intrigue, and
    love for vibrant visual spectacles.
  culinary: Sandra Acevedo delights in creating colorful fruit-infused water with sliced mango and lime, munching on corn-based tamales topped with salsa verde, and experimenting with homemade chocolate-dipped
    churros, yet she often forgets to finish her vegetables, a quirky habit that balances her adventurous palate with occasional picky-eater moments.
  core: Sandra Acevedo is a curious, art-obsessed nine-year-old who channels folklore into vibrant sketches, balances meticulous saving with occasional splurges, monitors her allergies while sometimes forgetting
    sunscreen, and mixes relentless creativity with a touch of worry that fuels both her artistic drive and reflective nature.
background:
  cultural: Sandra is raised in a Mexican-American household in Irving, Texas. Her family celebrates traditions such as Día de los Muertos, Christmas posadas, and enjoys cooking dishes like tamales and
    mole at home. Spanish is spoken alongside English, giving her a strong bilingual foundation. She participates in local cultural events in Dallas County, attends a school with a diverse student body,
    and often visits community celebrations that showcase Mexican music, dance, and art, which enrich her identity and inspire her creative pursuits.
