  career_goals: Sandra dreams of becoming an artist or illustrator who can bring stories to life with vibrant visuals. She imagines creating picture books that blend Mexican cultural themes with imaginative
    adventures. Her curiosity also makes her think about designing interactive games or apps that help kids express their feelings through art. In the near future, she hopes to join an after‑school art
    club, attend a summer arts camp, and eventually apply to a high‑school program focused on visual arts so she can develop her talent further.
