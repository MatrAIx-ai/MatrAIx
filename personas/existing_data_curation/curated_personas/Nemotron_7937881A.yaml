  hobbies: '[''Gardening'', ''Quilting'', ''Scrapbooking'', ''Walking in Falls Park'', ''Reading mystery novels'', ''Church fellowship'', ''Volunteer literacy tutoring'', ''Community theater backstage work'',
    ''Cooking Midwestern dishes'', ''Birdwatching'']'
  career_goals: Heather aims to transition into a senior advisory role within the next two years, focusing on mentorship and process improvement. She plans to formalize her knowledge by creating a best‑practice
    handbook for administrative teams at her organization, seeking recognition as an efficiency specialist before retirement. After retiring, she intends to volunteer as a project coordinator for a local
    non‑profit, applying her organizational strengths to community initiatives and continuing to contribute her expertise.
