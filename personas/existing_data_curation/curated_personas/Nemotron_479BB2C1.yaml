personas:
  professional: Clayton Williams works as a facilities assistant, leveraging their practical automotive and handyman expertise, methodical planning, and outgoing communication skills to keep building operations
    running smoothly while stepping up as a team lead during busy maintenance windows.
  sports: Clayton Williams competes in local Hillsborough County recreational basketball and soccer leagues, cycles the county’s trail system with the Hillsborough Trail Riders club, avidly follows the
    Tampa Bay Buccaneers and Tampa Bay Rays, and spends weekend mornings fishing at Lake Ariana, showing their energetic and team‑oriented approach to fitness.
  arts: Clayton Williams enjoys classic rock and country playlists featuring Bruce Springsteen, Johnny Cash, and Lynyrd Skynyrd while attending community festivals that showcase local folk bands, occasionally
    streams video games like FIFA and The Legend of Zelda, and supports the neighborhood theatre’s summer productions, reflecting a blend of nostalgic music taste and participatory art appreciation.
  travel: Clayton Williams prefers short, budget‑friendly road trips, having explored St. Augustine’s historic district and the Florida Keys, while dreaming of a future camping adventure in the Great Smoky
    Mountains, and always plans trips around fishing opportunities and group outings with friends.
  culinary: Clayton Williams cooks simple yet hearty meals such as grilled salmon tacos with fresh cilantro and lime, chili con carne with beans, and Sunday burgers, favoring ingredients like BBQ sauce,
    corn on the cob, and locally sourced herbs, while occasionally indulging in frozen pizza for convenience after a long workday.
  core: Clayton Williams is a methodical handyman with a love for community events, classic rock, and late‑night gaming, who balances disciplined budgeting with occasional impulse buys and sometimes forgets
    to eat when juggling projects.
background:
  cultural: Clayton is a white American raised in Thonotosassa, a suburban‑rural community in Hillsborough County, Florida. His upbringing reflects the blend of Southern hospitality and Floridian outdoor
    lifestyle that characterizes the region. He grew up in a working‑class family where self‑reliance, neighborly cooperation, and hands‑on problem solving were valued. Local influences include the strong
    community focus on high school sports, church gatherings, and regional festivals that celebrate the Gulf Coast culture. These cultural experiences have shaped his practical outlook, community orientation,
    and appreciation for both traditional methods and new ideas.
