  career_goals: Clayton aims to secure stable, hands‑on employment that leverages his practical skills and organized work style, such as a maintenance technician, facilities assistant, or entry‑level position
    in logistics. He plans to obtain his GED within the next year and enroll in a vocational training program (e.g., HVAC, electrical, or automotive technology) to formalize his expertise. In the longer
    term, he dreams of launching his own small landscaping or handyman business, building a reputation for reliability and community service, while also pursuing opportunities to mentor younger peers in
    his neighborhood.
