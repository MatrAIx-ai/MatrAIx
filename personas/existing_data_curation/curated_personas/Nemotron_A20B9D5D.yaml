  career_goals: Although retired, Ana aims to stay active by volunteering as a reading mentor for local children, organizing occasional bilingual story‑time sessions at the senior center, and sharing Mexican
    culinary traditions through cooking workshops for neighbors. She also hopes to write a memoir that captures her life experiences, cultural heritage, and the lessons she has learned, leaving a lasting
    legacy for her grandchildren and community. Additionally, she aspires to help establish a small cultural exchange program at the community center that promotes intergenerational learning and celebrates
    Mexican holidays.
