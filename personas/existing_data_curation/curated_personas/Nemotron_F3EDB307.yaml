personas:
  professional: Zoe Merna, a retired automotive engineer with a bachelor's in engineering, still applies her meticulous troubleshooting and spreadsheet wizardry to mentor seniors, organize community workshops,
    and set precise performance benchmarks, reflecting her practical, structured, and competitively critical mindset.
  sports: Zoe Merna follows the Detroit Tigers in spring baseball and the Detroit Red Wings in winter hockey, joins the local Grand Rapids Senior Fitness Club for low‑impact water aerobics and group walks,
    and keeps a disciplined routine that balances gentle cardio with her love for strategic bridge tournaments.
  arts: Zoe Merna finds artistic solace in knitting intricate scarves while listening to Ella Fitzgerald and Miles Davis at the downtown jazz club, and she regularly attends community theater productions
    starring local actor James Whitaker, which together shape her reflective yet precise creative outlets.
  travel: Zoe Merna favors leisurely, well‑planned trips such as a spring visit to the Michigan Upper Peninsula’s Pictured Rocks, a nostalgic weekend in New Orleans for its jazz heritage, and a carefully
    scheduled river cruise on the Mississippi, always arranging travel through senior‑friendly agencies and balancing limited mobility with a love for new scenery.
  culinary: Zoe Merna delights in cooking with herbs from her garden, seasoning roast chicken with rosemary and thyme, preparing classic chicken noodle soup with carrots and celery, and occasionally baking
    apple crisp with a crunchy oat topping, reflecting a modest yet precise culinary skill set.
  core: Zoe Merna blends seasoned engineering precision with a competitive love of puzzles, meticulous budgeting, and a stubborn habit of double‑checking every crossword clue, embodying a structured yet
    warm centenarian who never lets age dull her curiosity.
background:
  cultural: Zoe’s cultural roots are embedded in the Midwestern, working‑class ethos of post‑World‑War‑II Michigan. Raised in a white, German‑Irish‑American family, she internalized values of punctuality,
    self‑reliance, and community responsibility. Her father’s career in the automotive factories and her mother’s emphasis on education created a pragmatic environment that encouraged her pursuit of a STEM
    degree at a time when few women entered engineering. Over the decades, her life was shaped by the region’s strong labor unions, church participation (Methodist), and seasonal family traditions such
    as Thanksgiving feasts and summer picnics by the local lake. While she respects these conventions, her competitive and skeptical nature also led her to embrace progressive ideas of women’s professional
    advancement in the 1960s and 1970s. Today, she balances reverence for Midwestern modesty with an independent spirit, reflecting a cultural tapestry of traditional values, post‑industrial resilience,
    and a forward‑looking curiosity.
attributes:
  skills: '["Mechanical troubleshooting", "Electrical diagnostics", "Data analysis (Excel)", "Technical writing", "Project coordination", "Budgeting and financial planning", "Mentoring in STEM", "Computer
