  career_goals: Florence aims to re‑enter the workforce in a full‑time administrative or program‑support role within a community‑focused organization, leveraging her organizational strengths to contribute
    to local empowerment initiatives. She plans to obtain a Certified Administrative Professional (CAP) credential and, eventually, advance to a senior office manager or program coordinator position. Long‑term,
    she hopes to combine her expertise with her cultural commitment by leading projects that support education, health, and economic development for the African American community in Derby and the broader
    Sedgwick County area.
