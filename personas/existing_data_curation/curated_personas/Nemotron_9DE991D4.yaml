  hobbies: '[''Watercolor painting'', ''Sketching'', ''Mixed-media collage'', ''Reading speculative fiction'', ''Poetry'', ''Journaling'', ''Creative writing workshops'', ''Pottery classes'', ''Gardening'',
    ''Hiking local trails'', ''Experimental cooking'', ''Visiting small art galleries'']'
  career_goals: Patricia aims to transition from full‑time cashier work to a role that merges her business knowledge with her artistic passions. Over the next few years she hopes to earn a certificate in
    visual merchandising or small‑business management, volunteer as an arts coordinator at the local community center, and eventually open a modest boutique‑studio where she can sell her own paintings,
    handmade crafts, and curated vintage goods. She envisions a flexible schedule that allows her to continue exploring new artistic mediums while maintaining a stable income.
