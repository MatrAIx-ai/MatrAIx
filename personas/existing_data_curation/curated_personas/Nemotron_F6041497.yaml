  career_goals: Tomas aims to transition from his current analyst role to a senior portfolio manager position within the next five years, focusing on integrating ESG and cultural‑asset investments into
    mainstream portfolios. He is passionate about establishing a boutique fund that leverages his art‑history knowledge to create impact‑driven investment products that support emerging artists and sustainable
    projects. Long‑term, he envisions leading an investment research division that champions interdisciplinary thinking, while also mentoring junior analysts on balancing analytical rigor with creative
    insight. He is also exploring a side consultancy that advises collectors on the financial appraisal of artworks, merging his professional expertise with his personal passion.
