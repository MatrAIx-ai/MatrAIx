  hobbies: '[''Watercolor painting'', ''Abstract sketching'', ''Creative writing (poetry and short stories)'', ''Acoustic guitar playing and folk singing'', ''Folkloric Mexican dance'', ''Cooking and recipe
    experimentation'', ''Gardening (native Texas and Mexican flora)'', ''Photography of landscapes and community events'', ''Reading speculative fiction and magical realism'', ''Visiting art exhibitions
    and book clubs'']'
  career_goals: Paulina aims to launch a home‑based catering venture that blends authentic Mexican flavors with contemporary culinary ideas, and plans to obtain a culinary arts certification from a local
    community college within the next 18 months. She also seeks a volunteer leadership role in organizing Bastrop's annual Cinco de Mayo and Día de los Muertos celebrations, hoping to become a cultural
    liaison for the city's Hispanic community. Beyond entrepreneurship, she wishes to mentor other stay‑at‑home mothers in creative arts and eventually explore part‑time work as a community outreach coordinator
    or early‑childhood educator.
