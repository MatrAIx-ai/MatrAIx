personas:
  professional: Paulina Ku, a 31‑year‑old home‑based culinary entrepreneur and community event volunteer, blends meticulous household management with a thriving artistic sensibility, using bilingual communication
    and meticulous attention to detail to coordinate family schedules, budget meals, and plan cultural festivals while preparing to launch a fusion Mexican catering service and earn a culinary arts certification.
  sports: Paulina Ku stays active through weekend hikes in the Hill Country, weekly yoga classes at the Bastrop Community Center, and cheering on Austin FC in the MLS, all while balancing a moderate fitness
    routine that incorporates gardening as low‑impact cardio.
  arts: Paulina Ku weaves watercolor and abstract sketches inspired by Frida Kahlo’s bold palette, strums acoustic guitar renditions of Lila Downs and José Alfredo Jiménez, crafts magical‑realism poetry
    echoing Gabriel García Márquez, and regularly attends Austin‑Bastrop art openings featuring local painter Maya Hayashi and book club discussions of N.K. Jemisin’s speculative fiction.
  travel: Paulina Ku favors thoughtfully planned road trips that blend photography stops—like the Hill Country lavender fields and San Antonio’s historic missions—with spontaneous cultural immersion, having
    recently explored Oaxaca’s culinary markets and now daydreaming about sunrise shots in Kyoto’s Arashiyama bamboo grove.
  culinary: Paulina Ku, a confident home chef, transforms classic tacos al pastor and mole poblano with unexpected twists such as miso‑glazed pork and quinoa‑based tamales, favoring ingredients like ancho
    chilies, epazote, roasted corn, and chipotle, while she regularly savors Austin’s food‑truck scene and treats herself to occasional fine‑dining experiences at Veracruz‑style eateries.
  core: Paulina Ku thrives on turning everyday chores into artistic opportunities, yet their habit of night‑time sketching often leaves coffee stains on the kitchen table and a trail of half‑finished canvases.
background:
  cultural: Paulina is a first‑generation Mexican‑American whose parents emigrated from Jalisco, Mexico. Raised in a bilingual household in Texas, she celebrates Mexican holidays such as Día de los Muertos,
    Cinco de Mayo, and traditional Christmas festivities. Her daily life reflects a strong connection to Mexican culture through language, cuisine, music, and active participation in Bastrop's vibrant Hispanic
    community. She values family ties, communal harmony, and the preservation of cultural traditions while also embracing the diverse influences of her Texan surroundings.
attributes:
  skills: '[''Household management'', ''Bilingual Spanish-English communication'', ''Culinary arts (Mexican cuisine)'', ''Community event planning'', ''Creative painting and sketching'', ''Gardening'',
