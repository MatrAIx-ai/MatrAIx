    as a STEM tutor'', ''Model railroading'', ''Birdwatching'']'
  career_goals: Although not currently employed, Muhammad aims to channel his STEM background into community‑focused endeavors. He plans to volunteer as a STEM mentor for local youth, develop a part‑time
    consulting service helping small farms adopt simple automation technologies, and author a series of practical how‑to articles on home maintenance and sustainable energy. Additionally, he hopes to earn
    a certification in renewable energy systems, launch a modest side business selling handcrafted woodworking pieces, and cultivate habits that reduce his stress and worry.
