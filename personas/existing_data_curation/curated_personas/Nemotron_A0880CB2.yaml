personas:
  professional: Staci Gardner, an aspiring robotics enthusiast and budding engineer, channels their love for routine and practical problem-solving into building and programming simple robots for the school
    robotics club, consistently applying meticulous LEGO construction techniques and structured Minecraft projects to develop reliable step-by-step solutions, and they carefully balance collaborative teamwork
    with a preference for small-group interaction.
  sports: Staci Gardner, a modest basketball enthusiast, spends Saturday afternoons at the community park perfecting dribbling drills with two close friends while cheering on the hometown junior basketball
    team, the Riverdale Rockets, and they occasionally join the school's fall soccer club, applying their methodical practice routine to improve shooting accuracy.
  arts: Staci Gardner, a quiet connoisseur of visual and musical storytelling, loses themselves in graphic novels like Amulet and Maus while humming to curated playlists featuring Beyoncé, Drake, and J.
    Cole that their older sibling mixed, and they occasionally rehearse a few lines from the musical Hamilton for fun, reflecting a blend of structured imagination and personal rhythm.
  travel: Staci Gardner, a methodical young explorer, prefers meticulously planned day trips to nearby science museums and the local planetarium, has already visited the Kennedy Space Center on a school
    field trip, dreams of traveling to Tokyo's Miraikan museum to experience cutting-edge robotics firsthand, and they avoid spontaneous vacations that could disrupt their cherished routine.
  culinary: Staci Gardner, a budding kitchen helper, loves assembling homemade pepperoni pizza slices with perfectly melted mozzarella and a sprinkle of oregano, crafts strawberry-banana smoothies using
    fresh fruit and Greek yogurt, and they proudly assist their family in preparing simple baked chicken nuggets, though they sometimes forget to pre-heat the oven because they get absorbed in building
    LEGO rockets.
  core: Staci Gardner, an 11-year-old routine-driven creator, balances a meticulous love for building and quiet focus with occasional stress-driven worry, preferring small-group collaborations, structured
    play, and a carefully budgeted allowance, and they secretly dream of space adventures.
background:
  cultural: Staci is a Black boy raised in the vibrant cultural mosaic of Houston's Third Ward. His family maintains strong ties to African-American traditions, celebrating holidays such as Juneteenth and
    participating in the local church's youth programs. He grew up with home-cooked dishes like collard greens, fried catfish, and sweet potato pie, and enjoys listening to gospel music and contemporary
    R&B. The community emphasizes education, resilience, and mutual support, shaping Staci's sense of responsibility and his desire to give back. He identifies with a blend of Southern African-American
    culture and the diverse influences of his urban neighborhood.
attributes:
  skills: '[''Organized homework routine'', ''Basic coding in Scratch'', ''LEGO construction and design'', ''Reading comprehension (nonfiction & graphic novels)'', ''Teamwork in small-group projects'',
    ''Basic arithmetic problem solving'']'
  hobbies: '[''LEGO building'', ''Minecraft (structured play)'', ''Reading graphic novels and biographies'', ''School robotics club'', ''Listening to R&B and hip-hop music'', ''Basketball dribbling with
    friends'']'
  career_goals: Staci is beginning to imagine future careers that combine his love of building things, his desire for a stable and practical profession, and his wish to help his community. He is interested
    in becoming a civil engineer or a robotics technician, seeing these roles as ways to design reliable structures and tools. He also dreams of joining the Houston Fire Department someday, valuing the
    routine, teamwork, and community service the job provides. For now, his short-term ambition is to excel in school science and math, earn a spot in his middle school robotics club, and keep his grades
    strong to qualify for future scholarships.
