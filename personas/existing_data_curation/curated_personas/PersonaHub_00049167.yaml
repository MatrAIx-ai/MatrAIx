persona_description: A meteorologist who specializes in the study of atmospheric phenomena, particularly the direction-finding of atmospherics and their correlation with synoptic weather analysis. He is
  interested in the seasonal variations in the production of atmospherics over the Pacific and the relationship between the stationary fronts and the observed atmospherics. He is also interested in the
  impact of the Jet Stream on the formation and behavior of atmospherics.
