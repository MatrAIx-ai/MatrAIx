  hobbies: '[''Heirloom vegetable gardening'', ''Traditional Mexican cooking'', ''Community festival participation'', ''Cultural dancing (cumbia, bolero)'', ''Birdwatching'', ''Nature walks'', ''Reading
    agricultural journals'', ''Embroidery and folk art'']'
  career_goals: Naomi aspires to transition from field labor to a supervisory and mentorship role within Chicago's urban agriculture network. She aims to lead a community garden program that preserves heritage
    Mexican crops, securing funding and certifications in sustainable agriculture. Over the next five years, she hopes to obtain a Certified Crop Advisor credential, develop a training curriculum for new
    agricultural workers, and eventually launch a small cooperative farm that supplies local markets while providing stable employment for immigrant families. Her competitive nature drives her to set measurable
    productivity targets and benchmark her team's performance against industry standards, ensuring continuous improvement.
