  hobbies: '[''Reading (productivity & self‑development)'', ''Yoga'', ''Gardening (vegetables & herbs)'', ''Baking (Southern desserts)'', ''Cooking (regional cuisine)'', ''Volunteering (church outreach,
    community food pantry)'', ''Hiking (Natchez Trace Trail)'', ''Podcast listening (business & wellness)'']'
  career_goals: Challice aims to advance to an Office Manager role within the next two years, followed by an Operations Manager position. She plans to complete a bachelor's degree in Business Administration
    and obtain a Certified Administrative Professional (CAP) credential. Long‑term, she aspires to lead a regional administrative operations team, implement digital workflow solutions, and mentor emerging
    supervisors.
