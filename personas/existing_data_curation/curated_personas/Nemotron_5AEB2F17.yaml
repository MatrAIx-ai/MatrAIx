  career_goals: Keith aims to earn his FAA Airframe and Powerplant (A&P) certification within the next year, followed by a senior lead‑mechanic position at a regional airline maintenance base. Long‑term,
    he envisions transitioning into a quality‑assurance or safety‑inspector role, leveraging his detail‑oriented nature to improve maintenance standards. He also hopes to pursue a bachelor’s degree in aerospace
    technology part‑time, positioning himself for future supervisory or training responsibilities while maintaining a stable work‑life balance with his family.
