personas:
  professional: Rose Taylor is a veteran carpenter with over 30 years of residential and community construction experience, whose organized, methodical planning and innate curiosity drive her to blend sustainable
    building practices with hands‑on mentorship, ensuring each project is both high‑quality and environmentally conscious.
  sports: Rose Taylor supports the New York Yankees and follows the New York Knicks, jogs twice weekly in Bronx parks, and plays on the Bronx Senior Softball Club’s seasonal league, balancing competitive
    spirit with low‑impact fitness suitable for her age.
  arts: Rose Taylor enjoys live jazz at the Blue Note, collects vinyls by John Coltrane and Miles Davis, and frequents local gallery openings featuring artists like Kehinde Wiley, drawing creative inspiration
    for her woodworking and vintage‑furniture restoration projects.
  travel: Rose Taylor favors relaxed weekend getaways to historic towns such as Saratoga Springs and the Hudson Valley during autumn foliage, while long‑term dreaming of a cultural immersion trip to Tuscany’s
    countryside to study traditional timber‑framing techniques.
  culinary: Rose Taylor delights in cooking soulful Southern‑influenced dishes like collard greens with smoked turkey, cornbread, and black‑eyed peas, often seasoning with fresh basil, thyme, and heirloom
    tomatoes harvested from her rooftop garden, showcasing a confident yet experimental home‑chef style.
  core: Rose Taylor blends seasoned carpentry expertise, a green thumb, and a love for jazz into a meticulously organized life, punctuated by a habit of over‑cataloguing tools and occasional forgetfulness
    about watering her herbs.
background:
  cultural: Rose grew up in the Bronx as part of a close‑knit African‑American community that valued hard work, family, and cultural expression. Her grandparents were part of the Great Migration, bringing
    Southern traditions that blended with the vibrant urban culture of New York City. She was raised with the rhythms of gospel music, the aromas of Southern cooking, and the solidarity of neighborhood
    churches. This heritage has shaped her commitment to community service, collaborative work, and preserving cultural practices, while also informing her pride in being a role model for the next generation
    of Black women in skilled trades.
