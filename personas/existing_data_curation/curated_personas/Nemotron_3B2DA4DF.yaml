  career_goals: Rose aims to leverage her decades of field experience to transition into a supervisory and entrepreneurial role. In the next two years she plans to complete the Certified Professional Carpenter
    program and become an OSHA trainer, enabling her to lead larger renovation projects for community organizations. Her longer‑term ambition is to launch a small, women‑owned construction firm that specializes
    in eco‑friendly home improvements in the Bronx, while creating a structured apprenticeship pathway for other Black women seeking careers in the trades.
