persona_description: A sociologist or demographer interested in understanding the economic situation of older immigrants and their retirement income in Western European countries. This individual is likely
  to have a background in sociology, demography, or economics and is interested in analyzing data from the European Union Statistics on Income and Living Conditions (EU-SILC) to document the extent of ethnic
  inequality in retirement income. This person is interested in understanding the factors that contribute to the retirement income gap between immigrants and natives and how these factors vary across different
  countries. They are also interested in exploring the role of national context in shaping ethnic inequality in old age and how this knowledge can help aging societies cope with the socioeconomic changes
  brought about by immigration.
