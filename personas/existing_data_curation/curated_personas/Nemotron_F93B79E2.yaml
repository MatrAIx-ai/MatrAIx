  career_goals: Luu aims to attend a competitive STEM high school, then pursue a degree in Computer Science with a focus on game development and user experience design. He dreams of creating culturally
    inclusive video games that reflect his Vietnamese heritage and address mental health themes. He also envisions using his bilingual skills to develop digital platforms that support Asian American youth
    mental wellness. While he is ambitious about breaking into the tech industry, he remains pragmatic, planning to secure internships and certifications (e.g., Codecademy, Adobe). He hopes to graduate
    college with a solid job that provides financial stability, allowing him to support his family and fund community initiatives. Ultimately, he wants to blend creativity with practical problem-solving,
    become a role model for peers struggling with anxiety, and contribute to the growing representation of Southeast Asian voices in technology.
