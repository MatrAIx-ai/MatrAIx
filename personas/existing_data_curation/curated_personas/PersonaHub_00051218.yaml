persona_description: A team leader in astronomy, specifically in the field of brown dwarf research. The individual is an assistant professor at the University of Arizona and is known for leading the first
  adaptive optics-based survey of stars with about 1/10th of the Sun's mass. The person has discovered many low-mass binary pairs and is known for their innovative use of adaptive optics technology to detect
  brown dwarfs. The team's results suggest that low-mass stars may form in a similar process to more massive binaries.
