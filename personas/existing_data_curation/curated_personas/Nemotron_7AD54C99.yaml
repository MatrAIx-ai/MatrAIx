  hobbies: '[''photography'', ''oil painting'', ''woodworking'', ''hiking'', ''bird-watching'', ''gardening'', ''reading historical biographies'', ''attending art fairs'', ''volunteering at community center'',
    ''teaching computer basics'', ''leading art appreciation circles'']'
  career_goals: As a retired professional, James is focused on channeling his expertise into community service and lifelong learning. He aims to mentor high-school and college students in STEM through hands-on
    workshops, contribute to regional river conservation projects, and document the ecological history of the Columbia River for local archives. Additionally, he hopes to travel to major art museums, curate
    a small traveling exhibition of his photography, and support his wife in their shared goal of maintaining a vibrant, health-conscious lifestyle.
