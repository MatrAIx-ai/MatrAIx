persona_description: A computer graphics researcher who specializes in developing image-based techniques for generating high-quality soft shadows in computer graphics. This researcher has developed and
  combined two separate image-based techniques that build on an existing algorithm used to generate "hard" shadows. The researcher is interested in reducing the amount of computation required to generate
  high-quality soft shadows and has shown that both image-based techniques can be used in concert to create an interactive lighting environment.
