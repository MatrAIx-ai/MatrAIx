  career_goals: Randolph aims to complete his high school equivalency and enroll in a vocational program that leads to a technical career offering clear structure and dependable income. He is interested
    in becoming a certified network technician or automotive mechanic, pursuing certifications such as CompTIA A+ and ASE. In the longer term, he hopes to secure a stable technical position that allows
    him to support his family, with the option of further education toward an associate degree in information technology or applied engineering.
