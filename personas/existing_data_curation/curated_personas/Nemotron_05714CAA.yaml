  career_goals: Theresa aspires to turn her love for visual storytelling into a career. She dreams of becoming a professional illustrator or graphic designer, ideally creating artwork that promotes social
    and environmental causes. She hopes to attend a specialized high school for arts, then study graphic design or animation in college, and eventually work for a nonprofit or a studio that values creativity
    and community impact. In the short term, she aims to build a robust portfolio of illustrations and short animated clips, and to earn a certification in basic coding to expand her digital skill set.
