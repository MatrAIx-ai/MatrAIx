personas:
  professional: Theresa Smith is an aspiring multimedia artist who blends sketching, stop‑motion animation, and piano composition, leveraging their curiosity and balanced approach to turn school projects
    into mini‑exhibitions while reliably meeting art club deadlines.
  sports: Theresa Smith rides a bright blue bike through Griffith Park, cheers for the Los Angeles Lakers and the LA Dodgers, and participates in the school’s after‑school soccer league while occasionally
    joining the local youth cycling club for weekend rides.
  arts: Theresa Smith channels their love for fantasy novels into vibrant sketchbook pages, draws inspiration from Hayao Miyazaki and Claude Monet, collaborates on community murals, and spends weekends
    mastering piano pieces by Ludovico Einaudi after watching YouTube tutorials.
  travel: Theresa Smith enjoys weekend excursions to the Santa Monica Pier and the Natural History Museum, dreams of strolling through Kyoto’s historic districts to see anime‑inspired art, and prefers meticulously
    planning family trips with Google Maps while keeping a spare pack for spontaneous bike adventures.
  culinary: Theresa Smith experiments in the kitchen with family, perfecting avocado toast with extra lime, crafting homemade macaroni‑cheese topped with breadcrumbs, and occasionally attempting sushi rolls
    with cucumber and smoked salmon after watching cooking videos.
  core: Theresa Smith is a curious twelve‑year‑old who balances imaginative art projects, organized school responsibilities, and occasional bouts of forgetfulness, all while chasing the perfect pizza slice
    and a smooth bike ride.
background:
  cultural: Theresa grows up in a middle‑class, suburban family in Sherman Oaks, Los Angeles County. Her upbringing reflects the multicultural, entertainment‑rich environment of Southern California, where
    access to community art programs, public libraries, and nearby museums fuels her artistic curiosity. While her ethnic background is White, she and her family engage with the diverse cultural fabric
    of the region, celebrating local festivals, exploring various cuisines, and valuing the openness and creativity that characterize the LA arts scene. This blend of suburban stability and exposure to
    a vibrant creative community shapes her worldview and aspirations.
