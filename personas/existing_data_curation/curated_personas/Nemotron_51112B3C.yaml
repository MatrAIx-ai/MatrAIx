  career_goals: Luis aims to transition from senior developer to a staff engineer role where he can shape technical strategy across multiple product lines. Over the next five years, he plans to move into
    a director-of-engineering position, leading a culturally diverse team and championing inclusive engineering practices. He is also exploring the possibility of launching a SaaS platform that connects
    Salvadoran entrepreneurs in the U.S. with micro-financing services, leveraging his technical expertise and community ties. Luis wants his career to balance high-impact technical leadership with opportunities
    to give back to the Latinx tech community through mentorship programs and open-source contributions.
