  career_goals: Fairouz hopes to translate her organizational strengths and curiosity into a meaningful community role. Over the next few years she aims to take a leadership position on the board of a local
    nonprofit focused on environmental education, launch a modest home‑based business selling homemade preserves and baked goods, and complete online courses in digital marketing and photography to support
    that venture. She also wants to mentor younger volunteers at the Baytown food pantry, allowing her to stay engaged while maintaining a flexible schedule that respects her family commitments.
