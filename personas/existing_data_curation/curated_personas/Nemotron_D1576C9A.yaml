  hobbies: '[''Urban sketching'', ''Metal sculpture'', ''Visiting art galleries'', ''Photography'', ''Playing acoustic guitar'', ''Hiking in local trails'', ''Reading sci‑fi and philosophy'', ''Home brewing'',
    ''Board games with close friends'']'
  career_goals: Michael aims to earn his journeyman ironworker certification within the next two years and eventually transition into a foreman or site supervisory role where he can blend technical expertise
    with leadership. Fascinated by the artistic potential of metal, he plans to develop a side venture creating custom metal sculptures for local businesses and galleries. In the long term, he envisions
    opening a small fabrication studio that integrates structural steel projects with artistic commissions, leveraging his construction background and his love for art. To support these ambitions, he intends
    to complete an associate degree in construction technology, deepening his understanding of structural design and project management.
