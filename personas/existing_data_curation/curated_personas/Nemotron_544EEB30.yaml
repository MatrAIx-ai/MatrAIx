  career_goals: Chang aspires to pursue a career that blends his love for problem‑solving with tangible community impact. He dreams of becoming an environmental engineer or a civil engineer focused on flood
    mitigation and sustainable infrastructure, especially given the hurricane‑prone area of Galveston County. In the short term, he aims to excel in high school science courses, join the school’s STEM club,
    and earn a scholarship that will enable him to attend a technical university after graduation. He envisions using his practical skills to develop solutions that protect his hometown and improve everyday
    life for his neighbors.
