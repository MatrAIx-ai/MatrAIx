personas:
  professional: Chang Contich is a budding aerospace hobbyist and robotics tinkerer who combines a love for science fiction with a methodical, organized approach to building model rockets and coding small
    projects, and they demonstrate reliability and curiosity.
  sports: Chang Contich is an enthusiastic swimmer at the local community pool, plays weekend soccer with the Gulf Coast Juniors club, and follows the Miami Dolphins in football and the Tampa Bay Rays in
    baseball, preferring low‑key exercise over organized team competition, and they respect the balance between solo and team activities.
  arts: Chang Contich is a comic‑strip creator who draws inspiration from the works of Brian K. Vaughan, listens to Tame Impala while sketching, and enjoys animated series like Adventure Time, showing how
    visual storytelling fuels their imagination, and they often incorporate sci‑fi themes into their drawings.
  travel: Chang Contich is a nature‑loving explorer who hikes the Gulf Coast trails, has visited Washington D.C.’s Smithsonian museums, dreams of a trip to the Kennedy Space Center in Florida, and hopes
    to someday experience Tokyo’s anime districts, and they keep a sketchbook of each place they visit.
  culinary: Chang Contich is an eager home‑cook who can whip up pepperoni pizza with extra cheese, loves shrimp tacos seasoned with lime and cilantro, and often snacks on trail mix while reading sci‑fi,
    though they sometimes forget to clean the kitchen afterward.
  core: Chang Contich is a quiet, curiosity‑driven tinkerer who balances meticulous planning with spontaneous experiments, but they habitually forget to water the garden when absorbed in a new robotics
    challenge.
background:
  cultural: Chang comes from a white, middle‑class family in La Marque, Texas, a community shaped by Southern hospitality, modesty, and a strong emphasis on family and neighborly ties. Growing up in Galveston
    County, he has been influenced by the region's coastal heritage, which fosters an awareness of environmental challenges like hurricanes and flooding. While his household reflects typical Texan values
    of self‑reliance and practical problem‑solving, there is also an appreciation for cultural diversity due to the broader multicultural environment of the Gulf Coast, exposing him to a variety of traditions
    and perspectives.
