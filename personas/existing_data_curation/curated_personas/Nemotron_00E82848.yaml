  hobbies: '[''Lining up wooden blocks by color'', ''Shape-sorting toys'', ''Board books with repetitive stories'', ''Listening to lullabies'', ''Quiet pretend play with a stuffed animal'']'
  career_goals: As she progresses through early childhood, Connie’s innate love of order and reliability shapes her long‑term ambitions. She envisions a future in which she can apply her methodical mindset
    to a stable, detail‑driven profession—such as accounting, civil engineering, or health‑care administration. By the time she reaches adulthood, she hopes to be recognized for her dependability, earn
    advanced certifications, and eventually assume a leadership role where her competitive drive can improve systems and processes.
