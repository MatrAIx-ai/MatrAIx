personas:
  professional: Connie Markadakis, a one-year-old who already imposes a strict block‑building schedule and reorders stuffed animals by size each morning, shows they have a nascent preference for methodical
    organization that suggests a future as a meticulous project manager.
  sports: Connie Markadakis, a one-year-old who shows early affinity for the New York Knicks, they wave a tiny Knicks cap on family game nights and competitively roll a plush soccer ball against a sibling
    while always following a meticulously timed nap routine.
  arts: Connie Markadakis, a one-year-old who revels in the classic lullaby "Brahms' Lullaby" and the bright animations of Studio Ghibli's "My Neighbor Totoro", they often request a private reading of "Goodnight
    Moon" and tap rhythmically to the jazz improvisations of Ella Fitzgerald.
  travel: Connie Markadakis, a one-year-old who thrives on carefully planned family trips to the serene beaches of Carmel‑by‑the‑Sea, they find comfort in the predictable schedule of hotel check‑in, stroller‑friendly
    walks, and familiar bedtime routine, yet they become noticeably distressed by sudden flight delays or unscheduled itinerary changes.
  culinary: Connie Markadakis, a one-year-old who enjoys smooth avocado puree and finely shredded carrot sticks, they reliably refuse new textures unless presented in a familiar spoonful, yet they stealthily
    sneak bites of chicken nuggets when the TV is on.
  core: Connie Markadakis, a one-year-old who craves predictable routines, meticulously arranges toys, and experiences vivid emotional swings, they embody a fiercely organized yet highly sensitive tiny
    soul.
background:
  cultural: Connie is raised in Dickinson, North Dakota, a small Midwestern city with a predominantly white population of German and Scandinavian ancestry. The community emphasizes practicality, self‑reliance,
    and a strong work ethic, values that echo her preference for structure and routine. Local customs include seasonal county fairs, church gatherings, and a close‑knit neighborhood network, all of which
    provide a predictable social environment that aligns with Connie’s reserved and methodical temperament.
