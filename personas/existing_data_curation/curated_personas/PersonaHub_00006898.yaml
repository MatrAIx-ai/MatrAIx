persona_description: A team of researchers from Rice University, the University of Houston, and the University of Texas Health Science Center who are conducting a two-year study in Houston to measure particulate
  matter pollution levels and their correlation with respiratory and cardiac health issues in different neighborhoods. The study is funded by the Houston Endowment and will also work in tandem with a NASA
  project to study air quality from ground, air, and satellite images. The team aims to identify any scientific correlation between high levels of particulate matter and respiratory and cardiac problems
  in specific neighborhoods.
