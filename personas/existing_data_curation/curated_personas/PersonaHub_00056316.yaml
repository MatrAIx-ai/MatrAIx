persona_description: A restaurant owner or manager who is responsible for maintaining and ensuring compliance with South African by-laws regarding grease traps. This person is aware of the importance of
  using correctly installed and maintained grease traps and is committed to implementing and maintaining a grease trap system in their establishment. They are also aware of the potential consequences of
  not properly maintaining the grease trap, including liability for damages to the sewer system, withdrawal of industrial effluent permit, and blockage of the entire industrial effluent discharge.
