personas:
  professional: Bart Wallace is a budding robotics enthusiast and high‑school math tutor who channels his disciplined curiosity into building Arduino‑based robots, coding simple indie video games, and weaving
    environmental awareness into every project, reflecting his community garden volunteerism.
  sports: Bart Wallace loves hiking the Columbia River Gorge and the local forest trails, plays on the Salem High School soccer team, avidly follows the Portland Timbers, and participates in a youth cross‑country
    club that meets each Saturday, using these activities to stay fit and connect with the outdoors.
  arts: Bart Wallace spends evenings strumming acoustic guitar to songs by Bon Iver and The Decemberists, enjoys drawing wildlife sketches inspired by hikes, and devotes weekend nights to strategy board
    games like Settlers of Catan and Terraforming Mars, while also reading sci‑fi novels such as 'Dune' and 'The Expanse'.
  travel: Bart Wallace plans weekend getaways to the Oregon Coast, Crater Lake National Park, and occasionally visits Seattle for music festivals, dreaming of a summer exchange program in Sweden to experience
    the midnight sun, always using a meticulously organized itinerary spreadsheet that emphasizes low‑carbon travel options.
  culinary: Bart Wallace enjoys cooking simple farm‑to‑table meals like roasted beet and goat‑cheese salads, quinoa bowls with kale and pumpkin seeds, and occasionally experiments with baked salmon seasoned
    with dill, drawing on fresh ingredients from their community garden while still learning to master complex sauces.
  core: Bart Wallace balances disciplined curiosity with calm compassion, building robots by day, strumming guitars by night, and always keeping a spreadsheet for everything—from savings to hiking routes—while
    occasionally forgetting to water a plant.
background:
  cultural: Bart is a white teenager raised in a suburban neighborhood of Salem, Oregon. His family traces its roots to English and German ancestry and reflects Pacific Northwest values of environmental
    awareness, community involvement, and self‑reliance. Growing up near farmland and the state capital, he has been exposed to both rural and civic life, shaping a respect for agriculture, public service,
    and regional natural beauty. His household emphasizes education, practical problem‑solving, and volunteerism, fostering a balanced blend of modest Midwestern work ethic and progressive Oregonian attitudes
    toward sustainability.
