  hobbies: '[''Robotics club'', ''Coding simple games'', ''Playing acoustic guitar'', ''Hiking and nature photography'', ''Community garden volunteering'', ''Reading science‑fiction novels'', ''Model airplane
    building'', ''Strategy board games'', ''Peer tutoring in mathematics'', ''Cooking experimental recipes'']'
  career_goals: Bart aspires to pursue a degree in civil or environmental engineering, focusing on sustainable infrastructure for agricultural communities. He aims to combine his technical curiosity with
    his drive to help others by designing water‑conservation projects, renewable energy systems, or community facilities that improve quality of life in his hometown and the wider Pacific Northwest. In
    the short term, he plans to earn a scholarship to a university known for its engineering programs, such as Oregon State University, and to continue leadership roles in robotics, volunteer programs,
    and student government. Ultimately, he hopes to work with local government or non‑profits to create practical, environmentally responsible solutions that benefit his community.
