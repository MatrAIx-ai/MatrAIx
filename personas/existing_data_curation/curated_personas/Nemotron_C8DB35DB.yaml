  career_goals: Alicia aims to scale her company from a regional player into a nationally recognized brand that champions sustainability and employee well‑being. She wants to embed a culture of collaboration
    and mental‑health awareness that reflects her own sensitivity to stress. Over the next five years she plans to secure Series B funding, launch a mentorship program for emerging women entrepreneurs,
    and earn an executive MBA to deepen her formal business expertise. Ultimately, she envisions transitioning part of her portfolio into a social‑impact venture that addresses community health and education.
