persona_description: A microbiologist who studies the evolution of antibiotic resistance and the role of persister cells in antibiotic tolerance. The individual is involved in research at The Hebrew University
  of Jerusalem in Israel and is known for their work on the extended lag phenomenon observed in E. coli populations exposed to ampicillin. They have also published on the classification of wood-decaying
  fungi and the discovery of a continuum between white-rot and brown-rot modes of wood decay.
