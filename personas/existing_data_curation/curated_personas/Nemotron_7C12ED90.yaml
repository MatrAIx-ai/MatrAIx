personas:
  professional: Courtney Scott, a seasoned restaurant operations manager in metro Atlanta, leverages their hands‑on scheduling expertise and empathetic conflict‑resolution style to keep a fast‑paced food‑service
    floor humming, even as their relaxed attitude toward long‑term planning sometimes leads to last‑minute scrambling.
  sports: Courtney Scott enjoys cheering for the Atlanta Falcons on Sundays, rooting for the Atlanta Hawks during the NBA season, and playing on a weekend recreational softball league with the church’s
    community team, while fitting in evening walks to tend their garden as a low‑impact fitness routine.
  arts: Courtney Scott finds soulful inspiration in gospel legends like Mahalia Jackson and Mavis Staples during choir rehearsals, unwinds with classic sitcom reruns such as The Mary Tyler Moore Show and
    I Love Lucy, and spends quiet afternoons quilting intricate patchwork designs alongside friends, often humming the harmonic choral arrangements.
  travel: Courtney Scott prefers low‑key, DIY road trips within a few hours’ drive, often heading to the historic streets of Savannah, the vibrant music scene of New Orleans, and the mountain charm of Asheville,
    while dreaming of a leisurely family‑style vacation in Charleston’s waterfront districts, always booking budget‑friendly Airbnbs and packing a homemade peach cobbler for the journey.
  culinary: Courtney Scott, an enthusiast of Southern comfort cuisine, skillfully prepares crisp fried chicken, flaky buttermilk biscuits, and sweet peach cobbler using heirloom peaches and a secret blend
    of cane sugar and nutmeg, while also enjoying occasional forays into grilling seasonal vegetables like zucchini and sweet corn from their backyard garden, and they often host potluck meals for the choir.
  core: Courtney Scott balances a caring, routine‑driven restaurant career with a love for gospel choirs, vintage sitcoms, and Southern cooking, yet their tendency to procrastinate on long‑term plans and
    occasional stress‑induced worry adds a relatable, human edge to their otherwise harmonious life.
background:
  cultural: Courtney grew up in the African‑American community of Douglas County, where church, family gatherings, and Southern soul food shaped her identity. She carries forward the traditions of Southern
    Black hospitality, using food as a way to bring people together and create a sense of belonging. Her cultural roots emphasize resilience, community support, and a deep appreciation for gospel music,
    storytelling, and the shared history of Black families in the South.
attributes:
  skills: '["staff scheduling","inventory control and ordering","food safety compliance (ServSafe)","budget and cost management","conflict resolution and mediation","team training and development","menu
    planning and recipe standardization","point‑of‑sale system operation","customer service excellence","supply chain coordination"]'
  hobbies: '["Southern cooking and baking","church choir singing","gardening (vegetables and herbs)","quilting and fabric crafts","watching classic sitcoms","breathing/relaxation exercises","gratitude journaling"]'
  career_goals: Courtney aims to earn her ServSafe Manager certification and eventually take on a regional supervisory role for a small chain of eateries in the Metro Atlanta area. Long‑term, she dreams
    of opening her own community‑focused café that offers soul‑food staples and provides a supportive workplace for young staff. She also hopes to improve her organizational skills through a community‑college
    night‑class program, which would give her the confidence to manage multiple locations while maintaining the caring, low‑stress environment she values.
