  hobbies: '["Abstract painting exploration", "Philosophy reading", "Science-fiction novels", "Crossword puzzles", "Jigsaw puzzles", "Vegetable gardening", "Nature photography", "Theater attendance", "Knitting",
    "Historical society participation", "Solo nature walks"]'
  career_goals: While enjoying retirement, Cheri intends to establish a weekly seniors' art workshop in Albertville, produce a memoir that weaves personal stories with local history, curate a community
    exhibition showcasing artwork by Midwestern retirees, and build a digital photographic archive of seasonal landscapes around Wright County. She also hopes to learn abstract sculpture techniques through
    a community-college class and continue her lifelong learning by attending philosophy and art history lectures.
