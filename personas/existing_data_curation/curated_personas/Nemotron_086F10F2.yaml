personas:
  professional: Cheri Thrasher, a retired watercolor and mixed‑media artist and meticulous genealogist, channels her imaginative curiosity and methodical planning into curating senior art workshops, organizing
    historic exhibitions, and managing community budgets with a competitive edge that drives her to outshine previous local events.
  sports: Cheri Thrasher, a member of the Wright County Senior Trail Walkers and a faithful follower of the Minnesota Twins and Vikings, enjoys gentle morning walks through the nearby woods, participates
    in low‑impact water aerobics to keep her osteoarthritis at bay, and occasionally cheers at local high school basketball games to satisfy her competitive side.
  arts: Cheri Thrasher, an avid visitor to regional galleries, draws inspiration from abstract masters like Kandinsky and O'Keeffe, spends afternoons sketching nature after photographing seasonal landscapes,
    and regularly attends local theater productions of works by August Wilson and Tennessee Williams, while knitting scarves patterned after the geometric motifs of Piet Mondrian.
  travel: Cheri Thrasher, who prefers meticulously planned trips, has explored the art museums of Chicago, the historic sites of Savannah, and the lavender fields of Provence, and now dreams of a quiet
    pilgrimage to the Finnish Lapland to photograph the aurora borealis, balancing her wanderlust with the constraints of her fixed retirement income.
  culinary: Cheri Thrasher, a proficient home cook, delights in preparing garden‑fresh ratatouille, beet and goat‑cheese salads, and sourdough bread with rosemary, often seasoning dishes with locally sourced
    heirloom tomatoes and fresh basil, and enjoys occasional indulgence in a rich chocolate mousse that she reserves for celebratory art openings.
  core: Cheri Thrasher, a methodical yet whimsically curious septuagenarian, meticulously blends art, genealogy, and community service while battling a chronic worry habit that nudges her into both relentless
    self‑improvement and occasional overcautiousness.
background:
  cultural: Cheri is a white Midwestern American who was born and raised in Wright County, Minnesota, in a modest, predominantly Lutheran community with German and Scandinavian ancestry. Growing up in Albertville,
    she internalized the region's values of self-reliance, community service, punctuality, and a strong connection to the land. Her life has been shaped by local traditions such as church gatherings, volunteer
    work, seasonal agricultural festivals, and a deep appreciation for the natural landscape, all of which influence her organized, diligent approach to art, gardening, and preserving local history.
