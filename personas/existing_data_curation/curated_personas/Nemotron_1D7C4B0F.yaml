  hobbies: '[''Fishing (grouper, snapper)'', ''Herb gardening'', ''Reading culinary magazines and travel blogs'', ''Beach walks at sunset'', ''Playing acoustic guitar (classic rock)'', ''Volunteering at
    local food bank'', ''Mindfulness meditation'', ''Senior golf outings'', ''Sketching seascapes'']'
  career_goals: Terrence aims to earn a Certified Food Safety Manager credential within the next year and to complete hospitality‑management coursework to sharpen his business skills. In the medium term,
    he hopes to open a modest waterfront bistro that highlights locally sourced seafood while offering seasonal, experimental dishes that reflect his curiosity. He also aspires to create a supportive workplace
    culture that reduces staff turnover and incorporates clear yet flexible protocols to help manage his own anxiety and emotional reactivity.
