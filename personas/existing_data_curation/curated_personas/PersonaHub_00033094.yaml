persona_description: A semiconductor manufacturing engineer who specializes in the use of nitrogen, oxygen, argon, and hydrogen in the process of producing semiconductors. They are responsible for ensuring
  the accuracy and purity of gases used in the manufacturing process, as well as the control of flow rate, temperature, and pressure to prevent any potential contamination or degradation of the semiconductor.
  They must have a deep understanding of the chemistry and physics involved in semiconductor manufacturing, as well as the ability to troubleshoot and solve problems related to the use of gases. They may
  also be responsible for monitoring the use of gases in the semiconductor industry and making recommendations for improvements in gas selection and usage.
