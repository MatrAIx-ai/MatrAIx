  career_goals: Tommy aims to advance to a senior leadership role within his agency, such as Branch Manager or Regional Sales Director, where he can mentor younger agents and shape a client‑centric culture.
    He plans to earn the Chartered Property Casualty Underwriter (CPCU) designation to deepen his expertise and credibility. Over the next five years he hopes to launch his own boutique insurance consultancy
    focused on serving families and small businesses with personalized, compassionate solutions, while maintaining a work‑life balance that reduces stress and allows more time for his community volunteer
    work.
