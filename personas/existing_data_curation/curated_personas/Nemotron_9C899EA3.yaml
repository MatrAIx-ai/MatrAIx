  career_goals: Leslie imagines a future where she helps others and works in a calm, predictable environment. She talks about becoming a kindergarten teacher because she loves storytime and sharing. She
    also mentions being a veterinarian or an astronaut, reflecting her curiosity about animals and space. In the meantime, her immediate ambition is to master letters, numbers, and new songs, laying a foundation
    for a caring and organized career path.
