personas:
  professional: Leslie Haider, a budding preschool architect, spends hours stacking wooden blocks into orderly towers, demonstrating an early knack for spatial reasoning and a love for predictable structures,
    while also delighting in spontaneous rearrangements that satisfy their flexible side, and they proudly announce each completed tower to their caregivers.
  sports: Leslie Haider, a member of the Little Stars Soccer Club, loves kicking a soft foam ball at the community park, cheers for the Los Angeles Dodgers on game days, and they balance energetic play
    with quiet puzzle time when the weather turns rainy.
  arts: Leslie Haider, an enthusiastic crayon artist, admires the bright illustrations of Dr. Seuss, sings along to The Wiggles' 'Fruit Salad', and they spend weekend afternoons drawing colorful scenes
    while humming Baby Shark.
  travel: Leslie Haider, who enjoys family road trips to the seaside boardwalk and dreams of visiting Disneyland, prefers short, well‑planned excursions with plenty of snack stops, yet they delight in spontaneous
    playground detours along the way.
  culinary: Leslie Haider, a picky eater with a fondness for cheese‑filled macaroni, chicken nuggets, and strawberry‑banana smoothies, often arranges food into smiley faces before biting and they occasionally
    trade peas for goldfish crackers during play‑dinner, revealing a quirky blend of creativity and stubbornness at the table.
  core: Leslie Haider, a three‑year‑old who blends a love for tidy routines with spontaneous bursts of creativity, navigates the world with a gentle, cooperative spirit and a penchant for turning everyday
    moments into playful experiments, and they cherish both structure and surprise.
background:
  cultural: Leslie is raised in a middle‑class, predominantly white suburban community in Rockville Centre, Nassau County, New York. Her family participates in typical American cultural traditions such
    as celebrating holidays like Thanksgiving, Fourth of July, and Halloween, and attends community events at the local park and library. The neighbourhood’s emphasis on safety, school readiness, and family‑centered
    activities shapes her daily routine, providing both structure and opportunities for spontaneous play.
