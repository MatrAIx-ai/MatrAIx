personas:
  professional: Carl Tillman is a budding junior explorer who channels curiosity and practicality into leading impromptu treasure hunts and building inventive LEGO contraptions during playtime, rallying
    friends with energetic leadership while resisting rigid rules.
  sports: Carl Tillman is a lively member of the Riverdale Runners youth soccer club, sprints through tag games at the local park, cheers for the nearby professional team the Green Bay Packers, and cycles
    around the neighborhood while occasionally attempting to mimic the moves of the NBA's Chicago Bulls on the playground.
  arts: Carl Tillman delights in drawing bright dinosaurs inspired by Dr. Seuss books, sings along to The Wiggles and Sesame Street tunes at church, and enjoys watching Pixar's "Finding Nemo" while collecting
    glossy stickers of their favorite characters.
  travel: Carl Tillman loves family road trips to the nearby state forest where they explore leaf trails, has visited the beach town of Oceanview, and dreams of traveling to Disneyland in California and
    the Smithsonian National Museum of Natural History in Washington, D.C.
  culinary: Carl Tillman favors cheesy pizza slices, chicken nuggets with ketchup, and strawberry yogurt, can stir pancake batter under adult supervision, and enjoys creating 'bug soup' using peas, carrots,
    and pretzel sticks for imaginative play.
  core: Carl Tillman, a 6‑year‑old whirlwind of curiosity, leads spontaneous games, builds messy LEGO inventions, misplaces their red cap often, and balances a practical mind with a love for group fun.
background:
  cultural: Carl is a white child growing up in Louisburg, a small town in Franklin County, North Carolina. His family is part of a tight‑knit community where Southern hospitality, family gatherings, and
    local traditions play a central role. He attends a local elementary school and participates in community events such as county fairs, church Sunday school, and seasonal celebrations like Fourth of July
    fireworks and Thanksgiving. The rural surroundings, with nearby farms, woods, and small waterways, nurture his love for nature and outdoor exploration. At home, he enjoys family meals featuring regional
    dishes and hears occasional Southern expressions, while being taught the values of kindness, cooperation, and respect for elders.
