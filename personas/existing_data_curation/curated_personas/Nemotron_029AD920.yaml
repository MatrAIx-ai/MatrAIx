  career_goals: Although still young, Carl often talks about wanting to explore the sky and help people. He dreams of becoming an astronaut or a wildlife researcher, imagining a future where he can discover
    how the world works, travel to new places, and share his adventures with friends and family. He also expresses a desire to be a teacher one day, so he can help others learn and grow.
