persona_description: A researcher at the Cabot Institute at the University of Bristol, focused on modeling the consequences of using solar radiation geoengineering on a marine ecosystem. The individual
  is deeply involved in the field of environmental science, particularly in the study of coral reefs and their interactions with climate change. They use statistical and numerical modeling to explore the
  potential impacts of geoengineering on coral reef habitats, while also considering the long-term implications of ocean acidification. The researcher is knowledgeable about the risks and uncertainties
  associated with human interventions in the climate system and seeks to engage wider society in developing a shared response to twenty-first century challenges.
