  career_goals: Graciela aims to move into a supervisory role, such as foreman or assistant site manager, within the next three years. She plans to earn an OSHA 30-hour certification and complete an online
    associate's program in construction management to deepen her technical knowledge. Long-term, she envisions starting a small contracting business that specializes in affordable home renovations for Hispanic
    families in Polk County, while mentoring younger workers and promoting sustainable building habits. Her ambition is grounded in providing stable income for her family and giving back to her community
    through reliable, high-quality construction work.
