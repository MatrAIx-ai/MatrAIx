personas:
  professional: Graciela Luna, a 37‑year‑old construction laborer in central Florida, combines over a decade of hands‑on expertise in concrete finishing, formwork, carpentry, and operation of backhoes and
    forklifts with bilingual communication skills that smooth team coordination, and is actively pursuing OSHA‑30 certification and an associate’s degree in construction management to step into a foreman
    or assistant site‑manager role and later launch a sustainable home‑renovation contracting business serving local families.
  sports: Graciela Luna plays forward for the community co‑ed side, the Polk County Rovers, regularly follows Orlando City SC in the MLS, and stays fit by jogging the local nature trails and coaching youth
    soccer drills on weekends, channeling their energetic personality into team spirit and personal endurance.
  arts: Graciela Luna leads salsa nights at the local cultural center, teaching younger relatives traditional steps inspired by icons like Celia Cruz while also attending live Afro‑Cuban ensemble performances
    and downtown jazz sets by pianist Jane Smith, weaving rhythm and community into their creative outlet.
  travel: Graciela Luna spends spare weekends exploring the wetlands of the Everglades and hiking Wekiwa Springs State Park, dreams of attending sustainability conferences in Portland, Oregon, and plans
    a future cultural immersion trip to Barcelona, Spain to study Gaudí’s architecture, balancing their love of nature with a curiosity for innovative design.
  culinary: Graciela Luna devotes Saturday afternoons to cooking arroz con gandules, lechon, and pastelillos using family‑handed sofrito, annatto, and adobo, mixes garden‑fresh roasted vegetables into the
    meals, and they occasionally treat themselves to gourmet tacos from a nearby food truck when time runs short, showcasing a blend of tradition and improvisation in the kitchen.
  core: Graciela Luna, a 37‑year‑old construction professional fueled by salsa rhythms, soccer camaraderie, and a drive for sustainable building, turns every drill and dance step into a lesson in calm resilience,
    community‑first ambition, and adaptable curiosity.
background:
  cultural: Graciela was born to Puerto Rican parents and raised in a close-knit family that preserved the island's traditions even after relocating to central Florida. She grew up bilingual, celebrating
    holidays such as Nochebuena, Three Kings Day, and the island's vibrant festivals with music like plena and bomba. Familismo and a strong sense of community guide her interactions, and she often brings
    the warmth of Puerto Rican hospitality to her work crew and neighborhood events. While adapting to Floridian life, she blends island flavors with Southern cuisine, participates in local parades, and
    stays connected to a network of fellow Puerto Ricans throughout the Tampa-St. Pete-Lakeland region.
