  career_goals: Cody aims to secure an entry‑level position in community outreach or public affairs within a local government agency or nonprofit organization, where he can apply his communication and organizational
    strengths. Over the next five years he hopes to progress to a supervisory role, leading community programs and events that foster local engagement. He also plans to pursue a certification in nonprofit
    management to deepen his expertise and increase his impact.
