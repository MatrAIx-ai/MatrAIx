personas:
  professional: Cody Hodges, a 19‑year‑old aspiring community outreach coordinator, they utilize strong research, written communication and event‑planning skills to organize local volunteer drives, employ
    tools like Trello for project management, and apply the practical, collaborative mindset fostered by growing up attending county fairs and high school sports to solve problems efficiently.
  sports: Cody Hodges, a 19‑year‑old basketball enthusiast, they play in the North Sioux City Community Basketball League, cheer for the Sioux Falls Skyforce and the Minnesota Vikings, and spend weekends
    hiking Platte River trails, blending competitive play with low‑key outdoor fitness.
  arts: Cody Hodges, a 19‑year‑old community‑theater participant, they bring classic literature to the stage, frequently quoting Fitzgerald or Austen, and unwind at the River Valley Music Festival listening
    to folk‑rock acts like The Avett Brothers and local singer‑songwriter Dylan Reed, which fuels their creative outlook.
  travel: Cody Hodges, a 19‑year‑old road‑trip lover, they have visited nearby Mount Rushmore and Chicago’s Art Institute, dream of camping in Yellowstone and exploring Copenhagen’s canals, but they plan
    trips carefully around a limited budget and a part‑time job.
  culinary: Cody Hodges, a 19‑year‑old weekend grill master, they favor smoking pork ribs with a dry rub of brown sugar, paprika and garlic, serve them with corn on the cob, homemade potato salad and pickled
    beets, and occasionally experiment with a walleye fillet sautéed in butter and lemon.
  core: Cody Hodges, a 19‑year‑old pragmatic optimist, they juggle community‑theater rehearsals, basketball games and meticulous budgeting, but they habitually forget to water houseplants and procrastinate
    on dental appointments.
background:
  cultural: Cody was raised in North Sioux City, a small, predominantly white Midwestern town in South Dakota. His family traces its roots to German and Norwegian immigrants who settled the region in the
    late 19th century. The local culture emphasizes practicality, community involvement, modesty, and a strong connection to outdoor life and seasonal traditions such as county fairs and high school sports.
    These values have shaped Cody’s worldview, fostering a respect for routine, a collaborative spirit, and a pragmatic approach to problem‑solving.
