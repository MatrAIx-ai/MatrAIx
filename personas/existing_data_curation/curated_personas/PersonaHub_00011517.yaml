persona_description: A literary scholar who is interested in the circulation of literary works and the role of travel narratives in the formation of Brazilian literature. They are particularly interested
  in the interactions between literary criticism and the ideologies of the age, and how these ideologies influenced the formation of theoretical thinking in Brazil. They are also interested in the concept
  of Brazil as seen by Brazilians and how it was shaped by the circulation of ideas and the role of travel narratives in the process.
