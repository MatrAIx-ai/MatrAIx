  career_goals: Michelle aims to become a senior technical specialist within a leading aerospace or medical‑device firm, obtaining certifications like Certified Precision Instrument Technician and potentially
    pursuing a bachelor's degree in engineering technology. She seeks leadership of a small team of technicians, developing standardized repair protocols and contributing to design improvements for next‑generation
    instruments. In the longer term, she envisions opening her own boutique repair shop focused on high‑end scientific equipment, leveraging her curiosity for emerging technologies and her competitive drive
    to build a respected reputation in the field.
