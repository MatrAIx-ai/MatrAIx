  career_goals: While not seeking formal employment, Grace aims to cement her legacy within the Brooklyn artistic community. She aspires to publish a collection of memoirs and poems that weave personal
    history with the broader African‑American experience. Additionally, she plans to curate a traveling exhibition of senior artists from her neighborhood, and to establish a small scholarship fund for
    Black women pursuing visual arts studies. Her ultimate ambition is to ensure that the stories and creative expressions of her generation are documented, celebrated, and passed on to future artists.
