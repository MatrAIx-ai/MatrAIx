  career_goals: Although officially retired, Randy aims to stay professionally active by offering pro‑bono consulting to small businesses in Fairhope and the broader Baldwin County area. He aspires to join
    the local chamber of commerce’s advisory committee, where he can influence economic development while nurturing his curiosity about emerging market trends. Randy also wishes to mentor youth through
    the Rotary Club’s scholarship program and to champion mental‑health awareness workshops, drawing on his own experiences with anxiety and emotional distress. Long‑term, he hopes to author a memoir that
    blends his business insights with personal reflections on resilience and community service.
