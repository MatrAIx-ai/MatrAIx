  hobbies: '[''Cooking (traditional Mexican and fusion recipes)'', ''Gardening (herbs and vegetables)'', ''Volunteer work at community center (tutoring, wellness workshops)'', ''Yoga and mindfulness meditation'',
    ''Hiking local trails'', ''Listening to Latin and indie music'', ''Journaling'', ''Reading (personal development and fiction)'']'
  career_goals: Maylee aims to advance from her current role as an administrative assistant to an office manager or administrative supervisor within the next three to five years. She plans to obtain a Certified
    Administrative Professional (CAP) credential and deepen her knowledge of digital workflow solutions to increase office efficiency. She is motivated to mentor junior staff, foster a collaborative environment,
    and develop training programs that emphasize compassion and stress‑management. Long‑term, she hopes to combine her administrative expertise with community outreach, perhaps coordinating support services
    for local non‑profits or educational programs, while balancing her family commitments.
