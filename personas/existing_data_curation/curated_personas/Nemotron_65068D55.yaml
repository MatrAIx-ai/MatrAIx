personas:
  professional: Maylee Hernandez is a seasoned administrative professional who leverages bilingual fluency, meticulous calendar management, and a compassionate, curiosity‑driven approach to streamline office
    workflows while mentoring junior staff and fostering a stress‑aware workplace culture.
  sports: Maylee Hernandez enjoys weekend hikes on the Potawatomi Trail with the South Bend Outdoor Adventure Club, follows the South Bend Cubs for baseball and the Indiana Pacers for basketball, and incorporates
    regular yoga sessions into her fitness routine to balance the practical, compassionate energy she brings to both work and community volunteering.
  arts: Maylee Hernandez curates a vibrant artistic life that blends Latin rhythms from artists like Café Tacvba and Bad Bunny with indie sounds from Tame Impala, while unwinding with contemporary novels
    such as Sally Rooney’s 'Normal People' and attending the monthly South Bend Art Walk, reflecting their curiosity‑driven yet compassionate appreciation for diverse creative expressions.
  travel: Maylee Hernandez prefers thoughtfully planned road trips that combine cultural immersion—such as a recent culinary tour of Oaxaca and a weekend family getaway to the Indiana Dunes—while also reserving
    spontaneous escapes to nearby national parks like Yellowstone, balancing a pragmatic travel budget with a desire for soulful experiences.
  culinary: Maylee Hernandez is an avid home chef who blends traditional Mexican dishes—like pork carnitas tacos with homemade salsa verde featuring garden cilantro and epazote—with Midwestern comfort flavors
    such as corn‑bread topped with chipotle‑spiced pumpkin puree, constantly experimenting with fresh herbs and seasonal vegetables harvested from their backyard garden.
  core: Maylee Hernandez balances meticulous organization with spontaneous compassion, often juggling detailed spreadsheets while spontaneously planting herbs to calm their stress‑prone mind.
background:
  cultural: Maylee’s Mexican heritage shapes her values of family, community, and respect for cultural traditions. Growing up in a bilingual household, she maintains fluency in Spanish and celebrates holidays
    such as Día de los Muertos and Cinco de Mayo with family gatherings that feature shared meals and storytelling. While living in South Bend, she blends these traditions with Midwestern customs, participating
    in local festivals and community events. Her cultural background informs her compassionate outlook, motivating her to support Spanish‑speaking members of her community and to incorporate inclusive practices
    in her workplace.
attributes:
  skills: '[''Microsoft Office Suite (Word, Excel, PowerPoint, Outlook)'', ''Google Workspace (Docs, Sheets, Calendar)'', ''Calendar and travel coordination'', ''Bilingual communication (English/Spanish)'',
