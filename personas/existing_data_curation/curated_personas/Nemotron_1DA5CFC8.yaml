personas:
  professional: Leyda is a 16‑year‑old aspiring culinary‑artist‑content creator who blends hands‑on cooking of dishes like mofongo with modern twists while producing short‑form videos and graphics for local
    small businesses, leveraging their bilingual skill set and a relaxed, adaptable work style that favors creativity over rigid schedules.
  sports: Leyda enjoys casual pick‑up basketball at the local park, follows the Vaqueros de Bayamón on the BSN season, plays a few matches for the Cataño youth futsal club during the summer, and keeps fit
    by doing short morning jogs along the Trujillo Alto river trail, preferring low‑key activity over regimented training.
  arts: Leyda channels a love of visual storytelling by sketching colourful neighbourhood murals and comic strips while listening to Bad Bunny, Gilberto Santa Rosa, and bomba rhythms, and they often quote
    favorite YA authors such as John Green in their short stories.
  travel: Leyda prefers spontaneous weekend trips that blend nature and culture, often hitching a bus to El Yunque’s waterfalls or touring Old San Juan’s forts, while dreaming of a future backpacking adventure
    through Barcelona’s art districts and Mexico City’s street‑food scene, all within a modest family travel budget.
  culinary: Leyda’s culinary persona mixes traditional island flavors like mofongo stuffed with chorizo, garlic, and cilantro with unexpected twists such as saffron‑infused arroz con gandules, while they
    love experimenting with fresh herbs like oregano and mint in homemade sauces and often showcase these creations on TikTok alongside quick tutorials on perfecting crisp plantain chips.
  core: Boldly curious yet habitually disorganized, Leyda balances a love for spontaneous creativity—whether whipping up a mofongo remix or sketching a mural— with a relaxed attitude toward schedules, a
    penchant for late‑night TikTok edits, and an occasional forgetfulness that leaves homework piled beside kitchen tools.
background:
  cultural: Leyda is rooted in a proud Puerto Rican heritage, growing up in the close‑knit communities of Trujillo Alto and the neighboring Catano municipality. Her family celebrates traditional festivals
    like\u00a0fiestas patronales, where music, dancing, and communal meals emphasize the island's Afro‑Caribbean and Taíno influences. Spanish is her primary language, enriched by occasional English usage
    at school and through online media. She was raised on classic island dishes and values the communal aspect of food preparation, which shapes her culinary interests. Religious traditions, especially
    Catholic celebrations such as\u00a0San Juan Bautista, also play a role in her family life, fostering a sense of community service and collective responsibility.
attributes:
  skills: '[''Traditional Puerto Rican cooking'', ''Social media content creation'', ''Basic graphic design with Canva'', ''Bilingual communication (Spanish/English)'', ''DIY repair and gardening'', ''Creative
    writing and sketching'']'
  hobbies: '[''Sketching urban and mural scenes'', ''Reading contemporary YA literature'', ''Writing short stories'', ''Listening to salsa, reggaetón, and bomba'', ''Playing the ukulele'', ''Cooking and
    recipe experimentation'', ''Creating TikTok food videos'', ''Balcony herb gardening'']'
  career_goals: Leyda aims to complete her GED within the next year and enroll in a culinary arts program that blends traditional island cuisine with modern gastronomy. She envisions opening a modest pop‑up
    kitchen or food stall that offers her signature twists on classic dishes, leveraging social media to attract a local following. Parallel to her culinary aspirations, she hopes to cultivate a side venture
    as a freelance content creator, designing visuals and short videos for small businesses in her community. Ultimately, Leyda wants a career that lets her merge her practical cooking skills with her curiosity
    for digital storytelling, allowing her to stay flexible and work on projects that interest her.
