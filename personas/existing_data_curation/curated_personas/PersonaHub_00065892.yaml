persona_description: A scientist and researcher in the field of genetics, particularly in the area of prenatal and fetal medicine. The person is interested in the use of whole-genome sequencing (WGS) to
  identify chromosomal abnormalities in the placenta, fetus, and pregnant woman. The individual is familiar with the standard clinical tests for common chromosomal conditions and is interested in exploring
  the potential of WGS to identify rare autosomal trisomies that are not reported on routine testing. The person is also interested in the potential clinical relevance of these rare trisomies and how they
  may contribute to pregnancy complications.
