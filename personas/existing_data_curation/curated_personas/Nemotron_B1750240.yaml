personas:
  professional: Francisco Pena, an 18-year-old psychology student at Purdue, leverages bilingual fluency, Canva design skill, and beginner-level Python data analysis along with a relaxed-yet-empathetic
    leadership style to organize peer-counseling workshops that bridge cultural gaps and prioritize group harmony.
  sports: Francisco Pena enjoys playing forward in Purdue's intramural soccer league, regularly joins pickup matches at the local YMCA, follows the Indy Eleven and the Indiana Pacers for inspiration, and
    balances his fitness routine with weekend hikes along the Indiana Dunes, preferring flexible social workouts over rigid gym schedules.
  arts: Francisco Pena immerses himself in Latin rhythms by dancing to Bad Bunny and J Balvin at campus salsa nights, captures Indiana's sunrise over the Wabash River with his Canon EOS, and appreciates
    the storytelling of Pedro Almodovar films, allowing music and visual art to shape his social identity.
  travel: Francisco Pena enjoys weekend road trips to the Indiana Dunes and occasional flights to Chicago for concerts, while dreaming of a cultural immersion tour in Cartagena's historic Old Town and a
    road-trip along Patagonia's stunning routes, balancing careful budgeting with a thirst for authentic community experiences.
  culinary: Francisco Pena, a confident home-cook, frequently prepares arepas stuffed with queso fresco, empanadas filled with seasoned beef and potatoes, and bandeja paisa featuring chicharron, red beans,
    and fried plantains, while savoring a cup of freshly brewed Andean coffee and often experiments by adding avocado and aji dulce to classic recipes.
  core: Francisco Pena is a socially-driven bilingual 18-year-old who balances a love for group celebrations and spontaneous creativity with bouts of anxiety that fuel deep empathy and occasional last-minute
    chaos.
background:
  cultural: Francisco grew up in a Colombian immigrant household in Indiana, where Spanish was spoken at home and English at school and with friends. His family maintains Colombian traditions such as celebrating
    Día de la Independencia, sharing coffee from the Andes, and cooking family‑style meals that emphasize hospitality and togetherness. These values of community, kindness, and consideration blend with
    the Midwestern ethos of openness and practicality he experiences at Purdue and in West Lafayette. Being fluent in both cultures, he participates in local Hispanic festivals, volunteers with Latino youth
    programs, and enjoys the state’s outdoor recreation. This bicultural upbringing informs his sociable, cooperative personality and fuels his desire to help bridge cultural gaps for others.
attributes:
  skills: '[''Bilingual communication (Spanish/English)'', ''Team collaboration and leadership'', ''Event organization'', ''Public speaking'', ''Basic graphic design (Canva)'', ''Introductory programming
    (Python)'', ''Research and data analysis'', ''Peer counseling and active listening'', ''Creative brainstorming'', ''Adaptable problem solving'']'
  hobbies: '[''Playing soccer (intramural and pickup games)'', ''Salsa and reggaeton dancing'', ''Cooking Colombian cuisine (arepas, empanadas, bandeja paisa)'', ''Exploring Indiana nature trails and parks'',
    ''Photography (street and cultural events)'', ''Multiplayer video gaming (RPGs, shooters)'', ''Board games with friends (Catan, Werewolf)'', ''Listening to podcasts on psychology and self‑improvement'',
    ''Volunteering for local youth mentorship programs'']'
  career_goals: Francisco wants to channel his sociable nature, bilingual strength, and growing interest in mental‑health support into a career that uplifts Latino youth in the Midwest. He plans to finish
    a bachelor’s degree in psychology or social work while deepening his experience through volunteer tutoring, peer‑counseling, and internships at community‑based nonprofits. His long‑term ambition is
    to become a program coordinator or outreach manager for an organization that provides counseling, mentorship, and educational resources to immigrant families, allowing him to combine practical problem‑solving
    with his drive for harmonious, people‑focused outcomes.
