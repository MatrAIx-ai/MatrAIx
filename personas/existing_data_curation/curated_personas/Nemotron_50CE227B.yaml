personas:
  professional: Candice Manning, a seasoned community volunteer with a knack for organization and logistics, channels her budgeting, event coordination, and caregiving skills into leading senior center
    programs and plans to launch a home‑based knitted blanket and baked‑good venture.
  sports: Candice Manning enjoys regular walks along the Assabet River Trail, is a member of a local walking club that meets for seasonal hikes, cheers on the Boston Red Sox and the New England Patriots
    on game days, and participates in birdwatching outings that double as low‑impact cardio.
  arts: Candice Manning indulges in historical fiction by authors such as Philippa Gregory and Ken Follett, contributes to a church choir performing pieces ranging from Handel to contemporary gospel, and
    curates a scrapbook of family genealogy with decorative lettering inspired by traditional New England folk art.
  travel: Candice Manning favors relaxed road trips to historic New England towns like Salem and Plymouth, has taken a weekend getaway to the maritime village of Stonington, and dreams of visiting Colonial
    Williamsburg and the historic streets of Boston to deepen genealogical research.
  culinary: Candice Manning loves growing heirloom tomatoes, carrots, and kale, which she incorporates into classic New England dishes such as baked beans, clam chowder, and apple crisp, while also baking
    oatmeal raisin cookies spiced with cinnamon and nutmeg to sell at local markets alongside her hand‑knitted blankets.
  core: Candice Manning blends meticulous organization, compassionate community service, and garden‑to‑table cooking into a life of purposeful routines, occasional yarn splurges, and steadfast stewardship
    of senior wellbeing.
background:
  cultural: Candice belongs to a White New England cultural tradition, with family roots tracing back to Irish and English immigrants who settled in Worcester County in the early 1900s. Raised in a close‑knit
    small‑town environment, she was taught the values of self‑reliance, community service, and modesty. Her upbringing reflects the Protestant work ethic common in the region, and she maintains active participation
    in local church and community events that celebrate New England heritage and seasonal traditions.
