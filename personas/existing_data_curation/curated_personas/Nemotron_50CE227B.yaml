  hobbies: '[ ''Gardening'', ''Baking & Cooking'', ''Knitting'', ''Historical Fiction Reading'', ''Genealogy Research'', ''Walking/Hiking'', ''Birdwatching'', ''Volunteering at Food Pantry'', ''Church Choir''
    ]'
  career_goals: Although she is not currently seeking paid employment, Candice aspires to deepen her involvement in community service. She aims to take a leadership role within the local senior center,
    possibly becoming a volunteer coordinator for programs that support widowed seniors. She also hopes to complete a certificate in elder‑care support to better assist peers, and to launch a small home‑based
    business selling handcrafted knitted blankets and baked goods at local markets.
