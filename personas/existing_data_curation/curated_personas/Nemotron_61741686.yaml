  career_goals: Tim aims to progress into supervisory roles within the manufacturing environment, such as shift lead or production supervisor, where he can combine his hands‑on technical background with
    his business acumen to drive operational improvements. He plans to earn certifications in CNC programming and Lean Six Sigma to deepen his expertise. Long‑term, Tim envisions becoming a plant manager
    or launching his own small metal‑fabrication shop that offers custom solutions to local businesses. He is also open to pursuing an MBA or a master’s degree in industrial engineering to expand his strategic
    and managerial capabilities.
