personas:
  professional: Elizabeth Cowan is a logistics supervisor with two decades of experience coordinating transportation crews, optimizing routes with data‑driven tools like Oracle TMS, and balancing competitive
    cost‑reduction goals with a practical curiosity for emerging AI routing technologies, and they thrive under pressure despite a relaxed, occasionally disorganized work style.
  sports: Elizabeth Cowan is an avid weekend hiker who belongs to the Finger Lakes Trail Club, enjoys leisurely jogs along the lake during spring, follows the Rochester Red Wings and the New York Knicks
    on TV, and they treat fitness as a low‑key, stress‑relieving activity that she occasionally skips when work pressures mount.
  arts: Elizabeth Cowan is a lover of classic jazz, spinning Miles Davis and Ella Fitzgerald while solving puzzles, attends a small book club that reads historical fiction and biographies, finds inspiration
    in the paintings of Andrew Wyeth, and they occasionally volunteer at the local community theatre to help with set construction, letting music and literature shape her reflective evenings.
  travel: Elizabeth Cowan is a weekend explorer who prefers self‑planned road trips through the Finger Lakes, has already trekked the waterfalls of Watkins Glen, dreams of sipping wine in Napa Valley and
    wandering the historic streets of Edinburgh, travels by her reliable SUV to savor scenic routes, and they balance their wanderlust with a modest budget that prioritizes fuel efficiency over luxury.
  culinary: Elizabeth Cowan is a modestly skilled home cook who delights in seasonal dishes like rosemary‑roasted carrots, heirloom tomato bruschetta, and apple crisp made with apples from her garden, seasons
    her meals with fresh basil, sage, and thyme, occasionally experiments with homemade focaccia, and they pair their dinners with a glass of Pinot Gris while listening to jazz.
  core: Elizabeth Cowan is a pragmatic yet curious logistician whose competitive drive coexists with a relaxed, sometimes disorganized lifestyle, a penchant for solitary hobbies, and a lingering undercurrent
    of worry that fuels both their meticulous cost‑cutting and their personal quest for balance.
background:
  cultural: Elizabeth is a white American whose family roots trace back to Irish and German immigrants who settled in upstate New York in the early 20th century. She grew up in a middle‑class, suburban
    environment near Rochester, absorbing the region’s legacy of manufacturing, innovation, and community values. Her upbringing emphasized hard work, practical problem‑solving, and modest civic involvement,
    reflected in her participation in local fairs and seasonal traditions like Thanksgiving and Fourth‑of‑July celebrations. While she respects the cultural diversity of Monroe County, her own cultural
    identity is grounded in the Mid‑Atlantic/Great Lakes American experience.
attributes:
