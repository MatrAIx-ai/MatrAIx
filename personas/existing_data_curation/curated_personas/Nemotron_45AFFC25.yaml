  career_goals: Elizabeth aims to advance to a regional operations manager role where she can shape strategic initiatives for sustainable logistics across multiple sites. She plans to earn a Certified Transportation
    Professional (CTP) credential and attend advanced workshops on AI‑driven routing and green supply‑chain practices. Her competitive drive pushes her to reduce transportation costs by at least 10 % over
    the next three years while maintaining safety standards. She also wants to develop a mentorship program for new supervisors, improve her own organizational habits, and achieve a better work‑life balance
    to reduce stress before retirement.
