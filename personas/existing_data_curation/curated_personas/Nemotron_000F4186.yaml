  career_goals: Daniel aims to rise to a regional sales manager position within the next five years, eventually stepping into a director‑level role where he can shape sales strategy across multiple product
    lines. He plans to earn professional sales certifications (such as CPSP) and, despite his high‑school education, intends to pursue an MBA part‑time to deepen his business acumen. Long‑term, he envisions
    launching a boutique consultancy that helps emerging manufacturers develop innovative go‑to‑market strategies, blending his analytical rigor with his love for novel, artistic approaches to problem‑solving.
