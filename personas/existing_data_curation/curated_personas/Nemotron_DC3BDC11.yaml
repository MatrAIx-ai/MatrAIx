  career_goals: Although retired, Calvin aims to leave a lasting legacy in Fordyce by documenting the town's African-American history, establishing a scholarship fund for local high-school graduates, and
    mentoring younger community members in practical skills. He hopes to complete a memoir that weaves together personal memories with broader historical context, develop a community garden that supplies
    fresh produce to seniors, and continue serving on his church's finance committee. By blending his curiosity for history with his practical expertise, he seeks to create resources that future generations
    can rely on and to foster a sense of pride and self-reliance in his community.
