  hobbies: '[''Watercolor painting'', ''Reading literary fiction and poetry'', ''Traditional cooking'', ''Herbal and native plant gardening'', ''Attending bomba and plena festivals'', ''Digital photography'',
    ''Knitting and crocheting'', ''Community storytelling circles'', ''Stargazing and basic astronomy'', ''Learning abstract art and philosophy through online courses'']'
  career_goals: Although retired from formal employment, Ermelinda aspires to become a recognized community cultural archivist, documenting Loiza’s Afro‑Puerto Rican traditions through a series of oral‑history
    recordings and a modestly illustrated book. She plans to curate a traveling exhibition of her watercolor artworks and photographs, showcasing the island’s natural beauty and cultural festivals. Ermelinda
    wishes to launch a small home‑based business selling hand‑embroidered textiles and printed photo books, thereby supporting her grandchildren’s education. She also intends to enroll in online courses
    on abstract art theory and philosophy, expanding her intellectual horizons. Volunteering as a docent at the local museum and leading art workshops for youth are key components of her ongoing contribution
    to her community.
