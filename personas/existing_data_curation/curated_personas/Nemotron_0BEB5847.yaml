personas:
  professional: Cody Walker, a budding freelance visual storyteller, leverages their expertise in graphic design, photography, and digital media to craft immersive brand narratives, while their curiosity
    and balanced blend of organization and flexibility let them juggle client deadlines with experimental side projects.
  sports: Cody Walker stays fit by hiking rugged Sonoran trails with the Arizona Desert Hiking Society, follows the Phoenix Suns for basketball, the Arizona Cardinals for football, and joins a local weekend
    beach‑volleyball league, mixing cardio with social sport and they relish the camaraderie.
  arts: Cody Walker frequents downtown art galleries and street‑art murals by artists like Shepard Fairey and Banksy, curates indie playlists featuring Arcade Fire and Phoebe Bridgers, and draws inspiration
    from graphic novels by Alan Moore for their own visual storytelling.
  travel: Cody Walker prefers spontaneous road trips that blend adventure and relaxation, having already captured sunrise at Antelope Canyon, explored the cultural vibrancy of Oaxaca, and aspires to trek
    Patagonia’s Torres del Paine while balancing travel costs with their spouse’s shared budget.
  culinary: Cody Walker experiments in the kitchen with southwestern flavors, perfecting chipotle‑marinated shrimp tacos, prickly‑pear salsa, and roasted poblano‑filled enchiladas, while their intermediate
    cooking skills often lead to occasional over‑spicing but also a growing repertoire of homemade masa.
  core: Cody Walker is a curiosity‑driven, organized‑yet‑flexible creative who balances desert hikes, indie music, and ambitious freelance goals, and they constantly battle a habit of over‑booking projects
    and a sweet‑tooth for spicy snacks.
background:
  cultural: Cody is a white American who grew up in a middle‑class Midwestern family that emphasized education, community involvement, and self‑reliance. Now residing in Mesa, Arizona, he has embraced the
    desert lifestyle and the region’s blend of Native American and Mexican cultural influences, which shape his interests in local art, cuisine, and outdoor recreation. While he identifies with mainstream
    American cultural norms, he also appreciates the relaxed, outdoors‑oriented ethos of the Southwest.
attributes:
  skills: '[''Graphic Design'', ''Digital Photography'', ''Basic Web Development (HTML/CSS/JavaScript)'', ''Content Creation & Copywriting'', ''Project Planning & Time Management'', ''Social Media Strategy'',
