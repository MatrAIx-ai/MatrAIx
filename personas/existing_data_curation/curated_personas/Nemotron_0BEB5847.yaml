  hobbies: '[''Hiking in the Sonoran Desert'', ''Nature Photography'', ''Visiting Art Galleries & Street Murals'', ''Listening to Indie/Alternative Music'', ''Reading Science Fiction & Fantasy'', ''Cooking
    Southwestern Cuisine'', ''Board Game Nights'', ''Casual Video Gaming'']'
  career_goals: Cody aims to transition into a freelance creative professional, building a portfolio that merges design, photography, and digital storytelling. Over the next five years he hopes to launch
    a boutique creative studio that offers branding, web design, and visual content services. He plans to pursue a certification in Interaction Design to strengthen his credentials while maintaining the
    flexibility needed to support his marriage and personal growth.
