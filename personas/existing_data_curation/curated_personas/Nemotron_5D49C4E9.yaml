  career_goals: Micah aims to advance to a senior compliance manager or director role within the next five years. He plans to earn professional certifications such as the Certified Compliance & Ethics Professional
    (CCEP) and possibly pursue a master’s degree in risk management or corporate governance. His long‑term ambition is to design streamlined compliance frameworks that balance thoroughness with flexibility,
    especially in areas like environmental compliance relevant to Lassen County’s natural resource industries. He also hopes to mentor junior colleagues, improve his own organizational habits, and eventually
    contribute to shaping corporate governance policies at a regional or state level.
