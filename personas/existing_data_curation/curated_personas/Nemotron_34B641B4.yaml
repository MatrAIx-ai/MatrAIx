  hobbies: '[''Painting and Sketching'', ''Knitting and Quilting'', ''Gardening'', ''Culinary Experimentation (Soul & Global Fusion)'', ''Visiting Art Galleries and Museums'', ''Reading (Art History, Philosophy)'',
    ''Volunteer Work at Community Center'', ''Live Music and Dance Events'', ''Journaling'', ''Walking in Parks and Nature Reserves'']'
  career_goals: Monica aspires to transform her passion for art and community service into a part‑time role as a cultural outreach coordinator for a local nonprofit, where she can design and run free art
    workshops for youth and seniors. She plans to earn a certification as a peer support specialist, launch a small community garden, and eventually open a neighborhood arts studio that offers low‑cost
    classes and a safe space for intergenerational storytelling. While maintaining her family responsibilities, she hopes to continue volunteering in leadership positions that bridge the city’s arts council
    with underserved neighborhoods.
