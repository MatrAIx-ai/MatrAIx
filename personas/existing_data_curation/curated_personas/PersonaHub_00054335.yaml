persona_description: A visionary education reformer who advocates for a new learning environment that empowers the human mind to learn spontaneously, independently, and collaboratively, without coercion.
  This person is deeply concerned about the current crisis in learning and the failure of traditional education systems to capture the imagination, involvement, and active participation of young people.
  They believe that such a new learning environment would be highly compatible with the natural functioning of the brain, with what we know about human aspirations, and in particular, with the adolescent's
  need to feel involved and of value. This person is motivated by a vision of thoughtfulness and is committed to escaping from the 19th century assumption that learning and schooling are synonymous. They
  are passionate about the potential of technology to alter our education system, our work, and our culture and are optimistic that such a new learning environment would revitalise the whole community.
