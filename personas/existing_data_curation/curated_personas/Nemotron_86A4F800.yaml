personas:
  professional: Airriel Ingram, a 47‑year‑old STEM‑savvy program strategist, merges data analysis, grant‑writing expertise, and magnetic public speaking to launch arts‑infused STEM curricula while they
    channel a competitive drive and occasional skepticism to secure high‑impact contracts for nonprofit leadership and DEI consulting, even as anxiety spikes during high‑stakes presentations.
  sports: Airriel Ingram is a devoted fan of the Washington Capitals and the Washington Football Team, plays in a mixed‑gender recreational tennis league at the Arlington Community Center each spring, and
    maintains a tri‑weekly practice with the Capital City Yoga & Fitness Collective, treating yoga as their primary athletic outlet while they occasionally join the local running group for 5K charity races.
  arts: Airriel Ingram curates informal pop‑up exhibitions featuring works by Kehinde Wiley and Olafur Eliasson, photographs Alexandria’s historic row houses with a Leica M6 reminiscent of Henri Cartier‑Bresson’s
    street studies, co‑stars in a community theater production of Lin‑Manuel Miranda’s *In the Heights* while they design tech‑enhanced sets, and unwinds listening to Björk’s avant‑garde albums, blending
    visual, performing, and auditory arts into a singular creative identity.
  travel: Airriel Ingram prefers meticulously planned cultural itineraries that combine museum tours with culinary immersion, having explored the Louvre in Paris, the street art districts of Berlin, and
    the historic temples of Kyoto, while they dream of a road‑trip through the Pacific Northwest’s coastal towns, balancing limited family time and a modest budget with a penchant for boutique hotels and
    occasional spontaneous weekend getaways to the nearby Shenandoah Valley.
  culinary: Airriel Ingram enjoys experimenting with international cuisines, often whipping up Moroccan tagine with preserved lemons, Persian jeweled rice with barberries, and Japanese ramen broth simmered
    for hours, using herbs from their rooftop garden such as cilantro and mint, they consider themselves an intermediate home chef who balances occasional fine‑dining splurges at D.C.’s acclaimed Ethiopian
    restaurant *Kasar* with hands‑on cooking workshops for the community.
  core: Airriel Ingram blends a restless curiosity for art and science with a competitive, anxiety‑driven drive, often juggling three projects at once, over‑indulging in boutique coffee and vintage camera
    gear, yet they find calm through rooftop gardening and yoga.
background:
  cultural: Airriel is an African American woman whose family roots trace back to the Southern United States, with ancestors who participated in the Great Migration to the Mid‑Atlantic region. Raised in
    the vibrant, historically Black neighborhoods of the Washington, D.C. metro area, she grew up surrounded by a strong emphasis on education, civic engagement, and cultural expression. Her upbringing
    included regular attendance at community events celebrating Black heritage—such as Juneteenth festivals, African American literary readings, and concerts featuring jazz and spoken‑word artists. This
    cultural immersion fostered a deep respect for the contributions of Black creators in both the arts and sciences, informing her commitment to amplify underrepresented voices through her professional
    and volunteer pursuits.
attributes:
  skills: '[''Data analysis'', ''Statistical modeling'', ''Python programming'', ''R programming'', ''MATLAB'', ''Project management'', ''Grant writing'', ''Public speaking'', ''Community outreach'', ''Art
