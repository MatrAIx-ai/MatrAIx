  hobbies: '[''Visiting art galleries and museums'', ''Photography'', ''Community theater involvement'', ''Rooftop gardening'', ''Cooking international dishes'', ''Yoga and mindfulness meditation'', ''Reading
    science‑fiction'', ''Mentoring youth in STEM'', ''Curating pop‑up art shows'']'
  career_goals: Airriel aims to re‑enter the professional world by leveraging her STEM expertise and community‑focused talents. She aspires to become a program director for a nonprofit that delivers arts‑infused
    STEM education to underserved youth in Fairfax County, positioning herself as a regional leader in inclusive learning. In parallel, she plans to launch a consulting practice that advises tech firms
    on diversity, equity, and inclusion strategies, using her competitive drive to secure high‑impact contracts. Long‑term, she hopes to author a book that explores the intersection of art, science, and
    personal resilience, establishing herself as a thought‑leader who inspires both creative and analytical communities.
