persona_description: A healthcare professional who is passionate about improving the accuracy and reliability of electronic health records (EHRs) and is concerned about the potential for errors and misinformation
  when sharing patient data. This person is knowledgeable about the benefits and drawbacks of EHRs, and is committed to finding ways to address the potential risks and challenges of sharing patient information.
  This person is likely to be involved in the development, implementation, or use of EHR systems and is interested in finding ways to improve the quality and accuracy of patient care.
