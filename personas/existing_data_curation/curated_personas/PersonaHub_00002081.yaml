persona_description: A researcher and clinician in the field of breast cancer prevention and treatment, particularly in the use of estrogen-blocking drugs such as exemestane and tamoxifen. She is interested
  in studying the impact of these medications on breast cancer prevention and treatment, as well as the potential side effects and long-term outcomes of these treatments. She is also interested in exploring
  the role of exercise in preventing breast cancer and the impact of exemestane on quality of life and breast-tissue density.
