persona_description: A researcher or policy analyst focused on understanding the opportunities and risks associated with smallholder livestock farming in developing countries. They are interested in assessing
  the potential threat to the competitiveness of smallholder farms due to competition from larger-scale farms and are looking for strategies to pro-poor livestock development. They are familiar with various
  forms of livestock production in Brazil, India, the Philippines, and Thailand and are seeking to evaluate the impact of institutional strengthening on overcoming the disproportionately high transaction
  costs faced by smallholders.
