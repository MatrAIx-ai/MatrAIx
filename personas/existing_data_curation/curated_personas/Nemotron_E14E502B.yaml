personas:
  professional: Vicki Eatmon, a teaching assistant at a community college in Oklahoma, leverages a solid foundation in classroom support, lesson‑material design, and learning‑management‑system expertise
    to craft narrative‑driven assignments that fuse watercolor illustrations with speculative‑fiction prompts, while their penchant for flexibility and solitary focus lets them thrive in one‑on‑one tutoring
    sessions and push innovative, project‑based learning ideas despite a habit of loosely organized lesson plans.
  sports: Vicki Eatmon, a solitary nature enthusiast in Oklahoma, stays fit through early‑morning birdwatching walks in the fields of Canadian County, joins the Oklahoma City Running Club for weekend 5‑k
    runs, attends twice‑weekly gentle yoga sessions at Oklahoma City Yoga Flow, and keeps a low‑key fan loyalty to the Oklahoma City Thunder (NBA) and the Oklahoma Sooners football program, while eschewing
    competitive team sports in favor of personal wellness routines that fit a flexible schedule.
  arts: Vicki Eatmon, a watercolor painter and speculative‑fiction poet, channels the atmospheric brushwork of J.M.W. Turner and the whimsical detail of Yayoi Kusama into illustrated journals of nature
    walks, curates ambient playlists featuring Brian Eno, Max Richter, and Hammock to accompany writing sessions, and draws inspiration from contemporary poets such as Ocean Vuong and visual artists like
    Mary Cassatt, while they often sketch marginalia of feathered birds on every page of their notebooks.
  travel: Vicki Eatmon, an introspective traveler, prefers meticulously self‑planned trips that blend quiet contemplation with natural wonder, having trekked the geysers of Yellowstone, hiked the alpine
    trails of Banff, and soaked in the midnight sun of Iceland’s Westfjords, while dreaming of wandering Edinburgh’s literary festivals and Kyoto’s zen gardens; budget‑conscious yet willing to splurge on
    a lightweight sketchbook for each journey, Vicki favors off‑peak seasons to avoid crowds and maximize solitary inspiration.
  culinary: Vicki Eatmon, a modest home cook, delights in assembling quinoa salads with roasted sweet potatoes, crumbled feta, and fresh lemon‑zest dressing, whips up simple miso soup seasoned with seaweed
    and scallions, and savors crisp avocado toast on sourdough sprinkled with chili flakes, while their pantry is stocked with organic herbs like thyme, rosemary, and sage, and they often brew loose‑leaf
    Earl Grey tea while sketching new story ideas.
  core: Vicki Eatmon blends solitary creative pursuits with a flexible, slightly disorganized work ethic, turning imaginative storytelling and watercolor art into engaging classroom tools while navigating
    finances through DIY budgeting, managing mild health quirks with meditation, and seeking quiet inspiration in nature and off‑beat travel.
background:
  cultural: Vicki grew up in a white, middle‑class family in the Oklahoma suburbs, where Midwestern values of self‑reliance, community involvement, and a respect for the land shaped her early worldview.
    Her family celebrated traditional holidays and local customs while encouraging curiosity and independent thought. The region’s blend of small‑town life, open prairie landscapes, and proximity to Native
    American cultural sites broadened her appreciation for quiet spaces and diverse perspectives. Although she identifies with mainstream American white culture, Vicki embraces the artistic subcultures
    she discovers online, integrating those influences into her personal and professional life.
