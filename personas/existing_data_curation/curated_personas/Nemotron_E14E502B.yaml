  hobbies: '["Creative writing", "Watercolor painting", "Reading speculative fiction", "Philosophy and abstract theory", "Nature walks", "Birdwatching", "Meditation and yoga", "Puzzle solving (crosswords,
    sudoku)", "Exploring educational technology", "Listening to ambient music"]'
  career_goals: Vicki aims to transition from a teaching assistant to a certified classroom teacher within the next two years, pursuing her state teaching license while completing a master's degree in curriculum
    and instruction. She is drawn to innovative instructional design and hopes to specialize in project‑based learning and educational technology integration. Long‑term, she envisions a role as a curriculum
    developer or instructional designer for a forward‑thinking school district or educational‑technology startup, where she can create flexible, imagination‑rich learning experiences that accommodate solitary
    and self‑directed learners like herself. She also aspires to publish a series of creative‑learning resources that blend art and abstract concepts into mainstream curricula.
