personas:
  professional: Wanda Rout, a dedicated elementary and middle school STEM teacher, channels their data‑driven rigor and competitive spirit into designing innovative curricula, mentoring novice educators,
    leading after‑school robotics clubs, and orchestrating a district‑wide robotics competition that showcases student ingenuity while securing grant funding.
  sports: Wanda Rout stays active through weekend hikes with the Lakefront Hikers Club, cheering on the Chicago Cubs and Chicago Bulls each season, while also participating in a local seniors' walking league
    that meets twice a week along the lakefront trail.
  arts: Wanda Rout lends their soulful voice to the community choir, delights in jazz legends like John Coltrane and contemporary artists such as Diana Krall, and immerses themselves in historical fiction
    by authors like Ken Follett and Philippa Gregory, shaping a cultural palate that balances classic storytelling with melodic improvisation.
  travel: Wanda Rout prefers relaxed road trips that combine scenic drives with stops at historic towns, having recently explored Savannah’s riverfront and the coastal trails of Acadia National Park, while
    eyeing a future pilgrimage to the music‑rich streets of New Orleans and the jazz festivals of Austin, Texas, planning each itinerary around budget constraints and family commitments.
  culinary: Wanda Rout’s kitchen is a hub for soulful Southern cooking, mastering dishes such as crispy fried chicken, buttery collard greens, sweet potato pie, and country‑style cornbread, while also experimenting
    with garden‑fresh herbs to elevate traditional recipes, though they occasionally over‑salt meals in pursuit of bold flavor.
  core: Wanda Rout blends a methodical, data‑oriented mind with a vibrant community spirit, obsessively tracking garden yields, driving a competitive push to outdo fellow educators, and indulging in nightly
    tinkering with Arduino projects while secretly hoarding vintage record collections.
background:
  cultural: Wanda is a proud African American who grew up in a close‑knit church community that emphasized service, resilience, and cultural pride. Her family traditions include celebrating Juneteenth,
    preparing soul‑food dishes, and sharing stories of Black history that shape her worldview. As a Black educator in an affluent, predominantly white suburb, she navigates the challenges of representation
    while acting as a role model for both her students and colleagues. She actively participates in local NAACP chapters and serves on the district’s diversity committee, advocating for culturally responsive
    teaching practices and greater access to STEM opportunities for underrepresented youth. Her cultural identity informs her teaching philosophy, prompting her to integrate African American scientific
    contributions into the curriculum and to foster an inclusive classroom environment.
attributes:
  skills: '["Curriculum Design", "STEM Instruction", "Data-Driven Assessment", "Classroom Management", "Educational Technology Integration", "Project-Based Learning", "Mentoring", "Community Outreach",
    "Grant Writing", "Differentiated Instruction"]'
  hobbies: '["Gardening", "Community Choir", "Hiking", "DIY Electronics Projects", "Cooking Southern Cuisine", "Reading Historical Fiction", "Volunteer Tutoring", "Book Club", "Jazz Concerts"]'
  career_goals: Wanda aims to expand her impact beyond her classroom by becoming a district STEM coordinator, where she can design and implement school-wide science and engineering programs. She plans to
    launch an annual robotics competition that showcases student creativity while securing grant funding to sustain the initiative. Pursuing a doctorate in Educational Leadership is a long-term ambition,
    enabling her to influence policy and advocate for equitable access to STEM education for underrepresented students. She also seeks recognition as a teaching excellence award recipient and hopes to author
    a curriculum guide that integrates culturally responsive pedagogy with rigorous scientific inquiry.
