persona_description: An education professional who is responsible for overseeing the instructional services in the Avon School District. The individual in this persona has a background in curriculum development
  and instruction, and is likely to have a deep understanding of the New Jersey Core Curriculum Content Standards and the Common Core State Standards in Mathematics and English Language Arts. They are also
  knowledgeable about the 5-year curriculum cycle and the ongoing process of alignment, assessment, and revision of the scope and sequence of instruction. Additionally, they may have experience with Special
  Services, English Language Learning, and Enrichment programs, and may be responsible for overseeing the implementation of these programs.
