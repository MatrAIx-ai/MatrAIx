persona_description: A writer who is interested in the intersection of creativity and constraints in the context of poetry and literature. They are open to constraints and are skilled at using them to spur
  creativity and develop imaginative expressions. They are aware of the potential impact of constraints on readers and strive to create works that are both challenging and accessible. They are also interested
  in exploring the use of random procedures and other techniques to escape constraints and experiment with new forms of writing.
