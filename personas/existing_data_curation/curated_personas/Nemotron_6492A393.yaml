personas:
  professional: Justus Hoskins is a first‑line construction supervisor who leverages hands‑on building expertise and business savvy to keep crews safe, solve on‑site problems with flexible, sustainable
    solutions, and mentor workers despite occasional struggles with rigid deadlines.
  sports: Justus Hoskins is an early‑morning hiker who follows the Appalachian Trail segments around Cherokee County, occasionally joins the local Trekking Club for group outings, supports the Atlanta Falcons
    and Atlanta Braves, and practices yoga three times weekly at a downtown studio to stay flexible.
  arts: Justus Hoskins immerses themselves in model‑building historic houses, captures sunrise landscapes with a Canon EOS, strums soft acoustic renditions of Nick Drake and Sufjan Stevens on a vintage
    Taylor guitar, and draws inspiration from Ansel Adams and Frank Lloyd Wright for both photography and architectural replicas.
  travel: Justus Hoskins prefers low‑key, nature‑focused trips, having hiked the Blue Ridge Parkway, camped in Shenandoah National Park, and dreamed of a solo pilgrimage to Iceland’s waterfalls, always
    planning itineraries around quiet trails and sustainable lodging while staying within a modest travel budget.
  culinary: Justus Hoskins favors simple, protein‑rich meals like grilled salmon with lemon‑dill sauce, quinoa bowls with roasted root vegetables and fresh herbs, and prepares homemade herbal tea, while
    occasionally indulging in a pepperoni pizza after a long construction week.
  core: Justus Hoskins balances a high‑stress construction career with solitary hikes, model‑building, and a compassionate drive to reshape workplace culture, even as anxiety and a penchant for last‑minute
    decisions keep life delightfully unpredictable.
background:
  cultural: Justus grew up in the suburban South, absorbing a blend of traditional Southern hospitality, strong work ethic, and family‑centered values common in Alpharetta, Georgia. His white, Anglo‑American
    heritage is intertwined with a community focus on church gatherings, local sports, and neighborhood involvement. While his professional life exposes him to a diverse workforce, his personal cultural
    identity remains rooted in Southern customs—politeness, respect for elders, and a commitment to giving back through volunteer projects like Habitat for Humanity. This background informs his compassionate
    approach to teamwork and his desire to create harmonious, supportive environments both at work and in his community.
attributes:
  skills: '[''Construction site supervision'', ''Safety compliance (OSHA)'', ''Budgeting and cost control'', ''Procurement and vendor management'', ''Conflict resolution'', ''Blueprint reading'', ''Sustainable
    construction practices'', ''Problem solving and improvisation'', ''Team leadership'', ''Basic carpentry and framing'']'
  hobbies: '[''Hiking and birdwatching'', ''Scale model building'', ''Landscape photography'', ''Reading about sustainable construction and technology'', ''Journaling'', ''Yoga and mindfulness meditation'',
    ''Playing acoustic guitar'']'
  career_goals: Justus aims to transition from a first‑line supervisor to a project manager who can champion a culture of safety, compassion, and flexibility on larger commercial builds. He dreams of integrating
    cutting‑edge green‑building technologies into everyday projects while keeping budgets realistic. Long‑term, he hopes to launch his own consulting firm that advises construction firms on humane workplace
    practices and sustainable methods, allowing him to mentor younger tradespeople and give back to his community through pro‑bono housing initiatives.
