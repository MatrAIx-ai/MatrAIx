persona_description: A geologist who specializes in groundwater hydrology and aquifer testing, particularly in the study of surface mine spoil aquifers. Their expertise includes understanding the hydrologic
  characteristics of surface coal mine spoil, including the presence of discrete conduits, pseudokarst groundwater flow, and the impact of different hydrologic conditions on groundwater flow. They have
  conducted tracer testing and physical observations to substantiate their findings and have published research on the subject.
