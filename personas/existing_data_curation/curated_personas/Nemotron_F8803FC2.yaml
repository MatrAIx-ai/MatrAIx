  hobbies: '[''LEGO building'', ''Jigsaw puzzles'', ''Reading picture books'', ''Family nature walks'', ''Helping with chores'', ''Structured classroom games'']'
  career_goals: Delmar is fascinated by roles that provide clear structure, tangible outcomes, and a sense of service. He often talks about wanting to become a firefighter because of the predictable schedule
    and the opportunity to help people directly. He also enjoys building with blocks and imagines one day working as a construction worker or engineer, designing safe spaces that others can use. His ambitions
    reflect a desire for a hands-on, responsibility-driven career that aligns with his practical mindset.
