  career_goals: Stephanie aims to ascend to a senior executive role—such as Vice President of Corporate Strategy or Chief Innovation Officer—where she can shape the company's long-term vision and embed
    a culture of creative thinking. She envisions launching a boutique consultancy that helps firms integrate artistic insight into their business models, and she is committed to mentoring the next generation
    of Black women leaders in the corporate world. Balancing competitive drive with flexible work structures, she seeks to influence both profitability and social impact.
