personas:
  professional: Stephanie Maceus leverages a graduate business background and a keen creative sensibility to lead cross‑functional teams in strategic planning, financial analysis, and business development,
    using design‑thinking to craft innovative, profit‑driving initiatives while championing diversity and inclusion.
  sports: Stephanie Maceus enjoys low‑impact fitness, attending weekly yoga sessions for resilience, playing on a local co‑ed recreational softball league in the spring, and cheering on the Chicago Cubs
    during baseball season while supporting the Chicago Bulls for basketball.
  arts: Stephanie Maceus curates an eclectic collection of contemporary gallery pieces and limited‑edition prints, immerses in experimental theater, and builds playlists that weave together the sounds of
    Miles Coltrane, Kamasi Washington, and Erykah Badu, drawing inspiration from modern jazz and neo‑soul icons.
  travel: Stephanie Maceus prefers off‑the‑beaten‑path cultural trips, planning spontaneous weekend getaways to historic towns like Marfa, Texas for its art installations, and dreaming of a future visit
    to the vibrant street‑art districts of Berlin and the jazz heritage sites of New Orleans, balancing travel with a modest travel budget.
  culinary: Stephanie Maceus experiments with fusion cooking, frequently blending Southern soul‑food staples such as collard greens and smoked turkey with Asian flavors like miso and gochujang, mastering
    dishes like miso‑glazed brisket tacos while also enjoying a perfectly brewed Ethiopian coffee.
  core: Stephanie Maceus is a strategic business leader who blends creative curiosity with a flexible, sometimes disorganized approach, channeling a love for art, jazz, and yoga into a life that balances
    ambition, eclectic tastes, and occasional impulsive spend‑splurges.
background:
  cultural: Stephanie’s identity as a Black woman informs her worldview and professional ethos. Raised in a multicultural environment before relocating to Las Vegas, she draws on African American artistic
    traditions—such as jazz, visual arts, and community storytelling—while navigating the unique cultural tapestry of the Nevada desert city. Her experiences in predominantly white corporate settings have
    sharpened her awareness of racial dynamics, motivating her to advocate for diversity, mentor underrepresented talent, and support Black cultural initiatives in the local community.
