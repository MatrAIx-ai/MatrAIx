  hobbies: '["Computer building", "Arduino prototyping", "Chess", "Online competitive gaming (League of Legends)", "Reading tech journals", "Cycling", "Hiking local trails", "Cooking Bengali cuisine", "Listening
    to classical Indian music", "Small community volunteer events"]'
  career_goals: Ibrahim aims to earn an industry‑recognized certification such as CompTIA A+ and secure an apprenticeship in computer networking or automotive technology. In the medium term, he plans to
    launch a modest tech‑repair and consulting service that offers affordable support to local families and small businesses. He also aspires to build a portfolio of small software utilities that address
    everyday problems in his community. Ultimately, Ibrahim hopes to achieve financial stability that enables him to support his family, fund his younger siblings' education, and possibly expand his business
    into a full‑service IT solutions firm.
