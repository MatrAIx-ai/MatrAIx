  hobbies: '[''Bridge (card game)'', ''Fishing'', ''Sailing'', ''Historical Docent Volunteering'', ''Live-Music and Theater'', ''Reading Historical Non-fiction'', ''Crossword Puzzles'', ''Barbecue Cooking'']'
  career_goals: He aims to advance from floor-level guard to a supervisory or managerial role within the casino's security department, eventually becoming a Security Operations Manager. To support this,
    he plans to obtain a Certified Protection Professional (CPP) credential and possibly pursue a master's degree in criminal justice or security management. He also hopes to mentor younger guards, develop
    a comprehensive training program that emphasizes both technical vigilance and humane interaction, and eventually consult for smaller venues on improving their security culture.
