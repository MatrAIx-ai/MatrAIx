personas:
  professional: John Bridge is a veteran casino security specialist who leverages two decades of real‑time video monitoring, pattern recognition, and body‑language reading to de‑escalate incidents, while
    they bring a sociable, talkative nature to training and mentorship, positioning them for a future as a Security Operations Manager after earning a CPP credential and a master’s in criminal justice.
  sports: John Bridge spends weekends sailing with the St. Augustine Yacht Club and fishing with the Matanzas River Anglers Association, while they stay fit through morning jogs along the historic waterfront,
    and they cheer on the Tampa Bay Buccaneers, Tampa Bay Rays, and Miami Heat.
  arts: John Bridge is a regular at St. Augustine’s historic theater, where they relish productions like 'The Glass Menagerie' and concerts featuring blues legends such as B.B. King and modern troubadour
    John Hammond, while they love historical nonfiction by authors like David McCullough, which fuels an appreciation for storytelling across music, theater, and film.
  travel: John Bridge prefers thoughtfully planned road trips that blend historical sightseeing with fishing opportunities, having explored colonial towns such as Williamsburg and European sites like Edinburgh,
    while they dream of a sailing vacation in the Bahamas and a cultural immersion week in Kyoto.
  culinary: John Bridge enjoys mastering Southern‑style barbecue, regularly smoking pork ribs with a sweet molasses‑cayenne glaze and serving low‑and‑slow brisket at family gatherings, while they also delight
    in fresh Matanzas River catfish grilled with lemon‑herb butter and occasionally treat themselves to an upscale sushi roll at a downtown restaurant.
  core: John Bridge blends a vigilant security mind with a gregarious, community‑centered spirit, channeling their love for history, cards, and barbecue into mentorship, while they occasionally let their
    fondness for fishing gear and late‑night live music tip the balance of their disciplined routine.
background:
  cultural: John grew up in a middle-class family in the Midwest before moving to Florida in his early thirties for work. He identifies with mainstream American values of self-reliance, community responsibility,
    and hospitality. Living in St. Augustine, he has embraced the city's rich Spanish-colonial heritage, often attending local festivals like the Nights of Lights and exploring the historic district. His
    background is shaped by a blend of Midwestern pragmatism and Southern friendliness, and his humanities education has fostered an appreciation for diverse cultural narratives and the importance of preserving
    local history.
