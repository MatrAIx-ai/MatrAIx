personas:
  professional: Jessie Wade leverages three decades of aerospace engineering expertise and a graduate business degree to steer complex propulsion projects with meticulous systems‑engineered precision, while
    their structured, collaborative style ensures cross‑functional teams meet stringent certification timelines and cost targets.
  sports: Jessie Wade stays fit by paddling with the Golden Isles Kayak Club during warm months, joining a community garden fitness walk, and cheering on the Atlanta Falcons and Braves, while a disciplined
    routine of sunrise stretching ensures they meet their energy needs for both engineering meetings and church volunteer work.
  arts: Jessie Wade’s artistic palate includes evenings at the historic Ritz Theatre watching productions starring Viola Davis, listening to live bluegrass sessions by the Atlanta‑based band The Infamous
    Stringdusters, and collecting first‑edition history volumes by Doris Kearns Goodwin, which together enrich their community‑centered storytelling.
  travel: Jessie Wade prefers meticulously planned road trips along the Atlantic seaboard, having explored the historic districts of Savannah and Charleston, the maritime museums of Newport, Rhode Island,
    and dreaming of a pilgrimage to Toulouse’s aerospace museums and the Swiss Alps for a winter retreat.
  culinary: Jessie Wade crafts low‑fat shrimp and grits and roasted heirloom tomato biscuits using garden‑grown rosemary, thyme, and fresh peaches, balancing traditional Southern comfort with a health‑conscious
    twist that reflects their disciplined palate.
  core: Jessie Wade blends aerospace precision with Southern hospitality, obsessively aligning project timelines while occasionally forgetting to water the garden during conference weeks, embodying a structured,
    compassionate leader who still squeezes time for a sunrise kayak.
background:
  cultural: Jessie was raised in a middle‑class white family in coastal Georgia, immersed in the traditions of Southern hospitality, community service, and a deep connection to the Atlantic shoreline. Her
    upbringing emphasized responsibility, education, and respect for local customs, such as participation in the annual Shrimp Festival and involvement with the Lions Club’s service projects. A lifelong
    member of her local church, she values fellowship, generosity, and collaborative problem‑solving. These cultural roots, combined with a career that spans global aerospace collaborations, give her a
    balanced perspective that honors both her Southern heritage and the broader, innovative spirit of the aviation industry.
