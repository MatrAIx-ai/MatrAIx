  hobbies: '[''kayaking'', ''birdwatching'', ''gardening'', ''cooking Southern recipes'', ''quilting'', ''book club'', ''church volunteer work'', ''local history preservation'', ''aerospace conference attendance'',
    ''mentoring young engineers'']'
  career_goals: Jessie aims to transition into senior executive leadership within the aerospace sector, focusing on driving sustainable aircraft technologies such as low‑emission propulsion and bio‑fuel
    compatibility. Over the next five years she plans to lead a cross‑functional program that integrates greener power sources into existing engine designs while maintaining cost efficiency. Parallel to
    her technical ambitions, she is committed to establishing a regional mentorship network for women and underrepresented engineers in the Southeast, fostering a pipeline of talent and promoting inclusive
    workplace cultures. Ultimately, she envisions a hybrid role as a consultant and community advisor, offering strategic expertise to local aerospace firms and volunteering her knowledge for disaster‑preparedness
    initiatives in coastal Georgia.
