persona_description: A scientist who specializes in the study of coastal lagoon ecology, particularly in the Mediterranean region. She has experience in developing and evaluating sea level rise scenarios
  for the northern Adriatic Sea and has published numerous scientific papers on the ecological implications of climate change on the Venice Lagoon. She is a neutral broker who can mobilize different fields
  of expertise and contribute to the establishment of a more permanent coordination, planning and monitoring platform for the management of Venice and its Lagoon.
