personas:
  professional: Delia Armas, a twenty‑year‑old aspiring medical administrative assistant, draws on bilingual fluency, painstaking minute‑taking from her student council secretary role, and advanced spreadsheet
    skills in Microsoft Office and Google Workspace to streamline clinic scheduling while assertively proposing workflow improvements.
  sports: Delia Armas, a regular on her community co‑ed soccer league, cheers for the New York Red Bulls and follows the New Jersey Devils in winter, and fits in sunrise park walks as her go‑to cardio routine
    between matches.
  arts: Delia Armas, who finds calm in the soulful folk tunes of Anaïs Mitchell, draws inspiration from the poignant poetry of Maya Angelou, and occasionally sketches scenes from her walks in a weathered
    journal, blends art into daily life as a quiet creative outlet.
  travel: Delia Armas, a meticulous planner who maps trips in spreadsheets, has trekked the cobblestone streets of Granada, Nicaragua, dreams of exploring Costa Rica’s cloud forests, and saves carefully
    for a future solo adventure to Barcelona while balancing school and work.
  culinary: Delia Armas, an enthusiastic home cook, perfects classic Honduran dishes like baleadas filled with refried beans, cheese, and avocado, seasons them with achiote and fresh cilantro, and loves
    sharing these meals at community gatherings while occasionally treating herself to sushi rolls for variety.
  core: Delia Armas, a disciplined yet occasionally procrastinating planner, blends structured routines with late‑night self‑help reading marathons and a habit of over‑preparing meal portions that often
    go uneaten.
background:
  cultural: Delia is a first‑generation American of Honduran descent. Her parents emigrated from Tegucigalpa in the early 2000s, and she grew up speaking Spanish at home while attending English‑language
    schools. Family gatherings are central to her life, featuring traditional foods such as baleadas, pupusas, and segredos, and celebrations of Honduran holidays like Independence Day (15 September) and
    Semana Santa. She maintains ties to the local Honduran community through the church, cultural festivals, and a weekend Spanish‑language youth group, which reinforce values of familismo, respect for
    elders, and a strong sense of community responsibility.
