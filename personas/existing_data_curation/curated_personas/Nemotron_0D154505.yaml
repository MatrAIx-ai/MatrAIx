  hobbies: '[''Journaling'', ''Puzzle solving (crosswords, Sudoku)'', ''Reading (fiction & self‑development)'', ''Cooking Honduran dishes'', ''Yoga'', ''Walking/hiking in local parks'', ''Community soccer
    league'', ''Volunteering at food pantry'', ''Listening to Honduran music'', ''Digital photo editing'']'
  career_goals: Delia aims to secure a stable, structured position in administrative support, preferably in a healthcare or community‑service setting. Over the next two years she plans to enroll in an associate‑degree
    program in Business Administration at Bergen Community College, obtain a Certified Medical Administrative Assistant (CMAA) credential, and work as an office assistant in a local clinic. Her long‑term
    ambition is to advance to a health services manager role where she can combine her organizational expertise with her desire to improve access to care for Hispanic families.
