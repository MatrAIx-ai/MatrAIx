persona_description: A veterinarian who specializes in the study of Clostridium perfringens, particularly the pathogenesis and treatment of necrohemorrhagic enteritis caused by type C strains of the organism.
  His research interests include, but are not limited to, the etiology, pathogenesis, and control of the disease in piglets, and the development of vaccines and antibiotics for prophylactic and therapeutic
  use. He is also interested in the genetic markers and genotyping of the organism, and the use of bacterin-toxoid vaccines in the control of the disease.
