personas:
  professional: Sean Mosely is a seasoned construction manager with an associate’s degree, excelling at blueprint interpretation, heavy‑machinery operation, and rigorous OSHA compliance, while channeling
    his curiosity for design into meticulously organized job sites that double as canvases for aesthetic renovation.
  sports: Sean Mosely follows the Detroit Pistons and the Detroit Lions with a competitive edge, plays pickup basketball at the local community center each weekend, and keeps fit by lifting weights at a
    modest home gym, treating each drill as a deadline to be met.
  arts: Sean Mosely collects jazz and blues vinyls from legends like Miles Davis, B.B. King, and Nina Simone, sketches abandoned factories for personal galleries, and frequents the Museum of Contemporary
    Art Detroit, where they draw inspiration from street muralists such as Mysterion, weaving that aesthetic into their woodworking projects.
  travel: Sean Mosely prefers meticulously planned road trips that blend historic industrial tours with photography stops, having recently driven the Rust Belt Route from Detroit to Cleveland, and dreaming
    of a guided tour of the Bauhaus‑inspired sites in Germany’s Dessau and Berlin, while budgeting constraints keep overseas travel occasional.
  culinary: Sean Mosely enjoys soul‑food staples like smothered collard greens, smoked turkey, and cornbread, but also experiments with modern twists—adding smoked paprika to gumbo or infusing maple syrup
    in bourbon‑glazed ribs—cooking at a proficient intermediate level and often hosting small dinner gatherings where they showcase their own handcrafted wooden serving trays.
  core: Sean Mosely is a disciplined, art‑curious foreman whose competitive drive fuels a habit of late‑night woodworking marathons and an occasional tendency to over‑schedule every facet of life.
background:
  cultural: Sean grew up in the Detroit‑area African‑American community, shaped by the migration stories of his parents who moved from the rural South in the 1960s. He was raised in a tight‑knit family
    where church, gospel music, and community solidarity were daily touchstones. The cultural richness of the area—street art, soul food, and the legacy of civil‑rights activism—has informed his identity
    and values. He carries pride in his heritage, celebrating milestones such as Juneteenth and supporting local Black‑owned businesses. His cultural perspective also fuels his desire to contribute to neighborhood
    revitalization projects that honor the history of the communities he serves.
attributes:
  skills: '[''Blueprint reading'', ''Concrete formwork and framing'', ''Heavy equipment operation (backhoe, excavator)'', ''Site safety management (OSHA compliance)'', ''Project scheduling and documentation'',
    ''Material inventory and procurement'', ''Cost estimation and budgeting'', ''Quality control inspections'', ''Basic CAD drafting'', ''Construction management software usage'', ''Team coordination and
    subcontractor oversight'', ''Problem solving under pressure'']'
  hobbies: '[''Architectural sketching'', ''Industrial site photography'', ''Visiting art galleries and community studios'', ''Collecting and listening to jazz and blues music'', ''Woodworking and furniture
    making'', ''DIY home-improvement projects'', ''Reading books on art history and modern design'', ''Mentoring youth in carpentry workshops'', ''Playing pickup basketball'', ''Cooking with his spouse'']'
  career_goals: Sean aims to transition from laborer to foreman within the next two years, leveraging his organizational strengths to lead a crew and oversee site operations. His long‑term ambition is to
    become a certified project manager, acquire an OSHA‑authorized trainer credential, and eventually launch his own small‑scale contracting firm that specializes in community‑focused renovations that blend
    functional construction with artistic design elements. He is also interested in pursuing further certification in sustainable building practices to position his business at the forefront of green construction
    in the Detroit metropolitan area.
