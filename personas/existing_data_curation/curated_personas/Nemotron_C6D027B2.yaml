  hobbies: '[''Adult baseball league'', ''Fishing on Lake Baraboo'', ''Deer and turkey hunting'', ''Volunteer firefighting'', ''Woodworking and DIY projects'', ''Classic car restoration'', ''Barbecue cooking'',
    ''Acoustic guitar playing'', ''Community festival participation'', ''Church social events'']'
  career_goals: Christopher aims to advance into a supervisory role, such as Lead Operator or Site Operations Manager, where he can leverage his organizational strengths and safety expertise to improve
    overall fleet efficiency. He plans to obtain advanced certifications, including Certified Crane Operator and OSHA Trainer, and to complete an associate’s degree in Logistics Management. Long‑term, he
    envisions starting his own equipment‑leasing business that serves the agricultural and manufacturing sectors of central Wisconsin, providing stable employment for his family and the community.
