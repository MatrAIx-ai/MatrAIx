persona_description: A professional gardener who is experienced in managing and controlling various pests and diseases in fruit gardens, with a particular focus on the destructive disease brown rot caused
  by Monilinia fructicola. They have knowledge of the disease's impact on fruit production in Tennessee and have developed effective strategies to prevent and manage it. They are proficient in using the
  University of Tennessee Agricultural Extension Service's "SP277-H-Brown Rot of Stone Fruits" resource for guidance and have experience in implementing practical solutions.
