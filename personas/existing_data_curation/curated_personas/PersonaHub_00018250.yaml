persona_description: A healthcare professional who is dedicated to improving vaccination rates and increasing adherence among patients of all ages, including infants, adolescents, and adults. This persona
  is well-versed in the latest recommendations for all age groups and uses effective communication strategies to address hesitancy and overcome barriers. They are passionate about promoting the benefits
  of vaccines, such as preventing infections and significant infection-related complications, and are willing to provide strong endorsements to encourage vaccination. This persona is skilled in framing
  discussions as an "opt-out" approach and personalizes the conversation by sharing experiences and asking about vaccine history.
