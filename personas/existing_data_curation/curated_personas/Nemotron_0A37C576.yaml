personas:
  professional: Edison Marinelli, a 20‑year‑old computer support specialist, leverages their methodical, organized approach and cooperative‑yet‑assertive style to diagnose Windows and Linux issues, automate
    routine tasks with Python, and document repeatable procedures that keep the IT desk running smoothly while they eagerly pursue certifications toward a future systems‑engineer role.
  sports: Edison Marinelli, an outdoor‑enthusiast at 20, hikes the Gainesville trail system with the local Gainesville Outdoor Club, follows the Florida Gators football team, plays pick‑up basketball at
    the campus recreation center, and logs weekly runs on Strava to stay fit.
  arts: Edison Marinelli, a 20‑year‑old hobbyist guitarist, spends evenings strumming acoustic renditions of Bon Iver and Tame Impala, captures nature photography inspired by Ansel Adams, attends occasional
    indie‑film screenings at the Hippodrome, and curates a modest vinyl collection featuring folk and alternative rock.
  travel: Edison Marinelli, a 20‑year‑old explorer, enjoys weekend road trips to historic Savannah, has a bucket‑list of backpacking through the Pacific Northwest’s national parks, plans trips around conference
    schedules, and seeks budget‑friendly hostels that allow late‑night coding sessions.
  culinary: Edison Marinelli, at 20 loves experimenting in the kitchen, frequently prepares dishes like Pad Thai with fresh cilantro and basil, perfects a spicy chicken Parmesan, but habitually leaves a
    sink full of dishes overnight, claiming they’ll 'clean later.'
  core: Edison Marinelli, a 20‑year‑old tech‑minded, organized problem‑solver, balances coding, guitar, hiking, and budgeting while occasionally neglecting dishwashing and hydration, always charting a path
    toward a future CTO role.
background:
  cultural: Edison grew up in a middle‑class, Italian‑American family in the Gainesville area. His parents, both professionals, emphasized education, hard work, and community involvement. The blend of Southern
    hospitality, the diverse campus environment at the University of Florida, and his family’s Italian traditions—such as holiday gatherings with classic Italian dishes—shaped his values. He identifies
    with mainstream American culture while maintaining a connection to his heritage through occasional trips to Italy, an appreciation for Italian language and music, and a love for family‑centered celebrations.
attributes:
  skills: '[''Technical troubleshooting'', ''Hardware diagnostics'', ''Software installation and configuration'', ''Windows OS administration'', ''Linux OS administration'', ''Network configuration (TCP/IP,
    Wi-Fi)'', ''Remote support tools (TeamViewer, Remote Desktop)'', ''Ticketing systems (Zendesk, ServiceNow)'', ''Customer service and communication'', ''Technical documentation'', ''Python scripting
    for automation'', ''Data analysis with Excel'', ''Basic cybersecurity awareness'', ''CompTIA A+ certification preparation'', ''Project coordination and time management'', ''Problem-solving mindset'',
    ''Assertive conflict resolution'']'
  hobbies: '[''Coding personal Python projects'', ''Strategy and puzzle video games'', ''Hiking and nature photography'', ''Playing acoustic guitar'', ''Experimenting with cooking'', ''Reading science-fiction
    and tech blogs'', ''Attending tech meetups'', ''Volunteering for digital-literacy workshops'']'
  career_goals: Edison aims to move from entry‑level support to a systems engineering role within the next three years. He plans to earn CompTIA Network+ and Security+ certifications, followed by a Cisco
    CCNA, and eventually pursue a master’s degree in information systems or computer science. His long‑term ambition is to design resilient IT infrastructures for a university or large enterprise and to
    advance into IT management, potentially reaching a chief technology officer position where he can blend his curiosity for emerging technologies with practical implementation strategies.
