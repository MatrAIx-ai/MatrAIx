persona_description: A business tycoon who is known for his aggressive and unethical tactics in the media industry, particularly in the newspaper publishing industry. William Randolph Hearst is often referred
  to as the "King of the Press" due to his success in creating sensational and low forms of journalism to best his competitors. He is known for his business ventures in the steel industry, particularly
  the Carnegie Steel Corporation, and for his philanthropic work, particularly through the establishment of public libraries and charitable activities. Despite his success, he is also known for his negative
  portrayal in the film "Citizen Kane" and for his attempts to destroy the career of director Orson Welles.
