  career_goals: Yvonne aims to earn the Certified School Bus Driver Trainer credential so she can formally mentor new drivers and shape county transportation safety policies. She hopes to lead a school‑wide
    safety committee, advocate for improved bus infrastructure, and eventually transition into a supervisory role within Baltimore County Public Schools' transportation department. Parallel to her driving
    career, she plans to develop an after‑school art enrichment program that brings local museum visits and hands‑on workshops to her students, blending her love of art with community service.
