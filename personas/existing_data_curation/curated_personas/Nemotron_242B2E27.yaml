personas:
  professional: Yvonne Arias, a veteran school bus driver in Baltimore County, blends meticulous GIS route planning with a passion for cultural enrichment, and they lead safety briefings, mentor new drivers,
    and orchestrate art‑filled field trips while eyeing the Certified School Bus Driver Trainer credential to shape district transportation policy.
  sports: Yvonne Arias is an avid supporter of the Baltimore Ravens and the Orioles, joins a weekly walking club at Druid Hill Park, participates in a senior softball league at the community center, and
    they also volunteer as a timekeeper for the local youth basketball league, blending spirited fandom with low‑impact exercise.
  arts: Yvonne Arias channels her love of art by painting watercolors of Baltimore’s murals, regularly attending live sets by jazz luminaries like Wynton Marsalis and Gregory Porter at the Royal Garden,
    reading historical novels by Toni Morrison, and they draw inspiration from Baltimore muralist Miguel Varela and photographer Cheryl McGehee, weaving cultural heritage into every brushstroke.
  travel: Yvonne Arias plans trips with the same meticulous detail as her bus routes, favoring organized weekend getaways to historic sites like Charleston’s Old Quarter, cultural pilgrimages to New Orleans
    for its jazz festivals, and annual family visits to Shenandoah National Park, while they dream of a relaxed cruise to Bermuda once fully retired.
  culinary: Yvonne Arias cooks soul‑food dishes with a confident hand, often serving collard greens simmered with smoked turkey, fried chicken seasoned with cayenne, sweet potato pie spiced with nutmeg,
    and homemade cornbread, while they sprinkle fresh basil and thyme from their garden into a signature gumbo, showcasing a blend of tradition and garden‑fresh flavors.
  core: Yvonne Arias is a talkative, art‑obsessed bus driver whose organized mind balances meticulous safety work with spontaneous watercolor sessions, occasional overspending on supplies, and a stubborn
    habit of forgetting to water their garden on rainy days.
background:
  cultural: Yvonne’s cultural identity is rooted in the African‑American community of Baltimore County. Growing up during the civil‑rights era, she was shaped by church fellowship, gospel music, and family
    storytelling that celebrated resilience and communal uplift. Her family’s history traces back to the Great Migration, and she maintains traditions such as soul‑food cooking, participation in local Black
    cultural festivals, and involvement with neighborhood organizations. Yvonne draws pride from Baltimore’s Black arts legacy—from the historic jazz clubs of Harbor East to the vibrant street murals of
    Hampden—integrating that artistic heritage into her daily life and community initiatives.
