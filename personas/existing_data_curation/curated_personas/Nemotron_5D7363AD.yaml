personas:
  professional: A UI/UX designer named Gary Brigman, who blends his strong hands‑on Figma and HTML/CSS skills with a habit of sticking to familiar design patterns and a relaxed, sometimes chaotic, planning
    style, turning group feedback sessions into lively, empathy‑driven workshops that keep user‑focused products on track despite they sometimes feel anxious when deadlines loom.
  sports: Gary Brigman fuels his competitive streak by playing pickup basketball at the local community center and cheering for the Buffalo Bills and Buffalo Sabres, while keeping a seasonal membership
    at a nearby gym where they follow a flexible HIIT routine that fits their unpredictable schedule.
  arts: Gary Brigman immerses himself in the arts by snapping street photography in Erie County’s parks, curating board‑game nights featuring strategy titles like Terraforming Mars, and listening to indie
    folk acts such as The Lumineers and Sufjan Stevens, which echo they love for storytelling and community vibes.
  travel: Gary Brigman prefers short road trips that blend nostalgia and discovery, returning yearly to the Niagara Falls State Park for its familiar roar while also planning occasional weekend escapes
    to Montreal’s vibrant art scene, balancing they love for routine with bursts of adventurous curiosity.
  culinary: Gary Brigman enjoys cooking comfort meals like chicken and dumplings and loaded mac and cheese, often seasoning with garlic and smoked paprika while experimenting with homemade pizza dough,
    and they're quick to order Buffalo‑style wings with blue‑cheese dip when their schedule gets too chaotic for cooking.
  core: Gary Brigman is a sociable, routine‑loving designer who balances community‑center basketball, spontaneous tech tinkering, and intense emotional waves with a penchant for comfort food and local sports
    loyalty, and they often find themselves juggling flexibility with a hidden streak of procrastination.
background:
  cultural: Gary grew up in a middle‑class, predominantly white suburb of Buffalo, New York. His family’s values reflect the pragmatic, hard‑working ethos of the Rust Belt, emphasizing reliability, community
    involvement, and modest traditions. He celebrates typical American holidays such as Thanksgiving and the Fourth of July, enjoys local customs like attending the Erie Canal Heritage Festival, and maintains
    close ties with extended family and neighborhood friends. While rooted in these conventional cultural norms, his career in digital design exposes him to broader tech culture and contemporary creative
    trends.
attributes:
  skills: '[''UI/UX design'', ''Wireframing'', ''High‑fidelity prototyping (Figma, Adobe XD)'', ''Responsive HTML/CSS'', ''Basic JavaScript'', ''Accessibility compliance (WCAG)'', ''User research & usability
    testing'', ''Design system development'', ''Collaborative communication & stakeholder presentation'', ''Agile/Scrum participation'']'
  hobbies: '[''Pickup basketball'', ''Board‑game nights'', ''Digital‑literacy tutoring for seniors'', ''Cooking comfort food'', ''Photography of local parks'', ''Raspberry Pi tinkering'', ''Journaling'',
    ''Mindfulness meditation'', ''Yoga'', ''Attending Buffalo Bills games and local festivals'']'
  career_goals: Gary aims to advance to a senior interaction designer role within the next three to five years, preferably at a midsize tech firm or digital agency in Western New York where he can work
    on stable, user‑focused products. He aspires to lead a small design team, mentor junior designers, and shape design standards that prioritize practicality and ease of use. To support this trajectory,
    he plans to earn a UX certification from the Nielsen Norman Group, deepen his front‑end development skills, and eventually transition into a product‑design manager position that balances creative direction
    with predictable workflow and team harmony.
