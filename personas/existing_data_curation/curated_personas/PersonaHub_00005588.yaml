persona_description: A plant pathologist who specializes in the study of fungal diseases in subtropical plants, particularly in the genus Sophora. This person is likely to have experience in observing and
  identifying fungal diseases in ornamental plants, as well as in conducting research and experiments to understand the biology and ecology of these diseases. They are likely to have a keen interest in
  the identification and classification of new fungal pathogens, and in the development of effective control strategies for these diseases. They may also have a background in plant breeding and genetics,
  and in the use of molecular techniques to study fungal pathogens.
