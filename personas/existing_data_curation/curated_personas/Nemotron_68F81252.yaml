personas:
  professional: Jorge Rocha is a veteran diesel‑engine specialist who merges three decades of hands‑on repair mastery with an artist’s eye for custom vehicle aesthetics, diagnosing failures via both classic
    compression tests and modern electronic scan tools while often juggling workshop projects in a relaxed, slightly disorganized fashion that reflects their love of flexibility.
  sports: Jorge Rocha enjoys quiet mornings fishing at Calaveras Lake, cheers on the San Antonio Spurs and Texas Rangers, and occasionally joins a neighborhood adult softball league where they prefer low‑impact
    pitching over sprinting, mirroring their preference for solitary, low‑key physical activity.
  arts: Jorge Rocha channels their curiosity into vibrant folk‑art paintings on reclaimed wood and bus panels, drawing inspiration from Frida Kahlo’s bold palettes, the storytelling of José Alfredo Jiménez,
    and the lively rhythms of mariachi ensembles like Mariachi México de Pepe Villa, while regularly volunteering at Fiesta San Antonio’s artisan market to showcase their work.
  travel: Jorge Rocha favors spontaneous, low‑budget road trips that blend creative inspiration with solitude, frequently exploring the Texas Hill Country’s spring wildflower trails and dreaming of a future
    pilgrimage to Guanajuato’s historic tile‑work alleys, all planned around off‑peak pricing to accommodate their modest savings.
  culinary: Jorge Rocha delights in cooking homemade mole poblano with chilhuache peppers, simmering tamales wrapped in corn husks, and pairing them with smoky Texas‑style brisket, while their modest kitchen
    shines especially when grinding fresh salsa verde from tomatillos, cilantro, and serrano chilies.
  core: Jorge Rocha is a relaxed, art‑infused diesel guru whose impromptu workshop sketches, occasional missed appointments, and unwavering dedication to community reveal a humor‑laden devotion to creativity
    and a stubborn belief that a well‑painted engine runs smoother.
background:
  cultural: Jorge is a first‑generation Mexican‑American whose parents immigrated from Jalisco in the 1960s. Raised in a tight‑knit Latino neighbourhood of San Antonio, he grew up bilingual, celebrating
    Día de los Muertos, Semana Santa, and local fiestas with family. The rhythms of mariachi and norteña music, the aromas of homemade mole and tamales, and the communal values of respect (respeto) and
    solidarity (solidaridad) shaped his worldview. Though he never married, he remains close to his extended family and often assists at community religious events, embodying the blend of Mexican heritage
    and Texan resilience that defines his identity.
attributes:
  skills: '[''diesel engine diagnostics'', ''heavy‑vehicle maintenance and repair'', ''electrical system troubleshooting'', ''hydraulic system repair'', ''welding and metal fabrication'', ''custom paint
    and bodywork'', ''biodiesel retrofitting'', ''parts sourcing and inventory management'', ''bilingual communication (Spanish/English)'', ''apprentice mentorship'']'
  hobbies: '[''Mexican folk‑art painting'', ''custom vehicle bodywork'', ''attending Fiesta San Antonio'', ''vintage radio restoration'', ''metal sculpture crafting'', ''fishing'', ''community repair‑cafe
    volunteering'', ''reading automotive trade publications'']'
  career_goals: Jorge aims to transition from employee to owner‑operator of a small boutique garage in East San Antonio that specializes in custom diesel retrofits and artistic vehicle paint jobs. He plans
    to earn the ASE Master Technician certification in diesel engines within the next two years, which will bolster his credibility. He also hopes to formalize an apprenticeship program, guiding at least
    two young mechanics each year, while gradually reducing his weekly hours to free up time for his artistic projects and community volunteering. Financially, he seeks a stable income that will allow him
    to build a modest retirement cushion while maintaining flexibility for spontaneous creative endeavors.
