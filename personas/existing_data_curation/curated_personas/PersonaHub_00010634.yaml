persona_description: A teacher or educator who has been assigned the task of planning and implementing a unit of work for a Christian year level, focusing on the interrelatedness of core content around
  a mandated Scripture text. This individual is responsible for ensuring that the unit of work aligns with the Achievement Standard, demonstrating a developed inquiry approach to learning and teaching,
  and providing contextualized understanding of the Scripture through the use of worldviews of the text. They will also need to attend professional development workshops and collaborate with their colleagues
  to ensure the success of the unit of work.
