personas:
  professional: A 21‑year‑old aspiring avionics technician, Louis Pulver merges meticulous wiring‑schematic expertise with a creative, competitive drive, turning routine FAA maintenance tasks into opportunities
    to embed custom LED displays and artistic dashboards, while they improvisationally keep the shop environment lively.
  sports: A basketball‑enthusiast who slots into the Lexington Hoops Club’s Saturday intramural league, Louis Pulver roots for the Kentucky Wildcats and follows the Lexington Legends, blending high‑energy
    pickup games with a disciplined weekly cardio routine, and they relish the competitive edge of a fast‑break while maintaining flexibility through occasional yoga sessions.
  arts: A creatively driven hobbyist, Louis Pulver channels their love for guitar jams into renditions of John Mayer and Pink Floyd, immerses themselves in Isaac Asimov’s sci‑fi narratives while sketching
    digital art that melds Ansel Adams‑style landscapes with cockpit instrument motifs, and they regularly attend live shows featuring the Flaming Lips, letting these eclectic influences shape a uniquely
    abstract visual style.
  travel: An adventure‑seeking explorer on a student budget, Louis Pulver meticulously plans weekend getaways to the aerospace museum in Toulouse and a drone‑testing excursion in the Arizona desert, while
    they day‑dream about soaring over the Swiss Alps for aircraft spotting and aim to attend the Farnborough International Airshow next summer, balancing budget constraints with a love for spontaneous,
    aviation‑themed road trips.
  culinary: A moderately skilled home cook with a taste for bold flavors, Louis Pulver frequently whips up chicken fajitas with fresh cilantro, lime, and avocado, blends smoked salmon into scrambled eggs
    for a breakfast upgrade, and they revel in savoring Kentucky bourbon‑glazed ribs at local BBQ joints, while their curiosity drives them to experiment with exotic spices like sumac in their occasional
    ramen bowl.
  core: Louis Pulver, a 21‑year‑old aviation‑obsessed tinkerer, fuses technical precision with a wild artistic imagination, competes fiercely in both the workshop and the basketball court, splurges on the
    latest drone parts despite a tight budget, and never misses a chance to sketch a cockpit at sunset.
background:
  cultural: Louis grew up in Hebron, a small town in Boone County, Kentucky, within a close‑knit rural community that values hard work, self‑reliance, and neighborly hospitality. His family background reflects
    a blend of traditional Appalachian cultural elements – such as community gatherings, local sports, and country music – and an early exposure to modern technology through the nearby regional airport
    where he began his apprenticeship. This mix of modest, community‑oriented upbringing and a fascination with aerospace innovation shapes his identity, giving him a grounded sense of place while fostering
    an openness to new ideas and creative pursuits.
attributes:
  skills: '["Avionics troubleshooting", "Aircraft instrumentation calibration", "Electronic wiring and harness repair", "Diagnostic equipment operation", "Schematic reading", "Soldering and PCB assembly",
    "Software configuration of flight displays", "Compliance with FAA maintenance standards", "Team collaboration and communication", "Improvisational problem solving", "Creative electronic customization",
    "Basic CAD for wiring diagrams", "Flight simulation proficiency"]'
  hobbies: '["Flight simulation", "Drone building and piloting", "Guitar playing and jam sessions", "Live music attendance", "Digital illustration and graphic design", "Pickup basketball", "Science‑fiction
    reading", "Podcast listening", "Maker‑space meetups", "DIY electronics projects"]'
  career_goals: Louis aims to earn his FAA Airframe and Powerplant (A&P) and Avionics certification within the next three years, with the long‑term goal of becoming a lead avionics technician or engineering
    specialist at a major aerospace firm. He is interested in mastering advanced avionics technologies such as glass cockpit systems, satellite communication, and unmanned aerial vehicle (UAV) avionics.
    He also envisions opening a small workshop that offers custom avionics upgrades for general aviation aircraft, blending his technical expertise with his creative interests. Over time, Louis hopes to
    mentor younger technicians, contribute to safety‑focused research, and possibly pursue a bachelor's degree in electrical engineering.
