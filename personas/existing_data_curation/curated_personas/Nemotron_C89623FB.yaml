personas:
  professional: A teenage visual artist and budding concept designer, Faith Brown blends sketching, mixed‑media collages, and beginner coding in Processing to craft speculative storyboards for indie games,
    thriving on flexible, collaborative studio spaces that let them experiment without rigid deadlines.
  sports: Faith Brown enjoys casual pick‑up basketball at the neighborhood recreation center and follows the Baltimore Ravens and Orioles with a loyal, though relaxed, fandom, opting for weekend jogs along
    the Inner Harbor over organized team sports, and occasionally joins a community yoga class to stretch after long sketching sessions, which they find rejuvenating.
  arts: Faith Brown immerses themselves in jazz icons like Kamasi Washington, neo‑soul pioneer Solange, and hip‑hop poet Kendrick Lamar while drawing inspiration from spoken‑word artists such as Ocean Vuong
    and muralist The Kid Mero, and they channel these influences into their mixed‑media collages and poetry.
  travel: Faith Brown favors short, budget‑friendly trips that blend art and music, having explored the jazz districts of New Orleans, the museum trail of Washington, D.C., and the vibrant street art scene
    of Asheville, while dreaming of a future solo pilgrimage to the historic alleys of Cartagena to capture its colorful murals, and they often plan these getaways on a whim rather than a strict itinerary.
  culinary: Faith Brown’s palate gravitates toward soulful dishes like slow‑cooked collard greens seasoned with smoked turkey, sweet potato pie spiced with cinnamon and nutmeg, and spicy jambalaya, and
    while their cooking skill sits at an enthusiastic home‑chef level, they frequently experiment with extra‑virgin olive oil‑infused marinades and enjoy dining out at local jazz‑themed bistros for their
    gumbo and beignets.
  core: Faith Brown is a 16‑year‑old visual storyteller who thrives on spontaneous creativity, often forgetting homework in favor of midnight sketch marathons, and they balance a love for soulful food with
    a habit of hoarding stray sketchbooks in every backpack pocket.
background:
  cultural: Faith is an African‑American teenager raised in Baltimore’s vibrant urban neighborhoods. She grew up surrounded by the city’s rich Black cultural traditions, from the rhythmic sounds of local
    jazz clubs to the powerful murals that celebrate African‑American history. Family gatherings often feature soulful cooking, storytelling, and celebrations of Kwanzaa and Juneteenth, reinforcing her
    connection to her heritage. The legacy of Baltimore’s civil‑rights activism and the artistic voices of Black poets and musicians shape her worldview and fuel her desire to create art that honors her
    community.
