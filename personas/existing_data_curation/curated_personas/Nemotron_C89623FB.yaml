    ''volunteering as art workshop facilitator'']'
  career_goals: Faith aspires to become a freelance visual artist and concept designer, creating illustrations for indie games, graphic novels, and community murals. She hopes to attend a specialized art
    program after high school, eventually establishing a studio that collaborates with local youth organizations to create public art that reflects Baltimore’s Black heritage. Flexibility and creative freedom
    are central to her ambitions, and she envisions a career that balances personal artistic exploration with community empowerment.
