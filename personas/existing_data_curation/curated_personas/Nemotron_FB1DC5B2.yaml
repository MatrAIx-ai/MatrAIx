personas:
  professional: Mary Singleton is a budding junior builder who loves constructing LEGO sets according to the instructions, they methodically sort the pieces by color and size, reflecting their love for
    structure and predictability.
  sports: Mary Singleton plays in the Little League Tigers soccer team and attends the community swim club, they cheer for the city’s professional baseball team, the "Home City Hawks," and eagerly follow
    the seasonal schedule, preferring organized practice drills over free play.
  arts: Mary Singleton delights in reading picture books by Dr. Seuss, coloring in Disney‑themed sketchbooks, they collect and arrange stickers of popular cartoon characters like "Peppa Pig," and often
    mimic the songs from the movie "Frozen," showing how the arts shape their imaginative downtime.
  travel: Mary Singleton loves family nature walks in Pine Ridge State Park and has visited the interactive Children’s Museum in the city, they dream of a structured trip to Disney World’s Magic Kingdom,
    mapping out each day with stickers and checklists.
  culinary: Mary Singleton favors mac and cheese, chicken nuggets, and apple slices, they enjoy sprinkling shredded cheddar on their dishes and helping stir pancake batter on weekends, yet they sometimes
    sneak extra gummy bears into their lunchbox against the plan.
  core: Mary Singleton is a methodical six‑year‑old who blends creativity with order, reveling in LEGO builds, sticker albums, and meticulous allowance tracking, while occasionally indulging in secret gummy
    bear raids.
background:
  cultural: Mary comes from a white American family living in Windsor, Colorado, a small community in Larimer County. Her upbringing reflects the region's emphasis on education, outdoor recreation, and
    close‑knit neighborhood ties. The family celebrates national holidays such as Thanksgiving and the Fourth of July, participates in local events like the summer fair and community picnics, and maintains
    a modest involvement with a nearby church. These cultural influences nurture values of self‑reliance, respect for nature, and the importance of helping others in a structured, supportive setting.
attributes:
  skills: '[''Reading fluently'', ''Basic addition and subtraction'', ''Time‑telling on analog clock'', ''Following multi‑step instructions'', ''Maintaining daily routines'', ''Setting the table'', ''Sorting
    recycling'', ''Organizing personal items'', ''Pattern recognition in puzzles'']'
  hobbies: '[''Reading picture books and early chapter books'', ''Building LEGO structures'', ''Solving jigsaw puzzles'', ''Drawing and coloring'', ''Nature walks with family'', ''Collecting and organizing
    stickers'', ''Playing board games such as Candy Land'']'
  career_goals: Mary imagines a future where she can work in a structured, supportive environment that benefits small groups of children. Her short‑term ambition is to excel in her current grade, maintain
    perfect attendance, and become a classroom helper. In the longer term, she dreams of becoming an elementary school teacher or a librarian, roles that let her combine her love of books, organization,
    and nurturing, while providing the predictability and order she values.
