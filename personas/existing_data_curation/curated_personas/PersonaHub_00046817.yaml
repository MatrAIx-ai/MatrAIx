persona_description: A legal scholar with expertise in indigenous rights, customary international law, and international human rights law. She is particularly interested in the recognition and protection
  of indigenous rights through state practice, domestic court decisions, and international treaty obligations. She has a strong understanding of the UN Declaration on the Rights of Indigenous Peoples and
  the Convention on the Rights of the Child, and is familiar with the CRC and CEDAW human rights treaties. She has experience in analyzing state practice and opinio juris related to indigenous rights and
  has worked on cases involving indigenous peoples in Africa, South America, and Asia. She is also well-versed in the theory and practice of customary international law and the role of opinio juris in the
  recognition and protection of indigenous rights.
