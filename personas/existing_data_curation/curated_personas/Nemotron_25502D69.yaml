  career_goals: John aims to progress to a senior credit manager role within the next five years, where he can shape loan product strategies and mentor junior counselors. He is passionate about integrating
    innovative, flexible lending solutions that support small businesses and underserved borrowers in the Albany region. Long‑term, he envisions opening a boutique financial consultancy that combines his
    expertise in credit counseling with community‑focused financial education, leveraging his love for art and culture to foster creative approaches to economic empowerment.
