personas:
  professional: Jude Eatmon is a retired systems engineer who channels decades of CAD, FORTRAN, and circuit‑design expertise into mentoring high‑school STEM clubs, serving on the Cedar Park historical society
    board, and applying the same methodical precision to DIY furniture building and vintage radio restoration.
  sports: Jude Eatmon is an avid weekend hiker of Hill Country trails, a loyal supporter of the Texas Rangers, Dallas Cowboys, and local Cedar Park senior fitness class, and they incorporate low‑impact
    cardio and gentle strength training into a twice‑weekly routine to keep arthritis at bay.
  arts: Jude Eatmon delights in classic film noir, frequently re‑watching "The Maltese Falcon" and listening to Frank Sinatra’s crooning, attends the Austin Film Society’s monthly retro‑cinema screenings,
    and balances these with a steady appetite for historical biographies and occasional virtual tours of the Art Institute of Chicago.
  travel: Jude Eatmon prefers carefully planned road trips that balance comfort with scenery, having driven to Yellowstone and the Great Smoky Mountains, and they dream of exploring the Grand Canyon’s South
    Rim and Olympic National Park before mobility concerns curb longer journeys.
  culinary: Jude Eatmon cultivates heirloom tomatoes, zucchini, and peppers in a backyard garden, then crafts a rustic vegetable lasagna seasoned with fresh basil and mozzarella, while also perfecting a
    smoked brisket with an oak‑infused rub and a hearty Texas‑style chili loaded with pinto beans.
  core: Jude Eatmon is a methodical, garden‑loving retired engineer who blends precise DIY craftsmanship with a love of classic noir, disciplined finances, and steady volunteerism, all while maintaining
    a meticulously scheduled routine that leaves little room for spontaneity.
background:
  cultural: Jude grew up in a middle‑class, Anglo‑American family in the Midwest during the 1950s and 60s, where self‑reliance, punctuality, and community service were core values. After earning his STEM
    bachelor’s degree, he moved to Texas in the 1970s to work in the burgeoning technology sector. Over the decades he has embraced the blend of Southern hospitality and the progressive, tech‑driven culture
    of the Austin‑area. He and his wife are active members of their local Methodist church, celebrate traditional American holidays, and enjoy regional customs such as Texas barbecue and Fourth of July
    fireworks. His cultural identity reflects a pragmatic, family‑oriented outlook infused with a respect for tradition and a curiosity about new ideas.
attributes:
  skills: '[''Systems Engineering'', ''Project Management'', ''Data Analysis'', ''Electrical Circuit Design'', ''AutoCAD/CAD'', ''Legacy Software Development (FORTRAN, C)'', ''Technical Documentation'',
