  hobbies: '[''Vegetable Gardening'', ''Woodworking'', ''Model Railroading'', ''Reading (History/Science/Biographies)'', ''Classic Film Noir'', ''Chess'', ''Volunteer STEM Tutoring'', ''Hill Country Hiking'']'
  career_goals: Jude aims to stay intellectually engaged and give back to his community while maintaining the orderly routine he values. He plans to volunteer as a mentor for high‑school STEM clubs, serve
    on the board of the Cedar Park historical society, and contribute occasional consulting on small‑scale engineering projects for local nonprofits. He also hopes to complete a personal project of building
    a handcrafted wooden chest and to travel to a few national parks before his health limits him. Continuing his habit of lifelong learning, he intends to take a community‑college course in astronomy and
    keep his technical skills sharp through online workshops.
