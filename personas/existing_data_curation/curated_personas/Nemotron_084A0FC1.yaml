  career_goals: She aims to launch a community art and cultural heritage program at the local senior center, empowering seniors and younger residents to share stories through visual arts, and to compile
    a memoir that intertwines her family’s immigration journey with the evolving cultural landscape of rural Minnesota. She also plans to mentor emerging local artists through weekly critique circles and
    to be recognized as a catalyst for cultural appreciation and intergenerational connection in her town.
