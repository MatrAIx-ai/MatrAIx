personas:
  professional: Manuel Font, a 35‑year‑old full‑stack engineer and user‑experience designer in Mountain View, merges a humanities‑infused storytelling mindset with data‑driven personalization to build inclusive
    tech products, channeling boundless curiosity into pragmatic, maintainable code while leading interdisciplinary teams toward impact for underrepresented communities.
  sports: Manuel Font fuels their love for the outdoors by joining a local trail‑running club that meets on weekends, follows the San Jose Earthquakes in the MLS season, and squeezes in impromptu basketball
    pick‑up games with friends, preferring varied, flexible workouts over rigid routines that they adapt to their erratic schedule.
  arts: Manuel Font channels their storytelling roots through acoustic guitar sessions of folk classics from Victor Jara and contemporary Latin indie tunes by Calle 13, while devouring novels by Junot Díaz
    and poetry by Pablo Neruda, and evenings often find them experimenting with low‑light street photography inspired by Sebastião Salgado, a habit they cherish as a visual extension of narrative.
  travel: Manuel Font plans trips with a loose itinerary, preferring spontaneous hikes in Patagonia, cultural immersion in Barcelona’s Gothic Quarter, and tech‑centric tours of Tokyo’s Akihabara, balancing
    a limited startup budget with a yearning to explore both Andean ruins and Asian megacities that they pursue whenever time allows.
  culinary: Manuel Font, a competent home chef, loves to perfect classic ceviche with fresh citrus and cilantro, simmer hearty locro with corn and cheese, and experiment with plantain chips drizzled with
    ají amarillo, often pairing meals with a glass of Sauvignon Blanc to complement the bright flavors they enjoy after a long coding session.
  core: Manuel Font, a 35‑year‑old tech engineer who balances curiosity and practicality, blends Andean storytelling with Silicon Valley innovation, and constantly wrestles with a love‑for‑flexibility that
    makes them charmingly disorganized.
background:
  cultural: Manuel was born in Quito, Ecuador, to a family that valued community, storytelling, and music. He moved to the United States for university and now resides in Mountain View, blending his Andean
    heritage with the fast‑paced, innovative culture of Silicon Valley. He maintains strong ties to his roots—celebrating festivals like Día de los Difuntos, speaking Spanish at home, and cooking traditional
    meals—while embracing the multicultural environment of the Bay Area. This background informs his collaborative style, appreciation for diverse perspectives, and desire to build technology that reflects
    and serves a global audience.
attributes:
  skills: '[''Full‑stack web development (JavaScript, Python, Node.js, React)'', ''User experience (UX) design and research'', ''Data visualization and storytelling'', ''Agile and Scrum project management'',
    ''Cross‑cultural communication'', ''Spanish (native) and English fluency'', ''Creative writing and content strategy'', ''Problem solving and architectural design'']'
  hobbies: '[''Hiking and nature walks'', ''Cooking Ecuadorian cuisine'', ''Playing acoustic guitar'', ''Reading Latin American fiction and poetry'', ''Photography (landscape and street)'', ''Attending
    tech meetups and hackathons'', ''Exploring AI and creative coding projects'', ''Traveling to explore cultural heritage sites'']'
  career_goals: Manuel aims to advance to a staff engineer role where he can shape product direction, especially for projects that empower underrepresented communities in Latin America. He aspires to lead
    interdisciplinary teams, champion inclusive design, and eventually launch a startup focused on educational technology for Spanish‑speaking users. Simultaneously, he wants to deepen his expertise in
    AI‑driven personalization while maintaining a pragmatic approach to delivery and impact.
