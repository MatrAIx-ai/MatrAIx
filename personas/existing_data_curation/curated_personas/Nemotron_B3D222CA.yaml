personas:
  professional: Noemi Caraveo, a pharmacy technician in Loma Linda, blends meticulous compounding expertise with a flair for visual patient education, leveraging bilingual fluency to counsel Spanish‑speaking
    clients while quietly plotting a path toward a PharmD and supervisory leadership.
  sports: Noemi Caraveo enjoys solitary hikes along the San Bernardino foothills, participates in a local sunrise yoga class, follows the Los Angeles Dodgers and Lakers on game nights, and occasionally
    joins the Loma Linda Trail Runners club for weekend long‑distance runs.
  arts: Noemi Caraveo spends quiet evenings sketching canyon vistas inspired by Georgia O’Keeffe and Frida Kahlo, frequents the Riverside Art Museum to study contemporary installations, and curates a personal
    collection of Monet‑style watercolor prints that double as patient education tools.
  travel: Noemi Caraveo prefers meticulously planned solo trips that balance cultural immersion and nature, has trekked the red rocks of Sedona, explored the historic streets of Oaxaca, and dreams of photographing
    the cherry blossoms in Kyoto while budgeting each journey through a travel‑fund spreadsheet.
  culinary: Noemi Caraveo cooks health‑focused Mexican‑inspired meals, swapping traditional lard for avocado oil in enchiladas, flavoring quinoa‑based pozole with cilantro and cumin, and delights in perfecting
    a low‑sugar agua fresca featuring hibiscus and lime, though they occasionally indulge in a late‑night slice of cheese‑laden pizza.
  core: Noemi Caraveo is a quietly ambitious pharmacy technician who merges scientific precision with artistic empathy, thrives in solitary creative spaces, and balances disciplined savings with occasional
    indulgences.
background:
  cultural: Noemi was raised in a Mexican‑American household where family gatherings, Spanish language, and traditional celebrations such as Día de los Muertos and Día de la Independencia were central to
    her identity. This heritage instilled a strong sense of community, respect for elders, and an appreciation for the role of food and art in cultural expression. Living in Loma Linda, a health‑focused
    community with roots in Seventh‑Day Adventist principles, she balances her cultural values with an emphasis on wellness, preventive care, and service. Her bilingual fluency allows her to bridge cultural
    gaps in healthcare, providing empathetic support to Spanish‑speaking patients while honoring the traditions that shape their health beliefs.
attributes:
  skills: '[''Prescription verification'', ''Sterile compounding'', ''Non‑sterile compounding'', ''Medication dispensing'', ''Pharmacy inventory management'', ''Pharmacy management software (PioneerRx,
    QS/1)'', ''Regulatory compliance (HIPAA, FDA, state pharmacy regulations)'', ''Bilingual patient counseling (English/Spanish)'', ''Laboratory techniques (titration, microscopy)'', ''Data analysis and
    statistical reporting'', ''Quality assurance and control'', ''Process improvement and workflow optimization'', ''Training and mentorship'', ''Creative patient education materials'']'
  hobbies: '[''Watercolor painting'', ''Sketching'', ''Visiting art galleries and museums'', ''Reading art history and scientific journals'', ''Gardening (herbs, succulents)'', ''Cooking and experimenting
    with Mexican cuisine'', ''Hiking in the San Bernardino foothills'', ''Listening to classical music'', ''Mindfulness meditation'', ''Attending online health and science webinars'']'
  career_goals: Noemi aspires to transition from a pharmacy technician to a supervisory role within the next three years, eventually becoming a licensed pharmacist after completing a PharmD program part‑time
    while continuing to work. She is passionate about bridging the gap between pharmacy practice and community health, particularly for underserved Mexican‑American families in the Loma Linda area. Her
    long‑term ambition includes developing a culturally tailored health‑literacy program that blends scientific information with visual art, and she hopes to lead telepharmacy initiatives that increase
    access to medication counseling in rural Southern California. At the same time, she seeks to deepen her expertise in sterile compounding and clinical drug therapy to contribute directly to patient care
    in a hospital or specialty clinic.
