personas:
  professional: A budding junior naturalist, Sabrina Mccallister channels their curiosity about wildlife into meticulous bird sketches, methodical LEGO builds, and early coding projects in Scratch, balancing
    imaginative exploration with a reliable, organized approach to learning.
  sports: A regular member of the Hanahan Youth Swim Club, Sabrina Mccallister enjoys swimming laps at the local pool, cheering on the Charleston Battery soccer team, and occasionally joining a weekend
    beach volleyball game with a small group of friends.
  arts: A dedicated piano hobbyist, Sabrina Mccallister practices simple melodies three times a week, draws inspiration from the soothing compositions of Yiruma and the vibrant seascapes of Claude Monet,
    and brings their imagination to life in Scratch stories featuring animated sea creatures.
  travel: Preferring nature‑focused adventures, Sabrina Mccallister loves exploring the marshes and tide pools near Hanahan, dreams of a family road trip to the Everglades to spot alligators, and hopes
    to someday visit the Galápagos Islands to see giant tortoises up close.
  culinary: Sabrina Mccallister delights in baking chocolate‑chip cookies with their family, enjoys snacking on freshly picked garden tomatoes, and proudly whips up simple pasta dishes seasoned with basil
    and garlic after their gardening sessions.
  core: Curious yet methodical, Sabrina Mccallister blends a love for wildlife, LEGO engineering, and piano practice with an organized allowance plan, careful health monitoring, and a quiet but adventurous
    spirit.
background:
  cultural: Sabrina was raised in a white Southern family in Hanahan, South Carolina. Her upbringing reflects Southern hospitality, community values, and occasional church attendance. She grew up with a
    strong connection to the coastal environment, enjoying seafood dishes like shrimp and grits and participating in local festivals that celebrate Charleston's maritime heritage. Family traditions include
    storytelling, respect for nature, and a modest, polite demeanor common in the region, while also encouraging curiosity and education through school and extracurricular activities.
