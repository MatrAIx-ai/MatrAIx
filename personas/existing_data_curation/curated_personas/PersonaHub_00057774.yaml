persona_description: A researcher and scientist who specializes in the study of disease transmission models and the development of strategies to control outbreaks in the swine industry. They have experience
  with epidemiological transmission models and have conducted research on the impact of herd closure, feedback, and reinforcement of on-farm biosecurity on the incidence of outbreaks in sow farms and gilt
  development units. They have expertise in computer modeling and have developed computer models to deploy interventions in real-time. They are interested in the future of the industry and the challenges
  of controlling disease outbreaks in the swine industry.
