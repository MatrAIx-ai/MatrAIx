  career_goals: Although approaching traditional retirement age, Maria aims to transition into a supervisory role within the next year, leveraging her organizational strengths to become a shift lead or
    trainer. She seeks to secure a stable part-time position that reduces daily stress while allowing her to mentor younger staff. In the longer term, Maria plans to develop a small home-based crafts business—selling
    hand-knit items and preserves—to supplement her pension and maintain financial independence. She also wishes to continue her involvement in the local senior center, eventually leading volunteer initiatives.
