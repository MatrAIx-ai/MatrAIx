persona_description: A researcher or scientist specializing in the study of the visual systems of deep-sea lanternfish, particularly focusing on the photoreceptor cells and their diversity, distribution,
  and function in the context of their ecological adaptations. The researcher is interested in understanding the constraints placed on the visual systems of this large group of mesopelagic fishes at the
  first stage of retinal processing, and the potential implications for survival and interactions with prey, predators, and mates. The researcher aims to uncover the unique visual demands and specialisations
  of lanternfishes, and the evolutionary pressures that have shaped their visual systems.
