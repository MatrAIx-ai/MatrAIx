  career_goals: Looking ahead, Charles hopes to transition into a mentorship role within his current company, formalizing his training responsibilities as a certified safety and onboarding trainer. He also
    dreams of launching a part‑time consulting service for small logistics firms in the Chicago suburbs, sharing best‑practice insights on safety, efficiency, and crew morale. As he approaches retirement,
    he envisions dedicating more time to community art projects—perhaps curating photo exhibitions at the local community center or helping organize the annual Streamwood Arts Festival—while still staying
    connected to the workforce on a flexible basis.
