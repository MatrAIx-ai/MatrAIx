personas:
  professional: William Box is a seasoned utility meter reader who blends precise GPS navigation and hands‑on electrical safety expertise with a naturally sociable demeanor, using their curiosity and relaxed
    approach to mentor new colleagues and champion flexible scheduling in pursuit of a supervisory role.
  sports: William Box enjoys playing late‑night pick‑up basketball at the local community center, cheering for the Memphis Grizzlies and the New Orleans Saints, and spends sunny weekends fishing on Grenada
    Lake while occasionally following the Mississippi State Bulldogs during football season.
  arts: William Box immerses themselves in the blues of B.B. King, the soulful gospel of Mahalia Jackson, and the improvisational jazz of John Coltrane, attends mural tours in Jackson, snaps vintage‑style
    photos with a classic 35mm camera at community fairs, and visits the Mississippi Museum of Art whenever a new exhibit on Southern folk art opens.
  travel: William Box favors road‑trip adventures that blend family obligations with personal curiosity—spending summer weeks cruising down the Great River Road to explore blues heritage in Memphis and
    New Orleans, planning weekend getaways to the Gulf Coast for fishing, and dreaming of a future cultural pilgrimage to the jazz districts of Paris and the Caribbean island of Jamaica.
  culinary: William Box is a competent home cook who masters soul‑food staples like smoked pork ribs, collard greens simmered with ham hocks, and sweet potato pie, often seasoning with smoked paprika and
    hot sauce while swapping recipes at church potlucks and occasionally treating themselves to upscale barbecue at local restaurants like The Rib House.
  core: William Box blends a warm, gospel‑filled community spirit with an ever‑curious eye for art, yet their habit of forgetting to log meter readings on time and their tendency to over‑think every social
    interaction keep their days both vibrant and slightly chaotic.
background:
  cultural: William was raised in a close‑knit African‑American community in Winston County, Mississippi. His upbringing was steeped in Southern hospitality, gospel music, and a strong oral storytelling
    tradition passed down through family and church. The local church has been a central hub for social support, celebrations, and civic involvement, shaping his values of cooperation, resilience, and communal
    responsibility. He maintains deep connections to regional customs such as cooking soul food, participating in church potlucks, and attending community festivals, while also embracing contemporary artistic
    experiences that reflect his curiosity and openness to new ideas.
attributes:
