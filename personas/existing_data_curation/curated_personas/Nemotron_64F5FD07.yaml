personas:
  professional: Sonia Blanchet, an aspiring communications specialist, channels her love of improvisation and trend‑spotting into public‑relations work for socially‑conscious brands, leveraging her knack
    for audience engagement and data‑driven storytelling while often juggling a chaotic schedule that favors spontaneous event ideas over rigid planning.
  sports: Sonia Blanchet fuels their fitness routine with weekend hikes along the Cascades and Willamette Trail, follows the Portland Timbers and Trail Blazers avidly, and participates in a local improv‑theatre‑themed
    charity run while occasionally joining pickup soccer games at a downtown Portland café.
  arts: Sonia Blanchet immerses themselves in indie music by frequenting open‑mic nights featuring bands like The Helix and scoring playlists that include Phoebe Bridgers, Mitski, and Tame Impala, while
    also cherishing improv theatre, photography inspired by Annie Leibovitz, and binge‑watching films starring Florence Pugh and Emma Stone.
  travel: Sonia Blanchet, a spontaneous 18‑year‑old, prefers last‑minute road trips to Oregon’s coast and Seattle’s coffee districts, has already visited Portland, San Francisco, and Vancouver, and dreams
    of exploring Berlin’s art scene and Tokyo’s ramen alleys, all while budgeting through a student travel fund and staying in hostels with friends.
  culinary: Sonia Blanchet delights in crafting avocado toast topped with smoked salmon and poached eggs, sipping matcha lattes at local cafés, whipping up quick quinoa‑kale bowls with tahini, and savoring
    ramen, bibimbap, and Pacific Northwest salmon while rating each dish on their blog.
  core: Sonia Blanchet is a curious, talkative 18‑year‑old who blends creativity with data‑driven event planning, yet their competitive streak and penchant for worry often clash with a relaxed, sometimes
    disorganized approach to life.
background:
  cultural: Sonia grew up in Salem, Oregon, within an Anglo‑American family that traces part of its roots to French‑Canadian heritage. The Pacific Northwest’s blend of laid‑back lifestyle, environmental
    consciousness, and vibrant arts scene has shaped her identity. Local traditions such as community festivals, farmers’ markets, and a strong emphasis on outdoor recreation fostered her love for nature
    and community engagement. At the same time, the region’s progressive values and diverse cultural offerings nurtured her curiosity about new ideas while grounding her in practical, collaborative ways
    of living.
attributes:
  skills: '[''Public Speaking'', ''Improvisational Communication'', ''Social Media Management'', ''Graphic Design (Canva)'', ''Content Creation'', ''Trend Analysis'', ''Basic Project Coordination'', ''Conflict
