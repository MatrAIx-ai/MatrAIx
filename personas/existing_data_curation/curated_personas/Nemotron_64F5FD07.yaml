  hobbies: '[''Attending Live Music Concerts'', ''Improvisational Theatre'', ''Hiking in the Oregon Outdoors'', ''Photography'', ''Coffee Shop Hopping'', ''Blogging on Indie Culture'', ''Trivia Nights'',
    ''Board Game Competitions'', ''Journaling'', ''Documentary Watching'']'
  career_goals: Sonia aims to build a career in communications where she can blend creativity with measurable impact. Her short‑term goal is to secure an entry‑level position as a public relations or brand‑strategy
    associate at a socially‑conscious organization in the Pacific Northwest, where she can leverage her event‑planning and digital‑content skills. Long‑term, she envisions launching her own boutique events
    and experiential‑marketing firm that uses data‑driven insights while staying flexible enough for spontaneous, community‑focused projects. She also hopes to develop leadership expertise, eventually moving
    into a director‑level role that shapes brand narratives and drives audience engagement.
