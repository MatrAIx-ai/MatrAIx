  hobbies: '[''Reading historical fiction and poetry'', ''Gardening'', ''Knitting'', ''Small book discussion group'', ''Birdwatching'', ''Listening to classical music'', ''Genealogy research'', ''Volunteer
    storytelling sessions'']'
  career_goals: Even in retirement, Alis is driven to remain a supportive presence in her community. Her primary goals are to volunteer regularly at the local senior center, mentor younger volunteers in
    compassionate caregiving, and create an oral‑history archive that captures the experiences of Ann Arbor seniors. She also aspires to keep her mind active by learning a new craft each year—such as quilting
    or digital photography—while maintaining her independence and health for as long as possible.
