personas:
  professional: Alis Wells is a retired community mentor who leverages decades of caregiving, first-aid knowledge and empathetic listening to volunteer at the senior center, mediate neighborhood disputes,
    and orchestrate oral-history projects, while their relaxed approach and occasional disorganization keep the work cozy rather than regimented.
  sports: Alis Wells enjoys low-impact fitness such as daily walks in the nearby park for bird-watching, participates in a senior yoga class at the Ann Arbor community center, and follows the Michigan Wolverines
    football team and the Detroit Tigers baseball team with modest enthusiasm, while being a member of the local Ann Arbor Senior Lawn Bowling Club that meets each spring.
  arts: Alis Wells finds artistic fulfillment in listening to classical composers like Beethoven and Brahms on the radio, reading poetry by Emily Dickinson and Robert Frost, attending occasional performances
    by the Ann Arbor Symphony, and cherishing the works of painter Claude Monet, while their knitting projects often reflect a quiet admiration for the intricate patterns found in traditional folk tapestries.
  travel: Alis Wells prefers relaxed, historically rich trips, having taken organized senior tours to Boston, Washington DC and the historic castles of England, while dreaming of a pilgrimage to the Irish
    countryside to trace genealogical roots, and they typically plan itineraries loosely, allowing for spontaneous garden market stops and ample time for reading in cozy cafés.
  culinary: Alis Wells prepares wholesome meals such as roasted vegetable quinoa bowls, chicken pot pie with thyme and rosemary, and hearty lentil soup seasoned with carrots and bay leaves, displays a particular
    fondness for baking apple crisp with a crunchy oat topping, and enjoys sharing garden-fresh salads featuring heirloom tomatoes, cucumbers and feta cheese with friends at neighborhood potlucks.
  core: Alis Wells is a gentle, curiosity-driven elder whose compassionate storytelling, modest disorganization, and quiet worry blend into a life of community service, garden stewardship, and relentless
    pursuit of family history.
background:
  cultural: Alis was raised in a mid‑western, working‑class white family during the 1930s and 1940s, later relocating to Ann Arbor, Michigan. Her upbringing emphasized self‑reliance, humility, and community
    service—values reinforced by close‑knit neighborhoods and the academic environment of Ann Arbor. She was shaped by post‑war American culture, the civil‑rights era, and the growth of senior‑focused community
    programs in the region, which cultivated her strong sense of compassion, cooperation, and practical curiosity.
