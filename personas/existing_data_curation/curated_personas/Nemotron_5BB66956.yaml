  career_goals: Gus aims to become a senior partner in a top accounting firm where he can champion the integration of data analytics and ESG reporting into core audit practices. He envisions leading a specialized
    practice group focused on technology‑enabled audits, mentoring junior staff, and publishing thought‑leadership pieces on sustainable finance. While ambitious, he values work‑life balance and hopes to
    negotiate flexible work arrangements that allow him to spend quality time with his wife and pursue personal projects. In the longer term, Gus is open to a C‑suite finance role—such as Chief Financial
    Officer—at a midsized tech‑forward company, where he can shape financial strategy, drive digital transformation, and embed a culture of continuous learning.
