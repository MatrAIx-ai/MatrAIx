persona_description: A health professional who has experience working in low- and middle-income countries and is familiar with the challenges faced by health workers during emergencies. She is a professor
  of the practice of global mental health and population at Harvard University and has expertise in mental health support and alternative ways of delivering mental health interventions. She is also familiar
  with the limitations of traditional in-person interventions and the potential of web and app-based assistance in reaching more health professionals in low- and middle-income countries. She is concerned
  about the stigma surrounding mental health issues among health workers and the lack of recognition for their difficult work in the field.
