persona_description: A Malian ethnomusicologist who specializes in the study of Malian traditional music, particularly its relationship with politics and its cultural and historical context. She has conducted
  research on the Malian literary tradition, the role of jalis in the transmission of oral histories, and the influence of the Niger River on Malian culture. Her expertise includes the traditional instruments
  of the Maninka jeli ensemble, the repertoire of the Malian jeliw, and the history and evolution of Malian music. She is also interested in the political and social context of Malian music, and the ways
  in which music reflects and shapes Malian culture.
