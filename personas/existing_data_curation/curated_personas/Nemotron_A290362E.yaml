personas:
  professional: Marie Johnson heads enterprise-level information systems for schools and private firms, merging rigorous Agile project leadership and data-driven decision making with the same imaginative
    flair she brings to her digital illustrations, while her competitive edge and healthy skepticism push her to constantly challenge vendors and mentor her team to exceed performance targets.
  sports: Marie Johnson hikes the Appalachian foothills on weekends, plays forward for a co‑ed community soccer league, follows the Charlotte Hornets and Carolina Panthers zealously, and attends yoga classes
    at a downtown studio to counterbalance her competitive drive on the field.
  arts: Marie Johnson creates abstract acrylics inspired by Yayoi Kusama, illustrates digital fantasy worlds while listening to Fleet Foxes and Kamasi Washington, performs improv at the local theater with
    a knack for stealing the spotlight, and devours sci‑fi epics by N.K. Jemisin and Brandon Sanderson as creative fuel.
  travel: Marie Johnson has trekked the Blue Ridge Parkway, photographed historic towns in Asheville, explored Reykjavik’s street art, dreams of a Kyoto cherry‑blossom pilgrimage, and meticulously plans
    future trips using a spreadsheet that balances airfare deals with her limited vacation days.
  culinary: Marie Johnson experiments with kimchi‑infused dark chocolate truffles, miso‑glazed salmon tacos topped with fresh basil and gochujang, and often adds harissa to her ramen, showcasing a confident
    sous‑vide technique that blends Korean, Mediterranean, and Southern flavors.
  core: Marie Johnson blends tech leadership with vivid artistry, dominates meetings with talkative confidence, chases novelty in both code and cuisine, and never misses a chance to be center stage, even
    if it means juggling a sticky‑note avalanche.
background:
  cultural: Marie grew up in the rural community of Wade, in Cumberland County, North Carolina, where Southern hospitality and close‑knit community ties shaped her early life. Her family emphasized the
    value of education and public service, fostering a sense of responsibility to improve local schools. While rooted in traditional Southern customs such as family gatherings, regional cuisine, and an
    appreciation for country and bluegrass music, Marie’s college experience and tech career broadened her worldview. She blends these cultural foundations with a progressive, curious mindset, actively
    seeking diverse perspectives and championing inclusive initiatives within her professional and volunteer work.
