  career_goals: Marie aims to progress into senior technology leadership, aspiring to become a Director of Information Technology for a regional school district or the Chief Technology Officer of an ed‑tech
    startup. She is driven to spearhead digital transformation initiatives that embed artificial intelligence, virtual reality, and immersive learning experiences into K‑12 curricula. Marie seeks to champion
    data‑driven decision‑making, expand cybersecurity resilience, and build high‑performing, inclusive teams. She also plans to mentor emerging women leaders in tech, publish thought‑leadership on the intersection
    of education and emerging technologies, and eventually launch her own consultancy that helps schools adopt innovative, art‑infused digital solutions.
