personas:
  professional: Adam Bennett is an aspiring young technologist who blends a love for strategy video game mods with hands‑on Arduino tinkering; they apply methodical problem‑solving to build simple sensors
    while embracing a relaxed attitude toward deadlines and school projects.
  sports: Adam Bennett plays point guard for the Westside Youth Basketball League, follows the Oklahoma Sooners high school football team with fervor, and occasionally hikes the Oklahoma River State Park
    trails, all while cheering for the Oklahoma City Thunder during NBA season.
  arts: Adam Bennett sketches comic‑book heroes inspired by Alex Ross and Jim Lee, reads sci‑fi novels by Isaac Asimov and Liu Cixin, and listens to a country‑rock mix featuring Zac Brown Band and Keith
    Urban, which together shape their creative downtime.
  travel: Adam Bennett has explored the Grand Canyon and dreams of visiting Japan's Akihabara district and the Icelandic Blue Lagoon, preferring road trips with friends for spontaneity but often limited
    by a modest allowance and school schedule.
  culinary: Adam Bennett enjoys cooking chicken fried steak with peppered gravy, whipping up nachos with jalapeños and cheddar, and experimenting with homemade soda flavorings, though their cooking skill
    hovers at enthusiastic beginner level.
  core: Adam Bennett is a curious yet laid‑back teen who balances video game strategy, Arduino tinkering, and basketball, while battling worry‑driven stress and occasional disorganization.
background:
  cultural: Adam was raised in Oklahoma City's middle-class neighborhoods, where Midwestern practicality meets Southern hospitality. Family gatherings often revolve around barbecues, country music, and
    the annual county fair. The community's strong emphasis on high school sports, especially football, and a shared pride in the state's oil and agricultural heritage have shaped his values of teamwork,
    self-reliance, and modest ambition. While his household reflects typical American Midwest values - hard work, respect for tradition, and a love for the outdoors - Adam also benefits from the city's
    growing cultural diversity, which exposes him to a variety of perspectives and traditions.
attributes:
  skills: '[''basic computer troubleshooting'', ''video game strategy and teamwork'', ''introductory programming (Scratch, Python)'', ''bike maintenance and repair'', ''Arduino circuit building'', ''basic
    home repair (plumbing, carpentry basics)'', ''collaborative problem solving in school projects'', ''peer tutoring'']'
  hobbies: '[''playing strategy video games'', ''modding and exploring game communities'', ''building Arduino projects'', ''basketball with friends'', ''attending high school football games'', ''hiking
    local trails'', ''reading sci-fi novels'', ''sketching comic-book characters'', ''listening to country-rock music'']'
  career_goals: Adam hopes to channel his curiosity and practical streak into a career that blends technology with tangible outcomes. He aspires to study engineering - particularly robotics or software
    development - so he can design tools that help his generation manage stress and stay organized. He also imagines a role in community service, such as volunteering with a local fire department or youth
    mentorship program, where he can apply his cooperative nature and assertive side. Ultimately, he wants a flexible, hands-on profession that lets him continue learning while contributing to his Oklahoma
    community.
