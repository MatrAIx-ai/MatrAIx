persona_description: A healthcare professional who is involved in managing and treating patients with Ebola virus disease, particularly in West Africa where the outbreak is ongoing. They are responsible
  for caring for patients, monitoring and seeking out contacts, ensuring quality laboratory services, conducting safe burials, and promoting community participation in the fight against the virus. They
  are also aware of the importance of early support based around rehydration and symptomatic treatment, and are working to ensure that healthcare personnel are protected from the virus.
