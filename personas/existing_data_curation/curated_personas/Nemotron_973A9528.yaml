  career_goals: Jon aims to transition from front‑line driving to a leadership role within the transit system. Over the next five years he plans to become a certified driver trainer, using his patient,
    cooperative style to teach and mentor newcomers. He also aspires to join the agency’s safety and quality‑assurance team, where he can apply his detail‑oriented mindset and imaginative approach to improve
    service reliability. In the longer term, Jon hopes to spearhead a community‑engagement program that integrates local arts—organizing traveling art showcases on the bus route and partnering with schools
    to expose students to public‑transport careers. Ultimately, he seeks a stable, respected position that lets him give back to the Fort Bragg community while still enjoying the road’s dynamic environment.
