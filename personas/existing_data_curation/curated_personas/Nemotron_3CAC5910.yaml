  career_goals: Jerissa aims to compile a memoir of her life experiences, focusing on the evolution of African‑American culture in Nashville, and to publish a collection of her poetry and short stories.
    She hopes to mentor younger community members through a weekly art and storytelling workshop at the local senior center, fostering intergenerational creativity. Additionally, she aspires to curate a
    traveling exhibition of her own artwork and the pieces of fellow senior artists, showcasing the vibrancy of Black artistic expression in the South. She also desires to learn digital photography to document
    her garden and neighborhood, integrating modern technology into her creative practice.
