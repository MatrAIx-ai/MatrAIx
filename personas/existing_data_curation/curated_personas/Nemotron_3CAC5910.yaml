personas:
  professional: Jerissa Darnell, a retired visual artist and community storyteller, channels their imaginative spirit and competitive edge into curating intergenerational workshops and traveling exhibitions,
    leveraging a knack for organizing events despite occasional disorganization.
  sports: Jerissa Darnell stays active through gentle walks in the neighborhood, tending a vegetable garden, and playing bridge at the senior center, while cheering on the Nashville Predators and the Tennessee
    Titans as their favorite professional teams.
  arts: Jerissa Darnell expresses their boundless imagination through abstract watercolor landscapes inspired by their garden, while also soaking in the rhythms of jazz legends like Miles Davis and blues
    icons such as B.B. King, and discussing speculative fiction by Octavia Butler with a lively book club.
  travel: Jerissa Darnell prefers purposeful day trips to places that feed their artistic soul, such as the Great Smoky Mountains, Asheville’s Biltmore Gardens, and the New Orleans French Quarter for its
    music and cuisine, while budgeting for occasional rail journeys that combine leisure with documentation of neighborhood scenes.
  culinary: Jerissa Darnell loves crafting traditional Southern dishes like collard greens, shrimp and grits, and sweet potato pie, while experimenting with modern twists such as quinoa‑mint salads, using
    fresh herbs harvested from their own garden.
  core: Jerissa Darnell is a creatively fierce, socially vibrant octogenarian who blends abstract art, competitive bridge, and soulful cooking into a life of relentless curiosity and occasional disarray.
background:
  cultural: Jerissa grew up in Nashville during the era of segregation and the civil‑rights movement, experiences that have deeply shaped her worldview. As an African‑American woman, she draws strength
    from the rich traditions of Black Southern culture, including gospel music, communal storytelling, and Southern cuisine. Her family lineage includes migrants from the rural South who settled in Nashville,
    and she maintains strong ties to the church and the historically Black neighborhoods of the city. These cultural influences inform her artistic expression, her commitment to preserving oral histories,
    and her dedication to mentoring younger generations within the African‑American community. She embraces the resilience, creativity, and collective spirit that characterize her cultural heritage, weaving
    them into her art, cooking, and community involvement.
