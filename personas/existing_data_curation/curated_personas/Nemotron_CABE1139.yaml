    at food pantry"]'
  career_goals: Linda plans to earn her GED within the next year and then enroll in a community‑college certificate program for Certified Nursing Assistant (CNA) or a culinary arts diploma. She is attracted
    to professions that provide a structured routine and allow her to help others, such as home health aide or a small‑scale catering business from her home kitchen. In the medium term, she hopes to secure
    a part‑time position in a healthcare setting while continuing to support her family and eventually launch a modest baked‑goods side business that reflects her Southern culinary roots.
