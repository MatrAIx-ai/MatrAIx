personas:
  professional: Linda Cobb, an aspiring Certified Nursing Assistant, applies her meticulous budgeting, scheduling, and conflict‑resolution talents to organize community health outreach while using basic
    Excel spreadsheets to track patient appointments and pantry supplies.
  sports: Linda Cobb, a devoted fan of the Ole Miss Rebels football team, enjoys early morning walks through the nearby woods, participates in a church‑run walking club each weekend, and occasionally joins
    a community softball game at the local park during summer months.
  arts: Linda Cobb, an avid listener of gospel groups like the Blind Boys of Alabama and country artists such as Kacey Musgraves, spends evenings crocheting blankets for church members while devouring mystery
    novels by Agatha Christie and attending regional folk‑art fairs to support local craftsmen.
  travel: Linda Cobb, a planner who prefers road trips with a detailed itinerary, has explored the historic streets of Natchez, the vibrant food scene of New Orleans, and the scenic trails of the Great
    Smoky Mountains, and dreams of a quiet retreat to Savannah’s historic district next summer.
  culinary: Linda Cobb, an enthusiastic Southern cook, perfects fried chicken, buttery cornbread, and collard greens using garden‑fresh vegetables, experiments with a pinch of cayenne in traditional recipes,
    and occasionally over‑salts her stew while still serving it with a smile and a glass of sweet tea.
  core: Linda Cobb, a diligent small‑town caretaker, weaves Southern hospitality, methodical organization, and a quiet love for garden‑grown meals into a life centered on service, predictability, and modest
    comforts.
background:
  cultural: Linda was raised in Raymond, a small town in Hinds County, Mississippi, in a close‑knit white Southern family. Her upbringing emphasized hospitality, community service, and respect for tradition.
    The local church plays a central role in her life, shaping her values of cooperation, harmony, and modesty. She grew up cooking family recipes featuring fried chicken, cornbread, and seasonal vegetables,
    and she cherishes Southern folk and gospel music. The rural setting has fostered an appreciation for self‑sufficiency through gardening, hand‑crafts, and neighborly assistance.
attributes:
  skills: '["household budgeting", "time management", "event planning", "basic computer literacy (Microsoft Office, email)", "Southern cooking", "hand sewing", "gardening", "conflict mediation", "volunteer
