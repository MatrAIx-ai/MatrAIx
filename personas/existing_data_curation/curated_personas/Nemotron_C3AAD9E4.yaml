personas:
  professional: William Malek is an aspiring teen game developer who spends weekends reverse‑engineering battle‑royale mechanics, building custom RGB‑lit PCs, and drafting level sketches while his habit
    of leaving school projects to the last minute reveals a tension between his love of structure and his relaxed approach to obligations.
  sports: William Malek rides the waves at the local surf club, shreds at the town skate park, and roots for the Los Angeles Dodgers and the LA Galaxy, adopting a competitive training mindset that mixes
    interval surf drills with weekly skate‑park meet‑ups while occasionally skipping rest days when a new gaming tournament looms.
  arts: 'William Malek dives into graphic novels like "Saga" and "Spider‑Man: Into the Spider‑Verse," draws fan art inspired by Akira Toriyama’s style, and follows indie game composers such as Austin Wintory,
    using YouTube tutorials to blend visual storytelling with sound design during his personal game‑design experiments.'
  travel: William Malek plans adrenaline‑filled getaways to surf hotspots like Maui and Kuta Beach in Bali, loosely maps out trips using Google Flights while leaving room for spontaneous stops at gaming
    conventions in Los Angeles, though his limited budget often means he relies on family car rides for shorter weekend escapes.
  culinary: William Malek favors fresh fish tacos with mango salsa, spicy ramen bowls topped with soft‑boiled eggs, and occasional coconut shrimp, cooking with a confidence that rivals his PC‑building skills
    yet often leaves a mess of sauce on the countertop, and he drinks matcha lattes when studying but reaches for energy drinks before night‑long gaming marathons.
  core: William Malek blends a competitive gamer’s drive with a laid‑back surfer’s chill, juggling meticulous PC builds and spontaneous beach clean‑ups while juggling a chaotic schedule and a love for graphic
    novels.
background:
  cultural: William grew up in Myrtle Beach, South Carolina, a coastal city shaped by tourism, Southern hospitality, and a strong working‑class ethos. The local culture emphasizes outdoor recreation—beaches,
    fishing, and surfing—as well as regional traditions such as high school football games, church gatherings, and seafood cuisine. His family participates in seasonal beach clean‑ups and enjoys casual
    barbecues with neighbors, reflecting the community‑oriented values of the Lowcountry. While the town is predominantly white, it also includes sizable Hispanic and African‑American communities, giving
    William occasional exposure to diverse cultural practices, especially through school and local sporting events. These influences give him a blend of pragmatic Southern sensibility and a laid‑back beach
    lifestyle.
attributes:
  skills: '[''Surfing'', ''Swimming'', ''Bike repair'', ''Beginner programming (Scratch, Roblox)'', ''PC building'', ''Competitive multiplayer gaming'']'
  hobbies: '[''Surfing'', ''Fishing'', ''Skateboarding'', ''Multiplayer video gaming'', ''PC building'', ''Reading graphic novels'', ''Arduino tinkering'', ''Beach clean‑up volunteering'']'
  career_goals: William envisions a future where he can blend his technical curiosity with his love of the ocean and competition. In the short term he plans to earn his GED and enroll in a community college
    program for computer science or a trade school for marine mechanics. He hopes to become a marine technician who maintains equipment for local aquariums, charter boats, or beach‑side research facilities.
    Simultaneously, he dreams of breaking into the video‑game industry as a junior developer, creating surf‑themed indie games. A long‑term ambition is to open a small skate‑and‑gaming hub in Myrtle Beach
    where local teens can skate, play, and learn coding basics together.
