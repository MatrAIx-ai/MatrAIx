personas:
  professional: Carmen Council is a seasoned office administrator who blends practical workflow optimization with a curiosity for new productivity tools, leading her clerical team with a relaxed‑yet‑supportive
    style that values flexibility over rigid scheduling.
  sports: Carmen Council fuels their love for movement through salsa and Afro‑beat dance workshops, Zumba classes, and group yoga, while cheering on the local professional basketball team the City Royals
    and participating in a community running club that meets every Saturday morning.
  arts: Carmen Council cultivates creative expression by dancing to live performances by artists like Lizzo, H.E.R., and Bad Bunny, attending theater productions of Hamilton and A Raisin in the Sun, and
    curating playlists that mix soulful R&B with vibrant Latin beats.
  travel: Carmen Council prefers spontaneous weekend getaways that blend cultural immersion and relaxation, having explored New Orleans’ jazz scene, the historic streets of Santa Fe, and the vibrant markets
    of Mexico City, while planning future trips to the Caribbean for a laid‑back beach escape.
  culinary: Carmen Council enjoys cooking soul‑food classics such as collard greens, black‑eyed peas, and slow‑cooked brisket, alongside Tex‑Mex staples like chicken enchiladas and homemade guacamole, experimenting
    with ingredients like smoked paprika, jalapeños, and fresh cilantro to impress friends at neighborhood potlucks.
  core: Carmen Council is a sociable, curiosity‑driven office leader who balances a relaxed approach to planning with a passion for dance, community food, and spontaneous adventures, even if it means occasionally
    missing deadlines or medical appointments.
background:
  cultural: Carmen is an African‑American woman raised in the Dallas‑Fort Worth metro area and now living in Sunnyvale, Texas. Her family’s Southern roots have instilled a strong sense of community, hospitality,
    and resilience, reflected in traditions like Sunday church gatherings, family cook‑outs, and participation in local cultural festivals. Growing up amid the vibrant Black community of Dallas County,
    she embraced a mix of historical heritage and contemporary urban influences, which shape her appreciation for music, dance, and cuisine. These cultural experiences inform her collaborative leadership
    style and her commitment to giving back through mentorship and community service.
