  career_goals: Carmen aims to advance into an Operations Manager role within the next three to five years, where she can shape larger-scale administrative strategies while preserving the flexible, people‑focused
    culture she values. She plans to earn a Project Management Professional (PMP) certification and pursue a Certified Manager (CM) credential to bolster her leadership toolkit. Long‑term, she envisions
    leading a cross‑functional team that drives efficiency initiatives across multiple departments and eventually launching a small consulting practice that helps other businesses design adaptable office
    workflows. Throughout her career progression, she hopes to mentor emerging supervisors and champion workplace policies that balance productivity with employee well‑being.
