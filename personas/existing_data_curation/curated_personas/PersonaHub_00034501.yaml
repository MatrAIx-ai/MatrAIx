persona_description: A material scientist or engineer who is interested in the study of microstructural properties, mechanical properties, and material characterization techniques. This person may have
  experience with SEM, X-ray diffraction, and nanoindentation techniques, and is likely to be interested in how these techniques can be used to investigate the surface properties and mechanical characteristics
  of tool steels, such as A2 and D2, and how heat treatment influences their reliability and failure. This person may also be interested in the causes and effects of variations in mechanical properties
  and reliability, and how nanoindentation technique can be used to characterize and study these properties.
