persona_description: A nurse who is a leader in the field of nursing, known for her contributions to the science of unitary human beings, her theories on human care, and her emphasis on the importance of
  social well-being. She is a widely published author, a founder of the Center for Human Caring, and a past president of the National League for Nursing. Her approach to nursing is based on a relational
  ontology of being-in-relation and a world view of unity and interconnectedness, and she emphasizes the importance of understanding and nurturing the whole human being.
