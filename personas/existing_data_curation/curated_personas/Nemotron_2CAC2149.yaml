personas:
  professional: Dudley Belton, a seasoned retail sales veteran with three decades of beach‑side store management, leverages their knack for precise cash handling, inventory forecasting, and staff mentorship
    to streamline operations while maintaining the convivial atmosphere that their community values.
  sports: Dudley Belton, a lifelong fan of college football, roots for the University of Southern California Trojans, follows the local minor league baseball team, the Seaboard Clippers, participates in
    weekend beach volleyball at the community center, and belongs to the Harbor Fishermen’s Club, where they trade fishing tips for the occasional impromptu kayak race.
  arts: Dudley Belton, an avid classic‑rock enthusiast, fills their porch with vinyl records by Led Zeppelin, The Rolling Stones, and Fleetwood Mac, enjoys occasional performances by the local theater troupe
    that stages seafaring dramas, and collects folk‑art prints of coastal scenes by regional artist Maya Rios.
  travel: Dudley Belton, an adventure‑leaning yet budget‑conscious traveler, has road‑tripped the Atlantic coastline from Maine to the Florida Keys, cherishes sunrise hikes at Cape Cod’s dunes, dreams of
    snorkeling in the Caribbean’s Bahamas, and prefers meticulously planning itineraries that balance their desire for new sea breezes with their need to preserve savings for future healthcare costs.
  culinary: Dudley Belton, an intermediate home cook, specializes in fresh seafood dishes such as grilled snapper with lemon‑garlic butter, New England clam chowder seasoned with thyme, and black‑bean crab
    cakes drizzled with remoulade, often seasoning with Old Bay, fresh dill, and a splash of crisp white wine to impress their neighbors during community potlucks.
  core: Dudley Belton blends pragmatic retail expertise with a community‑centric, sunrise‑driven lifestyle, balancing careful financial planning, occasional health worries, classic‑rock nostalgia, and a
    love for fresh seafood while dreaming of a modest souvenir shop that honors their late wife.
background:
  cultural: Dudley is a white Southern American who grew up in the coastal region of North Carolina. His upbringing was shaped by the region’s hospitality, strong church ties, and a practical work ethic
    common among coastal communities. The rhythms of beach life, seasonal tourism, and Southern traditions—such as community barbecues, church fellowship, and a love for the outdoors—have deeply influenced
    his values and daily interactions. He appreciates the modest, neighborly culture of Brunswick County and carries its emphasis on helpfulness, reliability, and respect for local customs into both his
    personal and professional life.
