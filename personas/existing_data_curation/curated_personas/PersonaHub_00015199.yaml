persona_description: A legal scholar who specializes in international law and the interpretation of treaties, particularly those related to the law of war. Their expertise lies in the determination of whether
  certain incidents are considered a war or civil war, as well as in the interpretation of the Institute Cargo Clauses (ICC) regarding war and strikes risks. They have a deep understanding of the legal
  framework governing the maritime transport industry and the role of the United Nations in international law.
