  hobbies: '[''gardening (vegetables and native plants)'', ''knitting and crocheting'', ''birdwatching and wildlife journaling'', ''home cooking and preserving'', ''listening to classic radio programs'',
    ''reading classic mystery novels'', ''small church fellowship gatherings'']'
  career_goals: Although officially retired, Kathryn’s chief ambition is to preserve her independence and health while sharing the practical knowledge she has amassed. She hopes to expand her backyard garden
    into a small, sustainable food source that can provide fresh produce for her grandchildren when they visit. She plans to compile a handwritten family recipe book to pass to future generations, preserving
    the culinary heritage of her family. Additionally, she wishes to mentor a handful of younger community members—teaching them basic gardening techniques and needlework—so that her skills continue to
    benefit the local neighborhood. A secondary goal is to remain active in her church’s senior outreach, offering assistance to those who need help with household tasks.
