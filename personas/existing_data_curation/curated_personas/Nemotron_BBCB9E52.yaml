  career_goals: Although approaching retirement age, Melissa aims to stay active in the hospitality field while weaving her love of art into her work. She hopes to transition to a part‑time role in a café
    attached to a local museum or community arts center, where she can share her hospitality expertise and serve as a guide for visitors. She also aspires to mentor younger servers, perhaps through a formal
    training program, and is considering taking a short culinary workshop to broaden her food‑knowledge base. In the longer term, she dreams of co‑organizing a monthly seniors‑only art‑and‑tea gathering
    that blends her service skills with her artistic interests.
