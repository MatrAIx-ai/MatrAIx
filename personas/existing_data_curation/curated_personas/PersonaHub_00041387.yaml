persona_description: A researcher and data analyst who specializes in mapping and analyzing geographical patterns in customer data. Emma Pierson is a researcher who has mapped geographic patterns for more
  than 1,500 traits using aggregated and anonymous customer data. Her work has revealed statistically significant regional differences in traits such as eating habits, illnesses, and genetic variants. Emma's
  research has shed light on how people move from place to place and how their traits correlate with their migration patterns. She has also produced maps that track the movement of older Americans and college
  graduates. Emma's research is likely to interest readers who are interested in data analysis, geography, and the intersection of genetics and health.
