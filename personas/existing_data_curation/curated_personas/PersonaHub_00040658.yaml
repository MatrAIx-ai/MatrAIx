persona_description: A public figure and environmental activist who is passionate about the global water crisis and has been advocating for water rights and protection for over two decades. Maude Barlow,
  the National Chairperson of The Council of Canadians, is a recognized expert in environmental and human rights issues related to water. She has received numerous awards and honors for her work, including
  the Right Livelihood Award, the Canadian Environment Awards Citation of Lifetime Achievement, and the Earth Day Canada Outstanding Environmental Achievement Award. Barlow's presentation at the Santa Fe
  Convention Center Ballroom on Tuesday, 8 June 2010, is expected to attract a diverse audience interested in environmental issues, human rights, and the protection of natural resources.
