personas:
  professional: Andres Roque, a veteran Broward County police officer renowned for meticulous crime scene processing, data‑driven crime mapping, and calm conflict de‑escalation, leverages their STEM background
    and disciplined, structure‑loving mindset to lead community policing initiatives while remaining competitively ambitious about advancing to detective work.
  sports: Andres Roque, a crossfit enthusiast who captains a local adult soccer team in the South Florida Soccer League and joins neighborhood basketball pick‑ups, roots for the Miami Heat and Dolphins,
    and spends weekend mornings fishing off the Atlantic shoreline using a soft‑plastic lure collection, illustrates how they blend competitive drive with teamwork.
  arts: Andres Roque fuels their evenings with the vibrant sounds of Celia Cruz, Gloria Estefan, and Rubén Blades, often hosting salsa dancing sessions at family gatherings while also attending the annual
    Miami Art Deco Festival to admire street murals and live Latin‑jazz performances.
  travel: Andres Roque plans travel with a mix of family‑oriented weekend getaways to Key West and the Bahamas and occasional solo fishing charters in the Florida Keys, favoring a balanced itinerary that
    blends relaxation with modest adventure while staying mindful of household budgeting.
  culinary: Andres Roque, a confident home chef, often prepares ropa vieja and lechón using a house‑made sofrito of garlic, cumin, and bell peppers, pairs the meals with plantain side dishes, and enjoys
    experimenting with fresh Caribbean‑caught fish for impromptu grill nights, reflecting their love for rich, flavorful traditions.
  core: Andres Roque blends disciplined police work with a spontaneous love for salsa dancing, a habit of checking their home automation system every hour, and a competitive edge that sometimes borders
    on stubbornness.
background:
  cultural: Andres is a first-generation Cuban-American whose family emigrated from Havana in the early 1970s. He grew up in a bilingual household, speaking Spanish at home and English in school, and was
    immersed in the vibrant Cuban community of South Florida. Family gatherings centered around music, dance, and cuisine - especially salsa, mambo, and dishes like arroz con pollo - instilled a strong
    sense of cultural pride and communal responsibility. His upbringing emphasized respect for elders, the importance of family loyalty, and a resilient work ethic shaped by the immigrant experience. In
    his role as a police officer, Andres draws on this cultural lens to engage effectively with the diverse neighborhoods of Broward County, applying culturally aware policing practices while honoring his
    heritage.
