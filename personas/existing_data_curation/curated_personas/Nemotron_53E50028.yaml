  career_goals: Andres aims to transition from frontline patrol to a detective role where he can apply his STEM background to specialize in cybercrime and organized crime investigations. In the near term,
    he is targeting promotion to sergeant, followed by lieutenant, to influence department policies that blend structured procedures with flexible, community-focused strategies. His long-term ambition is
    to launch a private security consulting firm that offers risk assessments, technology-enhanced training, and community engagement programs for businesses and non-profits throughout South Florida.
