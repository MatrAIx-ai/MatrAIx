  hobbies: '[''reading biographies and art books'',''watercolor painting'',''flower gardening'',''bridge club'',''crossword puzzles'',''attending community college lectures'',''visiting regional art fairs'',''driving
    trips to museums'']'
  career_goals: Although retired, Eunice aims to leave a lasting personal legacy. She is working on a memoir that weaves her family history with the industrial story of Steubenville, and she hopes to donate
    a digitally organized archive of family photographs to the local historical society. She aspires to become a volunteer docent at the nearby art museum, sharing her enthusiasm for unconventional art
    perspectives with visitors. Eunice also wants to launch a small senior‑focused art workshop that encourages creative exploration, and she plans to master video‑calling platforms to stay connected with
    distant relatives.
