  hobbies: '[''Coding small Python projects'', ''PC hardware tinkering'', ''Reading science‑fiction and maritime history'', ''Walking along the Gloucester shoreline'', ''Model ship building'', ''Strategy
    board games with a close‑knit group'']'
  career_goals: Darren aims to obtain his GED within the next year, then enroll in a community college program that offers either an associate degree in information technology or a trade certification in
    electrical work. He envisions securing an apprenticeship that blends his curiosity for how things work with a stable, practical career path. Long‑term, he hopes to build a portfolio of DIY and tech
    projects that could lead to freelance consulting or a small service business, allowing him financial independence while maintaining a balanced, low‑stress lifestyle.
