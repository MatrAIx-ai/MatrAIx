personas:
  professional: Angelyne Lee, a retired community organizer and volunteer coordinator, leverages her meticulous budgeting skills, calm assertiveness, and love for routine to orchestrate senior outreach
    programs and weekly cooking classes at her local church.
  sports: Angelyne Lee supports the Memphis Grizzlies and the Memphis Redbirds, regularly joins the Midtown Senior Walking Club for brisk park strolls, and participates in a Thursday line‑dancing group
    that doubles as light cardio exercise.
  arts: Angelyne Lee sings gospel hymns with her church choir, loves the soulful sounds of Aretha Franklin and B.B. King, enjoys quilting patterns inspired by folk art, and reads Agatha Christie mysteries
    in her book club.
  travel: Angelyne Lee prefers low‑key, senior‑discount travel, often taking the train to Nashville for music festivals, touring the historic sites of New Orleans, and dreaming of a weekend getaway to the
    Great Smoky Mountains to photograph autumn foliage.
  culinary: Angelyne Lee excels at cooking fried catfish with cornmeal crust, collard greens simmered with smoked turkey, buttery cornbread, and sweet potato pie spiced with cinnamon and nutmeg, while experimenting
    with healthier twists using olive oil and low‑sugar syrup.
  core: Angelyne Lee is a steadfast community pillar who blends soulful hospitality with meticulous organization, yet her high emotional sensitivity fuels both her compassionate outreach and occasional
    anxiety‑driven over‑planning.
background:
  cultural: Angelyne’s cultural background is deeply rooted in African‑American traditions of the South. Raised in Memphis, she grew up surrounded by the city’s blues, soul, and gospel music heritage and
    the close‑knit life of the Black church, which emphasized communal support, oral storytelling, and spiritual resilience. Her family’s culinary legacy includes soul‑food staples such as fried catfish,
    collard greens, cornbread, and sweet potato pie. The legacy of Memphis’s civil‑rights activism, intergenerational respect for elders, and a strong sense of community solidarity shape her values, outlook,
    and everyday practices.
attributes:
  skills: '[''Event Coordination'', ''Volunteer Scheduling'', ''Household Budget Management'', ''Traditional Southern Cooking'', ''Sewing and Quilting'', ''Gardening and Horticulture'', ''Elder Caregiving'',
    ''Conflict Mediation'', ''Public Speaking'', ''Basic Computer Literacy (Word, Excel)'', ''Church Administration'']'
  hobbies: '[''Church choir'', ''Community gardening'', ''Line dancing'', ''Quilting circle'', ''Southern soul‑food cooking'', ''Mystery book club'', ''Walking group'', ''Volunteer at food bank'']'
  career_goals: Although retired from formal employment, Angelyne aims to deepen her community involvement by leading a senior outreach program at her local church, mentoring younger volunteers, and establishing
    a weekly cooking class that teaches healthy soul‑food recipes. She hopes to author a memoir that captures her family’s Memphis heritage and the stories of her community. Maintaining physical health
    and managing anxiety through regular yoga, walking groups, and support circles are also top priorities. If possible, she plans to obtain a caregiver certification to formalize her support for neighbors
    in need.
