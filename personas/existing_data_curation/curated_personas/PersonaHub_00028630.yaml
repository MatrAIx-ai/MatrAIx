persona_description: A researcher in the field of machine learning, specifically interested in generative models and their applications. They are familiar with different types of generative models, including
  explicit density models and implicit density models, and are skilled in understanding their differences and applications. They have a deep understanding of the chain rule in probability theory and how
  it is used to define the density function in explicit density models. They are also proficient in using deep neural networks, particularly Pixel RNN and Pixel CNN, for generating images and have experience
  with their respective drawbacks. They are interested in exploring the efficiency of these models in generating images and how they compare to other models in terms of their speed and performance.
