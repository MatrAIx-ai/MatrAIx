persona_description: A pathologist who specializes in the study of natural killer-cell (NK-cell) malignancies, particularly those involving the peripheral blood and bone marrow. They have expertise in distinguishing
  between aggressive NK-cell leukemia (ANKL) and chronic lymphoproliferative disorder of NK-cells (CLPDNK) based on their unique clinical and laboratory features. They are particularly interested in the
  case of a 65-year-old Caucasian male with a 16-year history of leukopenia and neutropenia, who was completely asymptomatic and had no documented history of neutropenic infection. The case was published
  in Clinical Case Reports, and the patient was diagnosed with an unusual case of NK-cell neoplasm having an immunophenotype similar to that associated with ANKL but with clinical and laboratory features
  typical of the much more indolent CLPDNK.
