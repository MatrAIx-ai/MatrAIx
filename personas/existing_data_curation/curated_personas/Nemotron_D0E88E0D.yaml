  career_goals: Although retired, Evan aims to preserve the industrial heritage of Bloomsburg by compiling oral histories and photographs for the local historical society. He plans to complete a memoir
    that captures his family’s generational experiences, including genealogy research he has begun. He also hopes to refine his digital photography skills to document his garden and the surrounding countryside.
    A personal ambition is to restore a vintage 1965 Chevrolet truck as a tangible link to his youth, combining his mechanical expertise with a competitive drive to finish the project before he turns eighty.
    Finally, he wishes to mentor his grandchildren in practical skills, fostering self‑reliance while encouraging their curiosity.
