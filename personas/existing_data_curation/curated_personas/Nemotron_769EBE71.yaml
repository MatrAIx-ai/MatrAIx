personas:
  professional: A research‑oriented data analyst named Yumi Hong leverages Python, R, and molecular biology lab skills to craft sustainable agriculture insights, thriving in flexible, collaborative environments
    where curiosity meets pragmatic experiment design, and they find fulfillment in interdisciplinary teamwork.
  sports: Yumi Hong spends weekends hiking the trails of Iowa State Parks, participates in a local ultimate frisbee league that practices at the Des Moines Recreation Center, and supports the Iowa Hawkeyes
    football team, balancing low‑impact cardio with occasional yoga sessions, and they often capture trail photos to share with friends.
  arts: Yumi Hong paints serene watercolors of Midwestern prairie scenes, sketches vintage botanical illustrations, and plays the keyboard to Debussy’s “Clair de Lune”, regularly attending community art
    workshops and board‑game nights that blend strategy with social creativity, and they often experiment with mixed media to express their mood.
  travel: Yumi Hong prefers spontaneous, budget‑friendly trips, often camping in Iowa’s Loess Hills or taking weekend road trips to the Badlands, while dreaming of a spring hike through New Zealand’s Tongariro
    Alpine Crossing and a culinary pilgrimage to Seoul, planning with a mix of last‑minute deals and a detailed spreadsheet that sometimes goes ignored, and they relish the spontaneity even when it clashes
    with their occasional disorganization.
  culinary: Yumi Hong excels at making kimchi‑jjigae and mapo tofu using fresh vegetables from their garden, experiments with seasonal ingredients like heirloom tomatoes and kale in bibimbap bowls, and
    enjoys pairing dishes with aromatic herbs such as cilantro and lemongrass, though they sometimes over‑spice in pursuit of bold flavors.
  core: Yumi Hong blends scientific rigor with artistic calm, juggling a love for data‑driven sustainability and watercolor serenity while battling anxiety, occasional disorganization, and a penchant for
    late‑night board‑game marathons.
background:
  cultural: Yumi was raised in a bilingual East-Asian household - her mother is Korean and her father is Chinese - while growing up in the Midwest. She celebrates Lunar New Year, enjoys traditional holidays
    with her family, and speaks both Korean and Mandarin at home, though English is her primary language. Her cultural upbringing emphasizes education, group harmony, and respect for elders, which aligns
    with her cooperative and considerate personality. Living in Ames, Iowa, she has blended these traditions with Midwestern community values, participating in university Asian student organizations and
    local cultural festivals. This dual cultural lens influences her worldview, fostering both a curiosity about global scientific advances and a practical sense of contributing to her local community.
attributes:
  skills: '[''Python programming'', ''R statistical analysis'', ''MATLAB'', ''Molecular biology techniques (PCR, gel electrophoresis)'', ''Data visualization (Matplotlib, Tableau)'', ''Scientific writing'',
    ''Critical thinking'', ''Problem solving'', ''Cross-cultural communication'', ''Team collaboration'', ''Basic machine learning (scikit-learn)'', ''Project coordination (Agile basics)'']'
  hobbies: '[''Hiking'', ''Vegetable gardening'', ''Cooking Korean and Chinese cuisine'', ''Yoga and meditation'', ''Watercolor painting'', ''Keyboard playing'', ''Reading science-fiction'', ''Attending
    community science talks'', ''Board-game nights'', ''Volunteering at local community garden'']'
  career_goals: Yumi aims to translate her research skills into a role that advances sustainable agriculture or environmental health, ideally within a research institute, non-profit, or data-driven consultancy
    that values interdisciplinary collaboration. In the short term she plans to secure a research associate or data analyst position that offers flexible hours and a supportive mental-health culture. Over
    the next five years she hopes to pursue a PhD in environmental engineering or agro-informatics, lead projects that integrate data science with field experiments, and eventually mentor students from
    under-represented backgrounds. She also wants to maintain a work-life balance that allows her to continue her self-care practices.
