  hobbies: '[''Fishing and Crab Digging'', ''Sailing on the Merrimack River'', ''Woodworking'', ''DIY Auto Repair'', ''Reading about Emerging Transportation Technologies'', ''Historical Genealogy Research'',
    ''Gardening'', ''Community Volunteer Work'', ''Listening to Classic Rock'', ''Cooking Seafood Dishes'']'
  career_goals: Doyle aims to transition from frontline driving to a supervisory role within the transportation sector. He plans to earn a Certified Transportation Professional (CTP) certification and a
    logistics management diploma to qualify for fleet manager positions. Over the next five years, he hopes to lead a small team of drivers, implement efficiency‑enhancing technologies such as telematics,
    and develop a local micro‑fleet that delivers artisanal seafood and farm products within New England. He also aspires to mentor younger drivers, sharing his safety and customer‑service expertise, while
    gradually building a side business that could serve as a steady source of income for his retirement.
