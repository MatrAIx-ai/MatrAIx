personas:
  professional: Doyle Dubois, a 52‑year‑old veteran driver and on‑site salesperson, leverages his CDL expertise, meticulous route planning, and courteous customer service to streamline logistics while methodically
    preparing for a future fleet‑manager role.
  sports: Doyle Dubois, a dedicated member of the Newburyport Sailing Club, spends his weekends navigating the Merrimack River while cheering on the Boston Red Sox and New England Patriots, and maintains
    a modest fitness routine of early‑morning jogs and occasional community pick‑up basketball games at the local gym.
  arts: Doyle Dubois, an avid fan of classic rock legends like Led Zeppelin and The Rolling Stones, often pairs his woodworking projects with vinyl sessions while frequenting the Peabody Essex Museum to
    admire maritime paintings by Winslow Homer and catching occasional performances at the downtown Newburyport theater featuring actors such as Denzel Washington in classic film screenings.
  travel: Doyle Dubois, who meticulously plans his voyages with spreadsheet itineraries, favors coastal getaways such as a weekend retreat in Bar Harbor, Maine, a sailing excursion to the Azores, and a
    nostalgic road trip along Route 66, balancing his love for maritime history with the practical need to keep travel costs within his retirement budget.
  culinary: Doyle Dubois, a competent home cook at 52, delights in preparing New England staples like buttery lobster rolls, creamy clam chowder, and garlic‑infused crab cakes, often seasoning with fresh
    thyme and parsley while classic rock riffs from The Who echo through his modest kitchen.
  core: Doyle Dubois blends a pragmatic, detail‑oriented work ethic with a restless curiosity for marine life and classic rock, yet habitually postpones dentist visits while hoarding an ever‑growing collection
    of vintage power tools.
background:
  cultural: Doyle was raised in a white New England family with roots tracing back to Irish and French‑Canadian ancestors, reflected in his name. Growing up in Newburyport, he absorbed the town’s maritime
    heritage, community spirit, and reverence for hard work. He participates in local traditions such as the Newburyport Folk Festival, Fourth of July fireworks, and seasonal seafood celebrations. The cultural
    emphasis on reliability, modesty, and civic involvement resonates with his organized and considerate personality. While honoring these traditions, he remains open to new ideas, integrating modern technology
    into his profession and staying engaged with broader regional developments.
attributes:
  skills: '[''Commercial Driver License (CDL)'', ''Advanced Route Planning'', ''Vehicle Maintenance and Troubleshooting'', ''Safety Compliance and Hazardous Materials Handling'', ''Customer Service and
