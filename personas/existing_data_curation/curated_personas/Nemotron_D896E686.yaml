  career_goals: Although still a toddler, Carmen already imagines a future where she can channel her curiosity and love of art into a creative profession. She looks forward to school where she can excel
    in drawing and music, hoping to become a visual artist or performer who can inspire others. Her competitive spirit drives her to aim for top placement in school art showcases, and she dreams of using
    her outgoing personality to lead community projects that celebrate cultural expression.
