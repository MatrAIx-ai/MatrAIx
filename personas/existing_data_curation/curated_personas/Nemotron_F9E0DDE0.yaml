  career_goals: Tin imagines herself as a future artist who paints bright, joyful scenes inspired by Brooklyn parks and family celebrations, a storyteller who shares tales from her Vietnamese heritage and
    city life, and perhaps one day a teacher who encourages other children to explore art, nature, and curiosity.
