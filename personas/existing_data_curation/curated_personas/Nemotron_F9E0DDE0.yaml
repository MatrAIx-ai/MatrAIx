personas:
  professional: Tin Le, a four‑year‑old budding block architect, stacks colorful LEGO bricks into imaginative structures, displaying early spatial reasoning and a love for unconventional designs, while
    their relaxed attitude toward rules lets play sessions flow freely.
  sports: Tin Le, a four‑year-old who dabbles in the neighborhood kindergarten soccer club called the Little Rockets, loves swinging on the playground, avidly watches the New York Yankees on TV, and values
    spontaneous play over strict training schedules.
  arts: Tin Le, a four‑year-old who spends afternoons drawing whimsical animals inspired by Dr. Seuss books, sings along to The Wiggles, and enjoys watching the animated series Paw Patrol, finds artistic
    expression a key outlet for their curiosity and unconventional ideas.
  travel: Tin Le, a four‑year-old who has explored the local aquarium, toured Disneyland in Anaheim, dreams of seeing the Great Wall of China, and prefers short family road trips with plenty of playground
    stops, balancing adventure with the comfort of familiar routines.
  culinary: Tin Le, a four‑year-old who adores creamy mac and cheese, chicken nuggets, and sliced strawberries, likes helping stir pancake batter with a wooden spoon, but is notoriously picky about broccoli
    and peas, often hiding them under a napkin.
  core: Tin Le is a curious, solitary four‑year‑old who thrives on flexible play, art, and occasional bursts of assertive imagination, while quietly navigating the world with a relaxed, disorganized charm.
background:
  cultural: Tin is a first-generation Vietnamese-American raised in the vibrant neighborhoods of Brooklyn, New York. Her family honors Vietnamese traditions such as Tết (Lunar New Year) with home-cooked
    dishes, lantern decorations, and folk songs, while also participating in New York’s multicultural festivals and community events. At home she hears both English and Vietnamese spoken, which nurtures
    her bilingual abilities and a deep appreciation for both her ancestral culture and the diverse urban environment around her.
