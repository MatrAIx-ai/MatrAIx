  hobbies: '[''Salsa, bomba, and plena dancing'',''Cooking Puerto Rican cuisine'',''Gardening (herbs, tomatoes)'',''Neighborhood walks'',''Baseball watching'',''Playing dominoes'',''Church choir participation'']'
  career_goals: At 91, Francisco's primary ambition is to stay active, healthy, and independent while continuing to support his wife and family. He aims to preserve and share Puerto Rican cultural traditions
    with younger generations, document his life story for his grandchildren, and remain a trusted mentor and organizer at the senior center and local parish. He also hopes to maintain his routine of weekly
    church attendance and regular community gatherings, reinforcing the sense of cohesion he values.
