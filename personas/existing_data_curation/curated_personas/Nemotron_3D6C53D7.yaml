  career_goals: Crystal aims to pursue a Ph.D. in Education Technology or STEM Education within the next three years, with a focus on developing interdisciplinary, STEAM‑based curricula that merge art and
    science. She aspires to secure a tenure‑track faculty position where she can lead research on innovative teaching methods, mentor underrepresented students, and launch community outreach programs that
    bring hands‑on STEM experiences to local schools in Rochester and beyond. In the long term, she envisions founding an EdTech startup that offers immersive, gamified learning platforms.
