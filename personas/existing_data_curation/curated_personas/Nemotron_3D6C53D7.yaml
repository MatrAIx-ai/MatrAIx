personas:
  professional: Crystal Sanabria is a 25‑year‑old STEM educator who merges her strong scientific foundation with digital illustration expertise to design immersive, visual curricula, using her spontaneous
    imagination and collaborative spirit to engage diverse learners while often battling the occasional missed deadline.
  sports: Crystal Sanabria channels her kinetic energy into salsa and cumbia nights at the Rochester Ballroom Club, weekend hikes through the Finger Lakes with the Rochester Outdoor Adventures group, and
    spontaneous pick‑up basketball games, all while cheering on the Rochester Red Wings and Buffalo Bills as her favorite local sports teams.
  arts: Crystal Sanabria creates bold abstract canvases echoing Kandinsky, crafts digital illustrations in a Loish‑inspired whimsical style, sharpens her wit in improv workshops with the Rochester Improv
    Collective, and regularly quotes speculative‑fiction authors like N.K. Jemisin during creative brainstorming sessions.
  travel: Crystal Sanabria prefers spur‑of‑the‑moment, budget‑friendly escapes, having hiked the waterfalls of Watkins Glen and photographed sunrise over Seneca Lake, while dreaming of backpacking through
    Granada’s Albayzín and witnessing Kyoto’s cherry blossoms, planning trips via group chats rather than rigid itineraries.
  culinary: Crystal Sanabria is a competent home cook who delights in whipping up spicy shrimp tacos with fresh cilantro and lime, earthy mushroom risotto accented with porcini, and vegan chickpea tikka
    masala, pairing each meal with single‑origin pour‑over coffee and occasionally dining at Rochester’s farm‑to‑table spot The Red House for a seasonal tasting menu.
  core: Crystal Sanabria, a 25‑year‑old visual‑savvy STEM educator, blends spontaneous creativity with a penchant for missed deadlines, turning every mishap into a colorful learning experiment.
background:
  cultural: Crystal was born to Colombian parents who emigrated to the United States before she turned one. Raised in a bilingual household, she grew up speaking both Spanish and English, celebrating traditional
    Colombian festivals such as Carnaval de Barranquilla and savoring family recipes like arepas, empanadas, and sancocho. Her community involvement has kept her connected to the vibrant Latinx scene in
    Rochester, where she participates in cultural events, volunteers at local Latino youth programs, and incorporates Colombian artistic motifs and storytelling traditions into her teaching and creative
    projects. These experiences have instilled a strong sense of cultural pride and a commitment to fostering inclusive, multicultural learning environments.
