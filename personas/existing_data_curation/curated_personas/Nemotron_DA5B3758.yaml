  career_goals: Looking ahead, Arthur hopes to combine his love of technology and his concern for living things by pursuing a career in software development focused on educational or environmental applications.
    He envisions designing interactive games or apps that teach kids about wildlife conservation, allowing him to blend coding with his knowledge of local ecosystems. In the short term, he aims to earn
    a place in a STEM-focused high-school program, deepen his programming abilities, and volunteer at the community animal shelter to gain hands-on experience with animal care. Ultimately, he dreams of
    attending a university where he can major in computer science and environmental science, preparing for a role as a developer of tools that support sustainable practices.
