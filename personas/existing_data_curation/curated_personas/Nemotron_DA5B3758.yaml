personas:
  professional: Arthur Reid, a 13‑year‑old budding programmer, channels a love for structured challenges into building simple games and automation scripts in Scratch and Python, balancing a preference for
    predictability with a relaxed, sometimes chaotic coding schedule while quietly sharing creations with a close‑knit group of friends.
  sports: Arthur Reid, a fan of the Atlanta Falcons, Atlanta United and the Atlanta Braves, spends weekend mornings birdwatching and jogging around Stone Mountain Park while occasionally playing on a local
    youth soccer team, preferring low‑key fitness routines over organized school sports.
  arts: Arthur Reid creates digital fan art of Minecraft characters and sketches local birds, drawing inspiration from artists like Jeremy Mann and listening to bands such as Weezer and Olivia Rodrigo while
    weaving storytelling elements into their drawings.
  travel: Arthur Reid, who loves planning nature getaways with a family‑approved checklist, has visited Savannah’s historic squares and dreams of hiking the Appalachian Trail and exploring Yellowstone,
    favouring quiet cabins over crowded amusement parks.
  culinary: Arthur Reid enjoys Southern comfort foods like fried chicken, mac and cheese and peach cobbler, often helping set the table for Thanksgiving and experimenting with simple recipes such as microwave
    mug brownies, while favouring popcorn and soda as snack staples during gaming sessions.
  core: Arthur Reid is a quietly ambitious teen who balances a love for structured coding with a wandering birdwatcher’s heart, constantly scribbling in journals to tame a restless mind.
background:
  cultural: Arthur was raised in a middle-class, white family in Stone Mountain, Georgia, a suburb of Atlanta with deep Southern roots. His parents, who trace their ancestry to English and German immigrants,
    emphasize values of modesty, respect, and community involvement. The family regularly attends a local Methodist church, where Arthur participates in youth-group activities and community service projects,
    such as food drives and park clean-ups. Growing up near the historic Stone Mountain Park, he developed an appreciation for the region’s natural scenery and wildlife, which complements his interest in
    birdwatching. While he celebrates typical American holidays—Thanksgiving, Christmas, and Easter—with close family gatherings, he prefers the quieter moments of these events, often helping with meal
    preparation or setting up decorations rather than being in the center of the festivities. The blend of Southern hospitality, a modest religious upbringing, and exposure to the tech-savvy school environment
    shapes his worldview, fostering both a sense of community responsibility and an inclination toward solitary, reflective pursuits.
