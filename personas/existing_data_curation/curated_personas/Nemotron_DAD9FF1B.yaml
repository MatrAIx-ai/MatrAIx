personas:
  professional: Rosa Carballo, a budding young engineer‑in‑training, spends classroom time mastering fine motor skills through LEGO and puzzles, and they demonstrate organized planning, reliability, and
    a balanced curiosity that guides their imaginative problem‑solving.
  sports: Rosa Carballo, a member of the local youth soccer team that practices at the Ionia County park, enjoys gentle nature walks with their family and participates in occasional Saturday basketball
    scrimmages, preferring small‑group play that aligns with their desire for calm, harmonious activity, and they cherish the sense of teamwork.
  arts: Rosa Carballo, an enthusiastic fan of picture books like 'Where the Wild Things Are' and music from Raffi, spends afternoons coloring detailed mandala pages and humming along to The Wiggles, letting
    these creative outlets shape their gentle yet focused identity, and they often share their drawings with close friends.
  travel: Rosa Carballo, who delights in visiting the annual Ionia County Fair and has taken family trips to the serene shores of Grand Haven on Lake Michigan, prefers short, well‑planned excursions that
    blend nature exploration with the comfort of familiar community gatherings, and they always pack a pocket notebook to catalog leaves and rocks.
  culinary: Rosa Carballo, who loves helping their mother bake chocolate chip cookies and often adds a pinch of cinnamon, enjoys simple meals like macaroni‑and‑cheese and snack‑time apple slices, showing
    a budding fondness for classic comfort foods and hands‑on kitchen fun, and they occasionally sneak an extra cookie when no one is looking.
  core: Rosa Carballo is a methodical, six‑year‑old mind who balances a love for quiet, structured play with waves of anxiety, often finding calm in LEGO, puzzles, and the comforting rhythms of family life,
    while they occasionally succumb to impulsive snack cravings.
background:
  cultural: Rosa lives in Saranac, Michigan, a close‑knit community in Ionia County that reflects classic Midwestern values of modesty, family orientation, and a strong sense of community. Her family, bearing
    the Spanish‑origin surname Carballo, blends those traditions with the local white American culture, celebrating seasonal county fairs, church gatherings, and occasional family recipes that hint at a
    Hispanic heritage. This multicultural backdrop nurtures Rosa’s kindness, cooperation, and respect for both tradition and new ideas.
