  hobbies: '[''Reading picture books'', ''Drawing and coloring'', ''Building LEGO sets'', ''Solving puzzles'', ''Nature walks and leaf collecting'', ''Playing with dolls'', ''Baking simple recipes with
    family'', ''Listening to children’s music'']'
  career_goals: Rosa dreams of growing up to be a teacher or librarian because she loves books, order, and helping others learn. She imagines creating safe, organized spaces where children feel supported
    and happy. Occasionally she mentions wanting to be a veterinarian to care for animals, reflecting her kindness and practical desire to make a tangible difference.
