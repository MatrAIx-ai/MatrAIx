personas:
  professional: Amanda Wheeler, a seasoned retail supervisor in Nampa, blends her curiosity for data‑driven insights with hands‑on practicality, leading sales teams through flexible coaching while streamlining
    inventory and visual merchandising to hit targets, even if her desk sometimes looks like controlled chaos.
  sports: Amanda Wheeler enjoys tackling the foothills around Nampa with the Nampa Outdoor Adventure Club, follows the Boise State Broncos football and the Portland Trail Blazers basketball teams, and keeps
    a loosely‑structured fitness routine that alternates between weekend hikes, occasional yoga classes, and an occasional 5 k run when motivation strikes.
  arts: Amanda Wheeler unwinds by listening to folk‑rock storytellers like The Lumineers and Bon Iver, slipping into the occasional indie film such as Little Miss Sunshine, and attending the Idaho Shakespeare
    Festival, where the blend of classic drama and local talent fuels her creative curiosity.
  travel: Amanda Wheeler prefers spontaneous road trips to nearby gems like Yellowstone National Park and Sun Valley’s ski area, while dreaming of a culinary pilgrimage to Tuscany’s vineyards, carefully
    balancing family obligations with the urge to explore new trails.
  culinary: Amanda Wheeler cultivates heirloom tomatoes and kale in her garden, then transforms them into farm‑to‑table delights like rosemary‑infused roasted beet salad and quinoa‑stuffed peppers, while
    occasionally perfecting a sourdough starter that she proudly shares at neighborhood potlucks.
  core: Amid her love for data‑driven retail strategies and spontaneous garden‑to‑plate experiments, Amanda Wheeler balances a chronic worry habit with yoga‑induced calm, often misplacing her planner but
    never her enthusiasm for learning.
background:
  cultural: Amanda grew up in a middle‑class, white family in the Pacific Northwest, later relocating to Nampa, Idaho, where she embraced the region’s blend of small‑town community values and outdoor lifestyle.
    Her cultural upbringing emphasizes self‑reliance, neighborly cooperation, and participation in local events like county fairs and farmers’ markets. While she identifies with mainstream American cultural
    norms, she also values the independent, pragmatic spirit characteristic of Idaho’s western frontier heritage.
