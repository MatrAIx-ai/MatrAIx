  career_goals: Amanda aims to advance to a store manager position within the next two years, leveraging her supervisory experience to oversee larger operations and drive higher profitability. Long‑term,
    she envisions moving into regional retail management or opening her own boutique that emphasizes community‑focused service. She also plans to complete a bachelor’s degree in business to solidify her
    credentials and increase her strategic decision‑making capacity.
