  hobbies: '[''Abstract Painting'', ''Photography'', ''Reading Contemporary Fiction'', ''Urban Exploration'', ''Hiking'', ''Yoga'', ''Cooking Traditional Mexican Cuisine'', ''Attending Art Exhibitions'',
    ''Book Club Participation'', ''STEM Mentoring'']'
  career_goals: She aspires to become a senior project manager or principal engineer leading large‑scale, sustainable infrastructure developments in the New York metropolitan area. Over the next five years,
    Alejandra plans to obtain her professional engineering license, complete an advanced certification in sustainable design, and leverage her business background to transition into an engineering‑management
    role that integrates innovative materials and artistic design concepts. Ultimately, she aims to launch her own consultancy focused on eco‑friendly civil engineering solutions that blend functionality
    with aesthetic vision.
