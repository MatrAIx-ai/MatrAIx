  career_goals: Jonathan dreams of becoming a multimedia storyteller—perhaps an animator or video‑game designer—who can blend his love for art, technology, and cultural narratives. He envisions creating
    interactive worlds that let others explore stories and emotions, and later hopes to lead community workshops where kids can express themselves through drawing, coding, and music, all while maintaining
    the creative freedom he values.
