personas:
  professional: Jonathan Diaz, an aspiring comic‑strip creator and budding digital artist, leverages a curious eye for detail and a competitive streak to craft daily sketches on a tablet, and they let their
    laid‑back, often‑disorganized scheduling spark spontaneous storytelling experiments in Scratch.
  sports: Jonathan Diaz thrives on the soccer field, playing as a forward for the Neighborhood Kids Soccer Club’s U‑11 team during the fall season, idolizing the regional professional side the River City
    Strikers, and they complement competitive matches with energetic pick‑up games at the local park to channel their restless energy.
  arts: Jonathan Diaz immerses themselves in the world of graphic novels, devouring titles like "Bone" and "Amulet" while drawing inspiration from comic legends such as Jack Kirby and Kazu Kibuishi, they
    fill their playlists with a blend of upbeat regional folk tunes and pop hits from artists like Ariana Grande, and they spend weekends at the local art museum or community festival absorbing murals and
    street art.
  travel: Jonathan Diaz prefers spontaneous weekend road trips to nearby state parks where they can trail‑hike and sketch wildlife, yet they dream of a future family adventure to Japan’s Akihabara district
    to dive into anime culture and a museum‑filled tour of Paris to see the Louvre’s masterpieces.
  culinary: Jonathan Diaz enjoys munching on cheesy pepperoni pizza slices, building homemade tacos topped with fresh mango salsa and cilantro, and they love mixing fruit smoothies bursting with banana,
    strawberry, and a splash of orange juice, although their kitchen experiments are usually supervised by a parent due to their beginner cooking level.
  core: Jonathan Diaz is a fiercely curious 10‑year‑old whose boundless imagination fuels comic‑book creations and soccer battles, yet their scattered habits and flash‑of‑anxiety episodes often leave them
    scrambling for calm amidst the chaos.
background:
  cultural: Jonathan’s family maintains strong Mexican roots, speaking Spanish at home and celebrating traditions such as Día de los Muertos, Cinco de Mayo, and family gatherings featuring dishes like tamales
    and pozole. Their heritage traces back to the state of Jalisco, and stories of ancestors are shared during holidays. Living in Rancho Cucamonga’s diverse community, he blends these cultural practices
    with the broader American school environment, giving him a bicultural identity that influences his language, artistic preferences, and social interactions.
