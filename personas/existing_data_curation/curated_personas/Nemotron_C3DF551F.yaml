    and critical care handling'', ''Evidence‑based research and continuing education'']'
  hobbies: '[''Soccer (community league)'', ''Hiking in Angeles National Forest'', ''Cooking traditional Mexican cuisine'', ''Macro photography of animals'', ''Listening to regional Mexican music'', ''Playing
    strategy video games'', ''Volunteering at animal shelter'', ''Participating in local cultural festivals'']'
  career_goals: Rafael aims to become a board‑certified small‑animal surgeon within the next five years while simultaneously laying the groundwork for a community‑focused veterinary clinic in La Puente
    that offers low‑cost preventive care, mobile outreach to underserved neighborhoods, and Spanish‑language services. He plans to publish case studies on stress‑related animal behaviors, mentor Latinx
    veterinary students, and lead a local animal‑welfare coalition. His competitive drive pushes him to present at national conferences and earn recognition as a leading practitioner who bridges cutting‑edge
    veterinary science with culturally sensitive care.
