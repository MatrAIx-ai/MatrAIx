personas:
  professional: Rafael Velez, a 26‑year‑old small‑animal veterinarian, blends precise surgical expertise with a data‑driven, evidence‑based mindset while leveraging bilingual communication to build trust
    with Spanish‑speaking clients and constantly refining clinic workflow, and they are fiercely competitive, seeking board certification in surgery and aiming to launch a low‑cost, community‑focused practice
    in La Puente.
  sports: Rafael Velez plays forward for the La Puente Strikers in a competitive weekend soccer league, avidly follows LAFC and the LA Galaxy, and they routinely join the Angeles Trail Runners for weekend
    hikes, training to shave five minutes off their 10‑km trail run time.
  arts: Rafael Velez captures macro photographs of backyard sparrows and domestic cats, curates playlists featuring Los Tigres del Norte, Vicente Fernández, and Natalia Lafourcade, and unwinds by streaming
    strategy video games like Civilization VI, applying the same analytical precision they use in surgical planning.
  travel: Rafael Velez plans trips with a mix of meticulous itinerary work and spontaneous detours, favoring weekend getaways to the Angeles National Forest and Big Bear Lake, occasional flights to Oaxaca
    to explore regional markets and cuisine, and they dream of visiting the Galápagos Islands to photograph wildlife while budgeting carefully for their clinic’s future.
  culinary: Rafael Velez enjoys cooking intermediate‑level Mexican dishes like mole poblano, chicken tamales, and fresh salsa with roasted tomatillos, diced jalapeños, and dark chocolate, and they often
    perfect the balance of smoky and spicy flavors while occasionally over‑seasoning to the point of making guests reach for extra tortillas.
  core: Rafael Velez, a 26‑year‑old small‑animal surgeon‑in‑training, balances a relentless competitive drive with chronic worry, channels stress into soccer, hiking, macro photography, and cooking, and
    they habitually check their phone for market updates during clinic breaks.
background:
  cultural: Rafael is a first‑generation Mexican‑American raised in La Puente. His parents emigrated from Michoacán and instilled strong family values, bilingual fluency, and a deep appreciation for Mexican
    traditions such as Día de Los Muertos and quinceañeras. Growing up in a close‑knit Latino neighborhood, he learned the importance of community support and hard work, often helping out at his family’s
    small auto‑repair shop. These roots shape his compassionate, culturally attuned approach to veterinary care, driving him to provide Spanish‑language services, respect cultural attitudes toward pets,
    and give back to the community that raised him.
attributes:
  skills: '[''Small‑animal clinical examination'', ''Surgical procedures (spay/neuter, soft‑tissue surgery)'', ''Diagnostic imaging (radiography, ultrasound)'', ''Laboratory diagnostics and pathology'',
