  career_goals: Aiming to transition into a senior technical architect role, Jesus wants to lead a small development team where he can set technical direction while preserving the flexibility he values.
    He plans to earn an AWS Solutions Architect certification, expand his expertise in cloud‑native architectures, and eventually launch his own consultancy focused on building affordable web platforms
    for local small businesses and community organizations, especially those serving the Mexican‑American community in Houston. He also hopes to formalize a mentorship program within his current company,
    sharing his practical knowledge with up‑and‑coming developers.
