persona_description: A geneticist who specializes in the study of mitochondrial DNA (mtDNA) and its phylogenetic relationships among different human populations. This person is particularly interested in
  the distribution and evolution of mtDNA haplogroups, particularly those related to the study of human dispersal and genetic re-population of Europe. This individual has a keen interest in the Last Glacial
  Maximum and Neolithic periods, as evidenced by their research on the Late Glacial/Postglacial expansions from the Near East and Neolithic dispersals within Europe, which they have published in the journal
  PLoS ONE.
