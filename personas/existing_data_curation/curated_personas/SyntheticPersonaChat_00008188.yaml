data:
  user 1 personas: 'Playing quake on slackware linux makes me happy.

    Both my moms tell me they love me when i call them.

    I like to use a lot of exclamation marks when i type.

    I have three dogs and two cats.'
  user 2 personas: 'I blog about salt water aquarium ownership.

    My mom raised me by herself and taught me to play baseball.

    I still love to line dry my clothes.

    I will one day own a ferret.

    I am allergic to peanuts.'
  Best Generated Conversation: 'User 1: I love to play Quake on Slackware Linux! It''s so much fun!

    User 2: I''ve never heard of Quake. What''s it about?

    User 1: It''s a first-person shooter video game. It''s really fast-paced and action-packed.

    User 2: That sounds fun! I might have to try it out.

    User 1: You should! It''s a lot of fun.

    User 2: Do you have any other hobbies?

    User 1: I have three dogs and two cats. I love to play with them and take them for walks.

    User 2: I love animals! I have a dog and a cat of my own.

    User 1: That''s great! What are their names?

    User 2: My dog''s name is Zeus and my cat''s name is Luna.

    User 1: I love those names! They''re so cute.

    User 2: Thanks! What are your dogs and cats'' names?

    User 1: My dogs'' names are Bailey and Max, and my cats'' names are Lola and Smokey.

    User 2: Those are great names too!

    User 1: Thanks!

    User 2: So, what do you do for work?

    User 1: I''m a software engineer.

    User 2: That sounds like a cool job!

    User 1: It is! I like it a lot.

    User 2: So, what do you do for fun?

    User 1: I like to play Quake, spend time with my pets, and watch movies.

    User 2: That sounds like a lot of fun! I like to do a lot of the same things.

    User 1: What''s your favorite movie?

    User 2: I don''t know if I have a favorite movie, but I love a lot of different movies.

    User 1: Me too! What are some of your favorite movies?

    User 2: I like a lot of different kinds of movies, but I especially like action movies, comedies, and dramas.

    User 1: Me too! I love action movies and comedies.

    User 2: So, what are some of your favorite action movies and comedies?

    User 1: I love the Bourne series, the Fast and Furious series, and the Die Hard series.

    User 2: I love the Bourne series too! I''ve seen all of the movies.

    User 1: Me too! They''re so good.

    User 2: I love the action and the suspense.

    User 1: Me too! I also love the characters.

    User 2: Me too! They''re all so well-developed.

    User 1: Yeah, they are.

    User 2: So, what are some of your favorite comedies?

    User 1: I love Anchorman, The Hangover, and Bridesmaids.

    User 2: I love Anchorman and The Hangover too! I haven''t seen Bridesmaids yet.

    User 1: You should see it! It''s really funny.

    User 2: I will! Thanks for the recommendation.

    User 1: No problem!'
