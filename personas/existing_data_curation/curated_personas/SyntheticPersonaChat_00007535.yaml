    User 1: That''s cool. I like to go out to bars too, but I don''t drink beer. I''m more of a whiskey drinker.

    User 2: I like whiskey too, but I don''t drink it as often as I drink beer.

    User 1: I know what you mean. Beer is just more social.

    User 2: Exactly!

    User 1: So, what''s your favorite beer?

