  hobbies: '[''Soccer'', ''Cumbia & salsa dancing'', ''DIY electronics'', ''Model car building'', ''Competitive video gaming'', ''Cooking Mexican cuisine'', ''Community festivals'', ''Street photography'']'
  career_goals: Julio plans to complete his GED within the next year and then enroll in a community college manufacturing technology program. He aims to become a certified CNC machinist, progress to a shift
    supervisor role at his current plant, and eventually open his own small metal‑fabrication workshop that fuses traditional Mexican metalwork designs with modern production techniques. He also hopes to
    create apprenticeship opportunities for other young workers in his community.
