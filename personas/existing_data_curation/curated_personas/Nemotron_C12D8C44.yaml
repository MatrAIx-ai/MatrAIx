personas:
  professional: Julio Hernandez is a 20‑year‑old aspiring CNC machinist who blends his hands‑on expertise in mechanical assembly, technical drawing interpretation, MIG/TIG welding, and CNC programming with
    a curiosity for new fabrication methods and a competitive drive, allowing them to excel on the shop floor, mentor teammates, and keep their eye on opening a workshop that fuses traditional metalwork
    designs with modern production.
  sports: Julio Hernandez plays forward for the Chicago Community Soccer League’s Northside Wolves, cheers on the Chicago Fire in MLS and the Chicago Bulls in the NBA, and they keep fit year‑round with
    weekend pick‑up matches, weight‑training, and a competitive yet social attitude toward exercise.
  arts: Julio Hernandez dances cumbia and salsa at neighborhood fiestas, captures street‑level photographs inspired by Vivian Maier, and they enjoy listening to Celia Cruz and Carlos Santana, letting these
    artistic passions fuel both their social energy and the intricate detail of their metal‑fabrication designs.
  travel: Julio Hernandez favors budget‑friendly road trips that blend automotive heritage with family roots, having toured the Henry Ford Museum in Detroit, explored Oaxaca’s historic markets, and photographed
    Chicago’s Pilsen murals, and they plan a future visit to Mexico City’s Museo Frida Kahlo once college tuition is secured.
  culinary: Julio Hernandez cooks carne asada, tamales, and fresh salsa with moderate skill, using chipotle, cilantro, and masa harina to honor family recipes, and they love treating friends to a side of
    Chicago deep‑dish pizza on cheat‑days.
  core: Julio Hernandez is a socially driven, competitively minded DIY‑enthusiast who merges precise metal‑work skills, cultural rhythm, and a pragmatic eye toward building a future workshop.
background:
  cultural: Julio is a second‑generation Mexican‑American raised in Chicago's Little Village neighborhood. He grew up bilingual in Spanish and English, celebrating Mexican holidays such as Día de los Muertos,
    Navidad, and Cinco de Mayo with extended family gatherings, traditional foods, and music like banda and mariachi. The strong sense of community, familial loyalty, and cultural pride of the local Mexican
    diaspora shaped his social values, while the multicultural urban environment of Chicago fostered adaptability and an appreciation for diverse perspectives.
