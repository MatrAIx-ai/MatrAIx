persona_description: A financial analyst who specializes in the study of exchange rates and currency dynamics. This person has a deep understanding of the historical and current trends in the international
  currency markets, including the rise of the renminbi as a reference currency. They have experience in analyzing the correlation between trade and currency dynamics, and have a keen interest in the potential
  for the renminbi to become the dominant reference currency in the future. This person is likely to be familiar with the work of Frankel, Jeffrey and Shang-Jin Wei, as well as the contributions of Subramanian,
  Arvind and Martin Kessler. They may also be interested in the work of Eichengreen, Barry, and the authors of the article on the rise of the renminbi as an international currency.
