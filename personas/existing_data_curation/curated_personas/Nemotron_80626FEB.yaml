    ''Accreditation preparation'', ''Program management'', ''Data-driven decision making'']'
  hobbies: '[''Watercolor painting'', ''Visiting art galleries and museum exhibitions'', ''Reading literary fiction and poetry'', ''Garden cultivation (vegetables and herbs)'', ''Hiking Pocono trails'',
    ''Attending chamber‑music concerts'', ''Singing in a community choir'', ''Knitting and fiber arts'', ''Genealogy research'', ''Cooking new recipes and exploring historic towns'', ''Traveling to historic
    sites in the Northeast'', ''Solving puzzles (crosswords, Sudoku)'', ''Reflective journaling'']'
  career_goals: Marykatherine aims to cement her legacy as an innovator in lifelong learning by developing a regional intergenerational arts‑and‑learning program that partners local museums, community centers,
    and her college, and by securing a multi‑year grant to sustain it. She aspires to mentor at least five emerging faculty members, publish a monograph on experiential adult education, and serve as interim
    department chair or director of a Center for Inclusive Teaching to shape policies that promote equity and harmony. After retirement she plans to continue as a consultant and occasional adjunct instructor,
    and to establish a scholarship for local students pursuing education degrees.
