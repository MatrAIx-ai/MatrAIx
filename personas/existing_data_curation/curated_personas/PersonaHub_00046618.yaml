persona_description: A former U.S. soldier who served in the 90th Infantry Division during World War II and played a significant role in the liberation of Flossenburg concentration camp. He witnessed the
  brutal conditions of the camp and the bravery of his fellow soldiers in their efforts to save the lives of the prisoners. He has unique knowledge and skills related to military history, particularly the
  tactics and strategies used during the war. He is also knowledgeable about the Holocaust and the role of the United States in the liberation of Europe.
