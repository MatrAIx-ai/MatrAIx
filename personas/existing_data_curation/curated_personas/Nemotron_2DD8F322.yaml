  career_goals: Over the next five to ten years Kevin aims to become a senior investigative journalist specializing in economic and policy reporting, ultimately leading a dedicated investigative team at
    a regional news outlet. He aspires to win national journalism awards such as the Pulitzer for impactful stories that drive public accountability. Parallel to this he plans to launch a data-centric digital
    news platform focused on Anoka County and surrounding communities, leveraging his business expertise to create sustainable revenue models. Kevin also seeks to mentor emerging reporters, shape newsroom
    strategy through data-driven decision-making, and eventually transition into a communications director role for a nonprofit or corporation where he can influence public discourse at a broader scale.
