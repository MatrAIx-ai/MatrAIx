personas:
  professional: Kevin Koluch is a data‑driven investigative journalist who blends business acumen with rigorous reporting, channeling their disciplined, organized nature into meticulous fact‑checking, newsroom
    workflow optimization, and an ambitious plan to lead an investigative team while launching a data‑centric digital news platform for Anoka County.
  sports: Kevin Koluch participates in a co‑ed softball league with the Anoka Lumberjacks, skis cross‑country with the Twin Cities Ski Club, runs local 5K races, and avidly supports the Minnesota Twins
    and Vikings, often sporting their colors during weekend games.
  arts: Kevin Koluch shines on stage in community theater productions, captures local events with a Canon EOS R, draws inspiration from Ansel Adams and the storytelling of Lin‑Manuel Miranda, and unwinds
    listening to The National and folk singer Gillian Welch.
  travel: Kevin Koluch explores Minnesota's trail system on weekend hikes, fishes the Rum River with family, and dreams of canoeing the Boundary Waters and sailing the Norwegian fjords, while budgeting
    for a family road trip to the Pacific Northwest next summer.
  culinary: Kevin Koluch brews craft ales on weekends, pairing them with Minnesota classics such as walleye with lemon butter, hotdish, and cheese‑curd‑stuffed burgers, while their culinary skills range
    from grilling fish on a campsite to cautiously roasting a sweet‑potato mash for a family dinner.
  core: Kevin Koluch is a disciplined, competitive storyteller who balances a data‑driven investigative career with an outdoor‑filled, community‑centric life, even if they occasionally hoard craft‑beer
    recipes and spend too long tweaking spreadsheets.
background:
  cultural: Kevin grew up in a predominantly white, middle‑class suburb of Anoka County, Minnesota, with family roots tracing back to German and Scandinavian immigrants who settled the region in the early
    1900s. The Midwestern culture of self‑reliance, punctuality, modesty and strong community involvement shaped his work ethic and competitive yet collaborative mindset. He participates in local church
    gatherings, town meetings and regional festivals, reflecting the area’s emphasis on civic duty and neighborly support. His upbringing in the seasonal landscape of lakes, forests and harsh winters also
    fostered a love for outdoor recreation and an appreciation for the region’s seasonal rhythms.
