persona_description: A historian or archaeologist who specializes in maritime history and the study of shipwrecks, particularly those involving the wreck of the "John" in 1855. They are interested in the
  details of the shipwreck, the lives of the passengers and crew, and the impact of the tragedy on the community. They are also interested in the monument erected in the churchyard to commemorate the victims,
  and the monument at the South West end of the church. They are likely to be familiar with the history of the ship, the era of the ship, and the people involved.
