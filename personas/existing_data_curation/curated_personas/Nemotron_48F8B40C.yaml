personas:
  professional: Justin Robinson is a seasoned civil engineer who specializes in bridge and roadway design, BIM coordination, and climate‑resilient infrastructure; they translate complex technical data into
    clear presentations for city officials, lead multidisciplinary teams with meticulous organization, and channel a competitively driven spirit into championing equity‑focused projects.
  sports: Justin Robinson is an avid golfer who competes in a weekly league at Minnehaha Country Club, faithfully follows the Minnesota Vikings and Twins, cycles the Mississippi River Trail year‑round,
    and channels his competitive edge into early‑morning bike rides, while occasionally joining indoor pickleball matches at the local recreation center.
  arts: Justin Robinson is a passionate blues and jazz aficionado who frequently attends shows by the Minnesota Jazz Orchestra, devotes evenings to listening to Miles Davis and John Coltrane on vinyl, and
    brings his own saxophone to family gatherings, finding storytelling in every improvisational solo.
  travel: Justin Robinson prefers a balanced mix of adventure and relaxation, meticulously planning trips that include outdoor challenges like hiking the Grand Canyon, cultural immersion in Reykjavik’s
    Blue Lagoon, and scenic drives through New Zealand’s South Island, while also scheduling professional visits to sustainability conferences in Helsinki, reflecting their organized yet curious travel
    ethos.
  culinary: Justin Robinson blends a love for comfort foods such as gumbo, shrimp po’boys, and collard greens with a regional appreciation for wild‑rice soup and fresh lake‑caught trout, cooks confidently
    in the home kitchen while experimenting with spice rubs, and relishes dining out at local jazz‑themed eateries where they can pair a dish with a live saxophone performance.
  core: Justin Robinson merges disciplined engineering precision with a fiercely competitive spirit, turning community storytelling into innovative infrastructure designs while finding balance through late‑night
    saxophone sessions after a round of golf.
background:
  cultural: Justin grew up in a close‑knit African‑American family in Minneapolis, where church, education, and community service were core values. His parents, both teachers, encouraged academic excellence
    and a strong sense of social responsibility, shaping his drive for achievement. Navigating predominantly white academic and professional environments, he has cultivated a keen awareness of racial equity,
    which informs his commitment to mentoring Black and Latino youth in STEM fields. The rich cultural traditions of his community—Sunday gospel services, annual Juneteenth celebrations, and strong intergenerational
    family ties—have fostered his sociable disposition and love of storytelling. Although he embraces the broader Midwestern ethos of practicality and modesty, he also incorporates the expressive, rhythm‑filled
    spirit of Black American culture into his daily life, from his music tastes to his community activism.
