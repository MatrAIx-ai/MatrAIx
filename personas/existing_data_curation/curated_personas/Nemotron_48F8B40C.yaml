  hobbies: '[''Golf'',''Youth Robotics Coaching'',''Blues/Jazz Music Appreciation'',''Saxophone Playing'',''Cycling'',''Scale Model Bridge Building'',''Reading (Biographies, Sustainability)'',''ASCE Volunteer
    Workshops'',''Community Mentoring'']'
  career_goals: Looking ahead, Justin aims to step into a senior leadership role such as Director of Public Works for the City of Saint Paul or Vice President of Engineering at a regional consultancy, where
    he can steer large‑scale infrastructure revitalization projects with a focus on equity and climate resilience. He is passionate about integrating smart sensor networks for real‑time monitoring of bridges
    and streets, and he plans to publish technical articles and present at national civil engineering conferences to share his insights. After attaining these milestones, he envisions launching a boutique
    consulting practice that offers strategic advisory services and mentorship to minority‑owned engineering firms, ensuring his expertise benefits the next generation of engineers.
