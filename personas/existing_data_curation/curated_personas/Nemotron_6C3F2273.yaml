  career_goals: Dahmon aims to transition from his current hiatus into a full‑time role that leverages both his technical and organizational strengths. Over the next two years he plans to complete a bachelor's
    degree in Business Information Systems and obtain a PMP certification. His ultimate ambition is to become a project manager in a mid‑size technology or construction firm where he can lead cross‑functional
    teams, improve operational efficiency, and mentor junior staff. In the longer term, he envisions launching his own consulting business that offers project planning and hands‑on technical support to
    small businesses in the Rochester area.
