  career_goals: Quang aims to become a partner at a boutique firm specializing in technology startups and creative industries, eventually launching his own practice that bridges tech law with art and intellectual
    property. He aspires to publish scholarly articles on AI‑driven legal challenges, mentor junior attorneys, and lead pro bono initiatives for immigrant communities. He also hopes to shape policy around
    emerging technologies and serve as a thought leader at the intersection of law, innovation, and the arts.
