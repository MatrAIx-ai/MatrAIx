  career_goals: Edelmira aims to advance into senior account management or a regional sales director role, where she can shape strategy for multicultural campaigns. She aspires to mentor younger sales agents,
    leveraging her competitive drive and critical eye to foster high performance. Long‑term, she envisions launching a boutique consultancy that specializes in Caribbean‑inspired advertising, integrating
    emerging media like AR/VR to create immersive brand experiences. Financial stability for her family and the ability to influence the industry’s creative direction motivate her ambition.
