personas:
  professional: Jorge Isidor, a budding cartoonist who spends afternoons sketching vibrant characters and experimenting with bold color palettes, channels their curiosity and organized mindset into turning
    loose ideas into polished comic strips for the school newsletter.
  sports: Jorge Isidor, a spirited member of the Bowdon Youth Soccer League, loves playing as a forward on Saturday afternoons, idolizes Lionel Messi’s dribbling, chants for the local professional team
    Atlanta United, and balances their enthusiasm with a disciplined routine of stretching after each game.
  arts: Jorge Isidor, a keen young artist, fills their sketchbook with cartoon panels inspired by Pixar films like "Toy Story" and the expressive style of Frida Kahlo, while the lively strains of mariachi
    music and regional Mexican folk songs fuel their imagination during drawing sessions.
  travel: Jorge Isidor, an adventurous explorer, spends weekend hikes along the Caddo Lake trails collecting leaves and rocks for school projects, dreams of visiting the Grand Canyon’s rim for a real‑life
    geography adventure, and hopes to one day experience the bustling streets of Mexico City during a family vacation, balancing their curiosity with the budget constraints of their parents.
  culinary: Jorge Isidor, a junior kitchen helper, enjoys chopping fresh cilantro for guacamole, rolling tortillas for tacos, and shaping masa into tamales alongside their family, while their favorite snack
    after drawing is a warm churro dusted with cinnamon sugar, and they proudly claim their secret ingredient is a pinch of lime zest.
  core: Jorge Isidor blends a vivid imagination with disciplined habits, turning every sketch, soccer drill, and kitchen task into a playful experiment, yet sometimes forgets to finish their homework before
    bedtime.
background:
  cultural: Jorge was raised in a bilingual Mexican‑American household where Spanish is spoken at home and English at school. He celebrates Día de los Muertos, Mexican Independence Day, and Easter with
    family traditions, enjoys foods like tamales, pozole, and homemade salsa, and participates in a local Hispanic community group in Bowdon. His upbringing blends Mexican cultural customs with Southern
    Georgia influences, giving him a rich, mixed cultural identity that shapes his worldview and artistic expression.
