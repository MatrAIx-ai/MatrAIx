personas:
  professional: Michael Ball is a teen prodigy in hands‑on mechanics, spending after‑school hours overhauling his project car, diagnosing computer hardware faults, and mastering strategic video games, and
    they meticulously document each step to prep for a vocational automotive program.
  sports: Michael Ball maintains a disciplined fitness routine that includes weightlifting at the community gym, jogs on the track twice a week, follows the local high‑school cross‑country team, and is
    an avid supporter of the Los Angeles Lakers, the Detroit Tigers, and the German Formula 1 team Mercedes‑AMG.
  arts: Michael Ball's cultural palate is shaped by classic rock legends like Led Zeppelin, Pink Floyd, and The Rolling Stones, a weekly habit of watching the automotive design series on the Discovery Channel,
    and a deep appreciation for model kit artistry inspired by H.R. Giger’s biomechanical aesthetic.
  travel: Michael Ball dreams of a road‑trip to Detroit for the North American International Auto Show, a tour of the Porsche Museum in Stuttgart, and a weekend hike along the Pacific Coast Trail while
    saving their allowance for fuel and modest campsite fees.
  culinary: Michael Ball favors high‑protein meals such as grilled chicken thighs seasoned with smoked paprika, classic cheeseburgers with cheddar, and a weekend ritual of crafting homemade pepperoni pizza,
    and they consider their cooking skill comfortably intermediate, often relying on YouTube tutorials for new techniques.
  core: Michael Ball is a methodical, competition‑driven teen who channels a love for mechanics and gaming into disciplined routines, yet they occasionally slip into late‑night impulse buys and forget to
    floss.
background:
  cultural: Michael grew up in Warren, Michigan, a suburb of Detroit with a strong automotive heritage. His family’s roots trace back to German and Polish immigrants, typical of the region’s Midwestern,
    blue‑collar culture. He has been shaped by the community’s emphasis on hard work, practicality, and modesty, and his upbringing reflects the values of self‑reliance and respect for skilled trades common
    in the Great Lakes area.
