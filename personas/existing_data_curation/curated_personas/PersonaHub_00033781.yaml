persona_description: A passionate advocate for education equity and social justice, particularly in the context of South Africa's educational system. This individual is dedicated to highlighting the incredible
  impact of high-impact schools like the Centre of Science and Technology (COSAT) and the South African Extraordinary Schools Coalition, and the importance of systemic change to ensure that disadvantaged
  learners have access to quality education and opportunities for success. They believe in the power of collaboration between public and private sectors, and are committed to advocating for the investment
  in affordable access to high-quality education for all South Africans. This individual is driven by a deep sense of purpose to break down the educational gulf that separates disadvantaged South African
  students from their wealthier, often white, peers, and to work towards creating a future where every child has the opportunity to succeed.
