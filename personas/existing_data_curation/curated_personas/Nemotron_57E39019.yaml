  hobbies: '[''Gardening'', ''Cooking traditional Puerto Rican dishes'', ''Crocheting and knitting'', ''Listening to boleros and plena'', ''Reading the local newspaper'', ''Sharing family stories'', ''Small
    family gatherings'', ''Volunteer work at the senior center'']'
  career_goals: At 97, Yusimit’s primary ambition is to preserve and pass on her cultural heritage to younger generations. She aims to document family recipes, teach grandchildren and community members
    how to cook, sew, and garden, and continue her volunteer work at the senior center. She hopes to ensure her family and neighbors feel the stability and compassion that have defined her life, leaving
    a legacy of practicality, kindness, and cultural continuity.
