  hobbies: '[''Reading historical fiction'', ''Educational psychology books'', ''Gardening'', ''Farm‑to‑table cooking'', ''Yoga'', ''Hiking'', ''Quilting'', ''Library volunteer work'', ''Church choir'',
    ''Genealogy research'']'
  career_goals: Judith aims to expand her impact beyond her own classroom by becoming an instructional coach for her district, where she can share innovative practices while respecting proven methods. She
    plans to earn a master's degree in Educational Leadership within the next three years, positioning herself for a future role as vice‑principal or principal. Her long‑term ambition is to lead a school‑wide
    literacy initiative that incorporates community resources—such as local farms and the public library—to enrich students' reading experiences and real‑world learning. She also hopes to author a resource
    guide on balancing project‑based learning with state standards.
