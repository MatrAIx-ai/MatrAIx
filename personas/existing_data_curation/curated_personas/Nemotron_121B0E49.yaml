personas:
  professional: Judith Riley, a 36‑year‑old middle‑school English teacher in Somerset, blends data‑driven lesson planning with flexible, student‑centered projects, using Google Classroom and interactive
    whiteboards to align Kentucky Core Standards while coaching new teachers on restorative practices, and they balance innovative pedagogy with proven methods guided by pragmatic curiosity.
  sports: Judith Riley hikes the Daniel Boone National Forest trails each weekend, follows the Cincinnati Bengals and Kentucky Wildcats women's basketball teams on TV, and they participate in a community
    walking club that meets every Saturday for a mile‑long charity stroll.
  arts: Judith Riley sings in their church choir, revels in bluegrass evenings featuring Bill Monroe and Doc Watson, reads historical fiction by Hilary Mantel, and they craft intricate quilts inspired by
    folk storytelling motifs with their local quilting circle.
  travel: Judith Riley favors road‑trip explorations that combine genealogy research in Lexington’s public archives with scenic stops at Asheville’s art galleries and the historic Marlboro House, planning
    trips months ahead but sometimes impulsively adding a detour to a nearby state park when the weather beckons, and they cherish the blend of meticulous preparation and spontaneous adventure.
  culinary: Judith Riley delights in farm‑to‑table cooking, turning garden tomatoes into fresh bruschetta, simmering pumpkin into spiced pies, and seasoning roasted herbs with smoked paprika, while their
    baking repertoire proudly includes cornbread with buttermilk and a cheeky habit of sampling a slice of buttered biscuit before dinner.
  core: Judith Riley balances methodical planning with spontaneous creativity, nurturing both their classroom and garden while occasionally indulging in last‑minute quilting purchases and delayed dentist
    appointments, embodying a steady, community‑focused spirit.
background:
  cultural: Judith is a white American who grew up in rural Somerset, Kentucky. Her upbringing reflects Southern hospitality and strong community ties, with regular participation in church activities, local
    festivals, and bluegrass music gatherings. The region’s Appalachian heritage influences her appreciation for folk crafts, storytelling, and a close‑knit family culture. She values hard work, education,
    and mutual support, balancing respect for local traditions with an openness to diverse perspectives gained through her teaching career.
attributes:
  skills: '[''Classroom management'', ''Lesson planning and curriculum design'', ''Differentiated instruction'', ''Formative and summative assessment'', ''Educational technology integration'', ''Data-driven
