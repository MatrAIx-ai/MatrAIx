personas:
  professional: Shenella Aziz, an aspiring community outreach coordinator, blends meticulous event planning, graphic design, and spoken‑word storytelling to craft arts‑based mental‑health programs for at‑risk
    youth, while habitually juggling a packed schedule and sometimes sacrificing sleep to meet their high standards.
  sports: Shenella Aziz participates in modern dance classes twice weekly, follows the local basketball team the City Raptors, and squeezes in weekend yoga to balance their desk‑bound design work, though
    they often skip warm‑ups, resulting in occasional sore muscles.
  arts: Shenella Aziz channels their vivid imagination into abstract paintings, digital illustrations for community flyers, and spoken‑word performances inspired by the poetry of Ocean Vuong, the jazz of
    John Coltrane, and the lyrical flow of Kendrick Lamar, constantly seeking new mediums despite a habit of leaving canvases unfinished.
  travel: Shenella Aziz prefers immersive cultural trips, having visited New Orleans for its jazz scene, Chicago’s art museums, and a weekend art‑collective retreat in Asheville, while dreaming of wandering
    Marrakech’s souks and Tokyo’s avant‑garde galleries, but often delays planning due to academic commitments.
  culinary: Shenella Aziz loves cooking family‑style soul‑food like simmered collard greens, spicy fried chicken, and sweet potato pie, experimenting with smoked paprika and cayenne, yet sometimes over‑seasones
    in their enthusiasm, leading to occasional kitchen clean‑up marathons.
  core: Shenella Aziz is an 18‑year‑old imaginative organizer who fuses art, activism, and empathy into every facet of life, even if they sometimes burn the midnight oil and stress over details.
background:
  cultural: Shenella was raised in Milledgeville, Georgia, within a close‑knit African‑American community that values church fellowship, gospel music, and storytelling. Her family also embraces an Islamic
    heritage reflected in her surname Aziz, observing Ramadan and integrating Qur'anic teachings with Southern traditions. This blend of Black Southern culture and a broader faith background nurtured her
    love for communal support, rhythmic expression, and the art of narrative. Growing up in Jones County, she witnessed both the challenges and resilience of her neighborhood, shaping her compassionate
    outlook and desire to foster harmony through creative and social initiatives.
attributes:
  skills: '[''Public Speaking'', ''Event Planning'', ''Creative Writing'', ''Digital Illustration'', ''Graphic Design'', ''Peer Counseling'', ''Social Media Management'', ''Research'']'
  hobbies: '[''Painting'', ''Sketching'', ''Reading speculative fiction'', ''Writing poetry'', ''Open mic spoken word'', ''Live music attendance'', ''Volunteering at shelter'', ''Event organizing'', ''Cooking
    soul food'', ''Modern dance'', ''Journaling'']'
  career_goals: Shenella aims to complete her associate degree in communications or social work and later earn a bachelor's in community development. She aspires to become a community outreach coordinator
    for an arts‑focused nonprofit, where she can design programs that blend creative expression with mental‑health support for at‑risk youth. Ultimately, she dreams of founding her own youth arts therapy
    center that leverages her organizational talent, artistic skills, and compassionate nature. She also seeks leadership roles that allow her to advocate for equitable access to arts education and to mentor
    the next generation of socially engaged creators.
