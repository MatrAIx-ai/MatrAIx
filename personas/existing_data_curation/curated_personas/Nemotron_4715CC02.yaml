  hobbies: '[''Beach volleyball'', ''Swimming'', ''Student council involvement'', ''Journaling and planner organization'', ''Scrapbooking'', ''Friendship bracelet making'', ''Reading fantasy novels'', ''Coastal
    photography'', ''Beach clean‑up volunteering'']'
  career_goals: Lorys aspires to a career that blends her love for the ocean, her desire for tangible impact, and her preference for structured, high‑standard work environments. She plans to enroll in a
    rigorous STEM‑focused high school program, secure internships with local marine research centers, and ultimately study marine biology at the university level. Her long‑term goal is to become a marine
    conservation scientist with the Virginia Marine Resources Commission or NOAA, leading systematic data‑collection projects, conducting community outreach on coastal protection, and contributing to policy
    development. Additionally, she hopes to obtain emergency medical response certification to support coastal rescue operations, reflecting her commitment to public service and teamwork.
