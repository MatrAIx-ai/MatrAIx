personas:
  professional: Patti Gordon, a business process analyst turned aspiring senior operations director, leverages her meticulous workflow design, data-driven decision making, and conflict-resolution expertise
    to drive efficiency while championing compassionate, inclusive practices within a mid-size technology firm.
  sports: Patti Gordon, a 38-year-old enthusiast of outdoor activity, joins the Hill Country Cyclists club for weekend rides through the Texas Hill Country, tracks her miles on Strava, hikes the Guadalupe
    River Trail each spring, and remains a devoted fan of the Dallas Mavericks and FC Dallas, cheering them during off-season training.
  arts: Patti Gordon, an avid reader, delights in historical fiction by Hilary Mantel and literary nonfiction by Doris Kearns Goodwin, leads lively discussions in her Frisco book club, and attends concerts
    by the Texas Symphony Orchestra featuring violinist Hilary Hahn.
  travel: Patti Gordon prefers meticulously planned getaways, balancing weekend hikes in the Texas Hill Country with annual trips to historic European cities like Florence and Oxford, while dreaming of
    a future retreat during Kyoto’s cherry-blossom season.
  culinary: Patti Gordon, a moderately skilled home chef, loves crafting Tex-Mex dishes such as chicken enchiladas with chipotle-tomatillo sauce, chiles rellenos, and fresh guacamole blended with cilantro,
    lime, and jalapeño, often sourcing heirloom tomatillos from her garden for intimate dinner parties with close friends.
  core: Patti Gordon, a 38-year-old operations strategist who blends rigorous process discipline with a compassion-driven mentorship ethos, habitually schedules yoga in 15-minute blocks and secretly hoards
    extra garden seed packets for future experiments.
background:
  cultural: Patti was raised in a middle-class Midwestern family with deep appreciation for education, literature, and community service. Her parents emphasized self-reliance, punctuality, and polite civility,
    values that she carries into her professional life. After completing her humanities degree, she relocated to the Dallas-Fort Worth metroplex, where she has embraced the collaborative spirit and hospitality
    of North Texas. She identifies with mainstream American cultural norms while also valuing the diverse cultural tapestry of Frisco, participating in local festivals, supporting regional arts institutions,
    and maintaining friendships across different backgrounds. Her upbringing and education have fostered a respect for tradition, a curiosity for cultural expression, and a commitment to fostering inclusive,
    compassionate environments.
