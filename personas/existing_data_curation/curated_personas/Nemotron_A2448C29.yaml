  hobbies: '[''Reading historical fiction and literary nonfiction'', ''Participating in a local book club'', ''Gardening (vegetable and herb garden)'', ''Yoga and mindfulness meditation'', ''Volunteering
    at community food pantry'', ''Hiking and biking in the Texas Hill Country'', ''Cooking Tex-Mex meals and hosting dinner gatherings'']'
  career_goals: Patti aims to advance to a senior operations director role within the next five years, leading a regional operations hub for a mid-size technology firm. She is pursuing certifications in
    Lean Six Sigma and Project Management Professional (PMP) to deepen her expertise in efficiency and strategic execution. A long-term ambition is to establish a consultancy that helps non-profit organizations
    streamline their operations while preserving their mission-driven culture. She also aspires to mentor younger professionals, especially women returning to the workforce after life transitions, and to
    champion inclusive, compassionate workplace practices.
