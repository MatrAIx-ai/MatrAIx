  career_goals: He plans to graduate high school and attend a vocational trade school to become an automotive technician or agricultural equipment mechanic, fields that provide clear procedures and reliable
    outcomes. In the longer term, Charles hopes to work for a local dealership or farm service business, eventually earning certifications that could allow him to open his own repair shop or become a senior
    service manager. He values job stability, the chance to apply his hands‑on skills, and the opportunity to serve his community.
