personas:
  professional: Charles Herkender, a budding robotics enthusiast with a knack for precise model assembly and hands‑on troubleshooting, translates his preference for structure and moderate flexibility into
    leading school robotics projects, where they blend careful planning with spontaneous improvisation, inspiring teammates to value both detailed manuals and creative adaptation.
  sports: Charles Herkender cycles the Sangamon River trails most weekends, plays on the school’s junior varsity soccer team in the spring, and follows the Chicago Cubs, Chicago Bears, and Chicago Bulls,
    preferring a relaxed, flexible training routine that blends structured practice with spontaneous bike rides, while also participating in the Springfield Youth Fishing League during summer.
  arts: Charles Herkender unwinds by blasting classic rock icons like Led Zeppelin, The Rolling Stones, and Jimi Hendrix while assembling models, attends occasional school art shows featuring local muralists,
    and savors the cinematic quirkiness of Wes Anderson films, allowing their structured hobby mindset to mingle with the free‑flowing creativity of music and visual art.
  travel: Charles Herkender prefers short, low‑cost road trips with friends—fresh from a fishing weekend on the Sangamon River they have road‑tripped to Chicago’s Navy Pier and St. Louis’s Gateway Arch—but
    dreams of a future summer exchange in Tokyo to attend a robotics expo and a backpacking adventure through Utah’s Arches and Colorado’s Rocky Mountain National Parks.
  culinary: Charles Herkender, an amateur cook who can whip up confident grilled cheese sandwiches, a basic fish‑and‑chips dinner using freshly caught river trout, and occasional pepperoni pizza with a
    generous sprinkle of mozzarella and oregano, favors hearty, quick‑fix meals and enjoys seasoning with garlic powder and hot sauce.
  core: Charles Herkender blends a methodical love of building models with a laid‑back attitude toward planning, often juggling bike repairs and gaming while forgetting to log their allowance, making them
    a practical yet surprisingly spontaneous teen.
background:
  cultural: Charles comes from a middle‑class, white Midwestern family in Lexington, Illinois. His upbringing reflects the values common in small‑town Illinois—hard work, modesty, community involvement,
    and a strong sense of personal responsibility. The town’s culture is tied to agriculture and small‑business life, with many families attending local church services and participating in community events
    such as county fairs and 4‑H programs. Family gatherings, church potlucks, and support for local sports teams shape his social world, reinforcing a practical, down‑to‑earth outlook.
