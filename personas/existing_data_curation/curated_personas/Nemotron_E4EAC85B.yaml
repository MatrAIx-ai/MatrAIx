  hobbies: '[''Reading (history, technology)'', ''Gardening'', ''Fishing'', ''Model ship and train building'', ''Woodworking'', ''Classic rock music'', ''Vintage movies'', ''Senior book club'']'
  career_goals: Approaching retirement, Donald aims to transition into a supervisory or mentorship role, training new sales associates and streamlining store processes using his organizational strengths.
    He hopes to acquire a part‑time inventory specialist position that offers a quieter work environment and predictable hours, allowing more time for his personal projects. Additionally, he is interested
    in taking a short community‑college course in small‑business management to eventually launch a niche hobby shop or online store focused on model kits and woodworking supplies.
