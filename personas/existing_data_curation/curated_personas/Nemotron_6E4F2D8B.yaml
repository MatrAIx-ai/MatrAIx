personas:
  professional: Jordan Mcgrath, a 15‑year‑old tinkerer on his high school robotics team, blends a practical farm‑grown work ethic with a curiosity for electronics, often preferring hands‑on trial‑and‑error
    over strict planning while they collaborate on modest autonomous‑vehicle prototypes.
  sports: Jordan Mcgrath, a fan of the Kansas City Chiefs and the Salina Jr. Jays baseball squad, spends weekends at the local skate park with the Salina Skateboarding Club and participates in the school’s
    track sprint team, preferring solo practice to large‑scale team drills.
  arts: Jordan Mcgrath, who pores over classic rock from Bruce Springsteen and folk tunes by John Denver while sketching comic‑style panels inspired by Stan Lee, devotes evenings to writing speculative
    short stories that echo the futuristic themes of Andy Weir’s novels.
  travel: Jordan Mcgrath, whose family road trips to the Rocky Mountain foothills and occasional weekend excursions to the Kansas prairie shape a wanderlust for National Parks, prefers spontaneous detours
    over rigid itineraries, dreaming of a future backpacking adventure through the Grand Canyon despite limited teen travel budget.
  culinary: Jordan Mcgrath, who enjoys the comfort of freshly baked cornbread, butter‑glazed corn on the cob, and homemade chili topped with shredded cheese, can whip up a decent skillet dinner despite
    a habit of forgetting to defrost meat until the last minute.
  core: Jordan Mcgrath, a curious yet laid‑back teen from the heartland, melds farm‑rooted pragmatism with a love for gadgets, comics, and spontaneous adventures, all while juggling the occasional forgetfulness
    and a steady calm under pressure.
background:
  cultural: Jordan comes from a multigenerational Midwestern family rooted in the agricultural community of central Kansas. His grandparents were traditional grain and cattle farmers, and his parents continue
    to operate a modest mixed‑crop farm near Salina. The family participates in local traditions such as the Salina County Fair, church potlucks, and high school sports events, reflecting a blend of Protestant
    values and a strong work ethic. Growing up in Salina also exposes him to the diverse cultural fabric of the region, including the histories of Native American peoples and the contributions of a growing
    Latino farmworker community.
attributes:
  skills: '[''Basic mechanical troubleshooting'', ''Bike repair'', ''Small engine maintenance'', ''Arduino and Raspberry Pi prototyping'', ''Basic programming (Python, Scratch)'', ''Computer literacy (Windows,
