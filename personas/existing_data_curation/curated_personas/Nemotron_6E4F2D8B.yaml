  hobbies: '[''Electronics tinkering (Arduino, Raspberry Pi)'', ''Building model kits (airplanes, cars)'', ''Playing strategy and role‑playing video games'', ''Reading science‑fiction novels'', ''Drawing
    comics'', ''Writing short stories'', ''Skateboarding'', ''Hiking Kansas prairie'', ''Participating in 4‑H and robotics club'', ''Listening to classic rock and folk music'']'
  career_goals: Jordan aims to pursue a technical education after high school, targeting a degree in mechanical engineering or robotics. He dreams of designing affordable, technology‑enhanced tools for
    small‑scale farms and eventually starting his own venture that merges engineering with sustainable agriculture. He also hopes to develop indie video games that explore environmental themes, allowing
    him to blend creativity with problem‑solving. Ultimately, he seeks a career that offers both the freedom to experiment and the chance to make a tangible impact on his community.
