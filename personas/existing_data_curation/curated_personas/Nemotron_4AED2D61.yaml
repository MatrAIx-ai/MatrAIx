  hobbies: '[''Hiking'', ''Photography'', ''Cooking (Chinese and fusion cuisine)'', ''Reading (technology & business)'', ''Tai Chi'', ''Mentoring/Tutoring in Math and Science'', ''Gardening'', ''Playing
    Mahjong'']'
  career_goals: Yim aims to advance from his current first‑line supervisory role to a district or regional management position, where he can apply his data‑centric approach to drive operational excellence
    across multiple stores. He is passionate about creating a culture that values both performance metrics and employee well‑being, reducing workplace stress for his team. Long‑term, he envisions a senior
    leadership role that allows him to mentor the next generation of retail managers while maintaining a healthy work‑life balance for his family and ensuring financial security.
