  career_goals: Miranda's ambitions focus on personal enrichment and community contribution rather than professional advancement. She hopes to compile her family's favorite recipes into a handwritten cookbook
    to share with her grandchildren, learn to use a tablet more fluently for video calls and digital photo archiving, and record local oral histories for the Pickett County historical society. She also
    wishes to teach a weekly knitting circle at the church, keep her garden thriving, and take occasional short trips to nearby state parks to stay active and mentally sharp.
