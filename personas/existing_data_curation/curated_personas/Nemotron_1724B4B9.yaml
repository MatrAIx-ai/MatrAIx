personas:
  professional: Kevin Escobar, a 24‑year‑old HVAC technician, blends rigorous OSHA‑compliant installation practice with an eye for artistic design, using smart‑home integration and energy‑efficiency retrofits
    to deliver sleek, low‑carbon climate solutions while methodically pursuing NATE, EPA 608, and CEM certifications, and they eye a future senior project‑lead role.
  sports: Kevin Escobar, a 24‑year‑old outdoor enthusiast, hikes the Crystal Cove and Laguna Coast Wilderness trails with the SoCal Hiking Club, follows the Los Angeles Lakers and Dodgers, plays occasional
    beach volleyball at Newport Beach, and they belong to a local running group that meets for sunrise jogs along the Pacific Coast Highway.
  arts: Kevin Escobar, a 24‑year‑old lover of visual and musical art, frequents The Broad and LACMA for contemporary exhibitions, sketches street‑art murals by Banksy and local creators, strums acoustic
    guitar to the tunes of John Mayer while improvising simple folk songs, and they regularly attend performances at the Walt Disney Concert Hall featuring works by Yo‑Yo Ma.
  travel: Kevin Escobar, a 24‑year‑old photographer and explorer, plans weekend road trips along the Pacific Coast Highway to capture sunsets in Big Sur, dreams of photographing the northern lights in Iceland
    and the neon districts of Tokyo, prefers a mix of meticulous itinerary mapping and spontaneous detours, and they budget travel using points from a credit card rewards program.
  culinary: Kevin Escobar, a 24‑year‑old home‑chef, enjoys cooking fish tacos with crisp cabbage, lime, and cilantro, perfects avocado toast with smoked salmon and poached egg, experiments with ramen broth
    flavored by miso and ginger, and they often grill Korean BBQ short ribs using gochujang and sesame oil on their backyard patio.
  core: Kevin Escobar, a 24‑year‑old HVAC tech with an obsession for art, photography, and efficiency, channels disciplined project management into both climate‑control solutions and weekend DIY builds,
    while they occasionally over‑caffeinate and neglect mental breaks during busy seasons.
background:
  cultural: Kevin grew up in a middle-class, white family in Costa Mesa, California, with a blend of Anglo-American and Spanish heritage reflected in his surname. The multicultural atmosphere of Orange
    County exposed him to a diversity of cultures, cuisines, and artistic expressions, fostering his open-minded outlook. While English is his primary language, he picked up basic Spanish from community
    interactions and family gatherings. Family traditions emphasize hard work, community involvement, and respect for others, aligning with his cooperative nature. He participates in local cultural events,
    such as the OC Street Art Festival and neighborhood block parties, which reinforce his appreciation for artistic creativity and communal harmony.
attributes:
  skills: '[''HVAC system installation'',''Refrigeration system diagnostics'',''Energy efficiency retrofitting'',''Blueprint and schematic interpretation'',''Smart thermostat programming'',''Preventive
