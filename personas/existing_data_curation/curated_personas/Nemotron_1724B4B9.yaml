  hobbies: '[''Visiting contemporary art galleries'',''Street-art mural tours'',''Urban and landscape photography'',''Playing acoustic guitar'',''Hiking coastal trails'',''DIY home-improvement projects'',''Scale
    model building'',''Reading science-fiction and technology blogs'',''Volunteering with Habitat for Humanity'']'
  career_goals: Kevin aims to become a NATE-certified senior HVAC technician within the next two years, earning his EPA 608 universal certification and pursuing a Certified Energy Manager (CEM) credential.
    He envisions advancing to a project-lead role at a large commercial HVAC firm, where he can oversee large-scale installations and sustainability projects. In the longer term, he plans to launch his
    own eco-focused HVAC consulting and installation business that incorporates artistic design elements and smart-home technology, helping clients achieve lower energy bills and healthier indoor environments.
    He also hopes to mentor apprentices, sharing his disciplined work ethic and curiosity for innovative solutions.
