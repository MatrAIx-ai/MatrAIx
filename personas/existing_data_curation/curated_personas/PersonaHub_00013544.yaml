persona_description: A scientist who specializes in the study of plant communication and networks, particularly the underground fungal network that connects plants. Her research interests include the role
  of fungi in plant nutrition, disease prevention, and plant defense. She is also interested in the effects of this network on the plant community and the ways in which plants communicate with each other.
  She is a member of a team of researchers who have discovered a vast underground network connecting plants via their roots and are studying its role in plant communication and disease prevention.
