    ''Traveling to cultural festivals and historic sites'', ''Mindfulness meditation and yoga for stress reduction'', ''Organizing neighborhood potluck and social events'', ''Collecting postcards and local
    memorabilia'']'
  career_goals: Val Ann aims to transition from a front‑line representative to a senior customer‑experience trainer within the next two years, developing curricula that emphasize empathy, emotional resilience,
    and high‑standard service delivery. She plans to earn a professional certification in Customer Experience Management (CXM) and complete her bachelor’s degree in communications or arts administration.
    Leveraging her love of art, she hopes to take on a part‑time role as a program coordinator at a local museum or community arts center, where she can design workshops that merge customer service excellence
    with cultural enrichment. Additionally, she aspires to mentor younger employees, lead quality‑assurance initiatives, and eventually launch a small nonprofit that offers art‑based community activities
    for seniors, combining her organizational talents with her dedication to harmony and service.
