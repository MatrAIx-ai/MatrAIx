personas:
  professional: Nathan Naraine, an aspiring junior game designer and Arduino hobbyist, channels their curiosity and practical tinkering into crafting custom game mechanics and remote‑controlled car prototypes,
    often juggling schoolwork with spontaneous brainstorming sessions, though their laid‑back approach sometimes leads to missed deadlines.
  sports: Nathan Naraine enjoys weekend fishing trips with family along the nearby river, participates in a casual community‑center pick‑up basketball league, and roots for the local high‑school football
    team, yet prefers the quiet of a fishing spot to the intensity of competitive sports.
  arts: Nathan Naraine devotes spare moments to sketching sci‑fi cityscapes and creating pixel‑art characters in Procreate, draws inspiration from graphic novels like 'Saga' and 'Akira', and fuels creative
    bursts with alternative‑rock playlists featuring Radiohead and Arctic Monkeys.
  travel: Nathan Naraine dreams of exploring the tech exhibits at Tokyo’s Miraikan and the vast ecosystems of Yellowstone National Park, but currently confines travel to family road trips to nearby state
    parks and occasional weekend visits to the city’s science museum.
  culinary: Nathan Naraine prefers quick, flavor‑rich meals like peppered salmon grilled from their own catch, loaded nachos, and a trusty bowl of instant ramen spiced with sliced jalapeños, while their
    culinary confidence is limited to microwaving leftovers and assembling pizza toppings.
  core: Nathan Naraine, a curiosity‑driven teen who tinkers with gadgets, escapes into sci‑fi worlds, and battles anxiety with sketchbooks and journals, often lets disorganization color their daily grind.
background:
  cultural: Nathan grew up in Melbourne, Florida, a suburban city on the Space Coast of Brevard County. His family is part of the region’s middle‑class white community, with roots in the broader American
    cultural fabric and some European ancestry (e.g., Irish and German). The coastal environment has shaped his leisure activities—beach outings, fishing, and a relaxed, outdoor‑oriented lifestyle. Proximity
    to the Kennedy Space Center and the local aerospace industry has sparked an early interest in science and technology, reflected in his school’s emphasis on STEM programs. The community balances traditional
    Southern‑Florida values of friendliness and practicality with a growing tech‑savvy atmosphere. He attends a public middle school that offers extracurricular clubs in robotics and video‑game design,
    which reinforce his curiosity while providing a supportive but low‑pressure social setting.
