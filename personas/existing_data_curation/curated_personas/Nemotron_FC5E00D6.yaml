  career_goals: Nathan hopes to turn his curiosity and hands‑on aptitude into a career in technology. He envisions studying computer science or engineering at a technical high school or community college,
    eventually working as a software developer or video‑game designer where he can blend creative ideas with practical coding. The nearby Space Coast also sparks an interest in aerospace engineering or
    robotics, and he dreams of contributing to projects that build real‑world tools or applications. Short‑term, he aims to complete advanced coding courses, build a portfolio of indie games or robotics
    demos, and secure a part‑time internship or mentorship with a local tech company. His long‑term ambition is to achieve financial independence, create products that solve everyday problems, and potentially
    launch his own indie game studio.
