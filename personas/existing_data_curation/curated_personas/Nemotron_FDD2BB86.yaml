  hobbies: '[''Latin dance (Salsa, Bachata)'', ''Community cooking classes'', ''Weekend hiking with friends'', ''Tech meetups and hackathons'', ''Improvisational theater'', ''Volunteering at local schools
    for STEM outreach'']'
  career_goals: Lucila aims to transition from a senior database architect to a Chief Data Officer role within the next five years, positioning herself as a strategic leader who can align data initiatives
    with business outcomes. She plans to earn advanced certifications in cloud data engineering and data privacy, and to lead cross‑functional projects that integrate AI‑driven analytics into the company’s
    decision‑making processes. Additionally, she aspires to build a mentorship program that cultivates diverse talent in data engineering, reflecting both her commitment to inclusion and her collaborative
    personality.
