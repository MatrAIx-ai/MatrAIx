personas:
  professional: A seasoned database architect, Lucila Ngin blends meticulous data modeling with a spontaneous flair for rapid prototyping, designing enterprise‑grade relational solutions on SQL Server,
    Oracle, and cloud platforms while habitually mentoring junior engineers and translating complex architectures into clear, actionable documentation.
  sports: An enthusiastic fitness enthusiast, Lucila Ngin mixes salsa and bachata nights with weekend hikes as a member of the Trailblazers Hiking Club, cheers on the hometown soccer team Metro City FC,
    and occasionally joins a local co‑ed volleyball league for a social workout.
  arts: A vibrant arts participant, Lucila Ngin immerses themselves in Latin music by listening to Celia Cruz and Bad Bunny, frequents community cooking workshops where they showcase Mexican regional dishes,
    and attends local mural tours that celebrate street art.
  travel: An adventurous yet flexible traveler, Lucila Ngin prefers spontaneous group road trips, has explored Oaxaca’s culinary scene, trekked Patagonia’s glaciers, and day‑dreams about wandering the souks
    of Marrakech while always budgeting for a fallback plan due to their occasional budget lapses.
  culinary: A passionate home cook, Lucila Ngin specializes in Mexican regional cuisine, regularly preparing mole poblano, cochinita pibil, and tacos al pastor, skillfully using chiles de árbol, epazote,
    and masa, and often shares these dishes at community potlucks, though they sometimes forget to label leftovers.
  core: Lucila Ngin balances data‑driven precision with a salsa‑floor spontaneity, often swapping a tight deadline for a last‑minute dance night, a surprise taco feast, and a quick hike with friends.
background:
  cultural: Lucila proudly embraces her Mexican heritage, fluent in both Spanish and English, and incorporates traditions such as Día de los Muertos celebrations and family gatherings into her Dallas life.
    Her cultural roots influence her culinary interests and community involvement, often volunteering with local Hispanic organizations to support cultural preservation and bilingual education. This background
    nurtures her warm, outgoing demeanor and reinforces her commitment to fostering inclusive environments both at work and in her social circles.
attributes:
  skills: '[''SQL Server Administration'', ''Data Modeling'', ''Performance Tuning'', ''Cloud Database Solutions (AWS/Azure)'', ''Python Scripting for ETL'', ''NoSQL Database Management'', ''Data Governance
