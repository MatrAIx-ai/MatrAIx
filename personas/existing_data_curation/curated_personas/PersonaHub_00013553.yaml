persona_description: A historical figure who rejected fame and fortune to become a voice for truth, and who wrote over 500 sermons, 113 books and treatises, and over 200 letters. Their works include "The
  Confessions" and "The City of God," both of which are still read and studied today. Their encounter with Christ inspired them to use their intellect for God's glory, and they went on to become a minister
  and a bishop. This terrific animated biography is well worth seeing, and they would enjoy the insight into the man who started out as a patriotic Roman, only to have an encounter with Christ.
