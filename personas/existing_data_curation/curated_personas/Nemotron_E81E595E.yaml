  career_goals: Nasreen aims to step into senior leadership within the communications field, targeting a Director of Communications or VP role at a biotech or technology firm in the Boston corridor. She
    wants to leverage her STEM background to become a recognized authority in translating scientific research for public audiences, positioning herself as a go‑to strategist for high‑stakes crisis communication.
    Over the next five years, she plans to launch a boutique consultancy that serves emerging tech startups, focusing on data-driven messaging and cultural nuance. Nasreen also seeks to mentor South Asian
    women entering the PR industry, establishing a mentorship circle and speaking at industry conferences to share her competitive, results‑focused approach. Ultimately, she aspires to author a guidebook
    on resilient crisis communication and to be honored with a national industry award for excellence in public relations.
