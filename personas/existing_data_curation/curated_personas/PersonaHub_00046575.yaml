persona_description: A person who has extensive experience and expertise in the field of cinematography, specifically in the role of director of photography. They have worked their way up through the ranks
  through extensive education, experience or a combination of both. They are highly skilled in lighting and film techniques, and are responsible for turning ideas into reality. They are known for their
  exceptional knowledge of lighting, composition, lenses, film, and other aspects of filmmaking. They have attended prestigious film schools and have a network of prominent filmmakers who come to lecture
  or teach classes. They are known for being personable, easy to work with, and confident. They must stay on top of the latest gadgets, tools of the trade, and techniques in order to succeed. They are also
  a member of the American Society of Cinematographers, an elite organization open by invitation only.
