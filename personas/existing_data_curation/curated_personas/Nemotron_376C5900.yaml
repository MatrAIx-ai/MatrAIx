  career_goals: Approaching retirement, Hugh aims to transition from daily call handling to a mentorship and training role where he can share his extensive knowledge with newer representatives. He hopes
    to lead a small team of trainees, develop a concise onboarding curriculum, and spearhead a pilot program that integrates simple automation tools to reduce repetitive tasks. Securing a certification
    in Customer Service Management and completing a short course in Lean Six Sigma are on his short‑term agenda. Long‑term, he would like to consult part‑time for local small businesses, helping them improve
    customer interaction processes and adopt basic data‑driven decision‑making. Throughout, he seeks to preserve a healthy work‑life balance that allows more time for family and personal pursuits.
