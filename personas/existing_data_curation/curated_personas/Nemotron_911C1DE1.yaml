personas:
  professional: Sagrario Opizo, a 27‑year‑old registered nurse proficient in wound care, IV therapy, and Epic documentation, merges meticulous clinical diligence with a curious, art‑driven mindset by piloting
    art‑therapy workshops on her unit while pursuing a BSN and planning for oncology certification, and they often double‑check orders out of a healthy anxiety about patient safety.
  sports: Sagrario Opizo balances a demanding nursing schedule with weekly hikes in the Sierra foothills, weekend yoga sessions at a community studio, and occasional pickup soccer matches with a local club,
    while cheering for the Oakland Athletics in baseball and the Sacramento Kings in basketball.
  arts: Sagrario Opizo expresses visual storytelling through watercolor landscapes inspired by the Sierra, frequents the Fresno Art Museum to study works by Georgia O'Keeffe and Frida Kahlo, curates playlists
    featuring Lila Downs, Carlos Vives, and modern Latin jazz artists, and integrates art‑therapy techniques into patient care to nurture emotional resilience.
  travel: Sagrario Opizo prefers meticulously planned weekend escapes that blend nature and culture, having trekked the Grand Canyon, explored historic plazas in Mexico City, and dreaming of a week‑long
    retreat in Japan’s countryside and a vibrant street‑art tour of Barcelona.
  culinary: Sagrario Opizo delights in preparing authentic mole poblano, chiles en nogada, and pozole, skillfully balancing smoky ancho chilies, fresh corn masa, and a hint of orange zest while hosting
    communal cooking evenings that often turn into lively storytelling sessions, and they experiment with weekly plant‑based adaptations to broaden their culinary repertoire.
  core: Sagrario Opizo is a meticulous yet creatively curious nurse who channels stress into watercolor painting, carefully double‑checks patient orders, and habitually over‑packs art supplies for every
    outing.
background:
  cultural: Sagrario comes from a Mexican family that settled in California's Central Valley. Growing up bilingual, she celebrated traditions such as Día de los Muertos, quinceañeras, and weekly family
    gatherings centered around home‑cooked meals. Her cultural upbringing emphasized communal responsibility, respect for elders, and a strong Catholic faith, all of which inform her compassionate approach
    to patient care. In Manteca, she remains active in local Mexican cultural organizations, participating in festivals and community outreach programs. Her heritage enriches her professional practice,
    allowing her to bridge cultural gaps in healthcare and advocate for the needs of Spanish‑speaking patients.
