  hobbies: '["painting", "visiting art galleries", "photography", "listening to Mexican folk music", "cooking Mexican cuisine", "yoga", "meditation", "hiking", "reading contemporary fiction", "volunteering
    at community health fairs"]'
  career_goals: Sagrario aims to advance her nursing career by completing a BSN program within the next two years, followed by specialty certification in Oncology Nursing. She envisions taking on a charge
    nurse role, eventually transitioning to a nurse educator position to mentor future nurses, particularly those from underrepresented backgrounds. Long‑term, she hopes to develop a community health initiative
    in the San Joaquin Valley that integrates art therapy and culturally tailored education to improve chronic disease management among Mexican‑American populations. She also seeks to cultivate personal
    resilience through stress‑management training and leadership development.
