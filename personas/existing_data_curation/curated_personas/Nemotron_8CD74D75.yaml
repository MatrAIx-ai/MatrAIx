  career_goals: Phillip envisions a future where he can combine his love of problem solving with his desire to help others. He dreams of becoming a STEM professional—such as an aerospace engineer or a robotics
    researcher—who can design innovative technology while inspiring younger students. He also hopes to take on leadership roles in community organizations, eventually serving as a youth program director
    in Waterbury, where he can organize events, mentor peers, and promote collaborative learning.
