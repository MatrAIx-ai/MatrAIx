  career_goals: Javin dreams of turning his love for technology and helping others into a future career as a community‑focused engineer or STEM educator. He imagines leading a robotics club or a science‑fair
    mentorship program where he can guide younger kids through hands‑on projects. Inspired by Florida’s wildlife, he also entertains the idea of working in environmental conservation, designing tools that
    protect local ecosystems. Ultimately, he wants a role that lets him blend curiosity, practical problem‑solving, and his desire to support and uplift his community.
