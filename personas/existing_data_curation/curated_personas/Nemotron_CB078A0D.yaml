personas:
  professional: Javin Deleon is an aspiring young digital storyteller who uses Scratch to craft interactive adventures, blending curiosity about new coding possibilities with practical, organized block
    structures, while their sociable nature drives them to share projects with classmates and seek feedback.
  sports: Javin Deleon plays on a local youth soccer league with the Hillsborough Hurricanes, joins the school basketball team, and cheers for the Tampa Bay Lightning, Tampa Bay Buccaneers, and Tampa Bay
    Rays, treating each practice as a chance to channel their energetic, team‑oriented spirit.
  arts: Javin Deleon enjoys drumming along to rhythms from artists like Questlove and Caribbean beats, builds intricate LEGO sculptures, and reads fantasy series by Rick Riordan and J.K. Rowling, letting
    these creative outlets shape their imaginative storytelling.
  travel: Javin Deleon loves weekend trips to Clearwater Beach to collect shells, day trips to the historic streets of St. Augustine, and dreams of visiting San Juan, Puerto Rico, to experience the island’s
    music and cuisine, planning trips with a mix of family guidance and personal curiosity.
  culinary: Javin Deleon delights in the flavors of mac and cheese, fried chicken with collard greens, and the aromatic arroz con pollo his family prepares on special occasions, often helping stir the rice
    and sprinkle cilantro, despite occasionally over‑seasoning their own grilled cheese.
  core: Javin Deleon is a bright, energetic nine‑year‑old who juggles curiosity‑driven projects, community‑focused kindness, and occasional worry about school and sports, all while never missing a chance
    to share a LEGO masterpiece.
background:
  cultural: Javin is part of an African American family that has lived in Tampa for generations, rooted in the historic Black neighborhoods of Hillsborough County. His upbringing is shaped by church gatherings,
    family cookouts featuring Southern soul food, and community events like the Tampa African American Heritage Festival and Juneteenth celebrations, where he learns about his ancestors' resilience. The
    Deleon surname also reflects an Afro‑Latinx heritage, bringing elements of Caribbean and Spanish culture into his household through music, language snippets, and seasonal dishes like arroz con pollo.
    This blend of traditions fosters a strong sense of identity, community pride, and a respect for diversity that informs his outlook and aspirations.
