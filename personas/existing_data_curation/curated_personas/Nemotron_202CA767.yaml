  career_goals: Bobbie aims to transition from a general operations manager to a senior executive role such as Director of Operations or Vice President of Operations within the next five years. He wants
    to lead a digital transformation that incorporates AI‑enabled scheduling, advanced analytics, and automated workflow tools across the organization. He also intends to formalize a company‑wide learning
    and development framework that blends his educational expertise with operational excellence, positioning himself as both a strategic leader and a mentor for rising managers. Achieving Lean Six Sigma
    Master Black Belt certification and publishing a white paper on integrating abstract thinking into process innovation are concrete milestones he is targeting.
