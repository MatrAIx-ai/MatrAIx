personas:
  professional: Evelyn Pike, a 40-year-old HR specialist who blends two decades of talent acquisition expertise with their analytical prowess in Tableau and Workday, leverages design‑thinking to craft data‑driven
    employee‑engagement programs, and they aim to transition into a senior HR business partner role steering strategic workforce planning.
  sports: Evelyn Pike, a casual runner who joins the Dallas Running Club for Saturday 5K runs and cheers for the Dallas Cowboys and Texas Rangers, they balance their fitness routine with weekly sunrise
    yoga on their Hill Country patio and a monthly hiking excursion in the nearby Palo Pinto Mountains.
  arts: Evelyn Pike, an avid watercolorist and photographer inspired by visits to the Dallas Museum of Art and Kimbell Art Museum, they study works by Georgia O'Keeffe and James Turrell, regularly attend
    experimental theater productions by The Doorway Theatre, and volunteer to teach mixed‑media workshops to under‑served youth.
  travel: Evelyn Pike, who plans trips like curated art pilgrimages, they have explored the Venice Biennale, the Edinburgh Festival Fringe, and a weekend retreat in Marfa, Texas, savoring cultural immersion
    and scenic photography while keeping travel costs in check through points and careful budgeting.
  culinary: Evelyn Pike, an experimental home chef, they recreate Mediterranean dishes such as Spanish paella with saffron and Italian risotto with truffle oil, love sourcing fresh herbs from local farmers'
    markets, and treat plating as another canvas for artistic expression.
  core: Evelyn Pike merges a data‑driven HR career with a passionate love for art, travel, and experimental cooking, they balance meticulous planning with spontaneous creativity, while occasionally overindulging
    in coffee and neglecting small household chores.
background:
  cultural: Evelyn grew up in a suburban Dallas‑Fort Worth community as part of a middle‑class white family with deep Texan roots. Her upbringing combined traditional Southern hospitality—Sunday barbecues,
    high school football Saturdays, and a strong sense of community—with early exposure to the region’s growing cultural diversity. Raised in a modest, faith‑centered household, she was encouraged to pursue
    both academic rigor and artistic curiosity, leading her to appreciate classic American folk art as well as modern contemporary works. Living in Irving, a multicultural hub, she regularly interacts with
    a vibrant Latino population and embraces culinary influences from her Italian‑American grandparents. This blend of traditional Texan values and an openness to diverse perspectives informs her inclusive
    approach to HR and her enthusiasm for integrating art into everyday life.
attributes:
  skills: '["Talent acquisition and recruitment", "Employee relations and conflict resolution", "Performance management and appraisal systems", "Compensation and benefits design", "HR analytics and workforce
