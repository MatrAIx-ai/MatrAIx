    management", "Data visualization (Tableau, Power BI)", "Facilitation and public speaking", "Strategic workforce planning"]'
  hobbies: '["Visiting art museums (Dallas Museum of Art, Kimbell Art Museum)", "Watercolor painting", "Photography (urban and nature)", "Experimental cooking and recipe development", "Hiking in the Texas
    Hill Country", "Traveling to European art festivals", "Reading contemporary fiction and nonfiction on creativity", "Attending live jazz and music performances", "Volunteering at community art workshops
    for youth", "Practicing yoga and mindfulness"]'
  career_goals: Evelyn aims to transition from her current HR specialist role into a senior HR business partner position within the next three years, focusing on people analytics and strategic workforce
    planning. She envisions leading a cross‑functional initiative that integrates creative arts into employee well‑being programs, positioning her organization as an innovator in workplace culture. In the
    long term, she aspires to become a Director of People and Culture or CHRO, championing inclusive policies, data‑driven talent strategies, and a culture where creativity and performance thrive side by
    side.
