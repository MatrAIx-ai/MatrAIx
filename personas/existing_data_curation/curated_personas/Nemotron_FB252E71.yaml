  hobbies: '["Reading science‑fiction and futurism books", "Hiking coastal and forest trails", "Nature photography", "Participating in a small book club", "Puzzle solving (crosswords, Sudoku)", "Yoga and
    meditation", "Volunteering at a community STEM outreach program"]'
  career_goals: Kathleen aims to scale her company into a leading provider of sustainable technology solutions for small businesses and schools, leveraging data analytics to drive environmental impact.
    She aspires to secure Series A funding, expand her product line, and build a diverse team that reflects her values of harmony and cooperation. Long‑term, she envisions pursuing an MBA to deepen her
    business acumen while mentoring other young women in STEM, ultimately influencing industry standards toward ethical and inclusive innovation.
