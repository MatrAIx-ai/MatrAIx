  hobbies: '[''DIY furniture building'', ''Truck maintenance'', ''Fishing at Lake Houston'', ''Watching Texas Rangers baseball'', ''Cooking Mexican cuisine'', ''Listening to corridos and country music'',
    ''Attending local festivals'', ''Online construction tech workshops'']'
  career_goals: Omar aims to move up from laborer to foreman within the next two years by earning OSHA 30-hour certification and a Green Building Professional credential. He is also interested in supervising
    a crew on larger commercial projects, where he can apply both his hands-on expertise and his curiosity about energy-efficient materials. Long-term, he hopes to establish a small subcontracting business
    that can offer reliable, high-quality work to the Houston area, providing a stable future for his family while maintaining the practical standards he values.
