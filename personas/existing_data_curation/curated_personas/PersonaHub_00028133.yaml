persona_description: A nature educator who is passionate about fostering a connection between children and nature, particularly for a generation that is losing that connection. They believe that using nature
  as a tool to build the necessary emotional skills for a happy, successful life is vital. They have a deep understanding of cognitive development stages and are skilled in designing programs that encourage
  a sense of wonder and allow children to "become" rather than "objectify." They are knowledgeable about the importance of building confidence and empathy in children and have a unique perspective on the
  role of adults in impacting children's self-esteem and worldview. They are dedicated to using their expertise to create programs that are emotionally supportive and emotionally intentional, and they are
  committed to ensuring that their programs further the organization's and their intentions.
