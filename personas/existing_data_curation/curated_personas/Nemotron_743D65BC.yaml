personas:
  professional: Silma Hernandez, a retired community event planner and emerging cultural steward, merges bilingual fluency, disciplined organization, and endless curiosity to design intergenerational festivals,
    craft workshops, and oral‑history projects that blend local sustainability values with vibrant family traditions, because they insist each detail meets their high standards for impact.
  sports: Silma Hernandez, an energetic lifelong learner, stays active through weekly yoga at the Latah County community center, spring hikes with the Moscow‑Idaho Trail Club, cheering on the University
    of Idaho Vandals basketball team and the Seattle Seahawks during football season, and occasionally joining a local senior softball league for friendly competition, because they relish the camaraderie
    and sense of movement it provides.
  arts: Silma Hernandez, a curious art aficionado, frequents the Washington State University Fine Arts Gallery and the Moscow Arts Council exhibitions, where they sketch impressionist works by Claude Monet
    and contemporary pieces by regional painter Kambri Kell, while also attending folk‑dance recitals featuring traditional choreography that fuels their storytelling spirit, because they find visual and
    kinetic art essential to community connection.
  travel: Silma Hernandez, a methodical explorer with an eye for sustainable travel, plans trips well in advance, preferring train journeys to Pacific Northwest gems like Vancouver and Portland, cherishes
    past visits to the historic streets of Santa Fe and the botanical gardens of Seville, and dreams of a cultural exchange tour to the Andean highlands where they can document oral histories, because they
    seek both personal enrichment and material for community programming.
  culinary: Silma Hernandez, a creative culinary enthusiast, adapts beloved family recipes like corn‑filled tamales and mole‑spiced stew using locally sourced heirloom beans, fire‑roasted chilies, and fresh
    herbs from their garden, while confidently hosting seasonal potlucks that pair chipotle‑marinated chicken with Idaho potatoes and a side of roasted squash, because they relish blending tradition with
    regional flavors to nourish friends and neighbors.
  core: Silma Hernandez, a vibrant 75‑year‑old community catalyst, blends disciplined organization with boundless curiosity and a love of garden‑fresh cooking, though they occasionally binge‑watch classic
    soap operas late into the night, ignoring their bedtime.
background:
  cultural: Silma was born to Mexican parents who emigrated from the state of Oaxaca in the 1950s, bringing with them rich traditions of cuisine, music, and textile arts. Growing up bilingual, she maintained
    strong ties to Mexican holidays such as Día de los Muertos, Las Posadas, and Cinco de Mayo, often organizing community celebrations that blend these customs with her Idaho surroundings. Her cultural
    identity is a tapestry of Mexican familial values—respect for elders, communal solidarity, and a love for storytelling—interwoven with the Pacific Northwest’s emphasis on nature and sustainability.
    Silma actively shares her heritage through cooking classes, craft workshops, and oral history projects, nurturing cross‑cultural understanding within her Moscow, Idaho community.
attributes:
  skills: '["Bilingual communication (Spanish/English)", "Community event planning and coordination", "Cultural programming and outreach", "Traditional Mexican cooking", "Embroidery and quilting", "Gardening
