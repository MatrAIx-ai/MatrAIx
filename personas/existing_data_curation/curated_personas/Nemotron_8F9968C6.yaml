personas:
  professional: Scott Fachet is a budding mini‑entrepreneur who runs a colorful lemonade stand on weekends, using a tidy schedule and color‑coded cups to manage inventory and customers, and they take pride
    in keeping the operation predictable and fun for friends.
  sports: Scott Fachet thrives on group activity, they attend a weekday preschool gymnastics class, play on a Little League baseball team that practices after school, and cheer loudly for the Los Angeles
    Dodgers while dreaming of sliding into home plate.
  arts: Scott Fachet immerses themselves in bright cartoon worlds and sing‑alongs, they adore Disney’s "Let It Go" from Frozen, the cheerful tunes of Sesame Street, and the animated adventures of Pixar,
    often mimicking Spider‑Man’s dance moves while doodling colorful pictures of favorite characters.
  travel: Scott Fachet loves family road trips that follow a predictable schedule, they have enjoyed a weekend zoo visit in San Diego and a magical day at Disneyland, and they dream of building sandcastles
    on Hawaii’s beaches while clutching a familiar stuffed bear for comfort.
  culinary: Scott Fachet prefers simple comfort foods and can expertly spread peanut butter on toast, they delight in macaroni and cheese with extra cheddar, love crunchy apple slices, and avoid green beans,
    while their parents encourage occasional broccoli as a hidden‑veggie challenge.
  core: Scott Fachet, a five‑year‑old who thrives on routine and group play, balances organized mischief with emotional intensity, constantly seeking comfort in familiar habits while bubbling with boundless
    energy.
background:
