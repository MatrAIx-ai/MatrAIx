  hobbies: '[''Visiting art galleries and museums'', ''Participating in community storytelling circles'', ''Cooking traditional South Asian dishes'', ''Gardening herbs and vegetables'', ''Attending local
    cultural festivals'', ''Reading historical novels and contemporary non‑fiction'', ''Volunteering at the Brooklyn Public Library'', ''Chair yoga and senior fitness classes'', ''Learning digital photography'',
    ''Playing board games with friends'']'
  career_goals: Although retired from formal employment, Arpita remains driven to contribute to her community and continue personal growth. She aims to develop an intergenerational art program at her local
    community center, where senior artists mentor youth interested in traditional South Asian crafts and contemporary visual media. She plans to compile a collection of memoir pieces and family stories
    to preserve the diaspora experience for future generations. Learning advanced digital photography is a current ambition, allowing her to document neighborhood life and cultural events. Arpita also hopes
    to expand her volunteer work at the Brooklyn Public Library, helping seniors navigate digital resources. Finally, she aspires to maintain her garden as a peaceful refuge that supports her mental well‑being
    and reduces stress.
