  career_goals: Agnes dreams of becoming someone who creates and shares stories or objects that captivate others—she imagines herself as an illustrator for children's books, a museum curator who designs
    interactive art exhibits, or an inventor who builds fun gadgets. She also expresses interest in science, hoping to be a young researcher who discovers new ways to blend art and technology. While she
    enjoys competition, her ambition is to earn recognition for her creative projects and to inspire peers with imaginative ideas.
