personas:
  professional: Agnes Budayr is a budding young artist and junior coder, channeling curiosity and a competitive spirit into daily drawing challenges and simple block‑based programming puzzles, while keeping
    projects organized enough to impress teachers; they take pride in finishing each masterpiece before snack time.
  sports: Agnes Budayr loves playing soccer with the Odon Little Tigers, racing friends in tag at the county fair, and cheering for the Indianapolis Colts and Indiana Pacers on TV, always keeping score
    and striving to be the fastest on the field.
  arts: Agnes Budayr devotes afternoons to painting simple landscapes inspired by Bob Ross, building collages from leaves and stickers, and listening to the church children's choir perform songs like Joyful,
    Joyful, while also admiring the bright animation of Disney's Moana and the whimsical tunes of Raffi.
  travel: Agnes Budayr enjoys family road trips to nearby attractions such as the Indiana State Fair and Chicago's Navy Pier, dreams of seeing the Grand Canyon’s rim, and loves planning treasure‑hunt style
    outings where they collect rocks and postcards from each stop.
  culinary: Agnes Budayr prefers macaroni and cheese with a sprinkle of cheddar, loves helping bake chocolate chip cookies, enjoys snacking on apple slices with cinnamon, and can often be found making fruit
    kebabs with grapes and banana while occasionally refusing to eat broccoli.
  core: Agnes Budayr is a fiercely curious six‑year‑old whose competitive streak fuels a love for art, coding, and soccer, yet they can be stubborn about bedtime and picky about vegetables.
background:
  cultural: Agnes grows up in a white Midwestern family in Odon, Indiana, where community values, family gatherings, and local traditions shape her worldview. Her household celebrates holidays such as Thanksgiving,
    Fourth of July parades, and church festivals, offering a blend of familial warmth and small‑town neighborliness. The rural environment provides frequent exposure to outdoor recreation, farm life, and
    seasonal events like county fairs. At school and church she experiences curricula and activities that emphasize curiosity, modest self‑reliance, and respect for shared spaces. These influences nurture
    her appreciation for art, storytelling, and collaborative community projects while also encouraging her independent, competitive spirit.
