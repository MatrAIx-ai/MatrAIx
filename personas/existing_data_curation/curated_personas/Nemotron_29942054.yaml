  hobbies: '[''painting'', ''digital illustration'', ''visiting art galleries'', ''listening to jazz and blues'', ''reading contemporary Black literature'', ''cooking soulful meals'', ''gardening'', ''volunteering
    at community centers'', ''attending cultural festivals'']'
  career_goals: Veronica aims to earn a bachelor's degree in social work or community health at a local university while balancing her responsibilities as a young wife. She envisions a career as a community
    outreach coordinator for a nonprofit that empowers youth through art and mental‑health initiatives, or as a school counselor who integrates creative programs to support student well‑being. Long‑term,
    she hopes to develop a community arts center in Houston that offers free workshops, mentorship, and safe spaces for underserved families, allowing her to blend her love of art with her drive to help
    others.
