  hobbies: '[''Street Photography'', ''Urban Art Exploration'', ''Basketball'', ''Improv Comedy'', ''Jazz and Hip‑hop Listening'', ''Soul‑food Cooking'', ''Community Gardening'', ''Reading Historical Fiction'']'
  career_goals: Anthony aims to move into a supervisory role within the warehouse, targeting a shift manager position within the next two years and eventually a logistics coordinator or warehouse manager
    role. He plans to enroll in a certified supply chain management program to deepen his technical knowledge. Parallel to his career progression, he aspires to merge his love of art with his professional
    life by managing inventory for an art‑supply distributor or curating a community art space that showcases local artists, leveraging his photographic and design skills.
