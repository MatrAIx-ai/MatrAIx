persona_description: A person who is passionate about social and economic issues and advocates for a global system of socialism, where production and distribution of goods are for the benefit of the community
  instead of for profit. They believe that the problems we face are social problems and that the world's leaders cannot be depended upon to act in the interests of the world's suffering billions. They are
  convinced that change must be global and irreversible, involving all of us and erasing borders and frontiers. They believe that humans are cooperative and work best when faced with the worst, and that
  the desire to cooperate should not be viewed as irrational. They are a leader in the socialist movement and are committed to fighting for a world where production is freed from the artificial constraints
  of profit and people have free access to the benefits of civilisation.
