  hobbies: '[''Line dancing'', ''Book discussion group'', ''Volunteer work at food pantry'', ''Gardening'', ''Southern cooking'', ''Digital photography workshops'', ''E‑commerce trends workshops'', ''Community
    theater attendance'', ''Historic town tours'', ''Travel within the Carolinas'']'
  career_goals: Ashley aims to transition from full‑time floor sales to a part‑time consulting and mentorship role within the next two years. She plans to earn a certification in e‑commerce strategy and
    join the Charlotte Small Business Association as a volunteer mentor, helping boutique retailers modernize their operations. Long‑term, she hopes to design a short‑course series on customer service best
    practices for senior staff and eventually launch a community‑focused pop‑up shop that showcases local artisans while providing a training ground for emerging entrepreneurs.
