  career_goals: Alan aims to transition into a supervisory or training role within his organization, using his extensive experience to guide newer staff. He plans to obtain a certification in customer experience
    management, positioning himself for part‑time consulting after retirement. Ultimately, he envisions a phased retirement that allows him to volunteer in community outreach programs while maintaining
    a modest supplemental income.
