personas:
  professional: Amada Lorenzo, a 14‑year‑old high‑school freshman who channels her curiosity about marine life into a budding environmental storytelling project, blending school assignments with spontaneous
    coastal sketches, and while they are kind and collaborative, they often let organization slip in favor of flexibility, making them a creative yet occasionally scattered junior voice in class.
  sports: Amada Lorenzo, a 14‑year‑old avid surfer who rides the rolling waves at Waikiki with the local Waikiki Surfers Club, spends weekends snorkeling in tide pools, plays recreational beach volleyball
    with friends, and cheers for the Hawaii Rainbow Warriors football team and the Los Angeles Lakers, balancing a love for ocean‑based activity with a casual, flexible approach to organized sports.
  arts: Amada Lorenzo, a 14‑year‑old budding artist who sketches sun‑kissed shorelines, writes flash fiction inspired by island myths, strums a ukulele to the soothing melodies of Israel Kamakawiwo'ole
    and the rhythmic beats of Bad Bunny, practices hula with her school’s cultural club, and enjoys listening to Jack Johnson, Dua Lipa, and traditional Hawaiian chants, weaving these influences into a
    vibrant personal creative style.
  travel: Amada Lorenzo, a 14‑year‑old adventure seeker who loves spontaneous day trips to the North Shore’s surf breaks and weekend hikes to the Makapuʻu Lighthouse, dreams of snorkeling in Bora Bora’s
    crystal lagoons and exploring Maui’s Hana Highway, but balances these aspirations with a modest family travel budget, usually planning low‑cost island stays and relying on school field trips for broader
    cultural exposure.
  culinary: Amada Lorenzo, a 14‑year‑old culinary enthusiast who mixes fresh ahi tuna, diced mango, avocado, and soy‑ginger dressing into a signature poke bowl, enjoys making spicy pork tacos with pineapple
    salsa, often experiments with traditional Hawaiian poi and kalua pork during family gatherings, and shows intermediate cooking skills while occasionally over‑seasoning dishes in a quest for bold flavors.
  core: Amada Lorenzo is a curious, free‑spirit teen who rides Waikiki waves, blends island and spice‑rich family flavors in art and food, and balances a caring nature with a tendency to over‑worry and
    a relaxed, sometimes disorganized, approach to school and life.
background:
  cultural: Amada comes from a mixed Latino heritage – her grandparents emigrated from Mexico and settled in Honolulu, where they blended their traditions with the vibrant local culture. Growing up in a
    multilingual household, she celebrates both Día de los Muertos and Hawaiian holidays like Makahiki, often helping to prepare dishes that fuse flavors, such as poke with mango salsa. The island’s multicultural
    environment has exposed her to Native Hawaiian values of ‘aloha’ and ‘ohana,’ which she incorporates into her daily interactions, emphasizing kindness and community. Her family maintains strong ties
    to both the Latino community in Honolulu’s Chinatown district and the broader Hawaiian community, giving her a rich, bicultural perspective.
attributes:
  skills: '["Bilingual English-Spanish communication", "Basic computer skills (Word, PowerPoint, internet research)", "Creative writing and journaling", "Sketching and drawing", "Ukulele playing", "Fundamentals
