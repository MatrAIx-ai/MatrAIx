  hobbies: '["Surfing and beachcombing", "Sketching coastal landscapes", "Creative writing and journaling", "Ukulele playing", "Hula dancing", "Listening to reggaeton and Hawaiian music", "Volunteering
    at community garden"]'
  career_goals: She hopes to become a marine biologist or environmental educator, focusing on protecting Hawaiian coral reefs while also using her bilingual background to engage Latino communities in conservation
    efforts. In the longer term she envisions studying environmental science at the University of Hawaiʻi and pursuing a career that combines research with community outreach, such as a coastal education
    coordinator. Additionally, her sensitivity to stress and desire to help others has sparked interest in student counseling, so she also contemplates a future where she can support teens' mental health.
