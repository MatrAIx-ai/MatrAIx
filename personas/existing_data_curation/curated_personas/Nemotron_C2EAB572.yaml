  career_goals: Desi aims to advance from a floor‑level surveillance officer to a senior security manager overseeing multiple casino sites in the region. She plans to complete her associate degree in criminal
    justice and obtain the Certified Protection Professional (CPP) credential. In the long term, she envisions establishing her own security consulting firm that specializes in loss‑prevention for hospitality
    venues, combining her practical experience with her entrepreneurial drive. She also hopes to mentor younger security staff, fostering a culture of vigilance and professionalism.
