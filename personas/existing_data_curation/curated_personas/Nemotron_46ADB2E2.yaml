  career_goals: Although retired, Windell still sees himself shaping the next generation. He aspires to formalize his workshop knowledge by volunteering as a mentor in the local senior center’s handyman
    program, and to contribute his memories to the Chicago History Museum’s oral‑history archive. He hopes to compile a small memoir of his life during the civil‑rights era and the Great Migration, and
    to remain active and independent by staying physically engaged through community service and occasional teaching workshops.
