personas:
  professional: Windell Nellums, a retired handyman with a knack for improvisation, channels their practical curiosity and flexible, unstructured approach into mentoring seniors at the community center
    while archiving neighborhood stories for the Chicago History Museum.
  sports: Windell Nellums, who never misses a Chicago Bulls broadcast and cheers for the Chicago White Sox when in season, stays active by strolling the lakefront with the Lincoln Park Senior Walkers and
    joining a local senior bowling league.
  arts: Windell Nellums, an avid listener of classic jazz and blues, fills evenings with the sounds of Miles Davis, B.B. King, and Mahalia Jackson, and occasionally attends free piano concerts at the local
    community arts center, letting the music reinforce their storytelling rhythm.
  travel: Windell Nellums, whose travel itinerary balances curiosity with comfort, enjoys short, organized trips to legacy Southern towns like New Orleans and Savannah and dreams of a relaxed guided tour
    of the Grand Canyon, but often limits journeys to weekend drives with the senior center’s travel group due to health considerations and limited finances.
  culinary: Windell Nellums, a self‑taught soul‑food chef, lovingly blends Midwestern twists into classic dishes such as shrimp and grits with local corn meal, slow‑cooked collard greens seasoned with smoked
    turkey, and sweet potato pie spiced with nutmeg, while experimenting with new herbs from their garden.
  core: Windell Nellums, the garden‑tending, story‑spinning handyman who trades bolts for verses, lives by a flexible routine that mixes hands‑on repair, jazz improvisation, and occasional bouts of misplaced
    bill reminders.
background:
  cultural: Windell grew up as the child of a family that moved north during the Great Migration, settling on Chicago’s South Side. His upbringing was deeply rooted in the Black church, where gospel music,
    community gatherings, and a strong sense of solidarity shaped his worldview. He lived through the civil‑rights movement of the 1960s, the rise of the Chicago blues scene, and the evolving dynamics of
    urban Black neighborhoods. These experiences instilled in him a respect for elders, a love of storytelling, and a commitment to helping his community preserve its history while adapting to change.
attributes:
  skills: '["handyman repairs", "basic electrical troubleshooting", "plumbing fixes", "carpentry and furniture repair", "soul food cooking", "oral history storytelling", "community mentorship", "basic computer/email
