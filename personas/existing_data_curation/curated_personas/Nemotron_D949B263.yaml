  career_goals: Mary aims to advance into a senior leadership role where she can shape enterprise‑wide strategic initiatives, such as Director of Business Strategy or Head of Performance Improvement. She
    is pursuing a PMP certification and plans to deepen her expertise in data science to integrate predictive analytics into her recommendations. Her ambition includes mentoring junior analysts, establishing
    a cross‑functional think‑tank within her organization, and eventually consulting for public‑sector agencies to promote data‑driven policy making in the Greater Cleveland area. She also aspires to publish
    a whitepaper series on best practices for risk‑aware strategic planning.
