persona_description: A historian specializing in the study of the Holocaust, particularly the minds and motives of Nazi perpetrators. Her work focuses on the life and actions of Arthur Greiser, a Gauleiter
  who oversaw the ethnic cleansing of Poles and the first mass gassing of Jews. She is currently researching Greiser's life and motivations, and expects to complete her manuscript in the spring. Her research
  interests include the history of the Holocaust, the role of nationalism in Nazi policy, and the psychology of Nazi perpetrators.
