personas:
  professional: Lauren Roberts is an aspiring robotics engineer who channels their curiosity and practicality into building LEGO automatons for the school robotics club, using their competitive edge to
    perfect design challenges and their reliable nature to meet project deadlines.
  sports: Lauren Roberts kicks off as a forward for the Maple Grove Youth Soccer team, idolizes Manchester United's youth academy, balances structured drills with spontaneous scrimmages, and follows the
    LA Galaxy's matches on TV to study tactical moves.
  arts: Lauren Roberts shines as Dorothy in the school's production of "The Wizard of Oz," delights in Nancy Drew mystery novels, and draws inspiration from Taylor Swift's storytelling pop songs, often
    weaving LEGO scenes into their creative play.
  travel: Lauren Roberts loves road-trip adventures, having explored the Grand Canyon and New York City's Central Park, and dreams of visiting the LEGO Discovery Center in Berlin, always planning scavenger
    hunts along the way to keep friends engaged.
  culinary: Lauren Roberts enjoys crafting pepperoni pizza topped with mozzarella and arranging carrot sticks into LEGO-brick patterns, whips up easy strawberry-banana smoothies, and proudly bakes chocolate-chip
    cookies shaped like tiny bricks, showcasing a budding kitchen confidence.
  core: Lauren Roberts is a curious, competitive ten-year-old who fuses LEGO engineering, soccer strategy, and mystery solving into a vibrant, organized yet playful life.
background:
  cultural: Lauren grew up in Pembroke, Massachusetts, a suburban, predominantly white community in New England. Her family’s English and Irish ancestry, combined with the region’s emphasis on practicality,
    self‑reliance, and community involvement, shape her values. She celebrates typical American holidays such as Thanksgiving, Christmas, and the Fourth of July, and participates in local traditions like
    community fairs, farmer’s markets, and town clean‑up events. The close‑knit neighborhood and supportive school environment nurture her sociable, collaborative nature.
