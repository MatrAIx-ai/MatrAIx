persona_description: A biologist or a molecular biologist who is interested in the study of cellular processes and the organization of chromatin in hematopoietic cells. The person is particularly interested
  in the differentiation of hematopoietic cells and the changes in chromosome territories during this process. They are likely to have expertise in fluorescent in situ hybridization, confocal microscopy,
  and quantitative image analysis, and are interested in the internal organization of chromosome territories and the changes in their morphology during differentiation.
