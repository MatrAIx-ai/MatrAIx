personas:
  professional: Jose Santiagorivera, a bilingual host at a bustling downtown restaurant, leverages strong conflict‑resolution skills and a keen eye for floor dynamics to keep tables turning efficiently,
    while their penchant for routine occasionally clashes with a habit of leaving the host station a bit cluttered as they work toward a shift‑supervisor role and plan to earn a GED.
  sports: Jose Santiagorivera, a regular on his community adult soccer league, defends for the Orange County Strikers on Saturday mornings, follows the LA Galaxy in MLS and cheers for the Los Angeles Angels
    during baseball season, while they also hit the local parks for jogs when the summer heat eases.
  arts: Jose Santiagorivera, an avid listener of energetic norteño and banda tunes, regularly streams tracks by Los Tigres del Norte, Banda el Recodo, and Los Tucanes de Tijuana, and they unwind with classic
    films starring Antonio Banderas and the soulful performances of Chavela Vargas.
  travel: Jose Santiagorivera prefers practical weekend getaways, mapping road trips to sunny Santa Barbara for surf and fresh seafood, a quick dive into San Diego’s coffee scene, and they dream of an extended
    cultural immersion in Oaxaca, all while budgeting carefully around family responsibilities.
  culinary: Jose Santiagorivera, a self‑taught home cook, masters tacos al pastor with pineapple and achiote, simmers hearty pozole using hominy and pork shoulder, crafts fresh guacamole with ripe Hass
    avocados, lime, and cilantro, and they experiment with pour‑over coffee using single‑origin Guatemalan beans.
  core: Jose Santiagorivera blends a love for orderly restaurant flow and competitive ambition with a relaxed, sometimes chaotic planning style, and they fuel their days with soccer, coffee, and spur‑of‑the‑moment
    taco nights.
background:
  cultural: Jose grew up in a Mexican‑American household in Santa Ana, where Spanish was spoken at home and English at school and work. His upbringing emphasized strong family ties, respect for elders,
    and Catholic traditions, shaping his values of loyalty and community. He participates in local cultural events such as Día de los Muertos altars, quinceañeras, and neighborhood festivals, preserving
    Mexican customs while navigating the broader U.S. culture. This bicultural experience informs his bilingual communication style, love for Mexican cuisine, and commitment to supporting his community.
