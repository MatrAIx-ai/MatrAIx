  career_goals: Jose aims to move from host to shift supervisor and eventually assistant manager within his current restaurant, gaining experience in staff scheduling, inventory oversight, and team leadership.
    He plans to enroll in a GED program to improve his credentials and obtain a food‑service safety certification. Long‑term, he hopes to open a small family‑run coffee shop or taco stand that blends traditional
    Mexican flavors with the community vibe of Santa Ana, providing stable employment for his own family and others.
