  career_goals: Rebecca dreams of a future where she can blend her love for structure and problem‑solving. She often says she wants to become a civil engineer or structural architect so she can design safe,
    well‑planned buildings, echoing the way she builds LEGO models. She is also intrigued by detective stories and imagines working as a forensic scientist, applying her analytical mindset and healthy skepticism.
    As a backup, she occasionally mentions becoming a teacher because she enjoys organized classrooms and the predictability of lesson plans.
