  career_goals: In retirement, Phuong Anh aims to stay purposefully active and independent. She aspires to launch a small community cooking class where she teaches traditional Southeast Asian dishes, preserving
    her cultural heritage for younger generations. She also hopes to expand her volunteer work at the senior center, eventually becoming a program mentor for new volunteers. Maintaining her health is a
    personal ambition, so she plans regular hikes on familiar trails and attends stress‑management workshops to counter her tendency toward worry. Though she is not seeking paid employment, she is driven
    to leave a lasting, positive imprint on her local community and family.
