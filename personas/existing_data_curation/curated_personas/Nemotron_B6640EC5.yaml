  hobbies: '["Gardening", "Hiking", "Cooking and baking", "Reading historical fiction", "Volunteering at community garden", "DIY woodworking projects", "Attending local farmer''s markets"]'
  career_goals: Laura aims to advance into senior technical leadership within her current oil & gas firm, targeting a role as Senior Engineering Manager overseeing multi‑disciplinary drilling projects.
    She is also exploring opportunities to integrate sustainable practices, such as carbon capture and enhanced oil recovery, into her portfolio, positioning herself as a bridge between traditional petroleum
    engineering and emerging energy transition initiatives. Mentoring junior engineers—particularly women entering the field—is a personal ambition, reflecting her cooperative nature. Achieving a balanced
    work schedule that supports her family life in Bargersville remains a guiding priority.
