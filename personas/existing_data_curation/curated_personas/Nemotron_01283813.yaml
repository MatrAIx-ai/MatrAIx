  hobbies: '[''Puzzle Solving (Sudoku, Crosswords)'', ''Vegetable Gardening'', ''Hiking (Berkeley hills)'', ''Meal‑Prep Cooking'', ''Non‑fiction Reading'', ''Library Volunteering (Cataloging)'']'
  career_goals: She aims to leverage her organizational strengths into a stable administrative career. In the next two years she plans to enroll in a community college program for Business Administration
    and earn a certification in Medical Office Administration. Her long‑term ambition is to become an office manager or project coordinator in a healthcare or nonprofit organization, where she can implement
    efficient systems and lead a small team.
