persona_description: A physical therapist (PT) or physical therapist assistant (PTA) who specializes in working with children who have experienced trauma or toxic stress. They have a deep understanding
  of the impact of early childhood trauma on brain development and the body's stress response system. They are skilled in recognizing signs and symptoms of trauma in pediatric patients and integrating trauma-informed
  principles into their care. They have a passion for providing optimal health outcomes for children who have or are experiencing trauma and are dedicated to creating a nurturing environment and modeling
  effective coping strategies.
