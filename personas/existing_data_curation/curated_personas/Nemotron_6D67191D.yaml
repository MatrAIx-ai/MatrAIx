  career_goals: Chetram's current ambition is to document his life story and preserve his family's migration history in a memoir, while also learning watercolor painting to express his love for art. He
    hopes to organize a small exhibition of Mexican folk art at the local community center and plans to make a pilgrimage to his hometown in Mexico to reconnect with relatives. Additionally, he wants to
    continue mentoring local youths through senior‑center workshops, sharing his practical skills and cultural heritage.
