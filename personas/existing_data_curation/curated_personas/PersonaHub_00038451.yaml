persona_description: A tobacco industry stakeholder in Nigeria who is actively advocating for the implementation of the 2015 National Tobacco Control Act. They are aware of the loopholes in the law and
  are working to close them. They are also aware of the importance of having comprehensive tobacco control laws in compliance with the Framework Convention on Tobacco Control and are actively pushing for
  their implementation. They have representatives on the regulatory committee and are mobilizing against any new regulations. They are aware of the conflicts of interest and violations of Article 5.3 of
  the WHO's framework, and are working to ensure that the tobacco industry is not interfering with public health policy making.
