  career_goals: Cara aims to move into a supervisory role such as shift manager within the next two years, to acquire a short retail‑management certification, and to mentor younger employees. She also plans
    to work toward a phased reduction of hours as she nears retirement, allowing her to devote more time to family, volunteering, and stress‑relieving activities while ensuring a financially secure future.
