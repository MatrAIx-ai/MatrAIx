  hobbies: '[''Gardening'', ''Fishing'', ''Church choir participation'', ''Card games with neighbors'', ''Cooking family recipes'', ''Reading local newspaper'', ''Attending community festivals'']'
  career_goals: Even though retired, Santos aims to stay independent and healthy, so he focuses on maintaining his physical abilities to continue helping with small repairs and gardening. He hopes to mentor
    his grandchildren in basic trades and cultural cooking, preserving family traditions. He also aspires to volunteer more regularly with the senior outreach program at his church, assisting other elders
    with home maintenance and navigating local services. Managing his stress, he wants to keep his finances stable and ensure his wife’s wellbeing.
