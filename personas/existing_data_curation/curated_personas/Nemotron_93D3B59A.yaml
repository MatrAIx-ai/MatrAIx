personas:
  professional: Santos Bautistaperez, a retired farm and school maintenance hand, now volunteers as a handyman at the local church, using their carpentry and equipment repair skills to keep community spaces
    functional while balancing a laid‑back approach to scheduling and a willingness to speak up when projects stall.
  sports: Santos Bautistaperez enjoys early‑morning fishing on the Guadalupe River, follows the Fayette County Wildcats high school football team each Friday night, and occasionally joins senior shuffleboard
    games at the community center.
  arts: Santos Bautistaperez sings in the church choir, where they cherish the melodies of ranchera legends like Vicente Fernández and enjoy listening to live mariachi performances at the annual town fiesta,
    while also staying informed about local theater through the community newspaper.
  travel: Santos Bautistaperez favors modest road trips across Central Texas—day visits to Hill Country wineries, a yearly pilgrimage to the Basilica of the National Shrine of the Little‑Seed of Mary in
    Laredo, and occasional family reunions in neighboring New Mexico—planning each journey around a tight budget and a preference for familiar scenery over exotic adventure.
  culinary: Santos Bautistaperez delights in preparing homemade pork tamales wrapped in masa, hand‑rolling fresh tortillas for enchiladas topped with red chile sauce, and seasoning dishes with roasted chilies,
    cilantro, and a splash of lime, though they sometimes forget to refrigerate leftovers, leading to occasional food‑safety worries.
  core: Santos Bautistaperez balances a steadfast love for gardening, fishing, and traditional cooking with a laid‑back approach to schedules, a tendency to worry about bills, and a surprisingly sharp tongue
    when a repair project stalls.
background:
  cultural: Santos is a second‑generation Mexican‑American whose grandparents migrated from Jalisco to Texas in the 1940s. He grew up in a bilingual household in Fayette County, celebrating Catholic traditions,
    Día de los Muertos, and Texas Independence Day. His family’s cultural identity blends Mexican culinary customs—such as making tortillas by hand—with the rural Texan lifestyle of farming and community
    gatherings. He remains closely tied to the local Hispanic community, attending the Our Lady of Guadalupe Church, where Spanish prayers and English sermons coexist. His cultural lens influences his values
    of family loyalty, respect for elders, and a strong work ethic.
