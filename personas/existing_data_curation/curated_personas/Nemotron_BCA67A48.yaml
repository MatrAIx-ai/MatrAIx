personas:
  professional: Brandon Mullis, a 71‑year‑old seasoned handyman and volunteer at the senior center, leverages decades of maintenance, plumbing, and woodworking expertise to methodically tackle repairs,
    mentor younger volunteers, and safeguard the community by rigorously vetting external contractors, and they approach each task with a step‑by‑step precision.
  sports: Brandon Mullis, a dedicated member of the Sunset Veterans Bowling Club, competes in the senior league while cheering on the Seattle Seahawks and Los Angeles Dodgers, and spends quiet weekends
    fishing off the pier and strolling the beach for low‑impact fitness, and they relish the friendly competition as a structured outlet for their competitive spirit.
  arts: Brandon Mullis finds comfort in the classic rock of The Rolling Stones and The Beatles, revisits 1960s television gems like The Andy Griffith Show and Bonanza, and devours western and war novels
    such as Shane and The Red Badge of Courage, letting these cultural touchstones shape their modest yet nostalgic leisure palette, and they often discuss plot details during bridge nights.
  travel: Brandon Mullis prefers meticulously planned, low‑stress trips that balance sightseeing with their love of the sea, having enjoyed a relaxed cruise through Alaska’s Inside Passage, a weekend getaway
    to Cape Cod, and dreaming of a tranquil retreat to New Zealand’s South Island while budgeting carefully to keep travel expenses within their modest retirement savings.
  culinary: Brandon Mullis delights in cooking garden‑fresh salads with heirloom tomatoes, zucchini, and basil, prepares hearty clam chowder with locally caught clams, and savors grilled salmon seasoned
    with lemon‑dill, while occasionally treating themselves to classic meatloaf and a slice of apple pie from the neighborhood diner, and they take pride in growing many of the ingredients themselves.
  core: Brandon Mullis is a routine‑driven, anxiety‑prone 71‑year‑old who anchors his days in early beach walks, model ship building, and hands‑on volunteer work, balancing meticulous practicality with
    a skeptical streak and a lingering love for nostalgic classics.
background:
  cultural: Brandon is a white American who grew up in a working‑class family in the mid‑South before relocating to Florida in his early adulthood. His upbringing emphasized self‑reliance, community responsibility,
    and traditional Christian faith. His cultural identity reflects post‑World War II American norms—respect for routine, emphasis on practicality, and a preference for familiar, family‑centered celebrations
    such as Thanksgiving, Christmas, and Fourth of July barbecues. Living in Pompano Beach, he has adopted aspects of the coastal lifestyle while preserving his conventional values.
