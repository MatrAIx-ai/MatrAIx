  hobbies: '[''Abstract Watercolor Painting'', ''Sketching Historic Architecture'', ''Reading Speculative Fiction and Philosophy'', ''Participating in Book Clubs'', ''Attending Local Art and Music Festivals'',
    ''Volunteering at the Savannah African American Museum'', ''Exploring Gullah Heritage Tours'', ''Gardening (Native Plants, Heirloom Vegetables)'', ''Genealogy Research'', ''Playing Piano (Jazz Improvisation)'']'
  career_goals: Averyl aims to transition into a senior leadership role where she can shape sales strategy for her company and champion inclusive, community-focused service offerings. She plans to earn
    a Certified Professional Sales Leader (CPSL) credential within the next two years and to lead a mentorship program that pairs experienced reps with younger, under-represented talent. Long-term, she
    envisions launching a consulting boutique that helps small, minority-owned businesses in Savannah market their services more effectively, allowing her to combine her sales expertise with her passion
    for economic empowerment and cultural preservation.
