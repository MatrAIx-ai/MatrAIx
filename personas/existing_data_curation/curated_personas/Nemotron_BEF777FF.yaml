  career_goals: Orit intends to pursue a practical, stable career that builds on her love of routine and community. She plans to attend a local community college to study horticulture or agricultural technology,
    with the long‑term ambition of managing her family’s orchard or becoming an agricultural extension specialist who helps local farms adopt sustainable practices. She also has an interest in veterinary
    assisting, seeing it as a way to combine her compassion for animals with a reliable professional path. Ultimately, she wants a career that lets her stay rooted in Cashmere, contribute to the local economy,
    and maintain a predictable, organized work environment.
