persona_description: A civil engineering professor who is conducting research on the use of recycled materials and energy efficiency in asphalt paving, aiming to reduce the environmental impact of road
  construction and maintenance. The professor is interested in exploring modified cold mix asphalts and cold mixes that use plastics to achieve a longer-lasting, quieter, and safer end result. The professor
  is also looking into the potential of porous asphalt for eco-friendliness and noise reduction.
