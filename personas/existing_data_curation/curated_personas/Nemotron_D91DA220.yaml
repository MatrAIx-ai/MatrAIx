personas:
  professional: Jesse Sarabia, a disciplined line cook in a bustling Queens kitchen, leverages meticulous organization and bilingual communication to streamline workflow, mentor junior staff with compassion,
    and craft island-inspired menus while thriving as the charismatic hub of the kitchen team.
  sports: Jesse Sarabia, a regular on the Queens community basketball league, practices three evenings a week, roots for the New York Knicks, and incorporates salsa dance conditioning into warm-ups, using
    the sport as both workout and social hub.
  arts: Jesse Sarabia, a devoted salsa and bachata dancer, refines steps to the beats of Celia Cruz, Marc Anthony, and Bomba Estéreo, while also appreciating the visual storytelling of filmmaker Guillermo
    del Toro and the vibrant murals of local street artist Galo Otero, channeling that energy into lively dinner-party performances.
  travel: Jesse Sarabia, an adventurous yet budget-conscious traveler, recently visited the Dominican Republic to source rare ingredients from family farms, plans weekend retreats to the Hudson Valley’s
    organic markets, and dreams of exploring Spain’s Basque Country for its pintxos culture, carefully balancing travel costs with culinary aspirations.
  culinary: Jesse Sarabia, an experimental home chef, loves crafting spiced plantain mash with a fragrant sofrito base, braising pork shoulder in a guava reduction, and simmering a hearty seafood stew with
    orange-infused broth, all plated with fine-dining finesse while documenting the process for their food blog.
  core: Jesse Sarabia, a 31-year-old kitchen virtuoso, balances obsessive organization with extroverted charm, turns family recipes into vibrant fusion feasts, and habitually forgets to turn off the kitchen
    exhaust fan after late-night cooking marathons.
background:
  cultural: Jesse was raised in a Dominican household in Queens, where the rhythm of merengue and the aromas of his mother's kitchen shaped his early years. He grew up speaking both Spanish and English,
    celebrating Dominican holidays such as Día de la Independencia with family gatherings, and participating in community events like the annual Dominican Parade in New York. His cultural identity blends
    traditional Dominican values of family, community, and hospitality with the fast‑paced, diverse environment of the city, influencing his culinary style that fuses Caribbean flavors with contemporary
    techniques. This background fuels his desire to create dishes that honor his heritage while engaging a broad, multicultural audience.
attributes:
  skills: '["Classic cooking techniques (sautéing, grilling, braising)", "Dominican and Caribbean cuisine expertise", "Food safety and sanitation (ServSafe certified)", "Menu development and recipe innovation",
