    "Time management and workflow optimization"]'
  hobbies: '["Experimenting with fusion recipes", "Hosting themed dinner nights for friends", "Salsa and bachata dancing", "Playing basketball in local leagues", "Traveling to the Dominican Republic for
    culinary inspiration", "Food blogging and creating social media content", "Volunteering as a cooking instructor at community centers", "Exploring local street food markets", "Watching culinary documentaries
    and cooking shows"]'
  career_goals: Jesse aims to progress from line cook to sous chef within the next two years, ultimately achieving the position of executive chef at a well‑known restaurant that showcases Caribbean flavors.
    He plans to earn the Certified Chef de Cuisine credential and, within five years, open a family‑run Dominican fusion bistro in Queens that emphasizes farm‑to‑table sourcing and community involvement.
    Jesse also aspires to develop a community cooking program that mentors at‑risk youth, offering them culinary training and life‑skills workshops. He envisions his restaurant becoming a cultural hub where
    food, music, and storytelling celebrate his Dominican heritage, while also gaining recognition in local food festivals and culinary publications.
