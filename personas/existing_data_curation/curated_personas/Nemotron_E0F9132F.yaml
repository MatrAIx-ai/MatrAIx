  hobbies: '[''Art museum visits'', ''Book club participation'', ''Heirloom gardening'', ''Historical travel'', ''Cooking international meals'', ''Volunteer financial literacy tutoring'', ''Community theater
    involvement'']'
  career_goals: Looking ahead, Jill aims to transition into a part‑time advisory role where she can mentor emerging finance professionals and serve on the board of a local arts nonprofit. She is passionate
    about creating a legacy of financial literacy, planning to launch a community workshop series for seniors and small businesses. Additionally, she hopes to author a guide on integrating artistic initiatives
    into corporate budgeting and to ensure a smooth succession plan at her current firm before fully retiring.
