  career_goals: Betty aims to advance from a food preparation role to a supervisory position such as a sous chef or kitchen manager within a boutique or fine‑dining establishment that values culinary creativity.
    She plans to enroll in a culinary arts certificate program to deepen her technique and to obtain advanced food styling training. Long‑term, she envisions launching a small catering business or a culinary
    blog that blends her love for visual art and food, focusing on beautifully plated, culturally inspired dishes. She seeks a harmonious work environment that supports her emotional well‑being while allowing
    her to mentor junior staff.
