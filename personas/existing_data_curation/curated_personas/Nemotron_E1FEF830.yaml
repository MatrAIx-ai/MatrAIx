  hobbies: '["Art Gallery Visits", "Street Mural Tours", "Photography", "Desert Hiking", "Yoga", "Reading Contemporary Fiction", "Design Magazine Subscriptions", "Live Music Concerts", "Cooking International
    Recipes", "Volunteering at Youth Art Workshops"]'
  career_goals: Peter aims to progress within the aviation ground‑services industry, targeting a supervisory position such as Ground Operations Manager or Airport Logistics Coordinator within the next five
    years. To achieve this, he plans to complete a bachelor's degree in Business Administration or Logistics Management and earn certifications in airport safety and operations. He also hopes to merge his
    passion for the arts with his career by leading airport art‑installation initiatives and curating cultural displays that enhance the passenger experience.
