personas:
  professional: An organized community volunteer, Dora Sotoserrano leverages bilingual communication, event‑planning expertise, and a compassionate, methodical approach to lead intergenerational art mentorships
    and orchestrate an annual heritage festival in Tampa, and they consistently follow through on each detail.
  sports: A loyal supporter of Tampa Bay’s sports scene, Dora Sotoserrano cheers the Buccaneers, Lightning, and Rays on game days, participates in a senior walking club at the Riverwalk, and keeps active
    through salsa dancing, yet they tend to skip leg stretches after dancing.
  arts: A passionate creator, Dora Sotoserrano spends afternoons painting watercolors, shaping pottery, and savoring live salsa to the rhythm of Celia Cruz and the improvisations of Miles Davis, while they
    frequently attend gallery openings featuring works by local muralist Carlos Rodríguez.
  travel: An inquisitive traveler, Dora Sotoserrano has explored historic Old Havana, the colonial streets of Cartagena, and the jazz‑laden Bourbon Street in New Orleans, and they now dream of a research
    trip to Seville to trace family roots, though they sometimes delay booking flights until the last minute.
  culinary: An accomplished home cook, Dora Sotoserrano expertly prepares ropa vieja, picadillo, and plantain mofongo seasoned with cumin and oregano from their herb garden, and they delight in sharing
    these dishes at community potlucks, though they occasionally over‑salt the picadillo when experimenting with new recipes.
  core: Dora Sotoserrano is a socially vibrant, organized, and compassionate 66‑year‑old who blends art, culture, and community service, while habitually over‑planting their herb garden, occasionally forgetting
    to set their phone alarm, and they remain unfailingly upbeat.
background:
  cultural: Dora was born to Cuban immigrant parents who settled in Tampa's historic Ybor City neighborhood. Raised bilingual, she grew up surrounded by Cuban music, food, and community celebrations such
    as Carnaval and Independence Day parades. Her upbringing emphasized hospitality, family cohesion, and the importance of helping neighbors, values that continue to shape her compassionate outlook. Living
    in Hillsborough County for most of her life, Dora blends her Cuban heritage with the multicultural fabric of Florida, participating in local cultural festivals and preserving traditional recipes while
    also embracing new ideas and artistic expressions.
