  hobbies: '[''Watercolor painting'', ''Pottery'', ''Salsa dancing'', ''Cuban music listening'', ''Cooking traditional Cuban dishes'', ''Herb gardening'', ''Reading historical fiction'', ''Book club participation'',
    ''Volunteering at senior center'', ''Genealogy research'']'
  career_goals: Although Dora is retired from formal employment, she aims to deepen her impact in the Tampa community. She plans to join the board of the Tampa Bay Cuban Cultural Center, lead an intergenerational
    art mentorship program, and organize an annual Cuban heritage festival that showcases music, dance, and food. She also wishes to complete a digital photography course, document her family's migration
    story in a memoir, and obtain a community health aide certification to better support senior volunteers.
