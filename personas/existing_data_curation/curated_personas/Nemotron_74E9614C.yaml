  hobbies: '[''Volunteering at shelters'', ''Community gardening'', ''Open‑mic nights'', ''Karaoke'', ''Live music'', ''Board games'', ''Hiking'', ''Reading self‑help books'', ''DIY home projects'', ''Cooking
    traditional Polish dishes'', ''Exploring new gadgets'']'
  career_goals: Lee aims to translate his informal experience into a formal role that combines his curiosity for new support methods with his practical skill set. He plans to earn a GED and complete a certification
    in community health work or mental‑health first aid. His short‑term goal is to secure a position as a community liaison or peer counselor within Albany's social service agencies, providing reliable
    assistance to vulnerable residents. Long‑term, he hopes to start a modest handyman side business that funds his volunteer activities and offers stable income, while also developing coping strategies
    to better manage his anxiety and emotional distress.
