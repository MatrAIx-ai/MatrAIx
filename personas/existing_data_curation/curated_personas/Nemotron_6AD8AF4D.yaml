personas:
  professional: Reyna Castillodiaz, a 78‑year‑old community elder and senior‑center volunteer, leverages decades of event‑coordination expertise, bilingual translation skills, and budget‑friendly planning
    to orchestrate cultural festivals and workshops, while their love for flexibility and sociable nature lets them adapt on the fly, even though a preference for structure sometimes clashes with a relaxed
    approach to deadlines.
  sports: Reyna Castillodiaz enjoys low‑impact fitness, joining a senior walking group along the Miami River trail, participating in water‑aerobics at the community pool, and cheering for the local NBA
    team, the Miami Heat, while also dancing to salsa‑bomba rhythms in a cardio‑style class that blends tradition with exercise.
  arts: Reyna Castillodiaz nurtures creative expression by leading knitting circles while listening to salsa legends like Celia Cruz and Willie Colón, and unwinds by watching classic telenovelas such as
    "María la del Barrio" and "Rubí," often weaving traditional island folk songs into community dance evenings.
  travel: Reyna Castillodiaz prefers low‑stress, family‑oriented travel, planning trips around Sunday Mass and support‑group schedules, with recent weekend getaways to Miami Beach and a nostalgic pilgrimage
    to the island’s historic Old City to visit relatives, while dreaming of a relaxed retreat to the famous bioluminescent lagoon off the island’s coast for their next vacation.
  culinary: Reyna Castillodiaz is an adept home chef who passionately prepares traditional mofongo with garlic‑infused sofrito and lean pork, occasionally swapping cauliflower for a lower‑carb twist, masters
    arroz con gandules seasoned with pimientos, olives, and adobo, and delights in ending meals with a creamy tembleque flavored with fresh coconut milk.
  core: Reyna Castillodiaz blends a structured yet flexible approach to community life, balancing diligent event planning with spontaneous salsa dancing, while their gentle anxiety fuels both heartfelt
    compassion for others and occasional bouts of indulgent comfort‑snacking.
background:
  cultural: Reyna was born and raised in a small town in Puerto Rico, where family gatherings, Catholic traditions, and vibrant music shaped her early life. She moved to Hialeah as a young adult, joining
    a large Puerto Rican diaspora that maintains strong ties to the island’s customs. Bilingual in Spanish and English, she regularly celebrates local cultural events such as the Puerto Rican Day Parade
    and Noche de San Juan, and she keeps the island’s culinary heritage alive through her cooking. Her identity blends Caribbean warmth, community solidarity, and the resilience of the Puerto Rican immigrant
    experience.
