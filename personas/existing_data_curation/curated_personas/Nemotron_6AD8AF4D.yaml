  career_goals: Although retired, Reyna aims to stay actively involved in her community by leading a weekly cooking class at the local senior center, mentoring younger Puerto Rican women on cultural traditions,
    and organizing a yearly Puerto Rican heritage day in Hialeah. She also hopes to maintain her health through regular walks and water aerobics, and to travel back to Puerto Rico to visit family and reconnect
    with her roots. Managing her anxiety remains a personal goal, so she plans to continue attending a local support group and practicing mindfulness techniques.
