persona_description: A scientist who specializes in the field of technology and science, particularly in the areas of engineering and design. They have a deep understanding of the process of innovation
  and how it is driven by constraints of time and money. They are skilled in analyzing problems and developing solutions, and are able to create and modify actions based on their own curriculum and aims.
  They are aware of the cultural distortions and alienation that can occur in the process of development, and are committed to understanding the evolution of social and cultural processes of change. They
  are also knowledgeable about the impact of government funding priorities on the development of new technologies, and are aware of the unpredictability of the details of the new science and technology
  that will evolve.
