  career_goals: As he approaches retirement, Eric aims to transition into a mentorship and educational role. He plans to obtain a Certified Imaging Educator credential and teach part-time at the local community
    college, sharing his practical knowledge with the next generation of technologists. He also intends to lead a departmental quality-improvement committee to refine imaging protocols and reduce patient
    radiation dose. Maintaining active involvement in professional societies, he hopes to present case studies at regional conferences. Ultimately, he envisions a phased work schedule that allows him to
    volunteer for community health screenings while dedicating more time to his personal interests.
