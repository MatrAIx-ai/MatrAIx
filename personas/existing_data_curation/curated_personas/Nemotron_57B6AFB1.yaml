personas:
  professional: Sandra Mitchell, a seasoned retail associate with meticulous cash‑handling and inventory expertise, leverages their organized, methodical nature and curiosity about art to excel in customer
    service and mentor new staff, while positioning themselves for a supervisory role.
  sports: Sandra Mitchell enjoys low‑impact fitness through weekly walks with the Durham Senior Walkers club, follows the Durham Bulls baseball team and the Carolina Hurricanes hockey club, and participates
    in community yoga sessions during the spring.
  arts: Sandra Mitchell immerses themselves in creative expression by curating personal quilts inspired by artists like Kara Walker and Jacob Lawrence, attending community theater productions starring local
    talent such as Viola Davis, and debating contemporary art books in their reading circle.
  travel: Sandra Mitchell prefers thoughtfully planned trips that balance cultural enrichment and relaxation, having explored New Orleans for its music scene, Asheville’s art galleries, and aspiring to
    visit Marrakech’s souks and the Musée d’Orsay in Paris.
  culinary: Sandra Mitchell enjoys cooking Southern‑inspired meals, regularly preparing herb‑infused roasted chicken with rosemary and thyme from their garden, collard greens seasoned with smoked paprika,
    and sweet potato bisque, demonstrating a confident, intermediate skill level.
  core: Sandra Mitchell blends methodical retail expertise with a quiet passion for art and community, navigating life with competitive ambition, disciplined finances, and a habit of meticulously cataloguing
    both inventory and knitting patterns.
background:
  cultural: Sandra grew up in Durham as part of a close‑knit African‑American community shaped by the civil‑rights movement and the historic Hayti neighborhood. Her family’s roots trace back to the Southern
    migration, and she attended a historically Black high school where church, gospel music, soul‑food cooking, and community activism were central. The legacy of Durham’s Black cultural resurgence—especially
    its emphasis on storytelling, visual arts, and mutual support—has deeply influenced her appreciation for art, her commitment to community service, and her pride in preserving African‑American heritage.
attributes:
  skills: '[''cash handling'', ''point-of-sale operation'', ''customer service'', ''inventory management'', ''store display organization'', ''schedule coordination'', ''basic bookkeeping'', ''Microsoft
