  career_goals: Sandra aims to advance to a shift‑supervisor or store‑manager position within the next two years, pursuing a retail‑management certification to strengthen her leadership credentials. She
    hopes to leverage her love of art by taking on a part‑time role coordinating community art programs at a local cultural center, eventually launching a small boutique that sells handcrafted items inspired
    by African‑American artistic traditions. Financially, she seeks to solidify retirement savings and explore modest investment opportunities to ensure long‑term stability for herself and her family.
