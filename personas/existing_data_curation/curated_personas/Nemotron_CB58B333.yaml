  career_goals: Dorothy aims to transition from a specialist role to a senior leadership position within a PMO, ultimately becoming a PMO Director where she can shape strategic project portfolios that benefit
    her community in Augusta. She plans to earn the PMP certification and an Agile Certified Practitioner credential to bolster her formal qualifications. Her long‑term ambition includes launching a consulting
    firm focused on inclusive community development projects, such as affordable housing initiatives and youth vocational training programs, while maintaining a healthy work‑life balance that allows her
    to nurture personal relationships and self‑care routines.
