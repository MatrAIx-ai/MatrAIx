personas:
  professional: Dorothy Dembert is a seasoned project management specialist who coordinates cross‑functional teams with meticulous Gantt charts, risk registers, and SOPs, while their sociable, choir‑singing
    spirit keeps stakeholders engaged as they pursue a PMO director role in Augusta.
  sports: Dorothy Dembert energizes their fitness routine with Zumba and yoga classes at the Augusta Recreation Center, runs with the Georgia Running Club’s weekend 5K events, and passionately follows the
    Atlanta Braves, Atlanta Falcons, and Atlanta United FC, combining community sports enthusiasm with personal athletic goals.
  arts: Dorothy Dembert sings soprano in a gospel choir that interprets works by Kirk Franklin and Tasha Cobbs, attends live performances by Beyoncé and the Blind Boys of Alabama, and draws creative inspiration
    from the leadership teachings of Brené Brown and the literary artistry of Maya Angelou.
  travel: Dorothy Dembert favors meticulously planned road trips to historic Southern towns such as Savannah and Charleston, dreams of cultural immersion in Oaxaca, Mexico, and a serene retreat in Kyoto,
    Japan, balancing their wanderlust with a modest travel budget and the need for reliable Wi‑Fi to stay on top of project updates.
  culinary: Dorothy Dembert reinvents Southern soul food by preparing smoked collard greens with miso‑glazed pork belly, sweet‑potato cornbread topped with jalapeño honey, and shrimp‑and‑grits with a hint
    of ginger, using ingredients like heirloom tomatoes, smoked paprika, and locally sourced honey from their backyard garden.
  core: Dorothy Dembert blends methodical project planning with community‑centric energy, channeling their love for volunteerism, gospel singing, and innovative cooking, while their tendency to over‑worry
    often leads to late‑night spreadsheet revisions.
background:
  cultural: Dorothy is a Black woman rooted in the rich cultural tapestry of the South. Growing up in Augusta, she was shaped by a close‑knit extended family and the traditions of the local Black church,
    which fostered a strong sense of community, resilience, and collective responsibility. Her upbringing emphasized the value of oral storytelling, soulful music, and communal gatherings centered around
    food and faith. While she respects these traditions, Dorothy also embraces contemporary influences, staying connected to broader African‑American cultural movements through civic activism, local arts
    festivals, and mentorship programs that empower the next generation. This blend of heritage and modernity informs both her professional ethos—prioritizing inclusive collaboration—and her personal pursuits,
    which celebrate community, creativity, and continuous learning.
