    Gardening'']'
  career_goals: Marcellus is focused on advancing within the United States Postal Service while preserving the stability he values. His immediate goal is to become a shift supervisor or route manager, a
    role that would let him mentor new carriers and contribute to optimizing delivery efficiency. To prepare, he plans to enroll in night courses for an associate degree in logistics or business administration
    and to earn certifications in supply‑chain management and emergency response. In the longer term, he aspires to serve as a postmaster for his local office, ensuring that the service remains reliable
    and community‑oriented. He also intends to obtain a commercial driver’s license so he can take on a side delivery business that supports local entrepreneurs, providing extra income for home ownership
    and financial security. Throughout his career progression, Marcellus remains committed to volunteer work that mentors youth in Opa Locka, hoping to give back to the community that shaped him.
