persona_description: Dr. Mauricio Molina, a musicologist and early music performer, is dedicated to the reconstruction of 11th–13th-century music. He holds a Historical Performance degree from The Mannes
  College of Music (New York) and a musicology Ph. D. degree from the City University of New York Graduate Center. Dr. Molina is the director of the International Course on Medieval Music Performance of
  Besalú (MMB), of the Seminar on Musicology of the UIMP (Universidad Internacional Menéndez Pelayo), and is a visiting professor at the Centre International de Musiques Médiévales (CIMM). Dr. Molina is
  also professor of medieval Christian and Islamic Culture and Art at the American university consortium IES Abroad Barcelona. He is the author of Frame Drums in the Medieval Iberian Peninsula (Reichenberger
  2010). His upcoming book La canción monofónica secular y religiosa en el Occidente medieval (850-1200) will be published by Dairea in 2019.
