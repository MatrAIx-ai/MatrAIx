personas:
  professional: Khosrow Flournoy is a budding young robotics hobbyist, whose disciplined approach to building intricate LEGO creations and programming simple Scratch games demonstrates an early mastery
    of systematic problem‑solving and a competitive drive to outshine peers in school tech fairs.
  sports: Khosrow Flournoy trains with the local youth soccer club on Saturdays, cheers for the Chicago Cubs, yet prefers the mental stamina of weekly chess club matches over physical confrontations, showing
    a competitive spirit that fuels both on‑field drills and strategic board play.
  arts: Khosrow Flournoy spends afternoons sketching with charcoal and watercolor, drawing inspiration from the works of Van Gogh, Hayao Miyazaki, and the Smithsonian’s natural history exhibits, while proudly
    displaying a collection of hand‑drawn celestial scenes on their bedroom wall.
  travel: Khosrow Flournoy has explored the Smithsonian National Air and Space Museum in Washington, D.C., the planetarium at the Natural History Museum in London, and dreams of a family road‑trip to the
    Grand Canyon, favoring meticulously planned itineraries that balance educational stops with time for quiet reflection.
  culinary: Khosrow Flournoy favors spaghetti carbonara, Japanese sushi rolls (with parental help), and homemade pizza topped with fresh basil and mozzarella, often attempting to recreate recipes from cooking
    shows while occasionally over‑seasoning dishes due to eagerness to impress.
  core: Khosrow Flournoy is an eight‑year‑old curiosity‑driven builder who channels relentless organization, competitive spirit, and a hint of worry into art, robotics, and meticulous saving, all while
    preferring quiet corners to crowded rooms.
background:
  cultural: Khosrow was raised in Columbus, Ohio, a Midwestern city known for its strong emphasis on education and a thriving cultural scene. He frequently visits COSI (Center of Science and Industry) and
    the Columbus Museum of Art, which reinforce his love for science and visual art. His family celebrates traditional American holidays while also encouraging exploration of diverse cultural traditions
    through books, museum exhibits, and community events. The name "Khosrow" reflects a familial appreciation for global heritage and learning, fostering an environment where curiosity, disciplined achievement,
    and artistic appreciation are nurtured.
