  career_goals: Khosrow dreams of becoming a space engineer or astronaut who designs rockets and explores the cosmos, while also hoping to merge his love for art by creating visual illustrations of scientific
    concepts. He aspires to win regional science fairs and someday contribute to interactive museum exhibits that inspire other curious kids. His competitive spirit drives him to aim for national recognition
    in both STEM competitions and chess tournaments, and he envisions a future where he can lead innovative projects that blend technology, science, and art.
