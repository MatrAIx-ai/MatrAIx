personas:
  professional: Claudia Lee, a 15‑year‑old high‑school student who blends curiosity with practicality, nurtures a budding interest in environmental illustration by sketching park landscapes, designing Minecraft
    realms, and leading a tiny school book club where they encourage peers to discuss speculative fiction.
  sports: Claudia Lee enjoys weekend hikes with the local junior nature club, supports the San Francisco Giants, Golden State Warriors, and San Jose Sharks from the bleachers, and they prefer low‑impact
    cardio like jogging along the waterfront over organized team sports.
  arts: Claudia Lee immerses themselves in indie acoustic sounds by listening to Bon Iver and Sufjan Stevens, draws inspiration from fantasy illustrator Brian Froud, and they fuel their imagination with
    novels like The Name of the Wind and The Expanse, often sketching scenes while the music plays.
  travel: Claudia Lee favors intimate, nature‑focused getaways, planning family trips to the Redwood forests and dreaming of Iceland’s volcanic landscapes, and they balance a love for spontaneous beach
    walks with the financial reality of a limited teenage allowance.
  culinary: Claudia Lee experiments with simple coastal dishes such as avocado toast topped with smoked salmon and a squeeze of lemon, enjoys gathering fresh seaweed for homemade sushi rolls, and they can
    craft a decent campfire chili using beans, tomatoes, and a pinch of smoked paprika.
  core: Claudia Lee is a solitary, imagination‑driven teen who blends curiosity with a relaxed, sometimes disorganized approach to life, and they constantly juggle creative projects, anxiety, and a habit
    of late‑night gaming.
background:
  cultural: Claudia is a white American teen raised in the suburban community of Glen Burnie, Maryland. Her family reflects a typical middle‑class background, with values rooted in education, community
    involvement, and respect for the local Chesapeake Bay heritage. She grew up with a blend of mainstream U.S. culture—popular music, movies, and internet trends—and regional influences, such as annual
    crab festivals, visits to the nearby waterfront, and an awareness of Maryland’s colonial history. Her ancestry includes German and English roots, which surface in family traditions like holiday baking
    and storytelling. This mix of national and local culture shapes her worldview, fostering both a curiosity about the broader world and a practical appreciation for the steady rhythms of her hometown.
