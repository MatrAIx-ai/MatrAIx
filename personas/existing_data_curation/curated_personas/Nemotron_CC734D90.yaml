  hobbies: '[''Reading fantasy and science‑fiction books'', ''Listening to indie and acoustic music'', ''Sketching nature scenes'', ''Journaling for stress relief'', ''Collecting shells and rocks'', ''Origami
    and DIY crafts'', ''Playing sandbox video games (e.g., Minecraft)'', ''Small‑group nature hikes and book club meetings'']'
  career_goals: Claudia hopes to pursue a career that merges her curiosity about the natural world with practical, hands‑on impact. She is drawn to environmental science, particularly marine ecology of
    the Chesapeake Bay, and envisions becoming a field technician or marine conservation specialist who can help protect local habitats. Recognizing her current academic standing, she aims to earn her high
    school diploma through a GED program, then enroll in a community college to study environmental science or marine biology. She also wants to combine her artistic talent and empathetic nature by creating
    visual content for teen mental‑health outreach, possibly working part‑time as a freelance illustrator for wellness campaigns. Flexible schedules that allow fieldwork and creative projects, while providing
    a stable income, are important to her.
