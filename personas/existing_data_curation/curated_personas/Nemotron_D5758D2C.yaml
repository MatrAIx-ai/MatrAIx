personas:
  professional: Makayla Doe, a retired high‑school English teacher turned community cultural organizer, leverages decades of literary analysis, public speaking, and curriculum design to mentor seniors and
    youth alike, while her blend of curiosity and practicality fuels flexible yet well‑structured workshops that celebrate storytelling, history, and hands‑on arts.
  sports: Makayla Doe enjoys gentle daily walks around the Rochester neighborhood with friends, participates in a low‑impact senior yoga class at the community center, and avidly follows the Rochester Red
    Wings baseball team and the Buffalo Bills football team, cheering loudly during games at the local sports bar.
  arts: Makayla Doe sings gospel and jazz standards such as "Amazing Grace" and "Summertime" with the community choir, leads a quilting circle that recreates scenes from classic literature, frequently references
    authors like James Baldwin and Maya Angelou in discussions, and draws inspiration from musicians like Ella Fitzgerald and Mahalia Jackson while arranging her own harmonies.
  travel: Makayla Doe prefers short, well‑planned trips within upstate New York, having visited the historic Erie Canal Museum, taken a scenic drive to the Adirondack Mountains, and planned a future pilgrimage
    to the National Museum of African American History in Washington, D.C., balancing her love of history with budget‑friendly travel arrangements.
  culinary: Makayla Doe experiments with traditional Southern‑style cooking, perfecting dishes like gumbo, black‑eyed peas, cornbread, and sweet potato pie using fresh herbs from her garden, and enjoys
    sharing these meals at quilting circle gatherings while occasionally over‑seasoning her famous collard greens.
  core: Makayla Doe blends scholarly curiosity with community spirit, juggling a love of literature, choir singing, and quilting while battling occasional forgetfulness, health worries, and a tendency to
    overcommit to volunteer projects.
background:
  cultural: Makayla identifies as African‑American, descended from grandparents who migrated north during the Great Migration and settled in Rochester's vibrant Black neighborhoods. Her upbringing was shaped
    by the city's rich civil‑rights legacy, the historic Rochester Urban League, and the steadfast community life centered around the church. She has cherished family traditions of soulful cooking, storytelling,
    and gospel music, and she actively participates in local cultural festivals that celebrate Black art, history, and resilience. Her experiences reflect a blend of Southern roots, Northern urban life,
    and a deep commitment to preserving and sharing the cultural heritage of her community.
