  career_goals: Even in retirement, Makayla remains driven to deepen her impact on Rochester's Black community. She aspires to complete a memoir that weaves personal history with the broader narrative of
    African‑American life in upstate New York, and to launch an oral‑history project capturing the stories of seniors for future generations. Makayla hopes to mentor local high‑school students through a
    scholarship fund she plans to establish, and to continue leading intergenerational workshops that blend arts, history, and practical life skills. Maintaining her health and mental sharpness to stay
    active in these pursuits is also a central personal ambition.
