  career_goals: Although retired from paid employment, Jenny is driven to deepen her impact on Aitkin’s civic life. She aims to become the senior advisor for a regional aging‑services coalition, mentoring
    younger volunteers and helping shape policies that improve quality of life for seniors. She also plans to launch a community‑history oral‑recording project that uses her organizational skills and curiosity
    of new storytelling technologies to preserve local stories for future generations. Long‑term, she hopes to develop a part‑time consulting service offering small‑scale event‑planning and grant‑writing
    assistance to nonprofit groups, blending her practical expertise with her desire to continue learning.
