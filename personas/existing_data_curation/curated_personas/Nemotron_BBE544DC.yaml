  hobbies: '[''Gardening'', ''Birdwatching'', ''Historical fiction reading'', ''Mahjong'', ''Fusion cooking'', ''Volunteering at the library'', ''Woodworking'', ''Hiking local trails'']'
  career_goals: Chien aims to mentor the next generation of teachers by leading professional‑development workshops focused on flexible, curiosity‑driven pedagogy. He hopes to pilot an interdisciplinary
    reading program that pairs local history with creative writing, fostering both critical thinking and community pride. In the longer term, he envisions authoring a children’s book that weaves East Asian
    folktales with Southern Appalachian themes, and transitioning to a part‑time advisory role that supports curriculum innovation after retirement.
