personas:
  professional: Kelly Pellitteri is an experienced front‑of‑house server who excels at remembering regulars’ orders, handling cash with precision, and keeping a calm dining floor, and they are leveraging
    their pragmatic mindset to pursue a shift‑lead certification while dreaming of running a community‑focused café.
  sports: Kelly Pellitteri enjoys casual fitness through daily walks in the forest preserve, cheers on the Chicago Cubs in the summer and the Chicago Bears in the fall, and they join a community adult softball
    league on weekends, reflecting a relaxed yet consistent approach to staying active.
  arts: Kelly Pellitteri finds creative solace in devouring contemporary romance novels by Nora Roberts, binge‑watching classic sitcoms such as Friends and Seinfeld, and humming along to traditional folk
    ballads during pasta‑making, letting these cultural touches shape their relaxed leisure time.
  travel: Kelly Pellitteri favors low‑key, budget‑conscious getaways, often planning spontaneous weekend road trips to nearby wine regions like Napa Valley or revisiting cherished family vacations in Tuscany,
    while balancing the desire for relaxation with the practical need to save for their future café.
  culinary: Kelly Pellitteri is a confident home cook who routinely prepares comfort staples such as spaghetti carbonara, chicken piccata with fresh basil, and hearty minestrone soup, relishing the aroma
    of garlic and olive oil while they often invite friends over for informal potluck evenings.
  core: Kelly Pellitteri blends a love for routine with a sprinkle of spontaneous anxiety‑driven impulse, balancing meticulous service work and community cooking with occasional disorganized budgeting and
    a habit of over‑knitting when stress spikes, and they often seek reassurance from close friends.
background:
  cultural: Kelly is a third‑generation Italian‑American raised in the Midwest. Her family maintains many Italian traditions, such as preparing homemade pasta and celebrating holidays like Christmas and
    Easter with both Italian and broader American customs. Growing up in suburban Illinois, she was influenced by Midwestern values of hard work, practicality, and community involvement. Although she identifies
    primarily with mainstream American culture, she still enjoys the occasional Italian family gathering, blending those heritage flavors with her everyday life.
attributes:
  skills: '[''Customer service'', ''Accurate order taking'', ''Cash handling'', ''POS system operation'', ''Food safety knowledge'', ''Memory for regular guests'', ''Team collaboration'', ''Conflict de‑escalation'',
