  hobbies: '[''Cooking comfort meals'', ''Home gardening'', ''Knitting and crochet'', ''Reading romance novels'', ''Watching classic sitcoms'', ''Walking in local parks'', ''Attending church potlucks'',
    ''Community volunteering'']'
  career_goals: Kelly aims to transition from a server to a shift‑lead or head‑server role within the next two years, allowing her to shape daily routines and schedule stability for herself and her team.
    She also plans to complete a short certification in hospitality management to broaden her supervisory skills. Long‑term, she dreams of opening a modest family‑run café with her husband that offers comfort
    food and classic Italian dishes, providing a predictable, community‑focused environment that aligns with her practical values and desire for harmony.
