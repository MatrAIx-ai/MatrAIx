  career_goals: Jefferson hopes to combine his love for people and his bilingual abilities into a career that gives him both structure and an opportunity to help his community. He dreams of becoming a bilingual
    elementary school teacher or a community outreach coordinator who can mentor younger kids on both sides of the border. He also imagines a future as a professional soccer player, viewing the sport as
    a way to bring pride to his hometown. In the longer term, he is drawn to roles that involve clear routines—such as a firefighter or a police officer—where he can protect his family and neighbors while
    staying actively engaged with others.
