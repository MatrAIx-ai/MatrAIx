  hobbies: '[''Freestyle rap'', ''Graffiti mural painting'', ''Basketball'', ''Youth theater/performing arts'', ''Reading graphic novels'', ''Listening to jazz and hip‑hop'', ''Volunteering at community
    center'', ''Photography'', ''Digital music production'', ''Attending open‑mic sessions'']'
  career_goals: Donovan aspires to channel his creative energy and community focus into a career that blends art and advocacy. He dreams of becoming a community arts organizer who curates public mural projects,
    runs youth creative workshops, and uses art to address social issues in Baltimore. He also envisions studying visual arts or social work after obtaining his GED, eventually working as a youth counselor
    or arts program director. In the short term, he aims to secure an apprenticeship with a local graphic design studio or a radio station, develop a podcast that highlights stories of under‑represented
    teens, and earn scholarships that support his education.
