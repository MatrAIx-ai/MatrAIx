personas:
  professional: Donovan Horton, a 16‑year‑old budding community arts organizer, leverages his graffiti talent, rap lyricism, and natural charisma to coordinate youth art workshops and open‑mic events while
    meticulously planning each project, reflecting his organized and sociable nature.
  sports: Donovan Horton spends evenings shooting hoops at the neighborhood court, emulating moves from NBA stars like Steph Curry while cheering for the Baltimore Ravens during football season and organizing
    casual basketball tournaments for peers.
  arts: Donovan Horton draws inspiration from graffiti legends like Banksy and KAWS, jams to jazz icons Miles Davis and John Coltrane, and writes verses echoing the storytelling of Kendrick Lamar and J Cole,
    weaving these influences into his sketchbooks and rap freestyles.
  travel: Donovan Horton prefers weekend urban escapes, having explored the street‑art districts of New York City and Philadelphia, while dreaming of a future backpacking trip to Berlin’s vibrant mural
    scene.
  culinary: Donovan Horton loves classic soul food staples such as fried chicken, collard greens, and cornbread, while his culinary curiosity leads him to whip up pepperoni pizza with fresh basil and garlic,
    and they frequently blend in healthy avocado toast with smoked salmon for quick meals.
  core: Donovan Horton channels a restless creative spark and methodical planning into vibrant street art and community events, all while wrestling with bouts of anxiety that sometimes drive impulsive midnight
    snack runs.
background:
  cultural: Donovan grew up in Baltimore’s East/West Side, a historically Black neighborhood where church, family, and community solidarity shape daily life. His family has deep roots in the city’s civil‑rights
    legacy, and his grandparents shared stories of the 1960s Black Power movement and the city’s jazz heritage. Local influences include the soulful sounds of Baltimore club music, the vibrant mural projects
    of the Station North Arts District, and community gatherings at the church and neighborhood block parties. These cultural touchstones foster a strong sense of Black identity, resilience, and a commitment
    to uplift his peers. The city’s challenges—economic disparity, exposure to violence, and systemic inequities—have informed his desire to use art and mentorship as tools for social change.
