persona_description: A scientist and researcher who specializes in the study of textiles, particularly tapestries and their preservation. They have spent years researching and recreating the original 16th
  century dyeing methods and have developed a unique method of 'virtual restoration' that uses tiny beams of specially-calibrated light to show the fine wool and silk threads in their original colors. They
  are excited about the potential of this project to reveal the original splendour of the 'The Oath and Departure of Eliezer' tapestry and to mark the 500th anniversary of the King's accession to the throne.
