  career_goals: Approaching traditional retirement, Khaled aims to transition from day‑to‑day analysis to a senior advisory role where he can shape the firm’s long‑term investment strategy and champion
    responsible investing. He is pursuing the CFA charter to formalize his expertise and plans to lead a cross‑functional team focused on integrating ESG criteria into the portfolio construction process.
    In parallel, Khaled wishes to establish a part‑time consultancy that offers financial‑literacy workshops for small‑business owners in Dorchester County, thereby leaving a lasting community legacy. He
    also aspires to author a guidebook on risk‑aware investing for retirees, sharing his practical insights with a broader audience.
