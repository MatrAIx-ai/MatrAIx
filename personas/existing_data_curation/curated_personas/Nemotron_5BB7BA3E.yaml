  hobbies: '["Attending art workshops and museum tours", "Salsa and Honduran punta dancing", "Community choir singing", "Gardening (herbs, native plants)", "Cooking and recipe experimentation", "Crocheting
    and knitting colorful garments", "Reading mystery novels and historical biographies", "Playing bridge and card games", "Volunteering at neighborhood events and cultural festivals", "Participating in
    senior center bingo and friendly competitions", "Exploring regional cultural festivals and travel excursions"]'
  career_goals: Even though she is retired from formal employment, Ana Maria’s ambitions focus on legacy and communal enrichment. She aims to compile a family cookbook that interweaves recipes with personal
    stories, preserving her cultural heritage for future generations. She aspires to expand the senior center’s art program, introducing unconventional workshops that blend traditional Honduran crafts with
    contemporary media. Ana Maria also hopes to mentor local youth in storytelling and cultural appreciation, fostering a competitive yet collaborative spirit. A lingering dream is to travel back to Honduras
    to reunite with extended family, capture the experience through photographs, and share those narratives in community presentations. Lastly, she wishes to master a new digital platform—such as a podcasting
    app—to broadcast her stories and cultural insights beyond her immediate neighborhood.
