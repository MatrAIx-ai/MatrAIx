  career_goals: Winnie aims to advance to a senior cost manager role within a forward‑looking construction firm, where she can lead a multidisciplinary cost control team and champion sustainable building
    practices. She plans to earn professional certifications such as the AACE Certified Cost Professional (CCP) and the Project Management Professional (PMP) to broaden her strategic capabilities. Over
    the next five years, Winnie aspires to mentor junior estimators, drive the adoption of AI‑enhanced cost analysis tools, and contribute to high‑impact infrastructure projects in the Northeast. Ultimately,
    she envisions launching her own consultancy that blends cost optimization with green design, while still volunteering her expertise for community arts and cultural initiatives.
