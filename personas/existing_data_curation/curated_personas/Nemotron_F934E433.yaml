personas:
  professional: Anita Hanlon, a retired community volunteer and aspiring arts council board member, leverages her meticulous organizational skills, compassionate caregiving experience, and quiet creative
    flair in coordinating intergenerational art workshops and senior‑focused cultural programs.
  sports: Anita Hanlon enjoys low‑impact activities such as weekly nature walks with the local birdwatching club, follows the Nebraska Cornhuskers football team and the Omaha Storm Chasers minor‑league
    baseball, and occasionally practices gentle tai chi at the community center to maintain flexibility.
  arts: Anita Hanlon, a watercolour enthusiast who paints Missouri River vistas while listening to Debussy and Beethoven, participates in a quilting circle that creates hand‑stitched blankets, and finds
    inspiration in the works of American impressionist Winslow Homer and Midwestern folk artist Grandma Moses.
  travel: Anita Hanlon prefers purposeful road trips to historic sites like the Lewis and Clark National Historic Trail and the Badlands National Park, planning itineraries with ample rest days and accessible
    accommodations, while dreaming of a relaxed river cruise on the Mississippi for a future adventure.
  culinary: Anita Hanlon delights in preparing classic Midwestern dishes such as chicken and dumplings, corn casserole, and apple pie, often incorporating fresh herbs from their garden like basil and rosemary,
    and enjoys the comfort of baking a warm batch of cinnamon rolls on Sunday afternoons.
  core: Anita Hanlon blends quiet creativity with meticulous community service, balancing gentle worry with steadfast compassion, all while nurturing gardens, brushes, and a modest retirement portfolio.
background:
  cultural: Anita is a white Midwesterner whose family roots trace back to German and Irish immigrants who settled in Iowa in the early 20th century. She was raised in a small-town environment that emphasized
    self‑reliance, modesty, and community involvement. A lifelong Methodist, she has participated in church‑based service projects and values the close‑knit social fabric of Council Bluffs. Her cultural
    upbringing blends practical Midwestern values—hard work, frugality, and respect for tradition—with an appreciation for the region’s natural landscapes and modest artistic expression, which continues
    to shape her perspective and activities.
