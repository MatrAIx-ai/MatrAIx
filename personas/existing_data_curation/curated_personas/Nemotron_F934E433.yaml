  career_goals: Although retired from formal employment, Anita aims to deepen her impact within the Council Bluffs community. She aspires to serve on the board of the local Arts Council, where she can help
    shape programs that bring art to seniors and small groups. She also hopes to launch a modest intergenerational art workshop that pairs seniors with middle‑school students to create community murals.
    Completing her GED and taking a few community‑college courses in art history are personal learning goals that she believes will enrich her volunteer work. Maintaining her health, independence, and her
    supportive role in her marriage remain central to her long‑term ambitions.
