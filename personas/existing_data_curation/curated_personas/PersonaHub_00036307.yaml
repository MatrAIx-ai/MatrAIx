persona_description: A geneticist and researcher in the field of autism research, focusing on the identification and analysis of genes associated with the development of the disorder. Gusella and his team
  are using cutting-edge technologies to sequence and analyze genes in individuals with autism spectrum disorder and to generate stem cells from subjects with the 16p deletion to study the molecular basis
  for autism. Their research aims to uncover the role of specific genes in autism development and to use the stem cells for further studies on the genetics of autism.
