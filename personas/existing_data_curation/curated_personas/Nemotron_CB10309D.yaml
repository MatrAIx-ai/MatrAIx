  career_goals: Gladys aims to deepen her expertise by earning the Certified Payroll Professional (CPP) credential within the next two years. She hopes to move into a senior payroll specialist or supervisory
    role where she can guide a small team, implement more automated payroll solutions, and design clearer workflow guidelines that reduce her own stress. In the longer term she envisions a part‑time consulting
    practice that lets her apply her knowledge while maintaining a predictable schedule that balances work and family life.
