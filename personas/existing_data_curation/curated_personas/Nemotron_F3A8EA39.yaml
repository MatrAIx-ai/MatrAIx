  hobbies: '["Fishing (catch‑and‑release competitions)", "Woodworking and furniture restoration", "Gardening (vegetables and citrus)", "Listening to classic country music", "Church volunteering and attendance",
    "Senior bingo nights", "Reading historical biographies"]'
  career_goals: Although retired, Tejinder’s primary ambition is to preserve his independence and health so he can continue caring for his home and support his grandchildren’s education. He aims to complete
    a memoir documenting his life lessons and DIY techniques, hoping to pass the knowledge to younger family members. He also aspires to serve on the local senior advisory board to influence community programs,
    ensuring they are run efficiently and safely. Maintaining a well‑kept garden and a perfectly organized garage are personal milestones he sets for himself each season.
