  hobbies: '[''Hiking'', ''Backpacking'', ''Fly fishing'', ''Nature photography'', ''Watercolor painting'', ''Metal art crafting'', ''DIY woodworking'', ''Ukulele playing'', ''Reading sci‑fi novels'', ''Makerspace
    collaboration'']'
  career_goals: Jessica aims to move into a lead fabricator or production supervisor role within the next three years, earning advanced certifications in welding and CNC programming. She aspires to transition
    into a process‑improvement engineer position where she can blend her technical expertise with her creative interests. Ultimately, she dreams of launching a small custom metal‑fabrication business that
    creates artistic furniture and decorative pieces for local clients, allowing her to merge craftsmanship with her love for art and innovative design.
