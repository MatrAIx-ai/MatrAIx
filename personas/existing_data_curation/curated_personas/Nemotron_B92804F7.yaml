personas:
  professional: Jessica Obarr is a seasoned assembler/fabricator with an associate's degree in industrial technology, who expertly reads blueprints, programs CNC machines, welds MIG/TIG and mentors newcomers,
    applying lean‑manufacturing principles and a hands‑on creative mindset to solve production challenges while they eye a future as a process‑improvement engineer and custom metal‑art entrepreneur.
  sports: Jessica Obarr is an avid hiker, fly‑fisher on the Saint Maries River, and member of the Idaho Outdoor Club’s weekend trail crew, cheering on the Boise State Broncos football team and the Seattle
    Seahawks, and they also follow the Portland Trail Blazers while participating in a local CrossFit box for strength training during the winter months.
  arts: Jessica Obarr channels artistic energy into watercolor landscapes inspired by Ansel Adams, captures Idaho’s sunrise in nature photographs posted to @jessicaforges, crafts metal sculptures in their
    makerspace, plays the ukulele to the tunes of The Lumineers at community gatherings, and they devour science‑fiction sagas like The Expanse while browsing local art fairs for fresh inspiration.
  travel: Jessica Obarr enjoys road‑trip planning with detailed itineraries along Highway 95 to Montana’s Glacier National Park, occasional spur‑of‑the‑moment backpacking excursions into the Canadian Rockies,
    weekend getaways to Portland for craft‑brew festivals, and they harbor a dream of visiting Iceland’s rugged waterfalls to sketch volcanic rock formations for future metal‑art projects.
  culinary: Jessica Obarr loves cooking fresh‑caught trout with lemon‑butter sauce, grilling wild Idaho mushrooms with rosemary, whipping up a hearty potato‑and‑cheese chowder using locally sourced cheese,
    and savoring berry cobbler made with harvested huckleberries, while they admit to skipping meals during busy shifts and relying on instant ramen when a deadline looms.
  core: Jessica Obarr blends a toolbox mindset with an artist’s eye, turning metal fabrication into creative expression while they balance disciplined budgeting, hands‑on health maintenance, and a love
    for Idaho’s wild outdoors.
background:
  cultural: Jessica grew up in a small, predominantly white, rural community in northern Idaho, where values of self‑reliance, hard work, and close‑knit neighborhood ties are deeply ingrained. Her family
    heritage reflects Midwestern European ancestry, emphasizing practicality, modesty, and a strong work ethic. The region's outdoor culture and appreciation for hands‑on craftsmanship have shaped her love
    for nature and making things with her hands. While she identifies with mainstream American cultural norms, she respects the local Indigenous heritage of the Nez Perce and other tribes, often learning
    about regional history through community events and local museums.
attributes:
  skills: '[''Blueprint reading'', ''CNC machining'', ''MIG/TIG welding'', ''Manual lathe operation'', ''Quality inspection'', ''Lean manufacturing'', ''Safety compliance'', ''Troubleshooting'', ''Inventory
