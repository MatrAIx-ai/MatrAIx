  hobbies: '[''Reading adventure books'', ''LEGO building'', ''Jigsaw puzzles'', ''Nature walks and rock collecting'', ''Board games with family'', ''Basic Scratch coding'', ''Playing the recorder'', ''Caring
    for a pet hamster'', ''Helping in the kitchen'']'
  career_goals: David dreams of becoming someone who builds and fixes things that help people. He talks about wanting to be a mechanical engineer or a robotics designer who creates safe playground equipment
    for kids in his town. He also imagines helping animals as a veterinarian because he loves his hamster. His long‑term ambition is to study science and engineering in high school and college, and eventually
    design machines that make everyday life easier for his community.
