  hobbies: '[''Reading mystery novels'', ''Daily journaling'', ''Piano (beginner)'', ''LEGO building'', ''School drama club'', ''Organizing community clean‑ups'', ''Volunteering at animal shelter'']'
  career_goals: Danielle envisions a future career that combines her love for helping others with her organized, detail‑oriented mindset. She aspires to become a pediatric nurse or a teacher, roles where
    she can nurture children’s growth while applying systematic approaches to care and instruction. She is also interested in community health coordination, aiming to design and manage programs that promote
    wellness in her neighborhood. In the near term, she plans to run for class president, lead a student‑run tutoring group, and develop a school‑wide peer‑support initiative, all of which will build the
    experience she needs for her long‑term goals.
