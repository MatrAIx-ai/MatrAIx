personas:
  professional: Emily Elkayam is an aspiring interdisciplinary designer who leverages digital illustration, Python prototyping, and strong project management to craft immersive interactive installations,
    blending imaginative storytelling with methodical research and a calm, resilient work ethic.
  sports: Emily Elkayam enjoys weekend hikes through Wissahickon Valley, runs with the Philadelphia Runners Club, follows the Philadelphia Eagles and Philadelphia 76ers avidly, and maintains a balanced
    fitness routine that combines light strength training with regular yoga sessions to counteract long hours at the computer.
  arts: Emily Elkayam immerses themselves in the arts by painting watercolors inspired by the surreal landscapes of James Turrell, attending experimental theater shows by The Wooster Group, curating playlists
    that blend Sufjan Stevens, Björk, and contemporary jazz pianist Tigran Hamasyan, and writing poetry in the style of Ocean Vuong while volunteering at community art workshops.
  travel: Emily Elkayam prefers meticulously planned trips that blend art and nature, having explored New York City's MoMA, the historic streets of Boston, and the mural‑laden neighborhood of Philadelphia’s
    Fishtown, while dreaming of a solo journey to Kyoto's bamboo forests and Iceland's volcanic landscapes to gather inspiration for future installations.
  culinary: Emily Elkayam enjoys experimenting in the kitchen at an intermediate level, frequently crafting Mediterranean mezze plates featuring hummus, roasted red pepper tapenade, and fresh basil pesto,
    while also indulging in artisanal coffee at Philadelphia's La Colombe and occasional visits to avant‑garde pop‑up dinners serving dishes like miso‑glazed salmon with smoked paprika‑infused quinoa.
  core: Emily Elkayam is a relentlessly curious 18‑year‑old who balances a calm, methodical approach to life with a whimsical love for speculative art, often juggling midnight sketch sessions with meticulously
    organized project boards.
background:
  cultural: Emily was raised in a middle‑class, white family of European descent in the suburban neighborhoods surrounding Philadelphia. Her family places a strong emphasis on education, cultural appreciation,
    and community involvement. Growing up near the city’s vibrant arts scene, she was regularly exposed to world‑class museums, galleries, and performance venues, which fostered her love for creativity.
    While her heritage is primarily European, the Elkayam surname reflects a Jewish lineage, and her household occasionally observes Jewish traditions such as celebrating Passover and Hanukkah, fostering
    a sense of cultural continuity. The multicultural atmosphere of Philadelphia has broadened her perspective, encouraging an inclusive appreciation for diverse artistic expressions.
