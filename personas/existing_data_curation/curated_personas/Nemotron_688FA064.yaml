  career_goals: Emily aspires to pursue a bachelor’s degree in interdisciplinary design or digital media at a university renowned for its integration of arts and technology, such as the University of the
    Arts in Philadelphia or RISD. She aims to build a career at the intersection of art, technology, and user experience, envisioning roles like UX researcher, interactive installation artist, or museum
    curator specializing in contemporary media. Her long‑term ambition is to create immersive, thought‑provoking experiences that make abstract concepts accessible to diverse audiences, ultimately leading
    innovative projects within cultural institutions or forward‑thinking design studios.
