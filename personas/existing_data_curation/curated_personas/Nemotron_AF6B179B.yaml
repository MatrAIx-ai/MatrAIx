personas:
  professional: Juan Hernandez is a seasoned boiler operator at a power plant who leverages hands‑on expertise in pressure monitoring, PLC programming, and preventive maintenance to keep the facility running,
    while their blend of practical curiosity and collaborative spirit fuels a five‑year plan to earn an associate degree and step into a senior plant engineer role overseeing renewable‑energy CHP systems.
  sports: Juan Hernandez competes in the Fort Worth Strikers adult soccer league on weekends, joins a casual jogging group on the Trinity River Trail, and roots for the Dallas Cowboys and FC Dallas while
    occasionally volunteering as a water‑boy for his team, blending community camaraderie with personal fitness.
  arts: Juan Hernandez immerses themselves in regional norteña and corrido music, often belting out hits by Los Tigres del Norte and Ramón Ayala at karaoke nights, while also appreciating live performances
    at the Fort Worth Stockyards and channeling that creative energy into Arduino tinkering that feels like a modern folk craft.
  travel: Juan Hernandez prefers spur‑of‑the‑moment road trips, frequently escaping to Austin for its music scene, planning weekend drives to Santa Fe for its art markets, and dreaming of a future cross‑border
    adventure to the Yucatán, all while budgeting trips around modest savings and occasional overtime earnings.
  culinary: Juan Hernandez boasts a solid knack for cooking, regularly whipping up carne asada tacos, cilantro‑lime rice, and smoky chipotle salsa for neighborhood barbecues, while they experiment with
    homemade elote and occasional spicy chorizo breakfast burritos, showcasing a palate that balances bold, smoky flavors with fresh herbs.
  core: Juan Hernandez blends hands‑on engineering curiosity with a sociable, laid‑back vibe, juggling community gatherings and career ambitions while wrestling with stress‑induced worry and occasional
    disorganization.
background:
  cultural: Juan is a first‑generation Mexican‑American raised in a bilingual household. His parents immigrated from Jalisco, and he grew up celebrating traditional Mexican holidays such as Día de los Muertos,
    Día de la Independencia (September 16), and the Feast of Our Lady of Guadalupe. He speaks fluent Spanish and English, and he maintains close ties with the local Mexican community in Fort Worth, attending
    church services at a nearby Catholic parish and participating in cultural events hosted by the Tarrant County Hispanic Chamber of Commerce. He enjoys Mexican cuisine, especially homemade tamales and
    pozole, and he incorporates family recipes passed down from his grandparents into his weekend cooking.
attributes:
