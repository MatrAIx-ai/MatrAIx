  hobbies: '[''Soccer (adult league)'', ''Barbecue gatherings'', ''Cinco de Mayo festival participation'', ''Karaoke'', ''Listening to regional Mexican music'', ''Arduino hobby projects'', ''Jogging along
    Trinity River Trail'', ''Mindfulness workshops'', ''Cooking traditional Mexican dishes'', ''Community volunteering at local church'']'
  career_goals: Juan aims to advance from his current boiler operator role to become a senior plant engineer within the next five years. He plans to obtain an associate degree in industrial technology and
    acquire certifications such as Certified Plant Operator (CPO) and Advanced Boiler Operator (ABO). He is also interested in transitioning into renewable‑energy operations, specifically overseeing combined
    heat‑and‑power (CHP) systems that integrate biomass boiler technology. Additionally, he wants to develop stronger organizational habits to reduce workplace stress and become a mentor for new hires.
