personas:
  professional: Yolanda Garcia is an aspiring junior cartoonist who channels her keen curiosity and competitive edge into daily sketch challenges, organizing her drawings of desert flora and cartoon characters
    in a colorful notebook while remaining flexible enough to experiment with new styles.
  sports: Yolanda Garcia spends her afternoons at the Sunrise Swim Team practicing freestyle laps, kicks a soccer ball for the Little League Tigers, and eagerly cheers for the Houston Astros during baseball
    season, balancing her love for active play with occasional nature hikes that keep her curious about rocks and insects.
  arts: Yolanda Garcia fills her sketchbook with doodles inspired by 'Adventure Time' characters and the delicate line work of illustrator Jillian Tamaki, while she hums along to folk melodies from the
    Avett Brothers during family dance gatherings, letting the rhythmic beats shape the flow of her drawings.
  travel: Yolanda Garcia dreams of swapping seashell hunts on the Gulf Coast for an adventure at Grand Canyon National Park, while she already treasures trips to the local desert preserve where she sketches
    cacti, and she eagerly anticipates a future family vacation to Disney World and perhaps a cultural excursion to Paris.
  culinary: Yolanda Garcia, a budding junior chef, delights in mixing bright fruit kebabs of strawberries, grapes, and banana with a drizzle of honey, munching on crispy chicken nuggets and macaroni‑and‑cheese
    after school, and she proudly assembles simple cheese quesadillas with shredded cheddar and a slice of avocado under her mom’s watchful eye.
  core: Yolanda Garcia, a curious 7‑year‑old cartoonist who balances fierce competition with shy worries, finds solace in doodling, shells, and seasonal adventures.
background:
  cultural: Yolanda grows up in a Mexican-American household in Mission, Texas, where both English and Spanish are spoken daily. Family traditions include preparing tamales, celebrating Dia de los Muertos
    with altars, and participating in Cinco de Mayo parades. She attends a bilingual elementary school that incorporates Mexican cultural heritage, such as folk art and music, into its curriculum. The close-knit
    community of Hidalgo County, with its blend of Texan and Mexican influences, shapes her values, language fluency, and artistic sensibilities.
