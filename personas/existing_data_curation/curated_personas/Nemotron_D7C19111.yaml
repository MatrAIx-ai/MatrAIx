  career_goals: Yolanda often imagines becoming a wildlife artist who can paint colorful murals of animals she sees in nature, or an astronaut who explores new planets. She also dreams of being a scientist
    who solves mysteries, reflecting her curiosity and competitive drive. Occasionally she mentions wanting to be a teacher who shares her love for art and science with other children, showing her desire
    to make a positive impact.
