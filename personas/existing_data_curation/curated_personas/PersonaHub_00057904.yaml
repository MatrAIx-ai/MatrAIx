persona_description: A person who is knowledgeable and experienced in water management and planning, particularly in the Trinity River basin. They have worked closely with various implementing agencies,
  including the U.S. Army Corps of Engineers, and have been involved in the preparation and maintenance of the Texas Water Plan since the 1960s. They have also served on the stakeholder committee and expert
  science team created by 2007's Senate Bill 3 to recommend flows and inflows for all watersheds draining to Galveston Bay. They are familiar with TRA's statutory mandate to prepare and maintain a master
  plan for responsible water use and reclamation and have worked with various entities, mostly municipalities, to implement water-related programs that serve the needs of Texas residents.
