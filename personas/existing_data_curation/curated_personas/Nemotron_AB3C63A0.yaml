  career_goals: Kimberly envisions a future where she can blend her love for art and technology, aiming to become a concept artist for video games or animated films. She is also intrigued by environmental
    design and hopes to study sustainable architecture in high school, eventually contributing to museum exhibitions that showcase innovative art. Her curiosity drives her to seek interdisciplinary learning,
    and she aspires to attend a STEM‑focused magnet school where she can deepen her skills in both creative and analytical domains.
