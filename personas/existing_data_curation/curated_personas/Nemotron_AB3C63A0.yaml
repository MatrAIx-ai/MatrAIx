personas:
  professional: Kimberly Harris, a budding visual storyteller, channels boundless curiosity into meticulously organized sketchbooks while flexibly experimenting with watercolor and digital animation, tackling
    each creative project with a competitive spark that fuels rapid skill growth, and they eagerly share their progress with peers.
  sports: Kimberly Harris, a member of the school’s after‑school hiking club and a fervent supporter of the Seattle Sounders FC, spends weekends scaling nearby foothills and joining youth soccer drills,
    balancing a competitive edge with a love for outdoor exploration, and they eagerly compete in local soccer matches whenever possible.
  arts: Kimberly Harris immerses themselves in the worlds of Hayao Miyazaki’s animated classics, Stan Lee’s Marvel comics, and Osamu Tezuka’s manga, drawing inspiration for their own comic‑style characters
    and watercolor landscapes while regularly binge‑watching Pixar films and devouring graphic novels like 'Saga,' shaping a vibrant artistic identity, and they often sketch new characters inspired by their
    favorite films.
  travel: Kimberly Harris, who explores the nearby foothills on family hikes and has already visited the Grand Canyon on a school‑organized trip, dreams of trekking the bamboo forests of Kyoto and sketching
    the streets of Paris, planning each adventure with a detailed journal and an eye for drawing fresh scenery, and they map out future journeys with a blend of curiosity and competitive ambition.
  culinary: Kimberly Harris enjoys a mixed palate of classic pepperoni pizza, homemade sushi rolls with cucumber and avocado, and bubbling strawberry‑banana smoothies, often attempting simple dishes like
    spaghetti bolognese and vegetable stir‑fry, but occasionally burns toast when rushing to finish a comic sketch, and they love experimenting with new sauces whenever they have free time.
  core: Kimberly Harris blends a relentless curiosity with competitive zeal, turning every sketch, hike, and budget decision into a playful experiment, and they juggle occasional forgetfulness with a love
    for bold, colorful creations.
background:
  cultural: Kimberly was raised in a middle‑class white family in Meridian, Idaho, where community values emphasize self‑reliance, education, and outdoor recreation. Her family regularly attends local events
    such as the county fair, community theater performances, and church gatherings, fostering a sense of belonging and modest traditionalism. At school, she is exposed to a gradually diversifying student
    body and a curriculum that introduces global art styles and scientific perspectives, which nurtures her appreciation for varied experiences. While the region is largely homogenous, her internet access
    and school programs provide her with multicultural influences that shape her open, unconventional thinking.
