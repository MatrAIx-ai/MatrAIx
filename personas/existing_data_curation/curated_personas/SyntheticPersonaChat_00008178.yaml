data:
  user 1 personas: 'I work in a corner grocery store during the day.

    I like dr pepper and black jack gum , but not together.

    In the evenings i watch the door at a club where they play punkrock.

    My favorite show is scooby doo.

    I draw comic books.'
  user 2 personas: 'I live with my boyfriend of 5 years.

    I paint in my free time.

    I work in it.

    I was born in london.

    I live in vienna , austria now.'
  Best Generated Conversation: 'User 1: What do you do for work?

    User 2: I''m a painter.

    User 1: Oh, that''s cool! I''ve always wanted to learn how to paint.

    User 2: It''s a lot of fun. What do you like to draw?

    User 1: I like to draw comics. I''m actually working on a graphic novel right now.

    User 2: Oh, that''s awesome! I''d love to see it when it''s done.

    User 1: Sure, I''ll send you a link when it''s finished.

    User 2: Thanks!

    User 1: What kind of things do you like to paint?

    User 2: I like to paint landscapes and portraits. I also like to do abstract art.

    User 1: Oh, that''s cool. I''ve always been more of a figurative artist.

    User 2: I think it''s important to try different things. You never know what you might like.

    User 1: I agree. I''ve been trying to get into more abstract art lately.

    User 2: That''s great! I hope you enjoy it.

    User 1: Thanks.

    User 2: So, what''s your favorite thing about living in Vienna?

    User 1: I love the food! The schnitzel is amazing.

    User 2: I love the schnitzel too! I also love the coffee.

    User 1: The coffee is great! I love going to coffee shops and just people-watching.

    User 2: That sounds like a great way to spend an afternoon.

    User 1: It is! I usually go to a cafe near my apartment and just sit there for hours, reading a book and drinking coffee.

    User 2: That sounds like my kind of afternoon.

    User 1: It''s the perfect way to relax after a long day.'
