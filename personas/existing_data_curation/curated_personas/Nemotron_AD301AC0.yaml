  career_goals: Arsie aims to move into a supervisory role within the next two to three years, targeting a team‑lead position where he can mentor new hires and shape the department’s service strategy. He
    plans to complete his associate coursework in Business Administration and earn a bachelor’s degree, positioning himself for a future transition into a Customer Success Manager or Quality Assurance Analyst
    role. To support this trajectory, he intends to acquire professional certifications such as the Certified Customer Service Professional (CCSP) and a Six Sigma Yellow Belt. Arsie is also excited about
    learning data‑visualization tools like Tableau to turn customer feedback into actionable insights. Long‑term, he envisions launching a side consultancy helping small businesses design efficient support
    workflows, leveraging his blend of curiosity‑driven innovation and practical execution.
