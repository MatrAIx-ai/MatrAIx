  hobbies: '[''Woodworking'', ''Electronics tinkering'', ''Home gardening'', ''Cooking Guatemalan cuisine'', ''Reading non-fiction'', ''Chess'', ''Walking along Inner Harbor'']'
  career_goals: Christian aims to move from first‑line supervision to a district or regional manager position within the next five years, using data‑driven strategies to lift performance across multiple
    stores. He plans to enroll in an MBA program to deepen his strategic and financial acumen, and eventually launch a consulting practice that helps retail chains improve operational efficiency while fostering
    inclusive, culturally aware workplaces. Mentoring emerging supervisors and championing DEI initiatives are also central to his long‑term ambition.
