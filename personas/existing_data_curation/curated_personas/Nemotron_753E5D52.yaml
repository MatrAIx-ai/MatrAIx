    ''Reading about art and culture'']'
  career_goals: Catherine aims to move from floor service to a supervisory role, eventually managing a boutique café or restaurant that also serves as a local art gallery. She plans to earn a hospitality
    management certification, develop leadership and staff‑training skills, and perhaps open her own community‑focused coffee shop where she can host art workshops, live music nights, and cultural events,
    all while maintaining a flexible schedule that supports her creative interests.
