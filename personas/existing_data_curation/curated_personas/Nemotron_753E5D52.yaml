personas:
  professional: Catherine Olen, a 41‑year‑old server at a bustling downtown bistro, blends an eye for artistic plating with calm composure and rapid menu mastery, leveraging strong communication and conflict‑resolution
    skills to champion a move into a supervisory role and ultimately manage a boutique café that doubles as a community art gallery.
  sports: Catherine Olen, an avid weekend hiker who explores nearby state‑park trails, also roots for the Hartford Yard Goats in baseball and follows the Boston Celtics during the NBA season, favoring low‑impact
    cardio and occasional group dance classes at the community center to stay fit.
  arts: Catherine Olen, a devoted patron of New Britain’s art galleries and regular attendee of live jazz nights featuring artists like Kamasi Washington, channels inspiration into sketching urban street
    scenes and photographing light play, while drawing creative spark from Yayoi Kusama’s installations and the lyrical storytelling of Lin‑Manuel Miranda.
  travel: Catherine Olen balances spontaneous road trips with carefully curated cultural tours, frequently escapes to Boston for museum hauls, has spent a long weekend wandering Montreal’s art districts,
    and dreams of immersing in the cafés of Paris and tea houses of Kyoto, all while keeping travel budgets flexible to support future café‑gallery aspirations.
  culinary: Catherine Olen, a culinary tinkerer who crafts turmeric‑infused quinoa bowls, perfects silky cold‑brew espresso with latte‑art flair, and regularly bakes rosemary‑sprinkled focaccia, treats
    the kitchen as a laboratory where each new recipe is paired with an indie folk playlist, and occasionally over‑season dishes in pursuit of bold flavors.
  core: Catherine Olen, a 41‑year‑old hospitality enthusiast with an artistic soul, thrives on spontaneous creativity, occasionally misplaces keys and forgets appointments due to a relaxed approach, and
    balances calm resilience with a contagious enthusiasm for community‑centered café culture; they bring a breezy, community‑first vibe to every endeavor.
background:
  cultural: Catherine grew up in a working‑class family in New Britain, Connecticut, a city known for its blend of classic New England values and vibrant immigrant neighborhoods. Her upbringing emphasized
    community, modest traditions, and neighborly support. While identifying as white, she was exposed to the cultural diversity of Hartford County, fostering an open‑minded outlook and a deep appreciation
    for local arts, multicultural gatherings, and the shared social fabric of her region.
