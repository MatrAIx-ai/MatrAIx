persona_description: A healthcare professional who specializes in the diagnosis and treatment of pneumothorax, particularly in the management of patients with large pneumothorax or symptoms from the condition.
  They are familiar with the symptoms, diagnosis, and treatment options for pneumothorax and have experience with the surgical and nonsurgical treatments. They also have knowledge of the precautions to
  be taken when suffering from pneumothorax, the lifestyle changes that should be made, and the reasons why pneumothorax is common in certain populations. They are knowledgeable about the causes, symptoms,
  and treatment options for tension pneumothorax, which is a medical emergency.
