  career_goals: Although retired and not seeking formal employment, Juanita aims to deepen her artistic engagement and contribution to her community. She hopes to curate a small traveling exhibition of
    local seniors' artwork, providing a platform for quiet, appreciative audiences. She aspires to document her personal and family stories in a memoir, blending her genealogical research with reflections
    on art and resilience. Additionally, she wishes to expand the senior center’s arts program, offering weekly watercolor workshops and mindfulness‑based art sessions to help peers manage anxiety and find
    emotional balance.
