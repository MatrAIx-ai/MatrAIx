  career_goals: Bruno aims to advance to a supervisory role, such as shift supervisor or assistant manager, and eventually become store manager. He plans to earn a retail management certification and complete
    his GED to broaden his qualifications. Long‑term, he dreams of opening a small family‑owned convenience store that doubles as a community hub, using his social skills and curiosity to create a welcoming
    gathering place for locals. He also hopes to take a leadership role in organizing town events and possibly serve on a local business board.
