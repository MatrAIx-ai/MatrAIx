  hobbies: '["Sketching (cityscapes, fantasy creatures)", "Watercolor painting", "Charcoal drawing", "Digital illustration", "Model building (LEGO Technic, scale ships)", "Reading sci‑fi and philosophy",
    "Visiting art museums", "Attending community art workshops", "Blogging about visual experiments", "Playing narrative‑driven indie video games"]'
  career_goals: Joshua aims to obtain his GED within the next year and then pursue an associate’s degree or apprenticeship in visual arts at a community college or local design studio. His short‑term goal
    is to build a professional portfolio that showcases his illustration, concept art, and interactive media projects. He aspires to become a concept artist for video games or graphic novels, eventually
    working freelance while collaborating with creative teams. In the longer term, Joshua dreams of creating an interactive digital platform that merges abstract concepts with immersive visual experiences,
    positioning himself for a role such as creative director or lead designer in a technology‑driven media company.
