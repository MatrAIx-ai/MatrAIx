  hobbies: '[''Desert gardening'', ''Birdwatching'', ''Bridge club'', ''Quilting circles'', ''Historical fiction reading'', ''Museum docent volunteering'', ''Southwestern cooking'', ''Genealogy research'',
    ''Walking local trails'', ''Digital photography'']'
  career_goals: Although retired, Sharon remains goal‑driven. She aims to maintain her physical health through regular walking on local trails and to keep her mind sharp by pursuing lifelong learning—particularly
    in digital photography and genealogy research. She hopes to expand the senior‑center mentorship program she helped launch, creating more opportunities for younger community members to learn from seniors.
    Additionally, she aspires to curate a small exhibit on the history of Graham County, preserving local stories for future generations.
