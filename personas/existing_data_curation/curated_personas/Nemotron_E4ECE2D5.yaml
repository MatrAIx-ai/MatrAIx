personas:
  professional: Sharon Cabot, a retired civil engineer who spent decades designing safe infrastructure in the Southwest, now channels their analytical precision and clear communication into mentoring seniors
    at the local community center and curating historical exhibits, applying their structured mindset to volunteer project coordination.
  sports: Sharon Cabot, an enthusiastic walker who hits the Safford Trails five times a week, cheers on the Arizona Diamondbacks and Phoenix Suns, and they participate in a senior walking club that meets
    at the community center, keeping active with low‑impact cardio and friendly competition.
  arts: Sharon Cabot, a dedicated quilter and avid reader of historical fiction, finds inspiration in the works of Margaret Mitchell and the paintings of Georgia O’Keeffe, and they regularly attend the
    local museum’s art talks and enjoy Sunday evenings listening to John Denver and classic Broadway recordings.
  travel: Sharon Cabot, who plans trips with the same spreadsheet precision she used for engineering projects, favors weekend drives to Saguaro National Park, a nostalgic pilgrimage to her family’s hometown
    in Kansas, and long‑awaited visits to Washington D.C.’s archives for genealogy research, and they always use senior discounts and modest lodging options.
  culinary: Sharon Cabot, an avid gardener and southwestern cuisine enthusiast, often prepares dishes such as green‑chile enchiladas, prickly‑pear salsa, and grilled cactus seasoned with fresh cilantro
    and locally sourced corn, proudly cooking meals that showcase the bounty of their own desert garden while they occasionally host potluck gatherings for friends at the senior center.
  core: Sharon Cabot, an 84‑year‑old retired engineer turned community mentor, blends disciplined practicality with a zest for social connection, garden stewardship, and lifelong learning, while they occasionally
    indulge in nostalgic quirks like hoarding spare buttons and checking the weather forecast three times a day.
background:
  cultural: Sharon was born in 1941 in the Midwest to a middle‑class Protestant family and grew up during the Silent Generation, a period that emphasized hard work, frugality, and community responsibility.
    After earning her STEM degree, she relocated to Safford, Arizona, where she embraced the desert lifestyle while retaining her Midwestern values of reliability and practicality. Her long‑standing marriage
    reflects a traditional commitment to family, and she remains active in her Methodist church, local senior center, and volunteer organizations, blending her heritage with the regional culture of southwestern
    Arizona.
