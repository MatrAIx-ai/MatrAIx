  career_goals: Melinda aims to secure a board position at a Washington, DC museum where she can influence arts education policy and champion community outreach. She hopes to launch a neighborhood art initiative
    that offers free workshops for seniors and low‑income families, leveraging her organizational and fundraising expertise. Over the next few years, she plans to complete a certificate in museum studies,
    publish a memoir reflecting on her lifelong love of art and coping with anxiety, and become a mentor for younger volunteers, fostering the next generation of cultural stewards.
