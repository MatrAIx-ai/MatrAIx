personas:
  professional: Louie Brown, a two‑year‑old aspiring architect, meticulously stacks colorful blocks into precise towers, and they display an early love of structure and a practical, detail‑oriented mindset.
  sports: Louie Brown attends a toddler gymnastics class at Little Gym, delights in tossing soft soccer balls in the backyard, and they cheer enthusiastically for the city’s Major League Baseball team,
    the Chicago Cubs, during spring games.
  arts: Louie Brown enjoys dancing to The Wiggles' upbeat songs, watches animated shorts by Pixar such as 'Piper,' and they love scribbling with Crayola crayons while listening to classic children's tunes
    like 'Twinkle Twinkle Little Star' performed by Disney’s Mickey Mouse.
  travel: Louie Brown loves family road trips to the nearby coastal beach in Myrtle Beach, thrills at visiting the local zoo in San Diego, and they dream of one day riding the iconic carousel at Disneyland
    in Anaheim, preferring short, predictable journeys over long, unstructured adventures.
  culinary: Louie Brown prefers soft mashed sweet potatoes, creamy mac and cheese, and banana slices, and although they cannot cook, they eagerly help stir batter for pancakes with a tiny wooden spoon,
    delighting in the taste of melted cheddar cheese on toast.
  core: Louie Brown is a quietly curious toddler who thrives on routine, savors simple comforts, and navigates the world with a gentle, organized heart despite occasional worries.
background:
  cultural: Louie was born and raised in a suburban neighborhood of Albemarle County, Charlottesville, Virginia. His family participates in typical Mid‑Atlantic U.S. cultural practices, including attending
    a local community church, celebrating holidays such as Thanksgiving and Fourth of July with family gatherings, and taking advantage of the region’s public library story‑time sessions and children’s
    museum visits. The area’s emphasis on community involvement and educational resources shapes his early experiences and values.
