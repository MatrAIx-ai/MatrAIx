  hobbies: '[''Gardening'', ''Southern Cooking'', ''Historical Fiction Reading'', ''Hiking'', ''Small‑Group Bible Study'', ''Yoga'', ''Collecting Vintage Kitchenware'', ''Classic‑Rock Listening'', ''DIY
    Home Improvement'']'
  career_goals: Laila aims to modernize her company while preserving its hometown character. Over the next five years she plans to implement digital inventory systems, expand the business to a second location
    in a neighboring county, and launch a mentorship program for young women interested in entrepreneurship. She also hopes to earn a business certificate or an MBA part‑time to complement her practical
    experience, but only if it fits her routine‑driven schedule. Ultimately, she wants her company to become a model of sustainable, community‑focused growth in rural North Carolina.
