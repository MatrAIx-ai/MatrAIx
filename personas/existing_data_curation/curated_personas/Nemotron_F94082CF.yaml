personas:
  professional: Jenny Buenaventura is a high‑school student who leverages their strong organizational skills and caring nature to lead youth‑group events and school projects, while eyeing a CNA certification
    as the next step toward a structured healthcare career.
  sports: Jenny Buenaventura plays varsity volleyball and club soccer at school, follows the Utah Jazz and Real Salt Lake passionately, and joins a local hiking club for weekend treks in the Wasatch Range,
    balancing competitive team spirit with a love for the outdoors.
  arts: Jenny Buenaventura sings in the school choir, takes contemporary dance classes, and finds inspiration in artists like Beyoncé, Taylor Swift, and the Broadway hit *Hamilton*, while spending free
    evenings crafting friendship bracelets and scrapbooking with a flair for vibrant color palettes.
  travel: Jenny Buenaventura prefers well‑planned weekend getaways to Utah's national parks—such as Zion, Arches, and Bryce Canyon—while dreaming of a future spring trip to Kyoto’s cherry blossoms, blending
    structured itineraries with spontaneous nature walks.
  culinary: Jenny Buenaventura delights in baking classic chocolate‑chip cookies and red‑velvet cupcakes topped with cream‑cheese frosting, often experimenting with garden‑fresh herbs like lavender and
    mint in desserts, while maintaining a modest skill level that shines during family gatherings.
  core: Jenny Buenaventura is a pragmatic, community‑focused teen who balances a love for organized caregiving and social activities with a sweet tooth and a habit of over‑packing for every adventure.
background:
  cultural: Jenny comes from a white, predominantly Anglo‑American family with deep roots in Utah’s pioneer history. Her upbringing reflects a blend of Western pioneer values and contemporary LDS (Mormon)
    culture, including weekly church attendance, family potluck gatherings, and participation in community celebrations such as Pioneer Day. Growing up in Morgan, a small town in Salt Lake County, she has
    been shaped by a close‑knit community that emphasizes self‑reliance, service, and strong family cohesion.
