  career_goals: Jenny plans to earn her GED within the next year and then enroll in a vocational program for a Certified Nursing Assistant (CNA) certification, allowing her to combine her caregiving strengths
    with a structured healthcare career. She also hopes to work part‑time at a community center or youth program, coordinating activities and providing mentorship to younger peers. In the long term, she
    aspires to become a reliable health services professional—potentially advancing to a registered nurse—while maintaining a stable, community‑oriented career path.
