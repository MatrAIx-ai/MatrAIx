    User 2: So, what do you do for fun outside of work?

    User 1: I like to go to the gym, hang out with friends, and read.

    User 2: Oh, that sounds fun! I like to go to the gym too.

    User 1: Cool! What do you like to do at the gym?

    User 2: I like to lift weights and do cardio.

    User 1: Oh, I like to lift weights too.

    User 2: Great! We should work out together sometime.

    User 1: That would be great! I''m free next weekend.

    User 2: I''m free too! We could go to the gym after work on Friday.

    User 1: Sounds good! I''ll see you then.

    User 2: Great! See you then!'
