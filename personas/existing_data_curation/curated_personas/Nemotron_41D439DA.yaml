  hobbies: '["art gallery visits", "museum exhibitions", "watercolor painting", "art history study", "photography", "chamber music concerts", "community theater", "yoga", "hiking", "seasonal cooking", "volunteering
    with arts council"]'
  career_goals: Dianne aims to advance to a senior audit manager role and eventually become a partner at her public accounting firm, focusing on technology‑enabled audit methodologies. She is passionate
    about leading cross‑functional teams and championing continuous improvement initiatives. Leveraging her art appreciation, she plans to develop a niche advisory service that bridges finance and the art
    market, helping clients evaluate and invest in artworks. Additionally, she aspires to mentor women in accounting, contribute to regional professional societies, and eventually transition to a strategic
    finance role within a cultural institution or nonprofit arts organization.
