personas:
  professional: Sonny Hill is a budding comic artist who channels their curiosity into drawing superhero stories, creating watercolor backdrops, and experimenting with simple animation on Scratch, while
    balancing schoolwork with a relaxed, sometimes chaotic, approach to deadlines.
  sports: Sonny Hill plays forward for the Flanders Youth Soccer Club U11 team, cheers for New York City FC during the MLS season, and spends weekends hiking the South Mountain Reservation with friends,
    while also joining a local after-school basketball pick-up group.
  arts: Sonny Hill avidly sketches comic panels inspired by Marvel heroes, studies watercolor techniques after visits to the Montclair Art Museum, watches Studio Ghibli films like My Neighbor Totoro for
    animation ideas, and performs improv skits with the school drama club, drawing inspiration from performers like Lin-Manuel Miranda.
  travel: Sonny Hill loves spontaneous weekend trips, often hopping on a short train ride to New York City to explore the Museum of Modern Art and Central Park, dreaming of a future family road trip to
    Washington, D.C., while also enjoying local hikes in the Watchung Mountains.
  culinary: Sonny Hill enjoys helping in the kitchen, especially whipping up homemade pizza with mozzarella, pepperoni, and fresh basil, perfecting spaghetti carbonara with pancetta, and experimenting with
    colorful fruit smoothies featuring strawberries, banana, and almond milk, though they sometimes over-salt their sauces.
  core: Sonny Hill, a 10-year-old comic-loving, soccer-playing, LEGO-building explorer, balances boundless curiosity with a laid-back, sometimes scatter-brained approach to school and chores.
background:
  cultural: Sonny is raised in a suburban, middle‑class American family of European descent in Flanders, New Jersey. His upbringing blends traditional American customs—celebrating holidays like Thanksgiving,
    Fourth of July, and Halloween—with exposure to the multicultural environment of Morris County through school programs and community events. Proximity to New York City adds a layer of artistic and cultural
    diversity, fostering his openness to new ideas, appreciation for the arts, and collaborative spirit.
