  career_goals: Sonny dreams of a future that blends his love for art and people. He aspires to become an illustrator or animator who creates imaginative stories, a museum educator who leads interactive
    art workshops for kids, or a community arts coordinator who organizes creative events and youth theatre productions. He is also intrigued by jobs that let him explore new ideas and collaborate with
    diverse groups.
