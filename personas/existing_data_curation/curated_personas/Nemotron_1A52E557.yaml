  career_goals: Margarita aims to advance to a senior security architect role within the next three years, focusing on integrating AI-driven threat detection into existing security operations. She plans
    to achieve CISSP and CISM certifications to solidify her credentials and eventually transition into a CISO position where she can shape enterprise‑wide security strategy. Passionate about research,
    she also aspires to publish papers on emerging cyber‑threat vectors and contribute to industry standards, positioning herself as a thought leader in the information security community.
