personas:
  professional: Tammie Velilla is a seasoned vehicle and equipment cleaning specialist who, despite a relaxed approach to scheduling and occasional disorganization, uses their curiosity for design, talkative
    charm, and strong customer-service instincts to deliver meticulous interior detailing while aspiring to earn eco-friendly certification and eventually supervise a cleaning team.
  sports: Tammie Velilla enjoys leisurely nature walks along the Pee Dee River, cheers for the Carolina Panthers and the South Carolina Gamecocks on game days, and participates in a local walking club that
    meets at Riverside Park, while occasionally joining a community pickleball league to stay active.
  arts: Tammie Velilla frequents the downtown art gallery showcasing regional folk painters and the annual craft fair where they admire quilts echoing the patterns of William Morris, while at home they
    spin classic rock records by Lynyrd Skynyrd and The Allman Brothers and country hits from Dolly Parton and Johnny Cash, and they volunteer as a docent at the historic museum, delighting visitors with
    stories of Southern artistic heritage.
  travel: Tammie Velilla plans spontaneous weekend road trips, preferring to explore nearby gems like Charleston's historic district, Savannah's riverfront squares, and Asheville's art-filled River Arts
    District, while dreaming of a future pilgrimage to the Louvre in Paris and a nostalgic cruise to New Orleans for its jazz and Creole cuisine.
  culinary: Tammie Velilla delights in preparing Southern-style feasts featuring shrimp-and-grits, collard greens seasoned with smoked paprika, fried chicken with a buttery herb crust of thyme and rosemary,
    and a sweet peach cobbler, often using fresh basil and oregano from their garden to flavor homemade biscuits and cornbread for church potlucks.
  core: Tammie Velilla is a talkative, art-curious cleaning professional who balances a love for classic cars, garden herbs, and community gatherings with a habit of occasional disorganization and a lingering
    worry about the future.
background:
  cultural: Tammie grew up in a small town in South Carolina, immersed in Southern hospitality and community‑centered values. Her family traditions emphasize church attendance, shared meals with extended
    relatives, and participation in local festivals such as the Kershaw County Peach Festival. The region’s emphasis on politeness, storytelling, and a love of the outdoors has shaped her worldview. While
    identifying as white Southern, she holds a deep appreciation for the area’s diverse cultural expressions—including folk art, gospel music, and regional cuisines—reflecting a respectful blend of heritage
    and openness to new cultural experiences.
attributes:
  skills: '[''Vehicle cleaning and detailing'', ''Equipment sanitation'', ''Chemical safety and handling'', ''Customer service'', ''Interpersonal communication'', ''Basic art appreciation'', ''Community
    event coordination'', ''Flexibility in scheduling'', ''Problem solving under pressure'']'
  hobbies: '[''Visiting art galleries'', ''Attending craft fairs'', ''Gardening'', ''Cooking Southern cuisine'', ''Singing in church choir'', ''Organizing community potlucks'', ''Quilting'', ''Listening
    to music (classic rock, country)'', ''Nature walks'', ''Classic car appreciation'']'
  career_goals: Tammie aims to obtain certification in environmentally friendly cleaning practices and eventually transition into a supervisory role overseeing a team of cleaners at the local automotive
    service center. She also hopes to volunteer as an art docent at the nearby historical museum, merging her love for art with her sociable disposition. In the longer term, she dreams of launching a small
    side business offering specialized interior detailing for classic cars, providing a creative outlet while connecting with fellow enthusiasts.
