personas:
  professional: Alonzo Smith, a retail cashier with a STEM bachelor’s degree, has turned their analytical knack for Excel and basic Python scripts into a systematic approach to inventory management, while
    they quietly pursue CompTIA A+ certification and online data analytics courses, blending their love for graphic design and digital photography into a side‑hustle that positions them for a future part‑time
    IT support and supervisory role.
  sports: Alonzo Smith follows the Auburn Tigers football team every Saturday, enjoys catching Atlanta Braves games during spring training, and participates in a weekly pickup basketball game at the local
    community center, while they maintain personal fitness through solitary morning walks along the rural backroads and occasional weekend fishing trips at the nearby lake.
  arts: Alonzo Smith spends quiet evenings listening to Miles Davis, John Coltrane, and Mahalia Jackson, exploring the Birmingham Museum of Art’s American and European collections, and curating a digital
    photography portfolio inspired by Ansel Adams’ landscapes and Jacob Lawrence’s narrative style, all while they experiment with graphic design projects that blend Bauhaus minimalism with Southern iconography.
  travel: Alonzo Smith favors solo road trips that combine scenic drives through the Blue Ridge Mountains with stops at historic towns like Charleston and Savannah, has taken a weekend getaway to New Orleans
    for its jazz scene and creole cuisine, and dreams of a leisurely visit to Napa Valley’s vineyards, carefully planning itineraries that fit within their modest travel budget and allowing flexibility
    for family obligations.
  culinary: Alonzo Smith enjoys cooking Southern comfort foods such as collard greens simmered with smoked turkey, crispy fried catfish with a side of hush‑puppies, and sweet potato pie, often incorporating
    fresh tomatoes, okra, and heirloom beans from their modest garden, while their skill level sits at competent home chef, though they occasionally forget to clean the stovetop after frying, leaving a
    lingering aroma that both pleases and irritates their housemates.
  core: Alonzo Smith is a quiet, methodical problem‑solver who balances a love for data and design with a penchant for solitary hobbies, a disciplined yet occasionally splurging financial habit, and a deep‑rooted
    appreciation for Southern traditions.
background:
  cultural: Alonzo is a 54‑year‑old African‑American from Ozark, Alabama, rooted in the traditions of the rural South. He grew up in a close‑knit, church‑centered community where gospel music, family gatherings,
    and Southern hospitality shaped his values. The legacy of the civil‑rights movement and the resilience of his grandparents inform his sense of perseverance and respect for community. While his professional
    life has been modest, he maintains strong familial ties, celebrates African‑American cultural holidays, and draws inspiration from Southern culinary traditions and the storytelling heritage of his community.
attributes:
  skills: '[''Data analysis (Excel)'', ''Basic Python scripting'', ''POS system troubleshooting'', ''Cash handling'', ''Inventory management'', ''Mathematical calculations'', ''Problem solving'', ''Graphic
    design basics'', ''Digital photography'', ''Customer service'']'
  hobbies: '[''Reading (science fiction, technology, art history)'', ''Digital photography'', ''Visiting museums/galleries'', ''Woodworking'', ''Gardening'', ''Chess puzzles'', ''Listening to jazz and gospel
    music'', ''Graphic design experimentation'']'
  career_goals: Alonzo aims to transition from frontline retail to a hybrid role that blends his technical background with his passion for art and data. Over the next few years he plans to earn a CompTIA
    A+ certification and complete an online course in data analytics, positioning himself for a part‑time IT support or data entry position within the retail chain. Simultaneously, he hopes to develop a
    modest online portfolio of digital art and photography, eventually offering prints and custom designs as a side business. His long‑term ambition includes securing a supervisory shift‑lead role that
    allows him to mentor newer cashiers while maintaining a steady schedule that supports his family’s financial stability.
