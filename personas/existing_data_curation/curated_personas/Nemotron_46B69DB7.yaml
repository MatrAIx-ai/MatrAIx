personas:
  professional: Lynne Agnew, a veteran elementary educator with a knack for weaving humanities and visual arts into project‑based curricula, leverages their curiosity and balanced organization to champion
    arts integration while assertively mentoring new teachers toward innovative practices.
  sports: Lynne Agnew devotes weekends to exploring the Foresthill foothills with the Sierra Trails Hikers club, cheers for the Sacramento Kings and River Cats while occasionally joining a co‑ed softball
    league, and maintains a steady routine of sunrise yoga to keep the back strain at bay.
  arts: Lynne Agnew, an avid watercolorist and acoustic‑guitar player, draws inspiration from Ansel Adams’ landscape photography and the folk storytelling of Joni Mitchell, regularly showcases their work
    at the Foresthill community art fair, and immerses themselves in the poetry of Mary Oliver through a weekly book club.
  travel: Lynne Agnew favors immersive road trips that blend hiking and cultural sites, having trekked the Oregon Coast, camped in Yosemite’s high country, and explored the historic streets of Santa Fe,
    while dreaming of a spring pilgrimage to New Zealand’s Southern Alps to capture untamed light for their paintings.
  culinary: Lynne Agnew relishes cooking with locally sourced produce, often preparing roasted beet and goat‑cheese salads with walnut vinaigrette, cedar‑plank grilled trout seasoned with fresh sage, and
    heirloom tomato bruschetta drizzled with basil‑infused olive oil, while they frequently exchange these dishes at Sunday potlucks.
  core: Lynne Agnew balances a meticulous planner’s budget with spontaneous bursts of creative inspiration, lives the paradox of a disciplined educator who still leaves paint‑stained fingerprints on lesson
    plans, and can’t resist a late‑night pottery class despite a looming grant deadline.
background:
  cultural: Lynne comes from a White, European‑American background rooted in Northern California. She was raised in a small farming community near Sacramento, where a blend of Midwestern work ethic and
    West Coast openness shaped her values. Her family traditions include Sunday potluck gatherings, an appreciation for American folk music, and a respect for the region’s indigenous history, which she
    incorporates into her teaching. Living in Foresthill, she identifies with the close‑knit rural culture while also embracing progressive educational ideals, resulting in a balanced perspective that honors
    both heritage and contemporary cultural diversity.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Development'', ''Differentiated Instruction'', ''Arts Integration'', ''Educational Technology'', ''Student Assessment Design'', ''Social-Emotional Learning
