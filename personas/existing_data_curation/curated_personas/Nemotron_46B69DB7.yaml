  hobbies: '[''Painting'', ''Hiking'', ''Reading Historical Fiction'', ''Visiting Art Museums'', ''Gardening'', ''Photography'', ''Cooking'', ''Knitting'', ''Playing Acoustic Guitar'', ''Volunteering at
    the Library'']'
  career_goals: Lynne aims to advance to a leadership role within her district, such as curriculum coordinator or lead teacher, where she can champion arts integration and innovative instructional practices.
    She plans to pursue a Master's in Educational Leadership within the next two years, and to develop a district‑wide professional development series on project‑based learning and SEL. Long‑term, she envisions
    establishing a community arts partnership that connects local artists with schools, and possibly authoring a series of children's books that bring historical narratives to life. She also hopes to mentor
    emerging educators and contribute to policy discussions on equity in rural education.
