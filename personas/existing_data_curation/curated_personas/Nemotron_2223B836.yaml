  hobbies: '[''Algorithmic coding puzzles'', ''LeetCode contests'', ''Strategy video games (Civilization, StarCraft)'', ''Chess (online play and small tournaments)'', ''Early‑morning runs (Guadalupe River
    Trail)'', ''Weekend hikes (Santa Cruz Mountains)'', ''Cooking Mexican cuisine'', ''Urban photography'', ''Science‑fiction reading'', ''Tech non‑fiction reading'', ''Bullet‑journal planning'']'
  career_goals: Tomas aims to become a recognized technical leader within the next five years, targeting senior software engineer and eventually staff engineer or engineering manager roles where he can
    shape system architecture and mentor junior developers. He plans to earn AWS Certified Solutions Architect and Certified Kubernetes Administrator credentials, contribute to high‑impact open‑source projects,
    and lead cross‑functional teams that deliver scalable, fault‑tolerant services for a rapidly growing product. Long‑term, he envisions launching his own SaaS startup focused on AI‑driven workflow automation,
    leveraging his disciplined approach to product development and his competitive drive to bring innovative solutions to market.
