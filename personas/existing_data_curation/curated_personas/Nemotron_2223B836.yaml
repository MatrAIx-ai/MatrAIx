personas:
  professional: Tomas Segarra, a full‑stack software developer, applies rigorous test‑driven development and cloud‑native design to build high‑performance micro‑services, and they leverage their disciplined,
    detail‑oriented mindset and competitive drive to mentor peers and push architectural standards.
  sports: Tomas Segarra runs the Guadalupe River Trail with the San Jose Trail Runners club, follows the San Jose Sharks and the San Francisco Giants, and they join weekend hikes with a local Santa Cruz
    Mountains meetup group.
  arts: Tomas Segarra captures urban textures through street photography, often referencing the composition style of Henri Cartier‑Bresson, immerses in sci‑fi narratives by Isaac Asimov while listening
    to the electronic beats of Daft Punk, and they occasionally unwind with classic indie films by the Coen brothers.
  travel: Tomas Segarra plans every trip in a detailed spreadsheet, prefers solo explorations of tech‑centric cities like Tokyo and Berlin, and they dream of hiking the Torres del Paine in Patagonia after
    attending the next AWS re:Invent conference in Seattle.
  culinary: Tomas Segarra cooks family recipes such as tamales, mole, and pozole, mastering the slow‑cooked mole with chocolate and ancho chilies, documents each dish through carefully composed urban photography,
    and they treat each cooking session as a structured experiment.
  core: Tomas Segarra blends a competitive puzzle‑solving mindset with disciplined software craftsmanship, solitary early‑morning runs, and a ritual of perfecting family‑style dishes, all while maintaining
    a meticulous bullet‑journal that never skips a page, and they rarely miss a deadline.
background:
  cultural: Tomas grew up in a Mexican‑American household in the Bay Area, where bilingual (Spanish‑English) communication and strong family ties shaped his early worldview. He celebrates cultural traditions
    such as Día de los Muertos and enjoys the flavors of Mexican cuisine, which he regularly prepares for friends and family. His Mexican heritage instilled a diligent work ethic and respect for community,
    while the multicultural environment of San Jose exposed him to diverse perspectives and a tech‑centric mindset. He often bridges the two worlds by volunteering at local after‑school STEM programs for
    Hispanic youth, sharing his knowledge of coding and encouraging the next generation to pursue technology careers.
