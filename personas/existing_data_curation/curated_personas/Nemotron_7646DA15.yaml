personas:
  professional: Evan Wells, a seasoned community project coordinator with a knack for meticulous budgeting, DIY home renovations, and conflict mediation, leverages their disciplined organizational skills
    to volunteer as a nonprofit consulting advisor while preparing for PMP certification and dreaming of a side consulting venture for seniors, even though they sometimes overcommit and feel stressed by
    tight timelines.
  sports: Evan Wells cycles with the Chicago Bike Collective, follows a disciplined strength‑training schedule at the local gym, roots for the Chicago Cubs and Bears, logs workouts on Strava, yet they occasionally
    skip proper warm‑ups, leading to minor knee aches.
  arts: Evan Wells enjoys the classical symphonies of Beethoven, the folk storytelling of Bob Dylan, visits the Art Institute of Chicago to admire Andrew Wyeth’s realism, and binge‑watches Christopher Nolan’s
    films, though they sometimes procrastinate on attending local concerts due to a packed schedule.
  travel: Evan Wells meticulously plans trips to historic sites like Mackinac Island and Kyoto’s gardens, has conquered weekend getaways to Lake Geneva, dreams of trekking to Machu Picchu, and balances
    their love for organized itineraries with occasional anxiety over travel logistics.
  culinary: Evan Wells delights in cooking slow‑roasted rosemary chicken, heirloom carrot quinoa, and homemade sourdough, sources fresh tomatoes, basil, and kale from their own garden, occasionally overcooks
    vegetables when impatience strikes, and treats themselves to Chicago deep‑dish pizza on relaxed evenings.
  core: Evan Wells is a methodical, garden‑tended volunteer who blends disciplined project management with a creative woodworking hobby, yet they wrestle with chronic worry and occasional over‑commitment.
background:
  cultural: Evan was raised in a middle‑class, Southern‑American household in Texas, with family roots tracing back to English, German, and Irish ancestry. He grew up in a Protestant (Methodist) environment
    that emphasized hard work, community service, and family cohesion. Living in Houston, he has been exposed to a rich multicultural landscape, which has broadened his appreciation for diverse traditions
    while he maintains a strong Texas identity—pride in local history, regional cuisine, and the values of hospitality and neighborliness.
attributes:
  skills: '[''Project Management'', ''Budgeting and Financial Planning'', ''DIY Home Repairs'', ''Basic Carpentry'', ''Automotive Maintenance'', ''Computer Literacy (Microsoft Office, budgeting software)'',
    ''Community Volunteer Coordination'', ''Conflict Mediation'', ''Mentoring'']'
  hobbies: '[''Woodworking'', ''Vegetable Gardening'', ''Cycling'', ''Strength Training'', ''Mindfulness Journaling'', ''Reading Historical Non‑Fiction'', ''Self‑Improvement Literature'', ''Chess'', ''Volunteer
    Work at Food Bank'', ''Neighborhood Clean‑up Organization'']'
  career_goals: Evan aims to leverage his organizational expertise into a meaningful volunteer consulting role, assisting local nonprofits and homeowner associations with event planning, fundraising, and
    program management. He intends to earn a Project Management Professional (PMP) certification and a nonprofit leadership credential to deepen his impact. Long‑term, he aspires to launch a small side
    business offering structured home‑project consulting for seniors and busy families, while continuing to mentor community members in practical skills and disciplined planning.
