persona_description: A neurologist who has conducted a large-scale, retrospective study on the efficacy of two common drugs, lamotrigine and valproate, in treating difficult-to-control epilepsy. The study
  was conducted at two Washington state institutions for the developmentally disabled, where nursing staff had been recording the occurrence of each convulsive seizure in their patients with epilepsy, along
  with records of each patient’s dosing of anti-epileptic medications. The study found that the lamotrigine and valproate combination had superior efficacy compared to other drug regimens, and the researchers
  believe that their findings should ideally be confirmed in a prospective study of patients with refractory epilepsy.
