  career_goals: Lymari aims to continue building on her expertise in retail operations by taking on a lead‑cashier or shift‑supervisor role where she can mentor newer staff and implement best‑practice procedures.
    She also hopes to obtain a certification in retail management to broaden her skill set. Ultimately, she plans to secure a stable position that offers benefits and a pathway toward a part‑time consulting
    or training role after her formal retirement, while maintaining her commitment to providing excellent customer service.
