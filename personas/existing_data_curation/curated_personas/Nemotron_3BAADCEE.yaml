personas:
  professional: Shaquan Stewart is a budding basketball enthusiast who treats after‑school drills like a mini‑career, using their love for routine and competition to practice dribbling, passing, and court
    strategies with the same focus a future coach might apply.
  sports: Shaquan Stewart loves the rhythm of basketball, playing in the local youth league, cheering for the Los Angeles Lakers and the New York Knicks on TV, and occasionally joining a seasonal soccer
    clinic at the community center for variety.
  arts: Shaquan Stewart channels creative energy by drumming to beats by Cardi B and Kendrick Lamar, singing gospel hymns at church, drawing superhero comics inspired by Spider‑Man and Black Panther, and
    building intricate LEGO cityscapes that mirror their love for order.
  travel: Shaquan Stewart prefers family trips that blend familiar routines with excitement, such as a structured visit to Disney World after school breaks and spontaneous weekend camping at a nearby state
    park, always packing a checklist of favorite snacks and a LEGO set for downtime.
  culinary: Shaquan Stewart enjoys helping with simple meals, often making cheesy macaroni, chicken nuggets, and banana pancakes, and loves the crisp crunch of fresh carrots and the salty tang of ketchup
    on their favorite snacks.
  core: Shaquan Stewart is an energetic 8‑year‑old who thrives on routine, competitive play, and creative expression, yet wrestles with anxiety and a tendency to misplace obligations.
background:
  cultural: Shaquan grows up in Henderson, a small town in Hardeman County, Tennessee, where his African‑American heritage is woven into everyday life through family, church, and community. Weekly Sunday
    services at the local Baptist church provide a cultural anchor, exposing him to gospel music, storytelling, and a close‑knit congregation that values mutual support. Family gatherings feature Southern
    soul food, music ranging from classic R&B to modern hip‑hop, and intergenerational conversations that reinforce respect for elders and practical wisdom. The local school and community leagues emphasize
    teamwork and friendly competition, reflecting broader Southern values of hospitality and perseverance. These cultural threads shape Shaquan’s love for routine, his practical outlook, and his energetic,
    sociable nature.
