personas:
  professional: Raul Vilaboa, a 15‑year‑old high school sophomore with a fervent curiosity for visual storytelling, blends hand‑drawn comic sketches with digital art filters, channeling their love for bright,
    rhythmic patterns into a budding concept‑artist ambition while balancing school responsibilities and occasional procrastination.
  sports: Raul Vilaboa, a competitive member of the Lake City Lions youth basketball club, spends afternoons shooting hoops at the local park, idolizes the Miami Heat and follows the Orlando Magic closely,
    using basketball as both a social outlet and a way to channel their intense drive, while occasionally skipping practice for video‑game marathons.
  arts: Raul Vilaboa, an enthusiastic participant in his school’s art club, draws inspiration from comic legends like Alex Ross, digital pioneers such as Bee Bee P, and musicians Bad Bunny and Marc Anthony,
    crafting vibrant sketches and short music‑video collages that echo the rhythmic beats of reggaeton and salsa, often sharing them on Instagram stories despite occasional self‑criticism.
  travel: Raul Vilaboa, eager to explore beyond Lake City, has visited the Orlando theme parks with his family, dreams of touring the colorful streets of Old San Juan during Día de la Constitución, and
    hopes to attend a street‑art festival in Barcelona, preferring budget‑friendly trips planned with friends but sometimes postpones travel plans due to school workload.
  culinary: Raul Vilaboa, whose kitchen experiments range from mastering pasteles and arroz con gandules during family celebrations to whipping up pizza with extra mozzarella, enjoys the sweet taste of
    flan and the tang of mango salsa, and rates their cooking skill as intermediate, often swapping recipes with friends while occasionally over‑indulging in fast‑food nachos after late‑night gaming sessions.
  core: Raul Vilaboa, a creatively fierce yet anxiety‑prone teen, channels vibrant cultural rhythms into art and basketball, juggling impulsive spending and diligent self‑care, all while navigating the
    highs and lows of adolescent life.
background:
  cultural: Raul is a second‑generation Puerto Rican raised in Lake City, Florida. He grew up in a bilingual household where Spanish is spoken at home and English at school. Family gatherings are vibrant,
    featuring traditional foods like arroz con gandules, pasteles, and flan, as well as music ranging from classic salsa to contemporary reggaeton. He celebrates Puerto Rican holidays such as Día de la
    Constitución and often attends local Caribbean festivals, where he connects with other Puerto Rican families and shares stories of island life. This cultural heritage informs his artistic style, which
    frequently incorporates bright colors, rhythmic patterns, and themes of identity and community.
