  skills: '[''drawing'', ''digital illustration'', ''video editing for social media'', ''Spanish-English bilingual communication'', ''group organization and leadership'', ''basic Scratch coding'', ''problem‑solving'']'
  hobbies: '[''sketching and digital illustration'', ''creating short videos for TikTok/Instagram'', ''playing basketball'', ''team‑based video gaming'', ''listening to reggaeton, salsa, and hip‑hop'',
