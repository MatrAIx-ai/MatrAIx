  career_goals: Raul aspires to turn his passion for art and digital media into a career as a multimedia designer or content creator. He dreams of attending a specialized high‑school program in graphic
    arts and eventually studying visual communication at a university. He hopes to build a personal brand on social platforms where he can share art tutorials, cultural storytelling, and mental‑health advocacy
    through creative expression. In the long term, he envisions working for an advertising agency that values innovative, culturally resonant campaigns, or launching his own creative studio that partners
    with community organizations to provide art‑based workshops for youth.
