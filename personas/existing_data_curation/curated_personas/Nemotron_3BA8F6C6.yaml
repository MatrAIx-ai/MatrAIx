personas:
  professional: Michael Syska is a physical therapy aide whose meticulous documentation and low‑stress workflow reflect a balanced blend of structured routine and spontaneous problem‑solving, and they aim
    to become a licensed PT focusing on geriatric and orthopedic care.
  sports: Michael Syska is an avid fan of the Oklahoma City Thunder and the Oklahoma Sooners football, participates in a weekend senior bowling league, and they enjoy early‑morning fishing trips on Lake
    Thunderbird, treating each catch as a quiet trophy.
  arts: Michael Syska blends craftsmanship with creativity, building small oak side tables inspired by the clean lines of Charles and Ray Eames, photographing Flint Hills sunsets in the style of Ansel Adams,
    and they unwind listening to the folk storytelling of Bob Dylan.
  travel: Michael Syska prefers low‑key road trips to historic sites like the National Cowboy & Western Heritage Museum and natural escapes such as the Badlands, often traveling solo with a packed cooler
    of fresh garden veggies, and they plan itineraries months ahead to avoid last‑minute stress.
  culinary: Michael Syska favors hearty Midwestern cuisine, regularly preparing smoked brisket with a dry rub of paprika and brown sugar, pairing it with his home‑grown tomatoes in a fresh salsa, and they
    enjoy crafting his own cornbread from stone‑ground cornmeal.
  core: Michael Syska is a methodical yet occasionally impulsive physical‑therapy aide who balances solitary woodworking, community health service, and a disciplined financial plan while savoring quiet
    evenings by the lake.
background:
  cultural: Michael grew up in a middle‑class, white family in the Oklahoma City metro area, absorbing the Great Plains values of self‑reliance, modesty, and community involvement. He maintains ties to
    local traditions, including Sunday church attendance, high school football gatherings, and family barbecues that emphasize hospitality. His cultural upbringing emphasizes a practical work ethic, respect
    for routine, and a deep appreciation for the natural environment of central Oklahoma.
attributes:
  skills: '[''Manual therapy techniques'', ''Therapeutic exercise programming'', ''Gait and functional mobility assessment'', ''Patient education and counseling'', ''Electronic health records documentation'',
    ''Rehabilitation equipment handling'', ''Interdisciplinary team collaboration'']'
  hobbies: '[''Reading historical non-fiction'', ''Woodworking'', ''Fishing'', ''Vegetable gardening'', ''Solo hiking and nature photography'', ''Volunteering for community health screenings'']'
  career_goals: Michael aims to transition from a physical therapy aide to a licensed physical therapist within the next five years by completing his bachelor's degree in kinesiology and passing the licensure
    exam. He also hopes to specialize in geriatric and orthopedic rehabilitation, eventually taking on a supervisory role where he can design therapy protocols and mentor new aides. Keeping his preference
    for a balanced, low‑stress environment, he is interested in integrating tele‑rehab services to provide care while maintaining a predictable schedule.
