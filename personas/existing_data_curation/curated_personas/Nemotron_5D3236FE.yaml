personas:
  professional: Malcolm Weston, a seasoned construction project coordinator with 15 years of hands‑on experience, blends a curiosity for green building technologies with a practical, safety‑first mindset,
    excels at on‑site budgeting, blueprint interpretation, and crew rapport, yet they sometimes let their spontaneous, flexible nature cause missed deadlines and a cluttered schedule.
  sports: Malcolm Weston stays active by playing pickup basketball in the Chesterfield YMCA league, cheering for the Richmond Flying Squirrels and the Virginia Cavaliers, and hiking the Shenandoah foothills
    each spring, and they relish the blend of community sports with seasonal outdoor fitness.
  arts: Malcolm Weston regularly attends gospel concerts featuring Kirk Franklin and Tasha Cobbs, draws creative inspiration for woodworking from craft fairs, and they unwind by listening to John Legend’s
    soulful ballads while cooking Southern meals, weaving music, craft, and culinary art into their lifestyle.
  travel: Malcolm Weston prefers weekend road trips along Virginia’s Blue Ridge Parkway, has explored sustainable housing projects during a conference in Copenhagen, and they dream of a woodworking pilgrimage
    to Kanazawa, Japan, balancing adventure with family commitments and a modest travel budget.
  culinary: Malcolm Weston loves cooking Southern comfort dishes such as shrimp and grits, smoked country ham, collard greens seasoned with smoked paprika, and sweet tea, and they boast an intermediate
    cooking skill that blends traditional recipes with experimental twists using locally sourced herbs like rosemary and thyme.
  core: Malcolm Weston is a pragmatic, curiosity‑driven builder who balances sustainable innovation with community mentorship, even though they sometimes let spontaneous impulses leave project plans a bit
    messy.
background:
  cultural: Malcolm was raised in a close‑knit African‑American community in the Richmond suburbs, where church gatherings and family traditions instilled values of cooperation, respect, and community service.
    He regularly attends a historically Black Baptist congregation, volunteering for outreach initiatives and supporting local Black‑owned businesses. His cultural identity fuels his commitment to creating
    pathways for other Black workers in construction, and he celebrates Southern Black heritage through music, storytelling, and participation in events such as the Richmond African‑American History Festival.
attributes:
  skills: '[''Project Management'', ''Construction Site Supervision'', ''Budgeting & Cost Control'', ''Safety Compliance (OSHA)'', ''Blueprint Reading'', ''Team Leadership'', ''Vendor & Subcontractor Coordination'',
    ''Conflict Resolution'', ''Problem‑solving & Improvisation'', ''Knowledge of Local Building Codes'', ''Green Building Practices'', ''Basic Heavy‑Equipment Operation'']'
  hobbies: '[''Woodworking'', ''Motorcycle Restoration'', ''Smart‑Home Technology Exploration'', ''Fishing'', ''Hiking'', ''Community Basketball'', ''Gospel Music'', ''Southern Cooking'', ''Youth Mentorship'']'
  career_goals: Malcolm aims to move from day‑to‑day site management to a senior regional leadership role, eventually founding his own general‑contracting firm that specializes in sustainable, affordable
    housing for underserved communities in the Richmond metro area. To support this vision, he plans to earn his GED, obtain industry certifications such as PMP and LEED‑Green Associate, and deepen his
    expertise in modern construction technologies. He also wants to mentor emerging Black tradespeople through local apprenticeship programs and become a recognized advocate for diversity and inclusion
    in the construction industry.
