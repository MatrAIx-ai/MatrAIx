  career_goals: Though only an infant, Maria Marcela’s family envisions a future shaped by her curiosity and sociable nature. She is encouraged to explore creative fields such as visual arts, music, or
    design, leveraging her early love of color and rhythm. Her competitive streak is nurtured through age‑appropriate milestones, motivating her to excel in school and eventually pursue a career that blends
