background:
  cultural: Maria Marcela is raised in a Mexican‑American household in Houston’s vibrant Harris County community. Her parents speak both Spanish and English at home, celebrating traditions such as Día de
    los Muertos, quinceañera preparations, and Mexican holidays with family gatherings centered around tamales, pozole, and festive music. She is exposed to the rhythms of mariachi and regional Mexican
    folk songs, while also navigating the multicultural fabric of Houston through community festivals, bilingual preschool programs, and local churches. This bicultural environment nurtures her appreciation
    for art, storytelling, and communal values, while also shaping her identity as a bilingual, bicultural Mexican‑American child.
