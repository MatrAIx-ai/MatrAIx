  career_goals: Colleen aims to become a lead product designer at a forward‑thinking tech company in Seattle, where she can shape the strategic direction of digital experiences and champion inclusive, innovative
    design. She aspires to develop a signature portfolio of groundbreaking interface concepts for emerging technologies such as AR, voice UI, and immersive web applications. Over the next five years, she
    plans to mentor junior designers, publish thought‑leadership pieces on design ethics, and eventually launch a boutique consultancy that offers high‑impact, experimental design solutions to start‑ups.
    Her competitive drive pushes her to win industry awards and influence the Pacific‑Northwest design community through speaking engagements and local design meetups.
