personas:
  professional: Courtney Stuckey, a 30‑year‑old facilities specialist in a regional school district, blends meticulous organization, systematic sanitation expertise, and compassionate team leadership to
    streamline maintenance schedules, enforce strict safety compliance, and champion eco‑friendly cleaning protocols, all while charting a clear path toward a supervisory role.
  sports: Courtney Stuckey enjoys early‑morning prairie hikes with the local Prairie Trail Club, participates in a recreational volleyball league on weekends, and avidly supports the Kansas City Chiefs
    in fall football, the Royals during summer baseball, and the Kansas State Wildcats for college basketball, maintaining a disciplined weekend strength‑training circuit at the community gym.
  arts: Courtney Stuckey finds artistic fulfillment in quilting patterns inspired by Faith Ringgold, listening to folk legends like Joan Baez, attending the annual Kansas City Folk Festival, and exploring
    the American Art Wing at the Nelson‑Atkins Museum, where the vibrant colors often influence their garden designs and DIY home‑improvement projects.
  travel: Courtney Stuckey plans trips with meticulous spreadsheets, favoring weekend getaways to Tallgrass Prairie National Preserve, a summer adventure to the Black Hills of South Dakota, and a winter
    retreat in a cozy cabin in Colorado’s Rocky Mountains, balancing rugged hikes with relaxing evenings around a wood‑fire while keeping travel costs modest.
  culinary: Courtney Stuckey enjoys cooking hearty Midwestern fare such as skillet cornbread, homemade vegetable stew brimming with heirloom tomatoes and fresh kale from their garden, and chicken‑fried
    steak, delights in preserving summer harvests with local honey and homemade pickles, and though they occasionally over‑salt dishes when experimenting, they take pride in serving wholesome, seasonal
    meals.
  core: Courtney Stuckey is a pragmatic, curiosity‑driven organizer who blends green‑cleaning expertise with a love for quilting and prairie hikes, obsessively color‑codes their calendar, hums while sanitizing
    floors, and occasionally forgets to water their succulents.
background:
  cultural: Courtney was raised in a close‑knit, rural community in central Kansas, where Midwestern values of hard work, humility, and community service are deeply ingrained. Her white, Christian family
    emphasized self‑reliance, respect for tradition, and a practical outlook, while also encouraging curiosity through church study groups and library programs. The agricultural surroundings fostered a
    strong connection to the land and seasonal rhythms, shaping her appreciation for gardening, outdoor activities, and sustainable practices.
attributes:
  skills: '[''Cleaning and sanitation'', ''Facility maintenance'', ''Inventory management'', ''Safety compliance (OSHA)'', ''Schedule planning and time management'', ''Team leadership and training'', ''Customer
    service and conflict resolution'', ''Environmental sustainability practices'', ''Basic carpentry and minor repairs'', ''Data logging and reporting'']'
  hobbies: '[''Gardening'', ''DIY home-improvement reading'', ''Volunteering at community food bank'', ''Quilting'', ''Hiking'', ''Genealogy research'', ''Puzzle games'']'
  career_goals: Courtney aims to advance from her current janitorial role to a supervisory position such as Head Janitor or Facilities Manager within the local school district or a regional health care
    facility. She plans to obtain OSHA certification and a professional cleaning accreditation, and to spearhead green‑cleaning initiatives that reduce chemical use and waste. Long‑term, she envisions launching
    her own small, community‑focused cleaning business that emphasizes reliability, sustainability, and mentorship for other entry‑level workers.
