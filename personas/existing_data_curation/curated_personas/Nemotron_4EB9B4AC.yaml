personas:
  professional: Kenneth Jones is a budding citizen scientist who spends weekends cataloguing insects from the Pamlico River and translates his findings into simple Scratch programs, blending his curiosity
    with a practical, step‑by‑step approach while tolerating a bit of disorganization.
  sports: Kenneth Jones laces up for the Pamlico River Junior Soccer League after school, cheers for the Charlotte Hornets during basketball season, follows the Carolina Hurricanes in winter, and idolizes
    the Clemson Tigers' quarterback, demonstrating a community‑focused love of sports with a casual fan spirit while sometimes missing practice due to a relaxed attitude toward obligations.
  arts: Kenneth Jones sketches sprawling fantasy maps inspired by J.R.R. Tolkien, builds intricate LEGO landscapes while blasting classic rock from Led Zeppelin, enjoys country hits from Dolly Parton, and
    sings along to kid‑friendly pop like Taylor Swift, weaving music and visual storytelling into their leisure time and often sharing creations with friends.
  travel: Kenneth Jones prefers spontaneous road trips with family, often heading to the Outer Banks for beachcombing or the Great Smoky Mountains for hiking, dreams of seeing the geysers at Yellowstone,
    and balances a modest allowance with occasional school‑approved travel, showing a flexible, adventure‑seeking travel style that values freedom over strict itineraries.
  culinary: Kenneth Jones mixes equal parts curiosity and kitchen chaos while baking brown‑sugar oatmeal cookies with a dash of cinnamon, loves devouring fried catfish with hush puppies at local diners,
    and is proud of their growing skill making spaghetti carbonara with just a pinch of sea salt, often taking charge of dessert on weekends and occasionally forgetting to measure ingredients precisely.
  core: A curious 11‑year‑old who balances bug collecting, LEGO building, and soccer with a laid‑back approach to homework, often misplacing allowance money but never forgetting a favorite fishing spot.
background:
  cultural: Kenneth was raised in South Mills, a small coastal community in Camden County, North Carolina. His family embraces Southern values of hospitality, community involvement, and respect for tradition
    while encouraging curiosity and practical learning. He attends a local public elementary school where field trips to nearby wetlands and lessons on regional history are common. Family gatherings often
    feature Southern cuisine such as barbecue, corn muffins, and collard greens, and community events at the church and town hall play a regular role in his life. The coastal setting fosters a strong connection
    to marine life and outdoor recreation, shaping his interest in nature and environmental stewardship.
