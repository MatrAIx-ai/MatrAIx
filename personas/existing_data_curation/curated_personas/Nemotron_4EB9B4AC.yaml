    music'']'
  career_goals: Kenneth dreams of becoming an engineer or a wildlife researcher, roles that combine his love of building things with his curiosity about nature. He hopes to design tools or simple robots
    that help protect local wetlands and marine life in Camden County. He also wants to give back to his community by volunteering at the town library or the nature center, staying practical and making
    a tangible difference while keeping his options open as he grows.
