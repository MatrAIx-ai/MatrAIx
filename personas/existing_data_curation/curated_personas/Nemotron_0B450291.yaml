personas:
  professional: Vanessa Molina is an aspiring health information management student who leverages their meticulous Excel budgeting skills, bilingual fluency, and volunteer experience teaching seniors computer
    basics to streamline patient data workflows and design bilingual health outreach tools.
  sports: Vanessa Molina is a regular jogger who follows a structured three-day-a-week route through Somerset County parks, occasionally joins a local running club that meets at the community center, and
    cheers for the New York Giants during football season while maintaining their modest fitness tracker record.
  arts: Vanessa Molina is an avid reader who participates in a small mystery and historical fiction book club discussing authors like Agatha Christie and Hilary Mantel, enjoys listening to acoustic guitar
    playlists featuring Andres Segovia and classic jazz standards, and occasionally watches detective films such as Memento for plot analysis, often sharing their insights with the club.
  travel: Vanessa Molina is a methodical planner who prefers weekend road trips to nearby historical towns like Philadelphia and the Hudson Valley, dreams of exploring Machu Picchu and Kyoto with a well-researched
    itinerary, but balances their travel ambitions with a student budget and family responsibilities.
  culinary: Vanessa Molina is a confident home cook who recreates family recipes like ceviche with fresh lime, white fish, red onion, and a pinch of chili, and lomo saltado using stir-fried beef, onions,
    tomatoes, and a splash of soy sauce, experimenting with ingredient ratios while documenting each variation in a detailed notebook that reflects their experimental spirit.
  core: Vanessa Molina is a structure-loving, detail-driven teen who balances their precision budgeting, methodical jogging, bilingual health advocacy, and quiet culinary experiments while occasionally
    spiraling into perfectionist over-planning.
background:
  cultural: Vanessa is a first‑generation Peruvian‑American. Her parents immigrated from Lima, and she grew up speaking Spanish at home while attending school in New Jersey. Family gatherings feature traditional
    foods, music, and celebrations of festivals such as Día de los Muertos and Inti Raymi. She maintains close ties to the local Peruvian diaspora, attending cultural events at the nearby community center
    and preserving her heritage through cuisine, language, and occasional trips to visit relatives in Peru.
