  career_goals: She plans to enroll in a community college program in health information management, aiming to combine her love for structure with a stable, practical career in the healthcare sector. In
    the long term, Vanessa hopes to become a certified medical records manager, overseeing patient data integrity and contributing to efficient hospital operations. She also wishes to support her local
    Peruvian community by facilitating bilingual health outreach programs.
