personas:
  professional: Kevin Morrow, a middle‑school enthusiast, channels their organized, methodical mindset into designing Scratch video games while taking the lead in the school debate club, demonstrating a
    natural knack for structuring arguments and code alike.
  sports: Kevin Morrow, a budding point guard for the Cedar Ridge Middle School Wolves, spends afternoons shooting hoops at the community gym, follows the Los Angeles Lakers, and hikes the nearby Pine Hill
    Trail on weekends to stay fit and relieve pre‑game nerves.
  arts: Kevin Morrow, a dedicated LEGO builder and budding digital creator, devotes weekends to constructing intricate LEGO Architecture sets like the Empire State Building while listening to Billie Eilish’s
    "Bad Guy" and Imagine Dragons’ "Believer," letting the rhythm inspire new Scratch game mechanics.
  travel: Kevin Morrow, an adventurous yet itinerary‑loving 12‑year‑old, has trekked the Eagle Creek Trail in the local hills and visited Washington, D.C. for a debate tournament, and dreams of exploring
    Tokyo’s Akihabara district and the Swiss Alps during future school trips.
  culinary: Kevin Morrow, a modest home chef, enjoys whipping up pepperoni pizza slices with extra cheese, making strawberry‑banana smoothies, and occasionally baking LEGO‑shaped cookies, though they tend
    to snack on instant noodles while debugging code late at night.
  core: Kevin Morrow, a 12‑year‑old with a methodical mind and boundless sociability, balances meticulous LEGO building, debate leadership, and basketball hustle while wrestling with frequent worries that
    drive both ambition and occasional burnout.
