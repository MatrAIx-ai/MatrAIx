  career_goals: Carolina aims to advance to a store manager position within the next two years, where she can apply her organizational strengths and compassionate leadership to improve team cohesion and
    customer satisfaction. She also aspires to develop a mentorship program for younger employees and to integrate more community-focused events into the store's calendar. Long-term, she hopes to transition
    into a regional trainer role or to help launch a small boutique specializing in locally sourced goods, allowing her to combine her retail expertise with her love for supporting local artisans.
