persona_description: A global leader in promoting democracy and advocating for the United Nations 2030 Agenda for Sustainable Development, particularly through the role of parliaments. Saber Chowdhury is
  the President of the Inter-Parliamentary Union (IPU), a global organization of national parliaments, and is known for his efforts to ensure that the voice of the people is taken into account when countries
  establish priorities, targets, and indicators for the Sustainable Development Goals at the national level.
