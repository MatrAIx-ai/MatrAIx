personas:
  professional: Zuri Hart, a seasoned compliance professional who blends meticulous regulatory analysis with a flexible, compassionate leadership style, designs AI‑enhanced risk frameworks while quietly
    coping with occasional paperwork chaos and a habit of juggling too many stakeholder meetings.
  sports: Zuri Hart stays fit by swimming laps in the Atlantic, early beach walks, weekly yoga sessions, and occasional beach‑volleyball matches with the local club, while cheering on the Miami Heat and
    catching a summer Miami Marlins game when time permits.
  arts: Zuri Hart immerses themselves in historical fiction and memoirs, finds solace in the harmonies of Stevie Wonder and Alicia Keys while singing in the church choir, and regularly visits a downtown
    gallery showcasing contemporary works by artists exploring diaspora narratives such as Kehinde Wiley and Kara Walker.
  travel: Zuri Hart prefers leisurely weekend getaways to coastal gems like Key West and Savannah, dreams of a slow‑paced cultural immersion in Puerto Rico’s historic Old San Juan, and balances spontaneous
    beach days with careful budgeting to keep travel affordable for family visits.
  culinary: Zuri Hart enjoys crafting Southern‑comfort plates like shrimp étouffée and collard greens spiced with scotch bonnet and allspice, frequently harvesting fresh thyme and basil from their garden,
    cooking at a confident home‑chef level while occasionally over‑seasoning in the excitement of merging flavors.
  core: Zuri Hart blends structured compliance expertise with a love for garden‑grown Caribbean‑infused meals, a habit of juggling too many community projects while forgetting to water plants, and a compassionate
    drive to mentor emerging talent.
background:
  cultural: Zuri identifies as African American, with family heritage that includes both Southern United States traditions and Caribbean influences. Growing up in Florida, she was immersed in a vibrant
    Black community that values church fellowship, family gatherings, and cultural celebrations such as Juneteenth, Kwanzaa, and Caribbean festivals. Her upbringing emphasized soulful music, storytelling,
    and a cuisine that fuses Southern soul food with Caribbean flavors. Active in community service and local advocacy, Zuri honors the legacy of civil rights activism while preserving and sharing the rich
    cultural practices of her ancestors.
