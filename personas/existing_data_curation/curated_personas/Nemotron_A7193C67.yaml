  career_goals: Laverne aims to transition from classroom teaching to a leadership role where she can expand the reach of STEM‑focused early education. Over the next five years she plans to earn a credential
    in early childhood administration, develop a district‑wide STEM curriculum for pre‑K, and mentor new teachers in best practices for integrating hands‑on science activities. She also hopes to launch
    a community after‑school STEM club that serves families in Miami’s underserved neighborhoods, and to cultivate a work environment that supports teacher well‑being, helping her and colleagues manage
    stress more effectively.
