    instructional adjustments'', ''Creative problem solving'', ''Time management strategies'']'
  hobbies: '[''Reading (fiction & science)'', ''Journaling'', ''Gardening (herbs & tropical plants)'', ''Yoga & mindfulness meditation'', ''Cooking fusion dishes'', ''Participating in a small book club'',
