  hobbies: '[''Visiting Art Galleries'', ''Sketching'', ''Photography'', ''Live Music Shows'', ''Volunteering at Community Centers'', ''Group Fitness Classes'', ''Board Games'', ''Craft Nights'']'
  career_goals: Kristen aims to transition from pure data entry into a data analyst role. She plans to earn a Google Data Analytics professional certificate and later pursue a bachelor’s degree in information
    systems or business analytics. In the long term, she envisions becoming a records manager or business intelligence specialist where she can combine her analytical strengths with her creative problem‑solving
    mindset and contribute to process improvements within a dynamic organization.
