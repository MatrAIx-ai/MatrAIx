personas:
  professional: Maria Gallegos is an IT support specialist who leverages their deep knowledge of Windows and macOS, network fundamentals, and instructional design to create clear documentation and tech‑literacy
    workshops, balancing curiosity about new tools with a disciplined, organized approach to meet high standards.
  sports: Maria Gallegos joins a weekday morning walking club at the city park, attends local salsa dance fitness sessions that double as cardio, cheers for the San Antonio Spurs during the NBA season and
    follows the Houston Astros in the baseball offseason, always tracking steps with a Fitbit and favoring low‑impact workouts that fit their busy schedule.
  arts: Maria Gallegos immerses themselves in Caribbean literature by reading works of Junot Díaz and Edwidge Danticat, frequents salsa nights where they dance to Celía Cruz and Marc Anthony, participates
    in community drum circles echoing the rhythms of Afro‑Latino percussionists like Tito Puente, and enjoys classic films starring Rita Moreno, all of which shape their identity and leisure.
  travel: Maria Gallegos prefers a blend of structured itineraries and spontaneous side trips, having explored Old San Juan’s historic forts, the lush highlands of Costa Rica, and Barcelona’s modernist
    architecture, while dreaming of a cultural immersion tour of the Dominican Republic’s merengue festivals and a relaxing retreat at a coastal eco‑lodge in Belize, all balanced against budgeting constraints
    and family commitments.
  culinary: Maria Gallegos enjoys cooking traditional island staples such as arroz con gandules, mofongo stuffed with shrimp, and quinoa‑infused pastelón, skillfully blending sofrito, cilantro, and freshly
    harvested basil from their balcony garden, while experimenting with healthier twists like swapping pork with grilled chicken and incorporating chia seeds into desserts, reflecting both a love for flavor
    and a health‑conscious mindset.
  core: Maria Gallegos balances a meticulously organized professional life with a heartfelt love for community music and gardening, yet often wrestles with anxiety that fuels both diligent planning and
    occasional impulsive kitchen gadget purchases.
background:
  cultural: Maria identifies strongly with her Puerto Rican roots, growing up in the vibrant neighborhoods of San Juan and Carolina. She is bilingual, speaking Spanish at home and English at work, which
    shapes her communication style and empathy for diverse users. Family ties, religious traditions (often attending local Catholic festivities), and community celebrations such as the Fiesta de San Juan
    reinforce her sense of belonging. She values the island's musical heritage—salsa, plena, and bomba—and participates in cultural events that preserve these traditions. Her cultural identity informs her
    collaborative approach, respect for hierarchy, and commitment to giving back to the community through education and technology outreach.
attributes:
  skills: '["Technical troubleshooting (hardware & software)", "Operating system support (Windows, macOS, Linux)", "Network fundamentals and basic configuration", "Remote assistance tools (TeamViewer, Remote
    Desktop)", "IT documentation and knowledge-base creation", "Bilingual customer service (Spanish/English)", "Instructional design and adult learning", "User training and onboarding", "Project coordination
    and ticket-management", "Problem-solving under pressure"]'
  hobbies: '["Cooking Puerto Rican cuisine", "Balcony gardening (herbs & tropical plants)", "Salsa dancing and community drum circles", "Reading (professional development and Caribbean literature)", "Yoga
    and mindfulness meditation", "Volunteering: teaching basic computer skills to youth"]'
  career_goals: Maria aims to transition from a front-line support specialist to a leadership role such as IT Support Manager or Learning Technology Coordinator within the next five years. She plans to
    earn industry certifications (CompTIA A+, Network+, ITIL), deepen her expertise in cybersecurity basics, and integrate her educational training to design company-wide digital learning programs. Long-term,
    she envisions launching a small consulting practice that helps local nonprofits upgrade their technology infrastructure while offering tech-literacy workshops for seniors and youth, thereby merging
    her passion for service and technical expertise.
