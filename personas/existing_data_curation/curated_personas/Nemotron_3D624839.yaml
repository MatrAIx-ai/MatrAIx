personas:
  professional: Anne Greenway, a kindergarten student who loves sorting shapes and following daily routines, demonstrates early organizational skills and a practical approach to learning, and they reliably
    complete classroom chores with quiet confidence.
  sports: Anne Greenway, an enthusiastic participant in the Neighborhood Little Lions T‑ball league and after‑school swimming class, loves cheering for the regional Tigers baseball team and they balance
    playful practice with a disciplined schedule that mirrors their love for predictable routines.
  arts: Anne Greenway, an avid fan of Sesame Street and the music of Laurie Berkner, enjoys drawing bright crayon pictures of Dr. Seuss characters, and they often organize their art supplies by color, reflecting
    their preference for structure in creative play.
  travel: Anne Greenway, a curious explorer who loves family trips to the local zoo and annual visits to Disneyland, prefers carefully planned itineraries with plenty of rest breaks, and they treasure a
    beloved stuffed bunny as a travel companion on each adventure.
  culinary: Anne Greenway, a budding chef who can melt butter for peanut butter and jelly sandwiches and proudly decorates macaroni cheese with a sprinkle of parmesan, enjoys the familiar comfort of chicken
    nuggets and sweet strawberry slices, and they insist on using a tidy plate arrangement before eating.
  core: Anne Greenway, a five‑year‑old who thrives on routine, collects sticker‑based treasures, and turns every day into a neatly ordered adventure, even if it means insisting on matching socks before
    school.
background:
  cultural: Anne is raised in a white, middle-class family in suburban Beaverton, Oregon. Her family embraces Pacific Northwest values such as outdoor recreation, community involvement, and appreciation
    for local parks. They celebrate mainstream American holidays like Thanksgiving, Christmas, and Fourth of July, and place a strong emphasis on early education, politeness, and cooperative behavior.
attributes:
  skills: '[''Early reading (recognizing letters and simple words)'', ''Basic counting and number recognition (1-20)'', ''Fine motor coordination (drawing, coloring, using safety scissors)'', ''Organizing
    toys and personal items'', ''Following multi-step instructions'', ''Cooperative play and turn-taking'', ''Matching and sorting games'', ''Basic digital literacy (using educational tablet apps)'']'
  hobbies: '[''Puzzle solving'', ''Lego building'', ''Reading picture books'', ''Coloring and drawing'', ''Nature walks in local parks'', ''Storytime at the Beaverton library'', ''Simple board games (e.g.,
    Candy Land)'', ''Singing nursery rhymes'']'
  career_goals: Anne dreams of growing up to work in a caring and structured environment. She often says she wants to be a teacher so she can share books and help friends learn, or a librarian who organizes
    stories. She also imagines being a veterinarian because she loves animals and wants to keep them healthy.
