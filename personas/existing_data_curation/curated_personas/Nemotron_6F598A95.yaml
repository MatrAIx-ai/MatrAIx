personas:
  professional: A budding creative storyteller, Victoria Cooper channels her vivid imagination into sketching fantastical characters for future graphic novels and shines on stage as an improv lead in her
    middle school drama club, though her resistance to strict deadlines often leaves projects half‑finished.
  sports: A fan of the St. Louis Cardinals and the St. Louis Blues, Victoria Cooper plays on her school’s co‑ed soccer team, joins the community swimming club at the municipal pool during summer, and channels
    her spontaneous energy into pick‑up basketball games after school, though she rarely adheres to a structured training schedule.
  arts: Immersed in illustration and performance, Victoria Cooper devotes after‑school hours to sketching creatures inspired by Studio Ghibli and Akira Toriyama, listens to Miles Davis at the local jazz
    museum, binge‑watches Broadway numbers by Lin‑Manuel Miranda, and posts whimsical edited videos of her drama club skits on a private YouTube channel, constantly seeking fresh artistic stimuli.
  travel: When she’s not exploring the St. Louis Art Museum or strolling through Forest Park’s botanical gardens, Victoria Cooper has taken weekend road trips to the Missouri State Fair, a family vacation
    to Chicago’s Art Institute, and day‑trips to Branson’s amusement parks, while dreaming of a future visit to New York City’s Broadway district for an immersive theater experience.
  culinary: Victoria Cooper’s palate swings between classic toasted ravioli and cheesy pizza after school, but she also loves whipping up honey‑glazed chicken drumsticks and experimenting with DIY smoothies
    featuring frozen berries, spinach, and almond milk, while occasionally sneaking a bite of her grandmother’s famous fried pork steak during family gatherings.
  core: Victoria Cooper is an endlessly curious thirteen‑year‑old who flits between sketchbooks, improv stages, and animal‑shelter volunteer shifts, balancing a calm resilience with a penchant for spontaneous
    creativity and a habit of forgetting to keep her desk organized.
background:
  cultural: Victoria comes from a white, Midwestern family rooted in St. Louis, Missouri. Her upbringing blends typical Midwestern values—politeness, community service, and modesty—with the vibrant cultural
    scene of the city. Family traditions include attending the Missouri State Fair, enjoying local foods like toasted ravioli, and taking part in community events such as the St. Louis Art Fair. Raised
    in a household that values kindness and cooperation, she often participates in church or community youth groups, which reinforce her calm, resilient demeanor. The city's rich musical heritage, especially
    its jazz legacy, subtly influences her artistic tastes and adds a layer of cultural appreciation to her creative pursuits.
