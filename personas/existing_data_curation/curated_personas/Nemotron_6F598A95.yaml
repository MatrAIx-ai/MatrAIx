  career_goals: Victoria dreams of turning her love for stories and art into a career that lets her inspire others. She envisions becoming a children's book author and illustrator, crafting beautifully
    illustrated tales that spark imagination. She is also intrigued by film and hopes one day to direct short movies or animated projects that blend visual art with narrative. In the longer term, Victoria
    sees herself leading youth arts programs in her community, using her sociable, supportive nature to mentor other creative kids and organize community events that celebrate imagination and collaboration.
