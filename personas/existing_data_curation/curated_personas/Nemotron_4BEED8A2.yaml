personas:
  professional: Myong Tayao, a 17‑year‑old high‑school senior, leverages their knack for systematic event planning and bilingual communication to lead the school’s multicultural club and mediate peer conflicts,
    envisioning a future in community outreach or human resources where structured program coordination meets social impact.
  sports: Myong Tayao stays active by leading K‑pop dance sessions for the school’s cultural club, occasionally joining the varsity track team for cross‑country meets in the fall, while cheering on the
    Los Angeles Lakers and the U.S. Women’s National Soccer Team as their favorite professional squads.
  arts: Myong Tayao channels artistic energy into a local youth choir where they perform arrangements of BTS's 'Spring Day' and classic Broadway numbers, while also curating weekly movie nights that showcase
    films from Studio Ghibli, Wong Kar‑Wai, and indie Korean directors, reflecting a blend of pop culture and cinematic appreciation.
  travel: Myong Tayao prefers meticulously planned weekend getaways, having explored Seoul's historic palaces with family, backpacked through the street food markets of Busan on a school trip, and dreaming
    of a cultural exchange program in Barcelona's Gothic Quarter while balancing parental budgeting constraints.
  culinary: Myong Tayao delights in crafting Korean‑American fusion dishes such as kimchi‑topped tacos, bulgogi‑glazed burgers, and gochujang‑infused mac & cheese, often sourcing fresh napa cabbage, gochugaru,
    and locally roasted pork belly from the weekend farmers market to impress friends at themed potlucks.
  core: Myong Tayao blends meticulous organization with a vivacious love for community gatherings, turning stress‑filled moments into journal‑filled reflections while occasionally over‑indulging in K‑pop
    merch splurges.
background:
  cultural: Myong is a Korean American raised in Edison, New Jersey, a community with a vibrant Asian presence. Her family maintains Korean cultural traditions, celebrating holidays such as Seollal (Lunar
    New Year) and Chuseok with family gatherings and traditional foods. Korean is spoken at home alongside English, and she participates in local Korean cultural clubs and community events, which shape
    her identity and values of respect for elders, emphasis on education, and communal harmony.
attributes:
  skills: '[''Event planning'', ''Schedule management'', ''Digital organization (Google Suite, spreadsheets)'', ''Public speaking'', ''Conflict mediation'', ''Basic budgeting'', ''Bilingual communication
