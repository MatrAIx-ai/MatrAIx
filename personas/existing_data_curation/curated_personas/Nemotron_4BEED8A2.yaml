  hobbies: '[''Organizing social events'', ''Cooking (Korean‑American fusion)'', ''K‑pop dancing'', ''Youth choir singing'', ''Journaling'', ''Mindfulness meditation'', ''Indoor succulent gardening'']'
  career_goals: Myong intends to enroll in a community college and pursue a degree in business administration or social work, aiming to work in community outreach, program coordination, or human resources
    where she can blend her organizational strengths with her desire to help others. She plans to earn certifications in project management and mental‑health first aid, and ultimately hopes to hold a leadership
    role that creates structured, supportive environments for youth and families.
