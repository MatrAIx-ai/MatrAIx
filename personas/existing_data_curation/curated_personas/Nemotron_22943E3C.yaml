  career_goals: Analorena aims to formalize her expertise by earning a Certified Bookkeeper (CB) credential and possibly completing an associate degree in accounting. She hopes to advance to a senior accounting
    clerk or supervisory role within her current firm, where she can mentor younger staff and lead process‑improvement projects. Long‑term, she envisions transitioning to a part‑time consulting practice
    focused on serving small Mexican‑American businesses in West Texas, offering bookkeeping, tax filing, and financial‑literacy workshops. She also plans to develop a structured stress‑management routine,
    incorporating mindfulness and yoga to mitigate the anxiety she experiences during peak filing seasons.
