  hobbies: '[''Fishing'', ''Hiking'', ''Classic Car Restoration'', ''Strategic Board Games'', ''Chess Club'', ''Historical Biography Reading'', ''Community Food Bank Volunteering'', ''Cooking Portuguese
    Cuisine'']'
  career_goals: Johnny is aiming to step into a senior operations role—ideally Plant Manager or Director of Operations—within the next five years. He plans to earn a Six Sigma Black Belt and pursue an executive
    MBA to complement his practical experience. He hopes to lead a company-wide lean transformation, mentor emerging managers, and eventually launch a consulting practice that helps small manufacturers
    improve efficiency while preserving local jobs. His competitive drive motivates him to outperform industry benchmarks and secure recognitions for operational excellence.
