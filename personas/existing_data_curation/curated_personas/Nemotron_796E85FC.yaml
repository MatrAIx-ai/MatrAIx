  hobbies: '[''Sketching in cafés'', ''Visiting local art galleries and the Art Crawl'', ''Collecting vintage postcards'', ''Reading speculative fiction and poetry'', ''Listening to experimental indie music'',
    ''Meditative nature walks'', ''Keeping a visual journal'', ''Creating short video essays for her blog'']'
  career_goals: Carmen hopes to turn her artistic passions into a sustainable, flexible career. She plans to enroll part‑time at a local community college to pursue an Associate’s degree in Visual Arts
    while continuing to sell original pieces and prints online. Long‑term, she dreams of working as a freelance illustrator for indie publishing houses and collaborating with community centers in Saint Paul
    to run art‑therapy workshops. She values a lifestyle that allows her to travel, explore new artistic mediums, and maintain a calm, self‑directed schedule rather than a rigid 9‑to‑5 job.
