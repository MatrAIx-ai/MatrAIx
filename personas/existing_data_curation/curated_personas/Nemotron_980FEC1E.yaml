  hobbies: '[''Reading (fiction and poetry)'', ''Cooking Cuban dishes'', ''Gardening (balcony herbs and vegetables)'', ''Listening to Cuban jazz and son'', ''Walking in Pelham Bay Park'', ''Journaling and
    reflective writing'', ''Puzzle solving (crosswords)'', ''Yoga and meditation'', ''Volunteering at local community center (food distribution)'', ''Learning about HR trends via webinars'']'
  career_goals: Delia aims to deepen her HR expertise by obtaining a SHRM‑CP certification within the next two years, positioning herself for a senior HR generalist or HR manager role that emphasizes employee
    well‑being and inclusive workplace culture. She aspires to lead initiatives that integrate innovative HR technologies—such as analytics dashboards—while preserving the dependable, people‑focused processes
    she values. Long‑term, she hopes to design a comprehensive employee wellness program for her organization, mentor emerging HR professionals, and eventually transition into a strategic HR analytics position
    that allows her to work more independently and leverage data‑driven insights to support organizational harmony.
