  career_goals: Hoping to transition into a senior management role as a Library Services Manager or Director of Community Programs within the Los Angeles County Library system, Yuxin aims to spearhead digital
    transformation initiatives that integrate emerging technologies such as AI‑driven discovery tools and immersive media. She plans to expand multicultural and art‑focused collections, forge partnerships
    with local museums, and design inclusive outreach programs that serve diverse communities. Pursuing a Master’s in Library and Information Science is also on her agenda, as is mentoring emerging library
    professionals and championing equity‑driven policies.
