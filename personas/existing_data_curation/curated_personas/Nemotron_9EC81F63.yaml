personas:
  professional: Yuxin Yoo, a seasoned library science specialist with advanced expertise in MARC and Dublin Core cataloging, digital archiving, and integrated library systems like Alma and OCLC WorldCat,
    leverages their bilingual fluency and curiosity to design community‑focused art exhibitions and AI‑driven discovery workshops, while their organized, reliable nature ensures every grant proposal and
    program timeline meets exacting standards as they pursue a senior management role within the Los Angeles County Library system.
  sports: Yuxin Yoo, an avid participant in the Santa Monica Mountains Hiking Club and a regular attendee of LA Yoga Studio classes, supports the Los Angeles Lakers, Dodgers, and Galaxy, incorporates weekend
    trail runs into their fitness regimen, and balances energetic group sports enthusiasm with a disciplined schedule that ensures they never miss a scheduled community volunteer shift.
  arts: Yuxin Yoo, a passionate explorer of Los Angeles's art scene, frequents the Getty Center, LACMA, and MOCA to study works by Ai Weiwei, Yayoi Kusama, and Edward Hopper, curates street‑photography
    essays inspired by Nan Goldin's intimacy, attends LA Philharmonic performances of Beethoven and contemporary composer Tan Dun, and they integrate these artistic influences into library exhibition programming,
    often humming classical motifs while cataloging.
  travel: Yuxin Yoo, a methodical yet adventurous traveler, has trekked the historic streets of Kyoto, sampled tapas in Barcelona, and explored the vibrant markets of Oaxaca, plans each journey with a detailed
    itinerary balanced by spontaneous photo‑walks, uses airline points to stretch a modest budget, and dreams of attending the lantern festival in Chiang Mai while they continue to prioritize family gatherings
    back home.
  culinary: Yuxin Yoo, an experimental home cook, blends miso‑glazed salmon with avocado salsa, creates mapo tofu ramen using locally sourced heirloom tomatoes and fresh herbs, perfects a seasonal poke
    bowl with pickled radish and yuzu dressing, and while they delight in these fusion dishes they occasionally over‑salt the broth in their zeal to perfect flavor balance.
  core: Yuxin Yoo, a curious, organized, and sociable library professional in their late forties, balances a love of art, photography, and experimental cooking with community service and a disciplined approach
    to health and finance, even if they sometimes hoard vintage Polaroid film and forget to water their succulents.
background:
  cultural: Yuxin is a first‑generation Chinese‑American raised in Southern California. She grew up in a bilingual household where Mandarin was spoken alongside English, fostering a deep appreciation for
    both East Asian and Western literary and artistic traditions. Her family emphasized respect for education, community harmony, and intergenerational responsibility, values she carries into her professional
    life. Immersed in Los Angeles’s vibrant multicultural milieu, she actively engages with Asian‑American community organizations, celebrates traditional festivals such as Lunar New Year, and integrates
    cross‑cultural perspectives into her library programming.
