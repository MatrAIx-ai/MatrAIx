persona_description: A researcher and scientist who specializes in studying lymphoma, particularly in dogs as a model for human lymphoma studies. She has worked on cancer research for almost 30 years, collaborating
  with clinical studies professor Paul Woods and pathobiology professor Dorothee Bienzle. Her work aims to identify patients sooner who respond well to treatment, improve outcomes, and save time and effort.
  She is using the same predictive biomarker test as well as investigating gene expression and DNA changes in tumours. Her research is being translated into human clinical trials through the Canadian Oncolytic
  Virus Consortium and BioCanRx National Centres of Excellence.
