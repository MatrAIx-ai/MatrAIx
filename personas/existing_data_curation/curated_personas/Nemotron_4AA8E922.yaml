personas:
  professional: Janet Adams is a budding young coder‑artist who blends their love for drawing characters from favorite books with building simple Scratch games, showing a curious mind and a relaxed approach
    to deadlines that lets them experiment freely.
  sports: Janet Adams plays midfield for the local youth soccer team the Meadowbrook Cubs, cheers on the city’s professional club River City FC, and combines weekend park hikes with impromptu soccer drills,
    preferring group fun over strict training schedules because they thrive on social energy.
  arts: Janet Adams draws inspiration from the whimsical illustrations of Mary GrandPré, the bold color patterns of Yayoi Kusama, and the melodic indie pop of Tegan and Sara, while also being a fan of Studio
    Ghibli’s “Spirited Away,” and they weave these influences into daily sketchbook creations.
  travel: Janet Adams has explored the nearby Pine Ridge Nature Trail and visited the city’s Modern Art Museum on a school field trip, and they dream of traveling to Paris to see the Louvre’s masterpieces
    as well as embarking on a camping adventure in Yellowstone National Park.
  culinary: Janet Adams prefers bright meals like margherita pizza topped with fresh basil and mozzarella, enjoys making peanut butter‑banana sandwiches, and can proudly bake chocolate‑chip cookies using
    butter, brown sugar, and vanilla, though they often forget to set a timer.
  core: Janet Adams blends a vivid imagination with a relentless curiosity, hopping from drawing enchanted creatures to building Scratch games, yet they habitually misplace crayons and let worries swirl
    in a journal before bedtime.
background:
  cultural: Janet grew up in Castro Valley, a suburban community in the San Francisco Bay Area, within a middle‑class white family that embraces typical American holidays and traditions. The Bay Area’s
    vibrant mix of art, technology, and multicultural events has shaped her appreciation for creativity and innovative thinking. Family outings often include trips to local parks, museums, and community
    festivals, reinforcing a sense of community involvement and openness to diverse experiences.
attributes:
  skills: '[''Drawing and painting'', ''Digital art (tablet)'', ''Basic coding with Scratch'', ''Storytelling'', ''Team collaboration'', ''Peer mediation'', ''Elementary math and science understanding'']'
  hobbies: '[''Drawing and painting'', ''Visiting art museums'', ''Community art classes'', ''Scratch coding projects'', ''Soccer'', ''Nature walks in regional parks'', ''Listening to music'', ''Dancing'',
    ''Journaling'']'
  career_goals: Janet dreams of becoming a creative professional who blends art and technology, such as a multimedia designer, interactive game creator, or illustrator who brings stories to life. She also
    imagines leading community workshops where she can teach other kids to draw, code, and express themselves. Her long‑term ambition includes traveling to visit museums and art festivals around the world
    to gather new ideas and inspiration.
