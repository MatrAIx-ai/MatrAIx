persona_description: A researcher or health policy maker who is interested in the impact of anthelmintic drug delivery strategies on soil-transmitted helminth prevalence in school-aged children. This person
  is likely to be interested in the findings of the meta-analysis, which suggest that expanding deworming programmes community-wide is likely to reduce the prevalence of soil-transmitted helminths in the
  high-risk group of school-aged children, potentially leading to improved morbidity outcomes. This person may be particularly interested in the findings for hookworm and Ascaris lumbricoides, as these
  are the most commonly targeted and studied helminth species.
