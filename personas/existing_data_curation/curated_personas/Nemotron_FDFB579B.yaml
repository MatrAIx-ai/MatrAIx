  hobbies: '["Hiking in local state parks","Birdwatching","Landscape photography","Reading contemporary fiction and historical biographies","Baking seasonal recipes","Pottery and ceramics","Volunteering
    at the local food pantry","Board game nights with friends","Cross‑country skiing","Journaling and creative writing"]'
  career_goals: Kathryn aims to complete her bachelor's degree in Business Administration with a focus on nonprofit management within the next two years. In the short term, she plans to secure an internship
    in community program coordination, earn a CAPM (Certified Associate in Project Management) certification, and gain hands‑on experience in grant administration and outreach. Her long‑term ambition is
    to become a program director for a regional nonprofit that delivers health and environmental services to rural Minnesota communities, where she can blend her curiosity for data‑driven solutions with
    a practical, people‑centered approach. She also hopes to mentor younger students and contribute to local community‑building initiatives.
