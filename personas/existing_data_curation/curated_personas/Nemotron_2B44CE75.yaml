  hobbies: '[''Watercolor Painting'', ''Landscape Photography'', ''Birdwatching'', ''Hiking'', ''Reading Contemporary Fiction'', ''Southern Cooking Experiments'', ''Gardening'', ''Knitting'', ''Listening
    to Bluegrass Music'', ''Podcasts on Psychology and Innovation'']'
  career_goals: Brianna aims to transition from day‑to‑day flagging duties to a leadership role as a certified School Safety Coordinator for Duplin County schools. She plans to pursue a master’s in Education
    Administration with a focus on safety program development, allowing her to design and implement comprehensive, arts‑integrated safety curricula for elementary students. Long‑term, she aspires to influence
    county transportation planning by advocating for improved pedestrian infrastructure and community‑driven safety initiatives. Her competitive drive pushes her to become a recognized trainer for safety
    protocols statewide, while her curiosity fuels a desire to stay at the forefront of innovative safety technologies and educational strategies.
