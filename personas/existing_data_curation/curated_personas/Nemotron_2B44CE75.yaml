personas:
  professional: A dedicated safety‑education specialist, Brianna Baumann blends her methodical risk‑assessment expertise, classroom‑management acumen, and a watercolor‑inspired visual flair to craft immersive,
    arts‑integrated road‑safety curricula for elementary students, while her competitive drive fuels her ambition to become a statewide trainer and a certified School Safety Coordinator.
  sports: A nature‑focused fitness enthusiast, Brianna Baumann spends weekends hiking the Duplin Trailblazers club’s forest loops, joins the local bird‑watching hikes, follows the Carolina Panthers for
    NFL thrills, supports the Charlotte Hornets in basketball season, and incorporates weekend trail runs with the Asheville Trail Runners to balance solitary exercise with occasional team camaraderie.
  arts: An avid watercolorist and photographer, Brianna Baumann draws inspiration from Winslow Homer’s landscapes, channels the melodic twang of Old Crow Medicine Show at bluegrass concerts, knits patterned
    blankets while listening to Iron & Wine, and curls up with contemporary novels by Sally Rooney, letting each medium deepen her curiosity and offer a soothing counterpoint to her high‑stress work.
  travel: A meticulously planned wanderer, Brianna Baumann favors weekend escapes to Asheville’s Blue Ridge trails, cultural strolls through Savannah’s historic squares, culinary pilgrimages to New Orleans
    for gumbo and po’boys, and annually dreams of a spring art retreat in Barcelona’s Gothic Quarter, always budgeting travel expenses to keep her anxiety at bay.
  culinary: An experimental Southern cook, Brianna Baumann excels at whipping up shrimp‑and‑grits with smoked paprika, perfecting fried green tomatoes with a hint of cayenne, and baking biscuits infused
    with buttermilk and fresh rosemary, yet she often forgets to set timers when she gets lost in watercolor sketches, leading to occasional over‑cooked dishes.
  core: Brianna Baumann is a curiosity‑driven safety educator who channels her organized, competitive nature into detailed, arts‑infused curricula, while a persistent worry fuelled by anxiety pushes her
    toward meticulous budgeting, solo hikes, and occasional over‑cooking when distracted.
background:
  cultural: Brianna grew up in Wallace, a small town in Duplin County, North Carolina, where agricultural roots, Southern hospitality, and strong church involvement shape daily life. Her family belongs
    to a Baptist congregation, and she was raised attending community events such as county fairs, church potlucks, and local bluegrass concerts. The region’s culture emphasizes modesty, hard work, community
    service, and storytelling, which have reinforced her reliable and methodical nature. While predominantly Anglo‑American, she embraces Southern traditions of folk arts, cooking, and music, and remains
    open to the growing multicultural influences that enrich the community, reflecting a blend of classic Southern values with a curiosity for new ideas.
attributes:
  skills: '[''Traffic Control Operations'', ''First Aid & CPR'', ''Public Safety Education'', ''Curriculum Development'', ''Classroom Management'', ''Risk Assessment'', ''Crisis Intervention'', ''Effective
