personas:
  professional: Mercedes Williams is a budding little doctor who loves role‑playing caring for stuffed animals, using their organized, methodical nature to set up a tidy clinic with color‑coded patient
    charts while they hum gospel tunes.
  sports: Mercedes Williams loves to sprint around the Humble Bumblebees youth soccer field on Saturday mornings, cheers loudly for the Houston Astros during summer baseball games, and practices basketball
    dribbles with friends while wearing a tiny Houston Rockets jersey, showcasing a balanced, playful approach to fitness that blends structured team drills with spontaneous backyard obstacle courses, and
    they always make sure to stretch before each game.
  arts: Mercedes Williams spends afternoons sketching bright, space‑themed pictures while dancing to Beyoncé’s “Crazy in Love” and Bruno Mars’s “Uptown Funk,” eagerly reciting lines from Mister Rogers and
    humming Raffi’s “Baby Beluga,” making the arts a lively backdrop to their playful world, and they love to sing along at the top of their lungs.
  travel: Mercedes Williams enjoys weekend family trips that blend carefully planned visits to Space Center Houston and the Dallas Arboretum with spontaneous stops at local parks for leaf‑collecting, and
    they dream of one day traveling to Walt Disney World and the Grand Canyon, though budget‑friendly adventures keep most journeys close to home.
  culinary: Mercedes Williams delights in helping stir fluffy pancake batter with a splash of vanilla, loves biting into cheesy macaroni with pepper jack cheese and a side of buttery collard greens, and
    savors the sweet aroma of fresh cornbread while they often snack on crunchy apple slices and honey‑drizzled watermelon.
  core: Mercedes Williams is a curious, organized six‑year‑old who balances a love for pretend doctor‑play with a disciplined habit of sorting Legos by color, all while humming gospel beats, and they occasionally
    forget to brush their teeth before bedtime.
background:
  cultural: Mercedes is raised in an African-American household in Humble, Texas, where family, church, and community play central roles. Her family celebrates cultural traditions such as Juneteenth and
    Kwanzaa, and they enjoy soul food meals that blend Southern flavors with Tex-Mex influences. Music—ranging from gospel choirs at church to contemporary R&B and hip‑hop—fills the home, providing a soundtrack
    to her daily routines. Her parents emphasize the importance of education, respect, and giving back to the neighborhood. Growing up in a diverse suburb, Mercedes experiences a mix of Southern hospitality,
    urban multiculturalism, and the supportive, inter-generational bonds common in many African-American families.
