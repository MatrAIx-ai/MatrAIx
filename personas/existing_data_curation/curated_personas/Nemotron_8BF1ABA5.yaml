  career_goals: Mercedes dreams of a future where she can combine her love for animals, her curiosity about how things work, and her desire to help others. She often says she wants to become a veterinarian
    to care for pets and wildlife, and she also imagines herself as a scientist or engineer who invents tools that make everyday life easier for her family and community. Her practical side leads her to
    think about the steps needed—learning in school, practicing kindness, and staying organized—to turn those dreams into reality.
