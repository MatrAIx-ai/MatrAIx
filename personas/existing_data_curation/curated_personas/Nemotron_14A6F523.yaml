personas:
  professional: Sharon Floria, a seasoned construction laborer with two decades of concrete, framing, and equipment expertise, pairs an associate's degree in construction management with a meticulous, safety‑first
    approach, and is now targeting a foreman role while pursuing OSHA trainer certification and small‑business training to launch her own residential renovation firm.
  sports: Sharon Floria follows the Miami Dolphins and Miami Heat, enjoys weekly nature‑trail walks that double as low‑impact cardio, participates in a community‑garden senior softball league, and occasionally
    joins a local yoga class to stretch sore joints.
  arts: Sharon Floria attends pottery workshops inspired by contemporary ceramist Betty Woodman, listens to folk icons like Joan Baez while crafting wooden birdhouses reminiscent of Winslow Homer’s rustic
    scenes, and devotes evenings to reading David McCullough’s historical biographies.
  travel: Sharon Floria plans trips with a printed itinerary, prefers low‑key historic destinations such as Savannah, Georgia, and Asheville, North Carolina, has taken weekend drives to the Florida Keys,
    and dreams of exploring Charleston’s colonial architecture and hiking the Great Smoky Mountains with a small group of close friends.
  culinary: Sharon Floria enjoys cooking Southern comfort dishes like shrimp‑and‑grits, roasted rosemary‑infused root vegetables harvested from her garden, and peach cobbler made with home‑grown fruit,
    balancing flavor with a health‑conscious, low‑sodium approach that they sometimes forget in the rush of a busy day.
  core: Sharon Floria is a methodical, worry‑prone construction veteran who channels her curiosity into sustainable gardening, meticulous budgeting, and a quiet pursuit of foremanship, all while battling
    a habit of over‑checking work orders and neglecting self‑care.
background:
  cultural: Sharon grew up in a working-class family in central Florida, where a blend of Southern hospitality and the multicultural vibe of Pasco County shaped her outlook. Her upbringing emphasized hard
    work, self-reliance, and community cooperation, values that remain central to her identity. While she identifies with the broader white middle-class culture of the region, she is also attuned to the
    diverse rhythms of the local community through church gatherings and neighborhood events.
attributes:
  skills: '[''Concrete forming and finishing'', ''Carpentry framing'', ''Heavy equipment operation (forklift, backhoe)'', ''Blueprint reading and interpretation'', ''OSHA safety compliance and training'',
    ''Materials inventory management'', ''Team coordination and small-crew supervision'', ''Problem solving on-site'', ''Basic project scheduling'', ''Effective communication with supervisors and clients'']'
  hobbies: '[''Gardening (native plants, sustainable landscaping)'', ''Reading historical non-fiction and DIY guides'', ''Woodworking (birdhouses, small furniture)'', ''Walking nature trails'', ''Pottery
    classes with a small group'', ''Volunteering at the community garden'']'
  career_goals: Sharon aims to transition into a foreman or site-supervisor role within the next three years, leveraging her practical knowledge and organizational strengths. She plans to earn a certified
    OSHA trainer credential and a small-business management course to eventually start her own modest contracting firm focused on residential renovations. Additionally, she hopes to mentor younger workers,
    creating a supportive environment that reduces workplace stress.
