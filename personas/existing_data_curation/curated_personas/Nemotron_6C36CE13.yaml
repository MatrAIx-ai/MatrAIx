personas:
  professional: Valerie Cooper, a veteran elementary teacher turned community education mentor, leverages decades of curriculum development, differentiated instruction, and tech‑savvy tools like Google
    Classroom while letting her relaxed, flexible nature allow spontaneous, hands‑on learning moments, especially when integrating gardening and craft projects.
  sports: Valerie Cooper follows the Houston Astros and Dallas Cowboys with enthusiastic devotion, participates in the senior center's weekly low‑impact aerobics class and occasional community softball
    games, and enjoys morning walks in the local park to stay fit.
  arts: Valerie Cooper delights in knitting scarves for charity, reads historical fiction by Larry McMurtry and Barbara Kingsolver in her book club, and often listens to classic country legends like Willie
    Nelson while crafting, finding inspiration in the storytelling tradition of Texas folk music.
  travel: Valerie Cooper prefers flexible road trips with her husband to historic sites such as the Alamo, Gettysburg, and Savannah, budgeting carefully to fund these journeys while dreaming of a spring
    writing retreat in Maine and a cultural tour of New Mexico’s Santa Fe.
  culinary: Valerie Cooper, an experienced home cook, creates farm‑to‑table dishes like smoked brisket with homemade pecan pie, heirloom tomato salsa, and fresh cornbread using vegetables from her garden
    and loves the bold flavor of charred okra and black‑eyed peas.
  core: Valerie Cooper blends a lifelong educator’s curiosity with a relaxed, sometimes forgetful, approach to life, nurturing community through gardening, knitting, and storytelling while savoring classic
    Texas flavors and spontaneous road trips with her husband.
background:
  cultural: Valerie grew up in a middle‑class, white family in North Texas, where community ties and a strong work ethic were emphasized. Her upbringing was shaped by the values of southern hospitality,
    self‑reliance, and a respect for education, which guided her decision to pursue a bachelor's degree in education. Throughout her life, she has been active in the local Methodist congregation and participated
    in regional traditions such as county fairs and holiday food drives. Her Texan roots are evident in her love of outdoor activities, regional cuisine, and a deep appreciation for the state’s history
    and cultural diversity.
attributes:
  skills: '[''Curriculum development'', ''Differentiated instruction'', ''Classroom management'', ''Mentoring'', ''Volunteer coordination'', ''Event planning'', ''Educational technology (Google Classroom,
