personas:
  professional: Jaouad Starr, a veteran healthcare operations manager with a flair for design‑thinking, leverages data analytics and lean methodology to streamline patient flow while they mentor staff with
    calm, decisive crisis leadership.
  sports: Jaouad Starr, an avid weekend hiker who joins a local masters tennis club and follows the Boston Celtics, New England Patriots, and Boston Red Sox, incorporates daily walks in the Blue Hills Reservation
    into a low‑impact fitness regimen, and they use a smartwatch to track steps and heart rate.
  arts: Jaouad Starr, a watercolor enthusiast who captures urban landscapes with a Leica M10, serenades evenings with Philip Glass piano selections, and they frequently attend contemporary exhibitions featuring
    artists like Yayoi Kusama and James Turrell, channeling this artistic curiosity into interdisciplinary healthcare workshops.
  travel: Jaouad Starr, who prefers meticulously planned itineraries blending culture and nature, has explored Kyoto’s Zen gardens, Iceland’s geothermal spas, and the historic streets of Lisbon, and they
    dream of a boutique retreat in the Scottish Highlands that balances remote work with hiking.
  culinary: Jaouad Starr, an adventurous home chef experimenting with sous‑vide salmon, beet‑infused risotto, and saffron‑spiced paella, delights in sourcing heirloom tomatoes and wild mushrooms from local
    farms, and they perfect a signature herb‑crust for roasted lamb.
  core: Jaouad Starr, a calm, endlessly curious 54‑year‑old who fuses data‑driven healthcare leadership with watercolor brushstrokes, yoga breaths, and a penchant for late‑night VR art experiments, and
    they often forget to turn off the kettle.
background:
  cultural: Jaouad was raised in a middle‑class New England family of Irish‑Canadian descent, where community, hard work, and a respect for education were emphasized. Growing up in the Boston suburbs, he
    was exposed to a blend of traditional Anglo‑American values and the region’s rich cultural institutions. This background fostered his appreciation for both practicality and the arts, influencing his
    balanced approach to leadership and his ongoing engagement with local cultural events and charitable volunteer work.
attributes:
  skills: '["Healthcare Operations Management", "Strategic Planning", "Quality Improvement", "Data Analytics & Health Informatics", "Design Thinking for Healthcare Innovation", "Lean Process Optimization",
