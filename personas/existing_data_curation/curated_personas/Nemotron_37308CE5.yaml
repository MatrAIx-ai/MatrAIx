  hobbies: '["Watercolor Painting", "Photography", "Piano Playing", "Speculative Fiction & Philosophy Reading", "Contemporary Art Gallery Visits", "Experimental Cooking", "Virtual Reality Exploration",
    "AI‑Assisted Creative Projects", "Yoga", "Hiking in Blue Hills Reservation"]'
  career_goals: Jaouad aims to ascend to a senior executive role—such as Chief Operating Officer—within a regional health system, where he can spearhead the integration of digital health technologies and
    patient‑centered care models. He seeks to champion equity‑focused initiatives that improve access and outcomes for underserved populations. In parallel, he aspires to obtain a Certified Professional
    in Healthcare Quality (CPHQ) credential and, eventually, to launch a boutique consultancy that advises hospitals on innovative service design and operational resilience. He also envisions teaching part‑time
    at a local community college to mentor the next generation of healthcare managers.
