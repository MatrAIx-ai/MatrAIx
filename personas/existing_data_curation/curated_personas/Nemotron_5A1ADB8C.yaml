personas:
  professional: Marelyn Miranda is a detail‑driven industrial engineer specializing in health and safety, who leverages Six Sigma and lean methodologies to design compliant, data‑rich safety programs while
    championing collaborative, evidence‑based decision‑making.
  sports: Marelyn Miranda is an avid outdoor enthusiast who cycles the Sacramento River Trail with the Sacramento Bike Club, hikes the Sierra foothills through the Sierra Foothill Hiking Group, follows
    the Sacramento Kings and River Cats, and practices yoga three times weekly to maintain flexibility and stress resilience.
  arts: Marelyn Miranda channels her love of visual storytelling by photographing sunrise over the State Capitol, drawing inspiration from Ansel Adams and contemporary photographer Brandon Stanton, regularly
    visits the Crocker Art Museum to view works by local painters, and unwinds to indie folk playlists featuring Bon Iver and Haim.
  travel: Marelyn Miranda prefers thoughtfully planned weekend getaways, having trekked Yosemite’s Mist Trail, camped at Lake Tahoe, and explored Mendocino’s coastal cliffs, while dreaming of a spring pilgrimage
    to Kyoto’s zen gardens and a summer trek through Patagonia’s Torres del Paine, always booking accommodations and transport months in advance to maximize budget efficiency.
  culinary: Marelyn Miranda experiments with plant‑based cuisine, often preparing roasted cauliflower tacos with tahini, quinoa‑stuffed bell peppers with heirloom tomatoes, and a seasonal butternut squash
    risotto flavored with sage and toasted pumpkin seeds, sourcing ingredients from Saturday farmer’s markets and mastering the art of homemade kimchi for probiotic benefits.
  core: Marelyn Miranda blends methodical engineering precision with a nature‑centered, stress‑aware lifestyle, constantly juggling data‑driven safety solutions, mindful self‑care rituals, and a passion
    for sustainable, plant‑based creativity.
background:
  cultural: Marelyn was raised in a middle‑class white family in the Central Valley of California, where values of hard work, self‑reliance, and community involvement were emphasized. She celebrates traditional
    American holidays such as Thanksgiving, Fourth of July, and Christmas, while also embracing the multicultural fabric of Sacramento through exposure to diverse cuisines, festivals, and community initiatives.
    Her upbringing encouraged curiosity, education, and cooperative spirit, shaping her inclusive outlook and appreciation for both individual achievement and collective well‑being.
attributes:
  skills: '[''Process Optimization'', ''Lean Manufacturing'', ''Six Sigma'', ''Industrial Safety Auditing'', ''Risk Assessment'', ''OSHA/Cal-OSHA Compliance'', ''Statistical Analysis'', ''Data Visualization'',
