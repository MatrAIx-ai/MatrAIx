  hobbies: '[''Hiking'', ''Cycling'', ''Yoga'', ''Meditation'', ''Reading Science Nonfiction'', ''Cooking Plant‑Based Meals'', ''Photography'', ''STEM Mentorship'', ''Community Clean‑up Volunteering'']'
  career_goals: Marelyn aims to obtain her Professional Engineer (PE) license within the next three years and transition into a senior industrial safety engineer role. She aspires to lead comprehensive
    workplace health initiatives that integrate sustainability and ergonomic design, eventually becoming a Director of Health, Safety, and Environmental (HSE) Operations for a manufacturing firm in the
    Sacramento region. Long‑term, she envisions establishing her own consulting practice focused on risk reduction and mental‑health‑aware safety culture. To support these goals, she plans to pursue a master’s
    degree in Occupational Health and Safety and actively mentor emerging engineers, especially women in STEM, while advocating for workplace stress‑management programs.
