persona_description: A glaciologist who specializes in the study of ice streams and their interactions with the landscape beneath the ice. Their research focuses on understanding the physical shape of channels,
  the role of climate and oceanic changes in ice loss, and the unpredictable nature of ice streams that make forecasting ice-sheet retreat extremely difficult. They use computer models and satellite imagery
  to simulate past ice-sheet retreat and collapse over a 10,000-year period in Antarctica and are known for their contributions to improving predictions of future ice extent and global sea-level rise.
