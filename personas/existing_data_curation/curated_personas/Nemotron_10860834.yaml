  hobbies: '[''Knitting'', ''Quilting'', ''Cooking'', ''Gardening'', ''Line dancing'', ''Book clubs'', ''Volunteer at animal shelter'', ''Road trips with husband'', ''Attending county fairs'', ''Storytelling/collecting
    oral histories'']'
  career_goals: Tina aims to stay actively engaged in her community by taking a leadership role in the senior center’s volunteer program and launching a community garden that brings together neighbors of
    all ages. She plans to complete a certified caregiver training course to better support family members and local seniors. Additionally, she hopes to start a modest home‑based catering service for neighborhood
    events, document oral histories of long‑time Dover residents, and enjoy spontaneous road trips with her husband to historic sites and state parks.
