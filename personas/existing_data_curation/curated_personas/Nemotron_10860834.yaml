personas:
  professional: Tina Burton, a seasoned community volunteer coordinator, leverages her practical budgeting, event planning, and first‑aid expertise to run senior‑center programs, while her spontaneous,
    sociable nature keeps gatherings lively and adaptable.
  sports: Tina Burton regularly participates in line‑dancing classes at the Dover community center, follows the Delaware Fightin' Blue Hens football team, and joins a senior walking group that meets weekly
    at Caesar Rodney Park, combining gentle exercise with community camaraderie.
  arts: Tina Burton expresses her creativity through quilting and knitting, often drawing inspiration from folk artists like Grandma Moses, and enjoys listening to the gentle acoustics of The Milk Carton
    Kids while she works on projects, weaving music and visual art into her tactile crafts.
  travel: Tina Burton loves spontaneous road trips with her husband, cruising down the Coastal Highway to Cape Henlopen State Park, exploring historic Philadelphia sites, visiting the historic district
    of Gettysburg, and dreaming of a future journey to Savannah’s riverfront squares.
  culinary: Tina Burton experiments with seasonal recipes using vegetables from her garden, such as heirloom tomato gazpacho, rosemary‑infused roasted potatoes, and a signature apple‑cinnamon crumble that
    she serves at neighborhood gatherings, always adding a pinch of curiosity to traditional comfort foods.
  core: Tina Burton blends curiosity and practicality, turning community service, gardening, and spontaneous road trips into a lively, slightly disorganized but warm‑hearted lifestyle.
background:
  cultural: Tina comes from a long‑standing European‑American family rooted in the Shenandoah Valley region, with ancestry primarily of German and Irish descent. Growing up in Dover, Pennsylvania during
    the post‑war era, she was raised with values of hard work, community service, and self‑reliance typical of small‑town Pennsylvania. Her cultural upbringing emphasizes close family ties, active church
    involvement, and a deep appreciation for local traditions such as county fairs, agricultural heritage, and seasonal festivals. While she respects these traditions, she remains open to new ideas and
    experiences, reflecting a blend of curiosity and practicality.
