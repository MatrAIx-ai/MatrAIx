  hobbies: '[''Sailing'', ''Coastal gardening'', ''Reading scientific biographies and history'', ''Mentoring high-school STEM students'', ''Birdwatching'', ''Model ship building'', ''Landscape photography'',
    ''Chess'', ''Yoga and meditation'']'
  career_goals: 'In his post-retirement phase, Zachary aims to transition from full-time sales management to selective consulting for small-to-mid-size technology firms, focusing on ethical and compassionate
    sales practices. He intends to launch a mentorship program that pairs senior sales professionals with emerging talent and at-risk high school students in the Palos Verdes community. He also plans to
    author a guide, ''Compassionate Selling: Practical Strategies for Sustainable Business'', and to establish a scholarship fund for local STEM undergraduates. Maintaining personal wellbeing is a priority;
    he seeks to incorporate mindfulness techniques into his daily routine and to champion stress-management workshops within the organizations he advises.'
