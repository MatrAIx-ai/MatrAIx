  hobbies: '["Gardening","Quilting","Reading Historical Fiction","Cooking","Birdwatching","Book Club Participation","Volunteering at the Community Center","Walking Prairie Trails"]'
  career_goals: Priya aims to deepen her impact as a mentor, developing a formal training program for new retail supervisors in her region. She hopes to advance to a district‑level manager role where she
    can influence multiple stores, champion modern retail technologies, and improve employee retention. Long‑term, she envisions a semi‑retirement consulting role, offering her practical expertise to small
    businesses while still staying connected to the local retail community.
