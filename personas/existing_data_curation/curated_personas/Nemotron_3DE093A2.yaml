personas:
  professional: Wilma Washington, a seasoned ATM and office‑equipment technician with over three decades of hands‑on experience, combines meticulous documentation, disciplined troubleshooting, and a curious
    appetite for emerging banking hardware to set rigorous service standards, while their reserved, competitive nature drives them to mentor junior staff through precise, structured training pathways.
  sports: Wilma Washington enjoys low‑impact fitness through early‑morning walks in their garden and occasional Pilates classes, avidly follows the Atlanta Falcons and Braves, and participates in a church‑sponsored
    softball league during the summer, balancing competitive spirit with disciplined routine.
  arts: Wilma Washington channels artistic energy into intricate quilts inspired by historic textile traditions, while evening listening sessions feature gospel legends like Mahalia Jackson and classic
    R&B icons such as Aretha Franklin, weaving cultural heritage into their creative leisure.
  travel: Wilma Washington prefers meticulously planned road trips that blend genealogy research with cultural immersion, revisiting ancestral towns along coastal Georgia, exploring Savannah’s historic
    districts, and scheduling a future pilgrimage to the National Museum of African American History and Culture in Washington, D.C., while balancing budget constraints.
  culinary: Wilma Washington delights in cooking soulful Southern fare—slow‑cooked collard greens seasoned with smoked turkey, crispy fried catfish, and peach cobbler—using fresh vegetables from their own
    garden, and they revel in the ritual of brewing sweet tea with a hint of fresh mint.
  core: Wilma Washington balances an analytical mind with a deep‑rooted sense of community, meticulously charting both circuit diagrams and family trees, yet often over‑worries about tomorrow’s service
    call, leading to late‑night espresso binges.
background:
  cultural: Wilma is a Black woman who grew up in the close-knit Black community of Liberty County, Georgia. The region's history of sharecropping, church-centered social life, and strong family ties shaped
    her values of self-reliance, discipline, and communal responsibility. Her upbringing included Saturday potlucks featuring soul food classics, Sunday gospel services, and storytelling sessions that connected
    her to a lineage of resilience and creativity. Though she completed only a high school education, she has built a respected career through hands-on skill and perseverance, reflecting the tradition of
    Black women in the rural South who turn practical expertise into economic stability. Wilma remains deeply connected to her cultural roots, honoring family traditions while navigating the modern demands
    of technology and service work.
attributes:
  skills: '[''ATM hardware troubleshooting'', ''Office machine repair'', ''Network configuration and testing'', ''Technical documentation and service logging'', ''Inventory management'', ''Quality control
    and compliance'', ''Data security basics for banking equipment'', ''Basic scripting for device reprogramming'', ''Preventive maintenance scheduling'']'
  hobbies: '[''DIY electronics projects'', ''Technical journal reading'', ''Vegetable gardening'', ''Quilting (traditional patterns)'', ''Small-group quilting circle'', ''Southern gospel and classic R&B
    listening'', ''Church Bible study'', ''Genealogy research'']'
  career_goals: Wilma aims to transition from a hands-on technician to a senior technical lead within the next two years, securing Certified ATM Technician (CAT) credentials and a regional supervisory role
    that lets her set service standards for multiple branches. She wants to design a formal mentorship program for junior repair staff, using her organized style to create clear training pathways while
    maintaining the competitive edge she values. Long-term, she hopes to launch a small, family-owned consulting firm that provides affordable ATM and office-equipment support to rural credit unions across
    South-East Georgia, allowing her to stay close to her community while applying the latest automated-banking technologies she is curious about.
