personas:
  professional: Aliciah Peterson is a seasoned construction laborer with over ten years of concrete mixing, heavy‑equipment operation, and crew coordination experience, who blends a practical, structure‑loving
    mindset with a flexible, people‑focused leadership style as they pursue foreman certification, a construction management degree, and a future family‑owned contracting firm.
  sports: Aliciah Peterson plays third base for the Hale County Lady Hawks in a local women's softball league, cheers on the Alabama Crimson Tide football team on Saturdays, follows the Birmingham Barons
    baseball season, and stays fit through neighborhood clean‑up projects and early morning runs along the river, balancing competitive spirit with community teamwork.
  arts: Aliciah Peterson finds artistic solace in gospel and blues classics by Aretha Franklin and B.B. King, sings karaoke renditions of soulful hits, devours romance novels by Nora Roberts, and paints
    tranquil landscapes inspired by Bob Ross, using these creative outlets to soothe anxiety and stay socially connected.
  travel: Aliciah Peterson enjoys budget‑friendly road trips to historic towns like Savannah and Nashville, weekend retreats to the Great Smoky Mountains and Gulf Shores for nature, and plans trips with
    a mix of spontaneity and careful budget tracking, often coordinating travel with their husband to accommodate family and church commitments.
  culinary: Aliciah Peterson is a proficient soul‑food cook who perfects fried catfish, slow‑cooked collard greens, and sweet potato pie, experiments with Cajun and Creole spice blends, sources fresh herbs
    from their garden, and loves sharing hearty dishes at church potlucks, though they occasionally over‑season a dish when stressed.
  core: Aliciah Peterson blends hands‑on construction expertise with a vibrant community spirit, balancing structured ambition and spontaneous creativity while navigating anxiety‑driven highs and lows.
background:
  cultural: Aliciah is a second‑generation African American from the Deep South. Raised in a close‑knit extended family in rural Alabama, she grew up immersed in church traditions, Southern soul food, and
    community solidarity. Her family’s stories of the Great Migration and the historic contributions of Black laborers in construction shape her pride and work ethic. She celebrates Juneteenth, honors her
    ancestors’ resilience, and draws cultural strength from gospel music, blues heritage, and local storytelling. Living in Moundville, she also feels a connection to the region’s rich archaeological history
    and the enduring spirit of her neighbors, which informs her commitment to building homes that serve her community.
attributes:
  skills: '["Concrete mixing and pouring", "Site preparation and grading", "Demolition work", "Backhoe operation", "Forklift operation", "Reading construction drawings", "OSHA safety compliance", "Material
    inventory management", "Crew coordination", "Mentoring new workers", "Basic construction budgeting", "Project documentation"]'
  hobbies: '["Church choir singing", "Community potlucks", "Women’s softball league", "Neighborhood clean‑up volunteering", "Southern cooking", "Gardening", "Evening walks by the Black Warrior River", "Listening
    to gospel and blues music", "Karaoke", "Reading romance novels", "Landscape painting"]'
  career_goals: She aims to move from laborer to foreman within the next three years, obtaining certification as a construction site supervisor and completing a bachelor's degree in construction management.
    Her long‑term ambition is to co‑found a small, family‑owned contracting firm with her husband, focusing on affordable housing projects in Hale County. She also hopes to develop stronger leadership skills,
    secure a stable income to support her family, and eventually mentor more women and minorities entering the trades.
