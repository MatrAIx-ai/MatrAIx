  hobbies: '["Salsa dancing", "Cooking Cuban cuisine", "Pickup soccer", "Gym workouts", "DIY electronics tinkering", "Mindfulness meditation", "Journaling", "Reading technology articles", "Watching documentaries",
    "Volunteering at community festivals"]'
  career_goals: Julio aims to advance from a production worker to a supervisory role within the next three to five years. He plans to earn certifications such as OSHA Forklift Operator, Certified Production
    Technician, and Lean Six Sigma Yellow Belt to bolster his credentials. His goal is to lead a shift, drive continuous improvement projects, and eventually transition into production management or operations
    planning. To support this trajectory, he intends to pursue an associate degree in industrial technology while continuing to develop his leadership and analytical abilities.
