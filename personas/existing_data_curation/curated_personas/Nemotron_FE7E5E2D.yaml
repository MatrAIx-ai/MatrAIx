personas:
  professional: Fortunato Brooks is a retail supervisor who blends a routine‑driven work ethic with a hands‑on technical skill set, using Excel‑based analytics to trim inventory waste while energizing front‑line
    staff as the talkative hub of the store, and they eye a promotion to store manager along with a future MBA.
  sports: Fortunato Brooks plays pickup basketball at the local community center and is a regular cheer for the Michigan Wolverines football team, while also rooting for the Detroit Pistons, balancing a
    social approach to fitness with weekly games in an adult rec league and occasional weekend runs with friends.
  arts: Fortunato Brooks fuels their weekends with classic rock icons like Led Zeppelin, The Rolling Stones, and AC DC while tuning into business podcasts such as "How I Built This", and they occasionally
    unwind with retro video‑game soundtracks from the SimCity series, using music as the soundtrack to their social gatherings.
  travel: Fortunato Brooks prefers spontaneous road‑trips with friends, having explored Chicago’s deep‑dish scene, a weekend music festival in Austin, Texas, and a long drive up to Niagara Falls, while
    dreaming of an adventure to New Zealand’s South Island, balancing a modest travel budget with a love for local cuisine and roadside barbecues.
  culinary: Fortunato Brooks boasts a solid grilling skill set, regularly mastering dishes like BBQ pork ribs, smoked chicken wings, and grilled steak, while also whipping up mac and cheese and fish tacos
    for crowd‑pleasing barbecues, and they relish the sizzle of the grill accompanied by classic‑rock playlists featuring The Who.
  core: Fortunato Brooks is a sociable, routine‑loving retail leader who balances pragmatic money habits with a love for classic rock, basketball, and spontaneous barbecues, all while juggling a penchant
    for DIY projects and a drive toward future management.
background:
  cultural: Fortunato grew up in Ypsilanti, Michigan, in a middle‑class family of European descent with deep roots in the Midwest. The region's historic ties to the automotive industry and its proximity
    to the University of Michigan fostered a practical, results‑oriented outlook. Midwestern cultural traits—politeness, a strong work ethic, community involvement, and a preference for routine—are evident
    in his daily life. He maintains close family connections, participates in local community events, and values straightforward, no‑nonsense communication typical of the area.
attributes:
  skills: '["Team leadership", "Retail operations management", "Inventory control", "POS system operation", "Customer service excellence", "Effective communication", "Conflict resolution", "Data analysis
