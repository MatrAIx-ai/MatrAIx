  hobbies: '["Playing basketball", "Attending Michigan Wolverines football games", "Participating in trivia nights", "Car maintenance and restoration", "Cooking and hosting barbecues", "Listening to classic
    rock and podcasts", "DIY home improvement projects", "Video gaming (simulation games)", "Volunteering at local food bank", "Gym workouts"]'
  career_goals: Fortunato aims to become a store manager within the next two years, leveraging his routine‑driven approach to establish clear standard operating procedures. He plans to pursue an MBA part‑time
    to blend his technical background with advanced business strategy. In the longer term, he envisions moving into regional retail operations management or launching his own boutique retail concept that
    emphasizes data‑driven merchandising and strong team culture. He also hopes to mentor younger employees and become an active member of the local Chamber of Commerce.
