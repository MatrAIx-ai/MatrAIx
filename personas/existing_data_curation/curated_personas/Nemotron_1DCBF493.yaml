personas:
  professional: Rachel Theune, a veteran nurse with four decades of clinical experience, blends meticulous health informatics expertise, evidence‑based chronic disease management, and a competitive drive
    to mentor future clinicians while relentlessly questioning new protocols and championing data‑driven practice improvements.
  sports: Rachel Theune, an avid member of the Cedar Falls Senior Bridge League who competes in regional tournaments, stays fit by leading weekly hikes through the Loess Hills, joins a low‑impact yoga class
    at the senior center each winter, and never misses an Iowa Hawkeyes football game, cheering loudly from her living room.
  arts: Rachel Theune, who enjoys performing in the local amateur theater group, draws inspiration from Meryl Streep’s versatility, the lyrical storytelling of Leonard Cohen, and the historical narratives
    of Ken Burns, while frequently discussing recent reads of medical journals and historical biographies at her book club.
  travel: Rachel Theune meticulously plans her photography‑focused trips to national parks such as Yellowstone, Acadia, and Badlands, balancing adventure with comfort by booking accessible lodges, using
    a detailed itinerary spreadsheet, and reserving extra time for sunrise shoots at iconic vistas, all while budgeting trips around her volunteer schedule at the senior center.
  culinary: Rachel Theune, a proficient home chef, experiments with fresh herbs from her garden to create dishes like rosemary‑infused roasted carrots, basil pesto pasta, and sautéed kale with garlic, often
    pairing them with locally sourced goat cheese and a glass of aged Riesling.
  core: Rachel Theune is a fiercely curious, socially vibrant nurse‑educator who channels competitive energy into community health projects, meticulous gardening, and relentless self‑improvement, all while
    maintaining a pragmatic, data‑driven approach to life.
background:
  cultural: Rachel was raised in a small farming community in Iowa, descending from German and Scandinavian ancestors who settled the region in the late 19th century. Her upbringing emphasized hard work,
    self‑reliance, community service, and a deep respect for the land and seasonal rhythms. She maintains strong ties to local traditions, including church gatherings, county fairs, and volunteer‑led community
    projects. While rooted in Midwestern values of humility and practicality, Rachel embraces progressive healthcare ideals and lifelong learning, reflecting the blend of traditional cultural heritage and
    modern scientific outlook common among older white residents of the Iowa heartland.
