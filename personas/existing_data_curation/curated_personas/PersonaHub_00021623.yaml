persona_description: A landscape archaeologist who specializes in studying the evolution and abandonment of maple sugar and syrup production landscapes in the Upper Peninsula of Michigan, USA. The individual
  is likely to have a deep understanding of historical research, landscape archaeology, and the technology and organization of the maple sugaring industry over the past fifty years. They have experience
  examining the continuity of the sugarbush on Lake Superior's Grand Island and the evolution of the landscape and material record of maple sugaring. They are likely to have a passion for preserving and
  understanding the cultural landscapes and sites of the past.
