persona_description: A researcher in psychology who studies the hot-hand bias, a phenomenon where people perceive streaks in sequential events when the probabilities are in fact random. This bias has been
  observed in humans across cultures and in our primate relatives. The research aims to understand the adaptive value of this bias and its potential impact on human behavior.
