  hobbies: '[''Visiting art galleries and street mural tours'', ''Attending live music and open-mic nights'', ''Participating in improv theater workshops'', ''Skateboarding and bike riding around town'',
    ''Coffee shop hopping and latte art experimentation'', ''Street photography'', ''Hosting game nights and trivia contests with friends'', ''Thrifting vintage clothing and accessories'', ''Reading contemporary
    fiction and graphic novels'', ''Digital illustration and graphic design experiments'', ''Volunteering at community art events'']'
  career_goals: Vera plans to earn her GED within the next year and then enroll in a community‑college program in Business Administration or Visual Arts. Her short‑term ambition is to move into a supervisory
    role as a shift lead or assistant manager at her current retailer, where she can apply her competitive drive to meet sales targets. Long‑term, she hopes to open a boutique‑style shop or pop‑up space
    that showcases contemporary local art, sustainable fashion, and handmade accessories—leveraging her love of creativity and her knack for trend spotting. Alongside retail goals, Vera wants to develop
    a freelance street‑photography portfolio that documents Brockton’s evolving art scene and could serve as a springboard for a future career in visual storytelling.
