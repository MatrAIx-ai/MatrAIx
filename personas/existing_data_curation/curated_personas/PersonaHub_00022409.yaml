persona_description: A geoscientist who specializes in the study of tectonic processes, particularly the mapping and detection of active fault lines. The individual has developed a technique using airborne
  LiDAR to virtually deforest mountainous regions and reveal the traces of active faults, which can help in identifying earthquake-prone areas and assessing the potential seismic hazard. The individual
  has made the first ever use of this technique in Europe and has demonstrated its effectiveness in mapping active fault systems in Slovenia.
