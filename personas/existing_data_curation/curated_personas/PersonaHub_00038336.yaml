persona_description: A technologically savvy higher education professional who is interested in the integration of new technologies in education, particularly in the context of distance education, open
  learning, digital discourses, online classes, electronic document, and podcasting. This individual is familiar with the use of various educational technologies, including the blackboard, and has experience
  in using them in higher education. They are also aware of the potential benefits and drawbacks of these technologies, and are interested in exploring the ways in which they can be used to enhance teaching
  and learning. This persona is likely to be a technologist or a technologist in training, and is interested in the latest developments in technology and its impact on education.
