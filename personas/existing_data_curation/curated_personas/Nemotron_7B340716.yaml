personas:
  professional: Miguel Rosariotorres, a 17‑year‑old budding illustrator and graphic designer, blends street‑inspired sketching with digital tools like Krita and Canva, turning spontaneous murals into a
    growing freelance portfolio while juggling high school coursework with a laid‑back, sometimes disorganized, approach.
  sports: Miguel Rosariotorres, an avid skateboarder who frequents the downtown skate park, also cheers on the El Paso Chihuahuas baseball team and the Texas Rangers, and joins a casual pickup basketball
    group at the community center every Saturday, balancing a love for street‑style sport with local team loyalty.
  arts: Miguel Rosariotorres, a dedicated sketcher and digital illustrator, draws inspiration from the vibrant murals lining his city’s streets while listening to a playlist that weaves together regional
    folk ballads with indie rock from Arctic Monkeys and The Strokes, and frequently cites graphic novels like "Saga" and the works of street artist Banksy as fuel for his own narrative‑driven art.
  travel: Miguel Rosariotorres, who prefers spontaneous road trips over meticulous itineraries, spends weekends exploring the nearby Guadalupe Mountains National Park and the historic downtown of Santa Fe,
    while dreaming of a future backpacking adventure through the ancient ruins of Machu Picchu and the mural‑rich neighborhoods of Oaxaca, all within the constraints of a teen budget and family approvals.
  culinary: Miguel Rosariotorres, an enthusiastic home cook, masters family‑favored dishes like carne asada tacos, homemade salsa verde, and churro‑style cinnamon doughnuts, boasting a decent level in the
    kitchen that blends trial‑and‑error seasoning with a love for bold, spicy flavors, though they often forget to clean up the stovetop after late‑night cooking sessions.
  core: Miguel Rosariotorres, a curious yet laid‑back 17‑year‑old artist, turns fleeting city moments into sketches, lives on a soundtrack of folk and indie tunes, and balances a love for spontaneous creativity
    with a habit of misplacing deadlines and sketchbooks.
background:
  cultural: Miguel is a second‑generation Mexican‑American living in El Paso, Texas. His parents emigrated from the state of Jalisco, and Spanish is spoken at home alongside English, giving him a bicultural
    fluency. He grew up immersed in Mexican traditions such as Día de los Muertos, quinceañeras, and family gatherings centered around tacos, pozole, and tamales. The border city’s blend of American and
    Mexican influences is evident in his daily life, from the bilingual signage he sees to the Chicano street art that decorates his neighborhood. This cultural tapestry shapes his identity, infusing his
    artistic interests with a deep appreciation for heritage, community, and the stories of the borderland.
