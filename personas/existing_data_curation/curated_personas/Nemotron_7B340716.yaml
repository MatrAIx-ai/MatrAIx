  career_goals: Miguel dreams of turning his passion for art into a career. He plans to build a strong portfolio of sketches, murals, and digital designs to apply for a community college art program or
    a vocational graphic design certificate. He hopes to work as a freelance illustrator or graphic designer for local businesses and cultural organizations. Long‑term, he wants to create public murals
    that celebrate Mexican‑American heritage on the El Paso border, and eventually run workshops that teach other youth how to express themselves through art.
