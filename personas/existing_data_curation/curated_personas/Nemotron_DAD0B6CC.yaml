  career_goals: Although still five, Lynwood frequently talks about wanting a job that follows a clear routine and helps others. He imagines becoming a firefighter, drawn to the predictable drills and the
    chance to protect his community, or a farmer like his family, where everyday tasks are structured and teamwork is essential. He also likes animals and sometimes says he would love to be a veterinary
    assistant to care for pets.
