personas:
  professional: A future engineer in the making, Albert Coker channels their love for structured LEGO construction into early problem‑solving play, they demonstrate a practical mindset, diligent attention
    to detail, and a competitive drive to out‑build peers.
  sports: A spirited young athlete, Albert Coker dribbles the ball for the Maple Street Kids Soccer Club, they compete fiercely at weekend matches, and they watch FC Barcelona with the same competitive
    zeal, embodying a balance of structured training and spontaneous park play.
  arts: An enthusiastic budding artist, Albert Coker fills sketchbooks with bright, Dr. Seuss‑inspired doodles, they sing along to Raffi’s "Baby Beluga," curate sticker collections featuring Marvel heroes,
    and eagerly re‑read Magic Tree House books by Mary Pope Osborne, channeling their structured imagination into vivid creative projects.
  travel: A curious little explorer, Albert Coker loves making sticker‑filled checklists for family road trips to the local aquarium, they proudly recall a magical weekend at Disneyland, and they day‑dream
    about seeing the Eiffel Tower in Paris, balancing their preference for predictable itineraries with occasional spontaneous detours.
  culinary: A budding food enthusiast, Albert Coker enjoys pepperoni pizza slices with extra cheese, they craft LEGO‑shaped sandwich bites, mix banana‑strawberry smoothies, and, while still mastering basic
    kitchen tasks, they insist on sprinkling cheddar over everything, occasionally sneaking extra gummy bears despite parental reminders.
  core: Albert Coker blends a love for perfectly ordered LEGO builds with a competitive spark on the soccer field, they hoard stickers like treasure, meticulously track allowance in a piggy bank, yet they
    often forget to brush teeth after late‑night gummy bears, embodying a charming mix of discipline and childlike mischief.
background:
  cultural: Albert comes from a white, middle‑class family in the suburban community of North Aurora, Illinois. His family’s heritage includes German and Irish roots, common among many residents of the
    area. He attends a local public elementary school and participates in community activities such as the neighborhood soccer league and the town’s Fourth of July fireworks. Family traditions include Thanksgiving
    dinners, church visits on Sundays, and seasonal celebrations that emphasize togetherness, practicality, and respect for schedules. The Midwestern values of friendliness, reliability, and a love for
    organized community events shape his everyday life.
