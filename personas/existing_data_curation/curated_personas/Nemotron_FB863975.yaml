  career_goals: Albert often talks about building things when he grows up. He dreams of becoming a civil engineer or architect who designs bridges and houses, admiring the clear steps and structured plans
    involved. He also looks up to local firefighters, imagining a future where he can help people in emergencies, and occasionally envisions himself as a professional soccer player, reflecting his competitive
    spirit and love for teamwork.
