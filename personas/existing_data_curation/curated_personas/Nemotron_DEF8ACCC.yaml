personas:
  professional: Keondria Evans, a 53-year-old payroll maestro in Houston, leverages 25 years of expertise with ADP Workforce Now, Paychex, and QuickBooks Payroll, and deep Excel macro skills to drive error-free
    compliance audits while mentoring junior staff, and they are on track to earn their CPP and lead a data-driven payroll team.
  sports: Keondria Evans enjoys low-impact fitness like weekend yoga classes and weekday morning walks while cheering on the Houston Rockets and Astros, and they play casual mixed-double tennis at the community
    center as a way to stay active without overwhelming their schedule.
  arts: Keondria Evans translates the syncopated beat of John Coltrane and the street murals of Houston into abstract canvases, regularly reads speculative fiction by authors like N.K. Jemisin, writes poetry
    inspired by Langston Hughes, and captures chiaroscuro cityscapes with a Canon EOS, often citing Vivian Maier and Ansel Adam as visual influences, and they find the visual rhythm of the city fuels their
    poetic meter.
  travel: Keondria Evans prefers meticulously planned road trips that blend culture and cuisine, having explored New Orleans for its jazz heritage, spent a weekend in Santa Fe admiring Southwest art, and
    dreaming of a future pilgrimage to Marrakech's vibrant souks, all while they balance family commitments that limit longer vacations.
  culinary: Keondria Evans, an avid rooftop herb gardener, enjoys cooking modern twists on classic soul-food dishes such as smoked collard greens with quinoa, black-eyed pea souffle, and their signature
    spicy honey-glazed chicken, often seasoning with fresh thyme, lemongrass, and smoked paprika, while their cooking skill hovers between enthusiastic home chef and experimental artist, and they love to
    improvise flavors like a jazz solo.
  core: Keondria Evans fuses meticulous payroll precision with a vivid artistic soul, navigating numbers and canvases alike while they quietly mentor others and savor life's rhythmic nuances.
background:
  cultural: Keondria grew up in Houston’s historic Third Ward, a tight‑knit African‑American neighborhood where church gatherings, family reunions, and block parties were central to community life. The
    rich traditions of Southern soul food, gospel music, and oral storytelling shaped her appreciation for culture and resilience. Her family emphasized education, mutual support, and perseverance, values
    that helped her navigate divorce and maintain emotional stability. Living in a multicultural city, she has absorbed influences from Hispanic, Creole, and Caribbean cultures that flourish in Houston,
    while staying connected to her African‑American heritage through participation in local cultural festivals, church choirs, and community activism.
attributes:
  skills: '[''Payroll processing'', ''Timekeeping management'', ''ADP Workforce Now'', ''Paychex'', ''QuickBooks Payroll'', ''Texas labor law compliance'', ''Wage tax filing'', ''Benefits administration'',
