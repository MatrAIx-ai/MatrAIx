  hobbies: '[''Abstract painting'', ''Reading speculative fiction'', ''Writing poetry'', ''Photography'', ''Urban gardening'', ''Cooking modern soul food'', ''Puzzle solving (Sudoku, crosswords)'', ''Attending
    jazz concerts'', ''Visiting art museums'', ''Volunteering teaching computer basics'']'
  career_goals: Keondria aims to earn the Certified Payroll Professional (CPP) credential within the next two years and transition into a senior payroll supervisor role at a larger organization. She wants
    to lead a team that modernizes payroll operations through automation and data analytics, cutting processing time and error rates. Mentoring younger employees—especially those from underrepresented backgrounds—is
    a core ambition, as is building a diverse talent pipeline. As she approaches retirement, she envisions launching a boutique consulting practice to help small Houston businesses navigate payroll compliance
    and optimize their processes.
