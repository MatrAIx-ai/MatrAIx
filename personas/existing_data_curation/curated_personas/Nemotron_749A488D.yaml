  career_goals: Jennifer aims to move from on‑site flagging to a strategic role in traffic safety planning. She plans to earn the Certified Traffic Control Technician (CTCT) credential and enroll in a part‑time
    Master’s program in Urban Planning focused on pedestrian safety. Her long‑term ambition is to become a Traffic Safety Program Manager for Cook County, leading data‑driven safety initiatives, integrating
    community‑based art projects into safety campaigns, and training the next generation of flaggers. She also hopes to develop a nonprofit outreach program that pairs road‑safety education with creative
    workshops for widowed or single‑parent families.
