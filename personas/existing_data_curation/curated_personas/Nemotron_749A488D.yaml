personas:
  professional: Jennifer Sanders, a diligent crossing guard and flagger in Cook County, blends their STEM background with a methodical, imaginative mindset to design data‑driven safety signage, conduct
    real‑time risk assessments, and mentor new flaggers, while diligently pursuing their Certified Traffic Control Technician credential and a part‑time master’s in Urban Planning.
  sports: Jennifer Sanders supports the Chicago Cubs and follows the Chicago Bulls, participates in the Chicago Road Runners Club’s weekend jogs, and occasionally joins community fitness boot camps, balancing
    a love for gentle yoga on the balcony with the occasional jog to clear the mind after a stressful shift.
  arts: Jennifer Sanders spends evenings painting watercolors of the city skyline, sketches abstract concepts inspired by Kandinsky, plays piano pieces by Ludovico Einaudi to unwind, creates macramé wall
    hangings and candles, and regularly visits exhibitions featuring contemporary artists like Yayoi Kusama while attending productions at the Goodman Theatre.
  travel: Jennifer Sanders plans trips with the precision of a traffic planner, favoring meticulously mapped road trips to places like Asheville’s River Arts District, the dark skies of Iceland’s Þingvellir
    National Park for astrophotography, and weekend getaways to Chicago’s nearby Starved Rock State Park, while budgeting each adventure through a custom spreadsheet.
  culinary: Jennifer Sanders enjoys cooking with fresh herbs from their balcony, frequently preparing rosemary‑lemon grilled chicken, homemade pesto pasta, and aromatic lavender tea, and delights in experimenting
    with Mediterranean dishes such as Greek salad with feta and olives, while occasionally indulging in comfort food like mac and cheese when stress peaks.
  core: Jennifer Sanders is an organized, creatively driven traffic safety enthusiast who channels their imagination into art and community projects, yet wrestles with persistent worry and a tendency to
    over‑schedule every facet of life.
background:
  cultural: Jennifer was raised in a mid‑western suburb of Chicago, in a family of German‑Irish ancestry that valued community involvement, modesty, and a strong work ethic. Growing up in the 1990s, she
    experienced the rise of personal computers, sparking her curiosity in STEM fields. Local traditions such as neighborhood block parties, church gatherings, and seasonal festivals fostered her sense of
    belonging and civic responsibility. The region’s emphasis on public safety and municipal services influenced her decision to pursue a career protecting pedestrians, while the artistic heritage of the
    area—museums, theater, and community art projects—nurtured her imaginative side.
