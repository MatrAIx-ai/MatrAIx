personas:
  professional: Mei Cao, a budding robotics enthusiast, combines their love for LEGO Mindstorms programming with a methodical approach to problem‑solving, dreaming of one day designing autonomous drones
    while leading school debate and drama clubs to sharpen presentation skills.
  sports: Mei Cao, a member of the local youth soccer league, frequently cheers on the Dallas Cowboys and the Texas Rangers, and spends weekend afternoons hiking the rugged trails of the Texas Hill Country
    with a neighborhood climbing club, balancing team sport dynamics with solo exploration.
  arts: Mei Cao enjoys playing piano pieces ranging from Beethoven’s Moonlight Sonata to traditional folk melodies passed down in their family, while also drawing inspiration from Pixar short films and
    the music of Ludovico Einaudi, often integrating these influences into animated videos they edit after school.
  travel: Mei Cao prefers road trips that blend nature photography with cultural immersion, having documented the wildflower trails of Enchanted Rock and dreaming of a future visit to the historic streets
    of Savannah, Georgia, while always planning itineraries on a shared family Google Doc.
  culinary: Mei Cao’s palate favors a mix of Tex‑Mex flavors—spicy chicken enchiladas and smoked brisket tacos—paired with comfort foods like homemade steamed dumplings and stir‑fried noodle bowls, and
    they experiment with these recipes on a modestly equipped kitchen counter, often filming the process for their blog.
  core: Mei Cao is a curiosity‑driven teen who orchestrates robotics projects, piano recitals, and community tutoring with a meticulous schedule, yet occasionally overcommits, leaving a half‑finished LEGO
    set on their desk as a reminder of their relentless ambition.
background:
  cultural: Mei is a second‑generation Chinese American whose parents immigrated from Guangdong province. Mandarin is spoken at home alongside English, and she celebrates Lunar New Year and the Mid‑Autumn
    Festival with family traditions such as dumpling making, calligraphy, and attending local dragon dances in San Antonio’s Chinatown enclave. The blend of Chinese heritage and Texan culture shapes her
    daily life—she enjoys Tex‑Mex cuisine, participates in community Spanish‑language festivals, and is familiar with bilingual signage throughout Bexar County. Her cultural identity is rooted in a strong
    emphasis on education, respect for elders, and community harmony, values that reinforce her organized, cooperative, and sociable personality.
