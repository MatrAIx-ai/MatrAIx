  career_goals: Mei aspires to combine her love for science with a desire to help people. In the long term she hopes to become a biomedical researcher or a physician who can develop affordable health solutions
    for her community. She is also drawn to science communication, envisioning a future as a bilingual science journalist or creator of educational videos for other young learners. In the near future, she
    aims to win her school’s science fair, secure a mentorship with a local university’s STEM program, and earn a leadership position in the student council to further develop her organizational and public‑service
    skills.
