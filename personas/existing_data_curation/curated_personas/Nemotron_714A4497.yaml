personas:
  professional: Gigi Jones is a versatile vocalist and songwriter who blends contemporary pop with Appalachian folk, leveraging meticulous setlist planning, stage‑logistics expertise, and a gregarious stage
    presence, while their structured, reliability‑driven mindset ensures every gig runs smoothly despite occasional anxiety‑driven last‑minute doubts.
  sports: Gigi Jones fuels their fitness routine with weekend hikes on the Great Smoky Mountains trails, membership in the Knoxville Trail Runners club, and a casual devotion to the Tennessee Volunteers
    basketball team and Nashville Predators hockey, balancing adventurous mountain trekking in summer with indoor yoga sessions in winter to maintain holistic wellness.
  arts: Gigi Jones immerses themselves in the arts by performing original songs inspired by folk legends like Gillian Welch and Rhiannon Giddens, reading historical novels by Hilary Mantel, attending performances
    at the Tennessee Performing Arts Center, and curating playlists that juxtapose contemporary pop icons such as Adele with Appalachian fiddle tunes, letting these eclectic influences shape their songwriting
    narrative.
  travel: Gigi Jones plans travel with meticulous itineraries, favoring nature‑focused escapes like a sunrise hike on the Blue Ridge Parkway, a weekend music retreat in Asheville’s Folk Art Center, and
    future aspirations to explore the volcanic landscapes of Iceland while balancing family responsibilities that limit extended trips abroad.
  culinary: Gigi Jones, an avid home chef, masterfully prepares Southern staples such as smoked brisket, shrimp and grits, and heirloom tomato gazpacho, often seasoning dishes with fresh basil, thyme, and
    a dash of cayenne, while they balance experimental fermentation projects with comfort cooking for their dinner gatherings.
  core: Gigi Jones is a meticulously organized, sociable musician whose relentless schedule, anxiety‑driven perfectionism, and love for garden‑grown flavors create a vibrant yet sometimes frazzled tapestry
    of life.
background:
  cultural: Gigi grew up in a middle‑class family in the Knoxville suburbs, surrounded by the rolling hills of East Tennessee. Her family’s cultural roots are largely Anglo‑American, with a strong emphasis
    on Southern hospitality, community church involvement, and intergenerational storytelling. From an early age she sang in the church choir and participated in school music programs, absorbing the region’s
    blend of Appalachian folk, country, and gospel traditions. While attending the University of Tennessee, she broadened her horizons with courses in literature, philosophy, and world music, which deepened
    her appreciation for diverse artistic expressions. Today, Gigi identifies with the contemporary Southern creative community, valuing both the region’s heritage and a collaborative, inclusive ethos.
