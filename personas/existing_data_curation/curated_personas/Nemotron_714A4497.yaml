  career_goals: Gigi aims to record and release a full-length album that blends contemporary pop with Appalachian folk, showcasing her vocal range and original songwriting. She hopes to tour the Southeast,
    performing at festivals and intimate venues while building a loyal fan base. Long‑term, she aspires to open a community music studio in Knoxville where local artists can rehearse and record, and to
    develop workshops that combine music and mental‑health awareness. She also envisions mentoring young singers, leveraging her organizational skills to create structured programs that nurture talent and
    foster supportive environments.
