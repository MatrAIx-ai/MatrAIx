  career_goals: Annie aims to transition from a sales associate to a leadership role within the retail sector, focusing on technology‑focused stores where her STEM background adds value. In the next two
    years she plans to become a department manager, and within five years she targets a store manager position, eventually progressing to a regional manager overseeing multiple locations in the Pacific
    Northwest. To support these goals she intends to earn a retail management certification and complete an associate program in supply chain logistics. Long‑term, she dreams of launching an e‑commerce
    boutique that curates tech‑enhanced home goods, and she hopes to mentor other women pursuing careers that blend retail and technology.
