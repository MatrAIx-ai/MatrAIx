personas:
  professional: An ambitious retail professional, Annie Thies leverages her STEM background, data‑driven merchandising, and outgoing demeanor to transform tech‑focused store sections into community hubs,
    while they balance meticulous inventory control with flexible problem‑solving and aim to rise from sales associate to regional manager within five years.
  sports: Annie Thies plays forward in a co‑ed recreational soccer league, cycles the Centennial Trail, hikes Riverside State Park, and cheers on the Spokane Chiefs and Seattle Seahawks, while they incorporate
    interval training and weekend group runs to stay fit and maintain their energetic lifestyle.
  arts: Annie Thies immerses in Spokane’s vibrant arts scene by attending live shows featuring Brandi Carlile and The Donnini Brothers, explores indie film screenings at the Fox Theater, and expresses creativity
    through 3D‑printed accessories and Arduino‑driven light installations, which they view as extensions of their maker spirit.
  travel: Annie Thies enjoys planning weekend getaways with a blend of spreadsheets and spontaneous detours, favoring trips to the Columbia River Gorge, Oregon’s coast, and a recent adventure to Patagonia’s
    treks, while they dream of exploring Japan’s rural sustainability projects, balancing adventure with the practical constraints of a steady retail career.
  culinary: Annie Thies cooks seasonal farm‑to‑table meals such as roasted beet and kale salad with goat cheese, hand‑crafted sourdough using locally milled wheat, and quinoa‑stuffed squash, showcasing
    solid culinary skills while they occasionally indulge in Spokane’s craft beer scene and experiment with smoked salmon tacos.
  core: Annie Thies blends a nature‑rooted, pragmatic outlook with tech curiosity, managing a retail career, community volunteering, and a hobbyist maker life, all while never missing a Saturday hike or
    a soccer match, even if it means occasionally forgetting to water their garden.
background:
  cultural: Annie grew up in a middle‑class White American family in the Pacific Northwest, where a mix of self‑reliance, appreciation for nature, and community involvement shaped her values. Spokane’s
    cultural fabric—characterized by a pragmatic work ethic, a collaborative spirit, and a growing emphasis on sustainability—has influenced her outlook. Family traditions include holiday gatherings with
    extended relatives, celebrating local harvest festivals, and volunteering for community clean‑up events. While she identifies with broader American cultural narratives, she also embraces the progressive,
    environmentally conscious mindset common in her region.
