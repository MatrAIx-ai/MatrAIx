personas:
  professional: At 41, experienced residential painter and decorative mural artist Lourdes Vivero combines meticulous low‑VOC paint application, drywall repair expertise, and a keen eye for color theory
    with a passion for eco‑friendly, custom interior art, leveraging her methodical planning and assertive client communication to build a woman‑owned sustainable business.
  sports: At 41, a dedicated fitness enthusiast, Lourdes Vivero jogs the Sierra foothills each weekend, participates in a local community yoga class, cheers for the Sacramento Kings during NBA season, and
    supports the Fresno State Bulldogs baseball team, while occasionally joining a weekend recreational soccer league with the Farmersville Fire Club.
  arts: At 41, passionate about visual storytelling, Lourdes Vivero paints in acrylic and oil inspired by the vibrant palettes of flamenco festivals and the works of Goya, Picasso, and contemporary filmmaker
    Pedro Almodóvar, frequently visits the Fresno Art Museum and the Crocker Art Museum, and enjoys listening to Paco de Lucía’s guitar while sketching.
  travel: At 41, an adventurous yet budget‑conscious traveler, Lourdes Vivero has explored the historic streets of Seville during Feria de Abril, hiked the trails of the Sierra Nevada, dreams of a solo
    pilgrimage to the Camino de Santiago, and prefers road trips to nearby California wine regions like Paso Robles for weekend getaways.
  culinary: At 41, an avid home chef, Lourdes Vivero expertly prepares paella with saffron, rabbit, and chorizo, crafts tapas such as patatas bravas and gambas al ajillo, enjoys experimenting with gazpacho
    variations using heirloom tomatoes, and often incorporates home‑grown rosemary and oregano from her garden, though she sometimes over‑spices dishes in her quest for authentic flavor.
  core: At 41, Lourdes Vivero is a methodical, art‑driven painter‑entrepreneur who balances eco‑conscious business ambitions with a love for vibrant cultural traditions, while wrestling with stress‑induced
    worry and a penchant for meticulous planning.
background:
  cultural: Lourdes comes from a Spanish‑heritage family that maintains strong ties to its Andalusian roots. She grew up speaking both Spanish and English, celebrating traditions such as Semana Santa, Feria
    de Abril, and family gatherings centered around flamenco music and shared meals. The taste of paella, gazpacho, and churros remains a comforting reminder of her cultural lineage. While living in the
    rural community of Farmersville, California, she blends these traditions with the local agricultural lifestyle, participating in church festivals and community events that reflect the broader Hispanic
    culture of Tulare County. This bicultural upbringing nurtured her appreciation for vibrant colors, storytelling through art, and the importance of community, all of which influence her work and personal
    pursuits.
attributes:
  skills: '["Interior painting", "Wallpaper installation", "Surface preparation & repair", "Color theory and palette selection", "Customer estimation and quoting", "Project scheduling and management", "Safety
