  career_goals: Lourdes aims to transform her freelance work into a modest, woman‑owned painting and decorative‑mural business that emphasizes sustainable materials and bespoke art. She plans to obtain
    a professional painter certification and a LEED‑green building credential within the next two years. By expanding her service offerings to include custom interior murals and eco‑friendly paint consulting,
    she hopes to attract higher‑end residential clients and secure steady contracts. Lourdes also envisions mentoring a small group of apprentices from the local community, creating a pathway for skilled
    labor in Tulare County. Ultimately, she seeks a balanced career that provides financial stability, creative fulfillment, and reduced stress through efficient workflow systems and a clear boundary between
    work and personal time.
