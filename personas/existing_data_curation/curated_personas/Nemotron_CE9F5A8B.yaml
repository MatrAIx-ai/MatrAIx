  hobbies: '[''Visiting art galleries and museums'', ''Painting sumi‑e ink landscapes'', ''Calligraphy'', ''Cooking Asian cuisine'', ''Hiking coastal trails'', ''Landscape photography'', ''Reading contemporary
    literature'', ''Traveling to East Asia'', ''Meditation/yoga'', ''Volunteering at local arts festivals'']'
  career_goals: Yonghui aims to ascend to a senior leadership role such as Director of Strategic Insights, where she can shape the research agenda for multinational brands and champion culturally nuanced
    marketing strategies. She aspires to build a cross‑functional team that integrates art‑driven creativity with data‑centric decision‑making, positioning her organization at the forefront of trend forecasting.
    In the longer term, she envisions launching her own consultancy focused on East‑Asian consumer behavior and multicultural market entry, while also mentoring emerging analysts and publishing thought‑leadership
    pieces on the intersection of art, culture, and consumer trends.
