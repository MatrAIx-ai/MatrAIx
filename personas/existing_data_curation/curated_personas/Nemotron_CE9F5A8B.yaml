personas:
  professional: Yonghui Yang, a seasoned market research analyst with 20 years of experience, blends rigorous quantitative modeling with a curiosity for artistic trends, delivering data‑driven storytelling
    that fuels brand strategies while maintaining an organized yet flexible workflow.
  sports: Yonghui Yang, an avid hiker of the Bay Area’s coastal trails, captures sunrise landscapes with a DSLR, runs with the Bay Trail Runners club, and roots for the San Francisco Giants and Golden State
    Warriors, using fitness as both a mental reset and a competitive outlet.
  arts: Yonghui Yang, a regular visitor to SFMOMA and the Yerba Buena Center for the Arts, paints sumi‑e ink landscapes, practices calligraphy, and collects works by avant‑garde creators such as Yayoi Kusama
    and Ai Weiwei, integrating artistic contemplation into their analytical mindset.
  travel: Yonghui Yang, who meticulously plans trips to East Asian cultural hubs like Tokyo, Seoul, and Shanghai while leaving space for impromptu gallery openings, balances a desire for new ideas with
    a pragmatic budget that favors off‑season flights and boutique hostels.
  culinary: Yonghui Yang, an enthusiastic home chef, masters Sichuan mapo tofu and Cantonese dim sum using doubanjiang, chili oil, and fresh lotus leaf, yet often forgets to prep ingredients ahead of time,
    turning dinner prep into a spontaneous, aromatic experiment.
  core: Yonghui Yang, a data‑driven storyteller with a painter’s soul, navigates life by marrying analytical precision and artistic curiosity, while juggling a competitive streak and a habit of late‑night
    coffee marathons.
background:
  cultural: Yonghui is the daughter of first‑generation Chinese immigrants who settled in the Bay Area before her birth. Raised bilingually in Mandarin and English, she grew up celebrating traditional festivals
    such as Lunar New Year and the Mid‑Autumn Festival, while also embracing the multicultural vibrancy of California. Her undergraduate studies in Art History focused on East Asian visual culture, giving
    her a nuanced perspective on how heritage influences consumer preferences. This bicultural lens informs her professional work, allowing her to bridge Eastern aesthetic sensibilities with Western market
    dynamics, and contributes to her keen interest in culturally informed marketing strategies.
