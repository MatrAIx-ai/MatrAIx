personas:
  professional: Jose Guzman, a 19‑year‑old aspiring maintenance specialist, combines meticulous HVAC troubleshooting, basic carpentry, plumbing, and electrical repair skills with a strict adherence to safety
    checklists and documentation, positioning themselves for certification and a future lead‑technician role.
  sports: Jose Guzman, a disciplined runner, jogs five times a week along the Salem waterfront as a member of the Salem Striders running club, follows the Portland Timbers in soccer and the Oregon State
    Beavers during football season, and schedules weekly strength‑training sessions at the local gym to maintain a structured fitness regimen.
  arts: Jose Guzman, a meticulous model‑train collector, channels their love of precision into strategy video games like Civilization VI, unwinds to bachata and merengue playlists featuring artists such
    as Aventura and Juan Luis Guerra, and occasionally attends local theater productions of classic plays, reflecting their appreciation for both technical and rhythmic artistry.
  travel: Jose Guzman prefers well‑planned, budget‑conscious trips that balance exploration with a schedule, having taken weekend getaways to Portland, Seattle, and a road‑trip to Vancouver, they now dream
    of a European rail adventure through Spain and Italy to experience historic train routes, but their modest student budget and family responsibilities steer them toward affordable, purpose‑driven travel.
  culinary: Jose Guzman, an intermediate home chef, regularly prepares spiced rice and beans with fried plantains, grilled chicken marinated in garlic, cilantro, and lime, and a tangy tomato‑onion sauce,
    enjoying the ritual of chopping, seasoning, and plating, while also experimenting with occasional Asian stir‑fry dishes to expand their palate.
  core: Jose Guzman, a methodical 19‑year‑old with a penchant for order, balances their love of precise maintenance work, solitary hobbies, and careful budgeting, all while wrestling with occasional anxiety
    and a habit of over‑planning.
background:
  cultural: Jose is a first‑generation Dominican‑American raised in a bilingual household. He grew up speaking Spanish at home and English at school, preserving strong family ties and Catholic traditions.
    His family celebrates Dominican holidays such as Independence Day and the Patron Saint festivals, often preparing dishes like mangú and sancocho. While he values his Caribbean roots, he also embraces
    life in Salem, participating in local cultural events and maintaining connections with the Dominican diaspora in Massachusetts.
attributes:
  skills: '[''Basic Carpentry'', ''Plumbing Repairs'', ''Electrical Troubleshooting'', ''HVAC Maintenance'', ''Preventive Maintenance Scheduling'', ''Technical Manual Interpretation'', ''Safety Compliance'',
    ''Inventory Management'', ''Use of Diagnostic Tools'', ''Facility Documentation'']'
  hobbies: '[''Model Train Building'', ''Strategy Video Gaming'', ''Jogging'', ''Cooking Dominican Cuisine'', ''Listening to Bachata and Merengue'', ''Small Community Gatherings'']'
  career_goals: Jose aims to earn certifications in HVAC and industrial maintenance within the next two years, progress to a lead maintenance technician role, and eventually become a facility manager for
    a large residential property. He seeks stable, well‑structured employment that offers benefits, allowing him to support his family and contribute to his community while expanding his technical expertise.
