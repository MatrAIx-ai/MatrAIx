persona_description: A phylogeneticist who specializes in the analysis and reconstruction of evolutionary relationships among organisms or populations. They are skilled in using various methods such as
  maximum parsimony, distance methods, maximum likelihood, and Bayesian inference to build trees from data and assess their accuracy. They are also proficient in calculating evolutionary distances and assessing
  the strength and weaknesses of different methods. They are likely to be familiar with the Newick (shorthand) format for representing relationships and the most common methods for tree reconstruction,
  including neighbor joining and maximum likelihood. They may also be familiar with the concepts of monophyletic groups, paraphyletic groups, and polyphyletic groups, as well as the differences between
  true and inferred trees. They may have a background in molecular biology and have worked with quantitative and qualitative data.
