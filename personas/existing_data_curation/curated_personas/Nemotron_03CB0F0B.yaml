personas:
  professional: Sharon Gossom, a veteran teaching assistant and instructional support specialist, channels their disciplined, detail‑oriented mindset and curiosity for art into meticulously organized classroom
    management, data‑driven instruction, and innovative art‑based learning modules while competitively mentoring new assistants to raise instructional standards.
  sports: Sharon Gossom, a dedicated walker who logs weekly miles through Forest Park and participates in a small NYRR (New York Road Runners) walking group, follows the New York Knicks and New York Mets
    on television, and occasionally joins a low‑impact senior tennis league at Queens Community Center, viewing fitness as a disciplined, solitary ritual that suits their preference for solo activity rather
    than a competitive sport.
  arts: Sharon Gossom, an avid watercolorist who draws inspiration from the fluid brushwork of Claude Monet and the bold color palettes of Georgia O'Keeffe, regularly frequents MoMA, the Brooklyn Museum,
    and intimate Queens galleries to study works by contemporary artists such as Kehinde Wiley, and integrates this visual vocabulary into the art‑based lessons they design for youth.
  travel: Sharon Gossom, a measured traveler who favors culturally rich, low‑stress escapes, has explored New Orleans for its jazz and soul food, spent a week island‑hopping in the Dominican Republic to
    savor authentic Caribbean cuisine, and they prefer week‑long retreats to nearby Hudson Valley art festivals rather than hurried international tours.
  culinary: Sharon Gossom, a seasoned home cook with a penchant for Caribbean jerk chicken, scotch‑bonnet‑spiced plantains, and Southern soul‑food classics like collard greens simmered with smoked ham and
    buttery cornbread, often blends these flavors into original dishes while meticulously measuring spices, yet occasionally over‑salts a gravy in their quest for boldness.
  core: Sharon Gossom, a disciplined and curious 62‑year‑old whose life balances meticulous organization with a quietly competitive love for art, gardening, and strategic budgeting, and they sometimes let
    skepticism seep into new relationships while indulging in occasional over‑seasoned cooking experiments.
background:
  cultural: Sharon is a second‑generation African‑American who grew up in Queens after her parents moved north during the Great Migration from the rural South. Her family’s cultural roots blend Southern
    soul traditions, Caribbean influences from neighboring immigrant communities, and the vibrant multicultural tapestry of New York City. Raised during the civil‑rights era, she internalized a strong commitment
    to education, community service, and social justice. She regularly participates in church life, celebrates Juneteenth and Kwanzaa, and incorporates African‑American artistic expressions—such as jazz,
    gospel, and the visual arts—into her daily routines. The diversity of Kew Gardens and the broader Queens borough continues to shape her worldview and informs her inclusive approach to teaching and community
    engagement.
attributes:
  skills: '[''Classroom Management'', ''Curriculum Implementation Support'', ''Differentiated Instruction'', ''Special Education Assistance'', ''Data Collection and Assessment Analysis'', ''Educational
    Technology Integration (Google Classroom, PowerSchool)'', ''Art-Based Learning Facilitation'', ''Record Keeping and Documentation'', ''Parent and Guardian Communication'', ''Mentoring New Teaching Assistants'',
    ''Professional Development Planning'']'
  hobbies: '[''Watercolor Painting'', ''Visiting Art Museums and Galleries'', ''Reading Contemporary Non‑Fiction and Philosophy'', ''Small Book Club Participation'', ''Urban Balcony Gardening'', ''Cooking
    and Experimenting with Ethnic Recipes'', ''Walking in Forest Park and Local Neighborhoods'', ''Solving Crossword Puzzles'', ''Volunteering as an Art Mentor for Youth'']'
  career_goals: Sharon aims to transition into a certified paraeducator supervisor role within the next three years, overseeing teaching assistants and coordinating instructional support across grades.
    She plans to earn a master's degree in education administration to qualify for instructional coaching positions. Passionate about arts education, she intends to launch an after‑school art program in
    her Queens community, providing mentorship for at‑risk youth and showcasing culturally relevant art. Long‑term, she hopes to become an advocate for equitable education policy, working with local school
    boards to implement culturally responsive curricula and increase representation of Black educators.
