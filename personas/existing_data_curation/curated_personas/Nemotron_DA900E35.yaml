personas:
  professional: Olga Soto, a 17‑year‑old GED candidate and aspiring medical assistant, channels her meticulous planning, bilingual communication, and early caretaker experience into volunteer health outreach
    at the community center, where their methodical reliability and preference for routine make them a trusted liaison between patients and staff.
  sports: Olga Soto, who balances seasonal jogging in the cooler months with weekly salsa classes, follows the Miami Heat, Miami Dolphins, and Miami Marlins, and occasionally joins a local community‑center
    soccer league, using their organized schedule to fit fitness into a routine that they sometimes miss when anxiety spikes.
  arts: Olga Soto, a 17‑year‑old sketching portrait studies while listening to Celia Cruz and Bad Bunny, devours YA novels by Sarah J. Maas and John Green for emotional insight, and draws inspiration from
    Frida Kahlo’s bold self‑portraits, allowing their creative outlet to soothe their anxiety and reinforce their love of cultural rhythms.
  travel: Olga Soto, who prefers meticulously planned getaways, has explored New Orleans for its jazz and culinary scene, dreams of a cultural immersion in Cartagena, Colombia, and hopes to wander the historic
    streets of Madrid during a future study‑abroad stint, all while budgeting carefully to align travel with their student‑life finances.
  culinary: Olga Soto, a 17‑year‑old who perfects empanadas stuffed with seasoned pork and arroz con pollo flavored with saffron, cumin, and fresh cilantro from their herb garden, enjoys a methodical cooking
    process that sometimes leads to over‑seasoning, and envisions turning these beloved dishes into a home‑based pastry business.
  core: Olga Soto, a methodical 17‑year‑old coping with anxiety through structured planning, salsa dancing, and cooking Cuban classics, habitually overplans their day while occasionally binge‑watching health
    documentaries to calm their nerves.
background:
  cultural: Olga was raised in a bilingual Cuban household in Monticello, Florida. Her parents immigrated from Cuba, instilling strong family ties, respect for elders, and a deep appreciation for Cuban
    traditions. At home, Spanish is spoken daily, and celebrations such as Carnaval and Cuban Independence Day are observed with traditional foods, music, and dance. The family maintains cultural practices
    like cooking picadillo, making cafecito, and listening to salsa and son. The close‑knit community of Cuban diaspora in rural Florida provides a supportive network, while also exposing Olga to broader
    Southern American customs. This blend of Cuban heritage and Floridian life shapes her values of perseverance, resourcefulness, and communal responsibility, influencing both her personal interests and
    future aspirations.
attributes:
  skills: '[''Bilingual (Spanish/English)'', ''Organizational planning'', ''Time management'', ''Basic computer skills (Microsoft Word, Excel, email)'', ''Cooking traditional Cuban cuisine'', ''Household
