  hobbies: '[''Cooking Cuban family recipes'', ''Salsa dancing'', ''Reading young adult fiction'', ''Journaling for mental health'', ''Sketching portraits'', ''Gardening (herbs & vegetables)'', ''Listening
    to Latino music (salsa, reggaeton)'', ''Volunteering at community center'', ''Watching health documentaries'']'
  career_goals: Olga aims to complete her high school education through a GED program within the next year, then pursue a certification as a medical assistant so she can work in a healthcare environment
    that offers clear routines and stability. Long‑term, she hopes to become a registered nurse, leveraging her compassion and desire to help others while maintaining a structured career path. Parallel
    to her healthcare ambitions, she dreams of eventually opening a small home‑based business selling homemade Cuban pastries, allowing her to honor her cultural heritage and develop a reliable source of
    income. She also wants to build personal resilience, using her organized nature to manage her anxiety and eventually mentor peers dealing with similar emotional challenges.
