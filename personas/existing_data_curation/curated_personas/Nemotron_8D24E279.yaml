    "theater attendance", "contemporary dance", "DIY polymer clay sculpting"]'
  career_goals: Daniela aspires to earn a place at a specialized arts high school and later pursue a degree in graphic design or illustration. She aims to become a professional concept artist or multimedia
    designer for video games, film, or advertising, building a robust portfolio that showcases her imaginative vision. Her short‑term goals include winning youth art competitions, securing internships with
    local creative studios, and establishing a freelance design brand that merges storytelling with visual media. Ultimately, she hopes to lead her own creative studio, directing collaborative projects
    that push aesthetic boundaries.
