personas:
  professional: Daniela Taber, a 14‑year‑old aspiring visual storyteller, channels her boundless imagination and meticulous planning into producing fantasy illustrations, coordinating school art showcases,
    and drafting debate arguments, while they constantly refine their craft driven by a competitive streak.
  sports: Daniela Taber plays midfield for the Maplewood Tigers middle‑school soccer team, avidly follows the Los Angeles Lakers in basketball and the Seattle Kraken in hockey, competes in the school chess
    club as a mental sport, and balances competitive drive with contemporary dance rehearsals at the local studio, which they consider essential for agility and expressive movement.
  arts: Daniela Taber devotes evenings to sketching fantastical beings inspired by the works of Hayao Miyazaki, James Jean, and the storytelling of Ursula K. Le Guin, attends live performances of A Midsummer
    Night’s Dream at the Civic Playhouse, practices contemporary dance routines choreographed by local studio alumni, and collaborates on DIY polymer‑clay sculpture projects with peers, often citing the
    collaborative spirit of community murals as a driving force for their artistic growth, which they find invigorating.
  travel: Daniela Taber dreams of traveling to Kyoto’s traditional craft workshops to study Japanese ink painting, to Edinburgh’s Festival Fringe for immersive theater experiences, and to the Scottish Highlands
    to explore castle ruins, but for now they organize weekend trips to Seattle’s Pike Place Market and San Diego’s Comic‑Con with family, meticulously planning itineraries and budgeting each adventure
    within their savings.
  culinary: Daniela Taber enjoys crafting quick meals like avocado toast topped with chili flakes, zesty ramen bowls flavored with miso and Sriracha, and matcha‑infused ice cream, and while they are a novice
    cook who mainly assists in baking chocolate chip cookies, they take pride in mastering the perfect polymer‑clay‑inspired vegan sushi roll, often experimenting with ingredients like nori, cucumber, and
    smoked tofu.
  core: Daniela Taber is a fiercely competitive, imagination‑driven teen who blends art, strategy, and precise planning into a vibrant lifestyle, and they punctuate it with occasional impulsive splurges
    on sketchbooks and a tendency to over‑schedule collaborative projects.
background:
  cultural: Daniela was raised in a middle‑class New England household in Coventry, Rhode Island, with a blend of Irish and English ancestry. Growing up in a region steeped in colonial history, she values
    community involvement, modesty, and self‑reliance, traits reinforced by her family's emphasis on education and civic responsibility. Proximity to the Rhode Island School of Design and exposure to regional
    art fairs have cultivated her appreciation for the visual arts, while local traditions such as town fairs, library programs, and school extracurriculars have provided ample opportunities for collaborative
    and competitive experiences. This New England cultural backdrop shapes her worldview, blending respect for historical roots with a forward‑looking curiosity about novel artistic expression.
