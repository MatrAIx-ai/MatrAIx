  career_goals: Charles’s imagination is already pointing toward several roles that match his curiosity and practical streak. He often says he wants to become an astronaut to explore space, a firefighter
    to help people in real‑world situations, and a builder‑engineer who can create useful things with his hands. He also loves music and sometimes says he’d like to be a singer or a guitarist, reflecting
    his enjoyment of rhythm and performance.
