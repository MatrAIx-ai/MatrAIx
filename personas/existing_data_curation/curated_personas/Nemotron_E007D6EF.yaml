personas:
  professional: Charles Baxter, a budding junior builder who spends his preschool days constructing towering forts from wooden blocks, blends his boundless curiosity with a practical eye for stability,
    yet his spontaneous streak often leads him to abandon a creation mid‑construction in favor of experimenting with new designs, reflecting his competitive drive to outdo his classmates while resisting
    rigid classroom routines.
  sports: Charles Baxter, a pint‑sized soccer enthusiast, dribbles around the backyard pretending to be a striker for the LA Galaxy while attending the 'Little Lions' junior soccer league on Saturdays,
    and also delights in splash‑proof pool games that keep his energy balanced between structured practice and free‑form play.
  arts: Charles Baxter, an avid doodler who fills every scrap of paper with bold crayon sketches of dinosaurs and rockets, sings along to Raffi’s 'Baby Beluga' and Disney’s 'Let It Go' with unbridled enthusiasm,
    and spends rainy afternoons reenacting scenes from Sesame Street, letting his imaginative and critical eye compare the vivid colors of the animated world to the muted shades of his coloring books.
  travel: Charles Baxter, who dreams of revisiting the magical kingdom of Walt Disney World in Orlando after his last family trip, eagerly anticipates a future adventure to the sandy shores of Myrtle Beach,
    yet sometimes resists rigid itineraries, opting instead for spontaneous sandcastle building sessions whenever the family strolls through the Great Smoky Mountains' winding trails.
  culinary: Charles Baxter, a self‑declared connoisseur of creamy peanut butter and jelly sandwiches, devours cheesy macaroni and cheese with gusto, and insists on sprinkling extra cheddar over his banana
    slices, while occasionally experimenting by adding a dash of honey to his oatmeal under his mother’s watchful eye.
  core: Charles Baxter is a curious, pragmatic four‑year‑old who balances spontaneous creativity with a competitive edge, navigating toys, snacks, and tiny adventures with calm confidence and occasional
    mischievous splurges.
background:
  cultural: Charles is raised in a close‑knit African‑American family in Covington, Georgia. His family participates in a local Baptist church that emphasizes gospel music, storytelling, and community service.
    Family gatherings often feature Southern comfort foods such as collard greens, cornbread, and sweet tea, and they celebrate cultural holidays like Juneteenth and Kwanzaa. He is exposed to the broader
    Atlanta African‑American cultural scene through community events, library storytimes, and city‑wide festivals, giving him a sense of pride in his heritage while also enjoying the everyday rhythms of
    small‑town Southern life.
