persona_description: A research scientist who specializes in the study of benthic biodiversity, particularly on rocky reefs and their ecosystems. This individual is involved in conducting diving expeditions
  to collect non-extractive sampling data, using photography to monitor and document marine invertebrate and algal biodiversity. They are part of the MBON Pole to Pole initiative, which aims to integrate
  biological and environmental data for countries along the Pacific and Atlantic coasts of the Americas. Additionally, they coordinate with the Programa de Arqueología Subacuática (PROAS) and have experience
  with the Sofar Trident ROV, which they use for sea explorations and educational programs.
