    antique postcards"]'
  career_goals: Barbara aims to advance to a senior records coordinator role before retirement, leading a department-wide digitization project that transitions paper archives to a secure electronic system.
    She plans to earn a Certified Records Manager (CRM) credential to validate her expertise and increase her competitive edge. Additionally, she hopes to mentor younger employees, improve office efficiency
    metrics, and eventually transition to part‑time consulting on records‑management best practices after she retires.
