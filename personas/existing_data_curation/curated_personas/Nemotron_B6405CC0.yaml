personas:
  professional: Orlando Quinones is a veteran AV technician at a downtown Los Angeles venue whose blend of engineering know‑how, rapid troubleshooting, and an ever‑curious, relaxed mindset enables them
    to turn last‑minute technical challenges into seamless immersive experiences, setting the stage for a future as a Technical Director.
  sports: Orlando Quinones joins a small Sierra Club hiking crew for weekly treks up the San Gabriel Mountains, cheers on the Los Angeles Lakers and Dodgers during their seasons, and occasionally slides
    into casual pickup soccer games at a neighborhood field, preferring steady cardio and fresh mountain air over gym‑centric routines.
  arts: Orlando Quinones immerses themselves in the downtown LA gallery circuit, regularly attending openings at the Broad and MOCA, catching indie film screenings of directors like Jim Jarmusch at the
    ArcLight, and later unwinding in intimate jam sessions playing acoustic renditions of Miles Davis and Björk, letting the eclectic mix of visual and sonic inspiration shape their personal aesthetic.
  travel: Orlando Quinones favors spontaneous weekend road trips to nearby nature escapes such as Joshua Tree and Catalina Island, while dreaming of a tech‑art pilgrimage to Tokyo’s Akihabara district,
    balancing a limited budget and a busy schedule with a desire to capture off‑beat locales through street photography.
  culinary: Orlando Quinones enjoys crafting pupusas stuffed with queso fresco, roasted chorizo, and a surprising splash of avocado‑lime crema, often pairing them with grilled corn, fresh cilantro, and
    salsa verde, showcasing a solid home‑cooking skill that blends classic comfort dishes with California’s fresh produce and occasional experimental twists like kimchi‑topped tacos.
  core: Orlando Quinones is a technically savvy, curiosity‑driven L.A. fixer who balances late‑night gear tinkering and spontaneous hikes with a habit of forgetting appointments, a love for pupusa‑fusion
    cooking, and a competitive edge that fuels their pursuit of a future tech‑art studio.
background:
  cultural: Orlando is a first‑generation American whose parents emigrated from El Salvador in the early 1990s. He grew up in a bilingual household in Los Angeles, speaking Spanish at home and English at
    school. He maintains close ties to the Salvadoran community in Pico‑Union and Downtown LA, celebrating holidays such as Día de la Independencia (September 15) with family gatherings featuring pupusas,
    tamales, and traditional music. He regularly attends cultural events organized by local Salvadoran associations, supports community murals that reflect Central American heritage, and incorporates elements
    of his cultural background into his creative projects, such as using Salvadoran folklore motifs in interactive installations. While he is not currently married, his cultural values emphasize strong
    family connections, respect for elders, and a collective sense of resilience that informs his work ethic and personal worldview.
attributes:
  skills: '[''Audio‑visual equipment installation and troubleshooting'', ''Basic lighting rigging and DMX programming'', ''Digital video editing and motion graphics'', ''Live event technical support (wireless
    mics, streaming)'', ''Mechanical maintenance of stage and ride equipment'', ''Python and Arduino programming for interactive installations'', ''Customer service and crowd management'', ''Knowledge of
    venue safety regulations'', ''Creative problem solving under pressure'', ''Artistic sensibility for visual presentation'']'
  hobbies: '[''Visiting contemporary art galleries and museums'', ''Indie film and documentary screenings'', ''Street photography around Los Angeles'', ''DIY electronics projects with Arduino and Raspberry
    Pi'', ''Cooking traditional Salvadoran dishes and experimental fusion recipes'', ''Hiking in the San Gabriel Mountains'', ''Reading science fiction and technology non-fiction'', ''Listening to world
    music and jazz'', ''Playing acoustic guitar in small jam sessions'', ''Participating in small tech‑art meetups'']'
  career_goals: Orlando aims to transition from his current attendant role into a senior technical position within the entertainment industry, such as Technical Director or Production Manager for immersive
    live experiences. He plans to obtain industry certifications (e.g., ESTA Certified Entertainment Technician) and deepen his expertise in interactive media design so he can lead projects that fuse technology
    with visual art. A long‑term ambition is to launch a boutique production studio that creates culturally resonant installations, drawing on his Salvadoran heritage and his curiosity for unconventional
    storytelling. He also hopes to mentor younger technicians, leveraging his competitive drive to build a reputation as a reliable problem‑solver who can deliver high‑quality results in fast‑paced environments.
