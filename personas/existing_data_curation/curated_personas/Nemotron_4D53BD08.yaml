    consultation'', ''Negotiation'', ''Sustainable material sourcing'', ''Historic preservation'', ''Team collaboration'', ''Organizational workflow'']'
  hobbies: '[''Gardening'', ''Architectural photography'', ''Reading African-American literature'', ''Cooking Southern-African fusion dishes'', ''Yoga'', ''Hiking'', ''DIY upcycled furniture projects'',
    ''Participating in community cultural events'']'
  career_goals: Miriam aims to open a boutique interior‑design studio in Dawsonville that specializes in sustainable, culturally resonant Southern homes. She plans to become a LEED‑accredited professional
    and to develop a signature line of textiles and furnishings that incorporate African‑American motifs and local Georgia crafts. Over the next five years she hopes to lead high‑profile residential and
    boutique‑hotel projects, mentor emerging designers from underrepresented backgrounds, and gain speaking slots at the American Society of Interior Designers conferences. Ultimately, she envisions her
    firm as a community hub that blends creative entrepreneurship with social responsibility.
