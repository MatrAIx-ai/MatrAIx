personas:
  professional: Miriam Miles, a 30-year-old interior designer, leverages AutoCAD, SketchUp, and Revit to harmonize sustainable material sourcing with historic preservation, weaving African-American motifs
    and local crafts into narrative-rich Southern homes while managing projects with meticulous budgeting and compassionate client communication.
  sports: Miriam Miles enjoys weekend hikes in the Appalachian foothills with the local Trailblazers Club, follows the Atlanta Braves and Atlanta Falcons for a mix of baseball and football action, and practices
    yoga twice weekly to balance endurance and flexibility.
  arts: Miriam Miles pursues architectural photography of historic Dahlonega streets, draws inspiration from Southern Gothic authors like William Faulkner and Toni Morrison’s literary craft, admires the
    visual storytelling of Ansel Adams, and finds creative rhythm in the jazz of Miles Davis and the folk harmonies of Gillian Welch while upcycling vintage furniture into bespoke art pieces.
  travel: Miriam Miles plans trips with a blend of adventure and cultural immersion, favoring weekend getaways to Asheville’s Blue Ridge Parkway, day trips to Savannah’s historic squares, and has a bucket-list
    entry for a culinary tour of Morocco’s spice markets, all while balancing travel budgets with her studio startup plans.
  culinary: Miriam Miles experiments with Southern comfort dishes like shrimp and grits and fried chicken, infusing them with African-inspired spices such as harissa and berbere, perfects collard greens
    seasoned with smoked paprika, and delights in crafting homemade cornbread with jalapeño for a spicy twist.
  core: Miriam Miles merges the precision of interior design with a garden-lover’s penchant for labeling every plant, a coffee-driven work ethic, and a habit of collecting vintage furniture pieces that
    never quite make it to the showroom.
background:
  cultural: Miriam is a Black woman whose family roots trace back to the Great Migration and a strong Southern heritage in Georgia. Growing up in a close‑knit church community, she was immersed in gospel
    music, storytelling, and the tradition of hospitality that defines Southern Black culture. These experiences have shaped her aesthetic sensibility, prompting her to blend African patterns, vibrant textiles,
    and historic Southern design elements in her work. She actively honors her cultural lineage by supporting local Black artisans, attending Juneteenth commemorations, and incorporating narratives of resilience
    and community into her design concepts. Her background also informs her commitment to mentorship and creating inclusive spaces that reflect the diversity of her hometown.
