personas:
  professional: Craig Gilstrap, a 19‑year‑old aspiring freelance concept artist, combines digital illustration in Photoshop and Procreate with basic front‑end web development to showcase surreal game assets
    on a self‑coded portfolio, thriving on the flexibility of project‑based contracts and creative autonomy.
  sports: Craig Gilstrap enjoys shooting hoops at a local Orlando recreation center, follows the Orlando Magic and Orlando City SC with fervor, and belongs to a weekend pick‑up soccer league at Lake Howell,
    though they prefer low‑key yoga sessions over intense training regimes.
  arts: Craig Gilstrap immerses themselves in the Orlando art scene, frequenting gallery openings by local collectives, performing acoustic renditions of Radiohead and Björk at open‑mic nights, while sketching
    surreal comic strips inspired by speculative authors like China Miéville and drawing on art theory from Susan Sontag.
  travel: Craig Gilstrap’s travel style blends spontaneous weekend road trips to the Everglades and the Florida Keys with a dream to backpack through Kyoto’s temples and Tokyo’s anime districts, favoring
    budget hostels, sketch‑filled journal pages, and the occasional photo‑hunt at sunrise over meticulously planned itineraries.
  culinary: Craig Gilstrap favors creating flavor‑rich dishes such as miso‑glazed salmon tacos, spicy avocado toast with smoked paprika, and homemade ramen bowls, navigating the kitchen with a moderate
    skill level that leans on quick YouTube tutorials while savoring artisanal cold brew and bubble tea.
  core: Craig Gilstrap, a 19‑year‑old visual storyteller, lives in a perpetual swirl of sketchbooks, caffeine, and half‑finished side projects, often forgetting to charge their phone because a new concept
    is always brewing.
background:
  cultural: Craig grew up in a suburban neighborhood of Orlando, Florida, within a middle‑class, Anglo‑American family. His cultural upbringing blends typical Floridian influences—proximity to the tourism
    and entertainment industry, exposure to a diverse mix of visitors, and an outdoor lifestyle centered around lakes and theme parks—with broader American traditions such as celebrating Thanksgiving, Fourth
    of July, and local community festivals. This environment fostered an openness to novelty, a collaborative spirit, and an appreciation for both individual creativity and community engagement.
attributes:
  skills: '[''Digital illustration'', ''Graphic design'', ''Front‑end web development (HTML/CSS/JavaScript)'', ''Concept art'', ''Storyboarding'', ''Photography'', ''Video editing (Adobe Premiere Pro)'',
