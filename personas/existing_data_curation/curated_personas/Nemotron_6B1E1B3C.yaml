  hobbies: '[''Sketching surreal characters'', ''Digital painting'', ''Playing narrative video games'', ''Reading speculative fiction and philosophy'', ''Attending gallery openings and art events'', ''Photography
    on nature trails'', ''Listening to eclectic music'', ''Acoustic guitar'', ''Creating short comic strips'']'
  career_goals: Craig envisions turning his passion for visual storytelling into a flexible, multidisciplinary career. He aims to develop a strong freelance portfolio that showcases illustration, concept
    design, and interactive media, eventually securing a role as a concept artist or creative director at an indie game studio or animation house. He is also considering pursuing a BFA or MFA to refine
    his craft and may explore teaching workshops or online courses. Craig values autonomy, so he seeks opportunities that allow remote work, project‑based contracts, and the ability to experiment with novel
    artistic media.
