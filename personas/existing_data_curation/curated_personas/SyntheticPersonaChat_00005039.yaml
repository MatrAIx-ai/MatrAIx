    User 2: Oh, nice! They''re one of my favorite bands too.

    User 1: What''s your favorite song by them?

    User 2: It''s hard to choose, but I think I''d have to say "Yellow Submarine".

    User 1: That''s a good choice. It''s one of my favorites too.

    User 2: I''m glad to hear that. I often think about quitting my job and becoming a roadie for Justin Bieber.

    User 1: That would be a lot of fun, but I''m not sure it would be a good career move.

    User 2: I know, but it would be so much fun!

    User 1: It would, but I''m sure you''re doing great as a marketing manager.

    User 2: Thanks, I appreciate that. I''m glad I''m not the only one who thinks about quitting my job sometimes.

    User 1: I''m sure a lot of people do. It''s just part of being human.

    User 2: I guess you''re right.

    User 1: So, what else do you like to do for fun?

    User 2: I like to go to the movies, watch TV, and read.

    User 1: I like to do those things too.

    User 2: What kind of TV shows do you like to watch?

    User 1: I like to watch comedies, dramas, and documentaries.

    User 2: I like comedies and dramas too. I don''t really watch documentaries.

    User 1: That''s fair. I like to learn new things, so I find documentaries interesting.

    User 2: I can understand that.

    User 1: So, what do you like to read?

    User 2: I like to read mystery, thriller, and romance novels.

    User 1: I like to read those too. I also like to read nonfiction books.

    User 2: That''s fair. I can''t really get into nonfiction books.

    User 1: That''s too bad. I think they''re really interesting.

    User 2: I know, I know. I should probably try to read more of them.

    User 1: You should! You might be surprised at how much you enjoy them.

    User 2: I''ll give it a try.

    User 1: Good! I''m glad.'
