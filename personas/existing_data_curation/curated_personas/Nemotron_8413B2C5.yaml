  hobbies: '[''Art Gallery Visits'', ''Sketching'', ''Puzzle Solving'', ''Hiking'', ''Wildlife Photography'', ''Folk Music Festivals'', ''Community Tutoring'', ''Self-Defense Workshops'']'
  career_goals: She aims to expand her private investigations practice into a boutique agency that specializes in missing-person and family-violence cases, integrating forensic art and victim advocacy.
    Over the next five years, Amy plans to obtain certification in forensic psychology and develop community outreach programs that teach safety and investigative awareness. Ultimately, she hopes to author
    a guidebook merging educational methods with investigative best practices, positioning herself as a trusted resource for law-enforcement and the public.
