personas:
  professional: Amy Lee is a private investigator who blends their background in education with forensic sketching, leveraging investigative interviewing and behavioral analysis to solve missing‑person
    and family‑violence cases while they plan to launch a boutique agency that also offers victim‑advocacy workshops.
  sports: Amy Lee hits the Chippewa River trails every weekend with the Eau Claire Trail Hikers Club, joins the Badger Run Club for seasonal 5K races, roots for the Green Bay Packers and the Wisconsin Timber
    Rattlers, and while they still forget to stretch after hill climbs, they often end up with sore calves.
  arts: Amy Lee immerses themselves in the Eau Claire art scene, attending openings at the Midwest Contemporary, sketching urban street corners in the Great River Art Center’s studio, and dancing to folk
    tunes by Gillian Welch at the Eau Claire Folk Fest, while they keep a secret stash of Georgia O’Keeffe postcards for inspiration.
  travel: Amy Lee plans meticulously for weekend getaways to Door County’s wineries and Madison’s farmers market but also enjoys spontaneous trips to Edinburgh’s Fringe Festival and Kyoto’s Zen gardens,
    balancing a love for structured itineraries with the flexibility to wander local art districts on foot, and they always pack a reusable water bottle.
  culinary: Amy Lee’s palate favors Midwestern comfort foods—wild‑rice and mushroom risotto, cheese curds with a cold craft beer, and maple‑glazed trout—cooking with fresh lake fish, local honey, and wild
    mushrooms, though they often over‑brew coffee and leave the kitchen a mess after late‑night puzzle sessions.
  core: Amy Lee blends investigative rigor with artistic curiosity, tackling cases with empathy while they juggle puzzles, hikes, and a perpetually half‑filled coffee mug, all guided by a disciplined yet
    occasionally splurging financial habit.
background:
  cultural: Raised in a small-town Midwestern family with German-Scandinavian roots, Amy grew up valuing hard work, community support, and a close connection to nature. The region’s traditions—such as seasonal
    fairs, cheese making, and a strong emphasis on local cooperation—shaped her collaborative spirit and practical sensibility. Her upbringing fostered an appreciation for both the simplicity of rural life
    and the evolving cultural tapestry of Eau Claire, encouraging her open-minded curiosity and commitment to helping neighbors.
