  career_goals: Douglas aims to earn his GED within the next year and enroll in a community‑college program focused on hospitality management or a trade apprenticeship in automotive mechanics. He aspires
    to secure an entry‑level position in a Las Vegas hotel or casino, where he can apply his people‑skills and practical knowledge, and eventually move into a supervisory or management role. In the longer
    term, he hopes to launch his own mobile car‑detailing service that leverages his mechanical abilities and strong network of friends and acquaintances.
