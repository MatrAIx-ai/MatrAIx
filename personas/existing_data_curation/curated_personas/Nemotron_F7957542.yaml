  hobbies: '[''Basketball'', ''Skateboarding'', ''Video gaming (Fortnite, Call of Duty)'', ''Social media content creation'', ''Car detailing'', ''Music (hip hop, EDM)'', ''Attending live concerts'', ''Photography'',
