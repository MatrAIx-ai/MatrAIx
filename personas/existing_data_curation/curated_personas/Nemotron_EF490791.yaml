    (5S, Kaizen) implementation'', ''Training and mentoring of apprentices'', ''Basic CNC programming (G‑code editing)'', ''Process optimization'', ''Team communication and cross‑department coordination'']'
  hobbies: '[''Church food‑drive volunteering'', ''Organizing local fairs'', ''Woodworking and metal‑craft club projects'', ''Vegetable gardening'', ''Cooking and sharing blended Midwestern‑Mexican meals'',
    ''Attending high school football games'', ''Senior center quilting circle'', ''Weekend hiking in the Ozarks'']'
  career_goals: Lillian aims to transition into a lead machinist or shift‑supervisor role within the next two years, leveraging her extensive experience to guide workplace safety and efficiency initiatives.
    She plans to earn an advanced CNC certification from the Society of Manufacturing Engineers and to deepen her knowledge of additive manufacturing so she can help her shop integrate 3D metal printing
    for prototyping. Mentoring remains a priority; she hopes to partner with the local technical college to develop a hands‑on apprenticeship program for young adults in Holt County. While she values career
    progression, Lillian is also focused on achieving a balanced workload to reduce stress, ensuring she can maintain her health and continue contributing to her community after retirement.
