  career_goals: 'Clay aims to advance from his current computer support specialist role to a senior systems engineer position within the next three years, focusing on expanding his knowledge of cloud infrastructure
    and cybersecurity. He plans to earn certifications such as CompTIA Network+, Security+, Microsoft Certified: Azure Administrator, and Cisco CCNA. Ultimately, he aspires to lead a small IT support team,
    overseeing service delivery for a midsize organization while maintaining a healthy work‑life balance to support his growing family.'
