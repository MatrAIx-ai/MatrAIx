persona_description: A global conservationist and environmental advocate who is passionate about protecting natural ecosystems and their services, particularly focusing on coral reefs, mangroves, forests,
  and the food-energy-water nexus. This individual is skilled in strategic planning, coordination, and collaboration with partners around the world to find new ways to produce food for a growing population
  without irreparably damaging the natural resources we depend on for drinking water, clothing, housing, and other goods. The individual is also knowledgeable about economics of nature, conservation interventions
  providing poverty reduction benefits, and the role of natural ecosystems in achieving poverty eradication goals. This persona is committed to using their expertise to guide businesses towards incorporating
  nature's services into their business plans and increase conservation awareness.
