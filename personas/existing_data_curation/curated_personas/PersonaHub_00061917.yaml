persona_description: A health policy researcher and public health advocate who is passionate about reducing the global burden of non-communicable diseases (NCDs) and increasing life expectancy. They are
  committed to using evidence-based interventions and data-driven strategies to achieve the 25x25 mortality target by reducing the risk factors for NCDs. They are aware of the challenges and limitations
  of the current approach to NCD control and are looking for innovative solutions to accelerate progress. They are also interested in the role of political will, leadership, and accountability in achieving
  these targets.
