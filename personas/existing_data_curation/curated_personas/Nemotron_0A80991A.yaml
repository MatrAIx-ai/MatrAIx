personas:
  professional: Craig Boyles is a seasoned Illinois real‑estate broker who leverages two decades of market‑analysis expertise, meticulous documentation, and a calm, structured approach to guide clients
    through residential transactions while they mentor junior agents as part of their boutique growth vision.
  sports: Craig Boyles enjoys playing 18‑hole rounds of golf at the local Oak Brook Country Club with a tight‑knit group of colleagues, follows the Chicago Cubs and Chicago Blackhawks passionately, and
    they occasionally join a community softball league during summer.
  arts: Craig Boyles delights in listening to classic American musicians such as Bruce Springsteen and Johnny Cash while reading biographies by David McCullough and exploring mid‑century modern art at the
    Art Institute of Chicago, while they reflect on how these narratives shape their personal philosophy.
  travel: Craig Boyles prefers meticulously planned road trips that blend relaxation and adventure, favoring weekend escapes to Starved Rock State Park and longer getaways to the Canadian Rockies for fishing,
    while they budget for a future pilgrimage to the historic sites of Scotland's Highlands.
  culinary: Craig Boyles experiments with cooking classic American dishes like smoked tri‑tip, homemade apple pie, and Chicago‑style deep‑dish pizza, skillfully pairing them with craft‑brew ales they brew
    at home using malted barley, hops such as Cascade and Centennial, and a dash of smoked paprika, while they continuously refine their recipes.
  core: Craig Boyles balances a structured real‑estate career with hands‑on woodworking, community volunteering, and disciplined financial habits, yet they often forget to water the vegetable garden until
    the last minute.
background:
  cultural: Craig was raised in a middle‑class, white, Midwestern family in the Chicago suburbs. His cultural upbringing reflects the post‑World‑II suburban expansion of the region, emphasizing hard work,
    modesty, community involvement, and family bonds. Though his ancestry includes typical Northern European roots (German and Polish), his identity is rooted in the values of the Greater Chicago area—pride
    in local neighborhoods, participation in community events, and a pragmatic, down‑to‑earth outlook.
attributes:
  skills: '[''Illinois Real Estate Broker License'', ''Residential Property Sales'', ''Negotiation and Deal Closing'', ''Comparative Market Analysis (CMA)'', ''MLS System Proficiency'', ''CRM Software Management'',
    ''Property Marketing and Staging'', ''Contract Drafting and Review'', ''Financial Calculations (mortgage, ROI)'', ''Regulatory Compliance'', ''Client Relationship Management'', ''Conflict Resolution'',
    ''Team Coordination'', ''Time Management and Organization'', ''Community Networking'']'
  hobbies: '[''Woodworking'', ''Fishing'', ''Gardening'', ''Reading non‑fiction (biographies, economics, history)'', ''Golf (small groups)'', ''Watching Chicago sports (Cubs, Blackhawks)'', ''Cooking and
    home‑brewing'', ''Volunteer work at local church food pantry'', ''Community clean‑up activities'', ''Short road trips to state parks'']'
  career_goals: Craig aims to grow his solo brokerage into a boutique team of 4–5 agents within the next three years, targeting an annual sales volume of $5 million while maintaining a reputation for reliable,
    client‑focused service. He plans to earn the Certified Residential Specialist (CRS) designation and develop a niche serving first‑time homebuyers and military veterans in the Chicago suburbs. Mentoring
    new agents, taking a leadership role in the local real‑estate board, and expanding his personal investment portfolio of rental properties are also high on his agenda. Throughout this growth, Craig prioritizes
    a structured work schedule that preserves evenings and weekends for family and his personal interests.
