  hobbies: '["Reading adventure and animal books", "Drawing and illustration", "Playing soccer", "Listening to cumbia and vallenato music", "Dancing folk steps", "Building with LEGO", "Solving puzzles",
    "Cooking simple Colombian dishes (e.g., arepas)", "Using educational science and language apps"]'
  career_goals: Yolanda dreams of becoming a veterinarian who can care for animals both in her community and in the jungles of Colombia. She wants to study biology and chemistry in high school, taking advantage
    of her bilingual abilities to help Spanish-speaking pet owners. She also imagines teaching younger children how to care for pets or protect the environment, mixing her compassion with a practical desire
    to make a tangible difference. In the shorter term, she sets goals to win her school science fair, improve her Spanish writing, and earn a place on the varsity soccer team when she reaches middle school,
    believing that steady progress and balanced effort will lead her toward her long-term ambition.
