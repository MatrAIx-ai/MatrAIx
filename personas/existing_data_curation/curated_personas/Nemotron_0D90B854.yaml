personas:
  professional: Yolanda Basadre is a budding junior naturalist who channels their curiosity and practical organization into school science projects, drawing detailed sketches of wildlife while confidently
    presenting findings to classmates.
  sports: Yolanda Basadre plays midfield for the Riverdale Rockets youth soccer team, emulating their favorite professional club City United's fast-paced style, and they practice drills after school with
    disciplined enthusiasm while also enjoying weekend runs that keep them energetic and socially engaged.
  arts: Yolanda Basadre fills sketchbooks with vibrant birds and jungle scenes, studies color palettes from the album art of La Sonora Dinamita's cumbia classics, and channels rhythm into spontaneous dance
    steps learned from family gatherings, blending visual and musical creativity into their daily play.
  travel: Yolanda Basadre dreams of trekking through a tropical rainforest, snorkeling along a Caribbean shoreline, and visiting the historic castle museum in their capital city, preferring trips planned
    with their family's schedule but always packing a notebook to sketch new sights.
  culinary: Yolanda Basadre delights in helping her mother knead corn dough for arepas, sprinkling cheese and cilantro on top, and they often pair the warm snacks with fresh fruit slices like mango and
    banana, while occasionally experimenting with a pinch of cinnamon on oatmeal for breakfast.
  core: Yolanda Basadre is a curiosity-driven eight-year-old who balances adventure reading with diligent sketching, yet they habitually leave LEGO bricks scattered across the living room, a charming reminder
    of their boundless energy.
background:
  cultural: Yolanda grows up in a bilingual Colombian household in Lodi, New Jersey. Spanish is spoken at home, and she celebrates Colombian traditions such as Día de la Independencia (July 20), Carnaval
    de Barranquilla, and the yearly family gatherings featuring foods like empanadas, bandeja paisa, and sancocho. Her parents often share stories of their hometown and teach her classic Colombian songs,
    which she sings during school cultural presentations. While she embraces the multicultural environment of Bergen County—participating in school events and making friends from diverse backgrounds—she
    also maintains strong ties to her heritage through weekly visits to the local Colombian community center, where she helps with dance workshops and Spanish language activities. This blend of Colombian
    customs and American schooling shapes her identity, fostering a respect for family, community, and cultural diversity.
