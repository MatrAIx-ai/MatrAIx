personas:
  professional: Pablo Kim is a budding junior organizer, frequently arranging blocks by color and size, showcasing an early love for methodical problem‑solving that hints at a future career in engineering
    or project management.
  sports: Pablo Kim is a lively member of the Little Stars FC toddler soccer program and eagerly watches the New York Yankees on Saturdays, approaching fitness as energetic playtime with peers.
  arts: Pablo Kim is a budding fan of Sesame Street and The Wiggles, often dancing to 'Fruit Salad' while proudly displaying crayon drawings of Mickey Mouse, showing how music and simple art shape daily
    joy.
  travel: Pablo Kim is an adventurous toddler who has already visited Disneyland and the Grand Canyon with family and dreams of seeing the Eiffel Tower in Paris, preferring short trips with familiar routines
    over long, unstructured journeys.
  culinary: Pablo Kim is a picky yet enthusiastic eater who loves cheesy mac and cheese, banana pancakes, and sweet potato puree, can proudly spread peanut butter on toast with a spoon, and prefers familiar
    flavors while occasionally trying sushi rolls during family outings.
  core: Pablo Kim is an organized, curious toddler who balances an insatiable love for sorting blocks with occasional worry over new experiences, making them both a meticulous mini planner and a lovable,
    slightly anxious explorer.
background:
  cultural: Pablo’s family blends Latin American and Indigenous heritages, speaking both Spanish and English at home while also preserving native stories and customs passed down through his grandparents.
    Meals often feature dishes like tamales, arroz con pollo, and corn‑based foods that reflect his roots. The household celebrates cultural events such as Día de los Muertos, Indigenous seasonal rites,
    and community festivals in Prince George’s County, exposing him to rhythmic drumming, folk dances, and storytelling that honor both his Latin and Indigenous ancestry. This multicultural environment
    shapes his values of community, respect for nature, and a strong sense of identity.
