  career_goals: Claudio aims to complete his high school education—either by earning his diploma or obtaining a GED—within the next year. He plans to enroll in a community college program in social services
    or health administration, where he can blend his practical skills with his desire to help others. His short‑term goal is to secure a part‑time position in a retail or administrative setting to gain
    work experience and financial independence. In the long term, he aspires to become a community outreach coordinator or a licensed social worker, eventually leading a nonprofit organization that provides
    mentorship and mental‑health resources for at‑risk youth in Bergen County. He also hopes to obtain certifications in mental‑health first aid and CPR to enhance his ability to support vulnerable populations.
