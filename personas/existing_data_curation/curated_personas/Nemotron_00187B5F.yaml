  hobbies: '[''Woodworking and furniture restoration'', ''Bridge and chess'', ''Gardening'', ''Historic neighborhood walking tours'', ''Reading biographies'', ''Jazz concerts'', ''Community theater participation'',
    ''Genealogy research'']'
  career_goals: In retirement, Thomas aims to preserve his trade legacy by authoring a practical DIY home‑repair guide and a memoir that captures his journey in the building trades. He hopes to establish
    a mentorship program for young carpenters through a local trade school, contribute his expertise to historic home preservation projects in St. Louis, and learn modern design tools such as computer‑aided
    drafting. Additionally, he wishes to expand his public speaking by delivering workshops at the senior center and becoming a featured speaker at regional heritage festivals.
