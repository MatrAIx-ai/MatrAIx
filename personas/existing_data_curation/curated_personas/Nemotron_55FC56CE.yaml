personas:
  professional: George Drake is an aspiring digital illustrator and budding storyteller who blends meticulous landscape sketching with experimental Photoshop techniques, channeling their curiosity and balanced
    organization into collaborative art workshops while confidently asserting creative ideas in small groups.
  sports: George Drake enjoys weekend hikes with the Wesley Chapel Youth Hiking Club, occasionally joins a local skateboarding crew, cheers on the Tampa Bay Buccaneers and Tampa Bay Lightning, and prefers
    low-key fitness like trail running over organized team sports.
  arts: George Drake spends free hours sketching fantasy landscapes inspired by James Gurney and creating digital murals echoing the color palettes of Loish, while their eclectic playlist—from Tame Impala's
    psychedelia to Beethoven's symphonies—feeds their creative imagination.
  travel: George Drake dreams of exploring Japan’s anime districts after a family road trip to Disney World and a weekend at Clearwater Beach, favoring meticulously planned short getaways that blend nature
    hikes with cultural immersion, though budget limits often keep adventures within the Southeast United States.
  culinary: George Drake’s culinary experiments range from perfecting a cheesy homemade pizza topped with fresh basil to mastering quick ramen bowls spiced with chili flakes, and they often snack on mango‑pineapple
    smoothies while sketching.
  core: George Drake is a quietly curious teen who doodles storyboards in the margins of textbooks, balances a disciplined art practice with spontaneous video-game marathons, and can’t resist a midnight
    snack of chips while listening to synth‑heavy playlists.
background:
  cultural: George grew up in Wesley Chapel, a suburban community in Pasco County, Florida. His upbringing reflects a typical middle‑class American environment with a blend of Southern hospitality and broader
    Floridian cultural influences. He has been exposed to outdoor recreation such as beach trips and park outings, local art festivals, and a media‑rich atmosphere that encourages creative expression. Family
    and community values emphasize curiosity, personal responsibility, and respectful interaction, shaping his balanced, open‑minded personality.
attributes:
  skills: '[''Sketching and drawing'', ''Digital illustration (Krita/Procreate)'', ''Basic coding (Scratch, Python fundamentals)'', ''Research and information synthesis'', ''Collaborative project organization'',
