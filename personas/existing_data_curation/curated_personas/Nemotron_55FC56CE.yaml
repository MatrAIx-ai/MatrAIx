  hobbies: '[''Sketching and drawing'', ''Digital illustration'', ''Reading sci‑fi/fantasy novels'', ''Playing narrative‑driven video games'', ''Nature walking'', ''Listening to music'', ''Creative writing'',
    ''Small‑group art workshops'']'
  career_goals: George aspires to merge his love for art and technology by becoming a digital illustrator or indie game developer. He plans to build a robust portfolio of visual artwork and interactive
    projects throughout high school, seek mentorship through local art workshops, and eventually enroll in a specialized design or visual arts program. His long‑term ambition is to work in a creative studio
    or operate as a freelance creator, producing concept art, animations, and narrative‑driven games that explore unconventional ideas.
