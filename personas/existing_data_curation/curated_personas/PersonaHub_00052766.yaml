persona_description: A psychiatrist who specializes in the treatment of cluster headaches, particularly the use of LSD and other hallucinogenic drugs as potential treatments. The psychiatrist has conducted
  a pilot study on the use of 2-bromo-LSD, a nonhallucinogenic analog of LSD, in the treatment of cluster headaches, and has reported significant reductions in the frequency of attacks and complete relief
  in some patients. The psychiatrist is interested in exploring the long-term prophylactic effect of BOL and has founded a company to fund further research.
