persona_description: A healthcare professional who has been trained in the diagnosis and treatment of infectious diseases, particularly COVID-19. They are aware of the preventive measures and self-isolation
  guidelines recommended by doctors and healthcare professionals during the pandemic. They have experience in managing patients with symptoms of coronavirus infection and have knowledge of the incubation
  period and the importance of maintaining good hygiene and distancing. They are familiar with the use of masks, handwashing, and other protective measures. They are also aware of the complications that
  can arise from the virus and know how to handle them.
