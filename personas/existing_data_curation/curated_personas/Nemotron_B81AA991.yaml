  career_goals: Amneris aims to attend a STEM‑focused high school and later pursue a degree in biomedical engineering, where she can combine her curiosity for science with a practical desire to develop
    affordable medical devices for underserved communities. She also envisions using her bilingual abilities to work in international health settings, improving access to care for Spanish‑speaking populations.
    In the longer term, she hopes to mentor younger students from immigrant backgrounds, helping them navigate academic and emotional challenges.
