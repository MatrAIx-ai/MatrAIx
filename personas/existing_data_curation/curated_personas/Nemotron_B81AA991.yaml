personas:
  professional: Amneris Lisman, a budding junior programmer, blends their love for reading science articles with practical Python projects, demonstrating methodical curiosity and reliable organization while
    preferring solitary coding sessions over group hackathons.
  sports: Amneris Lisman enjoys exploring Miami’s nature trails and playing pickup basketball at the community center, follows the Miami Heat and Inter Miami CF avidly, and belongs to a junior hiking club
    that meets weekly, using these low‑key activities to stay fit while preferring solo or small‑group exercise over competitive leagues.
  arts: Amneris Lisman, an enthusiastic sketch artist and acoustic guitarist, draws inspiration from contemporary authors like Celeste Ng and visual storytellers such as Hayao Miyazaki, while their playlist
    frequently features Ed Sheeran and indie folk bands, reflecting their solitary creative rhythm and occasional perfectionist tendencies.
  travel: Amneris Lisman plans weekend escapades to nearby Everglades trails and annual family trips to New York City, balancing their love for nature with a curiosity for bustling urban culture, yet they
    often hesitate to book spontaneous trips due to budgeting concerns and a lingering worry about missing schoolwork.
  culinary: Amneris Lisman, who enjoys cooking family recipes such as arepas with cheese and avocado, also experiments with making homemade guacamole and baking chocolate chip brownies, favoring fresh ingredients
    like corn masa, ripe avocados, and dark chocolate, while occasionally over‑salting dishes when lost in thought.
  core: Amneris Lisman is a reflective teen who channels their curiosity into coding, sketching, and cooking, yet battles frequent worry and a habit of over‑thinking even the simplest decisions.
background:
  cultural: Amneris is a second‑generation Venezuelan American raised in Miami’s vibrant Hispanic community. She speaks Spanish at home and English at school, and her family maintains Venezuelan traditions
    such as celebrating Independence Day, cooking familiar dishes, and listening to Venezuelan music. The multicultural environment of Miami provides her with exposure to diverse Latino cultures, while
    her family’s immigrant experience informs her strong work ethic and appreciation for bilingualism.
