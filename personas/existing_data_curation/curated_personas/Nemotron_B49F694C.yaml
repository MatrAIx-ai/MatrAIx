  skills: '[''Soul‑food cooking'', ''Household budgeting'', ''Community mediation'', ''Gardening'', ''Knitting and quilting'', ''Event organization'', ''Basic smartphone use'']'
  hobbies: '[''Experimenting with recipes'', ''Balcony gardening'', ''Knitting'', ''Gospel choir'', ''Listening to blues and jazz'', ''Reading historical fiction'', ''Walking in the park'', ''Senior bingo'',
    ''Storytelling circles'']'
  career_goals: Although retired, Talecia aims to deepen her impact as a community mentor, sharing her cooking and craft knowledge with younger neighbors and preserving family stories for future generations.
    She wishes to learn more about digital storytelling tools to record oral histories, and hopes to volunteer as a guide for new seniors navigating city resources. Her long‑term ambition is to see the
    neighborhood’s cultural traditions celebrated and passed on, while maintaining her own health and independence.
