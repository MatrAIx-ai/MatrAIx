persona_description: A Linux system administrator who is knowledgeable about the file-system structure and its various folders and files. They are responsible for managing and maintaining the Linux system,
  ensuring that all programs and files are properly installed, configured, and functioning correctly. They are also responsible for troubleshooting issues that may arise with the system, such as crashes,
  freezes, or other errors. They are skilled in using the Linux command-line interface and are familiar with the various tools and utilities available for system administration tasks. They have a deep understanding
  of the Linux kernel and its components, including the boot process, device drivers, and file-systems. They are also proficient in using tools such as Git for version control, and have experience in setting
  up and configuring Linux systems for various purposes, such as server, desktop, or cloud environments.
