personas:
  professional: Ricardo Frometa, a curious five‑year‑old who loves to assemble LEGO and wooden blocks, imagines themselves as a future engineer, and they channel a practical eye for stability with a relaxed,
    flexible approach to play that often leaves their creations slightly disorganized but full of creative spirit.
  sports: Ricardo Frometa, an enthusiastic member of the Little Kickers soccer club at the Discovery Bay community center, spends their Saturdays chasing the ball in organized games while cheering for the
    San Jose Earthquakes and dreaming about catching a home run from the San Francisco Giants during family outings, and they relish the post‑game ice‑cream reward.
  arts: Ricardo Frometa, who spends afternoons drawing colorful papel picado patterns for Día de los Muertos celebrations and humming along to Disney’s "Let It Go" and the rhythmic beats of J Balvin, finds
    their creative identity in bright crayons, sticker books, and family sing‑alongs that nurture a gentle, cooperative spirit, and they love sharing their artwork with classmates.
  travel: Ricardo Frometa, whose family’s road trips have taken them to Disneyland’s Magic Kingdom and the shimmering shores of Lake Tahoe, prefers the freedom of spontaneous stops at ice‑cream shops over
    rigid itineraries, and they dream of a future beach vacation in Maui where they can build sandcastles beside their favorite cartoon characters.
  culinary: Ricardo Frometa, a budding little chef who proudly assembles their own taco al pastor with soft corn tortillas, shredded cheese, and a squeeze of lime, delights in mixing guacamole alongside
    their mother’s tamales, yet they often leave a trail of spilled salsa on the kitchen floor, a charming reminder of boundless curiosity and a relaxed approach to cleanup.
  core: Ricardo Frometa balances boundless curiosity with a laid‑back, sometimes messy love for building, saving, and celebrating, always ready with a smile, a sticker, or a handmade craft, and they brighten
    their world with endless enthusiasm.
background:
  cultural: Ricardo comes from a Mexican family that celebrates traditions such as Día de los Muertos and enjoys foods like tacos and tamales. At home he hears Spanish spoken alongside English, and he participates
    in community events at the local cultural center in the Bay Area. The blend of Mexican heritage and growing up in Discovery Bay, California, shapes his values of family closeness, respect for others,
    and a love for both celebration and everyday practicality.
