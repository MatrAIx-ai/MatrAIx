personas:
  professional: Anna Mims, a recent humanities graduate embarking on a career in arts administration, blends meticulous project coordination with a calm, collaborative style, using her strong research and
    writing skills to design structured community outreach programs for the Museum of the City of New York while quietly managing her anxiety through systematic planning.
  sports: Anna Mims, a yoga‑enthusiast who also jogs with the Queensbridge Running Club on Saturdays, roots for the New York Knicks and the New York City FC, and prefers low‑impact, predictable workouts
    that fit neatly into her academic schedule.
  arts: Anna Mims, a devoted visitor of the Museum of Modern Art and the Metropolitan Museum of Art, finds inspiration in the photography of Diane Arbus, the paintings of Frida Kahlo, and the ambient scores
    of Max Richter, weaving these influences into her personal journals and community exhibition proposals.
  travel: Anna Mims, who prefers meticulously planned weekend getaways, has explored the historic streets of Boston, the coastal charm of Newport, Rhode Island, and dreams of a structured cultural tour
    of Dublin during the St. Patrick’s Day festival, balancing a limited student budget with her love for diverse urban experiences.
  culinary: Anna Mims, an avid baker who excels at perfecting lemon‑blueberry scones, rosemary focaccia, and soda bread made with almond flour, often experiments with matcha‑infused buttercream while swapping
    recipes on an Instagram food community for fellow young chefs.
  core: Anna Mims, a 20‑year‑old aspiring arts administrator, balances meticulous planning with a quiet love for street photography, baking, and mindfulness, yet often over‑analyzes decisions due to a lingering
    undercurrent of anxiety.
background:
  cultural: Anna was raised in a middle-class family in Queens, New York, with Irish and German ancestry. Growing up in one of the most culturally diverse boroughs, she was exposed to a wide range of traditions,
    languages, and artistic expressions. Her parents, both educators, emphasized the importance of literature, music, and community involvement. She celebrates both mainstream American holidays and cultural
    observances such as St. Patrick’s Day, reflecting her heritage. Fluency in English and basic conversational Spanish from high school further enrich her cultural perspective, and she values the inclusive,
    artistic atmosphere of New York City.
