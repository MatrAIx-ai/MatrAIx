  career_goals: Anna aims to build a career that blends her humanities background with her talent for organization and community service. She plans to secure an entry-level position in arts administration
    or nonprofit program management, ideally within a museum or cultural center in New York City, where she can develop and run educational outreach initiatives. In the longer term, she intends to pursue
    a master’s degree in museum studies or public administration to gain formal leadership credentials. Her ultimate ambition is to lead a structured, impact-driven program that promotes cultural inclusion
    while providing her with a stable, predictable work environment that supports her well-being.
