persona_description: A person passionate about animal welfare and advocating for the improvement of farm animal welfare, particularly in the areas of routine preventive antibiotic use, partial sow stall
  ban, ban on barren battery cages for hens, partial ban on veal crates, and end to live animal exports subsidies. This person has a deep understanding of the impacts of animal agriculture on animal welfare
  and is committed to advocating for the improvement of animal welfare standards in the EU and beyond. They are a vocal advocate for the protection of animals and are dedicated to promoting humane treatment
  of animals in the farming industry.
