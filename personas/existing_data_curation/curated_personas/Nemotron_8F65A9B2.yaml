personas:
  professional: Bobby Wiggins, a retired shipyard craftsman turned neighborhood handyman, applies decades of mechanical, carpentry, and welding expertise to informal consulting with a methodical yet flexible
    problem‑solving style, a healthy dose of skepticism that drives double‑checks, and a calm, resilient demeanor that keeps small‑group mentorship sessions low‑key and predictable.
  sports: Bobby Wiggins follows the Alabama Crimson Tide football and the New Orleans Saints, enjoys early‑morning fishing on Mobile Bay as his personal sport, attends local high school baseball games,
    and participates in a weekend walking club that balances a structured fitness routine with the flexibility to skip sessions when the weather calls for it.
  arts: Bobby Wiggins immerses themselves in blues legends like B.B. King and Muddy Waters and gospel icons such as Mahalia Jackson, often listening on a vintage turntable while shaping wood, and draws
    inspiration from biographies of civil‑rights leaders, treating each story as a lesson in perseverance and community heritage.
  travel: Bobby Wiggins prefers short, well‑planned road trips along the Gulf Coast, having explored New Orleans, Savannah, and the Great Smoky Mountains, and dreams of a relaxed Caribbean cruise after
    the grandchildren graduate, balancing travel enthusiasm with budget caution and a love for sites that echo local heritage.
  culinary: Bobby Wiggins enjoys cooking shrimp and grits, fried catfish with hush‑puppies, and garden‑fresh salads of tomatoes, okra, and sweet potatoes, relying on a competent but modest kitchen skill
    set that blends tried‑and‑true recipes with improvisation using garlic, hot sauce, and pecan‑infused oil from their own harvest.
  core: Bobby Wiggins is a calm, methodical yet easy‑going craftsman who blends disciplined problem‑solving with a love for simple pleasures—from dawn fishing and blues music to modest tool‑shopping—while
    guarding their routine against unnecessary obligations.
background:
  cultural: Born and raised in Mobile, Alabama, Bobby grew up in a close‑knit African‑American community steeped in Gullah‑Geechee heritage, Southern soul food, and church life. His family took part in
    Mardi Gras Indian traditions and the annual Mobile Bay Blues Festival, shaping his love of music and communal celebration. He carries the oral storytelling tradition, values self‑reliance, and honors
    the city’s civil‑rights history, all of which influence his daily routines, values, and the way he connects with family and neighbors.
attributes:
  skills: '[''Automotive Repair'', ''Small‑Engine Maintenance'', ''Carpentry'', ''Gardening'', ''Welding'', ''Community Mentorship'']'
