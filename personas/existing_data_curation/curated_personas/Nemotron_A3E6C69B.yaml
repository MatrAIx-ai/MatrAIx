  hobbies: '[''Soccer (team player)'', ''Robotics club projects'', ''Minecraft building and modding'', ''Chess'', ''LEGO Technic and model kit construction'', ''Reading science-fiction and engineering magazines'',
    ''Bilingual language practice (Spanish)'']'
  career_goals: Luis aspires to turn his love of building and problem-solving into a career in engineering. He aims to attend a STEM-focused high school, earn a scholarship for a bachelor's degree in civil
    or mechanical engineering, and eventually work on designing bridges, sustainable infrastructure, or robotics systems. His competitive nature also drives him to participate in robotics competitions during
    high school, hoping to win awards that strengthen his college applications. In the long term, Luis envisions a stable, structured profession where he can apply his practical skills, lead project teams,
    and contribute to community development projects in Texas.
