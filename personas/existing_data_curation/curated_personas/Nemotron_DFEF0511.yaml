personas:
  professional: Maritza Perez is a community program manager at a Providence nonprofit, excelling at data-driven program evaluation, grant writing, bilingual outreach, and volunteer coordination while leveraging
    their spontaneous curiosity to devise unconventional arts-based interventions, yet they often battle to keep deadlines organized.
  sports: Maritza Perez enjoys walking the historic streets of Providence, participates in a senior yoga class at the Providence Community Center, follows the Providence Bruins hockey team and the New England
    Revolution soccer club, and they join a community-run 'Fit Walk' group that meets Saturday mornings for gentle exercise.
  arts: Maritza Perez immerses themselves in Providence’s art scene, and they frequently visit galleries featuring local artists such as Karen Margaryan, attend performances by the Providence Ballet and
    Trinity Rep productions starring Michael Cumpsty, and practice traditional Guatemalan folk dance to music by Los Bichos, all of which deepens their cultural identity and fuels their creative inspiration.
  travel: Maritza Perez prefers low-key, culturally immersive trips, having explored the historic streets of Antigua, Guatemala and the colonial charm of Oaxaca, while also enjoying weekend getaways to
    nearby Newport, Rhode Island and the scenic Berkshires, they plan spontaneously with a modest travel fund and often travel with their adult children to share family stories.
  culinary: Maritza Perez loves cooking home-cooked meals, mastering dishes like pepian and tamales, experimenting with fresh garden herbs such as cilantro and oregano, delighting in avocado salsa and locally
    sourced pumpkin seeds, while they also indulge in occasional brunch at Julian's on Broadway for its famous eggs benedict.
  core: Maritza Perez blends a lifelong love for art, community activism, and gardening with a spontaneous, worry-prone personality that fuels creative projects yet sometimes leads them to missed deadlines,
    and they indulge in impulsive spending.
background:
  cultural: Maritza’s family hails from a mountainous region near Antigua, Guatemala, where Maya traditions and Spanish colonial influences intertwine. Raised in a bilingual household, she celebrates Día
    de los Muertos with vibrant altars and shares beloved folktales passed down through generations. In Providence, she remains an active member of the local Latin American community, organizing cultural
    nights that feature traditional music, dance, and cuisine, and she frequently mentors recent immigrants, helping them navigate the challenges of adapting to a new country while preserving their heritage.
