  career_goals: Maritza aims to expand Providence’s intergenerational arts programs, weaving Guatemalan cultural expressions into community workshops that empower older adults and youth alike. She seeks
    multi‑year funding to ensure program sustainability, hopes to mentor emerging community‑service leaders, and aspires to influence city policy toward greater equity in social services for immigrant and
    senior populations. Ultimately, she wants to leave a lasting legacy of inclusive, creative spaces that address both social needs and emotional well‑being.
