  hobbies: '[''Art Gallery Visits'', ''Guatemalan Folk Dance'', ''Cooking Traditional Recipes'', ''Gardening'', ''Walking in Providence’s Historic District'', ''Reading Science Magazines'', ''Yoga and Meditation'',
