personas:
  professional: Jon Johnson is a 22‑year‑old certified Emergency Medical Technician in Denver who blends rapid patient assessment and trauma care expertise with a creatively analytical mindset, constantly
    improvising protocols and contributing to simulation‑based training while polishing Spanish language skills to better serve a diverse community.
  sports: Jon Johnson fuels their fitness routine by hitting the Denver Trail Runners club for weekly long‑distance runs, joining a local indoor rock‑climbing gym during winter, and cheering on the Denver
    Broncos, Colorado Avalanche, and Colorado Rockies, while carving out weekend hikes along the Rocky Mountain trails to maintain both endurance and mental clarity.
  arts: Jon Johnson channels their artistic curiosity through watercolor paintings of cityscapes inspired by Edward Hopper and abstract medical illustrations reminiscent of Leonardo da Vinci’s anatomical
    sketches, while finding solace in acoustic sets by Bon Iver, attending indie shows at Denver’s Red Rocks Amphitheatre, and participating in monthly sketch meet‑ups that feature fellow creators like
    graphic novelist Sloane Young.
  travel: Jon Johnson prefers thoughtfully planned, low‑key trips that blend adventure with photography, such as a solo backpacking trek through Patagonia’s Torres del Paine, a weekend road‑trip to the
    vibrant streets of Santa Fe for its art markets, and a dream itinerary to Iceland’s volcanic landscapes for capturing aurora borealis, all while balancing a modest travel budget and occasional family
    obligations.
  culinary: Jon Johnson enjoys cooking comforting Denver‑style green chili and searing bison steaks, but also experiments with simple Japanese dishes like miso‑glazed salmon, relying on a well‑stocked pantry
    of fresh herbs, chilies, and a trusty cast‑iron skillet, while reserving Saturdays for leisurely brunches featuring avocado toast topped with poached eggs and locally sourced coffee.
  core: Jon Johnson is a 22‑year‑old EMT who balances high‑stakes emergency care with a quiet love for watercolor, acoustic guitar, and weekend hikes, often forgetting to water their houseplants while meticulously
    organizing their shift schedules.
background:
  cultural: Jon grew up in a middle‑class, predominantly white suburb of Denver, shaped by a family heritage that traces back to German and Scandinavian ancestors. His upbringing emphasized self‑reliance,
    community service, and appreciation for the outdoors, reflected in frequent family trips to the mountains. He celebrates traditional American holidays like Thanksgiving and Christmas, while also participating
    in Denver’s vibrant, progressive cultural scene, attending local festivals and learning about the region’s Indigenous heritage. The city’s diverse, liberal atmosphere has nurtured his openness to new
    ideas and his desire to serve the community through emergency medicine.
