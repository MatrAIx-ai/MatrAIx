  career_goals: Jon aims to earn paramedic certification within the next two years and pursue a bachelor’s degree in emergency health services or health informatics. He aspires to integrate his artistic
    curiosity by designing immersive, VR‑based emergency response training tools for EMS educators. Long‑term, he envisions a leadership role in EMS program development, influencing policy and community
    health outreach in Denver. He also hopes to contribute research on stress resilience among first responders, leveraging his own emotional stability and experience.
