personas:
  professional: Michael Moua, a 14‑year‑old aspiring game developer, blends his love for sketching, digital art, and LEGO Mindstorms robotics to prototype indie game concepts, often posting his coding tutorials
    on a small blog while rigorously testing mechanics in strategy titles like Civilization VI.
  sports: Michael Moua joins neighborhood pickup basketball games at the community gym, roots for the Golden State Warriors, hikes the nearby Willow Creek Trail each weekend, and maintains a membership
    with the local youth soccer club, balancing his competitive spirit with a love for outdoor endurance.
  arts: Michael Moua immerses themselves in indie music from bands like Arctic Monkeys and Mitski, collects graphic novels by creators such as Alan Moore and Junji Ito, and draws inspiration from Studio
    Ghibli’s animation and the surreal paintings of Salvador Dalí for their own digital illustrations.
  travel: Michael Moua enjoys planning weekend road trips to nearby state parks like Zion, dreams of wandering the neon‑lit streets of Tokyo for its anime culture, and has already explored Montreal’s art
    districts, favoring a blend of structured itineraries and spontaneous detours.
  culinary: Michael Moua favors bold flavors, often cooking ramen with miso broth, crafting homemade pizza topped with pineapple and pepperoni, and experimenting with matcha‑green tea cupcakes, though they
    occasionally burn toast when distracted by a new coding idea.
  core: Michael Moua is a curious, competitive teen who fuses art, robotics, and strategy gaming into creative projects, yet sometimes sacrifices sleep and chores for the next digital conquest.
background:
  cultural: Michael's cultural background is rooted in a Midwestern American upbringing in Tecumseh, Michigan. His family traces its lineage to German and Irish ancestors, reflecting the region's historical
    immigration patterns. The community emphasizes practical values such as self‑reliance, modesty, and involvement in local events like the Lena‑Wayne County Fair and high school football games. He grew
    up attending a local Protestant church and participating in community service projects, which instilled a sense of responsibility and civic pride. Simultaneously, Michael is deeply connected to broader
    digital culture through online gaming, streaming platforms, and global media, creating a blend of traditional Midwestern etiquette with an openness to contemporary, global influences.
