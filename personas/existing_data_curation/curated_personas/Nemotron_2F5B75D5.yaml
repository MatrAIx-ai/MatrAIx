  career_goals: Michael aspires to fuse his artistic passion and technical curiosity into a career in interactive media, specifically aiming to become a video game designer or digital animator. He plans
    to attend a specialized STEM‑Arts high school and later study Computer Science and Game Design at a university such as Michigan State University or the Rochester Institute of Technology. Michael envisions
    creating immersive games that blend compelling storytelling with innovative visual art, ultimately leading a development team. In the near term, he seeks to build a strong portfolio of self‑produced
    games and artwork to secure internships, mentorships, and scholarship opportunities.
