personas:
  professional: Ford Godfrey, an 18‑year‑old aspiring heavy‑equipment operator in Virginia, leverages their hands‑on experience with highway sweepers, snowplows, and pothole‑patching alongside a methodical,
    reliable work style and clear communication to excel on crew sites while pursuing certifications that will pave the way to a supervisory role.
  sports: Ford Godfrey, 18, splits time between pickup basketball games with friends and weekend bike rides on the W&OD Trail, proudly wears a Washington Wizards jersey while rooting for the Capitals during
    the hockey season, and volunteers as a lane‑cleaner for local park runs, treating fitness as a social responsibility.
  arts: Ford Godfrey, 18, lives for classic rock evenings with Led Zeppelin and The Rolling Stones blasting from their motorcycle speakers, jams on a battered acoustic guitar during campfire gatherings,
    and unwinds with cooperative multiplayer sessions of Overwatch, appreciating the storytelling in both music and gaming.
  travel: Ford Godfrey, 18, prefers road‑trip adventures that blend biker culture and scenic stops, planning weekend escapes to Shenandoah National Park’s Skyline Drive and dreaming of a cross‑country pilgrimage
    to the Henry Ford Museum in Michigan, all while balancing a limited budget that prioritizes fuel over fancy hotels.
  culinary: Ford Godfrey, 18, favors hearty, grill‑focused meals like smoked brisket and jalapeño‑infused chicken wings, often seasoning with smoked paprika and garlic, and enjoys crafting the perfect cheeseburger
    topped with caramelized onions during backyard cookouts after a day on the road crew.
  core: Ford Godfrey, an energetic 18‑year‑old who blends a love for heavy‑equipment work, classic rock, and community clean‑ups, stays organized while occasionally splurging on motorcycle upgrades and
    neglecting dentist appointments.
background:
  cultural: Ford grew up in the suburban community of Ashburn, Virginia, a diverse and rapidly growing part of Loudoun County. While his family has roots in white American suburban culture, he has been
    exposed to a mix of cultural influences through school, local community events, and the proximity to the Washington, D.C. metropolitan area. This environment emphasizes reliability, community involvement,
    and a practical work ethic, shaping his values of cooperation, responsibility, and a balanced curiosity about new ideas.
attributes:
  skills: '["Heavy equipment operation", "Road repair and maintenance", "Safety compliance", "Team coordination", "Basic computer usage", "Physical stamina", "First aid basics"]'
  hobbies: '["Basketball", "Cycling", "Community clean-up volunteering", "Motorcycle maintenance", "Video gaming (co-op)", "Listening to classic rock", "Automotive podcasts"]'
  career_goals: Ford aims to become a certified heavy equipment operator and eventually a crew supervisor in the Virginia Department of Transportation. He plans to pursue a vocational certification in roadway
    maintenance, attend OSHA training, and perhaps enroll in a community college program for civil engineering technology, so he can eventually transition into a planner or engineer role, contributing to
    safer and more efficient highways.
