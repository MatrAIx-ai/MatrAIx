  career_goals: At this stage in life, Tomas is focused on preserving his family’s heritage and sharing his practical knowledge with younger relatives. He aims to mentor his grandchildren in cooking traditional
    recipes and basic woodworking, and to compile oral histories of his parents and his own immigration experience for future generations. Maintaining his health and independence remains a priority, so
    he sets daily goals for physical activity and balanced nutrition. He also hopes to volunteer periodically at the local community center, offering hands‑on workshops in basic home repairs and garden
    care, while remaining engaged in small, close‑knit gatherings.
