personas:
  professional: An 81‑year‑old master craftsman, Tomas Sanchez blends decades of mechanical repair, woodworking, and budgeting expertise to mentor younger relatives, applying his practical mindset to everyday
    problems while maintaining a relaxed approach to formal obligations.
  sports: A dedicated boxing enthusiast, Tomas Sanchez never misses a televised match featuring fighters like Canelo Álvarez, cheerfully supports his local senior boxing club, and follows the nearby Springfield
    Cardinals baseball team during spring training, approaching sports with a competitive spirit and a hint of skepticism toward rival fans.
  arts: Evenings echo with classic ranchera and mariachi melodies, as Tomas Sanchez regularly listens to recordings by Vicente Fernández and José Alfredo Jiménez, attends occasional church choir performances,
    and values the storytelling tradition of these songs, which reinforce his structured yet relaxed outlook.
  travel: Preferring self‑guided road trips over crowded tours, Tomas Sanchez plans trips with a detailed checklist yet leaves room for spontaneous detours, dreaming of revisiting historic mission towns
    along the Pacific Coast and taking a relaxed drive to the lighthouse at Point Reyes, balancing his love of structure with a desire for low‑stress adventure.
  culinary: Passionate about heritage cuisine, Tomas Sanchez spends quiet mornings perfecting mole with dried chilies, chocolate, and spices, crafting tamales with masa and pork, simmering pozole with hominy
    and fresh oregano, and harvesting jalapeños, cilantro, and tomatoes from his garden to add authentic flavor to each dish.
  core: Tomas Sanchez, an 81‑year‑old hands‑on mentor, merges mechanical savvy, garden‑grown flavors, and classic music into a life of structured yet flexible routines, punctuated by occasional skepticism
    and a competitive streak at chess and boxing.
background:
  cultural: Tomas was born in the state of Jalisco, Mexico, and emigrated to the Dallas‑Fort Worth area in his early twenties. Growing up in a bilingual household, he maintained strong ties to Mexican customs,
    celebrating Día de los Muertos, Navidad, and the Feast of Our Lady of Guadalupe, while also embracing the Texan Hispanic community’s traditions. His identity blends Mexican cultural values—family loyalty,
    respect for elders, and culinary heritage—with the pragmatic, independent spirit typical of his Garland neighborhood. His Catholic faith, love of ranchera music, and commitment to preserving family
    recipes are central to his daily life.
