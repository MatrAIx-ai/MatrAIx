personas:
  professional: Joseph Lotharp is a budding robotics hobbyist who channels their love for structure into building functional LEGO machines and crafting Scratch programs, demonstrating early engineering
    instincts and a competitive streak that drives them to out‑engineer peers in the weekly youth robotics club.
  sports: Joseph Lotharp dribbles with the Kids United Basketball Club at the local park every Saturday, idolizing LeBron James of the Los Angeles Lakers and keeping a detailed journal of shooting percentages,
    while in the winter months they trade the court for a junior soccer league with the Falcons Youth Team, showing a disciplined yet adaptable fitness routine.
  arts: 'Joseph Lotharp immerses themselves in mystery novels like Agatha Christie’s Murder on the Orient Express, blasts Kendrick Lamar’s hip‑hop beats while practicing rudimentary drum fills on a beginner
    set, and spends evenings dissecting episodes of the animated series Avatar: The Last Airbender, blending analytical reading with rhythmic expression to fuel their creative side.'
  travel: Joseph Lotharp prefers short, well‑planned weekend trips; they’ve camped in the Redwood National Park with a meticulously organized gear checklist, dream of exploring the historic streets of Boston
    on a future family road‑trip, and keep a scrapbook of postcards from their recent visit to the Smithsonian museums in Washington, D.C., balancing curiosity with the constraints of school schedules and
    a modest family budget.
  culinary: Joseph Lotharp favors bold flavors, often ordering pepperoni pizza with extra cheese, can whip up a respectable batch of mac and cheese from scratch using elbow pasta and sharp cheddar, and
    occasionally experiments with sushi rolls after watching a YouTube tutorial on California rolls, though they still stubbornly refuse to eat broccoli.
  core: Joseph Lotharp is a methodical 12‑year‑old who balances solitary tech pursuits with competitive sports, meticulously plans every allowance spend, and secretly rebels against broccoli while obsessively
    perfecting LEGO contraptions.
background:
  cultural: Joseph was raised in Hinesville, Georgia, a town shaped by Southern traditions and the nearby Fort Stewart military base. As an African American youth, he experiences a community where church
    gatherings, family barbecues, and local festivals celebrate cultural heritage through music, storytelling, and soul food. Influences from his local church and school programs have fostered a respect
    for discipline and communal support. He values the pragmatic work ethic common in his neighborhood and sees education as a pathway to stability, while also embracing vibrant cultural expressions such
    as gospel, hip hop, and community camaraderie.
