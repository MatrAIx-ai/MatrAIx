  hobbies: '[''Pickup Basketball'', ''Weekend Soccer'', ''Karaoke'', ''Trivia Nights'', ''Urban Photography'', ''Cooking (experimenting with new recipes)'', ''Yoga'', ''Mindfulness Meditation'', ''Community
