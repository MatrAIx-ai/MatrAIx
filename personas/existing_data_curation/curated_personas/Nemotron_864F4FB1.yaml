  career_goals: Antonio aims to progress from his current front-line role to a supervisory position within the next two to three years, leveraging his strong communication abilities and knack for mentoring
    new hires. He plans to complete his bachelor's degree in Business Administration, focusing on operations and customer experience management. In the longer term, he aspires to become a call-center operations
    manager or a training specialist, designing programs that improve service quality and employee well-being. Recognizing his own emotional reactivity, he also hopes to champion mental-health initiatives
    within his workplace, creating supportive environments that reduce stress for both staff and customers.
