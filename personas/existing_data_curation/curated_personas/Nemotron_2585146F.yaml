  career_goals: Tommy aims to release a concept album that blends experimental rock with lyrical explorations of philosophy and abstract art. He wants to become a regular headliner at notable Chicago venues
    such as the Metro and Schubas, while also building a reputation as a sought‑after session musician and producer for local indie acts. Over the next five years he plans to open a modest home‑studio space
    that doubles as a teaching hub, offering lessons and workshops to youth in his community. He hopes to secure licensing deals for his original compositions in film and television, providing a stable
    income that balances his creative pursuits with his responsibilities as a husband and family man.
