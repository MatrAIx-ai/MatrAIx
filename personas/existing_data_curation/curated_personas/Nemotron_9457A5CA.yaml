  hobbies: '[''Acoustic Guitar'', ''Live Country Music Events'', ''Charity Runs'', ''Fishing'', ''Hunting'', ''Weekend Hiking Trips'', ''Barbecue Cooking'', ''Flag Football'', ''Reading Business Biographies'',
