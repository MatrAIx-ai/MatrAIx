persona_description: A researcher and scientist who specializes in the study of black bears, specifically the socialization, idiosyncrasies, ecological relationships, and death of bears. Known for his work
  with radio-tracking over 100 bears in northeastern Minnesota, conducting studies through an organization known as Wildlife Research Institute, and opening the North American Bear Center in Ely. Has been
  compared to Jane Goodall and has been featured in 13 documentaries on his work. The persona is interested in the legal and ethical implications of his research, particularly the issue of public safety
  and the treatment of wild animals. They are knowledgeable about the scientific methods used in his research and are interested in the impact of his work on the conservation of black bears.
