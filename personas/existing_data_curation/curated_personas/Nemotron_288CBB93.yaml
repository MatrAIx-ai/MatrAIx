personas:
  professional: Naomi Mcgowan leads strategic healthcare operations at a mid-sized hospital network, leveraging Lean Six Sigma expertise, data analytics, and a collaborative leadership style to drive cost‑effective
    quality improvement while championing telehealth integration and mentorship of emerging women leaders.
  sports: Naomi Mcgowan stays fit through weekly hikes along the North Shore trails and a local walking club, cheers for the Boston Red Sox and New England Patriots, and joins a seasonal adult soccer league
    every spring.
  arts: Naomi Mcgowan nurtures a love for photography by capturing New England’s autumn foliage, draws inspiration from Ansel Adams and the music of Norah Jones, and attends monthly book club discussions
    that often reference works by Doris Kearns Goodwin and Atul Gawande.
  travel: Naomi Mcgowan prefers moderately planned trips that balance cultural immersion and relaxation, having recently explored the historic streets of Boston, trekked Acadia National Park, and dreaming
    of a culinary tour of Tuscany and the cherry blossoms of Kyoto.
  culinary: Naomi Mcgowan enjoys wholesome cooking, regularly preparing roasted root vegetable medleys with rosemary, quinoa‑kale salads with lemon vinaigrette, and apple crumble with a buttery oat topping,
    while experimenting with seasonal produce from their garden.
  core: Naomi Mcgowan blends data‑driven precision with a garden‑grown patience, constantly juggling Lean Six Sigma metrics while never missing a chance to pause for a sunrise hike or a fresh batch of homemade
    soup.
background:
  cultural: Naomi is a third‑generation white American of mixed English and Irish ancestry, raised in a small New England town. Her upbringing emphasized community involvement, self‑reliance, and a respect
    for tradition, reflected in family gatherings centered around Thanksgiving and seasonal holidays. Growing up in the Boston‑area suburbs, she was exposed to the region’s strong emphasis on education
    and public service, which shaped her collaborative and considerate approach to both work and personal life. She identifies with the values of New England’s civic‑minded culture while also embracing
    the diverse, progressive environment of contemporary Massachusetts.
