persona_description: A public health researcher who specializes in the study of viral infections, particularly hepatitis C. They have extensive knowledge of the epidemiology and mortality trends associated
  with HCV infection in the United States. They have conducted research on the impact of HCV on mortality at the population level and have analyzed data from the US Census records and multiple-cause-of-death
  data to identify trends and patterns. They are likely to be interested in the potential for HCV to cause liver damage and the impact of HCV on mortality rates in different demographic groups.
