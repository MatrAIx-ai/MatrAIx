persona_description: A software engineer who specializes in developing and optimizing eMMC systems for use in embedded devices. They have a strong background in computer hardware and software, with a particular
  focus on NAND flash management and device drivers. They are experienced in using eMMC systems for low-level NAND flash management tasks such as bad block management, wear leveling, and logical-to-physical
  address translation. They are also skilled in developing efficient and optimized eMMC system architectures that take advantage of the internal controller's management capabilities.
