personas:
  professional: Rita Hutchinson, a retired liberal arts enthusiast turned community curator, leverages daily watercolor experiments, deep art history knowledge, and charismatic public speaking to design
    a traveling senior‑artist exhibition while mentoring emerging creators in a flexible, improvisational style.
  sports: Rita Hutchinson enjoys leisurely birdwatching along the Columbia River, participates in a senior walking club that follows the Pacific Northwest's scenic trails, and supports the Seattle Seahawks
    and Portland Timbers, treating these low‑intensity activities as her primary fitness regimen.
  arts: Rita Hutchinson, an avid watercolorist and abstract sketcher, draws inspiration from Georgia O’Keeffe’s flora, Mark Rothko’s color fields, and experimental theater works by The Wooster Group, while
    regularly attending improv poetry nights featuring local spoken‑word artists such as Saul Williams.
  travel: Rita Hutchinson wanders through off‑beat destinations such as Vancouver’s Granville Island, the San Juan Islands, and Iceland’s volcanic landscapes, favoring spontaneous itineraries that let her
    sketch, birdwatch, and sample regional teas, all while keeping travel expenses modest through senior discounts.
  culinary: Rita Hutchinson delights in preparing cedar‑plank salmon with fresh dill, wild mushroom risotto, and seasonal salads featuring native perennials like lamb’s quarters, while her coffee ritual
    involves hand‑brewed Ethiopian Yirgacheffe beans and occasional forays into experimental cooking with edible flowers.
  core: Rita Hutchinson is an imaginative 72‑year‑old whose day flows between watercolor splashes, speculative fiction debates, and spontaneous birdwatching, all guided by a relaxed, slightly disorganized
    yet deeply community‑focused spirit.
background:
  cultural: Rita was raised in a middle‑class white family in the Pacific Northwest, where a strong appreciation for nature, self‑reliance, and community involvement shaped her worldview. The region’s blend
    of American and Canadian cultural influences, coupled with its vibrant arts scene, encouraged her curiosity about diverse artistic expressions. Her upbringing emphasized education, modest civic engagement,
    and an open‑minded respect for individual creativity, all of which continue to inform her personal and artistic identity.
