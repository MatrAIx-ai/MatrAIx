  career_goals: Alexander aims to advance to a senior project director role, overseeing multi‑million‑dollar mixed‑use developments that integrate green building standards and culturally resonant design
    elements. He plans to acquire LEED AP certification and become a recognized advocate for merging indigenous construction wisdom—such as passive cooling techniques and locally sourced materials—with
    modern urban projects. Long‑term, he envisions launching his own consultancy focused on community‑driven, environmentally responsible construction in Queens and across the Northeast, while mentoring
    the next generation of skilled tradespeople, especially those from underrepresented backgrounds.
