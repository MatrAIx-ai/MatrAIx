personas:
  professional: Kenny Jones, an 82‑year‑old retired handyman turned community mentor, blends decades of carpentry, automotive repair, and organic gardening expertise with a charismatic public‑speaking style
    to orchestrate church events, senior‑center workshops, and a neighborhood oral‑history project, and they frequently mentor youths in practical trades.
  sports: Kenny Jones enjoys bass and catfish fishing on nearby lakes during spring and summer, follows the local minor‑league baseball team the River City Runners, stays active with daily walks around
    the community garden, and they play weekly chess and checkers matches that sharpen strategic thinking without the physical strain.
  arts: Kenny Jones delights in singing gospel and blues hymns and playing harmonica at church gatherings, drawing inspiration from legends like B.B. King, Mahalia Jackson, and Robert Johnson, and they
    attend regional folk festivals while curating a personal collection of vintage harmonicas and sheet music.
  travel: Kenny Jones favors leisurely road trips that combine family visits and historic sites, has explored Charleston, Savannah, and New Orleans, dreams of attending the Nashville music festival, and
    they carefully plan each journey to balance budget considerations with the desire for comfortable accommodations.
  culinary: Kenny Jones loves Southern cuisine, regularly prepares fried catfish, collard greens, smoked pork ribs, and peach cobbler using fresh herbs from their garden, masters cast‑iron skillet cooking
    and hickory‑wood grilling, and they experiment with spice rubs featuring paprika, cumin, and brown sugar.
  core: Kenny Jones, the sociable 82‑year‑old who blends a curiosity for new ideas with practical hands‑on skills, can be found harmonica‑playing at church, tending a thriving garden, and weaving stories
    into every piece of handmade furniture, and they never miss a Sunday chorus.
background:
  cultural: Kenny grew up as a Black man in the rural heart of Ozark, Alabama, where family, church, and community formed the core of daily life. His grandparents were sharecroppers, and the values of self‑reliance,
    mutual aid, and oral tradition were passed down through generations. The local African‑American church has been his spiritual home, shaping his love for gospel music, fellowship, and service. He witnessed
    the shifting tides of the civil‑rights era from a small‑town perspective, which deepened his appreciation for resilience and collective progress. Southern Black culinary traditions, communal barbecues,
    and seasonal festivals remain central to his identity, as do the stories of ancestors that he now strives to preserve for future generations.
