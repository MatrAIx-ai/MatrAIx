  career_goals: Even in retirement, Kenny aims to leave a lasting legacy for his family and community. He plans to record an oral‑history project that captures his life and the civil‑rights experiences
    of his generation, and to compile a memoir blending personal stories with Southern Black history. He wants to mentor his grandchildren and local youth in practical trades, ensuring skills are passed
    on. Kenny is also spearheading his church’s centennial celebration, incorporating live streaming so distant relatives can participate. Expanding the community garden to provide fresh produce for neighbors,
    and teaching digital photography so stories can be shared online, are also high on his agenda.
