personas:
  professional: Cheryl Mccowan is a seasoned instructional technologist with over two decades of tech experience, skillfully designing adult learning curricula, troubleshooting LMS platforms like Moodle
    and Canvas, scripting Python automations, and translating complex concepts into clear, practical resources while balancing a curiosity for emerging ed‑tech with a pragmatic, flexible approach and an
    occasional disorganized streak in project tracking.
  sports: Cheryl Mccowan enjoys seasonal hiking in the Santa Ana Mountains, participates in a local bird‑watching club, follows the LA Dodgers for baseball, occasionally joins a Saturday morning yoga class
    at the community center, and prefers low‑impact fitness activities that align with their love of nature and solitary exercise.
  arts: Cheryl Mccowan is an avid reader of historical fiction—favoring authors like Ken Follett and Philippa Gregory—captures nature photography of birds, listens to folk artists such as Joni Mitchell
    and The Civil Wars, and attends occasional community theater productions like "The Glass Menagerie" to nurture their creative spirit.
  travel: Cheryl Mccowan prefers flexible, purpose‑driven travel, often planning weekend road trips to destinations like Joshua Tree National Park or a historic tour of Bath, England, using detailed spreadsheets
    to balance a modest travel budget with a desire for nature immersion and cultural exploration.
  culinary: Cheryl Mccowan loves cooking with garden‑fresh vegetables, frequently experimenting with Mediterranean dishes such as ratatouille, homemade pesto, and spiced chickpea stews, and enjoys sourcing
    seasonal produce at the farmers' market while occasionally indulging in elaborate weekend baking projects.
  core: Cheryl Mccowan blends a curious, practical mindset with a penchant for solitary hobbies, a relaxed approach to planning that sometimes leads to missed appointments, and a habit of jotting down ideas
    on grocery receipts.
background:
  cultural: Cheryl grew up in a middle‑class, suburban setting in Southern California, where the prevailing cultural norms emphasized self‑reliance, education, and community involvement. As a white American,
    she shares many mainstream cultural touchstones—such as a commitment to individual achievement and a respect for personal privacy—while also embracing the diverse, progressive atmosphere of Riverside
    County. Her upbringing instilled a strong belief in the power of lifelong learning and a pragmatic approach to problem‑solving, values that continue to shape both her professional life and her personal
    interests.
