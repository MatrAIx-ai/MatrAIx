  career_goals: Cheryl aims to transition into a senior instructional technologist role where she can lead the strategic integration of emerging technologies—such as AI‑driven tutoring platforms—into community‑college
    and workforce‑development programs. She plans to earn a master’s degree in Educational Technology within the next three years to deepen her research credentials. In the long term, she hopes to launch
    a part‑time consulting practice that helps small schools and nonprofit organizations build flexible, evidence‑based online learning environments while preserving her desire for a balanced, flexible
    schedule that accommodates her volunteer work and personal interests.
