persona_description: A scientist or researcher who studies the transfer of heat energy and its effects on objects. They are interested in understanding how heat energy is transferred from a hotter body
  to a colder body and how this affects the temperature of the object. They are also interested in the specific heat capacity and latent heat of a substance, which are the energy needed to raise the temperature
  of a substance and the energy needed to melt or boil a substance, respectively. They may also be interested in the specific heat capacity and latent heat of different materials and how they affect the
  transfer of heat energy.
