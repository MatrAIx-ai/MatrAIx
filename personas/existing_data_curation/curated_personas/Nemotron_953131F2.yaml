  career_goals: Although retired from formal employment, Cheriann aims to stay intellectually active by volunteering as a mentor for undergraduate and graduate STEM students, particularly encouraging women
    and underrepresented groups. She aspires to co‑curate art‑science exhibitions at the Brea Art Gallery, integrating her love for new ideas with her scientific background. Additionally, she hopes to author
    a memoir that reflects on her career and the evolution of technology, and to serve on advisory boards for local senior programs that incorporate digital literacy and creative expression.
