personas:
  professional: An emeritus applied physicist with a knack for bridging science and the arts, Cheriann Singleton combines rigorous statistical modeling and grant‑writing expertise with a flair for curating
    interdisciplinary exhibitions and mentoring the next generation of diverse STEM scholars.
  sports: An avid supporter of the Los Angeles Dodgers and a regular participant in a local pickleball league, Cheriann Singleton joins weekly low‑impact Tai Chi sessions at the Brea senior center and enjoys
    gentle tennis matches on Saturdays with her book‑club friends to stay fit while avoiding high‑impact injuries.
  arts: Cheriann Singleton immerses herself in the cultural pulse of Southern California, frequenting premieres at the Brea Art Gallery, attending Pacific Resident Theatre productions of Sarah Ruhl, painting
    watercolors inspired by Georgia O’Keeffe’s desert palettes, and discussing Ursula K. Le Guin’s speculative worlds at her book club.
  travel: Cheriann Singleton plans her travel around seasonal cultural festivals, such as the Santa Fe Indian Market and the Portland Rose Festival, loves spontaneous weekend road trips along the Pacific
    Coast Highway to explore coastal art fairs, yet balances these adventures with a modest budget that still prioritizes occasional visits to her adult children’s homes in Texas.
  culinary: Cheriann Singleton delights in herb‑laden cooking, often preparing rosemary‑roasted chicken accompanied by heirloom tomato and rose‑petal salads, savoring a cup of Earl Grey with a splash of
    almond milk while strolling the local farmers market, and occasionally indulging in a fresh sashimi platter at the neighborhood Japanese bistro.
  core: Cheriann Singleton is a curiosity‑driven, talkative 72‑year‑old who marries scientific rigor with artistic flair, channeling her anxieties into meticulous planning of cultural ventures while never
    missing a chance to be the lively heart of any gathering.
background:
  cultural: Cheriann identifies as a white American with Midwestern roots; her parents migrated to Southern California during the post‑World War II boom. Growing up in the 1950s and 60s, she experienced
    the social transformations of the era, fostering an appreciation for both tradition and progressive ideas. Living in Brea, Orange County, she embraces the region's multicultural vibrancy while maintaining
    values of community service, fellowship through her church, and intergenerational cooperation. Her cultural outlook blends classic American stewardship with an openness to diverse artistic and intellectual
    expressions.
