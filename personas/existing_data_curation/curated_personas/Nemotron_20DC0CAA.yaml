personas:
  professional: Kaitlin Karpf is a clinical social worker in Charleston who blends trauma‑informed practice with meticulous documentation, leveraging motivational interviewing to empower clients while flexibly
    adapting treatment plans to the nuances of low‑country community dynamics.
  sports: Kaitlin Karpf regularly jogs the coastal trails of the Lowcountry with the Charleston Running Club, follows the Charleston Battery soccer team, enjoys early‑morning yoga sessions at a local studio,
    and participates in weekend bird‑watching hikes that double as low‑impact cardio.
  arts: Kaitlin Karpf finds solace in literary fiction, devouring works by Toni Morrison and Zadie Smith, curates a modest vinyl collection featuring jazz legends like Wynton Marsalis and folk singer Natalie
    Merchant, and attends intimate storytelling evenings at the Charleston Cultural Center that celebrate Gullah narratives.
  travel: Kaitlin Karpf prefers low‑key, purpose‑driven travel, returning annually to the historic streets of Savannah and the tranquil marshes of Beaufort, while planning a future solo trip to Belize’s
    rainforest reserves for bird‑watching and a brief stint at a New Orleans jazz festival to absorb cultural rhythm.
  culinary: Kaitlin Karpf enjoys cooking low‑country inspired meals with a health‑conscious twist, frequently preparing shrimp and grits topped with garden‑grown basil, collard greens sautéed with garlic,
    and quinoa salads dressed with lemon‑thyme vinaigrette, and delights in sourcing fresh oysters from the Saturday farmers market.
  core: Kaitlin Karpf blends a quiet, reflective nature with a steadfast commitment to community health, balancing meticulous professional standards with a love for low‑country traditions, mindful self‑care,
    and purposeful, socially conscious living.
background:
  cultural: Kaitlin is a white Southern, raised in a close‑knit community near Charleston. Her upbringing emphasized Southern hospitality, respect for tradition, and a strong sense of community responsibility.
    She grew up attending a Methodist church, where values of service and compassion were reinforced. The region's rich history and diverse cultural tapestry, especially the Gullah heritage and African‑American
    community traditions, have shaped her appreciation for cultural nuance and informed her practice of culturally competent care. Kaitlin enjoys local customs such as low‑country cuisine, seasonal festivals,
    and storytelling, while also embracing progressive ideas about mental health equity and social justice. This blend of tradition and forward‑looking curiosity fuels both her personal and professional
    life.
attributes:
  skills: '["Case Management", "Crisis Intervention", "Motivational Interviewing", "Trauma-Informed Care", "Therapeutic Communication", "Community Resource Navigation", "Group Facilitation (small groups)",
    "Documentation & Compliance", "Interdisciplinary Collaboration", "Cultural Competence", "Research Literacy"]'
  hobbies: '["Reading literary fiction and psychology nonfiction", "Coastal nature walks and birdwatching", "Photography of Lowcountry landscapes", "Gardening (herbs and vegetables)", "Cooking health‑conscious
    Southern meals", "Yoga and mindfulness meditation", "Volunteering at a local animal shelter", "Hosting small dinner gatherings"]'
  career_goals: Kaitlin aims to obtain her Licensed Clinical Social Worker (LCSW) credential within the next two years and pursue advanced certification as a Certified Clinical Alcohol and Drug Counselor.
    She envisions developing a community‑based outreach program that integrates telehealth services to increase access to substance‑use treatment in rural parts of Charleston County. Long‑term, she aspires
    to a supervisory or program director role where she can mentor junior social workers, influence policy on mental health funding, and lead data‑driven initiatives that improve outcomes for underserved
    populations. Continuing education, possibly a doctoral degree in social work, remains on her horizon to deepen her expertise in health equity research.
