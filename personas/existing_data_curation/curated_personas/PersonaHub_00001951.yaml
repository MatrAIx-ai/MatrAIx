persona_description: A public health researcher who specializes in calculating the economic costs of obesity and its associated health issues. They have conducted studies that examine the impact of obesity
  on the risk of various diseases and have used computer models to estimate the costs of obesity. They have published research that shows the lifetime costs of obesity and the potential savings from weight
  loss interventions. They are aware of the potential stigma associated with obesity and the need for more resources and preventative care in the healthcare system.
