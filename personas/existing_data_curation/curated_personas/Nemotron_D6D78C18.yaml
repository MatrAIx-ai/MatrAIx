  hobbies: '[''Gardening'', ''Woodworking'', ''Reading non-fiction on technology'', ''Listening to podcasts about lean processes'', ''Bowling league'', ''Poker nights'', ''Volunteer computer skills workshop'',
    ''Hiking in Suisun Marsh'']'
  career_goals: Penny aims to leverage her hands‑on experience into a supervisory role within the next two to three years. She plans to obtain an OSHA certification and a Lean Six Sigma Yellow Belt through
    evening courses at Solano Community College, with the long‑term goal of advancing to a process‑improvement specialist position. Additionally, she seeks to increase her earning potential to secure greater
    financial stability after her divorce, including paying off her mortgage and building a modest investment portfolio. Outside of formal credentials, Penny intends to mentor newer machine operators, champion
    small‑scale efficiency projects on the shop floor, and eventually explore the possibility of a side business refurbishing used industrial equipment.
