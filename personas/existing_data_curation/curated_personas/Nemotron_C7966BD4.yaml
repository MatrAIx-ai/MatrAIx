  career_goals: Although Edwin is currently not in the formal workforce, he aims to channel his curiosity and organizational strengths into deeper involvement with the local arts community. He plans to
    volunteer as a docent and occasional curator at the Azusa Community Museum, leading workshops that introduce art appreciation to seniors and youth. He also hopes to launch a modest side venture selling
    handcrafted wooden furniture and decorative pieces, using his woodworking expertise. Additionally, Edwin aspires to mentor younger volunteers, sharing his experience in event coordination and fostering
    inclusive community projects.
