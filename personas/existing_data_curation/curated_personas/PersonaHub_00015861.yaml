persona_description: An irrigation engineer who specializes in the assessment and management of water scarcity in major irrigation projects, particularly in India. They have expertise in integrating data
  from canal release records, census statistics, and satellite imagery to analyze the impact of water supply shocks on cropping patterns and land use in a major irrigation project. They are interested in
  developing strategies to mitigate the effects of water supply shocks on cropping patterns and rural livelihoods and improving the water distribution efficiency of the canal network during normal years.
