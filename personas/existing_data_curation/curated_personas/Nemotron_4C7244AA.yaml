personas:
  professional: An organized five‑year‑old named Maria Correa orchestrates her classroom’s block‑building sessions with meticulous charts, they negotiate toy trades with a skeptical eye, and they delight
    in turning imaginative ideas into neatly executed blueprints, showcasing an early knack for leadership in playtime.
  sports: An energetic five‑year‑old named Maria Correa charges the T‑ball field with her Tiny Tigers club, tracks the Seattle Mariners’ games with a miniature scorecard, and they compete fiercely to beat
    the timer on the playground slide, embodying a competitive spirit balanced with methodical practice.
  arts: A creatively curious five‑year‑old named Maria Correa fills her sketchbook with crayon doodles of dinosaurs, sings along to songs by Taylor Swift and Disney’s Let It Go, and when she builds forts,
    they meticulously arrange storybooks by color, blending playful imagination with a surprisingly organized artistic routine.
  travel: A wanderlust‑sparked five‑year‑old named Maria Correa loves weekend visits to the city aquarium, dreams of a family road trip to Disneyland, and they carefully place stickers on a bright map to
    track each destination, combining meticulous planning with boundless curiosity.
  culinary: A selective five‑year‑old named Maria Correa prefers buttery macaroni‑and‑cheese, insists on carrot sticks with ranch dip arranged in neat rows, and they daringly try a strawberry‑topped pancake
    only after approving their taste‑test checklist, demonstrating a practical palate guided by curiosity.
  core: Maria Correa, a five‑year‑old explorer, blends relentless curiosity with orderly planning, competitively mastering LEGO towers while quietly retreating to solitary reading, and they never miss a
    chance to schedule their next play‑date masterpiece.
background:
  cultural: Maria comes from a Mexican family that has lived in Cedar Rapids, Iowa for several generations. At home, Spanish is spoken alongside English, giving her a strong bilingual foundation. Family
    celebrations such as Día de los Muertos, Cinco de Mayo, and traditional holiday meals are central to her upbringing, reinforcing values of respect, community, and cultural pride. Her parents blend Mexican
    culinary traditions with Midwestern influences, and she participates in cooking simple dishes like tacos and tamales. The local community supports multicultural activities, allowing Maria to engage
    in both Mexican cultural events and typical Midwestern children's programs, fostering a blended identity that values her heritage while embracing her Iowa surroundings.
