  career_goals: Even at five, Maria has vivid dreams about her future. She imagines becoming a veterinarian because she loves caring for animals and wants to protect the pets in her neighborhood. Her curiosity
    about how things work often leads her to picture herself as an engineer or architect, designing bridges and buildings she sees in picture books. She also feels a strong connection to her family's Mexican
    culinary traditions and hopes to be a chef who can blend those flavors with new ideas. In school, she aspires to be class monitor, leading group projects and setting clear goals, reflecting her competitive
    spirit and organized nature.
