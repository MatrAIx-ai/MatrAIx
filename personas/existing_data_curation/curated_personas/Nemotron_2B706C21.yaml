personas:
  professional: George Cruz is an aspiring architect who loves constructing complex LEGO sets, applies methodical planning and attention to detail to every build, and thrives on the predictable structure
    of design blueprints.
  sports: George Cruz loves playing soccer with the Brookside Youth Soccer Club, eagerly follows Manchester United matches, and also enjoys watching the Golden State Warriors for inspiration while maintaining
    a disciplined practice schedule that fits their need for predictability.
  arts: George Cruz nurtures a love for the arts by practicing piano pieces by Ludwig van Beethoven such as Für Elise, listening to the whimsical scores of John Williams, and immersing themselves in illustrated
    adventure novels by authors like Jules Verne, fueling a vivid imagination.
  travel: George Cruz enjoys family road trips to Grand Canyon National Park and Yellowstone, eagerly anticipates a future summer vacation to Tokyo’s technology district, and prefers itineraries with a
    clear schedule, a daily hike, and a predictable bedtime while budgeting allowance for occasional ice‑cream stops.
  culinary: George Cruz favors classic kid‑friendly dishes such as pepperoni pizza, spaghetti with meatballs, and peanut‑butter‑jelly sandwiches, enjoys helping bake chocolate chip cookies using butter
    and dark chocolate chips, and methodically arranges his plate so broccoli florets are tucked neatly beside carrot sticks.
  core: George Cruz is a meticulously organized seven‑year‑old who balances a love for LEGO architecture with a disciplined savings strategy, a structured soccer routine, and a habit of rehearsing piano
    scales precisely at bedtime.
background:
  cultural: George was raised in Salem, Ohio, a small Midwestern town in Mahoning County. His family practices a typical Midwestern white American lifestyle, emphasizing community involvement, church activities,
    and local traditions such as county fairs and holiday celebrations. He grew up attending a public elementary school that values punctuality, teamwork, and respect for rules, reflecting the region's
    cultural emphasis on reliability, modesty, and hard work.
attributes:
  skills: '[''Reading comprehension'', ''Basic addition and subtraction'', ''Organizing personal space'', ''Following routines'', ''LEGO construction'', ''Basic piano playing'', ''Following multi-step instructions'']'
