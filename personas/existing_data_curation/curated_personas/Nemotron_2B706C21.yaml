  career_goals: George dreams of becoming an engineer or architect because he loves building things and solving problems. He also expresses interest in becoming a teacher someday, hoping to share his love
    for learning and help classmates. In the short term, he aims to earn top grades in school, win a local science fair, and learn a new piano piece every month.
