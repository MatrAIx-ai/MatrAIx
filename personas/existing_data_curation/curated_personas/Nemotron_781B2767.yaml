  hobbies: '[''Painting'', ''Sketching'', ''Woodworking'', ''Attending art festivals'', ''Volunteer construction projects'', ''Church choir singing'', ''Listening to classic rock and country music'', ''Dancing
    Texas two‑step'', ''Reading art history and architecture books'', ''Camping'', ''Barbecue cooking'', ''Watching rodeos'']'
  career_goals: David aspires to move from laborer to foreman and eventually obtain a general contractor’s license, focusing on residential remodels that blend functional construction with artistic design
    elements. He dreams of launching a boutique renovation business that prioritizes green building methods and custom aesthetic touches, providing his family with financial security while preserving time
    for his creative pursuits. Additionally, he hopes to mentor younger workers, lead community build‑outs, and perhaps teach workshops on innovative construction techniques, using his imaginative mindset
    to inspire others.
