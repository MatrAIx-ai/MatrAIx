  career_goals: Hebetallah aims to advance to a supervisory role within the store, such as shift manager, where she can formalize her training responsibilities and contribute to operational efficiency.
    She plans to complete a short certification in retail management and finish her associate’s degree in business administration, leveraging her some‑college experience. Long‑term, she hopes to secure
    a stable part‑time schedule that allows her to continue earning while preparing for retirement, and to volunteer her expertise in employee onboarding at a community college or local nonprofit. Her goals
    are realistic, structured, and aligned with her preference for routine and practical achievement.
