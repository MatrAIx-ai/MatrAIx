personas:
  professional: An aspiring digital storyteller, Darline Owens channels their curiosity and love of fantasy into creating animated narratives on Scratch, blending watercolor sketches with coding and showing
    a relaxed, sometimes disorganized approach to project timelines.
  sports: An enthusiastic outdoor explorer, Darline Owens spends weekends hiking the streams near Marengo, occasionally joins the town’s youth soccer league to chase a ball with friends, roots for the Iowa
    Hawkeyes basketball team, and loosely follows a simple home‑stretch routine of jumping jacks and water‑bottle lifts whenever a rainy day curtails outdoor play, but they often forget to bring a water
    bottle.
  arts: A budding visual storyteller, Darline Owens fills sketchbooks with watercolor scenes inspired by Studio Ghibli’s Hayao Miyazaki, sketches fan‑art of characters from the graphic novel "Saga", and
    composes simple piano arrangements echoing Yiruma’s "River Flows in You", while they occasionally lose track of deadlines for library art workshops.
  travel: A curious wanderer, Darline Owens relishes weekend family trips to the nearby Maquoketa State Park to collect leaves, has celebrated a birthday at Disneyland in Anaheim, and daydreams about exploring
    the ancient forests of Białowieża in Poland or wandering the Shibuya district of Tokyo next summer, though planning is often spontaneous due to their relaxed approach to scheduling.
  culinary: A budding kitchen experimenter, Darline Owens enjoys crafting colorful fruit‑topped pancakes with blueberries, strawberries, and a drizzle of honey, whipping up simple veggie‑filled quesadillas
    for after‑school snack, and eagerly devours pepperoni pizza slices with extra cheese, though they often neglect to finish their veggies and occasionally sneak extra cookies before dinner.
  core: A whimsical, worry‑prone dreamer, Darline Owens constantly balances sketchbooks and spreadsheets of allowance, occasionally misplaces homework while chasing squirrels in the woods, and they find
    comfort in humming piano melodies during thunderstorms.
background:
  cultural: Darline is a white Midwestern American raised in Marengo, a small community in Delaware County, Ohio. Her family participates in typical regional traditions such as celebrating Thanksgiving,
    Halloween, and community events like the county fair. She attends a public elementary school where she benefits from an arts‑focused curriculum and community programs at the local library and recreation
    center. The cultural atmosphere emphasizes community involvement, modesty, and a strong appreciation for nature and local history, which shape her values and interests.
attributes:
  skills: '[''Reading comprehension'', ''Creative writing'', ''Sketching'', ''Watercolor painting'', ''Digital illustration (tablet)'', ''Basic Scratch programming'', ''Beginner piano'', ''Collaborative
    project participation'', ''Creative problem solving'', ''Class discussion participation'']'
  hobbies: '[''Sketching'', ''Watercolor painting'', ''Reading fantasy and graphic novels'', ''Writing short stories'', ''Nature walks and journaling'', ''LEGO building'', ''Scratch programming'', ''Beginner
    piano'', ''Minecraft'', ''Attending library art workshops'']'
  career_goals: Inspired by her love for art and curiosity about how things work, Darline hopes to become a visual storyteller—perhaps a comic book illustrator, a video‑game designer, or an environmental
    documentary filmmaker. She is also fascinated by science and wishes to study environmental science to help protect the local parks she explores. While school can feel overwhelming at times, she aims
    to attend a high school with strong arts and science programs, eventually pursue a college degree that blends creativity with technology, and work in a role that lets her create meaningful visual narratives
    while contributing to community well‑being.
