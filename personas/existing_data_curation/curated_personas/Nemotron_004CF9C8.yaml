personas:
  professional: Odeal Cox is a retired community archivist and mentor who leverages their humanities background, watercolor painting, and quilting expertise to organize oral‑history workshops, curate local
    exhibits, and guide young artists in Saint Francisville, balancing meticulous planning with a flexible, compassionate approach.
  sports: Odeal Cox enjoys strolling the historic streets of Saint Francisville and participates in a senior walking group that meets weekly, follows the LSU Tigers football season passionately, and attends
    occasional community softball games, but avoids vigorous competition, preferring gentle exercise that complements their quilting sessions.
  arts: Odeal Cox finds peace painting the Mississippi River’s sunrise in watercolors, creates intricate quilts echoing traditional patterns, enjoys the soulful sounds of Ella Fitzgerald and B.B. King,
    reads Southern historical fiction by authors such as Tayari Jones, and shares these passions at intimate church choir rehearsals and local art fairs.
  travel: Odeal Cox favors curated, relaxed road trips to historic towns like Natchez, Mississippi and New Orleans, planning each itinerary on paper with stops at plantation museums and family‑run cafés,
    while balancing a modest travel budget that prioritizes cultural enrichment over luxury accommodations.
  culinary: Odeal Cox loves preparing Creole classics like gumbo and jambalaya using home‑grown okra, basil, and thyme, delights in the comforting aroma of smoked sausage simmering on Sundays, and occasionally
    over‑seasones dishes with a generous dash of cayenne, reflecting their bold yet nostalgic palate.
  core: Odeal Cox is a curious, compassionate elder who weaves art, history, and community mentorship into daily life, balancing disciplined budgeting with indulgent culinary splurges, and embraces solitary
    creativity tempered by warm, small‑group gatherings.
background:
  cultural: Odeal is an African-American woman rooted in the deep cultural tapestry of rural Louisiana. Her family’s lineage stretches back to enslaved ancestors who cultivated the land of West Feliciana
    Parish and later to sharecroppers who sustained the community through the civil-rights era. Growing up in Saint Francisville, she was immersed in the traditions of Southern hospitality, the rhythmic
    oral storytelling of her elders, and the vibrant expressions of Creole cuisine and gospel music. Her upbringing in a close-knit church community reinforced values of compassion, cooperation, and collective
    resilience. These experiences shape her reverence for Black heritage, her commitment to preserving local histories, and her celebration of artistic forms—especially quilting, music, and culinary arts—that
    have long been pillars of her cultural identity.
