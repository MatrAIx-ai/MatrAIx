  career_goals: Although retired from formal employment, Odeal aims to leave a lasting cultural legacy in Saint Francisville. She plans to compile and publish a memoir that weaves her personal experiences
    with the broader Black history of West Feliciana Parish. She hopes to establish a small community archive and scholarship to support local high-school students pursuing the arts and humanities. Additionally,
    she seeks to mentor emerging artists and storytellers, helping them develop confidence and creative voice while fostering intergenerational harmony.
