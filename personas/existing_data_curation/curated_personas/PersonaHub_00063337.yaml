persona_description: A historian and cultural anthropologist who specializes in the study of African history and culture, particularly the Turudbe' Fulbe' people. His research interests include the survival
  of Turudbe' Muslim descent in the Diaspora of the Americas, the continuity of identity constructs in the face of oppression and trauma, and the historical consciousness that sustains a people's identity.
  He is a passionate advocate for the rights and well-being of the Turudbe' people and is committed to preserving their cultural heritage and promoting their cultural identity.
