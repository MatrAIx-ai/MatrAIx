  hobbies: '[''Sketching'', ''Watercolor painting'', ''Scale model railway building'', ''Science fiction reading'', ''LEGO architecture'', ''Ambient music listening'', ''Meditation'', ''Cooking traditional
    South Asian meals'', ''Woodworking'']'
  career_goals: Amin aims to obtain his Journeyman plumber certification within the next year and eventually earn a Master plumber license. His long‑term ambition is to launch a boutique plumbing service
    that specializes in bespoke, artistically inspired pipe installations for residential and small‑scale commercial projects—merging his trade expertise with his love for abstract art. He also hopes to
    mentor apprentices, passing on both technical skills and his creative problem‑solving mindset, while gradually shifting toward a more predictable schedule that affords him additional solitary creative
    time.
