    staff'']'
  hobbies: '[''Visiting art museums (Chrysler Museum of Art)'', ''Attending small gallery talks and art openings'', ''Black‑and‑white photography of Norfolk waterfront'', ''Woodworking projects (custom
    picture frames)'', ''Fishing in Chesapeake Bay'', ''Birdwatching at wildlife refuges'', ''Volunteer logistics for community garden'']'
  career_goals: Looking ahead, Jeffrey aims to transition from hands‑on material moving to a supervisory or safety‑coordination role within the next five years. He plans to earn a Certified Safety Professional
    (CSP) credential and complete an OSHA 30‑hour training course to formalize his safety expertise. His ambition is to become a lead safety officer or shift supervisor, where he can apply his practical
    experience to improve workplace safety, streamline logistics processes, and mentor younger workers. He also hopes to eventually reduce the physical demands of his job by moving into a logistics planning
    position that leverages his knowledge of the Norfolk port’s operations while allowing more stable hours for his family.
