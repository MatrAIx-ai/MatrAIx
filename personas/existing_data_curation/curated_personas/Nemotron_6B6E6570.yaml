personas:
  professional: Luis Rosario, an emerging graphic designer and community arts coordinator, wields Adobe Photoshop, Illustrator, and InDesign to craft visually striking nonprofit campaigns that fuse motifs
    inspired by traditional Mexican art with modern aesthetics, while their curiosity and meticulous time‑management keep projects both innovative and reliably delivered.
  sports: Luis Rosario, a casual basketball enthusiast who joins Saturday pick‑up games at the local community center and cheers for the Philadelphia Eagles in the fall and the Philadelphia 76ers during
    the NBA season, prefers low‑impact cardio like jogging in Fairmount Park to stay fit while balancing their hectic studio schedule.
  arts: Luis Rosario, a devoted sketcher and painter, draws inspiration from the vibrant murals of Philadelphia’s Wynnefield neighborhood, the graphic storytelling of *Saga* and *Monstress*, and the eclectic
    sounds of indie acts like Tame Impala alongside Latin singers such as Rosalía, channeling this blend into their own mixed‑media pieces and community workshops.
  travel: Luis Rosario, an adventurous yet budget‑conscious traveler, has explored the street art scene of Mexico City during a summer exchange, trekked the historic alleys of Oaxaca’s markets, and longs
    to experience Tokyo’s Akihabara for its manga culture, always planning trips around semester breaks and using student discounts to stretch their modest savings.
  culinary: Luis Rosario, a self‑taught home cook with intermediate skill, loves preparing authentic tacos al pastor with pineapple‑glazed pork, chipotle‑marinated carne asada, and hand‑pressed corn tortillas,
    while also experimenting with churro‑infused doughnuts and pairing them with artisanal Mexican coffee brewed with chicory, often sharing the dishes during community art events.
  core: Luis Rosario, a 19‑year‑old visual storyteller, balances restless creativity with a tendency to over‑worry, often channeling late‑night anxieties into sketchbooks and espresso‑fuelled design sprints.
background:
  cultural: Luis grew up in a bilingual Mexican‑American household in Philadelphia, where Spanish was spoken at home and English at school. He maintains strong ties to Mexican traditions such as Día de
    los Muertos and family gatherings, while actively participating in the city’s vibrant Latino community. His cultural identity blends Mexican customs—food, music, and celebrations—with the urban arts
    scene of Philadelphia, shaping his appreciation for diverse artistic expressions and his commitment to fostering cultural pride among peers.
attributes:
  skills: '[''Bilingual Spanish-English'', ''Graphic Design (Adobe Photoshop, Illustrator, InDesign)'', ''Digital Illustration'', ''Photography'', ''Social Media Content Creation'', ''Written Communication'',
