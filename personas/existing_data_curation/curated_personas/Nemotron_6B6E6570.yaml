  hobbies: '[''Sketching and painting'', ''Visiting local galleries and street murals'', ''Listening to indie and Latin music'', ''Cooking traditional Mexican dishes'', ''Reading graphic novels'', ''Playing
    narrative-driven video games'', ''Journaling for stress management'', ''Volunteering at youth arts programs'']'
  career_goals: Luis plans to finish a Bachelor’s degree in Graphic Design or Visual Communication and later pursue a Master’s in Arts Administration. His ambition is to become a creative director for culturally
    focused nonprofit campaigns and to lead community‑based art programs that celebrate Mexican heritage. He hopes to build a portfolio that blends traditional Mexican motifs with contemporary design, mentor
    underrepresented youth in the arts, and use his creative work to raise awareness about mental‑health challenges among young adults.
