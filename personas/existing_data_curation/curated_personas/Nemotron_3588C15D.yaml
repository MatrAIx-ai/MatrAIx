  career_goals: Even in retirement, Gavan aims to leave a lasting cultural imprint on Greenwood. He plans to curate a series of intergenerational art workshops that blend traditional crafts with contemporary
    expression, and to write a memoir that captures his personal journey alongside the changing face of rural Arkansas. He also hopes to serve as a mentor for younger volunteers at the local historical
    society, continue speaking at community gatherings about the importance of preserving heritage, and support the town’s public library through fundraising and program development.
