persona_description: A historian and archaeologist who specializes in the study of ancient Pueblo peoples and their settlements. They have a deep understanding of the history and culture of the Ancient
  Pueblo People, specifically the Cohonina, Kayenta Anasazi, and Sinagua. They have conducted extensive research on the settlement sites scattered throughout the monument and have a keen interest in the
  environmental and cultural factors that contributed to the development and abandonment of the settlements. They are knowledgeable about the agricultural practices used by the Ancient Pueblo People, including
  the use of maize and squash, and the techniques used to harvest rainwater due to the rarity of springs. They have a passion for preserving and protecting the monument and its archaeological sites, and
  are dedicated to sharing their knowledge and expertise with the public.
