personas:
  professional: Sunil Patel, a 25‑year‑old data‑driven project lead, leverages Python, SQL, and Tableau to extract actionable insights while steering agile, cross‑functional teams with a relaxed yet collaborative
    style, and uses Lean and Six Sigma principles to push for efficiency as they pursue a Director of Operations role within five years.
  sports: Sunil Patel, an avid member of the local cricket league and regular weekend hiker at Catoctin Mountain Park, follows the Washington Nationals and the Baltimore Ravens, joins a community cycling
    club in summer, but tends to skip workouts when a hackathon deadline looms, preferring spontaneous group games over regimented training.
  arts: Sunil Patel balances kinetic art and film, joining Bharatanatyam and Bhangra workshops during cultural festivals, streaming Bollywood classics starring Shah Rukh Khan and dancing to A.R. Rahman's
    scores, and unwinding with strategy board games like Catan, though they sometimes skip local theatre outings in favor of late‑night coding sessions.
  travel: Sunil Patel fuels curiosity by visiting family in Delhi and Bangalore every few years, jet‑setting to New York City for tech conferences, road‑tripping to Asheville, and dreaming of a solo trek
    through the Scottish Highlands, preferring spontaneous itineraries over rigid planning but staying mindful of budget constraints that limit longer overseas stays.
  culinary: Sunil Patel delights in cooking traditional Gujarati dishes such as dhokla, handvo, and undhiyu, experimenting with spices like asafoetida and mustard seeds, while also hunting Frederick’s food
    trucks for kimchi tacos, savoring a perfectly roasted rosemary chicken, and maintaining a half‑hearted habit of Sunday meal‑prepping that often collapses under a weekend of board games and social gatherings.
  core: Sunil Patel, a socially energized data enthusiast aiming for senior management, blends spontaneous group fun with ambitious project leadership, yet lets a relaxed approach to planning and budgeting
    occasionally skitter their schedule.
background:
  cultural: Sunil is a second‑generation Indian American of Gujarati descent. Raised in a bilingual household, he speaks Gujarati and Hindi at home while using English in school and work. Family gatherings
    revolve around festivals such as Diwali, Navratri, and Holi, where traditional food, music, and dance are central. He is active in the local Indian cultural association in Frederick, helping organize
    cultural events and volunteering at the Hindu temple. His upbringing blends the Indian values of respect for elders, community cohesion, and academic diligence with American ideals of independence and
    openness, giving him a strong sense of cultural fluency and adaptability.
attributes:
  skills: '[''Data Analysis (Python, SQL, Tableau)'', ''Project Management'', ''Agile/Scrum Practices'', ''Team Leadership'', ''Stakeholder Management'', ''Conflict Resolution'', ''Process Improvement (Lean,
