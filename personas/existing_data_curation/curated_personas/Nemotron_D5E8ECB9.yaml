  hobbies: '[''Cricket'', ''Hiking'', ''Cooking Indian (Gujarati) cuisine'', ''Tech meetups'', ''Community volunteering (coding workshops)'', ''Bhangra dancing'', ''Travel'', ''Board games'', ''Bollywood
    movies'']'
  career_goals: Sunil aims to advance to a senior management role within the next five years, targeting a Director of Operations or Product Development position where he can shape strategy and drive innovation.
    He plans to earn a PMP certification and deepen his expertise in sustainable technology solutions. Long‑term, he envisions launching his own consultancy focused on helping mid‑size tech firms adopt
    data‑driven, agile processes while fostering inclusive workplace cultures.
