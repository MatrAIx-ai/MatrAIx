personas:
  professional: Travis Genito, a retired farmhand turned community handyman, uses their extensive carpentry, engine‑repair, and gardening know‑how to offer practical help at the church and senior center,
    even though they sometimes misplace a wrench or forget an appointment, preferring a predictable routine over strict planning.
  sports: Travis Genito enjoys early‑morning fishing on Lake Minnetonka with the local anglers club, attends Minnesota Twins baseball games when possible, and walks their dog with the senior walking group,
    keeping active without formal training.
  arts: Travis Genito finds solace in classic country radio—listening to Loretta Lynn, Dolly Parton, and Johnny Cash—while also reading large‑print books on state history and crafting birdhouses inspired
    by folk art, attending occasional community theater performances.
  travel: Travis Genito prefers short road trips to the North Shore of Lake Superior and annual family visits to Florida, planning trips loosely around family calendars and using a senior‑friendly travel
    agency, though they often forget to pack their favorite hat.
  culinary: Travis Genito favors home‑grown tomatoes, beans, and fresh basil in dishes like tomato basil soup and herb‑infused roasted chicken, enjoys cooking simple casseroles, and can expertly grill the
    fish they catch, but they sometimes forget to season the vegetables adequately.
  core: Travis Genito embodies a self‑reliant, garden‑loving craftsman who balances structured routines with occasional forgetfulness, finding peace in fishing, woodworking, and classic country melodies.
background:
  cultural: Travis was raised in a predominantly white, Midwestern farming community in Minnesota, with roots in German and Scandinavian ancestry that are common in the region. His upbringing was steeped
    in Lutheran values of modesty, hard work, and community responsibility. The seasonal cycles of planting, harvesting, and harsh winters have shaped his pragmatic outlook and appreciation for self‑sufficiency.
    Local traditions such as county fairs, church potlucks, and community volunteer projects have reinforced a collective spirit, while the quiet, spacious landscape has nurtured his preference for structure
    balanced with flexibility.
