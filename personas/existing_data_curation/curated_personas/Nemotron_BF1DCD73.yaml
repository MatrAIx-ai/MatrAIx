  career_goals: Even at 85, Travis aims to stay as independent as possible, maintaining his home and property without relying heavily on external services. He wishes to continue contributing to his church
    and senior center by offering practical help and sharing his life experiences with younger community members. He also hopes to learn to use a tablet for video calls with distant relatives, ensuring
    he remains connected with family. Ultimately, his ambition is to leave a legacy of self‑reliance, community service, and simple, reliable craftsmanship.
