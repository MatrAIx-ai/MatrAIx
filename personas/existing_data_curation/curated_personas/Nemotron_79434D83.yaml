  hobbies: '[''Reading technical manuals'', ''Model train building'', ''Engine repair'', ''Fishing'', ''Gardening'', ''Chess'', ''Cooking Guatemalan dishes'', ''Mindfulness walks'']'
  career_goals: Looking ahead, Pablo aims to transition from first‑line supervisor to plant manager within the next five years. He plans to earn a Six Sigma Green Belt and pursue certified lean practitioner
    training to formalize his improvement expertise. His ambition includes implementing a plant‑wide productivity program that reduces waste by at least 15% while maintaining safety standards, positioning
    his facility as a benchmark in the region. He also seeks greater stability and higher compensation to support his growing family, and eventually hopes to own a small, family‑run manufacturing workshop
    that blends Guatemalan artisanal techniques with modern production methods.
