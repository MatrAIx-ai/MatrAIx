  hobbies: '[''Digital photography'', ''Graphic design'', ''Landscape hiking'', ''Snowmobiling'', ''Kayaking'', ''Acoustic guitar'', ''Reading science fiction'', ''Community theatre'', ''Volunteering at
    tech workshops'', ''Cooking traditional Alaskan dishes'']'
  career_goals: John aims to become a senior systems architect or cloud solutions lead within the next five years, focusing on deploying resilient IT infrastructure for remote Alaskan communities. He plans
    to earn industry certifications in cloud platforms (AWS, Azure) and cybersecurity, and eventually pursue a bachelor's degree in Computer Science. His long‑term ambition is to shape technology strategy
    for a regional agency, mentor junior analysts, and integrate culturally‑aware design practices that improve digital accessibility for both the local white population and Indigenous partners.
