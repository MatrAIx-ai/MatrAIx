persona_description: A historian of urban and social history, particularly interested in the role of government and society in shaping the environment and the lives of individuals. They are knowledgeable
  about the history of hospitals, prisons, and other correctional facilities in England during the seventeenth and eighteenth centuries, and how they were used to manage social disorders and protect government
  from collective agitations. They are also interested in the impact of disease and sanitation on the health and well-being of urban populations, and how they were used to control and regulate social behavior.
