persona_description: A researcher and expert in satellite communication security, particularly in the area of on-board encryption. They have a background in cryptography and have conducted research on the
  adoption of the Rijndael (AES) algorithm for use on satellites, as well as the challenges and solutions related to implementing AES on resource-constrained platforms like small satellites. They have experience
  in developing reliable software and FPGA-based implementations of the AES algorithm, and have presented their findings at conferences and published their work in journals. They are knowledgeable about
  the security threats posed by unauthorized access to satellite data and the increasing demand for secure satellite communication.
