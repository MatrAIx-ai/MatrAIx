personas:
  professional: Kristen Franco is a community health program analyst who melds rigorous statistical modeling in R and Python with compassionate case management; they apply their balanced curiosity and practicality
    to translate data insights into actionable service designs, while their cooperative yet assertive style keeps cross‑disciplinary teams organized yet flexible.
  sports: Kristen Franco enjoys hiking the Shenandoah trails with the local Shenandoah Hiking Society, practices yoga at a downtown studio, follows the Washington Capitals and Washington Wizards, and in
    spring joins a community cycling club for weekend rides, balancing seasonal outdoor activity with regular fitness routines.
  arts: Kristen Franco immerses themselves in community theater productions—often performing in plays by August Wilson—while listening to folk artists like Brandi Carlile and exploring visual art at local
    galleries featuring works by Georgia O’Keeffe, a blend that enriches their reflective journaling and photography.
  travel: Kristen Franco favors road‑trip adventures that combine nature and history, having explored the Blue Ridge Parkway, the historic streets of Williamsburg, and a weekend getaway to Asheville, while
    dreaming of a cultural pilgrimage to Athens, Greece, planning trips with a mix of detailed itineraries and spontaneous detours.
  culinary: Kristen Franco is an avid home baker who excels at sourdough and rosemary focaccia, enjoys cooking seasonal vegetable ratatouille with heirloom tomatoes, fresh basil, and goat cheese, and often
    dines at farm‑to‑table spots like The Plough, yet they sometimes over‑proof dough when juggling a busy workday.
  core: Kristen Franco blends analytical precision with community compassion, balancing structured data work and spontaneous creativity, while occasionally neglecting routine self‑care tasks amid their
    drive to impact rural mental‑health outcomes.
background:
  cultural: Kristen is a 33‑year‑old white American raised in suburban Spotsylvania County, Virginia. Her family emphasizes education, community service, and Southern hospitality, with traditions such as
    church gatherings, local fairs, and holiday meals featuring regional dishes like barbecue and collard greens. Growing up near historic sites, she developed an appreciation for Virginia’s history and
    participates in a local historical society. Her STEM education fosters a rational, evidence‑based perspective, while her work in human services broadens her cultural awareness and commitment to inclusivity.
    She values a blend of traditional Southern values and progressive, data‑driven approaches to societal challenges.
attributes:
  skills: '[''Data analysis (Excel, SPSS, R)'', ''Statistical modeling for program evaluation'', ''Research design and methodology'', ''Case management'', ''Client assessment and advocacy'', ''Crisis intervention'',
