    ''Knowledge of state and federal social service regulations'', ''Community outreach facilitation'', ''Organizational and time-management skills'']'
  hobbies: '[''Hiking on Shenandoah trails'', ''Vegetable gardening'', ''Reading science, psychology, and history books'', ''Volunteering at a local shelter'', ''Participating in a book club'', ''Attending
    community theater'', ''Yoga practice'', ''Artisanal bread baking'', ''Listening to neuroscience and social policy podcasts'', ''Journaling'', ''Photography'']'
  career_goals: Kristen aims to transition into a program management role where she can lead data‑driven community health initiatives. She plans to earn a Master’s degree in Public Health or Social Work
    to deepen her expertise in population health and policy. Over the next five years, she aspires to become a certified project manager and supervise a multidisciplinary team that designs and evaluates
    evidence‑based social service programs. Long‑term, she envisions founding a nonprofit focused on mental‑health outreach in rural Virginia, leveraging technology to improve access and outcomes.
