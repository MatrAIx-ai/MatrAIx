  hobbies: '[''Gardening (perennial flowers)'', ''Reading historical fiction'', ''Chinese calligraphy'', ''Cooking traditional dishes'', ''Hiking small-group trails in Loudoun County'', ''Yoga and Tai Chi'',
    ''Crossword puzzles and Sudoku'', ''Volunteer financial-literacy workshops'']'
  career_goals: Approaching retirement, Liping aims to solidify her legacy by establishing a structured mentorship program for emerging finance professionals within her organization and to serve as a senior
    financial advisor during the transition to a new CFO. She also seeks to earn a Certified Financial Planner (CFP) designation to deepen her capacity for personal and community financial guidance. While
    maintaining a manageable workload to mitigate stress, she plans to consult on risk-management frameworks that enhance organizational resilience and to contribute her expertise to non-profit financial-literacy
    initiatives for seniors in Loudoun County.
