persona_description: A teacher who teaches courses on international relations, Native American studies, and world history, and who aims to create a democratic classroom environment where students can express
  diverse perspectives and positions on political and social issues. The teacher is committed to teaching students to evaluate and critically think about different viewpoints, and is skilled in devising
  strategies to maintain and create a democratic classroom environment. The teacher is also knowledgeable about the negative consequences of ethnocentrism and the importance of engaging in complex and variegated
  discussions about cross-cultural relations.
