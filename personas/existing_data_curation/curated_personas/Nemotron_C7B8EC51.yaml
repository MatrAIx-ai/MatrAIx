  hobbies: '[''reading non-fiction'', ''podcast listening'', ''urban gardening'', ''model kit building'', ''puzzle solving'', ''hardware tinkering'', ''custom PC building'', ''home automation'', ''journal
    writing'', ''photography'', ''poetry'']'
  career_goals: Christopher aims to re-enter the workforce by completing an apprenticeship in electrical work, leveraging his hands-on repair experience and his methodical problem-solving style. He hopes
    to earn a journeyman electrician license within the next three years, allowing him to start his own small-scale contracting business that serves residents of the Bronx who need reliable, affordable
    home-repair services. Parallel to this, he plans to obtain a GED and enroll in community college courses on sustainable urban agriculture, with the eventual goal of integrating a rooftop garden service
    into his contracting work. He is also interested in mentoring youth from his neighborhood, sharing practical skills and encouraging self-reliance.
