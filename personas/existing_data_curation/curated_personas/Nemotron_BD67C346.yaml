personas:
  professional: Lonnie Robbins, a 37‑year‑old tech CEO, leads their sustainable‑technology firm with a strategic, data‑driven approach, leveraging their engineering analytical mindset and competitive drive,
    and they balance curiosity about emerging AI and renewable energy with methodical, reliable execution and mentorship.
  sports: Lonnie Robbins, a 37‑year‑old who enjoys weekend trail runs and seasonal skiing, follows the Minnesota Vikings, Twins, Timberwolves, and Wild, participates in a local running club on the Mississippi
    River Trail, and they attend the Twin Cities Marathon each October, balancing a competitive spirit with a methodical training regimen.
  arts: Lonnie Robbins immerses in the Twin Cities jazz scene, performing on saxophone with the Riverfront Jazz Collective, reveling in the improvisations of John Coltrane and the modern local group The
    Bad Plus, while they also attend productions by the Jungle Theatre and collect vintage vinyl from artists like Stevie Wonder and Marvin Gaye.
  travel: Lonnie Robbins prefers carefully planned trips that blend cultural immersion and outdoor adventure, they have hiked the Rockies in Colorado, explored New Orleans’ historic Creole district, and
    they are longing to trek Patagonia’s Torres del Paine while also scheduling future visits to Kyoto’s temples and weekend getaways to Rocky Mountain National Park.
  culinary: Lonnie Robbins enjoys experimenting with New Southern cuisine, they often cook shrimp and grits with smoked paprika, collard greens stewed with ham hocks, and sweet potato soufflé, while sourcing
    heirloom okra and Creole spices from locally owned markets that celebrate cultural cuisine, and they balance this by frequenting upscale farm‑to‑table restaurants like The Bachelor Farmer for dishes
    such as beet carpaccio and fermented hot‑chocolate.
  core: Lonnie Robbins is a data‑driven tech leader who channels their curiosity, competitive edge, and community‑rooted values into sustainable innovation, jazz saxophone nights, and mentorship, while
    they occasionally overcommit to projects and neglect personal downtime.
background:
  cultural: Lonnie grew up in a middle‑class African American family in the Twin Cities, where church, community, and a strong emphasis on education shaped his values. He draws pride from the rich legacy
    of Black activists and innovators in Minneapolis, which fuels his commitment to representation in tech. He maintains close ties to the local African American cultural scene—attending jazz performances,
    cultural festivals, and supporting Black‑owned businesses. His cultural identity informs his leadership style, emphasizing mentorship, collective uplift, and an awareness of systemic challenges faced
    by the community.
attributes:
  skills: '["Strategic Leadership", "Financial Planning & Analysis", "Product Development", "Data‑Driven Decision Making", "Risk Management", "Organizational Design", "Stakeholder Communication", "Change
    Management", "Negotiation", "Public Speaking", "Mentorship", "Emerging Technology Evaluation"]'
  hobbies: '["Reading non‑fiction (biographies, African American history)", "Playing saxophone in a jazz ensemble", "Hiking and trail walking", "Mentoring STEM outreach program", "Community forums on equity
    in tech", "Gourmet cooking (New Southern cuisine)", "Collecting vintage vinyl records"]'
  career_goals: Lonnie aims to expand his company’s market footprint nationally and eventually globally, positioning it as a leading innovator in sustainable technology solutions. He plans to launch a new
    line of AI‑powered energy‑management platforms within the next three years while building a corporate culture grounded in transparency and ethical governance. He also intends to mentor the next generation
    of Black tech leaders by establishing a scholarship fund and a mentorship pipeline. Ultimately, he aspires to serve on the board of a Fortune 500 company and influence industry standards for responsible
    tech development.
