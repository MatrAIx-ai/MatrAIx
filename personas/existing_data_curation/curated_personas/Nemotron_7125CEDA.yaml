  career_goals: Although retired, Rashada’s current ambitions focus on maintaining independence and leaving a lasting legacy. She aims to keep her garden thriving and enter local garden contests, using
    the competitive spark to motivate herself. She plans to compile a memoir of her life and family’s migration story, preserving cultural memory for future generations. Rashada also hopes to volunteer
    at the Menifee senior center by leading a cooking workshop that showcases traditional recipes, thereby sharing her expertise and staying socially engaged. Ensuring her home remains safe, organized,
    and stress‑free is a top priority, as is staying physically active through daily walks and gentle exercise.
