  career_goals: Ka aspires to transform her passion for art and community into a sustainable career that enriches Tampa's cultural landscape. She aims to secure a part‑time position as a community arts
    coordinator or cultural liaison, where she can design and lead interdisciplinary workshops, organize multicultural festivals, and mentor emerging artists, especially those from East Asian backgrounds.
    To bolster her qualifications, she plans to obtain a certificate in arts administration within the next two years and build a freelance portfolio of illustration and graphic design projects that can
    fund her initiatives. In the longer term, Ka dreams of opening a small studio‑café that serves as a gathering space for creative expression, cultural exchange, and mindfulness practices, fostering harmony
    and artistic exploration for a diverse neighborhood.
