personas:
  professional: Luis Belaval is a certified EMT in Salt Lake City whose rapid assessment, bilingual communication, and passion for wilderness first aid blend with a curiosity‑driven yet laid‑back approach
    to shift planning, making them a dependable but occasionally improvisational lifesaver on both city streets and mountain rescues.
  sports: Luis Belaval is an avid midfielder for a local amateur soccer league who also hikes the Wasatch Range with the Wasatch Mountaineering Club, routinely watches Real Salt Lake games and follows Utah
    Jazz highlights, yet their relaxed attitude toward scheduling sometimes results in missed workouts.
  arts: Luis Belaval is a regular attendee of live shows ranging from traditional folk music from their family's region—such as mariachi and cumbia—to indie rock acts like The Strokes, and they often incorporate
    music into community health fairs, though they frequently postpone buying tickets until the last minute.
  travel: Luis Belaval enjoys spontaneous weekend road trips to Utah's national parks—like Zion, Arches, and the Great Salt Lake—while dreaming of a cultural pilgrimage to Oaxaca and a trekking adventure
    in Patagonia, yet their flexible planning style can clash with lingering worries about travel expenses.
  culinary: Luis Belaval is a confident home cook who frequently prepares tamales, pozole, and molé using fresh corn masa, dried ancho chiles, and dark chocolate, often hosting communal meals that blend
    festive celebrations with hiking friends, although they sometimes over‑season dishes when rushed.
  core: Luis Belaval is a sociable, curiosity‑driven EMT who balances high‑altitude rescues with spontaneous road trips, but their laid‑back nature and occasional anxiety make them both a compassionate
    lifesaver and an occasionally disorganized planner.
background:
  cultural: Luis is a second‑generation Mexican‑American whose parents emigrated from Jalisco. Raised in a bilingual household in Salt Lake City, he blends Mexican traditions—such as celebrating Día de
    los Muertos, family gatherings, and speaking Spanish at home—with the values and outdoor lifestyle of Utah. His Catholic upbringing emphasizes service, compassion, and community, fueling his dedication
    to emergency medical work. Luis maintains strong ties to the local Mexican community through church events, cultural festivals, and volunteer activities, which inform his commitment to providing culturally
    sensitive health services and advocating for Hispanic health equity.
attributes:
  skills: '[''EMT certification'', ''Rapid patient assessment'', ''CPR and basic life support'', ''Trauma triage'', ''Emergency medication administration'', ''Operation of defibrillators and portable medical
    equipment'', ''Effective crisis communication'', ''Team coordination under pressure'', ''Bilingual Spanish-English'', ''Wilderness first aid basics'', ''Disaster response fundamentals'', ''Empathy and
    active listening'']'
  hobbies: '[''Soccer'', ''Hiking'', ''Cooking Mexican cuisine'', ''Hosting community meals'', ''Attending live music concerts'', ''Volunteering at health fairs'', ''Participating in disaster preparedness
    drills'', ''Playing video games'', ''Reading medical journals'', ''Practicing mindfulness'']'
  career_goals: Luis aims to earn paramedic certification and obtain an associate degree in emergency medical services, followed by a bachelor’s in emergency management within the next five years. He envisions
    joining a specialized high‑altitude rescue unit in the Wasatch Range to combine his EMS expertise with his love of the outdoors. Long‑term, he hopes to develop community health outreach programs that
    improve emergency care access for underserved Hispanic populations in Utah, and to create stress‑resilience training modules for EMS personnel to address the anxiety and burnout he experiences.
