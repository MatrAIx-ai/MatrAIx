personas:
  professional: Alexandra Scott, a seasoned construction professional with over two decades of hands‑on experience in concrete mixing, scaffolding assembly, and site safety, leverages their methodical coordination
    skills and love for aesthetics to mentor crews, pursue OSHA and heavy‑equipment certifications, and lay the groundwork for a future home‑renovation business that blends practical building with artistic
    design.
  sports: Alexandra Scott, a dedicated beach walker and weekend softball enthusiast, supports the Charleston Battery soccer team and the Savannah Bananas baseball club, participates in a local kayaking
    group during summer, and maintains fitness through daily shoreline strolls and occasional yoga classes at the community center.
  arts: Alexandra Scott, an avid painter of Lowcountry seascapes inspired by the palette of Claude Monet, finds solace listening to folk artists like Gillian Welch and The Avett Brothers, crafts pottery
    while channeling the minimalist style of Maria Martinez, and frequents Bluffton’s galleries to admire works by local realist Robert Gaus.
  travel: Alexandra Scott, who prefers carefully planned, small‑group trips, delights in revisiting historic Charleston and Savannah, dreams of sketching the cliffs of Étretat in Normandy, and has recently
    explored the artisan markets of Fez, Morocco, always documenting routes and reflections in a leather‑bound travel journal.
  culinary: Alexandra Scott, a competent home chef, delights in preparing shrimp and grits with fresh Gulf shrimp, collard greens seasoned with smoked turkey, and honey‑glazed carrots harvested from their
    native‑flower garden, often plating creations on hand‑thrown pottery while experimenting with black‑eyed pea hummus.
  core: Alexandra Scott merges a pragmatic construction mindset with an artistic soul, juggling relentless worry over project deadlines with late‑night watercolor sessions, an occasional over‑indulgence
    in pottery glaze fumes, and a habit of cataloguing every garden bloom in a weather‑proof notebook.
background:
  cultural: Alexandra was raised in the Lowcountry of South Carolina, absorbing Southern hospitality, Christian community values, and the maritime heritage of Beaufort County. Her white, Southern background
    includes family traditions of seasonal gatherings, church involvement, and a reverence for the natural environment of the coastal plains. Although her formal education ended before ninth grade, she
    values practical knowledge, hard work, and the region’s cultural emphasis on self‑reliance, stewardship of historic sites, and appreciation for the arts.
attributes:
  skills: '["Concrete Mixing", "Scaffolding Assembly", "Basic Carpentry", "Drywall Installation", "Site Safety Management", "Tool Maintenance", "Heavy Equipment Operation", "Reading Simple Blueprints",
    "Team Coordination", "Problem Solving"]'
  hobbies: '["Painting Coastal Landscapes", "Visiting Local Art Galleries", "Reading Historical Fiction", "Gardening", "Beach Walks", "Journaling", "Crafting (Pottery, Wood Carving)", "Cooking for Family
    and Small Gatherings", "Volunteer Work at Historic Preservation Site", "Listening to Folk Music"]'
  career_goals: She aims to obtain OSHA and heavy‑equipment operator certifications within the next two years, advance to a foreman or crew‑lead role, and eventually launch a small home‑renovation business
    that lets her blend practical construction with her love for aesthetics. Alexandra also wants to provide a stable financial future for her family, reduce work‑related stress through better planning,
    and become a respected mentor in the local construction community.
