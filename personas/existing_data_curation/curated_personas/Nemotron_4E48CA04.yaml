  career_goals: Joshua aims to turn his passion for art and technology into a career as a video game developer or digital artist, hoping to study computer science and visual arts in college. He dreams of
    creating his own indie games that blend compelling narratives with striking visuals. In the short term, he plans to win his regional science fair, expand his portfolio of digital artwork, and perhaps
    launch a small YouTube channel showcasing game design tutorials and creative process videos. He also envisions participating in high school robotics competitions to deepen his engineering knowledge
    and eventually work at a studio that values innovative, user‑centered design.
