personas:
  professional: Joshua Baker, an aspiring digital illustrator and teen game developer, fuses a curious love of new art styles with a knack for coding in Scratch and Python, channeling their competitive
    drive into interactive story-driven games while maintaining a balanced schedule that accommodates schoolwork and weekend family gatherings.
  sports: Joshua Baker competes on the Milton Youth Basketball League, follows the Miami Heat and the Tampa Bay Buccaneers for inspiration, and bikes the local coastal trail three times a week for cardio,
    using a competitive mindset to improve shooting accuracy while occasionally skipping proper warm‑ups, which results in minor knee soreness.
  arts: Joshua Baker spends evenings sketching original superhero characters, drawing inspiration from comic legends Jim Lee and Stan Lee and the vivid animation of Hayao Miyazaki’s Studio Ghibli films,
    while attending community theater shows like A Midsummer Night’s Dream and listening to a playlist that includes Billie Eilish and Lil Nas X, allowing their curiosity and critical eye to shape a unique
    artistic voice.
  travel: Joshua Baker enjoys family road trips along the Florida Panhandle, has visited Destin’s beaches and Disney World in Orlando, and dreams of exploring Tokyo’s Akihabara district to experience anime
    culture, preferring well‑planned itineraries that balance adventure with the comfort of familiar routines.
  culinary: Joshua Baker loves the bold flavors of shrimp po'boys with tartar sauce, homemade mac and cheese topped with crispy bacon, and spicy chicken tacos seasoned with cilantro and lime, yet their
    cooking skills are limited to simple grilled cheese sandwiches and boiling pasta, often relying on their mom’s secret gumbo recipe for dinner.
  core: Joshua Baker is a curious, competitive teen who blends art, code, and gaming into a vibrant creative outlet while juggling impulsive spending and occasional screen‑time overindulgence.
background:
  cultural: Joshua grew up in Milton, a small town in the Florida Panhandle, where Southern hospitality and close‑knit community values are prominent. His family, of primarily English and German ancestry,
    embraces a mix of traditional American customs, such as weekend family gatherings, support for local high‑school sports, and participation in church youth groups. The coastal environment and proximity
    to the Gulf of Mexico influence his appreciation for outdoor activities like fishing and biking. While the area is predominantly white, exposure to nearby military families and a growing Latino community
    adds a subtle multicultural layer to his experiences, fostering an openness to diverse perspectives.
