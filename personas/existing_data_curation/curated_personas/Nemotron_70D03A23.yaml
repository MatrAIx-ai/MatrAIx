personas:
  professional: Lisa Kelley, a senior finance analyst turned strategic finance leader, leverages advanced Excel, Tableau, and SAP expertise to build rigorous budgets and forecasts while channeling their
    people-focused energy into coaching cross-functional teams, balancing a love for structure with the occasional spontaneous brainstorming session that satisfies their sociable side.
  sports: Lisa Kelley, an avid half-marathon trainee and member of the St. Louis Running Club, spends Saturday mornings hiking the Ozark Trail with family, cheers on the St. Louis Cardinals and St. Louis
    Blues, and joins a community recreational volleyball league each summer, blending competitive spirit with a love for collaborative fitness.
  arts: Lisa Kelley, a regular at The Pageant and The Delmar Hall, finds inspiration in folk-rock artists like Brandi Carlile and classic singer-songwriter Bob Dylan, while their book club explores contemporary
    fiction from authors such as Celeste Ng, and they occasionally attend productions at the St. Louis Repertory Theatre to unwind from corporate pressures.
  travel: Lisa Kelley prefers meticulously planned weekend getaways to the Great Smoky Mountains and the Missouri Ozarks, where they hike and sample local brews, yet they also dream of wandering the historic
    streets of Edinburgh and the vineyards of Napa Valley, balancing family responsibilities with a yearning for both structured itineraries and spontaneous cultural immersion.
  culinary: Lisa Kelley, a self-taught baker, delights in perfecting structured recipes like sourdough starter bread, chocolate chip cookies, and apple pie, regularly harvests heirloom tomatoes and carrots
    from their garden to toss into beet and goat-cheese salads, and savors dining at St. Louis hotspots such as Pappy's Smokehouse and The Hill's authentic Italian eateries.
  core: Lisa Kelley, a 38-year-old finance strategist who blends meticulous spreadsheet craftsmanship with marathon training, channels their sociable energy into community teaching, yet wrestles with anxiety
    that drives both their high performance and occasional caffeine-fueled overwork.
background:
  cultural: Lisa grew up in a middle‑class white family in St. Louis County, with German and Irish ancestry typical of the Midwest. The region’s cultural emphasis on practicality, hard work, and community
    service shaped her values. Her upbringing in public schools and later graduate study in education reflect the area’s respect for higher learning and civic involvement. She embraces Midwestern hospitality,
    participates in local charitable events, and values family‑centered traditions. While she identifies with mainstream American culture, she also celebrates the blend of individual achievement and collective
    responsibility that characterizes life in the St. Louis area.
