  career_goals: Lisa aims to progress to a senior finance executive role, such as Vice President of Finance or Chief Financial Officer, within the next five to seven years. She intends to lead a finance
    transformation that embeds ESG metrics and sustainable investing into the company’s strategy. Leveraging her education expertise, she plans to launch an internal financial‑literacy academy to empower
    non‑finance staff and promote inclusive career development. She also aspires to obtain CPA and CFA certifications, serve on a nonprofit board focused on youth financial education, and champion mental‑health
    resources for finance professionals, creating a more resilient and supportive workplace culture.
