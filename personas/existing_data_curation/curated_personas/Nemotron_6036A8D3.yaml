personas:
  professional: Curtis Hall, an aspiring maritime engineer, spends afternoons constructing detailed model ship kits and mapping Gulf tide charts, sharpening the analytical and hands‑on skills they hope
    to apply one day to naval design while balancing a laid‑back attitude toward school deadlines.
  sports: Curtis Hall follows the New Orleans Saints and Tampa Bay Buccaneers, participates in the Gulf Coast Junior Fishing Club, enjoys occasional beach volleyball during school PE, and squeezes in pick‑up
    basketball games on weekends, reflecting a preference for low‑impact water activities complemented by brief bursts of team sport.
  arts: Curtis Hall, a budding sketch artist, draws coastal sunsets in a battered notebook, strums acoustic renditions of Jack Johnson and Ed Sheeran during small jam sessions, collects Tamiya model ships,
    and quotes Agatha Christie while solving mystery board games with close friends.
  travel: Curtis Hall dreams of road‑tripping to the barrier islands of Texas, exploring the historic streets of New Orleans, and planning spontaneous early‑morning fishing excursions to the Florida Keys,
    all while adhering to a modest family travel budget based on saved allowance.
  culinary: Curtis Hall favors grilled Gulf snapper with lemon‑garlic butter, enjoys shrimp tacos seasoned with Old Bay and cilantro, occasionally bakes cornbread for board‑game nights, and delights in
    the salty aroma of sea‑salt crusted baked potatoes.
  core: Curtis Hall is a strategic‑thinking teen who merges a love for meticulously crafted model ships and tide‑watching with a relaxed, sometimes disorganized approach to schoolwork, often forgetting
    homework yet never missing a sunrise fishing trip.
background:
  cultural: Curtis is a White Southern teenager raised in Pensacola, Florida. His family has deep roots along the Gulf Coast, and his upbringing is shaped by the region’s fishing heritage, warm community
    ties, and the nearby Naval Air Station. He grew up attending a local Southern Baptist church, celebrating holidays with family barbecues, Fourth of July fireworks, and high school football games. Regular
    meals featuring fresh seafood, a respect for military service, and the hospitality characteristic of Southern culture are integral parts of his daily life, providing a blend of Southern practicality
    and Gulf‑coast tradition.
attributes:
  skills: '[''Basic computer hardware troubleshooting'', ''Strategic game planning'', ''Simple carpentry and boat maintenance'', ''Peer tutoring in math'', ''Conflict mediation among friends'']'
  hobbies: '[''Fishing'', ''Beachcombing & tide study'', ''Strategy video gaming'', ''Model ship building'', ''Sketching coastal landscapes'', ''Reading mystery novels'', ''Acoustic guitar playing'']'
  career_goals: Curtis aims to complete high school with a strong academic record and then pursue a vocational program in marine technology or mechanical trades. He envisions a future working as a marine
    technician at the nearby Naval Air Station Pensacola, where he can combine his practical skills with his appreciation for the Gulf Coast environment. Alongside his career path, he hopes to stay involved
    in his community by mentoring younger peers, keeping his options open for further education or apprenticeships that offer both structure and flexibility.
