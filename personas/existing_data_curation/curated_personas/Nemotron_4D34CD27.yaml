    Referral Coordination'']'
  hobbies: '[''Salsa dancing'', ''Group fitness classes (Zumba, HIIT)'', ''Cooking Vietnamese cuisine'', ''Attending indie film festivals'', ''Hiking in the Santa Monica Mountains'', ''Reading speculative
    fiction and literary novels'', ''Yoga and mindfulness meditation'', ''Improvisational theater'', ''Volunteering at local community health fairs'', ''Traveling to explore cultural heritage sites'', ''Abstract
    painting'']'
  career_goals: Hien aims to obtain her Licensed Professional Counselor (LPC) credential and soon after earn a specialization in EMDR for trauma work. She envisions opening a community mental‑health center
    in the San Fernando Valley that offers bilingual services for Vietnamese families while also providing culturally informed workshops on stress reduction. Over the next five years she plans to publish
    a guide on integrating Eastern mindfulness practices with CBT, become a recognized speaker at regional mental‑health conferences, and mentor emerging therapists from underrepresented backgrounds. Her
    competitive drive pushes her to stay at the forefront of therapeutic research and to build a reputable private practice that balances financial sustainability with community impact.
