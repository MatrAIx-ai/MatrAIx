  hobbies: '[''Fishing'', ''Gardening'', ''DIY Woodworking'', ''Country and Bluegrass Music'', ''Church Community Service'', ''Reading Historical Biographies'', ''Listening to Manufacturing and Wellness
    Podcasts'']'
  career_goals: Approaching retirement, Joel aims to leave a lasting legacy of increased efficiency and a stronger safety culture at his plant. He plans to mentor emerging supervisors, oversee the rollout
    of a modest automation pilot that balances new ideas with clear ROI, and champion sustainability initiatives that reduce waste. Ultimately, he hopes to transition into a senior regional role or consult
    on production optimization for local small‑business manufacturers, while ensuring a smooth hand‑off to his successor.
