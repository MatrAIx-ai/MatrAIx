personas:
  professional: Anisha Hines blends a solid mechanical engineering foundation with hands‑on metal and plastic fabrication expertise, leveraging CNC programming, MIG/TIG welding, and lean‑process analytics
    to lead multidisciplinary teams while channeling curiosity into sustainable additive‑manufacturing solutions and balancing meticulous organization with a flexible, competitive drive.
  sports: Anisha Hines plays on the Youngstown Co‑Ed Hoops basketball league, follows the Cleveland Cavaliers and the Chicago Sky for inspiration, hikes the Mahoning River trails on weekends, participates
    in a local rock‑climbing club at Strength Gym, and follows a hybrid training regimen of HIIT, basketball drills, and yoga to stay agile for dance rehearsals.
  arts: Anisha Hines performs with the Rhythmic Fusion dance troupe, creates metal‑art jewelry inspired by the street murals of Banksy and the bold colors of Yayoi Kusama, curates playlists featuring Janelle
    Monáe and Kendrick Lamar for rehearsals, and attends maker fairs to scout novel CNC tools and sustainable materials for artistic projects.
  travel: Anisha Hines enjoys weekend road trips to Cuyahoga Valley National Park and Hocking Hills, has a bucket‑list trip planned to Kyoto, Japan to study traditional metal‑craft techniques, dreams of
    hiking Iceland’s volcanic landscapes, and plans each trip with a blend of spreadsheet budgeting and spontaneous detours, leveraging credit‑card points to stretch a modest travel budget.
  culinary: Anisha Hines excels at cooking soul‑food classics such as smoked collard greens, fried chicken with hot‑pepper honey glaze, cornbread with jalapeño butter, and sweet‑potato pie, while also experimenting
    with fusion dishes like shrimp and grits seasoned with smoked paprika and garnished with hand‑crafted copper‑rimmed plates from their own metal‑art studio.
  core: Anisha Hines is a curious yet pragmatic engineer who balances competitive drive with community‑focused creativity, often juggling CNC projects, basketball games, and midnight metal‑jewelry sessions
    while occasionally overspending on new tools.
background:
  cultural: Anisha identifies as a Black woman whose family roots trace back to the Great Migration, bringing a blend of Southern traditions and Midwestern community values to her life in Orwell, Ohio.
    Her cultural upbringing emphasizes resilience, mutual support, and a strong sense of community, which she experiences through church gatherings, Juneteenth celebrations, and local African‑American heritage
    events. These experiences have shaped her commitment to representation and mentorship, especially in a field where women of color are under‑represented. She draws strength from the rich culinary, musical,
    and storytelling traditions of Black culture, incorporating them into family meals and social gatherings. Anisha’s cultural identity also informs her perspective on workplace equity, prompting her to
    advocate for inclusive hiring practices and to serve as a role model for aspiring Black tradespeople in the region.
attributes:
  skills: '[''CNC machining'', ''Metal fabrication'', ''Plastic injection molding'', ''SolidWorks CAD modeling'', ''MIG/TIG welding'', ''Blueprint reading'', ''Quality control (SPC)'', ''OSHA safety compliance'',
