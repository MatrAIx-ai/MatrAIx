  hobbies: '[''Community dance troupe'', ''Weekend basketball league'', ''Hiking local trails'', ''Metal‑art DIY projects'', ''Cooking soul‑food dishes'', ''STEM outreach volunteering'', ''Attending maker
    fairs'', ''Reading science‑fiction novels'', ''DIY electronics tinkering'', ''Traveling to music festivals'']'
  career_goals: Anisha aims to advance to a senior process engineer role within the next five years, where she can lead a multidisciplinary team to integrate sustainable materials and additive‑manufacturing
    methods into the plant’s workflow. She plans to earn a professional certification in advanced welding and eventually complete a Master’s in Manufacturing Engineering to deepen her expertise. Long‑term,
    she envisions opening her own custom metal‑and‑plastic fabrication studio that offers both precision parts for local manufacturers and artistic pieces for the community, while also creating apprenticeship
    opportunities for underrepresented youth, especially women of color, in the trades.
