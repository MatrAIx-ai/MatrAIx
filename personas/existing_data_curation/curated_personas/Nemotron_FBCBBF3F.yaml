  career_goals: Elio aims to earn his GED this year and then enroll in a community‑college automotive technology program to become a certified automotive technician, a field that offers clear structure
    and tangible outcomes. Parallel to that, he hopes to grow his online presence enough to earn sponsorships as a part‑time game streamer or eSports competitor, leveraging his competitive edge. Long‑term,
    he envisions a stable career that blends technical skill with flexibility, allowing him to support his family while still having time for his personal interests.
