  career_goals: Although retired from formal employment, Joy aims to deepen her impact on the Menominee community through expanded volunteer work. She plans to launch a free intergenerational art program
    at the local library, pairing seniors with schoolchildren to create collaborative murals that reflect regional history. She also wishes to mentor new teachers by offering workshops on inclusive pedagogy
    and integrating art across curricula. In the longer term, Joy hopes to advocate for mental‑health resources for older adults, organising support groups that combine storytelling, music, and mindfulness.
    Learning new digital tools for virtual teaching remains a personal ambition, allowing her to reach remote learners and share her curiosity for unconventional ideas.
