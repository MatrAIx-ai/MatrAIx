personas:
  professional: Jean Power, a seasoned home food preservationist and gardener, blends practical curiosity with a relaxed, low‑stress approach to compile a community‑focused cookbook, run a modest blog,
    sell small batches of jams at the farmer’s market, and mentor local women in budgeting and sustainable gardening while preferring behind‑the‑scenes roles at the church and historical society.
  sports: Jean Power follows the Atlanta Braves and Atlanta Falcons with quiet enthusiasm, participates in a local walking club for weekly nature‑trail treks, and treats gardening as low‑impact exercise,
    preferring gentle cardio over formal gym sessions.
  arts: Jean Power devours historical fiction by James Michener and Harper Lee, frequently listens to folk‑rock classics by Emmylou Harris, knits vintage patterns from craft books, and occasionally attends
    community‑theater productions of classic Southern plays.
  travel: Jean Power favors intentional, low‑stress trips, often weekend escapes to Savannah’s historic squares, the Blue Ridge Mountains for wildflower foraging, and dreams of a pilgrimage to England’s
    Cotswold villages to explore heirloom gardens.
  culinary: Jean Power masters Southern home cooking, transforming garden bounty into heirloom tomato jam, pickled jalapeños, peach chutney, and herb‑infused biscuits, showcasing a blend of traditional
    techniques and modest experimentation in her kitchen.
  core: Jean Power is a solitary, garden‑loving craftsperson who blends practical curiosity with relaxed planning, turning home‑grown produce into preserves while quietly mentoring her community.
background:
  cultural: Jean was raised in a traditional white Southern family in Oconee, Washington County, Georgia. Her upbringing emphasized Southern hospitality, church involvement, and close‑knit family ties.
    She grew up with deep respect for local customs, seasonal rhythms, and the importance of community service, often participating in church potlucks and county fairs. While she values these traditions,
    her innate curiosity has led her to explore the region’s history and genealogy, bridging the past with modern practices such as organic gardening and home food preservation. The cultural landscape of
    rural Georgia, with its focus on self‑reliance, modesty, and a slower pace of life, shapes her preference for solitude, practicality, and harmonious coexistence with her environment.
attributes:
  skills: '["Canning and preserving", "Vegetable gardening", "Home budgeting and bookkeeping", "Traditional Southern cooking", "Basic computer literacy", "Genealogy research", "Community event organization",
