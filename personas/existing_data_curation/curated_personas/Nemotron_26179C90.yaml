  hobbies: '["Gardening (heirloom tomatoes, peppers, herbs)", "Knitting and crocheting scarves and blankets", "Reading historical fiction and local history", "Birdwatching along the Oconee River", "Walking
    nature trails", "Canning and preserving seasonal produce", "Volunteer reading to elementary school children"]'
  career_goals: Although not seeking formal employment, Jean aims to turn her long‑standing interests into low‑stress, meaningful contributions. She hopes to compile a cookbook that showcases family recipes
    and her preservation methods, and to sell small batches of her jams and pickles at the local farmer’s market, providing a modest supplemental income for her household. She also intends to complete a
    short certificate in genealogy to better document her family's lineage and to mentor younger women in the community who are interested in home crafts, budgeting, and sustainable gardening. By volunteering
    in behind‑the‑scenes capacities at the church and local historical society, she seeks to preserve the cultural heritage of rural Georgia while maintaining the flexibility and solitude she values.
