persona_description: A Turkish classical music enthusiast who is knowledgeable about the contributions of non-Muslim composers and performers of Turkish music to the dominant Turkish music culture during
  the Ottoman Empire. They are particularly interested in the works of Armenian, Greek, and Jewish artists, and the traditions they have continued into the Republican period. They are also knowledgeable
  about the separate character of non-Muslim societies and the interesting aspects of their contributions to Turkish music.
