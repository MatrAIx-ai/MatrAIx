personas:
  professional: Maryanne Burkhardt, a 16‑year‑old high‑school junior in Trumbull, CT, channels their curiosity about environmental science into practical school projects, using Google Docs and budding graphic‑design
    skills to create visual handouts for their class, and they let a relaxed, sometimes disorganized approach dictate the timing of their submissions.
  sports: Maryanne Burkhardt fuels their love of the outdoors by joining Trumbull High School’s cross‑country team in the fall, weekend‑hiking Connecticut’s coast‑line trails, and cheering on the New England
    Patriots and Boston Red Sox while they occasionally drop a basketball at the local YMCA to stay loose.
  arts: Maryanne Burkhardt channels their creative spark into sketching woodland scenes reminiscent of Studio Ghibli’s visuals, strumming ukulele covers of Mumford & Sons and Jason Mraz, devouring Brandon
    Sanderson’s fantasy epics, and crafting friendship bracelets while they volunteer at their town’s community theater’s costume workshop.
  travel: Maryanne Burkhardt prefers flexible, spur‑of‑the‑moment weekend getaways, often hiking the White Mountains or taking a family road trip to Boston’s historic Freedom Trail, while they dream of
    backpacking through Yosemite and swapping postcards from Iceland’s aurora‑lit skies once they save enough for a gap‑year adventure.
  culinary: Maryanne Burkhardt whips up soft oatmeal‑raisin cookies with a pinch of cinnamon, experiments with homemade pesto on a cauliflower‑crust pizza, and keeps a notebook of quick‑mix recipes that
    blend fresh basil, lemon zest, and seasonal strawberries they gather at the local farmer’s market.
  core: Maryanne Burkhardt is a nature‑obsessed, half‑organized teen who balances a love for sketch‑filled hikes and ukulele jams with a tendency to forget homework deadlines while they dream of turning
    their backyard into a learning hub for kids.
background:
  cultural: Maryanne grew up in a middle‑class suburban family in Trumbull, Connecticut, a town with a strong sense of community and New England traditions. Her heritage includes German‑American and Anglo‑American
    roots, and she was raised with typical American customs like celebrating Thanksgiving, Independence Day parades, and local farmer’s‑market gatherings. She participates in school and community events,
    often attends church youth groups, and values the region’s emphasis on education, volunteerism, and respect for nature.
