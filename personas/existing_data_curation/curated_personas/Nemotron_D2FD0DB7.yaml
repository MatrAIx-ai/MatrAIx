  career_goals: She aims to study environmental science or sustainability at a college, with the long‑term goal of becoming an environmental educator or community outreach coordinator who designs hands‑on
    programs for local schools and parks. She also hopes to develop graphic‑design skills to create visual educational materials, and envisions a career that allows flexibility to travel, volunteer, and
    maintain a balanced lifestyle.
