personas:
  professional: Brooke Plauche is a methodical production assembler in a metal‑fabrication shop, effortlessly juggling CNC mill operation, precision inspection, and hands‑on welding while mentoring newcomers,
    a reflection of their curiosity‑driven practicality and people‑focused reliability as they map a path toward a supervisory role.
  sports: Brooke Plauche spikes the ball in a local co‑ed volleyball league every Thursday night, they cheer for the nearby baseball team the River City Bears, and they join a weekend hike club that explores
    the Appalachian Trail’s lower sections, blending competitive spirit with community‑driven fitness.
  arts: Brooke Plauche curates the soundtrack of their life with indie artists like Phoebe Bridgers and Tame Impala, they binge‑watch the clever humor of 'Parks and Recreation', and they find artistic expression
    in DIY furniture projects reminiscent of mid‑century modern design, often sharing finished pieces at neighborhood gatherings.
  travel: Brooke Plauche prefers short, adventure‑packed road trips, having camped beneath the stars in Yosemite’s Glacier Point and sampled street‑food tacos in Oaxaca, they dream of a future backpack
    trek across the Swiss Alps and always plan itineraries on a spreadsheet to squeeze the most mileage out of each dollar.
  culinary: Brooke Plauche boasts an intermediate cooking skill set, frequently whipping up seasonal vegetable ratatouille with garden‑fresh zucchini and heirloom tomatoes, grilling marinated chicken tacos
    al pastor and pairing them with fresh cilantro and lime, they constantly tweak recipes to impress friends at potluck evenings.
  core: Brooke Plauche is a precision‑obsessed, socially‑driven DIY enthusiast who balances metal‑shop exactness with community potlucks, they also secretly hoard spare screws like treasures and forget
    to water houseplants on busy weeks.
background:
  cultural: Brooke grew up in the heart of rural Illinois, where Midwestern values of hard work, community involvement, and modesty shaped her worldview. Her family’s traditions blend small‑town American
    customs with occasional celebrations of her German‑American heritage, such as Oktoberfest gatherings and an appreciation for homemade cooking. The close‑knit environment of Logan County emphasized cooperative
    spirit, church socials, and local fairs, fostering her friendly, outgoing nature and strong sense of responsibility toward neighbors.
attributes:
  skills: '[''CNC machine operation'', ''Technical blueprint reading'', ''Precision measurement (calipers, micrometers)'', ''Quality assurance inspection'', ''Metal fabrication and basic welding'', ''Assembly
