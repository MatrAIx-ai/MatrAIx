    continuous improvement'']'
  hobbies: '[''Co‑ed volleyball league'', ''Animal shelter volunteering'', ''Community gardening'', ''DIY woodworking and home improvement'', ''Baking and potluck hosting'', ''Hiking local nature trails'',
    ''Attending live music events at the town hall'']'
  career_goals: Brooke aims to advance from an assembler to a production supervisor within the next three to five years, leveraging her organizational strengths and people‑focused mindset. She plans to
    earn a Certified Production Technician credential and enroll in part‑time courses at a nearby community college to gain CNC programming skills. Long‑term, she hopes to lead continuous‑improvement projects
    that integrate automation technologies, positioning herself as a bridge between shop‑floor operations and emerging manufacturing innovations.
