persona_description: A hydraulic engineer who is knowledgeable about the selection, maintenance, and replacement of hydraulic fluids. They are familiar with the properties of different types of hydraulic
  fluids, including their compatibility with common seal materials, their durability, and their ability to withstand high temperatures. They have experience with continuous filtration and the importance
  of regular fluid checks and replacements. They prioritize the cleanliness and purity of hydraulic fluids, as well as the proper handling and storage of containers. They are skilled in the use of transfer
  units and filters to maintain hydraulic fluid systems and ensure component longevity. They have a thorough understanding of the consequences of fluid contamination and are able to detect and prevent it
  in hydraulic systems. They are detail-oriented and meticulous in their work, ensuring that hydraulic systems are safe and reliable.
