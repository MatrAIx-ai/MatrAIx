persona_description: A researcher who studies the impact of cold exposure on human health and development, focusing on the effects of cold exposure on brown adipose tissue and thermogenesis in newborn lambs.
  This researcher is particularly interested in the development of cold adaptation and the effects of stress (and mortality) caused by cold exposure on individuals. They are known for their work in debunking
  the belief that the common cold is linked to cold exposure and their research on the protective effects of a thick blanket of insulating snow.
