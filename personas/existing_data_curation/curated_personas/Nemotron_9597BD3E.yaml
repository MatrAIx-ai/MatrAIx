  hobbies: '["Video Gaming (strategy and simulation)", "Cooking (grilling, recipe experimentation)", "Automotive DIY (maintenance and customization)", "Reading (self‑improvement, practical guides)", "Walking/jogging
    (stress relief)", "Listening to R&B and soul music"]'
  career_goals: Carlos aims to secure a stable, full‑time position that offers a predictable routine and clear advancement pathways. He is pursuing a certification in Automotive Technology at a local community
    college, with the goal of becoming a licensed automotive technician within two years. He envisions working at a reputable auto‑repair shop where he can apply his practical skills, eventually moving
    into a supervisory role that combines hands‑on work with team coordination. Parallel to this, Carlos is interested in deepening his culinary abilities, potentially taking a part‑time culinary certification
    to open a small catering side‑business focused on comfort food for local events. His overarching ambition is to build a reliable career that allows him to support his family, maintain a balanced schedule,
    and continue his personal development without overwhelming stress.
