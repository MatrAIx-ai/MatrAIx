personas:
  professional: Michael Bittar, a retired handyman and community mentor, combines decades of hands‑on carpentry, plumbing, and garden maintenance with a relaxed, yet meticulous, approach to leading occasional
    folk‑art workshops at the Menifee Community Center, where his curiosity fuels spontaneous lesson plans and his competitive streak surfaces in the precise craftsmanship he demonstrates.
  sports: Michael Bittar, a devoted early‑morning walker and member of the Menifee Senior Trail Club, follows the Los Angeles Dodgers and LA Galaxy on game nights, occasionally joins a casual shuffleboard
    league at the local senior center, and prefers low‑impact activity that aligns with their love of quiet observation over competitive team sports.
  arts: Michael Bittar, an avid consumer of art documentaries, passionately collects Talavera pottery and Oaxacan‑style textiles, can instantly identify motifs in Frida Kahlo’s paintings and Diego Rivera’s
    murals, and channels this informal expertise into storytelling sessions that blend folk legends with reflections on regional avant‑garde movements.
  travel: Michael Bittar, who enjoys leisurely road trips with his spouse, has explored historic missions along California’s coast, trekked the Grand Canyon on a guided tour, visited Oaxaca’s vibrant markets
    to study traditional crafts, and dreams of a future pilgrimage to Seville’s Alcázar, all while balancing a modest travel budget that favors mid‑range motels and off‑season airfare.
  culinary: Michael Bittar, an accomplished home cook, regularly prepares tamales, pozole, and carne asada, experiments with chipotle‑infused mole and rosemary‑chili roasted chicken, and delights in using
    fresh cilantro, lime, and zesty jalapeños to bring a creative twist to classic recipes.
  core: Michael Bittar is a solitary, curiosity‑driven craftsman who channels competitive puzzle‑solving into meticulous gardening, memoir writing, and folk‑art storytelling, yet often wrestles with worry
    and a tendency to overlook routine health checks.
background:
  cultural: Michael grew up in a Mexican‑American household in the Inland Empire, where the rhythms of family life combined Mexican traditions with the realities of life in Southern California. His parents
    emigrated from Michoacán and brought with them customs such as Día de los Muertos altars, the celebration of quinceañeras, and a deep respect for Mexican folk music like norteño and mariachi. Spanish
    was spoken at home, and he learned to cook family recipes passed down through generations. Living in Menifee, he has also absorbed the agricultural legacy of the region, working seasonal jobs in orange
    groves and vineyards. Though he never completed formal schooling, he values the oral histories told by elders, and he actively preserves these cultural narratives through storytelling and his planned
    memoir. His identity reflects a blend of Mexican heritage, Catholic values, and the modest, self‑reliant ethos common among long‑time residents of Riverside County.
