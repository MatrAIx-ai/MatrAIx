    ''Travel market research'', ''Cultural sensitivity'']'
  hobbies: '[''Cooking traditional Salvadoran cuisine'', ''Hiking in the Sonoran Desert'', ''Photography'', ''Reading travel literature'', ''Yoga and meditation'', ''Gardening'', ''Volunteering at community
    cultural events'', ''Bilingual language practice'', ''DIY home organization projects'', ''Listening to Latin music'']'
  career_goals: Angelica aims to advance to a senior travel consultant position within the next three years, taking on mentorship responsibilities for newer agents and leading a team focused on corporate
    travel solutions. She plans to obtain the Certified Travel Associate (CTA) credential and deepen her expertise in sustainable tourism, eventually launching a boutique agency that caters to the Salvadoran
    and broader Hispanic communities in the Southwest. Long‑term, she envisions integrating her analytical background to develop data‑centric travel products that simplify trip planning for repeat customers
    while preserving the personal touch she values.
