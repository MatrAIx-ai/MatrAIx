personas:
  professional: Angelica Diaz, a data‑driven travel agent based in Mesa, leverages her STEM training and bilingual fluency to craft precise itineraries, troubleshoot disruptions with calm efficiency, mentor
    junior agents, and they aim to secure a senior consultant role within three years.
  sports: Angelica Diaz hikes weekly with the Desert Vista Trail Runners, supports the Phoenix Suns and Arizona Diamondbacks, balances cardio with sunrise yoga sessions at Camelback Mountain to maintain
    a low‑impact fitness regime, and they occasionally join a weekend volleyball league with friends.
  arts: Angelica Diaz captures community festivals and Sonoran landscapes through photography, draws inspiration from Frida Kahlo and Natalia Lafourcade, enjoys attending local theater productions featuring
    contemporary Latin American playwrights, and they also collect limited‑edition prints that remind them of family celebrations.
  travel: Angelica Diaz prefers structured itineraries that blend cultural immersion with nature, often plans trips to Lake Atitlán, Antigua, and Sedona, maximizes budget efficiency by redeeming travel
    credit card points for flight upgrades during family visits, and they keep a travel journal documenting each journey's sensory details.
  culinary: Angelica Diaz delights in preparing pupusas and yuca con chicharrón for friends, experiments with fresh cilantro, chipotle, and avocado from her herb garden, occasionally over‑spices dishes
    in pursuit of authentic flavor, earning a reputation as a thoughtful yet adventurous home cook, and they love pairing meals with traditional coffee brews from their family's rituals.
  core: Angelica Diaz, a meticulous travel consultant with a love for desert hikes, herb‑laden cooking, and balanced budgeting, blends routine with occasional spontaneity while never missing a weekly family
    video call, and they are known for their calm crisis management.
background:
  cultural: Raised in a Salvadoran immigrant family in Mesa, Angelica grew up speaking Spanish at home and celebrating holidays such as Día de la Virgen de la Paz and Semana Santa with her extended family.
    The close‑knit community values of reciprocity, family responsibility, and practicality shaped her collaborative and harmonious personality. She maintains regular video calls with relatives in El Salvador
    and contributes to remittances, reinforcing a sense of cultural continuity. Participation in the local Salvadoran Festival and involvement with community centers have deepened her appreciation for her
    heritage, informing both her personal interests and the culturally sensitive service she provides to clients seeking authentic experiences in Central America.
attributes:
  skills: '[''Travel itinerary planning'', ''Reservation system management (Sabre, Amadeus)'', ''Customer service'', ''Spanish-English bilingual communication'', ''Budgeting and cost optimization'', ''Travel
