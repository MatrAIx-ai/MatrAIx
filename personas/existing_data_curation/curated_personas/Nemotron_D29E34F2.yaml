personas:
  professional: Paul Rollins is a budding junior naturalist in preschool, whose sharp curiosity and practical mindset combine with an organized yet flexible routine, letting them eagerly catalog leaves
    during nature walks while improvising when a sudden rain forces a quick shelter.
  sports: Paul Rollins loves the local Corbett Cubs youth soccer team, cheers for the Oregon Ducks football during fall, and spends weekends climbing pine trees, swimming at the community pool, and playing
    tag with friends, balancing a competitive spirit with occasional cooperative games.
  arts: Paul Rollins delights in drawing forest animals in crayon, sings along to Raffi’s “Baby Beluga,” watches Disney’s “Frozen,” and idolizes the playful humor of the Sesame Street cast, letting these
    creative influences shape their imaginative play.
  travel: Paul Rollins enjoys weekend outings to the Columbia River Gorge and Cannon Beach, dreams of seeing Yellowstone’s geysers, and prefers itineraries that mix short hikes with snack breaks, often
    packing a small backpack with crayons and a water bottle.
  culinary: Paul Rollins favors mac‑and‑cheese with hidden peas, sweet potato fries, and sliced strawberries, proudly helps stir pancake batter on Saturday mornings, yet stubbornly refuses broccoli, making
    the kitchen a mix of culinary experiments and occasional picky‑eater tantrums.
  core: Paul Rollins is a curious, competitive four‑year‑old who balances organized routines with spontaneous nature adventures, a piggy‑bank obsession, and a love for crayons, all while navigating the
    occasional allergy sneeze and broccoli rebellion.
background:
  cultural: Paul is raised in a white, middle‑class family in Corbett, Oregon, a small community nestled near forests and rivers of the Pacific Northwest. His family celebrates typical American holidays
    such as Thanksgiving, Independence Day, and Christmas, and they often take weekend outings to local parks, hiking trails, and riverbanks, fostering a strong connection to nature. The local culture blends
    suburban suburbia with an outdoorsy, environmentally aware ethos, shaping Paul's appreciation for both structured activities (preschool routines) and spontaneous exploration of the natural world.
