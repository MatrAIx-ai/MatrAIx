persona_description: A researcher and archaeologist who specializes in the study of prehistoric artifacts and their contexts, particularly those from the San Antonio River region. This person has completed
  several years of excavations along the Museum Reach of the San Antonio River, which has yielded relatively few prehistoric artifacts due to urban development. They have found evidence of a 6,000- to 7,000-year
  period of human occupation of the area, with radiocarbon dates placing human occupation from 600 to 6,000 years ago. They have also found prehistoric signs of life along other water sources, and are collecting
  clay samples to compare to pottery shards in order to learn more about pottery making in the South Texas missions. This person is skilled in the use of archaeology and geology, and has a deep understanding
  of the history and culture of the San Antonio River region.
