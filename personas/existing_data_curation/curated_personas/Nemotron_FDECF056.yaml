  hobbies: '[''Fishing'', ''Hunting'', ''Gardening'', ''Listening to classic country music'', ''Watching Carolina Panthers football'', ''Car maintenance'', ''DIY home improvement projects'', ''Volunteer
    work with church cleanup crews'', ''Reading non‑fiction personal development books'']'
  career_goals: John aims to transition from a frontline janitor to a supervisory role within the next three years. He plans to earn his GED and complete a Certified Professional Cleaner (CPC) program to
    strengthen his credentials. His longer‑term ambition is to become a facilities manager for a regional office park, overseeing maintenance, budgeting, and staff scheduling. He also dreams of eventually
    starting his own small cleaning business that emphasizes green cleaning practices and reliable service for local schools and churches. Achieving a more stable schedule and a higher income would help
    reduce his current stress and give him more time for family and personal interests.
