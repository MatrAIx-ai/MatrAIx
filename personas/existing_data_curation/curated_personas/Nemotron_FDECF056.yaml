personas:
  professional: John Black, a seasoned commercial janitor with fifteen years of hands‑on experience, blends practical curiosity with proven cleaning expertise—mastering carpet extraction, floor stripping,
    and improvised plumbing fixes—while their relaxed attitude toward scheduling sometimes leads to last‑minute supply runs and occasional disorganization.
  sports: John Black never misses a Carolina Panthers game at their neighborhood bar, spends weekends hunting white‑tailed deer in the fall and fishing bass at Lake James, and belongs to the Fayetteville
    Outdoor Club where they occasionally join coworkers for casual softball matches.
  arts: John Black fills their leisure hours with classic country and Southern rock, rotating playlists that feature Johnny Cash, Willie Nelson, Lynyrd Skynyrd, and The Allman Brothers Band, while occasionally
    catching live shows at the Cat's Cradle and reading nonfiction titles like Atomic Habits and The Power of Habit to fuel personal development.
  travel: John Black prefers road‑trip adventures that blend nature and relaxation, having camped in the Great Smoky Mountains, fished the Kenai River in Alaska, and planning a future hunting expedition
    to Montana, yet they balance these trips with family commitments and a modest travel budget.
  culinary: John Black enjoys cooking garden‑fresh meals, regularly preparing tomato‑basil pasta, pepper‑spiced grilled chicken, and homemade salsa for family barbecues, while their occasional indulgence
    in deep‑fried catfish fries and buttery cornbread reveals a love for Southern comfort flavors.
  core: John Black is a practical, nature‑loving problem‑solver who worries about the small details, volunteers in their community, and can’t resist a fresh‑caught bass or a good country ballad.
background:
  cultural: John grew up in a rural part of Hoke County, North Carolina, within a multi‑generational white Anglo‑American family that values hard work, faith, and community. He was raised in a Baptist household,
    attending church regularly and participating in local events such as Fourth of July picnics, county fairs, and high school football games. The proximity of Fort Bragg exposed him to a diverse military
    community, fostering a respectful attitude toward people from varied backgrounds. Southern hospitality, modesty, and a strong sense of family responsibility are central to his identity, shaping his
    cooperative nature and his desire to contribute positively to his hometown.
attributes:
  skills: '[''Commercial cleaning'', ''Carpet extraction'', ''Floor stripping and waxing'', ''Basic plumbing repairs'', ''HVAC filter replacement'', ''Light fixture maintenance'', ''Safety and OSHA compliance'',
