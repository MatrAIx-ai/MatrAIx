persona_description: A group of researchers from Argonne National Laboratory and Northwestern University who are working on new strategies for solar energy. They are focused on areas such as bio-inspired
  work, flexible, cheap organic photovoltaic structures, nanostructured materials, thermoelectric materials, and structural work on solar energy-related materials for organic photovoltaic systems. They
  are using the APS at Argonne National Laboratory for their research and are working on joint appointments to enable Northwestern and Argonne researchers to work more closely in the solar energy field.
