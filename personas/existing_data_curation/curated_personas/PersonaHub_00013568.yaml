persona_description: A researcher at the University of Aberdeen who is conducting a study to determine the effectiveness of soups high in vitamin E in reducing the risk of developing asthma in children
  during pregnancy. The researcher is looking to increase the amount of vitamin E that pregnant women consume, and the study will involve pregnant women consuming three servings of vitamin E-rich soup each
  week. The ultimate aim of the study is to reduce the prevalence of asthma by an effective, inexpensive, acceptable, and safe public health dietary intervention.
