  career_goals: Although retired, Kavonya’s personal ambitions focus on meaningful contribution, health, and legacy. She aims to complete a handwritten family genealogy project that captures stories of
    the Great Migration and the civil-rights era for future generations. She hopes to deepen her involvement in her church choir, eventually leading a youth group to teach gospel hymns. Maintaining physical
    wellness is another priority; she plans to join a local walking club and practice mindfulness techniques to manage stress. Kavonya also aspires to become a peer-support mentor for other seniors at the
    community center, offering guidance on coping with anxiety and navigating senior services. Lastly, she dreams of traveling to Atlanta to visit the National Museum of African American History and Culture,
    connecting her personal narrative with the broader African-American experience.
