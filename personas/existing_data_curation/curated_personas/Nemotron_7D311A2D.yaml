personas:
  professional: Kavonya Hill is a retired home‑economics mentor and community organizer whose pragmatic curiosity blends traditional cooking wisdom with modern budgeting tools, while their calm assertiveness
    makes them the go‑to facilitator for church potlucks, bridge nights, and senior‑center workshops.
  sports: Kavonya Hill enjoys a low‑impact fitness routine that includes Saturday walks with the local walking club, occasional attendance at Springfield Cardinals baseball games, and participation in senior‑friendly
    yoga classes at the community center.
  arts: Kavonya Hill expresses creativity through quilt making and choir singing, savoring the vinyl sounds of Aretha Franklin, B.B. King, and Miles Davis, and finding inspiration in classic Golden Age
    films starring Cary Grant and Audrey Hepburn, while they often quote lines from Casablanca during bridge games.
  travel: Kavonya Hill dreams of a purposeful trip to Atlanta to explore the National Museum of History and Culture, while also reminiscing about past visits to New Orleans for its music scene and planning
    future weekend getaways to nearby lake cabins for quiet reflection.
  culinary: Kavonya Hill delights in preparing soul‑food classics such as collard greens, cornbread, and sweet‑potato pie using fresh herbs from their garden, expertly adjusting recipes to lower sodium
    without sacrificing flavor, and often shares these dishes during holiday gatherings while swapping cooking tips with grandchildren over video calls.
  core: Kavonya Hill is a spirited 78‑year‑old who blends old‑world kitchen wisdom with a restless curiosity, juggling community leadership, late‑night vinyl listening, and occasional worry over unchecked
    bills, all while maintaining a warm, assertive presence in every social circle.
background:
  cultural: Kavonya was born in 1947 in the historic East 18th Street neighborhood of Kansas City, Missouri, a vibrant African-American community shaped by the Great Migration. Her parents moved from the
    rural South to seek industrial work in the Midwest, instilling in her a strong sense of resilience, community solidarity, and respect for labor. Growing up during the segregation era, she attended a
    segregated elementary school before integration, experiences that fostered a lifelong commitment to education and social justice. Kansas City’s rich jazz, blues, and barbecue traditions influenced her
    love of music and cooking, while the local Black church became the cornerstone of her spiritual and social life. Throughout her adult years, she has participated in church leadership, neighborhood associations,
    and civil-rights commemorations, preserving oral histories and cultural practices. Kavonya’s cultural identity blends Midwestern pragmatism with the soulful traditions of African-American oral storytelling,
    gospel music, and communal gatherings, shaping her values, relationships, and daily routines.
