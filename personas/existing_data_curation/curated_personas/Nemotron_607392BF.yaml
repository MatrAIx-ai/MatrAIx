  career_goals: Marilyn dreams of a future where she can work closely with animals and nature. She imagines becoming a wildlife biologist or a veterinarian, roles that combine practical problem‑solving
    with a clear, structured path of learning. She also envisions herself excelling in school competitions, like science fairs or spelling bees, which satisfy her competitive spirit while reinforcing her
    love for hands‑on, real‑world tasks.
