personas:
  professional: Marilyn Hoang, a budding game designer, channels her love of LEGO building and Scratch coding into creating intricate, strategy‑focused board game prototypes that blend her knack for structure
    with a playful competitive edge.
  sports: Marilyn Hoang dabbles in the Norfolk Youth Soccer League during the spring, cheers on the Nebraska Cornhuskers football team on Saturdays, and keeps a modest collection of Cornhuskers and Omaha
    Storm Chasers caps, favoring regular runs through the local fields for fitness over structured drills.
  arts: Marilyn Hoang devotes free time to sketching insects she finds in the meadow, reading adventure series like "Percy Jackson" and "The Hobbit," listening to Taylor Swift and The Beatles while building
    LEGO cityscapes, and experimenting with simple animations in Scratch, weaving a creative tapestry that blends literature, music, and hands‑on art.
  travel: Marilyn Hoang enjoys spontaneous family road trips to the Nebraska State Fair and weekend getaways to the Badlands, dreams of exploring the geysers of Yellowstone, and prefers loosely planned
    itineraries that leave room for detouring to roadside attractions like antique barns and corn mazes.
  culinary: Marilyn Hoang favors classic kid‑friendly meals such as macaroni and cheese, pepperoni pizza, and chicken tenders, loves adding fresh corn kernels and shredded carrots from the garden to salads,
    and can confidently make a peanut‑butter‑jelly sandwich and a simple fruit parfait, though she often forgets to clean up the crumbs afterward.
  core: Marilyn Hoang is a meticulous yet relaxed 9‑year‑old who pairs a love of structured LEGO creations with a competitive streak in board games, all while occasionally misplacing her socks and hoarding
    rocks.
background:
  cultural: Marilyn was raised in Norfolk, Nebraska, a close‑knit rural community where family, school, and local traditions are central. Her upbringing reflects typical Midwestern values of self‑reliance,
    practicality, and respect for routine, while also embracing community events like county fairs and school gatherings. Though identifying as white, her cultural identity is shaped more by the everyday
    rhythms of small‑town life, the outdoors, and the emphasis on personal responsibility and modest competition.
