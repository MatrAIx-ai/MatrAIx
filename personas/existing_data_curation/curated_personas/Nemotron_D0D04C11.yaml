personas:
  professional: Thomas Rojas, a seasoned surveillance officer with a keen eye for detail, leverages his expertise in CCTV operations, risk assessment, and conflict de‑escalation to keep casino floors secure
    while coordinating teams with the same structured, people‑focused approach that fuels his ambition to become a shift‑lead and eventually a corporate security director.
  sports: Thomas Rojas, a die‑hard Missouri Tigers fan who never misses a home game, regularly tailgates with a crew of friends, plays in a Wednesday night bowling league at the local community center,
    jogs with a St. Louis Cardinals fan club, and spends sunrise mornings fishing on Table Rock Lake, embodying his love for both team spirit and solo outdoor pursuits.
  arts: Thomas Rojas, a classic‑rock and country aficionado, fills his garage with vinyl records from Bruce Springsteen, The Eagles, Johnny Cash, and Dolly Van Dyke, enjoys family movie nights featuring
    films like 'Field of Dreams', and occasionally attends a local theater’s live‑music show to unwind after a busy week.
  travel: Thomas Rojas, an adventure‑leaning weekend traveler, plans meticulously for road trips to Table Rock Lake for fishing, enjoys a yearly family getaway to Branson’s live‑music theaters, dreams of
    a spring road‑trip through the Canadian Rockies, but stays within a modest budget that balances his love for exploration with his family’s financial responsibilities.
  culinary: Thomas Rojas, a self‑taught grill master, loves cooking Kansas City‑style ribs, smoked catfish, and homemade beef chili topped with fresh jalapeños, pairs his meals with local craft beers, and
    often prepares a hearty casserole for his bowling league’s post‑game gatherings, showcasing his intermediate cooking skills and love for communal dining.
  core: Thomas Rojas blends a disciplined, security‑focused mindset with a sociable, tailgate‑loving spirit, juggling spreadsheets, surveillance screens, and fishing lines while occasionally letting late‑night
    poker sessions and over‑cooked barbecue keep him delightfully grounded.
background:
  cultural: Thomas grew up in a middle‑class, white family in the Springfield, Missouri area, steeped in Midwestern values of hard work, modesty, and community involvement. His ancestry includes German
    and Irish roots, and he was raised in a Protestant (Methodist) household that emphasized family cohesion and service to others. The region’s blend of small‑town solidarity, college‑town energy, and
    a growing service‑sector economy shaped his pragmatic outlook and his preference for structure. Local traditions like high school football, county fairs, and outdoor recreation (hunting, fishing) are
    familiar parts of his life, reinforcing a cultural identity that balances traditional Midwestern humility with an openness to diverse social experiences.
attributes:
