  hobbies: '["Tailgating at football games", "Fishing at Table Rock Lake", "Weekly bowling league", "Home DIY projects and woodworking", "Playing poker with friends", "Volunteer mentoring at local community
    center", "Jogging and fitness", "Listening to classic rock and country music", "Family movie nights", "Attending local music festivals"]'
  career_goals: Thomas aims to move from his current surveillance officer role into a supervisory position within the next two years, targeting a shift‑lead or assistant security manager role at the casino.
    He plans to earn professional certifications such as the Certified Protection Professional (CPP) and Certified Fraud Examiner (CFE) to broaden his qualifications. Long‑term, he envisions stepping into
    a corporate security director role for a regional hospitality group, leveraging his business background to integrate security strategy with operational efficiency. He also hopes to mentor younger security
    staff and eventually start a small consulting firm focused on loss‑prevention for midsize businesses in the Midwest.
