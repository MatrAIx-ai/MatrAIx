personas:
  professional: Energizing her role as a marketing manager, Purnimaben applies rigorous data analytics and culturally resonant storytelling to design multi‑channel campaigns, while they champion inclusive
    brand narratives, mentor junior staff, and maintain a structured yet adaptable workflow.
  sports: An avid outdoor enthusiast, Purnimaben hikes the White Mountains with the Manchester Trail Hikers, they cheer the New England Patriots on Sundays and the Boston Red Sox in the summer, and they
    stay fit through weekly yoga sessions and a weekend adult softball league.
  arts: A culturally curious art lover, Purnimaben attends performances by the Manchester Stage Company, they relish the classical sitar melodies of Ravi Shankar and the soulful ballads of James Taylor,
    and they devour historical fiction by Hilary Mantel while celebrating Diwali with traditional folk dances and contemporary Bollywood film screenings.
  travel: A thoughtful traveler, Purnimaben prefers meticulously planned road trips across New England’s coastal towns and occasional family visits to New Delhi during festival seasons, they dream of hiking
    New Zealand’s South Island and exploring Norway’s fjords, yet they balance these ambitions with a modest travel budget and responsibilities at home.
  culinary: A dedicated home chef, Purnimaben expertly prepares tangy dhokla and buttery khandvi alongside New England clam chowder, they blend garden‑fresh cilantro, fenugreek leaves, and locally sourced
    apples into seasonal dishes, and they enjoy occasional farm‑to‑table dinners at a nearby bistro while occasionally ordering sushi for a quick indulgence.
  core: Purnimaben is a methodical marketer who balances data precision with heartfelt community service, they can’t start a day without a cup of masala chai and occasionally lose track of time perfecting
    garden seedlings.
background:
  cultural: Purnimaben grew up in a South Asian immigrant family in New England, preserving Gujarati customs while adapting to American life. She celebrates festivals such as Diwali and Navratri with her
    extended family and the local diaspora, fostering a sense of communal harmony. Her upbringing emphasized respect for elders, collective responsibility, and hospitality, which informs her considerate
    and cooperative demeanor. Fluent in both English and Gujarati, she bridges cultural gaps in her professional role and community involvement. This bicultural perspective fuels her commitment to inclusive
    marketing and community service, allowing her to honor her heritage while contributing meaningfully to her Manchester, NH community.
attributes:
  skills: '["Market research and analysis", "Strategic campaign planning", "Digital marketing (SEO, SEM, social media)", "Budget management", "Project and team leadership", "Cross-cultural communication",
