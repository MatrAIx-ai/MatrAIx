  hobbies: '["Vegetable gardening", "Traditional Gujarati cooking", "Farm-to-table recipe experimentation", "Yoga and meditation", "Volunteering at community center (cultural events, language workshops)",
    "Hiking local New Hampshire trails", "Reading historical fiction"]'
  career_goals: Purnimaben aims to progress into a senior leadership role, such as Director of Marketing, where she can shape long-term brand strategy and foster inclusive marketing practices. She is committed
    to mentoring emerging talent, particularly women and immigrants, and hopes to establish a consultancy that assists small businesses in New England with culturally resonant digital marketing. Additionally,
    she aspires to lead corporate social responsibility initiatives that strengthen community ties and promote diversity within the organization.
