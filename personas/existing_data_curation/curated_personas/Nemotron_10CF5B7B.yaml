  career_goals: Looking forward, Min hopes to blend her reliable work experience with her artistic passions. She aims to transition into a part‑time role at a local art studio or community center where
    she can assist with workshops, manage registrations, and help curate small exhibitions. Additionally, she aspires to launch a modest online shop selling her own hand‑crafted greeting cards and illustrated
    prints, turning her hobby into a supplemental income stream. On a personal level, Min wishes to complete a short certificate in graphic design to deepen her technical skills, and eventually mentor younger
    employees or volunteers, sharing her knowledge of both customer service and creative expression.
