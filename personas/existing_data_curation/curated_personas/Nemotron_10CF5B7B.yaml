personas:
  professional: Min Leung, a seasoned retail cashier of over three decades, blends meticulous POS expertise and calm, empathetic service with a quietly inventive mind, often suggesting creative display
    arrangements and volunteering to teach seniors basic computer skills, while dreaming of part‑time curatorial work at a community art studio.
  sports: Min Leung enjoys low‑impact fitness, joining a community center tai chi class every Tuesday and walking the nearby river trail each morning, while cheering for the local baseball team the Riverfront
    Raptors and occasionally watching televised marathon events for motivation.
  arts: Min Leung immerses themselves in creative expression through watercolor paintings that echo surrealist influences of Salvador Dalí, writes speculative short stories inspired by Philip K. Dick, captures
    everyday moments with a vintage Nikon camera in the style of Ansel Adams, and discusses the works of Frida Kahlo and Björk at a small monthly book club.
  travel: Min Leung prefers thoughtfully planned solo journeys, having visited the misty cliffs of Cinque Terre, the historic tea houses of Kyoto, and the vibrant street art districts of Berlin, while dreaming
    of witnessing the Northern Lights in Tromsø and often maps future trips around quiet boutique hotels and local art museums.
  culinary: Min Leung experiments with traditional family recipes, reimagining mapo tofu with a hint of lemongrass, crafting dumplings seasoned with rosemary, and pairing these dishes with fresh herb‑infused
    jasmine tea harvested from their indoor garden, displaying a moderate cooking skill that balances authenticity and innovation.
  core: Min Leung, a 55‑year‑old who weaves disciplined retail precision with vivid imagination, navigates life with gentle ambition, a penchant for solitary art, and an undercurrent of anxiety that fuels
    both creativity and occasional self‑doubt.
background:
  cultural: Min is a first‑generation immigrant who grew up in a Cantonese‑speaking household before moving to the United States as a teenager. Her upbringing emphasized harmony, respect for elders, and
    the importance of community, values that continue to shape her considerate and cooperative nature. She celebrates traditional festivals such as Chinese New Year and the Mid‑Autumn Moon Festival with
    her family, often preparing specific dishes and sharing stories that connect her to her heritage. While she is fluent in English and maintains conversational Cantonese, she balances her East Asian cultural
    roots with the multicultural environment of Orlando, joining a local Asian cultural association and occasionally volunteering at community events that showcase Chinese art and cuisine.
