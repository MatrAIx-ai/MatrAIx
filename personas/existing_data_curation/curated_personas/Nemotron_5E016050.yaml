  career_goals: Cynthia aims to advance to a senior engineering leadership role, such as Director of Engineering Operations, where she can drive large‑scale sustainable infrastructure projects in upstate
    New York. She aspires to mentor emerging engineers, champion innovative yet practical solutions, and shape regional engineering standards. Additionally, she plans to earn a professional certification
    in sustainable design and to lead a community partnership program that integrates local universities and businesses into engineering initiatives.
