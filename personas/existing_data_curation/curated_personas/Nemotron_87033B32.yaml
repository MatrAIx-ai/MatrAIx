  hobbies: '[''Cooking Puerto Rican cuisine'', ''Gardening'', ''Hiking'', ''Yoga and meditation'', ''Salsa dancing'', ''Community volunteering (computer skills tutoring)'', ''Reading historical fiction
    and non-fiction'']'
  career_goals: Arlina aims to become a senior procurement manager within the next five years, focusing on sustainable sourcing and digital transformation of the purchasing function. She plans to earn the
    Certified Professional in Supply Management (CPSM) credential and lead a team that implements data‑driven procurement strategies to reduce costs and environmental impact. Additionally, she hopes to
    mentor emerging professionals, especially those from underrepresented backgrounds, and to cultivate a work environment that balances high performance with stress‑reduction practices, potentially exploring
    remote or hybrid work arrangements for greater flexibility.
