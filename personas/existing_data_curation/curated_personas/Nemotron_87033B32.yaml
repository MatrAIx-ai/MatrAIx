personas:
  professional: Arlina Rodriguez, a strategic sourcing specialist, leverages advanced Excel modeling, SAP and Oracle expertise, and bilingual negotiation skills to streamline procurement while balancing
    a love for structured processes with a habit of occasional disorganization that they compensate for through collaborative cross‑functional teamwork.
  sports: Arlina Rodriguez enjoys hiking the Texas Hill Country in spring, joins a local yoga studio for weekly sessions, follows the San Antonio Spurs, Austin FC, and the Houston Astros, and plays recreational
    softball on a community league team that meets on Friday evenings, balancing active pursuits with relaxed spectating.
  arts: Arlina Rodriguez immerses themselves in salsa dancing at local venues, draws inspiration from artists like Celia Cruz, Marc Anthony, and John Legend, sings selections from West Side Story as a hobby,
    and cherishes evenings watching films starring Viola Davis and Pedro Almodóvar.
  travel: Arlina Rodriguez blends adventure and relaxation by planning weekend road trips to Hill Country vineyards, weekend retreats in the Ozarks, and longer vacations to tropical island destinations
    such as Costa Rica and the Belize Caribbean coast, always packing garden‑grown herbs for home‑cooked meals on the go.
  culinary: Arlina Rodriguez proudly cooks dishes like arroz con pollo, plantain tostones, and a Tex‑Mex fusion paella, using fresh cilantro, adobo seasoning, and locally sourced tomatoes from their garden,
    while they occasionally over‑season as a quirky sign of their love for bold flavors.
  core: Arlina Rodriguez balances a data‑driven procurement career with a love for vibrant cooking, salsa dancing, and hill‑country hikes, navigating stress through yoga while occasionally letting disorganization
    slip into their schedule.
background:
  cultural: Arlina is a second‑generation Puerto Rican American who grew up in a bilingual household, preserving strong Caribbean roots while embracing the customs of Texas. She celebrates Puerto Rican
    holidays such as Día de la Constitución and participates in local Texas festivities, blending island hospitality with Southern warmth. Her family emphasizes close‑knit relationships, music, dance, and
    community service, shaping her cooperative and considerate nature. Fluent in both Spanish and English, she bridges cultural gaps in vendor negotiations and community outreach, and she often incorporates
    Puerto Rican culinary traditions and salsa rhythms into her social life, reflecting a harmonious fusion of her heritage and regional identity.
attributes:
  skills: '[''Strategic sourcing'', ''Vendor negotiation'', ''Contract management'', ''ERP (SAP/Oracle) proficiency'', ''Advanced Excel and SQL analytics'', ''Technical product specification analysis'',
