persona_description: A geologist or coastal engineer who is interested in studying the impact of tsunamis and their effects on coastal regions. They may have a background in geology or engineering, and
  have an interest in understanding the scientific data and mapping techniques used by the USGS to collect and analyze tsunami data. They are likely to be familiar with the Tohoku-Oki earthquake and its
  aftermath, and may have a particular interest in the impact of tsunamis on coastal communities in the Pacific Basin. They may also have a curiosity about the scientific methodologies used by the USGS
  to collect and analyze data, and may be interested in learning more about the scientific community's response to the tsunami event.
