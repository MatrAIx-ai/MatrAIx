personas:
  professional: Sharon Neal is a seasoned community organizer for Peculiar’s senior center, wielding meticulous budgeting, event planning, and dispute mediation skills, and they leverage their competitive
    edge and love of structure to keep the Heritage Festival on schedule and volunteers accountable.
  sports: Sharon Neal stays fit by leading line‑dance classes at the Peculiar community center, joining the local senior walking club that meets at Cass County Park, and cheering on the Kansas City Chiefs
    and Kansas City Royals, and they occasionally attend a St. Louis Cardinals baseball game with fellow seniors.
  arts: Sharon Neal brightens the community theater’s ensemble with quick wit, performing in local productions of 'The Music Man' and 'Hello, Dolly!', while they listen to John Denver, Dolly Parton, and
    Frank Sinatra, and they never miss a Missouri Repertory Theatre performance.
  travel: Sharon Neal prefers low‑stress, well‑planned road trips, having visited the Ozarks, Yellowstone National Park, and a family reunion in St. Augustine, Florida, and they dream of a leisurely Gulf
    Coast cruise once their grandchildren can join and their doctor clears them for longer travel.
  culinary: Sharon Neal excels at Midwestern comfort cooking, mastering a twist on classic pecan pie with bourbon‑infused caramel, slow‑cooking pot roast with fresh rosemary, garden‑fresh heirloom tomato
    salsa, and they savor the aromatic blend of garlic, butter, and sweet corn in every dish.
  core: Sharon Neal is a fiercely organized, competitively spirited senior who blends community leadership, meticulous budgeting, and a love of line‑dancing with a sweet tooth for pecan pie, and they never
    miss a bridge tournament.
background:
  cultural: 'Sharon was born and raised on a modest family farm outside of Cass County in the early 1930s. Her upbringing was shaped by the post‑World War II Midwest, where Protestant church life, self‑reliance,
    and community gatherings were cornerstones. The Neal family maintained strong ties to local traditions—home‑cooked meals, seasonal festivals, and volunteerism in town. Though she attended a community
    college for a few years studying home economics, she has always identified with the values of small‑town White American culture in the heartland: practicality, modesty, respect for tradition, and a
    deep sense of civic duty. Her cultural identity is reflected in her love of Midwestern cuisine, gardening, and participation in town events that celebrate regional heritage.'
