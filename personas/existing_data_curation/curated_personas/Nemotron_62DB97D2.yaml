  career_goals: Although still a toddler, Soledad already shows a budding fascination with helping others and making things orderly. She enjoys watching teachers read aloud at the library and often says
    she wants to help people learn and keep everything tidy. As she grows, these early interests suggest ambitions toward a career that blends organization, precision, and service—such as early childhood
    education, pediatric nursing, or eventually a profession in engineering or library science where her disciplined nature can shine.
