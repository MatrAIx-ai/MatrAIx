personas:
  professional: Soledad Siharath, a budding tiny architect, loves building block towers with meticulous precision, channeling a curious yet practical mind to experiment with structures while insisting on
    perfect alignment before moving on, reflecting their disciplined and achievement‑focused temperament.
  sports: Soledad Siharath, a toddler participant in a local preschool soccer program, favors dribbling soft balls, cheers for the Little Cobras children’s team, and adheres to a strict playground schedule,
    though they become anxious when the routine is altered.
  arts: Soledad Siharath, an enthusiastic viewer of animated music shows, enjoys dancing to The Wiggles and mimicking Sesame Street characters, often arranging picture books by color and theme, a habit
    that mirrors their organized and disciplined disposition.
  travel: Soledad Siharath, a family road‑trip enthusiast, loves short visits to the nearby Lakeview Park, insists on packing their favorite stuffed rabbit, prefers structured itineraries over spontaneous
    detours, and feels uneasy when travel plans shift unexpectedly.
  culinary: Soledad Siharath, a picky eater with refined texture preferences, favors smooth mashed sweet potatoes and soft banana slices, enjoys arranging food on the plate into neat rows, and can become
    distressed if meals are served out of order.
  core: Soledad Siharath, a two‑year‑old with a disciplined eye for order, a curious mind, and a tendency to worry, converts playtime into meticulous building, saves coins with fervor, and navigates the
    world with reserved confidence but occasional assertive tantrums.
background:
  cultural: Soledad comes from a Southeast Asian family that emigrated to the United States. At home, both English and her heritage language, such as Vietnamese, are spoken, and family meals feature dishes
    like pho, rice noodles, and fresh herbs, grounding her in the culinary traditions of her parents' homeland. Cultural values of respect for elders, community togetherness, and modesty are woven into
    daily life, especially during celebrations like Lunar New Year, where she participates in lantern making and receives red envelopes. Growing up in Elk Grove, California, she also experiences the multicultural
    tapestry of Sacramento County, attending a diverse preschool and partaking in community events that blend American and Southeast Asian customs.
