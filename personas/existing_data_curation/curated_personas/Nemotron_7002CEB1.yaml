personas:
  professional: Henry Jones, a community‑focused arts organizer and project manager in West Palm Beach, leverages meticulous budgeting, detailed timelines, and a calm, resilient demeanor to curate pop‑up
    exhibitions and multicultural festivals while their natural sociability fuels vibrant community engagement.
  sports: Henry Jones, a weekend basketball player for the Palm Beach Playmakers league, avid hiker of the Everglades during the dry season, and devoted fan of the Miami Heat, Miami Marlins, and Florida
    Atlantic Owls, approaches fitness with energetic group play, disciplined warm‑ups, and a habit of logging workouts on Strava.
  arts: Henry Jones, an avid watercolorist and street photographer, frequents the Norton Museum to study works by Georgia O'Keeffe, Kehinde Wiley, and local Florida muralist John Brown, curates community
    exhibitions inspired by installations of Yayoi Kusama, and finds inspiration in live shows by The Strokes and spoken‑word performances by poet Sarah Kay.
  travel: Henry Jones, a meticulous planner, spends holidays exploring nearby cultural hotspots like Miami's Wynwood Arts District and New Orleans' French Quarter, while dreaming of a spring trip to Lisbon's
    Alfama neighborhood and a summer sailing adventure in the Bahamas, balancing curated itineraries with spontaneous beach clean‑up detours but keeping travel budgets modest.
  culinary: Henry Jones, an experimental home chef with intermediate skill, loves crafting Korean‑inspired kimchi‑fried rice with gochujang, Peruvian ceviche with fresh lime and aji amarillo, and a vegan
    Thai green curry featuring lemongrass, kaffir lime leaves, and coconut milk, while regularly seeking out local farmers’ market finds like heirloom tomatoes and fresh basil.
  core: Henry Jones fuses meticulous organization with infectious curiosity, turning community art projects into social glue, though they can’t resist hoarding stray coffee cups from board‑game nights for
    recycling and occasionally lose sleep planning the next gallery opening.
background:
  cultural: Henry grew up in a middle‑class, white family in central Florida, balancing the laid‑back beach lifestyle of the east coast with the traditional values of the American South. His parents, originally
    from the Midwest, instilled a strong work ethic and a love for community involvement. Living in West Palm Beach has exposed him to a vibrant, multicultural environment where Caribbean, Latin, and European
    artistic influences converge. This mix of Southern hospitality, coastal leisure, and a richly diverse arts scene has shaped his open‑minded worldview and his appreciation for varied cultural expressions.
    While he identifies with mainstream American culture, he embraces the eclectic flavors of the Palm Beach community, often participating in local festivals that celebrate the city’s ethnic diversity.
attributes:
  skills: '[''Community event planning'', ''Art curation and exhibition design'', ''Digital photography'', ''Social media management'', ''Project management'', ''Public speaking and facilitation'', ''Conflict
