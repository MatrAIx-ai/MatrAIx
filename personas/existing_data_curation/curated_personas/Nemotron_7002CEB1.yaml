  hobbies: '[''Visiting art galleries and museums'', ''Watercolor painting'', ''Street photography'', ''Recreational basketball'', ''Board‑game nights'', ''Beach clean‑up volunteering'', ''Everglades hiking'',
    ''Live music and poetry events'', ''Cooking experimental dishes'', ''Reading speculative fiction and philosophy'', ''Exploring new cultural experiences through travel'']'
  career_goals: He aims to transform his passion for the arts and his organizational talent into a sustainable career by establishing a community‑focused art hub in West Palm Beach. The center would offer
    free workshops, rotating exhibition space for emerging local artists, and host regular cultural events that bring together diverse neighborhoods. To qualify for nonprofit funding and expand his impact,
    Henry plans to earn a GED within the next year and complete a certificate program in nonprofit management or arts administration. He also hopes to become a recognized cultural organizer in the region,
    eventually serving on the board of the Norton Museum of Art's community outreach initiatives. Long‑term, he envisions launching a freelance consultancy that helps small arts organizations with event
    planning, branding, and digital outreach, while maintaining a modest side business offering photography services for local events.
