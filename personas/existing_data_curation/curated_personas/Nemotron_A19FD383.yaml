  hobbies: '[''Soccer (team captain)'', ''Robotics club (LEGO Mindstorms)'', ''Strategy video games (Civilization, StarCraft)'', ''Chess'', ''Model airplane building'', ''Lake fishing'', ''Hiking'', ''Nature
    photography'', ''Volunteer work (food bank)'', ''Community clean‑up events'']'
  career_goals: Timothy aims to graduate high school with top grades in math and science, earn a scholarship to a university renowned for engineering, and eventually become an aerospace or mechanical engineer.
    He envisions leading complex technical projects, designing innovative machines, and possibly contributing to the development of renewable energy technologies. In the meantime, he plans to continue competing
    in robotics contests, secure leadership roles in student organizations, and build a portfolio that showcases his disciplined, results‑driven approach. He also aspires to give back to his community by
    applying his organizational skills to local service initiatives.
