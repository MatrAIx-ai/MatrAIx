persona_description: A linguist who is interested in the study of language and its structure, particularly in the use of numerals and their patterns of addition and subtraction. They are familiar with the
  use of subtraction in languages and have a particular interest in the languages that use it already in the first decade, starting from 7 or 8. They are also interested in the specific questions about
  the languages that draw the line between 15 and 16, between 16 and 17. They are likely to be familiar with the work of Ivan A Derzhanski and the data in Mark Rosenfelder's collection of numerals up to
  10.
