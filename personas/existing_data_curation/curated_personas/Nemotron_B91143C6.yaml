personas:
  professional: Myrtle Wadsworth, a 24‑year‑old data‑driven marketing strategist in Jacksonville, leverages her STEM training to build analytical campaign pipelines, mastering tools like HubSpot, Google
    Analytics, and SEO, while their organized, compassionate nature ensures cross‑functional teams feel heard and projects stay on schedule.
  sports: Myrtle Wadsworth, a 24‑year‑old outdoor enthusiast, spends weekends kayaking the St. Johns River, plays beach volleyball with a local club at Jacksonville Beach, roots for the Jacksonville Jaguars
    in football and the Miami Heat in basketball, and follows the Florida Gators during college season, using a fitness tracker to log activity while occasionally skipping yoga after late salsa sessions.
  arts: Myrtle Wadsworth, a 24‑year‑old salsa dancer and avid reader, devotes evenings to practicing Latin moves to the rhythms of Celia Cruz and Marc Anthony, attends Jacksonville Jazz Fest, enjoys contemporary
    fiction by authors like Sally Rooney and Chimamanda Adichie, and watches streaming series starring Zendaya, letting the arts fuel both their creative mindset and community‑building spirit.
  travel: Myrtle Wadsworth, a 24‑year‑old explorer, prefers thoughtfully planned road trips that blend adventure and relaxation, having recently visited Savannah’s historic squares, the Blue Ridge Mountains
    in Asheville, and the Everglades, while dreaming of a sustainable tourism stint in Costa Rica; they budget using a travel spreadsheet and favor Airbnb stays that allow cooking local dishes.
  culinary: Myrtle Wadsworth, a 24‑year‑old home cook, delights in perfecting Southern classics like shrimp and grits, fried green tomatoes, and collard greens seasoned with smoked ham hocks, while also
    experimenting with global flavors such as Korean kimchi fried rice, often sourcing fresh produce at the Riverside Market and hosting potluck gatherings where they showcase both tradition and culinary
    curiosity.
  core: Myrtle Wadsworth, a 24‑year‑old data‑driven marketer with a passion for community, blends analytical precision, Southern hospitality, and a salsa‑infused social life into a uniquely balanced, though
    sometimes over‑scheduled, outlook on life.
background:
  cultural: Myrtle was raised in a middle‑class, white family in the Jacksonville area, where Southern hospitality and community involvement are core values. Her upbringing emphasized education—her parents
    encouraged her pursuit of a STEM degree—and active participation in church and local volunteer initiatives. This blend of Southern cultural norms and exposure to Jacksonville’s diverse population fostered
    her compassionate, cooperative nature and her drive to help others while maintaining a pragmatic, goal‑oriented approach.
attributes:
