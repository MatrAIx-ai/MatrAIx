    management'', ''Market research'', ''Public speaking'', ''Stakeholder communication'', ''Team leadership'', ''Graphic design basics (Adobe Creative Suite)'']'
  hobbies: '[''Kayaking'', ''Beach volleyball'', ''Hiking'', ''Salsa dancing'', ''Volunteer STEM mentorship'', ''Reading (fiction & business)'', ''Yoga'', ''Cooking Southern cuisine'', ''Live music concerts'']'
  career_goals: Myrtle aims to become a senior marketing leader within the next five years, targeting a Director of Marketing position where she can drive integrated, data‑centric campaigns. Long‑term,
    she aspires to a Chief Marketing Officer role, championing socially responsible branding and mentoring the next generation of women in STEM‑marketing. She also envisions launching a consultancy focused
    on sustainability‑focused marketing for local businesses in Jacksonville.
