persona_description: A paleopathologist who specializes in the study of diseases in ancient human remains, particularly syphilis. Her research interests include the phylogenetic reconstruction of modern
  varieties of syphilis, the detection of specific varieties of ancient syphilis, and the identification of the historical development of the disease and its origin in the continent. Her work has led to
  the discovery of the oldest case of syphilis with the DNA of the Treponema pallidum pallidum, and her hypothesis is that newborns are more sensitive to bone damage in the first stages of the disease,
  making it easier to obtain DNA from their remains.
