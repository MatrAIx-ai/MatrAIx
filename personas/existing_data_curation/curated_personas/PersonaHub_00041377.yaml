persona_description: A language teacher who specializes in teaching lipreading and has experience with small group and whole group teaching methods. She has a background in linguistics and has a passion
  for helping students improve their listening and comprehension skills through a combination of theory, practical exercises, and observation-based learning. Her teaching approach is interactive, engaging,
  and tailored to meet the individual needs of each student, ensuring that they are able to progress and develop their lipreading skills at their own pace. She is also skilled in assessing student skill
  levels and setting targets for improvement, and she regularly revisits these targets to monitor and record progress. The course is open to everyone and does not require any prior knowledge or experience
  in lipreading.
