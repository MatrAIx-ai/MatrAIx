personas:
  professional: Stephen Pickett is a veteran HR strategist who blends three decades of workforce planning, talent acquisition, and equitable compensation design with a pragmatic curiosity, steering organizations
    toward inclusive cultures while quietly championing data‑driven decision making.
  sports: Stephen Pickett is a devoted supporter of the Seattle Seahawks and Seattle Sounders, periodically joins the Seattle Hiking Club for weekend ascents of the Cascades, and maintains fitness through
    low‑impact cardio and trail hikes, preferring quiet endurance over competitive leagues.
  arts: Stephen Pickett finds creative solace at the home piano, improvising to Miles Davis and John Coltrane while immersing in the works of James Baldwin and Toni Morrison, and occasionally attends the
    Seattle Symphony’s jazz series and local spoken‑word gatherings.
  travel: Stephen Pickett prefers contemplative travel that blends natural retreats and cultural roots, having trekked the Alpine passes of Glacier National Park, explored the tea gardens of Kyoto, and
    dreamed of a soulful road trip through the historic streets of New Orleans.
  culinary: Stephen Pickett cooks with relaxed confidence, often pairing Southern staples like shrimp and grits or collard greens with Pacific Northwest flavors such as cedar‑plank salmon seasoned with
    rosemary, thyme, and locally foraged mushrooms, drawing inspiration from the herbs they tend in the backyard garden.
  core: Stephen Pickett balances a reflective love of jazz and gardening with a strategic drive to shape inclusive workplaces, yet often hoards vintage vinyl records and forgets to water succulents during
    busy weeks.
background:
  cultural: Stephen is a Black American whose family roots trace back to the Southern United States, with ancestors who participated in the Great Migration to the Pacific Northwest in the mid‑20th century.
    Growing up in Seattle’s historic Central District, he experienced a vibrant Black community rich in music, storytelling, and civic activism. His cultural identity blends Southern heritage—family gatherings
    centered on food, oral history, and church—with the progressive, multicultural environment of modern Seattle. This dual influence informs his appreciation for community solidarity, social justice, and
    the arts, shaping both his personal values and professional commitment to fostering inclusive workplaces.
attributes:
  skills: '[''Strategic Workforce Planning'', ''Talent Acquisition'', ''Employee Relations'', ''Performance Management'', ''Organizational Development'', ''Employment Law Compliance'', ''Compensation &
