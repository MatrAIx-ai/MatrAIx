  hobbies: '[''Reading African American literature and history'', ''Gardening with native Pacific Northwest plants'', ''Hiking in the Cascades'', ''Playing jazz piano'', ''Mentoring youth at a community
    center'']'
  career_goals: Stephen aims to transition from his current managerial role to senior executive leadership, ultimately becoming a Chief Human Resources Officer within a forward‑thinking organization. He
    is committed to advancing diversity, equity, and inclusion initiatives, leveraging his personal experiences to shape policies that support underrepresented employees. Stephen also seeks to mentor emerging
    HR professionals, particularly Black candidates, and to champion the integration of emerging HR technologies that enhance employee experience. In the long term, he envisions contributing to regional
    workforce development programs that strengthen Seattle’s talent pipeline and promote equitable economic growth.
