personas:
  professional: Ernesto Lopez, a bilingual tech enthusiast on the cusp of earning a CompTIA A+ certification, channels their curiosity and practical problem‑solving into building and troubleshooting PCs
    while balancing schoolwork, sports, and hobby projects with disciplined time‑management, all the while maintaining a skeptical eye toward vague vendor promises.
  sports: Ernesto Lopez, a dedicated street‑basketball shooter and defensive midfielder in local pickup soccer games, follows the Milwaukee Bucks for NBA inspiration and the Milwaukee Brewers for baseball,
    trains with the neighborhood Parkside Hoops club and the Milwaukee Youth Soccer Academy, and approaches fitness with a competitive edge, preferring high‑intensity drills over leisurely jogs.
  arts: Ernesto Lopez, a fan of reggaeton and salsa legends like Bad Bunny, Marc Anthony, and the classic sounds of Willie Colón, spends evenings curating playlists for study sessions, dabbling in FL Studio
    to remix tracks for friends, and attends local cultural festivals where they occasionally showcase a homemade LED light show synced to their favorite beats.
  travel: Ernesto Lopez, a budget‑conscious teen who plans trips via discount airlines and relies on school breaks, dreams of exploring the Caribbean island where their family roots lie and aspires to visit
    the tech hubs of Tokyo and Seattle, while already having taken a weekend road‑trip to Chicago for a basketball game and a family reunion in New York City.
  culinary: Ernesto Lopez, an intermediate home cook who loves the bold flavors of plantains, sofrito, and adobo, regularly helps prepare traditional family dishes such as mofongo and arroz con gandules
    on weekends, experiments with adding smoked paprika to their homemade rice, and occasionally over‑spices dishes when experimenting late at night after gaming sessions.
  core: Ernesto Lopez is a competitive, tech‑savvy teen who balances a love for sports, music, and cultural cooking with a pragmatic drive toward a bilingual IT career, all while navigating typical teenage
    quirks like gaming binges and occasional sleep debt.
background:
  cultural: Ernesto is a second‑generation Puerto Rican American raised in a bilingual household where Spanish and English flow interchangeably. Family gatherings are centered around Puerto Rican cuisine,
    music, and traditions such as celebrating Three Kings Day and the fiesta de San Juan. Though he lives in Milwaukee’s diverse urban environment, he remains connected to the broader Puerto Rican diaspora
    through community centers, cultural festivals, and a close‑knit extended family that emphasizes respect for elders and communal support. This hybrid cultural identity shapes his worldview, giving him
    a strong sense of heritage while also adapting to Midwestern customs and values.
attributes:
  skills: '[''Bilingual in Spanish and English'', ''Basic computer hardware assembly and troubleshooting'', ''Introductory programming (Python, Scratch)'', ''Arduino electronics projects'', ''Street basketball
