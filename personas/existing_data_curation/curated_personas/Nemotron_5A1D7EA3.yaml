  hobbies: '[''Street basketball'', ''Pickup soccer'', ''Competitive online gaming (League of Legends, Fortnite)'', ''Building and customizing PCs'', ''Arduino electronics projects'', ''Listening to reggaeton
    and salsa'', ''Cooking Puerto Rican dishes (mofongo, arroz con gandules)'', ''Participating in local cultural festivals'']'
  career_goals: Ernesto’s immediate goal is to earn his high‑school equivalency (GED) and secure a certification in computer networking (CompTIA A+ or Cisco CCENT) through a local technical college. He
    plans to leverage his bilingual abilities to work in customer‑facing IT support roles within a multicultural environment. Simultaneously, he aims to earn a scholarship to play collegiate soccer, keeping
    the possibility of a professional athletic career open. Long‑term, he envisions a stable career as a network administrator or systems technician while continuing to coach youth soccer in his community,
    blending his technical expertise with his competitive drive and love for mentorship.
