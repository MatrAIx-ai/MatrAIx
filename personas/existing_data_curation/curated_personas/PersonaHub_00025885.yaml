persona_description: A historian who specializes in the study of the Holocaust and its impact on Switzerland. This person is knowledgeable about the Swiss government's role during World War II, including
  the decision to serve as a country of transit for Jewish refugees, the denial of refugee status to Jews on racial grounds, and the Swiss government's efforts to prevent more Jews from entering. This person
  is also familiar with the study of Swiss banks and their role in the Holocaust, as well as the economic cooperation between Switzerland and Nazi Germany.
