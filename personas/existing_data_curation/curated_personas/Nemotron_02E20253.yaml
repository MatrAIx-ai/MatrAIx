  career_goals: Marcia aims to move beyond entry‑level positions by earning a supervisory role within the next two years, eventually becoming a shift manager and then an assistant manager at a community‑focused
    restaurant. She plans to finish a bachelor's degree in hospitality management, taking advantage of community‑college courses online. Her long‑term ambition is to open a small café that doubles as a
    local art gallery, providing a flexible work environment where she can blend her love of food service with her passion for visual arts. She also hopes to improve her Spanish fluency and develop a freelance
    photography portfolio that documents the desert landscape and cultural life of the border region.
