  career_goals: Callie aims to advance to a senior engineering technologist role where she can lead small, focused project teams and influence process improvements. She plans to earn a Lean Six Sigma Black
    Belt and a certification in project management (PMP) to broaden her leadership capabilities. Over the next five years, she hopes to spearhead a mentorship program that encourages young women in the
    local community to pursue STEM careers, aligning with her cooperative nature. While pursuing these professional milestones, she remains committed to maintaining a balanced workload that mitigates stress
    and preserves her well‑being.
