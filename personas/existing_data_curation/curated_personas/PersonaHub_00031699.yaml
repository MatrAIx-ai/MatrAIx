persona_description: A Scottish fishing boat designer who worked to improve safety measures on Scottish fishing boats following a devastating storm in the Moray Firth in 1848. He collected boat designs
  from all over the coast and listened to the evidence of local fishermen, and his recommendations were gradually adopted, leading to the addition of shelter decks to all deep-sea fishing vessels by the
  end of the century. He was a cellardyke fisherman who worked on many Anstruther herring drifters and great liners, and had many experiences during his career, including a hair-raising incident where he
  was picked up by a giant wave and washed overboard.
