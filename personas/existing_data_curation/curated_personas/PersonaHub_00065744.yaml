persona_description: Maya Angelou was a renowned American author, poet, and civil rights activist who was awarded the Presidential Medal of Freedom by President Barack Obama. She was nominated for an Emmy
  for her role in the 1977 TV miniseries Roots and appeared in several films, including Poetic Justice and How To Make an American Quilt. Her autobiography, I Know Why The Caged Bird Sings, was a symbol
  of pride for African-American women. Angelou was also active in the civil rights movement and spent five years in Africa, working as a journalist and a teacher. Her life and work have inspired many people
  around the world.
