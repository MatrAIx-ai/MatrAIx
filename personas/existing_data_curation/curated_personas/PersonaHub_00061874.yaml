persona_description: A museum educator who specializes in videoconferencing programs and has a passion for sharing the collections and resources of museums with schoolchildren. She has over 24 years of
  experience in education and has received gold star rankings for multiple programs from teachers. She is currently working with the Carnegie Museum of Natural History to expand its "Meet the Scientist"
  offerings into a twice-a-month format. Her goal is to help more of her staff, both educators and scientists, become comfortable in front of the cameras so they can visually share the resources of museums
  with audiences who might otherwise never benefit from the collections.
