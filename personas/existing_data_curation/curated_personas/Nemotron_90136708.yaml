personas:
  professional: Michael Piazza is a mechanical engineer at an energy-sector firm, leveraging SolidWorks expertise and a flair for visual storytelling to prototype sustainable cooling systems, while their
    informal organization style and competitive drive push them to lead cross-functional design-thinking workshops, even though they sometimes let chaos reign over their desk.
  sports: Michael Piazza is an avid intramural soccer player for the Kanawha Community Center club and a regular hiker on New River Gorge trails, while cheering on the West Virginia Mountaineers football
    team and the Pittsburgh Steelers, blending their love for team competition with solitary mountain workouts, and they often cue up a playlist of folk tunes to accompany their hikes.
  arts: Michael Piazza channels their love for Appalachian folk harmonies into electric guitar jam sessions inspired by The Avett Brothers, captures twilight vistas in long-exposure photographs reminiscent
    of Ansel Adams, and sketches murals echoing the bold lines of Banksy, weaving regional cultural roots into their creative pursuits, and they often experiment with mixed media to capture the textures
    of the mountains.
  travel: Michael Piazza prefers last-minute road trips that weave through the Blue Ridge Parkway to Asheville's art scene or a weekend cruise to New Orleans for jazz, yet they keep a bucket-list of overseas
    hikes in Patagonia and a desire to explore Kyoto's temples, balancing spontaneous local adventures with long-term cultural aspirations.
  culinary: Michael Piazza enjoys cooking smoky barbecue ribs seasoned with a blend of smoked paprika and brown sugar, whipping up pierogi stuffed with potato and chive for friends, and savoring craft beers
    from local microbreweries, while their occasional over-indulgence in late-night pizza slices reflects a relaxed approach to nutrition, and they often swap recipes with friends during post-jam session
    hangouts.
  core: Michael Piazza blends a rugged Appalachian work ethic with a restless curiosity, juggling chaotic project notes, competitive hackathon wins, and late-night guitar riffs, while they constantly chase
    the next sustainable design challenge.
background:
  cultural: Michael grew up in Charleston, West Virginia, within a family of mixed German‑Irish ancestry that values hard work, self‑reliance, and community ties typical of the Appalachian region. His parents
    encouraged a strong emphasis on education, steering him toward the state’s well‑regarded STEM programs. The cultural landscape of Kanawha County—where folk music, outdoor recreation, and a growing arts
    scene intersect—has shaped his appreciation for both technical precision and creative expression. While he identifies as a white American, he is aware of the region’s complex social history and seeks
    to contribute positively through sustainable engineering projects that respect local traditions and the natural environment.
