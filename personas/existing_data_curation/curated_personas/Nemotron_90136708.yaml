  career_goals: Michael aims to become a senior engineer who leads cross‑functional projects that blend engineering rigor with artistic sensibility. Over the next five years he plans to earn his Professional
    Engineer (PE) license, deepen his expertise in sustainable product development, and take on increasingly strategic roles within his energy‑sector employer. He is motivated to spearhead initiatives that
    reduce environmental impact of infrastructure in Appalachia, such as designing low‑emission cooling systems and modular renewable‑energy installations. Ultimately, Michael envisions launching his own
    consultancy that offers design‑thinking‑driven engineering solutions for small manufacturers and start‑ups, leveraging his competitive drive to win industry awards and grant funding.
