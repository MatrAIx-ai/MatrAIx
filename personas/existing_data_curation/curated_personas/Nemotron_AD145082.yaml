  hobbies: '[''Watercolor painting'', ''Gardening (vegetables, herbs, flowers)'', ''Reading (historical fiction, biographies, popular science)'', ''Knitting and quilting'', ''Attending bluegrass and folk
    music events'', ''Volunteering at the senior center'', ''Genealogy research and workshops'', ''Digital communication with family (video calls)'', ''Participating in book clubs'']'
  career_goals: Although retired, Heather aims to preserve and share her legacy by compiling a memoir and family genealogy that highlights the intertwining of scientific curiosity and Appalachian heritage.
    She hopes to mentor local youth interested in STEM through informal tutoring and guest lectures at the community center, and to support the Barbourville Arts Council by volunteering her time and artistic
    insight. Maintaining mental agility, she aspires to continue learning new technologies, explore contemporary art, and foster intergenerational connections within her community.
