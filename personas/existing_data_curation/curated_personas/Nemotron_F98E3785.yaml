personas:
  professional: Maria Rodriguez, a 2‑year‑old with a natural talent for building block towers, they combine a love for predictable stacking routines with spontaneous bursts of creative rearrangement, hinting
    at future engineering aspirations.
  sports: Maria Rodriguez delights in the neighborhood toddler soccer class with the Little Cubs team, they eagerly compete to score the first goal while sometimes shirking the structured warm‑up routine
    in favor of free‑play chase.
  arts: Maria Rodriguez loves dancing to the upbeat lullaby of Baby Shark and attempts to color a Crayola picture of Van Gogh’s Starry Night, they balance a structured desire to stay inside the lines with
    spontaneous scribbles beyond the borders.
  travel: Maria Rodriguez cherished the family’s weekend trip to the Children’s Museum of Chicago and a day at the nearby Lake Michigan shoreline, they mix anticipation for familiar car rides with the spontaneous
    joy of discovering tactile exhibits.
  culinary: Maria Rodriguez prefers creamy macaroni and cheese topped with cheddar, they enjoy crisp apple slices yet stubbornly reject peas, creating a predictable core diet punctuated by occasional adventurous
    bites of banana smoothies.
  core: Maria Rodriguez is a spirited two‑year‑old who blends a love for routine bedtime rituals with sudden bursts of playful chaos, they constantly negotiate for extra story time while fiercely protecting
    their favorite toys.
background:
  cultural: Maria Enid Rodriguez is raised in a Mexican‑American household that honors traditions such as Día de los Muertos, Mexican holiday celebrations, and family‑cooked meals like tamales and quesadillas.
    Living in Saginaw, Michigan, she experiences a blend of Midwestern community life and her family's Spanish language and cultural practices. Weekly visits to the local church, participation in community
    festivals at the Saginaw Mexican Cultural Center, and bilingual interaction at home shape her identity, values of family closeness, and appreciation for both Mexican heritage and the broader American
    environment.
