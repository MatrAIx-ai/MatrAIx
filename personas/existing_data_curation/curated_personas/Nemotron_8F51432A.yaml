  hobbies: '["gardening", "traditional Mexican cooking", "listening to boleros and mariachi music", "reading historical biographies", "reading Mexican literature", "woodworking", "playing chess", "walking
    in parks", "attending family gatherings and church events", "volunteering at a senior center (home‑repair assistance)"]'
  career_goals: In retirement, Guillermo aims to stay mentally and physically active while preserving his family’s Mexican heritage. He plans to mentor his grandchildren in practical skills and Spanish
    language, document family stories in a memoir, and expand his vegetable garden into a small community plot. He also wishes to learn to use digital photography and video‑calling tools to keep in touch
    with relatives in Mexico, and to volunteer as a safety advisor for the local senior center. Maintaining independence, good health, and a sense of purpose are his primary ambitions.
