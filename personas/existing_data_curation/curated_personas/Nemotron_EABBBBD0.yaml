personas:
  professional: Mikelle Minor, a certified personal trainer with an MBA, creates data‑rich, art‑infused training programs that balance meticulous scheduling with flexible artistic cues, reflecting a competitive
    yet solitary mindset.
  sports: An avid endurance athlete, Mikelle Minor competes in local sprint triathlons, logs weekly 50‑mile rides along the Minnesota River Trail, attends the Minnesota Triathlon Club, follows the Minnesota
    Vikings and Timberwolves for community spirit, and prefers solitary early‑morning runs through the woods.
  arts: An abstract painter and acoustic guitarist, Mikelle Minor regularly visits the Walker Art Center, draws inspiration from Agnes Martin and Mark Rothko, strings together chord progressions reminiscent
    of Iron & Wine, and curates an Instagram feed of nature photography paired with artistic commentary.
  travel: Preferring self‑planned, low‑key adventures, Mikelle Minor has backpacked the Boundary Waters canoeing through pristine lakes, traveled to Norway’s fjord region to experience the alpine quiet
    they crave, and keeps a travel bucket list that includes Patagonia’s Torres del Paine for its rugged solitude.
  culinary: Mikelle Minor experiments with seasonal, protein‑rich meals such as wild‑rice bowls with smoked salmon, foraged chanterelle sauté, and quinoa‑chickpea salads, enjoys perfecting a cold‑brew coffee
    ritual, yet often skips a balanced breakfast in favor of a post‑workout protein shake when training schedules run late.
  core: Mikelle Minor is a data‑driven fitness coach who blends solitary outdoor pursuits, abstract art, and disciplined budgeting into a competitive, quietly intense lifestyle marked by occasional neglect
    of routine social obligations.
background:
  cultural: Mikelle grew up in the suburban Midwest, raised in a family that traces its roots to German and Scandinavian immigrants who settled in Minnesota. The region’s strong emphasis on self‑reliance,
    connection to the outdoors, and community support for the arts shaped his values. He carries a pragmatic, no‑nonsense work ethic typical of the Upper Midwest while also appreciating the quiet, contemplative
    side of the local cultural scene, such as museum visits, seasonal festivals, and the region’s lakes and forests that fuel his solitary outdoor pursuits.
