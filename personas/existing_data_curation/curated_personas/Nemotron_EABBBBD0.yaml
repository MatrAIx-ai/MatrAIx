  hobbies: '["Solo hiking and trail running", "Nature photography", "Abstract painting and sketching", "Reading contemporary philosophy and science‑fiction", "Writing a fitness blog that blends art and
    training", "Cooking experimental healthy meals", "Playing acoustic guitar", "Meditative yoga practice", "Cycling along the Minnesota River trail", "Competing in local endurance events (sprint triathlons)",
    "DIY woodworking projects"]'
  career_goals: Mikelle aims to launch a boutique studio in Maple Grove that blends functional fitness with creative movement, offering quiet, introspective workout experiences. Over the next five years
    he plans to earn a Certified Strength and Conditioning Specialist (CSCS) credential and an Integrated Nutrition Coach certification, positioning himself as a go‑to expert for performance‑oriented clients.
    He envisions building an online subscription platform that delivers personalized training plans enriched with mindfulness and art‑inspired cues, reaching a wider audience while maintaining his preference
    for low‑key, solitary interaction. Ultimately, Mikelle aspires to be recognized as a leading voice in evidence‑based, art‑infused fitness within the Upper Midwest and to coach a competitive athlete
    to a national podium.
