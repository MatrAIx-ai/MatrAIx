personas:
  professional: Patricia Hunter, a veteran commercial truck driver with a sharp eye for logistics, blends their defensive‑driving mastery, GPS route‑optimization skills, and calm under pressure with a curiosity
    for art to manage sensitive cargo deliveries, and they are actively pursuing a GED and a promotion to logistics coordinator to eventually launch a community‑focused art transportation service.
  sports: Patricia Hunter spends Saturday mornings hiking the Blue Ridge foothills near Greensboro, joins a weekly pickup basketball game with the Greensboro Community League, and passionately roots for
    the Carolina Hurricanes in the NHL and the UNC Tar Heels during college basketball season, while they also enjoy cheering on local high school teams during spring tournaments.
  arts: Patricia Hunter’s artistic spirit flourishes as they paint vibrant neighborhood scenes inspired by Romare Bearden, photograph street life with a vintage 35mm camera, sing gospel classics by Andra
    Day in a community choir, and curate pop‑up exhibitions at the African American Museum alongside local musicians like Gary Clark Jr.
  travel: Patricia Hunter prefers spontaneous road trips along the East Coast, having recently driven the Blue Ridge Parkway to Asheville and taken a weekend getaway to Savannah for its historic squares,
    while they dream of an overseas pilgrimage to Ghana to explore the legacy of the African diaspora.
  culinary: Patricia Hunter enjoys cooking soul‑food staples such as fried chicken, collard greens simmered with smoked turkey, and sweet potato pie, adds a homemade hot sauce made from habanero and garlic
    for extra kick, and confidently balances a medium‑level culinary skill set that lets them improvise recipes during community potlucks.
  core: Patricia Hunter balances a rigorous logistics career with a vibrant community art life, often worrying about deadlines yet finding calm in paint, music, and weekend hikes, and they occasionally
    splurge on art supplies as a stress‑relief habit.
background:
  cultural: Patricia is an African‑American woman born and raised in Greensboro, North Carolina. Her family’s roots trace back to the Great Migration, and she grew up hearing stories of the historic Greensboro
    sit‑ins and the city’s civil‑rights legacy. She is active in her local Baptist church, celebrates Southern Black traditions such as cookouts, storytelling, and gospel music, and supports community events
    that honor African‑American art and history. Her cultural identity informs her values of resilience, community service, and a deep appreciation for the artistic expressions of her heritage.
attributes:
  skills: '["Commercial truck driving", "Defensive driving", "Route planning and optimization", "Basic vehicle maintenance", "Customer service", "Sales negotiation", "Cash handling", "Inventory management",
