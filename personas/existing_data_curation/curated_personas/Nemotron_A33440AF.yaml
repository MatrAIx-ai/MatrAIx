  hobbies: '["Visiting art galleries and museums", "Painting and sketching", "Photography", "Community choir singing", "Volunteering at youth car‑maintenance workshops", "Gardening", "Cooking Southern cuisine",
    "Social dancing", "Hiking on local trails", "Board games with friends"]'
  career_goals: Patricia aims to complete her GED within the next year, positioning herself for a promotion to logistics coordinator or fleet supervisor within her current company. She also aspires to launch
    a small, community‑focused transportation business that specializes in delivering artwork and cultural artifacts for local galleries and museums. Long‑term, she hopes to mentor younger drivers, especially
    women and people of color, and become an advocate for safer, more inclusive workplace practices.
