  career_goals: Lloyd aims to become a senior curator or museum director within the next five years, overseeing a regional history museum that integrates interactive STEM-based exhibits. He plans to lead
    a comprehensive digitization project to make the institution’s collections accessible online, securing federal and private grants to fund the initiative. By establishing partnerships with local schools
    and universities, he hopes to develop educational programs that connect Colorado’s natural history with its cultural heritage. He also aspires to earn the Certified Archivist credential and publish
    research on preservation best practices, positioning himself as a thought leader in the museum field while balancing his workload to mitigate stress.
