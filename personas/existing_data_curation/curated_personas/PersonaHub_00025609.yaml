persona_description: A marine ecologist and scientist who specializes in studying the impacts of disease on marine organisms, particularly the Eastern oyster, and the strategies to mitigate these impacts.
  She has conducted extensive research on the effects of Dermo infection on oysters in the Chesapeake Bay and is working to develop a three-part strategy to protect oysters from fishing, reduce nutrient
  runoff, and restore oysters in shallow areas to help fix the oxygen and acid cycles that exacerbate the disease. Her expertise in marine ecology and her focus on the health of the Chesapeake Bay make
  her a valuable resource for policymakers and researchers looking to address the challenges posed by disease in the bay.
