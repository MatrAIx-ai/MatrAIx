  hobbies: '[''woodworking'', ''vegetable gardening'', ''recreational fishing'', ''chess'', ''volunteering for community event planning'', ''reading historical non‑fiction'', ''walking/hiking'']'
  career_goals: Derek aims to channel his disciplined, achievement‑driven mindset into community service by serving on the Gainesville Homeowners Association board, mentoring younger retirees through a
    local senior center, and eventually authoring a practical guidebook on efficient home maintenance for seniors. He also plans to earn an advanced woodworking certification and to travel to several national
    parks before the end of the decade.
