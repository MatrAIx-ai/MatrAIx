personas:
  professional: Derek Mccook, a seasoned facilities operations manager for a university, applies his precision‑driven budgeting, mechanical troubleshooting, and meticulous record‑keeping to keep campus
    infrastructure humming, while they channel the same disciplined, achievement‑focused energy into organizing community events and mentoring retirees.
  sports: Derek Mccook follows the Florida Gators football team and the Tampa Bay Buccaneers, plays weekly senior‑club bowling, spends early mornings walking the trails around Gainesville’s Kanapaha Preserve,
    and they treat weekend lake fishing as both leisure and low‑impact cardio, reflecting their structured yet low‑stress approach to staying fit.
  arts: Derek Mccook enjoys classic folk tunes from Johnny Cash and Bob Dylan, studies historical documentaries featuring Ken Burns, attends occasional performances at the Hippodrome State Theatre, and
    they draw design inspiration from Andrew Wyeth’s realist paintings, allowing artistic appreciation to enrich their woodworking projects.
  travel: Derek Mccook has road‑tripped to Shenandoah and the Great Smoky Mountains, prefers carefully plotted itineraries with printed maps, and they aim to complete a Grand Circle tour of Yellowstone,
    Grand Canyon, and Yosemite before turning sixty‑five, balancing modest senior‑discount budgets with a desire for immersive nature experiences.
  culinary: Derek Mccook cultivates tomatoes, zucchini, and basil in a modest garden, then they prepare grilled trout seasoned with rosemary and lemon, a hearty vegetable stir‑fry, and occasional homemade
    cornbread, reflecting a practical, flavors‑first cooking style that matches their DIY ethos.
  core: Derek Mccook epitomizes disciplined pragmatism, turning every hobby—from woodworking to community planning—into a precision‑driven project while they occasionally indulge in a weekend fishing trip
    that breaks their otherwise rigid routine.
background:
  cultural: Derek was raised in a middle‑class white family of Irish‑American heritage in the Midwest, absorbing traditional American values of self‑reliance, practicality, and community service. After
    moving to Gainesville, Florida, he adopted aspects of Southern hospitality and the university town’s emphasis on lifelong learning and civic involvement, while maintaining his Protestant‑Christian upbringing
    and a preference for structured, predictable environments.
