  hobbies: '[''Gardening'', ''Quilting'', ''Reading historical fiction'', ''Baking'', ''Genealogy research'', ''Bridge (card game)'', ''Church volunteering'', ''Walking'', ''Cooking for family gatherings'']'
  career_goals: Although retired, Sue Elise aims to stay active in her community by mentoring new teachers through the York County School District’s retired‑teacher program and by expanding the after‑school
    tutoring initiative she already helps run. She hopes to complete a community‑history project that records the stories of long‑time Fort Mill residents, using her genealogy skills and newly learned digital
    archiving tools. On a personal level, she aspires to master advanced quilting techniques and to publish a small cookbook featuring her family’s Southern recipes. Maintaining her health through regular
    walking and garden work is also a priority, ensuring she can continue her service for years to come.
