  hobbies: '[''Gardening'', ''Hiking'', ''Reading historical biographies and classic literature'', ''Knitting'', ''Preserve making'', ''Volunteer work at local nature center'', ''Participating in a small
    book club'', ''Community garden involvement'']'
  career_goals: Although Emily is nearing retirement, she aims to leave a lasting impact on the district’s STEM education. Her goals include designing a district-wide interdisciplinary STEM curriculum,
    establishing a sustainable after‑school robotics and maker club, and publishing a guidebook on practical inquiry‑based teaching for elementary educators. She also hopes to serve as a consultant for
    nearby schools seeking to improve their science programs and to mentor a cohort of retiring teachers transitioning to volunteer tutoring roles.
