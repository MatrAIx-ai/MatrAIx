persona_description: A project manager who is responsible for overseeing the progress of a construction project. This person is skilled in earned value management, a process that assesses the value of work
  that has been done at a particular point and expresses that in proportion to the value of what should have been done by that point. The person has experience with estimating costs and durations for construction
  projects and is familiar with the basic calculations used in earned value management. This person is likely to have a strong understanding of the importance of project management and the need for accurate
  cost and schedule tracking to ensure the success of the project.
