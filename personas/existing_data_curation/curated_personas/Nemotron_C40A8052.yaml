personas:
  professional: Susan Butler, a three‑year‑old who loves to play ‘teacher’ by lining up her stuffed animals into orderly rows for pretend lessons, demonstrates early practicality and a preference for predictable
    routines, and they instinctively correct classmates’ mistakes during play, reflecting their competitive and skeptical nature.
  sports: Susan Butler enjoys toddler gymnastics classes at the local community center, cheers for the nearby baseball team the Thunderbirds during family outings, and they regularly challenge playground
    friends to sprint races, showcasing an early love for structured activity and a competitive spirit.
  arts: Susan Butler delights in drawing colorful dinosaurs, dancing to Elmo’s songs from Sesame Street, and they frequently request the same ‘Bluey’ episode, revealing a blend of creative expression, predictable
    routines, and modest social talkativeness.
  travel: Susan Butler has visited the city zoo and a beachside resort in Florida with her family, and they daydream about a dinosaur museum in Utah, preferring trips with clear itineraries, familiar foods,
    and ample nap times to ease their natural worry about new environments.
  culinary: Susan Butler prefers soft banana pancakes drizzled with honey, loves munching on carrot sticks and cheddar cubes, and they often spill milk while attempting to stir batter, reflecting a practical
    palate, developing cooking skills, and a tendency toward occasional messiness.
  core: Susan Butler, a three‑year‑old who craves routine, competes eagerly in play, worries over small changes, and occasionally makes a mess in the kitchen, embodies a bright curiosity tempered by a cautious,
    competitive streak.
background:
  cultural: Susan comes from a White, Midwestern American family living in Central City, Nebraska. Her upbringing reflects the values of a small-town, agricultural community, where family gatherings, church
    attendance, and seasonal celebrations such as Thanksgiving and Fourth of July barbecues are common. The local culture emphasizes self-reliance, routine, and modest social interaction, which aligns with
    Susan's preference for predictable structures and balanced social time.
