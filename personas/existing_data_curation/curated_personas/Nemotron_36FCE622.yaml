  career_goals: Alisson aims to advance to a lead engineer position within the next two years, eventually moving into a principal engineer or engineering‑manager role where she can shape product strategy
    and mentor larger teams. She plans to deepen her cloud architecture expertise by obtaining the AWS Certified Solutions Architect – Professional credential and to contribute to open‑source projects that
    improve accessibility and environmental sustainability. Over the next five years, she hopes to spearhead a tech initiative that combines artificial intelligence with climate‑focused applications, translating
    her curiosity for emerging technologies into practical, scalable solutions. Additionally, she aspires to strengthen the Colorado tech community by organizing women‑in‑tech meetups, mentorship programs,
    and volunteer coding workshops for under‑represented youth.
