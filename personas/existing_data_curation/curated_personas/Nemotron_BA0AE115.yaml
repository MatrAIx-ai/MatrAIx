  career_goals: Although retired, Tyler aims to stay intellectually and socially active. He plans to complete a memoir of his life in middle‑class post‑war New England, contribute regular columns to the
    senior center newsletter, volunteer as a mentor for younger members of the community garden, and take a beginner’s painting class at the local art center. He also hopes to travel to a few major art
    museums in the Northeast, such as the Museum of Fine Arts in Boston, and to organize a small traveling exhibition of his photographs of Plymouth County landmarks.
