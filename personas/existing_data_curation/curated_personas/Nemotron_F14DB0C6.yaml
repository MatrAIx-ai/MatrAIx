  career_goals: At 57, Gabriel aims to transition from full‑time shop floor work to a more flexible role that lets him share his knowledge. He is pursuing a certification in CNC supervision and hopes to
    become a shop foreman or a part‑time trainer for a local vocational program, where he can mentor the next generation of machinists. Gabriel also dreams of eventually opening a modest, family‑run machine
    shop that specializes in custom metalwork for local farms and ranches, allowing him to blend his practical skills with his love for community. He values a work schedule that preserves evenings for family
    and community events, reflecting his relaxed approach to obligations.
