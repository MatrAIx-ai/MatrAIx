  hobbies: '[''Playing guitar'', ''Cooking Mexican and Tex‑Mex cuisine'', ''Attending local rodeos and community festivals'', ''Fishing'', ''Hunting'', ''Playing and watching soccer'', ''Dancing (cumbia,
