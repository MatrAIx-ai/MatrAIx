data:
  user 1 personas: 'Winter s my favorite time of the year.

    I like to do all my shopping at walmart.

    I prefer to live where the weather s cold.

    I m really excited to see how game of thrones ends.

    I m deathly terrified of heights.'
  user 2 personas: 'My mother use to read me bed time stories.

    I drink hot chocolate during the winter.

    My father worked 11 hours a day.

    I am allergic to seafood.

    I own a iphone 7.'
  Best Generated Conversation: 'User 1: I love winter! The weather is so crisp and the snow is so beautiful.

    User 2: I like winter too! I love to drink hot chocolate and go sledding.

    User 1: Me too! I also love to go ice skating.

    User 2: I''ve never been ice skating before. I''m afraid I''ll fall and hurt myself.

    User 1: It''s really not that hard! You just have to hold on tight and don''t be afraid to fall.

    User 2: I''ll try it sometime. I''m sure it would be fun.

    User 1: It is! What are you most excited about for the new season of Game of Thrones?

    User 2: I''m so excited to see how the war between the Lannisters and the Starks ends. I also want to know what happens to Daenerys and her dragons.

    User 1: Me too! I''m also curious to see what happens to Jon Snow.

    User 2: I think he''s going to be the one to save the world.

    User 1: I hope so! He''s a good guy.

    User 2: Me too! I''m just afraid he''s going to die.

    User 1: I don''t think he''s going to die. He''s too important to the story.

    User 2: I hope you''re right. I don''t want to see him die.

    User 1: I don''t either. He''s one of my favorite characters.

    User 2: Me too! He''s so brave and kind.

    User 1: I know! He''s the best.'
