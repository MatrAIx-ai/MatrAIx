personas:
  professional: Tong Alkhatib, a five‑year‑old budding classroom organizer, meticulously lines up crayons by hue, volunteers to help peers with puzzles, and plans snack rotations during playtime, showcasing
    their love of structure, sociability, and compassion.
  sports: Tong Alkhatib sprints on the Grasshopper Kids soccer squad, proudly wears a Manchester United jersey, and joins weekday swimming lessons at the community pool, channeling their energetic, organized,
    and cooperative spirit into team sport.
  arts: Tong Alkhatib sings along to The Wiggles, imitates Disney's Frozen anthem "Let It Go", and draws vibrant pictures of Sesame Street's Elmo, often staging tiny shows for family, satisfying their outgoing,
    compassionate, and structured creative side.
  travel: Tong Alkhatib has toured the local zoo, spent a weekend at Grandma's countryside farm, and dreams of visiting Disneyland Paris, always preparing a tiny checklist of snacks and favorite stuffed
    animal to calm their worries about new environments.
  culinary: Tong Alkhatib prefers creamy macaroni and cheese with extra cheddar, delights in peanut butter and jelly sandwiches cut into star shapes, and occasionally indulges in sugary Frosted Flakes cereal,
    often demanding the food be neatly arranged on their plate before eating.
  core: Tong Alkhatib is a five‑year‑old bundle of structured energy, whose meticulous routines and sociable charm mask a quiet anxiety over small disruptions.
background:
  cultural: Tong Jason is raised in a Polynesian family that settled in Anchorage, Alaska. His household honors Polynesian traditions such as weekly dance practice, storytelling in the native language,
    and shared meals featuring dishes like poi and kalua pork. He participates in community gatherings that blend Pacific Island customs with local Alaskan activities, including winter sports and town festivals.
    The family values respect for elders, collectivism, and harmony, and encourages bilingual exposure at home while he attends a public preschool that celebrates cultural diversity.
