persona_description: A public health expert who studies the effectiveness of herd immunity and the role of seroprevalence surveys in measuring the gap between herd immunity and reality. They are interested
  in the potential consequences of not achieving herd immunity, including the high mortality rates and the potential for the virus to continue spreading unchecked. They are also interested in the development
  of a vaccine and the challenges of convincing people to take it.
