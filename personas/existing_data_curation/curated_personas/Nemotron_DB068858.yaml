  hobbies: '["Organic vegetable gardening", "Traditional Puerto Rican cooking", "Reading popular science books", "Crossword and Sudoku puzzles", "Volunteer beach clean-ups", "Senior trivia nights", "Listening
    to plena and salsa music", "Knitting and crocheting", "Genealogy research", "Learning basic French phrases"]'
  career_goals: Although retired, Maria aims to stay intellectually active and give back to Vega Alta. She plans to launch a community garden that doubles as a living classroom for local children, volunteer
    as a STEM mentor at the municipal high school, and write a series of easy‑to‑read articles on practical science for senior readers. She also hopes to compile a pocket guide on basic home repairs and
    organize monthly trivia nights to combine her competitive spirit with community building, while gradually learning stress‑management techniques to ease her frequent worries.
