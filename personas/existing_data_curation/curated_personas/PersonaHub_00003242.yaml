persona_description: A marine biologist with a specialization in coral reef ecology, particularly focusing on the conservation and management of coral populations. This individual is interested in understanding
  the factors that contribute to the background mortality of corals in different locations, such as the Maldives and the northern Great Barrier Reef, and how these differences in injury regimes affect the
  resilience of coral communities to large-scale disturbances. This person is likely to be interested in publishing research that quantifies the prevalence and severity of sublethal injuries among coral
  taxa, and how these results can inform conservation efforts and management strategies for coral reefs.
