personas:
  professional: Neil Keefe, a 50‑year‑old certified appliance repair specialist, combines deep expertise in electrical schematics and HVAC systems with a methodical, safety‑first mindset, delivering clear
    explanations to customers while mentoring apprentices on the path to energy‑efficient retrofits and a future community shop.
  sports: Neil Keefe energizes his weekends by playing in the Newberry County community basketball league, cheering the Clemson Tigers football team at high‑school games, and coaching local youth drills,
    while they stay fit through early‑morning jogs along the Sandhills trails.
  arts: Neil Keefe enjoys the soulful strains of Southern Gospel choirs and classic rock icons like Johnny Cash, collects vintage radios as functional art, and they attend local theater productions featuring
    community actors, letting music and performance fuel their creative tinkering.
  travel: Neil Keefe favors road trips that blend purposeful planning with spontaneous stops, having road‑tripped to the historic streets of Charleston, the misty mountains of Asheville, and the fishing
    haven of Lake Lanier, while they budget trips with a mix of savings and occasional credit‑card rewards.
  culinary: Neil Keefe delights in mastering Southern barbecue, regularly grilling pork ribs with a sweet‑hot rub, smoking chicken thighs using hickory chips, and whipping up side dishes like collard greens
    and cornbread, while they often craft their own cutting boards through woodworking.
  core: Neil Keefe blends a curious tinkerer’s spirit with a methodical, community‑focused work ethic, balancing worry‑driven stress with faith‑based service, basketball‑court camaraderie, and a love for
    grill‑smoked meals, all while they remain relentlessly organized.
background:
  cultural: Neil grew up in a traditional white Southern family in Newberry County, where church, family, and community events shaped his values. He was raised with a strong work ethic, learning hands‑on
    trades from his father and taking part in local gatherings such as church socials, county fairs, and football tailgates. Southern hospitality and a love for regional cuisine—especially fried chicken,
    collard greens, and sweet tea—are integral to his identity. His background emphasizes reliability, modesty, and a deep connection to his hometown, which continues to influence his relationships, community
    involvement, and worldview.
attributes:
  skills: '["Appliance diagnostics", "Electrical system repair", "Mechanical component replacement", "HVAC troubleshooting", "Circuit soldering and repair", "Preventative maintenance planning", "Safety
    compliance (OSHA, EPA)", "Customer communication", "Inventory and parts ordering", "Service scheduling optimization", "Apprentice training", "Energy-efficient appliance retrofitting"]'
  hobbies: '["Community basketball league", "Fishing at Lake Murray", "Woodworking", "DIY electronics and vintage radio restoration", "Church outreach volunteering", "High school football game attendance",
    "Southern grilling and barbecue", "Nature walks in the Sandhills", "Meditation for stress relief"]'
  career_goals: Neil aims to become a Certified Appliance Service Technician (C.A.S.T.) and eventually open his own small repair shop in Prosperity, SC, that offers fast, reliable service and apprenticeships
    for local youth. He wants to specialize in energy‑efficient retrofits for aging appliances, helping his community cut electricity costs. Over the next five years, he plans to attend continuing‑education
    workshops on smart home technology and expand his service offerings to include basic IoT appliance troubleshooting. Ultimately, he hopes to secure a comfortable retirement while leaving a legacy of
    skilled trades mentorship in Newberry County.
