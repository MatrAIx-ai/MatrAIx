  career_goals: Angela aims to advance to an office manager or senior administrative coordinator role within the next five years. She plans to obtain a Certified Administrative Professional (CAP) credential
    and complete an associate degree in business administration through a local community college. Her long‑term ambition is to mentor newer administrative staff and eventually oversee a small team, ensuring
    smooth operations while maintaining a supportive, harmonious environment. She also explores the possibility of offering freelance virtual assistance to local small businesses, leveraging her flexible
    work style and strong organizational foundation.
