persona_description: A historian or a geographer who is interested in the history and geography of New Zealand, particularly focusing on the early European explorations, the interactions between Maori and
  Europeans, and the impact of European settlement on the country's culture and society. They are also knowledgeable about the country's natural resources, its flora and fauna, and its geographical features.
  They are interested in the impact of European colonization on Maori culture and the ongoing legacy of European influence in the country.
