  hobbies: '[''drawing'', ''painting'', ''storytime at library'', ''building with blocks'', ''singing'', ''dancing'', ''nature walks'', ''playdates'']'
  career_goals: Although just five, Sara already talks about what she wants to be when she grows up. She dreams of becoming a teacher so she can share her love of learning, an artist to create beautiful
    pictures, and a veterinarian to care for animals. She also imagines exploring the world as an astronaut, reflecting her curiosity and desire for new experiences.
