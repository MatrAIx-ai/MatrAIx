personas:
  professional: An aspiring junior architect in the making, Sara Celentano enjoys arranging LEGO bricks into elaborate cityscapes, meticulously planning each structure before play, and they often take charge
    of organizing group building projects, reflecting their organized and sociable nature.
  sports: A budding soccer enthusiast, Sara Celentano attends the Little Lions youth soccer club on Saturday mornings, loves dribbling drills, they cheer loudly for the local professional team City United,
    and enjoys coordinated playground tag games with friends.
  arts: An enthusiastic young art lover, Sara Celentano spends afternoons drawing whimsical characters inspired by the animated films of Hayao Miyazaki, enjoys finger‑painting to the jazzy rhythms of Herbie
    Hancock, and they proudly display a crayon portrait of Van Gogh’s Starry Night on the refrigerator.
  travel: A curious little explorer, Sara Celentano has already visited the Grand Canyon on a family road trip, delights in the interactive exhibits at the Children’s Museum of Indianapolis, they dream
    of seeing the Eiffel Tower someday, and prefers trips that blend playful activities with opportunities to collect colorful postcards for their growing scrapbook.
  culinary: A selective yet adventurous eater, Sara Celentano adores cheesy pizza slices, crunchy carrot sticks with hummus, and the sweet aroma of cinnamon‑spiced apple muffins, they often help stir batter
    in the kitchen while insisting on using a tiny whisk they call their 'magic wand'.
  core: Sara Celentano is a spirited five‑year‑old whose boundless curiosity, methodical planning, and warm sociability turn everyday adventures—from LEGO skyscrapers to pigment‑splattered canvases—into
    joyful, organized explorations, even if occasional sticker splurges and forgotten sunscreen momentarily derail the perfect routine, and they always bounce back with a bright smile.
background:
  cultural: Sara was born and raised in Clearfield, a small town in Davis County, Utah, within a largely white, close‑knit community. Her family participates in local traditions such as community gatherings,
    church events, and outdoor recreation in the nearby mountains and farmland. The local culture emphasizes cooperation, family bonding, modesty, and an appreciation for nature, all of which have nurtured
    Sara’s curiosity, artistic interests, and caring personality.
