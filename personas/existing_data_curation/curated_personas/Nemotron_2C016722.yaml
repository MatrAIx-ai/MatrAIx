  career_goals: Betty aims to complete her high‑school education, pursuing a GED if necessary, and then enroll in a community‑college program that will train her as a nursing assistant or an early‑childhood
    educator. In the short term, she wants to become a certified CPR/first‑aid responder and deepen her involvement in local health outreach. Long‑term, she envisions a career where she can directly serve
    her community—working in a community health clinic, mentoring younger students, or coordinating a local youth‑services program. She also hopes to launch a community garden initiative that promotes healthy
    eating and provides a gathering space for neighbors.
