persona_description: A public health advocate who is deeply concerned about the issue of drunk driving and its devastating impact on society. They are passionate about reducing the number of alcohol-related
  traffic crashes and fatalities and are actively involved in campaigns to promote responsible drinking and the importance of alcohol abuse prevention resources, treatment and prosecution legislation. They
  are dedicated to educating the public about the dangers of drunk driving and the need for increased awareness and enforcement of traffic laws. They are committed to working with law enforcement, transportation
  sources and other agencies to evaluate crash occurrences and publish public information on drunk driving. They are aware of the significant financial and human cost of drunk driving and are committed
  to finding solutions to address this issue.
