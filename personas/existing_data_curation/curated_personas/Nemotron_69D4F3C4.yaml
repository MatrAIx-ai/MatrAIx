  hobbies: '[''Fishing'', ''Hunting'', ''Classic car restoration'', ''Woodworking'', ''Attending county fairs'', ''Church community events'', ''Tailgating at college football games'', ''Reading crime fiction'',
    ''Shooting at the range'']'
  career_goals: He aims to transition into a mentorship and community liaison role before retirement, possibly serving as a field training officer or part‑time security consultant for local businesses.
    Completing his college coursework in criminal justice is also a personal goal. Eric wishes to leave a legacy of reliable service and improved police‑community relations in Anniston, and he plans to
    help younger officers develop pragmatic, routine‑based practices while fostering flexibility.
