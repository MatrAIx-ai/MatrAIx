  hobbies: '[''Gardening'', ''Southern cooking'', ''Quilting'', ''Crocheting'', ''Church choir and gospel singing'', ''Bingo and bridge'', ''Hiking and birdwatching'', ''Reading historical fiction'', ''Hosting
    potluck gatherings'']'
  career_goals: Although retired, Alexandra aims to deepen her community involvement by leading a weekly senior cooking class at the local church and expanding her garden to provide fresh produce for the
    nearby food pantry. She hopes to compile a family recipe book that captures generations of Southern dishes and to mentor younger volunteers in event planning and friendly competition hosting. Maintaining
    her health and independence, she also looks forward to occasional trips to visit her grandchildren and to showcase her handcrafted quilts at the county fair.
