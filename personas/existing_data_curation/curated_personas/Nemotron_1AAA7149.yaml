personas:
  professional: Miguel Hairston, an aspiring community organizer and budding social worker, leverages their natural knack for connecting people, quick adoption of digital tools, and flexible, results‑oriented
    mindset to coordinate volunteer drives, produce engaging social‑media content, and plan informal neighborhood events despite occasional disorganization.
  sports: Miguel Hairston, an avid basketball player, joins the Lake Charles Youth Basketball League after school, roots for the New Orleans Pelicans during the NBA season, spends Saturday mornings fishing
    the Calcasieu River, and stays fit by skateboarding around town and hiking the local bayous, though they sometimes skip workouts when a block party calls.
  arts: Miguel Hairston, passionate about music and visual storytelling, attends zydeco shows featuring Clifton Chenier tributes and hip‑hop concerts headlined by Kendrick Lamar, creates TikTok videos inspired
    by Zach King’s editing tricks, and draws graphic flyers for community events, weaving these artistic influences into their daily life.
  travel: Miguel Hairston, with a love for both adventure and cultural immersion, has road‑tripped to New Orleans for Mardi Gras, camped in the Texas Hill Country, dreams of backpacking through New Mexico’s
    art colonies, and plans future weekend getaways to Austin’s live‑music scene while budgeting trips around a modest student allowance.
  culinary: Miguel Hairston enjoys cooking Creole staples like shrimp gumbo, jambalaya, and crawfish étouffée seasoned with paprika, thyme, and okra, boasts a budding knack for balancing spice levels, and
    relishes sharing these dishes at family gatherings, though they sometimes over‑cook the rice when multitasking between video editing and cooking.
  core: Miguel Hairston is a sociable, curiosity‑driven teen who blends community‑focused hustle with a laid‑back, sometimes chaotic lifestyle, channeling their love for sports, music, and food into vibrant
    neighborhood projects while battling occasional procrastination.
background:
  cultural: Miguel is an African American raised in Lake Charles, Louisiana, a city where Southern Black traditions intersect with Cajun‑Creole culture. His upbringing reflects the rhythms of gospel music
    in church, the flavors of Creole cuisine shared at family tables, and the communal spirit of local festivals like Mardi Gras and Juneteenth. He draws strength from his family's emphasis on community
    support, storytelling, and resilience, while also embracing the multicultural tapestry of Calcasieu Parish, where bilingual neighbors, historic river life, and vibrant street celebrations shape his
    identity.
attributes:
  skills: '[''Interpersonal communication'', ''Community outreach'', ''Social media management'', ''Basic video editing'', ''Graphic design for flyers'', ''Event coordination'', ''Problem‑solving under
