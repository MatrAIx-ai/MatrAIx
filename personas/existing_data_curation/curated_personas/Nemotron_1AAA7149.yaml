  hobbies: '[''Playing basketball'', ''Attending zydeco and hip‑hop concerts'', ''Cooking Creole dishes'', ''Fishing on the Calcasieu River'', ''Hiking in Louisiana bayous'', ''Volunteering at the community
    center'', ''Creating short videos for social media'', ''Skateboarding'', ''Participating in neighborhood block parties'', ''Listening to R&B and gospel music'']'
  career_goals: Miguel wants to channel his compassion and cooperative spirit into a career that strengthens his community. He aims to earn a bachelor's degree in social work or public administration while
    completing internships with local nonprofits. His long‑term ambition is to become a community health worker or youth program director, creating programs that blend practical services with innovative,
    data‑driven approaches. He also dreams of launching a small community café that doubles as a safe space for tutoring, mentorship, and neighborhood gatherings, allowing him to merge his entrepreneurial
    curiosity with his desire to help others.
