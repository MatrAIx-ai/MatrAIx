personas:
  professional: Judy Brooks operates the MSU campus transit system, expertly navigating routes, performing vehicle inspections, and de‑escalating passenger concerns with calm composure, while their laid‑back
    approach to personal organization occasionally results in a misplaced coffee cup or a forgotten lunch.
  sports: Judy Brooks avidly supports the Mississippi State Bulldogs football team at Davis Wade Stadium, enjoys jogging the trails of Tishomingo State Park, participates in community Zumba classes, and
    follows the New Orleans Saints during the NFL season, balancing collegiate spirit with personal fitness pursuits.
  arts: Judy Brooks unwinds to country‑music playlists featuring Luke Bryan, Kacey Musgraves, and Miranda Lambert, frequently leads karaoke nights with Dolly Parton classics, and hosts board‑game gatherings
    centered on Settlers of Catan and Ticket to Ride, weaving music, performance, and strategic play into their social life.
  travel: Judy Brooks prefers spontaneous weekend getaways, often driving to Tishomingo State Park for hiking or hopping a bus to New Orleans for live jazz, while they keep a travel bucket list that includes
    Nashville’s music scene and Savannah’s historic squares, booking everything on a shoestring budget with student discounts and ride‑share apps.
  culinary: Judy Brooks loves cooking Southern comfort staples, perfecting flaky buttermilk biscuits, crispy fried catfish seasoned with Cajun spice, and sweet tea brewed with generous sugar and a lemon
    twist, though their occasional habit of forgetting the oven timer leads to over‑toasted biscuits.
  core: Judy Brooks is a sociable bus driver who blends meticulous route mastery with a love for spontaneous campus karaoke, tailgate feasts, and a quirky habit of misplacing coffee mugs during hectic shifts.
background:
  cultural: Judy grew up in a small town in Mississippi, immersed in Southern hospitality and community values. Her family has strong ties to local church life, typically Baptist, and she was raised with
    an appreciation for modesty, cooperation, and respect for tradition. She enjoys Southern cuisine—BBQ, fried foods, biscuits, and sweet tea—and participates in regional customs like tailgating at Bulldogs
    games. The close‑knit community environment fostered her sociable nature and desire to help others, while her white, rural background informs a worldview shaped by local customs and a shared regional
    identity.
