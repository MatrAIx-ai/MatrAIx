    pressure'']'
  hobbies: '[''Socializing at coffee shops and campus events'', ''Attending Mississippi State Bulldogs football games'', ''Karaoke and board‑game nights'', ''Hiking and nature trail exploration'', ''Group
    fitness classes (e.g., Zumba)'', ''Cooking Southern comfort dishes'', ''Listening to country music'', ''Volunteering at community and safety workshops'']'
  career_goals: Judy aims to secure her commercial driver’s license with a passenger endorsement and complete advanced safety certifications within the next year. In the medium term, she hopes to become
    a senior driver or route leader for the Mississippi State University transit system, mentoring new drivers and contributing to schedule optimization. Long‑term, she envisions moving into a transportation
    management role—such as fleet supervisor or transit operations coordinator—while completing a degree in logistics or business administration at MSU. She also wants to develop a community outreach program
    that teaches high‑school students about safe transportation practices and career pathways in the transit industry.
