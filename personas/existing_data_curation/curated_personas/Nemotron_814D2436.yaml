personas:
  professional: Jessica Hearn is a public safety communications dispatcher who leverages her quick active-listening, composure under pressure, and technical fluency with CAD systems to efficiently route
    emergency calls, while her relaxed attitude toward strict schedules occasionally leads to a cluttered shift log that she mitigates by double-checking critical information before dispatch.
  sports: Jessica Hearn fuels her active lifestyle by hiking the Wasatch foothills, snowboarding at Snowbasin in winter, playing indoor volleyball with the Wasatch County Volleyball Club, following the
    Utah Jazz and Real Salt Lake, and running weekly with the Ogden Runners Club, all while balancing a casual approach to structured training schedules.
  arts: Jessica Hearn enriches her leisure time by curating board-game nights featuring Catan, attending live shows at the Peery's Egyptian Theatre to see indie folk artist Phoebe Bridgers, browsing contemporary
    paintings by Utah's Chris Baugh, and binge-listening to true-crime podcasts that blend her curiosity with a love for storytelling.
  travel: Jessica Hearn prefers adventure-focused trips that combine outdoor challenges with cultural stops - she's trekked the Grand Canyon, snowboarded in Whistler, chauffeured a road-trip to Moab's Arches,
    and dreams of chasing the Northern Lights in Iceland next summer, all while coordinating trips on a loose itinerary that allows room for spontaneous detours.
  culinary: Jessica Hearn enjoys crafting protein-rich meals like quinoa bowls with grilled chicken, roasted sweet potatoes, chickpeas, kale, and a drizzle of tahini, while her occasional forgetfulness
    about seasoning and tendency to over-cook the chicken reveal a still-growing kitchen confidence.
  core: Jessica Hearn balances a curious, tech-savvy mind with a laid-back, sometimes disorganized lifestyle, turning emergency calls into calm solutions by day and spontaneous hikes into evening adventures,
    all while juggling impulsive gear purchases and an ever-changing board-game roster.
background:
  cultural: Jessica was raised in Ogden, a city with deep roots in the early Mormon settlement of Utah and a growing, diverse community. Her family’s values reflect the region’s emphasis on self‑reliance,
    community service, and modesty, while also embracing the outdoor recreation culture that defines Weber County. Growing up, she attended community events like the Ogden Music Festival and participated
    in church‑organized service projects, which fostered a sense of civic duty. This blend of local heritage, Mid‑Western sensibility, and a supportive married life shapes her worldview, encouraging both
    individual curiosity and practical contribution to her community.
attributes:
  skills: '["Emergency Call Triage", "Crisis Communication", "Computer‑Aided Dispatch (CAD) Operation", "Radio and Telecommunications Management", "Active Listening and De‑escalation", "Multitasking and
    Rapid Data Entry", "Geospatial Awareness of Weber County", "Stress Management and Emotional Resilience", "Team Coordination and Briefing", "Basic IT Troubleshooting"]'
  hobbies: '["Hiking in the Wasatch Mountains", "Snowboarding trips", "Volleyball league", "Board‑game and potluck nights", "Volunteering at the local animal shelter", "Experimenting with healthy cooking",
    "Listening to true‑crime and tech podcasts", "Yoga for flexibility and stress relief"]'
  career_goals: Jessica aims to advance within the public safety communications field, targeting a shift supervisor role within three years and eventually becoming a training and quality‑assurance officer.
    She plans to complete her associate degree in criminal justice and pursue certification in emergency communications management. Long‑term, she envisions contributing to the development of next‑generation
    dispatch technology and leading community outreach programs that educate residents about emergency preparedness.
