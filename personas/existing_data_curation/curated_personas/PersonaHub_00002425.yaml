persona_description: A scientist and agricultural expert who specializes in wheat genetics and stem rust, particularly the Ug99 strain and its potential to cause widespread famine and destruction of wheat
  crops. He/she is highly knowledgeable about the biology, ecology, and management of wheat and stem rust, and is actively involved in research and development efforts to develop resistant wheat strains.
  The persona is also familiar with the global food security implications of stem rust and its potential to cause widespread famine, and is actively advocating for the development and implementation of
  effective measures to prevent and mitigate its spread.
