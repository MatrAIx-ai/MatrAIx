personas:
  professional: Addie Knox, a veteran executive director of a cultural development corporation, leverages three decades of strategic planning, governance, and DEI expertise, and they methodically steer
    the organization toward environmental sustainability while pursuing a 50% endowment increase.
  sports: Addie Knox, an avid walker and weekend tennis player in the Windy City Senior Tennis League, maintains a steady cardio routine through daily lakefront strolls and weekly yoga, while passionately
    cheering for the Chicago Bulls, Chicago Bears, and Chicago Cubs, though they rarely watch live games unless it's a championship.
  arts: Addie Knox curates a personal collection of diaspora artworks by Jacob Lawrence, Kerry James Marshall, and Kara Walker, frequently attends jazz performances featuring John Coltrane and Nina Simone,
    and devotes evenings to reading contemporary literature from authors such as Toni Morrison and James Baldwin, while they also volunteer as a mentor for community arts programs.
  travel: Addie Knox enjoys meticulously planned trips to heritage sites such as Harlem, New York, the civil-rights landmarks of Montgomery, Alabama, the Gullah-Geechee cultural district in South Carolina,
    and Cape Coast Castle in Ghana, balancing structured itineraries with impromptu culinary detours, although family obligations sometimes limit longer overseas voyages.
  culinary: Addie Knox, an experienced home cook, blends traditional comfort-food flavors such as smoked paprika-spiced collard greens, honey-glazed sweet potato pie, and shrimp and grits enhanced with
    a dash of sorghum molasses into modern presentations, often experimenting with sous-vide techniques, while they occasionally skip meals when engrossed in a new art installation.
  core: Addie Knox is a reflective leader who intertwines strategic corporate stewardship with a deep love for diaspora arts, balances disciplined planning with spontaneous jazz nights, tends to forget
    to refill prescriptions during travel, and secretly hoards vintage concert tickets in a kitchen drawer.
background:
  cultural: Addie was born and raised in Washington, D.C., the youngest of three siblings in a close‑knit African‑American family. Her mother, a high school teacher, instilled a love of literature and civic
    engagement, while her father, a city public‑works employee, emphasized discipline and community service. Growing up during the post‑civil‑rights era, she participated in church choirs and neighborhood
    cultural festivals, experiences that fostered a deep appreciation for Black artistic expression. She earned her bachelor’s degree in humanities from Howard University, where she was active in student
    advocacy for inclusive curricula. Throughout her career, Addie has remained rooted in the traditions of her community, championing initiatives that preserve and celebrate African‑American heritage in
    Prince George’s County and beyond.
