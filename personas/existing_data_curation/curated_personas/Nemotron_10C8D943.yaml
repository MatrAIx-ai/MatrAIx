  career_goals: Addie aims to solidify the cultural development corporation she leads as a national benchmark for inclusive arts programming while transitioning the organization toward full environmental
    sustainability. She plans to launch a county‑wide mentorship pipeline for emerging Black artists and cultural leaders, increase the endowment for community arts projects by 50%, and secure board seats
    on major national arts institutions. Over the next five years, she envisions stepping into an advisory role that continues to shape strategic direction, while authoring a memoir that intertwines her
    leadership journey with reflections on African‑American art and culture.
