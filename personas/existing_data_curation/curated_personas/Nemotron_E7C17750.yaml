personas:
  professional: Patrick Milberger, a budding LEGO architect, merges their love for routine with occasional inventive improvisation, showing early aptitude for spatial reasoning, problem‑solving, and a pragmatic,
    competitive approach to design.
  sports: Patrick Milberger, a midfield enthusiast for the Riverside Rascals youth soccer club, practices drills five days a week after school, draws tactical inspiration from FC Barcelona and idolizes
    Lionel Messi, supports the Los Angeles Dodgers during baseball season, and fuels their competitive edge by trading baseball cards with teammates.
  arts: Patrick Milberger, an avid fan of LEGO animation series like Beyond the Brick, enjoys listening to the energetic tracks of Imagine Dragons and the soaring scores of Hans Zimmer, and collects graphic
    novels featuring Spider‑Man and Tintin, letting these creative influences spark imaginative storylines during play.
  travel: Patrick Milberger, who prefers spontaneous short bike rides to the nearby river park and dreams of visiting Legoland Billund in Denmark, balances family road trips to the Grand Canyon with a modest
    allowance, planning each outing with a simple checklist to ensure no LEGO bricks are left behind.
  culinary: Patrick Milberger, a budding junior chef, loves topping pepperoni pizza with extra mozzarella, whipping up quick spaghetti with tomato sauce, and experimenting with banana‑cinnamon pancakes,
    though they often forget to stir the batter thoroughly and leave a trail of crumbs on the kitchen floor.
  core: Patrick Milberger is a routine‑loving LEGO fanatic who hoards spare bricks, trades baseball cards with fierce competitiveness, and sometimes neglects cleanup after marathon builds.
background:
  cultural: 'Patrick comes from a white, middle‑class family living in Elmsford, a suburban community in Westchester County, New York. His household follows typical American cultural practices, celebrating
    holidays such as Thanksgiving, Christmas, and Fourth of July with family gatherings and community events. The area’s diverse population and proximity to New York City expose him to various cultural
    influences, though his family maintains a traditional, practical outlook that emphasizes routine, responsibility, and modest ambitions. He attends a public elementary school where multicultural curricula
    introduce him to different cultures, but his everyday life is shaped by the suburban American lifestyle: suburban parks, local Little League baseball, community recreation centers, and neighborhood
    bike rides.'
