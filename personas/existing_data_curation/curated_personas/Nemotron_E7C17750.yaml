  career_goals: Although still early in life, Patrick often talks about becoming someone who works with his hands and can see the results of his effort. He dreams of one day being a mechanical engineer
    or a skilled carpenter, inspired by the way he can take apart and rebuild toys. The competitive streak in him also fuels a wish to be a professional athlete, particularly a soccer player, where he can
    test his skills against others. Occasionally, he imagines becoming a video‑game designer or e‑sports player, merging his love for gaming with a future career that lets him create the challenges he enjoys.
    In school projects, he prefers activities that involve building, fixing, or direct competition, reflecting his desire for tangible outcomes and measurable achievement.
