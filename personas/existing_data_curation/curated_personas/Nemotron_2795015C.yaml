  hobbies: '["Reading mystery novels and historical fiction", "Journaling and creative writing", "Crossword and Sudoku puzzles", "Sketching and drawing", "Indoor gardening", "Listening to gospel and soul
    music", "Cooking and baking simple recipes"]'
  career_goals: Mary Elaine aspires to complete her high school education, earn her GED, and pursue a vocation that offers structure, predictability, and the chance to help others. She is interested in
    enrolling in a community college program to become a certified nursing assistant or medical assistant, where her methodical nature and compassion can support patient care. She also contemplates a role
    as an administrative assistant for a nonprofit or local health clinic, valuing stable work environments and opportunities to contribute to her community. Long‑term, she hopes to secure a stable, rewarding
    career that allows her to maintain order and make a positive impact on the lives of others.
