personas:
  professional: Mary Allen is a diligent high school sophomore who writes mystery short stories for the school literary magazine, using their meticulous research skills and love of structured narratives
    to craft compelling plots while balancing a busy schedule of classes and extracurricular clubs.
  sports: Mary Allen prefers low-key fitness activities, running with the local high school cross-country team each fall and practicing yoga at the community center, while cheering on the Chicago Cubs during
    baseball season and the Chicago Bulls in the winter.
  arts: Mary Allen is an introspective creative who fills a leather-bound journal with poetry inspired by the lyrical storytelling of Aretha Franklin and Mahalia Jackson, devours Agatha Christie mystery
    novels, and spends weekend afternoons sketching realistic portraits in the style of John Singer Sargent.
  travel: Mary Allen plans travel with meticulous checklists, savoring family trips to the historic streets of Washington, D.C., and the coastal trails of San Diego, while dreaming of a structured solo
    study tour of Paris’s museums during the next summer break, balancing school commitments and a modest allowance.
  culinary: Mary Allen enjoys the methodical precision of baking banana bread with ripe bananas, cinnamon, and walnuts, and occasionally prepares quick spaghetti carbonara using pancetta, Parmesan cheese,
    and black pepper, always following the recipe step-by-step to ensure consistency.
  core: Mary Allen intertwines a love for orderly routines with solitary creativity, often over-planning their day while forgetting to hydrate, turning every puzzle into a personal challenge and burying
    themselves in mystery novels and journal entries.
background:
  cultural: Mary Elaine is a Black teenager raised in Jackson, Mississippi, within a close‑knit African‑American community that blends Southern traditions with contemporary urban life. Her family is active
    in the local Baptist church, where gospel music, communal gatherings, and a strong emphasis on mutual support shape her values. She grew up surrounded by the flavors of soul food, from collard greens
    to cornbread, and the oral storytelling tradition that celebrates African‑American history and resilience. Community events, church outreach, and mentorship programs have reinforced a sense of solidarity
    and a commitment to self‑improvement. Despite attending school only up to the eighth grade, she has absorbed the cultural emphasis on perseverance, kindness, and cooperation that is characteristic of
    the Black community in the American South.
attributes:
  skills: '["Organizational planning", "Time management", "Basic computer literacy (Microsoft Office, Google Docs)", "Written communication", "Home cooking (simple meals)", "Laundry and household chores",
