personas:
  professional: Terry Wagner is an aspiring esports competitor who harnesses strategic planning from competitive video games, precise hand‑eye coordination, and a talent for customizing bike components,
    applying these skills to school assignments and DIY woodworking projects while juggling a love for structure with a laid‑back attitude toward obligations.
  sports: Terry Wagner is a basketball aficionado who spends afternoons shooting hoops at the local park, follows the Los Angeles Lakers with fervor, competes on the high school intramural basketball team,
    and cycles with the Eastside Youth Cycling Club on weekends, blending competitive drive with a love for outdoor activity.
  arts: Terry Wagner embraces classic‑rock culture, blasting Led Zeppelin, The Rolling Stones, and Pink Floyd while customizing bike frames, explores visual creativity through YouTube woodworking tutorials,
    and intermittently sketches album‑inspired artwork, letting music and hands‑on crafts shape their identity.
  travel: Terry Wagner prefers short road trips to nearby state parks for weekend camping, has visited Seattle for its gaming expo and Disneyland for family fun, and dreams of traveling to Osaka to experience
    Japan’s arcade scene and to London to walk the historic venues of classic‑rock legends.
  culinary: Terry Wagner is a budding home chef who often prepares pepperoni pizza with extra mozzarella, spicy buffalo wings tossed in hot sauce and butter, and classic cheeseburgers layered with cheddar,
    jalapeños, and caramelized onions, learning each recipe from detailed YouTube tutorials.
  core: Terry Wagner balances a competitive gamer’s mindset with hands‑on DIY projects, thrives on structure yet indulges in spontaneous bike tinkering, occasionally procrastinates on schoolwork, and obsessively
    tracks game statistics.
background:
  cultural: Terry comes from a white, working‑class family in Elma, a small town in Erie County, New York. The community emphasizes self‑reliance, practical skills, and local traditions such as high‑school
    sports and community gatherings. His family’s background includes German and Irish ancestry common in the region, and he grew up with typical American small‑town cultural influences, celebrating holidays,
    attending local events, and balancing modern digital media with outdoor activities.
attributes:
  skills: '["Basic mechanical repair", "Handyman tasks (e.g., lawn mower and bike maintenance)", "Computer troubleshooting", "Strategic multiplayer video gaming", "Basketball basics"]'
  hobbies: '["Multiplayer video gaming", "Basketball", "Bike customization", "DIY woodworking", "Classic rock music", "YouTube tutorials"]'
  career_goals: He aims to earn his GED and enroll in a vocational program for automotive technology, with the long‑term goal of opening his own garage. Parallel to that, he hopes to improve his gaming
    skills enough to join a semi‑professional eSports team. He values independence, practical results, and wants a career that offers both structure and flexibility.
