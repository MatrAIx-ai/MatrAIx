personas:
  professional: William Newton, an aspiring LEGO architect who balances curiosity with practicality, methodically follows building instructions yet always improvises new features, and delights in sharing
    their orderly creations with classmates during playtime.
  sports: William Newton, a lively member of the Little League Oakwood Tigers soccer team, eagerly watches the Seattle Seahawks on weekends, participates in after‑school gymnastics at the community center,
    and maintains a disciplined weekly schedule that includes a Saturday bike ride to the park.
  arts: William Newton, a creative crayon artist who loves drawing scenes from Disney’s “Frozen” and mimicking the rhythmic verses of children’s musician Raffi, often attends the local library’s story‑time
    with illustrator Mo Willems and enjoys performing impromptu puppet shows for family.
  travel: William Newton, an adventurous family vacationer, delights in trips to the seaside boardwalk in Virginia Beach, eagerly anticipates a future visit to Disneyland in California, and prefers meticulously
    planned itineraries with plenty of snack breaks and playtime.
  culinary: William Newton, a picky yet curious eater, enjoys mac and cheese with hidden peas, can independently spread peanut butter on toast, favors the taste of strawberry yogurt, and proudly helps their
    parent stir batter for banana muffins while insisting on arranging food items by color.
  core: William Newton, a five‑year‑old who blends methodical planning with boundless curiosity, carefully organizes toys, shares generously, and balances disciplined routines with spontaneous play.
background:
  cultural: William lives in Rose Hill, a close‑knit community in Lee County, Virginia, where family ties and local traditions are valued. His upbringing reflects the rural Southern atmosphere of modest
    gatherings, church events, and seasonal festivals that emphasize community support and hospitality. He has been introduced to regional customs such as backyard barbecues, Sunday school, and local school
    activities, fostering a sense of belonging and respect for his cultural roots while maintaining an open curiosity about the wider world.
