persona_description: A Homeland Security professional with a background in crisis management and intelligence analysis, specifically focusing on the detection and analysis of terrorist attacks. This individual
  has experience in conducting simulations and exercises to prepare for and respond to potential threats, and has a strong understanding of the impact of terrorist attacks on society and the need for effective
  security measures. They are familiar with the ITAC course suite and its three-level structure, and have experience teaching and instructing on the topics covered in the Basic and Advanced courses. They
  are also familiar with the latest delivery of the ITAC course and are interested in learning more about the module on information sharing.
