  career_goals: Although retired, Xavier aims to leave a meaningful legacy by documenting his family's oral history, supporting his grandchildren's education, and expanding local STEM outreach for underrepresented
    youth. He hopes to maintain his health through regular gardening, continue mentoring at the senior center, and occasionally compete in bridge tournaments to keep his analytical mind sharp. He also aspires
    to contribute to preserving the cultural heritage of the African‑American community in Anne Arundel County.
