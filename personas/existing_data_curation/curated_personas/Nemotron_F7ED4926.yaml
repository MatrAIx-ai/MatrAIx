personas:
  professional: Xavier Laselle is a retired mechanical and electrical engineer who now applies his decades of industrial maintenance expertise to mentoring young STEM enthusiasts, crafting small furniture,
    and solving community technical challenges with a methodical yet improvisational mindset, and they relish blending precision with spontaneous problem-solving.
  sports: Xavier Laselle follows the Baltimore Orioles with steadfast loyalty, attends Orioles fan club viewings at the senior center, participates in a weekly walking group that meets at the local park,
    and they enjoy occasional senior softball games at the community recreation center during the summer.
  arts: Xavier Laselle immerses himself in the world of jazz and blues, regularly listening to Miles Davis, B.B. King, and Ella Fitzgerald, while they sing in the historic church choir and attend monthly
    performances at the local cultural center that showcase regional folk musicians.
  travel: Xavier Laselle favors low-key road trips to historic sites such as Annapolis and the Smithsonian museums in Washington, D.C., enjoys a yearly family cruise to the Caribbean when health permits,
    and they plan trips around bridge tournaments in nearby cities, balancing their love for exploration with a need for a predictable routine.
  culinary: Xavier Laselle delights in cooking garden-fresh vegetable stew with tomatoes, zucchini, and collard greens, pairs it with homemade cornbread, and they occasionally prepare Southern-style fried
    catfish seasoned with Cajun spices, relishing the tactile precision of chopping and the comforting flavors of their childhood.
  core: Xavier Laselle blends an engineer's precision with a jazz-infused spontaneity, tending methodical garden rows while sometimes misplacing bridge scores, and they champion mentorship while nurturing
    community heritage through song and service.
background:
  cultural: Born in the early 1940s, Xavier grew up in a Black family that experienced the Great Migration and the civil‑rights era in Maryland. His upbringing was shaped by church, family storytelling,
    and a strong sense of community responsibility. He carries the traditions of African‑American resilience and mutual aid, celebrating Juneteenth, soul food cooking, and the cultural rhythms of jazz and
    blues. Living in Arnold, he bridges suburban life with his roots by participating in local African‑American cultural events, mentoring youth, and preserving the history of Black contributions to the
    region's engineering and maritime industries.
