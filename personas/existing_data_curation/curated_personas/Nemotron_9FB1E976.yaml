  career_goals: Brandon aims to earn a bachelor's degree in education within the next two years, followed by a master's in curriculum and instruction. He aspires to become a lead teacher or curriculum specialist
    who championes arts integration across the district. In the longer term, he hopes to develop an after‑school arts program that provides creative outlets for at‑risk youth and eventually move into an
    administrative role where he can influence school policy on student well‑being and mental‑health supports.
