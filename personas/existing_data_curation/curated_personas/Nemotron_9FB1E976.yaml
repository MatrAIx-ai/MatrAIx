personas:
  professional: Brandon Sclafani, a 24-year-old elementary teacher with a knack for weaving visual art and acoustic folk songs into lesson plans, harnesses technology like interactive whiteboards while
    flexibly adapting to classroom chaos, mentoring peers and advocating for district-wide arts integration despite their occasional disorganization.
  sports: Brandon Sclafani, an avid hiker of the Taconic Trail and weekend cyclist around Windham County, regularly joins a local cycling club that meets on Saturday mornings, supports the Albany Empire
    arena football team, and participates in community 5K runs to stay fit while using outdoor activity as a primary stress-relief outlet.
  arts: Brandon Sclafani, a folk-song-writing guitar player who volunteers backstage at community theater and frequents local galleries showcasing emerging painters like Maya Ortiz, draws creative inspiration
    from artists such as Bob Dylan, Joni Mitchell, and the street murals of Portland, and often integrates these influences into school assemblies.
  travel: Brandon Sclafani, an adventurous traveler who has trekked the Blue Ridge Mountains in North Carolina, explored the historic streets of Edinburgh for its folk music scene, and longs to visit the
    volcanic landscapes of Iceland to gather new culinary ideas, typically plans trips on a flexible budget and prefers spontaneous itineraries over strict schedules.
  culinary: Brandon Sclafani, an experimental home cook who blends flavors from their travels—like miso-marinated pumpkin gnocchi, Thai basil pesto pizza, and spiced lentil tacos—comfortably handles a mid-range
    sous-vide setup, and consistently stocks pantry staples such as quinoa, almond flour, and smoked paprika to create dishes that mirror their artistic sensibility.
  core: Brandon Sclafani, a 24-year-old arts-focused teacher who thrives on creative chaos, worries about deadlines, forgets to file taxes on time, and finds peace strumming folk chords after a hike.
background:
  cultural: Brandon grew up in Central Village, CT, within a typical New England white, middle‑class environment. His family heritage blends English and Irish roots, and he was raised with a strong sense
    of community involvement, seasonal town festivals, and a respect for local history. He values the public school system that served his hometown and carries a deep appreciation for regional arts, often
    participating in town fairs and supporting local artisans.
attributes:
  skills: '["Lesson planning","Classroom management","Art integration","Differentiated instruction","Educational technology","Collaborative learning","Student counseling","Peer mentorship"]'
