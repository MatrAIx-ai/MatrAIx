personas:
  professional: Katherine Perez, a budding little engineer who loves building block towers with precise symmetry, meticulously labels each piece, proudly explains their construction plan to peers, and balances
    a boundless curiosity for new shapes with a practical, step‑by‑step approach, they consistently aim for organized achievement.
  sports: Katherine Perez, a disciplined mini‑soccer enthusiast who practices dribbling at the neighborhood Little Lions Soccer Club, proudly wears a Chicago Cubs baseball jersey, follows a strict warm‑up
    routine before each game, sometimes avoids the muddy splash zone out of worry about feeling dirty, and they combine curiosity for play with a practical need for order.
  arts: Katherine Perez, an organized little artist who spends afternoons coloring with Crayola crayons, favors drawing perfect circles while listening to Raffi’s “Baby Beluga” and The Wiggles, admires
    Disney’s Frozen soundtrack, becomes upset when a drawing doesn’t meet their high standards, and they channel their kindness into sharing art supplies with friends.
  travel: Katherine Perez, an inquisitive traveler who loves family road trips to the nearby Santa Monica beach, collects seashells with a detailed map and schedule, dreams of visiting Disneyland Paris
    and the Grand Canyon, prefers planned itineraries over spontaneous flights, and they often feel anxious when routines change, reflecting their mix of curiosity and need for structure.
  culinary: Katherine Perez, a meticulous little eater who prefers neatly arranged snack plates of apple slices with peanut butter, carrot sticks, and a small portion of macaroni and cheese, helps stir
    batter for banana pancakes, frequently complains about mixed meals, worries about foods that are too messy, and they constantly seek order even on their plate.
  core: Katherine Perez is a meticulously organized four‑year‑old who balances boundless curiosity with a need for order, they often worry about tiny details while seeking harmonious play and achieving
    high personal standards.
background:
  cultural: Katherine is being raised in a middle‑class, predominantly white, suburban family in Orem, Utah. Her upbringing reflects broader American cultural norms of the region, with participation in
    common holidays such as Thanksgiving, Fourth of July, and Halloween, as well as local community events like park clean‑ups and seasonal festivals. Family life emphasizes togetherness, education, and
    a respect for order, mirroring the community’s value on tidy spaces and collaborative activities. While her household may incorporate elements of local religious and civic traditions, her cultural background
    is primarily shaped by mainstream U.S. suburban culture and the outdoor‑oriented lifestyle of Utah County.
