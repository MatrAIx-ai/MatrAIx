  hobbies: '[''Surfing'', ''Beach volleyball'', ''Soccer'', ''Community volunteering'', ''Cooking Indian cuisine'', ''Multiplayer video gaming'', ''Photography'', ''Listening to music (pop, hip‑hop, Bollywood)'']'
  career_goals: Brian intends to pursue a bachelor's degree in civil engineering at a California university, aiming to blend his practical mindset with his collaborative nature to become a project manager
    for sustainable infrastructure projects. In the long term, he aspires to launch a nonprofit organization that mentors South Asian youth in STEM fields while promoting affordable housing initiatives,
    thereby leveraging his organizational skills, community focus, and desire for tangible, real‑world impact.
