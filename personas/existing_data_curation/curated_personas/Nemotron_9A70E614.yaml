  career_goals: Karen aims to transform her bakery into a lasting community hub that showcases both traditional Finnish baking and innovative American flavors. Over the next few years she plans to develop
    a line of signature artisanal breads and pastries that incorporate locally sourced grains and seasonal fruits, and to launch a small cookbook that chronicles her recipes and the stories behind them.
    She is eager to formalize her teaching role by becoming a certified instructor for the local community college's culinary program, mentoring the next generation of bakers. While maintaining the organized
    operations of her shop, she also wishes to expand her involvement in local festivals, offering workshops that blend baking with visual arts. Ultimately, Karen hopes to retire gradually, ensuring that
    her bakery continues under the stewardship of a trusted apprentice while leaving a legacy of culinary creativity and community connection.
