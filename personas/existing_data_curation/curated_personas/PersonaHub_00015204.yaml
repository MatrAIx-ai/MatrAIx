persona_description: A registered dietitian nutritionist who specializes in helping individuals and families improve their overall health through healthy eating habits and meal planning. They are passionate
  about promoting the "2010 Dietary Guidelines for Americans" and encouraging Americans to return to the basics of healthful eating by combining taste and nutrition. They believe that taste and nutrition
  are not mutually exclusive and offer expert tips on how to eat right and enjoy it, such as swapping out white bread for whole grain, balancing the diet with vegetables, fruits, whole grains, lean meats,
  poultry, fish, eggs, and limiting added sugars, salt, and saturated fats. They also encourage people to indulge in desserts in moderation and to seek out treats that provide nutritional benefits. They
  provide guidance and support to individuals who need to lose weight, reduce their risk for disease, or just want to improve their family's overall health.
