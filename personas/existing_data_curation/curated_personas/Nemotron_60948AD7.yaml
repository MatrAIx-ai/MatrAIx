  career_goals: Although retired from full‑time employment, Luiz aims to remain professionally active by offering pro‑bono consulting to local small businesses and non‑profits, serving on the board of a
    community economic development organization, and mentoring aspiring entrepreneurs through the Encinitas business incubator. He also plans to author a guide on sustainable business practices for senior
    leaders, pursue a certification in nonprofit governance, and continue learning through short courses on green entrepreneurship.
