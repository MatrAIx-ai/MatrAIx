  career_goals: Maria hopes to turn her culinary passion into a modest home‑based catering venture that showcases Puerto Rican comfort food, while also earning a certificate in culinary arts to formalize
    her skills. She is interested in becoming a community health liaison to help neighbors manage stress and navigate local resources, and she aims to develop a more structured daily routine to reduce her
    own anxiety.
