personas:
  professional: Maria Masters, a seasoned community organizer and aspiring home‑based caterer, pairs a pragmatic DIY mindset with a love for bilingual event coordination, and they often juggle their competitive
    drive and mild disorganization to launch small‑scale pop‑up meals that showcase classic comfort foods.
  sports: Maria Masters enjoys weekend jogs with the Orlando County Runners Club, roots for the Orlando Magic and Orlando City SC, and occasionally tunes in to watch the Tampa Bay Buccaneers, and they balance
    a competitive spirit on the basketball court with a relaxed approach to recreational soccer.
  arts: Maria Masters is an avid listener of salsa legends like Celia Cruz and modern fusion artists such as Marc Anthony, attends local theater productions featuring Lin‑Manuel Miranda’s works, and they
    devour mystery novels by Agatha Christie and Gillian Flynn during quiet evenings.
  travel: Maria Masters has explored the historic streets of San Juan, savored street food in Oaxaca, and dreams of a culinary pilgrimage to Barcelona while they also take frequent short trips to nearby
    state parks for weekend hikes.
  culinary: Maria Masters experiments with mofongo‑style sushi rolls, plantain‑infused tacos, and arugula‑tomato sofrito sauces, favoring ingredients like ripe plantains, adobo seasoning, cilantro, and
    fresh lime to reinvent classic comfort dishes for potluck gatherings, and they love sharing the results with friends.
  core: Maria Masters blends curiosity‑driven culinary experimentation with a practical, sometimes disorganized outlook, fighting anxiety through community cooking while they keep a competitive edge in
    every board‑game night.
background:
  cultural: Maria’s identity is firmly anchored in her Puerto Rican roots; she maintains a strong connection to family traditions such as making pasteles during the holidays, speaking Spanish at home, and
    celebrating Parrandas with neighbors in Philadelphia’s vibrant Latino community. While she embraces the multicultural atmosphere of her city, she often serves as a cultural bridge, introducing her friends
    and community members to Puerto Rican customs, foods, and music.
