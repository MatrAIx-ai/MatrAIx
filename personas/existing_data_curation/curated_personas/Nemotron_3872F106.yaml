  career_goals: Angela aims to pursue a career in biomedical engineering, where she can merge her curiosity for science with practical problem‑solving to develop medical technologies. She envisions taking
    on leadership roles in engineering projects and hopes to earn scholarships that recognize both her academic achievements and athletic talent. In the short term, she plans to enroll in advanced high‑school
    courses, attend summer robotics camps, and secure a mentorship or internship with a local tech firm, ultimately targeting admission to a top university and contributing to innovations that improve health
    outcomes.
