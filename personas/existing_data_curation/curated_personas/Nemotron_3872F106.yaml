personas:
  professional: Angela Senn, a budding robotics enthusiast who leads her school’s robotics club, blends a love for scientific curiosity with practical problem‑solving, channeling competitive gaming instincts
    into meticulous code debugging and reliable project management; they thrive on turning ideas into working prototypes.
  sports: Angela Senn, a forward on the Eastside Middle School Girls Soccer Club, balances high‑energy after‑school training with weekend viewings of the Seattle Sounders FC, and uses competitive online
    strategy games to sharpen tactical thinking that fuels their on‑field performance; they relish the camaraderie of team drills while still feeling the urge to outscore opponents at every turn.
  arts: Angela Senn curates eclectic playlists featuring Billie Eilish, BTS, and classic rock, devours mystery novels by Agatha Christie and sci‑fi epics by Neal Stephenson, and channels this artistic appetite
    into DIY craft projects inspired by the colorful aesthetics of Yayoi Kusama; they often use these projects as a way to decompress after stressful school days.
  travel: Angela Senn, who dreams of attending the Tokyo Game Show after a memorable family road trip to the Grand Canyon, prefers meticulously planned weekend getaways to nearby amusement parks but saves
    aggressively for the occasional overseas adventure that satisfies their competitive desire to explore new gaming cultures; they balance excitement for travel with the practical constraints of a teen
    budget.
  culinary: Angela Senn enjoys experimenting with spicy ramen bowls, mastering the perfect cheese‑pull on homemade pizza, and frequently snacks on avocado toast while the occasional late‑night binge on
    sugary candy reveals a sweet‑tooth habit they struggle to curb; they also love sharing homemade treats with friends during study sessions.
  core: Angela Senn is a competitive, socially‑charged teen who balances curiosity with practicality, yet battles persistent worry, impulsive splurges, and a relentless drive to outplay both on the soccer
    field and in the virtual world; they constantly juggle ambition with the need for self‑care.
background:
  cultural: Angela grew up in Cypress, Texas, a suburban community north of Houston, within a middle‑class White American family. Her upbringing blends Southern hospitality with contemporary U.S. pop culture
    and a strong emphasis on education and extracurricular involvement typical of suburban Texas. Family traditions include holiday celebrations and community church activities, while exposure to the diverse
    Greater Houston area adds a broader cultural awareness. These influences shape her values of independence, community participation, practical ambition, and a balanced appreciation for both new ideas
    and established methods.
