  hobbies: '[''Herb and vegetable gardening'', ''Quilting'', ''Knitting'', ''Bird watching'', ''Reading historical fiction'', ''Genealogy research'', ''Canning and preserving'', ''Crossword puzzles'', ''Listening
    to classic country music'', ''Attending church services'']'
  career_goals: Although retired, Vivian’s ambitions focus on sustaining her health and independence, ensuring her husband’s well‑being, and leaving a lasting legacy for her grandchildren. She aims to compile
    a memoir of family recipes and stories, organize a community garden that brings neighbors together, and mentor younger relatives in traditional crafts and genealogy. Maintaining a stable routine, managing
    her finances securely, and staying actively involved in her church are also central to her goals.
