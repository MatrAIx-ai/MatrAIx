personas:
  professional: Vivian Baker, a 78‑year‑old retired farmstead steward, they blend decades of gardening, canning, and community organizing expertise to run the local Methodist church’s volunteer pantry,
    mentor younger relatives in quilting and genealogy, and maintain a meticulously organized household budget, all while allowing enough flexibility to drift when obligations feel burdensome.
  sports: Vivian Baker, a 78‑year‑old garden enthusiast, they keep fit through daily porch‑side walks, belong to the community senior walking club that tackles the Shenandoah Trail each spring, cheer on
    the Atlanta Braves during baseball season, and occasionally practice gentle yoga at the senior center to maintain flexibility.
  arts: Vivian Baker, a 78‑year‑old quilting and choir participant, they spend evenings listening to classic folk legends such as Johnny Cash, Dolly Parton, and Emmylou Harris, while reading Appalachian
    folklore collected by John Jacob Niles, and they volunteer as a set seamstress for local theater productions of 'Shenandoah' and 'The Legend of Sleepy Hollow'.
  travel: Vivian Baker, a 78‑year‑old nostalgic traveler, they favor low‑key road trips to nearby mountain towns like Asheville and the Great Smoky Mountains, plan meticulously for accessible lodging, keep
    a modest travel budget that allows occasional pilgrimages to historic sites such as Washington, D.C., and dream of a future seaside visit to Savannah for its Southern cuisine.
  culinary: Vivian Baker, a 78‑year‑old keeper of Appalachian kitchen traditions, they excel at baking herb‑infused cornbread, slow‑cooking chicken and dumplings, and batch‑canning apple butter and pickled
    green beans using garden‑fresh thyme, sage, and wild garlic, while occasionally treating themselves to a slice of store‑bought pecan pie as a rare indulgence.
  core: Vivian Baker, a 78‑year‑old garden‑loving genealogist, they blend meticulous budgeting with a relaxed approach to daily chores, often misplacing their crochet needles while humming classic folk
    tunes and quietly plotting the next community garden.
background:
  cultural: Vivian is a fourth‑generation white Appalachian from Gilmer County, West Virginia. Her family’s roots stretch back to the early 1900s, embodying the region’s traditions of self‑sufficiency,
    respect for the land, and close‑knit community life centered around the local church. Growing up during the post‑World War II era, she absorbed a modest, hardworking ethos, valuing humility, hospitality,
    and storytelling. The Appalachian folk music, crafts, and oral histories that permeate her daily life shape both her worldview and the way she passes on heritage to younger generations.
