persona_description: Charisse J. Rudolph is a bullying expert who has written a book called "Words Hit Hard as a Fist" to help teens, parents, teachers, and counselors deal with bullying and self-confidence.
  She has experience with dyslexia and has struggled through school, but has overcome her challenges and is now a successful author. She is a public speaker and has worked with The Seth Walsh Project, The
  Trevor Project, Teaching Tolerance, Model of Pride, and Project 10. She is also a member of the Los Angeles Unified School District and has ordered 20 copies of her book to distribute.
