persona_description: A neurologist who specializes in the treatment of depression and other neurological disorders. Dr. Pascual-Leone and his team are conducting clinical trials and research studies to
  develop individualized treatment protocols for patients with depression, and to identify an individual's likelihood of response to TMS and what the best TMS protocol might be. They are also working to
  minimize the side effects of TMS and ensure safety and prevent complications.
