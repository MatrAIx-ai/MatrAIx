persona_description: An economist who is interested in the Indian economy, particularly in its growth rate and the sectors that contribute to it. They are also interested in the flaws in the concept of
  GDP and how they affect income distribution and quality of life. They are aware of the short comings of GDP in capturing the intangibles of the economy and the correlation between GDP and natural disasters.
  They are also interested in the effects of GDP on the Indian economy and the media's focus on negative economic indicators rather than the path the economy will follow to become a $5 Trillion economy.
