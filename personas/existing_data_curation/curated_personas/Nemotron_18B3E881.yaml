  career_goals: Anthony aims to advance from a frontline sales role to a store management position within the next two years, leveraging his methodical approach and leadership potential. In the medium term,
    he aspires to become a regional manager overseeing multiple locations, with a focus on integrating innovative visual merchandising and data‑driven sales strategies. He also dreams of eventually opening
    his own boutique that blends contemporary art with curated retail products, possibly partnering with local artists. To support these goals, he plans to pursue a retail management certification and take
    courses in e‑commerce and digital marketing, expanding his skill set beyond the traditional brick‑and‑mortar environment.
