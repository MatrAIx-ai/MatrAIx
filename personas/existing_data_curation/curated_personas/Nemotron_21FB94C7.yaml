  hobbies: '[''Visiting art galleries and museums'', ''Acoustic guitar playing and songwriting'', ''Photography (urban and portrait)'', ''School drama club involvement'', ''Volunteering at local food bank'',
    ''Skateboarding at community skate park'', ''Playing cooperative video games'', ''Reading science-fiction and graphic novels'']'
  career_goals: Richard aspires to combine his love of visual art with his desire to help others. In the short term, he plans to graduate from high school, enroll in a college program in graphic design,
    visual communication, or an interdisciplinary art-social-impact field, and build a portfolio focused on community-oriented projects. Long-term, he hopes to work as a community arts coordinator or a
    design strategist for nonprofit organizations, creating campaigns, murals, and digital media that raise awareness about social issues and empower youth. He also entertains the possibility of establishing
    his own nonprofit that offers art-based workshops for at-risk teenagers, using his organizational skills to secure funding and manage volunteers. Throughout, he aims to continue developing his technical
    design abilities while deepening his capacity for empathy-driven leadership.
