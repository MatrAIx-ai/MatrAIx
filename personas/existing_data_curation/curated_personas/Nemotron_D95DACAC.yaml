personas:
  professional: Minerva Perez, an infant with a budding fascination for vivid picture books and tactile crayons, already displays a spontaneous, unstructured approach to creative play that hints at a future
    path in visual design where they will thrive in quiet studios, embracing curiosity over deadlines.
  sports: Minerva Perez, despite being only a year old, loves crawling on indoor play mats, eagerly joins a parent‑led toddler gymnastics class on weekends, and often watches the local baseball team the
    Chicago Cubs on TV, showing a budding enthusiasm for movement while preferring solitary play over team sports.
  arts: Minerva Perez, enchanted by the bold illustrations of Eric Carle and the gentle lullabies of Brahms, spends spare moments flipping through picture books and humming, highlighting how early exposure
    to vibrant art nurtures their curious, solitary creative spirit.
  travel: Minerva Perez, accompanied by their parents on short road trips to the nearby coastline of Monterey and occasional family vacations to the National Parks of Yellowstone, prefers quiet, stroller‑friendly
    itineraries that allow spontaneous stops, reflecting a love of new scenery tempered by a need for calm.
  culinary: Minerva Perez, with a palate still developing, delights in smooth pureed carrots, mashed sweet potatoes, and occasional bites of avocado toast, and while they cannot cook yet, their parents
    often prepare homemade apple sauce using fresh apples and a pinch of cinnamon to satisfy the child's quiet dining preferences.
  core: Minerva Perez, a one‑year‑old curiosity‑driven explorer, balances a love for solitary, quiet environments with an insatiable appetite for new colors and textures, yet can become anxiously upset
    when routines are disrupted.
background:
  cultural: Minerva is raised in a household that celebrates her Puerto Rican roots while living in Elkhart, Indiana. Her family speaks both Spanish and English, sharing traditional stories, songs, and
    celebrations such as Navidad and Noche de San Juan. She is exposed to the rhythm of bomba and plena music, and occasionally enjoys traditional foods like arroz con gandules at family gatherings. The
    blend of Caribbean cultural practices with Midwestern community life gives her a multicultural perspective that influences her early preferences for music, colors, and storytelling.
