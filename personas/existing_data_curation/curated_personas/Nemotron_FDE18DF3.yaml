personas:
  professional: Adela Gomez, a 21‑year‑old aspiring hospitality professional, leverages bilingual communication and event‑organizing skills with a practical, structured mindset, while their sociable, energetic
    nature fuels team‑building in fast‑paced restaurant environments, even though they sometimes let flexibility outweigh strict planning.
  sports: Adela Gomez, a dedicated member of the Knoxville Community Center Volleyball Club and frequent hiker of the Great Smoky Mountains, cheers on the Nashville Predators, and balances competitive play
    with leisurely trail walks, preferring a flexible yet consistent fitness routine.
  arts: Adela Gomez, an avid curator of Latin playlists featuring Bad Bunny, Rosalía, and Celia Cruz, also embraces salsa and folkloric dance classes, attends local mural festivals and supports emerging
    street performers, letting music and movement shape their vibrant social life.
  travel: Adela Gomez prefers spontaneous, budget‑friendly trips, often backpacking to nearby Asheville for art festivals, enjoying the culinary scene of New Orleans, and dreaming of an extended culinary
    pilgrimage to Oaxaca, all while balancing limited student finances and occasional family responsibilities.
  culinary: Adela Gomez, an enthusiastic home cook, frequently prepares tacos al pastor, chiles en nogada, and pozole, skillfully using fresh cilantro, chipotle, and masa, yet occasionally over‑salts their
    sauces in pursuit of bold flavor.
  core: Adela Gomez is a sociable, structure‑oriented 21‑year‑old who merges bilingual hospitality ambitions with a love for dance, volleyball, and bold regional cooking, navigating life with an energetic,
    yet relaxed rhythm.
background:
  cultural: Adela was born to Mexican immigrant parents who moved to Knoxville in the early 2000s. She grew up in a bilingual household where Spanish was spoken at home and English was used at school. Family
    gatherings centered around homemade mole, tamales, and festive celebrations of Día de los Muertos and Cinco de Mayo, fostering a strong sense of familismo and community. She participates in the local
    Mexican‑American cultural association, attending festivals, cultural workshops, and volunteering at a community center that supports recent immigrants. This blend of Mexican traditions and Southern
    Appalachian surroundings shapes her identity, instilling a respect for hard work, hospitality, and collective well‑being.
