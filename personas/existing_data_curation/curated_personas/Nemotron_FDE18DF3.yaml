  career_goals: She aims to enroll in a community‑college program in hospitality management or culinary arts, gain hands‑on experience in the local restaurant industry, and eventually lead a bilingual team
    in a hotel or open her own family‑owned Mexican food venture that serves as a cultural hub for the community.
