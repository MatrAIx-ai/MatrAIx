personas:
  professional: Maria Aparcana, a kindergarten class organizer, channels their exceptional discipline and curiosity into arranging play stations, leading group projects, and ensuring that every activity
    meets their high standards.
  sports: Maria Aparcana, an enthusiastic member of the Tiny Tots Soccer Club, prefers small‑group drills over large matches, cheers for the local professional team the Chicago Cubs during family outings,
    and practices gymnastics at a community center to maintain flexibility.
  arts: Maria Aparcana, a budding illustrator, spends afternoons drawing vibrant scenes inspired by the works of Henri Matisse and the animated adventures of Disney’s Moana, and frequently visits the local
    children's museum for hands‑on art workshops.
  travel: Maria Aparcana, a curious explorer, loves family trips to Orlando’s theme parks, enjoys a weekend camping at the Grand Canyon’s rim, and dreams of someday seeing the Eiffel Tower in Paris, always
    packing a small sketchbook to capture new sights.
  culinary: Maria Aparcana, a picky yet adventurous eater, delights in homemade mac and cheese with a sprinkle of cheddar, loves the sweet crunch of fresh strawberries, and helps stir pancake batter, though
    they stubbornly refuse broccoli.
  core: Maria Aparcana blends disciplined organization with insatiable curiosity, excelling in structured play while quietly mastering new ideas, yet they cling to routines and can be stubborn about broccoli.
background:
  cultural: Maria is a Mexican‑American raised in Austin, Texas. At home, Spanish and English are spoken interchangeably, and she participates in family traditions such as Día de los Muertos, Las Posadas,
    and festive gatherings with music, dance, and foods like tamales and quesadillas. She frequently visits local Mexican cultural events, community markets, and fairs, where she is exposed to Mexican art,
    folk stories, and crafts that inspire her love for colorful designs and storytelling.
attributes:
  skills: '[''organizing toys and books'', ''sorting objects by color and shape'', ''basic drawing and coloring'', ''storytelling'', ''counting to 20'', ''letter recognition'', ''basic Spanish vocabulary'',
