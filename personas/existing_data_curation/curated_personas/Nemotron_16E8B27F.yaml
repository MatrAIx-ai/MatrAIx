  hobbies: '[''drawing and coloring'', ''painting with watercolors'', ''building with LEGO and wooden blocks'', ''listening to bilingual storytime'', ''exploring parks and nature trails'', ''participating
    in small group art activities'', ''helping with family cooking'', ''celebrating Mexican holidays'']'
  career_goals: Maria dreams of becoming an artist who can create beautiful pictures that tell stories about her family and community, and she also imagines exploring space as an astronaut one day. She
    is motivated to learn and achieve high standards, hoping to someday teach younger children how to draw and explore new ideas.
