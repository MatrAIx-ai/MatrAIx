    meditation", "Journaling", "Yoga"]'
  career_goals: Simon aims to become a store manager within the next three years, using his organizational skills to streamline operations while preserving the personal, community‑focused atmosphere of
    the Tok store. He dreams of expanding the store’s inventory to include locally crafted native artwork, sustainable food products, and outdoor gear, creating a platform for fellow Alaska Native artisans.
    In the longer term he envisions launching his own cooperative retail venture that balances profitability with cultural preservation and community wellbeing. He also hopes to obtain certification in
    mental health first aid to support his colleagues and neighbors.
