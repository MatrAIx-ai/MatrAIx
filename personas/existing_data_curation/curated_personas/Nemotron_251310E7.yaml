    philosophy'', ''Volunteering at the Troy Historical Society'']'
  career_goals: David aims to transition from full‑time shop work to a hybrid role that blends his machining mastery with his love of art. He plans to launch a small studio producing limited‑edition metal
    sculptures and functional art, secure a local grant to open a community maker space where he can mentor emerging craftsmen, and earn advanced certification in CNC programming to stay at the forefront
    of emerging technologies. He also seeks recognition in regional craft competitions and hopes to partner with the Troy Historical Society on exhibitions that preserve the city’s industrial heritage.
