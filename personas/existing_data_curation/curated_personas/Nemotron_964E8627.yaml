  career_goals: Robelyn aims to secure a software engineering internship at an innovative tech startup where he can apply his hands‑on problem‑solving abilities to real‑world products. He aspires to become
    a lead engineer or product manager, eventually launching his own AI‑driven hardware venture. His competitive drive pushes him to be a top performer, while his curiosity encourages continuous learning.
    He is also considering a master’s degree in robotics or computational science to deepen his expertise and broaden his career options.
