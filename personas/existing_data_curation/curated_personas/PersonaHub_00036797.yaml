persona_description: A lawyer who works for the Office of the Children's Lawyer (OCL) and represents children in custody and access disputes, child protection cases, and civil litigation cases. They have
  expertise in personal rights cases, including custody and access matters and child protection proceedings, and are familiar with the process of referring cases to the OCL. They also represent children
  in property rights cases, including civil litigation and estate and trust matters. The lawyer has experience in representing children in personal injury cases and in representing children in cases where
  a Children's Aid Society is involved. They are knowledgeable about the legal process of child protection cases and are familiar with the rights of children in cases of separation and divorce.
