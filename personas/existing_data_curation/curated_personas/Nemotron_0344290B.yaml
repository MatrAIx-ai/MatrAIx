personas:
  professional: Gabriel Coste, a seasoned warehouse veteran with over three decades of hands‑on experience operating forklifts, pallet jacks, and optimizing loading patterns, leverages their bilingual fluency
    and mentorship knack to guide new hires while eyeing a certified forklift trainer credential and a transition to a safety‑coordinator role that blends their curiosity for new safety tech with a practical,
    organized mindset.
  sports: Gabriel Coste, a devoted follower of Liga MX and Los Angeles soccer clubs such as LA Galaxy and LAFC, gathers with friends at the neighborhood bar to watch matches, joins a local weekend fishing
    club for river trips to the San Gabriel, and supports the Los Angeles Dodgers, reveling in the camaraderie of sports‑filled evenings.
  arts: Gabriel Coste, an avid lover of mariachi music, regularly spins recordings by Vicente Fernández and Los Tigres del Norte while dancing at community festivals, attends their Catholic church’s choir
    rehearsals, and collects colorful Talavera pottery that brightens their kitchen, allowing the arts to infuse their social gatherings with vibrant cultural flair.
  travel: Gabriel Coste, a road‑trip enthusiast who favors short fishing getaways to Baja California’s coastal towns like Ensenada, weekend drives to the Grand Canyon for family picnics, and occasional
    pilgrimages to Santa Barbara’s historic missions, plans trips with a flexible itinerary but keeps a modest travel budget to balance family expenses.
  culinary: Gabriel Coste, an accomplished home cook who perfects mole with pasilla chilies, chocolate, and epazote, rolls tamales using masa and pork shoulder on Sundays, fries carnitas to crunchy perfection,
    and delights in serving fresh pico de gallo and homemade margaritas, all while occasionally over‑seasoning and relying on their trusty molcajete for authentic flavor.
  core: Gabriel Coste blends a pragmatic warehouse mind with a sociable, talkative spirit, channeling their love for cooking, soccer, and community service into a life that balances careful financial planning
    with occasional stress‑driven worry and a penchant for weekend DIY projects.
background:
  cultural: Gabriel's cultural background is rooted in Mexican traditions passed down by his parents, who immigrated to California in the 1970s. Growing up in Pomona's predominantly Latino neighborhoods,
    he spoke Spanish at home while learning English at school. He celebrates Mexican holidays such as Día de los Muertos, Cinco de Mayo, and family gatherings centered around food, music, and storytelling.
    His Catholic upbringing influences his values of collectivism, respect for elders, and community service. These cultural influences shape his strong work ethic, emphasis on harmony, and sociable nature.
