  career_goals: Gabriel aims to transition into a supervisory or safety-coordinator role within the next few years, leveraging his extensive hands-on experience to improve workplace safety and efficiency.
    He plans to obtain a certified forklift trainer credential and use it to mentor younger workers. Ultimately, he hopes to secure stable income for his family while preparing for a gradual retirement,
    and he is exploring a small side business such as a moving service or handyman-repair venture to provide additional financial security.
