  career_goals: Rolando aims to progress into a senior architect or lead analyst role, guiding the modernization of legacy systems for his employer, which likely includes a regional health network or municipal
    agency. He plans to earn industry certifications such as CompTIA Security+, Cisco CCNA, and ITIL 4 to formalize his expertise. Over the next five years, he intends to lead cross‑functional projects
    that migrate on‑premise applications to cloud platforms, improve cybersecurity posture, and establish a knowledge‑sharing program for younger analysts. In the longer term, he envisions transitioning
    to part‑time consultancy, helping small businesses in western Kentucky adopt secure, cost‑effective IT solutions while maintaining a flexible schedule for family and personal pursuits.
