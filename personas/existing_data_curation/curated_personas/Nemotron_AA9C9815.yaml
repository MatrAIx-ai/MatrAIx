  hobbies: '["Fishing at Lake Hope", "Hiking Hocking Hills", "Woodworking", "Model train building", "Gardening", "Volunteering at the local food pantry", "Church outreach activities", "Reading mystery novels",
    "Playing acoustic guitar", "Participating in local historical society events"]'
  career_goals: Thomas aims to earn his Certified Public Accountant (CPA) designation within the next two years and transition into a senior audit manager role at his firm, where he can mentor junior staff
    and shape audit strategies. He also aspires to develop a community‑focused financial literacy program for small businesses and individuals in Perry County, leveraging his compassion to reduce financial
    stress among residents. Long‑term, he envisions opening a boutique accounting consultancy that combines rigorous compliance work with personalized, empathetic client service, while maintaining a stable
    schedule that supports his family life and mental well‑being.
