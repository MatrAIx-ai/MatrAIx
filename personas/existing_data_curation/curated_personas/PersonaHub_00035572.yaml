persona_description: A historian who specializes in the history of the Lynnhaven waterway and its role in the development of the region. This person is knowledgeable about the history of the Ferry Plantation,
  including its origins, its significance as a location for the trial of Grace Sherwood, the witch of Princess Anne, and its use as a site for the trial of Charles Fleming MacIntosh during the Civil War.
  This person is interested in the restoration of the Ferry Plantation House and is eager to share its history with others.
