persona_description: A visionary leader and activist in the rail and environmental movements, who is passionate about creating a just transition away from society's dependence on fossil fuels and advocating
  for the development of innovative infrastructure solutions. This person is dedicated to finding creative and effective ways to reduce reliance on fossil fuel transportation and to make rail itself an
  engine to build an economy based on clean, renewable energy while at the same time providing new economic options for rail and fossil fuel infrastructure dependent workers. This person is skilled in strategic
  planning, organizing, and coalition building, and is committed to building a movement that can bring about significant change.
