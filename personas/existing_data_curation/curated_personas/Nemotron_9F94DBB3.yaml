  hobbies: '[''Gardening'', ''Reading historical fiction'', ''Chess'', ''Jazz concerts'', ''Cooking soul food'', ''Walking'', ''Genealogy research'']'
  career_goals: 'Although retired, Ivan aims to deepen his impact in three areas: (1) lead a senior‑youth mentorship program at his local community center to pass on practical skills and life lessons; (2)
    preserve his family’s Great Migration narrative by writing a memoir and recording oral histories that he will upload to an online archive; and (3) advocate for more senior‑friendly public transportation
    routes and accessible green spaces in Philadelphia, while learning new digital tools to amplify his advocacy.'
