  career_goals: Luin aims to progress to a senior systems architect role where she can shape enterprise‑wide technology strategies while maintaining a user‑centric, compassionate approach. She aspires to
    lead cross‑functional teams that value both methodological rigor and creative flexibility, and to mentor junior analysts, especially those who thrive in collaborative, low‑stress environments. In the
    longer term she hopes to establish a consultancy that helps midsize companies redesign their IT processes to be more adaptable and humane, balancing reliability with the freedom to innovate.
