  hobbies: '[''Science Fiction Reading'', ''Philosophy Reading'', ''Landscape Photography'', ''Hiking'', ''Side‑Project Coding'', ''Community Tech Volunteering'', ''Weekend Road Trips'', ''Coffee Shop Exploration'',
