  hobbies: '[''Mural painting'', ''Sketching'', ''Listening to diverse music'', ''Dancing (including flamenco)'', ''Cooking Spanish recipes'', ''Drama club acting'', ''Volunteering for art workshops'',
    ''Curating Instagram visual feed'']'
  career_goals: Maria hopes to turn her love of art and community into a career. She aims to attend a specialized art program or community college after completing her GED, study graphic design and visual
    communication, and eventually work as a freelance visual storyteller or art‑program coordinator for youth. She also dreams of launching an online platform that showcases multicultural art and offers
    workshops for peers. While she values flexibility, she wants to build a portfolio that can open doors to creative collaborations and perhaps future work in cultural event planning.
