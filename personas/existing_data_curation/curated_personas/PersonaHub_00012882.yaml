persona_description: A scientist who specializes in immunology, particularly in the field of immune response and its regulation. She is particularly interested in the development of vaccines for autoimmune
  diseases and the use of targeted approaches to suppress immune responses. Her research interests include the identification of immune cells that are essential for the development of type-1 diabetes and
  the design of DNA vaccines to target those cells. She is also interested in the long-term effects of diabetes on the body and the development of treatments that can mitigate these effects.
