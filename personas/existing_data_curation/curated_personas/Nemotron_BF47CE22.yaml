personas:
  professional: A seasoned cabinetmaker, Sonali Osorio blends hand‑tool mastery with CNC precision to design custom furniture that fuses folk motifs with contemporary lines, channeling their curiosity and
    sociable energy into client collaborations while their relaxed approach to deadlines sometimes leads to creative last‑minute tweaks.
  sports: An avid hiker and weekend soccer enthusiast, Sonali Osorio joins the local Desert Trail Runners club for sunrise treks through the Sonoran Desert, supports the Arizona Cardinals and Phoenix Suns
    by attending games when possible, and balances those energetic outings with low‑impact yoga sessions to offset the physical toll of woodworking.
  arts: A creative spirit, Sonali Osorio frequents gallery openings and craft fairs, draws inspiration from Frida Kahlo’s bold colors, Lila Downs’s storytelling songs, and the tactile poetry of modern ceramics
    artist Toshiko Takaezu, and spends evenings pottering, painting, and strumming guitar to songs by José González.
  travel: A spontaneous explorer, Sonali Osorio plans trips around cultural festivals—last year they danced at the Guelaguetza in Oaxaca, and they dream of attending the Desert Moon Festival in Patagonia—preferring
    flexible itineraries that allow extra time for impromptu workshops and desert stargazing, while budgeting trips through a dedicated travel savings account.
  culinary: In the kitchen, Sonali Osorio whips up traditional dishes like chicken pozole, chile relleno, and hand‑made corn tortillas, expertly balances smoky chipotle with fresh cilantro and epazote,
    and enjoys sourcing heirloom chilies from their succulents garden, yet they sometimes over‑season dishes while multitasking between playlists on their guitar.
  core: Sonali Osorio is a charismatic woodworker who fuses ancient motifs with modern tech, thrives on community collaboration, and navigates life with a relaxed, slightly chaotic schedule that fuels endless
    creative projects.
background:
  cultural: Sonali grew up in a Mexican‑American household where Spanish was spoken at home and Mexican traditions—such as Día de los Muertos, Cinco de Mayo celebrations, and Catholic holidays—were deeply
    valued. Living in Buckeye, Arizona, she is part of a vibrant Mexican community that influences her identity, from the recipes she cooks to the decorative motifs she incorporates into her woodwork, often
    featuring vibrant colors and traditional patterns. Her bicultural experience informs her collaborative style, community involvement, and her desire to preserve and share Mexican cultural heritage through
    her craft and mentorship.
attributes:
  skills: '[''Custom cabinetry'', ''Furniture design and fabrication'', ''Decorative carving and inlay'', ''Material selection and sustainable sourcing'', ''Blueprint reading'', ''Project estimation and
