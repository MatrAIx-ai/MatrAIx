    ''Basic woodworking instruction'', ''CNC routing for intricate designs'']'
  hobbies: '[''Mexican folk dancing'', ''Cooking traditional Mexican cuisine'', ''Hiking in the Sonoran Desert'', ''Visiting local art galleries and craft fairs'', ''Pottery and ceramics'', ''Gardening
    (succulents and desert plants)'', ''Playing guitar and singing'', ''Volunteering to teach woodworking'', ''Collecting vintage hand tools'', ''Traveling to cultural festivals'']'
  career_goals: Sonali aims to transform her workshop into a boutique studio that showcases Mexican artistic heritage merged with contemporary design, offering a curated line of handcrafted furniture and
    decorative pieces. She plans to obtain a formal fine‑woodworking certification and a small‑business management course to scale her operation, hire and mentor apprentices—especially women entering the
    trades—and establish a regular schedule of community workshops. Additionally, she envisions partnering with local reclaimed‑wood suppliers to champion sustainable practices and gaining recognition at
    regional craft fairs and design expos.
