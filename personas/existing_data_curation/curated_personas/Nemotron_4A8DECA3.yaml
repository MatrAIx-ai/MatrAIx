  career_goals: Although only three, Johnny already imagines future roles that combine order, responsibility, and helping others. He frequently pretends to be a teacher who organizes classroom activities
    and a firefighter who leads rescue drills. These play scenarios reveal his ambition to work in a structured, service‑oriented job where he can lead a team and maintain clear routines.
