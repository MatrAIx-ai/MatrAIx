    knowledge'', ''Data entry & computer literacy'']'
  hobbies: '[''Street photography'', ''Biking and urban exploration'', ''Visiting art galleries and museums'', ''Attending live music and theatre performances'', ''Reading art and design books'', ''Listening
    to creativity and innovation podcasts'', ''Volunteering for community mural projects'', ''Playing board games with friends'', ''Experimenting with cooking'', ''Nature walks in Michigan state parks'']'
  career_goals: Kenneth aims to build on his hands‑on delivery experience by moving into logistics coordination or supply‑chain management. Over the next two to three years he plans to enroll in a community‑college
    program in business administration or logistics to earn an associate degree while seeking a promotion to route supervisor. He envisions eventually launching a niche delivery service that specializes
    in transporting artworks, sculptures, and cultural items for local galleries and independent artists, merging his logistical expertise with his passion for the arts. Alongside his professional trajectory,
    Kenneth hopes to develop a portfolio of street‑level photographs that could be showcased in Ann Arbor’s community art spaces.
