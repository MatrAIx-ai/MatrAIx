personas:
  professional: Donna Stroud, an aspiring communications major with a focus on strategic marketing, channels their curiosity and methodical work ethic into crafting inclusive digital campaigns using Photoshop,
    Illustrator, and Premiere, while their competitive streak pushes them to out‑innovate peers and their sociable nature ensures every project feels like a collaborative storytelling session.
  sports: Donna Stroud plays midfield for the Trenton Tigers intramural soccer squad, cheers on the Philadelphia Union in MLS and the New York Knicks during basketball season, and schedules weekly yoga
    classes to balance high‑energy team drills with mindful stretch, embodying an energetic yet organized athletic routine.
  arts: Donna Stroud immerses themselves in the regional art scene by visiting the Grounds for Sculpture and snapping street‑art photographs in downtown Philadelphia, drawing inspiration from Basquiat’s
    raw symbolism and Kara Walker’s narrative silhouettes while curating a monthly mixed‑media digital showcase that blends illustration, video editing, and live‑streamed artist talks.
  travel: Donna Stroud has explored New York City’s graffiti corridors, toured D.C.’s National Museum of African American History, celebrated Mardi Gras in New Orleans, and dreams of attending the annual
    Edinburgh Festival and a cultural exchange in Accra, favoring budget‑friendly hostels, group travel apps, and meticulously planned itineraries that prioritize local festivals.
  culinary: Donna Stroud enjoys experimenting with soul‑inspired dishes like collard‑green and sweet‑potato gnocchi, jerk‑spiced chicken wraps, and okra gumbo, often sourcing fresh heirloom tomatoes and
    hot peppers at the Trenton farmer’s market, while their occasional habit of binge‑watching cooking shows leads to late‑night snack raids on sugary churros from a nearby food truck.
  core: Donna Stroud blends a keen eye for inclusive storytelling with a competitive, methodically organized mindset, channeling curiosity into vibrant digital art, while balancing occasional indulgences
    and a skeptical filter for authenticity.
background:
  cultural: Donna identifies as African-American and grew up in Trenton, NJ, a city known for its vibrant cultural mosaic. Her family traditions emphasize storytelling, music, and community service, which
    have shaped her appreciation for Black artistic expression and social activism. She participates in local Juneteenth celebrations, supports Black-owned businesses, and draws inspiration from African-American
    artists such as Jean-Michel Basquiat and Kara Walker. This cultural foundation informs her artistic sensibility, her drive to create inclusive narratives, and her commitment to giving back to her community.
attributes:
  skills: '[''Digital illustration'', ''Graphic design (Adobe Photoshop, Illustrator)'', ''Video editing (Adobe Premiere)'', ''Social media content creation'', ''Event planning and coordination'', ''Public
