  hobbies: '[''Visiting art galleries'', ''Street photography'', ''Sketching and painting'', ''Attending live music and dance performances'', ''Community volunteering at youth art programs'', ''Reading
    contemporary Black literature'', ''Exploring new cuisines'', ''Playing intramural soccer'', ''Practicing yoga'', ''Traveling to cultural festivals'']'
  career_goals: Donna plans to complete her bachelor's degree in Communications with a focus on strategic marketing by graduating with honors. She aims to secure a competitive internship at a leading creative
    agency, where she can apply her design and digital media skills. In the long term, she aspires to become a brand strategist and eventually a creative director, leading inclusive campaigns that highlight
    diverse stories. Additionally, she hopes to open a community art center in Trenton that showcases African-American artists and provides mentorship for local youth. To support these goals, she intends
    to earn certifications in digital marketing and project management and to participate in national marketing competitions.
