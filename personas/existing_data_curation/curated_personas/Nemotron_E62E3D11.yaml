personas:
  professional: Henry Parks is a meticulous play‑architect, using building blocks to craft orderly structures as they practice early skills of planning and precision.
  sports: Henry Parks is an energetic member of the local under‑four soccer group, cheering loudly for the Boston Red Sox on game days and sprinting across the playground with boundless enthusiasm.
  arts: Henry Parks delights in storytime at the town library, singing along to Raffi’s ‘Baby Beluga’ and mimicking their favorite characters from ‘Sesame Street’, which they view as essential to their
    creative play.
  travel: Henry Parks enjoys family outings to the sandy shores of Cape Cod and the splashy exhibits at Boston’s Children’s Museum, dreaming of a gentle adventure to Disneyland’s kid‑friendly rides someday.
  culinary: Henry Parks favors buttery macaroni and cheese, apple slices dusted with cinnamon, and occasional pumpkin pie, often arranging each bite into neat rows before eating.
  core: Henry Parks is a fiercely organized three‑year‑old who lines up toys, competes in sandbox races, and never misses a chance to rehearse counting, all while maintaining a sunny, steady demeanor.
background:
  cultural: Henry is a white child raised in Rutland, a small town in Worcester County, Massachusetts. He grows up in a middle‑class New England family that celebrates typical American holidays like Thanksgiving,
    Fourth of July, and Christmas, and participates in community events such as local fairs and library programs. His family’s cultural roots trace back to European (primarily Irish and English) ancestry,
    reflected in family gatherings that include traditional foods and stories. The suburban environment offers access to parks, preschool programs, and a close‑knit neighborhood where he often interacts
    with other children.
