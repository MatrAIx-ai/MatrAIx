persona_description: A teacher who believes in the importance of integrating both decoding and encoding strategies in early reading instruction to promote successful reading. They are familiar with the
  research on phonics instruction and believe that incorporating more encoding into early reading instruction can produce more successful readers. They are also aware of the advantages of joyful learning,
  construction, and discovery in teaching and are not opposed to worksheets and counting phonemes. They have experience teaching both decoding and encoding strategies and are interested in the latest research
  on the topic.
