  career_goals: Looking ahead, Odette intends to transition from frontline driving into a supervisory and instructional role within the next three to five years. She plans to earn a HazMat endorsement and
    complete a certificate program in logistics management at a local community college, positioning herself for a fleet‑supervisor position where she can oversee route scheduling, driver safety, and compliance.
    Simultaneously, she hopes to launch a small, family‑run courier service that leverages her sales background to serve local Boston businesses, providing personalized delivery solutions. A passionate
    advocate for driver wellbeing, she also aims to spearhead a peer‑support group for truckers within her union to address stress and mental‑health concerns, ensuring a safer, more supportive work environment
    as she approaches retirement.
