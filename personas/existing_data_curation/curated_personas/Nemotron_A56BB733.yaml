  career_goals: Although retired from full‑time work, Dillon aims to stay professionally active by offering part‑time consulting on community infrastructure projects, serving on nonprofit advisory boards,
    and mentoring emerging engineers. He also hopes to author a practical guide on engineering lessons for younger generations, continue learning about sustainable design, and remain a visible contributor
    to local civic initiatives.
