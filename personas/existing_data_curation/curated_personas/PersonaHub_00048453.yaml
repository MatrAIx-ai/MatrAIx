persona_description: A scientist who specializes in exoplanet research and has a particular interest in understanding the origin of retrograde planets. They have conducted high-contrast direct imaging observations
  for known planetary systems to check for the presence of outer faint companions, which may play an important role in understanding the entire picture of planetary migration. Their findings provide important
  clues for understanding the origin of a variety of planetary systems, including those with highly tilted and eccentric orbits.
