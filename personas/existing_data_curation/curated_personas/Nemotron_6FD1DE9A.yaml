  career_goals: Although only three, Shannon already talks about her future in imaginative terms. She says she wants to be a teacher because she loves storybooks and helping friends learn, and she also
    dreams of caring for animals as a veterinarian after seeing a puppy at the local park. Her budding ambitions combine her curiosity about the world with a practical desire to help and nurture others,
    reflecting the balance described in her personality profile.
