  hobbies: '[''Drawing and painting'', ''Digital illustration'', ''Photography'', ''Visiting art galleries and museums'', ''School Art Club'', ''School Drama Club'', ''Beach volleyball'', ''Graphic novels'',
    ''Indie film watching'', ''Cooking with family'']'
  career_goals: She aspires to attend a top art school and become a professional illustrator or multimedia designer. In the long term, Clara hopes to work in a collaborative creative studio, develop visual
    content for video games or advertising, or curate community art exhibitions. She also dreams of launching a youth art collective in Boca Raton that brings together local artists and volunteers to make
    art accessible for teens.
