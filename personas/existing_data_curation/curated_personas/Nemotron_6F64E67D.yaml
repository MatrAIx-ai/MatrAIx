personas:
  professional: Clara Yeary, a high‑school sophomore who runs a burgeoning Instagram art account with 4 k followers, blends traditional painting with digital illustration, leverages her natural curiosity
    to experiment with mixed media, thrives on collaborative projects in her school's Art Club and Drama Club, and channels her relaxed, flexible mindset into a loose schedule that allows spontaneous creative
    bursts.
  sports: Clara Yeary, a dedicated member of the Sunset Beach Volleyball Club, hits the sand courts after school with friends, follows the Miami Heat for inspiration, and dreams of joining the Florida Panthers
    junior fan club during winter, balancing casual pick‑up games with a fanatic following of local pro teams.
  arts: Clara Yeary, who frequently sketches in downtown Wynwood's mural‑laden alleys, draws inspiration from street visionary Banksy and modernist Frida Kahlo, gushes over indie films like Moonlight and
    Lady Bird, and idolizes musicians such as Tame Impala and The Strokes, weaving these influences into vibrant mixed‑media pieces she showcases on Instagram.
  travel: Clara Yeary, a spontaneous wanderer who prefers last‑minute road trips, spends weekends exploring the Everglades' airboat tours, savoring Key West's pastel sunsets, and day‑dreaming about a future
    study‑abroad stint in Barcelona’s art districts, all while balancing family budget constraints.
  culinary: Clara Yeary, an experimental home cook who loves crafting tropical mango‑avocado salsa, mastering key‑lime pie, and whipping up pasta primavera with fresh shrimp, often documents the process
    in Instagram reels, yet sometimes burns the garlic due to their habit of multitasking between cooking and sketching.
  core: Clara Yeary channels boundless curiosity and social energy into a kaleidoscopic blend of art, sport, and spontaneous adventures, all while juggling a relaxed approach to organization and a penchant
    for impulsive splurges.
background:
  cultural: Clara grew up in a middle‑class white family in Boca Raton, Florida. Her upbringing reflects typical American suburban values, with holidays like Thanksgiving and Christmas celebrated at home.
    Living in South Florida exposed her to a multicultural environment, where she regularly encounters Hispanic, Caribbean, and European influences through local festivals, cuisine, and a vibrant arts scene.
    This diversity has nurtured her openness to varied experiences and unconventional ideas.
