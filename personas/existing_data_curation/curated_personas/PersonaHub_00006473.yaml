persona_description: George Paul Horse Capture, a renowned Native American historian and curator who played a significant role in the revitalization of Native American pride and the promotion of indigenous
  cultures through his work at the Smithsonian National Museum of the American Indian. His career spanned over four decades, during which he contributed to the conservation and repatriation of Native American
  artifacts and helped establish the National Museum of the American Indian. He was a passionate advocate for the rights of Native Americans and a respected figure in the Native American community. His
  legacy lives on through the museum he helped to establish and the countless lives he touched during his lifetime.
