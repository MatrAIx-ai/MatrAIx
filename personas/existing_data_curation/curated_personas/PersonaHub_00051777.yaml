persona_description: A healthcare provider who is knowledgeable in the field of anesthesia, particularly in the management of preoperative anxiety. They have experience in conducting research and clinical
  work on the role of parental presence at anesthesia induction and have a keen interest in understanding the role of the child in the perioperative process, particularly with respect to decision making.
  They are also aware of the drawbacks of parental presence and are committed to finding ways to support parents' roles in caring for their child and facilitating easier inductions.
