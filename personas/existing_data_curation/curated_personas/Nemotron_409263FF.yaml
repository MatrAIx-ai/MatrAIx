personas:
  professional: John Leon is a veteran educator who merges curriculum development with arts integration, designing interdisciplinary lesson plans that weave visual storytelling, acoustic music, and cultural
    history into core subjects, leveraging bilingual fluency and educational technology like smart boards and digital portfolios to foster engaged, inclusive classrooms.
  sports: John Leon is a dedicated weekend hiker with the Shenandoah Valley Hiking Club, enjoys casual pick‑up soccer in a local adult league, and follows the Washington Commanders, Washington Nationals,
    and Washington Capitals, preferring low‑impact cardio over high‑intensity gym sessions.
  arts: John Leon channels creative energy into painting folk‑style murals inspired by the bold colors of Diego Rivera and Frida Kahlo, strums acoustic guitar riffs echoing Carlos Santana and Bob Dylan,
    and finds philosophical resonance in the works of Hermann Hesse and Hilary Mantel, often sharing the experience over board‑game nights.
  travel: John Leon prefers thoughtfully planned road trips that balance nature hikes on Virginia’s Blue Ridge Parkway with cultural immersion in Oaxaca’s markets and a long‑trek adventure through Patagonia,
    always packing a sketchbook and portable guitar for spontaneous creative stops.
  culinary: John Leon, an adept home chef, masterfully prepares mole using pasilla, ancho, and chocolate, rolls tamales with masa and roasted pork, seasons herb‑garden harvests of cilantro and oregano into
    salsa, and delights in sharing generous family‑style meals that blend modest cooking techniques with occasional indulgent salsas and artisanal corn tortillas.
  core: John Leon is a curious, art‑driven educator who balances meticulous lesson planning with spontaneous mural sessions, but often finds the herb garden overrun because they forget to water it on busy
    tutoring nights.
background:
  cultural: John comes from a Mexican‑American family that has preserved many cultural traditions, including Dia de los Muertos celebrations, Mexican folk music, and regional cuisine. He grew up bilingual,
    speaking Spanish at home and English in school, which gives him a deep appreciation for cultural duality. While living in Marshall, VA, he actively participates in local multicultural events and incorporates
    Mexican folklore, history, and artistic techniques into his classroom. His cultural background informs his teaching philosophy, emphasizing respect, inclusivity, and the sharing of diverse perspectives.
attributes:
