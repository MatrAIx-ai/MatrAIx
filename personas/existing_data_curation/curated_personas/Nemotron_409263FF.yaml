  hobbies: '["Painting (folk art)","Playing acoustic guitar","Cooking Mexican cuisine","Reading historical fiction and philosophy","Hiking in Shenandoah Valley","Gardening (herb garden)","Attending local
    art exhibitions","Volunteer tutoring for adult learners","Small‑group board games","Nature photography"]'
  career_goals: John aims to earn a bachelor's degree in education and acquire certification in bilingual instruction within the next three years. He aspires to become a curriculum coordinator for a regional
    adult‑education program, where he can design culturally responsive arts initiatives that celebrate Mexican heritage. He also hopes to mentor new teachers, develop after‑school art workshops for local
    youth, and eventually lead a community learning center that blends language, art, and lifelong learning opportunities.
