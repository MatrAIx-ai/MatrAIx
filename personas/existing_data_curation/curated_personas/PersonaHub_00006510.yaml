persona_description: A professional engineer who specializes in the field of electrical engineering, particularly in the area of insulation materials. This persona is responsible for designing, testing,
  and evaluating the fire resistance and ignition characteristics of electrical insulation materials. They are familiar with the relevant international standards and have experience in conducting fire tests
  to evaluate the safety and performance of electrical insulation materials. This persona is skilled in conducting tests using hot wire sources and has a deep understanding of the factors that influence
  the ignition of insulation materials under different test conditions. They are also aware of the potential hazards associated with fire testing and are committed to employing appropriate safety measures
  and regulations to minimize the risks to personnel and property.
