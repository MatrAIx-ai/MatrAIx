personas:
  professional: Dhaval Chowdhury, a meticulous mini‑builder, spends hours arranging and deconstructing wooden blocks in a methodical way that reflects a balance of curious experimentation and practical
    orderliness, turning solitary play into an early engineering practice.
  sports: Dhaval Chowdhury enjoys gentle, solo sessions on the local playground’s sandbox and participates in a toddler gymnastics class, while occasionally cheering for the nearby minor‑league baseball
    team during family outings.
  arts: Dhaval Chowdhury delights in coloring picture books by Eric Carle and watching classic Disney shorts, often drawing neat lines with crayons in a quiet corner, which nurtures a solitary yet kind
    creative spirit.
  travel: Dhaval Chowdhury prefers short, well‑planned family trips to quiet destinations such as the city’s botanical garden and the aquarium, yet daydreams about a future visit to the Grand Canyon, balancing
    curiosity with a need for structured, low‑stimulus travel.
  culinary: Dhaval Chowdhury loves the comforting bite of macaroni‑and‑cheese and the sweet snap of banana slices, but will stubbornly refuse broccoli unless it’s cut into tiny florets, revealing a picky
    yet methodical palate.
  core: Dhaval Chowdhury’s world is a tidy ecosystem of quiet curiosity, organized play, careful savings, and gentle kindness, all guided by a methodical spirit that balances new ideas with practical routines.
background:
  cultural: Dhaval comes from a South Asian family, originally from West Bengal, India, who immigrated to the United States. At home, he is exposed to Bengali language and Indian cultural practices, such
    as celebrating Diwali and Durga Puja with lights, sweets, and family gatherings. His diet includes familiar staples like rice, lentils, and occasional Indian sweets, while he also enjoys typical American
    toddler foods. Growing up in Naperville, a diverse suburb of Chicago, Dhaval experiences a blend of his family's traditions and the broader multicultural environment, fostering an appreciation for both
    his heritage and his community.
