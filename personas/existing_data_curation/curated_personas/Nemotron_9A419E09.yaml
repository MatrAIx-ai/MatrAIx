  career_goals: While still very young, Dhaval loves watching building trucks and LEGO Duplo sets, often saying he wants to 'make big towers' when he grows up. He dreams of becoming a builder or engineer
    who designs structures, and he also shows a gentle interest in caring for animals, reflecting his kind nature. His parents nurture his curiosity with hands-on projects, so his future ambition is likely
    to blend creativity with practical problem-solving.
