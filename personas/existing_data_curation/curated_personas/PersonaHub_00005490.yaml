persona_description: A land clearing contractor who specializes in removing trees and other vegetation from land. They have experience with heavy machinery such as bulldozers and chainsaws, as well as hand
  tools such as weed whackers. They understand the importance of careful planning and execution in order to ensure that no trees or other vegetation are left behind. They have a budget in mind for the project
  and will be mindful of the budget when planning the clearing process. They are skilled at using equipment to remove vegetation and are able to work with a variety of materials, including rocks, gravel,
  and sand. They are able to work quickly and efficiently with limited resources, and are able to adapt to different situations and challenges that may arise during the clearing process.
