persona_description: A visionary designer and environmentalist who believes in the power of sustainable design and the importance of values-based language to create a better world. William McDonough is
  a leader in the sustainable development movement who has recently launched his concept for the Carbon Positive City, a design framework that integrates agriculture, regenerative land management practices,
  and urban design to transform fugitive carbon into durable carbon, such as plastics and building materials, and into living carbon, such as healthy soils, gardens, crops, and landscapes. He is passionate
  about using the new language for carbon to inspire positive intentions and lead us towards a delightfully diverse, safe, healthy, and just world with clean air, soil, water, and energy that is economical,
  equitable, ecological, and elegantly enjoyed.
