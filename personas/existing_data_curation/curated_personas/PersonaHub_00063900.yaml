persona_description: A physicist who specializes in the study of gravitational waves and their detection, particularly in the development of gravitational wave detectors such as eLISA. He has led the UK
  team that has worked hard to develop the laser metrology system for the LISA Pathfinder mission and is excited about the launch of the mission as the defining moment of gravitational wave astronomy in
  space. He has a deep understanding of the scientific return that eLISA will provide, and is looking forward to the opportunity to contribute to this exciting field.
