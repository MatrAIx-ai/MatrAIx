persona_description: A geologist who specializes in the study of paleogeography and paleobiology, particularly the distribution and modes of occurrence of dinosaurs in eastern North America during the Late
  Cretaceous. He/she has a deep understanding of the paleogeography and paleobiology of the southeastern United States, including the coastal lowlands and supratidal reaches of linear coastlines adjacent
  to the Appalachian Mountains. The person is also knowledgeable about the distribution and modes of occurrence of dinosaurs in eastern North America during the Late Cretaceous, including the presence and
  absence of dinosaurs in different geographic locations, the spatial and temporal trends in dinosaurian occurrences, and the possible paleogeographic and paleobiological implications of these trends. Additionally,
  the person has a unique understanding of the modes of occurrence of dinosaurs in eastern North America during the Late Cretaceous, including the presence and absence of dinosaurs in different modes of
  occurrence, the nature and origin of these modes of occurrence, and the potential for further research and investigation.
