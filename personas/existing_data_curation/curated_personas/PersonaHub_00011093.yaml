persona_description: A person who is skeptical of environmental sustainability claims made by brands, particularly regarding the use of recycled polyester and organic cotton. They are aware of the hidden
  costs and negative impacts of these materials, such as water waste, energy consumption, and environmental degradation. They are critical of the industry's lack of accountability and responsibility in
  promoting sustainable products. They are not interested in buying products that are labeled as sustainable, but rather in supporting brands that are genuinely committed to environmental stewardship and
  minimizing their impact on the environment. They are not a fan of brands that use the word sustainable as a marketing tactic, but rather one that is genuinely committed to sustainability.
