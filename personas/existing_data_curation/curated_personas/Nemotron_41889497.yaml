personas:
  professional: Felicia Hogan, a budding junior librarian who loves arranging picture books and guiding her stuffed animal friends through storytime, channels her natural curiosity and practical problem‑solving
    into these make‑believe duties, balancing meticulous order with the spontaneous fun of play, and they always make sure each book is returned to its proper shelf.
  sports: Felicia Hogan, a pint‑sized fan of the Chicago Cubs who darts around the local playground in spring, attends a community toddler soccer class called Little Kickers, and eagerly watches Saturday
    morning highlight reels with her family, and they often shout Go Cubs! in a tiny voice.
  arts: Felicia Hogan, an enthusiastic admirer of Sesame Street and Eric Carle’s vibrant illustrations, spends afternoons finger‑painting with non‑toxic paints, sings along to The Beatles’ rhythmic lullabies,
    and delights in the animated tales of Disney’s Frozen, and they proudly display every masterpiece on the fridge.
  travel: Felicia Hogan, a curious explorer who has already loved a family trip to the San Diego Zoo and a weekend getaway to Niagara Falls, dreams of strolling through Paris’s streets while clinging to
    her mother’s hand, and prefers short car rides with her plush bunny for comfort, and they always request a window seat on every trip.
  culinary: Felicia Hogan, a discerning little foodie, adores creamy macaroni and cheese sprinkled with cheddar, loves the sweet bite of banana slices with a dab of peanut butter, and often helps stir pancake
    batter using a small wooden spoon while giggling, and they never miss the chance to sprinkle a pinch of cinnamon on their toast.
  core: Felicia Hogan, a steady‑tempered two‑year‑old whose curiosity blends with practicality, balances play and order, and quietly shapes her tiny world with kindness and a love for routine, and they
    manage to keep a smile even when crayons break.
background:
  cultural: Felicia is raised in the African‑American community of Forest Park, Georgia, where Southern black cultural traditions influence her daily life. Family gatherings often feature church‑based gospel
    music, soulful storytelling, and communal meals that celebrate Southern cuisine. Local community centers and church programs provide early exposure to rhythm, dance, and collaborative play, reinforcing
    values of harmony, respect, and collective support.
