  career_goals: Although Kim is retired from formal employment, she aims to deepen her impact as a community volunteer leader, eventually coordinating larger inter‑generational programs that blend her practical
    skills with her curiosity about new ideas. She hopes to mentor younger volunteers in budgeting and event planning, and she plans to enroll in a few community‑college courses on digital storytelling
    so she can document and share the oral histories of her hometown. Maintaining her health and independence remains a top priority, and she aspires to travel modestly to historic sites along the East
    Coast, especially places tied to family heritage.
