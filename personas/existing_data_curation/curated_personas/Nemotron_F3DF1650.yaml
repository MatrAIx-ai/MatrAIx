  career_goals: In the next five years William aims to transition from daily site management to a senior advisory role where he can mentor emerging construction leaders and shape local development policy.
    He hopes to secure a seat on the Kinston Planning Commission to influence projects that preserve the town’s historic character while expanding affordable housing. Simultaneously, he is exploring the
    launch of a boutique consulting practice focused on safety and efficiency for small contractors, a move that would give him a steadier schedule, lower stress levels, and the opportunity to leave a lasting
    professional legacy in his community.
