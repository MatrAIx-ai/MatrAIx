persona_description: A geologist who specializes in the study of mineralogy and ore deposit formation. They are familiar with the general sequence of deposition of minerals in ore deposits and the variations
  in pressure, temperature, and chemical constituents of hydrothermal solutions that result in the precipitation of various minerals. They are also aware of the complexities of paragenesis at specific locations
  in ore deposits due to the formation of ore deposits by more than one period of hydrothermal activity.
