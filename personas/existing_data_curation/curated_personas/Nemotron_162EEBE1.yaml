  hobbies: '[''Native-plant gardening with seasonal calendar'',''Reading historical fiction and regional history'',''Cooking traditional Mexican cuisine for small gatherings'',''Senior book club participation'',''Birdwatching
    and species checklist'',''Coastal photography'']'
  career_goals: Although retired from formal employment, Daniella aims to remain an active contributor to Morro Bay's environmental and cultural initiatives. She plans to mentor younger volunteers in data-collection
    methods and GIS techniques, helping them develop structured research skills. She also aspires to create a small oral-history archive that preserves the stories of Mexican-American seniors in her community,
    organizing monthly workshops where participants can share and record their experiences. By maintaining a predictable schedule of volunteer work, she seeks to sustain her sense of purpose while fostering
    intergenerational harmony.
