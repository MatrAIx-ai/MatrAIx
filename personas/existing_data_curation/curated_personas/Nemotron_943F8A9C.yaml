    and conflict resolution'', ''Problem solving under time pressure'']'
  hobbies: '[''Fishing at local lakes'', ''Hiking in Appalachian foothills'', ''Truck component restoration'', ''Listening to mental‑health and automotive podcasts'', ''Playing acoustic guitar'', ''Watching
    NASCAR and motorsports'', ''Playing truck simulation video games'', ''Attending community church events'', ''Casual gatherings with close friends'']'
  career_goals: In the near term, Zahi aims to earn additional CDL endorsements (such as hazmat and double‑trailer) and improve his safety record to qualify for higher‑pay routes. He plans to pursue certifications
    in vehicle maintenance and supply‑chain basics to broaden his expertise. Over the next five years, he hopes to transition into a logistics coordinator role where he can blend his driving experience
    with scheduling and dispatch responsibilities, and eventually start a small regional trucking business that offers both freight services and parts sales. Financial stability and a supportive work environment
    are key motivators, helping him manage his anxiety and maintain work‑life balance.
