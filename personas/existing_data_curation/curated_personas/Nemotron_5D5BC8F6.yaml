  hobbies: '[''Hiking and Trail Walking'', ''Yoga and Mindfulness Meditation'', ''Healthy Cooking and Recipe Sharing'', ''Reading Medical Science and Fiction'', ''Listening to Healthcare Podcasts'', ''Volunteering
    at Food Bank'', ''Participating in Community Health Fairs'', ''Journaling'', ''Learning Spanish'', ''Nature Photography'']'
  career_goals: Sondra is determined to translate her hands‑on experience into a full nursing career. Over the next two years she plans to enroll in an Associate Degree in Nursing (ADN) program at a local
    community college, achieving her Registered Nurse (RN) licensure. Her long‑term ambition is to specialize in geriatric or community health nursing, where she can apply her organizational strengths to
    develop patient‑centered care plans and lead quality‑improvement initiatives. She also hopes to obtain a certification in nursing informatics, enabling her to bridge clinical practice with technology.
    Ultimately, Sondra aims to become a charge nurse or a clinical educator, mentoring future aides and fostering a culture of compassionate, evidence‑based care.
