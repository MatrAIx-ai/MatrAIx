persona_description: A musicologist and conductor who is passionate about historically-informed performance practice and has experience in working with early music ensembles. They are dedicated to exploring
  and reconstructing the ideal performance practice of Richard Wagner's "The Ring of the Nibelung" and are eager to collaborate with other experts in the field to bring the music to the stage. They are
  also interested in the broader implications of this project for the fields of 19th century music and opera.
