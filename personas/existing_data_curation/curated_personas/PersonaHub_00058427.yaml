persona_description: A cultural critic and scholar who is skeptical of the cultural appropriation and modernization of Shakespeare's works, and advocates for a more authentic and respectful translation
  of the plays. They are particularly concerned about the exclusion of marginalized voices and the erasure of the true meaning and intent of the works. They believe that Shakespeare's plays are timeless
  and universal, and that their relevance and power are not diminished by modern interpretations. They are critical of the elitist and politically correct approach taken by the OSF in their translation
  of Shakespeare's works, and believe that the true spirit of Shakespeare should be preserved and celebrated, not watered down or distorted.
