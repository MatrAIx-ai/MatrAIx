personas:
  professional: Janet King, a newborn with an uncanny attraction to order, is already showing signs of a future career in operations management, a field where meticulous scheduling and practical problem‑solving
    are paramount, and their inherent routine‑loving nature suggests they will thrive in structured environments.
  sports: Janet King is not yet playing, but they are introduced to sports through parents' weekly viewing of the Chicago Cubs and a weekly infant swim class at the local YMCA, fostering early familiarity
    with team spirit and physical activity.
  arts: Janet King, while still learning to focus, is regularly soothed by gentle recordings of Mozart’s “Eine kleine Nachtmusik” and contemporary singer Adele’s “Someone Like You,” fostering an early appreciation
    for classical and pop melodies that will likely shape their future artistic tastes.
  travel: Janet King’s first family road trip to the Grand Canyon when they were three months old sparked a fascination with wide‑open landscapes, and the parents have already penciled in a future vacation
    to Kyoto’s cherry blossom festivals, balancing the desire for adventure with the need for a predictable, infant‑friendly itinerary.
  culinary: Janet King, currently thriving on organic breast milk supplemented with a nightly formula, has shown a particular preference for smooth, slightly sweet purees like carrot and sweet potato, and
    their parents enjoy preparing homemade avocado mash to introduce healthy fats early on.
  core: Janet King, a newborn who craves routine, clings to familiar lullabies, and already competes to be the first to roll over, balances soothing alone time with occasional babbling social moments, and
    can be fussy when schedules shift.
background:
  cultural: Janet was raised in Davisburg, a small Midwestern community in Oakland County, Michigan, where the local culture emphasizes self‑reliance, modesty, and community involvement. Her upbringing
    reflects the regional values of punctuality, routine, and practicality common among many families of European ancestry (e.g., German and Irish roots) in the area. Community traditions such as county
    fairs, church gatherings, and high school sporting events have shaped her sense of belonging and reinforced a traditional, down‑to‑earth worldview.
