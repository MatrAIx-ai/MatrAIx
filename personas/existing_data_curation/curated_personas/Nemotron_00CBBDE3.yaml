  career_goals: Although officially retired, Delton aims to deepen his contribution to the Crestview community. He plans to lead a series of intergenerational art workshops at the local senior center, curate
    a traveling exhibition of regional artists, and compile a memoir of local histories and personal anecdotes. He also hopes to travel to major art museums and cultural festivals across the United States,
    expanding his artistic horizons while sharing those experiences with friends and neighbors. Ultimately, he aspires to leave a lasting legacy of creativity, mentorship, and community spirit.
