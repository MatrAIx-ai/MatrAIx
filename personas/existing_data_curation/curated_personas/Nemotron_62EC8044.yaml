  hobbies: '["gardening", "baking", "knitting", "quilting", "hiking", "reading practical non-fiction", "volunteering at church food pantry", "board games", "puzzle solving", "attending local fairs"]'
  career_goals: Anita aims to advance from cashier to shift supervisor within the next two years, then pursue a store manager position. She plans to earn a Certified Retail Management credential and eventually
    oversee multiple locations or transition to managing a family‑run specialty shop, such as a bakery. Her long‑term ambition is to secure financial stability for her family, build a comfortable retirement,
    and maintain a work‑life balance that supports her community involvement.
