  hobbies: '[''Reading historical fiction'', ''Gardening'', ''Hiking local trails'', ''Home brewing'', ''Craft cocktail experimentation'', ''Knitting'', ''Yoga'', ''Cooking family meals'']'
  career_goals: Jennifer aims to become a bar manager within the next two years, earning a Certified Bartender credential and completing part‑time coursework in hospitality management. Her long‑term ambition
    is to open a small neighborhood tavern that highlights local brews and fosters a low‑stress, community‑focused atmosphere for families and regulars, while maintaining a stable schedule that supports
    her marriage and mental well‑being.
