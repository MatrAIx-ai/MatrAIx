personas:
  professional: Jennifer Nelson thrives as a seasoned bartender who expertly blends classic and contemporary mixology, meticulously manages POS and inventory, and leverages their calm, routine‑loving demeanor
    to de‑escalate conflicts and train new staff while they eye a bar manager role within two years.
  sports: Jennifer Nelson enjoys low‑impact fitness, tackling weekend hikes on the local Greenridge Trail, participating in the Hillside Hikers club, and cheering for the nearby minor‑league baseball team,
    the River City Rovers, while they occasionally follow the national soccer team for the World Cup.
  arts: Jennifer Nelson immerses themselves in the arts by devouring historical fiction novels by Philippa Gregory, knitting scarves while listening to folk‑rock duo The Lumineers, and attending community
    theater productions that showcase classic plays, while they find comfort in familiar narratives and melodic storytelling.
  travel: Jennifer Nelson prefers thoughtfully planned short getaways that blend relaxation with gentle adventure, such as a weekend wine‑tasting tour in Napa Valley, a scenic hike through the Blue Ridge
    Mountains of Asheville, and a dream trip to New Zealand’s vineyards once their tavern is flourishing, and they meticulously map each itinerary to balance cost and time.
  culinary: Jennifer Nelson delights in crafting wholesome farm‑to‑table meals, often starring roasted root vegetables, quinoa salads with fresh herbs from their garden, and hearty stews, while they experiment
    with home‑brewing recipes that feature ginger, rosemary, and citrus‑infused craft cocktails, reflecting their refined palate.
  core: Jennifer Nelson is a routine‑oriented, community‑focused bartender who balances a penchant for meticulous mixology with yoga‑infused stress relief, yet they wrestle with chronic worry that fuels
    both their careful planning and occasional indulgent splurges.
background:
  cultural: Jennifer was raised in a middle‑class white family in the Pacific Northwest, where practicality, self‑reliance, and community involvement are core values. Her upbringing emphasized routine,
    modest living, and respect for regional traditions such as supporting local agriculture and craft breweries. Married and settled in Baker City, Oregon, she identifies with the small‑town ethos of friendliness,
    modesty, and a deep appreciation for the surrounding natural environment.
attributes:
  skills: '[''Cocktail Mixology'', ''Customer Service'', ''Cash Register Operation'', ''Inventory Management'', ''Food Safety Compliance'', ''Conflict De-escalation'', ''Time Management'', ''Team Training'',
