  hobbies: '[''soccer (community league)'', ''guitar playing and folk singing'', ''Mexican cooking and recipe experimentation'', ''hiking in San Bernardino Mountains'', ''attending cultural festivals (e.g.,
    Cinco de Mayo)'', ''volunteering for community events'', ''reading Mexican history'', ''watching classic Mexican cinema'']'
  career_goals: Armand aspires to transform his culinary passion and community spirit into a modest, locally‑run Mexican food cart that can serve his neighborhood while providing flexible work hours. He
    also plans to obtain a handyman certification to formalize his repair skills, enabling him to take on part‑time contracted jobs. In parallel, he hopes to volunteer as a mentor at the local youth center,
    using his interpersonal strengths to guide young people. Completing a short business‑management course is another goal, giving him the confidence to run his food venture and manage finances effectively.
