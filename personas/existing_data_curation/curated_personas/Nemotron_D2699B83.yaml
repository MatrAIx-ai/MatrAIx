  skills: '[''digital illustration'', ''photography'', ''basic video editing'', ''guitar playing'', ''public speaking'', ''team coordination'', ''creative problem solving'', ''basic Python scripting'']'
  hobbies: '[''sketching'', ''photography'', ''guitar playing'', ''soccer'', ''hiking'', ''reading graphic novels'', ''improv theater'', ''coding with Raspberry Pi'', ''volunteering at local art gallery'']'
  career_goals: She dreams of turning her creative passions into a career that blends art and community impact. Anna envisions studying visual arts or multimedia production in college, eventually becoming
    a filmmaker, digital content creator, or creative director for a nonprofit arts organization in coastal New England. She hopes to win youth art competitions, launch an online platform that showcases
    emerging teen artists, and develop stronger project‑management skills to balance her spontaneous nature with the discipline needed for professional success.
