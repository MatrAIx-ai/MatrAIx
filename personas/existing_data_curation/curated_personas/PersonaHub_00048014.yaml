persona_description: A social historian who is interested in the analysis of cultural systems and transformations, particularly those in the field of anthropology. They are skilled in the use of synchronic
  analysis and thick description to explore the past with greater accuracy and depth, and have a deep understanding of the differences between historical research and ethnography. They are critical of the
  diachronic approach taken by historians in the past, and are attached to the ideas of history in transformation. They have a unique knowledge of the use of Geertz's theory in historical research, and
  have successfully applied it to explore witchcraft in seventeenth century Germany.
