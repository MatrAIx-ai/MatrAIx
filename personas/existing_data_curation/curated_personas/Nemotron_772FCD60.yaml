personas:
  professional: Avonlea Davids, a seasoned social worker with a knack for crisis intervention and a vivid imagination, blends evidence‑based case management with watercolor‑inspired narrative therapy, leveraging
    their strong communication skills to build quiet, trust‑based client relationships while navigating a path toward clinical licensure and a supervisory role at St. Clair County health department.
  sports: Avonlea Davids enjoys low‑impact fitness, regularly strolling the Kaskaskia River trail and attending yoga classes at the local community center, while cheering on the St. Louis Cardinals and
    the St. Louis Blues from their balcony, and they are an occasional member of a senior walking club that meets at the county park.
  arts: Avonlea Davids finds solace in watercolor painting, often emulating the delicate botanical precision of Georgia O'Keeffe and the soft palettes of John Singer Sargent, while also devouring literary
    fiction by Toni Morrison and Virginia Woolf, and they volunteer at the historical society's gallery openings to discuss the intersection of art and memory.
  travel: Avonlea Davids prefers thoughtful, off‑peak travel, having recently explored the tranquil gardens of Kyoto’s Sagano district and the misty cliffs of Sedona, Arizona, while planning a future genealogy
    trip to the archives of London’s National Archives, and they favor meticulously plotted itineraries that allow ample time for quiet reflection.
  culinary: Avonlea Davids enjoys farm‑to‑table cooking, frequently turning garden harvests of heirloom tomatoes, Belgian endive, and rosemary into simple ratatouille, roasted beet and goat‑cheese salads,
    and they relish the ritual of brewing herbal tea with fresh mint and chamomile, which they consider both nourishment and meditation.
  core: Avonlea Davids is a reflective social worker who mixes art, solitude, and a dash of organized chaos into a life that balances caring for others with careful self‑care and occasional financial impulsivity.
background:
  cultural: Avonlea was raised in Collinsville, a small city in St. Clair County, Illinois, within a predominantly white, Midwestern community with German‑Dutch ancestry. The region’s cultural values of
    humility, self‑reliance, and strong community ties shaped her worldview. Her family emphasized education in the humanities, church participation, and civic responsibility. Growing up near the historic
    National Shrine of St. Gabriel and the industrial backdrop of the Greater St. Louis area exposed her to a mix of working‑class sensibilities and cultural diversity, which later informed her compassionate
    yet pragmatic approach to social work.
