  hobbies: '[''Watercolor Painting'', ''Gardening'', ''Reading'', ''Creative Writing/Journaling'', ''Genealogy Research'', ''Mindfulness Meditation'', ''Walking/Hiking'', ''Local History Society'', ''Volunteer
    at Community Garden'', ''Listening to Folk/Classical Music'']'
  career_goals: She aims to obtain licensure as a clinical social worker and progress to a supervisory position within the St. Clair County health department, where she can design and lead a community‑based
    mental‑health program that integrates arts‑based therapeutic approaches. Avonlea also dreams of establishing a nonprofit focused on solitary‑friendly support groups for adults dealing with chronic stress,
    and hopes to influence county‑level policy to improve funding for preventative mental‑health services.
