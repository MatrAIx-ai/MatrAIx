personas:
  professional: Jesse Champi merges deep mechanical engineering expertise in CAD modeling, finite‑element analysis, and prototype fabrication with a pragmatic, curiosity‑driven mindset; they lead cross‑functional
    teams through Lean Six Sigma practices while mentoring junior engineers and championing sustainable, smart‑manufacturing solutions.
  sports: Jesse Champi plays forward for the Boulder Blaze adult soccer league, cycles the Flatirons Trail on weekends, they follow the Colorado Rapids in MLS and cheer for the Denver Broncos in the NFL,
    and they blend competitive play with a community‑focused fitness routine.
  arts: Jesse Champi strums acoustic guitar while channeling the vibes of Led Zeppelin and Pink Floyd, they capture sunrise landscapes on family hikes inspired by Ansel Adams, and they regularly attend
    local art shows featuring contemporary sculptors and indie film screenings.
  travel: Jesse Champi enjoys meticulously planning weekend road trips to Colorado Springs and longer escapes to Kyoto, Japan, they balance adventure with family comfort, often blending hikes in national
    parks like Yosemite with culinary tours at regional food festivals.
  culinary: Jesse Champi is a competent home‑cook who loves grilling cedar‑plank salmon with quinoa and roasted beet salad, they experiment with homemade sourdough using wild‑yeast starters, and they savor
    spice‑laden ramen bowls after visiting the annual Colorado Food & Wine Festival.
  core: Jesse Champi is a curiosity‑driven engineer who juggles drones, soccer, and classic rock, they meticulously organize projects yet habitually procrastinate filing taxes until the last minute, and
    they never skip a chance to tinker with a new gadget.
background:
  cultural: Jesse was raised in the Piedmont region of North Carolina, part of a family with German and Irish ancestry that values hard work, community, and Southern hospitality. Growing up, he participated
    in local high school football games, church gatherings, and neighborhood barbecues, internalizing a blend of traditional Southern customs and a pragmatic outlook. His upbringing emphasized education
    and curiosity, encouraging him to pursue a STEM degree and stay engaged with community service. While he cherishes regional traditions such as Fourth of July fireworks and Thanksgiving feasts, he also
    embraces a modern, tech‑forward perspective that reflects his engineering career and global interests.
