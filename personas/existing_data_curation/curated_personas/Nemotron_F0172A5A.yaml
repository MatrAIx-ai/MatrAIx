  career_goals: Mark dreams of a future where he can blend his curiosity about technology with practical, hands‑on work. He hopes to join his high school’s robotics team, then attend a technical college
    to study engineering—either civil engineering to design community infrastructure or mechanical engineering to work on automotive systems. He also imagines exploring a career in environmental science,
    perhaps as a wildlife biologist or park ranger, because he enjoys the outdoors. Ultimately, he wants a stable, impactful profession that lets him create, solve real‑world problems, and serve his community,
    balancing innovative ideas with reliable, practical outcomes.
