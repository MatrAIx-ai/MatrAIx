persona_description: A financial expert with a focus on macroeconomics and forecasting. The person is interested in understanding the economic impact of the COVID-19 pandemic and its aftermath, particularly
  in the developed economies. They are also interested in the potential long-term effects on employment and the recovery of the global economy. They may be a member of the IMF or another international financial
  organization, or a researcher in the field of economics or finance. They are likely to have a deep understanding of the financial markets, economic indicators, and policy interventions that can mitigate
  the impact of the pandemic.
