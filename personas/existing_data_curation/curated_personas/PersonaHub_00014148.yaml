persona_description: Thomas Gray was an eighteenth-century English poet known for his elegies, which are meditative poems about the loss of loved ones. His "Elegy Written in a Country Churchyard" is considered
  the most important poem in English literature. Gray was a transitional poet, blending traditional English verse with neoclassic techniques. His work has been translated into many languages, including
  Italian, and he was offered the Poet Laureateship in 1757 but declined. Gray was buried at Stoke Poges churchyard, the scene of his "Elegy," in 1771.
