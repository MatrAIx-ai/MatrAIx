personas:
  professional: Yvette Smiley, a retired elementary educator with decades of classroom leadership, leverages her methodical planning, calm authority, and community‑centric teaching philosophy to launch
    a senior‑student mentorship program, mentor novice teachers, and champion equitable resources on the local school advisory board while drafting a memoir of Bronx school history.
  sports: Yvette Smiley, who strolls the Bronx River Park five mornings a week as part of her low‑impact fitness routine, roots for the New York Yankees and Knicks, joins a senior walking club that meets
    for weekend hikes in Pelham Bay, and occasionally participates in community table‑tennis tournaments at the local recreation center.
  arts: Yvette Smiley, a vibrant member of her church choir, often sings gospel classics by Mahalia Jackson and Aretha Franklin, stitches quilts inspired by patterns shown at the Bronx Museum of the Arts,
    and immerses herself in historical fiction by authors such as Isabel Wilkerson and Geraldine Brooks, letting those stories shape her community storytelling.
  travel: Yvette Smiley, who prefers meticulously planned day trips and occasional weekend getaways, spends her summers exploring historic sites in the Hudson Valley, enjoys the lively jazz festivals of
    New Orleans, and dreams of a leisurely cruise down the Mississippi River to soak in the music and cuisine of the South.
  culinary: Yvette Smiley, an adept home cook, delights in preparing soulful family meals such as spiced collard greens simmered with smoked turkey, honey‑glazed sweet potatoes, and buttery cornbread, while
    frequently sourcing fresh tomatoes, okra, and collard greens from her community garden to ensure the flavors stay true to her childhood kitchen.
  core: Yvette Smiley, a calm, organized retiree who blends seasoned teaching wisdom with a love for gospel choir, quilting, and community gardening, channels her curiosity into mentoring youths while never
    missing her Saturday bridge games, even though she habitually misplaces her reading glasses.
background:
  cultural: Yvette is an African‑American woman whose roots trace back to the Great Migration, with family origins in the Southern United States. Raised in the Bronx, she embodies the vibrant blend of Black
    urban culture, church life, and neighborhood solidarity that defines the borough. Her upbringing was steeped in the traditions of gospel music, soul cuisine, and storytelling, while also reflecting
    the multicultural influences of Caribbean and Latinx neighbors in her community. These cultural threads shape her values of resilience, communal support, and the celebration of heritage, which she infuses
    into both her professional and personal life.
