  hobbies: '[''Church choir and gospel singing'', ''Community gardening'', ''Quilting and crafting'', ''Reading historical fiction'', ''Cooking traditional soul food'', ''Walking in Bronx River Park'',
    ''Attending local cultural festivals'', ''Mentoring youth'', ''Playing bridge'', ''Volunteering at the senior center'']'
  career_goals: Even in retirement, Yvette aims to leave a lasting legacy by establishing an after‑school mentorship program that pairs senior volunteers with middle‑school students in the Bronx. She hopes
    to serve on the local school board’s advisory committee to advocate for equitable resources and culturally responsive teaching. Yvette also plans to write a memoir recounting her years in the classroom,
    preserving oral histories of the neighborhood, and to create a small scholarship fund for aspiring teachers from under‑represented backgrounds.
