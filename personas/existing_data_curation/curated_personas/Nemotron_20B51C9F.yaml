  career_goals: Tina aims to advance from her current supervisory role to store manager within the next two years, and eventually to a district‑manager position overseeing multiple locations on Florida's
    Space Coast. She plans to enroll in a community‑college business administration program to earn an associate degree, which will strengthen her strategic planning and financial‑management skills. Long‑term,
    she envisions opening a small boutique that blends her love of local Floridian products with her retail expertise, while also serving as a mentor for younger workers in her community.
