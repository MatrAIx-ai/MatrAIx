personas:
  professional: Tina Paredes, a 51‑year‑old seasoned retail first‑line supervisor on Florida’s Space Coast, they harness a practical, data‑driven mindset and flexible scheduling chops to keep a bustling
    store running smoothly while mentoring their team and eyeing the next step toward store manager and district‑manager roles.
  sports: Tina Paredes enjoys leisurely weekend walks along the Titusville shoreline and joins the local senior walking club that meets at the Space Coast YMCA, they also cheer on the Tampa Bay Buccaneers
    in the fall and the Orlando Magic during the NBA season, preferring low‑impact activity over organized team sports.
  arts: Tina Paredes immerses themselves in mystery novels by Agatha Christie and Gillian Flynn, they find inspiration in the vivid Florida landscapes painted by Karl Zerbe, and they channel their artistic
    side through quilting projects that echo folk‑art patterns, while occasionally attending performances at the Brevard Center for the Arts.
  travel: Tina Paredes plans their travels with a mix of spontaneity and modest budgeting, they favor short road trips to nearby gems like the historic St. Augustine district and the Everglades National
    Park, while dreaming of a future cruise to the Bahamas and a cultural excursion to Barcelona to explore its iconic architecture.
  culinary: Tina Paredes delights in cooking fresh seafood dishes such as grilled grouper with lemon‑garlic butter and stone crab claws served with Old Bay seasoning, they often experiment with local Florida
    ingredients like citrus, jalapeños, and fresh herbs, balancing their intermediate culinary skill with a love of sharing meals at family gatherings.
  core: Tina Paredes blends a structured retail mindset with a love for garden tranquility, they thrive on modest spontaneity, occasional quilting binges, and a pragmatic approach to life's inevitable curveballs.
background:
  cultural: Tina grew up in a middle‑class family in central Florida, with deep roots in the state dating back to the post‑World‑II migration wave. While her surname reflects a Hispanic ancestry, her upbringing
    was firmly within the broader Anglo‑American cultural milieu of the region. She celebrates traditional American holidays and often participates in community events that highlight Florida's coastal lifestyle,
    such as beach clean‑ups and space‑launch viewings. Her cultural identity blends a strong work ethic, a love for outdoor activities, and an appreciation for the diverse community she serves in Titusville.
