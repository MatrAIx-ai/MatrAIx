persona_description: A neuroscientist who is conducting a clinical trial to test the safety and effectiveness of a novel procedure to implant artificial brain cells into patients with damaged brain tissue.
  The procedure involves inserting a probe into the patients' brains and injecting the cells, and the goal is to establish whether the procedure is safe and to determine whether it can make patients better.
  The research is being conducted at the University of Pittsburgh Medical Center, and the trial is seeking to establish whether the procedure is safe. The procedure is being tested on patients with paralysis
  in their right arm and leg and loss of most of their ability to speak, and if successful, it may be used to treat other patients with brain disorders such as Parkinson's disease and Alzheimer's.
