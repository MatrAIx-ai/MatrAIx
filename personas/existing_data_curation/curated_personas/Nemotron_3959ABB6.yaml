personas:
  professional: Wesley Terwilliger is a community program director who blends data‑driven nonprofit management with art‑based therapeutic design, leveraging their meticulous grant‑writing, stakeholder engagement,
    and competitive drive to secure multi‑year funding while fostering innovative STEM‑arts workshops for underserved youth.
  sports: Wesley Terwilliger enjoys weekend hikes in the Santa Monica Mountains, participates in the Ventura County Runners club for 10K training, avidly follows the Los Angeles Lakers and Dodgers, and
    balances a modest home‑gym routine with yoga to counteract the physical strain of long photography outings.
  arts: Wesley Terwilliger regularly visits contemporary galleries at LACMA, draws inspiration from artists such as Olafur Eliasson and Rashid Johnson, attends AFI Fest for avant‑garde cinema, and relaxes
    at home playing acoustic renditions of Nick Drake and José González on their guitar.
  travel: Wesley Terwilliger prefers meticulously planned road trips, exemplified by a coastal drive to Big Sur and a solo trip to Berlin’s experimental film scene, balancing a love for adventure with budget‑conscious
    choices like Airbnb stays and off‑season travel to maximize cultural immersion.
  culinary: Wesley Terwilliger experiments with fusion dishes like miso‑glazed cod paired with roasted cauliflower and kimchi‑topped tacos, showcasing intermediate cooking skills while sourcing ingredients
    such as kombu, gochujang, and fresh herbs from local farmers’ markets for flavorful, unconventional meals.
  core: Wesley Terwilliger’s curious, art‑driven mind, competitive streak, and penchant for solitary photography craft a life where data meets creativity, though lingering anxiety and occasional gear splurges
    reveal a quirky balance between disciplined planning and spontaneous indulgence.
background:
  cultural: 'Wesley grew up in a middle‑class, predominantly white suburban environment in Southern California, where his family emphasized education, critical thinking, and civic responsibility. His heritage
    traces back to European roots—primarily Anglo‑American and Germanic—though he was immersed from an early age in the multicultural tapestry of the Los Angeles basin. This blend of a traditional Western
    American upbringing with the progressive, environmentally conscious culture of Ventura County shaped his values: a respect for individual autonomy, a strong work ethic, and a commitment to community
    service. The region’s outdoor lifestyle, proximity to both high‑tech industries and a vibrant arts scene, fostered his dual interest in STEM and creative expression. While not religiously affiliated,
    he aligns with a secular humanist worldview that prioritizes rational inquiry, empathy, and collective well‑being.'
attributes:
