  hobbies: '[''Photography'', ''Independent/avant‑garde film appreciation'', ''Art gallery and museum visits'', ''Hiking in the Santa Monica Mountains'', ''Acoustic guitar playing'', ''Reading nonfiction
    on social theory and technology'', ''Small book‑discussion circles'', ''Volunteering at community mural projects'', ''DIY electronics tinkering'', ''Experimental cooking'']'
  career_goals: Professionally, Wesley aims to advance to an executive leadership role within a regional nonprofit that fuses STEM education with arts‑driven community development. He plans to launch an
    innovative hub in Ventura County that offers after‑school workshops blending technology, creative expression, and social entrepreneurship for underserved youth. Securing multi‑year funding from state
    agencies and private foundations is a key priority, as is publishing research on the impact of art‑infused interventions. Over the next five years, he seeks to become a recognized thought leader in
    the field, speaking at national conferences and mentoring emerging community managers. Ultimately, he envisions expanding his model statewide, influencing policy to support integrated, data‑driven social
    programs.
