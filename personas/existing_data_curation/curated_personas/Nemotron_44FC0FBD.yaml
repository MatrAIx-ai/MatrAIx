  hobbies: '[''Cycling on local trails'', ''Hiking in nearby mountains'', ''Nature photography'', ''Cooking and experimenting with recipes'', ''Listening to business and leadership podcasts'', ''Reading
    business strategy books'', ''Attending craft-brewery social events'', ''Volunteering at a community food bank'']'
  career_goals: Jeffry aims to advance from first-line supervisor to store manager within the next 12-18 months, leveraging his associate’s degree and pursuing a bachelor’s in Business Administration. Over
    the next five years he envisions stepping into a district-manager role, overseeing multiple locations in the Bay Area and driving omnichannel initiatives that blend brick-and-mortar with e-commerce.
    He also hopes to earn a Certified Retail Store Manager credential and eventually launch his own boutique focused on sustainable, locally sourced products, applying the practical insights he has gained
    in corporate retail.
