persona_description: José Ramos-Horta is a highly respected and influential figure in the international community, known for his efforts to bring independence to East Timor and his leadership in the struggle
  for independence. He is a moderate in the emerging Timorese nationalist leadership and was appointed Foreign Minister in the "Democratic Republic of East Timor" government proclaimed by the pro-independence
  parties in November 1975. Ramos Horta is a former Nobel Peace Prize laureate who shared the prize with his fellow countryman, Bishop Carlos Felipe Ximenes Belo, in December 1996. He is also a trained
  lawyer and a human rights activist, having studied Public International Law and attended Post-Graduate courses in American Foreign Policy. Ramos Horta is known for his sustained efforts to hinder the
  oppression of a small people and hopes that this award will spur efforts to find a diplomatic solution to the conflict of East Timor based on the people's right to self-determination.
