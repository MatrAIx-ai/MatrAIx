personas:
  professional: Shakeel Butler, a 26‑year‑old architectural engineering manager, leverages meticulous CAD and BIM expertise to translate complex structural designs into lean, on‑schedule projects, and they
    consistently mentor multidisciplinary teams toward sustainable outcomes.
  sports: Shakeel Butler plays pickup basketball at Detroit’s Cass Technical courts, follows the Detroit Pistons and Lions avidly, and rides with the Motor City Cyclists club on weekends, balancing competition
    and camaraderie while they track personal mileage with Strava.
  arts: Shakeel Butler channels his love for design into intricate LEGO builds and model kits, while they unwind to the soulful sounds of Stevie Wonder, John Coltrane, and the Detroit Symphony Orchestra,
    which together shape his aesthetic sensibility.
  travel: Shakeel Butler favors meticulously planned weekend getaways, having explored Detroit’s historic Midtown, taken a road trip to Toronto’s waterfront, and dreaming of a sustainable‑architecture tour
    of Copenhagen and the green rooftops of Singapore, they schedule each trip with a spreadsheet to maximize both adventure and budget efficiency.
  culinary: Shakeel Butler spends evenings perfecting Southern‑style comfort dishes like smoked brisket, collard greens seasoned with smoked paprika, and sweet‑potato pie, often experimenting with heirloom
    hot sauces and mastering the balance of crisp crust and tender interior, and they consider each plate a test of precision and tradition.
  core: Shakeel Butler, a methodical engineer with a caffeine‑fuelled habit of drafting LEGO schematics at 2 a.m., balances disciplined budgeting with a love for spontaneous basketball games, embodying
    structured ambition tempered by creative spontaneity, and they never miss a chance to tinker with a new model kit after work.
background:
  cultural: Shakeel is an African‑American raised in Detroit’s vibrant west side, where he grew up surrounded by a strong sense of community and the legacy of the city’s automotive and musical heritage.
    His family placed a high value on education and civic involvement, encouraging him to participate in church activities and local youth programs. This upbringing instilled in him a deep appreciation
    for Detroit’s cultural renaissance, from Motown’s historic influence to the city's emerging arts scene. He draws on this heritage to stay connected to his roots while contributing to the city’s future
    through his professional work and community mentorship.
attributes:
  skills: '[''AutoCAD'', ''Revit'', ''Rhino'', ''Grasshopper'', ''Navisworks'', ''SAP2000'', ''ETABS'', ''STAAD.Pro'', ''Microsoft Project'', ''Primavera P6'', ''Bluebeam'', ''Procore'', ''Lean Construction'',
    ''Agile Project Management'', ''Risk Assessment'', ''Stakeholder Management'', ''LEED Accreditation'', ''Team Leadership'']'
  hobbies: '[''Basketball'', ''Urban Cycling'', ''Cooking Southern Cuisine'', ''LEGO Building'', ''Model Kit Construction'', ''STEM Mentorship'', ''Photography of Detroit Architecture'']'
  career_goals: Shakeel aims to become a licensed Professional Engineer (PE) and earn LEED AP credentials within the next three years, positioning himself as a leader in sustainable design. He plans to
    pursue a master's degree in engineering management to deepen his strategic and financial acumen. His long‑term ambition is to oversee large‑scale mixed‑use developments that revitalize Detroit neighborhoods,
    integrating green building practices and community input. Ultimately, he envisions founding his own consultancy that mentors emerging Black engineers and promotes equitable urban development.
