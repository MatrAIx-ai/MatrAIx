personas:
  professional: Jackie Ferguson, an 81‑year‑old retired research mathematician and former professor, blends rigorous statistical modeling with generative watercolor art, channeling a competitive drive into
    mentoring high‑school girls in STEM while meticulously planning each interdisciplinary essay for her upcoming memoir.
  sports: Jackie Ferguson walks the Cedar River Trail each morning for low‑impact cardio, participates in a senior badminton league at the Cedar Falls Community Center, follows the Iowa State Cyclones football
    and basketball teams, and is a longstanding member of the Cedar Rapids RoughRiders hockey fan club, all while maintaining a cautious approach to exercise that respects joint health.
  arts: Jackie Ferguson draws creative energy from abstract masters like Wassily Kandinsky and Mark Rothko, listens to the minimalism of Philip Glass while painting, admires the photographic landscapes
    of Ansel Adams, and regularly attends performances by the Iowa State University Symphony featuring violinist Hilary Hahn, integrating these influences into both her generative Python art and her watercolor
    series.
  travel: Jackie Ferguson prefers meticulously planned small‑group tours that balance cultural immersion with comfort, has visited historic Savannah, Georgia, explored the Badlands National Park, and taken
    a river cruise through the Rhine Valley, and she dreams of photographing the lavender fields of Provence and the ancient temples of Kyoto while remaining mindful of travel fatigue.
  culinary: Jackie Ferguson enjoys cooking prairie‑inspired dishes such as grilled trout with corn succotash, beet and goat‑cheese salad, and rosemary‑infused roasted sweet potatoes, employs a well‑worn
    cast‑iron skillet for most meals, favors ingredients like heirloom tomatoes, wild sorrel, and locally honeyed mustard, and occasionally treats herself to sushi from a trusted delivery service.
  core: Jackie Ferguson is an endlessly curious, methodical octogenarian who merges scientific rigor with abstract art, mentors young women in STEM, and approaches life with calm competitiveness and a flair
    for precise planning.
background:
  cultural: Jackie was raised on a family farm near Cedar Falls within a German‑Lutheran community characteristic of rural Iowa. The Midwestern values of self‑reliance, modesty, community service, and a
    deep respect for education shaped her worldview. She earned her STEM degree at the University of Iowa and later taught at Northern Iowa, remaining active in local church activities, senior groups, and
    county fairs. As a white woman who pursued a career in a historically male‑dominated field, she developed a competitive spirit and a healthy skepticism that inform her mentoring philosophy, while her
    calm resilience reflects the steady rhythm of Midwestern life.
attributes:
  skills: '[''Advanced mathematics'', ''Statistical analysis'', ''Computational modeling'', ''Experimental design'', ''Scientific research methodology'', ''Technical writing and peer review'', ''Grant writing
    and project management'', ''Digital illustration (Python/Processing)'', ''Abstract watercolor painting'', ''Photography composition'', ''Chess strategy'', ''Puzzle solving'']'
  hobbies: '[''Abstract watercolor painting'', ''Generative digital art coding'', ''Birdwatching'', ''Gardening (native Iowa plants)'', ''Reading philosophical and scientific literature'', ''Chess'', ''Puzzle
    solving (crosswords, sudoku)'', ''Knitting geometric scarves'', ''Photography of architecture and nature'', ''Volunteer mentorship for high‑school STEM clubs'']'
  career_goals: Even in retirement, Jackie is driven to create a lasting intellectual and artistic legacy. She aims to publish a memoir that weaves her scientific career with her artistic pursuits, and
    to compile a collection of interdisciplinary essays that explore the connections between abstract art and complex scientific concepts. She hopes to mentor young women entering STEM fields through small,
    focused workshops at the local university, and to curate a community exhibit of her generative digital art alongside her watercolor series. Additionally, she plans to ensure her personal archive of
    research notes, artworks, and photographs is digitized and made accessible to future scholars and family members.
