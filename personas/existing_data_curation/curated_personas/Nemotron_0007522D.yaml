  hobbies: '[''Gardening'', ''Fishing'', ''Volunteering at the local senior center'', ''Historical research on Brunswick County'', ''Reading historical fiction'', ''Cooking Southern cuisine'', ''Bird watching'',
    ''Beach walks'', ''Church attendance'', ''Woodworking'']'
  career_goals: Although officially retired, Justin aims to stay actively engaged by mentoring younger entrepreneurs in Brunswick County, offering pro-bono financial-literacy workshops, and assisting local
    non-profits with strategic planning. He also seeks to maintain his health through regular exercise and stress-reduction routines, hoping to achieve a balanced lifestyle that supports his family, particularly
    his wife and adult children. Long-term, he hopes to author a memoir reflecting on his business experiences and the evolving community of the North Carolina coast.
