persona_description: An Italian philosopher and intellectual who is known for his contributions to the revival of Italian thought and the philosophy of history. He was born in Percasseroli, the son of a
  rich landowner, and lost his parents in an earthquake in 1883. Educated at the University of Rome, he spent the rest of his life, mainly in Naples, working as an independent scholar. He published about
  seventy books and in a review, Critica, which he founded and edited for forty years, he attempted to revitalize Italian thought and to restore it to the mainstream of European philosophy. He was also
  active politically, serving as minister of education (1920–21) and senator in the Italian government. Initially he was sympathetic to Mussolini but after 1925, with the collapse of parliamentary rule
  in Italy, Croce withdrew his support and began to organize the intellectual opposition against him.
