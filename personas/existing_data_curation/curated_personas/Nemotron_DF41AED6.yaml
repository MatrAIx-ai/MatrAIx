  career_goals: Michael dreams of becoming a marine biologist to study the sea creatures he finds on the nearby beaches, and he also imagines designing inventions as an engineer because he loves building
    things. He is fascinated by teachers who explain new ideas, so he often says he might grow up to be a teacher who helps other kids learn, combining his love of knowledge with his sociable nature.
