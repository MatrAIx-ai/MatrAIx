personas:
  professional: Michael Mccarthy, a budding marine explorer, channels their methodical curiosity and talkative flair into cataloguing shells, sea glass, and tiny crabs with the precision of a junior scientist,
    planning each mini-exhibit like a LEGO city blueprint.
  sports: Michael Mccarthy, an energetic member of the Bluffton Youth Soccer League who organizes kickoff drills and leads mini-matches, idolizes the Charleston Battery and cheers for the South Carolina
    Gamecocks during football season, and balances daily playground soccer with weekend trips to the local pool for swim lessons.
  arts: Michael Mccarthy, a lively participant in their kindergarten choir who belts out songs by The Wiggles and Disney classics, loves staging school plays as the charismatic lead, and spends afternoons
    sketching vivid Lowcountry landscapes inspired by the colorful illustrations of Dr. Seuss and the animated adventures of Moana.
  travel: Michael Mccarthy, an adventurous day-trip enthusiast, loves exploring the historic streets of Charleston and the sandy dunes of Hilton Head with their family, and dreams of a future vacation to
    the Georgia Aquarium in Atlanta and a beach escapade to the Caribbean islands where they can hunt for seashells on new shores.
  culinary: Michael Mccarthy, a budding chef who proudly assembles their own peanut-butter-banana sandwiches and savors grilled cheese with extra cheddar, delights in tasting shrimp-and-grits at family
    gatherings, and eagerly awaits the sweet crunch of fresh strawberries and the salty tang of crab cakes at local seafood festivals.
  core: Michael Mccarthy blends a talkative, stage-loving spirit with meticulous shell-collecting habits, turning every beach stroll into a scientific showcase while never missing a chance to lead a game
    or sing a song.
background:
  cultural: Michael was raised in Bluffton, South Carolina, a historic Lowcountry community known for its coastal lifestyle and Southern hospitality. His family celebrates local traditions such as shrimp
    boils, Fourth of July fireworks over the Intracoastal Waterway, and community picnics at the nearby parks. They attend a Methodist Sunday school, where he learns values of kindness and service. Growing
    up near the ocean, Michael has a strong connection to marine environments, and the close‑knit neighborhood encourages his outgoing, talkative personality while grounding him in the practical, community‑oriented
    customs of the region.
