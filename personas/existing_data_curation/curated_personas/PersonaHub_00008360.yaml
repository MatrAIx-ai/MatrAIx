persona_description: A political science teacher who is interested in the impact of formal education on the development of citizens' civic knowledge, attitudes, and behaviors. This person is well-versed
  in the field of political socialization and has conducted research on how political learning occurs, particularly in the context of formal education. They are interested in exploring variations in the
  educational experience and unpacking the multiple kinds of "education" in civic education, focusing on student's basic factual knowledge and deeper conceptual understanding of American government based
  upon the method with which the course was taught.
