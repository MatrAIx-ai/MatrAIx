  hobbies: '["hiking and nature photography", "playing acoustic guitar", "cooking Tex‑Mex cuisine", "reading medical journals and non‑fiction books", "volunteering at community health fairs", "strategy
    board games", "gardening (herbs and vegetables)", "attending local open‑mic nights"]'
  career_goals: Cameron plans to complete his GED and associate‑degree nursing credentials, then enroll in a BSN program within the next two years. His long‑term ambition is to become a clinical nurse specialist
    in wound care or advance to a nurse manager role that oversees unit operations and staff development. He is also eager to design and lead a community health outreach program in Waco focused on preventive
    education for underserved populations. Leveraging his calm resilience, he aims to foster a supportive, collaborative work environment and contribute to patient‑safety initiatives at a system level.
