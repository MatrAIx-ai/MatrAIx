personas:
  professional: Cameron Non, a 34‑year‑old acute‑care registered nurse in Waco, blends a meticulous attention to patient assessments and evidence‑based wound‑care practice with a calm, resilient demeanor
    that steadies high‑stress emergencies while they mentor new staff and champion quality‑improvement projects.
  sports: Cameron Non hits the Lake Waco trails for sunrise hikes, belongs to the Central Texas Hiking Club, catches Baylor Bears football on Saturdays, supports the Waco Roughnecks indoor football team,
    and they keep a modest weekly routine of weekend jogs with the local running group.
  arts: Cameron Non plays acoustic guitar at the Waco Open‑Mic nights, improvising folk tunes reminiscent of Bob Dylan and Gillian Welch, curates sunrise landscape photographs for local café displays, and
    they find inspiration in the storytelling of contemporary novelist Isabel Allende.
  travel: Cameron Non prefers weekend road trips that blend nature and culture, having recently explored the Texas Hill Country vineyards, hiked the Santa Fe Trail, and planned a future visit to New Mexico’s
    White‑Sands National Park, always balancing detailed itineraries with spontaneous detours to local eateries, and they favor driving routes that allow for photography stops.
  culinary: Cameron Non’s kitchen experiments revolve around Tex‑Mex staples like carne asada tacos, chipotle‑marinated chicken, homemade salsa verde, and fresh cilantro sourced from their herb garden,
    showcasing a moderate cooking skill that impresses friends during potluck gatherings, and they enjoy sharing the story behind each dish.
  core: Cameron Non merges a calm, methodical nursing practice with a love for sunrise hikes, folk guitar, and precise budgeting, while they occasionally battle a stubborn back ache and a secret habit of
    hoarding antique camera lenses.
background:
  cultural: Cameron grew up in a middle‑class family in the Waco‑McLennan County area, where Texan values of self‑reliance, community service, and modest hospitality shaped his worldview. Although ethnically
    white, his upbringing in a culturally diverse region exposed him to Hispanic and African‑American traditions, fostering an appreciation for multicultural perspectives. He was raised with a blend of
    Southern Protestant work ethic and a pragmatic approach to life, emphasizing hard work, continuous education (including returning to school for his GED and nursing training), and caring for neighbors.
    The presence of large healthcare institutions and a strong university atmosphere in Waco reinforced his commitment to professional growth and community health.
attributes:
  skills: '["comprehensive patient assessment", "IV insertion and therapy", "wound‑care management", "medication administration", "electronic health record documentation", "patient education and counseling",
