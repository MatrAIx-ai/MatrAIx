personas:
  professional: Jasmine Jackson, a seasoned hair stylist and salon owner, blends three decades of precision cutting, color formulation, and braid artistry with a storytelling approach that honors community
    traditions, while they apply methodical planning and assertive leadership to transform their downtown studio into a boutique flagship and mentor emerging stylists.
  sports: Jasmine Jackson enjoys walking with a local seniors' fitness group, plays league tennis at the Riverside Club, cheers for the Jacksonville Jaguars, and occasionally joins a community ballroom‑dance
    fitness class that blends their love of movement with social interaction.
  arts: Jasmine Jackson immerses themselves in the works of Maya Angelou and James Baldwin, collects vintage vinyl from Miles Davis, Aretha Franklin, and Stevie Wonder, frequents live jazz nights at the
    historic Riverfront venue, and draws inspiration from spoken‑word poet Imari‑Samu for their salon’s creative presentations.
  travel: Jasmine Jackson favors well‑planned trips that blend business and leisure, such as attending the national beauty expo in Chicago, exploring the historic streets of Savannah for its garden tours,
    dreaming of a fashion‑focused pilgrimage to Paris, and regularly taking weekend getaways to the nearby St. Augustine shoreline for relaxation and inspiration.
  culinary: Jasmine Jackson delights in cooking garden‑fresh dishes like heirloom tomato bruschetta with basil, herb‑infused collard greens, and slow‑cooked gumbo seasoned with thyme and okra, while they
    skillfully blend Southern flavors with sustainable practices, and they often unwind with a cup of chamomile tea after a long salon day.
  core: Jasmine Jackson is a charismatic, methodical salon veteran who merges community storytelling with sustainable beauty, balancing meticulous planning with a love for vintage vinyl, garden serenity,
    and lively social gatherings.
background:
  cultural: Jasmine grew up in Jacksonville’s historically Black Eastside neighborhoods, where church gatherings, family reunions, and the local barbershop scene emphasized hair as a form of identity and
    community expression. This Southern African‑American upbringing instilled a strong sense of hospitality, storytelling, and resilience. Her styling philosophy honors natural textures and cultural heritage
    while celebrating individual creativity. She remains actively involved with local cultural institutions, mentors young Black entrepreneurs, and participates in events that celebrate Black history, art,
    and contemporary aesthetics.
attributes:
  skills: '[''Hair cutting'', ''Hair coloring'', ''Braiding and extensions'', ''Scalp health consultation'', ''Custom client styling'', ''Salon operations management'', ''Retail product expertise'', ''Community
