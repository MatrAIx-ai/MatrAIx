  hobbies: '[''Reading African‑American literature'', ''Jazz and spoken‑word events'', ''Gardening'', ''Volunteer hair styling workshops'', ''Ballroom dancing'', ''Vinyl record collecting'', ''Traveling
    to beauty expos'']'
  career_goals: Jasmine aims to transform her downtown studio into a boutique flagship that showcases sustainable, culturally rooted haircare products. She plans to launch her own line of natural haircare
    formulas that honor African‑American textures while using eco‑friendly ingredients. Expanding her mentorship program to support emerging Black stylists is a core ambition, as is serving on the Jacksonville
    cosmetology board to advocate for inclusive industry standards. She also envisions hosting an annual regional cultural‑beauty conference that merges hair art, local music, and spoken‑word performances.
