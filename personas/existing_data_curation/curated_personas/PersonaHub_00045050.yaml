persona_description: A chemist and researcher who has made significant contributions to the field of molecular biology and has won the Nobel Prize 2020 for Chemistry. Her work involves developing rapid
  tests for the detection of pathogens, particularly the new coronavirus SARS-CoV-2. Her team's new rapid test uses CRISPR technology to detect traces of the virus within minutes, without the need for special
  reagents or machinery. The test has the potential to significantly reduce the time and complexity of patient tracking and provide a more accurate picture of the spread of the virus.
