personas:
  professional: Nancy Hinson is a curious yet laid-back art student at Ohio University who blends her skill in acrylic painting, graphic design, and event planning to curate modest campus exhibitions while
    volunteering at the community arts center, often juggling disorganized schedules with a passion for making art accessible as a therapeutic outlet.
  sports: Nancy Hinson is an avid hiker who spends weekends trekking the nearby Appalachian trails with the Athens Trails Club, balances yoga sessions at the local YMCA for stress relief, and cheerfully
    roots for the Ohio University Bobcats during football season and the Cleveland Guardians in the summer, while occasionally joining pick-up volleyball games in college.
  arts: Nancy Hinson channels her love for acrylics, poetry, and indie folk by painting vivid landscapes inspired by Appalachian heritage, quoting Ocean Vuong at open-mic nights, curating playlists featuring
    Sufjan Stevens and the Avett Brothers, and frequenting local venues like The Starlight Café where she studies the brushwork of Georgia O'Keeffe and the storytelling of contemporary playwright Sarah
    Ruhl.
  travel: Nancy Hinson prefers low-cost, road-trip style travel, often escaping to Hocking Hills State Park or venturing to Asheville, North Carolina for its River Arts District, while budgeting for cheap
    hostels and hoping to someday trek the Blue Ridge Parkway and visit Santa Fe’s art scene with a modest savings fund.
  culinary: Nancy Hinson, a modest home-cook, loves whipping up farm-fresh dishes like roasted beet salad with goat cheese, butter-basted corn on the cob, and apple crisp glazed with local honey, while
    experimenting with vegan acai bowls topped with chia seeds and fresh mint, though she often over-salts her pasta after late-night study sessions.
  core: Nancy Hinson is a 19-year-old art-obsessed wanderer whose restless curiosity fuels a vibrant creative life, yet her habit of procrastinating finances and occasional anxiety-driven overthinking keep
    her perpetually balancing on the edge of inspiration and disarray.
background:
  cultural: Nancy grew up in a small town in Athens County, Ohio, within a white Midwestern family whose roots are tied to the region's agricultural and Appalachian heritage. The close‑knit community emphasized
    self‑reliance, modesty, and local traditions such as folk music and craft fairs. Moving to the college town of Athens for some college introduced her to a more progressive, arts‑focused environment
    centered around Ohio University. This blend of traditional Midwestern values and exposure to a vibrant, eclectic arts scene shapes her appreciation for both community and unconventional creative expression.
attributes:
  skills: '[''Creative Writing'', ''Digital Photography'', ''Graphic Design (Adobe Photoshop/Illustrator)'', ''Social Media Content Creation'', ''Student Event Planning'', ''Public Speaking'', ''Collaborative
    Project Management'', ''Academic Research and Writing'', ''Empathy and Conflict Mediation'', ''Basic HTML/CSS'']'
  hobbies: '[''Acrylic Painting'', ''Sketch Journaling'', ''Reading Experimental Fiction and Poetry'', ''Writing Poetry'', ''Attending Indie Music Shows'', ''Hiking Appalachian Trails'', ''Yoga and Meditation'',
    ''Volunteering at Community Arts Center'', ''Organizing Open‑Mic Nights'']'
  career_goals: Nancy aims to complete a Bachelor of Fine Arts or Art History degree while deepening her portfolio of visual work. She hopes to secure an internship at a regional museum or contemporary
    gallery to learn curatorial practices, and eventually work as a freelance illustrator and art content creator who can also organize community art workshops. Balancing creative freedom with financial
    stability, she envisions a career that lets her blend artistic expression with outreach that supports mental well‑being, using her own experiences with stress to help others find therapeutic value in
    art.
