personas:
  professional: Debra Crawford, a budding junior architect and story‑builder, harnesses a vivid imagination to design elaborate LEGO spacecraft while they apply an organized, detail‑oriented process that
    satisfies a competitive drive to out‑do their previous creations.
  sports: Debra Crawford, a spirited member of the local 'Rainbow Rovers' youth soccer club, kicks the ball with a competitive fire while they cheer for the Los Angeles Dodgers and the Golden State Warriors,
    and spends weekends mastering backyard obstacle courses that blend agility with creative play.
  arts: Debra Crawford, an imaginative young illustrator, fills sketchbooks with fantastical dragons and nebulae inspired by Studio Ghibli’s Hayao Miyazaki and the vibrant colors of Disney’s ‘Frozen,’ while
    they practice simple melodies on a tiny keyboard echoing the catchy tunes of ‘Baby Shark’ and ‘Moana.’
  travel: Debra Crawford, an adventurous six‑year‑old, loves weekend trips to the local zoo and the Smithsonian National Air and Space Museum, and they dream of a family vacation to the Kennedy Space Center,
    preferring meticulously drawn map itineraries created with crayons and a mix of excitement for discovery and the comfort of familiar routines.
  culinary: Debra Crawford, a picky yet curious eater, devours cheesy pepperoni pizza and homemade macaroni‑and‑cheese, helps stir blueberry pancake batter with a tiny wooden spoon, and they sneak bites
    of carrot sticks when no one is looking, showing a playful resistance to vegetables while enjoying sweet strawberry smoothies.
  core: Debra Crawford is a fiercely imaginative six‑year‑old who builds interstellar LEGO worlds, they save allowance for the next big set, battle mild allergies with a toothbrush chart, and blend a competitive
    spirit with a love for crayons, cartoons, and occasional snack‑time rebellion.
background:
  cultural: Debra lives in New Haven, Indiana, a small Midwestern town. Her family is of primarily German and Irish ancestry, typical of the region, and they value community, church gatherings, and seasonal
    celebrations like Fourth of July parades and Thanksgiving dinner. The local culture emphasizes modesty, outdoor play, and a close-knit school environment, which fosters her balance of social interaction
    and solitary imagination.
