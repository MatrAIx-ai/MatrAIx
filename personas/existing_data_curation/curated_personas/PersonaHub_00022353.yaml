persona_description: A scientist who specializes in the study of insect repellents, particularly those derived from catnip. He has conducted research on the effectiveness of catnip in repelling mosquitoes
  and has published several studies on the topic. He is hopeful that nepetalactone, a compound derived from catnip, will be safe for human use as an insect repellent. He has filed a patent application for
  the use of catnip compounds as insect repellents and has been working with the U.S. Department of Agriculture Forest Service, Wood Products Insect Research Service, in Starkville, Miss.
