    studies and scenario planning'', ''Facilitation and conflict mediation'']'
  hobbies: '[''Watercolor painting'', ''Generative art coding'', ''Speculative fiction reading'', ''Philosophy study'', ''Ambient music listening'', ''Meditation'', ''Museum and gallery visits'', ''Calligraphy'',
    ''Vietnamese cooking'', ''Hiking in nature'', ''Journaling'', ''Astrophysics exploration'']'
  career_goals: Thien aims to become a leading interdisciplinary researcher who influences technology policy at a national think tank or a university research center. He aspires to secure a tenure‑track
    position in a program that merges STEM and social science, obtain major research grants to study the societal impacts of AI and urban tech, and eventually launch a community‑driven data‑science nonprofit
    that empowers underrepresented neighborhoods in Chicago. Publishing a seminal book that fuses art, speculative theory, and social analysis is also a long‑term ambition.
