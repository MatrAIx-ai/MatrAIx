personas:
  professional: Thien Nguyen is an interdisciplinary social-science researcher who blends statistical analysis, GIS mapping, and generative coding with narrative storytelling to shape technology policy,
    balancing meticulous grant writing with solitary creative work and a collaborative spirit.
  sports: Thien Nguyen enjoys hiking the dunes of Indiana, joining a low-key weekend running club that meets at Grant Park, cheering the Chicago White Sox from the comfort of a quiet bar, and practices
    gentle yoga at home to counterbalance long hours at the desk.
  arts: Thien Nguyen is an avid watercolorist and generative artist who draws inspiration from ambient composers like Brian Eno and Max Richter, reads speculative fiction by Ted Chiang and N.K. Jemisin,
    and frequents Chicago's Museum of Contemporary Art and the quiet galleries of the West Loop to fuel their creative imagination.
  travel: Thien Nguyen favors thoughtful, low-key travel, often weekending at the Great Lakes shoreline, planning a future trip to Iceland to witness the northern lights, and dreaming of a scholarly art
    retreat in Japan’s rural temples, always mapping itineraries with detailed research and a preference for quiet accommodations.
  culinary: Thien Nguyen enjoys cooking traditional family dishes such as fragrant broth-based noodle soup, crisp spring rolls, and herb-laden rice bowls, experimenting with star anise, lemongrass, and
    fish sauce while honing a modest but confident home-cooking skill set that balances precise measurements with improvisational flair.
  core: Thien Nguyen is a solitary, imagination-driven researcher who melds data science with watercolor and philosophy, meticulously plans finances yet occasionally indulges in art-related splurges, and
    balances quiet creativity with a quiet drive to shape tech policy.
background:
  cultural: Thien is a second‑generation Vietnamese‑American raised in Chicago's West Ridge area. His parents immigrated from Ho Chi Minh City, and he grew up bilingual, celebrating Vietnamese traditions
    such as Tet and participating in community festivals. While embracing collectivist family values, he also navigates the multicultural landscape of Chicago, drawing inspiration from both his Southeast
    Asian heritage and the city's diverse artistic and academic scenes.
attributes:
  skills: '[''Statistical analysis (Python, R, SPSS, STATA)'', ''Mixed‑methods research design'', ''Qualitative interviewing'', ''Survey design and implementation'', ''GIS mapping and spatial analysis'',
