    at animal shelter'']'
  career_goals: Elsie dreams of a career that merges her curiosity about the natural world with practical problem‑solving. She is leaning toward becoming a veterinarian or a wildlife conservationist, inspired
    by her love for animals and local nature trails. She also entertains the idea of studying engineering—particularly robotics—because she enjoys building things and sees technology as a way to address
    real‑world challenges. In the near term, she aims to earn science fair awards, secure a mentorship with a local veterinarian, and build a portfolio of coding projects that could help her win scholarships
    for college.
