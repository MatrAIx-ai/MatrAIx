personas:
  professional: Elsie Richardson, a 13‑year‑old budding programmer and violinist, merges curiosity with practicality by designing Scratch games for school clubs while rehearsing music, channeling their
    competitive streak into leading coding contests and community performances.
  sports: Elsie Richardson, a 13‑year‑old who enjoys running track and playing soccer, trains with the Smyrna Youth Soccer Club in the fall, roots for the Nashville Predators and Tennessee Titans, and approaches
    fitness with a blend of competitive spirit and community‑oriented stretching sessions after school.
  arts: Elsie Richardson, a 13‑year‑old violinist and sketch artist, draws inspiration from Dolly Parton’s storytelling, Lindsey Stirling’s electrifying violin performances, and the mystery of Nancy Drew
    novels, often crafting short melodies after sketching creek scenes and attending local community theater productions featuring performances of “The Music Man.”
  travel: Elsie Richardson, a 13‑year‑old explorer, prefers family road trips that balance adventure and budget, having hiked the trails of Great Smoky Mountains National Park and visited Washington, D.C.’s
    museums, while dreaming of a summer vacation in New York City’s Central Park and a future cultural exchange in Edinburgh, Scotland.
  culinary: Elsie Richardson, a 13‑year‑old home‑cook, enjoys preparing Southern staples like fried chicken, buttery biscuits, and apple pie with extra cinnamon, experiments with making simple birdseed
    mixes for her handcrafted birdhouses, and often burns toast when multitasking between violin practice and Minecraft, revealing a habit of occasional kitchen clumsiness.
  core: Elsie Richardson, a 13‑year‑old with a blend of curiosity, competitive drive, and community spirit, channels their love for violin, coding, and animal rescue into creative pursuits, yet sometimes
    lets procrastination and a penchant for Minecraft skins hijack their after‑school routine.
background:
  cultural: Elsie grew up in a middle‑class, primarily white family in Smyrna, Tennessee, a suburb of Nashville. Her family’s roots trace back to the Appalachian region, and they maintain Southern traditions
    such as church attendance, community picnics, and celebrating holidays with homemade dishes like fried chicken, biscuits, and apple pie. The local culture emphasizes self‑reliance, modest competition,
    and community service, values that align with Elsie's competitive yet cooperative nature. She participates in school events that reflect the area’s emphasis on music, sports, and local history, and
    she enjoys the blend of rural outdoorsmanship and suburban convenience that defines her hometown.
