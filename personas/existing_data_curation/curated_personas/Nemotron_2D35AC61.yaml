personas:
  professional: Andrea Epps, a veteran retail leader with three decades of front-line supervision, blends methodical organization and compassionate coaching to streamline store operations and now mentors
    emerging managers through a part-time consulting program.
  sports: Andrea Epps enjoys gentle cardio through weekend hikes on local nature trails, participates in a walking club that cheers for the Durham Bulls minor league baseball team and the North Carolina
    Tar Heels basketball program, and balances these activities with weekly low-impact yoga sessions.
  arts: Andrea Epps regularly visits the Mint Museum to view works by Henri Matisse and Georgia O'Keeffe, takes part in community workshops recreating Claude Monet's water lilies, and relaxes to Yo-Yo Ma's
    cello recordings and the stage performances of Lin-Manuel Miranda's musical Hamilton.
  travel: Andrea Epps delights in curated cultural trips, having explored the art districts of Santa Fe and Charleston, taken a Danube river cruise, and now dreams of strolling through Kyoto's gardens and
    Tuscany's vineyards, preferring to plan trips months ahead to balance budget and a comfortable pace.
  culinary: Andrea Epps, an enthusiastic home cook, whips up coq au vin and ratatouille inspired by French journeys, experiments with heirloom tomatoes, fresh basil, smoked paprika from their garden, yet
    sometimes forgets to label leftovers, leading to occasional food waste.
  core: Andrea Epps, a meticulous mentor-retiree with a green thumb, balances disciplined budgeting, gentle hiking, and regular museum visits while occasionally misplacing garden tools.
background:
  cultural: Andrea grew up in a middle‑class, white family in the Charlotte‑Metropolitan area of North Carolina, steeped in Southern hospitality and community values. Her upbringing combined traditional
    Appalachian folk traditions—such as quilting and country music—with a strong emphasis on education and civic involvement. She maintains an active connection to her local Methodist church, where service
    and harmony are central. The cultural milieu of the Piedmont region, with its historic emphasis on small‑town commerce and a growing appreciation for the arts, has shaped her worldview, fostering an
    appreciation for both heritage and contemporary ideas.
attributes:
  skills: '[''Retail management'', ''Staff training'', ''Inventory control'', ''Customer service excellence'', ''Sales data analysis'', ''Visual merchandising'', ''Conflict resolution'', ''Team leadership'',
