  career_goals: David dreams of a future where he can combine his love for the environment with his tech skills. He hopes to graduate high school and study environmental science or wildlife biology, eventually
    working for his tribe's natural resources department to help protect the prairie lands and waterways that are important to his heritage. At the same time, he is intrigued by the idea of creating software
    tools—like simple GIS maps or data‑tracking apps—that can aid community members in managing land and cultural resources. He values flexibility and independence in his work, wants a career that allows
    quiet focus when needed, and hopes his contributions will make a tangible difference for his people and the natural world.
