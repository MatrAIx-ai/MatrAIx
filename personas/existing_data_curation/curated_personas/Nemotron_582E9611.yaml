personas:
  professional: David Mclaren, a budding junior robotics enthusiast, blends their love of speculative fiction with hands‑on problem solving, programs basic Minecraft mods, sketches mechanical concepts on
    a tablet, and leads their school’s robotics club projects with a relaxed, sometimes disorganized schedule, channeling curiosity and practicality into functional designs.
  sports: David Mclaren, a member of the Tulsa Youth Soccer club and the middle school cross‑country team, follows the Tulsa Roughnecks and the Oklahoma City Thunder on television, routinely hikes the Osage
    Hills State Park for cardio and birdwatching, and prefers low‑impact activities that fit their flexible schedule, often forgetting to stretch after runs.
  arts: David Mclaren, an avid sketch artist who draws speculative‑fiction scenes on a tablet, crafts beaded bracelets taught by their grandmother, and listens to tribal drumming alongside the soundtracks
    of Jeremy Soule, draws creative inspiration from authors Neil Gaiman, Octavia Butler, and comic creator Stan Lee, channeling both tradition and imagination into their art.
  travel: David Mclaren, who favors nature‑centric trips, has camped at Arkansas’s Hot Springs National Park and visited the Grand Canyon, dreams of exploring Iceland’s waterfalls and Japan’s bamboo forests,
    plans low‑budget backpacker‑style journeys with flexible itineraries, and uses family road trips to practice birdwatching and sketching.
  culinary: David Mclaren, a budding home cook who enjoys preparing quick trail‑ready meals such as peanut‑butter‑banana sandwiches, homemade granola bars with oats, honey, and dried cranberries, and occasional
    spaghetti carbonara for family dinners, shows a modest skill level focused on nutritious dishes that fuel their hikes and gaming sessions.
  core: David Mclaren, a curious yet often anxious 13‑year‑old, balances a love of speculative fiction, robotics, and nature with a laid‑back approach to school, occasional impulse buys, and a habit of
    sketching and bead‑making during quiet moments.
background:
  cultural: David’s family is rooted in the Cherokee Nation, though his paternal lineage includes Scottish ancestry, reflected in his last name, McLaren. Growing up in Tulsa, Oklahoma, he is part of a vibrant
    Native American community that celebrates both traditional and contemporary cultures. He regularly attends local powwows and cultural workshops, where he learns basic Cherokee language phrases and participates
    in storytelling circles. His grandmother, a respected elder, shares family histories and teaches him traditional crafts such as beadwork. These experiences have instilled in David a deep respect for
    the land, an appreciation for the tribe’s emphasis on stewardship, and a sense of responsibility to preserve his cultural heritage while navigating modern life.
