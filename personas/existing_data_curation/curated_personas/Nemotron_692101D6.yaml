  hobbies: '[''Soccer (local league)'', ''Hiking (state parks)'', ''Korean Cooking'', ''Model Building (trains)'', ''K-Pop Listening'', ''Meditation (mindfulness)'', ''Volunteer STEM Tutoring'', ''Fishing'',
    ''Traveling (culinary exploration)'', ''Board Games'']'
  career_goals: Yoo aims to transition from a frontline driver‑sales role to a regional logistics manager within the next five years. He plans to earn Lean Six Sigma Green Belt certification and pursue
    an advanced certificate in supply chain management to deepen his analytical capabilities. Ultimately, he hopes to lead a fleet that integrates sustainable technologies such as electric trucks and advanced
    telematics, and he harbors a long‑term ambition to launch his own trucking company focused on reliable, environmentally responsible freight services. Alongside his professional growth, he seeks to mentor
    younger drivers and contribute to community safety initiatives.
