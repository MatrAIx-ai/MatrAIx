  career_goals: Joshua aims to transition into a senior analytics leadership role where he can shape strategic initiatives across the enterprise. Over the next five years he plans to earn a master’s degree
    in data science or an MBA to broaden his managerial skill set, lead a cross‑functional operations research team, and develop proprietary optimization solutions for the logistics sector in Texas. He
    also aspires to publish case studies in industry journals, present at OR conferences, and eventually advise regional businesses as a consultant, leveraging his competitive drive and practical mindset.
