personas:
  professional: Fatiha Brazil is a 27‑year‑old mechanical assembler whose knack for interpreting schematics and hands‑on metal fabrication is amplified by a curiosity for art, leading them to propose ergonomic
    design tweaks on the shop floor while championing a collaborative, inclusive work environment.
  sports: Fatiha Brazil enjoys weekend hikes on the Arbor Hills Nature Preserve, plays in a co‑ed recreational basketball league, and passionately follows the Dallas Mavericks and FC Dallas, using these
    activities to balance the physical demands of their metal‑shop job.
  arts: Fatiha Brazil spends evenings sketching street scenes in Plano, curating a personal collection of watercolor works inspired by Frida Kahlo and local Texan muralists, and documents vibrant neighborhood
    life through street photography, often sharing their images on Instagram under the handle @FatihaCreates.
  travel: Fatiha Brazil prefers short, affordable getaways that blend culture and nature, having explored Austin’s music scene, the historic adobe towns of New Mexico, and dreaming of a culinary pilgrimage
    to Oaxaca, while planning trips with a mix of Airbnb stays and camping to keep costs low.
  culinary: Fatiha Brazil relishes cooking Tex‑Mex dishes like carne asada tacos, smoky chipotle enchiladas, and homemade guacamole, skillfully balancing fresh tomatillos, cotija cheese, and roasted poblano
    peppers, while still working to perfect their salsa timing and avoid over‑salting.
  core: Fatiha Brazil is a mechanically savvy, art‑infused problem‑solver who balances disciplined budgeting with spontaneous creative splurges, treats yoga and hiking as antidotes to workshop strain, and
    dreams of turning metal and wood into functional art while mentoring others.
background:
  cultural: Fatiha is a white American who grew up in suburban Texas, shaped by the region's blend of Southern hospitality and the diverse, fast‑growing Dallas‑Fort Worth metroplex. Her upbringing includes
    participation in community festivals, local barbecues, and neighborhood gatherings typical of Plano, while also exposing her to a wide array of cultural events and artistic influences reflecting the
    city's multicultural environment. This background fosters a strong appreciation for both traditional Texan customs and broader artistic and educational values.
attributes:
  skills: '[''mechanical assembly'', ''metal fabrication'', ''technical blueprint reading'', ''hand tool operation'', ''power tool operation'', ''quality inspection'', ''basic electrical wiring'', ''troubleshooting'',
