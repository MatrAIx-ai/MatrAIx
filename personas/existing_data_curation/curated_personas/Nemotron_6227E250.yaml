  hobbies: '[''visiting art galleries'', ''watercolor painting'', ''sketching'', ''photography'', ''DIY woodworking'', ''metal art projects'', ''reading design magazines'', ''hiking'', ''yoga'', ''volunteering
    at food banks'', ''cooking Tex-Mex cuisine'']'
  career_goals: Fatiha aims to advance to a lead assembler or production supervisor role, obtaining certifications such as Certified Production Technician and CNC programming to deepen her technical expertise.
    She is interested in moving toward prototype development where she can blend her technical skills with her artistic sensibility, eventually creating custom functional art pieces. In the longer term
    she envisions opening a small workshop that offers bespoke metal and wood designs while mentoring new employees and promoting a collaborative, inclusive workplace culture.
