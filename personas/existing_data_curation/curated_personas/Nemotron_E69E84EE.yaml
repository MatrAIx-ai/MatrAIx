  hobbies: '[''Gardening'', ''Woodworking'', ''Reading Historical Nonfiction'', ''Birdwatching'', ''Playing Bridge'', ''Cooking Traditional Italian-American Recipes'', ''Volunteer Work at Local Food Bank'',
