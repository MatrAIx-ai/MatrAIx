personas:
  professional: Jennifer Qualman leverages their decades of scientific research experience, adeptness in experimental design, R and Python data analysis, and technical writing to mentor emerging women in
    STEM through informal workshops, while their relaxed, flexible approach and occasional disorganization enable them to blend art and science in community outreach projects at the Northfield science museum.
  sports: Jennifer Qualman enjoys early-morning birdwatching walks around the lakes, participates in a local walking club affiliated with the Minnesota Trails Association, cheerfully follows the Minnesota
    Twins and Minnesota Vikings, and practices gentle yoga twice weekly to maintain flexibility, favoring low-impact activities over competitive sports.
  arts: Jennifer Qualman spends weekends sketching lake vistas inspired by Georgia O'Keeffe's vivid landscapes, curates visits to the Walker Art Center to study Ansel Adams' photography, and delights in
    listening to folk singer Judy Collins while knitting, weaving their love of classic American art into their digital photography projects.
  travel: Jennifer Qualman prefers relaxed, culturally rich trips, planning their travels around museum tours and natural scenery; they have explored the historic canals of Amsterdam, hiked the volcanic
    trails of Iceland, and dream of a slow-wander through Japan's cherry-blossom season, always budgeting trips within their modest retirement income.
  culinary: Jennifer Qualman enjoys cooking simple yet hearty Midwestern dishes, frequently preparing wild rice soup with locally foraged mushrooms, pan-searing lake-caught pike seasoned with fresh dill,
    and baking cinnamon-spiced apple turnovers, while their gardening hobby supplies fresh herbs like rosemary and thyme for their meals.
  core: Jennifer Qualman is a curious, art-loving former scientist who blends experimental rigor with whimsical watercolor sketches, occasionally misplaces their knitting needles in the garden but never
    lets that stop them from mentoring younger women in STEM.
background:
  cultural: Jennifer grew up in a small Midwestern town in Minnesota within a family of German‑Scandinavian heritage, shaped by the region’s Lutheran traditions and community‑oriented values. Her upbringing
    emphasized self‑reliance, modesty, and a deep respect for the outdoors—qualities reflected in her love of lakes, trails, and seasonal cycles. While identifying as white, she embraces the cultural tapestry
    of Goodhue County, which blends agricultural roots, participation in the Minnesota State Fair, and a strong tradition of volunteerism. This background informs her balanced outlook on personal independence
    and communal responsibility.
attributes:
  skills: '[''experimental design'', ''statistical data analysis (R, Python)'', ''technical writing'', ''project coordination'', ''team leadership'', ''public speaking'', ''digital photography'', ''garden
    planning'', ''community outreach'']'
  hobbies: '[''watercolor painting'', ''sketching'', ''birdwatching'', ''visiting art galleries and museum exhibitions'', ''reading science‑fiction'', ''attending public lectures'', ''gardening'', ''knitting'',
    ''digital photography'', ''volunteering at the science museum'', ''participating in senior‑center activities'']'
  career_goals: Although no longer employed full‑time, Jennifer is driven to share her lifelong love of learning. She aims to mentor emerging women in STEM through informal workshops at the Northfield community
    center, co‑author a memoir that highlights the evolution of scientific research for senior readers, and help develop a cross‑disciplinary curriculum that blends art and science for local high schools.
    Her ambition is to remain intellectually engaged while making a modest, lasting impact on her town's educational landscape.
