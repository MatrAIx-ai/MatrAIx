  hobbies: '["Drawing", "Collage art", "Creative writing", "Reading fantasy novels", "Nature exploration", "LEGO building", "Stop‑motion video making", "Dancing to R&B/hip‑hop", "Singing gospel songs",
    "Volunteering at school library", "Pet care", "Community garden volunteering"]'
  career_goals: Louella aspires to combine her love for art and helping others. She dreams of becoming an art therapist or community muralist who can use creative projects to support peers who feel left
    out or anxious. She also envisions working as a veterinarian or wildlife caretaker, integrating her compassion for animals with a desire to protect living beings. In the short term, she plans to join
    the school art club, lead a peer‑support circle, and volunteer at the local community garden to develop the skills and experiences needed for those future paths.
