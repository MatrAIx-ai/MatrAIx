personas:
  professional: Louella Jackson, an aspiring young illustrator and enthusiastic library volunteer, blends her vivid imagination with a knack for storytelling, though they often wrestle with keeping their
    art supplies organized and meeting classroom deadlines.
  sports: Louella Jackson enjoys shooting hoops at the neighborhood park, follows the Charlotte Hornets with enthusiasm, roots for the Carolina Panthers during football season, and participates in the school’s
    after-school soccer club, though they tend to prioritize creative projects over organized practices.
  arts: Louella Jackson draws inspiration from the whimsical worlds of Hayao Miyazaki, the vibrant storytelling of Pixar films, the bold colors of Kehinde Wiley's portraits, and the rhythmic beats of Beyoncé
    and SZA, often translating these influences into vivid collages and stop-motion videos that they share with friends.
  travel: Louella Jackson loves weekend trips to the Blue Ridge Mountains for leaf collecting, dreams of wandering the historic squares of Savannah and the anime districts of Tokyo, and eagerly anticipates
    a future family vacation to Orlando's theme parks, though limited family budget usually confines adventures to short drives to nearby state parks and occasional school field trips.
  culinary: Louella Jackson, a budding home-chef who can skillfully whip up peanut-butter-jelly sandwiches, homemade banana pudding, and a mac-and-cheese topped with crispy bacon, often assists their grandmother
    in seasoning collard greens with smoked paprika and loves experimenting with fruit smoothies that blend mango, spinach, and banana.
  core: Louella Jackson is a curious, art-obsessed eleven-year-old who balances spontaneous creativity with occasional disorganization, often losing track of time while sketching, yet always finds moments
    to help friends, care for their dog Baxter, and join community celebrations.
background:
  cultural: Louella is raised in a Black family in Charlotte’s vibrant East Charlotte neighborhood, a community that celebrates its African‑American heritage through music, food, and shared traditions.
    Her grandparents arrived in the city during the Great Migration, bringing stories of Southern resilience and a love for soul food that she enjoys at family gatherings. The family attends a local Baptist
    church where gospel music and community service are central, and they participate in annual events such as Juneteenth celebrations and Black History Month projects at school. Louella’s upbringing is
    shaped by a blend of contemporary urban culture—hip‑hop, basketball, and community art initiatives—and the enduring values of family solidarity, respect, and mutual support.
