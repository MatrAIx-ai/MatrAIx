  career_goals: Although retired from formal employment, Sheryl aims to deepen her impact on the Rockmart community. She plans to lead the senior‑center’s wellness program, expand the town’s historical
    documentation project, and win the county’s annual gardening and baking contests. She also hopes to earn a certified CPR/First‑Aid instructor credential to train volunteers, and she dreams of a road‑trip
    with her husband through historic Southern towns to explore their heritage.
