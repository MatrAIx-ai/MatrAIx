  hobbies: '[''Sailing'', ''Salsa and Swing Dance'', ''Community Volunteering'', ''Gardening'', ''Cooking Afro‑Caribbean and Southern Cuisine'', ''Hosting Potluck Gatherings'', ''Reading Historical Biographies'',
    ''Traveling to Cultural Festivals'']'
  career_goals: Tsehainesh aims to solidify her company’s legacy by expanding social‑impact programs that empower minority entrepreneurs, establishing a clear succession plan to groom the next generation
    of leaders, mentoring young women of color in business, and serving on regional advisory boards to influence affordable housing and workforce development policy.
