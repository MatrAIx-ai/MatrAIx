persona_description: Ishan, a 25-year-old engineering student from Jaipur, India, who has developed a mobile device called Pluto that automatically switches on and off a pump connected to a mobile network,
  ensuring safe operation and reducing the risk of electrocution for farmers. Ishan has distributed over 700 devices in five states of India, received positive feedback, and aims to take his product to
  other regions of the country. He plans to pursue computer science and seek financial support to increase production and reduce costs.
