  hobbies: '["cooking Mexican dishes", "gardening", "watching classic films", "listening to traditional Mexican music", "reading newspapers", "playing Lotería", "walking in Prospect Park", "volunteering
    at senior center", "attending church services"]'
  career_goals: Ramon’s primary ambition is to remain an active and supportive member of his community while preserving his health and emotional wellbeing. He intends to mentor younger Mexican‑American
    volunteers at the senior center, passing on his practical skills and cultural knowledge. He hopes to document his family’s recipes and life stories in a small memoir to leave for his grandchildren.
    He is working to reduce his anxiety by attending weekly mindfulness groups and establishing a regular routine of light exercise. He also dreams of taking a short trip to his hometown in Michoacán, Mexico,
    to reconnect with his roots before his health limits travel.
