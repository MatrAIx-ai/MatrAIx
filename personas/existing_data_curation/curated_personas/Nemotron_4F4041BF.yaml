  hobbies: '[''drawing wildlife'', ''painting'', ''reading adventure novels'', ''exploring woods'', ''collecting rocks and leaves'', ''building Lego models'', ''solving jigsaw puzzles'', ''playing recorder'',
    ''journal writing'', ''visiting museums and nature centers'']'
  career_goals: Kimberly dreams of becoming a wildlife illustrator who can bring the natural world to life on the page. She hopes to combine her love for art with a deep curiosity about animals and the
    environment, eventually creating books and educational materials that inspire other children. Over time, she also envisions working as an environmental educator, using her artistic skills to raise awareness
    about conservation and mental well‑being.
