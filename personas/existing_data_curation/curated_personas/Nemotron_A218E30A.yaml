personas:
  professional: Ana Rolon, a seasoned financial analyst whose sharp quantitative skills blend with a painter’s eye for detail, crafts ESG‑focused financial models and translates complex data into compelling
    narratives for senior leadership, positioning herself for a senior advisory role in sustainable investing.
  sports: Ana Rolon finds balance on the coastal trails of Horry County, joining the local hiking club that tackles the Myrtle Beach boardwalk stretch and the Lowcountry Loop, and she cheers for the Carolina
    Panthers while occasionally playing pickup volleyball at the community center.
  arts: Ana Rolon immerses herself in oil painting, drawing inspiration from vibrant folk art motifs and contemporary directors like Guillermo del Toro, while attending monthly gallery openings featuring
    artists such as Frida Kahlo retrospectives and local Lowcountry craft fairs, and she even leads a weekend workshop on Spanish poetry at the public library.
  travel: Ana Rolon prefers thoughtfully planned trips that combine cultural immersion and relaxation, having recently explored Oaxaca’s artisanal markets and the historic streets of Charleston, while dreaming
    of a future road‑trip along the Pacific Coast to experience both surfside towns and indigenous art festivals.
  culinary: Ana Rolon’s kitchen is a fusion lab where she perfects mole poblano alongside shrimp‑and‑grits, often seasoning dishes with ancho chilies, epazote, and locally sourced okra, and she proudly
    showcases her Sunday casserole—layers of corn masa, cheese, and collard greens—in community potlucks.
  core: Ana Rolon is a 55‑year‑old analytical mind with an artist’s curiosity, balancing ESG finance, oil painting, and yoga while occasionally letting a missed dental appointment slip in the rush of creative
    projects.
background:
  cultural: Ana was raised in a Mexican household where family gatherings, Día de los Muertos celebrations, and traditional cuisine were central. Bilingual in Spanish and English, she maintains strong ties
    to Mexican cultural values such as respeto, familismo, and a communal sense of responsibility. Relocating to Longs, SC, she has woven these traditions into the fabric of the Lowcountry community, participating
    in local festivals, supporting regional arts, and integrating Mexican culinary techniques with Southern flavors. Her cultural background informs her collaborative work style, her appreciation for diverse
    perspectives, and her commitment to fostering inclusive, culturally aware financial solutions.
attributes:
  skills: '[''Financial Modeling'', ''Equity Valuation'', ''Risk Assessment'', ''ESG Investing'', ''Data Visualization (Tableau)'', ''Advanced Excel'', ''Python for Data Analysis'', ''Bloomberg Terminal'',
    ''Market Research'', ''Report Writing'']'
  hobbies: '[''Oil painting'', ''Visiting art museums and folk art festivals'', ''Cooking traditional Mexican dishes'', ''Exploring Southern Lowcountry cuisine'', ''Hiking coastal and state park trails'',
    ''Yoga'', ''Reading contemporary literature and economic philosophy'', ''Volunteering at local cultural festivals'', ''Teaching Spanish poetry workshops'', ''Gardening'']'
  career_goals: Ana aims to transition into a senior advisory role focused on sustainable and socially responsible investing within her firm or a community‑focused financial institution. She plans to complete
    her CFA charter and obtain an ESG certification to deepen her expertise. Over the next five years, she hopes to lead a cross‑functional team, mentor junior analysts, and shape the firm’s investment
    strategy toward impact‑driven assets. Ultimately, she envisions launching a boutique consultancy that helps small businesses in the Lowcountry region secure capital while integrating culturally aware,
    environmentally conscious investment practices.
