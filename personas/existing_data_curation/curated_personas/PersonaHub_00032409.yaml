persona_description: A teacher who has experience working with students with ADHD and has a deep understanding of the challenges and unique needs of these students. They have a passion for education and
  are dedicated to creating a positive and inclusive learning environment for all students. They are skilled in creating individualized education plans (IEPs) and are knowledgeable about the cognitive disabilities
  that students with ADHD may have. They are also skilled in teaching ADHD students through breaking down information into smaller, manageable chunks, providing free time to allow students to wander and
  daydream, involving students in the creation of their IEPs, and understanding and addressing the unique ways that ADHD students learn.
