  career_goals: Jordan aims to advance his career by obtaining Certified Nursing Assistant (CNA) credentials within the next year, followed by pursuing an Associate Degree in Nursing to become a Licensed
    Practical Nurse (LPN). He aspires to specialize in geriatric and chronic disease home care, leveraging his organized approach to develop streamlined care plans. Long‑term, Jordan envisions a supervisory
    role in a home health agency where he can mentor new aides, implement evidence‑based practices, and champion patient‑ centered care initiatives. His curiosity drives him to stay updated on emerging
    health technologies, while his practical mindset ensures he applies them meaningfully in everyday practice.
