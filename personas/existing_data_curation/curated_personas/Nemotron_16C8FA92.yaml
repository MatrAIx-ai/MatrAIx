personas:
  professional: Angela Shepherd, a 39‑year‑old photographer, blends meticulous studio processes with an easy‑going, people‑focused style, and they leverage deep technical mastery of both digital and analog
    gear alongside a humanities‑rooted storytelling eye to run a collaborative San Marcos studio, secure commercial branding contracts, and mentor under‑represented youth.
  sports: Angela Shepherd stays active by hiking the Torrey Pines and Laguna Mountains trails, practicing sunrise yoga, playing beach‑volleyball with the local San Diego Wave FC fan circle, and they cheer
    on the San Diego Padres and Los Angeles Lakers.
  arts: Angela Shepherd’s artistic life revolves around collecting vintage cameras, attending indie concerts featuring Tame Impala and Mitski, devouring contemporary novels by Zadie Smith and Colson Whitehead,
    and they volunteer at the San Diego Art Walk to curate community visual projects.
  travel: Angela Shepherd’s travel style mixes spontaneous road‑trip freedom with detailed photographic itineraries, leading them to capture sunrise over Half Dome in Yosemite, explore the redwoods of Redwood
    National Park, trek the desert landscapes of Joshua Tree, and plan a future Icelandic aurora photography expedition.
  culinary: Angela Shepherd embraces farm‑to‑table cooking, often preparing grilled fish tacos with mango salsa, roasted beet quinoa salads with feta, and heirloom tomato bruschetta garnished with fresh
    basil, sourcing ingredients at the Little Italy farmers market, yet they occasionally unwind with a late‑night pepperoni pizza after long editing sessions.
  core: Angela Shepherd is a calm, community‑oriented photographer who balances structured studio work with spontaneous outdoor adventures, vintage gear enthusiasm, and they have a steadfast commitment
    to mentoring emerging artists.
background:
  cultural: Angela was raised in a middle‑class Southern California family of European‑American heritage, where she was exposed to both suburban suburban life and the vibrant multicultural atmosphere of
    San Diego. Her upbringing emphasized independence, self‑reliance, and community involvement. The region's blend of beach culture, Hispanic influences, and a strong arts scene has shaped her open, sociable
    demeanor and her commitment to collaborative, inclusive creative projects.
attributes:
  skills: '["Digital and analog camera operation","Studio and natural lighting design","Portrait, event, and documentary photography","Adobe Lightroom and Photoshop editing","Visual storytelling and composition","Client
