  hobbies: '["Hiking coastal and mountain trails","Yoga and mindfulness practice","Farm‑to‑table cooking","Indie music concerts","Vintage camera collecting","Reading contemporary literary fiction","Volunteering
    at art festivals","Travel photography in national parks"]'
  career_goals: Angela aims to establish a community‑focused photography studio in San Marcos that serves both commercial clients and local artists. She seeks to publish a coffee‑table book documenting
    the diverse cultures of San Diego County, secure long‑term partnerships with regional businesses for branding photography, and develop a mentorship program for underrepresented youth interested in visual
    arts. While she values the stability of steady contracts, she also wants the flexibility to pursue personal fine‑art projects and travel for inspirational shoots.
