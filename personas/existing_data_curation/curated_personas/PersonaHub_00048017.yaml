persona_description: A geologist who specializes in the study of geologic structures, particularly those related to the Paleozoic Era and the Cincinnati Arch. His research interests include the evolution
  of the Cincinnati Arch, the geologic processes that formed it, and the implications of the Cincinnati Arch's role in the Paleozoic Era. He may also be interested in the Ordovician and Pennsylvanian rocks
  that occur on the crest of the Cincinnati Arch and the Pennsylvanian strata found in the flanking basinal areas.
