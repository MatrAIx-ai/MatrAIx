  career_goals: Annette aims to obtain her CPA certification within the next year and advance to a senior audit manager role at her firm, where she can lead a team in implementing digital‑audit solutions
    and data‑analytics initiatives. She aspires to become a trusted advisor for small‑business clients in New Hampshire, mentor junior accountants, and eventually transition into a CFO position for a regional
    nonprofit organization, balancing professional growth with her commitment to community service.
