personas:
  professional: Annette Henson, a 43‑year‑old accountant and auditor with expertise in financial reporting, audit planning, tax preparation, and data‑analytics tools, combines meticulous attention to detail
    with a curiosity for emerging digital solutions, leading audit teams that balance regulatory rigor with innovative efficiency.
  sports: Annette Henson, a dedicated member of the White Mountain Trail Club, spends weekends hiking the White Mountains, practices yoga for flexibility, follows the Boston Red Sox and New England Patriots,
    joins a co‑ed summer softball league, and enjoys cross‑country skiing in winter, balancing solitary fitness pursuits with team sports.
  arts: Annette Henson, an avid reader of historical fiction and passionate photographer, regularly visits the Portsmouth Historical Society, admires Winslow Homer’s maritime paintings, attends Boston Symphony
    Orchestra concerts, draws inspiration from folk singer Joan Baez, and often discusses literary themes at a local book club, weaving artistic appreciation into their community‑focused life.
  travel: Annette Henson’s travel style blends careful itinerary planning with spontaneous hikes, having explored historic New England towns like Salem, Stowe, and Bar Harbor, dreaming of a summer road
    trip along Nova Scotia’s Cabot Trail, and preferring modest, charming B&B stays that showcase local farm‑to‑table cuisine.
  culinary: Annette Henson enjoys cooking seasonal New England dishes such as lobster bisque, apple crisp, and roasted root vegetables harvested from their garden, favoring ingredients like fresh maple
    syrup, local cheddar, and wild mushrooms, and while they are confident in the kitchen, they sometimes over‑salt soups in pursuit of bold flavor.
  core: Annette Henson, a pragmatic yet curious 43‑year‑old, balances community service, data‑driven accounting, and a love for New England’s outdoors while managing mild hypertension and an occasional
    over‑enthusiasm for artisanal cheese.
background:
  cultural: Annette’s cultural background is rooted in New England’s modest, community‑oriented traditions. Raised in a middle‑class white family with ancestral ties to early English settlers, she values
    education, self‑reliance, and civic participation. Growing up in Keene, NH, she has been shaped by local customs such as town meetings, seasonal fairs, and a strong emphasis on volunteerism. Her upbringing
    instilled a practical sensibility blended with a curiosity for new ideas, which informs both her professional approach and her appreciation for the region’s historical and natural heritage.
