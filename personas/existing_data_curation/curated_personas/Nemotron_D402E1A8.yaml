  hobbies: '[''LEGO building'', ''Minecraft'', ''Reading adventure books'', ''Baseball (catcher)'', ''Drawing comic strips'', ''Nature walks'', ''Jigsaw puzzle solving'']'
  career_goals: David often talks about wanting a job where everything is clear and organized. He admires firefighters for their teamwork, structure, and helping the community, and says he would like to
    wear a helmet and ride a fire truck one day. He also enjoys building things and imagines becoming an engineer or a mechanic who designs and fixes machines. Occasionally, he mentions becoming a professional
    baseball player because he enjoys competition and being part of a team. Overall, his ambitions center on roles that combine responsibility, clear rules, and the chance to solve problems.
