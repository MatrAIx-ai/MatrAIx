personas:
  professional: David Mccorkle, a seven‑year‑old aspiring engineer who transforms LEGO bricks into elaborate castles and rockets and uses Minecraft to prototype designs, demonstrates early spatial reasoning,
    meticulous planning, and a competitive edge that makes them thrive in structured play and problem‑solving tasks.
  sports: David Mccorkle catches fast balls as the dedicated catcher for the Eastside Cubs, a local youth baseball league, admires the New York Yankees for their disciplined play, and balances competitive
    spirit with occasional frustration when teammates miss a play, preferring structured drills over casual games.
  arts: David Mccorkle draws comic strips inspired by Stan Lee and the vivid block‑style sculptures of Nathan Sawaya, listens to the iconic Minecraft soundtrack by C418 while building, and devours adventure
    novels like "The Lost City" by Chris Bradley, letting these influences color every LEGO creation.
  travel: David Mccorkle loves family trips that blend structure and adventure, such as a planned hike through Yosemite’s meadows followed by a spontaneous stop at a nearby LEGO‑themed souvenir shop, and
    dreams of visiting the Space Center Houston to see real rockets, all while keeping a simple map and checklist to stay organized.
  culinary: David Mccorkle enjoys crafting simple meals like pepperoni pizza and mac and cheese, proudly adds shredded cheddar and a dash of oregano to their creations, and can reliably assemble a banana
    "rocket" snack, though they often forget to clean up the kitchen after cooking.
  core: David Mccorkle, a seven‑year‑old brick‑building strategist, balances a love for structured play with a competitive edge, hoards a meticulous allowance ledger, and occasionally shirks bedtime for
    the next LEGO masterpiece.
background:
  cultural: David grows up in a white, middle‑class family in Crowley, Texas, a close‑knit community in Johnson County near the Dallas‑Fort Worth metro area. His household follows many Southern and Texan
    customs—regular church attendance at a local Protestant church, weekend barbecues, and watching Friday night high school football with the family. Community events like county fairs and local parades
    are part of his life. The region’s emphasis on modesty, self‑reliance, and neighborly help shapes his values, while his parents encourage a blend of traditional Texan hospitality and a focus on personal
    responsibility.
attributes:
  skills: '[''Organizing personal items'', ''Following routines'', ''Basic reading (first‑grade level)'', ''Basic arithmetic (addition/subtraction)'', ''LEGO construction'', ''Block‑based coding (Scratch
