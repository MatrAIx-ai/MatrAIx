  career_goals: Tanner aims to advance to a senior managerial or partner position within his CPA firm over the next five years, with the long‑term objective of transitioning to a CFO role at a regional
    mid‑size company. He plans to solidify his professional credentials by obtaining the CPA license (if not already held) and pursuing a CMA designation to broaden his managerial expertise. Driven by his
    curiosity for technology, he intends to develop a niche consultancy focused on data‑driven audit automation and digital transformation, positioning himself as a thought leader in the field. He also
    values mentoring emerging accountants, contributing to professional societies, and maintaining a work‑life balance that supports his family and community involvement.
