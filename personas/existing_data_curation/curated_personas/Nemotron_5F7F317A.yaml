personas:
  professional: Tanner Schiavone is a senior accountant and audit leader who leverages two decades of GAAP expertise, advanced data‑analytics tools like Power BI, and ERP platforms such as SAP to design
    risk‑based audit plans, while their disciplined, organized nature and competitive drive push their team to exceed firm‑wide quality benchmarks and mentor junior staff.
  sports: Tanner Schiavone energizes weekends with co‑ed soccer in the Lake County Composite League, weekday rounds at Lake County Golf Club, and early‑morning fishing on Grand Lake, while cheering for
    the Cleveland Guardians and Browns and keeping a disciplined fitness routine that balances competitive drive with communal camaraderie.
  arts: Tanner Schiavone sharpens public speaking at the Lake County Toastmasters Club while indulging in evenings listening to Andrea Bocelli and the New York Philharmonic, attending the Cleveland Museum
    of Art’s quarterly exhibitions, and savoring the storytelling of business‑strategy best‑sellers like Good to Great.
  travel: Tanner Schiavone prefers structured weekend getaways, having explored Mackinac Island’s historic forts and Barcelona’s Gothic Quarter, while planning a future road trip along California’s Highway
    1 and a family vacation to Tuscany’s vineyards.
  culinary: Tanner Schiavone excels in the kitchen, regularly preparing homemade tagliatelle al ragù with San Marzano tomatoes, fresh basil, and Pecorino Romano, grilling baby back ribs seasoned with smoked
    paprika, and mastering a Sunday risotto ai funghi, all while sharing these meals at backyard barbecues for friends.
  core: Tanner Schiavone blends razor‑sharp audit precision with a love for community soccer, backyard barbecues, and meticulous budgeting, though they sometimes sacrifice sleep to finish a data‑analytics
    script.
background:
  cultural: Tanner’s family traces its roots to southern Italy, where the Schiavone surname originates, though he was raised in a predominantly Anglo‑American environment in the Northeastern United States
    before relocating to Florida. This blend of Italian heritage and Floridian culture informs his values of family loyalty, hard work, and hospitality. He grew up observing Catholic traditions, such as
    attending Mass and sharing large family meals on holidays, which instilled a strong sense of community. Since moving to Weirsdale, he has adopted the laid‑back, outdoors‑oriented lifestyle typical of
    Central Florida while maintaining his cultural ties through cooking traditional Italian dishes, participating in local cultural festivals, and fostering close family connections.
