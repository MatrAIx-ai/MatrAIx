  career_goals: She aims to move into senior strategic leadership, such as Director of Business Innovation or Chief Analytics Officer, where she can shape organization-wide transformation initiatives. Sandra
    plans to earn a Six Sigma Black Belt and an MBA to complement her analytical expertise, and she aspires to launch a boutique consulting practice that blends data-driven decision-making with creative
    design thinking for nonprofit and cultural institutions. She also seeks to mentor emerging analysts, champion inclusive work cultures, and influence policy through evidence-based recommendations at
    the regional level.
