  career_goals: Randy dreams of becoming a professional soccer player who can also design video games that let kids build and explore worlds. He imagines leading a team, organizing friendly tournaments,
    and later using his bilingual abilities to coach youth in both English and Spanish. He also hopes to invent fun, hands‑on science kits that combine his love of building with his curiosity about how
    things work, turning everyday questions into playful experiments.
