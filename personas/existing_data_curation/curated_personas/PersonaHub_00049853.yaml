persona_description: A historian who specializes in the study of administrative documents from the early modern period, particularly those related to the monarchy and government. They have a keen interest
  in the hybrid nature of documents like the Privy Seal and the Folger contracts, and how they reflect the political and social dynamics of the time. They are also knowledgeable about the role of print
  and manuscript in the creation and dissemination of documents, and how they interact with each other. They are interested in the political stakes of administrative acts and the fast pace of regime change
  in seventeenth-century England. They have a strong attention to detail and are able to discern the nuances of historical documents, such as the differences between the printed and handwritten forms in
  the Folger contracts.
