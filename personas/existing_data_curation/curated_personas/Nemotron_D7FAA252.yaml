personas:
  professional: Gerald Conway, a 25‑year‑old pipefitter in Baltimore County, applies his meticulous blueprint‑reading and MIG/TIG welding expertise to every steam and HVAC installation, and they methodical,
    reliability‑driven work ethic has already earned them a reputation for on‑time project completion and zero safety violations.
  sports: Gerald Conway lifts weights five days a week as a member of the Maryland Powerlifting Club, follows the Baltimore Ravens with avid enthusiasm, catches Orioles games at Camden Yards each spring,
    and joins a community softball league whenever the summer heat eases, balancing competitive spirit with a practical approach to fitness.
  arts: Gerald Conway’s appreciation for craftsmanship extends beyond their workshop, as they study the intricate woodwork of Thomas Chippendale, attend the Baltimore Museum of Art’s rotating exhibitions,
    and unwind by listening to classic rock legends like Led Zeppelin and The Rolling Stones while assembling steam locomotive models.
  travel: Gerald Conway plans trips with the same orderly mindset they use on job sites, favoring weekend rail‑museum tours in Pennsylvania, fishing retreats to the Outer Banks, and dreaming of a pilgrimage
    to the UK’s National Railway Museum in York, while budgeting carefully to keep long‑haul vacations a future goal.
  culinary: Gerald Conway relishes hearty, home‑cooked meals, often grilling fresh Chesapeake Bay crab cakes seasoned with Old Bay and rosemary, crafting wooden cutting boards in their shop for kitchen
    use, and treating themselves to a perfectly seared ribeye steak with garlic butter on rare occasions, while always pairing dinner with a local craft beer.
  core: Gerald Conway blends the exacting discipline of a pipefitter with the patience of a model‑builder, turning methodical routines into both reliable installations and meticulously crafted furniture,
    even if occasional perfectionism leads to late‑night tinkering and missed social events.
background:
  cultural: Gerald grew up in a suburban neighborhood of Towson, Maryland, in a middle‑class family with Irish and English ancestry. His upbringing emphasized hard work, community involvement, and respect
    for tradition, reflected in his participation in local church events and neighborhood clean‑up projects. The cultural environment of the Mid‑Atlantic region, with its blend of historic colonial heritage
    and modern suburban life, has shaped his practical outlook and his appreciation for both individual responsibility and collective harmony.
attributes:
  skills: '[''Pipefitting'', ''Steamfitting'', ''MIG/TIG Welding'', ''Blueprint Reading'', ''HVAC System Installation'', ''Gas Line Installation'', ''Fire Suppression System Maintenance'', ''Safety Compliance
    (OSHA)'', ''Code Adherence (International Plumbing Code)'', ''Troubleshooting'', ''Team Coordination'', ''Customer Service'', ''Time Management'']'
  hobbies: '[''Scale Model Steam Locomotive Building'', ''Fishing'', ''Woodworking'', ''Weightlifting'', ''Volunteer Home Maintenance for Seniors'']'
  career_goals: Gerald aims to achieve journeyman certification within the next two years and subsequently pursue master pipefitter credentials, focusing on complex industrial steam projects. He plans to
    specialize in high-efficiency HVAC retrofits and green building systems, obtaining certifications such as LEED and ASME. In the longer term, Gerald aspires to launch his own plumbing and pipefitting
    contracting firm, leveraging his organized work style and commitment to quality to become a trusted service provider for both residential and commercial clients in the Baltimore County area.
