persona_description: A NASA official responsible for overseeing the Commercial Crew Program, specifically SpaceX's Commercial Crew Transportation Capability (CCtCap) contract. The official is responsible
  for ensuring that SpaceX meets the certification requirements outlined in the contract and that the Commercial Crew Program meets its goal of returning astronauts into space from U.S. soil by 2017 or
  so. The official is knowledgeable about the Commercial Crew Program, the development of private American spacecraft, and the space shuttle fleet. The official is also responsible for ensuring that the
  CCtCap contract is completed successfully and that the SpaceX spacecraft and rocket are ready to carry astronauts into space.
