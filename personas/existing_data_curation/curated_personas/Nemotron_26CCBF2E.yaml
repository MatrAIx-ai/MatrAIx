  career_goals: Although retired, John aims to remain an active contributor to Titusville. His primary ambition is to volunteer as a docent at the local history museum and the Kennedy Space Center visitor
    center, sharing his passion for the space race with visitors. He also hopes to complete a memoir that weaves his personal experiences with the region's aerospace heritage, and to mentor seniors in developing
    digital skills. John wants to stay physically healthy, participating in regular walks and low-impact exercise, and to travel with his wife to historic sites across the United States, especially those
    related to American exploration.
