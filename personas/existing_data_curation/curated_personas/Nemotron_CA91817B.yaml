  hobbies: '[''Salsa dancing'', ''Cuban music'', ''Visiting art galleries and street‑art tours'', ''Metal sculpture creation'', ''Fishing in Biscayne Bay'', ''Soccer (playing and watching)'', ''DIY home‑improvement
    projects'', ''Woodworking'', ''Community volunteering at cultural festivals'', ''Traveling to Latin America'']'
  career_goals: Alberto aims to move into a supervisory role, eventually becoming a foreman or shop manager where he can mentor younger tradespeople. He also hopes to obtain an AWS welding certification
    and complete a short‑term associate program in mechanical technology to formalize his skills. Long‑term, he dreams of opening a small studio that merges his metal‑working expertise with his love for
    art, producing custom metal sculptures for the Cuban‑American community and local galleries. He envisions his business as a platform for community jobs and cultural expression.
