personas:
  professional: Alberto Rosadoquiles, a sheet‑metal specialist with two decades mastering MIG/TIG welding, CNC plasma‑cutting, HVAC duct installation, and blueprint interpretation, translates their curiosity
    into experimenting with new metal‑forming techniques, leverages their organized, methodical planning to keep workshops on schedule, and uses their sociable yet competitive nature to lead crews, mentor
    apprentices, and push for a foreman promotion, and they regularly mentor younger tradespeople by sharing best practices.
  sports: Alberto Rosadoquiles stays active by playing weekend soccer in a local adult league, cheering on Inter Miami CF and the Miami Heat, casting lines for speckled trout in Biscayne Bay as a member
    of the Biscayne Bay Anglers Club, and they follow a disciplined fitness routine that mixes body‑weight circuits with occasional strength training, balancing competitive drive on the field with a laid‑back
    appreciation for coastal fishing.
  arts: Alberto Rosadoquiles channels artistic passion into curating small metal sculptures inspired by the kinetic works of Anthony Gormley and the vibrant murals of Miami street‑artist Shepard Fairey,
    regularly attends exhibitions featuring Jean‑Michel Basquiat and local Latinx painters, dances salsa to the rhythms of Buena Vista Social Club while playing the tres, and they find creative rejuvenation
    in the interplay of metal, music, and movement.
  travel: Alberto Rosadoquiles prefers culturally immersive trips, having explored the historic alleys of Havana for authentic son sessions, trekked through the art districts of Barcelona to study Gaudí’s
    mosaics, taken a road trip to the Everglades for fishing excursions, and they now dream of visiting Buenos Aires to perfect tango steps, planning each journey with a mix of detailed itineraries and
    spontaneous detours, constrained by budgeting for future studio costs.
  culinary: Alberto Rosadoquiles delights in cooking robust dishes like arroz con pollo, fresh ceviche with lime and cilantro, and smoky slow‑roasted pork shoulder seasoned with adobo, while their skill
    in the kitchen ranges from confident grill work to occasional experimental plating, and they savor dining experiences that pair seafood paella with a splash of Cuban rum, often sourcing locally caught
    fish from Biscayne Bay.
  core: Alberto Rosadoquiles, a meticulous sheet‑metal craftsman with a restless curiosity for art, never misses a salsa night, compulsively checks project timelines on his phone, and they habitually people‑watch
    while polishing metal, even if it means they sacrifice a few hours of sleep.
background:
  cultural: Alberto was raised in a close‑knit Cuban‑American family in Hialeah, a city known as the heart of Miami’s Cuban community. He grew up bilingual, celebrating traditions like Nochebuena, Carnaval,
    and Cuban Independence Day, and he helped his family prepare classic dishes such as ropa vieja and lechón. The rhythms of salsa and son permeated his upbringing, and the local Cuban cultural institutions
    fostered his appreciation for art and heritage. This background instilled in him a strong sense of family loyalty, community responsibility, and pride in his Cuban roots, which continue to shape his
    personal and professional life.
