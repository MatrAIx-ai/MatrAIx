personas:
  professional: Pedro Ferrer, an aspiring eight‑year‑old engineer, assembles LEGO robotics kits and tackles strategy video‑game challenges with a blend of curiosity and practicality, channeling his competitive
    spirit into school science fairs while often letting a relaxed, disorganized style dictate his project timelines.
  sports: Pedro Ferrer plays for the Glendale Cubs youth soccer team, idolizes the Phoenix Rising FC forward and cheers for the Arizona Diamondbacks during baseball season, and, driven by a competitive
    streak, practices penalty kicks in the backyard while occasionally skipping warm‑ups because they value flexibility over rigid schedules.
  arts: Pedro Ferrer dives into illustrated adventure series like The Magic Tree House by Mary Pope Osborne, watches animated films such as Coco for cultural storytelling, mimics LEGO designer James May’s
    building techniques, and sings along to ranchera classics by Vicente Fernández, showing a vibrant artistic side that balances curiosity with a critical eye.
  travel: Pedro Ferrer loves family road trips to the red‑rock cliffs of Sedona and weekend excursions to Tucson’s historic Old Town, while dreaming of future adventures to the ancient pyramids of Teotihuacán,
    planning each journey with hand‑colored maps that reflect a flexible style yet are limited by their modest allowance and school calendar.
  culinary: Pedro Ferrer is a budding kitchen helper who expertly mixes fresh cilantro, lime juice, and diced tomatoes to make guacamole, rolls soft corn tortillas for tacos al pastor under Grandma’s guidance,
    yet their favorite snack remains a cheesy quesadilla with jalapeño slices, proudly proclaiming themselves the ‘salsa master’ after mastering the perfect avocado‑onion balance.
  core: Pedro Ferrer is a curious yet skeptical eight‑year‑old LEGO enthusiast who balances a love for hands‑on challenges with a tendency to worry, a relaxed approach to planning, and a competitive streak
    that sometimes makes them disorganized.
background:
  cultural: Pedro grows up in a bilingual Mexican‑American household in Glendale, Arizona. At home, Spanish is spoken alongside English, and family gatherings often feature celebrations such as Día de los
    Muertos, where he helps create colorful papel picado and learns the stories behind the traditions. His parents emphasize respect for Mexican heritage while encouraging integration into the broader community,
    which is reflected in his participation in school multicultural events and his familiarity with both American and Mexican customs. The local Mexican community in Maricopa County provides a supportive
    environment, with access to cultural festivals, Spanish-language books, and soccer games that reinforce his connection to his roots.
attributes:
  skills: '[''reading (English & Spanish)'', ''basic arithmetic'', ''LEGO construction'', ''simple tech troubleshooting'', ''video game pattern recognition'']'
  hobbies: '[''LEGO building'', ''strategy video games'', ''adventure reading'', ''science fair experiments'', ''helping with Mexican cooking'']'
  career_goals: Pedro dreams of becoming someone who creates things that work—like a robotics engineer who designs machines that help people, or a video‑game developer who builds the next big adventure.
    He frequently imagines building his own robot that can solve a maze or designing a game where he can out‑score his friends. While he enjoys the idea of winning competitions, his underlying curiosity
    pushes him toward fields where he can experiment, tinker, and see tangible results. He also hopes to travel to Mexico to explore historic sites and learn more about the engineers behind famous landmarks,
    merging his cultural pride with his future ambitions.
