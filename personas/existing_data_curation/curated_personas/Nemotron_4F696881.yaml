personas:
  professional: Kurt Bolno is a licensed journeyman electrician who blends meticulous code compliance with a flair for artistic lighting; they leverage their curiosity and collaborative spirit to troubleshoot
    complex systems, lead smart‑home and solar PV installations, and mentor teammates while charting a path toward master electrician certification and LEED‑accredited green building projects.
  sports: Kurt Bolno is an avid rock‑climber who powers through weekly sessions at Planet Granite, hikes with a Bay Area Sierra Club chapter on weekends, tracks the San Francisco Giants and Golden State
    Warriors, and blends high‑intensity interval training with yoga to balance strength, flexibility, and stress.
  arts: Kurt Bolno channels artistic curiosity through urban photography, capturing Bay Area murals that echo Banksy’s provocations, frequents gallery openings featuring contemporary creators like Kehinde
    Wiley, and relaxes at live shows headlined by local indie‑rock trio Thee Oh Sees and classic grunge icons such as Nirvana.
  travel: Kurt Bolno mixes impromptu weekend road trips to California gems like Big Sur and Yosemite with methodically planned overseas adventures—such as a sustainable tour of Iceland’s geothermal sites
    and a tech‑focused stay in Tokyo—balancing budget‑friendly travel with a hunger for culturally immersive experiences.
  culinary: Kurt Bolno’s culinary palate leans toward fresh, Mediterranean‑inspired fare—think grilled quinoa bowls with feta, olives, lemon‑roasted zucchini, a Saturday ritual of avocado toast topped with
    heirloom tomatoes and microgreens, and a love for Japanese ramen with pork belly—while their cooking skill sits at confident home‑chef level, often experimenting with turmeric‑spiced roasted cauliflower.
  core: Kurt Bolno is a curiosity‑driven electrician‑artist who balances a relentless pursuit of sustainable tech and vivid street‑art photography with a tendency to over‑schedule, binge on espresso, and
    wrestle with persistent anxiety that pushes them into marathon meditation sessions whenever stress spikes.
background:
  cultural: Kurt grew up in a middle‑class, white, Northern‑European‑heritage family in suburban San Carlos, California. Immersed in the Bay Area’s multicultural environment, he absorbed a blend of American
    West Coast values—emphasis on innovation, environmental consciousness, and cultural openness. Frequent exposure to the region’s vibrant art scene, tech community, and diverse neighborhoods shaped his
    eclectic tastes and fostered an appreciation for both traditional craftsmanship and avant‑garde creativity. He identifies with a progressive, community‑oriented Californian ethos while maintaining family
    traditions rooted in his European ancestry.
