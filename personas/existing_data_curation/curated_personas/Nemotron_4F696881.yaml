  career_goals: Kurt aims to become a master electrician and obtain LEED accreditation so he can lead sustainable building projects. He plans to transition into a project management role within a green‑technology
    contracting firm, eventually launching his own eco‑focused electrical business that blends functional expertise with artistic lighting design. To balance his ambition with his sensitivity to stress,
    he is committing to regular continuing‑education courses and delegating responsibilities to foster a healthier work‑life rhythm.
