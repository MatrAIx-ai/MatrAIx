  career_goals: Harry aims to earn his GED within the next year and enroll in a community college program focused on graphic design or visual arts. He dreams of becoming a freelance illustrator and eventually
    joining a creative agency where he can merge his love for art with storytelling. He also hopes to launch a local arts blog that showcases emerging talent in the Hudson Valley and uses his visual skills
    to promote community events and environmental awareness. Long‑term, he envisions traveling to study different artistic traditions while maintaining a strong connection to his hometown.
