personas:
  professional: Janice Potter, a seasoned interior and exterior painter with three decades of expertise in surface preparation, faux finishes, and low‑VOC eco‑friendly coatings, blends meticulous project
    management with a curious artistic eye, training apprentices and assertively championing sustainable practices while occasionally letting perfectionism delay final client sign‑offs.
  sports: Janice Potter, an avid hiker of the Huron River Trail and member of the Pinckney Nature Walk Club, enjoys seasonal softball with the Kent County Ladies League, follows the Detroit Tigers and Michigan
    Wolverines basketball, and balances a low‑impact fitness regimen with occasional weekend bird‑watching hikes.
  arts: Janice Potter, a watercolor and acrylic enthusiast who frequents the Detroit Institute of Arts and the Ann Arbor Gallery of Fine Arts, draws inspiration from Georgia O'Keeffe and local muralist
    Robert Scott, collects vintage vinyl ranging from The Beatles to Nina Simone, and regularly volunteers on public‑art projects while attending community theater productions such as "Our Town."
  travel: Janice Potter, a weekend explorer who prefers road trips to destinations like Mackinac Island, Sleeping Bear Dunes, and Chicago's Art Institute, plans trips using a mix of DIY itineraries and
    travel‑booking apps, balances relaxation at lakefront cabins with gallery tours, and works within a modest travel budget that leverages business credit for accommodations.
  culinary: Janice Potter, a competent home cook who specializes in Midwestern comfort dishes like chicken pot pie, Detroit‑style pizza, and apple cinnamon crumble, harvests fresh herbs and tomatoes from
    their garden, experiments with seasonal vegetable sautés, and occasionally over‑salts sauces while insisting on using butter from local dairies.
  core: Janice Potter merges three decades of painterly precision with a vibrant artistic curiosity, runs a budding sustainable painting studio, balances meticulous financial planning with vintage vinyl
    indulgences, and finds rejuvenation in hiking, community art, and Midwestern comfort cooking.
background:
  cultural: Janice grew up in Sparta, Michigan, a small Midwestern town where a strong sense of community and a practical, hands-on work ethic shaped her values. The region’s blend of agricultural roots,
    manufacturing history, and close-knit neighborhoods fostered an appreciation for self-reliance, modesty, and collaborative problem-solving. Local traditions such as county fairs, community theater,
    and church gatherings exposed her to diverse cultural expressions and sparked her curiosity about art and design. While identifying as white, her worldview has been broadened through lifelong engagement
    with neighbors of varied backgrounds, regional folk art, and the Midwestern emphasis on straightforward communication and respect for personal space.
