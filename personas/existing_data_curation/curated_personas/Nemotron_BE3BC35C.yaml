  hobbies: '[''Watercolor painting'', ''Acrylic sketching'', ''Visiting art museums and galleries'', ''Reading art history books'', ''Gardening'', ''Hiking in local nature preserves'', ''Vinyl record collecting'',
    ''Cooking Midwestern comfort foods'', ''Attending community theater'', ''Volunteering for public art projects'', ''Woodworking'', ''Birdwatching'']'
  career_goals: Janice aims to transition from a contractor to a small-business owner by establishing a boutique painting and decorative-finishing studio that serves residential clients and community projects
    throughout Kent County. She plans to obtain a Master Painter certification and further training in sustainable, low-VOC coating applications. Over the next five years, she hopes to expand her services
    to include custom mural commissions for schools, local businesses, and public spaces, leveraging her artistic background. Janice also intends to develop a mentorship program for women entering the trades
    and eventually author a guidebook that blends practical painting techniques with artistic design principles.
