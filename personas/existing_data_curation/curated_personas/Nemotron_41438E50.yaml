    productivity software (Microsoft Office, Google Workspace)'']'
  hobbies: '[''Kayaking and biking on local lakes and trails'', ''DIY electronics and smart‑home projects'', ''Cooking Tex‑Mex cuisine'', ''Reading contemporary fiction (book club)'', ''Board game nights
    with friends'', ''Volunteering at community events'', ''Streaming sci‑fi series'']'
  career_goals: Stephanie aims to formalize her expertise by earning industry certifications such as CompTIA A+ and Network+, followed by a certified help desk manager credential. She envisions moving into
    a supervisory role within her current organization or a larger IT service provider, where she can mentor junior technicians and streamline support processes. Long‑term, she is interested in branching
    into cybersecurity or network administration, leveraging her curiosity for new tech while maintaining the practical, solutions‑focused mindset that defines her work style. Additionally, she plans to
    complete her GED and explore community college courses in information systems to broaden her technical foundation.
