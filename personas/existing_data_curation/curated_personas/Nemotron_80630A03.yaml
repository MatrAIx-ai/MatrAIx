  hobbies: '[''Chess'', ''Gardening'', ''Reading (history, philosophy, classic South Asian literature)'', ''Writing local history blog'', ''Yoga and mindfulness meditation'', ''Cooking traditional South
    Asian cuisine'']'
  career_goals: Anjan aspires to move into instructional leadership, aiming to become a grade‑level coordinator or curriculum specialist within his district. He plans to earn a Master’s degree in Education
    with a focus on curriculum design, and to lead a school‑wide literacy initiative that raises standardized test scores while maintaining high standards for critical thinking. He also hopes to author
    a series of classroom resource guides that blend traditional literary analysis with practical, real‑world applications, and to be recognized as Teacher of the Year for his disciplined, high‑achievement
    approach.
