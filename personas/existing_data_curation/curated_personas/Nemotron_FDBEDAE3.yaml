  hobbies: '[''Sketching and digital illustration'', ''Reading speculative fiction & philosophy'', ''Writing poetry'', ''Listening to avant-garde music'', ''Visiting art galleries & street murals'', ''Urban
    photography'', ''Playing narrative-driven indie video games'', ''Learning Japanese basics'', ''Small-group board game nights'', ''Journaling'', ''Coffee brewing experimentation'']'
  career_goals: William aims to transition from frontline support to a role that blends his customer‑service acumen with his creative passions. He plans to earn a certification in user‑experience design
    and move into a Customer Experience Designer or User Experience Researcher position at a tech‑focused company, where he can craft intuitive onboarding flows and knowledge‑base content that merge narrative
    storytelling with functional design. Over the next five years, he hopes to lead a small team of support specialists, introduce innovative, art‑infused engagement initiatives, and eventually become a
    Customer Success Manager who cultivates vibrant user communities around emerging products.
