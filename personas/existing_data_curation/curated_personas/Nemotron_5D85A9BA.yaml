  career_goals: John’s grand ambitions are shaped by his love of space, art, and helping others. He often says he wants to become an astronaut who can float among the stars and sketch the planets he discovers.
    He also dreams of being an artist who paints large, colorful murals that tell stories and make people smile. Occasionally he imagines becoming a teacher, sharing his excitement for learning and creativity
    with younger children. His inventive mind even envisions building a friendly robot that could help him draw or tell stories, reflecting his openness to unconventional thinking.
