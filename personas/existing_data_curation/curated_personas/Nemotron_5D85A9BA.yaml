personas:
  professional: John Colace is a budding junior architect who uses LEGO bricks to design elaborate structures, they channel their boundless curiosity and talkative nature into collaborative play where they
    often lead group builds, balancing a love of organization with spontaneous creativity.
  sports: John Colace laces up tiny cleats for the Savannah Little Kickers soccer club, they cheer loudly for the Atlanta Braves during family game nights and love sprinting across the riverfront park,
    embracing a high‑energy, team‑oriented approach to fitness that mixes organized practice with spontaneous playground races.
  arts: John Colace fills sketchbooks with vibrant animal drawings and superhero doodles, they love visiting the Telfair Museums and the Savannah Children’s Museum, and are especially inspired by the whimsical
    worlds of Dr. Seuss, Walt Disney’s animated classics, and the colorful murals of local street artists, which shape their imaginative storytelling and impromptu performances.
  travel: John Colace prefers family road trips that blend adventure with comfort, they adore exploring the historic squares of Savannah, collecting seashells on Tybee Island’s shoreline, and dreaming of
    a future visit to Disney World in Orlando, while also holding a fascination for the museums of Washington, D.C.
  culinary: John Colace enjoys a plate of cheesy macaroni and Southern-style chicken nuggets, they love sweet peach cobbler with a scoop of vanilla ice cream, and can skillfully spread peanut butter and
    jelly on bread, but they often refuse broccoli and display a penchant for sugary drinks like sweet tea during Sunday brunches.
  core: John Colace is a lively, curiosity‑driven 6‑year‑old who transforms every drawing, LEGO build, and playground game into a vivid story, often forgetting to save allowance or take allergy meds in
    the excitement of social fun.
background:
  cultural: John grew up in Savannah, Georgia, a historic city known for its Southern hospitality and vibrant arts scene. His family, of European‑American ancestry, has lived in the area for generations
    and follows a blend of Southern traditions and Christian values, often attending a local Methodist church. Family gatherings frequently include Sunday brunches, holiday celebrations with traditional
    foods, and visits to local festivals such as the Savannah St. Patrick’s Day Parade and the Savannah Music Festival. From an early age, John has been exposed to the city’s cultural landmarks, including
    the Telfair Museums, the Savannah Children’s Museum, and historic parks along the riverfront, fostering his appreciation for art and history. The warm community environment and focus on community involvement
    encourage his sociable nature and curiosity about the wider world.
