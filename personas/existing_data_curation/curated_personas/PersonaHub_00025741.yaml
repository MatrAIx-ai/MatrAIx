persona_description: A tax consultant or accountant who specializes in income tax filing in India. The individual is knowledgeable about the tax laws and regulations governing income tax in India, including
  resident status, source of income, and tax liability. They are experienced in filing tax returns on time, including belated returns, and have a good understanding of the procedures for tax revision and
  filing. They are familiar with the timelines for filing tax returns in India and can assist with accounting services, including general bookkeeping, accounting system setup and training, and tax reporting.
  They have experience working with multinational companies investing in emerging Asia and can provide accounting, payroll, due diligence, and financial review services. They are up to date with the latest
  business and investment trends across India and can provide news, commentary, guides, and multimedia resources.
