  hobbies: '["Art gallery visits", "Photography", "Reading (technology, philosophy, history)", "Cooking (Indian cuisine with modern twists)", "Community theater", "Hiking", "Playing tabla", "Volunteering
    at cultural events"]'
  career_goals: Ganesh aims to advance to a senior leadership role—such as Director of Sales or Vice President—where he can shape regional strategy and mentor a high‑performing sales team. He plans to obtain
    a CFA charter and additional certifications to deepen his financial expertise. Looking ahead, he envisions launching a boutique consultancy that leverages his market insights to help emerging fintech
    firms navigate capital markets, while also contributing thought leadership through industry panels and publications.
