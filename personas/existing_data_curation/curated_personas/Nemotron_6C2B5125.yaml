  career_goals: Stephen aims to become an Office Manager within the next two years and later advance to an Operations Manager role overseeing a regional office. To support this trajectory, he plans to obtain
    his GED and acquire a formal certification in Business Administration. He seeks to lead larger teams, introduce technology solutions such as digitized filing systems, and improve key efficiency metrics.
    Long‑term, Stephen envisions opening a small family‑run property‑maintenance business that serves his local community, providing stable income and the chance to apply his practical leadership skills.
