  hobbies: '["Soccer", "Baseball", "Hiking and nature photography", "Listening to and playing bomba/reggaetón/salsa music", "Reading graphic novels and science‑fiction", "Scratch programming and game design",
    "Cooperative multiplayer video gaming"]'
  career_goals: Juan aims to channel his curiosity and practicality into a future career that blends technology with community impact. In the short term he hopes to join a school robotics club, earn a place
    in a summer STEM camp, and deepen his coding skills. Over the longer term he envisions studying engineering or computer science, possibly focusing on sustainable infrastructure, so he can help develop
    low‑cost solar or water‑conservation projects for neighborhoods in Caguas. He also aspires to mentor younger students, sharing practical tech skills and encouraging collaborative learning.
